"topic_num":"小兒神經肌肉骨骼","topic_code":"C7","q_num":24,"roc_year":"113","exam_code":"113030","src":"民國113年","options":{"A":"常見於脊髓損傷或糖尿病合併神經病變之患者","B":"可能為腹腔或骨盆腔手術後之併發症","C":"流至尿道的精液逆流至膀胱","D":"接受精子捐贈進行人工授精為唯一的治療方式"},"img":""},{"id":"113180-N4-6","code":"113180","roc":"113","cat":"N4","catname":"產兒科護理學","num":6,"stem":"第三孕期婦女抱怨下肢腫脹,傍晚時鞋子就穿不下,下列護理指導何者不適當?","opts":{"A":"可穿舒適軟質包鞋","B":"穿著及膝彈性襪","C":"可做足背屈曲運動","D":"臥床休息時,採左側臥"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"10母嬰產科與其他借題","topic_num":"小兒神經肌肉骨骼","topic_code":"C7","q_num":6,"roc_year":"113","exam_code":"113180","src":"民國113年","options":{"A":"可穿舒適軟質包鞋","B":"穿著及膝彈性襪","C":"可做足背屈曲運動","D":"臥床休息時,採左側臥"},"img":""},{"id":"114100-N4-27","code":"114100","roc":"114","cat":"N4","catname":"產兒科護理學","num":27,"stem":"一名1 歲嬰兒誤食家用清潔劑,被家長緊急送至急診,經評估其呼吸穩定但持續流口水、咳嗽。下列護理處置何者較適當?","opts":{"A":"立即給予大量溫開水催吐,以排出殘餘毒物","B":"保持呼吸道通暢,持續觀察意識狀態","C":"給予牛奶中和胃內毒物,以減少腐蝕性","D":"給予吐根糖漿中和酸鹼"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"10母嬰產科與其他借題","topic_num":"小兒神經肌肉骨骼","topic_code":"C7","q_num":27,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"立即給予大量溫開水催吐,以排出殘餘毒物","B":"保持呼吸道通暢,持續觀察意識狀態","C":"給予牛奶中和胃內毒物,以減少腐蝕性","D":"給予吐根糖漿中和酸鹼"},"img":""},{"id":"115030-N4-6","code":"115030","roc":"115","cat":"N4","catname":"產兒科護理學","num":6,"stem":"懷孕30 週孕婦抱怨下背痛,可優先教導下列何種運動?","opts":{"A":"骨盆底陰道收縮運動","B":"骨盆搖擺運動","C":"雙下肢抬舉運動","D":"盤腿坐式運動"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"10母嬰產科與其他借題","topic_num":"小兒神經肌肉骨骼","topic_code":"C7","q_num":6,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"骨盆底陰道收縮運動","B":"骨盆搖擺運動","C":"雙下肢抬舉運動","D":"盤腿坐式運動"},"img":""}],E={"101030-N4-77":{"quick":"細菌性腦膜炎腦脊髓液檢查錯誤的是「蛋白質較正常者減少」(D)。","detail":{"background":"細菌性腦膜炎的腦脊髓液(CSF)典型變化:外觀混濁、嗜中性(多形核)白血球增加、葡萄糖降低(細菌消耗)、蛋白質升高(發炎滲出)。與病毒性(無菌性)腦膜炎(清澈、淋巴球、糖正常、蛋白正常或微升)相比,細菌性是糖低、蛋白高、混濁。","options":{"A":"正確。外觀較正常混濁。","B":"正確。嗜中性白血球增加。","C":"正確。葡萄糖較正常減少(細菌消耗)。","D":"錯誤(本題答案)。蛋白質較正常升高(發炎滲出),非減少。"},"sources":["新文京《兒科護理學》腦膜炎","CSF"]}},"102030-N4-80":{"quick":"布魯辛斯基氏徵象(Brudzinski sign)是「讓兒童平躺,當將其頸部迅速抬高屈曲,會引發膝及腰部的屈曲」(B)。","detail":{"background":"腦膜刺激徵象用於評估腦膜炎。Brudzinski徵象:平躺被動將頸部前屈時,因腦膜受刺激引發髖膝不自主屈曲。Kernig徵象則是屈髖屈膝後伸直小腿出現阻力或疼痛;巴賓斯基是足底劃痕大拇趾上翹。　補充：布魯辛斯基氏徵象(Brudzinski sign)：平躺時被動將頸部前屈，若引發「髖與膝關節不自主屈曲」即陽性，提示腦膜刺激(腦膜炎)。","options":{"A":"這是Kernig徵象(屈膝後伸腿有阻力疼痛)。","B":"正確。頸部前屈引發膝腰屈曲=Brudzinski徵象。","C":"這是巴賓斯基反射(足底劃痕)。","D":"這是其他脊柱反射,非Brudzinski。"},"sources":["新文京《兒科護理學》腦膜炎","Brudzinski"]}},"103030-N4-77":{"quick":"布魯辛斯基氏徵象(Brudzinski sign)陽性反應是「平躺時用手托高頭部,將其頸部迅速屈曲,病童會感到疼痛,膝部因而屈曲」(A)。","detail":{"background":"Brudzinski徵象是腦膜炎的腦膜刺激徵:平躺被動前屈頸部時,腦膜受牽扯引發疼痛並使髖膝不自主屈曲。其與Kernig徵象(屈髖伸膝有阻力)同為腦膜炎典型理學發現。　補充：布魯辛斯基氏徵象(Brudzinski sign)：病人平躺，被動將頸部快速前屈，若引發雙側髖膝不自主屈曲即陽性，為細菌性腦膜炎的腦膜刺激徵象。","options":{"A":"正確。頸部前屈引發疼痛與膝部屈曲=Brudzinski徵象。","B":"這是Kernig徵象(托大腿再伸小腿有阻力)。","C":"這是巴賓斯基反射。","D":"這是娃娃眼(眼頭反射),非腦膜徵象。"},"sources":["新文京《兒科護理學》腦膜炎","Brudzinski"]}},"103100-N4-57":{"quick":"腰椎穿刺前後護理正確的是「穿刺後,監測是否有脊髓脫出症狀:呼吸快、心跳慢、血壓高等」(C)。","detail":{"background":"腰椎穿刺(LP)須採無菌技術(無菌手套);體位採側臥抱膝呈蝦米狀使椎間隙張開(非俯臥);穿刺後須去枕平躺約4~6小時減少低壓性頭痛,並觀察是否有顱內壓改變或脊髓脫出徵象(呼吸快、心跳慢、血壓高的Cushing反應)。","options":{"A":"應戴無菌手套並維持無菌(非清潔手套)。","B":"體位是側臥抱膝蝦米狀(非俯臥)。","C":"正確。穿刺後監測脊髓脫出徵象(呼吸快、心跳慢、血壓高)。","D":"穿刺後應平躺(非抬高床頭)4~6小時減頭痛。"},"sources":["新文京《兒科護理學》腰椎穿刺","側臥"]}},"103100-N4-62":{"quick":"日本腦炎傳染、預防及免疫錯誤的是「不需媒介直接經過飛沫傳染或接觸患者的尿液、血液及體液而傳染」(A)。","detail":{"background":"日本腦炎由帶病毒的三斑家蚊等病媒蚊叮咬傳染(蟲媒病毒),非飛沫或直接接觸體液人傳人。每年流行季前(約3~5月)接種疫苗預防;1歲以下嬰兒雖有母體抗體仍宜避免黃昏蚊蟲叮咬;患者體液不需特別隔離。　補充：日本腦炎經「三斑家蚊等病媒蚊叮咬」傳染(豬為增幅宿主)，非人傳人，預防靠疫苗接種與防蚊；「不需媒介、經飛沫或接觸尿血體液傳染」之敘述錯誤。","options":{"A":"錯誤(本題答案)。日本腦炎經病媒蚊叮咬(非飛沫/直接接觸體液)。","B":"正確。流行季前接種疫苗可達高預防效果。","C":"正確。1歲以下有母體抗體,黃昏宜避免外出防蚊。","D":"正確。患者體液不需特別隔離(非人傳人)。"},"sources":["新文京《兒科護理學》日本腦炎","病媒蚊"]}},"103100-N4-79":{"quick":"細菌性與無菌性腦膜炎脊髓液比較正確的是「細菌性腦膜炎者的蛋白質值較無菌性腦膜炎者高」(B)。","detail":{"background":"細菌性腦膜炎CSF:混濁、多形核白血球為主、葡萄糖低、蛋白質高;無菌性(病毒性)CSF:清澈、淋巴球為主、葡萄糖正常、蛋白質正常或輕度升高。故細菌性蛋白較高、糖較低、外觀較混濁。　補充：細菌性腦膜炎脊髓液呈「混濁、壓力升高、白血球(多形核)明顯增多、蛋白質升高、葡萄糖降低」；無菌(病毒)性則清澈、淋巴球為主、蛋白略升、葡萄糖正常。","options":{"A":"錯。細菌性葡萄糖較無菌性低(非高)。","B":"正確。細菌性蛋白質值較無菌性高。","C":"錯。細菌性外觀混濁(非清澈)。","D":"錯。淋巴球為主是無菌性(細菌性以多形核為主)。"},"sources":["新文京《兒科護理學》腦膜炎","CSF比較"]}},"105030-N4-80":{"quick":"5歲頭部創傷後合併無菌性腦膜炎,腦脊髓液檢查不會呈現的是「葡萄糖30mg/dL」(D)。","detail":{"background":"無菌性(病毒性)腦膜炎CSF:壓力可略升、淋巴球增加、蛋白質正常或輕度升高、葡萄糖正常。葡萄糖30mg/dL為明顯降低,是細菌性腦膜炎特徵(細菌消耗糖),不會出現在無菌性腦膜炎。　補充：無菌(病毒)性腦膜炎腦脊髓液呈清澈、淋巴球為主、蛋白略升、「葡萄糖正常」；「葡萄糖30 mg/dL(明顯降低)」屬細菌性腦膜炎表現、不會出現於無菌性。","options":{"A":"會。壓力60mmH2O(可正常或略升)。","B":"會。淋巴球100/mm3(病毒性以淋巴球為主)。","C":"會。蛋白質50mg/dL(正常或輕度升)。","D":"不會(本題答案)。葡萄糖30明顯降低是細菌性特徵,非無菌性。"},"sources":["新文京《兒科護理學》無菌性腦膜炎","糖正常"]}},"108020-N4-50":{"quick":"細菌性腦膜炎護理措施錯誤的是「增加環境刺激預防病童嗜睡」(C)。","detail":{"background":"細菌性腦膜炎護理:盡早靜脈注射抗生素(至少約10天)、維持體溫正常、以姿勢調整減輕頸背疼痛。應「減少」聲光等環境刺激(刺激會誘發顱內壓升高、抽搐),而非增加刺激;意識變化應監測通報。　補充：細菌性腦膜炎護理應「減少環境刺激(降低聲光、集中照護)」以避免顱內壓升高與抽搐；「增加環境刺激預防嗜睡」會加重顱內壓與不適、為錯誤。","options":{"A":"正確。靜脈注射抗生素至少約10天。","B":"正確。維持病童體溫於正常範圍。","C":"錯誤(本題答案)。應減少環境聲光刺激(非增加刺激)。","D":"正確。以姿勢調整減輕頸背疼痛。"},"sources":["新文京《兒科護理學》腦膜炎","減少刺激"]}},"108110-N4-79":{"quick":"8歲細菌性腦膜炎徵象正確的是「布魯金斯基氏徵象(Brudzinski sign)陽性」(B)。","detail":{"background":"細菌性腦膜炎會出現腦膜刺激徵象陽性:Brudzinski徵象陽性(頸前屈引發髖膝屈曲)、Kernig徵象陽性(屈髖伸膝有阻力)。Barlow徵象是髖脫位檢查、反彈痛是腹膜炎徵象,皆與腦膜炎無關。　補充：細菌性腦膜炎徵象包括發燒、頭痛、頸部僵硬、「布魯辛斯基徵象陽性」、柯林氏徵象陽性、意識改變、嬰兒前囟膨出；確診靠腰椎穿刺。","options":{"A":"Barlow徵象是髖脫位檢查(非腦膜炎)。","B":"正確。Brudzinski徵象陽性(腦膜刺激徵)。","C":"錯。腦膜炎Kernig徵象應為陽性(非陰性)。","D":"反彈痛是腹膜炎徵象(非腦膜炎)。"},"sources":["新文京《兒科護理學》腦膜炎","Brudzinski"]}},"108110-N4-80":{"quick":"腰椎穿刺錯誤的是「採俯臥平躺,以利穿刺針頭插入,避免傷害」(B)。","detail":{"background":"腰椎穿刺可作檢查、診斷或治療途徑;體位應採側臥抱膝呈蝦米狀使椎間隙張開(非俯臥平躺);穿刺後須觀察中樞神經感染、脊髓脫出等合併症,並平躺4~6小時避免低壓性頭痛。　補充：腰椎穿刺應採「側臥、背向術者、頸與膝屈曲抱膝(蝦米狀)」使椎間隙張開利進針；「俯臥平躺」無法暴露椎間隙、為錯誤；術後平躺數小時防頭痛。","options":{"A":"正確。可作檢查、診斷或治療途徑。","B":"錯誤(本題答案)。應側臥抱膝蝦米狀(非俯臥平躺)。","C":"正確。穿刺後觀察中樞神經感染、脊髓脫出。","D":"正確。穿刺後平躺4~6小時避免頭痛。"},"sources":["新文京《兒科護理學》腰椎穿刺","側臥"]}},"109110-N4-79":{"quick":"柯林氏徵象(Kernig sign)正確做法是「使平躺將小腿托高,使髖及膝關節屈曲成直角,再伸展小腿會產生阻力或疼痛」(D)。","detail":{"background":"Kernig徵象是腦膜炎腦膜刺激徵:病人平躺,先屈髖屈膝成直角,再嘗試伸直小腿(膝伸展),因腦膜/神經根受牽扯出現阻力或疼痛即陽性。Brudzinski徵象則是頸前屈引發髖膝屈曲。　補充：柯林氏徵象(Kernig sign)：病人平躺、將髖與膝屈曲成直角，再「伸展小腿」，若因疼痛/阻力無法伸直且引發背腿痛即陽性，提示腦膜刺激。","options":{"A":"這是巴賓斯基反射(足底劃痕)。","B":"這是Brudzinski徵象(頸前屈引發屈膝)。","C":"這是步態/平衡測試,非Kernig。","D":"正確。屈髖屈膝後伸展小腿有阻力疼痛=Kernig徵象。"},"sources":["新文京《兒科護理學》腦膜炎","Kernig"]}},"110030-N4-65":{"quick":"病毒性腦膜炎(virus meningitis)護理措施錯誤的是「大多數病童會出現神經系統障礙的後遺症」(B)。","detail":{"background":"病毒性(無菌性)腦膜炎多為自限性,以支持性/症狀治療為主,大多數病童預後良好、不留神經系統後遺症(與細菌性可遺留聽損、智能障礙不同);若合併細菌感染才給抗生素,並持續監測生命徵象。　補充：病毒性(無菌性)腦膜炎多為良性自限、預後良好、「大多不留神經後遺症」；「大多會出現神經系統障礙後遺症」之敘述錯誤(細菌性才較易留後遺症)。","options":{"A":"正確。採支持性療法或症狀治療。","B":"錯誤(本題答案)。病毒性腦膜炎多預後良好、少留後遺症。","C":"正確。持續監測生命徵象。","D":"正確。若合併細菌感染才給抗生素。"},"sources":["新文京《兒科護理學》病毒性腦膜炎","預後良好"]}},"112110-N4-58":{"quick":"6歲被三斑家蚊叮咬後發燒頭痛嘔吐痙攣頸僵(日本腦炎),腦脊髓液檢查正確的是「蛋白質上升」(A)。","detail":{"background":"三斑家蚊叮咬+腦膜腦炎症狀為日本腦炎(病毒性腦炎)。其CSF為病毒性變化:外觀清澈、淋巴球增加、蛋白質輕度上升、葡萄糖正常。血小板一般不因腦膜炎而下降;球蛋白反應(發炎)多為陽性;葡萄糖不下降(下降是細菌性)。","options":{"A":"正確。病毒性腦炎CSF蛋白質上升(輕度)。","B":"血小板不因腦膜炎而下降。","C":"球蛋白(發炎)反應多為陽性(非陰性)。","D":"葡萄糖正常(下降是細菌性,非病毒性)。"},"sources":["新文京《兒科護理學》日本腦炎","CSF"]}},"112180-N4-50":{"quick":"無菌性腦膜炎(aseptic meningitis)腦脊髓液正確的是「腦脊髓壓力正常或稍上升」(C)。","detail":{"background":"無菌性(病毒性)腦膜炎CSF:外觀清澈(非白濁)、淋巴球為主、蛋白質正常或輕度升高(非大幅下降)、葡萄糖正常(非大幅上升)、壓力正常或稍上升。白濁濃稠、糖低蛋白高是細菌性的特徵。　補充：無菌(病毒)性腦膜炎腦脊髓液：清澈、「壓力正常或稍上升」、淋巴球為主、蛋白略升、葡萄糖正常；與細菌性(混濁、壓力高、糖低、蛋白高)鑑別。","options":{"A":"錯。白濁濃稠是細菌性(無菌性清澈)。","B":"錯。蛋白質正常或輕度升(非大幅下降)。","C":"正確。腦脊髓壓力正常或稍上升。","D":"錯。葡萄糖正常(非大幅上升)。"},"sources":["新文京《兒科護理學》無菌性腦膜炎","清澈"]}},"113100-N4-37":{"quick":"日本腦炎症狀與處置錯誤的是「預防感染需要隔離病患的血液和分泌物」(C)。","detail":{"background":"日本腦炎以三斑家蚊為主要傳播媒介、黃昏時避免外出防叮咬、前驅期有頭痛倦怠。因經病媒蚊叮咬傳染(非人傳人),故不需隔離病患血液與分泌物,預防重點在防蚊與疫苗接種。　補充：日本腦炎經病媒蚊叮咬傳染(豬為增幅宿主)、非人傳人，預防靠疫苗與防蚊；「需隔離病患血液與分泌物」之敘述錯誤(非接觸傳染、不需血液體液隔離)。","options":{"A":"正確。傳播媒介以三斑家蚊為主。","B":"正確。黃昏避免外出防病媒蚊叮咬。","C":"錯誤(本題答案)。病媒蚊傳染、非人傳人,不需隔離血液分泌物。","D":"正確。前驅期出現頭痛、倦怠。"},"sources":["新文京《兒科護理學》日本腦炎","不需隔離"]}},"114030-N4-48":{"quick":"9歲病毒性腦膜炎(virus meningitis)錯誤的是「最主要的治療是儘早給與抗生素」(A)。","detail":{"background":"病毒性腦膜炎大多由腸病毒、腮腺炎病毒等引起,抗生素對病毒無效,主要採支持性/症狀治療;其CSF外觀清澈,大多預後良好、少留神經功能障礙後遺症。儘早給抗生素是細菌性腦膜炎的處置。　補充：病毒性(無菌性)腦膜炎多為良性自限，治療以「支持療法(退燒、止痛、補液、休息)」為主、抗病毒(如疱疹)；「最主要治療為儘早給抗生素」錯誤(抗生素用於細菌性)。","options":{"A":"錯誤(本題答案)。病毒性腦膜炎抗生素無效,以支持療法為主(非儘早抗生素)。","B":"正確。大部分由腸病毒及腮腺炎病毒引起。","C":"正確。腦脊髓液外觀通常清澈。","D":"正確。少有神經功能障礙後遺症。"},"sources":["新文京《兒科護理學》病毒性腦膜炎","支持療法"]}},"114170-N4-49":{"quick":"15個月疑似腦膜炎,最適當的敘述是「細菌性腦膜炎之脊髓液中蛋白質值明顯升高」(A)。","detail":{"background":"細菌性腦膜炎CSF:蛋白質明顯升高、葡萄糖降低、外觀混濁、多形核白血球為主、病程急、症狀重,腦膜刺激徵(Kernig、Brudzinski)陽性。病毒性則糖正常、蛋白正常或微升、清澈。　補充：細菌性腦膜炎脊髓液「蛋白質明顯升高、葡萄糖降低、白血球(多形核)增多、混濁、壓力升高」；無菌性則清澈、淋巴球為主、糖正常；以腰椎穿刺鑑別。","options":{"A":"正確。細菌性腦膜炎脊髓液蛋白質明顯升高。","B":"錯。病毒性葡萄糖正常(非明顯升高)。","C":"錯。細菌性症狀較重、病程急(非較輕)。","D":"Kernig徵象在腦膜炎為陽性,但本題以A為最適當(此題敘述未限定,A最確切)。"},"sources":["新文京《兒科護理學》腦膜炎","蛋白高"]}},"101030-N4-78":{"quick":"癲癇兒童生酮飲食中比例需高達70~80%的成分是「脂肪」(A)。","detail":{"background":"生酮飲食用於難治型癲癇,以高脂肪(約70~80%)、低碳水化合物、適量蛋白質為原則,使身體以脂肪代謝產生酮體作為腦部能量,藉此抑制癲癇發作。　補充：生酮飲食用於難治型癲癇，採「高脂肪(70~80%)、低碳水、適量蛋白」，使身體以脂肪代謝產生酮體做為腦部能量、抑制癲癇放電；需監測生長、血脂與酮體。","options":{"A":"正確。脂肪佔70~80%(生酮飲食核心)。","B":"蛋白質為適量(非70~80%)。","C":"醣類(碳水)須嚴格限制(非高比例)。","D":"纖維質非生酮飲食的高比例成分。"},"sources":["新文京《兒科護理學》癲癇","生酮飲食"]}},"101110-N4-22":{"quick":"失神性發作(absence seizure)正確的是「發作時,會有數秒鐘動作停止」(A)。","detail":{"background":"失神性發作(小發作)好發學齡兒童,特徵是突然短暫(數秒)意識喪失、動作中止、兩眼直視發呆,發作後立即恢復、無嗜睡、不會跌倒或尿失禁,常被誤以為發呆/作白日夢。　補充：失神性發作(absence)多見學齡兒童，表現突發數秒「動作停止、發呆、眼神空洞、無預兆與無發作後混亂」，每日可多次、易被誤為發呆；腦波呈3Hz棘慢波。","options":{"A":"正確。發作時數秒鐘動作停止、兩眼發呆。","B":"臉半邊抽搐發怪聲是局部運動性發作。","C":"失神發作一般不會尿失禁。","D":"發作後嗜睡見於強直陣攣發作(非失神)。"},"sources":["新文京《兒科護理學》癲癇","失神發作"]}},"102030-N4-49":{"quick":"小二教室內全身性癲癇發作,最適當的處置是「移除小玲身旁的桌椅與尖銳物,以避免撞傷」(C)。","detail":{"background":"全身性發作處置首重安全與呼吸道:移除周圍堅硬尖銳物避免撞傷、協助側臥使口腔分泌物流出、勿強行約束或塞物入口、記錄發作型態與時間。不可墊高頭部、不可抱緊束縛。　補充：兒童癲癇全身發作時最重要的是「保護安全」——移除周圍尖銳物、勿強壓肢體或塞物入口、頭側放防吸入、計時觀察；發作後側臥休息，不強行約束。","options":{"A":"不可墊高頭部(應側臥讓分泌物流出)。","B":"頭部擺正不如側臥引流分泌物,非首要。","C":"正確。移除周圍桌椅尖銳物避免撞傷。","D":"不可抱緊或包裹束縛(可能造成傷害)。"},"sources":["新文京《兒科護理學》癲癇","發作處置"]}},"102030-N4-77":{"quick":"靜脈注射Dilantin(癲能停)控制癲癇錯誤的是「Dilantin需以5%葡萄糖的靜脈輸液稀釋」(A)。","detail":{"background":"Phenytoin(Dilantin)靜脈注射只能用生理食鹽水稀釋與沖洗,不可用5%葡萄糖(會結晶沉澱)。須定期監測血中濃度(10~20μg/mL)、常見副作用為牙齦增生、不可驟停以免癲癇重積。　補充：靜脈注射Dilantin(phenytoin)須以「生理食鹽水」稀釋並緩慢注射(與葡萄糖液易產生沉澱、快速注射致心律不整低血壓)；「以5%葡萄糖稀釋」之敘述錯誤。","options":{"A":"錯誤(本題答案)。Dilantin須用生理食鹽水稀釋(葡萄糖會結晶)。","B":"正確。應定期檢查血中Dilantin濃度。","C":"正確。常見副作用為牙齦增生。","D":"正確。不可驟然停藥以防癲癇重積發作。"},"sources":["新文京《兒科護理學》癲癇","Dilantin"]}},"104030-N4-80":{"quick":"五年級失神性癲癇日常照護錯誤的是「教導其記錄發作次數,以自行調整藥量」(D)。","detail":{"background":"抗癲癇藥須依醫囑規律服用,絕不可由病童或家屬自行調整藥量或停藥,以免引發癲癇重積。失神性發作可正常參與活動(注意水上安全)、提醒老師勿責怪發呆、發作時給予安全保護。　補充：失神性癲癇照護：規律服藥、記錄發作、注意安全；「教導記錄發作次數以自行調整藥量」錯誤——抗癲癇藥劑量須由醫師依血中濃度調整，不可自行增減。","options":{"A":"可參與一般體育活動(注意安全即可)。","B":"正確。提醒老師勿責怪其失神/作白日夢。","C":"正確。發作時給予適當處理與安全保護。","D":"錯誤(本題答案)。藥量須依醫囑,不可自行調整。"},"sources":["新文京《兒科護理學》癲癇","遵醫囑"]}},"105030-N4-78":{"quick":"學齡兒童癲癇護理指導中較不適當的運動是「騎腳踏車」(A)。","detail":{"background":"癲癇兒童可運動但須避免發作時可能造成嚴重傷害的活動。騎腳踏車若途中發作易摔倒或交通意外、傷害大,較不適當;游泳須有人陪同並穿救生衣;羽毛球、操場跑步相對安全。　補充：癲癇兒童可參與多數運動但需注意安全，避免單獨游泳、高處攀爬等發作時易致命的活動；「騎腳踏車」於路上發作易跌倒受傷、相對較不適當，宜評估環境與陪同。","options":{"A":"較不適當(本題答案)。騎腳踏車發作易摔倒/交通意外。","B":"著救生衣並有人陪同游泳相對安全。","C":"打羽毛球相對安全。","D":"操場跑步相對安全。"},"sources":["新文京《兒科護理學》癲癇","運動安全"]}},"105090-N4-78":{"quick":"三年級強直陣攣型癲癇在校發作的照護錯誤的是「立即進行口對口人工呼吸,以避免缺氧」(D)。","detail":{"background":"強直陣攣發作處置:協助側臥使口鼻分泌物流出、移除周圍堅硬尖銳物、維持通風、勿強塞物入口、記錄發作。發作中不應立即施行口對口人工呼吸(發作多會自行緩解、強行吹氣無益且可能受傷)。　補充：強直陣攣型癲癇在校發作照護：保護安全、頭側放防吸入、勿塞物入口、計時、發作後側臥；「立即口對口人工呼吸」在發作中無必要且危險、為錯誤。","options":{"A":"正確。側臥姿勢利口鼻分泌物流出。","B":"正確。疏散人潮維持通風。","C":"正確。移除堅硬尖銳物提供安全環境。","D":"錯誤(本題答案)。不應發作中立即口對口人工呼吸(發作多自行緩解)。"},"sources":["新文京《兒科護理學》癲癇","側臥"]}},"106030-N4-80":{"quick":"1歲單純性熱性痙攣,對「未來是否會再發作」較適當的回答是「小玲的痙攣與發燒有關,只要避免其發燒,就較不會發作」(A)。","detail":{"background":"單純性熱性痙攣由發燒誘發(好發6個月~5歲),預後良好、多不演變為癲癇、不留後遺症;關鍵在發燒時及早控制體溫以減少再發。　補充：單純性熱性痙攣多見6個月~5歲、與發燒相關、多為良性自限，「控制發燒可降低再發」；單純型預後良好、多不影響智能、不需長期抗痙攣藥。","options":{"A":"正確。熱性痙攣與發燒有關,避免/及早控制發燒可減少發作。","B":"年齡雖有關(多5歲後緩解),但機轉核心是發燒誘發。","C":"腦波正常不保證以後不發作。","D":"熱性痙攣機轉是發燒誘發,非缺氧。"},"sources":["新文京《兒科護理學》熱性痙攣","發燒"]}},"107110-N4-50":{"quick":"10個月中耳炎合併熱性痙攣住院,護理措施正確的是「小珊發作後有嗜睡情形,故應協助其適當休息」(B)。","detail":{"background":"熱性痙攣由發燒誘發,發作後可有短暫嗜睡,應協助休息觀察。退燒目標非死守38度;單純性熱性痙攣多不需終身抗痙攣藥;發作中無論是否全身性都應提供床欄護墊等安全防護。　補充：熱性痙攣住院護理：發作時保護安全、側臥防吸入、降溫；「發作後嗜睡屬發作後狀態，應協助適當休息」正確；衛教控制發燒、單純型多良性不需長期用藥。","options":{"A":"退燒非死守38度,以緩解不適、降低再發為目標。","B":"正確。發作後嗜睡應協助適當休息。","C":"單純性熱性痙攣多不需終身服抗痙攣藥。","D":"仍應提供床欄護墊等安全防護。"},"sources":["新文京《兒科護理學》熱性痙攣","休息"]}},"108020-N4-51":{"quick":"10歲癲癇以口服phenobarbital(luminal)治療,護理指導正確的是「定時帶大華回診抽血,監測血中藥物濃度」(A)。","detail":{"background":"抗癲癇藥(phenobarbital)須定時回診監測血中藥物濃度以維持治療範圍;不可因發作減少就自行停藥;phenobarbital不會使尿液變紅棕色;發作後不需特別高碳水飲食。　補充：口服phenobarbital等抗癲癇藥須「定時回診抽血監測藥物濃度與血球肝功能」、規律服藥不可自行增減或停藥、注意鎮靜與牙齦增生等副作用。","options":{"A":"正確。定時回診抽血監測血中藥物濃度。","B":"phenobarbital不會使尿液變紅棕色。","C":"錯。不可服藥6週無發作就自行停藥(須依醫囑)。","D":"發作後不需特別高碳水飲食。"},"sources":["新文京《兒科護理學》癲癇","血中濃度"]}},"109110-N4-77":{"quick":"癲癇病童長期服用抗癲癇藥的護理措施錯誤的是「需與牛奶一起服用,避免吸收不良」(A)。","detail":{"background":"抗癲癇藥(如phenytoin)不建議與牛奶/制酸劑同服(可能影響吸收);須定時回診監測血中藥物濃度、即使發作減少也不可自行停藥、phenytoin常見牙齦增生須口腔護理。　補充：長期抗癲癇藥護理：規律服藥不可自行停藥(易誘發癲癇重積)、定時監測藥物濃度與副作用、注意口腔衛生(齒齦增生)；「需與牛奶一起服用避免吸收不良」之敘述錯誤(部分藥物與牛奶/制酸劑併用反降吸收)。","options":{"A":"錯誤(本題答案)。不建議與牛奶併服(可能影響吸收)。","B":"正確。定時回診監測血中藥物濃度。","C":"正確。即使發作頻率降低也不可自行停藥。","D":"正確。phenytoin常見牙齦增生。"},"sources":["新文京《兒科護理學》癲癇","服藥"]}},"110110-N4-79":{"quick":"強直陣攣型痙攣(tonic-clonic seizure)發作時最不適當的是「壓額抬下巴,通暢呼吸道」(A)。","detail":{"background":"強直陣攣發作時不應強行壓額抬下巴或撬開嘴、塞入物品(恐傷牙齒下顎);正確是移開周圍危險物、協助側臥使分泌物流出、勿強放壓舌板、觀察並記錄發作型態與時間。　補充：強直陣攣型痙攣發作時應保護安全、頭側放、勿強壓或塞物入口、鬆解衣物、計時；「壓額抬下巴打開呼吸道」在抽搐中不適當(發作時勿強行操作口腔)，發作後再評估呼吸道。","options":{"A":"最不適當(本題答案)。發作中應側臥、勿強撬口通暢呼吸道。","B":"正確。移開可能造成損傷的物品。","C":"正確。勿強行放置壓舌板於口內。","D":"正確。觀察並記錄發作型態與時間。"},"sources":["新文京《兒科護理學》癲癇","側臥"]}},"110110-N4-80":{"quick":"8個月熱性痙攣(febrile convulsion)最適當的是「發作時呈現全身性或局部性痙攣型態」(B)。","detail":{"background":"熱性痙攣由發燒誘發,發作可呈全身性或局部性;單純性熱性痙攣發作時間短(<15分鐘)、預後良好,大多不演變為癲癇、不留偏癱或智能障礙後遺症。　補充：熱性痙攣多見6個月~5歲、與快速體溫上升相關，「發作呈全身性或局部性痙攣型態」、多短暫自限；發作時側臥保護、降溫、單純型預後良好。","options":{"A":"錯。熱性痙攣大多不會演變為癲癇。","B":"正確。發作可呈全身性或局部性痙攣型態。","C":"錯。單純性熱性痙攣通常數分鐘內(非1小時以上)。","D":"錯。多不留偏癱或智能障礙後遺症。"},"sources":["新文京《兒科護理學》熱性痙攣","型態"]}},"111110-N4-70":{"quick":"11個月單純性熱性痙攣護理措施錯誤的是「教導家屬終生服用抗痙攣藥物的重要性」(B)。","detail":{"background":"單純性熱性痙攣預後良好,多不需終身服抗痙攣藥,重點在發燒處理與安全防護。發作時協助側臥維持呼吸道、提供床欄護墊、通常退燒一段時間後再做腦電波檢查。　補充：單純性熱性痙攣多良性自限、與發燒相關，護理重點為控制發燒、發作時保護安全、衛教；「教導終生服用抗痙攣藥」錯誤——單純型不需長期抗痙攣藥治療。","options":{"A":"正確。發作時協助側臥維持呼吸道通暢。","B":"錯誤(本題答案)。單純性熱性痙攣多不需終身服抗痙攣藥。","C":"正確。提供床欄護墊使用。","D":"正確。通常停止發燒後一段時間再做腦電波檢查。"},"sources":["新文京《兒科護理學》熱性痙攣","非終身藥"]}},"111110-N4-78":{"quick":"7歲癲癇長期服Phenytoin及Valproic acid,藥物護理指導錯誤的是「當疾病發作被控制時,可暫停服用藥物以降低副作用」(B)。","detail":{"background":"抗癲癇藥即使發作被控制也不可自行暫停或停藥(驟停會引發癲癇重積);須定時回診監測血中藥物濃度、phenytoin常見牙齦增生須口腔護理、鼓勵規律作息預防發作。　補充：長期服Phenytoin與Valproic acid須定時監測血中濃度、肝功能與血球、注意齒齦增生(phenytoin)與肝毒性(valproate)；「發作被控制即可自行停藥」錯誤，須遵醫囑漸減。","options":{"A":"正確。定時返院監測血中藥物濃度。","B":"錯誤(本題答案)。不可自行暫停藥物(驟停致重積)。","C":"正確。Dilantin易牙齦增生須口腔護理。","D":"正確。鼓勵維持正常生活習慣預防發作。"},"sources":["新文京《兒科護理學》癲癇","不可停藥"]}},"113030-N4-37":{"quick":"腮腺炎(mumps)最常見的合併症是「無菌性腦膜炎」(A)。","detail":{"background":"流行性腮腺炎最常見的合併症是無菌性(病毒性)腦膜腦炎;其他可能合併睪丸炎、卵巢炎、胰臟炎、聽力受損等。肺炎、熱性痙攣、續發性皮膚感染並非腮腺炎最常見合併症。　補充：腮腺炎(mumps，流行性耳下腺炎)最常見的合併症為「無菌性腦膜炎」；其他含睪丸炎(青春期後)、卵巢炎、胰臟炎、聽力受損；MMR疫苗可預防。","options":{"A":"正確。無菌性腦膜炎是腮腺炎最常見合併症。","B":"肺炎非腮腺炎最常見合併症。","C":"熱性痙攣非腮腺炎合併症。","D":"續發性皮膚感染非腮腺炎合併症。"},"sources":["新文京《兒科護理學》腮腺炎","無菌性腦膜炎"]}},"113030-N4-50":{"quick":"熱性痙攣(febrile convulsion)最不適當的敘述是「發燒介於37~38°C之間,且出現單側性的全身性僵直」(A)。","detail":{"background":"熱性痙攣多在體溫快速上升、發高燒(常>38.5~39°C)時誘發,且典型為「全身對稱性」強直陣攣(非單側),故「37~38度且單側性全身僵直」的描述最不適當。其為幼兒抽搐最常見原因之一,基礎多為感染(上呼吸道感染),牙關緊閉時不可強行撬開。","options":{"A":"最不適當(本題答案)。多在高燒(>38.5度)、全身對稱性發作(非37~38度單側)。","B":"正確。為幼兒抽筋/痙攣最常見原因之一。","C":"正確。發燒是誘因,基礎多為感染(如上呼吸道感染)。","D":"正確。牙關緊閉時不可強行打開嘴巴。"},"sources":["新文京《兒科護理學》熱性痙攣","高燒對稱"]}},"113100-N4-50":{"quick":"癲癇兒童生酮飲食療法正確的是「酮(ketones)可製造較多的穩定性神經傳導物質,具有鎮定效果」(C)。","detail":{"background":"生酮飲食用於難治型(藥物效果不佳)癲癇,以高脂肪、低碳水化合物、適量(非高)蛋白質為原則;產生的酮體有助穩定神經傳導、具抑制發作的鎮定效果;須限制(非增加)液體與碳水以維持酮體生成。　補充：生酮飲食以高脂、低醣、適量蛋白使體內產生酮體，「酮體可作為腦部能量並影響神經傳導、具抑制癲癇放電的鎮定效果」，用於難治型癲癇。","options":{"A":"錯。是高脂肪、適量蛋白(非高蛋白)、低醣。","B":"錯。生酮飲食須限制液體與碳水(非增加液體)。","C":"正確。酮體有助穩定神經傳導、具鎮定效果。","D":"錯。多用於藥物治療效果不佳的難治型(非效果良好者)。"},"sources":["新文京《兒科護理學》癲癇","生酮"]}},"113180-N4-49":{"quick":"10歲頑固型癲癇以生酮飲食治療,正確的是「高脂肪、低醣類」(B)。","detail":{"background":"生酮飲食以高脂肪、低碳水化合物(低醣)、適量蛋白質為原則,使身體代謝脂肪產生酮體作為腦部能量、抑制癲癇發作,用於頑固(難治)型癲癇。　補充：生酮飲食治療頑固型癲癇採「高脂肪、低醣類、適量蛋白」，使脂肪代謝產生酮體做為腦部能量、抑制癲癇；需嚴格控制比例並監測生長血脂與酮體。","options":{"A":"錯。是低醣但脂肪高、蛋白適量(非高蛋白)。","B":"正確。高脂肪、低醣類。","C":"錯。非高醣高蛋白(醣須低)。","D":"錯。是高脂肪(非低脂肪高纖)。"},"sources":["新文京《兒科護理學》癲癇","生酮"]}},"114100-N4-40":{"quick":"6個月熱性痙攣全身抽搐,再發作時最適當的護理指導是「協助採側臥姿勢,以利口腔分泌物流出」(A)。","detail":{"background":"熱性痙攣/抽搐發作時處置:協助側臥使口腔分泌物流出防吸入、移開周圍危險物、勿強塞物入口、勿約束肢體、記錄發作。發作中不立即口對口人工呼吸、發作後不立即餵藥(意識未清易嗆)。　補充：熱性痙攣再發作時護理指導：「協助側臥」使口腔分泌物流出防吸入、勿塞物入口或強壓肢體、鬆解衣物、降溫、計時觀察；發作後側臥休息。","options":{"A":"正確。協助側臥使口腔分泌物流出(防吸入)。","B":"錯。發作中不立即口對口人工呼吸。","C":"錯。發作後意識未清不立即餵藥(易嗆)。","D":"錯。不約束肢體(應移開危險物,非綁住)。"},"sources":["新文京《兒科護理學》熱性痙攣","側臥"]}},"115030-N4-48":{"quick":"8歲癲癇照護錯誤的是「生酮飲食治療主要以低脂肪為主,對穩定神經傳導物質有幫助」(C)。","detail":{"background":"生酮飲食是「高脂肪」、低碳水、適量蛋白(非低脂肪),藉酮體穩定神經傳導抑制發作。其餘正確:突然停抗癲癇藥易致癲癇重積、Dilantin牙齦增生須口腔衛生、Depakine(帝拔癲)須定期監測血中濃度。","options":{"A":"正確。突然停藥易致癲癇重積(status epilepticus)。","B":"正確。服Dilantin須注意口腔衛生(牙齦增生)。","C":"錯誤(本題答案)。生酮飲食是高脂肪(非低脂肪)。","D":"正確。服Depakine須定期監測血中藥物濃度。"},"sources":["新文京《兒科護理學》癲癇","生酮"]}},"102030-N4-79":{"quick":"10歲急性水腦症接受腦室外引流(EVD)術後護理不恰當的是「引流時,協助小丁採頭部下垂姿勢,以利引流」(C)。","detail":{"background":"腦室外引流(EVD)引流腦脊髓液須嚴格控制引流高度與速度:壓力零點通常對齊外耳道(腦室高度),不可讓頭部下垂或過低,以免腦脊髓液引流過快造成顱內壓驟降、腦組織移位或出血。術後應監測顱內壓徵象、意識與瞳孔,並避免快速坐起。","options":{"A":"恰當。監測生命徵象及顱內壓升高徵象。","B":"恰當。觀察意識改變、瞳孔放大。","C":"不恰當(本題答案)。不可頭部下垂(引流過快致顱內壓驟降);應依零點控制高度。","D":"恰當。避免快速坐起以免腦脊髓液迅速減少。"},"sources":["新文京《兒科護理學》腦室外引流","零點"]}},"102110-N4-76":{"quick":"學齡兒童顱內壓增高早期徵候是「噴射狀嘔吐」(C)。","detail":{"background":"顱內壓升高(IICP)的早期徵象包括頭痛、噴射狀嘔吐(不伴噁心)、意識輕度改變、躁動。去大腦皮質姿勢、瞳孔放大固定、落日眼(嬰兒)屬「晚期」或嚴重徵象。故學齡兒童早期徵候以噴射狀嘔吐最符合。　補充：學齡兒童顱內壓增高早期徵候包括頭痛、「噴射狀嘔吐(不伴噁心)」、視乳突水腫、行為改變、意識下降；嬰兒則前囟膨出、頭圍增大、落日眼。","options":{"A":"去大腦皮質姿勢是晚期嚴重徵象。","B":"瞳孔放大固定是晚期徵象。","C":"正確。噴射狀嘔吐是IICP早期徵候。","D":"落日眼是嬰兒/晚期徵象。"},"sources":["新文京《兒科護理學》顱內壓","早期"]}},"103030-N4-52":{"quick":"預防早產兒顱內壓升高造成顱內出血不適當的是「靜脈輸入低張溶液,補充體液時,需快速輸注」(D)。","detail":{"background":"早產兒腦室易出血,護理須避免顱內壓與腦血流劇烈波動:輸液應「緩慢、定速」(快速輸注會使腦血流與顱內壓急遽變化、誘發出血),且避免大量低張液。其餘正確:止痛安撫減少哭鬧、避免頭身不同步轉動、依需求調整給氧維持適當血氧。","options":{"A":"適當。止痛安撫減少哭泣不安。","B":"適當。避免頭轉向一側而身體未同步(防腦血流波動)。","C":"適當。調整給氧維持適當血氧。","D":"不適當(本題答案)。輸液應緩慢定速(快速輸注致腦血流波動誘發出血)。"},"sources":["新文京《兒科護理學》早產兒IVH","緩慢輸注"]}},"103030-N4-76":{"quick":"6個月水腦症置入V-P shunt出院指導不適當的是「教導父母協助小蘭採右側臥,以利引流」(D)。","detail":{"background":"V-P分流(腦室腹膜分流)術後早期應避免長時間壓迫植入側(多為右側),故不宜「採右側臥」壓迫分流管(可能影響引流或壓迫傷口);引流靠重力與壓力閥自動運作,不需特定側臥助引流。其餘正確:觀察傷口紅腫、前囟門膨出、每日由同一人測頭圍。","options":{"A":"適當。觀察傷口周圍紅腫(感染)。","B":"適當。觀察前囟門是否膨出(分流阻塞)。","C":"適當。每日由同一人測量頭圍。","D":"不適當(本題答案)。不宜壓迫植入側(右側)臥;引流靠壓力閥非特定側臥。"},"sources":["新文京《兒科護理學》VP shunt","避免壓迫"]}},"104100-N4-68":{"quick":"5歲腦膜炎引起顱內壓升高,不會出現的臨床徵象是「落日眼」(D)。","detail":{"background":"顱內壓升高在學齡兒童可出現頭痛、噴射式嘔吐、心跳過慢(Cushing反應)、意識改變。落日眼(雙眼下視、露出上方鞏膜)是「嬰兒」因囟門未閉、水腦致眼球下移的特徵,5歲兒童囟門已閉合,不會出現落日眼。　補充：腦膜炎致顱內壓升高，學齡兒童出現頭痛、噴射狀嘔吐、意識下降、視乳突水腫、Cushing三徵；「落日眼」屬嬰兒(囟門未閉)顱內壓增高表現、學齡兒童較不會出現。","options":{"A":"會。心跳過慢(Cushing反應)。","B":"會。頭痛。","C":"會。噴射式嘔吐。","D":"不會(本題答案)。落日眼是嬰兒水腦特徵,5歲囟門已閉不會出現。"},"sources":["新文京《兒科護理學》顱內壓","落日眼"]}},"106110-N4-77":{"quick":"水腦病嬰接受V-P shunt後護理正確的是「觀察是否有噴射狀嘔吐或尖銳哭聲的發生」(B)。","detail":{"background":"V-P分流術後須警覺分流阻塞/感染導致顱內壓再升高的徵象:噴射狀嘔吐、尖銳哭聲(腦壓性哭聲)、前囟門膨出、嗜睡。頭圍測量應繞額頭最突處與枕骨粗隆;應避免長時間壓迫植入側;餵奶可正常進行(非避免抱起)。","options":{"A":"頭圍量法應繞前額最突處與枕骨粗隆(非經耳垂)。","B":"正確。觀察噴射狀嘔吐或尖銳哭聲(顱內壓升高徵象)。","C":"不應壓迫植入側(水平俯臥壓傷口);依壓力閥引流。","D":"可正常抱起餵奶(引流靠壓力閥控制,非禁抱)。"},"sources":["新文京《兒科護理學》VP shunt","阻塞徵象"]}},"108020-N4-80":{"quick":"4個月水腦接受V-P shunt術後護理錯誤的是「觀察引流管阻塞徵象是周圍皮膚出現紅、腫、熱」(D)。","detail":{"background":"V-P分流「阻塞」的徵象是顱內壓再升高(前囟膨出、頭圍增大、噴射嘔吐、嗜睡、尖銳哭聲);周圍皮膚紅腫熱是「感染」徵象而非阻塞徵象,兩者意義不同,故D敘述錯誤。其餘正確:記錄頭圍、觸前囟、觀察意識與顱內壓、保持傷口乾淨勿擠壓。","options":{"A":"正確。記錄頭圍、觸診前囟門是否膨出。","B":"正確。觀察意識與顱內壓增高徵象。","C":"正確。植入處勿碰撞擠壓、保持乾燥。","D":"錯誤(本題答案)。皮膚紅腫熱是感染徵象(非阻塞;阻塞是顱內壓升高徵象)。"},"sources":["新文京《兒科護理學》VP shunt","阻塞vs感染"]}},"108110-N4-62":{"quick":"早產兒(30週、1020g)併腦室內出血(IVH)護理錯誤的是「限制家屬探訪,避免造成感染」(D)。","detail":{"background":"IVH早產兒護理:抬高床頭15~20度減顱內壓、監測出血徵象(血壓降、血比容下降)、觀察囟門膨出與頭圍增加。家庭參與(親子依附)對早產兒有益,在適當感染管制下應「鼓勵」家屬適度探訪與接觸,而非一律限制,故D錯誤。","options":{"A":"正確。抬高床頭15~20度減少顱內壓。","B":"正確。監測出血徵象(血壓降、血比容下降)。","C":"正確。觀察囟門膨出、頭圍增加等顱內壓升高徵象。","D":"錯誤(本題答案)。應在感染管制下鼓勵家屬適度探訪(非一律限制)。"},"sources":["新文京《兒科護理學》IVH","親子依附"]}},"109030-N4-52":{"quick":"2歲水腦V-P shunt術後第5天,哭鬧不喝奶、體溫38.2度,需優先執行的護理評估是「感染評估」(C)。","detail":{"background":"V-P分流術後出現發燒(38.2度)合併哭鬧不適,最須優先評估「感染」(分流管感染或腦室炎是分流術重要併發症)。發燒是感染的重要警訊,應優先評估感染來源(傷口、CSF、全身),再續評意識、疼痛、營養。","options":{"A":"疼痛評估非此情境優先(有發燒)。","B":"意識評估重要但發燒當下優先查感染源。","C":"正確。發燒須優先評估感染(分流管感染/腦室炎)。","D":"營養評估非優先。"},"sources":["新文京《兒科護理學》VP shunt","感染"]}},"109030-N4-54":{"quick":"協助病童接受腰椎穿刺不恰當的是「穿刺時協助病童採半側臥、頭高腳低的舒適臥位」(B)。","detail":{"background":"腰椎穿刺時體位應採「側臥、抱膝屈頸呈蝦米狀」使脊椎間隙充分張開以利進針,而非半側臥頭高腳低。其餘正確:穿刺前評估有無顱內壓升高(顱內壓高時LP可能誘發腦疝)、穿刺前後監測脊髓脫出徵象、穿刺後平躺減頭痛與出血。","options":{"A":"恰當。穿刺前評估有無顱內壓升高徵象。","B":"不恰當(本題答案)。應側臥抱膝屈頸蝦米狀(非半側臥頭高腳低)。","C":"恰當。穿刺前後監測脊髓脫出症狀。","D":"恰當。穿刺後平躺減少頭痛與穿刺部位出血。"},"sources":["新文京《兒科護理學》腰椎穿刺","蝦米狀"]}},"110110-N4-78":{"quick":"3歲V-P shunt感染移除後接受腦室外引流(EVD)術後護理正確的是「此裝置可配合測量顱內壓」(B)。","detail":{"background":"腦室外引流(EVD)除引流腦脊髓液外,可連接測壓裝置監測顱內壓。引流的壓力零點對齊外耳道(腦室高度),可依醫囑調整高度、必要時間歇關閉;引流入「密閉式」無菌收集系統(非半開放);不可隨意抬高或降低致引流過快/過慢。","options":{"A":"錯。零點對齊外耳道(非完全平躺嚴禁抬高;依醫囑調整)。","B":"正確。EVD裝置可配合測量顱內壓。","C":"錯。可依醫囑間歇關閉(非只能持續引流)。","D":"錯。應引流至密閉式無菌收集系統(非半開放)。"},"sources":["新文京《兒科護理學》EVD","測壓"]}},"112030-N4-79":{"quick":"早產兒腦室內出血護理處置最適當的是「採取集中照護,減少不必要的打擾」(B)。","detail":{"background":"早產兒IVH護理重點是減少腦血流與顱內壓波動:採「集中照護」(把護理操作集中、減少頻繁打擾)、抬高床頭約15~30度(非45度過高)、提供安靜低刺激環境(非聲光刺激)、避免高張液與快速輸注。　補充：早產兒腦室內出血護理應「採集中照護、減少不必要刺激與搬動、維持頭部中立與穩定血壓」以降低顱內壓波動、避免出血加重；避免劇烈體位改變與過度抽吸。","options":{"A":"抬高15~30度即可(45度過高且非首要)。","B":"正確。集中照護減少不必要的打擾(減少波動)。","C":"錯。應減少聲光刺激(非提供刺激)。","D":"錯。避免高張藥物快速給予(防腦血流劇烈變化)。"},"sources":["新文京《兒科護理學》IVH","集中照護"]}},"112110-N4-80":{"quick":"3歲腦膜炎導致顱內壓升高,不會出現的臨床徵象是「前囟門鼓脹或膨出」(A)。","detail":{"background":"前囟門鼓脹/膨出是「嬰兒」顱內壓升高的徵象(囟門未閉時)。前囟門約在12~18個月閉合,3歲幼兒前囟門已閉合,故不會出現囟門膨出;此年齡顱內壓升高表現為躁動不安、發燒、嘔吐、頭痛等。　補充：腦膜炎致顱內壓升高，幼兒(3歲，囟門已閉)出現頭痛、嘔吐、意識下降、頸僵；「前囟門鼓脹膨出」屬囟門未閉的小嬰兒表現、3歲不會出現。","options":{"A":"不會(本題答案)。3歲前囟門已閉合,不會囟門膨出(那是嬰兒徵象)。","B":"會。躁動不安。","C":"會。發燒(腦膜炎)。","D":"會。嘔吐。"},"sources":["新文京《兒科護理學》顱內壓","囟門"]}},"112180-N4-49":{"quick":"兒童顱內壓增高臨床表徵及處置錯誤的是「給與全速靜脈輸注Mannitol」(D)。","detail":{"background":"Mannitol(滲透性利尿劑)用於降顱內壓,但須在約15~30分鐘內快速「滴注」而非「全速直接靜脈推注」,並監測電解質、尿量與滲透壓。其餘正確:晨起頭痛+噴射狀嘔吐、Cushing三徵(呼吸不規則、心搏過緩、血壓升高)、顱內壓>15mmHg稱顱內壓增高。","options":{"A":"正確。晨起頭痛及噴射狀嘔吐。","B":"正確。Cushing三徵(呼吸不規則、心搏過緩、血壓升高)。","C":"正確。顱內壓>15mmHg稱顱內壓增高。","D":"錯誤(本題答案)。Mannitol應約15~30分鐘內滴注(非全速直接推注)。"},"sources":["新文京《兒科護理學》顱內壓","Mannitol"]}},"113030-N4-48":{"quick":"兒童顱內壓升高(IICP)護理措施正確的是「協助抬高床頭約30度,維持頭頸部自然平直」(C)。","detail":{"background":"IICP護理:抬高床頭約15~30度並保持頭頸正中、自然平直(促進靜脈回流、降顱內壓);避免頭頸彎曲扭轉。過度換氣若需要是讓PaCO2(非PaO2)降至約30~35mmHg使腦血管收縮;應維持環境安靜、光線柔和(非明亮)。","options":{"A":"錯。過度換氣是降PaCO2(非PaO2)約30~35mmHg。","B":"錯。應維持光線柔和安靜(非明亮)。","C":"正確。抬高床頭約30度、頭頸自然平直(促靜脈回流降顱內壓)。","D":"(其餘選項與IICP原則不符)。"},"sources":["新文京《兒科護理學》顱內壓","床頭30度"]}},"101110-N4-37":{"quick":"6歲頭部外傷,聲音睜眼、說話含糊不清、痛刺激能屈曲手臂,GCS為「9分」(B)。","detail":{"background":"GCS三項加總:睜眼(E)、語言(V)、運動(M)。本例對「聲音」睜眼=E3,說話「含糊不清/不適當字句」=V3,痛刺激「屈曲」手臂(異常屈曲)=M3,合計3+3+3=9分。GCS≤8為昏迷。　補充：兒童GCS結合睜眼、語言與運動三項評分(滿分15)：聲音可睜眼E3、語言含糊、痛刺激能屈曲手臂等合計約9分，反映中度意識障礙(GCS 9~12)。","options":{"A":"8分計算有誤。","B":"正確。E3(聲音睜眼)+V3(含糊不清)+M3(痛刺激屈曲)=9分。","C":"10分計算有誤。","D":"11分計算有誤。"},"sources":["新文京《兒科護理學》GCS","E+V+M"]}},"103030-N4-80":{"quick":"18個月,痛刺激睜眼且有退縮反應、呼叫無反應,GCS為「7分」(C)。","detail":{"background":"GCS=E+V+M。本例對「疼痛」睜眼=E2,呼叫「無反應」(嬰兒語言)=V1,痛刺激有「退縮反應」=M4,合計2+1+4=7分。　補充：兒童GCS：痛刺激睜眼E2、呼叫無反應而痛有退縮等合計約7分，屬重度意識障礙(GCS≤8多需保護氣道並密切監測)。","options":{"A":"3分(全無反應)計算有誤。","B":"5分計算有誤。","C":"正確。E2(痛睜眼)+V1(無反應)+M4(退縮)=7分。","D":"9分計算有誤。"},"sources":["新文京《兒科護理學》GCS","嬰兒"]}},"103100-N4-50":{"quick":"1歲6個月,躁動不安無法安撫、痛覺刺激才睜眼、上臂收縮反應,GCS為「8分」(B)。","detail":{"background":"GCS=E+V+M(嬰兒適用)。本例對「疼痛」才睜眼=E2,「躁動不安、哭鬧無法安撫」=V3,痛刺激上臂「收縮(屈曲)」=M3,合計2+3+3=8分。　補充：兒童GCS：躁動不安無法安撫、痛覺刺激才睜眼E2、上臂收縮M4等合計8分，屬重度意識障礙，需密切監測與保護呼吸道。","options":{"A":"7分計算有誤。","B":"正確。E2(痛睜眼)+V3(哭鬧無法安撫)+M3(屈曲收縮)=8分。","C":"9分計算有誤。","D":"10分計算有誤。"},"sources":["新文京《兒科護理學》GCS","嬰兒"]}},"104030-N4-77":{"quick":"3歲頭部外傷意識評估(GCS),不包含的觀察項目是「對刺激之眼球最佳運動反應」(D)。","detail":{"background":"GCS評估三大項:睜眼反應(E,對刺激張眼)、語言反應(V,最佳言語)、運動反應(M,上臂對疼痛的最佳動作)。並不包含「眼球運動反應」(眼球運動是評估腦幹/腦神經的其他檢查,如娃娃眼,非GCS項目)。","options":{"A":"是GCS項目。對刺激眼睛張開(睜眼E)。","B":"是GCS項目。上臂對疼痛最佳反應(運動M)。","C":"是GCS項目。最佳言語反應(語言V)。","D":"不包含(本題答案)。眼球運動反應非GCS三大項。"},"sources":["新文京《兒科護理學》GCS","三項目"]}},"105030-N4-76":{"quick":"1歲頭部外傷,躁動不安無法安撫、對痛有收縮與睜眼反應,GCS為「8分」(B)。","detail":{"background":"GCS=E+V+M(嬰兒)。本例對「疼痛」睜眼=E2,「躁動不安無法安撫」=V3,對痛「收縮(屈曲)」=M3,合計2+3+3=8分。　補充：兒童GCS：躁動不安無法安撫、對痛有睜眼E2與收縮M4反應等合計約8分，屬重度意識障礙，需保護呼吸道並密切監測。","options":{"A":"7分計算有誤。","B":"正確。E2(痛睜眼)+V3(無法安撫)+M3(屈曲)=8分。","C":"9分計算有誤。","D":"10分計算有誤。"},"sources":["新文京《兒科護理學》GCS","嬰兒"]}},"106030-N4-49":{"quick":"頭部外傷躁動學齡童約束「正確」者＝以棉墊保護雙手、用「雙套結(可快速解開、不勒緊)」固定於床架;肢體循環應每15~30分觀察。","detail":{"background":"肢體約束須:依醫囑、每約15~30分鐘評估肢體循環(膚色、溫度、脈搏、感覺),並至少每2小時鬆開活動、配合翻身觀察。固定帶應綁於「床架」(不可綁床欄,床欄升降會拉傷);不可用打死結的雙套結勒緊;木乃伊約束用於嬰兒短暫處置、非此情境。","options":{"A":"約束肢體循環應每15~30分鐘觀察一次(每2小時過久)，故欠妥。","B":"固定帶應綁「床架」(非床欄;床欄升降會拉傷)。","C":"正確。雙套結(clove hitch)不會勒緊、可快速解開，以棉墊保護固定於床架。","D":"木乃伊約束用於嬰兒短暫處置，非躁動學齡童的肢體約束。"},"sources":["新文京《兒科護理學》約束","循環評估"]}},"106111-N4-43":{"quick":"不是兒童創傷指數(PTS)評估項目的是「舒張壓」(B)。","detail":{"background":"兒童創傷指數(Pediatric Trauma Score, PTS)的評估項目包含:體重、呼吸道、收縮壓(非舒張壓)、意識狀態、開放性傷口、骨折等,用以評估創傷嚴重度與預後。血壓項目是看「收縮壓」,故舒張壓不是PTS評估項目。","options":{"A":"是PTS項目。體重。","B":"本題答案(非)。PTS用收縮壓(非舒張壓)。","C":"是PTS項目。意識狀態。","D":"是PTS項目。呼吸道。"},"sources":["新文京《兒科護理學》PTS","收縮壓"]}},"107110-N4-73":{"quick":"8個月、7公斤,心臟手術後第一天的異常表徵是「24小時尿量60c.c.」(B)。","detail":{"background":"嬰兒正常尿量約1~2 mL/kg/hr,7公斤嬰兒一天應約170~340 mL。「24小時尿量僅60 c.c.」遠低於正常(約0.36 mL/kg/hr),屬少尿、異常,須警覺腎灌流不足或脫水。其餘:肛溫37.2度正常、PaO2 95mmHg正常、PGCS 13分接近正常。","options":{"A":"正常。肛溫37.2度。","B":"異常(本題答案)。24小時尿量僅60c.c.遠低於正常(少尿)。","C":"正常。PaO2 95mmHg。","D":"接近正常。PGCS 13分。"},"sources":["新文京《兒科護理學》術後","尿量"]}},"109030-N4-53":{"quick":"3歲頭部外傷,腦壓增高早期臨床表徵不包括「瞳孔大小不對稱」(D)。","detail":{"background":"顱內壓升高早期表現:頭痛、痙攣、噴射狀嘔吐、斜眼/複視(腦神經受壓)、意識輕度改變。瞳孔大小不對稱(一側放大固定)是腦疝形成的「晚期/危急」徵象,非早期表徵。　補充：顱內壓增高早期徵象為頭痛、嘔吐、意識/行為改變、躁動；「瞳孔大小不對稱(瞳孔不等)」屬「晚期」腦疝徵象、非早期，故不包括於早期表徵。","options":{"A":"早期可見。痙攣、頭痛。","B":"早期可見。斜眼、複視。","C":"早期可見。噴射狀嘔吐。","D":"不包括(本題答案)。瞳孔大小不對稱是晚期/腦疝徵象(非早期)。"},"sources":["新文京《兒科護理學》顱內壓","早期"]}},"110030-N4-78":{"quick":"5歲開顱手術後護理不適當的是「協助小畢採頭低臀高的姿勢,以促進頭部傷口引流」(C)。","detail":{"background":"開顱(幕上)術後應抬高床頭約15~30度、頭頸正中以促進靜脈回流、降低顱內壓,絕不可採頭低臀高(會增加顱內壓與出血風險)。其餘正確:密切監測意識與生命徵象、觀察顱內壓增高症狀、提供安靜柔和環境。　補充：開顱手術後為降低顱內壓應「抬高床頭約15~30度、頭頸維持中立」促靜脈回流；「頭低臀高」會增加顱內壓、為不適當(幕上手術後忌頭低)。","options":{"A":"適當。密切監測意識狀態與生命徵象。","B":"適當。觀察顱內壓增高症狀(頭痛、嘔吐、視力模糊)。","C":"不適當(本題答案)。不可頭低臀高(會增加顱內壓);應抬高床頭。","D":"適當。提供安靜、光線柔和的環境。"},"sources":["新文京《兒科護理學》開顱術後","抬高床頭"]}},"112030-N4-77":{"quick":"以GCS評估兒童意識程度正確的是「少於或等於7分定義為昏迷狀態」(C)?——本題答C。","detail":{"background":"GCS評估睜眼(E)、語言(V)、運動(M)三項,總分3~15分;一般以GCS≤8視為昏迷(本題以「≤7定義昏迷」為其指定正解)。評估嬰幼兒時可由父母協助安撫以利配合;評估的是對刺激的睜眼、語言、運動反應(瞳孔反應另屬腦神經評估);15分為正常(非13分)。","options":{"A":"錯。評估嬰幼兒可由父母協助(非不需陪同)。","B":"錯。GCS評估睜眼、語言、運動(瞳孔反應非GCS項目)。","C":"正確(本題答案)。≤7(臨床一般≤8)定義為昏迷狀態。","D":"錯。最高分15分表示正常(非13分)。"},"sources":["新文京《兒科護理學》GCS","昏迷"]}},"114030-N4-50":{"quick":"GCS：叫他睜眼E3＋哭鬧可安撫V4＋輕觸手臂會收縮(退縮)M5＝12分。","detail":{"background":"GCS=E+V+M(嬰兒)。本例對「聲音(叫他)」睜眼=E3,「會哭但可安撫」=V4,輕觸手臂「收縮(屈曲/退縮)」=M2,合計3+4+2=9分。　補充：兒童GCS：可叫他睜眼E3、哭鬧但可安撫V4、輕觸手臂會收縮退縮M5，合計12分；屬中度意識障礙，須密切監測頭部外傷變化。","options":{"A":"7分計算有誤。","B":"9分計算有誤(M應為5)。","C":"正確。E3＋V4＋M5(觸碰會收縮/退縮)＝12分。","D":"15分(完全正常)不符。"},"sources":["新文京《兒科護理學》GCS","嬰兒"]}},"106030-N4-77":{"quick":"7歲頭部嚴重撞傷、GCS 3分,痛刺激時手臂與腳呈僵直且內轉,正確描述是「呈現去大腦性僵直姿勢,中腦功能異常」(D)。","detail":{"background":"去大腦性僵直(decerebrate):四肢伸直、內轉、足底屈曲,代表腦幹(中腦/橋腦)受損,預後較差;去皮質僵直(decorticate)則是上肢屈曲、下肢伸直,代表大腦皮質/皮質下受損。本例四肢「僵直內轉」屬去大腦性僵直,提示中腦功能異常。","options":{"A":"去皮質僵直是上肢屈曲(非四肢僵直);且非延腦。","B":"去皮質僵直是上肢屈曲(本例是伸直僵直)。","C":"去大腦僵直反映腦幹/中腦(非小腦)。","D":"正確。四肢僵直內轉=去大腦性僵直,中腦功能異常。"},"sources":["新文京《兒科護理學》去大腦僵直","中腦"]}},"104030-N4-71":{"quick":"腦瘤病童母親說「我現在不想談,讓我靜一靜」,最適當的回答是「當妳想找人談的時候,隨時都可以找我!」(A)。","detail":{"background":"家屬處於震驚哀傷時,若表達想獨處,護理應尊重其情緒節奏、給予空間並保證隨時提供支持(治療性的接納與陪伴),而非強迫立即傾談、急著分享他人經驗或施壓。　補充：腦瘤病童母親說「不想談、讓我靜一靜」時，應尊重其步調、表達持續支持與隨時可談的態度；「當妳想談時隨時可找我」即接納情緒並保持開放、最適當。","options":{"A":"正確。尊重母親想獨處、保證隨時可找護理師(接納支持)。","B":"強迫現在談,未尊重其意願。","C":"此刻不宜急著分享他人經驗。","D":"施壓要她說出想法,未尊重其節奏。"},"sources":["新文京《兒科護理學》腫瘤心理","尊重"]}},"106030-N4-76":{"quick":"腦瘤病童母親隱瞞病情、強顏歡笑,病童感到困惑,較適當的護理是「鼓勵母親和李小妹分享彼此的感受,共同面對疾病挑戰」(C)。","detail":{"background":"面對重症兒童,刻意隱瞞病情、強顏歡笑會造成孩子困惑與孤立。護理應協助親子以誠實、適齡的方式「彼此分享感受、共同面對」,建立信任與支持,而非單方面告知或學別人做法。　補充：腦瘤病童母親隱瞞病情、強顏歡笑使病童困惑，較適當的護理是「鼓勵母親與病童適齡地分享彼此感受、共同面對」，誠實適齡的溝通有助病童因應與信任。","options":{"A":"單方面要母親告知,未促進雙向分享感受。","B":"由醫師告知亦非促進親子情感交流。","C":"正確。鼓勵母親與病童分享彼此感受、共同面對。","D":"學病友經驗非當下親子溝通的核心。"},"sources":["新文京《兒科護理學》腫瘤心理","親子溝通"]}},"106111-N4-56":{"quick":"3歲腦瘤出現嘔吐、吞嚥困難、說話不清楚,腫瘤位置最可能在「腦幹」(C)。","detail":{"background":"腦幹掌管吞嚥、構音、嘔吐中樞與多條腦神經,腦幹腫瘤典型表現為吞嚥困難、構音不清、嘔吐、腦神經麻痺。枕葉主管視覺、小腦主管平衡協調、腦室病變多以阻塞性水腦表現,皆與此症狀組合不符。　補充：3歲腦瘤出現「嘔吐、吞嚥困難、說話不清楚(顱神經與小腦/腦幹症狀)」，腫瘤位置最可能在「腦幹」(影響顱神經核與生命中樞)；兒童腦瘤好發後顱窩。","options":{"A":"枕葉主管視覺(視野缺損),非吞嚥構音。","B":"小腦主管平衡協調(步態不穩)。","C":"正確。腦幹掌管吞嚥、構音、嘔吐中樞,符合此症狀。","D":"腦室病變多致阻塞性水腦。"},"sources":["新文京《兒科護理學》腦瘤","腦幹"]}},"106111-N4-72":{"quick":"腦瘤病童頭部放射治療期間皮膚護理正確的是「使用遮陽傘帽,避免治療部位日曬」(C)。","detail":{"background":"放療部位皮膚脆弱敏感,護理:避免陽光直曬(用遮陽帽/傘)、保持乾燥清潔、勿冰敷或熱敷、勿用刺激性製品(酒精、香皂)、勿摩擦或抓搔、勿自行塗抹乳液(除非醫囑指定)、保留照野標記。　補充：腦瘤病童頭部放射治療期間皮膚護理：保持照射部位乾燥清潔、勿摩擦抓搔或塗刺激物、「避免日曬(戴遮陽帽傘)」、不可洗掉定位標記；以保護放射部位皮膚。","options":{"A":"錯。放療部位不冰敷(避免溫度刺激)。","B":"錯。不自行塗抹乳液(除非醫囑指定),保持乾燥。","C":"正確。使用遮陽傘帽避免治療部位日曬。","D":"錯。不可用75%酒精清洗(刺激放療皮膚)。"},"sources":["新文京《兒科護理學》放療","皮膚護理"]}},"107030-N4-64":{"quick":"3歲腦瘤手術住院,其7歲哥哥在校變得易怒打人,不適當的措施是「建議父母直接糾正並處罰小芳哥哥的不當行為」(C)。","detail":{"background":"手足住院時,健康的手足常因被忽略、焦慮而出現行為退化或攻擊行為。護理應協助父母理解其壓力與情緒、安排探訪參與、用玩偶引導理解,而非直接糾正處罰(處罰會忽略其情緒需求、加重不安)。　補充：手足住院時健康手足(7歲哥哥)易因關注減少、焦慮而出現行為問題(易怒打人)；應理解其壓力、給予關注與說明；「直接糾正並處罰」忽略其情緒需求、不適當。","options":{"A":"適當。觀察哥哥是否承受同儕關係壓力。","B":"適當。討論讓哥哥到院探訪的可能性。","C":"不適當(本題答案)。直接處罰忽略其情緒需求(應理解支持)。","D":"適當。以玩偶引導哥哥了解妹妹住院原因。"},"sources":["新文京《兒科護理學》手足","情緒支持"]}},"107110-N4-80":{"quick":"腦瘤手術後護理錯誤的是「抬高床尾,增加腦部組織灌流」(A)。","detail":{"background":"幕上腦瘤術後應「抬高床頭」約15~30度、頭頸正中,以促進靜脈回流、降低顱內壓;抬高床尾(頭低)會增加顱內壓與出血風險,故錯誤。其餘正確:監測生命徵象意識、觀察傷口紅腫熱痛、避免用力咳嗽解便(防顱內壓上升)。","options":{"A":"錯誤(本題答案)。應抬高床頭(非床尾);頭低會增加顱內壓。","B":"正確。監測生命徵象及意識狀況。","C":"正確。觀察傷口紅腫熱痛(感染)。","D":"正確。避免用力咳嗽或解便(防顱內壓上升)。"},"sources":["新文京《兒科護理學》腦瘤術後","抬高床頭"]}},"110110-N4-43":{"quick":"12歲惡性腦瘤,母親自責情緒低落,護理師最適當的處理是「媽媽聽了醫師病情解釋後,心理一定非常傷心難過,如果想哭就哭出來」(C)。","detail":{"background":"面對母親的自責與哀傷,護理應同理其情緒、接納並允許情緒宣洩(想哭就哭),建立信任後再提供支持。空泛保證(醫師一定治好)、訴諸宗教、勸其別想太多都未回應其真實情緒。　補充：面對腦瘤病童母親自責、情緒低落，護理師應「同理接納其情緒、傾聽、提供支持」；如理解「聽到病情一定很傷心難過」並陪伴，避免說教或否定其感受。","options":{"A":"空泛保證(一定醫好),未回應情緒。","B":"訴諸宗教,未同理母親情緒。","C":"正確。同理母親傷心、允許情緒宣洩(想哭就哭)。","D":"勸別想太多,淡化其感受。"},"sources":["新文京《兒科護理學》腫瘤心理","同理"]}},"114170-N4-45":{"quick":"3歲腦瘤女童出現何種徵象時應進一步評估顱內壓上升?——「頭痛、噴射狀嘔吐」(C)。","detail":{"background":"顱內壓上升的典型早期徵象為頭痛、噴射狀嘔吐(不伴噁心),並可有心搏過緩、血壓升高(Cushing反應)、意識改變。心跳過快血壓下降是休克;頻尿尿多是泌尿/內分泌;貓哭聲是特定症候群,皆非顱內壓上升徵象。","options":{"A":"心跳過快、血壓下降是休克徵象(非顱內壓上升)。","B":"頻尿、尿量多非顱內壓上升。","C":"正確。頭痛、噴射狀嘔吐是顱內壓上升徵象。","D":"貓哭聲是貓哭症候群(非顱內壓上升)。"},"sources":["新文京《兒科護理學》顱內壓","噴射嘔吐"]}},"101030-N4-80":{"quick":"腦性麻痺兒童可能發生的健康問題錯誤的是「進行性神經病變」(A)。","detail":{"background":"腦性麻痺(CP)是腦部在發育未成熟前受損所致的「非進行性」運動功能障礙(腦損傷本身不再惡化,但續發攣縮等可能加重)。其常見問題含肢體麻痺、手眼協調困難、發音/構音困難、可能合併智能或感覺障礙。　補充：腦性麻痺(CP)為「非進行性」的腦部損傷致動作姿勢障礙，常合併智能、語言、視聽、癲癇、餵食吞嚥與骨關節攣縮等問題；「進行性神經病變」與CP非進行性本質矛盾、為錯誤。","options":{"A":"錯誤(本題答案)。CP是非進行性神經病變(腦損傷不再惡化)。","B":"正確。肢體麻痺。","C":"正確。手眼協調困難。","D":"正確。發音或構音困難。"},"sources":["新文京《兒科護理學》腦性麻痺","非進行性"]}},"103030-N4-78":{"quick":"腦性麻痺兒童及家庭護理指導錯誤的是「為預防下肢攣縮,可以雙手控制膝關節,將雙腿內轉合併」(A)。","detail":{"background":"痙攣型CP常有下肢內收內轉、剪刀腳的傾向,護理應協助「外展、伸展」以對抗攣縮,而非把雙腿內轉合併(會加重內收攣縮)。其餘正確:三指下顎控制法協助咀嚼吞嚥、鼓勵獨立自我照顧、鼓勵就學社交。　補充：腦性麻痺護理應促進關節活動、預防攣縮、維持功能位；「以雙手控制膝關節將雙腿內轉合併」(剪刀腳姿勢)會加重內收肌攣縮、為錯誤，應採外展擺位。","options":{"A":"錯誤(本題答案)。應協助下肢外展伸展(雙腿內轉合併會加重攣縮)。","B":"正確。三指下顎控制法協助閉嘴咀嚼吞嚥。","C":"正確。鼓勵獨立完成自我照顧並肯定。","D":"正確。鼓勵就學與其他兒童互動。"},"sources":["新文京《兒科護理學》腦性麻痺","外展"]}},"104100-N4-78":{"quick":"8歲痙攣型腦性麻痺協助家庭生活正常化,正確的是「建議小明與父母將復健計畫併入家庭生活」(C)。","detail":{"background":"家庭正常化是讓特殊兒童的照護與復健融入日常家庭生活,維持家庭正常運作。應將復健計畫融入日常作息(C);不必然就讀資源班、不應一味模仿他人做法、也不應禁止家庭討論疾病衝擊(應鼓勵表達)。　補充：痙攣型腦性麻痺協助家庭生活正常化，宜「將復健計畫融入日常家庭生活」、鼓勵參與、發揮潛能；以提升功能與生活品質，而非僅在治療場所進行。","options":{"A":"不必然就讀資源班(視個別能力)。","B":"不應一味模仿他人做法(個別化)。","C":"正確。將復健計畫併入家庭生活(正常化)。","D":"不應禁止談論疾病衝擊(應鼓勵表達調適)。"},"sources":["新文京《兒科護理學》腦性麻痺","正常化"]}},"105090-N4-54":{"quick":"15個月輕微腦性麻痺,指導24個月預期發展任務不適當的是「增強對痛覺反應的能力」(C)。","detail":{"background":"幼兒發展任務著重自理能力、正向身體心像、活動所需熱量等促進發展的目標。「增強對痛覺反應的能力」並非發展任務(痛覺反應為生理反射,非須訓練的發展里程碑),故不適當。　補充：腦性麻痺護理目標為促進成長發展與功能；指導24個月發展任務應符合其能力(動作、語言、社會)；「增強對痛覺反應的能力」非發展任務、不適當。","options":{"A":"適當。促進自理能力的掌控。","B":"適當。建立正向身體心像。","C":"不適當(本題答案)。增強痛覺反應非發展任務。","D":"適當。提供活動所需額外熱量。"},"sources":["新文京《兒科護理學》腦性麻痺","發展任務"]}},"106030-N4-50":{"quick":"15個月輕微腦性麻痺、由外傭每週帶去復健,主要的護理措施是「促進成長及發展」(D)。","detail":{"background":"對嬰幼兒期的輕度CP,核心護理目標是「促進其生長與發展」(把握早期療育黃金期,促進動作、語言、認知與自理發展)。避免傷害、解釋病因、改善身體心像皆為輔助,非此階段最主要的護理措施。　補充：輕微腦性麻痺嬰幼兒主要護理措施為「促進其成長與發展」——透過早期療育、復健、適齡刺激與家庭參與，使其發揮最大潛能、預防併發症。","options":{"A":"保護避免傷害是基本但非最主要目標。","B":"解釋病因非主要護理措施。","C":"改善身體心像在較大兒童較重要。","D":"正確。促進成長及發展(早期療育核心)。"},"sources":["新文京《兒科護理學》腦性麻痺","促進發展"]}},"106030-N4-79":{"quick":"腦性麻痺有咀嚼吞嚥困難,協助吞嚥正確的是「食物置於舌頭後方」(B)。","detail":{"background":"CP兒童吞嚥困難的餵食:身體坐正、頭頸維持正中稍前屈(非後仰,後仰易嗆)、將食物放在「舌頭後方/側方」以利吞嚥反射、用三指下顎控制法協助閉嘴。頭後仰、肩向後傾、雙腳懸空皆不利安全吞嚥。　補充：協助腦性麻痺吞嚥困難病童進食，宜將「食物置於舌頭中後方」利吞嚥反射、採直立中正姿、少量慢餵、選軟質食物，以減少哽塞與吸入。","options":{"A":"錯。頭部應正中稍前屈(後仰易嗆)。","B":"正確。食物置於舌頭後方以利吞嚥。","C":"錯。肩膀應前屈穩定(非向後傾斜)。","D":"錯。雙腳應有支撐(非自然下垂)。"},"sources":["新文京《兒科護理學》腦性麻痺","吞嚥"]}},"106111-N4-55":{"quick":"15個月輕微腦性麻痺,家庭因應與適應程度評估非目前評估重點的是「各家庭成員未來的目標」(D)。","detail":{"background":"評估家庭對CP診斷的因應與適應,重點在現有支持系統與資源、對診斷的情緒反應、對疾病的認知與了解。「各家庭成員未來的目標」較屬遠程個人規劃,非當前因應/適應程度的評估重點。　補充：評估腦性麻痺家庭因應與適應，重點在「目前的照顧負荷、資源、情緒與支持系統」；「各家庭成員未來的目標」較非目前評估重點。","options":{"A":"是重點。現有支持系統和資源。","B":"是重點。對疾病診斷的情緒反應。","C":"是重點。對腦性麻痺的認知及了解。","D":"非重點(本題答案)。各成員未來目標非當前因應評估重點。"},"sources":["新文京《兒科護理學》腦性麻痺","家庭評估"]}},"108020-N4-79":{"quick":"協助吞嚥困難的學齡前腦性麻痺病童進食,正確的是「協助病童坐起、身體維持正中位置」(A)。","detail":{"background":"CP吞嚥困難的安全餵食姿勢:協助坐起、身體與頭部維持「正中位置」、頭稍前屈、肩前屈穩定;食物放舌中後方;鼓勵使用適當輔具學習自我進食(非完全由人餵)。食物高於嘴、放舌前方易嗆。　補充：協助吞嚥困難的腦性麻痺病童進食，應「協助坐起、身體維持正中位置、頭稍前傾」、少量慢餵、軟質食物置舌中後方；以減少嗆咳與吸入。","options":{"A":"正確。協助坐起、身體維持正中位置。","B":"錯。膝蓋低於大腿、雙腳懸空不穩(應有支撐)。","C":"錯。食物應放舌中後方(高於嘴、放舌前易嗆)。","D":"錯。應用輔具鼓勵自我進食(非完全由照顧者餵)。"},"sources":["新文京《兒科護理學》腦性麻痺","坐正"]}},"109030-N4-80":{"quick":"腦性麻痺(cerebral palsy)敘述正確的是「治療目標在增進運動功能和預防殘障加重」(B)。","detail":{"background":"CP是腦發育未成熟前受損的非進行性運動障礙,無法痊癒,治療目標在「增進運動功能、預防續發殘障(攣縮等)加重」、促進最大功能與生活品質。經口飛沫傳染侵犯脊髓灰白質的是小兒麻痺(非CP);吞嚥時食物應放舌後方(非前方);CP兒童智能不一定正常(部分合併智能障礙)。","options":{"A":"錯。經口飛沫侵犯脊髓灰白質是小兒麻痺(非CP)。","B":"正確。治療目標增進運動功能、預防殘障加重。","C":"錯。吞嚥時食物應放舌後方(非前方)。","D":"CP部分合併智能障礙(非大部分正常,敘述過絕對)。"},"sources":["新文京《兒科護理學》腦性麻痺","治療目標"]}},"110030-N4-80":{"quick":"兒童腦性麻痺型態及表徵不適當的是「徐動型(athetoid)因基底核受損而使雙下肢麻痺」(D)。","detail":{"background":"CP分型:痙攣型(錐體徑路病變、肌張力高)、運動失調型(小腦病變、平衡協調障礙)、運動困難/徐動型(錐體外/基底核病變、不自主運動)。徐動型(athetoid)是基底核受損致「不自主扭動」,並非「雙下肢麻痺」(下肢麻痺是痙攣型雙邊麻痺的描述),故D不適當。","options":{"A":"適當。運動失調型因小腦病變致平衡協調障礙。","B":"適當。痙攣型因錐體徑路病變致肌張力高。","C":"適當。運動困難型因錐體外徑路病變致不自主運動。","D":"不適當(本題答案)。徐動型是基底核受損致不自主運動(非雙下肢麻痺)。"},"sources":["新文京《兒科護理學》腦性麻痺","徐動型"]}},"110110-N4-77":{"quick":"5歲腦性麻痺、咀嚼吞嚥差的進食護理「正確」者＝儘量將食物置放於舌頭中後方(利吞嚥、減少嗆咳)。","detail":{"background":"CP進食量少者宜提供「高熱量、高蛋白」食物以少量達足夠營養;質地可用增稠以利吞嚥;姿勢坐正頭正中、食物放舌中後方、鼓勵用輔具自我進食。食物放舌後方(非前方)、雙腳應有支撐(非懸空)、應鼓勵用輔具。　補充：協助腦性麻痺吞嚥困難病童進食，宜將「食物置於舌頭中後方」誘發吞嚥反射、採直立中正姿、少量慢餵、選軟質食物，以利吞嚥並減少嗆咳。","options":{"A":"CP吞嚥困難者「流質」易嗆入，應給半固體/濃稠食物，故欠妥。","B":"正確。食物置於舌頭中後方，利吞嚥、減少嗆咳。","C":"進食時雙腳應有支撐(非懸空)。","D":"應「鼓勵」使用輔具學習自我進食。"},"sources":["新文京《兒科護理學》腦性麻痺","高熱量"]}},"111110-N4-79":{"quick":"腦性麻痺兒童常見健康問題較不適當的是「皆合併有智力障礙」(A)。","detail":{"background":"腦性麻痺以運動功能障礙為核心,部分但「並非全部」合併智能障礙(約半數智能正常或接近正常)。其常見問題含粗動作發展遲緩、發音/語言障礙,且為非進行性神經病變。「皆合併智力障礙」過於絕對,不適當。　補充：腦性麻痺常見合併問題包括動作姿勢障礙、攣縮、癲癇、語言視聽障礙、餵食吞嚥困難；但「並非皆合併智力障礙」——部分智能正常，故「皆合併智力障礙」之敘述較不適當。","options":{"A":"較不適當(本題答案)。CP並非皆合併智力障礙(約半數智能正常)。","B":"適當。普遍有粗動作發展遲緩。","C":"適當。常合併發音困難或語言障礙。","D":"適當。屬非進行性神經病變。"},"sources":["新文京《兒科護理學》腦性麻痺","智能"]}},"112030-N4-80":{"quick":"痙攣型腦性麻痺(spastic type)臨床表徵正確的是「伸展反射增加」(B)。","detail":{"background":"痙攣型CP因錐體徑路(上運動神經元)病變,呈現肌張力增高、深部肌腱反射亢進、伸展反射增加、剪刀腳步態。不自主扭動是徐動型;肌腱反射降低見於下運動神經元/低張型;跨大步伐非痙攣型特徵。　補充：痙攣型(spastic)腦性麻痺最常見，特徵為「肌張力增加、伸展反射(深部肌腱反射)增加、剪刀腳、尖足、攣縮」；屬上運動神經元損傷表現。","options":{"A":"不自主扭動是徐動型(非痙攣型)。","B":"正確。痙攣型伸展反射增加(肌張力高、反射亢進)。","C":"錯。痙攣型肌腱反射亢進(非降低)。","D":"跨大步伐非痙攣型(痙攣型多剪刀腳)。"},"sources":["新文京《兒科護理學》腦性麻痺","痙攣型"]}},"112110-N4-79":{"quick":"5歲中度腦性麻痺吞嚥困難,飲食居家照顧錯誤的是「儘量將食物置於舌頭前方,避免哽塞」(B)。","detail":{"background":"CP吞嚥困難餵食:食物應放「舌頭中後方」以引發吞嚥反射(放舌前方反而易含著、易嗆),用三指下顎控制法協助、頭部正中肩前屈、過稀液體加增稠劑。故「置於舌頭前方」錯誤。　補充：協助中度腦性麻痺吞嚥困難病童進食，應將「食物置於舌頭中後方」利吞嚥、採直立中正姿、少量慢餵；「置於舌頭前方」易被舌推出且增哽塞、為錯誤。","options":{"A":"正確。三指下顎控制法協助進食。","B":"錯誤(本題答案)。食物應放舌中後方(放舌前方易嗆)。","C":"正確。頭部正中、肩部前屈穩定。","D":"正確。過稀液體用增稠劑利吞嚥。"},"sources":["新文京《兒科護理學》腦性麻痺","舌後方"]}},"113180-N4-48":{"quick":"7歲腦性麻痺,因基底核與錐體外病變致不自主運動、四肢抖動影響書寫,屬「手足徐動型(athetoid type)」(C)。","detail":{"background":"手足徐動型(athetoid/dyskinetic)CP因基底核(錐體外系)受損,出現緩慢、不自主、扭動的動作,影響精細動作如書寫。痙攣型是錐體徑路病變肌張力高;運動失調型是小腦病變平衡差;無張力型肌張力低下。","options":{"A":"痙攣型是錐體徑路病變、肌張力高。","B":"運動失調型是小腦病變、平衡協調差。","C":"正確。基底核/錐體外病變致不自主扭動=手足徐動型。","D":"無張力型是肌張力低下。"},"sources":["新文京《兒科護理學》腦性麻痺","徐動型"]}},"115030-N4-50":{"quick":"腦性麻痺兒童敘述錯誤的是「智能障礙為主要發展問題,應於學會溝通後開始接受語言訓練」(B)。","detail":{"background":"CP以「運動功能障礙」為主要問題(非智能障礙),且語言/溝通訓練應「及早」介入(早期療育),而非等學會溝通後才開始。其餘正確:出生前後缺氧是常見致病原因、屬非進行性運動障礙、痙攣型有伸展反射與肌腱反射及肌張力增加。","options":{"A":"正確。腦部缺氧是出生前/生產時常見致病原因。","B":"錯誤(本題答案)。CP主要是運動障礙(非智能);語言訓練應及早(非等學會溝通後)。","C":"正確。屬非進行式運動功能障礙。","D":"正確。痙攣型伸展反射、深肌腱反射及肌張力增加。"},"sources":["新文京《兒科護理學》腦性麻痺","運動為主"]}},"101030-N4-79":{"quick":"重症肌無力(myasthenia gravis)病童臨床表徵錯誤的是「最早出現的症狀為步態改變的行動障礙」(C)。","detail":{"background":"重症肌無力是神經肌肉接合處乙醯膽鹼受體被自體抗體破壞,以「易疲勞性肌無力」為特徵,活動後加重、休息後改善。最早常見的症狀是「眼瞼下垂、複視」(眼外肌先受侵犯),而非步態改變;嚴重可吞嚥吸吮困難、呼吸肌無力。","options":{"A":"可能。新生兒期吸吮及吞嚥困難。","B":"可能。嬰兒期頭頸控制不佳。","C":"錯誤(本題答案)。最早多為眼瞼下垂/複視(非步態改變)。","D":"正確。肌無力症狀在活動後逐漸顯現(易疲勞性)。"},"sources":["新文京《兒科護理學》重症肌無力","眼瞼下垂"]}},"102030-N4-78":{"quick":"兒童肌肉骨骼身體檢查及評估錯誤的是「觸診時從受傷的部位先檢查」(B)。","detail":{"background":"肌肉骨骼觸診應「從健側/未受傷或不痛的部位先開始」,最後再檢查受傷/疼痛處,以減少疼痛、取得合作並做兩側對照。其餘正確:視診體態與兩腿長度對稱性、詢問穿鞋是否不適、評估並處理兒童情緒反應。　補充：兒童肌肉骨骼檢查應「先檢查健側/未受傷部位、最後檢查患部」以減少疼痛與抗拒、利比較；「從受傷部位先檢查」會引發疼痛與抗拒、為錯誤。","options":{"A":"正確。視診體態、兩腿長度是否不對稱。","B":"錯誤(本題答案)。應從健側/不痛處先檢查(受傷處最後)。","C":"正確。詢問穿鞋是否不適。","D":"正確。評估並處理兒童的情緒反應。"},"sources":["新文京《兒科護理學》肌肉骨骼評估","健側先"]}},"102110-N4-77":{"quick":"雷氏症候群(Reye syndrome)的病徵是「急性腦病變,出現肝功能、代謝功能及神經功能障礙」(B)。","detail":{"background":"雷氏症候群是急性腦病變合併肝臟脂肪變性,常於病毒感染(流感、水痘)後使用aspirin而誘發,表現嘔吐、肝功能異常(SGOT/SGPT升高)、高血氨、低血糖、意識障礙與腦水腫。　補充：雷氏症候群(Reye syndrome)為急性腦病變合併肝脂肪變性，出現嘔吐、意識改變、肝功能異常(SGOT/SGPT升)、血氨升、低血糖；與病毒感染後使用阿斯匹靈有關。","options":{"A":"急性中樞神經感染致腦脊髓膜發炎是腦膜炎(非雷氏)。","B":"正確。急性腦病變+肝功能/代謝/神經功能障礙=雷氏症候群。","C":"重複不自主肢體動作是妥瑞/舞蹈症(非雷氏)。","D":"腦發育前受損致運動障礙是腦性麻痺(非雷氏)。"},"sources":["新文京《兒科護理學》雷氏症候群","腦病變肝"]}},"104100-N4-80":{"quick":"6歲裘馨氏假肥大性肌失養症(Duchenne MD)護理指導適當的是「鼓勵游泳,以保持肌力,預防攣縮」(A)。","detail":{"background":"裘馨氏肌失養症因缺乏肌縮蛋白(dystrophin)致進行性肌肉無力。護理鼓勵在能力範圍內維持活動(如游泳此低衝擊運動)以保留肌力、預防攣縮;鼓勵深呼吸與胸腔物理治療防肺炎;均衡飲食控制體重(非高飽和脂肪);儘量維持行走活動(非過早依賴輪椅)。","options":{"A":"正確。鼓勵游泳保持肌力、預防攣縮。","B":"錯。應鼓勵深呼吸與胸腔物理治療(非減少深呼吸)。","C":"錯。應均衡飲食控制體重(非多攝取飽和脂肪)。","D":"錯。應儘量維持活動行走(非過早以輪椅代步)。"},"sources":["新文京《兒科護理學》裘馨氏肌失養症","游泳"]}},"106030-N4-45":{"quick":"可能與雷氏症候群(Reye syndrome)有關、不建議兒童使用的藥物是「Aspirin」(D)。","detail":{"background":"雷氏症候群與兒童於病毒感染(流感、水痘)期間使用「水楊酸類(aspirin)」退燒有關,故兒童發燒應避免aspirin,改用acetaminophen或ibuprofen。　補充：雷氏症候群與兒童病毒感染(如水痘、流感)期間使用「阿斯匹靈(aspirin)」有關，故兒童發燒不建議用阿斯匹靈，改用acetaminophen或ibuprofen。","options":{"A":"Acetaminophen是兒童常用退燒藥(非禁用)。","B":"Ibuprofen可用於兒童退燒。","C":"Ketorolac非與雷氏相關。","D":"正確。Aspirin與雷氏症候群有關,不建議兒童使用。"},"sources":["新文京《兒科護理學》雷氏症候群","aspirin"]}},"106110-N4-55":{"quick":"協助雙親面對新生兒死亡,最適當的護理是「在新生兒瀕死前後,提供雙親機會抱抱自己的新生兒及鼓勵雙親與新生兒說話」(D)。","detail":{"background":"面對新生兒死亡(周產期失落),護理應協助雙親完成道別、創造回憶:提供抱抱、說話、留念物等機會,促進哀傷的健康調適。不應減少相處(會增加遺憾)、不應以「活著會發展遲緩」之語淡化、不應強迫一定要看遺體(尊重意願)。","options":{"A":"錯。不應減少瀕死前相處時間(會增加遺憾)。","B":"錯。不應以發展遲緩之語淡化死亡(不當)。","C":"錯。不應強迫一定要看(應尊重意願)。","D":"正確。提供抱抱、說話等道別機會,促進哀傷調適。"},"sources":["新文京《兒科護理學》周產期失落","道別"]}},"106110-N4-80":{"quick":"雷氏症候群(Reye syndrome)早期病變的主要徵象是「嘔吐」(A)。","detail":{"background":"雷氏症候群早期(前驅期)主要表現為持續嘔吐,隨後出現嗜睡、意識改變、肝功能異常與腦水腫,嚴重可進展為去大腦僵直、抽搐。去大腦髓質僵直、反射消失、過度換氣屬病程進展後的嚴重徵象。　補充：雷氏症候群早期病變主要徵象為「持續性嘔吐」，隨後出現意識改變、躁動、肝功能異常與腦病變；與病毒感染後使用阿斯匹靈有關，須及早辨識。","options":{"A":"正確。早期主要徵象是嘔吐(前驅期)。","B":"去大腦僵直是病程進展後的嚴重徵象。","C":"反射消失是嚴重/末期徵象。","D":"過度換氣非早期主要徵象。"},"sources":["新文京《兒科護理學》雷氏症候群","嘔吐"]}},"107030-N4-54":{"quick":"雷氏症候群(Reye syndrome)臨床症狀正確的是「肝功能障礙(SGOT、SGPT高)」(D)。","detail":{"background":"雷氏症候群合併肝臟脂肪變性,故SGOT(AST)、SGPT(ALT)升高、血氨「升高」(非降低)、血糖「降低」(低血糖);因肝功能受損致凝血因子合成不足,PT/PTT延長(較易出血,非形成血栓)。　補充：雷氏症候群臨床為急性腦病變合併肝脂肪變性，出現嘔吐、意識改變、「肝功能障礙(SGOT、SGPT升高)」、血氨升、低血糖；與病毒感染後用阿斯匹靈有關。","options":{"A":"錯。血氨濃度升高(非降低)。","B":"錯。血糖濃度降低(低血糖,非增加)。","C":"錯。凝血功能異常易出血(非易形成血栓)。","D":"正確。肝功能障礙致SGOT、SGPT升高。"},"sources":["新文京《兒科護理學》雷氏症候群","肝酵素"]}},"107030-N4-55":{"quick":"藉評估嬰幼兒精細動作、肌肉張力及平衡感,可判斷「小腦」功能(C)。","detail":{"background":"小腦掌管動作的協調、平衡、肌張力與精細動作的順暢度,故評估精細動作、肌張力與平衡感可反映小腦功能。脊髓主傳導與反射、延髓主生命中樞(呼吸心跳)、中腦主視聽反射與部分眼動。　補充：評估嬰幼兒「精細動作、肌肉張力與平衡感、協調」可反映「小腦」功能(小腦主管協調、平衡與肌張力)；小腦病變致動作不協調、平衡障礙。","options":{"A":"脊髓主傳導與反射(非協調平衡)。","B":"延髓主呼吸心跳等生命中樞。","C":"正確。小腦主協調、平衡、肌張力、精細動作。","D":"中腦主視聽反射與部分眼球運動。"},"sources":["新文京《兒科護理學》神經評估","小腦"]}},"107030-N4-80":{"quick":"妥瑞氏症候群(Tourette syndrome)正確的是「會出現重複不自主的肢體動作」(B)。","detail":{"background":"妥瑞氏症是慢性的動作型與聲語型「抽動(tics)」障礙,出現重複、不自主的肢體動作(如眨眼、聳肩)與發聲,通常在18歲前發病。多數智能正常、不會造成腦部傷害;非由興奮劑或腦炎引發。　補充：妥瑞氏症(Tourette syndrome)為神經發展疾病，特徵為「多種動作性與聲語性抽動」(重複不自主的肢體動作與發聲)，18歲前發病、症狀起伏；多不影響智能。","options":{"A":"發病多在學齡期(非幼兒期),18歲前出現。","B":"正確。會出現重複不自主的肢體動作(抽動)。","C":"多數不造成腦部傷害或學習困難。","D":"非因興奮劑及腦炎引發(成因與基因/神經傳導有關)。"},"sources":["新文京《兒科護理學》妥瑞氏症","抽動"]}},"107110-N4-79":{"quick":"重症肌無力(myasthenia gravis)病童臨床症狀錯誤的是「活動之後症狀會改善」(D)。","detail":{"background":"重症肌無力的核心特徵是「易疲勞性肌無力」:活動後症狀「加重」、休息後改善,故「活動後改善」錯誤。可侵犯眼外肌(複視、眼瞼下垂)、延髓肌(吸吮吞嚥困難)、顏面肌等。　補充：重症肌無力(MG)為神經肌肉接合處自體免疫疾病(抗乙醯膽鹼受體抗體)，特徵為「活動後肌肉無力加重、休息後改善」、眼瞼下垂與複視；「活動後改善」之敘述錯誤。","options":{"A":"正確。眼外肌受侵犯而有複視。","B":"正確。出現吸吮及吞嚥困難。","C":"正確。顏面肌無力(顏面神經支配肌肉)。","D":"錯誤(本題答案)。活動後症狀加重(非改善),休息後才改善。"},"sources":["新文京《兒科護理學》重症肌無力","活動加重"]}},"108020-N4-61":{"quick":"4歲住院靜脈輸液導管拔除前後護理正確的是「拔除後,注射部位乾燥後貼上膠布,以維護身體完整性」(C)。","detail":{"background":"靜脈導管固定不可包紮過緊或纏繞末梢(影響循環);拔除後應壓迫止血、待乾燥後貼膠布保護穿刺處;拔除後不需常規熱敷(熱敷用於已發生靜脈炎時)。　補充：靜脈導管拔除護理：拔除後加壓止血、「乾燥後貼上膠布(OK繃)維護身體完整、減輕兒童恐懼」、觀察出血與滲漏；對學齡前兒童貼膠布有安撫身體完整性的意義。","options":{"A":"錯。不可緊包末梢(影響末梢循環觀察)。","B":"錯。不宜纏繞固定(可能影響循環)。","C":"正確。拔除後乾燥貼膠布保護穿刺處。","D":"錯。拔除後不需常規熱敷(靜脈炎時才熱敷)。"},"sources":["新文京《兒科護理學》靜脈導管","固定"]}},"111110-N4-77":{"quick":"妥瑞氏症(Tourette disorder)疾病特徵正確的是「通常在18歲之前出現抽動病徵」(A)。","detail":{"background":"妥瑞氏症是兒童期(多在學齡期、18歲前)發病的慢性抽動障礙,含動作型與聲語型抽動;聲語型抽動並不罕見;不會影響智能發展;動作型抽動最常見的是「眨眼」(非聳肩)。　補充：妥瑞氏症(Tourette disorder)特徵為多種動作性與聲語性抽動、「通常在18歲之前(多4~6歲)出現」、症狀起伏波動；壓力疲累加重、多不影響智能。","options":{"A":"正確。通常在18歲之前出現抽動病徵。","B":"錯。不影響未來智能發展。","C":"錯。聲語型抽動並不罕見。","D":"錯。動作型抽動最常見是眨眼(非聳肩)。"},"sources":["新文京《兒科護理學》妥瑞氏症","18歲前"]}},"112030-N4-78":{"quick":"雷氏症候群(Reye syndrome)臨床表徵錯誤的是「高血糖」(B)。","detail":{"background":"雷氏症候群合併肝臟代謝障礙,典型為「低血糖」(肝醣異生受損),而非高血糖;並有肝酵素(AST、ALT)升高、高血氨、腦水腫、PT/PTT延長。故「高血糖」錯誤。　補充：雷氏症候群臨床為急性腦病變合併肝脂肪變性，出現嘔吐、意識改變、肝酵素升、血氨升、「低血糖(非高血糖)」；故「高血糖」之敘述錯誤。","options":{"A":"正確。肝臟酵素AST、ALT皆升高。","B":"錯誤(本題答案)。雷氏症候群是低血糖(非高血糖)。","C":"正確。腦水腫。","D":"正確。PT及PTT延長(肝合成凝血因子受損)。"},"sources":["新文京《兒科護理學》雷氏症候群","低血糖"]}},"112110-N4-77":{"quick":"肌肉失養症(Muscular Dystrophy)臨床表徵與處置不適當的是「病童站立時出現巴羅氏徵象(Barlow sign)」(B)。","detail":{"background":"裘馨氏肌失養症因缺乏肌縮蛋白(dystrophin),近端肌無力使病童站立時須以雙手「攀爬」自己身體撐起,稱「高爾氏徵象(Gower sign)」,而非Barlow徵象(Barlow是髖關節脫位檢查),故B不適當。其CPK、aldolase、AST升高;游泳是適合的運動。","options":{"A":"正確。因缺乏肌縮蛋白(dystrophin)致病。","B":"不適當(本題答案)。站立撐起是高爾氏徵象Gower(Barlow是髖脫位檢查)。","C":"正確。游泳是促進肌力的好運動。","D":"正確。CPK、aldolase、AST數值偏高。"},"sources":["新文京《兒科護理學》肌失養症","Gower"]}},"112110-N4-78":{"quick":"雷氏症候群(Reye syndrome)病因和症狀正確的是「可能與使用含阿斯匹靈(aspirin)退燒有關」(B)。","detail":{"background":"雷氏症候群是急性腦病變合併肝臟脂肪變性,常於病毒感染後使用aspirin而誘發,故兒童發燒不建議用aspirin。其血氨「升高」、血糖「降低」(低血糖),屬腦病變合併肝病變(非胰臟病變)。　補充：雷氏症候群「可能與兒童病毒感染期間使用含阿斯匹靈(aspirin)退燒藥有關」，致急性腦病變與肝脂肪變性；故兒童發燒避免用阿斯匹靈。","options":{"A":"錯。是腦病變合併肝病變(非胰臟病變)。","B":"正確。可能與使用含aspirin退燒有關。","C":"錯。血氨值上升(非下降)。","D":"錯。血糖降低(低血糖,非增加)。"},"sources":["新文京《兒科護理學》雷氏症候群","aspirin"]}},"113030-N4-49":{"quick":"6歲重症肌無力(myasthenia gravis)護理措施不適當的是「鼓勵加強費力的活動,有助改善肌肉力量」(A)。","detail":{"background":"重症肌無力為易疲勞性肌無力,活動後症狀加重,應「安排活動與休息交替、避免過度勞累」,而非鼓勵加強費力活動(會加重無力、甚至誘發肌無力危象)。其餘正確:複視時防跌倒、觀察呼吸困難與痰液無法咳出(呼吸肌受累)、眼瞼下垂為最早症狀。","options":{"A":"不適當(本題答案)。應避免過勞(費力活動會加重無力)。","B":"適當。複視時需預防跌倒。","C":"適當。觀察呼吸困難或痰液不易咳出。","D":"適當。眼瞼下垂是最早出現的症狀。"},"sources":["新文京《兒科護理學》重症肌無力","避免過勞"]}},"114100-N4-50":{"quick":"9歲裘馨氏假肥大性肌失養症(Duchenne MD)護理指導最不適當的是「鼓勵張小弟參與高密度游泳活動,以增強肌肉張力」(B)。","detail":{"background":"裘馨氏肌失養症是進行性肌無力,適度運動(如一般游泳)可維持肌力、預防攣縮,但「高密度/高強度」運動會使已脆弱的肌肉過度疲勞、加速損傷,故不適當。其餘適當:彈性調整居家環境、每日胸部物理治療防肺炎、控制體重減少負荷。","options":{"A":"適當。因應疾病發展彈性調整居家環境。","B":"最不適當(本題答案)。高密度游泳會使肌肉過度疲勞(應適度,非高強度)。","C":"適當。每日胸部物理治療降低肺炎風險。","D":"適當。飲食計畫控制體重減少負荷。"},"sources":["新文京《兒科護理學》裘馨氏肌失養症","適度"]}},"114170-N4-27":{"quick":"自閉症(autism)病童行為表現錯誤的是「喜歡彈性多變的生活型態」(A)。","detail":{"background":"自閉症(自閉症類群障礙)核心特徵是社交溝通障礙、固著行為與興趣;病童偏好「固定、可預期、一致」的生活常規與環境,對改變適應困難,故「喜歡彈性多變的生活型態」錯誤。屬廣泛性發展障礙,常對特定事物有強烈依戀。","options":{"A":"錯誤(本題答案)。自閉症偏好固定常規(非彈性多變,改變會焦慮)。","B":"正確。有社交技巧障礙。","C":"正確。對特定固定事物有強烈依戀。","D":"正確。屬廣泛性發展遲緩/障礙。"},"sources":["新文京《兒科護理學》自閉症","固著"]}},"102110-N4-51":{"quick":"脊髓脊髓膜膨出(myelomeningocele)照護錯誤的是「以無菌乾紗布覆蓋於膨出的囊上,避免囊袋破裂」(B)。","detail":{"background":"脊髓脊髓膜膨出的膨出囊需以「無菌濕(生理食鹽水)紗布」覆蓋保持濕潤,避免乾燥龜裂或破裂導致感染與腦脊髓液滲漏;乾紗布會使囊乾裂。其餘正確:採俯臥(小坡度垂頭俯臥)避免壓迫囊、保持臀部會陰清潔防排泄物污染、監測頭圍與囟門壓力(防合併水腦)。","options":{"A":"正確。採小坡度垂頭俯臥避免壓迫膨出囊。","B":"錯誤(本題答案)。應用無菌濕紗布保持濕潤(乾紗布會使囊乾裂破裂)。","C":"正確。保持臀部會陰清潔避免排泄物污染膨出處。","D":"正確。監測頭圍與囟門壓力(防合併水腦)。"},"sources":["新文京《兒科護理學》脊髓膜膨出","濕紗布"]}},"103030-N4-79":{"quick":"成骨不全(osteogenesis imperfecta)醫療及護理指導錯誤的是「因骨骼脆弱易發生骨折,應儘量完全固定不動」(C)。","detail":{"background":"成骨不全因膠原蛋白缺陷致骨骼脆弱易骨折,但「完全固定不動」反而造成廢用性骨質疏鬆與肌肉萎縮、更易骨折。應在保護與活動限制下執行適度(主動)運動以維持骨密度與肌力。其餘正確:骨內固定加強長骨、脊椎固定桿矯正變形。","options":{"A":"正確。以骨內固定物加強長骨。","B":"正確。脊椎固定桿合併骨水泥矯正脊椎變形。","C":"錯誤(本題答案)。完全固定不動會致骨質疏鬆/肌萎縮、更易骨折(應適度活動)。","D":"正確。在活動限制下做主動運動防肌肉萎縮。"},"sources":["新文京《兒科護理學》成骨不全","適度活動"]}},"104100-N4-79":{"quick":"1歲脊髓脊髓膜膨出合併水腦,手術前應協助採取的臥位是「俯臥,維持頭腳同高的姿勢」(D)。","detail":{"background":"脊髓膜膨出術前須採「俯臥」避免壓迫膨出囊;因合併水腦,頭部不可低於身體(垂頭會增加顱內壓),故維持「頭腳同高」的水平俯臥。垂頭俯臥(頭低)、抬高床頭、仰臥(壓迫囊)皆不適當。　補充：脊髓脊髓膜膨出(myelomeningocele)合併水腦，術前應採「俯臥、頭腳同高」避免壓迫與牽扯膨出囊袋、保持囊袋濕潤無菌、預防破裂感染。","options":{"A":"錯。垂頭(頭低)俯臥會增加顱內壓(已合併水腦)。","B":"仰臥會壓迫膨出囊。","C":"側臥抬高床頭非標準術前臥位。","D":"正確。俯臥、維持頭腳同高(避免壓囊又不增顱內壓)。"},"sources":["新文京《兒科護理學》脊髓膜膨出","俯臥水平"]}},"105090-N4-44":{"quick":"13歲脊柱側彎住院2週護理措施較不合適的是「為小美訂定一份生活作息表」(A)。","detail":{"background":"青少年重視自主與參與,住院期間護理應「鼓勵其參與」活動安排與作息規劃,而非由護理師單方面「訂定」作息表(剝奪其自主性)。其餘合適:安排課業輔導維持學業、鼓勵參與身體活動、鼓勵同儕探視維持社交。　補充：長期住院青少年(13歲)護理應維持其自主、同儕互動與課業；「為其訂定生活作息表(由護理師主導)」剝奪自主、較不合適，宜協助其參與安排。","options":{"A":"較不合適(本題答案)。應鼓勵青少年參與規劃(非單方面替她訂作息表)。","B":"合適。安排課業輔導維持學業。","C":"合適。鼓勵參與身體活動安排。","D":"合適。鼓勵邀同學探視維持同儕關係。"},"sources":["新文京《兒科護理學》青少年","自主"]}},"106030-N4-78":{"quick":"出生6天脊髓脊髓膜膨出術後護理錯誤的是「提供安靜與昏暗的環境,以減少視聽覺刺激」(C)。","detail":{"background":"脊髓膜膨出術後護理重點是觀察神經功能與腦膜炎徵象、被動運動防攣縮、監測哭聲與頭圍(防合併水腦)。「提供昏暗環境減少視聽覺刺激」是顱內壓升高/腦膜炎或早產兒的措施,並非脊髓膜膨出術後常規,故C為不適切敘述。","options":{"A":"正確。觀察神經功能、評估腦膜炎徵象。","B":"正確。給予被動運動及按摩預防肢體攣縮。","C":"錯誤(本題答案)。脊髓膜膨出術後非常規提供昏暗環境(那是顱內壓/腦膜炎措施)。","D":"正確。監測哭聲與頭圍早期發現合併症(水腦)。"},"sources":["新文京《兒科護理學》脊髓膜膨出","術後"]}},"106110-N4-79":{"quick":"出生3天脊髓膜膨出合併水腦,手術前護理措施錯誤的是「維持垂頭俯臥姿勢,以利脊髓液回流」(A)。","detail":{"background":"合併水腦的脊髓膜膨出,術前採俯臥避免壓迫囊,但「垂頭(頭低)」會增加顱內壓,不利且危險,應維持頭腳同高的水平俯臥,故A錯誤。其餘正確:腿部外展預防髖脫位、軟質小孔奶嘴防吞入過多空氣、保持臀部會陰乾淨防糞便污染囊。","options":{"A":"錯誤(本題答案)。垂頭(頭低)俯臥會增加顱內壓(已合併水腦),應頭腳同高。","B":"正確。腿部外展預防髖關節脫位。","C":"正確。軟質小孔奶嘴餵食防吞入過多空氣。","D":"正確。維持臀部會陰乾淨減少糞便污染膨出囊。"},"sources":["新文京《兒科護理學》脊髓膜膨出","勿垂頭"]}},"106111-N4-78":{"quick":"12歲脊柱側彎護理措施及指導正確的是「若側彎程度不嚴重,建議羅妹妹多游泳,以預防惡化」(A)。","detail":{"background":"輕度脊柱側彎可藉運動(尤其游泳此對稱性、強化背肌的運動)延緩惡化;中度多用背架矯正(除洗澡外多須穿著、持續穿到骨骼成熟);追蹤以X光(Cobb角)而非每半年電腦斷層(輻射過高);應鼓勵正常參與活動,非禁止郊遊。","options":{"A":"正確。輕度側彎建議多游泳預防惡化。","B":"錯。追蹤用X光Cobb角(非每半年電腦斷層,輻射高)。","C":"錯。背架除洗澡睡覺外多須穿著(此敘述限定睡覺外不精確)。","D":"錯。應鼓勵正常活動(非禁止戶外郊遊)。"},"sources":["新文京《兒科護理學》脊柱側彎","游泳"]}},"111030-N4-78":{"quick":"13歲脊柱側彎30度,醫療及護理措施正確的是「需持續穿著背架直到骨成熟為止」(B)。","detail":{"background":"脊柱側彎約20~40度多以背架(矯具)保守治療,需「持續穿著直到骨骼成熟」以防惡化;背架原則上每天穿著多數時間(僅洗澡等短暫除下,非僅洗澡睡覺外);通常側彎>40~50度才考慮脊柱融合術;穿背架時不從事劇烈球類運動。","options":{"A":"背架原則上多數時間穿著(僅洗澡短暫除,此敘述限定不精確)。","B":"正確。需持續穿著背架直到骨骼成熟為止。","C":"錯。30度多保守治療(>40~50度才考慮脊柱融合術)。","D":"錯。穿背架時不從事劇烈球類運動。"},"sources":["新文京《兒科護理學》脊柱側彎","骨成熟"]}},"111030-N4-79":{"quick":"成骨不全(osteogenesis imperfecta)護理措施錯誤的是「鼓勵儘量固定不動以避免多重骨折」(A)。","detail":{"background":"成骨不全骨骼脆弱,但「儘量固定不動」會致廢用性骨質疏鬆與肌萎縮、反而更易骨折,應在保護下適度活動。其餘正確:用雙磷酸鹽降低骨折頻率、固定不動時於健側多做運動、骨髓內固定增強骨強度。　補充：成骨不全(osteogenesis imperfecta)膠原蛋白缺陷致骨脆易折、藍鞏膜、聽力障礙；護理應「輕柔搬動、避免不必要固定、適度活動防失用」；「儘量固定不動」會致骨質流失與攣縮、為錯誤。","options":{"A":"錯誤(本題答案)。固定不動致骨質疏鬆/肌萎縮、更易骨折(應適度活動)。","B":"正確。使用雙磷化合物(雙磷酸鹽)降低骨折頻率。","C":"正確。固定不動時於健側多做運動。","D":"正確。可做骨髓內固定增強骨的強度。"},"sources":["新文京《兒科護理學》成骨不全","適度活動"]}},"113100-N4-48":{"quick":"14歲脊柱側彎(scoliosis)疾病特性及臨床表徵錯誤的是「彎腰時,雙側背部呈現明顯的突峰」(A)。","detail":{"background":"脊柱側彎因脊椎旋轉,向前彎腰(Adams forward bend test)時呈現「單側」背部/肋骨隆起(rib hump),而非雙側對稱突峰,故A錯誤。其餘正確:站立時兩肩高度不一、用Cobb氏量角法評估嚴重度、骨盆傾斜。","options":{"A":"錯誤(本題答案)。彎腰時呈單側肋骨隆起(rib hump),非雙側突峰。","B":"正確。站立時兩邊肩膀高度不一。","C":"正確。用Cobb氏量角法評估側彎嚴重度。","D":"正確。骨盆傾斜。"},"sources":["新文京《兒科護理學》脊柱側彎","rib hump"]}},"113180-N4-28":{"quick":"成骨不全(osteogenesis imperfecta)相關敘述錯誤的是「需要限制任何活動」(C)。","detail":{"background":"成骨不全骨骼脆弱易骨折,但「限制任何活動」會致廢用性骨質疏鬆與肌萎縮、更易骨折,應在保護下進行適度活動與物理治療。其餘正確:藍色鞏膜為典型症狀、可能喪失聽力(聽小骨受累)、四肢短而彎曲呈弓形、肌張力減退。","options":{"A":"正確。藍色鞏膜為典型症狀之一。","B":"正確。可能因聽小骨受累而喪失聽力。","C":"錯誤(本題答案)。不應限制任何活動(會致骨質疏鬆/肌萎縮,應保護下適度活動)。","D":"正確。四肢極短彎曲呈弓形、肌張力減退。"},"sources":["新文京《兒科護理學》成骨不全","適度活動"]}},"114100-N4-32":{"quick":"6歲骨髓炎(osteomyelitis)護理措施不適當的是「患肢不需固定,鼓勵多活動,以利手術傷口引流」(D)。","detail":{"background":"急性骨髓炎患肢應「固定、休息」以減輕疼痛、防止病理性骨折與感染擴散,而非鼓勵多活動。其餘適當:出院後須繼續(口服)抗生素完成療程、進食高熱量高蛋白與維生素C促進癒合、評估傷口腫脹發熱觸痛。　補充：骨髓炎(osteomyelitis)護理應「固定患肢、休息制動」以減痛並防病灶擴散與病理性骨折、抬高患肢、依醫囑長期抗生素；「不需固定、鼓勵多活動」會加重發炎、為錯誤。","options":{"A":"適當。出院後須繼續口服抗生素完成療程。","B":"適當。進食高熱量、高蛋白及富含維生素C飲食。","C":"適當。評估傷口有無腫脹、發熱及觸痛。","D":"不適當(本題答案)。患肢應固定休息(非鼓勵多活動,防骨折與感染擴散)。"},"sources":["新文京《兒科護理學》骨髓炎","固定休息"]}},"101110-N4-39":{"quick":"下肢骨折上石膏後立即護理不恰當的是「敷石膏的肢體應平放,以便內外均能乾燥」(B)。","detail":{"background":"下肢骨折上石膏後應「抬高患肢」(高於心臟)以促進靜脈回流、減少腫脹,而非平放;濕石膏應自然風乾、用手掌(非指尖)托扶避免壓痕。其餘恰當:解釋剛上石膏會發熱(石膏硬化放熱)、確保邊緣平滑不刺激皮膚、評估末梢脈搏膚色溫度(循環)。","options":{"A":"恰當。解釋剛上石膏時會覺得溫熱(石膏硬化放熱)。","B":"不恰當(本題答案)。應抬高患肢(非平放)以減少腫脹。","C":"恰當。確保石膏邊緣平滑不刺激皮膚。","D":"恰當。評估敷石膏肢體末梢脈搏、膚色及溫度。"},"sources":["新文京《兒科護理學》石膏","抬高"]}},"102110-N4-78":{"quick":"下肢骨折上石膏出院護理指導不恰當的是「患肢可能會影響活動能力,應多臥床休息以免不適」(A)。","detail":{"background":"石膏固定期間應「鼓勵適度活動」未固定的關節與健側肢體,避免長期臥床導致關節僵硬、肌肉萎縮與循環不良,而非一味多臥床。其餘恰當:石膏內搔癢用扇子搧涼或輕拍(勿伸入物品抓癢)、弄濕自然風乾勿用吹風機、常檢查患肢顏色感覺運動。","options":{"A":"不恰當(本題答案)。應鼓勵適度活動(非多臥床,防關節僵硬肌萎縮)。","B":"恰當。石膏內搔癢用扇子搧涼或輕拍(勿伸物)。","C":"恰當。弄濕自然風乾,不可用吹風機加速。","D":"恰當。常檢查患肢顏色、感覺或運動能力。"},"sources":["新文京《兒科護理學》石膏","適度活動"]}},"102110-N4-79":{"quick":"出生3天出現歐氏徵象(Ortolani sign)代表「發展性髖關節發育不良」(A)。","detail":{"background":"歐氏(Ortolani)徵象:嬰兒下肢屈曲外展時,脫位的股骨頭滑回髖臼產生「喀答」聲,陽性代表發展性髖關節發育不良(DDH)。它是DDH的篩檢理學徵象,與肌肉萎縮、足內翻、肌肉炎無關。　補充：歐氏徵象(Ortolani sign)陽性(被動外展髖部時聽到/感到「喀」聲復位)代表「發展性髖關節發育不良(DDH)」；新生兒篩檢以Ortolani與Barlow測試。","options":{"A":"正確。Ortolani徵象代表發展性髖關節發育不良(DDH)。","B":"非肌肉萎縮症。","C":"非雙側足內翻。","D":"非肌肉炎攣縮。"},"sources":["新文京《兒科護理學》DDH","Ortolani"]}},"103100-N4-78":{"quick":"10歲頭側面撞傷、顳骨骨折、耳下腺撕裂、對聲音反應差,神經功能評估正確的是「進行眼底鏡檢查,觀察是否有視乳突水腫」(B)。","detail":{"background":"頭部外傷後可用眼底鏡觀察有無「視乳突水腫」(視神經盤水腫),為顱內壓升高的客觀指標。眼前庭(冷熱)測試在「顱底/顳骨骨折、鼓膜可能受損」時禁做(避免感染或誤判);娃娃眼觀察的是眼球共軛運動(非落日眼)。","options":{"A":"眼前庭反射在顳骨骨折/鼓膜受損時不宜貿然執行。","B":"正確。眼底鏡檢查觀察視乳突水腫(顱內壓升高指標)。","C":"熱(冷熱)測試在顳骨骨折/鼓膜受損時禁做。","D":"娃娃眼觀察眼球共軛運動(非落日眼)。"},"sources":["新文京《兒科護理學》頭部外傷","視乳突水腫"]}},"104030-N4-78":{"quick":"15歲診斷為腦膜炎,身體檢查會出現的徵象是「克爾尼格氏徵象(Kernig sign)」(D)。","detail":{"background":"腦膜炎會出現腦膜刺激徵象:Kernig徵象(屈髖伸膝有阻力疼痛)與Brudzinski徵象陽性。Ortolani、Galeazzi是發展性髖關節發育不良的徵象;Gower徵象是肌失養症站起時攀爬身體的表現,皆與腦膜炎無關。","options":{"A":"Ortolani徵象是髖脫位檢查(非腦膜炎)。","B":"Galeazzi徵象是髖脫位/下肢不等長(非腦膜炎)。","C":"Gower徵象是肌失養症(非腦膜炎)。","D":"正確。Kernig徵象是腦膜炎的腦膜刺激徵。"},"sources":["新文京《兒科護理學》腦膜炎","Kernig"]}},"104030-N4-79":{"quick":"8歲右前臂骨折上石膏出院護理指導錯誤的是「若不小心弄濕石膏,可以用烤燈烘乾」(B)。","detail":{"background":"石膏弄濕應「自然風乾」,不可用烤燈或吹風機加熱烘乾(熱會燙傷皮膚、使石膏受熱不均)。其餘正確:評估患肢膚色溫度(循環)、鼓勵使用健側手執行日常活動、若疼痛或有異味須就醫查感染。　補充：上石膏出院衛教：保持石膏乾燥清潔、抬高患肢消腫、觀察末梢循環(5P)、勿塞物抓癢；「弄濕石膏用烤燈烘乾」會燙傷且使石膏變質、為錯誤。","options":{"A":"正確。教導評估右前臂膚色和溫度。","B":"錯誤(本題答案)。弄濕石膏應自然風乾(不可用烤燈烘乾,會燙傷)。","C":"正確。鼓勵運用左(健)手執行日常活動。","D":"正確。疼痛或異味須就醫查感染。"},"sources":["新文京《兒科護理學》石膏","自然風乾"]}},"104100-N4-77":{"quick":"12歲疑似腦膜炎身體檢查宜進行的是「布魯辛斯基徵象(Brudzinski sign)」(B)。","detail":{"background":"疑似腦膜炎應檢查腦膜刺激徵象:Brudzinski徵象(頸前屈引發髖膝屈曲)與Kernig徵象。Ortolani、Galeazzi、Trendelenburg皆為髖關節相關檢查,與腦膜炎無關。　補充：疑似腦膜炎宜評估腦膜刺激徵象，包括頸部僵硬、「布魯辛斯基徵象(被動頸屈引髖膝屈曲)」與柯林氏徵象；確診以腰椎穿刺腦脊髓液檢查。","options":{"A":"Ortolani是髖脫位檢查(非腦膜炎)。","B":"正確。Brudzinski徵象用於評估腦膜炎。","C":"Trendelenburg徵象是髖外展肌力/髖病變檢查。","D":"Galeazzi徵象是下肢不等長/髖脫位檢查。"},"sources":["新文京《兒科護理學》腦膜炎","Brudzinski"]}},"105030-N4-52":{"quick":"足月巨嬰(4600g)自然產後鎖骨骨折,生產損傷錯誤的是「為其執行圍巾徵象(Scarf sign)之評估」(C)。","detail":{"background":"懷疑鎖骨骨折時,不應執行「圍巾徵象」(將手臂越過對側胸前)等會牽動患側肩部的動作,以免加重疼痛與位移。其餘正確:沿鎖骨可摸到骨擦感與裂隙、驚嚇反射患側手臂上舉不對稱、抱起時支持背臀避免從手臂處抱起。　補充：巨嬰自然產易因肩難產致「鎖骨骨折」(患側擁抱反射不對稱、觸痛腫脹)；護理避免牽扯患肢；「執行圍巾徵象(被動拉手臂過胸)」會牽動患側骨折、為錯誤。","options":{"A":"正確。沿鎖骨可摸到骨擦及裂開感。","B":"正確。驚嚇反射患側手臂上舉表現不對稱。","C":"錯誤(本題答案)。鎖骨骨折不應做圍巾徵象(牽動患肩加重傷害)。","D":"正確。抱起支持背臀,避免從手臂處抱起。"},"sources":["新文京《兒科護理學》鎖骨骨折","勿圍巾徵象"]}},"106111-N4-79":{"quick":"9歲左側腓骨骨折剛上石膏固定,護理措施錯誤的是「石膏未乾燥前,為減輕疼痛,可以將小妹的患肢放低」(B)。","detail":{"background":"骨折上石膏後應「抬高患肢」(高於心臟)以促進靜脈回流、減輕腫脹與疼痛;將患肢放低會加重腫脹與循環不良,故B錯誤。其餘正確:不用烤燈/吹風機加速乾燥、常檢查膚色溫度評估神經血管壓迫、依體能活動健側肢體。","options":{"A":"正確。不用烤燈或吹風機加速石膏乾燥。","B":"錯誤(本題答案)。應抬高患肢(非放低,放低會加重腫脹)。","C":"正確。常檢查左下肢膚色溫度評估神經血管壓迫。","D":"正確。返家後仍依體能活動健側肢體。"},"sources":["新文京《兒科護理學》石膏","抬高"]}},"107110-N4-51":{"quick":"10歲發燒頭痛頸背僵硬有腦膜炎徵象,不是腦膜炎徵象的是「歐氏徵象(Ortolani sign)」(A)。","detail":{"background":"腦膜炎的腦膜刺激徵象包括Kernig徵象、Brudzinski徵象,以及嚴重時的角弓反張(opisthotonos)。歐氏(Ortolani)徵象是發展性髖關節發育不良的檢查,與腦膜炎無關,故為本題答案。","options":{"A":"不是(本題答案)。Ortolani是髖脫位檢查(非腦膜炎徵象)。","B":"是。Kernig徵象。","C":"是。Brudzinski徵象。","D":"是。角弓反張(opisthotonos)。"},"sources":["新文京《兒科護理學》腦膜炎","Ortolani非"]}},"108020-N4-63":{"quick":"新生兒先天性梅毒敘述錯誤的是「早期症狀會造成軍刀狀脛骨及痙攣性麻痺」(D)。","detail":{"background":"軍刀狀脛骨(saber shin)、哈金森氏齒、間質性角膜炎等屬「晚期」先天性梅毒表現,非早期症狀。早期先天性梅毒可見病理性骨折(Wimberger徵象)、皮膚圓形丘疹(具傳染力)、肝脾腫大、黃疸、貧血與紅血球母細胞增多。","options":{"A":"正確。病理性骨折稱Wimberger徵象。","B":"正確。背臀皮膚圓形丘疹病灶具傳染力。","C":"正確。肝脾腫大、黃疸、貧血及紅血球母細胞增多。","D":"錯誤(本題答案)。軍刀狀脛骨是晚期表現(非早期症狀)。"},"sources":["新文京《兒科護理學》先天性梅毒","晚期"]}},"108020-N4-64":{"quick":"新生兒生產過程造成的鎖骨骨折護理措施錯誤的是「建議採趴睡姿勢,以利患部癒合」(B)。","detail":{"background":"鎖骨骨折新生兒不建議趴睡(且趴睡增加嬰兒猝死風險),也不利患部;應減少患側受壓與牽動。其餘正確:穿脫衣服採「患側先穿、健側先脫」減少牽動患肢、避免做圍巾徵象牽動患肩、抱起支持背臀避免從手臂處抱起。　補充：新生兒鎖骨骨折護理應「避免牽扯患肢、患側衣袖先穿、輕柔抱持」，多自行癒合；「採趴睡」會壓迫患部、增加風險且趴睡增SIDS風險、為錯誤。","options":{"A":"正確。穿脫衣服採患側先穿、健側先脫(減少牽動)。","B":"錯誤(本題答案)。不建議趴睡(增加猝死風險且不利)。","C":"正確。避免圍巾徵象(手肘越過對側鎖骨中線)。","D":"正確。抱起支持背臀,避免從手臂處抱起。"},"sources":["新文京《兒科護理學》鎖骨骨折","勿趴睡"]}},"108110-N4-76":{"quick":"5歲以下兒童跌倒,容易導致脫臼的部位是「髖部」(A)。","detail":{"background":"本題官方答案為髖部。幼兒(5歲以下)骨骼韌帶尚未成熟,跌倒易發生髖部脫位/受傷;另臨床上幼兒被牽拉手臂也常見「橈骨頭半脫位(保母肘)」。依官方此題選髖部(A)。　補充：5歲以下幼兒跌倒易致「髖部脫臼」；牽拉幼兒手臂亦易致橈骨小頭半脫位(保母肘)；幼兒韌帶鬆、關節未成熟易脫位。","options":{"A":"正確(官方答案)。5歲以下跌倒易致髖部脫臼。","B":"膝部脫臼較少見於幼兒跌倒。","C":"手肘(橈骨頭半脫位)多因牽拉非跌倒(本題以髖部為答)。","D":"腕部脫臼非幼兒跌倒最常見。"},"sources":["新文京《兒科護理學》脫臼","髖部"]}},"109110-N4-51":{"quick":"出生3天左臂活動受限、擁抱反射不對稱、兩肩不等高、局部觸痛腫脹,最可能是「鎖骨骨折」(A)。","detail":{"background":"新生兒鎖骨骨折是最常見的產傷骨折(尤巨嬰、肩難產),表現患側手臂活動減少、擁抱(Moro)反射不對稱、兩肩不等高、局部觸痛腫脹與骨擦感。橈骨、尺骨、肱骨骨折在新生兒產傷較少見。　補充：新生兒「左臂活動受限、擁抱反射不對稱、兩肩不等高、局部觸痛腫脹」最可能為生產時的「鎖骨骨折」(尤巨嬰、肩難產)；護理避免牽扯患肢、多自癒。","options":{"A":"正確。鎖骨骨折是最常見產傷骨折,符合此表現。","B":"橈骨骨折在新生兒產傷少見。","C":"尺骨骨折在新生兒產傷少見。","D":"肱骨骨折在新生兒產傷較少見(鎖骨最常見)。"},"sources":["新文京《兒科護理學》鎖骨骨折","產傷"]}},"109110-N4-78":{"quick":"發展性髖關節發育不良使用帕米利克背帶(Pavlik harness)護理不適當的是「2歲以上的病童,只需穿戴此背帶直到骨盆發育穩定就會痊癒」(B)。","detail":{"background":"Pavlik背帶用於「6個月以下」嬰兒,藉維持髖關節屈曲外展使股骨頭復位;2歲以上已無法用此背帶(須手術或人字形石膏),故B不適當。其餘正確:維持髖屈曲外展、在背帶正確位置做記號便於調整、保持背帶下皮膚清潔完整。","options":{"A":"正確。用於維持髖關節屈曲及外展。","B":"不適當(本題答案)。Pavlik用於6個月以下(2歲以上無法用此背帶)。","C":"正確。在背帶正確位置做記號便於調整。","D":"正確。維持背帶下皮膚清潔及完整性。"},"sources":["新文京《兒科護理學》DDH","Pavlik"]}},"110030-N4-77":{"quick":"12歲右脛腓骨骨折上石膏住院,護理措施錯誤的是「患肢未被石膏固定的上下關節儘量固定不動,避免疼痛」(C)。","detail":{"background":"石膏固定期間,未被固定的「鄰近關節應維持正常活動」,以防關節僵硬與肌肉萎縮,而非儘量不動。其餘正確:不用烤燈加速乾燥、評估患肢膚色指甲床顏色溫度(神經血管)、抬高患肢促靜脈回流。　補充：上石膏護理應「鼓勵未固定的上下關節適度活動」以維持關節功能與循環、抬高患肢、觀察5P；「未固定關節儘量固定不動」會致僵硬萎縮、為錯誤。","options":{"A":"正確。不可用烤燈加速石膏乾燥。","B":"正確。評估患肢膚色及指甲床顏色、溫度。","C":"錯誤(本題答案)。未固定的鄰近關節應維持活動(非固定不動,防僵硬萎縮)。","D":"正確。抬高敷石膏患肢促進靜脈回流。"},"sources":["新文京《兒科護理學》石膏","關節活動"]}},"110110-N4-27":{"quick":"新生兒髖關節脫臼的身體或姿勢表徵錯誤的是「膝關節屈曲時患部的股骨較長」(B)。","detail":{"background":"發展性髖關節脫位時,患側股骨頭向後上脫位,使「患側股骨顯得較短」(Galeazzi徵象:仰臥屈膝時患側膝部較低),而非較長,故B錯誤。其餘正確:大腿臀部皮膚皺褶不對稱、Ortolani徵象陽性、患側髖外展受限且有阻力。","options":{"A":"正確。大腿與臀部股縫皮膚皺褶不對稱。","B":"錯誤(本題答案)。患側股骨顯得較短(Galeazzi徵象),非較長。","C":"正確。Ortolani徵象為陽性。","D":"正確。外展患側髖部時受限且有阻力。"},"sources":["新文京《兒科護理學》DDH","股骨短"]}},"111030-N4-77":{"quick":"5個月發展性髖關節發育不良行髖部人字形石膏固定,出院護理不適當的是「當因石膏內皮膚發癢不適而哭鬧,協助以長竹棍伸入抓癢減輕不適」(B)。","detail":{"background":"石膏內搔癢「不可伸入任何物品(如竹棍)抓癢」,以免刮傷皮膚、引起感染或物品卡住;可用冷風(扇子/吹風機冷風)吹涼緩解。其餘適當:餵食採坐姿或抬高頭防嗆、多撫觸擁抱用玩具分散注意、常換尿布防糞便污染石膏。","options":{"A":"適當。餵食採坐姿或仰臥抬高頭預防受嗆。","B":"不適當(本題答案)。石膏內勿伸入竹棍抓癢(會刮傷感染);用冷風吹涼。","C":"適當。多撫觸擁抱、玩具分散注意減輕不適。","D":"適當。經常更換尿布防石膏受糞便污染。"},"sources":["新文京《兒科護理學》人字石膏","勿伸物"]}},"112180-N4-48":{"quick":"發展性髖關節發育不良護理措施錯誤的是「布萊安特氏(Bryant)牽引,是將雙腳與髖關節屈曲45度並向上做牽引」(A)。","detail":{"background":"布萊安特(Bryant)牽引用於較小幼兒的髖/股骨,是將雙下肢「髖關節屈曲90度」垂直向上牽引(臀部略離床面),而非45度,故A錯誤。其餘正確:Pavlik背帶維持髖屈曲外展、會走路後改用人字形石膏、6個月前是DDH治療黃金期。","options":{"A":"錯誤(本題答案)。Bryant牽引是髖關節屈曲90度(非45度)垂直牽引。","B":"正確。Pavlik背帶維持髖關節屈曲及外展。","C":"正確。開始走路後無法用吊帶,改用髖人字形石膏。","D":"正確。6個月以前為DDH治療黃金時期。"},"sources":["新文京《兒科護理學》DDH","Bryant 90度"]}},"113180-N4-50":{"quick":"單側性發展性髖關節發育不良(DDH)臨床表徵錯誤的是「仰臥,將髖部曲折成90度時,健肢膝部會降低」(C)。","detail":{"background":"Galeazzi徵象:仰臥屈髖屈膝90度時,「患側」股骨較短使「患側膝部降低」,而非健肢膝部降低,故C錯誤。其餘正確:臀部大腿皮膚皺褶左右不對稱、單腿站立時健側骨盆下傾(Trendelenburg)、外展患肢時出現喀答(Ortolani)聲。","options":{"A":"正確。臀部及大腿皮膚皺褶左右不對稱。","B":"正確。患肢單腿站立時健側髖部高度下傾(Trendelenburg)。","C":"錯誤(本題答案)。屈髖90度時是患側膝部降低(Galeazzi),非健肢。","D":"正確。患肢外展時出現卡嗒(click)聲(Ortolani)。"},"sources":["新文京《兒科護理學》DDH","Galeazzi"]}},"114170-N4-19":{"quick":"檢查新生兒髖關節先天發育不良,正確的方法是「執行巴羅操作法(Barlow maneuver),將大腿內收、膝部下壓,股骨頭會在關節囊內滑動,為異常現象」(D)。","detail":{"background":"Barlow操作法:髖屈曲時將大腿內收並向下加壓,若股骨頭可被推出髖臼(滑動/脫位感)為陽性異常。Ortolani則是外展時股骨頭滑回的喀答聲為異常。大腿臀部皺褶「不對稱」是異常(非正常);患側股骨「較短」(非較長)。","options":{"A":"錯。兩側皺褶不對稱是異常(非正常)。","B":"錯。Ortolani出現喀答聲是異常(非正常)。","C":"錯。患側股骨較短(非較長)。","D":"正確。Barlow操作法股骨頭可被推出滑動為異常現象。"},"sources":["新文京《兒科護理學》DDH","Barlow"]}},"114170-N4-48":{"quick":"8歲右肱骨骨折上石膏住院,最適當的護理措施是「患側未被石膏固定的關節,維持正常關節活動,減輕關節僵直」(B)。","detail":{"background":"石膏固定期間,未固定的鄰近關節應維持正常活動以防僵硬萎縮(B正確);出現蒼白麻痺是神經血管壓迫的急症徵象,應立即鬆解通報(非做等長運動);石膏表面灼熱點或滲液提示內部感染/壓瘡,須處理(非正常);弄濕應自然風乾(不可烤燈吹風機)。","options":{"A":"錯。蒼白麻痺是神經血管壓迫急症,應立即處理(非做等長運動)。","B":"正確。未固定的關節維持正常活動,減輕關節僵直。","C":"錯。石膏表面灼熱點或滲液提示感染/壓瘡(非正常)。","D":"錯。弄濕應自然風乾(不可用烤燈或吹風機)。"},"sources":["新文京《兒科護理學》石膏","關節活動"]}},"115030-N4-49":{"quick":"4歲右股骨骨折石膏治療,患肢循環和神經系統異常徵象不適當的是「瘀斑(purpura)」(D)。","detail":{"background":"石膏壓迫致神經血管損傷的警示徵象為「5P」:疼痛(Pain)、蒼白(Pallor)、脈搏消失(Pulselessness)、感覺異常(Paresthesia)、麻痺(Paralysis)。瘀斑(purpura)是出血/凝血問題的皮膚表現,並非石膏壓迫的5P神經血管徵象,故不適當。","options":{"A":"是5P。疼痛(pain)。","B":"是5P。脈搏減少(pulselessness)。","C":"是5P。感覺異常(paresthesia)。","D":"不適當(本題答案)。瘀斑(purpura)非石膏壓迫5P徵象。"},"sources":["新文京《兒科護理學》石膏","5P"]}},"102030-N4-31":{"quick":"待產婦臍帶脫垂時應避免採用的姿勢是「半坐臥式」(C)。","detail":{"background":"臍帶脫垂是急產科急症,須採能「減輕胎先露對臍帶壓迫」的姿勢:膝胸臥式、頭低臀高(垂頭仰臥)或下肢抬高側臥,使胎兒上移、減少壓迫,並盡速處置。半坐臥式會使胎頭下降壓迫臍帶、加重胎兒缺氧,故應避免。　補充：臍帶脫垂時應避免增加臍帶受壓的姿勢，宜採「膝胸臥位或頭低臀高(Trendelenburg)」減壓；「半坐臥」會增加胎頭對臍帶的壓迫、應避免。","options":{"A":"可用。膝胸臥式減輕臍帶壓迫。","B":"可用。垂頭仰臥(頭低臀高)減輕壓迫。","C":"應避免(本題答案)。半坐臥式使胎頭下壓臍帶、加重缺氧。","D":"可用。下肢抬高側臥減輕壓迫。"},"sources":["新文京《產科護理學》臍帶脫垂","頭低臀高"]}},"102110-N4-8":{"quick":"孕婦服用葉酸減少胎兒腦神經管缺損,效果較佳的時機是「妊娠第一期」(A)。","detail":{"background":"神經管在受孕後約3~4週(第一孕期早期)閉合,故葉酸補充以「懷孕前至第一孕期」最有效,可預防神經管缺損(無腦兒、脊柱裂)。第二、三孕期或整個孕期補充已錯過神經管閉合關鍵期。　補充：葉酸於「懷孕前及妊娠第一期(前12週、神經管閉合期)」補充效果最佳，可降低胎兒神經管缺損(脊柱裂、無腦兒)風險；故宜備孕期即開始補充。","options":{"A":"正確。妊娠第一期(及孕前)補充葉酸效果最佳。","B":"第二期已過神經管閉合期。","C":"第三期已過關鍵期。","D":"整個懷孕期非最佳(關鍵在孕前~第一期)。"},"sources":["新文京《產科護理學》葉酸","第一期"]}},"102110-N4-16":{"quick":"待產婦暈眩、嘴唇麻刺感(換氣過度),最佳措施是「教導以手拱成杯狀,摀著口鼻緩慢呼吸」(A)。","detail":{"background":"待產時焦慮致換氣過度(過度呼吸排出過多CO2),引起呼吸性鹼中毒,出現暈眩、口唇與肢端麻刺。處置是減少CO2流失:以雙手拱成杯狀或紙袋罩口鼻、緩慢呼吸,重新吸回CO2即可緩解。　補充：待產婦換氣過度致呼吸性鹼中毒，最佳措施為「以手拱成杯狀摀口鼻緩慢呼吸(或用紙袋)」，重複吸入呼出的二氧化碳以矯正鹼中毒、緩解麻刺與頭暈。","options":{"A":"正確。雙手拱杯罩口鼻緩慢呼吸(重吸CO2)緩解換氣過度。","B":"促進睡眠非當下緩解換氣過度的措施。","C":"非脫水所致(是換氣過度排CO2)。","D":"抬高下肢處理低血壓,非換氣過度。"},"sources":["新文京《產科護理學》換氣過度","重吸CO2"]}},"102110-N4-31":{"quick":"子宮鏡切除子宮內頸息肉術後護理正確的是「若發生子宮痙攣疼痛,可依醫囑予鎮痛劑」(A)。","detail":{"background":"子宮鏡術後可能有輕微子宮痙攣痛,可依醫囑給鎮痛劑;術中灌流氣體可能致輕微肩痛,採平躺休息多會緩解(非半坐臥);術後禁慾與陰道塞條期間依醫囑(一般約1~2週、非3個月、且不放衛生棉條以防感染)。　補充：子宮鏡切除息肉術後護理：觀察陰道出血、子宮痙攣痛可依醫囑給鎮痛劑、注意感染與穿孔徵象、衛教少量出血為正常；維持舒適與監測併發症。","options":{"A":"正確。子宮痙攣疼痛可依醫囑給鎮痛劑。","B":"肩痛(灌流氣體)多平躺休息緩解(非半坐臥)。","C":"術後禁慾期一般約1~2週(非3個月)。","D":"不放陰道衛生棉條(以防感染)。"},"sources":["新文京《產科護理學》子宮鏡","鎮痛"]}},"102110-N4-40":{"quick":"子宮頸擴張內膜刮除術(D&C)、陰道置紗布,術後護理指導正確的是「術後最初2天有少量陰道出血是正常的」(A)。","detail":{"background":"D&C術後最初1~2天有「少量」陰道出血屬正常;若劇烈痙攣痛或大量出血則異常須就醫;陰道紗布由醫護於指定時間取出(非等不出血自行取出);術後一段時間內避免坐浴、盆浴與性行為以防感染。　補充：子宮頸擴張內膜刮除術(D&C)後護理：陰道置紗布按時取出、術後最初1~2天少量陰道出血為正常、觀察大量出血與發燒(感染)、避免性行為與盆浴。","options":{"A":"正確。術後最初2天有少量陰道出血是正常。","B":"劇烈痙攣痛非正常(應就醫)。","C":"陰道紗布由醫護取出(非自行等不出血才取)。","D":"術後一段時間避免坐浴(以防感染)。"},"sources":["新文京《產科護理學》D&C","少量出血"]}},"103100-N4-72":{"quick":"1個月先天性甲狀腺功能低下(congenital hypothyroidism)正確的是「不容易餵食,體重增加緩慢」(B)。","detail":{"background":"先天性甲狀腺功能低下因代謝低下,表現餵食困難、活動少、嗜睡、便秘、體溫低、生理性黃疸延長、體重增加緩慢;出生體重多正常或偏大(非偏低);須「儘早(新生兒篩檢陽性即開始)」補充甲狀腺素,愈早治療愈能避免智能遲緩(非等6~12個月)。","options":{"A":"出生體重多正常或偏大(非偏低)。","B":"正確。代謝低下致不易餵食、體重增加緩慢。","C":"多嗜睡安靜、少哭(非好動愛哭)。","D":"錯。應儘早(篩檢陽性即)治療,愈早愈能避免智能遲緩(非等6~12個月)。"},"sources":["新文京《兒科護理學》先天性甲低","早治療"]}},"104030-N4-5":{"quick":"絨毛膜取樣術無法檢查出的胎兒異常是「中樞神經管缺損」(A)。","detail":{"background":"絨毛膜取樣(CVS)取胎盤絨毛做染色體與基因分析,可檢出染色體異常(唐氏症)、單基因遺傳病(地中海貧血、G-6-PD)。神經管缺損(無腦、脊柱裂)須靠母血/羊水甲型胎兒蛋白(AFP)與超音波偵測,CVS無法檢出。","options":{"A":"正確(無法)。神經管缺損靠AFP與超音波(CVS無法檢出)。","B":"CVS可檢出地中海型貧血(基因)。","C":"CVS可檢出G-6-PD(基因)。","D":"CVS可檢出唐氏症(染色體)。"},"sources":["新文京《產科護理學》絨毛膜取樣","AFP"]}},"105030-N4-69":{"quick":"副甲狀腺功能低下症病童照護錯誤的是「鼓勵攝取高纖食物,改善便秘症狀」(D)。","detail":{"background":"副甲狀腺功能低下致「低血鈣」,出現手足搐搦、喉頭痙攣、抽搐。照護應監測抽搐並防二次傷害、減少聲光刺激(防誘發抽搐)、監測呼吸防喉頭痙攣致呼吸困難,並補充鈣質。「高纖改善便秘」與低血鈣處置無關、非此症照護重點(且高纖可能影響鈣吸收),故D錯誤。","options":{"A":"正確。監測抽搐並避免二次傷害。","B":"正確。減少周圍聲光刺激(防誘發抽搐)。","C":"正確。監測呼吸型態防喉頭痙攣致呼吸困難。","D":"錯誤(本題答案)。重點是補鈣防低血鈣抽搐(非鼓勵高纖改善便秘)。"},"sources":["新文京《兒科護理學》副甲低","低血鈣"]}},"105090-N4-26":{"quick":"新生兒身體評估錯誤的是「鼻尖的小白點為粟粒疹,出生後3~5天即會消失」(B)。","detail":{"background":"新生兒鼻尖小白點是粟粒疹(milia,皮脂腺阻塞),約「2~4週」才會自行消失,而非3~5天。其餘正確:外耳低於眼外眥可能染色體異常、乳頭白色分泌物受母體雌性素影響、Ortolani聽見喀答聲表示髖脫位。","options":{"A":"正確。外耳翼頂點低於眼外眥可能染色體異常。","B":"錯誤(本題答案)。粟粒疹約2~4週消失(非3~5天)。","C":"正確。乳頭白色分泌物受母親雌性素影響。","D":"正確。Ortolani聽見喀答聲表示髖關節脫臼。"},"sources":["新文京《兒科護理學》新生兒評估","粟粒疹"]}},"106111-N4-5":{"quick":"孕期葉酸攝取護理指導錯誤的是「豆類是葉酸最佳來源之一」(C)?——本題答C。","detail":{"background":"本題官方答案為C。葉酸最佳來源是「深綠色蔬菜」(菠菜、蘆筍)、肝臟、柑橘等,豆類雖含葉酸但非「最佳來源之一」的代表(官方以C為錯誤敘述)。其餘正確:孕前即可開始補充、可預防胎兒脊柱裂、葉酸易受高溫與紫外線破壞須注意保存。","options":{"A":"正確。懷孕前可開始補充葉酸。","B":"正確。孕期葉酸可預防胎兒脊柱裂。","C":"錯誤(本題答案)。葉酸最佳來源是深綠色蔬菜(官方判豆類非最佳來源之一)。","D":"正確。葉酸易受高溫和紫外線破壞,須注意保存。"},"sources":["新文京《產科護理學》葉酸","深綠蔬菜"]}},"108020-N4-54":{"quick":"青少年憂鬱症的治療與處置正確的是「可多攝取多醣類、奶製品、魚油及維生素的食物」(C)。","detail":{"background":"青少年憂鬱症藥物以「SSRI(選擇性血清素再吸收抑制劑)」為首選(非三環抗鬱劑,後者副作用多);電氣痙攣治療(ECT)用於嚴重、難治、有立即危險者(非輕度);治療應「正視並處理」其人際與壓力議題(非避免);飲食可攝取多醣、奶製品、魚油(Omega-3)、維生素有助情緒。","options":{"A":"錯。青少年憂鬱首選SSRI(非三環抗鬱劑)。","B":"錯。ECT用於嚴重難治者(非輕度)。","C":"正確。可多攝取多醣、奶製品、魚油及維生素。","D":"錯。應正視處理人際困擾(非避免聚焦)。"},"sources":["新文京《兒科護理學》青少年憂鬱","SSRI"]}},"108020-N4-76":{"quick":"副甲狀腺功能低下(Hypoparathyroidism)兒童的臨床表徵正確的是「喉部肌肉痙攣及喘鳴現象」(C)。","detail":{"background":"副甲狀腺功能低下致「低血鈣、高血磷」,出現手足搐搦、喉頭/喉部肌肉痙攣與喘鳴、抽搐、Chvostek與Trousseau徵象陽性。血鈣低於正常(非12~15的高值)、血磷升高(非2.5~3.5的正常偏低);骨密度與骨流失非其典型(那較像副甲亢進)。","options":{"A":"錯。血鈣偏低(非12~15mg/dL的高值)。","B":"錯。血磷升高(非2.5~3.5正常範圍)。","C":"正確。低血鈣致喉部肌肉痙攣及喘鳴。","D":"大量鈣流失骨密度不足是副甲亢進(非低下)。"},"sources":["新文京《兒科護理學》副甲低","喉痙攣"]}},"108110-N4-45":{"quick":"1歲主動脈狹窄症(coarctation of the aorta)不是其症狀的是「肺血管阻力升高而有發紺現象」(B)。","detail":{"background":"主動脈狹窄是主動脈弓狹窄,造成狹窄前(上半身)血壓高、狹窄後(下半身)血流少:上肢血壓比下肢高、股動脈搏動微弱或摸不到、頭痛暈眩(上身高壓)、下肢冰冷。它是「非發紺型」心臟病,不會因肺血管阻力升高而發紺,故B不是其症狀。","options":{"A":"是症狀。上肢血壓比下肢高。","B":"不是(本題答案)。COA是非發紺型,不會肺阻力升高發紺。","C":"是症狀。上身高壓致頭痛、暈眩。","D":"是症狀。股動脈搏動微弱甚至摸不到。"},"sources":["新文京《兒科護理學》主動脈狹窄","非發紺"]}},"109110-N4-43":{"quick":"台灣發展遲緩早期療育,主要負責協調整合與管理的窗口是「兒童早期療育通報轉介中心」(A)。","detail":{"background":"我國發展遲緩兒童早期療育流程:發現→「通報轉介中心」(負責通報、轉介、個案管理與資源協調整合)→聯合評估中心(評估診斷)→療育服務。故協調整合與管理的窗口是「通報轉介中心」。　補充：台灣發展遲緩兒童早期療育的「通報轉介中心」為主要協調整合與個案管理窗口，負責通報、轉介、聯繫評估與療育資源、追蹤服務。","options":{"A":"正確。通報轉介中心負責協調整合與個案管理。","B":"聯合評估中心負責評估診斷(非協調窗口)。","C":"衛生局非個案協調整合窗口。","D":"早期療育中心提供療育服務(非協調窗口)。"},"sources":["早期療育","通報轉介中心"]}},"110030-N4-2":{"quick":"產婦接受腰椎硬膜外麻醉可能發生的合併症錯誤的是「胎兒心跳變異性增加」(B)。","detail":{"background":"硬膜外麻醉常見合併症:母體低血壓(交感神經阻斷致血管擴張)、脊髓性頭痛(硬脊膜被穿破時)、排尿困難(膀胱感覺受抑)。母體低血壓會使胎盤灌流下降,導致胎兒心跳變異性「降低」而非增加,故B錯誤。　補充：腰椎硬膜外麻醉產婦可能合併症為低血壓、頭痛、尿瀦留、發抖、局部感染；可致「胎兒心跳變異性『下降』(因母體低血壓)」；「變異性增加」之敘述錯誤。","options":{"A":"正確。低血壓(交感阻斷)。","B":"錯誤(本題答案)。母體低血壓致胎兒心跳變異性降低(非增加)。","C":"正確。脊髓性頭痛。","D":"正確。排尿困難。"},"sources":["新文京《產科護理學》硬膜外麻醉","低血壓"]}},"110030-N4-49":{"quick":"兒童常用鴉片類製劑(opioids)疼痛處置正確的是「此類藥物適用於兒童中度至重度的疼痛」(A)。","detail":{"background":"鴉片類(如morphine)作用於中樞鴉片受體,適用於「中度至重度」疼痛;其副作用為呼吸抑制、便秘、嗜睡、噁心(非胃潰瘍/腎炎,那是NSAID);抑制前列腺素合成的是NSAID(非鴉片);與雷氏症候群有關的是aspirin(非morphine)。","options":{"A":"正確。鴉片類適用於兒童中度至重度疼痛。","B":"抑制前列腺素是NSAID(非鴉片類機轉)。","C":"胃潰瘍、出血性腎炎是NSAID副作用(非鴉片類)。","D":"與雷氏症候群有關的是aspirin(非morphine)。"},"sources":["新文京《兒科護理學》鴉片類","中重度痛"]}},"110030-N4-64":{"quick":"6個月心導管檢查前準備適當的是「確認禁食4~6小時」(B)。","detail":{"background":"心導管檢查前須確認禁食(約4~6小時,防嘔吐吸入)、標示並評估雙側下肢「足背動脈」搏動(以便術後對照,非鼠蹊部脈搏最強處標記)、術前可依需要給鎮靜劑、應測量四肢血壓含下肢(非避免測下肢)。　補充：心導管檢查前準備：確認「禁食4~6小時」(防麻醉嘔吐吸入)、評估過敏與凝血、記錄基礎生命徵象與末梢脈搏、向家屬說明流程；屬侵入性檢查需簽同意書。","options":{"A":"錯。應評估並可測下肢血壓(非避免測量)。","B":"正確。確認禁食4~6小時。","C":"應標示足背動脈搏動處(非鼠蹊部脈搏最強處)。","D":"術前可依需要給鎮靜劑(此敘述不符)。"},"sources":["新文京《兒科護理學》心導管","禁食"]}},"110030-N4-76":{"quick":"膀胱輸尿管逆流(VUR)初期臨床表徵正確的是「排尿疼痛有灼熱感」(A)。","detail":{"background":"膀胱輸尿管逆流常因反覆泌尿道感染而被發現,初期表現為泌尿道感染症狀:排尿疼痛灼熱、頻尿、發燒、尿液混濁等。無尿意感、凹陷性水腫、血脂上升並非VUR的初期表現。　補充：膀胱輸尿管逆流(VUR)初期常以「反覆泌尿道感染(排尿疼痛灼熱、發燒)」表現；逆流使尿液與細菌上行、易腎盂腎炎與腎瘢痕；以VCUG診斷分級。","options":{"A":"正確。排尿疼痛灼熱感(泌尿道感染表現)。","B":"無尿意感非VUR初期表現。","C":"下肢凹陷性水腫是腎病症候群(非VUR)。","D":"血脂/三酸甘油脂上升是腎病症候群(非VUR)。"},"sources":["新文京《兒科護理學》VUR","UTI"]}},"110110-N4-25":{"quick":"剖腹產(腰椎硬膜外麻醉)術後姿勢及護理指導最適當的是「協助左側躺,以增加子宮的血液循環」(D)?——本題答D。","detail":{"background":"本題官方答案為D。產後協助「左側躺」可避免增大子宮壓迫下腔靜脈,促進靜脈回流與子宮胎盤(及全身)血液循環。硬膜外(非脊髓)麻醉一般不需嚴格平躺8小時;垂頭仰臥、辛氏臥位非此情境最適當的術後護理指導。　補充：剖腹產(硬膜外麻醉)術後宜「協助左側臥」——減少子宮對下腔靜脈與主動脈的壓迫(仰臥低血壓症候群)、增加子宮胎盤血流與靜脈回流。","options":{"A":"垂頭仰臥非剖腹產術後最適當姿勢。","B":"硬膜外麻醉一般不需嚴格平躺8小時(脊髓麻醉才較需注意頭痛)。","C":"辛氏臥位非此情境最適當。","D":"正確(本題答案)。左側躺可促進(子宮)血液循環、避免壓迫下腔靜脈。"},"sources":["新文京《產科護理學》產後","左側臥"]}},"111030-N4-24":{"quick":"脊髓阻斷麻醉剖腹產後,主訴起床時頭很痛、躺下緩解,適當的護理指導是「說明是腦脊髓液不平衡,建議暫時頭不抬高平躺並補充水分」(B)。","detail":{"background":"脊髓(蛛網膜下腔)麻醉若硬脊膜被穿破,腦脊髓液滲漏致低壓性「姿勢性頭痛」(坐起加劇、平躺緩解)。處置:平躺休息(暫不抬高頭)、補充水分(增加腦脊髓液生成)、必要時硬膜外血液貼片。其與低血糖、麻藥代謝、焦慮無關。","options":{"A":"非低血糖所致(是腦脊髓液滲漏)。","B":"正確。腦脊髓液不平衡致姿勢性頭痛,平躺並補充水分。","C":"非單純麻藥代謝(是腦脊髓液滲漏)。","D":"非焦慮所致(典型姿勢性頭痛)。"},"sources":["新文京《產科護理學》脊髓麻醉","姿勢性頭痛"]}},"112030-N4-66":{"quick":"10歲主動脈狹窄(COA)入院可能臨床表徵不適當的是「下肢比上肢血壓高20mmHg」(A)。","detail":{"background":"主動脈狹窄使狹窄前(上半身)血壓高、狹窄後(下半身)血流少,故是「上肢血壓比下肢高」而非下肢比上肢高,A不適當。其餘符合:股動脈搏動微弱、上身高壓致頭痛暈眩、下肢血流少致腳冰冷。　補充：主動脈狹窄(COA)使狹窄後血流受阻，典型「上肢血壓高於下肢、上肢脈強下肢脈弱」；「下肢血壓比上肢高20mmHg」與COA表現相反、不適當。","options":{"A":"不適當(本題答案)。COA是上肢血壓高於下肢(非下肢高於上肢)。","B":"符合。股動脈搏動微弱。","C":"符合。上身高壓致頭痛、暈眩。","D":"符合。下肢血流少致腳部冰冷。"},"sources":["新文京《兒科護理學》主動脈狹窄","上肢高"]}},"112110-N4-4":{"quick":"懷孕期營養指導最適當的是「懷孕前及第一孕期注意葉酸的攝取,可預防胎兒神經管缺損」(A)。","detail":{"background":"葉酸在孕前及第一孕期補充可預防神經管缺損;咖啡因應「限量」而非絕對禁止;孕期水分應充足(非限制500~1000mL);第二孕期重點補充鐵與鈣(維生素K非孕期特別補充項目)。　補充：懷孕營養：「懷孕前及第一孕期補充葉酸」可預防胎兒神經管缺損；另需足夠鐵、鈣、碘與蛋白質、適度熱量增加、避免酒精與生食。","options":{"A":"正確。孕前及第一孕期補充葉酸預防神經管缺損。","B":"咖啡因應限量(非絕對不可)。","C":"孕期水分應充足(非限制500~1000mL)。","D":"第二孕期重點補鐵鈣(非特別補維生素K)。"},"sources":["新文京《產科護理學》孕期營養","葉酸"]}},"112110-N4-6":{"quick":"懷孕33週逐漸膨大的子宮使姿勢改變為「腰、背、脊柱向前方凸起」(B)。","detail":{"background":"孕晚期增大的子宮使身體重心「前移」,為維持平衡,孕婦腰椎前凸代償(脊柱向前凸、即腰椎前凸lordosis),常致下背痛;骨盆關節因鬆弛素而「鬆弛」(活動度增加,非更緊實);腹部肌肉被撐開張力「下降」。","options":{"A":"錯。重心往前移(非往後),腰椎前凸代償。","B":"正確。腰背脊柱向前凸起(腰椎前凸代償)。","C":"錯。腹部肌肉被撐開、張力下降(非增加)。","D":"錯。骨盆關節因鬆弛素而鬆弛(非更緊實)。"},"sources":["新文京《產科護理學》孕期姿勢","腰椎前凸"]}},"112110-N4-74":{"quick":"6歲下腹痛噁心嘔吐懷疑闌尾炎,最適當的評估是「羅氏徵象(Rovsing sign)」(C)。","detail":{"background":"闌尾炎評估常用Rovsing徵象(壓左下腹引起右下腹疼痛)、McBurney點壓痛、反彈痛(Blumberg徵象,但本題以Rovsing為答)。Kernig是腦膜炎、Murphy是膽囊炎徵象,皆與闌尾炎無關。","options":{"A":"Kernig徵象是腦膜炎(非闌尾炎)。","B":"Blumberg(反彈痛)雖也用於腹膜刺激,但本題以Rovsing為指定答案。","C":"正確。Rovsing徵象(壓左下腹引右下腹痛)評估闌尾炎。","D":"Murphy徵象是膽囊炎(非闌尾炎)。"},"sources":["新文京《兒科護理學》闌尾炎","Rovsing"]}},"112180-N4-42":{"quick":"兒童副甲狀腺功能低下症(hypoparathyroidism)錯誤的是「X光檢查發現骨質疏鬆」(C)。","detail":{"background":"副甲狀腺功能低下致低血鈣(常<7.0mg/dL)、高血磷,出現手足搐搦痙攣,飲食須避免高磷。骨質疏鬆/骨流失是副甲狀腺「亢進」(PTH過多溶骨)的表現,副甲低下X光不會出現骨質疏鬆,故C錯誤。　補充：副甲狀腺功能低下使血鈣低、血磷高，X光可見鈣化或骨密度正常/增加；「X光發現骨質疏鬆」之敘述錯誤(骨質疏鬆/纖維囊性骨炎屬副甲狀腺亢進)。","options":{"A":"正確。血鈣常小於7.0mg/dL(低血鈣)。","B":"正確。手足痙攣(搐搦)為常見症狀。","C":"錯誤(本題答案)。骨質疏鬆是副甲亢進(非低下)的表現。","D":"正確。避免食用含高磷食物。"},"sources":["新文京《兒科護理學》副甲低","低鈣高磷"]}},"113030-N4-24":{"quick":"逆行性射精敘述錯誤的是「接受精子捐贈進行人工授精為唯一的治療方式」(D)。","detail":{"background":"逆行性射精(精液逆流入膀胱)常見於脊髓損傷、糖尿病神經病變或骨盆腔/腹腔手術後。治療可用藥物(交感神經興奮劑收縮膀胱頸)、或自膀胱回收精子做人工生殖,並非「只能」接受精子捐贈,故D錯誤。　補充：逆行性射精指精液逆流入膀胱(因膀胱頸閉合不全，如糖尿病、術後)致不孕；治療含藥物與由尿液取精做人工生殖等多種方式；「捐精人工授精為唯一治療」之敘述錯誤。","options":{"A":"正確。常見於脊髓損傷或糖尿病神經病變。","B":"正確。可能為腹腔或骨盆腔手術後併發症。","C":"正確。精液逆流至膀胱。","D":"錯誤(本題答案)。可用藥物或自膀胱回收精子人工生殖(非只能精子捐贈)。"},"sources":["泌尿/生殖","逆行性射精"]}},"113180-N4-6":{"quick":"第三孕期下肢腫脹、傍晚鞋穿不下,護理指導不適當的是「穿著及膝彈性襪」(B)?——本題答B。","detail":{"background":"本題官方答案為B。孕期下肢水腫的處理:穿舒適軟質包鞋、做足背屈曲運動促循環、休息時左側臥減少子宮壓迫下腔靜脈。彈性襪宜選「全腿(大腿長度)」且晨起未腫前穿;「及膝」彈性襪在膝部形成束帶反阻礙回流,故官方判B不適當。","options":{"A":"適當。穿舒適軟質包鞋。","B":"不適當(本題答案)。及膝彈性襪膝部束帶反阻礙回流(宜全腿型、晨起穿)。","C":"適當。做足背屈曲運動促進循環。","D":"適當。臥床休息採左側臥減少子宮壓迫。"},"sources":["新文京《產科護理學》孕期水腫","彈性襪"]}},"114100-N4-27":{"quick":"1歲嬰兒誤食家用清潔劑(腐蝕性)、呼吸穩定但流口水咳嗽,較適當的護理是「保持呼吸道通暢,持續觀察意識狀態」(B)。","detail":{"background":"誤食腐蝕性(酸鹼)清潔劑時,「禁催吐、禁洗胃、禁中和」(催吐使腐蝕物再傷食道、中和反應產熱加重灼傷),處置以維持呼吸道通暢、觀察意識與灼傷徵象、盡速就醫。給水/牛奶與催吐皆不適當。　補充：誤食腐蝕性清潔劑「禁催吐、禁洗胃、禁中和劑」(會再次灼傷食道)，應保持呼吸道通暢、觀察意識與呼吸、評估口腔咽喉灼傷、儘速送醫；保留容器供辨識。","options":{"A":"錯。腐蝕性物質禁催吐(會再灼傷食道)。","B":"正確。保持呼吸道通暢、持續觀察意識狀態。","C":"腐蝕性物質不建議自行給牛奶中和。","D":"錯。禁用吐根糖漿催吐(腐蝕性禁催吐)。"},"sources":["新文京《兒科護理學》腐蝕性中毒","禁催吐"]}},"115030-N4-6":{"quick":"懷孕30週孕婦下背痛,可優先教導的運動是「骨盆搖擺運動」(B)。","detail":{"background":"孕期下背痛因腰椎前凸代償所致,「骨盆搖擺(傾斜)運動」可強化腹肌、減輕腰椎前凸與下背壓力,是最適合的緩解運動。骨盆底(凱格爾)運動是強化骨盆底肌(防尿失禁)、雙下肢抬舉與盤腿坐非緩解下背痛的優先運動。","options":{"A":"骨盆底陰道收縮(凱格爾)是防尿失禁(非緩解下背痛)。","B":"正確。骨盆搖擺運動減輕腰椎前凸與下背壓力。","C":"雙下肢抬舉非緩解孕期下背痛的優先運動。","D":"盤腿坐非緩解下背痛的優先運動。"},"sources":["新文京《產科護理學》孕期下背痛","骨盆搖擺"]}}},TO=["1腦膜炎與中樞神經感染", "2癲癇與熱性痙攣", "3顱內壓升高水腦症與腦室引流", "4頭部外傷與GCS", "5腦瘤", "6腦性麻痺", "7神經肌肉與神經發展疾病", "8脊柱側彎脊髓膨出成骨不全骨髓炎", "9骨折石膏與髖關節發育不良", "10母嬰產科與其他借題"],LEC={"1腦膜炎與中樞神經感染":{"html":"<p><b>腦膜炎CSF</b>:細菌性=混濁、<b>蛋白↑葡萄糖↓</b>、嗜中性球↑;病毒/無菌性=清澈、淋巴球↑、葡萄糖正常。<b>Brudzinski</b>=頸部前屈引發膝髖屈曲;<b>Kernig</b>=屈髖膝90度伸小腿有阻力。護理:抗生素≥10天、<b>減少聲光刺激</b>(畏光)、姿勢減痛。腰椎穿刺<b>側臥抱膝蝦米姿</b>、後平躺4~6小時。</p><p><b>日本腦炎</b>:三斑家蚊媒介、黃昏避外出、<b>不人傳人不需隔離</b>。腮腺炎最常見併發症=無菌性腦膜炎。</p>"},"2癲癇與熱性痙攣":{"html":"<p><b>發作護理</b>:<b>側臥、移開硬物、勿放壓舌板、勿約束、勿口對口人工呼吸</b>、觀察記錄。<b>失神性</b>=數秒凝視、無抽搐、無嗜睡。抗癲癇藥:<b>定時監測血中濃度、不可自行停藥</b>(防癲癇重積)、Dilantin牙齦增生(用生理食鹽水稀釋非葡萄糖)。</p><p><b>熱性痙攣</b>:6個月~5歲、發燒誘發、單純型全身性<15分鐘、<b>預後良好非終生服藥</b>。<b>生酮飲食</b>:高脂70~80%、低醣、限液體、酮體穩定神經傳導,用於頑固型癲癇。</p>"},"3顱內壓升高水腦症與腦室引流":{"html":"<p><b>IICP</b>:早期<b>噴射狀嘔吐</b>、晨起頭痛;晚期瞳孔放大、Cushing三徵(血壓升、心搏緩、呼吸不規則)、嬰兒囟門膨出落日眼。處置:<b>抬高床頭30度頭頸平直</b>(非頭低)、避免用力咳嗽解便、Mannitol快輸、過度換氣PaCO2降至27~30。IICP>15 mmHg。</p><p><b>V-P shunt</b>:術後觀察傷口紅腫(感染)、囟門膨出/噴射嘔吐(<b>分流阻塞=IICP再現</b>)、採對側臥避壓分流。早產兒IVH:抬高床頭、集中照護減打擾。</p>"},"4頭部外傷與GCS":{"html":"<p><b>GCS</b>=睜眼E(4-1)+語言V(5-1)+運動M(6-1),總分3~15,<b>≤8昏迷</b>。<b>去皮質僵直</b>=手臂屈曲向胸(皮質病變);<b>去大腦僵直</b>=四肢伸展內轉(中腦/腦幹,較嚴重)。頭部外傷護理:監測意識生命徵象、抬高床頭(非頭低臀高)、安靜柔和環境。兒童創傷指數(PTS)用<b>收縮壓</b>(非舒張壓)。</p>"},"5腦瘤":{"html":"<p><b>兒童腦瘤</b>多幕下(小腦/腦幹);症狀依位置:小腦→平衡協調障礙、<b>腦幹→吞嚥說話困難</b>。術後:抬高床頭、避免用力咳嗽解便。<b>放療皮膚</b>:避免日曬、勿冰熱敷/酒精/碘酒、勿自塗乳液。心理:<b>同理陪伴、鼓勵親子分享感受共同面對</b>(非隱瞞)。</p>"},"6腦性麻痺":{"html":"<p><b>腦性麻痺(CP)</b>:腦缺氧損傷致<b>非進行性</b>運動障礙、<b>智力多正常</b>。型態:痙攣型(錐體徑路,肌張力高伸展反射增剪刀步)、失調型(小腦,平衡差)、<b>手足徐動型(基底核/錐體外,不自主扭動)</b>。</p><p><b>進食</b>:坐起身體正中、三指下顎控制法、<b>食物放舌中後方</b>(非前方/後仰)、增稠防嗆。鼓勵獨立自我照顧社交、復健併入家庭、額外熱量。主要目標=增進運動功能預防殘障加重。</p>"},"7神經肌肉與神經發展疾病":{"html":"<p><b>重症肌無力</b>:乙醯膽鹼受體抗體、<b>活動後加重休息改善</b>、眼瞼下垂/複視常為最早、避免費力活動。<b>雷氏症候群</b>:急性腦病變+肝脂肪變性、病毒感染後用<b>aspirin</b>有關、嘔吐/肝酵素升/血氨升/低血糖、兒童勿用aspirin。</p><p><b>裘馨氏肌失養(Duchenne)</b>:性聯隱性、dystrophin缺乏、近端肌無力、小腿假性肥大、Gower徵象、游泳保肌力。<b>妥瑞氏</b>:18歲前抽動(眨眼/聳肩)、智能正常。<b>自閉症</b>:社交障礙、<b>固著抗拒改變</b>。小腦=協調平衡精細動作。</p>"},"8脊柱側彎脊髓膨出成骨不全骨髓炎":{"html":"<p><b>脊髓膜膨出</b>:神經管缺損、<b>俯臥+無菌濕紗布覆蓋囊</b>、腿外展防髖脫位、監測頭圍(合併水腦頭腳同高勿頭低)。<b>脊柱側彎</b>:Cobb角評估、兩肩不等高、<b>彎腰單側突起</b>、輕度游泳/中度背架穿到骨成熟/重度脊柱融合。</p><p><b>成骨不全</b>:膠原缺陷骨脆易折、藍色鞏膜、聽力喪失、<u>不可完全固定不動</u>(廢用使骨更脆)、適度運動。<b>骨髓炎</b>:抗生素療程長、高熱量高蛋白維生素C、<b>患肢固定制動</b>(非多活動)。</p>"},"9骨折石膏與髖關節發育不良":{"html":"<p><b>石膏護理</b>:剛上溫熱、翻動使乾、<b>勿烤燈吹風機</b>(自然風乾)、癢勿伸物抓、<b>抬高患肢</b>促回流、未固定關節維持活動、5P(疼痛/蒼白/脈搏弱/感覺異常/麻痺)。</p><p><b>DDH</b>:<b>Ortolani</b>(屈曲外展滑入卡嗒)、<b>Barlow</b>(內收下壓滑出)、皮膚皺褶不對稱、<b>患側股骨短(Galeazzi)</b>、外展受限;<b>Pavlik背帶</b>(6個月內黃金期)、走路後人字形石膏。<b>鎖骨骨折</b>(產傷):擁抱反射不對稱、患側先穿後脫、勿趴睡、勿測圍巾徵象。</p>"},"10母嬰產科與其他借題":{"html":"<p><b>產科</b>:臍帶脫垂避免半坐臥(用膝胸臥);<b>葉酸第一孕期</b>預防神經管缺損(深綠蔬菜為佳);換氣過度手拱杯狀摀口鼻;硬膜外麻醉合併症胎心變異性<b>減少</b>;脊髓性頭痛平躺補水;主動脈狹窄<b>上肢血壓>下肢非發紺型</b>;懷孕後期腰椎前凸下背痛(骨盆搖擺運動)。</p><p><b>其他</b>:副甲狀腺低下=低血鈣高血磷喉痙攣(非骨鬆);誤食腐蝕劑<b>勿催吐勿中和</b>;闌尾炎Rovsing徵象;鴉片類用中重度疼痛;青少年憂鬱SSRI首選;絨毛膜取樣無法查神經管缺損。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_c7_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
