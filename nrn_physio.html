感作用。","C":"正確：副交感使瞳孔收縮（縮瞳）。","D":"肝醣分解升血糖是交感作用。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"113030-N1-20":{"quick":"心臟的轉移痛（referred pain）出現在「左手臂內側」，故選A。","detail":{"background":"轉移痛（referred pain）：內臟痛覺經與體表相同脊髓節段的傳入纖維匯入，被大腦誤判為體表來源。心臟（心肌缺血/心絞痛）的傳入經T1–T5脊髓節，與左肩、左上臂內側、下頷的皮節重疊，故心肌缺血常表現「左胸、左肩、左手臂內側」轉移痛（A正確）。其他典型：肝膽→右肩、橫膈→肩部、闌尾早期→臍周。故左手臂內側轉移痛對應心臟。","options":{"A":"正確：心臟轉移痛常見於左手臂內側、左肩。","B":"肺臟轉移痛非典型左臂內側。","C":"肝臟轉移痛常在右肩。","D":"腎臟轉移痛常在腰背/鼠蹊。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"113030-N1-4":{"quick":"帕金森氏症的顫抖肇因於「腦內缺乏多巴胺（dopamine deficiency）」，故選A。","detail":{"background":"帕金森氏症（Parkinson disease）是黑質緻密部多巴胺神經元退化，造成紋狀體多巴胺不足，基底核運動迴路失衡，產生靜止性顫抖、僵直、動作遲緩。故顫抖肇因為「腦內缺乏多巴胺」（A），治療補多巴胺前驅物levodopa。並非多巴胺過高（B，過高反而可能舞蹈樣動作或精神症狀），也非血清素問題（C、D，血清素與憂鬱相關）。故選A。","options":{"A":"正確：帕金森氏症肇因於腦內多巴胺缺乏。","B":"多巴胺過高非帕金森氏，可能致異動症/精神症狀。","C":"血清素缺乏與憂鬱相關，非帕金森。","D":"血清素過高非帕金森氏病因。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"113100-N1-12":{"quick":"副交感降低心跳速率主要經「蕈毒鹼乙醯膽鹼受體（muscarinic）」媒介，故選D。","detail":{"background":"副交感（迷走神經）的節後傳導物質是乙醯膽鹼，作用於心臟竇房結的「蕈毒鹼（muscarinic, M2）受體」，經Gi降低cAMP、開K⁺通道使竇房結過極化、降低自律放電→心跳變慢（負性變時）。故媒介受體為muscarinic ACh receptor（D）。α1/β1是腎上腺素（交感）受體；尼古丁受體在自主神經節與神經肌肉接合（離子通道型），非心率調控的標的受體。","options":{"A":"α1是交感腎上腺素受體（血管收縮）。","B":"β1是交感受體（加快心率），非副交感。","C":"尼古丁受體在神經節/終板，非竇房結調控。","D":"正確：副交感經蕈毒鹼（M2）受體減慢心率。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"113100-N1-13":{"quick":"耳石復位術（Epley）治療BPPV，是恢復「橢圓囊（utricle）與球囊（saccule）」相關的耳石平衡功能，故選A。","detail":{"background":"良性陣發性姿勢性暈眩（BPPV）是橢圓囊（utricle）斑上的耳石（otoconia）脫落、跑入半規管，隨頭位改變刺激半規管造成短暫旋轉性暈眩。Epley耳石復位術以一系列頭位改變，把游離耳石「導回橢圓囊」，恢復前庭的正常重力/線加速度感應功能。題選「橢圓囊與球囊（utricle and saccule）」即前庭耳石器官（A正確）。鼓膜、砧骨屬中耳傳音、歐氏管調壓，與耳石平衡無關。故選A。","options":{"A":"正確：恢復橢圓囊與球囊（耳石器）功能。","B":"鼓膜屬中耳傳音，與耳石無關。","C":"砧骨屬聽小骨傳音。","D":"歐氏管調節中耳壓力。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"113100-N1-20":{"quick":"與吞嚥訊息傳導最直接相關的腦區是「腦幹」，故選A。","detail":{"background":"吞嚥（swallowing）的反射中樞位於「腦幹（延腦的孤束核與疑核）」，協調口咽期與食道期的肌肉序列（舌、咽、喉、食道），並與呼吸協調避免嗆入。故吞嚥中樞在腦幹（A）。下視丘管自主內分泌、小腦管協調、運動皮質啟動隨意動作（吞嚥的自主啟動雖有皮質參與，但「訊息傳導最直接」的反射中樞在腦幹）。故選腦幹。","options":{"A":"正確：吞嚥反射中樞在腦幹（延腦）。","B":"下視丘管自主與內分泌。","C":"小腦管運動協調。","D":"運動皮質啟動隨意動作，非吞嚥反射直接中樞。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"113180-N1-12":{"quick":"大腦枕葉損傷最可能造成「視覺障礙」，故選A。","detail":{"background":"枕葉（occipital lobe）含初級視覺皮質（V1，距狀溝周圍），是視覺訊息的最終處理區。枕葉損傷會造成視覺障礙，如皮質性失明、視野缺損（對側同向偏盲）、視覺失認等。故車禍枕葉損傷對應視覺障礙（A）。聽覺在顳葉、肢體運動在額葉運動皮質、運動性失語在額葉布洛卡區，皆非枕葉。","options":{"A":"正確：枕葉含視覺皮質，受損致視覺障礙。","B":"聽覺障礙與顳葉有關。","C":"肢體運動困難與額葉運動皮質有關。","D":"運動性失語與額葉布洛卡區有關。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"114030-N1-2":{"quick":"與耳朵功能異常「最無關」者是黃斑退化症（macular degeneration，屬眼睛），故選A。","detail":{"background":"內耳含耳蝸（聽覺）與前庭（平衡）：①梅尼爾氏症（Meniere）——內淋巴水腫，眩暈、耳鳴、聽損；②良性陣發性姿勢性暈眩（BPPV）——半規管耳石脫落致眩暈；③動暈症（motion sickness）——前庭與視覺訊息衝突致噁心暈眩。三者皆與耳朵（前庭/耳蝸）有關。而「黃斑退化症」是視網膜黃斑部退化造成中央視力喪失，屬「眼睛」疾病，與耳朵功能無關（A正確為例外）。故選A。","options":{"A":"正確：黃斑退化症屬眼睛視網膜，與耳朵無關。","B":"梅尼爾氏症是內耳疾病。","C":"BPPV是內耳前庭疾病。","D":"動暈症與前庭功能有關。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"114100-N1-13":{"quick":"不是下運動神經元損傷表徵者是「肌肉張力亢進（hypertonia）」，故選D。","detail":{"background":"下運動神經元（lower motor neuron, LMN）損傷（前角細胞、周邊神經）表徵：弛緩性癱瘓（flaccid paralysis，A）、肌張力「降低」、深部反射減弱或消失、肌束顫動（fasciculation，B）、明顯肌肉萎縮（atrophy，C）。而「肌肉張力亢進（hypertonia）」、反射亢進、巴賓斯基徵陽性是「上運動神經元（UMN）」損傷的痙攣性表徵（D為例外，非LMN）。故不屬LMN者為肌張力亢進。","options":{"A":"弛緩性癱瘓是LMN表徵。","B":"肌束顫動是LMN表徵。","C":"肌肉萎縮是LMN表徵。","D":"正確（為例外）：肌張力亢進是UMN表徵，非LMN。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"114100-N1-14":{"quick":"清醒狀態時「乙醯膽鹼神經元活性減弱」並非正確；清醒時膽鹼性與正腎上腺素、血清素神經元活性「增強」。本題答案為C，意指選項所述情境——清醒時應為這些覺醒系統活躍。","detail":{"background":"睡眠—清醒的神經化學：清醒（awake）由腦幹/前腦的「覺醒系統」維持，包括正腎上腺素（藍斑核）、血清素（縫核）、乙醯膽鹼（橋腦/基底前腦）、組織胺、orexin等神經元「活性高」；NREM深睡時這些覺醒系統活性下降、GABA抑制增強；REM時膽鹼性活性回升但正腎/血清素幾乎停止。題目問清醒時的活性表現，A（NE減弱）、B（血清素減弱）、D（GABA增強）皆為「睡眠」特徵而非清醒。本題標準答案為C。","options":{"A":"清醒時正腎上腺素神經元活性增強（非減弱）。","B":"清醒時血清素神經元活性增強（非減弱）。","C":"本題之答案選項（依官方答案鍵）。","D":"GABA增強是睡眠特徵，非清醒。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"114100-N1-17":{"quick":"視錐細胞（cone）基因突變所致的疾病是色盲（color blindness），故選B。","detail":{"background":"錐細胞（cone）含三種色素（紅、綠、藍視蛋白），負責明亮環境的彩色視覺與精細視力。色盲是錐細胞「視蛋白色素基因突變或缺失」（紅綠色盲多為X染色體隱性），使無法分辨某些顏色，屬錐細胞基因異常（B正確）。對比：散光（astigmatism）是角膜/水晶體屈光面不規則、弱視（amblyopia）是發育期視覺經驗剝奪、青光眼（glaucoma）是眼壓致視神經損傷，皆非錐細胞基因突變。故選色盲。","options":{"A":"散光是屈光面不規則，非錐細胞基因問題。","B":"正確：色盲是錐細胞視蛋白基因突變所致。","C":"弱視是發育期視覺剝奪。","D":"青光眼是眼壓致視神經損傷。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"114100-N1-20":{"quick":"引起最多唾液分泌的刺激是酸味，故選B。","detail":{"background":"唾液分泌受味覺與機械刺激調節，其中「酸味（如檸檬、醋）」是引起唾液分泌量最多的味覺刺激——酸性物質強烈刺激味蕾，反射性大量分泌稀薄唾液以稀釋與中和酸、保護口腔與牙齒。甜、鹹的刺激較弱，觸覺（機械）也能引起唾液但量不及酸味。故最多唾液者為酸味（B）。","options":{"A":"甜味刺激唾液量不如酸味。","B":"正確：酸味引起最多唾液分泌。","C":"鹹味刺激唾液量較少。","D":"觸覺可引起唾液但量不如酸味。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"114170-N1-14":{"quick":"不會出現在NREM睡眠的腦波是「β波」，故選B。","detail":{"background":"NREM（非快速動眼）睡眠各期腦波：N1（淺睡）出現θ波；N2出現睡眠紡錘波與K複合波（背景θ）；N3（深睡/慢波睡眠）出現δ波；入睡前放鬆閉眼可見α波。β波（高頻>13 Hz）是「清醒專注」時的腦波，「不會」出現在NREM睡眠（B正確為例外）。故NREM不會有β波。","options":{"A":"α波可見於入睡前/N1過渡。","B":"正確：β波是清醒專注腦波，不出現於NREM。","C":"θ波出現於N1/N2。","D":"δ波出現於N3深睡。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"115030-N1-3":{"quick":"思考解決問題時活性最高的腦區是額葉（frontal lobe），故選A。","detail":{"background":"額葉（frontal lobe）尤其「前額葉皮質（prefrontal cortex）」負責高級認知功能：思考、推理、計畫、問題解決、決策、工作記憶與執行控制。故思考如何解決問題時，額葉（前額葉）活性最高（A）。顳葉管聽覺與記憶語言理解、枕葉管視覺、頂葉管體感覺與空間，皆非問題解決的主控區。故選額葉。","options":{"A":"正確：額葉（前額葉）主管思考、推理與問題解決。","B":"顳葉管聽覺與記憶。","C":"枕葉管視覺。","D":"頂葉管體感覺與空間。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}}},TO=["P1神經與細胞生理", "P2肌肉生理", "P3心臟生理", "P4血管血壓生理", "P5血液生理", "P6呼吸生理", "P7腎臟生理", "P8體液電解質酸鹼", "P9消化生理", "P10內分泌生理", "P11生殖生理", "P12中樞感覺生理"],LEC={"P1神經與細胞生理":{"title":"P1 神經與細胞生理 複習講義","html":"<h3>一、靜止膜電位與動作電位</h3>\n<p>靜止膜電位主要由K⁺外漏與Na-K-ATP酶（3Na⁺出、2K⁺入，產電性）維持，接近K⁺平衡電位：神經元約−70mV、心室肌約−90mV。動作電位（全有全無）：閾值→電壓閘控<b>Na⁺通道</b>開啟去極化（上升支）→Na⁺通道去活化＋<b>K⁺通道</b>開啟再極化（下降支）→短暫過極化。河豚毒素（TTX）阻Na⁺通道→無法去極化。</p>\n<h3>二、不應期與傳導</h3>\n<p>絕對不應期（Na⁺通道去活化，無論刺激多強都不反應）確保動作電位單向傳導、不重疊。有髓鞘軸突行「跳躍式傳導」（蘭氏結間跳躍），速度遠快於無髓鞘；軸突越粗、髓鞘越厚傳導越快。周邊髓鞘由許旺細胞、中樞由寡突膠細胞形成。</p>\n<h3>三、突觸傳遞</h3>\n<p>化學性突觸：動作電位→末梢電壓閘控<b>Ca²⁺內流</b>→囊泡胞吐釋放傳遞物→與突觸後受體結合產生EPSP（去極化、興奮）或IPSP（過極化、抑制）→時間性與空間性加成決定是否引發動作電位。電性突觸（隙裂接合）離子直接流通、雙向快速無延遲。乙醯膽鹼、麩胺酸（興奮）、GABA/甘胺酸（抑制）、多巴胺、血清素為常見傳遞物。</p>\n<h3>四、細胞基礎</h3>\n<p>細胞以選擇性通透膜維持離子梯度。Na-K幫浦耗ATP維持高K⁺低Na⁺的胞內環境，是膜電位與續發性主動運輸（如腸腎葡萄糖共輸送）的動力來源。神經膠細胞（星形膠、寡突膠、微膠、室管膜）支持與保護神經元並構成血腦障壁。</p>"},"P2肌肉生理":{"title":"P2 肌肉生理 複習講義","html":"<h3>一、骨骼肌興奮收縮耦合</h3>\n<p>運動神經釋乙醯膽鹼→終板菸鹼受器→終板電位→肌膜動作電位→沿橫小管（T tubule）傳入→觸發肌漿網釋放<b>Ca²⁺</b>→Ca²⁺結合旋光素（troponin）→原肌凝蛋白移位露出結合位→橫橋循環。乙醯膽鹼酯酶分解ACh終止訊號。</p>\n<h3>二、肌絲滑動學說</h3>\n<p>粗（肌凝蛋白myosin）與細（肌動蛋白actin）肌絲互相滑動使肌節縮短：收縮時<b>I帶與H帶縮短、Z線靠近</b>，A帶（粗肌絲長度）不變。橫橋循環需ATP（用於橫橋脫離與再啟動），缺ATP致僵直（死後僵直）。</p>\n<h3>三、收縮型態與三種肌肉</h3>\n<p>單收縮加總→強直收縮（張力增加）。長度—張力關係：肌節在最適長度時重疊最佳、張力最大。三種肌肉：骨骼肌（橫紋、多核、隨意、神經控制）；心肌（橫紋、單核、有閏盤、自律、不隨意）；平滑肌（無橫紋、單核、緩慢持久、不隨意，靠Ca-鈣調素活化）。</p>\n<h3>四、能量供應</h3>\n<p>肌肉ATP來源：磷酸肌酸（即時）、無氧糖解（短時、產乳酸）、有氧氧化（長時、需氧）。運動時氧債於運動後償還。慢縮肌纖維（紅肌、富粒線體、耐久）vs 快縮肌纖維（白肌、爆發力強、易疲勞）。</p>"},"P3心臟生理":{"title":"P3 心臟生理 複習講義","html":"<h3>一、心臟電生理與傳導系統</h3>\n<p>傳導順序：<b>竇房結（SA node，主節律約60-100次/分）→房室結（AV node，延遲使心房先收縮充盈心室）→希氏束→左右束支→浦金氏纖維</b>。竇房結節律細胞有funny電流（If）自發去極化（約−60mV起），是心臟自律性來源。心室肌動作電位的<b>第2期高原期</b>由L型鈣通道Ca²⁺持續內流維持，使不應期長、避免強直收縮。</p>\n<h3>二、心電圖與心音</h3>\n<p>ECG：P波（心房去極化）、QRS（心室去極化，心房再極化被掩蓋）、T波（心室再極化）。心音：<b>S1＝房室瓣（二尖瓣＋三尖瓣）關閉、標誌收縮期始</b>（心尖最響）；<b>S2＝半月瓣（主動脈＋肺動脈瓣）關閉、標誌舒張期始</b>（心底最響）。</p>\n<h3>三、心動週期與心輸出量</h3>\n<p>心動週期：等容收縮→射血→等容舒張→充盈。心輸出量（CO）＝心搏量（SV）×心率（HR）。SV受前負荷（Frank-Starling：回心血量增→收縮增）、後負荷、心收縮力影響。</p>\n<h3>四、心臟調節</h3>\n<p>交感（β1受體）→加快心率、增收縮力；副交感（迷走、M2受體）→經竇房結減慢心率。心肌靜息時主要以脂肪酸β氧化供能、高度依賴持續冠脈供氧，故冠脈阻塞數分鐘即致缺血壞死。</p>"},"P4血管血壓生理":{"title":"P4 血管血壓生理 複習講義","html":"<h3>一、血流動力學</h3>\n<p>血流量Q＝壓力差ΔP÷阻力R。<b>Poiseuille定律：阻力與半徑四次方成反比</b>，故血流量∝半徑⁴——小動脈（阻力血管）藉收縮舒張微調即可大幅改變血流與血壓。血液黏滯度（紅血球比容）也影響阻力。</p>\n<h3>二、血壓與各段血管</h3>\n<p>主動脈與大動脈（彈性血管，緩衝脈壓）→小動脈（阻力血管，調節血流）→微血管（交換）→靜脈（容量血管，儲存約60%血量）。血壓最大壓降在小動脈。脈壓＝收縮壓−舒張壓，平均動脈壓≈舒張壓＋1/3脈壓。</p>\n<h3>三、血壓調節</h3>\n<p>短期：<b>頸動脈竇與主動脈弓壓力感受器</b>反射（血壓↑→反射性減慢心率、降血管張力）。長期：腎臟—體液（RAAS：血壓↓→腎素→血管張力素II收縮血管＋醛固酮保鈉保水→升血壓；ANP相反）。交感α1使血管收縮、β2與局部代謝產物（CO₂、腺苷）使血管舒張。</p>\n<h3>四、微血管交換與水腫</h3>\n<p>微血管液體交換受Starling力（微血管靜水壓推出、血漿膠體滲透壓拉回）。水腫成因：靜水壓升高（心衰、靜脈阻塞）、膠體滲透壓下降（低白蛋白）、淋巴阻塞、微血管通透性增加（發炎）。</p>"},"P5血液生理":{"title":"P5 血液生理 複習講義","html":"<h3>一、血液組成與紅血球</h3>\n<p>血液＝血漿（約55%，水91%＋蛋白＋電解質）＋血球（紅血球比容約45%）。紅血球無核、雙凹盤狀、含血紅素運氧，壽命約120天，於脾肝破壞。<b>紅血球生成素（EPO）由腎臟在缺氧時分泌</b>，刺激骨髓造血；慢性腎病致EPO不足而貧血。生成需鐵、葉酸、維生素B12（缺B12/葉酸→巨球性貧血、缺鐵→小球低色素）。</p>\n<h3>二、血紅素與氣體運送</h3>\n<p>氧合解離曲線呈S形；右移（CO₂↑、H⁺↑、溫度↑、2,3-DPG↑）利組織釋氧。CO₂運送：碳酸氫根（約70%）、碳醯胺基血紅素（約23%）、溶解（約7%）。一氧化碳與血紅素親和力極高致中毒。</p>\n<h3>三、止血與凝血</h3>\n<p>止血三步：血管收縮→血小板栓塞（黏附、活化、聚集）→凝血瀑布（內在＋外在路徑→凝血酶→纖維蛋白網）。維生素K依賴因子（II、VII、IX、X）。抗凝：肝素（增強抗凝血酶）、warfarin（抑維生素K）。纖維蛋白溶解（plasmin）清除血栓。</p>\n<h3>四、血型與免疫</h3>\n<p>ABO血型由紅血球表面抗原決定（O型萬能供血者、AB型萬能受血者，需考量Rh）。Rh陰性母親懷Rh陽性胎兒可致新生兒溶血。白血球（顆粒球嗜中性/嗜酸/嗜鹼、淋巴球、單核球）負責免疫防禦。</p>"},"P6呼吸生理":{"title":"P6 呼吸生理 複習講義","html":"<h3>一、肺容積與通氣</h3>\n<p>潮氣容積（TV）、肺活量（VC＝IRV＋TV＋ERV）、肺餘容積（RV，無法呼出）、肺總量（TLC）。<b>解剖無效腔（約150mL）</b>不參與氣體交換。<b>肺泡通氣量＝(潮氣容積−無效腔)×呼吸頻率</b>，才是有效通氣——淺快呼吸因無效腔占比高，肺泡通氣效率反而差。</p>\n<h3>二、呼吸力學</h3>\n<p>吸氣＝橫膈與外肋間肌收縮使胸腔擴大、肺內壓低於大氣壓而進氣（主動）；平靜呼氣為被動（彈性回縮）。肺順應性、表面張力（<b>肺泡表面活性物質由第二型肺泡細胞分泌、降低表面張力防肺泡塌陷</b>，早產兒缺乏致呼吸窘迫症）。</p>\n<h3>三、氣體交換與運送</h3>\n<p>肺泡—微血管氣體以擴散交換（分壓差驅動）。氧由肺泡入血、與血紅素結合運送；CO₂主要以碳酸氫根運送。通氣/灌流比（V/Q）匹配決定交換效率。</p>\n<h3>四、呼吸調節</h3>\n<p>延腦呼吸中樞（背側、腹側）與橋腦調節。<b>中樞化學感受器</b>對腦脊髓液CO₂/H⁺最敏感（主要調節）；周邊化學感受器（頸動脈體、主動脈體）對嚴重低血氧（PaO₂<60）反應。慢性肺病CO₂滯留者靠低氧驅動，給高濃度氧需謹慎。</p>"},"P7腎臟生理":{"title":"P7 腎臟生理 複習講義","html":"<h3>一、腎絲球過濾</h3>\n<p>腎元＝腎絲球＋腎小管。腎絲球過濾率（GFR）受腎絲球微血管靜水壓主導，由入球/出球小動脈口徑調節並有自我調節（肌源性＋管球回饋）。<b>菊糖（inulin）清除率＝GFR</b>（只過濾不分泌不再吸收）；PAH清除率估腎血漿流量。</p>\n<h3>二、腎小管再吸收與分泌</h3>\n<p><b>近曲小管（PCT）再吸收量最大（約65%鈉與水）</b>，葡萄糖與胺基酸在此100%再吸收（超過腎閾值180mg/dL才糖尿）。亨利氏環上行支主動運NaCl但不透水（逆流倍增建立髓質高滲透壓）。遠曲小管與集尿管精細調節：醛固酮促鈉再吸收/排鉀、ADH促水再吸收。</p>\n<h3>三、尿液濃縮稀釋</h3>\n<p>逆流倍增（亨利氏環）＋逆流交換（直血管）建立髓質滲透壓梯度。<b>ADH作用集尿管（AQP2）增水再吸收→濃縮尿</b>；缺ADH→尿崩症（大量稀釋尿）。排泄量＝過濾＋分泌−再吸收。</p>\n<h3>四、腎臟其他功能</h3>\n<p>調節血壓（RAAS、鈉水平衡）、酸鹼（排H⁺、再生HCO₃⁻）、紅血球生成（EPO）、活化維生素D（1-α羥化）、調節血鈣磷。腎衰竭時這些功能皆受損（貧血、骨病變、酸中毒、高血壓）。</p>"},"P8體液電解質酸鹼":{"title":"P8 體液電解質與酸鹼平衡 複習講義","html":"<h3>一、體液分布</h3>\n<p>全身水分約佔體重60%，分細胞內液（2/3）與細胞外液（1/3，含血漿與組織間液）。細胞內主要陽離子K⁺、外液主要Na⁺。滲透壓由溶質濃度決定，水隨滲透壓移動。</p>\n<h3>二、鈉鉀鈣調節</h3>\n<p>鈉（細胞外主陽離子，決定細胞外液量與血壓）由醛固酮、ANP、ADH調節。鉀（細胞內主陽離子，影響膜電位與心律）由醛固酮排泄調節，高/低血鉀皆致心律不整。鈣由PTH（升）、降鈣素（降）、維生素D（增腸吸收）調節，影響神經肌肉興奮性（低血鈣致抽搐）。</p>\n<h3>三、酸鹼平衡</h3>\n<p>正常動脈血pH 7.35–7.45。三道防線：<b>緩衝系統（碳酸氫根/碳酸最重要、即時）→肺（調CO₂，數分鐘）→腎（調HCO₃⁻與排H⁺，數小時至數天、最徹底）</b>。Henderson-Hasselbalch：pH取決於HCO₃⁻/PCO₂比值。</p>\n<h3>四、酸鹼異常</h3>\n<p>四型：呼吸性酸中毒（CO₂滯留，如換氣不足）、呼吸性鹼中毒（過度換氣）、代謝性酸中毒（HCO₃⁻減少，如腹瀉、腎衰、酮酸/乳酸）、代謝性鹼中毒（嘔吐失酸、利尿）。代償：肺對代謝性異常快速代償、腎對呼吸性異常緩慢代償。陰離子間隙助鑑別代謝性酸中毒病因。</p>"},"P9消化生理":{"title":"P9 消化生理 複習講義","html":"<h3>一、消化道分泌</h3>\n<p>胃腺細胞：<b>壁細胞（鹽酸＋內在因子，內在因子助迴腸吸收B12）、主細胞（胃蛋白酶原）、黏液頸細胞（黏液）、G細胞（胃泌素）、ECL細胞（組織胺）、D細胞（體抑素）</b>。鹽酸由質子幫浦（H-K-ATPase）分泌，受組織胺、乙醯膽鹼、胃泌素三路徑刺激（PPI、H2阻斷劑的藥理基礎）。</p>\n<h3>二、消化的三相調節</h3>\n<p>頭期（視覺嗅覺味覺→迷走副交感→預先分泌）、胃期（食物膨脹＋胃泌素）、腸期（食糜入十二指腸的回饋調節）。胃排空受十二指腸的酸度、脂肪、滲透壓回饋抑制。</p>\n<h3>三、肝膽胰</h3>\n<p>肝分泌膽汁（膽鹽乳化脂肪、膽紅素為血基質代謝產物），膽囊濃縮儲存，<b>CCK</b>（脂肪/蛋白刺激）促膽囊收縮與胰酶分泌、<b>胰泌素（secretin）</b>（酸刺激）促胰與膽管分泌富HCO₃⁻鹼性液中和胃酸。膽鹽經腸肝循環回收再利用。胰液含澱粉酶、脂解酶、蛋白酶原（以非活性形式分泌防自我消化）。</p>\n<h3>四、吸收與運動</h3>\n<p>小腸（絨毛、微絨毛增大表面積）是主要吸收處：醣類（單醣）、蛋白（胺基酸/小肽）、脂肪（乳糜微粒經淋巴）、水與電解質、維生素。大腸再吸收水與電解質、儲存糞便；直腸充盈引發排便反射（副交感S2-4）＋隨意放鬆外括約肌。腸蠕動（分節、蠕動波）由腸神經系統與自主神經調控。</p>"},"P10內分泌生理":{"title":"P10 內分泌生理 複習講義","html":"<h3>一、激素分類與作用機制</h3>\n<p>依結構：肽/蛋白（胰島素、GH、PTH，水溶性，作用<b>細胞膜受體</b>＋第二傳訊者）、胺類（兒茶酚胺水溶；甲狀腺素脂溶）、類固醇（皆膽固醇衍生，脂溶，作用<b>胞內/核受體</b>調控基因轉錄）。第二傳訊者：cAMP（ACTH、TSH、PTH、升糖素）、IP₃/Ca²⁺（GnRH、TRH、ADH-V1、催產素）、受體酪胺酸激酶（胰島素、IGF）。</p>\n<h3>二、下視丘—腦下垂體軸</h3>\n<p>前葉（腺垂體）經<b>門脈系統</b>受下視丘釋放/抑制激素調控，分泌GH、PRL、TSH、ACTH、FSH、LH。後葉（神經垂體）儲存釋放下視丘合成、<b>經神經軸突運送</b>的ADH與催產素。泌乳素以多巴胺（PIF）「抑制」為主；GH受GHRH促、體抑素與IGF-1抑。</p>\n<h3>三、甲狀腺、副甲狀腺與腎上腺</h3>\n<p>甲狀腺：碘化酪胺酸→MIT/DIT→耦合成T3/T4（分泌以T4為主、T3活性強，周邊去碘活化），調基礎代謝率與CNS成熟。鈣調節：<b>PTH升血鈣（動員骨鈣、增腎鈣再吸收、活化維生素D）vs 降鈣素（C細胞分泌，降血鈣）</b>。腎上腺皮質（GFR三層→醛固酮、皮質醇、雄性素）、髓質（兒茶酚胺）。</p>\n<h3>四、胰島與血糖調節</h3>\n<p>胰島β細胞分泌胰島素（唯一降血糖，促GLUT4攝糖、肝糖合成、抑糖質新生）；α細胞分泌升糖素（作用肝臟，促肝糖分解與糖質新生升血糖）。升血糖激素：升糖素、腎上腺素、皮質醇、生長激素。腸泌素（GLP-1/GIP）以前饋方式促胰島素分泌（incretin效應）。</p>"},"P11生殖生理":{"title":"P11 生殖生理 複習講義","html":"<h3>一、男性生殖</h3>\n<p>下視丘GnRH→垂體LH（刺激Leydig細胞產睪固酮）與FSH（刺激Sertoli細胞支持精子生成、分泌抑制素與雄性素結合蛋白ABP）。<b>精子在睪丸曲細精管生成（約64天）、副睪成熟（約2週獲運動力）</b>。睪固酮與抑制素負回饋抑制GnRH/LH/FSH。</p>\n<h3>二、女性月經週期</h3>\n<p>卵巢週期：濾泡期（FSH促卵泡發育、雌激素上升）→<b>排卵（成熟濾泡的高雌激素正回饋觸發LH激增）</b>→黃體期（黃體分泌黃體素為主）。子宮內膜週期：增生期（雌激素，內膜增厚）→分泌期（黃體素，腺體分泌備著床）→未受孕則雌黃體素驟降致月經。</p>\n<h3>三、受孕與懷孕</h3>\n<p>受精在輸卵管壺腹部，受精卵著床子宮內膜。<b>hCG由胚胎滋養層分泌（驗孕標的、維持黃體不退化續分泌黃體素安胎）</b>。雌激素與黃體素早期由黃體、後期由胎盤大量分泌維持妊娠。人類胎盤泌乳素（hPL）造成胰島素阻抗（妊娠糖尿病相關）。</p>\n<h3>四、分娩與泌乳</h3>\n<p>分娩時子宮頸牽張經<b>催產素正回饋</b>促子宮收縮（Ferguson反射）。泌乳：懷孕時高雌/黃體素促乳腺發育但抑制泌乳，分娩後驟降解除抑制→<b>泌乳素</b>啟動泌乳、吸吮經<b>催產素</b>射乳。高泌乳素抑制GnRH→哺乳期無月經（自然避孕）。</p>"},"P12中樞感覺生理":{"title":"P12 中樞感覺與神經系統 複習講義","html":"<h3>一、大腦與腦波</h3>\n<p>腦葉功能：額葉（運動、思考推理問題解決、布洛卡區語言表達）、頂葉（體感覺）、枕葉（視覺）、顳葉（聽覺、記憶、渥尼克區語言理解）。皮質主要輸出神經元為錐狀細胞。腦波由快到慢：<b>β（清醒專注）＞α（放鬆閉眼）＞θ（淺睡）＞δ（深睡慢波）</b>。清醒卻大量δ波提示腦部受損。</p>\n<h3>二、睡眠、意識與記憶</h3>\n<p>睡眠分NREM（N1-N3，N3慢波δ波）與REM（低振幅快波、肌張力消失、<b>主要作夢期</b>）。<b>上行網狀活化系統（ARAS）</b>＋視丘＋下視丘維持意識清醒；生物時鐘在下視丘視交叉上核。<b>海馬迴</b>負責記憶固化，受損致順向失憶。杏仁核管恐懼情緒。</p>\n<h3>三、運動控制與神經傳遞物</h3>\n<p>錐體徑（外側皮質脊髓徑）在<b>延腦錐體交叉</b>、控制對側精細動作。基底核（黑質多巴胺退化→帕金森動作遲緩顫抖僵直；紋狀體退化→亨丁頓舞蹈症）。小腦管協調平衡（受損→運動失調ataxia）。傳遞物：多巴胺（運動、獎賞動機）、乙醯膽鹼（Alzheimer退化）、血清素（憂鬱治療標的）、GABA（抑制）。</p>\n<h3>四、特殊感覺與自主神經</h3>\n<p>視覺：光感受器（桿/錐細胞）→雙極細胞→神經節細胞；光照使光感受器<b>過極化</b>；色盲＝錐細胞視蛋白基因缺陷（X隱性）；影像於視網膜成上下顛倒左右相反的倒像。聽覺：毛細胞由內淋巴<b>K⁺內流</b>去極化。味覺：鮮味＝麩胺酸。自主神經：交感（胸腰T1-L2、戰或逃、α/β腎上腺素受體）vs 副交感（顱薦、休息消化、蕈毒鹼受體）；轉移痛（心臟→左臂內側）。下運動神經元損傷＝弛緩性癱瘓/肌萎縮/肌束顫動（vs 上運動神經元的痙攣性張力亢進）。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^P(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='nrn_physio_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
