,"實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"106111-N1-30":{"quick":"正解(C)。肺泡通氣量＝(500−150)×12＝4200 mL/min(無效腔取約150 mL)。","detail":{"background":"肺泡通氣量＝(潮氣容積−無效腔)×呼吸頻率。150磅(約68 kg)成人無效腔約150 mL(約1 mL/lb或2.2 mL/kg)。故＝(500−150)×12＝350×12＝4200 mL/min(與105030-30同)。故約4200 mL/min。","options":{"A":"錯誤。計算不符。","B":"錯誤。3600需無效腔200。","C":"正確。(500−150)×12＝4200 mL/min。","D":"錯誤。6000是總通氣量。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"107030-N1-30":{"quick":"正解(B)。早產兒呼吸困難因「第二型肺泡細胞」發育不全、surfactant不足(新生兒呼吸窘迫症)。","detail":{"background":"早產兒「新生兒呼吸窘迫症候群(NRDS/hyaline membrane disease)」：因肺尚未成熟，「第二型肺泡細胞發育不全、分泌的『表面張力劑(surfactant)』不足」→肺泡表面張力過高→呼氣末肺泡塌陷(肺不張)→呼吸困難、缺氧。治療給外源性surfactant、產前給母親類固醇促肺成熟。故病因是第二型肺泡細胞發育不全。","options":{"A":"錯誤。第一型細胞主氣體交換。","B":"正確。第二型肺泡細胞發育不全、surfactant不足。","C":"錯誤。巨噬細胞主吞噬。","D":"錯誤。肥大細胞與此無關。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"107030-N1-31":{"quick":"正解(B)。波爾效應使曲線『右移、促使更多氧釋出』到組織(在代謝旺盛、酸、高CO₂的組織)。","detail":{"background":"波爾效應(Bohr effect)：在組織(代謝旺盛處)CO₂↑、H⁺↑(pH↓)、溫度↑→氧合血紅素解離曲線『右移』→血紅素對氧的親和力下降→「促使更多氧『釋出』給組織」(利於組織取氧);在肺部則相反(左移、利於結合氧)。故波爾效應的意義是『右移促使更多氧釋出』。","options":{"A":"錯誤。左移是促進氧結合、減少釋出。","B":"正確。右移促使更多氧釋出。","C":"錯誤(左移利於結合非不利)。","D":"錯誤(右移利於釋出非不利)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"107110-N1-29":{"quick":"正解(B)。肺泡通氣量＝(450−150)×12＝300×12＝3600 mL/min。","detail":{"background":"肺泡通氣量＝(潮氣容積−解剖無效腔)×呼吸頻率＝(450−150)×12＝300×12＝3600 mL/min。故約3600 mL/min。　深化：肺泡通氣量（alveolar ventilation）才是真正參與氣體交換的有效通氣，與「分鐘通氣量＝潮氣容積×頻率」不同——後者未扣除無效腔。臨床意義：淺快呼吸（小潮氣量、高頻率）雖分鐘通氣量相同，但因無效腔占比高，肺泡通氣量反而下降、易致二氧化碳滯留；深慢呼吸則肺泡通氣效率較佳。","options":{"A":"錯誤。計算不符。","B":"正確。(450−150)×12＝3600 mL/min。","C":"錯誤。5400是總通氣量(450×12)。","D":"錯誤。計算不符。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"107110-N1-30":{"quick":"正解(B)。FEV1%達85%(正常>70–80%)但肺活量降低→為「限制型肺病」。","detail":{"background":"肺功能判讀：①「阻塞型肺病(如COPD、氣喘)」＝呼氣受阻→『FEV1/FVC比值『下降』(<70%)』;②「限制型肺病(如肺纖維化、胸廓限制)」＝肺擴張受限→『肺活量(FVC)下降、但FEV1/FVC比值正常或上升(≥80%)』。本題FEV1%＝85%(比值正常甚至偏高)、但肺活量僅2公升(偏低)→符合『限制型肺病』。故答案(B)。","options":{"A":"錯誤。阻塞型FEV1%會下降(<70%)。","B":"正確。FEV1%正常但肺活量低→限制型肺病。","C":"錯誤。肺活量降低非正常。","D":"錯誤。氣喘屬阻塞型(FEV1%下降)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"108020-N1-22":{"quick":"正解(D)。負責氣體交換的呼吸道細胞是「第一型肺泡細胞(type I)」。","detail":{"background":"第一型肺泡細胞(type I pneumocyte)為扁平單層鱗狀上皮、覆蓋約95%肺泡表面，與微血管內皮共構薄薄的「呼吸膜」，是『氣體交換(O₂/CO₂擴散)的場所』。第二型細胞分泌surfactant、巨噬細胞吞噬、嗜中性球是白血球。故負責氣體交換者為第一型肺泡細胞。","options":{"A":"錯誤。嗜中性球是白血球。","B":"錯誤。第二型細胞分泌surfactant。","C":"錯誤。巨噬細胞主吞噬。","D":"正確。第一型肺泡細胞負責氣體交換。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"108020-N1-23":{"quick":"正解(A為「最不容易右移」者)。pH值『增加(偏鹼)』使曲線『左移』，故最不容易使曲線右移。","detail":{"background":"氧合血紅素解離曲線「右移(釋氧增加)」的因素：pH下降(氫離子增加)、體溫上升、CO₂增加、2,3-DPG增加(波爾效應)。本題問「最不容易使曲線右移」者＝(A)「血液pH值『增加(偏鹼)』」——偏鹼反而使曲線『左移』(對氧親和力增加)。其餘(B氫離子增加=pH下降、C體溫上升、D CO₂增加)都使右移。故答案(A)。","options":{"A":"最不容易右移(即為答案)。pH增加(偏鹼)使曲線左移。","B":"會右移。氫離子增加(酸)。","C":"會右移。體溫上升。","D":"會右移。CO₂增加。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"108110-N1-29":{"quick":"正解(A)。表面張力劑由「第二型肺泡細胞」產生。","detail":{"background":"表面張力劑(surfactant)由「第二型肺泡細胞(type II pneumocyte)」合成分泌(主成分磷脂DPPC)，降低肺泡表面張力、防呼氣末塌陷、增加肺順應性。早產兒不足→NRDS。故產生surfactant者為第二型肺泡細胞(與107030-30、108020-13一致)。","options":{"A":"正確。第二型肺泡細胞產生surfactant。","B":"錯誤。結締組織不分泌surfactant。","C":"錯誤。氣管上皮分泌黏液。","D":"錯誤。黏膜細胞分泌黏液。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"109030-N1-18":{"quick":"正解(D為「非下視丘功能」者)。調節『呼吸節律』是『延腦』的功能，不是下視丘。","detail":{"background":"下視丘(hypothalamus)的主要功能：①調節體溫(體溫調節中樞);②調節晝夜節律(經視叉上核);③控制腦下垂體激素分泌(經下視丘-垂體軸與分泌ADH/催產素);④調節食慾、口渴、自律神經、情緒。「呼吸節律的基本節律中樞在『延腦(medulla)』」(腹側呼吸群、背側呼吸群)、橋腦調節，非下視丘。故非下視丘功能者為調節呼吸節律。","options":{"A":"是下視丘功能。調節體溫。","B":"是下視丘功能。調節晝夜節律。","C":"是下視丘功能。控制腦垂體分泌。","D":"非(即為答案)。呼吸節律由延腦調節。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"109030-N1-28":{"quick":"正解(D)。二氧化碳在血液中最主要轉換成「碳酸氫根離子(HCO₃⁻)」運送(約70%)。","detail":{"background":"二氧化碳運送形式：①約「70%轉成『碳酸氫根離子(HCO₃⁻)』」(經紅血球碳酸酐酶催化CO₂+H₂O→H₂CO₃→H⁺+HCO₃⁻)——最主要;②約23%與血紅素結合(碳醯胺基血紅素);③約7%溶解。故最主要方式為轉換成碳酸氫根離子(與111110-2、110030-20一致)。","options":{"A":"錯誤。直接擴散非運送形式。","B":"錯誤。直接溶解僅約7%。","C":"錯誤。與血紅素結合約23%。","D":"正確。約70%轉成碳酸氫根離子。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"109110-N1-21":{"quick":"正解(B)。呼吸道狹窄(阻塞型)使FEV1減少明顯，但FVC變化不顯著。","detail":{"background":"部分呼吸道狹窄(阻塞型病變)：呼氣時氣道阻力增加→「第一秒用力呼氣容積(FEV1)『明顯減少』」，但「用力呼氣肺活量(FVC，總呼出量)『變化不顯著』(只是呼得較慢)」→故『FEV1/FVC比值下降』(阻塞型特徵)。故前者(FEV1)減少、後者(FVC)變化不顯著。對照限制型則FVC明顯下降。故答案(B)。","options":{"A":"錯誤。FEV1會明顯減少。","B":"正確。FEV1減少、FVC變化不顯著(阻塞型)。","C":"錯誤。是FEV1減少非FVC。","D":"錯誤。FVC變化不顯著。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"109110-N1-30":{"quick":"正解(B)。淺快呼吸(潮氣量小、頻率快)使無效腔通氣比例高、肺泡通氣不足→易缺氧。","detail":{"background":"潮氣量200 mL、頻率40次/分的「淺而快呼吸」：雖然每分鐘總通氣量(200×40＝8000 mL)看似高，但因『無效腔(約150 mL)佔潮氣量比例極大』→肺泡通氣量＝(200−150)×40＝50×40＝僅2000 mL/min(遠低於正常約4200)→「肺泡通氣不足→容易產生缺氧(呼吸性低氧)」、CO₂也可能滯留。故答案(B)。這說明『深而慢』的呼吸比『淺而快』有效。","options":{"A":"錯誤。淺快呼吸肺泡通氣不足，CO₂不一定下降。","B":"正確。淺快呼吸無效腔比例高→易缺氧。","C":"錯誤。氧氣總量不會大幅增加。","D":"錯誤。肺泡通氣不足，非呼吸性鹼中毒。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"110030-N1-20":{"quick":"正解(D)。二氧化碳運送比例最高的形式是「碳酸氫根離子(HCO₃⁻)」。","detail":{"background":"二氧化碳在血中以碳酸氫根離子(HCO₃⁻)運送的比例最高(約70%)，其次與血紅素結合(碳醯胺基血紅素，約23%)，最少為溶解於血漿(約7%)(與109030-28、111110-2一致)。故比例最高者為碳酸氫根離子。　深化：二氧化碳運送三形式：碳酸氫根（約70%，經紅血球碳酸酐酶轉化、氯轉移）、與血紅素結合的碳醯胺基血紅素（約23%）、溶解（約7%）。波耳效應與哈登效應協調肺與組織的O₂/CO₂交換。","options":{"A":"錯誤。無氣態CO₂在血中。","B":"錯誤。溶解約7%。","C":"錯誤。碳醯胺基血紅素約23%。","D":"正確。碳酸氫根離子約70%最高。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"110110-N1-29":{"quick":"正解(B為「錯誤」者)。surfactant主要『穩定小肺泡、防小肺泡塌陷併入大肺泡』;說「穩定大肺泡」不夠精確、為錯誤敘述。","detail":{"background":"表面張力劑(surfactant)功能：①降低肺泡表面張力→「增加肺順應性(A對)」;②「降低『小肺泡』的表面張力更多→防止小肺泡塌陷併入大肺泡(穩定不同大小肺泡，尤其防小肺泡萎縮)」;③深呼吸/嘆氣促進分泌(D對)。本題(B)「穩定大肺泡，預防萎縮」描述不正確——surfactant的關鍵是『防小肺泡塌陷』(依Laplace定律小肺泡壓力大易塌陷，surfactant在小肺泡作用更強以平衡)。故錯誤者為(B)。","options":{"A":"正確。surfactant增加肺順應性。","B":"錯誤(即為答案)。surfactant主要防小肺泡塌陷，非「穩定大肺泡」。","C":"正確。減少小肺泡表面張力。","D":"正確。深呼吸增加surfactant分泌。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"110110-N1-30":{"quick":"正解(D)。pH升高(偏鹼)使氧合解離曲線『左移』。","detail":{"background":"氧合血紅素解離曲線「左移」(對氧親和力增加、釋氧減少)的因素：「pH升高(偏鹼)、體溫下降、CO₂下降、2,3-DPG減少」。本題問造成『左移』者＝(D)升高pH值。其餘(增加2,3-DPG、增加體溫、增加代謝)都使曲線『右移』。故答案(D)。","options":{"A":"錯誤。增加2,3-DPG使右移。","B":"錯誤。增加體溫使右移。","C":"錯誤。增加代謝使右移。","D":"正確。升高pH使曲線左移。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"112030-N1-13":{"quick":"正解(D為「錯誤」者)。呼吸窘迫症候群屬『非心源性』肺水腫，非心原性。","detail":{"background":"急性呼吸窘迫症候群(ARDS)為「非心源性(non-cardiogenic)肺水腫」：肺微血管通透性增加→蛋白質與液體外滲到肺泡(A對)、可由吸入性肺炎/敗血症引起(B對)、造成嚴重缺氧(C對)。(D)說「屬於心原性肺水腫」為錯(心源性肺水腫是左心衰竭致肺靜脈壓升高，機制不同)。故錯誤者為(D)(與104030-29同概念)。","options":{"A":"正確。蛋白質外滲至肺泡。","B":"正確。吸入性肺炎可引起。","C":"正確。會造成缺氧。","D":"錯誤(即為答案)。ARDS屬非心源性肺水腫。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"112030-N1-20":{"quick":"正解(B為「錯誤」者)。吸氣時胸膜內壓(intrapleural pressure)『下降(更負)』，非增加。","detail":{"background":"吸氣的壓力變化：橫膈與外肋間肌收縮使胸腔擴大→①「胸膜內壓(intrapleural pressure)『下降(更負，約−6→−8 cmH₂O)』」(B說「增加」為錯);②肺被牽張、「肺泡壓下降(低於大氣壓)→空氣流入」(C對);③「肺間壓(transpulmonary pressure=肺泡壓−胸膜內壓)『增加』」使肺擴張(A對);④大氣壓不變(D對)。故錯誤者為(B)。","options":{"A":"正確。吸氣時肺間壓增加。","B":"錯誤(即為答案)。吸氣時胸膜內壓下降(更負)。","C":"正確。吸氣時肺泡壓減小。","D":"正確。大氣壓不變。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"112110-N1-19":{"quick":"正解(A為「錯誤」者)。「過度換氣(hyperventilation)」是指通氣超過代謝所需(使CO₂下降)，不等於單純「增加換氣」。","detail":{"background":"過度換氣(hyperventilation)＝「肺泡通氣量『超過』身體代謝產生CO₂所需的程度」，使「血中CO₂下降→碳酸減少→呼吸性鹼中毒」;常見於緊張、焦慮、劇烈運動。本題(A)「過度換氣就等於增加換氣」為錯——運動時換氣增加但若與代謝需求相稱(CO₂正常)就不算過度換氣;『過度』的定義是相對於代謝需求、使CO₂下降。其餘(B緊張運動易發生、C呼吸性鹼中毒、D CO₂減少)皆正確。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。過度換氣是通氣超過代謝需求(CO₂下降)，非單純增加換氣。","B":"正確。緊張或劇烈運動易發生。","C":"正確。會造成呼吸性鹼中毒。","D":"正確。血中CO₂減少。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"113030-N1-9":{"quick":"正解(B為「不會出現」者)。正常吸氣時肺泡壓『下降(低於大氣壓)』使空氣流入，不會「增加」。","detail":{"background":"正常吸氣(主動)的變化：①橫膈肌收縮下移、外肋間肌收縮→胸腔擴大(A對);②「肺泡壓『下降』(低於大氣壓)→空氣被吸入」(B說「肺泡壓增加」為『不會出現』);③胸膜內壓更負(降低)(C對);④肺間壓(肺泡壓−胸膜內壓)增加使肺擴張(D對)。故吸氣時不會出現的是(B)肺泡壓增加(肺泡壓在吸氣時是下降的;呼氣時才上升)。","options":{"A":"會出現。橫膈收縮下移。","B":"不會(即為答案)。吸氣時肺泡壓下降，非增加。","C":"會出現。胸膜內壓降低。","D":"會出現。肺間壓增加。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"113100-N1-19":{"quick":"正解(C)。平靜呼氣後正常吸入一口空氣的體積＝「潮氣容積(tidal volume)」。","detail":{"background":"「潮氣容積(tidal volume, TV)」＝平靜呼吸時，每次正常吸入或呼出的氣體量(約500 mL)。題目「平靜呼氣中止後，正常吸入一口空氣」即一次平靜吸氣量＝潮氣容積。吸氣儲備容積是在潮氣吸氣『之上』還能再吸的量;肺活量是最大吸到最大呼;肺餘容積是用力呼氣後肺中殘留量。故為潮氣容積。","options":{"A":"錯誤。肺活量是最大呼吸量。","B":"錯誤。吸氣儲備容積是潮氣之上再吸的量。","C":"正確。平靜一口吸氣＝潮氣容積。","D":"錯誤。肺餘容積是呼氣後殘留量。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"113180-N1-19":{"quick":"正解(B)。氣胸後空氣進入胸膜腔、胸膜內壓上升(變正)→肺間壓下降→肺塌陷。","detail":{"background":"氣胸(pneumothorax)：空氣經破口進入胸膜腔→「胸膜內壓由負『上升(趨向0或變正)』」→「肺間壓(transpulmonary pressure＝肺泡壓−胸膜內壓)『下降』」→失去使肺擴張的壓力差→『肺塌陷(肺萎縮)』。肺泡內壓最終與大氣平衡(非持續升或降)。故最適當的是(B)肺間壓下降。(A說胸膜內壓降低為錯，氣胸是胸膜內壓上升)","options":{"A":"錯誤。氣胸後胸膜內壓上升(非降低)。","B":"正確。肺間壓下降→肺塌陷。","C":"錯誤。肺泡內壓最終與大氣平衡。","D":"錯誤。肺泡內壓非持續升高。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"114030-N1-9":{"quick":"正解(C)。肺氣腫肺泡壁破壞→肺彈性回縮力下降→肺順應性『增加』。","detail":{"background":"肺氣腫(emphysema)：肺泡壁(含彈性纖維)被破壞、肺泡融合成大囊泡→①氣體交換『總面積『減少』(A錯)」、②彈性纖維破壞使「肺回彈力『下降』(B錯)」→「肺順應性『增加』(肺變得鬆軟易擴張但難回縮)(C正確)」;③小氣道因失去牽引而塌陷→「呼吸道阻力『增加』(D錯)」、呼氣困難(桶狀胸、呼氣相延長)。故肺氣腫使肺順應性增加。","options":{"A":"錯誤。氣體交換面積減少。","B":"錯誤。肺回彈力下降。","C":"正確。肺順應性增加(肺變鬆軟)。","D":"錯誤。呼吸道阻力增加。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"114170-N1-19":{"quick":"正解(B)。氣體分子藉隨機(布朗)運動由高分壓往低分壓穿過呼吸膜擴散。","detail":{"background":"氣體擴散描述：(A)氣體分壓與其濃度『相關』(分壓越高分子越多)，故A錯;(B)「氣體分子藉『隨機(布朗)運動』，淨移動由『高分壓→低分壓』穿過呼吸膜」——正確;(C)「CO₂的擴散速率比O₂『快』約20倍(因CO₂溶解度高)」，故C說「氧氣擴散比CO₂快」為錯;(D)呼吸膜厚度增加(如肺水腫、肺纖維化)會『降低擴散速率』，故D錯。故正確者為(B)。","options":{"A":"錯誤。氣體分壓與濃度相關。","B":"正確。氣體分子藉隨機運動由高分壓往低分壓擴散。","C":"錯誤。CO₂擴散比O₂快(溶解度高)。","D":"錯誤。呼吸膜增厚會降低擴散速率。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"101030-N1-29":{"quick":"正解(B)。近曲小管(PCT)的水分再吸收量最高(約65%)。","detail":{"background":"腎元各段水分再吸收：「近曲小管(PCT)再吸收約65%」(等滲透壓再吸收，量最高)、亨利氏環下行支約15%、遠曲小管與集尿管在ADH作用下調節剩餘約10–20%。鮑氏囊只是過濾、不再吸收。故水分再吸收量最高者為近曲小管。　深化：近曲小管再吸收約65%的濾液水分（等滲透壓再吸收），亨利氏環下行支再吸收約15%（透水濃縮），遠曲小管與集尿管的水再吸收則受ADH精細調控決定最終尿量。集尿管是調節尿濃縮稀釋的最後關卡。","options":{"A":"錯誤。鮑氏囊只過濾不再吸收。","B":"正確。近曲小管再吸收水分最多(約65%)。","C":"錯誤。亨利氏環約15%。","D":"錯誤。遠曲小管量較少。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"101110-N1-29":{"quick":"正解(C)。醛固酮作用於遠端腎小管/集尿管的「主細胞(principal cells)」促鈉再吸收、排鉀。","detail":{"background":"醛固酮(aldosterone)作用於遠曲小管末段與集尿管的「主細胞(principal cells)」：增加管腔膜鈉通道(ENaC)與基底側Na-K-ATPase→促進『鈉再吸收(連帶保水)、鉀分泌(排鉀)』，並促進H⁺分泌。故作用細胞為主細胞。網狀細胞、系膜細胞、JG細胞屬腎絲球旁器或支持細胞。故答案主細胞。","options":{"A":"錯誤。網狀細胞屬旁絲球器。","B":"錯誤。系膜細胞調節過濾。","C":"正確。醛固酮作用於主細胞。","D":"錯誤。JG細胞分泌腎素。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"101110-N1-30":{"quick":"正解(B)。尿素(urea)是「蛋白質(胺基酸)」代謝的最終含氮廢物。","detail":{"background":"尿素(urea)是「蛋白質→胺基酸→去胺基後產生的氨(ammonia)，在肝臟經尿素循環轉成尿素」的最終含氮廢物，再由腎臟排出。故尿素主要來自蛋白質代謝。核酸代謝產生尿酸、葡萄糖與脂肪代謝產物為CO₂與水(不含氮)。故答案蛋白質。　深化：尿素是蛋白質代謝產生的氨在肝臟經尿素循環解毒生成的含氮廢物，由腎臟排出。肝衰竭時尿素生成減少、血氨上升致肝性腦病；腎衰竭時尿素排泄減少、血中尿素氮（BUN）上升。尿素也參與腎髓質濃縮梯度。","options":{"A":"錯誤。核酸代謝產生尿酸。","B":"正確。尿素來自蛋白質(胺基酸)代謝。","C":"錯誤。葡萄糖代謝產CO₂與水。","D":"錯誤。脂肪代謝產CO₂與水。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"104030-N1-28":{"quick":"正解(A)。逼尿肌(detrusor)收縮引發排尿。","detail":{"background":"排尿(micturition)：膀胱充盈→牽張受器→經副交感(骨盆內臟神經)→「膀胱壁『逼尿肌(detrusor，平滑肌)』收縮」＋內尿道括約肌舒張→排尿;同時須隨意放鬆外尿道括約肌(骨骼肌)。內、外括約肌『收縮』是憋尿;輸尿管收縮是輸送尿到膀胱。故引發排尿者為逼尿肌收縮。","options":{"A":"正確。逼尿肌收縮引發排尿。","B":"錯誤。外尿道括約肌收縮是憋尿。","C":"錯誤。內尿道括約肌收縮是憋尿。","D":"錯誤。輸尿管輸送尿到膀胱。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"105030-N1-29":{"quick":"正解(A)。入球小動脈擴張→腎絲球靜水壓上升→GFR增加。","detail":{"background":"影響腎絲球過濾率(GFR)的因素：①「入球小動脈『擴張』→腎絲球微血管靜水壓上升→GFR『增加』」(A正確);②平均動脈壓降低→GFR下降;③腎絲球靜水壓降低→GFR下降;④血漿膠體滲透壓增加→把水留在血管、對抗過濾→GFR下降。(出球小動脈收縮則GFR增加)。故最易使GFR增加者為入球小動脈擴張。","options":{"A":"正確。入球小動脈擴張使GFR增加。","B":"錯誤。平均動脈壓降低使GFR下降。","C":"錯誤。腎絲球靜水壓降低使GFR下降。","D":"錯誤。膠體滲透壓增加使GFR下降。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"105090-N1-19":{"quick":"正解(A)。切斷迷走神經→移除副交感對心臟的抑制→心跳加快。","detail":{"background":"迷走神經(副交感)持續對心臟(SA node)有抑制(減慢)作用(迷走張力)。「切斷迷走神經→移除此抑制→心跳『加快』」(失去副交感煞車)。迷走也支配胃(切斷則胃液分泌『減少』非增加)、不支配瞳孔擴大(瞳孔擴大是交感);排尿反射由薦髓副交感(骨盆內臟神經)非迷走。故切斷迷走最可能心跳加快。","options":{"A":"正確。切斷迷走神經使心跳加快。","B":"錯誤。切斷迷走使胃液分泌減少。","C":"錯誤。瞳孔擴大是交感作用。","D":"錯誤。排尿反射由薦髓副交感。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"105090-N1-22":{"quick":"正解(A為「非星狀膠細胞功能」者)。分泌腦脊髓液是「脈絡叢/室管膜細胞」的功能，非星狀膠細胞。","detail":{"background":"星狀膠細胞(astrocyte)功能：形成血腦障壁(B)、回收/調節神經傳遞物與鉀離子(D)、支持並在中樞損傷時形成膠質疤痕(C)、參與發育。「分泌腦脊髓液(CSF)的是『脈絡叢(choroid plexus)的室管膜細胞』」，非星狀膠細胞。故非其功能者為分泌腦脊髓液。","options":{"A":"非(即為答案)。CSF由脈絡叢室管膜細胞分泌。","B":"是其功能。形成血腦障壁。","C":"是其功能。中樞損傷時形成膠質疤痕。","D":"是其功能。回收神經傳遞物。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"105090-N1-28":{"quick":"正解(A)。菊糖(inulin)的清除率最接近腎絲球過濾率(GFR)。","detail":{"background":"「菊糖(inulin)」是評估GFR的『理想標記』：自由濾過、『不被腎小管再吸收也不被分泌』，故其清除率＝GFR(金標準，但需靜脈輸注，臨床多改用內生性肌酸酐估算)。葡萄糖會被完全再吸收(清除率≈0)、肝醣不適用、代糖不標準。故清除率最接近GFR者為菊糖。","options":{"A":"正確。菊糖清除率＝GFR(金標準)。","B":"錯誤。代糖非標準標記。","C":"錯誤。肝醣不適用。","D":"錯誤。葡萄糖被完全再吸收。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"106110-N1-28":{"quick":"正解(C)。血中白蛋白濃度增加→血漿膠體滲透壓上升→對抗過濾→GFR下降。","detail":{"background":"使GFR『下降』的因素：①「血漿膠體滲透壓上升(如白蛋白增加)→增加把水留在微血管的力、對抗過濾→GFR下降」(C正確);②入球小動脈『收縮』(非擴張)使GFR下降(A說擴張，會使GFR『增加』);③出球小動脈收縮反而使腎絲球靜水壓上升→GFR『增加』(B會增加);④過濾膜通透性增加→GFR增加(D)。故使GFR下降者為(C)白蛋白增加。","options":{"A":"錯誤。入球小動脈擴張使GFR增加。","B":"錯誤。出球小動脈收縮使GFR增加。","C":"正確。白蛋白增加(膠體滲透壓↑)使GFR下降。","D":"錯誤。過濾膜通透性增加使GFR增加。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"107030-N1-28":{"quick":"正解(D)。直血管(vasa recta)進行腎髓質的逆流交換，維持髓質滲透梯度。","detail":{"background":"腎髓質的「逆流系統」：①亨利氏環＝逆流『倍增器(multiplier)』建立髓質滲透梯度;②「直血管(vasa recta)＝逆流『交換器(exchanger)』」——其U形走向使氧與溶質在下行與上行支間交換，『把帶走的溶質留在髓質、避免沖淡滲透梯度』，維持濃縮尿的能力。入球/出球小動脈、腎絲球不參與逆流交換。故進行逆流交換者為直血管。","options":{"A":"錯誤。入球小動脈供血。","B":"錯誤。腎絲球主過濾。","C":"錯誤。出球小動脈通往直血管但非交換器本身。","D":"正確。直血管為逆流交換器。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"108020-N1-21":{"quick":"正解(A)。葡萄糖過濾量超過最大運輸量(Tm)→尿糖(glucosuria)。","detail":{"background":"當「腎臟葡萄糖過濾量超過再吸收的最大運輸量(Tm，約375 mg/min，對應血糖閾值約180 mg/dL)」時，超過的葡萄糖無法再吸收→隨尿排出＝「糖尿(glucosuria)」，並引起滲透性利尿(多尿)。故超過Tm時最可能發生尿糖(與102110-28、111110-14一致)。寡尿/無尿是尿量問題、血尿是紅血球。故答案尿糖。","options":{"A":"正確。超過Tm產生尿糖。","B":"錯誤。寡尿是尿量過少。","C":"錯誤。血尿是尿中有紅血球。","D":"錯誤。無尿是幾乎不排尿。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"108110-N1-30":{"quick":"正解(C)。尿素累積於髓質形成高滲透梯度，是維持亨利氏環下行支水分再吸收的因素。","detail":{"background":"亨利氏環下行支對『水可通透、對溶質不通透』，水分再吸收靠『髓質間質的高滲透梯度』把水滲出。維持此髓質高滲透梯度的兩大溶質是「氯化鈉(NaCl，由上行支主動運出)」與「尿素(urea，集尿管再循環累積)」。本題選項中『尿素』是維持髓質高滲、促進下行支水再吸收的因素。故答案尿素。(另112110-18亦考NaCl+尿素)","options":{"A":"錯誤。氫離子非髓質滲透梯度主溶質。","B":"錯誤。氯離子隨鈉但題目取尿素。","C":"正確。尿素累積維持髓質高滲、促下行支水再吸收。","D":"錯誤。鉀離子非主要。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"109030-N1-27":{"quick":"正解(B)。亨利氏環上行支對水的滲透性最低(對水不通透、只主動運出鹽)。","detail":{"background":"腎小管對水的通透性：近曲小管(高，等滲再吸收)、亨利氏環『下行支』(對水高通透)、「亨利氏環『上行支』＝對水『不通透(滲透性最低)』，只主動把NaCl運出→稀釋管腔液、濃縮髓質間質」、遠曲小管與集尿管(受ADH調控)。故對水滲透性最低者為亨利氏環上行支(與114100-18一致)。","options":{"A":"錯誤。近曲小管對水高通透。","B":"正確。亨利氏環上行支對水不通透。","C":"錯誤。遠曲小管受ADH調控。","D":"錯誤。集尿管受ADH調控。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"109110-N1-29":{"quick":"正解(D)。高鉀飲食使集尿管(主細胞，受醛固酮作用)增加鉀的分泌。","detail":{"background":"鉀的排泄調節主要在「遠曲小管末段與『集尿管』的主細胞」：高血鉀→直接刺激並經醛固酮→主細胞增加管腔膜鉀通道→『分泌(排出)更多鉀』。近曲小管與亨利氏環主要再吸收鉀(較固定)。故高鉀食物使集尿管增加鉀分泌(與101110-29醛固酮作用主細胞呼應)。","options":{"A":"錯誤。近曲小管主再吸收鉀。","B":"錯誤。上行支再吸收鉀。","C":"錯誤。下行支非鉀分泌處。","D":"正確。集尿管(主細胞)增加鉀分泌。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"109110-N1-32":{"quick":"正解(D)。體抑素(somatostatin)由胰島D細胞與胃壁D細胞皆可分泌。","detail":{"background":"「體抑素(somatostatin)」是廣泛分布的抑制性激素：由『胰島D(δ)細胞』分泌(抑制胰島素與升糖素)、也由『胃與腸道的D細胞』分泌(抑制胃泌素、胃酸與多種胃腸激素)、下視丘也分泌(抑制生長激素)。故胰臟內分泌細胞與胃壁細胞皆可分泌者為體抑素。胰蛋白酶原、澱粉酶是胰外分泌酶;胃蛋白酶原是胃主細胞分泌。故答案體抑素。","options":{"A":"錯誤。胰蛋白酶原是胰外分泌酶。","B":"錯誤。澱粉酶是消化酶。","C":"錯誤。胃蛋白酶原是胃主細胞分泌。","D":"正確。體抑素由胰島D細胞與胃D細胞分泌。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"110110-N1-27":{"quick":"正解(D為「錯誤」者)。降低血管收縮素II分泌會使醛固酮與H⁺分泌『減少』——此敘述方向其實正確;惟標準答案以(D)為錯，因臨床上抑制AngII確實減少H⁺/醛固酮，故本題取(D)為不符酸鹼維持機制的選項。","detail":{"background":"酸鹼平衡的腎臟機制：(A)近曲小管藉鈉-氫逆向(次級主動運輸)分泌H⁺——正確;(B)管腔中HCO₃⁻與分泌的H⁺結合成H₂CO₃→分解成CO₂與水(再吸收)——正確;(C)醛固酮過量(原發性醛固酮增多)促H⁺與K⁺排出→反而造成代謝性鹼中毒與低血鉀(題述「腎小管性酸中毒」方向不符，視為可議);本題官方答案標(D)。實務上：血管收縮素II刺激近曲小管Na-H交換促H⁺分泌，故『降低AngII會減少H⁺分泌』為正確生理;此題選項設計易混淆，建議以「醛固酮、AngII皆促進H⁺/鈉處理」為記憶重點。","options":{"A":"正確。近曲小管以次級主動運輸分泌H⁺。","B":"正確。HCO₃⁻與H⁺結合成CO₂與水。","C":"(可議)醛固酮過量通常致鹼中毒非酸中毒。","D":"答案。AngII促進H⁺分泌，與酸鹼調控相關。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"110110-N1-28":{"quick":"正解(A)。肌酸酐(creatinine)是健檢常用的腎功能指標。","detail":{"background":"臨床健檢評估腎功能最常用「血清肌酸酐(creatinine)」(及由其推算的eGFR)、與血中尿素氮(BUN)——肌酸酐為內生、濾過為主、不易受飲食影響，血中升高代表GFR下降。菊糖雖準但需輸注非常規;葡萄糖、脂肪酸非腎功能指標。故常用指標為肌酸酐(與104030-27呼應)。","options":{"A":"正確。肌酸酐是常用腎功能指標。","B":"錯誤。菊糖需輸注、非常規健檢。","C":"錯誤。葡萄糖非腎功能指標。","D":"錯誤。脂肪酸非腎功能指標。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"110110-N1-31":{"quick":"正解(D)。(胰)脂解酶把三酸甘油酯分解為單酸甘油酯與游離脂肪酸。","detail":{"background":"脂解酶(lipase)：①主要由『胰臟』分泌(胰脂解酶，非肝臟);②功能是「把『三酸甘油酯(triglyceride)』水解成『單酸甘油酯(monoglyceride)＋游離脂肪酸(free fatty acid)』」(D正確);③『乳化』脂肪的是膽鹽(非脂解酶，故B錯);④乳糜微粒是小腸吸收後重組的脂蛋白(非被lipase分解，故C錯)。故正確者為(D)。","options":{"A":"錯誤。脂解酶主要由胰臟分泌。","B":"錯誤。乳化脂肪是膽鹽的功能。","C":"錯誤。乳糜微粒是吸收後重組產物。","D":"正確。脂解酶分解三酸甘油酯為單酸甘油酯與游離脂肪酸。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"111030-N1-25":{"quick":"正解(B)。正常成年男子腎絲球過濾率(GFR)約125 mL/min。","detail":{"background":"正常成年男子的腎絲球過濾率(GFR)約「125 mL/min(約180公升/天)」(女性略低約105–115)。其中99%以上的濾液被再吸收，最終尿量約1–2公升/天。GFR是評估腎功能的核心指標(eGFR<60持續3個月即慢性腎臟病)。故GFR約125 mL/min。","options":{"A":"錯誤。1250過高。","B":"正確。GFR約125 mL/min。","C":"錯誤。12.5過低。","D":"錯誤。1.25過低。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"111030-N1-26":{"quick":"正解(B為「最不可能」者)。缺血性休克時腎素分泌『增加』(非下降)，故「腎素分泌下降」最不可能。","detail":{"background":"缺血性(低血容)休克後排尿量下降(寡尿)的機制：①「動脈壓下降→腎灌流與GFR下降」(A合理);②交感與RAAS活化→「腎素分泌『增加』、血管張力素II與醛固酮增加→保鈉保水」(故B「腎素分泌下降」為『最不可能』);③血管張力素II使「出球小動脈『收縮』」以維持GFR(C合理);④自我調節使「入球小動脈相對不過度收縮」以保灌流(D合理)。故最不可能者為(B)腎素分泌下降。","options":{"A":"可能。動脈壓下降致GFR降、尿量減。","B":"最不可能(即為答案)。休克時腎素分泌增加，非下降。","C":"可能。出球小動脈收縮維持GFR。","D":"可能。入球小動脈不過度收縮以保灌流。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"112030-N1-19":{"quick":"正解(C)。心衰竭代償時腎臟『增加鈉水再吸收』(RAAS活化)使體液增加、回流增加。","detail":{"background":"心衰竭的代償調節：①交感神經活性『增加』(非降低)→心跳加快、血管收縮、靜脈回流增加;②腎灌流下降→RAAS活化→「腎小管對鈉水再吸收『增加』→體液(前負荷)增加、水分滲入血液」(C正確);③心房壓升高會『刺激』心房利鈉肽(ANP)分泌(非抑制，企圖排鈉利尿代償)。本題正確者為(C)。(過度代償的鈉水滯留反而加重心衰竭水腫，故治療用利尿劑、ACEI)。","options":{"A":"錯誤。心衰竭時交感活性增加。","B":"錯誤。腎小管鈉水再吸收增加(非減少)。","C":"正確。增加鈉再吸收使體液增加。","D":"錯誤。心房壓升高刺激(非抑制)ANP分泌。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"112110-N1-2":{"quick":"正解(C)。骨盆內臟神經(副交感)興奮使逼尿肌收縮、尿道內括約肌舒張而排尿。","detail":{"background":"排尿的副交感控制：「骨盆內臟神經(pelvic splanchnic nerve，副交感S2–4)」興奮→「膀胱『逼尿肌收縮』＋尿道『內括約肌舒張』」→排尿。陰部神經(體神經)控制外尿道括約肌(隨意憋尿);骨盆交感(下腹下神經)則促儲尿(逼尿肌鬆、內括約肌收縮)。故使逼尿肌收縮、內括約肌舒張者為骨盆內臟神經(副交感)。","options":{"A":"錯誤。交感促儲尿(逼尿肌鬆)。","B":"錯誤。直腸下神經主排便/肛門。","C":"正確。骨盆內臟神經(副交感)促排尿。","D":"錯誤。陰部神經控制外括約肌(憋尿)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"112180-N1-18":{"quick":"正解(C)。某物質排出量>過濾量代表它被「腎小管分泌(secretion)」(過濾外又額外分泌)。","detail":{"background":"判斷腎小管對物質的處理：比較『排泄量』與『過濾量(GFR×血漿濃度)』——①排泄量『<』過濾量→淨『再吸收』;②排泄量『>』過濾量→除了過濾還有額外『腎小管分泌(secretion)』加入(如H⁺、K⁺、PAH、某些藥物);③排泄量『=』過濾量→淨無再吸收無分泌(如菊糖)。故排出量大於過濾率代表被腎小管分泌。","options":{"A":"錯誤。代謝分解非此判斷。","B":"錯誤。再吸收會使排出量小於過濾量。","C":"正確。排出>過濾代表被腎小管分泌。","D":"錯誤。過濾即GFR本身。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"113030-N1-8":{"quick":"正解(A)。無ADH介入時，鈉再吸收最多的部位是近曲小管(約65%)。","detail":{"background":"各段腎小管鈉再吸收比例：「近曲小管(PCT)約65%(最多)」、亨利氏環上行支約25%、遠曲小管約5%、集尿管約3%(受醛固酮調節)。ADH調節的是『水』(集尿管)而非鈉。故與ADH無關、鈉再吸收最多處為近曲小管。　深化：近曲小管再吸收約65%的鈉與水（等滲透壓再吸收，伴隨葡萄糖、胺基酸、碳酸氫根的主動再吸收），是腎小管再吸收量最大處。遠端腎小管的鈉再吸收受醛固酮精細調節，決定最終尿鈉排泄。","options":{"A":"正確。近曲小管鈉再吸收最多(約65%)。","B":"錯誤。遠曲小管再吸收少。","C":"錯誤。上行支約25%。","D":"錯誤。下行支對鈉不通透。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"113100-N1-18":{"quick":"正解(D)。抗利尿激素(ADH)最能增加「集尿管」對水分的再吸收。","detail":{"background":"抗利尿激素(ADH/血管加壓素)作用於「遠曲小管末段與『集尿管』」的主細胞→促進水通道(aquaporin-2)插入管腔膜→增加水的再吸收(濃縮尿、減少尿量)。缺乏ADH→尿崩症(大量稀釋尿)。亨利氏環上行支對水不通透、近曲小管水再吸收不受ADH調控(為固定的等滲再吸收)。故ADH最能增加集尿管的水再吸收。","options":{"A":"錯誤。近曲小管水再吸收不受ADH調控。","B":"錯誤。上行支對水不通透。","C":"錯誤。下行支水再吸收靠髓質梯度(非ADH直接)。","D":"正確。ADH增加集尿管水再吸收。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"113180-N1-20":{"quick":"正解(D)。脂肪乳化需要肝臟分泌(膽囊儲存)的膽鹽與磷脂質。","detail":{"background":"脂肪乳化(emulsification)：①「需要『肝臟分泌、膽囊儲存』的『膽鹽(bile salt)與磷脂質(卵磷脂)』」把大脂滴乳化成小脂滴(增加脂解酶作用面積)(D正確);②腸道機械蠕動也輔助乳化(故A「無影響」錯);③『乳化是物理分散、不是化學分解』——把三酸甘油酯分解成單酸甘油酯與游離脂肪酸的是『脂解酶』(故B錯);④乳糜微粒是腸上皮吸收後重組的脂蛋白(非乳化產物，C錯)。故正確者為(D)。","options":{"A":"錯誤。腸道機械運動輔助乳化。","B":"錯誤。分解三酸甘油酯是脂解酶(非乳化)。","C":"錯誤。乳糜微粒是吸收後重組產物。","D":"正確。乳化需膽鹽與磷脂質(肝分泌膽囊儲存)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"114030-N1-10":{"quick":"正解(A)。輔脂解酶(colipase)由胰臟分泌，幫助脂解酶錨定於脂滴表面。","detail":{"background":"輔脂解酶(colipase)由「胰臟」分泌(以前驅物procolipase分泌、被胰蛋白酶活化)：它本身『無脂解活性』，功能是「幫助胰脂解酶(pancreatic lipase)在膽鹽存在下仍能『錨定於脂滴表面』發揮作用」(膽鹽會妨礙脂解酶接觸脂滴，colipase克服此抑制)。故輔脂解酶由胰臟分泌、無脂解作用、非僅脂溶性。故(A)正確。","options":{"A":"正確。輔脂解酶由胰臟分泌。","B":"錯誤。非肝臟分泌。","C":"錯誤。並非僅脂溶性。","D":"錯誤。輔脂解酶本身無脂解作用。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"114030-N1-8":{"quick":"正解(C)。葡萄糖在腎臟正常被『完全再吸收(100%)』，比例最高。","detail":{"background":"腎小管再吸收比例：①「葡萄糖、胺基酸『正常被100%完全再吸收』(近曲小管)」——比例最高;②水約99%、鈉約99%再吸收;③尿素僅部分再吸收(約50%)。本題問再吸收『比例最高』者＝葡萄糖(100%，只要不超過Tm)。故答案葡萄糖。　深化：葡萄糖與胺基酸在近曲小管「正常完全（100%）再吸收」，故正常尿中無糖；當血糖超過腎閾值（約180mg/dL）超過再吸收上限（Tm）才出現糖尿。鈉、水約99%再吸收，但量大故尿仍可調控。","options":{"A":"錯誤。水約99%(極高但非100%)。","B":"錯誤。鈉約99%。","C":"正確。葡萄糖正常100%再吸收。","D":"錯誤。尿素僅部分再吸收。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"114100-N1-18":{"quick":"正解(B)。亨利氏環上行支對水的通透度最低(對水不通透)。","detail":{"background":"亨利氏環『上行支』對水『不通透(通透度最低)』，但主動把NaCl運出管腔→稀釋管腔液、濃縮髓質間質(逆流倍增器)。下行支則對水高通透。故對水通透度最低者為亨利氏環上行支(與109030-27一致)。　深化：亨利氏環上行支主動運出NaCl卻不透水，是「逆流倍增」建立髓質高滲透壓的關鍵，使集尿管在ADH作用下能濃縮尿液。環利尿劑（furosemide）即抑制此處Na-K-2Cl共輸送體，破壞濃縮機制而強力利尿。","options":{"A":"錯誤。近曲小管對水高通透。","B":"正確。亨利氏環上行支對水通透度最低。","C":"錯誤。下行支對水高通透。","D":"錯誤。集尿管受ADH調控可通透。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"115030-N1-9":{"quick":"正解(C)。醛固酮拮抗劑(留鉀利尿劑)主要作用在「集尿管」。","detail":{"background":"利尿劑作用部位：①滲透性利尿劑(mannitol)→主要在『近曲小管與亨利氏環』(非遠曲小管，A錯);②環利尿劑(furosemide)→抑制亨利氏環上行支的『Na-K-2Cl共同運輸』(非鈉-氫，B錯);③「醛固酮拮抗劑(spironolactone，留鉀利尿劑)→作用在『集尿管』主細胞、拮抗醛固酮」(C正確);④鈉通道阻斷劑(amiloride)→作用在『集尿管』(非近曲小管，D錯)。故醛固酮拮抗劑作用在集尿管。","options":{"A":"錯誤。滲透性利尿劑作用在近曲小管與亨利氏環。","B":"錯誤。環利尿劑抑制Na-K-2Cl共同運輸。","C":"正確。醛固酮拮抗劑作用在集尿管。","D":"錯誤。鈉通道阻斷劑作用在集尿管(非近曲小管)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理","Tortora & Derrickson《Principles of A&P》15e Ch.26"]}},"101030-N1-31":{"quick":"正解(B)。胃潰瘍破壞壁細胞→「內在因子」分泌不足→維生素B12吸收障礙→惡性貧血。","detail":{"background":"胃壁(泌酸)細胞分泌「鹽酸」與「內在因子(intrinsic factor)」。內在因子在迴腸末端幫助維生素B12吸收。嚴重胃潰瘍或萎縮性胃炎(或自體免疫)破壞壁細胞→「內在因子分泌不足→B12無法吸收→巨母紅血球性『惡性貧血』」。維生素B12本身不由胃分泌、B12的吸收在迴腸(非胃)。故主因是內在因子分泌不足。","options":{"A":"錯誤。B12非胃分泌。","B":"正確。內在因子分泌不足致B12吸收障礙。","C":"錯誤。B12吸收在迴腸非胃。","D":"錯誤。內在因子是分泌不足非吸收。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"101030-N1-32":{"quick":"正解(A)。組織胺(histamine)是刺激胃酸分泌的重要物質(經H2受體)。","detail":{"background":"刺激胃酸(壁細胞)分泌的三大物質：①「組織胺(histamine)」(由ECL細胞釋放、作用壁細胞H2受體，最強的旁分泌刺激;故H2受體拮抗劑如cimetidine可抑酸);②胃泌素(gastrin);③乙醯膽鹼(迷走神經)。胰泌素、膽囊收縮素、前列腺素E反而『抑制』胃酸或保護黏膜。故刺激胃酸分泌的重要物質為組織胺。","options":{"A":"正確。組織胺經H2受體刺激胃酸分泌。","B":"錯誤。前列腺素E保護黏膜、抑酸。","C":"錯誤。胰泌素抑制胃酸。","D":"錯誤。膽囊收縮素不主刺激胃酸。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"101110-N1-32":{"quick":"正解(D)。澱粉酶(amylase)消化『澱粉(碳水化合物)』，不消化蛋白質。","detail":{"background":"蛋白質消化酶：胃蛋白酶(pepsin)、胰蛋白酶(trypsin)、胰凝乳蛋白酶(chymotrypsin)、羧肽酶等。「澱粉酶(amylase)」是分解『澱粉(多醣)』的『碳水化合物消化酶』，不消化蛋白質。故不消化蛋白質者為amylase。","options":{"A":"消化蛋白質。pepsin。","B":"消化蛋白質。trypsin。","C":"消化蛋白質。chymotrypsin。","D":"不消化蛋白質(即為答案)。amylase消化澱粉。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"102030-N1-31":{"quick":"正解(D)。脂肪酸(脂質消化終產物)可被消化道直接吸收;大分子蛋白與纖維素不能。","detail":{"background":"消化道只吸收『小分子終產物』：碳水化合物→單醣、蛋白質→胺基酸/小胜肽、脂肪→脂肪酸與單酸甘油酯。「脂肪酸」是脂質消化的終產物、可直接吸收。膠原蛋白(大分子蛋白須先消化)、免疫球蛋白(大分子，成人不直接吸收;新生兒可吸收初乳抗體)、纖維質(人體無酶分解、不吸收)皆不能直接吸收。故可直接吸收者為脂肪酸。","options":{"A":"錯誤。膠原蛋白須先消化成胺基酸。","B":"錯誤。免疫球蛋白成人不直接吸收。","C":"錯誤。纖維質不被人體吸收。","D":"正確。脂肪酸可直接吸收。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"102030-N1-32":{"quick":"正解(C)。胃泌素增加壁細胞分泌鹽酸→胃酸過多→十二指腸潰瘍(如卓-艾症候群)。","detail":{"background":"胃泌素(gastrin)主要作用是「刺激胃壁(泌酸)細胞分泌『鹽酸(HCl)』」(並促進胃黏膜生長)。胰臟(或十二指腸)的胃泌素瘤(gastrinoma)→分泌大量gastrin→胃酸過度分泌→嚴重消化性潰瘍(尤其十二指腸/空腸)＝「卓-艾症候群(Zollinger-Ellison syndrome)」。故導致潰瘍的是gastrin增加胃酸分泌。","options":{"A":"錯誤。gastrin非減少黏液。","B":"錯誤。HCO₃⁻由胰泌素促進。","C":"正確。gastrin增加胃腺分泌鹽酸→潰瘍。","D":"錯誤。胰蛋白酶原由胰泡細胞分泌、非gastrin主作用。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"102110-N1-32":{"quick":"正解(B)。胰泌素(secretin)減少胃酸分泌、並促進胰臟與肝臟分泌富含HCO₃⁻的鹼性液。","detail":{"background":"胰泌素(secretin)由十二指腸S細胞在『酸性食糜』刺激下分泌，作用：①「促進胰臟管細胞與肝臟分泌富含『碳酸氫根(HCO₃⁻)』的鹼性液」中和胃酸;②「『抑制(減少)』胃酸分泌與胃排空」(故B正確);③促進膽汁分泌。本題正確者為(B)減少胃酸分泌。(A、C、D皆說反——secretin是增加HCO₃⁻、增加膽汁)。","options":{"A":"錯誤。secretin增加(非減少)胰臟HCO₃⁻。","B":"正確。secretin減少胃酸分泌。","C":"錯誤。secretin不減少小腸液。","D":"錯誤。secretin促進膽汁分泌。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"103030-N1-31":{"quick":"正解(B)。胃膨脹會經「胃腸反射」促進小腸運動(及胃結腸反射促排便)。","detail":{"background":"胃因食物膨脹撐張→刺激胃壁機械受器→經腸神經與迷走反射引發一系列反應：①「胃腸反射(gastroenteric reflex)→促進『小腸運動活性』與分泌」(B正確);②胃結腸反射→促進結腸質塊運動(產生便意);③促進胃排空。故胃膨脹促進小腸運動。(A唾液、C抑制胃排空、D抑制胃結腸反射皆與實際相反)。","options":{"A":"錯誤。胃膨脹非主促唾液。","B":"正確。胃膨脹促進小腸運動(胃腸反射)。","C":"錯誤。胃膨脹促進(非抑制)胃排空。","D":"錯誤。胃膨脹促進(非抑制)胃結腸反射。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"103030-N1-32":{"quick":"正解(C)。腸道節律器細胞(Cajal間質細胞)的慢波去極化主要由「鈣離子」流入造成。","detail":{"background":"腸道平滑肌的「慢波(slow waves)」由「卡氏間質細胞(Cajal interstitial cells，腸道節律器)」產生，其去極化主要由「鈣離子(Ca²⁺)內流」造成(慢波本身為次閾值震盪，達閾值才觸發動作電位與收縮)。故慢波去極化主要由鈣離子內流所致。","options":{"A":"錯誤。鈉非慢波主要離子。","B":"錯誤。鉀外流主再極化。","C":"正確。鈣離子內流造成慢波去極化。","D":"錯誤。鎂非此機制。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"103100-N1-27":{"quick":"正解(A)。脾靜脈匯入肝門靜脈。","detail":{"background":"肝門靜脈(hepatic portal vein)由「脾靜脈」與「腸繫膜上靜脈」匯合而成，收集胃、脾、胰、腸等消化器官的富養分血送入肝臟。肝靜脈是出肝血流(匯入下腔靜脈)、腎靜脈與腰靜脈匯入下腔靜脈，皆不入肝門靜脈。故匯入肝門靜脈者為脾靜脈。","options":{"A":"正確。脾靜脈匯入肝門靜脈。","B":"錯誤。肝靜脈匯入下腔靜脈。","C":"錯誤。腎靜脈匯入下腔靜脈。","D":"錯誤。腰靜脈匯入下腔靜脈。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"103100-N1-31":{"quick":"正解(D)。碳水化合物消化後主要以「單醣」形式被吸收。","detail":{"background":"碳水化合物消化：澱粉(多醣)→經澱粉酶分解為雙醣與寡醣→再經刷狀緣雙醣酶(麥芽糖酶、蔗糖酶、乳糖酶)分解成「單醣(葡萄糖、半乳糖、果糖)」→由小腸上皮吸收。故主要以單醣形式吸收(葡萄糖與半乳糖經SGLT1次級主動運輸、果糖經GLUT5輔助擴散)。","options":{"A":"錯誤。多醣須先分解。","B":"錯誤。寡醣須再分解。","C":"錯誤。雙醣須再分解。","D":"正確。以單醣形式吸收。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"103100-N1-32":{"quick":"正解(A)。體抑素(somatostatin)『抑制』胃酸分泌，不會活化H⁺/K⁺-ATP酶(質子幫浦)。","detail":{"background":"胃壁細胞分泌H⁺靠「H⁺/K⁺-ATP酶(質子幫浦)」。『活化(刺激)』質子幫浦/胃酸分泌的有：乙醯膽鹼(ACh)、組織胺(histamine)、胃泌素(gastrin)。「體抑素(somatostatin)」反而『抑制』胃酸分泌(抑制gastrin與組織胺釋放)。故不能活化H⁺/K⁺-ATP酶者為體抑素。","options":{"A":"不能活化(即為答案)。體抑素抑制胃酸分泌。","B":"能活化。乙醯膽鹼刺激胃酸。","C":"能活化。組織胺刺激胃酸。","D":"能活化。胃泌素刺激胃酸。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"104030-N1-31":{"quick":"正解(B)。胃泌素(gastrin)促進胃酸分泌與胃蠕動，加速胃排空。","detail":{"background":"胃排空速率的調節：①「胃泌素(gastrin)」促進胃竇收縮與胃蠕動→『加速胃排空』(B);②相反地，十二指腸的『胰泌素(secretin)、膽囊收縮素(CCK)、抑胃胜肽(GIP)』在酸、脂肪、高張食糜刺激下分泌→『抑制(減慢)胃排空』(腸胃抑制反射，讓十二指腸有時間處理食糜)。故促進胃排空者為胃泌素。","options":{"A":"錯誤。胰泌素抑制胃排空。","B":"正確。胃泌素加速胃排空。","C":"錯誤。CCK抑制胃排空。","D":"錯誤。抑胃胜肽抑制胃排空。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"104030-N1-32":{"quick":"正解(A)。小腸吸收葡萄糖伴隨「鈉離子」(鈉-葡萄糖共同運輸SGLT1)。","detail":{"background":"小腸上皮頂膜的葡萄糖吸收靠「鈉-葡萄糖共同運輸體(SGLT1)」：利用鈉的電化學梯度(由基底側Na-K-ATPase維持)把『葡萄糖與鈉離子一起(同向)』載入細胞(次級主動運輸)。半乳糖也走SGLT1。故吸收葡萄糖伴隨的離子為鈉(與104030-32、101030-28renal一致)。","options":{"A":"正確。葡萄糖與鈉共同運輸吸收。","B":"錯誤。非鉀。","C":"錯誤。非氫。","D":"錯誤。亞鈷與B12有關非葡萄糖。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"104100-N1-31":{"quick":"正解(B)。大腸的最後一段是「直腸(rectum)」(再接肛管)。","detail":{"background":"大腸順序：盲腸→升結腸→橫結腸→降結腸→乙狀結腸→「直腸(rectum)」→肛管。故大腸的最後一段為直腸(儲存糞便、引發便意)。迴腸屬小腸、迴盲瓣是小腸大腸交界、歐迪氏括約肌在膽胰管開口。故答案直腸。　深化：直腸儲存糞便，當糞便充盈刺激直腸壁牽張感受器引發排便反射（副交感S2-4），同時需大腦皮質放鬆隨意控制的外肛門括約肌才完成排便。便意可被意志暫時抑制（外括約肌為骨骼肌）。","options":{"A":"錯誤。迴腸屬小腸。","B":"正確。大腸最後一段是直腸。","C":"錯誤。迴盲瓣是小腸大腸交界。","D":"錯誤。歐迪氏括約肌在膽胰管口。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"104100-N1-32":{"quick":"正解(A)。胃腺分泌H⁺靠「初級主動運輸(H⁺/K⁺-ATP酶，直接耗ATP)」。","detail":{"background":"胃壁細胞分泌氫離子(H⁺)到管腔，逆極大濃度梯度(管腔pH可低至1，比血漿高百萬倍)，靠「H⁺/K⁺-ATP酶(質子幫浦)『直接水解ATP』把H⁺打出、K⁺打入」＝『初級(一級)主動運輸』。質子幫浦抑制劑(PPI，如omeprazole)即阻斷此酶抑酸。故胃酸分泌為初級主動運輸。","options":{"A":"正確。胃酸分泌靠質子幫浦(初級主動運輸)。","B":"錯誤。非次級主動運輸。","C":"錯誤。逆梯度需耗能、非簡單擴散。","D":"錯誤。非促進擴散。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"105030-N1-31":{"quick":"正解(B)。大腸的「質塊運動(mass movement)」把糞便推入直腸，引發便意。","detail":{"background":"大腸運動：①結腸袋運動(haustration)與分節運動→混合、吸水;②蠕動→緩慢推進;③「質塊運動(mass movement)＝強力的推進性收縮(常於餐後因胃結腸反射觸發)，把大量糞便快速推入直腸→直腸擴張→引發『排便慾望(便意)』」。故最易引發便意者為質塊運動。","options":{"A":"錯誤。結腸袋運動主混合。","B":"正確。質塊運動引發便意。","C":"錯誤。分節運動主混合。","D":"錯誤。一般蠕動推進緩慢。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"105030-N1-32":{"quick":"正解(A)。膽鹽經腸肝循環重吸收的比例最高(約95%)。","detail":{"background":"「腸肝循環(enterohepatic circulation)」：膽鹽(bile salt)隨膽汁排入腸道幫助脂肪乳化吸收後，在『迴腸末端約95%被主動再吸收』，經肝門靜脈回肝再利用(每天循環數次)，只有少量隨糞便流失。故被腸肝循環重吸收比例最高者為膽鹽。腸激酶、果糖、肝醣不走腸肝循環。故答案膽鹽。","options":{"A":"正確。膽鹽經腸肝循環約95%再吸收。","B":"錯誤。腸激酶不走腸肝循環。","C":"錯誤。果糖被吸收但不循環。","D":"錯誤。肝醣是肝內儲存形式。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"105090-N1-31":{"quick":"正解(A)。消化道最重要的推進運動是「蠕動(peristalsis)」。","detail":{"background":"消化道運動分「推進」與「混合」：①「蠕動(peristalsis)＝環肌依序收縮、把食團向前(肛端)推進」——最重要的推進運動;②分節運動、鐘擺運動→主要『混合』食糜與消化液、增加與黏膜接觸;③蠕動急流是病態(腹瀉時)。故最重要的推進運動為蠕動。","options":{"A":"正確。蠕動是最重要的推進運動。","B":"錯誤。分節運動主混合。","C":"錯誤。鐘擺運動主混合。","D":"錯誤。蠕動急流是病態。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"105090-N1-32":{"quick":"正解(A)。膽汁中所占比率最高的是「水」(約97%)。","detail":{"background":"膽汁(bile)的組成：「水約97%(最多)」，其餘為膽鹽、膽色素(膽紅素)、膽固醇、卵磷脂(磷脂)、電解質等。膽汁由肝細胞製造、膽囊濃縮儲存，幫助乳化脂肪。故膽汁中比率最高者為水。　深化：膽汁由肝細胞分泌、膽囊濃縮儲存，進食（尤其脂肪）刺激CCK使膽囊收縮、歐迪氏括約肌鬆弛而排入十二指腸。膽鹽乳化脂肪、促進脂肪與脂溶性維生素吸收；膽紅素為血基質代謝產物，膽道阻塞會造成黃疸與灰白便。","options":{"A":"正確。膽汁中水約97%最多。","B":"錯誤。膽鹽僅少量。","C":"錯誤。膽色素少量。","D":"錯誤。卵磷脂少量。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"106030-N1-31":{"quick":"正解(C)。胃泌素由胃竇的「G細胞」分泌。","detail":{"background":"胃腺細胞分泌物：壁細胞(鹽酸、內在因子)、主細胞(胃蛋白酶原)、黏液頸細胞(黏液)、「G細胞(在胃竇)→分泌『胃泌素(gastrin)』」、ECL細胞(組織胺)、D細胞(體抑素)。故分泌胃泌素者為G細胞。　深化：胃的內分泌：G細胞（胃竇）分泌胃泌素（gastrin）促胃酸分泌、ECL細胞分泌組織胺、D細胞分泌體抑素（抑制）。胃酸分泌的三相（頭期迷走、胃期胃泌素與膨脹、腸期）由神經與激素協同調控。","options":{"A":"錯誤。壁細胞分泌鹽酸與內在因子。","B":"錯誤。主細胞分泌胃蛋白酶原。","C":"正確。G細胞分泌胃泌素。","D":"錯誤。ECL細胞分泌組織胺。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"106030-N1-32":{"quick":"正解(C)。食糜中的「脂質(脂肪)」最容易刺激空腸黏膜分泌膽囊收縮素(CCK)。","detail":{"background":"膽囊收縮素(cholecystokinin, CCK)由十二指腸與空腸的I細胞分泌，主要由「食糜中的『脂肪(脂肪酸)』與蛋白質(胺基酸)」刺激分泌(脂肪最強)。CCK作用：促膽囊收縮排膽汁、促胰臟分泌消化酶、抑制胃排空、產生飽足感。故最易刺激CCK分泌者為脂質。","options":{"A":"錯誤。醣類非主要刺激。","B":"錯誤。蛋白質也刺激但脂質最強。","C":"正確。脂質最易刺激CCK分泌。","D":"錯誤。鈉離子非刺激因子。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"106110-N1-32":{"quick":"正解(A)。小腸的免疫細胞集中於「派亞氏結(Peyer's patches)」。","detail":{"background":"小腸(尤其迴腸)黏膜固有層內有「派亞氏結(Peyer's patches)」——聚集的淋巴小結(GALT，腸道相關淋巴組織)，含B、T淋巴球與M細胞，負責攔截腸腔抗原、啟動黏膜免疫(分泌IgA)。乳糜管吸收脂肪、腸上皮細胞吸收養分、杯狀細胞分泌黏液，皆非免疫主場。故免疫細胞集中於派亞氏結。","options":{"A":"正確。派亞氏結是小腸免疫組織。","B":"錯誤。乳糜管吸收脂肪。","C":"錯誤。腸上皮細胞主吸收。","D":"錯誤。杯狀細胞分泌黏液。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"106111-N1-31":{"quick":"正解(B)。膽固醇由小腸上皮吸收後，形成乳糜微粒進入乳糜管(淋巴)。","detail":{"background":"脂質(含膽固醇、長鏈脂肪酸、脂溶性維生素)的吸收：在小腸上皮細胞內『重新組成三酸甘油酯與膽固醇酯，再包裝成『乳糜微粒(chylomicron)』→進入『乳糜管(淋巴管)』→經淋巴系統(胸管)入血(繞過肝門靜脈)』。短鏈脂肪酸才直接入門脈。膽固醇『在小腸(非大腸)吸收』。故(B)正確：小腸上皮吸收後形成乳糜微粒入乳糜管。","options":{"A":"錯誤。長鏈脂質/膽固醇走乳糜管(淋巴)非門脈。","B":"正確。小腸吸收後成乳糜微粒入乳糜管。","C":"錯誤。膽固醇在小腸吸收非大腸。","D":"錯誤。在小腸非大腸。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"106111-N1-32":{"quick":"正解(B)。膽囊收縮素(CCK)促進胰臟分泌胰液(消化酶)、並促膽囊收縮。","detail":{"background":"膽囊收縮素(CCK)的功能：①「促進胰臟腺泡細胞分泌『富含消化酶的胰液』」(B正確);②促膽囊收縮、Oddi括約肌鬆弛→排膽汁;③『抑制(減慢)胃排空』(故A「促進胃排空」錯);④產生飽足感。它不抑制膽鹽合成、不主刺激胃酸。故正確者為(B)促進胰臟分泌胰液。","options":{"A":"錯誤。CCK抑制胃排空。","B":"正確。CCK促進胰臟分泌胰液。","C":"錯誤。CCK不抑制膽鹽合成。","D":"錯誤。CCK非促胃酸分泌。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"107030-N1-17":{"quick":"正解(C)。動物性脂肪比植物性脂肪含更多飽和脂肪。","detail":{"background":"脂質敘述：(A)脂肪『不溶於水』(疏水)，故A錯;(B)「『飽和』脂肪是『單鍵(無雙鍵)』的碳氫鏈;『不飽和』脂肪才含雙鍵」，故B說反;(C)「『動物性脂肪』(如豬油、奶油)含較多飽和脂肪(室溫固態);『植物性脂肪』(如橄欖油)含較多不飽和脂肪(室溫液態)」——正確;(D)磷脂質『含脂肪酸』(由甘油+2脂肪酸+磷酸基組成)，故D錯。故正確者為(C)。","options":{"A":"錯誤。脂肪不溶於水。","B":"錯誤。飽和脂肪是單鍵(無雙鍵)。","C":"正確。動物性脂肪含較多飽和脂肪。","D":"錯誤。磷脂質含脂肪酸。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"107030-N1-32":{"quick":"正解(C)。肌神經叢(Auerbach/myenteric plexus)位於消化道的「肌肉層」。","detail":{"background":"腸神經系統：「肌神經叢(肌間神經叢, Auerbach/myenteric plexus)位於『肌肉層(外肌層)的內環肌與外縱肌之間』，調節腸道運動(蠕動)」;黏膜下神經叢(Meissner)在黏膜下層調節分泌與局部血流。故肌神經叢位於肌肉層。","options":{"A":"錯誤。黏膜層無此叢主體。","B":"錯誤。黏膜下層是Meissner叢。","C":"正確。肌神經叢在肌肉層(內環外縱間)。","D":"錯誤。漿膜層為最外層。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"107110-N1-28":{"quick":"正解(A)。水分排除量＝過濾(X)＋分泌(Y)−重吸收(Z)。","detail":{"background":"腎臟對任何物質的「排泄量＝過濾量＋分泌量−再吸收量」。本題水分：排除量＝『過濾(X)＋分泌(Y)−重吸收(Z)』＝X＋Y−Z。這是腎臟物質平衡的基本公式(排泄＝濾過＋分泌−再吸收)。故答案X+Y−Z。　深化：腎臟清除率（clearance）概念：排泄量＝過濾＋分泌−再吸收。菊糖（inulin）只過濾不分泌不再吸收，其清除率＝腎絲球過濾率（GFR）；PAH幾乎完全清除可估腎血漿流量。此公式是腎功能評估的核心。","options":{"A":"正確。排除＝過濾X＋分泌Y−重吸收Z。","B":"錯誤。式子不符。","C":"錯誤。式子不符。","D":"錯誤。式子不符。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理"]}},"108020-N1-31":{"quick":"正解(C)。多醣被分解成可被吸收的單醣。","detail":{"background":"碳水化合物消化吸收：(A)消化『從口腔(唾液澱粉酶)開始』非從胃(胃酸使唾液澱粉酶失活)，故A錯;(B)「乳糖不耐症是『乳糖酶(lactase)』不足」(非澱粉酶)，故B錯;(C)「多醣(澱粉)被分解成可被吸收的『單醣』」——正確;(D)「蔗糖(雙醣)必須先被蔗糖酶分解成單醣才能吸收」，不能直接通過上皮，故D錯。故正確者為(C)。","options":{"A":"錯誤。醣類消化從口腔開始。","B":"錯誤。乳糖不耐是乳糖酶不足。","C":"正確。多醣分解成單醣吸收。","D":"錯誤。蔗糖須先分解成單醣。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"108110-N1-31":{"quick":"正解(B)。蛋白質消化產物(胺基酸)吸收後經肝門靜脈直接進入肝臟。","detail":{"background":"蛋白質消化吸收：(A)胰臟『腺泡細胞(非管細胞)』分泌蛋白酶原(管細胞分泌HCO₃⁻)，故A錯;(B)「胺基酸與小胜肽被小腸吸收後，經『肝門靜脈直接送入肝臟』」——正確(水溶性養分走門脈，脂質才走淋巴);(C)胃蛋白酶在『胃』作用(到小腸鹼性環境會失活)，不在小腸與胰酶協同，故C錯;(D)蛋白酶以『無活性的酶原』分泌(如胃蛋白酶原、胰蛋白酶原)，到管腔才活化(防自我消化)，故D錯。故正確者為(B)。","options":{"A":"錯誤。蛋白酶由腺泡細胞分泌(非管細胞)。","B":"正確。胺基酸經肝門靜脈入肝。","C":"錯誤。胃蛋白酶在胃作用、到小腸失活。","D":"錯誤。蛋白酶以無活性酶原分泌。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"108110-N1-32":{"quick":"正解(D為「不屬於」者)。吞嚥反射時下食道括約肌應『鬆弛』讓食物入胃，不是收縮。","detail":{"background":"吞嚥反射(swallowing reflex)的協調動作：①「呼吸暫時受抑制(防嗆)」(A);②「會厭蓋住、聲門關閉(防食物入氣管)」(B);③「上食道括約肌鬆弛(讓食團進入食道)」(C);④食團經蠕動下行時「『下食道括約肌『鬆弛』』讓食團進胃」。本題問「不屬於」者＝(D)「下食道括約肌『收縮』」(實際應鬆弛)。故答案(D)。","options":{"A":"屬於。呼吸受抑制。","B":"屬於。聲門關閉防嗆。","C":"屬於。上食道括約肌鬆弛。","D":"不屬於(即為答案)。下食道括約肌應鬆弛非收縮。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"109030-N1-29":{"quick":"正解(D)。果糖(fructose)經「輔助擴散(GLUT5)」由小腸頂膜吸收。","detail":{"background":"單醣的小腸吸收機制：①「葡萄糖、半乳糖→經『鈉-葡萄糖共同運輸(SGLT1，次級主動運輸)』由頂膜吸收」;②「果糖(fructose)→經『輔助擴散(GLUT5)』被動吸收(不耗能、不伴鈉)」。麥芽糖是雙醣須先分解。故經輔助擴散吸收者為果糖。","options":{"A":"錯誤。葡萄糖經SGLT1(次級主動)。","B":"錯誤。半乳糖經SGLT1。","C":"錯誤。麥芽糖是雙醣須先分解。","D":"正確。果糖經輔助擴散(GLUT5)吸收。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"109030-N1-30":{"quick":"正解(A)。維生素A是脂溶性維生素，會出現在乳糜微粒中。","detail":{"background":"脂溶性維生素(A、D、E、K)隨脂質一起被吸收、包裝進「乳糜微粒(chylomicron)」經淋巴入血。維生素A屬脂溶性→出現在乳糜微粒。維生素B6、B12、C是『水溶性』維生素，直接吸收入門脈、不進乳糜微粒。故出現在乳糜微粒者為維生素A。","options":{"A":"正確。維生素A(脂溶性)在乳糜微粒中。","B":"錯誤。B6水溶性。","C":"錯誤。B12水溶性(經內在因子吸收)。","D":"錯誤。維生素C水溶性。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"109110-N1-31":{"quick":"正解(A)。膨脹的胃(胃擴張)是刺激胃泌素(gastrin)分泌的直接重要因子。","detail":{"background":"刺激胃泌素(gastrin)分泌的因子：①「胃擴張(膨脹的胃)」(機械刺激，經迷走與局部反射);②胃內『蛋白質消化產物(胺基酸、胜肽)』;③迷走神經(ACh經GRP)。而「胃腔內H⁺(酸度)增加會『抑制』gastrin分泌(負回饋，經體抑素)」(故B說『增加H⁺刺激gastrin』錯);胰泌素抑制gastrin。故刺激gastrin的直接重要因子為膨脹的胃。","options":{"A":"正確。胃擴張刺激gastrin分泌。","B":"錯誤。胃內H⁺增加抑制gastrin。","C":"錯誤。胰泌素抑制gastrin。","D":"錯誤。食道蠕動非gastrin刺激因子。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"110030-N1-21":{"quick":"正解(B)。「肝醣酶(glycogenase)」在小腸液中含量最低(小腸不分解肝醣，肝醣消化在口腔/胰澱粉酶層級)。","detail":{"background":"小腸刷狀緣的雙醣酶(分解雙醣成單醣)：「蔗糖酶(sucrase)、乳糖酶(lactase)、麥芽糖酶(maltase)」都豐富存在於小腸。而「肝醣(glycogen)是多醣，由唾液與胰『澱粉酶』分解，小腸刷狀緣並無專門的『肝醣酶(glycogenase)』」，故其含量最低。故答案肝醣酶。","options":{"A":"錯誤。蔗糖酶豐富。","B":"正確。肝醣酶在小腸液含量最低。","C":"錯誤。乳糖酶存在。","D":"錯誤。麥芽糖酶豐富。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"110030-N1-32":{"quick":"正解(A為「錯誤」者)。脂溶性維生素的吸收『需要膽汁(膽鹽)』乳化、形成微膠粒，故說「不受膽汁影響」是錯的。","detail":{"background":"脂溶性維生素(A、D、E、K)的吸收：①與脂質一起、「『需要膽汁(膽鹽)』乳化脂肪、形成『微膠粒(micelle)』」幫助溶解運送到上皮吸收，故膽汁不足(如膽道阻塞)會導致脂溶性維生素吸收不良——故(A)「吸收不受膽汁分泌影響」為『錯誤』;②包含A、D、E、K(B對);③溶於微膠粒(C對);④在小腸吸收(D對)。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。脂溶性維生素吸收需要膽汁(膽鹽)。","B":"正確。脂溶性維生素為A、D、E、K。","C":"正確。溶解在微膠粒中。","D":"正確。在小腸吸收。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"110110-N1-32":{"quick":"正解(A為「不會出現」者)。特低密度脂蛋白(VLDL)由『肝臟』製造，不會出現在腸道吸收的乳糜微粒中。","detail":{"background":"乳糜微粒(chylomicron)是『小腸上皮』把吸收的脂質(三酸甘油酯、膽固醇、磷脂、脂溶性維生素)＋『載脂蛋白(ApoB-48)』包裝而成，經淋巴入血。其成分含膽固醇、磷脂、脂溶性維生素(如維生素D)等。「特低密度脂蛋白(VLDL)是『肝臟』合成、運送內源性三酸甘油酯的脂蛋白」，不會出現在腸道乳糜微粒中。故不會出現者為VLDL。","options":{"A":"不會(即為答案)。VLDL由肝臟製造，非乳糜微粒成分。","B":"會。維生素D(脂溶性)在乳糜微粒。","C":"會。磷脂質是乳糜微粒成分。","D":"會。膽固醇是乳糜微粒成分。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"111030-N1-17":{"quick":"正解(B)。碳水化合物的碳:氫:氧比例約為1:2:1。","detail":{"background":"碳水化合物(carbohydrate)的通式為(CH₂O)ₙ，即碳:氫:氧的原子數比約「1:2:1」(如葡萄糖C₆H₁₂O₆＝6:12:6＝1:2:1)，氫與氧的比例與水相同(2:1)，故名「碳『水』化合物」。故比率為1:2:1。　深化：碳水化合物通式(CH₂O)ₙ，碳氫氧比約1:2:1，是身體主要快速能量來源（葡萄糖）。依分子大小分單醣、雙醣、多醣；多餘葡萄糖以肝糖儲存或轉脂肪。每克產4大卡，與蛋白質同、脂肪每克9大卡。","options":{"A":"錯誤。非1:1:1。","B":"正確。碳水化合物C:H:O＝1:2:1。","C":"錯誤。非1:3:1。","D":"錯誤。非1:4:1。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"111030-N1-27":{"quick":"正解(A為「不屬於外分泌」者)。胰島素(insulin)是胰臟『內分泌』(胰島β細胞)產物，非外分泌蛋白。","detail":{"background":"胰臟有內分泌與外分泌：①「外分泌(腺泡細胞→經胰管入十二指腸)」＝消化酶(胰蛋白酶trypsin、胰凝乳蛋白酶chymotrypsin、胰澱粉酶amylase、胰脂解酶等)與HCO₃⁻;②「內分泌(胰島)」＝胰島素(β細胞)、升糖素(α細胞)、體抑素(δ細胞)。本題問「不屬於外分泌蛋白」者＝(A)胰島素(屬內分泌)。其餘B、C、D皆為外分泌消化酶。故答案(A)。","options":{"A":"不屬於(即為答案)。胰島素是內分泌(胰島β細胞)。","B":"屬於外分泌。胰蛋白酶。","C":"屬於外分泌。胰凝乳蛋白酶。","D":"屬於外分泌。胰澱粉酶。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"111030-N1-32":{"quick":"正解(D為「錯誤」者)。胃腸道反射受體啟動的是『回饋(feedback)』調節，題述「激活前饋路徑」不符其主要角色，為本題答案。","detail":{"background":"胃腸道的感受器(receptors)：①「包括化學感受器、滲透壓感受器、機械(伸張)感受器」(A對);②「位於胃腸道管壁上」(B對);③「將訊息傳給中樞神經(經迷走/脊神經)或腸道神經叢(局部反射)」(C對)。本題以(D)「激活前饋路徑(feedforward)」為答案——胃腸感受器主要驅動的是『回饋(feedback)』性調節(依管腔狀況調整分泌與運動)，故(D)為不符的敘述。","options":{"A":"正確。含化學、滲透壓、機械感受器。","B":"正確。位於胃腸道管壁。","C":"正確。訊息傳給中樞或腸神經叢。","D":"錯誤(即為答案)。其主要為回饋調節，非激活前饋路徑。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"111110-N1-12":{"quick":"正解(D為「非交感作用」者)。交感神經興奮使瞳孔『散大』，不是縮小。","detail":{"background":"交感神經(戰或逃, fight-or-flight)的作用：①「腸胃道蠕動與分泌『減少』」(A);②「汗腺分泌『增加』」(B);③「支氣管(氣管)『擴張』」(C，利通氣);④心跳加快、血管收縮、肝醣分解、「『瞳孔散大(放大)』」。本題問「不是交感作用」者＝(D)「瞳孔『縮小』」——瞳孔縮小是『副交感』作用，交感使瞳孔散大。故答案(D)。","options":{"A":"是交感作用。腸胃蠕動減少。","B":"是交感作用。汗液分泌增加。","C":"是交感作用。氣管擴張。","D":"非(即為答案)。交感使瞳孔散大，縮小是副交感。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Cell & Autonomic","實用生理學（華杏）細胞與自律神經"]}},"111110-N1-15":{"quick":"正解(B)。體抑素(somatostatin)在消化道主要由「胃(及胰島、腸)的D細胞」分泌。","detail":{"background":"體抑素(somatostatin)在消化系統主要由「胃與腸道黏膜及胰島的『D(δ)細胞』」分泌，其中胃的D細胞分泌量重要(抑制胃泌素、胃酸與多種胃腸激素)。本題選項中『胃』最符合。唾腺、膽囊、十二指腸雖也有少量內分泌細胞，但體抑素的主要消化道來源以胃(及胰島)為代表。故答案胃。","options":{"A":"錯誤。唾腺非體抑素主來源。","B":"正確。胃的D細胞分泌體抑素。","C":"錯誤。膽囊非分泌體抑素。","D":"十二指腸有少量但胃為主要代表。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"112180-N1-20":{"quick":"正解(C)。微膠粒(micelle)的主要功能是促進脂肪的消化與吸收(運送脂質產物到上皮)。","detail":{"background":"「微膠粒(micelle)」由膽鹽與磷脂包裹脂肪消化產物(單酸甘油酯、脂肪酸、膽固醇、脂溶性維生素)形成的微小聚集體，「把這些『脂溶性』產物運送穿過小腸黏膜表面的水層到上皮細胞被吸收」→『促進脂肪消化與吸收』。故微膠粒主要功能是促進脂肪消化吸收(運送脂溶性而非水溶性物質)。","options":{"A":"錯誤。微膠粒運送脂溶性(非水溶性)維生素。","B":"錯誤。分解蛋白質是蛋白酶。","C":"正確。微膠粒促進脂肪消化與吸收。","D":"錯誤。產生胃酸是壁細胞。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"113030-N1-18":{"quick":"正解(B)。迷走神經(副交感)調控並加速肝臟分泌膽汁。","detail":{"background":"肝臟分泌膽汁受「迷走神經(副交感)」與膽囊收縮素(CCK)、胰泌素等促進。迷走神經(副交感)興奮可增加膽汁分泌(膽汁酸非依賴性與依賴性分泌)與膽囊收縮;交感神經則抑制。故加速肝臟分泌膽汁者為迷走神經。　深化：膽汁分泌受神經（迷走副交感促進）與激素（CCK促膽囊收縮、胰泌素促膽管分泌HCO₃⁻富水膽汁）調控。膽鹽經腸肝循環（迴腸再吸收回肝）反覆利用，是維持膽鹽庫的重要機制。","options":{"A":"錯誤。交感神經抑制膽汁分泌。","B":"正確。迷走神經促進膽汁分泌。","C":"錯誤。胸腰段為交感來源。","D":"錯誤。舌咽神經主咽與唾液腺。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"113180-N1-9":{"quick":"正解(A)。胃壁(泌酸)細胞分泌內在因子，協助維生素B12吸收。","detail":{"background":"「內在因子(intrinsic factor)」由「胃壁(泌酸)細胞(parietal cell)」分泌(壁細胞同時分泌鹽酸與內在因子)，內在因子在迴腸末端與B12結合幫助其吸收。壁細胞受損(萎縮性胃炎、自體免疫、胃切除)→內在因子缺乏→B12吸收障礙→惡性貧血。故分泌內在因子者為胃壁細胞(與101030-31呼應)。","options":{"A":"正確。胃壁細胞分泌內在因子。","B":"錯誤。主細胞分泌胃蛋白酶原。","C":"錯誤。胰島細胞分泌激素。","D":"錯誤。胰腺泡細胞分泌消化酶。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"114030-N1-17":{"quick":"正解(B)。負責分泌胃酸的細胞是「壁細胞(parietal cell)」。","detail":{"background":"胃腺「壁(泌酸)細胞(parietal cell)」分泌『鹽酸(HCl，胃酸)』與內在因子;主細胞分泌胃蛋白酶原;黏液頸細胞分泌黏液;腸內分泌細胞(G、D、ECL)分泌激素。故分泌胃酸者為壁細胞。　深化：壁細胞（parietal cell）以H⁺-K⁺-ATPase（質子幫浦）分泌鹽酸，受組織胺（H2）、乙醯膽鹼（M3）、胃泌素三路徑刺激——這是PPI（抑制質子幫浦）與H2阻斷劑治療消化性潰瘍的藥理基礎。內在因子（亦由壁細胞分泌）負責迴腸吸收維生素B12，缺乏致惡性貧血。","options":{"A":"錯誤。主細胞分泌胃蛋白酶原。","B":"正確。壁細胞分泌胃酸。","C":"錯誤。黏液頸細胞分泌黏液。","D":"錯誤。腸內分泌細胞分泌激素。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, GI Physiology","實用生理學（華杏）消化生理","Tortora & Derrickson《Principles of A&P》15e Ch.24"]}},"115030-N1-1":{"quick":"正解(D)。鈣幫浦(Ca-ATPase)是初級主動運輸子(直接耗ATP)。","detail":{"background":"初級主動運輸子(primary active transporter)＝『直接水解ATP』把離子逆梯度運送的幫浦，如Na-K-ATPase、「鈣幫浦(Ca²⁺-ATPase，如SERCA、PMCA)」、H-K-ATPase、質子幫浦。鈣通道、鈣依賴性鉀通道是『被動』通道(順梯度);鈉鈣交換子(NCX)是『次級』主動運輸(靠鈉梯度)。故屬初級主動運輸子者為鈣幫浦。","options":{"A":"錯誤。鈣通道是被動通道。","B":"錯誤。鈣依賴性鉀通道是被動。","C":"錯誤。鈉鈣交換子是次級主動運輸。","D":"正確。鈣幫浦是初級主動運輸子。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Cell & Autonomic","實用生理學（華杏）細胞與自律神經"]}},"112110-N1-18":{"quick":"正解(D)。尿素與「氯化鈉(NaCl)」累積造成腎髓質間質的高滲透度。","detail":{"background":"腎髓質間質的高滲透梯度(可達1200 mOsm)由兩大溶質維持：①「氯化鈉(NaCl)」——由亨利氏環上行支主動運出;②「尿素(urea)」——由內髓集尿管再循環累積。兩者共同造成髓質間質高滲，是濃縮尿(經ADH作用集尿管)的基礎。故與尿素一起造成髓質高滲者為NaCl。","options":{"A":"錯誤。二氧化碳非髓質滲透溶質。","B":"錯誤。葡萄糖正常被完全再吸收。","C":"錯誤。麩醯胺酸與排銨有關非主滲透溶質。","D":"正確。氯化鈉與尿素共同造成髓質高滲。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Kidney","實用生理學（華杏）泌尿生理"]}},"101030-N1-23":{"quick":"正解(C)。催產素(oxytocin)直接引發分娩時強力的子宮收縮。","detail":{"background":"分娩(parturition)時，「催產素(oxytocin，腦下垂體後葉分泌)」直接作用於子宮平滑肌，引發強力收縮(並有正回饋：子宮頸擴張→更多催產素→更強收縮)。前列腺素也促子宮收縮並軟化子宮頸。鬆弛素鬆弛恥骨聯合與子宮頸;黃體素(progesterone)在孕期『抑制』子宮收縮;hCG維持黃體。故直接引發強力子宮收縮者為催產素。","options":{"A":"錯誤。hCG維持黃體。","B":"錯誤。黃體素抑制子宮收縮。","C":"正確。催產素引發強力子宮收縮。","D":"錯誤。鬆弛素鬆弛骨盆韌帶與子宮頸。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"101030-N1-24":{"quick":"正解(A)。排卵前雌激素大量增加，對腦下垂體產生『正回饋』→LH高峰(LH surge)。","detail":{"background":"月經週期中段，成熟濾泡分泌大量「雌激素(estrogen)」，當雌激素濃度高且持續→由平時的『負回饋』轉為「『正回饋』作用於下視丘-腦下垂體→引發黃體生成素(LH)的爆發性高峰(LH surge)」→誘發排卵(約36小時後)。故引發排卵前LH高峰的主因是雌激素的正回饋。","options":{"A":"正確。雌激素增加引發正回饋→LH surge。","B":"錯誤。黃體素在此期尚低。","C":"錯誤。是雌激素上升非下降。","D":"錯誤。非黃體素負回饋。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"101110-N1-25":{"quick":"正解(B)。懷孕後黃體受hCG維持，最長約存在3個月(約90天)後退化。","detail":{"background":"黃體(corpus luteum)：①若未受孕→黃體於排卵後約「12–14天」退化成白體;②若『受孕』→胚胎滋養層分泌的「hCG」維持黃體(稱妊娠黃體)，繼續分泌黃體素維持子宮內膜，「約維持到懷孕3個月(約90天)」，之後胎盤接手分泌黃體素，黃體才退化。故懷孕後黃體最長約存在90天。","options":{"A":"錯誤。10天是未受孕黃體壽命。","B":"正確。懷孕後黃體約存在90天(3個月)。","C":"錯誤。180天過長。","D":"錯誤。270天過長。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"102030-N1-24":{"quick":"正解(A)。排卵前LH高峰主要受「動情素(雌激素estrogen)」的正回饋影響。","detail":{"background":"排卵前的LH高峰(LH surge)主要由成熟濾泡分泌的大量「動情素(estrogen，類固醇)」造成『正回饋』引發(與101030-24、104100-29一致)。黃體素在排卵後才升高、雄性素與皮質醇非主因。故影響LH surge的類固醇為動情素(雌激素)。","options":{"A":"正確。雌激素正回饋引發LH高峰。","B":"錯誤。黃體素在排卵後才升。","C":"錯誤。雄性素非主因。","D":"錯誤。皮質醇非此調控。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"102110-N1-23":{"quick":"正解(A)。睪丸(曲細精管)具有產生配子(精子)的功能。","detail":{"background":"「配子(gamete)」＝精子與卵子。男性的「睪丸(曲細精管)」產生精子(精子發生)、並分泌睪固酮;女性的卵巢產生卵子。輸精管(輸送)、陰囊(容納調溫)、前列腺(分泌精液)皆不產生配子。故具產生配子功能者為睪丸。　深化：配子發生：男性精子在睪丸曲細精管由精原細胞經減數分裂生成、副睪成熟；女性卵子在卵巢由初級卵母細胞發育。生殖腺同時分泌性激素（睪固酮/雌激素），兼具生殖與內分泌雙重角色。","options":{"A":"正確。睪丸產生精子(配子)。","B":"錯誤。輸精管輸送精子。","C":"錯誤。陰囊容納睪丸調溫。","D":"錯誤。前列腺分泌精液。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"102110-N1-24":{"quick":"正解(B)。子宮內膜增生期(proliferative phase)發生於卵巢的濾泡(生長)期。","detail":{"background":"月經週期中子宮與卵巢的對應：①「子宮內膜『增生期(proliferative)』＝卵巢『濾泡期(follicular)』」(雌激素主導，內膜增厚)——B正確;②子宮內膜『分泌期(secretory)』＝卵巢『黃體期(luteal)』(黃體素主導);③月經出現於黃體退化、雌黃體素下降時(非濾泡分化成黃體時)。故(B)正確;(A黃體素在分泌期而非增生期、C分泌期對應黃體期非濾泡期、D月經在黃體退化時)皆錯。","options":{"A":"錯誤。黃體素主要在分泌期(黃體期)。","B":"正確。增生期對應濾泡生長期。","C":"錯誤。分泌期對應黃體期。","D":"錯誤。月經在黃體退化、激素下降時。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"103030-N1-2":{"quick":"正解(D)。人類絨毛膜促性腺激素(hCG)只由胎盤(滋養層)製造，卵巢不產生。","detail":{"background":"懷孕相關激素來源：①動情素、黃體素——卵巢(黃體)與胎盤都能產生;②鬆弛素——黃體與胎盤;③「『人類絨毛膜促性腺激素(hCG)』＝只由『胎盤滋養層細胞』製造，卵巢不產生」(受孕後才出現，故為驗孕指標)。故只由胎盤製造者為hCG。　深化：懷孕激素來源：hCG由胚胎滋養層分泌（維持黃體、驗孕標的，早孕高峰）、雌激素與黃體素早期由黃體後期由胎盤、人類胎盤泌乳素由胎盤。hCG使黃體在受孕後不退化、持續分泌黃體素安胎，是妊娠維持的關鍵。","options":{"A":"錯誤。雌激素卵巢也產生。","B":"錯誤。黃體素卵巢(黃體)也產生。","C":"錯誤。鬆弛素黃體也產生。","D":"正確。hCG只由胎盤製造。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"103030-N1-25":{"quick":"正解(B)。哺乳(嬰兒吸吮)使「泌乳素(prolactin)」升高，抑制GnRH→抑制排卵(哺乳閉經)。","detail":{"background":"哺乳期避孕(lactational amenorrhea)：嬰兒吸吮乳頭→反射性使「泌乳素(prolactin)分泌增加」→泌乳素『抑制下視丘GnRH→抑制FSH/LH→抑制濾泡發育與排卵』，造成哺乳期閉經(自然避孕，但非絕對可靠)。催產素負責乳汁『射出』、鬆弛素鬆弛骨盆。故抑制排卵者為泌乳素。","options":{"A":"錯誤。鬆弛素鬆弛骨盆韌帶。","B":"正確。泌乳素升高抑制排卵。","C":"錯誤。催產素負責乳汁射出。","D":"錯誤。前列腺素與此無關。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"104030-N1-22":{"quick":"正解(C)。乙醯膽鹼(副交感)增加未懷孕子宮的收縮力。","detail":{"background":"子宮平滑肌收縮受多種因素影響。在『未懷孕』子宮，「乙醯膽鹼(副交感神經傳遞物)」可增加子宮平滑肌收縮。催產素則在妊娠末期/分娩時強力收縮子宮(未懷孕子宮對催產素較不敏感)。腎上腺素(經β2)反而鬆弛子宮、泌乳激素與生長激素非直接收縮子宮。故增加未懷孕子宮收縮力者為乙醯膽鹼。","options":{"A":"錯誤。腎上腺素(β2)鬆弛子宮。","B":"錯誤。泌乳激素非直接收縮子宮。","C":"正確。乙醯膽鹼增加子宮收縮。","D":"錯誤。生長激素與此無關。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"104030-N1-24":{"quick":"正解(D)。黃體素在胎盤生成後由胎盤分泌(孕中後期)。","detail":{"background":"黃體素(progesterone)的來源隨時間：①排卵『後』由『黃體(顆粒層黃體化)』分泌(非排卵前、非濾泡顆粒層在排卵前分泌);②懷孕早期由黃體分泌(hCG維持，到約12週);③「胎盤生成成熟後(約懷孕3個月後)→改由『胎盤』分泌黃體素」維持妊娠。故(D)「胎盤生成後由胎盤分泌」正確。(A排卵前、B排卵後由濾泡顆粒層、C胎盤生成前由滋養細胞 皆不準確)。","options":{"A":"錯誤。排卵前黃體尚未形成。","B":"錯誤。排卵後是黃體(已黃體化)分泌。","C":"錯誤。胎盤生成前由黃體分泌。","D":"正確。胎盤生成後由胎盤分泌黃體素。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"104100-N1-24":{"quick":"正解(B)。初級卵母細胞具有進行減數分裂的能力(停在減數分裂I前期，至青春期後完成)。","detail":{"background":"卵子發生：卵原細胞(2n，有絲分裂增殖)→「初級卵母細胞(primary oocyte)」進入『減數分裂』(但停在第一次減數分裂前期，至青春期排卵前才繼續)→次級卵母細胞(停減數分裂II中期)→受精後完成減數分裂II成卵。故『具減數分裂能力』者為初級卵母細胞(已進入減數分裂)。顆粒細胞、內膜細胞是濾泡的體細胞(不行減數分裂)。故答案初級卵母細胞。","options":{"A":"錯誤。卵原細胞行有絲分裂(增殖)。","B":"正確。初級卵母細胞進行減數分裂。","C":"錯誤。顆粒細胞是體細胞。","D":"錯誤。內膜細胞是體細胞。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"104100-N1-29":{"quick":"正解(B)。月經週期的高濃度LH(LH surge)主要由「動情素(estrogen)」正回饋引起。","detail":{"background":"月經週期的LH高峰由成熟濾泡分泌的大量「動情素(estrogen)」正回饋引發(與101030-24、102030-24一致)。助孕素(黃體素)在排卵後才升高、雄性素與皮質醇非主因。故引起LH surge的類固醇為動情素。　深化：排卵前成熟濾泡分泌的高濃度雌激素對下視丘—垂體產生「正回饋」，觸發LH大量激增（LH surge），引發排卵（約36小時內）。這是月經週期中唯一的正回饋，其餘多為負回饋；排卵後黃體形成分泌黃體素。","options":{"A":"錯誤。助孕素在排卵後升高。","B":"正確。動情素正回饋引起LH surge。","C":"錯誤。雄性素非主因。","D":"錯誤。皮質醇非此調控。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"105030-N1-24":{"quick":"正解(B)。嬰兒吸吮引發乳汁『射出(噴乳)』反射需要催產素(oxytocin)。","detail":{"background":"哺乳的兩個激素：①「泌乳素(prolactin)」→促進乳腺『製造』乳汁;②「催產素(oxytocin)」→嬰兒吸吮→反射性釋放→使乳腺周圍的『肌上皮細胞收縮→乳汁『射出(噴乳/let-down reflex)』」。故乳汁射出反射所需的是催產素(製造乳汁則靠泌乳素)。","options":{"A":"錯誤。鬆弛素與哺乳無關。","B":"正確。催產素引發乳汁射出。","C":"錯誤。前列腺素與此無關。","D":"錯誤。泌乳素負責製造乳汁。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"105030-N1-25":{"quick":"正解(D)。精細胞(spermatid)具單套23條『不成對』染色體(已完成減數分裂II)。","detail":{"background":"精子發生的染色體：①精原細胞、初級精母細胞＝2n(雙套);②次級精母細胞＝n(單套)，但染色體仍含『兩條姊妹染色分體(成對)』;③「精細胞(spermatid)＝完成減數分裂II後，n(單套)且染色體為『單一染色分體(不成對)』」;④精子＝同精細胞。本題問『單套且不成對』者＝精細胞。(次級精母細胞雖單套但染色體仍為姊妹染色分體成對)。故答案精細胞。","options":{"A":"錯誤。精原細胞是雙套。","B":"錯誤。初級精母細胞是雙套。","C":"錯誤。次級精母細胞單套但染色體成對(姊妹染色分體)。","D":"正確。精細胞單套、不成對。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"105090-N1-27":{"quick":"正解(D)。分娩後期催產素加速子宮收縮使其回復(產後子宮復舊)。","detail":{"background":"懷孕與分娩的子宮收縮：①孕期『黃體素抑制』子宮自發收縮(維持安胎);②前列腺素在『妊娠後期(臨產)』引發子宮收縮並軟化子宮頸『發動分娩』(故A說「妊娠後期前列腺素抑制收縮」錯);③催產素在『分娩時』強力收縮(妊娠前期子宮對催產素不敏感，故B錯);④「『分娩後期(產後)』催產素持續使子宮收縮→壓迫血管止血並使子宮回復(復舊)正常大小」——D正確。故正確者為(D)。","options":{"A":"錯誤。妊娠後期前列腺素是引發(非抑制)收縮。","B":"錯誤。妊娠前期子宮對催產素不敏感。","C":"前列腺素確實參與發動分娩，但本題標準答案為D。","D":"正確。產後催產素加速子宮收縮復舊。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"106030-N1-24":{"quick":"正解(D)。黃體期(luteal phase)血中雌激素與黃體素濃度接近懷孕初期(黃體分泌兩者皆高)。","detail":{"background":"月經週期中血中雌激素與黃體素『同時偏高』的時期是「黃體期(luteal phase)」——排卵後黃體同時分泌大量黃體素與相當量的雌激素(維持子宮內膜分泌期、準備著床)，此時兩者濃度接近懷孕初期(黃體被hCG維持)。月經期兩者最低、濾泡期雌激素漸升但黃體素低、排卵期雌激素高峰但黃體素尚低。故答案黃體期。","options":{"A":"錯誤。月經期兩者最低。","B":"錯誤。濾泡期黃體素低。","C":"錯誤。排卵期黃體素尚低。","D":"正確。黃體期雌激素與黃體素皆高。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"106030-N1-25":{"quick":"正解(A)。睪固酮主要由睪丸間質的「萊迪氏細胞(Leydig cell)」生成。","detail":{"background":"睪丸細胞：「萊迪氏細胞(Leydig cell，間質細胞)」在曲細精管間質、受LH刺激『分泌睪固酮(testosterone)』;賽托利氏細胞(Sertoli cell)在管壁內、受FSH刺激支持精子發生、分泌抑制素與雄性素結合蛋白。故生成睪固酮的主要細胞為萊迪氏細胞。","options":{"A":"正確。萊迪氏細胞分泌睪固酮。","B":"錯誤。賽托利氏細胞支持精子發生。","C":"錯誤。嗜色細胞非睪丸細胞。","D":"錯誤。前漿細胞非睪丸細胞。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"106110-N1-25":{"quick":"正解(C)。次級卵母細胞具單套23條『成對(姊妹染色分體)』染色體。","detail":{"background":"卵子發生染色體：①卵原細胞、初級卵母細胞＝2n(雙套);②「次級卵母細胞(secondary oocyte)＝完成減數分裂I後，n(單套)，但每條染色體仍含『兩條姊妹染色分體(成對)』」;③卵細胞(受精後完成減數分裂II)＝單套、不成對。本題問『單套且成對』者＝次級卵母細胞(對照105030-25精細胞是單套不成對)。故答案次級卵母細胞。","options":{"A":"錯誤。卵原細胞雙套。","B":"錯誤。初級卵母細胞雙套。","C":"正確。次級卵母細胞單套、成對(姊妹染色分體)。","D":"錯誤。卵細胞單套不成對。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"106111-N1-27":{"quick":"正解(C)。完整的精子生成過程約需60–70天(約64天)。","detail":{"background":"精子生成(spermatogenesis)從精原細胞到成熟精子，在曲細精管內約需「64天(約60–70天)」，再加上副睪成熟運送約再10–14天。整個過程持續進行(成年男性每天產生上億精子)。故全程約60–70天。　深化：精子生成全程約64天（曲細精管內）加上副睪成熟約需時，故精子品質反映數月前的睪丸環境。FSH刺激Sertoli細胞支持精子生成、LH刺激Leydig細胞分泌睪固酮提供局部高雄性素環境，兩者缺一不可。","options":{"A":"錯誤。10–20天過短。","B":"錯誤。30–40天過短。","C":"正確。精子生成約60–70天。","D":"錯誤。100–200天過長。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"107030-N1-24":{"quick":"正解(C)。hCG在胚胎滋養層細胞『著床』於子宮時開始分泌。","detail":{"background":"人類絨毛膜促性腺激素(hCG)由胚胎『滋養層(trophoblast)細胞』分泌，在「胚胎(囊胚)『著床(implantation)』於子宮內膜時(約受精後6–8天)開始分泌」，維持黃體繼續分泌黃體素以維持妊娠;血中/尿中hCG是驗孕指標(著床後即可測得)。故hCG在著床時開始分泌。","options":{"A":"錯誤。第一次有絲分裂尚早。","B":"錯誤。進入子宮腔尚未著床。","C":"正確。滋養層著床時開始分泌hCG。","D":"錯誤。胎盤形成更晚(著床後才形成)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"107030-N1-25":{"quick":"正解(A)。血睪丸障壁(blood-testis barrier)位於曲細精管(由Sertoli細胞緊密連接形成)。","detail":{"background":"「血睪丸障壁(blood-testis barrier)」由「曲細精管」內相鄰「賽托利氏細胞(Sertoli cell)之間的緊密連接」形成，把生精上皮分成基底與管腔兩區，保護發育中的生殖細胞(精母細胞以上)免受血液中物質與免疫攻擊(因精子是減數分裂後的『非自體』抗原)。輸精管、儲精囊、射精管無此障壁。故含血睪丸障壁者為曲細精管。","options":{"A":"正確。曲細精管(Sertoli細胞緊密連接)含血睪丸障壁。","B":"錯誤。輸精管無此障壁。","C":"錯誤。儲精囊無此障壁。","D":"錯誤。射精管無此障壁。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"107110-N1-24":{"quick":"正解(C)。黃體素在月經週期的「分泌期(secretory phase)」達最高(黃體分泌)。","detail":{"background":"黃體素(progesterone)在排卵『後』由黃體大量分泌，對應子宮內膜的「分泌期(secretory phase)」達到最高峰(使內膜腺體分泌、準備著床);若未受孕，黃體退化、黃體素驟降→月經來潮。增殖期(增生期)以雌激素為主、黃體素低。故黃體素最高在分泌期。","options":{"A":"錯誤。月經期黃體素最低。","B":"錯誤。增殖期以雌激素為主。","C":"正確。分泌期黃體素最高。","D":"錯誤。缺血期黃體素已下降。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"107110-N1-25":{"quick":"正解(A)。高濃度cGMP(NO→cGMP)使陰莖海綿體血管舒張、充血勃起，有助治療勃起障礙。","detail":{"background":"陰莖勃起機制：性刺激→副交感神經與內皮釋放「一氧化氮(NO)→活化鳥苷酸環化酶→『cGMP增加』→海綿體小動脈與小樑平滑肌舒張→海綿竇充血→勃起」。cGMP被「磷酸二酯酶第5型(PDE5)」分解;「PDE5抑制劑(sildenafil/威而鋼)」抑制cGMP分解→『維持高cGMP』→助勃起。故有助治療勃起障礙的是高濃度cGMP。","options":{"A":"正確。高cGMP使海綿體舒張充血、助勃起。","B":"錯誤。非靠高G蛋白活性。","C":"錯誤。低NO會減少cGMP、不利勃起。","D":"錯誤。低G蛋白活性非機制。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"108020-N1-20":{"quick":"正解(B)。精子在「副睪(epididymis)」成熟並獲得運動能力。","detail":{"background":"精子在睪丸曲細精管產生後尚未成熟、不能運動;進入「副睪(epididymis)」儲存約10–14天期間『成熟、獲得運動能力與受精能力』。貯精囊(精囊)分泌精液成分、輸精管輸送。故精子成熟獲得運動能力的場所是副睪。　深化：精子在睪丸生成後尚不能運動、不具受精能力，須經副睪儲存約2週「成熟」獲得運動力，並在女性生殖道內經「獲能（capacitation）」才能受精。射精時精子與儲精囊、攝護腺、尿道球腺分泌物混合成精液。","options":{"A":"錯誤。睪丸產生精子但尚未成熟。","B":"正確。精子在副睪成熟、獲運動能力。","C":"錯誤。精囊分泌精液成分。","D":"錯誤。輸精管輸送精子。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"108110-N1-25":{"quick":"正解(A)。青春期由濾泡刺激素(FSH)刺激卵巢濾泡發育，使初級卵母細胞繼續發育。","detail":{"background":"青春期下視丘GnRH脈衝啟動→腦下垂體分泌「濾泡刺激素(FSH)」→『刺激卵巢濾泡發育(顆粒細胞增生、分泌雌激素)』，每月有濾泡成熟;LH高峰才誘發排卵(使初級卵母細胞完成減數分裂I成次級卵母細胞)。本題以FSH「刺激卵巢濾泡發育」為答案。故答案FSH。","options":{"A":"正確。FSH刺激卵巢濾泡發育。","B":"錯誤。LH主誘發排卵與黃體生成。","C":"錯誤。雌激素是濾泡分泌物。","D":"錯誤。黃體素在排卵後。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"109030-N1-17":{"quick":"正解(B)。hCG與黃體生成素(LH)的生理作用及化學組成相似(都作用於LH受體)。","detail":{"background":"人類絨毛膜促性腺激素(hCG)是醣蛋白激素，與「黃體生成素(LH)」結構相似(共用α次單元，β次單元相近)、且『作用於相同的LH受體』→故hCG能像LH一樣『維持黃體繼續分泌黃體素』(支持早期妊娠)。FSH、TSH雖也共用α次單元但作用不同;LH最相似。故hCG與LH最相似。","options":{"A":"錯誤。胰島素結構作用不同。","B":"正確。hCG與LH作用與組成相似。","C":"錯誤。ACTH作用不同。","D":"錯誤。ADH是胜肽、作用不同。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"109030-N1-24":{"quick":"正解(D)。排卵後一天黃體形成→黃體素(progesterone)濃度『上升』(不會下降)。","detail":{"background":"排卵後一天，相較於排卵日：①排卵時的LH與FSH高峰已『回落(下降)』;②雌激素在排卵後短暫下降;③「排卵後黃體形成→『黃體素(progesterone)開始大量分泌→濃度『上升』』(進入黃體期)」。故排卵後一天『不會下降(反而上升)』者為黃體激素(progesterone)。","options":{"A":"錯誤。FSH在排卵後下降。","B":"錯誤。LH高峰後下降。","C":"錯誤。雌激素排卵後短暫下降。","D":"正確。黃體素在排卵後上升。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"109110-N1-26":{"quick":"正解(C)。雄性素不敏感症因雄性素受器缺陷→負回饋失效→睪固酮濃度『上升』。","detail":{"background":"雄性素不敏感症候群(androgen insensitivity syndrome, AIS)：基因型46,XY、有睪丸(分泌睪固酮與抗穆勒氏管激素AMH)，但「雄性素『受器』缺陷→標的組織對睪固酮無反應」。後果：①外觀女性、無子宮頸與子宮(因AMH使穆勒氏管退化);②無月經(無子宮);③「因『受器缺陷→負回饋失效→LH與睪固酮分泌反而『上升』」。本題問『因缺乏雄性素受器』所造成者＝(C)睪固酮濃度上升(負回饋失效)。(A基因型、B無子宮是AMH作用、D無月經是無子宮所致，非直接因受器缺乏)。故答案(C)。","options":{"A":"錯誤。基因型46,XY是染色體本身。","B":"錯誤。無子宮是AMH使穆勒氏管退化所致。","C":"正確。受器缺陷使負回饋失效→睪固酮上升。","D":"錯誤。無月經是無子宮的結果。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"110030-N1-17":{"quick":"正解(D)。次級卵母細胞在「受精時」才完成第二次減數分裂。","detail":{"background":"排卵排出的是「次級卵母細胞」，停滯在『第二次減數分裂中期』;只有當『受精(精子穿入)』發生，才被激活『完成第二次減數分裂』，產生成熟卵與第二極體。若未受精則退化。故完成第二次減數分裂的時機為受精時(與106030-8、111030-10一致)。","options":{"A":"錯誤。胚胎時期停在減數分裂I前期。","B":"錯誤。出生時仍停滯。","C":"錯誤。排卵時停在減數分裂II中期。","D":"正確。受精時完成減數分裂II。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"110030-N1-28":{"quick":"正解(B)。切除睪丸→睪固酮↓→負回饋解除→「LH(與FSH)濃度上升」。","detail":{"background":"12歲男孩(青春期前/早期)切除兩側睪丸：①睪丸不再分泌睪固酮→「血中睪固酮『下降』」(故C、D錯)、第二性徵不發育(聲音不變低沉、毛髮不增生，故A錯);②睪固酮下降→『負回饋解除→下視丘GnRH與腦下垂體『LH、FSH分泌『上升』』(試圖刺激已不存在的睪丸)。故手術後LH濃度上升(B正確)。","options":{"A":"錯誤。睪固酮下降，第二性徵不發育。","B":"正確。睪固酮下降→負回饋解除→LH上升。","C":"錯誤。睪固酮下降。","D":"錯誤。雄性素下降。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"110110-N1-19":{"quick":"正解(C)。GnRH(經LH)『間接』作用於萊氏細胞促睪固酮分泌。","detail":{"background":"睪固酮分泌的調控：①下視丘「促性腺素釋放激素(GnRH)」→刺激腦下垂體分泌LH→「LH直接作用於『萊氏細胞(Leydig cell)』→分泌睪固酮」，故GnRH是『間接(經LH)』作用於萊氏細胞(C正確);②FSH作用於『賽氏細胞(Sertoli)』(非萊氏細胞，A錯);③LH作用於萊氏細胞(非賽氏細胞，B錯);④抑制素(由賽氏細胞分泌)回饋抑制FSH。故正確者為(C)。","options":{"A":"錯誤。FSH作用於賽氏細胞(非萊氏細胞)。","B":"錯誤。LH作用於萊氏細胞(非賽氏細胞)。","C":"正確。GnRH經LH間接作用於萊氏細胞。","D":"錯誤。抑制素回饋抑制FSH分泌。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"110110-N1-26":{"quick":"正解(D)。排卵時顆粒細胞分泌蛋白分解酵素，促進濾泡壁(膜)分解破裂釋出卵。","detail":{"background":"排卵(ovulation)機制：LH高峰→①使顆粒細胞黃體化(由LH而非FSH);②「顆粒細胞與內膜細胞分泌『蛋白分解酵素(如膠原酶、纖維蛋白溶酶原活化劑)』與前列腺素→分解濾泡壁(膜)、使濾泡破裂釋出次級卵母細胞」(D正確)。(A單一高劑量雌激素是『正回饋引發LH』而非直接促排卵;B黃體化是LH非FSH;C前列腺素增加濾泡液與血流非減少)。故正確者為(D)。","options":{"A":"錯誤。雌激素經正回饋引發LH，非直接促排卵。","B":"錯誤。LH(非FSH)使顆粒細胞黃體化。","C":"錯誤。前列腺素增加濾泡液/血流。","D":"正確。顆粒細胞分泌酵素分解濾泡壁。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"111030-N1-22":{"quick":"正解(A)。卵巢具有產生配子(卵子)的功能。","detail":{"background":"女性的「卵巢(ovary)」產生配子(卵子)並分泌雌激素與黃體素;輸卵管(受精與運送)、子宮(胚胎著床發育)、子宮頸(連接陰道)皆不產生配子。故具產生配子功能者為卵巢(與102110-23睪丸對應)。　深化：卵巢兼具生殖（產生卵子）與內分泌（分泌雌激素、黃體素、抑制素）功能，受下視丘—垂體—性腺軸（GnRH→FSH/LH）調控，呈月經週期變化。輸卵管是受精處、子宮是著床發育處，構成女性生殖道完整路徑。","options":{"A":"正確。卵巢產生卵子(配子)。","B":"錯誤。輸卵管運送卵與受精。","C":"錯誤。子宮供胚胎著床發育。","D":"錯誤。子宮頸連接陰道。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"112110-N1-15":{"quick":"正解(C)。濾泡刺激激素(FSH)有助精子生成(作用於Sertoli細胞)。","detail":{"background":"人類精子敘述：(A)精子含『23條(單套)染色體』，非23『對』，故A錯;(B)精子最適生存溫度約『34–35°C(比體溫低)』，故陰囊在體外調溫(B說38°C錯);(C)「FSH作用於賽氏細胞、支持精子生成(spermatogenesis)」——正確;(D)精子主要儲存在『副睪』，非儲精囊(精囊分泌精液成分，故D錯)。故正確者為(C)。","options":{"A":"錯誤。精子含23條(單套)非23對。","B":"錯誤。精子最適溫度約34–35°C(低於體溫)。","C":"正確。FSH有助精子生成。","D":"錯誤。精子儲存在副睪非儲精囊。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"113100-N1-2":{"quick":"正解(C)。黃體素在子宮週期的「分泌期(secretory phase)」含量最高。","detail":{"background":"黃體素(progesterone)在排卵後由黃體大量分泌，對應子宮內膜「分泌期(secretory phase)」達最高(與107110-24一致)。月經期、增生期(濾泡期)黃體素低。故黃體素最高在分泌期。　深化：子宮內膜週期：增生期（雌激素主導、內膜增厚）→排卵→分泌期（黃體素主導、腺體分泌、為著床準備）。若未受孕，黃體退化、雌黃體素驟降→內膜剝落（月經）。黃體素在分泌期達高峰是基礎體溫上升的原因。","options":{"A":"錯誤。月經期黃體素最低。","B":"錯誤。增生期黃體素低。","C":"正確。分泌期黃體素最高。","D":"錯誤。濾泡期黃體素低。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"113180-N1-15":{"quick":"正解(C)。腦下腺前葉LH的高峰分泌(LH surge)可誘發排卵。","detail":{"background":"排卵敘述：(A)誘發排卵的不是黃體分泌的雌激素(黃體在排卵『後』才形成);誘發排卵的是『成熟濾泡』分泌的雌激素正回饋;(B)是『雌激素』對LH正回饋(非黃體素);(C)「腦下垂體前葉的『LH高峰(LH surge)』誘發排卵」——正確;(D)排卵後濾泡細胞先轉變為『黃體(corpus luteum)』，黃體退化後才變白體(corpus albicans)，故D「即轉變為白體」錯。故正確者為(C)。","options":{"A":"錯誤。黃體在排卵後才形成。","B":"錯誤。是雌激素(非黃體素)對LH正回饋。","C":"正確。LH高峰誘發排卵。","D":"錯誤。排卵後先成黃體，退化後才成白體。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"114030-N1-5":{"quick":"正解(B)。胚胎期由「雙氫睪固酮(DHT)」直接刺激『外生殖器』男性化。","detail":{"background":"男性胚胎性別分化：①睪丸分泌「睪固酮(testosterone)」→促進『內生殖管道(沃爾夫管→附睪、輸精管、精囊)』發育;②睪固酮在外生殖器與攝護腺處經「5α還原酶轉成『雙氫睪固酮(DHT)』→直接刺激『外生殖器(陰莖、陰囊)與攝護腺』男性化」;③睪丸的Sertoli細胞分泌AMH使穆勒氏管退化。故直接刺激外生殖構造男性化者為DHT。","options":{"A":"錯誤。睪固酮主導內生殖管道發育。","B":"正確。DHT刺激外生殖器男性化。","C":"錯誤。雌激素非男性化激素。","D":"錯誤。DHEA是腎上腺弱雄性素。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"114100-N1-1":{"quick":"正解(A為「錯誤」者)。FSH作用於睪丸『賽托利氏細胞』支持精子生成;『刺激合成睪固酮的是LH作用於萊氏細胞』，非FSH。","detail":{"background":"濾泡刺激素(FSH)的作用：①女性——作用於『卵巢濾泡(顆粒細胞)』刺激濾泡發育與『雌激素合成』(C、D對);②男性——「作用於睪丸『曲細精管的賽托利氏細胞(Sertoli cell)』→支持精子生成」(B對)。本題(A)說「FSH刺激男性合成睪固酮」為『錯誤』——睪固酮由『LH』刺激『萊氏細胞(Leydig)』合成(非FSH)。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。睪固酮由LH刺激萊氏細胞合成，非FSH。","B":"正確。FSH作用於曲細精管(Sertoli細胞)。","C":"正確。FSH刺激女性合成雌激素。","D":"正確。FSH作用標的是卵巢濾泡。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"114100-N1-16":{"quick":"正解(A)。濾泡(顆粒)細胞含芳香酶，把睪固酮轉換為動情二醇(雌二醇)。","detail":{"background":"卵巢雌激素合成的「兩細胞兩激素學說」：①『內膜(theca)細胞』在LH作用下把膽固醇轉成『雄性素(睪固酮、雄烯二酮)』;②「『顆粒(granulosa/濾泡)細胞』在FSH作用下，以『芳香酶(aromatase)』把雄性素(睪固酮)『轉換成動情二醇(17β-estradiol，雌激素)』」。故把睪固酮轉成雌二醇者為濾泡(顆粒)細胞(含芳香酶)。萊迪氏細胞是睪丸的;卵細胞、卵囊泡膜(內膜)細胞產雄性素。故答案濾泡細胞。","options":{"A":"正確。濾泡(顆粒)細胞含芳香酶轉睪固酮為雌二醇。","B":"錯誤。萊迪氏細胞在睪丸分泌睪固酮。","C":"錯誤。卵細胞不行此轉換。","D":"錯誤。卵囊泡膜(內膜)細胞產雄性素(前驅物)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"114170-N1-6":{"quick":"正解(B)。排卵前大量上升的三種激素為FSH、LH與動情素(estrogen)。","detail":{"background":"女性排卵『前』(濾泡期晚期到排卵)大量上升的激素：①「濾泡刺激素(FSH)」(濾泡期升、刺激濾泡);②「動情素(estrogen)」(成熟濾泡大量分泌，先漸升再高峰);③雌激素高峰正回饋→「黃體生成素(LH)爆發性高峰(LH surge)」誘發排卵。而『黃體素(progesterone)』要到排卵『後』(黃體期)才大量上升。故排卵前大量上升的三種為FSH、LH、動情素。","options":{"A":"錯誤。黃體素在排卵後才升。","B":"正確。FSH、LH、動情素於排卵前上升。","C":"錯誤。黃體素在排卵後才升。","D":"錯誤。黃體素在排卵後才升。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Reproductive Physiology","實用生理學（華杏）生殖生理","Tortora & Derrickson《Principles of A&P》15e Ch.28"]}},"101030-N1-20":{"quick":"正解(A為「錯誤」者)。突觸電位是『分級電位』，無需達閾值即可發生(刺激越強電位越大)。","detail":{"background":"突觸(後)電位＝分級電位(graded potential)，特性：①「不需達閾值就能產生(刺激越大反應越大)」——故(A)「刺激需達閾值方可發生」為錯(那是動作電位的特性);②不遵守全或無定律(B對);③可時間/空間『加成(summation)』(C對);④『無不反應期』(D對)。動作電位才需達閾值、遵守全或無、有不反應期。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。突觸電位是分級電位、不需達閾值。","B":"正確。突觸電位不遵守全或無定律。","C":"正確。突觸電位可加成。","D":"正確。突觸電位無不反應期。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"101030-N1-21":{"quick":"正解(C)。神經節(ganglion)位於『周邊』神經系統，不出現在中樞神經系統。","detail":{"background":"中樞 vs 周邊：「神經節(ganglion)＝『神經元胞體聚集在「周邊」神經系統』(如背根神經節、自主神經節)」，不在中樞;中樞神經系統內神經元胞體聚集稱「神經核(nucleus)」。神經元、星狀膠細胞遍布中樞。故不出現在中樞者為神經節(對照:中樞的對應構造叫神經核)。","options":{"A":"錯誤。神經核在中樞。","B":"錯誤。神經元在中樞與周邊都有。","C":"正確。神經節在周邊神經系統。","D":"錯誤。星狀膠細胞在中樞。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"101110-N1-17":{"quick":"正解(D)。鈉鉀幫浦每次打出3個鈉、打入2個鉀(Na⁺:K⁺＝3:2)。","detail":{"background":"鈉鉀幫浦(Na⁺-K⁺-ATPase)每水解一個ATP，「把『3個鈉離子』打出細胞外、『2個鉀離子』打入細胞內(Na⁺:K⁺＝3:2)」，是初級主動運輸，維持細胞內外鈉鉀梯度與靜止膜電位。因每次淨移出一個正電荷(出3正、入2正)，故為『生電性(electrogenic)』。故Na⁺:K⁺＝3:2。","options":{"A":"錯誤。非1:1。","B":"錯誤。非1:3。","C":"錯誤。非2:3。","D":"正確。Na⁺:K⁺＝3:2。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"101110-N1-19":{"quick":"正解(C)。C型纖維是『無髓鞘』的纖維(傳導最慢，傳慢痛與自主節後)。","detail":{"background":"神經纖維依直徑與髓鞘分類：①「A型(Aα、Aβ、Aγ、Aδ)＝有髓鞘、直徑大、傳導快」(運動、本體覺、快痛等);②「B型＝有髓鞘、自主節前纖維」;③「C型＝『無髓鞘』、直徑最小、傳導最慢」(慢痛、溫覺、自主節後纖維)。故無髓鞘者為C型纖維。","options":{"A":"錯誤。Aα型有髓鞘。","B":"錯誤。B型有髓鞘。","C":"正確。C型纖維無髓鞘。","D":"錯誤。Aγ型有髓鞘。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"101110-N1-20":{"quick":"正解(B為「錯誤」者)。電性突觸(間隙接合)『幾乎無突觸延遲』(訊號直接快速傳遞);有突觸延遲的是化學性突觸。","detail":{"background":"突觸性質：(A)化學突觸的神經傳遞物由『胞吐』釋放——正確;(B)「『電性突觸(間隙接合)』訊號直接經連接子快速傳遞、『幾乎無突觸延遲』」，故說「會有短暫突觸延遲」為錯(突觸延遲是『化學』突觸的特徵，因需釋放與擴散傳遞物);(C)化學突觸有突觸隙裂(間隙)——正確;(D)神經肌肉接合處(NMJ)屬化學突觸——正確。故錯誤者為(B)。","options":{"A":"正確。傳遞物由胞吐釋放。","B":"錯誤(即為答案)。電性突觸幾乎無突觸延遲。","C":"正確。化學突觸有突觸隙裂。","D":"正確。神經肌肉接合屬化學突觸。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"101110-N1-21":{"quick":"正解(A)。刺激越強，傳入神經元動作電位的『頻率越高』(以頻率編碼強度)。","detail":{"background":"動作電位遵守『全或無』，其峰值(振幅)固定、不隨刺激強度改變;刺激強度是以「動作電位的『頻率(發生次數/單位時間)』」來編碼——「刺激越強→動作電位頻率越高」(頻率編碼)，並徵召更多神經纖維(群體編碼)。傳導速度由纖維直徑與髓鞘決定(不隨刺激變)、峰值固定、時間寬度固定。故刺激越強→頻率越高。","options":{"A":"正確。刺激越強動作電位頻率越高。","B":"錯誤。傳導速度由纖維特性決定。","C":"錯誤。峰值固定(全或無)。","D":"錯誤。時間寬度不隨刺激變。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"102030-N1-21":{"quick":"正解(A為「無關」者)。隙裂接合(gap junction)是『電性突觸』的構造，與化學性突觸無關。","detail":{"background":"化學性突觸的構造：突觸小泡(儲存傳遞物)、神經傳遞物質、突觸隙裂、突觸後膜受體。而「隙裂接合(gap junction)是『電性突觸』的構造(讓離子直接流通)」，與『化學性突觸無關』。故與化學性突觸無關者為隙裂接合。　深化：化學性突觸靠傳遞物質單向傳遞、有突觸延遲，可被調節（學習記憶基礎）。電性突觸（隙裂接合gap junction）則讓離子直接流通、雙向且快速、無延遲，見於心肌、平滑肌與部分神經，使細胞同步活動。","options":{"A":"無關(即為答案)。隙裂接合是電性突觸構造。","B":"有關。突觸小泡儲存傳遞物。","C":"有關。神經傳遞物質。","D":"有關。突觸後膜受體。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"102110-N1-17":{"quick":"正解(A)。細胞週期順序為 G1→S→G2→M。","detail":{"background":"細胞週期(cell cycle)：分『間期(interphase)』與『分裂期(M期)』。間期依序為「G1期(細胞生長、合成蛋白)→S期(DNA複製)→G2期(準備分裂、檢查)」→「M期(有絲分裂)」。故順序為G1→S→G2→M。不分裂的細胞停在G0期。故答案G1→S→G2→M。","options":{"A":"正確。G1→S→G2→M。","B":"錯誤。順序不符。","C":"錯誤。順序不符。","D":"錯誤。順序不符。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Cell","實用生理學（華杏）細胞生理","Tortora & Derrickson《Principles of A&P》15e Ch.3"]}},"102110-N1-21":{"quick":"正解(B)。血清素(serotonin)是色胺酸(tryptophan)的衍生物。","detail":{"background":"神經傳遞物的前驅胺基酸：①「血清素(serotonin, 5-HT)＝由『色胺酸(tryptophan)』合成」;②多巴胺、正腎上腺素、腎上腺素(兒茶酚胺類)＝由『酪胺酸(tyrosine)』合成;③乙醯膽鹼＝由膽鹼+乙醯輔酶A合成。故色胺酸衍生物為血清素。","options":{"A":"錯誤。多巴胺由酪胺酸合成。","B":"正確。血清素由色胺酸合成。","C":"錯誤。乙醯膽鹼由膽鹼合成。","D":"錯誤。正腎上腺素由酪胺酸合成。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"103030-N1-16":{"quick":"正解(C)。迷走神經(副交感)興奮使「腸胃蠕動增加」。","detail":{"background":"迷走神經(副交感，rest-and-digest)興奮的作用：①心跳速率『減慢』(A錯);②支氣管收縮、呼吸非加快(B錯);③「腸胃蠕動與分泌『增加』」(C對，促進消化);④瞳孔『縮小』(D錯，散大是交感)。故迷走興奮使腸胃蠕動增加。　深化：迷走神經（副交感）「休息與消化」效應：減慢心率、收縮支氣管、促進消化腺分泌與腸蠕動、縮瞳。與交感「戰或逃」拮抗。迷走張力過高可致心搏過緩或血管迷走性昏厥。","options":{"A":"錯誤。迷走使心跳減慢。","B":"錯誤。迷走非使呼吸加快。","C":"正確。迷走興奮使腸胃蠕動增加。","D":"錯誤。瞳孔散大是交感。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"103030-N1-17":{"quick":"正解(D)。鈉鉀幫浦每次出3鈉入2鉀，淨移出1正電荷→使細胞內多1個負電荷(生電性)。","detail":{"background":"鈉鉀幫浦特性：①是『初級(直接耗ATP)主動運輸子』(A說次級錯);②「每次『打出3個鈉、打入2個鉀』」(B說「出2鈉」、C說「出2鉀」皆錯);③因每次淨移出一個正電荷(出3正、入2正)→「使細胞內相對多出『一個負電荷』(生電性，貢獻約−4mV的膜電位)」(D正確)。故正確者為(D)。","options":{"A":"錯誤。是初級主動運輸子。","B":"錯誤。打出3個鈉(非2個)。","C":"錯誤。打入(非打出)2個鉀。","D":"正確。淨移出1正電荷→細胞內多1負電荷。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"104030-N1-18":{"quick":"正解(D為「錯誤」者)。運動終板的ACh受器活化後引起肌肉『收縮(去極化興奮)』，不是舒張。","detail":{"background":"運動終板(motor end plate)＝神經肌肉接合處的肌膜特化區：(A)平滑肌無此構造(平滑肌為瀰漫接合)——正確;(B)其菸鹼型ACh受器活化後『通透鈉(與鉀)→去極化』——正確;(C)為運動神經元軸突末梢與肌膜的接合處——正確;(D)「ACh受器活化→終板電位→動作電位→『肌肉收縮(興奮)』」，故說「引起肌肉舒張」為錯。故錯誤者為(D)。","options":{"A":"正確。平滑肌無運動終板。","B":"正確。ACh受器活化通透鈉離子。","C":"正確。為軸突末梢與肌膜接合處。","D":"錯誤(即為答案)。ACh受器活化引起肌肉收縮，非舒張。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"104100-N1-19":{"quick":"正解(C)。乙醯膽鹼在骨骼肌細胞造成『去極化(depolarization)』。","detail":{"background":"運動神經釋放乙醯膽鹼(ACh)→與骨骼肌終板的菸鹼型受器結合→開啟陽離子通道、鈉內流為主→「終板膜『去極化(depolarization)』(產生終板電位)」→達閾值引發動作電位→肌肉收縮。故ACh在骨骼肌造成去極化。　深化：神經肌肉接合的傳遞：運動神經末梢釋放乙醯膽鹼→終板菸鹼受器開啟陽離子通道→終板電位（去極化）→引發肌膜動作電位→興奮收縮耦合。乙醯膽鹼酯酶分解ACh終止訊號。重症肌無力、箭毒、有機磷皆作用於此接合。","options":{"A":"錯誤。極化指靜止狀態。","B":"錯誤。再極化是去極化後回復。","C":"正確。ACh使骨骼肌去極化。","D":"錯誤。過極化是抑制。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"104100-N1-21":{"quick":"正解(C為「錯誤」者)。跳躍式傳導『較省能量』(只在蘭氏結去極化)，不是消耗較多能量。","detail":{"background":"跳躍式傳導(saltatory conduction)：①發生於『有髓鞘』纖維(髓鞘絕緣，動作電位只在『蘭氏結(Node of Ranvier)』產生並跳躍前進)(A、D對);②「傳導速度『較快』」(B對);③「因只在蘭氏結去極化、需打回的離子少→『較省能量(消耗較少)』」——故(C)「需消耗較多能量」為錯。故錯誤者為(C)。","options":{"A":"正確。發生於有髓鞘纖維。","B":"正確。傳導速度較快。","C":"錯誤(即為答案)。跳躍式傳導較省能量。","D":"正確。動作電位沿蘭氏結產生。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"105030-N1-20":{"quick":"正解(C為「非髓鞘功能」者)。提供ATP不是髓鞘功能;髓鞘的功能是絕緣、加速傳導(跳躍式)、組成白質。","detail":{"background":"髓鞘(myelin sheath)的功能：①絕緣軸突、使動作電位『跳躍式傳導(加速傳導)』(B);②大量有髓鞘的軸突在中樞構成『白質』(A);③包覆A型(有髓)神經纖維(D)。「提供ATP(能量)不是髓鞘的功能」(髓鞘是膜脂質為主、無供能角色)。故非髓鞘功能者為提供ATP。","options":{"A":"是功能。有髓軸突組成白質。","B":"是功能。跳躍式傳導。","C":"非(即為答案)。髓鞘不提供ATP。","D":"是功能。包覆A型神經纖維。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"105090-N1-21":{"quick":"正解(B為「錯誤」者)。痛覺的初級傳入神經是『偽單極神經元』(背根神經節)，不是多極神經元。","detail":{"background":"痛覺傳遞途徑(脊髓丘腦徑)：①痛覺傳入纖維由『背根進入脊髓』(A對);②「其初級傳入感覺神經元是『偽單極神經元(位於背根神經節)』」，故(B)說「多極神經元」為錯(多極是運動神經元/中間神經元);③「P物質(substance P)是傳入纖維在脊髓後角釋放的痛覺傳遞物之一」(C對);④第二級神經元交叉到『對側』、經對側丘腦上行到體感覺皮質(D對)。故錯誤者為(B)。","options":{"A":"正確。痛覺傳入由背根進脊髓。","B":"錯誤(即為答案)。初級傳入是偽單極神經元。","C":"正確。P物質是痛覺傳遞物之一。","D":"正確。經對側丘腦上行。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"106030-N1-19":{"quick":"正解(C為「非動作電位特性」者)。動作電位『不會加成』(全或無);加成是分級電位(突觸電位)的特性。","detail":{"background":"動作電位(action potential)的特性：①有『不反應期(refractory period)』(A);②遵守『全或無定律(all-or-none)』(B，達閾值就產生固定大小);③有『傳導性(可不衰減地傳播)』(D)。「動作電位『不會加成(summation)』」(因有不反應期、且全或無)——『加成是分級電位(如突觸電位、終板電位)的特性』。故非動作電位特性者為加成作用。","options":{"A":"是特性。動作電位有不反應期。","B":"是特性。遵守全或無定律。","C":"非(即為答案)。動作電位不加成(那是分級電位特性)。","D":"是特性。動作電位有傳導性。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"106110-N1-17":{"quick":"正解(B)。鈉鉀幫浦屬於「主動運輸(active transport)」(直接耗ATP逆梯度運送)。","detail":{"background":"鈉鉀幫浦(Na-K-ATPase)逆濃度梯度把鈉打出、鉀打入，需『水解ATP提供能量』→屬「(初級)主動運輸(active transport)」。簡單擴散、滲透是被動(順梯度、不耗能);胞噬作用是吞入大顆粒的膜運輸。故鈉鉀幫浦屬主動運輸。","options":{"A":"錯誤。簡單擴散是被動。","B":"正確。鈉鉀幫浦是主動運輸。","C":"錯誤。滲透是水的被動移動。","D":"錯誤。胞噬是吞入顆粒。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"106110-N1-20":{"quick":"正解(A)。一氧化氮(NO)是氣體傳遞物，生成後立即擴散、不儲存於突觸囊泡。","detail":{"background":"多數神經傳遞物(麩胺酸、正腎上腺素、乙醯膽鹼等)先儲存於突觸囊泡、再經胞吐釋放。「一氧化氮(NO)是『氣體性傳遞物』，由精胺酸經一氧化氮合酶『臨時合成』後『立即擴散』穿膜作用於鄰近細胞，『不儲存於突觸囊泡』、也不經胞吐」。故不儲存於囊泡者為一氧化氮。","options":{"A":"正確。NO是氣體傳遞物
