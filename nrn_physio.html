、不儲存於囊泡。","B":"錯誤。麩胺酸儲於囊泡。","C":"錯誤。正腎上腺素儲於囊泡。","D":"錯誤。乙醯膽鹼儲於囊泡。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"106111-N1-17":{"quick":"正解(C)。細胞凋亡(及自溶)時釋出水解酵素分解細胞的胞器是「溶小體(lysosome)」。","detail":{"background":"溶小體(lysosome)內含大量酸性水解酶，在細胞自噬、凋亡(apoptosis)或壞死過程中，其酶被釋放可『水解(分解)細胞成分』。(凋亡主要由caspase執行，但溶小體酶也參與細胞物質的分解清除)。過氧化氫酶體分解過氧化氫、中心體與分裂有關、核糖體合成蛋白質。故釋出水解酶分解細胞者為溶小體。","options":{"A":"錯誤。過氧化氫酶體分解H₂O₂。","B":"錯誤。中心體與分裂有關。","C":"正確。溶小體釋出水解酶分解細胞。","D":"錯誤。核糖體合成蛋白質。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Cell","實用生理學（華杏）細胞生理","Tortora & Derrickson《Principles of A&P》15e Ch.3"]}},"106111-N1-19":{"quick":"正解(D)。正常情況下終板電位夠大，會引發肌肉動作電位(屬興奮性、靠ACh)。","detail":{"background":"終板電位(end-plate potential, EPP)：①是『化學突觸(神經肌肉接合)』的電位(非電突觸，A錯);②「神經肌肉接合處『只用乙醯膽鹼(ACh)、且為『興奮性』』(不像中樞突觸有興奮或抑制兩種)」(故B「可興奮或抑制」、C「透過麩胺酸」皆錯);③「正常情況下單一神經衝動釋放的ACh足夠使EPP超過閾值→『引發肌肉動作電位』→收縮」(安全係數高)——D正確。故正確者為(D)。","options":{"A":"錯誤。是化學突觸的電位(非電突觸)。","B":"錯誤。NMJ只用ACh且為興奮性。","C":"錯誤。NMJ用ACh非麩胺酸。","D":"正確。終板電位正常會引發肌肉動作電位。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"106111-N1-21":{"quick":"正解(B為「錯誤」者)。一個寡突膠細胞可形成『多個(數十個)軸突』的髓鞘節段，不是只形成一個。","detail":{"background":"寡突膠細胞(oligodendrocyte)：①在中樞神經系統形成髓鞘、與『白質』形成有關(A對);②「『一個寡突膠細胞可同時包繞『多條(多個)軸突』』(數十個髓鞘節段)」，故(B)「只形成一個軸突髓鞘」為錯(那是周邊許旺細胞的特性——一個許旺細胞只包一段);③會分泌抑制軸突再生的因子(C對，故中樞神經難再生);④只分布於中樞(D對)。故錯誤者為(B)。","options":{"A":"正確。與中樞白質形成有關。","B":"錯誤(即為答案)。一個寡突膠細胞可形成多個軸突髓鞘。","C":"正確。抑制中樞軸突再生。","D":"正確。只分布於中樞神經系統。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"106111-N1-22":{"quick":"正解(C)。神經末梢以胞吐釋放傳遞物，與『鈣離子(Ca²⁺)』內流最直接相關。","detail":{"background":"神經傳遞物釋放：動作電位到達軸突末梢→開啟『電壓閘控鈣通道→鈣離子(Ca²⁺)內流』→鈣觸發突觸囊泡與膜融合、以『胞吐(exocytosis)』釋放傳遞物到突觸隙。故與胞吐釋放最直接相關的離子是鈣離子。　深化：神經傳遞物釋放需鈣離子內流觸發突觸囊泡胞吐，故鈣是興奮—分泌耦合的關鍵。傳遞物與突觸後受體結合產生興奮性或抑制性突觸後電位（EPSP/IPSP），再經時間性與空間性加成決定是否引發動作電位。","options":{"A":"錯誤。鈉主導去極化。","B":"錯誤。鉀主導再極化。","C":"正確。鈣離子內流觸發胞吐釋放傳遞物。","D":"錯誤。鎂可拮抗鈣但非觸發。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"107030-N1-22":{"quick":"正解(A)。終板電位屬於「興奮性突觸後電位(EPSP)」。","detail":{"background":"終板電位(end-plate potential)是神經肌肉接合處ACh作用使終板膜『去極化』的電位，性質屬「興奮性突觸後電位(EPSP)」(會使膜往閾值靠近、引發動作電位)。它是分級電位(非動作電位)、也非感覺受器的接受器電位。故屬興奮性突觸後電位。","options":{"A":"正確。終板電位屬興奮性突觸後電位。","B":"錯誤。非抑制性(NMJ只興奮)。","C":"錯誤。它是分級電位非動作電位。","D":"錯誤。接受器電位在感覺受器。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"107110-N1-17":{"quick":"正解(A)。粒線體內腔(內膜圍成)充滿基質(matrix)，含克氏循環酶與粒線體DNA。","detail":{"background":"粒線體特性：①「內膜向內摺成嵴、內腔充滿『基質(matrix)』」(含克氏循環酶、粒線體DNA、核糖體)——A正確;②「粒線體DNA是『裸露環狀』、『不與組蛋白結合』」(像細菌)，故B錯;③粒線體有自己的DNA但『部分蛋白由細胞核基因編碼、在細胞質合成後輸入』，無法完全自製，故C錯;④粒線體提供身體『約90%以上』的ATP(非20%)，故D錯。故正確者為(A)。","options":{"A":"正確。粒線體內腔充滿基質。","B":"錯誤。粒線體DNA不與組蛋白結合(裸露環狀)。","C":"錯誤。部分粒線體蛋白由核基因編碼，無法完全自製。","D":"錯誤。粒線體提供約90%以上ATP。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Cell","實用生理學（華杏）細胞生理","Tortora & Derrickson《Principles of A&P》15e Ch.3"]}},"107110-N1-18":{"quick":"正解(D)。有機磷(殺蟲劑)抑制乙醯膽鹼酯酶(AChE)→ACh堆積→過度興奮。","detail":{"background":"乙醯膽鹼酯酶(AChE)抑制劑：「『有機磷(殺蟲劑)』與『神經毒氣(沙林)』都抑制AChE→突觸ACh無法分解、堆積→膽鹼性過度興奮(瞳孔縮小、流涎、肌肉抽搐後麻痺、支氣管痙攣)」(解毒用atropine+解磷定)。注意：本題選項把『沙林』也列為神經毒氣，兩者都抑制AChE;標準答案取(D)有機磷。河豚毒阻斷鈉通道、南美箭毒阻斷ACh受器(非抑制AChE)。故抑制AChE者為有機磷(沙林亦同機制)。","options":{"A":"錯誤。河豚毒阻斷鈉通道。","B":"沙林也抑制AChE(同機制)，但本題答案取有機磷。","C":"錯誤。南美箭毒阻斷ACh受器。","D":"正確。有機磷抑制乙醯膽鹼酯酶。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"107110-N1-22":{"quick":"正解(C)。肉毒桿菌毒素破壞SNARE蛋白，阻斷神經末梢釋放乙醯膽鹼→肌肉麻痺。","detail":{"background":"肉毒桿菌毒素(botulinum toxin)：切割神經末梢的「SNARE蛋白複合體(突觸囊泡融合所需)」→『阻斷突觸囊泡與膜融合、無法釋放乙醯膽鹼(ACh)』→神經肌肉傳遞中斷→「肌肉『鬆弛性麻痺』」(肉毒桿菌中毒、Botox除皺也是此原理)。對照破傷風毒素阻斷抑制性傳遞物→痙攣性麻痺。故肉毒桿菌毒素阻斷ACh釋放(破壞SNARE)。","options":{"A":"錯誤。非作用於鉀鈣通道。","B":"錯誤。是『阻斷』非促進ACh釋放。","C":"正確。破壞SNARE、阻斷ACh釋放。","D":"錯誤。機制是破壞SNARE而非阻斷鈣通道(那是另一類毒素)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"108020-N1-17":{"quick":"正解(D)。核仁(nucleolus)的主要功能是製造核糖體RNA(rRNA)、組裝核糖體次單元。","detail":{"background":"「核仁(nucleolus)」位於細胞核內，是『rRNA(核糖體RNA)的合成與核糖體次單元組裝』的場所。製造DNA(複製)在細胞核、核膜由內質網延伸、DNA穩定由組蛋白與修復系統維持。故核仁主功能為製造rRNA。　深化：核仁是核內無膜的緻密結構，負責rRNA轉錄與核糖體次單元組裝，代謝旺盛、蛋白質合成活躍的細胞核仁明顯。DNA複製在細胞核基質、蛋白質合成在核糖體（細胞質/粗內質網）、ATP在粒線體，各有其場所。","options":{"A":"錯誤。DNA複製在細胞核(非核仁特定功能)。","B":"錯誤。核膜由內質網延伸形成。","C":"錯誤。DNA穩定非核仁主功能。","D":"正確。核仁製造rRNA、組裝核糖體。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Cell","實用生理學（華杏）細胞生理","Tortora & Derrickson《Principles of A&P》15e Ch.3"]}},"108020-N1-25":{"quick":"正解(B)。重症肌無力是『乙醯膽鹼(ACh)受器』受損(自體抗體)致神經訊號無法傳到肌肉。","detail":{"background":"重症肌無力(myasthenia gravis)是自體免疫病：產生「抗『乙醯膽鹼(ACh)受器』的自體抗體→破壞神經肌肉接合處的ACh受器」→ACh無法有效傳遞訊號→肌肉無力、易疲勞(與103030-18、112110-12一致)。故受損的傳遞物受器為乙醯膽鹼受器。","options":{"A":"錯誤。非腎上腺素受器。","B":"正確。重症肌無力是ACh受器受損。","C":"錯誤。非血清素受器。","D":"錯誤。非麩胺酸受器。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"108110-N1-17":{"quick":"正解(D)。中心體(centrosome)受損會使「有絲分裂(mitosis)」無法完成(無法形成紡錘體)。","detail":{"background":"中心體(centrosome，含中心粒)是動物細胞『微管組織中心』，在『有絲分裂』時形成『紡錘體(spindle)』牽引染色體分向兩極。中心體受損→無法形成紡錘體→「有絲分裂無法完成」。DNA複製(S期，靠DNA聚合酶)、轉錄(RNA聚合酶)、轉譯(核糖體)與中心體無關。故中心體受損影響有絲分裂。","options":{"A":"錯誤。染色體複製靠DNA聚合酶。","B":"錯誤。轉錄靠RNA聚合酶。","C":"錯誤。轉譯靠核糖體。","D":"正確。中心體受損使有絲分裂無法完成。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Cell","實用生理學（華杏）細胞生理","Tortora & Derrickson《Principles of A&P》15e Ch.3"]}},"108110-N1-22":{"quick":"正解(C)。周邊神經軸突的髓鞘主要由「許旺細胞(Schwann cell)」組成。","detail":{"background":"髓鞘的來源：①『周邊神經系統』的髓鞘由「許旺細胞(Schwann cell)」形成(一個許旺細胞包一段軸突);②中樞神經系統的髓鞘由寡突膠細胞形成。故包圍周邊神經軸突的髓鞘主要由許旺細胞組成(其細胞膜層層包繞軸突)。　深化：周邊神經髓鞘由許旺細胞形成（一細胞包一段），中樞神經髓鞘由寡突膠細胞形成（一細胞可包多段）。髓鞘間的蘭氏結使動作電位跳躍式傳導、加快速度。脫髓鞘疾病（多發性硬化症在中樞、GBS在周邊）會嚴重影響傳導。","options":{"A":"錯誤。非分泌囊泡。","B":"錯誤。非神經元胞體外突。","C":"正確。周邊髓鞘由許旺細胞組成。","D":"錯誤。微膠細胞主免疫吞噬。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"109030-N1-19":{"quick":"正解(D)。蛋白質醣基化(glycosylation)屬於「轉譯後修飾(post-translational modification)」。","detail":{"background":"基因表現流程：DNA轉錄→mRNA(轉錄後修飾:加帽、加尾、剪接)→轉譯(核糖體合成多肽)→「『轉譯後修飾(post-translational modification)』＝多肽合成『後』的加工，如『醣基化(glycosylation)』、磷酸化、摺疊、切割等(多在內質網與高爾基體進行)」。故醣基化屬轉譯後修飾。","options":{"A":"錯誤。轉錄是DNA→RNA。","B":"錯誤。轉錄後修飾是RNA加工。","C":"錯誤。轉譯是合成多肽。","D":"正確。醣基化屬轉譯後修飾。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Cell","實用生理學（華杏）細胞生理","Tortora & Derrickson《Principles of A&P》15e Ch.3"]}},"109030-N1-22":{"quick":"正解(C)。牽張反射由中樞傳到肌肉的是「α運動神經元」。","detail":{"background":"牽張反射(stretch reflex，如膝跳反射)：①受器是肌肉中的「肌梭(muscle spindle)」(感受肌肉被拉長);②傳入纖維為「Ia纖維」(非Ib;Ib來自高基氏腱器官);③在脊髓『單突觸』直接連到「α運動神經元」;④「α運動神經元(傳出)→使該肌肉(梭外肌纖維)收縮」——故由中樞傳到肌肉的是α運動神經元(C正確);⑤動器(effector)是『梭外肌纖維(肌肉本身)』，非肌梭(肌梭是受器)。故正確者為(C)。","options":{"A":"錯誤。牽張反射為脊髓單突觸反射，不需腦幹中間神經元。","B":"錯誤。傳入纖維為Ia(非Ib)。","C":"正確。傳出為α運動神經元。","D":"錯誤。動器是梭外肌(肌梭是受器)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"110030-N1-18":{"quick":"正解(C)。電性突觸(間隙接合)不存在於『骨骼肌細胞』(骨骼肌各纖維獨立、無間隙接合)。","detail":{"background":"間隙接合(gap junction，電性突觸)讓細胞間離子直接流通、同步活動，存在於：心肌(間盤)、單一單位平滑肌(內臟平滑肌)、某些神經細胞、上皮等。而「『骨骼肌細胞』彼此『無間隙接合』」(每條骨骼肌纖維由各自的運動神經元獨立支配、不互相電耦合，以便精細控制)。故電性突觸不存在於骨骼肌細胞。","options":{"A":"存在。心肌細胞有間盤(間隙接合)。","B":"存在。內臟平滑肌有間隙接合。","C":"不存在(即為答案)。骨骼肌細胞無間隙接合。","D":"存在。某些神經細胞有電性突觸。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"110030-N1-22":{"quick":"正解(A)。細胞外鉀濃度增加→鉀外流減少→靜止膜電位『減小(去極化、變不負)』。","detail":{"background":"靜止膜電位主要由鉀的平衡電位決定(膜對鉀通透性高)。①「『細胞外鉀濃度增加』→細胞內外鉀濃度差變小→鉀外流減少→膜電位『往正向移動(去極化)』→靜止膜電位的絕對值『減小』」(A正確;這也是高血鉀危害心臟的原因);②細胞外鉀減少→靜止膜電位變更負(過極化、絕對值增大)，故B錯;③細胞內鉀增加→濃度差變大→膜電位更負(絕對值增大)，故C、D錯。故正確者為(A)。","options":{"A":"正確。細胞外鉀增加使靜止膜電位減小(去極化)。","B":"錯誤。細胞外鉀減少使膜電位更負。","C":"錯誤。細胞內鉀增加使膜電位更負。","D":"錯誤。細胞內鉀增加會改變膜電位。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"110030-N1-23":{"quick":"正解(D)。屍僵主要因『缺乏ATP』，橫橋無法分離而僵硬。","detail":{"background":"屍僵(rigor mortis)：死後ATP耗盡，橫橋分離需要ATP結合肌凝蛋白，無ATP→「肌動蛋白與肌凝蛋白橫橋無法分離→肌肉僵硬」(與106111-18一致)。乳酸堆積、肝醣耗盡是伴隨現象但非直接原因;死後鈣反而從SR漏出促進結合。故主因是缺乏ATP。","options":{"A":"錯誤。乳酸堆積非直接原因。","B":"錯誤。死後鈣反而增加。","C":"錯誤。肝醣耗盡非直接原因。","D":"正確。缺乏ATP使橫橋無法分離→屍僵。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"110030-N1-25":{"quick":"正解(A)。室管膜細胞(ependymal cell)襯於腦室、參與腦脊髓液的生成與流動。","detail":{"background":"神經膠細胞分工：「室管膜細胞(ependymal cell)」襯在腦室與脊髓中央管表面，構成『脈絡叢』分泌腦脊髓液(CSF)，其纖毛擺動幫助CSF流動。星狀細胞(血腦障壁)、微膠細胞(免疫吞噬)、寡突細胞(中樞髓鞘)不主管CSF。故調節CSF生成與流動者為室管膜細胞。","options":{"A":"正確。室管膜細胞參與CSF生成與流動。","B":"錯誤。星狀細胞主血腦障壁。","C":"錯誤。微膠細胞主免疫。","D":"錯誤。寡突細胞形成中樞髓鞘。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"110110-N1-21":{"quick":"正解(C為「錯誤」者)。「產生細胞骨架」不是細胞膜的功能(細胞骨架由細胞質的蛋白絲構成)。","detail":{"background":"細胞膜(質膜)的主要功能：①選擇性『物質運輸(運送)』(A);②『訊息傳遞』(膜受體接收訊號)(B);③『細胞辨識與黏附』(醣蛋白、黏附分子)(D);④維持細胞形狀與屏障。「『產生細胞骨架』不是細胞膜的功能」——細胞骨架(微絲、中間絲、微小管)由細胞質中的蛋白聚合而成(雖部分錨定於膜)。故非細胞膜功能者為產生細胞骨架。","options":{"A":"是功能。媒介物質運輸。","B":"是功能。進行訊息傳遞。","C":"非(即為答案)。細胞骨架由細胞質蛋白構成。","D":"是功能。細胞辨識與黏附。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Cell","實用生理學（華杏）細胞生理","Tortora & Derrickson《Principles of A&P》15e Ch.3"]}},"110110-N1-22":{"quick":"正解(C)。星狀細胞(astrocyte)受損對血腦障壁功能影響最大。","detail":{"background":"血腦障壁(blood-brain barrier)由腦微血管內皮細胞的緊密連接構成，而「『星狀細胞(astrocyte)』的足突包圍腦微血管、『誘導並維持內皮細胞的緊密連接』」，是維持血腦障壁完整性的關鍵。故星狀細胞受損對血腦障壁影響最大(與110110-22、107110-15一致)。微膠、寡突、室管膜細胞功能不同。故答案星狀細胞。","options":{"A":"錯誤。微膠細胞主免疫。","B":"錯誤。寡突細胞形成髓鞘。","C":"正確。星狀細胞維持血腦障壁。","D":"錯誤。室管膜細胞與CSF有關。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"111030-N1-20":{"quick":"正解(D為「錯誤」者)。縮回手臂的『屈肌反射(withdrawal reflex)』是『多突觸反射』，需要中間神經元。","detail":{"background":"摸到熱水縮手＝「屈肌(縮回)反射(withdrawal reflex)」：①由痛刺激引起(A對);②使手臂『屈肌收縮』把手縮回(B對);③是『脊髓反射』，不需大腦下命令(可後到才感覺到痛)(C對);④「此反射『經過中間神經元(interneuron)』連接感覺與運動神經元，屬『多突觸反射』」，故(D)「無需中間神經元」為錯(只有膝跳的牽張反射是單突觸無中間神經元)。故錯誤者為(D)。","options":{"A":"正確。由痛刺激引起。","B":"正確。手臂屈肌收縮。","C":"正確。脊髓反射、無需大腦下命令。","D":"錯誤(即為答案)。屈肌反射為多突觸、需中間神經元。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"111110-N1-16":{"quick":"正解(B)。河豚毒素(tetrodotoxin)阻斷『鈉通道』→阻止去極化→無法產生動作電位→麻痺。","detail":{"background":"河豚毒素(tetrodotoxin, TTX)專一性地『阻斷電壓閘控『鈉通道』』→神經與肌肉細胞『無法去極化、無法產生動作電位』→感覺異常、肌肉麻痺、呼吸肌麻痺(河豚中毒可致死)。故TTX的主要影響是『阻止去極化』(阻斷鈉通道)(與113180-13一致)。","options":{"A":"錯誤。再極化靠鉀通道(TTX不阻鉀)。","B":"正確。TTX阻斷鈉通道→阻止去極化。","C":"錯誤。TTX不促進傳遞物釋放。","D":"錯誤。TTX主要阻鈉通道，非傳遞物釋放。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"111110-N1-17":{"quick":"正解(D)。突觸後電位是分級電位，『缺乏不反應期』(可加成)。","detail":{"background":"突觸後電位(postsynaptic potential, PSP)＝分級電位，特性：①『不是動作電位』(A錯);②「可為『興奮性(EPSP，去極化)』或『抑制性(IPSP，過極化)』」(故B「均興奮」、C「均抑制」皆錯);③『缺乏不反應期(refractory period)』→可時間/空間加成(D正確)。故正確者為(D)。","options":{"A":"錯誤。突觸後電位非動作電位。","B":"錯誤。可為興奮或抑制(非均興奮)。","C":"錯誤。可為興奮或抑制(非均抑制)。","D":"正確。突觸後電位缺乏不反應期。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"112030-N1-11":{"quick":"正解(B)。P物質(substance P)屬於胜肽類神經傳導物質。","detail":{"background":"神經傳遞物分類：①胺基酸類(麩胺酸、GABA、甘胺酸);②胺類/兒茶酚胺(多巴胺、正腎上腺素、血清素、乙醯膽鹼);③「『胜肽類(neuropeptide)』——如『P物質(substance P，痛覺)』、腦內啡、體抑素、血管加壓素等」;④氣體類(一氧化氮NO)。故屬胜肽類者為P物質。(NO是氣體類、多巴胺與血清素是胺類)。","options":{"A":"錯誤。一氧化氮是氣體類。","B":"正確。P物質是胜肽類傳遞物。","C":"錯誤。多巴胺是胺類。","D":"錯誤。血清素是胺類。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"112110-N1-11":{"quick":"正解(C為「不是」者)。磷酸肌胺酸(creatine phosphate)是『能量儲存物』，會被『消耗(減少)』而非堆積。","detail":{"background":"長時間肌肉活動後肌纖維中『堆積/常見』的代謝產物：①無氧糖解產生『乳酸(lactate)』堆積;②ATP分解產生『ADP』;③代謝產生『氧化自由基(ROS)』。「『磷酸肌胺酸(creatine phosphate)』是『能量儲備』物質，運動時被『消耗(減少)』來再生ATP」——故它『不是』運動後堆積的代謝物。故答案磷酸肌胺酸。","options":{"A":"是常見代謝物。氧化自由基。","B":"是常見代謝物。乳酸堆積。","C":"不是(即為答案)。磷酸肌胺酸是被消耗的能量儲備。","D":"是常見代謝物。ADP。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"112110-N1-12":{"quick":"正解(B)。重症肌無力與『乙醯膽鹼(acetylcholine)』受器異常最相關。","detail":{"background":"重症肌無力(myasthenia gravis)＝自體抗體攻擊神經肌肉接合處的『乙醯膽鹼(ACh)受器』→傳遞障礙、肌肉無力(與103030-18、108020-25一致)。故最相關者為乙醯膽鹼。　深化：重症肌無力的自體抗體破壞終板乙醯膽鹼受器，造成「易疲勞性肌無力」（活動後加重、休息改善），常見眼瞼下垂、複視。診斷用抗AChR抗體、edrophonium試驗、重複神經刺激；治療用乙醯膽鹼酯酶抑制劑（pyridostigmine）、免疫抑制與胸腺切除。","options":{"A":"錯誤。非血清素。","B":"正確。重症肌無力與乙醯膽鹼(受器)相關。","C":"錯誤。非組織胺。","D":"錯誤。非腎上腺素。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"112180-N1-11":{"quick":"正解(B)。盞醣(glycocalyx)主要功能是細胞間的辨識與環境互動。","detail":{"background":"「盞醣/醣萼(glycocalyx)」是細胞膜外側的『醣脂與醣蛋白的碳水化合物層』，主要功能：「細胞『辨識(自我/非我)』、細胞間黏附、與環境(基質、其他細胞)互動、接收訊號、保護」。它不穩定細胞核、不構成間隙接合或緊密接合(那是膜蛋白連接構造)。故盞醣主功能為細胞辨識與環境互動。","options":{"A":"錯誤。盞醣不穩定細胞核。","B":"正確。盞醣進行細胞辨識與環境互動。","C":"錯誤。間隙接合由連接子構成。","D":"錯誤。緊密接合由連接蛋白構成。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, The Cell","實用生理學（華杏）細胞生理","Tortora & Derrickson《Principles of A&P》15e Ch.3"]}},"112180-N1-19":{"quick":"正解(B)。黏膜下神經叢(submucosal/Meissner plexus)屬於腸道神經系統。","detail":{"background":"腸道神經系統(enteric nervous system, ENS)＝消化道管壁內的『內在』神經叢，包括「黏膜下神經叢(Meissner，調分泌)」與「肌間神經叢(Auerbach，調運動)」。腹腔叢、腹下神經叢是『自主神經(交感)』的外在神經節叢、薦神經叢是體神經叢，皆非腸道神經系統本身。故屬腸道神經系統者為黏膜下神經叢。","options":{"A":"錯誤。腹腔叢是交感神經叢。","B":"正確。黏膜下神經叢屬腸道神經系統。","C":"錯誤。薦神經叢是體神經叢。","D":"錯誤。腹下神經叢是自主神經叢。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"113030-N1-3":{"quick":"正解(D)。反射弧的最終端構造是「動器(effector)」(肌肉或腺體執行反應)。","detail":{"background":"反射弧(reflex arc)五components依序：①受器(receptor，接收刺激)→②感覺(傳入)神經元→③中樞(整合，可有中間神經元)→④運動(傳出)神經元→⑤「動器(effector，肌肉或腺體)＝最終端，執行反應」。故反射弧最終端構造為動器。","options":{"A":"錯誤。感覺神經元是傳入端。","B":"錯誤。運動神經元是傳出途中。","C":"錯誤。受器是起始端。","D":"正確。動器是反射弧最終端(執行反應)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"113180-N1-13":{"quick":"正解(C)。河豚毒素阻斷『鈉通道』→無法去極化→肌肉麻痺。","detail":{"background":"河豚毒素(tetrodotoxin, TTX)阻斷電壓閘控『鈉通道』→神經與肌肉無法去極化、無法產生動作電位→感覺與運動麻痺(與111110-16一致)。故被阻斷的是鈉通道。　深化：河豚毒素（TTX）選擇性阻斷電壓閘控Na⁺通道，是研究神經電生理的重要工具藥；中毒臨床表現為口周麻木、四肢無力、進行性呼吸肌麻痺，無解毒劑、以支持性呼吸照護為主。對比局部麻醉藥也是阻斷Na⁺通道但可逆。","options":{"A":"錯誤。TTX不阻鉀通道。","B":"錯誤。TTX不阻鈣通道。","C":"正確。TTX阻斷鈉通道。","D":"錯誤。TTX不阻氯通道。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"114030-N1-3":{"quick":"正解(A)。氯通道開放(Cl⁻內流)或鉀通道開放(K⁺外流)→過極化→產生抑制性突觸後電位(IPSP)。","detail":{"background":"抑制性突觸後電位(IPSP)＝使膜『過極化(更負)』、遠離閾值。機制：①「氯離子(Cl⁻)通道開放→Cl⁻內流(使膜更負)」(如GABA-A、甘胺酸受體);②「鉀離子(K⁺)通道開放→K⁺外流(使膜更負)」。故造成過極化(IPSP)者為『Cl⁻通道開放＋K⁺通道開放』(A正確)。鈉、鈣通道開放會去極化(EPSP)。故答案(A)。","options":{"A":"正確。Cl⁻內流與K⁺外流造成過極化(IPSP)。","B":"錯誤。Na⁺通道開放會去極化。","C":"錯誤。Ca²⁺通道開放會去極化。","D":"錯誤。Na⁺通道開放會去極化。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"114170-N1-20":{"quick":"正解(A)。乙醯膽鹼對平滑肌可產生興奮性或抑制性作用(視器官與受體而定)。","detail":{"background":"「乙醯膽鹼(ACh)」對不同平滑肌可有『興奮『或』抑制』雙重作用(視受體型別與器官)：如腸胃道平滑肌(M3受體)→收縮(興奮)、但某些血管平滑肌經內皮NO→舒張(抑制)。這種雙向性使ACh成為本題答案。多巴胺、組織胺、血清素作用較特定。故對平滑肌可興奮或抑制者為乙醯膽鹼。","options":{"A":"正確。乙醯膽鹼對平滑肌可興奮或抑制。","B":"錯誤。多巴胺作用較特定。","C":"錯誤。組織胺多致收縮/通透增加。","D":"錯誤。血清素作用較特定。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"115030-N1-4":{"quick":"正解(C)。心室細胞的靜止膜電位約為−90毫伏特。","detail":{"background":"心室肌(及骨骼肌)細胞的靜止膜電位約「−90 mV」(接近鉀平衡電位);神經元約−70 mV、節律細胞較不負(約−60mV且不穩定)。負值代表細胞內相對外為負(鉀外流主導)。故心室細胞靜止膜電位約−90 mV。　深化：靜止膜電位主要由K⁺外漏與Na-K-ATP酶維持，接近K⁺平衡電位。心室肌約−90mV、神經元約−70mV、竇房結節律細胞因有funny電流（If）較不負（約−60mV）並可自發去極化，這是心臟自律性的基礎。","options":{"A":"錯誤。+90為正值不合理。","B":"錯誤。−40偏正(接近閾值)。","C":"正確。心室細胞靜止膜電位約−90 mV。","D":"錯誤。+40是動作電位峰值附近。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Nerve & Synapse","實用生理學（華杏）神經生理","Tortora & Derrickson《Principles of A&P》15e Ch.12"]}},"101030-N1-22":{"quick":"切斷下視丘—腦下垂體神經連結，受影響的是「神經性分泌」的後葉激素（催產素、ADH），故選A。","detail":{"background":"腦下垂體分前葉（腺垂體）與後葉（神經垂體）。後葉本身不製造激素，而是下視丘視上核（supraoptic）與室旁核（paraventricular）神經元的軸突末梢延伸，催產素（oxytocin）與抗利尿激素（ADH/vasopressin）在下視丘合成後沿神經軸突運送至後葉儲存釋放，屬「神經內分泌」途徑——故切斷下視丘與後葉的「神經」連結，這兩種激素分泌會直接中斷。相對地，前葉激素（LH、FSH、TSH、ACTH、GH、PRL）受下視丘「釋放／抑制激素」經腦下垂體門脈系統（血流）調控，切斷神經但門脈血流仍在則影響較小（GnRH等仍可隨血流到達）。胰島素來自胰臟β細胞、動情素來自卵巢，皆與腦下垂體柄無直接神經聯繫。","options":{"A":"正確：催產素是下視丘室旁核神經元合成、軸突運送至後葉，切斷神經聯繫即無法釋放。","B":"LH屬前葉激素，受GnRH經門脈血流調控，非神經運送。","C":"胰島素來自胰臟β細胞，與腦下垂體無關。","D":"動情素來自卵巢顆粒細胞，受LH/FSH調控，非神經直接運送。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"101030-N1-25":{"quick":"皮質醇（糖皮質素）由腎上腺皮質「束狀帶（zona fasciculata）」分泌；題目選項C「囊狀帶」即束狀帶，故選C。","detail":{"background":"腎上腺皮質由外到內分三層，記憶口訣「GFR對應鹽、糖、性」：①絲球帶（zona glomerulosa）→礦物皮質素醛固酮（aldosterone），受RAAS與血鉀調控；②束狀帶（zona fasciculata，最厚）→糖皮質素皮質醇（cortisol），受ACTH調控；③網狀帶（zona reticularis）→腎上腺雄性素（DHEA等）。腎上腺髓質則分泌腎上腺素/正腎上腺素（兒茶酚胺），屬交感神經節後同源組織。皮質醇是壓力激素，促糖質新生、升血糖、抗發炎、分解蛋白與脂肪。題目用語「囊狀帶」即fasciculata（束狀／柵狀帶）的另一譯名。","options":{"A":"髓質分泌兒茶酚胺，非類固醇激素。","B":"網狀帶分泌雄性素（DHEA），非皮質醇。","C":"正確：束狀帶（囊狀帶）分泌皮質醇。","D":"絲球帶分泌醛固酮（礦物皮質素）。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"101110-N1-23":{"quick":"甲狀腺分泌且具生理功能的兩種主要激素是T4（甲狀腺素/thyroxine）與T3（三碘甲狀腺素），故選D。","detail":{"background":"甲狀腺濾泡細胞以甲狀腺球蛋白（thyroglobulin）上的酪胺酸（tyrosine）殘基進行碘化：先形成單碘酪胺酸（MIT）與雙碘酪胺酸（DIT），這兩者僅是「中間產物」不具激素活性；接著MIT+DIT耦合成T3、DIT+DIT耦合成T4，T3與T4才是分泌入血、具生理功能的激素。分泌量以T4為主（約90%），但T3活性約為T4的3–5倍；周邊組織以去碘酶（deiodinase）將T4轉為更具活性的T3（活化），或轉為無活性的reverse T3。甲狀腺激素調節基礎代謝率、促進中樞神經與骨骼成熟、增加β受體數目等。","options":{"A":"單碘酪胺酸（MIT）是中間產物，不具激素活性。","B":"MIT、DIT皆為中間產物，不是分泌的激素。","C":"DIT是中間產物，不具活性。","D":"正確：T4與T3是甲狀腺分泌、具生理功能的兩種主要激素。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"101110-N1-24":{"quick":"哺乳時嬰兒吸吮反射性刺激泌乳素（prolactin）大量分泌，泌乳素抑制GnRH→抑制排卵，故哺乳婦不易再孕，選D。","detail":{"background":"吸吮乳頭的神經訊號上傳下視丘，一方面經神經反射使後葉釋放催產素（oxytocin）造成乳汁射出（milk ejection），另一方面抑制下視丘多巴胺（PIF）而使前葉泌乳素（prolactin）大量分泌維持泌乳。高濃度泌乳素會回饋抑制下視丘GnRH脈衝分泌，連帶降低LH/FSH，抑制卵泡發育與排卵，形成「哺乳期無月經（lactational amenorrhea）」的自然避孕效果。一旦哺乳頻率下降、泌乳素回落，排卵與月經即恢復。","options":{"A":"動情素由卵巢分泌，哺乳期反而偏低。","B":"助孕素於非孕哺乳期不高。","C":"GnRH被泌乳素抑制而下降，並非過高。","D":"正確：泌乳素過高抑制GnRH/排卵，造成哺乳期不易受孕。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"102030-N1-2":{"quick":"濾泡刺激激素（FSH）主要作用於卵巢（促卵泡發育），配對正確，選A。","detail":{"background":"激素—標的器官配對是內分泌基本題：①FSH（濾泡刺激素）作用於卵巢顆粒細胞（促卵泡成熟、雌激素生成）與睪丸Sertoli細胞（精子生成）——A正確。②抗利尿激素（ADH）作用於腎臟「集尿管」增加水再吸收，不是膀胱——B錯。③腎上腺素（epinephrine）作用於全身α/β腎上腺素受體（心、血管、肝、支氣管等），不是腎臟——C錯。④胰島素作用於肝、肌肉、脂肪等「標的細胞」促進葡萄糖攝取，不是作用回胰臟本身——D錯。激素由內分泌腺分泌後經血流到達遠處標的器官，作用器官常非分泌腺本身。","options":{"A":"正確：FSH作用於卵巢促卵泡發育。","B":"ADH作用於腎集尿管，非膀胱。","C":"腎上腺素作用於全身腎上腺素受體，非腎臟專一。","D":"胰島素作用於肝/肌肉/脂肪，非胰臟本身。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"102030-N1-23":{"quick":"胰島素促進肌肉細胞攝取葡萄糖的機轉是增加細胞膜上葡萄糖運轉體（GLUT4）的數目，故選C。","detail":{"background":"胰島素與肌肉/脂肪細胞膜上的胰島素受體（受體酪胺酸激酶）結合後，啟動PI3K-Akt訊號，使儲存於細胞內囊泡的葡萄糖運轉體GLUT4「轉位（translocation）」到細胞膜，大幅增加葡萄糖以促進性擴散方式進入細胞，因而降血糖。肝與胰島β細胞為GLUT2（不依賴胰島素）、腦/紅血球為GLUT1/GLUT3（基礎攝取）。注意：胰島素不是製造新的「葡萄糖受體」，葡萄糖靠運轉體（transporter）而非受體進入；也不是增加胰島素受體本身。GLUT4是運動與胰島素皆可促其轉位的關鍵，運動可不依賴胰島素增加肌肉葡萄糖攝取。","options":{"A":"胰島素受體增加非主要機轉，且不是促攝取的直接步驟。","B":"葡萄糖靠運轉體（transporter）而非「受體」進入細胞。","C":"正確：增加細胞膜GLUT4葡萄糖運轉體的數目。","D":"葡萄糖不靠「胰島素運轉體」進入。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"102110-N1-22":{"quick":"腎上腺髓質的嗜鉻細胞（chromaffin cell）分泌兒茶酚胺，主要為腎上腺素（epinephrine），故選D。","detail":{"background":"腎上腺髓質源自神經嵴，相當於特化的交感神經節後神經元，其嗜鉻細胞接受交感節前膽鹼性神經支配，受刺激分泌兒茶酚胺進入血液——約80%為腎上腺素（epinephrine）、20%正腎上腺素（norepinephrine）。腎上腺素的形成需PNMT酶（受皮質醇調控，故髓質緊鄰皮質有其生理意義）。ACTH與CRF屬下視丘—腦下垂體—腎上腺軸的調控激素（CRF來自下視丘、ACTH來自腦下垂體前葉）；催產素來自下視丘經後葉釋放，皆非嗜鉻細胞產物。","options":{"A":"ACTH由腦下垂體前葉分泌。","B":"CRF由下視丘分泌。","C":"催產素由下視丘合成、後葉釋放。","D":"正確：嗜鉻細胞分泌腎上腺素等兒茶酚胺。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103030-N1-20":{"quick":"尼古丁類膽鹼受體（nicotinic）是離子通道型（ionotropic）受體，不經G蛋白；蕈毒鹼類與α/β腎上腺素受體皆為G蛋白偶聯受體，故選D。","detail":{"background":"受體依訊號傳遞分兩大類：①離子通道型（ligand-gated ion channel）——配體結合直接開啟離子通道，作用快，如尼古丁類乙醯膽鹼受體（Na+/K+通道，位於神經肌肉接合與自主神經節）、GABA-A、NMDA。②G蛋白偶聯受體（GPCR / metabotropic）——經G蛋白活化第二傳訊者，如蕈毒鹼類膽鹼受體（M1-M5）、α/β腎上腺素受體、多數肽類激素受體。題問「不需透過G蛋白」即指離子通道型，答案為尼古丁類膽鹼受體。","options":{"A":"蕈毒鹼受體為GPCR，需G蛋白。","B":"β腎上腺素受體為GPCR（Gs），需G蛋白。","C":"α腎上腺素受體為GPCR（Gq/Gi），需G蛋白。","D":"正確：尼古丁類膽鹼受體是離子通道型，不需G蛋白。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103030-N1-23":{"quick":"調節基礎代謝率、促進中樞神經系統成熟的是甲狀腺素，故選C。","detail":{"background":"甲狀腺激素（T3/T4）的核心生理作用：①提高幾乎所有組織的基礎代謝率與產熱（增加Na-K-ATP酶、耗氧）；②在胎兒與嬰幼兒期是中樞神經系統發育、髓鞘化、突觸形成的關鍵——先天缺乏造成「呆小症（cretinism）」智能與生長遲滯；③促進骨骼線性生長、與GH協同；④增加心肌β受體數目（心搏過速）。生長激素主管身體線性生長（經IGF-1）但非調節基礎代謝率；胰島素管血糖；糖皮質素管壓力與糖質新生。故唯一同時符合「基礎代謝率＋CNS成熟」者為甲狀腺素。","options":{"A":"生長激素主管線性生長，非基礎代謝率調節。","B":"胰島素調節血糖。","C":"正確：甲狀腺素調節基礎代謝率並促CNS成熟。","D":"糖皮質固醇管壓力代謝與抗發炎。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103030-N1-24":{"quick":"褪黑激素（melatonin）由色胺酸經血清張力素（serotonin）轉化合成，故選A。","detail":{"background":"松果腺合成褪黑激素的路徑：色胺酸（tryptophan）→5-羥色胺酸→血清張力素（serotonin，5-HT）→（NAT酶乙醯化）→N-乙醯血清張力素→（HIOMT甲基化）→褪黑激素（melatonin）。故serotonin是melatonin的直接前驅物。褪黑激素分泌受光照抑制、黑暗促進，夜間濃度最高，調節生理時鐘與睡眠，可緩解時差。題中多巴胺、腎上腺素、正腎上腺素屬兒茶酚胺路徑（酪胺酸來源），與褪黑激素合成無關。","options":{"A":"正確：血清張力素（serotonin）是褪黑激素的前驅物。","B":"多巴胺屬兒茶酚胺路徑。","C":"腎上腺素屬兒茶酚胺。","D":"正腎上腺素屬兒茶酚胺。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103100-N1-22":{"quick":"胰島素為水溶性肽類激素，結合於「細胞膜」上的胰島素受體，故選A。","detail":{"background":"激素依溶解性分兩類，作用受體位置不同：①水溶性激素（肽類、兒茶酚胺）無法穿過細胞膜，結合於「細胞膜表面受體」（如胰島素受體、GPCR），經第二傳訊者作用——胰島素屬此類，受體為跨膜的受體酪胺酸激酶。②脂溶性激素（類固醇如皮質醇/性激素、甲狀腺素）可穿過細胞膜，結合於「細胞質或細胞核內受體」，直接調控基因轉錄。故胰島素受體在細胞膜，非細胞質、粒線體或細胞核。","options":{"A":"正確：胰島素為肽類激素，受體在細胞膜。","B":"細胞質受體屬脂溶性類固醇（如皮質醇）。","C":"粒線體非激素受體所在。","D":"細胞核受體屬甲狀腺素/類固醇。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103100-N1-23":{"quick":"拉隆氏侏儒症（Laron dwarfism）是生長激素「受體」缺陷，GH正常甚至偏高但無法作用，故選B。","detail":{"background":"生長激素（GH）多數作用透過刺激肝臟產生IGF-1（類胰島素生長因子-1，即somatomedin C）來促進骨骼線性生長。Laron syndrome是GH受體基因突變，組織對GH無反應→IGF-1低下→嚴重矮小，但血中GH濃度正常或升高（因缺乏IGF-1負回饋）。治療用重組IGF-1而非GH（給GH無效）。對比：典型腦下垂體性侏儒是GH「分泌」不足（A），給GH有效；Laron則是「受體」問題（B）。題目強調受體缺陷，故選B。","options":{"A":"GH分泌不足是一般垂體性侏儒，Laron的GH正常/偏高。","B":"正確：Laron為GH受體缺陷，組織對GH無反應。","C":"缺乏動情素與Laron無關。","D":"IGF-1是下游結果偏低，根本問題在受體。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103100-N1-24":{"quick":"移除睪丸後，雄性素與抑制素消失，對下視丘—垂體的負回饋解除，FSH、LH（黃體刺激素）反而增加，故選D。","detail":{"background":"男性生殖軸：下視丘GnRH→垂體分泌LH與FSH；LH刺激睪丸Leydig細胞產生睪固酮，FSH刺激Sertoli細胞支持精子生成並分泌抑制素（inhibin）。睪固酮與抑制素回饋抑制GnRH/LH/FSH。手術移除睪丸後，睪固酮與抑制素消失，負回饋解除→GnRH脈衝增加→LH與FSH「上升」。精子生產因無睪丸而停止（非增加），前列腺素與此題無直接關係。故唯一正確現象是「增加黃體刺激素（LH）之製造」。","options":{"A":"失去抑制素負回饋，FSH反而增加。","B":"無睪丸即無精子生產。","C":"與前列腺素生成無直接關係。","D":"正確：失去睪固酮負回饋，LH分泌增加。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103100-N1-25":{"quick":"血容量增加時，左心房牽張感受器與滲透壓下降使ADH分泌「減少」以排水，故選A。","detail":{"background":"血容量/血壓調節ADH（抗利尿激素）的兩個感受器：①下視丘滲透壓感受器（血漿滲透壓↑→ADH↑）；②心房與大血管的牽張（容積/壓力）感受器。當全身血容量增加→心房牽張增強、血漿稀釋滲透壓下降→抑制ADH分泌→集尿管水再吸收減少→排出較多尿、血容量回降。同時血容量增加會抑制RAAS：腎素分泌減少、醛固酮減少（故B、C、D皆相反）。此外心房擴張會釋放心房利鈉肽（ANP）促鈉水排泄。故血容量增加的正確反應是ADH分泌減少。","options":{"A":"正確：血容量增加抑制ADH分泌。","B":"容量增加時鈉排泄增加（ANP），尿鈉不會減少。","C":"血容量增加抑制腎素。","D":"血容量增加抑制醛固酮。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103100-N1-3":{"quick":"副甲狀腺機能亢進時PTH過多，動員骨鈣造成骨骼礦物質流失，故選B。","detail":{"background":"副甲狀腺素（PTH）是升血鈣主激素，三大作用：①刺激蝕骨細胞活性、動員骨骼鈣磷釋出（骨吸收↑）；②促腎遠曲小管鈣再吸收、抑制磷再吸收（排磷）；③活化維生素D（1-α羥化）增加腸鈣吸收。原發性副甲狀腺亢進（如腺瘤）使PTH持續過高→高血鈣、低血磷、骨質流失（osteitis fibrosa cystica）、腎結石。甲狀腺亢進雖也可能輕度影響骨代謝，但「造成骨礦物質流失」最典型且直接者為副甲狀腺。腦下腺、腎上腺非主因。","options":{"A":"甲狀腺亢進影響骨代謝較間接，非典型答案。","B":"正確：PTH過多動員骨鈣，造成骨礦物質流失。","C":"腦下腺與骨鈣動員無直接關係。","D":"腎上腺（皮質醇過多）也會骨鬆但題指機能亢進典型答案是副甲狀腺。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"104030-N1-21":{"quick":"選項中唯一靠「細胞膜表面受體」作用的是腎上腺素（兒茶酚胺，水溶性），故選B。","detail":{"background":"再次運用「水溶性vs脂溶性激素」分類：腎上腺素是兒茶酚胺，水溶性，無法進入細胞，必須結合細胞膜上的α/β腎上腺素受體（GPCR）經cAMP等第二傳訊者作用——故「最需藉細胞膜受體」。相對地，甲狀腺素、糖皮質激素、鹽皮質激素都是脂溶性（甲狀腺素雖為胺基酸衍生但脂溶可入細胞、類固醇可穿膜），作用於細胞內（核）受體調控基因轉錄。故答案為腎上腺素。","options":{"A":"甲狀腺素脂溶，作用於核受體。","B":"正確：腎上腺素水溶性，需細胞膜受體。","C":"糖皮質激素類固醇，作用於胞內受體。","D":"鹽皮質激素類固醇，作用於胞內受體。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"104030-N1-23":{"quick":"直接抑制皮脂腺油脂分泌的是雌激素（estrogen），故選C。","detail":{"background":"皮脂腺活性受性激素調控：雄激素（androgen，如睪固酮/DHT）「刺激」皮脂腺增大與油脂分泌，是青春期痤瘡的關鍵；雌激素（estrogen）則「抑制」皮脂腺分泌、減少油脂，故口服避孕藥（含雌激素）可改善油性肌膚與痘痘。黃體素本身偏雄性素樣作用、褪黑激素與皮脂分泌無直接關係。題問「直接抑制」皮脂腺者為雌激素。","options":{"A":"黃體素偏雄性素樣，非抑制皮脂。","B":"褪黑激素與皮脂分泌無直接關係。","C":"正確：雌激素抑制皮脂腺油脂分泌。","D":"雄激素刺激皮脂分泌（相反）。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"104100-N1-18":{"quick":"甲狀腺素增加心肌收縮力，主要因增加心肌β1腎上腺素受體的數目（permissive效應），故選B。","detail":{"background":"甲狀腺激素對心血管的作用部分是「容許作用（permissive）」——它增加心肌與血管上β1腎上腺素受體的表現數目與敏感度，使兒茶酚胺對心臟的正性變力（收縮力）、變時（心率）效應放大，故甲亢病人心搏過速、心收縮增強、脈壓增大。甲狀腺素也直接增加心肌肌凝蛋白重鏈α同型、Ca-ATPase等，但考點答案落在「增加β1受體數量」。並非單純增加交感神經興奮性（神經本身放電未必增加），也非促肌動蛋白合成或抑制NE代謝。","options":{"A":"非增加交感神經放電本身，而是受體層次。","B":"正確：增加心肌β1受體數量（permissive放大兒茶酚胺效應）。","C":"非促肌動蛋白合成。","D":"非抑制正腎上腺素代謝。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"104100-N1-2":{"quick":"催產素（oxytocin）由後葉經神經運送釋放，與門脈系統無關，故選C。","detail":{"background":"腦下垂體門脈系統（hypothalamic-hypophyseal portal system）是連接下視丘正中隆起與「前葉」的微血管網，下視丘的釋放／抑制激素（如GHRH、CRH、TRH、GnRH、dopamine）經此門脈血流到達前葉，調控前葉激素（GH、ACTH、TSH、LH、FSH、PRL）分泌。催產素（與ADH）是「後葉」激素，靠下視丘神經元軸突直接運送至後葉釋放，不經門脈系統。故與門脈調控「無關」者為催產素。","options":{"A":"ACTH是前葉激素，受CRH經門脈調控。","B":"GH是前葉激素，受GHRH經門脈調控。","C":"正確：催產素是後葉激素，靠神經運送，不經門脈。","D":"LH是前葉激素，受GnRH經門脈調控。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"104100-N1-23":{"quick":"發炎/壓力會促進腎上腺糖皮質素（皮質醇）分泌，故選B。","detail":{"background":"糖皮質素（cortisol）是壓力激素，HPA軸在各種「壓力源」下被活化：感染、發炎、創傷、手術、低血糖、疼痛、情緒壓力等都會刺激下視丘CRH→垂體ACTH→腎上腺皮質醇分泌。皮質醇有強大抗發炎、免疫抑制、升血糖（糖質新生）、維持血壓等作用，是身體應對壓力的核心。發炎時的細胞激素（IL-1、IL-6、TNF）也直接刺激HPA軸。選項中「發炎」是典型促皮質醇分泌的刺激。退燒藥、血糖上升、排卵與促皮質醇分泌無直接關聯（血糖「下降」才促皮質醇）。","options":{"A":"退燒藥與皮質醇分泌無直接因果。","B":"正確：發炎是壓力源，促進皮質醇分泌。","C":"血糖「下降」才促皮質醇，上升不會。","D":"排卵與皮質醇分泌無直接關係。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"104100-N1-28":{"quick":"注入高張食鹽水使血漿滲透壓升高，刺激滲透壓感受器→ADH（抗利尿激素）分泌增加，故選D。","detail":{"background":"血漿滲透壓是調控ADH分泌最敏感的因子：下視丘滲透壓感受器偵測到血漿滲透壓上升（如靜脈注入高張NaCl），即刺激視上核/室旁核神經元，使後葉釋放ADH→集尿管水再吸收增加、尿液濃縮、保留水分以稀釋血漿、回復正常滲透壓；同時引發口渴。注入高張鹽水雖增加血容量，但滲透壓上升的訊號主導，使ADH「增加」。腎上腺素、生長激素、細胞激素與此急性滲透壓刺激無直接關係。","options":{"A":"腎上腺素非滲透壓調控激素。","B":"生長激素與急性滲透壓變化無關。","C":"細胞激素非此情境主角。","D":"正確：高張鹽水↑滲透壓，刺激ADH分泌增加。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"105030-N1-2":{"quick":"與骨骼生長發育及維持「較無關」者是腎上腺素，故選D。","detail":{"background":"影響骨骼的激素：①生長激素（GH/IGF-1）——促軟骨與骨骼線性生長；②副甲狀腺素（PTH）——調節骨鈣動員與重塑（過量致流失，間歇性可同化）；③降鈣素（calcitonin）——抑制蝕骨、降血鈣護骨；④雌激素——抑制骨吸收維持骨密度；甲狀腺素、維生素D、皮質醇亦影響骨代謝。腎上腺素（兒茶酚胺）主管「即時戰或逃」反應（心血管、代謝動員），與骨骼生長發育及維持「較無直接關聯」，故選D。","options":{"A":"生長激素促骨骼生長，相關。","B":"副甲狀腺素調節骨鈣，相關。","C":"降鈣素護骨降血鈣，相關。","D":"正確：腎上腺素與骨骼生長維持較無關。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"105030-N1-22":{"quick":"膽固醇的衍生物是類固醇激素，選項中為糖皮質激素（cortisol），故選D。","detail":{"background":"激素依化學結構分三類：①肽/蛋白類（胰島素、GH、ADH、PTH等，由胺基酸組成）；②胺類（兒茶酚胺腎上腺素、甲狀腺素，由酪胺酸衍生）；③類固醇類（皆由膽固醇衍生：腎上腺皮質的糖皮質素/礦物皮質素/雄性素、性腺的雌激素/睪固酮/黃體素、活化型維生素D）。題中「膽固醇衍生物」即類固醇，答案為糖皮質激素。腎上腺素、甲狀腺素源自酪胺酸，胰島素是肽類，皆非膽固醇衍生。","options":{"A":"腎上腺素由酪胺酸衍生。","B":"甲狀腺素由酪胺酸衍生。","C":"胰島素是肽類激素。","D":"正確：糖皮質激素為膽固醇衍生的類固醇。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"105030-N1-23":{"quick":"分泌持續增加會使骨質密度「降低」者是副甲狀腺素（PTH），故選A。","detail":{"background":"PTH持續（chronic, tonic）升高（如原發性副甲狀腺亢進）會優勢活化蝕骨細胞、淨骨吸收增加→骨質密度下降、囊狀纖維性骨炎。注意：PTH「間歇脈衝」給予（如teriparatide）反而促骨形成，但題指「持續增加」故為流失。對比：降鈣素抑制蝕骨（護骨）、雌激素抑制骨吸收（護骨），分泌增加皆使骨密度上升或維持；鹽皮質激素（醛固酮）與骨密度無直接主要關聯。故造成骨質密度降低者為PTH。","options":{"A":"正確：PTH持續升高造成骨質流失、骨密度降低。","B":"鹽皮質激素與骨密度無直接主要關係。","C":"降鈣素抑制蝕骨，護骨。","D":"雌激素抑制骨吸收，護骨。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"105090-N1-23":{"quick":"基礎代謝率顯著增高者為甲狀腺功能亢進患者，故選C。","detail":{"background":"基礎代謝率（BMR）受甲狀腺激素主導：甲亢（如Graves）時T3/T4過量，增加全身組織耗氧與產熱，BMR顯著上升，臨床見怕熱、體重減輕、心搏過速、手抖。甲狀腺功能低下則BMR下降（怕冷、體重增加、嗜睡）。副甲狀腺亢進影響血鈣非BMR，腎上腺功能低下（Addison）反而疲倦、代謝低下。故BMR顯著增高者為甲亢。","options":{"A":"甲低BMR下降。","B":"副甲狀腺亢進影響血鈣，非BMR。","C":"正確：甲亢BMR顯著增高。","D":"腎上腺功能低下代謝低下。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106030-N1-22":{"quick":"藉糖質新生（gluconeogenesis）升高血糖的是生長激素，故選B。","detail":{"background":"升血糖激素（counter-regulatory hormones）包括：升糖素（glucagon）、腎上腺素、皮質醇、生長激素。生長激素的代謝作用偏「抗胰島素」：促進脂肪分解（提供能量）、抑制組織攝取葡萄糖、並促進肝糖質新生，使血糖上升（過量如肢端肥大症可致糖尿病）。胰島素則是唯一降血糖激素（促葡萄糖攝取、肝糖合成、抑制糖質新生）。甲狀腺素影響整體代謝率，雄激素非主要血糖調控者。題選「藉糖質新生升血糖」最符生長激素（也符皮質醇，但選項中只有GH）。","options":{"A":"甲狀腺素影響代謝率，非以糖質新生升血糖為主。","B":"正確：生長激素抗胰島素、促糖質新生升血糖。","C":"胰島素降血糖（相反）。","D":"雄激素非主要血糖調控者。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106030-N1-23":{"quick":"抑制泌乳素分泌的是多巴胺（dopamine，即PIF），故選D。","detail":{"background":"泌乳素（prolactin）的調控特殊：以「抑制」為主——下視丘持續分泌多巴胺（dopamine，又稱泌乳素抑制因子PIF）經門脈到前葉，緊張抑制泌乳素分泌。故多巴胺（或其致效劑bromocriptine、cabergoline）可降泌乳素，臨床用於治療泌乳素瘤。相對地TRH可刺激泌乳素分泌；吸吮、懷孕、雌激素也促泌乳素。題問「抑制」者即多巴胺。","options":{"A":"TRH反而刺激泌乳素分泌。","B":"CRH與泌乳素抑制無關。","C":"GHRH作用於生長激素。","D":"正確：多巴胺（PIF）抑制泌乳素分泌。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106110-N1-23":{"quick":"自體免疫破壞「整個」腎上腺皮質，三層（糖皮質素、鹽皮質素、雄性素）皆受損；選項C「糖皮質激素與雄激素」皆屬皮質，正確，選C。","detail":{"background":"本題考腎上腺皮質三層產物與髓質產物的區分。皮質三層（GFR）：絲球帶→醛固酮（鹽皮質素）、束狀帶→皮質醇（糖皮質素）、網狀帶→雄性素（DHEA）。髓質→兒茶酚胺（腎上腺素/正腎上腺素）。若自體免疫破壞「所有腎上腺皮質組織」（如自體免疫性Addison disease），則糖皮質素、鹽皮質素、腎上腺雄性素三者生合成皆受影響，但「髓質」兒茶酚胺與「卵巢」雌激素不在皮質、不受影響。選項C「糖皮質激素與雄激素」兩者皆屬皮質產物，配對全對；A、B含腎上腺素（髓質）、D含雌激素（卵巢），皆混入非皮質產物故錯。","options":{"A":"去甲基腎上腺素屬髓質，非皮質。","B":"腎上腺素屬髓質，非皮質。","C":"正確：糖皮質激素與雄激素皆為皮質產物，皆受影響。","D":"雌激素主要來自卵巢，非腎上腺皮質。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106110-N1-24":{"quick":"分泌持續增加而使骨質密度「增加」者是降鈣素（calcitonin），故選A。","detail":{"background":"降鈣素由甲狀腺濾泡旁細胞（C細胞）分泌，作用與PTH相反：抑制蝕骨細胞活性、減少骨吸收、降低血鈣，淨效果偏向「保存／增加骨質」（藥用calcitonin可治骨質疏鬆與高血鈣）。對比：糖皮質激素過量→骨鬆（降密度）、甲狀腺素過量→骨流失、副甲狀腺素持續過高→骨流失。故分泌增加使骨密度上升者為降鈣素。","options":{"A":"正確：降鈣素抑制骨吸收，使骨密度增加。","B":"糖皮質激素過量造成骨鬆。","C":"甲狀腺素過量造成骨流失。","D":"副甲狀腺素持續過高造成骨流失。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106110-N1-29":{"quick":"直接調控腎集尿管對水通透性、能力最強者是血管加壓素（vasopressin, ADH），故選A。","detail":{"background":"抗利尿激素（ADH/vasopressin）作用於腎集尿管主細胞的V2受體→cAMP→促使水通道蛋白aquaporin-2（AQP2）插入管腔膜，直接增加集尿管對水的通透性，使水再吸收、尿液濃縮——這是「直接」調控集尿管水通透的關鍵激素，能力最強。腎素是酶（啟動RAAS）、血管張力素II主要促血管收縮與醛固酮分泌（醛固酮調鈉而非直接調水通透）、腎上腺皮質素調鈉。故答案為vasopressin。","options":{"A":"正確：vasopressin（ADH）經AQP2直接增加集尿管水通透性。","B":"腎素是酶，啟動RAAS，不直接調水通透。","C":"血管張力素II主促血管收縮與醛固酮分泌。","D":"腎上腺皮質素（醛固酮）調鈉再吸收，非直接調水通透。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106111-N1-2":{"quick":"錯誤敘述為A：褪黑激素由松果腺的「松果細胞（pinealocyte）」分泌，腦砂（brain sand）是鈣化沉積物，不分泌激素，故選A。","detail":{"background":"松果腺（pineal gland）由松果細胞合成分泌褪黑激素，調節晝夜節律與睡眠。腦砂（corpora arenacea / brain sand）是松果腺內隨年齡沉積的鈣磷礦化顆粒，可作為影像學中線標誌，但「不具分泌功能」——A敘述把分泌來源錯歸腦砂，故為錯誤選項。B：光照（經視網膜—視交叉上核—交感）會抑制褪黑激素，黑暗促分泌，正確。C：褪黑激素可緩解時差，正確。D：交感神經（正腎上腺素）刺激松果細胞分泌褪黑激素，正確。","options":{"A":"正確（為錯誤敘述）：褪黑激素由松果細胞分泌，非腦砂；腦砂是鈣化沉積。","B":"光照抑制褪黑激素分泌，敘述正確。","C":"褪黑激素可緩解時差，敘述正確。","D":"交感神經影響其分泌，敘述正確。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106111-N1-24":{"quick":"庫辛氏症候群（Cushing syndrome）是腎上腺糖皮質素（cortisol）分泌過多所致，故選C。","detail":{"background":"Cushing syndrome＝慢性糖皮質素（皮質醇）過量，可因外源類固醇、垂體ACTH瘤（Cushing disease）、腎上腺腫瘤或異位ACTH。典型表現：中央性肥胖、月亮臉、水牛肩、紫紋、皮膚變薄易瘀、高血糖、高血壓、骨質疏鬆、近端肌無力、免疫低下。對比：醛固酮過多→Conn syndrome（原發性醛固酮增多，高血壓低血鉀）；雄性素過多→女性多毛男性化。故庫辛氏對應糖皮質素過多。","options":{"A":"醛固酮過多是Conn症候群。","B":"動情素過多非庫辛氏。","C":"正確：糖皮質素過多造成庫辛氏症候群。","D":"雄性素過多造成男性化。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106111-N1-25":{"quick":"碘攝取不足時甲狀腺素低下，負回饋解除使甲狀腺刺激素（TSH）「升高」而非降低，故錯誤敘述為C，選C。","detail":{"background":"碘是合成甲狀腺素（T3/T4）的必需原料。碘不足→T4/T3合成分泌「不足」（A對）→甲狀腺功能下降（D對）→負回饋解除→垂體TSH「代償性升高」（C說TSH過低，錯）→持續高TSH刺激甲狀腺增生而「甲狀腺腫大（goiter）」（B對，即地方性甲狀腺腫）。故唯一錯誤是C「血中TSH過低」。這也是缺碘地區甲狀腺腫的機轉，補碘可預防。","options":{"A":"碘不足→甲狀腺素合成分泌不足，正確。","B":"高TSH刺激致甲狀腺腫大，正確。","C":"正確（為錯誤敘述）：TSH應「升高」而非過低。","D":"甲狀腺功能下降，正確。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106111-N1-26":{"quick":"更年期婦女「必有」的現象是雌激素（estrogen）下降，故選A。","detail":{"background":"更年期（menopause）是卵巢功能衰退、卵泡耗竭，卵巢分泌的雌激素與抑制素大幅下降——這是更年期的核心、必有的內分泌變化。雌激素下降造成熱潮紅、夜汗、陰道萎縮、骨質流失（停經後骨鬆）。因負回饋解除，垂體FSH與LH反而「升高」（FSH升高是診斷停經的指標），GnRH亦增加。故「必有下降」者為雌激素；FSH/LH/GnRH皆上升，不符題意。","options":{"A":"正確：更年期雌激素必下降。","B":"濾泡刺激素（FSH）反而升高。","C":"GnRH升高。","D":"黃體刺激素（LH）升高。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"107030-N1-23":{"quick":"ADH正確敘述為A：增加集尿管對水的通透度，故選A。","detail":{"background":"抗利尿激素（ADH/vasopressin）：①由下視丘視上核/室旁核「合成」，運送至腦下垂體「後葉」儲存釋放（B錯，後葉只釋放不合成）；②作用於腎「集尿管」主細胞V2受體，經AQP2增加對水通透度、促水再吸收、濃縮尿液（A正確、D錯——作用在集尿管非近曲小管）；③高濃度時作用於血管V1受體造成血管「收縮」、升血壓（C錯，不是血管鬆弛降壓，故名vasopressin）。缺乏ADH→尿崩症（大量稀釋尿）。故正確選A。","options":{"A":"正確：ADH增加集尿管對水的通透度。","B":"ADH由下視丘合成，後葉只儲存釋放。","C":"高濃度ADH使血管收縮、升血壓（非鬆弛降壓）。","D":"作用在集尿管，非近曲小管。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"107110-N1-2":{"quick":"催產素（oxytocin）是「後葉」分泌物，不屬前葉，故錯誤者選D。","detail":{"background":"腦下垂體前葉（腺垂體）分泌六大激素：生長激素（GH）、泌乳素（PRL）、促甲狀腺素（TSH）、促腎上腺皮質素（ACTH）、濾泡刺激素（FSH）、黃體生成素（LH）。後葉（神經垂體）釋放：催產素（oxytocin）與抗利尿激素（ADH）——這兩者由下視丘合成、後葉僅儲存釋放。題問前葉分泌物中的錯誤者，催產素屬後葉，故選D。TSH、ACTH、GH皆為前葉激素。","options":{"A":"TSH是前葉激素，正確。","B":"ACTH是前葉激素，正確。","C":"GH是前葉激素，正確。","D":"正確（為錯誤敘述）：催產素是後葉激素，非前葉。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"107110-N1-23":{"quick":"抑制GH分泌者為體介素（somatomedin，即IGF-1）的負回饋，故選D。","detail":{"background":"生長激素（GH）分泌調控：下視丘GHRH「促進」、體抑素（somatostatin）「抑制」。促GH分泌的生理因子有低血糖、運動、壓力、深睡、飢餓、高蛋白餐（A、B、C皆促進）。GH作用於肝產生體介素（somatomedin C＝IGF-1），IGF-1會負回饋抑制下視丘GHRH與垂體GH（並刺激體抑素），故IGF-1「抑制」GH分泌——D為正確答案。高血糖、游離脂肪酸升高、皮質醇、肥胖也抑制GH。","options":{"A":"低血糖促進GH分泌。","B":"運動促進GH分泌。","C":"壓力促進GH分泌。","D":"正確：體介素（IGF-1）負回饋抑制GH分泌。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"108020-N1-24":{"quick":"腎上腺素（交感）直接造成的反應是唾液分泌減少，故選B。","detail":{"background":"腎上腺素模擬交感「戰或逃」：①瞳孔放大（散瞳）、睫狀肌「鬆弛」（看遠，非收縮，A錯）；②唾液腺——交感使唾液「黏稠且量少」，相對副交感的大量稀薄唾液，故交感興奮時口乾、唾液分泌「減少」（B正確）；③肝臟——腎上腺素促肝醣「分解」（glycogenolysis）升血糖，非合成（C錯）；④心臟——β1受體使心收縮力「增強」、心率加快（D錯，非降低）。故唯一正確為唾液分泌減少。","options":{"A":"交感使睫狀肌鬆弛（看遠），非收縮。","B":"正確：交感興奮唾液分泌減少（口乾）。","C":"腎上腺素促肝醣分解，非合成。","D":"腎上腺素增強心收縮力，非降低。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"108020-N1-27":{"quick":"高蛋白低醣飲食刺激胰島素分泌卻不致低血糖，因胺基酸同時刺激升糖素（glucagon）分泌以維持血糖，故選B。","detail":{"background":"進食蛋白質時，胺基酸（如精胺酸、白胺酸）同時刺激胰島β細胞分泌胰島素「與」α細胞分泌升糖素（glucagon）。若只升胰島素而無醣類攝取，可能造成低血糖；但伴隨的升糖素促進肝糖分解與糖質新生，維持血糖穩定，避免低血糖。這是蛋白餐的雙激素調控設計。對比醣類餐則主要刺激胰島素、抑制升糖素。故答案為「同時刺激升糖素分泌」。","options":{"A":"血漿胺基酸不會快速大量轉成葡萄糖防低血糖。","B":"正確：胺基酸同時刺激升糖素分泌，維持血糖。","C":"胺基酸不抑制胰島素與受體結合。","D":"葡萄糖仍可被細胞利用。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"108020-N1-28":{"quick":"決定女性（而非男性）第二性徵發育的酵素是芳香環轉化酶（aromatase），它把雄性素轉為雌激素，故選B。","detail":{"background":"類固醇生合成路徑由膽固醇起：膽固醇碳鏈裂解酶（desmolase/CYP11A1）是共同起始步驟；分支酵素決定產物。芳香環轉化酶（aromatase, CYP19）把雄性素（睪固酮/雄烯二酮）「芳香化」轉為雌激素（estradiol/estrone），是雌激素生成關鍵→決定女性第二性徵。5α-還原酶把睪固酮轉為更強的DHT，決定男性外生殖器與第二性徵（缺乏致男性假陰陽人）。醛固酮合成酶管礦物皮質素。故「女性而非男性」第二性徵發育的關鍵酶是aromatase。","options":{"A":"碳鏈裂解酶是共同起始步驟，無男女專一性。","B":"正確：芳香環轉化酶生成雌激素，決定女性第二性徵。","C":"5α-還原酶生成DHT，決定男性第二性徵。","D":"醛固酮合成酶管礦物皮質素。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"108110-N1-23":{"quick":"分泌後可被轉變為「更具活性」形式的是睪固酮（轉為更強的DHT或雌二醇），故選D。","detail":{"background":"部分激素是「前激素（prohormone）」，分泌後在標的組織被酵素轉成更具活性形式：①睪固酮（testosterone）→經5α-還原酶轉為活性更強的DHT（在攝護腺、毛囊、外生殖器），或經aromatase轉為雌二醇——故睪固酮分泌後可活化，D正確。②T4→在周邊去碘轉為活性T3（這也是活化），但題給選項中rT3（reverse T3）是「無活性」產物，A的T3雖是活性形式但題比較的是「分泌後再活化」。對照：rT3無活性、血管張力素II已是活性形式。最符合「分泌後轉為更具活性」者為睪固酮。","options":{"A":"T3本身已是活性形式（由T4活化而來），非「分泌後再活化」最佳答案。","B":"reverse T3（rT3）是無活性產物。","C":"血管張力素II已是活性形式。","D":"正確：睪固酮分泌後可轉為更強的DHT或雌二醇。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"108110-N1-24":{"quick":"低血鈣、高血磷、低尿磷且打PTH後尿cAMP上升→腎臟對PTH「有反應」，問題在副甲狀腺分泌不足，故為「原發性副甲狀腺機能低下」，選C。","detail":{"background":"本題鑑別假性副甲狀腺低下（PTH受體缺陷）vs真正副甲狀腺低下：PTH作用於腎小管經G蛋白→cAMP→排磷、增鈣再吸收。低血鈣高血磷代表PTH作用不足。注射外源PTH後若「尿cAMP上升」表示腎臟對PTH有正常反應（受體與訊號完好）——故問題在「副甲狀腺本身分泌PTH不足」＝原發性（primary）副甲狀腺機能低下。若假性副甲狀腺低下（Albright，PTH受體/Gs缺陷），打PTH後尿cAMP「不會」上升。次發性低下指因高血鈣等回饋抑制。故選C原發性副甲狀腺機能低下。","options":{"A":"機能亢進會高血鈣，與本題低血鈣相反。","B":"次發性亢進亦不符低血鈣。","C":"正確：腎對PTH有反應（尿cAMP升），問題在腺體分泌不足＝原發性低下。","D":"次發性低下非此情境最佳描述。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"108110-N1-26":{"quick":"懷孕時抑制乳汁製造的是高濃度雌激素與黃體素，故選D。","detail":{"background":"懷孕期胎盤分泌大量雌激素與黃體素，促進乳腺腺體增生發育（為泌乳作準備），但同時「抑制泌乳素對乳腺的泌乳作用」，故懷孕中雖泌乳素升高卻不大量泌乳。分娩後胎盤娩出，雌激素與黃體素驟降，解除抑制，泌乳素得以啟動真正泌乳。故懷孕時抑制乳汁製造者為高雌激素與黃體素（D）。A、B說泌乳素或hPL過低不符（孕期泌乳素其實升高）；C多巴胺抑制泌乳素合成雖存在但非孕期不泌乳的主因。","options":{"A":"孕期泌乳素其實升高，非過低。","B":"人類胎盤泌乳素孕期升高，非過低。","C":"多巴胺抑制非孕期不泌乳主因。","D":"正確：高雌激素與黃體素抑制泌乳，分娩後驟降才啟動泌乳。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"109030-N1-23":{"quick":"甲狀腺素不足時代謝率下降，最可能出現心輸出量降低，故選D。","detail":{"background":"甲狀腺功能低下（hypothyroidism）使全身代謝率下降、產熱減少、組織耗氧減少，心血管表現為心率減慢、心收縮力與心輸出量「降低」（D正確）。其他症狀：怕冷（對冷耐受不足、對熱耐受佳，故A「對熱耐受不足」相反，錯）；醣類與蛋白質「異化（分解）」作用「降低」而非提升（B、C說提升，皆相反——甲低時代謝全面減緩）。故唯一正確為心輸出量降低。","options":{"A":"甲低怕冷、對熱耐受佳，故「對熱耐受不足」相反。","B":"甲低時醣類異化作用降低，非提升。","C":"甲低時蛋白質同化/異化皆減緩，非提升。","D":"正確：甲低使心輸出量降低。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"109030-N1-32":{"quick":"葛瑞夫氏症（Graves）甲狀腺刺激抗體使T3/T4過量，負回饋抑制使TSH「下降」，故選B。","detail":{"background":"Graves disease是自體免疫性甲亢，產生TSH受體刺激性抗體（TSI/TRAb）持續刺激甲狀腺，造成T4、T3過量分泌（A、C、D相關產物皆升高），高甲狀腺素經負回饋強烈抑制垂體TSH分泌，故血中TSH「降低甚至測不到」——這是甲亢的診斷特徵（高T4/T3、低TSH）。題問濃度「下降」者即TSH。雙碘酪胺酸（DIT）是甲狀腺素合成中間產物，甲亢時合成活躍亦不會下降。","options":{"A":"Graves的T4升高。","B":"正確：高T4/T3負回饋使TSH下降。","C":"DIT為合成中間產物，甲亢時不下降。","D":"T3升高。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"109110-N1-24":{"quick":"愛迪生氏症（Addison disease）腎上腺皮質受損、皮質醇低下，負回饋解除使ACTH大量分泌，故選A。","detail":{"background":"Addison disease＝原發性腎上腺皮質功能不足（自體免疫、結核等破壞皮質），皮質醇與醛固酮低下。皮質醇低下使下視丘CRH與垂體ACTH「代償性大量分泌」——高ACTH的前驅物POMC也產生MSH樣作用，造成皮膚色素沉著（古銅色），是Addison的特徵。對比：外源糖皮質素治療會「抑制」ACTH（B錯）；原發性腎上腺增生若自主分泌皮質醇會抑制ACTH（C錯）；血管張力素II過多影響醛固酮非ACTH（D錯）。故ACTH大量分泌者為Addison。","options":{"A":"正確：Addison皮質醇低下，負回饋解除，ACTH大量分泌。","B":"外源糖皮質素抑制ACTH。","C":"皮質自主增生會抑制ACTH。","D":"血管張力素II影響醛固酮，非ACTH。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"109110-N1-25":{"quick":"最可能「抑制個體生長」的是皮質醇（cortisol），故選A。","detail":{"background":"糖皮質素（cortisol）過量會抑制生長：①抑制生長激素分泌與IGF-1作用；②促進蛋白質分解（負氮平衡）、抑制骨骼生長板的軟骨增生與骨形成；③抑制腸鈣吸收、促鈣流失。臨床上長期使用類固醇或庫辛氏症的兒童會生長遲滯。對比：體介素（IGF-1）、甲狀腺素、胰島素皆「促進」生長（IGF-1直接促骨生長、甲狀腺素促CNS與骨成熟、胰島素是合成代謝激素）。故抑制生長者為皮質醇。","options":{"A":"正確：皮質醇抑制GH/IGF-1、促蛋白分解，抑制生長。","B":"體介素（IGF-1）促進骨骼生長。","C":"甲狀腺素促生長與成熟。","D":"胰島素是合成代謝激素，促生長。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"110030-N1-27":{"quick":"體抑素（somatostatin）最主要抑制生長激素（GH）分泌，故選B。","detail":{"background":"體抑素（somatostatin, GHIH）由下視丘（及胰島δ細胞、腸道）分泌，是廣泛的「抑制性」激素：在下視丘主要抑制垂體生長激素（GH）分泌（與GHRH拮抗，共同調控GH脈衝）；也抑制TSH分泌；在胰島抑制胰島素與升糖素分泌；在腸道抑制多種消化道激素與分泌。題問「最主要」抑制者，標準答案為生長激素（GH）。藥物octreotide（體抑素類似物）即用於肢端肥大症（降GH）與類癌。","options":{"A":"體抑素對T4非主要抑制標的。","B":"正確：體抑素最主要抑制生長激素分泌。","C":"催產素非體抑素調控標的。","D":"泌乳素受多巴胺抑制，非體抑素主要標的。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"110110-N1-23":{"quick":"褪黑激素由腦部「上視丘（epithalamus）」的松果腺分泌，故選B。","detail":{"background":"松果腺（pineal gland）位於間腦的「上視丘（epithalamus）」背側、第三腦室後上方，分泌褪黑激素調節晝夜節律。題目考解剖定位：下視丘（hypothalamus）控制自主與內分泌但不含松果腺、視丘（thalamus）是感覺中繼、前額葉皮質是高級認知。故松果腺所屬區域為上視丘（epithalamus）。","options":{"A":"下視丘不含松果腺。","B":"正確：松果腺位於上視丘（epithalamus）。","C":"視丘是感覺中繼站。","D":"前額葉皮質與松果腺無關。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"110110-N1-24":{"quick":"最可能造成血管平滑肌收縮的是抗利尿激素（ADH/vasopressin），故選C。","detail":{"background":"ADH別名vasopressin（血管加壓素）：高濃度時作用於血管平滑肌V1受體（Gq→IP3/Ca）造成血管「收縮」、升血壓，是失血/休克時維持血壓的機制之一。對比選項：醛固酮（aldosterone）調節腎鈉再吸收（間接影響血量）非直接收縮血管；副甲狀腺素（PTH）調血鈣；多巴胺在低劑量反而擴張腎血管。故直接收縮血管平滑肌者為ADH。（血管張力素II也強力收縮血管，但不在選項。）","options":{"A":"醛固酮調鈉，非直接收縮血管。","B":"PTH調血鈣。","C":"正確：ADH（vasopressin）V1受體收縮血管平滑肌。","D":"多巴胺低劑量擴張腎血管。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"110110-N1-25":{"quick":"甲狀腺素合成的第一步是酪胺酸（tyrosine）的碘化，故選A。","detail":{"background":"甲狀腺素合成步驟：①碘的攝取（Na-I共輸送體把碘運入濾泡細胞）與「氧化」（過氧化酶把I⁻氧化）；②「碘化（organification）」——把氧化的碘接到甲狀腺球蛋白上的酪胺酸殘基，形成MIT、DIT，這是把酪胺酸碘化的步驟；③耦合——MIT+DIT→T3、DIT+DIT→T4；④胞飲與蛋白水解釋出T3/T4；⑤周邊T4去碘為T3。題問「合成的第一個步驟」中，把酪胺酸碘化（A）是形成激素骨架的起始。選項B（T4→T3）是周邊活化、C是耦合（較後步驟）、D敘述方向錯（是I⁻被氧化而非I2轉I⁻）。故選A。","options":{"A":"正確：酪胺酸的碘化是形成甲狀腺素骨架的早期關鍵步驟。","B":"T4轉T3是周邊活化，較後步驟。","C":"MIT+DIT耦合是後續步驟。","D":"是碘離子被氧化，方向敘述有誤。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"111030-N1-21":{"quick":"協助維生素D轉為活性骨化三醇（calcitriol）的是副甲狀腺素（PTH），故選A。","detail":{"background":"維生素D活化兩步羥化：皮膚/飲食的維生素D₃→肝臟25-羥化→25(OH)D（calcidiol）→腎臟近曲小管「1-α羥化酶」→1,25(OH)₂D（calcitriol，活性型）。腎臟1-α羥化酶的活性受「副甲狀腺素（PTH）」刺激上調（低血鈣→PTH↑→促活化維生素D→增腸鈣吸收）；低血磷與FGF23也調控。降鈣素、ADH、胰島素與此活化無直接關係。故協助轉為calcitriol者為PTH。","options":{"A":"正確：PTH刺激腎1-α羥化酶，促維生素D活化為calcitriol。","B":"降鈣素與維生素D活化無此作用。","C":"ADH調水，與維生素D活化無關。","D":"胰島素與維生素D活化無直接關係。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"111030-N1-30":{"quick":"懷孕過程中「不會大量增加」者是催產素（oxytocin），故選B。","detail":{"background":"懷孕期大量增加的激素：人類胎盤泌乳素（hPL）、雌激素、黃體素（progesterone）、人類絨毛膜促性腺激素（hCG，早孕高峰）、泌乳素等，由胎盤與母體腺體分泌以維持妊娠與準備泌乳。催產素（oxytocin）在懷孕「過程」中維持低濃度（受高黃體素抑制子宮收縮），直到「分娩時」才因子宮頸牽張（Ferguson反射）與雌/黃體素比值改變而大量釋放促進子宮收縮與產程，並在哺乳時射乳。故懷孕「過程中」不會大量增加者為催產素。","options":{"A":"hPL懷孕時大量增加。","B":"正確：催產素懷孕過程不大量增加，分娩時才大量釋放。","C":"雌激素懷孕時大量增加。","D":"泌乳素懷孕時增加。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"111110-N1-20":{"quick":"口渴時腎小管增加水再吸收的機轉是增加抗利尿激素（ADH）分泌，故選C。","detail":{"background":"口渴與脫水反映體液不足/滲透壓升高，下視丘滲透壓感受器與容積感受器啟動：①增加ADH分泌→集尿管AQP2↑→水再吸收↑、尿濃縮（C正確）；同時②刺激口渴中樞促飲水。選項A、B（抑制醛固酮、抑制血管收縮素）方向相反——脫水時RAAS反而「活化」（腎素、血管張力素、醛固酮上升保鈉保水）；D（降低水通道蛋白量）與增加水再吸收相反。故正確機轉為增加ADH分泌。","options":{"A":"脫水時醛固酮活化而非抑制。","B":"脫水時血管收縮素（RAAS）活化。","C":"正確：增加ADH分泌促集尿管水再吸收。","D":"增加水再吸收需更多水通道蛋白，非降低。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"112030-N1-12":{"quick":"升糖素（glucagon）刺激「肝臟」進行肝糖分解升血糖，故選A。","detail":{"background":"升糖素由胰島α細胞分泌，是升血糖激素，主要作用於「肝臟」：①促肝糖分解（glycogenolysis）釋放葡萄糖；②促肝糖質新生；③促脂肪分解與生酮。重點：肝臟有葡萄糖-6-磷酸酶可把葡萄糖釋入血液，肌肉「沒有」此酶，且肌肉細胞缺乏升糖素受體，故升糖素不作用於肌肉（肌糖分解只供肌肉自用）。腎臟與脂肪非升糖素肝糖分解的標的。故答案為肝臟。","options":{"A":"正確：升糖素刺激肝臟肝糖分解升血糖。","B":"肌肉缺升糖素受體，不受升糖素肝糖分解調控。","C":"腎臟非升糖素肝糖分解標的。","D":"脂肪組織無肝糖分解。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"112110-N1-14":{"quick":"生長激素「減少」胰島素受體數目（抗胰島素效應），故選B。","detail":{"background":"生長激素具「抗胰島素（diabetogenic）」作用：減少組織胰島素受體數目／降低受體後訊號、抑制周邊組織葡萄糖攝取與利用、促進脂肪分解與肝糖質新生，使血糖升高。長期GH過量（肢端肥大症）會造成胰島素阻抗甚至次發性糖尿病。故GH對胰島素代謝的影響是「減少胰島素受體數目」（B）。並非增加受體數或親和力。","options":{"A":"GH減少而非增加胰島素受體。","B":"正確：生長激素減少胰島素受體數目（抗胰島素）。","C":"GH不增加受體親和力。","D":"題意主答為「數目」減少。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"112110-N1-20":{"quick":"腸泌素（incretin）在血糖未升高前即「預先」促進胰島素分泌，屬前饋（feedforward）調節，故選C。","detail":{"background":"腸泌素（incretin，如GLP-1、GIP）由腸道內分泌細胞於進食後、葡萄糖被吸收入血「之前」即分泌，預先刺激胰島β細胞分泌胰島素——這種「在刺激（血糖上升）尚未出現前就預作反應」的機制屬「前饋（feedforward）調節」，使口服葡萄糖比靜脈注射相同葡萄糖引發更多胰島素（incretin effect）。相對地，血糖直接刺激胰島素是負回饋式的回應。故腸泌素對胰島素的調控屬前饋。","options":{"A":"正回饋指增強原刺激，非此機制。","B":"負回饋是事後回應，非腸泌素「預先」特性。","C":"正確：腸泌素為前饋（feedforward）調節，預先促胰島素分泌。","D":"反射非此內分泌機制描述。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"112180-N1-12":{"quick":"激素正確敘述為C：藉專一性接受器調節標的細胞功能，故選C。","detail":{"background":"激素的基本特性：①由「內分泌腺（無導管）」直接分泌入血液（A錯，非外分泌腺；外分泌腺有導管分泌到體表/管腔）；②主要由「血液循環」運送到標的細胞（B錯，非淋巴循環為主）；③必須與標的細胞上的「專一性接受器（receptor）」結合才能作用，沒有受體的細胞不受影響——這是激素作用專一性的基礎（C正確）；④大多以「負回饋」維持濃度恆定（D錯，少數如排卵前LH激增、分娩催產素為正回饋）。故正確為C。","options":{"A":"激素由內分泌腺（無導管）分泌，非外分泌腺。","B":"激素主要由血液循環運送，非淋巴。","C":"正確：激素藉專一性接受器調節標的細胞。","D":"激素多以負回饋調節，正回饋為少數。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"112180-N1-16":{"quick":"最有利於增加骨質密度者是1,25-(OH)₂D（活性維生素D）濃度上升，故選D。","detail":{"background":"維生素D活性型1,25-(OH)₂D促進腸道鈣磷吸收、提供骨礦化原料，整體有利骨質維持與增加。逐項分析：A皮質醇上升→骨鬆（不利）；B雌激素「下降」→骨吸收增加、骨流失（不利，停經後骨鬆）；C降鈣素「下降」→失去抑制蝕骨保護（不利）；D活性維生素D上升→增腸鈣吸收、利骨礦化（有利）。故最有利增加骨密度者為D。（注意：要選「上升才有利」的因子，雌激素與降鈣素需「上升」才護骨，題給的是它們「下降」故不利。）","options":{"A":"皮質醇上升造成骨鬆，不利。","B":"雌激素下降造成骨流失，不利。","C":"降鈣素下降失去護骨作用，不利。","D":"正確：活性維生素D上升促鈣吸收、利骨密度。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"112180-N1-17":{"quick":"人類胚胎時期性激素分泌量比青春期前「較高」，故選A。","detail":{"background":"性激素分泌呈現雙峰：①胚胎/胎兒期——受母體hCG與胎兒自身性腺刺激，性激素（睪固酮等）一度升高以完成生殖器官的性別分化；②出生後至青春期前（兒童期）——下視丘GnRH脈衝被抑制，性腺相對靜止，性激素濃度「低」；③青春期——GnRH脈衝重新啟動，性激素再度上升。故比較「胚胎時期 vs 青春期前」，胚胎時期較高（A正確）。這解釋了胎兒期性別分化需要的激素環境。","options":{"A":"正確：胚胎時期性激素較青春期前高。","B":"青春期前性腺靜止，濃度低。","C":"兩者不相等。","D":"非個體間無一致性。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"113030-N1-11":{"quick":"作用與副甲狀腺素（PTH）相反者是甲狀腺濾泡旁細胞（C細胞）分泌的降鈣素，故選B。","detail":{"background":"血鈣調控的兩大拮抗激素：PTH（升血鈣：動員骨鈣、增腎鈣再吸收、活化維生素D）與降鈣素（calcitonin，降血鈣：抑制蝕骨、促鈣沉積）。降鈣素由「甲狀腺的濾泡旁細胞（parafollicular cell / C細胞）」分泌——故與PTH作用相反的細胞是甲狀腺C細胞（B）。甲狀腺濾泡細胞分泌T3/T4（A，與血鈣無關）；腎上腺束狀帶分泌皮質醇（C）、網狀帶分泌雄性素（D），皆非血鈣拮抗。故選B。","options":{"A":"濾泡細胞分泌甲狀腺素，與血鈣調控無關。","B":"正確：濾泡旁細胞（C細胞）分泌降鈣素，作用與PTH相反。","C":"束狀帶分泌皮質醇。","D":"網狀帶分泌雄性素。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"113030-N1-5":{"quick":"最可能促進生長激素分泌者是高強度運動，故選B。","detail":{"background":"促進GH分泌的生理刺激：低血糖、飢餓、高強度運動、深睡（慢波睡眠）、壓力、創傷、某些胺基酸（精胺酸）、ghrelin、GHRH。抑制GH者：高血糖、游離脂肪酸升高、體抑素、IGF-1負回饋、皮質醇、肥胖。逐項：A高血糖→抑制GH；B高強度運動→強力促GH（運動是常見刺激）；C體抑素→抑制GH；D IGF-1→負回饋抑制GH。故促進者為高強度運動（B）。","options":{"A":"高血糖抑制GH分泌。","B":"正確：高強度運動促進GH分泌。","C":"體抑素抑制GH。","D":"IGF-1負回饋抑制GH。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"113100-N1-14":{"quick":"對血糖濃度影響「最小」者是醛固酮（aldosterone），故選A。","detail":{"background":"血糖調控激素：胰島素（降糖）與升糖素、腎上腺素、皮質醇、生長激素、甲狀腺素（升糖/影響糖代謝）。逐項：B皮質醇→促糖質新生升血糖；C甲狀腺素→影響葡萄糖吸收與代謝、升糖；D腎上腺素→促肝糖分解、抑胰島素，升血糖。醛固酮（aldosterone）是礦物皮質素，主管腎臟鈉鉀水電解質平衡與血壓，「對血糖濃度影響最小」（A）。故選A。","options":{"A":"正確：醛固酮主管電解質，對血糖影響最小。","B":"皮質醇促糖質新生升血糖。","C":"甲狀腺素影響糖代謝。","D":"腎上腺素促肝糖分解升血糖。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"113100-N1-15":{"quick":"最主要透過IP₃與鈣離子（Ca²⁺）執行功能的是性釋素（GnRH），故選D。","detail":{"background":"激素的第二傳訊者系統：①Gq-PLC-IP₃/DAG-Ca²⁺路徑——許多肽類激素如GnRH、TRH、ADH（V1）、催產素、血管張力素II採用，配體結合GPCR活化磷脂酶C，產生IP₃釋放細胞內鈣。②cAMP路徑——如ACTH、TSH、PTH、升糖素、ADH(V2)、β腎上腺素。③核受體（基因轉錄）——類固醇（皮質醇、雌激素）、甲狀腺素。④受體酪胺酸激酶——胰島素、IGF。題中：皮質醇與雌激素走核受體、胰島素走RTK，唯GnRH走Gq-IP₃-Ca²⁺路徑（D正確）。","options":{"A":"皮質醇走細胞內核受體（基因轉錄）。","B":"胰島素走受體酪胺酸激酶。","C":"雌激素走核受體。","D":"正確：GnRH經Gq-PLC-IP₃-Ca²⁺執行功能。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"113100-N1-17":{"quick":"使動脈壓上升的是血管收縮素II（angiotensin II）分泌增加，故選C。","detail":{"background":"RAAS與利鈉系統的血壓調控：①血管張力素II（angiotensin II）→強力收縮血管、刺激醛固酮、促ADH與口渴、促近曲小管鈉再吸收→升血壓（C正確）。其餘選項皆「降壓」方向：A醛固酮分泌「降低」→排鈉排水→血量降→降壓；B腎臟鹽和水保留「降低」→降血量→降壓；D心房利鈉胜肽（ANP）分泌「增加」→促排鈉排水、舒張血管→降壓。故唯一升動脈壓者為血管收縮素II增加。","options":{"A":"醛固酮降低→排鈉降壓。","B":"鹽水保留降低→降壓。","C":"正確：血管收縮素II增加→升動脈壓。","D":"ANP增加→排鈉降壓。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"113180-N1-14":{"quick":"促進脂質分解、增加血中脂肪酸效果最強者是生長激素，故選B。","detail":{"background":"脂肪分解（lipolysis）相關激素：腎上腺素/正腎上腺素、升糖素、皮質醇、生長激素皆促脂解（升游離脂肪酸）；胰島素則「抑制」脂解、促脂肪合成（A錯，方向相反）。題給選項中：礦物皮質素（醛固酮）主管電解質非脂解；升糖激素促脂解但主作用在肝糖；生長激素是強力的脂解促進者（GH使脂肪分解供能、保留葡萄糖，肢端肥大症常見游離脂肪酸升高）。題答「效果最強」取生長激素（B）。","options":{"A":"胰島素抑制脂解、促脂肪合成。","B":"正確：生長激素強力促脂解，升游離脂肪酸。","C":"礦物皮質素主管電解質，非脂解。","D":"升糖激素促脂解但主作用在肝糖。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"114030-N1-4":{"quick":"錯誤敘述為C：褪黑激素夜間睡眠時濃度「最高」而非最低，故選C。","detail":{"background":"褪黑激素由松果腺分泌，受光照調控：白天光照經視網膜—視交叉上核—交感路徑「抑制」其分泌，故白天濃度低；夜晚黑暗時分泌增加，「夜間/睡眠時濃度最高」，調節晝夜節律與促進睡眠。C說「夜晚睡眠時濃度最低」與事實相反，為錯誤。其餘正確：A松果腺分泌（對）；B血清素（serotonin）為前驅物（對）；D可緩解時差不適（對）。故錯誤選C。","options":{"A":"松果腺分泌褪黑激素，正確。","B":"血清素為其前驅物，正確。","C":"正確（為錯誤敘述）：夜間睡眠時濃度應「最高」而非最低。","D":"可治療時差不適，正確。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"114170-N1-13":{"quick":"脂肪組織促脂肪分解最相關的是腎上腺素β3受體，故選D。","detail":{"background":"脂肪細胞的脂肪分解主要由交感/腎上腺素經「β腎上腺素受體（Gs-cAMP-PKA-激素敏感性脂解酶HSL）」驅動。白色與棕色脂肪組織上脂解最相關的是「β3受體（adrenergic β3 receptor）」——β3致效劑可促脂解與棕色脂肪產熱（治肥胖/代謝研究熱點，β3也用於膀胱過動症mirabegron）。β1主要在心臟、β2在血管/支氣管平滑肌、α1促血管收縮。故脂肪分解最相關者為β3受體（D）。","options":{"A":"α1受體促血管收縮，非脂肪分解主角。","B":"β1主要在心臟。","C":"β2主要在支氣管/血管平滑肌。","D":"正確：β3受體在脂肪組織，促脂肪分解。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"114170-N1-15":{"quick":"正確者為A：甲狀腺主要分泌的激素以T4為主，故選A。","detail":{"background":"T4 vs T3比較：①甲狀腺「分泌量」以T4（thyroxine）為主，約佔90%（A正確）；②但「生物活性」T3較T4強約3–5倍（D錯，T4活性較T3低）；③血中大部分T3來自周邊組織把T4去碘活化，故T3是主要的活性形式（B說「運輸以T3為主」錯，血中總量仍以T4高，且多與TBG結合）；④「半衰期」T4較長（約7天）、T3較短（約1天）——因T4與結合蛋白親和力高、清除慢（C說「T4半衰期較T3短」錯，相反）。故正確為A。","options":{"A":"正確：甲狀腺主要分泌激素以T4為主。","B":"血中總量以T4為主，非T3。","C":"T4半衰期較T3長（非短）。","D":"T4生物活性較T3低（非高）。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"114170-N1-16":{"quick":"睪丸內與睪固酮結合的蛋白是雄性素結合蛋白（androgen-binding protein, ABP），故選B。","detail":{"background":"雄性素結合蛋白（ABP）由睪丸Sertoli細胞分泌（受FSH與睪固酮刺激），在生精小管與附睪管腔內「結合並維持高濃度睪固酮」，提供精子生成所需的局部高雄性素環境。對比：白蛋白與性激素結合球蛋白（SHBG）、皮質類固醇結合球蛋白（CBG）是「血液中」運送結合蛋白（SHBG結合睪固酮/雌二醇於血漿、CBG結合皮質醇），而非睪丸局部。題問「睪丸內」與睪固酮結合者，故為ABP（B）。","options":{"A":"白蛋白是血漿非專一結合蛋白，非睪丸內專責。","B":"正確：ABP由Sertoli細胞分泌，睪丸內結合睪固酮。","C":"SHBG在血液中結合性激素。","D":"CBG在血液中結合皮質醇。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"115030-N1-7":{"quick":"PTH作用於腎小管時刺激「遠曲小管對鈣離子的再吸收」，故選A。","detail":{"background":"副甲狀腺素（PTH）對腎小管的作用：①促「遠曲小管」鈣再吸收增加（保鈣升血鈣，A正確）；②抑制「近曲小管」磷酸鹽再吸收→排磷（降血磷，故B「促近曲小管磷再吸收」相反，錯）；③PTH經Gs-cAMP路徑作用，尿中cAMP「增加」是PTH作用的標誌（D說降低cAMP錯）；④受體數目受調節但非PTH作用即「增加受體」（C非主要作用）。故正確為A：刺激遠曲小管鈣再吸收。","options":{"A":"正確：PTH刺激遠曲小管鈣再吸收。","B":"PTH抑制近曲小管磷再吸收（排磷），非促進。","C":"非PTH的直接作用。","D":"PTH經cAMP作用，尿cAMP增加而非降低。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"115030-N1-8":{"quick":"最可能造成妊娠糖尿病者是人類胎盤泌乳素（hPL），故選B。","detail":{"background":"妊娠糖尿病（GDM）與胎盤分泌的「抗胰島素激素」有關，其中人類胎盤泌乳素（human placental lactogen, hPL/hCS）是關鍵——隨胎盤長大而大量分泌，促進母體脂肪分解、降低母體對胰島素的敏感度（胰島素阻抗），使更多葡萄糖保留供胎兒利用；若母體胰島β細胞代償不足即出現GDM。其他胎盤抗胰島素因子還有皮質醇、黃體素、雌激素等，但hPL最具代表性。hCG主管維持黃體、黃體素安胎、催產素促宮縮，皆非主要致糖尿病者。","options":{"A":"hCG維持黃體，非主要致GDM。","B":"正確：hPL造成胰島素阻抗，是妊娠糖尿病主因。","C":"黃體素安胎為主，非GDM代表激素。","D":"催產素促宮縮，與GDM無關。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"101030-N1-18":{"quick":"快速動眼（REM）睡眠腦波是「去同步化、低振幅快波」（似清醒），不是慢波，故錯誤敘述為D。","detail":{"background":"睡眠分非快速動眼（NREM，分N1-N3，N3為慢波睡眠δ波）與快速動眼（REM）兩大類。REM特徵：①腦波呈低振幅快波（去同步化，類似清醒β波），故又稱「弔詭睡眠」（D說呈慢波，錯）；②全身骨骼肌張力幾乎完全消失（肌肉麻痺），故四肢活動極少（A對）；③自主神經不穩定，心率血壓呼吸不規則、血壓上升（B對）；④是作夢的主要階段；⑤男性常見陰莖勃起（C對）。故唯一錯誤是D「腦波呈慢波」——慢波是NREM-N3的特徵。","options":{"A":"REM時肌張力消失，四肢活動極少，正確。","B":"REM自主神經不穩，血壓上升或不規則，正確。","C":"REM常出現陰莖勃起，正確。","D":"正確（為錯誤敘述）：REM腦波為低振幅快波，非慢波。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"101030-N1-19":{"quick":"痛覺初級感覺神經傳入脊髓「後角（背角）」而非前角，故錯誤敘述為B。","detail":{"background":"痛覺傳導路徑（外側脊髓視丘徑）：①周邊痛覺受器（游離神經末梢）由「Aδ纖維（快痛、銳痛）與C纖維（慢痛、鈍痛）」傳導（A對）；②初級感覺神經元（細胞體在背根神經節）將訊號傳入脊髓「後角（dorsal horn）」而非前角（B錯——前角是運動神經元所在）；③在後角換次級神經元，軸突「於脊髓交叉到對側」（C對）；④沿「外側脊髓視丘路徑（lateral spinothalamic tract）」上行至視丘再到皮質感覺區（D對）。故錯誤在B「傳入脊髓前角」，應為後角。","options":{"A":"痛覺由Aδ與C纖維傳導，正確。","B":"正確（為錯誤敘述）：初級感覺神經傳入脊髓「後角」，非前角。","C":"次級神經元於脊髓交叉到對側，正確。","D":"經外側脊髓視丘路徑上行，正確。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"101110-N1-22":{"quick":"大腦皮質主要輸出神經元是錐狀細胞（pyramidal cells），故選C。","detail":{"background":"大腦皮質（新皮質）結構：①分「六層」（非七葉、非三層；額/頂/枕/顳/島/邊緣等是「腦葉」非皮質層數，A、B皆錯）；②主要的輸出（傳出）神經元是「錐狀細胞（pyramidal cells）」，其長軸突投射到其他皮質區、皮質下核或脊髓（如錐體徑運動神經元），C正確；③輸入則來自視丘等的「視丘皮質投射」纖維與聯絡纖維（D說主要來自小腦，錯——小腦投射到皮質須經視丘中繼，且非主要來源）。故正確為C。","options":{"A":"大腦半球分腦葉而非皮質「七葉」，皮質為六層。","B":"新皮質為六層，非三層。","C":"正確：皮質主要輸出神經元為錐狀細胞。","D":"皮質輸入主要來自視丘，非小腦。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"102030-N1-18":{"quick":"腦波頻率由快到慢為β>α>θ>δ，最快者為β波，故選A。","detail":{"background":"腦波（EEG）依頻率分：①β波（>13 Hz，最快、低振幅）——清醒、警覺、專注、思考時；②α波（8–13 Hz）——清醒、閉眼、放鬆時（枕區明顯）；③θ波（4–7 Hz）——淺睡、嗜睡、兒童；④δ波（<4 Hz，最慢、高振幅）——深睡（慢波睡眠N3）。故頻率「最快」者為β波。記憶：清醒專注β、放鬆閉眼α、淺睡θ、深睡δ。","options":{"A":"正確：β波頻率最快（>13 Hz）。","B":"δ波最慢（深睡）。","C":"α波中等（放鬆閉眼）。","D":"θ波較慢（淺睡）。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"102030-N1-19":{"quick":"漢丁頓氏舞蹈症（Huntington chorea）與「基底核」神經元退化有關，故選C。","detail":{"background":"基底核（basal ganglia）調控運動的啟動與抑制。亨丁頓氏舞蹈症是體染色體顯性遺傳（HTT基因CAG重複擴增），主要破壞「紋狀體（尾核、殼核）」的GABA抑制性神經元，使運動過度／去抑制，表現為不自主的舞蹈樣動作（chorea）、認知退化與精神症狀。對比：帕金森氏症是黑質多巴胺神經元退化（運動「不足」）。小腦病變致運動失調（ataxia），邊緣系統管情緒，脊髓非此病變部位。故亨丁頓氏對應基底核（紋狀體）。","options":{"A":"脊髓非亨丁頓氏病變部位。","B":"邊緣系統管情緒，非主因。","C":"正確：基底核（紋狀體）退化致舞蹈樣動作。","D":"小腦病變致運動失調，非舞蹈症。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"102030-N1-20":{"quick":"看遠時交感神經興奮、睫狀肌「鬆弛」、懸韌帶拉緊、水晶體變薄，故選A。","detail":{"background":"眼睛調節（accommodation）由睫狀肌與懸韌帶（小帶）控制水晶體曲率：①看「近物」——副交感興奮使睫狀肌「收縮」→懸韌帶放鬆→水晶體因自身彈性「變厚變凸」、屈光力增強（D、C描述近物調節）；②看「遠物」——睫狀肌「鬆弛」（交感作用、副交感撤除）→懸韌帶被拉緊→水晶體被拉「變薄變扁」、屈光力減弱。題問「眺望遠處」的機轉＝交感興奮、睫狀肌鬆弛（A正確）。B「懸韌帶鬆弛、水晶體變薄」自相矛盾（鬆弛應變厚），C、D是看近物。故選A。","options":{"A":"正確：看遠時睫狀肌鬆弛、懸韌帶拉緊、水晶體變薄。","B":"懸韌帶鬆弛應使水晶體變厚（看近），自相矛盾。","C":"懸韌帶拉緊應變薄（看遠），此描述方向錯亂。","D":"副交感、睫狀肌收縮是看近物的機轉。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"102110-N1-19":{"quick":"內耳毛細胞受刺激去極化主要由「K⁺」流入引起，故選B。","detail":{"background":"內耳耳蝸的內淋巴液富含高濃度K⁺（由血管紋分泌），與毛細胞內形成有利K⁺內流的電化學梯度（內淋巴電位約+80mV）。聲波使基底膜振動、毛細胞纖毛偏折，打開頂端的機械門控通道，「K⁺由內淋巴流入毛細胞」造成去極化→開啟基底側Ca²⁺通道→釋放神經傳導物質興奮聽神經。此與一般神經以Na⁺去極化不同，是耳蝸的特殊機制。故答案為K⁺。","options":{"A":"一般神經以Na⁺去極化，但耳蝸毛細胞特殊。","B":"正確：毛細胞由高K⁺內淋巴的K⁺內流而去極化。","C":"Ca²⁺在基底側流入觸發傳導物質釋放，非頂端去極化主因。","D":"Mg²⁺非毛細胞興奮的離子。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"102110-N1-20":{"quick":"體運動系統（軀體運動）「無神經節」，故錯誤敘述為A。","detail":{"background":"體運動（軀體運動）系統 vs 自主神經系統的差異：①體運動系統由脊髓前角（或腦幹運動核）的「下運動神經元」單一神經元直接支配骨骼肌，「中途無神經節」（A錯——有神經節的是自主神經系統，其節前/節後神經元在自主神經節換接）；②神經末梢與骨骼肌形成「運動終板（neuromuscular junction）」（B對）；③只支配骨骼肌（C對）；④起源於大腦運動皮質下行至脊髓（D對）。故唯一錯誤是A「具有神經節」。","options":{"A":"正確（為錯誤敘述）：體運動系統無神經節（自主神經才有）。","B":"有運動終板，正確。","C":"只支配骨骼肌，正確。","D":"始於大腦運動皮質下行，正確。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"102110-N1-29":{"quick":"可由意志力（隨意）控制者是外尿道括約肌（骨骼肌），故選B。","detail":{"background":"排尿相關肌肉：①膀胱壁逼尿肌（detrusor）——平滑肌，受副交感（M3）控制，不隨意（A錯）；②尿道「內」括約肌——平滑肌，受交感控制，不隨意；③尿道「外」括約肌——「骨骼肌」，受陰部神經（軀體神經）支配，可隨意收縮憋尿（B正確）；④輸尿管與腎盂平滑肌——蠕動排尿，不隨意（C、D錯）。故唯一可意志控制者為外尿道括約肌。","options":{"A":"逼尿肌為平滑肌，受副交感控制，不隨意。","B":"正確：外尿道括約肌是骨骼肌，可隨意控制。","C":"輸尿管縱走肌為平滑肌，不隨意。","D":"腎盂平滑肌不隨意。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103030-N1-21":{"quick":"成年人最會出現α波是在「閉眼而放鬆的清醒狀態」，故選C。","detail":{"background":"α波（8–13 Hz）是清醒、安靜、「閉眼放鬆」時最明顯的腦波，以枕葉最強；一旦「睜眼或集中精神」，α波即被去同步化的β波取代（α阻斷，D錯）。慢波睡眠期是δ波（A錯）、REM睡眠是低振幅快波（B錯）。故α波出現於閉眼放鬆的清醒狀態。　深化：α波是清醒放鬆閉眼的腦波（枕葉明顯），睜眼或專注時被β波取代（α阻斷）。腦波由快到慢：β（專注）、α（放鬆閉眼）、θ（淺睡）、δ（深睡），是評估意識與睡眠階段的工具。","options":{"A":"慢波睡眠期為δ波。","B":"REM睡眠為低振幅快波。","C":"正確：閉眼放鬆清醒時α波最明顯。","D":"睜眼/專注時α波被β波取代（α阻斷）。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103030-N1-22":{"quick":"阿茲海默症與「乙醯膽鹼（acetylcholine）」神經元退化關係最密切，故選C。","detail":{"background":"阿茲海默症（Alzheimer disease）病理特徵為β類澱粉斑塊與tau神經纖維纏結，神經傳導物質方面以「膽鹼性（乙醯膽鹼）」神經元退化最具特徵——基底前腦（Meynert核）膽鹼性神經元喪失，導致記憶與認知缺損。故治療藥用乙醯膽鹼酯酶抑制劑（donepezil等）提升乙醯膽鹼。對比：多巴胺缺乏→帕金森氏；故Alzheimer選乙醯膽鹼。腎上腺素、P物質非主要相關。","options":{"A":"腎上腺素非Alzheimer主要相關物質。","B":"多巴胺缺乏與帕金森氏相關。","C":"正確：乙醯膽鹼神經元退化與Alzheimer最密切。","D":"P物質是痛覺傳導物質，非Alzheimer主因。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103100-N1-18":{"quick":"控制人體生物時鐘的最主要部位是「下視丘」（視交叉上核），故選D。","detail":{"background":"人體晝夜節律（生物時鐘）的主控中樞是下視丘的「視交叉上核（suprachiasmatic nucleus, SCN）」，接受視網膜的光照訊息校準節律，並調控松果腺褪黑激素分泌、體溫、皮質醇等的日週期。延腦管呼吸心血管中樞、橋腦中繼、視丘是感覺中繼站，皆非生物時鐘。故主控生物時鐘者為下視丘。","options":{"A":"延腦管呼吸心血管，非生物時鐘。","B":"橋腦是中繼，非生物時鐘。","C":"視丘是感覺中繼站。","D":"正確：下視丘（視交叉上核）是生物時鐘主控。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103100-N1-19":{"quick":"不具交感與副交感雙重支配者是豎毛肌（僅受交感支配），故選B。","detail":{"background":"多數內臟受交感與副交感「雙重（拮抗）支配」，如心臟（交感加速/副交感減慢）、支氣管、膀胱、瞳孔、消化道等。少數構造「僅受交感單一支配」：豎毛肌（arrector pili）、汗腺、多數血管平滑肌、腎上腺髓質、脾。故豎毛肌不具雙重支配（B正確）。心臟、支氣管、膀胱皆有雙重支配。","options":{"A":"心臟有交感與副交感雙重支配。","B":"正確：豎毛肌僅受交感支配，無副交感。","C":"支氣管有雙重支配。","D":"膀胱有雙重支配。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103100-N1-20":{"quick":"接受器電位主要為「過極化（hyperpolarization）」者是視覺，故選A。","detail":{"background":"多數感覺受器受刺激產生「去極化」的接受器電位，但視網膜光感受器（桿細胞、錐細胞）是特例：在「黑暗」中持續有內向電流（cGMP門控Na⁺/Ca²⁺通道開啟）呈相對去極化、持續釋放麩胺酸；「光照」時活化視紫質→cGMP下降→通道關閉→Na⁺內流減少→光感受器「過極化（hyperpolarization）」、減少傳導物質釋放。故視覺的接受器電位是過極化（A）。聽覺、嗅覺、味覺受器受刺激皆去極化。","options":{"A":"正確：視覺光感受器受光照產生過極化。","B":"聽覺毛細胞受刺激去極化。","C":"嗅覺受器去極化。","D":"味覺受器去極化。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"103100-N1-21":{"quick":"巴金森氏症（Parkinson）與「多巴胺（dopamine）」缺乏關係最密切，故選B。","detail":{"background":"帕金森氏症是黑質緻密部（substantia nigra pars compacta）的多巴胺神經元退化，使紋狀體多巴胺不足，基底核運動迴路失衡，表現靜止性顫抖、僵直、動作遲緩（bradykinesia）、姿勢不穩。治療補多巴胺前驅物levodopa。對比：乙醯膽鹼缺乏→阿茲海默；麩胺酸是興奮性傳導物質、P物質管痛覺，皆非帕金森主因。故選多巴胺。","options":{"A":"腎上腺素非帕金森主因。","B":"正確：多巴胺缺乏與帕金森氏最密切。","C":"麩胺酸是興奮性傳導物質，非帕金森主因。","D":"P物質管痛覺。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"104030-N1-20":{"quick":"受傷後不再害怕看恐怖影片，最可能受損部位是杏仁體（amygdala），故選B。","detail":{"background":"杏仁體（amygdala）屬邊緣系統，是「恐懼與情緒（尤其害怕）」處理與情緒記憶的核心，參與恐懼制約。雙側杏仁體受損會使人喪失恐懼反應、對威脅性刺激不再害怕（如Klüver-Bucy症候群的去恐懼化）。故「不再懼怕恐怖影片」對應杏仁體受損（B）。尾核屬基底核（運動）、紅核屬中腦運動協調、黑質管多巴胺運動，皆非情緒恐懼中樞。","options":{"A":"尾核屬基底核，管運動。","B":"正確：杏仁體管恐懼情緒，受損則失去害怕。","C":"紅核管運動協調。","D":"黑質管多巴胺/運動。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"104100-N1-20":{"quick":"網狀結構傳送到前腦的訊息主要與「意識和醒覺」有關，故選B。","detail":{"background":"腦幹網狀結構的上行網狀活化系統（ascending reticular activating system, ARAS）向上經視丘投射到大腦皮質，維持「清醒、警覺與意識」，是覺醒與睡眠—清醒週期的關鍵；ARAS受損會導致昏迷。網狀結構也參與其他功能，但題問「傳送到前半腦」的訊息主要功能為意識和醒覺（B）。運動控制主要由皮質/基底核/小腦，呼吸心跳由延腦中樞，攻擊行為由邊緣系統/下視丘。","options":{"A":"運動控制非ARAS上行主功能。","B":"正確：ARAS上行維持意識與醒覺。","C":"呼吸心跳由延腦中樞。","D":"攻擊行為由邊緣系統/下視丘。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"104100-N1-22":{"quick":"體感覺異常最可能受損的腦葉是頂葉（parietal lobe），故選D。","detail":{"background":"大腦腦葉功能定位：①頂葉——含「初級體感覺皮質（postcentral gyrus）」，處理觸覺、壓覺、本體覺、痛溫覺，受損致體感覺異常（D正確）；②額葉——運動、執行功能、人格；③枕葉——視覺；④顳葉——聽覺、記憶、語言理解。故體感覺異常對應頂葉。","options":{"A":"顳葉主管聽覺與記憶。","B":"額葉主管運動與執行功能。","C":"枕葉主管視覺。","D":"正確：頂葉含體感覺皮質，受損致體感覺異常。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"105030-N1-18":{"quick":"外側皮質脊髓徑在「延腦錐體」交叉，而非在脊髓交叉，故錯誤敘述為A。","detail":{"background":"外側皮質脊髓路徑（lateral corticospinal tract，錐體徑）：①由大腦皮質運動區發出（D對）；②屬「錐體路徑（pyramidal tract）」（C對）；③下行至「延腦錐體（medullary pyramids）」處約85%纖維「交叉」到對側（錐體交叉，decussation of pyramids），再沿脊髓外側索下行——故交叉發生在「延腦」而非「脊髓」（A錯）；④控制對側肢體「靈巧精細」的隨意動作（B對）。故唯一錯誤是A。注意與痛覺的脊髓視丘徑（在脊髓交叉）區分。","options":{"A":"正確（為錯誤敘述）：外側皮質脊髓徑在「延腦錐體」交叉，非脊髓。","B":"控制靈巧精細動作，正確。","C":"屬錐體路徑，正確。","D":"由大腦皮質出發，正確。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"105030-N1-19":{"quick":"無法轉頭、肩部下垂不能聳肩，是第11對腦神經副神經（accessory nerve）受損，故選D。","detail":{"background":"副神經（accessory nerve, CN XI）支配「胸鎖乳突肌（轉頭）」與「斜方肌（聳肩、穩定肩胛）」。受損則同側轉頭無力（胸鎖乳突肌）與肩下垂、不能聳肩（斜方肌）。故症狀對應副神經（D）。滑車神經（CN IV）管上斜肌（眼球向下內）、三叉神經（CN V）管臉部感覺與咀嚼、迷走神經（CN X）管咽喉與內臟副交感，皆不符。","options":{"A":"滑車神經管上斜肌眼球運動。","B":"三叉神經管臉部感覺與咀嚼。","C":"迷走神經管咽喉與內臟副交感。","D":"正確：副神經管胸鎖乳突肌與斜方肌（轉頭、聳肩）。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"105030-N1-21":{"quick":"中風後出現飢餓、多食、肥胖，最可能病變部位是「下視丘」，故選B。","detail":{"background":"下視丘含攝食調節中樞：外側下視丘（攝食中樞，刺激進食）與腹內側核（飽食中樞，抑制進食）。腹內側核（飽食中樞）受損會使人喪失飽足感、過度進食（多食、hyperphagia）而肥胖。下視丘也整合瘦素、ghrelin等訊號調控食慾與能量平衡。故飢餓多食肥胖對應下視丘（B）。視丘是感覺中繼、基底核管運動、小腦管協調，皆非攝食中樞。","options":{"A":"視丘是感覺中繼站，非攝食中樞。","B":"正確：下視丘含攝食/飽食中樞，受損致多食肥胖。","C":"基底核管運動。","D":"小腦管運動協調。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"105090-N1-20":{"quick":"交感神經起源為胸腰段（T1-L2），「第二薦脊髓」不屬交感起源，故選B。","detail":{"background":"自主神經的脊髓起源：①交感神經＝「胸腰流出（thoracolumbar outflow）」，起於脊髓T1–L2（第1胸至第2腰節）側角；②副交感神經＝「顱薦流出（craniosacral outflow）」，起於腦幹（CN III、VII、IX、X）與薦髓S2–S4。題選「第二薦脊髓（S2）」屬「副交感」起源，不是交感（B正確為例外）。第一胸（T1）、第一腰（L1）、第二腰（L2）皆在交感的T1–L2範圍內，屬交感起源。","options":{"A":"第一胸（T1）屬交感起源（T1-L2）。","B":"正確：第二薦（S2）屬副交感，非交感起源。","C":"第二腰（L2）屬交感起源。","D":"第一腰（L1）屬交感起源。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106030-N1-18":{"quick":"腦部代謝正確敘述為C：葡萄糖是腦部能量的主要來源，故選C。","detail":{"background":"腦部代謝特性：①腦是「高代謝率」器官（約佔全身耗氧20%，A錯）；②腦幾乎完全依賴「有氧代謝」、無法有效進行無氧代謝（缺氧數分鐘即受損，B錯）；③「葡萄糖」是腦的主要能量來源（正常情況幾乎唯一，長期飢餓才用酮體），C正確；④葡萄糖可經GLUT1「通過血腦障壁」（D錯，否則腦無法獲能）。故正確為C。這也是低血糖會迅速影響意識的原因。","options":{"A":"腦是高代謝率器官。","B":"腦無法有效無氧代謝，高度依賴有氧。","C":"正確：葡萄糖是腦部主要能量來源。","D":"葡萄糖經GLUT1可通過血腦障壁。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106030-N1-20":{"quick":"引起皮膚及腹腔內臟血管收縮的是α型腎上腺素性接受器，故選A。","detail":{"background":"血管平滑肌的腎上腺素受體：①α1受體——分布於皮膚、腹腔內臟、腎等血管，興奮（正腎上腺素/腎上腺素）造成血管「收縮」（升血壓、戰或逃時將血流由內臟皮膚轉向重要器官），A正確；②β2受體——分布於骨骼肌與冠狀血管，興奮造成血管「舒張」。尼古丁型膽鹼受體在自主神經節與神經肌肉接合、蕈毒型在器官副交感標的，皆非直接造成皮膚內臟血管收縮。故答案為α受體。","options":{"A":"正確：α腎上腺素受體使皮膚與內臟血管收縮。","B":"β受體（β2）使骨骼肌血管舒張。","C":"尼古丁型膽鹼受體在神經節/終板。","D":"蕈毒型膽鹼受體在副交感器官標的。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106030-N1-21":{"quick":"不屬於自主神經節者是「背根神經節（dorsal root ganglion）」，故選D。","detail":{"background":"自主神經節是節前與節後神經元換接處：①睫狀神經節（副交感，管瞳孔/睫狀肌）；②腹腔神經節、③上腸繫膜神經節（交感的椎前神經節，管腹部內臟）皆為自主神經節。「背根神經節（dorsal root ganglion）」則是「感覺（軀體/內臟傳入）」神經元細胞體所在，不換接、不屬自主運動神經節（D正確為例外）。故不屬自主神經節者為背根神經節。","options":{"A":"睫狀神經節是副交感神經節。","B":"腹腔神經節是交感椎前神經節。","C":"上腸繫膜神經節是交感神經節。","D":"正確：背根神經節是感覺神經節，非自主神經節。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106110-N1-22":{"quick":"咀嚼困難、臉頰喪失觸覺，是第5對腦神經三叉神經（trigeminal）受損，故選B。","detail":{"background":"三叉神經（trigeminal nerve, CN V）有兩大功能：①「運動」支配咀嚼肌（咬肌、顳肌等）→受損致咀嚼困難；②「感覺」司臉部（含臉頰）的觸覺、痛溫覺→受損致臉部感覺喪失。故同時出現咀嚼困難＋臉頰觸覺喪失對應三叉神經（B）。滑車神經管眼球運動、顏面神經（CN VII）管表情肌與味覺（非臉部觸覺、非咀嚼）、迷走神經管咽喉內臟，皆不符。","options":{"A":"滑車神經管眼球運動。","B":"正確：三叉神經管咀嚼與臉部感覺。","C":"顏面神經管表情肌與味覺，非臉部觸覺/咀嚼。","D":"迷走神經管咽喉與內臟。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"106111-N1-20":{"quick":"視網膜視覺傳導順序為：桿細胞與錐細胞→雙極細胞→神經節細胞，故選D。","detail":{"background":"視網膜訊號傳導方向（與光線方向相反）：光線先穿過內層，到達最外層的「光感受器（桿細胞rod、錐細胞cone）」被吸收→光感受器把訊號傳給「雙極細胞（bipolar cell）」→雙極細胞傳給「神經節細胞（ganglion cell）」→神經節細胞軸突匯集成視神經出眼球。故順序為「桿/錐細胞→雙極細胞→神經節細胞」（D）。水平細胞與無軸突細胞做側向調節。其餘選項順序顛倒。","options":{"A":"順序顛倒（神經節在最後，非最前）。","B":"順序顛倒。","C":"缺漏雙極細胞中繼且順序錯。","D":"正確：桿/錐細胞→雙極細胞→神經節細胞。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"107030-N1-21":{"quick":"副交感分泌「乙醯膽鹼（acetylcholine）」刺激淚腺大量分泌淚液，故選C。","detail":{"background":"副交感神經的節後傳導物質是乙醯膽鹼（ACh），作用於蕈毒鹼受體。淚腺、唾液腺、汗腺（特例由交感膽鹼性）等分泌腺受副交感（膽鹼性）刺激分泌大量稀薄分泌液——故副交感經乙醯膽鹼刺激淚腺大量分泌淚液（C）。正腎上腺素是交感節後傳導物質、多巴胺與腎上腺素非淚腺分泌的副交感傳導物質。","options":{"A":"正腎上腺素是交感節後傳導物質。","B":"多巴胺非淚腺分泌傳導物質。","C":"正確：副交感經乙醯膽鹼刺激淚腺分泌。","D":"腎上腺素是腎上腺髓質/交感相關，非此。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"107110-N1-19":{"quick":"瞳孔光反射的「傳入（感覺）」神經是視神經（CN II），故選C。","detail":{"background":"瞳孔光反射弧：①傳入支＝「視神經（CN II）」偵測光線（C正確）；②中樞在中腦頂蓋前區（pretectal area）→Edinger-Westphal核；③傳出支＝「動眼神經（CN III）」副交感纖維使瞳孔括約肌收縮、瞳孔縮小。光照一眼，兩眼皆縮（直接與間接反射）。題問「傳入」神經，為視神經。動眼神經是傳出（D）；顏面、滑車神經與瞳孔光反射無關。","options":{"A":"顏面神經管表情/味覺，非瞳孔光反射傳入。","B":"滑車神經管眼球運動。","C":"正確：視神經是瞳孔光反射的傳入神經。","D":"動眼神經是傳出神經（縮瞳）。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"107110-N1-20":{"quick":"受損會失去害怕感覺的腦區是杏仁核（amygdala），故選A。","detail":{"background":"杏仁核（amygdala）是恐懼與情緒處理中樞，受損會使人喪失對威脅的恐懼反應。布洛卡區（Broca）管語言「表達」、渥尼克區（Wernicke）管語言「理解」、尾狀核屬基底核管運動。故失去害怕感覺對應杏仁核（A）。　深化：雙側杏仁核受損會喪失恐懼反應（如Klüver-Bucy症候群、Urbach-Wiethe病），對威脅刺激不再害怕，也影響情緒記憶與社交判讀。杏仁核與下視丘、自律系統相連，啟動恐懼時的戰或逃生理反應。","options":{"A":"正確：杏仁核管恐懼，受損失去害怕。","B":"布洛卡區管語言表達。","C":"渥尼克區管語言理解。","D":"尾狀核屬基底核管運動。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"107110-N1-21":{"quick":"黑質（substantia nigra）神經元退化造成的症狀是動作遲緩（bradykinesia），故選C。","detail":{"background":"黑質緻密部多巴胺神經元退化＝帕金森氏症，三大運動症狀：靜止性顫抖（resting tremor）、肌肉僵直（rigidity）、動作遲緩（bradykinesia），加上姿勢不穩。題選「動作遲緩（bradykinesia）」正確（C）。意向性震顫（intention tremor）是「小腦」病變的特徵（A錯）；黃疸是肝膽問題；幻覺屬精神/邊緣系統。故黑質退化對應動作遲緩。","options":{"A":"意向性震顫是小腦病變特徵，非黑質。","B":"黃疸是肝膽問題，無關。","C":"正確：黑質退化（帕金森）致動作遲緩。","D":"幻覺非黑質退化的核心運動症狀。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"108020-N1-32":{"quick":"進食頭期（cephalic phase）由「副交感神經（迷走）」經視覺嗅覺等預先激活腸神經系統，故選D。","detail":{"background":"消化的頭期（cephalic phase）：食物的視覺、嗅覺、味覺、咀嚼或想到食物，經大腦→「迷走神經（副交感）」傳出，預先刺激胃酸、胃蛋白酶與胰液分泌、胃蠕動，為進食作準備——故被激活的是「副交感神經至腸神經系統」（D正確）。A錯（頭期不靠胰泌素，胰泌素是腸期受酸刺激分泌）；B短反射是胃腸局部腸神經反射、屬胃期/腸期；C交感是抑制消化（與頭期相反）。故選D。","options":{"A":"胰泌素是腸期由小腸酸度刺激分泌，非頭期嗅覺所致。","B":"短反射屬胃期/腸期局部反射。","C":"交感抑制消化，與頭期相反。","D":"正確：頭期激活副交感（迷走）至腸神經系統。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"108110-N1-18":{"quick":"腦脊髓液由「腦室的脈絡叢（choroid plexus）」產生，故選A。","detail":{"background":"腦脊髓液（CSF）主要由側腦室、第三、第四腦室內的「脈絡叢（choroid plexus）」分泌（每日約500mL），循環路徑：側腦室→室間孔→第三腦室→大腦導水管→第四腦室→正中孔/外側孔→蛛網膜下腔→經蛛網膜顆粒回吸收入靜脈竇。故CSF的「產生地」是脈絡叢（A）。大腦導水管是通道、脊髓中央管是循環延伸、蛛網膜下腔是循環與回吸收處，皆非主要產生地。","options":{"A":"正確：腦脊髓液由腦室脈絡叢產生。","B":"大腦導水管是CSF循環通道。","C":"脊髓中央管是CSF循環延伸。","D":"蛛網膜下腔是CSF循環與回吸收處。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"108110-N1-21":{"quick":"清醒有意識的成人卻出現大量δ波，最可能是「腦部受損」，故選D。","detail":{"background":"δ波（<4 Hz慢波）正常只出現在深睡（NREM-N3）或嬰兒。若一個「清醒、有意識」的成人EEG卻出現大量δ波，屬異常，提示腦部病理（腦傷、腫瘤、腦病變、代謝性腦病等）造成皮質功能異常。故最可能為腦部受損（D）。注意力集中應為β波（A錯）、放鬆閉眼為α波（B錯）、嚴重情緒壓力非典型δ波來源（C不符）。故選D。","options":{"A":"注意力集中應為β波。","B":"放鬆閉眼應為α波。","C":"情緒壓力非典型大量δ波來源。","D":"正確：清醒卻大量δ波提示腦部受損。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"109030-N1-20":{"quick":"表達性失語症（expressive aphasia）由「額葉」的布洛卡區（Broca）病變所致，故選C。","detail":{"background":"語言中樞（通常在左半球）：①布洛卡區（Broca area）位於「額葉」下回，管語言「產出／表達」，受損致表達性（運動性）失語症——理解尚可但說話困難、不流暢（C正確）；②渥尼克區（Wernicke area）位於「顳葉」上回，管語言「理解」，受損致接受性（感覺性）失語症——說話流暢但內容無意義、理解差。題選「額葉的布洛卡區」對應表達性失語症。A、B把布洛卡/渥尼克的腦葉定位弄錯，D把渥尼克放額葉也錯。","options":{"A":"布洛卡區在額葉而非顳葉。","B":"渥尼克區致接受性失語，非表達性。","C":"正確：額葉布洛卡區病變致表達性失語症。","D":"渥尼克區在顳葉非額葉，且致接受性失語。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"109110-N1-12":{"quick":"副交感興奮排尿：膀胱逼尿肌「收縮」、尿道內括約肌「放鬆」，故選B。","detail":{"background":"排尿反射由副交感（骨盆神經，S2-4）主導：副交感興奮→膀胱逼尿肌（detrusor）「收縮」擠出尿液、同時尿道內括約肌「放鬆」讓尿流出——兩者協調以排尿（B正確）。相對地，交感興奮（儲尿期）使逼尿肌鬆弛、內括約肌收縮（憋尿）。外括約肌為骨骼肌受隨意控制。故副交感興奮的排尿表現為逼尿肌收縮＋內括約肌放鬆。","options":{"A":"內括約肌應放鬆（非收縮）才能排尿。","B":"正確：副交感使逼尿肌收縮、內括約肌放鬆。","C":"逼尿肌應收縮（非放鬆）。","D":"方向相反，無法排尿。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"109110-N1-19":{"quick":"表達性失語症由布洛卡氏區（Broca area）受損所致，故選B。","detail":{"background":"表達性（運動性）失語症＝布洛卡氏區（Broca area，額葉下回）受損，患者理解正常但說話費力、不流暢、找詞困難。渥尼克氏區（Wernicke area）受損則為接受性（感覺性）失語症（理解差）。選項中阿爾柏特氏區、史特爾氏區為虛構/干擾選項。故表達性失語症對應布洛卡氏區（B）。","options":{"A":"阿爾柏特氏區為干擾選項，非語言中樞。","B":"正確：布洛卡氏區受損致表達性失語症。","C":"史特爾氏區為干擾選項。","D":"渥尼克氏區受損致接受性失語症。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"109110-N1-22":{"quick":"運動失調（ataxia）主要因「小腦（cerebellum）」受損，故選C。","detail":{"background":"小腦負責運動的協調、平衡、姿勢維持與動作的精準度（時序與力道）。小腦受損典型表現為運動失調（ataxia）：步態不穩、辨距不良（dysmetria）、意向性震顫、輪替動作障礙（dysdiadochokinesia）、言語含糊。故ataxia對應小腦（C）。橋腦是中繼、下視丘管自主內分泌、前額葉管執行功能，皆非運動協調中樞。","options":{"A":"橋腦是中繼，非運動協調中樞。","B":"下視丘管自主與內分泌。","C":"正確：小腦受損致運動失調（ataxia）。","D":"前額葉管執行功能與認知。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"109110-N1-23":{"quick":"治療憂鬱症主要針對「血清素（serotonin）」進行調節，故選B。","detail":{"background":"憂鬱症的單胺假說認為與腦內血清素（serotonin, 5-HT）及正腎上腺素不足有關。第一線抗憂鬱藥「選擇性血清素回收抑制劑（SSRI，如fluoxetine、sertraline）」即抑制血清素回收、提升突觸血清素濃度——故治療憂鬱症主要針對血清素調節（B）。GABA是抑制性傳導物質（抗焦慮/鎮靜藥標的）、乙醯膽鹼與失智相關、腎上腺素非主要抗憂鬱標的。故選血清素。","options":{"A":"GABA是鎮靜抗焦慮藥標的，非抗憂鬱主標的。","B":"正確：抗憂鬱藥（SSRI）主要調節血清素。","C":"乙醯膽鹼與失智相關。","D":"腎上腺素非主要抗憂鬱標的。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"110030-N1-24":{"quick":"影像經水晶體投射到視網膜時呈「上下顛倒且左右相反」，故選B。","detail":{"background":"眼睛的水晶體是凸透鏡，外界物體經其折射成像於視網膜時為「倒立、左右相反」的實像（上下顛倒且左右相反，即180度旋轉），如同相機。大腦視覺皮質再把倒立影像「校正」為正立知覺。故視網膜上的影像方位是上下顛倒且左右相反（B）。其餘選項只對一個方向，皆不完整。","options":{"A":"影像並非與原物體相同方位。","B":"正確：影像上下顛倒且左右相反。","C":"左右也相反，非與原物相同。","D":"上下也顛倒，非與原物相同。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"110110-N1-18":{"quick":"基底核功能受損或退化最相關的症狀是帕金森氏症，故選B。","detail":{"background":"基底核（basal nuclei/ganglia）調控運動的啟動、抑制與協調。其相關運動障礙：帕金森氏症（黑質多巴胺神經元退化→運動不足、顫抖僵直）、亨丁頓氏舞蹈症（紋狀體退化→運動過度）、半身舞蹈症等。題選帕金森氏症（B）最相關。阿茲海默症是膽鹼性/皮質退化（認知）、失語症是語言皮質、嗅覺喪失與嗅球/嗅神經有關，皆非基底核典型。","options":{"A":"阿茲海默症是皮質/膽鹼性退化（認知）。","B":"正確：帕金森氏症與基底核（黑質）退化相關。","C":"失語症是語言皮質病變。","D":"嗅覺喪失與嗅神經/嗅球有關。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"111030-N1-19":{"quick":"與鮮味（umami）有關的胺基酸是麩胺酸（glutamate），故選B。","detail":{"background":"五種基本味覺：甜、酸、鹹、苦、鮮（umami）。鮮味由「麩胺酸（glutamate）」及其鈉鹽（味精MSG）與核苷酸（IMP、GMP）刺激味蕾的T1R1/T1R3受體產生，是蛋白質/胺基酸食物的味覺訊號（B正確）。甘胺酸帶甜味、酪胺酸與色胺酸非鮮味來源。故鮮味對應麩胺酸。","options":{"A":"甘胺酸帶甜味，非鮮味。","B":"正確：麩胺酸（glutamate）產生鮮味（umami）。","C":"酪胺酸非鮮味來源。","D":"色胺酸非鮮味來源。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"111030-N1-28":{"quick":"色盲正確敘述為D：主因視蛋白（opsins）的種類過少（某種錐細胞色素基因缺陷），故選D。","detail":{"background":"色盲（color blindness）最常見為紅綠色盲，是「X染色體隱性遺傳」：①因致病基因在X染色體，男性只一條X即發病，故「男性發生率遠高於女性」（A錯，說女性高反了）；②是X染色體隱性，非Y染色體顯性（B錯）；③肇因於某種錐狀細胞的「視蛋白（opsin）色素基因缺陷或缺失」，使可辨色的錐細胞色素「種類減少」，而非太多種（C錯，D正確）。正常人有三種錐細胞（紅綠藍），缺一種即色盲。故正確為D。","options":{"A":"男性發生率遠高於女性（X隱性），非女性高。","B":"是X染色體隱性，非Y染色體顯性。","C":"是錐細胞色素種類「過少」，非過多。","D":"正確：主因視蛋白（opsin）種類過少。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"112030-N1-15":{"quick":"作夢通常發生於「快速動眼期（REM）」，故選D。","detail":{"background":"作夢主要發生在快速動眼（REM）睡眠期——此期腦波活躍（低振幅快波）、眼球快速轉動、骨骼肌張力消失，是生動夢境的主要階段（REM dream）。NREM各期（N1淺睡、N2、N3深睡慢波）也可能有片段夢境但較少且不生動。清醒時不作夢。故主要作夢階段為REM（D）。","options":{"A":"清醒時不作夢。","B":"NREM-I期淺睡非主要作夢期。","C":"NREM-II期非主要作夢期。","D":"正確：作夢主要在快速動眼（REM）期。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"112110-N1-13":{"quick":"順向失憶症（anterograde amnesia）與「海馬迴（hippocampus）」受損最相關，故選A。","detail":{"background":"海馬迴（hippocampus）是把「短期記憶轉為長期記憶（記憶固化）」的關鍵結構。雙側海馬迴受損（如著名病例H.M.）會造成「順向失憶（anterograde amnesia）」——無法形成新的長期記憶，但舊記憶與短期工作記憶仍在。故順向失憶對應海馬迴（A）。小腦管程序性記憶/協調、運動皮質管運動、橋腦是中繼，皆非陳述性記憶固化中樞。","options":{"A":"正確：海馬迴受損致順向失憶（無法形成新長期記憶）。","B":"小腦管程序性記憶與協調。","C":"運動皮質管運動執行。","D":"橋腦是中繼站。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"112180-N1-13":{"quick":"未參與調節意識清醒/睡眠者是「枕葉（occipital lobe）」，故選C。","detail":{"background":"意識的清醒—睡眠狀態調節涉及：腦幹網狀活化系統（ARAS）、視丘（中繼與節律閘控）、下視丘（睡眠—清醒中樞、生理時鐘）、大腦皮質（廣泛覺醒表現）。枕葉（occipital lobe）是「視覺」處理皮質，與意識清醒/睡眠調節無直接關係（C為例外）。故未參與者為枕葉。視丘、皮質（廣義）、腦幹皆參與意識調節。","options":{"A":"視丘參與意識調節（中繼與閘控）。","B":"皮質參與覺醒表現。","C":"正確：枕葉管視覺，未參與意識清醒/睡眠調節。","D":"腦幹（ARAS）參與意識調節。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"112180-N1-14":{"quick":"與動機（motivation）和獎賞（reward）路徑最相關的是多巴胺（dopamine），故選C。","detail":{"background":"腦內獎賞與動機系統的核心傳導物質是「多巴胺（dopamine）」，主要為中腦邊緣多巴胺路徑（VTA→伏隔核nucleus accumbens、前額葉），介導愉悅、酬賞、動機與成癮（成癮藥物多增加伏隔核多巴胺）。故動機與獎賞對應多巴胺（C）。組織胺管清醒/過敏、乙醯膽鹼管記憶/副交感、麩胺酸是興奮性傳導物質，皆非獎賞路徑核心。","options":{"A":"組織胺管清醒與過敏反應。","B":"乙醯膽鹼管記憶與副交感。","C":"正確：多巴胺是動機與獎賞路徑核心。","D":"麩胺酸是一般興奮性傳導物質。"},"sources":["Guyton & Hall Textbook of Medical Physiology 14e","實用生理學（華杏）","Tortora & Derrickson, Principles of Anatomy and Physiology"]}},"112180-N1-15":{"quick":"副交感興奮引起的反應是瞳孔收縮（縮瞳），故選C。","detail":{"background":"副交感「休息與消化（rest and digest）」效應：瞳孔收縮（縮瞳，C正確）、支氣管收縮、心跳變慢、促進消化分泌與蠕動、促排尿排便。逐項：A支氣管「舒張」是交感（β2）作用（錯）；B腎上腺釋放正腎上腺素是交感（錯）；D肝醣轉葡萄糖（肝糖分解升血糖）是交感/升糖素作用（錯）。故唯一副交感反應為瞳孔收縮。","options":{"A":"支氣管舒張是交感（β2）作用。","B":"腎上腺釋兒茶酚胺是交
