hysio","topic":"P12中樞感覺生理","q_num":13,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"肌肉弛緩性癱瘓(flaccid paralysis)","B":"肌束顫動(fasciculation)","C":"肌肉萎縮(muscular atrophy)","D":"肌肉張力亢進(hypertonia)"},"img":""},{"id":"114100-N1-14","code":"114100","roc":"114","cat":"N1","catname":"基礎醫學","num":14,"stem":"下列何者為清醒狀態(awake state)時,神經傳導物質所媒介的神經元活性表現?","opts":{"A":"正腎上腺素(norepinephrine)神經元活性減弱","B":"血清素(serotonin)神經元活性減弱","C":"乙醯膽鹼(acetylcholine)神經元活性減弱","D":"γ-胺基丁酸(GABA)神經元活性增強"},"answer":"C","answer_status":"送分","accepted_answers":["A","B","C","D"],"disc":"physio","topic":"P12中樞感覺生理","q_num":14,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"正腎上腺素(norepinephrine)神經元活性減弱","B":"血清素(serotonin)神經元活性減弱","C":"乙醯膽鹼(acetylcholine)神經元活性減弱","D":"γ-胺基丁酸(GABA)神經元活性增強"},"img":""},{"id":"114100-N1-17","code":"114100","roc":"114","cat":"N1","catname":"基礎醫學","num":17,"stem":"下列何種疾病主要是視錐細胞(cone cells)基因突變異常所致?","opts":{"A":"散光(astigmatism)","B":"色盲(color blindness)","C":"弱視(amblyopia)","D":"青光眼(glaucoma)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"disc":"physio","topic":"P12中樞感覺生理","q_num":17,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"散光(astigmatism)","B":"色盲(color blindness)","C":"弱視(amblyopia)","D":"青光眼(glaucoma)"},"img":""},{"id":"114100-N1-20","code":"114100","roc":"114","cat":"N1","catname":"基礎醫學","num":20,"stem":"下列那一種刺激會引起最多的唾液分泌?","opts":{"A":"甜味","B":"酸味","C":"鹹味","D":"觸覺"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"disc":"physio","topic":"P12中樞感覺生理","q_num":20,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"甜味","B":"酸味","C":"鹹味","D":"觸覺"},"img":""},{"id":"114170-N1-14","code":"114170","roc":"114","cat":"N1","catname":"基礎醫學","num":14,"stem":"下列何種腦電波圖型,不會出現在健康成人睡眠的非快速動眼(non-rapid eye movement, NREM)時期?","opts":{"A":"α 波","B":"β 波","C":"θ 波","D":"δ 波"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"disc":"physio","topic":"P12中樞感覺生理","q_num":14,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"α 波","B":"β 波","C":"θ 波","D":"δ 波"},"img":""},{"id":"115030-N1-3","code":"115030","roc":"115","cat":"N1","catname":"基礎醫學","num":3,"stem":"當一個人正在思考如何解決問題時,大腦那一區域活性最高?","opts":{"A":"額葉(frontal lobe)","B":"顳葉(temporal lobe)","C":"枕葉(occipital lobe)","D":"頂葉(parietal lobe)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"disc":"physio","topic":"P12中樞感覺生理","q_num":3,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"額葉(frontal lobe)","B":"顳葉(temporal lobe)","C":"枕葉(occipital lobe)","D":"頂葉(parietal lobe)"},"img":""}],E={"101030-N1-26":{"quick":"正解(C)。右心室含缺氧的靜脈血(剛回心、尚未經肺氧合)，含氧量最低。","detail":{"background":"體循環與肺循環的含氧量：上下腔靜脈→右心房→「右心室」→肺動脈(以上皆為缺氧血，含氧量最低)→經肺氧合→肺靜脈→左心房→左心室→大動脈(以上皆為含氧血)。注意「肺『動脈』帶缺氧血、肺『靜脈』帶含氧血」與體循環相反。故四選項中含氧量最低者為右心室(缺氧血)。","options":{"A":"錯誤。肺靜脈帶含氧血回左心房。","B":"錯誤。大動脈為含氧血。","C":"正確。右心室為缺氧血，含氧量最低。","D":"錯誤。左心房為含氧血。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"101110-N1-27":{"quick":"正解(C)。第二心音(半月瓣關閉)發生在心室開始舒張，約在ECG的「T波之後」。","detail":{"background":"心音與ECG時序對應：①「第一心音(S1)」＝房室瓣關閉、心室收縮開始，約在「QRS複合波」之後;②「第二心音(S2)」＝主動脈瓣與肺動脈瓣(半月瓣)關閉、心室舒張開始，約在「T波之後(末)」。T波代表心室再極化(舒張)，其結束時半月瓣關閉產生S2。故S2在T波後。","options":{"A":"錯誤。P波是心房去極化(對應心房收縮)。","B":"錯誤。QRS對應S1之前。","C":"正確。S2約在T波之後。","D":"錯誤。PR時段為房室傳導延遲。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"101110-N1-28":{"quick":"正解(B)。浦金埃氏纖維(Purkinje fiber)傳導速度最快(約4 m/s)。","detail":{"background":"心臟傳導系統速度：竇房結(SA node)→心房肌→「房室結(AV node)傳導最慢(約0.05 m/s，延遲約0.1秒，讓心房先收縮)」→希氏束→左右束支→「浦金埃氏纖維(Purkinje fiber)傳導最快(約2–4 m/s)」→心室肌(約0.3–1 m/s)。Purkinje纖維快速傳導使心室同步收縮。故傳導最快者為浦金埃氏纖維、最慢者為房室結。","options":{"A":"錯誤。心房肌約0.3–0.5 m/s。","B":"正確。浦金埃氏纖維傳導最快。","C":"錯誤。房室結傳導最慢。","D":"錯誤。希氏束快但不及Purkinje。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"102030-N1-25":{"quick":"正解(D)。Starling定律的機制是「心肌纖維被拉長(初長度增加)」使橫橋重疊最適化，收縮力增強。","detail":{"background":"Frank–Starling心臟定律：舒張末期容積(EDV/前負荷)愈大→心肌纖維被血液充填而「拉長(肌節初長度增加)」→粗細肌絲重疊達最適長度、且增加肌絲對鈣的敏感度→下次收縮更有力(每搏輸出量增加)。此為心臟「自我調節(內在)」機制，不需神經參與。交感神經作用、SR釋鈣增加屬「外在(神經/化學)」調節收縮力，非Starling定律本身機制。故答案為心肌纖維長度增加。","options":{"A":"錯誤。鈣內流增加屬外在調節(交感)。","B":"錯誤。SR釋鈣增加屬外在調節。","C":"錯誤。交感神經作用是外在調節，非Starling機制。","D":"正確。Starling定律靠心肌纖維被拉長(初長度增加)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"102030-N1-27":{"quick":"正解(A)。自主神經主要作用於「竇房結(SA node)」以調節心跳速率(節律點)。","detail":{"background":"心跳速率(chronotropy)由「竇房結(SA node)」這個節律點決定。自主神經主要作用於SA node：交感神經(經β1受體)加快SA node自發去極化→心跳加快;迷走(副交感)神經(經M2受體)減慢SA node→心跳減慢。房室結、希氏束、浦金森纖維雖也受自律神經影響傳導，但決定「心跳速率」的主要作用點是SA node。","options":{"A":"正確。自主神經主要作用於SA node調節心率。","B":"錯誤。AV node主傳導延遲。","C":"錯誤。希氏束為傳導路徑。","D":"錯誤。浦金森纖維為心室快速傳導。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"102110-N1-27":{"quick":"正解(D)。等容收縮期房室瓣與半月瓣皆關閉，壓力為「主動脈>左心室>左心房」。","detail":{"background":"心室「等容(等長)收縮期(isovolumetric contraction)」：心室開始收縮、房室瓣已關閉(產生S1)，但壓力尚未超過主動脈→半月瓣仍關閉，故心室容積不變、壓力急速上升。此時壓力關係：主動脈壓(約80mmHg舒張壓，最高)>左心室壓(正在上升，尚<80)>左心房壓(最低)。當左心室壓超過主動脈壓時，主動脈瓣才打開、進入射血期。故等容收縮期為主動脈>左心室>左心房。","options":{"A":"錯誤。等容收縮期左心室尚未超過主動脈。","B":"錯誤。左心房非最高。","C":"錯誤。左心房壓最低。","D":"正確。等容收縮期主動脈>左心室>左心房。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"103030-N1-30":{"quick":"正解(D)。氧供應量＝動脈血氧含量×心輸出量＝200 ml/L × 5 L/min ＝ 1000 ml/min。","detail":{"background":"組織氧氣供應量(oxygen delivery, DO₂)＝「動脈血氧含量 × 心輸出量」。本題：動脈血氧含量200 ml/L，心輸出量5 L/min，故每分鐘供氧＝200 ml/L × 5 L/min ＝ 1000 ml/min(1公升氧/分鐘)。此公式臨床上用於評估組織灌流與氧供;貧血(血氧含量↓)或心衰竭(心輸出量↓)都會減少氧供。","options":{"A":"錯誤。計算錯誤。","B":"錯誤。200為每公升血氧含量，非總供氧。","C":"錯誤。500非正解。","D":"正確。200×5＝1000 ml/min。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"103030-N1-8":{"quick":"正解(C)。第二心音由心室舒張時「半月瓣(主動脈瓣與肺動脈瓣)關閉」產生。","detail":{"background":"心音成因：①第一心音(S1, \"lub\")＝心室『收縮』開始時「房室瓣(二尖瓣+三尖瓣)關閉」;②「第二心音(S2, \"dub\")＝心室『舒張』開始時『半月瓣(主動脈瓣+肺動脈瓣)關閉』」。瓣膜關閉造成血流突然減速與心室壁振動而發聲，並非瓣膜打開發聲。故S2＝心室舒張時半月瓣關閉。","options":{"A":"錯誤。房室瓣打開不發出明顯心音。","B":"錯誤。房室瓣關閉是第一心音。","C":"正確。心室舒張時半月瓣關閉產生第二心音。","D":"錯誤。半月瓣打開不發出明顯心音。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"103100-N1-26":{"quick":"正解(A)。久臥突然站起，血液因重力滯留下肢→靜脈回流↓、心輸出量↓、血壓↓(姿勢性低血壓)。","detail":{"background":"姿勢性(直立性)低血壓：長期臥床者血管壓力反射調節變遲鈍，突然站起時重力使血液滯留下肢靜脈→「靜脈回流(前負荷)減少→心輸出量減少→動脈血壓下降」，腦部灌流不足而頭暈、眼前發黑。正常人此時壓力反射(頸動脈竇)會迅速使交感興奮、心跳加快、血管收縮代償;久臥或自律神經失調者代償不及而暈厥。故三者(靜脈回流、心輸出量、血壓)皆下降。","options":{"A":"正確。三者皆下降(姿勢性低血壓)。","B":"錯誤。並非上升。","C":"錯誤。心輸出量隨回流下降。","D":"錯誤。血壓下降而非上升。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"104030-N1-19":{"quick":"正解(D為「非」者)。蕈毒鹼(muscarinic)受器活化使「平滑肌/心肌/腺體」作用;「骨骼肌收縮」是『菸鹼型(nicotinic)』受器，非蕈毒鹼。","detail":{"background":"乙醯膽鹼受體分兩型：①「蕈毒鹼型(muscarinic, M)」＝副交感節後作用於『心肌、平滑肌、腺體』——使心肌收縮力↓心跳↓、腸道與膀胱平滑肌收縮、腺體分泌↑;②「菸鹼型(nicotinic, N)」＝神經肌肉接合處(NMJ)使『骨骼肌收縮』與自律神經節傳遞。故「骨骼肌收縮」非蕈毒鹼受器作用(是菸鹼型)。其餘心肌收縮力減弱、腸道收縮、膀胱逼尿肌收縮皆為蕈毒鹼作用。","options":{"A":"是蕈毒鹼作用。減弱心肌收縮力。","B":"是蕈毒鹼作用。增強腸道張力。","C":"是蕈毒鹼作用。膀胱逼尿肌收縮。","D":"非(即為答案)。骨骼肌收縮是菸鹼型受器作用。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"104030-N1-7":{"quick":"正解(B)。第一心音由心室收縮時「房室瓣關閉」產生。","detail":{"background":"第一心音(S1)＝心室『收縮』開始時「房室瓣(二尖瓣+三尖瓣)關閉」造成;第二心音(S2)＝心室『舒張』開始時半月瓣關閉造成(與103030-8對照)。故S1＝心室收縮時房室瓣關閉。　深化：S1由二尖瓣與三尖瓣關閉（房室瓣）造成、低沉而長；S2由主動脈瓣與肺動脈瓣關閉造成、較高而短。S2在吸氣時因肺動脈瓣延遲關閉可生理性分裂。心音異常（如S3、S4、雜音）是心臟疾病的重要線索。","options":{"A":"錯誤。房室瓣打開不發明顯心音。","B":"正確。心室收縮時房室瓣關閉產生第一心音。","C":"錯誤。半月瓣關閉是第二心音。","D":"錯誤。半月瓣打開不發明顯心音。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"104100-N1-25":{"quick":"正解(D)。交感興奮活化心肌β1受體→cAMP↑→鈣離子↑→心跳加快、收縮力增強。","detail":{"background":"交感神經經β1腎上腺素受體作用於心肌：β1受體→Gs蛋白→活化腺苷酸環化酶→「cAMP增加」→活化PKA→磷酸化L型鈣通道使「鈣內流增加」、並促進SR釋鈣與回收→正性變時(心跳↑)、正性變力(收縮力↑)、正性變傳導。故cAMP與鈣離子濃度「皆增加」。副交感(M2)則相反，降cAMP。","options":{"A":"錯誤。鈣應增加。","B":"錯誤。cAMP應增加。","C":"錯誤。兩者皆增加，非減少。","D":"正確。交感β1作用使cAMP與鈣皆增加。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"105030-N1-27":{"quick":"正解(C)。每搏輸出量＝120−50＝70 ml;心輸出量＝70 ml×70次/分＝4900 ml/min＝4.9 L/min。","detail":{"background":"心輸出量(CO)＝每搏輸出量(SV)×心跳速率(HR)。每搏輸出量＝舒張末期容積(EDV)−收縮末期容積(ESV)＝120−50＝70 ml。心輸出量＝70 ml × 70次/分 ＝ 4900 ml/min ＝ 4.9 L/min。故答案4.9 L/min。射出分率(EF)＝SV/EDV＝70/120≈58%(正常)。","options":{"A":"錯誤。計算不符。","B":"錯誤。計算不符。","C":"正確。70 ml×70＝4900 ml＝4.9 L/min。","D":"錯誤。計算不符。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"105030-N1-28":{"quick":"正解(C)。交感神經活化使心跳加快(正性變時)且收縮力增加(正性變力)。","detail":{"background":"交感神經(經β1受體)對心臟的作用：①正性變時(positive chronotropy)＝心跳『加快』(加速SA node去極化);②正性變力(positive inotropy)＝收縮力『增強』(增加鈣內流);③正性變傳導＝加速AV node傳導。故交感活化＝心跳加快＋收縮力增加。副交感(迷走)則相反(心跳變慢)。","options":{"A":"錯誤。交感使心跳加快、收縮力增。","B":"錯誤。收縮力應增加。","C":"正確。交感活化使心跳加快、收縮力增加。","D":"錯誤。心跳應加快。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"105090-N1-24":{"quick":"正解(B)。由壓力曲線圖判讀：主動脈瓣在「乙」點打開(左心室壓上升超過主動脈壓)、在「丙」點關閉(左心室壓下降低於主動脈壓)。","detail":{"background":"依本題心動週期壓力曲線圖(左心室壓、主動脈壓、左心房壓)：①「甲」點＝舒張末期(左心室壓最低約10mmHg處，心房收縮小波)，是房室瓣將關、等容收縮前;②「乙」點＝左心室壓上升『超過』主動脈壓(約80mmHg)處＝『主動脈瓣打開』、射血期開始;③「丙」點＝左心室壓下降『低於』主動脈壓處(主動脈壓曲線出現切跡/dicrotic notch)＝『主動脈瓣關閉』、舒張開始;④「丁」點＝左心室壓降到低於左心房壓處＝房室瓣(二尖瓣)打開、充填開始。故主動脈瓣打開於乙、關閉於丙，答案乙和丙。","options":{"A":"錯誤。甲為等容收縮前、乙才開瓣。","B":"正確。主動脈瓣乙開、丙關。","C":"錯誤。丁為房室瓣開，非主動脈瓣。","D":"錯誤。順序不符。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"105090-N1-25":{"quick":"正解(A)。前負荷(舒張末期容積)最大時間點為「甲」(舒張末期、心室充填完成、等容收縮前)。","detail":{"background":"前負荷(preload)＝心室收縮前被血液充填的程度，以「舒張末期容積(EDV)」表示，發生在『舒張末期、心室充填完成、即將開始收縮(等容收縮前)』。對照本題壓力曲線圖，此時間點為「甲」(左心室壓最低、心房收縮(a波)剛把最後血量擠入心室、心室容積最大之時)。乙(主動脈瓣開,射血中)、丙(主動脈瓣關)、丁(房室瓣開)皆非最大充填點。故最大前負荷為甲。","options":{"A":"正確。甲為舒張末期、前負荷(EDV)最大。","B":"錯誤。乙為射血期。","C":"錯誤。丙為主動脈瓣關閉(舒張開始)。","D":"錯誤。丁為房室瓣打開、充填開始。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"106110-N1-27":{"quick":"正解(C)。QRS複合波由「心室去極化」產生。","detail":{"background":"心電圖(ECG)波形對應：①P波＝心房去極化(對應心房收縮);②「QRS複合波＝心室去極化」(對應心室收縮開始;心房再極化被掩蓋於QRS中);③T波＝心室再極化(對應心室舒張)。故QRS為心室去極化。　深化：ECG各波對應：P波（心房去極化）、QRS（心室去極化，心房再極化被掩蓋其中）、T波（心室再極化）。PR間期反映房室傳導、QT間期反映心室電活動全程，QT延長有致命心律不整風險。","options":{"A":"錯誤。心房去極化是P波。","B":"錯誤。心房再極化被QRS掩蓋。","C":"正確。QRS為心室去極化。","D":"錯誤。心室再極化是T波。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"107030-N1-19":{"quick":"正解(C)。迷走(副交感)神經興奮使心跳變慢且傳導速度變慢。","detail":{"background":"迷走神經(副交感，經M2受體)對心臟：①負性變時＝心跳『變慢』(抑制SA node);②負性變傳導＝AV node傳導『變慢』(可致房室傳導阻滯);③負性變力(心房為主)。故迷走興奮＝心跳變慢＋傳導變慢(皆變慢)。交感則皆變快。臨床：按摩頸動脈竇刺激迷走可減慢心室上心搏過速。","options":{"A":"錯誤。傳導應變慢非變快。","B":"錯誤。心跳應變慢。","C":"正確。迷走興奮使心跳與傳導皆變慢。","D":"錯誤。會改變(變慢)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"107030-N1-27":{"quick":"正解(C)。動作電位在「房室結(AV node)」有延遲傳遞(約0.1秒)。","detail":{"background":"「房室結(AV node)」傳導速度最慢(約0.05 m/s)，造成約「0.1秒的房室延遲(對應ECG的PR間段)」，其生理意義是讓『心房先完成收縮、把血充入心室後，心室才收縮』，確保有效充填。竇房結是節律點、希氏束與浦金森纖維傳導快。故延遲傳遞發生在房室結。","options":{"A":"錯誤。心室肌傳導不延遲。","B":"錯誤。竇房結為節律點。","C":"正確。房室結造成房室延遲。","D":"錯誤。希氏束傳導快。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"108020-N1-29":{"quick":"正解(C)。大量K⁺會使心房傳到心室的衝動被阻斷(高血鉀致傳導阻滯/心律不整)。","detail":{"background":"心臟敘述辨析：(A)迷走神經主要分布『心房(SA、AV node)』而非心室，且降低心跳速率與心房收縮力(非主要降心室收縮強度)，故錯;(B)正常時左右心室『輸出量相等』(肺循環=體循環)，故錯;(C)「高血鉀(K⁺過多)會降低靜止膜電位、使心肌興奮性與傳導性下降→房室傳導阻斷、心律不整甚至心跳停止」——正確;(D)細胞外鈣過多增加收縮力但過量會致心律不整/停搏，並非單純「使心跳加快」，故錯。故正確者為(C)。","options":{"A":"錯誤。迷走主要分布心房。","B":"錯誤。左右心室輸出量相等。","C":"正確。高血鉀阻斷房室傳導。","D":"錯誤。過量鈣致心律不整，非單純加快。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"108020-N1-30":{"quick":"正解(A)。第一心音與「房室瓣關閉」有關。","detail":{"background":"第一心音(S1)由心室收縮開始時「房室瓣(二尖瓣、三尖瓣)關閉」產生(與104030-7、109110-20對照);動脈(半月)瓣關閉是第二心音。血液流入心室、心房收縮不產生明顯心音。故與S1有關者為房室瓣關閉。　深化：S1（房室瓣關閉，收縮期始）、S2（半月瓣關閉，舒張期始）是正常心音；額外的S3（心室快速充盈，可見於心衰）、S4（心房收縮對抗僵硬心室）為病理性。心音時序與雜音定位是心臟聽診的基礎。","options":{"A":"正確。房室瓣關閉產生第一心音。","B":"錯誤。動脈瓣關閉是第二心音。","C":"錯誤。血液流入心室不發明顯音。","D":"錯誤。心房收縮可能有S4但非S1主因。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"109030-N1-25":{"quick":"正解(B)。心肌動作電位的高原期由「L型鈣通道」持續鈣內流維持。","detail":{"background":"心室肌動作電位分五期：第0期(快速去極化，快速Na⁺內流)→第1期(短暫部分再極化)→「第2期高原期(plateau)＝『L型鈣通道(慢鈣通道)』開放、鈣持續內流，與鉀外流平衡，使去極化維持約200–300ms」→第3期(再極化，鉀外流)→第4期(靜止)。高原期延長不反應期，防止心肌強直收縮。故維持高原期者為L型鈣通道。","options":{"A":"錯誤。快鈉通道負責第0期去極化。","B":"正確。L型鈣通道維持高原期。","C":"錯誤。鈉鉀ATPase維持離子梯度，非高原期。","D":"錯誤。T型鈣通道主要在節律細胞。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"109030-N1-26":{"quick":"正解(A)。心肌梗塞後死亡心肌由「結締組織(纖維疤痕)」取代。","detail":{"background":"心肌細胞屬「永久細胞(permanent cell)」，出生後幾乎不能再生。缺血性心肌梗塞造成心肌壞死後，無法由新心肌細胞補充，而是由「纖維母細胞增生形成『結締組織(膠原纖維疤痕)』」取代(疤痕癒合)，此疤痕無收縮力，可致心室重塑、心衰竭或室壁瘤。故取代死亡心肌者為結締組織。","options":{"A":"正確。死亡心肌由結締組織(疤痕)取代。","B":"錯誤。心肌細胞不能再生。","C":"錯誤。微血管非主要取代組織。","D":"錯誤。巨噬細胞只清除壞死碎片。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"109110-N1-18":{"quick":"正解(B)。心肌不反應期幾乎與收縮期重疊(高原期長)，故無法加成/強直收縮。","detail":{"background":"心肌動作電位有很長的「高原期」使「絕對不反應期(refractory period)幾乎與整個收縮期重疊」，下一個刺激必須等心肌幾乎完全舒張後才能再興奮，因此心肌『無法產生收縮力加成(summation)或強直收縮(tetanus)』——這保證心臟能規律舒張充填、交替收縮舒張以打血。相對地骨骼肌不反應期短，可加成成強直收縮。故原因為心肌不反應期與收縮時間重疊。","options":{"A":"錯誤。心肌有橫小管。","B":"正確。心肌不反應期幾乎與收縮期重疊，故不加成。","C":"錯誤。動作電位本就不加成，但關鍵是不反應期長。","D":"錯誤。心肌SR雖較骨骼肌少但非主因。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"109110-N1-20":{"quick":"正解(D)。第一心音發生於「房室瓣關閉」時(心室收縮開始)。","detail":{"background":"第一心音(S1)＝心室收縮開始、「房室瓣關閉」時產生(與104030-7、108020-30對照);主動脈瓣關閉是第二心音、心房收縮可能產生S4。故S1發生於房室瓣關閉時。　深化：心音聽診定位：S1在心尖（二尖瓣區）最響、標誌心室收縮期開始；S2在心底（主動脈/肺動脈瓣區）最響、標誌舒張期開始。S1與頸動脈搏動幾乎同步，可藉此區分S1、S2。","options":{"A":"錯誤。心房收縮對應S4。","B":"錯誤。早期心室舒張對應S3。","C":"錯誤。主動脈瓣關閉是第二心音。","D":"正確。房室瓣關閉時產生第一心音。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"109110-N1-28":{"quick":"正解(C)。心臟收縮最主要的能量來源是「脂肪酸(β氧化)」。","detail":{"background":"心肌是高度有氧代謝的組織，靜息時約60–70%的ATP來自「脂肪酸(游離脂肪酸)β氧化」，其餘來自葡萄糖、乳酸、酮體等;心肌幾乎全靠有氧代謝(粒線體密度高)，缺氧時功能迅速受損(故冠狀動脈阻塞致心肌梗塞)。故心臟收縮主要能量來源為脂肪酸。　深化：心肌靜息時主要以脂肪酸β氧化供能（約60-70%），缺血時轉以葡萄糖無氧糖解（產乳酸、效率低）。心肌幾乎無法借氧債、高度依賴持續冠脈供氧，故冠狀動脈阻塞數分鐘即致心肌缺血壞死。","options":{"A":"錯誤。葡萄糖只佔部分。","B":"錯誤。蛋白質非主要燃料。","C":"正確。脂肪酸是心肌主要能量來源。","D":"錯誤。核酸非能量來源。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"111110-N1-13":{"quick":"正解(B為「最不重要」者)。血流速率由壓力差、血管半徑、血液黏滯度決定(Poiseuille定律);「心跳速率」最不直接決定血流『速率』。","detail":{"background":"血流量/速率由Poiseuille定律決定：血流量∝(壓力差×半徑⁴)/(黏滯度×長度)。故決定血流的關鍵是「①血管兩端壓力差、②血管半徑(影響最大,4次方)、③血液黏滯度」。心跳速率影響心輸出量與整體循環，但對『某段血管的血流速率』而言最不直接(本題問決定血流速率最不重要者)。故答案為心跳速率。","options":{"A":"重要。黏滯度影響血流(反比)。","B":"最不重要(即為答案)。心跳速率非決定血流速率的直接因素。","C":"重要。血管半徑影響最大(4次方)。","D":"重要。壓力差是驅動力。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"112030-N1-16":{"quick":"正解(D)。阻斷蕈毒鹼(M2)受器→解除迷走對心臟的抑制→「心跳速率上升」。","detail":{"background":"阻斷蕈毒鹼(muscarinic)受器(如atropine)的作用＝『移除副交感(迷走)的作用』：①心臟M2被阻斷→心跳『加快』;②支氣管M3阻斷→支氣管『舒張』(非收縮);③腸胃M3阻斷→蠕動分泌『減少』;④眼M3阻斷→瞳孔『散大』(非收縮)。故阻斷蕈毒鹼受器造成的是「心跳速率上升」。其餘選項(支氣管收縮、腸胃活性增強、瞳孔收縮)都是『活化』蕈毒鹼受器的作用、與阻斷相反。","options":{"A":"錯誤。阻斷M受器使支氣管舒張。","B":"錯誤。阻斷使腸胃活性降低。","C":"錯誤。阻斷使瞳孔散大。","D":"正確。阻斷M2使心跳上升。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"112030-N1-17":{"quick":"正解(C)。心肌快反應細胞的高原期由「鈣離子」持續內流維持。","detail":{"background":"心室肌(快反應細胞)動作電位的「第2期高原期」是『鈣離子(經L型鈣通道)持續內流』與鉀外流達平衡所致，使去極化維持較久、延長不反應期(防強直收縮)，並促進興奮-收縮偶聯。故高原期主因是鈣離子持續內流(與109030-25同概念)。　深化：心室肌動作電位的高原期（第2期）由L型鈣通道持續內流維持，使收縮延長、不應期長，避免心肌強直收縮（保證舒張充盈）。此鈣內流也觸發肌漿網釋鈣（鈣誘發鈣釋放），是心肌興奮收縮耦合的關鍵。","options":{"A":"錯誤。鉀外流造成再極化(第3期)。","B":"錯誤。鈉內流是第0期。","C":"正確。鈣離子持續內流維持高原期。","D":"錯誤。氯離子非高原期主因。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"112030-N1-18":{"quick":"正解(C為「最不可能」者)。敗血性休克屬「分布性休克」，初期心輸出量常『增加(高動力期)』而非明顯降低。","detail":{"background":"敗血性休克(septic shock)屬「分布性(distributive)休克」：細菌(及內毒素)引起全身發炎反應、血管廣泛擴張與通透性增加→周邊阻力下降。其典型病程：①常由腹膜炎、泌尿道感染等感染源引起(故A、B可能)、有發燒;②「初期(高動力/暖休克期)心輸出量反而『增加』、四肢溫暖、脈壓增大」(因阻力低、代償性心輸出量上升)——故(C)說「初期心輸出量明顯降低」為『最不可能』;③可併發瀰漫性血管內凝血(DIC，全身小血塊)(故D可能)。故最不可能者為(C)。","options":{"A":"可能。腹膜炎為感染源、會發燒。","B":"可能。泌尿道感染為常見感染源。","C":"最不可能(即為答案)。敗血性休克初期心輸出量常增加(高動力期)。","D":"可能。可併發DIC(全身小血塊)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"112110-N1-16":{"quick":"正解(C)。過敏性(全身性過敏)休克特徵為「小動脈(全身血管)擴張」致血壓驟降。","detail":{"background":"過敏性(anaphylactic)休克屬「分布性休克」：IgE媒介的第一型過敏反應，肥大細胞/嗜鹼性球大量釋放「組織胺」等→全身「小動脈與血管廣泛『擴張』、微血管通透性『增加』(血漿外滲)」→周邊阻力與血壓驟降、心輸出量下降，並有支氣管痙攣、喉頭水腫。治療首選腎上腺素(收縮血管、擴張支氣管)。故特徵為小動脈擴張。(B)釋放組織胺的是肥大細胞/嗜鹼性球(非嗜酸性球)、(A)心輸出量下降、(D)微血管通透性增加，皆與選項相反。故答案(C)。","options":{"A":"錯誤。心輸出量下降。","B":"錯誤。釋組織胺是肥大細胞/嗜鹼性球，非嗜酸性球。","C":"正確。過敏性休克小動脈擴張致低血壓。","D":"錯誤。微血管通透性增加(非降低)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"112110-N1-17":{"quick":"正解(A)。第一心音發生於「心室收縮開始時」(房室瓣關閉)。","detail":{"background":"第一心音(S1)＝心室『收縮開始』時房室瓣關閉產生(標誌收縮期開始);第二心音(S2)＝心室『舒張開始』時半月瓣關閉。故S1發生於心室收縮開始時(與109110-20、104030-7對照)。　深化：S1標誌心室收縮期（systole）開始、S2標誌舒張期（diastole）開始，兩者之間為收縮期。心動週期的壓力—容積關係與心音時序是判讀心臟功能的基礎，瓣膜開關時機決定心音與雜音的時相。","options":{"A":"正確。第一心音在心室收縮開始時。","B":"錯誤。收縮結束接近S2。","C":"錯誤。心室舒張開始是第二心音。","D":"錯誤。舒張結束接近S1前。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"113180-N1-17":{"quick":"正解(A)。由ECG圖判讀，R-R間隔約0.86–0.9秒，心跳速率＝60÷0.86≈70次/分。","detail":{"background":"ECG算心率：心率(次/分)＝60÷R-R間隔(秒)。依本題ECG圖，相鄰兩個R波(第一個R約在0.25秒、第二個R約在1.15秒)的「R-R間隔約0.86–0.9秒」，故心跳速率＝60÷0.86≈70次/分。臨床快速法亦可用「300÷R-R間的大格數(每大格0.2秒)」估算。故答案約70次/分。","options":{"A":"正確。R-R約0.86秒→約70次/分。","B":"錯誤。78需R-R約0.77秒。","C":"錯誤。94需R-R約0.64秒。","D":"錯誤。104需R-R約0.58秒。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"114030-N1-1":{"quick":"正解(C)。心肌靠「細胞外流入的鈣離子」觸發肌漿網釋放更多鈣(鈣誘發鈣釋放)。","detail":{"background":"心肌的興奮-收縮偶聯採「鈣誘發鈣釋放(calcium-induced calcium release, CICR)」：動作電位高原期時，少量「細胞外鈣經L型鈣通道流入」→觸發肌漿網(SR)上的ryanodine receptor(RyR2)釋放大量儲存鈣→啟動收縮。這與骨骼肌不同(骨骼肌靠T管電位變化直接機械偶聯DHP-RyR1、不需細胞外鈣流入)。故心肌SR釋鈣是受『細胞外流入的鈣離子』刺激。","options":{"A":"錯誤。鈉內流是去極化第0期。","B":"錯誤。IP3主要在平滑肌/非心肌主要機制。","C":"正確。細胞外鈣內流觸發SR釋鈣(CICR)。","D":"錯誤。骨骼肌才靠膜電位直接偶聯。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Heart 章","實用生理學（華杏）心臟循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.20"]}},"101030-N1-17":{"quick":"正解(C)。無氧快肌(白肌, type II)肝醣分解快、易堆積乳酸，較容易疲乏。","detail":{"background":"肌纖維分型：①「慢肌(紅肌, type I)」＝有氧、富粒線體與肌紅素與微血管、抗疲勞、運動單位小、先收縮、適合耐力(如姿勢維持);②「快肌(白肌, type II)」＝無氧糖解為主、收縮快而力大、肝醣多、粒線體少、『易疲乏』、運動單位大、纖維粗。故無氧快肌「比較容易疲乏」。其運動單位較大(A錯)、纖維較粗(B錯)、慢肌先收縮(D錯)。","options":{"A":"錯誤。快肌運動單位較大。","B":"錯誤。快肌纖維較粗。","C":"正確。無氧快肌易疲乏。","D":"錯誤。慢肌先收縮(size principle)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"101030-N1-30":{"quick":"正解(A)。每100 mL動脈血流過組織約釋放5 mL氧(動靜脈氧差約5 vol%)。","detail":{"background":"氧合解離曲線與組織攝氧：動脈血每100 mL約含20 mL氧(98%飽和)，流經安靜組織後靜脈血每100 mL約含15 mL氧(75%飽和)，故「每100 mL血液約釋放5 mL氧到組織」(動靜脈氧含量差約5 vol%)。運動時組織攝氧增加，釋放量可達15 mL/100 mL。故安靜時約釋放5 mL/100 mL。","options":{"A":"正確。安靜時約釋放5 mL/100 mL血。","B":"錯誤。10 mL為較劇烈活動。","C":"錯誤。15 mL為運動時。","D":"錯誤。20 mL為全部釋出(不可能)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"101110-N1-18":{"quick":"正解(B為「最不可能」者)。肌肉疲勞時ATP與肝醣耗竭、乳酸『堆積上升』(非降低)、pH下降、張力變小;說「ATP及lactate含量降低」中lactate應上升，故最不可能。","detail":{"background":"骨骼肌疲勞的代謝變化：①能量來源耗竭——肝醣(glycogen)、磷酸肌酸(creatine phosphate)、ATP『減少』;②無氧糖解使「乳酸(lactate)『堆積增加』」→pH『下降(酸化)』;③酸化與磷酸堆積干擾橫橋循環與鈣釋放→「收縮張力變小」。本題問「最不可能發生」：(B)「ATP及lactate含量降低」中『乳酸應上升而非降低』，故最不可能。其餘(A肝醣磷酸肌酸減少)、(C pH降低)、(D張力變小)皆會發生。","options":{"A":"會發生。肝醣與磷酸肌酸減少。","B":"最不可能(即為答案)。乳酸是堆積上升，非降低。","C":"會發生。pH下降(酸化)。","D":"會發生。收縮張力變小。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"102030-N1-17":{"quick":"正解(A)。放鬆時鈣離子被「鈣幫浦(SERCA)主動打回肌漿網」，使鈣濃度下降而放鬆。","detail":{"background":"肌肉放鬆機制：收縮停止(動作電位結束)後，肌漿網膜上的「鈣-ATP酶(SERCA幫浦)主動把肌漿中的鈣離子打回肌漿網儲存」→肌漿鈣濃度下降→鈣離開旋轉素(troponin)→旋轉肌凝素(tropomyosin)回位遮住肌動蛋白結合位→橫橋分離→肌肉放鬆。故放鬆主因是鈣被幫浦回收進SR。","options":{"A":"正確。鈣被鈣幫浦打回肌漿網而放鬆。","B":"錯誤。骨骼肌收縮鈣來自SR非細胞外。","C":"錯誤。鈣濃度應下降而非維持。","D":"錯誤。鈣下降使troponin回位、橫橋分離。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"102110-N1-18":{"quick":"正解(D)。正常生理狀態下肌肉的靜止長度(resting length)約等於可產生最大張力的最適長度(optimal length)。","detail":{"background":"骨骼肌「長度-張力關係」：肌節在「最適長度(optimal length)」時粗細肌絲重疊最佳、可形成最多橫橋→產生『最大主動張力』。太短(肌絲過度重疊)或太長(重疊太少)張力都下降。人體骨骼肌在「正常靜止長度(resting length)時約等於最適長度」，故能有效收縮。(A)起始長度在一定範圍內與張力『正相關』(到最適長度);(B)最適長度是產生最大張力的長度，非「收縮後可完全舒張」;(C)橫橋越多力量『越大』。故正確者為(D)。","options":{"A":"錯誤。一定範圍內起始長度與張力正相關。","B":"錯誤。最適長度是產生最大張力的長度。","C":"錯誤。橫橋越多力量越大。","D":"正確。靜止長度約等於最適長度。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"103030-N1-19":{"quick":"正解(B)。骨骼肌與心肌靠鈣『直接結合旋轉素(troponin)』啟動收縮;平滑肌無troponin、靠鈣-攜鈣素。","detail":{"background":"橫紋肌(骨骼肌、心肌)有「旋轉素(troponin)」：鈣離子『直接結合troponin C』→旋轉肌凝素移位→露出肌動蛋白結合位→橫橋循環收縮。而「平滑肌『無troponin』」，其收縮靠『鈣結合攜鈣素(calmodulin)→活化肌凝蛋白輕鏈激酶(MLCK)→磷酸化肌凝蛋白』啟動。故由鈣『直接結合troponin』收縮者為骨骼肌與心肌。","options":{"A":"錯誤。平滑肌無troponin。","B":"正確。骨骼肌與心肌靠鈣結合troponin。","C":"錯誤。平滑肌無troponin。","D":"錯誤。平滑肌無troponin。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"103100-N1-17":{"quick":"正解(A)。骨骼肌的鈣離子主要儲存於「肌漿網(SR)」。","detail":{"background":"骨骼肌細胞內鈣的主要儲存庫是「肌漿(質)網(sarcoplasmic reticulum, SR)」(特化的滑面內質網)，末端終池儲存大量鈣;興奮時經ryanodine receptor釋放鈣啟動收縮、放鬆時由SERCA回收。T小管只傳遞電訊號(非儲鈣)、粒線體可少量緩衝鈣但非主庫。故主要儲鈣處為肌漿網。","options":{"A":"正確。骨骼肌鈣儲存於肌漿網。","B":"錯誤。粒線體僅少量緩衝。","C":"錯誤。T小管傳電訊號、不儲鈣。","D":"錯誤。微粒體非鈣主庫。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"104100-N1-17":{"quick":"正解(A)。收縮時「明帶(I band)」縮短;暗帶(A band)與粗、細肌絲長度不變。","detail":{"background":"肌絲滑動學說：肌肉收縮時細肌絲向肌節中央滑入，使「I帶(明帶，只有細肌絲處)縮短、H帶縮短、Z線靠近、肌節變短」，但「A帶(暗帶，粗肌絲全長)長度不變」，且粗、細肌絲本身長度都不變(只是重疊增加)。故收縮時長度變短的是明帶(I band)。","options":{"A":"正確。收縮時明帶(I band)縮短。","B":"錯誤。暗帶(A band)長度不變。","C":"錯誤。粗肌絲長度不變。","D":"錯誤。細肌絲長度不變。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"105030-N1-17":{"quick":"正解(B)。骨骼肌鈣結合旋轉素(troponin);平滑肌鈣結合攜鈣素(calmodulin)。","detail":{"background":"骨骼肌 vs 平滑肌收縮機制：①啟動鈣來源——骨骼肌鈣主要來自『SR』(不需細胞外鈣流入)，平滑肌則『需部分細胞外鈣流入』(A錯，並非兩者皆需細胞外鈣);②鈣作用標的——「骨骼肌鈣結合『旋轉素troponin』，平滑肌鈣結合『攜鈣素calmodulin』→活化MLCK」(B正確);③橫小管——骨骼肌有T小管、『平滑肌無典型橫小管』(C錯);④平滑肌『無troponin/tropomyosin系統的旋轉素』，故(D錯)。故正確者為(B)。","options":{"A":"錯誤。骨骼肌收縮鈣主要來自SR、不需細胞外鈣。","B":"正確。骨骼肌鈣結合troponin、平滑肌結合calmodulin。","C":"錯誤。平滑肌無典型橫小管。","D":"錯誤。平滑肌無troponin系統。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"105090-N1-18":{"quick":"正解(C)。紅肌(慢肌)含較多粒線體(有氧代謝)。","detail":{"background":"紅肌(慢肌, type I)因富含「肌紅素(myoglobin)」與大量「粒線體、微血管」而呈紅色、行有氧代謝、抗疲勞;白肌(快肌, type II)肌紅素與粒線體少、行無氧糖解、易疲勞。故(C)「紅肌比白肌含更多粒線體」正確。(A)紅肌是有氧肌、(B)紅色因肌紅素(非血紅素)、(D)紅肌纖維一般較『細』。","options":{"A":"錯誤。紅肌是有氧肌。","B":"錯誤。紅色因肌紅素(myoglobin)，非血紅素。","C":"正確。紅肌含更多粒線體。","D":"錯誤。紅肌纖維一般較細。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"106030-N1-17":{"quick":"正解(A)。ATP結合於「肌凝蛋白(myosin)」頭部(具ATPase活性)。","detail":{"background":"橫橋循環中，「ATP結合於『肌凝蛋白(myosin)』頭部」——myosin頭具ATPase，水解ATP提供力擊(power stroke)能量、且ATP結合使橫橋與肌動蛋白『分離』。肌動蛋白(actin)是被結合的對象;旋轉素(troponin)與旋轉肌凝素(tropomyosin)是調節蛋白、不直接結合ATP。故ATP結合於肌凝蛋白。","options":{"A":"正確。ATP結合於肌凝蛋白頭部。","B":"錯誤。肌動蛋白是被結合對象。","C":"錯誤。旋轉素是鈣結合調節蛋白。","D":"錯誤。旋轉肌凝素是調節蛋白。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"106110-N1-18":{"quick":"正解(B)。骨骼肌與心肌有明顯橫紋(明暗帶);平滑肌無橫紋。","detail":{"background":"橫紋(striation，明暗帶相間)源自肌節中粗細肌絲規則排列，見於「骨骼肌與心肌(橫紋肌)」;「平滑肌(smooth muscle)」肌絲排列不規則、『無橫紋』(故名平滑)。故有明顯橫紋者為骨骼肌與心肌。　深化：橫紋肌（骨骼肌、心肌）因肌節中粗細肌絲規則排列而有明暗橫紋；平滑肌無肌節排列故無橫紋，靠緻密體與斜向肌絲收縮。心肌雖有橫紋但為單核、有間盤（閏盤）與自律性，與骨骼肌不同。","options":{"A":"錯誤。平滑肌無橫紋。","B":"正確。骨骼肌與心肌有橫紋。","C":"錯誤。平滑肌無橫紋。","D":"錯誤。平滑肌無橫紋。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"106110-N1-19":{"quick":"正解(C)。「多核(multiple nuclei)」為骨骼肌特有;心肌單核、平滑肌單核。","detail":{"background":"肌肉三型細胞核：①「骨骼肌＝多核(multinucleated)」(由多個肌母細胞融合而成，核位於細胞周邊);②心肌＝單核(偶雙核)、有間盤;③平滑肌＝單核(中央)。橫小管骨骼肌與心肌都有(平滑肌無)、SR三者皆有、troponin骨骼肌與心肌有。故「多核」為骨骼肌特有。","options":{"A":"錯誤。橫小管骨骼肌與心肌都有。","B":"錯誤。SR三型肌都有。","C":"正確。多核為骨骼肌特有。","D":"錯誤。troponin骨骼肌與心肌都有。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"107030-N1-18":{"quick":"正解(B)。骨骼肌鈣由肌漿網上的「雷恩諾鹼受體(ryanodine receptor, RyR)」釋放。","detail":{"background":"骨骼肌興奮-收縮偶聯：T小管的電位變化使T小管膜上的「雙氫吡啶受體(DHPR，電壓感應器)」機械性開啟肌漿網上的「雷恩諾鹼受體(ryanodine receptor, RyR1)」鈣釋放通道→SR釋放鈣。IP3受體主要在平滑肌與非肌細胞;ACh受體在NMJ;故骨骼肌SR釋鈣通道為ryanodine receptor。","options":{"A":"錯誤。IP3受體主要在平滑肌。","B":"正確。骨骼肌SR鈣由ryanodine receptor釋放。","C":"錯誤。ACh受體在神經肌肉接合處。","D":"錯誤。PIP2非鈣釋放受體。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"108020-N1-18":{"quick":"正解(C)。肌肉初期(數秒)收縮的主要能量來源是「磷酸肌酸(creatine phosphate)」。","detail":{"background":"肌肉能量供應時序：①最初幾秒——細胞內既有「ATP」與「磷酸肌酸(creatine phosphate, CP)」快速再生ATP(CP+ADP→ATP+肌酸，由肌酸激酶催化);②數十秒到數分鐘——無氧糖解(葡萄糖→乳酸);③持久運動——有氧代謝(葡萄糖、脂肪酸氧化)。故「初期收縮」主要能量來源為磷酸肌酸。","options":{"A":"錯誤。葡萄糖糖解供應中期。","B":"錯誤。胺基酸非主要燃料。","C":"正確。磷酸肌酸是初期能量來源。","D":"錯誤。脂肪酸供應持久運動。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"108020-N1-26":{"quick":"正解(D為「不參與」者)。攜鈣素(calmodulin)是『平滑肌』收縮的鈣結合蛋白，不參與骨骼肌收縮。","detail":{"background":"骨骼肌收縮蛋白：收縮蛋白(肌凝蛋白myosin、肌動蛋白actin)＋調節蛋白(旋轉素troponin、旋轉肌凝素tropomyosin)。「攜鈣素(calmodulin)」是『平滑肌』收縮時鈣的結合蛋白(鈣-calmodulin活化MLCK)，骨骼肌『不用calmodulin』(骨骼肌用troponin)。故不參與骨骼肌收縮者為攜鈣素。","options":{"A":"參與。肌凝蛋白為收縮蛋白。","B":"參與。旋轉素為調節蛋白。","C":"參與。旋轉肌凝素為調節蛋白。","D":"不參與(即為答案)。攜鈣素是平滑肌的鈣結合蛋白。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"108110-N1-20":{"quick":"正解(B)。肌原纖維(myofibril)由肌絲(肌動蛋白與肌凝蛋白絲)組成。","detail":{"background":"肌肉結構層級：肌肉→肌束→「肌纖維(肌細胞)」→「肌原纖維(myofibril)」→「肌絲(粗肌絲myosin、細肌絲actin)」。故(B)「圓柱形的肌原纖維由肌絲組成」正確。(A)肌原纖維是肌細胞『內』的構造、非由整個肌細胞組成;(C)儲鈣的膜狀結構是肌漿網(非肌原纖維);(D)連接肌肉與肌腱的是肌內/外膜結締組織。故正確者為(B)。","options":{"A":"錯誤。肌原纖維在肌細胞內，非由整個肌細胞組成。","B":"正確。肌原纖維由肌絲組成。","C":"錯誤。儲鈣膜狀結構是肌漿網。","D":"錯誤。連接肌腱的是結締組織膜。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"109030-N1-21":{"quick":"正解(C)。骨骼肌受損由「衛星細胞(satellite cell)」進行修補/再生。","detail":{"background":"骨骼肌屬「穩定/相對不能再生」的組織，但其周邊有「衛星細胞(satellite cell)」——一種肌肉幹細胞，平時靜止，肌肉受損或訓練時被活化、增生分化為肌母細胞、融入或形成新肌纖維以修補。纖維母細胞形成疤痕、賽氏細胞在睪丸、肌母細胞是發育期前驅。故修補骨骼肌者為衛星細胞。","options":{"A":"錯誤。肌母細胞是胚胎發育期前驅。","B":"錯誤。纖維母細胞形成疤痕。","C":"正確。衛星細胞修補骨骼肌。","D":"錯誤。賽氏細胞在睪丸。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"110030-N1-19":{"quick":"正解(C)。心肌興奮時細胞外流入的鈣『小於』肌漿網釋放的鈣(鈣誘發鈣釋放，SR放大)。","detail":{"background":"心肌興奮-收縮偶聯採「鈣誘發鈣釋放(CICR)」：少量「細胞外鈣經L型鈣通道流入」當『觸發』→誘發肌漿網(SR)釋放『大量』鈣。故「細胞外流入的鈣量『小於』SR釋放的量」(SR是主要鈣源，細胞外鈣只是觸發放大器)。雖然心肌比骨骼肌更依賴細胞外鈣(骨骼肌幾乎全靠SR)，但量上仍是SR釋放較多。故答案(C)。","options":{"A":"錯誤。兩者不相等。","B":"錯誤。細胞外鈣較少。","C":"正確。細胞外流入鈣小於SR釋放量。","D":"錯誤。粒線體非主要鈣源。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"110110-N1-17":{"quick":"正解(A)。骨骼肌與心肌都透過橫小管(T-tubule)傳導動作電位入細胞深部。","detail":{"background":"骨骼肌與心肌比較：(A)兩者皆有「橫小管(T-tubule)」把動作電位傳入細胞深部以同步釋鈣——正確;(B)骨骼肌收縮快、心肌中等(非都很慢);(C)長度-張力關係兩者都有最適長度、超過後張力反而下降(非越長越大);(D)『骨骼肌單一纖維可因刺激頻率增加而張力加成(強直)』，但『心肌因不反應期長無法加成』，故(D)錯。故正確者為(A)。","options":{"A":"正確。骨骼肌與心肌都用T小管傳導動作電位。","B":"錯誤。骨骼肌收縮快。","C":"錯誤。超過最適長度張力反下降。","D":"錯誤。心肌無法因頻率增加而加成。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"111030-N1-18":{"quick":"正解(C)。肌肉無氧呼吸(無氧糖解)主要使用「葡萄糖(肝醣)」分解為乳酸。","detail":{"background":"肌肉「無氧呼吸(無氧糖解, anaerobic glycolysis)」是把「葡萄糖(或肝醣)」分解為丙酮酸再還原成『乳酸』，每分子葡萄糖淨產2 ATP(快但少)，供應劇烈運動時的能量;乳酸是『產物』非燃料。脂肪、蛋白質需有氧代謝。故無氧呼吸的能量來源為葡萄糖。","options":{"A":"錯誤。乳酸是無氧糖解的產物。","B":"錯誤。蛋白質需有氧代謝。","C":"正確。無氧糖解用葡萄糖(肝醣)。","D":"錯誤。脂肪需有氧代謝。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"111030-N1-29":{"quick":"正解(C)。收縮時「I帶與H帶皆縮短」(細肌絲向中央滑入)。","detail":{"background":"肌絲滑動：收縮時細肌絲向肌節中央滑入→「I帶(只有細肌絲處)縮短」、「H帶(只有粗肌絲處)縮短」、Z線靠近、肌節變短;而A帶(粗肌絲全長)不變。故收縮時I帶與H帶『皆縮短』(與104100-17互補)。　深化：骨骼肌收縮的肌絲滑動學說：粗（肌凝蛋白）與細（肌動蛋白）肌絲互相滑動使肌節縮短，A帶（粗肌絲長度）不變、I帶與H帶縮短。鈣離子與旋光素結合、橫橋循環（需ATP）是滑動的分子機制。","options":{"A":"錯誤。H帶也會縮短。","B":"錯誤。I帶也會縮短。","C":"正確。I帶與H帶皆縮短。","D":"錯誤。兩者皆縮短而非不變。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"111110-N1-11":{"quick":"正解(D)。無氧快肌(白肌)含較多『肝醣(glycogen)』(供無氧糖解);肌紅素、粒線體、微血管則較少。","detail":{"background":"快肌(白肌, type II)為無氧糖解型，特徵：肝醣(glycogen)含量多(供快速無氧供能)、但肌紅素(myoglobin)少、粒線體少、微血管少(故色白、易疲勞)。慢肌(紅肌)則相反(肌紅素、粒線體、微血管多)。故無氧快肌「含較多肝醣」。","options":{"A":"錯誤。快肌肌紅素少。","B":"錯誤。快肌粒線體少。","C":"錯誤。快肌微血管少。","D":"正確。快肌含較多肝醣。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"112030-N1-14":{"quick":"正解(A)。骨骼肌收縮時鈣離子與「旋轉素(troponin C)」結合。","detail":{"background":"骨骼肌收縮：肌漿鈣升高後「鈣結合『旋轉素(troponin C)』」→使旋轉肌凝素(tropomyosin)移位、露出肌動蛋白上的肌凝蛋白結合位→橫橋循環收縮。平滑肌則用calmodulin。故骨骼肌鈣結合troponin(與103030-19、112030-14一致)。","options":{"A":"正確。骨骼肌鈣結合旋轉素(troponin)。","B":"錯誤。肌動蛋白是被結合對象。","C":"錯誤。旋轉肌凝素是被移位的調節蛋白。","D":"錯誤。攜鈣素是平滑肌的鈣結合蛋白。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"113180-N1-11":{"quick":"正解(B)。力擊後肌凝蛋白與「1=ATP」結合，造成橫橋與肌動蛋白「2=分離」。","detail":{"background":"橫橋循環：①肌凝蛋白頭結合肌動蛋白(橫橋形成)→②力擊(power stroke，ADP+Pi釋出，拉動細肌絲)→③力擊後「肌凝蛋白頭結合『新的ATP』」→使「橫橋與肌動蛋白『分離(detach)』」→④ATP水解使頭部重新翹起(再活化)準備下一循環。故力擊後結合ATP、橫橋分離。所以1=ATP、2=分離。(屍僵rigor mortis即因死後無ATP，橫橋無法分離而僵硬)","options":{"A":"錯誤。結合ATP後是分離非連接。","B":"正確。結合ATP→橫橋與肌動蛋白分離。","C":"錯誤。鈣結合troponin是啟動，非力擊後。","D":"錯誤。力擊後是ATP而非鈣。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"114100-N1-12":{"quick":"正解(D)。平滑肌鈣-攜鈣素活化MLCK→磷酸化「肌球蛋白(myosin)」輕鏈，啟動橫橋反應。","detail":{"background":"平滑肌收縮(與骨骼肌不同，無troponin)：鈣升高→「鈣結合攜鈣素(calmodulin)」→活化「肌凝蛋白輕鏈激酶(MLCK)」→『磷酸化肌凝蛋白(myosin)的輕鏈』→使肌凝蛋白頭具活性、與肌動蛋白形成橫橋而收縮。故鈣活化平滑肌橫橋反應的主要作用對象是『肌球蛋白(myosin)』(經磷酸化)。","options":{"A":"錯誤。平滑肌無troponin/tropomyosin調節主軸於此。","B":"錯誤。平滑肌無troponin C。","C":"錯誤。肌動蛋白是被結合對象。","D":"正確。鈣-calmodulin經MLCK磷酸化肌球蛋白。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"114170-N1-12":{"quick":"正解(B)。短時間(數毫秒~數秒)最主要的能量來源是「磷酸肌酸(creatine phosphate)」。","detail":{"background":"肌肉收縮能量供應：最初幾毫秒靠現存ATP，接著「磷酸肌酸(creatine phosphate)」立即把ADP再磷酸化成ATP(肌酸激酶催化，速度最快)，可維持約8–10秒高強度收縮;之後才接無氧糖解與有氧代謝。故「短時間(數毫秒內)最主要能量來源」為磷酸肌酸(與108020-18一致)。","options":{"A":"錯誤。肌鈣蛋白(troponin)是調節蛋白非能量。","B":"正確。磷酸肌酸是短時間最快能量來源。","C":"錯誤。肌紅蛋白儲氧非能量直接來源。","D":"錯誤。葡萄糖糖解較慢。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"115030-N1-2":{"quick":"正解(D)。罰站舉椅不動、肌肉施力但長度不變＝「等長收縮(isometric contraction)」。","detail":{"background":"肌肉收縮型態：①「等長收縮(isometric)」＝肌肉產生張力但『長度不變、關節不動』(如舉物維持不動、靠牆半蹲);②等張收縮(isotonic)＝張力不變而長度改變，又分『向心(concentric，肌肉縮短，如舉起重物)』與『離心(eccentric，肌肉拉長，如緩慢放下重物)』。題目「一動也不動地罰站、維持靜止且施力」＝長度不變施力＝等長收縮。","options":{"A":"錯誤。向心收縮肌肉縮短(舉起)。","B":"錯誤。離心收縮肌肉拉長(放下)。","C":"錯誤。等張收縮長度改變。","D":"正確。長度不變施力為等長收縮。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Muscle Physiology","實用生理學（華杏）肌肉生理","Tortora & Derrickson《Principles of A&P》15e Ch.10"]}},"101110-N1-26":{"quick":"正解(B)。肺循環為低壓低阻系統，對血管的阻力低於體循環。","detail":{"background":"肺循環特性：①是「低壓、低阻力、高順應性」系統——肺動脈平均壓僅約15 mmHg(體循環主動脈約100 mmHg)、阻力遠低於體循環(B正確);②肺循環使『缺氧血轉變成充氧血』(經肺泡氧合)，故(C「充氧轉缺氧」)說反;③整個肺循環壓力差小(約15−5=10 mmHg左右，非50);④平均血壓非120(那是體循環收縮壓)。故正確者為(B)。","options":{"A":"錯誤。肺動脈平均壓約15 mmHg，非120。","B":"正確。肺循環阻力低於體循環。","C":"錯誤。肺循環使缺氧血變充氧血。","D":"錯誤。肺循環壓力差小(約10 mmHg)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"102030-N1-22":{"quick":"正解(C)。醛固酮作用於「腎小管(遠曲小管/集尿管)」促鈉再吸收、保水→血量與血壓上升。","detail":{"background":"醛固酮(aldosterone，腎上腺皮質絲球帶分泌的礦物皮質激素)作用於「腎臟遠曲小管與集尿管」的主細胞，促進『鈉離子再吸收(連帶保水)、鉀離子排出』→增加血量(體液)→血壓上升。這是RAAS升血壓的末端機制。故作用部位為腎小管。　深化：醛固酮（礦物皮質素）作用於遠曲小管與集尿管主細胞，促鈉再吸收、鉀與氫離子排泄，間接保水升血壓。受RAAS與高血鉀刺激。過多致Conn症候群（高血壓低血鉀鹼中毒）、不足致Addison（低血鈉高血鉀低血壓）。","options":{"A":"錯誤。鮑氏囊是過濾處、非醛固酮作用點。","B":"錯誤。非冠狀動脈。","C":"正確。醛固酮作用於腎小管促鈉再吸收升血壓。","D":"錯誤。非靜脈。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"102030-N1-26":{"quick":"正解(C)。冠狀動脈血流主要在「心室舒張期增加」(收縮期心肌壓迫冠脈使血流減少)。","detail":{"background":"冠狀循環的獨特處：心室『收縮期』心肌強力收縮會壓迫穿行於心肌內的冠狀動脈分支，使左冠狀動脈血流『減少』;而『舒張期』心肌放鬆、冠脈不受壓迫，加上主動脈瓣關閉後主動脈根部壓力維持，故「冠狀動脈血流在舒張期『增加』(最大)」。臨床意義：心跳過快縮短舒張期→冠脈灌流時間減少→易心肌缺血。故舒張期血流增加。","options":{"A":"錯誤。收縮期心肌壓迫使冠脈血流減少。","B":"錯誤。舒張期血流增加非減少。","C":"正確。冠脈血流在舒張期增加。","D":"錯誤。隨心動週期變化(非恆定)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"102030-N1-30":{"quick":"正解(B)。肺動脈(收縮)壓約15–25 mmHg(平均約15)，遠低於體循環。","detail":{"background":"肺動脈是低壓系統，肺動脈收縮壓約20–25 mmHg、舒張壓約8–10 mmHg、平均約15 mmHg(本題答案取約15 mmHg)。體循環主動脈壓約120/80 mmHg。故肺動脈壓約15 mmHg。肺高壓定義為平均肺動脈壓>20 mmHg。","options":{"A":"錯誤。2 mmHg接近肺微血管/左房壓。","B":"正確。肺動脈壓約15 mmHg。","C":"錯誤。40 mmHg已屬肺高壓。","D":"錯誤。100 mmHg是體循環壓。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"102110-N1-25":{"quick":"正解(D)。運動時肌肉釋放代謝產物(腺苷、CO₂、H⁺、K⁺、乳酸)使局部小動脈舒張→血流增加(活性充血)。","detail":{"background":"運動時骨骼肌血流大增的主因是「局部代謝性自我調節(主動充血/active hyperemia)」：運動肌肉代謝旺盛，釋放「腺苷、二氧化碳、氫離子、鉀離子、乳酸、缺氧」等代謝產物→使局部『小動脈舒張』→該肌肉血流量大增。α腎上腺素受體刺激反而使血管收縮;此局部代謝調節可凌駕交感作用。故主因是肌肉釋放代謝產物刺激血管舒張。","options":{"A":"錯誤。α受體刺激使血管收縮。","B":"錯誤。胰島素非運動充血主因。","C":"錯誤。膽鹼受體非骨骼肌血流主調節。","D":"正確。代謝產物刺激局部血管舒張。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"104030-N1-25":{"quick":"正解(C)。末梢小動脈收縮→周邊阻力上升→血壓上升。","detail":{"background":"動脈血壓 ≈ 心輸出量 × 周邊阻力。各因素：①心輸出量增加→血壓『上升』(A說下降，錯);②血液黏滯度增加→阻力增→血壓『上升』(B說下降，錯);③「末梢小動脈收縮→周邊阻力上升→血壓上升」(C正確，小動脈是主要阻力血管);④血液容積減少→回流與心輸出量減少→血壓『下降』(D說上升，錯)。故正確者為(C)。","options":{"A":"錯誤。心輸出量增加血壓上升。","B":"錯誤。黏滯度增加血壓上升。","C":"正確。末梢小動脈收縮使血壓上升。","D":"錯誤。血容積減少血壓下降。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"104030-N1-26":{"quick":"正解(A為「錯誤」者)。臍『靜脈』閉鎖後成「肝圓韌帶」;成為靜脈韌帶的是『靜脈導管』。","detail":{"background":"胎兒循環出生後變化：①「臍靜脈」閉鎖→『肝圓韌帶』(ligamentum teres);②「靜脈導管」閉鎖→『靜脈韌帶』(ligamentum venosum);③臍動脈→臍內側韌帶;④卵圓孔關閉→卵圓窩;⑤動脈導管→動脈韌帶。本題(A)把臍靜脈說成變靜脈韌帶是錯的(臍靜脈→肝圓韌帶)。(B大部分充氧血經靜脈導管入下腔靜脈、C卵圓孔關閉、D臍動脈帶缺氧血)皆正確。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。臍靜脈閉鎖成肝圓韌帶，靜脈韌帶來自靜脈導管。","B":"正確。充氧血經靜脈導管入下腔靜脈。","C":"正確。出生後卵圓孔關閉。","D":"正確。臍動脈帶缺氧血回胎盤。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"105030-N1-6":{"quick":"正解(C)。血液循環中阻力最大的血管段為「小動脈(arteriole)」。","detail":{"background":"血管阻力：「小動脈(arteriole)」管壁富含平滑肌、管徑小，是『周邊阻力最主要的部位(阻力血管)』，也是血壓在此下降最多的地方;藉調節小動脈口徑可調控器官血流與血壓。微血管雖細但數目極多、總截面積大、單條阻力高但整體因並聯而阻力分散。故阻力最大的『血管段』為小動脈。","options":{"A":"錯誤。大動脈阻力低(傳導血管)。","B":"錯誤。靜脈為容量血管、阻力低。","C":"正確。小動脈是主要阻力血管。","D":"錯誤。微血管總截面積大、整體阻力非最大段。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"106030-N1-26":{"quick":"正解(C)。靜脈導管連接臍靜脈與「下腔靜脈」。","detail":{"background":"胎兒「靜脈導管(ductus venosus)」連接「臍靜脈」與「下腔靜脈」，使來自胎盤的含氧血大部分繞過肝臟直接回下腔靜脈→右心房(與103030-7、105030-8一致)。故連接臍靜脈與下腔靜脈。　深化：胎兒循環三大分流：靜脈導管（臍靜脈→下腔靜脈，繞過肝）、卵圓孔（右房→左房，繞過肺）、動脈導管（肺動脈→主動脈，繞過肺）。出生後肺循環建立，這些分流陸續關閉（卵圓孔→卵圓窩、動脈導管→動脈韌帶）。","options":{"A":"錯誤。門靜脈是另一路。","B":"錯誤。非上腔靜脈。","C":"正確。靜脈導管連臍靜脈與下腔靜脈。","D":"錯誤。靜脈導管繞過肝臟。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"106030-N1-27":{"quick":"正解(A為「錯誤」者)。小動脈血壓『遠低於』主動脈血壓(血壓在小動脈大幅下降)，故說「相似」是錯的。","detail":{"background":"血壓敘述辨析：(A)血壓沿循環逐段下降，「小動脈是阻力血管、血壓在此大幅下降」，故小動脈血壓『遠低於』主動脈血壓，說「相似」為錯;(B)平均動脈壓(MAP)=舒張壓+1/3脈壓，較『接近舒張壓』——正確;(C)臨床「血壓」一般指動脈壓——正確;(D)脈壓(收縮壓−舒張壓，如120−80=40)通常『小於舒張壓(80)』——正確。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。小動脈血壓遠低於主動脈血壓。","B":"正確。平均動脈壓較接近舒張壓。","C":"正確。血壓通常指動脈壓。","D":"正確。脈壓通常小於舒張壓。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"107030-N1-26":{"quick":"正解(B)。平均動脈壓＝舒張壓＋1/3脈壓＝90＋1/3×30＝100 mmHg。","detail":{"background":"平均動脈壓(MAP)≈舒張壓(DBP)＋1/3脈壓(PP)。本題收縮壓120、脈壓30，故舒張壓＝收縮壓−脈壓＝120−30＝90;MAP＝90＋(1/3)×30＝90＋10＝100 mmHg。MAP代表組織灌流的平均驅動壓，因心舒張期較長故較接近舒張壓。故答案100 mmHg。","options":{"A":"錯誤。計算不符。","B":"正確。MAP＝90＋10＝100 mmHg。","C":"錯誤。計算不符。","D":"錯誤。計算不符。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"108020-N1-19":{"quick":"正解(B)。血管阻力與「血管半徑」的4次方成反比(Poiseuille定律)。","detail":{"background":"Poiseuille定律：血管阻力R＝8ηL/(πr⁴)，即阻力與「血管半徑(r)的4次方『成反比』」、與長度(L)及黏滯度(η)成正比。半徑4次方的影響極大——半徑減半，阻力增為16倍。故小動脈藉微調半徑即可大幅改變阻力與血流。故阻力與血管半徑的4次方成反比。","options":{"A":"錯誤。流入流出差是流量概念。","B":"正確。阻力與半徑4次方成反比。","C":"錯誤。阻力與長度成正比(非4次方)。","D":"錯誤。阻力與黏滯度成正比。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"108110-N1-19":{"quick":"正解(D)。血流量與半徑4次方成正比，半徑變2倍→2⁴＝16倍。","detail":{"background":"依Poiseuille定律，血流量Q∝r⁴(在壓力差固定下)。若血管半徑變為原來的「2倍」，血流量變為「2⁴＝16倍」。這說明血管半徑微小變化即對血流量有巨大影響(故小動脈舒縮是血流調節的關鍵)。故血流量變為16倍。補充：依Poiseuille定律 Q=πΔPr⁴/8ηL，在壓力差ΔP固定下血流量Q與半徑「四次方」成正比。半徑變2倍→Q變2⁴=16倍。臨床意義：小動脈(阻力血管)半徑的微小舒縮即對血流量與周邊阻力產生巨大影響，是血壓與器官血流調節的關鍵(故交感、代謝物、內皮NO等主要作用於小動脈)。同理半徑減半→血流降為1/16。","options":{"A":"錯誤。非2倍。","B":"錯誤。4倍是半徑²。","C":"錯誤。8倍是半徑³。","D":"正確。半徑2倍→血流16倍(2⁴)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"108110-N1-27":{"quick":"正解(C)。敗血性休克初期(高動力期)會使心輸出量『增加』。","detail":{"background":"休克分類與心輸出量：①出血性(低血容)、神經性、心因性休克→心輸出量『減少』;②「敗血性休克(分布性)初期(暖休克/高動力期)」→全身血管擴張、阻力下降，心臟代償性使「心輸出量『增加』」(故四肢溫暖、脈壓大);後期失代償才下降。過敏性休克(分布性)心輸出量多下降。故會使心輸出量增加者為敗血性休克(與112030-18呼應)。","options":{"A":"錯誤。出血性休克心輸出量下降。","B":"錯誤。過敏性休克心輸出量下降。","C":"正確。敗血性休克初期心輸出量增加。","D":"錯誤。神經性休克心輸出量下降。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"110030-N1-29":{"quick":"正解(A為「錯誤」者)。淋巴主要回收『組織液中的蛋白質與多餘液體』，並非「主要回收鉀離子」。","detail":{"background":"淋巴循環的生理功能：①回收微血管濾出而未被靜脈端回收的「組織液(多餘液體)與滲漏的『血漿蛋白質』」送回血液——調節血漿與組織液的液體平衡(防水腫);②小腸乳糜管「運輸脂肪(乳糜微粒)」;③淋巴結「清除組織中的細菌、異物與老化紅血球」並參與免疫。本題(A)說「主要回收鉀離子」為錯——淋巴主要回收的是蛋白質與液體，非特定回收鉀。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。淋巴主要回收蛋白質與多餘液體，非鉀離子。","B":"正確。淋巴運輸脂肪(乳糜)。","C":"正確。調節血漿與組織液平衡。","D":"正確。淋巴結清除細菌與老化紅血球。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"110110-N1-20":{"quick":"正解(D)。頸動脈竇壓力受器的訊息經舌咽神經傳到「延腦(心血管中樞)」調節血壓。","detail":{"background":"壓力反射(baroreflex)：血壓升高→頸動脈竇與主動脈弓的「壓力受器」被牽張→經舌咽神經(IX)與迷走神經(X)把訊息傳到「延腦(medulla)的心血管中樞」→增強迷走、抑制交感→心跳變慢、血管舒張→血壓回降(負回饋)。故調節中樞在延腦。","options":{"A":"錯誤。大腦非心血管反射中樞。","B":"錯誤。中腦非此中樞。","C":"錯誤。橋腦含呼吸調節核但血壓主中樞在延腦。","D":"正確。壓力反射中樞在延腦。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"111030-N1-23":{"quick":"正解(D為「不舒張血管」者)。內皮素-1(endothelin-1)是強力『血管收縮』因子;NO、緩激肽、前列腺環素皆使血管舒張。","detail":{"background":"血管內皮分泌的活性因子：①「舒張血管」——一氧化氮(NO)、前列腺環素(prostacyclin, PGI₂)、緩激肽(bradykinin，經NO作用);②「收縮血管」——「內皮素-1(endothelin-1, ET-1)」是已知最強的血管收縮物質之一。本題問『不會使血管舒張』者＝內皮素-1(它收縮血管)。故答案(D)。","options":{"A":"舒張。NO使血管舒張。","B":"舒張。緩激肽促NO舒張血管。","C":"舒張。前列腺環素舒張血管。","D":"不舒張(即為答案)。內皮素-1是強力血管收縮因子。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"111030-N1-24":{"quick":"正解(A為「錯誤」者)。組織液的膠體滲透壓『比血漿小』(因組織液蛋白質少)，說「比血漿大」是錯的。","detail":{"background":"微血管與組織液交換(Starling力)：①「組織液蛋白質濃度『低於』血漿」(微血管壁阻擋大部分蛋白)→故「組織液膠體滲透壓『小於』血漿」(A說「比血漿大」為錯);②組織液靜水壓接近0、比血漿(微血管)靜水壓小(B正確);③小分子(葡萄糖、鹽)可自由通過、濃度與血漿相近(C正確);④組織液蛋白質濃度比血漿低(D正確)。微血管動脈端淨外濾、靜脈端淨再吸收。故錯誤者為(A)。","options":{"A":"錯誤(即為答案)。組織液膠體滲透壓比血漿小(蛋白少)。","B":"正確。組織液靜水壓比血漿小。","C":"正確。葡萄糖與鹽濃度與血漿相近。","D":"正確。組織液蛋白濃度比血漿低。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"113030-N1-7":{"quick":"正解(D)。低血壓會同時降低脈搏波振幅與脈搏波速度。","detail":{"background":"脈搏波：①「振幅(pulse wave amplitude)」反映脈壓(收縮-舒張壓差);②「脈搏波速度(pulse wave velocity, PWV)」反映動脈僵硬度(動脈越硬、PWV越快)。「低血壓」時血壓與脈壓都低→振幅小;且血壓低時動脈張力低、管壁較鬆→傳導速度也較慢，故同時降低兩者。相對地，粥狀硬化、動脈老化、高血壓都使動脈『變硬→PWV增快』。故同時降低兩者者為低血壓。","options":{"A":"錯誤。粥狀硬化使動脈變硬、PWV增快。","B":"錯誤。動脈老化使PWV增快。","C":"錯誤。高血壓使PWV增快。","D":"正確。低血壓同時降低振幅與波速。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"113180-N1-16":{"quick":"正解(A為「不會引起」者)。組織代謝活性增加會使微血管前括約肌『舒張(開啟)』，不是收縮。","detail":{"background":"組織代謝活性增加(如運動)→局部代謝產物(CO₂、H⁺、腺苷、缺氧、K⁺)堆積→引起「局部血管反應」：①「微血管前括約肌『舒張』(開啟)」、小動脈舒張→②微血管血流量增加、開啟的微血管數量增加(主動充血)。本題問「不會引起」者＝(A)「微血管前括約肌『收縮』」(實際是舒張)。其餘B、C、D都是代謝增加會引起的反應。故答案(A)。","options":{"A":"不會(即為答案)。代謝增加使前括約肌舒張(開啟)，非收縮。","B":"會。微血管血流量增加。","C":"會。小動脈舒張。","D":"會。開啟的微血管數量增加。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"114030-N1-6":{"quick":"正解(D)。淨過濾壓＝(24−0)−(12−2)＝14 mmHg，方向為過濾(流出微血管)。","detail":{"background":"微血管液體移動(Starling方程式)：淨過濾壓(NFP)＝(微血管靜水壓Pc − 組織間隙靜水壓Pi) − (微血管膠體滲透壓πc − 組織間隙膠體滲透壓πi)。代入：(24−0)−(12−2)＝24−10＝『+14 mmHg』。結果為『正值』代表「淨向外推力→過濾(filtration，液體流『出』微血管)」。若為負值則為再吸收。故此處為過濾、淨驅動力14 mmHg。","options":{"A":"錯誤。非再吸收(淨壓為正)。","B":"錯誤。非再吸收。","C":"錯誤。數值應為14非7。","D":"正確。過濾流出微血管、淨壓14 mmHg。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Circulation","實用生理學（華杏）循環生理","Tortora & Derrickson《Principles of A&P》15e Ch.21"]}},"102030-N1-28":{"quick":"正解(C)。腎絲球濾液與血漿相比「球蛋白(大分子蛋白)含量較低」(蛋白質幾乎不被濾過)。","detail":{"background":"腎絲球過濾膜阻擋血球與大分子蛋白(白蛋白、球蛋白)，故鮑氏囊濾液(原尿)成分：「幾乎不含蛋白質與血球」、但小分子(水、葡萄糖、胺基酸、鈉、尿素等)濃度與血漿相近。故濾液中「球蛋白含量較低」(C正確);無紅血球與淋巴球(A、D錯)、鈉離子含量與血漿相近(B錯)。","options":{"A":"錯誤。濾液幾乎無紅血球。","B":"錯誤。鈉離子含量與血漿相近。","C":"正確。濾液球蛋白(大分子蛋白)含量低。","D":"錯誤。濾液幾乎無淋巴球。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"102110-N1-26":{"quick":"正解(A)。血清(serum)＝血漿去除纖維蛋白原(凝血後)，故「血清不含纖維蛋白原」。","detail":{"background":"血漿(plasma)＝抗凝後離心的上清液，『含纖維蛋白原』與凝血因子;「血清(serum)＝血液凝固後析出的液體，已消耗纖維蛋白原形成血塊，故『不含纖維蛋白原』」。兩者其餘成分(白蛋白、球蛋白、電解質)相近。故(A)血清不含纖維蛋白原正確;(B)血漿含、(C)(D)皆錯。","options":{"A":"正確。血清不含纖維蛋白原。","B":"錯誤。血漿含纖維蛋白原。","C":"錯誤。血漿含纖維蛋白原。","D":"錯誤。血清不含纖維蛋白原。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"102110-N1-9":{"quick":"正解(A)。血紅素(hemoglobin)的主要功能是運送氧氣。","detail":{"background":"血紅素(hemoglobin)位於紅血球內，每分子含4個血基質(heme，含Fe²⁺)，主要功能是「結合並運送氧氣」(每個鐵結合1個O₂，肺部高氧分壓處結合、組織低氧處釋放)，並協助運送部分二氧化碳(以carbaminohemoglobin形式)與緩衝H⁺。抗體由漿細胞、激素由內分泌腺運送、代謝在細胞內進行。故血紅素主功能為運送氧氣。","options":{"A":"正確。血紅素主要運送氧氣。","B":"錯誤。抗體由血漿γ-球蛋白。","C":"錯誤。激素由血液運送但非血紅素功能。","D":"錯誤。血紅素不進行代謝。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"103030-N1-18":{"quick":"正解(B)。重症肌無力是「乙醯膽鹼受器被自體抗體阻斷」(自體免疫)。","detail":{"background":"重症肌無力(myasthenia gravis)是一種自體免疫疾病：身體產生「抗乙醯膽鹼受器(anti-AChR)的自體抗體」，攻擊並破壞神經肌肉接合處(NMJ)後膜上的菸鹼型ACh受器→ACh無法有效作用→肌肉收縮無力(尤其眼瞼下垂、複視、易疲勞、活動後加重)。運動神經釋放的ACh量正常、ACh酯酶活性也正常;治療用抗膽鹼酯酶藥(pyridostigmine)增加突觸ACh。故主因是AChR被自體抗體阻斷。","options":{"A":"錯誤。ACh釋放量正常。","B":"正確。AChR被自體抗體阻斷。","C":"錯誤。受體被破壞而非親和力降低。","D":"錯誤。ACh酯酶活性正常。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"103030-N1-26":{"quick":"正解(D)。AB型血漿『缺乏抗A與抗B抗體』，故為全能受血者。","detail":{"background":"ABO血型：①紅血球表面抗原——AB型有A與B抗原;②血漿抗體——「AB型血漿『無抗A、無抗B抗體』」。因為AB型血漿不含抗體，輸入任何血型的紅血球都不會被凝集，故AB型是「全能受血者(universal recipient)」(理論上);O型則為全能捐血者(紅血球無A/B抗原)。故AB型缺乏抗A與抗B抗體。","options":{"A":"錯誤。AB型無抗A抗體。","B":"錯誤。AB型無抗B抗體。","C":"錯誤。那是O型(有抗A與抗B)。","D":"正確。AB型缺乏抗A與抗B抗體。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"103030-N1-27":{"quick":"正解(C)。多巴胺(dopamine)可使腎絲球間質(系膜)細胞舒張，增加腎血流與過濾。","detail":{"background":"腎絲球系膜(mesangial)細胞具收縮性，可調節過濾面積與係數(Kf)。「血管張力素II、血小板活化因子、組織胺(收縮系膜)」使系膜收縮→減少過濾;而「多巴胺(dopamine)」與心房利鈉肽(ANP)、PGE₂等使系膜『舒張』→增加腎血流與腎絲球過濾。低劑量多巴胺曾用於增加腎灌流。故使系膜細胞舒張者為多巴胺。","options":{"A":"錯誤。血小板活化因子使系膜收縮。","B":"錯誤。血管張力素II使系膜收縮。","C":"正確。多巴胺使系膜細胞舒張。","D":"錯誤。組織胺使系膜收縮。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"103030-N1-28":{"quick":"正解(A)。1% NaCl為高張溶液，紅血球失水「變小(皺縮)」。","detail":{"background":"正常生理食鹽水為0.9% NaCl(等張)。「1% NaCl屬『高張(hypertonic)』溶液」，溶液滲透壓高於紅血球內，水分由細胞內滲出→紅血球『失水皺縮、變小(crenation)』。若放入低張溶液(如0.3% NaCl或純水)則吸水膨脹甚至溶血破裂。故放入1% NaCl後紅血球變小。","options":{"A":"正確。高張溶液使紅血球失水變小。","B":"錯誤。高張不會使其變大。","C":"錯誤。破裂發生在低張溶液。","D":"錯誤。高張會使體積改變(變小)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"104030-N1-27":{"quick":"正解(A)。肌酸酐(creatinine)清除率可間接反映腎絲球過濾率(GFR)。","detail":{"background":"評估腎絲球過濾率(GFR)：理想標記是「菊糖(inulin)」(只濾過、不分泌不再吸收)，但臨床常用「肌酸酐(creatinine)」——內生性、濾過為主(少量分泌)、測定方便，其清除率約等於GFR，是臨床評估腎過濾功能的常用指標(血中creatinine上升代表GFR下降)。對胺馬尿酸(PAH)清除率反映腎『血漿流量(RPF)』非過濾;碘司特、甘露醇非常規臨床指標。故間接反映過濾功能者為肌酸酐。","options":{"A":"正確。肌酸酐清除率反映GFR。","B":"錯誤。PAH反映腎血漿流量。","C":"錯誤。碘司特非常規。","D":"錯誤。甘露醇非常規臨床GFR指標。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"104030-N1-30":{"quick":"正解(C)。氧飽和度＝(已結合O₂的血紅素/總可結合血紅素)×100%＝(X−Y)/X×100%。","detail":{"background":"血紅素氧飽和百分率(% Hb saturation)＝「已與氧結合的血紅素 ÷ 總可結合的血紅素 ×100%」。題設X＝總可結合血紅素數、Y＝『未』與氧結合的血紅素數，故『已結合的＝X−Y』，飽和度＝(X−Y)/X ×100%。臨床血氧飽和度(SpO₂)正常約95–100%。故公式為(X−Y)÷X×100%。","options":{"A":"錯誤。Y/X是未飽和比例。","B":"錯誤。式子不符。","C":"正確。(X−Y)/X×100%為氧飽和度。","D":"錯誤。式子不符。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"104100-N1-27":{"quick":"正解(A)。pH偏鹼使氧合血紅素解離曲線『左移』(對氧親和力增加、不易釋氧)。","detail":{"background":"氧合血紅素解離曲線「左移(對O₂親和力增加，組織釋氧減少)」的因素：pH上升(偏鹼)、二氧化碳分壓下降、體溫下降、2,3-DPG減少、以及胎兒血紅素(HbF)、一氧化碳。「右移(釋氧增加)」的因素相反：pH下降(酸)、CO₂↑、體溫↑、2,3-DPG↑(波爾效應，利於組織取氧)。本題問左移因素＝(A)偏鹼。其餘(增加DPG、體溫上升、CO₂上升)皆使右移。","options":{"A":"正確。偏鹼使曲線左移。","B":"錯誤。增加DPG使右移。","C":"錯誤。體溫上升使右移。","D":"錯誤。CO₂上升使右移。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"104100-N1-7":{"quick":"正解(A)。白蛋白(albumin)是血漿中最多的蛋白質，維持血漿膠體滲透壓。","detail":{"background":"血漿蛋白：①「白蛋白(albumin)」＝含量最多(約60%)，主要維持『血漿膠體滲透壓(防水腫)』並運送脂肪酸、藥物等;②球蛋白(免疫與運輸);③纖維蛋白原(凝血)。白蛋白由肝臟合成，肝病或腎病症候群時白蛋白下降→膠體滲透壓降→水腫腹水。故血漿中最多且維持滲透壓者為白蛋白。","options":{"A":"正確。白蛋白最多、維持膠體滲透壓。","B":"錯誤。球蛋白主免疫運輸。","C":"錯誤。凝血酶是凝血因子。","D":"錯誤。纖維蛋白原主凝血。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"105030-N1-26":{"quick":"正解(B)。紅血球生成素(EPO)主要由「腎臟」分泌。","detail":{"background":"紅血球生成素(erythropoietin, EPO)主要由「腎臟(皮質間質細胞，近腎小管)」分泌(約90%)，少量由肝臟。當組織缺氧(高海拔、貧血、肺病)→腎臟感應→分泌EPO增加→刺激紅骨髓增生紅血球。慢性腎衰竭時EPO分泌不足→腎性貧血(可注射EPO治療)。故EPO主要由腎臟分泌。","options":{"A":"錯誤。肝臟僅少量分泌EPO。","B":"正確。EPO主要由腎臟分泌。","C":"錯誤。心臟分泌ANP。","D":"錯誤。骨髓是EPO的標的(造血)，非分泌處。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"105090-N1-30":{"quick":"正解(D)。一氧化碳與血紅素的親和力約為氧的「210倍」。","detail":{"background":"一氧化碳(CO)與血紅素的結合力約為氧的「200–250倍(約210倍)」，故極低濃度的CO即可佔據血紅素結合位、形成『碳氧血紅素(carboxyhemoglobin)』，並使氧合曲線左移(更不釋氧)→嚴重組織缺氧(CO中毒)。CO中毒症狀如頭痛、噁心、意識障礙、櫻桃紅膚色;治療給100%氧或高壓氧。故CO親和力約為氧的210倍。","options":{"A":"錯誤。0.21太低。","B":"錯誤。2.1太低。","C":"錯誤。21太低。","D":"正確。約210倍。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"106110-N1-31":{"quick":"正解(A)。碳酸酐酶(carbonic anhydrase)催化CO₂+H₂O→碳酸(H₂CO₃)。","detail":{"background":"紅血球內富含「碳酸酐酶(carbonic anhydrase)」，催化「CO₂ + H₂O ⇌ H₂CO₃ ⇌ H⁺ + HCO₃⁻」(碳酸→重碳酸根+氫離子)，使CO₂以重碳酸根形式運送(占CO₂運送約70%)，並參與酸鹼平衡。碳酸酐酶抑制劑(acetazolamide)可利尿、治青光眼與高山症。故催化此反應者為碳酸酐酶。","options":{"A":"正確。碳酸酐酶催化CO₂與水形成碳酸。","B":"錯誤。乳糜蛋白酶分解蛋白質。","C":"錯誤。MLCK磷酸化肌凝蛋白。","D":"錯誤。α澱粉酶分解澱粉。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"106111-N1-23":{"quick":"正解(B為「不會引起水腫」者)。血漿蛋白濃度『增加』會提高膠體滲透壓、把組織液拉回血管，不會引起水腫(反而減少)。","detail":{"background":"水腫(edema)＝組織間隙液體過多，成因(Starling力失衡)：①微血管靜水壓上升(心衰竭、靜脈阻塞)→過濾增加;②「血漿蛋白濃度『降低』(肝病、腎病症候群、營養不良)→血漿膠體滲透壓下降→水分留在組織」;③淋巴回流受阻(象皮腫filariasis)→組織液無法回收;④微血管通透性增加(發炎、過敏)。本題問「不會引起水腫」者＝(B)「血漿蛋白濃度『增加』」(膠體滲透壓上升，反而把組織液拉回，減少水腫)。故答案(B)。","options":{"A":"會。心臟衰竭使靜水壓上升致水腫。","B":"不會(即為答案)。血漿蛋白增加提高膠體滲透壓、減少水腫。","C":"會。血漿蛋白降低致水腫。","D":"會。象皮腫淋巴阻塞致水腫。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"106111-N1-29":{"quick":"正解(A)。葡萄糖正常會被完全再吸收，尿中幾乎沒有，故U/P比值最小(接近0)。","detail":{"background":"尿液/血漿濃度比(U/P ratio)反映該物質被『濃縮或清除』的程度。①「葡萄糖」正常被近曲小管『完全再吸收』，尿中幾乎沒有→U/P最小(接近0);②鈉離子大部分再吸收(U/P較低);③尿素部分再吸收(U/P中);④「肌酸酐」幾乎不被再吸收且濃縮→U/P最大。故U/P比值最小者為葡萄糖。","options":{"A":"正確。葡萄糖完全再吸收、U/P最小。","B":"錯誤。鈉離子U/P較高。","C":"錯誤。肌酸酐U/P最大。","D":"錯誤。尿素U/P中等。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"107110-N1-26":{"quick":"正解(B為「錯誤」者)。成熟紅血球『無細胞核與粒線體』(靠無氧糖解供能)，說「具有細胞核與粒線體」是錯的。","detail":{"background":"紅血球敘述：(A)雙凹扁平圓盤狀(增加表面積與變形性)——正確;(B)「成熟紅血球『無細胞核、無粒線體』」(發育成熟時排出核與胞器，全身充滿血紅素、靠無氧糖解供能)，故說具有核與粒線體為錯;(C)運輸氧與二氧化碳——正確;(D)老化紅血球被肝、脾、骨髓的巨噬細胞吞噬破壞(約120天)——正確。故錯誤者為(B)。","options":{"A":"正確。紅血球為雙凹圓盤狀。","B":"錯誤(即為答案)。成熟紅血球無核、無粒線體。","C":"正確。運輸O₂與CO₂。","D":"正確。由肝脾骨髓巨噬細胞破壞。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"107110-N1-27":{"quick":"正解(B)。扁桃體位於咽部(口咽/鼻咽，呼吸道與消化道交會附近)，屬周邊淋巴器官。","detail":{"background":"扁桃體(tonsil)是『周邊(次級)淋巴器官』，位於咽部(咽扁桃體/腺樣體在鼻咽、腭扁桃體在口咽、舌扁桃體在舌根)，圍成「咽淋巴環(Waldeyer ring)」守在呼吸道與消化道入口、攔截病原。它非中央淋巴器官(中央＝骨髓與胸腺，負責免疫細胞生成分化);富含B、T淋巴球(非以NK細胞為主)。本題選項(B)位置敘述最接近(位於呼吸與消化道交會附近的咽部)。故答案(B)。(A中央淋巴器官、C以NK為主、D生成分化免疫細胞 皆為中央淋巴器官特性，錯)","options":{"A":"錯誤。扁桃體屬周邊淋巴器官。","B":"正確。扁桃體位於咽部(呼吸與消化道交會處附近)。","C":"錯誤。以B、T淋巴球為主，非NK。","D":"錯誤。生成分化免疫細胞是中央淋巴器官(骨髓胸腺)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"107110-N1-31":{"quick":"正解(C)。鐵進入體內會與「鐵蛋白(ferritin)」結合儲存。","detail":{"background":"鐵代謝：①食物鐵吸收率低(約10%，非超過半數)，以亞鐵(Fe²⁺)經主動運輸(DMT1)進入小腸上皮(非輔助擴散);②吸收後與「鐵蛋白(ferritin)結合儲存」於腸黏膜、肝、脾、骨髓，運送時與『運鐵蛋白(transferrin)』結合;③人體幾乎『無法主動由尿液排鐵』，鐵恆定主要靠『調控腸道吸收』(非靠尿排除)。故(C)「鐵與鐵蛋白結合儲存」正確。","options":{"A":"錯誤。食物鐵吸收率僅約10%。","B":"錯誤。鐵以主動運輸進入(非輔助擴散)。","C":"正確。鐵與鐵蛋白結合儲存。","D":"錯誤。鐵恆定主要靠調控吸收，腎排鐵極少。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"108110-N1-28":{"quick":"正解(C)。腎絲球濾液與血漿的主要差異是「蛋白質」(濾液幾乎不含蛋白)。","detail":{"background":"腎絲球過濾膜可讓水與小分子(葡萄糖、胺基酸、電解質、尿素)自由通過，但阻擋血球與大分子「蛋白質」。故腎絲球濾液(原尿)與血漿的『主要差異＝幾乎不含蛋白質』(也無血球)。若尿中出現蛋白(蛋白尿)代表過濾膜受損(如腎絲球腎炎)。故主要差異為蛋白質。","options":{"A":"錯誤。白血球不被濾過但非「主要」差異描述。","B":"錯誤。紅血球不被濾過(但蛋白質是標準答案)。","C":"正確。濾液與血漿主要差異是蛋白質。","D":"錯誤。核甘酸非主要差異。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"109110-N1-27":{"quick":"正解(A)。雄性素增加血漿LDL、降低HDL，使男性心血管疾病風險高於停經前女性。","detail":{"background":"性別與心血管風險：「雄性素(testosterone)傾向增加低密度脂蛋白(LDL，壞膽固醇)、降低高密度脂蛋白(HDL，好膽固醇)」→促進動脈粥狀硬化;而停經前女性的「雌性素」有保護作用(降LDL、升HDL、改善血管內皮)，故心血管疾病發生率較男性低;停經後雌性素下降，女性風險才追上。故男性風險較高的主因是雄性素的不利血脂作用。","options":{"A":"正確。雄性素增LDL降HDL，男性風險高。","B":"錯誤。雌性素是降LDL升HDL(保護)。","C":"錯誤。紅血球數非心血管病主因。","D":"錯誤。鈣吸收非此題機制。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"110030-N1-26":{"quick":"正解(C)。EPO敘述②主要在腎臟合成③促進紅血球生成④標的器官為紅骨髓 正確(234);①缺氧時分泌『增加』非減少。","detail":{"background":"紅血球生成素(EPO)：①「缺氧時分泌『增加』」(非減少)，故敘述1錯;②「主要在腎臟合成分泌」——正確;③「可促進紅血球生成」——正確;④「主要標的器官為紅骨髓(刺激紅血球前驅細胞增生)」——正確。故正確組合為234。　深化：紅血球生成素（EPO）由腎臟間質細胞在缺氧時分泌，刺激骨髓紅血球生成。慢性腎病患者EPO不足致貧血，可用重組EPO治療。高海拔、慢性肺病、運動員的代償性紅血球增多亦與EPO上升有關。","options":{"A":"錯誤。含①(缺氧分泌減少)是錯的。","B":"錯誤。含①錯誤敘述。","C":"正確。234正確(腎合成、促紅血球生成、標的紅骨髓)。","D":"錯誤。含①錯誤敘述。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"111030-N1-31":{"quick":"正解(C)。高海拔缺氧刺激『周邊化學受器』促進換氣(過度換氣代償)。","detail":{"background":"高海拔(低氧)生理調適：①「低氧刺激頸動脈體等『周邊化學受器』→增加換氣(過度換氣)」——正確(C);②2,3-DPG『增加』(使氧合曲線右移、利組織取氧)，非減少;③肌肉血管密度與微血管『增加』;④腎臟EPO分泌『增加』→紅血球增多(高原紅血球增多症)。故正確者為(C)。其餘A、B、D皆說反。","options":{"A":"錯誤。2,3-DPG增加(非減少)。","B":"錯誤。肌肉血管密度增加。","C":"正確。低氧刺激周邊化學受器促進換氣。","D":"錯誤。EPO分泌增加。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"111110-N1-14":{"quick":"正解(A)。葡萄糖正常被完全再吸收，腎臟清除率最低(接近0)。","detail":{"background":"腎臟清除率(clearance)＝某物質被腎完全清除的血漿體積/時間。①「葡萄糖」正常被完全再吸收、尿中無→清除率『最低(接近0)』;②尿素部分再吸收(清除率中);③肌酸酐幾乎不再吸收(清除率≈GFR);④「對胺基馬尿酸(PAH)」既過濾又分泌、幾乎完全清除→清除率『最高(≈腎血漿流量)』。故清除率最低者為葡萄糖。","options":{"A":"正確。葡萄糖完全再吸收、清除率最低。","B":"錯誤。尿素清除率中等。","C":"錯誤。肌酐酸清除率≈GFR。","D":"錯誤。PAH清除率最高。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"111110-N1-18":{"quick":"正解(B為「不會」者)。胰島β細胞被破壞(第1型糖尿病)時血漿胺基酸應『上升』(蛋白分解↑)，不會下降。","detail":{"background":"胰島β細胞被破壞→胰島素缺乏(第1型糖尿病)的代謝後果：①脂肪分解↑→「血漿游離脂肪酸增加」(可生酮);②高血糖→「血漿滲透度上升」(滲透性利尿、脫水);③胰島素缺乏使α細胞失抑制→「升糖素增加」;④蛋白質分解↑、胺基酸用於糖質新生→「血漿胺基酸『增加』」。本題問「不會產生」者＝(B)「血漿胺基酸『下降』」(實際應上升)。故答案(B)。","options":{"A":"會。脂肪分解使游離脂肪酸增加。","B":"不會(即為答案)。胰島素缺乏時胺基酸增加，非下降。","C":"會。高血糖使血漿滲透度上升。","D":"會。升糖素增加。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"111110-N1-2":{"quick":"正解(C)。二氧化碳在血液中最主要以「重碳酸離子(HCO₃⁻)」形式運送(約70%)。","detail":{"background":"二氧化碳在血液中的運送形式：①約「70%以『重碳酸離子(HCO₃⁻)』」(CO₂在紅血球內經碳酸酐酶轉成H₂CO₃再解離成H⁺+HCO₃⁻，HCO₃⁻出紅血球、氯轉移chloride shift)——最主要;②約23%與血紅素結合(carbaminohemoglobin);③約7%溶解於血漿。故最主要運送形式為重碳酸離子。","options":{"A":"錯誤。不與白血球結合。","B":"錯誤。與血紅素結合約23%(次要)。","C":"正確。約70%以重碳酸離子運送。","D":"錯誤。溶於血漿僅約7%。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"113100-N1-16":{"quick":"正解(A)。增強抗凝血的機制之一是「巨噬細胞吞噬清除已活化的凝血因子」。","detail":{"background":"人體抗凝(防止過度凝血)的機制：①血流稀釋並由「肝臟與單核-巨噬系統(巨噬細胞)『吞噬清除活化的凝血因子』」;②抗凝血酶III(antithrombin III)『緩慢』中和凝血酶(肝素可大幅加速其作用，故B「快速」、D「降低肝素與AT結合」描述錯);③蛋白質C由『肝臟』合成(非腎臟，故C錯)、活化後分解第Va、VIIIa因子。本題正確者為(A)巨噬細胞吞噬凝血因子。","options":{"A":"正確。巨噬細胞吞噬清除活化凝血因子。","B":"錯誤。抗凝血酶III作用緩慢(需肝素加速)。","C":"錯誤。蛋白質C由肝臟合成，非腎臟。","D":"錯誤。肝素增強(非降低)與抗凝血酶的結合。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"115030-N1-5":{"quick":"正解(B)。一氧化碳(CO)與血紅素的親和力最高(約氧的210倍)。","detail":{"background":"氣體與血紅素的親和力：「一氧化碳(CO)」最高(約為氧的200–250倍)，故CO中毒時極少量即可佔據血紅素、阻礙攜氧;其次為氧氣(O₂，正常攜帶);二氧化碳與血紅素結合力較弱(主要以HCO₃⁻運送);氮氣幾乎不與血紅素結合。故親和力最高者為一氧化碳(與105090-30呼應)。","options":{"A":"錯誤。氧親和力次於CO。","B":"正確。一氧化碳親和力最高。","C":"錯誤。CO₂與血紅素結合力弱。","D":"錯誤。氮氣幾乎不結合。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Blood Cells & Hemostasis","實用生理學（華杏）血液生理","Tortora & Derrickson《Principles of A&P》15e Ch.19"]}},"101030-N1-27":{"quick":"正解(A)。70公斤者全身水約60%(42 kg)，其中細胞外液約1/3(約14 kg)。","detail":{"background":"人體體液分布：全身水分約佔體重60%(70 kg → 42 kg水)。其中：①細胞內液(ICF)約佔2/3(約28 kg);②「細胞外液(ECF)約佔1/3(約14 kg)」(ECF再分血漿約1/4、組織間液約3/4)。故70公斤者細胞外液約14 kg。(口訣 60-40-20：總水60%、ICF 40%、ECF 20% 體重 → 70×20%=14)","options":{"A":"正確。ECF約佔體重20%＝14 kg。","B":"錯誤。28 kg是細胞內液。","C":"錯誤。35非正解。","D":"錯誤。42 kg是全身水分。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"101030-N1-28":{"quick":"正解(A)。腎臟葡萄糖再吸收為「鈉-葡萄糖共同運輸(SGLT)」，伴隨鈉離子。","detail":{"background":"近曲小管的葡萄糖再吸收屬「次級主動運輸(secondary active transport)」：管腔膜上的「鈉-葡萄糖共同運輸體(SGLT)」利用鈉離子的電化學梯度(由基底側Na-K-ATPase維持)把『葡萄糖與鈉離子一起(同向)』載入細胞。故伴隨葡萄糖再吸收的是鈉離子。糖尿病用藥SGLT2抑制劑即阻斷此再吸收、使糖隨尿排出。","options":{"A":"正確。葡萄糖與鈉離子共同運輸再吸收。","B":"錯誤。非鉀離子。","C":"錯誤。非鈣離子。","D":"錯誤。氫離子是與鈉『逆向』交換。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"102110-N1-28":{"quick":"正解(A)。葡萄糖濾出量超過最大再吸收量(Tm)時，多餘葡萄糖隨尿排出＝「尿糖(glucosuria)」。","detail":{"background":"腎小管對葡萄糖的再吸收有上限「最大運輸量(transport maximum, Tm，約375 mg/min)」，對應血糖閾值約180 mg/dL。當血糖過高、濾出的葡萄糖『超過Tm』時，超過的部分無法再吸收→「隨尿排出＝尿糖(glucosuria)」(糖尿病高血糖時的典型現象，並引起滲透性利尿)。故超過Tm時產生尿糖。","options":{"A":"正確。超過Tm產生尿糖。","B":"錯誤。非代謝性酸中毒。","C":"錯誤。酮體中毒是胰島素缺乏的另一後果，非此機制。","D":"錯誤。非鹼血症。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"103100-N1-28":{"quick":"正解(C)。緻密斑(macula densa)偵測遠端小管液中的鈉(氯)離子濃度。","detail":{"background":"「緻密斑(macula densa)」是遠曲小管初段(貼近自身腎小體血管極)特化的上皮細胞，偵測『流經的小管液中NaCl(鈉氯)濃度』→經「管球回饋(tubuloglomerular feedback)」調節入球小動脈口徑與腎素分泌，以穩定腎絲球過濾率。故偵測腎內鈉濃度者為緻密斑。","options":{"A":"錯誤。腎盂是集尿腔。","B":"錯誤。弓狀動脈是供血血管。","C":"正確。緻密斑偵測小管液鈉濃度。","D":"錯誤。入球小動脈受JG細胞調節。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"104100-N1-26":{"quick":"正解(A)。腎臟無法排除氫離子(酸滯留)屬「代謝性酸中毒」。","detail":{"background":"酸鹼失衡四型：①「代謝性酸中毒」＝HCO₃⁻減少或H⁺堆積(非呼吸因素)，如『腎衰竭無法排H⁺/再生HCO₃⁻』、糖尿病酮酸、腹瀉失HCO₃⁻、乳酸堆積;②代謝性鹼中毒＝HCO₃⁻過多/失H⁺(嘔吐);③呼吸性酸中毒＝CO₂滯留(肺換氣不足);④呼吸性鹼中毒＝CO₂過度排出(過度換氣)。本題「腎臟無法排除氫離子」屬代謝性酸中毒。故答案(A)。","options":{"A":"正確。腎無法排H⁺屬代謝性酸中毒。","B":"錯誤。代謝性鹼中毒是HCO₃⁻過多/失酸。","C":"錯誤。呼吸性酸中毒是CO₂滯留。","D":"錯誤。呼吸性鹼中毒是過度換氣。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"105090-N1-26":{"quick":"正解(A)。腎臟的「1-α羥化酶(1-hydroxylase)」把維生素D活化為1,25-二羥維生素D。","detail":{"background":"維生素D活化兩步驟：①皮膚/食物來的維生素D₃先在『肝臟』經25-羥化酶→25-(OH)D(calcidiol);②再在『腎臟』經「1-α羥化酶(1-hydroxylase)」→『1,25-(OH)₂D₃(calcitriol，活性型)』。活性維生素D促進腸道鈣磷吸收。受PTH刺激1-α羥化酶活性增加。注意選項B「1,25-二羥膽鈣化醇」是活化『產物』非酵素。故活化酵素為1-α羥化酶。","options":{"A":"正確。腎臟1-α羥化酶活化維生素D。","B":"錯誤。1,25-(OH)₂D是產物，非酵素。","C":"錯誤。ACE活化血管張力素。","D":"錯誤。MAO-B分解多巴胺。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"106030-N1-28":{"quick":"正解(A)。腎小管無法排除氫離子→酸堆積→代謝性酸中毒(代償前)。","detail":{"background":"腎臟藉「分泌氫離子、再生重碳酸根、排銨」維持酸鹼平衡。若腎小管「無法有效排H⁺」→酸性物質堆積、HCO₃⁻不足→「代謝性酸中毒」(如腎小管酸中毒RTA、腎衰竭)。代償前血液pH下降;之後呼吸代償(過度換氣排CO₂)。故最可能發生代謝性酸中毒(與104100-26同概念)。","options":{"A":"正確。腎無法排H⁺→代謝性酸中毒。","B":"錯誤。並非鹼中毒。","C":"錯誤。呼吸性酸中毒是CO₂滯留。","D":"錯誤。並非呼吸性鹼中毒。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"106110-N1-21":{"quick":"正解(C)。過極化時鈉通道關閉(鈉難通過)、鉀持續外流使膜電位更負。","detail":{"background":"神經動作電位後的「過極化(超極化, hyperpolarization)」：去極化頂峰後，電壓閘控『鈉通道已去活化(關閉)→鈉難以通過』，而『鉀通道仍開放、鉀持續外流』，使膜電位短暫『更負於靜止膜電位』(過極化)，直到鉀通道關閉、鈉鉀幫浦恢復梯度才回靜止值。故過極化時鈉難通過、鉀外流。本題雖屬膜電位(神經)，歸於電解質/離子主題。","options":{"A":"錯誤。過極化時鈉通道已關閉。","B":"錯誤。鉀此時外流(非難通過)。","C":"正確。過極化時鈉難通過、鉀外流。","D":"錯誤。鉀仍可外流。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"106110-N1-26":{"quick":"正解(B)。迷走神經ACh增加節律細胞對「鉀離子」的通透性→過極化→心跳變慢。","detail":{"background":"迷走神經(副交感)末梢釋放乙醯膽鹼，作用於竇房結節律細胞的「M2受體→經G蛋白開啟鉀通道(GIRK)→『增加對鉀離子的通透性』→鉀外流增加→細胞過極化、自發去極化變慢」→心跳速率減慢(負性變時)。同時也降低If電流與鈣電流。故迷走使心跳變慢的離子機制是增加鉀通透性。","options":{"A":"錯誤。非增加鈉通透性。","B":"正確。增加鉀通透性→過極化→心跳變慢。","C":"錯誤。是增加非減少鉀通透性。","D":"錯誤。主要機制是增加鉀外流。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"106111-N1-28":{"quick":"正解(B)。血管張力素原(angiotensinogen)由「肝臟」分泌。","detail":{"background":"腎素-血管張力素-醛固酮系統(RAAS)：①腎臟JG細胞分泌「腎素(renin)」(腎素本身是酵素，作用於血管張力素原而非直接作用血管平滑肌，故A錯);②「血管張力素原(angiotensinogen)由『肝臟』分泌」(B正確)→腎素切成血管張力素I→ACE(肺)轉成血管張力素II;③血管張力素II使血管收縮、刺激醛固酮分泌;④「失血/缺水→RAAS活化→血管張力素II與醛固酮『增加』」(故C「醛固酮減少」、D「血管張力素II生成減少」皆說反)。故正確者為(B)。","options":{"A":"錯誤。腎素作用於血管張力素原，非直接作用血管平滑肌。","B":"正確。血管張力素原由肝臟分泌。","C":"錯誤。失血使醛固酮增加。","D":"錯誤。缺水使血管張力素II增加。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"107030-N1-20":{"quick":"正解(D)。鈉離子流入細胞內使膜電位變正→去極化。","detail":{"background":"神經元的「去極化(depolarization)」＝膜電位由負變正(往0靠近或變正)。由電壓閘控「鈉離子通道開啟→鈉離子大量『流入細胞內』(順電化學梯度，細胞外鈉多)→膜內正電增加→去極化」，達閾值即引發動作電位。鈉流出、鉀流出、氯流入則使膜電位更負(過極化/抑制)。故造成去極化者為鈉離子流入。","options":{"A":"錯誤。鈉流出使膜更負。","B":"錯誤。鉀流出使膜更負(過極化)。","C":"錯誤。氯流入使膜更負(抑制)。","D":"正確。鈉離子流入細胞內→去極化。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"107030-N1-29":{"quick":"正解(C)。65公斤者全身水約60%(39 kg)，細胞內液約2/3(約26 kg)。","detail":{"background":"體液分布：全身水約佔體重60%(65 kg → 39 kg)。其中「細胞內液(ICF)約佔2/3(約26 kg)」、細胞外液約1/3(約13 kg)。故65公斤者細胞內液約26 kg。(口訣 60-40-20：ICF約佔體重40% → 65×40%≈26)","options":{"A":"錯誤。13 kg是細胞外液。","B":"錯誤。20非正解。","C":"正確。ICF約佔體重40%＝26 kg。","D":"錯誤。39 kg是全身水分。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"107110-N1-32":{"quick":"正解(A)。嚴重嘔吐流失胃酸(H⁺、Cl⁻)→代謝性鹼中毒。","detail":{"background":"酸鹼失衡的腸胃原因：①「嚴重『嘔吐』流失大量胃酸(鹽酸HCl，含H⁺與Cl⁻)→體內H⁺減少、HCO₃⁻相對增加→『代謝性鹼中毒(低血氯、低血鉀)』」;②嚴重『腹瀉』流失腸液中的HCO₃⁻→『代謝性酸中毒』。故導致代謝性鹼中毒者為嚴重嘔吐。便秘、肥胖與此無直接關係。","options":{"A":"正確。嚴重嘔吐失胃酸→代謝性鹼中毒。","B":"錯誤。腹瀉失HCO₃⁻→代謝性酸中毒。","C":"錯誤。便秘與酸鹼失衡無直接關係。","D":"錯誤。肥胖非直接原因。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"109030-N1-31":{"quick":"正解(A)。細胞外液(血液)最重要的緩衝系統是「重碳酸根(HCO₃⁻/H₂CO₃)系統」。","detail":{"background":"人體酸鹼緩衝系統：①「重碳酸根系統(HCO₃⁻/H₂CO₃)」＝『細胞外液(血液)最重要』的緩衝(因量多、且可由肺調節CO₂、腎調節HCO₃⁻而為開放系統，調節能力強);②蛋白質緩衝(細胞內與血漿，如血紅素緩衝)以細胞內為主;③磷酸鹽系統主要在細胞內與尿液。故細胞外液最重要的緩衝系統為重碳酸根。","options":{"A":"正確。重碳酸根是細胞外液最重要緩衝。","B":"錯誤。蛋白質緩衝以細胞內為主。","C":"錯誤。磷酸鹽以細胞內與尿為主。","D":"錯誤。血紅素緩衝在紅血球內。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"109110-N1-17":{"quick":"正解(A)。葡萄糖不解離，1莫耳葡萄糖/公升＝1 Osmol/L。","detail":{"background":"滲透壓莫耳濃度(osmolarity)＝溶質莫耳數 × 解離粒子數。「葡萄糖是非電解質、溶於水『不解離』」，故1莫耳葡萄糖/公升＝1 Osmol/L。對照：1莫耳NaCl會解離成Na⁺與Cl⁻兩個粒子＝2 Osmol/L;1莫耳CaCl₂＝3 Osmol/L。故葡萄糖1莫耳/L的滲透壓濃度為1 Osmol/L。","options":{"A":"正確。葡萄糖不解離，1 mol/L＝1 Osmol/L。","B":"錯誤。2 Osmol/L是NaCl。","C":"錯誤。3 Osmol/L是CaCl₂類。","D":"錯誤。葡萄糖不解離。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"110030-N1-30":{"quick":"正解(C)。近曲小管中鈉離子主要與「葡萄糖」共同運輸(鈉-葡萄糖共運輸)進入細胞。","detail":{"background":"近曲小管(PCT)是再吸收主力，鈉的再吸收常「與其他物質『共同運輸(同向)』」：①鈉-葡萄糖共運輸(SGLT);②鈉-胺基酸共運輸;③鈉-磷酸鹽共運輸;此外鈉-氫『逆向』交換(NHE)分泌H⁺。本題選項中與鈉『共同運輸進入細胞』者為「葡萄糖」(SGLT2在PCT)。氫離子是逆向交換、非共運輸。故答案葡萄糖(與101030-28呼應)。","options":{"A":"錯誤。氫離子是與鈉逆向交換。","B":"錯誤。鈣再吸收機制不同。","C":"正確。鈉與葡萄糖共同運輸。","D":"錯誤。HCO₃⁻再吸收經H⁺分泌間接達成。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"110030-N1-31":{"quick":"正解(A)。腎臟對水的再吸收與「鈉離子」最相關(水隨鈉走)。","detail":{"background":"腎臟水分再吸收與「鈉離子」密切相關——「水隨鈉走(水的再吸收被動跟隨鈉的主動再吸收所造成的滲透梯度)」：近曲小管鈉再吸收帶動約65%水;集尿管則由ADH調控水通道(aquaporin)。鈉是決定細胞外液量與滲透壓的主要陽離子，故調節鈉即調節體液與血壓。故與水再吸收最相關的離子為鈉離子。","options":{"A":"正確。水隨鈉走，與鈉離子最相關。","B":"錯誤。鉀主要在遠端調節。","C":"錯誤。磷非主導水再吸收。","D":"錯誤。氫離子主酸鹼平衡。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"113030-N1-10":{"quick":"正解(A)。調節消化道(及所有肌肉)平滑肌收縮最主要的離子是「鈣離子」。","detail":{"background":"所有肌肉(骨骼肌、心肌、平滑肌)收縮的共同關鍵離子都是「鈣離子(Ca²⁺)」。消化道平滑肌收縮：去極化或激素/神經刺激→細胞內鈣升高→鈣結合攜鈣素(calmodulin)→活化MLCK→磷酸化肌凝蛋白→收縮。故調節平滑肌收縮最主要的離子為鈣離子。","options":{"A":"正確。鈣離子是肌肉收縮的關鍵離子。","B":"錯誤。鈉主導去極化但收縮靠鈣。","C":"錯誤。鉀主導靜止膜電位。","D":"錯誤。氯非收縮關鍵。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"114100-N1-11":{"quick":"正解(A)。次級主動運輸的直接動力來自離子的「電化學梯度」(通常是鈉梯度)。","detail":{"background":"運輸分類：①初級主動運輸＝『直接』消耗ATP(如Na-K-ATPase、鈣幫浦);②「次級主動運輸(secondary active transport)」＝不直接用ATP，而是『利用初級主動運輸建立的離子(通常鈉)電化學梯度』為動力，把另一物質逆濃度梯度載運(如鈉-葡萄糖共運輸)。故次級主動運輸的『直接動力＝電化學梯度』(ATP是『間接』動力，用於先建立梯度)。故答案電化學梯度。","options":{"A":"正確。次級主動運輸直接動力是電化學梯度。","B":"錯誤。ATP是間接動力(建立梯度)。","C":"錯誤。GTP非此運輸動力。","D":"錯誤。滲透壓非主動運輸動力。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"114170-N1-11":{"quick":"正解(C)。腳踝扭傷發炎水腫時：組織間液蛋白滲透壓(πIF)『增加』、血漿蛋白滲透壓(πC)『降低』，兩者皆促使液體外滲。","detail":{"background":"扭傷發炎時微血管通透性增加→「血漿蛋白漏入組織間隙」：①「組織間液的蛋白濃度上升→組織間液膠體滲透壓(πIF)『增加』」(把水拉向組織);②血漿蛋白漏失→「血漿膠體滲透壓(πC)『降低』」(把水拉回血管的力減弱)。兩者都使淨過濾增加→組織水腫(發炎性水腫)。故正確為πIF增加、πC降低。","options":{"A":"錯誤。πC應降低非增加。","B":"錯誤。πIF應增加、πC降低。","C":"正確。πIF增加、πC降低，致發炎水腫。","D":"錯誤。πIF應增加非降低。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"114170-N1-17":{"quick":"正解(A)。ACE抑制劑減少血管張力素II生成、並降低醛固酮→降血壓。","detail":{"background":"血管張力素轉換酶抑制劑(ACEI，如captopril、enalapril)：抑制ACE→『減少血管張力素I轉成血管張力素II』→①血管張力素II(強力血管收縮劑)減少→血管舒張、血壓下降;②醛固酮分泌『減少』→排鈉保鉀、減少體液→血壓下降;③緩激肽不被分解而累積(故有乾咳副作用)。故ACEI作用為減少血管張力素II與降低醛固酮(A正確)。","options":{"A":"正確。ACEI減少血管張力素II、降低醛固酮。","B":"錯誤。醛固酮應降低非增加。","C":"錯誤。血管張力素II應減少。","D":"錯誤。血管張力素II應減少。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"114170-N1-18":{"quick":"正解(A)。腎排H⁺(與磷酸氫根結合排出)同時『再生重碳酸氫根』→血漿HCO₃⁻增加、pH上升。","detail":{"background":"腎臟維持酸鹼：腎小管細胞分泌H⁺到管腔(與『磷酸氫根HPO₄²⁻結合成可滴定酸』或與氨結合成銨而排出)，每排出一個H⁺，細胞內就『再生一個重碳酸氫根(HCO₃⁻)回到血液』。故淨效應＝「血漿HCO₃⁻增加、酸被排掉→血漿pH(酸鹼值)上升(偏鹼方向)」。這是腎臟代償酸中毒的方式。故答案HCO₃⁻增加、pH上升。","options":{"A":"正確。HCO₃⁻增加、pH上升。","B":"錯誤。HCO₃⁻增加時pH上升非下降。","C":"錯誤。HCO₃⁻是增加非減少。","D":"錯誤。HCO₃⁻是增加。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"115030-N1-6":{"quick":"正解(B)。靜止膜電位時細胞膜「對鉀離子的通透性遠大於鈉離子」。","detail":{"background":"神經細胞「靜止膜電位(約−70mV)」的成因：靜止時細胞膜上有許多『鉀漏通道』而鈉通道大多關閉，故「對鉀離子的通透性遠大於鈉離子(約20–100倍)」→鉀順濃度梯度外流佔主導，使膜電位接近鉀平衡電位(約−90mV)、維持內負外正;加上鈉鉀幫浦維持離子梯度。故靜止時鉀通透性遠大於鈉。","options":{"A":"錯誤。鈉通透性小(去極化才開鈉)。","B":"正確。靜止時鉀通透性遠大於鈉。","C":"錯誤。兩者不相等。","D":"錯誤。鉀可通透(漏通道)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Body Fluids & Acid-Base","實用生理學（華杏）體液與酸鹼","Tortora & Derrickson《Principles of A&P》15e Ch.27"]}},"101110-N1-31":{"quick":"正解(B)。肺泡通氣量＝(潮氣容積−無效腔)×呼吸頻率＝(450−150)×10＝3000 mL/min。","detail":{"background":"肺泡通氣量(alveolar ventilation)＝「(潮氣容積 − 解剖無效腔) × 呼吸頻率」。本題＝(450−150)×10＝300×10＝3000 mL/min。注意要先扣掉「無效腔(150 mL，不參與氣體交換的傳導區)」才是真正到達肺泡的有效通氣。每分鐘通氣量(總)則為450×10＝4500 mL/min。故肺泡通氣量＝3000 mL/min。","options":{"A":"錯誤。4500是每分鐘總通氣量(未扣無效腔)。","B":"正確。(450−150)×10＝3000 mL/min。","C":"錯誤。計算不符。","D":"錯誤。150是無效腔本身。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"102030-N1-29":{"quick":"正解(D)。臨床反映「通氣量」最常用的指標是動脈血二氧化碳分壓(PaCO₂)。","detail":{"background":"動脈血二氧化碳分壓(PaCO₂)與「肺泡通氣量成反比」，是臨床反映通氣是否足夠最直接的指標：通氣不足→CO₂滯留→PaCO₂上升(>45，呼吸性酸中毒);過度換氣→PaCO₂下降(<35，呼吸性鹼中毒)。而PaO₂、SaO₂主要反映『氧合』、Hb反映攜氧能力，皆非通氣的直接指標。故反映通氣量的指標為PaCO₂。","options":{"A":"錯誤。SaO₂反映氧合(飽和度)。","B":"錯誤。Hb反映攜氧能力。","C":"錯誤。PaO₂反映氧合。","D":"正確。PaCO₂反映肺泡通氣量。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"102110-N1-30":{"quick":"正解(A)。PO₂ 100 mmHg時，每公升血液直接溶解的氧約3 mL(溶解度0.003 mL/mmHg/dL)。","detail":{"background":"氧在血液中以兩種形式運送：①絕大部分(約98.5%)與血紅素結合;②極少數『直接溶解於血漿』。溶解量＝0.003 mL O₂/(100 mL血·mmHg)。在PaO₂ 100 mmHg時，每100 mL血溶解0.3 mL氧→『每公升(1000 mL)血約溶解3 mL氧』。這顯示若無血紅素、僅靠溶解，氧運送量遠不足，凸顯血紅素攜氧的重要。故約3 mL/L。","options":{"A":"正確。每公升血約溶解3 mL氧。","B":"錯誤。0.3 mL是每100 mL。","C":"錯誤。數量級不符。","D":"錯誤。數量級不符。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"102110-N1-31":{"quick":"正解(A為「錯誤」者)。分泌界面活性素(surfactant)是『呼吸區』第二型肺泡細胞的功能，非傳導區。","detail":{"background":"呼吸道分「傳導區(conducting zone，鼻到終末細支氣管)」與「呼吸區(respiratory zone，呼吸性細支氣管到肺泡)」。傳導區功能：①導氣但不交換氣體→構成『解剖無效腔』(B對);②內襯纖毛柱狀上皮『分泌黏液』、纖毛清除(C對);③管徑構成『呼吸道阻力』(D對)。「分泌界面活性素(surfactant)的是『呼吸區』的第二型肺泡細胞」，不是傳導區功能，故(A)錯。","options":{"A":"錯誤(即為答案)。surfactant由呼吸區的第二型肺泡細胞分泌，非傳導區。","B":"正確。傳導區構成解剖無效腔。","C":"正確。傳導區分泌黏液。","D":"正確。傳導區構成呼吸道阻力。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"103030-N1-29":{"quick":"正解(C)。正常成人安靜時耗氧量約250 mL/min。","detail":{"background":"正常成人安靜狀態下「全身耗氧量約250 mL/min」(約3.5 mL/kg/min，即1 MET)，二氧化碳產生約200 mL/min(呼吸商約0.8)。劇烈運動時耗氧量可增至數公升/分鐘。故安靜時耗氧量約250 mL/min。　深化：安靜時全身耗氧約250mL/min、產生CO₂約200mL/min，呼吸商（RQ）約0.8（混合飲食）。運動、發燒、甲亢使代謝率上升、耗氧增加。基礎代謝率受甲狀腺素、體表面積、年齡性別影響。","options":{"A":"錯誤。2.5太低。","B":"錯誤。25太低。","C":"正確。約250 mL/min。","D":"錯誤。2500是劇烈運動時。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"103100-N1-29":{"quick":"正解(C)。呼氣末期(肺泡氣)二氧化碳含量約5.6%(分壓約40 mmHg)。","detail":{"background":"肺泡氣/呼氣末期的二氧化碳：分壓約40 mmHg，相當於約「5.6%(在760 mmHg大氣壓下，40/760≈5.3–5.6%)」。吸入的大氣CO₂僅約0.04%，經肺泡氣體交換後呼出氣CO₂大幅升高。臨床「呼氣末二氧化碳監測(EtCO₂/capnography)」正常約35–45 mmHg(約5%)。故呼氣末CO₂約5.6%。","options":{"A":"錯誤。0.056%太低。","B":"錯誤。0.56%太低。","C":"正確。約5.6%(分壓約40 mmHg)。","D":"錯誤。56%過高。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"103100-N1-30":{"quick":"正解(D)。吸氣體積增大會刺激「肺伸張受器(pulmonary stretch receptor)」。","detail":{"background":"「肺伸張受器(pulmonary stretch receptor)」位於支氣管與細支氣管平滑肌內，當『吸氣使肺擴張(體積增大)』時被牽張而興奮→經迷走神經傳入→抑制吸氣中樞、終止吸氣(赫-布二氏反射 Hering-Breuer reflex)，防止肺過度膨脹。快適應受器(刺激物受器)對化學刺激反應、肺C纖維/J受器對肺充血或間質水腫反應。故吸氣體積增大刺激肺伸張受器。","options":{"A":"錯誤。快適應受器對刺激物反應。","B":"錯誤。C纖維對化學/水腫反應。","C":"錯誤。J受器對肺充血水腫反應。","D":"正確。肺伸張受器對肺擴張反應。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"104030-N1-17":{"quick":"正解(D)。鈉鉀幫浦停止→鈉梯度消失→最依賴鈉梯度的「次級主動運輸」運送速率降最多。","detail":{"background":"鈉鉀幫浦(初級主動運輸)維持細胞內外的鈉鉀濃度梯度。「次級主動運輸(secondary active transport)」(如鈉-葡萄糖共運輸)『直接靠鈉的電化學梯度為動力』，故鈉鉀幫浦一停→鈉梯度逐漸消失→次級主動運輸『最顯著地降低運送速率』。簡單擴散、促進性擴散靠濃度梯度(不直接靠鈉幫浦)、胞吞作用靠ATP但機制不同。故受影響最大者為次級主動運輸。","options":{"A":"錯誤。簡單擴散靠濃度梯度。","B":"錯誤。促進擴散靠濃度梯度。","C":"錯誤。胞吞用ATP但非靠鈉梯度。","D":"正確。次級主動運輸最依賴鈉梯度。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Cell & Membrane","實用生理學（華杏）細胞生理"]}},"104030-N1-29":{"quick":"正解(C為「錯誤」者)。(急性)呼吸窘迫症候群是『非心源性』肺水腫(肺微血管通透性增加)，非心源性。","detail":{"background":"急性呼吸窘迫症候群(ARDS)：①病因多樣，吸入性肺炎、敗血症、外傷等都可引起(A對);②肺微血管通透性增加→「『蛋白質』與富蛋白液體外滲到肺間質與肺泡」(D對)→嚴重低血氧(B對缺氧)、肺順應性下降;③屬「『非心源性(non-cardiogenic)』肺水腫」(肺微血管損傷所致，左心房壓正常)，故(C)說「屬於心源性肺水腫」為錯。故錯誤者為(C)。","options":{"A":"正確。吸入性肺炎可引起ARDS。","B":"正確。ARDS伴隨缺氧。","C":"錯誤(即為答案)。ARDS屬非心源性肺水腫。","D":"正確。蛋白質外滲至肺泡。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"104100-N1-30":{"quick":"正解(C為「錯誤」者)。Laplace定律應為「P＝2T/r」(壓力＝2×表面張力/半徑)，題目寫P＝r/2T 是錯的。","detail":{"background":"表面張力劑(surfactant)：(A)主成分為脂質(磷脂dipalmitoylphosphatidylcholine)與蛋白質——正確;(B)深呼吸/嘆氣可刺激第二型肺泡細胞分泌surfactant——正確;(C)「Laplace定律應為 P＝2T/r(肺泡內壓 = 2×表面張力 / 半徑)」，題目寫成「P＝r/2T」是錯的;(D)surfactant降低表面張力且小肺泡降得多，使大小不同的肺泡都穩定、防小肺泡塌陷併入大肺泡——正確。故錯誤者為(C)。","options":{"A":"正確。surfactant含脂質與蛋白質。","B":"正確。深呼吸促進surfactant分泌。","C":"錯誤(即為答案)。Laplace定律為P＝2T/r，非r/2T。","D":"正確。surfactant穩定大小不同肺泡。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"105030-N1-30":{"quick":"正解(B)。肺泡通氣量＝(500−150)×12＝350×12＝4200 mL/min。","detail":{"background":"肺泡通氣量＝(潮氣容積−無效腔)×呼吸頻率＝(500−150)×12＝350×12＝4200 mL/min(與101110-31同公式)。故約4200 mL/min。　深化：解剖無效腔（約150mL）是傳導性氣道（鼻、咽、氣管、支氣管）不參與氣體交換的容積。計算肺泡通氣量務必先扣無效腔再乘頻率。臨床上評估換氣是否足夠看「肺泡通氣量」而非分鐘通氣量。","options":{"A":"錯誤。計算不符。","B":"正確。(500−150)×12＝4200 mL/min。","C":"錯誤。5200非正解。","D":"錯誤。6000是總通氣量。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"105090-N1-17":{"quick":"正解(A)。水透過半透膜的擴散作用稱為「滲透(osmosis)」。","detail":{"background":"水分運輸：①「水『順著自身濃度梯度』(即由滲透壓『低』→滲透壓『高』，溶質少→溶質多)透過半透膜的擴散＝『滲透(osmosis)』」(A正確;B說反，水是往滲透壓高處移動);②紅血球放入『高張』溶液會『失水皺縮』(非漲大，C錯);③水通道(aquaporin)是讓水『被動』通過(非次級主動運輸，D錯)。故正確者為(A)。","options":{"A":"正確。水透過半透膜擴散＝滲透。","B":"錯誤。水往滲透壓高處移動。","C":"錯誤。高張溶液使紅血球皺縮。","D":"錯誤。水通道是被動運輸。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Cell & Membrane","實用生理學（華杏）細胞生理"]}},"105090-N1-29":{"quick":"正解(A)。潮氣容積＋吸氣儲備容積＝「吸氣容量(inspiratory capacity, IC)」。","detail":{"background":"肺容量組合：①「吸氣容量(IC)＝潮氣容積(TV)＋吸氣儲備容積(IRV)」(平靜呼氣後能再吸入的最大量);②功能餘氣量(FRC)＝呼氣儲備容積(ERV)＋肺餘容積(RV);③肺活量(VC)＝TV＋IRV＋ERV;④肺總量(TLC)＝VC＋RV。故TV＋IRV＝吸氣容量。","options":{"A":"正確。TV＋IRV＝吸氣容量。","B":"錯誤。FRC＝ERV＋RV。","C":"錯誤。肺活量＝TV＋IRV＋ERV。","D":"錯誤。肺總量含RV。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"106030-N1-29":{"quick":"正解(A)。缺氧性肺血管收縮把血流導離通氣不良的肺區，改善「通氣/血流比(V/Q)」。","detail":{"background":"「缺氧性肺血管收縮(hypoxic pulmonary vasoconstriction)」是肺循環特有的調節：當某肺泡區『通氣不良、肺泡氧分壓低』時，該區小動脈會『收縮』，把血流『導向通氣良好的肺區』，使「通氣/血流比(V/Q)更匹配」、減少分流、改善整體氧合。(體循環缺氧則血管舒張，與肺相反)。故目的是改善V/Q比。","options":{"A":"正確。缺氧性肺血管收縮改善V/Q比。","B":"錯誤。是減少分流而非增加。","C":"錯誤。與無效腔調節無關。","D":"錯誤。血管收縮不增加通氣量。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"106030-N1-30":{"quick":"正解(D)。氣體分子量越大，擴散速率越慢(降低擴散能力)。","detail":{"background":"氣體擴散速率(Fick定律)∝(擴散面積×分壓差×溶解度)/(膜厚度×√分子量)。故「①分壓差增加、②面積增加、③溶解度增加 → 擴散『增加』」;而「④分子量增加 → 擴散『減慢』(與√分子量成反比)」。本題問「降低擴散能力」者＝(D)氣體分子量增加。(註:CO₂雖分子量略大於O₂，但溶解度高約20倍，故CO₂擴散反而比O₂快)。","options":{"A":"增加擴散。分壓差增加。","B":"增加擴散。表面積增加。","C":"增加擴散。溶解度增加。","D":"降低(即為答案)。分子量增加使擴散變慢。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"106110-N1-30":{"quick":"正解(D)。高海拔缺氧→過度換氣排出CO₂→二氧化碳濃度降低、pH上升(呼吸性鹼中毒)。","detail":{"background":"高海拔(低氧)→周邊化學受器刺激→「呼吸加快(過度換氣)→排出較多CO₂→血中二氧化碳濃度『降低』→碳酸減少→pH『上升(增大)』＝呼吸性鹼中毒」。這是登高山初期的典型反應(可致頭暈、手腳麻);之後腎臟代償排HCO₃⁻使pH回復。故答案為CO₂降低、pH增大。","options":{"A":"錯誤。過度換氣使CO₂降低非升高。","B":"錯誤。pH應上升。","C":"錯誤。CO₂降低非升高。","D":"正確。CO₂降低、pH增大(呼吸性鹼中毒)。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration","實用生理學（華杏）呼吸生理","Tortora & Derrickson《Principles of A&P》15e Ch.23"]}},"106111-N1-18":{"quick":"正解(B)。屍僵因死後ATP缺乏，使肌動蛋白無法與肌凝蛋白分離而維持收縮(僵硬)狀態。","detail":{"background":"屍僵(rigor mortis)：死亡後細胞無法再合成ATP，而「橫橋的分離需要ATP結合於肌凝蛋白頭」。ATP耗盡後，「肌凝蛋白與肌動蛋白的橫橋無法分離→肌肉維持在『僵硬(收縮)』狀態」＝屍僵。屍僵約死後2–6小時開始、12小時最明顯、24–48小時後因肌肉蛋白自溶才緩解(非幾分鐘消失)。鈣的問題與電壓通道非主因。故(B)正確。","options":{"A":"錯誤。屍僵非「一停止呼吸即發生」，有時間進程。","B":"正確。ATP缺乏使橫橋無法分離→僵硬。","C":"錯誤。非鈣通道持續流入。","D":"錯誤。屍僵數十小時後才緩解。"},"sources":["Guyton & Hall《Textbook of Medical Physiology》14e, Respiration"
