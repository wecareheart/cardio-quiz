caution)」:接觸病人或其分泌排泄物時穿「隔離衣(A)」、戴「手套(B)」,接觸前後確實洗手。本題問「並非」隔離所需的防護:「口罩(C)」並非必需——因沙門氏桿菌不經飛沫或空氣傳染(非呼吸道病原),不需常規戴口罩(口罩用於飛沫/空氣隔離);D「相同病菌者可住同一間病室(集中照護cohort)」是接觸隔離可採行的做法(同菌種病人可同房)。故口罩非必需,選C。","options":{"A":"接觸病人分泌排泄物須穿隔離衣,是腸道接觸隔離所需,非答案。","B":"接觸時戴手套防糞口接觸傳染,是所需防護,非答案。","C":"正解(並非所需)。沙門氏桿菌非飛沫/空氣傳染,口罩非必需。","D":"相同病菌者可集中同房(cohort),是可行做法,非答案。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 感染管制措施指引"]}},"103030-N3-80":{"quick":"預防傳染病「最有效」的方法是「預防接種」,而非穿戴手套,故A「手套最有效」錯誤。","detail":{"background":"傳染病控制的原則:B「改善環境衛生(供水、污水、病媒防治)」是預防傳染病的積極作法,正確;C「預防接種(疫苗)是預防傳染病與減輕傷害最有效的方法」正確——透過提升群體免疫力從根本阻斷疾病;D「攝取維生素A、B、C、蛋白質、鋅等營養可增強宿主抵抗力」正確。A「穿戴手套是預防傳染病傳播『最有效』的方法」為「錯誤」——手套(個人防護)只是阻斷接觸傳播的措施之一,「最有效」的預防方法是「預防接種」;而日常最重要、最具成本效益的措施是「手部衛生(洗手)」,單靠戴手套並非最有效(且脫手套後仍須洗手)。故A錯誤。","options":{"A":"正解(錯誤敘述)。最有效的預防是預防接種;手套只是接觸防護之一。","B":"改善環境衛生是預防傳染病的積極作法,正確。","C":"預防接種是預防傳染病與減輕傷害最有效的方法,正確。","D":"攝取足夠營養可增強宿主抵抗力,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 感染管制措施指引"]}},"104100-N3-5":{"quick":"院內感染「包含」原有感染未癒又重複感染其他菌種(續發感染),不應排除,故B錯誤。","detail":{"background":"院內感染(醫療照護相關感染, HAI/nosocomial infection)的定義:A「病人住院前無感染症狀或潛伏感染,住院後才得到的感染」正確;C「發生時間通常為住院『48~72小時後』」正確(住院48~72小時後出現,以排除入院時已在潛伏期者);D「以臨床實證及致病機轉邏輯為判斷依據」正確。B「需『排除』病人尚未痊癒的原有感染、患部又重複感染其他菌種」為「錯誤」——「原有感染部位在住院期間又『重複感染其他新菌種(續發/重疊感染 superinfection)』『仍算』院內感染」,「不應排除」;院內感染本就包含這類在醫療過程中新獲得的感染。故B敘述錯誤。","options":{"A":"住院前無感染、住院後才得到的感染即院內感染,正確。","B":"正解(錯誤敘述)。原患部重複感染其他新菌種仍算院內感染,不應排除。","C":"院內感染通常發生於住院48~72小時後,正確。","D":"以臨床實證及致病機轉邏輯判斷,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 感染管制措施指引"]}},"105030-N3-79":{"quick":"小兒麻痺(polio)主要經「糞口(污染水/食物)」的間接途徑傳染,故選B。","detail":{"background":"傳染途徑分「直接傳染(直接接觸、飛沫、垂直)」與「間接傳染(經污染的水、食物、物品、病媒等媒介)」。本題找「只經由間接傳染」者:B「小兒麻痺(脊髓灰白質炎, polio)」主要經「糞口途徑(食入受病人糞便污染的水或食物)」傳染,屬「間接傳染」。其餘多含直接傳染:A「A型肝炎」雖也是糞口,但可經「直接接觸(人與人)」與污染食物,非「只」間接;C「流行性感冒」主要經「飛沫(直接)」傳染;D「肺結核」經「空氣/飛沫核(直接吸入)」傳染。故「只」經間接傳染者為B小兒麻痺。","options":{"A":"A型肝炎可經直接接觸與污染食物,非只間接,錯誤。","B":"正解。小兒麻痺主要經糞口(污染水/食物)的間接途徑傳染。","C":"流行性感冒主要經飛沫(直接)傳染,錯誤。","D":"肺結核經空氣/飛沫核(直接吸入)傳染,錯誤。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 感染管制措施指引"]}},"105090-N3-79":{"quick":"檢疫(quarantine)是限制「接觸者(疑似暴露者)」的行動,非限制帶原者,故C錯誤。","detail":{"background":"阻斷傳染病的原則:A「隔離方式依疾病的傳染方式而不同」正確(接觸/飛沫/空氣隔離各異);B「隔離時間長短須視疾病的傳染期而定」正確;D「切斷傳染鏈(病原體→傳染窩→排出→傳染途徑→侵入→感受性宿主)其中任一環節即可阻斷傳染」正確。C「檢疫是限制『帶原者』的行動,預防疾病散播」為「錯誤」——「檢疫(quarantine)」是針對「曾暴露於傳染源、可能在潛伏期但『尚未發病』的『接觸者』」限制其行動與觀察;而限制「已確診/帶原(發病或排菌)病人」行動的是「隔離(isolation)」。兩者對象不同,C把檢疫對象說成帶原者,錯誤。","options":{"A":"隔離方式依傳染方式不同,正確。","B":"隔離時間視疾病傳染期而定,正確。","C":"正解(錯誤敘述)。檢疫限制的是接觸者(疑似暴露未發病者),非帶原者。","D":"切斷傳染鏈任一環節即可阻斷傳染,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 感染管制措施指引"]}},"106111-N3-50":{"quick":"保護性隔離是保護「免疫低下者」;腸病毒感染者是傳染源、需防其傳出,不需保護性隔離,故選C。","detail":{"background":"「保護性隔離(protective/reverse isolation)」的目的是「保護『免疫力低下』的病人,避免被外界微生物感染」。需採保護性隔離者多為免疫功能受損族群:A「重度燒傷」(皮膚屏障破壞、易感染)、B「接受高劑量類固醇治療」(免疫抑制)、D「接受化學藥物治療」(骨髓抑制、白血球低下)都需「保護性隔離」。C「腸病毒感染」的病人本身是「感染源(會排出病毒傳染他人)」,需要的是「接觸/隔離防護(防止病原『傳出』給別人)」,而非「保護性隔離(防止外界病原『傳入』)」。故腸病毒感染者不需保護性隔離,選C。","options":{"A":"重度燒傷皮膚屏障破壞、免疫低下,需保護性隔離,非答案。","B":"高劑量類固醇免疫抑制,需保護性隔離,非答案。","C":"正解(不需)。腸病毒感染者是傳染源,需防傳出而非保護性隔離。","D":"化療骨髓抑制、白血球低下,需保護性隔離,非答案。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 感染管制措施指引"]}},"107030-N3-79":{"quick":"預防傳染病與減輕傷害「最有效」的方法是「預防接種」,故選A。","detail":{"background":"本題比較各防治措施的「有效性」:A「預防接種(疫苗)」是「預防傳染病與減輕傳染病傷害『最有效』」的方法——透過主動免疫使個人與群體獲得保護力,從根本減少感染與重症(如三段五級預防中屬「初段預防、特殊保護」)。B「預防性給藥(化學預防)」適用於特定暴露情況(如瘧疾、接觸者投藥),範圍有限;C「隔離」是針對「已發病病人」阻斷傳出;D「檢疫」是針對「接觸者」觀察限制。隔離與檢疫屬「發生後」的控制措施,效益不如「事前的預防接種」全面。故最有效者選A預防接種。","options":{"A":"正解。預防接種是預防傳染病與減輕傷害最有效的方法。","B":"預防性給藥僅適用特定暴露情況,範圍有限,錯誤。","C":"隔離是針對發病病人阻斷傳出,屬事後控制,錯誤。","D":"檢疫是針對接觸者觀察限制,屬事後控制,錯誤。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 感染管制措施指引"]}},"109110-N3-80":{"quick":"一般洗手是去除污垢與「暫存性(transient)菌叢」,非降低皮膚「固有性(常在)菌叢」,故B錯誤。","detail":{"background":"手部衛生:A「是預防醫療照護相關感染最簡單、最有效且最合乎成本效益的方法」正確(WHO強調手部衛生是防院內感染的基石);C「接觸或執行照護『之前』洗手,是為降低微生物傳遞給病人的風險」正確;D「接觸或暴露病人體液『之後』洗手,是為降低傳遞給醫療人員與環境的風險」正確(對應WHO手部衛生五時機)。B「一般手部衛生的目的是去除污垢及有效降低皮膚上『固有性(常在)菌叢』的數量」為「錯誤」——「一般洗手(肥皂/酒精)」主要去除污垢與「『暫存性(transient,外來附著)菌叢』」;而「固有性(常在 resident)菌叢」深藏皮膚,一般洗手難以清除,需「外科刷手(surgical scrub)」才會大幅降低常在菌。故B把目標菌叢說錯。","options":{"A":"手部衛生是防院內感染最簡單有效且符成本效益的方法,正確。","B":"正解(錯誤敘述)。一般洗手去除暫存性菌叢;降低固有性(常在)菌叢需外科刷手。","C":"照護前洗手降低傳給病人的風險,正確。","D":"接觸體液後洗手降低傳給醫護與環境的風險,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 感染管制措施指引"]}},"110030-N3-80":{"quick":"傳染病護理評估重在旅遊史、接觸史、居住環境、症狀時序;「家族疾病史」非傳染病評估重點,故選B。","detail":{"background":"傳染病的護理評估著重於「找出感染來源、傳染途徑與暴露風險」:A「疾病症狀開始的時間(發病時序)」是判斷潛伏期與病程的重要資料;C「近期有無海外旅遊(旅遊史)」有助辨識輸入性與境外移入傳染病;D「居住環境(衛生、群居、病媒)」有助評估暴露來源與傳播風險。B「家族疾病史」為「不屬於」傳染病評估的重點項目——家族史主要與「遺傳性、慢性非傳染性疾病」相關,傳染病是外來病原所致,與家族遺傳無直接關係(評估重點是接觸史、旅遊史、疫苗史、環境而非家族史)。故選B。","options":{"A":"症狀開始時間助判潛伏期與病程,屬傳染病評估,非答案。","B":"正解(不屬於)。家族疾病史與遺傳/慢性病相關,非傳染病評估重點。","C":"近期海外旅遊史助辨識境外移入傳染病,屬評估,非答案。","D":"居住環境助評估暴露來源與傳播風險,屬評估,非答案。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 感染管制措施指引"]}},"112030-N3-79":{"quick":"腮腺炎是飛沫傳染(需飛沫隔離),非糞口腸道傳染,故「不需腸道隔離」選C。","detail":{"background":"「腸道隔離(enteric/contact precaution)」適用於「經糞口(腸胃道)傳染」的疾病,須妥善處理病人糞便與排泄物、接觸後洗手。本題找「不需」腸道隔離者:A「痢疾(細菌性/阿米巴痢疾)」、B「傷寒(沙門氏傷寒桿菌)」、D「霍亂」都是「經糞口傳染的腸道傳染病」,需採腸道隔離。C「腮腺炎(mumps,流行性耳下腺炎)」是「腮腺炎病毒經『飛沫』傳染」的疾病,須採「飛沫隔離」而非腸道隔離。故不需腸道隔離者為C腮腺炎。","options":{"A":"痢疾經糞口傳染,需腸道隔離,非答案。","B":"傷寒經糞口傳染,需腸道隔離,非答案。","C":"正解(不需腸道隔離)。腮腺炎是飛沫傳染,需飛沫隔離。","D":"霍亂經糞口傳染,需腸道隔離,非答案。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 感染管制措施指引"]}},"105090-N3-77":{"quick":"敗血症使微血管通透性增加、血漿外滲,造成「全身有效循環血量『減少』」,故A「循環血量增加」錯誤。","detail":{"background":"敗血症(sepsis)是宿主對感染產生失調的全身性發炎反應,造成器官功能障礙。其病生理:微生物及其毒素引發大量發炎介質(TNF-α、IL-1等)釋放→「微血管通透性增加→血漿、體液外滲到組織間隙→有效循環血量『減少』、血管擴張(分布性休克)」。A「微血管通透性增加,全身循環血量『增加』」為「錯誤」——通透性增加使血漿外漏,有效循環血量是「減少」(相對血容不足),導致低血壓與組織灌流不足。B「代謝提升使細胞耗氧增加,但組織灌流降低→無氧代謝→代謝性酸中毒(乳酸堆積)」正確;C「腎臟灌流降低→尿量減少→未改善則急性腎衰竭」正確;D「影響凝血→可能進展為瀰漫性血管內凝血(DIC)」正確。故A錯誤。","options":{"A":"正解(錯誤敘述)。通透性增加使血漿外滲,有效循環血量減少,非增加。","B":"組織灌流降低、無氧代謝產生代謝性酸中毒,正確。","C":"腎灌流降低使尿量減少,未改善則腎衰竭,正確。","D":"敗血症影響凝血,可能進展為DIC,正確。"},"sources":["新文京《內外科護理學》感染與重症","華杏《新編內外科護理學》","Surviving Sepsis Campaign Guideline (SSC)"]}},"106110-N3-73":{"quick":"診斷敗血症用細菌培養、白血球、CRP(及乳酸、procalcitonin);「血糖」非診斷敗血症的特定項目,故D錯誤。","detail":{"background":"敗血症的診斷與監測檢驗:A「細菌(血液)培養」正確——找出致病菌與抗藥性,指引抗生素(須在給抗生素『前』採檢);B「白血球計數」正確——可升高或降低(嚴重時反而下降)反映感染;C「C-反應蛋白(CRP)」正確——急性發炎指標,敗血症時上升(procalcitonin、血清乳酸亦為重要指標)。D「血糖」為「錯誤」——血糖並非「診斷敗血症」的特定檢驗項目(雖然敗血症可能伴隨血糖異常、且需控制血糖,但血糖不是用來『診斷』感染或敗血症的指標)。故診斷敗血症的檢驗不包含血糖,選D。","options":{"A":"細菌培養找致病菌、指引抗生素,是診斷項目,非答案。","B":"白血球計數反映感染,是診斷項目,非答案。","C":"CRP是急性發炎指標,敗血症時上升,是診斷項目,非答案。","D":"正解(錯誤敘述)。血糖非診斷敗血症的特定檢驗項目。"},"sources":["新文京《內外科護理學》感染與重症","華杏《新編內外科護理學》","Surviving Sepsis Campaign Guideline (SSC)"]}},"106111-N3-75":{"quick":"依TTAS，意識改變(GCS 9~13)合併感染與生命徵象不穩定屬「第二級(危急)」；本例GCS 10、BP 90/60、SpO₂ 93%、疑敗血症，判第二級，故選B。","detail":{"background":"臺灣急診檢傷與急迫度分級量表(TTAS)依生命徵象與意識危急程度將病人分五級(第一級最危急、需立即處置)。本病人:體溫39°C、脈搏122次/分(心搏過速)、呼吸30次/分(呼吸過速)、血壓90/60 mmHg(低血壓邊緣)、SpO2 93%(偏低)、GCS E2V3M5=10(意識改變)、白血球15,000/μL(感染),整體呈現「感染源+多項生命徵象不穩+意識改變」的「敗血症併休克(septic shock)徵象」,屬「立即危及生命、需最優先復甦」的情況,TTAS判為「第一級(復甦急救級)」。故選A。臨床上對疑似敗血性休克者應立即啟動敗血症組合照護(培養、抗生素、輸液、升壓)。","options":{"A":"第一級(復甦急救)適用心跳呼吸停止、無反應或GCS<9等立即危及生命者；本例GCS 10尚未達此程度。","B":"正解：GCS 9~13之意識改變合併感染與生命徵象不穩定，TTAS判為第二級(危急,需10分鐘內處置)。","C":"第三級為次緊急，與本例危急程度不符。","D":"第四級為非緊急，與本例不符。"},"sources":["新文京《內外科護理學》感染與重症","華杏《新編內外科護理學》","Surviving Sepsis Campaign Guideline (SSC)"]}},"106111-N3-76":{"quick":"病人GCS10、SpO2 93%尚不需立即插管;處置重點為培養、輸液、抗生素、升壓,故D「立即插管」錯誤。","detail":{"background":"承上題(疑似敗血性休克),正確處置應依敗血症組合照護:A「進行細菌培養以確認感染源」正確(給抗生素前先採血液培養);B「確認健康問題為周邊組織灌流失效(組織低灌流)」正確(敗血症核心是組織灌流不足);C「立即建立靜脈輸液管路、依醫囑補充體液」正確(快速晶體液輸注矯正低血容與低灌流)。D「立即給予氣管內插管以維持呼吸道通暢」為「錯誤」——病人「GCS 10(意識雖改變但未深度昏迷<8)、SpO2 93%(以氧療多可改善)」,「尚未達到需『立即插管』的指標」;當下優先是「輸液、培養、抗生素、升壓劑」穩定循環,而非急著插管(若意識持續惡化GCS<8或呼吸衰竭再評估插管)。故D為錯誤處置。","options":{"A":"給抗生素前先做細菌培養確認感染源,正確。","B":"敗血症核心是周邊組織灌流失效,正確。","C":"立即建立靜脈管路補充體液矯正低灌流,正確。","D":"正解(錯誤敘述)。GCS10、SpO2 93%尚不需立即插管;優先輸液培養抗生素升壓。"},"sources":["新文京《內外科護理學》感染與重症","華杏《新編內外科護理學》","Surviving Sepsis Campaign Guideline (SSC)"]}},"107110-N3-78":{"quick":"敗血症應「先採血液培養再給抗生素」(避免培養偽陰性),故A「先給抗生素再採血」錯誤。","detail":{"background":"敗血症治療(Surviving Sepsis組合照護):B「若感染部位為中心靜脈導管,應盡速移除(拔除)感染管路」正確(去除感染源);C「輸液治療並維持中心靜脈壓(CVP)適當(早期目標約≥8 mmHg)」正確;D「血壓低、輸液後仍低時給予升壓劑(如norepinephrine)維持平均動脈壓」正確。A「應『立即給予抗生素後再採集血液培養』」為「錯誤」——正確順序是「『先採集血液培養(在給抗生素前)』,再給廣效抗生素」;因為一旦先給抗生素,血液培養容易呈「偽陰性」而無法分離出致病菌、影響後續精準用藥。不過採培養「不應延誤抗生素」(應在辨識敗血症後1小時內給藥)。故A順序顛倒,錯誤。","options":{"A":"正解(錯誤敘述)。應先採血液培養再給抗生素,以免培養偽陰性。","B":"感染的中心靜脈導管應盡速拔除(去除感染源),正確。","C":"輸液維持適當中心靜脈壓,正確。","D":"血壓低時給升壓劑維持平均動脈壓,正確。"},"sources":["新文京《內外科護理學》感染與重症","華杏《新編內外科護理學》","Surviving Sepsis Campaign Guideline (SSC)"]}},"109030-N3-74":{"quick":"收縮壓<80 mmHg顯示嚴重低血壓、組織低灌流,最可能需調節(增加)輸液,故選B。","detail":{"background":"監測敗血症病人液體療法的生理指標,目的在判斷血容與組織灌流是否足夠、決定是否需調節輸液。本題找「最可能需調節輸液」者:B「收縮壓<80 mmHg」是「明顯低血壓」,顯示有效循環血量不足、組織灌流嚴重不夠,「最需要積極輸液(必要時加升壓劑)」矯正,故選B。其餘相對接近正常、不急需調整:A「尿比重≤1.026」在正常範圍(過高才表示脫水濃縮);C「血液pH值>7.30」接近正常(嚴重代謝性酸中毒pH會更低);D「中心靜脈壓9 cmH2O」屬正常偏低範圍(可接受)。故最需調節輸液的是B嚴重低血壓。","options":{"A":"尿比重≤1.026在正常範圍,非最需調節,非答案。","B":"正解。收縮壓<80 mmHg嚴重低血壓、組織低灌流,最需積極輸液。","C":"pH>7.30接近正常,非最需調節,非答案。","D":"中心靜脈壓9 cmH2O屬正常偏低,可接受,非答案。"},"sources":["新文京《內外科護理學》感染與重症","華杏《新編內外科護理學》","Surviving Sepsis Campaign Guideline (SSC)"]}},"109110-N3-77":{"quick":"敗血症由細菌毒素引發TNF活化、產生微小血栓(DIC機轉),故A正確。","detail":{"background":"敗血症的病生理判斷(找正確):A「細菌感染引發腫瘤壞死因子(TNF-α)等發炎介質活化,造成凝血系統失調、產生微小血栓」正確——這正是敗血症進展為「瀰漫性血管內凝血(DIC)」的機轉(廣泛微血栓形成、消耗凝血因子與血小板)。B「敗血症會造成循環血量『大量流失』」錯——敗血症不是『失血』,而是「血管擴張+通透性增加使血漿外滲」造成的「分布性、相對血容不足」。C「敗血症休克時可能引發尿量『增加』」錯——休克時腎灌流降低,尿量「減少」。D「敗血症休克時因心臟受刺激出現血壓『上升』」錯——敗血性休克是「血壓『下降』(低血壓)」。故A正確。","options":{"A":"正解。細菌毒素引發TNF活化、產生微小血栓(DIC機轉)。","B":"敗血症是分布性相對血容不足,非大量失血,錯誤。","C":"休克時腎灌流降低、尿量減少,非增加,錯誤。","D":"敗血性休克是低血壓(血壓下降),非上升,錯誤。"},"sources":["新文京《內外科護理學》感染與重症","華杏《新編內外科護理學》","Surviving Sepsis Campaign Guideline (SSC)"]}},"111030-N3-78":{"quick":"敗血症常見「血小板『減少』」(DIC消耗),故A「血小板>140,000」錯誤(敗血症血小板會下降)。","detail":{"background":"敗血症的器官功能障礙指標(SOFA/qSOFA相關):B「尿量<0.5 mL/kg/hr」正確(腎臟低灌流的少尿,反映急性腎損傷);C「膽紅素>4 mg/dL(總膽紅素升高)」正確(肝功能障礙);D「收縮壓<90 mmHg(或需升壓劑)」正確(循環衰竭/休克)。A「血小板>140,000 cells/μL」為「錯誤」——敗血症因發炎與「瀰漫性血管內凝血(DIC)」會「消耗血小板」,使「血小板『減少(常<140,000、甚至<100,000或<50,000)』」是其重要的凝血功能障礙指標;「血小板>140,000(正常)」不符敗血症的特徵(敘述方向相反)。故A為錯誤敘述。","options":{"A":"正解(錯誤敘述)。敗血症常見血小板減少(DIC消耗),非>140,000。","B":"尿量<0.5 mL/kg/hr反映腎臟低灌流,正確。","C":"膽紅素>4 mg/dL反映肝功能障礙,正確。","D":"收縮壓<90 mmHg反映循環衰竭/休克,正確。"},"sources":["新文京《內外科護理學》感染與重症","華杏《新編內外科護理學》","Surviving Sepsis Campaign Guideline (SSC)"]}},"111110-N3-79":{"quick":"敗血症組織低灌流、無氧代謝產生「代謝性酸中毒」,故D正確;會低血氧、呼吸加快、尿量減少。","detail":{"background":"敗血症病人的臨床徵象判斷(找正確):D「代謝性酸中毒」正確——組織灌流不足、細胞缺氧進行無氧代謝、乳酸堆積,造成「代謝性酸中毒(乳酸性酸中毒)」。其餘皆與敗血症表現相反:A「高血氧」錯——敗血症常「低血氧(組織缺氧、可能合併ARDS)」;B「呼吸變慢」錯——敗血症會「呼吸加快(代償酸中毒、發燒、缺氧)」,呼吸過速是早期警訊;C「尿量增加」錯——腎臟低灌流使「尿量減少(少尿)」。故D正確。臨床早期辨識:發燒/低體溫、心跳快、呼吸快、白血球異常、意識改變、低血壓、乳酸升高。","options":{"A":"敗血症常低血氧而非高血氧,錯誤。","B":"敗血症呼吸加快(代償酸中毒/缺氧),非變慢,錯誤。","C":"腎低灌流使尿量減少,非增加,錯誤。","D":"正解。組織低灌流、無氧代謝產生代謝性酸中毒。"},"sources":["新文京《內外科護理學》感染與重症","華杏《新編內外科護理學》","Surviving Sepsis Campaign Guideline (SSC)"]}},"112030-N3-78":{"quick":"敗血症正確機轉=TNF活化產生微小血栓(1)+組織低灌流產生代謝性酸中毒(3),故選B(13)。","detail":{"background":"敗血症病生理四敘述判斷:「1細菌感染引發腫瘤壞死因子(TNF)活化、產生微小血栓」對(DIC機轉);「2微生物侵入造成微血管通透性增加、全身循環血量『增加』」錯——通透性增加使血漿外滲,有效循環血量是『減少』;「3全身代謝升高使細胞耗氧增加,但組織灌流降低、產生代謝性酸中毒」對;「4因心臟受刺激出現血壓上升、引發尿量增加」錯——敗血性休克是血壓『下降』、尿量『減少』。故正確組合為1+3,選B。常見陷阱是把「循環血量、血壓、尿量」的方向寫反(敗血症是血容相對不足、低血壓、少尿)。","options":{"A":"12含錯誤的2(循環血量應減少),錯誤。","B":"正解。TNF產生微小血栓(1)、組織低灌流產生代謝性酸中毒(3)為正確。","C":"24皆為方向錯誤的敘述,錯誤。","D":"34含錯誤的4(血壓應下降、尿量減少),錯誤。"},"sources":["新文京《內外科護理學》感染與重症","華杏《新編內外科護理學》","Surviving Sepsis Campaign Guideline (SSC)"]}},"112110-N3-77":{"quick":"敗血症hour-1 bundle:給抗生素前先採血液培養(1)+廣效抗生素治療(2)為正確,選A(12);晶體液應30 mL/kg、MAP維持≥65。","detail":{"background":"敗血症「第一小時組合照護(hour-1 bundle)」四敘述判斷:「1應快給抗生素,但須先做血液培養」對(在給抗生素『前』採血液培養,但不延誤抗生素、1小時內給藥);「2施打1種或多種廣效抗生素」對(經驗性廣效抗生素治療,療程依感染源調整)。「3病人低血壓或血清乳酸≥2(指引以≥4 mmol/L)應儘快輸液以『40 mL/kg』量輸注」錯——標準是「晶體液『30 mL/kg』」(非40);「4病人低血壓在輸液後維持平均動脈壓(MAP)至少『≥60 mmHg』」錯——目標是「MAP『≥65 mmHg』」(非60)。故正確為1+2,選A。Hour-1 bundle重點:測乳酸、採血培養後給抗生素、低血壓/乳酸高給30 mL/kg晶體液、需要時升壓劑維持MAP≥65。","options":{"A":"正解。先採血培養再快給抗生素(1)、廣效抗生素治療(2)為正確。","B":"13含錯誤的3(應30 mL/kg非40),錯誤。","C":"24含錯誤的4(MAP應≥65非60),錯誤。","D":"34皆為數值錯誤的敘述,錯誤。"},"sources":["新文京《內外科護理學》感染與重症","華杏《新編內外科護理學》","Surviving Sepsis Campaign Guideline (SSC)"]}},"103030-N3-79":{"quick":"登革熱「禁用aspirin」(增加出血風險),應用acetaminophen退燒,故B「可用aspirin」錯誤。","detail":{"background":"登革熱(dengue fever)由登革病毒經「埃及斑蚊、白線斑蚊」叮咬傳染。護理指導:A「會有體溫升高及肌肉骨骼疼痛(故稱『斷骨熱』)」正確;C「典型登革熱約一週病程後可自行痊癒,無特效藥、採症狀支持療法」正確;D「避免被斑蚊叮咬,斑蚊以『清晨及傍晚』活動為主」正確。B「可使用含『阿斯匹靈(aspirin)』類藥物以降低體溫」為「錯誤」——登革熱「『禁用』aspirin、ibuprofen等NSAID(非類固醇消炎止痛藥)」,因為它們會「抑制血小板功能、增加出血傾向」,可能誘發或加重「出血性登革熱」;退燒止痛應改用「acetaminophen(普拿疼/乙醯胺酚)」。故B為錯誤指導。","options":{"A":"登革熱有體溫升高與肌肉骨骼疼痛(斷骨熱),正確。","B":"正解(錯誤指導)。登革熱禁用aspirin(增加出血),應用acetaminophen。","C":"典型登革熱約一週可自癒、採症狀支持療法,正確。","D":"避免清晨傍晚被斑蚊叮咬,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 登革熱/病媒傳染病防治工作指引"]}},"105090-N3-80":{"quick":"登革熱是病媒蚊傳染、人與人不直接傳染,不需穿隔離衣戴口罩,故C錯誤。","detail":{"background":"登革熱病人的護理措施:A「評估監測體溫、排泄及呼吸型態」正確;B「監測電解質、血比容(Hct)和血紅素」正確——出血性登革熱會因血漿外漏使「血比容上升」、血小板下降,須密切監測脫水與出血;D「評估疼痛部位與情形」正確。C「接觸病人時須穿戴『隔離衣與口罩』」為「錯誤」——登革熱是「『病媒蚊(斑蚊)叮咬』傳染,人與人之間『不會直接接觸或飛沫傳染』」,因此「不需」對病人採接觸或飛沫隔離(不需穿隔離衣、戴口罩);防治重點是「防蚊(病室裝紗窗、清除孳生源、避免病人再被蚊叮以免病毒擴散)」。故C為錯誤措施。","options":{"A":"監測體溫、排泄及呼吸型態,正確。","B":"監測電解質、血比容、血紅素(防出血脫水),正確。","C":"正解(錯誤敘述)。登革熱是病媒蚊傳染、人不直接傳染,不需穿隔離衣戴口罩。","D":"評估疼痛部位與情形,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 登革熱/病媒傳染病防治工作指引"]}},"106030-N3-80":{"quick":"登革熱皮疹多在發燒後3~5天出現(時間/描述不符);本題以C為錯誤敘述。","detail":{"background":"登革熱概念:A「登革病毒主要侵犯人體『小血管(微血管)』」正確(造成血管通透性增加、血漿外漏);B「登革病毒依抗原型態分『四型(DEN-1~4)』」正確(感染一型後僅對該型終生免疫,再感染他型易發生嚴重登革熱);D「出血性登革熱(DHF)是非典型但非常嚴重的登革熱」正確。C「感染登革病毒後,約高燒後『5~7天』身體軀幹出現瀰漫性紅斑及出血性丘疹」為本題的「錯誤」敘述——登革熱的皮疹通常在「發燒後約『3~5天』」出現於軀幹再擴散至四肢臉部,選項所述的時間(高燒後5~7天)與典型不符,故列為錯誤。掌握重點:登革熱侵犯小血管、四型病毒、皮疹於發燒數日出現、嚴重者為出血性登革熱。","options":{"A":"登革病毒主要侵犯小血管(微血管),正確。","B":"登革病毒分四型,正確。","C":"正解(錯誤敘述)。登革熱皮疹多在發燒後約3~5天出現,時間描述不符。","D":"出血性登革熱是嚴重型登革熱,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 登革熱/病媒傳染病防治工作指引"]}},"106110-N3-76":{"quick":"登革熱是病媒蚊傳染、人不直接傳染,「不需接觸隔離」,故C錯誤。","detail":{"background":"登革熱:A「埃及斑蚊及白線斑蚊為主要傳染媒介」正確;B「潛伏期約3~8天(最長可達約二週)」正確;D「避免使用aspirin及indomethacin(NSAID)退燒止痛(防出血)」正確。C「需採用『接觸隔離』措施」為「錯誤」——登革熱「經病媒蚊叮咬傳染,人與人之間不會直接接觸傳染」,因此「不需接觸隔離」;真正需要的是「防蚊措施(病室防蚊、清除孳生源、避免病人在病毒血症期再被蚊叮咬而擴散疫情)」。故C為錯誤敘述(登革熱不需接觸隔離)。","options":{"A":"埃及斑蚊及白線斑蚊為主要傳染媒介,正確。","B":"潛伏期約3~8天(最長約二週),正確。","C":"正解(錯誤敘述)。登革熱是病媒蚊傳染、人不直接傳染,不需接觸隔離。","D":"避免使用aspirin及indomethacin退燒(防出血),正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 登革熱/病媒傳染病防治工作指引"]}},"106111-N3-79":{"quick":"脊髓灰白質炎(小兒麻痺)是糞口傳染,非病媒叮咬,故選B(不包括)。","detail":{"background":"「病媒(節肢動物)叮咬」傳染的疾病是經蚊、蜱、蚤等媒介傳播。本題找「不包括(非病媒叮咬傳染)」者:A「腦炎(如日本腦炎)」由「三斑家蚊」叮咬傳染;C「瘧疾」由「瘧蚊(Anopheles)」叮咬傳染;D「登革熱」由「斑蚊」叮咬傳染——都屬病媒傳染。B「脊髓灰白質炎(小兒麻痺, poliomyelitis)」是「經『糞口途徑(食入污染的水或食物)』傳染」的疾病,「不是」病媒叮咬傳染。故藉病媒叮咬傳染的疾病不包括B小兒麻痺。","options":{"A":"腦炎(日本腦炎)由蚊叮咬傳染,屬病媒傳染,非答案。","B":"正解(不包括)。小兒麻痺是糞口傳染,非病媒叮咬。","C":"瘧疾由瘧蚊叮咬傳染,屬病媒傳染,非答案。","D":"登革熱由斑蚊叮咬傳染,屬病媒傳染,非答案。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 登革熱/病媒傳染病防治工作指引"]}},"107030-N3-80":{"quick":"登革熱禁用aspirin(增加出血),故B「使用aspirin降溫」錯誤。","detail":{"background":"登革熱的處置:A「只能採症狀及支持療法(無特效抗病毒藥,著重退燒、補液、監測出血與血漿外漏)」正確;C「病人恢復後,只對『此次感染的特定型』登革熱有終生免疫力(對其他三型無交叉保護,再感染他型易致嚴重登革熱)」正確;D「病人需臥床休息,補充體液及高熱量高蛋白飲食」正確。B「使用含『阿斯匹靈(aspirin)』類藥物以降低體溫」為「錯誤」——登革熱「禁用aspirin與NSAID」(會抑制血小板、增加出血風險、可能誘發出血性登革熱),退燒應用「acetaminophen」。故B為錯誤處置。","options":{"A":"登革熱只能採症狀及支持療法,正確。","B":"正解(錯誤敘述)。登革熱禁用aspirin(增加出血),應用acetaminophen。","C":"康復後只對該次感染型別有終生免疫,正確。","D":"臥床休息、補充體液與高熱量高蛋白飲食,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 登革熱/病媒傳染病防治工作指引"]}},"108020-N3-79":{"quick":"登革病毒在人體繁殖產生的是「病毒血症」非「菌血症」,故B「產生菌血症」錯誤。","detail":{"background":"登革熱敘述:A「經埃及斑蚊或白線斑蚊叮咬人體、將登革病毒傳播到人體所引起」正確;C「出血性登革熱(DHF)為一種急性熱病(嚴重型,有血漿外漏、出血、休克)」正確;D「病人主訴骨骼特別痠痛難忍,故登革熱又稱『斷骨熱(碎骨熱)』」正確。B「登革病毒進入人體繁殖,並產生『菌血症』,再經病媒蚊隨血液吸入、叮咬再傳染他人」為「錯誤」——登革熱是「『病毒』」感染,病毒在人體血液中繁殖造成的是「『病毒血症(viremia)』」,而「不是『菌血症(bacteremia,細菌存在於血液)』」;病媒蚊在病人病毒血症期吸血而帶毒、再叮咬他人傳播。故B用詞「菌血症」錯誤(應為病毒血症)。","options":{"A":"經斑蚊叮咬將登革病毒傳播到人體,正確。","B":"正解(錯誤敘述)。登革病毒造成的是病毒血症,非菌血症(細菌)。","C":"出血性登革熱為嚴重型急性熱病,正確。","D":"骨骼痠痛難忍,故稱斷骨熱/碎骨熱,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 登革熱/病媒傳染病防治工作指引"]}},"112030-N3-80":{"quick":"登革熱是病媒蚊傳染,病人有病毒血症,防護採「血液和體液的防護」,故選D。","detail":{"background":"登革熱病人的隔離防護:登革熱「不會」經由人與人的接觸、飛沫或糞口直接傳染,故「不需」接觸隔離(A)、呼吸道隔離(B)或腸道隔離(C)。但病人在「病毒血症期」血液中含有登革病毒,若被斑蚊叮咬可使蚊帶毒、再傳染他人,且醫護處理其血液時也應防護,故應採「『血液和體液的防護(標準防護/血液體液預防措施)』」——避免針扎、接觸血液體液時戴手套,並做好「病室防蚊(紗窗、清除孳生源)」防止病人再被叮咬而擴散。故正確為D。","options":{"A":"登革熱人不直接接觸傳染,不需接觸隔離,錯誤。","B":"登革熱非呼吸道傳染,不需呼吸道隔離,錯誤。","C":"登革熱非糞口傳染,不需腸道隔離,錯誤。","D":"正解。病人有病毒血症,採血液和體液防護並防蚊。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 登革熱/病媒傳染病防治工作指引"]}},"114030-N3-50":{"quick":"登革熱典型「馬鞍狀(雙峰)發燒」——退燒1~2天後又再發燒,故D正確。","detail":{"background":"登革熱敘述(找正確):D「『馬鞍狀(雙峰/saddleback)發燒』——發燒3天後體溫下降1~2天,之後又再度發燒」正確,是登革熱的典型發燒型態。其餘錯誤:A「臉部出現不痛不癢的紅斑」——登革熱皮疹是「軀幹四肢的瀰漫性紅疹」(可有點狀出血),非僅臉部不痛不癢紅斑;B「病毒從『呼吸道』檢體分離是確診主要依據」錯——登革熱確診靠「血清學(NS1抗原、IgM/IgG)或血液PCR分離病毒」,非呼吸道檢體;C「為第『三』類法定傳染病」錯——登革熱在台灣是「第『二』類法定傳染病」(需24小時內通報)。故D正確。","options":{"A":"登革熱皮疹是軀幹四肢瀰漫性紅疹,非僅臉部不痛不癢紅斑,錯誤。","B":"確診靠血清/血液PCR,非呼吸道檢體,錯誤。","C":"登革熱是第二類法定傳染病,非第三類,錯誤。","D":"正解。登革熱典型為馬鞍狀(雙峰)發燒。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 登革熱/病媒傳染病防治工作指引"]}},"106110-N3-75":{"quick":"腸病毒是「RNA病毒」(小核糖核酸病毒科),非DNA病毒,故A錯誤。","detail":{"background":"腸病毒(enterovirus)A「致病原為『DNA病毒』」為「錯誤」——腸病毒是「『RNA病毒』(屬小核糖核酸病毒科 Picornaviridae,包含克沙奇病毒、伊科病毒、腸病毒71型、小兒麻痺病毒等)」。B「常於『夏季及初秋』流行」正確(台灣腸病毒好發於春末至夏季);C「經病人『口鼻分泌物、糞便、飛沫』等傳染」正確(腸胃道與呼吸道傳染,亦可經接觸水疱液);D「目前除小兒麻痺病毒(有沙賓/沙克疫苗)外,『其他腸病毒尚無常規疫苗可預防』」正確(腸病毒71型疫苗近年才開始供應)。故A為錯誤敘述。","options":{"A":"正解(錯誤敘述)。腸病毒是RNA病毒,非DNA病毒。","B":"常於夏季及初秋流行,正確。","C":"經口鼻分泌物、糞便、飛沫等傳染,正確。","D":"除小兒麻痺外其他腸病毒早年尚無常規疫苗,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"110110-N3-80":{"quick":"腸病毒是「RNA病毒」,非DNA病毒,故A錯誤。","detail":{"background":"腸病毒的特性:A「是『DNA病毒』的一種」為「錯誤」——腸病毒屬「『RNA病毒』(小核糖核酸病毒科)」。B「除小兒麻痺病毒外,尚無(常規)疫苗可預防」正確;C「可經由口鼻分泌物、飛沫及糞便等途徑傳染」正確(腸胃道、呼吸道與接觸傳染);D「主要採症狀治療(無特效抗病毒藥,以支持療法為主、警覺重症前兆)」正確。故A為錯誤敘述。腸病毒感染多為手足口病、疱疹性咽峽炎,幼兒須警覺重症(腸病毒71型)。","options":{"A":"正解(錯誤敘述)。腸病毒是RNA病毒,非DNA病毒。","B":"除小兒麻痺外尚無常規疫苗可預防,正確。","C":"經口鼻分泌物、飛沫及糞便等途徑傳染,正確。","D":"主要採症狀治療(支持療法),正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"111030-N3-80":{"quick":"腸病毒「發病後」一週內傳染力最強,且成人感染雖多無症狀「仍具傳染力」,故C錯誤。","detail":{"background":"腸病毒敘述:A「經由腸胃道、呼吸道或接觸病人皮膚水泡的液體而感染」正確;B「感染時會出現發燒、手足口症及疱疹性咽峽炎等症狀」正確;D「引起腸病毒感染併發重症的型別以『腸病毒71型』為主」正確。C「『發病前』1週內傳染力最強,成人感染發病時多無症狀,且『無傳染力』」為「錯誤」——腸病毒在「『發病後』一週內傳染力最強」(發病前後皆可能排出病毒,但發病後一週傳染力最高);且「成人感染雖『多無明顯症狀』,但體內仍有病毒、『仍具傳染力』」,可成為隱性傳染源把病毒傳給家中幼童。故C「發病前最強」與「成人無傳染力」皆錯誤。","options":{"A":"經腸胃道、呼吸道或接觸水泡液感染,正確。","B":"會出現發燒、手足口症、疱疹性咽峽炎,正確。","C":"正解(錯誤敘述)。發病後一週傳染力最強;成人感染雖多無症狀仍具傳染力。","D":"重症型別以腸病毒71型為主,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"114100-N3-48":{"quick":"腸病毒71型重症前兆是嗜睡、持續嘔吐、肌躍型抽搐;單純「持續38°C發燒」非重症前兆,故選A。","detail":{"background":"腸病毒71型感染併發「重症」的前兆,是中樞神經與心肺功能受侵犯的警訊,包括:B「持續昏睡(嗜睡、意識不佳、活力不佳)」、C「持續嘔吐」、D「肌躍型抽搐(myoclonic jerk,睡覺時手腳突然抽動驚跳)」,另有「心跳加快、呼吸急促、肢體無力」等。本題找「不是」重症前兆者:A「持續體溫38°C」——單純「38°C的發燒」是腸病毒感染常見的一般症狀,『並非』重症前兆(重症警訊重點在『神經學症狀與活力意識改變』,而非單純發燒;若高燒不退合併上述神經症狀才需警覺)。故重症前兆不包括A,選A。家長衛教須教導辨識三大重症前兆:嗜睡、持續嘔吐、肌躍型抽搐。","options":{"A":"正解(不是重症前兆)。持續38°C是一般症狀,非重症警訊。","B":"持續昏睡(意識/活力改變)是重症前兆,非答案。","C":"持續嘔吐是重症前兆,非答案。","D":"肌躍型抽搐是重症前兆,非答案。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"104030-N3-79":{"quick":"SARS進入下呼吸道期是「乾咳(無痰)」或血氧過低,非濃稠痰液咳嗽,故D錯誤。","detail":{"background":"嚴重急性呼吸道症候群(SARS,由SARS冠狀病毒引起):A「可經由飛沫傳染或直接接觸病人分泌物造成」正確;B「發燒是前驅症狀,合併發冷寒顫、頭痛倦怠與輕微呼吸道症狀」正確;C「類固醇治療引起的副作用(續發性感染、低血鉀、高血糖)是併發症之一」正確(SARS曾用類固醇,須注意其副作用)。D「發病期7天後即進入下呼吸道期,會出現『濃稠痰液』的咳嗽」為「錯誤」——SARS進入下呼吸道期的典型表現是「『乾咳(無痰或痰少)』、呼吸困難與『血氧過低』」,並非「濃稠痰液」的咳嗽。故D為錯誤敘述。","options":{"A":"可經飛沫或接觸病人分泌物傳染,正確。","B":"發燒為前驅症狀,合併寒顫、頭痛倦怠,正確。","C":"類固醇副作用(續發感染、低血鉀、高血糖)是併發症,正確。","D":"正解(錯誤敘述)。SARS下呼吸道期是乾咳或血氧過低,非濃稠痰。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"104100-N3-80":{"quick":"低流量鼻導管氧氣(≤4L/min)不需常規潮濕瓶,且SARS應避免產生氣溶膠,故B錯誤。","detail":{"background":"SARS的護理措施:A「給氧時使用非再吸入型面罩(non-rebreathing mask)」正確(可提供高濃度氧、且為密閉式減少氣溶膠擴散);C「呼吸器設定選擇以『壓力為目標』的呼吸模式(PC、PRVC、Auto-flow)較能符合急性呼吸窘迫病人需求(限壓保護肺)」正確;D「PaO2/FiO2<100(嚴重低血氧/重度ARDS)是進行插管的絕對適應症」正確。B「使用氧氣鼻導管時,需『同時使用潮濕瓶』」為「錯誤」——「低流量鼻導管(一般≤4 L/min)『不需』常規使用潮濕瓶」;且對SARS這類「飛沫/接觸傳染、需防氣溶膠擴散」的病人,「會產生氣溶膠的潮濕(氣泡)裝置應避免」,以免增加病毒播散風險。故B為錯誤措施。","options":{"A":"使用非再吸入型面罩提供高濃度氧且減少氣溶膠,正確。","B":"正解(錯誤敘述)。低流量鼻導管不需常規潮濕瓶,且SARS應避免產生氣溶膠。","C":"選壓力目標模式(PC/PRVC)保護肺,正確。","D":"PaO2/FiO2<100是插管的絕對適應症,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"105030-N3-78":{"quick":"靜脈注射Ribavirin應「以食鹽水稀釋後『緩慢』滴注」,非快速推注,故D錯誤。","detail":{"background":"SARS病人抗病毒藥(Ribavirin)治療:A「對發燒超過1天的醫療照顧者及親密接觸者,提供口服Ribavirin做預防性給藥」、B「對嚴重感染及口服耐受性不佳者,提供靜脈注射Ribavirin」、C「口服Ribavirin對懷孕及胚胎生長有影響(具致畸性),病人需停藥一段時間(約6個月)後才能懷孕」——這些屬當年SARS用藥的敘述,視為正確。D「靜脈注射Ribavirin時,需以生理食鹽水稀釋並『快速以靜脈推注』給予」為「錯誤」——靜脈Ribavirin應「以生理食鹽水稀釋後『緩慢靜脈滴注』」,而非「快速靜脈推注」(快速推注易致不良反應)。故D給藥方式錯誤。","options":{"A":"發燒>1天的照顧者/接觸者給口服Ribavirin預防,(當年作法)正確。","B":"嚴重感染或口服耐受不佳者給靜脈Ribavirin,正確。","C":"Ribavirin具致畸性,停藥一段時間後才能懷孕,正確。","D":"正解(錯誤敘述)。靜脈Ribavirin應以食鹽水稀釋後緩慢滴注,非快速推注。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"108110-N3-80":{"quick":"SARS急性期X光是毛玻璃/浸潤,不會「肺部鈣化」(鈣化是陳舊病灶),故B不包括(錯誤)。","detail":{"background":"SARS的臨床症狀,本題找「不包括(非SARS表現)」者:A「肌肉痛」是SARS常見的全身症狀(發燒、肌肉痛、頭痛、倦怠);C「發病後3~7天進入下呼吸道期,出現『沒有痰的乾咳』或血氧過低」是SARS典型病程;D「早期肌酸磷酸激酶(CPK)與肝轉胺酶(transaminase)會升高」是SARS可見的實驗室異常。B「發病期常見肺部『鈣化』合併胸部X光異常」為「不包括(錯誤)」——SARS急性期的胸部X光/CT是「『毛玻璃狀變化、肺浸潤、實質化』」,「『肺部鈣化』」是「陳舊、慢性病灶(如陳舊性結核、肉芽腫)」的表現,並非SARS急性期的特徵。故B不屬於SARS的臨床症狀。","options":{"A":"肌肉痛是SARS常見全身症狀,非答案。","B":"正解(不包括)。SARS急性期X光是毛玻璃/浸潤,非肺部鈣化。","C":"發病3~7天進入下呼吸道期、乾咳或血氧過低,非答案。","D":"早期CPK與肝轉胺酶升高,非答案。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"106030-N3-79":{"quick":"H1N1新型流感原本是在「豬群」中傳染的疾病(豬流感),故B正確。","detail":{"background":"H1N1新型流感敘述(找正確):B「原本是一種在『豬群』中傳染的疾病(俗稱豬流感)」正確——2009年H1N1新型流感源自豬流感病毒重組,可人傳人。其餘錯誤:A「致病原是『H型』流感病毒」錯——是「『A型』流感病毒的H1N1亞型」(流感分A、B、C型,H1N1是A型的亞型,並無「H型」流感);C「大部分感染者症狀會迅速惡化轉為重症」錯——「多數病人症狀輕微、可自行康復」,僅少數高危族群轉重症;D「唯一藥物是Oseltamivir(Tamiflu),但治療效果欠佳」錯——抗病毒藥Tamiflu(克流感)『有效』(早期使用可縮短病程、減少併發症),且還有Zanamivir(Relenza,瑞樂沙)等選擇,並非唯一也非效果欠佳。故B正確。","options":{"A":"H1N1是A型流感的亞型,無「H型」流感,錯誤。","B":"正解。H1N1原本是豬群中傳染的疾病(豬流感)。","C":"多數病人症狀輕微可康復,非大部分轉重症,錯誤。","D":"Tamiflu有效且另有Relenza,非唯一也非效果欠佳,錯誤。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"112110-N3-79":{"quick":"COVID-19應「避免氣霧式(Nebulizer)治療」以防氣溶膠播散病毒,故C正確。","detail":{"background":"COVID-19(嚴重特殊傳染性肺炎)護理措施(找正確):C「避免使用Nebulizer等『氣霧式(噴霧)治療』」正確——氣霧治療會「產生氣溶膠、增加病毒向環境播散」的風險,故應避免、改用定量噴霧吸入器(MDI)等。其餘錯誤:A「無休克證據,仍應給予『大量輸液』」錯——無休克時應採「保守輸液(避免過量導致肺水腫、惡化氧合)」;B「『常規』給予全身性皮質類固醇」錯——類固醇(如dexamethasone)只用於「需氧氣或呼吸器支持的重症」病人,並非『常規』給所有病人(輕症不需);D「『常規』使用高流量鼻導管(HFNO)給氧」錯——HFNO也會產生氣溶膠,須在「適當防護的隔離環境」謹慎使用,並非常規。故C正確。","options":{"A":"無休克時應保守輸液避免肺水腫,非大量輸液,錯誤。","B":"類固醇僅用於需氧氣/呼吸器的重症,非常規給予,錯誤。","C":"正解。避免氣霧式(Nebulizer)治療以防氣溶膠播散病毒。","D":"HFNO會產生氣溶膠須謹慎,非常規使用,錯誤。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"112110-N3-80":{"quick":"流感重症常見「淋巴球『減少』」、CRP/LDH上升;故D「淋巴球持續上升」錯誤。","detail":{"background":"流感併發重症:A「為第四類法定傳染病,一星期內需通報」正確;B「高危險群包括精神疾病、氣喘等慢性病病人(及孕婦、嬰幼兒、老人、肥胖、免疫不全)」正確;C「發病後高燒(39°C以上)持續三天以上(是併發重症的警訊之一)」正確。D「『淋巴球數目』與CRP或LDH『持續上升』」為「錯誤」——流感重症的實驗室變化常為「『淋巴球『減少(降低)』』」,而「CRP、LDH則上升」;選項說「淋巴球數目持續『上升』」與實際相反(流感病毒感染多使淋巴球下降)。故D為錯誤敘述。","options":{"A":"流感併發重症是第四類法定傳染病、一週內通報,正確。","B":"高危險群含精神、氣喘等慢性病病人,正確。","C":"高燒39°C持續三天以上是重症警訊,正確。","D":"正解(錯誤敘述)。流感重症淋巴球減少、CRP/LDH上升;非淋巴球持續上升。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"114170-N3-48":{"quick":"COVID-19重症採「體液負平衡+俯臥姿勢」有助改善氧合,故B最適當。","detail":{"background":"COVID-19病人的呼吸照護(選最適當):B「體液輸出入『負平衡』及『俯臥姿勢(prone position)』有助改善氧合狀態」最適當——保守輸液(負平衡)可減輕肺水腫,「俯臥通氣」可改善通氣血流比、增加背側肺泡擴張,是中重度ARDS改善氧合的重要措施。其餘不適當:A「呼吸喘而拮抗呼吸器,應『避免』給予鎮靜劑與肌肉鬆弛劑」錯——病人與呼吸器拮抗(人機不同步)時,反而『需要』適當鎮靜、必要時肌肉鬆弛以利通氣;C「以噴霧治療稀釋痰液」錯——噴霧(氣霧)會產生氣溶膠播散病毒,應避免;D「以T型管(T-Piece)進行呼吸器脫離訓練」錯——T型管為開放系統會產生氣溶膠,COVID-19病人脫離訓練宜採『密閉式』方式。故B最適當。","options":{"A":"人機拮抗時需適當鎮靜±肌鬆,非避免,錯誤。","B":"正解。體液負平衡+俯臥姿勢有助改善氧合。","C":"噴霧治療會產生氣溶膠播散病毒,應避免,錯誤。","D":"T型管為開放系統產生氣溶膠,不宜,錯誤。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"115030-N3-50":{"quick":"H1N1是「A型」流感病毒(病毒非病菌),無「H型」流感,故A錯誤。","detail":{"background":"H1N1流感敘述:B「大部分病人症狀輕微,一週內可痊癒」正確;C「主要經由飛沫與接觸傳染」正確;D「治療藥物為Tamiflu(克流感)及Relenza(瑞樂沙)等神經胺酸酶抑制劑」正確。A「病原『菌』屬於『H型』流感病毒」為「錯誤」——兩處錯:①流感是「病『毒』」感染,不是病「菌(細菌)」;②流感病毒分「A、B、C型」,H1N1是「『A型』流感病毒的亞型(依表面H、N抗原命名為H1N1)」,並沒有「H型流感」這種分類。故A敘述錯誤(應為A型流感病毒)。","options":{"A":"正解(錯誤敘述)。H1N1是A型流感病毒(病毒非病菌),無「H型」流感。","B":"多數病人症狀輕微、一週內痊癒,正確。","C":"主要經飛沫與接觸傳染,正確。","D":"治療藥物為Tamiflu及Relenza,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"103100-N3-79":{"quick":"阿米巴痢疾(嚴重腹瀉)營養應「高蛋白高熱量、低渣、補充水電解質」,非一般正常飲食,故D錯誤。","detail":{"background":"阿米巴痢疾(amebic dysentery,由痢疾阿米巴 Entamoeba histolytica 引起):A「經由食入受痢疾阿米巴(囊體)污染的食物或飲水而感染(糞口傳染)」正確;B「痢疾阿米巴囊體進入人體後主要寄生在『大腸(尤其盲腸與乙狀結腸)』」正確,造成腸壁潰瘍與血便黏液便;C「病人應採『腸胃道(腸道)隔離』」正確(糞口傳染,須妥善處理糞便、接觸後洗手)。D「營養方面提供『一般正常飲食』」為「錯誤」——阿米巴痢疾病人有「嚴重腹瀉、腸黏膜潰瘍與水分電解質流失」,營養應給予「『高蛋白、高熱量、低渣(低纖維,減少腸道刺激)』飲食,並補充足夠水分與電解質」,而非「一般正常飲食」。故D為錯誤敘述。","options":{"A":"經食入污染食物飲水感染(糞口傳染),正確。","B":"阿米巴主要寄生在大腸(盲腸、乙狀結腸),正確。","C":"應採腸胃道(腸道)隔離,正確。","D":"正解(錯誤敘述)。應給高蛋白高熱量低渣飲食並補充水電解質,非一般正常飲食。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"104030-N3-80":{"quick":"狂犬病的病理特徵是「內基氏小體(Negri bodies)」,非阿氏小體(Arthus),故C錯誤。","detail":{"background":"狂犬病(rabies):A「狂犬病毒存在於已感染動物的唾液中」正確;B「狂犬病毒會經由被感染動物咬傷的傷口,沿『周邊神經』上行到『中樞神經』」正確(故傷口越近頭部潛伏期越短);D「處置為被咬後傷口處理,並肌肉注射『人類雙套染色體細胞疫苗(HDCV)』及『狂犬病免疫球蛋白(RIG)』做暴露後預防」正確。C「病理特徵是腦部神經軸突上出現『阿氏小體(Arthus bodies)』」為「錯誤」——狂犬病的特徵性病理是神經細胞「『細胞質內』出現的包涵體『內基氏小體(Negri bodies)』」(常見於海馬迴與小腦Purkinje細胞);「Arthus(阿氏)反應」是第三型過敏反應,與狂犬病無關。故C名稱張冠李戴,錯誤(應為內基氏小體)。","options":{"A":"狂犬病毒存在於感染動物的唾液中,正確。","B":"病毒沿周邊神經上行到中樞神經,正確。","C":"正解(錯誤敘述)。狂犬病的病理特徵是內基氏小體(Negri bodies),非阿氏小體。","D":"被咬後給人類雙套染色體細胞疫苗及狂犬病免疫球蛋白,正確。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"105090-N3-31":{"quick":"泡沫狀、惡臭的陰道分泌物+外陰腫脹搔癢=「陰道滴蟲症(Trichomonas)」,故選B。","detail":{"background":"陳小姐「泡沫狀、惡臭(腥臭)的陰道分泌物、陰唇腫脹、發癢、起疹子」是「陰道滴蟲症(trichomoniasis,由陰道滴蟲 Trichomonas vaginalis 引起)」的典型表現——分泌物呈「黃綠色、泡沫狀、有惡臭」,伴外陰陰道紅腫搔癢、刺痛,屬性傳染病,治療用「metronidazole(且性伴侶須同時治療)」。故選B。區辨其他:A「披衣菌感染」多無症狀或輕微、分泌物較稀;C「尖型濕疣(菜花,HPV)」是外陰菜花樣贅生物,非泡沫狀分泌物;D「(嗜血桿菌等)細菌性陰道炎」分泌物為「灰白色、均質、魚腥味」但「不呈泡沫狀、外陰刺激較輕」。故泡沫狀惡臭分泌物最符合陰道滴蟲症,選B。","options":{"A":"披衣菌感染多無症狀或分泌物稀,非泡沫狀惡臭,錯誤。","B":"正解。泡沫狀惡臭分泌物+外陰腫脹搔癢=陰道滴蟲症。","C":"尖型濕疣(菜花)是外陰贅生物,非泡沫狀分泌物,錯誤。","D":"細菌性陰道炎為灰白均質魚腥味、非泡沫狀,錯誤。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"106111-N3-80":{"quick":"漢生病(痲瘋)侵犯周邊神經造成「感覺喪失」,護理目標是保護無感覺肢體避免外傷,而非「免於疼痛」,故C錯誤。","detail":{"background":"漢生病(Hansen disease/痲瘋, leprosy,由痲瘋桿菌 Mycobacterium leprae 引起)主要侵犯「皮膚與『周邊神經』」,造成受侵神經分布區「『感覺喪失(麻木、痛溫覺消失)』、肌肉無力與變形」。照顧漢生病病人的護理目標:A「保持皮膚完整性、減少皮膚病兆進展」正確;B「使皮膚病兆無感染情形」正確;D「協助病人接受身體形象改變、建立正向自我概念」正確(漢生病常致外觀變形與社會烙印)。C「病人獲得並維持『免於疼痛』的狀態」為「錯誤」——漢生病的核心問題是「『感覺(痛覺)喪失』」而非疼痛;病人因「痛覺消失、受傷燙傷而不自知」反而容易「反覆外傷、潰瘍、繼發感染與肢端殘缺」,故護理目標應是「『保護感覺喪失的肢體、預防外傷與燙傷』」,而非「免於疼痛」(他們本就感覺不到痛,這正是危險所在)。故C為錯誤的護理目標。","options":{"A":"保持皮膚完整、減少皮膚病兆進展,正確目標。","B":"使皮膚病兆無感染,正確目標。","C":"正解(錯誤敘述)。漢生病是感覺喪失,目標應保護無感覺肢體防外傷,非免於疼痛。","D":"協助接受身體改變、建立正向自我概念,正確目標。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"108020-N3-45":{"quick":"生殖器疱疹由「單純疱疹病毒第二型(HSV-2)」引起,非水痘病毒,故D錯誤。","detail":{"background":"生殖器疱疹(genital herpes):A「為性交(性接觸)傳染」正確;B「教導病人避免擠壓患部水疱(防續發感染與擴散)」正確;C「發病後(水疱、潰瘍期具高傳染力)應避免與他人親密性接觸,待病灶癒合」正確。D「由『帶狀水痘病毒(VZV)』感染所引起」為「錯誤」——生殖器疱疹是由「『單純疱疹病毒第二型(HSV-2)』(少數為HSV-1)」引起,而「水痘帶狀疱疹病毒(VZV)」引起的是水痘與帶狀疱疹,兩者是不同病毒。故D病原張冠李戴,錯誤(應為HSV-2)。生殖器疱疹會潛伏於薦神經節、反覆復發,治療用acyclovir等抗病毒藥。","options":{"A":"生殖器疱疹為性接觸傳染,正確。","B":"避免擠壓患部水疱防續發感染擴散,正確。","C":"病灶期具傳染力,應避免親密性接觸至癒合,正確。","D":"正解(錯誤敘述)。生殖器疱疹由HSV-2引起,非水痘病毒(VZV)。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"113030-N3-50":{"quick":"漢生病(痲瘋)經長期密切接觸與呼吸道飛沫傳染,照護採「接觸及呼吸道隔離」,故B正確。","detail":{"background":"漢生病(痲瘋, leprosy)照護(找正確):B「照護時採『接觸及呼吸道隔離』」正確——痲瘋桿菌主要經「長期、密切接觸」與「鼻腔分泌物/飛沫(呼吸道)」傳染(傳染力其實不高、潛伏期長),故防護採接觸與呼吸道隔離。其餘錯誤:A「最常侵犯『腸胃系統』」錯——漢生病主要侵犯「『皮膚與周邊神經』」(造成感覺喪失、變形),非腸胃系統;C「目前『無治療藥物』,採支持療法」錯——漢生病「可用『多重藥物治療(MDT:dapsone、rifampin、clofazimine)』治癒」;D「皮膚病變僅出現在『臉部』」錯——皮膚病變可分布「全身」(斑塊、結節、感覺喪失區),不限臉部。故B正確。","options":{"A":"漢生病主要侵犯皮膚與周邊神經,非腸胃系統,錯誤。","B":"正解。經長期密切接觸與呼吸道飛沫傳染,採接觸及呼吸道隔離。","C":"漢生病可用多重藥物治療(MDT)治癒,非無藥可治,錯誤。","D":"皮膚病變可分布全身,不限臉部,錯誤。"},"sources":["新文京《內外科護理學》感染與傳染病","華杏《新編內外科護理學》","疾病管制署 傳染病防治工作指引"]}},"104100-N3-79":{"quick":"H5N1是流感病毒A型、HA為H5亞型(除H1、H3以外)；抗病毒藥應於發病48小時內使用。","detail":{"background":"H5N1為高致病性禽流感病毒，屬「A型流感病毒(influenza A)」。流感病毒以表面兩種醣蛋白分型：血球凝集素(HA，hemagglutinin，共H1～H18)與神經胺酸酶(NA，neuraminidase，共N1～N11)，H5N1即HA為第5型、NA為第1型。一般人類季節性流感以H1、H3為主，H5屬禽流感跨物種感染的亞型。抗病毒藥(oseltamivir/Tamiflu、zanamivir/Relenza屬神經胺酸酶抑制劑)應於「發病後48小時內」投予最能縮短病程、降低嚴重度；超過48小時效果遞減。","options":{"A":"正確。H5N1為A型流感病毒，HA屬H5亞型(非一般人類流感的H1、H3)。","B":"錯誤。神經胺酸酶是NA(非HA)；H5N1的「5」指HA第5型，「N1」才是NA第1型。","C":"錯誤。血球凝集素是HA(非NA)；且H5N1的N1指神經胺酸酶第1型。","D":"錯誤。應於發病「48小時內」使用，非72小時。"},"sources":["新文京《內外科護理學》傳染病防治","流感病毒抗原分型與抗病毒藥物"]}}},TO=["I1感染管制隔離與傳染病防治通則", "I2敗血症", "I3登革熱與病媒傳染病", "I4腸病毒", "I5新興呼吸道傳染病(SARS/COVID-19/流感)", "I6其他法定傳染病與性傳染病"],LEC={"I1感染管制隔離與傳染病防治通則":{"title":"I1 感染管制、隔離與傳染病防治通則 複習講義","html":"\n<h3>一、預防傳染病的有效性排序</h3>\n<p><b>最有效=預防接種(疫苗)</b>(從根本提升群體免疫);日常最重要、最具成本效益=<b>手部衛生(洗手)</b>。穿手套只是接觸防護之一,<b>非最有效</b>(脫手套後仍須洗手)。改善環境衛生、充足營養(維生素A/B/C、蛋白質、鋅)增強宿主抵抗力亦為防治作法。</p>\n<h3>二、隔離 vs 檢疫</h3>\n<ul>\n<li><b>隔離(isolation)</b>:針對「已發病/帶原(排菌)病人」,阻斷傳出;方式依傳染途徑(接觸/飛沫/空氣)而異,時間視傳染期而定。</li>\n<li><b>檢疫(quarantine)</b>:針對「曾暴露、可能在潛伏期但『尚未發病』的『接觸者』」,觀察並限制行動。</li>\n<li><b>保護性(反向)隔離</b>:保護「免疫低下者」(重度燒傷、高劑量類固醇、化療、白血球低下)避免被外界感染;<b>感染源病人(如腸病毒)需的是防傳出,而非保護性隔離</b>。</li>\n<li>切斷<b>傳染鏈任一環節</b>即可阻斷傳染。</li>\n</ul>\n<h3>三、隔離類型對應</h3>\n<ul>\n<li><b>腸道(糞口)隔離</b>:痢疾、傷寒、霍亂、阿米巴痢疾、沙門氏菌(處理糞便、戴手套穿隔離衣,<b>不需口罩</b>;同菌可同房cohort)。<b>腮腺炎是飛沫傳染→飛沫隔離,不需腸道隔離</b>。</li>\n<li><b>病媒傳染病(登革熱)</b>:人不直接傳染→不需接觸/飛沫/腸道隔離,採<b>血液體液防護+防蚊</b>。</li>\n</ul>\n<h3>四、院內感染與傳染病評估</h3>\n<ul>\n<li>院內感染(HAI):住院前無感染、住院<b>48~72小時後</b>得到的感染;原患部住院中重複感染新菌種(續發感染)<b>仍算</b>院內感染。</li>\n<li>傳染病護理評估重點:<b>症狀起始時間、旅遊史、接觸史、居住環境、疫苗史</b>;<b>家族疾病史非評估重點</b>(屬遺傳/慢性病)。</li>\n<li>手部衛生:一般洗手去除污垢與<b>暫存性菌叢</b>;降低<b>固有性(常在)菌叢</b>需<b>外科刷手</b>。WHO手部衛生五時機(接觸病人前後、無菌操作前、接觸體液後、接觸病人環境後)。</li>\n</ul>\n"},"I2敗血症":{"title":"I2 敗血症(Sepsis) 複習講義","html":"\n<h3>一、病生理機轉</h3>\n<p>感染→大量發炎介質(<b>TNF-α、IL-1</b>)釋放→①<b>微血管通透性增加、血漿外滲</b>→有效循環血量<b>減少</b>、血管擴張(分布性休克、低血壓);②組織灌流降低、細胞缺氧、無氧代謝→<b>乳酸堆積、代謝性酸中毒</b>;③凝血失調、產生微小血栓→<b>瀰漫性血管內凝血(DIC)、血小板減少</b>;④腎灌流降低→<b>尿量減少</b>、急性腎損傷;⑤肝功能障礙→膽紅素升高。</p>\n<h3>二、臨床徵象(方向要記對)</h3>\n<p>發燒/低體溫、<b>心跳加快、呼吸加快、低血壓、低血氧、尿量減少、意識改變、代謝性酸中毒、白血球異常、乳酸升高、血小板<140,000</b>。<b>不是</b>:循環血量增加、血壓上升、尿量增加、呼吸變慢、高血氧(這些都相反)。</p>\n<h3>三、診斷檢驗</h3>\n<p><b>血液培養(給抗生素前先採)、白血球、CRP、procalcitonin、血清乳酸</b>;器官障礙指標:尿量<0.5 mL/kg/hr、膽紅素>4、血小板減少、收縮壓<90。<b>血糖非診斷敗血症的特定項目</b>。</p>\n<h3>四、Hour-1 Bundle(第一小時組合照護)</h3>\n<ul>\n<li>測<b>血清乳酸</b>;<b>採血液培養後</b>給<b>廣效抗生素</b>(培養先做、但抗生素1小時內給,不延誤)。</li>\n<li>低血壓或乳酸≥4 mmol/L→快速輸注晶體液<b>30 mL/kg</b>(非40)。</li>\n<li>輸液後仍低血壓→升壓劑(norepinephrine)維持<b>平均動脈壓(MAP)≥65 mmHg</b>(非60);維持CVP適當。</li>\n<li>感染的中心靜脈導管應盡速<b>拔除</b>(去除感染源)。</li>\n</ul>\n<p>TTAS檢傷:疑似敗血性休克(感染+生命徵象不穩+意識改變)判為<b>第一級</b>;優先輸液、培養、抗生素、升壓,<b>GCS未<8、SpO2尚可時不需立即插管</b>。</p>\n"},"I3登革熱與病媒傳染病":{"title":"I3 登革熱與病媒傳染病 複習講義","html":"\n<h3>一、登革熱(Dengue)</h3>\n<p>登革病毒(分<b>四型 DEN-1~4</b>)經<b>埃及斑蚊、白線斑蚊</b>叮咬傳染(斑蚊清晨傍晚活動);主要侵犯<b>小血管(微血管)</b>。潛伏期約3~8天。症狀:發燒、<b>骨骼肌肉劇痛(斷骨熱/碎骨熱)</b>、<b>馬鞍狀(雙峰)發燒</b>、皮疹(發燒約3~5天出現於軀幹四肢)。嚴重型=<b>出血性登革熱(DHF)</b>(血漿外漏、血比容上升、血小板下降、出血、休克)。台灣為<b>第二類法定傳染病</b>(24小時通報);確診靠<b>血清(NS1/IgM/IgG)或血液PCR</b>。</p>\n<ul>\n<li><b>禁用aspirin、NSAID(ibuprofen/indomethacin)</b>(抑制血小板、增加出血)→退燒用<b>acetaminophen</b>。</li>\n<li>只能<b>症狀支持療法</b>;臥床休息、補充體液、監測體溫/血比容/血紅素/電解質/出血。</li>\n<li>康復後<b>只對該次感染型別有終生免疫</b>,再感染他型易致嚴重登革熱。</li>\n<li><b>人與人不直接傳染</b>→不需接觸/飛沫/腸道隔離,採<b>血液體液防護+病室防蚊</b>(避免病毒血症期病人再被叮咬擴散)。</li>\n</ul>\n<h3>二、病媒傳染病</h3>\n<p>經病媒(蚊/蜱/蚤)叮咬:<b>登革熱(斑蚊)、日本腦炎(三斑家蚊)、瘧疾(瘧蚊)</b>。<b>小兒麻痺(脊髓灰白質炎)是糞口傳染、非病媒</b>。登革病毒造成<b>病毒血症(viremia)</b>而非菌血症。</p>\n"},"I4腸病毒":{"title":"I4 腸病毒(Enterovirus) 複習講義","html":"\n<h3>一、病原與傳染</h3>\n<p>腸病毒是<b>RNA病毒</b>(小核糖核酸病毒科;含克沙奇、伊科、腸病毒71型、小兒麻痺病毒)。<b>夏季及初秋</b>流行。經<b>腸胃道、呼吸道(飛沫)、口鼻分泌物、糞便、接觸皮膚水泡液</b>傳染。</p>\n<h3>二、症狀與傳染力</h3>\n<ul>\n<li>常見:<b>發燒、手足口病、疱疹性咽峽炎</b>。</li>\n<li><b>發病後一週內傳染力最強</b>;<b>成人感染雖多無症狀,仍具傳染力</b>(隱性傳染源傳給幼童)。</li>\n<li>主要<b>症狀治療(支持療法)</b>;除小兒麻痺病毒外早年無常規疫苗(腸病毒71型疫苗近年才有)。</li>\n</ul>\n<h3>三、重症(腸病毒71型)前兆 — 衛教重點</h3>\n<p>三大重症前兆:<b>①嗜睡(意識/活力不佳)②持續嘔吐③肌躍型抽搐(睡眠中手腳突然抽動驚跳)</b>,另有心跳呼吸加快、肢體無力。<b>單純持續38°C發燒不是重症前兆</b>(重症警訊在神經學症狀與意識活力改變)。出現前兆應立即就醫。</p>\n"},"I5新興呼吸道傳染病(SARS/COVID-19/流感)":{"title":"I5 新興呼吸道傳染病(SARS / COVID-19 / 流感) 複習講義","html":"\n<h3>一、SARS(嚴重急性呼吸道症候群)</h3>\n<p>SARS冠狀病毒,<b>飛沫+接觸</b>傳染。前驅:發燒、寒顫、頭痛倦怠、肌肉痛;<b>發病3~7天進入下呼吸道期=乾咳(無痰)或血氧過低</b>(非濃稠痰);早期CPK與肝轉胺酶上升;急性期X光是<b>毛玻璃/浸潤(非鈣化)</b>。護理:非再吸入型面罩給氧、壓力目標呼吸模式(PC/PRVC)、PaO2/FiO2<100是插管絕對適應症;<b>低流量鼻導管不需常規潮濕瓶、避免產生氣溶膠</b>。抗病毒藥Ribavirin <b>靜脈須以食鹽水稀釋緩慢滴注(非快速推注)</b>、具致畸性。</p>\n<h3>二、COVID-19(嚴重特殊傳染性肺炎)</h3>\n<ul>\n<li><b>避免氣霧式(Nebulizer)治療、HFNO/T型管謹慎使用</b>(都產生氣溶膠播散病毒)。</li>\n<li>無休克時<b>保守輸液(避免肺水腫)</b>;類固醇<b>僅用於需氧氣/呼吸器的重症</b>(非常規)。</li>\n<li>重症:<b>體液負平衡+俯臥姿勢(prone)改善氧合</b>;人機拮抗時需適當鎮靜±肌肉鬆弛劑。</li>\n</ul>\n<h3>三、流感(H1N1/流感併發重症)</h3>\n<ul>\n<li>H1N1是<b>A型流感病毒</b>的亞型(無「H型」流感;是病毒非病菌),源自<b>豬流感</b>;多數輕症一週痊癒;<b>飛沫+接觸</b>傳染;治療<b>Tamiflu(克流感)、Relenza(瑞樂沙)</b>(有效)。</li>\n<li>流感併發重症=<b>第四類法定傳染病(一週內通報)</b>;高危群:孕婦、嬰幼兒、老人、氣喘/精神等慢性病、肥胖、免疫不全;重症:高燒39°C持續≥3天、<b>淋巴球減少、CRP/LDH上升</b>(淋巴球是「減少」非上升)。</li>\n</ul>\n"},"I6其他法定傳染病與性傳染病":{"title":"I6 其他法定傳染病與性傳染病 複習講義","html":"\n<h3>一、阿米巴痢疾</h3>\n<p>痢疾阿米巴(Entamoeba histolytica),<b>糞口傳染</b>(食入污染水/食物),主要寄生<b>大腸(盲腸、乙狀結腸)</b>、造成潰瘍與血便黏液便。採<b>腸道隔離</b>;營養給<b>高蛋白高熱量低渣+補充水電解質</b>(非一般正常飲食)。</p>\n<h3>二、狂犬病(Rabies)</h3>\n<p>病毒存在感染動物<b>唾液</b>,經咬傷沿<b>周邊神經上行到中樞神經</b>(近頭部潛伏期短)。病理特徵=<b>內基氏小體(Negri bodies,細胞質內包涵體)</b>(非Arthus阿氏小體)。暴露後預防:傷口處理+肌注<b>人類雙套染色體細胞疫苗(HDCV)+狂犬病免疫球蛋白(RIG)</b>。</p>\n<h3>三、漢生病(痲瘋, Leprosy)</h3>\n<p>痲瘋桿菌(Mycobacterium leprae),侵犯<b>皮膚與周邊神經</b>→<b>感覺喪失(痛溫覺消失)、變形</b>(非腸胃系統)。<b>長期密切接觸+呼吸道飛沫</b>傳染(傳染力低)→採<b>接觸及呼吸道隔離</b>。可用<b>多重藥物治療(MDT:dapsone/rifampin/clofazimine)治癒</b>。護理目標=<b>保護感覺喪失的肢體、預防外傷燙傷</b>(病人痛覺消失易受傷不自知),而非「免於疼痛」;協助接受身體改變、建立正向自我概念。</p>\n<h3>四、性傳染病</h3>\n<ul>\n<li><b>陰道滴蟲症(Trichomonas)</b>:<b>泡沫狀、黃綠色、惡臭分泌物</b>+外陰紅腫搔癢刺痛;治療metronidazole,性伴侶同治。(細菌性陰道炎=灰白均質魚腥味;菜花=HPV贅生物)</li>\n<li><b>生殖器疱疹</b>:由<b>單純疱疹病毒第二型(HSV-2)</b>引起(非水痘病毒VZV);性接觸傳染、潛伏薦神經節反覆復發;勿擠壓水疱、病灶期避免親密性接觸至癒合;治療acyclovir。</li>\n</ul>\n"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^I(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n3_id_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
