"quick":"正確 A:嗜伊紅球性肉芽腫侵犯椎體→「椎體扁平(vertebra plana)」。","detail":{"background":"良性骨腫瘤要點(年齡/部位/影像):骨軟骨瘤(osteochondroma)=「最常見良性骨腫瘤」, 長骨幹骺端、軟骨帽朝「遠離關節」生長, 單發惡性化<1%, 多發遺傳性外生骨贅(HME/multiple exostoses)為「自體顯性、外顯率高」、惡性化(轉軟骨肉瘤)風險較高, 「軀幹扁平骨(骨盆/肩胛)」之病灶惡性化機會較高、軟骨帽>1.5–2 cm 須警覺。骨樣骨瘤(osteoid osteoma)=青少年, 病巢(nidus)<1.5 cm、夜間痛、「NSAID/阿斯匹靈緩解」, 切除病巢可解痛。骨母細胞瘤(osteoblastoma)=似骨樣骨瘤但>2 cm、好發脊椎後位, 藥物難緩解、需手術。軟骨母細胞瘤(chondroblastoma)=好發青少年「長骨骨骺(epiphysis)」。內生軟骨瘤(enchondroma)=手腳短管狀骨、可病理性骨折、X光點狀鈣化;Ollier=多發內生軟骨瘤;Maffucci=多發內生軟骨瘤+「血管瘤」(惡性化風險高)。骨巨大細胞瘤(GCT)=20–40歲、長骨「骨骺/幹骺(膝周)」溶骨偏心、無骨膜反應、與RANK/RANKL失衡相關, 局部侵襲性、刮除復發率高、約1–3%肺「良性轉移」(非80%);治療刮除+輔助(高速磨鑽/骨水泥)或廣泛切除。單純性骨囊腫(simple/unicameral bone cyst)=兒童肱骨/股骨近端、fallen leaf/fragment sign。動脈瘤性骨囊腫(ABC)=青少年、CT/MRI見「液-液平面(fluid-fluid level)」(易與微血管擴張性骨肉瘤混淆)。嗜伊紅性肉芽腫(eosinophilic granuloma/LCH)=椎體扁平(vertebra plana)。纖維性發育不良(fibrous dysplasia)=GNAS突變、磨砂玻璃影、股骨近端「牧羊人拐杖(shepherd crook)」變形;McCune-Albright=多骨性纖維發育不良+咖啡牛奶斑+內分泌病(性早熟), 「非合併血管瘤」。","options":{"A":"★正確(本題答案):嗜伊紅肉芽腫→vertebra plana。","B":"錯:骨樣骨瘤病巢<1.5cm(非>2cm)。","C":"錯:牧羊人拐杖在「股骨近端」(非肱骨)。","D":"錯:fluid-fluid level見於ABC, 非單純骨囊腫。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"107080-56":{"quick":"錯 C:骨髓瘤為純溶骨、缺成骨反應, 骨掃描常「偽陰性」, 不用bone scan判斷侵犯範圍(用骨骼X光/MRI/PET)。","detail":{"background":"原發惡性骨腫瘤:骨肉瘤(osteosarcoma)=最常見原發惡性骨腫瘤, 青少年「膝周(股骨遠端/脛骨近端)幹骺端」, 夜間痛+腫塊, X光「Codman三角、日光放射狀(sunburst)骨膜反應」、鹼性磷酸酶高;初診約10–20%已肺轉移(最常轉移部位=肺);標準治療=「術前新輔助化療→廣泛切除(多可肢體保留)→術後輔助化療」(化療「壞死率」可推預後), 對放療不敏感。骨旁/骨膜骨肉瘤(parosteal=低度惡性、手術為主;periosteal=中度)。次發性骨肉瘤(Paget病、放射後)預後最差。軟骨肉瘤(chondrosarcoma)=中老年、骨盆/近端長骨、生長慢, 「對化放療不敏感→以廣泛手術切除為主」;惡性度需綜合臨床+影像+病理三方;骨軟骨瘤軟骨帽>2 cm 須警覺次發性軟骨肉瘤。Ewing 肉瘤=兒童青少年、骨幹、洋蔥皮骨膜反應、t(11;22)。骨轉移(metastatic bone disease)=「成人最常見的骨惡性病灶」, 經「血行」轉移、好發「中軸骨(脊椎/骨盆/肋骨)及長骨近端」(非肢體遠端), 五大來源=乳癌、攝護腺、肺、腎、甲狀腺;乳癌/肺多「溶骨」、「攝護腺多成骨(osteoblastic)」;X光需骨破壞「30–50%」才顯影(故「破壞10%即可發現」錯誤), 骨掃描較早偵測(但骨髓瘤因純溶骨、缺成骨反應, 骨掃描常「偽陰性」→骨髓瘤靠骨骼測量/X光/MRI/PET, 非bone scan)。多發性骨髓瘤(MM)=惡性漿細胞、頭骨「鑿孔狀(punched out)」溶骨、CRAB;老年多椎體壓迫+球蛋白間隙(total protein高、albumin低)+高鈣→應疑MM。","options":{"A":"正確:惡性漿細胞。","B":"正確:頭骨/骨盆punched-out溶骨。","C":"★錯誤(本題答案):骨髓瘤骨掃描常偽陰性, 不適合用以判斷範圍。","D":"正確:已有幹細胞移植治療案例。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"108080-42":{"quick":"較不好發 C:兒童橫紋肌肉瘤好發頭頸/泌尿生殖/四肢,「腸胃道」較少。","detail":{"background":"軟組織肉瘤(soft tissue sarcoma):未分化多形性肉瘤(UPS/MFH)、脂肪肉瘤(liposarcoma, 後腹腔/大腿/臀, 成人, 惡性度不一)、滑膜肉瘤(synovial sarcoma)=年輕成人關節旁、可見「鈣化」、t(X;18);橫紋肌肉瘤(rhabdomyosarcoma)=兒童最常見軟組織肉瘤, 好發頭頸>泌尿生殖>四肢,「腸胃道少」, 預後與部位相關「眼眶及非腦膜旁頭頸部預後較佳(非較差)」;治療多模式(手術+化放療)。惡性周邊神經鞘瘤(MPNST)源自NF1。透明細胞肉瘤(clear cell sarcoma)=「軟組織黑色素瘤」(非雙相);滑膜肉瘤才是雙相(biphasic, 上皮+梭形)。腫瘤切片(biopsy)原則:切口「順肢體長軸縱向」(便於日後一併切除切片道)、「沿單一腔室、不可橫跨腔室或經兩腔室間平面」(避免污染擴散)、止血徹底、同時送「細菌培養」(感染可與腫瘤類似)、切片應由將執行確定手術的團隊規劃;未分期前「不可」貿然開放復位內固定病理性骨折(會污染播散), 應先切片分期。","options":{"A":"頭頸部好發。","B":"四肢可發生。","C":"★較不好發(本題答案):腸胃道。","D":"泌尿生殖系統好發。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"108080-56":{"quick":"最正確 C:軟骨肉瘤對化放療不敏感→「以手術切除為主」。","detail":{"background":"原發惡性骨腫瘤:骨肉瘤(osteosarcoma)=最常見原發惡性骨腫瘤, 青少年「膝周(股骨遠端/脛骨近端)幹骺端」, 夜間痛+腫塊, X光「Codman三角、日光放射狀(sunburst)骨膜反應」、鹼性磷酸酶高;初診約10–20%已肺轉移(最常轉移部位=肺);標準治療=「術前新輔助化療→廣泛切除(多可肢體保留)→術後輔助化療」(化療「壞死率」可推預後), 對放療不敏感。骨旁/骨膜骨肉瘤(parosteal=低度惡性、手術為主;periosteal=中度)。次發性骨肉瘤(Paget病、放射後)預後最差。軟骨肉瘤(chondrosarcoma)=中老年、骨盆/近端長骨、生長慢, 「對化放療不敏感→以廣泛手術切除為主」;惡性度需綜合臨床+影像+病理三方;骨軟骨瘤軟骨帽>2 cm 須警覺次發性軟骨肉瘤。Ewing 肉瘤=兒童青少年、骨幹、洋蔥皮骨膜反應、t(11;22)。骨轉移(metastatic bone disease)=「成人最常見的骨惡性病灶」, 經「血行」轉移、好發「中軸骨(脊椎/骨盆/肋骨)及長骨近端」(非肢體遠端), 五大來源=乳癌、攝護腺、肺、腎、甲狀腺;乳癌/肺多「溶骨」、「攝護腺多成骨(osteoblastic)」;X光需骨破壞「30–50%」才顯影(故「破壞10%即可發現」錯誤), 骨掃描較早偵測(但骨髓瘤因純溶骨、缺成骨反應, 骨掃描常「偽陰性」→骨髓瘤靠骨骼測量/X光/MRI/PET, 非bone scan)。多發性骨髓瘤(MM)=惡性漿細胞、頭骨「鑿孔狀(punched out)」溶骨、CRAB;老年多椎體壓迫+球蛋白間隙(total protein高、albumin低)+高鈣→應疑MM。","options":{"A":"錯:Enneking IIB為高惡性「跨腔室(extracompartmental)」, 非同一腔室內。","B":"錯:骨肉瘤標準是化療+廣泛切除, 「非放療」(對放療不敏感)。","C":"★正確(本題答案):軟骨肉瘤以手術切除為主。","D":"錯:肢體保留與截肢局部復發率/存活率相近, 非保留較差。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"109020-56":{"quick":"最正確 A:診斷骨肉瘤時部分病患同時已有「肺轉移」。","detail":{"background":"原發惡性骨腫瘤:骨肉瘤(osteosarcoma)=最常見原發惡性骨腫瘤, 青少年「膝周(股骨遠端/脛骨近端)幹骺端」, 夜間痛+腫塊, X光「Codman三角、日光放射狀(sunburst)骨膜反應」、鹼性磷酸酶高;初診約10–20%已肺轉移(最常轉移部位=肺);標準治療=「術前新輔助化療→廣泛切除(多可肢體保留)→術後輔助化療」(化療「壞死率」可推預後), 對放療不敏感。骨旁/骨膜骨肉瘤(parosteal=低度惡性、手術為主;periosteal=中度)。次發性骨肉瘤(Paget病、放射後)預後最差。軟骨肉瘤(chondrosarcoma)=中老年、骨盆/近端長骨、生長慢, 「對化放療不敏感→以廣泛手術切除為主」;惡性度需綜合臨床+影像+病理三方;骨軟骨瘤軟骨帽>2 cm 須警覺次發性軟骨肉瘤。Ewing 肉瘤=兒童青少年、骨幹、洋蔥皮骨膜反應、t(11;22)。骨轉移(metastatic bone disease)=「成人最常見的骨惡性病灶」, 經「血行」轉移、好發「中軸骨(脊椎/骨盆/肋骨)及長骨近端」(非肢體遠端), 五大來源=乳癌、攝護腺、肺、腎、甲狀腺;乳癌/肺多「溶骨」、「攝護腺多成骨(osteoblastic)」;X光需骨破壞「30–50%」才顯影(故「破壞10%即可發現」錯誤), 骨掃描較早偵測(但骨髓瘤因純溶骨、缺成骨反應, 骨掃描常「偽陰性」→骨髓瘤靠骨骼測量/X光/MRI/PET, 非bone scan)。多發性骨髓瘤(MM)=惡性漿細胞、頭骨「鑿孔狀(punched out)」溶骨、CRAB;老年多椎體壓迫+球蛋白間隙(total protein高、albumin低)+高鈣→應疑MM。","options":{"A":"★正確(本題答案):骨肉瘤診斷時可合併肺轉移。","B":"錯:單發骨軟骨瘤惡性化<1%, 非均須切除。","C":"錯:骨母細胞瘤藥物難緩解、需手術。","D":"錯:骨樣骨瘤好發長骨「骨幹/幹骺」(常非骨骺)。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"109020-72":{"quick":"B:已治療之骨盆肉瘤+放療後下背痛、骨掃描攝取=放療後「不全骨折(insufficiency fracture)」。","detail":{"background":"原發惡性骨腫瘤:骨肉瘤(osteosarcoma)=最常見原發惡性骨腫瘤, 青少年「膝周(股骨遠端/脛骨近端)幹骺端」, 夜間痛+腫塊, X光「Codman三角、日光放射狀(sunburst)骨膜反應」、鹼性磷酸酶高;初診約10–20%已肺轉移(最常轉移部位=肺);標準治療=「術前新輔助化療→廣泛切除(多可肢體保留)→術後輔助化療」(化療「壞死率」可推預後), 對放療不敏感。骨旁/骨膜骨肉瘤(parosteal=低度惡性、手術為主;periosteal=中度)。次發性骨肉瘤(Paget病、放射後)預後最差。軟骨肉瘤(chondrosarcoma)=中老年、骨盆/近端長骨、生長慢, 「對化放療不敏感→以廣泛手術切除為主」;惡性度需綜合臨床+影像+病理三方;骨軟骨瘤軟骨帽>2 cm 須警覺次發性軟骨肉瘤。Ewing 肉瘤=兒童青少年、骨幹、洋蔥皮骨膜反應、t(11;22)。骨轉移(metastatic bone disease)=「成人最常見的骨惡性病灶」, 經「血行」轉移、好發「中軸骨(脊椎/骨盆/肋骨)及長骨近端」(非肢體遠端), 五大來源=乳癌、攝護腺、肺、腎、甲狀腺;乳癌/肺多「溶骨」、「攝護腺多成骨(osteoblastic)」;X光需骨破壞「30–50%」才顯影(故「破壞10%即可發現」錯誤), 骨掃描較早偵測(但骨髓瘤因純溶骨、缺成骨反應, 骨掃描常「偽陰性」→骨髓瘤靠骨骼測量/X光/MRI/PET, 非bone scan)。多發性骨髓瘤(MM)=惡性漿細胞、頭骨「鑿孔狀(punched out)」溶骨、CRAB;老年多椎體壓迫+球蛋白間隙(total protein高、albumin低)+高鈣→應疑MM。","options":{"A":"骨轉移可能但本例背景指向放療後不全骨折。","B":"★正確(本題答案):放療後骨脆弱致insufficiency fracture。","C":"局部復發須病理確認, 影像型態較像不全骨折。","D":"退化性脊椎病非急性下背痛+核醫熱點。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"109020-74":{"quick":"C:13歲膝周、夜間痛漸增、X光惡性病灶=骨肉瘤(osteogenic sarcoma)。","detail":{"background":"原發惡性骨腫瘤:骨肉瘤(osteosarcoma)=最常見原發惡性骨腫瘤, 青少年「膝周(股骨遠端/脛骨近端)幹骺端」, 夜間痛+腫塊, X光「Codman三角、日光放射狀(sunburst)骨膜反應」、鹼性磷酸酶高;初診約10–20%已肺轉移(最常轉移部位=肺);標準治療=「術前新輔助化療→廣泛切除(多可肢體保留)→術後輔助化療」(化療「壞死率」可推預後), 對放療不敏感。骨旁/骨膜骨肉瘤(parosteal=低度惡性、手術為主;periosteal=中度)。次發性骨肉瘤(Paget病、放射後)預後最差。軟骨肉瘤(chondrosarcoma)=中老年、骨盆/近端長骨、生長慢, 「對化放療不敏感→以廣泛手術切除為主」;惡性度需綜合臨床+影像+病理三方;骨軟骨瘤軟骨帽>2 cm 須警覺次發性軟骨肉瘤。Ewing 肉瘤=兒童青少年、骨幹、洋蔥皮骨膜反應、t(11;22)。骨轉移(metastatic bone disease)=「成人最常見的骨惡性病灶」, 經「血行」轉移、好發「中軸骨(脊椎/骨盆/肋骨)及長骨近端」(非肢體遠端), 五大來源=乳癌、攝護腺、肺、腎、甲狀腺;乳癌/肺多「溶骨」、「攝護腺多成骨(osteoblastic)」;X光需骨破壞「30–50%」才顯影(故「破壞10%即可發現」錯誤), 骨掃描較早偵測(但骨髓瘤因純溶骨、缺成骨反應, 骨掃描常「偽陰性」→骨髓瘤靠骨骼測量/X光/MRI/PET, 非bone scan)。多發性骨髓瘤(MM)=惡性漿細胞、頭骨「鑿孔狀(punched out)」溶骨、CRAB;老年多椎體壓迫+球蛋白間隙(total protein高、albumin低)+高鈣→應疑MM。","options":{"A":"纖維發育不良為良性磨砂玻璃。","B":"ABC有液-液平面。","C":"★正確(本題答案):青少年膝周骨肉瘤。","D":"嗜伊紅肉芽腫為溶骨。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"109080-59":{"quick":"最正確 C:骨軟骨瘤發生於「軀幹扁平骨(骨盆/肩胛)」時惡性化機會較高。","detail":{"background":"良性骨腫瘤要點(年齡/部位/影像):骨軟骨瘤(osteochondroma)=「最常見良性骨腫瘤」, 長骨幹骺端、軟骨帽朝「遠離關節」生長, 單發惡性化<1%, 多發遺傳性外生骨贅(HME/multiple exostoses)為「自體顯性、外顯率高」、惡性化(轉軟骨肉瘤)風險較高, 「軀幹扁平骨(骨盆/肩胛)」之病灶惡性化機會較高、軟骨帽>1.5–2 cm 須警覺。骨樣骨瘤(osteoid osteoma)=青少年, 病巢(nidus)<1.5 cm、夜間痛、「NSAID/阿斯匹靈緩解」, 切除病巢可解痛。骨母細胞瘤(osteoblastoma)=似骨樣骨瘤但>2 cm、好發脊椎後位, 藥物難緩解、需手術。軟骨母細胞瘤(chondroblastoma)=好發青少年「長骨骨骺(epiphysis)」。內生軟骨瘤(enchondroma)=手腳短管狀骨、可病理性骨折、X光點狀鈣化;Ollier=多發內生軟骨瘤;Maffucci=多發內生軟骨瘤+「血管瘤」(惡性化風險高)。骨巨大細胞瘤(GCT)=20–40歲、長骨「骨骺/幹骺(膝周)」溶骨偏心、無骨膜反應、與RANK/RANKL失衡相關, 局部侵襲性、刮除復發率高、約1–3%肺「良性轉移」(非80%);治療刮除+輔助(高速磨鑽/骨水泥)或廣泛切除。單純性骨囊腫(simple/unicameral bone cyst)=兒童肱骨/股骨近端、fallen leaf/fragment sign。動脈瘤性骨囊腫(ABC)=青少年、CT/MRI見「液-液平面(fluid-fluid level)」(易與微血管擴張性骨肉瘤混淆)。嗜伊紅性肉芽腫(eosinophilic granuloma/LCH)=椎體扁平(vertebra plana)。纖維性發育不良(fibrous dysplasia)=GNAS突變、磨砂玻璃影、股骨近端「牧羊人拐杖(shepherd crook)」變形;McCune-Albright=多骨性纖維發育不良+咖啡牛奶斑+內分泌病(性早熟), 「非合併血管瘤」。","options":{"A":"錯:HME為「自體顯性」、外顯率高(非隱性低外顯)。","B":"錯:軟骨帽朝「遠離關節」生長(非朝向關節)。","C":"★正確(本題答案):軀幹扁平骨者惡性化風險較高。","D":"錯:無症狀者不需在發育成熟前預防性切除。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"110020-57":{"quick":"最正確 C:軟骨肉瘤惡性度分級須綜合「臨床+影像+病理」三方。","detail":{"background":"原發惡性骨腫瘤:骨肉瘤(osteosarcoma)=最常見原發惡性骨腫瘤, 青少年「膝周(股骨遠端/脛骨近端)幹骺端」, 夜間痛+腫塊, X光「Codman三角、日光放射狀(sunburst)骨膜反應」、鹼性磷酸酶高;初診約10–20%已肺轉移(最常轉移部位=肺);標準治療=「術前新輔助化療→廣泛切除(多可肢體保留)→術後輔助化療」(化療「壞死率」可推預後), 對放療不敏感。骨旁/骨膜骨肉瘤(parosteal=低度惡性、手術為主;periosteal=中度)。次發性骨肉瘤(Paget病、放射後)預後最差。軟骨肉瘤(chondrosarcoma)=中老年、骨盆/近端長骨、生長慢, 「對化放療不敏感→以廣泛手術切除為主」;惡性度需綜合臨床+影像+病理三方;骨軟骨瘤軟骨帽>2 cm 須警覺次發性軟骨肉瘤。Ewing 肉瘤=兒童青少年、骨幹、洋蔥皮骨膜反應、t(11;22)。骨轉移(metastatic bone disease)=「成人最常見的骨惡性病灶」, 經「血行」轉移、好發「中軸骨(脊椎/骨盆/肋骨)及長骨近端」(非肢體遠端), 五大來源=乳癌、攝護腺、肺、腎、甲狀腺;乳癌/肺多「溶骨」、「攝護腺多成骨(osteoblastic)」;X光需骨破壞「30–50%」才顯影(故「破壞10%即可發現」錯誤), 骨掃描較早偵測(但骨髓瘤因純溶骨、缺成骨反應, 骨掃描常「偽陰性」→骨髓瘤靠骨骼測量/X光/MRI/PET, 非bone scan)。多發性骨髓瘤(MM)=惡性漿細胞、頭骨「鑿孔狀(punched out)」溶骨、CRAB;老年多椎體壓迫+球蛋白間隙(total protein高、albumin低)+高鈣→應疑MM。","options":{"A":"錯:好發中老年(非10–20歲青少年)。","B":"錯:Codman三角是骨肉瘤特徵, 非軟骨肉瘤。","C":"★正確(本題答案):分級須三方綜合。","D":"錯:軟骨肉瘤對放療不敏感, 治療以廣泛手術為主。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"110020-74":{"quick":"A:23歲、X光磨砂玻璃影=纖維性發育不良(fibrous dysplasia)。","detail":{"background":"良性骨腫瘤要點(年齡/部位/影像):骨軟骨瘤(osteochondroma)=「最常見良性骨腫瘤」, 長骨幹骺端、軟骨帽朝「遠離關節」生長, 單發惡性化<1%, 多發遺傳性外生骨贅(HME/multiple exostoses)為「自體顯性、外顯率高」、惡性化(轉軟骨肉瘤)風險較高, 「軀幹扁平骨(骨盆/肩胛)」之病灶惡性化機會較高、軟骨帽>1.5–2 cm 須警 fication of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"111020-56":{"quick":"最不適當 C:滑膜肉瘤並非「第二常見」軟組織肉瘤(常見前列為UPS/脂肪肉瘤等)。","detail":{"background":"軟組織肉瘤(soft tissue sarcoma):未分化多形性肉瘤(UPS/MFH)、脂肪肉瘤(liposarcoma, 後腹腔/大腿/臀, 成人, 惡性度不一)、滑膜肉瘤(synovial sarcoma)=年輕成人關節旁、可見「鈣化」、t(X;18);橫紋肌肉瘤(rhabdomyosarcoma)=兒童最常見軟組織肉瘤, 好發頭頸>泌尿生殖>四肢,「腸胃道少」, 預後與部位相關「眼眶及非腦膜旁頭頸部預後較佳(非較差)」;治療多模式(手術+化放療)。惡性周邊神經鞘瘤(MPNST)源自NF1。透明細胞肉瘤(clear cell sarcoma)=「軟組織黑色素瘤」(非雙相);滑膜肉瘤才是雙相(biphasic, 上皮+梭形)。腫瘤切片(biopsy)原則:切口「順肢體長軸縱向」(便於日後一併切除切片道)、「沿單一腔室、不可橫跨腔室或經兩腔室間平面」(避免污染擴散)、止血徹底、同時送「細菌培養」(感染可與腫瘤類似)、切片應由將執行確定手術的團隊規劃;未分期前「不可」貿然開放復位內固定病理性骨折(會污染播散), 應先切片分期。","options":{"A":"正確:腹腔外硬纖維瘤=侵襲性纖維瘤病。","B":"正確:多發神經纖維瘤=von Recklinghausen病。","C":"★最不適當(本題答案):滑膜肉瘤非第二常見軟組織肉瘤。","D":"正確:MPNST可源自NF1。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"111080-56":{"quick":"最適當 D:骨軟骨瘤軟骨帽>2 cm 須評估續發性軟骨肉瘤。","detail":{"background":"原發惡性骨腫瘤:骨肉瘤(osteosarcoma)=最常見原發惡性骨腫瘤, 青少年「膝周(股骨遠端/脛骨近端)幹骺端」, 夜間痛+腫塊, X光「Codman三角、日光放射狀(sunburst)骨膜反應」、鹼性磷酸酶高;初診約10–20%已肺轉移(最常轉移部位=肺);標準治療=「術前新輔助化療→廣泛切除(多可肢體保留)→術後輔助化療」(化療「壞死率」可推預後), 對放療不敏感。骨旁/骨膜骨肉瘤(parosteal=低度惡性、手術為主;periosteal=中度)。次發性骨肉瘤(Paget病、放射後)預後最差。軟骨肉瘤(chondrosarcoma)=中老年、骨盆/近端長骨、生長慢, 「對化放療不敏感→以廣泛手術切除為主」;惡性度需綜合臨床+影像+病理三方;骨軟骨瘤軟骨帽>2 cm 須警覺次發性軟骨肉瘤。Ewing 肉瘤=兒童青少年、骨幹、洋蔥皮骨膜反應、t(11;22)。骨轉移(metastatic bone disease)=「成人最常見的骨惡性病灶」, 經「血行」轉移、好發「中軸骨(脊椎/骨盆/肋骨)及長骨近端」(非肢體遠端), 五大來源=乳癌、攝護腺、肺、腎、甲狀腺;乳癌/肺多「溶骨」、「攝護腺多成骨(osteoblastic)」;X光需骨破壞「30–50%」才顯影(故「破壞10%即可發現」錯誤), 骨掃描較早偵測(但骨髓瘤因純溶骨、缺成骨反應, 骨掃描常「偽陰性」→骨髓瘤靠骨骼測量/X光/MRI/PET, 非bone scan)。多發性骨髓瘤(MM)=惡性漿細胞、頭骨「鑿孔狀(punched out)」溶骨、CRAB;老年多椎體壓迫+球蛋白間隙(total protein高、albumin低)+高鈣→應疑MM。","options":{"A":"錯:軟骨肉瘤好發中老年(非青少年)。","B":"錯:間葉性軟骨肉瘤不限於近端股骨骨骺。","C":"錯:軟骨肉瘤對化放療不敏感, 手術為「主要」非次要。","D":"★正確(本題答案):軟骨帽>2cm警覺次發軟骨肉瘤。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"112020-56":{"quick":"最適當 D:多發外生骨贅(multiple exostosis/HME)可為「自體顯性」遺傳。","detail":{"background":"良性骨腫瘤要點(年齡/部位/影像):骨軟骨瘤(osteochondroma)=「最常見良性骨腫瘤」, 長骨幹骺端、軟骨帽朝「遠離關節」生長, 單發惡性化<1%, 多發遺傳性外生骨贅(HME/multiple exostoses)為「自體顯性、外顯率高」、惡性化(轉軟骨肉瘤)風險較高, 「軀幹扁平骨(骨盆/肩胛)」之病灶惡性化機會較高、軟骨帽>1.5–2 cm 須警覺。骨樣骨瘤(osteoid osteoma)=青少年, 病巢(nidus)<1.5 cm、夜間痛、「NSAID/阿斯匹靈緩解」, 切除病巢可解痛。骨母細胞瘤(osteoblastoma)=似骨樣骨瘤但>2 cm、好發脊椎後位, 藥物難緩解、需手術。軟骨母細胞瘤(chondroblastoma)=好發青少年「長骨骨骺(epiphysis)」。內生軟骨瘤(enchondroma)=手腳短管狀骨、可病理性骨折、X光點狀鈣化;Ollier=多發內生軟骨瘤;Maffucci=多發內生軟骨瘤+「血管瘤」(惡性化風險高)。骨巨大細胞瘤(GCT)=20–40歲、長骨「骨骺/幹骺(膝周)」溶骨偏心、無骨膜反應、與RANK/RANKL失衡相關, 局部侵襲性、刮除復發率高、約1–3%肺「良性轉移」(非80%);治療刮除+輔助(高速磨鑽/骨水泥)或廣泛切除。單純性骨囊腫(simple/unicameral bone cyst)=兒童肱骨/股骨近端、fallen leaf/fragment sign。動脈瘤性骨囊腫(ABC)=青少年、CT/MRI見「液-液平面(fluid-fluid level)」(易與微血管擴張性骨肉瘤混淆)。嗜伊紅性肉芽腫(eosinophilic granuloma/LCH)=椎體扁平(vertebra plana)。纖維性發育不良(fibrous dysplasia)=GNAS突變、磨砂玻璃影、股骨近端「牧羊人拐杖(shepherd crook)」變形;McCune-Albright=多骨性纖維發育不良+咖啡牛奶斑+內分泌病(性早熟), 「非合併血管瘤」。","options":{"A":"錯:最常見良性骨腫瘤是骨軟骨瘤(非軟骨母細胞瘤)。","B":"錯:Maffucci=內生軟骨瘤+血管瘤;multiple enchondromatosis單獨為Ollier。","C":"錯:軟骨黏液纖維瘤好發脛骨幹骺端(非骨骺)。","D":"★正確(本題答案):HME為自體顯性遺傳。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"113020-56":{"quick":"最適當 B:軟骨母細胞瘤好發青少年「長骨骨骺(epiphysis)」。","detail":{"background":"良性骨腫瘤要點(年齡/部位/影像):骨軟骨瘤(osteochondroma)=「最常見良性骨腫瘤」, 長骨幹骺端、軟骨帽朝「遠離關節」生長, 單發惡性化<1%, 多發遺傳性外生骨贅(HME/multiple exostoses)為「自體顯性、外顯率高」、惡性化(轉軟骨肉瘤)風險較高, 「軀幹扁平骨(骨盆/肩胛)」之病灶惡性化機會較高、軟骨帽>1.5–2 cm 須警覺。骨樣骨瘤(osteoid osteoma)=青少年, 病巢(nidus)<1.5 cm、夜間痛、「NSAID/阿斯匹靈緩解」, 切除病巢可解痛。骨母細胞瘤(osteoblastoma)=似骨樣骨瘤但>2 cm、好發脊椎後位, 藥物難緩解、需手術。軟骨母細胞瘤(chondroblastoma)=好發青少年「長骨骨骺(epiphysis)」。內生軟骨瘤(enchondroma)=手腳短管狀骨、可病理性骨折、X光點狀鈣化;Ollier=多發內生軟骨瘤;Maffucci=多發內生軟骨瘤+「血管瘤」(惡性化風險高)。骨巨大細胞瘤(GCT)=20–40歲、長骨「骨骺/幹骺(膝周)」溶骨偏心、無骨膜反應、與RANK/RANKL失衡相關, 局部侵襲性、刮除復發率高、約1–3%肺「良性轉移」(非80%);治療刮除+輔助(高速磨鑽/骨水泥)或廣泛切除。單純性骨囊腫(simple/unicameral bone cyst)=兒童肱骨/股骨近端、fallen leaf/fragment sign。動脈瘤性骨囊腫(ABC)=青少年、CT/MRI見「液-液平面(fluid-fluid level)」( 、止血徹底、同時送「細菌培養」(感染可與腫瘤類似)、切片應由將執行確定手術的團隊規劃;未分期前「不可」貿然開放復位內固定病理性骨折(會污染播散), 應先切片分期。","options":{"A":"正確:最常見頭頸部, 其次四肢軀幹。","B":"正確:診斷須切片證實(並評估骨髓)。","C":"正確:手術為主, 無法切除可先化放療。","D":"★錯誤(本題答案):眼眶/非腦膜旁頭頸預後較佳, 非較差。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"113070-56":{"quick":"最適當 C、D(本題多重答案):乳癌多溶骨、攝護腺癌多成骨, 兩者皆對。","detail":{"background":"原發惡性骨腫瘤:骨肉瘤(osteosarcoma)=最常見原發惡性骨腫瘤, 青少年「膝周(股骨遠端/脛骨近端)幹骺端」, 夜間痛+腫塊, X光「Codman三角、日光放射狀(sunburst)骨膜反應」、鹼性磷酸酶高;初診約10–20%已肺轉移(最常轉移部位=肺);標準治療=「術前新輔助化療→廣泛切除(多可肢體保留)→術後輔助化療」(化療「壞死率」可推預後), 對放療不敏感。骨旁/骨膜骨肉瘤(parosteal=低度惡性、手術為主;periosteal=中度)。次發性骨肉瘤(Paget病、放射後)預後最差。軟骨肉瘤(chondrosarcoma)=中老年、骨盆/近端長骨、生長慢, 「對化放療不敏感→以廣泛手術切除為主」;惡性度需綜合臨床+影像+病理三方;骨軟骨瘤軟骨帽>2 cm 須警覺次發性軟骨肉瘤。Ewing 肉瘤=兒童青少年、骨幹、洋蔥皮骨膜反應、t(11;22)。骨轉移(metastatic bone disease)=「成人最常見的骨惡性病灶」, 經「血行」轉移、好發「中軸骨(脊椎/骨盆/肋骨)及長骨近端」(非肢體遠端), 五大來源=乳癌、攝護腺、肺、腎、甲狀腺;乳癌/肺多「溶骨」、「攝護腺多成骨(osteoblastic)」;X光需骨破壞「30–50%」才顯影(故「破壞10%即可發現」錯誤), 骨掃描較早偵測(但骨髓瘤因純溶骨、缺成骨反應, 骨掃描常「偽陰性」→骨髓瘤靠骨骼測量/X光/MRI/PET, 非bone scan)。多發性骨髓瘤(MM)=惡性漿細胞、頭骨「鑿孔狀(punched out)」溶骨、CRAB;老年多椎體壓迫+球蛋白間隙(total protein高、albumin低)+高鈣→應疑MM。","options":{"A":"錯:骨轉移常見來源為乳/攝護腺/肺/腎/甲狀腺(非大腸/子宮頸)。","B":"錯:骨轉移最常侵犯「脊椎」(非僅骨盆)。","C":"★正確(給分):乳癌常產生溶骨性病灶。","D":"★正確(給分):攝護腺癌常產生成骨性轉移。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"114020-56":{"quick":"最不適當 C:復發GCT僅約1–3%肺「良性轉移」, 「80%轉移到肺」嚴重誇大。","detail":{"background":"良性骨腫瘤要點(年齡/部位/影像):骨軟骨瘤(osteochondroma)=「最常見良性骨腫瘤」, 長骨幹骺端、軟骨帽朝「遠離關節」生長, 單發惡性化<1%, 多發遺傳性外生骨贅(HME/multiple exostoses)為「自體顯性、外顯率高」、惡性化(轉軟骨肉瘤)風險較高, 「軀幹扁平骨(骨盆/肩胛)」之病灶惡性化機會較高、軟骨帽>1.5–2 cm 須警覺。骨樣骨瘤(osteoid osteoma)=青少年, 病巢(nidus)<1.5 cm、夜間痛、「NSAID/阿斯匹靈緩解」, 切除病巢可解痛。骨母細胞瘤(osteoblastoma)=似骨樣骨瘤但>2 cm、好發脊椎後位, 藥物難緩解、需手術。軟骨母細胞瘤(chondroblastoma)=好發青少年「長骨骨骺(epiphysis)」。內生軟骨瘤(enchondroma)=手腳短管狀骨、可病理性骨折、X光點狀鈣化;Ollier=多發內生軟骨瘤;Maffucci=多發內生軟骨瘤+「血管瘤」(惡性化風險高)。骨巨大細胞瘤(GCT)=20–40歲、長骨「骨骺/幹骺(膝周)」溶骨偏心、無骨膜反應、與 2 cm 須警覺。骨樣骨瘤(osteoid osteoma)=青少年, 病巢(nidus)<1.5 cm、夜間痛、「NSAID/阿斯匹靈緩解」, 切除病巢可解痛。骨母細胞瘤(osteoblastoma)=似骨樣骨瘤但>2 cm、好發脊椎後位, 藥物難緩解、需手術。軟骨母細胞瘤(chondroblastoma)=好發青少年「長骨骨骺(epiphysis)」。內生軟骨瘤(enchondroma)=手腳短管狀骨、可病理性骨折、X光點狀鈣化;Ollier=多發內生軟骨瘤;Maffucci=多發內生軟骨瘤+「血管瘤」(惡性化風險高)。骨巨大細胞瘤(GCT)=20–40歲、長骨「骨骺/幹骺(膝周)」溶骨偏心、無骨膜反應、與RANK/RANKL失衡相關, 局部侵襲性、刮除復發率高、約1–3%肺「良性轉移」(非80%);治療刮除+輔助(高速磨鑽/骨水泥)或廣泛切除。單純性骨囊腫(simple/unicameral bone cyst)=兒童肱骨/股骨近端、fallen leaf/fragment sign。動脈瘤性骨囊腫(ABC)=青少年、CT/MRI見「液-液平面(fluid-fluid level)」(易與微血管擴張性骨肉瘤混淆)。嗜伊紅性肉芽腫(eosinophilic granuloma/LCH)=椎體扁平(vertebra plana)。纖維性發育不良(fibrous dysplasia)=GNAS突變、磨砂玻璃影、股骨近端「牧羊人拐杖(shepherd crook)」變形;McCune-Albright=多骨性纖維發育不良+咖啡牛奶斑+內分泌病(性早熟), 「非合併血管瘤」。","options":{"A":"正確:棕色瘤因副甲狀腺素增加(代謝性)。","B":"正確:Gaucher病glucocerebroside堆積致肝脾骨髓腫大。","C":"★最不適當(本題答案):骨梗塞好發幹骺/骨骺髓內, 非骨幹。","D":"正確:膝關節是PVNS最常侵犯處。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"115020-56":{"quick":"最適當 B:已臆斷為骨肌腫瘤仍須「同時做切片部位細菌培養」(感染可與腫瘤類似)。","detail":{"background":"軟組織肉瘤(soft tissue sarcoma):未分化多形性肉瘤(UPS/MFH)、脂肪肉瘤(liposarcoma, 後腹腔/大腿/臀, 成人, 惡性度不一)、滑膜肉瘤(synovial sarcoma)=年輕成人關節旁、可見「鈣化」、t(X;18);橫紋肌肉瘤(rhabdomyosarcoma)=兒童最常見軟組織肉瘤, 好發頭頸>泌尿生殖>四肢,「腸胃道少」, 預後與部位相關「眼眶及非腦膜旁頭頸部預後較佳(非較差)」;治療多模式(手術+化放療)。惡性周邊神經鞘瘤(MPNST)源自NF1。透明細胞肉瘤(clear cell sarcoma)=「軟組織黑色素瘤」(非雙相);滑膜肉瘤才是雙相(biphasic, 上皮+梭形)。腫瘤切片(biopsy)原則:切口「順肢體長軸縱向」(便於日後一併切除切片道)、「沿單一腔室、不可橫跨腔室或經兩腔室間平面」(避免污染擴散)、止血徹底、同時送「細菌培養」(感染可與腫瘤類似)、切片應由將執行確定手術的團隊規劃;未分期前「不可」貿然開放復位內固定病理性骨折(會污染播散), 應先切片分期。","options":{"A":"錯:四肢切口應「順肢體長軸縱向」, 非橫向。","B":"★正確(本題答案):同時送細菌培養。","C":"錯:不可穿越「兩腔室間平面」(避免污染擴散), 應沿單一腔室。","D":"錯:未分期前不應貿然開放復位內固定+全身探查, 應先切片分期。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"115020-57":{"quick":"最不適當 D:Ollier/Maffucci最常惡性化成「軟骨肉瘤」, 非次發性骨肉瘤。","detail":{"background":"原發惡性骨腫瘤:骨肉瘤(osteosarcoma)=最常見原發惡性骨腫瘤, 青少年「膝周(股骨遠端/脛骨近端)幹骺端」, 夜間痛+腫塊, X光「Codman三角、日光放射狀(sunburst)骨膜反應」、鹼性磷酸酶高;初診約10–20%已肺轉移(最常轉移部位=肺);標準治療=「術前新輔助化療→廣泛切除(多可肢體保留)→術後輔助化療」(化療「壞死率」可推預後), 對放療不敏感。骨旁/骨膜骨肉瘤(parosteal=低度惡性、手術為主;periosteal=中度)。次發性骨肉瘤(Paget病、放射後)預後最差。軟骨肉瘤(chondrosarcoma)=中老年、骨盆/近端長骨、生長慢, 「對化放療不敏感→以廣泛手術切除為主」;惡性度需綜合臨床+影像+病理三方;骨軟骨瘤軟骨帽>2 cm 須警覺次發性軟骨肉瘤。Ewing 肉瘤=兒童青少年、骨幹、洋蔥皮骨膜反應、t(11;22)。骨轉移(metastatic bone disease)=「成人最常見的骨惡性病灶」, 經「血行」轉移、好發「中軸骨(脊椎/骨盆/肋骨)及長骨近端」(非肢體遠端), 五大來源=乳癌、攝護腺、肺、腎、甲狀腺;乳癌/肺多「溶骨」、「攝護腺多成骨(osteoblastic)」;X光需骨破壞「30–50%」才顯影(故「破壞10%即可發現」錯誤), 骨掃描較早偵測(但骨髓瘤因純溶骨、缺成骨反應, 骨掃描常「偽陰性」→骨髓瘤靠骨骼測量/X光/MRI/PET, 非bone scan)。多發性骨髓瘤(MM)=惡性漿細胞、頭骨「鑿孔狀(punched out)」溶骨、CRAB;老年多椎體壓迫+球蛋白間隙(total protein高、albumin低)+高鈣→應疑MM。","options":{"A":"正確:傳統骨肉瘤=新輔助化療+廣泛切除+輔助化療。","B":"正確:次發性骨肉瘤預後最差、骨旁較佳。","C":"正確:化療後壞死率可推預後。","D":"★最不適當(本題答案):Ollier/Maffucci惡性化為軟骨肉瘤, 非骨肉瘤。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"101030-13":{"quick":"B:嬰兒肌肉性斜頸主因=「胸鎖乳突肌(SCM)」纖維化。","detail":{"background":"先天肌肉性斜頸(congenital muscular torticollis)=「胸鎖乳突肌(SCM)」纖維化攣縮, 頭傾向患側、下巴轉向對側, 2月內常摸到頸部腫塊(纖維瘤), 約10–20%合併DDH(故須篩髖)、治療以「被動伸展運動」為主, 多數良好。","options":{"A":"斜方肌非主因。","B":"★正確(本題答案):胸鎖乳突肌。","C":"肩胛舌骨肌非。","D":"二腹肌非。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"101030-62":{"quick":"A:痙攣型腦性麻痺最常需手術矯正的足踝畸形=馬蹄足(equinus, 跟腱攣縮)。","detail":{"background":"小兒足/下肢畸形:先天性馬蹄內翻足(clubfoot/talipes equinovarus)四要素=「馬蹄(equinus)、後足內翻(heel varus)、前足內收(metatarsus adductus)、高弓(cavus)」(不含扁平足), Ponseti 連續石膏矯正。痙攣型腦性麻痺(spastic CP)最常見足踝畸形=「馬蹄足(equinus, 跟腱攣縮)」需手術(跟腱延長)。腦性麻痺脊柱側彎風險:癱瘓越廣越高(四肢麻痺>雙下肢>半身), 「半身麻痺(hemiplegia)」最低。先天性脛骨假關節(congenital pseudarthrosis of tibia)=與NF1相關、「前外側(anterolateral)」彎曲、易骨折難癒合。黏多醣症(MPS)骨骼變化(dysostosis multiplex)=寬鎖骨、卵圓/魚嘴椎體、髖臼發育不良、「髖外翻」(coxa valga)為主, 「髖內翻(coxa vara)較少」。","options":{"A":"★正確(本題答案):馬蹄足(equinus)。","B":"高弓足非最常見。","C":"扁平外翻非最常見。","D":"拇趾外翻非。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"102030-59":{"quick":"B:11歲運動員脛骨粗隆(髕骨下4cm)牽引性骨突炎=Osgood-Schlatter氏症。","detail":{"background":"青少年骨突炎/骨軟骨病(osteochondrosis):Osgood-Schlatter=脛骨粗隆(髕韌帶止點)牽引性骨突炎, 跳躍運動青少年膝下方腫痛;Sinding-Larsen-Johansson=髕骨下緣;Sever=跟骨骨突;Köhler=舟狀骨;Freiberg=第二蹠骨頭;Panner=肱骨小頭(capitellum)骨軟骨病, 好發5–11歲、右肘>左, 症狀為「痠痛」(肘彎曲受限非最常見);成骨不全症(osteogenesis imperfecta)=多為「體染色體顯性」第I型膠原(COL1A1/2)異常, 反覆骨折、藍鞏膜、聽損;治療雙磷酸鹽+切骨髓內釘。","options":{"A":"跳躍者膝(髕腱病)位置偏髕骨下緣肌腱。","B":"★正確(本題答案):Osgood-Schlatter(脛骨粗隆)。","C":"貝克氏囊腫在膕窩。","D":"髕前滑囊炎在髕骨前。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"102110-50":{"quick":"D:嬰兒肌肉性斜頸最常見原因=「胸鎖乳突肌」纖維化。","detail":{"background":"先天肌肉性斜頸(congenital muscular torticollis)=「胸鎖乳突肌(SCM)」纖維化攣縮, 頭傾向患側、下巴轉向對側, 2月內常摸到頸部腫塊(纖維瘤), 約10–20%合併DDH(故須篩髖)、治療以「被動伸展運動」為主, 多數良好。","options":{"A":"闊頸肌非。","B":"肩胛舌骨肌非。","C":"胸骨舌骨肌非。","D":"★正確(本題答案):胸鎖乳突肌。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"102110-60":{"quick":"C:肥胖青春期、鼠蹊/大腿痛、青蛙位X光骺板滑脫=股骨頭骨骺滑脫(SCFE)。","detail":{"background":"小兒髖部三大疾病(依年齡):①發育性髖關節發育不良(DDH)=新生兒/嬰兒, 危險因子(女嬰、臀位、家族史、第一胎、羊水少、斜頸/足畸形), 篩檢理學:「Ortolani(外展復位, 脫位→復位的clunk)、Barlow(內收+後推使脫位)」, 大嬰兒看Galeazzi徵象、大腿皮膚皺褶不對稱、超音波(<6月)/X光(>4–6月);Patrick(FABER)test 查薦髂/髖關節病, 「不適合」篩DDH。②Legg-Calvé-Perthes(LCPD)=4–8歲男童、股骨頭「特發性缺血性壞死」、跛行/髖膝痛, Catterall/Herring 預後不良徵象=發病年齡「大(>6–8歲, 非<5歲)」、壞死範圍大、外側柱受累、頭外側半脫位/Gage徵、生長板水平化;治療「圍堵(containment)」。③股骨頭骨骺滑脫(SCFE)=「肥胖青春期(10–16歲)」, 鼠蹊/大腿/膝痛、外旋跛行, 青蛙姿勢X光見骺板滑脫, 與「內分泌異常(甲狀腺低下、生長激素、性腺)」相關, 雙側約20–40%;治療「原位螺釘固定(in-situ pinning)」, 不可強力復位(增AVN)。股骨頭血供:18個月內血管「可穿過骺板」供應股骨頭, 之後骺板成屏障(故缺血壞死好發)。","options":{"A":"化膿性關節炎有發燒/感染徵象。","B":"創傷性脫位有明確高能量外傷。","C":"★正確(本題答案):SCFE(肥胖青春期)。","D":"Perthes好發4–8歲較年幼, 機轉不同。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"102110-61":{"quick":"C:SCFE治療=「原位螺釘固定(in-situ screw)」, 不可強力復位以免AVN。","detail":{"background":"小兒髖部三大疾病(依年齡):①發育性髖關節發育不良(DDH)=新生兒/嬰兒, 危險因子(女嬰、臀位、家族史、第一胎、羊水少、斜頸/足畸形), 篩檢理學:「Ortolani(外展復位, 脫位→復位的clunk)、Barlow(內收+後推使脫位)」, 大嬰兒看Galeazzi徵象、大腿皮膚皺褶不對稱、超音波(<6月)/X光(>4–6月);Patrick(FABER)test 查薦髂/髖關節病, 「不適合」篩DDH。②Legg-Calvé-Perthes(LCPD)=4–8歲男童、股骨頭「特發性缺血性壞死」、跛行/髖膝痛, Catterall/Herring 預後不良徵象=發病年齡「大(>6–8歲, 非<5歲)」、壞死範圍大、外側柱受累、頭外側半脫位/Gage徵、生長板水平化;治療「圍堵(containment)」。③股骨頭骨骺滑脫(SCFE)=「肥胖青春期(10–16歲)」, 鼠蹊/大腿/膝痛、外旋跛行, 青蛙姿勢X光見骺板滑脫, 與「內分泌異常(甲狀腺低下、生長激素、性腺)」相關, 雙側約20–40%;治療「原位螺釘固定(in-situ pinning)」, 不可強力復位(增AVN)。股骨頭血供:18個月內血管「可穿過骺板」供應股骨頭, 之後骺板成屏障(故缺血壞死好發)。","options":{"A":"非感染, 抗生素無效。","B":"不可強力徒手復位(增AVN風險)。","C":"★正確(本題答案):原位螺釘固定。","D":"內翻切骨非首選急性處置。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"102110-62":{"quick":"不包括 B:馬蹄內翻足四要素為馬蹄/後足內翻/前足內收/高弓,「扁平足」不在其中。","detail":{"background":"小兒足/下肢畸形:先天性馬蹄內翻足(clubfoot/talipes equinovarus)四要素=「馬蹄(equinus)、後足內翻(heel varus)、前足內收(metatarsus adductus)、高弓(cavus)」(不含扁平足), Ponseti 連續石膏矯正。痙攣型腦性麻痺(spastic CP)最常見足踝畸形=「馬蹄足(equinus, 跟腱攣縮)」需手術(跟腱延長)。腦性麻痺脊柱側彎風險:癱瘓越廣越高(四肢麻痺>雙下肢>半身), 「半身麻痺(hemiplegia)」最低。先天性脛骨假關節(congenital pseudarthrosis of tibia)=與NF1相關、「前外側(anterolateral)」彎曲、易骨折難癒合。黏多醣症(MPS)骨骼變化(dysostosis multiplex)=寬鎖骨、卵圓/魚嘴椎體、髖臼發育不良、「髖外翻」(coxa valga)為主, 「髖內翻(coxa vara)較少」。","options":{"A":"前足內翻是要素。","B":"★不包括(本題答案):扁平足非馬蹄內翻足成分。","C":"足跟內翻是要素。","D":"馬蹄足是要素。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"103030-62":{"quick":"錯 A:成骨不全症多為「體染色體顯性」(非隱性)。","detail":{"background":"青少年骨突炎/骨軟骨病(osteochondrosis):Osgood-Schlatter=脛骨粗隆(髕韌帶止點)牽引性骨突炎, 跳躍運動青少年膝下方腫痛;Sinding-Larsen-Johansson=髕骨下緣;Sever=跟骨骨突;Köhler=舟狀骨;Freiberg=第二蹠骨頭;Panner=肱骨小頭(capitellum)骨軟骨病, 好發5–11歲、右肘>左, 症狀為「痠痛」(肘彎曲受限非最常見);成骨不全症(osteogenesis imperfecta)=多為「體染色體顯性」第I型膠原(COL1A1/2)異常, 反覆骨折、藍鞏膜、聽損;治療雙磷酸鹽+切骨髓內釘。","options":{"A":"★錯誤(本題答案):多為體染色體顯性遺傳。","B":"正確:多源於第I型膠原異常。","C":"正確:反覆長骨骨折最常見。","D":"正確:切骨+髓內釘可降再骨折。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"103100-60":{"quick":"錯 A:肌肉性斜頸是「胸鎖乳突肌(SCM)」攣縮, 非胸舌肌(sternohyoid)。","detail":{"background":"先天肌肉性斜頸(congenital muscular torticollis)=「胸鎖乳突肌(SCM)」纖維化攣縮, 頭傾向患側、下巴轉向對側, 2月內常摸到頸部腫塊(纖維瘤), 約10–20%合併DDH(故須篩髖)、治療以「被動伸展運動」為主, 多數良好。","options":{"A":"★錯誤(本題答案):為SCM攣縮, 非胸舌肌。","B":"正確:2月內常因頸部腫塊診斷。","C":"正確:約20%合併DDH。","D":"正確:伸展運動治療效果好。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"103100-61":{"quick":"錯 D:Panner病最常見症狀是「痠痛」, 「肘彎曲受限」非最常見。","detail":{"background":"青少年骨突炎/骨軟骨病(osteochondrosis):Osgood-Schlatter=脛骨粗隆(髕韌帶止點)牽引性骨突炎, 跳躍運動青少年膝下方腫痛;Sinding-Larsen-Johansson=髕骨下緣;Sever=跟骨骨突;Köhler=舟狀骨;Freiberg=第二蹠骨頭;Panner=肱骨小頭(capitellum)骨軟骨病, 好發5–11歲、右肘>左, 症狀為「痠痛」(肘彎曲受限非最常見);成骨不全症(osteogenesis imperfecta)=多為「體染色體顯性」第I型膠原(COL1A1/2)異常, 反覆骨折、藍鞏膜、聽損;治療雙磷酸鹽+切骨髓內釘。","options":{"A":"正確:為肱骨小頭骨軟骨病。","B":"正確:右肘>左肘。","C":"正確:好發5–11歲。","D":"★錯誤(本題答案):最常見為痠痛, 非彎曲侷限。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"104030-61":{"quick":"A:脊柱側彎篩檢最重要理學=亞當前彎測試(Adams forward bend test)。","detail":{"background":"脊柱側彎:篩檢理學「亞當前彎測試(Adams forward bend test)+脊椎側彎計(scoliometer)」看胸廓隆起;特發性(idiopathic, 最常見, 青少年女)、先天性(脊椎分節/形成異常)、神經肌肉性、症候群性。咖啡牛奶斑+椎間孔擴大→「神經纖維瘤病(NF)型脊柱側彎」。先天性側彎中「單側未分段桿+對側半脊椎」進展最快、預後最差。Scheuermann駝背=青少年、椎體楔形(>5度×連續3節, Cobb>45度)、軟骨內骨化異常、可合併輕度側彎、與身高/骨齡無早熟關聯。","options":{"A":"★正確(本題答案):Adams forward bend test。","B":"Patrick test查髖/薦髂。","C":"Schober test查腰椎活動(僵直性脊椎炎)。","D":"sit-and-reach測柔軟度非側彎。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"104030-62":{"quick":"D:咖啡牛奶斑+椎間孔擴大→神經纖維瘤病(NF)型脊柱側彎。","detail":{"background":"脊柱側彎:篩檢理學「亞當前彎測試(Adams forward bend test)+脊椎側彎計(scoliometer)」看胸廓隆起;特發性(idiopathic, 最常見, 青少年女)、先天性(脊椎分節/形成異常)、神經肌肉性、症候群性。咖啡牛奶斑+椎間孔擴大→「神經纖維瘤病(NF)型脊柱側彎」。先天性側彎中「單側未分段桿+對側半脊椎」進展最快、預後最差。Scheuermann駝背=青少年、椎體楔形(>5度×連續3節, Cobb>45度)、軟骨內骨化異常、可合併輕度側彎、與身高/骨齡無早熟關聯。","options":{"A":"先天性為椎體分節/形成異常。","B":"特發性無皮膚斑/椎間孔擴大。","C":"脊髓膜膨出型有神經管缺損。","D":"★正確(本題答案):NF型(咖啡牛奶斑+椎間孔擴大)。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"105020-59":{"quick":"C:3歲手掌「無法外翻向上(旋後受限)」、前臂固定旋前=先天橈尺骨黏合。","detail":{"background":"下肢不等長(leg length discrepancy)處置依差距:<2 cm→墊高鞋(shoe lift);2–5 cm→「長腿」生長板抑制術(epiphysiodesis)或短縮;>5 cm→患側(短腿)骨延長術。本題7歲、差距估1.5–3.5 cm→先用墊高鞋(觀察), 是侵入性最低且適當的處置。先天橈尺骨黏合(congenital radioulnar synostosis)=前臂固定於旋前位、「旋後受限(無法手掌朝上捧碗)」。","options":{"A":"先天橈骨頭脫臼影像不同。","B":"臂神經叢產傷有上肢無力史。","C":"★正確(本題答案):先天橈尺骨黏合(旋後受限)。","D":"Monteggia為骨折脫位(外傷)。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"105100-61":{"quick":"B:生長板骨折線「穿過幹骺端」=Salter-Harris第二型(最常見)。","detail":{"background":"小兒骨折特性(生長板/骨膜):Salter-Harris分型(I骺板分離、II穿幹骺端[最常見, 如近端肱骨]、III穿骨骺入關節、IV跨幹骺-骺板-骨骺、V壓碎);III/IV/V預後較差(影響關節面/生長)。兒童骨柔韌:青枝骨折(greenstick)=一側皮質斷裂、對側皮質「塑形彎曲(plastic deformation)」;torus/buckle=皮質壓皺隆起。小兒肘部骨折:髁上骨折(supracondylar)最常見、外髁骨折(lateral condyle)為關節內Salter IV型→需「手術復位鋼針固定」以免不癒合/生長障礙。2歲幼兒「保母肘(nursemaid/pulled elbow)」=橈骨頭半脫位、前臂被牽拉後旋後/抬舉受限, 旋後屈肘復位。","options":{"A":"第一型為純骺板分離。","B":"★正確(本題答案):第二型(穿幹骺端, 最常見)。","C":"第三型穿骨骺入關節。","D":"第四型跨幹骺-骺板-骨骺。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"106020-61":{"quick":"最低 C:腦性麻痺脊柱側彎風險「雙下肢麻痺(diplegia)」最低(癱瘓越廣風險越高)。","detail":{"background":"小兒足/下肢畸形:先天性馬蹄內翻足(clubfoot/talipes equinovarus)四要素=「馬蹄(equinus)、後足內翻(heel varus)、前足內收(metatarsus adductus)、高弓(cavus)」(不含扁平足), Ponseti 連續石膏矯正。痙攣型腦性麻痺(spastic CP)最常見足踝畸形=「馬蹄足(equinus, 跟腱攣縮)」需手術(跟腱延長)。腦性麻痺脊柱側彎風險:癱瘓越廣越高(四肢麻痺>雙下肢>半身), 「半身麻痺(hemiplegia)」最低。先天性脛骨假關節(congenital pseudarthrosis of tibia)=與NF1相關、「前外側(anterolateral)」彎曲、易骨折難癒合。黏多醣症(MPS)骨骼變化(dysostosis multiplex)=寬鎖骨、卵圓/魚嘴椎體、髖臼發育不良、「髖外翻」(coxa valga)為主, 「髖內翻(coxa vara)較少」。","options":{"A":"四肢麻痺風險最高。","B":"半身麻痺(本題以diplegia為最低答案)。","C":"★最低(本題答案):雙下肢麻痺。","D":"三肢麻痺風險較高。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"106020-62":{"quick":"A:2歲保母肘(橈骨頭半脫位), 前臂「旋後(supination)」受限最明顯。","detail":{"background":"小兒骨折特性(生長板/骨膜):Salter-Harris分型(I骺板分離、II穿幹骺端[最常見, 如近端肱骨]、III穿骨骺入關節、IV跨幹骺-骺板-骨骺、V壓碎);III/IV/V預後較差(影響關節面/生長)。兒童骨柔韌:青枝骨折(greenstick)=一側皮質斷裂、對側皮質「塑形彎曲(plastic deformation)」;torus/buckle=皮質壓皺隆起。小兒肘部骨折:髁上骨折(supracondylar)最常見、外髁骨折(lateral condyle)為關節內Salter IV型→需「手術復位鋼針固定」以免不癒合/生長障礙。2歲幼兒「保母肘(nursemaid/pulled elbow)」=橈骨頭半脫位、前臂被牽拉後旋後/抬舉受限, 旋後屈肘復位。","options":{"A":"★正確(本題答案):前臂旋後受限(保母肘)。","B":"上臂外旋非主要受限。","C":"手肘彎曲尚可。","D":"手腕彎曲不受影響。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"106080-74":{"quick":"B:15歲鼠蹊痛跛行、青蛙位X光骺板滑脫=股骨頭近端生長板滑脫(SCFE)。","detail":{"background":"小兒髖部三大疾病(依年齡):①發育性髖關節發育不良(DDH)=新生兒/嬰兒, 危險因子(女嬰、臀位、家族史、第一胎、羊水少、斜頸/足畸形), 篩檢理學:「Ortolani(外展復位, 脫位→復位的clunk)、Barlow(內收+後推使脫位)」, 大嬰兒看Galeazzi徵象、大腿皮膚皺褶不對稱、超音波(<6月)/X光(>4–6月);Patrick(FABER)test 查薦髂/髖關節病, 「不適合」篩DDH。②Legg-Calvé-Perthes(LCPD)=4–8歲男童、股骨頭「特發性缺血性壞死」、跛行/髖膝痛, Catterall/Herring 預後不良徵象=發病年齡「大(>6–8歲, 非<5歲)」、壞死範圍大、外側柱受累、頭外側半脫位/Gage徵、生長板水平化;治療「圍堵(containment)」。③股骨頭骨骺滑脫(SCFE)=「肥胖青春期(10–16歲)」, 鼠蹊/大腿/膝痛、外旋跛行, 青蛙姿勢X光見骺板滑脫, 與「內分泌異常(甲狀腺低下、生長激素、性腺)」相關, 雙側約20–40%;治療「原位螺釘固定(in-situ pinning)」, 不可強力復位(增AVN)。股骨頭血供:18個月內血管「可穿過骺板」供應股骨頭, 之後骺板成屏障(故缺血壞死好發)。","options":{"A":"肌肉拉傷無骺板滑脫影像。","B":"★正確(本題答案):SCFE。","C":"疝氣無此X光。","D":"外陰挫傷無關。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"107020-58":{"quick":"錯 D:Ortolani 是以「外展(abduction)」復位脫位之髖, 非「內展(adduction)」。","detail":{"background":"小兒髖部三大疾病(依年齡):①發育性髖關節發育不良(DDH)=新生兒/嬰兒, 危險因子(女嬰、臀位、家族史、第一胎、羊水少、斜頸/足畸形), 篩檢理學:「Ortolani(外展復位, 脫位→復位的clunk)、Barlow(內收+後推使脫位)」, 大嬰兒看Galeazzi徵象、大腿皮膚皺褶不對稱、超音波(<6月)/X光(>4–6月);Patrick(FABER)test 查薦髂/髖關節病, 「不適合」篩DDH。②Legg-Calvé-Perthes(LCPD)=4–8歲男童、股骨頭「特發性缺血性壞死」、跛行/髖膝痛, Catterall/Herring 預後不良徵象=發病年齡「大(>6–8歲, 非<5歲)」、壞死範圍大、外側柱受累、頭外側半脫位/Gage徵、生長板水平化;治療「圍堵(containment)」。③股骨頭骨骺滑脫(SCFE)=「肥胖青春期(10–16歲)」, 鼠蹊/大腿/膝痛、外旋跛行, 青蛙姿勢X光見骺板滑脫, 與「內分泌異常(甲狀腺低下、生長激素、性腺)」相關, 雙側約20–40%;治療「原位螺釘固定(in-situ pinning)」, 不可強力復位(增AVN)。股骨頭血供:18個月內血管「可穿過骺板」供應股骨頭, 之後骺板成屏障(故缺血壞死好發)。","options":{"A":"正確:理學檢查仍是主要診斷, 超音波輔助。","B":"正確:Barlow測可脫位之髖。","C":"正確:斜頸是DDH危險因子應篩檢。","D":"★錯誤(本題答案):Ortolani是外展復位, 非內展。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"107080-58":{"quick":"預後最差 D:單側未分段桿+對側半脊椎=進展最快、預後最差。","detail":{"background":"脊柱側彎:篩檢理學「亞當前彎測試(Adams forward bend test)+脊椎側彎計(scoliometer)」看胸廓隆起;特發性(idiopathic, 最常見, 青少年女)、先天性(脊椎分節/形成異常)、神經肌肉性、症候群性。咖啡牛奶斑+椎間孔擴大→「神經纖維瘤病(NF)型脊柱側彎」。先天性側彎中「單側未分段桿+對側半脊椎」進展最快、預後最差。Scheuermann駝背=青少年、椎體楔形(>5度×連續3節, Cobb>45度)、軟骨內骨化異常、可合併輕度側彎、與身高/骨齡無早熟關聯。","options":{"A":"全分離半脊椎進展較慢。","B":"嵌入型半脊椎進展慢。","C":"單側未分段桿進展快但次於D。","D":"★正確(本題答案):未分段桿+對側半脊椎最差。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"107080-62":{"quick":"B:4歲肘部、影像示肱骨「外髁骨折(lateral condyle)」(關節內Salter IV)。","detail":{"background":"小兒骨折特性(生長板/骨膜):Salter-Harris分型(I骺板分離、II穿幹骺端[最常見, 如近端肱骨]、III穿骨骺入關節、IV跨幹骺-骺板-骨骺、V壓碎);III/IV/V預後較差(影響關節面/生長)。兒童骨柔韌:青枝骨折(greenstick)=一側皮質斷裂、對側皮質「塑形彎曲(plastic deformation)」;torus/buckle=皮質壓皺隆起。小兒肘部骨折:髁上骨折(supracondylar)最常見、外髁骨折(lateral condyle)為關節內Salter IV型→需「手術復位鋼針固定」以免不癒合/生長障礙。2歲幼兒「保母肘(nursemaid/pulled elbow)」=橈骨頭半脫位、前臂被牽拉後旋後/抬舉受限, 旋後屈肘復位。","options":{"A":"髁上骨折影像型態不同。","B":"★正確(本題答案):肱骨外髁骨折。","C":"內上髁骨折部位不同。","D":"鷹嘴突骨折部位不同。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"107080-63":{"quick":"D:肱骨外髁骨折(關節內、移位)→「手術復位鋼針固定」以免不癒合/生長障礙。","detail":{"background":"小兒骨折特性(生長板/骨膜):Salter-Harris分型(I骺板分離、II穿幹骺端[最常見, 如近端肱骨]、III穿骨骺入關節、IV跨幹骺-骺板-骨骺、V壓碎);III/IV/V預後較差(影響關節面/生長)。兒童骨柔韌:青枝骨折(greenstick)=一側皮質斷裂、對側皮質「塑形彎曲(plastic deformation)」;torus/buckle=皮質壓皺隆起。小兒肘部骨折:髁上骨折(supracondylar)最常見、外髁骨折(lateral condyle)為關節內Salter IV型→需「手術復位鋼針固定」以免不癒合/生長障礙。2歲幼兒「保母肘(nursemaid/pulled elbow)」=橈骨頭半脫位、前臂被牽拉後旋後/抬舉受限, 旋後屈肘復位。","options":{"A":"冰敷吊帶不足。","B":"支架固定不足。","C":"單純石膏不足(關節內移位)。","D":"★正確(本題答案):開放復位鋼針固定。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"108030-61":{"quick":"A:血管可直接穿過股骨頸生長板供應股骨頭的年齡=「18個月以內」。","detail":{"background":"小兒髖部三大疾病(依年齡):①發育性髖關節發育不良(DDH)=新生兒/嬰兒, 危險因子(女嬰、臀位、家族史、第一胎、羊水少、斜頸/足畸形), 篩檢理學:「Ortolani(外展復位, 脫位→復位的clunk)、Barlow(內收+後推使脫位)」, 大嬰兒看Galeazzi徵象、大腿皮膚皺褶不對稱、超音波(<6月)/X光(>4–6月);Patrick(FABER)test 查薦髂/髖關節病, 「不適合」篩DDH。②Legg-Calvé-Perthes(LCPD)=4–8歲男童、股骨頭「特發性缺血性壞死」、跛行/髖膝痛, Catterall/Herring 預後不良徵象=發病年齡「大(>6–8歲, 非<5歲)」、壞死範圍大、外側柱受累、頭外側半脫位/Gage徵、生長板水平化;治療「圍堵(containment)」。③股骨頭骨骺滑脫(SCFE)=「肥胖青春期(10–16歲)」, 鼠蹊/大腿/膝痛、外旋跛行, 青蛙姿勢X光見骺板滑脫, 與「內分泌異常(甲狀腺低下、生長激素、性腺)」相關, 雙側約20–40%;治療「原位螺釘固定(in-situ pinning)」, 不可強力復位(增AVN)。股骨頭血供:18個月內血管「可穿過骺板」供應股骨頭, 之後骺板成屏障(故缺血壞死好發)。","options":{"A":"★正確(本題答案):18個月內。","B":"2–3歲後骺板成屏障。","C":"5–8歲非。","D":"10歲後非。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"108080-62":{"quick":"不是兒童足踝病的 C:Panner病是「肘部(肱骨小頭)」骨軟骨病, 非足踝。","detail":{"background":"青少年骨突炎/骨軟骨病(osteochondrosis):Osgood-Schlatter=脛骨粗隆(髕韌帶止點)牽引性骨突炎, 跳躍運動青少年膝下方腫痛;Sinding-Larsen-Johansson=髕骨下緣;Sever=跟骨骨突;Köhler=舟狀骨;Freiberg=第二蹠骨頭;Panner=肱骨小頭(capitellum)骨軟骨病, 好發5–11歲、右肘>左, 症狀為「痠痛」(肘彎曲受限非最常見);成骨不全症(osteogenesis imperfecta)=多為「體染色體顯性」第I型膠原(COL1A1/2)異常, 反覆骨折、藍鞏膜、聽損;治療雙磷酸鹽+切骨髓內釘。","options":{"A":"Köhler為舟狀骨(足)。","B":"Freiberg為第二蹠骨頭(足)。","C":"★正確(本題答案):Panner在肘部, 非足踝。","D":"Sever為跟骨骨突(足)。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"108080-74":{"quick":"C:3歲搖擺步態(Trendelenburg)、X光示=發育性髖關節發育不良(DDH)。","detail":{"background":"小兒髖部三大疾病(依年齡):①發育性髖關節發育不良(DDH)=新生兒/嬰兒, 危險因子(女嬰、臀位、家族史、第一胎、羊水少、斜頸/足畸形), 篩檢理學:「Ortolani(外展復位, 脫位→復位的clunk)、Barlow(內收+後推使脫位)」, 大嬰兒看Galeazzi徵象、大腿皮膚皺褶不對稱、超音波(<6月)/X光(>4–6月);Patrick(FABER)test 查薦髂/髖關節病, 「不適合」篩DDH。②Legg-Calvé-Perthes(LCPD)=4–8歲男童、股骨頭「特發性缺血性壞死」、跛行/髖膝痛, Catterall/Herring 預後不良徵象=發病年齡「大(>6–8歲, 非<5歲)」、壞死範圍大、外側柱受累、頭外側半脫位/Gage徵、生長板水平化;治療「圍堵(containment)」。③股骨頭骨骺滑脫(SCFE)=「肥胖青春期(10–16歲)」, 鼠蹊/大腿/膝痛、外旋跛行, 青蛙姿勢X光見骺板滑脫, 與「內分泌異常(甲狀腺低下、生長激素、性腺)」相關, 雙側約20–40%;治療「原位螺釘固定(in-situ pinning)」, 不可強力復位(增AVN)。股骨頭血供:18個月內血管「可穿過骺板」供應股骨頭, 之後骺板成屏障(故缺血壞死好發)。","options":{"A":"Perthes為股骨頭壞死(較晚出現碎裂)。","B":"SCFE好發青春期。","C":"★正確(本題答案):DDH(搖擺步態)。","D":"骨軟骨病非此表現。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"109020-62":{"quick":"除外 C:Perthes預後不良徵象是「發病年齡『大』」, 「小於5歲」反而預後較好。","detail":{"background":"小兒髖部三大疾病(依年齡):①發育性髖關節發育不良(DDH)=新生兒/嬰兒, 危險因子(女嬰、臀位、家族史、第一胎、羊水少、斜頸/足畸形), 篩檢理學:「Ortolani(外展復位, 脫位→復位的clunk)、Barlow(內收+後推使脫位)」, 大嬰兒看Galeazzi徵象、大腿皮膚皺褶不對稱、超音波(<6月)/X光(>4–6月);Patrick(FABER)test 查薦髂/髖關節病, 「不適合」篩DDH。②Legg-Calvé-Perthes(LCPD)=4–8歲男童、股骨頭「特發性缺血性壞死」、跛行/髖膝痛, Catterall/Herring 預後不良徵象=發病年齡「大(>6–8歲, 非<5歲)」、壞死範圍大、外側柱受累、頭外側半脫位/Gage徵、生長板水平化;治療「圍堵(containment)」。③股骨頭骨骺滑脫(SCFE)=「肥胖青春期(10–16歲)」, 鼠蹊/大腿/膝痛、外旋跛行, 青蛙姿勢X光見骺板滑脫, 與「內分泌異常(甲狀腺低下、生長激素、性腺)」相關, 雙側約20–40%;治療「原位螺釘固定(in-situ pinning)」, 不可強力復位(增AVN)。股骨頭血供:18個月內血管「可穿過骺板」供應股骨頭, 之後骺板成屏障(故缺血壞死好發)。","options":{"A":"外側X光通過性增加為不良徵。","B":"生長板水平化為不良徵。","C":"★除外(本題答案):年紀小(<5歲)預後較好, 非不良。","D":"壞死範圍大為不良徵。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"109080-61":{"quick":"最少發生 D:黏多醣症骨骼變化以「髖外翻」為主, 「髖內翻(coxa vara)」最少。","detail":{"background":"小兒足/下肢畸形:先天性馬蹄內翻足(clubfoot/talipes equinovarus)四要素=「馬蹄(equinus)、後足內翻(heel varus)、前足內收(metatarsus adductus)、高弓(cavus)」(不含扁平足), Ponseti 連續石膏矯正。痙攣型腦性麻痺(spastic CP)最常見足踝畸形=「馬蹄足(equinus, 跟腱攣縮)」需手術(跟腱延長)。腦性麻痺脊柱側彎風險:癱瘓越廣越高(四肢麻痺>雙下肢>半身), 「半身麻痺(hemiplegia)」最低。先天性脛骨假關節(congenital pseudarthrosis of tibia)=與NF1相關、「前外側(anterolateral)」彎曲、易骨折難癒合。黏多醣症(MPS)骨骼變化(dysostosis multiplex)=寬鎖骨、卵圓/魚嘴椎體、髖臼發育不良、「髖外翻」(coxa valga)為主, 「髖內翻(coxa vara)較少」。","options":{"A":"寬鎖骨常見。","B":"卵圓/魚嘴椎體常見。","C":"髖臼發育不良常見。","D":"★最少(本題答案):髖內翻較少(MPS多為髖外翻)。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"110020-61":{"quick":"最適當 D:SCFE通常與「荷爾蒙/內分泌異常」相關。","detail":{"background":"小兒髖部三大疾病(依年齡):①發育性髖關節發育不良(DDH)=新生兒/嬰兒, 危險因子(女嬰、臀位、家族史、第一胎、羊水少、斜頸/足畸形), 篩檢理學:「Ortolani(外展復位, 脫位→復位的clunk)、Barlow(內收+後推使脫位)」, 大嬰兒看Galeazzi徵象、大腿皮膚皺褶不對稱、超音波(<6月)/X光(>4–6月);Patrick(FABER)test 查薦髂/髖關節病, 「不適合」篩DDH。②Legg-Calvé-Perthes(LCPD)=4–8歲男童、股骨頭「特發性缺血性壞死」、跛行/髖膝痛, Catterall/Herring 預後不良徵象=發病年齡「大(>6–8歲, 非<5歲)」、壞死範圍大、外側柱受累、頭外側半脫位/Gage徵、生長板水平化;治療「圍堵(containment)」。③股骨頭骨骺滑脫(SCFE)=「肥胖青春期(10–16歲)」, 鼠蹊/大腿/膝痛、外旋跛行, 青蛙姿勢X光見骺板滑脫, 與「內分泌異常(甲狀腺低下、生長激素、性腺)」相關, 雙側約20–40%;治療「原位螺釘固定(in-situ pinning)」, 不可強力復位(增AVN)。股骨頭血供:18個月內血管「可穿過骺板」供應股骨頭, 之後骺板成屏障(故缺血壞死好發)。","options":{"A":"錯:好發青春期(非學齡前)。","B":"錯:雙側約20–40%(非75%)。","C":"錯:骨齡常較生理年齡「延遲/不成熟」, 非早熟。","D":"★正確(本題答案):與內分泌異常相關。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"110080-60":{"quick":"B:先天性脛骨假關節最常見「前外側(anterolateral)」彎曲、易骨折(與NF1相關)。","detail":{"background":"小兒足/下肢畸形:先天性馬蹄內翻足(clubfoot/talipes equinovarus)四要素=「馬蹄(equinus)、後足內翻(heel varus)、前足內收(metatarsus adductus)、高弓(cavus)」(不含扁平足), Ponseti 連續石膏矯正。痙攣型腦性麻痺(spastic CP)最常見足踝畸形=「馬蹄足(equinus, 跟腱攣縮)」需手術(跟腱延長)。腦性麻痺脊柱側彎風險:癱瘓越廣越高(四肢麻痺>雙下肢>半身), 「半身麻痺(hemiplegia)」最低。先天性脛骨假關節(congenital pseudarthrosis of tibia)=與NF1相關、「前外側(anterolateral)」彎曲、易骨折難癒合。黏多醣症(MPS)骨骼變化(dysostosis multiplex)=寬鎖骨、卵圓/魚嘴椎體、髖臼發育不良、「髖外翻」(coxa valga)為主, 「髖內翻(coxa vara)較少」。","options":{"A":"前內側為良性生理性彎曲。","B":"★正確(本題答案):前外側彎曲(假關節, NF1)。","C":"後內側彎曲多為良性可自癒。","D":"後外側非典型。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"111020-60":{"quick":"最不適合 A:Patrick(FABER)test查髖/薦髂, 「不適合」用於篩DDH;DDH用Ortolani/Barlow/Galeazzi。","detail":{"background":"小兒髖部三大疾病(依年齡):①發育性髖關節發育不良(DDH)=新生兒/嬰兒, 危險因子(女嬰、臀位、家族史、第一胎、羊水少、斜頸/足畸形), 篩檢理學:「Ortolani(外展復位, 脫位→復位的clunk)、Barlow(內收+後推使脫位)」, 大嬰兒看Galeazzi徵象、大腿皮膚皺褶不對稱、超音波(<6月)/X光(>4–6月);Patrick(FABER)test 查薦髂/髖關節病, 「不適合」篩DDH。②Legg-Calvé-Perthes(LCPD)=4–8歲男童、股骨頭「特發性缺血性壞死」、跛行/髖膝痛, Catterall/Herring 預後不良徵象=發病年齡「大(>6–8歲, 非<5歲)」、壞死範圍大、外側柱受累、頭外側半脫位/Gage徵、生長板水平化;治療「圍堵(containment)」。③股骨頭骨骺滑脫(SCFE)=「肥胖青春期(10–16歲)」, 鼠蹊/大腿/膝痛、外旋跛行, 青蛙姿勢X光見骺板滑脫, 與「內分泌異常(甲狀腺低下、生長激素、性腺)」相關, 雙側約20–40%;治療「原位螺釘固定(in-situ pinning)」, 不可強力復位(增AVN)。股骨頭血供:18個月內血管「可穿過骺板」供應股骨頭, 之後骺板成屏障(故缺血壞死好發)。","options":{"A":"★最不適合(本題答案):Patrick test非DDH篩檢。","B":"Galeazzi徵可用於大嬰兒。","C":"Ortolani可用。","D":"Barlow可用。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"112020-60":{"quick":"最適當 A:7歲、預估差1.5–3.5 cm→先用「短肢墊高鞋(shoe lift)」(侵入性最低且適當)。","detail":{"background":"下肢不等長(leg length discrepancy)處置依差距:<2 cm→墊高鞋(shoe lift);2–5 cm→「長腿」生長板抑制術(epiphysiodesis)或短縮;>5 cm→患側(短腿)骨延長術。本題7歲、差距估1.5–3.5 cm→先用墊高鞋(觀察), 是侵入性最低且適當的處置。先天橈尺骨黏合(congenital radioulnar synostosis)=前臂固定於旋前位、「旋後受限(無法手掌朝上捧碗)」。","options":{"A":"★正確(本題答案):短肢墊高鞋。","B":"長肢生長板抑制適用差距更大且需評估時機(本題墊高鞋更適當)。","C":"長肢縮短手術過度侵入。","D":"短肢骨延長用於>5cm大差距。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"112080-60":{"quick":"B:Salter-Harris type II(穿幹骺端)最常見於「近端肱骨」骨折。","detail":{"background":"小兒骨折特性(生長板/骨膜):Salter-Harris分型(I骺板分離、II穿幹骺端[最常見, 如近端肱骨]、III穿骨骺入關節、IV跨幹骺-骺板-骨骺、V壓碎);III/IV/V預後較差(影響關節面/生長)。兒童骨柔韌:青枝骨折(greenstick)=一側皮質斷裂、對側皮質「塑形彎曲(plastic deformation)」;torus/buckle=皮質壓皺隆起。小兒肘部骨折:髁上骨折(supracondylar)最常見、外髁骨折(lateral condyle)為關節內Salter IV型→需「手術復位鋼針固定」以免不癒合/生長障礙。2歲幼兒「保母肘(nursemaid/pulled elbow)」=橈骨頭半脫位、前臂被牽拉後旋後/抬舉受限, 旋後屈肘復位。","options":{"A":"鎖骨骨折非骺板型。","B":"★正確(本題答案):近端肱骨易Salter II。","C":"髁上骨折為幹骺端骨折(非骺板分型代表)。","D":"外髁骨折為Salter IV型。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"113070-60":{"quick":"B:一側皮質斷裂+對側「塑形彎曲」=青枝骨折(greenstick fracture)。","detail":{"background":"小兒骨折特性(生長板/骨膜):Salter-Harris分型(I骺板分離、II穿幹骺端[最常見, 如近端肱骨]、III穿骨骺入關節、IV跨幹骺-骺板-骨骺、V壓碎);III/IV/V預後較差(影響關節面/生長)。兒童骨柔韌:青枝骨折(greenstick)=一側皮質斷裂、對側皮質「塑形彎曲(plastic deformation)」;torus/buckle=皮質壓皺隆起。小兒肘部骨折:髁上骨折(supracondylar)最常見、外髁骨折(lateral condyle)為關節內Salter IV型→需「手術復位鋼針固定」以免不癒合/生長障礙。2歲幼兒「保母肘(nursemaid/pulled elbow)」=橈骨頭半脫位、前臂被牽拉後旋後/抬舉受限, 旋後屈肘復位。","options":{"A":"torus/buckle為皮質壓皺隆起。","B":"★正確(本題答案):青枝骨折。","C":"螺旋骨折為扭轉機轉。","D":"橫向骨折為完全橫斷。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"114020-60":{"quick":"B:11歲肥胖、雙髖僵硬疼痛跛行=股骨頭骨骺滑脫(SCFE)。","detail":{"background":"小兒髖部三大疾病(依年齡):①發育性髖關節發育不良(DDH)=新生兒/嬰兒, 危險因子(女嬰、臀位、家族史、第一胎、羊水少、斜頸/足畸形), 篩檢理學:「Ortolani(外展復位, 脫位→復位的clunk)、Barlow(內收+後推使脫位)」, 大嬰兒看Galeazzi徵象、大腿皮膚皺褶不對稱、超音波(<6月)/X光(>4–6月);Patrick(FABER)test 查薦髂/髖關節病, 「不適合」篩DDH。②Legg-Calvé-Perthes(LCPD)=4–8歲男童、股骨頭「特發性缺血性壞死」、跛行/髖膝痛, Catterall/Herring 預後不良徵象=發病年齡「大(>6–8歲, 非<5歲)」、壞死範圍大、外側柱受累、頭外側半脫位/Gage徵、生長板水平化;治療「圍堵(containment)」。③股骨頭骨骺滑脫(SCFE)=「肥胖青春期(10–16歲)」, 鼠蹊/大腿/膝痛、外旋跛行, 青蛙姿勢X光見骺板滑脫, 與「內分泌異常(甲狀腺低下、生長激素、性腺)」相關, 雙側約20–40%;治療「原位螺釘固定(in-situ pinning)」, 不可強力復位(增AVN)。股骨頭血供:18個月內血管「可穿過骺板」供應股骨頭, 之後骺板成屏障(故缺血壞死好發)。","options":{"A":"DDH於嬰幼兒期。","B":"★正確(本題答案):肥胖青春期SCFE。","C":"Osgood-Schlatter在脛骨粗隆(膝)。","D":"Blount病為脛骨內翻。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"115020-63":{"quick":"最適當 B:Scheuermann駝背可「合併脊柱側彎」。","detail":{"background":"脊柱側彎:篩檢理學「亞當前彎測試(Adams forward bend test)+脊椎側彎計(scoliometer)」看胸廓隆起;特發性(idiopathic, 最常見, 青少年女)、先天性(脊椎分節/形成異常)、神經肌肉性、症候群性。咖啡牛奶斑+椎間孔擴大→「神經纖維瘤病(NF)型脊柱側彎」。先天性側彎中「單側未分段桿+對側半脊椎」進展最快、預後最差。Scheuermann駝背=青少年、椎體楔形(>5度×連續3節, Cobb>45度)、軟骨內骨化異常、可合併輕度側彎、與身高/骨齡無早熟關聯。","options":{"A":"錯:角度可隨年齡進展(Cobb常>45度)。","B":"★正確(本題答案):可合併脊柱側彎。","C":"軟骨內骨化異常但蛋白聚醣描述非定義重點(本題以B為最適當)。","D":"錯:與身高矮/骨齡早熟無關。"},"sources":["Harrison 21e","Tachdjian Pediatric Orthopaedics","Lovell and Winter Pediatric Orthopaedics"]}},"105100-63":{"quick":"最正確 D:靜脈毒癮者骨髓炎優先考慮金黃色葡萄球菌、綠膿桿菌與G(−)菌。","detail":{"background":"骨髓炎(osteomyelitis):兒童多為「血行性(hematogenous)」(幹骺端血流慢), 成人多為「鄰近擴散/外傷/手術後」(成人血行性較少)。最常見致病菌=金黃色葡萄球菌;鐮刀型貧血→沙門氏菌;「靜脈毒癮者/穿刺傷」→金黃色葡萄球菌、綠膿桿菌與G(−)菌。死骨(sequestrum)=壞死游離骨片;包殼骨(involucrum)=外圍新生骨包覆(故「壞死稱包殼骨」錯誤)。慢性骨髓炎白血球常「不」升高。糖尿病足是「非外傷性截肢最常見原因」;骨髓炎影像:X光變化「落後臨床1–2週」(早期常正常)、MRI最早最敏感、骨掃描有幫助。人工關節感染(PJI):診斷靠竇道相通、關節液白血球升高(慢性閾值約>3000/μL, 但單一數值不能確診)、CRP(部分低毒力菌可不升)、培養;處置依時程(早期可清創保留假體+抗生素 DAIR, 慢性多需「兩階段更換」), 「並非一定要拔除假體治療才會成功」(故D絕對化錯誤)。手術部位感染預防:適當「預防性抗生素」(cefazolin), 「切皮前60分鐘內(萬古黴素120分鐘)」給藥、術後24小時內停藥(非72小時), 不常規用萬古黴素/clindamycin(僅β-內醯胺過敏/MRSA高風險者)。","options":{"A":"錯:成人骨髓炎多為鄰近擴散/外傷, 血行性較少(兒童才多血行性)。","B":"錯:壞死游離骨片稱「死骨(sequestrum)」, 包殼骨是外圍新生骨。","C":"錯:慢性骨髓炎白血球常不升高。","D":"★正確(本題答案):靜脈毒癮者考慮金黃葡萄球/綠膿/G(−)。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"106020-57":{"quick":"不是第II型膠原的 B:半月板(纖維軟骨)以「第I型膠原」為主。","detail":{"background":"人工關節置換(arthroplasty):全膝置換(TKA)後穩定靠假體與韌帶, 「前十字韌帶(ACL)」一定被切除(部分設計亦犧牲PCL), 內外側副韌帶須「保留」以維持穩定。全髖置換入路:「後方入路(posterior)」須切斷「短外旋肌群(梨狀肌、上下孖肌、閉孔內肌、股方肌)」, 後脫位風險較高;前外側/直接外側入路涉及臀中小肌(易跛行)。人工關節材料:股骨頭/承重面用「高硬度耐磨」材料=鈷鉻鉬(CoCr)或陶瓷(氧化鋯/氧化鋁);「鈦合金(titanium)」彈性模數低、骨整合佳→用於『柄/支架(stem)與多孔骨長入面』, 但「太軟、耐磨差→不適合做股骨頭關節面」(故C不適當);聚乙烯(UHMWPE)為髖臼杯/脛骨墊片承重介面。骨水泥(PMMA, methyl methacrylate)=「機械嵌合(microinterlock)」固定假體於骨小樑(非如膠水黏合);粉劑為polymer、液劑為monomer(避光保存), 聚合為「放熱(exothermic)」反應;骨水泥植入症候群(BCIS)=單體入血/栓塞→低血壓、低血氧、心律不整甚至心跳停止。組織膠原:透明軟骨、髓核、椎間盤終板皆以「第II型膠原」為主;半月板(fibrocartilage)以「第I型膠原」為主(故不是第II型)。","options":{"A":"透明軟骨為第II型。","B":"★正確(本題答案):半月板為第I型膠原, 非第II型。","C":"髓核為第II型。","D":"椎間盤終板為第II型。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"106020-59":{"quick":"A:初次全膝置換術中必須切除「前十字韌帶(ACL)」。","detail":{"background":"人工關節置換(arthroplasty):全膝置換(TKA)後穩定靠假體與韌帶, 「前十字韌帶(ACL)」一定被切除(部分設計亦犧牲PCL), 內外側副韌帶須「保留」以維持穩定。全髖置換入路:「後方入路(posterior)」須切斷「短外旋肌群(梨狀肌、上下孖肌、閉孔內肌、股方肌)」, 後脫位風險較高;前外側/直接外側入路涉及臀中小肌(易跛行)。人工關節材料:股骨頭/承重面用「高硬度耐磨」材料=鈷鉻鉬(CoCr)或陶瓷(氧化鋯/氧化鋁);「鈦合金(titanium)」彈性模數低、骨整合佳→用於『柄/支架(stem)與多孔骨長入面』, 但「太軟、耐磨差→不適合做股骨頭關節面」(故C不適當);聚乙烯(UHMWPE)為髖臼杯/脛骨墊片承重介面。骨水泥(PMMA, methyl methacrylate)=「機械嵌合(microinterlock)」固定假體於骨小樑(非如膠水黏合);粉劑為polymer、液劑為monomer(避光保存), 聚合為「放熱(exothermic)」反應;骨水泥植入症候群(BCIS)=單體入血/栓塞→低血壓、低血氧、心律不整甚至心跳停止。組織膠原:透明軟骨、髓核、椎間盤終板皆以「第II型膠原」為主;半月板(fibrocartilage)以「第I型膠原」為主(故不是第II型)。","options":{"A":"★正確(本題答案):TKA須切除ACL。","B":"髕骨肌腱須保留(伸膝機轉)。","C":"內側副韌帶須保留(穩定)。","D":"外側副韌帶須保留(穩定)。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"108080-59":{"quick":"C:後方入路全髖置換須切斷短外旋肌群之「上孖肌(superior gemellus)」。","detail":{"background":"人工關節置換(arthroplasty):全膝置換(TKA)後穩定靠假體與韌帶, 「前十字韌帶(ACL)」一定被切除(部分設計亦犧牲PCL), 內外側副韌帶須「保留」以維持穩定。全髖置換入路:「後方入路(posterior)」須切斷「短外旋肌群(梨狀肌、上下孖肌、閉孔內肌、股方肌)」, 後脫位風險較高;前外側/直接外側入路涉及臀中小肌(易跛行)。人工關節材料:股骨頭/承重面用「高硬度耐磨」材料=鈷鉻鉬(CoCr)或陶瓷(氧化鋯/氧化鋁);「鈦合金(titanium)」彈性模數低、骨整合佳→用於『柄/支架(stem)與多孔骨長入面』, 但「太軟、耐磨差→不適合做股骨頭關節面」(故C不適當);聚乙烯(UHMWPE)為髖臼杯/脛骨墊片承重介面。骨水泥(PMMA, methyl methacrylate)=「機械嵌合(microinterlock)」固定假體於骨小樑(非如膠水黏合);粉劑為polymer、液劑為monomer(避光保存), 聚合為「放熱(exothermic)」反應;骨水泥植入症候群(BCIS)=單體入血/栓塞→低血壓、低血氧、心律不整甚至心跳停止。組織膠原:透明軟骨、髓核、椎間盤終板皆以「第II型膠原」為主;半月板(fibrocartilage)以「第I型膠原」為主(故不是第II型)。","options":{"A":"臀中肌於外側入路涉及。","B":"臀小肌於外側入路涉及。","C":"★正確(本題答案):後方入路切短外旋肌(含上孖肌)。","D":"股外側肌非後方入路必切。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"109080-16":{"quick":"錯 A:糖尿病足骨髓炎X光變化「落後臨床1–2週」, 非「晚1週」之單一武斷描述(X光早期常正常,變化更慢)。","detail":{"background":"骨髓炎(osteomyelitis):兒童多為「血行性(hematogenous)」(幹骺端血流慢), 成人多為「鄰近擴散/外傷/手術後」(成人血行性較少)。最常見致病菌=金黃色葡萄球菌;鐮刀型貧血→沙門氏菌;「靜脈毒癮者/穿刺傷」→金黃色葡萄球菌、綠膿桿菌與G(−)菌。死骨(sequestrum)=壞死游離骨片;包殼骨(involucrum)=外圍新生骨包覆(故「壞死稱包殼骨」錯誤)。慢性骨髓炎白血球常「不」升高。糖尿病足是「非外傷性截肢最常見原因」;骨髓炎影像:X光變化「落後臨床1–2週」(早期常正常)、MRI最早最敏感、骨掃描有幫助。人工關節感染(PJI):診斷靠竇道相通、關節液白血球升高(慢性閾值約>3000/μL, 但單一數值不能確診)、CRP(部分低毒力菌可不升)、培養;處置依時程(早期可清創保留假體+抗生素 DAIR, 慢性多需「兩階段更換」), 「並非一定要拔除假體治療才會成功」(故D絕對化錯誤)。手術部位感染預防:適當「預防性抗生素」(cefazolin), 「切皮前60分鐘內(萬古黴素120分鐘)」給藥、術後24小時內停藥(非72小時), 不常規用萬古黴素/clindamycin(僅β-內醯胺過敏/MRSA高風險者)。","options":{"A":"★錯誤(本題答案):X光變化常落後1–2週且早期可正常, 非固定晚1週。","B":"正確:MRI可早期診斷骨髓炎。","C":"正確:骨掃描對骨髓炎診斷有幫助。","D":"正確:糖尿病足是非外傷性截肢最常見原因。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"112020-63":{"quick":"最不適當 C:鈦合金太軟、耐磨差→「不」適合做股骨頭關節面(宜用CoCr/陶瓷)。","detail":{"background":"人工關節置換(arthroplasty):全膝置換(TKA)後穩定靠假體與韌帶, 「前十字韌帶(ACL)」一定被切除(部分設計亦犧牲PCL), 內外側副韌帶須「保留」以維持穩定。全髖置換入路:「後方入路(posterior)」須切斷「短外旋肌群(梨狀 , 不常規用萬古黴素/clindamycin(僅β-內醯胺過敏/MRSA高風險者)。","options":{"A":"★正確(本題答案):適當選用預防性抗生素。","B":"錯:應在「切皮前60分鐘內」給(萬古120分鐘), 非一律120分鐘。","C":"錯:術後預防性抗生素應24小時內停, 非72小時。","D":"錯:不常規用vancomycin/clindamycin(僅特定族群)。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"114020-63":{"quick":"最適當 D:骨水泥併發症可因單體(monomer)入血或血栓→休克、心臟停止(骨水泥植入症候群)。","detail":{"background":"人工關節置換(arthroplasty):全膝置換(TKA)後穩定靠假體與韌帶, 「前十字韌帶(ACL)」一定被切除(部分設計亦犧牲PCL), 內外側副韌帶須「保留」以維持穩定。全髖置換入路:「後方入路(posterior)」須切斷「短外旋肌群(梨狀肌、上下孖肌、閉孔內肌、股方肌)」, 後脫位風險較高;前外側/直接外側入路涉及臀中小肌(易跛行)。人工關節材料:股骨頭/承重面用「高硬度耐磨」材料=鈷鉻鉬(CoCr)或陶瓷(氧化鋯/氧化鋁);「鈦合金(titanium)」彈性模數低、骨整合佳→用於『柄/支架(stem)與多孔骨長入面』, 但「太軟、耐磨差→不適合做股骨頭關節面」(故C不適當);聚乙烯(UHMWPE)為髖臼杯/脛骨墊片承重介面。骨水泥(PMMA, methyl methacrylate)=「機械嵌合(microinterlock)」固定假體於骨小樑(非如膠水黏合);粉劑為polymer、液劑為monomer(避光保存), 聚合為「放熱(exothermic)」反應;骨水泥植入症候群(BCIS)=單體入血/栓塞→低血壓、低血氧、心律不整甚至心跳停止。組織膠原:透明軟骨、髓核、椎間盤終板皆以「第II型膠原」為主;半月板(fibrocartilage)以「第I型膠原」為主(故不是第II型)。","options":{"A":"錯:骨水泥靠「機械嵌合」固定, 非如膠水黏合。","B":"錯:瓶裝「液劑」是monomer(非polymer), 粉劑才是polymer。","C":"錯:聚合反應為「放熱」反應, 非吸熱。","D":"★正確(本題答案):單體/血栓致休克、心跳停止。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"102030-57":{"quick":"C:棕色瘤(brown tumor)與「副甲狀腺機能亢進」相關(PTH↑致蝕骨纖維囊性骨炎)。","detail":{"background":"骨壞死/缺血性壞死(AVN/osteonecrosis):好發股骨頭、肱骨頭、舟狀骨、距骨、月狀骨(血供逆行/末端);「跟骨血供豐富, 最少壞死」。原因:創傷(股骨頸骨折/脫位)為常見, 非創傷性=「酗酒、類固醇」(最常見非創傷因)、SLE、潛水夫病、鐮刀貧血、Gaucher。股骨頭AVN分期(Ficat):早期X光可正常→MRI最早(雙線徵)→subchondral cyst/硬化→「新月徵(crescent sign, 軟骨下崩塌前兆)」→塌陷→關節炎。中心減壓(core decompression)用於「塌陷前(pre-collapse)」早期;一旦「軟骨下崩塌」減壓已無效, 須人工關節置換。股骨頭內骨髓腔壓力AVN時「會升高」。棕色瘤(brown tumor)=副甲狀腺機能亢進(PTH↑致蝕骨)之纖維囊性骨炎, 多核巨大細胞+含鐵血黃素。自發性膝骨壞死(SPONK/SONK)=老年女性、突發膝內側痛、股骨內髁壞死併關節炎。佝僂病(rickets, 兒童生長板)/骨軟化(osteomalacia, 成人)=維生素D/磷代謝異常致「礦化失敗」;生長板礦化失敗發生在「肥大區(hypertrophic zone)」非增生區;ALP升高、Looser zone(假性骨折);繼發性副甲亢致PTH升高;診斷多靠生化+影像(不一定皆靠骨切片)。","options":{"A":"甲狀腺低下非。","B":"腦下垂體亢進非。","C":"★正確(本題答案):副甲狀腺機能亢進。","D":"Paget氏病非棕色瘤病因。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"102110-63":{"quick":"B:65歲女性突發膝內側痛、股骨內髁壞死併關節炎=自發性膝骨壞死(SPONK/SONK)。","detail":{"background":"骨壞死/缺血性壞死(AVN/osteonecrosis):好發股骨頭、肱骨頭、舟狀骨、距骨、月狀骨(血供逆行/末端);「跟骨血供豐富, 最少壞死」。原因:創傷(股骨頸骨折/脫位)為常見, 非創傷性=「酗酒、類固醇」(最常見非創傷因)、SLE、潛水夫病、鐮刀貧血、Gaucher。股骨頭AVN分期(Ficat):早期X光可正常→MRI最早(雙線徵)→subchondral cyst/硬化→「新月徵(crescent sign, 軟骨下崩塌前兆)」→塌陷→關節炎。中心減壓(core decompression)用於「塌陷前(pre-collapse)」早期;一旦「軟骨下崩塌」減壓已無效, 須人工關節置換。股骨頭內骨髓腔壓力AVN時「會升高」。棕色瘤(brown tumor)=副甲狀腺機能亢進(PTH↑致蝕骨)之纖維囊性骨炎, 多核巨大細胞+含鐵血黃素。自發性膝骨壞死(SPONK/SONK)=老年女性、突發膝內側痛、股骨內髁壞死併關節炎。佝僂病(rickets, 兒童生長板)/骨軟化(osteomalacia, 成人)=維生素D/磷代謝異常致「礦化失敗」;生長板礦化失敗發生在「肥大區(hypertrophic zone)」非增生區;ALP升高、Looser zone(假性骨折);繼發性副甲亢致PTH升高;診斷多靠生化+影像(不一定皆靠骨切片)。","options":{"A":"類風濕為對稱多關節發炎。","B":"★正確(本題答案):自發性骨壞死併膝關節炎。","C":"感染性關節炎有發燒/感染徵。","D":"痛風有結晶/急性發作史。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"103030-57":{"quick":"錯 C:雙磷酸鹽治療「須合併鈣片及維生素D」, 非不須。","detail":{"background":"骨質疏鬆症(osteoporosis):原發第I型=停經後雌激素缺乏(小樑骨流失, 椎體/遠端橈骨骨折);第II型=老年性(皮質+小樑);次發性=內分泌失調(甲亢/庫欣/性腺低下)、類固醇、制動等。危險因子=高齡、女性停經、低BMI/體重過輕、吸菸、酗酒、family history髖部骨折、類固醇、低鈣維D;「BMI 22–24(正常)」不是危險因子(低BMI才是)。雙磷酸鹽(bisphosphonate)=與骨羥基磷灰石結合、抑制「蝕骨細胞(osteoclast)」、增加骨密度、降再骨折, 須「合併鈣與維生素D」。副甲狀腺素(teriparatide, PTH間歇)=「促骨『生成(造骨)』(anabolic)」→「不是抑制蝕骨細胞」(故115020-58 D錯誤)。","options":{"A":"正確:與羥基磷灰石結合。","B":"正確:可增骨密度。","C":"★錯誤(本題答案):應合併鈣與維生素D。","D":"正確:可預防再次骨折。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"104090-63":{"quick":"本題一律給分(送分);股骨頭AVN要點見背景(subchondral cyst為較後期、core decompression用於塌陷前、酗酒類固醇為常見非創傷因、髓內壓會升高)。","detail":{"background":"骨壞死/缺血性壞死(AVN/osteonecrosis):好發股骨頭、肱骨頭、舟狀骨、距骨、月狀骨(血供逆行/末端);「跟骨血供豐富, 最少壞死」。原因:創傷(股骨頸骨折/脫位)為常見, 非創傷性=「酗酒、類固醇」(最常見非創傷因)、SLE、潛水夫病、鐮刀貧血、Gaucher。股骨頭AVN分期(Ficat):早期X光可正常→MRI最早(雙線徵)→subchondral cyst/硬化→「新月徵(crescent sign, 軟骨下崩塌前兆)」→塌陷→關節炎。中心減壓(core decompression)用於「塌陷前(pre-collapse)」早期;一旦「軟骨下崩塌」減壓已無效, 須人工關節置換。股骨頭內骨髓腔壓力AVN時「會升高」。棕色瘤(brown tumor)=副甲狀腺機能亢進(PTH↑致蝕骨)之纖維囊性骨炎, 多核巨大細胞+含鐵血黃素。自發性膝骨壞死(SPONK/SONK)=老年女性、突發膝內側痛、股骨內髁壞死併關節炎。佝僂病(rickets, 兒童生長板)/骨軟化(osteomalacia, 成人)=維生素D/磷代謝異常致「礦化失敗」;生長板礦化失敗發生在「肥大區(hypertrophic zone)」非增生區;ALP升高、Looser zone(假性骨折);繼發性副甲亢致PTH升高;診斷多靠生化+影像(不一定皆靠骨切片)。","options":{"A":"(給分)subchondral cyst偏較後期變化。","B":"(給分)塌陷後core decompression已無效。","C":"(給分)非創傷因(酒精/類固醇)亦常見。","D":"(給分)AVN時髓內壓多升高。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"105020-74":{"quick":"D:中年男性慢性髖痛、X光股骨頭硬化/新月徵=股骨頭缺血性壞死(avascular necrosis)。","detail":{"background":"骨壞死/缺血性壞死(AVN/osteonecrosis):好發股骨頭、肱骨頭、舟狀骨、距骨、月狀骨(血供逆行/末端);「跟骨血供豐富, 最少壞死」。原因:創傷(股骨頸骨折/脫位)為常見, 非創傷性=「酗酒、類固醇」(最常見非創傷因)、SLE、潛水夫病、鐮刀貧血、Gaucher。股骨頭AVN分期(Ficat):早期X光可正常→MRI最早(雙線徵)→subchondral cyst/硬化→「新月徵(crescent sign, 軟骨下崩塌前兆)」→塌陷→關節炎。中心減壓(core decompression)用於「塌陷前(pre-collapse)」早期;一旦「軟骨下崩塌」減壓已無效, 須人工關節置換。股骨頭內骨髓腔壓力AVN時「會升高」。棕色瘤(brown tumor)=副甲狀腺機能亢進(PTH↑致蝕骨)之纖維囊性骨炎, 多核巨大細胞+含鐵血黃素。自發性膝骨壞死(SPONK/SONK)=老年女性、突發膝內側痛、股骨內髁壞死併關節炎。佝僂病(rickets, 兒童生長板)/骨軟化(osteomalacia, 成人)=維生素D/磷代謝異常致「礦化失敗」;生長板礦化失敗發生在「肥大區(hypertrophic zone)」非增生區;ALP升高、Looser zone(假性骨折);繼發性副甲亢致PTH升高;診斷多靠生化+影像(不一定皆靠骨切片)。","options":{"A":"單純軟骨下囊腫非主診斷。","B":"骨轉移為溶骨破壞。","C":"骨髓炎有感染徵。","D":"★正確(本題答案):股骨頭AVN。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"107020-63":{"quick":"錯 A、B(本題多重答案):礦化失敗在「肥大區(hypertrophic)」非增生區(A錯);骨軟化PTH常升高但「ALP一定升、PTH不一定皆升」之絕對描述亦有爭議(B給分)。","detail":{"background":"骨壞死/缺血性壞死(AVN/osteonecrosis):好發股骨頭、肱骨頭、舟狀骨、距骨、月狀骨(血供逆行/末端);「跟骨血供豐富, 最少壞死」。原因:創傷(股骨頸骨折/脫位)為常見, 非創傷性=「酗酒、類固醇」(最常見非創傷因)、SLE、潛水夫病、鐮刀貧血、Gaucher。股骨頭AVN分期(Ficat):早期X光可正常→MRI最早(雙線徵)→subchondral cyst/硬化→「新月徵(crescent sign, 軟骨下崩塌前兆)」→塌陷→關節炎。中心減壓(core decompression)用於「塌陷前(pre-collapse)」早期;一旦「軟骨下崩塌」減壓已無效, 須人工關節置換。股骨頭內骨髓腔壓力AVN時「會升高」。棕色瘤(brown tumor)=副甲狀腺機能亢進(PTH↑致蝕骨)之纖維囊性骨炎, 多核巨大細胞+含鐵血黃素。自發性膝骨壞死(SPONK/SONK)=老年女性、突發膝內側痛、股骨內髁壞死併關節炎。佝僂病(rickets, 兒童生長板)/骨軟化(osteomalacia, 成人)=維生素D/磷代謝異常致「礦化失敗」;生長板礦化失敗發生在「肥大區(hypertrophic zone)」非增生區;ALP升高、Looser zone(假性骨折);繼發性副甲亢致PTH升高;診斷多靠生化+影像(不一定皆靠骨切片)。","options":{"A":"★錯誤(給分):礦化失敗在肥大區, 非增生區。","B":"★(給分):PTH與ALP升高之絕對化敘述。","C":"正確:可見Looser轉型區(假性骨折)。","D":"診斷多靠生化影像(切片非唯一)。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"107080-61":{"quick":"不是危險因子 C:BMI 22–24(正常範圍)非骨質疏鬆危險因子(低BMI才是)。","detail":{"background":"骨質疏鬆症(osteoporosis):原發第I型=停經後雌激素缺乏(小樑骨流失, 椎體/遠端橈骨骨折);第II型=老年性(皮質+小樑);次發性=內分泌失調(甲亢/庫欣/性腺低下)、類固醇、制動等。危險因子=高齡、女性停經、低BMI/體重過輕、吸菸、酗酒、family history髖部骨折、類固醇、低鈣維D;「BMI 22–24(正常)」不是危險因子(低BMI才是)。雙磷酸鹽(bisphosphonate)=與骨羥基磷灰石結合、抑制「蝕骨細胞(osteoclast)」、增加骨密度、降再骨折, 須「合併鈣與維生素D」。副甲狀腺素(teriparatide, PTH間歇)=「促骨『生成(造骨)』(anabolic)」→「不是抑制蝕骨細胞」(故115020-58 D錯誤)。","options":{"A":"酗酒是危險因子。","B":"吸菸是危險因子。","C":"★不是(本題答案):正常BMI非危險因子。","D":"父母髖部骨折史是危險因子。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"113070-63":{"quick":"最不常見 D:跟骨(calcaneus)血供豐富, 骨壞死最少見(舟狀骨/股骨頭/肱骨頭易壞死)。","detail":{"background":"骨壞死/缺血性壞死(AVN/osteonecrosis):好發股骨頭、肱骨頭、舟狀骨、距骨、月狀骨(血供逆行/末端);「跟骨血供豐富, 最少壞死」。原因:創傷(股骨頸骨折/脫位)為常見, 非創傷性=「酗酒、類固醇」(最常見非創傷因)、SLE、潛水夫病、鐮刀貧血、Gaucher。股骨頭AVN分期(Ficat):早期X光可正常→MRI最早(雙線徵)→subchondral cyst/硬化→「新月徵(crescent sign, 軟骨下崩塌前兆)」→塌陷→關節炎。中心減壓(core decompression)用於「塌陷前(pre-collapse)」早期;一旦「軟骨下崩塌」減壓已無效, 須人工關節置換。股骨頭內骨髓腔壓力AVN時「會升高」。棕色瘤(brown tumor)=副甲狀腺機能亢進(PTH↑致蝕骨)之纖維囊性骨炎, 多核巨大細胞+含鐵血黃素。自發性膝骨壞死(SPONK/SONK)=老年女性、突發膝內側痛、股骨內髁壞死併關節炎。佝僂病(rickets, 兒童生長板)/骨軟化(osteomalacia, 成人)=維生素D/磷代謝異常致「礦化失敗」;生長板礦化失敗發生在「肥大區(hypertrophic zone)」非增生區;ALP升高、Looser zone(假性骨折);繼發性副甲亢致PTH升高;診斷多靠生化+影像(不一定皆靠骨切片)。","options":{"A":"舟狀骨易壞死(血供逆行)。","B":"股骨頭易壞死。","C":"肱骨頭易壞死。","D":"★最不常見(本題答案):跟骨血供豐富少壞死。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"115020-58":{"quick":"最不適當 D:PTH(teriparatide)主作用是「促骨生成(造骨, anabolic)」, 非「抑制蝕骨細胞」。","detail":{"background":"骨質疏鬆症(osteoporosis):原發第I型=停經後雌激素缺乏(小樑骨流失, 椎體/遠端橈骨骨折);第II型=老年性(皮質+小樑);次發性=內分泌失調(甲亢/庫欣/性腺低下)、類固醇、制動等。危險因子=高齡、女性停經、低BMI/體重過輕、吸菸、酗酒、family history髖部骨折、類固醇、低鈣維D;「BMI 22–24(正常)」不是危險因子(低BMI才是)。雙磷酸鹽(bisphosphonate)=與骨羥基磷灰石結合、抑制「蝕骨細胞(osteoclast)」、增加骨密度、降再骨折, 須「合併鈣與維生素D」。副甲狀腺素(teriparatide, PTH間歇)=「促骨『生成(造骨)』(anabolic)」→「不是抑制蝕骨細胞」(故115020-58 D錯誤)。","options":{"A":"正確:第I型原發=雌激素缺乏。","B":"正確:次發性常因荷爾蒙失調。","C":"正確:雙磷酸鹽作用於蝕骨細胞。","D":"★最不適當(本題答案):PTH為促造骨, 非抑制蝕骨。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"115020-74":{"quick":"A:49歲酗酒、髖痛、MRI T1低訊號=股骨頭缺血性壞死(AVN, 酒精為常見非創傷因)。","detail":{"background":"骨壞死/缺血性壞死(AVN/osteonecrosis):好發股骨頭、肱骨頭、舟狀骨、距骨、月狀骨(血供逆行/末端);「跟骨血供豐富, 最少壞死」。原因:創傷(股骨頸骨折/脫位)為常見, 非創傷性=「酗酒、類固醇」(最常見非創傷因)、SLE、潛水夫病、鐮刀貧血、Gaucher。股骨頭AVN分期(Ficat):早期X光可正常→MRI最早(雙線徵)→subchondral cyst/硬化→「新月徵(crescent sign, 軟骨下崩塌前兆)」→塌陷→關節炎。中心減壓(core decompression)用於「塌陷前(pre-collapse)」早期;一旦「軟骨下崩塌」減壓已無效, 須人工關節置換。股骨頭內骨髓腔壓力AVN時「會升高」。棕色瘤(brown tumor)=副甲狀腺機能亢進(PTH↑致蝕骨)之纖維囊性骨炎, 多核巨大細胞+含鐵血黃素。自發性膝骨壞死(SPONK/SONK)=老年女性、突發膝內側痛、股骨內髁壞死併關節炎。佝僂病(rickets, 兒童生長板)/骨軟化(osteomalacia, 成人)=維生素D/磷代謝異常致「礦化失敗」;生長板礦化失敗發生在「肥大區(hypertrophic zone)」非增生區;ALP升高、Looser zone(假性骨折);繼發性副甲亢致PTH升高;診斷多靠生化+影像(不一定皆靠骨切片)。","options":{"A":"★正確(本題答案):酗酒致股骨頭AVN。","B":"嚴重退化性關節炎影像不同(關節間隙窄/骨刺)。","C":"骨肉瘤有惡性骨膜反應。","D":"嗜伊紅肉芽腫為溶骨(兒童)。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"102030-13":{"quick":"C:上臂後方深割傷致垂腕(手腕手指無法伸直)=橈神經(radial nerve)損傷。","detail":{"background":"上肢神經:橈神經(radial)=伸腕伸指→傷則「垂腕(wrist drop)」(上臂後方割傷/肱骨幹骨折);正中神經(median)=前臂屈肌大部+拇指對掌, 支配橈側屈腕肌、掌長肌、屈拇長肌、旋前圓肌等(「尺側屈腕肌(FCU)由尺神經支配」, 非正中神經);尺神經(ulnar)=FCU、第3/4屈指深肌、手內在肌→傷則「爪狀手(claw hand)」。臂神經叢(brachial plexus)損傷=肩部牽拉/壓迫後整支手臂麻木無力、無單一神經分布、X光無骨折脫臼。神經卡壓(entrapment):腕隧道症候群(carpal tunnel)=橫腕韌帶下正中神經受壓→拇食中指及無名指橈半麻、夜間麻醒甩手、嚴重「大魚際/拇對掌肌萎縮」, Phalen/Tinel陽性, 屈腕(volar flexion)會「加重」非改善, 非一定手術(先夾板/類固醇)。肘隧道症候群(cubital tunnel)=肘部尺神經受壓→小指及無名指尺半麻、晚期爪手, 主要靠「神經傳導/肌電圖」非MRI。Guyon管=「尺神經」(非橈神經)受壓。腓骨頭=腓總神經;踝管(tarsal tunnel)=脛神經。手腕背側六個伸肌腔室:第1=APL+EPB(de Quervain)、第2=ECRL/ECRB、第3=EPL、第4=EDC+EIP、「第5=小指伸肌(extensor digiti minimi, EDM)」、第6=ECU。髖後側短外旋肌群=梨狀肌、上下孖肌、閉孔內肌、股方肌(「股四頭肌quadriceps」屬伸膝肌, 不屬之)。下肢理學:Trendelenburg(站「患側」時對側骨盆下垂=患側外展肌無力)、Thomas test(髖屈曲攣縮)、Apley test(半月板/研磨)、Lachman/前抽屜(ACL)、後沉/後抽屜(PCL)。","options":{"A":"肌皮神經管屈肘/前臂感覺。","B":"正中神經傷致拇對掌/猿手。","C":"★正確(本題答案):橈神經(垂腕)。","D":"尺神經傷致爪手。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"102030-23":{"quick":"不由正中神經支配的 D:尺側屈腕肌(FCU)由「尺神經」支配。","detail":{"background":"上肢神經:橈神經(radial)=伸腕伸指→傷則「垂腕(wrist drop)」(上臂後方割傷/肱骨幹骨折);正中神經(median)=前臂屈肌大部+拇指對掌, 支配橈側屈腕肌、掌長肌、屈拇長肌、旋前圓肌等(「尺側屈腕肌(FCU)由尺神經支配」, 非正中神經);尺神經(ulnar)=FCU、第3/4屈指深肌、手內在肌→傷則「爪狀手(claw hand)」。臂神經叢(brachial plexus)損傷=肩部牽拉/壓迫後整支手臂麻木無力、無單一神經分布、X光無骨折脫臼。神經卡壓(entrapment):腕隧道症候群(carpal tunnel)=橫腕韌帶下正中神經受壓→拇食中指及無名指橈半麻、夜間麻醒甩手、嚴重「大魚際/拇對掌肌萎縮」, Phalen/Tinel陽性, 屈腕(volar flexion)會「加重」非改善, 非一定手術(先夾板/類固醇)。肘隧道症候群(cubital tunnel)=肘部尺神經受壓→小指及無名指尺半麻、晚期爪手, 主要靠「神經傳導/肌電圖」非MRI。Guyon管=「尺神經」(非橈神經)受壓。腓骨頭=腓總神經;踝管(tarsal tunnel)=脛神經。手腕背側六個伸肌腔室:第1=APL+EPB(de Quervain)、第2=ECRL/ECRB、第3=EPL、第4=EDC+EIP、「第5=小指伸肌(extensor digiti minimi, EDM)」、第6=ECU。髖後側短外旋肌群=梨狀肌、上下孖肌、閉孔內肌、股方肌(「股四頭肌quadriceps」屬伸膝肌, 不屬之)。下肢理學:Trendelenburg(站「患側」時對側骨盆下垂=患側外展肌無力)、Thomas test(髖屈曲攣縮)、Apley test(半月板/研磨)、Lachman/前抽屜(ACL)、後沉/後抽屜(PCL)。","options":{"A":"橈側屈腕肌由正中神經。","B":"掌長肌由正中神經。","C":"屈拇長肌由正中神經(前骨間支)。","D":"★正確(本題答案):FCU由尺神經支配。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"105020-60":{"quick":"D:肘隧道症候群是「尺神經」受壓。","detail":{"background":"上肢神經:橈神經(radial)=伸腕伸指→傷則「垂腕(wrist drop)」(上臂後方割傷/肱骨幹骨折);正中神經(median)=前臂屈肌大部+拇指對掌, 支配橈側屈腕肌、掌長肌、屈拇長肌、旋前圓肌等(「尺側屈腕肌(FCU)由尺神經支配」, 非正中神經);尺神經(ulnar)=FCU、第3/4屈指深肌、手內在肌→傷則「爪狀手(claw hand)」。臂神經叢(brachial plexus)損傷=肩部牽拉/壓迫後整支手臂麻木無力、無單一神經分布、X光無骨折脫臼。神經卡壓(entrapment):腕隧道症候群(carpal tunnel)=橫腕韌帶下正中神經受壓→拇食中指及無名指橈半麻、夜間麻醒甩手、嚴重「大魚際/拇對掌肌萎縮」, Phalen/Tinel陽性, 屈腕(volar flexion)會「加重」非改善, 非一定手術(先夾板/類固醇)。肘隧道症候群(cubital tunnel)=肘部尺神經受壓→小指及無名指尺半麻、晚期爪手, 主要靠「神經傳導/肌電圖」非MRI。Guyon管=「尺神經」(非橈神經)受壓。腓骨頭=腓總神經;踝管(tarsal tunnel)=脛神經。手腕背側六個伸肌腔室:第1=APL+EPB(de Quervain)、第2=ECRL/ECRB、第3=EPL、第4=EDC+EIP、「第5=小指伸肌(extensor digiti minimi, EDM)」、第6=ECU。髖後側短外旋肌群=梨狀肌、上下孖肌、閉孔內肌、股方肌(「股四頭肌quadriceps」屬伸膝肌, 不屬之)。下肢理學:Trendelenburg(站「患側」時對側骨盆下垂=患側外展肌無力)、Thomas test(髖屈曲攣縮)、Apley test(半月板/研磨)、Lachman/前抽屜(ACL)、後沉/後抽屜(PCL)。","options":{"A":"正中神經為腕隧道。","B":"橈神經非肘隧道。","C 肌、上下孖肌、閉孔內肌、股方肌(「股四頭肌quadriceps」屬伸膝肌, 不屬之)。下肢理學:Trendelenburg(站「患側」時對側骨盆下垂=患側外展肌無力)、Thomas test(髖屈曲攣縮)、Apley test(半月板/研磨)、Lachman/前抽屜(ACL)、後沉/後抽屜(PCL)。","options":{"A":"正確:壓迫尺神經。","B":"正確:小指及無名指尺半麻。","C":"★最不適當(本題答案):診斷主靠NCV/EMG, 非MRI。","D":"正確:晚期爪手。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"110080-63":{"quick":"最適當 D:Apley test 用來檢查膝關節「半月板」是否破裂。","detail":{"background":"上肢神經:橈神經(radial)=伸腕伸指→傷則「垂腕(wrist drop)」(上臂後方割傷/肱骨幹骨折);正中神經(median)=前臂屈肌大部+拇指對掌, 支配橈側屈腕肌、掌長肌、屈拇長肌、旋前圓肌等(「尺側屈腕肌(FCU)由尺神經支配」, 非正中神經);尺神經(ulnar)=FCU、第3/4屈指深肌、手內在肌→傷則「爪狀手(claw hand)」。臂神經叢(brachial plexus)損傷=肩部牽拉/壓迫後整支手臂麻木無力、無單一神經分布、X光無骨折脫臼。神經卡壓(entrapment):腕隧道症候群(carpal tunnel)=橫腕韌帶下正中神經受壓→拇食中指及無名指橈半麻、夜間麻醒甩手、嚴重「大魚際/拇對掌肌萎縮」, Phalen/Tinel陽性, 屈腕(volar flexion)會「加重」非改善, 非一定手術(先夾板/類固醇)。肘隧道症候群(cubital tunnel)=肘部尺神經受壓→小指及無名指尺半麻、晚期爪手, 主要靠「神經傳導/肌電圖」非MRI。Guyon管=「尺神經」(非橈神經)受壓。腓骨頭=腓總神經;踝管(tarsal tunnel)=脛神經。手腕背側六個伸肌腔室:第1=APL+EPB(de Quervain)、第2=ECRL/ECRB、第3=EPL、第4=EDC+EIP、「第5=小指伸肌(extensor digiti minimi, EDM)」、第6=ECU。髖後側短外旋肌群=梨狀肌、上下孖肌、閉孔內肌、股方肌(「股四頭肌quadriceps」屬伸膝肌, 不屬之)。下肢理學:Trendelenburg(站「患側」時對側骨盆下垂=患側外展肌無力)、Thomas test(髖屈曲攣縮)、Apley test(半月板/研磨)、Lachman/前抽屜(ACL)、後沉/後抽屜(PCL)。","options":{"A":"錯:Trendelenburg是站「患側」時對側骨盆下垂(患側外展肌無力)。","B":"錯:Thomas test查髖屈曲攣縮, 非跟腱。","C":"錯:posterior sag/後沉徵查「後十字韌帶(PCL)」, 非ACL。","D":"★正確(本題答案):Apley test查半月板。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"111020-17":{"quick":"錯 B:Guyon管(蓋用氏隧道)壓迫的是「尺神經」, 非橈神經。","detail":{"background":"上肢神經:橈神經(radial)=伸腕伸指→傷則「垂腕(wrist drop)」(上臂後方割傷/肱骨幹骨折);正中神經(median)=前臂屈肌大部+拇指對掌, 支配橈側屈腕肌、掌長肌、屈拇長肌、旋前圓肌等(「尺側屈腕肌(FCU)由尺神經支配」, 非正中神經);尺神經(ulnar)=FCU、第3/4屈指深肌、手內在肌→傷則「爪狀手(claw hand)」。臂神經叢(brachial plexus)損傷=肩部牽拉/壓迫後整支手臂麻木無力、無單一神經分布、X光無骨折脫臼。神經卡壓(entrapment):腕隧道症候群(carpal tunnel)=橫腕韌帶下正中神經受壓→拇食中指及無名指橈半麻、夜間麻醒甩手、嚴重「大魚際/拇對掌肌萎縮」, Phalen/Tinel陽性, 屈腕(volar flexion)會「加重」非改善, 非一定手術(先夾板/類固醇)。肘隧道症候群(cubital tunnel)=肘部尺神經受壓→小指及無名指尺半麻、晚期爪手, 主要靠「神經傳導/肌電圖」非MRI。Guyon管=「尺神經」(非橈神經)受壓。腓骨頭=腓總神經;踝管(tarsal tunnel)=脛神經。手腕背側六個伸肌腔室:第1=APL+EPB(de Quervain)、第2=ECRL/ECRB、第3=EPL、第4=EDC+EIP、「第5=小指伸肌(extensor digiti minimi, EDM)」、第6=ECU。髖後側短外旋肌群=梨狀肌、上下孖肌、閉孔內肌、股方肌(「股四頭肌quadriceps」屬伸膝肌, 不屬之)。下肢理學:Trendelenburg(站「患側」時對側骨盆下垂=患側外展肌無力)、Thomas test(髖屈曲攣縮)、Apley test(半月板/研磨)、Lachman/前抽屜(ACL)、後沉/後抽屜(PCL)。","options":{"A":"正確:橫腕韌帶-正中神經(腕隧道)。","B":"★錯誤(本題答案):Guyon管為尺神經, 非橈神經。","C":"正確:腓骨頭-腓神經。","D":"正確:踝管-脛神經。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}},"114070-63":{"quick":"不是短外旋肌的 B:股四頭肌(quadriceps)是伸膝肌, 不屬髖後短外旋肌群。","detail":{"background":"上肢神經:橈神經(radial)=伸腕伸指→傷則「垂腕(wrist drop)」(上臂後方割傷/肱骨幹骨折);正中神經(median)=前臂屈肌大部+拇指對掌, 支配橈側屈腕肌、掌長肌、屈拇長肌、旋前圓肌等(「尺側屈腕肌(FCU)由尺神經支配」, 非正中神經);尺神經(ulnar)=FCU、第3/4屈指深肌、手內在肌→傷則「爪狀手(claw hand)」。臂神經叢(brachial plexus)損傷=肩部牽拉/壓迫後整支手臂麻木無力、無單一神經分布、X光無骨折脫臼。神經卡壓(entrapment):腕隧道症候群(carpal tunnel)=橫腕韌帶下正中神經受壓→拇食中指及無名指橈半麻、夜間麻醒甩手、嚴重「大魚際/拇對掌肌萎縮」, Phalen/Tinel陽性, 屈腕(volar flexion)會「加重」非改善, 非一定手術(先夾板/類固醇)。肘隧道症候群(cubital tunnel)=肘部尺神經受壓→小指及無名指尺半麻、晚期爪手, 主要靠「神經傳導/肌電圖」非MRI。Guyon管=「尺神經」(非橈神經)受壓。腓骨頭=腓總神經;踝管(tarsal tunnel)=脛神經。手腕背側六個伸肌腔室:第1=APL+EPB(de Quervain)、第2=ECRL/ECRB、第3=EPL、第4=EDC+EIP、「第5=小指伸肌(extensor digiti minimi, EDM)」、第6=ECU。髖後側短外旋肌群=梨狀肌、上下孖肌、閉孔內肌、股方肌(「股四頭肌quadriceps」屬伸膝肌, 不屬之)。下肢理學:Trendelenburg(站「患側」時對側骨盆下垂=患側外展肌無力)、Thomas test(髖屈曲攣縮)、Apley test(半月板/研磨)、Lachman/前抽屜(ACL)、後沉/後抽屜(PCL)。","options":{"A":"梨狀肌(piriformis)屬之。","B":"★正確(本題答案):股四頭肌非短外旋肌。","C":"閉孔肌(obturator)屬之。","D":"孖肌(gemellus)屬之。"},"sources":["Harrison 21e","Campbell Operative Orthopaedics 14e","AAOS OKU"]}}},TO=["骨折總論‧固定原則‧併發症", "上肢骨折與脫臼", "下肢與骨盆骨折脫臼", "運動傷害‧軟組織與過度使用", "骨腫瘤與軟組織腫瘤", "小兒骨科", "人工關節置換與骨關節感染", "代謝性骨病與骨壞死", "周邊神經卡壓‧理學檢查與解剖"],LEC={"骨折總論‧固定原則‧併發症":{"title":"骨折總論‧固定原則‧併發症","html":"\n<p><b>開放性骨折(Gustilo-Anderson):</b>Type I 傷口&lt;1cm、II 1–10cm、III &gt;10cm/高能量(IIIA 軟組織可覆蓋、IIIB 需皮瓣、<b>IIIC 合併需修補動脈損傷</b>)。處置時序:<b>到院「立即」靜脈抗生素</b>(降感染最關鍵)→破傷風→無菌敷料/夾板→<b>手術室</b>沖洗清創(不在急診探查)→骨折穩定。抗生素:I/II 用第一代頭孢(cefazolin)、<b>III 加 aminoglycoside</b>、糞便/農場污染加 penicillin。I/II 可初級縫合、III 不初級縫合。</p>\n<p><b>急性肌腔室症候群(ACS):</b>最常見原因=骨折(脛骨/前臂);<b>小腿&gt;大腿</b>易發生。<b>最早最敏感=「與理學不成比例的劇痛+被動牽張痛」</b>、感覺異常早期。脈搏消失/麻痺/蒼白屬「晚期」——<b>有脈搏不能排除</b>。確診:腔室壓&gt;30 mmHg 或 ΔP(舒張壓−腔室壓)&lt;30 → <b>立即筋膜切開</b>;懷疑時剖開石膏、肢體置心臟高度(勿高舉)。未處理→Volkmann 缺血攣縮。</p>\n<p><b>石膏/副木:</b>室溫水浸泡、用「掌面」塑形(勿指尖壓)、初期腫脹先用副木消腫後換石膏;<b>石膏下持續加劇痛=立即剖開檢視</b>。</p>\n<p><b>不癒合(nonunion):</b>肥厚性(血供好、固定不穩)→換更穩固定;萎縮性(血供差)→植骨。手術應「保留骨膜血供」,過度剝離反增不癒合。危險因子:感染、固定不穩、吸菸、糖尿病、類固醇、營養不良。</p>\n<p><b>合併傷害配對:</b>肩胛骨折-肺挫傷、腰椎骨折-腹內損傷、<b>膝脫位-膕動脈</b>、跟骨骨折-腰椎壓迫骨折。長骨/骨盆骨折後 24–72h 警覺脂肪栓塞(低血氧+神經+瘀斑)。</p>\n"},"上肢骨折與脫臼":{"title":"上肢骨折與脫臼","html":"\n<p><b>遠端橈骨骨折(上肢最常見骨折):</b>Colles(背側移位、餐叉狀、FOOSH);Smith(掌側);Barton(關節內+腕脫位);Chauffeur(橈骨莖突)。血供佳「少不癒合」、好發老年女性、常合併 DRUJ/正中神經症狀。復位目標:橈長差&lt;2–3mm、step-off&lt;2mm、背傾矯正回中立/掌傾(<b>復位後仍背傾15度不可接受</b>)。</p>\n<p><b>前臂雙骨(記憶 GR/MU):</b><b>Galeazzi</b>=遠端橈骨幹+DRUJ脫位;<b>Monteggia</b>=近端尺骨+橈骨頭脫位(注意 PIN)。肱骨幹中段骨折→傷<b>橈神經(垂腕)</b>;橈骨頸/近端骨折→傷<b>後骨間神經(PIN)</b>。</p>\n<p><b>腕/肘:</b><b>舟狀骨</b>=最常見腕骨骨折、鼻煙壺壓痛、血供逆行易不癒合/AVN、初診X光常陰性→石膏+追蹤/MRI;Gilula 弧線「3條」。橈骨頭骨折=最常見肘部骨折,單純可保守、機械阻擋/游離體則手術;<b>恐怖三聯傷</b>=肘後脫位+橈骨頭+冠突骨折。單純肘脫位復位穩定後短期固定即可(勿固定2月)。</p>\n<p><b>肩:</b>前脫位最常見(外展外旋)、合併 Bankart/Hill-Sachs、<b>年輕人復發率高常需手術</b>;後脫位少見(癲癇/電擊)、AP易漏診須腋下位、燈泡徵。近端肱骨骨折:年輕移位大→ORIF;老年嚴重粉碎→人工肩置換。鎖骨骨折「中段最常見」、多保守;遠端較少但不癒合率高。拇指:Bennett(兩片)、Rolando(粉碎)。</p>\n"},"下肢與骨盆骨折脫臼":{"title":"下肢與骨盆骨折脫臼","html":"\n<p><b>髖部骨折:</b>①囊「內」股骨頸—血供逆行,移位易 <b>AVN/不癒合</b>;年輕高能量→緊急 ORIF 救血供,<b>老年移位→人工關節置換</b>(活動度高用全髖)。②囊「外」轉子間—血供佳少 AVN,<b>復位內固定(DHS/髓內釘)</b>,reverse oblique 屬不穩定型宜髓內釘。<b>術後早期下床</b>(臥床增死亡)。</p>\n<p><b>髖脫位(急症、6h內復位):</b><b>後脫位(90%)</b>=短縮+屈曲+內收+內旋,傷坐骨神經;前脫位=外展+外旋。常合併髖臼後壁骨折(CT)。</p>\n<p><b>骨盆/髖臼:</b>多數穩定保守佳;不穩定可大出血(<b>多為靜脈/骨出血</b>,後環&gt;前環);機轉以側方壓迫(LC)最常見,垂直剪力傷上臀動脈。Judet 斜位:閉孔位看前柱+後壁、髂骨位看後柱+前壁。撕脫骨折:<b>股直肌-AIIS</b>(非ASIS=縫匠肌)、繩肌-坐骨結節、髂腰肌-小轉子。</p>\n<p><b>下肢長骨/足踝:</b>股骨幹→鎖定髓內釘;脛骨平台(Schatzker)CT判讀佳、可合併血管/腔室/ACL(Segond)。踝:外側扭傷傷 ATFL;<b>Ottawa rules</b>(內外踝後緣壓痛、第5蹠骨/舟狀骨壓痛、無法負重走4步);三相含 Mortise 位。跟骨骨折(Böhler 角&lt;20塌陷)、Lisfranc(韌帶連內側楔狀骨-第2蹠骨基底,易漏診)、距骨(易AVN)。髕骨骨折盡量保留(勿全切除)。</p>\n"},"運動傷害‧軟組織與過度使用":{"title":"運動傷害‧軟組織與過度使用","html":"\n<p><b>膝韌帶/半月板:</b><b>ACL</b>=防脛骨前移,非接觸扭轉、急性血腫(抽暗紅血)、慢性 giving way、Lachman/前抽屜陽性(伸直時後外側束「緊」)。<b>PCL</b>=儀表板撞擊(屈膝脛骨前受力)、後沉/後抽屜。<b>半月板破裂</b>=卡住(locking)、無法完全伸直、McMurray/Apley。膝脫位=高能量急症、<b>高比例膕動脈損傷</b>,搏動正常仍須 ABI/影像。unhappy triad=ACL+MCL+內側半月板。髕骨脫位危險因子:patella alta、Q角大、活動度大、膝反屈(<b>Q角小不易</b>)。</p>\n<p><b>肩:</b>旋轉肌袖 SITS(肩胛下/岡上/岡下/小圓,大圓肌不屬);<b>夾擊症候群</b>=疼痛弧、被動可過肩;<b>冰凍肩</b>=主動被動皆受限、關節囊縮小、自限性;<b>鈣化性肌腱炎</b>=肩峰下鈣化影;<b>肱二頭肌長頭斷裂</b>=Popeye。不安測試=外展90+外旋誘發前向恐懼;Kim/Jerk 查後向不穩、sulcus 查下向。</p>\n<p><b>肘/腕/指:</b>網球肘=「外」上髁(ECRB)、高爾夫球肘=「內」上髁;de Quervain(Finkelstein 陽性);扳機指=A1 滑車。槌狀指(mallet)=末節伸肌腱斷→續發鵝頸;jersey finger=FDP撕脫;boutonnière=中央束斷。</p>\n<p><b>過度使用:</b>應力骨折(脛骨最常、第2/3蹠骨、女運動員三聯症)X光早期陰性、骨掃描敏感MRI首選、<b>多保守治療</b>;ITB 摩擦症候群=跑者膝外側痛;OCD 好發膝&gt;肘&gt;踝(肩最少);彈響髖=ITB/臀大肌(外)或髂腰肌(內),股外側肌不致之。</p>\n"},"骨腫瘤與軟組織腫瘤":{"title":"骨腫瘤與軟組織腫瘤","html":"\n<p><b>良性骨腫瘤:</b><b>骨軟骨瘤</b>=最常見、軟骨帽朝遠離關節、多發遺傳性(HME,自體顯性)惡性化風險高(帽&gt;2cm/軀幹扁平骨);<b>骨樣骨瘤</b>(病巢&lt;1.5cm、夜間痛、NSAID緩解);<b>軟骨母細胞瘤</b>=長骨「骨骺」;<b>內生軟骨瘤</b>(手腳、Ollier;+血管瘤=Maffucci);<b>GCT</b>=20–40歲膝周骨骺溶骨偏心、RANK/RANKL、刮除復發率高、約1–3%肺良性轉移(非80%);ABC=液-液平面;單純骨囊腫=兒童肱骨近端;嗜伊紅肉芽腫=椎體扁平;<b>纖維發育不良</b>=磨砂玻璃/牧羊人拐杖,McCune-Albright=多骨+咖啡牛奶斑+性早熟(非血管瘤)。</p>\n<p><b>惡性原發:</b><b>骨肉瘤</b>=青少年膝周幹骺端、Codman三角/日光放射、ALP↑、診斷時可已肺轉移(最常轉移=肺)、治療<b>新輔助化療→廣泛切除→輔助化療</b>(對放療不敏感);<b>軟骨肉瘤</b>=中老年骨盆、生長慢、化放療不敏感→<b>手術為主</b>、分級需臨床+影像+病理三方;Ewing=兒童骨幹洋蔥皮t(11;22)。</p>\n<p><b>骨轉移(成人最常見骨惡性):</b>血行轉移、好發中軸骨/長骨近端(非肢體遠端);來源=乳/攝護腺/肺/腎/甲狀腺;乳/肺多溶骨、<b>攝護腺多成骨</b>;X光需破壞30–50%才顯影;<b>骨髓瘤</b>純溶骨→骨掃描常偽陰性、頭骨 punched-out、CRAB/球蛋白間隙+高鈣。</p>\n<p><b>軟組織肉瘤/切片:</b>脂肪肉瘤(後腹腔/大腿)、滑膜肉瘤(可鈣化、雙相)、橫紋肌肉瘤(兒童最常見、頭頸&gt;泌尿生殖,眼眶/非腦膜旁預後較佳)。<b>切片原則</b>:順肢體長軸縱切、沿單一腔室(勿跨腔室)、同送細菌培養、<b>未分期前勿貿然開放復位內固定</b>。</p>\n"},"小兒骨科":{"title":"小兒骨科","html":"\n<p><b>小兒髖三疾病(依年齡):</b>①<b>DDH</b>(新生兒)—Ortolani(外展復位)/Barlow(內收脫位)、Galeazzi、皮膚皺褶不對稱、超音波(&lt;6月);危險因子女嬰/臀位/家族史/斜頸。②<b>Perthes/LCPD</b>(4–8歲男)—股骨頭特發性壞死,預後不良=年齡大、壞死範圍大(年齡&lt;5歲反而較好)。③<b>SCFE</b>(肥胖青春期)—鼠蹊/膝痛外旋跛行、青蛙位X光、與內分泌相關、雙側20–40%、<b>原位螺釘固定(勿強力復位)</b>。股骨頭血供:18月內血管可穿骺板。</p>\n<p><b>斜頸/畸形:</b>肌肉性斜頸=<b>胸鎖乳突肌(SCM)</b>纖維化、合併DDH須篩、伸展運動治療。馬蹄內翻足(clubfoot)四要素=馬蹄+後足內翻+前足內收+高弓(無扁平足),Ponseti。痙攣型CP最常見=馬蹄足;CP脊柱側彎風險四肢麻痺&gt;雙下肢&gt;半身(半身最低)。先天性脛骨假關節=NF1、前外側彎曲。黏多醣症多髖外翻(髖內翻少)。</p>\n<p><b>小兒骨折:</b>Salter-Harris(II 穿幹骺端最常見如近端肱骨;III/IV/V 預後差);青枝骨折=一側皮質斷+對側塑形彎曲;肘部:髁上骨折最常見、<b>外髁骨折(Salter IV)需手術鋼針固定</b>;2歲保母肘=橈骨頭半脫位、旋後受限。骨軟骨病:Osgood-Schlatter(脛骨粗隆)、Sever(跟骨)、Köhler(舟狀骨)、Freiberg(第2蹠骨)、<b>Panner(肘肱骨小頭)</b>。成骨不全症=體染色體「顯性」第I型膠原、藍鞏膜、反覆骨折。</p>\n<p><b>脊柱側彎:</b>篩檢=Adams 前彎測試;特發性最常見;咖啡牛奶斑+椎間孔擴大→NF型;先天「未分段桿+對側半脊椎」進展最快。下肢不等長:&lt;2cm 墊高鞋、2–5cm 生長板抑制、&gt;5cm 骨延長。</p>\n"},"人工關節置換與骨關節感染":{"title":"人工關節置換與骨關節感染","html":"\n<p><b>人工關節置換:</b>TKA 必切「ACL」、保留側副韌帶;THA 後方入路須切「短外旋肌群(含上孖肌)」、後脫位風險較高。材料:股骨頭/承重面用 CoCr 或陶瓷(耐磨),<b>鈦合金太軟不適合做股骨頭關節面</b>(用於柄/骨長入面),UHMWPE 為承重墊片。<b>骨水泥(PMMA)</b>靠機械嵌合固定(非膠水)、聚合為「放熱」、液劑=monomer(避光)、併發症=骨水泥植入症候群(單體/栓塞→低血壓低血氧心跳停止)。組織膠原:透明軟骨/髓核/終板為第II型,半月板為第I型。</p>\n<p><b>骨髓炎:</b>兒童多血行性(幹骺端)、成人多鄰近擴散/外傷;<b>金黃葡萄球菌最常見</b>、鐮刀貧血→沙門氏菌、靜脈毒癮/穿刺→金葡+綠膿+G(−)。死骨(sequestrum,壞死游離骨)≠包殼骨(involucrum,外圍新生骨);X光落後臨床1–2週、MRI 最早最敏感;糖尿病足是非外傷截肢最常見原因。</p>\n<p><b>人工關節感染(PJI):</b>竇道相通、關節液白血球升高(慢性&gt;3000/μL,但單值不確診)、CRP(低毒力可不升)、培養;早期可清創保留假體(DAIR),慢性多兩階段更換,<b>非一律拔除</b>。<b>預防</b>:適當預防性抗生素(cefazolin)、切皮前60分鐘內給、術後24h內停(非72h)、不常規 vancomycin。</p>\n"},"代謝性骨病與骨壞死":{"title":"代謝性骨病與骨壞死","html":"\n<p><b>骨質疏鬆:</b>原發I型(停經雌激素缺乏、小樑骨、椎體/橈骨)、II型(老年)、次發(內分泌/類固醇)。危險因子:高齡、女性停經、<b>低BMI</b>、吸菸、酗酒、家族髖部骨折史(正常BMI 22–24「非」危險因子)。<b>雙磷酸鹽</b>=抑制蝕骨細胞、須合併鈣與維生素D、降再骨折;<b>PTH(teriparatide)=促造骨(anabolic)</b>,非抑制蝕骨。</p>\n<p><b>骨壞死/AVN:</b>好發股骨頭、肱骨頭、舟狀骨、距骨、月狀骨(血供逆行);<b>跟骨血供豐富最少壞死</b>。原因:創傷(股骨頸/脫位)、非創傷以<b>酗酒、類固醇</b>最常見,SLE/潛水/鐮刀/Gaucher。分期:X光早期可正常→MRI最早→subchondral cyst/硬化→<b>新月徵(crescent,崩塌前兆)</b>→塌陷。<b>中心減壓僅用於塌陷前</b>,崩塌後須置換;AVN 時髓內壓升高。自發性膝骨壞死(SPONK)=老年女性突發膝內側痛。</p>\n<p><b>代謝性:</b>棕色瘤(brown tumor)=副甲狀腺機能亢進(PTH↑蝕骨纖維囊性骨炎,多核巨大細胞+含鐵血黃素)。佝僂病(兒童生長板)/骨軟化(成人)=維D/磷代謝→礦化失敗(發生於肥大區)、ALP↑、繼發性副甲亢、Looser zone。</p>\n"},"周邊神經卡壓‧理學檢查與解剖":{"title":"周邊神經卡壓‧理學檢查與解剖","html":"\n<p><b>上肢神經損傷:</b>橈神經(伸腕伸指)→<b>垂腕</b>(上臂後割傷/肱骨幹骨折);正中神經→拇對掌/猿手(支配 FCR、PL、FPL、旋前圓肌等,<b>FCU 由尺神經</b>);尺神經→<b>爪狀手</b>;臂神經叢=肩部牽拉後整支手臂麻木無力、無單一分布、X光無骨折。</p>\n<p><b>神經卡壓:</b><b>腕隧道(正中神經)</b>—橈側3指半麻、夜間麻醒甩手、大魚際萎縮、屈腕加重(Phalen)、Tinel,先夾板/類固醇非一律手術。<b>肘隧道(尺神經)</b>—小指尺半麻、晚期爪手、靠 NCV/EMG(非MRI)。Guyon管=尺神經;腓骨頭=腓總神經;踝管=脛神經。手腕背側六腔室:第1=APL/EPB(de Quervain)、第3=EPL、第4=EDC/EIP、<b>第5=小指伸肌(EDM)</b>、第6=ECU。</p>\n<p><b>理學檢查:</b><b>Trendelenburg</b>=站「患側」時對側骨盆下垂(患側外展肌無力);Thomas(髖屈曲攣縮);<b>Apley</b>/McMurray(半月板);Lachman/前抽屜(ACL);後沉/後抽屜(PCL);Adams 前彎(脊柱側彎);Ortolani/Barlow(DDH);Finkelstein(de Quervain)。髖後短外旋肌群=梨狀肌+上下孖肌+閉孔內肌+股方肌(股四頭肌不屬)。</p>\n"}};
const $=s=>document.querySelector(s);

const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分：一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3>📚 '+esc(l.title)+' · 複習講義</h3>'+l.html+'</div>';}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+lecBox(t)+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
ce.addEventListener('click',e=>{if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
