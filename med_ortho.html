const Q=[{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":60,"stem":"下列有關前臂骨折包紮石膏治療時的敘述,何者正確?","options":{"A":"包紮時用拇指持續壓迫骨折處以維持復位","B":"肘部應固定呈伸直姿勢","C":"為加強固定效果,應包紮大拇指和手指,限制其活動","D":"包紮後維持手部抬高,並定期拍照X 光片追蹤"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"101030-60","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"101030-60","q_num":60,"src":"民國101年第一次","img":""},{"exam_code":"102110","roc_year":102,"exam_round":"第二次","num":57,"stem":"關於小腿的四個腔室,下列敘述何者錯誤?","options":{"A":"前腔室(anterior compartment)的肌肉包含脛前肌(tibialis anterior)、伸拇長肌(extensor hallucislongus)、伸趾長肌(extensor digitorum longus)及第三腓骨肌(peroneus tertius)","B":"淺腓骨神經(superficial peroneal nerve)位於側腔室(lateral compartment)","C":"淺後腔室(superficial posterior compartment)的肌肉包含屈趾長肌(flexor digitorum longus)、屈拇長肌(flexor hallucis longus)及脛後肌(tibialis posterior)","D":"脛後動脈(posterior tibial artery)及脛後神經(posterior tibial nerve)位於深後腔室(deep posteriorcompartment)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"102110-57","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"102110-57","q_num":57,"src":"民國102年第二次","img":""},{"exam_code":"103030","roc_year":103,"exam_round":"第一次","num":58,"stem":"關於開放性骨折(open fracture),下列敘述何者錯誤?","options":{"A":"依據Gustilo-Anderson 的分類,骨折處傷口大於10 公分,同時合併嚴重軟組織及血管損傷時,屬於第II 型開放性骨折(type II open fracture)","B":"開放性骨折(open fracture)的病人送達急診室時,應立即投予適當的抗生素治療","C":"較大傷口的開放性骨折(open fracture)應儘速至手術室中進行徹底的清洗及清創,不建議在急診室進行傷口探查(exploration of the wounds)","D":"第I 型開放性骨折(type I open fracture)的傷口通常可進行初級縫合(primary closure);第III 型開放性骨折(type III open fracture)的傷口則不應進行初級縫合(primary closure)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"103030-58","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"103030-58","q_num":58,"src":"民國103年第一次","img":""},{"exam_code":"103100","roc_year":103,"exam_round":"第二次","num":18,"stem":"下肢開放性骨折,若有需要做血管修補的時候,屬於Gustilo分類的第幾類?","options":{"A":"type I","B":"type II","C":"type III A","D":"type III C"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"103100-18","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"103100-18","q_num":18,"src":"民國103年第二次","img":""},{"exam_code":"103100","roc_year":103,"exam_round":"第二次","num":74,"stem":"41 歲男性工人在工地摔跤,X 光顯示在脛骨開放性骨折,經石膏固定後回家休息,晚上睡覺時覺得右腳越來越痛,他吃了止痛藥後,症狀稍有緩解,但仍然持續疼痛,下列醫療處置何者最正確?","options":{"A":"加重止痛藥劑量可使病情改善","B":"換第三代抗生素就可改善","C":"需要把石膏切開","D":"傷口發炎要重新換藥"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"103100-74","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"103100-74","q_num":74,"src":"民國103年第二次","img":""},{"exam_code":"104090","roc_year":104,"exam_round":"第二次","num":15,"stem":"關於脛骨開放性骨折的Gustilo classification,下列敘述何者錯誤?","options":{"A":"第I級,開放性骨折,傷口小於1公分","B":"第II級,開放性骨折,傷口大於1公分,未合併廣泛的軟組織損傷","C":"第IIIB級,開放性骨折,合併廣泛的軟組織損傷,但軟組織仍足夠覆蓋傷口","D":"第IIIC級,開放性骨折,合併廣泛的軟組織損傷及任何需要修補的動脈損傷"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"104090-15","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"104090-15","q_num":15,"src":"民國104年第二次","img":""},{"exam_code":"104090","roc_year":104,"exam_round":"第二次","num":76,"stem":"關於骨骼肌肉系統的創傷,下列敘述何者錯誤?","options":{"A":"截肢病人若出現休克現象就要立即進行接合手術(replantation)","B":"骨折固定可減少疼痛及避免進一步軟組織傷害","C":"懷疑有動脈血管損傷必須考慮安排血管攝影檢查","D":"近關節處的傷口不要嘗試從傷口注入生理食鹽水來檢查是否與關節腔相通"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"104090-76","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"104090-76","q_num":76,"src":"民國104年第二次","img":""},{"exam_code":"105100","roc_year":105,"exam_round":"第二次","num":58,"stem":"開放性骨折(open fracture)是骨科急症之一,下列敘述何者正確?","options":{"A":"根據Gustilo-Anderson分類,開放性傷口小於1公分,同時沒有嚴重的軟組織傷害者,為 type III injury","B":"所有的開放性骨折病患送至急診時,在完成初步傷口清洗後,骨科醫師應在第一時間在急診做傷口探查、清創及縫合;即便1小時內即可安排手術,也不可拖延到手術室後才行清創","C":"傷口沖洗、清創及抗生素治療是預防開放性骨折後發生感染最重要的處理原則。若傷口清創不完全,靠大量抗生素的使用可完全避免感染的發生","D":"對於type I及type II開放性骨折,在急診室時可選用第一代頭孢菌素(first-generation cephalosporins)治療;對於typeIII開放性骨折建議再加上氨基配醣體類抗生素(aminoglycosides)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"105100-58","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"105100-58","q_num":58,"src":"民國105年第二次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":75,"stem":"四肢的骨折常伴隨其它損傷,下列合併損傷有那些是正確的?1肩胛骨骨折伴隨肺部挫傷  2腰椎骨折伴隨腹內損傷  3膝關節脫臼伴隨股動脈損傷  4跟骨骨折伴隨脊椎骨折","options":{"A":"123","B":"234","C":"134","D":"124"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"106020-75","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"106020-75","q_num":75,"src":"民國106年第一次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":61,"stem":"有關急性肌腔室症候群(acute compartment syndrome)之敘述,下列何者錯誤?","options":{"A":"組織缺血(ischemia)常導致疼痛","B":"施與被動式伸展時會疼痛(pain on passive stretch)與休息時會疼痛(rest pain)對診斷之敏感性(sensitivity)及特異性(specificity)差不多","C":"神經缺血(ischemia)常導致感覺異常(paresthesia)及感覺遲鈍(hypoesthesia)","D":"如果發現周邊脈搏(peripheral pulse)還存在,幾乎可以排除其可能性"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"106080-61","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"106080-61","q_num":61,"src":"民國106年第二次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":77,"stem":"外傷患者發現左小腿有骨折且持續腫脹,下列臨床判斷何者錯誤?","options":{"A":"有可能發生腔室症候群(compartment syndrome)","B":"腔室症候群的典型症狀包括疼痛、腫脹、麻痺及感覺異常等","C":"疼痛腫脹是最早出現的症狀","D":"肢體遠端摸到脈搏時,表示腔室症候群還沒產生"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"107020-77","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"107020-77","q_num":77,"src":"民國107年第一次","img":""},{"exam_code":"108030","roc_year":108,"exam_round":"第一次","num":56,"stem":"急性肌腔室症候群(acute compartment syndrome)是骨科急症之一,若未即時進行減壓手術,將導致組織缺血及壞死。關於急性肌腔室症候群之敘述,下列何者錯誤?","options":{"A":"骨折是最常見的原因","B":"受到創傷後,大腿遠比小腿容易發生","C":"即使患側肢體的周邊脈搏搏動(peripheral pulse)及微血管回流(capillary return)正常,仍不可排除","D":"疼痛常是最早出現的症狀"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"108030-56","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"108030-56","q_num":56,"src":"民國108年第一次","img":""},{"exam_code":"108030","roc_year":108,"exam_round":"第一次","num":77,"stem":"35歲男性,騎機車上班不慎在十字路口發生車禍,醫師檢查發現他的右手橈骨開放性骨折,傷口⻑5公分,沒有壓碎也沒有軟組織流失,他的開放性骨折的等級 (Grade) 為下列何者?","options":{"A":"I","B":"II","C":"IIIA","D":"IIIB"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"108030-77","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"108030-77","q_num":77,"src":"民國108年第一次","img":""},{"exam_code":"108080","roc_year":108,"exam_round":"第二次","num":57,"stem":"一位32歲男性左股骨幹骨折(femoral shaft fracture),手術後2年半,仍時常感到左大腿疼痛,無法負重行走,其X光檢查結果如下圖。下列敘述何者錯誤?","options":{"A":"可能造成骨折不癒合(nonunion)因素包括受傷時合併嚴重軟組織傷害、感染、骨折固定不夠穩定、營養不良、吸煙、長期使用類固醇等","B":"骨折的手術治療,應盡量將骨折斷端的軟組織從骨頭上剝離(excessive soft tissue stripping from bone),以充分檢視骨折斷端並對齊固定,可減少骨折不癒合(nonunion)的發生","C":"此病例的診斷為增生性不癒合(hypertrophic nonunion),常因為骨折固定的穩定度不足而造成","D":"此病例可採用更換較大的骨髓內釘(intramedullary nail)及骨移植(bone grafting)進行治療"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"108080-57","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"108080-57","q_num":57,"src":"民國108年第二次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":59,"stem":"關於石膏(casting)及副木(splinting)固定的原則,下列敘述何者最適當?","options":{"A":"嚴重足踝扭傷使用副木固定時,應將足踝固定在蹠屈30度(30 degrees of plantar flexion),以獲得最佳固定效果","B":"某病患足踝骨折後以石膏固定,兩天後抱怨石膏固定處有疼痛情形。此時為避免骨折移位,不可立刻拆除石膏,應密切觀察患部一週,若仍持續疼痛,始可拆除石膏檢視患部","C":"治療遠端橈骨骨折(distal radial fracture)時,若擔心受傷初期軟組織腫脹過於嚴重,可先使用背側副木(dorsal slab or splint)固定,待一至二週消腫後,再換成石膏固定","D":"使用石膏固定時,應將石膏材料浸泡在攝氏60度以上的熱水中,不可使用室溫的水,以避免石膏硬化的時間過久,影響骨折復位的固定"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"110020-59","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"110020-59","q_num":59,"src":"民國110年第一次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":77,"stem":"腔室症候群須靠下列那個條件來確定診斷?","options":{"A":"腔室內壓力>30 mmHg","B":"血清肌酸酐濃度>2 mg/dL","C":"血清鉀離子濃度>6.0 mmol/L","D":"血清肌酸激酶濃度(CPK)>1000 IU/L"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"111020-77","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"111020-77","q_num":77,"src":"民國111年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":58,"stem":"有關前臂腔室症候群(compartment syndrome)之敘述,下列何者最不適當?","options":{"A":"腔室症候群引發Volkmann ischemic contracture時,患部遠端的intrinsic muscle不可能有正常的功能","B":"做被動式伸展動作時會疼痛,為腔室症候群最為敏感的身體診察(physical examination)","C":"神經缺血通常會導致感覺異常","D":"即使周邊脈搏還存在,仍無法排除其可能性"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"112020-58","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"112020-58","q_num":58,"src":"民國112年第一次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":57,"stem":"有關骨折的敘述,下列何者最不適當?","options":{"A":"骨折部位的附近有傷口,不一定是開放性骨折","B":"即使是開放性骨折,部分病人也能立即接受骨髓內釘固定手術","C":"根據Gustilo 分類,骨折部位有嚴重傷口污染,應歸類為grade II","D":"若合併大血管斷裂,先將骨折部位穩定再修補血管"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114070-57","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"114070-57","q_num":57,"src":"民國114年第二次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":76,"stem":"腔室症候群(compartment syndrome)的治療下列何者最不適當?","options":{"A":"生理食鹽水1,000~2,000 mL 單次快速輸注","B":"乳酸林格氏液每小時1,000 mL 輸注","C":"監測鉀離子濃度","D":"監測尿量"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"115020-76","topic_code":"T1","topic":"骨折總論‧固定原則‧併發症","id":"115020-76","q_num":76,"src":"民國115年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":61,"stem":"下列有關成年人的遠端橈骨骨折(Colles 氏骨折)敘述,何者正確?","options":{"A":"最常好發於40 歲以下","B":"女性的發生率比男性低","C":"很少發生骨折不癒合(non-union)","D":"遠端橈骨尺骨關節(radio-ulnar joint)不完全脫位很罕見"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"101030-61","topic_code":"T2","topic":"上肢骨折與脫臼","id":"101030-61","q_num":61,"src":"民國101年第一次","img":""},{"exam_code":"102110","roc_year":102,"exam_round":"第二次","num":59,"stem":"一位4 歲男童,從腳踏車跌落而以右手臂著地,由於右手臂的疼痛及腫脹,父母帶他來急診求診並接受X 光檢查,由影像顯示此男童發生了何種骨折?","options":{"A":"柯萊司氏骨折(Colles’ fracture)","B":"巴東氏骨折(Barton’s fracture)","C":"軌萊阿基氏骨折(Galeazzi’s fracture)","D":"蒙特基亞氏骨折(Monteggia’s fracture)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"102110-59","topic_code":"T2","topic":"上肢骨折與脫臼","id":"102110-59","q_num":59,"src":"民國102年第二次","img":""},{"exam_code":"104030","roc_year":104,"exam_round":"第一次","num":72,"stem":"一位25 歲年輕男性,車禍跌倒右肩膀著地後,右肩關節疼痛且關節運動受阻,右肩之正面(AP view)及腋下(axillary view)之X 光攝影如下圖,該病人的肩膀外傷診斷為何?","options":{"A":"humerus fracture and dislocation","B":"shoulder anterior dislocation and impaction","C":"shoulder posterior dislocation and impaction","D":"post-traumatic arthritis"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"104030-72","topic_code":"T2","topic":"上肢骨折與脫臼","id":"104030-72","q_num":72,"src":"民國104年第一次","img":""},{"exam_code":"104090","roc_year":104,"exam_round":"第二次","num":57,"stem":"22歲男性於軍中練習投擲手榴彈時,採用錯誤的過頂投擲(overhead throwing)方式,在擲出手榴彈後,感到右上臂劇烈疼痛,送醫照射X光片結果如下圖。關於此種骨折型態,最容易合併何種神經傷害?","options":{"A":"正中神經(median nerve)","B":"橈神經(radial nerve)","C":"尺神經(ulnar nerve)","D":"腋神經(axillary nerve)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"104090-57","topic_code":"T2","topic":"上肢骨折與脫臼","id":"104090-57","q_num":57,"src":"民國104年第二次","img":""},{"exam_code":"105020","roc_year":105,"exam_round":"第一次","num":57,"stem":"下列關於鎖骨中段骨折(midshaft clavicular fracture)與鎖骨遠端骨折(distal clavicular fracture)之敘述,何者錯誤?","options":{"A":"鎖骨遠端骨折(distal clavicular fracture)比鎖骨中段骨折(midshaft clavicular fracture)常見","B":"鎖骨遠端骨折(distal clavicular fracture)接受保守治療的不癒合率(nonunion rate)比鎖骨中段骨折(midshaftclavicular fracture)高","C":"大部分的鎖骨中段骨折(midshaft clavicular fracture)使用保守治療,可獲得不錯的癒合率(union rate)","D":"根據Neer’s classification,在第二型鎖骨遠端骨折(type II distal clavicular fracture)中,喙鎖韌帶(coracoclavicularligament)會從近端骨段剝離"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"105020-57","topic_code":"T2","topic":"上肢骨折與脫臼","id":"105020-57","q_num":57,"src":"民國105年第一次","img":""},{"exam_code":"105100","roc_year":105,"exam_round":"第二次","num":57,"stem":"58歲女性病患,跌倒後導致右側遠端橈骨骨折(distal radius fracture),在急診室接受閉鎖式復位(closed reduction)後,以X光檢查復位情形。下列何者不是遠端橈骨骨折復位後可接受的放射參數(radiographic parameters)?","options":{"A":"患側的橈長(radial length)和健側相比,其差異在2mm以內","B":"患側的關節內降差(intra-articular step-off)小於2mm","C":"患側的背傾(dorsal tilt)角度為15度","D":"患側的橈角(radial angle)和健側相比,其差異在5度以內"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"105100-57","topic_code":"T2","topic":"上肢骨折與脫臼","id":"105100-57","q_num":57,"src":"民國105年第二次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":57,"stem":"關於遠端肱骨骨折(distal humeral fracture)之敘述,下列何者錯誤?","options":{"A":"健康成年人的移位性遠端肱骨的關節內骨折(displaced distal humeral intra-articular fracture)採用保守治療,其功能預後(functional outcome)不佳,故目前多建議手術治療","B":"若使用後側入路(posterior approach)進行手術治療時,不需例行性地找出並保護尺神經(ulnar nerve)","C":"對於較複雜的骨折,除了使用X光檢查之外,可輔以三度空間重建的電腦斷層掃描(computerizedtomography with three-dimensional reconstruction)協助判讀骨折型態","D":"對健康情況不良的老年人而言,若對於肘關節的功能需求不高時,則不論其遠端肱骨骨折的型態為何,皆可考慮保守治療"},"answer":"B","answer_status":"多重答案","accepted_answers":["B","D"],"correction_note":"第57題答Ｂ、Ｄ給分","images":[],"_id":"106080-57","topic_code":"T2","topic":"上肢骨折與脫臼","id":"106080-57","q_num":57,"src":"民國106年第二次","img":""},{"exam_code":"108080","roc_year":108,"exam_r talus fracture","C":"navicular fracture","D":"cuboid fracture"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"104030-59","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"104030-59","q_num":59,"src":"民國104年第一次","img":""},{"exam_code":"104030","roc_year":104,"exam_round":"第一次","num":63,"stem":"下列關於關節囊內股骨頸骨折(intracapsular femoral neck fracture)之敘述,何者最正確?","options":{"A":"Garden type II 股骨頸骨折屬移位性骨折(displaced fracture)","B":"年輕人之股骨頸骨折常見於高能量性創傷(high-energy trauma)","C":"移位性股骨頸骨折之治療原則為開放性復位內固定手術(open reduction and internal fixation)","D":"缺血性壞死(osteonecrosis)是最常見之合併症"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"104030-63","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"104030-63","q_num":63,"src":"民國104年第一次","img":""},{"exam_code":"104030","roc_year":104,"exam_round":"第一次","num":76,"stem":"一位72 歲健康男性2 天前於浴室滑倒,主訴右髖部疼痛無法行走,X 光顯示股骨頸骨折(femoral neckfracture)合併移位,下列處置中,何者最為適當?","options":{"A":"石膏固定","B":"立刻復位,右下肢皮膚牽引兩周","C":"立刻復位,右下肢骨骼牽引四周","D":"行人工半髖關節置換(hemiarthroplasty)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"104030-76","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"104030-76","q_num":76,"src":"民國104年第一次","img":""},{"exam_code":"104090","roc_year":104,"exam_round":"第二次","num":58,"stem":"28歲年輕男性騎乘機車不慎摔車,右大腿腫痛變形,送至急診後,X光檢查顯示右股骨中段螺旋性骨折(femoral midshaft spiral fracture)。病患無合併其他外傷,周邊循環良好,同時沒有發生神經傷害。此時應採下列何種固定方式,可獲得最佳的治療效果?","options":{"A":"骨骼牽引固定(skeletal traction)","B":"石膏固定(casting)","C":"鎖定式骨髓內釘固定(intramedullary interlocking nail)","D":"骨外固定(external fixation)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"104090-58","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"104090-58","q_num":58,"src":"民國104年第二次","img":""},{"exam_code":"105020","roc_year":105,"exam_round":"第一次","num":58,"stem":"關於髕骨骨折(patellar fracture),下列敘述何者錯誤?","options":{"A":"大部分髕骨骨折(patellar fracture)發生的原因,是遭受到直接外力(direct forces)撞擊;間接外力(indirectforces)造成的髕骨骨折較少","B":"若骨折沒有移位,且股四頭肌的直伸機轉沒有受損(nondisplaced fractures with intact extensor mechanism ofquadriceps),可採用非手術治療","C":"若骨折有移位,應考慮採用手術治療。手術治療的方式很多,其中以全髕骨切除手術(total patellectomy)的治療效果最好","D":"髕骨骨折術後應盡早接受物理治療,以恢復膝關節之功能性活動範圍(functional range of motion)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"105020-58","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"105020-58","q_num":58,"src":"民國105年第一次","img":""},{"exam_code":"105020","roc_year":105,"exam_round":"第一次","num":63,"stem":"有關骨盆(pelvis)及骨盆骨折相關之敘述,下列何者正確?","options":{"A":"在坐姿時,上半身之重力主要由髖關節(hip joint)承受","B":"骨盆x-ray檢查中之pelvic outlet projection 對判斷半側骨盆(hemipelvis)內轉或外轉變化很有幫忙","C":"就受傷機轉及流行病學角度而言,骨盆骨折最常見的為外側壓迫性傷害(lateral compression)造成之骨折","D":"骨盆骨折,若恥骨聯合分離超過1公分,為手術治療之適應症"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"105020-63","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"105020-63","q_num":63,"src":"民國105年第一次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":58,"stem":"下列何種骨折最易造成股骨頭部壞死?","options":{"A":"股骨幹粉碎性骨折(femoral shaft comminuted fracture)","B":"股骨轉子間骨折(femoral intertrochanteric fracture)","C":"股骨轉子下骨折(femoral subtrochanteric fracture)","D":"移位性股骨頸骨折(displaced femoral neck fracture)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"106020-58","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"106020-58","q_num":58,"src":"民國106年第一次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":56,"stem":"一位45歲健康成年男性,行走時遭汽車撞擊,左膝腫痛變形,送至急診後左膝X光檢查結果如下圖。關於此種骨折之敘述,下列何者錯誤?","options":{"A":"若骨折型態較複雜,術前計畫時應作進一步的影像檢查。目前公認磁振造影(MRI)檢查比電腦斷層掃描(CT)檢查更能精準研判骨折型態","B":"可能合併副韌帶(collateral ligaments)、半月板(menisci)或十字韌帶(cruciate ligaments)的傷害","C":"可能造成急性肌腔室症候群(acute compartment syndrome),需密切觀察肌腔室壓力(compartmentpressure)及周邊循環情形是否良好","D":"創傷後關節炎(post-traumatic arthritis)是手術後的晚期併發症(late complications)之一,可能導因於手術後關節面不平整(joint incongruity)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"107020-56","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"107020-56","q_num":56,"src":"民國107年第一次","img":""},{"exam_code":"108030","roc_year":108,"exam_round":"第一次","num":59,"stem":"有關Lisfranc氏損傷(Lisfranc injury)的敘述,下列何者錯誤?","options":{"A":"屬於跗蹠關節損傷(tarso-metatarsal joint injury)","B":"Lisfranc氏韌帶位於第二楔狀骨(cuneiform)及第一蹠骨(metatarsus)之間","C":"足部前後相位(anteroposterior view)的 X光檢查,若發現第一和第二蹠骨基底部的距離增大時,須高度懷疑此種傷害","D":"足部斜相位(oblique view)的 X光檢查, 若發現第四蹠骨與骰骨(cuboid)內緣不在同一連線,須高度懷疑此種傷害"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"108030-59","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"108030-59","q_num":59,"src":"民國108年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":61,"stem":"一位30歲男性搭乘計程車前座,發生車禍後送至急診,身體檢查時左下肢呈現肢體變短,左髖關節屈曲、內收及內旋轉的外觀,最有可能之初步診斷為何?","options":{"A":"髖關節前位脫臼","B":"髖關節後位脫臼","C":"股骨頸骨折","D":"股骨轉子間骨折"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"109020-61","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"109020-61","q_num":61,"src":"民國109年第一次","img":""},{"exam_code":"109080","roc_year":109,"exam_round":"第二次","num":60,"stem":"關於踝部骨折的X光三種相位檢查,下列何者最不適當?","options":{"A":"需包含前後相位(anteroposterior view),側相位(lateral view)及 Mortise氏相位(Mortise view)","B":"Mortise氏相位最有助於判斷距骨向外側移位(talar lateral shift)","C":"前後相位最有助於判斷跟骨骨折","D":"側相位最有助於判斷後踝骨折"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"109080-60","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"109080-60","q_num":60,"src":"民國109年第二次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":57,"stem":"有關骨盆骨折(pelvic fracture)之敘述,下列何者最不適當?","options":{"A":"大部分的骨盆骨折是穩定骨折,保守治療即可得到很好的療效","B":"病人可能會伴隨有神經損傷","C":"許多病人可能發生大腿的腔室症候群(compartment syndrome)","D":"不穩定的骨盆骨折治療後,病人可能會有下背痛的後遺症"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111020-57","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"111020-57","q_num":57,"src":"民國111年第一次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":58,"stem":"關於下肢骨折分類及手術的敘述,下列何者最不適當?","options":{"A":"根據Lauge-Hansen分類法,造成腳踝骨折常見的機轉為旋後–外旋型(supination-external rotation)","B":"在Schatzker分類法中,第一型是脛骨平台(tibial plateau)向外側及向下位移的單純劈裂(pure cleavage),較常見於年輕人","C":"使用張力帶鋼絲術(tension band wiring)治療骨折時,是將骨折處的擠壓力(compressive force)轉換為牽引力或剪力(distracting or shear force)","D":"股骨頸骨折的Garden 分類法是根據位移的程度;而 Pauwels 分類法則根據骨折線(fracture line)跟水平面的交角"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111020-58","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"111020-58","q_num":58,"src":"民國111年第一次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":58,"stem":"下列關於髖臼解剖構造及損傷後相關檢查的敘述,何者最適當?","options":{"A":"髖臼是由三向放射狀軟骨(triradiate cartilage)組成,並由透明軟骨(hyaline cartilage)所覆蓋","B":"兩種骨盆斜位照(oblique views)藉由朝向或遠離患側傾斜60度拍攝,補骨盆正位前後照(AP view)的不足","C":"內斜位照(internal oblique view / obturator view)可展現後柱(posterior column)與髖臼前壁(anterior wall of the acetabulum)","D":"外斜位照(external oblique view / iliac view)可展現前柱(anterior column)及髖臼後緣(posterior lip of the acetabulum)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"111080-58","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"111080-58","q_num":58,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":59,"stem":"下列肌肉與造成骨盆及髖部撕除性骨折(avulsion fracture)的組合,何者最不適當?","options":{"A":"腹部肌肉(abdominal muscle)與髂嵴(iliac crest)","B":"股直肌(rectus femoris)與髂前上棘(anterior superior iliac spine)","C":"繩肌(hamstring muscle)與坐骨結節(ischial tuberosity)","D":"髂腰肌(iliopsoas)與股骨小轉子(lesser trochanter of the femur)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"111080-59","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"111080-59","q_num":59,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":63,"stem":"一位25歲的年輕男性因為車禍,X光檢查如圖所示,下列敘述與處置何者最適當?","options":{"A":"根據Garden氏分類,屬於stage II不完全骨折(incomplete fracture)","B":"建議施行雙極式人工半髖關節置換術(bipolar hemiarthroplasty)","C":"發生股骨頭缺血壞死以及骨折不癒合的機率很高,手術前應該先做bone scan評估","D":"X光片顯示Shenton line不連續,代表骨折移位的程度較大"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111080-63","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"111080-63","q_num":63,"src":"民國111年第二次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":73,"stem":"20歲男性病人因車禍左髖關節腫痛。圖為本次就診之左髖關節X光攝影及電腦斷層影像。最可能的診斷為何?","options":{"A":"anterior hip fracture-dislocation","B":"posterior hip fracture-dislocation","C":"heterotopic ossification following dislocation","D":"avascular necrosis of femoral head"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"112020-73","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"112020-73","q_num":73,"src":"民國112年第一次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":57,"stem":"20歲男性足球比賽中間被絆倒,足部受傷時是在內翻(inversion)及蹠屈(plantar flexion)的姿勢,急診室檢查發現足踝瘀青腫脹,下列敘述何者最不適當?","options":{"A":"可能造成外側足部韌帶的受傷,最常受傷的是anterior talofibular ligament","B":"可能造成內側三角韌帶(deltoid ligament)的撕除性骨折(avulsion fracture)","C":"可能造成雙踝骨折(bimalleolar fracture)或三踝骨折(trimalleolar fracture)","D":"可能造成脛腓骨聯合(syndesmosis)的受傷,造成關節不穩定"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"114020-57","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"114020-57","q_num":57,"src":"民國114年第一次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":73,"stem":"20 歲男性病人因打球摔傷,膝部疼痛接受電腦斷層檢查,發現脛骨近端有骨折如圖。最可能合併下列何者傷害?","options":{"A":"前十字韌帶(anterior cruciate ligament)","B":"後十字韌帶(posterior cruciate ligament)","C":"內側副韌帶(medial collateral ligament)","D":"臏韌帶(patellar ligament)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"114070-73","topic_code":"T3","topic":"下肢與骨盆骨折脫臼","id":"114070-73","q_num":73,"src":"民國114年第二次","img":""},{"exam_code":"102110","roc_year":102,"exam_round":"第二次","num":58,"stem":"65 歲的孫先生,右肩在外轉(external rotation)並外展(abduction)時疼痛不堪。他因此無法將右臂抬高到比肩高,造成搭公車時無法去抓握車頂的握桿。醫師發現他疼痛的部位大約在肩部的外上方,但是如果請他忍住疼痛,醫師可以把他的右臂被動地向前舉高到比肩還高。孫先生最有可能患了下列何症?","options":{"A":"肩胛上神經夾陷症(suprascapular nerve entrapment)","B":"冰凍肩(frozen shoulder)","C":"夾擊症候群(impingement syndrome)","D":"肱二頭肌肌腱(biceps tendon)斷裂"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"102110-58","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"102110-58","q_num":58,"src":"民國102年第二次","img":""},{"exam_code":"103030","roc_year":103,"exam_round":"第一次","num":60,"stem":"剝離性骨軟骨炎(osteochondritis dissecans)可在許多關節部位發生,下列何處最少發生此症?","options":{"A":"肘關節","B":"肩關節","C":"膝關節","D":"踝關節"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"103030-60","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"103030-60","q_num":60,"src":"民國103年第一次","img":""},{"exam_code":"103030","roc_year":103,"exam_round":"第一次","num":61,"stem":"50 歲的陳先生是位網球愛好者,他最近為了準備公司企業盃網球賽,連續2 週密集參加網球集訓。結果他發覺肘關節外側疼痛,特別是手部用力握拳、或是腕部用力向背側屈曲(wrist extension)這些動作,症狀特別嚴重。陳先生最可能傷到那條肌腱?","options":{"A":"橈側屈腕肌(flexor carpi radialis muscle)","B":"深屈指肌(flexor digitorum profundus muscle)","C":"橈側伸腕短肌(extensor carpi radialis brevis muscle)","D":"旋前圓肌(pronator teres muscle)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"103030-61","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"103030-61","q_num":61,"src":"民國103年第一次","img":""},{"exam_code":"103100","roc_year":103,"exam_round":"第二次","num":59,"stem":"原發性粘連性肩部關節囊炎(idiopathic adhesive capsulitis)亦稱為冰凍肩(frozen shoulder)。有關此症的敘述,下列何者錯誤?","options":{"A":"典型的患者是大約40~60 歲的女性","B":"較易發生於非慣用側(nondominant side)","C":"做關節造影(arthrography)檢查時,可發現腋窩處關節囊發炎脹大,充滿造影劑","D":"多數病例之症狀可以自行緩解消失,為自限性(self-limiting)疾病"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"103100-59","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"103100-59","q_num":59,"src":"民國103年第二次","img":""},{"exam_code":"104030","roc_year":104,"exam_round":"第一次","num":57,"stem":"關於應力性骨折(stress fracture),下列敘述何者錯誤?","options":{"A":"脛骨應力性骨折(tibial stress fracture)是下肢最常見的應力性骨折","B":"蹠骨應力性骨折(metatarsal stress fracture)最常發生在第一蹠骨(first metatarsal)","C":"大部分的肱骨應力性骨折(humeral stress fracture)發生在棒球投手中","D":"治療的基本原則是給予適當的休息,避免反覆性的負重,使骨骼有足夠的時間新生及修復"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"104030-57","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"104030-57","q_num":57,"src":"民國104年第一次","img":""},{"exam_code":"104030","roc_year":104,"exam_round":"第一次","num":60,"stem":"一位33 歲的張先生很喜歡慢跑,最近他每天傍晚都到家附近的小山坡路跑1~2 小時。結果他發現左膝外側、大腿骨下端隆起處,在膝關節彎曲、伸直的動作中會有尖銳的疼痛;但是膝關節全伸直和彎曲超過90 度時,卻又不感到疼痛。他改以騎自行車來運動,結果幾天下來,這個問題更糟糕。張先生最有可能發生了:","options":{"A":"外側副韌帶(lateral collateral ligament)拉傷","B":"髂脛束摩擦症候群(iliotibial band friction syndrome)","C":"股二頭肌(biceps femoris muscle)肌腱炎","D":"外側半月板(lateral meniscus)損傷"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"104030-60","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"104030-60","q_num":60,"src":"民國104年第一次","img":""},{"exam_code":"104090","roc_year":104,"exam_round":"第二次","num":59,"stem":"彈響髖(snapping hip)是因為髖關節周邊某些軟組織因纖維化或硬化,而在髖關節活動時與骨骼摩擦所致。下列這些軟組織,何者最不可能造成彈響髖?","options":{"A":"股外側肌(vastus lateralis muscle)","B":"髂脛束(iliotibial band)","C":"臀大肌(gluteus maximus muscle)","D":"髂腰肌鍵(iliopsoas tendon)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"104090-59","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"104090-59","q_num":59,"src":"民國104年第二次","img":""},{"exam_code":"105100","roc_year":105,"exam_round":"第二次","num":60,"stem":"有關膝關節內之半月板(meniscus)的特性,下列何者錯誤?","options":{"A":"它們協助承載體重,也增加了股骨脛骨間之吻合度(congruency)","B":"提供膝關節本體位覺(proprioceptive)訊息,幫助關節之運動功能","C":"通常內側半月板比起外側半月板較為彎曲,也覆蓋較大部分的脛骨平臺(tibial plateau)之面積","D":"半月板(menisus)之white-white zone血液灌注差,破裂時即使加以縫合癒合能力亦很差"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"105100-60","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"105100-60","q_num":60,"src":"民國105年第二次","img":""},{"exam_code":"105100","roc_year":105,"exam_round":"第二次","num":72,"stem":"59歲女性一個月前跌倒後出現左肩疼痛的症狀,影響睡眠,肩關節X光檢查如附圖,最可能的診斷為何?","options":{"A":"avulsion fracture of greater tuberosity","B":"calcified tendinosis","C":"bone metastasis","D":"primary osteoblastic bone tumor"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"105100-72","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"105100-72","q_num":72,"src":"民國105年第二次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":77,"stem":"一位27歲的男性,因手肘關節部位疼痛而來求診,經病史詢問及身體檢查發現,懷疑為肱骨外上髁炎(lateralepicondylitis),下列何者錯誤?","options":{"A":"肱骨外上髁是前臂、手腕、以及手指的伸肌(extensor)肌腱附著處(origin)","B":"肱骨外上髁炎又稱為高爾夫球肘(golfer's elbow)","C":"身體檢查可以發現肱骨外上髁處有壓痛","D":"病患作前臂伸展(extension)及外旋(supination)抗阻力的動作時會有疼痛"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"106020-77","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"106020-77","q_num":77,"src":"民國106年第一次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":60,"stem":"有一位選手接受馬拉松長距離訓練兩星期,發生右小腿疼痛,下列敘述何者錯誤?","options":{"A":"X光可能沒有異常發現","B":"骨骼同位素掃描(bone scan)可能有異常發現","C":"骨骼同位素掃描比磁振造影(MRI)的特異性(specificity)低","D":"骨骼同位素掃描常用來研判預後及骨折癒合"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"107020-60","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"107020-60","q_num":60,"src":"民國107年第一次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":59,"stem":"下列那一條肌肉不屬於肩關節旋轉肌袖群(rotator cuff)?","options":{"A":"肩胛下肌(subscapularis)","B":"岡下肌(infraspinatus)","C":"岡上肌(supraspinatus)","D":"大圓肌(teres major)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"107080-59","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"107080-59","q_num":59,"src":"民國107年第二次","img":""},{"exam_code":"108030","roc_year":108,"exam_round":"第一次","num":60,"stem":"有位橄欖球選手在比賽時,因膝關節受傷被送到急診室,檢查時發現膝關節腫脹變形,當回顧比賽錄影帶時,發現受傷機轉是膝部發生過度伸展(hyperextension)合併內翻機轉(varus mechanism),下列處置何者錯誤?","options":{"A":"馬上送到手術房進行手術,因為有可能膝關節脫臼(knee dislocation)","B":"馬上施行普通X光檢查(plain X-ray),因為要評估相對位置","C":"馬上評估血管,因為有高比例血管受傷(vascular injury)","D":"持續評估是否有肌腔室症候群(compartment syndrome),避免嚴重併發症"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"108030-60","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"108030-60","q_num":60,"src":"民國108年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":58,"stem":"20歲的張同學騎機車時,正面撞擊停在路邊的車子,結果右膝撞擊機車的前檔板。當天該膝關節並未明顯腫脹,急診室拍的X光片也顯示沒有骨折;雖然膝關節活動有些疼痛,但是大致上還能行走。一個月後,右膝已經幾乎不再疼痛,不過他發現走路時右膝有時會有瞬間無法支撐體重、忽然軟弱無力的感覺;尤其走下樓梯時最為困擾,他很害怕會從樓梯上滾下來。張同學最有可能發生了:","options":{"A":"前十字韌帶(anterior cruciate ligament)斷裂","B":"後十字韌帶(posterior cruciate ligament)斷裂","C":"髕骨半脫位(patellar subluxation)","D":"內側副韌帶(medial collateral ligament)斷裂"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"109020-58","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"109020-58","q_num":58,"src":"民國109年第一次","img":""},{"exam_code":"109080","roc_year":109,"exam_round":"第二次","num":57,"stem":"22歲的陳同學喜歡打籃球。一日下午,他跳起投籃時恰好被隊友撞了一下,落地時左腳單腳著地沒站穩而跌倒。他忍痛爬了起來,發現並沒有外傷;剛才摔下去時左膝內部隱約有「啪」一聲響,但是勉強還能走動。當天傍晚,他發現膝關節鼓脹起來。他立刻搭車到醫院急診處,醫師從他的膝關節內抽出了約60毫升的暗紅血液。陳同學最可能的傷況是:","options":{"A":"股四頭肌腱(quadriceps tendon)斷裂","B":"前十字韌帶(anterior cruciate ligament)斷裂","C":"髕骨韌帶(patellar tendon)斷裂","D":"髕骨前滑囊炎(prepatellar bursitis)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"109080-57","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"109080-57","q_num":57,"src":"民國109年第二次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":60,"stem":"有關肩關節的前側不穩定性之不安測試(apprehension test)的敘述,下列何者最不適當?","options":{"A":"病人可採平躺或坐姿方式進行檢查","B":"病人平躺時,檢查者宜站在病人側方","C":"病人採坐姿時,檢查者宜站在病人後方","D":"測試時,將肩關節從外展(abduction)90度及旋轉0度(neutral rotation),往內旋(internal rotation)做到最大極限"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"110020-60","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"110020-60","q_num":60,"src":"民國110年第一次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":59,"stem":"下列有關肩關節不穩定度的檢查,何者正確?","options":{"A":"Jahnke test用來檢查anterior instability","B":"apprehension test用來檢查posterior instability","C":"sulcus test用來檢查anterior instability","D":"Kim test用來檢查posterior instability"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"110080-59","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"110080-59","q_num":59,"src":"民國110年第二次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":61,"stem":"病人手腕橈骨莖凸附近疼痛,懷疑是 de Quervain 氏症, 通常可用下列何種身體診察(physical examination)來診斷?","options":{"A":"Phalen maneuver","B":"Finkelstein test","C":"Watson test","D":"Allen test"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"110080-61","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"110080-61","q_num":61,"src":"民國110年第二次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":59,"stem":"一位45歲男性與別人比賽臂力時肩膀出現劇痛,上臂肌力減弱,產生卜派的上臂形狀(Popeye appearance ofthe arm),其最可能的診斷是下列何者?","options":{"A":"肱二頭肌長頭肌腱(long head of the biceps tendon)斷裂","B":"肱二頭肌短頭肌腱(short head of the biceps tendon)斷裂","C":"肱三頭肌長頭肌腱(long head of the triceps tendon)斷裂","D":"肱三頭肌短頭肌腱(short head of the triceps tendon)斷裂"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"111020-59","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"111020-59","q_num":59,"src":"民國111年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":59,"stem":"職業籃球選手於比賽中上籃投球後跌坐在地上,被診斷出髕骨肌腱斷裂(patellar tendon rupture),下列敘述何者最不適當?","options":{"A":"通常發生的年齡小於40歲","B":"病人無法主動將膝蓋伸直","C":"膝蓋骨的位置會比正常來得更低位(patella baja)","D":"肌腱斷端修補後應該利用鐵絲將髕骨與脛骨作固定"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112020-59","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"112020-59","q_num":59,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":61,"stem":"成人扳機指(trigger finger)是那一滑車(pulley)發生狹窄性腱鞘炎(stenosing tenosynovitis)?","options":{"A":"A1","B":"C2","C":"A2","D":"C1"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"112020-61","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"112020-61","q_num":61,"src":"民國112年第一次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":59,"stem":"一位身高175公分,20歲的大學男生,拄著二根枴杖步入診間,右膝彎曲無法伸直,無法著地用力。主訴昨天打籃球時,上籃後著地,膝部疼痛卡住,無法伸直及彎曲,右膝X光片顯示無骨折。下列診斷何者最可能?","options":{"A":"內側副韌帶斷裂(medical collateral ligament tear)","B":"前十字韌帶拉傷(anterior cruciate ligament injury)","C":"半月板破裂(meniscal tear)","D":"髕骨韌帶斷裂(patellar tendon rupture)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"112080-59","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"112080-59","q_num":59,"src":"民國112年第二次","img":""},{"exam_code":"113020","roc_year":113,"exam_round":"第一次","num":60,"stem":"有關膝關節前十字韌帶(anterior cruciate ligament)之敘述,下列何者最不適當?","options":{"A":"防止脛骨前方移行(anterior tibial translation)","B":"在膝關節進行螺旋轉動復位機轉運動(screw-home mechanism)時,引導脛骨(tibia)做外旋轉(external rotation)","C":"在膝關節伸直時(extension),後外側束(posterolateral bundle)是鬆弛的","D":"根據其脛骨的嵌入點(tibial insertion),分為前內側束(anteromedial bundle)及後外側束(posterolateral bundle)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"113020-60","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"113020-60","q_num":60,"src":"民國113年第一次","img":""},{"exam_code":"113070","roc_year":113,"exam_round":"第二次","num":58,"stem":"28歲橄欖球選手在比賽中發生膝關節變形脫臼,抬上擔架後膝關節就自動復位,下列敘述與處置何者最不適當?","options":{"A":"可能會合併十字韌帶、內外側副韌帶斷裂及半月板破裂,應該要安排磁振造影檢查","B":"要注意急性血管斷裂受傷的風險","C":"觸診dorsalis pedis及posterior tibial動脈,如果搏動正常可以排除血管受損的風險","D":"可能造成unhappy triad,受傷的部位包括:前十字韌帶、內側副韌帶和內側半月板"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"113070-58","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"113070-58","q_num":58,"src":"民國113年第二次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":59,"stem":"下列何者最不容易導致髕骨脫臼(patellar dislocation)?","options":{"A":"高位髕骨(patella alta)","B":"膝反屈(genu recurvatum)","C":"較小的Q角度(Q angle)","D":"髕骨活動度過大(patellar hypermobility)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114020-59","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"114020-59","q_num":59,"src":"民國114年第一次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":59,"stem":"一位大專甲組運動員發生壓力性骨折(stress fracture),下列敘述何者最不適當?","options":{"A":"增加運動量時就會疼痛","B":"可能會發生在骨盆、股骨頸、脛骨、舟狀骨(navicular)與蹠骨(metatarsals)等部位","C":"女性運動員合併營養不良、骨質疏鬆與月經停止時,容易發生","D":"最佳的治療方式是以手術復位後骨釘固定"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"114070-59","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"114070-59","q_num":59,"src":"民國114年第二次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":34,"stem":"25 歲男性於籃球比賽時,試圖阻擋對手傳球,被籃球高速撞擊其右手食指末端,出現劇痛、遠端指間關節(DIPJ)屈曲無法主動伸直,近端指間關節(PIPJ)關節活動正常,X 光顯示無明顯骨折且無開放性傷口,經急診醫師診斷為1,建議持續配戴副木。然而病人半年後回整形外科門診追蹤,主訴手指外觀近端指間關節(PIPJ)過度伸直、遠端指間關節(DIPJ)持續屈曲,影響籃球握球與傳球動作,經醫師再評估為2,建議考慮手術治療。根據上述情境,下列何者為最適合的1及2之診斷?","options":{"A":"1mallet finger;2swan neck deformity","B":"1trigger finger;2swan neck deformity","C":"1jersey finger;2boutonnière deformity","D":"1trigger finger;2boutonnière deformity"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"115020-34","topic_code":"T4","topic":"運動傷害‧軟組織與過度使用","id":"115020-34","q_num":34,"src":"民國115年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":56,"stem":"一位9 歲女孩左膝腫痛,檢查股骨X 光片和磁振造影檢查如圖所示,血清鹼性磷酸酵素(alkalinephosphatase)增高,此時腫瘤的現象為何?","options":{"A":"進到關節腔內部","B":"包住股動脈","C":"侵犯到大腿後肌腔室","D":"很可能會引起病理性骨折"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"101030-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"101030-56","q_num":56,"src":"民國101年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":56,"stem":"一位38 歲男性主訴右膝劇烈疼痛,他約有一個月右膝疼痛病史,經國術館推拿後發現無法負重行走。求診時發現局部腫脹,明顯壓痛及合併有輾軋聲(crepitus sound)。X 光攝影在右股骨近端有一病灶如下圖。對此病患的診斷及治療,下列何者最不適當?","options":{"A":"實施骨骼牽引,以保持骨骼相對位置","B":"安排全身骨掃描(bone scan)","C":"安排磁振造影(MRI)","D":"立即進行骨折復位及內固定"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"102030-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"102030-56","q_num":56,"src":"民國102年第一次","img":""},{"exam_code":"102110","roc_year":102,"exam_round":"第二次","num":56,"stem":"有關癌症轉移到骨骼(carcinoma metastasis to bone)的敘述,下列何者最正確?","options":{"A":"癌症轉移性骨病灶常見於肢體遠端如手或腳處","B":"造成病理性骨折後,截肢(amputation)手術可增加病患存活率","C":"轉移是經由血行性(hematogenous route)來到骨骼處形成病灶","D":"骨質本身遭破壞達10%時X 光攝影可發現異常"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"102110-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"102110-56","q_num":56,"src":"民國102年第二次","img":""},{"exam_code":"103030","roc_year":103,"exam_round":"第一次","num":56,"stem":"有關內生軟骨瘤(enchondroma)之敘述,下列何者錯誤?","options":{"A":"常見於手或腳的近端指(趾)骨","B":"所謂Maffucci’s syndrome 是指多發性內生軟骨瘤造成肢體變形","C":"常造成病理性骨折","D":"侵犯長骨時,在X 光片下內含物可見到鈣化點"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"103030-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"103030-56","q_num":56,"src":"民國103年第一次","img":""},{"exam_code":"103100","roc_year":103,"exam_round":"第二次","num":56,"stem":"有關纖維性發育不良(fibrous dysplasia)之敘述,下列何者錯誤?","options":{"A":"可能為單骨性(monostotic)或多骨性( polyostotic)","B":"好發於肋骨、椎體、股骨、脛骨、肱骨McCune","C":"-Albright syndrome 是指纖維性發育不良(fibrous dysplasia)同時合併血管瘤","D":"大部分患者是屬於小病灶,因此不需要手術治療"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"103100-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"103100-56","q_num":56,"src":"民國103年第二次","img":""},{"exam_code":"103100","roc_year":103,"exam_round":"第二次","num":57,"stem":"11 歲男性病人主訴跌倒後,踝關節上方疼痛。圖為本次就診之踝關節X 光攝影。最可能的診斷為何?","options":{"A":"pathological fracture","B":"stress fracture","C":"depression fracture","D":"compression fracture"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"103100-57","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"103100-57","q_num":57,"src":"民國103年第二次","img":""},{"exam_code":"104030","roc_year":104,"exam_round":"第一次","num":56,"stem":"有關肌肉系統軟組織腫瘤的敘述,下列何者最正確?","options":{"A":"惡性橫紋肌肉瘤(rhabdomyosarcoma)通常為低惡性度的腫瘤且好發於成年人","B":"惡性脂肪肉瘤(liposarcoma)為高惡性度的腫瘤且好發於青少年","C":"滑液膜肉瘤(synovial sarcoma)可在X 光攝影中發現部分鈣化","D":"類上皮肉瘤(epithelioid sarcoma)常見於骨盆腔或大腿深部肌肉組織中"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"104030-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"104030-56","q_num":56,"src":"民國104年第一次","img":""},{"exam_code":"104090","roc_year":104,"exam_round":"第二次","num":12,"stem":"下列關於脊椎病理性骨折(pathologic fracture)的敘述,何者錯誤?","options":{"A":"多為轉移性腫瘤(metastatic tumor)造成","B":"常見的腫瘤來源為肺癌、乳癌等","C":"判斷腫瘤對於脊髓壓迫的嚴重程度時,CT比MRI更適合","D":"當病患下肢日漸無力或有大小便失禁等症狀時應考慮手術減壓"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"104090-12","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"104090-12","q_num":12,"src":"民國104年第二次","img":""},{"exam_code":"104090","roc_year":104,"exam_round":"第二次","num":56,"stem":"下列有關惡性軟組織腫瘤之敘述,何者最正確?","options":{"A":"滑液囊肉瘤(synovial sarcoma)是指從滑液囊細胞(synovium)分化而成的腫瘤,常見於關節附近","B":"透明細胞肉瘤(clear cell sarcoma)在組織學上可見到兩相形式(biphasic pattern),包括柱狀細胞及梭狀細胞","C":"惡性脂肪肉瘤(liposarcoma)好發於後腹腔、大腿、臀部","D":"在磁振攝影下呈現異形性腫塊(heterogenous mass), 可利用此特徵來分辨是良性還是惡性腫瘤"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"104090-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"104090-56","q_num":56,"src":"民國104年第二次","img":""},{"exam_code":"104090","roc_year":104,"exam_round":"第二次","num":60,"stem":"一位67歲的女性,無特別病史、發燒或營養不良狀況。主訴一個月來有持續性背痛,X光顯示在第七、十、十一胸椎壓迫性骨折,椎莖(pedicle)及椎間盤完整。血液檢驗顯示Albumin: 2.5 gm/dL ; Total protein: 10.1 gm/dL ; Ca(calcium): 11.0 mg/dL。針對血液檢驗及X光結果,最有可能的診斷為何?","options":{"A":"脊椎細菌感染(infectious spondylitis)","B":"惡性腫瘤轉移(malignant tumor metastases)","C":"多發性骨髓瘤(multiple myeloma)","D":"脊椎骨肉瘤(vertebral osteosarcoma)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"104090-60","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"104090-60","q_num":60,"src":"民國104年第二次","img":""},{"exam_code":"104090","roc_year":104,"exam_round":"第二次","num":72,"stem":"23歲男性,無特殊病史。因左膝扭傷,意外發現骨骺(epiphysis)腫瘤。附圖為X光攝影及電腦斷層影像,最可能的診斷為何:","options":{"A":"fibrous dysplasia","B":"giant cell tumor","C":"osteogenic sarcoma","D":"bone metastasis"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"104090-72","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"104090-72","q_num":72,"src":"民國104年第二次","img":""},{"exam_code":"105020","roc_year":105,"exam_round":"第一次","num":56,"stem":"有關良性骨腫瘤之敘述,下列何者錯誤?","options":{"A":"骨軟骨瘤(osteochondroma)是常見的良性骨骼腫瘤,往往不須手術切除,亦不會有惡性變化的機會","B":"骨樣骨瘤(osteoid osteoma)大多發生在青少年,手術時切除腫瘤中之病巢(nidus),即可解決疼痛","C":"動脈瘤性骨囊腫(aneurysmal bone cyst)好發於青少年,可於電腦斷層攝影下發現 fluid-fluid level 現象","D":"單純性骨囊腫(simple bone cyst)好發於肱骨及股骨近端"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"105020-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"105020-56","q_num":56,"src":"民國105年第一次","img":""},{"exam_code":"105100","roc_year":105,"exam_round":"第二次","num":17,"stem":"17歲的陳大雄左手腕背面摸到一顆突起腫瘤,媽媽帶他到整形外科門診求診時,醫師會跟他說這顆腫瘤最常見是什麼?","options":{"A":"腱鞘囊腫(ganglion cyst)","B":"巨大細胞瘤(giant cell tumor)","C":"脂肪瘤(lipoma)","D":"內生軟骨瘤(enchondroma)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"105100-17","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"105100-17","q_num":17,"src":"民國105年第二次","img":""},{"exam_code":"105100","roc_year":105,"exam_round":"第二次","num":73,"stem":"51歲女性病人主訴右髖關節疼痛約3週,附圖為骨盆X光片,箭號所指處最可能的診斷為:","options":{"A":"fibrous dysplasia","B":"bone metastasis","C":"chondrosarcoma","D":"osteosarcoma"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"105100-73","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"105100-73","q_num":73,"src":"民國105年第二次","img":""},{"exam_code":"105100","roc_year":105,"exam_round":"第二次","num":74,"stem":"20歲男性,因右膝受傷接受X光攝影。附圖為X光攝影影像,最可能的診斷為何?","options":{"A":"fibrous dysplasia","B":"hereditary multiple exostoses","C":"osteogenic sarcoma","D":"eosinophilic granuloma"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"105100-74","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"105100-74","q_num":74,"src":"民國105年第二次","img":""},{"exam_code":"106020","roc_year":106,"exam_round":"第一次","num":60,"stem":"有關骨骼巨大細胞瘤(giant cell tumor of bone)的敘述,下列何者正確?","options":{"A":"最常好發於10歲以下幼童的長骨骨幹,很少侵犯到骨骺(epiphysis)","B":"最常見的X光發現是一個成骨性(osteoblastic)之破壞性病灶,且常有明顯的骨膜反應(periosteal reaction)","C":"最常用的治療方式是廣泛切除(wide excision)手術","D":"為避免局部復發(local recurrence),往往手術中需合併輔助器材,如高速磨鑽(high-speed burr)清除腫瘤或滑水泥填充等"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"106020-60","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"106020-60","q_num":60,"src":"民國106年第一次","img":""},{"exam_code":"106080","roc_year":106,"exam_round":"第二次","num":56,"stem":"一位22歲女性抱怨左膝疼痛3個月,問診時發現夜間疼痛加劇。身體檢查發現明顯局部壓痛,觸診時發現有組織腫塊。膝部X光片如下,此病患最有可能的診斷為:","options":{"A":"單純性骨囊腫(simple bone cyst)","B":"骨肉瘤(osteosarcoma)","C":"纖維性發育不全(fibrous dysplasia)","D":"骨軟骨瘤(osteochondroma)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"106080-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"106080-56","q_num":56,"src":"民國106年第二次","img":""},{"exam_code":"107020","roc_year":107,"exam_round":"第一次","num":59,"stem":"有關良性骨病灶影像學上之發現的敘述,下列何者正確?","options":{"A":"侵犯到脊椎椎體之嗜伊紅球性肉芽腫(eosinophilic granuloma)的X光片中,常可見到椎體扁平(vertebraplana)的變形","B":"骨樣骨瘤(osteoid osteoma)在電腦斷層檢查的中心病灶,大於2公分者居多","C":"纖維性發育不良(fibrous dysplasia)常發生在肱骨(humerus)近端,X光有類似牧羊人拐杖(shepherd’scrook)的變形","D":"單純性骨囊腫(simple bone cyst)的磁振造影(MRI)檢查,幾乎都可見到流體液平面(fluid-fluid level)的影像"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"107020-59","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"107020-59","q_num":59,"src":"民國107年第一次","img":""},{"exam_code":"107080","roc_year":107,"exam_round":"第二次","num":56,"stem":"有關多發性骨髓瘤(multiple myeloma)的敘述,下列何者錯誤?","options":{"A":"病理組織下可發現惡性漿細胞(plasma cell)","B":"X光檢查在頭骨及骨盆可發現多發性鑿孔狀(punched out)骨破壞病灶","C":"可用骨骼同位素掃描(bone scan)來診斷是否為單一或多發的骨骼侵犯","D":"已有幹細胞移植成功治療病患的病例"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"107080-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"107080-56","q_num":56,"src":"民國107年第二次","img":""},{"exam_code":"108080","roc_year":108,"exam_round":"第二次","num":42,"stem":"下列何者是兒童惡性橫紋肌肉瘤(rhabdomyosarcoma)較不好發的部位?","options":{"A":"頭頸部","B":"四肢","C":"腸胃道","D":"泌尿道系統"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"108080-42","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"108080-42","q_num":42,"src":"民國108年第二次","img":""},{"exam_code":"108080","roc_year":108,"exam_round":"第二次","num":56,"stem":"有關惡性骨腫瘤的敘述,下列何者最正確?","options":{"A":"Enneking stage IIB是指高惡性度,同一腔室內的病灶(intra-compartmental lesion)","B":"目前惡性骨肉瘤(osteosarcoma)的標準治療,是先切除腫瘤,再輔以術後放射治療,以避免局部復發","C":"惡性軟骨瘤(chondrosarcoma)的治療主要是手術切除病灶","D":"肢體保留手術與截肢手術相比,局部腫瘤復發率較高,同時接受肢體保留手術患者存活率較低"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"108080-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"108080-56","q_num":56,"src":"民國108年第二次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":56,"stem":"有關骨生成(bone-forming)腫瘤之敘述,下列何者最正確?","options":{"A":"診斷骨肉瘤(osteosarcoma)時,有部分病患同時會被診斷出肺轉移","B":"骨軟骨瘤(osteochondroma)因有惡性變化的可能,故均須接受手術切除","C":"骨母細胞瘤(osteoblastoma)引起的疼痛可藉藥物緩解,因此不須手術","D":"骨樣骨瘤(osteoid osteoma)好發於關節及長骨骨骺(epiphysis)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"109020-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"109020-56","q_num":56,"src":"民國109年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":72,"stem":"58歲女性已切除子宮及卵巢,另患有骨盆腔惡性肉瘤,並接受手術及放射治療,主訴最近下背痛,X光及核醫骨掃描如附圖,最可能的診斷為何?","options":{"A":"bone metastasis","B":"insufficiency fracture","C":"local tumor recurrence","D":"degenerative spine disease"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"109020-72","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"109020-72","q_num":72,"src":"民國109年第一次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":74,"stem":"13歲男國中生最近覺得右腳膝蓋附近偶爾隱隱作痛,且疼痛的時間越來越長,晚上睡覺時症狀也很明顯,附圖為下肢X光攝影,最可能的診斷為何?","options":{"A":"fibrous dysplasia","B":"aneurysmal bone cyst","C":"osteogenic sarcoma","D":"eosinophilic granuloma"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"109020-74","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"109020-74","q_num":74,"src":"民國109年第一次","img":""},{"exam_code":"109080","roc_year":109,"exam_round":"第二次","num":59,"stem":"有關單一性骨軟骨瘤(solitary osteochondroma)及多發性遺傳性外生骨贅(multiple hereditary exostoses)的敘述,下列何者最正確?","options":{"A":"多發性遺傳性外生骨贅具有自體隱性遺傳的特性,且外顯率(penetrance)很低","B":"莖狀(stalk type)型態的單一性骨軟骨瘤,突出的軟骨帽(cartilage cap)朝向其相鄰近關節方向生長","C":"當發生於骨盆或肩胛骨等軀幹部位的扁平骨時,惡性化轉型(malignant transformation)的機會較高","D":"應該在骨骼生長發育成熟前,執行腫瘤切除手術,防止日後發生壓迫神經或肢體變形等現象"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"109080-59","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"109080-59","q_num":59,"src":"民國109年第二次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":57,"stem":"有關軟骨肉瘤(chondrosarcoma)的敘述,下列何者最正確?","options":{"A":"好發在10~20歲的青少年","B":"原發性軟骨肉瘤(primary chondrosarcoma)生長速度較慢,X光檢查常可見到Codman 氏三角骨膜反應(Codman triangle periosteal reaction)","C":"正確惡性度分級常需要綜合臨床症狀、放射線學及組織病理學等三方證據","D":"原發性軟骨肉瘤(primary chondrosarcoma)的治療流程為:術前放射治療(radiotherapy)及廣泛性腫瘤切除"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"110020-57","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"110020-57","q_num":57,"src":"民國110年第一次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":74,"stem":"23歲男性無特殊病史,近二個月來,他覺得舉重物時右髖部附近會痛,附圖為X光攝影,最可能的診斷為何?","options":{"A":"fibrous dysplasia","B":"chondroblastoma","C":"osteogenic sarcoma","D":"eosinophilic granuloma"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"110020-74","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"110020-74","q_num":74,"src":"民國110年第一次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":56,"stem":"下列關於骨肉瘤(osteosarcoma)的敘述,何者最不適當?","options":{"A":"經大量放射線暴露(radiation exposure)之後,有可能出現放射線誘發的骨肉瘤(radiation-inducedosteosarcoma)","B":"骨膜骨肉瘤(periosteal osteosarcoma)在影像檢查常會看到 stuck-on appearance","C":"動脈瘤性骨囊腫(aneurysmal bone cyst)影像呈現上易與微血管擴張性骨肉瘤(telangiectatic osteosarcoma)混淆診斷","D":"骨旁骨肉瘤(parosteal osteosarcoma)為低度惡性,最適當的治療方法是手術切除"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"110080-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"110080-56","q_num":56,"src":"民國110年第二次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":56,"stem":"下列關於軟組織腫瘤(soft tissue tumor)的敘述,何者最不適當?","options":{"A":"腹腔外硬纖維瘤(extraabdominal desmoid tumors),又稱侵襲性纖維瘤病(aggressive fibromatosis)","B":"多發性神經纖維瘤(neurofibromatosis),又稱von Recklinghausen disease","C":"滑膜肉瘤(synovial sarcoma)是第二常見的軟組織肉瘤(soft-tissue sarcoma)","D":"惡性周圍神經鞘瘤(malignant peripheral nerve sheath tumor)源自多病灶的第1型多發性神經纖維瘤(neurofibromatosis type 1),比源自良性的單獨神經纖維瘤(solitary neurofibroma)來得多"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111020-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"111020-56","q_num":56,"src":"民國111年第一次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":56,"stem":"下列關於惡性軟骨肉瘤(chondrosarcoma)的敘述,何者最適當?","options":{"A":"惡性軟骨肉瘤常見於骨盆,10~20 歲的青少年","B":"惡性軟骨肉瘤的mesenchymal chondrosarcoma,常見於epiphysis of the proximal femur","C":"惡性軟骨肉瘤對化療及放療敏感,手術切除為次要治療方法","D":"骨軟骨瘤(osteochondroma)的cartilage cap 若追蹤時發現厚度>2cm,需注意評估secondary chondrosarcoma"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"111080-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"111080-56","q_num":56,"src":"民國111年第二次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":56,"stem":"下列關於良性骨腫瘤的敘述,何者最適當?","options":{"A":"軟骨母細胞瘤(chondroblastoma)為最常見的良性骨腫瘤","B":"multiple enchondromatosis又稱為 Maffucci syndrome","C":"chondromyxoid fibroma常見於脛骨近端骨骺(epiphysis)","D":"multiple exostosis可能是自體顯性遺傳疾病"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112020-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"112020-56","q_num":56,"src":"民國112年第一次","img":""},{"exam_code":"113020","roc_year":113,"exam_round":"第一次","num":56,"stem":"有關骨腫瘤的敘述,下列何者最適當?","options":{"A":"Ollier disease 是指多發性內生軟骨瘤(multiple enchondromas)合併血管瘤(hemangiomas)","B":"軟骨母細胞瘤(chondroblastoma)好發於青少年的長骨骨骺(epiphysis)","C":"骨巨大細胞瘤(giant cell tumor of the bone)復發率極低,手術採用病灶內刮除","D":"單純性骨囊腫(simple bone cyst)好發於成年人的肱骨遠端"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"113020-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"113020-56","q_num":56,"src":"民國113年第一次","img":""},{"exam_code":"113020","roc_year":113,"exam_round":"第一次","num":74,"stem":"14 歲女性病人主訴右肩痠痛約半年,肩部X 光片如圖,最可能的診斷為何?","options":{"A":"bone metastasis","B":"lymphoma","C":"osteogenic sarcoma","D":"chondrosarcoma"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"113020-74","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"113020-74","q_num":74,"src":"民國113年第一次","img":""},{"exam_code":"113070","roc_year":113,"exam_round":"第二次","num":47,"stem":"橫紋肌肉瘤(rhabdomyosarcoma)為一源自間葉組織(mesenchymal tissues)之原始軟組織瘤,有關橫紋肌肉瘤,下列敘述何者錯誤?","options":{"A":"可能發生於任何位置,最常見於頭頸部,其次為四肢和軀幹","B":"確定診斷需在磁振造影或電腦斷層及骨髓穿刺檢查後,藉由切開性或切除性病理切片證實","C":"以手術完全切除腫瘤為主要治療方法,若無法完全切除,可先進行化學治療或放射線治療","D":"預後與腫瘤原發部位有關,原發於眼眶及非腦膜旁之頭頸部者,預後較差"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"113070-47","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"113070-47","q_num":47,"src":"民國113年第二次","img":""},{"exam_code":"113070","roc_year":113,"exam_round":"第二次","num":56,"stem":"下列關於轉移性骨癌(bone metastasis)的敘述,何者最適當?","options":{"A":"常見來自大腸或子宮頸癌","B":"最常侵犯骨盆","C":"乳癌常產生蝕骨性病灶(osteolytic lesions)","D":"攝護腺癌常產生成骨性轉移病灶(osteoblastic lesions)"},"answer":"D","answer_status":"多重答案","accepted_answers":["C","D"],"correction_note":"第56題答Ｃ或Ｄ或CD者均給分","images":[],"_id":"113070-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"113070-56","q_num":56,"src":"民國113年第二次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":56,"stem":"下列關於良性骨腫瘤的敘述,何者最不適當?","options":{"A":"單純性骨囊腫(simple bone cyst)的病灶大約半數發生在肱骨近端,X光影像可見 \"fallenleaf\" sign","B":"骨巨大細胞瘤(giant cell tumor of the bone)與調控破骨細胞形成(osteoclastogenesis)的RANK / RANKL系統失衡有關","C":"復發的骨巨大細胞瘤(giant cell tumor of the bone)有80%的機率會轉移到肺部","D":"許多腫瘤的病理組織裡會出現巨大細胞(giant cells)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114020-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"114020-56","q_num":56,"src":"民國114年第一次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":73,"stem":"附圖是一位13歲女性脛骨骨肉瘤(osteosarcoma)的膝部X光影像,箭頭所指的影像表現是下列何者?","options":{"A":"遊動體(loose body)","B":"軟組織鈣化(soft tissue calcification)","C":"骨膜反應(periosteal reaction)","D":"骨折(fracture)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114020-73","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"114020-73","q_num":73,"src":"民國114年第一次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":56,"stem":"下列關於偽腫瘤(pseudotumorous conditions)的敘述,何者最不適當?","options":{"A":"棕色腫瘤(brown tumor)是常見的代謝疾病,因副甲狀腺激素(parathyroid hormone)增加導致類似骨腫瘤的形成","B":"Gaucher 氏病(Gaucher disease)是一種罕見的家族性疾病,由於glucocerebroside 的累積導致肝臟、脾臟和骨髓組織增大","C":"骨壞死(bone infarct)常見於長骨的骨幹(diaphysis)","D":"膝關節是色素性絨毛結節性滑膜炎(pigmented villonodular synovitis)最常見的侵犯部位"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"114070-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"114070-56","q_num":56,"src":"民國114年第二次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":56,"stem":"有關骨骼肌肉系統腫瘤活體組織切片(biopsy)的敘述,下列何者最適當?","options":{"A":"在四肢部位應採用與肢體長軸線呈橫向(transverse)切開傷口","B":"臨床症狀及影像學檢查皆已臆斷為骨骼肌肉系統腫瘤的個案時,仍需同時執行切片部位的細菌培養","C":"執行核心(core)或細針(fine-needle)活體組織切片時,應儘可能經由兩個腔室間的筋膜平面(fascialplane)穿刺進入","D":"對於一位病史不明,但高度懷疑為病理性肱骨骨折的患者,仍應緊急執行開放性手術復位和髓內釘固定及活體組織切片手術,術後再進行全身腫瘤探查(survey)與分級(staging)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"115020-56","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"115020-56","q_num":56,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":57,"stem":"有關骨肉瘤(osteosarcoma)的敘述,下列何者最不適當?","options":{"A":"原發性傳統骨肉瘤(conventional osteosarcoma)的治療包括:術前新輔助(neoadjuvant)化學治療、廣泛性腫瘤切除及術後輔助(adjuvant)化學治療","B":"依世界衛生組織(WHO)對各種次分類的預後比較,以次發性骨肉瘤最差,其次是原發性傳統骨肉瘤(conventional osteosarcoma),而骨膜外(parosteal)骨肉瘤較佳","C":"原發性傳統骨肉瘤(conventional osteosarcoma)患者的病理切片中,依接受術前化學治療後的腫瘤細胞壞死百分率,可以約略推測此患者的預後","D":"Ollier 氏症及Maffucci 氏症候群的患者,最常發生惡性化轉型(malignant transformation)成為次發性骨肉瘤"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"115020-57","topic_code":"T5","topic":"骨腫瘤與軟組織腫瘤","id":"115020-57","q_num":57,"src":"民國115年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":13,"stem":"下列何條肌肉纖維化是導致嬰孩肌肉性斜頸(muscular torticollis)的主因?","options":{"A":"斜方肌","B":"胸鎖乳突肌","C":"肩胛舌骨肌","D":"二腹肌"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"101030-13","topic_code":"T6","topic":"小兒骨科","id":"101030-13","q_num":13,"src":"民國101年第一次","img":""},{"exam_code":"101030","roc_year":101,"exam_round":"第一次","num":62,"stem":"痙攣型腦性麻痺病童最常需要手術矯正的足踝變形是:","options":{"A":"馬蹄足(equinus deformity)","B":"高弓足(cavus deformity)","C":"扁平外翻足(planovalgus deformity)","D":"大腳指外翻足(hallux valgus)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"101030-62","topic_code":"T6","topic":"小兒骨科","id":"101030-62","q_num":62,"src":"民國101年第一次","img":""},{"exam_code":"102030","roc_year":102,"exam_round":"第一次","num":59,"stem":"11 歲的林小弟是學校田徑校隊裡的運動健將。最近他發現左膝前下側的小腿上端,髕骨下緣下方約4 公分處紅腫了起來,看起來像是隆起的小丘;按壓時硬硬的,很痛。運動時在跑步或跳躍當中特別痛,不過休息一下就好了。但是這幾天
