節的身體診察,下列敘述何者最適當?","options":{"A":"Trendelenburg sign陽性時,是指病人用健側站立時會產生的徵象","B":"Thomas test是用來檢查Achilles tendon是否斷裂","C":"posterior sagging sign是用來檢查前十字韌帶是否斷裂","D":"Apley test是用來檢查膝關節半月狀軟骨是否破裂"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"110080-63","topic_code":"T10","topic":"周邊神經卡壓‧理學檢查與解剖","id":"110080-63","q_num":63,"src":"民國110年第二次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":17,"stem":"下列受壓性神經病變(entrapment neuropathy)與相關神經之組合,何者錯誤?","options":{"A":"橫腕韌帶(transverse carpal ligament)-正中神經(median nerve)","B":"蓋用氏隧道(Guyon's canal)-橈神經(radial nerve)","C":"腓骨頭(fibular head)-腓神經(peroneal nerve)","D":"踝管(tarsal tunnel)-脛神經(tibial nerve)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"111020-17","topic_code":"T10","topic":"周邊神經卡壓‧理學檢查與解剖","id":"111020-17","q_num":17,"src":"民國111年第一次","img":""},{"exam_code":"114070","roc_year":114,"exam_round":"第二次","num":63,"stem":"下列何者不是髖關節後側的短外旋肌群(short external rotators)?","options":{"A":"piriformis","B":"quadriceps","C":"obturator","D":"gemellus"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"114070-63","topic_code":"T10","topic":"周邊神經卡壓‧理學檢查與解剖","id":"114070-63","q_num":63,"src":"民國114年第二次","img":""}],E={"101030-60":{"quick":"正確 D:石膏後抬高患肢消腫、定期X光追蹤;掌面塑形勿用指尖壓迫、勿綁死手指。","detail":{"background":"石膏/副木固定原則:用「室溫水」浸泡(熱水加速放熱反應、可能燙傷且硬化過快);塑形時用「掌面(palm)而非指尖」以免局部壓迫產生壓瘡;固定須跨越骨折上下關節;抬高患肢消腫、定期 X 光追蹤復位。急性骨折初期軟組織會腫脹,故常先用「不環繞一圈的副木(splint/slab)」固定,待1–2週消腫再換環形石膏,避免石膏壓迫致腔室症候群。石膏下「持續、加劇、與骨折不成比例的疼痛」=腔室症候群或壓瘡警訊,應「立即剖開石膏」檢視——絕不可僅加止痛藥或觀察。","options":{"A":"錯:塑形應用「手掌」均勻施力,持續用拇指尖壓會造成局部壓瘡。","B":"錯:前臂骨折肘部多固定於「屈曲90度」(中立旋轉),非伸直。","C":"錯:應保留手指與拇指自由活動以免僵硬;不應一併綁死。","D":"★正確(本題答案):抬高消腫並定期X光追蹤復位。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"102110-57":{"quick":"錯 C:屈趾長肌/屈拇長肌/脛後肌屬「深」後腔室,非淺後腔室(淺後=腓腸肌、比目魚肌、蹠肌)。","detail":{"background":"小腿四腔室:前腔室(脛前肌、伸拇長肌、伸趾長肌、第三腓骨肌+深腓神經+脛前動脈)、側腔室(腓骨長短肌+淺腓神經)、淺後腔室(腓腸肌、比目魚肌、蹠肌)、深後腔室(屈趾長肌、屈拇長肌、脛後肌+脛後動脈/神經)。急性肌腔室症候群(acute compartment syndrome, ACS):封閉筋膜腔內壓上升→灌流壓下降→組織缺血→壞死/Volkmann 攣縮,為骨科急症,須「筋膜切開術(fasciotomy)」減壓。最常見原因=骨折(尤其脛骨幹、前臂),其次擠壓傷、再灌流、緊束石膏、燒傷。小腿4腔室(前/側/淺後/深後)、前臂3腔室。臨床診斷靠「6P」,但早期最敏感、最重要的是「與理學不成比例的劇痛(pain out of proportion)」與「被動牽張痛(pain on passive stretch)」;paresthesia(感覺異常)為早期神經缺血徵象。脈搏消失(pulselessness)、麻痺(paralysis)、蒼白(pallor)為「晚期」徵象——「周邊脈搏存在『不能』排除腔室症候群」(動脈壓遠高於腔室壓)。客觀確診:腔室內壓>30 mmHg,或 ΔP(舒張壓−腔室壓)<30 mmHg→需筋膜切開。懷疑時處置:移除/剖開石膏與敷料、肢體置「心臟高度」(不可高舉以免進一步降灌流)、矯正低血壓、監測。確診則「立即」筋膜切開,不可等待。小腿比大腿易發生(大腿腔室大、肌肉可緩衝)。Volkmann 缺血性攣縮=前臂腔室症候群未處理的後遺症,屈肌壞死纖維化致爪狀手。","options":{"A":"正確:前腔室肌肉與第三腓骨肌組成正確。","B":"正確:淺腓神經行於側腔室。","C":"★錯誤(本題答案):FDL/FHL/脛後肌屬「深」後腔室,非淺後腔室。","D":"正確:脛後動脈/神經位於深後腔室。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"103030-58":{"quick":"錯 A:Type II 為傷口1–10 cm 中度軟組織傷害;「>10 cm+嚴重軟組織及血管損傷」屬 Type III。","detail":{"background":"開放性骨折(open/compound fracture)=骨折處與外界相通,為骨科急症,核心併發症是「感染與骨髓炎」。Gustilo-Anderson 分類(依傷口大小、軟組織損傷、污染、血管狀態):Type I=傷口<1 cm、乾淨、低能量;Type II=傷口1–10 cm、中度軟組織損傷、無廣泛剝離;Type III=傷口>10 cm 或高能量/嚴重污染/節段骨折,再細分 IIIA(軟組織仍足以覆蓋骨頭)、IIIB(廣泛軟組織缺損、骨外露、需皮瓣覆蓋)、IIIC(合併「需修補的動脈損傷」,不論傷口大小)。處置黃金原則(時序):①到院「立即」靜脈抗生素(降感染率最關鍵的單一介入)②破傷風預防③傷口無菌敷料、夾板固定、移除明顯異物(但傷口探查與徹底清創應在「手術室」非急診)④儘速(現代主張盡量於可行時間內,傳統6–8 小時)手術沖洗清創 irrigation & debridement⑤骨折穩定(IM nail/外固定)。抗生素選擇:Type I/II 用第一代頭孢菌素(cefazolin,涵蓋 G(+));Type III 加 aminoglycoside(涵蓋 G(−));農場/糞便污染加 penicillin(涵蓋 Clostridium 厭氧)。Type I/II 傷口在徹底清創後常可初級縫合;Type III 傷口「不」初級縫合,延遲關閉或皮瓣。抗生素無法取代清創——清創不足靠抗生素無法避免感染。","options":{"A":"★錯誤(本題答案):此描述屬Type III(>10cm/血管損傷),非Type II。","B":"正確:到院應立即給抗生素。","C":"正確:徹底清洗清創應在手術室進行,不在急診探查。","D":"正確:Type I 可初級縫合,Type III 不宜初級縫合。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"103100-18":{"quick":"需修補動脈損傷=Gustilo Type IIIC(本題答案 D)。","detail":{"background":"開放性骨折(open/compound fracture)=骨折處與外界相通,為骨科急症,核心併發症是「感染與骨髓炎」。Gustilo-Anderson 分類(依傷口大小、軟組織損傷、污染、血管狀態):Type I=傷口<1 cm、乾淨、低能量;Type II=傷口1–10 cm、中度軟組織損傷、無廣泛剝離;Type III=傷口>10 cm 或高能量/嚴重污染/節段骨折,再細分 IIIA(軟組織仍足以覆蓋骨頭)、IIIB(廣泛軟組織缺損、骨外露、需皮瓣覆蓋)、IIIC(合併「需修補的動脈損傷」,不論傷口大小)。處置黃金原則(時序):①到院「立即」靜脈抗生素(降感染率最關鍵的單一介入)②破傷風預防③傷口無菌敷料、夾板固定、移除明顯異物(但傷口探查與徹底清創應在「手術室」非急診)④儘速(現代主張盡量於可行時間內,傳統6–8 小時)手術沖洗清創 irrigation & debridement⑤骨折穩定(IM nail/外固定)。抗生素選擇:Type I/II 用第一代頭孢菌素(cefazolin,涵蓋 G(+));Type III 加 aminoglycoside(涵蓋 G(−));農場/糞便污染加 penicillin(涵蓋 Clostridium 厭氧)。Type I/II 傷口在徹底清創後常可初級縫合;Type III 傷口「不」初級縫合,延遲關閉或皮瓣。抗生素無法取代清創——清創不足靠抗生素無法避免感染。","options":{"A":"type I:傷口<1cm。","B":"type II:1–10cm。","C":"type IIIA:嚴重軟組織但可覆蓋。","D":"★正確(本題答案):type IIIC=合併需修補的動脈損傷。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"103100-74":{"quick":"正確 C:脛骨開放性骨折+石膏後「持續加劇疼痛」=腔室症候群,須立即「剖開石膏」減壓。","detail":{"background":"急性肌腔室症候群(acute compartment syndrome, ACS):封閉筋膜腔內壓上升→灌流壓下降→組織缺血→壞死/Volkmann 攣縮,為骨科急症,須「筋膜切開術(fasciotomy)」減壓。最常見原因=骨折(尤其脛骨幹、前臂),其次擠壓傷、再灌流、緊束石膏、燒傷。小腿4腔室(前/側/淺後/深後)、前臂3腔室。臨床診斷靠「6P」,但早期最敏感、最重要的是「與理學不成比例的劇痛(pain out of proportion)」與「被動牽張痛(pain on passive stretch)」;paresthesia(感覺異常)為早期神經缺血徵象。脈搏消失(pulselessness)、麻痺(paralysis)、蒼白(pallor)為「晚期」徵象——「周邊脈搏存在『不能』排除腔室症候群」(動脈壓遠高於腔室壓)。客觀確診:腔室內壓>30 mmHg,或 ΔP(舒張壓−腔室壓)<30 mmHg→需筋膜切開。懷疑時處置:移除/剖開石膏與敷料、肢體置「心臟高度」(不可高舉以免進一步降灌流)、矯正低血壓、監測。確診則「立即」筋膜切開,不可等待。小腿比大腿易發生(大腿腔室大、肌肉可緩衝)。Volkmann 缺血性攣縮=前臂腔室症候群未處理的後遺症,屈肌壞死纖維化致爪狀手。","options":{"A":"錯:加重止痛藥會掩蓋病情、延誤診斷。","B":"錯:換抗生素不治腔室症候群。","C":"★正確(本題答案):剖開石膏解除壓迫(必要時筋膜切開)。","D":"錯:此非單純傷口發炎,是腔室高壓缺血。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"104090-15":{"quick":"錯 C:IIIB 為軟組織缺損「無法覆蓋骨頭、需皮瓣」;「軟組織仍足以覆蓋」是 IIIA。","detail":{"background":"開放性骨折(open/compound fracture)=骨折處與外界相通,為骨科急症,核心併發症是「感染與骨髓炎」。Gustilo-Anderson 分類(依傷口大小、軟組織損傷、污染、血管狀態):Type I=傷口<1 cm、乾淨、低能量;Type II=傷口1–10 cm、中度軟組織損傷、無廣泛剝離;Type III=傷口>10 cm 或高能量/嚴重污染/節段骨折,再細分 IIIA(軟組織仍足以覆蓋骨頭)、IIIB(廣泛軟組織缺損、骨外露、需皮瓣覆蓋)、IIIC(合併「需修補的動脈損傷」,不論傷口大小)。處置黃金原則(時序):①到院「立即」靜脈抗生素(降感染率最關鍵的單一介入)②破傷風預防③傷口無菌敷料、夾板固定、移除明顯異物(但傷口探查與徹底清創應在「手術室」非急診)④儘速(現代主張盡量於可行時間內,傳統6–8 小時)手術沖洗清創 irrigation & debridement⑤骨折穩定(IM nail/外固定)。抗生素選擇:Type I/II 用第一代頭孢菌素(cefazolin,涵蓋 G(+));Type III 加 aminoglycoside(涵蓋 G(−));農場/糞便污染加 penicillin(涵蓋 Clostridium 厭氧)。Type I/II 傷口在徹底清創後常可初級縫合;Type III 傷口「不」初級縫合,延遲關閉或皮瓣。抗生素無法取代清創——清創不足靠抗生素無法避免感染。","options":{"A":"正確:I級傷口<1cm。","B":"正確:II級1–10cm 無廣泛軟組織傷害。","C":"★錯誤(本題答案):IIIB是骨外露需皮瓣覆蓋,非「仍足夠覆蓋」。","D":"正確:IIIC=合併需修補的動脈損傷。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"104090-76":{"quick":"錯 A:截肢/斷肢病人若休克應先「ATLS 復甦穩定生命徵象」,接合手術非休克當下的優先。","detail":{"background":"骨科創傷併發損傷的常見配對(高頻考點):肩胛骨骨折(高能量)→常合併「肺挫傷/胸部損傷」;腰椎橫突/壓迫骨折→腹內臟器損傷;膝關節脫臼→「膕動脈損傷」(須評估血管,必要時血管攝影/CTA);跟骨骨折(高處墜落軸向力)→約10%合併「腰椎壓迫骨折」、雙側跟骨骨折;骨盆骨折→泌尿生殖道/血管損傷。骨折固定能止痛、減少出血與二次軟組織傷害。截肢/斷肢病人若「休克」應先「ATLS 復甦穩定生命」,接合手術(replantation)非休克時的優先處置;近關節傷口可注入生理食鹽水測試是否與關節腔相通(saline load test),但若擔心污染關節應由手術室處理。","options":{"A":"★錯誤(本題答案):休克時優先救命復甦,非立即接合。","B":"正確:固定可止痛、減少二次傷害。","C":"正確:疑動脈損傷可安排血管攝影/CTA。","D":"正確:近關節傷口可生理食鹽水測試是否通關節腔(屬正確敘述)。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"105100-58":{"quick":"正確 D:I/II 型用第一代頭孢、III 型加 aminoglycoside;徹底清創在手術室、抗生素不能取代清創。","detail":{"background":"開放性骨折(open/compound fracture)=骨折處與外界相通,為骨科急症,核心併發症是「感染與骨髓炎」。Gustilo-Anderson 分類(依傷口大小、軟組織損傷、污染、血管狀態):Type I=傷口<1 cm、乾淨、低能量;Type II=傷口1–10 cm、中度軟組織損傷、無廣泛剝離;Type III=傷口>10 cm 或高能量/嚴重污染/節段骨折,再細分 IIIA(軟組織仍足以覆蓋骨頭)、IIIB(廣泛軟組織缺損、骨外露、需皮瓣覆蓋)、IIIC(合併「需修補的動脈損傷」,不論傷口大小)。處置黃金原則(時序):①到院「立即」靜脈抗生素(降感染率最關鍵的單一介入)②破傷風預防③傷口無菌敷料、夾板固定、移除明顯異物(但傷口探查與徹底清創應在「手術室」非急診)④儘速(現代主張盡量於可行時間內,傳統6–8 小時)手術沖洗清創 irrigation & debridement⑤骨折穩定(IM nail/外固定)。抗生素選擇:Type I/II 用第一代頭孢菌素(cefazolin,涵蓋 G(+));Type III 加 aminoglycoside(涵蓋 G(−));農場/糞便污染加 penicillin(涵蓋 Clostridium 厭氧)。Type I/II 傷口在徹底清創後常可初級縫合;Type III 傷口「不」初級縫合,延遲關閉或皮瓣。抗生素無法取代清創——清創不足靠抗生素無法避免感染。","options":{"A":"錯:傷口<1cm無嚴重軟組織傷害是 Type I,非 III。","B":"錯:徹底探查清創縫合應在「手術室」,不在急診;可短暫等候手術室。","C":"錯:清創不足無法靠大量抗生素避免感染。","D":"★正確(本題答案):I/II第一代頭孢、III加aminoglycoside。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"106020-75":{"quick":"正確 D:124(肩胛骨骨折-肺挫傷、腰椎骨折-腹內損傷、跟骨骨折-脊椎骨折);3 膝脫臼合併的是「膕動脈」非股動脈。","detail":{"background":"骨科創傷併發損傷的常見配對(高頻考點):肩胛骨骨折(高能量)→常合併「肺挫傷/胸部損傷」;腰椎橫突/壓迫骨折→腹內臟器損傷;膝關節脫臼→「膕動脈損傷」(須評估血管,必要時血管攝影/CTA);跟骨骨折(高處墜落軸向力)→約10%合併「腰椎壓迫骨折」、雙側跟骨骨折;骨盆骨折→泌尿生殖道/血管損傷。骨折固定能止痛、減少出血與二次軟組織傷害。截肢/斷肢病人若「休克」應先「ATLS 復甦穩定生命」,接合手術(replantation)非休克時的優先處置;近關節傷口可注入生理食鹽水測試是否與關節腔相通(saline load test),但若擔心污染關節應由手術室處理。","options":{"A":"含3(股動脈)有誤。","B":"含3有誤。","C":"含3有誤。","D":"★正確(本題答案):1、2、4 配對正確;膝脫臼合併膕動脈損傷(非股動脈)。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"106080-61":{"quick":"錯 D:周邊脈搏存在「不能」排除腔室症候群(動脈壓遠高於腔室壓,脈搏消失是晚期)。","detail":{"background":"急性肌腔室症候群(acute compartment syndrome, ACS):封閉筋膜腔內壓上升→灌流壓下降→組織缺血→壞死/Volkmann 攣縮,為骨科急症,須「筋膜切開術(fasciotomy)」減壓。最常見原因=骨折(尤其脛骨幹、前臂),其次擠壓傷、再灌流、緊束石膏、燒傷。小腿4腔室(前/側/淺後/深後)、前臂3腔室。臨床診斷靠「6P」,但早期最敏感、最重要的是「與理學不成比例的劇痛(pain out of proportion)」與「被動牽張痛(pain on passive stretch)」;paresthesia(感覺異常)為早期神經缺血徵象。脈搏消失(pulselessness)、麻痺(paralysis)、蒼白(pallor)為「晚期」徵象——「周邊脈搏存在『不能』排除腔室症候群」(動脈壓遠高於腔室壓)。客觀確診:腔室內壓>30 mmHg,或 ΔP(舒張壓−腔室壓)<30 mmHg→需筋膜切開。懷疑時處置:移除/剖開石膏與敷料、肢體置「心臟高度」(不可高舉以免進一步降灌流)、矯正低血壓、監測。確診則「立即」筋膜切開,不可等待。小腿比大腿易發生(大腿腔室大、肌肉可緩衝)。Volkmann 缺血性攣縮=前臂腔室症候群未處理的後遺症,屈肌壞死纖維化致爪狀手。","options":{"A":"正確:組織缺血致疼痛。","B":"正確:被動牽張痛與休息痛皆敏感。","C":"正確:神經缺血致感覺異常/遲鈍。","D":"★錯誤(本題答案):有脈搏不能排除,脈搏消失屬晚期。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"107020-77":{"quick":"錯 D:摸到遠端脈搏「不」代表沒有腔室症候群(脈搏消失是晚期徵象)。","detail":{"background":"急性肌腔室症候群(acute compartment syndrome, ACS):封閉筋膜腔內壓上升→灌流壓下降→組織缺血→壞死/Volkmann 攣縮,為骨科急症,須「筋膜切開術(fasciotomy)」減壓。最常見原因=骨折(尤其脛骨幹、前臂),其次擠壓傷、再灌流、緊束石膏、燒傷。小腿4腔室(前/側/淺後/深後)、前臂3腔室。臨床診斷靠「6P」,但早期最敏感、最重要的是「與理學不成比例的劇痛(pain out of proportion)」與「被動牽張痛(pain on passive stretch)」;paresthesia(感覺異常)為早期神經缺血徵象。脈搏消失(pulselessness)、麻痺(paralysis)、蒼白(pallor)為「晚期」徵象——「周邊脈搏存在『不能』排除腔室症候群」(動脈壓遠高於腔室壓)。客觀確診:腔室內壓>30 mmHg,或 ΔP(舒張壓−腔室壓)<30 mmHg→需筋膜切開。懷疑時處置:移除/剖開石膏與敷料、肢體置「心臟高度」(不可高舉以免進一步降灌流)、矯正低血壓、監測。確診則「立即」筋膜切開,不可等待。小腿比大腿易發生(大腿腔室大、肌肉可緩衝)。Volkmann 缺血性攣縮=前臂腔室症候群未處理的後遺症,屈肌壞死纖維化致爪狀手。","options":{"A":"正確:小腿骨折可致腔室症候群。","B":"正確:6P 包含疼痛腫脹麻痺感覺異常。","C":"正確:疼痛腫脹最早出現。","D":"★錯誤(本題答案):有脈搏不能排除腔室症候群。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"108030-56":{"quick":"錯 B:腔室症候群「小腿」比大腿易發生(大腿腔室大可緩衝)。","detail":{"background":"急性肌腔室症候群(acute compartment syndrome, ACS):封閉筋膜腔內壓上升→灌流壓下降→組織缺血→壞死/Volkmann 攣縮,為骨科急症,須「筋膜切開術(fasciotomy)」減壓。最常見原因=骨折(尤其脛骨幹、前臂),其次擠壓傷、再灌流、緊束石膏、燒傷。小腿4腔室(前/側/淺後/深後)、前臂3腔室。臨床診斷靠「6P」,但早期最敏感、最重要的是「與理學不成比例的劇痛(pain out of proportion)」與「被動牽張痛(pain on passive stretch)」;paresthesia(感覺異常)為早期神經缺血徵象。脈搏消失(pulselessness)、麻痺(paralysis)、蒼白(pallor)為「晚期」徵象——「周邊脈搏存在『不能』排除腔室症候群」(動脈壓遠高於腔室壓)。客觀確診:腔室內壓>30 mmHg,或 ΔP(舒張壓−腔室壓)<30 mmHg→需筋膜切開。懷疑時處置:移除/剖開石膏與敷料、肢體置「心臟高度」(不可高舉以免進一步降灌流)、矯正低血壓、監測。確診則「立即」筋膜切開,不可等待。小腿比大腿易發生(大腿腔室大、肌肉可緩衝)。Volkmann 缺血性攣縮=前臂腔室症候群未處理的後遺症,屈肌壞死纖維化致爪狀手。","options":{"A":"正確:骨折是最常見原因。","B":"★錯誤(本題答案):小腿比大腿易發生,非大腿。","C":"正確:脈搏與微血管回流正常仍不可排除。","D":"正確:疼痛常最早出現。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"108030-77":{"quick":"傷口5cm、無壓碎無軟組織流失=Gustilo Type II(本題答案 B)。","detail":{"background":"開放性骨折(open/compound fracture)=骨折處與外界相通,為骨科急症,核心併發症是「感染與骨髓炎」。Gustilo-Anderson 分類(依傷口大小、軟組織損傷、污染、血管狀態):Type I=傷口<1 cm、乾淨、低能量;Type II=傷口1–10 cm、中度軟組織損傷、無廣泛剝離;Type III=傷口>10 cm 或高能量/嚴重污染/節段骨折,再細分 IIIA(軟組織仍足以覆蓋骨頭)、IIIB(廣泛軟組織缺損、骨外露、需皮瓣覆蓋)、IIIC(合併「需修補的動脈損傷」,不論傷口大小)。處置黃金原則(時序):①到院「立即」靜脈抗生素(降感染率最關鍵的單一介入)②破傷風預防③傷口無菌敷料、夾板固定、移除明顯異物(但傷口探查與徹底清創應在「手術室」非急診)④儘速(現代主張盡量於可行時間內,傳統6–8 小時)手術沖洗清創 irrigation & debridement⑤骨折穩定(IM nail/外固定)。抗生素選擇:Type I/II 用第一代頭孢菌素(cefazolin,涵蓋 G(+));Type III 加 aminoglycoside(涵蓋 G(−));農場/糞便污染加 penicillin(涵蓋 Clostridium 厭氧)。Type I/II 傷口在徹底清創後常可初級縫合;Type III 傷口「不」初級縫合,延遲關閉或皮瓣。抗生素無法取代清創——清創不足靠抗生素無法避免感染。","options":{"A":"I級為<1cm。","B":"★正確(本題答案):1–10cm無廣泛軟組織傷害=II級。","C":"IIIA需高能量/嚴重軟組織。","D":"IIIB需皮瓣覆蓋。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"108080-57":{"quick":"錯 B:手術應「保留」骨膜血供,過度剝離軟組織反而增加不癒合;本例為肥厚性不癒合。","detail":{"background":"骨折癒合與不癒合(nonunion,一般定義>6–9個月未癒合或連續3個月無進展):危險因子=嚴重軟組織傷害、感染、固定不穩、骨缺損、營養不良、吸菸、糖尿病、長期類固醇/NSAID、高能量。兩型:①肥厚性(hypertrophic,「象腳」骨痂多)=血供好但「機械穩定度不足」→治療給予「更穩固固定」(換較粗髓內釘/加壓鋼板)即可,常不需植骨;②萎縮性(atrophic,骨端吸收尖細)=血供與生物活性差→需植骨(自體骨/BMP)加穩定固定。手術原則應「保留骨膜血供」,過度剝離軟組織(excessive stripping)反而破壞血供、增加不癒合,屬錯誤觀念。","options":{"A":"正確:列出的皆為不癒合危險因子。","B":"★錯誤(本題答案):過度剝離破壞血供、增加不癒合,屬錯誤做法。","C":"正確:肥厚性不癒合常因固定穩定度不足。","D":"正確:可換較粗髓內釘加植骨治療。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"110020-59":{"quick":"最適當 C:遠端橈骨骨折初期可先用「背側副木」固定,消腫後再換石膏。","detail":{"background":"石膏/副木固定原則:用「室溫水」浸泡(熱水加速放熱反應、可能燙傷且硬化過快);塑形時用「掌面(palm)而非指尖」以免局部壓迫產生壓瘡;固定須跨越骨折上下關節;抬高患肢消腫、定期 X 光追蹤復位。急性骨折初期軟組織會腫脹,故常先用「不環繞一圈的副木(splint/slab)」固定,待1–2週消腫再換環形石膏,避免石膏壓迫致腔室症候群。石膏下「持續、加劇、與骨折不成比例的疼痛」=腔室症候群或壓瘡警訊,應「立即剖開石膏」檢視——絕不可僅加止痛藥或觀察。","options":{"A":"錯:足踝扭傷副木應固定於「中立/背屈」位,蹠屈30度會致馬蹄攣縮。","B":"錯:石膏下持續疼痛應「立即」剖開檢視,不可觀察一週。","C":"★正確(本題答案):初期腫脹用背側副木,消腫後換石膏。","D":"錯:應用室溫水浸泡石膏,熱水會燙傷且硬化過快。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"111020-77":{"quick":"確診靠 A:腔室內壓>30 mmHg(或 ΔP<30 mmHg)。","detail":{"background":"急性肌腔室症候群(acute compartment syndrome, ACS):封閉筋膜腔內壓上升→灌流壓下降→組織缺血→壞死/Volkmann 攣縮,為骨科急症,須「筋膜切開術(fasciotomy)」減壓。最常見原因=骨折(尤其脛骨幹、前臂),其次擠壓傷、再灌流、緊束石膏、燒傷。小腿4腔室(前/側/淺後/深後)、前臂3腔室。臨床診斷靠「6P」,但早期最敏感、最重要的是「與理學不成比例的劇痛(pain out of proportion)」與「被動牽張痛(pain on passive stretch)」;paresthesia(感覺異常)為早期神經缺血徵象。脈搏消失(pulselessness)、麻痺(paralysis)、蒼白(pallor)為「晚期」徵象——「周邊脈搏存在『不能』排除腔室症候群」(動脈壓遠高於腔室壓)。客觀確診:腔室內壓>30 mmHg,或 ΔP(舒張壓−腔室壓)<30 mmHg→需筋膜切開。懷疑時處置:移除/剖開石膏與敷料、肢體置「心臟高度」(不可高舉以免進一步降灌流)、矯正低血壓、監測。確診則「立即」筋膜切開,不可等待。小腿比大腿易發生(大腿腔室大、肌肉可緩衝)。Volkmann 缺血性攣縮=前臂腔室症候群未處理的後遺症,屈肌壞死纖維化致爪狀手。","options":{"A":"★正確(本題答案):腔室內壓>30 mmHg。","B":"肌酸酐反映腎功能,非腔室壓。","C":"高血鉀為橫紋肌溶解後果,非確診依據。","D":"CPK 升高反映肌肉壞死,非腔室壓確診值。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"112020-58":{"quick":"最不適當 A:Volkmann 攣縮並非「不可能」有正常 intrinsic 功能——前臂腔室症候群主要傷屈肌,手內在肌可能保留部分功能。","detail":{"background":"急性肌腔室症候群(acute compartment syndrome, ACS):封閉筋膜腔內壓上升→灌流壓下降→組織缺血→壞死/Volkmann 攣縮,為骨科急症,須「筋膜切開術(fasciotomy)」減壓。最常見原因=骨折(尤其脛骨幹、前臂),其次擠壓傷、再灌流、緊束石膏、燒傷。小腿4腔室(前/側/淺後/深後)、前臂3腔室。臨床診斷靠「6P」,但早期最敏感、最重要的是「與理學不成比例的劇痛(pain out of proportion)」與「被動牽張痛(pain on passive stretch)」;paresthesia(感覺異常)為早期神經缺血徵象。脈搏消失(pulselessness)、麻痺(paralysis)、蒼白(pallor)為「晚期」徵象——「周邊脈搏存在『不能』排除腔室症候群」(動脈壓遠高於腔室壓)。客觀確診:腔室內壓>30 mmHg,或 ΔP(舒張壓−腔室壓)<30 mmHg→需筋膜切開。懷疑時處置:移除/剖開石膏與敷料、肢體置「心臟高度」(不可高舉以免進一步降灌流)、矯正低血壓、監測。確診則「立即」筋膜切開,不可等待。小腿比大腿易發生(大腿腔室大、肌肉可緩衝)。Volkmann 缺血性攣縮=前臂腔室症候群未處理的後遺症,屈肌壞死纖維化致爪狀手。","options":{"A":"★最不適當(本題答案):敘述過於絕對,intrinsic 肌未必完全喪失。","B":"正確:被動牽張痛最敏感。","C":"正確:神經缺血致感覺異常。","D":"正確:有脈搏仍無法排除。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"114070-57":{"quick":"最不適當 C:嚴重污染屬 Gustilo「Type III」,非 Type II。","detail":{"background":"開放性骨折(open/compound fracture)=骨折處與外界相通,為骨科急症,核心併發症是「感染與骨髓炎」。Gustilo-Anderson 分類(依傷口大小、軟組織損傷、污染、血管狀態):Type I=傷口<1 cm、乾淨、低能量;Type II=傷口1–10 cm、中度軟組織損傷、無廣泛剝離;Type III=傷口>10 cm 或高能量/嚴重污染/節段骨折,再細分 IIIA(軟組織仍足以覆蓋骨頭)、IIIB(廣泛軟組織缺損、骨外露、需皮瓣覆蓋)、IIIC(合併「需修補的動脈損傷」,不論傷口大小)。處置黃金原則(時序):①到院「立即」靜脈抗生素(降感染率最關鍵的單一介入)②破傷風預防③傷口無菌敷料、夾板固定、移除明顯異物(但傷口探查與徹底清創應在「手術室」非急診)④儘速(現代主張盡量於可行時間內,傳統6–8 小時)手術沖洗清創 irrigation & debridement⑤骨折穩定(IM nail/外固定)。抗生素選擇:Type I/II 用第一代頭孢菌素(cefazolin,涵蓋 G(+));Type III 加 aminoglycoside(涵蓋 G(−));農場/糞便污染加 penicillin(涵蓋 Clostridium 厭氧)。Type I/II 傷口在徹底清創後常可初級縫合;Type III 傷口「不」初級縫合,延遲關閉或皮瓣。抗生素無法取代清創——清創不足靠抗生素無法避免感染。","options":{"A":"正確:傷口靠近骨折不一定相通,需評估是否為開放性。","B":"正確:部分開放性骨折清創後可立即髓內釘固定。","C":"★最不適當(本題答案):嚴重污染歸 Type III,非 II。","D":"正確:合併大血管斷裂先穩定骨折再修補血管(或暫時性分流)。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"115020-76":{"quick":"最不適當 B:腔室症候群非靠「持續大量輸液」治療,核心是「筋膜切開減壓」;乳酸林格每小時1000mL過量輸液不當。","detail":{"background":"急性肌腔室症候群(acute compartment syndrome, ACS):封閉筋膜腔內壓上升→灌流壓下降→組織缺血→壞死/Volkmann 攣縮,為骨科急症,須「筋膜切開術(fasciotomy)」減壓。最常見原因=骨折(尤其脛骨幹、前臂),其次擠壓傷、再灌流、緊束石膏、燒傷。小腿4腔室(前/側/淺後/深後)、前臂3腔室。臨床診斷靠「6P」,但早期最敏感、最重要的是「與理學不成比例的劇痛(pain out of proportion)」與「被動牽張痛(pain on passive stretch)」;paresthesia(感覺異常)為早期神經缺血徵象。脈搏消失(pulselessness)、麻痺(paralysis)、蒼白(pallor)為「晚期」徵象——「周邊脈搏存在『不能』排除腔室症候群」(動脈壓遠高於腔室壓)。客觀確診:腔室內壓>30 mmHg,或 ΔP(舒張壓−腔室壓)<30 mmHg→需筋膜切開。懷疑時處置:移除/剖開石膏與敷料、肢體置「心臟高度」(不可高舉以免進一步降灌流)、矯正低血壓、監測。確診則「立即」筋膜切開,不可等待。小腿比大腿易發生(大腿腔室大、肌肉可緩衝)。Volkmann 缺血性攣縮=前臂腔室症候群未處理的後遺症,屈肌壞死纖維化致爪狀手。","options":{"A":"可:適度晶體液維持灌流是合理復甦。","B":"★最不適當(本題答案):每小時1000mL過度輸液非治療重點,核心是減壓。","C":"正確:監測血鉀(防再灌流高血鉀)。","D":"正確:監測尿量(防橫紋肌溶解致急性腎損傷)。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"101030-61":{"quick":"正確 C:遠端橈骨血供佳「很少不癒合」;好發老年女性、常合併DRUJ脫位。","detail":{"background":"遠端橈骨骨折(distal radius fracture)是「上肢最常見骨折」,雙峰分布:年輕高能量(車禍/運動)與「老年骨質疏鬆」(跌倒撐地, 女性遠多於男性, 屬脆弱性骨折)。命名:Colles=背側移位(餐叉狀變形, FOOSH 跌倒撐地最常見);Smith=掌側移位(reverse Colles);Barton=關節內合併腕關節脫位(背側/掌側);Chauffeur(Hutchinson)=橈骨莖突骨折。遠端橈骨血供豐富, 「很少不癒合」。閉鎖復位後可接受的放射參數(復位目標):橈長與健側差<2–3 mm、關節面 step-off<2 mm、橈傾(radial inclination)約22度(與健側差<5度)、背傾應「矯正回中立或掌傾」——正常掌傾約11度;復位後仍「背傾15度」屬不可接受(超出可接受範圍)。常合併遠端橈尺關節(DRUJ)不穩、尺骨莖突骨折、正中神經(腕隧道)症狀。","options":{"A":"錯:雙峰分布, 老年骨鬆者居多, 非僅<40歲。","B":"錯:女性(骨質疏鬆)發生率「高」於男性。","C":"★正確(本題答案):遠端橈骨血供豐富, 很少不癒合。","D":"錯:常合併DRUJ半脫位, 並不罕見。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"102110-59":{"quick":"D:幼童跌倒撐地之前臂骨折,影像示尺骨近端骨折+橈骨頭脫位=Monteggia氏骨折。","detail":{"background":"前臂雙骨環狀結構, 單骨折常合併另一端關節脫位(記憶法 MUGR/「GRsMUp」):Galeazzi=「遠端橈骨幹」骨折+遠端橈尺關節(DRUJ)脫位(成人多需手術);Monteggia=「近端尺骨」骨折+橈骨頭脫位(常見於兒童跌倒撐地, 須注意後骨間神經 PIN 麻痺)。橈骨頭/頸骨折→易傷「後骨間神經(PIN, 橈神經深支)」(繞橈骨頸、穿旋後肌)。肱骨幹中段骨折(如手榴彈過頂投擲之螺旋骨折/Holstein-Lewis)→易傷「橈神經」(行於橈神經溝)→垂腕(wrist drop)。","options":{"A":"Colles為遠端橈骨背側移位。","B":"Barton為橈骨關節內合併腕脫位。","C":"Galeazzi為遠端橈骨幹+DRUJ脫位。","D":"★正確(本題答案):近端尺骨骨折+橈骨頭脫位=Monteggia。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"104030-72":{"quick":"C:AP看似正常、需腋下view診斷,肱骨頭壓陷=肩關節「後脫位」合併impaction。","detail":{"background":"肩關節:前脫位(anterior dislocation)最常見(>95%), 機轉為外展外旋, 好發年輕人;常合併 Bankart 病灶(前下盂唇)與 Hill-Sachs 缺損(肱骨頭後外側);「年輕人復發率高(可達90%)」, 老年人較少復發但易合併旋轉肌袖撕裂/神經傷害。後脫位(posterior)少見, 與「癲癇、電擊、跌倒」有關, 易被漏診(AP 看似正常→須腋下/axillary view), 肱骨頭呈「燈泡狀(light bulb sign)」與前緣壓陷(impaction)。近端肱骨骨折以 Neer 4-part 分類(解剖頸/外科頸/大小結節);年輕健康者「移位>1cm/角度>45度」之多片段→開放復位內固定(ORIF, 鎖定鋼板);老年嚴重粉碎/頭壞死高風險→半肩或反式人工肩關節置換。","options":{"A":"非單純肱骨骨折脫位。","B":"前脫位最常見但本例為後脫位(腋下view關鍵)。","C":"★正確(本題答案):後脫位合併impaction(常被漏診,需axillary view)。","D":"非創傷後關節炎。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"104090-57":{"quick":"B:肱骨幹中段螺旋骨折(過頂投擲)最易傷行於橈神經溝的「橈神經」→垂腕。","detail":{"background":"前臂雙骨環狀結構, 單骨折常合併另一端關節脫位(記憶法 MUGR/「GRsMUp」):Galeazzi=「遠端橈骨幹」骨折+遠端橈尺關節(DRUJ)脫位(成人多需手術);Monteggia=「近端尺骨」骨折+橈骨頭脫位(常見於兒童跌倒撐地, 須注意後骨間神經 PIN 麻痺)。橈骨頭/頸骨折→易傷「後骨間神經(PIN, 橈神經深支)」(繞橈骨頸、穿旋後肌)。肱骨幹中段骨折(如手榴彈過頂投擲之螺旋骨折/Holstein-Lewis)→易傷「橈神經」(行於橈神經溝)→垂腕(wrist drop)。","options":{"A":"正中神經與肱骨幹中段較無關。","B":"★正確(本題答案):橈神經行於橈神經溝, 肱骨幹骨折易受傷。","C":"尺神經與肘內側(髁上/內上髁)相關。","D":"腋神經與肱骨「外科頸」骨折/肩脫位相關。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"105020-57":{"quick":"錯 A:鎖骨骨折以「中段最常見」(約80%),遠端骨折較少見。","detail":{"background":"鎖骨骨折:以「中段(midshaft)最常見(約80%)」, 多數保守治療(吊帶/8字帶)即可良好癒合;遠端(distal)骨折較少見但「不癒合率較高」(因喙鎖韌帶與肌肉牽引), Neer II 型遠端骨折喙鎖韌帶與內側骨段分離、不穩定→常需手術。","options":{"A":"★錯誤(本題答案):中段最常見, 非遠端。","B":"正確:遠端骨折保守不癒合率較高。","C":"正確:多數中段骨折保守治療癒合良好。","D":"正確:Neer II型遠端骨折喙鎖韌帶從內側骨段分離。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"105100-57":{"quick":"不可接受的是 C:復位後仍「背傾15度」超出可接受範圍(應矯正回中立/掌傾)。","detail":{"background":"遠端橈骨骨折(distal radius fracture)是「上肢最常見骨折」,雙峰分布:年輕高能量(車禍/運動)與「老年骨質疏鬆」(跌倒撐地, 女性遠多於男性, 屬脆弱性骨折)。命名:Colles=背側移位(餐叉狀變形, FOOSH 跌倒撐地最常見);Smith=掌側移位(reverse Colles);Barton=關節內合併腕關節脫位(背側/掌側);Chauffeur(Hutchinson)=橈骨莖突骨折。遠端橈骨血供豐富, 「很少不癒合」。閉鎖復位後可接受的放射參數(復位目標):橈長與健側差<2–3 mm、關節面 step-off<2 mm、橈傾(radial inclination)約22度(與健側差<5度)、背傾應「矯正回中立或掌傾」——正常掌傾約11度;復位後仍「背傾15度」屬不可接受(超出可接受範圍)。常合併遠端橈尺關節(DRUJ)不穩、尺骨莖突骨折、正中神經(腕隧道)症狀。","options":{"A":"可接受:橈長差<2mm。","B":"可接受:關節內step-off<2mm。","C":"★不可接受(本題答案):背傾15度過大, 復位目標為中立或掌傾。","D":"可接受:橈角差<5度。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"106080-57":{"quick":"錯 B、D(本題多重答案):後側入路須例行找出保護尺神經;老年功能需求低者仍須考量骨折型態而非「皆」保守。","detail":{"background":"肘部創傷:橈骨頭骨折(最常見肘部骨折, FOOSH 機轉)——單純無移位/無機械阻擋可保守(早期活動), 若旋前旋後受機械阻擋、移位大或合併韌帶損傷則手術。「恐怖三聯傷(terrible triad)」=肘關節後脫位+橈骨頭骨折+冠突(coronoid)骨折→高度不穩、需手術重建。單純肘脫臼(simple, 無骨折)以「後脫位」最常見, 閉鎖復位後若穩定僅需短期固定(數天至1–2週)後早期活動以免僵硬, 固定「2個月」過久會致僵硬,不適當。小兒肘部「脂肪墊徵(fat pad sign)/後脂肪墊」或關節積液=隱匿性骨折(常為髁上骨折)的重要間接證據。","options":{"A":"正確:健康成人移位關節內骨折保守預後差, 多建議手術。","B":"★錯誤(給分):後側入路須例行辨識保護尺神經。","C":"正確:複雜骨折可加3D重建CT判讀。","D":"★錯誤(給分):「不論型態皆保守」過於絕對。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"108080-60":{"quick":"A:遠端橈骨幹骨折+DRUJ脫位=Galeazzi氏骨折。","detail":{"background":"前臂雙骨環狀結構, 單骨折常合併另一端關節脫位(記憶法 MUGR/「GRsMUp」):Galeazzi=「遠端橈骨幹」骨折+遠端橈尺關節(DRUJ)脫位(成人多需手術);Monteggia=「近端尺骨」骨折+橈骨頭脫位(常見於兒童跌倒撐地, 須注意後骨間神經 PIN 麻痺)。橈骨頭/頸骨折→易傷「後骨間神經(PIN, 橈神經深支)」(繞橈骨頸、穿旋後肌)。肱骨幹中段骨折(如手榴彈過頂投擲之螺旋骨折/Holstein-Lewis)→易傷「橈神經」(行於橈神經溝)→垂腕(wrist drop)。","options":{"A":"★正確(本題答案):遠端橈骨幹+DRUJ脫位=Galeazzi。","B":"Smith為遠端橈骨掌側移位。","C":"Monteggia為近端尺骨+橈骨頭脫位。","D":"Essex-Lopresti為橈骨頭骨折+遠端橈尺關節分離。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"108080-61":{"quick":"除外 C:恐怖三聯傷=肘後脫位+橈骨頭骨折+冠突骨折;肱骨髁上骨折不屬之。","detail":{"background":"肘部創傷:橈骨頭骨折(最常見肘部骨折, FOOSH 機轉)——單純無移位/無機械阻擋可保守(早期活動), 若旋前旋後受機械阻擋、移位大或合併韌帶損傷則手術。「恐怖三聯傷(terrible triad)」=肘關節後脫位+橈骨頭骨折+冠突(coronoid)骨折→高度不穩、需手術重建。單純肘脫臼(simple, 無骨折)以「後脫位」最常見, 閉鎖復位後若穩定僅需短期固定(數天至1–2週)後早期活動以免僵硬, 固定「2個月」過久會致僵硬,不適當。小兒肘部「脂肪墊徵(fat pad sign)/後脂肪墊」或關節積液=隱匿性骨折(常為髁上骨折)的重要間接證據。","options":{"A":"是:冠突(coronoid)骨折。","B":"是:橈骨頭骨折。","C":"★除外(本題答案):髁上骨折非三聯傷成分。","D":"是:肘關節脫臼。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"108080-76":{"quick":"D:尺骨近端骨折+橈骨頭脫位=Monteggia氏骨折。","detail":{"background":"前臂雙骨環狀結構, 單骨折常合併另一端關節脫位(記憶法 MUGR/「GRsMUp」):Galeazzi=「遠端橈骨幹」骨折+遠端橈尺關節(DRUJ)脫位(成人多需手術);Monteggia=「近端尺骨」骨折+橈骨頭脫位(常見於兒童跌倒撐地, 須注意後骨間神經 PIN 麻痺)。橈骨頭/頸骨折→易傷「後骨間神經(PIN, 橈神經深支)」(繞橈骨頸、穿旋後肌)。肱骨幹中段骨折(如手榴彈過頂投擲之螺旋骨折/Holstein-Lewis)→易傷「橈神經」(行於橈神經溝)→垂腕(wrist drop)。","options":{"A":"Colles為遠端橈骨。","B":"Chauffeur為橈骨莖突。","C":"Galeazzi為遠端橈骨幹+DRUJ。","D":"★正確(本題答案):近端尺骨+橈骨頭脫位=Monteggia。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"109020-59":{"quick":"B:橈骨頸/近端骨折最易合併「後骨間神經(PIN)」傷害(繞橈骨頸)。","detail":{"background":"前臂雙骨環狀結構, 單骨折常合併另一端關節脫位(記憶法 MUGR/「GRsMUp」):Galeazzi=「遠端橈骨幹」骨折+遠端橈尺關節(DRUJ)脫位(成人多需手術);Monteggia=「近端尺骨」骨折+橈骨頭脫位(常見於兒童跌倒撐地, 須注意後骨間神經 PIN 麻痺)。橈骨頭/頸骨折→易傷「後骨間神經(PIN, 橈神經深支)」(繞橈骨頸、穿旋後肌)。肱骨幹中段骨折(如手榴彈過頂投擲之螺旋骨折/Holstein-Lewis)→易傷「橈神經」(行於橈神經溝)→垂腕(wrist drop)。","options":{"A":"前骨間神經與前臂近端正中神經相關。","B":"★正確(本題答案):後骨間神經繞橈骨頸, 橈骨頸骨折易傷。","C":"尺神經與肘內側相關。","D":"淺橈神經為感覺支, 行於前臂橈側遠端。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"110020-58":{"quick":"最不適當 D:合併關節內游離小體(loose body)會機械阻擋, 應「手術」而非保守。","detail":{"background":"肘部創傷:橈骨頭骨折(最常見肘部骨折, FOOSH 機轉)——單純無移位/無機械阻擋可保守(早期活動), 若旋前旋後受機械阻擋、移位大或合併韌帶損傷則手術。「恐怖三聯傷(terrible triad)」=肘關節後脫位+橈骨頭骨折+冠突(coronoid)骨折→高度不穩、需手術重建。單純肘脫臼(simple, 無骨折)以「後脫位」最常見, 閉鎖復位後若穩定僅需短期固定(數天至1–2週)後早期活動以免僵硬, 固定「2個月」過久會致僵硬,不適當。小兒肘部「脂肪墊徵(fat pad sign)/後脂肪墊」或關節積液=隱匿性骨折(常為髁上骨折)的重要間接證據。","options":{"A":"正確:FOOSH為常見機轉。","B":"正確:單純無移位橈骨頭骨折可保守、早期活動。","C":"正確:旋前旋後受限(機械阻擋)是手術適應症。","D":"★最不適當(本題答案):關節內游離體應手術移除/固定。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"110020-62":{"quick":"B:FOOSH 致橈側腕痛, 最常見腕骨骨折=舟狀骨(scaphoid)。","detail":{"background":"舟狀骨(scaphoid)骨折=「最常見的腕骨骨折」, 機轉為 FOOSH 手腕背屈撐地;壓痛在「解剖鼻煙壺(anatomical snuffbox)橈側」。血供「逆行性(由遠端進入)」→近端骨折段易「缺血性壞死與不癒合」。初診X光常「陰性(occult)」, 臨床懷疑即應「拇指人字形石膏固定」並2週後追蹤或 MRI/CT 確診。Gilula 弧線(Gilula arcs)=腕關節 AP view 上沿近遠端腕骨畫出的「3條」平滑弧線, 不連續代表腕骨脫位/不穩(如月狀骨周圍脫位)。","options":{"A":"月狀骨骨折/脫位較少見。","B":"★正確(本題答案):舟狀骨為最常見腕骨骨折。","C":"大多角骨少見。","D":"小多角骨罕見。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"111020-61":{"quick":"最不適當 C:DRUJ傷後關節炎可用Darrach/hemi-resection/Sauvé-Kapandji;「Adam procedure」非標準術式。","detail":{"background":"遠端橈尺關節(DRUJ)陳舊性傷後關節炎的補救手術:Darrach(切除尺骨遠端)、Sauvé-Kapandji(DRUJ 融合+近端尺骨假關節)、hemi-resection arthroplasty 皆為公認術式;「Adam procedure」非標準 DRUJ 重建術式(本題最不適當)。","options":{"A":"Darrach(切除尺骨遠端)為公認術式。","B":"hemi-resection arthroplasty為公認術式。","C":"★最不適當(本題答案):Adam procedure非DRUJ重建術式。","D":"Sauvé-Kapandji為公認術式。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"112080-58":{"quick":"A:拇指掌骨基底「粉碎」關節內骨折(Y/T形多片)=Rolando fracture(預後較Bennett差)。","detail":{"background":"拇指掌骨基底關節內骨折:Bennett=「兩片(部分關節)」骨折脫位(掌骨基底尺側小片留原位, 其餘因外展拇長肌牽引向橈背側脫位);Rolando=「Y/T 形粉碎(三片以上)」關節內骨折,預後較差;Boxer fracture=第5掌骨頸骨折(出拳);Jones fracture=第5蹠骨基底骨折(足部,非手部)。","options":{"A":"★正確(本題答案):粉碎/三片以上=Rolando。","B":"Bennett為兩片(部分關節)骨折脫位。","C":"Jones為第5蹠骨(足部)。","D":"boxer為第5掌骨頸。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"112080-61":{"quick":"B:跌倒撐地後鼻煙壺處持續壓痛=舟狀骨(scaphoid)骨折(易延遲診斷/不癒合)。","detail":{"background":"舟狀骨(scaphoid)骨折=「最常見的腕骨骨折」, 機轉為 FOOSH 手腕背屈撐地;壓痛在「解剖鼻煙壺(anatomical snuffbox)橈側」。血供「逆行性(由遠端進入)」→近端骨折段易「缺血性壞死與不癒合」。初診X光常「陰性(occult)」, 臨床懷疑即應「拇指人字形石膏固定」並2週後追蹤或 MRI/CT 確診。Gilula 弧線(Gilula arcs)=腕關節 AP view 上沿近遠端腕骨畫出的「3條」平滑弧線, 不連續代表腕骨脫位/不穩(如月狀骨周圍脫位)。","options":{"A":"豆狀骨骨折少見。","B":"★正確(本題答案):舟狀骨骨折(鼻煙壺壓痛)。","C":"月狀骨骨折/Kienböck較少。","D":"鈎狀骨鉤部骨折(高爾夫/球拍)少見。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"112080-72":{"quick":"D:側面照「後脂肪墊徵/關節積液」=隱匿性骨折間接證據, 影像最恰當的判讀為關節積液。","detail":{"background":"肘部創傷:橈骨頭骨折(最常見肘部骨折, FOOSH 機轉)——單純無移位/無機械阻擋可保守(早期活動), 若旋前旋後受機械阻擋、移位大或合併韌帶損傷則手術。「恐怖三聯傷(terrible triad)」=肘關節後脫位+橈骨頭骨折+冠突(coronoid)骨折→高度不穩、需手術重建。單純肘脫臼(simple, 無骨折)以「後脫位」最常見, 閉鎖復位後若穩定僅需短期固定(數天至1–2週)後早期活動以免僵硬, 固定「2個月」過久會致僵硬,不適當。小兒肘部「脂肪墊徵(fat pad sign)/後脂肪墊」或關節積液=隱匿性骨折(常為髁上骨折)的重要間接證據。","options":{"A":"未必能明顯見肱骨骨折。","B":"未必能明顯見橈骨骨折。","C":"與生長板無關。","D":"★正確(本題答案):脂肪墊抬高=關節積液(隱匿性骨折)。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"113020-15":{"quick":"B:Gilula 弧線共「3條」, 評估腕骨對齊。","detail":{"background":"舟狀骨(scaphoid)骨折=「最常見的腕骨骨折」, 機轉為 FOOSH 手腕背屈撐地;壓痛在「解剖鼻煙壺(anatomical snuffbox)橈側」。血供「逆行性(由遠端進入)」→近端骨折段易「缺血性壞死與不癒合」。初診X光常「陰性(occult)」, 臨床懷疑即應「拇指人字形石膏固定」並2週後追蹤或 MRI/CT 確診。Gilula 弧線(Gilula arcs)=腕關節 AP view 上沿近遠端腕骨畫出的「3條」平滑弧線, 不連續代表腕骨脫位/不穩(如月狀骨周圍脫位)。","options":{"A":"非2條。","B":"★正確(本題答案):3條Gilula弧線。","C":"非4條。","D":"非5條。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"113020-58":{"quick":"最不適當 C:單純肘脫臼復位穩定後「短期固定後早期活動」即可,固定2個月過久致僵硬。","detail":{"background":"肘部創傷:橈骨頭骨折(最常見肘部骨折, FOOSH 機轉)——單純無移位/無機械阻擋可保守(早期活動), 若旋前旋後受機械阻擋、移位大或合併韌帶損傷則手術。「恐怖三聯傷(terrible triad)」=肘關節後脫位+橈骨頭骨折+冠突(coronoid)骨折→高度不穩、需手術重建。單純肘脫臼(simple, 無骨折)以「後脫位」最常見, 閉鎖復位後若穩定僅需短期固定(數天至1–2週)後早期活動以免僵硬, 固定「2個月」過久會致僵硬,不適當。小兒肘部「脂肪墊徵(fat pad sign)/後脂肪墊」或關節積液=隱匿性骨折(常為髁上骨折)的重要間接證據。","options":{"A":"正確:單純肘脫臼復位後多穩定, 慢性再發少見。","B":"正確:前向脫臼比後向少見。","C":"★最不適當(本題答案):固定2個月過久會致肘僵硬。","D":"正確:復位後不穩可手術。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"113020-59":{"quick":"A:年輕人移位>1cm之肱骨近端多片骨折→開放復位內固定(ORIF)。","detail":{"background":"肩關節:前脫位(anterior dislocation)最常見(>95%), 機轉為外展外旋, 好發年輕人;常合併 Bankart 病灶(前下盂唇)與 Hill-Sachs 缺損(肱骨頭後外側);「年輕人復發率高(可達90%)」, 老年人較少復發但易合併旋轉肌袖撕裂/神經傷害。後脫位(posterior)少見, 與「癲癇、電擊、跌倒」有關, 易被漏診(AP 看似正常→須腋下/axillary view), 肱骨頭呈「燈泡狀(light bulb sign)」與前緣壓陷(impaction)。近端肱骨骨折以 Neer 4-part 分類(解剖頸/外科頸/大小結節);年輕健康者「移位>1cm/角度>45度」之多片段→開放復位內固定(ORIF, 鎖定鋼板);老年嚴重粉碎/頭壞死高風險→半肩或反式人工肩關節置換。","options":{"A":"★正確(本題答案):年輕、移位大→ORIF鎖定鋼板。","B":"半肩置換用於老年嚴重粉碎/頭壞死高風險。","C":"經皮鋼針適用於較單純可閉鎖復位者。","D":"全/反式肩置換非首選於年輕可重建者。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"115020-59":{"quick":"D:影像示近端尺骨骨折+橈骨頭脫位=Monteggia fracture。","detail":{"background":"前臂雙骨環狀結構, 單骨折常合併另一端關節脫位(記憶法 MUGR/「GRsMUp」):Galeazzi=「遠端橈骨幹」骨折+遠端橈尺關節(DRUJ)脫位(成人多需手術);Monteggia=「近端尺骨」骨折+橈骨頭脫位(常見於兒童跌倒撐地, 須注意後骨間神經 PIN 麻痺)。橈骨頭/頸骨折→易傷「後骨間神經(PIN, 橈神經深支)」(繞橈骨頸、穿旋後肌)。肱骨幹中段骨折(如手榴彈過頂投擲之螺旋骨折/Holstein-Lewis)→易傷「橈神經」(行於橈神經溝)→垂腕(wrist drop)。","options":{"A":"Colles為遠端橈骨背側移位。","B":"Galeazzi為遠端橈骨幹+DRUJ。","C":"boxer為第5掌骨頸。","D":"★正確(本題答案):Monteggia(尺骨近端+橈骨頭脫位)。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"115020-61":{"quick":"最不適當 D:年輕人前脫位「復發率高」,常需手術(Bankart修補)穩定。","detail":{"background":"肩關節:前脫位(anterior dislocation)最常見(>95%), 機轉為外展外旋, 好發年輕人;常合併 Bankart 病灶(前下盂唇)與 Hill-Sachs 缺損(肱骨頭後外側);「年輕人復發率高(可達90%)」, 老年人較少復發但易合併旋轉肌袖撕裂/神經傷害。後脫位(posterior)少見, 與「癲癇、電擊、跌倒」有關, 易被漏診(AP 看似正常→須腋下/axillary view), 肱骨頭呈「燈泡狀(light bulb sign)」與前緣壓陷(impaction)。近端肱骨骨折以 Neer 4-part 分類(解剖頸/外科頸/大小結節);年輕健康者「移位>1cm/角度>45度」之多片段→開放復位內固定(ORIF, 鎖定鋼板);老年嚴重粉碎/頭壞死高風險→半肩或反式人工肩關節置換。","options":{"A":"正確:好發<30歲年輕人。","B":"正確:老年人也會發生且常有合併傷害(旋轉肌/神經)。","C":"正確:常合併Bankart病灶。","D":"★最不適當(本題答案):年輕人復發率高, 常需手術。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","Green Operative Hand Surgery"]}},"102030-58":{"quick":"錯 D:正常Böhler角約25–40度,「<20度」代表塌陷;非「正常<20度」。","detail":{"background":"跟骨(calcaneus)骨折=最常見跗骨骨折, 軸向墜落, 約10%合併「腰椎壓迫骨折」、可雙側;可致足跟腔室症候群→爪狀趾(clawing);Böhler 角正常25–40度, 「<20度」提示塌陷(故「正常<20度」敘述錯誤);Essex-Lopresti 分舌型(tongue)與關節壓陷型(joint depression)。Lisfranc 損傷=跗蹠關節(tarsometatarsal)損傷, Lisfranc 韌帶連「內側楔狀骨(medial cuneiform)與第二蹠骨基底」(非第一蹠骨);AP 見第1、2蹠骨基底間隙增大、斜位見第4蹠骨內緣與骰骨不連續→須警覺(易漏診)。距骨(talus)骨折血供逆行, 易AVN。","options":{"A":"正確:跟骨骨折約10%合併腰椎骨折。","B":"正確:可致足跟腔室症候群→爪狀趾。","C":"正確:Essex-Lopresti分舌型與關節壓陷型。","D":"★錯誤(本題答案):正常Böhler角25–40度, <20度為異常塌陷。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"102030-63":{"quick":"A:髖前位脫位姿勢=外展+外旋。","detail":{"background":"創傷性髖關節脫位多為高能量(車禍儀表板撞擊膝→力沿股骨傳遞):「後脫位(約90%)」典型姿勢=患肢「短縮、屈曲、內收、內旋」, 易傷坐骨神經(足下垂)、股骨頭壞死;「前脫位」姿勢=「外展、外旋、屈曲/伸直」。為骨科急症, 應「6小時內」緊急復位以降低 AVN。常合併髖臼後壁骨折(fracture-dislocation)→CT 評估。","options":{"A":"★正確(本題答案):前脫位=外展、外旋。","B":"外展+內旋非典型。","C":"內收+內旋=「後」脫位。","D":"內收+外旋非典型。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"102110-76":{"quick":"錯 D:垂直剪力易傷「上臀動脈(superior gluteal a.)」,非下臀動脈。","detail":{"background":"骨盆骨折:多數為穩定型, 保守治療佳;高能量不穩定型可致大出血(主要為「靜脈叢與骨鬆質出血」, 真正動脈出血<10–20%)。「後環(骶髂)」損傷比前環更易大出血。機轉(Young-Burgess):前後壓迫(APC, open-book)、側方壓迫(LC, 最常見)、垂直剪力(VS, vertical shear, 易傷上臀動脈 superior gluteal a.)。恥骨聯合分離>2.5 cm 提示後環不穩, 需外固定/手術。骨盆骨折「不會」造成「大腿腔室症候群」(大腿腔室大);可合併泌尿生殖道、神經(腰薦叢)損傷與慢性下背痛。骨盆斜位/出入口照與 Judet 斜位用於評估。","options":{"A":"正確:後環損傷比前環易出血。","B":"正確:真正動脈出血比率不高(多為靜脈/骨出血)。","C":"正確:垂直剪力(vertical shear)為機轉之一。","D":"★錯誤(本題答案):傷及的是上臀動脈, 非下臀動脈。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"103030-75":{"quick":"錯 D:老人髖部骨折術後應「早期下床」以降低併發症與死亡;臥床不動錯誤。","detail":{"background":"髖部骨折分兩大類, 治療原則迥異:①關節囊「內」股骨頸骨折(intracapsular femoral neck)——股骨頭血供「逆行」(經支持帶血管/旋股內側動脈), 移位骨折易破壞血供→「缺血性壞死(AVN)與不癒合」為主要併發症。Garden 分類I–IV(I/II 為無移位/嵌入, III/IV 為移位)。年輕高能量→緊急復位內固定(ORIF, 救血供); 老年移位骨折→「人工關節置換」(半髖 hemiarthroplasty 或全髖, 活動度高者用全髖)。②關節囊「外」轉子間/轉子區骨折(intertrochanteric)——血供佳「少 AVN」, 治療以「復位內固定」(動態髖螺釘 DHS 或髓內釘 cephalomedullary nail), reverse oblique/粉碎型屬「不穩定」骨折宜髓內釘。老年髖部骨折手術後「應早期下床負重」以降低肺炎/褥瘡/血栓/死亡(術後1年死亡率仍上升), 臥床不動是錯誤處置。骨質疏鬆是主要背景。","options":{"A":"正確:常見於骨質疏鬆者。","B":"正確:手術多為較佳處置。","C":"正確:術後1年內死亡率仍上升。","D":"★錯誤(本題答案):應早期下床活動, 非臥床。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"103100-63":{"quick":"最正確 B:reverse oblique型轉子間骨折屬「不穩定」骨折。","detail":{"background":"髖部骨折分兩大類, 治療原則迥異:①關節囊「內」股骨頸骨折(intracapsular femoral neck)——股骨頭血供「逆行」(經支持帶血管/旋股內側動脈), 移位骨折易破壞血供→「缺血性壞死(AVN)與不癒合」為主要併發症。Garden 分類I–IV(I/II 為無移位/嵌入, III/IV 為移位)。年輕高能量→緊急復位內固定(ORIF, 救血供); 老年移位骨折→「人工關節置換」(半髖 hemiarthroplasty 或全髖, 活動度高者用全髖)。②關節囊「外」轉子間/轉子區骨折(intertrochanteric)——血供佳「少 AVN」, 治療以「復位內固定」(動態髖螺釘 DHS 或髓內釘 cephalomedullary nail), reverse oblique/粉碎型屬「不穩定」骨折宜髓內釘。老年髖部骨折手術後「應早期下床負重」以降低肺炎/褥瘡/血栓/死亡(術後1年死亡率仍上升), 臥床不動是錯誤處置。骨質疏鬆是主要背景。","options":{"A":"錯:轉子間骨折屬關節囊「外」, 非囊內。","B":"★正確(本題答案):reverse oblique屬不穩定骨折(宜髓內釘)。","C":"錯:轉子間骨折(囊外、血供佳)以「手術復位內固定」為原則, 即使穩定型亦多手術以利早期活動。","D":"錯:轉子間骨折治療為復位內固定(DHS/髓內釘), 非半髖置換(置換多用於囊內移位骨折)。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"104030-58":{"quick":"不是Ottawa準則的是 D:「足踝背屈活動受限」非 Ottawa ankle rules 之判斷準則。","detail":{"background":"踝關節:外側扭傷(內翻+蹠屈)最常傷「前距腓韌帶(ATFL)」;Ottawa ankle rules(決定是否照X光):內踝或外踝後緣6cm內壓痛、第5蹠骨基底或舟狀骨壓痛、或「受傷當下及急診均無法負重走4步」;「背屈活動受限」不是 Ottawa 準則。Lauge-Hansen 依足位+力向分類(旋後-外旋 SER 最常見);踝部X光三相=AP、側位、Mortise(榫眼位, 內旋15–20度看踝穴/距骨外移);「跟骨骨折」靠側位看 Böhler 角與軸位(Harris view), 非靠AP。Maisonneuve 骨折=內翻外旋致近端腓骨骨折+下脛腓聯合(syndesmosis)損傷。","options":{"A":"是準則:內踝後緣壓痛。","B":"是準則:外踝後緣壓痛。","C":"是準則:無法負重走4步。","D":"★不是(本題答案):背屈受限非Ottawa準則。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"104030-59":{"quick":"B:影像示距骨(talus)骨折。","detail":{"background":"跟骨(calcaneus)骨折=最常見跗骨骨折, 軸向墜落, 約10%合併「腰椎壓迫骨折」、可雙側;可致足跟腔室症候群→爪狀趾(clawing);Böhler 角正常25–40度, 「<20度」提示塌陷(故「正常<20度」敘述錯誤);Essex-Lopresti 分舌型(tongue)與關節壓陷型(joint depression)。Lisfranc 損傷=跗蹠關節(tarsometatarsal)損傷, Lisfranc 韌帶連「內側楔狀骨(medial cuneiform)與第二蹠骨基底」(非第一蹠骨);AP 見第1、2蹠骨基底間隙增大、斜位見第4蹠骨內緣與骰骨不連續→須警覺(易漏診)。距骨(talus)骨折血供逆行, 易AVN。","options":{"A":"跟骨骨折Böhler角塌陷。","B":"★正確(本題答案):距骨骨折(血供逆行易AVN)。","C":"舟狀骨骨折。","D":"骰骨骨折(nutcracker)。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"104030-63":{"quick":"最正確 B:年輕人股骨頸骨折常見於高能量創傷。","detail":{"background":"髖部骨折分兩大類, 治療原則迥異:①關節囊「內」股骨頸骨折(intracapsular femoral neck)——股骨頭血供「逆行」(經支持帶血管/旋股內側動脈), 移位骨折易破壞血供→「缺血性壞死(AVN)與不癒合」為主要併發症。Garden 分類I–IV(I/II 為無移位/嵌入, III/IV 為移位)。年輕高能量→緊急復位內固定(ORIF, 救血供); 老年移位骨折→「人工關節置換」(半髖 hemiarthroplasty 或全髖, 活動度高者用全髖)。②關節囊「外」轉子間/轉子區骨折(intertrochanteric)——血供佳「少 AVN」, 治療以「復位內固定」(動態髖螺釘 DHS 或髓內釘 cephalomedullary nail), reverse oblique/粉碎型屬「不穩定」骨折宜髓內釘。老年髖部骨折手術後「應早期下床負重」以降低肺炎/褥瘡/血栓/死亡(術後1年死亡率仍上升), 臥床不動是錯誤處置。骨質疏鬆是主要背景。","options":{"A":"錯:Garden II為無移位(嵌入), 非移位。","B":"★正確(本題答案):年輕人股骨頸骨折多為高能量。","C":"錯:移位股骨頸骨折老年人多採「置換」(年輕人才ORIF救血供), 非一律ORIF。","D":"錯:AVN與不癒合是重要併發症, 但發生率非「最常見」(發生率取決於移位程度)。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"104030-76":{"quick":"最適當 D:72歲移位股骨頸骨折→人工半髖關節置換(hemiarthroplasty)。","detail":{"background":"髖部骨折分兩大類, 治療原則迥異:①關節囊「內」股骨頸骨折(intracapsular femoral neck)——股骨頭血供「逆行」(經支持帶血管/旋股內側動脈), 移位骨折易破壞血供→「缺血性壞死(AVN)與不癒合」為主要併發症。Garden 分類I–IV(I/II 為無移位/嵌入, III/IV 為移位)。年輕高能量→緊急復位內固定(ORIF, 救血供); 老年移位骨折→「人工關節置換」(半髖 hemiarthroplasty 或全髖, 活動度高者用全髖)。②關節囊「外」轉子間/轉子區骨折(intertrochanteric)——血供佳「少 AVN」, 治療以「復位內固定」(動態髖螺釘 DHS 或髓內釘 cephalomedullary nail), reverse oblique/粉碎型屬「不穩定」骨折宜髓內釘。老年髖部骨折手術後「應早期下床負重」以降低肺炎/褥瘡/血栓/死亡(術後1年死亡率仍上升), 臥床不動是錯誤處置。骨質疏鬆是主要背景。","options":{"A":"石膏無法固定股骨頸。","B":"皮膚牽引非確定治療。","C":"骨骼牽引非確定治療。","D":"★正確(本題答案):老年移位股骨頸骨折行人工關節置換。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"104090-58":{"quick":"最佳 C:成人股骨幹骨折首選「鎖定式髓內釘」(癒合佳、可早期負重)。","detail":{"background":"股骨幹骨折(高能量)成人首選「鎖定式髓內釘(interlocking IM nail)」(癒合率高、可早期負重);可能大出血(每側1–1.5 L)、合併脂肪栓塞。脂肪栓塞症候群(FES)典型於長骨/骨盆骨折後24–72小時, 三徵=低血氧呼吸窘迫、神經症狀、瘀斑(petechiae);治療支持性+早期骨折固定。","options":{"A":"骨骼牽引為暫時性, 非確定治療。","B":"石膏無法穩定股骨幹。","C":"★正確(本題答案):interlocking IM nail為金標準。","D":"外固定多用於開放性/嚴重污染暫時固定。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"105020-58":{"quick":"錯 C:髕骨骨折應「盡量保留髕骨」, 全髕骨切除會削弱伸膝, 非治療效果最好。","detail":{"background":"髕骨骨折:多為「直接外力」(撞擊/跪地)或間接(股四頭強力收縮)。無移位且伸直機轉完整→保守(伸直位固定+早期復健);移位/伸直機轉斷裂→手術(張力帶鋼絲/鋼板)。應「盡量保留髕骨」(髕骨提供伸膝力臂與槓桿), 「全髕骨切除(total patellectomy)」會大幅削弱伸膝力量, 非首選/治療效果最好之說法錯誤。","options":{"A":"正確:多為直接外力。","B":"正確:無移位且伸直機轉完整可保守。","C":"★錯誤(本題答案):total patellectomy削弱伸膝力, 非最佳。","D":"正確:術後應早期復健恢復活動範圍。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"105020-63":{"quick":"正確 C:骨盆骨折機轉以「側方壓迫(lateral compression)」最常見。","detail":{"background":"骨盆骨折:多數為穩定型, 保守治療佳;高能量不穩定型可致大出血(主要為「靜脈叢與骨鬆質出血」, 真正動脈出血<10–20%)。「後環(骶髂)」損傷比前環更易大出血。機轉(Young-Burgess):前後壓迫(APC, open-book)、側方壓迫(LC, 最常見)、垂直剪力(VS, vertical shear, 易傷上臀動脈 superior gluteal a.)。恥骨聯合分離>2.5 cm 提示後環不穩, 需外固定/手術。骨盆骨折「不會」造成「大腿腔室症候群」(大腿腔室大);可合併泌尿生殖道、神經(腰薦叢)損傷與慢性下背痛。骨盆斜位/出入口照與 Judet 斜位用於評估。","options":{"A":"錯:坐姿時重力主要由「坐骨結節」承受, 非髖關節。","B":"錯:判斷半骨盆內外轉用「入口/出口位」與斜位, outlet主要看垂直移位。","C":"★正確(本題答案):側方壓迫(LC)最常見。","D":"錯:恥骨聯合分離>2.5cm才提示不穩需手術, 非>1cm。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"106020-58":{"quick":"D:移位性股骨頸骨折最易致股骨頭壞死(血供逆行、囊內)。","detail":{"background":"髖部骨折分兩大類, 治療原則迥異:①關節囊「內」股骨頸骨折(intracapsular femoral neck)——股骨頭血供「逆行」(經支持帶血管/旋股內側動脈), 移位骨折易破壞血供→「缺血性壞死(AVN)與不癒合」為主要併發症。Garden 分類I–IV(I/II 為無移位/嵌入, III/IV 為移位)。年輕高能量→緊急復位內固定(ORIF, 救血供); 老年移位骨折→「人工關節置換」(半髖 hemiarthroplasty 或全髖, 活動度高者用全髖)。②關節囊「外」轉子間/轉子區骨折(intertrochanteric)——血供佳「少 AVN」, 治療以「復位內固定」(動態髖螺釘 DHS 或髓內釘 cephalomedullary nail), reverse oblique/粉碎型屬「不穩定」骨折宜髓內釘。老年髖部骨折手術後「應早期下床負重」以降低肺炎/褥瘡/血栓/死亡(術後1年死亡率仍上升), 臥床不動是錯誤處置。骨質疏鬆是主要背景。","options":{"A":"股骨幹骨折較少致頭壞死。","B":"轉子間骨折血供佳少壞死。","C":"轉子下骨折較少致頭壞死。","D":"★正確(本題答案):移位股骨頸骨折易AVN。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"107020-56":{"quick":"錯 A:判讀「骨折型態」公認CT優於MRI;MRI對軟組織較佳但非更精準判讀骨折型態。","detail":{"background":"脛骨平台骨折(tibial plateau, 高能量「保險桿損傷」)以 Schatzker 分類I–VI;I型=外側單純劈裂(年輕人, 骨質好);III型=外側純壓陷(老年);IV–VI型高能量。CT 對「關節面台階與骨折型態」判讀優於X光(MRI 對軟組織/韌帶較佳, 但判讀「骨折型態」公認CT較精準);可合併腓神經、膕血管、半月板/十字韌帶損傷、腔室症候群。脛骨近端「前外側」骨折/Segond 骨折常合併「前十字韌帶(ACL)」損傷。","options":{"A":"★錯誤(本題答案):骨折型態判讀CT優於MRI。","B":"正確:可合併韌帶/半月板損傷。","C":"正確:可致腔室症候群須監測。","D":"正確:關節面不平整可致創傷後關節炎。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"108030-59":{"quick":"錯 B:Lisfranc韌帶連「內側楔狀骨與第二蹠骨基底」,非第二楔狀骨與第一蹠骨。","detail":{"background":"跟骨(calcaneus)骨折=最常見跗骨骨折, 軸向墜落, 約10%合併「腰椎壓迫骨折」、可雙側;可致足跟腔室症候群→爪狀趾(clawing);Böhler 角正常25–40度, 「<20度」提示塌陷(故「正常<20度」敘述錯誤);Essex-Lopresti 分舌型(tongue)與關節壓陷型(joint depression)。Lisfranc 損傷=跗蹠關節(tarsometatarsal)損傷, Lisfranc 韌帶連「內側楔狀骨(medial cuneiform)與第二蹠骨基底」(非第一蹠骨);AP 見第1、2蹠骨基底間隙增大、斜位見第4蹠骨內緣與骰骨不連續→須警覺(易漏診)。距骨(talus)骨折血供逆行, 易AVN。","options":{"A":"正確:屬跗蹠關節損傷。","B":"★錯誤(本題答案):Lisfranc韌帶在內側楔狀骨↔第2蹠骨基底。","C":"正確:AP見第1、2蹠骨基底間距增大須警覺。","D":"正確:斜位見第4蹠骨內緣與骰骨不連續。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"109020-61":{"quick":"B:肢體短縮+屈曲內收內旋=髖關節「後位」脫臼。","detail":{"background":"創傷性髖關節脫位多為高能量(車禍儀表板撞擊膝→力沿股骨傳遞):「後脫位(約90%)」典型姿勢=患肢「短縮、屈曲、內收、內旋」, 易傷坐骨神經(足下垂)、股骨頭壞死;「前脫位」姿勢=「外展、外旋、屈曲/伸直」。為骨科急症, 應「6小時內」緊急復位以降低 AVN。常合併髖臼後壁骨折(fracture-dislocation)→CT 評估。","options":{"A":"前脫位為外展外旋。","B":"★正確(本題答案):後脫位=短縮、屈曲、內收、內旋。","C":"股骨頸骨折肢體短縮外旋, 但無屈曲內收內旋之脫位姿勢。","D":"轉子間骨折外旋短縮, 非此姿勢。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"109080-60":{"quick":"最不適當 C:跟骨骨折靠「側位(Böhler角)與軸位」判斷, 非AP;AP非跟骨骨折最佳相位。","detail":{"background":"踝關節:外側扭傷(內翻+蹠屈)最常傷「前距腓韌帶(ATFL)」;Ottawa ankle rules(決定是否照X光):內踝或外踝後緣6cm內壓痛、第5蹠骨基底或舟狀骨壓痛、或「受傷當下及急診均無法負重走4步」;「背屈活動受限」不是 Ottawa 準則。Lauge-Hansen 依足位+力向分類(旋後-外旋 SER 最常見);踝部X光三相=AP、側位、Mortise(榫眼位, 內旋15–20度看踝穴/距骨外移);「跟骨骨折」靠側位看 Böhler 角與軸位(Harris view), 非靠AP。Maisonneuve 骨折=內翻外旋致近端腓骨骨折+下脛腓聯合(syndesmosis)損傷。","options":{"A":"正確:踝部三相=AP、側位、Mortise。","B":"正確:Mortise位看距骨外移。","C":"★最不適當(本題答案):跟骨骨折非靠AP判斷(靠側位Böhler角/軸位)。","D":"正確:側位看後踝骨折。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"111020-57":{"quick":"最不適當 C:骨盆骨折不會造成「大腿」腔室症候群(大腿腔室容積大)。","detail":{"background":"骨盆骨折:多數為穩定型, 保守治療佳;高能量不穩定型可致大出血(主要為「靜脈叢與骨鬆質出血」, 真正動脈出血<10–20%)。「後環(骶髂)」損傷比前環更易大出血。機轉(Young-Burgess):前後壓迫(APC, open-book)、側方壓迫(LC, 最常見)、垂直剪力(VS, vertical shear, 易傷上臀動脈 superior gluteal a.)。恥骨聯合分離>2.5 cm 提示後環不穩, 需外固定/手術。骨盆骨折「不會」造成「大腿腔室症候群」(大腿腔室大);可合併泌尿生殖道、神經(腰薦叢)損傷與慢性下背痛。骨盆斜位/出入口照與 Judet 斜位用於評估。","options":{"A":"正確:多數骨盆骨折穩定, 保守佳。","B":"正確:可合併神經(腰薦叢)損傷。","C":"★最不適當(本題答案):大腿腔室大, 骨盆骨折罕致大腿腔室症候群。","D":"正確:不穩定骨盆骨折可遺留下背痛。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"111020-58":{"quick":"最不適當 C:張力帶鋼絲是把「牽引力/張力轉換為擠壓力(compression)」, 敘述方向相反。","detail":{"background":"脛骨平台骨折(tibial plateau, 高能量「保險桿損傷」)以 Schatzker 分類I–VI;I型=外側單純劈裂(年輕人, 骨質好);III型=外側純壓陷(老年);IV–VI型高能量。CT 對「關節面台階與骨折型態」判讀優於X光(MRI 對軟組織/韌帶較佳, 但判讀「骨折型態」公認CT較精準);可合併腓神經、膕血管、半月板/十字韌帶損傷、腔室症候群。脛骨近端「前外側」骨折/Segond 骨折常合併「前十字韌帶(ACL)」損傷。","options":{"A":"正確:Lauge-Hansen以旋後-外旋型最常見。","B":"正確:Schatzker I為外側單純劈裂, 好發年輕人。","C":"★最不適當(本題答案):張力帶是將張力轉為「擠壓力」, 非轉為牽引/剪力。","D":"正確:Garden依位移程度、Pauwels依骨折線與水平面交角。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"111080-58":{"quick":"最適當 A:髖臼由三向放射狀軟骨組成、關節面覆蓋透明軟骨(正確)。","detail":{"background":"髖臼由「三向放射狀軟骨(triradiate cartilage, Y形生長軟骨)」發育而成、關節面覆蓋透明軟骨;兩柱概念(Letournel):前柱、後柱。Judet 斜位(45度):「閉孔斜位(obturator oblique)」看「前柱+後壁」;「髂骨斜位(iliac oblique)」看「後柱+前壁」。骨盆/髖部撕除性骨折(青少年運動員)肌肉-附著點配對:縫匠肌-髂前「上」棘(ASIS)、股直肌-髂前「下」棘(AIIS)、繩肌(hamstring)-坐骨結節、髂腰肌-股骨小轉子、腹肌-髂嵴。故「股直肌-ASIS」是錯誤配對(股直肌附著於 AIIS)。","options":{"A":"★正確(本題答案):triradiate cartilage發育+透明軟骨覆蓋。","B":"錯:Judet斜位是傾斜「45度」, 非60度。","C":"錯:閉孔斜位看「前柱+後壁」(非後柱+前壁)。","D":"錯:髂骨斜位看「後柱+前壁」(非前柱+後緣)。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"111080-59":{"quick":"最不適當 B:股直肌附著於髂前「下」棘(AIIS), 非髂前上棘(ASIS, 為縫匠肌)。","detail":{"background":"髖臼由「三向放射狀軟骨(triradiate cartilage, Y形生長軟骨)」發育而成、關節面覆蓋透明軟骨;兩柱概念(Letournel):前柱、後柱。Judet 斜位(45度):「閉孔斜位(obturator oblique)」看「前柱+後壁」;「髂骨斜位(iliac oblique)」看「後柱+前壁」。骨盆/髖部撕除性骨折(青少年運動員)肌肉-附著點配對:縫匠肌-髂前「上」棘(ASIS)、股直肌-髂前「下」棘(AIIS)、繩肌(hamstring)-坐骨結節、髂腰肌-股骨小轉子、腹肌-髂嵴。故「股直肌-ASIS」是錯誤配對(股直肌附著於 AIIS)。","options":{"A":"正確:腹肌-髂嵴。","B":"★最不適當(本題答案):股直肌-AIIS, 非ASIS。","C":"正確:繩肌-坐骨結節。","D":"正確:髂腰肌-股骨小轉子。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"111080-63":{"quick":"最適當 D:年輕高能量股骨頸骨折, Shenton line不連續代表移位較大。","detail":{"background":"髖部骨折分兩大類, 治療原則迥異:①關節囊「內」股骨頸骨折(intracapsular femoral neck)——股骨頭血供「逆行」(經支持帶血管/旋股內側動脈), 移位骨折易破壞血供→「缺血性壞死(AVN)與不癒合」為主要併發症。Garden 分類I–IV(I/II 為無移位/嵌入, III/IV 為移位)。年輕高能量→緊急復位內固定(ORIF, 救血供); 老年移位骨折→「人工關節置換」(半髖 hemiarthroplasty 或全髖, 活動度高者用全髖)。②關節囊「外」轉子間/轉子區骨折(intertrochanteric)——血供佳「少 AVN」, 治療以「復位內固定」(動態髖螺釘 DHS 或髓內釘 cephalomedullary nail), reverse oblique/粉碎型屬「不穩定」骨折宜髓內釘。老年髖部骨折手術後「應早期下床負重」以降低肺炎/褥瘡/血栓/死亡(術後1年死亡率仍上升), 臥床不動是錯誤處置。骨質疏鬆是主要背景。","options":{"A":"Garden II為無移位嵌入, 與「不完全」描述不符本例移位骨折。","B":"年輕人應救血供行ORIF, 非雙極半髖置換。","C":"雖AVN/不癒合機率高, 但急診不需先做bone scan, 應緊急復位內固定。","D":"★正確(本題答案):Shenton line不連續=移位程度較大。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"112020-73":{"quick":"B:左髖外傷, 影像示髖關節「後脫位合併骨折」(posterior fracture-dislocation)。","detail":{"background":"創傷性髖關節脫位多為高能量(車禍儀表板撞擊膝→力沿股骨傳遞):「後脫位(約90%)」典型姿勢=患肢「短縮、屈曲、內收、內旋」, 易傷坐骨神經(足下垂)、股骨頭壞死;「前脫位」姿勢=「外展、外旋、屈曲/伸直」。為骨科急症, 應「6小時內」緊急復位以降低 AVN。常合併髖臼後壁骨折(fracture-dislocation)→CT 評估。","options":{"A":"前脫位較少見。","B":"★正確(本題答案):後脫位合併髖臼後壁骨折。","C":"異位骨化為後期併發症, 非急性診斷。","D":"股骨頭壞死為後期併發症。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"114020-57":{"quick":"最不適當 B:內翻蹠屈傷的是「外側」韌帶(ATFL);內側三角韌帶撕除性骨折是「外翻/外旋」機轉。","detail":{"background":"踝關節:外側扭傷(內翻+蹠屈)最常傷「前距腓韌帶(ATFL)」;Ottawa ankle rules(決定是否照X光):內踝或外踝後緣6cm內壓痛、第5蹠骨基底或舟狀骨壓痛、或「受傷當下及急診均無法負重走4步」;「背屈活動受限」不是 Ottawa 準則。Lauge-Hansen 依足位+力向分類(旋後-外旋 SER 最常見);踝部X光三相=AP、側位、Mortise(榫眼位, 內旋15–20度看踝穴/距骨外移);「跟骨骨折」靠側位看 Böhler 角與軸位(Harris view), 非靠AP。Maisonneuve 骨折=內翻外旋致近端腓骨骨折+下脛腓聯合(syndesmosis)損傷。","options":{"A":"正確:內翻最常傷前距腓韌帶(ATFL)。","B":"★最不適當(本題答案):三角韌帶傷為外翻機轉, 與本例內翻不符。","C":"正確:可造成雙踝/三踝骨折。","D":"正確:可傷下脛腓聯合致不穩。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"114070-73":{"quick":"A:脛骨近端(前外側/Segond型)骨折最常合併「前十字韌帶(ACL)」損傷。","detail":{"background":"脛骨平台骨折(tibial plateau, 高能量「保險桿損傷」)以 Schatzker 分類I–VI;I型=外側單純劈裂(年輕人, 骨質好);III型=外側純壓陷(老年);IV–VI型高能量。CT 對「關節面台階與骨折型態」判讀優於X光(MRI 對軟組織/韌帶較佳, 但判讀「骨折型態」公認CT較精準);可合併腓神經、膕血管、半月板/十字韌帶損傷、腔室症候群。脛骨近端「前外側」骨折/Segond 骨折常合併「前十字韌帶(ACL)」損傷。","options":{"A":"★正確(本題答案):脛骨平台/Segond骨折常合併ACL損傷。","B":"PCL多與儀表板/脛骨後移相關。","C":"MCL與外翻力相關。","D":"臏韌帶與伸膝機轉相關。"},"sources":["Harrison 21e","Rockwood and Green Fractures in Adults 9e","AAOS OKU"]}},"102110-58":{"quick":"C:外展外旋肩外上方痛、主動上舉受限但「被動可過肩」=夾擊症候群(impingement)。","detail":{"background":"肩部軟組織病變:旋轉肌袖(rotator cuff)=「SITS」=肩胛下肌(subscapularis)、岡上肌(supraspinatus)、岡下肌(infraspinatus)、小圓肌(teres minor);「大圓肌(teres major)」不屬旋轉肌袖。夾擊症候群(impingement)=岡上肌腱/肩峰下滑囊在肩峰下被夾擠, 外展60–120度「疼痛弧」, 主動上舉受限但「被動可上舉過肩」(與冰凍肩不同)。冰凍肩(adhesive capsulitis)=40–60歲女性、好發非慣用側、與糖尿病/甲狀腺相關, 「主動與被動活動皆受限」、自限性(經歷凍結-冰凍-解凍期), 關節造影見關節囊容積「縮小」(故「腋囊脹大充滿造影劑」敘述錯誤)。鈣化性肌腱炎(calcific tendinitis)=岡上肌腱鈣化沉積、X光見肩峰下圓形鈣化影。肱二頭肌長頭肌腱斷裂=「Popeye 上臂」(肌腹下移成球狀)。不安測試(apprehension test)=肩外展90度+「外旋」誘發前脫位恐懼感(評估前向不穩);Kim test/Jerk test=評估「後向」不穩;sulcus sign=評估下向不穩/多向不穩。","options":{"A":"肩胛上神經夾陷致岡上/岡下肌無力萎縮, 非此表現。","B":"冰凍肩主動「與被動」皆受限(被動無法過肩)。","C":"★正確(本題答案):被動可上舉過肩、疼痛弧=夾擊症候群。","D":"肱二頭肌腱斷裂呈Popeye, 非此表現。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"103030-60":{"quick":"B:OCD 最少發生於「肩關節」(好發膝>肘>踝)。","detail":{"background":"剝離性骨軟骨炎(osteochondritis dissecans, OCD)=軟骨下骨缺血致骨軟骨碎片分離, 好發部位=「膝(股骨內髁外側面最常見)」、肘(肱骨小頭)、踝(距骨);「肩關節最少」。","options":{"A":"肘(肱骨小頭)可發生。","B":"★正確(本題答案):肩關節最少發生OCD。","C":"膝(股骨內髁)最常見。","D":"踝(距骨)可發生。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"103030-61":{"quick":"C:網球肘傷的是伸腕肌總腱, 尤以「橈側伸腕短肌(ECRB)」為主。","detail":{"background":"肱骨外上髁炎(lateral epicondylitis)=「網球肘」, 伸腕肌總腱(尤其橈側伸腕短肌 ECRB)起點退化, 抗阻力伸腕/握拳誘發外側痛;內上髁炎=「高爾夫球肘」(屈腕旋前肌)。注意:「外」上髁炎=網球肘, 稱其為高爾夫球肘是錯誤。de Quervain 腱鞘炎=拇長展肌/拇短伸肌(第一背側腔室)腱鞘炎, Finkelstein test 陽性。扳機指(trigger finger)=「A1 滑車」狹窄性腱鞘炎。手指肌腱損傷:槌狀指(mallet finger)=末節伸肌腱止點斷裂→DIP 無法主動伸直(籃球撞指尖), 未治療可續發鵝頸畸形(swan neck);jersey finger=屈指深肌腱(FDP)撕脫→DIP無法屈;鈕扣畸形(boutonnière)=中央束斷裂→PIP屈曲、DIP過伸。","options":{"A":"橈側屈腕肌為屈肌(內上髁), 非外上髁。","B":"深屈指肌非外上髁起點。","C":"★正確(本題答案):ECRB為網球肘主要受累肌腱。","D":"旋前圓肌屬內上髁(屈肌旋前群)。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"103100-59":{"quick":"錯 C:冰凍肩關節囊「容積縮小」、造影劑充填減少;「腋囊脹大充滿造影劑」錯誤。","detail":{"background":"肩部軟組織病變:旋轉肌袖(rotator cuff)=「SITS」=肩胛下肌(subscapularis)、岡上肌(supraspinatus)、岡下肌(infraspinatus)、小圓肌(teres minor);「大圓肌(teres major)」不屬旋轉肌袖。夾擊症候群(impingement)=岡上肌腱/肩峰下滑囊在肩峰下被夾擠, 外展60–120度「疼痛弧」, 主動上舉受限但「被動可上舉過肩」(與冰凍肩不同)。冰凍肩(adhesive capsulitis)=40–60歲女性、好發非慣用側、與糖尿病/甲狀腺相關, 「主動與被動活動皆受限」、自限性(經歷凍結-冰凍-解凍期), 關節造影見關節囊容積「縮小」(故「腋囊脹大充滿造影劑」敘述錯誤)。鈣化性肌腱炎(calcific tendinitis)=岡上肌腱鈣化沉積、X光見肩峰下圓形鈣化影。肱二頭肌長頭肌腱斷裂=「Popeye 上臂」(肌腹下移成球狀)。不安測試(apprehension test)=肩外展90度+「外旋」誘發前脫位恐懼感(評估前向不穩);Kim test/Jerk test=評估「後向」不穩;sulcus sign=評估下向不穩/多向不穩。","options":{"A":"正確:好發40–60歲女性。","B":"正確:好發非慣用側。","C":"★錯誤(本題答案):冰凍肩關節囊縮小, 非脹大充滿造影劑。","D":"正確:多為自限性。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"104030-57":{"quick":"錯 B:蹠骨應力骨折最常在「第二/三蹠骨(行軍骨折)」,非第一蹠骨。","detail":{"background":"應力性骨折(stress fracture)=反覆負重之過度使用傷害(新兵、跑者、舞者), 下肢最常見為「脛骨」, 蹠骨應力骨折最常在「第二/三蹠骨(行軍骨折)」非第一蹠骨;肱骨應力骨折見於投手。X光早期常陰性(2–3週後才見骨痂/骨膜反應), 骨掃描(bone scan)早期即敏感(但特異性低於MRI), MRI 為高敏高特異首選。女運動員三聯症(female athlete triad)=能量不足/飲食失調+停經+骨質疏鬆→易應力骨折。治療「保守為主」=休息、減負重、矯正訓練量;多數不需手術(高風險部位如股骨頸張力側、舟狀骨、第5蹠骨基底等才考慮手術), 「最佳治療為手術復位骨釘固定」之絕對敘述錯誤。彈響髖(snapping hip)外側型=髂脛束/臀大肌越過大轉子;內側型=髂腰肌腱越過髂恥隆起;「股外側肌」不跨越骨突, 不造成彈響髖。","options":{"A":"正確:脛骨為下肢最常見應力骨折。","B":"★錯誤(本題答案):好發第2/3蹠骨, 非第1蹠骨。","C":"正確:肱骨應力骨折見於投手。","D":"正確:治療以休息、避免反覆負重為主。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"104030-60":{"quick":"B:跑者左膝外側、屈伸某角度尖銳痛(全伸/深屈不痛)=髂脛束摩擦症候群。","detail":{"background":"膝韌帶/半月板:前十字韌帶(ACL)=防止脛骨「前移」、控制旋轉, 「非接觸性扭轉/落地」受傷, 受傷當下「啪聲+快速關節血腫(hemarthrosis, 抽出暗紅血)」, 慢性致「giving way(打軟腿)」。ACL 分前內側束(屈曲緊)與後外側束(「伸直時緊」, 故「伸直時後外側束鬆弛」敘述錯誤)。後十字韌帶(PCL)=防脛骨後移, 「儀表板損傷(dashboard, 屈膝脛骨前方受撞)」機轉、後抽屜/後沉徵。unhappy triad=ACL+內側副韌帶(MCL)+「內側」半月板(經典描述;近代外側半月板亦常見)。半月板:內側半月板較大且固定(覆蓋脛骨平台較大面積、活動度小→較易破裂);白-白區(white-white)血供差癒合不良。半月板破裂典型「卡住(locking)、無法完全伸直、McMurray/Apley 陽性」。膝關節脫位=高能量急症, 「高比例膕動脈損傷」, 即使自動復位、足背/脛後動脈搏動正常「仍不可排除」內膜損傷(須ABI/血管影像), 並排查腓神經與多韌帶損傷。髂脛束摩擦症候群(ITB friction)=跑者膝外側痛, 屈膝約30度時 ITB 摩擦股骨外上髁(全伸/深屈反而不痛)。髕骨脫位危險因子=高位髕骨(patella alta)、Q角「過大」、滑車發育不良、外側支持帶過緊、膝外翻、髕骨活動度大;故「較小Q角」最不易致髕骨脫位。","options":{"A":"外側副韌帶拉傷與內翻應力相關, 非反覆摩擦。","B":"★正確(本題答案):ITB friction syndrome(跑者膝外側)。","C":"股二頭肌腱炎位於膝後外, 非此表現。","D":"外側半月板損傷有卡住/積液, 非此摩擦痛。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"104090-59":{"quick":"最不可能 A:股外側肌不跨越骨突, 不造成彈響髖(外側型為ITB/臀大肌、內側型為髂腰肌)。","detail":{"background":"應力性骨折(stress fracture)=反覆負重之過度使用傷害(新兵、跑者、舞者), 下肢最常見為「脛骨」, 蹠骨應力骨折最常在「第二/三蹠骨(行軍骨折)」非第一蹠骨;肱骨應力骨折見於投手。X光早期常陰性(2–3週後才見骨痂/骨膜反應), 骨掃描(bone scan)早期即敏感(但特異性低於MRI), MRI 為高敏高特異首選。女運動員三聯症(female athlete triad)=能量不足/飲食失調+停經+骨質疏鬆→易應力骨折。治療「保守為主」=休息、減負重、矯正訓練量;多數不需手術(高風險部位如股骨頸張力側、舟狀骨、第5蹠骨基底等才考慮手術), 「最佳治療為手術復位骨釘固定」之絕對敘述錯誤。彈響髖(snapping hip)外側型=髂脛束/臀大肌越過大轉子;內側型=髂腰肌腱越過髂恥隆起;「股外側肌」不跨越骨突, 不造成彈響髖。","options":{"A":"★最不可能(本題答案):股外側肌不跨骨突。","B":"髂脛束→外側彈響髖。","C":"臀大肌→外側彈響髖。","D":"髂腰肌腱→內側彈響髖。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"105100-60":{"quick":"錯 C:「內側」半月板較大、覆蓋脛骨平台面積較大且固定;「比外側彎曲」描述有誤(外側半月板更呈C/O形且活動度大)。","detail":{"background":"膝韌帶/半月板:前十字韌帶(ACL)=防止脛骨「前移」、控制旋轉, 「非接觸性扭轉/落地」受傷, 受傷當下「啪聲+快速關節血腫(hemarthrosis, 抽出暗紅血)」, 慢性致「giving way(打軟腿)」。ACL 分前內側束(屈曲緊)與後外側束(「伸直時緊」, 故「伸直時後外側束鬆弛」敘述錯誤)。後十字韌帶(PCL)=防脛骨後移, 「儀表板損傷(dashboard, 屈膝脛骨前方受撞)」機轉、後抽屜/後沉徵。unhappy triad=ACL+內側副韌帶(MCL)+「內側」半月板(經典描述;近代外側半月板亦常見)。半月板:內側半月板較大且固定(覆蓋脛骨平台較大面積、活動度小→較易破裂);白-白區(white-white)血供差癒合不良。半月板破裂典型「卡住(locking)、無法完全伸直、McMurray/Apley 陽性」。膝關節脫位=高能量急症, 「高比例膕動脈損傷」, 即使自動復位、足背/脛後動脈搏動正常「仍不可排除」內膜損傷(須ABI/血管影像), 並排查腓神經與多韌帶損傷。髂脛束摩擦症候群(ITB friction)=跑者膝外側痛, 屈膝約30度時 ITB 摩擦股骨外上髁(全伸/深屈反而不痛)。髕骨脫位危險因子=高位髕骨(patella alta)、Q角「過大」、滑車發育不良、外側支持帶過緊、膝外翻、髕骨活動度大;故「較小Q角」最不易致髕骨脫位。","options":{"A":"正確:半月板承重並增加吻合度。","B":"正確:提供本體覺。","C":"★錯誤(本題答案):外側半月板較圓彎、活動度大;內側半月板較大但非「較彎曲」。","D":"正確:white-white區血供差癒合不良。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"105100-72":{"quick":"B:跌倒後肩痛、X光見肩峰下圓形鈣化影=鈣化性肌腱炎(calcified tendinosis)。","detail":{"background":"肩部軟組織病變:旋轉肌袖(rotator cuff)=「SITS」=肩胛下肌(subscapularis)、岡上肌(supraspinatus)、岡下肌(infraspinatus)、小圓肌(teres minor);「大圓肌(teres major)」不屬旋轉肌袖。夾擊症候群(impingement)=岡上肌腱/肩峰下滑囊在肩峰下被夾擠, 外展60–120度「疼痛弧」, 主動上舉受限但「被動可上舉過肩」(與冰凍肩不同)。冰凍肩(adhesive capsulitis)=40–60歲女性、好發非慣用側、與糖尿病/甲狀腺相關, 「主動與被動活動皆受限」、自限性(經歷凍結-冰凍-解凍期), 關節造影見關節囊容積「縮小」(故「腋囊脹大充滿造影劑」敘述錯誤)。鈣化性肌腱炎(calcific tendinitis)=岡上肌腱鈣化沉積、X光見肩峰下圓形鈣化影。肱二頭肌長頭肌腱斷裂=「Popeye 上臂」(肌腹下移成球狀)。不安測試(apprehension test)=肩外展90度+「外旋」誘發前脫位恐懼感(評估前向不穩);Kim test/Jerk test=評估「後向」不穩;sulcus sign=評估下向不穩/多向不穩。","options":{"A":"大結節撕脫骨折影像不同。","B":"★正確(本題答案):岡上肌腱鈣化沉積=calcified tendinosis。","C":"骨轉移為溶骨/成骨性破壞影。","D":"原發成骨性骨腫瘤影像不符。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"106020-77":{"quick":"錯 B:「外」上髁炎=網球肘;高爾夫球肘是「內」上髁炎。","detail":{"background":"肱骨外上髁炎(lateral epicondylitis)=「網球肘」, 伸腕肌總腱(尤其橈側伸腕短肌 ECRB)起點退化, 抗阻力伸腕/握拳誘發外側痛;內上髁炎=「高爾夫球肘」(屈腕旋前肌)。注意:「外」上髁炎=網球肘, 稱其為高爾夫球肘是錯誤。de Quervain 腱鞘炎=拇長展肌/拇短伸肌(第一背側腔室)腱鞘炎, Finkelstein test 陽性。扳機指(trigger finger)=「A1 滑車」狹窄性腱鞘炎。手指肌腱損傷:槌狀指(mallet finger)=末節伸肌腱止點斷裂→DIP 無法主動伸直(籃球撞指尖), 未治療可續發鵝頸畸形(swan neck);jersey finger=屈指深肌腱(FDP)撕脫→DIP無法屈;鈕扣畸形(boutonnière)=中央束斷裂→PIP屈曲、DIP過伸。","options":{"A":"正確:外上髁是前臂伸肌總腱起點。","B":"★錯誤(本題答案):外上髁炎=網球肘, 非高爾夫球肘。","C":"正確:外上髁處壓痛。","D":"正確:抗阻力伸腕/旋後誘發疼痛。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"107020-60":{"quick":"錯 D:骨掃描用於「早期偵測」應力骨折, 非「研判預後及骨折癒合」。","detail":{"background":"應力性骨折(stress fracture)=反覆負重之過度使用傷害(新兵、跑者、舞者), 下肢最常見為「脛骨」, 蹠骨應力骨折最常在「第二/三蹠骨(行軍骨折)」非第一蹠骨;肱骨應力骨折見於投手。X光早期常陰性(2–3週後才見骨痂/骨膜反應), 骨掃描(bone scan)早期即敏感(但特異性低於MRI), MRI 為高敏高特異首選。女運動員三聯症(female athlete triad)=能量不足/飲食失調+停經+骨質疏鬆→易應力骨折。治療「保守為主」=休息、減負重、矯正訓練量;多數不需手術(高風險部位如股骨頸張力側、舟狀骨、第5蹠骨基底等才考慮手術), 「最佳治療為手術復位骨釘固定」之絕對敘述錯誤。彈響髖(snapping hip)外側型=髂脛束/臀大肌越過大轉子;內側型=髂腰肌腱越過髂恥隆起;「股外側肌」不跨越骨突, 不造成彈響髖。","options":{"A":"正確:應力骨折X光早期可正常。","B":"正確:骨掃描早期即可異常。","C":"正確:骨掃描特異性低於MRI。","D":"★錯誤(本題答案):骨掃描用於早期診斷, 非判預後/癒合。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"107080-59":{"quick":"不屬旋轉肌袖 D:大圓肌(teres major)非旋轉肌袖(SITS=肩胛下/岡上/岡下/小圓)。","detail":{"background":"肩部軟組織病變:旋轉肌袖(rotator cuff)=「SITS」=肩胛下肌(subscapularis)、岡上肌(supraspinatus)、岡下肌(infraspinatus)、小圓肌(teres minor);「大圓肌(teres major)」不屬旋轉肌袖。夾擊症候群(impingement)=岡上肌腱/肩峰下滑囊在肩峰下被夾擠, 外展60–120度「疼痛弧」, 主動上舉受限但「被動可上舉過肩」(與冰凍肩不同)。冰凍肩(adhesive capsulitis)=40–60歲女性、好發非慣用側、與糖尿病/甲狀腺相關, 「主動與被動活動皆受限」、自限性(經歷凍結-冰凍-解凍期), 關節造影見關節囊容積「縮小」(故「腋囊脹大充滿造影劑」敘述錯誤)。鈣化性肌腱炎(calcific tendinitis)=岡上肌腱鈣化沉積、X光見肩峰下圓形鈣化影。肱二頭肌長頭肌腱斷裂=「Popeye 上臂」(肌腹下移成球狀)。不安測試(apprehension test)=肩外展90度+「外旋」誘發前脫位恐懼感(評估前向不穩);Kim test/Jerk test=評估「後向」不穩;sulcus sign=評估下向不穩/多向不穩。","options":{"A":"肩胛下肌屬之。","B":"岡下肌屬之。","C":"岡上肌屬之。","D":"★正確(本題答案):大圓肌不屬旋轉肌袖。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"108030-60":{"quick":"錯 A:膝脫位(自動復位)應先「評估血管/X光/監測腔室」,非「馬上送手術房開刀」。","detail":{"background":"膝韌帶/半月板:前十字韌帶(ACL)=防止脛骨「前移」、控制旋轉, 「非接觸性扭轉/落地」受傷, 受傷當下「啪聲+快速關節血腫(hemarthrosis, 抽出暗紅血)」, 慢性致「giving way(打軟腿)」。ACL 分前內側束(屈曲緊)與後外側束(「伸直時緊」, 故「伸直時後外側束鬆弛」敘述錯誤)。後十字韌帶(PCL)=防脛骨後移, 「儀表板損傷(dashboard, 屈膝脛骨前方受撞)」機轉、後抽屜/後沉徵。unhappy triad=ACL+內側副韌帶(MCL)+「內側」半月板(經典描述;近代外側半月板亦常見)。半月板:內側半月板較大且固定(覆蓋脛骨平台較大面積、活動度小→較易破裂);白-白區(white-white)血供差癒合不良。半月板破裂典型「卡住(locking)、無法完全伸直、McMurray/Apley 陽性」。膝關節脫位=高能量急症, 「高比例膕動脈損傷」, 即使自動復位、足背/脛後動脈搏動正常「仍不可排除」內膜損傷(須ABI/血管影像), 並排查腓神經與多韌帶損傷。髂脛束摩擦症候群(ITB friction)=跑者膝外側痛, 屈膝約30度時 ITB 摩擦股骨外上髁(全伸/深屈反而不痛)。髕骨脫位危險因子=高位髕骨(patella alta)、Q角「過大」、滑車發育不良、外側支持帶過緊、膝外翻、髕骨活動度大;故「較小Q角」最不易致髕骨脫位。","options":{"A":"★錯誤(本題答案):不需立即手術, 應先血管評估與影像。","B":"正確:先照X光評估相對位置。","C":"正確:膝脫位高比例膕血管損傷須評估。","D":"正確:持續監測腔室症候群。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"109020-58":{"quick":"B:儀表板撞擊(屈膝脛骨前方受力)、慢性giving way=後十字韌帶(PCL)斷裂。","detail":{"background":"膝韌帶/半月板:前十字韌帶(ACL)=防止脛骨「前移」、控制旋轉, 「非接觸性扭轉/落地」受傷, 受傷當下「啪聲+快速關節血腫(hemarthrosis, 抽出暗紅血)」, 慢性致「giving way(打軟腿)」。ACL 分前內側束(屈曲緊)與後外側束(「伸直時緊」, 故「伸直時後外側束鬆弛」敘述錯誤)。後十字韌帶(PCL)=防脛骨後移, 「儀表板損傷(dashboard, 屈膝脛骨前方受撞)」機轉、後抽屜/後沉徵。unhappy triad=ACL+內側副韌帶(MCL)+「內側」半月板(經典描述;近代外側半月板亦常見)。半月板:內側半月板較大且固定(覆蓋脛骨平台較大面積、活動度小→較易破裂);白-白區(white-white)血供差癒合不良。半月板破裂典型「卡住(locking)、無法完全伸直、McMurray/Apley 陽性」。膝關節脫位=高能量急症, 「高比例膕動脈損傷」, 即使自動復位、足背/脛後動脈搏動正常「仍不可排除」內膜損傷(須ABI/血管影像), 並排查腓神經與多韌帶損傷。髂脛束摩擦症候群(ITB friction)=跑者膝外側痛, 屈膝約30度時 ITB 摩擦股骨外上髁(全伸/深屈反而不痛)。髕骨脫位危險因子=高位髕骨(patella alta)、Q角「過大」、滑車發育不良、外側支持帶過緊、膝外翻、髕骨活動度大;故「較小Q角」最不易致髕骨脫位。","options":{"A":"ACL多為非接觸扭轉、急性血腫。","B":"★正確(本題答案):前檔板撞擊脛骨=PCL損傷。","C":"髕骨半脫位有恐懼徵, 非此機轉。","D":"MCL與外翻力相關。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"109080-57":{"quick":"B:落地扭轉+啪聲+快速關節血腫(抽出暗紅血)=前十字韌帶(ACL)斷裂。","detail":{"background":"膝韌帶/半月板:前十字韌帶(ACL)=防止脛骨「前移」、控制旋轉, 「非接觸性扭轉/落地」受傷, 受傷當下「啪聲+快速關節血腫(hemarthrosis, 抽出暗紅血)」, 慢性致「giving way(打軟腿)」。ACL 分前內側束(屈曲緊)與後外側束(「伸直時緊」, 故「伸直時後外側束鬆弛」敘述錯誤)。後十字韌帶(PCL)=防脛骨後移, 「儀表板損傷(dashboard, 屈膝脛骨前方受撞)」機轉、後抽屜/後沉徵。unhappy triad=ACL+內側副韌帶(MCL)+「內側」半月板(經典描述;近代外側半月板亦常見)。半月板:內側半月板較大且固定(覆蓋脛骨平台較大面積、活動度小→較易破裂);白-白區(white-white)血供差癒合不良。半月板破裂典型「卡住(locking)、無法完全伸直、McMurray/Apley 陽性」。膝關節脫位=高能量急症, 「高比例膕動脈損傷」, 即使自動復位、足背/脛後動脈搏動正常「仍不可排除」內膜損傷(須ABI/血管影像), 並排查腓神經與多韌帶損傷。髂脛束摩擦症候群(ITB friction)=跑者膝外側痛, 屈膝約30度時 ITB 摩擦股骨外上髁(全伸/深屈反而不痛)。髕骨脫位危險因子=高位髕骨(patella alta)、Q角「過大」、滑車發育不良、外側支持帶過緊、膝外翻、髕骨活動度大;故「較小Q角」最不易致髕骨脫位。","options":{"A":"股四頭肌腱斷裂者無法伸膝、髕骨低位。","B":"★正確(本題答案):ACL斷裂(急性hemarthrosis)。","C":"髕骨韌帶斷裂無法伸膝。","D":"髕前滑囊炎為局部腫脹非關節內血腫。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"110020-60":{"quick":"最不適當 D:不安測試是外展90度+「外旋」誘發前向恐懼;往「內旋」做到極限敘述錯誤。","detail":{"background":"肩部軟組織病變:旋轉肌袖(rotator cuff)=「SITS」=肩胛下肌(subscapularis)、岡上肌(supraspinatus)、岡下肌(infraspinatus)、小圓肌(teres minor);「大圓肌(teres major)」不屬旋轉肌袖。夾擊症候群(impingement)=岡上肌腱/肩峰下滑囊在肩峰下被夾擠, 外展60–120度「疼痛弧」, 主動上舉受限但「被動可上舉過肩」(與冰凍肩不同)。冰凍肩(adhesive capsulitis)=40–60歲女性、好發非慣用側、與糖尿病/甲狀腺相關, 「主動與被動活動皆受限」、自限性(經歷凍結-冰凍-解凍期), 關節造影見關節囊容積「縮小」(故「腋囊脹大充滿造影劑」敘述錯誤)。鈣化性肌腱炎(calcific tendinitis)=岡上肌腱鈣化沉積、X光見肩峰下圓形鈣化影。肱二頭肌長頭肌腱斷裂=「Popeye 上臂」(肌腹下移成球狀)。不安測試(apprehension test)=肩外展90度+「外旋」誘發前脫位恐懼感(評估前向不穩);Kim test/Jerk test=評估「後向」不穩;sulcus sign=評估下向不穩/多向不穩。","options":{"A":"可平躺或坐姿。","B":"平躺時檢查者站側方。","C":"坐姿時站後方。","D":"★最不適當(本題答案):應外旋誘發, 非內旋到極限。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"110080-59":{"quick":"正確 D:Kim test 用於檢查「後向」不穩定。","detail":{"background":"肩部軟組織病變:旋轉肌袖(rotator cuff)=「SITS」=肩胛下肌(subscapularis)、岡上肌(supraspinatus)、岡下肌(infraspinatus)、小圓肌(teres minor);「大圓肌(teres major)」不屬旋轉肌袖。夾擊症候群(impingement)=岡上肌腱/肩峰下滑囊在肩峰下被夾擠, 外展60–120度「疼痛弧」, 主動上舉受限但「被動可上舉過肩」(與冰凍肩不同)。冰凍肩(adhesive capsulitis)=40–60歲女性、好發非慣用側、與糖尿病/甲狀腺相關, 「主動與被動活動皆受限」、自限性(經歷凍結-冰凍-解凍期), 關節造影見關節囊容積「縮小」(故「腋囊脹大充滿造影劑」敘述錯誤)。鈣化性肌腱炎(calcific tendinitis)=岡上肌腱鈣化沉積、X光見肩峰下圓形鈣化影。肱二頭肌長頭肌腱斷裂=「Popeye 上臂」(肌腹下移成球狀)。不安測試(apprehension test)=肩外展90度+「外旋」誘發前脫位恐懼感(評估前向不穩);Kim test/Jerk test=評估「後向」不穩;sulcus sign=評估下向不穩/多向不穩。","options":{"A":"Jahnke/Jerk test為後向不穩。","B":"apprehension test為「前向」不穩(非後向)。","C":"sulcus test為下向/多向不穩(非前向)。","D":"★正確(本題答案):Kim test查後向不穩。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"110080-61":{"quick":"B:de Quervain 氏症以「Finkelstein test」診斷。","detail":{"background":"肱骨外上髁炎(lateral epicondylitis)=「網球肘」, 伸腕肌總腱(尤其橈側伸腕短肌 ECRB)起點退化, 抗阻力伸腕/握拳誘發外側痛;內上髁炎=「高爾夫球肘」(屈腕旋前肌)。注意:「外」上髁炎=網球肘, 稱其為高爾夫球肘是錯誤。de Quervain 腱鞘炎=拇長展肌/拇短伸肌(第一背側腔室)腱鞘炎, Finkelstein test 陽性。扳機指(trigger finger)=「A1 滑車」狹窄性腱鞘炎。手指肌腱損傷:槌狀指(mallet finger)=末節伸肌腱止點斷裂→DIP 無法主動伸直(籃球撞指尖), 未治療可續發鵝頸畸形(swan neck);jersey finger=屈指深肌腱(FDP)撕脫→DIP無法屈;鈕扣畸形(boutonnière)=中央束斷裂→PIP屈曲、DIP過伸。","options":{"A":"Phalen為腕隧道(正中神經)。","B":"★正確(本題答案):Finkelstein test。","C":"Watson test查舟月不穩。","D":"Allen test查手部動脈循環。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"111020-59":{"quick":"A:比腕力時肩劇痛+Popeye上臂=肱二頭肌「長頭」肌腱斷裂。","detail":{"background":"肩部軟組織病變:旋轉肌袖(rotator cuff)=「SITS」=肩胛下肌(subscapularis)、岡上肌(supraspinatus)、岡下肌(infraspinatus)、小圓肌(teres minor);「大圓肌(teres major)」不屬旋轉肌袖。夾擊症候群(impingement)=岡上肌腱/肩峰下滑囊在肩峰下被夾擠, 外展60–120度「疼痛弧」, 主動上舉受限但「被動可上舉過肩」(與冰凍肩不同)。冰凍肩(adhesive capsulitis)=40–60歲女性、好發非慣用側、與糖尿病/甲狀腺相關, 「主動與被動活動皆受限」、自限性(經歷凍結-冰凍-解凍期), 關節造影見關節囊容積「縮小」(故「腋囊脹大充滿造影劑」敘述錯誤)。鈣化性肌腱炎(calcific tendinitis)=岡上肌腱鈣化沉積、X光見肩峰下圓形鈣化影。肱二頭肌長頭肌腱斷裂=「Popeye 上臂」(肌腹下移成球狀)。不安測試(apprehension test)=肩外展90度+「外旋」誘發前脫位恐懼感(評估前向不穩);Kim test/Jerk test=評估「後向」不穩;sulcus sign=評估下向不穩/多向不穩。","options":{"A":"★正確(本題答案):肱二頭肌長頭肌腱斷裂(Popeye sign)。","B":"短頭斷裂罕見。","C":"肱三頭肌長頭非此表現。","D":"肱三頭肌短頭非此表現。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"112020-59":{"quick":"最不適當 C:髕骨肌腱斷裂後髕骨「上移=高位髕骨(patella alta)」,非低位(patella baja)。","detail":{"background":"膝韌帶/半月板:前十字韌帶(ACL)=防止脛骨「前移」、控制旋轉, 「非接觸性扭轉/落地」受傷, 受傷當下「啪聲+快速關節血腫(hemarthrosis, 抽出暗紅血)」, 慢性致「giving way(打軟腿)」。ACL 分前內側束(屈曲緊)與後外側束(「伸直時緊」, 故「伸直時後外側束鬆弛」敘述錯誤)。後十字韌帶(PCL)=防脛骨後移, 「儀表板損傷(dashboard, 屈膝脛骨前方受撞)」機轉、後抽屜/後沉徵。unhappy triad=ACL+內側副韌帶(MCL)+「內側」半月板(經典描述;近代外側半月板亦常見)。半月板:內側半月板較大且固定(覆蓋脛骨平台較大面積、活動度小→較易破裂);白-白區(white-white)血供差癒合不良。半月板破裂典型「卡住(locking)、無法完全伸直、McMurray/Apley 陽性」。膝關節脫位=高能量急症, 「高比例膕動脈損傷」, 即使自動復位、足背/脛後動脈搏動正常「仍不可排除」內膜損傷(須ABI/血管影像), 並排查腓神經與多韌帶損傷。髂脛束摩擦症候群(ITB friction)=跑者膝外側痛, 屈膝約30度時 ITB 摩擦股骨外上髁(全伸/深屈反而不痛)。髕骨脫位危險因子=高位髕骨(patella alta)、Q角「過大」、滑車發育不良、外側支持帶過緊、膝外翻、髕骨活動度大;故「較小Q角」最不易致髕骨脫位。","options":{"A":"正確:多<40歲。","B":"正確:伸膝機轉斷裂無法主動伸直。","C":"★最不適當(本題答案):髕腱斷裂致髕骨「上移(alta)」, 非baja。","D":"正確:修補後可暫時鋼絲固定保護。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"112020-61":{"quick":"A:成人扳機指為「A1滑車」狹窄性腱鞘炎。","detail":{"background":"肱骨外上髁炎(lateral epicondylitis)=「網球肘」, 伸腕肌總腱(尤其橈側伸腕短肌 ECRB)起點退化, 抗阻力伸腕/握拳誘發外側痛;內上髁炎=「高爾夫球肘」(屈腕旋前肌)。注意:「外」上髁炎=網球肘, 稱其為高爾夫球肘是錯誤。de Quervain 腱鞘炎=拇長展肌/拇短伸肌(第一背側腔室)腱鞘炎, Finkelstein test 陽性。扳機指(trigger finger)=「A1 滑車」狹窄性腱鞘炎。手指肌腱損傷:槌狀指(mallet finger)=末節伸肌腱止點斷裂→DIP 無法主動伸直(籃球撞指尖), 未治療可續發鵝頸畸形(swan neck);jersey finger=屈指深肌腱(FDP)撕脫→DIP無法屈;鈕扣畸形(boutonnière)=中央束斷裂→PIP屈曲、DIP過伸。","options":{"A":"★正確(本題答案):A1滑車。","B":"C2非主要病灶。","C":"A2與本病無關。","D":"C1非主要病灶。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"112080-59":{"quick":"C:上籃落地膝「卡住、無法完全伸直/彎曲」、X光無骨折=半月板破裂(locking)。","detail":{"background":"膝韌帶/半月板:前十字韌帶(ACL)=防止脛骨「前移」、控制旋轉, 「非接觸性扭轉/落地」受傷, 受傷當下「啪聲+快速關節血腫(hemarthrosis, 抽出暗紅血)」, 慢性致「giving way(打軟腿)」。ACL 分前內側束(屈曲緊)與後外側束(「伸直時緊」, 故「伸直時後外側束鬆弛」敘述錯誤)。後十字韌帶(PCL)=防脛骨後移, 「儀表板損傷(dashboard, 屈膝脛骨前方受撞)」機轉、後抽屜/後沉徵。unhappy triad=ACL+內側副韌帶(MCL)+「內側」半月板(經典描述;近代外側半月板亦常見)。半月板:內側半月板較大且固定(覆蓋脛骨平台較大面積、活動度小→較易破裂);白-白區(white-white)血供差癒合不良。半月板破裂典型「卡住(locking)、無法完全伸直、McMurray/Apley 陽性」。膝關節脫位=高能量急症, 「高比例膕動脈損傷」, 即使自動復位、足背/脛後動脈搏動正常「仍不可排除」內膜損傷(須ABI/血管影像), 並排查腓神經與多韌帶損傷。髂脛束摩擦症候群(ITB friction)=跑者膝外側痛, 屈膝約30度時 ITB 摩擦股骨外上髁(全伸/深屈反而不痛)。髕骨脫位危險因子=高位髕骨(patella alta)、Q角「過大」、滑車發育不良、外側支持帶過緊、膝外翻、髕骨活動度大;故「較小Q角」最不易致髕骨脫位。","options":{"A":"MCL斷裂為外翻不穩, 無卡住。","B":"ACL拉傷以giving way為主。","C":"★正確(本題答案):半月板破裂致機械性卡鎖。","D":"髕腱斷裂無法主動伸直(不同表現)。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"113020-60":{"quick":"最不適當 C:ACL在膝「伸直」時後外側束「緊繃」(非鬆弛)。","detail":{"background":"膝韌帶/半月板:前十字韌帶(ACL)=防止脛骨「前移」、控制旋轉, 「非接觸性扭轉/落地」受傷, 受傷當下「啪聲+快速關節血腫(hemarthrosis, 抽出暗紅血)」, 慢性致「giving way(打軟腿)」。ACL 分前內側束(屈曲緊)與後外側束(「伸直時緊」, 故「伸直時後外側束鬆弛」敘述錯誤)。後十字韌帶(PCL)=防脛骨後移, 「儀表板損傷(dashboard, 屈膝脛骨前方受撞)」機轉、後抽屜/後沉徵。unhappy triad=ACL+內側副韌帶(MCL)+「內側」半月板(經典描述;近代外側半月板亦常見)。半月板:內側半月板較大且固定(覆蓋脛骨平台較大面積、活動度小→較易破裂);白-白區(white-white)血供差癒合不良。半月板破裂典型「卡住(locking)、無法完全伸直、McMurray/Apley 陽性」。膝關節脫位=高能量急症, 「高比例膕動脈損傷」, 即使自動復位、足背/脛後動脈搏動正常「仍不可排除」內膜損傷(須ABI/血管影像), 並排查腓神經與多韌帶損傷。髂脛束摩擦症候群(ITB friction)=跑者膝外側痛, 屈膝約30度時 ITB 摩擦股骨外上髁(全伸/深屈反而不痛)。髕骨脫位危險因子=高位髕骨(patella alta)、Q角「過大」、滑車發育不良、外側支持帶過緊、膝外翻、髕骨活動度大;故「較小Q角」最不易致髕骨脫位。","options":{"A":"正確:防脛骨前移。","B":"正確:參與screw-home機轉。","C":"★最不適當(本題答案):伸直時後外側束「緊」, 非鬆弛。","D":"正確:分前內側束與後外側束。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"113070-58":{"quick":"最不適當 C:膝脫位即使足背/脛後動脈搏動正常「仍不可排除」血管內膜損傷, 須ABI/影像。","detail":{"background":"膝韌帶/半月板:前十字韌帶(ACL)=防止脛骨「前移」、控制旋轉, 「非接觸性扭轉/落地」受傷, 受傷當下「啪聲+快速關節血腫(hemarthrosis, 抽出暗紅血)」, 慢性致「giving way(打軟腿)」。ACL 分前內側束(屈曲緊)與後外側束(「伸直時緊」, 故「伸直時後外側束鬆弛」敘述錯誤)。後十字韌帶(PCL)=防脛骨後移, 「儀表板損傷(dashboard, 屈膝脛骨前方受撞)」機轉、後抽屜/後沉徵。unhappy triad=ACL+內側副韌帶(MCL)+「內側」半月板(經典描述;近代外側半月板亦常見)。半月板:內側半月板較大且固定(覆蓋脛骨平台較大面積、活動度小→較易破裂);白-白區(white-white)血供差癒合不良。半月板破裂典型「卡住(locking)、無法完全伸直、McMurray/Apley 陽性」。膝關節脫位=高能量急症, 「高比例膕動脈損傷」, 即使自動復位、足背/脛後動脈搏動正常「仍不可排除」內膜損傷(須ABI/血管影像), 並排查腓神經與多韌帶損傷。髂脛束摩擦症候群(ITB friction)=跑者膝外側痛, 屈膝約30度時 ITB 摩擦股骨外上髁(全伸/深屈反而不痛)。髕骨脫位危險因子=高位髕骨(patella alta)、Q角「過大」、滑車發育不良、外側支持帶過緊、膝外翻、髕骨活動度大;故「較小Q角」最不易致髕骨脫位。","options":{"A":"正確:可合併多韌帶/半月板損傷, 應MRI。","B":"正確:須警覺急性血管斷裂。","C":"★最不適當(本題答案):搏動正常不能排除血管損傷。","D":"正確:可能合併unhappy triad。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"114020-59":{"quick":"最不易致髕骨脫臼 C:Q角「過小」最不易;危險因子為Q角過大、patella alta、活動度大、膝反屈。","detail":{"background":"膝韌帶/半月板:前十字韌帶(ACL)=防止脛骨「前移」、控制旋轉, 「非接觸性扭轉/落地」受傷, 受傷當下「啪聲+快速關節血腫(hemarthrosis, 抽出暗紅血)」, 慢性致「giving way(打軟腿)」。ACL 分前內側束(屈曲緊)與後外側束(「伸直時緊」, 故「伸直時後外側束鬆弛」敘述錯誤)。後十字韌帶(PCL)=防脛骨後移, 「儀表板損傷(dashboard, 屈膝脛骨前方受撞)」機轉、後抽屜/後沉徵。unhappy triad=ACL+內側副韌帶(MCL)+「內側」半月板(經典描述;近代外側半月板亦常見)。半月板:內側半月板較大且固定(覆蓋脛骨平台較大面積、活動度小→較易破裂);白-白區(white-white)血供差癒合不良。半月板破裂典型「卡住(locking)、無法完全伸直、McMurray/Apley 陽性」。膝關節脫位=高能量急症, 「高比例膕動脈損傷」, 即使自動復位、足背/脛後動脈搏動正常「仍不可排除」內膜損傷(須ABI/血管影像), 並排查腓神經與多韌帶損傷。髂脛束摩擦症候群(ITB friction)=跑者膝外側痛, 屈膝約30度時 ITB 摩擦股骨外上髁(全伸/深屈反而不痛)。髕骨脫位危險因子=高位髕骨(patella alta)、Q角「過大」、滑車發育不良、外側支持帶過緊、膝外翻、髕骨活動度大;故「較小Q角」最不易致髕骨脫位。","options":{"A":"高位髕骨是危險因子。","B":"膝反屈是危險因子。","C":"★最不易(本題答案):較小Q角不易脫臼(Q角過大才是危險因子)。","D":"髕骨活動度過大是危險因子。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"114070-59":{"quick":"最不適當 D:應力骨折以「保守(休息、減負重)」為主, 非首選手術復位骨釘固定。","detail":{"background":"應力性骨折(stress fracture)=反覆負重之過度使用傷害(新兵、跑者、舞者), 下肢最常見為「脛骨」, 蹠骨應力骨折最常在「第二/三蹠骨(行軍骨折)」非第一蹠骨;肱骨應力骨折見於投手。X光早期常陰性(2–3週後才見骨痂/骨膜反應), 骨掃描(bone scan)早期即敏感(但特異性低於MRI), MRI 為高敏高特異首選。女運動員三聯症(female athlete triad)=能量不足/飲食失調+停經+骨質疏鬆→易應力骨折。治療「保守為主」=休息、減負重、矯正訓練量;多數不需手術(高風險部位如股骨頸張力側、舟狀骨、第5蹠骨基底等才考慮手術), 「最佳治療為手術復位骨釘固定」之絕對敘述錯誤。彈響髖(snapping hip)外側型=髂脛束/臀大肌越過大轉子;內側型=髂腰肌腱越過髂恥隆起;「股外側肌」不跨越骨突, 不造成彈響髖。","options":{"A":"正確:增加運動量時疼痛。","B":"正確:好發骨盆/股骨頸/脛骨/舟狀骨/蹠骨。","C":"正確:女運動員三聯症易發生。","D":"★最不適當(本題答案):多數保守治療, 非首選手術。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"115020-34":{"quick":"A:籃球撞指尖DIP無法主動伸直=mallet finger(1);續發近端過伸遠端屈曲=swan neck畸形(2)。","detail":{"background":"肱骨外上髁炎(lateral epicondylitis)=「網球肘」, 伸腕肌總腱(尤其橈側伸腕短肌 ECRB)起點退化, 抗阻力伸腕/握拳誘發外側痛;內上髁炎=「高爾夫球肘」(屈腕旋前肌)。注意:「外」上髁炎=網球肘, 稱其為高爾夫球肘是錯誤。de Quervain 腱鞘炎=拇長展肌/拇短伸肌(第一背側腔室)腱鞘炎, Finkelstein test 陽性。扳機指(trigger finger)=「A1 滑車」狹窄性腱鞘炎。手指肌腱損傷:槌狀指(mallet finger)=末節伸肌腱止點斷裂→DIP 無法主動伸直(籃球撞指尖), 未治療可續發鵝頸畸形(swan neck);jersey finger=屈指深肌腱(FDP)撕脫→DIP無法屈;鈕扣畸形(boutonnière)=中央束斷裂→PIP屈曲、DIP過伸。","options":{"A":"★正確(本題答案):①槌狀指(mallet)②鵝頸畸形(swan neck)。","B":"trigger finger為扳機指(屈伸卡頓), 非此。","C":"jersey finger為FDP撕脫(DIP無法屈), 與本例(無法伸)不符。","D":"trigger finger不符。"},"sources":["Harrison 21e","DeLee Drez Orthopaedic Sports Medicine","AAOS OKU Sports Medicine"]}},"101030-56":{"quick":"D:9歲女孩膝部、ALP升高之骨肉瘤→腫瘤現象「很可能引起病理性骨折」。","detail":{"background":"原發惡性骨腫瘤:骨肉瘤(osteosarcoma)=最常見原發惡性骨腫瘤, 青少年「膝周(股骨遠端/脛骨近端)幹骺端」, 夜間痛+腫塊, X光「Codman三角、日光放射狀(sunburst)骨膜反應」、鹼性磷酸酶高;初診約10–20%已肺轉移(最常轉移部位=肺);標準治療=「術前新輔助化療→廣泛切除(多可肢體保留)→術後輔助化療」(化療「壞死率」可推預後), 對放療不敏感。骨旁/骨膜骨肉瘤(parosteal=低度惡性、手術為主;periosteal=中度)。次發性骨肉瘤(Paget病、放射後)預後最差。軟骨肉瘤(chondrosarcoma)=中老年、骨盆/近端長骨、生長慢, 「對化放療不敏感→以廣泛手術切除為主」;惡性度需綜合臨床+影像+病理三方;骨軟骨瘤軟骨帽>2 cm 須警覺次發性軟骨肉瘤。Ewing 肉瘤=兒童青少年、骨幹、洋蔥皮骨膜反應、t(11;22)。骨轉移(metastatic bone disease)=「成人最常見的骨惡性病灶」, 經「血行」轉移、好發「中軸骨(脊椎/骨盆/肋骨)及長骨近端」(非肢體遠端), 五大來源=乳癌、攝護腺、肺、腎、甲狀腺;乳癌/肺多「溶骨」、「攝護腺多成骨(osteoblastic)」;X光需骨破壞「30–50%」才顯影(故「破壞10%即可發現」錯誤), 骨掃描較早偵測(但骨髓瘤因純溶骨、缺成骨反應, 骨掃描常「偽陰性」→骨髓瘤靠骨骼測量/X光/MRI/PET, 非bone scan)。多發性骨髓瘤(MM)=惡性漿細胞、頭骨「鑿孔狀(punched out)」溶骨、CRAB;老年多椎體壓迫+球蛋白間隙(total protein高、albumin低)+高鈣→應疑MM。","options":{"A":"進關節腔非典型。","B":"包住股動脈非典型。","C":"侵犯後肌腔室非本題重點。","D":"★正確(本題答案):骨破壞致病理性骨折風險。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"102030-56":{"quick":"最不適當 D:股骨近端病灶(疑病理性骨折/骨腫瘤)未分期前「不可立即復位內固定」, 應先影像分期/切片。","detail":{"background":"軟組織肉瘤(soft tissue sarcoma):未分化多形性肉瘤(UPS/MFH)、脂肪肉瘤(liposarcoma, 後腹腔/大腿/臀, 成人, 惡性度不一)、滑膜肉瘤(synovial sarcoma)=年輕成人關節旁、可見「鈣化」、t(X;18);橫紋肌肉瘤(rhabdomyosarcoma)=兒童最常見軟組織肉瘤, 好發頭頸>泌尿生殖>四肢,「腸胃道少」, 預後與部位相關「眼眶及非腦膜旁頭頸部預後較佳(非較差)」;治療多模式(手術+化放療)。惡性周邊神經鞘瘤(MPNST)源自NF1。透明細胞肉瘤(clear cell sarcoma)=「軟組織黑色素瘤」(非雙相);滑膜肉瘤才是雙相(biphasic, 上皮+梭形)。腫瘤切片(biopsy)原則:切口「順肢體長軸縱向」(便於日後一併切除切片道)、「沿單一腔室、不可橫跨腔室或經兩腔室間平面」(避免污染擴散)、止血徹底、同時送「細菌培養」(感染可與腫瘤類似)、切片應由將執行確定手術的團隊規劃;未分期前「不可」貿然開放復位內固定病理性骨折(會污染播散), 應先切片分期。","options":{"A":"可:骨牽引暫時保持位置。","B":"可:安排全身骨掃描。","C":"可:安排MRI評估。","D":"★最不適當(本題答案):未分期前不可貿然復位內固定(污染播散)。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"102110-56":{"quick":"最正確 C:骨轉移經「血行性」到骨形成病灶。","detail":{"background":"原發惡性骨腫瘤:骨肉瘤(osteosarcoma)=最常見原發惡性骨腫瘤, 青少年「膝周(股骨遠端/脛骨近端)幹骺端」, 夜間痛+腫塊, X光「Codman三角、日光放射狀(sunburst)骨膜反應」、鹼性磷酸酶高;初診約10–20%已肺轉移(最常轉移部位=肺);標準治療=「術前新輔助化療→廣泛切除(多可肢體保留)→術後輔助化療」(化療「壞死率」可推預後), 對放療不敏感。骨旁/骨膜骨肉瘤(parosteal=低度惡性、手術為主;periosteal=中度)。次發性骨肉瘤(Paget病、放射後)預後最差。軟骨肉瘤(chondrosarcoma)=中老年、骨盆/近端長骨、生長慢, 「對化放療不敏感→以廣泛手術切除為主」;惡性度需綜合臨床+影像+病理三方;骨軟骨瘤軟骨帽>2 cm 須警覺次發性軟骨肉瘤。Ewing 肉瘤=兒童青少年、骨幹、洋蔥皮骨膜反應、t(11;22)。骨轉移(metastatic bone disease)=「成人最常見的骨惡性病灶」, 經「血行」轉移、好發「中軸骨(脊椎/骨盆/肋骨)及長骨近端」(非肢體遠端), 五大來源=乳癌、攝護腺、肺、腎、甲狀腺;乳癌/肺多「溶骨」、「攝護腺多成骨(osteoblastic)」;X光需骨破壞「30–50%」才顯影(故「破壞10%即可發現」錯誤), 骨掃描較早偵測(但骨髓瘤因純溶骨、缺成骨反應, 骨掃描常「偽陰性」→骨髓瘤靠骨骼測量/X光/MRI/PET, 非bone scan)。多發性骨髓瘤(MM)=惡性漿細胞、頭骨「鑿孔狀(punched out)」溶骨、CRAB;老年多椎體壓迫+球蛋白間隙(total protein高、albumin低)+高鈣→應疑MM。","options":{"A":"錯:轉移好發中軸骨/長骨近端, 非肢體遠端。","B":"錯:截肢不增存活率(轉移為全身病)。","C":"★正確(本題答案):血行轉移。","D":"錯:骨破壞達30–50%才於X光顯影, 非10%。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"103030-56":{"quick":"錯 B:Maffucci症候群=多發內生軟骨瘤+「血管瘤」, 非「造成肢體變形」之描述。","detail":{"background":"良性骨腫瘤要點(年齡/部位/影像):骨軟骨瘤(osteochondroma)=「最常見良性骨腫瘤」, 長骨幹骺端、軟骨帽朝「遠離關節」生長, 單發惡性化<1%, 多發遺傳性外生骨贅(HME/multiple exostoses)為「自體顯性、外顯率高」、惡性化(轉軟骨肉瘤)風險較高, 「軀幹扁平骨(骨盆/肩胛)」之病灶惡性化機會較高、軟骨帽>1.5–2 cm 須警覺。骨樣骨瘤(osteoid osteoma)=青少年, 病巢(nidus)<1.5 cm、夜間痛、「NSAID/阿斯匹靈緩解」, 切除病巢可解痛。骨母細胞瘤(osteoblastoma)=似骨樣骨瘤但>2 cm、好發脊椎後位, 藥物難緩解、需手術。軟骨母細胞瘤(chondroblastoma)=好發青少年「長骨骨骺(epiphysis)」。內生軟骨瘤(enchondroma)=手腳短管狀骨、可病理性骨折、X光點狀鈣化;Ollier=多發內生軟骨瘤;Maffucci=多發內生軟骨瘤+「血管瘤」(惡性化風險高)。骨巨大細胞瘤(GCT)=20–40歲、長骨「骨骺/幹骺(膝周)」溶骨偏心、無骨膜反應、與RANK/RANKL失衡相關, 局部侵襲性、刮除復發率高、約1–3%肺「良性轉移」(非80%);治療刮除+輔助(高速磨鑽/骨水泥)或廣泛切除。單純性骨囊腫(simple/unicameral bone cyst)=兒童肱骨/股骨近端、fallen leaf/fragment sign。動脈瘤性骨囊腫(ABC)=青少年、CT/MRI見「液-液平面(fluid-fluid level)」(易與微血管擴張性骨肉瘤混淆)。嗜伊紅性肉芽腫(eosinophilic granuloma/LCH)=椎體扁平(vertebra plana)。纖維性發育不良(fibrous dysplasia)=GNAS突變、磨砂玻璃影、股骨近端「牧羊人拐杖(shepherd crook)」變形;McCune-Albright=多骨性纖維發育不良+咖啡牛奶斑+內分泌病(性早熟), 「非合併血管瘤」。","options":{"A":"正確:好發手腳短管狀骨。","B":"★錯誤(本題答案):Maffucci=內生軟骨瘤+血管瘤。","C":"正確:可致病理性骨折。","D":"正確:X光可見點狀鈣化。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"103100-56":{"quick":"錯 C:McCune-Albright=纖維發育不良+咖啡牛奶斑+內分泌異常(性早熟), 非「合併血管瘤」。","detail":{"background":"良性骨腫瘤要點(年齡/部位/影像):骨軟骨瘤(osteochondroma)=「最常見良性骨腫瘤」, 長骨幹骺端、軟骨帽朝「遠離關節」生長, 單發惡性化<1%, 多發遺傳性外生骨贅(HME/multiple exostoses)為「自體顯性、外顯率高」、惡性化(轉軟骨肉瘤)風險較高, 「軀幹扁平骨(骨盆/肩胛)」之病灶惡性化機會較高、軟骨帽>1.5–2 cm 須警覺。骨樣骨瘤(osteoid osteoma)=青少年, 病巢(nidus)<1.5 cm、夜間痛、「NSAID/阿斯匹靈緩解」, 切除病巢可解痛。骨母細胞瘤(osteoblastoma)=似骨樣骨瘤但>2 cm、好發脊椎後位, 藥物難緩解、需手術。軟骨母細胞瘤(chondroblastoma)=好發青少年「長骨骨骺(epiphysis)」。內生軟骨瘤(enchondroma)=手腳短管狀骨、可病理性骨折、X光點狀鈣化;Ollier=多發內生軟骨瘤;Maffucci=多發內生軟骨瘤+「血管瘤」(惡性化風險高)。骨巨大細胞瘤(GCT)=20–40歲、長骨「骨骺/幹骺(膝周)」溶骨偏心、無骨膜反應、與RANK/RANKL失衡相關, 局部侵襲性、刮除復發率高、約1–3%肺「良性轉移」(非80%);治療刮除+輔助(高速磨鑽/骨水泥)或廣泛切除。單純性骨囊腫(simple/unicameral bone cyst)=兒童肱骨/股骨近端、fallen leaf/fragment sign。動脈瘤性骨囊腫(ABC)=青少年、CT/MRI見「液-液平面(fluid-fluid level)」(易與微血管擴張性骨肉瘤混淆)。嗜伊紅性肉芽腫(eosinophilic granuloma/LCH)=椎體扁平(vertebra plana)。纖維性發育不良(fibrous dysplasia)=GNAS突變、磨砂玻璃影、股骨近端「牧羊人拐杖(shepherd crook)」變形;McCune-Albright=多骨性纖維發育不良+咖啡牛奶斑+內分泌病(性早熟), 「非合併血管瘤」。","options":{"A":"正確:可單骨或多骨性。","B":"正確:好發肋骨/椎體/股骨/脛骨/肱骨。","C":"★錯誤(本題答案):McCune-Albright非合併血管瘤。","D":"正確:多為小病灶, 無症狀者可不手術。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"103100-57":{"quick":"A:11歲輕傷後骨折、骨折處有底下病灶=病理性骨折(pathological fracture)。","detail":{"background":"良性骨腫瘤要點(年齡/部位/影像):骨軟骨瘤(osteochondroma)=「最常見良性骨腫瘤」, 長骨幹骺端、軟骨帽朝「遠離關節」生長, 單發惡性化<1%, 多發遺傳性外生骨贅(HME/multiple exostoses)為「自體顯性、外顯率高」、惡性化(轉軟骨肉瘤)風險較高, 「軀幹扁平骨(骨盆/肩胛)」之病灶惡性化機會較高、軟骨帽>1.5–2 cm 須警覺。骨樣骨瘤(osteoid osteoma)=青少年, 病巢(nidus)<1.5 cm、夜間痛、「NSAID/阿斯匹靈緩解」, 切除病巢可解痛。骨母細胞瘤(osteoblastoma)=似骨樣骨瘤但>2 cm、好發脊椎後位, 藥物難緩解、需手術。軟骨母細胞瘤(chondroblastoma)=好發青少年「長骨骨骺(epiphysis)」。內生軟骨瘤(enchondroma)=手腳短管狀骨、可病理性骨折、X光點狀鈣化;Ollier=多發內生軟骨瘤;Maffucci=多發內生軟骨瘤+「血管瘤」(惡性化風險高)。骨巨大細胞瘤(GCT)=20–40歲、長骨「骨骺/幹骺(膝周)」溶骨偏心、無骨膜反應、與RANK/RANKL失衡相關, 局部侵襲性、刮除復發率高、約1–3%肺「良性轉移」(非80%);治療刮除+輔助(高速磨鑽/骨水泥)或廣泛切除。單純性骨囊腫(simple/unicameral bone cyst)=兒童肱骨/股骨近端、fallen leaf/fragment sign。動脈瘤性骨囊腫(ABC)=青少年、CT/MRI見「液-液平面(fluid-fluid level)」(易與微血管擴張性骨肉瘤混淆)。嗜伊紅性肉芽腫(eosinophilic granuloma/LCH)=椎體扁平(vertebra plana)。纖維性發育不良(fibrous dysplasia)=GNAS突變、磨砂玻璃影、股骨近端「牧羊人拐杖(shepherd crook)」變形;McCune-Albright=多骨性纖維發育不良+咖啡牛奶斑+內分泌病(性早熟), 「非合併血管瘤」。","options":{"A":"★正確(本題答案):輕傷致骨折+底下病灶=病理性骨折。","B":"應力骨折為反覆負重。","C":"depression fracture為關節面壓陷。","D":"compression fracture為椎體壓迫。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"104030-56":{"quick":"最正確 C:滑膜肉瘤(synovial sarcoma)X光可見「部分鈣化」。","detail":{"background":"軟組織肉瘤(soft tissue sarcoma):未分化多形性肉瘤(UPS/MFH)、脂肪肉瘤(liposarcoma, 後腹腔/大腿/臀, 成人, 惡性度不一)、滑膜肉瘤(synovial sarcoma)=年輕成人關節旁、可見「鈣化」、t(X;18);橫紋肌肉瘤(rhabdomyosarcoma)=兒童最常見軟組織肉瘤, 好發頭頸>泌尿生殖>四肢,「腸胃道少」, 預後與部位相關「眼眶及非腦膜旁頭頸部預後較佳(非較差)」;治療多模式(手術+化放療)。惡性周邊神經鞘瘤(MPNST)源自NF1。透明細胞肉瘤(clear cell sarcoma)=「軟組織黑色素瘤」(非雙相);滑膜肉瘤才是雙相(biphasic, 上皮+梭形)。腫瘤切片(biopsy)原則:切口「順肢體長軸縱向」(便於日後一併切除切片道)、「沿單一腔室、不可橫跨腔室或經兩腔室間平面」(避免污染擴散)、止血徹底、同時送「細菌培養」(感染可與腫瘤類似)、切片應由將執行確定手術的團隊規劃;未分期前「不可」貿然開放復位內固定病理性骨折(會污染播散), 應先切片分期。","options":{"A":"錯:橫紋肌肉瘤高惡性、好發兒童(非低惡性成人)。","B":"錯:脂肪肉瘤好發成人(非青少年)。","C":"★正確(本題答案):滑膜肉瘤可見鈣化。","D":"類上皮肉瘤好發遠端肢體(手/前臂), 非骨盆深部。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"104090-12":{"quick":"錯 C:評估腫瘤對「脊髓壓迫」嚴重度, 「MRI優於CT」(軟組織/脊髓對比佳)。","detail":{"background":"原發惡性骨腫瘤:骨肉瘤(osteosarcoma)=最常見原發惡性骨腫瘤, 青少年「膝周(股骨遠端/脛骨近端)幹骺端」, 夜間痛+腫塊, X光「Codman三角、日光放射狀(sunburst)骨膜反應」、鹼性磷酸酶高;初診約10–20%已肺轉移(最常轉移部位=肺);標準治療=「術前新輔助化療→廣泛切除(多可肢體保留)→術後輔助化療」(化療「壞死率」可推預後), 對放療不敏感。骨旁/骨膜骨肉瘤(parosteal=低度惡性、手術為主;periosteal=中度)。次發性骨肉瘤(Paget病、放射後)預後最差。軟骨肉瘤(chondrosarcoma)=中老年、骨盆/近端長骨、生長慢, 「對化放療不敏感→以廣泛手術切除為主」;惡性度需綜合臨床+影像+病理三方;骨軟骨瘤軟骨帽>2 cm 須警覺次發性軟骨肉瘤。Ewing 肉瘤=兒童青少年、骨幹、洋蔥皮骨膜反應、t(11;22)。骨轉移(metastatic bone disease)=「成人最常見的骨惡性病灶」, 經「血行」轉移、好發「中軸骨(脊椎/骨盆/肋骨)及長骨近端」(非肢體遠端), 五大來源=乳癌、攝護腺、肺、腎、甲狀腺;乳癌/肺多「溶骨」、「攝護腺多成骨(osteoblastic)」;X光需骨破壞「30–50%」才顯影(故「破壞10%即可發現」錯誤), 骨掃描較早偵測(但骨髓瘤因純溶骨、缺成骨反應, 骨掃描常「偽陰性」→骨髓瘤靠骨骼測量/X光/MRI/PET, 非bone scan)。多發性骨髓瘤(MM)=惡性漿細胞、頭骨「鑿孔狀(punched out)」溶骨、CRAB;老年多椎體壓迫+球蛋白間隙(total protein高、albumin低)+高鈣→應疑MM。","options":{"A":"正確:多為轉移性腫瘤。","B":"正確:常見肺癌、乳癌來源。","C":"★錯誤(本題答案):脊髓壓迫評估MRI優於CT。","D":"正確:神經惡化/失禁應考慮手術減壓。"},"sources":["Harrison 21e","Enneking Musculoskeletal Tumor Surgery","WHO Classification of Bone & Soft Tissue Tumours","NCCN Bone Cancer"]}},"104090-56":{"quick":"最正確 C:脂肪肉瘤好發「後腹腔、大腿、臀部」。","detail":{"background":"軟組織肉瘤(soft tissue sarcoma):未分化多形性肉瘤(UPS/MFH)、脂肪肉瘤(liposarcoma, 後腹腔/大腿/臀, 成人, 惡性度不一)、滑膜肉瘤(synovial sarcoma)=年輕成人關節旁、可見「鈣化」、t(X;18);橫紋肌肉瘤(rhabdomyosarcoma)=兒童最常見軟組織肉瘤, 好發頭頸>泌尿生殖>四肢,「腸胃道少」, 預後與部位相關「眼眶及非腦
