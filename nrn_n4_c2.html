ode":"113030","roc":"113","cat":"N4","catname":"產兒科護理學","num":18,"stem":"方小妹,39週頭產式出生,下列何者新生兒身體評估結果為異常發現?","opts":{"A":"胎頭變形(molding)","B":"結膜下點狀出血","C":"硬腭小白點(艾柏斯坦小珠Epstein's pearls)","D":"耳朵上緣位於內外眼眥連線以下"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"topic":"13母嬰婦科借題與新生兒評估","topic_num":"兒童生長發育與健康促進","topic_code":"C2","q_num":18,"roc_year":"113","exam_code":"113030","src":"民國113年","options":{"A":"胎頭變形(molding)","B":"結膜下點狀出血","C":"硬腭小白點(艾柏斯坦小珠Epstein's pearls)","D":"耳朵上緣位於內外眼眥連線以下"},"img":""},{"id":"113100-N4-24","code":"113100","roc":"113","cat":"N4","catname":"產兒科護理學","num":24,"stem":"有關人類乳突病毒(human papillomavirus, HPV)之敘述,下列何者錯誤?","opts":{"A":"主要經由性行為而傳染","B":"免疫力正常的年輕女性感染後通常能夠自行痊癒","C":"HPV 6 與11 型屬於致癌型","D":"HPV 疫苗對於未曾有過性行為或未受到HPV 感染者最有效"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"13母嬰婦科借題與新生兒評估","topic_num":"兒童生長發育與健康促進","topic_code":"C2","q_num":24,"roc_year":"113","exam_code":"113100","src":"民國113年","options":{"A":"主要經由性行為而傳染","B":"免疫力正常的年輕女性感染後通常能夠自行痊癒","C":"HPV 6 與11 型屬於致癌型","D":"HPV 疫苗對於未曾有過性行為或未受到HPV 感染者最有效"},"img":""},{"id":"113100-N4-32","code":"113100","roc":"113","cat":"N4","catname":"產兒科護理學","num":32,"stem":"有關新生兒身體評估結果,下列何者需進一步追蹤評估?","opts":{"A":"出生身長45~55 公分","B":"出生頭圍40~42 公分","C":"新生兒兩眼瞳孔間距3.5~4 公分","D":"視力範圍20 公分(8 英吋)以內"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"13母嬰婦科借題與新生兒評估","topic_num":"兒童生長發育與健康促進","topic_code":"C2","q_num":32,"roc_year":"113","exam_code":"113100","src":"民國113年","options":{"A":"出生身長45~55 公分","B":"出生頭圍40~42 公分","C":"新生兒兩眼瞳孔間距3.5~4 公分","D":"視力範圍20 公分(8 英吋)以內"},"img":""}],E={"101030-N4-41":{"quick":"兒童發展原則錯誤的是「從身體遠心到近心的動作發展」(C)。","detail":{"background":"兒童動作發展遵循「由近心到遠心(中軸到周邊,先軀幹/肩→手臂→手指)」與「由頭到尾(cephalocaudal)」方向,故「遠心到近心」方向相反、錯誤。其餘正確:發展有順序可循、是身心變化的歷程、由簡單到複雜的動作發展。","options":{"A":"正確。發展是有順序可循的。","B":"正確。發展是身心變化的歷程。","C":"錯誤(本題答案)。動作發展是由近心到遠心(非遠心到近心)。","D":"正確。由簡單到複雜的動作發展。"},"sources":["新文京《兒科護理學》發展原則","近心到遠心"]}},"101110-N4-1":{"quick":"丹佛II(DDST-II),90%的18個月幼兒可達成的項目是「可以用杯子喝水」(A)。","detail":{"background":"18個月幼兒(約1歲半)90%可「用杯子喝水、自己走穩、疊2~4塊積木、說數個單字」。畫直線不偏30度(約4歲)、辨認顏色(約3~4歲)、會上樓梯(約2歲)皆是較大年齡才達成,故18個月以「用杯子喝水」最符。","options":{"A":"正確。18個月90%可以用杯子喝水。","B":"劃直線不偏30度約4歲才達成。","C":"辨認顏色約3~4歲。","D":"會上樓梯約2歲。"},"sources":["新文京《兒科護理學》DDST","18個月"]}},"102030-N4-29":{"quick":"嬰兒「自我撫慰行為」的表徵是「嬰兒哭泣時,能藉由將手指放進嘴裡而安靜下來」(A)。","detail":{"background":"自我撫慰(self-soothing)是嬰兒「自行調節情緒、不靠他人安撫而安定」的能力,如哭泣時「吸手指」讓自己安靜。凝視布娃娃眨眼打哈欠(社會互動/疲倦)、轉頭向呼喚者(定向反應)、餓了大聲哭(需求表達)皆非自我撫慰。","options":{"A":"正確。哭泣時吸手指讓自己安靜=自我撫慰。","B":"凝視眨眼打哈欠是疲倦/互動(非自我撫慰)。","C":"轉頭向呼喚者是定向反應(非自我撫慰)。","D":"餓了大聲哭是需求表達(非自我撫慰)。"},"sources":["新文京《兒科護理學》嬰兒","自我撫慰"]}},"102030-N4-42":{"quick":"12個月嬰兒可通過的丹佛II項目是「懂得用拇指和食指拿葡萄乾」(B)。","detail":{"background":"12個月嬰兒精細動作可「用拇指與食指對捏(pincer grasp)拿小物(葡萄乾)」。說雙字句用連接詞(約2~3歲)、依問話指出五官(約18~24個月)是較大年齡;「將瓶內小東西倒出來」約15個月以上,故12個月以「拇指食指對捏」最符。","options":{"A":"說雙字句用連接詞約2~3歲。","B":"正確。12個月可用拇指食指對捏(pincer grasp)。","C":"倒出瓶內小物約15個月以上。","D":"依問話指五官約18~24個月。"},"sources":["新文京《兒科護理學》DDST","對捏"]}},"102030-N4-45":{"quick":"不是兒童體重快速生長期的是「2歲~10歲」(C)。","detail":{"background":"兒童體重快速生長期是「嬰兒期(出生~1歲,前半年尤快)」與「青春期(約12~16歲)」兩個高峰;學齡前到學齡期(2~10歲)是「平穩緩慢」生長期,故「2歲~10歲」不是快速生長期。　補充：兒童體重快速生長期為嬰兒期(1歲約為出生3倍)與青春期；2~10歲(學齡前至學齡期)為穩定緩慢成長期，每年約增2~3公斤，非快速生長期。","options":{"A":"出生~半歲是快速生長期(嬰兒期)。","B":"7個月~1歲仍屬嬰兒期快速生長。","C":"不是(本題答案)。2~10歲是平穩緩慢生長期。","D":"12~16歲是青春期快速生長。"},"sources":["新文京《兒科護理學》生長","兩高峰"]}},"102030-N4-46":{"quick":"不是6個月大嬰兒正常發展現象的是「後囟門未關閉」(A)。","detail":{"background":"後囟門應在「出生後約6~8週(2個月)」閉合,故6個月時「後囟門未關閉」屬異常(不是正常現象)。其餘是6個月正常:俯臥抬頭至90度、用力哭鬧時前囟門鼓脹(前囟12~18個月才閉)、頭圍仍大於胸圍(約12~24個月才交叉)。","options":{"A":"不是(本題答案)。後囟門6~8週應閉合(6個月未關閉是異常)。","B":"是正常。俯臥能抬頭至90度。","C":"是正常。用力哭鬧時前囟門鼓脹(前囟未閉)。","D":"是正常。頭圍大於胸圍。"},"sources":["新文京《兒科護理學》囟門","後囟8週"]}},"103030-N4-42":{"quick":"兒童生理發展錯誤的是「滿4歲時身高是出生身高的4倍」(D)。","detail":{"background":"出生身長約50公分,「滿4歲身高約100~103公分,約為出生的2倍」(非4倍),故D錯誤。其餘正確:新生兒頭圍大於胸圍約2~3公分、前囟門12~18個月閉合、滿週歲體重約出生的3倍。　補充：兒童生長指標：出生身高約50cm，1歲約75cm(增50%)、4歲約100~103cm(約為出生2倍)；「4歲身高為出生4倍」之敘述錯誤，4倍約於13歲達成。","options":{"A":"正確。新生兒頭圍大於胸圍2~3公分。","B":"正確。前囟門在出生後12~18個月閉合。","C":"正確。滿週歲體重是出生體重的3倍。","D":"錯誤(本題答案)。滿4歲身高約出生的2倍(非4倍)。"},"sources":["新文京《兒科護理學》生長","4歲2倍"]}},"103030-N4-44":{"quick":"出生3500g、52cm,剛滿1歲,顯示生長發育有問題的是「體重8500公克」(B)。","detail":{"background":"滿週歲體重應約「出生的3倍(3500×3≈10500g)」,僅8500g明顯偏低、生長遲滯,故B有問題。其餘正常:身高78公分(約出生+25公分合理)、已長出上下中央與側門齒(1歲約6~8顆乳齒)、胸圍與頭圍皆48公分(約1歲頭胸圍相當)。","options":{"A":"身高78公分(約+25cm)合理。","B":"有問題(本題答案)。1歲應約10500g(8500g偏低,生長遲滯)。","C":"1歲長出中央及側門齒正常。","D":"1歲頭圍胸圍約相當(48公分)正常。"},"sources":["新文京《兒科護理學》生長","體重3倍"]}},"104030-N4-48":{"quick":"嬰兒最先長出的牙齒是「下門牙」(B)。","detail":{"background":"嬰兒約6個月開始長乳牙,最先長出的是「下顎正中門牙(下門牙)」,接著上門牙、側門牙、第一乳臼齒、犬齒、第二乳臼齒。　補充：乳齒萌發約於6個月開始，最先長出「下顎正中門牙(下門牙)」，依序上門牙、側門牙、第一臼齒、犬齒、第二臼齒，約2~2.5歲長齊20顆。","options":{"A":"上門牙在下門牙之後長出。","B":"正確。最先長出下顎正中門牙(下門牙)。","C":"前臼齒(第一乳臼齒)較後長出。","D":"後臼齒(第二乳臼齒)最後長出。"},"sources":["新文京《兒科護理學》乳牙","下門牙"]}},"104030-N4-50":{"quick":"丹佛II,90%滿7個月嬰兒可通過的項目是「不需支持即能坐穩」(A)。","detail":{"background":"7個月嬰兒90%可「不需支持坐穩」。自己拿杯子喝牛奶(約12~15個月)、揮手再見(約9~12個月)、說2個字的話(約18~24個月)皆是較大年齡,故7個月以「坐穩」最符。　補充：丹佛II發展里程碑：約6個月可無支持坐穩、7~8個月坐穩並爬、約12個月扶走、15個月獨走；90%滿7個月嬰兒可「不需支持坐穩」。","options":{"A":"正確。7個月90%不需支持即能坐穩。","B":"自己拿杯喝奶約12~15個月。","C":"揮手再見約9~12個月。","D":"說2個字約18~24個月。"},"sources":["新文京《兒科護理學》DDST","7個月坐"]}},"105030-N4-50":{"quick":"嬰兒脊柱彎曲發展正確的是「3個月時,頸椎續發彎曲完成」(B)。","detail":{"background":"嬰兒脊柱續發彎曲依動作發展:「約3~4個月抬頭→頸椎前凸(頸彎)形成」、「約6~8個月坐→胸椎」、「約9~12個月站立行走→腰椎前凸」。薦椎彎曲是原發彎曲(出生即有)。故「3個月頸椎續發彎曲完成」正確。","options":{"A":"薦椎彎曲是原發彎曲(出生即有,非新生兒才完成)。","B":"正確。約3個月抬頭使頸椎續發彎曲形成。","C":"腰椎續發彎曲約9~12個月站立行走才完成(非5個月)。","D":"胸椎彎曲約坐(6~8個月)時(非7個月固定描述)。"},"sources":["新文京《兒科護理學》脊柱","頸彎3月"]}},"105090-N4-45":{"quick":"18個月幼兒應通過的丹佛II項目是「自己走得很穩」(B)。","detail":{"background":"18個月90%可「自己走得很穩、用杯子喝水、疊2~4塊積木」。向前踢球(約2歲)、疊6塊積木(約2歲)、騎三輪車(約3歲)是較大年齡,故18個月以「走得很穩」最符。　補充：丹佛II里程碑：約12個月扶走、15個月獨走且走穩、18個月可走得很穩並可倒退走、跑步；故18個月幼兒應能「自己走得很穩」。","options":{"A":"向前踢球約2歲。","B":"正確。18個月自己走得很穩。","C":"疊6塊積木約2歲。","D":"騎三輪車約3歲。"},"sources":["新文京《兒科護理學》DDST","18個月走"]}},"105090-N4-46":{"quick":"5歲幼兒生理功能尚未達成人發展程度的是「骨骼系統的發育」(B)。","detail":{"background":"5歲幼兒的「腎絲球過濾率(約1~2歲達成人)、聽覺嗅覺、唾液腺分泌」多已接近成人;但「骨骼系統(骨化、骨骺生長)」尚在持續發育,要到青春期後才完成,故骨骼尚未達成人程度。　補充：5歲幼兒多數器官接近成人功能，但「骨骼系統」仍持續生長與骨化(至青春期後才完成)，故尚未達成人發展程度；神經、腎臟等則大致成熟。","options":{"A":"腎絲球過濾率約1~2歲已達成人。","B":"正確(本題答案)。骨骼系統發育尚未達成人(持續到青春期後)。","C":"聽覺與嗅覺功能已接近成人。","D":"唾液腺分泌功能已成熟。"},"sources":["新文京《兒科護理學》生理發展","骨骼"]}},"106030-N4-58":{"quick":"出生3kg,體重發展評估標準正確的是「4歲時,體重約為15 Kg」(D)。","detail":{"background":"體重估算:「6個月約出生2倍(6kg)、1歲約3倍(9~10kg)、2歲約4倍(12kg)、之後每年約增2kg」。3歲約14kg、「4歲約15~16kg」,故D正確。足6個月應約6kg(非4.5)、12個月約9kg(非6)、2歲半約13~14kg(非9)。","options":{"A":"足6個月約6kg(非4.5kg)。","B":"12個月約9~10kg(非6kg)。","C":"2歲半約13~14kg(非9kg)。","D":"正確。4歲約15kg。"},"sources":["新文京《兒科護理學》體重","4歲15kg"]}},"106111-N4-41":{"quick":"兒童永久齒敘述正確的是「通常6歲開始長出第1顆,長出位置為第一臼齒」(B)。","detail":{"background":"恆牙(永久齒)約「6歲」開始長出,第一顆通常是「第一大臼齒(六歲齒)」長在乳臼齒後方。故6歲、第一臼齒正確。非4歲、非上門牙先長。　補充：恆齒(永久齒)約於6歲開始長出，最先長出的是「第一大臼齒(6歲齒)」長在乳齒後方；恆齒共32顆，乳齒則於6~12歲陸續脫落替換。","options":{"A":"錯。約6歲開始(非4歲)。","B":"正確。約6歲長出第一顆,位置為第一大臼齒。","C":"錯。約6歲且第一顆是第一臼齒(非4歲上門牙)。","D":"第一顆是第一大臼齒(非上門牙)。"},"sources":["新文京《兒科護理學》恆牙","六歲齒"]}},"106111-N4-49":{"quick":"丹佛II,90%以上能說出6個身體部位的年齡是「30個月」(D)。","detail":{"background":"丹佛II發展測驗中,「說出6個身體部位」約在「30個月(2歲半)」90%以上達成。15、18、24個月語言發展尚未到此程度,故30個月最符。　補充：丹佛II語言里程碑：約30個月(2.5歲)幼兒90%以上能說出6個身體部位、會用代名詞；語言隨年齡逐步擴展詞彙與表達。","options":{"A":"15個月尚未能說出6個身體部位。","B":"18個月尚未達成。","C":"24個月尚未90%達成。","D":"正確。30個月90%以上能說出6個身體部位。"},"sources":["新文京《兒科護理學》DDST","30個月"]}},"108110-N4-43":{"quick":"嬰幼兒乳齒生長順序正確的是「②下排中央門牙→①上排中央門牙→④第一臼齒→③犬齒→⑤第二臼齒」(D,即2→1→4→3→5)。","detail":{"background":"乳牙萌發順序:②下正中門牙(最先)→①上正中門牙→側門牙→④第一乳臼齒→③犬齒→⑤第二乳臼齒(最後)。本題選項以「2→1→4→3→5」最符此順序(犬齒在第一臼齒之後、第二臼齒最後)。　補充：乳齒萌發順序：下排中央門牙→上排中央門牙→第一臼齒→犬齒→第二臼齒；多由下顎正中門牙最先萌出，約6個月起、2~2.5歲長齊20顆。","options":{"A":"1→2開頭(上門牙先)不符(應下門牙先)。","B":"順序不符。","C":"2→1→3...(犬齒過早)不符。","D":"正確。下門牙→上門牙→第一臼齒→犬齒→第二臼齒(2→1→4→3→5)。"},"sources":["新文京《兒科護理學》乳牙","順序"]}},"109030-N4-42":{"quick":"能扣鈕釦、用手指夾葡萄乾、單腳站立5秒鐘,約是「4~4.5歲」(D)。","detail":{"background":"「單腳站立5秒、自己扣鈕釦、精細手指動作純熟」約在「4~4.5歲」達成。1~1.5歲、2~2.5歲、3~3.5歲的精細與平衡能力尚不及此,故4~4.5歲最符。　補充：丹佛II里程碑：約4~4.5歲幼兒可扣鈕釦、以拇指食指夾小物(如葡萄乾)、單腳站立約5秒；反映細動作與平衡的成熟。","options":{"A":"1~1.5歲尚不能單腳站5秒/扣鈕釦。","B":"2~2.5歲尚不能扣鈕釦。","C":"3~3.5歲約能單腳站數秒但扣鈕釦未純熟。","D":"正確。約4~4.5歲能扣鈕釦、單腳站5秒。"},"sources":["新文京《兒科護理學》DDST","4歲"]}},"109110-N4-47":{"quick":"3歲(出生3kg)較不符合此年齡層生長發展的是「呼吸以胸壁肌肉為主」(B)。","detail":{"background":"幼兒(3歲)仍以「腹式(橫膈)呼吸」為主,約7歲後才轉為胸式呼吸,故「呼吸以胸壁肌肉為主」不符。其餘符合3歲:體重約13~14kg(出生3kg×約4~5倍)、乳齒幾乎全部長出(2~2.5歲20顆乳牙)、大小便訓練完成。","options":{"A":"符合。3歲體重約13~14kg。","B":"較不符合(本題答案)。3歲仍腹式呼吸(非胸式)。","C":"符合。乳齒幾乎全部長出。","D":"符合。大便訓練約2~3歲完成。"},"sources":["新文京《兒科護理學》發展","腹式呼吸"]}},"109110-N4-80":{"quick":"6歲扁平足(flat foot)護理指導正確的是「使用矯正鞋墊配合矯正鞋,誘導足弓發育」(B)。","detail":{"background":"兒童扁平足多為生理性(足弓尚發育中),處理以「矯正鞋墊配合矯正鞋誘導足弓發育、適度運動」為主,多隨成長改善。墊腳尖跳躍非標準治療(A);功能性鞋墊敘述為「預防塌陷」不如誘導發育精確(C);滑膜切除術與扁平足無關(D)。","options":{"A":"墊腳尖跳躍非扁平足標準治療。","B":"正確。矯正鞋墊配合矯正鞋誘導足弓發育。","C":"功能性鞋墊「預防塌陷」敘述不如B精確。","D":"滑膜切除術與扁平足無關(D錯)。"},"sources":["新文京《兒科護理學》扁平足","矯正鞋墊"]}},"110030-N4-50":{"quick":"嬰兒最早發展的知覺是「觸覺」(C)。","detail":{"background":"嬰兒感覺發展中「觸覺」最早發育(胎兒期即有,出生後最靈敏,尤口腔與手),其次聽覺,視覺發育較慢(出生時最不成熟)。故最早是觸覺。　補充：嬰兒最早發展的知覺為「觸覺」(尤其口腔與手)，其次為聽覺、嗅味覺，視覺發展較晚且漸成熟；觸覺是早期探索世界與建立依附的重要管道。","options":{"A":"聽覺發育早但非最早。","B":"視覺發育最慢(非最早)。","C":"正確。觸覺是嬰兒最早發展的知覺。","D":"嗅覺發育早但非最早。"},"sources":["新文京《兒科護理學》感覺","觸覺最早"]}},"111030-N4-47":{"quick":"一般2歲兒童生長發育錯誤的是「腹式呼吸,速率約15~20次/分」(B)。","detail":{"background":"2歲幼兒雖仍腹式呼吸,但「呼吸速率約20~30次/分」(15~20偏低),故B錯誤。其餘正確:前囟門已閉(12~18個月)且胸圍大於頭圍(約1~2歲交叉)、腎絲球過濾率約達成人標準、已長出側門齒與第一大臼齒。","options":{"A":"正確。前囟門已閉、胸圍大於頭圍。","B":"錯誤(本題答案)。2歲呼吸約20~30次/分(15~20偏低)。","C":"正確。腎絲球過濾率約達成人標準。","D":"正確。已長出側門齒和第一大臼齒。"},"sources":["新文京《兒科護理學》發展","呼吸速率"]}},"111030-N4-69":{"quick":"4歲90cm生長素缺乏護理措施不適當的是「建議母親在家中須每日早上起床時為小良注射生長素」(C)。","detail":{"background":"生長激素應「每日睡前(晚上)皮下注射」(模擬生理上生長激素於夜間睡眠時分泌的高峰),非早上起床時,故C不適當。其餘適當:以發展年齡方式互動促正向發展、發掘非靠身高的優勢能力、注射部位選腹部或大腿皮下注射。","options":{"A":"適當。以發展年齡的方式與其互動。","B":"適當。發掘非靠身高取勝的優勢能力。","C":"不適當(本題答案)。生長素應睡前(晚上)注射(非早上起床)。","D":"適當。注射部位選腹部及大腿,採皮下注射。"},"sources":["新文京《兒科護理學》生長激素","睡前"]}},"111110-N4-76":{"quick":"14歲生長痛(growing pain)護理措施不適當的是「減少參與太多不同種類的運動,適時休息以減緩疼痛」(B)。","detail":{"background":"生長痛是良性、多在夜間下肢肌肉的疼痛,「應維持正常日常活動與運動」(不需限制運動種類),按摩熱敷與必要時止痛可緩解,持續嚴重才就醫。「減少運動種類」非必要,故B不適當。　補充：生長痛常見於學齡兒童夜間下肢肌肉，屬良性自限；護理可熱敷、按摩、伸展與適度活動；「減少參與運動」並無必要、為不適當之限制。","options":{"A":"適當。建議維持日常活動。","B":"不適當(本題答案)。生長痛不需減少運動種類(可維持正常運動)。","C":"適當。必要時依醫囑給Acetaminophen止痛。","D":"適當。每晚持續嚴重疼痛建議就醫診治。"},"sources":["新文京《兒科護理學》生長痛","正常活動"]}},"112030-N4-44":{"quick":"嬰幼兒生長發展錯誤的是「1歲時腎絲球過濾率達成人標準」(C)。","detail":{"background":"腎絲球過濾率約「1~2歲(多2歲後)」才接近成人標準,「1歲」尚未完全達成,故C較不精確/錯誤。其餘正確:2歲身高約成人的一半、前囟門約1歲~1歲半閉合、觸覺是最早發育的感覺。　補充：嬰幼兒腎功能未成熟，腎絲球過濾率(GFR)約於「1~2歲」才達成人標準；「1歲即達成人標準」之敘述錯誤，故嬰幼兒對水分與藥物排除能力較差。","options":{"A":"正確。2歲身高約成人身高的一半。","B":"正確。前囟門約1~1.5歲關閉。","C":"錯誤(本題答案)。腎絲球過濾率約2歲才達成人(非1歲)。","D":"正確。觸覺是最早發育的感覺。"},"sources":["新文京《兒科護理學》發展","腎絲球"]}},"112110-N4-47":{"quick":"兒童生理發展正確的是「從出生至1歲的嬰兒,其神經系統及附屬器官生長速度最快」(A)。","detail":{"background":"神經系統在「胎兒期至嬰兒期(出生至1~2歲)」生長最快(腦部與髓鞘快速發育)。3歲身高約出生的「2倍」非1.7倍敘述、出生頭圍約「33~35公分」每年增幅遞減(非每年12~15公分)、出生身體中點在「肚臍上方/臍以上」3歲約恥骨聯合,故A正確。","options":{"A":"正確。出生至1歲神經系統生長速度最快。","B":"3歲身高約出生的2倍(此選項數值敘述不符)。","C":"頭圍增幅遞減(非每年固定12~15公分)。","D":"身體中點隨年齡下移(此敘述不符)。"},"sources":["新文京《兒科護理學》發展","神經最快"]}},"112110-N4-68":{"quick":"血友病(Hemophilia)兒童居家照護最正確的是「可使用軟毛牙刷及口腔保健,預防齲齒」(C)。","detail":{"background":"血友病兒童應「用軟毛牙刷、做好口腔保健」避免牙齦出血與蛀牙(蛀牙拔牙易出血)。皮膚黏膜出血應「冰敷加壓(非熱敷)」(A錯);凝血因子是「靜脈注射(非皮下)」(B錯);止痛「避免阿斯匹靈(抑制血小板增出血)」應用acetaminophen(D錯)。","options":{"A":"錯。出血應冰敷加壓(非熱敷,熱敷增出血)。","B":"錯。凝血因子是靜脈注射(非皮下)。","C":"正確。用軟毛牙刷與口腔保健預防齲齒。","D":"錯。避免阿斯匹靈(會增出血)。"},"sources":["新文京《兒科護理學》血友病","軟毛牙刷"]}},"113030-N4-28":{"quick":"滿15個月幼兒動作發展正確的是「不需扶持可獨自行走」(C)。","detail":{"background":"15個月幼兒90%可「不需扶持獨自走穩」。正確指出身體部位(約18~24個月)、疊6塊積木(約2歲)、自己洗手擦乾(約2~3歲)是較大年齡,故15個月以「獨自行走」最符。　補充：動作里程碑：約12個月扶走、15個月「可不需扶持獨自行走」、18個月走穩可倒退走；故滿15個月幼兒應能獨自行走。","options":{"A":"指出身體部位約18~24個月。","B":"疊6塊積木約2歲。","C":"正確。15個月不需扶持可獨自行走。","D":"自己洗手擦乾約2~3歲。"},"sources":["新文京《兒科護理學》DDST","15個月走"]}},"113100-N4-26":{"quick":"1歲3個月幼兒可通過的動作發展是「可獨自行走」(C)。","detail":{"background":"15個月(1歲3個月)幼兒90%可「獨自行走」。踏動三輪車(約3歲)、單腳跳躍(約4歲)、堆疊九塊積木(約3歲)皆較大年齡,故以「獨自行走」最符。　補充：動作發展：約12~15個月可獨自行走；1歲3個月(15個月)幼兒通常已能「獨自行走」，並開始學習堆積木、用湯匙等細動作。","options":{"A":"踏動三輪車約3歲。","B":"單腳跳躍約4歲。","C":"正確。1歲3個月可獨自行走。","D":"堆疊九塊積木約3歲。"},"sources":["新文京《兒科護理學》DDST","15個月走"]}},"113180-N4-30":{"quick":"9歲學齡期兒童發展及生長最適當的是「有質量保留的概念」(B)。","detail":{"background":"9歲(學齡期、具體運思期)已具「保留概念(質量、數目、長度守恆)、可逆性思考」。喜歡模仿成人(學齡前)、抽象思考(青少年形式運思期才有)、對生殖器好奇(學齡前期)皆非9歲的代表特徵,故B最適當。　補充：9歲學齡期兒童依皮亞傑屬「具體運思期」，已具質量、長度、數量的「保留概念」與可逆思考、分類排序能力，但抽象推理仍待形式運思期發展。","options":{"A":"喜歡模仿成人是學齡前期。","B":"正確。9歲(具體運思期)有質量保留概念。","C":"抽象思考是青少年(形式運思期)。","D":"對生殖器好奇是學齡前期。"},"sources":["新文京《兒科護理學》Piaget","保留概念"]}},"115030-N4-28":{"quick":"兒童各系統生長發展正確的是「2歲時身高約為其成人後身高的一半」(A)。","detail":{"background":"兒童「2歲身高約為成人身高的一半」是常用估算。視覺是「最慢發育」(觸覺才最早,B錯);出生時頭部約占身長的「1/4」(非1/2,C錯);腦神經髓鞘化「出生後持續,約2歲大致完成主要髓鞘化」(D敘述不精確),故A正確。","options":{"A":"正確。2歲身高約成人身高的一半。","B":"錯。視覺發育最慢(觸覺最早,非視覺最早)。","C":"錯。出生時頭部約占身長1/4(非1/2)。","D":"髓鞘化出生後持續(此時程敘述不精確)。"},"sources":["新文京《兒科護理學》發展","2歲半身高"]}},"103030-N4-43":{"quick":"依皮亞傑/Nagy，約5~9歲(含8歲)死亡概念「擬人化」，把死亡當人(死神)、認為躲起來就不會被抓到。","detail":{"background":"8歲(具體運思期、學齡期)已理解死亡是「不可逆、普遍(每個人都會死)、有原因」的成熟概念。沒概念但對失落有反應(嬰幼兒)、死亡如睡覺暫時(學齡前)、擬人化躲死神(學齡前~學齡初)皆是較早階段,故C正確。","options":{"A":"無死亡概念但對失落有反應是嬰幼兒。","B":"死亡如睡覺、暫時分離是學齡前。","C":"死亡不可逆、人人都會死是9歲以後(具體運思成熟)的概念。","D":"正確。8歲常見死亡擬人化(躲起來不被死神抓)。"},"sources":["新文京《兒科護理學》死亡概念","8歲"]}},"102030-N4-41":{"quick":"依皮亞傑,18個月小楓應具有的概念是「物體恆存概念」(B)。","detail":{"background":"18個月處於「感覺動作期(0~2歲)」後期,已建立「物體恆存(object permanence)」——知道物體即使看不見仍存在(可玩躲貓貓)。時間概念、質量保留(具體運思期7歲後)、萬物有靈(運思前期2~7歲)皆是較晚發展,故18個月以物體恆存最符。","options":{"A":"時間概念是較晚發展(非18個月)。","B":"正確。18個月(感覺動作期)已有物體恆存概念。","C":"質量保留是具體運思期(7歲後)。","D":"萬物有靈是運思前期(2~7歲)。"},"sources":["新文京《兒科護理學》Piaget","物體恆存"]}},"103100-N4-46":{"quick":"3歲不願喝藥、換矮胖杯才肯喝,應用其尚未發展的是「質量保留的概念」(A)。","detail":{"background":"3歲(運思前期)尚未發展「質量(體積)保留概念」——認為高瘦杯的液體比矮胖杯「多」(受外形高度影響),故換矮胖杯看起來少就願意喝。逆轉變換、主動進取(心理社會)、物體恆存(已具備)皆非此例運用的概念。","options":{"A":"正確。尚未發展質量保留概念(以為高杯較多)。","B":"逆轉變換是具體運思期(此例核心是保留概念)。","C":"主動進取是心理社會發展(非認知概念)。","D":"物體恆存3歲已具備(非此例)。"},"sources":["新文京《兒科護理學》Piaget","質量保留"]}},"106110-N4-47":{"quick":"丹佛II(DDST-II)的評估項目除粗細動作外,還包含「社會適應及語言的發展」(D)。","detail":{"background":"丹佛II發展篩檢測驗(DDST-II)評估四大領域:「粗動作、精細動作-適應、語言、社會性(個人-社會)」。它不評估「氣質、認知程度、記憶、性別自我概念」,故D(社會適應及語言)正確。　補充：丹佛II(DDST-II)評估四大領域：粗動作、細動作-適應、語言、與「個人-社會(社會適應)」發展；用於篩檢發展遲緩、非智力測驗。","options":{"A":"氣質、認知非DDST評估項目。","B":"記憶、環境適應非DDST四領域。","C":"性別自我概念非DDST項目。","D":"正確。DDST含社會適應(個人-社會)及語言發展。"},"sources":["新文京《兒科護理學》DDST","四領域"]}},"106111-N4-48":{"quick":"10歲(國小四年級)依皮亞傑尚未完成的認知發展是「抽象性思考」(D)。","detail":{"background":"10歲處於「具體運思期(7~11歲)」,已有「性別恆定、保留概念(長度數目)、可逆性思考」,但「抽象性思考(假設演繹推理)」要到「形式運思期(11~12歲後)」才發展,故10歲尚未完成抽象思考。　補充：皮亞傑認知發展：學齡期(7~11歲)屬「具體運思期」，能保留、分類、可逆思考但仍依賴具體經驗；「抽象性思考」屬形式運思期(約11歲後)才發展。","options":{"A":"性別恆定觀具體運思期已有。","B":"長度數目保留概念具體運思期已有。","C":"可逆性思考具體運思期已有。","D":"正確。抽象性思考是形式運思期(11歲後),10歲尚未完成。"},"sources":["新文京《兒科護理學》Piaget","抽象思考"]}},"107110-N4-59":{"quick":"以感官心像了解世界但無質量/長度保留,認知發展處於「感覺動作期」(A)。","detail":{"background":"「運用感官與動作(心像)了解世界」是「感覺動作期(0~2歲)」的特徵。質量、長度保留要到具體運思期(7歲後)才有,故缺乏保留概念符合感覺動作期(及運思前期)。本題以感官動作了解世界為核心特徵→感覺動作期。","options":{"A":"正確。以感官心像了解世界=感覺動作期(0~2歲)。","B":"運思前期以符號語言為主(非僅感官動作)。","C":"具體運思期已有保留概念(此例無)。","D":"形式運思期有抽象思考(此例無)。"},"sources":["新文京《兒科護理學》Piaget","感覺動作期"]}},"108020-N4-56":{"quick":"8歲(具體運思期)發展特性正確的是「較能了解相互間的關係,可將不同事物連接,開始可逆性思考」(B)。","detail":{"background":"具體運思期(7~11歲)特徵:「可逆性思考、保留概念、分類序列、了解事物相互關係」(但須具體事物輔助)。學習使用符號語言(運思前期)、抽象符號邏輯演繹(形式運思期)、融合觀念形成抽象概念(形式運思期)皆非具體運思期,故B正確。","options":{"A":"學習使用符號語言是運思前期。","B":"正確。具體運思期可了解關係、開始可逆性思考。","C":"抽象符號邏輯演繹是形式運思期。","D":"融合觀念形成抽象概念是形式運思期。"},"sources":["新文京《兒科護理學》Piaget","具體運思"]}},"110110-N4-49":{"quick":"將小藥杯改大底面積讓2~6歲認為藥變少,運用其尚未發展的是「質量保留」(B)。","detail":{"background":"2~6歲(運思前期)尚未發展「質量(體積)保留概念」,受容器外形影響而以為大底面積杯的藥「較少」。物體恆存(感覺動作期已具)、象徵符號(運思前期已發展)、抽象邏輯(形式運思期)皆非此例,故B質量保留正確。","options":{"A":"物體恆存感覺動作期已具備。","B":"正確。運思前期尚未發展質量保留概念。","C":"象徵符號運思前期已發展(非此例)。","D":"抽象邏輯是形式運思期。"},"sources":["新文京《兒科護理學》Piaget","質量保留"]}},"110110-N4-51":{"quick":"依皮亞傑,感覺運動期(sensory-motor stage)的孩童主要建立的概念是「物體恆存」(C)。","detail":{"background":"感覺運動期(0~2歲)透過感官與動作探索,主要建立「物體恆存(object permanence)」概念。萬物有靈、時間概念、抽象符號皆是後續(運思前期或更晚)發展,故C正確。　補充：皮亞傑「感覺運動期(0~2歲)」嬰兒透過感官與動作探索，主要建立的概念是「物體恆存」——理解物體不在眼前仍存在，約8~12個月發展。","options":{"A":"萬物有靈是運思前期(2~7歲)。","B":"時間概念較晚發展。","C":"正確。感覺運動期主要建立物體恆存概念。","D":"抽象符號是形式運思期。"},"sources":["新文京《兒科護理學》Piaget","物體恆存"]}},"112110-N4-49":{"quick":"依皮亞傑，具體運思期(7~11歲)對疾病的概念＝「接觸到生病的人/外在污染」(contamination)。","detail":{"background":"本題官方答案為B。具體運思期(7~11歲)兒童能以「具體、內在的器官功能不良」解釋生病(較成熟的內在歸因)。「上天懲罰」是運思前期的萬物有靈/魔術思考;「接觸生病的人」是運思前期的外在接觸論;「提出假設驗證」是形式運思期(抽象)。","options":{"A":"上天懲罰(魔術思考)是運思前期。","B":"器官功能不良/內在機轉是「形式運思期」的概念。","C":"正確。具體運思期認為生病是「接觸生病的人/外在污染」(contamination)。","D":"提出假設再驗證是形式運思期(抽象)。"},"sources":["新文京《兒科護理學》Piaget","器官功能"]}},"101030-N4-46":{"quick":"依Erikson,適合10歲兒童發展階段的住院照護重點是「跟學校老師討論,避免因住院而落後學校進度太多的方法」(A)。","detail":{"background":"10歲(學齡期)Erikson任務是「勤勉進取 vs 自卑」,重視學業成就與能力,住院照護應「協助維持學業進度(與老師討論)」。詳細解釋疾病成因(適合學齡末/青少年)、強調自主(幼兒期)、第三人稱說故事(學齡前)皆非學齡期的核心重點,故A最適。","options":{"A":"正確。學齡期重勤勉,協助維持學業進度。","B":"詳細解釋疾病成因較適合青少年。","C":"自主是幼兒期任務(非學齡期重點)。","D":"第三人稱說故事適合學齡前。"},"sources":["新文京《兒科護理學》Erikson","學齡期勤勉"]}},"101030-N4-48":{"quick":"3歲、活動量大、趨性(易趨近新事物)、注意力易分散，教養最適當＝常帶領其對新環境及活動作安全性的判斷(趨性高易衝向新事物，需教安全判斷)。","detail":{"background":"活動量大的幼兒宜「安排足夠運動消耗精力」(順其氣質、正向引導);趨性(易接受新事物)、注意力易分散是其氣質特徵。多提供靜態課程壓抑活動量(A不順氣質)、帶領對新環境作安全判斷(適用於避性高/謹慎者,B)、教下圍棋減少分散(對活動量大幼兒不切實際,C)皆非最適。","options":{"A":"多提供靜態課程壓抑活動量，不順其氣質。","B":"正確。常帶領其對新環境/活動作安全性判斷(因趨性高、注意力分散，需培養安全意識)。","C":"教下圍棋對活動量大幼兒不切實際。","D":"安排運動可消耗精力，但本題以「安全判斷」為最適當。"},"sources":["新文京《兒科護理學》氣質","活動量"]}},"104100-N4-41":{"quick":"8歲依Erikson心理社會發展任務與危機正確的是「勤奮進取與自卑」(C)。","detail":{"background":"Erikson學齡期(6~12歲)任務是「勤奮進取(industry) vs 自卑(inferiority)」。信任vs不信任(嬰兒期)、自動自發vs羞怯(學齡前)、自我統整vs角色混淆(青少年)皆非8歲,故C正確。","options":{"A":"信任vs不信任是嬰兒期。","B":"自動自發vs羞怯是學齡前期。","C":"正確。8歲(學齡期)是勤奮進取vs自卑。","D":"自我統整vs角色混淆是青少年期。"},"sources":["新文京《兒科護理學》Erikson","學齡期"]}},"104100-N4-49":{"quick":"嬰兒氣質敘述正確的是「屬於避性的嬰兒,初次接觸副食品時,可能會把食物吐出來」(C)。","detail":{"background":"「趨避性」中「避性(退縮)」的嬰兒對新事物(新食物)初次反應是「退縮、拒絕、吐出來」。反應閾「高」者需「較強刺激」才反應(尿布一點濕就哭是反應閾低,A錯);堅持度強者「不易因外界干擾而中斷」(此敘述把堅持度與分散度混淆,B錯);氣質是「先天」的(非後天教養造成,D錯)。","options":{"A":"錯。尿布一點濕就哭是反應閾低(非高)。","B":"錯。此敘述混淆(堅持度強是不易中斷活動)。","C":"正確。避性嬰兒初接觸新食物會退縮吐出。","D":"錯。氣質是先天的(非後天教養造成)。"},"sources":["新文京《兒科護理學》氣質","趨避性"]}},"105090-N4-47":{"quick":"嬰幼兒氣質評估錯誤的是「氣質評估可以預估兒童未來的智力發展」(C)。","detail":{"background":"氣質是「先天對內外刺激的反應方式」,與「智力無關、不能預估智力發展」,故C錯誤。其餘正確:氣質評估可協助建立親子關係、可作為因材施教依據、是先天的反應方式。　補充：嬰幼兒氣質評估描述孩子的行為「風格」(如活動量、適應度)，協助照顧者因材施教；氣質「不能」用來預估未來智力發展，兩者分屬不同範疇。","options":{"A":"正確。氣質評估可協助建立親子關係。","B":"正確。氣質型態可作為因材施教依據。","C":"錯誤(本題答案)。氣質與智力無關(不能預估智力)。","D":"正確。氣質是先天對內外刺激的反應方式。"},"sources":["新文京《兒科護理學》氣質","非智力"]}},"106110-N4-48":{"quick":"5歲吃完午餐會模仿老師收拾餐盒,依Erikson屬「主動進取(initiative)」(B)。","detail":{"background":"5歲(學齡前)Erikson任務是「主動進取(initiative) vs 罪惡感」,會「主動模仿、嘗試、扮演大人角色(模仿老師收拾)」。自主性(幼兒期)、勤勉感(學齡期)、認同感(青少年)皆非5歲,故B正確。","options":{"A":"自主性是幼兒期(1~3歲)。","B":"正確。5歲(學齡前)是主動進取(initiative)。","C":"勤勉感是學齡期。","D":"認同感是青少年期。"},"sources":["新文京《兒科護理學》Erikson","主動進取"]}},"106110-N4-49":{"quick":"4歲對新同學老師玩具活動能很快接受,屬氣質的「趨避性」(A)。","detail":{"background":"「趨避性」是面對新的人事物時「趨(接受)或避(退縮)」的傾向;能很快接受新事物=趨性高。反應閾(引起反應所需刺激量)、堅持度(持續活動的程度)、反應強度(反應的激烈程度)皆非此例,故A趨避性正確。　補充：氣質「趨避性」指對新事物、新環境或陌生人初次接觸時是「趨近(接受)」或「退避」；對新同學、玩具能很快接受屬趨性高(趨近)。","options":{"A":"正確。能很快接受新事物=趨避性(趨性高)。","B":"反應閾是引起反應的刺激量(非此例)。","C":"堅持度是持續活動的程度(非此例)。","D":"反應強度是反應的激烈程度(非此例)。"},"sources":["新文京《兒科護理學》氣質","趨避性"]}},"106111-N4-45":{"quick":"10歲依Erikson社會心理發展任務是「勤勉感」(C)。","detail":{"background":"Erikson學齡期(6~12歲)任務是「勤勉感(industry) vs 自卑」,10歲屬此階段。主動進取(學齡前)、自主感(幼兒期)、信任感(嬰兒期)皆非10歲,故C正確。　補充：學齡期(6~12歲)依Erikson面臨「勤勉vs自卑」，藉由完成任務與學習獲得勝任感；10歲兒童正處於發展勤勉感的階段。","options":{"A":"主動進取是學齡前期。","B":"自主感是幼兒期。","C":"正確。10歲(學齡期)發展任務是勤勉感。","D":"信任感是嬰兒期。"},"sources":["新文京《兒科護理學》Erikson","勤勉感"]}},"107030-N4-43":{"quick":"2歲半堅持自己吃飯不要餵,依Erikson屬「自主性(autonomy)」(D)。","detail":{"background":"Erikson幼兒期(1~3歲)任務是「自主性(autonomy) vs 羞愧懷疑」,2歲半「堅持自己做(自己吃飯)」展現自主性。認同感(青少年)、勤勉感(學齡期)、進取心(學齡前)皆非2歲半,故D正確。","options":{"A":"認同感是青少年期。","B":"勤勉感是學齡期。","C":"進取心(主動進取)是學齡前期。","D":"正確。2歲半堅持自己吃=自主性(autonomy)。"},"sources":["新文京《兒科護理學》Erikson","自主性"]}},"112030-N4-47":{"quick":"兒童氣質評估正確的是「趨避性高的嬰兒,初次接受或拒絕人事物的態度明顯」(C)。","detail":{"background":"「趨避性」指面對新事物初次「接受(趨)或拒絕(避)」的態度,趨避性「明顯」者反應清楚。反應閾「高」者需「較強刺激」才反應(尿布不乾淨就哭是反應閾低,A錯);堅持度高者「不易受干擾而中斷」(B把堅持度說成易受干擾,錯);反應強度是「反應的激烈程度」(非引起反應的最小刺激量,D錯,那是反應閾)。","options":{"A":"錯。尿布不乾淨就哭是反應閾低(非高)。","B":"錯。堅持度高是不易受干擾(非容易受干擾)。","C":"正確。趨避性高者初次接受或拒絕態度明顯。","D":"錯。反應強度是反應激烈程度(最小刺激量是反應閾)。"},"sources":["新文京《兒科護理學》氣質","趨避性"]}},"112110-N4-46":{"quick":"兒童氣質相關敘述錯誤的是「氣質會影響孩子的智力發展與日後的成就」(D)。","detail":{"background":"氣質是先天的行為反應模式,「無好壞之分、與智力發展無直接因果」,故「影響智力發展與成就」錯誤。其餘正確:氣質無好壞、與父母教養互動產生不同親子關係、了解氣質可發展適合的社會適應模式。　補充：氣質描述孩子的行為風格(九向度)，可協助因材施教與親職調整；氣質「不會」決定孩子的智力發展與成就，兩者分屬不同領域、敘述錯誤。","options":{"A":"正確。氣質無好壞之分,是行為反應模式。","B":"正確。氣質與教養互動產生不同親子關係。","C":"正確。了解氣質可發展適合的社會適應模式。","D":"錯誤(本題答案)。氣質與智力發展無直接因果。"},"sources":["新文京《兒科護理學》氣質","非智力"]}},"113030-N4-31":{"quick":"初次接觸陌生人或新環境表現接受或退縮的態度,屬氣質的「趨避性」(C)。","detail":{"background":"「趨避性」指面對新的人事物/環境時「趨近(接受)或逃避(退縮)」的傾向。反應閾(引起反應的刺激量)、適應度(適應新環境的快慢程度)、堅持度(持續活動的程度)皆非此例的「初次接受/退縮」,故C趨避性正確。","options":{"A":"反應閾是引起反應的刺激量(非此例)。","B":"適應度是適應新環境的快慢(非初次接受/退縮)。","C":"正確。初次接受或退縮的態度=趨避性。","D":"堅持度是持續活動的程度(非此例)。"},"sources":["新文京《兒科護理學》氣質","趨避性"]}},"114100-N4-30":{"quick":"氣質評估正確的是「反應閾低的嬰兒,尿布一點點濕就會哭鬧不安」(A)。","detail":{"background":"「反應閾」是引起反應所需的最小刺激量;反應閾「低」者「一點點刺激(尿布微濕)就反應(哭鬧)」。反應強度高是「反應激烈」(非容易受干擾,B錯);避性高者「初次拒絕退縮」(非接受態度好,C錯);慢吞吞型(慢熟型)情緒本質偏「中性/略負向、需時間適應」(非正向,D錯),故A正確。","options":{"A":"正確。反應閾低者尿布一點濕就哭鬧(刺激量小即反應)。","B":"反應強度高是反應激烈(非易受干擾)。","C":"避性高者初次退縮拒絕(非接受態度好)。","D":"慢吞吞型需時間適應(情緒非偏正向)。"},"sources":["新文京《兒科護理學》氣質","反應閾"]}},"115030-N4-31":{"quick":"1歲6個月初次接觸陌生環境就大哭、需較長時間才安穩,氣質敘述正確的是「避性為高」(B)。","detail":{"background":"初次接觸新環境/陌生人「退縮、大哭、需較久才適應」反映「趨避性中避性高(退縮)與適應度低」。規律性高(作息規律)、反應閾高(需強刺激才反應)、堅持度低(易放棄)皆非此例,故B避性高正確。　補充：氣質「趨避性」中初次面對陌生環境或人就大哭、退縮、需較長時間才適應，屬「避性高、適應度低」；故敘述「避性為高」正確，反映其面對新事物的退縮傾向。","options":{"A":"規律性高是作息規律(非此例)。","B":"正確。初次退縮大哭=避性為高(趨避性退縮)。","C":"反應閾高是需強刺激才反應(非此例)。","D":"堅持度低是易放棄(非此例)。"},"sources":["新文京《兒科護理學》氣質","避性"]}},"101110-N4-7":{"quick":"為4歲兒童肌肉注射前,溝通方法較不適當的是「藉著說故事告訴其要勇敢,一下子就過去了」(C)。","detail":{"background":"4歲(學齡前)宜用「治療性遊戲(玩偶示範、角色扮演表達感受、繪畫)」做準備。「叫他要勇敢、一下就過去」是淡化感受、忽略其恐懼,故C較不適當。其餘適當:玩偶解釋過程與原因、遊戲以第三者角色表達打針感受、繪畫表達想法。","options":{"A":"適當。以玩偶解釋注射過程及原因。","B":"適當。遊戲以第三者角色表達對打針的感受。","C":"較不適當(本題答案)。叫他勇敢淡化感受(忽略恐懼)。","D":"適當。用繪畫表達對醫療措施的認識與想法。"},"sources":["新文京《兒科護理學》治療性遊戲","學齡前"]}},"103100-N4-43":{"quick":"5歲(發育正常)目前發展階段的遊戲特點是「會把玩具拿出來讓別的孩子一起玩,但沒有團體遊戲規則」(C)。","detail":{"background":"5歲(學齡前)處於「聯合遊戲(associative play)」:一起玩、交換玩具、互動,但「無共同目標與分工規則」。旁觀遊戲(嬰幼兒)、平行遊戲(幼兒並肩各玩各的)、合作遊戲(學齡期有分工規則)皆非5歲典型,故C正確。","options":{"A":"旁觀遊戲是更小幼兒(非5歲)。","B":"平行遊戲(並肩各玩各的)是幼兒期。","C":"正確。5歲聯合遊戲:一起玩交換玩具但無規則。","D":"合作遊戲(有分工規則)是學齡期。"},"sources":["新文京《兒科護理學》遊戲","聯合"]}},"104030-N4-41":{"quick":"不是護理師觀察嬰幼兒氣質特徵項目的是「一天的遊戲中,能區辨玩具的顏色」(D)。","detail":{"background":"氣質的觀察項目是「活動量(動作節奏快慢頻率)、情緒本質(正負向情緒比例)、趨避性/適應度(對新人事物的難易)」等九大向度;「能區辨玩具顏色」是「認知/視知覺發展」,非氣質特徵,故D不是。　補充：嬰幼兒氣質九向度包括活動量、規律性、趨避性、適應度、反應強度、情緒本質、堅持度、注意力分散度與反應閾；「能否區辨玩具顏色」屬認知/視知覺發展，非氣質項目。","options":{"A":"是氣質。活動量(動作節奏快慢、頻率)。","B":"是氣質。情緒本質(正負向情緒比例)。","C":"是氣質。趨避性/適應度(對新事物的難易)。","D":"不是(本題答案)。區辨顏色是認知發展(非氣質)。"},"sources":["新文京《兒科護理學》氣質","九向度"]}},"104030-N4-46":{"quick":"8個月嬰兒看到護理師就哭,建立護病關係最合適的遊戲是「用手遮住臉跟她玩躲貓貓」(D)。","detail":{"background":"8個月嬰兒已有「物體恆存」概念,玩「躲貓貓(peek-a-boo)」可引發興趣、建立關係、轉移陌生焦慮,符合其發展階段。說故事(較大幼兒)、貼貼紙、打針遊戲(會引發恐懼)皆非8個月建立關係的最佳選擇,故D正確。","options":{"A":"說故事適合較大幼兒(非8個月建立關係首選)。","B":"貼貼紙互動性低(非首選)。","C":"打針遊戲會引發恐懼(不宜)。","D":"正確。躲貓貓利用物體恆存概念建立關係。"},"sources":["新文京《兒科護理學》遊戲","躲貓貓"]}},"104100-N4-51":{"quick":"1歲到1歲半幼兒的正常語言發展可達的能力是「為單字期,可以有意義地表達自己的意思」(C)。","detail":{"background":"1~1.5歲處於「單字期」,能用「有意義的單字」表達(如「車車」、「ㄋㄟㄋㄟ」)。牙牙學語/回聲期(模仿聲音)是更早(約6~12個月);雙字期、電報式語言約「1.5~2歲後」,故1~1.5歲以單字期最符。","options":{"A":"牙牙學語期是更早(約4~6個月)。","B":"回聲期(模仿聲音)約6~12個月。","C":"正確。1~1.5歲是單字期,可有意義表達。","D":"雙字期/電報式語言約1.5~2歲後。"},"sources":["新文京《兒科護理學》語言","單字期"]}},"104100-N4-62":{"quick":"多人一起玩、會互借玩具但無分工合作、缺組織性＝聯合遊戲(associative play)，依本題約5~6歲。","detail":{"background":"「聯合遊戲(associative play)」——多人一起玩、互借玩具、有互動但「無共同目標與分工」——約出現在「3~4歲(學齡前早期)」。1~2歲是平行遊戲、5~6歲漸入合作遊戲、7~8歲合作遊戲成熟,故3~4歲最符。","options":{"A":"1~2歲是平行遊戲(各玩各的)。","B":"3~4歲多為平行轉聯合的過渡。","C":"正確。5~6歲聯合遊戲(一起玩、互借玩具但無分工組織)。","D":"7~8歲為合作遊戲(有分工、有組織)。"},"sources":["新文京《兒科護理學》遊戲","聯合3-4歲"]}},"105030-N4-42":{"quick":"促進認知障礙兒童發展有幫助的是「不需考慮兒童的年齡,而選擇適合兒童認知發展的遊戲及玩具」(A)。","detail":{"background":"認知障礙兒童的遊戲應「依其認知發展程度(發展年齡)而非實際年齡選擇玩具與遊戲」,以符合能力、促進發展。不應「不加限制(A以外)」、「減少社會性活動(會社會隔離)」、「避免非語言溝通(非語言溝通對認知障礙兒有助)」,故A正確。","options":{"A":"正確。依認知發展程度(非實際年齡)選遊戲玩具。","B":"不加限制非適當(仍需安全與引導)。","C":"錯。不應減少社會性活動(會社會隔離)。","D":"錯。非語言溝通對認知障礙兒有幫助(非避免)。"},"sources":["新文京《兒科護理學》遊戲","發展年齡"]}},"105030-N4-43":{"quick":"遊戲發展過程描述正確的是「幼兒喜歡平行式遊戲,並肩而坐,各自玩著自己的玩具」(B)。","detail":{"background":"幼兒期(1~3歲)是「平行遊戲」:並肩而坐、各玩各的、不互動。旁觀遊戲是嬰幼兒(A把旁觀說成嬰兒喜歡較不精確);學齡前是「聯合遊戲」(非合作,C);青少年喜歡團體合作/競爭(非單獨遊戲,D),故B正確。","options":{"A":"旁觀遊戲(此敘述較不精確)。","B":"正確。幼兒期平行遊戲(並肩各玩各的)。","C":"學齡前是聯合遊戲(非合作式)。","D":"青少年是團體合作/競爭(非單獨遊戲)。"},"sources":["新文京《兒科護理學》遊戲","平行"]}},"108110-N4-44":{"quick":"幼稚園玩伴互借玩具一起玩,遊戲特徵為「聯合遊戲」(D)。","detail":{"background":"「聯合遊戲(associative play)」——一起玩、互借玩具、有互動,但「無共同目標與分工規則」——是學齡前期(3~5歲)的特徵。競爭/合作遊戲(有規則目標、學齡期)、平行遊戲(各玩各的、幼兒期)皆非此例,故D正確。","options":{"A":"競爭遊戲是有規則目標(學齡期)。","B":"合作遊戲有分工規則(學齡期)。","C":"平行遊戲是各玩各的(幼兒期)。","D":"正確。互借玩具一起玩但無分工=聯合遊戲。"},"sources":["新文京《兒科護理學》遊戲","聯合"]}},"109030-N4-43":{"quick":"依羅文費(Lowenfeld)繪畫發展,開始對塗鴉的點線圈加上意義或命名約「3~3.5歲」(B)。","detail":{"background":"羅文費繪畫發展:約2歲「塗鴉期(無意義點線)」,約「3~3.5歲」進入「命名塗鴉(對塗鴉加上意義或命名)」,4歲後進入前圖式期(畫具體形象)。故3~3.5歲開始命名塗鴉。　補充：羅文費(Lowenfeld)繪畫發展：塗鴉期(約2~4歲)後期(約3~3.5歲)兒童開始為塗鴉的點線圈「命名或賦予意義」，進入命名塗鴉階段。","options":{"A":"2~2.5歲是無意義塗鴉。","B":"正確。約3~3.5歲開始對塗鴉命名/賦予意義。","C":"5~5.5歲已進入圖式期。","D":"6~6.5歲畫更具寫實。"},"sources":["新文京《兒科護理學》羅文費","命名塗鴉"]}},"110110-N4-50":{"quick":"繪畫發展已能充分表現創造性、具平面及空間概念畫法的年齡是「7~9歲」(C)。","detail":{"background":"羅文費繪畫發展中,約「7~9歲(寫實萌芽/黨群期)」能表現創造性、開始有平面與空間概念(基底線、重疊)。2~4歲塗鴉、4~7歲前圖式/圖式期(主觀符號)、9~12歲更寫實,故7~9歲最符此描述。　補充：羅文費繪畫發展：約7~9歲(樣式化期/黨群期)兒童能充分表現創造性、運用基底線與平面空間概念、加入細節與故事性。","options":{"A":"2~4歲是塗鴉期。","B":"4~7歲是前圖式/圖式期(主觀符號)。","C":"正確。7~9歲表現創造性、具平面空間概念。","D":"9~12歲更趨寫實。"},"sources":["新文京《兒科護理學》羅文費","空間概念"]}},"111030-N4-48":{"quick":"和嬰幼兒玩躲貓貓轉移害怕的注意力,主要利用其已發展的概念是「物體恆存(object permanence)」(C)。","detail":{"background":"躲貓貓(peek-a-boo)能吸引嬰幼兒並轉移注意,是因其已建立「物體恆存」——知道臉/物被遮住仍存在,會期待再出現。保留概念(7歲後)、符號功能(運思前期)、視覺暫存(生理現象)皆非躲貓貓的核心,故C正確。","options":{"A":"保留概念是具體運思期(7歲後)。","B":"符號功能是運思前期(非躲貓貓核心)。","C":"正確。躲貓貓利用物體恆存概念。","D":"視覺暫存是生理現象(非此遊戲核心)。"},"sources":["新文京《兒科護理學》遊戲","物體恆存"]}},"111110-N4-51":{"quick":"兒童遊戲發展錯誤的是「聯合遊戲是青春期的特色,如玩家家酒」(D)。","detail":{"background":"「聯合遊戲」是「學齡前期(3~5歲)」的特色(玩家家酒屬此),非青春期;青春期是團體合作/競爭遊戲與興趣社團,故D錯誤。其餘正確:嬰兒期單獨遊戲(玩玩偶)、幼兒期平行遊戲(各玩各的)、學齡期合作性遊戲(下棋撲克牌)。","options":{"A":"正確。嬰兒期單獨遊戲(玩填充玩偶)。","B":"正確。幼兒期平行遊戲(各玩各的)。","C":"正確。學齡期合作性遊戲(下棋、撲克牌)。","D":"錯誤(本題答案)。聯合遊戲(家家酒)是學齡前期(非青春期)。"},"sources":["新文京《兒科護理學》遊戲","聯合學齡前"]}},"112030-N4-43":{"quick":"2歲8個月遊戲發展特點正確的是「遊戲過程與玩伴互換玩具,但各玩各的,無合作行為」(B)?——本題答B。","detail":{"background":"本題官方答案為B。2歲8個月處於「平行→聯合遊戲」過渡,會「與玩伴在一起、互換玩具,但各玩各的、無合作分工」。單獨遊戲(更小)、有規則的聯合/合作競爭(學齡期)皆非此年齡典型,故B最符。　補充：2~3歲幼兒處於「平行遊戲」期——彼此靠近各玩各的、會交換玩具但無真正合作；合作性遊戲約於學齡前後期才發展。","options":{"A":"單獨玩不重視玩伴是更小嬰幼兒(非2歲8個月)。","B":"正確。與玩伴互換玩具但各玩各的、無合作。","C":"有規則的聯合遊戲偏較大(此敘述不符)。","D":"合作競爭訂規則是學齡期(非此年齡)。"},"sources":["新文京《兒科護理學》遊戲","平行聯合"]}},"112110-N4-41":{"quick":"1歲事故傷害預防護理指導最適當的是「乘車時應坐在後座之攜帶式嬰兒床或後向式安全座椅」(B)。","detail":{"background":"1歲幼兒乘車應坐「後座、後向式安全座椅(或攜帶式嬰兒床)」最安全(後向可保護頭頸)。1歲對安全教育(玩偶遊戲)理解有限(A);自己洗澡有溺水危險(C);堅果易嗆(<4歲不宜,D),故B最適當。　補充：1歲(體重約10kg)幼兒乘車應坐於「後座、後向式安全座椅」；2歲以下或體重未達標宜採後向，提供頭頸最佳保護，並避免坐前座。","options":{"A":"1歲對安全教育理解有限(非此時重點)。","B":"正確。後座、後向式安全座椅最安全。","C":"錯。1歲不可自己洗澡(溺水危險)。","D":"錯。堅果易嗆(4歲以下不宜)。"},"sources":["新文京《兒科護理學》安全","後向座椅"]}},"114170-N4-31":{"quick":"10歲兒童繪畫發展特色正確的是「可對事物自然寫實,注意物體間的比例」(B)。","detail":{"background":"約9~12歲(黨群期/寫實萌芽期),繪畫漸「寫實、注意物體比例與空間關係」。用符號圖示說明意義(圖式期、學齡前)、開始模仿表現創造性(前圖式期較早)、無意義線條(塗鴉期幼兒)皆是更早階段,故10歲以「自然寫實、注意比例」最符。","options":{"A":"用符號圖示是圖式期(較早)。","B":"正確。10歲漸寫實、注意物體間比例。","C":"開始模仿表現創造性是較早階段。","D":"無意義線條是塗鴉期(幼兒)。"},"sources":["新文京《兒科護理學》羅文費","寫實"]}},"101110-N4-5":{"quick":"4歲已完成大小便訓練但住院把大便解在尿片上,此種行為屬「退化行為」(B)。","detail":{"background":"兒童在壓力(住院)下「退回較早發展階段的行為(已會如廁卻又解在尿片)」是「退化行為(regression)」,屬正常的住院壓力反應。控制行為、退縮行為、攻擊行為皆非此例的退回早期能力之表現。　補充：退化行為(regression)為住院兒童常見的壓力反應，指退回較早期已通過的發展階段(如已戒尿布卻又尿床、要奶瓶)，多為暫時性，應接納而非責備，待壓力解除即恢復。","options":{"A":"控制行為非此例(此為退回早期能力)。","B":"正確。退回較早階段(解在尿片)=退化行為。","C":"退縮行為是逃避社交(非此例)。","D":"攻擊行為是對抗反應(非此例)。"},"sources":["新文京《兒科護理學》住院反應","退化"]}},"101110-N4-6":{"quick":"開始用具體語言表達內心對死亡恐懼的年齡層是「學齡期」(C)。","detail":{"background":"學齡期(6~12歲、具體運思)兒童「能用具體語言表達對死亡的理解與恐懼」(已知死亡不可逆)。幼兒期、學齡前期(運思前期)以行為/魔術思考為主,尚難用具體語言清楚表達死亡恐懼;青少年雖能但題意指「開始」用具體語言,故學齡期。","options":{"A":"幼兒期以行為反應為主(難用具體語言)。","B":"學齡前期魔術思考(尚難具體表達死亡)。","C":"正確。學齡期開始用具體語言表達死亡恐懼。","D":"青少年已能,但「開始」是學齡期。"},"sources":["新文京《兒科護理學》死亡概念","學齡期"]}},"102030-N4-53":{"quick":"10歲末期病童掛念學校作業未完成,依Erikson處於「符合其勤勉的發展任務」(D)。","detail":{"background":"Erikson學齡期(6~12歲)任務是「勤勉進取 vs 自卑」,關注學業與能力,10歲掛念作業正是勤勉任務的展現。否認病情、自我認同(青少年)、轉移注意皆非此例的發展任務描述,故D正確。　補充：學齡期(6~12歲)依Erikson面臨「勤勉vs自卑」，重視學業與成就；末期病童仍掛念作業反映其勤勉發展任務，照護應協助維持就學與成就感。","options":{"A":"否認病情沒現實感非發展任務。","B":"自我認同是青少年任務(非10歲)。","C":"轉移注意是因應方式(非發展任務)。","D":"正確。學齡期任務是勤勉(掛念作業)。"},"sources":["新文京《兒科護理學》Erikson","勤勉"]}},"102030-N4-55":{"quick":"向學齡期兒童解釋死亡不適當的是「使用隱喻性詞語,如睡著了代替死亡一詞」(A)。","detail":{"background":"學齡期兒童已能理解死亡的不可逆,解釋死亡應「誠實、用正確的語言」;用「睡著了」等隱喻會造成混淆與恐懼(以為睡覺=死、害怕睡覺),故A不適當。其餘適當:分享自己面對死亡的感受、依發展據實告知、用繪本電影討論死亡。","options":{"A":"不適當(本題答案)。不用隱喻(睡著了)代替死亡(易混淆恐懼)。","B":"適當。分享自己面對死亡的感受。","C":"適當。依發展階段據實告知對死亡的認識。","D":"適當。用繪本、電影、卡通討論死亡議題。"},"sources":["新文京《兒科護理學》死亡溝通","誠實"]}},"102110-N4-52":{"quick":"疾病末期兒童疲憊症狀照護適當的是「在病童精神好的時段,安排病童喜歡的身體活動」(C)。","detail":{"background":"末期疲憊照護應「在精神較好時安排其喜歡且不費力的活動」維持生活品質與舒適。疲憊多為疾病進展,「積極用藥」非首要(A);定期輸全血維持所有血球正常非安寧目標(B);「定期叫醒避免睡到死」違反舒適原則(D),故C適當。","options":{"A":"錯。末期疲憊非以積極用藥處置為主。","B":"錯。安寧不以輸全血維持所有血球(非目標)。","C":"正確。精神好時段安排喜歡的(不費力)活動。","D":"錯。不應定期叫醒(違反舒適原則)。"},"sources":["新文京《兒科護理學》末期","舒適活動"]}},"103030-N4-47":{"quick":"容易誤解自己生病住院原因、出現罪惡與恐懼感的年齡層是「學齡前期」(C)。","detail":{"background":"學齡前期(運思前期、魔術思考、自我中心)兒童常「把生病住院誤解為自己做錯事的懲罰」,因而產生罪惡感與恐懼。青少年、學齡期已能理解外在病因;幼兒期以分離焦慮為主,故學齡前期最典型。　補充：學齡前期(3~6歲)兒童具魔幻思考與自我中心，易把生病住院誤解為自己做錯事的「懲罰」，因而產生罪惡感與恐懼；護理應澄清非懲罰並給予具體說明。","options":{"A":"青少年能理解病因(非誤解為懲罰)。","B":"學齡期理解外在病因(非罪惡感)。","C":"正確。學齡前期(魔術思考)把生病誤解為懲罰、有罪惡感。","D":"幼兒期以分離焦慮為主(非罪惡感)。"},"sources":["新文京《兒科護理學》住院反應","罪惡感"]}},"105090-N4-55":{"quick":"協助兒童因應親人死亡的哀傷照護不適當的是「儘量少與兒童談及死亡的親人,以免造成無法處理的悲慟」(C)。","detail":{"background":"兒童哀傷照護應「鼓勵其表達、誠實談論死亡親人」,避談會使其困惑、孤立,故C不適當。其餘適當:用適齡語言說明死亡、告訴兒童難過是可以的並鼓勵表達、接受其退化性行為。　補充：協助兒童面對親人死亡應以誠實、符合認知發展的方式說明、鼓勵表達情緒與提供陪伴；「儘量少談死去的親人」會壓抑哀傷、不利調適，並不適當。","options":{"A":"適當。用適合發展階段的語言說明死亡。","B":"適當。鼓勵兒童以自己的方式表達感覺。","C":"不適當(本題答案)。不應避談死亡親人(避談會使其困惑孤立)。","D":"適當。接受兒童親人過世後的退化性行為。"},"sources":["新文京《兒科護理學》哀傷","表達"]}},"107110-N4-48":{"quick":"協助腦瘤病童家庭正向因應較不適當的是「避免讓病童知道疾病情況,以免焦慮與緊張」(D)。","detail":{"background":"兒童照護應「依年齡誠實告知病情」,隱瞞會使病童更焦慮不安、失去信任,故D較不適當。其餘適當:評估病童家屬對診斷治療預後的了解、教導評估神經功能腦壓上升與感染徵象、教導評估生長發展技能。　補充：協助腦瘤病童家庭正向因應應提供誠實適齡的疾病資訊、鼓勵表達情緒、維持希望與支持；「避免讓病童知道病情」會增加不確定與恐懼，並不適當。","options":{"A":"適當。評估病童家屬對診斷治療預後的了解。","B":"適當。教導評估神經功能、腦壓上升及感染徵象。","C":"適當。教導評估病童生長發展技能。","D":"較不適當(本題答案)。不應隱瞞病情(隱瞞反增焦慮)。"},"sources":["新文京《兒科護理學》腦瘤","誠實告知"]}},"108020-N4-42":{"quick":"2歲幼兒對疼痛最不常採取的反應是「出現拖延的行為,如:我要去尿尿」(C)。","detail":{"background":"「拖延行為(藉口拖延、如說要尿尿)」是「學齡前/學齡期」較成熟的因應方式,2歲幼兒認知尚不足以使用,故最不常採取。2歲常見:大聲哭叫尖叫生氣、抱住父母尋求情緒支持、手腳扭動踢人不合作。　補充：2歲幼兒對疼痛反應多為哭鬧、退縮、肢體抵抗、退化行為；「以拖延行為(如說要去尿尿)逃避」屬較大兒童的認知策略，2歲幼兒最不常採取。","options":{"A":"2歲常見。大聲哭泣尖叫、生氣表情。","B":"2歲常見。抱住父母尋求情緒支持。","C":"最不常(本題答案)。拖延行為是較大兒童的因應(2歲少見)。","D":"2歲常見。手腳扭動踢人、不合作。"},"sources":["新文京《兒科護理學》疼痛","幼兒反應"]}},"109030-N4-46":{"quick":"不是瀕死兒童生理變化的是「聽覺減少,對疼痛的刺激敏感」(D)。","detail":{"background":"瀕死期「聽覺是最後消失的感覺」、且因意識下降「對疼痛刺激的反應減弱(非敏感)」,故「對疼痛敏感」錯誤。其餘是瀕死變化:陳施氏呼吸、感覺冷但身體冰冷(末梢循環差)、視力模糊眼分泌物增加。　補充：瀕死兒童生理變化包括循環衰竭(四肢冰冷發紺、脈搏弱)、呼吸不規則、肌張力下降、感覺遲鈍；「聽覺減少但對疼痛刺激敏感」之敘述錯誤，聽覺常最後消失、痛覺則減退。","options":{"A":"是變化。出現陳施氏呼吸型態。","B":"是變化。感覺熱但身體冰冷(末梢循環差)。","C":"是變化。視力模糊、眼睛分泌物增加。","D":"不是(本題答案)。瀕死對疼痛反應減弱(非敏感),且聽覺最後消失。"},"sources":["新文京《兒科護理學》瀕死","聽覺最後"]}},"109110-N4-54":{"quick":"首次輸血小板、表示最害怕受到懲罰,發展最可能屬「學齡前期」(B)。","detail":{"background":"「害怕受到懲罰、把生病/治療當成做錯事的懲罰」是「學齡前期(運思前期、魔術思考)」的典型反應。學步期以分離焦慮為主、學齡期理解外在病因、青少年關注身體心像與自主,故學齡前期最符。　補充：學齡前期(3~6歲)兒童對侵入性操作(如輸血)最害怕身體受傷與被「懲罰」，並有魔幻思考；表達最怕受懲罰最可能屬學齡前期。","options":{"A":"學步期以分離焦慮為主(非害怕懲罰)。","B":"正確。害怕受懲罰是學齡前期(魔術思考)。","C":"學齡期理解外在病因(非懲罰)。","D":"青少年關注身體心像自主(非懲罰)。"},"sources":["新文京《兒科護理學》住院反應","懲罰"]}},"110110-N4-57":{"quick":"與癌症末期病童談論死亡最適當的是「提供病童遊戲和藝術,表達其想法與感受」(C)。","detail":{"background":"與末期病童談死亡應「用遊戲、藝術等適齡媒介協助其表達想法與感受」。不應要學齡期憑空想像(應具體,A);不應避談死亡(B);不應給不實的痊癒希望(D),故C最適當。　補充：與癌末病童談論死亡應以適齡誠實的方式、藉「遊戲與藝術」協助其表達想法與感受，傾聽並接納情緒；遊戲治療是兒童表達內在的重要媒介。","options":{"A":"學齡期宜具體討論(非憑空想像)。","B":"錯。不應避免討論死亡議題。","C":"正確。用遊戲與藝術協助表達想法與感受。","D":"錯。不應給不實的痊癒希望。"},"sources":["新文京《兒科護理學》末期溝通","遊戲藝術"]}},"112030-N4-58":{"quick":"瀕死病童生理變化錯誤的是「視力減退,聽覺最早消失」(C)。","detail":{"background":"瀕死期「聽覺是最後消失的感覺」(非最早),故C錯誤(應為聽覺最後消失)。其餘正確:尿量漸減、陳施氏呼吸、心跳慢且弱。　補充：瀕死病童生理變化包括循環衰竭、呼吸不規則、肌張力降低、感覺遲鈍；「聽覺最早消失」之敘述錯誤——聽覺通常是「最後」消失的感覺。","options":{"A":"正確。尿量漸減。","B":"正確。陳施氏呼吸(Cheyne-Stokes)。","C":"錯誤(本題答案)。聽覺是最後消失(非最早)。","D":"正確。心跳慢且弱。"},"sources":["新文京《兒科護理學》瀕死","聽覺最後"]}},"114030-N4-35":{"quick":"依皮亞傑,3~5歲學齡前期兒童的死亡概念正確的是「死亡如同睡覺,會醒過來」(B)。","detail":{"background":"學齡前期(運思前期、3~5歲)認為死亡是「暫時、可逆(如睡覺會醒、會再活過來)」。不了解死亡缺乏概念(嬰幼兒)、人死不能復活只有壞人才死/人人都會死(學齡期以後的成熟概念)皆非3~5歲,故B正確。　補充：學齡前期(3~5歲)依皮亞傑屬運思前期，對死亡概念不成熟、視死亡為「可逆、像睡覺會醒來」、暫時的；約9歲後才理解死亡的永久性與普遍性。","options":{"A":"不了解死亡是嬰幼兒(非3~5歲)。","B":"正確。3~5歲認為死亡如睡覺會醒(暫時可逆)。","C":"人死無法復活是學齡期以後(非3~5歲)。","D":"人人都會面臨死亡是學齡期以後的成熟概念。"},"sources":["新文京《兒科護理學》死亡概念","學齡前"]}},"115030-N4-33":{"quick":"依皮亞傑,兒童能瞭解疾病乃由器官功能不良造成的階段是「形式運思期」(D)?——本題答D。","detail":{"background":"本題官方答案為D。能以「內在器官功能不良、生理機轉」解釋疾病,屬較成熟的內在歸因;本題判定為「形式運思期(11歲後,能抽象推理生理機轉)」。感覺運思期、運思前期(外在/魔術歸因)、具體運思期(接觸傳染論)皆較不成熟。","options":{"A":"感覺運思期無此抽象歸因。","B":"運思前期是魔術/外在歸因。","C":"具體運思期偏接觸傳染論(此題以D為答)。","D":"正確(本題答案)。能以器官功能不良(生理機轉)解釋=形式運思期。"},"sources":["新文京《兒科護理學》Piaget","器官功能"]}},"101030-N4-45":{"quick":"自閉症兒童照護原則正確的是「持續、緊密性的觀察病童,維持安全的環境」(D)。","detail":{"background":"自閉症兒童對環境敏感、可能有自傷行為,應「持續緊密觀察、維持固定且安全的環境」。應「維持固定一致環境(非多變,A錯)」、「不應強迫配合常規(B過度)」、溝通障礙時「一對一、避免過度團體刺激(非安排團體活動,C錯)」,故D正確。","options":{"A":"錯。應維持固定環境(非多變環境)。","B":"強迫配合常規不適當(B過度)。","C":"錯。溝通障礙宜一對一(非安排團體活動)。","D":"正確。持續緊密觀察、維持安全環境。"},"sources":["新文京《兒科護理學》自閉症","安全環境"]}},"107030-N4-57":{"quick":"自閉症兒童特徵錯誤的是「喜歡變化多端的環境」(B)。","detail":{"background":"自閉症兒童「堅持固定、抗拒改變、喜歡一致不變的環境」,故「喜歡變化多端的環境」錯誤。其餘正確:語言發展與溝通障礙、對感覺刺激過度或不及反應、不易建立親密人際關係。　補充：自閉症兒童偏好「固定、可預期」的環境與常規，對變化抗拒、易焦慮；「喜歡變化多端的環境」與自閉症特徵相反、為錯誤敘述。","options":{"A":"正確。語言發展與溝通障礙。","B":"錯誤(本題答案)。自閉症抗拒改變、喜歡固定環境(非變化多端)。","C":"正確。對感覺刺激有過度或不及的反應。","D":"正確。不易建立親密的人際關係。"},"sources":["新文京《兒科護理學》自閉症","固定環境"]}},"107110-N4-53":{"quick":"嬰幼兒期自閉症的症狀易與「聽覺障礙」混淆(C)。","detail":{"background":"自閉症嬰幼兒「對呼喚無反應、不看人、語言發展遲緩」,容易被誤以為是「聽覺障礙(聽不到才不回應)」,故易與聽覺障礙混淆。味覺、肢體、觸覺障礙與自閉症的核心(社交溝通)表現不同。　補充：自閉症嬰幼兒因對聲音呼喚反應差、語言發展遲緩、缺乏眼神接觸，症狀易與「聽覺障礙」混淆；須以聽力檢查鑑別後再評估。","options":{"A":"味覺障礙與自閉症表現不同。","B":"肢體障礙與自閉症表現不同。","C":"正確。對呼喚無反應易與聽覺障礙混淆。","D":"觸覺障礙與自閉症核心表現不同。"},"sources":["新文京《兒科護理學》自閉症","聽覺障礙"]}},"108020-N4-52":{"quick":"自閉症護理指導最適當的是「提供正向行為治療,以增強建立適當的行為」(D)。","detail":{"background":"自閉症治療以「正向行為治療(行為改變技術、應用行為分析)增強適當行為」為核心。教養方式「非」自閉症主因(是神經發展問題,A錯);藥物「不能治癒」自閉症(只緩解部分症狀,B錯);應「維持固定一致環境(非多變新情境刺激,C錯)」,故D正確。","options":{"A":"錯。教養方式非自閉症主因(是神經發展問題)。","B":"錯。藥物不能治癒自閉症(只緩解部分症狀)。","C":"錯。應維持固定環境(非多變新情境刺激)。","D":"正確。提供正向行為治療增強適當行為。"},"sources":["新文京《兒科護理學》自閉症","行為治療"]}},"109030-N4-58":{"quick":"兒童自閉症身心表徵錯誤的是「身體及眼球經常出現不自主擺動」(D)。","detail":{"background":"自閉症的核心是「社交溝通障礙、固著重複行為」,如不理人不看人、鸚鵡式仿說、玩法單調走固定路線。「身體與眼球不自主擺動」是「神經肌肉/眼球運動異常(如眼球震顫)」的表現,非自閉症特徵,故D錯誤。　補充：自閉症身心表徵為社交與語言溝通障礙、固著重複行為、對環境變化抗拒、感覺異常；「身體與眼球經常不自主擺動」非自閉症典型表徵、為錯誤敘述。","options":{"A":"正確。不理人不看人、對人缺乏反應。","B":"正確。鸚鵡式仿說或答非所問。","C":"正確。遊戲玩法單調、走固定路線(固著)。","D":"錯誤(本題答案)。眼球不自主擺動非自閉症特徵。"},"sources":["新文京《兒科護理學》自閉症","社交固著"]}},"109110-N4-41":{"quick":"3歲自閉症照護指導錯誤的是「對孩子單調固定的習慣給予改變,儘量每日安排不同活動,使生活多采多姿」(D)。","detail":{"background":"自閉症兒童「需要固定一致的常規與環境」,「每日安排不同活動、改變習慣」會增加其焦慮與行為問題,故D錯誤。其餘正確:不必心存罪惡感、公平對待不忽略其他孩子、可帶其走入人群享有適度社交。　補充：自閉症照護應維持「固定、可預期」的環境與常規以減少焦慮；「每日安排不同活動使生活多采多姿、改變固定習慣」反而造成不安、為錯誤指導。","options":{"A":"正確。不要因孩子診斷自閉症而心存罪惡感。","B":"正確。公平對待,不忽略其他正常孩子。","C":"正確。可帶病童適度走入人群、享社交活動。","D":"錯誤(本題答案)。自閉症需固定常規(非每日改變活動)。"},"sources":["新文京《兒科護理學》自閉症","固定常規"]}},"112110-N4-44":{"quick":"自閉症學齡期兒童母親互動最合適的是「給予明確且具體的指示,以增進其信任感」(C)。","detail":{"background":"與自閉症兒童互動應「用明確、具體、簡單的指示」(其理解抽象與社交線索困難)。過度刺激性活動(A)、增加身體碰觸(自閉症多排斥碰觸,B)、給意外驚喜(打破固定常規增焦慮,D)皆不適合,故C正確。　補充：與自閉症兒童互動應給予「明確、具體、簡短一致」的指示與可預期的常規，建立信任與安全感；避免抽象、含糊或多變的指令。","options":{"A":"過度刺激性活動不適合(易超載)。","B":"錯。自閉症多排斥身體碰觸(非增加碰觸)。","C":"正確。給明確具體的指示(其理解抽象困難)。","D":"錯。意外驚喜打破固定常規會增焦慮。"},"sources":["新文京《兒科護理學》自閉症","具體指示"]}},"113100-N4-28":{"quick":"自閉症(autistic disorder)兒童照護最適當的是「隨時維持安全的環境,防範意外或自我傷害」(D)。","detail":{"background":"自閉症兒童可能有自傷與意外風險,應「維持安全環境、防範意外與自傷」。多「排斥身體接觸(非喜歡擁抱,A錯)」、「需固定常規(非隨時調整,B錯)」、「需減少過度感官刺激(非變化多端環境,C錯)」,故D正確。","options":{"A":"錯。自閉症多排斥身體接觸(非喜歡擁抱)。","B":"錯。需維持固定常規(非隨時調整)。","C":"錯。需減少過度刺激(非變化多端增刺激)。","D":"正確。維持安全環境,防範意外或自我傷害。"},"sources":["新文京《兒科護理學》自閉症","安全"]}},"113180-N4-27":{"quick":"自閉症兒童敘述錯誤的是「用luminal治療疾病,須服用6~8週後效果佳」(D)。","detail":{"background":"Luminal(phenobarbital,苯巴比妥)是抗癲癇/鎮靜劑,「不是自閉症的治療藥」,故D錯誤。自閉症無特效藥,以行為療育為主,必要時用藥緩解共病症狀。其餘正確:孤立人際互動缺目光接觸、對環境改變敏感須維持一致、僵化思考難接受改變。","options":{"A":"正確。孤立人際互動、缺乏目光接觸。","B":"正確。對環境改變敏感,須維持一致性。","C":"正確。難以接受改變的僵化思考模式。","D":"錯誤(本題答案)。Luminal是抗癲癇藥(非自閉症治療藥)。"},"sources":["新文京《兒科護理學》自閉症","非luminal"]}},"114030-N4-28":{"quick":"自閉症兒童照護指導不適當的是「可增加居家環境的改變,刺激其認知學習」(A)。","detail":{"background":"自閉症兒童「需固定一致的環境與常規」,「增加環境改變」會增焦慮與行為問題,故A不適當。其餘正確:行為症狀會持續至成人期、用抗精神病/中樞活化劑等藥減輕症狀、多於幼兒期被發現宜及早早療。　補充：自閉症照護應「維持固定、結構化、可預期」的環境以減少焦慮；「增加居家環境改變以刺激認知」反而造成不安與行為問題，為不適當指導。","options":{"A":"不適當(本題答案)。自閉症需固定環境(非增加改變)。","B":"正確。行為症狀會持續至成人期。","C":"正確。用藥物減輕症狀(緩解共病)。","D":"正確。多於幼兒期發現,宜及早早期療育。"},"sources":["新文京《兒科護理學》自閉症","固定環境"]}},"109030-N4-57":{"quick":"國三青少年憂鬱症再發,母親詢問怎麼做最好,最佳回答是「可多陪伴小春,鼓勵到戶外曬太陽與進行規律運動」(D)。","detail":{"background":"青少年憂鬱症的支持應「多陪伴、鼓勵規律運動與曬太陽(助情緒調節)、規則服藥就醫」。不應「多獨處」(憂鬱者獨處易惡化,A);不可「自行停藥」(會復發,B);「加重課業/補習」反增壓力(C),故D最佳。　補充：青少年憂鬱症照護以陪伴、傾聽、規律作息與運動、戶外活動及專業治療為主，應避免否定其感受；多陪伴、鼓勵戶外運動與曬太陽有助情緒改善。","options":{"A":"錯。憂鬱者多獨處易惡化(應多陪伴)。","B":"錯。不可自行停藥(會復發)。","C":"錯。加重課業補習反增壓力。","D":"正確。多陪伴、鼓勵戶外曬太陽與規律運動。"},"sources":["新文京《兒科護理學》青少年憂鬱","陪伴運動"]}},"109110-N4-48":{"quick":"3歲吸吮拇指卻以另一手遮掩、以為別人不會發現,屬「自我為中心」(A)。","detail":{"background":"3歲(運思前期)「自我中心(egocentrism)」——以為別人看到的、想到的與自己一樣,故遮住自己的手就以為別人不會發現。去集中作用、保留概念、可逆性是具體運思期(較晚)才發展,故A正確。　補充：學齡前兒童(約2~7歲)依皮亞傑屬運思前期，思考具「自我中心」——以為別人所見所知與自己相同；以另一手遮掩吸拇指、以為別人不會發現即為自我中心表現。","options":{"A":"正確。以為遮住手別人就看不到=自我為中心。","B":"去集中作用是具體運思期(較晚)。","C":"保留概念是具體運思期。","D":"可逆性是具體運思期。"},"sources":["新文京《兒科護理學》Piaget","自我中心"]}},"110110-N4-44":{"quick":"ADHD的行為表現與診斷錯誤的是「過動及衝動行為持續3個月」(B)。","detail":{"background":"ADHD診斷須症狀「持續至少6個月、且12歲前出現、在兩個以上場合」,故「持續3個月」錯誤(時間不足)。其餘正確:容易分心精神無法集中、是學齡兒童常見的發展性神經行為障礙、重複被禁止的行為引人注意。　補充：ADHD診斷需注意力不足與/或過動-衝動症狀於12歲前出現、持續「至少6個月」、出現在兩種以上場合且影響功能；「持續3個月」之敘述錯誤。","options":{"A":"正確。容易分心、精神無法集中。","B":"錯誤(本題答案)。症狀須持續至少6個月(非3個月)。","C":"正確。是學齡兒童常見的發展性神經行為障礙。","D":"正確。重複被禁止的行為引人注意。"},"sources":["新文京《兒科護理學》ADHD","6個月"]}},"113030-N4-27":{"quick":"16歲青少年憂鬱症,如何幫助小明錯誤的是「告知小明不要胡思亂想,應致力於課業成就」(C)。","detail":{"background":"青少年憂鬱應「同理、陪伴、鼓勵運動、規則治療」,「叫他不要胡思亂想、致力課業」是否定其感受並增加壓力,故C錯誤。其餘正確:讓他知道生病了需要治療、多安排戶外運動、多陪伴避免獨處。　補充：青少年憂鬱症協助應傾聽接納、不批判、鼓勵表達與規律運動、必要時專業治療；「告知不要胡思亂想、應致力課業」否定其感受、增加壓力，為錯誤。","options":{"A":"正確。讓小明知道自己生病了,需要治療。","B":"正確。多安排戶外運動。","C":"錯誤(本題答案)。叫他不要胡思亂想致力課業是否定感受、增壓力。","D":"正確。多陪伴,避免小明獨處。"},"sources":["新文京《兒科護理學》青少年憂鬱","同理"]}},"113100-N4-31":{"quick":"厭食症敘述錯誤的是「厭食症的女性易造成經血過多,經期過短的問題」(B)。","detail":{"background":"神經性厭食的女性因嚴重營養不良、體脂過低,下視丘功能受抑制而「無月經(停經)」而非「經血過多」,故B錯誤。其餘正確:好發青少年期女性多、對身體形象知覺錯誤(自覺胖)、用認知行為與心理治療修正不良飲食行為。","options":{"A":"正確。好發於青少年期,女性多。","B":"錯誤(本題答案)。厭食症多致停經(非經血過多)。","C":"正確。對身體形象知覺錯誤(自覺胖)。","D":"正確。用認知行為及心理治療修正飲食行為。"},"sources":["新文京《兒科護理學》厭食症","停經"]}},"114100-N4-26":{"quick":"專科3年級青少年憂鬱症復發、企圖自傷,護理指導正確的是「提供醣類、奶製品、魚油、蔬菜油及維生素食物」(B)。","detail":{"background":"憂鬱症飲食可「補充含色胺酸(助合成血清素)的醣類、奶製品、富含omega-3的魚油、維生素」輔助情緒。藥物副作用「不可自行停藥」(A錯);應「主動關心討論、陪伴」(非避免討論/獨處,C、D錯,且有自傷風險更不可讓其獨處),故B正確。","options":{"A":"錯。不可自行停藥(會復發,有自傷風險)。","B":"正確。提供醣類、奶製品、魚油、維生素(助情緒)。","C":"錯。不應避免討論(應主動關心)。","D":"錯。有自傷風險不可讓其獨處(應陪伴)。"},"sources":["新文京《兒科護理學》青少年憂鬱","飲食"]}},"114170-N4-26":{"quick":"注意力不足過動症(ADHD)正確的是「以中樞神經興奮劑如Ritalin、Methylphenidate、Atomoxetine增加注意力、減少衝動行為」(D)?——本題答D。","detail":{"background":"本題官方答案為D。ADHD藥物治療以「中樞神經興奮劑(methylphenidate/Ritalin)」為主(Atomoxetine是非興奮劑、選擇性正腎上腺素回收抑制劑,常一併列為治療藥)增加注意力、減少衝動。症狀須「12歲前出現至少6個月」(A的3個月錯);與「多巴胺/正腎上腺素」功能異常較相關(B說血清素不精確);「不應用處罰矯正」(應正向行為治療,C錯)。","options":{"A":"錯。症狀須持續至少6個月(非3個月)。","B":"ADHD與多巴胺/正腎上腺素較相關(非血清素為主)。","C":"錯。不應用處罰(應正向行為治療)。","D":"正確(本題答案)。用中樞神經興奮劑等增加注意力、減少衝動。"},"sources":["新文京《兒科護理學》ADHD","興奮劑"]}},"112180-N4-27":{"quick":"厭食症相關敘述錯誤的是「照護以提供足夠的營養,體重增加速度以每週3~5公斤為理想值」(D)。","detail":{"background":"厭食症營養復健「體重增加應緩慢(約每週0.5~1公斤)」,過快(每週3~5公斤)會致再餵食症候群與心血管負擔,故D錯誤。其餘正確:成因非單一因素、用行為治療與家庭心理諮商修正飲食行為、害怕體重增加而忍受飢餓或自我催吐。","options":{"A":"正確。厭食症成因非單一因素。","B":"正確。用行為治療與家庭心理諮商修正飲食行為。","C":"正確。害怕體重增加而忍受飢餓或自我催吐。","D":"錯誤(本題答案)。體重增加應緩慢(每週0.5~1kg,非3~5kg)。"},"sources":["新文京《兒科護理學》厭食症","緩慢增重"]}},"103030-N4-59":{"quick":"卡介苗(BCG)接種敘述正確的是?——本題答D「接種部位產生潰瘍時不可塗藥,讓其自然痊癒」。","detail":{"background":"卡介苗接種後局部出現「紅腫→膿疱→潰瘍→結痂」是正常免疫反應,「不可塗藥或包紮,保持清潔讓其自然痊癒」。它是「活性減毒」牛型結核桿菌(非殺死,A錯);採「皮內注射」於左上臂三角肌(非皮下,C錯);低體重早產兒須體重達標才接種(非不管體重1週內,B錯),故D正確。","options":{"A":"錯。卡介苗是活性減毒(非殺死的)牛型結核桿菌。","B":"錯。低體重須達標才接種(非不管體重1週內)。","C":"錯。卡介苗是皮內注射(非皮下)。","D":"正確。接種部位潰瘍不可塗藥,讓其自然痊癒。"},"sources":["疾管署","卡介苗皮內"]}},"103100-N4-68":{"quick":"11個月川崎氏病IVIG治療護理措施錯誤的是「出院衛教家屬,需繼續服用Aspirin,如果症狀消失就不需再追蹤」(D)。","detail":{"background":"川崎氏症即使症狀消失,仍須「長期定期追蹤心臟(冠狀動脈瘤)」與依醫囑服低劑量aspirin,故「症狀消失就不需追蹤」錯誤。其餘正確:IVIG可降低冠狀動脈病變、注射時觀察過敏、IVIG後接種活性減毒疫苗須間隔至少半年(11個月)。","options":{"A":"正確。IVIG可降低冠狀動脈病變發生率。","B":"正確。靜脈注射IVIG須觀察過敏現象。","C":"正確。IVIG後活性減毒疫苗須間隔半年以上。","D":"錯誤(本題答案)。川崎症須長期追蹤心臟(非症狀消失就不追蹤)。"},"sources":["新文京《兒科護理學》川崎症","追蹤"]}},"104100-N4-58":{"quick":"可以接種流行性感冒疫苗的是「罹患白血病等惡性疾病的兒童」(B)。","detail":{"background":"流感是不活化疫苗,慢性病與免疫低下者(白血病)反而是「重症高危險群,建議接種」(不活化疫苗對免疫低下者相對安全)。「過去接種曾有嚴重不良反應」「對蛋嚴重過敏」「6個月以下嬰兒」是禁忌或不適合,故B可接種。","options":{"A":"過去有嚴重不良反應者不宜(禁忌)。","B":"正確。白血病等惡性疾病兒童是重症高危,建議接種。","C":"對蛋嚴重過敏者須謹慎/禁忌。","D":"6個月以下嬰兒不適合接種流感疫苗。"},"sources":["疾管署","流感高危"]}},"105090-N4-57":{"quick":"接種途徑是肌肉注射、部位在嬰幼兒大腿前外側的是「B型肝炎免疫球蛋白」(C)。","detail":{"background":"B型肝炎免疫球蛋白(HBIG)採「肌肉注射」,嬰幼兒部位選「大腿前外側(股外側肌)」。卡介苗是皮內、日本腦炎疫苗是皮下、MMR是皮下注射,故C(HBIG肌注大腿前外側)正確。　補充：B型肝炎「免疫球蛋白(HBIG)」為被動免疫，採肌肉注射、嬰幼兒部位為大腿前外側(股外側肌)；用於HBsAg陽性母親之新生兒，須於出生後儘速施打。","options":{"A":"卡介苗是皮內注射(非肌注大腿)。","B":"日本腦炎疫苗是皮下注射。","C":"正確。B肝免疫球蛋白肌注於嬰幼兒大腿前外側。","D":"MMR(麻疹腮腺炎德麻)是皮下注射。"},"sources":["疾管署","HBIG肌注"]}},"106110-N4-58":{"quick":"1歲半川崎氏症高劑量Aspirin+IVIG護理指導不適當的是「注射免疫球蛋白之後3個月,小明就可以接種任何疫苗」(C)。","detail":{"background":"IVIG含被動抗體會干擾活性減毒疫苗(MMR、水痘)的免疫反應,接種活疫苗須「間隔至少6~11個月」(非3個月),故C不適當。其餘適當:高劑量aspirin抗發炎抑制血小板凝集、換透氣衣物保護水腫處、半年內每月做心電圖追蹤心臟併發症。","options":{"A":"適當。高劑量Aspirin抗發炎、抑制血小板凝集。","B":"適當。換透氣衣物保護下肢水腫處。","C":"不適當(本題答案)。IVIG後活疫苗須間隔約半年以上(非3個月)。","D":"適當。半年內每月做心電圖追蹤心臟併發症。"},"sources":["新文京《兒科護理學》川崎症","活疫苗間隔"]}},"106111-N4-57":{"quick":"流感疫苗注射後需3~4週產生抗體,臺灣應於何時開始施打較有預防效果?——「9~10月」(C)。","detail":{"background":"臺灣流感流行高峰約在「11月~隔年3月(冬季)」,疫苗注射後需3~4週才產生抗體,故應於「9~10月(秋季)」開始施打,趕在流行季前形成保護力。　補充：流感疫苗注射後需3~4週才產生抗體，台灣流感好發於冬季，故建議於每年「9~10月」開始施打，以在流行高峰前形成保護力。","options":{"A":"2~3月已是流行季尾(太晚)。","B":"5~6月離流行季太遠(抗體可能下降)。","C":"正確。9~10月開始施打,趕在冬季流行前產生抗體。","D":"11月至隔年1月已進入流行季(略晚)。"},"sources":["疾管署","流感施打"]}},"107030-N4-66":{"quick":"我國小兒麻痺傳染及預防正確的是「臺灣為小兒麻痺根除地區,2000年之後已不需全面接種小兒麻痺疫苗」(B)?——實際應為「主要藉由糞口途徑傳染」(C)。","detail":{"background":"本題官方答案為C。小兒麻痺(脊髓灰質炎)病毒主要經「糞口途徑」傳染,須注意由糞便排出感染未接種者。臺灣已是根除地區但「仍須常規接種疫苗維持保護力」(B的不需接種錯);現多用不活化疫苗(IPV),但非因「臺灣為流行地區」(A錯);非主要飛沫傳染(D錯),故C正確。","options":{"A":"臺灣非流行地區(此敘述前提錯)。","B":"錯。根除地區仍須常規接種維持保護力(非不需接種)。","C":"正確。主要經糞口途徑傳染,注意糞便感染未接種者。","D":"錯。小兒麻痺非主要飛沫傳染(是糞口)。"},"sources":["疾管署","小兒麻痺糞口"]}},"107110-N4-56":{"quick":"1個月大接種B型肝炎疫苗,適合肌肉注射的部位是「股外側肌」(C)。","detail":{"background":"嬰兒(尤<2歲)肌肉注射首選「股外側肌(大腿前外側)」(肌肉量足、無大血管神經)。左上臂三角肌肌肉量不足(較大兒童才用)、腹直肌非肌注部位、腹臀肌/背臀肌2歲以下避免(坐骨神經風險),故C正確。　補充：1個月大嬰兒肌肉注射(如B肝疫苗)首選部位為「大腿前外側股外側肌」——肌肉量較足、避開坐骨神經與大血管；臀肌因肌肉與神經未發育完全不宜用於嬰幼兒。","options":{"A":"左上臂三角肌肌肉量不足(1個月不宜)。","B":"腹直肌非肌注部位。","C":"正確。股外側肌是嬰兒肌注首選。","D":"腹臀肌2歲以下避免(神經血管風險)。"},"sources":["疾管署","股外側肌"]}},"108110-N4-65":{"quick":"依疾管署現行兒童預防接種時程,卡介苗(BCG)建議接種時間是「出生滿5~8個月」(C)。","detail":{"background":"我國現行卡介苗接種時程已調整為「出生滿5~8個月」接種(早年是出生24小時後,因降低骨髓炎風險而延後)。出生7~21天、1~4個月、9~12個月皆非現行建議,故C正確。　補充：我國現行兒童預防接種時程中，卡介苗(BCG)建議於「出生滿5~8個月」接種(因應結核疫情調整)；卡介苗為活性減毒疫苗、採皮內注射。","options":{"A":"出生7~21天是舊時程(非現行)。","B":"1~4個月非現行卡介苗時程。","C":"正確。卡介苗建議接種時間是出生滿5~8個月。","D":"9~12個月非卡介苗時程。"},"sources":["疾管署","卡介苗5-8月"]}},"107110-N4-61":{"quick":"6個月接種五合一疫苗,護理措施適當的是「注射後請媽媽擁抱,並提供安撫奶嘴」(B)。","detail":{"background":"嬰兒(6個月)注射後「由母親擁抱安撫、給安撫奶嘴」可有效安撫、減少哭鬧。布偶空針說明對6個月嬰兒太抽象(A,適合學齡前);注射藥劑應「快速」推注減少疼痛時間(非緩慢,C);6個月嬰兒貼小膠布有誤食/窒息風險且非必要(D),故B適當。","options":{"A":"布偶空針說明對6個月嬰兒太抽象(適合學齡前)。","B":"正確。注射後母親擁抱、提供安撫奶嘴安撫。","C":"錯。注射應快速推注(減少疼痛時間,非緩慢)。","D":"6個月貼小膠布有誤食風險且非必要。"},"sources":["新文京《兒科護理學》接種","安撫"]}},"111030-N4-59":{"quick":"川崎氏症護理指導不適當的是「注射免疫球蛋白2個月後,要按時接種疫苗」(A)。","detail":{"background":"IVIG後接種「活性減毒疫苗」須間隔「至少6~11個月」(被動抗體干擾),「2個月後接種」太早,故A不適當。其餘適當:退燒後仍依醫囑服低劑量aspirin、飲食少量多餐軟質、出院定期追蹤心臟功能。　補充：川崎氏症常以高劑量免疫球蛋白(IVIG)治療；接種「活性減毒疫苗(如MMR、水痘)」應於IVIG後延後約11個月，以免影響抗體產生；「2個月後按時接種」不適當。","options":{"A":"不適當(本題答案)。IVIG後活疫苗須間隔約半年以上(非2個月)。","B":"適當。退燒後仍依醫囑服低劑量Aspirin。","C":"適當。飲食採少量多餐、軟質食物。","D":"適當。出院後定期回院追蹤心臟功能。"},"sources":["新文京《兒科護理學》川崎症","活疫苗間隔"]}},"114100-N4-28":{"quick":"護理師提供疫苗實證依據協助父母決定是否施打流感疫苗,展現的角色功能是「預防保健照護者」(D)。","detail":{"background":"提供「疫苗(預防接種)的實證資訊協助預防疾病」展現的是「預防保健照護者」角色。協調合作者(整合資源)、協助恢復健康者(治療照護)、持續性健康照護(連續照護)皆非此例核心,故D正確。　補充：護理師提供疫苗實證依據協助父母做接種決策，展現「預防保健照護者(健康促進者)」角色——以實證資訊促進兒童預防保健與知情選擇。","options":{"A":"協調者合作者是整合資源(非此例)。","B":"協助恢復健康者是治療照護(非預防)。","C":"持續性健康照護是連續性照護(非此例)。","D":"正確。提供疫苗實證協助預防=預防保健照護者。"},"sources":["新文京《兒科護理學》護理角色","預防保健"]}},"114100-N4-38":{"quick":"國內常規接種主要建議採「皮下注射」的疫苗是「水痘疫苗」(A)。","detail":{"background":"水痘疫苗(活性減毒)採「皮下注射」。卡介苗是「皮內」、B型肝炎疫苗與五合一疫苗是「肌肉注射」,故A(水痘皮下)正確。　補充：水痘疫苗、MMR等「活性減毒疫苗」主要採「皮下注射」；B肝、白喉百日咳破傷風等不活化疫苗多採肌肉注射；卡介苗則為皮內注射。","options":{"A":"正確。水痘疫苗採皮下注射。","B":"卡介苗是皮內注射。","C":"B型肝炎疫苗是肌肉注射。","D":"五合一疫苗是肌肉注射。"},"sources":["疾管署","水痘皮下"]}},"114170-N4-37":{"quick":"可接種第一劑流感疫苗的時間是「出生滿6個月」(B)。","detail":{"background":"流感疫苗建議「出生滿6個月以上」才可接種(6個月以下嬰兒不適合)。出生滿4個月太早、9個月與12個月雖也可接種但「最早可接種」是滿6個月,故B正確。　補充：流感疫苗可於「出生滿6個月」開始接種第一劑；未滿6個月嬰兒不適合施打，宜由周圍照顧者接種以形成保護(包覆策略)。","options":{"A":"出生滿4個月太早(<6個月不適合)。","B":"正確。出生滿6個月可接種第一劑流感疫苗。","C":"9個月已可,但最早是6個月。","D":"12個月已可,但最早是6個月。"},"sources":["疾管署","流感6個月"]}},"101030-N4-62":{"quick":"協助病童接受支氣管鏡檢查錯誤的是「檢查前需禁食,並給予epinephrine(Bosmin)以減少咽喉分泌物及嘔吐反射」(B)。","detail":{"background":"支氣管鏡檢查前給的是「抗膽鹼藥(如atropine)」減少分泌物與迷走反射,而非epinephrine(Bosmin),故B錯誤。其餘正確:可檢查病灶取組織並治療、檢查後觀察生命徵象與喉頭痙攣呼吸困難、待咳嗽嘔吐反射恢復才漸進進食。","options":{"A":"正確。可檢查病灶、取組織並同時治療。","B":"錯誤(本題答案)。減少分泌物用atropine(非epinephrine)。","C":"正確。檢查後觀察生命徵象、喉頭痙攣、呼吸困難。","D":"正確。待咳嗽嘔吐反射恢復才漸進進食。"},"sources":["新文京《兒科護理學》支氣管鏡","atropine"]}},"102030-N4-47":{"quick":"為4歲兒童評估呼吸較不適當的是「先測量體溫後,再測量呼吸」(A)。","detail":{"background":"幼兒應「先測呼吸(安靜時觀察)再測脈搏、體溫」,因測體溫(尤侵入性如肛溫)會使其哭鬧、影響呼吸測量,故「先測體溫再測呼吸」較不適當。其餘適當:呼吸測完整1分鐘、用觸診評估兩側胸廓移動、觀察呼吸深度與規律。","options":{"A":"較不適當(本題答案)。應先測呼吸再測體溫(體溫測量會干擾呼吸)。","B":"適當。呼吸測量需完整1分鐘。","C":"適當。觸診評估兩側胸廓移動是否一致。","D":"適當。觀察呼吸的深度與規律性。"},"sources":["新文京《兒科護理學》生命徵象","先測呼吸"]}},"102110-N4-80":{"quick":"用耳溫槍為4歲測耳溫不適當的是「將李小妹的耳朵向下向後拉」(C)。","detail":{"background":"4歲(3歲以上)測耳溫應將耳朵「向上向後」拉直外耳道,「向下向後」是3歲以下的拉法,故C不適當。其餘適當:耳道保持水平、不同病童間更換耳套膜(防交叉感染)、置入耳道按鈕測量。　補充：3歲以上兒童(及成人)測耳溫應將耳朵「向上向後」拉直外耳道；3歲以下才向下向後拉；故對4歲兒童「向下向後拉」不適當。","options":{"A":"適當。測量時耳道儘量保持水平。","B":"適當。不同病童間更換耳套膜(防交叉感染)。","C":"不適當(本題答案)。4歲應耳朵向上向後拉(非向下向後)。","D":"適當。將耳溫槍置入耳道並按鈕。"},"sources":["新文京《兒科護理學》耳溫","向上後"]}},"103030-N4-49":{"quick":"收集兒童尿液標本不適當的是「使用小兒集尿袋時,每小時需檢查1次」(C)?——本題答C。","detail":{"background":"本題官方答案為C。使用小兒集尿袋應「更頻繁(約每15~30分鐘)檢查」是否解尿並及時取下,以免尿液久放污染或滲漏,「每小時檢查1次」太久,故C不適當。其餘適當:無法合作嬰幼兒用小兒集尿袋、尿液30分鐘內送檢、較大合作兒童採中段尿。","options":{"A":"適當。無法合作嬰幼兒可用小兒集尿袋。","B":"適當。尿液標本30分鐘內送檢。","C":"不適當(本題答案)。集尿袋應更頻繁檢查(每小時太久)。","D":"適當。較大合作兒童採中段尿。"},"sources":["新文京《兒科護理學》尿液標本","集尿袋"]}},"104030-N4-47":{"quick":"為兒童測血壓選擇壓脈帶寬度較適當的是「所選測量肢體長度的三分之二」(B)。","detail":{"background":"兒童血壓壓脈帶寬度應「約為測量肢體(上臂)長度的2/3」(或覆蓋上臂40%、氣囊環繞80~100%)。太窄血壓偏高、太寬偏低。依身高選(A)、大於直徑50%(C)、占周長80%(D,那是氣囊環繞)皆非寬度的標準描述,故B正確。","options":{"A":"壓脈帶寬度依肢體長度選(非身高)。","B":"正確。寬度約為測量肢體長度的2/3。","C":"「大於直徑50%」非寬度標準。","D":"占周長80%是氣囊環繞長度(非寬度)。"},"sources":["新文京《兒科護理學》血壓","2/3"]}},"104030-N4-62":{"quick":"4個月嬰兒正常心尖搏動位置是「在左鎖骨中線與第4肋間的交接處」(A)。","detail":{"background":"嬰幼兒(<7歲)因心臟位置較高、較橫,心尖搏動約在「左鎖骨中線與第4肋間」;7歲以上才下移到「第5肋間左鎖骨中線」。胸骨中線、第6肋間皆非嬰兒心尖位置,故A正確。　補充：嬰幼兒心臟位置較水平且偏高，正常心尖搏動位於「左鎖骨中線與第4肋間交會處」(7歲以下)；7歲後逐漸下移至第5肋間鎖骨中線內側。","options":{"A":"正確。嬰兒心尖在左鎖骨中線第4肋間。","B":"第6肋間是較大或心臟下移的位置(非4個月)。","C":"胸骨中線非心尖位置。","D":"胸骨中線第6肋間非嬰兒心尖位置。"},"sources":["新文京《兒科護理學》心尖","嬰兒第4肋間"]}},"104100-N4-46":{"quick":"使用耳鏡視診兒童耳朵正確的是「正常沒有感染的鼓膜,呈現透明或珍珠色」(C)。","detail":{"background":"正常鼓膜呈「透明、珍珠灰色、有光錐反射」;感染時鼓膜紅、外凸、光錐消失。耳鏡須「插入耳道並拉直耳道觀察」(非只用光照,A錯);3歲以下耳廓「向下向後」拉(非向上向後,B錯);鼓膜破裂有耳漏時「可能看到穿孔」(D錯),故C正確。","options":{"A":"錯。耳鏡須插入耳道觀察(非只用光照)。","B":"錯。3歲以下耳廓向下向後拉(非向上向後)。","C":"正確。正常鼓膜呈透明或珍珠色。","D":"鼓膜破裂可能看到穿孔(D敘述不當)。"},"sources":["新文京《兒科護理學》耳鏡","珍珠色"]}},"106030-N4-48":{"quick":"20個月幼兒身體檢查一般尚未長出的乳齒是「第二大臼齒」(D)。","detail":{"background":"乳牙萌發約6個月起,「第二乳臼齒(最後一顆)約24~30個月才長出」,故20個月時第二大臼齒尚未長出。犬齒(約16~20個月)、側門齒(約9~13個月)、第一大臼齒(約13~19個月)在20個月多已長出,故D尚未長出。","options":{"A":"犬齒約16~20個月多已長出。","B":"側門齒約9~13個月已長出。","C":"第一大臼齒約13~19個月已長出。","D":"尚未(本題答案)。第二大臼齒約24~30個月才長出。"},"sources":["新文京《兒科護理學》乳牙","第二臼齒"]}},"106111-N4-50":{"quick":"兒童心尖搏動位置正確的是「7歲以上的兒童:位於第5肋間左鎖骨中線上」(C)。","detail":{"background":"心尖搏動隨年齡下移外移:「7歲以上(含成人)在第5肋間左鎖骨中線」;7歲以下(嬰幼兒)在第4肋間左鎖骨中線。故C正確。嬰兒第5肋間(A錯,應第4)、第4肋間左胸骨邊緣(B位置錯)、12歲第6肋間胸骨邊緣(D錯)。","options":{"A":"錯。嬰兒心尖在第4肋間左鎖骨中線(非第5)。","B":"位置敘述錯(非左胸骨邊緣)。","C":"正確。7歲以上在第5肋間左鎖骨中線。","D":"錯。位置敘述不符。"},"sources":["新文京《兒科護理學》心尖","7歲第5肋間"]}},"107030-N4-60":{"quick":"嬰幼兒生命徵象測量順序正確的是「呼吸→脈搏→體溫」(A)。","detail":{"background":"嬰幼兒生命徵象測量應「先測干擾最少的呼吸(安靜觀察)→脈搏(心尖脈)→最後體溫」,因體溫測量(尤侵入性)會引起哭鬧影響前兩項,故順序為呼吸→脈搏→體溫。　補充：嬰幼兒生命徵象測量順序為「呼吸→脈搏→體溫」——先測干擾最少的呼吸與脈搏(在安靜時)，最後測體溫(尤其侵入性的肛溫易哭鬧影響前兩項)。","options":{"A":"正確。呼吸→脈搏→體溫(由干擾最少到最大)。","B":"脈搏在呼吸之後(此順序不符)。","C":"順序不符。","D":"體溫應最後測(非最先)。"},"sources":["新文京《兒科護理學》生命徵象","順序"]}},"107110-N4-60":{"quick":"為1歲兒童測量生命徵象正確的是「呼吸、脈搏均需測量完整一分鐘」(A)。","detail":{"background":"嬰幼兒呼吸與脈搏不規則,須「測量完整1分鐘」才準確。體溫量口溫不適合幼兒(易咬、不配合,B錯);壓脈帶寬度約上臂的「2/3」(非1/3,C錯);幼兒脈搏常測「心尖脈」(橈動脈不易摸,D錯),故A正確。","options":{"A":"正確。呼吸、脈搏均需測完整1分鐘。","B":"錯。幼兒不宜量口溫(易咬不配合)。","C":"錯。壓脈帶寬度約上臂2/3(非1/3)。","D":"錯。幼兒常測心尖脈(橈動脈不易摸)。"},"sources":["新文京《兒科護理學》生命徵象","1分鐘"]}},"108110-N4-42":{"quick":"觸診幼兒頸部淋巴結,屬異常現象的是「界限不清楚」(B)。","detail":{"background":"正常淋巴結「小(<1cm)、界限清楚、可移動、不壓痛」;異常(感染/惡性)淋巴結「界限不清、固定不移動、壓痛或無痛但快速腫大、質地硬」。「界限不清楚」是異常,故B。　補充：正常淋巴結觸診特徵為小、可移動、界限清楚、質地軟、無壓痛；「界限不清楚」(固定、硬、壓痛或粘連)屬異常，需進一步評估感染或腫瘤。","options":{"A":"正常。直徑小於1cm。","B":"異常(本題答案)。界限不清楚(疑感染/惡性)。","C":"正常。指下可移動。","D":"正常。不會壓痛(良性)。"},"sources":["新文京《兒科護理學》淋巴結","界限不清"]}},"109030-N4-59":{"quick":"5個月採心尖脈測心跳,位置正確的是「左鎖骨中線與第三、四肋骨的交會處」(B)。","detail":{"background":"嬰兒(5個月)心尖脈位置約在「左鎖骨中線與第3~4肋間」(因心臟位置較高)。第一二肋間太高、第五六肋間是7歲以上、第七八肋間太低,故B正確。　補充：嬰幼兒心尖搏動位於「左鎖骨中線與第3~4肋間交會處」(7歲以下心臟位置較高且水平)，測心跳應於此聽診1分鐘。","options":{"A":"第一、二肋間太高(非嬰兒心尖)。","B":"正確。嬰兒心尖在左鎖骨中線第3、4肋間。","C":"第五、六肋間是7歲以上(非嬰兒)。","D":"第七、八肋間太低。"},"sources":["新文京《兒科護理學》心尖","嬰兒第3-4肋間"]}},"110030-N4-45":{"quick":"1歲1個月發燒入院測生命徵象較不適當的是「採肛溫測量以獲得正確體溫」(A)。","detail":{"background":"肛溫雖準確但「具侵入性、易引起不適與穿孔風險」,非常規首選,可改耳溫/腋溫,故A較不適當(尤非必要時)。其餘適當:讓主要照顧者陪伴減少哭鬧、先量呼吸心跳再量體溫、血壓測量最常用右上臂。　補充：為發燒嬰幼兒測量體溫宜採耳溫或腋溫；「肛溫」雖較準確但具侵入性、易致不適與腸穿孔風險，對1歲幼兒非首選、較不適當。","options":{"A":"較不適當(本題答案)。肛溫侵入性、非常規首選(可用耳/腋溫)。","B":"適當。讓主要照顧者陪伴在身旁。","C":"適當。先量呼吸、心跳再量體溫。","D":"適當。血壓測量部位最常用右上臂。"},"sources":["新文京《兒科護理學》體溫","非肛溫"]}},"110110-N4-48":{"quick":"4歲身體檢查最適當＝該年齡為腹式呼吸，評估呼吸速率時應觀察腹部起伏。","detail":{"background":"本題官方答案為B(以選項中相對最適當者)。其餘明顯錯誤:測耳溫4歲應「向上向後」拉(非向下向後,A錯);額竇「出生時尚未發育,約6~7歲後才發育」(非出生即存在,C錯);4歲仍以「腹式呼吸」評估(D其實正確方向但本題以B為答)。註:嚴格而言4歲心尖在第4肋間,本題以B為官方答案。","options":{"A":"4歲(3歲以上)測耳溫應將耳朵「向上向後」拉(非向下向後)。","B":"4歲心尖脈在「第4肋間」與左鎖骨中線交會(7歲以上才在第5肋間)，故B錯。","C":"額竇約6~7歲後才發育(非出生即存在)。","D":"正確。4歲為腹式呼吸，評估呼吸應觀察腹部起伏。"},"sources":["新文京《兒科護理學》身體評估","心尖"]}},"111110-N4-48":{"quick":"執行兒童生命徵象測量錯誤的是「呼吸暫停是新生兒常見表徵,僅需持續觀察和記錄」(B)。","detail":{"background":"新生兒(尤早產兒)呼吸暫停須「積極處置(觸覺刺激、給氧、必要時藥物/呼吸器)」,並非僅觀察記錄,故B錯誤。其餘正確:幼兒測量依序呼吸脈搏體溫血壓、2歲以下測心尖脈完整1分鐘、3歲以下測耳溫耳朵向下向後拉。","options":{"A":"正確。幼兒測量依序呼吸、脈搏、體溫、血壓。","B":"錯誤(本題答案)。呼吸暫停須積極處置(非僅觀察記錄)。","C":"正確。2歲以下測心尖脈完整1分鐘。","D":"正確。3歲以下測耳溫,耳朵向下向後拉。"},"sources":["新文京《兒科護理學》生命徵象","呼吸暫停"]}},"112110-N4-45":{"quick":"兒童血壓測量正確的是「1歲以上兒童的下肢測量收縮壓會比上肢高約20 mmHg」(D)。","detail":{"background":"正常情況「下肢收縮壓比上肢高約10~20 mmHg」(主動脈狹窄時則下肢低於上肢)。最常用基準是「上臂肱動脈(非橈動脈)」(A錯);壓脈帶寬度約肢體的「2/3」(非1/2,B錯);<1歲血壓約「70~90/50~65」(100~110過高,C錯),故D正確。","options":{"A":"錯。最常用上臂肱動脈(非橈動脈)。","B":"錯。壓脈帶寬度約肢體2/3(非1/2)。","C":"錯。<1歲血壓約70~90/50~65(100~110過高)。","D":"正確。下肢收縮壓比上肢高約10~20mmHg。"},"sources":["新文京《兒科護理學》血壓","下肢高"]}},"114030-N4-29":{"quick":"10個月嬰兒身體檢查仍會有的反射是「巴賓斯基氏反射(Babinski’s reflex)」(D)。","detail":{"background":"巴賓斯基反射(劃足底外緣腳趾上翹扇形)在「約2歲(髓鞘化完成)前」仍正常存在,故10個月仍有。驚嚇反射(約4~6個月消失)、手掌抓握反射(約3~4個月消失)、踏步反射(約2個月消失)在10個月應已消失,故D仍存在。","options":{"A":"驚嚇反射約4~6個月消失(10個月應無)。","B":"手掌抓握反射約3~4個月消失。","C":"踏步反射約2個月消失。","D":"正確。巴賓斯基反射約2歲前仍存在(10個月仍有)。"},"sources":["新文京《兒科護理學》反射","Babinski"]}},"115030-N4-32":{"quick":"照護住院兒童錯誤的是「幼兒期在發展自主感,檢查前應讓他決定是否願意接受檢查」(B)。","detail":{"background":"幼兒期雖在發展自主感,但「必要的檢查不能讓幼兒決定要不要做」(他會拒絕),應給予「有限的選擇(如選哪隻手)」而非「是否接受」,故B錯誤(讓他決定是否接受不切實際)。其餘正確:嬰兒測量以呼吸開始、學齡前期維護身體完整性、學齡期檢查前先解釋增控制感。","options":{"A":"正確。測量嬰兒生命徵象以呼吸開始較佳。","B":"錯誤(本題答案)。必要檢查不能讓幼兒決定要不要(應給有限選擇)。","C":"正確。學齡前期需維護其身體完整性。","D":"正確。學齡期檢查前先解釋增加控制感。"},"sources":["新文京《兒科護理學》住院","有限選擇"]}},"115030-N4-38":{"quick":"為5個月嬰兒做呼吸系統身體檢查最適當的是「正常的呼吸次數約在30~40次/分」(B)。","detail":{"background":"嬰兒(5個月)正常呼吸約「30~40次/分」。耳鏡檢查嬰兒耳廓應「向下向後」拉(非向上向後,A錯);應「觸診/觀察腹部起伏並聽診」測呼吸,且嬰兒呼吸不規則須測「完整1分鐘」(C的「觀察胸部起伏」不如腹部,且須1分鐘);正常SpO2約「95~100%」(70~80%過低,D錯),故B正確。","options":{"A":"錯。嬰兒耳鏡耳廓向下向後拉(非向上向後)。","B":"正確。5個月嬰兒正常呼吸約30~40次/分。","C":"嬰兒呼吸觀察腹部起伏且須測1分鐘(此敘述不夠完整)。","D":"錯。正常SpO2約95~100%(70~80%過低)。"},"sources":["新文京《兒科護理學》呼吸","30-40"]}},"101110-N4-40":{"quick":"兒童燒傷最初休克期緊急處置不適當的是「以肌肉注射給予止痛劑,控制疼痛」(C)。","detail":{"background":"燒傷休克期因組織灌流不穩、水腫,「肌肉注射吸收不穩定」,止痛應採「靜脈注射」給藥,故C不適當。其餘適當:用乳酸林格氏液補水分電解質、吸入性灼傷維持呼吸道通暢、無菌技術處理燒傷部位防感染。　補充：兒童燒傷休克期緊急處置以維持呼吸道、靜脈輸液補充體液為核心；止痛應採「靜脈注射」(休克期周邊循環差、肌肉吸收不良)，肌肉注射吸收不穩定且不適當。","options":{"A":"適當。用乳酸林格氏溶液補充水分及電解質。","B":"適當。吸入性灼傷須維持呼吸道通暢。","C":"不適當(本題答案)。休克期止痛應靜脈注射(肌注吸收不穩)。","D":"適當。以無菌技術處理燒傷部位預防感染。"},"sources":["新文京《兒科護理學》燒傷","靜脈止痛"]}},"102110-N4-46":{"quick":"學齡前兒童肌肉注射後貼膠布,最主要目的是「減輕兒童身體完整性受損之恐懼」(C)。","detail":{"background":"學齡前兒童擔心「身體完整性受損(怕血/器官流出)」,注射後貼膠布讓他覺得「傷口被蓋住、身體是完整的」,以減輕此恐懼。它非無特殊意義、非主要為轉移注意或預防感染(針孔小),故C正確。　補充：學齡前兒童具魔幻思考且擔心身體完整性受損，肌肉注射後貼上膠布(OK繃)可象徵「傷口被封住、身體完整」，減輕對身體受損的恐懼。","options":{"A":"非無特殊意義(有心理意義)。","B":"非主要為轉移注意減痛。","C":"正確。減輕學齡前兒童身體完整性受損之恐懼。","D":"針孔小,非主要為預防感染。"},"sources":["新文京《兒科護理學》學齡前","身體完整性"]}},"105030-N4-45":{"quick":"為7個月嬰兒執行肌肉注射,最適當的處理方式是「握住嬰兒的手,並儘速完成注射過程」(C)。","detail":{"background":"嬰兒肌注應「固定肢體、儘速完成」減少疼痛刺激時間與亂動受傷。「叫嬰兒可哭不可亂動」(7個月聽不懂,A);「請母親離開」(母親在場可安撫,不需離開,B);「答應給牛奶」(7個月無法理解承諾,D)皆不適當,故C正確。","options":{"A":"7個月嬰兒聽不懂指令(A不當)。","B":"母親在場可安撫(不需離開)。","C":"正確。握住固定肢體、儘速完成注射。","D":"7個月無法理解承諾獎勵(D不當)。"},"sources":["新文京《兒科護理學》嬰兒注射","固定迅速"]}},"106030-N4-46":{"quick":"兒童肌肉注射部位：上臂三角肌吸收迅速、適合國小學童預防注射;嬰兒首選股外側肌，背臀肌靠坐骨神經、3歲以下避免。","detail":{"background":"本題官方答案為C。背臀肌(臀大肌)靠近坐骨神經,「2~3歲(行走)前肌肉未發育、6歲以下兒童儘量避免」以防傷神經。股外側肌(非股內側)是嬰兒首選(A錯,且應股外側神經血管少);腹臀肌(臀中肌)相對安全但敘述「神經血管少適合0~2歲」不夠精確(B);上臂三角肌肌肉量小、吸收非最快(D錯),故C正確。","options":{"A":"嬰兒首選「股外側肌」(非股內側肌)。","B":"腹臀肌雖相對安全，但此敘述不夠精確。","C":"背臀肌「非」吸收最迅速(且6歲以下避免)，敘述錯。","D":"正確。上臂三角肌吸收迅速，適合國小學童預防注射。"},"sources":["新文京《兒科護理學》注射部位","背臀肌"]}},"106030-N4-47":{"quick":"2歲幼兒滴耳藥步驟錯誤的是「將病童耳垂往上往後輕拉,以使耳道拉直」(C)。","detail":{"background":"2歲(3歲以下)滴耳藥耳廓應「往下往後」拉直外耳道,「往上往後」是3歲以上的拉法,故C錯誤。其餘正確:藥溫接近體溫、側臥患耳向上、沿耳壁滴藥後輕按摩耳部。　補充：為「3歲以下」幼兒滴耳藥應將耳廓「向下向後」拉直外耳道；3歲以上才向上向後拉；故2歲幼兒「往上往後拉」之步驟錯誤。","options":{"A":"正確。藥物溫度接近體溫為宜。","B":"正確。側臥或向健側半側臥,患耳向上。","C":"錯誤(本題答案)。2歲應耳垂往下往後拉(非往上往後)。","D":"正確。沿耳壁滴注藥物、輕按摩耳部。"},"sources":["新文京《兒科護理學》耳藥","向下後"]}},"108110-N4-48":{"quick":"胰島素注射敘述錯誤的是「以Z字法做肌肉注射」(B)。","detail":{"background":"胰島素是「皮下注射」(非Z字法肌肉注射,Z字法用於鐵劑等深部肌注以防滲漏染色),故B錯誤。其餘正確:先抽短效RI再抽中效NPH(避免長效污染短效)、注射部位輪換防脂質增生、吸收速度腹部>手臂>大腿>臀部。","options":{"A":"正確。先抽短效RI再抽中效NPH。","B":"錯誤(本題答案)。胰島素是皮下注射(非Z字肌肉注射)。","C":"正確。注射部位輪換,避免脂質增生。","D":"正確。吸收速度腹部>手臂>大腿>臀部。"},"sources":["新文京《兒科護理學》胰島素","皮下"]}},"109030-N4-61":{"quick":"為6個月嬰兒進行肌肉注射,最適當的是「盡速完成治療過程,減少疼痛刺激的時間」(C)。","detail":{"background":"6個月嬰兒肌注應「固定肢體、儘速完成」減少疼痛時間與亂動受傷。叫他可哭不可動(聽不懂,A)、請母親離開(母親可安撫不需離開,B)、答應獎勵(無法理解承諾,D)皆不適當,故C正確。　補充：為嬰幼兒肌肉注射應「迅速確實完成」以縮短疼痛刺激時間，並予安撫、固定肢體、選股外側肌；拖延或反覆操作會增加恐懼與疼痛。","options":{"A":"6個月聽不懂指令(A不當)。","B":"母親可協助安撫(不需離開)。","C":"正確。儘速完成減少疼痛刺激時間。","D":"6個月無法理解承諾獎勵(D不當)。"},"sources":["新文京《兒科護理學》嬰兒注射","迅速"]}},"111110-N4-68":{"quick":"肌肉注射鐵劑注意事項錯誤的是「搓揉注射部位以利吸收」(C)。","detail":{"background":"鐵劑(及某些藥)肌注後「不可搓揉(會使藥物滲漏到皮下,造成皮膚染色與疼痛)」,故C錯誤。其餘正確:採Z字型深部肌肉注射防滲漏、抽藥後更換針頭(避免針上藥液刺激)、注射後停留約5秒再拔針讓藥物擴散。　補充：肌肉注射鐵劑應採「Z字型注射法」、深部肌肉、注射後「不可搓揉」(避免鐵劑滲漏染色皮膚與刺激)；「搓揉注射部位以利吸收」之敘述錯誤。","options":{"A":"正確。採Z字型深部肌肉注射防滲漏。","B":"正確。抽藥後更換針頭。","C":"錯誤(本題答案)。鐵劑注射後不可搓揉(會滲漏染色)。","D":"正確。注射後停留約5秒再拔針。"},"sources":["新文京《兒科護理學》鐵劑","勿搓揉"]}},"112030-N4-50":{"quick":"不同年齡層兒童口服用藥正確的是「嬰兒若是服用藥粉,建議將藥粉溶入水中再以餵奶器滴入口中」(B)。","detail":{"background":"嬰兒服藥粉宜「溶於少量水中,用餵藥器/滴管沿頰側滴入」。口服給藥應抱起或半坐臥但「每次量依年齡(嬰兒非固定5mL,A不精確)」;幼兒反抗「不可壓下巴硬灌(易嗆,C錯)」;5歲以下吞藥丸宜置「舌後方(非舌尖,D錯)」,故B正確。","options":{"A":"嬰兒口服量依年齡(非固定每次5mL)。","B":"正確。藥粉溶水後以餵奶器滴入口中。","C":"錯。幼兒反抗不可壓下巴硬灌(易嗆)。","D":"錯。藥丸應置舌後方(非舌尖)。"},"sources":["新文京《兒科護理學》口服給藥","溶水"]}},"114100-N4-31":{"quick":"嬰兒安全給藥原則錯誤的是「肌肉注射時,應優先選擇腹臀肌,以免傷及坐骨神經」(B)。","detail":{"background":"嬰兒肌肉注射應「優先選股外側肌(大腿前外側)」,腹臀肌/背臀肌2歲以下儘量避免;且「避免坐骨神經」應選股外側肌而非腹臀肌,故B錯誤(敘述把首選說成腹臀肌)。其餘正確:口服藥滴管置舌頭兩側(頰側)助吞嚥、耳藥往下往後拉直耳道、鼻滴劑回溫至室溫避免刺激。","options":{"A":"正確。口服給藥滴管置舌頭兩側助吞嚥。","B":"錯誤(本題答案)。嬰兒肌注首選股外側肌(非腹臀肌)。","C":"正確。耳滴劑將耳朵往下往後拉直耳道。","D":"正確。鼻滴劑回溫至室溫再給藥。"},"sources":["新文京《兒科護理學》注射","股外側肌"]}},"106030-N4-2":{"quick":"現今產科照護發展趨勢正確的是「提升專業人員的衛教能力,並以電腦網絡達成資源共享」(A)。","detail":{"background":"現代產科照護趨勢:「提升專業衛教、運用資訊網絡共享資源、以家庭為中心、尊重文化、縮短住院」。鼓勵特定性別醫師(B不當)、挑戰各國傳統習俗(應尊重文化,C錯)、延長住院天數(趨勢是縮短,D錯)皆不符,故A正確。","options":{"A":"正確。提升專業衛教能力、以資訊網絡共享資源。","B":"鼓勵特定性別從事婦產科不適當。","C":"錯。應尊重各國文化習俗(非挑戰)。","D":"錯。趨勢是縮短住院(非延長)。"},"sources":["新文京《產科護理學》趨勢","資源共享"]}},"106110-N4-50":{"quick":"為學齡前期兒童執行侵入性治療錯誤的是「詳細解釋治療措施或解釋身體功能」(B)。","detail":{"background":"學齡前兒童認知有限,「詳細解釋治療措施與身體功能」太抽象、易增焦慮,應「用簡單具體的語言與遊戲說明」,故B錯誤。其餘正確:先讓認識醫護人員、注射後貼膠帶(維護身體完整性)、讓參與並給選擇增自我控制感。","options":{"A":"正確。先讓病童認識給予治療的醫護人員。","B":"錯誤(本題答案)。學齡前不宜詳細解釋身體功能(太抽象增焦慮)。","C":"正確。注射後以膠帶貼住注射部位(維護完整性)。","D":"正確。讓參與並給選擇,增自我控制感。"},"sources":["新文京《兒科護理學》學齡前","簡單具體"]}},"106111-N4-44":{"quick":"2歲13公斤事故傷害預防護理指導正確的是「為了預防撞擊,將其固定於車輛後座之嬰兒用臥床」?——本題答C「控制洗澡水溫,請父母先放冷水再放熱水」。","detail":{"background":"本題官方答案為C。控制洗澡水溫應「先放冷水再放熱水」,避免幼兒先碰到熱水燙傷。2歲13公斤應坐「後座、後向(或幼兒)安全座椅」(非嬰兒臥床,A不精確);幼兒應「淋浴或有人看管的盆浴」並防溺(B的盆浴取代淋浴不當);應避免邊吃邊玩(防嗆,D錯),故C正確。","options":{"A":"2歲應坐後座安全座椅(非嬰兒臥床,A不精確)。","B":"盆浴有溺水風險(非取代淋浴防跌)。","C":"正確。控制水溫應先放冷水再放熱水(防燙傷)。","D":"錯。應避免邊吃邊玩(防嗆)。"},"sources":["新文京《兒科護理學》安全","水溫"]}},"108110-N4-41":{"quick":"青少年住院護理「錯誤」者＝由其自行選擇服藥時間及意願自行服藥(服藥須遵醫囑，不能任其決定是否服藥)。","detail":{"background":"本題官方答案為B。青少年住院應「鼓勵維持自主、與同儕聯絡、自我照顧」,雖接納情緒但敘述「接受退化性行為」被官方判為較不適切(青少年宜引導維持成熟因應而非接受退化)。其餘適當:鼓勵與同儕保持聯絡、維護自我控制權自行選擇服藥、討論自我照顧減少依賴。","options":{"A":"鼓勵與同儕保持聯絡，適當。","B":"以不批判態度接受青少年可能的退化行為，適當。","C":"錯誤(本題答案)。不能讓青少年自行決定服藥意願/是否服藥(影響治療遵從與安全)。","D":"討論自我照顧方式、減少依賴，適當。"},"sources":["新文京《兒科護理學》青少年","自主"]}},"109030-N4-60":{"quick":"兒童住院壓力錯誤的是「幼兒會以合理化方式,來因應其住院帶來的限制」(B)。","detail":{"background":"「合理化(rationalization)」是較成熟的心理防衛,幼兒認知未成熟,多以「抗議、退化、哭鬧」因應住院限制,而非合理化,故B錯誤。其餘正確:嬰兒主要壓力源是與父母分離、學齡前常誤解住院原因出現罪惡感、學齡期能理解生病來自外在。","options":{"A":"正確。嬰兒住院主要壓力源是與父母分離。","B":"錯誤(本題答案)。幼兒不會用合理化(較成熟防衛)因應。","C":"正確。學齡前常誤解住院原因、出現罪惡感。","D":"正確。學齡期可理解生病來自外在。"},"sources":["新文京《兒科護理學》住院壓力","合理化"]}},"111030-N4-25":{"quick":"母親說不准吵鬧的哥哥來看妹妹,最適當的是「有家人在旁協助,讓大孩子撫摸或擁抱妹妹可以增強依附關係」(C)。","detail":{"background":"手足探視在「家人陪同協助下,讓大孩子撫摸/擁抱新生兒」可促進手足依附與接納,減少嫉妒。「禁止來」會加深手足排斥感(A);「遠遠看」不足以建立依附(B);「自己抱」對好動哥哥有安全風險(D),故C正確(有家人協助下)。","options":{"A":"錯。禁止來會加深手足排斥(應促進接納)。","B":"遠遠看不足以建立依附關係。","C":"正確。家人協助下讓大孩子撫摸/擁抱妹妹增依附。","D":"讓好動哥哥自己抱有安全風險(需家人協助)。"},"sources":["新文京《兒科護理學》手足","依附"]}},"111030-N4-43":{"quick":"遭受性虐待後兒童可能的行為表現不適當的是「攻擊性強,說謊行為,但無身體發展遲滯」(C)。","detail":{"background":"受性虐待兒童常「合併身體發展遲滯、退縮、退化」等,「無身體發展遲滯」的絕對敘述不適當,故C不適當。其餘是受性虐待可能表現:害怕獨處討厭被碰觸、不合宜的性知識、情緒沮喪退縮對人敵意不信任。　補充：遭受性虐待的兒童可能出現退化、攻擊、說謊、性化行為、做惡夢、學業退步及身體發展遲滯/成長受影響；敘述「無身體發展遲滯」並不適當。","options":{"A":"是表現。害怕獨處、討厭他人碰觸身體。","B":"是表現。出現複雜或不合宜的性知識。","C":"不適當(本題答案)。受虐常合併身體發展遲滯(非無)。","D":"是表現。情緒沮喪退縮、對人敵意不信任。"},"sources":["新文京《兒科護理學》性虐待","發展遲滯"]}},"111110-N4-43":{"quick":"2歲12公斤乘車方式正確的是「坐幼兒安全座椅,置後座,面向車頭」(B)。","detail":{"background":"2歲(>2歲、體重達標)應坐「後座、面向車頭(前向)的幼兒安全座椅」。1歲以下/未滿2歲嬰兒才用「後向式」。安全座椅一律「置後座(非前座,前座氣囊危險)」,故B正確。　補充：2歲幼兒乘車應坐於「後座、後向式(面向車尾)安全座椅」——2歲以下或體重未達標者後向可保護頭頸；面向車頭(前向)較不安全，應延後使用。","options":{"A":"錯。安全座椅應置後座(非前座)。","B":"正確。2歲坐後座、面向車頭的幼兒安全座椅。","C":"錯。應置後座(非前座)。","D":"後向式適用未滿2歲(2歲可前向),且本敘述方向不符。"},"sources":["新文京《兒科護理學》安全","前向後座"]}},"115030-N4-35":{"quick":"8歲肌肉失養症呼吸急促入院,以家庭為中心護理最不適當的是「在住院期間,所有決策及溝通,須保持高度的醫護專業控制」(C)。","detail":{"background":"家庭中心照護強調「家庭參與決策、賦權、夥伴關係」,「保持高度醫護專業控制(排除家庭參與決策)」與其精神相反,故C最不適當。其餘適當:賦權鼓勵家人參與照護決策、協助維持家庭生活常規、提供心理情緒支持讓家人適應。","options":{"A":"適當。賦權鼓勵家人參與住院照護決策。","B":"適當。協助維持小敏的家庭生活常規。","C":"最不適當(本題答案)。家庭中心非高度醫護控制(應家庭參與決策)。","D":"適當。提供心理情緒支持讓家人適應。"},"sources":["新文京《兒科護理學》家庭中心","參與決策"]}},"101110-N4-27":{"quick":"不是我國兒童常見健康問題的是「頭蝨」(D)。","detail":{"background":"我國兒童常見健康問題:齲齒(蛀牙)、發展遲緩、視力問題(近視)、過敏、肥胖等。「頭蝨」在現今台灣兒童已較少見,非常見健康問題,故D不是。　補充：我國兒童常見健康問題包括事故傷害、過敏、齲齒、肥胖、近視與呼吸道感染等；頭蝨雖偶見但非當前最常見的兒童主要健康問題。","options":{"A":"是常見問題。齲齒(蛀牙)。","B":"是常見問題。發展遲緩。","C":"是常見問題。視力問題(近視)。","D":"不是(本題答案)。頭蝨現今台灣兒童較少見。"},"sources":["新文京《兒科護理學》兒童健康","頭蝨"]}},"102110-N4-42":{"quick":"小兒重症照護的法律與倫理正確的是「護理師應主動與父母討論相關議題,鼓勵他們與孩子討論治療意願」(D)。","detail":{"background":"兒童雖未成年,仍應「依年齡讓其參與、表達意願」,護理師應「主動與父母討論、鼓勵親子溝通治療意願」。未成年也應依能力參與討論(非完全不討論,A錯);父母決定須以「兒童最佳利益」為前提(非聽從父母一切,B錯);不應對青少年隱瞞病情(應誠實告知,C錯),故D正確。","options":{"A":"錯。未成年也應依年齡參與討論(非不須討論)。","B":"錯。須以兒童最佳利益為前提(非聽從父母一切)。","C":"錯。不應隱瞞青少年病情(應誠實告知)。","D":"正確。主動與父母討論、鼓勵親子討論治療意願。"},"sources":["新文京《兒科護理學》倫理","最佳利益"]}},"106110-N4-2":{"quick":"針對護理照顧內容進行討論、發展及驗證合適護理措施以提升照護品質,屬「研究者」角色(D)。","detail":{"background":"「發展及驗證護理措施、以實證提升照護品質」是護理師的「研究者」角色功能。支持者(情感支持)、教育者(衛教)、諮詢者(提供諮詢)皆非「發展驗證措施」的研究功能,故D正確。　補充：護理師「研究者」角色為透過討論、發展與驗證合適的護理措施、應用實證以提升照護品質；與照顧者、教育者、代言者等角色並列為護理專業功能。","options":{"A":"支持者是提供情感支持(非此例)。","B":"教育者是衛教(非發展驗證措施)。","C":"諮詢者是提供諮詢(非此例)。","D":"正確。發展驗證護理措施提升品質=研究者角色。"},"sources":["新文京《護理學》角色","研究者"]}},"106110-N4-41":{"quick":"兒科護理師的角色和功能錯誤的是「促進12歲以下兒童的身體健康為主」(C)。","detail":{"background":"兒科護理對象是「未滿18歲(兒童及少年)」,且重視「身、心、社會全面健康」,而非「12歲以下且只重身體健康」,故C錯誤。其餘正確:了解各年齡層正常生長發育、了解國家嬰幼兒保健政策、依研究實證改善兒童與家庭照護。","options":{"A":"正確。了解各年齡層兒童的正常生長發育。","B":"正確。了解國家對嬰幼兒保健的政策發展。","C":"錯誤(本題答案)。對象是未滿18歲且重身心社會全面健康(非僅12歲以下身體健康)。","D":"正確。依研究實證改善兒童與家庭照護。"},"sources":["新文京《兒科護理學》角色","18歲全面"]}},"106110-N4-42":{"quick":"國健署2013嬰幼兒健康促進計畫,針對1~14歲兒童期望減少的死亡率是「意外事故及傷害」(C)。","detail":{"background":"事故傷害是1~14歲兒童的「首要死因」,故健康促進計畫期望減少「意外事故及傷害」的死亡率。重症腸病毒、先天代謝異常、呼吸系統疾病雖重要,但非該年齡層首要死因,故C正確。　補充：事故傷害(意外)長年為1~14歲兒童的首要死因；國健署嬰幼兒健康促進計畫以「減少事故傷害及傷害死亡率」為重要目標，含交通、跌落、溺水、燒燙傷防制。","options":{"A":"重症腸病毒非1~14歲首要死因。","B":"先天代謝異常非首要死因。","C":"正確。事故傷害是1~14歲首要死因,期望減少其死亡率。","D":"呼吸系統疾病非首要死因。"},"sources":["國健署","事故傷害"]}},"105090-N4-79":{"quick":"5歲重症肌無力(MG)護理指導錯誤的是「應鼓勵曉華多進食需咀嚼的食物,以減緩咀嚼功能之退化」(B)。","detail":{"background":"重症肌無力因神經肌肉接合障礙致肌肉「易疲乏無力」,咀嚼吞嚥費力易嗆,應「給軟質易吞食物、少量多餐、餐前休息」,而非鼓勵多咀嚼(會加重疲乏與嗆食),故B錯誤。其餘正確:注意呼吸與痰液(呼吸肌無力)、減少費力活動保留體力、眼瞼下垂視力不佳注意活動安全。","options":{"A":"正確。注意呼吸是否順暢、痰液不易咳出(呼吸肌無力)。","B":"錯誤(本題答案)。應給軟質易吞食物(非鼓勵多咀嚼,會加重疲乏嗆食)。","C":"正確。減少費力活動以保留體力。","D":"正確。眼瞼下垂視力不佳注意活動安全。"},"sources":["新文京《兒科護理學》MG","軟質"]}},"106030-N4-42":{"quick":"1歲6個月用DDST-II,需懷疑發展遲緩的結果是「無法通過倒退走路」(A)。","detail":{"background":"18個月(1歲半)90%可「倒退走路」,若「無法通過倒退走路」表示落後、須懷疑發展遲緩。向前踢球(約2歲)、單腳平穩站立(約3~4歲)、腳跟接腳趾行走(約3~4歲)是較大年齡才達成,18個月本就未必通過,故以「無法倒退走路」為遲緩警訊。","options":{"A":"正確。18個月應能倒退走路,無法通過須懷疑遲緩。","B":"向前踢球約2歲(18個月未通過尚屬正常)。","C":"單腳平穩站立約3~4歲。","D":"腳跟接腳趾行走約3~4歲。"},"sources":["新文京《兒科護理學》DDST","倒退走"]}},"107110-N4-41":{"quick":"丹佛II(DDST-II)的評估項目之一是「語言與社會適應力」(D)。","detail":{"background":"DDST-II評估「粗動作、精細動作-適應、語言、個人-社會(社會適應)」四領域。趨避性、挫折容忍度(屬氣質)、物體恆存(屬認知)皆非DDST的評估項目,故D(語言與社會適應力)正確。　補充：丹佛II(DDST-II)評估粗動作、細動作-適應、語言、個人-社會(語言與社會適應力)四領域，用以篩檢0~6歲兒童發展是否符合年齡。","options":{"A":"趨避性是氣質項目(非DDST)。","B":"物體恆存是認知概念(非DDST項目)。","C":"挫折容忍度屬氣質(非DDST)。","D":"正確。語言與社會適應力是DDST評估項目。"},"sources":["新文京《兒科護理學》DDST","四領域"]}},"102110-N4-53":{"quick":"依Erikson觀點,不同年齡慢性病照護錯誤的是「學齡前期兒童宜減少社會互動,以特別關注的方式,補償其所受的病痛之苦」(B)。","detail":{"background":"學齡前期應「鼓勵正常社會互動與遊戲」,「減少社會互動、過度補償特別關注」會妨礙發展與正常化,故B錯誤。其餘正確:幼兒期維持常規、鼓勵自主選擇增控制感;學齡期鼓勵持續參加學校活動討論面對疾病;青春期負起自我照顧、建構同儕支持。","options":{"A":"正確。幼兒期維持常規、鼓勵自主選擇增控制感。","B":"錯誤(本題答案)。學齡前不應減少社會互動/過度補償(妨礙發展)。","C":"正確。學齡期鼓勵持續參加學校活動。","D":"正確。青春期負起自我照顧、建構同儕支持。"},"sources":["新文京《兒科護理學》Erikson","正常化"]}},"113180-N4-29":{"quick":"把樂高分享給玩伴、交換玩具但各玩各的,屬兒童遊戲發展的「平行遊戲」?——本題答C平行遊戲。","detail":{"background":"本題官方答案為C「平行遊戲」。註:嚴格而言「交換玩具有互動但無分工」較接近聯合遊戲,但本題以「各玩各的」為重點判為平行遊戲。合作遊戲(有分工規則目標)、旁觀遊戲(只看不玩)皆非此例。　補充：「平行遊戲」為幼兒期(約2~3歲)特徵——孩子彼此靠近、各玩各的、會交換玩具但無合作互動；是社會性遊戲由單獨遊戲邁向合作遊戲的中間階段。","options":{"A":"合作遊戲有分工規則目標(非此例)。","B":"聯合遊戲有互動交換(本題以各玩各的判平行)。","C":"正確(本題答案)。各玩各的=平行遊戲。","D":"旁觀遊戲是只看不參與(非此例)。"},"sources":["新文京《兒科護理學》遊戲","平行"]}},"106111-N4-54":{"quick":"鼓勵雙親針對孩子罹患慢性病表達內心情緒,護理指導正確的是「幫助雙親重視及了解自己的情緒反應和尋求支援」(D)。","detail":{"background":"面對孩子慢性病,護理應「協助父母覺察、接納自己的情緒並尋求支持資源」。不應說其情緒「不合理」(否定感受,A);不應強調「限制探訪時間」(B,違家庭中心);不應要求「馬上了解疾病全貌」(資訊應循序,C),故D正確。","options":{"A":"錯。不應說父母情緒不合理(否定感受)。","B":"錯。不應強調限制探訪時間(違家庭中心)。","C":"錯。疾病資訊應循序(非要求馬上全了解)。","D":"正確。幫助雙親重視了解自己情緒並尋求支援。"},"sources":["新文京《兒科護理學》慢性病","情緒支持"]}},"103030-N4-64":{"quick":"5個月川崎氏症IVIG治療護理措施錯誤的是「提醒母親帶安安完成常規的疫苗接種,以增強免疫能力」(D)。","detail":{"background":"川崎氏症注射IVIG後,接種「活性減毒疫苗(MMR、水痘)須延後至少6~11個月」(被動抗體干擾),不能依常規時程立即接種,故D錯誤。其餘正確:少量多餐補流質軟質並監測脫水、急性期高劑量aspirin抗發炎抑血小板、注意四肢末梢循環與紅疹水腫脫皮給棉質衣物。","options":{"A":"正確。少量多餐補流質/軟質、監測輸出入防脫水。","B":"正確。急性期高劑量aspirin抗發炎抑血小板。","C":"正確。注意末梢循環、紅疹水腫脫皮、給棉質衣物。","D":"錯誤(本題答案)。IVIG後活疫苗須延後(非依常規立即接種)。"},"sources":["新文京《兒科護理學》川崎症","活疫苗延後"]}},"111030-N4-64":{"quick":"主動脈狹窄(Coarctation of Aorta)身體評估最適當的是「易有暈眩、流鼻血、心搏過速等症狀」(A)。","detail":{"background":"主動脈狹窄使狹窄處「上游(上肢/頭頸)血壓高」,出現頭痛、暈眩、流鼻血;「下游(下肢)血壓低、脈弱、溫度低」。故「上肢高血壓相關的暈眩流鼻血」正確。下肢血流減少溫度低(非高,B錯);上肢脈搏強下肢弱(非頸動脈弱,C);上肢血壓高於下肢(D相反),故A正確。","options":{"A":"正確。上肢高血壓致暈眩、流鼻血,可心搏過速。","B":"錯。下肢血流減少、溫度低(非較高)。","C":"錯。上肢脈強、下肢脈弱(非頸動脈弱)。","D":"錯。上肢血壓高於下肢(非下肢高於上肢)。"},"sources":["新文京《兒科護理學》主動脈狹窄","上肢高壓"]}},"101110-N4-17":{"quick":"腸病毒群感染正確的是「經由飛沫及接觸傳染」(A)。","detail":{"background":"腸病毒主要經「飛沫與接觸(糞口)」傳染,好發嬰幼兒(5歲以下易重症)。目前「無腸病毒疫苗常規接種(僅71型有疫苗,非全面)」(B不精確);主要症狀是「手足口病/疱疹性咽峽炎」(非腸胃炎,C錯);是病毒,「抗生素無效」(支持療法,D錯),故A正確。","options":{"A":"正確。腸病毒經飛沫及接觸傳染。","B":"5歲以下易重症,但非全面常規接種疫苗(B不精確)。","C":"錯。主要是手足口病/咽峽炎(非腸胃炎)。","D":"錯。病毒感染抗生素無效。"},"sources":["新文京《兒科護理學》腸病毒","飛沫接觸"]}},"101110-N4-73":{"quick":"置換機械瓣膜長期抗凝、懷孕後處置正確的是「妊娠初期3個月改用皮下注射Heparin Sodium,以防胎兒畸形」(C)。","detail":{"background":"Warfarin(Coumadin)會通過胎盤致畸胎(尤妊娠前3個月),故懷孕初期應「改用不過胎盤的Heparin(肝素)皮下注射」抗凝。Warfarin非A級安全藥(是D/X級,A錯);機械瓣膜不能停一切抗凝(會血栓,B錯);非加倍抗凝(D錯),故C正確。","options":{"A":"錯。Warfarin是致畸藥(非A級安全)。","B":"錯。機械瓣膜不能停抗凝(會血栓)。","C":"正確。妊娠初期改皮下注射Heparin(不過胎盤)防畸胎。","D":"錯。非加倍抗凝劑量。"},"sources":["新文京《產科護理學》抗凝","Heparin"]}},"102030-N4-8":{"quick":"「與胎兒連成一體」的心理發展任務相關行為是「第二妊娠期婦女常撫摸肚子與胎兒講話,以開始建立依附關係」(B)。","detail":{"background":"魯賓(Rubin)母性任務之一「與胎兒連成一體」,常在「第二孕期(感受胎動後)」開始,孕婦藉「撫摸肚子、與胎兒說話」建立依附。第一孕期以胎動建立(A錯,胎動多在第二孕期);這種關係會持續變化(非一旦建立不變,C錯);學習奉獻自己是另一項任務(D),故B正確。","options":{"A":"錯。胎動多在第二孕期(非第一孕期)。","B":"正確。第二孕期撫摸肚子與胎兒講話建立依附。","C":"錯。母子關係會持續變化(非一旦建立不變)。","D":"學習奉獻自己是另一項母性任務(非此例)。"},"sources":["新文京《產科護理學》Rubin","連成一體"]}},"103030-N4-71":{"quick":"7個月苯酮尿症飲食護理指導錯誤的是「飲食治療目的在預防腎臟功能病變」(A)。","detail":{"background":"苯酮尿症(PKU)飲食治療目的是「限制苯丙胺酸、預防腦部/神經與智能損害」(非腎臟功能病變),故A錯誤。其餘正確:餵特殊配方(Lofenalac、Phenyl-Free)、飲食控制愈長愈好至少至學齡期(現多主張終身)、避免高蛋白(魚肉蛋奶堅果豆類)。","options":{"A":"錯誤(本題答案)。PKU飲食是預防腦神經與智能損害(非腎臟病變)。","B":"正確。餵特殊配方(Lofenalac、Phenyl-Free)。","C":"正確。飲食控制愈長愈好,至少至學齡期。","D":"正確。避免高苯丙胺酸食物(魚肉蛋奶堅果豆類)。"},"sources":["新文京《兒科護理學》PKU","腦神經"]}},"103100-N4-27":{"quick":"產後4個月內擔憂奶水不足/嬰兒拒吃母乳,護理師反應較不恰當的是「建議母親擠出奶水,了解泌乳量」(C)。","detail":{"background":"判斷母乳是否足夠應看「嬰兒生長曲線、尿量、滿足感」,而非「擠出奶水量」(擠出量不等於嬰兒實際吸吮量,易誤判),故C較不恰當。其餘恰當:嬰兒頭轉尋乳是正常非拒食、多數母親奶水足只缺信心、生長未落後不需太早加副食品。","options":{"A":"恰當。嬰兒頭轉尋乳是正常行為(非拒食)。","B":"恰當。多數母親奶水足,只是缺乏信心。","C":"較不恰當(本題答案)。擠出量不等於嬰兒吸吮量(易誤判)。","D":"恰當。生長未落後不需太早加副食品。"},"sources":["新文京《產科護理學》母乳","生長曲線"]}},"103100-N4-40":{"quick":"產後身體評估可能屬異常的是「產後24小時子宮底高度在肚臍之上」(B)。","detail":{"background":"產後子宮底約在「肚臍平或臍下一指」,之後每天約下降1指;「24小時子宮底仍在肚臍之上」可能是子宮收縮不良或膀胱脹滿,屬異常須評估。其餘正常:24小時內出血<500c.c.(80c.c.正常)、體溫37.5°C(產後輕微升高)、子宮堅硬如球(收縮良好)。","options":{"A":"正常。產後24小時內出血80c.c.(<500)。","B":"異常(本題答案)。24小時子宮底在肚臍之上(疑收縮不良/膀胱脹)。","C":"正常。產後24小時體溫37.5°C(輕微升高)。","D":"正常。子宮堅硬如球(收縮良好)。"},"sources":["新文京《產科護理學》產後","子宮底"]}},"104030-N4-7":{"quick":"體外受精受孕G2P0SA1,妊娠期心理任務較不需擔心的是「使重要家人接受新生兒」(B)。","detail":{"background":"此孕婦歷經不孕治療好不容易受孕,魯賓母性任務中「確保母胎安全、與胎兒連成一體、學習奉獻自己」可能因珍惜與焦慮而較需關注;而「使重要家人接受新生兒」(家庭多半期待已久、樂於接受),相對較不需擔心,故B。","options":{"A":"確保母胎安全是其關注重點(較需擔心)。","B":"較不需擔心(本題答案)。家人多已期待、樂於接受新生兒。","C":"學習奉獻自己是須調適的任務。","D":"與胎兒連成一體須建立(較需關注)。"},"sources":["新文京《產科護理學》Rubin","家人接受"]}},"104030-N4-37":{"quick":"不屬於排卵機能檢查的是「子宮輸卵管攝影」(A)。","detail":{"background":"排卵機能檢查包括「基礎體溫測量、黃體素濃度、雌激素濃度、子宮頸黏液、超音波濾泡監測」。「子宮輸卵管攝影(HSG)」是評估「輸卵管通暢與子宮腔結構」,非排卵機能檢查,故A不屬於。　補充：排卵機能檢查包括基礎體溫、子宮頸黏液、血清黃體素、子宮內膜切片、超音波濾泡監測等；子宮輸卵管攝影是評估輸卵管通暢與子宮腔，屬「結構」檢查、非排卵機能檢查。","options":{"A":"不屬於(本題答案)。子宮輸卵管攝影是查輸卵管通暢(非排卵機能)。","B":"屬於。黃體素濃度檢查(排卵後升高)。","C":"屬於。雌激素濃度檢查。","D":"屬於。基礎體溫測量(排卵後上升)。"},"sources":["新文京《婦科》排卵檢查","HSG"]}},"104030-N4-38":{"quick":"感染初期梅毒身體評估會發現「陰道內有無痛性紅色潰瘍傷口」(B)。","detail":{"background":"初期(第一期)梅毒典型是「無痛性硬性下疳(無痛紅色潰瘍)」於接觸處(陰道/外陰)。疼痛性水泡是生殖器疱疹(A);扁平濕疣是第二期梅毒(C);紅色扁平丘疹/掌蹠疹是第二期(D),故B(無痛潰瘍)是初期梅毒。","options":{"A":"疼痛性水泡是生殖器疱疹(非初期梅毒)。","B":"正確。無痛性紅色潰瘍(硬性下疳)是初期梅毒。","C":"扁平濕疣是第二期梅毒。","D":"紅色丘疹/掌蹠疹是第二期梅毒。"},"sources":["新文京《婦科》梅毒","硬性下疳"]}},"104030-N4-58":{"quick":"預防腸病毒感染注意事項錯誤的是「應接種腸病毒疫苗,以達預防效果」(D)。","detail":{"background":"腸病毒「無全面常規接種疫苗(僅腸病毒71型疫苗,非全面預防所有腸病毒)」,主要靠「勤洗手、衛生」預防,故「應接種疫苗達預防效果」的概括敘述錯誤。其餘正確:新生兒餵母乳增免疫、3歲以下易重症須注意、小心處理排泄物並洗手。","options":{"A":"正確。新生兒餵母乳增強免疫力。","B":"正確。幼兒(尤3歲以下)易併重症須注意。","C":"正確。小心處理病童排泄物並立即洗手。","D":"錯誤(本題答案)。腸病毒無全面常規疫苗(主要靠衛生洗手預防)。"},"sources":["新文京《兒科護理學》腸病毒","洗手"]}},"104100-N4-17":{"quick":"促進早期成功母乳哺餵正確的是「嬰兒餓了就餵,不限制哺餵母乳的時間長短及頻率,仍可發展出規律性」(B)。","detail":{"background":"母乳哺餵應「依嬰兒需求餵(餓了就餵、不限時間頻率)」,母乳供需會自然調節並逐漸規律。夜間哺餵反而「刺激泌乳(catprolactin夜間高)」(A錯);純母乳不需額外補水/葡萄糖水(C錯);應「先餵完一側再換邊」確保吸到後奶(非每餐兩側都餵,D錯),故B正確。","options":{"A":"錯。夜間哺餵刺激泌乳(非減少乳汁)。","B":"正確。依需求餵、不限時間頻率,仍可發展規律。","C":"純母乳不需額外補水/葡萄糖水。","D":"錯。應餵完一側再換邊(非每餐兩側都餵)。"},"sources":["新文京《產科護理學》母乳","依需求"]}},"105030-N4-23":{"quick":"產後1週健康婦女正常生命徵象是「TPR:36.8°C、60次/分、18次/分,BP:110/68 mmHg」(B)。","detail":{"background":"產後婦女正常:體溫36~37.5°C、脈搏偏慢(產後心搏過緩60~70次/分常見)、呼吸16~20、血壓接近孕前。B(36.8/60/18/110-68)皆正常。A有38.5°C發燒;C呼吸32過快;D血壓150/92偏高,故B正常。","options":{"A":"38.5°C發燒(產後感染警訊,異常)。","B":"正確。36.8/60/18/110-68皆正常。","C":"呼吸32次/分過快(異常)。","D":"血壓150/92偏高(異常)。"},"sources":["新文京《產科護理學》產後","生命徵象"]}},"105090-N4-53":{"quick":"妊娠26週3天早產兒身體檢查最可能的臨床表徵是「四肢肌肉張力無力,難以維持屈曲姿勢」(D)。","detail":{"background":"極早產兒(26週)肌肉張力低、「四肢鬆軟伸展、難維持屈曲姿勢」。胎毛多、足底皺褶少、皮下脂肪少(A的皺褶多脂肪多是足月);圍巾徵手肘易越過中線、腳跟易觸耳(關節鬆弛,B、C的「難以」是足月特徵),故D正確。","options":{"A":"錯。早產兒足底皺褶少、皮下脂肪少(非多)。","B":"早產兒圍巾徵手肘易越過中線(非難以)。","C":"早產兒腳跟易觸耳(關節鬆弛,非難以)。","D":"正確。四肢肌張力低、難維持屈曲姿勢。"},"sources":["新文京《兒科護理學》早產兒","肌張力低"]}},"106110-N4-5":{"quick":"孕期增加碘的攝取,主要促進胎兒「腦部神經發育」(A)。","detail":{"background":"碘是合成甲狀腺素的原料,孕期缺碘會影響胎兒「腦部神經發育與智能」(嚴重致呆小症)。故補碘主要促進腦部神經發育。非肺泡、腎上腺、腸道菌叢發育。　補充：碘是合成甲狀腺素的原料，甲狀腺素對胎兒「腦部與神經發育」至關重要；孕期缺碘可致胎兒腦發育不良與克汀症(呆小症)，故孕婦須增加碘攝取。","options":{"A":"正確。碘促進胎兒腦部神經發育(缺碘致智能損害)。","B":"肺泡發育與表面張力素相關(非碘)。","C":"腎上腺發育非碘主要作用。","D":"腸道菌叢與碘無關。"},"sources":["新文京《產科護理學》碘","腦發育"]}},"106110-N4-10":{"quick":"5歲問為何妹妹在媽媽肚子裡,給母親的建議最適當的是「小美可能對懷孕過程好奇,可用圖畫書說明懷孕過程」(D)。","detail":{"background":"5歲(學齡前)對懷孕好奇,宜「用適齡的圖畫書具體說明懷孕過程」滿足其好奇與理解。不應拖到上小學才說明(A);未必是焦慮(B);帶去參觀產房對5歲過早不適合(C),故D正確。　補充：學齡前兒童對懷孕生育常感好奇，宜以符合其認知、具體簡單的方式(如圖畫書)誠實說明懷孕過程；避免敷衍或過於抽象的解釋。","options":{"A":"錯。5歲已可用適齡方式說明(非拖到小學)。","B":"未必是焦慮(是好奇)。","C":"參觀產房對5歲過早不適合。","D":"正確。用圖畫書具體說明懷孕過程。"},"sources":["新文京《兒科護理學》性教育","圖畫書"]}},"107030-N4-24":{"quick":"避孕針劑利用何種高濃度荷爾蒙干擾精卵運送及子宮內膜發育?——「黃體素」(B)。","detail":{"background":"長效避孕針劑(如DMPA)是高濃度「黃體素(progestin)」,抑制排卵、使子宮頸黏液變稠干擾精子、使子宮內膜不利著床。動情素、黃體生成素、濾泡刺激素非避孕針的主成分,故B正確。　補充：長效避孕針劑(如DMPA)含高濃度「黃體素(progestin)」，抑制排卵、改變子宮頸黏液與子宮內膜，干擾精卵運送與著床；每約3個月施打一次。","options":{"A":"動情素非避孕針主成分。","B":"正確。避孕針是高濃度黃體素(progestin)。","C":"黃體生成素非避孕針成分。","D":"濾泡刺激素非避孕針成分。"},"sources":["新文京《產科護理學》避孕","黃體素"]}},"107030-N4-47":{"quick":"39週真空吸引娩出、頭皮水腫越過骨縫中線,屬「產瘤(Caput succedaneum)」(A)。","detail":{"background":"產瘤(caput succedaneum)是產道擠壓/真空吸引致頭皮「軟組織水腫」,「可越過骨縫線」、出生即明顯、數天消退。頭血腫(cephalhematoma)則「不越過骨縫線」。水腦、硬膜下血腫、顱內出血會有神經學異常(此例瞳孔對光正常),故A正確。","options":{"A":"正確。水腫越過骨縫中線=產瘤(軟組織水腫)。","B":"水腦會有神經學異常(此例瞳孔正常)。","C":"硬膜下血腫會有神經學異常。","D":"顱內出血會有神經學異常。"},"sources":["新文京《兒科護理學》產瘤","越骨縫"]}},"107030-N4-62":{"quick":"早產兒動脈血液氣體正常範圍是「PaO2:70 mmHg,PaCO2:40 mmHg」(B)。","detail":{"background":"正常動脈血氣:PaO2約80~100(早產兒維持約50~80避免高氧視網膜病變)、PaCO2約35~45。B(PaO2 70、PaCO2 40)落在合理正常範圍。PaCO2 70過高(呼吸性酸中毒)、PaO2 40過低(缺氧),故B正常。","options":{"A":"PaCO2 70過高(呼吸性酸中毒,異常)。","B":"正確。PaO2 70、PaCO2 40屬正常範圍。","C":"PaO2 40過低、PaCO2 70過高(異常)。","D":"PaO2 40過低(缺氧,異常)。"},"sources":["新文京《兒科護理學》ABG","正常值"]}},"107110-N4-7":{"quick":"胚胎發育中由中胚層發育而來的是「心臟」(B)。","detail":{"background":"三胚層分化:「中胚層→心臟血管、肌肉、骨骼、腎、生殖、結締組織」;外胚層→皮膚表皮、神經組織;內胚層→肝臟、消化道與呼吸道上皮。故心臟由中胚層發育,B正確。　補充：三胚層分化：外胚層形成皮膚與神經系統，「中胚層」形成心臟、血管、肌肉、骨骼與泌尿生殖系統，內胚層形成消化呼吸道內襯；故心臟由中胚層發育。","options":{"A":"皮膚上表皮由外胚層發育(非中胚層)。","B":"正確。心臟由中胚層發育而來。","C":"肝臟由內胚層發育(非中胚層)。","D":"神經組織由外胚層發育(非中胚層)。"},"sources":["新文京《產科護理學》胚層","中胚層"]}},"107110-N4-74":{"quick":"先天性甲狀腺功能低下嬰幼兒症狀處理錯誤的是「嬰兒出生24小時內抽血驗TSH值以確立診斷」(A)。","detail":{"background":"新生兒甲狀腺篩檢(驗TSH)應在「出生滿48小時且餵奶後」採血(太早因生理性TSH上升易偽陽性),非24小時內,故A錯誤。其餘正確(部分):暫停母乳以正確測甲狀腺素(此非必要,但本題以A為答)、維持T4在10~16μg/dL、定期注意聽力與發展評估。","options":{"A":"錯誤(本題答案)。新生兒篩檢應出生滿48小時後採血(非24小時內)。","B":"(暫停母乳測甲狀腺素之敘述,本題以A為錯)。","C":"治療目標維持T4濃度約10~16μg/dL。","D":"須定期注意新生兒聽力檢查及發展評估。"},"sources":["新文京《兒科護理學》先天性甲低","48小時"]}},"108020-N4-1":{"quick":"溫柔生產照護方式錯誤的是「常規執行會陰部剃毛」(B)。","detail":{"background":"溫柔生產(溫和生產)強調「減少不必要的常規醫療介入」,「常規會陰剃毛、常規灌腸、常規會陰切開」已不建議,故B錯誤。其餘正確:待產可自由走動、先生陪產、產後立即產檯肌膚接觸。　補充：溫柔生產(溫和生產)強調尊重產婦自主、減少不必要醫療常規介入、促進親子接觸；「常規執行會陰部剃毛」屬例行性介入，與溫柔生產理念不符、為錯誤。","options":{"A":"正確。待產期間可以自由走動。","B":"錯誤(本題答案)。不常規執行會陰剃毛(減少不必要介入)。","C":"正確。生產時先生可以陪產。","D":"正確。產後立即進行產檯肌膚接觸。"},"sources":["新文京《產科護理學》溫柔生產","勿剃毛"]}},"108020-N4-24":{"quick":"黃體素抑制劑(RU486)阻斷懷孕過程正確的是「能破壞子宮內膜的穩定性」(A)。","detail":{"background":"RU486(mifepristone)是黃體素拮抗劑,阻斷黃體素對子宮內膜的支持,使「子宮內膜不穩定、剝落、胚胎著床失敗或流產」。它應在懷孕「7週(49天)內」服用(非10週,B);須醫師處方非常規避孕(C);須在合格醫療處方下使用,「不可在藥房自行購買服用」(D),故A正確。","options":{"A":"正確。RU486破壞子宮內膜穩定性(拮抗黃體素)。","B":"錯。應懷孕7週內服用(非10週前)。","C":"錯。是終止妊娠用(非常規避孕)。","D":"錯。須醫師處方(不可藥房自行購買)。"},"sources":["新文京《產科護理學》RU486","子宮內膜"]}},"109110-N4-6":{"quick":"生產計畫書「不適當」者＝讓婦女和醫護人員討論「兩者共同做決定」(計畫書應為產婦自主表達其偏好/選擇，非由醫護共同決定)。","detail":{"background":"本題官方答案為B。生產計畫書是「以產婦為主體、表達其偏好與選擇」的文件,而非「說明院方生產流程與常規」的文書(那是衛教資料),故B不適當。其餘適當:可包括待產分娩寶寶照護的選擇、婦女與醫護共同討論決定、鼓勵表達擔憂與需要。","options":{"A":"可包括待產、分娩和寶寶照護的選擇，適當。","B":"可包括生產流程與常規的說明，適當。","C":"不適當(本題答案)。生產計畫書是產婦「自主表達偏好」，非由醫護共同替其決定。","D":"鼓勵婦女表達擔憂與需要，適當。"},"sources":["新文京《產科護理學》生產計畫","偏好"]}},"109110-N4-16":{"quick":"胎心率監測錯誤的是「胎兒受感染時,會導致胎心率過慢」(B)。","detail":{"background":"胎兒受感染(絨毛膜羊膜炎)時,胎心率多「過速(>160 bpm)」而非過慢,故B錯誤。其餘正確:正常足月胎心率120~160 bpm、基準線指監測10分鐘以上兩次宮縮間胎心率、正常變異性約6~25(此題6~10)bpm。","options":{"A":"正確。正常足月胎心率120~160 bpm。","B":"錯誤(本題答案)。胎兒感染時胎心率過速(非過慢)。","C":"正確。基準線指兩次宮縮間的胎心率。","D":"正常變異性約6~25bpm(此選項6~10屬正常範圍)。"},"sources":["新文京《產科護理學》胎心率","感染過速"]}},"109110-N4-27":{"quick":"新生兒身體評估結果異常的是「舌頭上有凝乳塊狀的白色斑點」(D)。","detail":{"background":"舌上「凝乳塊狀白色斑點且不易擦掉」是「鵝口瘡(口腔念珠菌感染)」,屬異常須治療(若可擦掉是奶垢)。其餘正常:鼻頭粟粒疹(皮脂腺,數週消退)、毒性紅斑(出生1~3天常見,自癒)、頭圍35公分(正常範圍),故D異常。","options":{"A":"正常。鼻頭粟粒疹(皮脂腺,自然消退)。","B":"正常。毒性紅斑(出生1~3天常見,自癒)。","C":"正常。頭圍35公分在正常範圍。","D":"異常(本題答案)。舌上凝乳白斑=鵝口瘡(念珠菌感染)。"},"sources":["新文京《兒科護理學》新生兒","鵝口瘡"]}},"111030-N4-7":{"quick":"妊娠期需增加熱量攝取正確的是「依據母體氧氣消耗增加所需熱量」(A)。","detail":{"background":"孕期因母體代謝率與氧氣消耗增加、胎兒生長需求,而需「增加熱量」。第一孕期熱量增加不多(熱量需求主要在二、三孕期,B錯);應均衡而非偏高脂(C錯);熱量增加在「二、三孕期」較多(非第一孕期更多,D錯),故A正確。","options":{"A":"正確。依母體氧氣消耗(代謝率)增加所需熱量。","B":"錯。第一孕期熱量增加不多(主要在二三孕期)。","C":"錯。應均衡(非偏高醣高脂)。","D":"錯。熱量增加主要在二三孕期(非第一孕期更多)。"},"sources":["新文京《產科護理學》孕期營養","代謝"]}},"111030-N4-70":{"quick":"11歲副甲狀腺功能低下護理較不適當的是「服用高劑量的維他命A」(D)。","detail":{"background":"副甲狀腺功能低下致「低血鈣」,治療是「補充鈣與維生素D(促鈣吸收)」,而非維生素A,故D錯誤(應為維生素D)。其餘適當:身材矮小圓臉影響身體心像鼓勵興趣發展、低血鈣急性發作可靜脈注射葡萄糖鈣、強直性痙攣時維持呼吸道通暢與安全。","options":{"A":"適當。鼓勵支持興趣發展(身體心像)。","B":"適當。低血鈣急性可靜脈注射葡萄糖鈣。","C":"適當。強直性痙攣時維持呼吸道通暢與安全。","D":"較不適當(本題答案)。應補維生素D(非高劑量維生素A)。"},"sources":["新文京《兒科護理學》副甲低","維生素D"]}},"112030-N4-1":{"quick":"分娩期支持性照護措施較不適當的是「提供待產婦女一致性常規醫療照護」(A)。","detail":{"background":"分娩支持應「個別化、依產婦需求」,「一致性常規醫療照護」忽略個別差異,故A較不適當。其餘適當:教導待產婦女與伴侶生產知識、維持生產環境燈光柔和昏暗(助放鬆)、允許自由選擇下床走動。　補充：分娩支持性照護強調個別化、持續性陪伴、尊重產婦選擇與舒適措施；「提供一致性常規醫療照護」忽略個別需求、與支持性照護理念不符、較不適當。","options":{"A":"較不適當(本題答案)。應個別化(非一致性常規照護)。","B":"適當。教導待產婦女及伴侶生產知識。","C":"適當。維持生產環境燈光昏暗(助放鬆)。","D":"適當。允許待產婦女自由選擇下床走動。"},"sources":["新文京《產科護理學》分娩支持","個別化"]}},"112030-N4-24":{"quick":"父親抱起寶寶專注凝視輕聲說話,描述父親與新生兒發展依附的行為最適當的是「全神貫注(engrossment)」(D)?——本題答D。","detail":{"background":"本題官方答案為D。父親對新生兒「全神貫注(engrossment)」——專注凝視、被新生兒吸引、與之互動建立依附,是父親特有的依附行為。肌膚接觸、袋鼠護理是照護方式;準父親自信是孕期角色,皆非描述此「凝視專注」的依附行為,故D。(註:engorgement是脹奶,此處應為engrossment全神貫注)。","options":{"A":"肌膚接觸是照護方式(非描述凝視依附行為)。","B":"袋鼠護理是早產兒照護方式(非此例)。","C":"準父親自信是孕期角色(非此例)。","D":"正確(本題答案)。父親全神貫注(engrossment)凝視互動建立依附。"},"sources":["新文京《產科護理學》父職","engrossment"]}},"112110-N4-9":{"quick":"孕婦主動尋求生產資訊、定期產檢、請教親友生產情形,符合魯賓(Rubin)母性任務的「確保自己與胎兒在懷孕期過程安全順利」(D)。","detail":{"background":"魯賓母性任務「確保安全通過(seeking safe passage)」——孕婦藉「主動找資訊、定期產檢、請教他人」確保自己與胎兒安全順利度過孕產期。學習奉獻自己、促使他人接受新生兒、與胎兒連成一體是其他任務,故D正確。","options":{"A":"學習奉獻自己是另一項任務(非此例)。","B":"促使他人接受新生兒是另一項任務。","C":"與胎兒連成一體是另一項任務。","D":"正確。主動找資訊產檢=確保自己與胎兒安全順利。"},"sources":["新文京《產科護理學》Rubin","安全通過"]}},"112180-N4-8":{"quick":"39週「胎兒下降、呼吸更輕鬆」後,可能性最低伴隨的症狀是「鼠蹊部疼痛緩解」(C)。","detail":{"background":"胎兒下降(lightening)後,「橫膈壓力減輕(呼吸輕鬆)、胃部壓迫減」但「膀胱受壓使頻尿更頻繁、骨盆鼠蹊壓迫使該處疼痛增加」,故「鼠蹊部疼痛緩解」可能性最低(下降後鼠蹊壓迫反而加重)。分娩多在2週內發生。","options":{"A":"可能。頻尿更頻繁(膀胱受壓)。","B":"可能。橫膈緊繃感減輕(呼吸輕鬆)。","C":"可能性最低(本題答案)。下降後鼠蹊壓迫疼痛反增(非緩解)。","D":"可能。分娩約在2週內發生。"},"sources":["新文京《產科護理學》胎兒下降","鼠蹊壓迫"]}},"112180-N4-18":{"quick":"新生兒身體評估方式不適當的是「心尖脈最好能在新生兒睡覺時測量,需測30秒」(A)。","detail":{"background":"新生兒心尖脈不規則,須「測完整1分鐘」(非30秒),故A不適當。其餘適當:觸診腹部前先聽診四象限腸音(避免觸診影響腸音)、評估肌力觀察手臂回彈、頭圍測量由眉上繞耳頂至枕骨粗隆。　補充：新生兒心尖脈因心跳快且可有不規則，應於「安靜或睡眠時聽診滿1分鐘」(非30秒)以求準確；其餘評估宜由干擾少到多進行。","options":{"A":"不適當(本題答案)。新生兒心尖脈須測完整1分鐘(非30秒)。","B":"適當。觸診腹部前先聽診四象限腸音。","C":"適當。評估肌力觀察手臂回彈程度。","D":"適當。頭圍由眉上繞耳頂至枕骨粗隆一圈。"},"sources":["新文京《兒科護理學》新生兒","心尖1分鐘"]}},"113030-N4-6":{"quick":"孕期營養需求錯誤的是「磷可參與早期的細胞分裂過程」(C)?——本題答C。","detail":{"background":"本題官方答案為C。參與早期細胞分裂、預防神經管缺陷的是「葉酸」而非「磷」,故「磷參與早期細胞分裂」錯誤。其餘正確:第三孕期多補鐵(胎兒儲鐵與造血)、整個孕期補碘(胎兒腦發育)、鈣提供胎兒骨骼牙齒發育。","options":{"A":"正確。第三孕期多補鐵劑。","B":"正確。整個孕期應多補充碘。","C":"錯誤(本題答案)。參與早期細胞分裂的是葉酸(非磷)。","D":"正確。鈣提供胎兒骨骼和牙齒生長。"},"sources":["新文京《產科護理學》孕期營養","葉酸"]}},"113030-N4-18":{"quick":"39週頭產式新生兒身體評估異常的是「耳朵上緣位於內外眼眥連線以下」(D)。","detail":{"background":"正常新生兒「耳朵上緣應與內外眼眥(眼角)連線同高或之上」;「耳位低於此連線(低位耳)」與染色體異常/腎臟畸形相關,屬異常,故D。其餘正常:胎頭變形(產道擠壓)、結膜下點狀出血(產程壓力)、硬腭小白點(艾柏斯坦小珠Epstein’s pearls)。","options":{"A":"正常。胎頭變形(molding,產道擠壓)。","B":"正常。結膜下點狀出血(產程壓力,自癒)。","C":"正常。硬腭小白點(Epstein’s pearls)。","D":"異常(本題答案)。低位耳(耳上緣低於眼眥連線)與染色體/腎異常相關。"},"sources":["新文京《兒科護理學》新生兒","低位耳"]}},"113100-N4-24":{"quick":"人類乳突病毒(HPV)錯誤的是「HPV 6與11型屬於致癌型」(C)。","detail":{"background":"HPV「6、11型」是「低危險(非致癌)型」,主要引起「生殖器疣(菜花)」;致癌(高危險)型是「16、18型」(致子宮頸癌),故C錯誤。其餘正確:主要經性行為傳染、免疫正常年輕女性感染多可自行清除、HPV疫苗對未曾性行為/未感染者最有效。","options":{"A":"正確。HPV主要經由性行為傳染。","B":"正確。免疫正常年輕女性感染後常自行痊癒。","C":"錯誤(本題答案)。HPV 6、11是低危險型(致癌是16、18型)。","D":"正確。疫苗對未曾性行為/未感染者最有效。"},"sources":["新文京《婦科》HPV","16/18致癌"]}},"113100-N4-32":{"quick":"新生兒身體評估需進一步追蹤的是「出生頭圍40~42公分」(B)。","detail":{"background":"正常新生兒頭圍約「33~35公分」,「40~42公分」明顯過大,須懷疑「水腦」進一步追蹤。其餘正常:出生身長45~55公分、兩眼瞳孔間距約3.5~4公分、視力範圍約20公分(8吋)內,故B需追蹤。　補充：新生兒正常頭圍約32~37cm(平均約34cm)；「頭圍40~42公分」過大，需進一步評估水腦或顱內病變等異常，故需追蹤。","options":{"A":"正常。出生身長45~55公分。","B":"需追蹤(本題答案)。頭圍40~42公分過大(正常33~35,疑水腦)。","C":"正常。兩眼瞳孔間距約3.5~4公分。","D":"正常。新生兒視力範圍約20公分內。"},"sources":["新文京《兒科護理學》新生兒","頭圍"]}}},TO=["1兒童生長發育與身體系統生理", "2兒童認知發展皮亞傑與語言", "3兒童心理社會發展艾瑞克森與氣質", "4兒童遊戲發展", "5兒童對疾病與死亡概念", "6兒童心智自閉症", "7兒童心智ADHD憂鬱症厭食症與行為", "8兒童預防接種", "9兒童生命徵象測量與身體評估", "10兒童給藥與注射", "11兒童住院壓力與安全", "12兒科護理角色法律與政策", "13母嬰婦科借題與新生兒評估"],LEC={"1兒童生長發育與身體系統生理":{"html":"<p><b>生長原則</b>:有順序、可預測;方向=<b>由頭到尾、由近心到遠心、由簡單到複雜</b>。</p><p><b>體重</b>:出生3kg→4~6月×2→1歲×3(10kg)→2歲×4。<b>身長</b>:出生50→1歲75→4歲×2(100cm);2歲約成人一半。<b>頭圍</b>:出生33~35>胸圍→1歲≈胸圍→後胸圍>頭。<b>囟門</b>:前12~18月、後2~3月關。</p><p><b>牙齒</b>:乳齒6月起(下中門牙先)、2.5歲長齊20顆;恆齒約6歲(第一臼齒先)。<b>脊柱</b>:3~4月抬頭→頸椎前凸、6~9月坐→腰椎前凸。神經系統0~1歲長最快;觸覺最早發育。</p><p><b>丹佛II(DDST-II)</b>四領域(粗動作/精細-適應/語言/個人-社會)。里程碑:7月坐穩、12月pincer、15月獨走、18月用杯走穩、30月說6個身體部位、4~4.5歲扣鈕釦單腳
