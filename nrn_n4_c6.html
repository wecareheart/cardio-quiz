"detail":{"background":"泌尿道感染(UTI)/膀胱輸尿管逆流(VUR):『最常見致病菌『『大腸桿菌(E. coli)』』;嬰兒『發燒、餵食差、食慾下降、尿味腥』;女性『會陰短易上行』。護理:『『多喝水(6~8杯)不憋尿、『會陰『由前往後擦、『穿『棉質寬鬆內褲、避免泡澡(改淋浴)、『性行為『前後排空膀胱、『蔓越莓汁『酸化尿液』、『抗生素『服完『療程『並回診複檢尿液(不可症狀好就停)』』。『酸化尿液『用『蔓越莓/維生素C(『非『汽水/碳酸飲料/茶咖啡』,後者『無酸化『反刺激)』。『VUR』=『尿『逆流『回輸尿管/腎』,『以『『VCUG『分『五級』(級高愈嚴重)』、『輕度『用『預防性『抗生素』、可能『自癒』、嚴重『手術』;『未治療『致『反覆『腎盂腎炎『腎『瘢痕』。 泌尿道感染:抗生素連續服用、有尿意即解(不憋尿)、會陰由前往後擦皆適當。「『多喝『『汽水』『酸化尿液』」不適當——『『酸化『尿液『應用『『蔓越莓汁/維生素C』,『『汽水(碳酸『含糖)『『無『酸化『作用『且『不利』,應『『多喝『『開水』」。本題不適當者為D。","options":{"A":"適當。抗生素需連續服用(完成療程)。","B":"適當。有尿意即告知去解尿(不憋尿)。","C":"適當。解尿後由前往後擦拭會陰。","D":"不適當(本題答案)。汽水無酸化作用,應多喝開水/蔓越莓汁。"},"sources":["Nelson《兒科學》UTI","酸化尿液"]}},"102110-N4-34":{"quick":"反覆泌尿道感染最合宜的護理指導是「鼓勵每天喝6~8杯開水,且不要憋尿」。","detail":{"background":"泌尿道感染(UTI)/膀胱輸尿管逆流(VUR):『最常見致病菌『『大腸桿菌(E. coli)』』;嬰兒『發燒、餵食差、食慾下降、尿味腥』;女性『會陰短易上行』。護理:『『多喝水(6~8杯)不憋尿、『會陰『由前往後擦、『穿『棉質寬鬆內褲、避免泡澡(改淋浴)、『性行為『前後排空膀胱、『蔓越莓汁『酸化尿液』、『抗生素『服完『療程『並回診複檢尿液(不可症狀好就停)』』。『酸化尿液『用『蔓越莓/維生素C(『非『汽水/碳酸飲料/茶咖啡』,後者『無酸化『反刺激)』。『VUR』=『尿『逆流『回輸尿管/腎』,『以『『VCUG『分『五級』(級高愈嚴重)』、『輕度『用『預防性『抗生素』、可能『自癒』、嚴重『手術』;『未治療『致『反覆『腎盂腎炎『腎『瘢痕』。 反覆UTI預防:『『每天『喝『『6~8杯『開水『+『不憋尿(『沖刷『細菌)、會陰由前往後擦、棉質內褲、性行為前後排空膀胱』。本題最合宜為「喝6~8杯開水不憋尿」(A);說常見不處理(B忽視)、多喝茶咖啡(C利尿但刺激膀胱)、常用抗生素(D致抗藥性)。本題為A。","options":{"A":"正確。每天喝6~8杯開水、不憋尿(沖刷細菌)。","B":"錯。不應說常見不處理(忽視)。","C":"茶咖啡刺激膀胱,非適當。","D":"常用抗生素致抗藥性,不宜。"},"sources":["Nelson《兒科學》UTI","預防"]}},"103030-N4-48":{"quick":"護理師需進一步評估的個案是「2歲大明除有意義叫爸媽外,只會一個單字」。","detail":{"background":"發展評估『紅旗(須進一步評估)』:『『2歲『幼兒『語言『應『會『『雙字句(50字以上)』』;『『「2歲『只會『一個『單字』」『『落後『須『進一步『評估『發展遲緩』。本題須評估者為B;1歲站2秒、6歲偶爾尿床/吸拇指、10歲威脅離家(情緒但非發展紅旗)非最須評估的發展問題。本題為B。(註:此為發展評估借題。)","options":{"A":"1歲能獨站2秒屬正常範圍。","B":"正確。2歲只會一個單字(語言落後),須進一步評估。","C":"6歲偶爾尿床/吸拇指非最須評估。","D":"10歲威脅離家是情緒,非發展紅旗。"},"sources":["Nelson《兒科學》發展","語言"]}},"105090-N4-72":{"quick":"12個月泌尿道感染出院指導『錯誤』的是「為避免因包尿布引起感染,立即開始大小便訓練」。","detail":{"background":"泌尿道感染(UTI)/膀胱輸尿管逆流(VUR):『最常見致病菌『『大腸桿菌(E. coli)』』;嬰兒『發燒、餵食差、食慾下降、尿味腥』;女性『會陰短易上行』。護理:『『多喝水(6~8杯)不憋尿、『會陰『由前往後擦、『穿『棉質寬鬆內褲、避免泡澡(改淋浴)、『性行為『前後排空膀胱、『蔓越莓汁『酸化尿液』、『抗生素『服完『療程『並回診複檢尿液(不可症狀好就停)』』。『酸化尿液『用『蔓越莓/維生素C(『非『汽水/碳酸飲料/茶咖啡』,後者『無酸化『反刺激)』。『VUR』=『尿『逆流『回輸尿管/腎』,『以『『VCUG『分『五級』(級高愈嚴重)』、『輕度『用『預防性『抗生素』、可能『自癒』、嚴重『手術』;『未治療『致『反覆『腎盂腎炎『腎『瘢痕』。 UTI出院指導:避免泡澡(改淋浴)、會陰由前往後擦、多喝蔓越莓汁皆正確。「『『立即『開始『大小便『訓練』」錯誤——『『大小便『訓練『應『『依『發展『成熟度(約『18個月~3歲『開始;『12個月『過早)』,『且『『過早『強迫『訓練『增『壓力,『『與『預防『UTI『無直接『關係』」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。12個月過早,大小便訓練應依發展成熟度。","B":"正確。避免泡澡,採淋浴清潔。","C":"正確。會陰部由前往後擦拭。","D":"正確。多攝取蔓越莓汁減少重複感染。"},"sources":["Nelson《兒科學》UTI","如廁訓練"]}},"106110-N4-37":{"quick":"最常導致婦女泌尿道感染的病原體是「大腸桿菌」。","detail":{"background":"泌尿道感染(UTI)/膀胱輸尿管逆流(VUR):『最常見致病菌『『大腸桿菌(E. coli)』』;嬰兒『發燒、餵食差、食慾下降、尿味腥』;女性『會陰短易上行』。護理:『『多喝水(6~8杯)不憋尿、『會陰『由前往後擦、『穿『棉質寬鬆內褲、避免泡澡(改淋浴)、『性行為『前後排空膀胱、『蔓越莓汁『酸化尿液』、『抗生素『服完『療程『並回診複檢尿液(不可症狀好就停)』』。『酸化尿液『用『蔓越莓/維生素C(『非『汽水/碳酸飲料/茶咖啡』,後者『無酸化『反刺激)』。『VUR』=『尿『逆流『回輸尿管/腎』,『以『『VCUG『分『五級』(級高愈嚴重)』、『輕度『用『預防性『抗生素』、可能『自癒』、嚴重『手術』;『未治療『致『反覆『腎盂腎炎『腎『瘢痕』。 『『泌尿道感染『『最常見『致病菌『是『『『大腸桿菌(E. coli)』』(腸道菌經會陰上行)』。本題為「大腸桿菌」(A);白色念珠菌(陰道炎)、梅毒螺旋體(性病)、陰道鞭毛滴蟲(陰道炎)非UTI最常見。本題為A。","options":{"A":"正確。大腸桿菌(E. coli)是UTI最常見致病菌。","B":"白色念珠菌致陰道炎。","C":"梅毒螺旋體是性病。","D":"陰道鞭毛滴蟲致陰道炎。"},"sources":["Nelson《兒科學》UTI","大腸桿菌"]}},"106111-N4-74":{"quick":"18歲因性行為導致UTI出院指導正確的是「性行為前後應排空膀胱,以防尿液滯留及將細菌排出」。","detail":{"background":"泌尿道感染(UTI)/膀胱輸尿管逆流(VUR):『最常見致病菌『『大腸桿菌(E. coli)』』;嬰兒『發燒、餵食差、食慾下降、尿味腥』;女性『會陰短易上行』。護理:『『多喝水(6~8杯)不憋尿、『會陰『由前往後擦、『穿『棉質寬鬆內褲、避免泡澡(改淋浴)、『性行為『前後排空膀胱、『蔓越莓汁『酸化尿液』、『抗生素『服完『療程『並回診複檢尿液(不可症狀好就停)』』。『酸化尿液『用『蔓越莓/維生素C(『非『汽水/碳酸飲料/茶咖啡』,後者『無酸化『反刺激)』。『VUR』=『尿『逆流『回輸尿管/腎』,『以『『VCUG『分『五級』(級高愈嚴重)』、『輕度『用『預防性『抗生素』、可能『自癒』、嚴重『手術』;『未治療『致『反覆『腎盂腎炎『腎『瘢痕』。 (1)『會陰『『由『前(尿道)『往後(肛門)』擦(非由下往上)』,A錯;(2)『『避免『『泡澡(改淋浴)』』,B錯;(3)『性行為後『『不需『『消毒液『沖洗(『破壞『正常『菌叢)』』,C錯;(4)「『『性行為『『前後『『排空『膀胱『(排出『上行『細菌)」——正確。本題為D。","options":{"A":"錯。會陰由前往後清潔(非由下往上)。","B":"錯。應避免泡澡(改淋浴)。","C":"錯。不需消毒液沖洗(破壞正常菌叢)。","D":"正確。性行為前後排空膀胱,排出細菌。"},"sources":["Nelson《兒科學》UTI","性行為"]}},"107110-N4-78":{"quick":"14歲泌尿道感染出院指導『錯誤』的是「多攝取碳酸飲料,酸化尿液,減少重複感染機會」。","detail":{"background":"泌尿道感染(UTI)/膀胱輸尿管逆流(VUR):『最常見致病菌『『大腸桿菌(E. coli)』』;嬰兒『發燒、餵食差、食慾下降、尿味腥』;女性『會陰短易上行』。護理:『『多喝水(6~8杯)不憋尿、『會陰『由前往後擦、『穿『棉質寬鬆內褲、避免泡澡(改淋浴)、『性行為『前後排空膀胱、『蔓越莓汁『酸化尿液』、『抗生素『服完『療程『並回診複檢尿液(不可症狀好就停)』』。『酸化尿液『用『蔓越莓/維生素C(『非『汽水/碳酸飲料/茶咖啡』,後者『無酸化『反刺激)』。『VUR』=『尿『逆流『回輸尿管/腎』,『以『『VCUG『分『五級』(級高愈嚴重)』、『輕度『用『預防性『抗生素』、可能『自癒』、嚴重『手術』;『未治療『致『反覆『腎盂腎炎『腎『瘢痕』。 UTI指導:依醫囑服抗生素返院複檢、會陰由前往後擦、排空膀胱皆正確。「『多攝取『『碳酸『飲料『酸化尿液』」錯誤——『『碳酸『飲料(汽水)『『無『酸化『作用『且『含糖『不利;『酸化『尿液『用『『蔓越莓/維生素C』」。本題「錯誤」者為B。","options":{"A":"正確。依醫囑服抗生素、返院追蹤複檢尿液。","B":"錯誤(本題答案)。碳酸飲料無酸化作用(用蔓越莓/維生素C)。","C":"正確。如廁後由前往後擦拭。","D":"正確。排空膀胱,減少重複感染。"},"sources":["Nelson《兒科學》UTI","酸化"]}},"108020-N4-49":{"quick":"14歲泌尿道感染三度入院護理指導『較不適當』的是「增加運動量」。","detail":{"background":"泌尿道感染(UTI)/膀胱輸尿管逆流(VUR):『最常見致病菌『『大腸桿菌(E. coli)』』;嬰兒『發燒、餵食差、食慾下降、尿味腥』;女性『會陰短易上行』。護理:『『多喝水(6~8杯)不憋尿、『會陰『由前往後擦、『穿『棉質寬鬆內褲、避免泡澡(改淋浴)、『性行為『前後排空膀胱、『蔓越莓汁『酸化尿液』、『抗生素『服完『療程『並回診複檢尿液(不可症狀好就停)』』。『酸化尿液『用『蔓越莓/維生素C(『非『汽水/碳酸飲料/茶咖啡』,後者『無酸化『反刺激)』。『VUR』=『尿『逆流『回輸尿管/腎』,『以『『VCUG『分『五級』(級高愈嚴重)』、『輕度『用『預防性『抗生素』、可能『自癒』、嚴重『手術』;『未治療『致『反覆『腎盂腎炎『腎『瘢痕』。 反覆UTI指導:解便由前向後擦、多喝水不憋尿、穿寬鬆棉質內褲皆適當。「『『增加『『運動量』」較不適當——『『增加『運動量『『與『『預防『UTI『『無『直接『關係』(預防UTI重點是『多喝水、不憋尿、衛生);『過度『運動『脫水『反『不利』」。本題較不適當者為A。","options":{"A":"較不適當(本題答案)。增加運動量與預防UTI無直接關係。","B":"適當。解便後由前向後擦拭。","C":"適當。多喝水、不憋尿。","D":"適當。穿寬鬆的棉質內褲。"},"sources":["Nelson《兒科學》UTI","運動"]}},"109030-N4-51":{"quick":"幼兒泌尿道感染常見的致病菌是「大腸桿菌(E. coli)」。","detail":{"background":"泌尿道感染(UTI)/膀胱輸尿管逆流(VUR):『最常見致病菌『『大腸桿菌(E. coli)』』;嬰兒『發燒、餵食差、食慾下降、尿味腥』;女性『會陰短易上行』。護理:『『多喝水(6~8杯)不憋尿、『會陰『由前往後擦、『穿『棉質寬鬆內褲、避免泡澡(改淋浴)、『性行為『前後排空膀胱、『蔓越莓汁『酸化尿液』、『抗生素『服完『療程『並回診複檢尿液(不可症狀好就停)』』。『酸化尿液『用『蔓越莓/維生素C(『非『汽水/碳酸飲料/茶咖啡』,後者『無酸化『反刺激)』。『VUR』=『尿『逆流『回輸尿管/腎』,『以『『VCUG『分『五級』(級高愈嚴重)』、『輕度『用『預防性『抗生素』、可能『自癒』、嚴重『手術』;『未治療『致『反覆『腎盂腎炎『腎『瘢痕』。 幼兒(及各年齡)UTI『最常見『致病菌『是『『大腸桿菌(E. coli)』』(占約80%以上)。本題為「大腸桿菌」(D);變形桿菌、腸球菌、克雷白氏桿菌雖也可致UTI但非最常見。本題為D。","options":{"A":"變形桿菌可致UTI但非最常見。","B":"腸球菌非最常見。","C":"克雷白氏桿菌非最常見。","D":"正確。大腸桿菌(E. coli)是幼兒UTI最常見致病菌。"},"sources":["Nelson《兒科學》UTI","大腸桿菌"]}},"109030-N4-77":{"quick":"7歲UTI開立7天口服抗生素amoxicillin,適當指導是「藥物吃完,需回診追蹤及檢查尿液」。","detail":{"background":"泌尿道感染(UTI)/膀胱輸尿管逆流(VUR):『最常見致病菌『『大腸桿菌(E. coli)』』;嬰兒『發燒、餵食差、食慾下降、尿味腥』;女性『會陰短易上行』。護理:『『多喝水(6~8杯)不憋尿、『會陰『由前往後擦、『穿『棉質寬鬆內褲、避免泡澡(改淋浴)、『性行為『前後排空膀胱、『蔓越莓汁『酸化尿液』、『抗生素『服完『療程『並回診複檢尿液(不可症狀好就停)』』。『酸化尿液『用『蔓越莓/維生素C(『非『汽水/碳酸飲料/茶咖啡』,後者『無酸化『反刺激)』。『VUR』=『尿『逆流『回輸尿管/腎』,『以『『VCUG『分『五級』(級高愈嚴重)』、『輕度『用『預防性『抗生素』、可能『自癒』、嚴重『手術』;『未治療『致『反覆『腎盂腎炎『腎『瘢痕』。 UTI抗生素:『『須『『服完『『整個『『療程『(『症狀『好『不代表『細菌『清除)』、『『療程『結束『『回診『『追蹤『『複檢『尿液(確認治癒、無復發)』。本題適當為「藥物吃完需回診追蹤檢查尿液」(D);無疼痛/灼熱就停(A錯)、尿清就停(B錯)、藥吃完即避免復發(C過於絕對,須複檢)。本題為D。","options":{"A":"錯。無疼痛不代表清除,不可自行停藥。","B":"錯。尿清澈不代表治癒,不可停藥。","C":"錯。藥吃完仍須複檢確認(非即避免復發)。","D":"正確。藥物吃完需回診追蹤及檢查尿液。"},"sources":["Nelson《兒科學》UTI","回診"]}},"110030-N4-73":{"quick":"1個月男嬰泌尿道感染敘述照護『錯誤』的是「鼓勵給予小強蔓越莓汁,以鹼化尿液,預防感染」。","detail":{"background":"泌尿道感染(UTI)/膀胱輸尿管逆流(VUR):『最常見致病菌『『大腸桿菌(E. coli)』』;嬰兒『發燒、餵食差、食慾下降、尿味腥』;女性『會陰短易上行』。護理:『『多喝水(6~8杯)不憋尿、『會陰『由前往後擦、『穿『棉質寬鬆內褲、避免泡澡(改淋浴)、『性行為『前後排空膀胱、『蔓越莓汁『酸化尿液』、『抗生素『服完『療程『並回診複檢尿液(不可症狀好就停)』』。『酸化尿液『用『蔓越莓/維生素C(『非『汽水/碳酸飲料/茶咖啡』,後者『無酸化『反刺激)』。『VUR』=『尿『逆流『回輸尿管/腎』,『以『『VCUG『分『五級』(級高愈嚴重)』、『輕度『用『預防性『抗生素』、可能『自癒』、嚴重『手術』;『未治療『致『反覆『腎盂腎炎『腎『瘢痕』。 嬰兒UTI:臨床發燒餵食困難食慾下降、勤換尿布避免泡澡、抗生素勿症狀改善即停皆正確。「『蔓越莓汁『以『『『鹼』化『尿液』」錯誤——『『蔓越莓『是『『『酸』化『尿液(非鹼化)』;『且『『1個月『嬰兒『『不『建議『給『『果汁(『純『母乳/配方『為主)』」。本題「錯誤」者為B。","options":{"A":"正確。嬰兒UTI臨床表徵發燒、餵食困難、食慾下降。","B":"錯誤(本題答案)。蔓越莓是『酸』化尿液(非鹼化);1個月嬰兒不宜給果汁。","C":"正確。勤換尿布、避免泡澡。","D":"正確。抗生素勿因症狀改善而任意停用。"},"sources":["Nelson《兒科學》UTI","酸化"]}},"112180-N4-32":{"quick":"2歲6個月泌尿道感染住院減輕壓力護理『錯誤』的是「限制小玲下床自由活動」。","detail":{"background":"幼兒(2.5歲)住院減壓:容許表達反抗生氣情緒、不批評接受退化行為、提供選擇機會皆正確。「『『限制『『下床『『自由『活動』」錯誤——『『幼兒『發展『『自主性』,『『過度『限制『活動『『增『壓力『與『退化;『應『『在『安全『下『『允許『適度『活動』」。本題「錯誤」者為C。","options":{"A":"正確。容許表達反抗和生氣的情緒。","B":"正確。不批評且接受其退化性行為。","C":"錯誤(本題答案)。不應限制下床自由活動(幼兒發展自主性)。","D":"正確。儘可能提供選擇的機會。"},"sources":["Nelson《兒科學》住院壓力","自主"]}},"114170-N4-46":{"quick":"8個月泌尿道感染護理指導最適當的是「(多喝水/勤換尿布/會陰由前往後/服完抗生素)」(本題A)。","detail":{"background":"泌尿道感染(UTI)/膀胱輸尿管逆流(VUR):『最常見致病菌『『大腸桿菌(E. coli)』』;嬰兒『發燒、餵食差、食慾下降、尿味腥』;女性『會陰短易上行』。護理:『『多喝水(6~8杯)不憋尿、『會陰『由前往後擦、『穿『棉質寬鬆內褲、避免泡澡(改淋浴)、『性行為『前後排空膀胱、『蔓越莓汁『酸化尿液』、『抗生素『服完『療程『並回診複檢尿液(不可症狀好就停)』』。『酸化尿液『用『蔓越莓/維生素C(『非『汽水/碳酸飲料/茶咖啡』,後者『無酸化『反刺激)』。『VUR』=『尿『逆流『回輸尿管/腎』,『以『『VCUG『分『五級』(級高愈嚴重)』、『輕度『用『預防性『抗生素』、可能『自癒』、嚴重『手術』;『未治療『致『反覆『腎盂腎炎『腎『瘢痕』。 8個月嬰兒UTI最適當指導:『『勤換『尿布、『清潔『會陰『『由前『往後、『『多『補充『水分(母乳/配方)、『『抗生素『服完『療程『勿『自行『停』。本題最適當為選項A(符合UTI預防與治療原則);其餘選項含錯誤(如鹼化尿液、過早如廁訓練、症狀好就停藥等)。本題為A。","options":{"A":"正確。符合UTI護理原則(勤換尿布/前往後清潔/服完抗生素)。","B":"含錯誤敘述。","C":"含錯誤敘述。","D":"含錯誤敘述。"},"sources":["Nelson《兒科學》UTI","嬰兒"]}},"101030-N4-73":{"quick":"照顧急性腎絲球腎炎兒童『不適當』的是「食慾不佳應給予鹹蘇打餅乾以補充能量」。","detail":{"background":"急性腎絲球腎炎(AGN/post-strep GN):『多『A群β型『溶血性『鏈球菌『感染後『(咽炎/膿痂疹)『1~3週『發生』;表現『『血尿(茶/可樂色)、『水腫(眼眶/晨起)、『高血壓、『少尿、『蛋白尿』;『『C3『降低、ASLO『升高』。護理:『『急性期『臥床『休息、『監測『血壓/體重/輸出入量、『『低鈉『限水(水腫高血壓)、『少尿時『『限『鉀(避免高鉀:香蕉橘子木耳等)+『限『蛋白(保護腎)』、『勿『給『鹹蘇打餅/洋芋片/海苔(高鈉)』』。腎衰竭:『『少尿『<『0.5~1mL/kg/hr、BUN/Cr『『升高(非降低)、高血鉀心悸、意識改變』。腹膜透析:『高熱量『高碳水、『限『蛋白與鹽、補『鐵/葉酸/維生素D『防貧血、『腹膜炎『為常見『併發症』。 AGN護理:急性期臥床休息、每日測體重記輸出入量、每4~6小時測血壓皆適當。「『食慾不佳『給『『鹹『蘇打餅乾』」不適當——『『AGN『須『『低『鈉『飲食(『水腫『高血壓);『『鹹『蘇打餅『『高『鈉『會『加重『水腫『高血壓』」。本題不適當者為D。","options":{"A":"適當。急性期臥床休息減能量消耗。","B":"適當。每日測體重及記錄輸出入量。","C":"適當。每4~6小時測量血壓。","D":"不適當(本題答案)。鹹蘇打餅高鈉加重水腫(應低鈉)。"},"sources":["Nelson《兒科學》AGN","低鈉"]}},"103030-N4-73":{"quick":"6歲AGN(血壓150/100、頭痛視力模糊)護理處置正確的是「急性期必須臥床休息或於床上活動」。","detail":{"background":"急性腎絲球腎炎(AGN/post-strep GN):『多『A群β型『溶血性『鏈球菌『感染後『(咽炎/膿痂疹)『1~3週『發生』;表現『『血尿(茶/可樂色)、『水腫(眼眶/晨起)、『高血壓、『少尿、『蛋白尿』;『『C3『降低、ASLO『升高』。護理:『『急性期『臥床『休息、『監測『血壓/體重/輸出入量、『『低鈉『限水(水腫高血壓)、『少尿時『『限『鉀(避免高鉀:香蕉橘子木耳等)+『限『蛋白(保護腎)』、『勿『給『鹹蘇打餅/洋芋片/海苔(高鈉)』』。腎衰竭:『『少尿『<『0.5~1mL/kg/hr、BUN/Cr『『升高(非降低)、高血鉀心悸、意識改變』。腹膜透析:『高熱量『高碳水、『限『蛋白與鹽、補『鐵/葉酸/維生素D『防貧血、『腹膜炎『為常見『併發症』。 AGN『高血壓『腦病變(頭痛視力模糊)』:(1)「『急性期『『臥床『休息『(或床上活動)』減能量消耗與腎負荷」——正確;(2)『『限『鉀『(少尿『高鉀『風險;非『高鉀)』』,B錯;(3)『觀察『『高血容積『致『『肺水腫』——正確但本題以A為答;(4)『AGN『『非『『高血脂(那是『腎病症候群)』』,D錯。本題為A。","options":{"A":"正確。急性期臥床休息或床上活動。","B":"錯。應限鉀(少尿高鉀風險),非高鉀。","C":"觀察肺水腫正確,但本題以A為答。","D":"錯。高血脂是腎病症候群(非AGN)。"},"sources":["Nelson《兒科學》AGN","臥床"]}},"104100-N4-75":{"quick":"8歲AGN(I/O 1200/1050、BUN12、Cr0.7、BP120/85)需優先執行的是「臥床休息」。","detail":{"background":"急性腎絲球腎炎(AGN/post-strep GN):『多『A群β型『溶血性『鏈球菌『感染後『(咽炎/膿痂疹)『1~3週『發生』;表現『『血尿(茶/可樂色)、『水腫(眼眶/晨起)、『高血壓、『少尿、『蛋白尿』;『『C3『降低、ASLO『升高』。護理:『『急性期『臥床『休息、『監測『血壓/體重/輸出入量、『『低鈉『限水(水腫高血壓)、『少尿時『『限『鉀(避免高鉀:香蕉橘子木耳等)+『限『蛋白(保護腎)』、『勿『給『鹹蘇打餅/洋芋片/海苔(高鈉)』』。腎衰竭:『『少尿『<『0.5~1mL/kg/hr、BUN/Cr『『升高(非降低)、高血鉀心悸、意識改變』。腹膜透析:『高熱量『高碳水、『限『蛋白與鹽、補『鐵/葉酸/維生素D『防貧血、『腹膜炎『為常見『併發症』。 本例『輸出入量『接近平衡、『BUN/Cr『『正常、『血壓『稍高但非危象』→『腎功能『尚『穩定』,『『不需『『嚴格『限水/限鉀/低蛋白(腎功能正常)』;『AGN『急性期『『最優先『『『『臥床『休息(減腎負荷與血壓)』。本題優先為「臥床休息」(C);低蛋白(腎功能正常不需)、低鉀(BUN正常不需)、限水500cc(輸出入平衡不需嚴格限)非優先。本題為C。","options":{"A":"腎功能正常,不需低蛋白。","B":"BUN/Cr正常,不需低鉀。","C":"正確。AGN急性期優先臥床休息(減腎負荷血壓)。","D":"輸出入平衡,不需嚴格限水500cc。"},"sources":["Nelson《兒科學》AGN","臥床"]}},"105090-N4-75":{"quick":"10歲AGN(尿量250cc、BUN100)護理指導『錯誤』的是「攝取生酮飲食,以利腎絲球過濾」。","detail":{"background":"急性腎絲球腎炎(AGN/post-strep GN):『多『A群β型『溶血性『鏈球菌『感染後『(咽炎/膿痂疹)『1~3週『發生』;表現『『血尿(茶/可樂色)、『水腫(眼眶/晨起)、『高血壓、『少尿、『蛋白尿』;『『C3『降低、ASLO『升高』。護理:『『急性期『臥床『休息、『監測『血壓/體重/輸出入量、『『低鈉『限水(水腫高血壓)、『少尿時『『限『鉀(避免高鉀:香蕉橘子木耳等)+『限『蛋白(保護腎)』、『勿『給『鹹蘇打餅/洋芋片/海苔(高鈉)』』。腎衰竭:『『少尿『<『0.5~1mL/kg/hr、BUN/Cr『『升高(非降低)、高血鉀心悸、意識改變』。腹膜透析:『高熱量『高碳水、『限『蛋白與鹽、補『鐵/葉酸/維生素D『防貧血、『腹膜炎『為常見『併發症』。 AGN『少尿『+『BUN『高(腎功能差)』:『『低『蛋白(保護腎)、『嚴格『限水(控水腫高血壓)、『避免『高鉀(少尿高鉀風險)』皆正確。「『攝取『『生酮『飲食『以利『腎絲球『過濾』」錯誤——『『生酮『飲食(高脂低醣)『『『不『適用『AGN『(且『無『利於『腎絲球『過濾『之『依據;『高蛋白『代謝『反『增『腎『負荷)』」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。生酮飲食不適用AGN(無利腎絲球過濾依據)。","B":"正確。低蛋白飲食保護腎臟功能。","C":"正確。嚴格限水控制水腫與高血壓。","D":"正確。避免高鉀食物(少尿高鉀風險)。"},"sources":["Nelson《兒科學》AGN","低蛋白"]}},"106111-N4-73":{"quick":"12歲AGN護理措施正確的是「密切監測血壓」。","detail":{"background":"急性腎絲球腎炎(AGN/post-strep GN):『多『A群β型『溶血性『鏈球菌『感染後『(咽炎/膿痂疹)『1~3週『發生』;表現『『血尿(茶/可樂色)、『水腫(眼眶/晨起)、『高血壓、『少尿、『蛋白尿』;『『C3『降低、ASLO『升高』。護理:『『急性期『臥床『休息、『監測『血壓/體重/輸出入量、『『低鈉『限水(水腫高血壓)、『少尿時『『限『鉀(避免高鉀:香蕉橘子木耳等)+『限『蛋白(保護腎)』、『勿『給『鹹蘇打餅/洋芋片/海苔(高鈉)』』。腎衰竭:『『少尿『<『0.5~1mL/kg/hr、BUN/Cr『『升高(非降低)、高血鉀心悸、意識改變』。腹膜透析:『高熱量『高碳水、『限『蛋白與鹽、補『鐵/葉酸/維生素D『防貧血、『腹膜炎『為常見『併發症』。 AGN『最重要『監測『之一『是『『『血壓(『『高血壓『常見『且『可『致『腦病變)』』。本題正確為「密切監測血壓」(D);每日測『腹圍』(那是腹水/腎病較相關)、鼓勵下床(急性期應臥床)、高鉀飲食(應限鉀)皆不適。本題為D。","options":{"A":"測腹圍與腹水相關,非AGN重點。","B":"錯。AGN急性期應臥床(非鼓勵下床)。","C":"錯。應限鉀(非高鉀飲食)。","D":"正確。密切監測血壓(防高血壓腦病變)。"},"sources":["Nelson《兒科學》AGN","血壓"]}},"107110-N4-76":{"quick":"腎病症候群與AGN比較正確的是「兩者皆會出現蛋白尿臨床表徵」。","detail":{"background":"腎病症候群 vs AGN:(1)『『AGN『與『鏈球菌『感染『後『相關;『腎病症候群『『『多『『不『由『鏈球菌(原發性)』』,A錯;(2)『CRP『非『兩者『共同『升高『指標』,B錯;(3)「『『兩者『『皆『出現『『『蛋白尿』(腎絲球受損致蛋白漏出;腎病症候群『『大量『蛋白尿)」——正確;(4)『『『高血脂『主要『是『『腎病症候群(非AGN)』』,D錯。本題為C。","options":{"A":"錯。AGN與鏈球菌相關,腎病症候群多非鏈球菌所致。","B":"錯。CRP非兩者共同升高指標。","C":"正確。兩者皆出現蛋白尿(腎病症候群為大量)。","D":"錯。高血脂主要是腎病症候群(非AGN)。"},"sources":["Nelson《兒科學》AGN/腎病","蛋白尿"]}},"108020-N4-48":{"quick":"8歲AGN少尿,飲食應避免的是「香蕉」。","detail":{"background":"急性腎絲球腎炎(AGN/post-strep GN):『多『A群β型『溶血性『鏈球菌『感染後『(咽炎/膿痂疹)『1~3週『發生』;表現『『血尿(茶/可樂色)、『水腫(眼眶/晨起)、『高血壓、『少尿、『蛋白尿』;『『C3『降低、ASLO『升高』。護理:『『急性期『臥床『休息、『監測『血壓/體重/輸出入量、『『低鈉『限水(水腫高血壓)、『少尿時『『限『鉀(避免高鉀:香蕉橘子木耳等)+『限『蛋白(保護腎)』、『勿『給『鹹蘇打餅/洋芋片/海苔(高鈉)』』。腎衰竭:『『少尿『<『0.5~1mL/kg/hr、BUN/Cr『『升高(非降低)、高血鉀心悸、意識改變』。腹膜透析:『高熱量『高碳水、『限『蛋白與鹽、補『鐵/葉酸/維生素D『防貧血、『腹膜炎『為常見『併發症』。 AGN『『少尿『時『須『『限『『鉀(『腎『排鉀『差『致『『高血鉀』)』。『『『香蕉『『『高鉀』,『少尿『時『『應『避免』。本題應避免者為「香蕉」(D);鳳梨、木耳、胡瓜鉀含量相對較低(木耳鉀偏高但本題以香蕉為高鉀代表)。本題依官方為D(香蕉高鉀)。","options":{"A":"鳳梨鉀含量相對較低。","B":"木耳鉀偏高,但本題以香蕉為答。","C":"胡瓜鉀含量低。","D":"正確。香蕉高鉀,AGN少尿時應避免。"},"sources":["Nelson《兒科學》AGN","限鉀"]}},"110030-N4-71":{"quick":"9歲AGN護理照護『錯誤』的是「鼓勵病童多進食高鉀食物,如香蕉、橘子以預防低血鉀」。","detail":{"background":"急性腎絲球腎炎(AGN/post-strep GN):『多『A群β型『溶血性『鏈球菌『感染後『(咽炎/膿痂疹)『1~3週『發生』;表現『『血尿(茶/可樂色)、『水腫(眼眶/晨起)、『高血壓、『少尿、『蛋白尿』;『『C3『降低、ASLO『升高』。護理:『『急性期『臥床『休息、『監測『血壓/體重/輸出入量、『『低鈉『限水(水腫高血壓)、『少尿時『『限『鉀(避免高鉀:香蕉橘子木耳等)+『限『蛋白(保護腎)』、『勿『給『鹹蘇打餅/洋芋片/海苔(高鈉)』』。腎衰竭:『『少尿『<『0.5~1mL/kg/hr、BUN/Cr『『升高(非降低)、高血鉀心悸、意識改變』。腹膜透析:『高熱量『高碳水、『限『蛋白與鹽、補『鐵/葉酸/維生素D『防貧血、『腹膜炎『為常見『併發症』。 AGN護理:急性期臥床、監測水腫血壓尿量、每日同磅秤同穿著測體重皆正確。「『多進食『『高鉀『食物(香蕉橘子)『預防『低血鉀』」錯誤——『『AGN『少尿『時『『腎『排鉀『差『易『『『高『血鉀(非低血鉀)』,『『應『『『限『鉀(避免香蕉橘子等高鉀)』」。本題「錯誤」者為C。","options":{"A":"正確。急性期臥床休息減能量消耗。","B":"正確。密切監測水腫、血壓、尿量變化。","C":"錯誤(本題答案)。AGN少尿易高血鉀,應限鉀(非高鉀)。","D":"正確。每日定時同磅秤同穿著測體重。"},"sources":["Nelson《兒科學》AGN","限鉀"]}},"111110-N4-64":{"quick":"6個月開心手術後腎臟衰竭臨床表徵『錯誤』的是「血中尿素氮和血清肌酸酐降低」。","detail":{"background":"急性腎絲球腎炎(AGN/post-strep GN):『多『A群β型『溶血性『鏈球菌『感染後『(咽炎/膿痂疹)『1~3週『發生』;表現『『血尿(茶/可樂色)、『水腫(眼眶/晨起)、『高血壓、『少尿、『蛋白尿』;『『C3『降低、ASLO『升高』。護理:『『急性期『臥床『休息、『監測『血壓/體重/輸出入量、『『低鈉『限水(水腫高血壓)、『少尿時『『限『鉀(避免高鉀:香蕉橘子木耳等)+『限『蛋白(保護腎)』、『勿『給『鹹蘇打餅/洋芋片/海苔(高鈉)』』。腎衰竭:『『少尿『<『0.5~1mL/kg/hr、BUN/Cr『『升高(非降低)、高血鉀心悸、意識改變』。腹膜透析:『高熱量『高碳水、『限『蛋白與鹽、補『鐵/葉酸/維生素D『防貧血、『腹膜炎『為常見『併發症』。 腎臟衰竭臨床表徵:『『少尿(『<『0.5~1mL/kg/hr)、『意識不清/昏睡、『『高血鉀『致『心悸』皆正確。「『『BUN『和『『血清『肌酸酐(Cr)『『『『降低』」錯誤——『腎衰竭『『腎『『排泄『廢物『差『→『『BUN『與『Cr『『『『升高(非降低)』』。本題「錯誤」者為D。","options":{"A":"正確。腎衰竭少尿(0.5~2mL/kg/hr以下)。","B":"正確。意識不清或昏睡(尿毒)。","C":"正確。高血鉀出現心悸。","D":"錯誤(本題答案)。腎衰竭BUN與Cr『升高』(非降低)。"},"sources":["Nelson《兒科學》腎衰竭","BUN"]}},"111110-N4-74":{"quick":"4歲AGN護理指導最適當的是「急性期合併少尿時,避免牛奶、蛋類、香蕉等食物」。","detail":{"background":"急性腎絲球腎炎(AGN/post-strep GN):『多『A群β型『溶血性『鏈球菌『感染後『(咽炎/膿痂疹)『1~3週『發生』;表現『『血尿(茶/可樂色)、『水腫(眼眶/晨起)、『高血壓、『少尿、『蛋白尿』;『『C3『降低、ASLO『升高』。護理:『『急性期『臥床『休息、『監測『血壓/體重/輸出入量、『『低鈉『限水(水腫高血壓)、『少尿時『『限『鉀(避免高鉀:香蕉橘子木耳等)+『限『蛋白(保護腎)』、『勿『給『鹹蘇打餅/洋芋片/海苔(高鈉)』』。腎衰竭:『『少尿『<『0.5~1mL/kg/hr、BUN/Cr『『升高(非降低)、高血鉀心悸、意識改變』。腹膜透析:『高熱量『高碳水、『限『蛋白與鹽、補『鐵/葉酸/維生素D『防貧血、『腹膜炎『為常見『併發症』。 AGN護理:(1)『急性期『水腫『應『『臥床(非多活動)』』,A錯;(2)『少尿『應『『『限水(非多攝果汁湯汁)』』,B錯;(3)『水腫『應『『低鈉(海苔蘇打洋芋片『高鈉『不宜)』』,C錯;(4)「『『少尿『時『『避免『『『牛奶、蛋類(高蛋白)、『香蕉(高鉀)』」——正確(限蛋白限鉀)。本題為D。","options":{"A":"錯。急性期水腫應臥床(非多活動)。","B":"錯。少尿應限水(非多攝果汁湯汁)。","C":"錯。水腫應低鈉(海苔蘇打洋芋片高鈉不宜)。","D":"正確。少尿避免牛奶蛋類(高蛋白)、香蕉(高鉀)。"},"sources":["Nelson《兒科學》AGN","限蛋白鉀"]}},"112030-N4-63":{"quick":"不是由A群β型溶血性鏈球菌引起的疾病是「哮吼」。","detail":{"background":"A群β型溶血性鏈球菌『相關疾病』:『『扁桃腺/咽『發炎、『『急性『風濕熱、『『急性『腎絲球『腎炎(AGN)、猩紅熱、膿痂疹』。「『『『哮吼(croup)』』『『不是『鏈球菌『引起——『『哮吼『多由『『『副流感『『病毒『引起』」。本題不是鏈球菌引起者為「哮吼」(C)。","options":{"A":"扁桃腺發炎可由鏈球菌引起。","B":"急性風濕熱由鏈球菌感染後引起。","C":"本題答案(非鏈球菌)。哮吼由副流感病毒引起。","D":"急性腎絲球腎炎由鏈球菌感染後引起。"},"sources":["Nelson《兒科學》鏈球菌","哮吼"]}},"112030-N4-75":{"quick":"14歲慢性腎衰竭腹膜透析護理指導『較不適當』的是「攝取高熱量碳水化合物及脂肪類食物,特別限制蛋白質及鹽的攝取」(本題A)——本題答A。","detail":{"background":"急性腎絲球腎炎(AGN/post-strep GN):『多『A群β型『溶血性『鏈球菌『感染後『(咽炎/膿痂疹)『1~3週『發生』;表現『『血尿(茶/可樂色)、『水腫(眼眶/晨起)、『高血壓、『少尿、『蛋白尿』;『『C3『降低、ASLO『升高』。護理:『『急性期『臥床『休息、『監測『血壓/體重/輸出入量、『『低鈉『限水(水腫高血壓)、『少尿時『『限『鉀(避免高鉀:香蕉橘子木耳等)+『限『蛋白(保護腎)』、『勿『給『鹹蘇打餅/洋芋片/海苔(高鈉)』』。腎衰竭:『『少尿『<『0.5~1mL/kg/hr、BUN/Cr『『升高(非降低)、高血鉀心悸、意識改變』。腹膜透析:『高熱量『高碳水、『限『蛋白與鹽、補『鐵/葉酸/維生素D『防貧血、『腹膜炎『為常見『併發症』。 腹膜透析:補鐵葉酸維生素D防貧血、腹膜炎為常見併發症須學消毒、透析液緩慢注入停留再引流皆正確。本題『較不適當』為A:依官方,『『「『『特別『『限制『『『蛋白質』」『不適當』——『『『『透析(尤『腹膜透析)『『會『『流失『『蛋白質』,『『『反『『須『『『『『增加(『非『限制)『蛋白質『攝取(高生物價蛋白)』』(『『嚴格『限蛋白『是『『『透析『『前『的『保守『治療,『透析『後『不『再『嚴格『限蛋白)』」。本題較不適當者為A。","options":{"A":"較不適當(本題答案)。透析會流失蛋白質,應『增加』蛋白(非特別限制)。","B":"適當。補鐵、葉酸、維生素D防貧血。","C":"適當。腹膜炎為常見併發症,學習消毒。","D":"適當。透析液緩慢注入、停留再引流。"},"sources":["Nelson《兒科學》腹膜透析","蛋白質"]}},"114030-N4-45":{"quick":"4歲AGN照護措施最適當的是「(急性期臥床休息、低鈉限水、限鉀、監測血壓體重尿量)」(本題D)。","detail":{"background":"急性腎絲球腎炎(AGN/post-strep GN):『多『A群β型『溶血性『鏈球菌『感染後『(咽炎/膿痂疹)『1~3週『發生』;表現『『血尿(茶/可樂色)、『水腫(眼眶/晨起)、『高血壓、『少尿、『蛋白尿』;『『C3『降低、ASLO『升高』。護理:『『急性期『臥床『休息、『監測『血壓/體重/輸出入量、『『低鈉『限水(水腫高血壓)、『少尿時『『限『鉀(避免高鉀:香蕉橘子木耳等)+『限『蛋白(保護腎)』、『勿『給『鹹蘇打餅/洋芋片/海苔(高鈉)』』。腎衰竭:『『少尿『<『0.5~1mL/kg/hr、BUN/Cr『『升高(非降低)、高血鉀心悸、意識改變』。腹膜透析:『高熱量『高碳水、『限『蛋白與鹽、補『鐵/葉酸/維生素D『防貧血、『腹膜炎『為常見『併發症』。 AGN照護最適當原則:『『急性期『『臥床『休息、『『低鈉『『限水(水腫高血壓)、『少尿『『限鉀『限蛋白、『密切『監測『『血壓/體重/尿量』。本題最適當為選項D(符合AGN照護原則);其餘選項含錯誤(如多活動、多攝水、高鈉零食、高鉀等)。本題為D。","options":{"A":"含錯誤(如急性期多活動)。","B":"含錯誤(如多攝水/果汁)。","C":"含錯誤(如高鈉零食)。","D":"正確。符合AGN照護(臥床/低鈉限水/限鉀/監測血壓尿量)。"},"sources":["Nelson《兒科學》AGN","照護"]}},"101110-N4-31":{"quick":"腎病症候群『不是』診斷依據的是「血尿」。","detail":{"background":"腎病症候群(nephrotic syndrome):『腎絲球『膜『通透性『增加』→『『四大『特徵『『大量『蛋白尿、『『低『白蛋白『血症、『『水腫(凹陷性/眼眶/全身)、『『高『血脂(高膽固醇)』』;『『『血壓『多『正常、『『血尿『『非『典型(AGN才血尿明顯)』。治療:『『類固醇(prednisolone)『為『主』;『副作用『『月亮臉、水牛肩、食慾增加、易感染、生長抑制、高血壓』(『『不可『『自行『『停藥『或『因『月亮臉『停藥)』;『利尿劑『先『給『白蛋白『再『利尿、補『鉀』;『『類固醇『治療『期間『『『禁『活性『減毒『疫苗』、『『避免『接觸『感染源(易感染)』;水腫『皮膚『護理『常『更換『姿勢『支托』。 腎病症候群『診斷『四大『依據』:『『大量『蛋白尿、『『低『白蛋白『血症、『『高『膽固醇『血症、『水腫』。「『『血尿』」『不是』腎病症候群『診斷『依據——『『『血尿『是『『『急性腎絲球腎炎(AGN)』』的『典型(腎病症候群『血尿『不明顯)』」。本題不是依據者為D。","options":{"A":"是。高膽固醇血症。","B":"是。蛋白尿(大量)。","C":"是。低白蛋白血症。","D":"本題答案(非依據)。血尿是AGN典型(非腎病症候群)。"},"sources":["Nelson《兒科學》腎病症候群","診斷"]}},"102030-N4-75":{"quick":"腎病症候群類固醇治療期間疫苗接種正確的是「所有的活性減毒疫苗均不可給予」。","detail":{"background":"腎病症候群(nephrotic syndrome):『腎絲球『膜『通透性『增加』→『『四大『特徵『『大量『蛋白尿、『『低『白蛋白『血症、『『水腫(凹陷性/眼眶/全身)、『『高『血脂(高膽固醇)』』;『『『血壓『多『正常、『『血尿『『非『典型(AGN才血尿明顯)』。治療:『『類固醇(prednisolone)『為『主』;『副作用『『月亮臉、水牛肩、食慾增加、易感染、生長抑制、高血壓』(『『不可『『自行『『停藥『或『因『月亮臉『停藥)』;『利尿劑『先『給『白蛋白『再『利尿、補『鉀』;『『類固醇『治療『期間『『『禁『活性『減毒『疫苗』、『『避免『接觸『感染源(易感染)』;水腫『皮膚『護理『常『更換『姿勢『支托』。 『類固醇『治療『(免疫抑制)『期間』:『『『所有『『活性『減毒『疫苗(MMR/水痘/卡介苗/口服小兒麻痺/輪狀)『『『『不可『給予』』(『減毒『活『病毒『可能『致『感染)』。本題正確為「所有活性減毒疫苗均不可給予」(B);接觸水痘給水痘疫苗(A錯,免疫抑制不給活疫苗,應給『免疫球蛋白』)、減毒『細菌』疫苗(C不全)、停藥1個月再給(D不精確)。本題為B。","options":{"A":"錯。免疫抑制不給活疫苗,接觸水痘應給免疫球蛋白。","B":"正確。所有活性減毒疫苗均不可給予。","C":"「減毒細菌疫苗」敘述不全。","D":"「停藥1個月」不精確。"},"sources":["Nelson《兒科學》腎病症候群","活疫苗"]}},"102110-N4-73":{"quick":"5歲腎病症候群類固醇副作用『不包括』「出血性膀胱炎」。","detail":{"background":"腎病症候群(nephrotic syndrome):『腎絲球『膜『通透性『增加』→『『四大『特徵『『大量『蛋白尿、『『低『白蛋白『血症、『『水腫(凹陷性/眼眶/全身)、『『高『血脂(高膽固醇)』』;『『『血壓『多『正常、『『血尿『『非『典型(AGN才血尿明顯)』。治療:『『類固醇(prednisolone)『為『主』;『副作用『『月亮臉、水牛肩、食慾增加、易感染、生長抑制、高血壓』(『『不可『『自行『『停藥『或『因『月亮臉『停藥)』;『利尿劑『先『給『白蛋白『再『利尿、補『鉀』;『『類固醇『治療『期間『『『禁『活性『減毒『疫苗』、『『避免『接觸『感染源(易感染)』;水腫『皮膚『護理『常『更換『姿勢『支托』。 類固醇(prednisolone)常見副作用:『『食慾『增加、『『易『感染、『『生長『抑制、月亮臉、水牛肩、高血壓、高血糖、骨質疏鬆』。「『『出血性『膀胱炎』」『不是』類固醇『副作用——『『出血性『膀胱炎『是『『『環磷醯胺(cyclophosphamide)』』等『化療藥『的『副作用』」。本題不包括者為D。","options":{"A":"是。食慾增加。","B":"是。容易感染(免疫抑制)。","C":"是。生長抑制。","D":"本題答案(非類固醇副作用)。出血性膀胱炎是cyclophosphamide副作用。"},"sources":["Nelson《兒科學》類固醇","副作用"]}},"104030-N4-76":{"quick":"2歲腎病症候群藥物治療護理指導『不適當』的是「出現月亮臉、水牛肩時,需立刻停用類固醇製劑」。","detail":{"background":"腎病症候群(nephrotic syndrome):『腎絲球『膜『通透性『增加』→『『四大『特徵『『大量『蛋白尿、『『低『白蛋白『血症、『『水腫(凹陷性/眼眶/全身)、『『高『血脂(高膽固醇)』』;『『『血壓『多『正常、『『血尿『『非『典型(AGN才血尿明顯)』。治療:『『類固醇(prednisolone)『為『主』;『副作用『『月亮臉、水牛肩、食慾增加、易感染、生長抑制、高血壓』(『『不可『『自行『『停藥『或『因『月亮臉『停藥)』;『利尿劑『先『給『白蛋白『再『利尿、補『鉀』;『『類固醇『治療『期間『『『禁『活性『減毒『疫苗』、『『避免『接觸『感染源(易感染)』;水腫『皮膚『護理『常『更換『姿勢『支托』。 腎病症候群藥物:利尿劑補鉀、先給白蛋白再利尿、類固醇期間禁活性減毒疫苗皆正確。「『出現『月亮臉、水牛肩『『『立刻『停用『類固醇』」不適當——『『月亮臉/水牛肩『是『類固醇『『『常見『副作用,『『『不可『『『驟然『停藥『(『須『『『漸減;『驟停『致『『腎上腺『危象/疾病『復發)』」。本題不適當者為D。","options":{"A":"適當。用利尿劑時補充鉀離子。","B":"適當。先給白蛋白靜脈注射後再給利尿劑。","C":"適當。類固醇治療期間不可給活性減毒疫苗。","D":"不適當(本題答案)。月亮臉/水牛肩不可驟停類固醇(須漸減)。"},"sources":["Nelson《兒科學》類固醇","勿驟停"]}},"108110-N4-77":{"quick":"3歲腎病症候群服prednisolone,適宜同住的病童是「4歲陳小妹診斷疝氣(hernia)」。","detail":{"background":"腎病症候群(nephrotic syndrome):『腎絲球『膜『通透性『增加』→『『四大『特徵『『大量『蛋白尿、『『低『白蛋白『血症、『『水腫(凹陷性/眼眶/全身)、『『高『血脂(高膽固醇)』』;『『『血壓『多『正常、『『血尿『『非『典型(AGN才血尿明顯)』。治療:『『類固醇(prednisolone)『為『主』;『副作用『『月亮臉、水牛肩、食慾增加、易感染、生長抑制、高血壓』(『『不可『『自行『『停藥『或『因『月亮臉『停藥)』;『利尿劑『先『給『白蛋白『再『利尿、補『鉀』;『『類固醇『治療『期間『『『禁『活性『減毒『疫苗』、『『避免『接觸『感染源(易感染)』;水腫『皮膚『護理『常『更換『姿勢『支托』。 腎病症候群『類固醇『(免疫抑制)『易『感染』,『『同住『病童『應『『避免『『感染源』。『『哮吼(croup,病毒/可飛沫)、腸病毒、水痘(高傳染)』皆『『不宜『同住』;『『『疝氣(hernia)『『『非『傳染病』,『『可『同住』。本題適宜為「疝氣」(D)。","options":{"A":"哮吼(病毒/飛沫)有傳染風險,不宜。","B":"腸病毒高傳染,不宜。","C":"水痘高傳染,不宜。","D":"正確。疝氣非傳染病,可同住。"},"sources":["Nelson《兒科學》腎病症候群","感染"]}},"110110-N4-76":{"quick":"10歲腎病症候群服Prednisolone護理指導最適當的是「避免接觸有傳染病源的人或環境,以預防感染」。","detail":{"background":"腎病症候群(nephrotic syndrome):『腎絲球『膜『通透性『增加』→『『四大『特徵『『大量『蛋白尿、『『低『白蛋白『血症、『『水腫(凹陷性/眼眶/全身)、『『高『血脂(高膽固醇)』』;『『『血壓『多『正常、『『血尿『『非『典型(AGN才血尿明顯)』。治療:『『類固醇(prednisolone)『為『主』;『副作用『『月亮臉、水牛肩、食慾增加、易感染、生長抑制、高血壓』(『『不可『『自行『『停藥『或『因『月亮臉『停藥)』;『利尿劑『先『給『白蛋白『再『利尿、補『鉀』;『『類固醇『治療『期間『『『禁『活性『減毒『疫苗』、『『避免『接觸『感染源(易感染)』;水腫『皮膚『護理『常『更換『姿勢『支托』。 (1)『類固醇『副作用『是『『月亮臉/水牛肩『等『(『非『『掉髮)』』,A錯;(2)『腸胃不適『『『不可『『自行『停藥(須漸減)』』,B錯;(3)「『『類固醇『免疫『抑制『→『『避免『『接觸『傳染源『預防『感染』」——正確;(4)『腎病症候群『『『血尿『非『典型』,『『『且『非『藥物『副作用』』,D錯。本題為C。","options":{"A":"錯。類固醇副作用是月亮臉等(非掉髮)。","B":"錯。腸胃不適不可自行停藥(須漸減)。","C":"正確。免疫抑制,避免接觸傳染源預防感染。","D":"錯。血尿非腎病症候群典型,亦非藥物副作用。"},"sources":["Nelson《兒科學》腎病症候群","感染"]}},"111030-N4-76":{"quick":"5歲腎病症候群全身水腫,預防皮膚完整性受損護理指導『不適當』的是「避免經常更換姿勢導致皮膚摩擦受損」。","detail":{"background":"腎病症候群(nephrotic syndrome):『腎絲球『膜『通透性『增加』→『『四大『特徵『『大量『蛋白尿、『『低『白蛋白『血症、『『水腫(凹陷性/眼眶/全身)、『『高『血脂(高膽固醇)』』;『『『血壓『多『正常、『『血尿『『非『典型(AGN才血尿明顯)』。治療:『『類固醇(prednisolone)『為『主』;『副作用『『月亮臉、水牛肩、食慾增加、易感染、生長抑制、高血壓』(『『不可『『自行『『停藥『或『因『月亮臉『停藥)』;『利尿劑『先『給『白蛋白『再『利尿、補『鉀』;『『類固醇『治療『期間『『『禁『活性『減毒『疫苗』、『『避免『接觸『感染源(易感染)』;水腫『皮膚『護理『常『更換『姿勢『支托』。 腎病症候群『水腫『皮膚『護理』:『穿『寬鬆『棉質、『支托『身體『減水腫『增舒適、『保持『皮膚『皺摺『清潔『乾燥』皆適當。「『『避免『『經常『『更換『姿勢』」不適當——『『水腫『皮膚『脆弱『須『『『『定時『『更換『姿勢『(翻身)『『預防『『壓瘡/皮膚『受損』(『非『避免『更換)』」。本題不適當者為C。","options":{"A":"適當。選寬鬆通風的棉質衣服。","B":"適當。適當支托身體減輕水腫、增舒適。","C":"不適當(本題答案)。應定時更換姿勢(翻身)防壓瘡(非避免)。","D":"適當。保持皮膚及皺摺處清潔乾燥。"},"sources":["Nelson《兒科學》腎病症候群","皮膚"]}},"112030-N4-74":{"quick":"2歲6個月腎病症候群敘述最適當的是「腎絲球受破壞,導致腎絲球膜通透性增加,常出現有蛋白尿」。","detail":{"background":"腎病症候群(nephro D。","options":{"A":"錯。常規尿不需優碘消毒(清潔即可)。","B":"錯。常規尿不需無菌技術(中段尿才需)。","C":"女童黏貼方向需正確(避免污染)。","D":"正確。男童盡可能將陰莖與陰囊放入集尿袋。"},"sources":["Nelson《兒科學》集尿袋","男童"]}},"109030-N4-78":{"quick":"隱睪症(cryptorchidism)敘述『錯誤』的是「胎兒7個月時睪丸應已進入陰囊」。","detail":{"background":"尿道下裂(hypospadias):『尿道『開口『在『『陰莖『『腹側(非龜頭中央)、常伴陰莖『下彎(chordee)』;『『出生『『勿『『行『割禮(包皮『留作『修補『材料)』;『手術『約『6~18個月『修補』。術後:『『『留置『導尿管『(支架)『『保持『通暢『勿『扭曲、『『固定『於『腹部/腿『防『牽扯傷口、『監測『尿量/顏色、『『『不可『『跨坐(壓傷口)、『限制『劇烈『活動『(可適度肢體活動)、『拱型『護架『避免『加壓、『『『尿液『由『『陰莖『以外『滲出『須『通知『醫師、『『不『限水(維持尿流沖洗)』。隱睪症(cryptorchidism):『睪丸『『未『下降『至『陰囊』;『『胎兒『『約『7~8個月(28~32週)『睪丸『經『腹股溝『入『陰囊』,『『早產兒『發生率『高』;『『出生『後『『約『1歲『內『『可『自動『下降』,『未『下降『『以『『手術(orchiopexy)『或『荷爾蒙『治療(『約『6個月~1~2歲『前)』;『評估『『環境『溫暖『(冷『致『提睪肌『收縮)、『未下降側『陰囊『『小『無『皺摺』。男嬰生殖評估:『『足月『『睪丸『『已『下降、『陰囊『『皺摺『『多』;『『早產『『陰囊『『小『『少『皺摺『睪丸『未降』。 隱睪症:早產兒發生率高於足月兒、出生後一年內可自動下降、處置以手術或荷爾蒙皆正確。「『『胎兒『『7個月『『『『已『『進入『陰囊』」錯誤——『『睪丸『『約『『7~8個月『『『『開始『下降』,『『『多『『於『『『足月(『約『『8~9個月/出生『前)『『『才『『完成『進入『陰囊』(『『7個月『『尚『『下降『中)』」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。7個月睪丸『開始』下降(足月才完成進入陰囊)。","B":"正確。早產兒隱睪症機率高於足月兒。","C":"正確。出生後一年內未下降睪丸可能自動下降。","D":"正確。處置以手術或荷爾蒙治療為主。"},"sources":["Nelson《兒科學》隱睪症","下降時間"]}},"111030-N4-28":{"quick":"出生1個月男嬰生殖器評估最正確的是「睪丸已下降,陰囊皺摺多」。","detail":{"background":"尿道下裂(hypospadias):『尿道『開口『在『『陰莖『『腹側(非龜頭中央)、常伴陰莖『下彎(chordee)』;『『出生『『勿『『行『割禮(包皮『留作『修補『材料)』;『手術『約『6~18個月『修補』。術後:『『『留置『導尿管『(支架)『『保持『通暢『勿『扭曲、『『固定『於『腹部/腿『防『牽扯傷口、『監測『尿量/顏色、『『『不可『『跨坐(壓傷口)、『限制『劇烈『活動『(可適度肢體活動)、『拱型『護架『避免『加壓、『『『尿液『由『『陰莖『以外『滲出『須『通知『醫師、『『不『限水(維持尿流沖洗)』。隱睪症(cryptorchidism):『睪丸『『未『下降『至『陰囊』;『『胎兒『『約『7~8個月(28~32週)『睪丸『經『腹股溝『入『陰囊』,『『早產兒『發生率『高』;『『出生『後『『約『1歲『內『『可『自動『下降』,『未『下降『『以『『手術(orchiopexy)『或『荷爾蒙『治療(『約『6個月~1~2歲『前)』;『評估『『環境『溫暖『(冷『致『提睪肌『收縮)、『未下降側『陰囊『『小『無『皺摺』。男嬰生殖評估:『『足月『『睪丸『『已『下降、『陰囊『『皺摺『『多』;『『早產『『陰囊『『小『『少『皺摺『睪丸『未降』。 『足月『男嬰(出生1個月)『正常『生殖器』:『『『睪丸『『已『『下降『至『陰囊、『陰囊『『『皺摺『『多』。本題最正確為「睪丸已下降、陰囊皺摺多」(B);睪丸位於腹股溝/未下降(隱睪/早產)、陰囊無皺摺(早產)皆異常。本題為B。","options":{"A":"睪丸位於腹股溝、陰囊皺摺少是早產/隱睪。","B":"正確。足月男嬰睪丸已下降、陰囊皺摺多。","C":"睪丸未下降、陰囊無皺摺是異常。","D":"陰囊光滑無皺摺是早產特徵。"},"sources":["Nelson《兒科學》男嬰評估","陰囊"]}},"112180-N4-45":{"quick":"尿道下裂(hypospadias)術後最適當的是「將導尿管固定於腹部或腿上以降低拉扯傷口」。","detail":{"background":"尿道下裂(hypospadias):『尿道『開口『在『『陰莖『『腹側(非龜頭中央)、常伴陰莖『下彎(chordee)』;『『出生『『勿『『行『割禮(包皮『留作『修補『材料)』;『手術『約『6~18個月『修補』。術後:『『『留置『導尿管『(支架)『『保持『通暢『勿『扭曲、『『固定『於『腹部/腿『防『牽扯傷口、『監測『尿量/顏色、『『『不可『『跨坐(壓傷口)、『限制『劇烈『活動『(可適度肢體活動)、『拱型『護架『避免『加壓、『『『尿液『由『『陰莖『以外『滲出『須『通知『醫師、『『不『限水(維持尿流沖洗)』。隱睪症(cryptorchidism):『睪丸『『未『下降『至『陰囊』;『『胎兒『『約『7~8個月(28~32週)『睪丸『經『腹股溝『入『陰囊』,『『早產兒『發生率『高』;『『出生『後『『約『1歲『內『『可『自動『下降』,『未『下降『『以『『手術(orchiopexy)『或『荷爾蒙『治療(『約『6個月~1~2歲『前)』;『評估『『環境『溫暖『(冷『致『提睪肌『收縮)、『未下降側『陰囊『『小『無『皺摺』。男嬰生殖評估:『『足月『『睪丸『『已『下降、『陰囊『『皺摺『『多』;『『早產『『陰囊『『小『『少『皺摺『睪丸『未降』。 (1)『『限制『『活動(『非『鼓勵『常下床)』』,A錯;(2)『『尿液『『由『陰莖『以外『滲漏『『『異常『須『通知『醫師(『非『正常)』』,B錯;(3)『『『不可『『跨坐(壓傷口)』』,C錯;(4)「『『導尿管『『固定『『腹部/腿『『降低『拉扯『傷口」——正確。本題為D。","options":{"A":"錯。術後應限制活動(非常下床)。","B":"錯。尿液由陰莖以外滲漏是異常(須通知醫師)。","C":"錯。不可跨坐(壓傷口)。","D":"正確。導尿管固定腹部或腿上降低拉扯傷口。"},"sources":["Nelson《兒科學》尿道下裂術後","導尿管"]}},"113030-N4-19":{"quick":"評估男性新生兒皮膚飽和度(發紺/血氧)的最佳部位是「腹部」(本題D)。","detail":{"background":"評估『新生兒『『皮膚『『顏色/中央『發紺』:『『應『『觀察『『『軀幹(『『腹部/胸部)『與『『黏膜(舌/口腔)』』——『『『中央『『發紺(『軀幹/黏膜『發紺)『才『代表『『真正『低血氧』;『『『四肢『末端『發紺(『『肢端『發紺acrocyanosis)『『是『『新生兒『『常見『的『『正常『現象(末梢循環未成熟)』。本題評估皮膚飽和度最佳部位為「腹部(軀幹)」(D);陰囊、四肢末端、眼瞼非評估中央發紺最佳處。本題為D。","options":{"A":"陰囊非評估中央發紺最佳部位。","B":"四肢末端發紺是新生兒常見正常現象(肢端發紺)。","C":"眼瞼非評估皮膚飽和度最佳處。","D":"正確。腹部(軀幹)評估中央發紺/皮膚飽和度最佳。"},"sources":["Nelson《兒科學》新生兒發紺","軀幹"]}},"115030-N4-46":{"quick":"1歲尿道下裂尿道重建術後剛返病房護理措施「(維持導尿管通暢/固定/監測尿量/勿跨坐/多喝水)」(本題A)。","detail":{"background":"尿道下裂(hypospadias):『尿道『開口『在『『陰莖『『腹側(非龜頭中央)、常伴陰莖『下彎(chordee)』;『『出生『『勿『『行『割禮(包皮『留作『修補『材料)』;『手術『約『6~18個月『修補』。術後:『『『留置『導尿管『(支架)『『保持『通暢『勿『扭曲、『『固定『於『腹部/腿『防『牽扯傷口、『監測『尿量/顏色、『『『不可『『跨坐(壓傷口)、『限制『劇烈『活動『(可適度肢體活動)、『拱型『護架『避免『加壓、『『『尿液『由『『陰莖『以外『滲出『須『通知『醫師、『『不『限水(維持尿流沖洗)』。隱睪症(cryptorchidism):『睪丸『『未『下降『至『陰囊』;『『胎兒『『約『7~8個月(28~32週)『睪丸『經『腹股溝『入『陰囊』,『『早產兒『發生率『高』;『『出生『後『『約『1歲『內『『可『自動『下降』,『未『下降『『以『『手術(orchiopexy)『或『荷爾蒙『治療(『約『6個月~1~2歲『前)』;『評估『『環境『溫暖『(冷『致『提睪肌『收縮)、『未下降側『陰囊『『小『無『皺摺』。男嬰生殖評估:『『足月『『睪丸『『已『下降、『陰囊『『皺摺『『多』;『『早產『『陰囊『『小『『少『皺摺『睪丸『未降』。 尿道下裂術後『剛返病房』:『『維持『導尿管『『通暢『勿『扭曲、『固定『腹部/腿、『監測『尿量『顏色、『『勿『跨坐、『『多『喝水『維持『尿流、拱型護架避免加壓』。本題最適當為選項A(符合尿道下裂術後原則);其餘選項含錯誤(如限水、跨坐、鼓勵下床等)。本題為A。","options":{"A":"正確。符合尿道下裂術後護理(導尿管通暢/固定/監測/多喝水)。","B":"含錯誤(如限水)。","C":"含錯誤(如跨坐)。","D":"含錯誤(如鼓勵下床劇烈活動)。"},"sources":["Nelson《兒科學》尿道下裂術後","返室"]}},"101110-N4-38":{"quick":"14歲脊椎損傷尿瀦留間歇性清潔導尿照護指導『錯誤』的是「禁用抗乙醯膽鹼藥(Anticholinergic drug),避免尿瀦留」。","detail":{"background":"排尿性膀胱尿道攝影(VCUG/voiding cystourethrography):『經導尿管『注入『顯影劑『入膀胱→『『排尿『時『攝影』,『『主要『目的『『『評估『『膀胱『輸尿管『『逆流(VUR)『的『嚴重『等級(1~5級)』、看尿道/膀胱結構』;『檢查『後『『鼓勵『『多『喝水『排出『顯影劑』。靜脈腎盂攝影(IVP/IVU):『打『顯影劑『看『『上『泌尿道(腎盂/輸尿管)『結構』,『須『先『確認『『對『顯影劑『過敏』、『檢查後『多『喝水』。膀胱輸尿管逆流(VUR):『分『『5級』(級高愈嚴重)、『輕度『預防性『抗生素『可自癒』、『出院『每3個月『做1次『尿液『培養『至少『1年』、『不需『限水(『限水『無助)』。間歇性『清潔『導尿:『約每『3~4小時『一次『避免『UTI、『飲水『計畫『避免『暴飲』、『可用『Crede氏法『壓膀胱』、『『勿『用『抗膽鹼藥『致『尿瀦留(本題情境)』。 間歇性清潔導尿:設計飲水計畫避免暴飲、每3~4小時導尿一次避免UTI、可用Crede氏法壓膀胱皆正確。「『『禁用『『抗乙醯膽鹼藥『避免『尿瀦留』」錯誤——『『脊髓損傷『『『過動性『膀胱(『反射性『收縮)『時『『『『會『『使用『『抗膽鹼藥(『『『抑制『膀胱『過度『收縮『增『容量)』,『『非『『一律『禁用(敘述方向有誤)』」。本題「錯誤」者為C。","options":{"A":"正確。設計飲水計畫,避免短時間暴飲過多水分。","B":"正確。每3~4小時導尿一次避免UTI。","C":"錯誤(本題答案)。神經性膀胱可用抗膽鹼藥抑制過度收縮(非一律禁用)。","D":"正確。可用Crede氏法壓迫膀胱幫助排尿。"},"sources":["Nelson《兒科學》間歇導尿","抗膽鹼藥"]}},"105090-N4-76":{"quick":"4歲VCUG檢查前後護理措施正確的是「檢查後,需鼓勵多喝水,以利排出顯影劑」。","detail":{"background":"排尿性膀胱尿道攝影(VCUG/voiding cystourethrography):『經導尿管『注入『顯影劑『入膀胱→『『排尿『時『攝影』,『『主要『目的『『『評估『『膀胱『輸尿管『『逆流(VUR)『的『嚴重『等級(1~5級)』、看尿道/膀胱結構』;『檢查『後『『鼓勵『『多『喝水『排出『顯影劑』。靜脈腎盂攝影(IVP/IVU):『打『顯影劑『看『『上『泌尿道(腎盂/輸尿管)『結構』,『須『先『確認『『對『顯影劑『過敏』、『檢查後『多『喝水』。膀胱輸尿管逆流(VUR):『分『『5級』(級高愈嚴重)、『輕度『預防性『抗生素『可自癒』、『出院『每3個月『做1次『尿液『培養『至少『1年』、『不需『限水(『限水『無助)』。間歇性『清潔『導尿:『約每『3~4小時『一次『避免『UTI、『飲水『計畫『避免『暴飲』、『可用『Crede氏法『壓膀胱』、『『勿『用『抗膽鹼藥『致『尿瀦留(本題情境)』。 (1)『VCUG『『『不需『『禁食8小時(『非『腸胃『顯影,『經『導尿管『注入『膀胱)』』,A錯;(2)『『『不需『『清潔『灌腸(VCUG看膀胱『非『腸道)』』,B錯;(3)『VCUG『『不『測『『膀胱『壓力(那是『尿路『動力學)』』,C錯;(4)「『『檢查『後『『鼓勵『『多『喝水『『排出『顯影劑』」——正確。本題為D。","options":{"A":"錯。VCUG不需禁食8小時(非腸胃顯影)。","B":"錯。不需清潔灌腸(VCUG看膀胱非腸道)。","C":"錯。VCUG不測膀胱壓力(那是尿路動力學)。","D":"正確。檢查後鼓勵多喝水排出顯影劑。"},"sources":["Nelson《兒科學》VCUG","喝水"]}},"107030-N4-76":{"quick":"膀胱輸尿管逆流(VUR)敘述『錯誤』的是「膀胱輸尿管逆流易導致腎病症候群」。","detail":{"background":"排尿性膀胱尿道攝影(VCUG/voiding cystourethrography):『經導尿管『注入『顯影劑『入膀胱→『『排尿『時『攝影』,『『主要『目的『『『評估『『膀胱『輸尿管『『逆流(VUR)『的『嚴重『等級(1~5級)』、看尿道/膀胱結構』;『檢查『後『『鼓勵『『多『喝水『排出『顯影劑』。靜脈腎盂攝影(IVP/IVU):『打『顯影劑『看『『上『泌尿道(腎盂/輸尿管)『結構』,『須『先『確認『『對『顯影劑『過敏』、『檢查後『多『喝水』。膀胱輸尿管逆流(VUR):『分『『5級』(級高愈嚴重)、『輕度『預防性『抗生素『可自癒』、『出院『每3個月『做1次『尿液『培養『至少『1年』、『不需『限水(『限水『無助)』。間歇性『清潔『導尿:『約每『3~4小時『一次『避免『UTI、『飲水『計畫『避免『暴飲』、『可用『Crede氏法『壓膀胱』、『『勿『用『抗膽鹼藥『致『尿瀦留(本題情境)』。 VUR:VCUG評估逆流等級、分5級(級高愈嚴重)、輕微可用預防性抗生素皆正確。「『『VUR『『易『導致『『『腎病症候群』」錯誤——『『VUR『『使『尿液『『逆流『致『『『反覆『『腎盂腎炎『與『『『腎『瘢痕(腎臟『損傷)』,『『『非『『導致『『腎病症候群(腎病症候群『是『腎絲球『通透性『問題,『與『VUR『無『直接『因果)』」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。VUR易致反覆腎盂腎炎/腎瘢痕(非腎病症候群)。","B":"正確。VCUG可評估VUR等級。","C":"正確。VUR分5級,級高逆流愈嚴重。","D":"正確。輕微VUR可用預防性抗生素。"},"sources":["Nelson《兒科學》VUR","腎盂腎炎"]}},"108110-N4-50":{"quick":"排空性膀胱尿道攝影(VCUG)的主要目的是「評估輸尿管逆流情形」。","detail":{"background":"排尿性膀胱尿道攝影(VCUG/voiding cystourethrography):『經導尿管『注入『顯影劑『入膀胱→『『排尿『時『攝影』,『『主要『目的『『『評估『『膀胱『輸尿管『『逆流(VUR)『的『嚴重『等級(1~5級)』、看尿道/膀胱結構』;『檢查『後『『鼓勵『『多『喝水『排出『顯影劑』。靜脈腎盂攝影(IVP/IVU):『打『顯影劑『看『『上『泌尿道(腎盂/輸尿管)『結構』,『須『先『確認『『對『顯影劑『過敏』、『檢查後『多『喝水』。膀胱輸尿管逆流(VUR):『分『『5級』(級高愈嚴重)、『輕度『預防性『抗生素『可自癒』、『出院『每3個月『做1次『尿液『培養『至少『1年』、『不需『限水(『限水『無助)』。間歇性『清潔『導尿:『約每『3~4小時『一次『避免『UTI、『飲水『計畫『避免『暴飲』、『可用『Crede氏法『壓膀胱』、『『勿『用『抗膽鹼藥『致『尿瀦留(本題情境)』。 『VCUG『『主要『目的『是『『『評估『『『膀胱『輸尿管『『逆流(VUR)『的『有無『與『等級』。本題為「評估輸尿管逆流情形」(C);尿路動力學(膀胱壓力測定)、泌尿道生理結構(IVP)、尿路結石(KUB/CT)非VCUG主要目的。本題為C。","options":{"A":"尿路動力學是膀胱壓力測定。","B":"泌尿道結構用IVP。","C":"正確。VCUG主要評估膀胱輸尿管逆流情形。","D":"尿路結石用KUB/CT。"},"sources":["Nelson《兒科學》VCUG","逆流"]}},"111030-N4-74":{"quick":"4個月VCUG確認第三級膀胱輸尿管逆流正確的是「出院後每3個月做1次尿液培養至少1年」。","detail":{"background":"排尿性膀胱尿道攝影(VCUG/voiding cystourethrography):『經導尿管『注入『顯影劑『入膀胱→『『排尿『時『攝影』,『『主要『目的『『『評估『『膀胱『輸尿管『『逆流(VUR)『的『嚴重『等級(1~5級)』、看尿道/膀胱結構』;『檢查『後『『鼓勵『『多『喝水『排出『顯影劑』。靜脈腎盂攝影(IVP/IVU):『打『顯影劑『看『『上『泌尿道(腎盂/輸尿管)『結構』,『須『先『確認『『對『顯影劑『過敏』、『檢查後『多『喝水』。膀胱輸尿管逆流(VUR):『分『『5級』(級高愈嚴重)、『輕度『預防性『抗生素『可自癒』、『出院『每3個月『做1次『尿液『培養『至少『1年』、『不需『限水(『限水『無助)』。間歇性『清潔『導尿:『約每『3~4小時『一次『避免『UTI、『飲水『計畫『避免『暴飲』、『可用『Crede氏法『壓膀胱』、『『勿『用『抗膽鹼藥『致『尿瀦留(本題情境)』。 VUR第三級(中度):(1)『『第三級『『非『『輕微『(中度;『『不一定『『自行『痊癒)』』,A錯;(2)「『『出院後『『每『3個月『『做『1次『『尿液『培養『至少『1年』(『追蹤『感染)」——正確;(3)『『不需『『限水(『限水『無助)』』,C錯;(4)『『第三級『『多『『先『『預防性『抗生素『保守『治療(『非『立即『開刀;『高級『或『反覆『感染『才『手術)』』,D錯。本題為B。","options":{"A":"錯。第三級非輕微(中度),不一定自行痊癒。","B":"正確。出院後每3個月做尿液培養至少1年。","C":"錯。不需限水(限水無助)。","D":"錯。第三級多先預防性抗生素(非立即開刀)。"},"sources":["Nelson《兒科學》VUR","追蹤"]}},"111110-N4-73":{"quick":"3歲半反覆UTI做靜脈注射腎盂攝影(IVP)護理指導『不適當』的是「檢查期間,為防止感染宜給予預防性抗生素」。","detail":{"background":"排尿性膀胱尿道攝影(VCUG/voiding cystourethrography):『經導尿管『注入『顯影劑『入膀胱→『『排尿『時『攝影』,『『主要『目的『『『評估『『膀胱『輸尿管『『逆流(VUR)『的『嚴重『等級(1~5級)』、看尿道/膀胱結構』;『檢查『後『『鼓勵『『多『喝水『排出『顯影劑』。靜脈腎盂攝影(IVP/IVU):『打『顯影劑『看『『上『泌尿道(腎盂/輸尿管)『結構』,『須『先『確認『『對『顯影劑『過敏』、『檢查後『多『喝水』。膀胱輸尿管逆流(VUR):『分『『5級』(級高愈嚴重)、『輕度『預防性『抗生素『可自癒』、『出院『每3個月『做1次『尿液『培養『至少『1年』、『不需『限水(『限水『無助)』。間歇性『清潔『導尿:『約每『3~4小時『一次『避免『UTI、『飲水『計畫『避免『暴飲』、『可用『Crede氏法『壓膀胱』、『『勿『用『抗膽鹼藥『致『尿瀦留(本題情境)』。 IVP(靜脈腎盂攝影):觀察上泌尿道結構、檢查前確認顯影劑過敏、檢查後多喝水皆適當。「『『檢查『『期間『『『給『『預防性『抗生素』」不適當——『『IVP『『是『『影像『檢查(『非『侵入『性『手術)』,『『『不需『『常規『給『『預防性『抗生素』」。本題不適當者為B。","options":{"A":"適當。檢查目的為觀察上泌尿道結構。","B":"不適當(本題答案)。IVP是影像檢查,不需預防性抗生素。","C":"適當。檢查前確認有無對顯影劑過敏。","D":"適當。檢查後讓其攝取大量液體(排顯影劑)。"},"sources":["Nelson《兒科學》IVP","抗生素"]}},"113180-N4-46":{"quick":"排尿性膀胱尿道攝影(VCUG)最適當的敘述是「檢查目的為評估病童尿液逆流的嚴重程度」。","detail":{"background":"排尿性膀胱尿道攝影(VCUG/voiding cystourethrography):『經導尿管『注入『顯影劑『入膀胱→『『排尿『時『攝影』,『『主要『目的『『『評估『『膀胱『輸尿管『『逆流(VUR)『的『嚴重『等級(1~5級)』、看尿道/膀胱結構』;『檢查『後『『鼓勵『『多『喝水『排出『顯影劑』。靜脈腎盂攝影(IVP/IVU):『打『顯影劑『看『『上『泌尿道(腎盂/輸尿管)『結構』,『須『先『確認『『對『顯影劑『過敏』、『檢查後『多『喝水』。膀胱輸尿管逆流(VUR):『分『『5級』(級高愈嚴重)、『輕度『預防性『抗生素『可自癒』、『出院『每3個月『做1次『尿液『培養『至少『1年』、『不需『限水(『限水『無助)』。間歇性『清潔『導尿:『約每『3~4小時『一次『避免『UTI、『飲水『計畫『避免『暴飲』、『可用『Crede氏法『壓膀胱』、『『勿『用『抗膽鹼藥『致『尿瀦留(本題情境)』。 (1)「『VCUG『『目的『『評估『『尿液『『逆流(VUR)『的『『嚴重『程度(等級)」——正確;(2)『『不需『『小量『灌腸(VCUG看膀胱『非『腸道)』』,B錯;(3)『VCUG『『經『『導尿管『注入『顯影劑(『非『靠『多喝水)』』,C錯;(4)其他細節錯。本題為A。","options":{"A":"正確。VCUG目的為評估尿液逆流的嚴重程度。","B":"錯。不需小量灌腸(VCUG看膀胱非腸道)。","C":"錯。VCUG經導尿管注入顯影劑(非靠多喝水)。","D":"其他敘述不符。"},"sources":["Nelson《兒科學》VCUG","逆流"]}},"101110-N4-29":{"quick":"16歲第一型糖尿病護理指導『錯誤』的是「協助避免課業壓力所引發的低血糖症狀」。","detail":{"background":"第一型糖尿病(type 1 DM/IDDM):『『『自體免疫『『破壞『胰島『β『細胞『→『『胰島素『『絕對『缺乏』;『好 "A":"正確。體染色體隱性遺傳疾病。","B":"正確。體溫較低、皮膚乾燥易脫皮。","C":"錯誤(本題答案)。主要治療是終生補充甲狀腺素(非飲食治療)。","D":"正確。未治療會影響生長及智力發展。"},"sources":["Nelson《兒科學》先天甲低","甲狀腺素"]}},"103030-N4-72":{"quick":"甲狀腺機能亢進好發於「青春期女性」。","detail":{"background":"甲狀腺機能亢進(hyperthyroidism):『好發『青春期『女性』;表現『『心悸『躁動『不安、『腸蠕動快『腹瀉、『食慾增『體重減、『怕熱『多汗、『注意力『不集中『情緒不穩、突眼』。治療:『『抗甲狀腺藥(PTU/methimazole)『需『治療『1~3年』、『『定期『查『『血液『與『『肝功能』、『『症狀『改善『『不可『停藥(『須『依醫囑;『防『『甲狀腺『危象)』、肌肉無力『不宜『硬訓練』。先天性甲狀腺功能低下(congenital hypothyroidism):『『體染色體『隱性、『新生兒『篩檢』;表現『『黃疸『延長、『生長『緩慢『矮小、『便秘、『體溫『低『皮膚『乾粗『脫皮、『活動少『肌張力低、『前囟門『大『延遲『閉合、未治療『『心智『遲緩(克汀病)』;『『治療『『終生『『甲狀腺素(L-thyroxine)『(『非『飲食治療)』;『血檢『『T4『『『低、TSH『『『高』。甲狀腺素『過量(毒性)』:『心跳『快、腹瀉、呼吸困難、痙攣、躁動』(『非『心跳『減緩)。 『甲狀腺機能亢進(hyperthyroidism)』『『好發『『『青春期『『『女性』』(自體免疫『Graves氏病『女性多)』。本題為「青春期女性」(A);青春期男性、學齡前女童/男童非好發族群。本題為A。","options":{"A":"正確。甲狀腺機能亢進好發青春期女性。","B":"青春期男性非好發。","C":"學齡前女童非好發。","D":"學齡前男童非好發。"},"sources":["Nelson《兒科學》甲亢","青春期女性"]}},"104100-N4-69":{"quick":"副甲狀腺功能低下症初診斷血液檢驗正確的是「血中鈣離子濃度降低,血中磷離子濃度增高」。","detail":{"background":"副甲狀腺『功能『低下症(hypoparathyroidism)』:『『副甲狀腺素(PTH)『不足』→『『『血『『鈣『『『降低、『『『血『『磷『『『增高』』(PTH『正常『升鈣『降磷;『不足『則『反)』;低血鈣致『手足『抽搐『Chvostek/Trousseau徵象』。本題正確為「血鈣降低、血磷增高」(C)。","options":{"A":"錯。鈣降低(非增高)。","B":"錯。鈣降低、磷增高(非鈣高磷低)。","C":"正確。血鈣降低、血磷增高。","D":"錯。磷增高(非降低)。"},"sources":["Nelson《兒科學》副甲低下","鈣磷"]}},"105090-N4-69":{"quick":"17歲甲狀腺機能亢進臨床表徵『錯誤』的是「皮膚乾燥、頭髮易斷裂」。","detail":{"background":"甲狀腺機能亢進(hyperthyroidism):『好發『青春期『女性』;表現『『心悸『躁動『不安、『腸蠕動快『腹瀉、『食慾增『體重減、『怕熱『多汗、『注意力『不集中『情緒不穩、突眼』。治療:『『抗甲狀腺藥(PTU/methimazole)『需『治療『1~3年』、『『定期『查『『血液『與『『肝功能』、『『症狀『改善『『不可『停藥(『須『依醫囑;『防『『甲狀腺『危象)』、肌肉無力『不宜『硬訓練』。先天性甲狀腺功能低下(congenital hypothyroidism):『『體染色體『隱性、『新生兒『篩檢』;表現『『黃疸『延長、『生長『緩慢『矮小、『便秘、『體溫『低『皮膚『乾粗『脫皮、『活動少『肌張力低、『前囟門『大『延遲『閉合、未治療『『心智『遲緩(克汀病)』;『『治療『『終生『『甲狀腺素(L-thyroxine)『(『非『飲食治療)』;『血檢『『T4『『『低、TSH『『『高』。甲狀腺素『過量(毒性)』:『心跳『快、腹瀉、呼吸困難、痙攣、躁動』(『非『心跳『減緩)。 甲亢表徵:腸蠕動快易腹瀉、食慾增但體重減、注意力不集中情緒不穩、怕熱多汗。「『『皮膚『『『乾燥、『頭髮『易『斷裂』」錯誤——『『甲亢『『高代謝『『『『『皮膚『『『溫暖『『『潮濕(『多汗)、『頭髮『細軟』(『『『皮膚『乾燥『脫皮『是『甲狀腺『『『『低下』的『表徵)』」。本題「錯誤」者為C。","options":{"A":"正確。腸蠕動增快,易腹瀉。","B":"正確。食慾增加但體重減輕。","C":"錯誤(本題答案)。甲亢皮膚溫暖潮濕(乾燥脫皮是甲低)。","D":"正確。注意力不集中、情緒不穩。"},"sources":["Nelson《兒科學》甲亢","皮膚"]}},"106110-N4-70":{"quick":"新生兒篩檢代謝異常疾病中,未治療『較不會』影響智力發展的是「G-6-PD缺乏症」。","detail":{"background":"新生兒篩檢代謝異常與智力:『『苯酮尿症(PKU)、『半乳糖血症、『先天性甲狀腺功能低下』『未治療『『『『會『『影響『『智力(『腦『損傷/心智『遲緩)』』。「『『G-6-PD『缺乏症(蠶豆症)』」『較不會』影響智力——『『G-6-PD『缺乏『致『『『溶血『(『接觸『誘發物『時)』,『『『『不『『直接『『影響『『智力『發展』」。本題較不會影響智力者為B。","options":{"A":"苯酮尿症未治療影響智力。","B":"正確(較不會)。G-6-PD缺乏致溶血,不直接影響智力。","C":"半乳糖血症未治療影響智力。","D":"先天性甲狀腺功能低下未治療影響智力。"},"sources":["Nelson《兒科學》新生兒篩檢","智力"]}},"106111-N4-70":{"quick":"2個月先天性甲狀腺功能低下護理指導正確的是「提供高纖維食物,以預防便秘」。","detail":{"background":"甲狀腺機能亢進(hyperthyroidism):『好發『青春期『女性』;表現『『心悸『躁動『不安、『腸蠕動快『腹瀉、『食慾增『體重減、『怕熱『多汗、『注意力『不集中『情緒不穩、突眼』。治療:『『抗甲狀腺藥(PTU/methimazole)『需『治療『1~3年』、『『定期『查『『血液『與『『肝功能』、『『症狀『改善『『不可『停藥(『須『依醫囑;『防『『甲狀腺『危象)』、肌肉無力『不宜『硬訓練』。先天性甲狀腺功能低下(congenital hypothyroidism):『『體染色體『隱性、『新生兒『篩檢』;表現『『黃疸『延長、『生長『緩慢『矮小、『便秘、『體溫『低『皮膚『乾粗『脫皮、『活動少『肌張力低、『前囟門『大『延遲『閉合、未治療『『心智『遲緩(克汀病)』;『『治療『『終生『『甲狀腺素(L-thyroxine)『(『非『飲食治療)』;『血檢『『T4『『『低、TSH『『『高』。甲狀腺素『過量(毒性)』:『心跳『快、腹瀉、呼吸困難、痙攣、躁動』(『非『心跳『減緩)。 (1)『『治療『是『『甲狀腺素(『非『特殊『配方奶)』』,A錯;(2)『『避免『樟腦丸『是『『G-6-PD『缺乏』的『衛教(非甲低)』』,B錯;(3)「『『甲狀腺『低下『『腸蠕動『慢『『易『便秘』,『『提供『『『高纖『食物『預防『便秘」——正確;(4)『補『B12/葉酸『是『『貧血/某些『代謝病』,『非『甲低『重點』』,D錯。本題為C。","options":{"A":"錯。治療是甲狀腺素(非特殊配方奶)。","B":"錯。避免樟腦丸是G-6-PD缺乏衛教(非甲低)。","C":"正確。提供高纖食物預防便秘(甲低腸蠕動慢)。","D":"補B12/葉酸非甲低重點。"},"sources":["Nelson《兒科學》先天甲低","便秘"]}},"107030-N4-28":{"quick":"新生兒先天性代謝異常中『不是』體染色體隱性遺傳的是「先天性甲狀腺功能低下症」。","detail":{"background":"體染色體『隱性『遺傳『代謝病:『『苯酮尿症(PKU)、『楓糖漿尿症、『『先天性『腎上腺『增生症(CAH)、半乳糖血症、有機酸血症』皆是。「『『先天性『甲狀腺『功能『低下症』」『『多『為『『『散發性(『甲狀腺『發育『不良/異位,『『非『典型『體染色體『隱性『遺傳)』』。本題不是體染色體隱性遺傳者為C。","options":{"A":"苯酮尿症是體染色體隱性遺傳。","B":"楓糖漿尿症是體染色體隱性遺傳。","C":"本題答案(非隱性遺傳)。先天性甲狀腺功能低下多為散發性(甲狀腺發育異常)。","D":"先天性腎上腺增生症是體染色體隱性遺傳。"},"sources":["Nelson《兒科學》先天甲低","散發"]}},"107030-N4-52":{"quick":"先天性甲狀腺功能低下症敘述『錯誤』的是「好發於男性」。","detail":{"background":"甲狀腺機能亢進(hyperthyroidism):『好發『青春期『女性』;表現『『心悸『躁動『不安、『腸蠕動快『腹瀉、『食慾增『體重減、『怕熱『多汗、『注意力『不集中『情緒不穩、突眼』。治療:『『抗甲狀腺藥(PTU/methimazole)『需『治療『1~3年』、『『定期『查『『血液『與『『肝功能』、『『症狀『改善『『不可『停藥(『須『依醫囑;『防『『甲狀腺『危象)』、肌肉無力『不宜『硬訓練』。先天性甲狀腺功能低下(congenital hypothyroidism):『『體染色體『隱性、『新生兒『篩檢』;表現『『黃疸『延長、『生長『緩慢『矮小、『便秘、『體溫『低『皮膚『乾粗『脫皮、『活動少『肌張力低、『前囟門『大『延遲『閉合、未治療『『心智『遲緩(克汀病)』;『『治療『『終生『『甲狀腺素(L-thyroxine)『(『非『飲食治療)』;『血檢『『T4『『『低、TSH『『『高』。甲狀腺素『過量(毒性)』:『心跳『快、腹瀉、呼吸困難、痙攣、躁動』(『非『心跳『減緩)。 先天性甲狀腺功能低下:自體隱性遺傳/散發、早期症狀黃疸生長緩慢矮小餵食困難、未及時治療致心智遲緩皆正確。「『『好發『『『男性』」錯誤——『『先天性『甲狀腺『功能『低下『『『『女『>『男(『約『2:1,『女性『較多)』』。本題「錯誤」者為D。","options":{"A":"(自體隱性/散發,此項大致符)。","B":"正確。早期症狀新生兒黃疸、生長緩慢、矮小、餵食困難。","C":"正確。未及時提供甲狀腺素可能心智遲緩。","D":"錯誤(本題答案)。好發女性(女>男約2:1),非男性。"},"sources":["Nelson《兒科學》先天甲低","女性多"]}},"107110-N4-47":{"quick":"先天性甲狀腺功能低下長期服甲狀腺藥物,『不是』甲狀腺毒性反應的是「心跳減緩」。","detail":{"background":"甲狀腺機能亢進(hyperthyroidism):『好發『青春期『女性』;表現『『心悸『躁動『不安、『腸蠕動快『腹瀉、『食慾增『體重減、『怕熱『多汗、『注意力『不集中『情緒不穩、突眼』。治療:『『抗甲狀腺藥(PTU/methimazole)『需『治療『1~3年』、『『定期『查『『血液『與『『肝功能』、『『症狀『改善『『不可『停藥(『須『依醫囑;『防『『甲狀腺『危象)』、肌肉無力『不宜『硬訓練』。先天性甲狀腺功能低下(congenital hypothyroidism):『『體染色體『隱性、『新生兒『篩檢』;表現『『黃疸『延長、『生長『緩慢『矮小、『便秘、『體溫『低『皮膚『乾粗『脫皮、『活動少『肌張力低、『前囟門『大『延遲『閉合、未治療『『心智『遲緩(克汀病)』;『『治療『『終生『『甲狀腺素(L-thyroxine)『(『非『飲食治療)』;『血檢『『T4『『『低、TSH『『『高』。甲狀腺素『過量(毒性)』:『心跳『快、腹瀉、呼吸困難、痙攣、躁動』(『非『心跳『減緩)。 甲狀腺素『『過量(毒性反應)』:『『『心跳『『『加『快(『非『減緩)、『腹瀉、『呼吸『困難、『痙攣、躁動、發燒多汗』(即『藥物過量『致『甲亢『樣『症狀)』。「『『心跳『『『減『緩』」『不是』甲狀腺毒性反應——『心跳『減緩『是『『甲狀腺『『不足(藥量『不夠)』的『表現』。本題不是毒性反應者為A。","options":{"A":"本題答案(非毒性)。心跳減緩是甲狀腺不足(藥量不夠),非過量毒性。","B":"是毒性。腹瀉。","C":"是毒性。呼吸困難。","D":"是毒性。痙攣。"},"sources":["Nelson《兒科學》甲狀腺素","毒性"]}},"108020-N4-75":{"quick":"15歲慢性腎衰竭引發副甲狀腺功能亢進(血鈣12、骨脫鈣)護理措施『錯誤』的是「建議服用維生素C,以促進鈣質排出」。","detail":{"background":"續發性副甲狀腺『功能『亢進(腎衰竭致)』:『『PTH『升『→『『高血鈣、『骨『脫鈣(易『骨折)』。護理:『維持『水分『減『腎結石、『預防『骨折『穿硬背心、『心尖脈『測『1分鐘『注意『心律不整(高鈣)』皆正確。「『『服『『維生素『C『『促『『『鈣質『排出』」錯誤——『『維生素『C『『『『不『『促進『『鈣『『排出』(『高血鈣『處置『用『『水化/利尿/降鈣『藥『等,『非『維生素C)』」。本題「錯誤」者為D。","options":{"A":"正確。維持足夠水分,減少腎結石產生。","B":"正確。為預防骨折,下床活動可穿硬背心。","C":"正確。心尖脈測滿1分鐘,注意心律不整(高鈣)。","D":"錯誤(本題答案)。維生素C不促進鈣質排出。"},"sources":["Nelson《兒科學》副甲亢","高鈣"]}},"110030-N4-69":{"quick":"2歲先天性甲狀腺功能低下護理『不適當』的是「提供低纖維食物,以預防腹瀉」。","detail":{"background":"甲狀腺機能亢進(hyperthyroidism):『好發『青春期『女性』;表現『『心悸『躁動『不安、『腸蠕動快『腹瀉、『食慾增『體重減、『怕熱『多汗、『 、呼吸困難、痙攣、躁動』(『非『心跳『減緩)。 『先天性『甲狀腺『功能『低下』:『『甲狀腺『本身『分泌『不足→『『『T4『『『『低』;『『腦垂體『『代償『『分泌『『『『TSH『『『升『高(『回饋『機制)』。本題正確為「T4低、TSH高」(D)。","options":{"A":"錯。T4應低(非高)。","B":"錯。T4低、TSH高(非T4高TSH低)。","C":"錯。TSH應高(非低)。","D":"正確。T4低於正常值、TSH高於正常值。"},"sources":["Nelson《兒科學》先天甲低","T4低TSH高"]}},"113180-N4-44":{"quick":"甲狀腺功能亢進照護措施『最不適當』的是「觀察病童體溫過低的症狀和徵象」。","detail":{"background":"甲狀腺機能亢進(hyperthyroidism):『好發『青春期『女性』;表現『『心悸『躁動『不安、『腸蠕動快『腹瀉、『食慾增『體重減、『怕熱『多汗、『注意力『不集中『情緒不穩、突眼』。治療:『『抗甲狀腺藥(PTU/methimazole)『需『治療『1~3年』、『『定期『查『『血液『與『『肝功能』、『『症狀『改善『『不可『停藥(『須『依醫囑;『防『『甲狀腺『危象)』、肌肉無力『不宜『硬訓練』。先天性甲狀腺功能低下(congenital hypothyroidism):『『體染色體『隱性、『新生兒『篩檢』;表現『『黃疸『延長、『生長『緩慢『矮小、『便秘、『體溫『低『皮膚『乾粗『脫皮、『活動少『肌張力低、『前囟門『大『延遲『閉合、未治療『『心智『遲緩(克汀病)』;『『治療『『終生『『甲狀腺素(L-thyroxine)『(『非『飲食治療)』;『血檢『『T4『『『低、TSH『『『高』。甲狀腺素『過量(毒性)』:『心跳『快、腹瀉、呼吸困難、痙攣、躁動』(『非『心跳『減緩)。 甲亢照護:配合代謝率增加準備高熱量飲食、不可隨便停藥防甲狀腺危象、注意力不集中安排安靜環境學習皆適當。「『『觀察『『『體溫『『『過『『低』」最不適當——『『甲亢『『『高代謝『『『『『怕『熱、『『『『發熱(『體溫『『偏『高;尤『甲狀腺『危象『高燒)』,『『應『觀察『『體溫『『『過『『『高(『非『過低)』」。本題最不適當者為C。","options":{"A":"適當。配合代謝率增加,準備高熱量飲食。","B":"適當。不可隨便停藥,防甲狀腺危象。","C":"最不適當(本題答案)。甲亢怕熱發熱,應觀察體溫過『高』(非過低)。","D":"適當。注意力不集中,安排安靜環境學習。"},"sources":["Nelson《兒科學》甲亢","體溫"]}},"114100-N4-46":{"quick":"新生兒先天性甲狀腺功能低下症敘述『錯誤』的是「(需要選與甲低不符者)」(本題B)。","detail":{"background":"甲狀腺機能亢進(hyperthyroidism):『好發『青春期『女性』;表現『『心悸『躁動『不安、『腸蠕動快『腹瀉、『食慾增『體重減、『怕熱『多汗、『注意力『不集中『情緒不穩、突眼』。治療:『『抗甲狀腺藥(PTU/methimazole)『需『治療『1~3年』、『『定期『查『『血液『與『『肝功能』、『『症狀『改善『『不可『停藥(『須『依醫囑;『防『『甲狀腺『危象)』、肌肉無力『不宜『硬訓練』。先天性甲狀腺功能低下(congenital hypothyroidism):『『體染色體『隱性、『新生兒『篩檢』;表現『『黃疸『延長、『生長『緩慢『矮小、『便秘、『體溫『低『皮膚『乾粗『脫皮、『活動少『肌張力低、『前囟門『大『延遲『閉合、未治療『『心智『遲緩(克汀病)』;『『治療『『終生『『甲狀腺素(L-thyroxine)『(『非『飲食治療)』;『血檢『『T4『『『低、TSH『『『高』。甲狀腺素『過量(毒性)』:『心跳『快、腹瀉、呼吸困難、痙攣、躁動』(『非『心跳『減緩)。 本題問『錯誤』,答案B。先天性甲狀腺功能低下症『正確『概念』:新生兒篩檢、終生補甲狀腺素、未治療致心智遲緩、黃疸延長便秘體溫低皮膚乾。本題『錯誤』敘述B『與『甲低『事實『不符』(如『稱『以『飲食/碘『治療、或『稱『不影響『智力『等『與『甲低『不符『之『敘述)』。本題「錯誤」者為B。","options":{"A":"正確敘述(符合甲低)。","B":"錯誤(本題答案)。與甲低事實不符之敘述。","C":"正確敘述。","D":"正確敘述。"},"sources":["Nelson《兒科學》先天甲低","概念"]}},"114170-N4-43":{"quick":"2個月先天性甲狀腺功能低下護理指導『(最適當)』是「(終生服甲狀腺素/勿自行停藥/定期追蹤/高纖防便秘)」(本題D)。","detail":{"background":"甲狀腺機能亢進(hyperthyroidism):『好發『青春期『女性』;表現『『心悸『躁動『不安、『腸蠕動快『腹瀉、『食慾增『體重減、『怕熱『多汗、『注意力『不集中『情緒不穩、突眼』。治療:『『抗甲狀腺藥(PTU/methimazole)『需『治療『1~3年』、『『定期『查『『血液『與『『肝功能』、『『症狀『改善『『不可『停藥(『須『依醫囑;『防『『甲狀腺『危象)』、肌肉無力『不宜『硬訓練』。先天性甲狀腺功能低下(congenital hypothyroidism):『『體染色體『隱性、『新生兒『篩檢』;表現『『黃疸『延長、『生長『緩慢『矮小、『便秘、『體溫『低『皮膚『乾粗『脫皮、『活動少『肌張力低、『前囟門『大『延遲『閉合、未治療『『心智『遲緩(克汀病)』;『『治療『『終生『『甲狀腺素(L-thyroxine)『(『非『飲食治療)』;『血檢『『T4『『『低、TSH『『『高』。甲狀腺素『過量(毒性)』:『心跳『快、腹瀉、呼吸困難、痙攣、躁動』(『非『心跳『減緩)。 先天性甲狀腺功能低下護理最適當原則:『『『終生『補充『『甲狀腺素(L-thyroxine)『『勿『自行『停藥、『『定期『『追蹤『『甲狀腺『功能『與『生長『發展、『『高纖『防『便秘、『四肢『保暖』。本題最適當為選項D(符合甲低護理);其餘選項含錯誤(如飲食治療、可停藥、低纖等)。本題為D。","options":{"A":"含錯誤敘述。","B":"含錯誤敘述。","C":"含錯誤敘述。","D":"正確。符合甲低護理(終生甲狀腺素/勿停藥/追蹤/高纖)。"},"sources":["Nelson《兒科學》先天甲低","護理"]}},"102110-N4-70":{"quick":"兒童生長激素缺乏敘述『錯誤』的是「病童會智力不正常,且性發育的時間會延後」。","detail":{"background":"生長激素(GH)缺乏:『『身材『矮小『(生長『遲緩)、『『乳牙『生長『延後、『可『間接『測『『軟骨生成素(IGF-1)『了解GH量』;『『治療『『基因合成『GH『至『青春期『結束』。「『『智力『『不正常』」錯誤——『『生長激素『缺乏『『『『智力『『『『正常(『『與『甲狀腺『低下『不同;GH『不影響『智力)』;『性發育『可『能『延後(『某些『合併『情況)』,但『主要『錯在『「智力『不正常」』」。本題「錯誤」者為D。","options":{"A":"正確。可用基因合成GH治療至青春期結束。","B":"正確。GH缺乏病童乳牙生長延後。","C":"正確。可間接測軟骨生成素(IGF-1)了解GH量。","D":"錯誤(本題答案)。GH缺乏病童『智力正常』(非不正常)。"},"sources":["Nelson《兒科學》生長激素缺乏","智力正常"]}},"106110-N4-71":{"quick":"3天足月兒疑先天性腎上腺增生症(CAH)敘述『錯誤』的是「由檢查血中19-KS(19-ketosteroids)的含量做診斷」。","detail":{"background":"先天性腎上腺增生症(CAH,21-羥化酶缺乏、體染色體隱性):『『皮質醇/醛固酮『不足、『『雄性素『過多→『『女嬰『『外生殖器『男性化(性別『難分)、『『失鹽『型『低血鈉『高血鉀『脫水』;『『診斷『『查『『『17-『酮類固醇(17-KS)『與『17-OHP』(『非『『『19-KS)』;『治療『『皮質酮(『早上『補充)、『補『鹽。本題「錯誤」者為「查血中19-KS診斷」(A,應為17-KS)。","options":{"A":"錯誤(本題答案)。CAH診斷查『17-KS/17-OHP』(非19-KS)。","B":"正確。外生殖器男性化,不易分辨性別。","C":"正確。早上補充皮質酮維持正常分泌。","D":"正確。皮質酮治療期間易出現感染副作用。"},"sources":["Nelson《兒科學》CAH","17-KS"]}},"106111-N4-75":{"quick":"嬰幼兒隱睪症治療護理指導正確的是「手術部位腫脹時,宜給予冰敷,以減輕疼痛」。","detail":{"background":"隱睪症(cryptorchidism)治療:(1)『『出生後『約『1歲『內『未『下降『『須『『治療(『非『2歲內『都『不處理;『久『不降『增『不孕/惡性『風險)』』,A錯;(2)『『用『『『hCG/性腺『荷爾蒙(『非『生長『激素)』或『手術』』,B錯;(3)『『睪丸『固定『術後『『『限制『『劇烈『活動(『非『天天『換藥『鼓勵『活動)』』,C錯;(4)「『『手術『部位『『腫脹『『『冰敷『『減輕『疼痛」——正確。本題為D。","options":{"A":"錯。約1歲內未降須治療(非2歲內不處理)。","B":"錯。用hCG/性腺荷爾蒙或手術(非生長激素)。","C":"錯。術後限制劇烈活動(非鼓勵活動)。","D":"正確。手術部位腫脹時冰敷減輕疼痛。"},"sources":["Nelson《兒科學》隱睪症","冰敷"]}},"107110-N4-75":{"quick":"性早熟(precocious puberty)敘述『錯誤』的是「通常男孩子發生率較高,較女孩高出2~3倍」。","detail":{"background":"性早熟(precocious puberty):『『女孩『8歲『前、『男孩『9歲『前『出現『第二『性徵』;『『『女孩『『發生率『『『高『於『男孩(『女『多;『非『男高『女2~3倍)』;『血清『LH/FSH/雌激素/睪固酮『上升、『X光『查『骨齡(骨骺)、『腦部『掃描『查『中樞性』。「『『男孩『發生率『高『女孩『2~3倍』」錯誤——『『『女孩『『發生率『『『較高』」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。女孩發生率較高(非男孩高女2~3倍)。","B":"正確。血清LH、FSH、estrogen、testosterone皆上升。","C":"正確。X光查骨骺以確認骨齡。","D":"正確。腦部掃描確認是否中樞神經性早熟。"},"sources":["Nelson《兒科學》性早熟","女多"]}},"112030-N4-70":{"quick":"6歲(20kg)尿崩症診斷與護理『錯誤』的是「在接受禁水試驗過程中,體重減少至1公斤時,繼續試驗」。","detail":{"background":"尿崩症(diabetes insipidus,ADH不足):『『多尿『多渴、『『尿『『比重『『『低、『稀釋『尿』;『『診斷『『禁水『試驗(fluid deprivation test)』:『『過程『『監測『體重』,『『若『體重『『『減少『『『『≥3~5%『(『脫水)『『『『應『『停止『試驗(『非『繼續)』。「『『體重『減少『至『『1公斤(20kg『的『5%)『『『繼續『試驗』」錯誤——『『體重『減少『達『『3~5%『『『『應『『『停止(『防『嚴重『脫水)』」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。禁水試驗體重減少達3~5%應『停止』(非繼續)。","B":"正確。24小時尿液分析尿比重降低。","C":"正確。穩定後可鼻腔噴霧給血管加壓素(DDAVP),效果維持8~20小時。","D":"正確。避免過量血管加壓素致尿量減少、體液滯留、頭痛。"},"sources":["Nelson《兒科學》尿崩症","禁水試驗"]}},"113030-N4-44":{"quick":"性早熟(precocious puberty)敘述正確的是「中樞性性早熟可給leuprolide acetate,以抑制GnRH的分泌」。","detail":{"background":"性早熟:(1)『『女孩『『8歲『前、『男孩『『9歲『前『出現『第二『性徵(『非『男12女11)』』,A錯;(2)『『血清『LH/FSH/雌激素/睪固酮『『『『上升(『非『正常)』』,B錯;(3)「『『中樞性『『性早熟『『給『『『leuprolide(GnRH『『『類似劑)『『抑制『『『促性腺『激素(GnRH)『分泌『延緩『發育」——正確;(4)『『『腦部『『『MRI(『非『『腹部『斷層)『查『中樞性』』,D錯。本題為C。","options":{"A":"錯。女孩8歲前、男孩9歲前(非男12女11)。","B":"錯。血清LH/FSH/性荷爾蒙『上升』(非正常)。","C":"正確。中樞性性早熟給leuprolide抑制GnRH分泌。","D":"錯。以腦部MRI(非腹部斷層)查中樞性。"},"sources":["Nelson《兒科學》性早熟","leuprolide"]}},"115030-N4-24":{"quick":"17歲少女一直無月經(原發性無月經),可能原因是「(透納氏症/性腺發育不全/解剖異常等)」(本題A)。","detail":{"background":"青春期(17歲)『『原發性『無月經(從未『初經)』可能原因:『『『染色體/性腺『異常(『『透納氏『症候群Turner、『性腺『發育『不全)、『『生殖道『『解剖『異常(『無『陰道/子宮)、『下視丘-腦垂體『問題、『嚴重『體重『過低/運動』。本題可能原因為選項A(符合原發性無月經的常見病因);其餘選項非原發性無月經主因。本題為A。","options":{"A":"正確。透納氏症/性腺發育不全等是原發性無月經常見原因。","B":"非原發性無月經主因。","C":"非主因。","D":"非主因。"},"sources":["Nelson/婦科 原發性無月經","透納"]}},"101030-N4-72":{"quick":"膀胱輸尿管逆流(VUR)敘述正確的是「排尿性膀胱尿道攝影(VCUG)可偵測膀胱輸尿管逆流的等級」。","detail":{"background":"膀胱輸尿管逆流(VUR):(1)『『原發性『VUR『與『『膀胱『輸尿管『接合處『發育『異常『有關』(『先天『但『「先天性『遺傳」『敘述『不全)』,A不精確;(2)『『VUR『多『『隨『年齡『『『改善『自癒(『非『更趨『嚴重)』』,B錯;(3)「『『VCUG『『可『『偵測『VUR『的『『等級(1~5級)」——正確;(4)『『VUR『常見『表現『是『『『反覆『UTI/腎盂腎炎(『各『等級『皆『可;『非『僅『輕度)』』,D不精確。本題為C。","options":{"A":"VUR與接合處發育異常有關,「先天性遺傳」不全。","B":"錯。VUR多隨年齡改善自癒(非更嚴重)。","C":"正確。VCUG可偵測VUR的等級(1~5級)。","D":"反覆UTI/腎盂腎炎各等級皆可(敘述不精確)。"},"sources":["Nelson《兒科學》VUR","VCUG"]}},"102030-N4-5":{"quick":"導致亨汀頓氏舞蹈症的染色體是「第4對」。","detail":{"background":"遺傳模式:『體染色體『隱性『(兩親『帶因)『每胎『1/4『患病、1/2帶因、1/4正常』(PKU、半乳糖血症、有機酸血症、CAH、SMA脊髓性肌肉萎縮、地中海貧血)；『體染色體『顯性『(一親『患病)『每胎『1/2『遺傳』(亨汀頓舞蹈症『第4對『CAG重複)；『性聯(X)隱性『(母帶因)『男『1/2『患病、女『1/2『帶因』(G-6-PD、A型血友病、裘馨氏肌失養Duchenne)。新生兒篩檢代謝病:PKU(苯酮尿)、半乳糖血症、CAH、楓糖漿尿症、高胱胺酸尿症、甲狀腺低下、G-6-PD(性聯隱性)等。苯酮尿症(PKU):限苯丙胺酸(避魚肉蛋奶豆堅果麵粉)、餵特殊配方(Lofenalac)、終生飲食控制(非長大可多吃蛋白)。唐氏症:21號染色體多一條(三染色體)、約95%非遺傳(減數分裂不分離)、頸部透明帶增厚/母血四指標(AFP↓、uE3↓、hCG↑、inhibin-A↑)篩檢。G-6-PD缺乏(蠶豆症):避免蠶豆、樟腦丸(萘)、磺胺/aspirin/抗瘧藥等氧化性物質(止咳藥一般非誘發)。透納氏症(Turner,45,X):身材矮小、蹼頸、第二性徵發育不全、無月經、不孕、常伴主動脈狹窄;智力多正常。 『亨汀頓氏『舞蹈症(Huntington)』:『『『第『『4『對『染色體『上『『CAG『『三核苷酸『『重複『序列『過多『所致』(『體染色體『顯性)』。本題為「第4對」(D)。","options":{"A":"第13對與愛德華/巴陶氏症相關。","B":"第11對非亨汀頓。","C":"第8對非亨汀頓。","D":"正確。亨汀頓舞蹈症是第4對染色體CAG重複。"},"sources":["Nelson《兒科學》亨汀頓","第4對"]}},"102110-N4-61":{"quick":"透納氏症(Turner)女孩因主動脈狹窄住院,評估『不會』出現的是「活動耐受性降低、疲倦、容易發紺且有杵狀指」。","detail":{"background":"遺傳模式:『體染色體『隱性『(兩親『帶因)『每胎『1/4『患病、1/2帶因、1/4正常』(PKU、半乳糖血症、有機酸血症、CAH、SMA脊髓性肌肉萎縮、地中海貧血)；『體染色體『顯性『(一親『患病)『每胎『1/2『遺傳』(亨汀頓舞蹈症『第4對『CAG重複)；『性聯(X)隱性『(母帶因)『男『1/2『患病、女『1/2『帶因』(G-6-PD、A型血友病、裘馨氏肌失養Duchenne)。新生兒篩檢代謝病:PKU(苯酮尿)、半乳糖血症、CAH、楓糖漿尿症、高胱胺酸尿症、甲狀腺低下、G-6-PD(性聯隱性)等。苯酮尿症(PKU):限苯丙胺酸(避魚肉蛋奶豆堅果麵粉)、餵特殊配方(Lofenalac)、終生飲食控制(非長大可多吃蛋白)。唐氏症:21號染色體多一條(三染色體)、約95%非遺傳(減數分裂不分離)、頸部透明帶增厚/母血四指標(AFP↓、uE3↓、hCG↑、inhibin-A↑)篩檢。G-6-PD缺乏(蠶豆症):避免蠶豆、樟腦丸(萘)、磺胺/aspirin/抗瘧藥等氧化性物質(止咳藥一般非誘發)。透納氏症(Turner,45,X):身材矮小、蹼頸、第二性徵發育不全、無月經、不孕、常伴主動脈狹窄;智力多正常。 『主動脈狹窄(coarctation,『『非『發紺型)』:『『『上肢『血壓『>『下肢、『遠端『脈搏『弱(股動脈微弱)、『頭昏『頭痛『流鼻血、『下肢『冰冷』。「『『容易『『發紺『『且『『杵狀指』」『不會』出現——『『發紺/杵狀指『是『『『發紺型『心臟病(右→左分流)』的『表現;『『主動脈『狹窄『是『『『非『發紺型(『無『慢性『低血氧)』」。本題不會出現者為B。","options":{"A":"會。上肢血壓高於下肢約10~20 mmHg。","B":"本題答案(不會)。發紺/杵狀指是發紺型表現(主動脈狹窄非發紺型)。","C":"會。遠端脈搏弱、股動脈微弱。","D":"會。頭昏頭痛流鼻血、腳部溫度較低。"},"sources":["Nelson《兒科學》主動脈狹窄","非發紺"]}},"104100-N4-6":{"quick":"15歲男孩(成績欠佳、乳房增大),較合宜的回答是「可能有性染色體異常,建議到醫院做進一步的染色體分析」。","detail":{"background":"遺傳模式:『體染色體『隱性『(兩親『帶因)『每胎『1/4『患病、1/2帶因、1/4正常』(PKU、半乳糖血症、有機酸血症、CAH、SMA脊髓性肌肉萎縮、地中海貧血)；『體染色體『顯性『(一親『患病)『每胎『1/2『遺傳』(亨汀頓舞蹈症『第4對『CAG重複)；『性聯(X)隱性『(母帶因)『男『1/2『患病、女『1/2『帶因』(G-6-PD、A型血友病、裘馨氏肌失養Duchenne)。新生兒篩檢代謝病:PKU(苯酮尿)、半乳糖血症、CAH、楓糖漿尿症、高胱胺酸尿症、甲狀腺低下、G-6-PD(性聯隱性)等。苯酮尿症(PKU):限苯丙胺酸(避魚肉蛋奶豆堅果麵粉)、餵特殊配方(Lofenalac)、終生飲食控制(非長大可多吃蛋白)。唐氏症:21號染色體多一條(三染色體)、約95%非遺傳(減數分裂不分離)、頸部透明帶增厚/母血四指標(AFP↓、uE3↓、hCG↑、inhibin-A↑)篩檢。G-6-PD缺乏(蠶豆症):避免蠶豆、樟腦丸(萘)、磺胺/aspirin/抗瘧藥等氧化性物質(止咳藥一般非誘發)。透納氏症(Turner,45,X):身材矮小、蹼頸、第二性徵發育不全、無月經、不孕、常伴主動脈狹窄;智力多正常。 『『男性『青春期『『『乳房『增大『+『『學習『困難(成績欠佳)』』可能是『『『克林菲特『症候群(Klinefelter,47,XXY『性染色體『異常)』』,『『應『『『建議『『染色體『分析』。本題較合宜為「可能性染色體異常,建議染色體分析」(C);少吃炸雞(A無關)、戶外運動(B無關)、直接乳房切除(D未查病因)皆不適。本題為C。","options":{"A":"少吃炸雞與病因無關。","B":"戶外運動無法改善病理性乳房增大。","C":"正確。可能性染色體異常(Klinefelter),建議染色體分析。","D":"未查病因即建議切除不適當。"},"sources":["Nelson《兒科學》Klinefelter","染色體分析"]}},"104100-N4-72":{"quick":"先天性腎上腺增殖症(CAH)敘述『錯誤』的是「必須限制鹽分的攝取」。","detail":{"background":"先天性腎上腺增生症(CAH,21-羥化酶缺乏、體染色體隱性):『『皮質醇/『『『醛固酮『不足→『『『『失鹽『型『(『低血鈉『高血鉀『脫水)』、雄性素過多致女嬰男性化;『『治療『『皮質類固醇(cortisone)+『『『補『『『鹽(『鈉)』。「『『『限制『『鹽分』」錯誤——『『失鹽型『CAH『『『『需『『『『補『『鹽(『非『限鹽)』」。本題「錯誤」者為D。","options":{"A":"正確。是體染色體隱性遺傳疾病。","B":"正確。因缺乏21-羥化酶(21-hydroxylase)。","C":"正確。須給皮質類固醇(cortisone)治療。","D":"錯誤(本題答案)。失鹽型CAH需『補』鹽(非限鹽)。"},"sources":["Nelson《兒科學》CAH","補鹽"]}},"106030-N4-68":{"quick":"苯酮尿症(PKU)飲食指導『錯誤』的是「長大後可以多補充水果、蔬菜、根類或澱粉類食物」(本題A)——本題答A。","detail":{"background":"遺傳模式:『體染色體『隱性『(兩親『帶因)『每胎『1/4『患病、1/2帶因、1/4正常』(PKU、半乳糖血症、有機酸血症、CAH、SMA脊髓性肌肉萎縮、地中海貧血)；『體染色體『顯性『(一親『患病)『每胎『1/2『遺傳』(亨汀頓舞蹈症『第4對『CAG重複)；『性聯(X)隱性『(母帶因)『男『1/2『患病、女『1/2『帶因』(G-6-PD、A型血友病、裘馨氏肌失養Duchenne)。新生兒篩檢代謝病:PKU(苯酮尿)、半乳糖血症、CAH、楓糖漿尿症、高胱胺酸尿症、甲狀腺低下、G-6-PD(性聯隱性)等。苯酮尿症(PKU):限苯丙胺酸(避魚肉蛋奶豆堅果麵粉)、餵特殊配方(Lofenalac)、終生飲食控制(非長大可多吃蛋白)。唐氏症:21號染色體多一條(三染色體)、約95%非遺傳(減數分裂不分離)、頸部透明帶增厚/母血四指標(AFP↓、uE3↓、hCG↑、inhibin-A↑)篩檢。G-6-PD缺乏(蠶豆症):避免蠶豆、樟腦丸(萘)、磺胺/aspirin/抗瘧藥等氧化性物質(止咳藥一般非誘發)。透納氏症(Turner,45,X):身材矮小、蹼頸、第二性徵發育不全、無月經、不孕、常伴主動脈狹窄;智力多正常。 本題問『錯誤』,答案A。PKU飲食:餵特殊配方(Lofenalac/Phenyl-Free)、限制麵粉肉魚奶豆(高苯丙胺酸)皆正確。「『『確定『診斷後『『即『開始『『『終身『飲食『控制』」——『本身『正確』;但『『「長大後『『『可『『『多『補充『水果蔬菜根類『『『澱粉』」』與『『「確診後即終身控制」』之間,本題官方判A為錯誤(『『PKU『『須『『『『終身『嚴格『控制『苯丙胺酸,『非『長大『可『『放寬『多吃;且『某些『澱粉/蛋白『仍『含『苯丙胺酸『須『計算)』』。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。PKU須終身嚴格控制(非長大可放寬多吃澱粉蛋白)。","B":"正確。嬰幼兒餵特殊配方奶Lofenalac、Phenyl-Free。","C":"(水果蔬菜根類澱粉仍須計算苯丙胺酸)。","D":"正確。限制麵粉、肉、魚、奶、豆等高苯丙胺酸食物。"},"sources":["Nelson《兒科學》PKU","終身控制"]}},"108110-N4-74":{"quick":"先天性腎上腺增生症(CAH)敘述正確的是「注意每日體重、輸入、輸出量及鈉、鉀離子之平衡」。","detail":{"background":"CAH(21-羥化酶缺乏、體染色體隱性):(1)『『體染色體『『隱性(『非『顯性)』』,A錯;(2)『『24小時『尿『『17-KS『『『『『增高(『非『下降;『雄性素『代謝物『多)』』,B錯;(3)『『cortisone『『多『『『『早上『服(『模擬『生理『皮質醇『晨『高;『「夜間」『不精確)』』,C不精確;(4)「『『注意『『每日『體重、輸出入量、『『鈉/鉀『『平衡』(『『失鹽『型『監測『電解質)」——正確。本題為D。","options":{"A":"錯。CAH是體染色體『隱性』(非顯性)。","B":"錯。24小時尿17-KS『增高』(非下降)。","C":"cortisone多早上服(「夜間」不精確)。","D":"正確。注意體重、輸出入量及鈉鉀平衡(失鹽型)。"},"sources":["Nelson《兒科學》CAH","電解質"]}},"109030-N4-56":{"quick":"2歲典型異戊酸血症(Isovaleric Acidemia)敘述正確的是「大量的異戊酸堆積在體內,小銘的尿液會有明顯的臭腳汗味」。","detail":{"background":"異戊酸血症(isovaleric acidemia,有機酸代謝異常、『體染色體『隱性):『『大量『『異戊酸『堆積→『『特殊『『『「『汗『腳/臭腳汗』」『味』、『代謝性『酸中毒、酮酸、昏迷』。本題正確為「尿液有臭腳汗味」(B);體染色體顯性(A錯,是隱性)、矯正呼吸性鹼中毒(C錯,是代謝性『酸』中毒)、增加肉鹼攝取(D,肉鹼是『治療『輔助但『敘述「逐漸增加」不精確)。本題為B。","options":{"A":"錯。是體染色體『隱性』遺傳(非顯性)。","B":"正確。異戊酸堆積使尿液有明顯臭腳汗味。","C":"錯。急性發作矯正代謝性『酸』中毒(非呼吸性鹼中毒)。","D":"肉鹼是治療輔助,「逐漸增加攝取量」不精確。"},"sources":["Nelson《兒科學》異戊酸血症","臭腳汗"]}},"110030-N4-4":{"quick":"常見遺傳疾病敘述正確的是「唐氏症是21號染色體多一條,95%非遺傳所造成」。","detail":{"background":"遺傳模式:『體染色體『隱性『(兩親『帶因)『每胎『1/4『患病、1/2帶因、1/4正常』(PKU、半乳糖血症、有機酸血症、CAH、SMA脊髓性肌肉萎縮、地中海貧血)；『體染色體『顯性『(一親『患病)『每胎『1/2『遺傳』(亨汀頓舞蹈症『第4對『CAG重複)；『性聯(X)隱性『(母帶因)『男『1/2『患病、女『1/2『帶因』(G-6-PD、A型血友病、裘馨氏肌失養Duchenne)。新生兒篩檢代謝病:PKU(苯酮尿)、半乳糖血症、CAH、楓糖漿尿症、高胱 wer『徵象(『『由地『起立『需『『撐『大腿)、『『『小腿『『『『『假性『肥大(脂肪『纖維『取代)、『漸『失去『行走『能力』。本題正確為選項A(符合DMD病因臨床);其餘選項含錯誤(如體染色體顯性、女性發病等)。本題為A。","options":{"A":"正確。性聯隱性、進行性近端肌無力、Gower徵象、小腿假性肥大。","B":"含錯誤敘述。","C":"含錯誤敘述。","D":"含錯誤敘述。"},"sources":["Nelson《兒科學》DMD","性聯"]}},"101030-N4-13":{"quick":"39週足月男嬰身體成熟度評估最正確的是「體表皮膚乾燥、脫皮看不見血管,睪丸已下降」。","detail":{"background":"新生兒『成熟度(New Ballard)』:『『『足月(『39週)』:『『『皮膚『『『乾燥/可『脫皮、『『血管『『『不『明顯、『胎毛『『『稀疏、『『耳翼『『『軟骨『成形『可反彈、『『足底『『『皺褶『『『多、『『陰囊『『『皺摺『『多『『睪丸『『『下降』』;『『早產『則『皮膚『薄透『見血管、胎毛多、皺褶少、睪丸未降』。本題足月最正確為「皮膚乾燥脫皮看不見血管、睪丸已下降」(D)。","options":{"A":"皮膚粉紅光滑見血管、腳底無皺褶是早產特徵。","B":"耳翼扁平是早產特徵。","C":"「睪丸開始下降」是早產(足月已下降完成)。","D":"正確。足月皮膚乾燥脫皮、不見血管、睪丸已下降。"},"sources":["Nelson《兒科學》成熟度","足月"]}},"102030-N4-4":{"quick":"懷孕有酗酒問題,可能發生「新生兒有小頭症」。","detail":{"background":"孕期『酗酒(『『胎兒『酒精『症候群,FASD)』:『『『『小頭症、『『『顏面『異常(『眼裂『小、人中『平、上唇『薄)、『『生長『遲滯、『『智能『障礙/發展『遲緩、心臟缺損』。本題可能發生「小頭症」(D);胎兒染色體異常(A,酒精非致染色體異常)、缺維生素A(B非主)、葉酸代謝加速(C非主)。本題為D。","options":{"A":"酒精非致染色體異常。","B":"非最易缺維生素A。","C":"非葉酸代謝加速。","D":"正確。胎兒酒精症候群致新生兒小頭症。"},"sources":["新文京《產科護理學》FASD","小頭症"]}},"103030-N4-2":{"quick":"不符合優生保健法依其自願施行人工流產的是「本人或其配偶之『五等親』以內之血親患有礙優生之遺傳性疾病者」。","detail":{"background":"優生保健法『人工流產『適用』:『『本人或配偶『『『『『四親等(『非『五等親)『以內『血親『患『有礙『優生『遺傳病、『有醫學『理由『胎兒『畸形、『被強制性交/誘姦/不得結婚相姦『受孕、『懷孕生產『影響『心理健康『或『家庭生活』。「『『『『五『等親(應為『『四親等)』」不符。本題不符者為A。","options":{"A":"本題答案(不符)。應為『四親等』以內血親(非五等親)。","B":"符合。有醫學理由認定胎兒畸形之虞。","C":"符合。被強制性交、誘姦或相姦受孕。","D":"符合。懷孕生產影響心理健康或家庭生活。"},"sources":["優生保健法","四親等"]}},"103100-N4-38":{"quick":"『不是』根除性子宮切除術後常見問題的是「腎絲球腎炎」。","detail":{"background":"根除性子宮切除(廣泛性,含淋巴清除)術後常見問題:『『『便秘『腹瀉(腸蠕動受影響)、『『『尿瀦留(『膀胱『神經『受損)、『下肢『淋巴『水腫』。「『『『腎絲球『腎炎』」『不是』子宮切除術後問題——『腎絲球腎炎『是『『腎臟『免疫『發炎『疾病,『『與『『子宮『切除『無關』」。本題不是者為D。","options":{"A":"是。便秘(腸蠕動受影響)。","B":"是。腹瀉。","C":"是。尿瀦留(膀胱神經受損)。","D":"本題答案(非)。腎絲球腎炎與子宮切除無關。"},"sources":["Berek婦科 子宮切除","術後問題"]}},"103100-N4-59":{"quick":"27週早產兒各系統功能性特徵『錯誤』的是「免疫功能較差,無法從母乳得到IgG」。","detail":{"background":"早產兒(27週)特徵:呼吸中樞不成熟易呼吸暫停、消化酶不足對脂肪消化有限、腎小管再吸收差易蛋白尿尿糖皆正確。「『『無法『從『『『『母乳『『『得到『『IgG』」錯誤——『『『IgG『『『經『『『『胎盤』『獲得(『『非『母乳;『且『早產『因『『孕期『短『『經胎盤『得『IgG『『『『少)』;『『『母乳『『提供『『的『是『『『IgA』」。本題「錯誤」者為D。","options":{"A":"正確。呼吸中樞不成熟,易呼吸暫停。","B":"正確。消化酶分泌不足,對脂肪消化有限。","C":"正確。腎小管再吸收差,易蛋白尿或尿糖。","D":"錯誤(本題答案)。IgG經『胎盤』獲得(母乳提供IgA)。"},"sources":["Nelson《兒科學》早產兒","IgG"]}},"104030-N4-4":{"quick":"確認感冒服藥是否影響胎兒,應收集「①藥物名稱+②服藥時間+④藥物半衰期+⑥行房時間(即1246)」。","detail":{"background":"判斷『懷孕『早期『服藥『是否『致畸』,須收集:『①『『『藥物『名稱(『致畸『分級)、『②『『『服藥『『時間(『受精/著床/器官『形成『期)、『④『『『藥物『『半衰期(『體內『停留)、『⑥『『『行房『『時間(『推算『受孕『時點『與『用藥『的『時序)』。本題為「①②④⑥(1246)」(C);③胎兒羊水評估、⑤過去懷孕史、⑦家族族譜非判斷『此次『用藥『致畸『的『關鍵。本題為C。","options":{"A":"1356含③⑤(非用藥致畸關鍵)。","B":"2467含⑦家族族譜(非此重點)。","C":"正確。①藥名+②服藥時間+④半衰期+⑥行房時間(1246)。","D":"3457非用藥致畸關鍵。"},"sources":["新文京《產科護理學》致畸","用藥"]}},"104030-N4-8":{"quick":"可利用超音波檢查胎兒頸部透明帶增厚進行篩檢的是「唐氏症」。","detail":{"background":"遺傳模式:『體染色體『隱性『(兩親『帶因)『每胎『1/4『患病、1/2帶因、1/4正常』(PKU、半乳糖血症、有機酸血症、CAH、SMA脊髓性肌肉萎縮、地中海貧血)；『體染色體『顯性『(一親『患病)『每胎『1/2『遺傳』(亨汀頓舞蹈症『第4對『CAG重複)；『性聯(X)隱性『(母帶因)『男『1/2『患病、女『1/2『帶因』(G-6-PD、A型血友病、裘馨氏肌失養Duchenne)。新生兒篩檢代謝病:PKU(苯酮尿)、半乳糖血症、CAH、楓糖漿尿症、高胱胺酸尿症、甲狀腺低下、G-6-PD(性聯隱性)等。苯酮尿症(PKU):限苯丙胺酸(避魚肉蛋奶豆堅果麵粉)、餵特殊配方(Lofenalac)、終生飲食控制(非長大可多吃蛋白)。唐氏症:21號染色體多一條(三染色體)、約95%非遺傳(減數分裂不分離)、頸部透明帶增厚/母血四指標(AFP↓、uE3↓、hCG↑、inhibin-A↑)篩檢。G-6-PD缺乏(蠶豆症):避免蠶豆、樟腦丸(萘)、磺胺/aspirin/抗瘧藥等氧化性物質(止咳藥一般非誘發)。透納氏症(Turner,45,X):身材矮小、蹼頸、第二性徵發育不全、無月經、不孕、常伴主動脈狹窄;智力多正常。 『『胎兒『『『『頸部『『透明帶(nuchal translucency, NT)『『『增厚』是『『『『唐氏症(『21三染色體)』『『『產前『篩檢『指標(『第一孕期『超音波)』。本題為「唐氏症」(C);愛德華徵候群(18三染色體)、貓哭徵候群、透納氏雖也可有異常但NT增厚最常與唐氏症連結。本題為C。","options":{"A":"愛德華徵候群(18三染色體)非NT篩檢主指。","B":"貓哭徵候群(5p缺失)非NT篩檢。","C":"正確。頸部透明帶增厚是唐氏症篩檢指標。","D":"透納氏症雖可水腫,但NT增厚最常連結唐氏症。"},"sources":["新文京《產科護理學》NT","唐氏症"]}},"104030-N4-15":{"quick":"分娩使用全身麻醉的產婦,最優先注意的是「呼吸」。","detail":{"background":"『全身『麻醉』後『最優先『評估』:『『『『『呼吸道『『通暢『與『『『『呼吸(『ABC『中『『A『氣道、B『呼吸『優先)』』——『『全麻『『抑制『『呼吸『中樞、『『可能『『嘔吐『誤吸/喉痙攣』。本題最優先為「呼吸」(A);膚色、尿瀦留、尿失禁皆在『呼吸『穩定『之後。本題為A。","options":{"A":"正確。全身麻醉後最優先注意呼吸(氣道通暢)。","B":"膚色在呼吸穩定之後評估。","C":"尿瀦留非最優先。","D":"尿失禁非最優先。"},"sources":["Miller麻醉/產科","呼吸"]}},"104030-N4-19":{"quick":"產後泌尿道系統生理調適正確的是「漲滿的膀胱,可能造成泌尿道感染,亦可能影響子宮收縮」。","detail":{"background":"產後泌尿:(1)『『產後『『利尿『是『因『『『懷孕『囤積『體液『『排出(『非『黃體素『刺激)』』,A錯;(2)『『尿『乳糖/蛋白『『『非『『『立即『恢復(『漸『恢復)』』,B錯;(3)「『『『漲滿『膀胱『『『可『致『『UTI、『『且『『『壓迫『『影響『『子宮『『『收縮(『致『產後『出血)」——正確;(4)『『產後『『膀胱『脹滿『『『敏感度『『『『降低(『非『增加;『產道『壓迫/麻醉)』』,D錯。本題為C。","options":{"A":"錯。產後利尿是排出懷孕囤積體液(非黃體素刺激)。","B":"錯。尿乳糖/蛋白漸恢復(非立即)。","C":"正確。漲滿膀胱可致UTI,並影響子宮收縮。","D":"錯。產後膀胱脹滿敏感度降低(非增加)。"},"sources":["新文京《產科護理學》產後泌尿","膀胱"]}},"104100-N4-2":{"quick":"臺灣地區新生兒死亡之最主要原因是「源於周產期之病態」。","detail":{"background":"『『新生兒(<28天)『『死亡『『最主要『原因』:『『『『源於『『『周產期『『的『『病態(『早產『相關『併發症、『呼吸窘迫、週產期『窒息缺氧、感染等)』』。本題為「源於周產期之病態」(A);先天性畸形、家族遺傳心臟病、染色體異常雖為死因但非『最主要(周產期病態居首)』。本題為A。","options":{"A":"正確。新生兒死亡最主要原因是源於周產期之病態。","B":"先天性畸形居次。","C":"家族遺傳心臟病非最主要。","D":"先天性染色體異常非最主要。"},"sources":["國健署 新生兒死因","周產期"]}},"104100-N4-19":{"quick":"葡萄胎之描述『錯誤』的是「衛教婦女1年內儘快懷孕以平衡荷爾蒙」。","detail":{"background":"葡萄胎(妊娠滋養層疾病):滋養層絨毛增加致『血清『hCG『偏高、陰道出血常見、完全型呈囊泡狀含雙套染色體皆正確。「『『1年內『『『儘快『懷孕』」錯誤——『『葡萄胎『清除『後『『須『『『『追蹤『『hCG『『『約『『1年(『監測『有無『『惡性『絨毛膜『癌『變)』,『『『『『1年內『『『『避免『『懷孕(『懷孕『hCG『升『會『干擾『追蹤)』」。本題「錯誤」者為C。","options":{"A":"正確。滋養層絨毛增加,血清hCG偏高。","B":"正確。陰道出血是常見臨床症狀。","C":"錯誤(本題答案)。應避免1年內懷孕(須追蹤hCG防惡性變),非儘快懷孕。","D":"正確。完全型葡萄胎呈囊泡狀,含雙套染色體。"},"sources":["Berek婦科 葡萄胎","追蹤"]}},"105030-N4-6":{"quick":"卵子形成過程正確的是「受精的卵子會經過2次減數分裂」。","detail":{"background":"卵子形成:(1)『『初級『卵母細胞『於『『『胎兒『期『形成(『非『青春期)』』,A錯;(2)『初級『卵母細胞『含『『『雙套(2N)『染色體(『減數『前)』』,B錯;(3)「『『卵子『『經『『『2次『『減數『『分裂』(『『第二次『『須『『『受精『『才『『完成)」——正確;(4)『『一個『卵原『細胞『『成熟『成『『『1個『卵子』+『極體(『非『4個『卵子;『4個是『精子)』』,D錯。本題為C。","options":{"A":"錯。初級卵母細胞於胎兒期形成(非青春期)。","B":"錯。初級卵母細胞含雙套染色體(減數前)。","C":"正確。卵子經過2次減數分裂(第二次受精才完成)。","D":"錯。一個卵原細胞成熟成1個卵子(非4個)。"},"sources":["新文京《產科護理學》卵子","減數分裂"]}},"105030-N4-9":{"quick":"已育有脊髓性肌肉萎縮症患孩的孕婦敘述『錯誤』的是「此胎有50%機率為脊髓性肌肉萎縮症患孩」。","detail":{"background":"遺傳模式:『體染色體『隱性『(兩親『帶因)『每胎『1/4『患病、1/2帶因、1/4正常』(PKU、半乳糖血症、有機酸血症、CAH、SMA脊髓性肌肉萎縮、地中海貧血)；『體染色體『顯性『(一親『患病)『每胎『1/2『遺傳』(亨汀頓舞蹈症『第4對『CAG重複)；『性聯(X)隱性『(母帶因)『男『1/2『患病、女『1/2『帶因』(G-6-PD、A型血友病、裘馨氏肌失養Duchenne)。新生兒篩檢代謝病:PKU(苯酮尿)、半乳糖血症、CAH、楓糖漿尿症、高胱胺酸尿症、甲狀腺低下、G-6-PD(性聯隱性)等。苯酮尿症(PKU):限苯丙胺酸(避魚肉蛋奶豆堅果麵粉)、餵特殊配方(Lofenalac)、終生飲食控制(非長大可多吃蛋白)。唐氏症:21號染色體多一條(三染色體)、約95%非遺傳(減數分裂不分離)、頸部透明帶增厚/母血四指標(AFP↓、uE3↓、hCG↑、inhibin-A↑)篩檢。G-6-PD缺乏(蠶豆症):避免蠶豆、樟腦丸(萘)、磺胺/aspirin/抗瘧藥等氧化性物質(止咳藥一般非誘發)。透納氏症(Turner,45,X):身材矮小、蹼頸、第二性徵發育不全、無月經、不孕、常伴主動脈狹窄;智力多正常。 『脊髓性『肌肉『萎縮症(SMA)』是『『『體染色體『『『隱性』遺傳』(『兩親『帶因)』。『『每胎『『『『『1/4(25%)『『『患病、『1/2帶因、『1/4『正常』。「『『『此胎『『50%『機率『『患孩』」錯誤——『『體染色體『隱性『『每胎『『『患病『機率『是『『『1/4(25%,非50%)』」。本題「錯誤」者為B。","options":{"A":"正確。SMA是體染色體隱性遺傳。","B":"錯誤(本題答案)。每胎患病機率1/4(25%,非50%)。","C":"正確。每胎1/4機率為不帶基因的健康小孩。","D":"正確。應接受產前胎兒基因診斷。"},"sources":["Nelson《兒科學》SMA","隱性"]}},"105090-N4-28":{"quick":"New Ballard Score評估39週男嬰較『不符合』的是「皮膚透明、可見靜脈」。","detail":{"background":"New Ballard『成熟度』:『『『足月(39週)』:『『乳暈『突起3~4mm、『耳朵『軟骨『成形『可反彈、『陰囊『皺摺『多『睪丸『下降』皆符合。「『『皮膚『『『透明、『『可見『『靜脈』」『不符合』足月——『『『皮膚『透明『見血管『是『『『『早產『的『特徵(『足月『皮膚『『厚『不見『血管/可『脫皮)』」。本題不符合者為B。","options":{"A":"符合足月。乳暈突起3~4mm。","B":"本題答案(不符合)。皮膚透明見靜脈是早產特徵(足月皮膚厚)。","C":"符合足月。耳朵軟成形、可反彈。","D":"符合足月。陰囊皺摺多、睪丸下降。"},"sources":["Nelson《兒科學》Ballard","足月"]}},"106111-N4-10":{"quick":"21週孕婦帶亨丁頓舞蹈症患病基因敘述『錯誤』的是「依優生保健法,楊女士不符合施行人工流產之條件」。","detail":{"background":"遺傳模式:『體染色體『隱性『(兩親『帶因)『每胎『1/4『患病、1/2帶因、1/4正常』(PKU、半乳糖血症、有機酸血症、CAH、SMA脊髓性肌肉萎縮、地中海貧血)；『體染色體『顯性『(一親『患病)『每胎『1/2『遺傳』(亨汀頓舞蹈症『第4對『CAG重複)；『性聯(X)隱性『(母帶因)『男『1/2『患病、女『1/2『帶因』(G-6-PD、A型血友病、裘馨氏肌失養Duchenne)。新生兒篩檢代謝病:PKU(苯酮尿)、半乳糖血症、CAH、楓糖漿尿症、高胱胺酸尿症、甲狀腺低下、G-6-PD(性聯隱性)等。苯酮尿症(PKU):限苯丙胺酸(避魚肉蛋奶豆堅果麵粉)、餵特殊配方(Lofenalac)、終生飲食控制(非長大可多吃蛋白)。唐氏症:21號染色體多一條(三染色體)、約95%非遺傳(減數分裂不分離)、頸部透明帶增厚/母血四指標(AFP↓、uE3↓、hCG↑、inhibin-A↑)篩檢。G-6-PD缺乏(蠶豆症):避免蠶豆、樟腦丸(萘)、磺胺/aspirin/抗瘧藥等氧化性物質(止咳藥一般非誘發)。透納氏症(Turner,45,X):身材矮小、蹼頸、第二性徵發育不全、無月經、不孕、常伴主動脈狹窄;智力多正常。 亨丁頓舞蹈症:體染色體『顯性、第4對CAG重複、胎兒不論男女有1/2遺傳機率皆正確。「『『不『符合『『人工流產『條件』」錯誤——『『亨丁頓『是『『『有礙『優生『的『『遺傳『疾病,『『且『胎兒『有『1/2『遺傳『風險』,『『『依『優生保健法『『『『『符合』『人工流產『條件(『胎兒『有『畸形/遺傳病『之虞)』」。本題「錯誤」者為D。","options":{"A":"正確。亨丁頓屬體染色體顯性遺傳。","B":"正確。第4對染色體CAG三核苷酸重複序列所致。","C":"正確。胎兒不論男女有1/2機會遺傳此基因。","D":"錯誤(本題答案)。依優生保健法『符合』人工流產條件(有礙優生遺傳病)。"},"sources":["優生保健法","亨汀頓"]}},"107110-N4-11":{"quick":"妊娠期婦女甲狀腺分泌功能變化正確的是「甲狀腺結合血清蛋白平均值在第二妊娠期達到最高」。","detail":{"background":"妊娠『甲狀腺』:『『雌激素『升『→『『『甲狀腺『結合『球蛋白(TBG)『『『增加』、『『『總『T4/T3『『『升高(『但『游離『多『正常)、『『基礎『代謝率『增加、『甲狀腺『輕度『腫大』。本題正確為「甲狀腺結合血清蛋白第二孕期達最高」(C);T4分泌受抑制(A錯,T4升)、甲亢易自發性流產(B,『甲狀腺『亢進『未控『流產『風險『但『敘述『非『此題『重點)、T3下降(D錯,T3亦升)。本題依官方為C。","options":{"A":"錯。妊娠T4分泌『增加』(非受抑制)。","B":"甲亢未控有流產風險,但非此題正確選項。","C":"正確。甲狀腺結合血清蛋白(TBG)第二孕期達最高。","D":"錯。妊娠T3亦『升高』(非下降)。"},"sources":["新文京《產科護理學》妊娠甲狀腺","TBG"]}},"109030-N4-27":{"quick":"糖尿病孕婦產下巨嬰出生後低血糖,主因是「母親供應的葡萄糖出生後中斷,新生兒體內存在過多的胰島素快速消耗葡萄糖」。","detail":{"background":"糖尿病孕婦『巨嬰『出生後『低血糖』機轉:『『『母親『『高血糖『→『『胎兒『『『代償『分泌『『『大量『『胰島素(高胰島素血症)』;『『『出生後『『『『母親『『葡萄糖『『『供應『『『中斷』,『但『『『新生兒『『仍『『有『『『過多『『胰島素『『『快速『消耗『葡萄糖『→『『『低血糖』。本題主因為「母糖中斷+過多胰島素消耗葡萄糖」(C)。","options":{"A":"錯。是胰島素過多(非無法釋放胰島素)。","B":"方向錯(胰島素是出生前已高)。","C":"正確。母糖供應中斷,新生兒過多胰島素快速消耗葡萄糖致低血糖。","D":"非主因(機轉是高胰島素)。"},"sources":["Nelson《兒科學》巨嬰","低血糖"]}},"109030-N4-29":{"quick":"剛出生女嬰出現假性月經與母親「雌性素」中斷有關。","detail":{"background":"新生兒『『『「假性『月經」』:『『『女嬰『『在『『子宮內『『受『『母親『『『『雌性素(estrogen)『『影響『子宮『內膜『增生』;『『『出生後『『『母親『『雌性素『『『『中斷『『→『『內膜『『剝落『『出現『『『陰道『『少量『『出血(假性月經)』。本題與「雌性素」中斷有關(B);黃體素、胰島素、醛固酮非此機轉。本題為B。","options":{"A":"黃體素非假性月經主因。","B":"正確。母親雌性素中斷致內膜剝落(假性月經)。","C":"胰島素無關。","D":"醛固酮無關。"},"sources":["新文京《產科護理學》假性月經","雌激素"]}},"110030-N4-10":{"quick":"受精的敘述『錯誤』的是「雙胞胎是指同時有二隻精子進入卵子的細胞核完成受精」。","detail":{"background":"受精:精子須穿過放射冠及透明帶、最常發生於輸卵管壺腹部、是單套精子與單套卵子結合皆正確。「『『雙胞胎『『『二隻『精子『進入『『同一『卵子』」錯誤——『『『同卵『雙胞胎『是『『『一『精子+一『卵『受精後『『分裂『成『二』;『異卵『雙胞胎『是『『『二『卵『分別『受『二『精』;『『二『精子『進入『同一『卵『是『『『多『精『受精(『異常,『不能『存活)』」。本題「錯誤」者為B。","options":{"A":"正確。精子須穿過卵子放射冠及透明帶。","B":"錯誤(本題答案)。雙胞胎非二精子進入同一卵(多精受精異常)。","C":"正確。受精最常發生於輸卵管壺腹部。","D":"正確。單套染色體精子與單套卵子結合。"},"sources":["新文京《產科護理學》受精","雙胞胎"]}},"110030-N4-25":{"quick":"產後尿瀦留評估正確的是「叩診恥骨聯合上方處有鼓音」(本題D應為觸診子宮底偏右;尿瀦留正確敘述本題答D)。","detail":{"background":"產後『尿瀦留』:『『『脹滿『膀胱『『『將『『子宮『『『推『『『『偏『『高『『且『『『偏『『右』、『『叩診『『恥骨『上方『『『『『『濁』音(『膀胱『充尿;非『鼓音)』。本題依官方答D:「『『觸診『腹部『『子宮底『『『偏向『『『右側』」(『脹膀胱『推子宮『偏右,『尿瀦留『典型『徵象)。本題為D。","options":{"A":"尿瀦留聽診下腹非囉音(囉音是肺部)。","B":"叩診恥骨上方應為『濁』音(非鼓音)。","C":"尿瀦留不限產後3小時。","D":"正確。觸診子宮底偏向右側(脹膀胱推擠)。"},"sources":["新文京《產科護理學》尿瀦留","子宮偏右"]}},"110110-N4-3":{"quick":"第二孕期母血唐氏症四指標(quadruple test)『不』包括「胎盤生長激素(PlGF)」。","detail":{"background":"母血『唐氏症『四指標(quadruple test,第二孕期)』:『『①『『胎兒『甲型『蛋白(AFP)、②『『非結合『雌三醇(uE3)、③『『β-hCG、④『『抑制素A(inhibin-A)』。「『『胎盤『『生長『激素(PlGF)』」『不是』四指標——『PlGF『用於『『子癇前症『風險『評估(非『唐氏症『四指標)』。本題不包括者為D。","options":{"A":"是。胎兒甲型蛋白(AFP)。","B":"是。非結合性雌三醇(uE3)。","C":"是。β-hCG。","D":"本題答案(非四指標)。PlGF用於子癇前症評估,第四項應為inhibin-A。"},"sources":["新文京《產科護理學》四指標","inhibin-A"]}},"112030-N4-26":{"quick":"產後泌尿系統正常現象是「尿液中hCG於產後1週消失」。","detail":{"background":"產後泌尿正常變化:『『『尿中『『hCG『『『約『『產後『『1~2週『『『消失』、『『產後『『『短暫『『蛋白尿『『約『1~2天『消失、『產後『『利尿『約『『數天(非6週)』。本題正常為「hCG於產後1週消失」(A);蛋白尿持續3週(B異常)、血尿持續3週(C異常)、利尿持續6週(D過久)皆非正常。本題為A。","options":{"A":"正確。尿中hCG於產後1~2週消失。","B":"錯。蛋白尿持續3週是異常(應1~2天)。","C":"錯。血尿持續3週是異常。","D":"錯。產後利尿約數天(非6週)。"},"sources":["新文京《產科護理學》產後泌尿","hCG"]}},"112110-N4-56":{"quick":"評估早產兒生長發展最適當的是「早產男嬰睪丸可能尚未下降且陰囊小及無皺褶」。","detail":{"background":"早產兒生長發展評估:(1)『『早期『『『『密集(『如『每月/更頻;『非『每3個月)』』,A不精確;(2)「『『早產『男嬰『『睪丸『『『尚未『下降、『陰囊『『『小『『且『『『無『皺褶』(『未成熟『特徵)」——正確;(3)『『矯正『年齡『『『=『『實際『年齡『『『『減去『『早產『『週數(『非『預產期『加4週)』』,C錯;(4)『『New Ballard『是『『『出生『時『評『『成熟度(『非『定期『評『生長『發展)』』,D錯。本題為B。","options":{"A":"早期評估應更密集(非每3個月)。","B":"正確。早產男嬰睪丸未下降、陰囊小無皺褶。","C":"錯。矯正年齡=實際年齡減早產週數(非預產期加4週)。","D":"錯。New Ballard評出生成熟度(非定期評生長發展)。"},"sources":["Nelson《兒科學》早產兒","矯正年齡"]}},"113100-N4-1":{"quick":"以家庭為中心的產科護理模式『錯誤』的是「增加產前基因篩檢次數,減少家族遺傳疾病之發生」。","detail":{"background":"家庭為中心『產科『護理』:『待產『伴侶『全程『陪伴、『親子『同室『減『母嬰『分離、『待產『生產『恢復『同一『環境(LDR)』皆正確。「『『增加『『產前『『基因『『篩檢『『次數』」錯誤——『『家庭『中心『護理『核心『是『『『家庭『『參與/陪伴/連續『照護』,『『『非『『以『『『增加『篩檢『次數『『『減少『遺傳病『為『『模式『重點(『篩檢『是『另一『面向,『非『家庭中心『定義)』」。本題「錯誤」者為D。","options":{"A":"正確。待產過程鼓勵伴侶全程陪伴。","B":"正確。鼓勵親子同室減少母嬰分離。","C":"正確。待產、生產與產後恢復皆在同一環境(LDR)。","D":"錯誤(本題答案)。家庭中心非以增加基因篩檢次數為模式重點。"},"sources":["新文京《產科護理學》家庭中心","模式"]}},"113180-N4-1":{"quick":"優生保健法人工流產規定正確的是「若符合法令規定且無身體異常,可使用Mifepristone-RU486施行人工流產」。","detail":{"background":"優生保健法『人工流產』:(1)『『『『有配偶『婦女『因『心理健康/家庭『自願『流產『『『『須『『『『告知『配偶(『非『不須)』』,A錯;(2)「『『符合『法令『規定『『可『『使用『『RU486(藥物)『『施行(『須『醫療『監督)」——正確;(3)『『『未成年(『未滿『18歲未婚)『須『『『法定『代理人『『同意(『非『不須)』』,C錯;(4)『『四親等『血親『遺傳病『自願『流產『須『『告知『配偶(B選項『相關;『D『敘述『細節)』。本題正確為B。","options":{"A":"錯。有配偶婦女自願流產須告知配偶。","B":"正確。符合規定可使用RU486施行人工流產。","C":"錯。未成年須法定代理人同意。","D":"敘述細節不符。"},"sources":["優生保健法","RU486"]}},"113180-N4-2":{"quick":"32週孕婦頻尿無灼熱、平躺易頭暈心悸,最恰當回應是「頻尿是目前常見的症狀,不要憋尿;睡覺頭暈、心悸可能跟姿勢有關,試試側睡」。","detail":{"background":"懷孕『晚期(32週)』:『『『頻尿(『子宮『壓迫『膀胱;『『無『灼熱『非『感染)』、『『『平躺『頭暈『心悸『是『『『『仰臥『『低血壓『症候群(子宮『壓迫『下腔『靜脈『減『回心血)』』。最恰當回應:『『頻尿『正常『不憋尿、『『頭暈『心悸『與『姿勢『有關『『試『『『側睡(左側臥)』。本題為B;說小心一點(A敷衍)、頻尿是UTI/頭暈是貧血(C、D誤判,無灼熱非UTI、姿勢性非貧血)。本題為B。","options":{"A":"敷衍(未給具體指導)。","B":"正確。頻尿常見不憋尿;頭暈心悸與姿勢有關,試側睡(仰臥低血壓)。","C":"誤判。無灼熱非UTI、頭暈是姿勢性非貧血。","D":"誤判為UTI與貧血。"},"sources":["新文京《產科護理學》仰臥低血壓","側睡"]}},"114170-N4-13":{"quick":"產後泌尿系統評估正確的是「(產後利尿、膀胱敏感度降低、注意尿瀦留)」(本題B)。","detail":{"background":"產後泌尿系統評估正確原則:『『產後『『『利尿(排出『懷孕『囤積『體液)、『『膀胱『『敏感度『『降低(『產道『壓迫/麻醉『致『脹尿『不自覺)、『『注意『『『尿瀦留(『脹膀胱『影響『子宮『收縮)、『『鼓勵『『早期『『自解『小便』。本題正確為選項B(符合產後泌尿生理);其餘選項含錯誤(如敏感度增加、立即恢復等)。本題為B。","options":{"A":"含錯誤敘述。","B":"正確。符合產後泌尿(利尿/敏感度降低/注意尿瀦留)。","C":"含錯誤敘述。","D":"含錯誤敘述。"},"sources":["新文京《產科護理學》產後泌尿","評估"]}}},TO=["1泌尿道感染與膀胱輸尿管逆流", "2急性腎絲球腎炎與腎衰竭", "3腎病症候群", "4尿道下裂隱睪症與男性生殖", "5排尿障礙導尿VCUG尿液標本", "6第一型糖尿病", "7甲狀腺疾病", "8其他內分泌", "9遺傳代謝與新生兒篩檢", "10母嬰產科與其他借題"],LEC={"1泌尿道感染與膀胱輸尿管逆流":{"html":"<p><b>UTI</b>:最常見致病菌<b>大腸桿菌(E. coli)</b>;嬰兒發燒餵食差。護理:<b>多喝水不憋尿、會陰由前往後擦、棉質內褲、避免泡澡、性行為前後排空膀胱、蔓越莓/維生素C酸化尿液(非汽水)</b>、<b>抗生素服完療程並回診複檢</b>。</p><p><b>VUR(膀胱輸尿管逆流)</b>:<b>VCUG分5級</b>(級高愈嚴重)、輕度用預防性抗生素可自癒、未治療致反覆腎盂腎炎/腎瘢痕、出院每3個月尿培養至少1年。</p>"},"2急性腎絲球腎炎與腎衰竭":{"html":"<p><b>AGN</b>:<b>A群β型鏈球菌感染後1~3週</b>、<b>血尿(茶色)、水腫、高血壓、少尿</b>、C3↓ASLO↑。護理:<b>急性期臥床、監測血壓體重尿量、低鈉限水、少尿時限鉀(避香蕉橘子)限蛋白</b>;<u>禁鹹蘇打餅/洋芋片(高鈉)</u>。</p><p><b>腎衰竭</b>:少尿(<0.5~1mL/kg/hr)、<b>BUN/Cr升高</b>、高血鉀心悸。腹膜透析:高熱量、<b>透析會流失蛋白須增蛋白</b>、補鐵葉酸維生素D、腹膜炎為常見併發症。</p>"},"3腎病症候群":{"html":"<p><b>腎病症候群</b>四特徵:<b>大量蛋白尿、低白蛋白血症、水腫、高血脂</b>(血壓多正常、血尿非典型)。治療<b>類固醇(prednisolone)</b>;副作用月亮臉水牛肩食慾增<b>易感染生長抑制</b>;<u>不可因月亮臉自行停藥(須漸減)</u>、治療期禁活性減毒疫苗、避免接觸感染源。水腫皮膚定時翻身。</p>"},"4尿道下裂隱睪症與男性生殖":{"html":"<p><b>尿道下裂</b>:尿道開口在<b>陰莖腹側</b>、出生勿割禮(留包皮修補)。術後:<b>導尿管固定腹部/腿、多喝水維持尿流、不可跨坐、限制劇烈活動</b>、尿由陰莖外滲出須通知醫師。</p><p><b>隱睪症</b>:睪丸未降陰囊、<b>胎兒7~8個月下降</b>、早產發生率高、1歲內可自降、未降以手術(orchiopexy)或荷爾蒙;評估環境溫暖(冷致提睪肌收縮)。足月男嬰睪丸已降、陰囊皺摺多(早產則陰囊小無皺褶)。光線透光辨陰囊水腫vs疝氣。</p>"},"5排尿障礙導尿VCUG尿液標本":{"html":"<p><b>VCUG(排尿性膀胱尿道攝影)</b>:經導尿管注顯影劑、<b>主要評估VUR逆流等級</b>、檢查後多喝水排顯影劑。<b>IVP</b>看上泌尿道結構、先確認顯影劑過敏。間歇性清潔導尿:每3~4小時一次、Crede氏法壓膀胱、飲水計畫避免暴飲。集尿袋(常規尿)不需無菌/消毒、男童陰莖陰囊放入袋。</p>"},"6第一型糖尿病":{"html":"<p><b>第一型糖尿病</b>:<b>自體免疫破壞β細胞、胰島素絕對缺乏</b>、好發兒童青少年(非肥胖)、<b>三多一少</b>、可酮酸中毒;<b>胰島素注射(口服降糖藥無效)</b>+血糖監測+飲食+運動缺一不可。</p><p><b>胰島素</b>:<b>皮下注射、先抽短效(清)再中效(濁)、部位輪換、不按摩</b>、吸收<b>腹>臂>腿>臀</b>、注射後60~90分鐘再運動。運動帶糖果防低血糖、<u>睡前運動增夜間低血糖</u>。<b>DKA</b>:高血糖+酮體+Kussmaul深快呼吸。學校可正常運動聚餐、體育課前先吃點心。第二型因生活型態增加。</p>"},"7甲狀腺疾病":{"html":"<p><b>甲狀腺機能亢進</b>:好發<b>青春期女性</b>、心悸躁動腹瀉怕熱多汗體重減;抗甲狀腺藥治療1~3年、<b>定期查血液肝功能</b>、<u>症狀改善不可停藥(防甲狀腺危象)</u>、觀察體溫過高。</p><p><b>先天性甲狀腺功能低下</b>:新生兒篩檢、<b>T4低、TSH高</b>、黃疸延長生長緩慢便秘皮膚乾粗肌張力低、未治療心智遲緩;<b>終生補甲狀腺素(非飲食治療)</b>、高纖防便秘。甲狀腺素過量(毒性)=心跳快腹瀉痙攣(非心跳慢)。副甲狀腺低下=血鈣低血磷高。</p>"},"8其他內分泌":{"html":"<p><b>生長激素缺乏</b>:身材矮小、乳牙延後、<b>智力正常</b>、基因合成GH治療至青春期。<b>性早熟</b>:女<8歲/男<9歲第二性徵、<b>女多於男</b>、LH/FSH/性荷爾蒙↑、中樞性給<b>leuprolide(GnRH類似劑)</b>、腦部MRI查中樞性。</p><p><b>先天性腎上腺增生症(CAH)</b>:21-羥化酶缺乏、體染色體隱性、女嬰男性化、<b>失鹽型(低鈉高鉀)須補鹽</b>、皮質酮(早上)治療、查17-KS/17-OHP(非19-KS)。<b>尿崩症</b>:多尿尿比重低、禁水試驗體重減3~5%須停、DDAVP鼻噴。</p>"},"9遺傳代謝與新生兒篩檢":{"html":"<p><b>遺傳模式</b>:體染色體隱性(1/4患病:PKU/半乳糖/CAH/SMA/地中海貧血);體染色體顯性(1/2:<b>亨汀頓第4對CAG</b>);性聯X隱性(母帶因男1/2患病:<b>G-6-PD/A型血友病/裘馨氏肌失養</b>)。<b>唐氏症</b>21三染色體、95%非遺傳、頸部透明帶/母血四指標(AFP/uE3/hCG/inhibin-A)。</p><p><b>PKU</b>:限苯丙胺酸(避魚肉蛋奶豆麵粉)、特殊配方(Lofenalac)、<b>終生控制</b>。<b>G-6-PD(蠶豆症)</b>:避蠶豆/樟腦丸/磺胺aspirin(性聯隱性)。<b>透納氏症(45,X)</b>:矮小蹼頸第二性徵不全無月經不孕、智力多正常。</p>"},"10母嬰產科與其他借題":{"html":"<p><b>新生兒成熟度(Ballard)</b>:足月皮膚乾燥脫皮不見血管、皺褶多、睪丸下降(早產皮膚透明見血管/皺褶少)。<b>胎兒酒精症候群</b>:小頭症。<b>優生保健法</b>:四親等內遺傳病、胎兒畸形、性侵受孕、影響心理/家庭可人工流產;葡萄胎清除後追蹤hCG約1年<u>避免1年內懷孕</u>。</p><p><b>其他</b>:全麻產婦最優先注意呼吸;假性月經與母親<b>雌性素</b>中斷有關;糖尿病母巨嬰低血糖(母糖中斷+高胰島素);產後利尿、膀胱敏感度降低注意尿瀦留(子宮偏右);仰臥低血壓症候群試側睡;新生兒死因首位=周產期病態;受精於輸卵管壺腹。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_c6_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
