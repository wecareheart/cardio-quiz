生素須完整服用療程(常約14天不可自行停)、多喝白開水不憋尿沖刷細菌、會陰由前往後擦拭防腸道菌污染。汽水/碳酸飲料含糖且不能有效酸化尿液(酸化宜用蔓越莓汁、維生素C),故多喝汽水不適當。","options":{"A":"適當。抗生素須連續服用完整療程(約14天)。","B":"適當。鼓勵想尿就解、不憋尿(沖刷細菌)。","C":"適當。會陰由前往後擦拭防污染。","D":"不適當(本題答案)。汽水含糖無法有效酸化尿液(酸化用蔓越莓汁/維C)。"},"sources":["新文京《兒科護理學》UTI","不憋尿"]}},"102110-N4-34":{"quick":"25歲反覆泌尿道感染,最合宜的護理指導是「鼓勵每天喝6~8杯開水,且不要憋尿」(A)。","detail":{"background":"預防反覆泌尿道感染的核心:多喝水(每日6~8杯)增加尿量沖刷細菌、不憋尿、性行為前後排尿、會陰由前往後擦、穿棉質透氣內褲。茶與咖啡會利尿但刺激膀胱、長期常規用抗生素易致抗藥性,且反覆感染應就醫評估(非不處理)。","options":{"A":"正確。每天喝6~8杯開水、不憋尿(沖刷細菌)。","B":"錯。反覆感染應評估處理(非不須處理)。","C":"錯。茶與咖啡刺激膀胱(非促進預防)。","D":"錯。常規用抗生素易致抗藥性。"},"sources":["新文京《基本護理學》UTI","多喝水"]}},"103030-N4-48":{"quick":"需進一步評估發展的個案是「2歲的大明,除有意義叫爸媽外,只會一個單字」(B)。","detail":{"background":"2歲幼兒語言發展應約有50個字彙並能說2~3字短句;若「除叫爸媽外只會一個單字」明顯落後,須進一步評估發展遲緩。其餘:1歲獨站2秒、6歲偶爾吸吮拇指尿床、10歲對父母吵架的情緒反應,大致在正常範圍或屬情緒議題。","options":{"A":"1歲能獨站約2秒在正常範圍。","B":"正確。2歲語言明顯落後(僅一個單字),須進一步評估。","C":"6歲偶爾吸拇指/尿床尚屬可觀察範圍。","D":"10歲對父母吵架的情緒反應屬心理議題(非發展遲緩評估)。"},"sources":["新文京《兒科護理學》發展","語言"]}},"105090-N4-72":{"quick":"12個月泌尿道感染出院護理指導錯誤的是「為避免因包尿布引起感染,立即開始大小便訓練」(A)。","detail":{"background":"12個月嬰兒尚未到大小便訓練的發展時機(一般約18~24個月以後),不應「立即」開始如廁訓練;預防UTI重點是勤換尿布、多喝水不憋尿、會陰前往後擦、避免泡澡改淋浴、蔓越莓汁。","options":{"A":"錯誤(本題答案)。12個月尚未到如廁訓練時機(約18~24個月後)。","B":"正確。避免泡澡、採淋浴清潔。","C":"正確。會陰清潔由前往後擦拭。","D":"正確。可多攝取蔓越莓汁減少復發。"},"sources":["新文京《兒科護理學》UTI","如廁訓練"]}},"106110-N4-37":{"quick":"最常導致婦女泌尿道感染的病原體是「大腸桿菌」(A)。","detail":{"background":"泌尿道感染最常見的致病菌是大腸桿菌(E. coli,約佔80~90%),因其由腸道經會陰上行至泌尿道;女性尿道短且靠近肛門陰道而易感染。白色念珠菌、梅毒螺旋體、陰道滴蟲非UTI的主要病原。","options":{"A":"正確。大腸桿菌是泌尿道感染最常見病原。","B":"白色念珠菌多致黴菌性陰道炎(非UTI主因)。","C":"梅毒螺旋體致梅毒(非UTI)。","D":"陰道鞭毛滴蟲致陰道滴蟲感染(非UTI主因)。"},"sources":["新文京《兒科護理學》UTI","大腸桿菌"]}},"106111-N4-74":{"quick":"18歲因性行為導致泌尿道感染(UTI)出院護理指導正確的是「性行為前後應排空膀胱,以防尿液滯留及將細菌排出」(D)。","detail":{"background":"性行為相關UTI的預防重點是「性行為前後排空膀胱」以沖出進入尿道的細菌;會陰應「由前往後(由上往下)」擦拭;不宜泡澡(改淋浴);不需每次用消毒液沖洗會陰(會破壞正常菌叢)。","options":{"A":"錯。會陰應由前往後(由上往下)清潔(非由下往上)。","B":"錯。應避免泡澡(泡澡易使細菌上行)。","C":"錯。不需每次用消毒液沖洗(會破壞正常菌叢)。","D":"正確。性行為前後排空膀胱沖出細菌。"},"sources":["新文京《兒科護理學》UTI","性行為"]}},"107110-N4-78":{"quick":"14歲泌尿道感染出院護理指導錯誤的是「多攝取碳酸飲料,酸化尿液,減少重複感染機會」(B)。","detail":{"background":"UTI護理:依醫囑服完抗生素並返院複檢尿液、會陰由前往後擦、排空膀胱不憋尿。碳酸飲料(汽水)含糖且無法有效酸化尿液,酸化尿液應用蔓越莓汁或維生素C,故B錯誤。","options":{"A":"正確。依醫囑服抗生素、返院複檢尿液。","B":"錯誤(本題答案)。碳酸飲料無法有效酸化尿液(用蔓越莓汁/維C)。","C":"正確。如廁後由前往後擦拭。","D":"正確。排空膀胱減少重複感染。"},"sources":["新文京《兒科護理學》UTI","酸化"]}},"108020-N4-49":{"quick":"14歲泌尿道感染三度入院,護理指導較不適當的是「增加運動量」(A)。","detail":{"background":"反覆UTI的預防重點是多喝水不憋尿、解便由前往後擦、穿寬鬆棉質內褲、性行為後排尿等。「增加運動量」與預防泌尿道感染無直接關係,並非UTI的護理指導重點,故較不適當。","options":{"A":"較不適當(本題答案)。增加運動量與預防UTI無直接關係。","B":"適當。解便後由前向後擦拭。","C":"適當。多喝水、不憋尿。","D":"適當。穿寬鬆的棉質內褲。"},"sources":["新文京《兒科護理學》UTI","預防"]}},"109030-N4-51":{"quick":"幼兒泌尿道感染常見的致病菌是「大腸桿菌(E. coli)」(D)。","detail":{"background":"幼兒(與成人)泌尿道感染最常見的致病菌是大腸桿菌(E. coli),源自腸道經會陰上行感染。變形桿菌、腸球菌、克雷白氏桿菌雖也可致UTI,但大腸桿菌最常見。","options":{"A":"變形桿菌可致UTI但非最常見。","B":"腸球菌非最常見。","C":"克雷白氏桿菌非最常見。","D":"正確。大腸桿菌是幼兒UTI最常見致病菌。"},"sources":["新文京《兒科護理學》UTI","大腸桿菌"]}},"109030-N4-77":{"quick":"7歲泌尿道感染、醫囑7天口服抗生素amoxicillin,適當的護理指導是「藥物吃完,需回診追蹤及檢查尿液」(D)。","detail":{"background":"UTI抗生素須「完整服完整個療程」,不可因症狀(解尿不痛、尿清澈)改善就自行停藥(易復發與抗藥性);且服完後仍須回診追蹤、複檢尿液確認感染清除。","options":{"A":"錯。解尿不痛不可自行停藥(須服完療程)。","B":"錯。尿清澈不可自行停藥。","C":"吃完藥仍須回診追蹤(非吃完即保證不復發)。","D":"正確。藥物吃完需回診追蹤及檢查尿液。"},"sources":["新文京《兒科護理學》UTI","服完療程"]}},"110030-N4-73":{"quick":"1個月泌尿道感染敘述與照護錯誤的是「鼓勵給予小強蔓越莓汁,以鹼化尿液,預防感染」(B)。","detail":{"background":"蔓越莓的作用是使尿液「酸化」(並含抑菌成分)而非鹼化,且1個月嬰兒不宜給果汁。其餘正確:嬰兒UTI常表現發燒、餵食困難、食慾下降等非特異症狀、勤換尿布避免泡澡、抗生素勿因症狀改善任意停用。","options":{"A":"正確。嬰兒UTI常見發燒、餵食困難、食慾下降。","B":"錯誤(本題答案)。蔓越莓是酸化尿液(非鹼化),且1個月嬰兒不宜給果汁。","C":"正確。勤換尿布、避免泡澡。","D":"正確。抗生素勿因症狀改善任意停用。"},"sources":["新文京《兒科護理學》UTI","酸化"]}},"112180-N4-32":{"quick":"2歲6個月泌尿道感染住院,減輕住院壓力護理措施錯誤的是「限制小玲下床自由活動」(C)。","detail":{"background":"幼兒住院易有分離焦慮與退化行為,減壓措施應「容許表達情緒、接受退化行為、提供選擇機會、維持適度活動與遊戲」。過度「限制下床自由活動」會增加其壓力與抗拒,故錯誤(除非醫療需要)。","options":{"A":"正確。容許表達反抗和生氣的情緒。","B":"正確。不批評且接受退化性行為。","C":"錯誤(本題答案)。不應過度限制下床活動(會增加住院壓力)。","D":"正確。儘可能提供選擇的機會。"},"sources":["新文京《兒科護理學》住院壓力","選擇"]}},"114170-N4-46":{"quick":"8個月泌尿道感染護理指導最適當的是「嬰兒泌尿道感染常出現不明發燒、食慾不振、餵食困難等症狀」(A)。","detail":{"background":"嬰兒UTI症狀非特異,常以不明原因發燒、食慾不振、餵食困難、嘔吐、生長遲滯表現。酸化尿液宜用蔓越莓(柑橘偏鹼,不宜為酸化目的給);抗生素須服完整療程不可症狀消失就停;治療後仍須回診追蹤尿液培養確認清除。","options":{"A":"正確。嬰兒UTI常見不明發燒、食慾不振、餵食困難。","B":"錯。柑橘偏鹼,酸化尿液應用蔓越莓(且8個月給果泥須留意)。","C":"錯。抗生素須服完整療程(非症狀消失即停)。","D":"錯。治療後仍須回診追蹤尿液培養(非無須)。"},"sources":["新文京《兒科護理學》UTI","嬰兒症狀"]}},"101030-N4-73":{"quick":"照顧急性腎絲球腎炎兒童護理措施不適當的是「食慾不佳應給予鹹蘇打餅乾以補充能量」(D)。","detail":{"background":"急性腎絲球腎炎(AGN)因鈉水滯留致水腫高血壓,飲食須「限鈉(低鹽)」;鹹蘇打餅乾含高鈉會加重水腫高血壓,故不適當。其餘正確:急性期臥床休息減耗能、每日測體重與輸出入量、每4~6小時測血壓監測。","options":{"A":"適當。急性期臥床休息減少能量消耗。","B":"適當。每日測體重及輸出入量。","C":"適當。每4~6小時測血壓。","D":"不適當(本題答案)。AGN須限鈉(鹹蘇打餅乾高鈉會加重水腫高血壓)。"},"sources":["新文京《兒科護理學》AGN","限鈉"]}},"103030-N4-73":{"quick":"6歲AGN、血壓150/100,護理處置正確的是「急性期必須臥床休息或於床上活動」(A)。","detail":{"background":"AGN急性期(水腫、高血壓、少尿)須臥床休息以減少代謝負擔與血壓波動;飲食須「限鉀、限鈉、限水」(少尿時鉀會滯留→應低鉀,非高鉀);觀察是否高血容積致心衰竭/肺水腫(此項其實也對,但本題官方以A為答);高血脂是腎病症候群(非AGN)的特徵。","options":{"A":"正確。急性期須臥床休息或床上活動。","B":"錯。少尿時應限鉀(非高鉀)、並限水。","C":"肺水腫須觀察(此敘述亦合理,但本題以A為正解)。","D":"高膽固醇/三酸甘油脂是腎病症候群(非AGN)。"},"sources":["新文京《兒科護理學》AGN","臥床"]}},"104100-N4-75":{"quick":"8歲AGN,I/O 1200/1050、BUN 12、Cr 0.7、BP 120/85,需優先執行的護理措施是「臥床休息」(C)。","detail":{"background":"本例腎功能(BUN、Cr)正常、輸出入量平衡、血壓僅輕度偏高,尚無明顯少尿或氮血症,故當下優先且最適切的是「急性期臥床休息」以減輕腎臟負擔。低蛋白、低鉀、嚴格限水500c.c.是在出現氮血症/高鉀/嚴重水腫時才需要,此例尚未到此程度。","options":{"A":"BUN/Cr正常,尚不需嚴格低蛋白飲食。","B":"血鉀未述異常,尚不需嚴格低鉀。","C":"正確。急性期優先臥床休息減輕腎臟負擔。","D":"輸出入平衡,尚不需嚴格限水500c.c.。"},"sources":["新文京《兒科護理學》AGN","臥床"]}},"105090-N4-75":{"quick":"10歲AGN、尿量250c.c./天、BUN 100,護理指導錯誤的是「攝取生酮飲食,以利腎絲球過濾」(A)。","detail":{"background":"AGN出現少尿與高氮血症(BUN 100)時,飲食應「低蛋白」(減少含氮廢物)、嚴格限水(控制水腫高血壓)、避免高鉀(少尿時鉀滯留)。「生酮飲食」是高脂肪用於難治型癲癇,與腎絲球過濾無關且不適合腎炎,故A錯誤。","options":{"A":"錯誤(本題答案)。生酮飲食與腎絲球過濾無關(AGN應低蛋白)。","B":"正確。低蛋白飲食保護腎功能(減含氮廢物)。","C":"正確。嚴格限水控制水腫與高血壓。","D":"正確。避免高鉀食物(少尿時鉀滯留)。"},"sources":["新文京《兒科護理學》AGN","低蛋白"]}},"106111-N4-73":{"quick":"12歲AGN護理措施正確的是「密切監測血壓」(D)。","detail":{"background":"AGN因鈉水滯留致高血壓(可致高血壓腦病變),故須密切監測血壓。急性期應臥床休息(非鼓勵下床)、少尿時須限鉀(非高鉀);水腫評估以「每日固定條件測體重」最準確(腹圍非首選)。","options":{"A":"評估水腫以每日測體重為主(腹圍非首選)。","B":"急性期應臥床休息(非鼓勵下床)。","C":"少尿時應限鉀(非高鉀飲食)。","D":"正確。AGN須密切監測血壓(防高血壓腦病變)。"},"sources":["新文京《兒科護理學》AGN","監測血壓"]}},"107110-N4-76":{"quick":"腎病症候群與急性腎絲球腎炎比較正確的是「兩者皆會出現蛋白尿臨床表徵」(C)。","detail":{"background":"腎病症候群與AGN皆因腎絲球受損而出現「蛋白尿」(腎病症候群為大量蛋白尿)。AGN多為A群β型溶血性鏈球菌感染後(腎病症候群非鏈球菌感染);CRP增加見於感染/發炎(非兩者皆有);高血脂是腎病症候群特徵(非AGN)。","options":{"A":"錯。鏈球菌感染後是AGN(腎病症候群非鏈球菌所致)。","B":"錯。CRP增加非兩者皆有。","C":"正確。兩者皆會出現蛋白尿。","D":"錯。高血脂是腎病症候群特徵(非AGN)。"},"sources":["新文京《兒科護理學》腎臟","蛋白尿"]}},"108020-N4-48":{"quick":"8歲AGN出現少尿時,飲食護理指導應避免的是「香蕉」(D)。","detail":{"background":"AGN少尿時鉀離子排出減少易致高血鉀(危及心律),故須「限鉀」,避免高鉀食物如香蕉(及橘子、奇異果、深綠蔬菜、堅果)。鳳梨、木耳、胡瓜相對含鉀較低,香蕉是典型高鉀水果,故應避免。","options":{"A":"鳳梨含鉀相對較低。","B":"木耳相對可。","C":"胡瓜含鉀低。","D":"應避免(本題答案)。香蕉是高鉀水果,少尿時須限鉀。"},"sources":["新文京《兒科護理學》AGN","限鉀香蕉"]}},"110030-N4-71":{"quick":"9歲AGN護理照護錯誤的是「鼓勵病童多進食高鉀食物,如香蕉、橘子以預防低血鉀」(C)。","detail":{"background":"AGN少尿時鉀滯留易致「高血鉀」,應「限鉀」而非鼓勵高鉀食物(香蕉、橘子),故C錯誤。其餘正確:急性期臥床休息減耗能、密切監測水腫血壓尿量、每日同條件測體重評估水腫。","options":{"A":"正確。急性期臥床休息減少能量消耗。","B":"正確。密切監測水腫、血壓、尿量變化。","C":"錯誤(本題答案)。AGN少尿時應限鉀(非鼓勵高鉀防低血鉀)。","D":"正確。每日定時同磅秤同穿著測體重。"},"sources":["新文京《兒科護理學》AGN","限鉀"]}},"111110-N4-64":{"quick":"6個月、7公斤,開心手術後,腎臟衰竭臨床表徵錯誤的是「血中尿素氮和血清肌酸酐降低」(D)。","detail":{"background":"腎衰竭時腎臟排除含氮廢物能力下降,血中尿素氮(BUN)與血清肌酸酐(Cr)會「升高」而非降低,故D錯誤。其餘為腎衰竭表徵:尿量減少(<0.5~1mL/kg/hr為少尿警訊)、意識不清昏睡(尿毒)、高血鉀致心悸/心律不整。","options":{"A":"是表徵。尿量減少(少尿)。","B":"是表徵。意識不清或昏睡(尿毒)。","C":"是表徵。高血鉀致心悸。","D":"錯誤(本題答案)。腎衰竭BUN與Cr升高(非降低)。"},"sources":["新文京《兒科護理學》腎衰竭","BUN升"]}},"111110-N4-74":{"quick":"4歲AGN護理指導最適當的是「急性期合併少尿時,避免牛奶、蛋類、香蕉等食物」(D)。","detail":{"background":"AGN急性期少尿時須限蛋白(牛奶、蛋類)減含氮廢物、限鉀(香蕉)防高血鉀、限水控制水腫。故「少尿時避免牛奶、蛋、香蕉」正確。急性期應臥床(非多活動)、少尿時不應多喝果汁湯汁(限水)、海苔蘇打洋芋片高鈉(不宜補熱量)。","options":{"A":"錯。急性期水腫應臥床(非多活動排體液)。","B":"錯。少尿時應限水(非多攝入果汁湯汁)。","C":"錯。海苔蘇打洋芋片高鈉,不宜(AGN須限鈉)。","D":"正確。少尿時避免牛奶、蛋類(蛋白)、香蕉(鉀)。"},"sources":["新文京《兒科護理學》AGN","限蛋白鉀"]}},"112030-N4-63":{"quick":"不是由A群β型溶血性鏈球菌引起的疾病是「哮吼」(C)。","detail":{"background":"A群β型溶血性鏈球菌可引起扁桃腺/咽炎、急性風濕熱(咽炎後免疫反應)、鏈球菌感染後急性腎絲球腎炎(AGN)。哮吼(croup)主要由「副流行性感冒病毒」等病毒引起,非鏈球菌,故為本題答案。","options":{"A":"是。扁桃腺發炎(鏈球菌咽炎)。","B":"是。急性風濕熱(鏈球菌咽炎後)。","C":"本題答案(非)。哮吼主要由病毒引起(非鏈球菌)。","D":"是。急性腎絲球腎炎(鏈球菌感染後)。"},"sources":["新文京《兒科護理學》鏈球菌","哮吼"]}},"112030-N4-75":{"quick":"14歲慢性腎衰竭腹膜透析中,護理指導較不適當的是「攝取高熱量碳水化合物及脂肪類食物,特別限制蛋白質及鹽的攝取」(A)。","detail":{"background":"腹膜透析病人因透析過程「會流失蛋白質」,飲食反而應「適量增加優質蛋白」(非特別限制),並維持足夠熱量;故A不適當(透析病人蛋白質需求與保守治療不同)。其餘正確:補鐵葉酸維生素D防貧血/骨病、腹膜炎是常見合併症須學消毒、透析液依量緩慢注入停留再引流。","options":{"A":"較不適當(本題答案)。腹膜透析會流失蛋白,應適量增加優質蛋白(非特別限制)。","B":"正確。補鐵、葉酸、維生素D防貧血與骨病。","C":"正確。腹膜炎是常見合併症,須學正確消毒。","D":"正確。透析液緩慢注入、停留後引流。"},"sources":["新文京《兒科護理學》腹膜透析","補蛋白"]}},"114030-N4-45":{"quick":"AGN病童照護措施最適當的是「維持正常體液,兒童排尿量須達1~2mL/kg/hr」(D)。","detail":{"background":"AGN照護以維持正常體液為目標,正常尿量約1~2mL/kg/hr(<0.5~1為少尿警訊)。急性期應臥床(非多下床);少尿期須限鉀(牛奶香蕉須限,非不限);BUN高時應「低蛋白」(非高蛋白)。","options":{"A":"錯。少尿期牛奶香蕉須限(鉀/蛋白),非不限。","B":"錯。急性期應臥床休息(非多下床)。","C":"錯。BUN高應低蛋白飲食(非高蛋白)。","D":"正確。維持正常體液,尿量須達1~2mL/kg/hr。"},"sources":["新文京《兒科護理學》AGN","尿量"]}},"101110-N4-31":{"quick":"4歲腎病症候群,不是其診斷依據的是「血尿」(D)。","detail":{"background":"腎病症候群四大特徵(診斷依據):大量蛋白尿、低白蛋白血症、全身性水腫(常先見眼瞼晨起浮腫)、高膽固醇血症(高血脂)。血尿是「急性腎絲球腎炎」的特徵,並非腎病症候群的典型診斷依據,故為本題答案。","options":{"A":"是診斷依據。高膽固醇血症(高血脂)。","B":"是診斷依據。大量蛋白尿。","C":"是診斷依據。低白蛋白血症。","D":"不是(本題答案)。血尿是急性腎絲球腎炎特徵(非腎病症候群)。"},"sources":["新文京《兒科護理學》腎病症候群","四特徵"]}},"102030-N4-75":{"quick":"腎病症候群類固醇治療期間,疫苗接種正確的是「所有的活性減毒疫苗均不可給予」(B)。","detail":{"background":"類固醇(免疫抑制)治療期間免疫低下,「所有活性減毒疫苗(口服沙賓、卡介苗、水痘、MMR)均不可給予」,以免引起感染;接觸水痘應給「免疫球蛋白(VZIG)」被動保護而非水痘疫苗;不活化/減毒細菌疫苗的限制不同;常規不活化疫苗多可依醫囑於穩定時施打(非一律停藥1個月)。","options":{"A":"錯。接觸水痘應給免疫球蛋白(VZIG),非水痘疫苗。","B":"正確。所有活性減毒疫苗均不可給予(免疫低下)。","C":"此敘述不精確(不活化/類毒素疫苗多可給)。","D":"常規不活化疫苗多可依醫囑施打(非一律停藥1個月)。"},"sources":["新文京《兒科護理學》腎病症候群","活疫苗禁"]}},"102110-N4-73":{"quick":"5歲腎病症候群服用類固醇,常見副作用不包括「出血性膀胱炎」(D)。","detail":{"background":"類固醇常見副作用:食慾增加/體重增加、月亮臉水牛肩、易感染(免疫抑制)、生長抑制、血糖升高、骨質疏鬆、情緒改變。出血性膀胱炎是化療藥「cyclophosphamide」的副作用,非類固醇,故不包括。","options":{"A":"是。食慾增加。","B":"是。容易感染(免疫抑制)。","C":"是。生長抑制。","D":"不包括(本題答案)。出血性膀胱炎是cyclophosphamide副作用(非類固醇)。"},"sources":["新文京《兒科護理學》類固醇","副作用"]}},"104030-N4-76":{"quick":"2歲腎病症候群藥物治療護理指導不適當的是「出現月亮臉、水牛肩時,需立刻停用類固醇製劑」(D)。","detail":{"background":"類固醇造成的月亮臉、水牛肩是常見可預期的副作用,「不可自行突然停藥」(驟停會引起腎上腺危象、疾病復發),須依醫囑逐漸減量。其餘正確:服利尿劑補鉀、先給白蛋白再給利尿劑(提升膠體滲透壓再利尿)、類固醇期間不給活性減毒疫苗。","options":{"A":"適當。服用利尿劑時補充鉀離子。","B":"適當。先給白蛋白靜脈注射再給利尿劑。","C":"適當。類固醇治療期間不可給活性減毒疫苗。","D":"不適當(本題答案)。月亮臉水牛肩不可自行停類固醇(須依醫囑漸減)。"},"sources":["新文京《兒科護理學》腎病症候群","勿驟停"]}},"108110-N4-77":{"quick":"3歲腎病症候群服prednisolone,適宜同住的病童是「4歲,陳小妹,診斷疝氣(hernia)」(D)。","detail":{"background":"腎病症候群用類固醇者免疫低下,須避免與「傳染性疾病」病童同住。哮吼、腸病毒、水痘皆具傳染性(尤水痘對免疫低下者危險),不宜同住;疝氣是外科非感染性疾病,故與疝氣病童同住最安全。","options":{"A":"哮吼具傳染性,不宜同住。","B":"腸病毒具傳染性,不宜同住。","C":"水痘具高傳染性,對免疫低下者危險,絕不可同住。","D":"正確。疝氣是非感染性(外科)疾病,適宜同住。"},"sources":["新文京《兒科護理學》腎病症候群","避傳染"]}},"110110-N4-76":{"quick":"10歲腎病症候群服Prednisolone,護理指導最適當的是「避免接觸有傳染病源的人或環境,以預防感染」(C)。","detail":{"background":"類固醇治療使免疫低下,應避免接觸傳染源預防感染(最重要)。類固醇副作用是月亮臉(非掉髮);不可自行停藥(驟停危險);腎病症候群是大量蛋白尿(血尿是腎絲球腎炎,非類固醇副作用)。","options":{"A":"類固醇副作用是月亮臉等(非掉髮)。","B":"錯。腸胃不適不可自行停藥(類固醇須依醫囑減)。","C":"正確。避免接觸傳染源預防感染(免疫低下)。","D":"血尿非類固醇副作用(腎病症候群以蛋白尿為主)。"},"sources":["新文京《兒科護理學》腎病症候群","防感染"]}},"111030-N4-76":{"quick":"5歲腎病症候群全身水腫,預防皮膚完整性受損護理指導不適當的是「避免經常更換姿勢導致皮膚摩擦受損」(C)。","detail":{"background":"水腫皮膚脆弱,應「經常更換姿勢、適當支托」以避免局部長期受壓而破皮(經常翻身是預防壓傷的基本措施),故「避免經常更換姿勢」錯誤。其餘正確:穿寬鬆通風棉質衣、適當支托減輕水腫、保持皮膚與皺摺處清潔乾燥。","options":{"A":"適當。選擇寬鬆通風的棉質衣服。","B":"適當。適當支托身體減輕水腫、增加舒適。","C":"不適當(本題答案)。應經常更換姿勢防局部受壓破皮(非避免更換)。","D":"適當。保持皮膚及皺摺處清潔與乾燥。"},"sources":["新文京《兒科護理學》腎病症候群","翻身"]}},"112030-N4-74":{"quick":"2歲6個月腎病症候群,最適當的敘述是「腎絲球受破壞,導致腎絲球膜通透性增加,常出現有蛋白尿」(B)。","detail":{"background":"腎病症候群因腎絲球基底膜通透性增加,血漿蛋白(白蛋白)大量流失到尿中→大量蛋白尿、低白蛋白血症、水腫、高血脂。它非鏈球菌感染所致(那是AGN);治療以類固醇為主(非抗生素);臨床以水腫蛋白尿為主,血壓多正常、無嚴重血尿(嚴重血尿高血壓是AGN)。","options":{"A":"錯。鏈球菌感染所致是AGN(非腎病症候群)。","B":"正確。腎絲球膜通透性增加致大量蛋白尿。","C":"錯。治療以類固醇為主(非抗生素)。","D":"錯。腎病症候群血壓多正常、無嚴重血尿(那是AGN)。"},"sources":["新文京《兒科護理學》腎病症候群","通透性"]}},"101030-N4-47":{"quick":"男童生殖器官檢查評估正確的是「可以運用光線照射,辨別陰囊水腫與疝氣的情況」(D)。","detail":{"background":"陰囊腫塊以「透光試驗(光線照射)」鑑別:陰囊積水(水腫)透光、疝氣(腸子)不透光。3歲以上睪丸仍未下降屬異常(隱睪須處理,非正常);兩側睪丸位置略有高低多屬正常;隱睪檢查是觸診陰囊/腹股溝(非只視診腹股溝鼓起)。","options":{"A":"錯。3歲以上睪丸未下降是異常(隱睪須處理)。","B":"兩側睪丸略有高低多屬正常變異(非一定須進一步評估)。","C":"隱睪檢查須觸診(非只視診腹股溝鼓起)。","D":"正確。透光試驗可鑑別陰囊積水(透光)與疝氣(不透光)。"},"sources":["新文京《兒科護理學》男童生殖","透光試驗"]}},"101110-N4-32":{"quick":"尿道下裂的特徵是「尿道開口在陰莖腹側」(D)。","detail":{"background":"尿道下裂(hypospadias)是尿道開口位於陰莖「腹側(下方)」的先天異常,常伴陰莖向腹側彎曲(chordee);尿道開口可在龜頭下方、陰莖體、陰囊等不同位置,但為「單一」開口。開口在龜頭中央是正常、向背側彎曲是尿道上裂、多處開口非典型。","options":{"A":"尿道開口在龜頭中央是正常(非下裂)。","B":"向背側彎曲是尿道上裂(epispadias)。","C":"尿道下裂是單一開口(非多處)。","D":"正確。尿道開口在陰莖腹側=尿道下裂。"},"sources":["新文京《兒科護理學》尿道下裂","腹側"]}},"101110-N4-49":{"quick":"男性睪丸約在妊娠何時開始通過腹股溝管進入陰囊?——「妊娠7個月」(B)。","detail":{"background":"胎兒睪丸原在腹腔,約在妊娠7~8個月(第三孕期)經腹股溝管下降進入陰囊;故早產兒(尚未完成下降)隱睪發生率較足月兒高。","options":{"A":"妊娠5個月睪丸尚在腹腔。","B":"正確。約妊娠7個月開始經腹股溝管進入陰囊。","C":"妊娠9個月多已下降完成。","D":"妊娠10個月(足月)已下降。"},"sources":["新文京《兒科護理學》睪丸下降","7個月"]}},"104100-N4-76":{"quick":"1歲半尿道下裂矯正術後護理不適當的是「矯正手術後的前幾天,應限制液體攝入量,避免膀胱脹痛」(B)。","detail":{"background":"尿道下裂術後應「鼓勵多喝水、維持足夠尿量」使尿液稀釋、保持導尿管通暢、減少感染與血塊阻塞,而非限制液體。其餘正確:保持導尿管通暢勿扭曲、避免跨坐保護傷口、提供熟悉玩具減焦慮。","options":{"A":"適當。保持導尿管通暢、避免扭曲阻塞。","B":"不適當(本題答案)。術後應多喝水維持尿量(非限制液體)。","C":"適當。不可讓病童跨坐(保護傷口)。","D":"適當。提供熟悉玩具減少焦慮。"},"sources":["新文京《兒科護理學》尿道下裂","多喝水"]}},"105030-N4-49":{"quick":"足月男嬰泌尿生殖系統評估,異常的是「陰囊表面光滑少皺褶」(B)。","detail":{"background":"足月男嬰陰囊應「皺褶多、色素深、睪丸已下降」;陰囊表面光滑少皺褶是「早產」特徵,出現在足月兒屬異常。其餘正常:兩側睪丸已下降、陰莖長約2~3公分、出生後24小時內已解尿。","options":{"A":"正常。足月兒兩側睪丸已下降。","B":"異常(本題答案)。陰囊光滑少皺褶是早產特徵(足月應皺褶多)。","C":"正常。陰莖長度約2~3公分。","D":"正常。出生後24小時內已解尿。"},"sources":["新文京《兒科護理學》男嬰評估","陰囊皺褶"]}},"105030-N4-75":{"quick":"6個月尿道重建術後護理不恰當的是「讓病童包雙層尿布,將引流管拉到外層尿布上」(B)?——本題答C。","detail":{"background":"本題官方答案為C。尿道下裂術後應「限制劇烈活動、避免跨坐與騎乘」以保護傷口與導尿管,故「勿限制活動、鼓勵活動肢體」不恰當。其餘恰當:床上拱型護架避免壓迫傷口、雙層尿布將引流管引到外層(便於觀察尿液且保護傷口)、監測尿量顏色性質與導尿管通暢度。","options":{"A":"恰當。用床上拱型護架避免手術部位加壓。","B":"恰當。包雙層尿布、引流管拉到外層(便觀察、保護傷口)。","C":"不恰當(本題答案)。術後應限制劇烈活動保護傷口(非鼓勵活動)。","D":"恰當。監測尿量、顏色、性質及導尿管通暢度。"},"sources":["新文京《兒科護理學》尿道下裂","限制活動"]}},"105090-N4-73":{"quick":"隱睪症評估錯誤的是「大於6個月的小孩宜採站姿檢查,以緩和提睪肌」(D)。","detail":{"background":"隱睪檢查須在「溫暖環境、放鬆」下進行以避免提睪肌收縮把睪丸拉回;較大孩童可採「蹲姿或盤腿坐(交叉腿坐)」以緩和提睪肌反射,而非「站姿」。其餘正確:環境溫暖避免提睪肌收縮、患側陰囊縮小皺褶少、6個月前可平躺觸診陰囊。","options":{"A":"正確。環境溫暖避免提睪肌收縮把睪丸拉回。","B":"正確。未下降側陰囊縮小、表皮平滑缺皺紋。","C":"正確。6個月前可平躺觸診陰囊。","D":"錯誤(本題答案)。較大孩童宜蹲/盤腿坐緩和提睪肌(非站姿)。"},"sources":["新文京《兒科護理學》隱睪","蹲姿"]}},"105090-N4-74":{"quick":"尿道下裂病童手術後護理措施不適當的是「限制喝水,以降低尿液滲漏」(A)。","detail":{"background":"尿道下裂術後應「鼓勵多喝水」維持足夠尿量、保持導尿管通暢、稀釋尿液減少感染與阻塞,而非限制喝水。其餘適當:導尿管固定於腹部或腿上避免牽扯傷口、避免淋浴直到傷口癒合、預防便秘以免用力影響傷口。","options":{"A":"不適當(本題答案)。術後應鼓勵多喝水維持尿量(非限制喝水)。","B":"適當。導尿管固定於腹部或腿上避免牽扯傷口。","C":"適當。避免淋浴直到傷口痊癒。","D":"適當。預防便秘以免用力影響傷口癒合。"},"sources":["新文京《兒科護理學》尿道下裂","多喝水"]}},"106111-N4-80":{"quick":"14個月尿道重建術後第二天護理措施正確的是「導尿管固定於腹部或腿上,以免牽扯傷口」(D)。","detail":{"background":"尿道下裂術後導尿管應「固定於腹部或大腿」避免牽扯傷口;應鼓勵多喝水維持尿量(非減少水分);尿袋應低於膀胱且不固定在會升降的床欄(防滑脫污染、逆流);術後應限制劇烈活動與避免跨坐(非常下床活動)。","options":{"A":"錯。術後應限制活動(非常下床活動)。","B":"錯。應多喝水維持尿量(非減少水分)。","C":"尿袋不固定於床欄杆(防升降拉扯滑脫,應低於膀胱)。","D":"正確。導尿管固定於腹部或腿上避免牽扯傷口。"},"sources":["新文京《兒科護理學》尿道下裂","導尿管固定"]}},"108020-N4-77":{"quick":"10個月尿道下裂手術後護理措施錯誤的是「可跨坐父母身上,進行靜態活動」(B)。","detail":{"background":"尿道下裂術後須「避免跨坐」(跨坐會壓迫、牽扯傷口與導尿管),故B錯誤。其餘正確:臥床休息與限制肢體劇烈活動、監測尿量顏色與導尿管通暢、尿液由陰莖以外部位滲出(瘻管徵象)應通知醫師。","options":{"A":"正確。臥床休息及限制肢體活動。","B":"錯誤(本題答案)。不可跨坐(會壓迫牽扯傷口)。","C":"正確。監測尿量、尿液顏色及導尿管通暢度。","D":"正確。尿液由陰莖以外滲出(瘻管)應通知醫師。"},"sources":["新文京《兒科護理學》尿道下裂","勿跨坐"]}},"109030-N4-68":{"quick":"4歲兒童使用集尿袋收集常規尿液標本,正確的是「男童盡可能將陰莖與陰囊放入集尿袋」(D)。","detail":{"background":"集尿袋收集「常規(非無菌培養)」尿液:清潔會陰後(用清水或無菌生理食鹽水,非優碘消毒)黏貼集尿袋,男童將陰莖(連同陰囊)放入袋內、女童由會陰前方往肛門方向黏貼。常規尿液非無菌操作(中段尿培養才需無菌)。","options":{"A":"錯。常規尿液清潔會陰即可(非優碘消毒)。","B":"錯。常規尿液非無菌操作(中段尿培養才需無菌)。","C":"女童黏貼方向應由會陰前往後(此敘述方向描述不當)。","D":"正確。男童盡可能將陰莖與陰囊放入集尿袋。"},"sources":["新文京《兒科護理學》集尿","男童"]}},"109030-N4-78":{"quick":"隱睪症(cryptorchidism)敘述錯誤的是「胎兒7個月時睪丸應已進入陰囊」(A)。","detail":{"background":"睪丸約在妊娠7~8個月「開始」經腹股溝下降,足月(約9~10個月)才完成進入陰囊,故「7個月時應已進入陰囊」過早,A錯誤。其餘正確:早產兒隱睪機率高於足月兒、出生後1年內可能自動下降、治療以手術或荷爾蒙為主。","options":{"A":"錯誤(本題答案)。7個月是開始下降,足月才完成進入陰囊(非7個月已進入)。","B":"正確。早產兒隱睪機率高於足月兒。","C":"正確。出生後一年內未下降的睪丸可能自動下降。","D":"正確。治療以手術或荷爾蒙治療為主。"},"sources":["新文京《兒科護理學》隱睪","下降時間"]}},"111030-N4-28":{"quick":"出生1個月評估生殖器最正確的是「睪丸已下降,陰囊皺摺多」(B)。","detail":{"background":"足月新生兒(出生1個月)正常生殖器評估應為「兩側睪丸已下降、陰囊皺褶多、色素較深」。睪丸位於腹股溝/未下降、陰囊無皺褶或表面光滑皆為異常(早產或隱睪)的表現。","options":{"A":"睪丸位於腹股溝、陰囊皺褶少是異常/早產。","B":"正確。足月兒睪丸已下降、陰囊皺褶多。","C":"睪丸未下降、陰囊無皺褶是異常。","D":"陰囊光滑無皺褶是早產特徵(異常)。"},"sources":["新文京《兒科護理學》新生兒生殖器","皺褶多"]}},"112180-N4-45":{"quick":"尿道下裂(hypospadias)病童術後最適當的是「將導尿管固定於腹部或腿上以降低拉扯傷口」(D)。","detail":{"background":"尿道下裂術後導尿管固定於腹部或大腿降低牽扯傷口(D正確);應限制劇烈活動與避免跨坐(非鼓勵常下床);尿液由陰莖以外滲出是瘻管異常徵象(非正常);跨坐會壓迫牽扯傷口(不可)。","options":{"A":"錯。術後應限制劇烈活動(非鼓勵常下床)。","B":"錯。尿液由陰莖以外滲出是瘻管異常(非正常)。","C":"錯。跨坐會壓迫牽扯傷口(不可)。","D":"正確。導尿管固定於腹部或腿上降低拉扯傷口。"},"sources":["新文京《兒科護理學》尿道下裂","導尿管固定"]}},"113030-N4-19":{"quick":"評估男性新生兒皮膚飽和度(發紺/血氧)的最佳部位是「腹部」(D)。","detail":{"background":"評估新生兒中心性發紺/皮膚飽和度,應觀察「軀幹(腹部、胸部)等中心部位」,因四肢末端、眼瞼、陰囊易受周邊循環不良(肢端發紺、生理性)影響而失準。中心部位(腹部)發紺才代表真正缺氧。","options":{"A":"陰囊非評估皮膚飽和度的最佳部位。","B":"四肢末端易有周邊性發紺(失準)。","C":"眼瞼非最佳評估部位。","D":"正確。腹部(中心部位)是評估皮膚飽和度的最佳部位。"},"sources":["新文京《兒科護理學》新生兒","中心發紺"]}},"115030-N4-46":{"quick":"1歲尿道重建術後剛返病房,最適當的護理是「導尿管固定於腹部或腿上避免牽扯傷口」(A)。","detail":{"background":"尿道下裂術後導尿管固定於腹部或大腿避免牽扯傷口(A正確);尿液由陰莖以外滲出是瘻管異常(非正常);應避免跨坐(會壓迫傷口);應鼓勵多喝水維持尿量(非限制水分)。","options":{"A":"正確。導尿管固定於腹部或腿上避免牽扯傷口。","B":"錯。尿液由陰莖以外滲出是瘻管異常(非正常)。","C":"錯。應避免跨坐(會壓迫牽扯傷口)。","D":"錯。應鼓勵多喝水維持尿量(非限制水分)。"},"sources":["新文京《兒科護理學》尿道下裂","導尿管固定"]}},"101110-N4-38":{"quick":"14歲脊椎損傷尿瀦留行間歇性清潔導尿,照護指導錯誤的是「禁用抗乙醯膽鹼藥(Anticholinergic drug),避免尿瀦留」(C)。","detail":{"background":"神經性膀胱常合併膀胱過動/逼尿肌不穩定,常「需要」使用抗乙醯膽鹼藥(抑制逼尿肌收縮、增加膀胱容量、改善失禁),並非禁用,故C錯誤。其餘正確:設計每日飲水計畫避免短時間暴飲、每3~4小時導尿一次防感染、可用Crede氏法壓迫膀胱協助排尿。","options":{"A":"正確。設計每日飲水計畫,避免短時間暴飲。","B":"正確。每隔3~4小時導尿一次避免感染。","C":"錯誤(本題答案)。神經性膀胱常需用抗乙醯膽鹼藥(非禁用)。","D":"正確。可用Crede氏法壓迫膀胱協助排尿。"},"sources":["新文京《兒科護理學》間歇導尿","抗膽鹼"]}},"105090-N4-76":{"quick":"4歲行排尿性膀胱尿道攝影(VCUG),護理措施正確的是「檢查後,需鼓勵多喝水,以利排出顯影劑」(D)。","detail":{"background":"VCUG是經導尿管注入顯影劑後攝影,評估膀胱輸尿管逆流。檢查後鼓勵多喝水以利排出顯影劑、預防感染。VCUG不需禁食8小時(非全身麻醉)、不需清潔灌腸、且其目的是看逆流與下泌尿道結構(非測膀胱壓力的尿路動力學)。","options":{"A":"錯。VCUG不需禁食8小時(非全身麻醉)。","B":"錯。VCUG不需清潔灌腸。","C":"測膀胱壓力是尿路動力學檢查(非VCUG目的)。","D":"正確。檢查後鼓勵多喝水以利排出顯影劑。"},"sources":["新文京《兒科護理學》VCUG","多喝水"]}},"107030-N4-76":{"quick":"膀胱輸尿管逆流(VUR)敘述錯誤的是「膀胱輸尿管逆流易導致腎病症候群」(A)。","detail":{"background":"膀胱輸尿管逆流(VUR)使尿液逆流回輸尿管/腎,易反覆腎盂腎炎、形成腎瘢痕,嚴重可致腎功能損害,但與「腎病症候群」(腎絲球通透性增加致大量蛋白尿)無因果關係,故A錯誤。其餘正確:VCUG評估逆流等級、分五級且級高愈嚴重、輕度可用預防性抗生素。","options":{"A":"錯誤(本題答案)。VUR易致腎盂腎炎/腎瘢痕(非腎病症候群)。","B":"正確。VCUG可評估VUR等級。","C":"正確。VUR分五級,等級愈高逆流愈嚴重。","D":"正確。輕微VUR可用預防性抗生素治療。"},"sources":["新文京《兒科護理學》VUR","腎瘢痕"]}},"108110-N4-50":{"quick":"兒童接受排空性膀胱尿道攝影(VCUG)的主要目的是「評估輸尿管逆流情形」(C)。","detail":{"background":"VCUG(排尿性/排空性膀胱尿道攝影)經導尿注入顯影劑,於膀胱充盈與排尿時攝影,主要目的是評估「膀胱輸尿管逆流」的有無與等級,並可看下泌尿道結構與排尿功能。它非評估尿路動力學壓力或尿路結石。","options":{"A":"尿路動力學測壓非VCUG主要目的。","B":"看泌尿道結構是次要(主要是逆流)。","C":"正確。VCUG主要評估輸尿管逆流情形。","D":"評估結石非VCUG目的。"},"sources":["新文京《兒科護理學》VCUG","逆流"]}},"111030-N4-74":{"quick":"4個月疑似UTI、VCUG確認為第三級,正確的是「出院後每3個月做1次尿液培養至少1年」(B)。","detail":{"background":"VUR第三級屬中度逆流,須以「預防性抗生素」保守治療並定期追蹤(每3個月尿液培養、追蹤至少1年、定期影像評估),多數可隨成長改善;並非不需治療自癒(那是輕度),也非馬上開刀(重度或保守失敗才手術);須鼓勵多喝水(非限水防低血鉀)。","options":{"A":"錯。第三級需預防性抗生素與追蹤(非不需治療自癒)。","B":"正確。出院後每3個月做1次尿液培養至少1年。","C":"錯。應鼓勵多喝水(非限水防低血鉀)。","D":"錯。第三級先保守治療(非馬上開刀)。"},"sources":["新文京《兒科護理學》VUR","追蹤"]}},"111110-N4-73":{"quick":"3歲半反覆UTI行靜脈注射腎盂攝影(IVP),護理指導不適當的是「檢查期間,為防止感染宜給予預防性抗生素」(B)。","detail":{"background":"IVP是經靜脈注射含碘顯影劑後攝影,觀察上泌尿道結構。檢查前須確認對顯影劑(碘)是否過敏、檢查後多喝水排出顯影劑。「檢查期間給預防性抗生素防感染」並非IVP的常規護理(IVP本身非高感染風險的侵入性導尿),故不適當。","options":{"A":"適當。檢查目的為觀察上泌尿道結構。","B":"不適當(本題答案)。IVP非常規給預防性抗生素(非高感染風險檢查)。","C":"適當。檢查前確認對放射線顯影劑是否過敏。","D":"適當。檢查後讓病童攝取大量液體排顯影劑。"},"sources":["新文京《兒科護理學》IVP","顯影劑"]}},"113180-N4-46":{"quick":"排尿性膀胱尿道攝影(VCUG)最適當的敘述是「檢查目的為評估病童尿液逆流的嚴重程度」(A)。","detail":{"background":"VCUG經導尿管注入顯影劑、於排尿時攝影,主要評估膀胱輸尿管逆流的嚴重程度(分級)。它「使用顯影劑」(非無顯影劑);不需檢查前小量灌腸或大量喝水;檢查後鼓勵多喝水排顯影劑。","options":{"A":"正確。VCUG評估尿液逆流的嚴重程度(分級)。","B":"錯。VCUG不需檢查前小量灌腸。","C":"錯。檢查前不需鼓勵多喝水(經導尿注顯影劑)。","D":"錯。VCUG有使用顯影劑(非無顯影劑)。"},"sources":["新文京《兒科護理學》VCUG","逆流分級"]}},"101110-N4-29":{"quick":"16歲新診斷第一型糖尿病護理指導錯誤的是「協助避免課業壓力所引發的低血糖症狀」(B)。","detail":{"background":"壓力(課業、情緒)會使壓力荷爾蒙上升、血糖「升高」而非低血糖,故壓力引發的是高血糖,B敘述方向錯誤。其餘正確:青春期生長激素旺盛使血糖較難穩定、父母參與有助適應、參加病友夏令營學自我照顧。","options":{"A":"正確。青春期生長激素旺盛,血糖較難穩定。","B":"錯誤(本題答案)。壓力使血糖升高(非引發低血糖)。","C":"正確。父母參與症狀處理有助病童適應。","D":"正確。參加病友夏令營學習自我照顧。"},"sources":["新文京《兒科護理學》第一型糖尿病","壓力"]}},"102030-N4-69":{"quick":"10歲第一型糖尿病胰島素注射護理指導錯誤的是「注射部位吸收速率依序為大腿、手部、腹部、臀部」(C)。","detail":{"background":"胰島素皮下注射吸收速率以「腹部最快」,其次手臂,再大腿,臀部最慢(腹>臂>腿>臀),故「大腿、手部、腹部、臀部」順序錯誤。其餘正確:皮下注射避免打入肌肉血管、先抽短效再抽長效(避免長效污染短效瓶)、不可按摩注射部位(以免改變吸收速率)。","options":{"A":"正確。皮下注射,避免注射到肌肉或血管內。","B":"正確。先抽短效再抽長效胰島素。","C":"錯誤(本題答案)。吸收速率腹>臂>腿>臀(非大腿最快)。","D":"正確。不可按摩注射部位(以免縮短作用時間)。"},"sources":["新文京《兒科護理學》胰島素","吸收速率"]}},"102030-N4-70":{"quick":"10歲30公斤第一型糖尿病飲食指導錯誤的是「每日三餐及二次點心之熱量分配應各占1/5」(B)。","detail":{"background":"糖尿病兒童熱量分配以三正餐為主、點心為輔,並非「三餐+兩點心各佔1/5(平均分配)」;一般正餐佔較大比例(如各約2/10~3/10)、點心佔小比例,以配合胰島素作用時間防低血糖。其餘合理:每日熱量約需求量、醣:脂:蛋白約55:30:15、不想吃飯可用醣類飲料代替維持醣類攝取防低血糖。","options":{"A":"合理。每日熱量需求依體重年齡估算。","B":"錯誤(本題答案)。非三餐兩點心各佔1/5平均分配(正餐應佔較大比例)。","C":"合理。醣:脂:蛋白約55:30:15。","D":"合理。不想吃飯可用醣類飲料代替防低血糖。"},"sources":["新文京《兒科護理學》糖尿病飲食","分配"]}},"102110-N4-68":{"quick":"10歲第1型糖尿病學校活動護理指導正確的是「若活動持續進行,應額外補充碳水化合物的點心」(D)。","detail":{"background":"糖尿病兒童運動會增加葡萄糖消耗、降低血糖,若持續運動應額外補充碳水化合物點心預防低血糖。應鼓勵(非避免)有氧運動如慢跑游泳;第一型用胰島素(非口服降血糖藥);運動時機與胰島素作用高峰錯開、運動前可先補點心。","options":{"A":"錯。應鼓勵有氧運動(非避免)。","B":"錯。可慢跑游泳(非避免)。","C":"第一型用胰島素(非口服降血糖藥)。","D":"正確。持續活動應額外補充碳水化合物點心防低血糖。"},"sources":["新文京《兒科護理學》糖尿病運動","補點心"]}},"103030-N4-69":{"quick":"第一型糖尿病採血針檢驗血糖護理措施較不恰當的是「採血前先將手指浸泡冰水數秒,以減少採血時的疼痛感」(A)。","detail":{"background":"採血前手指浸冰水會使「末梢血管收縮、血流減少」,反而不易採到足量血、也使結果不準,並非減痛的正確方法(可改溫水或下垂手促進血流)。其餘恰當:在指腹側邊採血(神經末梢少)、採後加壓止血勿按摩、勿在桌面扎針以免過深。","options":{"A":"較不恰當(本題答案)。冰水使末梢血管收縮、血流減少(不易採血;應用溫水)。","B":"恰當。指腹側邊採血(血管多、神經末梢少)。","C":"恰當。採後加壓止血但避免按摩。","D":"恰當。勿置桌面扎針以免刺入過深。"},"sources":["新文京《兒科護理學》血糖採血","溫水"]}},"104100-N4-70":{"quick":"14歲第一型糖尿病兩年,自我管理良好的錯誤證據是「能自覺低血糖症狀,不需依賴血糖監測器」(D)。","detail":{"background":"良好的糖尿病自我管理仍須「規律使用血糖監測器」客觀監測血糖,不能僅憑自覺症狀判斷(自覺症狀不可靠、低血糖未察覺很危險),故D錯誤。其餘是良好管理:運動前補小方糖防低血糖、高血糖未酮酸中毒前就求助、正確輪替注射部位。","options":{"A":"良好。上體育課前自行食用小方糖(防運動性低血糖)。","B":"良好。高血糖未酮酸中毒前就尋求協助。","C":"良好。正確輪流替換胰島素注射部位。","D":"錯誤(本題答案)。仍須規律用血糖監測器(不可僅憑自覺症狀)。"},"sources":["新文京《兒科護理學》糖尿病","血糖監測"]}},"105030-N4-72":{"quick":"13歲第1型糖尿病居家護理指導正確的是「上體育課前可以先吃1片花生醬麵包或2、3顆牛奶糖」(D)。","detail":{"background":"糖尿病兒童運動前可補充碳水化合物(花生醬麵包、牛奶糖)預防運動性低血糖。應鼓勵規律飲食含「正餐與點心」(非避免點心);鼓勵參與球隊運動(非退出);宜逐步培養病童「自我」執行血糖監測與注射(非只由媽媽執行)。","options":{"A":"錯。應規律含點心(非避免點心)。","B":"錯。鼓勵運動(非退出羽球隊)。","C":"錯。應培養病童自我照顧(非只由媽媽執行)。","D":"正確。上體育課前補花生醬麵包/牛奶糖防低血糖。"},"sources":["新文京《兒科護理學》糖尿病","運動前補糖"]}},"106110-N4-72":{"quick":"12歲胰島素依賴型糖尿病(IDDM)營養衛教成功的表現是「如果我正餐沒吃完,我就必須馬上補充些醣類的食物」(B)。","detail":{"background":"IDDM病童注射胰島素後,若正餐沒吃完(醣類攝取不足)會有低血糖風險,故「正餐沒吃完應馬上補充醣類」是正確認知。不能稍後再吃點心(會低血糖)、不能因沒吃完就增加胰島素(更易低血糖)、也不能留到下一餐補(當餐已注射胰島素)。","options":{"A":"錯。不能稍後再吃(已注射胰島素易低血糖)。","B":"正確。正餐沒吃完須馬上補充醣類防低血糖。","C":"錯。不能因此增加胰島素(更易低血糖)。","D":"錯。不能留到下一餐補(當餐胰島素已作用)。"},"sources":["新文京《兒科護理學》糖尿病","補醣"]}},"107030-N4-51":{"quick":"第一型糖尿病初期臨床表徵正確的是「高血糖及酮酸中毒」(C)。","detail":{"background":"第一型糖尿病因胰島素絕對缺乏,初期常以「高血糖、三多(多吃多喝多尿)、體重減輕」表現,嚴重時以「糖尿病酮酸中毒(DKA)」為首發(高血糖、酮體、酸中毒、Kussmaul深快呼吸)。陳施氏呼吸見於瀕死、體重多減輕(非增加)、是「多尿」(非少尿)。","options":{"A":"陳施氏呼吸見於瀕死(DKA是Kussmaul深快呼吸)。","B":"第一型多體重減輕(非增加)。","C":"正確。高血糖及酮酸中毒是第一型初期表現。","D":"是多尿(非少尿)、口渴。"},"sources":["新文京《兒科護理學》第一型糖尿病","DKA"]}},"107030-N4-63":{"quick":"甲基丙二酸血症(Methylmalonic Acidemia)錯誤的是「大量甲基丙二酸、丙酸等有機酸堆積會造成楓糖漿尿症」(C)。","detail":{"background":"甲基丙二酸血症是有機酸代謝異常的體染色體隱性遺傳病,堆積甲基丙二酸/丙酸致代謝性酸中毒、酮酸血症、昏迷;處置補葡萄糖與碳酸氫鈉矯正酸中毒。其造成的是「甲基丙二酸血症」本身,而非「楓糖漿尿症」(後者是支鏈胺基酸代謝異常、尿有楓糖味),兩者不同,故C錯誤。","options":{"A":"正確。是有機酸代謝異常的體染色體隱性遺傳病。","B":"正確。補葡萄糖與碳酸氫鈉避免酸中毒。","C":"錯誤(本題答案)。堆積有機酸造成甲基丙二酸血症(非楓糖漿尿症,後者是支鏈胺基酸異常)。","D":"正確。未治療會嚴重代謝性酸血症、酮酸血症、昏迷。"},"sources":["新文京《兒科護理學》有機酸血症","非楓糖尿"]}},"108110-N4-61":{"quick":"國一第一型糖尿病照護敘述正確的是「只要適當控制血糖,也可自我照顧並和同學一起聚餐」(D)。","detail":{"background":"糖尿病兒童在良好血糖控制下可正常生活、社交、與同學聚餐(注意飲食選擇與胰島素配合),不應被孤立或剝奪社會參與。應「告知老師與同儕」病情以便緊急協助(非隱瞞);可正常上體育課(運動有益,注意防低血糖)。","options":{"A":"錯。不應減少社會性活動(應正常參與)。","B":"錯。應告知老師同儕病情(便緊急協助),非隱瞞。","C":"錯。可正常上體育課(運動有益,注意防低血糖)。","D":"正確。適當控糖下可自我照顧並與同學聚餐。"},"sources":["新文京《兒科護理學》糖尿病","正常生活"]}},"108110-N4-73":{"quick":"近年因飲食及生活型態改變而增加的疾病是「第二型糖尿病(type 2 diabetes)」(B)。","detail":{"background":"隨高熱量飲食、肥胖、缺乏運動等生活型態改變,「第二型糖尿病」(胰島素阻抗為主)在兒童青少年的發生率明顯增加。第一型是自體免疫破壞β細胞(與生活型態關係小)、葡萄糖耐受不良與酮酸症非主要因生活型態而盛行的診斷。","options":{"A":"第一型是自體免疫(與生活型態關係小)。","B":"正確。第二型糖尿病因飲食/肥胖/少動而增加。","C":"葡萄糖耐受不良非主要描述對象。","D":"酮酸症是急性併發症(非因生活型態盛行)。"},"sources":["新文京《兒科護理學》第二型糖尿病","生活型態"]}},"109030-N4-76":{"quick":"8歲第1型糖尿病、噁心嘔吐口渴、呼吸深快、Blood sugar 780、Urine ketone+,可能的問題是「糖尿病酮酸症」(C)。","detail":{"background":"血糖780(高血糖)、尿酮陽性、呼吸深快(Kussmaul呼吸,代償代謝性酸中毒)、噁心嘔吐口渴,是典型「糖尿病酮酸中毒(DKA)」,常見於第一型糖尿病。高滲透壓高血糖狀態(HHS)多見於第二型且無明顯酮體;低血糖性休克是血糖過低(此例高血糖)。","options":{"A":"HHS多見第二型且無明顯酮體(此例有酮體)。","B":"無低滲透壓高血糖此診斷。","C":"正確。高血糖+酮體+Kussmaul呼吸=糖尿病酮酸症(DKA)。","D":"低血糖性休克是血糖過低(此例血糖780過高)。"},"sources":["新文京《兒科護理學》DKA","Kussmaul"]}},"111030-N4-71":{"quick":"10歲第一型糖尿病運動護理指導較不適當的是「建議養成每日睡前運動的習慣」(C)。","detail":{"background":"糖尿病兒童不建議「睡前運動」,因運動的降血糖效應會延續,睡前運動易致「夜間/睡眠中低血糖」而危險。其餘適當:運動隨身帶糖果/果汁防低血糖、鼓勵游泳慢跑等有氧運動、避開胰島素作用高峰(注射後60~90分鐘)再運動。","options":{"A":"適當。運動時隨身攜帶糖果或果汁防低血糖。","B":"適當。鼓勵游泳、慢跑等有氧運動。","C":"較不適當(本題答案)。睡前運動易致夜間低血糖。","D":"適當。注射胰島素60~90分鐘後再運動(避開高峰)。"},"sources":["新文京《兒科護理學》糖尿病運動","睡前"]}},"112030-N4-72":{"quick":"第1型糖尿病(Type 1)正確的是「①自體免疫使產生胰島素的β細胞受破壞+③血糖監測、藥物、飲食和運動缺一不可」(A,即13)。","detail":{"background":"第一型糖尿病①因自體免疫破壞胰島β細胞致胰島素絕對缺乏,③治療準則為血糖監測、胰島素、飲食、運動四者缺一不可。②口服降血糖藥是第二型用(第一型須注射胰島素)、④好發肥胖青少年是第二型(第一型非肥胖相關),故②④錯誤。","options":{"A":"正確。①自體免疫破壞β細胞+③四大治療準則缺一不可(13)。","B":"14含④(肥胖青少年是第二型)。","C":"23含②(口服藥是第二型)。","D":"24皆為第二型特徵(非第一型)。"},"sources":["新文京《兒科護理學》第一型糖尿病","自體免疫"]}},"114030-N4-33":{"quick":"第一型糖尿病兒童以家庭為中心照護運用賦權(empowerment)的適當目的是「父母參與孩子的每一項治療與檢查的過程」(A)。","detail":{"background":"賦權(empowerment)強調讓病童與家庭「主動參與、有能力管理」疾病。父母參與每項治療與檢查可增能、提升照護能力與信心,符合賦權與家庭中心照護。減少社區互動(孤立)、避談疾病(否認)、強調「治癒」信心(糖尿病無法治癒)皆不符。","options":{"A":"正確。父母參與每項治療檢查(賦權、增能)。","B":"錯。不應減少社區互動(避免孤立)。","C":"錯。不應避談疾病(否認不利管理)。","D":"錯。糖尿病無法治癒(不應強調治癒信心)。"},"sources":["新文京《兒科護理學》糖尿病","賦權"]}},"114170-N4-44":{"quick":"國小5年級第1型糖尿病居家護理指導正確的是「注射胰島素後60~90分鐘再運動,運動前補充點心」(B)。","detail":{"background":"胰島素注射後約60~90分鐘為作用高峰,此時運動易低血糖,故應在注射後一段時間且運動前補點心。不應按摩注射部位(改變吸收);應鼓勵有氧運動(非避免);皮膚乾燥腹痛呼吸深快是「高血糖/酮酸」徵象,應就醫驗血糖(非進食甜食)。","options":{"A":"錯。注射後不應按摩(會改變吸收速率)。","B":"正確。注射後60~90分鐘再運動、運動前補點心防低血糖。","C":"錯。應鼓勵游泳慢跑等有氧運動(非避免)。","D":"錯。皮膚乾燥腹痛呼吸深快是高血糖/酮酸(應驗血糖就醫,非吃甜食)。"},"sources":["新文京《兒科護理學》糖尿病","運動時機"]}},"115030-N4-44":{"quick":"13歲第一型糖尿病胰島素注射護理指導最適當的是「進行劇烈運動,當日注射部位應避免於執行運動的肢體」(B)。","detail":{"background":"運動會增加該肢體血流、加速該處胰島素吸收致低血糖,故劇烈運動當日「注射部位應避開要運動的肢體」(如要跑步避免打大腿)。注射部位吸收以腹部最快(非大腿最佳);注射後不可按摩;應先抽短效再抽中/長效(避免長效污染短效)。","options":{"A":"錯。吸收以腹部最快(非大腿最佳)。","B":"正確。劇烈運動當日注射部位避開運動的肢體(防加速吸收低血糖)。","C":"錯。注射後不可按摩(會改變吸收速率)。","D":"錯。應先抽短效再抽中/長效(非先抽長效)。"},"sources":["新文京《兒科護理學》胰島素","避運動肢"]}},"101110-N4-30":{"quick":"11歲甲狀腺機能亢進服藥治療護理指導適當的是「需定期到醫院接受血液及肝功能檢查」(A)。","detail":{"background":"抗甲狀腺藥(如methimazole、PTU)可能造成「肝功能異常與顆粒性白血球低下」,故須定期抽血監測血液與肝功能;通常需治療1~2年(非1~3年才改善),且即使症狀改善也不可自行停藥;肌肉無力時不宜加強肌力訓練(甲亢肌病應休息)。","options":{"A":"正確。抗甲狀腺藥須定期監測血液及肝功能。","B":"錯。肌肉無力不宜加強肌力訓練(甲亢肌病應休息)。","C":"錯。多治療約1~2年(非服藥1~3年才改善)。","D":"錯。症狀改善也不可自行停藥(須依醫囑)。"},"sources":["新文京《兒科護理學》甲亢","監測肝/血"]}},"102030-N4-71":{"quick":"10歲甲狀腺機能亢進服藥治療護理指導不適當的是「若出現肌肉無力,宜加強肌力訓練」(B)。","detail":{"background":"甲狀腺亢進可致甲狀腺毒性肌病(肌肉無力),此時應「休息」而非加強肌力訓練(過度活動加重耗能與肌肉損傷)。其餘正確:衛教用藥注意事項防甲狀腺危象、抗甲狀腺藥約6週起效但仍不可停藥、通常治療1~3年才緩解。","options":{"A":"正確。衛教用藥注意事項防甲狀腺危象。","B":"不適當(本題答案)。肌肉無力應休息(非加強肌力訓練)。","C":"正確。服藥約6週見效但仍不可停藥。","D":"正確。通常治療1~3年疾病才緩解。"},"sources":["新文京《兒科護理學》甲亢","肌病休息"]}},"102110-N4-69":{"quick":"先天性甲狀腺功能低下症(congenital hypothyroidism)敘述錯誤的是「主要治療方式為飲食治療」(C)。","detail":{"background":"先天性甲狀腺功能低下的治療是「終身補充甲狀腺素(levothyroxine)」,而非飲食治療,且須儘早(新生兒篩檢陽性即開始)治療以避免智能與生長遲滯。其餘正確:屬體染色體隱性遺傳、體溫低皮膚乾燥易脫皮、未治療影響生長與智力。","options":{"A":"正確。屬體染色體隱性遺傳。","B":"正確。體溫低、皮膚乾燥易脫皮(代謝低)。","C":"錯誤(本題答案)。主要治療是補充甲狀腺素(非飲食治療)。","D":"正確。未加治療會影響生長及智力發展。"},"sources":["新文京《兒科護理學》先天性甲低","甲狀腺素"]}},"103030-N4-72":{"quick":"甲狀腺機能亢進(hyperthyroidism)好發於「青春期女性」(A)。","detail":{"background":"甲狀腺機能亢進(尤Graves氏病)好發於青春期至育齡「女性」,女性發生率明顯高於男性,與自體免疫相關。並非好發青春期男性或學齡前期兒童。","options":{"A":"正確。甲狀腺機能亢進好發青春期女性。","B":"青春期男性發生率較低。","C":"學齡前期女童非好發族群。","D":"學齡前期男童非好發族群。"},"sources":["新文京《兒科護理學》甲亢","青春期女性"]}},"104100-N4-69":{"quick":"副甲狀腺功能低下症初診斷血液檢驗正確的是「血中鈣離子濃度降低,血中磷離子濃度增高」(C)。","detail":{"background":"副甲狀腺素(PTH)作用是升血鈣、降血磷。副甲狀腺功能「低下」時PTH不足→「低血鈣、高血磷」,出現手足搐搦、喉痙攣、抽搐。故低鈣高磷正確。","options":{"A":"錯。低下是低鈣(非高鈣)。","B":"錯。是低鈣高磷(非高鈣低磷)。","C":"正確。血鈣降低、血磷增高(PTH不足)。","D":"錯。是低鈣高磷(非低磷)。"},"sources":["新文京《兒科護理學》副甲低","低鈣高磷"]}},"105090-N4-69":{"quick":"17歲甲狀腺機能亢進(Hyperthyroidism)臨床表徵錯誤的是「皮膚乾燥、頭髮易斷裂」(C)。","detail":{"background":"甲狀腺亢進代謝率上升,表現:腸蠕動快易腹瀉、食慾增加但體重減輕、怕熱多汗、皮膚「溫暖潮濕」、心悸、注意力不集中情緒不穩、突眼。「皮膚乾燥、頭髮易斷裂」是甲狀腺「低下」的表現,故C錯誤。","options":{"A":"正確。腸蠕動增快易腹瀉。","B":"正確。食慾增加但體重減輕。","C":"錯誤(本題答案)。皮膚乾燥/頭髮易斷裂是甲狀腺低下(亢進是溫暖潮濕)。","D":"正確。注意力不集中、情緒不穩。"},"sources":["新文京《兒科護理學》甲亢","溫暖潮濕"]}},"106110-N4-70":{"quick":"新生兒篩檢之代謝性異常疾病若未治療,較不會影響智力發展的是「G-6-PD缺乏症」(B)。","detail":{"background":"苯酮尿症(PKU)、半乳糖血症、先天性甲狀腺功能低下若未及時治療,會造成智能障礙。G-6-PD缺乏症(蠶豆症)是紅血球酵素缺乏,接觸誘發物質會「溶血/黃疸」,只要避免誘發物多無智力影響,故較不會影響智力。","options":{"A":"苯酮尿症未治療會智能障礙。","B":"正確(較不會)。G-6-PD缺乏症主要是溶血(避免誘發物多無智力影響)。","C":"半乳糖血症未治療會智能障礙。","D":"先天性甲低未治療會智能障礙。"},"sources":["新文京《兒科護理學》新生兒篩檢","G6PD"]}},"106111-N4-70":{"quick":"2個月先天性甲狀腺功能低下護理指導正確的是「家中避免放置樟腦丸及奈丸」(B)?——本題答C?","detail":{"background":"本題官方答案為C。先天性甲狀腺功能低下代謝低、易便秘,故「提供高纖維食物預防便秘」是適當護理。治療是補充甲狀腺素(非特殊配方奶);避免樟腦丸/萘丸是「G-6-PD缺乏症」的衛教(非甲低);補B12葉酸是特定貧血(非甲低重點)。","options":{"A":"錯。甲低治療是補甲狀腺素(非特殊配方奶)。","B":"避免樟腦丸/萘丸是G-6-PD缺乏症衛教(非甲低)。","C":"正確(本題答案)。提供高纖維食物預防便秘(甲低代謝低易便秘)。","D":"補B12葉酸非甲低護理重點。"},"sources":["新文京《兒科護理學》先天性甲低","高纖"]}},"107030-N4-28":{"quick":"新生兒先天性代謝異常中,不是體染色體隱性遺傳的是「先天性甲狀腺功能低下症」(C)。","detail":{"background":"苯酮尿症、楓糖漿尿症、先天性腎上腺增生症皆為體染色體隱性遺傳。先天性甲狀腺功能低下「多數為散發性」(甲狀腺發育不全、缺如或荷爾蒙合成缺陷),並非典型的單一體染色體隱性遺傳病,故為本題答案。","options":{"A":"是體染色體隱性。苯酮尿症。","B":"是體染色體隱性。楓糖漿尿症。","C":"本題答案(非)。先天性甲低多為散發性(非典型體染色體隱性遺傳)。","D":"是體染色體隱性。先天性腎上腺增生症。"},"sources":["新文京《兒科護理學》遺傳","甲低散發"]}},"107030-N4-52":{"quick":"先天性甲狀腺功能低下症(Congenital Hypothyroidism)敘述錯誤的是「好發於男性」(D)。","detail":{"background":"先天性甲狀腺功能低下「好發於女性」(女:男約2:1),非男性,故D錯誤。其餘正確:多屬自體隱性/散發、早期症狀為新生兒黃疸延長、生長緩慢矮小、餵食困難、嗜睡便秘;未及時補充甲狀腺素會致心智遲緩。","options":{"A":"(多自體隱性/散發,相對正確)。","B":"正確。早期新生兒黃疸、生長緩慢、矮小、餵食困難。","C":"正確。未及時補甲狀腺素可致心智遲緩。","D":"錯誤(本題答案)。好發於女性(非男性)。"},"sources":["新文京《兒科護理學》先天性甲低","女性"]}},"107110-N4-47":{"quick":"先天性甲狀腺功能低下長期服甲狀腺藥,不是甲狀腺毒性反應症狀的是「心跳減緩」(A)。","detail":{"background":"甲狀腺素過量(毒性反應)會出現類似甲狀腺「亢進」的症狀:心跳「加快」(非減緩)、腹瀉、呼吸困難、躁動、痙攣、體溫升高。心跳減緩是甲狀腺「不足」的表現,故不是毒性反應症狀。","options":{"A":"不是(本題答案)。心跳減緩是甲狀腺不足(毒性是心跳加快)。","B":"是。腹瀉(過量似亢進)。","C":"是。呼吸困難。","D":"是。痙攣。"},"sources":["新文京《兒科護理學》甲狀腺素","過量"]}},"108020-N4-75":{"quick":"15歲慢性腎衰竭引發副甲狀腺功能亢進、血鈣12、骨X光脫鈣,護理措施錯誤的是「建議服用維生素C,以促進鈣質排出」(D)。","detail":{"background":"副甲狀腺亢進(PTH過多)致高血鈣與溶骨(脫鈣),護理是維持足夠水分防腎結石、防跌倒骨折、監測心律(高血鈣致心律不整)。維生素C與「促進鈣質排出」無關(且大量維C反增腎結石風險),故D錯誤。","options":{"A":"正確。維持足夠水分減少腎結石。","B":"正確。預防骨折,下床可穿硬背心保護。","C":"正確。心尖脈測滿1分鐘注意心律不整(高血鈣)。","D":"錯誤(本題答案)。維生素C與促鈣排出無關(且大量維C增腎結石)。"},"sources":["新文京《兒科護理學》副甲亢","高血鈣"]}},"110030-N4-69":{"quick":"2歲先天性甲狀腺功能低下護理不適當的是「提供低纖維食物,以預防腹瀉」(A)。","detail":{"background":"先天性甲狀腺功能低下代謝低下「易便秘」(非腹瀉),故應提供「高纖維」食物預防便秘,提供低纖維反而加重便秘,A不適當。其餘適當:補鐵防貧血、四肢保暖防體溫過低(代謝低)、增加日曬促骨骼發展。","options":{"A":"不適當(本題答案)。甲低易便秘,應給高纖維(非低纖維預防腹瀉)。","B":"適當。增加鐵質預防貧血。","C":"適當。四肢保暖預防體溫過低(代謝低)。","D":"適當。增加日曬促進骨骼發展。"},"sources":["新文京《兒科護理學》先天性甲低","高纖"]}},"110110-N4-72":{"quick":"3個月先天性甲狀腺功能低下臨床表徵正確的是「皮膚乾粗」(D)。","detail":{"background":"先天性甲狀腺功能低下代謝低下,表現:皮膚乾粗、肌張力低下(非強)、便秘(非腹瀉)、嗜睡、餵食困難、黃疸延長、囟門「較大且閉合延遲」(非未閉合是正常時程)。故皮膚乾粗正確。","options":{"A":"錯。甲低肌張力低下(非強)。","B":"囟門閉合延遲(較大),此敘述不精確。","C":"錯。甲低常便秘(非腹瀉)。","D":"正確。皮膚乾粗(代謝低、循環差)。"},"sources":["新文京《兒科護理學》先天性甲低","皮膚乾粗"]}},"113030-N4-43":{"quick":"先天性甲狀腺功能低下症血液檢驗值正確的是「甲狀腺素T4低於正常值、甲狀腺刺激素TSH高於正常值」(D)。","detail":{"background":"原發性(甲狀腺本身問題)甲狀腺功能低下:甲狀腺素T4「降低」,因負回饋使腦下垂體分泌的甲狀腺刺激素TSH「升高」(代償刺激)。故T4低、TSH高,此也是新生兒篩檢(驗TSH升高)的依據。","options":{"A":"錯。T4低時TSH高,但T4不會高(此敘述T4高錯)。","B":"錯。T4低、TSH應高(非TSH低)。","C":"錯。原發性甲低TSH升高(非降低)。","D":"正確。T4低於正常、TSH高於正常(原發性甲低)。"},"sources":["新文京《兒科護理學》先天性甲低","T4低TSH高"]}},"113180-N4-44":{"quick":"甲狀腺功能亢進(hyperthyroidism)照護措施最不適當的是「觀察病童體溫過低的症狀和徵象」(C)。","detail":{"background":"甲狀腺亢進代謝率上升,應觀察「體溫過高/怕熱多汗」而非體溫過低,故C最不適當。其餘適當:配合代謝率增加準備高熱量飲食、不可隨意停藥防甲狀腺危象、注意力不集中宜安排安靜環境學習。","options":{"A":"適當。配合代謝率增加準備高熱量飲食。","B":"適當。不可隨意停藥防甲狀腺危象。","C":"最不適當(本題答案)。亢進應觀察體溫過高(非過低)。","D":"適當。注意力不集中宜安排安靜環境學習。"},"sources":["新文京《兒科護理學》甲亢","怕熱"]}},"114100-N4-46":{"quick":"新生兒先天性甲狀腺功能低下症敘述錯誤的是「一出生即明顯可見四肢特別短小」(B)。","detail":{"background":"先天性甲狀腺功能低下「出生時症狀多不明顯」(因有部分母體甲狀腺素),須靠新生兒篩檢(TSH升高)早期發現;「一出生即明顯四肢短小」並非其表現,故B錯誤。其餘正確:可能與母親服抗甲狀腺藥有關、應2週內補甲狀腺素、血中TSH異常增高。","options":{"A":"正確。可能與母親服用抗甲狀腺藥物有關。","B":"錯誤(本題答案)。出生時症狀多不明顯(非一出生即四肢短小)。","C":"正確。儘量2週內提供適量甲狀腺素。","D":"正確。血中TSH異常增高(篩檢依據)。"},"sources":["新文京《兒科護理學》先天性甲低","篩檢"]}},"114170-N4-43":{"quick":"2個月先天性甲狀腺功能低下護理指導最適當的是「應留意聽力發展,必要時安排聽力檢查」(D)。","detail":{"background":"先天性甲狀腺功能低下若治療不足可影響神經發展與「聽力」,故應留意聽力發展、必要時聽力檢查。甲低多便秘(非腹瀉)、皮膚乾不需減少日曬(且應促骨骼發展)、代謝低易體溫「過低」(非過高,不需保持低溫環境)。","options":{"A":"錯。甲低多便秘(非腹瀉)。","B":"減少日曬非甲低重點(且皮膚乾非紅斑問題)。","C":"錯。甲低易體溫過低(非過高,不需低溫環境)。","D":"正確。留意聽力發展,必要時安排聽力檢查。"},"sources":["新文京《兒科護理學》先天性甲低","聽力"]}},"102110-N4-70":{"quick":"兒童生長激素缺乏敘述錯誤的是「病童會智力不正常,且性發育的時間會延後」(D)。","detail":{"background":"生長激素缺乏主要影響「身高生長(矮小)」與骨齡/乳牙生長延後,但「智力多正常」,性發育時間可能延後但智力不受影響,故「智力不正常」錯誤。其餘正確:用基因合成生長激素治療至青春期結束、乳牙生長延後、可測類胰島素生長因子(軟骨生成素)間接評估。","options":{"A":"正確。用人工基因合成生長激素治療至青春期結束。","B":"正確。生長激素缺乏者乳牙生長延後。","C":"正確。可間接測肝臟合成的生長因子了解生長激素量。","D":"錯誤(本題答案)。生長激素缺乏者智力多正常(非智力不正常)。"},"sources":["新文京《兒科護理學》生長激素","智力正常"]}},"106110-N4-71":{"quick":"3天足月兒疑似先天性腎上腺增生症,敘述錯誤的是「由檢查血中19-KS(19-ketosteroids)的含量做診斷」(A)。","detail":{"background":"先天性腎上腺增生症(CAH)因21-羥化酶缺乏致雄性素過多,診斷是測「17-酮類固醇(17-KS)與17-OHP」升高(非19-KS),故A錯誤。其餘正確:外生殖器男性化致性別不易分辨、需補充皮質醇(早上給模擬生理分泌)、皮質醇治療期間易感染。","options":{"A":"錯誤(本題答案)。CAH診斷測17-KS/17-OHP(非19-KS)。","B":"正確。外生殖器男性化,性別不易分辨。","C":"正確。早上補充皮質酮模擬生理分泌。","D":"正確。皮質酮治療期間易出現感染副作用。"},"sources":["新文京《兒科護理學》CAH","17-KS"]}},"106111-N4-75":{"quick":"嬰幼兒隱睪症治療護理指導正確的是「依醫囑給予生長激素,直到睪丸下降為止」(D)?——本題答D?","detail":{"background":"本題官方答案為D。嬰幼兒隱睪手術(睪丸固定術)後,手術部位腫脹時可「冰敷減輕疼痛腫脹」。出生後約6個月~1歲仍未下降即應處理(非兩歲內都不處理);治療用「人類絨毛膜促性腺激素(hCG)」而非生長激素;術後傷口應保護、避免劇烈活動(非天天換藥鼓勵活動)。","options":{"A":"錯。約6個月~1歲未下降即應處理(非兩歲內都不處理)。","B":"錯。荷爾蒙治療用hCG(非生長激素)。","C":"錯。術後應保護傷口、避免劇烈活動(非天天換藥鼓勵活動)。","D":"正確(本題答案)。手術部位腫脹時冰敷減輕疼痛。"},"sources":["新文京《兒科護理學》隱睪","冰敷"]}},"107110-N4-75":{"quick":"性早熟(precocious puberty)敘述錯誤的是「通常男孩子發生率較高,較女孩高出2~3倍」(A)。","detail":{"background":"性早熟「女孩發生率明顯高於男孩」(女多為中樞性、特發性),故「男孩較女孩高2~3倍」錯誤。其餘正確:血清LH、FSH、雌激素/睪固酮上升、可用X光看骨齡(骨骺癒合提早)、腦部掃描排除中樞性病因。","options":{"A":"錯誤(本題答案)。性早熟女孩發生率高於男孩(非男孩高2~3倍)。","B":"正確。血清LH、FSH、雌激素、睪固酮皆上升。","C":"正確。X光看骨骺(骨齡)評估。","D":"正確。腦部掃描確認是否中樞性性早熟。"},"sources":["新文京《兒科護理學》性早熟","女多"]}},"112030-N4-70":{"quick":"6歲20公斤尿崩症,診斷與護理處置錯誤的是「在接受禁水試驗(fluid deprivation test)過程中,體重減少至1公斤時,繼續試驗」(A)。","detail":{"background":"尿崩症因抗利尿激素(ADH)不足致大量稀釋尿、脫水。禁水試驗中若「體重下降達3~5%(或出現明顯脫水)就須停止」以策安全,不可在體重已明顯減少時仍繼續,故A錯誤。其餘正確:尿比重降低、以鼻噴desmopressin(血管加壓素)效果維持8~20小時、過量會致水中毒(尿少、體液滯留、頭痛)。","options":{"A":"錯誤(本題答案)。禁水試驗中體重明顯下降(達3~5%)應停止(非繼續)。","B":"正確。24小時尿液尿比重降低(稀釋尿)。","C":"正確。鼻腔噴霧desmopressin效果維持8~20小時。","D":"正確。過量會致尿少、體液滯留、頭痛(水中毒)。"},"sources":["新文京《兒科護理學》尿崩症","禁水試驗"]}},"113030-N4-44":{"quick":"性早熟(precocious puberty)敘述正確的是「中樞性性早熟可給與leuprolide acetate,以抑制促性腺激素釋放荷爾蒙(GnRH)的分泌」(C)。","detail":{"background":"中樞性(真性)性早熟因下視丘-腦下垂體軸提早活化,治療以GnRH類似劑(如leuprolide acetate,長效持續刺激反而抑制GnRH脈衝分泌)延緩性發育。性早熟定義為女孩8歲前、男孩9歲前出現第二性徵(非11/12歲);血清LH/FSH/性荷爾蒙「上升」(非正常);中樞性以「腦部」影像(非腹部斷層)評估。","options":{"A":"錯。性早熟是女<8歲、男<9歲(非男12女11)。","B":"錯。性早熟LH/FSH/性荷爾蒙上升(非正常)。","C":"正確。中樞性性早熟用leuprolide acetate抑制GnRH。","D":"錯。中樞性以腦部影像評估(非腹部斷層)。"},"sources":["新文京《兒科護理學》性早熟","GnRH類似劑"]}},"115030-N4-24":{"quick":"17歲少女一直無月經來潮,可能原因是「甲狀腺機能異常」(A)。","detail":{"background":"青春期原發性無月經(從未來經)的內分泌原因常見「甲狀腺機能異常」(甲亢或甲低皆可影響下視丘-腦下垂體-性腺軸致無月經)。骨盆腔感染、多囊性卵巢、巧克力囊腫多致月經異常/痛經/不規則,但「從未來經(原發性無月經)」最先考慮的內分泌因素是甲狀腺異常(及性腺發育問題)。","options":{"A":"正確。甲狀腺機能異常可致原發性無月經(影響性腺軸)。","B":"骨盆腔感染多致痛/分泌物(非原發無月經主因)。","C":"多囊性卵巢多致月經不規則(非從未來經)。","D":"巧克力囊腫多致痛經(非原發性無月經)。"},"sources":["新文京《婦科》原發無月經","甲狀腺"]}},"101030-N4-72":{"quick":"6個月血尿魚腥味、評估膀胱輸尿管逆流(VUR),敘述正確的是「排尿性膀胱尿道攝影(VCUG)可偵測膀胱輸尿管逆流的等級」(C)。","detail":{"background":"膀胱輸尿管逆流(VUR)以VCUG分為五級(評估逆流嚴重度);其多為「原發性(輸尿管膀胱接合處發育異常)」而非單純遺傳、且通常隨成長「改善」(非愈嚴重);臨床多以反覆泌尿道感染/腎盂腎炎表現(各等級皆可,非只輕度)。","options":{"A":"錯。多為原發性發育異常(非單純先天遺傳)。","B":"錯。VUR多隨年齡改善(非趨嚴重)。","C":"正確。VCUG可偵測VUR的等級(分五級)。","D":"腎盂腎炎是反覆感染表現(非僅輕度逆流最常見)。"},"sources":["新文京《兒科護理學》VUR","VCUG"]}},"102030-N4-5":{"quick":"可導致亨汀頓氏舞蹈症的染色體異常是「第4對」(D)。","detail":{"background":"亨汀頓氏舞蹈症是「第4對染色體」上Huntingtin基因的CAG三核苷酸重複序列過度延長所致,屬體染色體「顯性」遺傳,成年後出現不自主舞蹈動作與認知退化。","options":{"A":"第13對非亨汀頓相關。","B":"第11對是β海洋性貧血等(非亨汀頓)。","C":"第8對非亨汀頓。","D":"正確。亨汀頓氏舞蹈症在第4對染色體(CAG重複)。"},"sources":["新文京《兒科護理學》遺傳","亨汀頓第4對"]}},"102110-N4-61":{"quick":"透納氏症候群(Turner)合併主動脈狹窄,不會出現的是「活動耐受性降低、疲倦、容易發紺且有杵狀指」(B)。","detail":{"background":"主動脈狹窄是「非發紺型」心臟病,造成上肢血壓高於下肢、遠端(股動脈)脈搏微弱、頭痛暈眩流鼻血、腳溫低,但「不會發紺與杵狀指」(發紺杵狀指見於發紺型先心),故B不會出現。","options":{"A":"會。高血壓且上肢血壓高於下肢10~20mmHg。","B":"不會(本題答案)。主動脈狹窄非發紺型,不會發紺與杵狀指。","C":"會。遠端股動脈脈搏微弱。","D":"會。頭昏頭痛暈眩流鼻血、腳溫低。"},"sources":["新文京《兒科護理學》主動脈狹窄","非發紺"]}},"104100-N4-6":{"quick":"15歲、成績欠佳、乳房增大,較合宜的回答是「可能有性染色體異常,建議到醫院做進一步的染色體分析」(C)。","detail":{"background":"青春期男性身高偏高、學習困難合併乳房發育(男性女乳),須懷疑「克林菲特氏症候群(Klinefelter, 47,XXY)」等性染色體異常,應轉介做染色體分析,而非僅以飲食、運動改善或直接手術切除。","options":{"A":"錯。少吃炸雞無法改善(疑性染色體異常)。","B":"錯。戶外運動無法改善男性女乳的染色體病因。","C":"正確。疑性染色體異常(如Klinefelter),建議染色體分析。","D":"不應直接建議手術(應先查染色體病因)。"},"sources":["新文京《兒科護理學》性染色體","Klinefelter"]}},"104100-N4-72":{"quick":"先天性腎上腺增殖症(CAH)敘述錯誤的是「必須限制鹽分的攝取」(D)。","detail":{"background":"先天性腎上腺增生症(CAH,21-羥化酶缺乏)常為「失鹽型」(醛固酮不足→失鈉、低血鈉、高血鉀、脫水),故須「補充鹽分」而非限制鹽,D錯誤。其餘正確:體染色體隱性遺傳、缺21-羥化酶、須補充皮質類固醇(及鹽皮質素)。","options":{"A":"正確。屬體染色體隱性遺傳。","B":"正確。因缺乏21-羥化酶。","C":"正確。須給皮質類固醇治療。","D":"錯誤(本題答案)。失鹽型CAH須補鹽(非限制鹽分)。"},"sources":["新文京《兒科護理學》CAH","補鹽"]}},"106030-N4-68":{"quick":"苯酮尿症(PKU)飲食指導錯誤的是「於確定診斷後,即開始終身飲食控制」(A)?——本題答A。","detail":{"background":"本題官方答案為A。苯酮尿症須限制苯丙胺酸飲食,但傳統觀念並非「終身」嚴格控制的表述方式(早期診斷後即開始飲食控制、至少持續到腦部發育完成,孕婦另須嚴格控制);官方以A敘述為錯誤。其餘正確:嬰幼兒餵Lofenalac/Phenyl-Free特殊配方、長大可補蔬果澱粉類、限制麵粉肉魚奶豆等高蛋白。","options":{"A":"錯誤(本題答案)。官方判此敘述為錯(飲食控制起始/期間的表述不當)。","B":"正確。嬰幼兒餵Lofenalac、Phenyl-Free特殊配方奶。","C":"正確。長大可多補水果、蔬菜、根類或澱粉類。","D":"正確。限制麵粉製品、肉、魚、牛奶及豆類(高蛋白)。"},"sources":["新文京《兒科護理學》PKU","飲食控制"]}},"108110-N4-74":{"quick":"先天性腎上腺素增生症(CAH)敘述正確的是「注意每日體重、輸入、輸出量及鈉、鉀離子之平衡」(D)。","detail":{"background":"CAH(失鹽型)因醛固酮不足致失鈉、高血鉀、脫水,故須監測每日體重、輸出入量與鈉鉀電解質平衡。它是體染色體「隱性」(非顯性);24小時尿17-KS「升高」(非下降);皮質醇宜「早上」服用模擬生理分泌(夜間服不符生理節律)。","options":{"A":"錯。CAH是體染色體隱性(非顯性)。","B":"錯。24小時尿17-KS升高(非下降)。","C":"錯。皮質醇宜早上服(模擬生理分泌,非夜間)。","D":"正確。監測每日體重、輸出入量及鈉鉀平衡。"},"sources":["新文京《兒科護理學》CAH","電解質"]}},"109030-N4-56":{"quick":"2歲典型異戊酸血症(Isovaleric Acidemia)敘述正確的是「大量的異戊酸堆積在體內,小銘的尿液會有明顯的臭腳汗味」(B)。","detail":{"background":"異戊酸血症是有機酸代謝異常的體染色體「隱性」遺傳病,異戊酸堆積使體液/尿液有特殊「汗腳味(臭腳汗味)」;急性發作是代謝性「酸中毒」(非鹼中毒),處置矯正脫水與酸中毒、限制白胺酸(蛋白)、補肉鹼。","options":{"A":"錯。是體染色體隱性(非顯性)。","B":"正確。異戊酸堆積使尿有明顯臭腳汗味。","C":"錯。急性發作是代謝性酸中毒(非鹼中毒)。","D":"特殊配方須限白胺酸;肉鹼補充非逐漸增加蛋白(敘述不當)。"},"sources":["新文京《兒科護理學》異戊酸血症","汗腳味"]}},"110030-N4-4":{"quick":"常見遺傳疾病敘述正確的是「唐氏症是21號染色體多一條,95%非遺傳所造成」(A)。","detail":{"background":"唐氏症為21號染色體三體(多一條),約95%是減數分裂不分離造成的「散發性(非遺傳/非家族性)」。X染色體脆折症「男性發生率高於女性」;裘馨氏肌肉萎縮症是「性聯隱性」(非體染色體、每胎重症1/4是體染色體隱性的敘述);海洋性貧血是「單基因(體染色體隱性)」非多基因。","options":{"A":"正確。唐氏症21號三體,約95%為散發性(非遺傳)。","B":"錯。X染色體脆折症男性發生率高於女性。","C":"錯。裘馨氏肌肉萎縮症是性聯隱性(非體染色體、1/4那是體染色體隱性)。","D":"錯。海洋性貧血是單基因(體染色體隱性),非多基因。"},"sources":["新文京《兒科護理學》遺傳","唐氏症"]}},"110110-N4-26":{"quick":"新生兒篩檢中檢測「性聯染色體隱性遺傳疾病」的項目是「G-6-PD缺乏症(蠶豆症)」(B)。","detail":{"background":"G-6-PD缺乏症(蠶豆症)是「性聯(X染色體)隱性」遺傳,好發男性。半乳糖血症、高胱胺酸尿症、先天性甲狀腺低能症則非性聯隱性(半乳糖血症與高胱胺酸尿症是體染色體隱性、先天性甲低多散發)。","options":{"A":"半乳糖血症是體染色體隱性(非性聯)。","B":"正確。G-6-PD缺乏症是性聯隱性遺傳。","C":"高胱胺酸尿症是體染色體隱性(非性聯)。","D":"先天性甲狀腺低能症多散發(非性聯隱性)。"},"sources":["新文京《兒科護理學》新生兒篩檢","G6PD性聯"]}},"110110-N4-67":{"quick":"9歲G-6-PD缺乏症全身黃疸,誘發因子敘述錯誤的是「最近是否服用止咳藥」(D)。","detail":{"background":"G-6-PD缺乏症(蠶豆症)接觸氧化性物質會溶血,常見誘發因子:蠶豆、磺胺/aspirin等氧化性藥物、樟腦丸(萘丸)、感染。一般「止咳藥」並非典型的溶血誘發因子,故D為錯誤(非誘發因子)。","options":{"A":"是誘發因子。最近是否吃蠶豆。","B":"是誘發因子。服用Aspirin(氧化性藥物)。","C":"是誘發因子。使用樟腦丸(萘)。","D":"錯誤(本題答案)。一般止咳藥非典型溶血誘發因子。"},"sources":["新文京《兒科護理學》G6PD","誘發因子"]}},"111030-N4-6":{"quick":"16歲月經未來、診斷透納氏症候群(Turner),正確的是「通常會有身材矮小、第二性徵發育不全與無法生育的問題」(B)。","detail":{"background":"透納氏症候群(45,XO,女性少一條X)典型表現:身材矮小、第二性徵發育不全(卵巢發育不良致無月經、不孕)、蹼狀頸、後髮際低、主動脈狹窄、智能多正常。其與塑化劑無關、智能多正常(非遲緩)、典型是蹼狀「頸」(非足)。","options":{"A":"錯。與塑化劑/環境荷爾蒙無關(是染色體45,XO)。","B":"正確。身材矮小、第二性徵發育不全、無法生育。","C":"錯。智能多正常(非智能遲緩)。","D":"錯。典型是蹼狀頸、後髮際低(非小頭蹼足)。"},"sources":["新文京《兒科護理學》Turner","45XO"]}},"112030-N4-67":{"quick":"17歲A型血友病帶因者遺傳諮詢最適當的是「告知若配偶基因正常,未來每一胎生男嬰有1/2機率為血友病者」(A)。","detail":{"background":"A型血友病是「性聯隱性」遺傳(致病基因在X染色體)。女性帶因者(XᴴX)與正常男性(XY)生育:兒子有1/2得病(得到帶病X)、1/2正常;女兒有1/2為帶因者、1/2正常。故「每一胎生男嬰有1/2機率為血友病」正確。","options":{"A":"正確。帶因母+正常父,男嬰有1/2為血友病。","B":"錯。仍有1/2兒子會發病(非不會生下血友病孩子)。","C":"錯。兒子有1/2會發病(非男嬰皆不發病)。","D":"錯。女兒有1/2帶因、1/2正常(非皆帶因)。"},"sources":["新文京《兒科護理學》血友病","性聯隱性"]}},"114030-N4-42":{"quick":"苯酮尿症(PKU)護理指導錯誤的是「飲食須富含蛋白質食物,避免產生神經系統後遺症」(C)。","detail":{"background":"苯酮尿症因苯丙胺酸羥化酶缺乏,須「限制苯丙胺酸(高蛋白食物含量高)」,故飲食應「低苯丙胺酸/低蛋白」而非富含蛋白質,C錯誤。其餘正確:體染色體隱性遺傳、禁母奶餵特殊配方(Lofenalac/Phenyl-free)、未治療會髮色淡黃、尿有霉臭味、智力不足。","options":{"A":"正確。體染色體隱性遺傳。","B":"正確。禁餵母奶,餵低/不含苯丙胺酸特殊配方奶。","C":"錯誤(本題答案)。應限制蛋白(低苯丙胺酸),非富含蛋白質。","D":"正確。不治療會髮色淡黃、霉臭味尿液、智力不足。"},"sources":["新文京《兒科護理學》PKU","低蛋白"]}},"114030-N4-49":{"quick":"10歲裘馨氏肌失養症(Duchenne)病因和臨床表徵錯誤的是「體染色體隱性遺傳疾病」(A)。","detail":{"background":"裘馨氏肌失養症是「性聯(X染色體)隱性」遺傳(好發男孩),因缺乏肌縮蛋白(dystrophin)致進行性近端肌無力,故「體染色體隱性」錯誤。其餘正確:Gower徵象(蹲下無力須攀爬身體站起)、直立時腰椎前凸、小腿腓腸肌假性肥大。","options":{"A":"錯誤(本題答案)。裘馨氏肌失養症是性聯隱性(非體染色體隱性)。","B":"正確。蹲下無力獨自站起(Gower徵象)。","C":"正確。直立時明顯腰椎前彎。","D":"正確。小腿腓腸肌假性肥大。"},"sources":["新文京《兒科護理學》裘馨氏","性聯"]}},"101030-N4-13":{"quick":"足月(39週)男嬰身體成熟度評估最正確的是「體表皮膚乾燥、脫皮看不見血管,睪丸已下降」(D)。","detail":{"background":"足月新生兒成熟度特徵:皮膚較厚、乾燥可能脫皮、看不太到血管;腳底皺褶遍布全足;胎毛稀少;耳翼成形有彈性可回彈;男嬰陰囊皺褶多、睪丸已下降。其餘描述(皮膚薄透見血管、腳底無皺褶、胎毛豐富、睪丸剛開始下降)是早產特徵。","options":{"A":"皮膚薄透見血管、腳底無皺褶是早產特徵。","B":"胎毛稀薄但耳翼扁平、腳僅前部橫皺褶偏早產。","C":"胎毛豐富、睪丸剛開始下降是早產特徵。","D":"正確。皮膚乾燥脫皮看不見血管、睪丸已下降=足月。"},"sources":["新文京《兒科護理學》新生兒成熟度","足月"]}},"102030-N4-4":{"quick":"孕婦有酗酒問題,可能發生的情況是「新生兒有小頭症」(D)。","detail":{"background":"孕婦酗酒會造成「胎兒酒精症候群(FAS)」:小頭症、特殊臉部特徵(眼裂小、人中平、上唇薄)、生長遲滯、智能與行為障礙。酗酒非直接造成染色體異常,亦非以缺乏維生素A或加速葉酸代謝為主要表現。","options":{"A":"酗酒非直接致染色體異常。","B":"酗酒非以缺維生素A為主。","C":"酗酒非加速葉酸代謝為主要表現。","D":"正確。孕婦酗酒致胎兒酒精症候群,新生兒有小頭症。"},"sources":["新文京《產科護理學》胎兒酒精症候群","小頭"]}},"103030-N4-2":{"quick":"不符合我國優生保健法依自願施行人工流產的是「本人或其配偶之五等親以內之血親患有礙優生之遺傳性疾病者」(A)。","detail":{"background":"優生保健法規定本人或配偶之「四親等以內(非五等親)」血親患有礙優生之遺傳性疾病者,才符合自願人工流產要件,故「五等親以內」不符。其餘符合:醫學上認定胎兒有畸形之虞、因被性侵/不得結婚者相姦受孕、懷孕生產影響心理健康或家庭生活。","options":{"A":"不符合(本題答案)。應為四親等以內(非五等親以內)血親。","B":"符合。胎兒有畸形發育之虞。","C":"符合。被強制性交、誘姦或不得結婚者相姦受孕。","D":"符合。懷孕生產影響心理健康或家庭生活。"},"sources":["優生保健法","四親等"]}},"103100-N4-38":{"quick":"不是根除性子宮切除術後常見問題的是「腎絲球腎炎」(D)。","detail":{"background":"根除性子宮切除術因手術範圍大、可能影響鄰近神經與膀胱功能,常見便秘、腹瀉(腸蠕動改變)、尿瀦留(膀胱神經受影響)等問題。腎絲球腎炎是腎臟免疫性疾病,與子宮切除手術無關,故不是其術後常見問題。","options":{"A":"是。便秘(腸蠕動改變)。","B":"是。腹瀉。","C":"是。尿瀦留(膀胱神經受影響)。","D":"不是(本題答案)。腎絲球腎炎與子宮切除無關。"},"sources":["新文京《婦科》子宮切除","尿瀦留"]}},"103100-N4-59":{"quick":"27週早產兒身體各系統功能性特徵錯誤的是「免疫功能較差,無法從母乳得到IgG」(D)。","detail":{"background":"早產兒免疫功能差,主要是經胎盤獲得的「IgG不足」(IgG多在孕晚期才大量過胎盤),但「母乳(尤初乳)可提供分泌型IgA」黏膜保護,故「無法從母乳得到IgG」的敘述把抗體弄錯(母乳給的是IgA),D錯誤。其餘正確:呼吸中樞不成熟易呼吸暫停、消化酶不足脂肪消化差、腎小管再吸收差易蛋白尿尿糖。","options":{"A":"正確。呼吸中樞不成熟易呼吸暫停。","B":"正確。消化酶分泌不足,脂肪消化能力有限。","C":"正確。腎小管再吸收差,易蛋白尿或尿糖。","D":"錯誤(本題答案)。母乳提供的是IgA(IgG經胎盤;敘述把抗體弄錯)。"},"sources":["新文京《兒科護理學》早產兒","IgA"]}},"104030-N4-4":{"quick":"確認感冒服藥是否影響胎兒,應收集的資料是「①感冒藥物名稱②藥物服用時間④藥物半衰期⑥行房時間(即1246)」(C)。","detail":{"background":"判斷藥物對胎兒的影響須知:①藥物名稱(致畸性)、②服藥時間(對應胚胎發育關鍵期)、④藥物半衰期(殘留與暴露時間)、⑥行房/受孕時間(推算暴露時胚胎週數)。③羊水評估、⑤過去懷孕史、⑦家族遺傳譜與「本次藥物暴露評估」較無直接關係。","options":{"A":"1356含③⑤(與藥物暴露評估較無關)。","B":"2467含⑦家族遺傳譜(非藥物評估)。","C":"正確。①藥名②服藥時間④半衰期⑥行房時間(1246)。","D":"3457含③⑤⑦(非藥物暴露評估核心)。"},"sources":["新文京《產科護理學》藥物致畸","暴露評估"]}},"104030-N4-8":{"quick":"可利用超音波檢查胎兒「頸部透明帶增厚」進行篩檢的遺傳疾病是「唐氏症」(C)。","detail":{"background":"第一孕期超音波測量胎兒「頸部透明帶(NT)」增厚,結合母血指標可篩檢「唐氏症(21三體)」等染色體異常。愛德華症候群(18三體)、貓哭症候群、透納氏症候群雖也是染色體異常,但NT篩檢最主要對應的是唐氏症。","options":{"A":"愛德華症候群非NT篩檢主要對象。","B":"貓哭症候群非NT篩檢主要對象。","C":"正確。頸部透明帶增厚主要篩檢唐氏症。","D":"透納氏症候群非NT篩檢主要對象。"},"sources":["新文京《產科護理學》NT","唐氏症"]}},"104030-N4-15":{"quick":"分娩期間使用全身麻醉的產婦,評估時最優先注意的是「呼吸」(A)。","detail":{"background":"全身麻醉會抑制呼吸並有嘔吐吸入的風險,故評估產婦時最優先注意「呼吸道暢通與呼吸狀態」(ABC中的A、B),確保氣道與通氣安全。膚色、尿瀦留、尿失禁為次要。","options":{"A":"正確。全身麻醉最優先注意呼吸(氣道與通氣)。","B":"膚色為次要評估。","C":"尿瀦留為次要。","D":"尿失禁為次要。"},"sources":["新文京《產科護理學》全身麻醉","呼吸"]}},"104030-N4-19":{"quick":"產後泌尿道系統生理調適正確的是「漲滿的膀胱,可能造成泌尿道感染,亦可能影響子宮收縮」(C)。","detail":{"background":"產後膀胱脹滿會把子宮往上推、影響子宮收縮(致子宮收縮不良與出血),且滯留尿易致泌尿道感染,故須鼓勵及早排尿。產後是「黃體素下降」(非增加刺激利尿,是組織間液回流致利尿);尿中蛋白/乳糖非立即恢復;產後膀胱敏感度多「降低」(非增加),易尿瀦留。","options":{"A":"錯。產後黃體素下降(利尿是組織間液回流,非黃體素增加)。","B":"錯。尿中乳糖/蛋白非立即恢復正常。","C":"正確。膀胱脹滿可能致泌尿道感染並影響子宮收縮。","D":"錯。產後膀胱敏感度多降低(非增加),易尿瀦留。"},"sources":["新文京《產科護理學》產後泌尿","膀胱脹"]}},"104100-N4-2":{"quick":"臺灣地區新生兒死亡之最主要原因是「源於周產期之病態」(A)。","detail":{"background":"依統計,新生兒(出生28天內)死亡的最主要原因是「源於周產期的病態」(如早產、低出生體重、周產期窒息、呼吸窘迫等),其次為先天性畸形/染色體異常。","options":{"A":"正確。新生兒死亡最主要原因是周產期病態。","B":"先天性畸形是次要原因。","C":"家族遺傳心臟病非最主要。","D":"先天性染色體異常非最主要。"},"sources":["衛福部統計","周產期病態"]}},"104100-N4-19":{"quick":"葡萄胎描述錯誤的是「衛教婦女1年內儘快懷孕以平衡荷爾蒙」(C)。","detail":{"background":"葡萄胎清除後須「避孕至少1年」並定期追蹤血清hCG降至正常,以早期發現惡化為絨毛膜癌,絕非鼓勵1年內儘快懷孕(會干擾hCG追蹤),故C錯誤。其餘正確:滋養層絨毛增生致hCG偏高、陰道出血常見、完全型葡萄胎呈囊泡狀含雙套(父系)染色體。","options":{"A":"正確。滋養層絨毛增加,血清hCG偏高。","B":"正確。陰道出血是常見臨床症狀。","C":"錯誤(本題答案)。應避孕至少1年追蹤hCG(非1年內儘快懷孕)。","D":"正確。完全型葡萄胎呈囊泡狀、含雙套染色體。"},"sources":["新文京《產科護理學》葡萄胎","避孕1年"]}},"105030-N4-6":{"quick":"卵子形成過程正確的是「受精的卵子會經過2次減數分裂」(C)。","detail":{"background":"卵原細胞在胎兒期即發育為初級卵母細胞並停滯;排卵時完成第一次減數分裂成次級卵母細胞,直到「受精」才完成第二次減數分裂。故卵子要到受精才完成兩次減數分裂。一個初級卵母細胞最終只形成「1個」成熟卵(其餘為極體),且初級卵母細胞含「雙套」染色體。","options":{"A":"錯。初級卵母細胞在胎兒期即形成(非青春期)。","B":"錯。初級卵母細胞含雙套染色體(非單套)。","C":"正確。受精的卵子經過2次減數分裂才完成。","D":"錯。一個卵原最終形成1個成熟卵(非4個)。"},"sources":["新文京《產科護理學》卵子形成","減數分裂"]}},"105030-N4-9":{"quick":"妊娠10週、已有1名脊髓性肌肉萎縮症患孩,敘述錯誤的是「此胎有50%機率為脊髓性肌肉萎縮症患孩」(B)。","detail":{"background":"脊髓性肌肉萎縮症是體染色體「隱性」遺傳,父母皆帶因者(Aa×Aa),此胎患病(aa)機率為「1/4(25%)」而非50%,故B錯誤。其餘正確:屬體染色體隱性、此胎有1/4為完全不帶基因的健康兒、應接受產前胎兒基因診斷。","options":{"A":"正確。脊髓性肌肉萎縮症為體染色體隱性遺傳。","B":"錯誤(本題答案)。患病機率為1/4(25%),非50%。","C":"正確。有1/4機率為不帶基因的健康小孩。","D":"正確。應接受產前胎兒基因診斷。"},"sources":["新文京《產科護理學》隱性遺傳","1/4"]}},"105090-N4-28":{"quick":"新貝拉德量表評估,較不符合39週男嬰特徵的是「皮膚透明、可見靜脈」(B)。","detail":{"background":"39週(足月)男嬰特徵:乳暈突起約3~4mm、耳朵軟骨成形可回彈、陰囊皺褶多睪丸下降、皮膚較厚乾燥。「皮膚透明、可見靜脈」是「早產兒」特徵(皮膚薄),較不符合足月兒,故B為答案。","options":{"A":"符合足月。乳暈突起3~4mm。","B":"較不符合(本題答案)。皮膚透明見靜脈是早產特徵(足月皮膚較厚)。","C":"符合足月。耳朵軟骨成形可反彈。","D":"符合足月。陰囊皺褶多、睪丸下降。"},"sources":["新文京《兒科護理學》New Ballard","足月"]}},"106111-N4-10":{"quick":"21週孕婦母親有亨丁頓舞蹈症、本人帶患病基因,敘述錯誤的是「依據優生保健法,楊女士不符合施行人工流產之條件」(D)。","detail":{"background":"亨丁頓舞蹈症是體染色體顯性遺傳(第4對染色體CAG重複),胎兒不論男女有1/2遺傳到致病基因。因屬有礙優生之遺傳性疾病,孕婦「符合」優生保健法可施行人工流產的條件,故「不符合」的敘述錯誤(D)。","options":{"A":"正確。屬體染色體顯性遺傳。","B":"正確。位在第4對染色體CAG三核苷酸重複序列。","C":"正確。胎兒不論男女有1/2機會遺傳到此基因。","D":"錯誤(本題答案)。屬有礙優生遺傳病,符合人工流產條件(非不符合)。"},"sources":["優生保健法","亨丁頓"]}},"107110-N4-11":{"quick":"妊娠期婦女甲狀腺分泌功能變化正確的是「妊娠期甲狀腺功能亢進的婦女,易發生自發性流產」(B)。","detail":{"background":"妊娠期甲狀腺亢進若控制不良,易發生自發性流產、早產、子癇前症等不良結果。妊娠期因雌激素使甲狀腺結合球蛋白增加、總T4「升高」(非受抑制);甲狀腺結合球蛋白多在第一孕期後上升;T3也多升高(非下降)。","options":{"A":"錯。妊娠期基礎代謝率增加、總T4升高(非受抑制)。","B":"正確。妊娠期甲亢控制不良易自發性流產。","C":"甲狀腺結合球蛋白上升時程敘述不精確。","D":"錯。T4升高、T3也多升高(非T3下降)。"},"sources":["新文京《產科護理學》孕期甲狀腺","甲亢流產"]}},"109030-N4-27":{"quick":"糖尿病孕婦產下巨嬰(>4000g)出生後易低血糖,主因是「母親供應的葡萄糖出生後中斷,新生兒體內存在過多的胰島素快速消耗葡萄糖所致」(C)。","detail":{"background":"糖尿病母親的高血糖經胎盤使胎兒長期高血糖,刺激胎兒胰島β細胞增生、分泌大量胰島素(致巨嬰)。出生後母體葡萄糖供應突然中斷,但新生兒體內仍有過多胰島素持續消耗葡萄糖,故易發生低血糖。","options":{"A":"錯。是胰島素過多(非無法釋放胰島素)。","B":"錯。出生後母體葡萄糖中斷(非仍保留大量葡萄糖)。","C":"正確。母體葡萄糖中斷+新生兒胰島素過多消耗葡萄糖→低血糖。","D":"非單純葡萄糖容量不足(主因是胰島素過多)。"},"sources":["新文京《兒科護理學》巨嬰","低血糖"]}},"109030-N4-29":{"quick":"剛出生女嬰出現假性月經,與母親中斷的荷爾蒙有關的是「雌性素」(B)。","detail":{"background":"女嬰在子宮內受母體高濃度「雌性素」影響使子宮內膜增生,出生後母體雌激素供應中斷、內膜剝落,造成出生後數天的少量陰道出血(假性月經),屬正常現象。","options":{"A":"黃體素非假性月經主因。","B":"正確。母體雌性素中斷致子宮內膜剝落(假性月經)。","C":"胰島素與假性月經無關。","D":"醛固酮與假性月經無關。"},"sources":["新文京《兒科護理學》新生兒","假性月經"]}},"110030-N4-10":{"quick":"受精敘述錯誤的是「雙胞胎是指同時有二隻精子進入卵子的細胞核完成受精」(B)。","detail":{"background":"正常受精是「一個精子」進入卵子完成,卵子受精後會立即啟動防多精入卵機制;雙胞胎是「兩個卵分別受精(異卵)」或「一個受精卵分裂成兩個(同卵)」,並非「兩隻精子進入同一卵」(那會異常),故B錯誤。其餘正確:精子須穿過放射冠與透明帶、受精常在輸卵管壺腹部、單套精子+單套卵結合。","options":{"A":"正確。精子須穿過放射冠及透明帶。","B":"錯誤(本題答案)。雙胞胎非兩精子進同一卵(是兩卵或一卵分裂)。","C":"正確。受精最常發生於輸卵管壺腹部。","D":"正確。單套染色體精子與單套卵結合。"},"sources":["新文京《產科護理學》受精","雙胞胎"]}},"110030-N4-25":{"quick":"產後尿瀦留評估正確的是「觸診腹部子宮底的位置偏向右側」(D)。","detail":{"background":"產後膀胱脹滿(尿瀦留)會把子宮往上、往右推,故觸診子宮底「偏高且偏向右側」是尿瀦留的典型徵象。叩診脹滿膀胱(恥骨上)應為「濁音」(非鼓音);下腹聽診不會有囉音;產後3小時不一定即尿瀦留(須評估)。","options":{"A":"脹滿膀胱叩診是濁音(下腹聽診無囉音)。","B":"脹滿膀胱叩診恥骨上方是濁音(非鼓音)。","C":"產後3小時未必即尿瀦留(須評估)。","D":"正確。子宮底偏高且偏向右側=尿瀦留徵象。"},"sources":["新文京《產科護理學》產後尿瀦留","子宮偏右"]}},"110110-N4-3":{"quick":"第二孕期母血唐氏症四指標(quadruple test)錯誤的是「胎盤生長激素(PlGF)」(D)。","detail":{"background":"第二孕期唐氏症母血四指標(quadruple test)為:甲型胎兒蛋白(AFP)、非結合性雌三醇(uE3)、β-hCG、抑制素A(inhibin A)。胎盤生長激素(PlGF)是子癇前症風險評估指標,非唐氏症四指標項目,故D錯誤。","options":{"A":"是四指標。胎兒甲型蛋白(AFP)。","B":"是四指標。非結合性雌三醇(uE3)。","C":"是四指標。β-hCG。","D":"錯誤(本題答案)。第四項是抑制素A(PlGF是子癇前症指標,非唐氏四指標)。"},"sources":["新文京《產科護理學》四指標","inhibin A"]}},"112030-N4-26":{"quick":"產後泌尿系統變化正常的是「尿液中人類絨毛膜促性腺激素(hCG)於產後1週消失」(A)。","detail":{"background":"胎盤娩出後hCG逐漸下降,約產後1~2週(尿中)消失,屬正常。產後因組織間液回流會有「利尿」現象,但約持續數日(非6週);蛋白尿/血尿不應持續3週(那是異常),產後輕微蛋白尿應短期內恢復。","options":{"A":"正確。尿中hCG於產後約1週消失。","B":"錯。蛋白尿持續3週是異常(應短期恢復)。","C":"錯。血尿持續3週是異常。","D":"錯。產後利尿約持續數日(非6週)。"},"sources":["新文京《產科護理學》產後泌尿","hCG"]}},"112110-N4-56":{"quick":"評估早產兒生長發展最適當的是「早產男嬰睪丸可能尚未下降且陰囊小及無皺褶」(B)。","detail":{"background":"早產男嬰因睪丸下降未完成,陰囊小、皺褶少、睪丸可能未下降。早產兒生長發展評估應用「矯正年齡」(以「預產期」當作出生日推算,非預產期加4週)、且應「規律(較頻繁)」追蹤(非每3個月才一次);New Ballard量表是評估「出生時成熟度(週數)」(非定期追蹤生長發展)。","options":{"A":"錯。早產兒應較頻繁追蹤(非每3個月一次)。","B":"正確。早產男嬰睪丸可能未下降、陰囊小無皺褶。","C":"錯。矯正年齡以預產期為出生日(非預產期加4週)。","D":"New Ballard是評估出生成熟度(非定期追蹤生長)。"},"sources":["新文京《兒科護理學》早產兒","矯正年齡"]}},"113100-N4-1":{"quick":"以家庭為中心的產科護理模式錯誤的是「增加產前基因篩檢次數,減少家族遺傳疾病之發生」(D)。","detail":{"background":"以家庭為中心的產科護理強調伴侶全程陪伴待產、親子同室減少母嬰分離、待產生產與產後在同一環境(LDR),核心是「家庭參與與情感支持」。「增加基因篩檢次數減少遺傳病」屬優生/篩檢範疇,非家庭中心護理模式的內涵,故D錯誤。","options":{"A":"正確。待產過程鼓勵伴侶全程陪伴。","B":"正確。鼓勵親子同室,減少母嬰分離。","C":"正確。待產、生產與產後在同一環境(LDR)。","D":"錯誤(本題答案)。增加基因篩檢屬優生範疇(非家庭中心護理內涵)。"},"sources":["新文京《產科護理學》家庭中心","LDR"]}},"113180-N4-1":{"quick":"我國優生保健法人工流產規定正確的是「若符合法令規定之適用對象且無身體異常情形,可以使用Mifepristone-RU486施行人工流產」(B)。","detail":{"background":"RU486(Mifepristone)須在符合法令、經醫師評估且無禁忌(無身體異常)下,於合格醫療機構使用施行藥物流產。有配偶婦女因心理健康/家庭因素自願流產「須」經配偶同意;未成年(未婚)須法定代理人同意;且是「四親等以內」血親(非須告知配偶四親等的敘述)。故B正確。","options":{"A":"錯。有配偶因影響心理健康自願流產須經配偶同意。","B":"正確。符合規定且無禁忌可用RU486施行藥物流產。","C":"錯。未成年未婚須經法定代理人同意。","D":"敘述親等/告知對象不符(規定為四親等以內)。"},"sources":["優生保健法","RU486"]}},"113180-N4-2":{"quick":"32週孕婦頻尿無灼熱、平躺易頭暈心悸,最恰當的回應是「頻尿是目前常見的症狀,不要憋尿;睡覺頭暈、心悸可能跟姿勢有關,試試側睡」(B)。","detail":{"background":"孕晚期子宮增大壓迫膀胱致頻尿(無灼熱感屬生理性,非感染);平躺時增大子宮壓迫下腔靜脈致回心血量減少而頭暈心悸(仰臥位低血壓症候群),改「側睡(尤左側)」可緩解。故B最恰當。頻尿無灼熱非感染、頭暈是姿勢性非貧血。","options":{"A":"過於輕忽(未給具體衛教)。","B":"正確。頻尿生理性勿憋尿;頭暈心悸是仰臥壓迫下腔靜脈,側睡緩解。","C":"錯。無灼熱非UTI;頭暈是姿勢性(非貧血)。","D":"錯。將頻尿當UTI、頭暈當貧血,判斷錯誤。"},"sources":["新文京《產科護理學》仰臥位低血壓","側睡"]}},"114170-N4-13":{"quick":"產後泌尿系統評估正確的是「產後因體內多餘的細胞外液,產生利尿現象」(B)。","detail":{"background":"產後不再有胎盤循環,孕期滯留的細胞外液回流並排除,產生「利尿(多尿)」現象,約持續數日,屬正常。產後膀胱敏感度多「降低」(非增加致頻尿);輕微酮尿與蛋白尿並非子宮復舊或膀胱受創的正常產物(過度則異常)。","options":{"A":"錯。產後膀胱敏感度多降低(非增加致頻尿)。","B":"正確。孕期多餘細胞外液回流排除,產生利尿現象。","C":"輕微酮尿非子宮復舊自體溶解的正常產物。","D":"蛋白尿非陰道分娩膀胱受創的正常現象。"},"sources":["新文京《產科護理學》產後泌尿","利尿"]}}},TO=["1泌尿道感染與膀胱輸尿管逆流", "2急性腎絲球腎炎與腎衰竭", "3腎病症候群", "4尿道下裂隱睪症與男性生殖", "5排尿障礙導尿VCUG尿液標本", "6第一型糖尿病", "7甲狀腺疾病", "8其他內分泌", "9遺傳代謝與新生兒篩檢", "10母嬰產科與其他借題"],LEC={"1泌尿道感染與膀胱輸尿管逆流":{"html":"<p><b>UTI</b>:最常見致病菌<b>大腸桿菌(E. coli)</b>;嬰兒發燒餵食差。護理:<b>多喝水不憋尿、會陰由前往後擦、棉質內褲、避免泡澡、性行為前後排空膀胱、蔓越莓/維生素C酸化尿液(非汽水)</b>、<b>抗生素服完療程並回診複檢</b>。</p><p><b>VUR(膀胱輸尿管逆流)</b>:<b>VCUG分5級</b>(級高愈嚴重)、輕度用預防性抗生素可自癒、未治療致反覆腎盂腎炎/腎瘢痕、出院每3個月尿培養至少1年。</p>"},"2急性腎絲球腎炎與腎衰竭":{"html":"<p><b>AGN</b>:<b>A群β型鏈球菌感染後1~3週</b>、<b>血尿(茶色)、水腫、高血壓、少尿</b>、C3↓ASLO↑。護理:<b>急性期臥床、監測血壓體重尿量、低鈉限水、少尿時限鉀(避香蕉橘子)限蛋白</b>;<u>禁鹹蘇打餅/洋芋片(高鈉)</u>。</p><p><b>腎衰竭</b>:少尿(<0.5~1mL/kg/hr)、<b>BUN/Cr升高</b>、高血鉀心悸。腹膜透析:高熱量、<b>透析會流失蛋白須增蛋白</b>、補鐵葉酸維生素D、腹膜炎為常見併發症。</p>"},"3腎病症候群":{"html":"<p><b>腎病症候群</b>四特徵:<b>大量蛋白尿、低白蛋白血症、水腫、高血脂</b>(血壓多正常、血尿非典型)。治療<b>類固醇(prednisolone)</b>;副作用月亮臉水牛肩食慾增<b>易感染生長抑制</b>;<u>不可因月亮臉自行停藥(須漸減)</u>、治療期禁活性減毒疫苗、避免接觸感染源。水腫皮膚定時翻身。</p>"},"4尿道下裂隱睪症與男性生殖":{"html":"<p><b>尿道下裂</b>:尿道開口在<b>陰莖腹側</b>、出生勿割禮(留包皮修補)。術後:<b>導尿管固定腹部/腿、多喝水維持尿流、不可跨坐、限制劇烈活動</b>、尿由陰莖外滲出須通知醫師。</p><p><b>隱睪症</b>:睪丸未降陰囊、<b>胎兒7~8個月下降</b>、早產發生率高、1歲內可自降、未降以手術(orchiopexy)或荷爾蒙;評估環境溫暖(冷致提睪肌收縮)。足月男嬰睪丸已降、陰囊皺摺多(早產則陰囊小無皺褶)。光線透光辨陰囊水腫vs疝氣。</p>"},"5排尿障礙導尿VCUG尿液標本":{"html":"<p><b>VCUG(排尿性膀胱尿道攝影)</b>:經導尿管注顯影劑、<b>主要評估VUR逆流等級</b>、檢查後多喝水排顯影劑。<b>IVP</b>看上泌尿道結構、先確認顯影劑過敏。間歇性清潔導尿:每3~4小時一次、Crede氏法壓膀胱、飲水計畫避免暴飲。集尿袋(常規尿)不需無菌/消毒、男童陰莖陰囊放入袋。</p>"},"6第一型糖尿病":{"html":"<p><b>第一型糖尿病</b>:<b>自體免疫破壞β細胞、胰島素絕對缺乏</b>、好發兒童青少年(非肥胖)、<b>三多一少</b>、可酮酸中毒;<b>胰島素注射(口服降糖藥無效)</b>+血糖監測+飲食+運動缺一不可。</p><p><b>胰島素</b>:<b>皮下注射、先抽短效(清)再中效(濁)、部位輪換、不按摩</b>、吸收<b>腹>臂>腿>臀</b>、注射後60~90分鐘再運動。運動帶糖果防低血糖、<u>睡前運動增夜間低血糖</u>。<b>DKA</b>:高血糖+酮體+Kussmaul深快呼吸。學校可正常運動聚餐、體育課前先吃點心。第二型因生活型態增加。</p>"},"7甲狀腺疾病":{"html":"<p><b>甲狀腺機能亢進</b>:好發<b>青春期女性</b>、心悸躁動腹瀉怕熱多汗體重減;抗甲狀腺藥治療1~3年、<b>定期查血液肝功能</b>、<u>症狀改善不可停藥(防甲狀腺危象)</u>、觀察體溫過高。</p><p><b>先天性甲狀腺功能低下</b>:新生兒篩檢、<b>T4低、TSH高</b>、黃疸延長生長緩慢便秘皮膚乾粗肌張力低、未治療心智遲緩;<b>終生補甲狀腺素(非飲食治療)</b>、高纖防便秘。甲狀腺素過量(毒性)=心跳快腹瀉痙攣(非心跳慢)。副甲狀腺低下=血鈣低血磷高。</p>"},"8其他內分泌":{"html":"<p><b>生長激素缺乏</b>:身材矮小、乳牙延後、<b>智力正常</b>、基因合成GH治療至青春期。<b>性早熟</b>:女<8歲/男<9歲第二性徵、<b>女多於男</b>、LH/FSH/性荷爾蒙↑、中樞性給<b>leuprolide(GnRH類似劑)</b>、腦部MRI查中樞性。</p><p><b>先天性腎上腺增生症(CAH)</b>:21-羥化酶缺乏、體染色體隱性、女嬰男性化、<b>失鹽型(低鈉高鉀)須補鹽</b>、皮質酮(早上)治療、查17-KS/17-OHP(非19-KS)。<b>尿崩症</b>:多尿尿比重低、禁水試驗體重減3~5%須停、DDAVP鼻噴。</p>"},"9遺傳代謝與新生兒篩檢":{"html":"<p><b>遺傳模式</b>:體染色體隱性(1/4患病:PKU/半乳糖/CAH/SMA/地中海貧血);體染色體顯性(1/2:<b>亨汀頓第4對CAG</b>);性聯X隱性(母帶因男1/2患病:<b>G-6-PD/A型血友病/裘馨氏肌失養</b>)。<b>唐氏症</b>21三染色體、95%非遺傳、頸部透明帶/母血四指標(AFP/uE3/hCG/inhibin-A)。</p><p><b>PKU</b>:限苯丙胺酸(避魚肉蛋奶豆麵粉)、特殊配方(Lofenalac)、<b>終生控制</b>。<b>G-6-PD(蠶豆症)</b>:避蠶豆/樟腦丸/磺胺aspirin(性聯隱性)。<b>透納氏症(45,X)</b>:矮小蹼頸第二性徵不全無月經不孕、智力多正常。</p>"},"10母嬰產科與其他借題":{"html":"<p><b>新生兒成熟度(Ballard)</b>:足月皮膚乾燥脫皮不見血管、皺褶多、睪丸下降(早產皮膚透明見血管/皺褶少)。<b>胎兒酒精症候群</b>:小頭症。<b>優生保健法</b>:四親等內遺傳病、胎兒畸形、性侵受孕、影響心理/家庭可人工流產;葡萄胎清除後追蹤hCG約1年<u>避免1年內懷孕</u>。</p><p><b>其他</b>:全麻產婦最優先注意呼吸;假性月經與母親<b>雌性素</b>中斷有關;糖尿病母巨嬰低血糖(母糖中斷+高胰島素);產後利尿、膀胱敏感度降低注意尿瀦留(子宮偏右);仰臥低血壓症候群試側睡;新生兒死因首位=周產期病態;受精於輸卵管壺腹。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_c6_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
