情況?", "options": {"A": "肋軟骨炎引起的尖銳胸痛,觸壓時加劇", "B": "胃食道逆流引起的灼熱感,服用制酸劑後緩解", "C": "冠狀動脈疾病引起的穩定型心絞痛", "D": "胸膜炎引起的胸痛,深呼吸時加劇"}, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "correction_note": "", "img": ""}, {"id": "114-進階-家庭-73", "roc_year": 114, "exam_tag": "114", "subject_group": "進階專科護理", "branch": "家庭", "topic": "心臟衰竭", "q_num": 73, "stem": "下列何者治療證實可改善射出分率降低型心衰竭 ( HFrEF ) 之預後?", "options": {"A": "高劑量 loop diuretics", "B": "β 阻斷劑", "C": "注射 inotropics", "D": "non - dihydropyridine calcium channel blockers ( 如:verapamil )"}, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "correction_note": "", "img": ""}, {"id": "114-進階-家庭-74", "roc_year": 114, "exam_tag": "114", "subject_group": "進階專科護理", "branch": "家庭", "topic": "冠狀動脈疾病(IHD/ACS/MI)", "q_num": 74, "stem": "有關 ST 段上升之心肌梗塞病人治療的敘述,下列何者錯誤?", "options": {"A": "若無禁忌症,應立即投予 aspirin", "B": "若考慮使用血栓溶解治療,到院至血栓溶解治療的時間應小於 30 分鐘", "C": "beta 阻斷劑可以減少心肌缺氧和減少死亡率,所有心肌梗塞病人皆應儘速投予", "D": "若發生血行動力學不穩定之心室頻脈,應儘快執行電擊"}, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "correction_note": "", "img": ""}, {"id": "114-進階-外科-78", "roc_year": 114, "exam_tag": "114", "subject_group": "進階專科護理", "branch": "外科", "topic": "休克/血流動力學", "q_num": 78, "stem": "心臟手術後病人血液動力學監測數值如下:血壓 98 / 60 mmHg、心跳 110 次 / 分、 RAP 10 mmHg、PAWP 22 mmHg、SVR 1020 dynes · sec / cm 5、心輸出量 2.2 L / min、 四肢冰冷、意識遲鈍。依上列數值所呈現的問題,應優先給予下列何項藥物治療?", "options": {"A": "nitroprusside", "B": "dobutamine", "C": "furosemide", "D": "labetalol"}, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "correction_note": "", "img": ""}, {"id": "114-進階-外科-79", "roc_year": 114, "exam_tag": "114", "subject_group": "進階專科護理", "branch": "外科", "topic": "瓣膜性心臟病/心內膜炎", "q_num": 79, "stem": "有關人工瓣膜置換術的敘述,下列何者正確? 1 機械性瓣膜適用於育齡婦女 2 機械性瓣膜易致凝血異常而引發腦中風 3 術後心音出現粗糙的雜音,表示有感染 4 人工瓣膜引發的早期心內膜炎多由金黃色葡萄球菌導致", "options": {"A": "13", "B": "14", "C": "23", "D": "24"}, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "correction_note": "", "img": ""}, {"id": "114-進階-外科-80", "roc_year": 114, "exam_tag": "114", "subject_group": "進階專科護理", "branch": "外科", "topic": "瓣膜性心臟病/心內膜炎", "q_num": 80, "stem": "有關主動脈瓣狹窄 ( aortic stenosis, AS ) 接受經導管主動脈瓣膜置換術 ( transcatheter aortic valve replacement, TAVR ) 適應症之敘述,下列何者最適當?", "options": {"A": "血液動力學不穩定的嚴重 AS", "B": "年紀 65 歲,中度 AS 無明顯症狀", "C": "有症狀的嚴重 AS,手術風險中等者", "D": "術後存活期 > 12 個月、有症狀的重度 AS 【以下空白】"}, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "correction_note": "", "img": ""}], E={"108a-TNPA-內科-34": {"quick": "warfarin 治療靜脈血栓栓塞症(VTE)的目標 INR 為 2.0–3.0。", "detail": {"background": "靜脈血栓栓塞症(VTE)以warfarin 抗凝之目標INR 為2.0–3.0；過低(<1.5)無法預防血栓延伸/復發，過高(>3.0)出血風險增。機械瓣等特殊情況才需較高範圍。故VTE 標準INR 為2.0–3.0。", "options": {"A": "INR<1.5 抗凝不足，無法預防血栓延伸或復發。", "B": "1.5–1.9 仍未達治療強度。", "C": "正確，VTE 標準 INR 目標 2.0–3.0。", "D": ">3.0 出血風險顯著上升，非常規目標。"}, "sources": ["ACCP 抗栓治療指引；Harrison's Internal Medicine", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-通論-28": {"quick": "服用 warfarin 應避免會影響凝血的食品(如銀杏、紅麴)，並維持飲食中維生素K攝取穩定。", "detail": {"background": "下肢靜脈血栓使用warfarin 衛教：治療性INR 為2.0–3.0(非0.5–1.0)；起效慢、需數日達穩定(非24小時)；維生素K(深綠蔬菜)會降低藥效，應『穩定』攝取而非鼓勵多吃；某些保健品/食材(銀杏、紅麴、當歸)會增強抗凝增出血應避免。故『避免影響凝血之食品』正確。", "options": {"A": "治療性 INR 為 2.0–3.0，非 0.5–1.0。", "B": "warfarin 非 24 小時即達藥效，需數天才穩定。", "C": "正確，銀杏、紅麴等會影響凝血，應避免。", "D": "大量綠葉蔬菜(維生素K)會降低藥效，應穩定而非鼓勵多吃。"}, "sources": ["ACCP 抗栓治療指引;藥物食物交互作用衛教", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-兒科-7": {"quick": "在低臨床可能性下，D-dimer 正常具高陰性預測值，可協助排除肺栓塞。", "detail": {"background": "肺栓塞(PE)診斷須結合臨床可能性(Wells)與檢查。D-dimer 敏感度高、特異度低，在『低臨床可能性』者正常可協助排除PE。單一影像或心電圖陰性不能排除PE(下肢超音波陰性、無Westermark sign、無S1Q3T3 皆不能排除)。故『D-dimer 正常可排除PE』(低風險下)最為可能。", "options": {"A": "下肢靜脈超音波陰性不能排除 PE(栓子可能已完全脫離)。", "B": "Westermark sign 不敏感，陰性不能排除。", "C": "S1Q3T3 僅少數出現，陰性不能排除。", "D": "正確，低風險下 D-dimer 正常可協助排除 PE。"}, "sources": ["ESC 2019 急性肺栓塞指引;Harrison's", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-17": {"quick": "急性肺栓塞造成右心壓力上升，但『左心房壓』不會增加，故為錯誤敘述。", "detail": {"background": "急性肺栓塞阻塞肺動脈→肺血管阻力上升→肺動脈壓、右心室與右心房壓上升(右心後負荷增加，可致急性右心衰竭)。左心因回流減少，『左心房壓』不升反而可能下降。故『左心房壓增加』為錯誤敘述。", "options": {"A": "錯誤(本題答案)：左心房壓不會增加。", "B": "肺動脈壓上升，正確。", "C": "右心室舒張末期壓上升，正確。", "D": "右心房壓上升，正確。"}, "sources": ["ESC 2019 急性肺栓塞指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-通論-78": {"quick": "符合代謝症候群的項目為 1血壓偏高、3 HDL 偏低、4 空腹血糖偏高(=134)。", "detail": {"background": "代謝症候群(國健署，符合≥3項)：腰圍(男≥90/女≥80cm)、血壓≥130/85、空腹血糖≥100、三酸甘油脂≥150、HDL(男<40/女<50)。本題血壓136/80(≥130)✓、HDL 38(<40)✓、空腹血糖123(≥100)✓；身高體重非診斷項(看腰圍)。故符合①③④(=134)。", "options": {"A": "123 含『身高體重』非診斷項，錯誤。", "B": "234 同上。", "C": "正確，1、3、4 三項符合。", "D": "124 漏掉 HDL 這項。"}, "sources": ["國民健康署代謝症候群診斷標準", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-內科-58": {"quick": "造成 LDL 上升的情況中，『肝硬化』除外(肝硬化通常使膽固醇下降)。", "detail": {"background": "造成LDL 上升之情況：甲狀腺功能低下、腎病症候群、膽汁淤積、thiazide/類固醇、高飽和脂肪飲食、家族性高膽固醇血症。嚴重肝病(肝硬化)因合成下降，膽固醇/LDL 多『降低』，故為除外項。", "options": {"A": "正確(除外項)：肝硬化使膽固醇下降。", "B": "甲狀腺功能低下會升高 LDL。", "C": "腎病症候群會升高 LDL。", "D": "thiazide 利尿劑會升高 LDL。"}, "sources": ["Harrison's;脂質代謝學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-通論-其他-31": {"quick": "對肥胖合併高膽固醇、脂肪肝且體能差者，最合適是『增加日常活動量(每日萬步、快走)』。", "detail": {"background": "對肥胖(BMI 34)、高膽固醇(395)、脂肪肝且體能差、易喘者，最合適為『增加日常活動量(每日萬步、快走)』循序漸進。生酮飲食、高強度拳擊有氧、每日1000大卡之極端方式對此族群不安全也難持續；實證建議規律中強度活動、適度減重5–10%、均衡減熱量。", "options": {"A": "生酮飲食非首選，且未必改善血脂、難長期。", "B": "高強度拳擊有氧對易喘者風險高、不適合起步。", "C": "每日1000大卡過低、不安全也難維持。", "D": "正確，循序增加日常活動量最合適且安全。"}, "sources": ["生活型態介入/心血管風險管理指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-通論-其他-35": {"quick": "依 2022 台灣高風險血脂指引，『無心血管疾病且≤2 危險因子、LDL-C>130 即開始藥物』之敘述不適當。", "detail": {"background": "2022 台灣高風險血脂指引採風險分層設定LDL-C 目標：極高風險(如近12月內MI)<55、冠心症<70(合併周邊動脈疾病<55)等。低/中風險(無CVD、≤2 危險因子)多先強化生活型態，藥物起始門檻較高，非一律LDL>130 即用藥。故C 敘述不適當。", "options": {"A": "冠心症/TIA 合併腦頸動脈狹窄目標<70，正確。", "B": "冠心症合併周邊動脈疾病目標<55，正確。", "C": "不適當(本題答案)：低危險者非130即用藥，先生活型態介入。", "D": "近12月內 MI 屬極高風險目標<55，正確。"}, "sources": ["2022 台灣高風險病人血脂異常臨床治療指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-通論-其他-67": {"quick": "王先生符合代謝症候群 2 項(腰圍 110≥90、TG 185≥150)。", "detail": {"background": "代謝症候群5項：腰圍男≥90✓(本題110)、血壓≥130/85(125/80✗)、空腹血糖≥100(82✗)、TG≥150✓(185)、HDL男<40(62✗)。符合腰圍與TG 共2項，未達3項診斷門檻。", "options": {"A": "1 項，低估。", "B": "正確，腰圍與 TG 兩項。", "C": "3 項，高估。", "D": "4 項，高估。"}, "sources": ["國民健康署代謝症候群診斷標準", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-內科-36": {"quick": "心包填塞合併呼吸衰竭時，需先確保呼吸道(插管)再行心包穿刺引流。", "detail": {"background": "心包填塞為阻塞性休克，根本治療是心包穿刺/引流。利尿劑、降前負荷(nitrates/鎮靜)與乙型阻斷劑均會減少前負荷或心輸出而惡化，屬禁忌。合併呼吸衰竭時須先確保呼吸道(插管維持氧合)再行引流，故B 正確。需注意正壓通氣可能進一步減少靜脈回流。", "options": {"A": "利尿劑會減少前負荷、惡化填塞，錯誤。", "B": "正確，呼吸衰竭先插管維持氧合再引流。", "C": "鎮靜劑降前負荷，敘述機轉與處置不當。", "D": "乙型阻斷劑抑制代償性心搏過速，有害。"}, "sources": ["ACLS;Harrison's 心包疾病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-內科-53": {"quick": "Beck's triad 為頸靜脈怒張、低血壓、遙遠(模糊)心音;『心跳快』不屬於三徵。", "detail": {"background": "Beck triad 為心包填塞典型三徵：頸靜脈怒張(JVD)、低血壓、心音遙遠(模糊低沉)。心搏過速為代償現象但『不列入』三徵；奇脈(pulsus paradoxus，吸氣收縮壓降>10mmHg)亦為重要表徵。故『心跳快』不屬Beck triad。", "options": {"A": "頸靜脈怒張，屬三徵。", "B": "低血壓，屬三徵。", "C": "正確(不屬三徵)：心跳快非 Beck triad 之一。", "D": "遙遠心音，屬三徵。"}, "sources": ["Harrison's 心包疾病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-內科-42": {"quick": "肥厚性心肌病(HCM)左心室壁厚>3 公分屬猝死高風險，建議植入 ICD。", "detail": {"background": "肥厚性心肌病(HCM)為年輕運動員猝死常見原因。增加收縮力(digoxin)或降前負荷(nitrates)會惡化左心室流出道動態阻塞，屬禁忌；治療用β阻斷劑/非DHP 鈣阻斷劑減慢心率、改善充填。高風險(極度肥厚壁≥30mm、猝死家族史、不明原因暈厥、非持續性VT)者考慮植入ICD。故壁厚>3cm 建議ICD。", "options": {"A": "digoxin 增收縮力會惡化流出道阻塞，禁忌。", "B": "正確，左室壁>3cm 為高風險，建議 ICD。", "C": "nitrates 降前負荷會惡化阻塞，不宜。", "D": "乙型阻斷劑是治療用藥，可使用(敘述錯誤)。"}, "sources": ["ESC/AHA HCM 指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-通論-5分科-55": {"quick": "急性心包膜炎心電圖不會出現 S1Q3T3(那是肺栓塞表現)，故為錯誤敘述。", "detail": {"background": "急性心包膜炎之心電圖典型：除aVR 外『瀰漫性ST 段上升』、PR 段下降、大量積液時可見電交替(electrical alternans)。『S1Q3T3』為肺栓塞之右心負荷表現，非心包炎，故該敘述錯誤。需與STEMI(局部分布、對應鏡像)區分。", "options": {"A": "錯誤(本題答案)：S1Q3T3 是肺栓塞表現。", "B": "PR 段下降，正確。", "C": "電交替(大量積液)，正確。", "D": "除 aVR 外瀰漫 ST 上升，正確。"}, "sources": ["Harrison's 心包疾病;心電圖學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-兒科-39": {"quick": "心包填塞為『心搏過速』而非心跳過慢，故敘述錯誤。", "detail": {"background": "心包填塞(cardiac tamponade)：低血壓、頸靜脈怒張、心音遙遠(Beck triad)、奇脈、呼吸急促，心臟超音波為最佳診斷工具。代償為『心搏過速』以維持心輸出；『心跳過慢』與填塞不符，故該敘述錯誤。", "options": {"A": "低血壓、JVD、心音模糊，正確。", "B": "呼吸急促、奇脈，正確。", "C": "錯誤(本題答案)：應為心搏過速而非過慢。", "D": "心臟超音波為最佳診斷工具，正確。"}, "sources": ["Harrison's;兒科急重症", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-內科-67": {"quick": "心包膜炎多為原發/病毒性，『80% 由腫瘤引起』之敘述錯誤。", "detail": {"background": "急性心包炎以特發性/病毒性最常見(非80%腫瘤)。臨床胸痛位胸骨後、與姿勢相關(前傾減輕、平躺加重)；約2/3 合併積液(大量呈水瓶狀心臟)；胸骨左下緣可聞心包摩擦音。故『80%因腫瘤引起』之敘述錯誤。", "options": {"A": "胸痛胸骨後且與姿勢有關，正確。", "B": "約2/3 合併積液、大量呈水瓶狀心臟，正確。", "C": "左下緣可聞摩擦音，正確。", "D": "錯誤(本題答案)：多為特發/病毒性，非80%腫瘤。"}, "sources": ["Harrison's 心包疾病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-內科-45": {"quick": "慢性周邊動脈疾病(動脈缺血)不會有靜脈鬱積造成的『棕色色素沉澱』，那是慢性靜脈疾病表現。", "detail": {"background": "慢性周邊『動脈』粥狀硬化致下肢缺血：間歇性跛行(運動誘發、休息緩解)、皮膚冰冷蒼白、脈搏減弱、毛髮稀疏、趾甲增厚，嚴重者靜息痛與壞疽。棕色色素沉著(含鐵血黃素)屬慢性『靜脈』功能不全之表現，非動脈缺血，故不包括。", "options": {"A": "正確(不包括項)：棕色色素沉澱屬靜脈疾病。", "B": "間歇性跛行為典型動脈缺血表現。", "C": "下肢冰冷為動脈供血不足表現。", "D": "嚴重缺血可致壞疽。"}, "sources": ["Harrison's 周邊血管疾病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-外科-74": {"quick": "主動脈剝離 type A 典型為突發劇烈胸痛或背痛(撕裂感)。", "detail": {"background": "Stanford A 型主動脈剝離侵犯升主動脈，典型為突發、劇烈、撕裂樣前胸或背痛，可併心包填塞、主動脈瓣急性逆流、冠脈或頸動脈受累(心肌梗塞、腦缺血)、兩臂血壓不等。屬外科急症需緊急手術。劇烈胸背痛為其典型表現。", "options": {"A": "腹痛嘔吐非典型(較像腹部病灶)。", "B": "眩暈非典型主訴。", "C": "血壓可高可低，非定義性表現。", "D": "正確，劇烈胸痛或背痛為典型。"}, "sources": ["2022 ACC/AHA 主動脈疾病指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-13": {"quick": "PAD 表現為:間歇性疼痛、微血管充盈>3秒、皮膚冰冷(=136)。", "detail": {"background": "周邊動脈疾病(PAD)臨床：運動誘發之間歇性跛行(休息緩解)、微血管再充盈時間延長(>3秒)、皮膚冰冷蒼白、脈搏弱、踝肱指數ABI<0.9(<0.9 為診斷、<0.4 為重度)。運動後疼痛改善、ABI>0.9、搔癢感非PAD 特徵。故正確為①間歇痛③充盈>3秒⑥冰冷(=136)。", "options": {"A": "134 含『ABI>0.9』錯誤(PAD 為<0.9)。", "B": "正確，1間歇痛、3充盈>3秒、6冰冷。", "C": "245 含運動後改善與搔癢，非PAD。", "D": "346 含ABI>0.9，錯誤。"}, "sources": ["ACC/AHA 周邊動脈疾病指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-內科-44": {"quick": "IABP 的禁忌症為嚴重主動脈瓣閉鎖不全(會使逆流惡化)。", "detail": {"background": "主動脈內氣球幫浦(IABP)於舒張期充氣以提升主動脈舒張壓、增加冠脈灌流(供氧↑)，收縮期前快速消氣以降後負荷、減少心肌耗氧；用於心因性休克、頑固缺血等。嚴重主動脈瓣『閉鎖不全(逆流)』為禁忌——舒張期充氣會加重逆流；主動脈剝離、嚴重周邊血管病亦為禁忌。", "options": {"A": "心肌功能障礙正是適應症。", "B": "心衰竭為適應症之一。", "C": "正確，嚴重主動脈閉鎖不全為禁忌。", "D": "三尖瓣病變非IABP禁忌。"}, "sources": ["重症照護;IABP 操作指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-外科-55": {"quick": "突發胸背痛、CT 見食道與降主動脈間有空氣→食道破裂(Boerhaave)。", "detail": {"background": "突發胸背痛、CT 見食道與降主動脈間少量游離氣體(縱隔氣腫)、周邊動脈搏動正常、無主動脈剝離，提示『食道破裂(Boerhaave 症候群)』——常於劇烈嘔吐/器械後，縱隔積氣、胸痛、可致縱隔炎。雖列於主動脈鑑別，實為食道破裂。", "options": {"A": "正確，CT 游離氣體提示食道破裂。", "B": "胃潰瘍穿孔多見腹腔游離氣與腹膜炎。", "C": "張力性氣胸會有呼吸窘迫與氣管偏移。", "D": "心包填塞會有 Beck triad，本題無。"}, "sources": ["外科急症;Boerhaave 症候群", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-麻醉-41": {"quick": "IABP 在舒張期充氣以增加冠狀動脈供氧，收縮期消氣以降後負荷。", "detail": {"background": "主動脈內氣球幫浦(IABP)以心電圖/動脈波觸發：舒張期(主動脈瓣關閉後)充氣→提升舒張壓、增加冠脈與全身灌流(增供氧)；收縮期(主動脈瓣開啟前)快速消氣→降低後負荷、減少心肌耗氧、協助心室排空。故『舒張期充氣以增加心肌供氧』正確。", "options": {"A": "收縮期應消氣而非此敘述邏輯，錯誤。", "B": "收縮期充氣會增加後負荷，錯誤。", "C": "舒張期消氣與目的不符。", "D": "正確，舒張期充氣增加供氧。"}, "sources": ["重症照護;IABP 原理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-通論-其他-53": {"quick": "『水腫』不是周邊動脈功能不良的典型表現(屬靜脈/淋巴問題)。", "detail": {"background": "周邊動脈功能不良(動脈缺血)之典型6P：疼痛(pain)、蒼白(pallor)、脈搏消失(pulselessness)、感覺異常(paresthesia)、麻痺(paralysis)、冰冷(poikilothermia)。『水腫』非動脈缺血典型(屬靜脈/淋巴問題)，故不是周邊『動脈』功能不良之典型徵象。", "options": {"A": "疼痛為典型。", "B": "正確(非典型)：水腫屬靜脈/淋巴。", "C": "蒼白為典型。", "D": "冰冷為典型。"}, "sources": ["Harrison's 周邊血管疾病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-5分科-63": {"quick": "主動脈剝離可延伸影響分支血管，造成肢體缺血而出現腳麻等症狀。", "detail": {"background": "主動脈剝離臨床：血壓常偏『高』(多數)而非偏低(低血壓提示填塞/破裂/嚴重逆流)；疼痛由背轉前胸不能『完全排除』剝離；可因侵犯主動脈瓣造成『逆流之心雜音』；剝離延伸阻斷分支可致肢體缺血(腳麻、無脈)。故『可能出現腳麻症狀』較正確。", "options": {"A": "多數血壓偏高而非偏低。", "B": "疼痛轉移不能完全排除。", "C": "可造成主動脈瓣逆流之心雜音。", "D": "正確，可因分支缺血出現腳麻。"}, "sources": ["2022 ACC/AHA 主動脈疾病指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-外科-72": {"quick": "升主動脈/根部擴張一般≥5.5 cm(或合併危險因子較早)才考慮手術，敘述『4.8 cm 即立即評估手術』不適當。", "detail": {"background": "退化性升主動脈瘤手術門檻多訂在≥5.5cm(馬凡氏症、二葉式主動脈瓣或快速擴大≥0.5cm/年者放寬至4.5-5.0cm)。經食道超音波(TEE)為評估瓣膜旁主動脈病變之佳選；血管內修復(TEVAR/EVAR)死亡率較開放性低但須注意內漏(endoleak)；statin 可改善預後。故『4.8cm 即立即評估手術』之門檻敘述錯誤。", "options": {"A": "TEE 評估二尖瓣/主動脈瓣旁病變為首選，正確。", "B": "錯誤(本題答案)：4.8 cm 非立即手術門檻。", "C": "血管內修復死亡率較低但有內漏風險，正確。", "D": "statin 改善術後預後，正確。"}, "sources": ["2022 ACC/AHA 主動脈疾病指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-麻醉-79": {"quick": "主動脈夾鉗鬆開前『預先輸液容量補充』最能有效預防鬆夾後低血壓。", "detail": {"background": "胸主動脈瘤修補時主動脈夾鉗鬆開(unclamping)，遠端血管床突然開放、血液再分布並有缺血代謝物與血管擴張物質釋出，造成『鬆夾後低血壓』。最有效之預防為『鬆夾前預先擴充血容量(容量補充)』、必要時逐步鬆夾並配合升壓；降低麻醉藥靠代償不可靠，強心劑或碳酸氫鈉非主要手段。", "options": {"A": "降低麻醉藥靠代償不可靠且不安全。", "B": "強心劑非首要，容量才是關鍵。", "C": "正確，鬆夾前先補充容量。", "D": "碳酸氫鈉非預防低血壓主要手段。"}, "sources": ["心臟血管麻醉學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-內科-24": {"quick": "腎動脈下腹主動脈瘤的首選『篩檢』工具是腹部超音波而非電腦斷層，故敘述錯誤。", "detail": {"background": "腎動脈下腹主動脈瘤之『篩檢』首選工具為『腹部超音波』(>65歲有家族史/吸菸男性建議篩檢)，非電腦斷層；CT/MRI 用於術前精確評估瘤體與血管壁；經食道超音波可評估胸主動脈與弓部。故『腎動脈下腹主動脈瘤首選篩檢為CT』之敘述錯誤。", "options": {"A": ">65歲有家族史男性考慮超音波篩檢，正確。", "B": "胸主動脈瘤可用 MRI 評估，正確。", "C": "TEE 可評估主動脈與弓部，正確。", "D": "錯誤(本題答案)：首選篩檢為超音波非CT。"}, "sources": ["ACC/AHA 主動脈疾病指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-內科-16": {"quick": "敗血性休克若無心肌缺氧或出血，輸血閾值為 Hb≥7 g/dL。", "detail": {"background": "Surviving Sepsis Campaign 採限制性輸血策略：敗血性休克若無活動性出血或心肌缺氧，輸血閾值為血色素<7 g/dL(目標7–9)，並非自由策略(<10)。過度輸血無益且增風險。故至少維持Hb 7。", "options": {"A": "正確，Hb 至少維持 7。", "B": "9 為上緣非閾值。", "C": "10 為自由策略，不建議。", "D": "12 過高。"}, "sources": ["Surviving Sepsis Campaign 2016/2021", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-內科-80": {"quick": "嚴重心肌炎屬『低』心輸出休克，不會造成高心輸出量低血壓。", "detail": {"background": "『高心輸出量低血壓(暖)休克』見於血管擴張、SVR 低之狀態：敗血症、嚴重燒燙傷、肝衰竭、甲狀腺風暴、動靜脈瘻管等，心臟代償為高動力。嚴重心肌炎使心收縮力下降→『低』心輸出(冷)休克，故不會造成高輸出低血壓休克。", "options": {"A": "敗血症為高輸出。", "B": "正確(不會造成)：心肌炎為低輸出。", "C": "燒燙傷為高輸出。", "D": "肝衰竭為高輸出。"}, "sources": ["重症照護學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-內科-10": {"quick": "心因性休克為低心輸出，心臟指數(CI)應『下降』，CI>4 不可能。", "detail": {"background": "心因性休克為幫浦衰竭：收縮壓<90、心臟指數(CI)顯著『下降』(常<2.2)、PCWP 上升、四肢冰冷蛇紋皮膚、脈壓變窄、SvO2 下降。CI>4 屬高輸出狀態，與心因性休克之低輸出矛盾，故最不可能。", "options": {"A": "SBP<90 符合。", "B": "正確(最不可能)：CI>4 與低輸出矛盾。", "C": "蛇紋皮膚為灌流不足表現。", "D": "脈壓變窄符合。"}, "sources": ["重症血流動力學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-通論-1": {"quick": "心因性(心絞痛型)胸痛的特徵是『運動後加劇、休息緩解』。", "detail": {"background": "心因性(心絞痛型)胸痛特徵：勞動或情緒誘發、休息或硝化甘油緩解、悶壓緊縮感、可放射肩臂下顎。吸氣加劇之尖銳痛偏肋膜/心包性；飯後躺下加劇之灼熱痛偏胃食道逆流；夜間休息發作偏變異型心絞痛。故『運動後加劇』最符合心因性胸痛。", "options": {"A": "正確，運動誘發/加劇為心絞痛特徵。", "B": "吸氣尖銳痛偏肋膜性/心包炎。", "C": "飯後躺下偏GERD。", "D": "夜間發作非典型勞累型心絞痛。"}, "sources": ["Harrison's 缺血性心臟病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-外科-31": {"quick": "休克代償期使心收縮力增加、血糖上升的激素是腎上腺素(epinephrine)。", "detail": {"background": "休克代償期由交感-腎上腺髓質活化釋出『腎上腺素(epinephrine)』：β1 增加心收縮力與心率、促肝醣分解與糖質新生而升血糖。醛固酮/ADH 主保鈉保水、糖皮質固醇升糖但非主要正性肌力。故為腎上腺素。", "options": {"A": "醛固酮保鈉保水，非正性肌力。", "B": "ADH 保水縮血管。", "C": "糖皮質固醇升糖但非主要增收縮。", "D": "正確，腎上腺素增收縮力並升血糖。"}, "sources": ["生理學;休克代償", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-通論-13": {"quick": "情況緊急且病人為需緊急救治之未成年人，可不待親屬簽署同意書即裝置葉克膜。", "detail": {"background": "緊急醫療情況下，為挽救生命之必要處置(如心因性休克需葉克膜維生)得先行施行，不以取得書面同意為前提；無代理權或非主要照顧之親屬(小姑姑)之DNR 意見不能阻卻對未成年人之緊急救治，亦不必延誤等待父母簽署。故狀況緊急可先行救治。", "options": {"A": "小姑姑無代理權，其DNR不能阻卻緊急救治。", "B": "口頭同意非必要前提，且救治不能延誤。", "C": "緊急狀況不得等待父母到場簽署。", "D": "正確，緊急狀況可先行救治。"}, "sources": ["醫療法;緊急醫療救護原則", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-其他-11": {"quick": "偵測心輸出量的黃金標準是肺動脈導管(PAC)熱稀釋法。", "detail": {"background": "偵測心輸出量之黃金標準(參考方法)為『肺動脈導管(PAC)熱稀釋法』。脈波輪廓分析、經食道超音波(TEE)、經肺熱稀釋法為較少侵入之替代估算，但以PAC 熱稀釋為對照標準。", "options": {"A": "正確，PAC 熱稀釋法為黃金標準。", "B": "脈波分析為估算法。", "C": "TEE 為影像估算。", "D": "經肺熱稀釋為替代法。"}, "sources": ["重症血流動力學監測", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-兒科-20": {"quick": "敗血性休克充分輸液後，升壓劑維持 MAP≥65 mmHg。", "detail": {"background": "敗血性休克依Surviving Sepsis：初始給晶體30 mL/kg，充分輸液後仍低血壓則用升壓劑維持『平均動脈壓(MAP)≥65 mmHg』；第一線升壓劑為norepinephrine。故MAP 目標≥65。", "options": {"A": "120 過高。", "B": "105 過高。", "C": "90 非目標。", "D": "正確，MAP≥65 mmHg。"}, "sources": ["Surviving Sepsis Campaign", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-其他-69": {"quick": "過敏性休克的首選升壓/治療藥物是 epinephrine(腎上腺素)。", "detail": {"background": "過敏性休克(本題給抗生素後紅疹、血壓崩跌)之首選治療/升壓藥為『epinephrine(腎上腺素)』——兼具α縮血管、β1 強心、β2 支氣管擴張並抑制介質。Ephedrine、Milrinone(降壓)、Dobutamine 非首選。", "options": {"A": "Ephedrine 非首選。", "B": "正確，Epinephrine 為首選。", "C": "Milrinone 為強心擴血管劑，會降血壓。", "D": "Dobutamine 非過敏性休克首選。"}, "sources": ["過敏性休克處置指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-通論-5分科-45": {"quick": "嚴重心肌炎使心收縮力下降、心輸出量降低，屬心因性低血壓休克。", "detail": {"background": "依機轉分類：嚴重心肌炎使心收縮力下降、心輸出降低→『心因性』低血壓休克。敗血症、燒燙傷屬分布性/低血容(高輸出或容量不足)，嚴重胰臟炎屬低血容/分布性。故引發心輸出量降低之低血壓休克為嚴重心肌炎。", "options": {"A": "敗血症為分布性休克。", "B": "正確，心肌炎為心因性低輸出。", "C": "燒燙傷為低血容/分布性。", "D": "胰臟炎為低血容/分布性。"}, "sources": ["重症照護學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-兒科-38": {"quick": "『肺栓塞造成心臟填充減少』屬阻塞性休克，不是心因性休克的機轉，故敘述錯誤。", "detail": {"background": "青少年心因性休克=幫浦衰竭：持續低血壓(SBP<90 或MAP 低)、心律失常或心收縮無力、組織灌流不足與體液分配異常。『肺栓塞造成之心臟填充減少』屬『阻塞性』休克(與心包填塞同類)，非心因性休克之機轉，故該敘述錯誤。", "options": {"A": "SBP<90/MAP 低，符合。", "B": "心律不整或收縮無力，符合。", "C": "錯誤(本題答案)：肺栓塞屬阻塞性休克。", "D": "組織灌流/體液分配不均之描述。"}, "sources": ["小兒重症;休克分類", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-兒科-21": {"quick": "血壓低、CVP 高、ST 上升、心輸出下降、SVR 上升→心因性休克。", "detail": {"background": "術中血壓降至65/40、CVP 高(20)、EKG ST 上升、心輸出下降、全身血管阻力(SVR)上升→『心因性休克』(術中急性心肌缺血致幫浦衰竭，代償性SVR↑使四肢冰冷)。敗血性/過敏性SVR 下降、低血容CVP 下降，可資鑑別。", "options": {"A": "敗血性休克 SVR 通常下降。", "B": "低血容 CVP 應下降。", "C": "正確，CVP高+SVR高+ST上升為心因性。", "D": "過敏性休克 SVR 下降。"}, "sources": ["重症血流動力學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-兒科-19": {"quick": "敗血性休克輸液後仍低血壓，第一線升壓劑為 norepinephrine。", "detail": {"background": "嚴重感染(敗血)合併意識改變、MAP 52、輸液30 mL/kg 後仍低血壓→敗血性休克。依Surviving Sepsis，充分輸液後之第一線升壓劑為『norepinephrine』；次線加vasopressin 或epinephrine。dopamine 因心律不整風險不再為首選。", "options": {"A": "epinephrine 為次選。", "B": "dopamine 不再為首選(心律不整風險)。", "C": "正確，norepinephrine 為第一線。", "D": "vasopressin 為輔助而非第一線。"}, "sources": ["Surviving Sepsis Campaign", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-通論-麻醉-49": {"quick": "老年病人心房收縮(心房助推)與適當心率對維持心輸出量很重要。", "detail": {"background": "心輸出量＝每搏量×心率，且受心律影響。老年人心室順應性差、舒張充填仰賴心房收縮(atrial kick)與適當心率；心房顫動失去atrial kick 並心律不規則會明顯降低心輸出。心率過慢未必提高CO(CO=SV×HR)。故『老年人心房收縮與適當心率對維持CO 至關重要』正確。", "options": {"A": "心率過慢未必提高CO(CO=SV×HR)。", "B": "心房顫動會明顯影響CO，敘述錯誤。", "C": "正確，老年人心房收縮與適當心率關鍵。", "D": "心律會影響CO(如AF)，敘述錯誤。"}, "sources": ["心血管生理學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-外科-78": {"quick": "術後低心輸出(CO 2.2)、充填壓高(PAWP 22)、SVR 高、四肢冰冷→幫浦衰竭，優先給正性肌力藥 dobutamine。", "detail": {"background": "心臟術後數值：心輸出量低(CO 2.2)、充填壓高(PAWP 22、RAP 10)、SVR 高(1020)、四肢冰冷意識遲鈍→幫浦衰竭(心因性)。首要『增加心收縮力』給dobutamine(正性肌力)；nitroprusside 單純降後負荷、furosemide 利尿、labetalol 降收縮力於低CO 時皆非首選或有害。", "options": {"A": "nitroprusside 單純降後負荷，低CO時宜先強心。", "B": "正確，dobutamine 增加心收縮力。", "C": "furosemide 雖充填壓高但首要是強心改善CO。", "D": "labetalol 降心收縮力會惡化。"}, "sources": ["重症血流動力學;術後心臟照護", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-兒科-47": {"quick": "主動脈瓣『閉鎖不全』不會造成下肢血壓高於上肢，故配對錯誤(那是主動脈窄縮的表現)。", "detail": {"background": "先天性心臟病特殊徵象：開放性動脈導管(PDA)因舒張期分流致脈壓大、洪脈(bounding pulse)；心房中膈缺損(ASD)因右心容量負荷致『固定性第二心音分裂』；法洛氏四重症(TOF)因肺血流少呈靴型心(boot-shaped)。『主動脈瓣閉鎖不全使下肢血壓高於上肢』之配對錯誤(下肢>上肢見於主動脈窄縮等之Hill sign 或反向，非主動脈瓣逆流)。", "options": {"A": "PDA 出現洪脈，配對正確。", "B": "ASD 固定 S2 分裂，正確。", "C": "錯誤(本題答案)：主動脈瓣逆流非下肢血壓>上肢。", "D": "TOF 靴型心，正確。"}, "sources": ["小兒心臟學;Nelson Pediatrics", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-兒科-48": {"quick": "術後左下肢蒼白、冰冷、足背動脈摸不到→導管處『左下肢動脈阻塞』。", "detail": {"background": "經股動脈逆行心導管之常見併發症為導管側肢體動脈血栓/痙攣致急性缺血——表現6P(蒼白pallor、冰冷、無脈pulselessness、疼痛、感覺異常、麻痺)。本題術後右下肢正常但左下肢蒼白冰冷、足背動脈摸不到，即導管處左下肢動脈阻塞，須立即評估與處置。", "options": {"A": "傷口出血會見腫脹瘀血而非無脈缺血。", "B": "靜脈回流受阻會腫脹發紫非蒼白冰冷。", "C": "正確，導管側動脈阻塞致肢體缺血。", "D": "瓣膜再狹窄不會單側下肢缺血。"}, "sources": ["小兒心導管術後照護", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-兒科-49": {"quick": "毛地黃給藥前需測心跳，兒童心跳<80–90次/分應暫停給藥並通報。", "detail": {"background": "毛地黃(digoxin)治療指數窄之兒童衛教：固定時間給藥、給藥前測心尖脈一分鐘(兒童<80–90/分、嬰兒更高閾值應暫停並通報)、漏服勿補雙倍量；應防『低血鉀』(增中毒風險，非高鉀)、不與制酸劑併服(影響吸收)。本題『給藥前測心跳、過慢暫停』正確。", "options": {"A": "應防低血鉀(增中毒)，非避免高鉀，敘述顛倒。", "B": "正確，給藥前測心率，過慢應暫停。", "C": "不建議與制酸劑併用(影響吸收)。", "D": "漏服不可補雙倍量(中毒風險)。"}, "sources": ["小兒藥物衛教;digoxin", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-兒科-50": {"quick": "含黃體素之口服避孕藥宜小心使用，避免水分滯留加重心臟負荷。", "detail": {"background": "成年先天性心臟病(ACHD)女性生育諮詢需個別化：多數可懷孕但需風險評估(mWHO 分級)；嚴重肺高壓/艾森門格、嚴重心室功能不良等屬高風險不建議懷孕；warfarin 致畸但調整須專科評估(非貿然第一孕期減量)。含黃體素之口服避孕藥宜小心使用，避免水分滯留加重心臟負荷。", "options": {"A": "並非一律不建議懷孕，需個別評估。", "B": "NYHA I/II 多可耐受懷孕。", "C": "warfarin 調整需專科評估，非一律第一孕期減藥。", "D": "正確，含黃體素避孕藥需注意水分滯留。"}, "sources": ["ESC 成人先天性心臟病/妊娠指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-兒科-53": {"quick": "缺氧發作(Tet spell)應採『膝胸姿勢』而非復甦姿勢，故給予復甦姿勢為錯誤處置。", "detail": {"background": "法洛氏四重症(TOF)缺氧發作(Tet spell/hypoxic spell)處置：採『膝胸位』(屈膝抱胸，增加SVR、減少右至左分流、增肺血流)、給氧、嗎啡(鎮靜、減過度換氣)、輸液、必要時propranolol 或去氧腎上腺素(增SVR)、矯正酸中毒。『復甦姿勢(側臥)』非標準處置，故為錯誤。", "options": {"A": "錯誤(本題答案)：應採膝胸位而非復甦姿勢。", "B": "給氧正確。", "C": "嗎啡減過度換氣，正確。", "D": "propranolol 減右室出口痙攣，正確。"}, "sources": ["小兒心臟學;Tet spell 處置", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-兒科-41": {"quick": "TOF 的收縮期雜音來自『右心室出口狹窄』造成血流加速。", "detail": {"background": "法洛氏四重症(TOF)手術矯正前之收縮期雜音主要來自『右心室流出道/肺動脈瓣狹窄』造成血流加速；VSD 因為大缺損、左右壓力平衡反而雜音不明顯。狹窄越嚴重、肺血流越少、發紺越重，流出道雜音反可能變小(如缺氧發作時)。", "options": {"A": "主動脈跨位非雜音主因。", "B": "大型VSD 因壓力平衡雜音不明顯。", "C": "側枝循環非主因。", "D": "正確，右室流出道狹窄造成血流加速。"}, "sources": ["小兒心臟學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-兒科-43": {"quick": "下肢血氧低於右手(導管前後差異)→主動脈弓窄縮合併 PDA(差異性發紺)。", "detail": {"background": "主動脈弓窄縮合併開放性動脈導管(coarctation + PDA)：未飽和血經PDA 供應降主動脈，使導管後(下肢)血氧低於導管前(右手)，形成『差異性發紺』(右手SpO2 高、下肢低)。本題下肢90%、右手98%即此典型。完全動脈幹/TOF 為全身發紺、critical PS+PDA 亦多全身發紺。", "options": {"A": "truncus 為完全混合，無上下肢差異。", "B": "正確，coarctation+PDA 造成差異性發紺。", "C": "TOF 為全身發紺非局部差異。", "D": "critical PS+PDA 多為全身發紺。"}, "sources": ["新生兒危急型心臟病篩檢", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-兒科-44": {"quick": "VSD 已造成不良影響的指標是『體重增加不良(2個月仍4000克)』，反映心衰竭/餵食困難。", "detail": {"background": "大型心室中膈缺損(VSD)左至右分流致肺血流過多與心衰竭，臨床以『生長遲滯/體重不增』、呼吸快、餵食出汗、肝腫大表現。本題2個月仍僅約4000克(出生3400克)＝體重增加不良，提示VSD 已造成血流動力學不良影響。VSD 為非發紺型，發紫非典型。", "options": {"A": "正確，2個月僅增600克=生長遲滯，提示心衰竭。", "B": "呼吸32次/分屬正常。", "C": "肝1公分屬正常範圍。", "D": "VSD 非發紺型，發紫非典型。"}, "sources": ["小兒心臟學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-兒科-35": {"quick": "唐氏症最常見合併的先天性心臟病為心室中隔缺損(及心內膜墊缺損)。", "detail": {"background": "唐氏症(21三體)最常合併之先天性心臟病為房室中膈缺損(心內膜墊缺損，AVSD)與心室中膈缺損(VSD)。選項中以VSD 為正解。主動脈窄縮、肺動脈閉鎖、大動脈轉位非唐氏症典型。唐氏症新生兒應常規心臟超音波篩檢。", "options": {"A": "主動脈窄縮非唐氏症典型。", "B": "肺動脈閉鎖非典型。", "C": "大動脈轉位非典型。", "D": "正確，VSD(及心內膜墊缺損)最常見。"}, "sources": ["Nelson Pediatrics", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-兒科-49": {"quick": "危急型先天性心臟病的新生兒篩檢工具為『上下肢血氧飽和度』。", "detail": {"background": "危急型先天性心臟病(critical CHD)之新生兒篩檢以『脈衝式血氧儀』量測右手(導管前)與下肢(導管後)之SpO2 及其差異(差>3%或任一<90%為陽性)，簡便非侵入；心臟超音波為確診而非常規篩檢工具，胸部X光/心電圖非篩檢工具。", "options": {"A": "正確，上下肢血氧飽和度為篩檢工具。", "B": "心臟超音波為確診工具。", "C": "胸部X光非篩檢。", "D": "心電圖非篩檢工具。"}, "sources": ["新生兒 critical CHD 篩檢指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-兒科-52": {"quick": "下肢 SpO2 偏低、活力進食正常→大血管轉位(d-TGA)的差異性發紺表現。", "detail": {"background": "足月新生兒下肢SpO2 偏低、活力進食尚可，提示導管前後血氧差異——大動脈轉位(d-TGA)等並聯循環之差異性發紺。d-TGA 為導管依賴型，需以前列腺素E1 維持動脈導管開放以維持混合，並安排平衡術/矯正。VSD/PDA 單純不致此差異性發紺。", "options": {"A": "VSD 為非發紺型。", "B": "心內膜墊缺損非此表現。", "C": "正確，d-TGA。", "D": "PDA 單純不致此差異性發紺。"}, "sources": ["小兒心臟學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-兒科-45": {"quick": "典型法洛氏四重症因肺血流『減少』，胸部X光肺紋路不會增加。", "detail": {"background": "胸部X光肺紋路反映肺血流。典型法洛氏四重症(TOF)因右室流出道狹窄使肺血流『減少』，肺紋路不增加(呈靴型心)。其餘如右心室雙重出口無PS、VSD 中等左右分流、TGA+VSD 無PS 等肺血流增加，肺紋路增多。", "options": {"A": "正確，典型TOF 肺紋路減少。", "B": "DORV 無PS 肺血流增加。", "C": "VSD 左右分流肺血流增加。", "D": "TGA+VSD 無PS 肺血流增加。"}, "sources": ["小兒放射;先天性心臟病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-兒科-46": {"quick": "TOF 缺氧發作時不應給『降壓劑(Captopril)』，降低 SVR 會加重右至左分流。", "detail": {"background": "法洛氏四重症(TOF)缺氧發作處置原則為『增加SVR、減少右至左分流』：膝胸位、給氧、嗎啡、輸液、矯正酸中毒、β阻斷(減右室流出道痙攣)、必要時去氧腎上腺素。給予降壓劑(如Captopril)會降低SVR、加重右至左分流，屬禁忌，故為不適當。", "options": {"A": "給高濃度氧氣，適當。", "B": "矯正酸中毒，適當。", "C": "不適當(本題答案)：降壓降SVR會惡化分流。", "D": "持續低血氧可能需緊急手術，適當。"}, "sources": ["小兒心臟學;Tet spell", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-兒科-42": {"quick": "國內新生兒常規篩檢為:聽力、危急型先天性心臟病、先天性腎上腺增生(=134)。", "detail": {"background": "國內新生兒常規篩檢含：聽力篩檢、危急型先天性心臟病(脈衝式血氧)篩檢、與21項先天代謝/內分泌疾病(含先天性腎上腺增生症CAH)。常規血糖檢查非全面性篩檢項目。故正確為①聽力③critical CHD④CAH。", "options": {"A": "123 含血糖，非全面篩檢。", "B": "正確，1聽力3 critical CHD 4 CAH。", "C": "234 含血糖。", "D": "124 含血糖、漏 CAH。"}, "sources": ["國健署新生兒篩檢", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-兒科-47": {"quick": "TOF 缺氧發作應採膝胸位，給予『復甦姿勢』最不適當。", "detail": {"background": "同TOF 缺氧發作處置：應採『膝胸位』(增SVR、減右至左分流)，並給氧、嗎啡、propranolol、輸液。給予『復甦姿勢(側臥)』非標準缺氧發作處置，故最不適當。", "options": {"A": "最不適當(本題答案)：應膝胸位。", "B": "給氧正確。", "C": "嗎啡正確。", "D": "propranolol 正確。"}, "sources": ["小兒心臟學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-兒科-38": {"quick": "VSD 行肺動脈繃紮術(PAB)目的是『減少肺動脈血流』，敘述正確。", "detail": {"background": "先天性心臟病治療：PDA 用indomethacin 關閉(減肺血流)或心導管coil 栓塞關閉；大動脈轉位(TGA)用前列腺素E1『維持』(非關閉)動脈導管開放以維持混合；大量左右分流之VSD 可行肺動脈繃紮術(PAB)暫時限制肺血流、保護肺血管(目的為減少肺動脈血流)。故D 正確。", "options": {"A": "indomethacin 是關閉PDA、減肺血流，敘述錯誤。", "B": "coil 栓塞是關閉PDA，目的減肺血流非如述。", "C": "PGE1 是維持導管開放，非關閉。", "D": "正確，VSD PAB 減少肺動脈血流。"}, "sources": ["小兒心臟外科", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-兒科-39": {"quick": "PDA 大量左至右分流會增加肺血流，長期造成『左心』負荷與肺高壓;敘述以右心室肥大為主因者較不正確。", "detail": {"background": "開放性動脈導管(PDA)：早產、體重<1500g 發生率高；母親懷孕早期感染『德國麻疹(rubella)』(非一般麻疹)為常見致畸原因之一；大量左至右分流使肺血流增加、左心容量負荷、肺充血/肺高壓；極低體重有症狀者早期結紮可降併發症(如壞死性腸炎)。本題以右心室肥大為主因之敘述較不正確(主要為左心容量負荷)。", "options": {"A": "早產<1500g 發生率高，正確。", "B": "錯誤(本題答案)：是德國麻疹(rubella)非麻疹。", "C": "肺血流增加致肺充血(描述大致合理)。", "D": "極低體重有症狀者早期結紮，正確。"}, "sources": ["小兒心臟學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-兒科-40": {"quick": "TOF 合併心衰竭的治療目標是改善組織氧合。", "detail": {"background": "法洛氏四重症(TOF)合併心衰竭之治療目標為『改善組織氧合』與灌流、減少耗氧；不應增加後負荷或心臟工作負荷，過度補液亦可能有害。發紺型病童照護核心在維持氧合、避免缺氧發作與脫水。", "options": {"A": "增加後負荷會惡化，錯誤。", "B": "正確，改善組織氧合。", "C": "盲目增加體液量未必恰當。", "D": "增加心臟工作負荷錯誤。"}, "sources": ["小兒心衰竭照護", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-兒科-38": {"quick": "蹲姿可增加全身血管阻力(SVR)，減少右至左分流而改善缺氧。", "detail": {"background": "法洛氏四重症(TOF)兒童自行蹲踞(squatting)以緩解缺氧：蹲姿壓迫下肢動脈、增加全身血管阻力(SVR)與左心後負荷→減少經VSD 之右至左分流→更多血流進入肺循環氧合→改善發紺。此為TOF 之代償姿勢。", "options": {"A": "非單純增加周邊灌流。", "B": "非直接減少右室含氧血。", "C": "正確，增加SVR 減少右至左分流。", "D": "非減少肺換氣血量。"}, "sources": ["小兒心臟生理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-兒科-35": {"quick": "早產兒用 ibuprofen 關閉 PDA 的絕對禁忌為急性腎衰竭。", "detail": {"background": "早產兒以NSAID(ibuprofen/indomethacin)關閉PDA，其作用為抑制前列腺素合成；因經腎排除並影響腎血流，『急性腎衰竭』為絕對禁忌；活動性出血、壞死性腸炎、血小板低下亦為禁忌。頭部血腫等非絕對禁忌。", "options": {"A": "急性肝炎非絕對禁忌。", "B": "頭部血腫非絕對禁忌。", "C": "正確，急性腎衰竭為絕對禁忌。", "D": "帽狀腱膜下血腫非首要絕對禁忌。"}, "sources": ["新生兒藥物學;PDA 治療", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-兒科-76": {"quick": "發紺型CHD(TOF)童發燒、頭痛嘔吐、乳突水腫→腦膿瘍。", "detail": {"background": "發紺型先天性心臟病(如TOF)因右至左分流使靜脈血繞過肺部過濾，細菌可直達腦部，增『腦膿瘍』風險。臨床：發燒、顱內壓增高(頭痛、嘔吐、乳突水腫)、局部神經學徵與發炎指標上升。本題綜合表現指向腦膿瘍。", "options": {"A": "腦瘤非急性發燒發炎表現。", "B": "正確，發紺型CHD 易併腦膿瘍。", "C": "腦栓塞較不伴發炎指標升高與發燒。", "D": "心內膜炎以心臟表現為主。"}, "sources": ["小兒感染;發紺型CHD 併發症", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-兒科-40": {"quick": "10 天大新生兒、僅活力胃口稍差、血壓穩定，心電圖所示之心律失常先『觀察並密切監測生命徵象』。", "detail": {"background": "新生兒(10天)活力胃口稍差但血壓穩定、無休克，心電圖所示之心律情形可先『觀察並密切監測生命徵象』——血流動力學穩定者不急於藥物或整流。需結合附圖判讀心律型態(如部分良性心律或穩定型SVT)，不穩定才介入。", "options": {"A": "正確，血壓穩定先觀察密切監測。", "B": "adenosine 用於穩定型SVT，本題不需立即。", "C": "amiodarone 非首選。", "D": "血流動力學穩定不需立即整流。"}, "sources": ["小兒心律不整處置(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-兒科-41": {"quick": "2 年前矯正且無殘存分流的 VSD，不再需要感染性心內膜炎抗生素預防。", "detail": {"background": "感染性心內膜炎(IE)抗生素預防僅用於『高風險』者：人工瓣膜或瓣膜修補材料、曾患IE、未矯正之發紺型CHD、置換材料後6個月內、有殘存分流之修補處等。本題『2年前矯正且無殘存分流之VSD』已不屬高風險，不需預防，故為最不適當之給藥情境。", "options": {"A": "最不適當(本題答案)：已矯正無殘存分流不需預防。", "B": "關閉器植入近期(2月)仍需預防。", "C": "BT shunt+未矯正發紺需預防。", "D": "Glenn shunt 之單心室生理屬高風險需預防。"}, "sources": ["AHA 感染性心內膜炎預防指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-兒科-42": {"quick": "TOF 缺氧不適時兒童會自行採『蹲姿』改善。", "detail": {"background": "法洛氏四重症(TOF)兒童缺氧不適時自行採『蹲姿』——增加SVR、減少右至左分流、增加肺血流而改善發紺，為典型代償行為。抬高下肢、平躺、半坐臥皆不具此代償效果。", "options": {"A": "抬高下肢非典型代償。", "B": "正確，蹲姿。", "C": "平躺不改善。", "D": "半坐臥非此代償。"}, "sources": ["小兒心臟生理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-兒科-43": {"quick": "Tet spell 應『增加』鎮靜(如嗎啡)以減過度換氣，敘述『盡量減少鎮定劑』錯誤。", "detail": {"background": "TOF 缺氧發作(cyanotic spell)治療：採膝胸位增SVR、給氧、輸液、矯正酸中毒、β阻斷減右室流出道痙攣；嗎啡『鎮靜、減過度換氣』是治療一環(非盡量減少)。發作時流出道雜音可變小。故『盡量減少鎮定劑』之敘述錯誤。", "options": {"A": "錯誤(本題答案)：嗎啡鎮靜是治療一環，非盡量減少。", "B": "雜音變小、給氧，正確。", "C": "膝胸位增SVR 增肺血流，正確。", "D": "β-blocker 減右室流出道痙攣，正確。"}, "sources": ["小兒心臟學;Tet spell", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-兒科-29": {"quick": "支持 PPHN 的發現為:上下肢血氧差>10%、心臟超音波示肺動脈壓升高(=34)。", "detail": {"background": "新生兒持續性肺高壓(PPHN)：肺血管阻力居高不下→經卵圓孔/動脈導管之『右至左』分流、導管前後(上下肢)血氧差>10%、對100%氧反應差、心臟超音波示肺動脈壓升高、可見三尖瓣逆流。故支持診斷為③上下肢血氧差＋④肺動脈壓升高。", "options": {"A": "12 含『左向右分流』『對氧反應良好』皆與PPHN不符。", "B": "14 含對氧反應良好，錯誤。", "C": "23 含對氧反應良好，錯誤。", "D": "正確，3上下肢血氧差、4肺動脈壓升高。"}, "sources": ["新生兒PPHN", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-兒科-38": {"quick": "法洛氏四合症開心手術後常見傳導併發症為完全性房室傳導阻滯(complete AV block)。", "detail": {"background": "法洛氏四重症(TOF)修補手術因VSD 補片靠近房室傳導束，術後常見傳導併發症為『完全性房室傳導阻滯(complete AV block)』；心電圖見P波與QRS 無關聯、心室自主節律，可能需臨時或永久節律器。需配合原圖判讀。", "options": {"A": "sinus bradycardia 為P-QRS規則相關。", "B": "正確，完全性房室阻滯(P與QRS無關)。", "C": "一度AVB 僅PR延長。", "D": "二度AVB 為部分傳導。"}, "sources": ["小兒心臟外科併發症(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-兒科-39": {"quick": "先天性心臟病童並非應避免活性減毒疫苗(多數仍可接種)，故『應避免活性減毒疫苗』最不適當。", "detail": {"background": "先天性心臟病(CHD)童照護：依耐受度個別化體能活動(非全限制亦非全不限)；發紺型避免脫水(血液濃稠易血栓/中風)；細菌感染積極治療；多數CHD 童仍應按時接種(含活性減毒疫苗)，除非合併嚴重免疫缺損或特定情況。故『應避免活性減毒疫苗』最不適當。", "options": {"A": "依情況個別化活動，大致合理。", "B": "最不適當(本題答案)：CHD 童多數仍可接種活性疫苗。", "C": "細菌感染積極治療，正確。", "D": "發紺型避免脫水防中風，正確。"}, "sources": ["小兒預防接種;CHD 照護", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-兒科-41": {"quick": "新生兒發紺、給高濃度氧無改善、縱膈變窄→懷疑發紺型CHD(如TGA)，應立即心臟超音波並給 PGE1。", "detail": {"background": "新生兒純發紺、對高濃度氧反應差、無心雜音、胸部X光縱膈變窄(蛋型心)、肺血管稍多，提示導管依賴型發紺性CHD(如大動脈轉位TGA)；處置應立即心臟超音波確診並以前列腺素E1 維持動脈導管開放，再安排平衡術/矯正。心電圖/HRCT/單純dopamine 非對因首要處置。", "options": {"A": "ECG 幫助有限，非首要救命處置。", "B": "HRCT 非首要。", "C": "dopamine 未對因。", "D": "正確，超音波+PGE1 維持導管。"}, "sources": ["新生兒導管依賴型CHD", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-通論-72": {"quick": "聽診瓣膜區:A=主動脈區(右第2肋間)、D=二尖瓣區(心尖)為正確配對。", "detail": {"background": "心臟聽診四瓣膜區：主動脈區(右胸骨緣第2肋間)、肺動脈區(左胸骨緣第2肋間)、三尖瓣區(左下胸骨緣第4-5肋間)、二尖瓣區(心尖、左鎖骨中線第5肋間)。雜音於相應瓣膜區與血流方向最清楚(如二尖瓣逆流向左腋下、主動脈瓣狹窄向頸部)。本題A=主動脈、D=二尖瓣配對正確。", "options": {"A": "配對錯誤。", "B": "配對錯誤。", "C": "配對錯誤。", "D": "正確，A主動脈、D二尖瓣。"}, "sources": ["身體評估;心臟聽診", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-內科-63": {"quick": "二尖瓣逆流+低白蛋白→肺微血管靜液壓上升、血漿滲透壓下降，促成肺水腫。", "detail": {"background": "肺水腫由Starling 力失衡造成。嚴重二尖瓣逆流使左心房壓→肺靜脈與肺微血管靜液壓上升(液體外推)；血中白蛋白下降使血漿膠體滲透壓降低(回吸力減弱)，兩者皆促使液體滲入肺間質與肺泡。故為靜液壓上升＋滲透壓下降。", "options": {"A": "正確，靜液壓↑、滲透壓↓。", "B": "方向相反。", "C": "滲透壓應下降。", "D": "靜液壓應上升。"}, "sources": ["生理學;Starling 力", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-外科-73": {"quick": "僧帽瓣狹窄等待手術期間，利尿劑可減少左心房壓力與肺充血。", "detail": {"background": "僧帽瓣狹窄(MS)阻礙左房排空→左房壓上升、肺靜脈鬱血、肺充血與運動性呼吸困難，並易致左房擴大與心房顫動。等待手術期間以利尿劑降低左房壓與肺充血、控制心率(延長舒張充填)；MS 合併AF 須抗凝(warfarin)防左房血栓栓塞。單純aspirin 不足。", "options": {"A": "beta-blocker 是控制心率改善充填，非『減血管充血』。", "B": "正確，利尿劑降低左房壓與肺充血。", "C": "MS/AF 需 warfarin，aspirin 不足。", "D": "鈣阻斷『減右室壓』敘述不當。"}, "sources": ["瓣膜性心臟病處置", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-外科-75": {"quick": "風濕性瓣膜病同時侵犯小葉、纖維環與腱索，最常見造成僧帽瓣狹窄。", "detail": {"background": "風濕熱後遺以僧帽瓣最常受累，瓣葉增厚沾黏、交界融合、腱索縮短融合、瓣環鈣化，造成『魚口狀』僧帽瓣狹窄。同時侵犯小葉(leaflet)、纖維環(annulus)與腱索(chordae)之描述最符合風濕性僧帽瓣狹窄。主動脈瓣亦可受累，但以二尖瓣最常見。", "options": {"A": "正確，mitral stenosis 最常見。", "B": "MR 可見但非此題最常見。", "C": "AS 退化性居多。", "D": "AR 非風濕最典型。"}, "sources": ["Harrison's 瓣膜疾病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-內科-37": {"quick": "機械性人工瓣膜合併心房顫動，抗凝首選 warfarin 維持 INR 2.0–3.0。", "detail": {"background": "機械性人工瓣膜屬高血栓風險，且合併心房顫動更甚，抗凝必須用維生素K 拮抗劑warfarin(僧帽瓣機械瓣目標INR 2.5–3.5、主動脈瓣2.0–3.0)，並禁用直接口服抗凝劑(NOAC，如dabigatran，RE-ALIGN 顯示機械瓣使用dabigatran 血栓與出血皆增)。單純抗血小板不足以保護機械瓣。", "options": {"A": "aspirin 不足以保護機械瓣。", "B": "機械瓣禁用 dabigatran。", "C": "正確，warfarin INR 2.0–3.0。", "D": "雙抗血小板非機械瓣標準。"}, "sources": ["ACC/AHA 瓣膜性心臟病指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-外科-65": {"quick": "機械性僧帽瓣置換用 warfarin，應避免合併 aspirin 及 NSAID(增加出血)。", "detail": {"background": "機械性瓣膜置換後需終身warfarin 抗凝、定期監測PT/INR(非aPTT)；維生素K 含量高之食物應『穩定』攝取(非D)；避免合併aspirin/NSAID 疊加出血(除非特定適應症)；瓣膜功能評估以心臟超音波而非常規MRI。故『避免aspirin/NSAID』正確。", "options": {"A": "非常規 MRI。", "B": "應監測 PT/INR 非 aPTT。", "C": "應注意維生素K非維生素D。", "D": "正確，避免 aspirin/NSAID。"}, "sources": ["機械瓣抗凝衛教", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-外科-34": {"quick": "warfarin 交互作用衛教正確組合為 13(spironolactone 與口服避孕藥需監測 PT 調整)。", "detail": {"background": "warfarin 受眾多藥物與食物影響需監測PT/INR：增強抗凝(出血風險↑)者如某些抗生素、amiodarone、保健品(銀杏、紅麴)；維生素K(深綠蔬菜)會『降低』藥效。spironolactone、口服避孕藥等亦有交互作用需監測PT 調整。維生素K 應監測PT 非aPTT。本題正確組合為①③。", "options": {"A": "正確(13)。", "B": "含維生素K監測aPTT之錯誤敘述。", "C": "組合不符。", "D": "組合不符。"}, "sources": ["warfarin 交互作用", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-通論-39": {"quick": "二尖瓣逆流為『全收縮期(holosystolic)』雜音，敘述為『收縮中期』錯誤。", "detail": {"background": "二尖瓣逆流(MR)之心雜音特徵：心尖部『全收縮期(holosystolic/pansystolic)』雜音、放射至左腋下、中高頻吹風樣，常合併第一心音減弱與第三心音(S3，反映容量負荷)。本題『收縮中期』之敘述錯誤(收縮中期噴射雜音較像主動脈瓣狹窄)。", "options": {"A": "心尖、放射左腋下，正確。", "B": "中高頻雜音，正確。", "C": "錯誤(本題答案)：應為全收縮期非收縮中期。", "D": "常合併 S1 減弱與 S3，正確。"}, "sources": ["心臟聽診學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-其他-71": {"quick": "主動脈瓣狹窄麻醉須避免全身血管阻力(SVR)突然下降。", "detail": {"background": "主動脈瓣狹窄(AS)為固定後負荷、左心室肥厚、舒張功能差，麻醉原則『維持竇性心律、足夠前負荷、足夠後負荷(SVR)、避免心搏過速與過緩、避免心肌抑制』。SVR 突然下降會使冠脈灌流不足、低血壓難代償而循環崩潰，故須避免。嚴重AS 常需動脈導管監測，區域麻醉(交感阻斷降SVR)風險高。", "options": {"A": "正確，避免 SVR 驟降。", "B": "嚴重AS常需動脈導管監測。", "C": "心搏過速縮短充填，不利。", "D": "區域麻醉降SVR風險高，非優先。"}, "sources": ["心臟麻醉學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-麻醉-43": {"quick": "主動脈瓣狹窄誘導期應維持正常竇性心律，以利心室充填與搏出。", "detail": {"background": "主動脈瓣狹窄誘導期須維持正常竇性心律——AS 之左心室肥厚、順應性差，仰賴心房收縮(atrial kick)貢獻舒張末充填(可達30–40%)；失去竇性律(如AF)或心搏過速縮短充填時間，會明顯降低心輸出。並須維持前負荷與SVR、避免心肌抑制。", "options": {"A": "降SVR不利冠脈灌流。", "B": "正確，維持竇性心律。", "C": "降心收縮力不利。", "D": "AS 不宜減少前負荷。"}, "sources": ["心臟麻醉學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-外科-44": {"quick": "僧帽瓣逆流常見:全收縮期雜音、肺充血咳嗽(=13)。", "detail": {"background": "二尖瓣逆流(MR)常見表現：心尖全收縮期雜音(放射左腋下)、左房左室擴大、肺靜脈鬱血(咳嗽、肺充血、運動性呼吸困難)、慢性可併AF。舒張期雜音、頸靜脈怒張肝腫大屬右心/其他病變。故①(全收縮期雜音)＋③(肺充血咳嗽)為MR 表徵。", "options": {"A": "正確，1全收縮期雜音、3肺充血咳嗽。", "B": "含頸靜脈怒張肝腫大(右心),非典型。", "C": "含舒張期雜音，錯誤。", "D": "組合不符。"}, "sources": ["瓣膜性心臟病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-內科-57": {"quick": "草綠色鏈球菌(viridans)感染性心內膜炎，首選 penicillin G。", "detail": {"background": "草綠色鏈球菌(viridans streptococci)為亞急性自體瓣膜心內膜炎常見致病菌(口腔來源)，對penicillin 敏感者首選penicillin G(±aminoglycoside 增效，療程約4週)。MRSA/腸球菌或盤尼西林過敏才用vancomycin；cefazolin/clindamycin 非viridans 心內膜炎首選。", "options": {"A": "cefazolin 非首選。", "B": "正確，penicillin G。", "C": "clindamycin 非首選。", "D": "vancomycin 用於抗藥/過敏。"}, "sources": ["AHA 感染性心內膜炎治療指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-麻醉-33": {"quick": "二尖瓣逆流改善心輸出的處置為:增加心跳、減少後負荷。", "detail": {"background": "二尖瓣逆流(MR)血流動力學目標『快、滿、鬆(fast, full, forward)』：適度增加心率(縮短逆流時間)、維持前負荷、降低後負荷(增加前向搏出)。增加後負荷(SVR)會加重逆流入左房、減少前向心輸出，故改善心輸出應『增心率＋減後負荷』。", "options": {"A": "降心跳延長逆流時間，不利。", "B": "增加後負荷加重逆流。", "C": "正確，增心跳+減後負荷。", "D": "增後負荷不利。"}, "sources": ["心臟麻醉學;瓣膜生理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-外科-35": {"quick": "運動時暈厥+收縮中期噴射雜音+脈壓變窄+S3→主動脈瓣狹窄。", "detail": {"background": "主動脈瓣狹窄(AS)三大症狀為心絞痛、暈厥(尤運動時)、心衰竭(呼吸困難)，出現症狀後預後明顯變差(平均存活2–5年)。體徵：主動脈區收縮中期噴射雜音放射頸部、脈搏緩升小弱(pulsus parvus et tardus)、脈壓變窄、S4，嚴重者可S3。運動暈厥＋這些體徵指向AS。", "options": {"A": "正確，aortic valve(AS)。", "B": "二尖瓣非此表現。", "C": "三尖瓣非此表現。", "D": "肺動脈瓣非此表現。"}, "sources": ["瓣膜性心臟病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-外科-36": {"quick": "瓣膜置換手術前 warfarin 須停用、INR 降至<1.5 才安全手術。", "detail": {"background": "瓣膜置換手術前需停用warfarin 並橋接，使INR 降至<1.5 方可安全手術；監測PT/INR(非aPTT)。機械瓣置換後抗凝目標較高(僧帽瓣INR 約2.5–3.5)，非2.0；術後恢復warfarin 之時機依出血風險個別決定，非硬性2–3天。", "options": {"A": "應監測 PT/INR 非 aPTT。", "B": "正確，INR<1.5 才安全手術。", "C": "恢復時機依出血風險,非硬性2~3天。", "D": "僧帽瓣機械瓣 INR 目標較高(約2.5–3.5)。"}, "sources": ["瓣膜手術圍術期抗凝", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-外科-75": {"quick": "機械瓣病人發生危及生命的消化道大出血、血流不穩，仍堅持『不能停抗凝劑』是錯誤處置。", "detail": {"background": "機械瓣病人發生危及生命之大出血(本題消化道大出血、血流不穩)，原則上應『暫停並逆轉抗凝』(維生素K、凝血酶原複合物PCC)、輸血穩定，待出血控制再橋接恢復；不可因瓣膜血栓顧慮而堅持不停抗凝、坐視致命出血。短期停藥之瓣膜血栓風險相對可控。", "options": {"A": "輸液輸血禁食，適當。", "B": "錯誤(本題答案)：致命出血應暫停/逆轉抗凝。", "C": "放鼻胃管初步判斷上消化道出血，適當。", "D": "肛診評估出血型態,適當。"}, "sources": ["消化道出血合併抗凝處置", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-麻醉-37": {"quick": "嚴重主動脈瓣狹窄全身麻醉時，應迅速補充失血量以維持足夠血管內容積。", "detail": {"background": "嚴重主動脈瓣狹窄(AS)全身麻醉須維持足夠血管內容積與前負荷、維持SVR 與竇性律、避免心搏過速/過緩與心肌抑制。失血應即時補充以維持充填壓與冠脈灌流，避免低血容導致低心輸出與循環崩潰。頭痛腳麻、追求心率>100、過度降血管張力與收縮力皆不當。", "options": {"A": "頭痛腳麻背痛非AS典型。", "B": "心率>100 縮短充填不利。", "C": "過度降血管張力與收縮力危險。", "D": "正確，迅速補充失血維持容積。"}, "sources": ["心臟麻醉學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-內科-58": {"quick": "腸球菌(Enterococcus)心內膜炎不能用第一代頭孢(cefazolin)，敘述錯誤。", "detail": {"background": "感染性心內膜炎要點：靜脈藥癮者多右側(三尖瓣)贅生物、致病菌常為金黃色葡萄球菌；約5–15%血液培養陰性(常因先前抗生素或苛養菌)；Duke criteria 用於診斷。腸球菌(Enterococcus)對頭孢子素『天然抗藥』，不能用cefazolin，需ampicillin＋aminoglycoside 或vancomycin。故C 敘述錯誤。", "options": {"A": "藥癮者三尖瓣贅生物多為 S. aureus，正確。", "B": "5–15% 血培養陰性，正確。", "C": "錯誤(本題答案)：腸球菌不能用cefazolin。", "D": "Duke criteria 之主要條件，正確。"}, "sources": ["AHA 感染性心內膜炎指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-通論-其他-80": {"quick": "心尖柔軟高頻收縮期雜音+疲累、夜間陣發性呼吸困難→二尖瓣逆流。", "detail": {"background": "心尖部柔軟、高頻之全收縮期雜音合併疲累、夜間陣發性呼吸困難，提示二尖瓣逆流(MR)致左心容量負荷與肺靜脈鬱血。主動脈瓣逆流(AR)為舒張期雜音、AS 為主動脈區噴射收縮期雜音、MS 為心尖舒張期隆隆雜音，可資鑑別。", "options": {"A": "AR 為舒張期雜音。", "B": "AS 為噴射收縮期雜音於主動脈區。", "C": "正確，二尖瓣逆流。", "D": "MS 為舒張期隆隆雜音。"}, "sources": ["瓣膜性心臟病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-內科-32": {"quick": "二尖瓣脫垂聽診為收縮中期喀喇聲，不會有『固定性分裂音』(那是 ASD)。", "detail": {"background": "二尖瓣脫垂(MVP)：女性常見、多數無症狀不需治療，聽診為收縮『中期喀喇聲(mid-systolic click)』，可伴收縮末期雜音(若合併逆流)；站立/Valsalva 使click 提前。『固定性第二心音分裂(fixed splitting of S2)』是心房中膈缺損(ASD)之特徵，非MVP，故該敘述錯誤。", "options": {"A": "女性較常見，正確。", "B": "無症狀多不需治療，正確。", "C": "收縮中期 click，正確。", "D": "錯誤(本題答案)：固定分裂音為ASD非MVP。"}, "sources": ["瓣膜性心臟病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-麻醉-50": {"quick": "二尖瓣逆流術中『快速增加後負荷』錯誤(會加重逆流)。", "detail": {"background": "二尖瓣逆流(MR)術中血流動力目標：維持竇性心率偏快(80以上)、足夠前負荷、『降低』後負荷以利前向搏出；低血壓首選ephedrine。快速『增加』後負荷會加重逆流、降低前向心輸出，故為錯誤目標。", "options": {"A": "維持 NSR 80↑，合理。", "B": "錯誤(本題答案)：增加後負荷加重逆流。", "C": "維持足夠前負荷，正確。", "D": "低血壓首選 ephedrine，正確。"}, "sources": ["心臟麻醉學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-家庭-51": {"quick": "運動性呼吸喘、靜態檢查與BNP皆正常→安排運動壓力測試心電圖找出勞動性缺血/心因。", "detail": {"background": "運動性呼吸喘但靜息檢查(理學、X光、肺功能、BNP/NT-proBNP)皆正常時，宜安排『運動壓力測試心電圖』於運動誘發下評估有無心肌缺血或勞動相關心因。可運動且基礎心電圖可判讀者為首選；無法運動或基礎ST異常者改藥物負荷影像。", "options": {"A": "TEE 偏侵入,非首選下一步。", "B": "6分鐘行走測功能,診斷力有限。", "C": "正確，運動壓力測試心電圖。", "D": "Holter 適用心律事件而非勞動喘。"}, "sources": ["運動心臟學;胸悶/喘評估", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-家庭-58": {"quick": "主動脈瓣狹窄聽到收縮期(噴射性)心雜音，為正確敘述。", "detail": {"background": "心音與瓣膜：主動脈瓣狹窄為主動脈區『收縮期』噴射雜音放射頸部(正確)；二尖瓣逆流為心尖『收縮期』雜音(非舒張期)；主動脈瓣逆流/二尖瓣狹窄才為舒張期雜音；心室中膈缺損為收縮期雜音(非舒張期)。故C 正確。", "options": {"A": "MR 為收縮期非舒張期，錯誤。", "B": "敘述不當。", "C": "正確，AS 為收縮期雜音。", "D": "VSD 為收縮期雜音，敘述錯誤。"}, "sources": ["心臟聽診學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-麻醉-78": {"quick": "主動脈瓣狹窄麻醉不應『降低 SVR』(會減少冠脈灌流)，故為錯誤目標。", "detail": {"background": "主動脈瓣狹窄(AS)麻醉目標：維持竇性律避免心搏過速、維持較高左心室充填壓(LVEDP/前負荷)、『維持SVR』以保冠脈灌流、避免抑制心肌收縮。降低SVR 會使冠脈灌流不足、低血壓難代償，屬禁忌，故『降低SVR 以利心輸出』之敘述錯誤。", "options": {"A": "維持竇性律避免過快，正確。", "B": "需較高 LVEDP，正確。", "C": "錯誤(本題答案)：降SVR不利冠脈灌流。", "D": "避免抑制收縮力，正確。"}, "sources": ["心臟麻醉學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-兒科-8": {"quick": "發燒、指甲夾板狀出血(splinter)、主動脈瓣舒張期雜音→細菌性心內膜炎。", "detail": {"background": "感染性心內膜炎(IE)臨床：持續發燒、新發/變化之瓣膜雜音(本題主動脈瓣舒張期雜音)、發炎指標升高，並有周邊免疫血管現象——指甲下夾板狀出血(splinter)、Janeway 病灶(掌足無痛斑)、Osler 結節(指尖有痛結節)、Roth spots(視網膜白心出血)。本題綜合表現指向細菌性心內膜炎。", "options": {"A": "腹膜炎以腹部表現為主。", "B": "心肌炎無瓣膜贅生物雜音與周邊栓塞徵。", "C": "心包炎以摩擦音與胸痛為主。", "D": "正確，細菌性心內膜炎。"}, "sources": ["AHA 感染性心內膜炎", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-內科-27": {"quick": "主動脈瓣狹窄典型三症狀為心絞痛、暈厥、運動性呼吸困難;『心律不整』非典型，敘述錯誤。", "detail": {"background": "主動脈瓣狹窄(AS)典型三聯症狀：心絞痛、暈厥(尤運動時)、勞動性呼吸困難(心衰竭)，反映固定後負荷下心肌供需失衡與心輸出受限。心律不整非AS 之定義性典型症狀(晚期可有AF/傳導問題)，故該敘述錯誤。", "options": {"A": "活動時呼吸困難,典型。", "B": "錯誤(本題答案)：心律不整非AS典型三症狀。", "C": "心絞痛,典型。", "D": "昏厥,典型。"}, "sources": ["瓣膜性心臟病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-內科-29": {"quick": "感染性心內膜炎可見足底無痛性斑點狀出血(Janeway 病灶)。", "detail": {"background": "感染性心內膜炎周邊徵：Janeway 病灶為掌/足底『無痛』出血斑(栓塞性)；Osler 結節為指趾尖『有痛』結節(免疫性)；Roth spots 為視網膜白心出血；splinter hemorrhage 為指甲下線狀出血。診斷影像以經食道超音波(TEE)敏感度高於經胸(TTE)。故『足底無痛斑點(Janeway)』正確。", "options": {"A": "正確，足底無痛斑點(Janeway)。", "B": "TEE 靈敏度高於 TTE，敘述顛倒。", "C": "Osler 結節為『有痛』，敘述錯誤。", "D": "Roth spots 為白心出血,描述不全。"}, "sources": ["AHA 感染性心內膜炎", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-家庭-67": {"quick": "勞動性喘、提重物時暈厥、apical heave、主動脈瓣區收縮期雜音→主動脈瓣狹窄。", "detail": {"background": "主動脈瓣狹窄(AS)：勞動性呼吸困難、勞動時暈厥、心絞痛三大症狀；體徵左心室肥厚(apical heave/抬舉)、主動脈區收縮期噴射雜音放射頸部、S4(心室僵硬)，嚴重者脈搏緩升小弱、脈壓窄。本題綜合表現符合AS。", "options": {"A": "肺栓塞無此瓣膜雜音與勞動暈厥史。", "B": "正確，主動脈瓣狹窄。", "C": "MR 為心尖全收縮期雜音。", "D": "下壁/右室心梗以胸痛缺血表現為主。"}, "sources": ["瓣膜性心臟病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-外科-79": {"quick": "人工瓣膜:機械瓣易致凝血異常引發腦中風、早期人工瓣心內膜炎多為葡萄球菌(=24)。", "detail": {"background": "人工瓣膜：機械瓣耐久但需終身warfarin 抗凝，出血與血栓栓塞(中風)風險高，不適合育齡婦女(warfarin 致畸＋出血)；生物瓣耐久性較差但抗凝需求低，較適合育齡婦女或不宜抗凝者。術後金屬瓣有正常喀喇聲(非感染)；早期(術後<60天)人工瓣心內膜炎多為葡萄球菌。故②④正確。", "options": {"A": "含機械瓣適合育齡婦女(錯誤)。", "B": "組合不符。", "C": "含術後雜音表感染(錯誤)。", "D": "正確，2機械瓣致中風、4早期PVE多葡萄球菌。"}, "sources": ["人工瓣膜照護;PVE", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-外科-80": {"quick": "TAVR 適應於有症狀的重度主動脈瓣狹窄、且預期術後存活>12 個月者。", "detail": {"background": "經導管主動脈瓣置換術(TAVR)適應於『有症狀之重度主動脈瓣狹窄』，且預期術後存活>12個月者；依手術風險(高/中/低)與心臟團隊評估選擇TAVR 或外科換瓣(SAVR)。無症狀中度AS、預期壽命過短或單純血流動力不穩未經評估者非適應。", "options": {"A": "血流動力不穩之危急狀態需先穩定。", "B": "中度無症狀AS非適應。", "C": "敘述不完整(需評估)。", "D": "正確，有症狀重度AS且存活>12月。"}, "sources": ["ACC/AHA 瓣膜性心臟病指引;TAVR", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-通論-16": {"quick": "意識清楚的慢性低血鈉病人,直接用 3% NaCl 快速補到正常最不適當(滲透性脫髓鞘風險);應先核對用藥與評估病因。", "detail": {"background": "慢性低血鈉(尤其意識清楚、症狀輕)矯正須緩慢，每日上升不超過約8–10 mEq/L，過快以高張(3%)鹽水拉回正常會引起滲透性脫髓鞘症候群(橋腦中央髓鞘溶解)。初步應評估病因：核對藥物(利尿劑、SSRI 等)、測血漿與尿液滲透壓及尿鈉/FENa、評估容量狀態與內分泌(甲狀腺、腎上腺)。僅嚴重症狀性低血鈉(抽搐、昏迷)才考慮謹慎給予高張鹽水。", "options": {"A": "檢測滲透壓與FENa評估病因，恰當。", "B": "最不適當(本題答案)：快速3%NaCl拉到正常有脫髓鞘風險。", "C": "核對藥物史找低血鈉原因，恰當。", "D": "檢查甲狀腺/腎上腺功能，恰當。"}, "sources": ["低血鈉處置;滲透性脫髓鞘症候群", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-通論-35": {"quick": "血流動力學穩定的心房顫動可給予 diltiazem 控制心室率。", "detail": {"background": "血流動力學穩定之心房顫動以『控制心室率』為先；非二氫吡啶鈣阻斷劑(diltiazem/verapamil)或β阻斷劑為首選。僅在不穩定(低血壓、缺血、急性心衰、意識改變)時才行同步整流電擊。adenosine 半衰期極短、對心房顫動無效(僅暫時阻斷房室結)；MgSO4 用於torsades。新發AF>48小時整流前須評估抗凝。", "options": {"A": "正確，穩定AF可用 diltiazem 控制心率。", "B": "穩定者不需立即去顫電擊。", "C": "MgSO4 用於torsades非AF。", "D": "adenosine 用於陣發性SVT非AF。"}, "sources": ["ACLS;心房顫動處置", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-內科-37": {"quick": "運動時即喘、爬二樓就無法續行(輕於日常的活動即症狀)→NYHA 第三級。", "detail": {"background": "NYHA 功能分級依症狀與活動受限程度：I 無症狀；II 日常活動會症狀但仍可完成；III 輕於日常之活動即症狀、明顯受限；IV 休息即有症狀。本題散步後即喘、爬二樓無法續行屬輕度活動受限之第III 級。分級用於評估嚴重度、指引治療強度與預後。", "options": {"A": "I 無症狀,不符。", "B": "II 日常活動症狀,本題更重。", "C": "正確，III 輕度活動即症狀。", "D": "IV 休息即症狀,本題尚可休息緩解。"}, "sources": ["NYHA 功能分級", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-內科-38": {"quick": "心衰竭合併心房顫動,優先靜脈給 amiodarone。", "detail": {"background": "心衰竭合併快速心室率之心房顫動，藥物選擇須兼顧負性肌力風險：amiodarone 兼具控率與整流且對收縮力影響小，於低EF/失代償者較安全；β阻斷與CCB 在急性失代償時可能惡化；dopamine 增快心率不利；adenosine 對AF 無效。故優先靜脈amiodarone。", "options": {"A": "正確，amiodarone 適合HF併AF。", "B": "dopamine 會增快心率不利。", "C": "nitroglycerin 非控率藥。", "D": "adenosine 用於SVT非AF。"}, "sources": ["ACLS;HF併AF", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-通論-6": {"quick": "家屬表示不積極治療時,最恰當是轉知醫師、必要時協助再次說明病況。", "detail": {"background": "面對家屬表達不積極治療之意願，專師角色為促進醫病溝通與確認理解，而非自行勸阻或斷言預後。最恰當為轉知主治醫師、必要時協助安排家庭會議再次說明病情與治療選項，並尊重病人自主與預立醫療照護(ACP)精神。", "options": {"A": "直接勸不要放棄,未尊重意願。", "B": "斷言末期必經,不恰當。", "C": "再次解釋雖可,但角色應轉知醫師協調。", "D": "正確，轉知醫師並協助再次說明。"}, "sources": ["安寧緩和;醫病溝通", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-內科-38": {"quick": "心衰竭時 BNP 通常『上升』而非下降，故敘述不正確。", "detail": {"background": "心衰竭之神經內分泌活化使交感(norepinephrine)、腎素-血管張力素-醛固酮系統(aldosterone)、發炎細胞激素(TNF-α)上升；心室壁張力增加促使心肌分泌BNP/NT-proBNP『上升』，作為診斷、嚴重度與預後指標。故『BNP 下降』之敘述不正確。這些代償長期反成惡性循環，是HFrEF 神經內分泌阻斷治療的理論基礎。", "options": {"A": "norepinephrine 上升,正確。", "B": "aldosterone 上升,正確。", "C": "不正確(本題答案)：BNP 應上升。", "D": "TNF-α 上升,正確。"}, "sources": ["心衰竭病理生理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-內科-73": {"quick": "毛地黃中毒引起的心律異常不適合用 quinidine(會升高 digoxin 濃度、惡化)。", "detail": {"background": "毛地黃中毒之心律處置：停藥、矯正電解質(尤其低鉀、低鎂會加重毒性)、緩脈用atropine、室性心律用lidocaine 或phenytoin、嚴重危及生命者用digoxin 特異抗體(Fab)。quinidine 會置換組織結合並抑制腎清除而『升高』digoxin 血中濃度，使中毒惡化，故不適合。", "options": {"A": "atropine 用於緩脈,可用。", "B": "lidocaine 用於室性心律,可用。", "C": "phenytoin 可用於digoxin相關心律。", "D": "不適合(本題答案)：quinidine 升高digoxin濃度。"}, "sources": ["毛地黃中毒處置", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-通論-12": {"quick": "血流動力學穩定的心房顫動可給予 diltiazem 控制心室率。", "detail": {"background": "同穩定型心房顫動處置：先控制心室率(diltiazem/β阻斷)，不穩定才同步整流；adenosine 對AF 無效，MgSO4 用於torsades。本題血流動力穩定，給予diltiazem 控率最適當。", "options": {"A": "adenosine 對AF無效。", "B": "MgSO4 用於torsades。", "C": "穩定者不需立即電擊。", "D": "正確，diltiazem 控制心率。"}, "sources": ["ACLS;心房顫動", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-內科-13": {"quick": "長期服 digoxin 出現無力、呼吸困難,需警覺毛地黃中毒,常合併高血鉀。", "detail": {"background": "長期服digoxin 出現倦怠、食慾不振、噁心、視覺異常(黃綠視)、心律不整需高度懷疑毛地黃中毒。急性中毒抑制Na-K-ATP 酶使細胞外鉀上升(高血鉀，且與預後相關)；慢性中毒常於低鉀/低鎂/腎功能不良時誘發。治療含矯正電解質、處理心律、必要時給digoxin 抗體。", "options": {"A": "高血鈉非digoxin中毒特徵。", "B": "高血磷非特徵。", "C": "高血鈣非特徵。", "D": "正確，急性digoxin中毒可致高血鉀。"}, "sources": ["毛地黃中毒", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-內科-33": {"quick": "EF 高達 74%、竇性頻脈的年輕女性,『缺血性心臟病』最不可能(IHD 多使EF下降)。", "detail": {"background": "年輕女性、心搏快、左心室射出分率(EF)高達74%、心輕度擴大，提示『高輸出狀態』——常見於貧血、甲狀腺功能亢進、維生素B1 不足(腳氣病)、動靜脈瘻管等，心臟為代償而高動力收縮。缺血性心臟病通常使收縮功能(EF)下降，與本題高EF 不符，故最不可能。", "options": {"A": "最不可能(本題答案)：IHD 多使EF下降。", "B": "慢性貧血為高輸出,可致此表現。", "C": "甲亢為高輸出。", "D": "維生素B不足(腳氣病)為高輸出。"}, "sources": ["高輸出性心衰竭", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-通論-43": {"quick": "持續性心衰竭造成下肢水腫的主要機轉是『靜脈壓增加』。", "detail": {"background": "持續性(右/全心)心衰竭造成下肢水腫之主要機轉為體循環靜脈鬱血、靜脈與微血管靜液壓上升，使液體外滲至組織。低白蛋白(膠體滲透壓下降)、微血管通透性增加、淋巴回流受阻為其他水腫機轉，但本題以『靜脈壓增加』為主因。", "options": {"A": "正確，靜脈壓增加。", "B": "血漿蛋白應下降才致水腫。", "C": "淋巴流量增加會減少水腫。", "D": "通透性增加(非降低)才致水腫。"}, "sources": ["水腫生理學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-通論-44": {"quick": "與年長心衰竭病人溝通,最適當是放慢說明並確認其理解。", "detail": {"background": "與年長心衰竭病人之治療性溝通原則：尊重、放慢語速、使用淺顯語言、確認其理解(回覆示教/teach-back)，避免責備或否定其情緒與飲食習慣。確認理解最能促進自我照護遵從(限鹽、限水、每日量體重)。", "options": {"A": "責備擔心沒用,不當。", "B": "指責吃太鹹,不當。", "C": "正確，放慢說明並確認聽懂。", "D": "評估問句雖好,但本題最佳為確認理解之溝通態度。"}, "sources": ["治療性溝通", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-內科-35": {"quick": "furosemide 可能造成低血鈣或高尿酸血症，敘述正確。", "detail": {"background": "心衰竭藥物安全：環形利尿劑furosemide 可致低鉀、低鈉、低鈣、低鎂、高尿酸與代謝性鹼中毒；ACEI/ARB 致畸、孕婦禁用；β阻斷(carvedilol 等)降低HFrEF 死亡率(非增加)；鈣離子阻斷劑不降低心衰死亡率(部分non-DHP 於HFrEF 有害)。故『furosemide 可致低血鈣/高尿酸』正確。", "options": {"A": "正確，furosemide 致低血鈣/高尿酸。", "B": "ACEi 致畸,孕婦禁用。", "C": "carvedilol 降死亡率,應使用。", "D": "CCB 不降HF死亡率。"}, "sources": ["心衰竭藥物學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-通論-38": {"quick": "鬱血性心衰竭之肋膜積水為『漏出液』:蛋白比<0.5、LDH 比<0.6(=24)。", "detail": {"background": "鬱血性心衰竭之肋膜積液為『漏出液』(transudate)。Light's criteria：符合下列任一即滲出液——胸水/血清蛋白比>0.5、胸水/血清LDH 比>0.6、胸水LDH>正常上限2/3。漏出液則比重低(<1.016)、蛋白比<0.5、LDH 比<0.6、葡萄糖正常。本題以②④(蛋白比<0.5、LDH 比<0.6)為漏出液特徵。", "options": {"A": "組合不符。", "B": "含葡萄糖<60(滲出液特徵),錯誤。", "C": "組合不符。", "D": "正確，2蛋白比<0.5、4 LDH比<0.6。"}, "sources": ["Light's criteria;肋膜積液", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-8": {"quick": "低鹽飲食個別衛教中,『建議參加社區烹飪班』最不恰當(非個別化、未必符合低鹽)。", "detail": {"background": "個別化衛教流程：評估個案飲食習慣與健康識能→提供適切衛教材料(單張、影片)→示範並以回覆示教確認其能正確準備低鹽飲食。籠統建議『參加社區烹飪班』未針對個案需求、未必符合低鹽原則，最不恰當。", "options": {"A": "評估習慣與認知,恰當。", "B": "提供單張影片,恰當。", "C": "最不恰當(本題答案)：社區烹飪班非個別化。", "D": "教導準備並回覆示教,恰當。"}, "sources": ["衛教原則", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-外科-46": {"quick": "急性心衰竭/心因性休克中,『低血容首選dobutamine』與『立即大量NS』皆錯誤(=14)。", "detail": {"background": "急性心衰竭/心因性休克處置原則：強心劑(dobutamine)用於低心輸出而非『低血容』狀態；心因性休克時大量晶體輸液會惡化肺水腫，故不可立即給大量NS；可用利尿劑減輕鬱血；藥物反應不佳可考慮主動脈內氣球幫浦(IABP)或機械循環支持。本題①(低血容首選dobutamine)與④(立即大量NS)為錯誤敘述。", "options": {"A": "組合不符。", "B": "組合不符。", "C": "正確，1與4 敘述錯誤。", "D": "組合不符。"}, "sources": ["重症;心因性休克", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-內科-32": {"quick": "靜脈曲張不是心臟衰竭的誘發因子。", "detail": {"background": "心衰竭常見誘發(失代償)因子：不遵醫囑/鈉水過量、心律不整(尤AF)、感染、貧血、甲狀腺疾病、缺血/急性冠心、腎功能惡化、NSAID 與negative inotrope 藥物、高血壓未控。靜脈曲張屬周邊靜脈疾病，並非心衰竭誘因。", "options": {"A": "正確，靜脈曲張非HF誘因。", "B": "NSAID 鈉水滯留為誘因。", "C": "甲狀腺疾病為誘因。", "D": "心律不整為誘因。"}, "sources": ["心衰竭誘發因子", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-兒科-42": {"quick": "環形利尿劑用於心衰竭的原因是降低前負荷、排除積存體液與鈉。", "detail": {"background": "環形利尿劑(furosemide)抑制Henle 氏環上行支之Na-K-2Cl 共同轉運體，產生強力利尿與排鈉，降低前負荷、緩解肺鬱血與全身水腫。屬『排鉀』利尿劑(可致低鉀)，非留鉀；亦非直接降低全身血管阻力(那是血管擴張劑)或直接改善RAAS(那是ACEI/ARB/MRA)。", "options": {"A": "主要非降SVR。", "B": "正確，降前負荷、排水排鈉。", "C": "為排鉀非留鉀。", "D": "非直接改善RAAS(那是ACEi/ARB)。"}, "sources": ["心衰竭藥物學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-內科-28": {"quick": "可一次爬完一層樓但會喘、易疲倦、輕度下肢水腫→NYHA 第二級。", "detail": {"background": "NYHA II 級：日常活動(如一次爬完一層樓)會出現症狀(喘、疲倦)但仍可完成、僅輕度受限，休息可緩解。本題可一次爬完一層樓但會喘、易疲倦、輕度下肢水腫，屬第II 級。", "options": {"A": "I 無症狀。", "B": "正確，II 日常活動症狀。", "C": "III 輕於日常即症狀。", "D": "IV 休息即症狀。"}, "sources": ["NYHA 功能分級", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-內科-29": {"quick": "HFrEF 證實有效的β阻斷劑為 bisoprolol、carvedilol、metoprolol succinate;不含 atenolol。", "detail": {"background": "HFrEF 唯三種β阻斷劑具實證可降低死亡率：bisoprolol、carvedilol、緩釋型metoprolol succinate(MERIT-HF、CIBIS-II、COPERNICUS)。應於穩定、無明顯體液過載時由低劑量起始並緩慢上調。atenolol 未列入HFrEF 之實證用藥。β阻斷與ARNI/ACEI、MRA、SGLT2i 並列HFrEF 四大基石。", "options": {"A": "bisoprolol 為建議用藥。", "B": "carvedilol 為建議用藥。", "C": "metoprolol succinate 為建議用藥。", "D": "正確(不包含)：atenolol 未列入HFrEF實證用藥。"}, "sources": ["ESC/ACC HF 指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-兒科-40": {"quick": "毛地黃會『增加』腎血流與利尿(因心輸出改善),敘述『減少腎血流及利尿』最不適當。", "detail": {"background": "毛地黃(digoxin)為正性肌力藥，增加心肌收縮力→改善心輸出→『增加』腎血流與利尿、緩解水腫；同時透過迷走作用減慢房室傳導與心率。治療指數窄：給藥前測心尖脈一分鐘，較大兒童心率<70–80/分(嬰兒更高閾值)應暫停並通報；緩脈、PR/QT 變化、噁心、視覺異常為中毒徵。故『減少腎血流及利尿』之敘述最不適當。", "options": {"A": "增加心肌收縮力,正確。", "B": "最不適當(本題答案)：應為增加腎血流與利尿。", "C": "緩脈/PR/QT變化為中毒徵,正確。", "D": "給藥前測心尖脈,過慢停藥,正確。"}, "sources": ["小兒digoxin", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-外科-43": {"quick": "年齡>60 歲不是心臟移植的『絕對』禁忌(屬相對考量)。", "detail": {"background": "心臟移植『絕對』禁忌包括：活動性未控制之感染、未治癒之惡性腫瘤、不可逆之他器官嚴重衰竭(且不適合多器官移植)、嚴重不可逆肺高壓、無法配合治療/藥物依從性差、活動性物質濫用。高齡(>60–65歲)屬『相對』禁忌(個別評估生理年齡與共病)，非絕對禁忌。", "options": {"A": "活動性感染為絕對禁忌。", "B": "未控制糖尿病(器官損傷)為禁忌。", "C": "惡性腫瘤為絕對禁忌。", "D": "正確(非絕對禁忌)：年齡>60屬相對考量。"}, "sources": ["心臟移植適應症", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-通論-5分科-48": {"quick": "休息片刻才能起身、需坐起才能睡(端坐呼吸)→NYHA 第IV級。", "detail": {"background": "NYHA IV 級：休息時即有症狀，任何身體活動皆加重不適。端坐呼吸(需坐起才能呼吸/入睡)反映嚴重肺鬱血。本題需休息片刻才能起身、無法平躺須坐起，屬第IV 級。", "options": {"A": "I 無症狀。", "B": "II 日常活動症狀。", "C": "III 輕活動症狀但休息無。", "D": "正確，IV 休息即症狀。"}, "sources": ["NYHA 功能分級", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-內科-31": {"quick": "心衰竭會周邊血管『收縮』(非擴張),故『增加鈉滯留並周邊血管擴張』非其血流動力學變化。", "detail": {"background": "心衰竭代償之血流動力學變化：交感神經與RAAS、血管加壓素(vasopressin)活化→鈉水滯留與『周邊血管收縮』(增加後負荷以維持血壓)。周邊血管『擴張』並非心衰竭之代償方向，故『增加鈉滯留並周邊血管擴張』非其變化。此惡性循環是神經內分泌阻斷治療的依據。", "options": {"A": "RAAS 活化,屬HF變化。", "B": "vasopressin 活化,屬HF變化。", "C": "非HF變化(本題答案)：應為血管收縮非擴張。", "D": "交感活化,屬HF變化。"}, "sources": ["心衰竭病理生理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-兒科-41": {"quick": "右心衰竭→血液鬱積於周邊血管與組織,造成肢體水腫、肝脾腫大。", "detail": {"background": "右心衰竭：右心室無法有效將血液送至肺循環，造成體循環靜脈鬱血——頸靜脈怒張、肝(脾)腫大、腹水、周邊與下肢水腫。左心衰竭才造成肺靜脈鬱血、肺水腫與呼吸困難。心衰竭刺激交感(非副交感)以增收縮與血管張力。故『血液鬱積周邊與組織造成水腫/肝脾腫大』正確。", "options": {"A": "鬱積肺靜脈為左心衰竭。", "B": "肺水腫為左心衰竭。", "C": "正確，右心衰竭致周邊鬱血水腫。", "D": "刺激交感(非副交感),敘述錯誤。"}, "sources": ["心衰竭病理生理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-兒科-22": {"quick": "vasopressin 為純血管收縮劑、無正性肌力,無法有效增加心輸出量。", "detail": {"background": "心衰竭合併低血壓需增加心輸出：vasopressin 為純血管收縮劑(V1 受體)、無正性肌力作用，僅升高血壓而無法有效提升心輸出。dobutamine(β1 正性肌力)、norepinephrine(α升壓+β1 強心)、dopamine(劑量依賴之正性肌力與升壓)皆能增加心輸出。故vasopressin 無法有效增加心輸出。", "options": {"A": "正確，vasopressin 無正性肌力。", "B": "dobutamine 增心收縮力。", "C": "norepinephrine 有強心升壓。", "D": "dopamine 有正性肌力。"}, "sources": ["升壓強心藥理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-兒科-38": {"quick": "右心衰竭時送至肺臟血量減少,血液滯留右心房、周邊與組織,敘述正確。", "detail": {"background": "充血性心衰竭依左右心分：右心衰竭時輸出至肺臟之血量減少、血液滯留於右心房、體循環與組織(頸靜脈怒張、肝脾腫大、周邊水腫)；左心衰竭時血液滯留肺靜脈致肺鬱血、肺水腫與呼吸困難。本題『右心衰竭→血滯留右房/周邊/組織』之敘述正確。", "options": {"A": "左心衰竭非『心輸出增加』,敘述錯誤。", "B": "正確，右心衰竭體循環鬱血。", "C": "肺水腫為左心衰竭。", "D": "肝脾腫大為右心衰竭。"}, "sources": ["小兒心衰竭", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-兒科-39": {"quick": "毛地黃應監測『血鉀』而非血鈣;低血鉀會增加中毒風險,故監測血鈣最不適當。", "detail": {"background": "小兒digoxin 護理：給藥前完整測量心尖脈一分鐘、固定時間給藥、漏服勿補雙倍。毒性與『鉀離子』密切相關——低血鉀會增加digoxin 毒性，故應監測『血鉀』而非血鈣。低鎂、腎功能不良、合併藥物(如利尿劑致低鉀)亦增風險。故『監測血鈣』最不適當。", "options": {"A": "給藥前測心尖脈一分鐘,適當。", "B": "飯前1小時或飯後2小時,適當。", "C": "漏服<6小時可補,適當。", "D": "最不適當(本題答案)：應監測血鉀非血鈣。"}, "sources": ["小兒digoxin", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-5分科-46": {"quick": "『接受 BNP/NT-proBNP 檢查比率』屬過程(process)指標,非結果面向指標。", "detail": {"background": "照護品質指標分為結構(structure)、過程(process)、結果(outcome)三面向。心衰竭之『結果面向』指標如：出院後14天/6個月非計畫性再住院、住院死亡率等。『接受BNP/NT-proBNP 檢查比率』屬執行之過程面向指標，非結果指標。", "options": {"A": "14天再住院,屬結果指標。", "B": "6個月再住院,屬結果指標。", "C": "住院死亡率,屬結果指標。", "D": "非結果指標(本題答案)：BNP檢查比率為過程指標。"}, "sources": ["醫療品質指標", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-家庭-65": {"quick": "急性心衰竭以右心鬱血致肝腫大為主,『脾腫大』最無相關。", "detail": {"background": "急性心衰竭典型身體診察：頸靜脈怒張、肺部囉音(左心鬱血)、呼吸急促、肝腫大與周邊/下肢水腫(右心鬱血)。脾腫大並非心衰竭典型表現(較見於門脈高壓、血液病、感染)，故與急性心衰竭最無相關。", "options": {"A": "頸靜脈怒張,相關。", "B": "肺囉音,相關。", "C": "最無相關(本題答案)：脾腫大非HF典型。", "D": "呼吸急促,相關。"}, "sources": ["心衰竭身體評估", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-兒科-15": {"quick": "判斷心衰竭嚴重度最常用的血清指標是 BNP。", "detail": {"background": "BNP/NT-proBNP 由心室肌細胞因壁張力增加而分泌，血中濃度與心衰竭嚴重度、住院與死亡風險相關，為臨床評估心衰竭嚴重度最常用之血清指標，並用於鑑別呼吸困難之心因性。troponin/myoglobin 反映心肌損傷、lactate 反映組織灌流，非心衰嚴重度首選。", "options": {"A": "troponin 反映心肌損傷。", "B": "myoglobin 為心肌損傷早期指標。", "C": "正確，BNP 評估HF嚴重度。", "D": "lactate 反映組織灌流。"}, "sources": ["心臟生物標記", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-通論-5分科-52": {"quick": "心包填塞不是心臟衰竭常見的徵象與症狀。", "detail": {"background": "心衰竭常見徵象與症狀：疲勞、運動耐受下降、食慾不振、夜間多尿、端坐呼吸與夜間陣發性呼吸困難、肝腫大、腹水、周邊水腫等。心包填塞為心包腔積液壓迫之獨立急症(Beck triad、奇脈)，非心衰竭之徵象。", "options": {"A": "疲勞食慾不振,HF常見。", "B": "夜間頻尿,HF常見。", "C": "正確(非HF徵象)：心包填塞為獨立急症。", "D": "肝腫大腹水,右心衰竭常見。"}, "sources": ["心衰竭臨床表現", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-通論-麻醉-57": {"quick": "二尖瓣逆流通常 EF 偏高或正常(低阻力逆流),敘述『通常表現為低EF』錯誤。", "detail": {"background": "射出分率(EF)受前後負荷影響，不總等於真實收縮力。敗血症高動力期與肝硬化(高輸出循環)常表現高EF；HFpEF 之EF 可正常；二尖瓣逆流因部分血流逆流入低阻力之左心房，使測得EF 偏高(高估真實心肌功能)，故『MR 通常表現為低EF』之敘述錯誤。", "options": {"A": "敗血症高EF,正確。", "B": "HFpEF 可正常EF,正確。", "C": "錯誤(本題答案)：MR 通常EF偏高非偏低。", "D": "肝硬化高輸出高EF,正確。"}, "sources": ["心臟生理;EF", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-通論-5分科-64": {"quick": "左心衰竭出現肺水腫、EF未必低於正常(HFpEF)→正確組合為 23。", "detail": {"background": "心衰竭概念：右心衰竭時體循環鬱血使中心靜脈壓『上升』(非下降)；左心衰竭致肺靜脈鬱血與肺水腫；HFpEF 之左心室射出分率可正常(未必低於正常)。故正確組合為②③。", "options": {"A": "含『CVP下降』錯誤。", "B": "組合不符。", "C": "正確，2肺水腫、3 EF未必低。", "D": "組合不符。"}, "sources": ["心衰竭病理生理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-內科-68": {"quick": "第二型糖尿病+CKD3+HFrEF(EF37%),最適合 SGLT2 抑制劑(兼具降糖、心腎保護)。", "detail": {"background": "第二型糖尿病合併慢性腎臟病與HFrEF(EF 37%)，SGLT2 抑制劑(dapagliflozin、empagliflozin)同時具降糖、降低心衰住院與心血管死亡、延緩腎病進展之效益(DAPA-HF、EMPEROR-Reduced、CREDENCE)，為此類病人優選。TZD 會鈉水滯留惡化心衰、屬禁忌；DPP-4 與α-glucosidase 無此心腎益處。", "options": {"A": "DPP-4 無HF益處。", "B": "TZD 會鈉水滯留惡化HF,禁用。", "C": "正確，SGLT2 抑制劑有心腎保護。", "D": "α-glucosidase 無HF益處。"}, "sources": ["2022 ACC HF;SGLT2i 試驗", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-家庭-69": {"quick": "心衰竭時交感神經活化,導致心跳增快與周邊血管收縮。", "detail": {"background": "心衰竭代償之病理生理：交感神經活化→心跳增快、心肌收縮增強與周邊血管收縮；RAAS 活化→鈉水滯留(可致低血鉀風險視利尿而定)；抗利尿激素(ADH)上升→保水(可致低血鈉)；心房/腦利鈉胜肽(ANP/BNP)代償性『增加』以利尿與血管擴張。故『交感活化致心跳快與血管收縮』正確。", "options": {"A": "正確，交感活化致心跳快與血管收縮。", "B": "ADH 應增加非減少。", "C": "RAAS 活化非受抑制。", "D": "ANP 代償性增加非不足。"}, "sources": ["心衰竭病理生理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-家庭-73": {"quick": "β 阻斷劑證實可改善 HFrEF 預後(降死亡率)。", "detail": {"background": "HFrEF 改善預後(降低死亡率/住院)的四大基石：ARNI/ACEI、β阻斷劑、礦物皮質素受體拮抗劑(MRA)、SGLT2 抑制劑。其中β阻斷劑(bisoprolol、carvedilol、metoprolol succinate)有明確降死亡率實證。利尿劑僅緩解症狀、靜脈強心劑無存活益處、非二氫吡啶CCB(verapamil)於HFrEF 有害。", "options": {"A": "高劑量利尿劑僅症狀緩解。", "B": "正確，β阻斷劑改善HFrEF預後。", "C": "注射強心劑無存活益處。", "D": "verapamil 於HFrEF有害。"}, "sources": ["ESC/ACC HF 指引", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-精神科-49": {"quick": "長期服鋰鹽者降血壓應避免 thiazide 與 ACEI(會升高鋰濃度),β阻斷劑(atenolol)較合適。", "detail": {"background": "鋰鹽經腎排除，凡減少腎血流或鈉的藥物都會升高血鋰致中毒。thiazide 利尿劑與ACEI/ARB 會降低鋰清除、升高血鋰(thiazide 引起鈉流失、腎代償回收鋰)；鈣離子阻斷劑亦有神經毒性交互作用報告。β阻斷劑(atenolol)對鋰濃度影響相對小，為較合適之降壓選擇；用藥期間仍須監測血鋰與腎功能。", "options": {"A": "ACEI 升高鋰濃度,不宜。", "B": "thiazide 升高鋰濃度,不宜。", "C": "CCB 與鋰有交互作用顧慮。", "D": "正確，β阻斷劑相對安全。"}, "sources": ["藥物交互作用;鋰鹽", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-內科-79": {"quick": "中風後高血壓優先使用 thiazide 利尿劑 + ACEI 組合。", "detail": {"background": "缺血性中風後高血壓管理以降低再發為目標；PROGRESS 研究支持以ACEI(perindopril)±利尿劑(indapamide)降壓可降低再中風與心血管事件。故首選thiazide 利尿劑＋ACEI 組合；急性期降壓須謹慎(避免過快過低影響腦灌流)，穩定後再積極控制。", "options": {"A": "非首選組合。", "B": "CCB+ACEI 亦可但本題首選為D。", "C": "thiazide+β阻斷代謝副作用多。", "D": "正確，thiazide+ACEI。"}, "sources": ["中風後高血壓處置;PROGRESS", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-內科-1": {"quick": "furosemide 致低血鉀,心電圖 T 波倒置、U 波明顯、ST 下降,最符合血鉀 2.1 mEq/L。", "detail": {"background": "低血鉀心電圖：T 波低平/倒置、U 波明顯、ST 段下降、QT(U)延長，嚴重可致心律不整。環形利尿劑(furosemide)為常見原因。本題上述ECG 變化最符合血鉀2.1 mEq/L(顯著低血鉀)。", "options": {"A": "正確，血鉀2.1(低血鉀)符合。", "B": "高血鈣 ECG 為 QT 縮短。", "C": "高血鈉非此ECG。", "D": "血鎂2.8非主因。"}, "sources": ["電解質與心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-通論-39": {"quick": "DASH 飲食敘述為非者:C(鹽分太少增加風險)與 D(避免鉀離子)—官方更正答 C、D 均給分。", "detail": {"background": "得舒(DASH)飲食原則：高纖蔬果全穀、低飽和脂肪與膽固醇、增加鉀鈣鎂攝取、限制鈉。並無證據顯示『鹽分太少反增高血壓與心血管死亡』；且應『增加』鉀攝取(非避免)。官方試題疑義將C(鹽太少增風險)與D(避免鉀)兩項『何者為非』均列為可接受答案(送分)。", "options": {"A": "高纖改善胰島素抗性,正確敘述。", "B": "減飽和脂肪降膽固醇,正確敘述。", "C": "敘述為非(送分認定)。", "D": "敘述為非:應增加鉀攝取(送分認定)。"}, "sources": ["2022 血脂/高血壓飲食;DASH;官方疑義", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-外科-79": {"quick": "嗜鉻細胞瘤影像,現代正子攝影(PET)診斷效果並不低於 MIBG,該敘述錯誤。", "detail": {"background": "嗜鉻細胞瘤(pheochromocytoma)為腎上腺髓質兒茶酚胺分泌腫瘤，致陣發性高血壓、頭痛、發汗、心悸三聯症。生化以血漿/尿液metanephrine、VMA、catecholamine 診斷(5-HIAA 為類癌指標)；功能影像可用MIBG 或PET，現代PET(FDG/DOTATATE)診斷效力不亞於MIBG；治療為術前α阻斷(±β阻斷)後腹腔鏡腎上腺切除。故『PET 低於MIBG』敘述錯誤。", "options": {"A": "頭痛發汗心悸,正確。", "B": "尿液荷爾蒙檢查,正確(panel敘述)。", "C": "錯誤(本題答案)：PET 不低於MIBG。", "D": "腹腔鏡切除為常見治療,正確。"}, "sources": ["嗜鉻細胞瘤", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-內科-38": {"quick": "高血壓合併左心室肥厚者,基礎心電圖已異常,『運動心電圖』判讀缺血較不適宜。", "detail": {"background": "既有左心室肥厚者基礎心電圖常有ST-T 異常與電壓變化，使『運動心電圖』判讀誘發性ST 變化之準確度下降；此族群評估冠心宜選不受基礎ST 影響之影像法：核醫鉈-201/Tc 灌注造影、負荷心臟超音波或冠狀動脈電腦斷層。故對LVH 病人運動心電圖較不適宜。", "options": {"A": "冠脈CT 適宜。", "B": "較不適宜(本題答案)：LVH 影響運動心電圖判讀。", "C": "鉈-201 灌注適宜。", "D": "心臟超音波適宜。"}, "sources": ["缺血性心臟病檢查", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-內科-40": {"quick": "年輕人(19歲)持續高血壓需排除續發性原因,首選腹部超音波(腎/腎上腺/腎動脈)。", "detail": {"background": "年輕(19歲)、無家族史而持續高血壓應積極排除續發性原因(腎實質病、腎血管狹窄、原發性醛固酮增多、嗜鉻細胞瘤、主動脈窄縮等)；腹部超音波可初步評估腎臟、腎上腺與腎動脈，為簡便首選。心臟超音波評估標的器官損傷、胸部X光非找病因。", "options": {"A": "心臟超音波評估標的器官非找病因。", "B": "腦血管超音波非首選。", "C": "正確，腹部超音波查腎/腎上腺。", "D": "胸部X光非首選。"}, "sources": ["續發性高血壓", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-外科-79": {"quick": "懷疑嗜鉻細胞瘤者『口服 bromocriptine 治療』錯誤(那是泌乳素瘤用藥)。", "detail": {"background": "難控制高血壓合併腎上腺腫塊，臨床懷疑嗜鉻細胞瘤：應查VMA/兒茶酚胺/metanephrine、行131I-MIBG 功能掃描，治療為α阻斷(phenoxybenzamine)後腹腔鏡腎上腺切除。bromocriptine(多巴胺促效劑)用於泌乳素瘤，非嗜鉻細胞瘤治療，故為錯誤處置。", "options": {"A": "VMA 檢查,正確。", "B": "MIBG 掃描,正確。", "C": "錯誤(本題答案)：bromocriptine 非pheo治療。", "D": "腹腔鏡切除,正確。"}, "sources": ["嗜鉻細胞瘤", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-通論-47": {"quick": "端坐呼吸、頸靜脈怒張、下肺囉音、下肢水腫→心衰竭,鑑別關鍵指標為 BNP/NT-proBNP。", "detail": {"background": "端坐呼吸、頸靜脈怒張、下肺囉音、下肢水腫為心衰竭典型徵象。BNP/NT-proBNP 隨心室壁張力上升，是鑑別『呼吸困難是否源於心衰竭』的關鍵生化指標(陰性預測值高，可排除)。troponin/CK-MB 反映心肌損傷、GOT/GPT 為肝指標，非鑑別心衰之首選。", "options": {"A": "troponin 反映心肌損傷非HF鑑別主指標。", "B": "CK-MB 同上。", "C": "GOT/GPT 為肝功能。", "D": "正確，BNP/NT-proBNP 鑑別HF。"}, "sources": ["心衰竭診斷", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-通論-51": {"quick": "足踝內側慢性傷口、褐色色素沉著、脈搏正常、抬高顏色正常→靜脈功能不全。", "detail": {"background": "慢性靜脈功能不全：足踝『內側』潰瘍、含鐵血黃素之褐色色素沉著、脂性硬皮(lipodermatosclerosis)、水腫，但動脈脈搏正常、抬高患肢顏色正常。與動脈功能不全(蒼白、冰冷、脈弱、抬高更蒼白、潰瘍於趾端/受壓處)、淋巴水腫、糖尿病足(神經病變)可資鑑別。故為靜脈功能不全。", "options": {"A": "正確，靜脈功能不全。", "B": "淋巴水腫無潰瘍色素典型。", "C": "動脈功能不全脈弱蒼白。", "D": "糖尿病足多合併神經病變/感染表現。"}, "sources": ["周邊血管疾病;傷口照護", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-通論-30": {"quick": "兩臂血壓差大、舒張期雜音、縱隔腔擴大→主動脈剝離。", "detail": {"background": "主動脈剝離典型：兩臂血壓/脈搏不等(本題右170/左90)、撕裂樣胸痛輻射至肩胛間/背部、可聞主動脈瓣逆流舒張期雜音、胸部X光縱隔腔擴大、心電圖可正常。需CT 確診並控制血壓與心率(降剪力)。本題綜合表現為主動脈剝離。", "options": {"A": "心肌梗塞無兩臂血壓差與縱隔增寬。", "B": "肺栓塞無此表現。", "C": "主動脈狹窄非急性此表現。", "D": "正確，主動脈剝離。"}, "sources": ["主動脈疾病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-12": {"quick": "主動脈剝離首選降壓/降心率藥物為 labetalol(兼具α、β阻斷)。", "detail": {"background": "主動脈剝離急性處置以降低主動脈壁剪應力(dP/dt)為核心：先用β阻斷劑(labetalol 兼α/β阻斷或esmolol)降心率至<60、收縮壓控制約100-120mmHg；不可單用血管擴張劑(會反射性心搏過速、增加剪力)。本題206/94 之剝離首選labetalol。", "options": {"A": "captopril 單用不控心率。", "B": "verapamil 非首選。", "C": "diltiazem 非首選。", "D": "正確，labetalol 兼降壓降心率。"}, "sources": ["2022 ACC/AHA 主動脈疾病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-72": {"quick": "術後呼吸困難、心電圖監測下,若非高血鉀則給予 insulin+glucose 最不適當。", "detail": {"background": "術後呼吸困難、心電圖監測下，若無高血鉀證據而給予『insulin+glucose』(降血鉀療法)最不適當；懷疑心因性(缺血)時應做12導程、驗心肌酵素、給硝酸甘油。需配合原圖。", "options": {"A": "12導程心電圖,適當。", "B": "最不適當(本題答案)：無高血鉀證據給insulin+glucose。", "C": "驗心肌酵素,適當。", "D": "硝化甘油,適當。"}, "sources": ["術後胸悶/心電圖判讀", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-內科-38": {"quick": "反覆短暫胸悶、心電圖與troponin正常→疑不穩定型心絞痛,應重做心電圖並考慮aspirin+nitrates。", "detail": {"background": "反覆短暫胸悶且初次心電圖與troponin 正常仍不能排除不穩定型心絞痛(NSTE-ACS)——缺血為動態變化。應於再發時即時重做12導程心電圖、連續追蹤高敏感troponin，並給予aspirin±硝酸鹽、評估收住監測與危險分層(如TIMI/GRACE)。逕判為非心因或單純降壓並不恰當。", "options": {"A": "主動脈剝離非此臨床。", "B": "正確，重做ECG並給aspirin+nitrates。", "C": "逕判肌筋膜痛不當。", "D": "逕給nifedipine降壓不當。"}, "sources": ["不穩定型心絞痛/ACS", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-內科-39": {"quick": "腎實質病變是續發性高血壓最常見的原因。", "detail": {"background": "高血壓概念：續發性高血壓最常見原因為腎實質疾病；白袍高血壓較常見於年輕族群、女性與孕婦(非50-65歲)；測量時壓脈帶過窄會『高估』收縮壓(過寬則低估)；腎上腺疾病所致高血壓佔比遠低於10%。故『腎實質病變是續發性高血壓最常見原因』正確。", "options": {"A": "白袍高血壓非50–65歲特徵。", "B": "正確，腎實質病變最常見續發原因。", "C": "過窄壓脈帶會高估非低估。", "D": "腎上腺疾病佔比甚低。"}, "sources": ["續發性高血壓", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-外科-58": {"quick": "心臟術後血鉀2.8(低血鉀),應避免使用 thiazide(hydrochlorothiazide)再降鉀。", "detail": {"background": "心臟術後血鉀2.8(低血鉀)者降壓應避免『排鉀』利尿劑——hydrochlorothiazide(thiazide)會進一步流失鉀，加重低血鉀與心律不整風險；應改用保鉀(spironolactone)、ACEI(captopril，可升鉀)或β阻斷(atenolol)。故應避免HCTZ。", "options": {"A": "atenolol 不致低鉀。", "B": "captopril 不致低鉀。", "C": "正確(應避免)：HCTZ 加重低血鉀。", "D": "spironolactone 為保鉀。"}, "sources": ["電解質與降壓藥", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-外科-68": {"quick": "雙膝置換術後下肢腫痛、忽然喘且胸悶不緩解→肺栓塞。", "detail": {"background": "雙膝置換術後制動為靜脈栓塞/肺栓塞(VTE/PE)高危。本題下肢腫痛後下床走路忽然喘、胸悶不緩解，Hb 與發炎指標僅輕度，最符合肺栓塞——突發呼吸困難、胸痛、低血氧；需評估D-dimer/CT 肺動脈攝影。貧血、吸入性肺炎、心肌梗塞之表現不符。", "options": {"A": "貧血Hb11.5不致急性喘。", "B": "吸入性肺炎多有發燒咳嗽。", "C": "心肌梗塞可能但下肢腫痛史更指向PE。", "D": "正確，肺栓塞。"}, "sources": ["靜脈栓塞;肺栓塞", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-內科-25": {"quick": "肺栓塞不會造成續發性高血壓。", "detail": {"background": "續發性高血壓常見原因：腎實質疾病、腎血管狹窄、原發性醛固酮增多症、嗜鉻細胞瘤、主動脈窄縮、阻塞性睡眠呼吸中止症(OSA)、庫欣症候群、甲狀腺/副甲狀腺疾病。肺栓塞造成的是肺動脈高壓/右心負荷，並非系統性高血壓之原因，故較不會造成續發性高血壓。", "options": {"A": "主動脈窄縮為續發原因。", "B": "正確(較不會)：肺栓塞非續發高血壓原因。", "C": "OSA 為續發原因。", "D": "腎實質病為續發原因。"}, "sources": ["續發性高血壓", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-內科-26": {"quick": "鉀離子攝取過高較不會造成降壓效果不佳(高鉀反而有助降壓)。", "detail": {"background": "降壓反應不佳(頑固性高血壓)常見原因：服藥依從性差、容量過載/高鈉/酒精過量、續發性高血壓未診斷、併用升壓物質(NSAID、類固醇、口服避孕藥、某些抗憂鬱劑/減充血劑)、白袍效應、測量不當。增加『鉀』攝取一般有助降壓而非使療效變差，故較不可能為原因。", "options": {"A": "酒精增加會降低療效。", "B": "續發性高血壓使療效不佳。", "C": "正確(較不可能)：高鉀反有助降壓。", "D": "併用某些抗憂鬱劑可升壓。"}, "sources": ["頑固性高血壓", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-外科-39": {"quick": "低腎素、高醛固酮→原發性醛固酮增多症,應安排腹部電腦斷層找腎上腺腺瘤。", "detail": {"background": "35歲難控制高血壓、抽血腎素極低(0.01)而醛固酮高(醛固酮/腎素比上升)，提示原發性醛固酮增多症(Conn 症候群)，常合併低血鉀。影像以『腹部電腦斷層』評估腎上腺腺瘤或增生(必要時腎上腺靜脈取樣)，為合適下一步。全身PET、腎血流檢查、IVP 非首選。", "options": {"A": "正確，腹部CT 評估腎上腺。", "B": "全身PET 非首選。", "C": "腎血流檢查非首選。", "D": "靜脈腎盂攝影非評估腎上腺。"}, "sources": ["原發性醛固酮增多症", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-兒科-18": {"quick": "未控制高血壓者撕裂樣胸痛放射至頸背→主動脈剝離。", "detail": {"background": "未控制高血壓者出現『撕裂樣』胸痛由前胸放射至頸部及背部，最可能為主動脈剝離——高血壓為最重要危險因子，疼痛與姿勢無關、可伴兩臂血壓不等與縱隔增寬。胃食道逆流、肺栓塞、氣胸之胸痛型態不同，可資鑑別。", "options": {"A": "胃食道逆流非撕裂放射痛。", "B": "正確，主動脈剝離。", "C": "肺栓塞非撕裂放射痛。", "D": "氣胸以呼吸困難為主。"}, "sources": ["主動脈疾病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-兒科-15": {"quick": "後背劇痛輻射胸腹、左足背動脈搏動消失→主動脈剝離,胸腹部電腦斷層最能確立診斷。", "detail": {"background": "主動脈剝離：後背劇痛輻射至胸腹、冒冷汗，分支受累可致肢體缺血(本題左足背動脈搏動消失)。確診以『胸腹部電腦斷層血管攝影(CTA)』為首選——可顯示內膜瓣、真假腔與分支受累範圍。心電圖、周邊血管/腹部超音波敏感度不足以確立診斷。", "options": {"A": "正確，胸腹部CT 確診主動脈剝離。", "B": "心電圖無法確診剝離。", "C": "周邊血管超音波局部,非首選確診。", "D": "腹部超音波敏感度不足。"}, "sources": ["主動脈剝離影像", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-外科-31": {"quick": "術後高血壓藥物處置中,『alpha blockers』非常規選擇,敘述錯誤。", "detail": {"background": "術後高血壓常用可控、靜脈藥物：鈣離子阻斷劑(nicardipine)、ACEI、血管擴張劑(nitroprusside、NTG)、labetalol。單純『α阻斷劑』易致反射性心搏過速、非術後高血壓常規選擇，故為錯誤敘述。需先排除疼痛、缺氧、膀胱脹、停藥反彈等可逆因素。", "options": {"A": "CCB 適用。", "B": "錯誤(本題答案)：α阻斷非術後高血壓常規。", "C": "ACEI 適用。", "D": "血管擴張劑適用。"}, "sources": ["術後高血壓", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-通論-5分科-54": {"quick": "下壁STEMI(II,III,aVF ST上升);心電圖未呈現LBBB,『QRS變寬合併LBBB』敘述錯誤。", "detail": {"background": "下壁STEMI 之心電圖在II/III/aVF 出現ST段上升，常為右冠狀動脈阻塞，可合併竇性心搏過緩或房室傳導阻滯(下壁供應房室結)，並可延伸右心室梗塞(右胸導程V4R)。本題心電圖未呈現左束支傳導阻滯(LBBB)，故『QRS變寬合併LBBB』之描述為錯誤。", "options": {"A": "II/III/aVF ST上升,正確(下壁)。", "B": "V4-V6 變化之描述視原圖。", "C": "錯誤(本題答案)：未見LBBB。", "D": "下壁MI 可合併AV阻滯之描述。"}, "sources": ["心電圖;STEMI(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-通論-其他-62": {"quick": "氣喘合併高血壓發作,降壓不應以 propranolol(非選擇性β阻斷會誘發支氣管痙攣)為首選,敘述錯誤。", "detail": {"background": "氣喘合併高血壓發作之降壓不應以『propranolol(非選擇性β阻斷劑)』為首選——會阻斷β2 引起支氣管痙攣、惡化氣喘，屬禁忌；應選鈣阻斷劑、ACEI 等。氣喘體徵：wheezing(下呼吸道狹窄)、胸腔扣診過度反響、氣管居中。故『以propranolol 為首選』之敘述錯誤。", "options": {"A": "wheezing 為下呼吸道狹窄,正確。", "B": "過度反響音,正確。", "C": "氣管居中,正確。", "D": "錯誤(本題答案)：氣喘禁用propranolol。"}, "sources": ["氣喘;降壓藥選擇", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-內科-29": {"quick": "肺水腫/心衰竭鑑別中,『D-dimer』最不適當(用於肺栓塞而非HF)。", "detail": {"background": "端坐呼吸、泡沫痰、頸靜脈怒張、肺濕囉音、下肢水腫指向心衰竭/肺水腫。鑑別檢驗以NT-proBNP(心衰)、CK-MB(心肌損傷)、creatinine(腎功能/心腎症候群)為宜；D-dimer 用於評估靜脈血栓栓塞/肺栓塞，對心衰竭鑑別幫助有限，故最不適當。", "options": {"A": "CK-MB 評估心肌損傷,適當。", "B": "最不適當(本題答案)：D-dimer 非HF鑑別。", "C": "NT-proBNP 評估HF,適當。", "D": "creatinine 評估腎功能,適當。"}, "sources": ["心衰竭診斷", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-通論-麻醉-47": {"quick": "從未用過β阻斷劑者不應於『手術當天開始』使用(急性圍術期啟動有害),敘述錯誤。", "detail": {"background": "高血壓病人麻醉處置：長期服β阻斷者續用至手術日(避免反彈)；ACEI/ARB 術前可考慮停用(減術中低血壓)；血壓>180/110 可考慮延後選擇性手術。但『從未用過β阻斷者於手術當天才開始使用』錯誤——POISE 試驗顯示急性圍術期啟動β阻斷雖減心肌梗塞卻增中風與死亡，不宜當天啟動。", "options": {"A": "術前考慮停ACEI/ARB,正確。", "B": "錯誤(本題答案)：不應手術當天才啟動β阻斷。", "C": "長期使用者續用,正確。", "D": ">180/110 延後選擇性手術,正確。"}, "sources": ["圍術期高血壓;POISE", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-家庭-59": {"quick": "糖尿病腎病合併蛋白尿用ACEI,『調整ACEI以降低GFR』與過度降壓最不適當;答案A。", "detail": {"background": "糖尿病腎病變(DKD)合併蛋白尿使用ACEI/ARB 護腎，用藥初期GFR 可能略降但目的非『降低GFR』(不合理)。處置應轉腎臟科共同管理、適度限制蛋白質、控制血壓；血壓目標個別化(過於激進如SBP<120 於某些族群有害)。故『調整ACEI 以降低GFR』最不適當。", "options": {"A": "最不適當(本題答案)：不以『降低GFR』為目的調藥。", "B": "轉腎臟科共管,適當。", "C": "限制蛋白,適當。", "D": "SBP<120 過於激進(亦不適當,但本題選A)。"}, "sources": ["糖尿病腎病;ACEI", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-通論-5分科-9": {"quick": "社區高血壓衛教設計第一步是分析居民基本資料、文化背景與健康識能。", "detail": {"background": "社區高血壓健康教育之課程設計第一步為『評估需求』——分析居民基本資料、文化背景與健康識能程度，再據以訂定學習目標、設計教材與教學方式、最後規劃成效評量。需求評估為健康教育(如PRECEDE-PROCEED)流程之首要步驟。", "options": {"A": "成效評量指標為後續步驟。", "B": "正確，先分析對象需求。", "C": "環境教材為後續。", "D": "與醫師討論指引非第一步。"}, "sources": ["健康教育設計", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-內科-35": {"quick": "已知冠脈鈣化者出現勞動性心絞痛(症狀進展),優先安排心導管檢查。", "detail": {"background": "穩定型冠心病採層級式檢查。冠狀動脈鈣化指數(CAC, Agatston score)反映斑塊負荷與長期風險，但不等於管腔狹窄程度；無症狀者可生活型態介入並追蹤。一旦出現典型勞動性心絞痛(症狀進展)即提示功能性顯著狹窄，宜升級至能直接判定狹窄並可同時介入的冠狀動脈攝影(心導管)。功能性檢查(運動心電圖、核醫灌注、負荷超音波)適用於中度可能性者；本題已有鈣化又新發勞動性心絞痛，屬高可能性。", "options": {"A": "運動心電圖前已做,症狀已明確。", "B": "心臟超音波非確診冠脈。", "C": "正確，心導管確診並可介入。", "D": "重複CT 助益有限。"}, "sources": ["缺血性心臟病檢查", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-內科-77": {"quick": "心肌梗塞心電圖演變順序:超急性T波高聳→ST上升→Q波→T波倒置→逐漸恢復(本題序列C)。", "detail": {"background": "STEMI 心電圖隨時間演變：①數分鐘內超急性期高聳對稱T波；②ST段弓背向上抬高(損傷電流)；③數小時至數天出現病理性Q波(壞死)與T波倒置；④數週後ST恢復基線、T波漸正常，Q波多永久留存。對應導程可定位罪犯血管(下壁II/III/aVF、前壁V1-4、側壁I/aVL/V5-6)。掌握此時序即可排列本題各時期心電圖。", "options": {"A": "順序不符。", "B": "順序不符。", "C": "正確，符合MI心電圖時序。", "D": "順序不符。"}, "sources": ["心電圖;心肌梗塞演變(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-內科-7": {"quick": "平躺無症狀、輕度活動(刷牙)即喘需休息→NYHA 第III級。", "detail": {"background": "心肌梗塞合併鬱血性心衰竭以NYHA 功能分級評估失能：I 無症狀；II 日常活動(走平路、上一層樓)出現症狀；III 輕於日常之活動(刷牙、穿衣)即症狀、明顯受限；IV 休息即有症狀。NYHA 反映當下症狀並指引治療強度，與ACC/AHA A–D 期(結構/不可逆)互補。本題輕度活動即喘需休息屬III 級。", "options": {"A": "I 無症狀。", "B": "II 日常活動症狀。", "C": "正確，III 輕活動即症狀。", "D": "IV 休息即症狀。"}, "sources": ["NYHA 分級", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-通論-31": {"quick": "心肌梗塞後心率61–100、血流動力學穩定之 AIVR,只需觀察。", "detail": {"background": "再灌流(自發或PCI後)常見加速性心室自主節律(AIVR)：寬QRS、心率約60–100、由心室異位節律點接管，屬良性自限之再灌流心律，血流動力穩定者僅觀察與監測，不需抗心律不整藥或電擊；過度抑制反不利。須與心室頻脈(率>100、可不穩定)區分。", "options": {"A": "正確，AIVR 穩定者觀察。", "B": "不需同步整流。", "C": "非VT,不需不同步電擊。", "D": "非VT。"}, "sources": ["ACLS;再灌流心律", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-通論-37": {"quick": "troponin I 是診斷急性心肌梗塞的重要生化指標。", "detail": {"background": "心肌損傷標記時序：troponin I/T 於3–6小時開始上升、12–24小時達峰、可持續7–14天，敏感度與特異度最高，為診斷與危險分層首選(高敏感troponin 可更早偵測)。CK-MB 約4–6小時上升、24小時達峰、48–72小時回正，因清除快適合偵測『再梗塞』。BNP 反映心室壁張力，非心肌壞死專一。", "options": {"A": "再灌流後CK-MB 提早出現非較晚。", "B": "正確，troponin I 為MI標記。", "C": "BNP 非心肌損傷專一。", "D": "CK 升高時序敘述不符。"}, "sources": ["心肌梗塞生物標記", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-外科-38": {"quick": "兩週前才心肌梗塞,擇期髖關節手術應延後(至少數週,降低再梗塞風險)。", "detail": {"background": "近期心肌梗塞是非心臟手術圍術期心臟事件最強危險因子之一；梗塞後越早手術再梗塞與死亡風險越高，指引建議擇期手術延後(傳統≥4–6週、理想≥60天並完成評估)。本題2週前MI、無急性症狀，應延緩手術而非逕行侵入性檢查。圍術期亦需評估心臟功能與藥物(β阻斷、抗血小板)。", "options": {"A": "正確，延緩手術降低再梗塞風險。", "B": "超音波非主要決策。", "C": "無症狀不需逕行心導管介入。", "D": "非首要處置。"}, "sources": ["圍術期心臟風險", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-內科-75": {"quick": "CAD 病人不規則窄QRS快速心律(160)合併低血壓(不穩定)→同步整流電擊。", "detail": {"background": "快速心律之處置以『血流動力學是否穩定』為分水嶺。不穩定徵象＝低血壓/休克、意識改變、缺血性胸痛、急性心衰；本題CAD 病人不規則窄QRS、率160、血壓降至85/50 屬不穩定快速心房顫動，依ACLS 應立即『同步』整流電擊(約120–200J)，而非先用adenosine/amiodarone(用於穩定者)。", "options": {"A": "不穩定者不宜先用adenosine。", "B": "正確，不穩定→同步整流120J。", "C": "amiodarone 用於穩定者。", "D": "sotalol 非急救首選。"}, "sources": ["ACLS;不穩定心搏過速", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-通論-31": {"quick": "心肌梗塞後第3天、坐起前傾、胸骨左緣高頻刮擦聲→心包膜摩擦音(梗塞後心包炎)。", "detail": {"background": "心肌梗塞後心包炎有兩型：早期(數日內)梗塞區心外膜發炎(pericarditis epistenocardica)，與晚期(數週)免疫性Dressler 症候群。臨床為胸膜性胸痛(坐起前傾減輕)、心電圖瀰漫ST上升/PR下降、聽診心包摩擦音(坐起前傾、吐氣屏氣最明顯，可三相)。須與再梗塞/再缺血鑑別。", "options": {"A": "肋膜摩擦音隨呼吸且位肺野。", "B": "濕囉音為肺鬱血。", "C": "主動脈瓣逆流為舒張期雜音。", "D": "正確，心包膜摩擦音。"}, "sources": ["心包疾病;心肌梗塞併發", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-內科-33": {"quick": "發現冠脈鈣化者,進一步以運動心電圖評估有無誘發性缺血最有幫助。", "detail": {"background": "偶然發現冠狀動脈鈣化代表存在動脈硬化斑塊，但鈣化指數不等於管腔狹窄度；下一步應以『功能性檢查』評估是否造成可誘發之缺血，以決定治療。運動心電圖為簡便首選(可運動且基礎心電圖正常者)；不能運動或基礎ST異常者改用藥物負荷影像(核醫灌注、負荷超音波)。", "options": {"A": "24小時心電圖偵測心律非缺血。", "B": "正確，運動心電圖評估誘發缺血。", "C": "超音波看結構非缺血。", "D": "無症狀逕做心導管過度。"}, "sources": ["缺血性心臟病評估", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-外科-34": {"quick": "糖尿病足合併嚴重肢體缺血(脈弱、冰冷、ABI低、乾性壞死),優先血管成形術重建血流。", "detail": {"background": "糖尿病足合併嚴重肢體缺血(critical limb ischemia)：足趾乾性壞死、足背動脈脈搏微弱、皮膚冰冷、毛髮稀疏、ABI 低下。處置以『血流重建』為先(血管成形術/繞道)以挽救肢體與促進癒合；未重建即逕行截趾/植皮易失敗，膝下截肢為血流無法重建之最後手段。", "options": {"A": "正確，血管成形重建血流為先。", "B": "缺血未改善下植皮易失敗。", "C": "未重建逕截趾傷口難癒。", "D": "膝下截肢為最後手段。"}, "sources": ["周邊動脈疾病;糖尿病足", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-外科-69": {"quick": "低體溫(非hyperthermia)才會造成凝血障礙與術後出血;hyperthermia 不是 CABG 術後立即出血原因。", "detail": {"background": "CABG 術後早期(數小時內)出血原因包括：外科吻合處/移植血管(surgical bleeding)、protamine 中和肝素不足、體外循環造成之血小板功能障礙與凝血因子稀釋、以及『低體溫』所致凝血酶活性下降。高體溫(hyperthermia)並非凝血障礙原因，故非術後立即出血之因。", "options": {"A": "正確(非出血原因)：應為低體溫致凝血障礙。", "B": "吻合處出血為原因。", "C": "protamine 中和不足為原因。", "D": "血小板功能障礙為原因。"}, "sources": ["心臟外科術後出血", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-內科-4": {"quick": "服用 plavix(抗血小板)且術後傷口痛,優先選 acetaminophen(避免NSAID增加出血/腎/心血管風險)。", "detail": {"background": "接受PCI/CABG 且服用抗血小板劑(clopidogrel, Plavix)者，止痛應避免非類固醇消炎藥(NSAID：celecoxib、ketorolac、ibuprofen)——NSAID 抑制前列腺素、增加出血、腎損傷與心血管事件，且可能干擾aspirin 之抗血小板作用。acetaminophen 不影響血小板，為此族群首選止痛藥。", "options": {"A": "celecoxib 為NSAID,不宜。", "B": "ketorolac 為強效NSAID出血風險高。", "C": "ibuprofen 為NSAID。", "D": "正確，acetaminophen。"}, "sources": ["術後止痛;抗血小板", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-內科-25": {"quick": "變異型(Prinzmetal)心絞痛發作時心電圖為 ST 段『上升』,『ST下降』之敘述較不恰當。", "detail": {"background": "變異型(Prinzmetal)心絞痛為冠狀動脈痙攣所致，常於清晨或夜間休息時發作、與運動無固定關係；發作當下心電圖呈『ST段上升』(透壁性短暫缺血)，緩解後恢復。治療以鈣離子阻斷劑(±長效硝酸鹽)為主，避免非選擇性β阻斷(可使α介導痙攣惡化)與戒菸。本題敘述『ST下降』與痙攣型不符。", "options": {"A": "較不恰當(本題答案)：發作時ST段上升非下降。", "B": "清晨夜間休息發作,正確。", "C": "鈣阻斷劑為佳,正確。", "D": "冠脈痙攣為因,正確。"}, "sources": ["變異型心絞痛", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-通論-50": {"quick": "急性心肌梗塞胸痛不會隨呼吸動作引發(那是肋膜性);故『隨呼吸引發胸痛』非典型。", "detail": {"background": "急性心肌梗塞之缺血性胸痛特徵為胸骨後壓迫/緊縮/悶痛，常放射至單或雙肩臂、頸部或下顎，伴冷汗、噁心嘔吐，持續>20分鐘且休息或硝酸鹽未必緩解。與呼吸或姿勢變化相關之尖銳痛屬『肋膜性/心包性』，非心肌缺血典型。老人、糖尿病、女性可表現非典型(等同心絞痛)。", "options": {"A": "放射右肩臂,典型。", "B": "非典型(本題答案)：隨呼吸引發為肋膜性。", "C": "合併噁心嘔吐,典型。", "D": "放射雙肩臂,典型。"}, "sources": ["心肌梗塞臨床表現", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-通論-29": {"quick": "急性心肌梗塞最具臨床意義的心電圖變化是 ST 段上升超過 2mm。", "detail": {"background": "急性STEMI 最具意義之心電圖為相鄰兩導程ST段上升(肢導≥1mm、胸導V2-3 男≥2mm/女≥1.5mm，本題以>2mm 為顯著)，代表透壁性損傷需緊急再灌流。ST下降/T波倒置見於NSTEMI/缺血；病理性Q波為較晚之壞死表現；新發左束支阻滯亦具意義但本題以ST上升最關鍵。", "options": {"A": "正確，ST上升>2mm 最具意義。", "B": "ST下降意義次之。", "C": "Q波為較晚變化。", "D": "AV block 非首要診斷依據。"}, "sources": ["STEMI 心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-內科-77": {"quick": "急性心肌梗塞合併心因性休克:肺血管阻力相對不變(其餘選項之SVR、CO、SvO2 變化敘述皆錯)。", "detail": {"background": "心因性休克為幫浦衰竭：心輸出量(CO)下降、心臟充填壓(PCWP/CVP)上升、代償性全身血管阻力(SVR)上升以維持灌流壓→四肢冰冷、混合靜脈血氧飽和度(SvO2)下降。肺血管阻力(PVR)不一定明顯改變。本題以『PVR 相對不變』為正確，其餘SVR/CO/SvO2 之敘述方向皆與心因性休克相反。", "options": {"A": "SVR 應上升非下降。", "B": "正確，PVR 相對不變。", "C": "CO 應下降。", "D": "SvO2 應下降。"}, "sources": ["重症血流動力學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-內科-78": {"quick": "MI 併心室頻脈合併休克/低血壓(有脈但不穩定)→同步整流電擊(雙相100J)。", "detail": {"background": "心室頻脈處置依脈搏與穩定度：無脈VT→比照VF 立即去顫(非同步)；有脈但不穩定(休克、低血壓、缺血、急性心衰)→『同步』整流電擊(雙相約100J)；有脈且穩定→抗心律不整藥(amiodarone/procainamide/lidocaine)。本題MI 併VT、休克低血壓屬有脈不穩定，應同步整流。", "options": {"A": "不穩定不應只給藥。", "B": "有脈應同步而非非同步。", "C": "正確，不穩定→同步電擊100J。", "D": "單純輸液無法終止VT。"}, "sources": ["ACLS;VT", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-兒科-5": {"quick": "服用 plavix 之術後病人止痛優先 acetaminophen(避免NSAID)。", "detail": {"background": "同前：服用抗血小板劑clopidogrel(Plavix)之術後病人止痛應避免NSAID(增加出血、腎損傷與心血管風險)，選用不影響血小板的acetaminophen。必要時可在嚴密評估下短期使用其他鎮痛策略，但NSAID 為相對禁忌。", "options": {"A": "celecoxib NSAID。", "B": "ketorolac NSAID。", "C": "ibuprofen NSAID。", "D": "正確，acetaminophen。"}, "sources": ["術後止痛;抗血小板", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-11": {"quick": "專科護理師可在『醫師監督下』執行心臟整流術電擊治療。", "detail": {"background": "依『專科護理師於醫師監督下執行醫療業務辦法』，電氣治療(心臟整流/電擊)屬侵入性醫療處置，專師可在『醫師監督下』執行，但不得自行開立電擊能量醫囑或獨立決策；鎮靜止痛醫囑之開立屬醫師職權。釐清執業範圍可避免逾越法定授權。", "options": {"A": "開立鎮靜止痛醫囑屬醫師職權。", "B": "不可自行開立電擊醫囑。", "C": "正確，醫師監督下可執行。", "D": "病歷紀錄方式敘述不當。"}, "sources": ["專科護理師執業規範", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進
