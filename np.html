x, RCRI)以六項危險因子估算非心臟手術之重大心臟併發症：高風險手術、缺血性心臟病、鬱血性心衰竭、腦血管病、胰島素依賴糖尿病、血清肌酸酐>2.0 mg/dL。本題缺血性心臟病＋Cr 2.2＝2 項，併發症率約7%(0/1/≥2 項分別約0.4%/0.9%/≥7%)。", "options": {"A": "0危險因子才0.4%。", "B": "1項才0.9%。", "C": "正確，2項約7%。", "D": "3項以上才更高。"}, "sources": ["RCRI;圍術期風險", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-外科-61": {"quick": "接受大隱靜脈移植者死亡風險約為左內乳動脈移植的 1.6 倍(動脈移植通暢率與存活較佳)。", "detail": {"background": "CABG 移植血管之選擇影響長期通暢與存活：左內乳動脈(LIMA)接左前降支通暢率與存活最佳，為標準；橈動脈優於大隱靜脈；大隱靜脈長期通暢較差，死亡風險約為LIMA 的1.6 倍。雙側內乳動脈可改善存活但增加胸骨傷口感染(尤糖尿病、肥胖)。", "options": {"A": "大隱靜脈通暢『差於』橈動脈/內乳動脈。", "B": "雙側內乳存活『不低於』單側。", "C": "正確，大隱靜脈死亡風險約LIMA 1.6倍。", "D": "雙側內乳『較易』胸骨感染。"}, "sources": ["CABG 移植血管", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-家庭-62": {"quick": "勞動性心絞痛但休息心電圖正常,應優先安排運動心電圖檢查。", "detail": {"background": "勞動性心絞痛但靜息心電圖正常者，應以『運動心電圖(運動負荷測試)』作為合適之初步功能檢查，於運動誘發下偵測ST 變化與症狀；可運動且基礎心電圖可判讀者為首選。無法運動或基礎ST異常者改用藥物負荷影像(核醫灌注、負荷超音波)；冠脈CT 為解剖評估。", "options": {"A": "正確，運動心電圖。", "B": "超音波看結構非誘發缺血。", "C": "灌注掃描為次線。", "D": "冠脈CT 為解剖評估非首選功能檢查。"}, "sources": ["缺血性心臟病評估", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-家庭-64": {"quick": "臆斷為不穩定型心絞痛,最優先給藥物治療(抗血小板、β阻斷、硝酸甘油)穩定。", "detail": {"background": "不穩定型心絞痛/NSTE-ACS 初步以藥物穩定並危險分層：抗血小板(aspirin±P2Y12)、抗凝、β阻斷、硝酸甘油、他汀；依風險(GRACE/TIMI、troponin、動態心電圖)決定早期侵入(高危2–24小時內導管)或保守策略。並非一律立即PCI，亦不可於急性期安排運動訓練。", "options": {"A": "非一律立即PCI(依風險分層)。", "B": "正確，先藥物穩定。", "C": "急性期不宜運動訓練。", "D": "生活型態調整為後續非急性優先。"}, "sources": ["NSTE-ACS 處置", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-家庭-69": {"quick": "心肌梗塞後合併高三酸甘油脂,飲食建議高纖、高蛋白(低飽和脂肪/精製糖)。", "detail": {"background": "心肌梗塞後之飲食次級預防採心臟健康(地中海型)：高纖(全穀、蔬果)、優質蛋白、減少飽和脂肪與反式脂肪、限制精製糖與鈉；合併高三酸甘油脂者尤應減少精製澱粉與酒精。高澱粉/高醣會升高三酸甘油脂，不利血脂控制。", "options": {"A": "低渣低油非針對心血管次級預防。", "B": "高澱粉會升TG。", "C": "正確，高纖高蛋白。", "D": "高醣高熱量不利。"}, "sources": ["心血管飲食", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-外科-33": {"quick": "CABG 術後出現窄QRS陣發性心搏過速(疑SVT),可先給 adenosine。", "detail": {"background": "CABG 術後常見心律不整(尤心房顫動/撲動)。若為窄QRS、規則之陣發性室上頻脈(PSVT)且穩定，迷走刺激後以adenosine 快速推注為首選；心房顫動/撲動則以控率(β阻斷、diltiazem)或整流處理。需配合原圖判讀心律型態。", "options": {"A": "正確，疑PSVT 先用adenosine。", "B": "diltiazem 用於AF/AFL控率。", "C": "lidocaine 用於室性心律。", "D": "metoprolol 控率非終止PSVT首選。"}, "sources": ["ACLS;PSVT(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-通論-麻醉-48": {"quick": "置放藥物塗層支架後若尚未完成6 個月雙重抗血小板治療,擇期手術應考慮延後。", "detail": {"background": "近期置放藥物塗層支架者需完成建議期程之雙重抗血小板治療(DAPT，多為6個月，視出血/缺血風險調整)以防支架血栓；若尚未完成DAPT 而需擇期非心臟手術，應延後手術；不可貿然全停抗血小板，必要時與心臟科共同評估橋接策略。", "options": {"A": "不一定要全程續用,且需個別評估。", "B": "正確，未完成DAPT 應延後。", "C": "3個月即全停過早。", "D": "1個月即全停過早。"}, "sources": ["DES;圍術期DAPT", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-通論-5分科-63": {"quick": "突發胸痛判斷正確者:心肌梗塞可出現囉音、心電圖可呈ST段下降(=23)。", "detail": {"background": "突發胸痛判讀重點：心肌梗塞可合併左心衰竭出現肺部囉音(rales)；NSTEMI/缺血心電圖可呈ST段下降(非僅上升)。心尖小範圍刺痛多非典型心絞痛(偏肌肉骨骼/心理性)；聽到心雜音不能排除心肌梗塞(可為併發之二尖瓣逆流)。故正確為②③。", "options": {"A": "含『心尖刺痛為典型』錯誤。", "B": "含排除MI 錯誤。", "C": "正確，2囉音、3 ST下降。", "D": "含排除MI 錯誤。"}, "sources": ["心肌梗塞臨床/心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-家庭-74": {"quick": "β阻斷劑並非『所有』心肌梗塞病人都應儘速投予(休克、緩脈、心衰急性期等為禁忌),故敘述錯誤。", "detail": {"background": "STEMI 治療：①立即aspirin(無禁忌)；②再灌流為核心——可施行PCI 則門到球囊<90分鐘，採溶栓則門到針<30分鐘；③血流動力不穩之心室頻脈/顫動儘速電擊。β阻斷可降耗氧但在心因性休克、急性心衰、嚴重緩脈/房室阻滯為禁忌，並非『所有』MI 病人皆應儘速投予，故該敘述錯誤。", "options": {"A": "無禁忌立即aspirin,正確。", "B": "溶栓door-to-needle<30分,正確。", "C": "錯誤(本題答案)：β阻斷非所有MI 皆應儘速投予。", "D": "不穩定VT 儘速電擊,正確。"}, "sources": ["STEMI 治療;β阻斷禁忌", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-通論-20": {"quick": "心電圖 P 波與 QRS 各自獨立(無關聯)→第三度(完全性)房室傳導阻滯。", "detail": {"background": "完全性(第三度)房室傳導阻滯：心房(P波)與心室(QRS)各自獨立節律、P–R 無固定關係(房室分離)，心室由交界區或心室自主逸搏維持(率慢、QRS 可寬)。病灶多在希氏束以下，atropine 多無效，常需經皮/經靜脈節律器，確定者植入永久節律器。需與高度第二度阻滯區分。", "options": {"A": "病竇症候群為竇房節問題。", "B": "竇性心律不整隨呼吸變化。", "C": "正確，三度AV block。", "D": "心房顫動無清楚P波、RR絕對不規則。"}, "sources": ["心電圖判讀(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-內科-33": {"quick": "digoxin 不建議用於急性心室上心搏過速(起效慢,WPW 時更危險)。", "detail": {"background": "急性室上心搏過速(SVT)終止/控率順序：迷走刺激→adenosine 快速推注→房室結阻斷劑(非二氫吡啶CCB verapamil/diltiazem、β阻斷)。digoxin 起效慢、作用弱，且在預激症候群(WPW)會抑制房室結而促旁路傳導，可能誘發致命快速心律，故不建議用於急性SVT。", "options": {"A": "正確(不建議)：digoxin 起效慢、WPW 危險。", "B": "amiodarone 可用。", "C": "metoprolol 可用。", "D": "verapamil 可用。"}, "sources": ["心室上心搏過速處置", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-通論-39": {"quick": "Torsades de pointes 常反覆或惡化為心室顫動,並非『通常會自己停止』,故敘述錯誤。", "detail": {"background": "Torsades de pointes(尖端扭轉型VT)與QT 延長相關，誘因包括低血鎂/鉀/鈣、Ia/III 類抗心律不整藥、巨環內酯、三環抗憂鬱、先天長QT 症候群等。處置：停用致病藥、矯正電解質、給MgSO4(即使血鎂正常)，不穩定或無脈則電擊；常反覆發作或惡化為心室顫動，並非『通常自行停止』。", "options": {"A": "低鎂鉀鈣可誘發,正確。", "B": "多種藥物可誘發,正確。", "C": "血鎂正常仍可給MgSO4,正確。", "D": "錯誤(本題答案)：常反覆/退化為VF,非通常自停。"}, "sources": ["Torsades de pointes", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-內科-57": {"quick": "amiodarone 最易造成甲狀腺機能異常(含碘)。", "detail": {"background": "amiodarone 為Class III(含碘)，副作用廣泛：甲狀腺功能異常(亢進或低下)、肺纖維化/間質性肺炎、肝毒性、角膜微沉積、皮膚藍灰色變、光敏感、QT 延長。其中『甲狀腺機能異常』與其高碘含量直接相關，是長期使用須定期監測甲狀腺功能的原因。", "options": {"A": "quinidine 非典型甲狀腺影響。", "B": "sotalol 主要QT延長。", "C": "verapamil 為CCB。", "D": "正確，amiodarone 影響甲狀腺。"}, "sources": ["抗心律不整藥物副作用", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-內科-76": {"quick": "無脈搏心室頻脈須立即去顫;MgSO4 僅用於 Torsades de pointes。", "detail": {"background": "無脈搏心室頻脈(pulseless VT)比照心室顫動處置：立即高能去顫(雙相約120–200J)、接續高品質CPR、腎上腺素1mg q3-5min、難治者amiodarone 首劑300mg(再150mg)。MgSO4 僅用於Torsades de pointes。逐步加能量、高劑量腎上腺素或將amiodarone 首劑誤為150mg 皆不正確。", "options": {"A": "非從小劑量逐增,且應立即高能去顫。", "B": "高劑量腎上腺素未提高效果。", "C": "amiodarone 心跳停止首劑為300mg。", "D": "正確，MgSO4 僅用於TdP。"}, "sources": ["ACLS", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106b-內科-34": {"quick": "不穩定(低血壓、嗜睡)之嬰兒窄QRS心搏過速(280),最需立即同步整流。", "detail": {"background": "嬰兒窄QRS心搏過速(率約220–300)多為SVT；若血流動力學不穩(低血壓、嗜睡、灌流不足，如本題BP 40/20)應立即『同步整流』(0.5–1 J/kg，必要時增至2 J/kg)。穩定且有靜脈管路者可先試adenosine(0.1mg/kg 快速推注)；冰敷臉為迷走刺激用於穩定者；去顫(非同步)用於無脈VT/VF。", "options": {"A": "去顫用於無脈VT/VF。", "B": "adenosine 用於穩定者或整流前嘗試。", "C": "迷走刺激用於穩定者。", "D": "正確，不穩定→同步整流。"}, "sources": ["小兒ACLS;SVT", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-內科-36": {"quick": "amiodarone 可能造成肺部病變(肺纖維化)。", "detail": {"background": "amiodarone 屬Class III，半衰期極長(約數週至58天)，組織蓄積。重要副作用：肺毒性(肺纖維化/間質性肺炎，須監測肺功能與胸部X光)、甲狀腺(非副甲狀腺)功能異常、肝毒、皮膚與角膜變化。故『可能造成肺部病變』正確；半衰期非6個月、非Class Ia。", "options": {"A": "半衰期數週非6個月。", "B": "正確，可致肺纖維化。", "C": "是甲狀腺非副甲狀腺。", "D": "屬Class III 非Ia。"}, "sources": ["amiodarone", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-兒科-42": {"quick": "嬰兒室上心搏過速初步處置以『冰水袋敷臉』誘發潛水反射(迷走刺激)。", "detail": {"background": "嬰幼兒SVT 之迷走刺激首選冰敷臉(冰水袋敷於前額/鼻樑，誘發潛水反射)；禁止壓眼球(視網膜傷害)、按摩頸動脈竇(嬰兒不適用)或悶住口鼻。迷走刺激無效且穩定者給adenosine，不穩定者同步整流。年長兒童/成人可用Valsalva 或單側頸動脈按摩。", "options": {"A": "按摩頸動脈竇不適用嬰兒。", "B": "悶口鼻危險不當。", "C": "按壓眼球禁忌。", "D": "正確，冰水袋敷臉。"}, "sources": ["小兒SVT", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-通論-62": {"quick": "非瓣膜性心房顫動用 NOAC 不需例行 INR/aPTT 監測;需注意與某些食品/藥物交互作用。", "detail": {"background": "新型口服抗凝血劑(NOAC/DOAC：dabigatran 直接凝血酶抑制劑、rivaroxaban/apixaban 為Xa 抑制劑)用於非瓣膜性心房顫動之中風預防，不需例行INR/aPTT 監測、起效快、食物藥物交互作用較warfarin 少但仍存在(故需衛教)；不適用於機械瓣膜或中重度二尖瓣狹窄之AF(該情況用warfarin)。", "options": {"A": "不需例行INR。", "B": "不需例行aPTT。", "C": "正確(本題答案)：需注意交互作用之衛教。", "D": "不適用嚴重瓣膜性AF。"}, "sources": ["心房顫動抗凝;NOAC", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-通論-19": {"quick": "電擊整流中病人轉為心室顫動,應關掉同步鈕,立即施予(非同步)去顫電擊。", "detail": {"background": "心臟整流(cardioversion)過程中若轉為心室顫動(VF)，因VF 無清楚R波，同步模式會等待R波而無法放電；應立即『關閉同步鈕』改為非同步去顫並接續CPR。VF/無脈VT 為可電擊心律，需立即去顫，不可延誤給藥或重複嘗試同步電擊。", "options": {"A": "應先去顫再CPR(已備電擊器)。", "B": "先去顫非先給藥。", "C": "VF 不可用同步電擊。", "D": "正確，關同步立即去顫。"}, "sources": ["ACLS;VF", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-內科-80": {"quick": "ACLS 須先電擊的心律為心室顫動與無脈性 Torsades(=○1○2)。", "detail": {"background": "ACLS 之『可電擊心律』需先電擊而非優先給藥：心室顫動(VF)與無脈性心室頻脈(含無脈Torsades)，應立即去顫並接續CPR。穩定型陣發性室上頻脈(PSVT)以迷走刺激/adenosine 處理；無脈電氣活動(PEA)與心搏停止(asystole)為不可電擊心律，以CPR＋腎上腺素並找可逆病因(H&T)。故①②為先電擊者。", "options": {"A": "正確，VF 與無脈TdP 先電擊。", "B": "含穩定PSVT 不需先電擊。", "C": "含PEA 不電擊。", "D": "含穩定PSVT/PEA。"}, "sources": ["ACLS", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-內科-40": {"quick": "digoxin 不建議用於急性室上心搏過速。", "detail": {"background": "同前：急性室上心搏過速處置以迷走刺激、adenosine、房室結阻斷劑(β阻斷、非DHP CCB)或procainamide(尤WPW)為主；digoxin 起效慢、效力弱且在預激時危險，不建議用於急性SVT。", "options": {"A": "正確(不建議)：digoxin。", "B": "amiodarone 可用。", "C": "metoprolol 可用。", "D": "procainamide 可用(尤WPW)。"}, "sources": ["SVT 處置", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-內科-41": {"quick": "竇性心搏過緩出現灌流不足/不穩定時,ACLS 首選 atropine。", "detail": {"background": "症狀性心搏過緩(灌流不足/不穩定)之ACLS 處置：第一線atropine 0.5mg IV 可重複(總量3mg)；無效改用多巴胺(5–20 mcg/kg/min)或腎上腺素(2–10 mcg/min)輸注，或經皮節律器(TCP)。atropine 對結上阻滯有效，對結下(Mobitz II、完全阻滯)效果差。", "options": {"A": "norepinephrine 非首選。", "B": "正確，atropine 首選。", "C": "amiodarone 用於快速心律。", "D": "dobutamine 非首選。"}, "sources": ["ACLS;心搏過緩", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-35": {"quick": "圍術期新發心房顫動若需 amiodarone,應靜脈注射超過10 分鐘(避免低血壓)。", "detail": {"background": "圍術期新發心房顫動：穩定者以控率為先(β阻斷、非DHP CCB；amiodarone 兼控率/整流)；不穩定者用『同步』整流電擊(非去顫)。amiodarone 負荷需緩慢靜脈輸注(>10分鐘)以免低血壓。digoxin 起效慢非第一線。>48小時整流前需評估抗凝。", "options": {"A": "digoxin 非第一線。", "B": "穩定者控率非優先電擊。", "C": "不穩定應『同步』整流非去顫。", "D": "正確，amiodarone IV >10分鐘。"}, "sources": ["圍術期心房顫動", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-內科-37": {"quick": "Class III 抗心律不整藥(amiodarone)主要阻斷鉀離子通道、延長再極化期。", "detail": {"background": "Vaughan-Williams 分類：Class I 鈉通道阻斷(Ia/Ib/Ic)；Class II β腎上腺素受體阻斷；Class III 鉀通道阻斷、延長動作電位與再極化、延長QT(amiodarone、sotalol、ibutilide)；Class IV 鈣通道阻斷。amiodarone 主屬Class III，但兼具I/II/IV 之多重作用。", "options": {"A": "正確，阻鉀通道延長再極化。", "B": "阻β為Class II。", "C": "阻鈣為Class IV。", "D": "阻鈉為Class I。"}, "sources": ["抗心律不整藥分類", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-內科-69": {"quick": "心律調節器導線贅生物、血培養革蘭氏陽性球菌→最可能為抗藥性凝固酶陰性葡萄球菌(表皮葡萄球菌)。", "detail": {"background": "心臟植入式裝置感染最常見凝固酶陰性葡萄球菌(表皮葡萄球菌,常具methicillin抗藥)與金黃色葡萄球菌;裝置相關感染需移除裝置加抗生素。", "options": {"A": "MSSA 可能但裝置感染以CoNS 最常見。", "B": "正確，抗藥性凝固酶陰性葡萄球菌。", "C": "viridans 多為自體瓣膜。", "D": "腸球菌較少見於導線。"}, "sources": ["心臟裝置感染;心內膜炎", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-內科-77": {"quick": "心搏過緩出現灌流不足時,ACLS 優先給 atropine。", "detail": {"background": "症狀性心搏過緩(灌流不足)之ACLS 首選atropine 0.5mg IV(可重複至3mg)；無效再用多巴胺或腎上腺素輸注或經皮節律器。atropine 透過抑制迷走加速竇房結與房室結傳導，對結上病灶有效；結下阻滯(Mobitz II/完全)效果差，需節律器。", "options": {"A": "norepinephrine 非首選。", "B": "正確，atropine。", "C": "epinephrine 為次線輸注。", "D": "dopamine 為次線。"}, "sources": ["ACLS;心搏過緩", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-內科-31": {"quick": "第二度 Mobitz 第二型房室阻斷(阻斷在結下)不宜用 atropine(無效甚至惡化),應節律器。", "detail": {"background": "atropine 對『結上』病灶(竇性過緩、第一度、Mobitz I)有效；第二度Mobitz II 與完全房室阻滯病灶多在希氏束以下(結下)，atropine 不僅無效，加速竇率反可能使下傳比例更差而惡化，應採經皮/經靜脈節律器。故Mobitz II 不宜用atropine。", "options": {"A": "竇性過緩 atropine 有效。", "B": "一度AV block atropine 有效。", "C": "Mobitz I atropine 多有效。", "D": "正確(不宜)：Mobitz II 需節律器。"}, "sources": ["心搏過緩處置", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-外科-33": {"quick": "術後持續性、穩定的心室頻脈可用 lidocaine 治療。", "detail": {"background": "穩定型(有脈、血流動力穩定)持續性心室頻脈：抗心律不整藥可選amiodarone、procainamide 或lidocaine；不穩定(低血壓、缺血、心衰、意識改變)則同步整流。verapamil/diltiazem(鈣阻斷)用於VT 禁忌——可致血流動力崩潰。本題術後穩定VT 可用lidocaine。", "options": {"A": "β阻斷非穩定VT首選終止藥。", "B": "正確，lidocaine。", "C": "verapamil 於VT禁忌。", "D": "diltiazem 於VT禁忌。"}, "sources": ["室性心律不整", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-通論-其他-69": {"quick": "無脈、心電圖為可電擊心律(VF/無脈VT)→最優先給予去顫電擊。", "detail": {"background": "確認無呼吸無脈且心電圖為可電擊心律(VF/無脈VT)時，最優先處置為『立即去顫』(雙相約200J)並接續高品質CPR(2分鐘後再分析)；腎上腺素、進階呼吸道、藥物為去顫與CPR 之後續，不可因建立呼吸道或給藥延誤首次電擊。", "options": {"A": "正確，立即去顫。", "B": "腎上腺素為去顫後接續。", "C": "通氣為CPR一環但去顫優先。", "D": "插管非最優先。"}, "sources": ["ACLS(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-內科-25": {"quick": "心電圖為規則窄QRS、心率快、無明顯P波→陣發性心室上心搏過速(PSVT)。", "detail": {"background": "陣發性室上頻脈(PSVT)心電圖：規則、窄QRS(<120ms)、心率約150–250、突發突止、P波常埋於或緊接QRS。多為房室結折返(AVNRT)或經旁路之房室折返(AVRT)。穩定者迷走刺激/adenosine，不穩定者同步整流。需與心房顫動(RR 絕對不規則)區分。", "options": {"A": "病竇症候群為過緩/竇性停頓。", "B": "竇性心律不整隨呼吸。", "C": "正確，PSVT。", "D": "AF 為RR絕對不規則。"}, "sources": ["心電圖(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-內科-26": {"quick": "室上頻脈(SVT)多為『折返(reentry)』機轉,而非心肌異常衝動,故敘述錯誤。", "detail": {"background": "室上頻脈(SVT)多為『折返(reentry)』機轉(AVNRT、AVRT)，少數為異位自律或心房內折返；並非『心肌異常衝動』。臨床常見心悸、多為窄QRS、可用Valsalva/頸動脈按摩等迷走刺激中止或協助診斷。adenosine 為藥物終止首選。", "options": {"A": "心悸常見,正確。", "B": "錯誤(本題答案)：多為折返非心肌異常衝動。", "C": "Valsalva 可緩解,正確。", "D": "多為窄QRS,正確。"}, "sources": ["心室上頻脈", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-外科-32": {"quick": "裝節律器病人術前使用β阻斷劑(適當病人)可降低圍術期缺血機率。", "detail": {"background": "裝節律器病人圍術期：長期服用β阻斷劑者續用至手術日可降低圍術期缺血(適當病人)；不應於手術當天才高劑量啟動β阻斷(POISE 顯示風險)；不需常規關閉節律器(必要時用磁鐵或重新設定)；電燒宜用雙極以減少電磁干擾。", "options": {"A": "正確，β阻斷降圍術期缺血。", "B": "不應手術當天高劑量啟動。", "C": "不需常規暫停節律器。", "D": "應用雙極而非單極電燒。"}, "sources": ["圍術期心臟管理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-通論-麻醉-48": {"quick": "術中並非『都應』放磁鐵使節律器變固定速率;磁鐵反應因機型而異,不可一概而論,故敘述錯誤。", "detail": {"background": "植入式節律器/ICD 圍術期：術前了解適應症、廠牌、目前功能與電池；聯絡廠商/專家評估是否重新設定並貼經皮去顫貼片；電燒用雙極減少電磁干擾。磁鐵反應因機型而異(對ICD 多為暫停抗心搏過速偵測、對節律器可能轉固定速率)，不應『一律』放磁鐵變固定速率。", "options": {"A": "術前評估,正確。", "B": "聯絡專家監測,正確。", "C": "用雙極電燒,正確。", "D": "錯誤(本題答案)：不應一律放磁鐵變固定速率。"}, "sources": ["節律器圍術期", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-通論-5分科-78": {"quick": "室上頻脈合併『意識改變』(血流動力學不穩)為心臟整流的適應症。", "detail": {"background": "室上頻脈(SVT)行心臟整流之適應症為『血流動力學不穩定』徵象：低血壓/休克、意識改變、缺血性胸痛、急性心衰竭。單純心率快(如180/分)、血壓偏高或皮膚潮紅冒汗本身非整流指標；穩定者應先迷走刺激與adenosine。", "options": {"A": "心率180 本身非整流指標。", "B": "高血壓非不穩定指標。", "C": "正確，意識改變為不穩定。", "D": "潮紅冒汗非整流指標。"}, "sources": ["ACLS;SVT 整流", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-兒科-23": {"quick": "心電圖 P 與 QRS 完全無關聯→第三度(完全性)房室傳導阻滯。", "detail": {"background": "完全性(第三度)房室傳導阻滯：P波與QRS 完全無關聯(房室分離)、P–R 無固定、心室由逸搏節律維持(慢、QRS 可寬)。與Mobitz I(PR 漸長後脫落)、Mobitz II(PR 固定、間歇脫落)不同。需配合原圖判讀；血流動力不穩需節律器。", "options": {"A": "Mobitz I 為PR漸長後脫落。", "B": "Mobitz II 為間歇脫落、PR固定。", "C": "竇性過緩+PVC 非此。", "D": "正確，三度AV block。"}, "sources": ["心電圖(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-通論-其他-69": {"quick": "無脈、可電擊心律(VF/無脈VT)→最優先去顫電擊(約200J)。", "detail": {"background": "確認無脈、心電圖為可電擊心律(VF/無脈VT)，最優先為立即去顫(雙相約200J)並接續CPR；同步整流用於『有脈』之不穩定快速心律。腎上腺素、插管為去顫與CPR 之後續。需配合原圖判讀心律。", "options": {"A": "同步整流用於有脈不穩定。", "B": "腎上腺素為後續。", "C": "插管非最優先。", "D": "正確，去顫200J。"}, "sources": ["ACLS(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-家庭-4": {"quick": "乳癌病人心搏過速、低血壓、頸靜脈怒張、心音遙遠→心包填塞(惡性心包積液)。", "detail": {"background": "惡性腫瘤(乳癌/肺癌)可致心包積液與填塞;Beck triad(低血壓、JVD、心音遙遠)、奇脈;超音波確診、心包穿刺引流。", "options": {"A": "急性心包炎以摩擦音胸痛為主。", "B": "心肌梗塞有缺血胸痛/ECG變化。", "C": "上腔靜脈症候群為臉頸腫脹。", "D": "正確，心包填塞。"}, "sources": ["心包填塞", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-兒科-16": {"quick": "心電圖 P 與 QRS 各自獨立→完全性房室傳導阻滯。", "detail": {"background": "完全性房室傳導阻滯：心電圖P波與QRS 各自獨立(房室分離)、心室逸搏節律。與一度(PR 延長但每跳下傳)、Mobitz I(PR 漸長後脫落)、Mobitz II(間歇脫落、PR 固定)區別。需配合原圖；症狀性或下傳不穩者植入節律器。", "options": {"A": "一度為PR延長但每跳傳導。", "B": "Mobitz I 為PR漸長後脫落。", "C": "Mobitz II 為間歇脫落PR固定。", "D": "正確，完全AV block。"}, "sources": ["心電圖(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-家庭-21": {"quick": "左心室(前/側壁)心肌梗塞多以幫浦衰竭、心搏過速表現,最不可能合併心搏過緩+休克。", "detail": {"background": "心搏過緩合併休克常見於：第三度房室阻滯、下壁(右冠脈)心肌梗塞(房室結缺血)、鴉片類中毒、鈣離子阻斷劑/β阻斷劑過量。左心室前/側壁大面積梗塞多以幫浦衰竭與代償性『心搏過速』表現，最不可能合併心搏過緩，故為本題答案。", "options": {"A": "三度AV block 致過緩。", "B": "最不可能(本題答案)：左室前側壁MI 多心搏過速。", "C": "鴉片中毒致過緩。", "D": "CCB 過量致過緩低血壓。"}, "sources": ["休克與心律", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-家庭-22": {"quick": "AED 第一次電擊後應立即恢復胸部按壓(不立刻摸脈/等指示)。", "detail": {"background": "使用AED 第一次電擊後，應『立即恢復胸部按壓』(高品質CPR 2分鐘)，不立刻檢查脈搏或等待AED 指示，以減少按壓中斷、維持冠脈灌流壓；2分鐘後AED 再自動分析心律。最小化電擊前後之按壓中斷是提高存活率關鍵。", "options": {"A": "不等待,立即按壓。", "B": "電擊後不立刻檢查脈搏。", "C": "已知無意識。", "D": "正確，立即胸部按壓。"}, "sources": ["BLS/AED", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-家庭-23": {"quick": "無脈、可電擊心律(VF/無脈VT)→優先非同步去顫(單相360J)。", "detail": {"background": "無呼吸無脈且心電圖為可電擊心律(VF/無脈VT)，應優先非同步去顫(單相360J 或雙相依機型約200J)並立即接續CPR。atropine 用於症狀性過緩、amiodarone 為去顫後輔助、插管非最優先。需配合原圖判讀。", "options": {"A": "插管非最優先。", "B": "正確，非同步去顫360J。", "C": "atropine 用於過緩非VF。", "D": "amiodarone 為去顫後輔助。"}, "sources": ["ACLS(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-家庭-51": {"quick": "夜間陣發性呼吸困難、端坐、頸靜脈怒張、S3、肺囉音→擴張型心肌病/心衰竭。", "detail": {"background": "夜間陣發性呼吸困難、端坐呼吸、頸靜脈怒張、第三心音(S3 gallop)、雙肺基底囉音為左心收縮功能不全之心衰竭表現；常見病因為擴張型心肌病。S3 反映容量負荷與快速充填，是收縮性心衰竭的重要徵象。心電圖心搏過速但無ST 缺血變化，支持非急性冠心之心衰竭。", "options": {"A": "肺栓塞多無S3 與端坐漸進水腫。", "B": "正確，擴張型心肌病(心衰竭)。", "C": "心包填塞為心音遙遠、奇脈。", "D": "ACS 有缺血性ECG變化。"}, "sources": ["心衰竭;擴張型心肌病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-麻醉-75": {"quick": "局部麻醉藥系統性中毒(LAST)心跳停止,最重要的解毒是脂肪乳劑(intralipid)—官方答 B、C 均給分。", "detail": {"background": "局部麻醉藥系統性中毒(LAST)：脂溶性高之bupivacaine 風險最大，先有口周麻木、耳鳴、頭暈、抽搐，續發心律不整甚至心跳停止。處置：停藥、確保氣道與CPR、給予『脂肪乳劑(20% intralipid)』為關鍵解毒(先bolus 1.5mL/kg 再輸注)、避免propofol(降壓)與大劑量血管加壓素/鈣阻斷/局麻劑。本題官方B、C(intralipid)均給分。", "options": {"A": "propofol 會加重低血壓,非解毒。", "B": "正確(送分認定)：20% intralipid。", "C": "正確(送分認定)：intralipid。", "D": "再給lidocaine 加重中毒。"}, "sources": ["LAST;脂肪乳劑急救;官方疑義", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-麻醉-80": {"quick": "過度反應呼吸道疾病病人,預防肺葉切除術後心房顫動可用 amiodarone。", "detail": {"background": "胸腔(肺葉切除)手術後心房顫動發生率高(30–50%)。過度反應性呼吸道疾病(氣喘/COPD)病人避免非選擇性β阻斷與某些藥物；amiodarone 對支氣管影響小，可用於預防/治療術後AF。adenosine 為終止SVT 非預防AF；nicardipine 為降壓非預防AF。", "options": {"A": "labetalol(β阻斷)於反應性呼吸道不佳。", "B": "正確，amiodarone。", "C": "nicardipine 非預防AF。", "D": "adenosine 為終止SVT非預防AF。"}, "sources": ["術後心房顫動預防", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-兒科-9": {"quick": "暈厥老人心電圖呈間歇性QRS脫落、PR固定→第二度 Mobitz II 房室阻斷。", "detail": {"background": "第二度Mobitz II 型房室阻滯：PR 間期固定，間歇出現P波後無QRS(脫落)，病灶在希氏束以下，易進展為完全阻滯並致暈厥(Stokes-Adams)，常需植入永久節律器。與Mobitz I(Wenckebach，PR 漸長後脫落、多良性)不同。需配合原圖判讀。", "options": {"A": "一度為PR延長但不脫落。", "B": "Mobitz I 為PR漸長後脫落。", "C": "正確，Mobitz II。", "D": "完全阻斷P-QRS無關聯。"}, "sources": ["心電圖(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-麻醉-48": {"quick": "ICD 圍術期:磁鐵僅暫停去顫偵測,『移除後都會恢復』非絕對(依機型程式),敘述錯誤。", "detail": {"background": "植入式心臟復律去顫器(ICD)圍術期：單極電燒比雙極更易產生電磁干擾(可能誤觸發或抑制)；應聯絡廠商重新設定(暫停抗心搏過速治療)並貼經皮去顫貼片、連續心電圖與動脈壓監測；磁鐵置於ICD 多為暫停去顫『偵測』，但移除後是否自動恢復因機型程式而異，不可一概而論，故該敘述錯誤。", "options": {"A": "單極較易EMI,正確。", "B": "聯絡廠商並貼外部去顫片,正確。", "C": "連續監測,正確。", "D": "錯誤(本題答案)：磁鐵反應因機型而異。"}, "sources": ["ICD 圍術期", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-通論-5分科-65": {"quick": "瓣膜疾病正確者:僧帽瓣逆流雜音於心尖最清楚、僧帽瓣狹窄致左房擴大後續心律不整(=34)。", "detail": {"background": "MS 為舒張期雜音(非收縮期);AS 雜音於右上胸骨緣(非左上);MR 於心尖;MS→左房擴大→易發心房顫動。", "options": {"A": "含MS收縮期雜音(錯)。", "B": "含AS位置錯。", "C": "含MS收縮期/AS位置錯。", "D": "正確，3 MR心尖、4 MS致左房擴大心律不整。"}, "sources": ["心臟聽診;瓣膜疾病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-精神科-12": {"quick": "高壓電電傷因組織破壞釋鉀,心電圖常呈高尖T波、QRS變寬(類高血鉀)。", "detail": {"background": "電傷造成廣泛組織壞死、鉀離子釋出致高血鉀;ECG 高尖T波、QRS增寬,並可致心律不整。", "options": {"A": "非典型。", "B": "QT延長非主要。", "C": "正確，高尖T波、QRS變寬。", "D": "竇性頻脈非特異。"}, "sources": ["電傷;高血鉀心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-通論-14": {"quick": "喉嚨痛後遊走性關節炎、紅斑、S3 與心尖泛收縮期雜音→急性風濕熱。", "detail": {"background": "鏈球菌咽炎後急性風濕熱(Jones):心臟炎、遊走多關節炎、邊緣性紅斑、舞蹈症、皮下結節。", "options": {"A": "正確，急性風濕熱。", "B": "猩紅熱無心臟炎雜音。", "C": "急性心內膜炎多發燒栓塞。", "D": "亞急性心內膜炎病程更緩。"}, "sources": ["急性風濕熱", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-通論-19": {"quick": "主動脈瓣閉鎖不全為舒張期雜音,不在收縮期。", "detail": {"background": "收縮期:三尖瓣/二尖瓣逆流、AS、PS、VSD;舒張期:AR、MS。", "options": {"A": "三尖瓣逆流收縮期。", "B": "PS 收縮期。", "C": "VSD 收縮期。", "D": "正確(非收縮期)：AR 舒張期。"}, "sources": ["心臟聽診", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-通論-21": {"quick": "逐漸氣喘、奇脈(吸氣收縮壓降20mmHg)、肺癌→心包轉移併心包填塞。", "detail": {"background": "奇脈為心包填塞重要徵象;惡性腫瘤可心包轉移致填塞。", "options": {"A": "肺栓塞多急性。", "B": "正確，肺癌心包轉移併填塞。", "C": "心內膜炎以發燒栓塞為主。", "D": "肺炎積液無奇脈。"}, "sources": ["心包填塞;奇脈", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-精神科-23": {"quick": "不穩定(低血壓、缺血胸痛)且有脈快速心律→雙相同步整流100焦耳。", "detail": {"background": "有脈不穩定快速心律用同步整流(雙相約100–200J)。需配合原圖。", "options": {"A": "正確，雙相同步100J。", "B": "有脈不用非同步。", "C": "單相非首選。", "D": "非同步用於VF/無脈VT。"}, "sources": ["ACLS(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-精神科-31": {"quick": "低血鈣心電圖呈 QT 延長,並可誘發心室心律不整。", "detail": {"background": "低血鈣(校正後更低):QT延長、可致TdP/心室心律;常並存低血鎂。", "options": {"A": "非低血鈣典型。", "B": "非低血鈣典型。", "C": "非低血鈣典型。", "D": "正確，QT延長並引發心室心律。"}, "sources": ["電解質與心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-通論-33": {"quick": "尖銳且隨呼吸加劇的左胸痛(肺炎後)最可能為肋膜痛。", "detail": {"background": "肋膜性胸痛:尖銳、隨呼吸/咳嗽加劇;心絞痛為悶壓與勞動相關。", "options": {"A": "心絞痛悶壓。", "B": "正確，肋膜痛。", "C": "氣胸多突發呼吸困難。", "D": "逆流為灼熱與姿勢相關。"}, "sources": ["胸痛鑑別", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-內科-34": {"quick": "夜間胸痛、運動心電圖正常→疑變異型心絞痛,以24小時心電圖鑑別。", "detail": {"background": "夜間/休息發作疑冠脈痙攣,Holter 捕捉發作時ST變化。", "options": {"A": "X光無助。", "B": "正確，24小時心電圖。", "C": "運動灌注非首選。", "D": "超音波看結構。"}, "sources": ["變異型心絞痛", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-內科-36": {"quick": "COPD 竇性緩脈、下壁導程變化→加做右胸12導程評估右心室梗塞。", "detail": {"background": "下壁MI 常合併右室梗塞與緩脈;右胸導程(尤V4R)ST上升提示RV梗塞。", "options": {"A": "非首要。", "B": "非首要。", "C": "非首要。", "D": "正確，右胸12導程。"}, "sources": ["下壁/右室心梗", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-外科-37": {"quick": "乳房根除術後第2天胸痛,最不可能為傷口感染(感染多3–5天後)。", "detail": {"background": "術後早期胸痛可為傷口痛、肋膜積液、甚至MI;傷口感染第2天太早。", "options": {"A": "肋膜積液可能。", "B": "傷口痛常見。", "C": "MI 需警覺。", "D": "最不可能(本題答案)：傷口感染太早。"}, "sources": ["術後胸痛", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-外科-38": {"quick": "術前肌酸酐<2 不是圍術期心臟事件高危因子(>2 才是)。", "detail": {"background": "RCRI:IHD/異常Q波、心衰竭、腦血管病(TIA)、胰島素糖尿病、Cr>2.0、高風險手術。", "options": {"A": "TIA 為危險因子。", "B": "正確(非危險因子)：Cr<2。", "C": "異常Q波為危險因子。", "D": "腹腔內手術高風險。"}, "sources": ["RCRI", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-兒科-46": {"quick": "又尖又細的收縮期雜音不代表心臟擴大或負擔過大(常為無害雜音)。", "detail": {"background": "負擔/擴大徵象:S3奔馬律、precordial heave、hyperdynamic;高頻細雜音常無害。", "options": {"A": "正確(不表示)。", "B": "S3 提示容量負荷。", "C": "heave 提示肥大。", "D": "hyperdynamic 提示負荷增加。"}, "sources": ["小兒心臟評估", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-外科-65": {"quick": "冠心病合併腦血管疾病,評估腦血管以頸動脈雙功能超音波最適當。", "detail": {"background": "Carotid duplex 評估頸動脈狹窄;其餘為心臟檢查。", "options": {"A": "心肌存活度為心臟。", "B": "心導管為冠脈。", "C": "心臟超音波為心臟。", "D": "正確，頸動脈超音波。"}, "sources": ["腦血管評估", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-外科-66": {"quick": "CABG 術後不應維持核心體溫>37.5°C(發燒增加耗氧),為不適當。", "detail": {"background": "術後:適當灌流壓60–80、SvO2≥60%、CI≥2.2、避免發燒。", "options": {"A": "灌流壓,適當。", "B": "不適當(本題答案)：不應體溫>37.5。", "C": "SvO2 60%,適當。", "D": "CI 2.2,適當。"}, "sources": ["CABG 術後", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-內科-75": {"quick": "TTM 目標體溫為32–36°C(非28–32°C),敘述為非。", "detail": {"background": "復甦後對指令無意義反應者行TTM;目標32–36°C 至少24小時並避免後續發燒。", "options": {"A": "行TTM,正確。", "B": "錯誤(本題答案)：應32–36°C。", "C": "對神經預後有益,正確。", "D": "避免後續發燒,正確。"}, "sources": ["ACLS;復甦後", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-內科-19": {"quick": "年輕胸悶者12導程心電圖無缺血/肥大變化→正常心電圖。", "detail": {"background": "無病理Q波、無ST-T缺血、無LVH→正常。需配合原圖。", "options": {"A": "無LVH。", "B": "無慢性缺血。", "C": "無急性缺血。", "D": "正確，正常心電圖。"}, "sources": ["心電圖(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-通論-30": {"quick": "心房顫動與高血鉀關聯性最低。", "detail": {"background": "高血鉀ECG:高尖T波、PR延長、QRS增寬、接合點心律、VT/VF;AF 非典型。", "options": {"A": "高尖T波典型。", "B": "正確(關聯最低)：AF。", "C": "接合點心律可見。", "D": "VT 可見。"}, "sources": ["高血鉀心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-通論-32": {"quick": "低血壓+缺血胸痛(不穩定)且有脈快速心律→同步整流100焦耳。", "detail": {"background": "有脈不穩定快速心律用同步整流。需配合原圖。", "options": {"A": "正確，同步整流100J。", "B": "有脈不用非同步。", "C": "200J 非首選。", "D": "非同步用於VF。"}, "sources": ["ACLS(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-通論-33": {"quick": "無法測得血壓、可電擊心律→立即去顫200J雙相。", "detail": {"background": "無脈VF/無脈VT 即去顫;腎上腺素/amiodarone 為去顫間接續。需配合原圖。", "options": {"A": "無脈不用同步。", "B": "腎上腺素為後續。", "C": "正確，去顫200J。", "D": "amiodarone 輔助。"}, "sources": ["ACLS(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-外科-34": {"quick": "急性冠心症急診即刻可靜脈注射 nitroglycerin。", "detail": {"background": "ACS:aspirin、硝酸甘油、嗎啡(靜脈)、必要時氧氣;docusate/菸鹼酸非急性。", "options": {"A": "正確，靜脈NTG。", "B": "菸鹼酸非急性。", "C": "嗎啡應靜脈。", "D": "docusate 為軟便劑。"}, "sources": ["ACS 處置", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-通論-35": {"quick": "高血壓急症不應給舌下 nifedipine(降壓過快致心肌缺氧),醫囑不正確。", "detail": {"background": "舌下短效nifedipine 不可控、可致缺血/中風,不建議;急症應靜脈可控降壓。", "options": {"A": "非標準。", "B": "舌下不安全。", "C": "問題在風險非效果。", "D": "正確，可致心肌缺氧。"}, "sources": ["高血壓急症", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-內科-37": {"quick": "心電圖為插入性心室早期收縮(interpolated PVC)。", "detail": {"background": "Interpolated PVC 夾於兩竇性搏動間、無代償間歇。需配合原圖。", "options": {"A": "multifocal PVC 形態多樣。", "B": "正確，interpolated PVC。", "C": "VT 為連續寬QRS。", "D": "逸搏於過緩後。"}, "sources": ["心電圖(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-外科-37": {"quick": "外傷性主動脈斷裂胸部X光最常見為縱隔腔增寬。", "detail": {"background": "減速傷致主動脈峽部破裂:X光縱隔增寬最常見;CT 確診。", "options": {"A": "正確，縱隔增寬。", "B": "主動脈結模糊次之。", "C": "氣管右偏次之。", "D": "左主支氣管下壓次之。"}, "sources": ["外傷性主動脈損傷", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106a-內科-77": {"quick": "夜間發作、運動心電圖正常之變異型心絞痛,治療以鈣阻斷劑加硝酸鹽。", "detail": {"background": "冠脈痙攣型:鈣阻斷為主、硝酸鹽緩解;避免非選擇性β阻斷。", "options": {"A": "含β阻斷不宜。", "B": "含β阻斷。", "C": "正確，鈣阻斷+硝酸鹽。", "D": "ACEI 非首選。"}, "sources": ["變異型心絞痛", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106b-內科-35": {"quick": "下肢血氧高於上肢(反向差異性發紺)→大動脈轉位合併開放性動脈導管。", "detail": {"background": "TGA+PDA 可出現反向差異性發紺:含氧較高血經PDA 供降主動脈。", "options": {"A": "正確，TGA+PDA。", "B": "VSD 無差異。", "C": "TOF 全身發紺。", "D": "TAPVR 全身發紺。"}, "sources": ["先天性心臟病", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106b-內科-48": {"quick": "法洛氏四重症發紺發作治療含給氧、嗎啡鎮靜、膝胸屈曲姿勢,敘述正確。", "detail": {"background": "TOF 嚴重度主取決於右室流出道狹窄;靴型心(雪人為TAPVR);四特徵含右室肥大。", "options": {"A": "嚴重度主取決右室流出道非VSD。", "B": "正確，給氧/嗎啡/膝胸位。", "C": "雪人為TAPVR。", "D": "四特徵尚含右室肥大。"}, "sources": ["法洛氏四重症", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106b-內科-49": {"quick": "主動脈窄縮病童典型為股動脈搏動變弱(下肢血壓低於上肢)。", "detail": {"background": "Coarctation:上肢高血壓、下肢血壓低、股動脈搏動弱/延遲。", "options": {"A": "正確，股動脈搏動弱。", "B": "洪脈見於PDA/AR。", "C": "下肢血壓應較低。", "D": "連續雜音見於PDA。"}, "sources": ["主動脈窄縮", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "106-106b-內科-51": {"quick": "captopril(ACEI)可降低心臟後負荷。", "detail": {"background": "ACEI/血管擴張劑降後負荷;digoxin 增收縮;furosemide 降前負荷;β阻斷降心率。", "options": {"A": "digoxin 增收縮力。", "B": "furosemide 降前負荷。", "C": "propranolol 降心率。", "D": "正確，captopril 降後負荷。"}, "sources": ["心衰竭藥理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-內科-34": {"quick": "急性DVT 不應只給單一劑量5000U 肝素(劑量不足且需持續抗凝)。", "detail": {"background": "DVT:LMWH 或UFH 體重負荷(80U/kg)後持續輸注(18U/kg/hr)監測aPTT,橋接warfarin。", "options": {"A": "肝素橋接warfarin,適當。", "B": "LMWH 適當。", "C": "不適當(本題答案)：單一5000U 不足。", "D": "體重給UFH持續輸注,適當。"}, "sources": ["靜脈栓塞抗凝", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-內科-35": {"quick": "年輕人偶發心悸,心電圖為非持續性心室頻脈(NSVT)。", "detail": {"background": "NSVT:連續≥3個寬QRS、<30秒自行終止。需配合原圖。", "options": {"A": "竇性心律不整隨呼吸。", "B": "心室震顫致命無脈。", "C": "AF 為窄QRS不規則。", "D": "正確，非持續性VT。"}, "sources": ["心電圖(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-通論-10": {"quick": "PMI(最大搏動點)>2.5 公分最可能為左心室肥大。", "detail": {"background": "PMI 正常位於第5肋間鎖骨中線、直徑<2.5cm;增大或外移提示左心室肥大/擴大。", "options": {"A": "正確，左心室肥大。", "B": "右心室肥大為胸骨左緣抬舉。", "C": "左心房擴大不以PMI表現。", "D": "右心房擴大不以PMI表現。"}, "sources": ["身體評估;心臟", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-通論-36": {"quick": "刀割穿刺樣胸骨痛、深呼吸或平躺加重→心包膜炎。", "detail": {"background": "心包炎胸痛:銳痛、吸氣/平躺加重、前傾減輕,可聞摩擦音。", "options": {"A": "氣胸多突發呼吸困難。", "B": "二尖瓣脫垂多非姿勢相關。", "C": "正確，心包膜炎。", "D": "主動脈剝離為撕裂放射痛。"}, "sources": ["心包炎", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-通論-55": {"quick": "末期腎病洗腎前低血壓、心電圖異常→高血鉀症。", "detail": {"background": "ESRD 洗腎前易高血鉀:高尖T波、QRS增寬、PR延長,嚴重致心律不整/停止。需配合原圖。", "options": {"A": "非急性MI典型。", "B": "正確，高血鉀。", "C": "LVH 非此情境。", "D": "高血鈣為QT縮短。"}, "sources": ["高血鉀心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-通論-58": {"quick": "心電圖為規則PSVT,將其鑑別診斷敘述為『PSVT與心房顫動』為非(AF 為不規則)。", "detail": {"background": "PSVT 規則窄QRS;AF 為RR絕對不規則,兩者形態不同。迷走刺激/Valsalva/adenosine 可協助鑑別/終止。需配合原圖。", "options": {"A": "為非(本題答案)：規則PSVT 不應與AF混為鑑別。", "B": "頸動脈按摩可鑑別,正確。", "C": "Valsalva 可鑑別,正確。", "D": "adenosine 可鑑別,正確。"}, "sources": ["PSVT(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-通論-59": {"quick": "股骨骨折術後突發昏厥、心電圖異常→肺栓塞。", "detail": {"background": "術後制動為PE 高危;PE 可致暈厥、低血壓、右心負荷(S1Q3T3、竇性頻脈)。需配合原圖。", "options": {"A": "急性MI 可能但骨折術後更指向PE。", "B": "正確，肺栓塞。", "C": "AF併中風非此。", "D": "高血鉀有其ECG特徵。"}, "sources": ["肺栓塞", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "107-TNPA-內科-77": {"quick": "依連續心電圖大格估算,心率約 150 bpm。", "detail": {"background": "心率估算:300÷大格數;若R-R 約2大格則150 bpm。需配合原圖。", "options": {"A": "100 需3大格。", "B": "非。", "C": "正確，約150 bpm。", "D": "180 需更短R-R。"}, "sources": ["心率估算(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-通論-3": {"quick": "路倒、低血壓、心跳快、頸靜脈無怒張→低血容性休克,優先給乳酸林格氏液補液。", "detail": {"background": "低血容性休克(無JVD、低CVP)首要快速晶體輸液(LR/NS);升壓/抗心律不整非首要。", "options": {"A": "dopamine 非首要。", "B": "碳酸氫鈉非首要。", "C": "amiodarone 非此。", "D": "正確，乳酸林格氏液補液。"}, "sources": ["休克;輸液", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-通論-46": {"quick": "下壁ST上升(II/III/aVF)+吸氣時頸靜脈擴張→右心室心肌梗塞。", "detail": {"background": "下壁MI 常合併RV梗塞:吸氣JVD(Kussmaul)、低血壓對硝酸鹽敏感、需輸液維持前負荷;右胸導程確認。", "options": {"A": "心衰竭非單一下壁ST上升。", "B": "正確，右心室心肌梗塞。", "C": "心包填塞為奇脈Beck triad。", "D": "腱索斷裂為急性MR雜音。"}, "sources": ["右室心梗", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-兒科-50": {"quick": "嬰兒VSD 合併心衰竭,不適合用 diltiazem(鈣阻斷劑負性肌力,惡化嬰兒心收縮)。", "detail": {"background": "VSD 大量左右分流致心衰竭:利尿(furosemide 降前負荷)、ACEI(降後負荷)、digoxin(增收縮)。非二氫吡啶鈣阻斷劑抑制收縮,嬰兒不宜。", "options": {"A": "不適當(本題答案)：diltiazem 負性肌力。", "B": "captopril 降後負荷,適當。", "C": "furosemide 降前負荷,適當。", "D": "digoxin 增收縮,適當。"}, "sources": ["小兒心衰竭;VSD", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-通論-52": {"quick": "晨跑昏倒、無脈、心電圖為心室顫動→立即去顫雙相200J並接續5循環(約2分鐘)CPR。", "detail": {"background": "VF:立即去顫一次後立刻接續CPR 約2分鐘再分析;不連續電擊三次不中斷之舊作法已不建議。", "options": {"A": "VF 非PEA。", "B": "不連續電擊三次為舊指引。", "C": "VF 不用同步電擊。", "D": "正確，去顫200J後5循環CPR。"}, "sources": ["ACLS;VF(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-兒科-54": {"quick": "建立進階呼吸道後換氣速率約每6秒一次(≈10次/分),『20下/分』不符高品質CPR建議。", "detail": {"background": "2015 PALS:壓速100–120/分、深度約胸廓1/3(兒5cm、嬰4cm)、無進階呼吸道單人30:2雙人15:2;有進階呼吸道每6秒給一次氣(約10/分)。", "options": {"A": "壓速100–120,正確。", "B": "深度1/3,正確。", "C": "30:2 / 15:2,正確。", "D": "不符(本題答案)：應約10/分非20/分。"}, "sources": ["PALS", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108a-TNPA-內科-68": {"quick": "心房顫動快速心室率合併情境,優先靜脈給 amiodarone。", "detail": {"background": "AF 控率/整流:amiodarone 負性肌力小較安全;dopamine 增心率不利;adenosine 對AF無效;nitroglycerin 非控率。", "options": {"A": "正確，amiodarone。", "B": "dopamine 增心率。", "C": "adenosine 對AF無效。", "D": "nitroglycerin 非控率。"}, "sources": ["心房顫動", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-外科-1": {"quick": "意識混亂、深腱反射下降、ST段與QT縮短→高血鈣。", "detail": {"background": "高血鈣:倦怠、意識改變、肌力下降、便秘、ECG QT縮短;『stones, bones, groans, psychiatric moans』。", "options": {"A": "低血鈉非QT縮短。", "B": "正確，高血鈣(QT縮短)。", "C": "高血鎂為反射下降但非QT縮短特徵。", "D": "低血鉀為U波、QT延長。"}, "sources": ["電解質與心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-外科-8": {"quick": "心輸出量下降、中心靜脈壓升高→心因性休克。", "detail": {"background": "心因性休克:幫浦衰竭→CO↓、充填壓(CVP/PCWP)↑;低血容/分布性休克CVP 多下降。", "options": {"A": "出血性CVP下降。", "B": "正確，心因性休克。", "C": "敗血性早期CVP多低。", "D": "神經性CVP低。"}, "sources": ["休克血流動力學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-內科-36": {"quick": "術後若心電圖為心室頻脈,使用『vagal maneuver』較不恰當(迷走刺激對VT 無效)。", "detail": {"background": "迷走刺激用於室上性心律(PSVT);VT 應用抗心律不整(procainamide/amiodarone)或(不穩定時)同步整流。需配合原圖。", "options": {"A": "無休克可用procainamide,恰當。", "B": "無休克可用amiodarone,恰當。", "C": "較不恰當(本題答案)：VT 用vagal無效。", "D": "低血壓有脈可同步整流,恰當。"}, "sources": ["室性心律(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-通論-40": {"quick": "末期腎病、頭暈心悸,心電圖異常→高血鉀症。", "detail": {"background": "ESRD 高血鉀:高尖T波、QRS增寬;需緊急處理。需配合原圖。", "options": {"A": "高血鈣QT縮短。", "B": "低血鈣QT延長。", "C": "正確，高血鉀。", "D": "低血鉀U波。"}, "sources": ["高血鉀心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-通論-41": {"quick": "無心臟病史之突發PSVT,若生命徵象穩定可先用 Valsalva 或單側頸動脈竇按摩。", "detail": {"background": "穩定PSVT:先迷走刺激(Valsalva/單側頸動脈按摩)→無效給adenosine;不穩定才同步整流;PSVT 非AF、procainamide 非首選。", "options": {"A": "圖為PSVT 非AF。", "B": "正確，穩定先迷走刺激。", "C": "procainamide 非首選。", "D": "PSVT 不穩定用『同步』非去顫。"}, "sources": ["PSVT(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-兒科-44": {"quick": "心房中膈缺損關閉器若脫落為急症,並非『可恢復正常運動』,故敘述錯誤。", "detail": {"background": "ASD occluder 術後併發:房室阻斷、心房頻脈(需ECG監測)、裝置脫落(急症需處置)、血栓(服aspirin 半年)。脫落非可照常運動。", "options": {"A": "房室阻斷監測,正確。", "B": "心房頻脈監測,正確。", "C": "錯誤(本題答案)：脫落為急症非可正常運動。", "D": "服aspirin 防血栓,正確。"}, "sources": ["先天性心臟病;經導管關閉", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-內科-44": {"quick": "平躺時心尖最清楚、放射至左腋下的全收縮期高頻雜音→二尖瓣逆流。", "detail": {"background": "MR:心尖全收縮期雜音放射左腋下,常合併S3、左房左室擴大。", "options": {"A": "三尖瓣狹窄為舒張期。", "B": "正確，二尖瓣逆流。", "C": "肺動脈瓣逆流為舒張期。", "D": "主動脈瓣狹窄為主動脈區噴射雜音。"}, "sources": ["瓣膜聽診", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-內科-45": {"quick": "心電圖為接合點逸搏合併一個心室早期收縮(junctional escape with one VPC)。", "detail": {"background": "接合點逸搏:無P波或逆行P、窄QRS、率40–60;夾一個寬QRS 早搏為VPC。需配合原圖。", "options": {"A": "正確，junctional escape + 1 VPC。", "B": "竇性過緩有正常P波。", "C": "加速接合點律率較快。", "D": "AF 為不規則無P波。"}, "sources": ["心電圖(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-內科-46": {"quick": "CPR 時『不建議放置 waveform capnography』為不恰當(ETCO2 監測有助評估CPR品質與ROSC)。", "detail": {"background": "心臟停止急救:VF 去顫(單相360J/雙相)、CPR、amiodarone;waveform capnography 應使用以監測CPR品質與確認ROSC。", "options": {"A": "單相360J 去顫,恰當。", "B": "不恰當(本題答案)：應使用capnography。", "C": "amiodarone 可用。", "D": "持續CPR,恰當。"}, "sources": ["ACLS;capnography", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-外科-68": {"quick": "四肢溫暖、左心室收縮亢進(hyperkinetic)、下腔靜脈塌陷→敗血性(分布性)休克。", "detail": {"background": "敗血性休克(暖休克):血管擴張、SVR低、CO 高動力(hyperkinetic)、IVC 塌陷(容量相對不足);與心因性(冷、CVP高)不同。", "options": {"A": "低血容IVC塌陷但非hyperkinetic+暖。", "B": "心因性為冷、充填壓高。", "C": "正確，敗血性休克。", "D": "神經性少見hyperkinetic。"}, "sources": ["休克分類", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-兒科-1": {"quick": "糖尿病腎病、QT 間隔延長→低血鉀與低血鈣(官方答 B、D 均給分)。", "detail": {"background": "QT 延長之電解質:低血鉀、低血鈣(及低血鎂)。本題官方將鉀(B)與鈣(D)均列為答案。", "options": {"A": "鈉異常非典型QT延長。", "B": "正確(送分認定)：低血鉀。", "C": "鎂亦可但非本題列答。", "D": "正確(送分認定)：低血鈣。"}, "sources": ["電解質與QT", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-10": {"quick": "老人正常心血管老化可見:非病理性收縮期雜音、依賴型水腫(=34)。", "detail": {"background": "老化:血管硬化使脈壓『變寬』(非變窄)、對壓力心率反應『下降』(非更快);可有無害收縮期雜音與依賴型水腫。", "options": {"A": "含心率反應更快(錯)。", "B": "正確，3無害收縮期雜音、4依賴型水腫。", "C": "含脈壓變窄(錯)。", "D": "含脈壓變窄(錯)。"}, "sources": ["老年心血管評估", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-兒科-30": {"quick": "心肌炎最具代表性的診斷工具為心肌切片(endomyocardial biopsy)。", "detail": {"background": "心肌炎確診以心肌切片(組織學)最具代表性;超音波/MRI 為輔助。", "options": {"A": "TEE 非確診心肌炎。", "B": "超音波為輔助。", "C": "TTE 為輔助。", "D": "正確，心肌切片。"}, "sources": ["心肌炎診斷", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-內科-35": {"quick": "反覆心悸無暈厥、心電圖疑PSVT,『住院安排心導管』較不建議(屬侵入,非首選)。", "detail": {"background": "陣發性心悸評估以非侵入為先:Holter/事件記錄器、運動心電圖;心導管電生理為後續特定適應。需配合原圖。", "options": {"A": "24小時心電圖,適當。", "B": "較不建議(本題答案)：逕住院心導管過度。", "C": "運動心電圖,適當。", "D": "攜帶式心電圖,適當。"}, "sources": ["心悸評估(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-內科-36": {"quick": "老人反覆頭暈心悸、24小時心電圖示有意義之心搏過緩/停頓→需節律器(官方答 A、C 均給分)。", "detail": {"background": "症狀性心搏過緩/竇房結病變經Holter 證實者需節律器(緊急暫時性TPM、確定性永久性PPM)。官方將A(TPM)與C(PPM)均列為答案。", "options": {"A": "正確(送分認定)：先置暫時性節律器。", "B": "再觀察延誤處置。", "C": "正確(送分認定)：置永久性節律器。", "D": "運動心電圖非此處置。"}, "sources": ["心搏過緩;節律器(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-42": {"quick": "低血壓、缺血性胸痛(不穩定)且有脈快速心律→雙相同步整流(官方答 50J 或 100J 均給分)。", "detail": {"background": "有脈不穩定快速心律用同步整流;能量選擇雙相50–100J,官方將A(50J)與C(100J)均列為答案。", "options": {"A": "正確(送分認定)：雙相同步50J。", "B": "β阻斷非不穩定首選。", "C": "正確(送分認定)：雙相同步100J。", "D": "鈣阻斷非不穩定首選。"}, "sources": ["ACLS;同步整流(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-43": {"quick": "生理性 S2 分裂在『吸氣』時增加、吐氣時減少;敘述其『吐氣時增加』為不正確。", "detail": {"background": "S2:生理性分裂吸氣增寬;寬分裂見於RBBB/P2延遲;逆分裂見於LBBB/AS;固定分裂見於ASD。", "options": {"A": "寬分裂導因P2延遲,正確。", "B": "不正確(本題答案)：生理性分裂應吸氣增加。", "C": "逆分裂吐氣出現吸氣消失,正確。", "D": "固定分裂見於ASD,正確。"}, "sources": ["心音;S2分裂", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-10#2": {"quick": "主動脈瓣狹窄臨床可能無症狀,但有時會突然昏厥(尤其運動時)。", "detail": {"background": "嚴重AS:瓣口<1.0cm²、壓差>40mmHg;致LV肥厚(非右室),需維持前負荷與SVR;典型三症狀含心絞痛、暈厥、呼吸困難。", "options": {"A": "嚴重AS 標準為壓差>40、瓣口<1.0,非20/2.0。", "B": "AS 致左室肥厚,且需足夠前負荷。", "C": "正確，可無症狀但有突發暈厥。", "D": "心絞痛在AS 常見非少見。"}, "sources": ["主動脈瓣狹窄", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-43#2": {"quick": "置入動脈導管:尺動脈常為手部血流主要來源(故多選橈動脈穿刺並先做Allen test)。", "detail": {"background": "手掌由橈、尺動脈經掌弓供血,尺動脈常為主要;因此橈動脈為常選穿刺部位且需確認側枝循環。", "options": {"A": "正確，尺動脈為手部主要血流。", "B": "足背動脈收縮壓常較『高』。", "C": "最常選『橈』動脈非尺。", "D": "足背動脈不靠近正中神經。"}, "sources": ["動脈導管監測", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-兒科-45": {"quick": "主動脈窄縮病童會出現股動脈搏動變弱(上下肢血壓差)。", "detail": {"background": "Coarctation:上肢高血壓、下肢血壓低、股動脈搏動弱/延遲。", "options": {"A": "連續雜音見於PDA。", "B": "正確，股動脈搏動變弱。", "C": "洪脈見於PDA/AR。", "D": "下肢血壓應較低。"}, "sources": ["主動脈窄縮", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-其他-45": {"quick": "心包填塞麻醉時『正壓控制呼吸』會升高胸內壓、減少靜脈回流而惡化,故較不適當。", "detail": {"background": "心包填塞為前負荷依賴,需維持自主呼吸/低胸內壓、足夠前負荷;誘導前備妥動脈導管、外科已消毒舖單;誘導用Etomidate/Ketamine(維持血壓)。", "options": {"A": "先建立動脈監測,適當。", "B": "外科先消毒舖單,適當。", "C": "較不適當(本題答案)：正壓通氣減少靜脈回流。", "D": "Etomidate/Ketamine 維持血壓,適當。"}, "sources": ["心包填塞麻醉", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-兒科-46": {"quick": "無脈(疑無脈電氣活動/心搏停止)之兒童急救應給予腎上腺素(1:10000)靜脈注射。", "detail": {"background": "兒童無脈非可電擊心律(PEA/asystole):CPR+腎上腺素0.01mg/kg(1:10000)每3–5分;可電擊心律才去顫。需配合原圖。", "options": {"A": "非可電擊心律不需整流。", "B": "不應為插管停止CPR。", "C": "非首要處置。", "D": "正確，給予腎上腺素。"}, "sources": ["PALS(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-兒科-48": {"quick": "疑心肌炎、左心功能差之病童,『500cc 大量輸液復甦』最不適當(易致肺水腫惡化)。", "detail": {"background": "心肌炎:troponin 上升、EF 下降;血流動力不穩需謹慎輸液並用正性肌力/升壓;大量輸液有害。", "options": {"A": "troponin 上升,正確。", "B": "EF 下降,正確。", "C": "低血壓給升壓劑,合理。", "D": "最不適當(本題答案)：大量輸液惡化心衰。"}, "sources": ["心肌炎", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-53": {"quick": "長期洗腎病人術前心電圖異常最可能為高血鉀。", "detail": {"background": "ESRD 高血鉀ECG:高尖T波、QRS增寬;需配合原圖。", "options": {"A": "非急性MI典型。", "B": "LVH 非此。", "C": "低血鈉非此ECG。", "D": "正確，高血鉀。"}, "sources": ["高血鉀心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-61#2": {"quick": "曾置放心臟支架者,術前『停aspirin 一週』不適當(應持續抗血小板以防支架血栓)。", "detail": {"background": "心臟病非心臟手術術前:ACS 延後並評估;心導管為冠脈黃金標準;長期β阻斷續用至手術日;支架病人應續用aspirin,不可貿然停。", "options": {"A": "ACS 延後評估,適當。", "B": "心導管為黃金標準,適當。", "C": "β阻斷續用至手術日,適當。", "D": "不適當(本題答案)：支架病人不應停aspirin一週。"}, "sources": ["圍術期抗血小板", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-64": {"quick": "肺動脈導管壓力波形順序為右心房→右心室→肺動脈→肺微血管楔壓(本題序列B)。", "detail": {"background": "PAC 推進:RA(低平)→RV(收縮壓高、舒張低)→PA(舒張壓較RV高、有重搏切跡)→PCWP(低平楔壓)。需配合原圖。", "options": {"A": "順序不符。", "B": "正確，3→1→4→2。", "C": "順序不符。", "D": "順序不符。"}, "sources": ["肺動脈導管(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-其他-64": {"quick": "合併肺動脈狹窄(導管依賴)的幼兒不可給 Indomethacin 關閉動脈導管。", "detail": {"background": "PDA 多見於早產兒;早產PDA 可用indomethacin/ibuprofen 關閉;但若為導管依賴型先天性心臟病(如肺動脈狹窄/閉鎖),關閉導管會致命,需PGE1 維持。", "options": {"A": "PDA 多見早產兒非1歲以上。", "B": "高濃度氧有早產兒視網膜病變風險。", "C": "無合併異常可用indomethacin。", "D": "正確，合併肺動脈狹窄不可給indomethacin。"}, "sources": ["先天性心臟病;PDA", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-其他-68": {"quick": "心臟移植(去神經)病人術中心跳變慢,atropine 無效,應用 isoproterenol。", "detail": {"background": "移植心臟去自主神經支配,atropine/glycopyrrolate(抗膽鹼)對其無效;需直接β促效劑(isoproterenol)或節律器。", "options": {"A": "atropine 對去神經心臟無效。", "B": "glycopyrrolate 同樣無效。", "C": "norepinephrine 以α升壓為主。", "D": "正確，isoproterenol 直接興奮β。"}, "sources": ["心臟移植;去神經心臟", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-70": {"quick": "心電圖 II 導程併 V5 導程監測,可涵蓋最大心肌、偵測約95%缺血事件。", "detail": {"background": "術中常用II(節律/下壁)+V5(前側壁)組合,缺血偵測敏感度高。", "options": {"A": "V3 非最佳組合。", "B": "V4 次之。", "C": "正確，V5。", "D": "V6 非最佳。"}, "sources": ["術中心電圖監測", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-其他-72": {"quick": "心臟手術前通常於術前24小時停用 digoxin。", "detail": {"background": "digoxin 治療指數窄、半衰期長,術前24小時停用以避免圍術期心律不整/中毒;NTG 可續、clopidogrel 需更早停、warfarin 需橋接。", "options": {"A": "NTG 可續用。", "B": "clopidogrel 需更早停(數天)。", "C": "正確，digoxin 術前24小時停。", "D": "warfarin 需更早停並橋接。"}, "sources": ["圍術期用藥", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-其他-77": {"quick": "深低溫循環中止(DHCA)用於升主動脈遠端或主動脈弓手術,提供無血手術視野。", "detail": {"background": "DHCA 以深低溫(降代謝)保護腦/器官;用於弓部手術獲清晰無血視野;耐受時間有限需監測;高血糖應處理。", "options": {"A": "是『降低』代謝率。", "B": "正確，用於主動脈弓手術。", "C": "多數可耐受一定時間(非經常明顯異常)。", "D": "高血糖>180 仍需處理。"}, "sources": ["心臟麻醉;DHCA", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-兒科-24": {"quick": "無脈且為可電擊心律(VF/無脈VT),CPR 過程中可給 amiodarone 300 mg IV push。", "detail": {"background": "VF/無脈VT:去顫+CPR,難治者amiodarone 300mg;atropine 用於過緩非VF;TdP 給MgSO4(但通常較快推注,非30分)。需配合原圖。", "options": {"A": "VF 去顫後應接續CPR(此敘述方向大致對但本題答D)。", "B": "atropine 用於過緩非VF。", "C": "TdP MgSO4 給法敘述不符。", "D": "正確，CPR中可給amiodarone 300mg。"}, "sources": ["ACLS(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-內科-27": {"quick": "胸痛且心電圖正常無缺血時,較不會考慮甲狀腺功能低下(非胸痛常見病因)。", "detail": {"background": "胸痛鑑別含帶狀疱疹、胃食道逆流、主動脈剝離、肌肉骨骼等;甲狀腺功能低下非典型胸痛病因。", "options": {"A": "帶狀疱疹可致胸壁痛。", "B": "GERD 常見胸痛。", "C": "較不會考慮(本題答案)：甲狀腺低下非胸痛病因。", "D": "主動脈剝離心電圖可正常仍須考慮。"}, "sources": ["胸痛鑑別", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-外科-38": {"quick": "心臟術後奇脈(吸氣血壓降)、CVP高、頸靜脈怒張、尿少→心包填塞(術後出血)。", "detail": {"background": "術後心包填塞:Beck triad、奇脈、CVP上升;為心臟術後出血急症,需引流/再探查。", "options": {"A": "右心衰竭非急性奇脈。", "B": "心因性休克可CVP高但奇脈指向填塞。", "C": "急性心衰竭以肺鬱血為主。", "D": "正確，心包填塞。"}, "sources": ["術後心包填塞", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-麻醉-40": {"quick": "脫離體外循環前不應已中和肝素(protamine 中和肝素是在順利脫離CPB『之後』),故敘述錯誤。", "detail": {"background": "脫離CPB 前:回溫至37°C、血流動力穩定、呼吸器開啟、矯正電解質;肝素中和(protamine)於確定脫離CPB 後才給。", "options": {"A": "回溫37°C,正確。", "B": "血流動力穩定,正確。", "C": "呼吸器開啟,正確。", "D": "錯誤(本題答案)：肝素應於脫離CPB後才中和。"}, "sources": ["心臟麻醉;CPB", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-麻醉-44": {"quick": "主動脈窄縮修補手術夾鉗會影響左鎖骨下動脈,動脈導管應置於『右手』而非左手。", "detail": {"background": "CoA 修補時主動脈夾鉗近左鎖骨下動脈,左上肢測壓不準;應監測右上肢。B-T shunt 同側不放;弓部手術經右腋ACP。", "options": {"A": "B-T shunt 對側右手測壓,適當。", "B": "不適當(本題答案)：CoA 應放右手非左手。", "C": "右腋ACP,適當。", "D": "取左橈為移植血管則不放左手,適當。"}, "sources": ["心臟手術動脈監測", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-通論-麻醉-51": {"quick": "術中心電圖電極應貼於清潔乾燥皮膚並固定位置持續監測。", "detail": {"background": "ECG 監測:電極貼乾淨乾燥皮膚;II 導程看P波;II+V5 偵測約95%缺血;有ECG訊號不代表有收縮/心輸出(可為PEA)。", "options": {"A": "看P波以II 導程清楚非I。", "B": "正確，清潔乾燥皮膚固定。", "C": "應為II+V5(非V6)。", "D": "有電訊號不代表有心輸出(PEA)。"}, "sources": ["術中ECG監測", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-通論-其他-62": {"quick": "意識不清、低血壓(不穩定)且為有脈快速心律→同步整流。", "detail": {"background": "有脈不穩定快速心律用同步整流;去顫用於VF/無脈VT;頸動脈按摩用於穩定SVT。需配合原圖。", "options": {"A": "頸動脈按摩用於穩定SVT。", "B": "去顫用於無脈VF/VT。", "C": "正確，同步整流。", "D": "有脈不需CPR。"}, "sources": ["ACLS(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-通論-其他-66": {"quick": "肺炎造成的肋膜性疼痛為持續漸進的表淺痛,因咳嗽/深呼吸加重(敘述最適當)。", "detail": {"background": "GERD 為灼熱與姿勢/進食相關;ACS 為悶壓非尖銳撕裂;主動脈剝離為撕裂放射痛非灼熱;肺炎肋膜痛隨呼吸加重。", "options": {"A": "GERD 多灼熱非『壓痛』描述。", "B": "ACS 為悶壓非撕裂(撕裂為剝離)。", "C": "主動脈剝離為撕裂痛非灼熱。", "D": "正確，肺炎肋膜性疼痛隨呼吸加重。"}, "sources": ["胸痛鑑別", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-外科-66": {"quick": "前胸壁外傷最常影響的心臟腔室為右心室(位置最前)。", "detail": {"background": "右心室為最前方腔室,鈍性前胸外傷(方向盤撞擊)最易受損致心臟挫傷/破裂。", "options": {"A": "左心房在後。", "B": "左心室偏後外側。", "C": "右心房在右側。", "D": "正確，右心室最前。"}, "sources": ["心臟外傷解剖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-通論-其他-68": {"quick": "心音微弱、頸靜脈怒張、肺部叩診正常反響(非積液)→心包膜填塞。", "detail": {"background": "心包填塞:低血壓、JVD、心音遙遠(Beck triad)、肺部叩診正常(積液在心包非肋膜)。", "options": {"A": "心衰竭多有肺囉音。", "B": "肺栓塞無心音遙遠三徵。", "C": "大量肋膜積水叩診為濁音。", "D": "正確，心包膜填塞。"}, "sources": ["心包填塞", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-外科-70": {"quick": "心臟術後心臟指數<2.5 L/m²/min 可考慮給 dobutamine(正性肌力)。", "detail": {"background": "術後低心輸出給正性肌力(dobutamine);SvO2 應≥60%;慢性酗酒多『低血鎂/鉀』;INR 2.2 進行手術出血風險高(非安全)。", "options": {"A": "酗酒多低血鎂,且非單純補鈣。", "B": "SvO2 應維持≥60%非45%。", "C": "正確，CI<2.5 給dobutamine。", "D": "INR 2.2 手術出血風險高,不安全。"}, "sources": ["心臟術後照護", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-通論-麻醉-71": {"quick": "圍術期心臟風險評估流程『首先考慮手術緊急性與活動性心臟病況』,非『先考慮手術風險』,故敘述錯誤。", "detail": {"background": "ACC/AHA 流程:先評估手術緊急性→有無活動性心臟病況→功能性能力(METs)→再依手術與臨床風險決定檢查。", "options": {"A": "錯誤(本題答案)：應先評估緊急性/活動性心臟病況。", "B": "急診聚焦監測降風險,正確。", "C": "無活動性病況低風險手術不需進一步測試,正確。", "D": "METs 達標可手術,正確。"}, "sources": ["圍術期心臟評估", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-通論-其他-72": {"quick": "洗腎病人頭暈心悸、心電圖異常→血鉀7.5 mEq/L(高血鉀)。", "detail": {"background": "ESRD 高血鉀ECG:高尖T波、QRS增寬;需配合原圖。", "options": {"A": "高血鈣為QT縮短。", "B": "正確，高血鉀7.5。", "C": "troponin 升高為心肌損傷非此ECG。", "D": "甲狀腺非此ECG。"}, "sources": ["高血鉀心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-進階-麻醉-78": {"quick": "插管病人突發竇性心搏過緩(35)最可能為痰塊阻塞氣管內管致缺氧引起。", "detail": {"background": "插管病人突發過緩優先排除缺氧(痰阻、管路問題);先確認通氣/抽痰給氧,而非逕行去顫/胸壓。", "options": {"A": "正確，痰阻致缺氧引起過緩。", "B": "應先排除缺氧非逕入ACLS。", "C": "過緩非去顫適應(去顫用於VF/VT)。", "D": "尚有脈時不逕行胸壓。"}, "sources": ["插管病人過緩處置", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-通論-其他-79": {"quick": "下壁STEMI 應依心電圖儘速再灌流,『以心肌酵素數值為重要參考依據(等酵素)』較不正確。", "detail": {"background": "STEMI 由心電圖診斷即應儘速再灌流,不等待心肌酵素;給雙抗血小板;Killip III 為肺水腫;右胸導程查RV梗塞。", "options": {"A": "儘速雙抗血小板,正確。", "B": "肺水腫為Killip III,正確。", "C": "右胸導程查RV,正確。", "D": "較不正確(本題答案)：不應等心肌酵素,依ECG即處置。"}, "sources": ["STEMI 處置", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "110-通論-麻醉-80": {"quick": "心跳過快會同時降低冠狀循環血流(舒張期縮短)並增加心肌耗氧量。", "detail": {"background": "冠脈灌流主要在舒張期;心跳過快縮短舒張期→冠脈灌流下降,且增加耗氧→易缺血。", "options": {"A": "心跳過慢延長舒張不致此。", "B": "正確，心跳過快。", "C": "高血壓增耗氧但灌流壓亦增。", "D": "低血壓降灌流但耗氧未必增。"}, "sources": ["冠脈生理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-兒科-20": {"quick": "肺癌病人頸靜脈怒張、心音低沉、四肢無水腫、低血壓→心包膜填塞(惡性心包積液)。", "detail": {"background": "惡性腫瘤心包轉移致填塞:Beck triad(低血壓、JVD、心音遙遠)、奇脈;四肢無水腫有別於右心衰竭。", "options": {"A": "肋膜積水叩診濁音。", "B": "心衰竭多有水腫。", "C": "正確，心包膜填塞。", "D": "氣胸呼吸音不對稱。"}, "sources": ["心包填塞", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-外科-20": {"quick": "肺癌病人頸靜脈怒張、心音低沉、四肢無水腫、低血壓→心包膜填塞。", "detail": {"background": "同上:惡性心包積液致填塞,Beck triad、奇脈。", "options": {"A": "肋膜積水叩診濁音。", "B": "心衰竭多有水腫。", "C": "正確，心包膜填塞。", "D": "氣胸呼吸音不對稱。"}, "sources": ["心包填塞", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-兒科-22": {"quick": "意識清楚但血壓72/38(不穩定)之快速心律,『adenosine 6mg IV drip(滴注)』錯誤—應快速推注,且不穩定優先同步整流。", "detail": {"background": "adenosine 須『快速』靜脈推注(半衰期極短),非滴注;血流動力不穩定之快速心律應同步整流。需配合原圖。", "options": {"A": "不穩定不優先迷走刺激,合理。", "B": "錯誤(本題答案)：adenosine 應快速推注非drip,且不穩定優先整流。", "C": "同步整流50J,適當。", "D": "整流可給鎮靜,適當。"}, "sources": ["ACLS(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-內科-22": {"quick": "意識清楚但低血壓(不穩定)之快速心律,『adenosine 滴注』錯誤—應快速推注,不穩定優先同步整流。", "detail": {"background": "adenosine 須快速推注;不穩定快速心律優先同步整流。需配合原圖。", "options": {"A": "不穩定不優先迷走刺激,合理。", "B": "錯誤(本題答案)：adenosine 應快速推注且不穩定優先整流。", "C": "同步整流50J,適當。", "D": "可給鎮靜,適當。"}, "sources": ["ACLS(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-麻醉-25": {"quick": "0.5% bupivacaine 心臟毒性最高(LAST 最易致心律/心臟停止)。", "detail": {"background": "bupivacaine 脂溶性高、與心肌鈉通道結合久,心臟毒性最強;levobupivacaine/ropivacaine 毒性較低;lidocaine 較安全。", "options": {"A": "lidocaine 心毒性較低。", "B": "正確，bupivacaine 心毒性最高。", "C": "levobupivacaine 毒性較低。", "D": "ropivacaine 毒性較低。"}, "sources": ["局部麻醉藥毒性;LAST", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-麻醉-34": {"quick": "塗藥型支架(DES)病人擇期手術不應只延後7天(需更長DAPT),敘述錯誤。", "detail": {"background": "氣球擴張後約14天、裸支架數週、DES 約6個月後再擇期手術;低出血風險可續aspirin。", "options": {"A": "氣球擴張14天,合理。", "B": "BMS 數週,合理。", "C": "錯誤(本題答案)：DES 不應僅7天。", "D": "低出血風險續aspirin,合理。"}, "sources": ["DES;圍術期", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-麻醉-35": {"quick": "EVAR 展開支架時應控制降壓防移位,『提升血壓』敘述錯誤。", "detail": {"background": "EVAR 不需主動脈鉗閉、血流動力較穩;展開支架時短暫降壓防移位。", "options": {"A": "不需鉗閉較穩,正確。", "B": "大口徑周邊管路常足夠。", "C": "錯誤(本題答案)：應降壓非升壓。", "D": "局麻止痛敘述非重點。"}, "sources": ["EVAR 麻醉", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-麻醉-38": {"quick": "肥厚性心肌病維持心跳>100會加重左心室出口阻塞。", "detail": {"background": "HCM:心搏過速、低前負荷、低後負荷、增收縮力惡化阻塞;應維持竇性、足夠前後負荷、避免過速。", "options": {"A": "增後負荷減輕阻塞。", "B": "輸液增前負荷減輕。", "C": "吸入麻醉降收縮力可減輕。", "D": "正確，過速加重阻塞。"}, "sources": ["HCM 麻醉", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-麻醉-39": {"quick": "小兒CHD 手術『誘導前一定要先建立動脈導管』過絕對,為錯誤。", "detail": {"background": "可用sevoflurane/fentanyl/ketamine 誘導;注意PVR/SVR;必要時DHCA;動脈監測視病況。", "options": {"A": "誘導藥物,正確。", "B": "錯誤(本題答案)：非一律誘導前建立動脈導管。", "C": "注意PVR/SVR,正確。", "D": "視情況DHCA,正確。"}, "sources": ["小兒心臟麻醉", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-兒科-42": {"quick": "肺動脈瓣狹窄嚴重者可行球囊瓣膜擴張或瓣膜切開術。", "detail": {"background": "PS 為右室通肺動脈瓣口狹窄;左上胸骨緣收縮期雜音;嚴重者球囊擴張/切開;非導管依賴不需indomethacin。", "options": {"A": "PS 非左室通主動脈。", "B": "正確，球囊擴張/切開。", "C": "為收縮期雜音非連續性。", "D": "非以indomethacin治療。"}, "sources": ["肺動脈瓣狹窄", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-進階-麻醉-42": {"quick": "冠心症『避免nitrate 因會收縮冠脈』敘述錯誤(硝酸鹽擴張冠脈)。", "detail": {"background": "維持氧供需:足夠血紅素、β阻斷避免過速、利尿降前負荷、維持灌流;硝酸鹽擴張冠脈與靜脈有益。", "options": {"A": "足夠血紅素,正確。", "B": "β阻斷,正確。", "C": "利尿降前負荷,正確。", "D": "錯誤(本題答案)：硝酸鹽擴張冠脈。"}, "sources": ["冠心症氧供需", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-通論-5分科-46": {"quick": "突發胸痛第一考量為生命徵象是否穩定並做心電圖。", "detail": {"background": "先評估生命徵象+12導程,辨識致命病因(ACS、剝離、PE、氣胸、填塞)。", "options": {"A": "正確，先評估生命徵象+ECG。", "B": "GERD 敘述不全。", "C": "主動脈剝離為撕裂非灼熱。", "D": "肺炎可致肋膜痛與呼吸相關。"}, "sources": ["胸痛緊急處理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-通論-5分科-47": {"quick": "多數心肌炎不會持續高燒,該敘述錯誤。", "detail": {"background": "心肌炎:病毒/mRNA疫苗後;心肌切片確診;ECG ST-T/Q波異常;非必持續高燒。", "options": {"A": "mRNA疫苗可引起,正確。", "B": "心肌切片確診,正確。", "C": "錯誤(本題答案)：非多數持續高燒。", "D": "ECG 異常,正確。"}, "sources": ["心肌炎", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-通論-麻醉-52": {"quick": "術前心電圖呈第三度房室阻斷應先延遲手術(屬活動性心臟病況)。", "detail": {"background": "活動性病況(完全AV block、不穩定冠心、失代償心衰、嚴重瓣膜病)應先處置。", "options": {"A": "正確，三度AV block 延後處置。", "B": "舊Q波非延後理由。", "C": "竇性過緩55穩定可手術。", "D": "偶發VPC 非延後理由。"}, "sources": ["圍術期心律", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-通論-5分科-53": {"quick": "長期洗腎、噁心嘔吐、心電圖異常→高血鉀症。", "detail": {"background": "ESRD 高血鉀:高尖T波、QRS增寬、PR延長。需配合原圖。", "options": {"A": "正確，高血鉀。", "B": "心內膜炎非此ECG。", "C": "Brugada 為特定ST型態。", "D": "STEMI 為ST上升。"}, "sources": ["高血鉀心電圖(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "111-通論-5分科-65": {"quick": "心音微弱、頸靜脈怒張、肺部叩診正常反響→心包膜填塞。", "detail": {"background": "填塞:低血壓、JVD、心音遙遠、奇脈;肺叩診正常。", "options": {"A": "正確，心包膜填塞。", "B": "肺栓塞無遙遠心音三徵。", "C": "張力性氣胸患側呼吸音消失。", "D": "心衰竭多肺囉音。"}, "sources": ["心包填塞", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-內科-27": {"quick": "陣發胸悶、脈搏不規則(疑快速AF),『毛地黃過量』較不可能為病因。", "detail": {"background": "CHF、COPD、CKD 可誘發AF;digoxin 過量多致緩脈/特定心律非快速不規則AF。需配合原圖。", "options": {"A": "CHF 可致AF。", "B": "較不可能(本題答案)：digoxin過量非快速AF病因。", "C": "COPD 可致AF。", "D": "CKD 可致AF。"}, "sources": ["心房顫動(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-內科-30": {"quick": "左迴旋動脈缺血通常不會出現 LBBB。", "detail": {"background": "LCx 影響側壁/下側壁;LBBB 非典型;有時變化不明顯。", "options": {"A": "V5-6 ST上升可見。", "B": "下壁ST上升(LCx優勢)可見。", "C": "正確(通常不出現)：LBBB。", "D": "有時無明顯變化。"}, "sources": ["心電圖定位", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-內科-32": {"quick": "陣發胸悶心悸、血流動力尚穩→先入院查病因再依病因治療。", "detail": {"background": "穩定快速心律先查病因再治療;不貿然電擊/消融。需配合原圖。", "options": {"A": "正確，先查病因。", "B": "穩定不需立即電擊。", "C": "消極追蹤不當。", "D": "不貿然amiodarone+消融。"}, "sources": ["心律不整評估(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-外科-37": {"quick": "心臟術後新發心房顫動可給予 warfarin 抗凝。", "detail": {"background": "術後AF：控率/整流+抗凝;持續AF 需抗凝防中風。需配合原圖。", "options": {"A": "正確，warfarin 抗凝。", "B": "amiodarone 為控率非此答。", "C": "atropine 用於過緩。", "D": "propranolol 控率非此答。"}, "sources": ["術後AF(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-麻醉-38": {"quick": "脫離CPB後低血壓,若CO減少且心房壓亦降→低血容,可補液。", "detail": {"background": "低血容:CO↓、充填壓↓→補液;左心功能異常為CO↓但充填壓↑(需強心)。", "options": {"A": "CO增非低血壓情境。", "B": "正確，CO↓+心房壓↓為低血容。", "C": "充填壓↑為左心功能異常。", "D": "低血容不應充填壓增。"}, "sources": ["CPB 後血流動力學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-外科-41": {"quick": "術後少尿、BUN/Cr>20、尿滲透壓>500→腎前性,應確認CVP 是否過低。", "detail": {"background": "腎前性:BUN/Cr>20、尿濃縮、FENa<1%;處置補充容量(查CVP)。", "options": {"A": "為腎前性非腎性。", "B": "正確，確認CVP是否過低。", "C": "腎前性FENa<1% 非>3.5%。", "D": "低劑量dopamine 護腎無實證。"}, "sources": ["急性腎損傷;腎前性", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-進階-兒科-42": {"quick": "兒童迷走刺激/顱內壓升高多致心跳過慢而非過快,敘述錯誤。", "detail": {"background": "術後:惡性高熱、PCA止痛、容量/ICP/CO2致血壓升;兒童迷走/ICP↑常致心搏過緩。", "options": {"A": "惡性高熱,正確。", "B": "PCA,合理。", "C": "容量/ICP/CO2 致血壓升,正確。", "D": "錯誤(本題答案)：兒童多心搏過緩。"}, "sources": ["小兒術後監測", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-通論-麻醉-47": {"quick": "肺動脈導管波形中代表肺動脈壓力(PAP)為第3段。", "detail": {"background": "PAC:RA→RV→PA(舒張壓較RV高有重搏切跡)→PCWP;第3段為PAP。需配合原圖。", "options": {"A": "1段非EDP。", "B": "2段非PAOP。", "C": "正確，3段為PAP。", "D": "4段非EDP。"}, "sources": ["肺動脈導管(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-通論-麻醉-51": {"quick": "METs≥4 且無心臟症狀者可逕行常規手術,不需術前先做心臟評估。", "detail": {"background": "功能性能力佳且無活動性心臟病況風險低;Mobitz II、快速AF、嚴重AS 需評估。", "options": {"A": "Mobitz II 需評估。", "B": "快速AF 需評估。", "C": "嚴重AS 需評估。", "D": "正確，METs≥4 無症狀可手術。"}, "sources": ["圍術期心臟評估", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-通論-麻醉-59": {"quick": "動脈導管側枝循環可用超音波或脈衝式血氧分析儀評估。", "detail": {"background": "橈動脈最常選;全麻後傳統Allen test 不可靠,可用超音波/血氧儀;恢復血色>5–7秒為異常。", "options": {"A": "最常橈動脈非尺。", "B": "全麻後Allen test 不可靠。", "C": "正確，超音波/血氧儀評估側枝。", "D": "標準非15秒。"}, "sources": ["動脈導管", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-通論-其他-60": {"quick": "心肌缺氧時病人可能無胸痛而以呼吸喘表現。", "detail": {"background": "右心衰竭以體循環鬱血為早期;左心衰竭以肺鬱血為早期;心律不整可影響心輸出即使EF正常;缺血可無痛以喘表現。", "options": {"A": "右心衰竭非肺水腫最早。", "B": "左心衰竭非下肢水腫最早。", "C": "心律不整可影響心輸出。", "D": "正確，缺血可無痛以喘表現。"}, "sources": ["心臟功能", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-通論-麻醉-61": {"quick": "動脈導管波形若為減弱(dampened),收縮壓須以波形校正判讀。", "detail": {"background": "過度減弱會低估收縮壓、高估舒張壓,需快速沖洗測試校正。需配合原圖。", "options": {"A": "overshoot 描述。", "B": "減弱位置敘述。", "C": "減弱處收縮壓不準。", "D": "正確，減弱波形須校正。"}, "sources": ["動脈導管波形(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-通論-麻醉-62": {"quick": "術中血壓降低、心電圖為心房撲動且不穩定→需同步整流。", "detail": {"background": "心房撲動:規則鋸齒F波;不穩定→同步整流。需配合原圖。", "options": {"A": "非AF僅用β阻斷。", "B": "非PSVT。", "C": "正確，心房撲動不穩定→同步整流。", "D": "非VF。"}, "sources": ["心房撲動(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "112-通論-其他-70": {"quick": "低血壓且心電圖為心搏過緩時,給 amiodarone 較不適合(用於快速心律)。", "detail": {"background": "症狀性過緩:atropine、經皮節律器、腎上腺素輸注;amiodarone 用於快速心律。需配合原圖。", "options": {"A": "TCP 適用過緩。", "B": "較不適合(本題答案)：amiodarone 用於快速心律。", "C": "腎上腺素輸注適用。", "D": "atropine 適用過緩。"}, "sources": ["心搏過緩(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-兒科-2": {"quick": "高血鉀的心電圖(lead II)典型為高尖T波,選項中為(C)。", "detail": {"background": "高血鉀ECG:早期高聳對稱尖T波,進展PR延長、P波變平、QRS增寬;本題附圖以高尖T波者為高血鉀。", "options": {"A": "非高尖T波。", "B": "非高尖T波。", "C": "正確，高尖T波(高血鉀)。", "D": "非高尖T波。"}, "sources": ["高血鉀心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-兒科-15": {"quick": "CK-MB 作為初步診斷NSTEMI 不如troponin,該敘述最不適當。", "detail": {"background": "ACS 首選troponin(高敏感特異);CK-MB 適合偵測再梗塞;BNP 升高與較差預後相關。", "options": {"A": "troponin 高敏感特異,正確。", "B": "最不適當(本題答案)：初步應用troponin。", "C": "BNP 與預後相關,正確。", "D": "CK-MB 追蹤再梗塞,正確。"}, "sources": ["心臟生物標記", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-兒科-19": {"quick": "脈搏154、血壓80/50(不穩定)之快速心律→雙相同步整流120焦耳。", "detail": {"background": "有脈不穩定快速心律→同步整流(雙相約120J);不先給β阻斷/強心/adenosine。需配合原圖。", "options": {"A": "不穩定不先β阻斷。", "B": "不穩定不宜先adenosine。", "C": "先強心非首選。", "D": "正確，同步整流120J。"}, "sources": ["ACLS(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-內科-30": {"quick": "II、III、aVF ST上升、放射左肩臂→下壁心肌梗塞,右冠狀動脈。", "detail": {"background": "下壁MI(II/III/aVF)多為RCA;前壁LAD、側壁LCx。", "options": {"A": "正確，下壁MI、右冠狀動脈。", "B": "側壁為LAD/LCx。", "C": "中膈非此。", "D": "前壁為LAD。"}, "sources": ["心電圖定位", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-家庭-31": {"quick": "依AHA,劇烈有氧運動每週至少累積75分鐘(或中強度150分鐘)。", "detail": {"background": "成人:中強度≥150分/週或劇烈≥75分/週,加每週≥2次肌力訓練;老人亦建議肌力與平衡。", "options": {"A": "正確，劇烈≥75分/週。", "B": "中強度應≥150分。", "C": "肌力每週≥2次即可。", "D": "老人仍建議肌力訓練。"}, "sources": ["AHA 身體活動建議", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-內科-31": {"quick": "心電圖為心房顫動(RR 絕對不規則、無清楚P波)。", "detail": {"background": "AF:無P波、f波、RR絕對不規則、窄QRS。需配合原圖。", "options": {"A": "心房頻脈有規則P波。", "B": "正確，心房顫動。", "C": "VT 為寬QRS。", "D": "竇性頻脈有規則P波。"}, "sources": ["心電圖(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-內科-34": {"quick": "冠狀動脈鈣化指數無法精確估算狹窄百分比、對狹窄特異度有限,該敘述錯誤。", "detail": {"background": "鈣化指數反映斑塊負荷/風險非狹窄%;胸痛ECG 10分鐘內;冠脈CT 對ACS 敏感度高;運動測試前停NTG/β阻斷。", "options": {"A": "胸痛ECG 10分鐘內,正確。", "B": "錯誤(本題答案)：鈣化指數非估狹窄%。", "C": "冠脈CT 敏感度高,正確。", "D": "運動測試前停NTG/β阻斷,正確。"}, "sources": ["冠心病檢查", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-內科-40": {"quick": "S4 為低頻音、在 S1『之前』,代表心室順應性差;『S1之後高頻音代表AS』敘述錯誤。", "detail": {"background": "S1二尖瓣關閉、S2主動脈瓣關閉、S3 兒童正常、S4 心房收縮對抗僵硬心室之低頻音(S1前)。", "options": {"A": "S1 二尖瓣關閉,正確。", "B": "S2 主動脈瓣關閉,正確。", "C": "S3 兒童正常,正確。", "D": "錯誤(本題答案)：S4 為S1前低頻音。"}, "sources": ["心音", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-麻醉-47": {"quick": "冠狀動脈灌流主要在『舒張期』,『收縮期』並非心肌氧氣供應的增進因素,故為錯誤。", "detail": {"background": "心肌氧供:冠脈自動調節、血紅素濃度與含氧、舒張期長度(灌流時間);收縮期心室壁張力高反而壓迫冠脈、減少供應。", "options": {"A": "冠脈自動調節影響供應,正確。", "B": "血紅素濃度影響供應,正確。", "C": "錯誤(本題答案)：灌流在舒張期,收縮期非供應因素。", "D": "舒張期為灌流時間,正確。"}, "sources": ["冠脈生理", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-5分科-50": {"quick": "突發呼吸困難胸痛、肺動脈擴大、肋膜旁楔型高密度→肺栓塞。", "detail": {"background": "PE 影像:Hampton hump(楔型肋膜旁陰影)、Westermark sign(局部血流減少透亮)、肺動脈擴大、少量胸水。", "options": {"A": "肺結核多空洞/上葉。", "B": "肺炎為實質浸潤。", "C": "正確，肺栓塞。", "D": "心包積液為心影擴大。"}, "sources": ["肺栓塞影像", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-麻醉-59": {"quick": "影響心肌需氧量由大到小:心率>收縮力>後負荷>前負荷。", "detail": {"background": "心肌耗氧主要決定於心率、收縮力、室壁張力(後負荷),前負荷影響相對較小。", "options": {"A": "順序不符。", "B": "順序不符。", "C": "順序不符。", "D": "正確，心率>收縮力>後負荷>前負荷。"}, "sources": ["心肌耗氧", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-家庭-61": {"quick": "主動脈剝離疼痛為突發撕裂痛,但『前傾較緩解』是心包炎的特徵,故此敘述最不適當。", "detail": {"background": "主動脈剝離:撕裂樣痛放射背部、與姿勢無關;前傾緩解為心包炎特徵。", "options": {"A": "最不適當(本題答案)：前傾緩解為心包炎非剝離。", "B": "ACS 為胸骨下悶壓,正確。", "C": "GERD 為灼熱,正確。", "D": "肺炎肋膜痛隨呼吸加重,正確。"}, "sources": ["胸痛鑑別", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-家庭-61": {"quick": "頸靜脈怒張、雙基底囉音、腹水、下肢水腫(體循環+肺鬱血)之表現,『肺栓塞』最不可能。", "detail": {"background": "此為心衰竭(左右心)鬱血表現;肺栓塞為急性右心負荷,通常不會慢性腹水+雙下肢水腫+基底囉音之組合。", "options": {"A": "最不可能(本題答案)：肺栓塞。", "B": "支氣管擴張可慢性呼吸症狀。", "C": "慢性支氣管炎可致肺心病水腫。", "D": "肺水腫致基底囉音。"}, "sources": ["心衰竭鑑別", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-家庭-62": {"quick": "前壁缺血(V2-V4)合併低血壓與肺囉音(心因性休克/肺水腫)時,給 morphine+NTG 不適當(會再降血壓)。", "detail": {"background": "低血壓之ACS/心衰應避免NTG/morphine(降前負荷與血壓);應給aspirin、必要時插管、緊急會診心導管。", "options": {"A": "aspirin 300mg,適當。", "B": "持續低血氧考慮插管,適當。", "C": "會診心導管,適當。", "D": "不適當(本題答案)：低血壓給morphine+NTG。"}, "sources": ["ACS;心因性休克", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-家庭-70": {"quick": "ALT(alanine aminotransferase)主要反映肝臟,不會因心肌壞死而上升。", "detail": {"background": "心肌壞死標記:troponin、CK、CK-MB、AST(較不專一);ALT 主要為肝細胞酵素。", "options": {"A": "AST 可因心肌壞死上升(較不專一)。", "B": "正確(不上升)：ALT 主要為肝。", "C": "CK 上升。", "D": "CK-MB 上升且較專一。"}, "sources": ["心臟生物標記", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-婦產科-71": {"quick": "doxorubicin(小紅莓)對心臟有明顯『累積性』毒性。", "detail": {"background": "Anthracycline(doxorubicin)劑量累積性心肌病變,需監測LVEF;trastuzumab 心毒多可逆;carboplatin/cisplatin 主腎/神經毒。", "options": {"A": "正確，doxorubicin 累積性心毒。", "B": "topotecan 非主要心毒。", "C": "carboplatin 主骨髓抑制。", "D": "cisplatin 主腎/神經毒。"}, "sources": ["化療心毒性", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-麻醉-71": {"quick": "TOF 麻醉須避免增加肺血管阻力;『低碳酸血症(hypocarbia)』會『降低』PVR,不會增加,故為例外。", "detail": {"background": "增加PVR 因素:酸中毒、低血氧、高碳酸、過高PEEP、疼痛/激動。低碳酸(過度換氣)反而降低PVR。", "options": {"A": "酸中毒增PVR。", "B": "低血氧增PVR。", "C": "正確(不增加)：低碳酸降PVR。", "D": "過高PEEP 可增PVR。"}, "sources": ["TOF 麻醉;PVR", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-進階-麻醉-77": {"quick": "體外循環(CPB)肝素用量約 300–350 units/kg,維持 ACT > 400 秒。", "detail": {"background": "CPB 需高度抗凝防迴路血栓:肝素300–400 U/kg、ACT>400–480秒;脫離後以protamine 中和。", "options": {"A": "ACT>250 不足。", "B": "正確，300–350 U/kg、ACT>400。", "C": "劑量不足。", "D": "劑量不足。"}, "sources": ["CPB 抗凝", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-兒科-3": {"quick": "葡萄糖酸鈣是『穩定心肌細胞膜』,不會降低血鉀濃度,故敘述不適當。", "detail": {"background": "嚴重高血鉀:鈣劑穩定心肌膜(不降鉀)、insulin+glucose 與β2促效劑使鉀移入細胞、NaHCO3 改善酸中毒;真正排鉀靠利尿/離子交換樹脂/透析。", "options": {"A": "不適當(本題答案)：鈣劑穩定膜不降鉀。", "B": "insulin+glucose 使鉀移入細胞,正確。", "C": "NaHCO3 改善酸中毒,正確。", "D": "β2促效劑促鉀進細胞,正確。"}, "sources": ["高血鉀處置", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-兒科-21": {"quick": "下壁/疑右心室梗塞合併心搏過緩(52)與偏低血壓時,給硝酸甘油不適當(可致嚴重低血壓)。", "detail": {"background": "下壁/右室MI 為前負荷依賴,NTG 降前負荷會致嚴重低血壓;應監測、給氧、輸液維持前負荷、右胸導程確認。", "options": {"A": "監測、建立靜脈路徑,適當。", "B": "SpO2<90%給氧,適當。", "C": "不適當(本題答案)：右室梗塞給NTG 易致低血壓。", "D": "右胸導程排除右室梗塞,適當。"}, "sources": ["下壁/右室心梗", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-內科-22": {"quick": "急性心包炎胸痛『平躺加重、前傾緩解』,故『平躺休息明顯緩解』為最不可能的線索。", "detail": {"background": "急性心包炎:PR下降、廣泛ST上升、心包摩擦音、吸氣與平躺加重(前傾緩解)、X光多無特定發現。", "options": {"A": "心包摩擦音,符合。", "B": "吸氣加劇,符合。", "C": "最不可能(本題答案)：平躺應加重非緩解。", "D": "X光多無特定發現,符合。"}, "sources": ["急性心包炎", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-內科-23": {"quick": "急性冠心症合併心衰竭徵象時,不應『儘早』使用β阻斷劑(急性心衰/低輸出為禁忌),故錯誤。", "detail": {"background": "急性冠心症治療：無禁忌應給aspirin、他汀(HMG-CoA 還原酶抑制劑)、依情況β阻斷與ACEI(尤EF<40%可降死亡)；硝酸鹽緩解症狀但不降死亡率。β阻斷在『急性心衰竭/低心輸出、心因性休克、嚴重緩脈或房室阻滯』為禁忌，不應於合併心衰徵象時儘早給予，故該敘述錯誤。", "options": {"A": "加statin,正確。", "B": "硝酸鹽不降死亡率,正確。", "C": "錯誤(本題答案)：合併心衰時不應儘早給β阻斷。", "D": "EF<40% 早用ACEI 降死亡,正確。"}, "sources": ["ACS 治療", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-內科-28": {"quick": "心電圖呈下壁(II/III/aVF)合併後壁(V1-2 鏡像)心肌梗塞。", "detail": {"background": "下壁MI 常合併後壁/右室;後壁以V1-V2 高R波、ST下降(鏡像)表現,可加做V7-V9。需配合原圖。", "options": {"A": "前側壁為V1-6/I/aVL。", "B": "前壁中膈為V1-V4。", "C": "下壁中膈組合少見。", "D": "正確，下壁+後壁。"}, "sources": ["心電圖定位(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-兒科-36": {"quick": "15歲胸悶心悸、四肢冰冷、收縮壓70(不穩定)之快速心律→同步整流。", "detail": {"background": "有脈但血流動力不穩之快速心律(SVT/VT)→同步整流;不穩定不先用adenosine/amiodarone。需配合原圖。", "options": {"A": "不穩定不宜僅觀察。", "B": "不穩定不先adenosine。", "C": "不穩定不先amiodarone。", "D": "正確，同步整流。"}, "sources": ["ACLS(需配合原圖)", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-麻醉-45": {"quick": "法洛氏四重症為『右心室』出口狹窄,『左心室出口狹窄』敘述錯誤。", "detail": {"background": "TOF 四特徵:右室流出道(肺動脈)狹窄、心室中膈缺損、主動脈跨位、右心室肥大;為發紺型。", "options": {"A": "發紺型CHD,正確。", "B": "常有VSD,正確。", "C": "常有肺動脈/右室流出道狹窄,正確。", "D": "錯誤(本題答案)：為右心室出口狹窄非左心室。"}, "sources": ["法洛氏四重症", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-通論-5分科-54": {"quick": "到院前心臟停止、有電氣活動但無脈(PEA)、重點超音波示右心室明顯擴大→肺動脈栓塞。", "detail": {"background": "大量PE 致阻塞性休克/PEA;床邊超音波見右心室擴大、室間隔左偏(D-sign)為線索;為可逆病因(H&T 之Thrombosis)。", "options": {"A": "心包填塞為心包積液壓迫。", "B": "張力性氣胸為患側呼吸音消失。", "C": "主動脈剝離非右室擴大。", "D": "正確，肺動脈栓塞。"}, "sources": ["ACLS;PE", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-家庭-66": {"quick": "心房顫動持續超過『48 小時』即增加心房血栓與中風風險,『超過1週才開始增加』敘述錯誤。", "detail": {"background": "AF 可為甲狀腺毒症表現;控率改善症狀;恢復竇性有助長期預後;血栓風險於發作約48小時後即上升(故>48小時整流前需抗凝)。", "options": {"A": "可為甲狀腺毒症表現,正確。", "B": "控率改善症狀,正確。", "C": "恢復竇性有助預後,正確。", "D": "錯誤(本題答案)：48小時即增風險非1週。"}, "sources": ["心房顫動;抗凝", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-內科-67": {"quick": "規律透析者於透析前一日清晨無力、junctional bradycardia→高血鉀。", "detail": {"background": "透析間期鉀累積致高血鉀:ECG 高尖T波、QRS增寬、緩脈/接合點律;為透析病人緊急情況。", "options": {"A": "高血鈣為QT縮短。", "B": "高血鎂可致緩脈但透析前以高鉀為主。", "C": "高血磷非直接致此心律。", "D": "正確，高血鉀。"}, "sources": ["高血鉀;透析", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-家庭-70": {"quick": "兩臂血壓差大、撕裂樣胸背痛→急性主動脈症候群(剝離),處置須控制血壓但避免過度降壓影響灌流。", "detail": {"background": "主動脈剝離:兩臂血壓不等、撕裂痛放射背、縱隔增寬;控制心率與血壓(降剪力)但維持器官灌流,避免過度低血壓。", "options": {"A": "縱隔增寬應優先排除剝離非心包炎。", "B": "正確，疑急性主動脈症候群,避免過度降壓。", "C": "非單純心律不整,首要控壓降剪力。", "D": "非右心衰竭,給利尿無益。"}, "sources": ["主動脈剝離", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-家庭-71": {"quick": "廣泛性 ST 段上升合併 PR 段下降→急性心包炎。", "detail": {"background": "急性心包炎心電圖:除aVR 外瀰漫ST上升、PR下降;有別於STEMI(局部分布、對應導程鏡像)。", "options": {"A": "STEMI 為局部分布。", "B": "心肌炎ECG 多變但此型態典型心包炎。", "C": "正確，急性心包炎。", "D": "壓力性心肌病為心尖球形。"}, "sources": ["急性心包炎", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-家庭-72": {"quick": "胸骨後壓迫感、放射左臂下顎、勞動/情緒誘發、休息緩解→冠狀動脈疾病之穩定型心絞痛。", "detail": {"background": "典型穩定型心絞痛三特徵(Diamond)：①胸骨後壓迫/緊縮感放射左臂或下顎；②由運動或情緒誘發；③休息或舌下硝化甘油數分鐘內緩解。三者皆具為典型心絞痛(高度提示阻塞性冠心病)。肋軟骨炎為觸壓加劇之尖痛、GERD 為灼熱、胸膜炎隨深呼吸加重，可資鑑別。", "options": {"A": "肋軟骨炎為觸壓加劇之尖痛。", "B": "GERD 為灼熱、制酸劑緩解。", "C": "正確，穩定型心絞痛。", "D": "胸膜炎為深呼吸加劇。"}, "sources": ["穩定型心絞痛", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-精神科-3": {"quick": "過敏性休克的首選升壓/強心藥物是 epinephrine(腎上腺素)。", "detail": {"background": "Anaphylaxis 首選肌注epinephrine:α縮血管升壓、β1強心、β2支氣管擴張並抑制介質。", "options": {"A": "正確，epinephrine。", "B": "dopamine 非首選。", "C": "vasopressin 為輔助。", "D": "norepinephrine 非過敏性休克首選。"}, "sources": ["過敏性休克", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-通論-23": {"quick": "PCWP 偏低、心輸出減少、SVR 降低→神經性休克(分布性,前負荷與血管張力皆降)。", "detail": {"background": "神經性休克:交感喪失→血管擴張(SVR↓)、靜脈回流↓(PCWP↓)、CO↓,常合併相對心搏過緩。低血容為SVR『升』,敗血暖休克為CO『高』。", "options": {"A": "低血容SVR 應升高。", "B": "心因性PCWP 應升高。", "C": "敗血暖休克CO 偏高。", "D": "正確，神經性休克。"}, "sources": ["休克血流動力學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-外科-67": {"quick": "骨盆骨折出血近期之髂股靜脈血栓,『立即注射urokinase 溶栓』不適宜(近期創傷出血為禁忌)。", "detail": {"background": "近期大出血/創傷為溶栓禁忌;DVT 處置:抗凝(出血穩定後)、抬高患肢/彈性襪、出血風險高或抗凝禁忌可放IVC filter。", "options": {"A": "不適宜(本題答案)：近期出血禁用溶栓。", "B": "抬高彈繃減腫,適當。", "C": "放IVC filter 防PE,適當。", "D": "出血穩定後抗凝≥3個月,適當。"}, "sources": ["深部靜脈栓塞", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-12#2": {"quick": "心肌缺氧之心絞痛心電圖典型出現 ST-T 變化(ST下降/上升、T波倒置)。", "detail": {"background": "心肌缺血ECG:ST段壓低或上升、T波倒置(ST-T 變化);嚴重者出現Q波。", "options": {"A": "P波變化非缺血典型。", "B": "QT延長為電解質/藥物。", "C": "PR縮短為預激。", "D": "正確，ST-T 改變。"}, "sources": ["缺血性心臟病心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-內科-55": {"quick": "CO 偏高、SVR 偏低之分布性休克型態,於選項中以過敏性休克最符合。", "detail": {"background": "分布性休克(暖休克):血管擴張SVR↓、CO 高/正常;選項中過敏性休克屬分布性(心因/低血容/梗塞性皆為CO↓)。", "options": {"A": "正確，分布性休克(過敏性)。", "B": "心因性CO 下降。", "C": "低血容CO 下降、SVR升。", "D": "梗塞性CO 下降。"}, "sources": ["休克分類", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-5分科-71": {"quick": "重度二尖瓣逆流合併EF35%:可聞雙側基底爆裂音、出現心房顫動會降低心輸出(=24)。", "detail": {"background": "重度MR+左心功能下降致肺鬱血(基底crackles);MR 為『收縮期』雜音(非舒張期);AF 失去心房收縮並心律不整→心輸出下降。", "options": {"A": "含舒張期雜音(錯)。", "B": "組合不符。", "C": "正確，2基底爆裂音、4 AF降心輸出。", "D": "含舒張期雜音(錯)。"}, "sources": ["心衰竭;二尖瓣逆流", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}}, L={"冠狀動脈疾病(IHD/ACS/MI)": {"title": "冠狀動脈疾病", "html": "<p><b>核心概念：</b>冠狀動脈粥狀硬化→心肌供需失衡。分穩定型心絞痛與急性冠心症(ACS：不穩定型心絞痛、NSTEMI、STEMI)。</p><ul><li><b>典型心絞痛：</b>胸骨後壓迫悶痛、放射左臂/下顎、勞動或情緒誘發、休息或硝化甘油緩解；女性/糖尿病/老人常以呼吸困難、上腹痛、噁心等『等同心絞痛』表現。隨呼吸/姿勢變化的尖銳痛多非心因。</li><li><b>心電圖定位：</b>II/III/aVF＝下壁(RCA，常合併右室梗塞與緩脈，須加做右胸導程)；V1-V4＝前壁中膈(LAD)；I/aVL/V5-6＝側壁(LCx)；V1-2 高R/ST下降鏡像＝後壁。STEMI 為ST上升、演變出Q波與T倒置。</li><li><b>生物標記：</b>troponin 最敏感特異(首選)；CK-MB 適合偵測再梗塞；BNP 升高與較差預後相關。</li><li><b>治療：</b>立即aspirin、硝酸鹽(低血壓/右室梗塞禁用)、嗎啡(靜脈)；次級預防四本柱：抗血小板、statin、β阻斷(急性心衰/休克禁用)、ACEI(EF<40%降死亡)。糖尿病多血管病變首選CABG；穩定型PCI 主要緩解症狀。變異型(冠脈痙攣)以鈣阻斷+硝酸鹽治療、避免非選擇性β阻斷。</li><li><b>圍術期：</b>DES 後需足夠雙抗血小板，擇期手術應延後；支架病人勿貿然停aspirin。</li></ul>"}, "心臟衰竭": {"title": "心臟衰竭", "html": "<p><b>核心概念：</b>幫浦衰竭致心輸出不足與鬱血。左心衰竭→肺鬱血(端坐呼吸、PND、肺囉音)；右心衰竭→體循環鬱血(頸靜脈怒張、肝腫大、腹水、下肢水腫)。</p><ul><li><b>NYHA 分級：</b>I 無症狀；II 日常活動症狀；III 輕於日常活動即症狀；IV 休息即症狀。</li><li><b>診斷：</b>BNP/NT-proBNP 評估嚴重度與鑑別呼吸困難。代償機轉：交感活化(心跳快、血管收縮)、RAAS、ADH、BNP 代償性增加。</li><li><b>HFrEF 改善預後四基石：</b>ARNI/ACEI、β阻斷(僅bisoprolol、carvedilol、metoprolol succinate 實證)、MRA、SGLT2 抑制劑(尤糖尿病/CKD)；利尿劑僅緩解症狀、靜脈強心劑無存活益處、verapamil 於HFrEF 有害。</li><li><b>毛地黃：</b>給藥前測心尖脈，過慢暫停；注意低血鉀增中毒風險；漏服勿補雙倍；中毒可致緩脈/PR-QT變化/高血鉀。</li><li><b>誘因：</b>不遵醫囑/鈉水過量、心律不整、感染、貧血、甲狀腺疾病、NSAID、缺血。</li></ul>"}, "心律不整/傳導/ACLS": {"title": "心律不整與ACLS", "html": "<p><b>核心觀念：先看血流動力學是否穩定。</b>不穩定(低血壓、意識改變、缺血胸痛、急性心衰)之『有脈』快速心律→同步整流；『無脈』VF/無脈VT→立即去顫＋CPR；PEA/asystole→CPR＋腎上腺素(不電擊)。</p><ul><li><b>SVT(PSVT)：</b>規則窄QRS、多為折返；穩定者先迷走刺激(Valsalva、單側頸動脈按摩；嬰兒冰敷臉)→adenosine『快速』推注。digoxin 不建議用於急性SVT。</li><li><b>心房顫動：</b>RR 絕對不規則、無P波；穩定控率(diltiazem/β阻斷)，HF併AF 用amiodarone；>48小時整流前需抗凝(機械瓣用warfarin、禁NOAC)。</li><li><b>心搏過緩：</b>症狀性首選atropine；Mobitz II 與完全AV block 在結下，atropine 無效需節律器。</li><li><b>VT/VF：</b>穩定VT 用amiodarone/lidocaine(verapamil 禁忌)；無脈VT/VF 去顫＋amiodarone 300mg。Torsades 給MgSO4。</li><li><b>毛地黃中毒心律：</b>用atropine/lidocaine/phenytoin，避免quinidine。AED 電擊後立即接續胸部按壓。</li></ul>"}, "瓣膜性心臟病/心內膜炎": {"title": "瓣膜性心臟病與心內膜炎", "html": "<ul><li><b>聽診區：</b>主動脈(右上胸骨緣)、肺動脈(左上)、三尖瓣(左下)、二尖瓣(心尖)。收縮期雜音：AS、MR、TR、PS、VSD；舒張期：AR、MS。</li><li><b>主動脈瓣狹窄(AS)：</b>三症狀＝心絞痛、暈厥、呼吸困難；噴射性收縮期雜音、脈搏緩升小弱、脈壓窄。麻醉/處置維持竇性律、足夠前負荷與SVR、避免心搏過速與SVR驟降。有症狀重度AS→換瓣(SAVR/TAVR)。</li><li><b>二尖瓣逆流(MR)：</b>心尖全收縮期雜音放射左腋下、S3；處置『快而前向』(增心率、降後負荷)。二尖瓣狹窄→左房擴大、易AF、肺充血，利尿降左房壓。</li><li><b>機械瓣：</b>終身warfarin(監測PT/INR，非aPTT)、避免aspirin/NSAID 疊加出血；致命大出血應暫停/逆轉抗凝。</li><li><b>感染性心內膜炎：</b>發燒＋新雜音＋周邊徵(Janeway 無痛、Osler 有痛、Roth spots、splinter)；TEE 較TTE 敏感；viridans 鏈球菌用penicillin G，腸球菌不可用頭孢；心臟裝置感染常為凝固酶陰性葡萄球菌。預防僅限高風險者。</li></ul>"}, "高血壓": {"title": "高血壓", "html": "<ul><li><b>分類：</b>原發性最多；續發性最常見為腎實質疾病，其餘腎血管、原發性醛固酮增多(低腎素高醛固酮，腹部CT)、嗜鉻細胞瘤(陣發頭痛發汗心悸，metanephrine/VMA、MIBG，α阻斷後腹腔鏡切除)、主動脈窄縮、OSA。年輕高血壓應查續發原因。</li><li><b>難控制原因：</b>依從性差、鈉/酒精過量、續發性、併用升壓藥物(NSAID、類固醇)；增加鉀攝取通常有助降壓。</li><li><b>急症：</b>避免舌下短效nifedipine(降壓不可控致缺血)；應靜脈可控降壓。</li><li><b>圍術期：</b>長期β阻斷續用至手術日，勿手術當天才急性啟動(POISE)；ACEI/ARB 術前可考慮停；>180/110 延後選擇性手術。</li><li><b>飲食(DASH)：</b>高纖、低飽和脂肪、多蔬果以增加鉀鈣鎂、限鈉。中風後優先thiazide＋ACEI。</li></ul>"}, "心肌病變/心包疾病": {"title": "心肌病變與心包疾病", "html": "<ul><li><b>急性心包炎：</b>胸骨後銳痛、吸氣/平躺加重、前傾緩解；心電圖除aVR 外瀰漫ST上升、PR下降，可聞摩擦音；多為特發/病毒性(非腫瘤)。</li><li><b>心包填塞：</b>Beck triad(低血壓、頸靜脈怒張、心音遙遠)＋奇脈(吸氣收縮壓降>10mmHg)、心搏過速；肺部叩診正常(積液在心包)；超音波確診、心包穿刺引流。利尿/降前負荷藥與β阻斷禁忌；麻醉維持自主呼吸與前負荷。惡性腫瘤(肺癌/乳癌)可致填塞。</li><li><b>肥厚性心肌病(HCM)：</b>年輕運動員猝死常見原因；心搏過速、低前/後負荷、增收縮力會惡化流出道阻塞(digoxin、nitrates 禁忌)，用β阻斷/CCB；極度肥厚(≥30mm)考慮ICD。</li><li><b>擴張型心肌病：</b>S3奔馬律、肺鬱血、心衰竭表現。</li></ul>"}, "主動脈/周邊血管疾病": {"title": "主動脈與周邊血管疾病", "html": "<ul><li><b>主動脈剝離：</b>突發撕裂樣胸背痛、兩臂血壓/脈搏不等、主動脈瓣逆流雜音、縱隔增寬；CT 確診。控制心率與血壓(降剪力)首選labetalol/esmolol，避免單用血管擴張劑(反射心搏過速)；分支受累可致肢體缺血(腳麻、無脈)。Type A 為外科急症。</li><li><b>主動脈瘤：</b>腹主動脈瘤篩檢以腹部超音波(>65歲有家族史/吸菸男性)；升主動脈瘤多≥5.5cm 考慮手術(馬凡/二葉瓣放寬)；EVAR/TEVAR 死亡率較低但注意內漏；statin 改善預後。</li><li><b>周邊動脈疾病(PAD)：</b>間歇性跛行、皮膚冰冷蒼白、脈搏弱、ABI<0.9、微血管充盈>3秒；棕色色素沉著屬靜脈疾病。嚴重肢體缺血(壞疽)以血流重建為先。</li><li><b>IABP：</b>舒張期充氣增加冠脈供氧、收縮期消氣降後負荷；嚴重主動脈瓣逆流為禁忌。</li></ul>"}, "肺栓塞/肺高壓/靜脈栓塞": {"title": "肺栓塞與靜脈栓塞", "html": "<ul><li><b>危險因子：</b>制動(術後、骨折、長途)、惡性腫瘤、凝血異常；表現為突發呼吸困難、胸痛、低血氧、暈厥、心搏過速。</li><li><b>診斷：</b>結合臨床可能性(Wells)；低風險下D-dimer 正常可排除；CT 肺動脈攝影確診；影像Hampton hump、Westermark sign、肺動脈擴大；心電圖S1Q3T3/竇性頻脈。大量PE 致阻塞性休克/PEA，床邊超音波見右心室擴大。</li><li><b>急性PE 之壓力：</b>肺動脈、右心室與右心房壓上升；左心房壓不升。</li><li><b>VTE 抗凝：</b>LMWH 或UFH(體重負荷80U/kg＋持續輸注18U/kg/hr 監測aPTT)，橋接warfarin(目標INR 2.0–3.0)；近期出血/創傷禁用溶栓；抗凝禁忌或高風險可放IVC filter。</li></ul>"}, "血脂異常": {"title": "血脂異常與代謝症候群", "html": "<ul><li><b>代謝症候群(國健署，符合≥3項)：</b>腰圍(男≥90/女≥80)、血壓≥130/85、空腹血糖≥100、三酸甘油脂≥150、HDL(男<40/女<50)。</li><li><b>LDL 升高原因：</b>甲狀腺功能低下、腎病症候群、膽汁淤積、thiazide/類固醇；嚴重肝病(肝硬化)反使膽固醇下降。</li><li><b>2022 台灣血脂指引(風險分層 LDL-C 目標)：</b>極高風險(如近12月內MI)<55、冠心症<70；低/中風險先強化生活型態，非一律130 即用藥。</li><li><b>生活型態：</b>循序增加日常活動(萬步/快走)、適度減重、均衡減熱量；極端飲食或高強度運動對體能差者不安全。心肌梗塞後採高纖、優質蛋白、減飽和脂肪與精製糖。</li></ul>"}, "先天性心臟病": {"title": "先天性心臟病", "html": "<ul><li><b>分流方向：</b>非發紺型(左→右：VSD、ASD、PDA)肺血流增加致心衰竭(生長遲滯、呼吸快、肝腫大)；發紺型(右→左：TOF、TGA)。</li><li><b>法洛氏四重症(TOF)：</b>右室流出道狹窄、VSD、主動脈跨位、右室肥大；靴型心、肺紋路減少。缺氧發作(Tet spell)處置：膝胸位(增SVR、減右→左分流)、給氧、嗎啡、propranolol、輸液；避免降SVR藥物。發紺型易併腦膿瘍。</li><li><b>差異性發紺：</b>主動脈窄縮+PDA →下肢SpO2<上肢；TGA+PDA 可反向(下肢>上肢)。主動脈窄縮：上肢高血壓、股動脈搏動弱。</li><li><b>危急型篩檢：</b>新生兒上下肢血氧飽和度；導管依賴型以PGE1 維持動脈導管(prostaglandin)。早產PDA 用indomethacin/ibuprofen 關閉(急性腎衰為絕對禁忌)，但導管依賴型不可關。</li><li><b>唐氏症：</b>常見心內膜墊缺損/VSD。毛地黃衛教同心衰竭。</li></ul>"}, "休克/血流動力學": {"title": "休克與血流動力學", "html": "<ul><li><b>分類與血流動力學：</b>低血容(CVP↓、CO↓、SVR↑)；心因性(CO↓、充填壓↑、SVR↑、四肢冰冷)；分布性/敗血暖休克(SVR↓、CO 高動力、IVC塌陷)；神經性(SVR↓、CO↓、可緩脈)；阻塞性(PE、心包填塞、張力性氣胸)。</li><li><b>升壓/強心：</b>敗血性休克晶體30mL/kg 後MAP<65 第一線norepinephrine；過敏性休克首選epinephrine；心因性低輸出用dobutamine；vasopressin 純縮血管無正性肌力。心因性休克輸血閾值Hb 7。</li><li><b>監測：</b>肺動脈導管熱稀釋法為心輸出黃金標準；波形序RA→RV→PA→PCWP。心因性休克CI 顯著下降(<2.2)、CI>4 不可能。</li><li><b>胸痛/心因性：</b>典型心絞痛運動加劇休息緩解。心臟術後低心輸出(CI<2.5)給dobutamine。</li></ul>"}, "心血管生理/藥理/心電圖": {"title": "心血管生理、藥理與心電圖", "html": "<ul><li><b>心輸出量＝每搏量×心率，</b>受心律影響(AF 失去心房收縮降CO)；老年人心房收縮(atrial kick)對充填重要。冠脈灌流主要在舒張期，心跳過快縮短舒張期→降供應、增耗氧。心肌耗氧大小：心率>收縮力>後負荷>前負荷。</li><li><b>電解質心電圖：</b>高血鉀＝高尖T波、PR延長、QRS增寬(洗腎病人警覺)；低血鉀＝U波、ST下降、QT延長；低血鈣＝QT延長(可致TdP)；高血鈣＝QT縮短。嚴重高血鉀處置：鈣劑穩定膜(不降鉀)、insulin+glucose/β2促效劑移鉀入細胞、NaHCO3，排鉀靠利尿/樹脂/透析。</li><li><b>抗心律不整(Vaughan-Williams)：</b>I 鈉通道、II β阻斷、III 鉀通道(amiodarone，延長再極化；副作用肺纖維化、甲狀腺異常)、IV 鈣通道。</li><li><b>心音：</b>S1二尖瓣關閉、S2主動脈瓣關閉(生理性分裂吸氣增寬)、S3兒童正常、S4 為S1前低頻音(心室僵硬)。PMI>2.5cm 提示左心室肥大。</li><li><b>監測：</b>II＋V5 導程偵測約95%缺血；動脈導管以橈動脈為主、需評估側枝循環。</li></ul>"}};
const TORDER=["冠狀動脈疾病(IHD/ACS/MI)", "心臟衰竭", "心律不整/傳導/ACLS", "瓣膜性心臟病/心內膜炎", "高血壓", "心肌病變/心包疾病", "主動脈/周邊血管疾病", "肺栓塞/肺高壓/靜脈栓塞", "血脂異常", "先天性心臟病", "休克/血流動力學", "心血管生理/藥理/心電圖"];
const $=s=>document.querySelector(s), ce=document.getElementById('list');
let view='year', expand=false;
const years=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
const topics=TORDER.filter(t=>Q.some(q=>q.topic===t));
years.forEach(y=>fYear.add(new Option('民國'+y+'年',y)));
topics.forEach(t=>fTopic.add(new Option(t,t)));
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function ansText(q){
 if(q.answer_status.indexOf('送分')>=0) return '<span class="warn">送分（全部給分）</span>';
 if(q.answer_status.indexOf('多重')>=0) return '答案：'+q.accepted_answers.join('、')+'（均給分）';
 return '答案：'+q.answer;
}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">民國'+q.roc_year+'</span>',
   '<span class="chip">'+esc(q.subject_group)+(q.branch&&q.branch!=='通論'?'·'+esc(q.branch):'')+'</span>',
   '<span class="chip t">'+esc(q.topic)+'</span>'];
 if(q.answer_status.indexOf('送分')>=0)chips.push('<span class="chip s">送分</span>');
 if(q.answer_status.indexOf('多重')>=0)chips.push('<span class="chip s">多重答案</span>');
 if(e)chips.push('<span class="chip d">有詳解</span>');
 let opts='';
 for(const k of ['A','B','C','D']){ if(q.options[k]!==undefined) opts+='<div class="opt"><b>('+k+')</b>'+esc(q.options[k])+'</div>'; }
 const img=q.img?'<img class="ecg" src="'+q.img+'" alt="附圖">':'';
 let det='';
 if(e){
   det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
   if(e.detail){
     if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
     if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D']){if(e.detail.options[k]){var cc=(q.accepted_answers&&q.accepted_answers.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
     if(e.detail.sources&&e.detail.sources.length)det+='<div class="src">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
   }
 } else { det='<div class="pend">② 詳解撰寫中…</div>'; }
 return '<div class="q"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<button class="btn tg">看答案＋詳解 ▾</button>'+
  '<div class="ans"><div class="ansline">'+ansText(q)+(q.correction_note?'　<span style="font-size:.78rem;color:#9a6b00">（'+esc(q.correction_note)+'）</span>':'')+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value, ft=fTopic.value, kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';
 let h='';
 if(view==='year'){
   const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
   ys.forEach(y=>{h+='<div class="grp">民國'+y+'年</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});
 } else {
   topics.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;
     h+='<div class="grp">'+t+'（'+tq.length+'題）</div>';
     if(L[t])h+='<div class="lec"><h3>📘 '+esc(L[t].title||t)+' 複習講義</h3>'+(L[t].html||'')+'</div>';
     h+=tq.map(qCard).join('');});
 }
 ce.innerHTML=h;
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
ce.addEventListener('click',e=>{if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render); fKw.oninput=render;
expandBtn=$('#expand'); expandBtn.onclick=()=>{expand=!expand;expandBtn.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
