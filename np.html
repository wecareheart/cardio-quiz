]}}, "114-進階-麻醉-45": {"quick": "法洛氏四重症為『右心室』出口狹窄,『左心室出口狹窄』敘述錯誤。", "detail": {"background": "法洛氏四重症(TOF)四大特徵：右心室流出道(肺動脈)狹窄、心室中膈缺損(VSD)、主動脈跨位(overriding aorta)、右心室肥大；為發紺型先天性心臟病。『左心室出口狹窄』之敘述錯誤(應為右心室流出道狹窄)。", "options": {"A": "發紺型CHD,正確。", "B": "常有VSD,正確。", "C": "常有肺動脈/右室流出道狹窄,正確。", "D": "錯誤(本題答案)：為右心室出口狹窄非左心室。"}, "sources": ["法洛氏四重症", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-通論-5分科-54": {"quick": "到院前心臟停止、有電氣活動但無脈(PEA)、重點超音波示右心室明顯擴大→肺動脈栓塞。", "detail": {"background": "到院前心臟停止(OHCA)、心電圖有電氣活動但無脈(PEA)、床邊超音波示右心室明顯擴大(右心室壓力負荷、室間隔左偏D-sign)，最可能為大量肺動脈栓塞——屬可逆病因(ACLS 之H&T 中的Thrombosis-pulmonary)，可考慮溶栓。與心包填塞、張力性氣胸、主動脈剝離鑑別。", "options": {"A": "心包填塞為心包積液壓迫。", "B": "張力性氣胸為患側呼吸音消失。", "C": "主動脈剝離非右室擴大。", "D": "正確，肺動脈栓塞。"}, "sources": ["ACLS;PE", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-家庭-66": {"quick": "心房顫動持續超過『48 小時』即增加心房血栓與中風風險,『超過1週才開始增加』敘述錯誤。", "detail": {"background": "心房顫動(AF)持續超過『48小時』即開始增加心房內血栓與中風風險(故>48小時整流前需抗凝3週或經食道超音波排除血栓)；『超過1週才開始增加』之敘述錯誤。AF 可為甲狀腺毒症表現；控率改善症狀；恢復竇性有助長期預後。", "options": {"A": "可為甲狀腺毒症表現,正確。", "B": "控率改善症狀,正確。", "C": "恢復竇性有助預後,正確。", "D": "錯誤(本題答案)：48小時即增風險非1週。"}, "sources": ["心房顫動;抗凝", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-內科-67": {"quick": "規律透析者於透析前一日清晨無力、junctional bradycardia→高血鉀。", "detail": {"background": "規律透析者於透析前一日(週一清晨)鉀蓄積最多，出現全身無力、心電圖junctional bradycardia(高鉀抑制竇房結與傳導)→高血鉀；為透析病人急症。高血鈣為QT 縮短、高血鎂可致緩脈但此情境以高鉀為主、高血磷非直接致此心律。", "options": {"A": "高血鈣為QT縮短。", "B": "高血鎂可致緩脈但透析前以高鉀為主。", "C": "高血磷非直接致此心律。", "D": "正確，高血鉀。"}, "sources": ["高血鉀;透析", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-家庭-70": {"quick": "兩臂血壓差大、撕裂樣胸背痛→急性主動脈症候群(剝離),處置須控制血壓但避免過度降壓影響灌流。", "detail": {"background": "兩臂血壓差大(右80/左110)、撕裂樣胸背痛、不規則脈搏，提示『急性主動脈症候群(主動脈剝離)』。處置須控制心率與血壓以降低主動脈壁剪力，但維持器官灌流、避免『過度』降壓致灌流不足。縱隔增寬應優先排除剝離而非心包炎；非單純心律不整或右心衰竭。", "options": {"A": "縱隔增寬應優先排除剝離非心包炎。", "B": "正確，疑急性主動脈症候群,避免過度降壓。", "C": "非單純心律不整,首要控壓降剪力。", "D": "非右心衰竭,給利尿無益。"}, "sources": ["主動脈剝離", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-家庭-71": {"quick": "廣泛性 ST 段上升合併 PR 段下降→急性心包炎。", "detail": {"background": "十二導程心電圖呈『廣泛性ST 段上升與PR 段下降』為急性心包炎之特徵性表現(除aVR 外瀰漫ST 上升、PR 下降、可有摩擦音、胸痛前傾減輕)。與STEMI(局部分布、對應鏡像、可有Q波)、心肌炎、壓力性心肌病(心尖球形)區分。故為急性心包炎。", "options": {"A": "STEMI 為局部分布。", "B": "心肌炎ECG 多變但此型態典型心包炎。", "C": "正確，急性心包炎。", "D": "壓力性心肌病為心尖球形。"}, "sources": ["急性心包炎", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "114-進階-家庭-72": {"quick": "胸骨後壓迫感、放射左臂下顎、勞動/情緒誘發、休息緩解→冠狀動脈疾病之穩定型心絞痛。", "detail": {"background": "典型穩定型心絞痛三特徵(Diamond)：①胸骨後壓迫/緊縮感放射左臂或下顎；②由運動或情緒誘發；③休息或舌下硝化甘油數分鐘內緩解。三者皆具為典型心絞痛(高度提示阻塞性冠心病)。肋軟骨炎為觸壓加劇之尖痛、GERD 為灼熱、胸膜炎隨深呼吸加重，可資鑑別。", "options": {"A": "肋軟骨炎為觸壓加劇之尖痛。", "B": "GERD 為灼熱、制酸劑緩解。", "C": "正確，穩定型心絞痛。", "D": "胸膜炎為深呼吸加劇。"}, "sources": ["穩定型心絞痛", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-精神科-3": {"quick": "過敏性休克的首選升壓/強心藥物是 epinephrine(腎上腺素)。", "detail": {"background": "過敏性休克(anaphylaxis)為分布性休克，首選藥物為『腎上腺素(epinephrine)』肌肉注射(大腿外側)——α1 縮血管升壓、β1 增心輸出、β2 支氣管擴張並抑制肥大細胞介質釋放。dopamine、vasopressin、norepinephrine 非首選；延遲給epinephrine 與死亡相關。", "options": {"A": "正確，epinephrine。", "B": "dopamine 非首選。", "C": "vasopressin 為輔助。", "D": "norepinephrine 非過敏性休克首選。"}, "sources": ["過敏性休克", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "105-TNPA-通論-23": {"quick": "PCWP 偏低、心輸出減少、SVR 降低→神經性休克(分布性,前負荷與血管張力皆降)。", "detail": {"background": "肺動脈導管數值判讀休克類型：神經性休克因交感喪失→血管擴張(SVR↓)、靜脈回流減少(PCWP↓/前負荷↓)、心輸出下降(CO↓)，常合併相對心搏過緩。低血容為SVR『升』、心因性為PCWP『升』、敗血暖休克為CO『高』。本題PCWP低、CO減、SVR低→神經性休克。", "options": {"A": "低血容SVR 應升高。", "B": "心因性PCWP 應升高。", "C": "敗血暖休克CO 偏高。", "D": "正確，神經性休克。"}, "sources": ["休克血流動力學", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "108b-TNPA-外科-67": {"quick": "骨盆骨折出血近期之髂股靜脈血栓,『立即注射urokinase 溶栓』不適宜(近期創傷出血為禁忌)。", "detail": {"background": "骨盆骨折出血後近期之髂股靜脈血栓(DVT)：近期大出血/創傷為『溶栓禁忌』，故不可立即注射urokinase。處置為抬高患肢/彈性襪、出血穩定後抗凝(≥3個月)、抗凝禁忌或高風險可放下腔靜脈濾網(IVC filter)防肺栓塞。故『立即溶栓』不適宜。", "options": {"A": "不適宜(本題答案)：近期出血禁用溶栓。", "B": "抬高彈繃減腫,適當。", "C": "放IVC filter 防PE,適當。", "D": "出血穩定後抗凝≥3個月,適當。"}, "sources": ["深部靜脈栓塞", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-通論-其他-12#2": {"quick": "心肌缺氧之心絞痛心電圖典型出現 ST-T 變化(ST下降/上升、T波倒置)。", "detail": {"background": "心肌缺血/心絞痛之心電圖典型為『ST-T 變化』：心內膜下缺血呈ST 段壓低、T 波倒置；透壁性缺血/損傷呈ST 段上升；嚴重壞死後出現病理性Q波。P波變平消失、QT 延長、PR 縮短非缺血典型表現。", "options": {"A": "P波變化非缺血典型。", "B": "QT延長為電解質/藥物。", "C": "PR縮短為預激。", "D": "正確，ST-T 改變。"}, "sources": ["缺血性心臟病心電圖", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "109-進階-內科-55": {"quick": "CO 偏高、SVR 偏低之分布性休克型態,於選項中以過敏性休克最符合。", "detail": {"background": "血流動力學：心輸出偏高(CO 6.6)、SVR 偏低(750)、CVP 中等，呈『分布性休克(暖休克)』型態——血管擴張、心臟高動力代償。選項中過敏性休克屬分布性(心因/低血容/梗塞性皆為CO 下降)，故為最符合者。", "options": {"A": "正確，分布性休克(過敏性)。", "B": "心因性CO 下降。", "C": "低血容CO 下降、SVR升。", "D": "梗塞性CO 下降。"}, "sources": ["休克分類", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}, "113-通論-5分科-71": {"quick": "重度二尖瓣逆流合併EF35%:可聞雙側基底爆裂音、出現心房顫動會降低心輸出(=24)。", "detail": {"background": "重度二尖瓣逆流(MR)合併左心室射出分率35%：肺靜脈鬱血致雙側基底爆裂音(crackles)；MR 為『收縮期』雜音(非舒張期)；心房顫動失去心房收縮(atrial kick)並心律不規則，使左室充填與心輸出下降。故正確為②基底爆裂音＋④AF 降心輸出。", "options": {"A": "含舒張期雜音(錯)。", "B": "組合不符。", "C": "正確，2基底爆裂音、4 AF降心輸出。", "D": "含舒張期雜音(錯)。"}, "sources": ["心衰竭;二尖瓣逆流", "Harrison's 內科學 (21e)；Braunwald's Heart Disease (12e)"]}}}, L={"冠狀動脈疾病(IHD/ACS/MI)": {"title": "冠狀動脈疾病", "html": "<p><b>核心概念：</b>冠狀動脈粥狀硬化→心肌供需失衡。分穩定型心絞痛與急性冠心症(ACS：不穩定型心絞痛、NSTEMI、STEMI)。</p><ul><li><b>典型心絞痛：</b>胸骨後壓迫悶痛、放射左臂/下顎、勞動或情緒誘發、休息或硝化甘油緩解；女性/糖尿病/老人常以呼吸困難、上腹痛、噁心等『等同心絞痛』表現。隨呼吸/姿勢變化的尖銳痛多非心因。</li><li><b>心電圖定位：</b>II/III/aVF＝下壁(RCA，常合併右室梗塞與緩脈，須加做右胸導程)；V1-V4＝前壁中膈(LAD)；I/aVL/V5-6＝側壁(LCx)；V1-2 高R/ST下降鏡像＝後壁。STEMI 為ST上升、演變出Q波與T倒置。</li><li><b>生物標記：</b>troponin 最敏感特異(首選)；CK-MB 適合偵測再梗塞；BNP 升高與較差預後相關。</li><li><b>治療：</b>立即aspirin、硝酸鹽(低血壓/右室梗塞禁用)、嗎啡(靜脈)；次級預防四本柱：抗血小板、statin、β阻斷(急性心衰/休克禁用)、ACEI(EF<40%降死亡)。糖尿病多血管病變首選CABG；穩定型PCI 主要緩解症狀。變異型(冠脈痙攣)以鈣阻斷+硝酸鹽治療、避免非選擇性β阻斷。</li><li><b>圍術期：</b>DES 後需足夠雙抗血小板，擇期手術應延後；支架病人勿貿然停aspirin。</li></ul>"}, "心臟衰竭": {"title": "心臟衰竭", "html": "<p><b>核心概念：</b>幫浦衰竭致心輸出不足與鬱血。左心衰竭→肺鬱血(端坐呼吸、PND、肺囉音)；右心衰竭→體循環鬱血(頸靜脈怒張、肝腫大、腹水、下肢水腫)。</p><ul><li><b>NYHA 分級：</b>I 無症狀；II 日常活動症狀；III 輕於日常活動即症狀；IV 休息即症狀。</li><li><b>診斷：</b>BNP/NT-proBNP 評估嚴重度與鑑別呼吸困難。代償機轉：交感活化(心跳快、血管收縮)、RAAS、ADH、BNP 代償性增加。</li><li><b>HFrEF 改善預後四基石：</b>ARNI/ACEI、β阻斷(僅bisoprolol、carvedilol、metoprolol succinate 實證)、MRA、SGLT2 抑制劑(尤糖尿病/CKD)；利尿劑僅緩解症狀、靜脈強心劑無存活益處、verapamil 於HFrEF 有害。</li><li><b>毛地黃：</b>給藥前測心尖脈，過慢暫停；注意低血鉀增中毒風險；漏服勿補雙倍；中毒可致緩脈/PR-QT變化/高血鉀。</li><li><b>誘因：</b>不遵醫囑/鈉水過量、心律不整、感染、貧血、甲狀腺疾病、NSAID、缺血。</li></ul>"}, "心律不整/傳導/ACLS": {"title": "心律不整與ACLS", "html": "<p><b>核心觀念：先看血流動力學是否穩定。</b>不穩定(低血壓、意識改變、缺血胸痛、急性心衰)之『有脈』快速心律→同步整流；『無脈』VF/無脈VT→立即去顫＋CPR；PEA/asystole→CPR＋腎上腺素(不電擊)。</p><ul><li><b>SVT(PSVT)：</b>規則窄QRS、多為折返；穩定者先迷走刺激(Valsalva、單側頸動脈按摩；嬰兒冰敷臉)→adenosine『快速』推注。digoxin 不建議用於急性SVT。</li><li><b>心房顫動：</b>RR 絕對不規則、無P波；穩定控率(diltiazem/β阻斷)，HF併AF 用amiodarone；>48小時整流前需抗凝(機械瓣用warfarin、禁NOAC)。</li><li><b>心搏過緩：</b>症狀性首選atropine；Mobitz II 與完全AV block 在結下，atropine 無效需節律器。</li><li><b>VT/VF：</b>穩定VT 用amiodarone/lidocaine(verapamil 禁忌)；無脈VT/VF 去顫＋amiodarone 300mg。Torsades 給MgSO4。</li><li><b>毛地黃中毒心律：</b>用atropine/lidocaine/phenytoin，避免quinidine。AED 電擊後立即接續胸部按壓。</li></ul>"}, "瓣膜性心臟病/心內膜炎": {"title": "瓣膜性心臟病與心內膜炎", "html": "<ul><li><b>聽診區：</b>主動脈(右上胸骨緣)、肺動脈(左上)、三尖瓣(左下)、二尖瓣(心尖)。收縮期雜音：AS、MR、TR、PS、VSD；舒張期：AR、MS。</li><li><b>主動脈瓣狹窄(AS)：</b>三症狀＝心絞痛、暈厥、呼吸困難；噴射性收縮期雜音、脈搏緩升小弱、脈壓窄。麻醉/處置維持竇性律、足夠前負荷與SVR、避免心搏過速與SVR驟降。有症狀重度AS→換瓣(SAVR/TAVR)。</li><li><b>二尖瓣逆流(MR)：</b>心尖全收縮期雜音放射左腋下、S3；處置『快而前向』(增心率、降後負荷)。二尖瓣狹窄→左房擴大、易AF、肺充血，利尿降左房壓。</li><li><b>機械瓣：</b>終身warfarin(監測PT/INR，非aPTT)、避免aspirin/NSAID 疊加出血；致命大出血應暫停/逆轉抗凝。</li><li><b>感染性心內膜炎：</b>發燒＋新雜音＋周邊徵(Janeway 無痛、Osler 有痛、Roth spots、splinter)；TEE 較TTE 敏感；viridans 鏈球菌用penicillin G，腸球菌不可用頭孢；心臟裝置感染常為凝固酶陰性葡萄球菌。預防僅限高風險者。</li></ul>"}, "高血壓": {"title": "高血壓", "html": "<ul><li><b>分類：</b>原發性最多；續發性最常見為腎實質疾病，其餘腎血管、原發性醛固酮增多(低腎素高醛固酮，腹部CT)、嗜鉻細胞瘤(陣發頭痛發汗心悸，metanephrine/VMA、MIBG，α阻斷後腹腔鏡切除)、主動脈窄縮、OSA。年輕高血壓應查續發原因。</li><li><b>難控制原因：</b>依從性差、鈉/酒精過量、續發性、併用升壓藥物(NSAID、類固醇)；增加鉀攝取通常有助降壓。</li><li><b>急症：</b>避免舌下短效nifedipine(降壓不可控致缺血)；應靜脈可控降壓。</li><li><b>圍術期：</b>長期β阻斷續用至手術日，勿手術當天才急性啟動(POISE)；ACEI/ARB 術前可考慮停；>180/110 延後選擇性手術。</li><li><b>飲食(DASH)：</b>高纖、低飽和脂肪、多蔬果以增加鉀鈣鎂、限鈉。中風後優先thiazide＋ACEI。</li></ul>"}, "心肌病變/心包疾病": {"title": "心肌病變與心包疾病", "html": "<ul><li><b>急性心包炎：</b>胸骨後銳痛、吸氣/平躺加重、前傾緩解；心電圖除aVR 外瀰漫ST上升、PR下降，可聞摩擦音；多為特發/病毒性(非腫瘤)。</li><li><b>心包填塞：</b>Beck triad(低血壓、頸靜脈怒張、心音遙遠)＋奇脈(吸氣收縮壓降>10mmHg)、心搏過速；肺部叩診正常(積液在心包)；超音波確診、心包穿刺引流。利尿/降前負荷藥與β阻斷禁忌；麻醉維持自主呼吸與前負荷。惡性腫瘤(肺癌/乳癌)可致填塞。</li><li><b>肥厚性心肌病(HCM)：</b>年輕運動員猝死常見原因；心搏過速、低前/後負荷、增收縮力會惡化流出道阻塞(digoxin、nitrates 禁忌)，用β阻斷/CCB；極度肥厚(≥30mm)考慮ICD。</li><li><b>擴張型心肌病：</b>S3奔馬律、肺鬱血、心衰竭表現。</li></ul>"}, "主動脈/周邊血管疾病": {"title": "主動脈與周邊血管疾病", "html": "<ul><li><b>主動脈剝離：</b>突發撕裂樣胸背痛、兩臂血壓/脈搏不等、主動脈瓣逆流雜音、縱隔增寬；CT 確診。控制心率與血壓(降剪力)首選labetalol/esmolol，避免單用血管擴張劑(反射心搏過速)；分支受累可致肢體缺血(腳麻、無脈)。Type A 為外科急症。</li><li><b>主動脈瘤：</b>腹主動脈瘤篩檢以腹部超音波(>65歲有家族史/吸菸男性)；升主動脈瘤多≥5.5cm 考慮手術(馬凡/二葉瓣放寬)；EVAR/TEVAR 死亡率較低但注意內漏；statin 改善預後。</li><li><b>周邊動脈疾病(PAD)：</b>間歇性跛行、皮膚冰冷蒼白、脈搏弱、ABI<0.9、微血管充盈>3秒；棕色色素沉著屬靜脈疾病。嚴重肢體缺血(壞疽)以血流重建為先。</li><li><b>IABP：</b>舒張期充氣增加冠脈供氧、收縮期消氣降後負荷；嚴重主動脈瓣逆流為禁忌。</li></ul>"}, "肺栓塞/肺高壓/靜脈栓塞": {"title": "肺栓塞與靜脈栓塞", "html": "<ul><li><b>危險因子：</b>制動(術後、骨折、長途)、惡性腫瘤、凝血異常；表現為突發呼吸困難、胸痛、低血氧、暈厥、心搏過速。</li><li><b>診斷：</b>結合臨床可能性(Wells)；低風險下D-dimer 正常可排除；CT 肺動脈攝影確診；影像Hampton hump、Westermark sign、肺動脈擴大；心電圖S1Q3T3/竇性頻脈。大量PE 致阻塞性休克/PEA，床邊超音波見右心室擴大。</li><li><b>急性PE 之壓力：</b>肺動脈、右心室與右心房壓上升；左心房壓不升。</li><li><b>VTE 抗凝：</b>LMWH 或UFH(體重負荷80U/kg＋持續輸注18U/kg/hr 監測aPTT)，橋接warfarin(目標INR 2.0–3.0)；近期出血/創傷禁用溶栓；抗凝禁忌或高風險可放IVC filter。</li></ul>"}, "血脂異常": {"title": "血脂異常與代謝症候群", "html": "<ul><li><b>代謝症候群(國健署，符合≥3項)：</b>腰圍(男≥90/女≥80)、血壓≥130/85、空腹血糖≥100、三酸甘油脂≥150、HDL(男<40/女<50)。</li><li><b>LDL 升高原因：</b>甲狀腺功能低下、腎病症候群、膽汁淤積、thiazide/類固醇；嚴重肝病(肝硬化)反使膽固醇下降。</li><li><b>2022 台灣血脂指引(風險分層 LDL-C 目標)：</b>極高風險(如近12月內MI)<55、冠心症<70；低/中風險先強化生活型態，非一律130 即用藥。</li><li><b>生活型態：</b>循序增加日常活動(萬步/快走)、適度減重、均衡減熱量；極端飲食或高強度運動對體能差者不安全。心肌梗塞後採高纖、優質蛋白、減飽和脂肪與精製糖。</li></ul>"}, "先天性心臟病": {"title": "先天性心臟病", "html": "<ul><li><b>分流方向：</b>非發紺型(左→右：VSD、ASD、PDA)肺血流增加致心衰竭(生長遲滯、呼吸快、肝腫大)；發紺型(右→左：TOF、TGA)。</li><li><b>法洛氏四重症(TOF)：</b>右室流出道狹窄、VSD、主動脈跨位、右室肥大；靴型心、肺紋路減少。缺氧發作(Tet spell)處置：膝胸位(增SVR、減右→左分流)、給氧、嗎啡、propranolol、輸液；避免降SVR藥物。發紺型易併腦膿瘍。</li><li><b>差異性發紺：</b>主動脈窄縮+PDA →下肢SpO2<上肢；TGA+PDA 可反向(下肢>上肢)。主動脈窄縮：上肢高血壓、股動脈搏動弱。</li><li><b>危急型篩檢：</b>新生兒上下肢血氧飽和度；導管依賴型以PGE1 維持動脈導管(prostaglandin)。早產PDA 用indomethacin/ibuprofen 關閉(急性腎衰為絕對禁忌)，但導管依賴型不可關。</li><li><b>唐氏症：</b>常見心內膜墊缺損/VSD。毛地黃衛教同心衰竭。</li></ul>"}, "休克/血流動力學": {"title": "休克與血流動力學", "html": "<ul><li><b>分類與血流動力學：</b>低血容(CVP↓、CO↓、SVR↑)；心因性(CO↓、充填壓↑、SVR↑、四肢冰冷)；分布性/敗血暖休克(SVR↓、CO 高動力、IVC塌陷)；神經性(SVR↓、CO↓、可緩脈)；阻塞性(PE、心包填塞、張力性氣胸)。</li><li><b>升壓/強心：</b>敗血性休克晶體30mL/kg 後MAP<65 第一線norepinephrine；過敏性休克首選epinephrine；心因性低輸出用dobutamine；vasopressin 純縮血管無正性肌力。心因性休克輸血閾值Hb 7。</li><li><b>監測：</b>肺動脈導管熱稀釋法為心輸出黃金標準；波形序RA→RV→PA→PCWP。心因性休克CI 顯著下降(<2.2)、CI>4 不可能。</li><li><b>胸痛/心因性：</b>典型心絞痛運動加劇休息緩解。心臟術後低心輸出(CI<2.5)給dobutamine。</li></ul>"}, "心血管生理/藥理/心電圖": {"title": "心血管生理、藥理與心電圖", "html": "<ul><li><b>心輸出量＝每搏量×心率，</b>受心律影響(AF 失去心房收縮降CO)；老年人心房收縮(atrial kick)對充填重要。冠脈灌流主要在舒張期，心跳過快縮短舒張期→降供應、增耗氧。心肌耗氧大小：心率>收縮力>後負荷>前負荷。</li><li><b>電解質心電圖：</b>高血鉀＝高尖T波、PR延長、QRS增寬(洗腎病人警覺)；低血鉀＝U波、ST下降、QT延長；低血鈣＝QT延長(可致TdP)；高血鈣＝QT縮短。嚴重高血鉀處置：鈣劑穩定膜(不降鉀)、insulin+glucose/β2促效劑移鉀入細胞、NaHCO3，排鉀靠利尿/樹脂/透析。</li><li><b>抗心律不整(Vaughan-Williams)：</b>I 鈉通道、II β阻斷、III 鉀通道(amiodarone，延長再極化；副作用肺纖維化、甲狀腺異常)、IV 鈣通道。</li><li><b>心音：</b>S1二尖瓣關閉、S2主動脈瓣關閉(生理性分裂吸氣增寬)、S3兒童正常、S4 為S1前低頻音(心室僵硬)。PMI>2.5cm 提示左心室肥大。</li><li><b>監測：</b>II＋V5 導程偵測約95%缺血；動脈導管以橈動脈為主、需評估側枝循環。</li></ul>"}};
const TORDER=["冠狀動脈疾病(IHD/ACS/MI)", "心臟衰竭", "心律不整/傳導/ACLS", "瓣膜性心臟病/心內膜炎", "高血壓", "心肌病變/心包疾病", "主動脈/周邊血管疾病", "肺栓塞/肺高壓/靜脈栓塞", "血脂異常", "先天性心臟病", "休克/血流動力學", "心血管生理/藥理/心電圖"];
const $=s=>document.querySelector(s), ce=document.getElementById('list');
let view='year', expand=false;
const years=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
const topics=TORDER.filter(t=>Q.some(q=>q.topic===t));
years.forEach(y=>fYear.add(new Option('民國'+y+'年',y)));
topics.forEach(t=>fTopic.add(new Option(t,t)));
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function ansText(q){
 if(q.answer_status.indexOf('送分')>=0) return '<span class="warn">送分（全部給分）</span>';
 if(q.answer_status.indexOf('多重')>=0) return '答案：'+q.accepted_answers.join('、')+'（均給分）';
 return '答案：'+q.answer;
}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">民國'+q.roc_year+'</span>',
   '<span class="chip">'+esc(q.subject_group)+(q.branch&&q.branch!=='通論'?'·'+esc(q.branch):'')+'</span>',
   '<span class="chip t">'+esc(q.topic)+'</span>'];
 if(q.answer_status.indexOf('送分')>=0)chips.push('<span class="chip s">送分</span>');
 if(q.answer_status.indexOf('多重')>=0)chips.push('<span class="chip s">多重答案</span>');
 if(e)chips.push('<span class="chip d">有詳解</span>');
 let opts='';
 for(const k of ['A','B','C','D']){ if(q.options[k]!==undefined) opts+='<div class="opt"><b>('+k+')</b>'+esc(q.options[k])+'</div>'; }
 const img=q.img?'<img class="ecg" src="'+q.img+'" alt="附圖">':'';
 let det='';
 if(e){
   det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
   if(e.detail){
     if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
     if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D']){if(e.detail.options[k]){var cc=(q.accepted_answers&&q.accepted_answers.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
     if(e.detail.sources&&e.detail.sources.length)det+='<div class="src">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
   }
 } else { det='<div class="pend">② 詳解撰寫中…</div>'; }
 return '<div class="q"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<button class="btn tg">看答案＋詳解 ▾</button>'+
  '<div class="ans"><div class="ansline">'+ansText(q)+(q.correction_note?'　<span style="font-size:.78rem;color:#9a6b00">（'+esc(q.correction_note)+'）</span>':'')+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value, ft=fTopic.value, kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';
 let h='';
 if(view==='year'){
   const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
   ys.forEach(y=>{h+='<div class="grp">民國'+y+'年</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});
 } else {
   topics.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;
     h+='<div class="grp">'+t+'（'+tq.length+'題）</div>';
     if(L[t])h+='<div class="lec"><h3>📘 '+esc(L[t].title||t)+' 複習講義</h3>'+(L[t].html||'')+'</div>';
     h+=tq.map(qCard).join('');});
 }
 ce.innerHTML=h;
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
ce.addEventListener('click',e=>{if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render); fKw.oninput=render;
