k":"知悉兒童施用毒品時,應於「24」小時內向主管機關通報。","detail":{"background":"兒童及少年福利與權益保障法:稱兒童及少年指未滿18歲之人(兒童<12歲、少年12~未滿18歲);醫事/教育/社工等人員執行業務知悉兒少遭受虐待、施用毒品、猥褻性交、被遺棄、其他傷害,應至遲24小時內向主管機關通報(責任通報);通報專線113(保護專線)、緊急110。處置:儘速隔離受虐者與施虐者、注意隱私、與兒童單獨會談(不與施虐者/父母同時)、提供保護與社會資源,不需自行確認施虐者。受虐徵象:多處不同癒合期瘀傷/骨折、與說法不符的傷、髒污異味、寒冬穿短袖、退縮或過度警覺。 知悉兒少非法施用毒品/管制藥品、遭受虐待或其他傷害,應24小時內通報。本題為「24」(A)。","options":{"A":"正確。24小時內通報。","B":"48超過時限。","C":"72超過時限。","D":"96超過時限。"},"sources":["兒少權益保障法","通報時限"]}},"107030-N4-41":{"quick":"兒童及少年福利與權益保障法所稱兒童及少年指「未滿18歲」之人。","detail":{"background":"兒童及少年福利與權益保障法:稱兒童及少年指未滿18歲之人(兒童<12歲、少年12~未滿18歲);醫事/教育/社工等人員執行業務知悉兒少遭受虐待、施用毒品、猥褻性交、被遺棄、其他傷害,應至遲24小時內向主管機關通報(責任通報);通報專線113(保護專線)、緊急110。處置:儘速隔離受虐者與施虐者、注意隱私、與兒童單獨會談(不與施虐者/父母同時)、提供保護與社會資源,不需自行確認施虐者。受虐徵象:多處不同癒合期瘀傷/骨折、與說法不符的傷、髒污異味、寒冬穿短袖、退縮或過度警覺。 法定義:兒童=未滿12歲、少年=12歲以上未滿18歲,合稱未滿18歲之人。本題為「18歲」(D)。","options":{"A":"12歲為兒童上限,非兒少全範圍。","B":"14歲非法定界線。","C":"15歲非法定界線。","D":"正確。兒童及少年指未滿18歲。"},"sources":["兒少權益保障法","定義"]}},"107110-N4-54":{"quick":"發現兒童遭受猥褻或性交,需於「24小時內」通報主管機關。","detail":{"background":"兒童及少年福利與權益保障法:稱兒童及少年指未滿18歲之人(兒童<12歲、少年12~未滿18歲);醫事/教育/社工等人員執行業務知悉兒少遭受虐待、施用毒品、猥褻性交、被遺棄、其他傷害,應至遲24小時內向主管機關通報(責任通報);通報專線113(保護專線)、緊急110。處置:儘速隔離受虐者與施虐者、注意隱私、與兒童單獨會談(不與施虐者/父母同時)、提供保護與社會資源,不需自行確認施虐者。受虐徵象:多處不同癒合期瘀傷/骨折、與說法不符的傷、髒污異味、寒冬穿短袖、退縮或過度警覺。 知悉兒少遭受猥褻、性交、性剝削等,屬責任通報,應24小時內通報。本題為「24小時內」(A)。","options":{"A":"正確。24小時內通報。","B":"48超過。","C":"72超過。","D":"一週超過。"},"sources":["兒少權益保障法","性侵通報"]}},"108110-N4-52":{"quick":"兒童虐待敘述正確的是「多數兒童虐待的施虐者多為認識的人」。","detail":{"background":"兒童及少年福利與權益保障法:稱兒童及少年指未滿18歲之人(兒童<12歲、少年12~未滿18歲);醫事/教育/社工等人員執行業務知悉兒少遭受虐待、施用毒品、猥褻性交、被遺棄、其他傷害,應至遲24小時內向主管機關通報(責任通報);通報專線113(保護專線)、緊急110。處置:儘速隔離受虐者與施虐者、注意隱私、與兒童單獨會談(不與施虐者/父母同時)、提供保護與社會資源,不需自行確認施虐者。受虐徵象:多處不同癒合期瘀傷/骨折、與說法不符的傷、髒污異味、寒冬穿短袖、退縮或過度警覺。 (1)「施虐者多為兒童認識的人(父母、照顧者、親屬)」——正確;(2)兒童性虐待不易由舉止發現(多隱匿、需警覺間接徵象),故B錯;(3)身體虐待、嚴重疏忽、搖晃症候群皆可致死(非只有身體虐待),故C錯;(4)疏忽是未提供基本需求(非過度保護),故D錯。本題正確為「施虐者多為認識的人」(A)。","options":{"A":"正確。施虐者多為兒童認識的人。","B":"錯。性虐待不易由舉止發現(多隱匿)。","C":"錯。嚴重疏忽/搖晃症候群等亦可致死。","D":"錯。疏忽是未提供基本需求,非過度保護。"},"sources":["兒少權益保障法","施虐者"]}},"109110-N4-42":{"quick":"「表現活潑好動行為」較不屬於兒童遭受虐待/疏忽的常見徵象。","detail":{"background":"兒童及少年福利與權益保障法:稱兒童及少年指未滿18歲之人(兒童<12歲、少年12~未滿18歲);醫事/教育/社工等人員執行業務知悉兒少遭受虐待、施用毒品、猥褻性交、被遺棄、其他傷害,應至遲24小時內向主管機關通報(責任通報);通報專線113(保護專線)、緊急110。處置:儘速隔離受虐者與施虐者、注意隱私、與兒童單獨會談(不與施虐者/父母同時)、提供保護與社會資源,不需自行確認施虐者。受虐徵象:多處不同癒合期瘀傷/骨折、與說法不符的傷、髒污異味、寒冬穿短袖、退縮或過度警覺。 受虐/疏忽常見徵象:身上多處(不同癒合期)瘀傷、與說法不符的傷、身體髒污發出異味(疏忽)、寒冬穿短袖(衣著不當/疏忽)、退縮、過度警覺、害怕碰觸。「表現活潑好動是正常兒童行為,非受虐徵象」。本題較不屬於者為B。","options":{"A":"是徵象。身上多處瘀傷痕跡。","B":"本題答案(非徵象)。活潑好動是正常行為。","C":"是徵象。身體髒污發出異味(疏忽)。","D":"是徵象。寒冬穿短袖(衣著不當/疏忽)。"},"sources":["兒少權益保障法","受虐徵象"]}},"110030-N4-41":{"quick":"知悉兒童遭受虐待或傷害,至遲不得超過「24小時」應通報。","detail":{"background":"兒童及少年福利與權益保障法:稱兒童及少年指未滿18歲之人(兒童<12歲、少年12~未滿18歲);醫事/教育/社工等人員執行業務知悉兒少遭受虐待、施用毒品、猥褻性交、被遺棄、其他傷害,應至遲24小時內向主管機關通報(責任通報);通報專線113(保護專線)、緊急110。處置:儘速隔離受虐者與施虐者、注意隱私、與兒童單獨會談(不與施虐者/父母同時)、提供保護與社會資源,不需自行確認施虐者。受虐徵象:多處不同癒合期瘀傷/骨折、與說法不符的傷、髒污異味、寒冬穿短袖、退縮或過度警覺。 依第53條,責任通報至遲不得超過24小時。本題為「24小時」(B)。","options":{"A":"12小時非法定上限(但愈早愈好)。","B":"正確。至遲不得超過24小時。","C":"36超過。","D":"48超過。"},"sources":["兒少權益保障法第53條","24小時"]}},"110110-N4-47":{"quick":"兒童虐待敘述中「與受虐兒談話時,需協助指認及責怪施虐者」為錯誤。","detail":{"background":"兒童及少年福利與權益保障法:稱兒童及少年指未滿18歲之人(兒童<12歲、少年12~未滿18歲);醫事/教育/社工等人員執行業務知悉兒少遭受虐待、施用毒品、猥褻性交、被遺棄、其他傷害,應至遲24小時內向主管機關通報(責任通報);通報專線113(保護專線)、緊急110。處置:儘速隔離受虐者與施虐者、注意隱私、與兒童單獨會談(不與施虐者/父母同時)、提供保護與社會資源,不需自行確認施虐者。受虐徵象:多處不同癒合期瘀傷/骨折、與說法不符的傷、髒污異味、寒冬穿短袖、退縮或過度警覺。 與受虐兒談話:應以不批判、支持的態度、單獨會談、注意隱私、保護兒童。「協助指認及責怪施虐者錯誤——不應引導兒童責怪施虐者(施虐者常是親人,責怪會增其罪惡與創傷),施虐者的認定由司法社政調查」。可撥110/113、1歲以下任何骨折須通報、施虐者多為熟識者皆正確。本題「錯誤」者為C。","options":{"A":"正確。可撥打110或113專線。","B":"正確。1歲以下嬰兒任何骨折都須通報。","C":"錯誤(本題答案)。不應協助兒童責怪施虐者。","D":"正確。施虐者多為受虐兒熟識的身邊人。"},"sources":["兒少權益保障法","會談"]}},"111030-N4-41":{"quick":"兒少權益保障法敘述中「主要保護20歲以下之兒童及青少年」為錯誤。","detail":{"background":"兒童及少年福利與權益保障法:稱兒童及少年指未滿18歲之人(兒童<12歲、少年12~未滿18歲);醫事/教育/社工等人員執行業務知悉兒少遭受虐待、施用毒品、猥褻性交、被遺棄、其他傷害,應至遲24小時內向主管機關通報(責任通報);通報專線113(保護專線)、緊急110。處置:儘速隔離受虐者與施虐者、注意隱私、與兒童單獨會談(不與施虐者/父母同時)、提供保護與社會資源,不需自行確認施虐者。受虐徵象:多處不同癒合期瘀傷/骨折、與說法不符的傷、髒污異味、寒冬穿短袖、退縮或過度警覺。 兒少權益保障法保護未滿18歲之兒童及少年(非20歲)。其餘正確:知悉施用毒品24小時內通報、任何人不得對兒少遺棄/身心虐待/猥褻/性交、孕婦不得吸菸酗酒嚼檳榔施用毒品(保護胎兒)。本題「錯誤」者為「保護20歲以下」(B,應為未滿18歲)。","options":{"A":"正確。知悉施用毒品應24小時內通報。","B":"錯誤(本題答案)。保護未滿18歲,非20歲以下。","C":"正確。任何人不得對兒少遺棄、虐待、猥褻、性交。","D":"正確。孕婦不得吸菸酗酒嚼檳榔施用毒品。"},"sources":["兒少權益保障法","18歲"]}},"111030-N4-44":{"quick":"新生兒搖晃症候群(Shaken Baby Syndrome)敘述中「因外力劇烈晃動所造成,是一種可逆的傷害」為錯誤。","detail":{"background":"搖晃症候群(Shaken Baby Syndrome):因劇烈搖晃嬰兒致腦部硬腦膜下出血、視網膜出血、瀰漫性軸突損傷,屬兒童虐待須通報;造成的腦損傷多不可逆(可致死亡、智能障礙、癲癇、失明、腦性麻痺)。初期可有嗜睡或煩躁;抱嬰兒應支撐頭頸、勿搖晃。「是可逆的傷害錯誤(多不可逆)」。本題「錯誤」者為B。","options":{"A":"正確。屬兒童虐待表現之一,須通報。","B":"錯誤(本題答案)。腦損傷多不可逆,非可逆。","C":"正確。初期會有嗜睡或煩躁不安。","D":"正確。抱新生兒時應給頭頸部適當支撐。"},"sources":["Nelson《兒科學》搖晃症候群","不可逆"]}},"114030-N4-27":{"quick":"兒童遭受虐待的護理處置中「受虐者須與父母一起接受問診確認過程,不能分開會談」為錯誤。","detail":{"background":"兒童及少年福利與權益保障法:稱兒童及少年指未滿18歲之人(兒童<12歲、少年12~未滿18歲);醫事/教育/社工等人員執行業務知悉兒少遭受虐待、施用毒品、猥褻性交、被遺棄、其他傷害,應至遲24小時內向主管機關通報(責任通報);通報專線113(保護專線)、緊急110。處置:儘速隔離受虐者與施虐者、注意隱私、與兒童單獨會談(不與施虐者/父母同時)、提供保護與社會資源,不需自行確認施虐者。受虐徵象:多處不同癒合期瘀傷/骨折、與說法不符的傷、髒污異味、寒冬穿短袖、退縮或過度警覺。 受虐兒護理處置:儘速隔離受虐與施虐者、注意隱私、得知缺乏支持與經濟壓力應提供社會資源。「須與父母一起問診、不能分開會談錯誤——應與兒童單獨(分開)會談(施虐者可能是父母,同場會使兒童不敢說、受影響)」。本題「錯誤」者為B。","options":{"A":"正確。儘速隔離受虐者與施虐者。","B":"錯誤(本題答案)。應與兒童單獨(分開)會談,非與父母一起。","C":"正確。注意受虐兒童隱私問題。","D":"正確。缺乏支持與經濟壓力應提供社會資源。"},"sources":["兒少權益保障法","單獨會談"]}},"102110-N4-45":{"quick":"最適合評估青少年疼痛的方式是「對疼痛的主訴(self-report)」。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 青少年(能以語言表達者)疼痛評估以主訴(self-report)為金標準(可用數字量表表達);哭泣、表情痛苦、臉譜量表是嬰幼兒/學齡前的行為觀察工具。本題最適合青少年者為「對疼痛的主訴」(D)。","options":{"A":"哭泣為嬰兒行為指標。","B":"臉譜量表適學齡前(3~7歲)。","C":"表情痛苦為行為觀察(較小兒童)。","D":"正確。青少年以主訴(self-report)為金標準。"},"sources":["Nelson《兒科學》疼痛評估","主訴"]}},"104100-N4-47":{"quick":"EMLA止痛藥正確的是「在疼痛性醫療處置前的1小時使用」。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 EMLA(eutectic mixture of local anesthetics,局部麻醉乳膏):塗於皮膚需約1小時才能滲透發揮表面麻醉作用,故侵入性處置(打針/抽血)前約1小時使用;是局部(非全身)麻醉、無成癮性。本題正確為「處置前1小時使用」(C)。","options":{"A":"錯。需約1小時起效,非10分鐘內。","B":"錯。EMLA是局部麻醉(非全身)。","C":"正確。侵入性處置前約1小時使用。","D":"錯。EMLA無成癮性。"},"sources":["Nelson《兒科學》EMLA","局部麻醉"]}},"105090-N4-67":{"quick":"癌症病童止痛劑使用原則中「不可併用不同類的止痛劑」為錯誤。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 癌症疼痛止痛原則:定時給藥維持無痛、口服優先、重度疼痛用嗎啡類皆正確;「不可併用不同類止痛劑錯誤——可合併不同作用機轉的止痛劑(如鴉片類+非鴉片類/輔助藥)以增效並減副作用(多模式鎮痛)」。本題「錯誤」者為D。","options":{"A":"正確。定時給藥維持無痛狀態。","B":"正確。給藥途徑以口服優先。","C":"正確。重度疼痛選嗎啡類。","D":"錯誤(本題答案)。可併用不同類止痛劑(多模式鎮痛)。"},"sources":["Nelson《兒科學》癌痛","多模式鎮痛"]}},"106110-N4-51":{"quick":"嬰幼兒疼痛評估不包括「意識程度」。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 嬰幼兒疼痛行為/生理評估指標:臉部表情、肢體動作(腿/活動)、哭聲、呼吸型態(生理)、心跳血壓變化、安撫度。「意識程度是神經學評估,非疼痛評估的指標」。本題不包括者為「意識程度」(D)。","options":{"A":"是。臉部表情。","B":"是。呼吸型態(生理指標)。","C":"是。肢體動作。","D":"本題答案(不包括)。意識程度非疼痛評估指標。"},"sources":["Nelson《兒科學》嬰幼兒疼痛","指標"]}},"107110-N4-66":{"quick":"3歲急性白血病病童疼痛評估正確的是「以哭泣到高興的臉譜量表,使其挑選代表自己疼痛的臉譜」。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 3歲(學齡前)兒童語言與抽象能力有限,最適臉譜量表(FACES,由哭到笑的臉)讓其挑選代表自己疼痛的臉。數字量表(0~10)、形容詞(刺痛鈍痛)、簡單描述量表需較高語言/抽象能力(學齡期以上),不適3歲。本題正確為「臉譜量表」(C)。","options":{"A":"數字量表需學齡期以上理解。","B":"形容詞選擇需較高語言能力。","C":"正確。3歲用臉譜量表挑選疼痛臉譜。","D":"簡單描述量表需較高語言能力。"},"sources":["Nelson《兒科學》疼痛評估","臉譜量表"]}},"108110-N4-71":{"quick":"兒癌病童疼痛評估及處置正確的是「可運用轉移注意力的方式(如看卡通),緩解疼痛」。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 (1)兒童沒主訴不代表沒疼痛(尤幼兒、害怕說出),須主動評估,故A錯;(2)止痛應定時給藥維持無痛,非等主訴痛才給(那會疼痛控制不佳),故B錯;(3)「可用轉移注意力(看卡通、遊戲)等非藥物方式緩解疼痛」——正確;(4)止痛給藥口服優先(非針劑優先),故D錯。本題正確為「轉移注意力緩解疼痛」(C)。","options":{"A":"錯。沒主訴不代表沒疼痛,須主動評估。","B":"錯。應定時給藥維持無痛,非等痛才給。","C":"正確。可用轉移注意力(看卡通)緩解疼痛。","D":"錯。止痛給藥口服優先,非針劑優先。"},"sources":["Nelson《兒科學》兒癌疼痛","非藥物"]}},"109030-N4-67":{"quick":"兒童疼痛敘述中「3~5歲的兒童尚無法以語言表達出疼痛的程度」為錯誤。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 (1)「3~5歲(學齡前)兒童已可以語言/臉譜表達疼痛程度(用FACES臉譜量表)」,故「無法以語言表達疼痛程度」錯誤;(2)可經觀察或量表評估疼痛——正確;(3)新生兒以全身活動(哭、扭動)反應疼痛——正確;(4)評估後依醫囑給止痛藥——正確。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。3~5歲已可用臉譜量表表達疼痛程度。","B":"正確。可經觀察或量表評估兒童疼痛。","C":"正確。新生兒以全身身體活動反應疼痛。","D":"正確。評估後可依醫囑給止痛藥。"},"sources":["Nelson《兒科學》疼痛","學齡前表達"]}},"110030-N4-52":{"quick":"意識不清的嬰幼兒疼痛評估,最適當的是「FLACC量表(Face, Legs, Activity, Cry & Consolability)」。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 意識不清/無法言語的嬰幼兒疼痛評估須用行為觀察量表,FLACC(臉、腿、活動、哭、安撫度)最適合(觀察行為即可評,不需病童自述)。籌碼片、臉譜、數字量表皆需病童自述/配合,不適意識不清者。本題最適當為「FLACC量表」(C)。","options":{"A":"籌碼片量表需病童自述。","B":"臉譜量表需病童挑選。","C":"正確。FLACC行為觀察量表適意識不清嬰幼兒。","D":"數字量表需病童自述。"},"sources":["Nelson《兒科學》FLACC","行為觀察"]}},"111030-N4-49":{"quick":"5歲蜂窩性組織炎兒童的「疼痛概念」發展最適當的是「認為吹吹痛痛的地方,疼痛就會像魔術般消失」。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 5歲(學齡前/運思前期)兒童魔法式思考、自我中心,對疼痛的概念是魔法式(如吹一吹/秀秀就會好)、無法理解疼痛的真正原因。本題5歲為「吹吹痛痛就會像魔術消失」(B);擔心截肢(較大兒童的身體完整擔憂)、正向應用生活經驗調適、說出病因(具體運思期以上)非學齡前。本題為B。","options":{"A":"擔心截肢屬較大兒童的身體完整擔憂。","B":"正確。5歲魔法式思考:吹吹就會像魔術般消失。","C":"正向應用生活經驗調適屬較大兒童。","D":"說出疼痛原因需具體運思期(學齡期以上)。"},"sources":["Nelson《兒科學》疼痛概念","學齡前"]}},"111110-N4-49":{"quick":"兒童疼痛處理中「Acetaminophen是一種非類固醇抗發炎藥物,適合輕度疼痛」最不適當(本題要選)。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 (1)鴉片類合併緩瀉劑預防便秘——正確;(2)讀故事書(分散注意)適6歲以上——正確;(3)EMLA局部麻醉、處置前1小時——正確;(4)「Acetaminophen(普拿疼)是解熱鎮痛劑,不是NSAID(非類固醇抗發炎藥)(其抗發炎作用很弱),歸類為NSAID錯誤」(雖適輕度疼痛但分類錯)。本題最不適當/錯誤者為D。","options":{"A":"適當。鴉片類合併緩瀉劑預防便秘。","B":"適當。讀故事書(分散注意)可用於6歲以上。","C":"適當。EMLA局部麻醉、處置前1小時使用。","D":"最不適當(本題答案)。Acetaminophen是解熱鎮痛劑,非NSAID。"},"sources":["藥理 Acetaminophen","非NSAID"]}},"111110-N4-52":{"quick":"評估疼痛的生理徵象中「尿量」與疼痛較無直接關係。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 疼痛引發交感神經興奮,生理徵象改變:心跳加快、呼吸加快、血壓上升、瞳孔放大、出汗。「尿量與疼痛無直接關係(尿量受體液、腎功能影響)」。本題與疼痛較無直接關係者為「尿量」(A)。","options":{"A":"本題答案。尿量與疼痛無直接關係。","B":"心跳加快與疼痛相關。","C":"呼吸加快與疼痛相關。","D":"瞳孔放大與疼痛相關。"},"sources":["Nelson《兒科學》疼痛生理","交感"]}},"111110-N4-58":{"quick":"9歲白血病復發疼痛的處置中「告訴安安不要焦慮、要放輕鬆,帶她去遊戲室轉移心情」較不適當。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 病況惡化、疼痛的兒童處置:以其可理解的語言了解其身心不適、完整評估疼痛(程度性質時間範圍)、協助舒適臥位、依醫囑給止痛藥並監測成效、非藥物輔助。「告訴不要焦慮、要放輕鬆+帶去遊戲室轉移較不適當——否定其情緒、且疼痛時應先評估與給止痛,非僅轉移」。本題較不適當者為A。","options":{"A":"較不適當(本題答案)。否定情緒、疼痛應先評估給藥,非僅轉移。","B":"適當。以可理解語言了解其身心不適。","C":"適當。評估疼痛程度、性質、時間、範圍。","D":"適當。舒適臥位、依醫囑給止痛藥並監測成效。"},"sources":["Nelson《兒科學》疼痛處置","評估給藥"]}},"112030-N4-52":{"quick":"FLACC疼痛量表敘述中「每項評估分數分為1與2二等級」為錯誤。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 FLACC量表:5向度Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,每項0、1、2三等級(總分0~10),可用於不會言語的嬰幼兒(約2個月~7歲)、分數越高越痛、雙腳持續踢動評為2分。「每項分1與2二等級錯誤——每項0~2三等級」。本題「錯誤」者為D。","options":{"A":"正確。可用來評估嬰兒(約2個月起,含4個月)。","B":"正確。分數越高表示越疼痛。","C":"正確。雙腳持續踢動評為2分。","D":"錯誤(本題答案)。每項為0、1、2三等級,非1與2二級。"},"sources":["Nelson《兒科學》FLACC","0-2分"]}},"114030-N4-32":{"quick":"「呼吸型態」不屬於FLACC行為疼痛評估量表的向度。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 FLACC五向度:F=Face(臉部表情)、L=Legs(腿)、A=Activity(活動力)、C=Cry(哭)、C=Consolability(安撫度)。「呼吸型態不是FLACC向度」(呼吸是其他生理指標)。本題不屬於者為「呼吸型態」(D)。","options":{"A":"是。臉部表情(Face)。","B":"是。活動力(Activity)。","C":"是。安撫(Consolability)。","D":"本題答案(非向度)。呼吸型態不是FLACC向度。"},"sources":["Nelson《兒科學》FLACC","向度"]}},"114170-N4-32":{"quick":"為2歲骨折手術換藥做疼痛評估,最適合的工具是「FLACC量表」(本題D應為FLACC;NIPS用於新生兒、VAS用於較大兒童)。","detail":{"background":"兒童疼痛評估依年齡選工具:新生兒/嬰兒(NIPS)、無法言語/意識不清/<3~4歲→行為觀察FLACC(Face臉、Legs腿、Activity活動、Cry哭、Consolability安撫度,5向度各0~2分)、3~7歲臉譜量表(FACES)、學齡可用撲克籌碼/數字量表、青少年/能言語者以主訴(self-report)為金標準。止痛原則:WHO三階梯、定時給藥(around the clock)維持無痛、口服優先、重度疼痛用鴉片類(嗎啡)、鴉片類須合併緩瀉劑防便秘(非腹瀉)、不因怕成癮而不足量、可合併不同類止痛藥與非藥物(轉移注意/冷熱敷)。EMLA為局部麻醉劑、侵入處置前約1小時塗抹。Acetaminophen屬非鴉片類解熱鎮痛劑(非NSAID),適輕度疼痛。 2歲幼兒無法用數字/視覺類比量表自述,換藥疼痛評估最適行為觀察量表FLACC(觀察臉腿活動哭安撫度);NIPS用於新生兒、VAS視覺類比量表需較大兒童理解、籌碼/數字量表需自述。本題2歲最適合為行為量表(本題選項D為FLACC)。","options":{"A":"NIPS用於新生兒,非2歲。","B":"VAS視覺類比量表需較大兒童理解。","C":"(其他自述量表)需語言能力。","D":"正確。2歲換藥用FLACC行為觀察量表最適合。"},"sources":["Nelson《兒科學》疼痛工具","2歲FLACC"]}},"101030-N4-43":{"quick":"預防高一玉珍自殺,「告訴玉珍好好唸書不要胡思亂想」不適當。","detail":{"background":"青少年自殺防治:對表達希望我死了等自殺意念者,應主動關懷、聆聽其想法、給予支持、陪伴不獨留、說服/協助尋求專業協助(輔導/精神醫療)。「告訴好好唸書不要胡思亂想不適當——否定其感受、輕忽自殺警訊」。本題不適當者為D。","options":{"A":"適當。請導師找玉珍聊聊、聆聽想法。","B":"適當。請導師關心、給予支持。","C":"適當。說服一起尋找專業協助。","D":"不適當(本題答案)。否定感受、輕忽自殺警訊。"},"sources":["Nelson/自殺防治","青少年"]}},"101030-N4-53":{"quick":"末期病童臨終最接近死亡的表徵是「呼吸逐漸由深變淺」。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 最接近死亡的表徵:呼吸由深變淺、變慢、不規則(陳施氏呼吸),終至停止。本題為「呼吸逐漸由深變淺」(A);尿量減少非增加、覺得冷但身體熱(末梢循環差,非最接近死亡)、睡眠時間變長非變短。本題為A。","options":{"A":"正確。呼吸由深變淺(漸停)為最接近死亡表徵。","B":"尿量應減少、非增加。","C":"末梢循環差是瀕死表現,但非最接近死亡。","D":"睡眠時間應變長,非變短。"},"sources":["Nelson《兒科學》瀕死","呼吸"]}},"101110-N4-13":{"quick":"維持癌症末期病童身體舒適與生活品質最首要的工作是「症狀控制」。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 末期照護維持舒適與生活品質最首要是症狀控制(尤疼痛、呼吸困難、噁心等),症狀緩解後才能進行溝通、滿足願望等。本題最首要為「症狀控制」(B)。","options":{"A":"溝通重要但非最首要(症狀緩解後才能談)。","B":"正確。症狀控制(尤疼痛)為維持舒適最首要。","C":"滿足願望在症狀控制之後。","D":"安排喪禮非維持舒適的工作。"},"sources":["Nelson《兒科學》安寧","症狀控制"]}},"101110-N4-14":{"quick":"末期病童疼痛控制正確的是「依循醫囑定時給予止痛藥,並視需要隨時加重劑量」。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 末期疼痛控制:定時(around the clock)給止痛藥維持無痛、視疼痛程度可隨需要加重劑量(無上限封頂,以止痛為目標)、口服優先。(2)不應因怕成癮而嚴格限制劑量(末期止痛成癮非考量),故B錯;(3)鴉片類常見便秘(非腹瀉),故C錯;(4)適當劑量鴉片不會加速死亡(雙效原則),故D錯。本題正確為「定時給藥、視需要加重劑量」(A)。","options":{"A":"正確。定時給止痛藥、視需要加重劑量。","B":"錯。末期止痛不因怕成癮而嚴格限制劑量。","C":"錯。鴉片類常見便秘,非腹瀉。","D":"錯。適當劑量鴉片不會加速死亡。"},"sources":["Nelson《兒科學》末期疼痛","定時給藥"]}},"102110-N4-54":{"quick":"末期病童分送物品給親友(知道自己將死)時,「鼓勵病童積極接受治療、不要放棄希望」不適當。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 學齡期以上末期病童自覺努力無法恢復、開始分送物品給親友,屬接受死亡、進行生命回顧與道別階段。護理應給予情感表達機會、鼓勵表達未完成心願、促進親子誠實溝通。「鼓勵積極接受治療、不要放棄希望不適當——病童已接受將死的事實,此時應協助其完成心願與道別,而非否定其感受、強推治療」。本題不適當者為D。","options":{"A":"適當。給予病童情感表達機會。","B":"適當。鼓勵病童表達需完成的心願。","C":"適當。促進親子溝通、誠實面對。","D":"不適當(本題答案)。病童已接受死亡,不應強推治療否定其感受。"},"sources":["Nelson《兒科學》末期","道別"]}},"103030-N4-54":{"quick":"面對剛喪子的父母,最適當是「接納父母親的情緒反應,靜靜的陪伴在父母親身邊」。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 喪子哀傷照護:接納父母的情緒反應、靜靜陪伴與共在、依其需求給予照護。本題最適當為「接納情緒、靜靜陪伴」(B);說「你應該欣慰孩子不會痛了」(否定/輕忽哀傷,A)、催促進行儀式(C)、趕快離開避免尷尬(D)皆不適當。本題為B。","options":{"A":"不適當。「你應該欣慰」否定/輕忽其哀傷。","B":"正確。接納情緒、靜靜陪伴在身邊。","C":"不適當。不應催促家屬趕快進行儀式。","D":"不適當。不應趕快離開現場。"},"sources":["Nelson《兒科學》哀傷","陪伴"]}},"103030-N4-55":{"quick":"瀕死兒童護理中「病童主述疼痛時,應給予非鴉片類止痛劑,以防呼吸抑制」為錯誤。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 瀕死護理:體力差時安排不費力活動、提供明亮環境增安全感、說話清楚減焦慮皆正確。「主述疼痛只給非鴉片類以防呼吸抑制錯誤——末期疼痛控制優先,重度疼痛該用鴉片類(嗎啡),不應因怕呼吸抑制而不給足量止痛(舒適優先、雙效原則)。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。末期重度疼痛該用鴉片類,不應因怕呼吸抑制而限用。","B":"正確。體力差時安排安靜不費力活動。","C":"正確。提供明亮環境增加安全感。","D":"正確。說話清楚、語調適當減少焦慮。"},"sources":["Nelson《兒科學》瀕死疼痛","鴉片類"]}},"103100-N4-47":{"quick":"4歲安安看到棺材中爺爺問「為什麼不動躺在那裡」,屬「死亡是暫時的」概念。","detail":{"background":"死亡概念(Nagy/皮亞傑):<3歲無概念僅對失落有反應;3~5歲(運思前期)死亡是暫時、可逆(如睡覺會醒);約5~9歲死亡擬人化(死神)、認為可躲避/被抓到才會死/只有老人才死,漸知不可逆;9歲後/形式運思理解死亡不可逆、普遍(每人都會死)、有生理原因、會探索靈性意義。 4歲(運思前期)兒童認為死亡是暫時、可逆、不理解死亡的永久性,故會問爺爺為什麼不動躺在那裡(以為只是暫時不動)。本題為「死亡是暫時的」(D)。","options":{"A":"「完全沒有概念」屬3歲以下。","B":"死亡擬人化屬約5~9歲。","C":"「無法避免」屬9歲後。","D":"正確。4歲認為死亡是暫時的。"},"sources":["Nelson/Nagy 死亡概念","4歲"]}},"103100-N4-48":{"quick":"10歲白血病末期明華擔心作業未完成,依艾瑞克森「符合現階段勤勉的發展任務」。","detail":{"background":"艾瑞克森:10歲屬學齡期(勤勉vs自卑),重視學業與完成任務。擔心作業未完成反映其符合勤勉的發展任務。本題為「符合現階段勤勉的發展任務」(D)。 補充:艾瑞克森學齡期(6~12歲)發展任務為勤勉vs自卑,兒童透過完成學業與工作建立成就感與能力感;末期病童仍掛念作業,顯示其勤勉發展任務持續運作,護理應協助其在能力範圍內維持與學校的連結、完成有意義的事以支持自尊。","options":{"A":"主動進取是學齡前期任務。","B":"自我認同是青少年期任務。","C":"「正常化」非艾瑞克森發展任務。","D":"正確。擔心作業=符合學齡期勤勉發展任務。"},"sources":["Nelson《兒科學》艾瑞克森","勤勉"]}},"105030-N4-51":{"quick":"4歲兒童對死亡概念正確的是「死亡被認為是短暫的分離,可以再活過來」。","detail":{"background":"死亡概念(Nagy/皮亞傑):<3歲無概念僅對失落有反應;3~5歲(運思前期)死亡是暫時、可逆(如睡覺會醒);約5~9歲死亡擬人化(死神)、認為可躲避/被抓到才會死/只有老人才死,漸知不可逆;9歲後/形式運思理解死亡不可逆、普遍(每人都會死)、有生理原因、會探索靈性意義。 4歲(運思前期)死亡概念:認為死亡是短暫的分離、可逆(可以再活過來)。本題為「短暫的分離、可再活過來」(B);無概念但對失落有反應(3歲以下)、遙遠不可逆(較大兒童)、死人擬人化躲過魔鬼(約5~9歲)。本題為B。","options":{"A":"「無概念但對失落有反應」屬3歲以下。","B":"正確。4歲認為死亡是短暫分離、可再活過來。","C":"「遙遠、不可逆」屬較大兒童。","D":"死亡擬人化(躲過魔鬼)約5~9歲。"},"sources":["Nelson/Nagy 死亡概念","4歲"]}},"105030-N4-53":{"quick":"末期病童臨終階段照護正確的是「維持皮膚清潔乾燥,以增進舒適」。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 臨終階段照護以舒適為主:維持皮膚清潔乾燥增進舒適、口腔護理、翻身減壓、症狀控制。(1)臨終不再勉強進食/積極補充營養,故A錯;(2)不再積極輸液維持血壓(避免增加負擔/水腫),故B錯;(3)不再持續抗生素(治療目標轉為舒適),故C錯。本題正確為「維持皮膚清潔乾燥增舒適」(D)。","options":{"A":"錯。臨終不勉強進食/積極補充營養。","B":"錯。不再積極輸液維持血壓。","C":"錯。不再持續給抗生素(轉為舒適照護)。","D":"正確。維持皮膚清潔乾燥以增進舒適。"},"sources":["Nelson《兒科學》臨終照護","舒適"]}},"106030-N4-55":{"quick":"依Nagy理論,「死亡是一種自然現象」不是6歲兒童對死亡的概念。","detail":{"background":"死亡概念(Nagy/皮亞傑):<3歲無概念僅對失落有反應;3~5歲(運思前期)死亡是暫時、可逆(如睡覺會醒);約5~9歲死亡擬人化(死神)、認為可躲避/被抓到才會死/只有老人才死,漸知不可逆;9歲後/形式運思理解死亡不可逆、普遍(每人都會死)、有生理原因、會探索靈性意義。 6歲(約5~9歲擬人化階段)兒童對死亡的概念:死亡可以避免、只有被抓到的人才會死、只有老人才會死(死亡擬人化、可躲避)。「死亡是一種自然現象(普遍、不可避免)是9歲後(成熟概念),不是6歲的概念」。本題不是6歲概念者為A。","options":{"A":"本題答案(非6歲概念)。「自然現象/普遍不可避免」屬9歲後。","B":"是6歲概念。死亡是可以避免的。","C":"是6歲概念。只有被抓到的人才會死。","D":"是6歲概念。只有老人才會死掉。"},"sources":["Nelson/Nagy 死亡概念","6歲"]}},"106110-N4-54":{"quick":"9歲淋巴癌末期骨轉移、髖部劇痛(8分)的疼痛措施,較適當的是「依醫囑靜脈注射Morphine,以枕頭支托右髖骨處」。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 末期重度疼痛(8分)且骨轉移:應給強效鴉片類(嗎啡Morphine,靜脈或口服)、以枕頭支托疼痛部位(減少壓迫、增舒適)。(A)Tinten冰敷、(B)Ibuprofen熱敷對重度癌痛不足;(C)Demerol肌肉注射+按摩骨轉移處(可能加劇骨痛/骨折)不當。本題較適當為「靜脈Morphine+枕頭支托」(D)。","options":{"A":"NSAID/冰敷對重度癌痛不足。","B":"Ibuprofen對8分骨痛不足。","C":"肌注Demerol+按摩骨轉移處不當(增骨痛)。","D":"正確。靜脈Morphine止重度癌痛+枕頭支托患處。"},"sources":["Nelson《兒科學》癌痛","嗎啡"]}},"107030-N4-65":{"quick":"病童死亡的護理措施正確的是「提供病童資訊時,避免使用醫學術語與家屬溝通」。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 病童死亡護理:(1)通知死亡應清楚據實(避免使用死亡字眼會造成混淆),故A錯;(2)沾血衣物不適合留作紀念(可清理後給遺物),故B錯;(3)「與家屬溝通避免醫學術語、用家屬能懂的語言」——正確;(4)應讓家屬與病童(遺體)接觸、道別(非避免接觸),故D錯。本題正確為C。","options":{"A":"錯。死亡通知應清楚據實,不避免「死亡」字眼。","B":"錯。沾血衣物不適合留作紀念。","C":"正確。與家屬溝通避免醫學術語、用易懂語言。","D":"錯。應讓家屬與病童接觸道別,非避免。"},"sources":["Nelson《兒科學》死亡護理","溝通"]}},"107110-N4-62":{"quick":"瀕死兒童呼吸由深變淺時,正確措施是「出現臨終嘎聲時可抬高頭部或採側臥」。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 瀕死呼吸由深變淺:(1)仍應依需要給止痛藥(舒適優先),不應避免止痛,故A錯;(2)「出現臨終嘎聲(death rattle,分泌物積聚)時可抬高頭部或側臥助引流」——正確;(3)環境宜柔和適當光線(非昏暗),故C(昏暗)非必要;(4)不需嚴格絕對臥床限制任何活動(依體力安排舒適活動),故D錯。本題正確為「臨終嘎聲抬高頭部或側臥」(B)。","options":{"A":"錯。瀕死仍應依需要給止痛(舒適優先)。","B":"正確。臨終嘎聲時抬高頭部或側臥助引流。","C":"昏暗環境非必要(宜柔和適當光線)。","D":"錯。不需嚴格限制任何活動。"},"sources":["Nelson《兒科學》瀕死","死亡嘎聲"]}},"108020-N4-66":{"quick":"兒童緩和安寧醫療中「孩童年齡滿7歲後,須給予簽署不施行心肺復甦術同意書」為錯誤。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 兒童安寧緩和:減輕末期痛苦、符合年齡需求的身心靈安適、視病童與家屬為整體、評估哀傷與靈性需求皆正確。「滿7歲後須由兒童本人簽署DNR(不施行CPR)同意書錯誤——未成年人無完全行為能力,DNR同意書由法定代理人(父母)簽署(可在病童能理解時與其充分溝通,但簽署者非7歲兒童)」。本題「錯誤」者為D。","options":{"A":"正確。減輕末期病童痛苦,施予緩解支持性照護。","B":"正確。免除痛苦、符合年齡需求的身心靈安適。","C":"正確。視病童及家屬為整體,評估哀傷與靈性。","D":"錯誤(本題答案)。DNR由法定代理人簽署,非滿7歲兒童本人簽。"},"sources":["安寧緩和醫療條例","DNR"]}},"109030-N4-65":{"quick":"兒童安寧緩和醫療中「兒童安寧緩和醫療不宜於兒童癌症診斷確立時即介入」為錯誤。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 兒童安寧緩和:DNR同意書簽署前建議與病童充分溝通、依年齡用繪本討論死亡、臨終依體力滿足心願皆正確。「安寧緩和不宜診斷確立時即介入錯誤——現代安寧緩和應早期(診斷時即可)介入,與積極治療並行(非等末期才介入),以全程支持病童與家庭」。本題「錯誤」者為D。","options":{"A":"正確。簽DNR前建議與病童充分溝通。","B":"正確。依年齡用繪本故事討論死亡概念。","C":"正確。臨終依體力滿足病童心願。","D":"錯誤(本題答案)。安寧緩和應早期(診斷時)即介入,與治療並行。"},"sources":["安寧緩和醫療","早期介入"]}},"109110-N4-55":{"quick":"2歲AML末期小琪瀕死照顧,「害怕失去病童,會積極治療」較不適當。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 瀕死病童照顧:開誠溝通表露關懷、症狀控制與維持舒適、尊重家庭宗教信仰皆適當。「因害怕失去病童而積極治療較不適當——末期應轉為舒適/安寧照護,過度積極治療增加病童痛苦,不符其最佳利益」。本題較不適當者為B。","options":{"A":"適當。開誠溝通、表露關懷。","B":"較不適當(本題答案)。末期應轉舒適照護,過度積極治療增痛苦。","C":"適當。症狀控制與維持舒適。","D":"適當。尊重家庭的宗教信仰與信念。"},"sources":["Nelson《兒科學》瀕死","舒適"]}},"110030-N4-58":{"quick":"協助學齡前手足面對病童瀕死,正確的是「以繪本或遊戲方式,引導病童手足講出其心中想法」。","detail":{"background":"死亡概念(Nagy/皮亞傑):<3歲無概念僅對失落有反應;3~5歲(運思前期)死亡是暫時、可逆(如睡覺會醒);約5~9歲死亡擬人化(死神)、認為可躲避/被抓到才會死/只有老人才死,漸知不可逆;9歲後/形式運思理解死亡不可逆、普遍(每人都會死)、有生理原因、會探索靈性意義。 協助學齡前手足面對病童瀕死:應以繪本/遊戲引導手足表達(講出)心中想法與感受、誠實適齡說明、容許其情緒(不糾正)、讓手足有機會與病童接觸/道別(非減少接觸)。本題正確為「以繪本或遊戲引導手足講出想法」(D);減少接觸(A)、不談死亡(B)、糾正行為問題(C)皆不適當。本題為D。","options":{"A":"不應減少手足與病童接觸。","B":"不應因概念模糊而不談死亡(應適齡引導)。","C":"手足出現行為問題應理解支持,非糾正。","D":"正確。以繪本/遊戲引導手足講出心中想法。"},"sources":["Nelson《兒科學》手足","哀傷"]}},"111030-N4-53":{"quick":"瀕死生命跡象中「快速且強而有勁的脈搏」最不適當。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 瀕死生命跡象:意識混亂/失去理智、失去大小便控制、呼吸型態改變(陳施氏/潮式呼吸)、脈搏慢、弱、不規則(非快而有勁)、血壓下降、四肢冰冷。「快速且強而有勁的脈搏最不適當——瀕死脈搏應慢而弱」。本題最不適當者為D。","options":{"A":"適當。失去理智、意識混亂。","B":"適當。失去大小便控制能力。","C":"適當。陳施氏(潮式)呼吸。","D":"最不適當(本題答案)。瀕死脈搏慢而弱,非快而有勁。"},"sources":["Nelson《兒科學》瀕死","脈搏"]}},"111030-N4-56":{"quick":"依Nagy理論,9歲兒童對死亡的概念是「生物體死亡後無法復活(不可逆)」。","detail":{"background":"死亡概念(Nagy/皮亞傑):<3歲無概念僅對失落有反應;3~5歲(運思前期)死亡是暫時、可逆(如睡覺會醒);約5~9歲死亡擬人化(死神)、認為可躲避/被抓到才會死/只有老人才死,漸知不可逆;9歲後/形式運思理解死亡不可逆、普遍(每人都會死)、有生理原因、會探索靈性意義。 9歲(約9歲後/具體運思晚期~形式運思)兒童理解死亡不可逆(生物體死後無法復活)、普遍。本題9歲為「生物體死亡後無法復活」(C);暫時(3~5歲)、只發生在老人(擬人化階段)、探索靈性意義(青少年)。本題為C。","options":{"A":"「死亡是暫時的」屬3~5歲。","B":"探索靈性意義屬青少年期。","C":"正確。9歲理解死亡不可逆(無法復活)。","D":"「只發生在老人」屬擬人化階段(5~9歲早期)。"},"sources":["Nelson/Nagy 死亡概念","9歲"]}},"112030-N4-51":{"quick":"9歲翔翔因妹妹癌末住院,「鼓勵他你已是大孩子要自己忍耐」較不適當。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 協助手足(9歲)面對病童瀕死:應安排適當時機探望妹妹、請學校老師提供關懷支持、將手足納入護理照護計畫(視為照護對象)、容許其表達情緒。「你已是大孩子,一切要自己忍耐較不適當——否定/壓抑其情緒,應鼓勵表達而非要其獨自忍耐」。本題較不適當者為B。","options":{"A":"適當。安排適當時機探望妹妹。","B":"較不適當(本題答案)。不應要其「自己忍耐」(應鼓勵表達)。","C":"適當。請學校老師提供關懷支持。","D":"適當。將翔翔納入護理照護計畫。"},"sources":["Nelson《兒科學》手足","情緒表達"]}},"112180-N4-34":{"quick":"瀕死兒童家庭照護中「提醒父母避免家中其他幼童參與喪禮過程」不適當。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 瀕死兒童家庭照護:接納父母哀傷、鼓勵表達、給正確資訊、評估靈性需求並支持皆適當。「避免家中其他幼童參與喪禮不適當——應讓手足/幼童依其發展參與喪禮與哀悼(有助理解死亡、完成哀傷),而非排除」。本題不適當者為C。","options":{"A":"適當。接納父母哀傷、鼓勵說出想法。","B":"適當。針對父母想獲得的資訊給正確資料。","C":"不適當(本題答案)。應讓幼童適齡參與喪禮,非避免。","D":"適當。評估父母與病童靈性需求並支持。"},"sources":["Nelson《兒科學》哀傷","手足參與"]}},"113100-N4-35":{"quick":"支持病童死亡家人哀傷,較適當的是「營造讓病童的家人有時間與其獨處」。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 哀傷支持:讓家人有時間與病童(遺體)獨處道別、接納並鼓勵表達情緒、讓手足適齡參與、了解哀傷可能持續較久(因人而異)。本題較適當為「讓家人有時間與其獨處」(C);避免手足探訪(A錯)、要家人勿表達感情(B錯)、強調悲傷通常不到一年(D錯,哀傷因人而異)。本題為C。","options":{"A":"錯。不應避免手足探訪(應適齡參與)。","B":"錯。不應要家人壓抑勿表達感情。","C":"正確。營造家人與病童獨處道別的時間。","D":"錯。哀傷持續時間因人而異,不應斷言不到一年。"},"sources":["Nelson《兒科學》哀傷","獨處道別"]}},"113180-N4-35":{"quick":"7歲小雄以為過世爺爺在睡覺、要找爺爺說話,談論死亡時「避免讓小雄參加喪禮」不適當。","detail":{"background":"死亡概念(Nagy/皮亞傑):<3歲無概念僅對失落有反應;3~5歲(運思前期)死亡是暫時、可逆(如睡覺會醒);約5~9歲死亡擬人化(死神)、認為可躲避/被抓到才會死/只有老人才死,漸知不可逆;9歲後/形式運思理解死亡不可逆、普遍(每人都會死)、有生理原因、會探索靈性意義。 7歲兒童(漸理解死亡)以為爺爺在睡覺(死亡概念尚未成熟),應鼓勵說出心裡的話與問題、正確據實描述死亡的狀態與事實(澄清死亡非睡覺)、用日常經驗/影片認識死亡、讓其適齡參與喪禮(有助理解與哀悼)。「避免讓小雄參加喪禮不適當。本題不適當者為C。","options":{"A":"適當。鼓勵小雄說出心裡的話與問題。","B":"適當。正確據實描述死亡的狀態與事實。","C":"不適當(本題答案)。應讓其適齡參加喪禮,非避免。","D":"適當。利用日常經驗或影片認識死亡。"},"sources":["Nelson/Nagy 死亡概念","喪禮"]}},"114100-N4-34":{"quick":"孩子剛死亡、父母哀傷哭泣,「轉移父母喪子的注意力」較不適當。","detail":{"background":"兒童末期/瀕死照護(安寧緩和):核心是症狀控制(尤疼痛)、維持舒適與生活品質、身心靈全人照護、視病童與家屬為一整體。瀕死生理變化:陳施氏(潮式)呼吸、四肢冰冷卻覺得熱、視力減退而聽覺最後消失、尿量漸減、心跳慢而弱(非快而有力)、失去大小便控制、意識混亂、臨終嘎聲(死亡嘎聲)可抬高頭部或側臥。臨終照護:以舒適為主(維持皮膚清潔乾燥),不再積極補充營養/輸液/抗生素(避免增加負擔)。哀傷照護:接納家屬情緒、靜靜陪伴共在、依需求給照護、勿用「不會痛了」等安慰、勿轉移注意、可讓家人與遺體獨處、鼓勵手足參與。 喪子當下哀傷照護:同理父母的傷痛、依父母需求給予照護、陪伴與共在(靜靜陪伴)。「轉移父母喪子的注意力較不適當——哀傷需被允許表達與經歷,轉移注意會壓抑/否定其哀傷,不利哀傷調適」。本題較不適當者為D。","options":{"A":"適當。同理父母的傷痛。","B":"適當。根據父母的需求給予照護。","C":"適當。陪伴與共在。","D":"較不適當(本題答案)。不應轉移其注意力(哀傷需被允許表達)。"},"sources":["Nelson《兒科學》哀傷","陪伴"]}},"101030-N4-55":{"quick":"慢性病正常化敘述中「促使病童突破疾病限制,達到如健康兒童一樣的體能標準」為錯誤。","detail":{"background":"慢性病正常化(normalization):協助慢性病兒童與家庭以常態眼光看待病童、維持其有價值的社會角色、儘量過接近正常的生活。原則:與病童共同計畫因應健康狀況、調整日常生活;父母以同樣家規與教養態度對待病童與手足(不過度保護、不放縱);提早告知疾病可能帶來的改變;聚焦病童的優點與能力建立自尊;納入家族為照護一份子;鼓勵與同儕外界互動(不社交隔離)。不是要求病童達到如健康兒童的體能標準(應依其能力)。慢性病定義:病程長、需長期管理、症狀干擾日常生活(一般指一年內逾3個月)、長期管理主要靠家庭/病童自我管理(非僅依賴專業人員)。 正常化是以常態眼光對待、維持有價值的社會角色、共同計畫因應、父母以同樣家規對待病童與手足。「促使病童突破疾病限制達健康兒童的體能標準錯誤——正常化非要求達到健康兒童的體能標準(應依其能力調整、接近正常生活即可,勉強達標反有害)」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。正常化非要求達健康兒童的體能標準(應依能力)。","B":"正確。以常態眼光對待,維持有價值的社會角色。","C":"正確。父母以同樣家規與教養態度對待病童與手足。","D":"正確。與病童一起計畫因應健康狀況、調整生活。"},"sources":["Nelson《兒科學》正常化","體能"]}},"104030-N4-54":{"quick":"面對身心障礙孩童雙親表現的不悅情緒,最適當溝通方式是「接受其情緒(acceptance)」。","detail":{"background":"面對身心障礙孩童雙親的負向情緒(憤怒、不悅):護理應接納/接受其情緒(acceptance)——理解這是面對孩子患病的正常反應,給予支持。本題最適當為「接受其情緒」(D);共同表示憤怒(reciprocal anger)、告知不需生氣(disapproval)、當沒看到(avoidance)皆不適當。本題為D。","options":{"A":"共同表示憤怒不適當。","B":"告知不需生氣是否定其情緒。","C":"當沒看到是迴避。","D":"正確。接受其情緒(acceptance)。"},"sources":["Nelson《兒科學》身心障礙","情緒接納"]}},"104100-N4-54":{"quick":"促進慢性病兒童正常化中「允許病童的生活作息與其他手足不同」為錯誤。","detail":{"background":"慢性病正常化(normalization):協助慢性病兒童與家庭以常態眼光看待病童、維持其有價值的社會角色、儘量過接近正常的生活。原則:與病童共同計畫因應健康狀況、調整日常生活;父母以同樣家規與教養態度對待病童與手足(不過度保護、不放縱);提早告知疾病可能帶來的改變;聚焦病童的優點與能力建立自尊;納入家族為照護一份子;鼓勵與同儕外界互動(不社交隔離)。不是要求病童達到如健康兒童的體能標準(應依其能力)。慢性病定義:病程長、需長期管理、症狀干擾日常生活(一般指一年內逾3個月)、長期管理主要靠家庭/病童自我管理(非僅依賴專業人員)。 促進正常化:提早告知疾病可能帶來的改變、納入家族為照護一份子、聚焦病童優點建立自尊皆正確。「允許病童的生活作息與其他手足不同錯誤——正常化強調以同樣家規與作息對待病童與手足(維持常態、不特殊化),允許不同會強化病童角色、不利正常化」。本題「錯誤」者為C。","options":{"A":"正確。提早告知疾病可能帶來的身體功能改變。","B":"正確。納入家族成員為照護計畫一份子。","C":"錯誤(本題答案)。應維持病童與手足相同作息(正常化),非允許不同。","D":"正確。協助病童聚焦優點與能力以建立自尊。"},"sources":["Nelson《兒科學》正常化","作息一致"]}},"105090-N4-52":{"quick":"協助病童的健康手足(姊姊榕榕)適應,最適當的是「安撫榕榕,鼓勵其隨時提問或參與病童的照護活動」。","detail":{"background":"慢性病兒童的健康手足照護:手足常有焦慮、被忽略、罪惡感、好奇,應主動關心、鼓勵其提問、表達感受、讓其適齡參與病童照護(增其控制感與接納)、給予資訊。本題最適當為「鼓勵其隨時提問或參與照護」(B);無須介入(A錯)、少到醫院(C錯)、要其自我照顧因爸媽要全力照顧病童(D錯,會增其被忽略感)。本題為B。","options":{"A":"錯。手足對疾病有困惑,應主動介入關心。","B":"正確。鼓勵手足提問或參與病童照護活動。","C":"錯。不應建議手足少到醫院探望。","D":"錯。不應讓手足覺得被忽略(爸媽全力照顧病童)。"},"sources":["Nelson《兒科學》手足","參與"]}},"110030-N4-67":{"quick":"血友病住院病童及家屬照顧,較適當的是「為提升病童自我照顧能力,應儘早提供居家照護知識」。","detail":{"background":"血友病(慢性病)照顧:血友病需長期居家管理(避免出血、出血處置、凝血因子注射),應儘早提供居家照護知識提升病童與家庭自我照顧能力。本題較適當為「儘早提供居家照護知識」(C);(A)支持父母的過度保護不當(應促正常化非過度保護);(B)減少健康手足至病房不當(應讓手足參與);(D)血友病應避免劇烈/碰撞性運動(防出血),鼓勵積極參加各類活動不當。本題為C。","options":{"A":"錯。不應支持父母對病童的過度保護。","B":"錯。不應減少健康手足至病房。","C":"正確。儘早提供居家照護知識,提升自我照顧能力。","D":"錯。血友病應避免碰撞性運動(防出血),非積極參加各類活動。"},"sources":["Nelson《兒科學》血友病","居家照護"]}},"110110-N4-54":{"quick":"妥瑞氏症(7歲)護理中「疾病會影響智能發展,宜提供特殊教育」為不適當。","detail":{"background":"妥瑞氏症(Tourette disorder):慢性動作及聲音tic(抽動)(如搖頭聳肩、發聲),不影響智能(智力正常)。護理:評估其對疾病的認知、給正向心理支持、教導放鬆減抽動疲倦、發掘潛能建立自信、衛教同儕師長理解。「疾病影響智能發展、宜提供特殊教育不適當——妥瑞症智力正常,不需特殊教育」。本題不適當者為A。","options":{"A":"不適當(本題答案)。妥瑞症智力正常,不影響智能,不需特殊教育。","B":"適當。評估認知程度、給正向心理支持。","C":"適當。教導放鬆減少因抽動導致的疲倦。","D":"適當。發掘潛能或專長建立自信心。"},"sources":["Nelson《兒科學》妥瑞症","智力正常"]}},"110110-N4-55":{"quick":"蠶豆症(G-6-PD,1歲半)兒童與家庭壓力反應護理,最不適當的是「應用聯合性遊戲溝通,以緩解其罪惡感」。","detail":{"background":"蠶豆症(G-6-PD缺乏):避免蠶豆、樟腦丸(萘)、特定藥物等氧化性物質誘發溶血。1歲半的壓力反應護理:減少與父母分離(防分離焦慮)、維持日常作息規範、用簡潔字句溝通皆適當。「應用聯合性遊戲溝通最不適當——聯合遊戲是學齡前(約5~6歲以上)的發展,1歲半幼兒遊戲為單獨/平行遊戲,無法進行聯合遊戲(發展未到)。本題最不適當者為A。","options":{"A":"最不適當(本題答案)。1歲半發展未到聯合遊戲(屬學齡前)。","B":"適當。減少與父母分離,避免分離焦慮。","C":"適當。維持日常生活作息與規範。","D":"適當。治療時使用簡潔字句與幼兒溝通。"},"sources":["Nelson《兒科學》G6PD","遊戲發展"]}},"111110-N4-56":{"quick":"2歲6個月慢性病一年的壓力反應,最適當的是「自主感的建立(受影響)」。","detail":{"background":"慢性病對兒童的壓力依發展階段:2歲6個月(幼兒期)發展任務為自主性(autonomy),反覆住院/治療限制其活動與自主,影響其自主感的建立。本題最適當為「自主感的建立」(B);身體心像改變(學齡期/青少年)、性別角色(學齡前後)、社交隔離(較大兒童)非2歲半的主要壓力反應。本題為B。","options":{"A":"身體心像改變屬學齡期/青少年。","B":"正確。2歲半發展自主感,住院限制影響自主感建立。","C":"性別角色建立非2歲半主要壓力。","D":"社交隔離困擾屬較大兒童。"},"sources":["Nelson《兒科學》慢性病壓力","自主感"]}},"111110-N4-57":{"quick":"5歲小華因3歲弟弟慢性病反覆住院,「小華的性別」較不是造成其壓力反應的風險因子。","detail":{"background":"病童手足的壓力風險因子:發病前手足/親子關係不良、父母情緒或行為大幅改變、害怕自己被送走/被忽略、年齡、對疾病的理解。「手足的性別較不是造成壓力反應的風險因子」(性別本身非主要決定因素)。本題較不是風險因子者為「小華的性別」(A)。","options":{"A":"本題答案(較不是風險因子)。手足性別非主要壓力因子。","B":"是風險因子。發病前與弟弟或父母關係不良。","C":"是風險因子。父母情緒或行為大幅改變。","D":"是風險因子。害怕被送到其他地方照顧。"},"sources":["Nelson《兒科學》手足壓力","風險因子"]}},"112030-N4-56":{"quick":"提供慢性病兒童家庭持續性全面照護中「為讓主要照顧者全面了解,應一次提供疾病照護的所有訊息」較不適當。","detail":{"background":"慢性病家庭持續性照護:對父母反應與潛在需求有敏感度、善用傾聽、用易懂語言、主動提供共享資訊(含社會資源)皆適當。「一次提供所有訊息較不適當——資訊應分次、循序提供(一次太多無法消化、增焦慮),依家庭吸收能力漸進衛教」。本題較不適當者為D。","options":{"A":"適當。對父母反應及潛在需求有敏感度。","B":"適當。善用傾聽、用易理解的語言提供訊息。","C":"適當。主動提供共享資訊,含社會資源。","D":"較不適當(本題答案)。應分次循序提供,非一次給所有訊息。"},"sources":["Nelson《兒科學》慢性病照護","循序衛教"]}},"112110-N4-53":{"quick":"慢性疾病兒童與家庭照護原則中「強調慢性疾病對病童的影響和限制,允許對其過度保護」不適當。","detail":{"background":"慢性病正常化(normalization):協助慢性病兒童與家庭以常態眼光看待病童、維持其有價值的社會角色、儘量過接近正常的生活。原則:與病童共同計畫因應健康狀況、調整日常生活;父母以同樣家規與教養態度對待病童與手足(不過度保護、不放縱);提早告知疾病可能帶來的改變;聚焦病童的優點與能力建立自尊;納入家族為照護一份子;鼓勵與同儕外界互動(不社交隔離)。不是要求病童達到如健康兒童的體能標準(應依其能力)。慢性病定義:病程長、需長期管理、症狀干擾日常生活(一般指一年內逾3個月)、長期管理主要靠家庭/病童自我管理(非僅依賴專業人員)。 慢性病照護原則:家庭發展融合疾病治療與生活正常化的策略、鼓勵病童參與治療照護決策、鼓勵與同儕外界互動皆適當。「強調疾病的影響與限制、允許過度保護不適當——正常化應聚焦能力非限制,過度保護有害(阻礙發展、增依賴)」。本題不適當者為B。","options":{"A":"適當。發展融合疾病治療與生活正常化的策略。","B":"不適當(本題答案)。不應強調限制、允許過度保護。","C":"適當。鼓勵病童參與治療及照護決策。","D":"適當。鼓勵與同儕或外界互動。"},"sources":["Nelson《兒科學》慢性病","正常化"]}},"102030-N4-48":{"quick":"「家庭成員社交情形」不屬於家系圖(genogram)評估內容。","detail":{"background":"以家庭為中心照護(family-centered care)核心:尊重家中每位成員的需求、家庭參與決策與照護、與家庭夥伴合作、賦權(empowerment)、彈性探視、提供資訊與資源、尊重文化(維持家庭文化常規一致性)。賦權(empowerment)定義:醫護與家庭互動中,讓家庭成員獲得自我控制感,進而增加其優勢、能力與行動去促進病童健康(非醫護單方決定)。家系圖/家庭樹(genogram/family tree):收集家庭成員健康狀況、性別、成員間關係(強弱)、世代結構;不含成員與朋友的社交關係。 家系圖(genogram)收集:家庭成員之關係、性別、健康狀況、世代結構。「家庭成員社交情形(與外界社交)不屬於家系圖內容」(家系圖呈現家庭內部結構與健康,非對外社交)。本題不屬於者為「社交情形」(D)。","options":{"A":"屬於。家庭成員之關係。","B":"屬於。家庭成員之性別。","C":"屬於。家庭成員健康狀況。","D":"本題答案(不屬於)。家庭成員社交情形非家系圖內容。"},"sources":["家庭評估 genogram","內容"]}},"102030-N4-52":{"quick":"以家庭為中心的慢性病兒童照護中「減少與外界互動,以加強家庭的凝聚力」不適當。","detail":{"background":"以家庭為中心照護(family-centered care)核心:尊重家中每位成員的需求、家庭參與決策與照護、與家庭夥伴合作、賦權(empowerment)、彈性探視、提供資訊與資源、尊重文化(維持家庭文化常規一致性)。賦權(empowerment)定義:醫護與家庭互動中,讓家庭成員獲得自我控制感,進而增加其優勢、能力與行動去促進病童健康(非醫護單方決定)。家系圖/家庭樹(genogram/family tree):收集家庭成員健康狀況、性別、成員間關係(強弱)、世代結構;不含成員與朋友的社交關係。 家庭中心照護:鼓勵病童與父母參與家庭決策、入院評估含家庭互動與資源、將疾病治療納入家庭常規。「減少與外界互動以加強凝聚力不適當——應鼓勵與外界/同儕互動(社會支持與正常化),減少互動會社交隔離」。本題不適當者為D。","options":{"A":"適當。鼓勵病童及父母參與家庭決策。","B":"適當。入院評估含家庭互動及可應用資源。","C":"適當。將疾病及治療措施納入家庭常規。","D":"不適當(本題答案)。不應減少與外界互動(避社交隔離)。"},"sources":["Nelson《兒科學》家庭中心","社會互動"]}},"103030-N4-53":{"quick":"兒童慢性病描述正確的是「以正常化的概念,提供慢性病兒童以家庭為中心的護理」。","detail":{"background":"慢性病正常化(normalization):協助慢性病兒童與家庭以常態眼光看待病童、維持其有價值的社會角色、儘量過接近正常的生活。原則:與病童共同計畫因應健康狀況、調整日常生活;父母以同樣家規與教養態度對待病童與手足(不過度保護、不放縱);提早告知疾病可能帶來的改變;聚焦病童的優點與能力建立自尊;納入家族為照護一份子;鼓勵與同儕外界互動(不社交隔離)。不是要求病童達到如健康兒童的體能標準(應依其能力)。慢性病定義:病程長、需長期管理、症狀干擾日常生活(一般指一年內逾3個月)、長期管理主要靠家庭/病童自我管理(非僅依賴專業人員)。 (1)慢性病不一定能治癒(特徵是長期、需長期管理,非「需很長時間才可治癒」),故A錯;(2)「以正常化概念,提供家庭為中心護理」——正確;(3)慢性病一般指一年內逾3個月受症狀干擾(非超過1個月),故C不精確;(4)長期管理主要靠家庭/病童自我管理(非僅依賴專業人員),故D錯。本題正確為B。","options":{"A":"錯。慢性病特徵是長期需管理,非「需很長時間才治癒」。","B":"正確。以正常化概念提供家庭中心護理。","C":"慢性病一般指一年內逾3個月干擾日常,非1個月。","D":"錯。長期管理主要靠家庭/自我管理,非僅依賴專業人員。"},"sources":["Nelson《兒科學》慢性病","正常化"]}},"103100-N4-42":{"quick":"家庭樹(family tree)需收集的資料是「①家庭成員健康狀態+③家庭成員性別」(即13)。","detail":{"background":"以家庭為中心照護(family-centered care)核心:尊重家中每位成員的需求、家庭參與決策與照護、與家庭夥伴合作、賦權(empowerment)、彈性探視、提供資訊與資源、尊重文化(維持家庭文化常規一致性)。賦權(empowerment)定義:醫護與家庭互動中,讓家庭成員獲得自我控制感,進而增加其優勢、能力與行動去促進病童健康(非醫護單方決定)。家系圖/家庭樹(genogram/family tree):收集家庭成員健康狀況、性別、成員間關係(強弱)、世代結構;不含成員與朋友的社交關係。 家庭樹/家系圖收集:①成員健康狀態、②成員間關係強弱、③成員性別、世代結構;④成員與朋友的關係不屬於家庭樹(對外社交非家庭樹內容)。本題答案組合應含①③(健康狀態+性別),故為「13」(B)。(②關係亦屬家系圖,但本題以選項組合13為答。)","options":{"A":"12含①健康③以外②關係,但本題答13。","B":"正確(官方)。①家庭成員健康狀態+③性別。","C":"24含④朋友關係(非家庭樹內容)。","D":"34含④朋友關係(非家庭樹內容)。"},"sources":["家庭評估 family tree","資料"]}},"104030-N4-52":{"quick":"照顧身心障礙兒童及家庭的概念中「保護兒童減少其與外界互動,以避免社會污名化」不適當。","detail":{"background":"以家庭為中心照護(family-centered care)核心:尊重家中每位成員的需求、家庭參與決策與照護、與家庭夥伴合作、賦權(empowerment)、彈性探視、提供資訊與資源、尊重文化(維持家庭文化常規一致性)。賦權(empowerment)定義:醫護與家庭互動中,讓家庭成員獲得自我控制感,進而增加其優勢、能力與行動去促進病童健康(非醫護單方決定)。家系圖/家庭樹(genogram/family tree):收集家庭成員健康狀況、性別、成員間關係(強弱)、世代結構;不含成員與朋友的社交關係。 身心障礙兒童照護:促進兒童發展自我覺醒完成發展任務、運用正常化理念對待兒童與家庭、運用賦權促進家庭參與照護皆適當。「減少與外界互動以避免污名化不適當——應促進社會融合與互動(隔離反增污名與社交障礙),正確做法是衛教社會、減少歧視,而非減少兒童的互動」。本題不適當者為D。","options":{"A":"適當。促進兒童發展自我覺醒,完成發展任務。","B":"適當。運用正常化理念對待兒童及家庭。","C":"適當。運用賦權促進家庭成員參與照護。","D":"不適當(本題答案)。不應減少與外界互動(避社交隔離與污名)。"},"sources":["Nelson《兒科學》身心障礙","社會融合"]}},"105030-N4-46":{"quick":"以家庭為中心照護正確的是「為增強照護能力,鼓勵父母或手足一起參與照護病童的計畫」。","detail":{"background":"以家庭為中心照護(family-centered care)核心:尊重家中每位成員的需求、家庭參與決策與照護、與家庭夥伴合作、賦權(empowerment)、彈性探視、提供資訊與資源、尊重文化(維持家庭文化常規一致性)。賦權(empowerment)定義:醫護與家庭互動中,讓家庭成員獲得自我控制感,進而增加其優勢、能力與行動去促進病童健康(非醫護單方決定)。家系圖/家庭樹(genogram/family tree):收集家庭成員健康狀況、性別、成員間關係(強弱)、世代結構;不含成員與朋友的社交關係。 (1)與家屬溝通病情應誠實、完整(非過濾訊息),故A錯;(2)應鼓勵手足探病/參與(非避免),故B錯;(3)家庭中心應彈性探視(非嚴格規定會客時間),故C錯;(4)「鼓勵父母或手足一起參與照護計畫(賦權、增能力)」——正確。本題正確為D。","options":{"A":"錯。溝通病情應誠實完整,非過濾訊息。","B":"錯。應鼓勵手足探病,非避免。","C":"錯。家庭中心應彈性探視,非嚴格規定會客時間。","D":"正確。鼓勵父母或手足一起參與照護計畫。"},"sources":["Nelson《兒科學》家庭中心","參與"]}},"106030-N4-43":{"quick":"以家庭為中心照護中「為賦權父母照顧能力,要求須在院執行病童的照護」為錯誤。","detail":{"background":"以家庭為中心照護(family-centered care)核心:尊重家中每位成員的需求、家庭參與決策與照護、與家庭夥伴合作、賦權(empowerment)、彈性探視、提供資訊與資源、尊重文化(維持家庭文化常規一致性)。賦權(empowerment)定義:醫護與家庭互動中,讓家庭成員獲得自我控制感,進而增加其優勢、能力與行動去促進病童健康(非醫護單方決定)。家系圖/家庭樹(genogram/family tree):收集家庭成員健康狀況、性別、成員間關係(強弱)、世代結構;不含成員與朋友的社交關係。 (1)鼓勵家庭表達對病童罹病的想法、(2)需要時評估家人不能參與照顧的原因、(3)教導父母共同參與照護知識技巧皆正確。「賦權父母要求須在院執行病童照護錯誤——賦權是增能、尊重家庭自主選擇參與程度,要求必須在院執行與賦權精神相違(變成強迫)」。本題「錯誤」者為D。","options":{"A":"正確。鼓勵家庭成員表達對病童罹病的想法。","B":"正確。需要時評估家人不能參與照顧的原因。","C":"正確。教導父母共同參與照護知識及技巧。","D":"錯誤(本題答案)。賦權是尊重家庭自主參與,非「要求」必須在院執行。"},"sources":["Nelson《兒科學》賦權","自主"]}},"109030-N4-55":{"quick":"3歲重積癲癇住加護病房,「由於治療複雜性,應避免父母參與治療計畫與決策」不是以家庭為中心的照護。","detail":{"background":"以家庭為中心照護(family-centered care)核心:尊重家中每位成員的需求、家庭參與決策與照護、與家庭夥伴合作、賦權(empowerment)、彈性探視、提供資訊與資源、尊重文化(維持家庭文化常規一致性)。賦權(empowerment)定義:醫護與家庭互動中,讓家庭成員獲得自我控制感,進而增加其優勢、能力與行動去促進病童健康(非醫護單方決定)。家系圖/家庭樹(genogram/family tree):收集家庭成員健康狀況、性別、成員間關係(強弱)、世代結構;不含成員與朋友的社交關係。 家庭中心照護:評估個別需求、提供彈性探訪、讓父母參與侵入性治療/檢查過程(在其意願下)、隨時與父母分享資訊(含科學新知)皆是。「因治療複雜避免父母參與治療計畫與決策不是家庭中心照護——家庭中心強調家庭參與決策,複雜性不是排除家庭的理由」。本題不是家庭中心照護者為C。","options":{"A":"是。評估個別需求、提供彈性探訪。","B":"是。父母有意願時讓其參與侵入性治療過程。","C":"本題答案(不是)。不應因治療複雜而排除父母參與決策。","D":"是。隨時與父母分享資訊(含科學新知)。"},"sources":["Nelson《兒科學》家庭中心","決策"]}},"110030-N4-1":{"quick":"以家庭為中心照護正確的是「家中每位成員的需求皆需要被注意及尊重」。","detail":{"background":"以家庭為中心照護(family-centered care)核心:尊重家中每位成員的需求、家庭參與決策與照護、與家庭夥伴合作、賦權(empowerment)、彈性探視、提供資訊與資源、尊重文化(維持家庭文化常規一致性)。賦權(empowerment)定義:醫護與家庭互動中,讓家庭成員獲得自我控制感,進而增加其優勢、能力與行動去促進病童健康(非醫護單方決定)。家系圖/家庭樹(genogram/family tree):收集家庭成員健康狀況、性別、成員間關係(強弱)、世代結構;不含成員與朋友的社交關係。 (1)「家中每位成員的需求都需被注意與尊重」——正確;(2)可讓多元家庭成員(不限準父親)參與/陪產,故B錯;(3)照護不只考量婦女,還要顧及整個家庭,故C錯;(4)婚姻品質與婦女的支持系統有關,故D錯。本題正確為「家中每位成員需求皆需被注意尊重」(A)。","options":{"A":"正確。家中每位成員的需求皆需被注意及尊重。","B":"錯。不限只能準父親陪產。","C":"錯。照護需顧及整個家庭,非只婦女。","D":"錯。婚姻品質與婦女的支持系統有關。"},"sources":["Nelson《兒科學》家庭中心","成員"]}},"110030-N4-55":{"quick":"重度海洋性貧血(印尼裔回教徒新住民)以家庭為中心的護理,最適當是「住院期間儘量與家庭的文化習慣和常規保有一致性」。","detail":{"background":"以家庭為中心照護(family-centered care)核心:尊重家中每位成員的需求、家庭參與決策與照護、與家庭夥伴合作、賦權(empowerment)、彈性探視、提供資訊與資源、尊重文化(維持家庭文化常規一致性)。賦權(empowerment)定義:醫護與家庭互動中,讓家庭成員獲得自我控制感,進而增加其優勢、能力與行動去促進病童健康(非醫護單方決定)。家系圖/家庭樹(genogram/family tree):收集家庭成員健康狀況、性別、成員間關係(強弱)、世代結構;不含成員與朋友的社交關係。 文化取向(文化敏感)的家庭中心照護:尊重並儘量配合家庭的文化習慣與常規(在不影響醫療安全下保有一致性)、提供專業翻譯(非由家屬充當)。本題最適當為「住院期間儘量與家庭文化習慣常規保有一致性」(C);以台灣本土文化為主(A錯)、完全配合所有文化(B過度)、請母親找家人翻譯(D應用專業翻譯)。本題為C。","options":{"A":"錯。不應以台灣本土文化為主(應尊重其文化)。","B":"過度。「完全配合」所有文化不切實際(需兼顧醫療安全)。","C":"正確。儘量與家庭文化習慣常規保有一致性。","D":"錯。應提供專業翻譯,非請母親找家人翻譯。"},"sources":["Nelson《兒科學》文化照護","一致性"]}},"111030-N4-46":{"quick":"「賦權(empowerment)」的正確定義是「醫療人員與家庭互動過程中,讓家庭成員獲得自我控制感,進而增加優勢、能力及行動」。","detail":{"background":"以家庭為中心照護(family-centered care)核心:尊重家中每位成員的需求、家庭參與決策與照護、與家庭夥伴合作、賦權(empowerment)、彈性探視、提供資訊與資源、尊重文化(維持家庭文化常規一致性)。賦權(empowerment)定義:醫護與家庭互動中,讓家庭成員獲得自我控制感,進而增加其優勢、能力與行動去促進病童健康(非醫護單方決定)。家系圖/家庭樹(genogram/family tree):收集家庭成員健康狀況、性別、成員間關係(強弱)、世代結構;不含成員與朋友的社交關係。 賦權(empowerment):醫護與家庭互動中,讓家庭成員獲得自我控制感,進而增加其優勢、能力與行動去促進病童健康。本題正確為B;(A)是家庭中心互惠利益的概念(非賦權定義)、(C)是倡議者角色、(D)是輔助溝通科技。本題為B。","options":{"A":"此為相互利益概念,非賦權定義。","B":"正確。讓家庭獲自我控制感,增其優勢、能力與行動。","C":"此為兒童發言人(倡議者)角色。","D":"此為輔助溝通科技,非賦權。"},"sources":["Nelson《兒科學》賦權","定義"]}},"112030-N4-42":{"quick":"以家庭為中心照護應用於加護病房,正確的是「鼓勵並支持病童父母或手足有機會時參與共同照顧」。","detail":{"background":"以家庭為中心照護(family-centered care)核心:尊重家中每位成員的需求、家庭參與決策與照護、與家庭夥伴合作、賦權(empowerment)、彈性探視、提供資訊與資源、尊重文化(維持家庭文化常規一致性)。賦權(empowerment)定義:醫護與家庭互動中,讓家庭成員獲得自我控制感,進而增加其優勢、能力與行動去促進病童健康(非醫護單方決定)。家系圖/家庭樹(genogram/family tree):收集家庭成員健康狀況、性別、成員間關係(強弱)、世代結構;不含成員與朋友的社交關係。 加護病房的家庭中心照護:鼓勵父母/手足有機會時參與共同照顧、彈性探視、與父母及能理解的兒童共同溝通。本題正確為A;嚴格規定會客時間(B錯)、避免家人探視(C錯)、只以父母為溝通對象(兒童青少年也應參與,D錯)。本題為A。","options":{"A":"正確。鼓勵父母或手足有機會時參與共同照顧。","B":"錯。應彈性探視,非嚴格規定會客時間。","C":"錯。不應避免家人探視。","D":"錯。兒童青少年也應參與溝通,非只以父母為對象。"},"sources":["Nelson《兒科學》加護病房","家庭中心"]}},"112180-N4-28":{"quick":"賦權在兒科護理的應用中「強調醫護人員有權利決定病童照護的選擇」為錯誤。","detail":{"background":"以家庭為中心照護(family-centered care)核心:尊重家中每位成員的需求、家庭參與決策與照護、與家庭夥伴合作、賦權(empowerment)、彈性探視、提供資訊與資源、尊重文化(維持家庭文化常規一致性)。賦權(empowerment)定義:醫護與家庭互動中,讓家庭成員獲得自我控制感,進而增加其優勢、能力與行動去促進病童健康(非醫護單方決定)。家系圖/家庭樹(genogram/family tree):收集家庭成員健康狀況、性別、成員間關係(強弱)、世代結構;不含成員與朋友的社交關係。 賦權(empowerment):強調病童及家人有能力與行動促進健康、家人有權利與能力決定家庭成員的健康需求、建立醫護與家庭的夥伴關係協同照護。「強調醫護人員有權利決定病童照護選擇錯誤——賦權是讓家庭自主決定,非醫護單方決定」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。賦權是家庭自主決定,非醫護有權決定照護選擇。","B":"正確。強調病童及家人有能力與行動促進健康。","C":"正確。建立醫護與家人的夥伴關係協同照護。","D":"正確。家人有權利與能力決定家庭成員的健康需求。"},"sources":["Nelson《兒科學》賦權","自主決定"]}},"102110-N4-48":{"quick":"10歲腎病症候群住院,「表現退化性行為」較不會出現。","detail":{"background":"住院反應依發展階段:10歲(學齡期)兒童認知較成熟,常見覺得住院無聊(在意活動與課業)、表現勇敢(在意自我形象)、擔心會不會死(對疾病有概念)。「退化性行為多見於幼兒/學齡前(較小兒童),學齡期較不會出現明顯退化」。本題較不會出現者為「退化性行為」(B)。","options":{"A":"會。10歲會覺得住院很無聊。","B":"本題答案(較不會)。退化行為多見於較小兒童。","C":"會。學齡期會表現勇敢。","D":"會。對疾病有概念,會問會不會死。"},"sources":["Nelson《兒科學》住院反應","學齡期"]}},"103100-N4-55":{"quick":"4歲已完成如廁訓練、因住院常把大便解在尿片上,屬「退行性行為」。","detail":{"background":"分離焦慮(separation anxiety,尤6個月~3歲幼兒住院最主要壓力)三期:抗議期(protest)——大哭大鬧、尖叫、拒絕安撫、攻擊行為、不斷要找父母;絕望期/失望期(despair)——安靜、沉默、退縮、對環境不感興趣、退化;去依戀期/否認期(detachment)——表面適應、對父母疏離冷漠(看似恢復實為情感隔離)。住院反應依年齡:幼兒分離焦慮、學齡前誤解為懲罰、學齡期擔心身體與課業;退化(退行)行為(如已會如廁卻尿床、要奶嘴)是常見因應。 4歲已完成大小便訓練,因住院壓力而退回較早期行為(把大便解在尿片上),即退行(退化)性行為。本題為「退行性行為」(C)。","options":{"A":"儀式化行為非此情境。","B":"不合作行為非此情境。","C":"正確。已會如廁卻解在尿片=退行性行為。","D":"自卑性行為非此情境。"},"sources":["Nelson《兒科學》住院反應","退化"]}},"103100-N4-65":{"quick":"5歲疑細菌性支氣管炎血液氣體分析中「pH=7.30、PaO2=85、PaCO2=50判斷為正常範圍」為錯誤。","detail":{"background":"動脈血液氣體(ABG)正常值:pH 7.35~7.45、PaO2 80~100、PaCO2 35~45、HCO3 22~26。本題數值pH 7.30(<7.35酸血症)、PaCO2 50(>45高碳酸)→呼吸性酸中毒(非正常),故「判斷為正常範圍」錯誤。其餘:ABG是肺功能/氣體交換指標、採血後與肝素混合(抗凝)、置於碎冰減代謝皆正確。本題「錯誤」者為D。","options":{"A":"正確。ABG可了解肺部氣體交換情形。","B":"正確。動脈血需與空針內肝素混合(抗凝)。","C":"正確。空針置碎冰減少血中物質代謝。","D":"錯誤(本題答案)。pH7.30+PaCO2 50為呼吸性酸中毒,非正常。"},"sources":["ABG 判讀","呼吸性酸中毒"]}},"104100-N4-45":{"quick":"4歲住院分離焦慮最常見的行為反應是「生氣、打人、拒絕合作」。","detail":{"background":"分離焦慮(separation anxiety,尤6個月~3歲幼兒住院最主要壓力)三期:抗議期(protest)——大哭大鬧、尖叫、拒絕安撫、攻擊行為、不斷要找父母;絕望期/失望期(despair)——安靜、沉默、退縮、對環境不感興趣、退化;去依戀期/否認期(detachment)——表面適應、對父母疏離冷漠(看似恢復實為情感隔離)。住院反應依年齡:幼兒分離焦慮、學齡前誤解為懲罰、學齡期擔心身體與課業;退化(退行)行為(如已會如廁卻尿床、要奶嘴)是常見因應。 4歲(幼兒/學齡前)分離焦慮最常見抗議期表現——生氣、打人、哭鬧、拒絕合作、找父母。本題最常見為「生氣、打人、拒絕合作」(A);自認長大要勇敢(學齡期)、擔心身體改變/課業(較大兒童)非4歲最常見。本題為A。","options":{"A":"正確。生氣、打人、拒絕合作(抗議期表現)。","B":"自認要勇敢屬學齡期。","C":"擔心身體改變屬較大兒童。","D":"擔心課業屬學齡期。"},"sources":["Nelson《兒科學》分離焦慮","抗議期"]}},"104100-N4-48":{"quick":"「分析早期經驗對病童的影響」不是治療性遊戲的目的。","detail":{"background":"治療性遊戲(therapeutic play)目的:宣洩情緒、提供治療相關訊息、了解病童感受、減輕住院壓力、增進控制感(非分析早期經驗對病童的影響,那是心理治療)。類型:情緒宣洩性遊戲(如敲打、戳黏土、丟沙包宣洩負向情緒)、指導性遊戲(以圖片故事解說檢查流程、澄清錯誤觀念、認識身體疾病)、戲劇性/角色扮演遊戲(布偶扮演表達感受)、生理健康促進性遊戲。遊戲須依發展階段選擇。 治療性遊戲目的:宣洩情緒、提供治療相關訊息、了解病童感受。「分析早期經驗對病童的影響不是治療性遊戲目的(那屬精神分析/心理治療)」。本題不是目的者為D。","options":{"A":"是目的。宣洩情緒。","B":"是目的。提供治療相關訊息。","C":"是目的。了解病童的感受。","D":"本題答案(非目的)。分析早期經驗屬心理治療,非治療性遊戲。"},"sources":["Nelson《兒科學》治療性遊戲","目的"]}},"108020-N4-60":{"quick":"8個月支氣管炎嬰兒口服給藥正確的是「用拇指壓其下顎(下巴),以便張口」。","detail":{"background":"嬰兒(8個月)口服給藥:抱起或半坐臥(非躺臥,防嗆),故A錯;以拇指輕壓下顎(下巴)使其張口——正確;藥沿頰側(口角內側)緩慢滴入(非口腔中間、非快速),故C、D錯。本題正確為「拇指壓下顎使張口」(B)。","options":{"A":"錯。應抱起/半坐臥,非躺臥餵藥(防嗆)。","B":"正確。拇指輕壓下顎(下巴)使張口。","C":"錯。藥應沿頰側滴入,非口腔中間。","D":"錯。應緩慢沿頰側滴入,非快速(快速易嗆吐)。"},"sources":["Nelson《兒科學》嬰兒口服給藥","下顎"]}},"109030-N4-44":{"quick":"醫院運用治療性遊戲的敘述中「透過遊戲以了解兒童內心想法,以治療其心理或行為疾病」為錯誤。","detail":{"background":"治療性遊戲(therapeutic play)目的:宣洩情緒、提供治療相關訊息、了解病童感受、減輕住院壓力、增進控制感(非分析早期經驗對病童的影響,那是心理治療)。類型:情緒宣洩性遊戲(如敲打、戳黏土、丟沙包宣洩負向情緒)、指導性遊戲(以圖片故事解說檢查流程、澄清錯誤觀念、認識身體疾病)、戲劇性/角色扮演遊戲(布偶扮演表達感受)、生理健康促進性遊戲。遊戲須依發展階段選擇。 治療性遊戲:作為溝通橋樑了解住院行為反應、具指導性質協助認識身體/疾病、藉角色扮演達學習與情緒表達。「以遊戲治療心理或行為疾病錯誤——治療性遊戲≠遊戲治療(play therapy);治療性遊戲目的是減壓、表達、衛教,非治療心理疾病(那是專業心理治療)。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。治療性遊戲非用以治療心理/行為疾病。","B":"正確。作為溝通橋樑、了解住院行為反應。","C":"正確。具指導性質,協助認識身體或疾病。","D":"正確。藉角色扮演達學習與情緒表達功能。"},"sources":["Nelson《兒科學》治療性遊戲","非心理治療"]}},"109030-N4-45":{"quick":"8歲敗血病住加護病房,很在意父母是否準時探視、不斷問探病時間,屬「分離焦慮」。","detail":{"background":"分離焦慮(separation anxiety,尤6個月~3歲幼兒住院最主要壓力)三期:抗議期(protest)——大哭大鬧、尖叫、拒絕安撫、攻擊行為、不斷要找父母;絕望期/失望期(despair)——安靜、沉默、退縮、對環境不感興趣、退化;去依戀期/否認期(detachment)——表面適應、對父母疏離冷漠(看似恢復實為情感隔離)。住院反應依年齡:幼兒分離焦慮、學齡前誤解為懲罰、學齡期擔心身體與課業;退化(退行)行為(如已會如廁卻尿床、要奶嘴)是常見因應。 住院兒童在意父母是否準時探視、不斷詢問探病時間,反映其因與父母分離而焦慮(分離焦慮)(即使8歲學齡期,加護病房隔離仍會引發分離焦慮)。本題為「分離焦慮」(C);認識時間概念、自我中心、身體心像非此行為核心。本題為C。","options":{"A":"非僅認識時間概念。","B":"自我中心非此行為核心。","C":"正確。在意父母探視=分離焦慮。","D":"在意身體心像非此行為。"},"sources":["Nelson《兒科學》分離焦慮","加護病房"]}},"110030-N4-42":{"quick":"3歲急性腸胃炎住院,顯示處於分離焦慮抗議期的行為是「持續性哭叫」。","detail":{"background":"分離焦慮(separation anxiety,尤6個月~3歲幼兒住院最主要壓力)三期:抗議期(protest)——大哭大鬧、尖叫、拒絕安撫、攻擊行為、不斷要找父母;絕望期/失望期(despair)——安靜、沉默、退縮、對環境不感興趣、退化;去依戀期/否認期(detachment)——表面適應、對父母疏離冷漠(看似恢復實為情感隔離)。住院反應依年齡:幼兒分離焦慮、學齡前誤解為懲罰、學齡期擔心身體與課業;退化(退行)行為(如已會如廁卻尿床、要奶嘴)是常見因應。 分離焦慮抗議期(protest):持續性哭叫、尖叫、拒絕安撫、攻擊、不斷找父母。本題抗議期為「持續性哭叫」(A);吸手指、白天尿床、吃奶嘴屬退化行為(可能見於絕望期),非抗議期的代表。本題為A。","options":{"A":"正確。持續性哭叫為抗議期表現。","B":"吸手指屬退化行為(非抗議期代表)。","C":"白天尿床屬退化行為。","D":"吃奶嘴屬退化行為。"},"sources":["Nelson《兒科學》分離焦慮","抗議期"]}},"111030-N4-60":{"quick":"以腦波檢查圖片及故事解說流程、澄清錯誤觀念,屬「指導性遊戲」。","detail":{"background":"治療性遊戲(therapeutic play)目的:宣洩情緒、提供治療相關訊息、了解病童感受、減輕住院壓力、增進控制感(非分析早期經驗對病童的影響,那是心理治療)。類型:情緒宣洩性遊戲(如敲打、戳黏土、丟沙包宣洩負向情緒)、指導性遊戲(以圖片故事解說檢查流程、澄清錯誤觀念、認識身體疾病)、戲劇性/角色扮演遊戲(布偶扮演表達感受)、生理健康促進性遊戲。遊戲須依發展階段選擇。 指導性遊戲(instructional/educational play):以圖片、故事、模型解說檢查/治療流程、澄清錯誤觀念、認識身體與疾病。本例用腦波檢查圖片故事解說流程並澄清錯誤觀念即指導性遊戲。本題為「指導性遊戲」(A);生理健康促進、情緒宣洩、戲劇性遊戲為其他類型。本題為A。","options":{"A":"正確。圖片故事解說流程、澄清錯誤觀念=指導性遊戲。","B":"生理健康促進性遊戲非此目的。","C":"情緒宣洩性遊戲是宣洩情緒。","D":"戲劇性遊戲是角色扮演。"},"sources":["Nelson《兒科學》治療性遊戲","指導性"]}},"111110-N4-47":{"quick":"8歲小玲因右手打點滴無法自己吃飯畫畫、不願打針吃藥,增進其「自我控制感」最適當是「讓小玲表達及討論可以參與治療的方式」。","detail":{"background":"學齡期(8歲)住院失去控制感:增進自我控制感應讓其表達、參與治療決策、給有限選擇(如自己決定先量哪隻手、何時吃藥)。本題最適當為「讓小玲表達及討論可參與治療的方式」(A);同學陪伴(社會支持但非增控制感)、聊卡通轉移(轉移注意非控制感)、照顧者陪伴(安全感非控制感)。本題為A。","options":{"A":"正確。讓小玲表達討論可參與治療的方式(增控制感)。","B":"同學陪伴是社會支持,非直接增控制感。","C":"聊卡通是轉移注意,非增控制感。","D":"照顧者陪伴提供安全感,非控制感。"},"sources":["Nelson《兒科學》學齡期","自我控制感"]}},"112030-N4-41":{"quick":"自閉症病童住院,最適當措施是「採一對一的照護,且避免過度視聽騷擾」。","detail":{"background":"自閉症病童住院:對感覺刺激敏感、需一致規律環境,應採一對一照護、減少過度視聽刺激/騷擾(環境簡化、降噪)、維持常規、事先告知改變。本題最適當為「一對一照護、避免過度視聽騷擾」(B);多溝通互動(自閉症溝通障礙,A不切)、制止固著行為(C不當)、不告知說明(自閉症需事先告知,D錯)。本題為B。","options":{"A":"自閉症溝通障礙,「多溝通互動」非最適當。","B":"正確。一對一照護、避免過度視聽騷擾。","C":"錯。不應強行制止固著行為。","D":"錯。自閉症需事先告知說明(減焦慮)。"},"sources":["Nelson《兒科學》自閉症","住院"]}},"112030-N4-49":{"quick":"3歲強強住加護病房一直哭著「走開,我要媽媽」,屬分離焦慮的「抗議期」。","detail":{"background":"分離焦慮(separation anxiety,尤6個月~3歲幼兒住院最主要壓力)三期:抗議期(protest)——大哭大鬧、尖叫、拒絕安撫、攻擊行為、不斷要找父母;絕望期/失望期(despair)——安靜、沉默、退縮、對環境不感興趣、退化;去依戀期/否認期(detachment)——表面適應、對父母疏離冷漠(看似恢復實為情感隔離)。住院反應依年齡:幼兒分離焦慮、學齡前誤解為懲罰、學齡期擔心身體與課業;退化(退行)行為(如已會如廁卻尿床、要奶嘴)是常見因應。 抗議期(protest):大哭、拒絕安撫(對護理師說走開)、不斷要找媽媽。本例一直哭著「走開,我要媽媽」即抗議期。本題為「抗議期」(D);失望期(安靜退縮)、去依戀期(疏離)、關係重建期非此表現。本題為D。","options":{"A":"失望期為安靜、退縮。","B":"去依戀期為對父母疏離冷漠。","C":"關係重建期非分離焦慮三期之一。","D":"正確。哭拒安撫、要媽媽=抗議期。"},"sources":["Nelson《兒科學》分離焦慮","抗議期"]}},"112110-N4-50":{"quick":"2歲住加護病房第二天哭喊要媽媽、拒絕安撫、攻擊行為,屬分離焦慮「抗議期」。","detail":{"background":"分離焦慮(separation anxiety,尤6個月~3歲幼兒住院最主要壓力)三期:抗議期(protest)——大哭大鬧、尖叫、拒絕安撫、攻擊行為、不斷要找父母;絕望期/失望期(despair)——安靜、沉默、退縮、對環境不感興趣、退化;去依戀期/否認期(detachment)——表面適應、對父母疏離冷漠(看似恢復實為情感隔離)。住院反應依年齡:幼兒分離焦慮、學齡前誤解為懲罰、學齡期擔心身體與課業;退化(退行)行為(如已會如廁卻尿床、要奶嘴)是常見因應。 抗議期(protest):哭喊找媽媽、拒絕(他人)安撫、出現身體攻擊行為。本例符合抗議期。本題為「抗議期」(A);否認期(疏離)、絕望期(安靜退縮)、關係重建期非此表現。本題為A。","options":{"A":"正確。哭喊要媽媽、拒安撫、攻擊=抗議期。","B":"否認期(去依戀)為疏離冷漠。","C":"絕望期為安靜退縮。","D":"關係重建期非分離焦慮三期。"},"sources":["Nelson《兒科學》分離焦慮","抗議期"]}},"112180-N4-29":{"quick":"腦膜炎醫囑Dexamethasone(10mg/2mL/vial)7mg Q8H,每次應抽「1.4」mL。","detail":{"background":"劑量計算:抽取量(mL)=醫囑劑量÷藥物濃度。濃度=10mg/2mL=5mg/mL;欲給7mg→7mg÷5mg/mL=1.4 mL。本題每次抽「1.4」mL(B)。 補充:兒童用藥劑量精準至關重要,給藥前須三讀五對、依體重計算;抽取量=醫囑劑量÷藥物濃度(濃度=瓶內總量mg÷總體積mL);Dexamethasone為類固醇,長期使用注意感染、血糖、生長抑制等副作用。","options":{"A":"1.2mL=6mg,不足。","B":"正確。7mg÷5mg/mL=1.4mL。","C":"1.6mL=8mg,過量。","D":"1.8mL=9mg,過量。"},"sources":["劑量計算","Dexamethasone"]}},"113030-N4-29":{"quick":"4歲君君入院做靜脈注射與腹部手術,護理師說話內容最不適當的是「切開你的肚子才能把蟲拿出來」。","detail":{"background":"與學齡前(4歲)兒童溝通:應以非威脅、不引起身體完整性受損恐懼的簡單具體語言、用遊戲表達、給預期指引。「切開你的肚子才能把蟲拿出來最不適當——具體血腥的描述(切開肚子)會加劇身體完整性受損的恐懼(學齡前特別害怕)」。其餘:跟玩偶說害怕的事、打針時一起深呼吸、按壓拔針處防流血皆適當。本題最不適當者為C。","options":{"A":"適當。跟玩偶說害怕的事(治療性遊戲)。","B":"適當。打針時一起慢慢吸氣吐氣(放鬆)。","C":"最不適當(本題答案)。「切開肚子」加劇身體完整性受損恐懼。","D":"適當。按拔針處防流血(預期指引)。"},"sources":["Nelson《兒科學》學齡前","溝通"]}},"113100-N4-29":{"quick":"2歲住院分離焦慮、協助宣洩負向情緒,較合適的治療性遊戲是「木槌敲紙箱」。","detail":{"background":"治療性遊戲(therapeutic play)目的:宣洩情緒、提供治療相關訊息、了解病童感受、減輕住院壓力、增進控制感(非分析早期經驗對病童的影響,那是心理治療)。類型:情緒宣洩性遊戲(如敲打、戳黏土、丟沙包宣洩負向情緒)、指導性遊戲(以圖片故事解說檢查流程、澄清錯誤觀念、認識身體疾病)、戲劇性/角色扮演遊戲(布偶扮演表達感受)、生理健康促進性遊戲。遊戲須依發展階段選擇。 宣洩負向情緒的治療性遊戲屬情緒宣洩性遊戲——以敲打、捶打(如木槌敲紙箱)、戳黏土、丟沙包宣洩憤怒與負向情緒,且適合2歲幼兒的動作能力。本題較合適為「木槌敲紙箱」(A);布偶戲劇性遊戲、把玩聽診器(認識醫療)、扮家家酒偏其他類型/年齡。本題為A。","options":{"A":"正確。木槌敲紙箱=情緒宣洩性遊戲(宣洩負向情緒)。","B":"布偶戲劇性遊戲偏表達/較大兒童。","C":"把玩聽診器是認識醫療(指導性)。","D":"扮家家酒偏角色扮演/較大兒童。"},"sources":["Nelson《兒科學》治療性遊戲","宣洩"]}},"113180-N4-32":{"quick":"3歲住加護病房第4天,顯得安靜、沉默、對事物不感興趣,分離焦慮處於「失望期(despair)」。","detail":{"background":"分離焦慮(separation anxiety,尤6個月~3歲幼兒住院最主要壓力)三期:抗議期(protest)——大哭大鬧、尖叫、拒絕安撫、攻擊行為、不斷要找父母;絕望期/失望期(despair)——安靜、沉默、退縮、對環境不感興趣、退化;去依戀期/否認期(detachment)——表面適應、對父母疏離冷漠(看似恢復實為情感隔離)。住院反應依年齡:幼兒分離焦慮、學齡前誤解為懲罰、學齡期擔心身體與課業;退化(退行)行為(如已會如廁卻尿床、要奶嘴)是常見因應。 失望期/絕望期(despair):安靜、沉默、退縮、對環境不感興趣、退化、悲傷(由抗議期的激烈哭鬧轉為消沉)。本例安靜沉默、不感興趣即失望期。本題為「失望期」(B);抗議期(哭鬧)、去依戀期(疏離冷漠)、過渡期(非三期之一)。本題為B。","options":{"A":"抗議期為大哭大鬧。","B":"正確。安靜沉默、不感興趣=失望期(despair)。","C":"去依戀期為對父母疏離冷漠。","D":"過渡期非分離焦慮三期之一。"},"sources":["Nelson《兒科學》分離焦慮","失望期"]}},"114170-N4-29":{"quick":"3歲小華住院常鬧脾氣,設計治療性遊戲降低住院反應,最適當是「會與玩伴互換玩具,可安排需不需分工合作(平行/聯合)的遊戲」(本題B為依其遊戲發展選擇)。","detail":{"background":"治療性遊戲(therapeutic play)目的:宣洩情緒、提供治療相關訊息、了解病童感受、減輕住院壓力、增進控制感(非分析早期經驗對病童的影響,那是心理治療)。類型:情緒宣洩性遊戲(如敲打、戳黏土、丟沙包宣洩負向情緒)、指導性遊戲(以圖片故事解說檢查流程、澄清錯誤觀念、認識身體疾病)、戲劇性/角色扮演遊戲(布偶扮演表達感受)、生理健康促進性遊戲。遊戲須依發展階段選擇。 治療性遊戲須依遊戲發展階段選擇。3歲幼兒處平行~聯合遊戲(會互換玩具但各玩各的、無分工合作)。本題依官方答案B(可安排與遊戲發展相符的遊戲);A(獨自玩不需玩伴)偏嬰兒、C/D(分工合作/競爭規則)屬學齡期以上,3歲未到。本題為B。(註:3歲應安排不需分工合作的遊戲。)","options":{"A":"獨自玩偏嬰兒期,3歲已會與玩伴互動。","B":"正確(官方)。依3歲遊戲發展安排適合的遊戲。","C":"缺規則但需互動,偏學齡前後段。","D":"合作競爭訂規則屬學齡期,3歲未到。"},"sources":["Nelson《兒科學》治療性遊戲","發展"]}},"101110-N4-19":{"quick":"3個月嬰兒唇裂修補術後,宜採「手肘帶約束法」。","detail":{"background":"唇裂(cleft lip)修補術後護理:避免嬰兒手碰觸/抓搔傷口,採手肘帶(肘關節)約束法限制手肘彎曲、使手無法摸到臉部傷口,但仍可活動上臂。本題為「手肘帶約束法」(A);床護帶、結繩、木乃伊約束非唇裂術後保護傷口的適當方式。本題為A。","options":{"A":"正確。手肘帶約束法防手碰觸唇部傷口。","B":"床護帶約束非保護唇部傷口。","C":"結繩約束不適當。","D":"木乃伊約束限制全身,非唇裂術後首選。"},"sources":["Nelson《兒科學》唇裂","手肘約束"]}},"101110-N4-21":{"quick":"9歲扁桃腺切除術後2小時、不斷吞嚥,「使用抽痰設備自口鼻抽吸分泌物」錯誤。","detail":{"background":"扁桃腺切除術後護理:頭側向一邊、半俯臥利分泌物引流、檢查咽喉傷口、不斷吞嚥動作警覺出血(吞下血液)、局部冰敷/含冰塊減痛止血、評估疼痛給止痛。「抽痰自口、鼻抽吸分泌物錯誤——抽吸會刺激/碰觸傷口引發出血,術後應避免抽吸咽喉」。本題「錯誤」者為D。","options":{"A":"正確。頭側向一邊並檢查咽喉傷口。","B":"正確。局部冰敷或含少量冰塊(止血減痛)。","C":"正確。評估疼痛強度,依醫囑給止痛劑。","D":"錯誤(本題答案)。不可抽吸口鼻(刺激傷口致出血)。"},"sources":["Nelson《兒科學》扁桃腺切除","出血"]}},"105030-N4-47":{"quick":"2個月嬰兒腹部手術後第1天的疼痛評估指標是「臉部扭曲、皺眉」。","detail":{"background":"2個月嬰兒無法言語,疼痛評估以行為觀察:臉部表情(扭曲、皺眉)、哭聲、肢體動作、肌肉緊張、生理徵象。「臉部扭曲、皺眉」是嬰兒疼痛的臉部行為指標。保護疼痛部位、推開刺激、咬牙握拳是較大兒童的主動防衛行為,2個月嬰兒做不到。本題為「臉部扭曲、皺眉」(A)。","options":{"A":"正確。臉部扭曲、皺眉為嬰兒疼痛行為指標。","B":"保護疼痛部位屬較大兒童主動行為。","C":"推開疼痛刺激屬較大兒童。","D":"咬牙握拳屬較大兒童。"},"sources":["Nelson《兒科學》嬰兒疼痛","臉部"]}},"106110-N4-74":{"quick":"9歲闌尾炎(盲腸切除)手術前後護理正確的是「持續腹部評估,若腹部肌肉不自主收縮僵硬如木板,疑有腹膜炎危險」。","detail":{"background":"闌尾炎(盲腸切除)護理:(1)術前懷疑闌尾炎不可給瀉劑/止痛劑/熱敷(會遮蔽症狀或致穿孔),故A給NSAID不當;(2)「持續腹部評估,腹肌不自主收縮僵硬如木板(板狀腹)=腹膜炎(穿孔)危險徵象」——正確;(3)術後腸蠕動恢復(排氣)後才漸進飲食(非試喝水無不適即恢復進食,須待腸蠕動),故C不精確;(4)術後引流採半坐臥(非平躺)使引流向下、防逆行感染,故D錯。本題正確為B。","options":{"A":"錯。疑闌尾炎術前不可給止痛劑(遮蔽症狀)。","B":"正確。板狀腹(僵硬如木板)疑腹膜炎危險。","C":"術後須待腸蠕動恢復才進食,非試喝水無不適即進食。","D":"錯。術後引流採半坐臥(非平躺),防逆行感染。"},"sources":["Nelson《兒科學》闌尾炎","腹膜炎"]}},"108020-N4-72":{"quick":"5歲開心手術換藥的術前心理準備,合適的是「用布偶示範傷口換藥的方式」。","detail":{"background":"學齡前(5歲)術前心理準備:以布偶/模型示範(角色扮演)、簡單具體說明、誠實(不說不會痛)、給預期指引、用遊戲表達。本題合適為「用布偶示範傷口換藥方式」(D);說年紀小不需提供訊息(A錯)、給真實血腥換藥影片(過度刺激增恐懼,B錯)、告訴不會痛(不誠實,C錯)。本題為D。","options":{"A":"錯。學齡前仍需適齡提供傷口訊息。","B":"錯。真實換藥影片過度刺激、增恐懼。","C":"錯。不應說「不會痛」(不誠實)。","D":"正確。用布偶示範傷口換藥方式(角色扮演)。"},"sources":["Nelson《兒科學》學齡前","術前準備"]}},"110110-N4-71":{"quick":"14歲骨肉瘤截肢術後護理中「截肢術後立即裝置永久性義肢,以減輕殘肢水腫」不適當。","detail":{"background":"骨肉瘤(osteosarcoma)截肢術後:觀察殘肢出血/滲液/發炎、評估幻肢痛(phantom pain)用藥/神經阻斷、截肢後以彈性繃帶包紮殘肢塑形、減水腫、預防攣縮。「立即裝永久性義肢不適當——術後殘肢仍腫脹、未定型,需先用暫時性義肢/彈繃塑形,待殘肢消腫定型後再裝永久義肢」。本題不適當者為D。","options":{"A":"適當。觀察殘肢出血、滲液或發炎。","B":"適當。評估幻肢痛,用藥及神經阻斷改善。","C":"適當。彈性繃帶包紮殘肢防攣縮、減水腫。","D":"不適當(本題答案)。應先暫時性義肢塑形,非立即裝永久義肢。"},"sources":["Nelson《兒科學》截肢","義肢"]}},"114170-N4-50":{"quick":"1歲6個月熱性痙攣發作時最適當措施是「協助側臥使口中分泌物流出」。","detail":{"background":"熱性痙攣(febrile convulsion)發作時護理:協助側臥(使口中分泌物/嘔吐物流出、防吸入)、維持呼吸道通暢、移開周圍危險物保護安全、記錄發作情形、退燒。發作時不可約束抽搐肢體(易致骨折/受傷)、不可強行放壓舌板入口(會傷牙/咽、反致受傷);熱性痙攣多為良性、發作後一般不造成永久神經系統損傷。本題最適當為「協助側臥使口中分泌物流出」(C)。","options":{"A":"錯。不可約束抽搐肢體(易致受傷骨折)。","B":"錯。不可強行放壓舌板入口(反致傷害)。","C":"正確。協助側臥使口中分泌物流出、維持呼吸道通暢。","D":"錯。熱性痙攣多為良性,發作後一般不造成神經系統損傷。"},"sources":["Nelson《兒科學》熱性痙攣","側臥"]}},"115030-N4-42":{"quick":"骨肉瘤(16歲)敘述中「病童皆需接受截肢手術」為錯誤。","detail":{"background":"骨肉瘤(osteosarcoma):原發性惡性骨腫瘤、好發青春期(10~20歲生長板活躍處)、多在長骨幹骺端(尤膝部:股骨遠端、脛骨近端)、症狀局部持續疼痛、腫塊、病理性骨折、跛行。治療:化療+手術;手術現多保肢手術(limb-sparing),並非所有病童皆需截肢(視腫瘤範圍、對化療反應決定)。「皆需截肢錯誤(可保肢)」。本題「錯誤」者為B。","options":{"A":"正確。局部持續疼痛、腫塊及病理性骨折。","B":"錯誤(本題答案)。非所有病童皆需截肢(現多保肢手術)。","C":"正確。原發性惡性骨腫瘤,好發青春期。","D":"正確。多在長骨幹骺端(股骨遠端、脛骨近端)。"},"sources":["Nelson《兒科學》骨肉瘤","保肢"]}},"101030-N4-51":{"quick":"10個月嬰兒piperacillin 10mL drip 30分鐘、用精密套管,正確滴數為「20 gtt/min」。","detail":{"background":"兒童給藥/約束:口服給藥可讓兒童選吞藥丸或磨粉、可與少量喜歡的食物混合(除非禁忌)、勿加入牛奶/主食(以免拒喝牛奶)、藥丸置舌後近咽(非舌尖)助吞、嬰兒抱起/半坐臥沿頰側緩慢滴入。眼藥:滴入下眼瞼結膜囊內側、眼藥膏由眼內角往眼外角擦於下眼瞼、滴後按壓內眥淚點約1分鐘(減全身吸收)、頭後仰往上看。耳藥:3歲以下耳廓往下往後拉、3歲以上往上往後拉,不可直接滴於鼓膜,滴後側躺10~15分鐘。約束:需醫囑與家屬同意書、確保肢端皮膚完整、每15~30分鐘(至少每2小時)評估並鬆開活動、木乃伊約束為嬰兒常用。毛地黃(digoxin):給藥前測心尖脈1分鐘,嬰兒<90~100/幼兒<70次/分暫停給藥、勿與食物併服、漏服超過一定時間勿補服、注意低血鉀增毒性。滴速:精密套管(micro-drip)1mL=60gtt;gtt/min=總量(mL)×滴系數÷時間(分)。 計算:精密輸液套管(micro-drip)1mL=60滴;滴數(gtt/min)=總量×滴系數÷時間=10mL×60÷30分=20 gtt/min。本題為「20 gtt/min」(A)。","options":{"A":"正確。10×60÷30=20 gtt/min。","B":"30 gtt/min需20分鐘給完。","C":"40過快。","D":"50過快。"},"sources":["劑量計算","滴速"]}},"101110-N4-9":{"quick":"給兒童口服藥中「將藥丸置於舌尖以利吞嚥」為錯誤。","detail":{"background":"兒童給藥/約束:口服給藥可讓兒童選吞藥丸或磨粉、可與少量喜歡的食物混合(除非禁忌)、勿加入牛奶/主食(以免拒喝牛奶)、藥丸置舌後近咽(非舌尖)助吞、嬰兒抱起/半坐臥沿頰側緩慢滴入。眼藥:滴入下眼瞼結膜囊內側、眼藥膏由眼內角往眼外角擦於下眼瞼、滴後按壓內眥淚點約1分鐘(減全身吸收)、頭後仰往上看。耳藥:3歲以下耳廓往下往後拉、3歲以上往上往後拉,不可直接滴於鼓膜,滴後側躺10~15分鐘。約束:需醫囑與家屬同意書、確保肢端皮膚完整、每15~30分鐘(至少每2小時)評估並鬆開活動、木乃伊約束為嬰兒常用。毛地黃(digoxin):給藥前測心尖脈1分鐘,嬰兒<90~100/幼兒<70次/分暫停給藥、勿與食物併服、漏服超過一定時間勿補服、注意低血鉀增毒性。滴速:精密套管(micro-drip)1mL=60gtt;gtt/min=總量(mL)×滴系數÷時間(分)。 (1)可讓兒童選吞藥丸或磨粉——正確;(2)「藥丸置舌尖錯誤——應置舌後方(近咽)較易吞下(舌尖反而易吐出/嗆);(3)可與少量喜歡的食物混合(除非禁忌)——正確;(4)勿加入牛奶(防拒喝牛奶)——正確。本題「錯誤」者為B。","options":{"A":"正確。可讓兒童選擇吞藥丸或磨粉。","B":"錯誤(本題答案)。藥丸應置舌後近咽,非舌尖。","C":"正確。除非禁忌,可與少量喜歡的食物混合。","D":"正確。勿倒入牛奶(以免拒喝牛奶)。"},"sources":["Nelson《兒科學》口服給藥","舌後"]}},"103030-N4-56":{"quick":"給兒童眼藥或耳藥中「耳藥滴入:3歲以下兒童,將耳廓往上往後輕拉」為錯誤。","detail":{"background":"兒童給藥/約束:口服給藥可讓兒童選吞藥丸或磨粉、可與少量喜歡的食物混合(除非禁忌)、勿加入牛奶/主食(以免拒喝牛奶)、藥丸置舌後近咽(非舌尖)助吞、嬰兒抱起/半坐臥沿頰側緩慢滴入。眼藥:滴入下眼瞼結膜囊內側、眼藥膏由眼內角往眼外角擦於下眼瞼、滴後按壓內眥淚點約1分鐘(減全身吸收)、頭後仰往上看。耳藥:3歲以下耳廓往下往後拉、3歲以上往上往後拉,不可直接滴於鼓膜,滴後側躺10~15分鐘。約束:需醫囑與家屬同意書、確保肢端皮膚完整、每15~30分鐘(至少每2小時)評估並鬆開活動、木乃伊約束為嬰兒常用。毛地黃(digoxin):給藥前測心尖脈1分鐘,嬰兒<90~100/幼兒<70次/分暫停給藥、勿與食物併服、漏服超過一定時間勿補服、注意低血鉀增毒性。滴速:精密套管(micro-drip)1mL=60gtt;gtt/min=總量(mL)×滴系數÷時間(分)。 (1)眼藥水滴入下眼瞼結膜內側——正確;(2)眼藥膏由眼內角往外角擦於下眼瞼——正確;(3)「耳藥:3歲以下耳廓往上往後拉」錯誤——3歲以下應往下往後拉(耳道較直向上),3歲以上才往上往後;(4)滴耳藥後側躺10~15分鐘——正確。本題「錯誤」者為C。","options":{"A":"正確。眼藥水滴入下眼瞼結膜內側。","B":"正確。眼藥膏由眼內角往眼外角擦於下眼瞼。","C":"錯誤(本題答案)。3歲以下耳廓應往下往後拉,非往上往後。","D":"正確。滴耳藥後協助側躺10~15分鐘。"},"sources":["Nelson《兒科學》眼耳給藥","向下向後"]}},"103100-N4-56":{"quick":"3歲美美給藥時踢咬大哭反抗,協助服口服藥的正確方式是「教導媽媽抱起美美坐於膝上,以一手固定,另一手持杯給藥」。","detail":{"background":"兒童給藥/約束:口服給藥可讓兒童選吞藥丸或磨粉、可與少量喜歡的食物混合(除非禁忌)、勿加入牛奶/主食(以免拒喝牛奶)、藥丸置舌後近咽(非舌尖)助吞、嬰兒抱起/半坐臥沿頰側緩慢滴入。眼藥:滴入下眼瞼結膜囊內側、眼藥膏由眼內角往眼外角擦於下眼瞼、滴後按壓內眥淚點約1分鐘(減全身吸收)、頭後仰往上看。耳藥:3歲以下耳廓往下往後拉、3歲以上往上往後拉,不可直接滴於鼓膜,滴後側躺10~15分鐘。約束:需醫囑與家屬同意書、確保肢端皮膚完整、每15~30分鐘(至少每2小時)評估並鬆開活動、木乃伊約束為嬰兒常用。毛地黃(digoxin):給藥前測心尖脈1分鐘,嬰兒<90~100/幼兒<70次/分暫停給藥、勿與食物併服、漏服超過一定時間勿補服、注意低血鉀增毒性。滴速:精密套管(micro-drip)1mL=60gtt;gtt/min=總量(mL)×滴系數÷時間(分)。 幼兒(3歲)反抗服藥:應由熟悉的人(媽媽)抱坐膝上、一手環抱固定其手臂,另一手持杯/餵藥器給藥、態度溫和堅定。本題正確為「媽媽抱坐膝上、一手固定一手給藥」(B);僅解釋按時服藥(對反抗的3歲不足,A)、捏鼻子趁張口灌(會嗆入,C錯)、騙說是果汁牛奶(破壞信任、致拒奶,D錯)。本題為B。","options":{"A":"僅口頭解釋對反抗的3歲不足。","B":"正確。媽媽抱坐膝上、一手固定一手給藥。","C":"錯。捏鼻子趁張口灌會嗆入(危險)。","D":"錯。騙說是果汁牛奶破壞信任、致拒奶。"},"sources":["Nelson《兒科學》幼兒給藥","固定"]}},"107030-N4-44":{"quick":"Gentamycin 4.8mg、每mL含40mg,每次應抽「0.12mL」。","detail":{"background":"兒童給藥/約束:口服給藥可讓兒童選吞藥丸或磨粉、可與少量喜歡的食物混合(除非禁忌)、勿加入牛奶/主食(以免拒喝牛奶)、藥丸置舌後近咽(非舌尖)助吞、嬰兒抱起/半坐臥沿頰側緩慢滴入。眼藥:滴入下眼瞼結膜囊內側、眼藥膏由眼內角往眼外角擦於下眼瞼、滴後按壓內眥淚點約1分鐘(減全身吸收)、頭後仰往上看。耳藥:3歲以下耳廓往下往後拉、3歲以上往上往後拉,不可直接滴於鼓膜,滴後側躺10~15分鐘。約束:需醫囑與家屬同意書、確保肢端皮膚完整、每15~30分鐘(至少每2小時)評估並鬆開活動、木乃伊約束為嬰兒常用。毛地黃(digoxin):給藥前測心尖脈1分鐘,嬰兒<90~100/幼兒<70次/分暫停給藥、勿與食物併服、漏服超過一定時間勿補服、注意低血鉀增毒性。滴速:精密套管(micro-drip)1mL=60gtt;gtt/min=總量(mL)×滴系數÷時間(分)。 計算:抽取量=醫囑劑量÷濃度=4.8mg÷40mg/mL=0.12 mL。本題每次抽「0.12mL」(A)。","options":{"A":"正確。4.8÷40=0.12mL。","B":"0.24=9.6mg,過量。","C":"0.36過量。","D":"0.48=19.2mg,過量。"},"sources":["劑量計算","Gentamycin"]}},"107110-N4-57":{"quick":"2歲小華左耳給藥正確的是「給藥前向右側呈半側臥姿(患耳朝上)」。","detail":{"background":"兒童給藥/約束:口服給 膜囊」。本題較不適宜者為C。","options":{"A":"適宜。平躺或半坐臥、頭部後仰。","B":"適宜。下眼瞼向下向外拉成囊狀。","C":"較不適宜(本題答案)。應滴入結膜囊,非直接滴眼球(角膜)。","D":"適宜。滴後按壓內眥淚點約1分鐘。"},"sources":["Nelson《兒科學》眼藥","結膜囊"]}},"110110-N4-64":{"quick":"兒童毛地黃(Digoxin)給藥指導正確的是「忘記給藥的時間如未超過6小時,則補服一劑」。","detail":{"background":"兒童給藥/約束:口服給藥可讓兒童選吞藥丸或磨粉、可與少量喜歡的食物混合(除非禁忌)、勿加入牛奶/主食(以免拒喝牛奶)、藥丸置舌後近咽(非舌尖)助吞、嬰兒抱起/半坐臥沿頰側緩慢滴入。眼藥:滴入下眼瞼結膜囊內側、眼藥膏由眼內角往眼外角擦於下眼瞼、滴後按壓內眥淚點約1分鐘(減全身吸收)、頭後仰往上看。耳藥:3歲以下耳廓往下往後拉、3歲以上往上往後拉,不可直接滴於鼓膜,滴後側躺10~15分鐘。約束:需醫囑與家屬同意書、確保肢端皮膚完整、每15~30分鐘(至少每2小時)評估並鬆開活動、木乃伊約束為嬰兒常用。毛地黃(digoxin):給藥前測心尖脈1分鐘,嬰兒<90~100/幼兒<70次/分暫停給藥、勿與食物併服、漏服超過一定時間勿補服、注意低血鉀增毒性。滴速:精密套管(micro-drip)1mL=60gtt;gtt/min=總量(mL)×滴系數÷時間(分)。 毛地黃(digoxin)給藥:(1)給藥前測心尖脈1分鐘(非橈動脈),心率過慢(嬰<90~100/兒童<70)暫停,故A錯;(2)勿與牛奶/食物併服(影響吸收),故B錯;(3)「漏服未超過6小時可補服一劑(超過則略過不補,以免過量)」——正確;(4)長期服用注意低血鉀(增毒性),補鉀(非鈣),故D錯。本題正確為C。","options":{"A":"錯。應測心尖脈(非橈動脈)1分鐘。","B":"錯。勿與牛奶併服(影響吸收)。","C":"正確。漏服未超過6小時可補服一劑。","D":"錯。注意低血鉀(非低血鈣),補鉀。"},"sources":["藥理 Digoxin","心尖脈"]}},"111030-N4-52":{"quick":"病童約束原則中「每隔2小時要評估約束的狀況」為錯誤(本題要選最不嚴謹者)。","detail":{"background":"兒童給藥/約束:口服給藥可讓兒童選吞藥丸或磨粉、可與少量喜歡的食物混合(除非禁忌)、勿加入牛奶/主食(以免拒喝牛奶)、藥丸置舌後近咽(非舌尖)助吞、嬰兒抱起/半坐臥沿頰側緩慢滴入。眼藥:滴入下眼瞼結膜囊內側、眼藥膏由眼內角往眼外角擦於下眼瞼、滴後按壓內眥淚點約1分鐘(減全身吸收)、頭後仰往上看。耳藥:3歲以下耳廓往下往後拉、3歲以上往上往後拉,不可直接滴於鼓膜,滴後側躺10~15分鐘。約束:需醫囑與家屬同意書、確保肢端皮膚完整、每15~30分鐘(至少每2小時)評估並鬆開活動、木乃伊約束為嬰兒常用。毛地黃(digoxin):給藥前測心尖脈1分鐘,嬰兒<90~100/幼兒<70次/分暫停給藥、勿與食物併服、漏服超過一定時間勿補服、注意低血鉀增毒性。滴速:精密套管(micro-drip)1mL=60gtt;gtt/min=總量(mL)×滴系數÷時間(分)。 約束原則:需醫囑與家屬同意書、確保肢端皮膚完整、木乃伊約束為嬰兒常用皆正確。「每隔2小時評估——約束評估應更頻繁(約每15~30分鐘評估肢端循環/膚色/活動)、並定時鬆開,2小時間隔過長」,故本題以C為錯誤(評估頻率不足)。本題「錯誤」者為C。","options":{"A":"正確。有醫囑和家屬同意書才能約束。","B":"正確。須確保約束肢端皮膚完整性。","C":"錯誤(本題答案)。應每15~30分鐘評估,2小時間隔過長。","D":"正確。木乃伊約束是嬰兒常用約束法。"},"sources":["Nelson《兒科學》約束","評估頻率"]}},"111110-N4-42":{"quick":"自閉症兒童護理照護較正確的是「有自傷行為的自閉兒,必要時可執行適當的約束」。","detail":{"background":"自閉症照護:(1)低功能自閉症語言表達與理解障礙(非正常),故A錯;(2)「有自傷行為的自閉兒必要時可執行適當約束(保護其安全,防自傷)」——正確;(3)自閉症常排斥身體碰觸,增加碰觸會增焦慮(非刺激感覺統合),故C錯;(4)自閉症需一致環境,經常改變環境增焦慮(非增學習刺激),故D錯。本題較正確為B。","options":{"A":"錯。低功能自閉症語言表達與理解有障礙(非正常)。","B":"正確。有自傷行為者必要時可執行適當約束(防自傷)。","C":"錯。自閉症常排斥碰觸,增碰觸會增焦慮。","D":"錯。自閉症需一致環境,經常改變會增焦慮。"},"sources":["Nelson《兒科學》自閉症","約束"]}},"113030-N4-30":{"quick":"2歲小廷耳滴藥照護中「將耳藥直接滴於鼓膜上」為錯誤。","detail":{"background":"兒童給藥/約束:口服給藥可讓兒童選吞藥丸或磨粉、可與少量喜歡的食物混合(除非禁忌)、勿加入牛奶/主食(以免拒喝牛奶)、藥丸置舌後近咽(非舌尖)助吞、嬰兒抱起/半坐臥沿頰側緩慢滴入。眼藥:滴入下眼瞼結膜囊內側、眼藥膏由眼內角往眼外角擦於下眼瞼、滴後按壓內眥淚點約1分鐘(減全身吸收)、頭後仰往上看。耳藥:3歲以下耳廓往下往後拉、3歲以上往上往後拉,不可直接滴於鼓膜,滴後側躺10~15分鐘。約束:需醫囑與家屬同意書、確保肢端皮膚完整、每15~30分鐘(至少每2小時)評估並鬆開活動、木乃伊約束為嬰兒常用。毛地黃(digoxin):給藥前測心尖脈1分鐘,嬰兒<90~100/幼兒<70次/分暫停給藥、勿與食物併服、漏服超過一定時間勿補服、注意低血鉀增毒性。滴速:精密套管(micro-drip)1mL=60gtt;gtt/min=總量(mL)×滴系數÷時間(分)。 耳滴藥:協助向健側半側臥、2歲(<3歲)耳廓往下往後拉使耳道變直、沿耳壁滴入(不可直接滴於鼓膜,會痛/傷鼓膜)、滴後按摩耳屏助藥流入。「耳藥直接滴於鼓膜上」錯誤。本題「錯誤」者為C。","options":{"A":"正確。協助病童躺向健側半側臥。","B":"正確。2歲耳朵往下往後拉使耳道變直。","C":"錯誤(本題答案)。不可將耳藥直接滴於鼓膜上(沿耳壁滴)。","D":"正確。滴藥後以手指按摩耳部促吸收。"},"sources":["Nelson《兒科學》耳藥","沿耳壁"]}},"114030-N4-30":{"quick":"兒童使用眼藥注意事項正確的是「將眼藥膏塗抹於下眼瞼結膜上」。","detail":{"background":"兒童給藥/約束:口服給藥可讓兒童選吞藥丸或磨粉、可與少量喜歡的食物混合(除非禁忌)、勿加入牛奶/主食(以免拒喝牛奶)、藥丸置舌後近咽(非舌尖)助吞、嬰兒抱起/半坐臥沿頰側緩慢滴入。眼藥:滴入下眼瞼結膜囊內側、眼藥膏由眼內角往眼外角擦於下眼瞼、滴後按壓內眥淚點約1分鐘(減全身吸收)、頭後仰往上看。耳藥:3歲以下耳廓往下往後拉、3歲以上往上往後拉,不可直接滴於鼓膜,滴後側躺10~15分鐘。約束:需醫囑與家屬同意書、確保肢端皮膚完整、每15~30分鐘(至少每2小時)評估並鬆開活動、木乃伊約束為嬰兒常用。毛地黃(digoxin):給藥前測心尖脈1分鐘,嬰兒<90~100/幼兒<70次/分暫停給藥、勿與食物併服、漏服超過一定時間勿補服、注意低血鉀增毒性。滴速:精密套管(micro-drip)1mL=60gtt;gtt/min=總量(mL)×滴系數÷時間(分)。 兒童眼藥:(1)「眼藥膏塗於下眼瞼結膜上(由內眥往外眥)」——正確;(2)眼藥水滴於下眼瞼結膜內側(囊狀),非外側,故B錯;(3)給藥時請兒童頭後仰往上看(非往下看),故C錯;(4)醫囑O.D.=右眼(O.S.=左眼、O.U.=雙眼),故D錯。本題正確為「眼藥膏塗於下眼瞼結膜上」(A)。","options":{"A":"正確。眼藥膏塗於下眼瞼結膜上(內眥往外眥)。","B":"錯。眼藥水滴於下眼瞼結膜內側(非外側)。","C":"錯。應請兒童頭後仰往上看(非往下看)。","D":"錯。O.D.是右眼(O.U.才是雙眼)。"},"sources":["Nelson《兒科學》眼藥","O.D."]}},"115030-N4-29":{"quick":"嬰幼兒給藥方式最適當的是「(以餵藥器/滴管沿頰側緩慢給藥、抱起半坐臥防嗆)」(本題A)。","detail":{"background":"兒童給藥/約束:口服給藥可讓兒童選吞藥丸或磨粉、可與少量喜歡的食物混合(除非禁忌)、勿加入牛奶/主食(以免拒喝牛奶)、藥丸置舌後近咽(非舌尖)助吞、嬰兒抱起/半坐臥沿頰側緩慢滴入。眼藥:滴入下眼瞼結膜囊內側、眼藥膏由眼內角往眼外角擦於下眼瞼、滴後按壓內眥淚點約1分鐘(減全身吸收)、頭後仰往上看。耳藥:3歲以下耳廓往下往後拉、3歲以上往上往後拉,不可直接滴於鼓膜,滴後側躺10~15分鐘。約束:需醫囑與家屬同意書、確保肢端皮膚完整、每15~30分鐘(至少每2小時)評估並鬆開活動、木乃伊約束為嬰兒常用。毛地黃(digoxin):給藥前測心尖脈1分鐘,嬰兒<90~100/幼兒<70次/分暫停給藥、勿與食物併服、漏服超過一定時間勿補服、注意低血鉀增毒性。滴速:精密套管(micro-drip)1mL=60gtt;gtt/min=總量(mL)×滴系數÷時間(分)。 嬰幼兒給藥最適當原則:抱起或半坐臥(防嗆)、以餵藥器/滴管沿頰側(口角內側)緩慢給藥、藥粉溶於少量水、給藥後安撫。本題最適當為選項A(符合上述安全給藥原則);其餘選項為躺餵、快速灌、捏鼻、加入主食等不安全做法。","options":{"A":"正確。抱起半坐臥、沿頰側緩慢給藥(安全防嗆)。","B":"不當做法(如躺餵/快速灌易嗆)。","C":"不當做法(如捏鼻灌藥)。","D":"不當做法(如加入主食/牛奶)。"},"sources":["Nelson《兒科學》嬰幼兒給藥","頰側"]}},"102030-N4-33":{"quick":"早期破水住院7天、臉紅燥熱胃口差、陰道仍滲羊水,「向個案解釋臉紅燥熱與破水引發感染有關」不適宜。","detail":{"background":"早期破水(PROM)併感染風險:臉紅、燥熱、胃口差可能是感染(絨毛膜羊膜炎)徵象,應依醫囑用抗生素、會陰沖洗、密切觀察陰道分泌物性狀、監測體溫與胎兒。「向個案解釋臉紅燥熱與破水引發感染有關不適宜——直接暗示已感染會增加孕婦焦慮,且尚需評估確認;應先觀察評估、給予支持,不宜驟下感染結論加重其擔憂」。本題不適宜者為C。","options":{"A":"適宜。依醫囑用抗生素預防感染。","B":"適宜。調節被蓋衣物空調減少不適。","C":"不適宜(本題答案)。驟然暗示已感染會增焦慮(應先觀察評估)。","D":"適宜。會陰沖洗、密切觀察陰道分泌物性狀。"},"sources":["新文京《產科護理學》早期破水","感染"]}},"102110-N4-1":{"quick":"以家庭為中心母育護理中「完全依照父母親所想要的照顧方式」為錯誤。","detail":{"background":"以家庭為中心的母育護理:鼓勵LDR(待產生產恢復合一)產房、家庭成員參與生產、父母早期與新生兒接觸皆是。「完全依照父母所想要的照顧方式錯誤——家庭中心是尊重並共同討論,但仍須兼顧醫療安全與專業判斷,非完全無條件依從(若違反安全則需溝通)」。本題「錯誤」者為C。","options":{"A":"正確。鼓勵LDR(待產生產恢復合一)產房。","B":"正確。家庭成員可參與生產過程。","C":"錯誤(本題答案)。非完全依父母想要(須兼顧醫療安全)。","D":"正確。鼓勵父母早期與新生兒接觸。"},"sources":["新文京《產科護理學》家庭中心","專業判斷"]}},"103030-N4-1":{"quick":"產科護理理念中「提供以機構產科常規為主軸的照護」不適當。","detail":{"background":"產科護理理念:以孕產婦為中心、以家庭為中心、文化取向(尊重文化)的護理。「以機構產科常規為主軸不適當——應以孕產婦/家庭為中心(個別化),非以機構常規為主軸(僵化、忽略個別需求)」。本題不適當者為C。","options":{"A":"適當。提供以孕產婦為中心的護理。","B":"適當。提供以家庭為中心的護理。","C":"不適當(本題答案)。不應以機構產科常規為主軸(應以孕產婦/家庭為中心)。","D":"適當。提供以文化取向的護理。"},"sources":["新文京《產科護理學》理念","個別化"]}},"103030-N4-40":{"quick":"輕微產後陰道血腫、產後12小時最適當的護理是「給予會陰部冰敷」。","detail":{"background":"產後陰道/會陰血腫:早期(產後24小時內)以冰敷(血管收縮、減少出血與腫脹、止痛);晚期(24~48小時後)才改熱敷/溫水坐浴促進吸收。本例產後12小時(早期)最適當冰敷(B);依需要可給止痛但非首要、不需延遲下床、輕微血腫不需注射止血劑。本題為B。","options":{"A":"止痛劑可給但非首要措施。","B":"正確。產後12小時(早期)陰道血腫給會陰冰敷。","C":"不需特別延遲下床。","D":"輕微血腫不需注射止血劑。"},"sources":["新文京《產科護理學》產後血腫","冰敷"]}},"106111-N4-9":{"quick":"以家庭為中心母育中「醫院是唯一可提供溫和生產方式的場所」為錯誤。","detail":{"background":"家庭為中心母育理念:懷孕生產非疾病狀態、家庭成員可參與生產、醫護應賦權婦女自主選擇生產方式皆正確。「醫院是唯一可提供溫和生產的場所錯誤——溫和生產不限於醫院(如助產所、居家生產等亦可在安全評估下提供),且強調婦女自主選擇場所與方式」。本題「錯誤」者為C。","options":{"A":"正確。懷孕生產不應被視為生病狀態。","B":"正確。家庭成員皆可參與生產過程。","C":"錯誤(本題答案)。醫院非唯一可提供溫和生產的場所。","D":"正確。醫護應賦權婦女自主選擇生產方式。"},"sources":["新文京《產科護理學》母育","自主"]}},"106111-N4-53":{"quick":"瀕死兒童疼痛護理最重要的是「依醫囑按時(around the clock)給予靜脈注射Morphine」。","detail":{"background":"瀕死/末期兒童重度持續疼痛:最重要是按時(around the clock,定時)給強效鴉片類(嗎啡Morphine)維持無痛(而非僅p.r.n.需要時給,會造成疼痛起伏)。本題最重要為「按時靜脈Morphine」(D);Meperidine p.r.n.(間歇/代謝物neurotoxic不適長期)、EMLA(僅表面/侵入處置前)、PCA(需病童能操作,瀕死兒童多無法)非最重要。本題為D。","options":{"A":"Meperidine p.r.n.為間歇給藥、代謝物有神經毒,不適。","B":"EMLA僅用於皮膚侵入處置前,非全身止痛。","C":"PCA需病童能自行操作,瀕死兒童多無法。","D":"正確。按時(around the clock)靜脈Morphine維持無痛。"},"sources":["Nelson《兒科學》末期疼痛","嗎啡定時"]}},"108110-N4-4":{"quick":"生產教育觀念正確的是「②讓孕婦因應懷孕與分娩照護過程+③朝向以家庭為中心的照護(即23)」。","detail":{"background":"生產教育(childbirth education)現代觀念:②協助孕婦因應(主動參與)懷孕與分娩過程、③朝向以家庭為中心的照護。①由醫護主導減少壓力錯(應孕婦主動參與非醫護主導);④一定不用藥物減痛錯(尊重個別選擇,可選擇藥物或非藥物減痛)。本題正確組合為②③(23)(C)。","options":{"A":"12含①醫護主導(錯)。","B":"34含④一定不用藥(錯)。","C":"正確。②孕婦因應過程+③家庭為中心(23)。","D":"14含①與④皆錯。"},"sources":["新文京《產科護理學》生產教育","家庭中心"]}},"109110-N4-2":{"quick":"以家庭為中心的產科照護中「提供完全相同的產科常規照護以符合評鑑要求」為錯誤。","detail":{"background":"家庭為中心產科照護:鼓勵配偶與手足參與生產、推廣親子同室、鼓勵儘早出院與家人團聚皆正確。「提供完全相同的產科常規以符合評鑑錯誤——應個別化照護(依不同家庭需求彈性調整),非一致僵化的常規」。本題「錯誤」者為D。","options":{"A":"正確。鼓勵配偶與新生兒手足參與生產。","B":"正確。推廣親子同室增進互動。","C":"正確。鼓勵儘早出院與家人團聚。","D":"錯誤(本題答案)。應個別化照護,非完全相同的常規。"},"sources":["新文京《產科護理學》產科家庭中心","個別化"]}},"109110-N4-20":{"quick":"產後痛(after pain)護理中「通常在第三天後疼痛日益嚴重」為錯誤。","detail":{"background":"產後痛(after pain,子宮收縮痛):產後子宮陣發收縮復舊所致,經產婦/哺乳時(催產素)較明顯;多在產後1~3天最明顯,之後漸減輕(非第三天後日益嚴重)。護理:常以10分法評估、鼓勵適度活動、深呼吸緩解、必要時止痛。「第三天後日益嚴重」錯誤(應漸減輕)。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。產後痛多1~3天最明顯後漸減輕,非第三天後日益嚴重。","B":"正確。常以10分法評估疼痛。","C":"正確。鼓勵適度活動。","D":"正確。教導深呼吸緩解。"},"sources":["新文京《產科護理學》產後痛","漸減輕"]}},"109110-N4-49":{"quick":"生命末期兒童疼痛評估照護中「病童喊痛時需給予meperidine進行止痛」最不適當。","detail":{"background":"末期兒童疼痛:用QUESTT評估、減少不必要侵入性治療、教家屬非藥物轉移注意皆適當。「喊痛時給meperidine(Demerol)最不適當——Meperidine代謝物normeperidine有神經毒性(致癲癇),不建議用於慢性/末期長期止痛(末期用嗎啡Morphine)」。本題最不適當者為A。","options":{"A":"最不適當(本題答案)。Meperidine代謝物有神經毒,不用於末期長期止痛(用嗎啡)。","B":"適當。用QUESTT進行兒童疼痛評估。","C":"適當。減少不必要的侵入性治療。","D":"適當。教家屬用非藥物方式轉移注意力。"},"sources":["Nelson《兒科學》末期疼痛","Meperidine"]}},"110030-N4-19":{"quick":"陰道分娩後12小時會陰傷口疼痛,適當的是「採REEDA評估時,A是指傷口密合度(Approximation)」。","detail":{"background":"產後會陰傷口評估REEDA:R=Redness(發紅)、E=Edema(水腫)、E=Ecchymosis(瘀斑)、D=Discharge(分泌物)、A=Approximation(傷口密合度)。本題正確為「A=傷口密合度(Approximation)」(B);評估會陰宜採側臥(辛式)非屈膝仰臥、會陰擦拭由前(陰道)往後(肛門)非由肛門往陰道、產後早期(24~48h內)冰敷非溫水坐浴(坐浴是後期)。本題為B。","options":{"A":"評估會陰宜採側臥(辛式),非屈膝仰臥。","B":"正確。REEDA的A=傷口密合度(Approximation)。","C":"擦拭應由前(陰道)往後(肛門),非由肛門往陰道。","D":"產後早期(12小時)宜冰敷,非溫水坐浴。"},"sources":["新文京《產科護理學》REEDA","密合度"]}},"110110-N4-34":{"quick":"痛經(經痛)求診的回答,最適當是「多休息,局部熱敷下腹部」。","detail":{"background":"原發性痛經(經痛)護理:局部熱敷下腹部、多休息、規律運動、減少咖啡因、必要時前列腺素合成抑制劑(NSAID)止痛。本題最適當為「多休息、局部熱敷下腹部」(D);可自行服止痛藥(應指導正確用藥非籠統「自行」,A不夠周全);泡熱水澡(本題以熱敷下腹為較佳);多吃巧克力咖啡不當(咖啡因可能加重),故C錯。本題為D。","options":{"A":"「自行服藥」不夠周全(應指導正確用藥)。","B":"熱敷下腹較佳(本題D為最適當)。","C":"錯。巧克力咖啡含咖啡因可能加重經痛。","D":"正確。多休息、局部熱敷下腹部。"},"sources":["新文京《婦科》痛經","熱敷"]}},"111030-N4-1":{"quick":"以家庭為中心照護策略中「鼓勵留院直到適應母職」為錯誤。","detail":{"background":"家庭為中心照護策略:推動準爸爸陪產、提供LDR(樂得兒)產房、協助母嬰早期肌膚接觸皆正確。「鼓勵留院直到適應母職錯誤——現代產科趨勢是早期出院與家人團聚(在家庭/社區支持下適應母職,非長期留院)」。本題「錯誤」者為A。","options":{"A":"錯誤(本題答案)。應鼓勵早期出院,非留院直到適應母職。","B":"正確。推動準爸爸陪產制。","C":"正確。提供樂得兒(LDR)產房。","D":"正確。協助產檯上母嬰早期肌膚接觸。"},"sources":["新文京《產科護理學》家庭中心","早期出院"]}},"111110-N4-1":{"quick":"懷孕期正常內分泌變化正確的是「甲狀腺所分泌的甲狀腺素會增加」。","detail":{"background":"懷孕期內分泌變化:(1)懷孕時胎盤性腺刺激素/雌激素黃體素抑制腦下垂體前葉FSH、LH(使不再排卵),FSH、LH下降,故A增加錯;(2)「甲狀腺增大、甲狀腺素(總T4)增加(因雌激素使甲狀腺結合球蛋白增加)」——正確;(3)腎上腺留鹽激素(醛固酮)增加(對抗黃體素排鈉),故C降低錯;(4)胎盤分泌雌激素(含雌三醇estriol)取代,敘述有誤,故D錯。本題正確為「甲狀腺素增加」(B)。","options":{"A":"錯。懷孕時FSH、LH下降(被抑制),非增加。","B":"正確。甲狀腺增大、甲狀腺素增加。","C":"錯。腎上腺留鹽激素(醛固酮)增加,非降低。","D":"錯。雌三醇/雌二醇敘述有誤。"},"sources":["新文京《產科護理學》孕期內分泌","甲狀腺"]}},"111110-N4-40":{"quick":"乳癌護理措施正確的是「外出時,儘量避免陽光直射患側手臂」。","detail":{"background":"乳癌術後患側手臂照護(腋下淋巴清除→淋巴水腫風險):避免患側打針/抽血/量血壓、提重物、陽光曝曬、外傷感染(防淋巴水腫與感染)。本題正確為「避免陽光直射患側手臂」(C);(A)患側腫脹感染不會自然恢復(需積極預防處理);(B)PQRST的R=Region(部位)/Radiation(放射)非recovery;(D)腋下僵硬緊繃需復健運動(非不需注意)。本題為C。","options":{"A":"錯。患側淋巴水腫/感染不會自然恢復(需預防)。","B":"錯。PQRST的R是部位/放射,非recovery。","C":"正確。外出避免陽光直射患側手臂(防淋巴水腫)。","D":"錯。腋下僵硬緊繃需復健運動,不可不注意。"},"sources":["NCCN 乳癌","淋巴水腫"]}},"112110-N4-18":{"quick":"meperidine(Demerol)注射後呼吸<10次/分,能改善的藥物是「naloxone(Narcan)」。","detail":{"background":"Meperidine(Demerol,鴉片類止痛劑)過量→呼吸抑制(<10次/分)。鴉片類拮抗劑(解毒劑)=naloxone(Narcan),可逆轉呼吸抑制。本題能改善者為「naloxone(Narcan)」(D);diazepam、hydroxyzine、promazine非鴉片拮抗劑。本題為D。","options":{"A":"diazepam是抗焦慮/抗痙攣,非鴉片拮抗。","B":"hydroxyzine是抗組織胺,非鴉片拮抗。","C":"promazine是抗精神病/止吐,非鴉片拮抗。","D":"正確。naloxone(Narcan)是鴉片拮抗劑,逆轉呼吸抑制。"},"sources":["藥理 Naloxone","鴉片拮抗"]}},"112110-N4-26":{"quick":"剖腹產後第一天整個腹部疼痛、疲憊不想動、不要親子同室,最適當是「說明活動益處,依醫囑給止痛劑,採漸進式活動」。","detail":{"background":"剖腹產後第一天:鼓勵早期漸進式活動(下床)(防血栓、腸沾黏、促排氣與復原)、依醫囑給止痛劑減疼痛以利活動、評估腸蠕動。本題最適當為「說明活動益處、給止痛劑、漸進式活動」(C);(A)不應強推親子同室(應尊重產婦狀態,先處理疼痛疲憊);(B)不應長期臥床(增血栓);束腹帶24小時非處置重點;(D)非首要(疼痛疲憊是主訴)。本題為C。","options":{"A":"錯。不應強推親子同室(先處理疼痛疲憊)。","B":"錯。不應長期臥床(增血栓風險)。","C":"正確。說明活動益處、給止痛劑、採漸進式活動。","D":"評估腸蠕動非當下主訴(疼痛疲憊)的首要處置。"},"sources":["新文京《產科護理學》剖腹產","早期活動"]}},"112110-N4-31":{"quick":"產後第三天久站靜脈曲張者、站立伸直小腿時疼痛壓痛,適當的是「霍曼氏徵象陽性則依醫囑給抗凝血劑並密切觀察出血」。","detail":{"background":"產後深層靜脈栓塞(DVT):久站/靜脈曲張/產後高凝為危險因子;霍曼氏徵象(Homan sign)陽性(足背屈時小腿疼痛)提示DVT;處置依醫囑抗凝血劑(heparin)並密切觀察出血、勿按摩/熱敷患肢(會使血栓脫落致肺栓塞)、抬高患肢、臥床。本題適當為「霍曼氏徵象陽性給抗凝血劑並觀察出血」(B);(A)DVT不可熱敷按摩(致栓塞)錯;(C)Hoffman技術是乳頭內陷矯正,非DVT評估錯;(D)DVT急性期不鼓勵多下床活動(防栓子脫落)錯。本題為B。","options":{"A":"錯。DVT患肢不可熱敷按摩(會使血栓脫落致肺栓塞)。","B":"正確。Homan徵象陽性給抗凝血劑並密切觀察出血。","C":"錯。Hoffman技術是矯正乳頭內陷,非DVT評估。","D":"錯。DVT急性期不鼓勵多下床(防栓子脫落)。"},"sources":["新文京《產科護理學》DVT","Homan"]}},"114030-N4-10":{"quick":"41週自然破水規則陣痛、子宮頸開2公分、宮縮痛2分,此時最可能的行為反應是「興奮話多,樂意分享產兆發生過程」。","detail":{"background":"分娩第一產程潛伏期(子宮頸0~3公分):宮縮輕微(痛2分)、間隔長,產婦興奮、話多、有精神、樂意社交分享(產兆經過)。本題子宮頸開2公分(潛伏期)為「興奮話多、樂意分享」(A);疲累擔心失控(活動期/過渡期)、閉眼休息維持不動(過渡期)、能量集中單字回應(過渡期8~10公分)屬產程後段。本題為A。","options":{"A":"正確。潛伏期(開2公分)產婦興奮話多、樂意分享。","B":"疲累擔心失控屬活動期/過渡期。","C":"閉眼休息維持不動屬過渡期。","D":"能量集中、單字回應屬過渡期(8~10公分)。"},"sources":["新文京《產科護理學》第一產程","潛伏期"]}},"114100-N4-13":{"quick":"親子同室(rooming-in)敘述中「執行親子同室主要目的為減輕護理師的負擔」為錯誤。","detail":{"background":"親子同室(rooming-in):WHO建議產後母嬰24小時不分開、同室、是以家庭為中心的照護、依不同家庭需求彈性安排;主要目的是促進親子依附、母乳哺餵、母親學習照顧技巧。「主要目的為減輕護理師負擔錯誤(目的是促進親子依附與哺乳,非減輕護理師負擔)」。本題「錯誤」者為D。","options":{"A":"正確。依不同家庭需求彈性安排親子同室。","B":"正確。WHO建議產後母嬰24小時不分開、同室。","C":"正確。親子同室是以家庭為中心的照護。","D":"錯誤(本題答案)。主要目的是促進親子依附與哺乳,非減輕護理師負擔。"},"sources":["新文京《產科護理學》親子同室","依附"]}}},TO=["1兒少保護與虐待通報法規", "2兒童疼痛評估與止痛", "3末期瀕死照護與死亡概念", "4慢性病正常化與身心障礙", "5以家庭為中心與家系圖賦權", "6住院反應分離焦慮與治療性遊戲", "7兒童給藥與約束", "8兒童手術前後護理", "9母嬰產科借題"],LEC={"1兒少保護與虐待通報法規":{"html":"<p><b>兒少權益保障法</b>:兒童及少年指<b>未滿18歲</b>(兒童<12、少年12~未滿18)。責任通報人員知悉兒少<b>受虐、施用毒品、猥褻性交、被遺棄</b>,應<b>至遲24小時內</b>通報;專線<b>113</b>(保護)、緊急110。</p><p><b>處置</b>:儘速隔離受虐與施虐者、與兒童<b>單獨會談</b>(不與施虐者同場)、注意隱私、提供社會資源;<u>不引導兒童責怪施虐者、不需自行認定施虐者</u>。受虐徵象:多處不同癒合期瘀傷、與說法不符的傷、髒污異味、寒冬穿短袖;1歲以下任何骨折須通報。</p><p><b>搖晃症候群</b>:劇烈搖晃致硬腦膜下出血+視網膜出血,屬虐待須通報,腦損傷多<b>不可逆</b>。</p>"},"2兒童疼痛評估與止痛":{"html":"<p><b>疼痛評估依年齡</b>:新生兒NIPS;無法言語/意識不清/幼兒→<b>FLACC</b>(臉Face、腿Legs、活動Activity、哭Cry、安撫度Consolability,各0~2分);3~7歲<b>臉譜FACES</b>;青少年/能言語<b>主訴(self-report)為金標準</b>。生理指標:心跳/呼吸/血壓/瞳孔(尿量無關)。</p><p><b>止痛原則</b>:WHO三階梯、<b>定時給藥(around the clock)</b>維持無痛、<b>口服優先</b>、重度用<b>鴉片(嗎啡)</b>、合併<b>緩瀉劑</b>防便秘、不因怕成癮而不足量、可多模式併用。<b>EMLA</b>=局麻、侵入處置前<b>1小時</b>;Acetaminophen=解熱鎮痛(非NSAID);<u>Meperidine代謝物有神經毒,不用於末期長期止痛</u>。</p>"},"3末期瀕死照護與死亡概念":{"html":"<p><b>死亡概念</b>:<3歲無;<b>3~5歲可逆(如睡覺會醒)</b>;<b>5~9歲擬人化(死神)、可躲避/只有老人才死</b>;<b>9歲+不可逆、普遍、有生理原因</b>。談死亡用具體誠實語言、<u>勿用「睡著了」隱喻</u>、讓兒童適齡參加喪禮。</p><p><b>瀕死變化</b>:陳施氏(潮式)呼吸、四肢冷卻覺得熱、視力減退而<b>聽覺最後消失</b>、尿少、<b>脈搏慢而弱</b>、失大小便控制、臨終嘎聲(抬高頭/側臥)。臨終以舒適為主(皮膚清潔乾燥),不再積極營養/輸液/抗生素。</p><p><b>哀傷照護</b>:接納情緒、靜靜陪伴共在、依需求給照護、<u>勿轉移注意、勿用「不會痛了」、勿催儀式</u>;讓家人與遺體獨處道別、手足適齡參與。末期最首要=<b>症狀控制</b>(尤疼痛)。安寧緩和應<b>早期介入</b>、DNR由法定代理人簽署。</p>"},"4慢性病正常化與身心障礙":{"html":"<p><b>正常化(normalization)</b>:以常態眼光對待、維持有價值社會角色、過接近正常生活;<b>父母以同樣家規對待病童與手足</b>、聚焦病童優點建立自尊、納入家族、鼓勵與同儕互動;<u>非要求達健康兒童體能標準、不過度保護、不社交隔離、作息不應與手足不同</u>。</p><p><b>慢性病</b>:長期需管理、主要靠家庭/自我管理(非僅依賴專業)。手足壓力風險:關係不良、父母情緒大變、怕被送走(性別非風險因子)。妥瑞症智力正常不需特教;血友病避免碰撞性運動。資訊應分次循序提供。</p>"},"5以家庭為中心與家系圖賦權":{"html":"<p><b>家庭為中心(FCC)</b>:尊重<b>每位成員</b>需求、<b>家庭參與決策與照護</b>、夥伴合作、彈性探視、尊重文化(維持家庭文化常規一致性)。加護病房亦鼓勵父母/手足參與、與能理解的兒童共同溝通。</p><p><b>賦權(empowerment)</b>:醫護與家庭互動中讓家庭<b>獲得自我控制感</b>、增其優勢能力與行動;<u>非醫護單方決定、非「要求」必須在院執行</u>。<b>家系圖/家庭樹</b>:收集成員健康狀況、性別、成員間關係、世代結構;<u>不含與朋友的社交關係</u>。</p>"},"6住院反應分離焦慮與治療性遊戲":{"html":"<p><b>分離焦慮</b>三期:<b>抗議期</b>(大哭尖叫、拒絕安撫、攻擊、找父母)→<b>失望/絕望期</b>(安靜沉默、退縮、不感興趣)→<b>去依戀/否認期</b>(表面適應、對父母疏離冷漠)。<b>退化行為</b>(已會如廁卻尿床、要奶嘴)是常見因應;學齡期較少退化。</p><p><b>治療性遊戲</b>目的:宣洩情緒、提供治療訊息、了解感受、增控制感(<u>非分析早期經驗</u>)。類型:<b>情緒宣洩性</b>(敲打/戳黏土宣洩)、<b>指導性</b>(圖片故事解說流程澄清觀念)、戲劇性(布偶扮演)。依發展階段選遊戲。學齡期增控制感=讓其參與治療決策、給有限選擇。</p>"},"7兒童給藥與約束":{"html":"<p><b>口服</b>:藥丸置<b>舌後近咽</b>(非舌尖)、可混少量喜歡食物、<u>勿加牛奶/主食</u>、嬰兒抱起半坐臥沿頰側緩慢滴入、反抗者抱坐膝上一手固定。<b>眼藥</b>:滴下眼瞼結膜囊內側、藥膏內眥往外眥、按內眥淚點1分鐘。<b>耳藥</b>:健側臥患耳朝上、<b>3歲以下往下往後/以上往上往後</b>拉、<u>不直接滴鼓膜</u>。</p><p><b>毛地黃</b>:給藥前測<b>心尖脈1分鐘</b>(嬰<90~100/兒<70暫停)、漏服未超6小時可補、注意<b>低血鉀</b>增毒性。<b>約束</b>:需醫囑+同意書、每15~30分鐘評估鬆開、木乃伊約束嬰兒常用。<b>滴速</b>:精密套管1mL=60gtt;gtt/min=量×滴系數÷分;抽取量=劑量÷濃度。</p>"},"8兒童手術前後護理":{"html":"<p><b>唇裂修補術後</b>:<b>手肘帶約束</b>防手摸傷口。<b>扁桃腺切除術後</b>:頭側一邊利引流、警覺不斷吞嚥(出血)、冰敷含冰塊、<u>勿抽吸口鼻(刺激致出血)</u>。<b>闌尾炎</b>:術前疑闌尾炎<u>不給止痛/瀉劑/熱敷</u>、板狀腹疑腹膜炎、術後半坐臥引流。</p><p><b>截肢(骨肉瘤)</b>:觀察殘肢出血、評估<b>幻肢痛</b>、彈繃塑形;<u>不立即裝永久義肢(待消腫定型)</u>。<b>骨肉瘤</b>好發青春期、長骨幹骺端(膝部),<u>非皆需截肢(現多保肢)</u>。<b>熱性痙攣</b>發作:側臥使分泌物流出、維持呼吸道、<u>勿約束肢體/塞壓舌板</u>,多為良性。學齡前術前準備用布偶示範、誠實適齡。</p>"},"9母嬰產科借題":{"html":"<p><b>家庭為中心母育/產科</b>:LDR樂得兒產房、家庭參與生產、賦權婦女自主選擇、<b>早期出院</b>、親子同室(促依附哺乳,非減護理師負擔)、個別化(非僵化常規)。生產教育:孕婦主動因應、家庭為中心。第一產程潛伏期(開0~3cm)產婦興奮話多。</p><p><b>產後</b>:陰道/會陰血腫早期(24h內)<b>冰敷</b>、後期熱敷坐浴;會陰評估<b>REEDA</b>(A=密合度Approximation)、由前往後擦;<b>產後痛</b>1~3天最明顯後漸減輕。<b>產後DVT</b>:Homan徵象陽性、抗凝、<u>勿熱敷按摩(防肺栓塞)</u>。<b>Meperidine過量呼吸抑制→naloxone(Narcan)拮抗</b>。痛經熱敷下腹。</p>"}};

 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+

}
