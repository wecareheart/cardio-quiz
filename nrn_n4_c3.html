cepted_answers":["A"],"topic":"9母嬰產科借題","topic_num":"兒科護理原則住院心理慢性病與末期","topic_code":"C3","q_num":10,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"興奮話多,樂意分享產兆發生過程","B":"顯得疲累且擔心自己的身體失去控制","C":"大多閉眼休息,宮縮不適時,儘量維持身體不動","D":"身心能量都集中在應付宮縮上,常以單字回應問題"},"img":""},{"id":"114100-N4-13","code":"114100","roc":"114","cat":"N4","catname":"產兒科護理學","num":13,"stem":"有關親子同室(rooming-in)的敘述,下列何者錯誤?","opts":{"A":"護理師應依不同家庭有不同需求,彈性安排親子同室,以滿足每個家庭的需求","B":"世界衛生組織建議產後母親與嬰兒不應該分開,每天24 小時都應該相處在同一房間","C":"親子同室是以家庭為中心的一種照護","D":"執行親子同室主要目的為減輕護理師的負擔"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"topic":"9母嬰產科借題","topic_num":"兒科護理原則住院心理慢性病與末期","topic_code":"C3","q_num":13,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"護理師應依不同家庭有不同需求,彈性安排親子同室,以滿足每個家庭的需求","B":"世界衛生組織建議產後母親與嬰兒不應該分開,每天24 小時都應該相處在同一房間","C":"親子同室是以家庭為中心的一種照護","D":"執行親子同室主要目的為減輕護理師的負擔"},"img":""}],E={"101110-N4-3":{"quick":"兒童虐待敘述正確的是「虐待兒童行為確立後,需提供保護措施,預防進一步傷害」(D)。","detail":{"background":"兒童虐待的處置以「保護兒童、預防再受害」為核心:確立後須立即提供保護措施、隔離施虐者、24小時內通報。施虐者多為「認識的人(照顧者)」,但護理師的職責是「通報與保護」,而非「自行確認施虐者」(由司法/社工調查);發現受虐應「24小時內」通報(非48小時);會談宜「與兒童單獨進行」(非全家性會談,避免施虐者在場)。","options":{"A":"錯。會談宜與兒童單獨進行(非全家會談,施虐者可能在場)。","B":"錯。應24小時內通報(非48小時)。","C":"錯。護理師職責是通報保護(非自行確認施虐者)。","D":"正確。確立後須提供保護措施,預防進一步傷害。"},"sources":["兒少福利與權益保障法","保護"]}},"102110-N4-41":{"quick":"依兒少福利與權益保障法第53條,醫事人員發現兒童被虐待應於「24小時」以內通報主管機關(A)。","detail":{"background":"兒童及少年福利與權益保障法第53條規定:醫事、教育、社工等人員執行業務「知悉兒少遭受虐待、性侵害、施用毒品等情形,應於24小時內向主管機關通報」,屬責任通報。　補充：依兒少福利與權益保障法第53條，醫事、教育、社工等人員於執行業務知悉兒少受虐、施用毒品或其他危害時，應「24小時內」通報主管機關，違者罰鍰。","options":{"A":"正確。應於24小時內通報主管機關。","B":"36小時非法定時限。","C":"48小時非法定時限。","D":"72小時非法定時限。"},"sources":["兒少福利與權益保障法第53條","24小時"]}},"103030-N4-41":{"quick":"護理師知悉兒童施用毒品時,應於「24」小時內向主管機關通報(A)。","detail":{"background":"依兒童及少年福利與權益保障法第53條,知悉兒少「非法施用毒品或管制藥品、遭受身心虐待、性侵害」等情形,責任通報人員應於「24小時內」通報主管機關。　補充：依兒少福利與權益保障法第53條，護理師知悉兒少施用毒品、受虐或其他危害時，應於「24小時內」向主管機關通報，屬責任通報人員。","options":{"A":"正確。應於24小時內通報。","B":"48小時非法定時限。","C":"72小時非法定時限。","D":"96小時非法定時限。"},"sources":["兒少福利與權益保障法第53條","24小時"]}},"107030-N4-41":{"quick":"「兒童及少年福利與權益保障法」所稱兒童及少年是指未滿「18歲」之人(D)。","detail":{"background":"依兒童及少年福利與權益保障法,「兒童」指未滿12歲、「少年」指12歲以上未滿18歲之人,合稱保障對象為「未滿18歲」者。　補充：依兒童及少年福利與權益保障法，「兒童」指未滿12歲、「少年」指12歲以上未滿18歲，合稱兒童及少年指「未滿18歲」之人。","options":{"A":"12歲是「兒童」上限(非全體保障對象)。","B":"14歲非法定界線。","C":"15歲非法定界線。","D":"正確。兒童及少年指未滿18歲之人。"},"sources":["兒少福利與權益保障法","18歲"]}},"107110-N4-54":{"quick":"醫事人員發現兒童遭受猥褻行為或性交,需於「24小時內」通報主管機關(A)。","detail":{"background":"依兒童及少年福利與權益保障法第53條,知悉兒少遭受「猥褻、性交、性侵害、身心虐待、施用毒品」等,責任通報人員應於「24小時內」通報主管機關。　補充：依兒少福利與權益保障法，醫事人員知悉兒少遭受性交、猥褻或其他傷害時，應於「24小時內」通報主管機關，屬法定責任通報。","options":{"A":"正確。需於24小時內通報主管機關。","B":"48小時非法定時限。","C":"72小時非法定時限。","D":"一週非法定時限。"},"sources":["兒少福利與權益保障法第53條","24小時"]}},"108110-N4-52":{"quick":"兒童虐待敘述正確的是「多數兒童虐待的施虐者多為認識的人」(A)。","detail":{"background":"兒童虐待(身體、情緒、性虐待、疏忽)的施虐者「多為兒童認識的人(父母、照顧者、親屬)」。性虐待「常不易由外觀舉止立即發現」(B錯);各類虐待(含嚴重疏忽)皆可能致兒童死亡(C錯,非只身體虐待);疏忽是「照顧不足/缺乏」(非過度保護,D錯)。","options":{"A":"正確。多數施虐者是兒童認識的人。","B":"錯。性虐待常不易由舉止立即發現。","C":"錯。各類虐待(含疏忽)皆可能致死(非只身體虐待)。","D":"錯。疏忽是照顧不足(非過度保護)。"},"sources":["兒少保護","施虐者"]}},"109110-N4-42":{"quick":"較不屬於兒童遭受虐待/疏忽的常見徵象是「表現活潑好動行為」(B)。","detail":{"background":"受虐/疏忽兒童常見徵象:身上多處不同時期瘀傷、身體髒污有異味(疏忽)、衣著與天氣不符(寒冬穿短袖)、退縮畏懼或過度警覺。「活潑好動」是正常表現,非受虐疏忽徵象,故B較不屬於。　補充：兒童受虐/疏忽常見徵象包括不明原因或不符合說詞的外傷、發展遲滯、退縮或攻擊、害怕大人、衛生營養不良；「活潑好動」較不屬受虐徵象。","options":{"A":"是徵象。身上多處瘀傷痕跡(身體虐待)。","B":"較不屬於(本題答案)。活潑好動是正常表現。","C":"是徵象。身體髒污發出異味(疏忽)。","D":"是徵象。寒冬穿短袖(衣著與天氣不符,疏忽)。"},"sources":["兒少保護","徵象"]}},"110110-N4-47":{"quick":"兒童虐待敘述錯誤的是「與受虐兒談話時,需協助指認及責怪施虐者」(C)。","detail":{"background":"與受虐兒談話應「以中性、不誘導、不責怪的方式」收集資訊,「指認與責怪施虐者」由司法/社工調查,且會增加兒童壓力與罪惡感,故C錯誤。其餘正確:可撥110或113保護專線、1歲以下嬰兒任何骨折都須通報評估、施虐者大多是熟識的身邊人。","options":{"A":"正確。可撥打110或113專線。","B":"正確。1歲以下嬰兒任何骨折都須通報。","C":"錯誤(本題答案)。談話應中性不誘導(非指認責怪施虐者)。","D":"正確。施虐者大多是受虐兒熟識的身邊人。"},"sources":["兒少保護","中性會談"]}},"110030-N4-41":{"quick":"依兒少福利與權益保障法第53條,知悉兒童施用毒品/遭受虐待,至遲不得超過「24小時」應通報(B)。","detail":{"background":"兒童及少年福利與權益保障法第53條規定責任通報時限為「24小時內」,故至遲不得超過24小時應向主管機關通報。　補充：依兒少福利與權益保障法第53條，知悉兒少施用毒品、受虐或其他危害情事，至遲「不得超過24小時」應向主管機關通報。","options":{"A":"12小時非法定時限。","B":"正確。至遲不得超過24小時應通報。","C":"36小時非法定時限。","D":"48小時非法定時限。"},"sources":["兒少福利與權益保障法第53條","24小時"]}},"111030-N4-41":{"quick":"兒少福利與權益保障法相關錯誤的是「兒童及少年福利與權益保障法主要保護20歲以下之兒童及青少年」(B)。","detail":{"background":"該法保障對象是「未滿18歲」(兒童<12歲、少年12~未滿18歲)而非20歲以下,故B錯誤。其餘正確:知悉兒少施用毒品應24小時內通報、任何人不得對兒少遺棄/身心虐待/猥褻/性交、孕婦不得吸菸酗酒嚼檳榔施用毒品危害胎兒。","options":{"A":"正確。知悉兒少施用毒品應24小時內通報。","B":"錯誤(本題答案)。保障對象是未滿18歲(非20歲以下)。","C":"正確。任何人不得對兒少遺棄、虐待、猥褻、性交。","D":"正確。孕婦不得吸菸酗酒嚼檳榔施用毒品。"},"sources":["兒少福利與權益保障法","18歲"]}},"111030-N4-44":{"quick":"新生兒搖晃症候群(Shaken Baby Syndrome)錯誤的是「因外力劇烈晃動所造成,是一種可逆的傷害」(B)。","detail":{"background":"搖晃症候群因劇烈搖晃使嬰兒腦部在顱內撞擊,造成「硬腦膜下出血、視網膜出血、腦損傷」,是「不可逆」的嚴重傷害(可致死或永久神經損傷),故B錯誤。其餘正確:屬兒童虐待須通報、初期嗜睡或煩躁不安、抱嬰兒應支撐頭頸部。","options":{"A":"正確。屬兒童虐待表現之一,須通報。","B":"錯誤(本題答案)。搖晃症候群是不可逆的腦傷(非可逆)。","C":"正確。初期會有嗜睡或煩躁不安。","D":"正確。抱起新生兒應給頭頸部適當支撐。"},"sources":["兒少保護","搖晃症候群"]}},"114030-N4-27":{"quick":"兒童遭受虐待的護理處置錯誤的是「受虐者須與父母一起接受問診確認事情發生過程,不能分開會談」(B)。","detail":{"background":"受虐兒會談應「與兒童單獨進行(與可能的施虐者父母分開)」,以免兒童因恐懼而不敢說實話,故B錯誤。其餘正確:儘速將受虐者與施虐者隔離防續受害、執行照護注意隱私、家庭缺乏支持與經濟壓力應提供社會資源。　補充：兒童受虐護理處置應「與兒童單獨會談」(與父母分開)以利誠實陳述、保護兒童、詳實記錄並通報；「須與父母一起問診、不能分開會談」為錯誤。","options":{"A":"正確。儘速隔離受虐者與施虐者。","B":"錯誤(本題答案)。應與兒童單獨會談(非與父母一起、不能分開)。","C":"正確。執行醫療照護注意受虐兒隱私。","D":"正確。缺乏支持與經濟壓力應提供社會資源。"},"sources":["兒少保護","單獨會談"]}},"102110-N4-45":{"quick":"最適合評估青少年疼痛的方式是「對疼痛的主訴」(D)。","detail":{"background":"青少年認知發展成熟,能用「語言主訴」描述疼痛部位、性質與程度,並可用數字量表(0~10)自評,故主訴最適合。哭泣、臉譜量表、表情痛苦是「無法用語言表達的嬰幼兒」的行為觀察指標,對青少年非首選。　補充：青少年具語言與認知能力，疼痛評估最適合採「自我主訴(自評量表如數字或視覺類比量表)」；行為與生理指標為輔，幼兒才主要依行為量表。","options":{"A":"哭泣是嬰幼兒行為觀察(非青少年首選)。","B":"臉譜量表適合學齡前兒童(非青少年首選)。","C":"表情痛苦是行為觀察(非青少年首選)。","D":"正確。青少年能用語言主訴疼痛(最適合)。"},"sources":["新文京《兒科護理學》疼痛評估","主訴"]}},"104100-N4-47":{"quick":"EMLA(局部麻醉藥膏)止痛藥正確的是「在疼痛性醫療處置前的1小時使用」(C)。","detail":{"background":"EMLA(共晶局部麻醉劑乳膏)是「局部(非全身)」麻醉藥,塗於皮膚後須「等約1小時讓藥物滲透」才發揮表皮麻醉效果,用於打針/抽血等處置前減痛。它非快速10分鐘起效、非全身性止痛、也不會成癮。　補充：EMLA(共熔局部麻醉藥膏)用於減輕針扎等處置疼痛，須於處置「前約60分鐘」塗抹並覆蓋封閉敷料使麻醉達真皮層；不可用於破損皮膚。","options":{"A":"錯。EMLA需約1小時起效(非10分鐘內)。","B":"錯。EMLA是局部麻醉(非全身性止痛)。","C":"正確。在疼痛性處置前1小時使用。","D":"錯。EMLA是局部麻醉劑,不會成癮。"},"sources":["新文京《兒科護理學》EMLA","1小時"]}},"105090-N4-67":{"quick":"癌症病童疼痛止痛劑使用原則錯誤的是「不可併用不同類的止痛劑」(D)。","detail":{"background":"癌症疼痛採WHO三階梯,常「合併不同類止痛劑(如非鴉片類+鴉片類+輔助藥)」以增效減副作用,故「不可併用」錯誤。其餘正確:定時給藥維持無痛、口服途徑優先、重度疼痛用嗎啡類。　補充：癌症病童止痛採WHO三階梯、按時給藥、依疼痛程度調整，且「可併用不同類止痛劑(如非鴉片＋鴉片＋輔助藥)」以增效減量；「不可併用」之敘述錯誤。","options":{"A":"正確。定時給予止痛劑維持無痛狀態。","B":"正確。給藥途徑以口服優先。","C":"正確。重度疼痛選嗎啡類止痛劑。","D":"錯誤(本題答案)。可併用不同類止痛劑(增效減副作用)。"},"sources":["新文京《兒科護理學》癌痛","三階梯"]}},"106110-N4-51":{"quick":"嬰幼兒疼痛評估不包括「意識程度」(D)。","detail":{"background":"嬰幼兒無法用語言表達,疼痛評估靠「行為與生理指標」:臉部表情、肢體動作、哭聲、安撫難易、呼吸型態、心跳血壓變化。「意識程度」是神經學評估(非疼痛評估指標),故D不包括。　補充：嬰幼兒疼痛評估採行為與生理指標(臉部表情、肢體動作、哭聲、活動、生命徵象等，如FLACC)；「意識程度」非疼痛評估的向度。","options":{"A":"包括。臉部表情。","B":"包括。呼吸型態(生理指標)。","C":"包括。肢體動作。","D":"不包括(本題答案)。意識程度是神經學評估(非疼痛指標)。"},"sources":["新文京《兒科護理學》疼痛評估","行為"]}},"106110-N4-54":{"quick":"9歲淋巴癌末期骨轉移、髖痛8分,較適當的疼痛護理是「依醫囑給予靜脈注射Morphine,並以枕頭支托右髖骨處」(D)。","detail":{"background":"重度癌痛(8分)應依WHO三階梯給「強效鴉片類(Morphine)」並以枕頭支托患處減壓。Tinten/Ibuprofen(NSAID)對重度骨轉移痛效果不足;骨轉移處「不宜冰敷/熱敷/按摩」(可能加重、有病理性骨折風險);肌注Demerol並按摩患處不適當。","options":{"A":"Tinten(NSAID)對重度骨轉移痛不足,且不宜冰敷患處。","B":"Ibuprofen不足以止重度痛,且不宜熱敷骨轉移處。","C":"肌注Demerol並按摩患處不適當(按摩患處有骨折風險)。","D":"正確。靜脈Morphine止重度痛,枕頭支托患處減壓。"},"sources":["新文京《兒科護理學》癌痛","嗎啡"]}},"107110-N4-66":{"quick":"3歲急性白血病疼痛評估正確的是「以哭泣到高興的臉譜量表,使其挑選能代表自己疼痛的臉譜」(C)。","detail":{"background":"3歲幼兒宜用「臉譜量表(Faces Pain Scale,從笑臉到哭臉)」讓其挑選代表疼痛的臉譜。數字量表(0~10)、語言描述字句(刺痛鈍痛)、簡單描述量表需較高認知與語言能力,適合學齡以上,對3歲不適合。","options":{"A":"0~10數字量表適合學齡以上(非3歲)。","B":"語言描述字句需較高語言能力(非3歲)。","C":"正確。3歲用臉譜量表挑選代表疼痛的臉譜。","D":"簡單描述量表需語言能力(非3歲)。"},"sources":["新文京《兒科護理學》疼痛評估","臉譜"]}},"108110-N4-71":{"quick":"兒癌病童疼痛評估及處置正確的是「可運用轉移注意力的方式(如看卡通),緩解疼痛」(C)。","detail":{"background":"轉移注意力(看卡通、遊戲、音樂)是有效的非藥物止痛輔助。兒童「沒主訴疼痛不代表沒疼痛」(嬰幼兒/退縮兒可能不表達,A錯);應「定時給止痛藥維持無痛」(非主訴時才給,B錯);止痛給藥「口服優先」(非針劑優先,D錯)。","options":{"A":"錯。沒主訴不代表沒疼痛(須觀察評估)。","B":"錯。應定時給藥維持無痛(非主訴時才給)。","C":"正確。轉移注意力(看卡通)可輔助緩解疼痛。","D":"錯。止痛給藥以口服優先(非針劑優先)。"},"sources":["新文京《兒科護理學》癌痛","轉移注意"]}},"109030-N4-67":{"quick":"兒童疼痛敘述錯誤的是「3~5歲的兒童尚無法以語言表達出疼痛的程度」(A)。","detail":{"background":"3~5歲幼兒「已能用簡單語言與臉譜量表表達疼痛程度」(可指認笑哭臉),故「無法以語言表達」錯誤。其餘正確:可用觀察與各種疼痛量表評估、新生兒以全身活動反應疼痛、評估後可依醫囑給止痛藥。　補充：3~5歲兒童雖語言有限，但可用臉譜量表等工具表達疼痛程度；「3~5歲尚無法以語言表達疼痛程度」之敘述錯誤，學齡前兒童已能簡單描述疼痛。","options":{"A":"錯誤(本題答案)。3~5歲已能用臉譜/簡單語言表達疼痛程度。","B":"正確。可用觀察或各種疼痛量表評估。","C":"正確。新生兒以全身身體活動反應疼痛。","D":"正確。評估後可依醫囑給止痛藥物。"},"sources":["新文京《兒科護理學》疼痛","臉譜"]}},"109110-N4-49":{"quick":"生命末期兒童疼痛評估和照護最不適當的是「病童喊痛時需給予meperidine進行止痛」(A)。","detail":{"background":"Meperidine(Demerol)代謝產物normeperidine會蓄積致神經毒性(抽搐),不建議用於需「長期/反覆」止痛的末期病童,故A最不適當;末期癌痛應「定時給嗎啡」。其餘適當:用QUESTT評估兒童疼痛、減少不必要侵入性治療、教家屬非藥物轉移注意。","options":{"A":"最不適當(本題答案)。Meperidine代謝物有神經毒性,不適長期止痛(應用嗎啡)。","B":"適當。用QUESTT評估兒童疼痛。","C":"適當。減少不必要的侵入性治療。","D":"適當。教家屬用非藥物方式轉移注意力。"},"sources":["新文京《兒科護理學》末期疼痛","非Meperidine"]}},"110030-N4-52":{"quick":"意識不清的嬰幼兒疼痛評估最適當的是「FLACC(Face, Legs, Activity, Cry & Consolability)量表」(C)。","detail":{"background":"FLACC量表以「臉部表情、腿、活動、哭、安撫難易」五項行為觀察評分,適合「無法用語言表達(嬰幼兒、意識不清、認知障礙)」者。籌碼片、臉譜、數字量表都需病童「自我表達/配合」,不適合意識不清的嬰幼兒。","options":{"A":"籌碼片量表需病童自評(意識不清不適用)。","B":"臉譜量表需病童挑選(意識不清不適用)。","C":"正確。FLACC行為量表適合意識不清的嬰幼兒。","D":"數字量表需語言認知(意識不清不適用)。"},"sources":["新文京《兒科護理學》FLACC","行為"]}},"111030-N4-49":{"quick":"5歲蜂窩性組織炎,「兒童疼痛概念」發展評估最適當的是「小苗認為,吹吹痛痛的地方,疼痛就會像魔術般的消失」(B)。","detail":{"background":"學齡前(運思前期、5歲)兒童對疼痛是「魔術式/萬物有靈」的概念,相信「吹一吹、神奇地」疼痛就會消失。擔心截肢(身體完整恐懼,較學齡)、用生活經驗調適(較成熟)、能說出病因(具體運思學齡期)皆非5歲運思前期的特徵。","options":{"A":"擔心截肢是較大兒童的身體完整恐懼(非5歲特徵)。","B":"正確。5歲運思前期是魔術式概念(吹一吹就好)。","C":"用生活經驗調適是較成熟階段。","D":"能說出病因是學齡期具體運思(非5歲)。"},"sources":["新文京《兒科護理學》疼痛概念","運思前期"]}},"111110-N4-49":{"quick":"兒童疼痛處理最不適當的是「Acetaminophen是一種非類固醇抗發炎藥物,適合輕度疼痛」(D)。","detail":{"background":"Acetaminophen(普拿疼)是「乙醯胺酚」,屬「解熱鎮痛劑」而「非」非類固醇抗發炎藥(NSAID,如ibuprofen),分類敘述錯誤,故D最不適當。其餘正確:用鴉片類合併緩瀉藥預防便秘、讀故事書分散注意力可用於6歲以上、EMLA侵入性處置前1小時使用。","options":{"A":"正確。鴉片類合併緩瀉藥預防便秘。","B":"正確。讀故事書分散注意力可用於6歲以上。","C":"正確。EMLA侵入性處置前1小時使用。","D":"最不適當(本題答案)。Acetaminophen是解熱鎮痛劑(非NSAID)。"},"sources":["新文京《兒科護理學》止痛藥","分類"]}},"111110-N4-52":{"quick":"與疼痛較無直接關係的生理徵象是「尿量」(A)。","detail":{"background":"疼痛刺激交感神經,使「心跳加快、呼吸加快、血壓上升、瞳孔放大、出汗」,這些是評估疼痛的生理指標。「尿量」受體液與腎功能影響,與疼痛無直接關係,故A。　補充：疼痛時常見生理變化為心跳血壓上升、呼吸加快、出汗、瞳孔放大、肌肉緊張；「尿量」與疼痛較無直接關係，非評估疼痛的生理指標。","options":{"A":"正確(較無關)。尿量與疼痛無直接關係。","B":"心跳加快與疼痛相關。","C":"呼吸加快與疼痛相關。","D":"瞳孔放大與疼痛相關。"},"sources":["新文京《兒科護理學》疼痛","生理指標"]}},"112030-N4-52":{"quick":"FLACC疼痛量表敘述錯誤的是「每項評估分數分為1與2二等級」(D)。","detail":{"background":"FLACC量表五向度(臉、腿、活動、哭、安撫),每項評分「0、1、2三個等級」(總分0~10),非「1與2兩等級」,故D錯誤。其餘正確:可用於評估嬰兒(4個月)、分數越高越痛、雙腳持續踢動評2分。　補充：FLACC量表以臉(Face)、腿(Legs)、活動(Activity)、哭泣(Cry)、可安撫度(Consolability)五向度評估，每項0~2分、總分0~10；「每項分1與2兩等級」敘述錯誤。","options":{"A":"正確。可用來評估4個月大的嬰兒。","B":"正確。分數越高表示越疼痛。","C":"正確。雙腳持續踢動評為2分。","D":"錯誤(本題答案)。每項分0、1、2三等級(非1與2兩等級)。"},"sources":["新文京《兒科護理學》FLACC","三等級"]}},"114170-N4-32":{"quick":"2歲骨折手術換藥的疼痛評估工具最適合「FLACC行為疼痛量表」(D)。","detail":{"background":"2歲幼兒語言表達有限,評估疼痛宜用「FLACC行為量表(臉、腿、活動、哭、安撫)」觀察行為評分。NIPS用於新生兒;VAS視覺類比與NRS數字量表需病童理解抽象刻度/數字(適合學齡以上),對2歲不適合。","options":{"A":"NIPS用於新生兒(非2歲幼兒首選)。","B":"VAS需理解抽象刻度(2歲不適用)。","C":"NRS數字量表需認知數字(2歲不適用)。","D":"正確。2歲用FLACC行為疼痛量表。"},"sources":["新文京《兒科護理學》FLACC","幼兒"]}},"101030-N4-43":{"quick":"高中生常說「希望我死了」,預防自殺不適當的措施是「告訴玉珍,好好唸書不要胡思亂想」(D)。","detail":{"background":"青少年透露死亡念頭是重要的自殺警訊,應「認真看待、傾聽、表達支持、協助尋求專業協助」。「好好唸書不要胡思亂想」是輕忽、否定其感受,會使其更孤立,故D不適當。其餘適當:導師傾聽想法、給予關心支持、說服一起尋求專業協助。","options":{"A":"適當。請導師傾聽她的想法。","B":"適當。給予關心與支持。","C":"適當。說服一起尋找專業協助。","D":"不適當(本題答案)。輕忽其感受(好好唸書別胡思亂想)會使其更孤立。"},"sources":["兒少心理","自殺防治"]}},"101030-N4-53":{"quick":"末期病童臨終最接近死亡的生理表徵是「呼吸逐漸由深變淺」(A)。","detail":{"background":"瀕死期循環與呼吸功能衰退,「呼吸由深變淺、不規則(陳施氏呼吸)」是接近死亡的表徵;末期「尿量減少」(非增加)、「四肢冰冷但末梢循環差」、嗜睡時間「變長」(非變短)。　補充：末期病童最接近死亡的生理表徵包括呼吸由深變淺、出現陳施氏呼吸、四肢冰冷發紺、脈搏弱而不規則、意識下降；「呼吸逐漸由深變淺」反映呼吸中樞衰竭。","options":{"A":"正確。呼吸逐漸由深變淺(不規則)是接近死亡表徵。","B":"錯。末期尿量減少(非增加)。","C":"末期四肢冰冷、循環差(非身體摸起來熱)。","D":"錯。瀕死期睡眠時間變長(非變短)。"},"sources":["新文京《兒科護理學》瀕死","呼吸"]}},"101110-N4-13":{"quick":"維持癌症末期病童身體舒適與生活品質最首要的工作是「症狀控制」(B)。","detail":{"background":"安寧緩和的首要是「症狀控制(尤疼痛、呼吸困難、噁心等)」以維持身體舒適與生活品質;在症狀獲得控制後,再進行溝通、滿足心願等心理社會與靈性照護。安排喪禮屬後事。　補充：癌症末期病童照護以「症狀控制(疼痛、噁心、呼吸困難)」為維持舒適與生活品質的首要工作，採安寧緩和理念、家庭支持與適齡溝通。","options":{"A":"溝通重要但首要是先控制身體症狀。","B":"正確。症狀控制是維持舒適與生活品質的首要。","C":"滿足願望是症狀控制後的心理照護。","D":"安排喪禮屬後事(非首要)。"},"sources":["新文京《兒科護理學》安寧","症狀控制"]}},"101110-N4-14":{"quick":"末期病童疼痛控制正確的是「依循醫囑定時給予止痛藥,並視需要隨時加重劑量」(A)。","detail":{"background":"末期癌痛應「定時(around the clock)給藥維持無痛,並視疼痛程度依醫囑調整(加重)劑量」,不應因怕成癮而限制劑量(末期止痛不以成癮為主要顧慮)。鴉片類常見副作用是「便秘」(非腹瀉);適當止痛不會「加速死亡」(那是迷思)。","options":{"A":"正確。定時給藥並視需要依醫囑加重劑量。","B":"錯。末期止痛不以怕成癮而嚴格限量。","C":"錯。鴉片類常見便秘(非腹瀉)。","D":"錯。適當止痛不會加速死亡(是迷思)。"},"sources":["新文京《兒科護理學》末期疼痛","定時"]}},"102110-N4-54":{"quick":"學齡期以上末期病童分送喜歡的東西給手足朋友(知道將死),護理措施不適當的是「鼓勵病童積極接受治療,不要放棄希望」(D)。","detail":{"background":"此階段病童已接受死亡,護理應「協助情感表達、完成心願、誠實溝通、道別」,而非「鼓勵積極治療不要放棄」(否認其感受、增加痛苦),故D不適當。其餘適當:給予情感表達機會、鼓勵表達需完成的心願、促進親子誠實溝通。","options":{"A":"適當。給予病童情感表達的機會。","B":"適當。鼓勵表達需要完成的心願。","C":"適當。促進親子溝通、誠實面對問題。","D":"不適當(本題答案)。此階段不宜鼓勵積極治療不放棄(否認其感受)。"},"sources":["新文京《兒科護理學》末期","道別"]}},"103030-N4-54":{"quick":"面對剛喪子的父母,最適當的護理措施是「接納父母親的情緒反應,靜靜的陪伴在父母親身邊」(B)。","detail":{"background":"喪慟照護應「接納情緒、靜靜陪伴、同理共在」。不應用「應該欣慰孩子不再痛苦」之類淡化哀傷的話(A);不應催促進行儀式(C);不應逃避離開現場(D)。　補充：面對剛喪子的父母，最適當的護理是接納其情緒、靜靜陪伴、提供隱私與獨處空間、容許哀傷表達；避免說教、轉移注意或急於安慰。","options":{"A":"錯。淡化哀傷(應該欣慰)不適當。","B":"正確。接納情緒、靜靜陪伴。","C":"錯。不應催促進行儀式。","D":"錯。不應逃避離開現場。"},"sources":["新文京《兒科護理學》喪慟","陪伴"]}},"103030-N4-55":{"quick":"瀕死兒童護理錯誤的是「病童主述疼痛時,應給予非鴉片類止痛劑,以防呼吸抑制」(A)。","detail":{"background":"瀕死病童的中重度疼痛應「依疼痛程度給足量止痛(含鴉片類)」維持舒適,不應因怕呼吸抑制而只給非鴉片類致止痛不足,故A錯誤。其餘正確:疲倦時安排安靜不費力的活動、提供明亮環境增加安全感、說話清楚語調適當減少焦慮。","options":{"A":"錯誤(本題答案)。中重度痛應給足量止痛含鴉片類(非只給非鴉片類)。","B":"正確。疲倦時安排安靜而不費力的活動。","C":"正確。提供明亮環境增加安全感。","D":"正確。說話清楚、語調適當減少焦慮。"},"sources":["新文京《兒科護理學》瀕死","足量止痛"]}},"103100-N4-47":{"quick":"4歲看到棺材中爺爺問「為什麼不動躺在那」,此時期對死亡的概念是「死亡是暫時的」(D)。","detail":{"background":"學齡前(2~6歲、運思前期,4歲)對死亡的概念是「暫時、可逆的(像睡著、會再活過來)」,缺乏永久性概念。將死亡擬人化是「學齡期(約6~9歲)」;死亡無法避免/普遍性是「學齡期以後」;完全沒概念是嬰兒期。","options":{"A":"完全沒概念是嬰兒期(非4歲)。","B":"擬人化是學齡期(約6~9歲,非4歲)。","C":"死亡無法避免是學齡期以後。","D":"正確。4歲(運思前期)認為死亡是暫時可逆的。"},"sources":["新文京《兒科護理學》死亡概念","學齡前"]}},"103100-N4-48":{"quick":"10歲白血病末期仍擔心學校作業未完成,依艾瑞克森理論屬「符合現階段勤勉的發展任務」(D)。","detail":{"background":"艾瑞克森(Erikson)學齡期(6~12歲)的發展任務是「勤勉進取 vs 自卑」,關注學業成就與能力。10歲病童擔心作業未完成,正是「勤勉」任務的展現。主動進取是學齡前、自我認同是青少年、正常化非艾瑞克森的發展任務。","options":{"A":"主動進取是學齡前期任務(非學齡期)。","B":"自我認同是青少年期任務。","C":"正常化非艾瑞克森的發展任務。","D":"正確。學齡期任務是勤勉(關注學業成就)。"},"sources":["新文京《兒科護理學》Erikson","勤勉"]}},"105030-N4-51":{"quick":"4歲兒童對死亡概念正確的是「死亡被認為是短暫的分離,可以再活過來」(B)。","detail":{"background":"學齡前(4歲、運思前期)認為死亡是「暫時、可逆(短暫分離、可再活過來)」。對「失落有反應但無死亡概念」是嬰幼兒(<2歲);「視死亡遙遠不可逆」是學齡期以後;「將死人擬人化、躲過魔鬼可避免死亡」是學齡期(約6~9歲)。","options":{"A":"對失落有反應無死亡概念是嬰幼兒(<2歲)。","B":"正確。4歲認為死亡是暫時的、可以再活過來。","C":"視死亡不可逆是學齡期以後。","D":"擬人化(躲過魔鬼)是學齡期(約6~9歲)。"},"sources":["新文京《兒科護理學》死亡概念","學齡前"]}},"105030-N4-53":{"quick":"末期病童臨終階段照護正確的是「維持皮膚清潔乾燥,以增進舒適」(D)。","detail":{"background":"臨終階段以「舒適」為原則:維持皮膚清潔乾燥、口腔護理、減壓擺位。不應「勉強餵食/強迫進食」(瀕死期消化吸收差、易嗆,A錯);不以積極輸液維持血壓(過度輸液增加分泌物與不適,B錯);不以持續抗生素積極治療感染(臨終以症狀緩解為主,C錯)。","options":{"A":"錯。瀕死期不勉強按時餵食(消化差、易嗆)。","B":"錯。不以積極輸液維持血壓(過度輸液增不適)。","C":"錯。臨終以症狀緩解為主(非持續抗生素)。","D":"正確。維持皮膚清潔乾燥增進舒適。"},"sources":["新文京《兒科護理學》臨終","舒適"]}},"106030-N4-55":{"quick":"依娜姬(Nagy)死亡概念理論,不是6歲兒童對死亡概念的是「死亡是一種自然現象」(A)。","detail":{"background":"Nagy理論:約3~5歲認為死亡是暫時可逆;約5~9歲(含6歲)將死亡「擬人化(死神/被抓到才死、只有老人會死、可避免)」;約9歲以後才理解死亡是「普遍、不可逆的自然現象」。故「死亡是自然現象」是9歲以後的概念,不是6歲,A為答案。","options":{"A":"不是(本題答案)。死亡是自然現象是9歲以後概念(非6歲)。","B":"是6歲概念。死亡是可以避免的。","C":"是6歲概念。只有被抓到的人才會死(擬人化)。","D":"是6歲概念。只有老人才會死掉。"},"sources":["新文京《兒科護理學》Nagy","擬人化"]}},"107030-N4-65":{"quick":"病童死亡的護理措施正確的是「提供病童資訊時,避免使用醫學術語與家屬溝通」(C)。","detail":{"background":"與哀傷家屬溝通應「用淺白語言(避免醫學術語)」讓家屬理解。應「誠實使用死亡的字眼」(避免委婉誤導,A錯);沾血衣物一般「不留作紀念」(可清潔或依家屬意願,B不當);應「鼓勵家屬與病童接觸、道別」(非避免接觸,D錯)。","options":{"A":"錯。應誠實使用死亡字眼(避免委婉誤導)。","B":"沾血衣物一般不留作紀念(B不當)。","C":"正確。與家屬溝通避免使用醫學術語(用淺白語言)。","D":"錯。應鼓勵家屬與病童接觸道別(非避免)。"},"sources":["新文京《兒科護理學》死亡照護","淺白"]}},"107110-N4-62":{"quick":"瀕死兒童呼吸由深變淺時,護理措施正確的是「出現臨終嘎聲時可抬高頭部或採側臥」(B)。","detail":{"background":"瀕死出現「死亡喉鳴(臨終嘎聲)」時,因分泌物積聚,可「抬高頭部或側臥」促分泌物引流、減少嗆咳(必要時依醫囑給抗膽鹼藥減分泌)。不應為怕呼吸抑制而不給止痛(A錯);應提供「適度光線」非昏暗(C);不需絕對臥床完全不動(D),以舒適為原則。","options":{"A":"錯。不應因怕呼吸抑制而不給止痛(應維持舒適)。","B":"正確。臨終嘎聲時抬高頭部或側臥利引流。","C":"宜提供適度光線(非昏暗)。","D":"不需絕對臥床完全不動(以舒適為原則)。"},"sources":["新文京《兒科護理學》瀕死","側臥"]}},"108020-N4-66":{"quick":"以家庭為中心的兒童緩和安寧醫療照護錯誤的是「孩童年齡滿7歲後,須給予簽署不施行心肺復甦術同意書」(D)。","detail":{"background":"不施行心肺復甦術(DNR)同意書是由「法定代理人(父母)」簽署,未成年兒童(即使滿7歲)「不是」DNR的簽署人,故D錯誤。其餘正確:緩和醫療減輕末期痛苦給支持性照護、讓病童免除痛苦獲得身心靈安適、視病童與家屬為整體評估其哀傷與靈性需求。","options":{"A":"正確。緩和醫療減輕末期痛苦、給支持性照護。","B":"正確。免除痛苦、獲符合年齡需求的身心靈安適。","C":"正確。視病童及家屬為整體評估哀傷與靈性。","D":"錯誤(本題答案)。DNR由法定代理人簽(未成年兒童非簽署人)。"},"sources":["安寧緩和醫療條例","DNR"]}},"109030-N4-65":{"quick":"兒童安寧緩和醫療照護錯誤的是「兒童安寧緩和醫療不宜於兒童癌症診斷確立時即介入」(D)。","detail":{"background":"安寧緩和醫療應「及早(甚至診斷確立時)即介入」與治癒性治療並行(早期介入提升生活品質),故「不宜於診斷確立時即介入」錯誤。其餘正確:簽DNR前建議與病童充分溝通、依年齡用繪本討論死亡概念、臨終依體力盡力滿足病童心願。","options":{"A":"正確。簽DNR前建議與病童充分溝通。","B":"正確。依年齡用繪本故事討論死亡概念。","C":"正確。臨終依體力滿足病童心願。","D":"錯誤(本題答案)。安寧應及早介入(可於診斷確立時即介入)。"},"sources":["安寧緩和","早期介入"]}},"109110-N4-55":{"quick":"2歲AML末期瀕死病童照顧較不適當的是「害怕失去病童,會積極治療」(B)。","detail":{"background":"瀕死末期照顧應以「症狀控制與舒適、誠實開放溝通、尊重宗教信仰」為原則;「因害怕失去而積極(無效)治療」會增加病童痛苦、違反緩和原則,故B較不適當。其餘適當:開誠溝通表露關懷、症狀控制維持舒適、尊重家庭宗教信仰。","options":{"A":"適當。開誠溝通、表露關懷。","B":"較不適當(本題答案)。因害怕失去而積極無效治療增痛苦。","C":"適當。症狀控制與維持舒適。","D":"適當。尊重家庭的宗教信仰與信念。"},"sources":["新文京《兒科護理學》瀕死","舒適"]}},"110030-N4-58":{"quick":"協助學齡前期手足面對病童瀕死,護理措施正確的是「以繪本或遊戲方式,引導病童手足講出其心中想法」(D)。","detail":{"background":"學齡前手足面對手足瀕死,宜「用繪本/遊戲引導表達感受與想法」(其表達能力有限)。不應隔離減少接觸(A);此年齡「對死亡有模糊概念仍需以適齡方式談」(非不需談,B);出現行為問題應「理解接納」而非單純糾正(C)。","options":{"A":"錯。不應減少手足與病童接觸(可適度道別)。","B":"錯。仍需以適齡方式與其談死亡(非不需談)。","C":"錯。出現行為問題應理解接納(非單純糾正)。","D":"正確。用繪本或遊戲引導手足講出心中想法。"},"sources":["新文京《兒科護理學》手足","繪本"]}},"111030-N4-53":{"quick":"瀕死生命跡象最不適當的是「快速且強而有勁的脈搏」(D)。","detail":{"background":"瀕死期循環衰竭,脈搏是「快而弱、不規則、末梢難觸」,並非「強而有勁」,故D最不適當。其餘是瀕死表徵:失去理智意識混亂、失去大小便控制、呼吸型態改變(潮式呼吸Cheyne-Stokes)。　補充：瀕死生命跡象包括脈搏「快而弱、細而不規則」、呼吸不規則、血壓下降、四肢冰冷發紺；「快速且強而有勁的脈搏」與瀕死表現相反、最不適當。","options":{"A":"是瀕死跡象。失去理智且意識混亂。","B":"是瀕死跡象。失去大小便控制能力。","C":"是瀕死跡象。潮式呼吸(Cheyne-Stokes)。","D":"最不適當(本題答案)。瀕死脈搏快而弱(非強而有勁)。"},"sources":["新文京《兒科護理學》瀕死","脈弱"]}},"111030-N4-56":{"quick":"依娜姬(Nagy)理論,9歲兒童對死亡的概念是「生物體死亡後無法復活」(C)。","detail":{"background":"Nagy理論:約9歲以後(學齡末)兒童理解死亡是「普遍、不可逆、生物體死後無法復活」的成熟概念。死亡暫時是學齡前;探索死亡靈性意義是青少年;死亡只發生在老人是擬人化階段(約5~9歲)。　補充：依娜姬(Nagy)死亡概念發展：約9~10歲後兒童理解死亡是「不可逆、普遍且最終」的——生物體死亡後無法復活；學齡前則視死亡為可逆暫時。","options":{"A":"死亡是暫時是學齡前(非9歲)。","B":"探索死亡靈性意義是青少年。","C":"正確。9歲理解生物體死亡後無法復活(不可逆)。","D":"死亡只發生在老人是擬人化階段(較早)。"},"sources":["新文京《兒科護理學》Nagy","不可逆"]}},"112030-N4-51":{"quick":"9歲病童因妹妹癌末瀕死住院,照護措施較不適當的是「鼓勵他:你已經是大孩子了,一切要自己忍耐下來」(B)。","detail":{"background":"手足面對親人瀕死需要「情感支持與表達機會」,要求其「忍耐、堅強」會壓抑情緒、增加孤立,故B較不適當。其餘適當:安排適當時機探望妹妹、請學校老師協助關懷支持、將手足納入護理照護計畫。　補充：對因手足瀕死而住院的學齡兒童，應誠實適齡說明、鼓勵表達情緒與陪伴；「鼓勵他已是大孩子要自己忍耐」壓抑情緒、不利調適、較不適當。","options":{"A":"適當。安排適當時機探望妹妹。","B":"較不適當(本題答案)。要求忍耐堅強會壓抑情緒。","C":"適當。請學校老師協助關懷與支持。","D":"適當。將手足納入護理照護計畫。"},"sources":["新文京《兒科護理學》手足","情感支持"]}},"112180-N4-34":{"quick":"瀕死兒童家庭的照護不適當的是「提醒父母避免家中其他幼童參與喪禮的過程」(C)。","detail":{"background":"手足(幼童)應「依其意願與適齡方式參與道別/喪禮」有助於哀傷調適,不應一律避免其參與,故C不適當。其餘適當:接納父母哀傷反應鼓勵說出想法、針對父母想知道的給正確資訊、評估父母與病童靈性需求提供支持。　補充：瀕死兒童家庭照護應依年齡讓家中其他幼童適度參與道別與喪禮，協助理解與哀悼；「提醒父母避免其他幼童參與喪禮」剝奪哀傷處理機會、不適當。","options":{"A":"適當。接納父母哀傷,鼓勵說出想法。","B":"適當。針對父母想獲得的資訊給正確資料。","C":"不適當(本題答案)。不應一律避免幼童參與喪禮(可適齡參與道別)。","D":"適當。評估靈性需求,提供支持與諮詢。"},"sources":["新文京《兒科護理學》喪慟","手足參與"]}},"113100-N4-35":{"quick":"病童死亡時支持家人哀傷,較適當的是「營造讓病童的家人有時間與其獨處」(C)。","detail":{"background":"喪慟照護應「給家人與遺體獨處、道別的時間與空間」。不應避免手足探訪(可適齡道別,A);不應要家庭成員壓抑情感(應鼓勵表達,B);哀傷無固定時程,不應強調「不到一年」(D,哀傷因人而異)。　補充：病童死亡時支持家屬哀傷，宜營造隱私、讓家人有時間與病童獨處道別、接納情緒、提供陪伴與後續哀傷資源；避免催促或轉移其哀傷。","options":{"A":"錯。不應避免手足探訪(可適齡道別)。","B":"錯。應鼓勵表達情感(非壓抑)。","C":"正確。營造家人與病童獨處道別的時間。","D":"錯。哀傷無固定時程(非強調不到一年)。"},"sources":["新文京《兒科護理學》喪慟","獨處"]}},"113180-N4-35":{"quick":"7歲面對爺爺過世吵著爺爺在睡覺要去找他說話,談論死亡不適當的是「避免讓小雄參加喪禮」(C)。","detail":{"background":"7歲(學齡期)應「以誠實、適齡方式說明死亡、鼓勵表達、可參與喪禮道別」協助理解死亡的不可逆。「避免參加喪禮」會阻礙其面對與哀傷處理,故C不適當。其餘適當:鼓勵說出心裡話、正確描述死亡狀態、用日常經驗或影片認識死亡。","options":{"A":"適當。鼓勵說出心裡的話和問題。","B":"適當。正確向小雄描述死亡狀態和事實。","C":"不適當(本題答案)。不應避免參加喪禮(可適齡參與道別)。","D":"適當。用日常經驗或影片認識死亡。"},"sources":["新文京《兒科護理學》死亡概念","喪禮"]}},"114100-N4-34":{"quick":"孩子剛死亡父母哀傷哭泣,護理處置較不適當的是「轉移父母喪子的注意力」(D)。","detail":{"background":"喪慟照護應「同理傷痛、依需求照護、陪伴共在」,讓父母「自然表達哀傷」,而非「轉移注意力(壓抑/逃避哀傷)」,故D較不適當。其餘適當:同理父母傷痛、依父母需求給照護、陪伴與共在。　補充：孩子剛死亡父母哀傷哭泣時，應接納情緒、靜靜陪伴、提供隱私與道別時間；「轉移父母喪子的注意力」會壓抑正常哀傷歷程、較不適當。","options":{"A":"適當。同理父母的傷痛。","B":"適當。根據父母的需求給予照護。","C":"適當。陪伴與共在。","D":"較不適當(本題答案)。不應轉移注意力(應讓父母自然表達哀傷)。"},"sources":["新文京《兒科護理學》喪慟","陪伴"]}},"101030-N4-55":{"quick":"慢性病正常化(normalization)錯誤的是「促使病童突破疾病的限制,達到如健康兒童一樣的體能標準」(A)。","detail":{"background":"正常化是「在疾病限制內,讓病童盡量過接近常態的生活、維持有價值的社會角色」,而非要求其達到與健康兒童相同的體能標準(那是不切實際、增加壓力),故A錯誤。其餘正確:以常態眼光對待維持社會角色、以同樣家規教養病童與手足、與病童一起計畫因應健康狀況。","options":{"A":"錯誤(本題答案)。正常化非要求達健康兒童體能標準(應在疾病限制內過常態生活)。","B":"正確。以常態眼光對待、維持有價值社會角色。","C":"正確。以同樣家規與教養態度對待病童與手足。","D":"正確。與病童一起計畫因應健康狀況、調整生活。"},"sources":["新文京《兒科護理學》正常化","常態生活"]}},"104030-N4-54":{"quick":"面對身心障礙孩童雙親表現不悅情緒,最適當的溝通是「接受其情緒(acceptance)」(D)。","detail":{"background":"面對家長的負向情緒,護理師應「接納其情緒(acceptance)」,給予理解與支持空間,有助建立信任與後續照護。與其一起憤怒、告知不需生氣(否定情緒)、當作沒看到(逃避)皆不適當。　補充：面對身心障礙孩童雙親表現不悅情緒，最適當的溝通是「接納(acceptance)其情緒」、傾聽不批判，建立信任後再提供支持與資訊。","options":{"A":"共同表示憤怒不適當(無助益)。","B":"告知不需生氣是否定其情緒。","C":"當作沒看到是逃避。","D":"正確。接受其情緒(acceptance),給予理解支持。"},"sources":["新文京《兒科護理學》溝通","接納"]}},"104100-N4-54":{"quick":"促進慢性病兒童正常化的護理措施錯誤的是「允許病童的生活作息與其他手足不同」(C)。","detail":{"background":"正常化強調「以同樣的家規與作息對待病童與手足」,避免特殊化造成手足關係問題與病童偏差,故「允許作息與手足不同」錯誤。其餘正確:提早告知疾病可能帶來的改變、納入家族成員為照護一員、協助聚焦優點建立自尊。","options":{"A":"正確。提早告知疾病可能帶來的改變。","B":"正確。納入家族成員為照護計畫的一份子。","C":"錯誤(本題答案)。應與手足作息一致(非允許不同,避免特殊化)。","D":"正確。協助聚焦優點與能力建立自尊。"},"sources":["新文京《兒科護理學》正常化","一致作息"]}},"105090-N4-52":{"quick":"10歲為罕病病童姊姊,協助其適應病童疾病,最適當的是「安撫榕榕,鼓勵其隨時提問或參與病童的照護活動」(B)。","detail":{"background":"手足適應慢性病應「鼓勵表達、提問、適度參與照護」減少其被忽略感與焦慮。不應因「對疾病沒興趣就不介入」(A);不應「叫她少探望以免打擾病童」(C,會增加疏離);不應「叫她自我照顧因父母要全力照顧病童」(D,忽略其需求)。","options":{"A":"錯。不應因沒興趣就不主動介入(應主動關懷)。","B":"正確。鼓勵隨時提問或參與病童照護活動。","C":"錯。不應建議少探望(會增加疏離感)。","D":"錯。不應忽略手足需求(別只全力照顧病童)。"},"sources":["新文京《兒科護理學》手足","參與"]}},"110030-N4-67":{"quick":"血友病住院病童及其家屬照顧較適當的是「為提升病童自我照顧能力,應儘早提供居家照護知識」(C)。","detail":{"background":"血友病是終身慢性病,應「及早提供居家照護知識(避免外傷、出血處置、活動選擇)」培養自我照顧能力。不應支持父母「過度保護」(會妨礙發展,A);不應減少健康手足到病房(B,忽略手足);應「避免高碰撞運動但鼓勵適合的活動」(非鼓勵積極參加各類活動,D有出血風險)。","options":{"A":"錯。不應支持過度保護(妨礙發展與正常化)。","B":"錯。不應減少健康手足探視(忽略手足)。","C":"正確。儘早提供居家照護知識提升自我照顧。","D":"血友病應避免高碰撞運動(非鼓勵積極參加各類活動)。"},"sources":["新文京《兒科護理學》血友病","自我照顧"]}},"110110-N4-54":{"quick":"7歲妥瑞氏症(Tourette)被同學嘲笑,護理措施不適當的是「疾病會影響智能發展,宜提供特殊教育」(A)。","detail":{"background":"妥瑞氏症是「神經發展性的抽動障礙(動作/聲語抽動),不影響智能」,多數智能正常,不需特殊教育,故A不適當。其餘適當:評估認知給正向心理支持、教導放鬆減少抽動疲倦、發掘潛能專長建立自信。　補充：妥瑞氏症為神經發展疾病，以不自主動作與聲語抽動為特徵，「不影響智能」；護理應衛教同儕接納、減少壓力；「疾病影響智能、宜特教」之敘述不適當。","options":{"A":"不適當(本題答案)。妥瑞氏症不影響智能(多智能正常,非需特教)。","B":"適當。評估認知程度給正向心理支持。","C":"適當。教導放鬆減少抽動導致的疲倦。","D":"適當。發掘潛能或專長建立自信心。"},"sources":["新文京《兒科護理學》妥瑞氏症","智能正常"]}},"110110-N4-55":{"quick":"1歲半蠶豆症(G-6-PD)兒童與家庭壓力反應護理最不適當的是「應用聯合性遊戲溝通,以緩解其罪惡感」(A)。","detail":{"background":"1歲半幼兒的遊戲發展處於「平行遊戲」階段,尚無法進行「聯合性遊戲」,且「罪惡感」非此年齡幼兒的壓力反應(罪惡感是學齡前較大兒童),故A最不適當。其餘適當:減少與父母分離避免分離焦慮、維持日常作息與規範、用簡潔字句與幼兒溝通。","options":{"A":"最不適當(本題答案)。1歲半是平行遊戲(非聯合性遊戲),且罪惡感非此年齡反應。","B":"適當。減少與父母分離避免分離焦慮。","C":"適當。維持日常生活作息與規範。","D":"適當。治療時用簡潔字句與幼兒溝通。"},"sources":["新文京《兒科護理學》遊戲","平行"]}},"111110-N4-56":{"quick":"2歲6個月罹慢性病一年,壓力反應最適當的是「自主感的建立」(B)。","detail":{"background":"2歲半(幼兒期)的發展任務是「自主 vs 羞愧懷疑」,慢性病與住院易干擾其「自主感的建立」(自己吃、如廁、活動受限制)。身體心像改變是學齡期/青少年、性別角色是學齡前、社交隔離困擾是學齡期以上,皆非幼兒期主要壓力。","options":{"A":"身體心像改變是學齡期/青少年(非幼兒)。","B":"正確。幼兒期任務是自主,慢性病干擾自主感建立。","C":"性別角色建立是學齡前(非幼兒主要)。","D":"社交隔離困擾是學齡期以上。"},"sources":["新文京《兒科護理學》發展","自主"]}},"111110-N4-57":{"quick":"5歲、其3歲弟弟罹慢性病反覆住院,較不是造成小華壓力反應的風險因子是「小華的性別」(A)。","detail":{"background":"手足的壓力風險因子包括:發病前與病童/父母關係不良、父母情緒行為大幅改變、害怕被送走或忽略、年齡與認知。「手足本身的性別」並非主要的壓力風險因子,故A較不是。　補充：手足罹患慢性病反覆住院，健康手足易因關注減少、生活改變而產生壓力反應；風險因子包括年齡、認知、家庭支持等；「手足的性別」較不是壓力風險因子。","options":{"A":"較不是(本題答案)。手足的性別非主要壓力風險因子。","B":"是風險因子。發病前與弟弟或父母關係不良。","C":"是風險因子。父母情緒或行為大幅改變。","D":"是風險因子。害怕被送到其他地方接受照顧。"},"sources":["新文京《兒科護理學》手足","風險因子"]}},"112110-N4-53":{"quick":"慢性疾病兒童與家庭照護原則不適當的是「強調慢性疾病對病童的影響和限制,允許對其過度保護」(B)。","detail":{"background":"慢性病照護應「正常化、避免過度保護」(過度保護妨礙發展與自尊),不應強調限制與允許過度保護,故B不適當。其餘適當:發展融合疾病治療與正常化的家庭策略、鼓勵病童參與治療照護決策、鼓勵與同儕外界互動。　補充：慢性病兒童照護應強調正常化、發揮潛能、避免過度保護；「強調疾病的影響與限制、允許過度保護」會阻礙發展與自主、不適當。","options":{"A":"適當。發展融合治療與正常化的家庭策略。","B":"不適當(本題答案)。不應強調限制並允許過度保護(妨礙發展)。","C":"適當。鼓勵病童參與治療及照護決策。","D":"適當。鼓勵家庭成員與病童和同儕外界互動。"},"sources":["新文京《兒科護理學》慢性病","勿過度保護"]}},"112030-N4-56":{"quick":"慢性病兒童家庭持續性全面性照護較不適當的是「為了讓主要照顧者全面了解,應一次提供疾病照護的所有訊息」(D)。","detail":{"background":"衛教應「分次、循序漸進」提供,一次給太多訊息照顧者無法吸收、增加焦慮,故D較不適當。其餘適當:對父母反應與潛在需求有敏感度、善用傾聽用易懂語言、主動提供共享資訊含社會資源。　補充：慢性病兒童家庭照護應持續、全面、分次提供資訊並評估理解；「一次提供所有疾病照護訊息」易超出負荷、影響吸收、較不適當。","options":{"A":"適當。對父母反應及潛在需求有敏感度。","B":"適當。善用傾聽、用易理解語言提供醫療訊息。","C":"適當。主動提供共享資訊(含社會資源)。","D":"較不適當(本題答案)。應分次循序提供(非一次給所有訊息)。"},"sources":["新文京《兒科護理學》衛教","分次"]}},"102030-N4-48":{"quick":"不屬於家系圖(genogram)評估內容的是「家庭成員社交情形」(D)。","detail":{"background":"家系圖(genogram)以符號呈現「家庭成員的性別、關係、健康狀況、世代結構、遺傳疾病」。「家庭成員社交情形(與家庭外朋友/資源的關係)」屬「生態圖(ecomap)」評估,非家系圖內容,故D不屬於。","options":{"A":"屬於。家庭成員之關係。","B":"屬於。家庭成員之性別。","C":"屬於。家庭成員健康狀況。","D":"不屬於(本題答案)。社交情形屬生態圖(非家系圖)。"},"sources":["新文京《兒科護理學》家系圖","genogram"]}},"102030-N4-52":{"quick":"以家庭為中心的慢性病兒童護理不適當的是「減少與外界互動,以加強家庭的凝聚力」(D)。","detail":{"background":"家庭為中心照護鼓勵「與外界互動、運用社會資源、正常化」,「減少與外界互動」會造成社會隔離與污名化,故D不適當。其餘適當:鼓勵病童父母參與家庭決策、入院評估含家庭互動與資源、將疾病治療納入家庭常規。　補充：以家庭為中心的慢性病兒童照護強調家庭參與決策、維持正常化生活與社會互動；「減少與外界互動以加強凝聚力」會造成社會孤立、不利發展，並不適當。","options":{"A":"適當。鼓勵病童及父母一起參與家庭決策。","B":"適當。入院評估含家庭成員互動及可用資源。","C":"適當。將疾病及治療措施納入家庭常規。","D":"不適當(本題答案)。不應減少與外界互動(會社會隔離)。"},"sources":["新文京《兒科護理學》家庭中心","外界互動"]}},"103030-N4-53":{"quick":"兒童慢性病描述正確的是「以正常化的概念,提供慢性病兒童以家庭為中心的護理」(B)。","detail":{"background":"兒童慢性病照護核心是「正常化+以家庭為中心」。慢性病定義是「持續或反覆、長期(常>3個月)影響日常生活的疾病」,「不一定能治癒」(A錯);定義時程非「1年內超過1個月」(C不精確);長期管理「以家庭/病童自我管理為主」搭配專業協助(非主要依賴專業人員,D錯)。","options":{"A":"錯。慢性病不一定能治癒(是長期管理)。","B":"正確。以正常化提供慢性病兒童家庭中心護理。","C":"慢性病時程定義非「1年內超過1個月」(不精確)。","D":"錯。長期管理以家庭自我管理為主(非主要依賴專業人員)。"},"sources":["新文京《兒科護理學》慢性病","正常化"]}},"103100-N4-42":{"quick":"家庭樹(family tree)需收集的資料是「①家庭成員健康狀態+③家庭成員性別(即13)」(B)。","detail":{"background":"家庭樹/家系圖(genogram)收集「家庭成員的性別、健康狀態、世代關係、遺傳疾病」。②成員間關係強弱與④與朋友的關係屬「生態圖(ecomap)」內容,非家系圖,故為①③(13)。　補充：家庭樹/家系圖(family tree/genogram)以符號呈現家庭成員的「性別、關係、健康狀態與遺傳疾病」等資料，用於評估家庭結構與健康風險。","options":{"A":"12含②關係強弱(屬生態圖)。","B":"正確。①健康狀態+③性別(13)。","C":"24含②④(屬生態圖)。","D":"34含④與朋友關係(屬生態圖)。"},"sources":["新文京《兒科護理學》家系圖","13"]}},"104030-N4-52":{"quick":"照顧身心障礙兒童及其家庭的概念不適當的是「保護兒童減少其與外界的互動,以避免社會污名化」(D)。","detail":{"background":"應「鼓勵互動、運用正常化與賦權」促進兒童發展與融入,「減少與外界互動」反而造成社會隔離,故D不適當。其餘適當:促進自我覺醒完成發展任務、運用正常化理念對待兒童與家庭、運用賦權促家庭成員參與照護。　補充：照顧身心障礙兒童及家庭應促進其融入社會、正常化生活與社會參與；「保護兒童減少與外界互動以避免污名」會造成孤立、不利發展，並不適當。","options":{"A":"適當。促進自我覺醒完成各階段發展任務。","B":"適當。運用正常化理念對待兒童與整個家庭。","C":"適當。運用賦權促進家庭成員參與照護。","D":"不適當(本題答案)。不應減少與外界互動(會社會隔離)。"},"sources":["新文京《兒科護理學》身心障礙","互動"]}},"105030-N4-46":{"quick":"「以家庭為中心的照護」正確的是「為了增強照護能力,鼓勵父母或手足一起參與照護病童的計畫」(D)。","detail":{"background":"家庭中心照護鼓勵「家庭成員參與照護與決策、開放資訊、彈性探視」。不應「過濾訊息隱瞞病情」(A);不應「避免手足探病」(可在感染控制下適度探視,B);應「彈性探視」而非嚴格限制會客時間(C)。　補充：以家庭為中心的照護強調家庭是孩子生活的常數，應「鼓勵父母與手足參與照護計畫」、尊重家庭選擇、提供資訊與支持以增強照護能力。","options":{"A":"錯。不應過濾隱瞞病情(應開放溝通)。","B":"錯。不應一律避免手足探病(可適度探視)。","C":"錯。應彈性探視(非嚴格限制會客時間)。","D":"正確。鼓勵父母或手足一起參與照護計畫。"},"sources":["新文京《兒科護理學》家庭中心","參與"]}},"106030-N4-43":{"quick":"5歲上呼吸道感染住院,以家庭為中心照護錯誤的是「為賦權父母照顧能力,要求須在院執行病童的照護」(D)。","detail":{"background":"賦權是「協助父母有能力與選擇照護」,而非「要求(強制)父母在院執行照護」,強制違反賦權的自主精神,故D錯誤。其餘正確:鼓勵家庭成員表達想法、評估家人不能參與照顧的原因、教導父母共同參與照護知識技巧。　補充：以家庭為中心照護應「鼓勵」而非「要求」父母參與照顧，尊重家庭意願與能力、提供彈性參與；「要求須在院執行病童照護」屬強制、不符理念、為錯誤。","options":{"A":"正確。鼓勵家庭成員表達對病童罹病的想法。","B":"正確。評估家人不能參與照顧病童的原因。","C":"正確。教導父母共同參與照護知識及技巧。","D":"錯誤(本題答案)。賦權是協助有能力選擇(非要求強制在院照護)。"},"sources":["新文京《兒科護理學》賦權","自主"]}},"109030-N4-55":{"quick":"3歲重積癲癇入住加護病房,不是以家庭為中心照護的是「由於治療的複雜性,應避免父母參與治療計畫與決策」(C)。","detail":{"background":"家庭中心照護應「讓父母參與治療計畫與決策」,不應因治療複雜就排除父母,故C不是家庭中心照護。其餘是:評估個別需求提供彈性探訪、父母有意願時參與治療檢查過程、隨時與父母分享資訊含科學新知。　補充：以家庭為中心的加護病房照護應鼓勵父母參與治療決策與照顧、提供資訊與支持；「因治療複雜而避免父母參與決策」與理念相反、為錯誤。","options":{"A":"是家庭中心。評估個別需求,提供彈性探訪。","B":"是家庭中心。父母有意願時參與治療及檢查。","C":"不是(本題答案)。不應排除父母參與治療決策。","D":"是家庭中心。隨時與父母分享資訊含科學新知。"},"sources":["新文京《兒科護理學》家庭中心","參與決策"]}},"110030-N4-1":{"quick":"以家庭為中心的照護正確的是「家中每位成員的需求皆需要被注意及尊重」(A)。","detail":{"background":"家庭中心照護視「整個家庭為照護單位」,每位成員(產婦、配偶、手足)的需求都應被注意與尊重。不只讓準父親陪產(可更多家人參與,B);不只考量婦女需求(應含家庭,C);婚姻品質與支持系統「有關」(影響適應,D錯)。","options":{"A":"正確。家中每位成員的需求皆需被注意及尊重。","B":"錯。不只準父親可陪產(可更多家人參與)。","C":"錯。不只考量婦女(應含整個家庭需求)。","D":"錯。婚姻品質與支持系統有關(影響適應)。"},"sources":["新文京《產科護理學》家庭中心","整體"]}},"110030-N4-55":{"quick":"2歲重度海洋性貧血、母親印尼裔回教徒新住民,以家庭為中心護理最適當的是「在住院期間,儘量與家庭的文化習慣和常規保有一致性」(C)。","detail":{"background":"文化敏感的家庭中心照護應「尊重並儘量配合家庭的文化習慣與常規」,在安全前提下保持一致性。不應強加台灣本土文化(A);也不需「完全配合所有文化要求」(B,須在醫療安全範圍內);語言溝通應「提供翻譯資源(非要求母親自行找家人翻譯)」(D)。","options":{"A":"錯。不應強加台灣本土文化為主。","B":"錯。非完全配合所有文化(須在醫療安全範圍內)。","C":"正確。儘量與家庭文化習慣常規保持一致性。","D":"語言溝通應提供翻譯資源(非要母親自找家人翻譯)。"},"sources":["新文京《兒科護理學》文化照護","一致性"]}},"111030-N4-46":{"quick":"賦權(empowerment)的定義正確的是「醫療人員與家庭互動過程中,讓家庭成員獲得自我控制感,進而增加優勢、能力及行動」(B)。","detail":{"background":"賦權(empowerment)是「透過互動讓家庭獲得自我控制感、增能(增加優勢、能力與行動力)」,主動管理健康。A描述的是「家庭中心照護的相互利益」;C的「護理師當發言人」與D的「高科技輔助溝通」皆非賦權定義。","options":{"A":"此為家庭中心照護的相互利益(非賦權定義)。","B":"正確。讓家庭獲得自我控制感、增加能力與行動(賦權)。","C":"護理師當發言人非賦權定義。","D":"高科技輔助溝通非賦權定義。"},"sources":["新文京《兒科護理學》賦權","自我控制感"]}},"112030-N4-42":{"quick":"「家庭為中心的照護」應用於加護病房正確的是「鼓勵並支持病童父母或手足有機會時參與共同照顧」(A)。","detail":{"background":"即使在加護病房,家庭中心照護仍「鼓勵父母或手足有機會時參與照顧、彈性探視」。不應嚴格規定會客時間(B);不應為防感染就一律避免家人探視(C);兒童青少年住院溝通對象除父母外「也應依年齡向病童本人說明」(非只以父母為對象,D)。","options":{"A":"正確。鼓勵父母或手足有機會時參與共同照顧。","B":"錯。不應嚴格規定會客時間(應彈性)。","C":"錯。不應一律避免家人探視。","D":"錯。應依年齡也向病童本人說明(非只對父母)。"},"sources":["新文京《兒科護理學》家庭中心","ICU"]}},"112180-N4-28":{"quick":"賦權(empowerment)在兒科護理應用錯誤的是「強調醫護人員有權利決定病童照護的選擇」(A)。","detail":{"background":"賦權強調「家庭有能力與權利決定病童的健康照護」,醫護是「協同夥伴」而非「替家庭決定」,故A錯誤。其餘正確:病童及家人有能力與行動促進健康、建立醫護與家人的夥伴關係協同照護、家人有權利與能力決定家庭成員的健康需求。","options":{"A":"錯誤(本題答案)。賦權是讓家庭決定(非醫護有權決定)。","B":"正確。病童及家人有能力與行動促進健康。","C":"正確。建立醫護與家人的夥伴關係協同照護。","D":"正確。家人有權利與能力決定家庭成員健康需求。"},"sources":["新文京《兒科護理學》賦權","夥伴"]}},"102110-N4-48":{"quick":"10歲腎病症候群住院,較不會出現的住院反應是「表現退化性行為」(B)。","detail":{"background":"退化行為(退回較幼稚的行為,如尿床、吸手指)是「學齡前/幼兒」常見的住院反應;10歲學齡期兒童較會以「擔心無聊、表現勇敢、擔心疾病與死亡」表現,較不會明顯退化,故B較不會出現。　補充：學齡期(6~12歲)住院反應多為擔心身體完整、控制感喪失、害怕與同儕分離；「明顯退化行為」較常見於嬰幼兒與學齡前期，學齡期較不會出現。","options":{"A":"會。覺得住院很無聊(學齡期)。","B":"較不會(本題答案)。退化行為多見於幼兒/學齡前(非10歲)。","C":"會。表現很勇敢的樣子(學齡期)。","D":"會。詢問會不會死(學齡期對疾病死亡的關注)。"},"sources":["新文京《兒科護理學》住院反應","退化"]}},"103100-N4-55":{"quick":"4歲已完成大小便訓練,住院後把大便解在尿片上,屬「退行性行為」(C)。","detail":{"background":"退行性(退化)行為是兒童在壓力(住院)下「退回較早發展階段的行為」,如已會如廁卻又尿床/解在尿片,屬正常的住院壓力反應。儀式化行為是強迫重複、不合作是反抗、自卑是負向自我評價,皆非此例。　補充：退化行為(regression)指住院兒童因壓力退回較早發展階段(如已戒尿布卻又把大便解在尿片上)，是常見的壓力因應，多為暫時、應接納不責備。","options":{"A":"儀式化行為是強迫性重複(非此例)。","B":"不合作行為是反抗(非退化)。","C":"正確。退回較早階段行為(解在尿片)=退行性行為。","D":"自卑性行為是負向自我評價(非此例)。"},"sources":["新文京《兒科護理學》住院反應","退化"]}},"103100-N4-65":{"quick":"5歲疑似細菌性支氣管炎住院,血液氣體分析錯誤的是「pH=7.30,PaO2=85,PaCO2=50,判斷為正常範圍」(D)。","detail":{"background":"正常ABG:pH 7.35~7.45、PaCO2 35~45、PaO2 80~100。本例pH 7.30(偏酸)、PaCO2 50(偏高)→「呼吸性酸中毒」,非正常範圍,故D錯誤。其餘正確:ABG是重要肺功能指標、採血需與肝素混合抗凝、置於碎冰減少代謝。","options":{"A":"正確。ABG可了解肺部氣體交換。","B":"正確。採集動脈血需與空針內肝素混合(抗凝)。","C":"正確。空針置於碎冰減少血液代謝反應。","D":"錯誤(本題答案)。pH7.30/PaCO2 50是呼吸性酸中毒(非正常)。"},"sources":["新文京《兒科護理學》ABG","呼吸性酸中毒"]}},"104100-N4-45":{"quick":"4歲住院期間分離焦慮最常見的行為反應是「生氣、打人、拒絕合作」(A)。","detail":{"background":"幼兒/學齡前(4歲)分離焦慮第一期「抗議期」最常見,表現「大哭大鬧、生氣、打人、拒絕他人安撫與合作、強烈尋找父母」。自認長大要勇敢、擔心身體改變、擔心功課是學齡期以上的反應。　補充：學齡前(約4歲)住院兒童分離焦慮最常見的行為反應為「抗議期」——大哭大鬧、生氣打人、拒絕合作、緊黏父母；之後可能進入失望與去依戀期。","options":{"A":"正確。生氣、打人、拒絕合作(抗議期)是4歲最常見反應。","B":"自認長大要勇敢是學齡期反應。","C":"擔心身體改變是較大兒童。","D":"擔心功課是學齡期反應。"},"sources":["新文京《兒科護理學》分離焦慮","抗議期"]}},"104100-N4-48":{"quick":"不是治療性遊戲(Therapeutic play)目的的是「分析早期經驗對病童的影響」(D)。","detail":{"background":"治療性遊戲的目的是「宣洩情緒、提供治療相關訊息(指導性)、了解病童感受、降低焦慮、增加掌控感」。「分析早期經驗對病童的影響」是心理分析/治療的範疇,非治療性遊戲的目的,故D不是。　補充：治療性遊戲目的在協助病童表達情緒、宣洩壓力、了解與配合醫療、降低恐懼；「分析早期經驗對病童的影響」屬心理分析範疇，非治療性遊戲目的。","options":{"A":"是目的。宣洩情緒。","B":"是目的。提供治療相關訊息(指導性)。","C":"是目的。了解病童的感受。","D":"不是(本題答案)。分析早期經驗是心理分析(非治療性遊戲目的)。"},"sources":["新文京《兒科護理學》治療性遊戲","目的"]}},"108020-N4-60":{"quick":"8個月支氣管炎住院,口服藥物護理指導正確的是「用姆指壓其下顎(下巴),以便張口」(B)。","detail":{"background":"餵嬰兒口服藥可「輕壓下顎(下巴)使其張口」,將藥沿「口腔側面(頰側)少量緩慢」餵入並抱起半坐臥,避免嗆入。不應躺臥餵藥(易嗆,A);藥應由「口腔側面」非中間正對咽喉(C);滴入應「緩慢」非快速(D,快速易嗆吐)。","options":{"A":"錯。應抱起半坐臥餵藥(非躺臥,躺臥易嗆)。","B":"正確。用姆指輕壓下顎使其張口。","C":"應由口腔側面餵(非中間,中間易嗆咽喉)。","D":"錯。應緩慢滴入(非快速,快速易嗆吐)。"},"sources":["新文京《兒科護理學》嬰兒給藥","側面"]}},"109030-N4-44":{"quick":"護理師運用治療性遊戲(Therapeutic play)錯誤的是「透過遊戲以了解兒童內心想法,以治療其心理或行為疾病」(A)。","detail":{"background":"治療性遊戲是「協助住院兒童表達、了解、適應與準備」的護理措施,並非用以「治療心理或行為疾病(那是遊戲治療師的心理治療)」,故A錯誤。其餘正確:作為溝通橋樑了解住院行為反應、具指導性協助認識身體或疾病、用角色扮演達學習與情緒表達。","options":{"A":"錯誤(本題答案)。治療性遊戲非用以治療心理疾病(那是遊戲治療)。","B":"正確。作為溝通橋樑了解住院行為反應。","C":"正確。具指導性協助認識身體或疾病。","D":"正確。角色扮演達學習與情緒表達功能。"},"sources":["新文京《兒科護理學》治療性遊戲","非心理治療"]}},"109030-N4-45":{"quick":"8歲敗血病住加護病房,很在意父母是否準時探視、不斷問探病時間,屬「分離焦慮」(C)。","detail":{"background":"住院兒童「不斷詢問父母何時來、在意探視時間」反映其因與父母分離而焦慮,屬分離焦慮的表現(學齡期兒童的分離焦慮較含蓄,以擔心探視時間呈現)。非單純學認識時間、非自我中心、非身體心像議題。　補充：學齡期(8歲)住院於加護病房，很在意父母是否準時探視、不斷詢問探病時間，反映與依附對象分離的焦慮(分離焦慮)；應安排規律探視與資訊告知。","options":{"A":"非單純學習時間概念。","B":"非自我中心。","C":"正確。在意父母探視時間反映分離焦慮。","D":"非在意身體心像。"},"sources":["新文京《兒科護理學》分離焦慮","學齡期"]}},"110030-N4-42":{"quick":"3歲急性腸胃炎住院,顯示處於分離焦慮抗議期的行為是「持續性哭叫」(A)。","detail":{"background":"分離焦慮抗議期:「持續大哭大叫、強烈尋找父母、拒絕他人」。吸手指、白天尿床、吃奶嘴是「退化行為」(壓力下退回較早階段),非抗議期的代表行為,故抗議期是持續性哭叫。　補充：分離焦慮三期：抗議期(大哭大叫、拒絕他人、緊黏父母)、失望期(沉默退縮、冷漠)、去依戀期(表面適應)；「持續性哭叫」屬抗議期。","options":{"A":"正確。持續性哭叫是抗議期表現。","B":"吸手指是退化行為(非抗議期)。","C":"白天尿床是退化行為(非抗議期)。","D":"吃奶嘴是退化行為(非抗議期)。"},"sources":["新文京《兒科護理學》分離焦慮","抗議期"]}},"111030-N4-60":{"quick":"9歲抽搐住院,護理師用腦波檢查圖片與故事解說流程並澄清錯誤觀念,此為「指導性遊戲」(A)。","detail":{"background":"用圖片、故事、模型「解說檢查/治療流程、澄清錯誤觀念、提供資訊」屬「指導性(教育性)治療性遊戲」。情緒宣洩性遊戲是發洩情緒(如敲打)、戲劇性遊戲是角色扮演、生理健康促進性遊戲是促進功能,皆非此例。　補充：指導性遊戲(治療性遊戲的一種)由護理師以圖片、故事、模型向病童解說檢查/治療流程、澄清誤解、減輕恐懼；如以腦波圖片與故事說明檢查即屬之。","options":{"A":"正確。解說流程、澄清觀念=指導性(教育性)遊戲。","B":"生理健康促進性遊戲是促進身體功能(非此例)。","C":"情緒宣洩性遊戲是發洩情緒(非此例)。","D":"戲劇性遊戲是角色扮演(非此例)。"},"sources":["新文京《兒科護理學》治療性遊戲","指導性"]}},"111110-N4-42":{"quick":"自閉症兒童護理照護較正確的是「有自傷行為的自閉兒,必要時可執行適當的約束」(B)。","detail":{"background":"自閉症兒童若有「自傷行為」,為保護其安全,必要時可「依規範執行適當約束」。低功能自閉症「語言表達理解能力多異常」(非正常,A);自閉症常「排斥身體碰觸」(增加碰觸不適合,C);應「維持固定一致的環境與常規」(經常改變環境會增焦慮,D)。","options":{"A":"錯。低功能自閉症語言能力多異常(非正常)。","B":"正確。有自傷行為必要時可適當約束(保護安全)。","C":"錯。自閉症常排斥身體碰觸(非增加碰觸)。","D":"錯。應維持固定環境(經常改變增焦慮)。"},"sources":["新文京《兒科護理學》自閉症","約束"]}},"111110-N4-47":{"quick":"8歲右手打點滴不便、不願打針吃藥,增進「自我控制感」最適當的是「讓小玲表達及討論可以參與治療的方式」(A)。","detail":{"background":"學齡期兒童增進「自我控制感」最有效是「讓其表達意見、參與治療決策(如選擇打針的手、時間)」,給予掌控感。讓同學來陪、聊卡通轉移、照顧者陪伴是支持/分散注意,但「增進自我控制感」最直接的是讓其參與決策,故A。","options":{"A":"正確。讓孩子表達討論可參與治療的方式(增掌控感)。","B":"同學陪伴是社會支持(非直接增自我控制感)。","C":"聊卡通是轉移注意(非增自我控制感)。","D":"照顧者陪伴是情感支持(非直接增自我控制感)。"},"sources":["新文京《兒科護理學》學齡期","自我控制"]}},"112030-N4-41":{"quick":"自閉症(Autism)病童住院,護理措施最適當的是「採一對一的照護,且避免過度視聽騷擾」(B)。","detail":{"background":"自閉症兒童對環境刺激敏感,宜「一對一照護、減少過度視聽刺激、維持固定環境與常規、事先告知說明」。應「簡化而非一直密集互動」(A過度);重複固著行為應「理解不強行制止」(C);應「事先告知與準備」減少暴怒(非不告知,D)。","options":{"A":"過度密集互動會增自閉兒壓力(非最適當)。","B":"正確。一對一照護、避免過度視聽騷擾。","C":"錯。固著行為應理解(非強行制止)。","D":"錯。應事先告知說明(減少暴怒,非不告知)。"},"sources":["新文京《兒科護理學》自閉症","低刺激"]}},"112030-N4-49":{"quick":"3歲車禍住加護病房一直哭喊「走開,我要媽媽」,屬分離焦慮的「抗議期」(D)。","detail":{"background":"分離焦慮抗議期:「大哭大鬧、強烈尋找父母、拒絕他人(走開、我要媽媽)」。失望期是安靜退縮、去依戀期是表面適應對父母冷淡、關係重建是恢復期,皆非此例的強烈抗拒表現。　補充：分離焦慮「抗議期」表現為大哭大叫、呼喊要父母、拒絕他人安撫、肢體抵抗；如3歲幼兒對護理師喊「走開，我要媽媽」即屬抗議期。","options":{"A":"失望期是安靜退縮悲傷(非大哭抗拒)。","B":"去依戀期是表面適應、對父母冷淡。","C":"關係重建期非早期反應。","D":"正確。大哭喊走開要媽媽=抗議期。"},"sources":["新文京《兒科護理學》分離焦慮","抗議期"]}},"112110-N4-50":{"quick":"2歲入住加護病房第二天哭喊要媽媽、拒絕安撫、出現身體攻擊,屬分離焦慮的「抗議期」(A)。","detail":{"background":"分離焦慮抗議期:「大哭大鬧、拒絕他人安撫、身體攻擊、強烈尋找父母」。否認期/去依戀是表面適應對父母冷淡、絕望(失望)期是安靜退縮、關係重建是恢復,皆非此例的強烈抗拒。　補充：分離焦慮「抗議期」表現為大哭呼喊要父母、拒絕護理師安撫、出現身體攻擊；如2歲幼兒入加護病房第二天哭喊要媽媽並抵抗即屬抗議期。","options":{"A":"正確。哭喊要媽媽、拒絕安撫、身體攻擊=抗議期。","B":"否認期是表面適應(非強烈抗拒)。","C":"絕望(失望)期是安靜退縮。","D":"關係重建期非早期反應。"},"sources":["新文京《兒科護理學》分離焦慮","抗議期"]}},"113030-N4-29":{"quick":"4歲靜脈注射與腹部手術,護理師與其說話最不適當的是「切開你的肚子才能把蟲拿出來」(C)。","detail":{"background":"與學齡前(4歲)兒童溝通應「用具體、非威脅、不引發恐懼的語言」。「切開肚子把蟲拿出來」過於驚嚇、易引發恐懼與誤解(以為肚子有蟲),故C最不適當。其餘適當:對玩偶說害怕的事(投射表達)、打針時一起慢慢呼吸(放鬆)、按壓拔針處才不會流血(具體指導)。","options":{"A":"適當。對玩偶說害怕的事(投射式表達)。","B":"適當。打針時一起慢慢吸氣吐氣(放鬆)。","C":"最不適當(本題答案)。切開肚子拿蟲過於驚嚇(引發恐懼)。","D":"適當。按著拔針處才不會流血(具體指導)。"},"sources":["新文京《兒科護理學》溝通","非威脅"]}},"113100-N4-29":{"quick":"2歲住院出現分離焦慮,協助宣洩負向情緒較合適的治療性遊戲是「木槌敲紙箱」(A)。","detail":{"background":"2歲幼兒宜用「動作宣洩型遊戲(如木槌敲打、捏黏土)」發洩負向情緒(其語言與象徵能力有限)。布偶戲劇性遊戲、把玩聽診器(熟悉醫療用物)、扮家家酒需較高象徵與社會能力,較適合學齡前較大兒童,對2歲宣洩情緒非首選。","options":{"A":"正確。木槌敲紙箱(動作宣洩)適合2歲發洩情緒。","B":"布偶戲劇性遊戲需較高象徵能力(較大兒童)。","C":"把玩聽診器是熟悉醫療用物(非宣洩情緒首選)。","D":"扮家家酒需社會象徵能力(較大兒童)。"},"sources":["新文京《兒科護理學》治療性遊戲","宣洩"]}},"113180-N4-32":{"quick":"3歲住加護病房第4天,安靜沉默、對病房事物不感興趣,分離焦慮處於「失望期(despair)」(B)。","detail":{"background":"分離焦慮第二期「失望期」:孩子由抗議轉為「安靜、退縮、沉默、悲傷、對環境冷漠不感興趣」。抗議期是大哭抗拒、去依戀期是表面適應對父母冷淡、過渡期非標準分期,故此例(安靜沉默冷漠)是失望期。　補充：分離焦慮「失望期(despair)」表現為安靜、沉默、退縮、對周遭與活動失去興趣、食慾下降；繼抗議期之後出現，反映持續分離的無助。","options":{"A":"抗議期是大哭抗拒(非安靜)。","B":"正確。安靜沉默、對事物冷漠=失望期。","C":"去依戀期是表面適應、對父母冷淡。","D":"過渡期非標準分離焦慮分期。"},"sources":["新文京《兒科護理學》分離焦慮","失望期"]}},"114170-N4-29":{"quick":"3歲住院常鬧脾氣,設計治療性遊戲降低住院反應最適當的是「小華會與玩伴互換玩具,可安排需一起合作完成的遊戲」?——本題答B。","detail":{"background":"本題官方答案為B。3歲幼兒遊戲發展約在「平行→聯合遊戲」過渡,會與玩伴「互換玩具/簡單互動(聯合遊戲)」,可安排「需一起完成的合作性遊戲」促進互動與情緒表達。3歲非完全獨自玩(A不需玩伴不當);也尚未到有規則的「合作競爭」遊戲(C/D是學齡期),本題以B為最適當。","options":{"A":"錯。不應認定3歲只獨自玩不需玩伴(已有聯合遊戲)。","B":"正確(本題答案)。3歲會互換玩具,可安排一起合作的遊戲。","C":"敘述與聯合/合作遊戲發展不符。","D":"有規則的合作競爭遊戲是學齡期(非3歲)。"},"sources":["新文京《兒科護理學》遊戲","聯合"]}},"101110-N4-19":{"quick":"3個月唇裂修補術後宜採的約束法是「手肘帶約束法」(A)。","detail":{"background":"唇裂修補術後須防嬰兒手碰觸/抓傷臉部傷口,採「手肘約束法(elbow restraint)」限制手肘彎曲使手無法摸到臉,同時保留肢體活動。床護帶、結繩、木乃伊(全身)約束過度或不適用此情境。　補充：唇裂修補術後為避免嬰兒抓傷或碰撞傷口，宜採「手肘約束法(肘關節伸直固定)」使手無法觸及臉部，同時保留肢體活動；並避免趴睡壓迫傷口。","options":{"A":"正確。手肘帶約束法防手摸到臉部傷口。","B":"床護帶約束非防手碰臉。","C":"結繩約束不適用。","D":"木乃伊約束(全身)過度,不適用。"},"sources":["新文京《兒科護理學》唇裂","手肘約束"]}},"101110-N4-21":{"quick":"9歲扁桃腺切除術後2小時、不斷吞嚥、喉嚨痛,錯誤的措施是「使用抽痰設備,自口、鼻抽吸分泌物」(D)。","detail":{"background":"扁桃腺術後「不可用抽痰設備從口鼻抽吸」(會刺激、牽扯傷口致出血),故D錯誤;且「不斷吞嚥」本身就是出血警訊須評估傷口。其餘正確:頭側向一邊並檢查咽喉傷口、局部冰敷或含冰塊、評估疼痛依醫囑給止痛。　補充：扁桃腺切除術後「不斷吞嚥」常為出血徵象須觀察；護理採俯臥或側臥利引流、給冰冷流質、避免咳嗽與粗硬食物；「以抽痰管自口鼻抽吸」會刺激傷口引發出血、為錯誤。","options":{"A":"正確。頭側向一邊並檢查咽喉部傷口。","B":"正確。局部冰敷或含少量冰塊(止血止痛)。","C":"正確。評估疼痛強度依醫囑給止痛劑。","D":"錯誤(本題答案)。不可抽痰(刺激牽扯傷口致出血)。"},"sources":["新文京《兒科護理學》扁桃腺術後","勿抽吸"]}},"105030-N4-47":{"quick":"2個月腹部手術後第1天疼痛評估的指標是「臉部扭曲、皺眉」(A)。","detail":{"background":"2個月嬰兒無法言語,術後疼痛以「行為觀察」評估:臉部扭曲皺眉、哭聲、肢體緊繃踢動、躁動、生理徵象變化。其中「臉部表情(扭曲皺眉)」是嬰兒最直接可觀察的疼痛指標。保護疼痛部位、把刺激推開、咬牙握拳是較大兒童的反應。","options":{"A":"正確。臉部扭曲、皺眉是嬰兒疼痛的行為指標。","B":"保護疼痛部位是較大兒童的反應。","C":"將疼痛刺激推開是較大兒童的反應。","D":"咬緊牙關握拳是較大兒童的反應。"},"sources":["新文京《兒科護理學》嬰兒疼痛","臉部"]}},"106110-N4-74":{"quick":"9歲闌尾炎盲腸切除手術前後護理正確的是「持續腹部評估,若腹部肌肉不自主收縮而僵硬如木板,疑有腹膜炎的危險」(B)。","detail":{"background":"闌尾炎若惡化破裂致腹膜炎,腹部會出現「肌肉僵硬如木板(板狀腹)、反彈痛」,須持續評估。術前疼痛「禁用止痛劑(會掩蓋病情)且疑闌尾炎禁熱敷」(A不當);術後「腸蠕動恢復(排氣)後才漸進進食」(非試喝水無不適即進食,C);有引流管應採「半坐臥」利引流(非平躺,D)。","options":{"A":"術前疑闌尾炎多禁止痛劑以免掩蓋病情(此選項不當)。","B":"正確。腹部僵硬如木板(板狀腹)疑腹膜炎危險。","C":"術後排氣後才漸進進食(非試喝水即進食)。","D":"有引流管應採半坐臥利引流(非平躺)。"},"sources":["新文京《兒科護理學》闌尾炎","板狀腹"]}},"108020-N4-72":{"quick":"5歲心臟病開心手術,傷口換藥的術前心理準備合適的是「用布偶示範傷口換藥的方式」(D)。","detail":{"background":"學齡前(5歲)以「布偶/玩具示範(治療性遊戲)」做術前準備最合適,具體又不引發過度恐懼。「年紀小不需提供訊息」(A錯,應準備);「真實換藥影片」對5歲過於驚嚇(B);「告訴他不會痛」是不實承諾會失信任(C)。","options":{"A":"錯。學齡前仍需以適齡方式提供傷口訊息。","B":"真實換藥影片對5歲過於驚嚇(B不當)。","C":"不會痛是不實承諾(失信任)。","D":"正確。用布偶示範傷口換藥(治療性遊戲)。"},"sources":["新文京《兒科護理學》術前準備","布偶"]}},"110110-N4-71":{"quick":"14歲骨肉瘤截肢手術護理措施不適當的是「截肢術後立即裝置永久性義肢,以減輕殘肢水腫」(D)。","detail":{"background":"截肢術後「殘肢需先消腫塑型、傷口癒合後」才裝永久義肢,不能「立即裝永久義肢」(殘肢仍腫脹會不合),故D不適當;減輕水腫是用彈性繃帶。其餘適當:觀察殘肢出血滲液發炎、評估幻肢痛用藥/神經阻斷、術後彈性繃帶固定殘肢防攣縮。","options":{"A":"適當。觀察殘肢出血、滲液或發炎。","B":"適當。評估幻肢痛,用藥與神經阻斷改善。","C":"適當。彈性繃帶固定殘肢預防攣縮(消腫塑型)。","D":"不適當(本題答案)。不可立即裝永久義肢(殘肢須先消腫塑型)。"},"sources":["新文京《兒科護理學》截肢","義肢時機"]}},"114170-N4-50":{"quick":"1歲6個月熱性痙攣住院中突然痙攣發作,最適當的護理措施是「協助側臥使口中分泌物流出」(C)。","detail":{"background":"痙攣發作時應「協助側臥」使分泌物流出、維持呼吸道通暢防吸入。「不可約束抽搐肢體」(會致骨折/受傷,A);「不可強行放壓舌板」(會傷口腔牙齒、阻塞氣道,B);熱性痙攣多為良性、「發作後通常不致神經系統損傷」(D錯)。","options":{"A":"錯。不可約束抽搐肢體(會受傷骨折)。","B":"錯。不可強放壓舌板(傷口腔、阻塞氣道)。","C":"正確。協助側臥使口中分泌物流出(維持呼吸道通暢)。","D":"錯。單純熱性痙攣多不致神經系統損傷。"},"sources":["新文京《兒科護理學》熱性痙攣","側臥"]}},"115030-N4-42":{"quick":"16歲走路跛行確診骨肉瘤(osteosarcoma)錯誤的是「病童皆需接受截肢手術,需評估失去肢體造成的身體心像紊亂」(B)。","detail":{"background":"骨肉瘤治療現多採「保肢手術(切除腫瘤+重建)合併化療」,並非「皆需截肢」,故B錯誤(雖部分仍需截肢)。其餘正確:常局部持續性疼痛、病灶腫塊與病理性骨折、是原發性惡性骨腫瘤好發青春期、好發長骨幹骺端(股骨遠端、脛骨近端)。","options":{"A":"正確。常局部持續性疼痛、腫塊及病理性骨折。","B":"錯誤(本題答案)。現多採保肢手術(非皆需截肢)。","C":"正確。骨肉瘤是原發性惡性骨腫瘤,好發青春期。","D":"正確。好發長骨幹骺端(股骨遠端、脛骨近端)。"},"sources":["新文京《兒科護理學》骨肉瘤","保肢"]}},"111110-N4-58":{"quick":"9歲白血病復發疼痛,處置較不適當的是「告訴安安不要焦慮,要放輕鬆,帶她去遊戲室轉移心情」(A)。","detail":{"background":"病童正在疼痛時,「叫她不要焦慮、勉強帶去遊戲室」是否定其感受、且疼痛未處理就轉移不恰當,故A較不適當。其餘適當:用可理解的語言了解其不適心情、評估疼痛程度性質時間範圍、協助舒適臥位並依醫囑給止痛監測成效。","options":{"A":"較不適當(本題答案)。否定感受並勉強轉移,疼痛未處理(不恰當)。","B":"適當。用可理解的語言了解其不適心情。","C":"適當。評估疼痛程度、性質、持續時間及範圍。","D":"適當。協助舒適臥位、依醫囑給止痛並監測成效。"},"sources":["新文京《兒科護理學》疼痛","處置"]}},"114030-N4-32":{"quick":"不屬於FLACC行為疼痛評估量表向度的是「呼吸型態」(D)。","detail":{"background":"FLACC量表五向度為:臉(Face)、腿(Legs)、活動(Activity)、哭(Cry)、安撫難易(Consolability)。「呼吸型態」不在FLACC五向度內,故D不屬於。　補充：FLACC量表向度為臉(Face)、腿(Legs)、活動(Activity)、哭泣(Cry)、可安撫度(Consolability)；「呼吸型態」不屬FLACC評估向度。","options":{"A":"屬於。臉部表情(Face)。","B":"屬於。活動力(Activity)。","C":"屬於。安撫(Consolability)。","D":"不屬於(本題答案)。呼吸型態不在FLACC五向度。"},"sources":["新文京《兒科護理學》FLACC","向度"]}},"112180-N4-29":{"quick":"腦膜炎Dexamethasone(10mg/2mL/vial)7mg,每次應抽「1.4」mL(B)。","detail":{"background":"濃度=10mg/2mL=5mg/mL。需7mg → 抽取量=7mg÷5mg/mL=1.4mL,故每次抽1.4mL。　補充：劑量計算：醫囑7 mg，藥品濃度10 mg/2 mL(即5 mg/mL)，所需體積＝7÷5＝1.4 mL；腦膜炎以類固醇(dexamethasone)輔助減少發炎反應與後遺症。","options":{"A":"1.2mL計算不符(=6mg)。","B":"正確。7mg÷5mg/mL=1.4mL。","C":"1.6mL計算不符(=8mg)。","D":"1.8mL計算不符(=9mg)。"},"sources":["給藥計算","濃度"]}},"101030-N4-51":{"quick":"10個月嬰兒medication 10mL drip 30分鐘、精密輸液套管(micro-drip 60gtt/mL),滴數是「20 gtt/min」(A)。","detail":{"background":"精密輸液套管(micro-drip)滴系數=60 gtt/mL。滴數=總量(mL)×滴系數÷時間(分)=10×60÷30=20 gtt/min,故為20。　補充：精密輸液套管(micro-drip)滴系數為60 gtt/mL；10 mL於30分鐘滴完，滴速＝10×60÷30＝20滴/分；兒童靜脈給藥須精算滴速並監測注射部位與藥物副作用。","options":{"A":"正確。10×60÷30=20 gtt/min。","B":"30 gtt/min計算不符。","C":"40 gtt/min計算不符。","D":"50 gtt/min計算不符。"},"sources":["給藥計算","精密滴"]}},"101110-N4-9":{"quick":"給予兒童口服藥錯誤的是「將藥丸置於舌尖以利吞嚥」(B)。","detail":{"background":"藥丸應置於「舌頭後方(舌根)」較易吞下,放「舌尖」反而易嚐到苦味、不易吞嚥,故B錯誤。其餘正確:可讓兒童選擇吞藥丸或磨粉、除禁忌外可與少量喜歡的食物混合、不要倒入牛奶以免兒童因此拒喝牛奶。　補充：給兒童口服藥應將藥液或藥丸置於「舌根兩側或頰側」較不易引發嘔吐反射並利吞嚥；置於「舌尖」易被舌頭推出且刺激味覺、為錯誤做法。","options":{"A":"正確。可讓兒童自行選擇吞藥丸或磨成粉末。","B":"錯誤(本題答案)。藥丸應置舌後方(非舌尖)。","C":"正確。除禁忌外可與少量喜歡的食物混合。","D":"正確。不倒入牛奶(以免兒童拒喝牛奶)。"},"sources":["新文京《兒科護理學》口服給藥","舌後"]}},"103030-N4-56":{"quick":"給兒童眼藥或耳藥錯誤的是「耳藥滴入:3歲以下之兒童,將耳廓往上往後輕拉」(C)。","detail":{"background":"耳藥拉耳廓使外耳道變直:「3歲以下往下往後」、「3歲以上往上往後」,故「3歲以下往上往後」錯誤。其餘正確:眼藥水滴下眼瞼結膜囊內側、眼藥膏由眼內角往外角擦於下眼瞼、滴耳藥後側躺10~15分鐘利藥液停留。","options":{"A":"正確。眼藥水滴入下眼瞼結膜內側(囊內)。","B":"正確。眼藥膏由眼內角往外角擦於下眼瞼結膜。","C":"錯誤(本題答案)。3歲以下應往下往後拉(非往上往後)。","D":"正確。滴耳藥後持續側躺約10~15分鐘。"},"sources":["新文京《兒科護理學》耳藥","向下後"]}},"103100-N4-56":{"quick":"3歲給藥時踢咬大哭反抗,協助服下口服藥最適當的是「教導媽媽抱起美美坐於膝上,以一手固定,另一手持杯給藥」(B)。","detail":{"background":"幼兒反抗服藥時,可請家長「抱坐膝上、一手環抱固定其手臂、另一手持杯/餵藥器給藥」,安全又有安撫作用。對反抗中的3歲只解釋目的效果有限(A);「捏鼻子趁張口灌藥」危險易嗆(C);「騙說是果汁牛奶不是藥」破壞信任且日後拒食(D)。","options":{"A":"只解釋目的對反抗中的3歲效果有限。","B":"正確。抱坐膝上、一手固定、一手給藥(安全安撫)。","C":"錯。捏鼻趁張口灌藥危險易嗆(C不當)。","D":"錯。騙說是果汁牛奶破壞信任、致拒食。"},"sources":["新文京《兒科護理學》幼兒給藥","抱坐"]}},"107030-N4-44":{"quick":"6個月Gentamycin 4.8mg IV drip、每mL含40mg,每次應抽「0.12毫升」(A)。","detail":{"background":"抽取量=醫囑劑量÷藥物濃度=4.8mg÷40mg/mL=0.12mL,故每次抽0.12mL。　補充：劑量計算：醫囑4.8 mg，藥品濃度40 mg/mL，所需體積＝4.8÷40＝0.12 mL；嬰兒給藥須精算微量並使用適當稀釋與注射器。","options":{"A":"正確。4.8÷40=0.12 mL。","B":"0.24mL計算不符。","C":"0.36mL計算不符。","D":"0.48mL計算不符。"},"sources":["給藥計算","抽藥量"]}},"107110-N4-57":{"quick":"2歲給左耳用藥正確的是「給藥前向右側呈半側臥姿」(A)。","detail":{"background":"滴左耳藥時,應採「右側臥(左耳朝上)」讓藥液停留進入左耳道。2歲(3歲以下)拉耳廓應「往下往後」(非往上往後,B錯);耳藥滴在「外耳道壁」而非直接滴鼓膜(C錯);滴後「不用棉棒塞住耳道」(會吸走藥液,D錯)。","options":{"A":"正確。滴左耳前採右側臥(左耳朝上)。","B":"錯。2歲應耳垂往下往後拉(非往上往後)。","C":"錯。耳藥滴外耳道壁(非直接滴鼓膜)。","D":"錯。滴後不用棉棒塞住耳道(會吸走藥液)。"},"sources":["新文京《兒科護理學》耳藥","左耳右臥"]}},"107110-N4-58":{"quick":"30分鐘內完成2c.c.抗生素、目前60c.c./hr輸液,應「加在28c.c.輸液中維持60 gtt/min」(B)。","detail":{"background":"30分鐘以60c.c./hr速度輸入的總量=30c.c.;其中含抗生素2c.c.,故另需稀釋輸液28c.c.(2+28=30c.c.),維持60c.c./hr(精密滴=60 gtt/min)在30分鐘輸完。故加在28c.c.輸液、維持60 gtt/min。","options":{"A":"58c.c.會使總量60c.c./30分(速度過快)不符。","B":"正確。2+28=30c.c.,維持60 gtt/min於30分輸完。","C":"38c.c.與40 gtt/min計算不符。","D":"58c.c.維持30 gtt/min計算不符。"},"sources":["給藥計算","稀釋"]}},"109110-N4-50":{"quick":"為病童點眼藥水較不適宜的是「將眼藥水輕輕滴於病童眼球處」(C)。","detail":{"background":"眼藥水應滴入「下眼瞼結膜囊內」而非直接滴在「眼球(角膜)」上(刺激、易眨掉、傷角膜),故C較不適宜。其餘適宜:平躺或半坐臥頭後仰、下眼瞼向下向外拉成囊狀、滴後按壓內眥淚點約1分鐘(減少全身吸收)。　補充：點眼藥水應滴入「下眼瞼結膜囊(下穹窿)」而非直接滴於「眼球(角膜)」上，以免刺激與眨眼流失；滴後輕壓內眥減少全身吸收。","options":{"A":"適宜。平躺或半坐臥、頭部後仰。","B":"適宜。下眼瞼向下向外拉成囊狀。","C":"較不適宜(本題答案)。應滴入結膜囊(非直接滴眼球/角膜)。","D":"適宜。滴後按壓內眥淚點約1分鐘。"},"sources":["新文京《兒科護理學》眼藥","結膜囊"]}},"110110-N4-64":{"quick":"兒童毛地黃(Digoxin)給藥護理指導正確的是「忘記給藥的時間如未超過6小時,則補服一劑」(C)。","detail":{"background":"毛地黃漏服「未超過6小時可補服一劑」,超過則跳過、下一劑按原時間。給藥前應測「心尖脈(非橈動脈)1分鐘」(A錯);「不與牛奶/食物併用」(影響吸收,B錯);長期服用須注意「補鉀(低血鉀增毛地黃毒性)」而非補鈣防低血鈣(D錯)。","options":{"A":"錯。給藥前測心尖脈1分鐘(非橈動脈)。","B":"錯。不與牛奶併用(影響吸收)。","C":"正確。忘服未超過6小時可補服一劑。","D":"錯。應注意補鉀(非補鈣防低血鈣)。"},"sources":["新文京《兒科護理學》毛地黃","漏服6小時"]}},"111030-N4-52":{"quick":"病童約束的原則錯誤的是「每隔2小時要評估約束的狀況」(C)。","detail":{"background":"約束須「每15~30分鐘」評估肢端循環、皮膚與約束狀況(每2小時太久,可能已造成循環/皮膚損傷),故C錯誤。其餘正確:有醫囑與家屬同意書才執行、確保約束肢端皮膚完整、木乃伊約束是嬰兒常用約束法之一。　補充：病童約束原則：依醫囑、選最小限制方式、棉墊保護、定時(每15~30分鐘)評估末梢循環與皮膚並定時鬆開活動；「每隔2小時才評估」間隔過長、為錯誤。","options":{"A":"正確。有醫囑和家屬同意書時才執行約束。","B":"正確。須確保約束肢端的皮膚完整性。","C":"錯誤(本題答案)。應每15~30分鐘評估(每2小時太久)。","D":"正確。木乃伊約束是嬰兒常用約束法之一。"},"sources":["新文京《兒科護理學》約束","15-30分"]}},"113030-N4-30":{"quick":"2歲耳滴藥照護措施錯誤的是「將耳藥直接滴於鼓膜上」(C)。","detail":{"background":"耳藥應「沿外耳道壁滴入」,讓藥液順流入耳道,不可「直接滴在鼓膜上」(刺激、疼痛),故C錯誤。其餘正確:躺向健側半側臥(患耳朝上)、2歲耳廓往下往後拉直耳道、滴後按摩耳部促吸收。　補充：為「3歲以下」幼兒點耳藥應將耳廓「向下向後」拉直外耳道、藥液沿耳壁滴入(室溫)，不可直接滴於鼓膜上(刺激疼痛)；故直接滴鼓膜為錯誤。","options":{"A":"正確。躺向健側半側臥(患耳朝上)。","B":"正確。耳朵往下往後拉使耳道變直(2歲)。","C":"錯誤(本題答案)。耳藥沿外耳道壁滴(非直接滴鼓膜)。","D":"正確。滴藥後按摩耳部促進藥物吸收。"},"sources":["新文京《兒科護理學》耳藥","道壁"]}},"114030-N4-30":{"quick":"兒童使用眼藥注意事項正確的是「將眼藥膏塗抹於下眼瞼結膜上」(A)。","detail":{"background":"眼藥膏應「塗於下眼瞼結膜囊內(由內眥往外眥)」。眼藥水滴於下眼瞼結膜囊「內側中央」(非外側,B錯);給藥時請兒童「往上看(眼球上轉)」減少角膜刺激(非往下看,C錯);O.D.是「右眼」(O.U.才是雙眼,D錯)。","options":{"A":"正確。眼藥膏塗於下眼瞼結膜上(囊內)。","B":"錯。眼藥水滴下眼瞼結膜囊內側(非外側)。","C":"錯。給藥時請兒童往上看(非往下看)。","D":"錯。O.D.是右眼(O.U.才是雙眼)。"},"sources":["新文京《兒科護理學》眼藥","下眼瞼"]}},"115030-N4-29":{"quick":"嬰幼兒給藥方式最適當的是「眼藥水滴於下眼瞼中央的結膜囊內」(A)。","detail":{"background":"眼藥水應滴於「下眼瞼中央的結膜囊內」(非直接滴眼球)。3歲以下耳廓應「往下往後」拉(非往上往後,B錯);2歲以下肌注宜選「股外側肌(非臀肌,臀肌2歲以下避免)」(C錯);口服藥「不宜與日常主食(如牛奶/正餐)混合」(以免拒食、影響劑量,D錯)。","options":{"A":"正確。眼藥水滴於下眼瞼中央結膜囊內。","B":"錯。3歲以下耳翼往下往後拉(非往上往後)。","C":"錯。2歲以下肌注選股外側肌(非臀肌)。","D":"錯。口服藥不宜與日常主食混合(致拒食)。"},"sources":["新文京《兒科護理學》嬰幼兒給藥","結膜囊"]}},"102030-N4-33":{"quick":"破水住院7天後臉紅燥熱、胃口差、陰道仍滲羊水,護理措施不適宜的是「向個案解釋臉紅、燥熱的反應與破水引發感染有關」(C)。","detail":{"background":"破水後持續滲漏、臉紅燥熱(可能發燒)、胃口差,須警覺「絨毛膜羊膜炎(感染)」並處理,但護理上不宜「直接向個案斷定臉紅燥熱就是破水引發感染」(可能引起焦慮且非確定),應先評估監測、依醫囑處置,故C不適宜。其餘適宜:依醫囑用抗生素預防感染、調節被蓋衣物空調減不適、會陰沖洗並觀察分泌物。","options":{"A":"適宜。依醫囑使用抗生素預防感染。","B":"適宜。調節被蓋、衣物及空調減少不適。","C":"不適宜(本題答案)。不宜直接斷定告知是破水感染(易致焦慮,應評估監測)。","D":"適宜。會陰沖洗、密切觀察評估陰道分泌物。"},"sources":["新文京《產科護理學》破水","感染"]}},"102110-N4-1":{"quick":"「以家庭為中心之母育護理」醫療作業程序錯誤的是「完全依照父母親所想要的照顧方式」(C)。","detail":{"background":"家庭中心母育護理尊重父母意願,但須「在醫療安全與專業判斷範圍內」,而非「完全依照父母想要」(可能危及母嬰安全),故C錯誤。其餘正確:鼓勵待產生產恢復合一(LDR)、家庭成員可參與生產、鼓勵父母早期與新生兒接觸。","options":{"A":"正確。鼓勵LDR(待產生產恢復合一)環境。","B":"正確。家庭成員可參與生產過程。","C":"錯誤(本題答案)。須在醫療安全範圍內(非完全依父母想要)。","D":"正確。鼓勵父母早期與新生兒接觸。"},"sources":["新文京《產科護理學》家庭中心","安全範圍"]}},"103030-N4-1":{"quick":"產科護理理念與原則不適當的是「提供以機構產科常規為主軸的照護」(C)。","detail":{"background":"現代產科護理強調「以孕產婦與家庭為中心、文化取向的個別化照護」,而非「以機構常規為主軸(僵化、忽略個別需求)」,故C不適當。其餘適當:以孕產婦為中心、以家庭為中心、文化取向的護理。　補充：產科護理理念以產婦與家庭為中心、尊重自主、提供個別化與實證照護；「以機構產科常規為主軸」忽略個別需求、與家庭中心理念不符、為不適當。","options":{"A":"適當。提供以孕產婦為中心的護理。","B":"適當。提供以家庭為中心的護理。","C":"不適當(本題答案)。不應以機構常規為主軸(應個別化)。","D":"適當。提供文化取向的護理。"},"sources":["新文京《產科護理學》護理理念","個別化"]}},"103030-N4-40":{"quick":"輕微產後陰道血腫,產後12小時護理措施最適當的是「給予會陰部冰敷」(B)。","detail":{"background":"產後「24小時內」對會陰傷口/血腫應「冰敷」收縮血管、減少出血腫脹與疼痛(24小時後改溫水坐浴促癒合)。本例產後12小時,故冰敷最適當。止痛劑、止血劑須依評估;延遲下床非首要處置。　補充：輕微產後陰道血腫於早期(產後數小時至12小時內)應「冰敷」減少出血與腫脹、止痛；48小時後可改溫熱促進吸收；過大或持續增大需評估手術。","options":{"A":"止痛劑須依評估(非首要處置)。","B":"正確。產後24小時內會陰冰敷(收縮血管減腫脹)。","C":"延遲下床非處置血腫的首要。","D":"止血劑須依醫囑評估(非首選)。"},"sources":["新文京《產科護理學》產後血腫","冰敷"]}},"106111-N4-9":{"quick":"以家庭為中心之母育過程的理念錯誤的是「醫院是唯一可提供溫和生產方式的場所」(C)。","detail":{"background":"溫和生產可在「醫院、生產中心、居家(在安全評估下)」等多元場所進行,醫院並非唯一,故C錯誤。其餘正確:懷孕生產不應被視為生病狀態、家庭成員可參與生產、賦權婦女自主選擇生產方式。　補充：以家庭為中心的母育理念強調尊重產婦自主、家庭參與、可於多元場所(含居家、生產中心)採溫和生產；「醫院是唯一可提供溫和生產的場所」之敘述錯誤。","options":{"A":"正確。懷孕生產不應被視為需治療的生病狀態。","B":"正確。家庭成員皆可參與生產過程。","C":"錯誤(本題答案)。醫院非唯一可溫和生產的場所。","D":"正確。賦權婦女自主選擇生產方式。"},"sources":["新文京《產科護理學》家庭中心","多元場所"]}},"106111-N4-53":{"quick":"瀕死兒童的疼痛護理措施最重要的是「依醫囑按時(around the clock)給予靜脈注射Morphine」(D)。","detail":{"background":"末期/瀕死兒童中重度疼痛應「定時(around the clock)給足量嗎啡」維持持續無痛,而非疼痛時才給。Meperidine代謝物有神經毒性不適長期用(A);EMLA是表皮局部麻醉(對深部癌痛不足,B);PCA需病童有能力自控(瀕死/年幼者不適用,C)。","options":{"A":"錯。Meperidine代謝物有神經毒性,不適長期。","B":"EMLA是表皮局麻(對深部癌痛不足)。","C":"PCA需病童能自控(瀕死/年幼不適用)。","D":"正確。定時(ATC)給靜脈嗎啡維持無痛(最重要)。"},"sources":["新文京《兒科護理學》末期疼痛","定時嗎啡"]}},"108110-N4-4":{"quick":"生產教育觀念正確的是「②讓孕婦因應懷孕與分娩照護的過程+③朝向以家庭為中心的照護(即23)」(C)。","detail":{"background":"現代生產教育強調「②增能孕婦因應懷孕分娩、③以家庭為中心」。①「由醫護團隊主導生產」與賦權孕婦的理念相反(錯);④「強調一定不要用藥物性減痛」過於絕對(減痛方式應依需求選擇,錯)。故為②③。　補充：生產教育理念在協助孕婦了解並因應懷孕分娩過程、增進自主與信心、朝向以家庭為中心的照護；「由醫護主導、減少孕婦參與」與其理念相反。","options":{"A":"12含①醫護主導(與賦權相反)。","B":"34含④絕對不用藥物減痛(過於絕對)。","C":"正確。②孕婦因應分娩+③家庭為中心(23)。","D":"14含①④(皆不當)。"},"sources":["新文京《產科護理學》生產教育","賦權"]}},"109110-N4-2":{"quick":"以家庭為中心的產科照護錯誤的是「提供完全相同的產科常規照護以符合評鑑要求」(D)。","detail":{"background":"家庭中心照護強調「個別化、依不同家庭需求彈性安排」,而非「完全相同的常規照護」,故D錯誤。其餘正確:鼓勵配偶與手足參與生產、推廣親子同室增加互動、鼓勵儘早出院與家人團聚。　補充：以家庭為中心的產科照護應個別化、尊重產婦與家庭選擇、促進親子接觸；「提供完全相同的常規照護以符合評鑑」忽略個別需求、與理念相違、為錯誤。","options":{"A":"正確。鼓勵配偶與新生兒手足參與生產過程。","B":"正確。推廣親子同室增加新生兒與家庭互動。","C":"正確。鼓勵儘早出院與家人團聚。","D":"錯誤(本題答案)。應個別化(非完全相同常規)。"},"sources":["新文京《產科護理學》家庭中心","個別化"]}},"109110-N4-20":{"quick":"產後痛(after pain)護理錯誤的是「通常在第三天後疼痛日益嚴重」(A)。","detail":{"background":"產後痛(子宮收縮痛)通常在「產後最初2~3天較明顯,之後逐漸減輕」,並非第三天後日益嚴重,故A錯誤。其餘正確:常以10分法評估疼痛、鼓勵適度活動、教導深呼吸緩解。　補充：產後痛(子宮收縮痛)多見於經產婦與哺乳時(催產素促子宮收縮)，通常產後1~3天最明顯後漸緩解；「第三天後日益嚴重」之敘述錯誤。","options":{"A":"錯誤(本題答案)。產後痛多在最初2~3天明顯後漸減(非第三天後加重)。","B":"正確。臨床常以10分法評估疼痛。","C":"正確。鼓勵適度活動。","D":"正確。教導深呼吸緩解。"},"sources":["新文京《產科護理學》產後痛","漸減"]}},"110030-N4-19":{"quick":"陰道分娩後12小時會陰傷口疼痛護理適當的是「採REEDA評估時,A是指傷口密合度(Approximation)」(B)。","detail":{"background":"會陰傷口評估用REEDA:Redness(發紅)、Edema(水腫)、Ecchymosis(瘀斑)、Discharge(分泌物)、Approximation(傷口密合度)。故A=Approximation正確。評估會陰宜採「Sims氏(側臥)」(非屈膝仰臥,A);如廁後「由陰道往肛門(由前往後)」擦拭(C相反);產後24小時內宜「冰敷」(非溫水坐浴,坐浴是24小時後,D)。","options":{"A":"評估會陰宜側臥(Sims氏),非屈膝仰臥。","B":"正確。REEDA的A是傷口密合度(Approximation)。","C":"錯。如廁後由前往後(陰道往肛門)擦拭。","D":"產後24小時內宜冰敷(溫水坐浴是24小時後)。"},"sources":["新文京《產科護理學》REEDA","密合度"]}},"110110-N4-34":{"quick":"痛經求診,護理師回答最適當的是「多休息,局部熱敷下腹部」(D)。","detail":{"background":"原發性痛經可「局部熱敷下腹、多休息、適度運動、必要時依醫囑用止痛藥(前列腺素抑制劑)」。「自行服止痛藥」應依指示非隨意(A不夠完整);泡熱水澡須注意安全但熱敷下腹更直接(B);「巧克力咖啡(咖啡因)」會加重不適(C錯),故D最適當。","options":{"A":"止痛藥應依指示用(非籠統自行服用)。","B":"泡熱水澡可緩解但熱敷下腹更直接(非最適當)。","C":"錯。巧克力咖啡含咖啡因會加重不適。","D":"正確。多休息、局部熱敷下腹部緩解痛經。"},"sources":["新文京《婦科》痛經","熱敷"]}},"111030-N4-1":{"quick":"醫療院所提供以家庭為中心照護的策略錯誤的是「鼓勵留院直到適應母職」(A)。","detail":{"background":"家庭中心照護鼓勵「早期出院、返家在家庭支持下適應母職」與親子同室、陪產等,而非「留院直到適應母職」(延長住院不符,且適應母職在家較自然),故A錯誤。其餘正確:推動準爸爸陪產、提供LDR樂得兒產房、產檯上母嬰早期肌膚接觸。","options":{"A":"錯誤(本題答案)。鼓勵早期出院返家適應(非留院直到適應母職)。","B":"正確。推動準爸爸陪產制。","C":"正確。提供LDR(樂得兒)產房。","D":"正確。協助產檯上母嬰早期肌膚接觸。"},"sources":["新文京《產科護理學》家庭中心","早期出院"]}},"111110-N4-1":{"quick":"懷孕期正常內分泌變化正確的是「甲狀腺所分泌的甲狀腺素會增加」(B)。","detail":{"background":"懷孕期因雌激素使甲狀腺結合球蛋白增加、加上代謝需求,「甲狀腺素(總T4)會增加」、甲狀腺活性上升。腦下垂體前葉的FSH、LH因懷孕高雌黃體素回饋而「降低(受抑制)」(A錯);腎上腺「留鹽激素(醛固酮)增加」(非降低,C錯);胎盤分泌「雌三醇(estriol)」是孕期主要雌激素(D敘述相反)。","options":{"A":"錯。懷孕期FSH、LH受抑制而降低(非增加)。","B":"正確。懷孕期甲狀腺素(總T4)增加。","C":"錯。懷孕期留鹽激素(醛固酮)增加(非降低)。","D":"胎盤分泌雌三醇為主(D敘述相反)。"},"sources":["新文京《產科護理學》孕期內分泌","甲狀腺素"]}},"111110-N4-40":{"quick":"乳癌的護理措施正確的是「外出時,儘量避免陽光直射患側手臂」(C)。","detail":{"background":"乳癌術後(尤腋下淋巴清除)患側手臂易淋巴水腫,應「避免陽光曝曬、避免提重物/打針量血壓、保護患肢」。術後手臂腫脹「不會自然恢復,須積極預防處理」(A錯);PQRST的R是Region/Radiation(部位/放射,非recovery,B錯);腋下僵硬緊繃「須做復健運動,非不需注意」(D錯)。","options":{"A":"錯。患肢腫脹不會自然恢復(須積極預防處理)。","B":"錯。PQRST的R是部位/放射(非recovery)。","C":"正確。外出避免陽光直射患側手臂(防淋巴水腫)。","D":"錯。腋下僵硬須做復健運動(非不需注意)。"},"sources":["新文京《婦科》乳癌","淋巴水腫"]}},"112110-N4-18":{"quick":"產婦用meperidine(Demerol)後呼吸<10次/分,能改善此情形的藥物是「naloxone(Narcan)」(D)。","detail":{"background":"meperidine(Demerol)是鴉片類止痛藥,過量會「呼吸抑制」,其專一拮抗劑是「naloxone(Narcan)」可逆轉鴉片類的呼吸抑制。diazepam、hydroxyzine、promazine皆無法逆轉鴉片類呼吸抑制。","options":{"A":"diazepam是鎮靜劑(不能逆轉鴉片呼吸抑制)。","B":"hydroxyzine是抗組織胺(不能逆轉)。","C":"promazine是抗精神病/鎮靜(不能逆轉)。","D":"正確。naloxone(Narcan)是鴉片類拮抗劑,逆轉呼吸抑制。"},"sources":["新文京《產科護理學》naloxone","拮抗"]}},"112110-N4-26":{"quick":"剖腹產後第一天全腹疼痛、疲憊不想動、不要親子同室,最適當的護理是「說明活動的益處,依醫囑給予止痛劑,採漸進式活動」(C)。","detail":{"background":"剖腹產後應「適當止痛、鼓勵漸進式下床活動」(促腸蠕動、防血栓、利復原),並理解產婦疲憊。不應強推親子同室並要她長期臥床(A、B不當);腹脹處理(D)非此例主訴(腹部傷口痛)的最適當處置,故C最適當。　補充：剖腹產後第一天疼痛疲憊不想動，護理應說明早期活動益處(促進腸蠕動、預防血栓)、依醫囑止痛、採漸進式下床；不宜放任完全臥床或強迫親子同室。","options":{"A":"不應強推親子同室(應依產婦狀況彈性)。","B":"錯。不應長期臥床(應漸進活動);束腹帶非24小時必須。","C":"正確。說明活動益處、依醫囑止痛、漸進式活動。","D":"腹脹處理非此例(傷口痛)的最適當處置。"},"sources":["新文京《產科護理學》剖腹產後","漸進活動"]}},"112110-N4-31":{"quick":"產後久站靜脈曲張、產後第三天站立伸直小腿時左小腿疼痛壓痛,最適當的判斷處置是「霍曼氏徵象(Homan’s sign)若為陽性,依醫囑給予抗凝血劑,並密切觀察出血情形」(B)。","detail":{"background":"症狀疑似「深層靜脈栓塞(DVT)」:Homan氏徵象(足背屈時小腿疼痛)陽性提示DVT,處置是「依醫囑給抗凝血劑並監測出血」,且「禁按摩/熱敷患肢、禁鼓勵下床活動」(以免血栓脫落致肺栓塞)。Hoffmann技術是評估手部反射(非DVT)。","options":{"A":"錯。DVT患肢禁熱敷與按摩(防血栓脫落)。","B":"正確。Homan氏陽性疑DVT,依醫囑給抗凝血劑並觀察出血。","C":"Hoffmann技術是手部反射(非評估DVT)。","D":"錯。DVT不鼓勵多下床活動(防血栓脫落致肺栓塞)。"},"sources":["新文京《產科護理學》DVT","Homan"]}},"114030-N4-10":{"quick":"41週、自然破水規則陣痛、子宮頸開2公分、宮縮痛2分,最可能的行為反應是「興奮話多,樂意分享產兆發生過程」(A)。","detail":{"background":"產程「潛伏期(子宮頸開0~3公分、宮縮較輕)」產婦多「興奮、話多、樂意社交分享產兆」。隨產程進展(活動期)才漸轉「疲累、專注應付宮縮、以單字回應、閉眼休息」。本例開2公分、痛2分屬潛伏期,故A。　補充：產程潛伏期(子宮頸開2~3公分、宮縮輕)產婦多「興奮、話多、樂意分享產兆」；隨產程進展疼痛加劇則轉為專注、焦慮、較少言語。","options":{"A":"正確。潛伏期(開2公分)產婦興奮話多、樂意分享。","B":"疲累擔心失控是活動期反應。","C":"閉眼休息、宮縮維持不動是活動期。","D":"能量集中應付宮縮、單字回應是過渡期。"},"sources":["新文京《產科護理學》產程","潛伏期"]}},"114100-N4-13":{"quick":"親子同室(rooming-in)錯誤的是「執行親子同室主要目的為減輕護理師的負擔」(D)。","detail":{"background":"親子同室的目的是「促進親子依附、母乳哺育、家庭中心照護、增加母嬰互動」,而非「減輕護理師負擔」(實際上需更多衛教與支持),故D錯誤。其餘正確:依不同家庭需求彈性安排、WHO建議產後母嬰24小時同室、親子同室是家庭中心照護的一種。","options":{"A":"正確。依不同家庭需求彈性安排親子同室。","B":"正確。WHO建議產後母嬰24小時同室不分開。","C":"正確。親子同室是以家庭為中心的照護。","D":"錯誤(本題答案)。目的是促進親子依附與哺乳(非減輕護理師負擔)。"},"sources":["新文京《產科護理學》親子同室","依附"]}}},TO=["1兒少保護與虐待通報法規", "2兒童疼痛評估與止痛", "3末期瀕死照護與死亡概念", "4慢性病正常化與身心障礙", "5以家庭為中心與家系圖賦權", "6住院反應分離焦慮與治療性遊戲", "7兒童給藥與約束", "8兒童手術前後護理", "9母嬰產科借題"],LEC={"1兒少保護與虐待通報法規":{"html":"<p><b>兒少權益保障法</b>:兒童及少年指<b>未滿18歲</b>(兒童<12、少年12~未滿18)。責任通報人員知悉兒少<b>受虐、施用毒品、猥褻性交、被遺棄</b>,應<b>至遲24小時內</b>通報;專線<b>113</b>(保護)、緊急110。</p><p><b>處置</b>:儘速隔離受虐與施虐者、與兒童<b>單獨會談</b>(不與施虐者同場)、注意隱私、提供社會資源;<u>不引導兒童責怪施虐者、不需自行認定施虐者</u>。受虐徵象:多處不同癒合期瘀傷、與說法不符的傷、髒污異味、寒冬穿短袖;1歲以下任何骨折須通報。</p><p><b>搖晃症候群</b>:劇烈搖晃致硬腦膜下出血+視網膜出血,屬虐待須通報,腦損傷多<b>不可逆</b>。</p>"},"2兒童疼痛評估與止痛":{"html":"<p><b>疼痛評估依年齡</b>:新生兒NIPS;無法言語/意識不清/幼兒→<b>FLACC</b>(臉Face、腿Legs、活動Activity、哭Cry、安撫度Consolability,各0~2分);3~7歲<b>臉譜FACES</b>;青少年/能言語<b>主訴(self-report)為金標準</b>。生理指標:心跳/呼吸/血壓/瞳孔(尿量無關)。</p><p><b>止痛原則</b>:WHO三階梯、<b>定時給藥(around the clock)</b>維持無痛、<b>口服優先</b>、重度用<b>鴉片(嗎啡)</b>、合併<b>緩瀉劑</b>防便秘、不因怕成癮而不足量、可多模式併用。<b>EMLA</b>=局麻、侵入處置前<b>1小時</b>;Acetaminophen=解熱鎮痛(非NSAID);<u>Meperidine代謝物有神經毒,不用於末期長期止痛</u>。</p>"},"3末期瀕死照護與死亡概念":{"html":"<p><b>死亡概念</b>:<3歲無;<b>3~5歲可逆(如睡覺會醒)</b>;<b>5~9歲擬人化(死神)、可躲避/只有老人才死</b>;<b>9歲+不可逆、普遍、有生理原因</b>。談死亡用具體誠實語言、<u>勿用「睡著了」隱喻</u>、讓兒童適齡參加喪禮。</p><p><b>瀕死變化</b>:陳施氏(潮式)呼吸、四肢冷卻覺得熱、視力減退而<b>聽覺最後消失</b>、尿少、<b>脈搏慢而弱</b>、失大小便控制、臨終嘎聲(抬高頭/側臥)。臨終以舒適為主(皮膚清潔乾燥),不再積極營養/輸液/抗生素。</p><p><b>哀傷照護</b>:接納情緒、靜靜陪伴共在、依需求給照護、<u>勿轉移注意、勿用「不會痛了」、勿催儀式</u>;讓家人與遺體獨處道別、手足適齡參與。末期最首要=<b>症狀控制</b>(尤疼痛)。安寧緩和應<b>早期介入</b>、DNR由法定代理人簽署。</p>"},"4慢性病正常化與身心障礙":{"html":"<p><b>正常化(normalization)</b>:以常態眼光對待、維持有價值社會角色、過接近正常生活;<b>父母以同樣家規對待病童與手足</b>、聚焦病童優點建立自尊、納入家族、鼓勵與同儕互動;<u>非要求達健康兒童體能標準、不過度保護、不社交隔離、作息不應與手足不同</u>。</p><p><b>慢性病</b>:長期需管理、主要靠家庭/自我管理(非僅依賴專業)。手足壓力風險:關係不良、父母情緒大變、怕被送走(性別非風險因子)。妥瑞症智力正常不需特教;血友病避免碰撞性運動。資訊應分次循序提供。</p>"},"5以家庭為中心與家系圖賦權":{"html":"<p><b>家庭為中心(FCC)</b>:尊重<b>每位成員</b>需求、<b>家庭參與決策與照護</b>、夥伴合作、彈性探視、尊重文化(維持家庭文化常規一致性)。加護病房亦鼓勵父母/手足參與、與能理解的兒童共同溝通。</p><p><b>賦權(empowerment)</b>:醫護與家庭互動中讓家庭<b>獲得自我控制感</b>、增其優勢能力與行動;<u>非醫護單方決定、非「要求」必須在院執行</u>。<b>家系圖/家庭樹</b>:收集成員健康狀況、性別、成員間關係、世代結構;<u>不含與朋友的社交關係</u>。</p>"},"6住院反應分離焦慮與治療性遊戲":{"html":"<p><b>分離焦慮</b>三期:<b>抗議期</b>(大哭尖叫、拒絕安撫、攻擊、找父母)→<b>失望/絕望期</b>(安靜沉默、退縮、不感興趣)→<b>去依戀/否認期</b>(表面適應、對父母疏離冷漠)。<b>退化行為</b>(已會如廁卻尿床、要奶嘴)是常見因應;學齡期較少退化。</p><p><b>治療性遊戲</b>目的:宣洩情緒、提供治療訊息、了解感受、增控制感(<u>非分析早期經驗</u>)。類型:<b>情緒宣洩性</b>(敲打/戳黏土宣洩)、<b>指導性</b>(圖片故事解說流程澄清觀念)、戲劇性(布偶扮演)。依發展階段選遊戲。學齡期增控制感=讓其參與治療決策、給有限選擇。</p>"},"7兒童給藥與約束":{"html":"<p><b>口服</b>:藥丸置<b>舌後近咽</b>(非舌尖)、可混少量喜歡食物、<u>勿加牛奶/主食</u>、嬰兒抱起半坐臥沿頰側緩慢滴入、反抗者抱坐膝上一手固定。<b>眼藥</b>:滴下眼瞼結膜囊內側、藥膏內眥往外眥、按內眥淚點1分鐘。<b>耳藥</b>:健側臥患耳朝上、<b>3歲以下往下往後/以上往上往後</b>拉、<u>不直接滴鼓膜</u>。</p><p><b>毛地黃</b>:給藥前測<b>心尖脈1分鐘</b>(嬰<90~100/兒<70暫停)、漏服未超6小時可補、注意<b>低血鉀</b>增毒性。<b>約束</b>:需醫囑+同意書、每15~30分鐘評估鬆開、木乃伊約束嬰兒常用。<b>滴速</b>:精密套管1mL=60gtt;gtt/min=量×滴系數÷分;抽取量=劑量÷濃度。</p>"},"8兒童手術前後護理":{"html":"<p><b>唇裂修補術後</b>:<b>手肘帶約束</b>防手摸傷口。<b>扁桃腺切除術後</b>:頭側一邊利引流、警覺不斷吞嚥(出血)、冰敷含冰塊、<u>勿抽吸口鼻(刺激致出血)</u>。<b>闌尾炎</b>:術前疑闌尾炎<u>不給止痛/瀉劑/熱敷</u>、板狀腹疑腹膜炎、術後半坐臥引流。</p><p><b>截肢(骨肉瘤)</b>:觀察殘肢出血、評估<b>幻肢痛</b>、彈繃塑形;<u>不立即裝永久義肢(待消腫定型)</u>。<b>骨肉瘤</b>好發青春期、長骨幹骺端(膝部),<u>非皆需截肢(現多保肢)</u>。<b>熱性痙攣</b>發作:側臥使分泌物流出、維持呼吸道、<u>勿約束肢體/塞壓舌板</u>,多為良性。學齡前術前準備用布偶示範、誠實適齡。</p>"},"9母嬰產科借題":{"html":"<p><b>家庭為中心母育/產科</b>:LDR樂得兒產房、家庭參與生產、賦權婦女自主選擇、<b>早期出院</b>、親子同室(促依附哺乳,非減護理師負擔)、個別化(非僵化常規)。生產教育:孕婦主動因應、家庭為中心。第一產程潛伏期(開0~3cm)產婦興奮話多。</p><p><b>產後</b>:陰道/會陰血腫早期(24h內)<b>冰敷</b>、後期熱敷坐浴;會陰評估<b>REEDA</b>(A=密合度Approximation)、由前往後擦;<b>產後痛</b>1~3天最明顯後漸減輕。<b>產後DVT</b>:Homan徵象陽性、抗凝、<u>勿熱敷按摩(防肺栓塞)</u>。<b>Meperidine過量呼吸抑制→naloxone(Narcan)拮抗</b>。痛經熱敷下腹。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n4_c3_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
