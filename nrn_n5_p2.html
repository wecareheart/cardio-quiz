衛生護理學","num":8,"stem":"李先生的妻女在一次意外事件中相繼過世,有關李先生對此事件的心理調適防衛機轉,下列敘述何者最適當?","opts":{"A":"談到妻女過世這件事,有意識的抑制失落的情緒,為潛抑作用(repression)","B":"很平淡的描述完整的事件,彷彿這是發生在他人身上的事件,為隔離作用(isolation)","C":"會談時胸前別一朵白色的花,為轉化作用(conversion)","D":"自責當天自己若不讓妻女出門,就不會發生這件意外,為抵消作用(undoing)"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"壓力適應防衛機轉心理發展與精神症狀學","topic_num":"壓力適應防衛機轉心理發展與精神症狀學","q_num":8,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"談到妻女過世這件事,有意識的抑制失落的情緒,為潛抑作用(repression)","B":"很平淡的描述完整的事件,彷彿這是發生在他人身上的事件,為隔離作用(isolation)","C":"會談時胸前別一朵白色的花,為轉化作用(conversion)","D":"自責當天自己若不讓妻女出門,就不會發生這件意外,為抵消作用(undoing)"},"img":""},{"id":"115030-N5-1","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":1,"stem":"吳小姐,24歲,碩士生,單親家庭,因應疫情返家遠距學習,在家期間與母親朝夕相處備感壓力。 返診時對護理師說:「我坐在房間窗邊會想,如果跳下去會怎樣?」,根據同理心的原則,下列何項護理師的回應最適切?","opts":{"A":"「請問你住幾樓?」","B":"「你有不想再活下去的念頭嗎?」","C":"「你還很年輕,人生才要開始。」","D":"「等疫情降級跟媽媽分開來住,這種情況就會改善。」"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"壓力適應防衛機轉心理發展與精神症狀學","topic_num":"壓力適應防衛機轉心理發展與精神症狀學","q_num":1,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"「請問你住幾樓?」","B":"「你有不想再活下去的念頭嗎?」","C":"「你還很年輕,人生才要開始。」","D":"「等疫情降級跟媽媽分開來住,這種情況就會改善。」"},"img":""},{"id":"115030-N5-23","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":23,"stem":"張太太因先生車禍意外過世出現激動不安、捶打家人,遂被帶至急診救治。依據卡普蘭 (Caplan.)危機理論,張太太目前處於危機發展過程的那一期?","opts":{"A":"衝擊期","B":"崩潰期","C":"求助時期","D":"紊亂期"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"topic":"壓力適應防衛機轉心理發展與精神症狀學","topic_num":"壓力適應防衛機轉心理發展與精神症狀學","q_num":23,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"衝擊期","B":"崩潰期","C":"求助時期","D":"紊亂期"},"img":""}],E={"101030-N5-7":{"quick":"藉行為控制他人、使環境配合自己需求＝操縱(manipulation)。","detail":{"background":"本題承前一情境，方小姐以特定行為(如威脅、討好、分化)企圖控制他人或操弄環境以滿足自己的需求，其行為的意義屬『操縱(manipulation)』。操縱常見於邊緣型/反社會人格或為次級獲益，表現為挑撥工作人員、以情緒或威脅迫使他人讓步。不遵從是不依醫囑;挑釁是故意激怒;示威是公開展示抗議。操縱的處理原則為團隊態度一致、清楚的限制設定(limit setting)。","options":{"A":"正確。藉行為控制他人、操弄環境以滿足自己需求，是操縱(manipulation)。","B":"不遵從是不依從治療或醫囑。","C":"挑釁是故意激怒他人。","D":"示威是公開展示抗議或不滿。"},"sources":["精神科護理學·心理防衛機轉"]}},"101030-N5-10":{"quick":"解釋諺語「滾動的石頭不長青苔」＝評估抽象思考。","detail":{"background":"精神狀態檢查(MSE)中，請病人『解釋諺語的含義』(如「滾動的石頭不長青苔」「失敗為成功之母」)是評估『抽象思考(abstract thinking)』能力——能否從具體字面提取出抽象意涵。思覺失調或器質性病人常出現『具體化思考(concrete thinking)』，只能照字面解釋。知覺評估的是幻覺/錯覺;定向力評估時人地物;判斷力評估面對情境的決策。故為抽象思考。","options":{"A":"知覺評估的是幻覺、錯覺等感官經驗。","B":"定向力評估對時間、地點、人物的辨識。","C":"判斷力評估面對情境時的決策合理性。","D":"正確。解釋諺語是評估抽象思考能力。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"101030-N5-16":{"quick":"以「刺激—思考—行為」為架構＝認知行為治療。","detail":{"background":"認知行為治療(CBT)的核心架構是『刺激(情境)→認知/思考→情緒與行為』，主張介於刺激與反應之間的『想法(認知)』決定了情緒與行為，故透過辨識與修正不合理認知來改變情緒行為(類似 Ellis 的 A-B-C)。分析性心理治療著重潛意識與早期衝突;理情治療(REBT)雖也是認知取向，但本題「刺激—思考—行為」是 CBT 的代表性架構;完形治療著重此時此刻的覺察與整合。故選認知行為治療。","options":{"A":"分析性心理治療著重潛意識與早期衝突。","B":"理情治療屬認知取向，但本題架構是 CBT 的典型描述。","C":"正確。「刺激—思考—行為」是認知行為治療的核心架構。","D":"完形治療著重此時此刻的覺察與整合。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","認知行為治療"]}},"101030-N5-22":{"quick":"被害型妄想症：常用否定與投射防衛機轉(非誇大型、非20歲前發病、不轉幻覺)。","detail":{"background":"李小姐認為鄰居欺負、說她壞話而錄音蒐證、提告，屬『被害型妄想症(persecutory type)』。妄想症病人常以『否定(denial)與投射(projection)』防衛機轉處理內在無法接受的衝動(把自己的敵意投射成他人對自己的迫害)。其他錯誤:A 她是被害型而非誇大型;C 妄想症好發於『中年(35–45歲)以後』，非20歲前;D 妄想症的妄想內容不會轉變為幻覺(幻覺非妄想症的核心)。故 B 正確。","options":{"A":"她屬被害型妄想症，非誇大型。","B":"正確。被害型妄想症常用否定與投射防衛機轉。","C":"妄想症好發於中年以後，非20歲前。","D":"妄想症不會由妄想轉為幻覺。"},"sources":["精神科護理學·心理防衛機轉","DSM-5-TR 妄想症"]}},"101030-N5-27":{"quick":"想下毒卻反覆清洗以減焦慮＝抵消作用(undoing)。","detail":{"background":"周太太有想毒害先生的攻擊衝動，覺得想法過於激烈而焦慮，便『不斷清洗餐具』以象徵性地『抵消』那個不被接受的念頭，這是『抵消作用(undoing)』——以一個行為來抵消、彌補先前不被接受的想法或衝動(常見於強迫症的儀式行為)。補償是以一長處彌補另一短處;轉化是心理衝突轉為身體症狀;隔離是把情緒與事件分開。故為抵消作用。","options":{"A":"補償作用是以一方面的成就彌補另一方面的不足。","B":"轉化作用是心理衝突轉化為身體症狀。","C":"正確。以反覆清洗象徵性抵消不被接受的念頭，是抵消作用(undoing)。","D":"隔離作用是把情緒與事件記憶分開。"},"sources":["精神科護理學·心理防衛機轉"]}},"101030-N5-40":{"quick":"把自己的想法/感受說成是對方的＝投射(projection)。","detail":{"background":"把自己內在無法接受的想法、感受或衝動，歸咎或歸屬到他人身上(說成是對方的)，藉此減少對自己的威脅與焦慮，這是『投射(projection)』。如自己有敵意卻認為「是別人想害我」。合理化是為行為找看似合理的藉口;壓抑是有意識地把念頭壓下;反向行為是表現出與真實感受相反的行為。故為投射。","options":{"A":"正確。把自己的想法感受說成是對方的，是投射(projection)。","B":"合理化是為行為找看似合理的藉口。","C":"壓抑是有意識地把不愉快念頭壓下。","D":"反向行為是表現出與真實感受相反的行為。"},"sources":["精神科護理學·心理防衛機轉"]}},"101110-N5-2":{"quick":"解釋「兩全其美」的意義＝評估抽象思考。","detail":{"background":"請病人解釋成語/諺語(如「兩全其美」「滾動的石頭不長青苔」)的意義，是 MSE 中評估『抽象思考』能力——能否從字面提取抽象意涵。判斷力評估面對情境的決策;定向力評估時地人;記憶力評估近遠期記憶。故為抽象思考。補充:抽象思考評估常用「解釋諺語」與「比較兩物異同」;思覺失調或器質性病人常出現「具體化思考(concrete thinking)」只能照字面回答(如答「滾動的石頭真的不會長青苔」)。抽象思考屬高階皮質功能，受損提示額葉或廣泛性認知障礙，需與判斷力、定向力等其他 MSE 項目區分。","options":{"A":"判斷力評估面對情境的決策合理性。","B":"定向力評估對時間、地點、人物的辨識。","C":"記憶力評估近期與遠期記憶。","D":"正確。解釋成語的意義是評估抽象思考。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"101110-N5-17":{"quick":"出院護理計畫：壓力調適①、演練症狀因應③、討論服藥益處④(勿討論停藥時間②)。","detail":{"background":"精神科出院護理計畫旨在預防復發、促進社區適應:(1)教導壓力調適策略;(3)演練症狀因應策略(辨識復發前兆並因應);(4)討論服藥的益處以增進服藥順從。而(2)『討論停藥的時間』錯誤——精神科用藥(如思覺失調、情感疾患)多需長期維持，不可自行停藥，出院衛教應強調『持續規則服藥』而非討論何時停藥。故正確為①③④(選 B)。","options":{"A":"①②③：含敘述2(討論停藥時間)，錯誤。","B":"正確。壓力調適①、演練症狀因應③、討論服藥益處④為出院計畫內容。","C":"①②④：含敘述2，錯誤。","D":"②③④：含敘述2，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"101110-N5-33":{"quick":"幻聽病人：呈現現實「我沒看到別人」＋同理害怕＋陪伴。","detail":{"background":"管小姐有命令性/辱罵性幻聽(「男人聲音罵我要殺我」)。最適切回應是『陳述現實(presenting reality)＋同理＋陪伴』:「我沒看到有其他人在這裡，不過我知道你現在一定很害怕，我在這裡陪你」——既不否定其感受、也不附和幻聽內容，溫和呈現客觀現實並提供安全感。B 關門提供私人空間反而讓其更孤立、危險;C 帶到大廳轉移未處理當下恐懼;D 直接投針劑非首選(先以人際安撫)。故 A 正確。","options":{"A":"正確。溫和呈現現實「我沒看到別人」並同理害怕、陪伴，最適切。","B":"關門提供私人空間反使其更孤立、有風險。","C":"帶到大廳轉移注意未處理當下恐懼。","D":"直接投予針劑非首選，應先以人際安撫。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","幻覺護理"]}},"101110-N5-40":{"quick":"「先生外遇都是自己的錯、對不起他」＝把責任轉向自己＝內射(introjection)。","detail":{"background":"病人把先生外遇『完全歸咎於自己、過度自責、對不起對方』，是把對外在對象(先生)的情感與責任『轉向內在、加諸自己』，即『內射作用(introjection)』。憂鬱症病人常以內射處理對失落對象的矛盾情感，把憤怒轉向自己而表現為自責與罪惡感。否認是拒絕承認事實;反向是表現相反行為;壓抑是有意識壓下念頭。故為內射。","options":{"A":"否認是拒絕承認痛苦的事實。","B":"反向是表現出與真實感受相反的行為。","C":"壓抑是有意識地把念頭壓下。","D":"正確。把責任與情感轉向自己、過度自責，是內射作用(introjection)。"},"sources":["精神科護理學·心理防衛機轉","憂鬱症心理動力"]}},"102030-N5-3":{"quick":"「還沒準備好、暫時不想談衝突」＝有意識延後處理＝壓抑(suppression)。","detail":{"background":"家暴後的病人說「我心理還沒準備好，目前只想顧小孩，不想談和先生的衝突」——這是『有意識地、刻意地把痛苦的念頭或議題暫時擱置』，屬『壓抑(suppression)』(意識層面的延後處理)。與『潛抑(repression)』不同(潛抑是不自覺地把痛苦排除到潛意識)。否認是拒絕承認事實;反向是相反行為;內射是把外在情感轉向自己。故為壓抑。","options":{"A":"否認是拒絕承認痛苦事實，病人並未否認衝突存在。","B":"反向是表現出與真實感受相反的行為。","C":"正確。有意識地暫時擱置不想談的議題，是壓抑(suppression)。","D":"內射是把外在對象的情感轉向自己。"},"sources":["精神科護理學·心理防衛機轉"]}},"102030-N5-14":{"quick":"「蘋果和香蕉有什麼不一樣」＝評估抽象思考力。","detail":{"background":"請病人比較兩物的異同(如「蘋果和香蕉有什麼不一樣/相同」)，是 MSE 中評估『抽象思考力』——能否歸納出抽象的類別概念(如都是水果)。思覺失調或器質性病人常只能具體回答(顏色、形狀)。判斷力是情境決策;注意力是專注持續;記憶力是回憶能力。故為抽象思考力。","options":{"A":"正確。比較兩物異同是評估抽象思考力。","B":"判斷力評估面對情境的決策。","C":"注意力評估專注與持續能力。","D":"記憶力評估回憶能力。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"102030-N5-28":{"quick":"「不懂為何這樣、無法控制」(強迫症自知力)：同理其感受並討論因應措施。","detail":{"background":"何小姐自覺痛苦、不懂自己為何如此、無法控制(具病識感的強迫症/焦慮症典型)。最適宜護理是『同理其感受並與之討論因應措施』，接納其困擾並協助發展因應策略。A 急著澄清「不是神經病」未處理其痛苦;B 逕自說要請醫師加藥未先同理且越權;D「很多人都有」輕忽其個別感受。對有病識感、感到痛苦的病人，先同理再協助因應。故 C 正確。","options":{"A":"急著澄清診斷未處理其痛苦感受。","B":"逕說請醫師加藥未先同理且越權。","C":"正確。同理其感受並與之討論因應措施，最適宜。","D":"「很多人都有」輕忽其個別痛苦。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"102030-N5-40":{"quick":"憂鬱症最可能的防衛機轉(精神動力)＝內射作用(introjection)。","detail":{"background":"依精神動力學說，憂鬱症病人對失落的對象懷有矛盾(愛恨並存)的情感，會把對外在對象的『憤怒轉向內在、加諸自己』，即『內射作用(introjection)』，臨床表現為自責、罪惡感、自我貶低甚至自殺。否定是拒絕承認;壓抑是有意識壓下;外射(投射)是歸咎他人。故憂鬱症最常用內射。","options":{"A":"否定作用是拒絕承認痛苦的事實。","B":"壓抑作用是有意識地把念頭壓下。","C":"正確。憂鬱症把對失落對象的憤怒轉向自己，是內射作用。","D":"外射(投射)是把自己的情感歸咎他人，方向相反。"},"sources":["精神科護理學·心理防衛機轉","憂鬱症心理動力"]}},"102110-N5-3":{"quick":"認知功能評估：問「醫師為何開這種藥給您」＝評估病識感(insight)。","detail":{"background":"MSE 各項評估的正確配對:『請告訴我醫師為何開這種藥給您?』是評估病人對自己『疾病與治療的認識，即病識感(insight)』。其他錯誤:A「住幾號房」評估的是『定向力(地點)』，非抽象思考;B「正反背誦數字」評估的是『注意力』，非計算;D「失敗為成功之母是什麼意思」評估『抽象思考』，非判斷力。故 C 正確。","options":{"A":"問住幾號房評估定向力(地點)，非抽象思考。","B":"正反背誦數字評估注意力，非計算能力。","C":"正確。問醫師為何開藥是評估病識感(insight)。","D":"解釋諺語評估抽象思考，非判斷力。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"102110-N5-7":{"quick":"適合認知行為治療者＝有認知與現實感的個案(30歲慮病症)。","detail":{"background":"認知行為治療(CBT)需要病人具備一定的『認知能力、語言表達與現實感』，以辨識並修正不合理思考。30歲慮病症(身體症狀障礙)個案保有現實感與認知功能，適合 CBT。而思考脫離現實的躁症個案、器質性精神病個案、70歲失智症個案，因現實感或認知功能受損，不適合 CBT。故選 D。","options":{"A":"思考脫離現實的躁症個案不適合 CBT。","B":"器質性精神病個案認知功能受損，不適合。","C":"70歲失智症個案認知退化，不適合 CBT。","D":"正確。30歲慮病症個案保有認知與現實感，適合認知行為治療。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","認知行為治療適應症"]}},"102110-N5-10":{"quick":"行為治療中病人因改變而焦慮、出現阻力：持續給予支持與鼓勵。","detail":{"background":"行為治療中，病人面臨行為改變與新適應方式時易產生焦慮甚至阻力(抗拒)。護理師正確反應是『持續給予支持與鼓勵』，陪伴病人度過改變的不適、維持治療進程，而非因焦慮就暫緩執行(會強化逃避)。提供多元化環境、增強行為改變都非針對「焦慮與阻力」此刻的處理。對改變中的焦慮，支持與鼓勵是關鍵。","options":{"A":"因焦慮就暫緩執行會強化逃避，不利改變。","B":"提供多元化環境非針對當下焦慮與阻力。","C":"正確。持續給予支持與鼓勵，陪伴病人度過改變的焦慮。","D":"增強行為改變非針對「焦慮與阻力」的直接處理。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","行為治療"]}},"102110-N5-37":{"quick":"佛洛伊德主張潛意識早期未解決衝突致病＝心因性病因論。","detail":{"background":"佛洛伊德(Freud)的精神分析主張精神疾病起因於『潛意識中早期(童年)未解決的衝突』，屬『心因性(psychogenic)病因論』——強調心理因素(潛意識、早期經驗)為病因。妖魔化身是中世紀對精神疾病的迷信解釋;人道關懷是 Pinel 等的改革態度;描述性精神醫學(Kraepelin)著重症狀分類與描述。故佛洛伊德的觀點屬心因性病因論。","options":{"A":"妖魔化身是中世紀對精神疾病的迷信解釋。","B":"人道關懷是 Pinel 等改革者的態度。","C":"描述性精神醫學著重症狀的分類與描述。","D":"正確。佛洛伊德強調潛意識早期衝突致病，屬心因性病因論。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神分析"]}},"102110-N5-38":{"quick":"憂鬱症最常使用的防衛機轉＝內射作用(introjection)。","detail":{"background":"憂鬱症病人對失落對象懷有矛盾情感，把『憤怒轉向自己(內射)』，表現為自責、罪惡與自我貶低，故最常使用『內射作用(introjection)』。合理化是找藉口;投射是歸咎他人;認同是仿效他人以提升自我。憂鬱症的核心心理動力是把對外在的負向情感內攝到自身。故為內射。","options":{"A":"合理化是為行為找看似合理的藉口。","B":"投射作用是把自己的情感歸咎他人。","C":"認同作用是仿效他人特質以提升自我。","D":"正確。憂鬱症把憤怒轉向自己，最常用內射作用(introjection)。"},"sources":["精神科護理學·心理防衛機轉"]}},"103030-N5-2":{"quick":"病人因實習結束哭泣：以治療性沉默＋輕按肩膀的非語言支持回應。","detail":{"background":"護生告知是實習最後一天，病人掩面哭泣(分離哀傷)。最佳反應是『沉默、手輕按病人肩膀』——以治療性沉默與非語言的支持，接納並陪伴病人的情緒，給其宣洩空間。A「我還會再來看你」是不一定能兌現的承諾;B「人生無不散之宴席」是說教、淡化情緒;C「你不要哭，你一哭我不知怎麼辦」把焦點轉到護生自己、否定病人情緒。故 D 正確。面對哀傷，安靜陪伴與非語言支持最具治療性。","options":{"A":"「我還會再來看你」是不一定能兌現的承諾。","B":"「人生無不散之宴席」是說教、淡化情緒。","C":"「你不要哭」否定病人情緒、把焦點轉到護生。","D":"正確。以治療性沉默＋輕按肩膀的非語言支持回應哀傷。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","治療性沉默"]}},"103030-N5-10":{"quick":"危機：是不平衡狀態②、超越個人應付能力的過渡期③、正確處置可提升能力④(危機非精神疾病①)。","detail":{"background":"危機(crisis)的概念:(2)是個人處於『不平衡(disequilibrium)』的狀態;(3)是一段『過渡期』，因事件超越了個人慣用的應付能力而產生;(4)經『正確處置，結果可能提升個人的因應能力與成長』(危機亦是轉機)。而(1)『危機是一種精神疾病』錯誤——危機是對壓力事件的暫時反應，並非精神疾病。故正確為②③④(選 A)。","options":{"A":"正確。不平衡狀態②、超越應付能力的過渡期③、正確處置可提升能力④。","B":"①②③：含敘述1(危機是精神疾病)，錯誤。","C":"①②④：含敘述1，錯誤。","D":"①③④：含敘述1，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","Caplan 危機理論"]}},"103030-N5-22":{"quick":"原住民 PTSD 的多元文化災難照護：認識文化對健康的影響、了解其原生社區情境。","detail":{"background":"李女士為原住民、創傷後壓力症、風災後不願入住平地永久屋。多元文化的災難照護原則是『尊重並認識文化對健康與適應的影響，了解個案原生社區的情境脈絡，以利後續照護』。A 以「尊重自主」為由完全不再服務是放棄照護;C 進入社區外展正確，但「仍以國語溝通為主」忽視語言文化障礙;D「無法評估其資源故先處理 PTSD」忽略文化脈絡的評估。故 B 正確。文化敏感與脈絡理解是多元文化照護的核心。","options":{"A":"以尊重自主為由完全不服務是放棄照護。","B":"正確。認識文化對健康的影響、了解原生社區情境，以利照護。","C":"外展正確，但堅持以國語溝通忽視語言文化障礙。","D":"忽略文化脈絡評估、逕自先處理 PTSD 不當。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","多元文化照護"]}},"103030-N5-30":{"quick":"焦慮病人護理：環境安靜減刺激①、轉移注意活動②、放鬆技巧④(勿告知3天藥後即出院工作③)。","detail":{"background":"對焦慮病人的護理:(1)保持環境安靜、減少過多刺激;(2)安排可轉移注意力的活動以紓緩焦慮;(4)教導與協助運用放鬆技巧(深呼吸、肌肉放鬆)。而(3)『告知服藥3天後即可出院工作』錯誤——焦慮症治療需足夠療程、抗焦慮/抗憂鬱藥常需數週起效，不可承諾3天即可出院工作，且會造成不實期待。故正確為①②④(選 C)。","options":{"A":"①②③：含敘述3(3天出院工作)，錯誤。","B":"②③④：含敘述3，錯誤。","C":"正確。環境安靜減刺激①、轉移注意②、放鬆技巧④為焦慮護理。","D":"①③④：含敘述3，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","焦慮症護理"]}},"103030-N5-32":{"quick":"精神疾病發生原因：人格可能是發病的潛在因素。","detail":{"background":"精神疾病的病因觀:(C)『人格特質可能是精神疾病發病的潛在因素』(如某些人格易感性)，正確。其他錯誤:A 精神疾病的潛在病因與發病時間『未必相距很短』，常是長期累積;B 精神疾病的發病『通常沒有單一明確可辨的病因』，多為生物-心理-社會多因交互;D 精神疾病的發病『受基因遺傳影響』(許多疾病有遺傳易感性)。故 C 正確。","options":{"A":"潛在病因與發病時間未必相距很短，常長期累積。","B":"精神疾病多無單一明確病因，是多因交互。","C":"正確。人格可能是精神疾病發病的潛在因素。","D":"精神疾病的發病受基因遺傳影響。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"103030-N5-33":{"quick":"代幣制度＝行為治療模式(運用增強原理)。","detail":{"background":"代幣制度(token economy)以『代幣作為次級增強物，當病人表現目標行為時給予代幣、累積後兌換獎勵』，運用操作制約的增強原理塑造行為，屬『行為治療模式』。電療(ECT)屬生物性治療;夢的解析屬精神分析(心理動力);家庭治療屬家庭系統取向。故代幣制度屬行為治療。","options":{"A":"電療(ECT)屬生物性治療。","B":"正確。代幣制度運用增強原理塑造行為，屬行為治療模式。","C":"夢的解析屬精神分析(心理動力)。","D":"家庭治療屬家庭系統取向。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","行為治療·代幣制度"]}},"103030-N5-34":{"quick":"負性症狀＝整日躺床、參與意願低(情感淡漠/動機缺乏)。","detail":{"background":"思覺失調症狀分正性(positive，正常功能的扭曲或增加:幻覺、妄想、語無倫次、怪異行為)與負性(negative，正常功能的減少或缺失:情感淡漠、動機缺乏、社交退縮、思考貧乏、無快感)。方小姐『整日躺床、對活動參與意願不高』屬動機缺乏(avolition)、情感與社交退縮的負性症狀。A 被植入微電腦被控制是妄想(正性);B 自語膜拜哭泣是幻覺/怪異行為(正性)。故 C 為負性症狀。","options":{"A":"被外星人植入微電腦控制是妄想，屬正性症狀。","B":"持續自語、膜拜哭泣是幻覺/怪異行為，屬正性症狀。","C":"正確。整日躺床、參與意願低是動機缺乏/退縮，屬負性症狀。","D":"(若為幻聽妄想等)屬正性症狀，非負性。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","思覺失調症·正負性症狀"]}},"103100-N5-26":{"quick":"焦慮的認知行為治療『非立即見效』，需反覆練習(故 B 錯)。","detail":{"background":"認知行為治療(CBT)用於焦慮症的特性:應在護病信任關係建立、病人生理需求滿足後才易進行(A 對);旨在培養個案有效的自我管理技巧、在生活中持續學習(C 對);認知與行為的改變需要『反覆練習』(D 對)。而 B『教導性的，因此可以立即見效』錯誤——CBT 雖具教導性，但改變需時間與反覆練習，無法立即見效。故 B 為錯誤者。","options":{"A":"須在信任關係與生理需求滿足後進行，正確。","B":"正確(本題選錯誤者)。CBT 雖具教導性，但需反覆練習，無法立即見效。","C":"培養自我管理技巧、生活中持續學習，正確。","D":"認知行為的改變需反覆練習，正確。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","認知行為治療"]}},"103100-N5-30":{"quick":"Erikson 老年期發展課題＝自我整合對絕望。","detail":{"background":"艾瑞克森(Erikson)心理社會發展八階段中，『老年期(65歲以上)』的發展危機是『自我整合對絕望(integrity vs. despair)』——回顧一生，若能接納並肯定自己的人生則達自我統整，否則陷入絕望與悔恨。親密對孤立是成年早期;進取(自動自發)對罪惡是學齡前期;生產對停滯是成年中期。故老年期為自我整合對絕望。","options":{"A":"親密對孤立是成年早期的課題。","B":"正確。自我整合對絕望是老年期的發展課題。","C":"進取心對罪惡感是學齡前期(3–6歲)的課題。","D":"生產對停滯是成年中期的課題。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論"]}},"103100-N5-38":{"quick":"危機管理評估：評估可利用資源②、注意主題與對事件的感受③(勿阻止談死亡①、仍需確認促發事件④)。","detail":{"background":"喪偶後出現失眠、退縮、自殺行為的黃小姐，危機管理評估宜:(2)評估其現有可利用的資源(支持系統);(3)會談中注意談話的主題及其對事件的感受。而(1)『阻止或轉移談先生死亡的話題』錯誤——應讓病人表達哀傷，阻止反而壓抑情緒;(4)『危機事件明確可不需再確認促發事件』錯誤——仍須確認促發事件與其主觀意義。故正確為②③(選 B)。","options":{"A":"①②：含敘述1(阻止談死亡)，錯誤。","B":"正確。評估可利用資源②、注意主題與對事件的感受③。","C":"③④：含敘述4(不需確認促發事件)，錯誤。","D":"①④：含敘述1與4皆錯。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","危機處置"]}},"104030-N5-4":{"quick":"退回幼兒行為(失禁、兒童語言)＝退化現象(regression)。","detail":{"background":"被性侵的高中生因創傷而出現『大小便失禁、使用兒童般的語言』——退回到較早期、較幼稚的行為模式以逃避目前的壓力，這是『退化(regression)』。取代(displacement)是把情緒轉向較安全的對象;壓抑是有意識壓下念頭;反向是表現相反行為。本題核心是『退回早期幼稚行為』，故為退化。","options":{"A":"取代是把情緒轉移到較安全的對象。","B":"正確。退回幼兒般的失禁與語言行為，是退化(regression)。","C":"壓抑是有意識地把念頭壓下。","D":"反向作用是表現出與真實感受相反的行為。"},"sources":["精神科護理學·心理防衛機轉"]}},"104030-N5-6":{"quick":"情感轉移＝病人把對重要他人的情感投射到護理師(如斥責護理師如同對待女兒)。","detail":{"background":"情感轉移(transference)是『病人』把對過去重要他人的情感投射到護理師身上。B「病人斥責護理師如同對自己的女兒一般」正是病人的轉移。其他三項都是『反轉移(countertransference)』(護理師投射到病人):A 護理師把病人當過世母親;C 護理師因病人像酗酒父親而不耐煩;D 護理師想幫單親病人照顧小孩與雙親(過度涉入)。故 B 正確。","options":{"A":"護理師把病人當過世母親，屬反轉移。","B":"正確。病人斥責護理師如同對女兒，是病人的情感轉移。","C":"護理師因病人像父親而不耐煩，屬反轉移。","D":"護理師過度涉入想幫病人照顧家人，屬反轉移。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","轉移與反轉移"]}},"104030-N5-7":{"quick":"「早餐吃什麼」評估的是記憶，非定向力(故不適合評估定向力)。","detail":{"background":"定向力(orientation)評估病人對『時間、地點、人物』的辨識:床號(地點)、國曆幾月幾日(時間)、照顧的護理師叫什麼名字(人物)都是定向力問句。而『你今天早餐吃些什麼』評估的是『近期記憶(recent memory)』，不是定向力。故 B 不是評估定向力的適當問句。","options":{"A":"問病房床號評估地點定向力，適當。","B":"正確(本題選不適當者)。問早餐吃什麼評估近期記憶，非定向力。","C":"問國曆幾月幾日評估時間定向力，適當。","D":"問照顧護理師的名字評估人物定向力，適當。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論"]}},"104030-N5-13":{"quick":"認知行為治療：運用學習理論解決生活問題①、促進健康因應③、協助克服困難促成長④(探討童年②屬精神分析)。","detail":{"background":"認知行為治療(CBT)的特性:(1)運用學習理論解決生活上的問題;(3)促進健康的因應行為;(4)協助個案克服生活困難並促進成長。而(2)『主要探討個案童年早期經驗以修復心理創傷』錯誤——那是『精神分析』的取向，CBT 著重『此時此刻』的認知與行為，而非童年經驗的挖掘。故正確為①③④(選 B)。","options":{"A":"①②③：含敘述2(探討童年經驗)，屬精神分析。","B":"正確。運用學習理論①、促進健康因應③、協助克服困難促成長④。","C":"①②④：含敘述2，錯誤。","D":"②③④：含敘述2，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","認知行為治療"]}},"104030-N5-25":{"quick":"批評老闆卻當面畢恭畢敬＝反向作用(reaction formation)。","detail":{"background":"林先生對老闆極度不滿(內在敵意)，卻在老闆面前表現出『畢恭畢敬、噓寒問暖』(與真實感受相反的行為)，這是『反向作用(reaction formation)』——以與內在無法接受的衝動相反的言行來掩飾它。投射是把自己的情感歸咎他人;否認是拒絕承認;合理化是找藉口。本題核心是『表現出與真實敵意相反的恭敬』，故為反向作用。","options":{"A":"投射是把自己的敵意歸咎他人。","B":"否認是拒絕承認事實。","C":"正確。內在不滿卻表現出相反的恭敬，是反向作用(reaction formation)。","D":"合理化是為行為找看似合理的藉口。"},"sources":["精神科護理學·心理防衛機轉"]}},"104030-N5-31":{"quick":"評估夜眠最適問法＝開放式「昨晚睡得如何?」","detail":{"background":"評估睡眠應用『開放式問句』讓病人自由描述，「昨晚睡得如何?」最適當。A「是否做惡夢?」是聚焦且誘導(暗示惡夢);B「是否睡得好?」與 C「睡得好不好?」是封閉式(只能答好/不好)且帶誘導，無法取得完整資訊。開放式問句利於收集主觀且完整的睡眠資料。故 D 正確。","options":{"A":"「是否做惡夢」聚焦且誘導，限制回答。","B":"「是否睡得好」是封閉式且誘導。","C":"「睡得好不好」是封閉式，回答受限。","D":"正確。「昨晚睡得如何?」是開放式問句，利於完整描述。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論"]}},"104030-N5-40":{"quick":"成熟危機＝內生性且可預期①、個體經歷身心社會巨大改變時潛在危機發生④(失業喪子火災③屬情境危機)。","detail":{"background":"危機依壓力事件性質分為『成熟(發展)危機』與『情境危機』。成熟危機:(1)是『內生性、可預期』的(隨發展階段而來，如青春期、結婚、退休);(2)依 Erikson 心理社會發展理論，各階段任務未達成可演變為危機。而(3)『失業、喪子、火災等不可預期事件』屬『情境危機(situational crisis)』，非成熟危機;(4)身心社會巨大改變引發潛在危機的描述較泛、非成熟危機的定義特徵。故正確為①②(選 A)。","options":{"A":"12：敘述2(各階段任務未達成演變為危機)非本題對「成熟危機」的界定要點。","B":"23：含敘述3(失業、喪子、火災屬「情境」危機，非成熟危機)。","C":"34：含敘述3(情境危機)，錯誤。","D":"正確。①成熟危機為內生性、可預期，④個體經歷身心社會巨大改變時潛在危機就會發生。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","危機分類"]}},"104100-N5-2":{"quick":"創傷後對事件完全記不起來(不自覺遺忘)＝潛抑作用(repression)。","detail":{"background":"目睹同伴溺斃的倖存者，事後『對所發生的事情完全記不起來』——這是『不自覺地』把極度痛苦的記憶排除到潛意識之外，屬『潛抑作用(repression)』。潛抑與壓抑(suppression)的差別:潛抑是『不自覺(unconscious)』的遺忘，壓抑是『有意識(conscious)』地刻意擱置。合理化是找藉口;退化是退回早期行為。故為潛抑。","options":{"A":"壓抑是有意識地刻意擱置，本題是不自覺的遺忘。","B":"合理化是為行為找看似合理的藉口。","C":"退化是退回較早期的幼稚行為。","D":"正確。不自覺地把痛苦記憶排除到潛意識，是潛抑作用(repression)。"},"sources":["精神科護理學·心理防衛機轉"]}},"104100-N5-6":{"quick":"問什麼都重複答同一答案(持續言語 perseveration)＝器質性腦疾患。","detail":{"background":"病患不論被問年齡或同住者，都『持續重複同一個答案(55歲)』，這是『持續言語(perseveration)』——無法轉換思路、不斷重複先前的反應，是『器質性腦疾患(如失智、譫妄)』認知功能受損的典型表現。憂鬱、PTSD、焦慮症不會出現此種固著重複的器質性症狀。故為器質性腦疾患。","options":{"A":"憂鬱性疾患不會出現持續重複同一答案的器質性表現。","B":"創傷後壓力疾患以再現、過度警覺為主，非持續言語。","C":"正確。持續重複同一答案(perseveration)是器質性腦疾患的表現。","D":"焦慮性疾患不會出現此種固著重複。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","器質性精神疾患"]}},"104100-N5-10":{"quick":"譫妄＝焦躁不安、定向障礙、易有知覺障礙(意識障礙描述)。","detail":{"background":"意識障礙各層級:譫妄(delirium)表現為『焦躁不安、定向障礙、注意力波動、易有知覺障礙(錯/幻覺)』，意識清醒度起伏。其他描述配對錯誤:A「對環境無知覺、對刺激幾乎無反應」是『昏迷(coma)』非朦朧;B「自發動作減少、易思睡、反射減少」較近『嗜睡/木僵』非昏迷;C「無法清楚思考、有定向障礙但對刺激仍有反應」是『意識混亂/朦朧』非嗜睡。故 D(譫妄)描述正確。","options":{"A":"對刺激幾乎無反應是昏迷，非意識朦朧。","B":"自發動作減少、易思睡是嗜睡/木僵，非昏迷。","C":"無法清楚思考但仍有反應是意識混亂，非嗜睡。","D":"正確。焦躁不安、定向障礙、易有知覺障礙是譫妄。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","意識障礙"]}},"104100-N5-19":{"quick":"躁鬱症(躁期)護理：以溫和態度協助改善易怒衝動的溝通方式。","detail":{"background":"尹小姐躁症發作(活動量增、失眠、話多、易怒爭吵)。較恰當的護理是『以溫和的態度協助病人改善易怒、衝動的溝通方式』，提供穩定、低刺激的環境並設限。A『預防性給 Haldol 滴劑防攻擊』非首選(藥物應依醫囑與症狀，非預防性常規給);B『儘可能接納不爭辯』方向對但較被動，D 更主動且具體;C『轉移的心理防衛機轉』描述不準(躁症常用否認/誇大)。故 D 正確。","options":{"A":"預防性給 Haldol 防攻擊非首選，藥物應依醫囑與症狀。","B":"接納不爭辯方向對但較被動，D 更具體適當。","C":"躁症常用否認/誇大防衛，非「轉移」，描述不準。","D":"正確。以溫和態度協助改善易怒衝動的溝通方式。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","躁症護理"]}},"104100-N5-25":{"quick":"母親給予互相矛盾、無論怎麼做都被罵的訊息＝雙重束縛(double bind)。","detail":{"background":"母親一方面要李小妹『懂事、幫忙分擔』，當她去哄弟弟時又被罵『為何弄哭弟弟、真不乖』——傳遞『互相矛盾、無論怎麼做都錯』的訊息，使孩子無所適從，這是家庭理論中的『雙重束縛(double bind)』(Bateson 提出，與思覺失調發生有關的家庭溝通型態)。代罪羔羊是家庭把問題歸咎於某成員;偽共生是過度糾結的家庭關係;混淆世代界線是親子角色錯亂。故為雙重束縛。","options":{"A":"代罪羔羊是家庭把問題歸咎於某一成員。","B":"正確。給予矛盾、無論怎麼做都錯的訊息，是雙重束縛(double bind)。","C":"偽共生是家庭成員過度糾結的關係。","D":"混淆世代界線是親子角色與界限的錯亂。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","家庭溝通理論"]}},"104100-N5-29":{"quick":"認知行為治療焦慮策略：肌肉鬆弛①、認知重建②、學習新行為④(分析潛意識③屬精神分析)。","detail":{"background":"認知行為治療(CBT)運用於焦慮障礙的策略:(1)肌肉鬆弛法(放鬆訓練);(2)認知重建(辨識並修正不合理想法);(4)學習新行為(如系統減敏、暴露)。而(3)『分析潛意識』錯誤——那是精神分析的方法，非 CBT。故正確為①②④(選 B)。CBT 著重認知與行為層面，而非潛意識的挖掘。","options":{"A":"①②③：含敘述3(分析潛意識)，屬精神分析。","B":"正確。肌肉鬆弛①、認知重建②、學習新行為④是 CBT 策略。","C":"①③④：含敘述3，錯誤。","D":"②③④：含敘述3，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","認知行為治療"]}},"104100-N5-38":{"quick":"風災 3 個月後仍過度警覺、再現、麻木(>1個月)＝創傷後壓力症，可給個別或團體心理治療。","detail":{"background":"盧太太風災後『超過1個月(已第3個月)仍持續過度警覺、創傷經驗再現、情感麻木、失眠』——符合『創傷後壓力症(PTSD)』(症狀持續>1個月;若<1個月為急性壓力症)。第3個月的災難心理衛生照護重點是『可給予個別或團體心理治療』以處理創傷。A 已非急性期(僅做傷口照護不足);B 尚未復原(仍有明顯 PTSD 症狀，非只做防疫);C 稱「急性壓力反應」錯誤(已>1個月)。故 D 正確。","options":{"A":"已非急性期，僅做傷口照護不足以處理 PTSD。","B":"仍有明顯 PTSD 症狀，尚未復原，非只做防疫。","C":"症狀已>1個月，非急性壓力反應。","D":"正確。屬創傷後壓力症，可給予個別或團體心理治療。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","PTSD"]}},"105030-N5-1":{"quick":"精神分析模式焦點＝以自由聯想與夢的解析解釋潛意識中的衝突。","detail":{"background":"以精神分析模式(psychoanalytic model)為基礎的照護，治療過程焦點在『運用自由聯想(free association)與夢的解析(dream analysis)，揭露並解釋病人潛意識中的衝突』，使潛意識意識化。討論病情變化預後是一般醫療;透過教育改變行為是行為/認知模式;透過治療性人際互動建立現實感是人際模式。故 A 正確。","options":{"A":"正確。以自由聯想與夢的解析解釋潛意識中的衝突，是精神分析模式的焦點。","B":"討論病情變化與預後是一般醫療。","C":"透過教育改變行為是行為/認知模式。","D":"透過人際互動建立現實感是人際關係模式。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","精神分析"]}},"105030-N5-3":{"quick":"精神醫學首次革命(人道照護)＝畢乃爾(Pinel)除去精神病人的鎖鍊。","detail":{"background":"精神醫學的首次革命奠定『以人道立場照護精神病人』，影響最大的是『畢乃爾(Philippe Pinel)』——他在法國解除精神病人的鎖鍊、主張人道對待，開啟道德治療(moral treatment)。韋耶主張精神病與巫魔無關;希區創設收容醫院型態;佛洛伊德創立精神分析(屬第二次革命，心因論)。故首次人道革命為 Pinel。","options":{"A":"韋耶主張精神病與巫魔無關，非人道照護的首次革命代表。","B":"正確。畢乃爾(Pinel)除去精神病人的鎖鍊，開啟人道照護。","C":"希區創設收容醫院型態，非人道革命的代表。","D":"佛洛伊德創立精神分析，屬心因論革命(第二次)。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","精神醫學史"]}},"105030-N5-7":{"quick":"經歷大地震常是精神疾病的『近因/誘發因素(precipitating factor)』。","detail":{"background":"精神疾病的病因可分:素因/前置因素(predisposing，使人易感:基因遺傳、孕期感染、人格、童年經驗)、誘發/近因(precipitating，即刻觸發的事件:重大壓力如地震、喪親)、續存/惡化因素(perpetuating，使疾病持續或惡化:高情緒表露家庭、缺乏支持)。故 A『經歷大地震是近因/誘發因素』正確;B 孕期感染、C 人格皆屬『素因』(非近因/惡化);D 高情緒表露雙親屬『續存/惡化因素』(非近因)。故 A 正確。","options":{"A":"正確。經歷大地震是即刻觸發的誘發因素(precipitating)。","B":"母親孕期感染屬素因(predisposing)，非近因。","C":"人格屬素因，非惡化/續存因素。","D":"高情緒表露雙親屬續存/惡化因素，非近因。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","精神疾病病因學"]}},"105030-N5-11":{"quick":"逐步養成法(shaping)：由簡單開始②、塑造新行為③、用於自我照顧缺失者④(步驟應小不可大①)。","detail":{"background":"逐步養成法/塑造(shaping)是行為治療技術，透過『連續漸進地增強趨近目標的行為』來建立新行為:(2)由簡單的方式開始;(3)用來塑造『新』行為;(4)常用於自我照顧缺失(如退縮、退化)的病人。而(1)『移動步驟可大一點』錯誤——步驟應『小而漸進』，太大易失敗。故正確為②③④(選 D)。","options":{"A":"①②③：含敘述1(步驟可大一點)，錯誤；步驟應小而漸進。","B":"①②④：含敘述1，錯誤。","C":"①③④：含敘述1，錯誤。","D":"正確。由簡單開始②、塑造新行為③、用於自我照顧缺失者④。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","行為治療·塑造"]}},"105030-N5-22":{"quick":"雙相情緒障礙『最不適切』的防衛機轉描述＝合理化面對困難。","detail":{"background":"雙相情緒障礙病人常用的防衛機轉:把失落的不滿不敢外宣而『內射』向自己(A)、以『否認』來否定挫折焦慮(B)、以『反向作用』隱藏內在痛苦而表現相反情緒(躁期亢奮掩飾內在憂鬱)(C)，這些都貼切。而 D『以合理化來面對困難』最不適切——合理化(為行為找藉口)並非雙相情緒障礙最具代表性的防衛機轉。故 D 為最不適切者。","options":{"A":"不敢外宣失落的不滿而內射向自己，貼切。","B":"以否認否定挫折與焦慮，貼切。","C":"以反向作用表現相反情緒(躁掩飾鬱)，貼切。","D":"正確(本題選最不適切者)。合理化非雙相情緒障礙最具代表性的防衛機轉。"},"sources":["精神科護理學·心理防衛機轉","雙相情緒障礙"]}},"105030-N5-24":{"quick":"解離症提供免於面對問題的途徑＝潛抑(repression)。","detail":{"background":"解離症(dissociative disorders，如解離性失憶、人格)的症狀(失憶、意識分裂)為病人提供『免於面對痛苦問題』的途徑，其核心防衛機轉是『潛抑(repression)』——不自覺地把難以承受的記憶、情緒排除到意識之外(解離可視為潛抑的極端表現)。昇華是把衝動導向社會接受的方向;補償是以一長處彌補短處;否定是拒絕承認事實。故為潛抑。","options":{"A":"昇華是把衝動導向社會接受的活動。","B":"正確。解離症以潛抑(repression)把痛苦排除到意識之外。","C":"補償是以一方面成就彌補另一方面不足。","D":"否定是拒絕承認痛苦的事實。"},"sources":["精神科護理學·心理防衛機轉","解離症"]}},"105090-N5-4":{"quick":"以自由聯想/夢解析揭露潛意識衝突促進治療＝佛洛伊德心理分析模式。","detail":{"background":"承前情境，護理師藉由『揭露潛意識衝突(自由聯想、夢的解析)』來促進治療，所依據的是『佛洛伊德(Freud)的心理分析模式』。伯恩(Berne)的溝通模式是交流分析(成人-父母-兒童自我狀態);卡普蘭(Caplan)是危機/預防模式;沙利文(Sullivan)是人際關係模式。本題以潛意識衝突為治療焦點，故為心理分析模式。","options":{"A":"伯恩的溝通模式是交流分析(自我狀態)。","B":"卡普蘭是危機/預防模式。","C":"沙利文是人際關係模式。","D":"正確。以潛意識衝突為焦點，依據佛洛伊德的心理分析模式。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","精神分析"]}},"105090-N5-5":{"quick":"一方期待玩樂、另一方理性回應收支(回應未對應期待)＝交錯溝通(crossed)。","detail":{"background":"依交流分析論(TA)，溝通型態分:互補溝通(complementary，回應對應發訊者期待的自我狀態，溝通順暢)、交錯溝通(crossed，回應來自非預期的自我狀態，溝通中斷或衝突)、隱密溝通(ulterior，表面與隱含訊息不一致)。王先生以『兒童/自由』狀態邀約慶祝旅遊，太太卻以『成人/理性』狀態回應收支需節省——回應未對應其期待，屬『交錯溝通(crossed)』。故 B 正確。","options":{"A":"互補溝通是回應對應發訊者期待，溝通順暢。","B":"正確。一方邀約玩樂、另一方理性談收支，回應未對應期待，是交錯溝通。","C":"隱密溝通是表面與隱含訊息不一致。","D":"交流分析無「深層溝通」此型態。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 心理社會發展理論","交流分析(TA)"]}},"105090-N5-8":{"quick":"虛談(confabulation)＝失憶而編造故事填補記憶空白。","detail":{"background":"記憶的臨床表現:虛談現象(confabulation)是病人因『失憶而無意識地編造故事來填補記憶空白』，常見於 Korsakoff 症候群(慢性酗酒致硫胺缺乏)、失智症。其他錯誤:A『選擇性記憶喪失』多為心因性失憶(非器質性);B 長期酗酒造成的是『器質性』失憶(Korsakoff)，非心因性;C 失智症最先喪失的是『近期記憶』，而非遠期記憶。故 D 正確。","options":{"A":"選擇性記憶喪失多為心因性，非器質性失憶。","B":"長期酗酒造成器質性(Korsakoff)失憶，非心因性。","C":"失智症最先喪失近期記憶，非遠期記憶。","D":"正確。虛談是失憶而編造故事填補記憶空白。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","記憶障礙"]}},"105090-N5-15":{"quick":"思覺失調穩定後仍功能受限、情感平淡、人際受限＝殘留期(residual)。","detail":{"background":"思覺失調症的病程分:前驅期(prodromal，功能漸退、怪異想法初現)、活性/發病期(active，明顯正性症狀:幻覺妄想)、殘留期(residual，急性症狀緩解後，遺留負性症狀:情感平淡、退縮、功能與人際受限)。劉先生治療後『精神症狀已穩定，但無法自我照顧與工作、情感平淡、人際受限』，正是殘留期(以負性症狀與功能缺損為主)。故為殘留期。","options":{"A":"前驅期是發病前功能漸退、症狀初現。","B":"發病/活性期以明顯正性症狀(幻覺妄想)為主。","C":"正確。症狀穩定後遺留負性症狀與功能缺損，屬殘留期。","D":"復發期是症狀再度急性發作。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","思覺失調症病程"]}},"105090-N5-17":{"quick":"急性幻聽、自責搥頭(自傷)：最優先護理目標＝穩定症狀及提供安全環境。","detail":{"background":"黃先生急性精神症狀(指責性幻聽)、自責、『搥打頭部(自傷)』。依需求優先順序(馬斯洛、ABC安全原則)，最優先的護理目標是『穩定症狀及提供安全環境』，預防自傷。協助認識精神症狀、自我照顧、維持人際互動雖重要，但須在症狀穩定、安全獲確保之後。對有自傷危險的急性病人，安全永遠是首要。","options":{"A":"正確。對急性幻聽、自傷的病人，穩定症狀及提供安全環境是最優先目標。","B":"協助認識精神症狀須在症狀穩定後。","C":"協助自我照顧非當前最優先(安全優先)。","D":"維持人際互動功能非急性期最優先目標。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry"]}},"105090-N5-28":{"quick":"探索早期人格發展的心理情結＝分析式心理治療。","detail":{"background":"『探索病人早期人格發展中出現的心理情結(complex)』，揭露潛意識與童年經驗對現在的影響，屬『分析式(精神分析取向)心理治療』。團體治療是多人互動的治療形式;娛樂治療以活動紓壓;行為治療以學習原理改變行為。探索早期人格情結是精神分析的核心，故為分析式心理治療。","options":{"A":"團體治療是多人互動的治療形式。","B":"娛樂治療以活動與娛樂紓壓。","C":"正確。探索早期人格發展的心理情結，屬分析式心理治療。","D":"行為治療以學習原理改變行為。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","精神分析"]}},"105090-N5-33":{"quick":"Caplan 危機理論：尋求外援解決則情緒恢復穩定③、紊亂期用壓抑否認合理化外射等防衛④。","detail":{"background":"卡普蘭(Caplan)危機理論四階段:衝擊期(焦慮升高)→退讓期(嘗試慣用方法)→困頓期(嘗試錯誤、尋求新方法或外援，若問題解決則情緒恢復穩定)→解組/崩潰期(防衛失效、人格混亂)。正確敘述:(3)當嘗試錯誤的問題解決失敗後，會尋求外在支援，若問題解決則可恢復情緒穩定;(4)紊亂(崩潰)期時思考僵化，可能採取壓抑、否認、合理化或外射等防衛機轉。而(1)『無論如何均將導致人格瓦解』絕對化錯誤(危機若獲妥善處理可不致瓦解);(2)敘述與階段對應不符。故正確為③④(選 C)。","options":{"A":"①②：含敘述1(無論如何均導致人格瓦解)，絕對化錯誤。","B":"②③：含敘述2，與階段對應不符。","C":"正確。尋求外援解決則恢復穩定③、紊亂期用壓抑否認合理化外射④。","D":"①③：含敘述1，錯誤。"},"sources":["精神科護理學·危機理論(Caplan/Aguilera)"]}},"106030-N5-3":{"quick":"記不起性侵過程、大哭時卻能詳述＝解離作用(dissociation)。","detail":{"background":"被父親性侵的女大學生『承認被性侵卻完全記不起過程，但情緒爆發大哭時又能詳細說出』——意識與痛苦記憶/情感時而隔開、時而連結，這是『解離作用(dissociation)』:把無法承受的痛苦意識與現實暫時分隔以避免痛苦。合理化是找藉口;抵消是以行為抵消念頭;幻想是以想像滿足需求。本題核心是『意識與痛苦記憶的分隔』，故為解離。","options":{"A":"正確。意識與痛苦記憶時而隔開、時而連結，是解離作用(dissociation)。","B":"合理化是為行為找看似合理的藉口。","C":"抵消是以一行為象徵性抵消不被接受的念頭。","D":"幻想作用是以想像滿足無法實現的需求。"},"sources":["精神科護理學·心理防衛機轉"]}},"106030-N5-6":{"quick":"行為評估觀察 ABC：行為前情境①、出現何種行為②、行為後結果④(家人感受③非核心)。","detail":{"background":"行為治療評估問題行為時，採『ABC 分析』:(1)A=行為前情境(antecedent，在何種情況下發生);(2)B=出現何種行為(behavior);(4)C=行為之後產生什麼結果(consequence，增強或懲罰)。透過 ABC 了解行為的觸發與維持因素。而(3)『家人的感受』非行為評估的核心觀察項目。故正確為①②④(選 B)。","options":{"A":"①②③：含敘述3(家人感受)，非 ABC 核心。","B":"正確。行為前情境①、行為②、行為後結果④是 ABC 分析。","C":"①③④：含敘述3，錯誤。","D":"②③④：含敘述3，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","行為治療·ABC分析"]}},"106030-N5-37":{"quick":"Aguilera 危機評估：評估病人對所面臨事件的感覺與觀點(對事件的認知)。","detail":{"background":"安吉列拉(Aguilera)的危機形成模式提出『三大平衡(影響)因素』決定壓力事件是否形成危機:(1)對事件的認知/觀點(perception of event)、(2)情境支持(社會支持)、(3)因應機轉。故評估『朱女士對所面臨事件的感覺與觀點』最適切(屬「對事件的認知」此一核心因素)。社經階層、性別、年齡不是 Aguilera 模式的三大平衡因素。故 B 正確。","options":{"A":"社經階層非 Aguilera 三大平衡因素。","B":"正確。評估對所面臨事件的感覺與觀點，是 Aguilera 的核心因素之一。","C":"性別非 Aguilera 模式的平衡因素。","D":"年齡非 Aguilera 模式的平衡因素。"},"sources":["精神科護理學·危機理論(Caplan/Aguilera)"]}},"106110-N5-1":{"quick":"日間住院的幫助＝較開放、自主，可訓練病人自我管理。","detail":{"background":"日間住院(日間留院)是介於全日住院與社區之間的部分住院模式，白天到院接受治療、晚上回家。其幫助是『較具開放性與自主性，可訓練病人自我管理、銜接社區生活』。其他錯誤:B 並非單純「壓力比較小所以較配合」;C 日間病房仍需人際互動與應對，非「人際關係簡單不需應對」;D「護理師較資深較能掌控不出錯」描述不當。故 A 正確。","options":{"A":"正確。日間住院較開放、自主，可訓練病人自我管理、銜接社區。","B":"幫助非在於「壓力小所以較配合」此描述。","C":"日間病房仍需人際互動與應對。","D":"「護理師資深較能掌控」非日間住院的幫助。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry"]}},"106110-N5-3":{"quick":"潛抑在潛意識層面、壓抑在意識層面。","detail":{"background":"潛抑(repression)與壓抑(suppression)的關鍵差別在『意識層面』:潛抑是『不自覺(潛意識)』地把痛苦的記憶、衝動排除到意識之外;壓抑是『有意識地、刻意地』把不愉快的念頭暫時擱置。故正確為「潛抑是在潛意識層面，壓抑是在意識層面」(選 C)。","options":{"A":"兩者並非都在潛意識層面。","B":"兩者並非都在意識層面。","C":"正確。潛抑在潛意識層面、壓抑在意識層面。","D":"方向相反，潛抑才是潛意識、壓抑才是意識。"},"sources":["精神科護理學·心理防衛機轉"]}},"106110-N5-4":{"quick":"問「為什麼來醫院、醫師為何開藥」＝評估病人對疾病的了解(病識感)。","detail":{"background":"護理師問「為什麼到醫院來?」「醫師為什麼開這些藥給你?」，是在了解病人對自己『疾病與治療的認識，即病識感/對疾病的了解』。評估環境了解是定向;疾病史是過去病程資料;對疾病的因應能力是評估其處理方式。本題問句聚焦病人對「為何住院、為何用藥」的理解，故為評估對疾病的了解。","options":{"A":"對環境的了解屬定向力評估。","B":"正確。問為何住院、為何用藥是評估病人對疾病的了解(病識感)。","C":"疾病史是過去病程的客觀資料。","D":"對疾病的因應能力是評估其處理方式。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry"]}},"106110-N5-6":{"quick":"病房擺時鐘月曆＝刺激與增加現實接觸(現實導向)。","detail":{"background":"病房擺放時鐘與月曆，主要目的是『提供現實導向(reality orientation)，刺激並增加病人與現實的接觸』，協助定向感(時間)，對失智、譫妄或現實感受損的病人特別重要。其目的非主要為自我覺察、訓練閱讀感官或培養獨立行為。故為刺激與增加現實接觸。","options":{"A":"非主要為協助自我覺察。","B":"非主要為訓練閱讀感官功能。","C":"非主要為培養獨立自主行為。","D":"正確。時鐘月曆提供現實導向，刺激並增加與現實的接觸。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","現實導向"]}},"106110-N5-7":{"quick":"複誦三樣事物＝評估近期記憶。","detail":{"background":"記憶評估方法:『複誦並隔幾分鐘後回憶三樣事物(three objects)』主要評估『近期記憶(recent memory)』。其他錯誤:B 數數字(digit span)評估的是『注意力/即刻記憶』，非遠期記憶;C 家中電話、地址是早已熟知的『遠期記憶』，記不得屬遠期記憶障礙(非近期);D 上週發生的事記不起來屬『近期記憶』障礙(非遠期)。故 A 正確。","options":{"A":"正確。複誦並回憶三樣事物評估近期記憶。","B":"數數字評估注意力/即刻記憶，非遠期記憶。","C":"家中電話地址屬遠期記憶，記不得是遠期障礙，非近期。","D":"上週的事記不起來屬近期記憶障礙，非遠期。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","記憶評估"]}},"106110-N5-8":{"quick":"護理師建議參加活動、病人卻喊累要休息(回應未對應)＝交錯性溝通。","detail":{"background":"依交流分析(TA)，護理師以『成人』狀態理性建議「參加活動可增加社交技巧」，病人卻以『兒童』狀態回應「我好累，讓我休息」——回應來自非預期的自我狀態、未對應發訊者的期待，使溝通中斷或偏移，屬『交錯性溝通(crossed transaction)』。互補溝通是回應對應期待、順暢;隱祕溝通是表面與隱含訊息不一致。故為交錯性。","options":{"A":"互補溝通是回應對應發訊者期待，順暢進行。","B":"正確。回應未對應期待、來自不同自我狀態，是交錯性溝通。","C":"交流分析無「清楚性」此標準型態。","D":"隱祕溝通是表面與隱含訊息不一致。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","交流分析(TA)"]}},"106110-N5-27":{"quick":"強迫症：必須結合藥物及行為治療。","detail":{"background":"強迫症(OCD)的正確概念:治療『必須結合藥物(SSRI)及行為治療(暴露不反應法 ERP)』，二者並用效果較佳。其他錯誤:A 出現強迫行為的『兒童』未必知道其行為過度不合理(自知力可能不足，成人較有自知力);B 病人常用的防衛機轉是『抵消、隔離、反向』，非合理化;D 強迫症好發於『青少年至成年早期』，非中年。故 C 正確。","options":{"A":"兒童的強迫行為未必有「過度不合理」的自知力。","B":"OCD 常用抵消、隔離、反向防衛，非合理化。","C":"正確。強迫症治療必須結合藥物(SSRI)及行為治療(ERP)。","D":"強迫症好發於青少年至成年早期，非中年。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","強迫症"]}},"106110-N5-36":{"quick":"風災雙重打擊的首要照護＝著重問題對眼前生活的影響、運用優點與支持系統、提供立即性支持渡過危機。","detail":{"background":"王先生遭風災致咖啡園全毀與喪妻(危機)。危機處置的首要原則是『著重眼前的問題與其對現實生活的影響(此時此刻、問題取向)，運用個案的優點與支持系統，提供立即性的支持以渡過危機』。其他錯誤:A『減少表達對創傷的感覺』錯(應鼓勵表達);B『減少環境操控、僅保留現有支持』方向不當(應積極連結資源);D『危機處置時間以4~6個月為原則』錯誤——危機通常在『4~6週』內化解，且此時最易接受幫助。故 C 正確。","options":{"A":"應鼓勵表達創傷感受，而非減少表達。","B":"應積極連結資源與支持，而非減少環境操控。","C":"正確。著重問題對現實的影響、運用優點與支持、提供立即性支持渡過危機。","D":"危機通常4~6週內化解，非4~6個月。"},"sources":["精神科護理學·危機理論(Caplan/Aguilera)"]}},"106110-N5-37":{"quick":"Aguilera：對事件正向理解、有效因應、足夠資源支持，就能減少危機發生。","detail":{"background":"承上題，依亞吉勒拉(Aguilera)危機模式，壓力事件是否形成危機取決於三大平衡因素:對事件的認知/理解、社會(情境)支持、因應機轉。故 C『若王先生對事件有正向理解、有效因應機制、足夠資源支持，就會減少危機的發生』正確。其他錯誤:A 喪妻、家園全毀屬『情境危機』，非「中年男子成熟性危機」;B 不一定導致 PTSD，且非必須立即精神科介入;D『極力拒絕協助、我們不需擔心』是放棄照護。故 C 正確。","options":{"A":"喪妻、家園全毀屬情境危機，非成熟性危機。","B":"不必然導致 PTSD，且非必須立即精神科介入。","C":"正確。對事件正向理解、有效因應、足夠資源支持，可減少危機發生。","D":"拒絕協助就不擔心是放棄照護，不當。"},"sources":["精神科護理學·危機理論(Caplan/Aguilera)"]}},"106110-N5-39":{"quick":"喪偶急性悲傷期，不急於進行＝鼓勵積極參與自我成長活動。","detail":{"background":"周奶奶喪偶處於『急性悲傷期』。此階段應:鼓勵表達感覺與想法、給予情緒支持(A)、評估是否有自我傷害意念(C)、協助維持飲食與作息(D)——這些都需即時進行。而 B『鼓勵積極參與自我成長活動』『不急於』在急性哀傷期進行——此時病人需要的是被接納哀傷、情緒支持，自我成長活動屬哀傷後期復原階段的目標。故 B 為不急於此時進行者。","options":{"A":"鼓勵表達感覺、給予情緒支持，需即時進行。","B":"正確(本題選不急於進行者)。自我成長活動屬哀傷後期，不急於急性悲傷期進行。","C":"評估自我傷害意念是急性期的安全重點，需即時。","D":"協助維持飲食作息是急性期的基本照護，需即時。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","哀傷護理"]}},"106111-N5-1":{"quick":"車禍後不記得開車、忘記自己是誰＝解離作用(dissociation)。","detail":{"background":"新婚先生車禍喪妻後『不記得自己開車載妻出遊、恍惚、忘記自己是誰』——把無法承受的痛苦意識與現實『暫時隔開』以避免痛苦(解離性失憶/人格解體)，這是『解離作用(dissociation)』。外射(投射)是歸咎他人;否定是拒絕承認事實;昇華是把衝動導向社會接受方向。本題核心是『把痛苦意識與現實隔開』，故為解離。","options":{"A":"正確。把無法接受的痛苦意識與現實隔開，是解離作用(dissociation)。","B":"外射(投射)是把情感歸咎他人。","C":"否定是拒絕承認事實，但本題是記憶與自我意識的隔離。","D":"昇華是把衝動導向社會接受的活動。"},"sources":["精神科護理學·心理防衛機轉"]}},"106111-N5-14":{"quick":"護理師替病人出頭找團體帶領者理論＝情感反轉移。","detail":{"background":"吳護理師『帶著病人去找團體帶領者理論、認為作業太難』，過度認同並替病人出頭、捲入其情緒，這是『情感反轉移(countertransference)』——護理師把自己的情感/立場投射到與病人的關係中，失去專業中立。內射是把外在情感轉向自己;投射性認同是病人投射並誘使他人按投射行動;情感轉移是病人投射到護理師(方向相反)。故為情感反轉移。","options":{"A":"內射是把外在對象的情感轉向自己。","B":"投射性認同是病人投射並誘使他人照投射行動。","C":"情感轉移是病人投射到護理師，方向相反。","D":"正確。護理師過度認同、替病人出頭，是情感反轉移。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","轉移與反轉移"]}},"106111-N5-22":{"quick":"母親過世覺得「都是自己沒照顧好」＝內射作用(introjection)。","detail":{"background":"林女士因母親過世而罹患鬱症，覺得『都是自己沒把母親照顧好(過度自責、罪惡感)』——把對失落對象的矛盾情感與責任『轉向自己』，是『內射作用(introjection)』，為憂鬱症典型的心理動力。外射(投射)是歸咎他人;反向是表現相反行為;轉移(displacement)是把情緒轉向較安全的對象。故為內射。","options":{"A":"正確。把責任與情感轉向自己、過度自責，是內射作用(introjection)。","B":"外射(投射)是把情感歸咎他人，方向相反。","C":"反向是表現出與真實感受相反的行為。","D":"轉移是把情緒轉向較安全的替代對象。"},"sources":["精神科護理學·心理防衛機轉"]}},"106111-N5-26":{"quick":"喪子敘述有條理卻說不出傷痛感受＝理智化(intellectualization)。","detail":{"background":"林太太描述喪子之事『細節有條理、卻無法說出心中傷痛的感受』——以理性、客觀的敘述把痛苦的『情緒抽離、隔開』，避免面對情感衝擊，這是『理智化(intellectualization)』(以智性思考逃避情緒)。轉移是把情緒轉向他人;抵消是以行為抵消念頭;反向是表現相反行為。本題核心是『以理性敘述隔開情緒』，故為理智化。","options":{"A":"轉移是把情緒轉向較安全的對象。","B":"抵消是以行為象徵性抵消念頭。","C":"反向是表現出與真實感受相反的行為。","D":"正確。以條理理性的敘述隔開傷痛情緒，是理智化(intellectualization)。"},"sources":["精神科護理學·心理防衛機轉"]}},"106111-N5-33":{"quick":"「沒晉升經理就是失敗者」＝思考兩極化(全有全無)。","detail":{"background":"病人說「假如我沒有晉升到經理，我就是一個失敗者」——把事情看成『非成功即失敗、非黑即白』，沒有中間地帶，這是 Beck 認知扭曲中的『思考兩極化/全有全無思考(dichotomous/all-or-nothing thinking)』。控制的謬誤是覺得自己能/該控制一切;情緒推理是「我覺得如此所以事實如此」;讀心術是臆測他人想法。本題核心是『非成功即失敗的二分』，故為思考兩極化。","options":{"A":"控制的謬誤是覺得自己能或該為一切負責。","B":"情緒推理是以感覺當作事實的依據。","C":"讀心術是未經查證臆測他人的想法。","D":"正確。「非晉升即失敗」的二分，是思考兩極化(dichotomous thinking)。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Beck 認知扭曲"]}},"106111-N5-37":{"quick":"危機＝個體原本的平衡狀態被擾亂。","detail":{"background":"危機(crisis)的正確定義是『個體原本的(心理)平衡狀態被擾亂、慣用的因應方法不足以處理』的暫時失衡狀態。其他錯誤:A 飛機墜海是『不可預期』的情境危機(非可預期);B 14歲少女意外懷孕屬『情境危機』(非成熟發展危機);C 卡普蘭四階段中，困境未化解迫使情緒崩潰是『解組/崩潰期』，非「求助期」。故 D 正確。","options":{"A":"飛機墜海是不可預期的情境危機，非可預期。","B":"14歲意外懷孕屬情境危機，非成熟發展危機。","C":"情緒崩潰是解組/崩潰期，非求助期。","D":"正確。危機是個體原本的平衡狀態被擾亂。"},"sources":["精神科護理學·危機理論(Caplan/Aguilera)"]}},"106111-N5-40":{"quick":"與暴力危險病人會談：注意周圍環境、選擇靠近門的位置。","detail":{"background":"與具暴力危險的病人會談的安全原則:『注意周圍環境、選擇靠近門口的位置(確保自己能迅速撤離、出口不被病人擋住)』，並移除危險物品。其他錯誤:A『雙手交叉於胸前』是對抗/防衛姿勢，具挑釁意味;B『眼對眼直視』被視為挑釁威脅;C『面對面正面接觸』對激動病人危險(應呈直角、保持距離)。故 D 正確。","options":{"A":"雙手交叉胸前是對抗姿勢，具挑釁意味。","B":"眼對眼直視被視為挑釁威脅。","C":"面對面正面接觸對暴力病人危險，應呈直角保持距離。","D":"正確。注意周圍環境、選擇靠近門的位置以確保安全撤離。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","暴力病人處置"]}},"107030-N5-2":{"quick":"行為治療運用：建立增強物①、評估改變意願②、收集問題行為③(團隊應協調一致非分別執行④)。","detail":{"background":"行為治療的臨床運用步驟:(1)建立個案的增強物(找出對其有效的獎勵);(2)評估個案的改變意願與動機;(3)收集、界定個案的問題行為(ABC 分析)。而(4)『醫療團隊人員分別規劃執行』錯誤——行為治療需『團隊一致、協調』地執行同一計畫(增強標準與態度一致)，分別各行其是會使方案失效。故正確為①②③(選 A)。","options":{"A":"正確。建立增強物①、評估改變意願②、收集問題行為③。","B":"①②④：含敘述4(分別規劃執行)，錯誤。","C":"①③④：含敘述4，錯誤。","D":"②③④：含敘述4，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","行為治療"]}},"107030-N5-3":{"quick":"憂鬱全職媽媽過度苛責「都是自己沒做好母親」＝內射作用(introjection)。","detail":{"background":"嚴重憂鬱的全職媽媽面對叛逆孩子，『過度苛責是自己的錯、都是自己沒做好母親的角色』——把責任與負向情感『轉向自己、過度自責』，是『內射作用(introjection)』，為憂鬱症典型心理動力。退化是退回早期行為;取代是以一目標替代另一;轉移(displacement)是把情緒轉向較安全的對象。本題核心是『把責任內攝、自責』，故為內射。","options":{"A":"退化是退回較早期的幼稚行為。","B":"取代作用是以一目標替代另一無法達成的目標。","C":"轉移是把情緒轉向較安全的替代對象。","D":"正確。過度自責、把責任轉向自己，是內射作用(introjection)。"},"sources":["精神科護理學·心理防衛機轉"]}},"107030-N5-7":{"quick":"治療性溝通合適行為＝隨時觀察病人的情緒反應。","detail":{"background":"治療性溝通的合適行為是『隨時觀察病人的情緒反應(語言與非語言)』，以調整互動、貼近病人。其他不當:B『談論自己私事』逾越專業界限;C『對病人提出的問題給予建議』剝奪其自主、非治療性;D『儘量使用專業用語』會造成隔閡，應用病人能懂的口語。故 A 正確。觀察情緒反應是治療性溝通的基本能力。","options":{"A":"正確。隨時觀察病人的情緒反應，是治療性溝通的合適行為。","B":"談論自己私事逾越專業界限。","C":"對病人問題逕給建議剝奪其自主，非治療性。","D":"儘量用專業用語造成隔閡，應用口語化方式。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry"]}},"107030-N5-11":{"quick":"認知行為治療：處理此時此刻①、克服適應不良③、調整想法行為④(兒童早期②屬精神分析)。","detail":{"background":"以任務為導向的認知行為治療(CBT):(1)著重處理『此時此刻』的問題;(3)協助克服日常生活中適應不良的困難;(4)引導病人調整想法(認知)與行為。而(2)『強調兒童早期發展階段的問題』錯誤——那是精神分析的焦點，非 CBT。故正確為①③④(選 C)。","options":{"A":"①②③：含敘述2(兒童早期)，屬精神分析。","B":"①②④：含敘述2，錯誤。","C":"正確。處理此時此刻①、克服適應不良③、調整想法行為④。","D":"②③④：含敘述2，錯誤。"},"sources":["精神科護理學·認知行為治療"]}},"107030-N5-16":{"quick":"造成劉先生混亂行為的因素：急性創傷②、知覺刺激過多③、腦血管損傷④(退化①非)。","detail":{"background":"承上題，劉先生出現的混亂/譫妄樣行為，可能成因:(2)急性創傷(身體或心理打擊);(3)知覺刺激過多(環境過度刺激致超載);(4)腦血管損傷(器質性因素，如中風影響腦部)。這些都是引發急性混亂/譫妄的常見因素。而(1)『退化』是心理防衛機轉，非造成此種器質/環境性混亂行為的直接因素。故正確為②③④(選 A)。","options":{"A":"正確。急性創傷②、知覺刺激過多③、腦血管損傷④可造成混亂行為。","B":"①②③：含敘述1(退化)，非此情境的直接成因。","C":"①②④：含敘述1，錯誤。","D":"①③④：含敘述1，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","譫妄/急性混亂"]}},"107030-N5-29":{"quick":"失智症常見病因＝神經退化與血管性疾病。","detail":{"background":"失智症的正確概念:(B)較常見的病因是『神經退化(如阿茲海默症)與血管性疾病(血管性失智)』。其他錯誤:A 虛談現象並非「末期才有」(中期即可能出現);C 失智症記憶喪失的順序是『近期記憶先喪失，遠期與立即記憶相對保留較久』，非「遠期、近期、立即漸次喪失」;D 定向感喪失最早出現的是『時間』定向障礙，而非「對親人不認識(人物定向最晚喪失)」。故 B 正確。","options":{"A":"虛談現象非失智末期才有，中期即可能出現。","B":"正確。失智症常見病因為神經退化與血管性疾病。","C":"失智症近期記憶先喪失，非遠期先。","D":"定向感最早喪失的是時間，非親人(人物最晚)。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","失智症"]}},"107030-N5-30":{"quick":"害怕親密被拋棄、情緒黑暗＝不安全的依附關係。","detail":{"background":"李同學重鬱症，面對親密關係『總是很害怕被拋棄、情緒黑暗』——這種對親密的恐懼與被拋棄的焦慮，與早期形成的『不安全依附關係(insecure attachment)』最有關(如焦慮型依附)。性荷爾蒙增加、抽象思考能力、道德發展都與其「害怕被拋棄」的核心情緒問題無直接關聯。故 D 正確。早期依附經驗影響成年的親密關係模式。","options":{"A":"性荷爾蒙增加與其害怕被拋棄無直接關聯。","B":"抽象思考能力與此情緒問題無關。","C":"自我道德發展與害怕被拋棄無直接關聯。","D":"正確。害怕親密、被拋棄的情緒與不安全依附關係最有關。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","依附理論"]}},"107110-N5-10":{"quick":"社交技巧訓練：結構化練習①、代幣增強②、重複指導與實況演練④(不可僅住院練習③)。","detail":{"background":"對功能退化、人際疏離的精神病人提供社交技巧訓練:(1)採『結構化的練習活動』(明確步驟、循序);(2)運用『代幣制度』增強目標行為;(4)『重複指導及實況演練(role play/實境練習)』直到熟練。而(3)『在住院時勤加練習即可』錯誤——社交技巧須能『類化到社區與日常生活』，不能只在住院時練習，出院後仍需持續。故正確為①②④(選 B)。","options":{"A":"①②③：含敘述3(僅住院練習)，錯誤。","B":"正確。結構化練習①、代幣增強②、重複指導實況演練④。","C":"①③④：含敘述3，錯誤。","D":"②③④：含敘述3，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","社交技巧訓練"]}},"107110-N5-11":{"quick":"REBT 步驟：描寫情緒①、記錄客觀事件②、記錄個案的內在信念④(找出『不可替代』合理信念③措辭錯)。","detail":{"background":"理情行為療法(REBT)依 A-B-C 模式:A=誘發事件、B=信念(belief)、C=情緒/行為結果。利用家庭作業訓練個案分析信念的步驟:(1)正確描寫(C)情緒;(2)記錄導致情緒反應的(A)客觀事件;(4)記錄個案對此事件的(B)內在信念。再進一步辨識並駁斥非理性信念、代以合理信念。而(3)『找出不可替代的合理信念』措辭錯誤——REBT 旨在『辨識並駁斥非理性信念』、建立『可彈性替代』的合理信念，非「不可替代」。故正確為①②④(選 B)。","options":{"A":"①②③：含敘述3(措辭錯誤的「不可替代合理信念」)。","B":"正確。描寫情緒①、記錄客觀事件②、記錄內在信念④。","C":"①③④：含敘述3，錯誤。","D":"②③④：含敘述3，錯誤。"},"sources":["精神科護理學·認知行為治療","REBT"]}},"107110-N5-14":{"quick":"病人把對過去重要對象的情感投射到護理師＝情感轉移(transference)。","detail":{"background":"護病關係中，病人把對『過去經驗中重要對象(如父母)的感覺、態度與希望』投射到護理師身上，稱『情感轉移(transference)』。情感反轉移是護理師投射到病人(方向相反);試探行為是病人測試護理師的可信度;隱匿溝通是表裡不一的溝通。故為情感轉移。","options":{"A":"正確。病人把對過去重要對象的情感投射到護理師，是情感轉移。","B":"情感反轉移是護理師投射到病人，方向相反。","C":"試探行為是病人測試護理師的可信度。","D":"隱匿溝通是表面與隱含訊息不一致。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","轉移與反轉移"]}},"107110-N5-22":{"quick":"躁症誇大言辭掩飾內心無助自卑＝反向作用(reaction formation)。","detail":{"background":"雙相情緒障礙(躁期)病人以『誇大、亢奮的言辭』表現，實則『掩飾內心的無助與自卑』——以與內在真實感受『相反』的外顯行為來掩蓋，是『反向作用(reaction formation)』(躁是對鬱的反向防衛)。內射是把情感轉向自己;外射(投射)是歸咎他人;隔離是把情緒與事件分開。本題核心是『以誇大掩飾相反的自卑』，故為反向作用。","options":{"A":"內射是把情感與責任轉向自己。","B":"正確。以誇大言辭掩飾相反的無助自卑，是反向作用(reaction formation)。","C":"外射(投射)是把情感歸咎他人。","D":"隔離是把情緒與事件記憶分開。"},"sources":["精神科護理學·心理防衛機轉","雙相情緒障礙"]}},"107110-N5-26":{"quick":"記憶障礙病人建立關係初期：每日定時接觸並做簡短自我介紹。","detail":{"background":"李太太有記憶障礙(忘記人名與近事，疑失智)。建立關係初期應『每日定時與病人接觸，並做簡短自我介紹』——以規律、可預期、簡單重複的方式建立熟悉與信任，並提供現實導向。A『順其自然』是放棄;C『鼓勵背誦病友姓名』超出其能力、徒增挫敗;D『對最近的事皆請表達感受』超出其近期記憶能力。故 B 正確。對記憶障礙者宜規律、簡短、重複。","options":{"A":"「順其自然」是放棄照護。","B":"正確。每日定時接觸並做簡短自我介紹，建立熟悉與現實導向。","C":"鼓勵背誦病友姓名超出其記憶能力，徒增挫敗。","D":"對最近的事請其表達感受超出其近期記憶能力。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","失智症照護"]}},"107110-N5-28":{"quick":"精神恍惚、注意力不集中的溝通：說明時重點重複、輔以手勢。","detail":{"background":"李太太精神恍惚、注意力不集中(認知功能受損)。溝通最適當是『說明時把重點重複、輔以手勢等具體表達』，以簡單、重複、多感官的方式幫助理解。A『詳細敘述並舉例』訊息過多、超載;C『以觸摸代替視線接觸』不當(觸摸需謹慎，視線接觸仍重要);D『使用成語或諺語』需抽象思考、更難理解。故 B 正確。對注意力不集中者宜簡短、重複、具體。","options":{"A":"詳細敘述舉例訊息過多，易超載。","B":"正確。重點重複、輔以手勢，以簡單具體方式幫助理解。","C":"以觸摸代替視線接觸不當，視線接觸仍重要。","D":"使用成語諺語需抽象思考，反而更難理解。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry"]}},"107110-N5-34":{"quick":"評估危機對壓力事件的理解：評估生理角色人際變化①、反應因應防禦②、症狀出現時間③(應以壓力事件為核心④)。","detail":{"background":"評估個人危機中對壓力事件的理解與感覺:(1)評估個人在生理、角色及人際的變化，以了解事件對個人的影響;(2)了解其面對壓力事件的反應行為、因應與防禦機制;(3)評估不適應及壓力症狀出現的時間(時序)。而(4)『擴展會談議題、不以壓力事件為核心』錯誤——危機評估應『聚焦於該壓力事件』及其意義，而非發散。故正確為①②③(選 A)。","options":{"A":"正確。評估生理角色人際變化①、反應因應防禦②、症狀出現時間③。","B":"②③④：含敘述4(不以壓力事件為核心)，錯誤。","C":"①③④：含敘述4，錯誤。","D":"①②④：含敘述4，錯誤。"},"sources":["精神科護理學·危機理論(Caplan/Aguilera)"]}},"107110-N5-37":{"quick":"Caplan 危機四階段順序＝前奏期→焦慮升高期→求助期→危機期。","detail":{"background":"卡普蘭(Caplan)將危機事件發生後的反應分四階段，依序為:前奏期(衝擊，運用慣用因應)→焦慮升高期(慣用方法無效、焦慮上升、嘗試新方法)→求助期(向外尋求支援)→危機期(若仍未解決則情緒崩潰、人格混亂)。故正確順序為前奏期→焦慮升高期→求助期→危機期(選 C)。","options":{"A":"順序顛倒，危機期不在最前。","B":"順序顛倒，求助期不在最前。","C":"正確。前奏期→焦慮升高期→求助期→危機期。","D":"順序錯誤。"},"sources":["精神科護理學·危機理論(Caplan/Aguilera)"]}},"108110-N5-6":{"quick":"鬱症：病人血清素濃度比平常人低。","detail":{"background":"鬱症(憂鬱症)的正確概念:(B)病人腦中『血清素(serotonin)濃度比平常人低』(亦與正腎上腺素低有關)，故 SSRI 等抗憂鬱藥提升血清素。其他錯誤:A 鬱症盛行率『女性高於男性』(約2:1);C 鬱症最常用的防衛機轉是『內射』，非轉移;D 鬱症主因與血清素/正腎上腺素『低』有關，而非「多巴胺濃度高」(多巴胺過高與思覺失調正性症狀有關)。故 B 正確。","options":{"A":"鬱症盛行率女性高於男性，非男性高。","B":"正確。鬱症病人血清素濃度比平常人低。","C":"鬱症最常用內射防衛，非轉移。","D":"鬱症與血清素/正腎上腺素低有關，非多巴胺高。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","憂鬱症生物病因"]}},"108110-N5-8":{"quick":"難以自我控制地重複某些動作/行為＝強迫行為。","detail":{"background":"精神症狀的正確配對:(C)『難以自我控制地重複某些動作或行為(如反覆洗手、檢查)』稱『強迫行為(compulsion)』。其他錯誤:A『規則重複固定型態的無意義動作或言語』是『刻板動作(stereotypy)』，非作態動作;B『不語症(緘默)』最常見於『思覺失調症(僵直型)』，非重鬱症;D『重複他人的話、模仿別人說話』是『回音言語(echolalia)』，非阻抗行為。故 C 正確。","options":{"A":"規則重複無意義動作是刻板動作(stereotypy)，非作態。","B":"不語症最常見於思覺失調僵直型，非重鬱症。","C":"正確。難以自我控制地重複動作/行為是強迫行為(compulsion)。","D":"重複模仿他人說話是回音言語(echolalia)，非阻抗。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","精神症狀學"]}},"108110-N5-9":{"quick":"思覺失調者堅信被害、把內在敵意投射成他人要害他＝外射作用(projection)。","detail":{"background":"馬先生思覺失調，擔心被殺害、疑神疑鬼、堅信不移(被害妄想)——把自己內在無法接受的敵意/衝動『投射到外界、認為是他人要害他』，是『外射作用(投射，projection)』，為妄想形成的核心防衛。內射是把情感轉向自己;否定是拒絕承認事實;幻想是以想像滿足需求。本題核心是『把內在敵意投射成外在迫害』，故為外射。","options":{"A":"內射是把情感與責任轉向自己。","B":"正確。把內在敵意投射成他人要害自己，是外射作用(projection)。","C":"否定是拒絕承認痛苦的事實。","D":"幻想是以想像滿足無法實現的需求。"},"sources":["精神科護理學·心理防衛機轉","妄想"]}},"108110-N5-21":{"quick":"鬱症急性期照護最重要＝安全性評估與支持(自殺風險)。","detail":{"background":"鬱症『急性期』病人自殺風險最高，照護最優先是『安全性評估與支持』——評估自殺意念/計畫、提供安全環境、密切觀察、情緒支持。鼓勵發掘長處、安排認知行為治療、建立病識感都是重要目標，但須在『急性期安全獲確保、症狀稍緩』之後進行(急性期病人能量低、認知扭曲，過早進行易增挫敗)。故 D 正確。急性憂鬱期，安全永遠是首要。","options":{"A":"鼓勵發掘長處須在急性期之後，病人此時難以正向。","B":"認知行為治療須在症狀稍緩、病人能配合時進行。","C":"建立病識感非急性期最優先(安全優先)。","D":"正確。鬱症急性期自殺風險高，安全性評估與支持最重要。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","憂鬱症·自殺防治"]}},"108110-N5-25":{"quick":"Beck 憂鬱認知扭曲：兩極化想法①、獨斷推論②、過度類化③(自閉思考④非)。","detail":{"background":"貝克(Beck)提出憂鬱的認知扭曲(cognitive distortions)包括:(1)兩極化/非黑即白想法(polarized/dichotomous thinking);(2)獨斷推論(arbitrary inference，無證據即下結論);(3)過度類化(overgeneralization，以單一事件推論全部)。而(4)『自閉思考(autistic thinking)』是思覺失調的『脫離現實、以內在邏輯為主』的思考，非 Beck 的憂鬱認知扭曲。故正確為①②③(選 A)。","options":{"A":"正確。兩極化①、獨斷推論②、過度類化③是 Beck 的憂鬱認知扭曲。","B":"②③④：含敘述4(自閉思考)，屬思覺失調。","C":"①③④：含敘述4，錯誤。","D":"①②④：含敘述4，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Beck 認知扭曲"]}},"108110-N5-27":{"quick":"改善病人對住院陌生環境的不安＝環境治療(milieu therapy)。","detail":{"background":"醫院病房的陌生環境使病人不安，改善此種『對環境不安』最適切的是『環境治療(milieu therapy)』——透過安排安全、結構化、人性化、可預期的治療性環境(熟悉環境、生活作息、人際支持)來減輕病人的不安。認知治療處理認知扭曲;行為治療改變特定行為;心理治療處理深層心理議題。本題針對『環境不安』，故為環境治療。","options":{"A":"認知治療處理認知扭曲，非針對環境不安。","B":"行為治療改變特定目標行為。","C":"正確。安排安全結構化的治療性環境減輕不安，是環境治療。","D":"心理治療處理深層心理議題，非針對環境陌生感。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","環境治療"]}},"108110-N5-37":{"quick":"壓力的生理：HPA軸是主要調節系統①、與前額葉及邊緣系統改變有關②。","detail":{"background":"個人因應與壓力的生理理論:(1)『下視丘-腦下垂體-腎上腺軸(HPA axis)』的活化是面臨壓力源時主要的神經內分泌調節系統(釋放皮質醇);(2)壓力與『中樞神經系統的前額葉及邊緣系統(如杏仁核、海馬迴)』的改變有關。而(3)壓力反應主要與『HPA軸與自律神經』有關，而非「腦幹-運動及感覺皮質區」為核心;(4)『災難經驗對個體造成立即心理改變，且會影響其知覺與性格特性』(故「不影響」的敘述錯誤)。故正確為①②(選 A)。","options":{"A":"正確。HPA軸是主要調節①、與前額葉及邊緣系統改變有關②。","B":"②③：含敘述3(腦幹運動感覺皮質為核心)，不適當。","C":"③④：含敘述3、4皆錯。","D":"①③：含敘述3，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","壓力生理學"]}},"109030-N5-7":{"quick":"老人生命回顧的統整與懊悔焦慮＝Erikson 理論(自我整合對絕望)。","detail":{"background":"老年人在『生命回顧』時，若覺得時光飛逝、浪費光陰而懊悔、焦慮不安，反映的是『艾瑞克森(Erikson)』心理社會發展理論中老年期『自我整合(統整)對絕望(integrity vs. despair)』的危機——統整失敗便陷入絕望悔恨。皮亞傑是認知發展;柯爾伯格是道德發展;佛洛伊德是性心理發展。本題講老年的統整與絕望，故為 Erikson。","options":{"A":"皮亞傑提出認知發展理論。","B":"柯爾伯格提出道德發展理論。","C":"正確。老人統整與絕望的發展任務出自 Erikson 理論。","D":"佛洛伊德提出性心理發展理論。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Erikson 發展理論"]}},"109030-N5-9":{"quick":"討論到工作挫折就不想談、要停止會談＝阻抗行為(resistance)。","detail":{"background":"李先生每次討論到『工作挫折』就不想談、被引導就要停止會談——因觸及威脅性、痛苦的議題而迴避、抗拒治療歷程，這是『阻抗行為(resistance)』。試探性行為是測試護理師的可信度;潛抑是不自覺地遺忘;昇華是把衝動導向社會接受方向。本題核心是『因痛苦議題而迴避治療』，故為阻抗。","options":{"A":"試探性行為是測試護理師的可信度。","B":"正確。因觸及痛苦議題而迴避、抗拒治療，是阻抗行為(resistance)。","C":"潛抑是不自覺地把痛苦排除到潛意識。","D":"昇華是把衝動導向社會接受的活動。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry"]}},"109030-N5-12":{"quick":"逐步養成法(shaping)常應用於自我照顧功能缺失的個案。","detail":{"background":"逐步養成法/塑造(shaping)是行為治療技術，透過『連續漸進地增強趨近目標的行為』建立新行為，常『應用於自我照顧功能缺失(如退縮、退化)的個案』。其他錯誤:A 是應用『增強(reinforcement)』原則，非「削弱」;B 由『簡單』行為先著手，非最困難;C 步驟移動『不宜越快越好』，應循序漸進、待前一步穩固。故 D 正確。","options":{"A":"是應用增強原則，非削弱。","B":"由簡單行為先著手，非最困難。","C":"步驟移動應循序漸進，非越快越好。","D":"正確。逐步養成法常應用於自我照顧功能缺失的個案。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","行為治療·塑造"]}},"109030-N5-35":{"quick":"精神護理之家服務對象＝精神症狀穩定且慢性化、自我照顧功能不足者。","detail":{"background":"精神護理之家提供慢性、穩定但仍需長期照護與復健的精神病人機構式照護。其服務對象特徵是『精神症狀穩定且呈現慢性化、自我照顧功能不足、需長期照護者』。而『嚴重精神症狀需急性治療者』、『症狀緩和但未穩定需積極治療者』應在急性病房或積極治療單位，非精神護理之家。故 C 正確。","options":{"A":"嚴重精神症狀需急性治療者應在急性病房。","B":"症狀未穩定需積極治療者非精神護理之家對象。","C":"正確。精神症狀穩定且慢性化、自我照顧功能不足，是精神護理之家服務對象。","D":"(其餘)非精神護理之家的收置條件。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","精神護理之家"]}},"109110-N5-1":{"quick":"瘋狂模仿韓星的穿著舉止＝仿同作用(identification)。","detail":{"background":"阿宏缺乏父親肯定，轉而『瘋狂追逐並模仿韓籍男星的穿著舉止』——把崇拜對象的特質、行為內化到自己身上以提升自我價值與認同，這是『仿同/認同作用(identification)』。取代是以一目標替代另一;幻想是以想像滿足需求;反向是表現相反行為。本題核心是『模仿並內化偶像特質』，故為仿同作用。","options":{"A":"取代作用是以一目標替代另一無法達成的目標。","B":"幻想作用是以想像滿足無法實現的需求。","C":"反向作用是表現出與真實感受相反的行為。","D":"正確。模仿並內化崇拜對象的特質以提升認同，是仿同作用(identification)。"},"sources":["精神科護理學·心理防衛機轉"]}},"109110-N5-4":{"quick":"心裡恨母親卻說「母親完美、懂得愛」＝反向作用(reaction formation)。","detail":{"background":"厭食症病人私下表示『恨母親、覺得自己非親生』，會談中卻說『母親非常完美、很懂得如何愛小孩』——以與內在真實感受(恨)『相反』的言辭來掩飾，是『反向作用(reaction formation)』。否認是拒絕承認事實;壓抑是有意識擱置;內射是把情感轉向自己。本題核心是『以讚美掩飾相反的恨意』，故為反向作用。","options":{"A":"否認是拒絕承認痛苦的事實。","B":"正確。以「母親完美」掩飾相反的恨意，是反向作用(reaction formation)。","C":"壓抑是有意識地把念頭擱置。","D":"內射是把情感與責任轉向自己。"},"sources":["精神科護理學·心理防衛機轉"]}},"109110-N5-5":{"quick":"行為治療技術：正增強①、代幣制度③、逐步養成④(認知療法②不屬行為治療)。","detail":{"background":"行為治療常用技術:(1)正增強(positive reinforcement，給予獎勵以增加行為);(3)代幣制度(token economy);(4)行為逐步養成(shaping)。這些都是運用學習(操作制約)原理。而(2)『認知療法』屬認知取向，處理的是想法/認知，不屬於行為治療技術。故正確為①③④(選 C)。","options":{"A":"①②③：含敘述2(認知療法)，非行為治療技術。","B":"①②④：含敘述2，錯誤。","C":"正確。正增強①、代幣制度③、逐步養成④是行為治療技術。","D":"②③④：含敘述2，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","行為治療"]}},"109110-N5-30":{"quick":"人格違常常見問題行為：自我傷害①、操縱②、衝動行為③(自我照顧能力缺失④非典型)。","detail":{"background":"人格違常(人格障礙)病人常見的問題行為:(1)自我傷害(尤其邊緣型);(2)操縱(挑撥、控制他人);(3)衝動行為(衝動控制差)。護理措施針對這些行為(限制設定、團隊一致)。而(4)『自我照顧能力缺失』並非人格違常的典型問題行為(多見於思覺失調負性症狀或失智)。故正確為①②③(選 A)。","options":{"A":"正確。自我傷害①、操縱②、衝動行為③是人格違常常見的問題行為。","B":"①②④：含敘述4(自我照顧缺失)，非人格違常典型。","C":"①③④：含敘述4，錯誤。","D":"②③④：含敘述4，錯誤。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","人格障礙"]}},"110030-N5-18":{"quick":"憂鬱症最常使用的防衛機轉＝內射(introjection)。","detail":{"background":"憂鬱症病人對失落對象懷有矛盾情感，把『憤怒轉向自己(內射)』，表現為自責、罪惡與自我貶低，故最常使用『內射(introjection)』。外射(投射)是歸咎他人;否認是拒絕承認事實;合理化是找藉口。憂鬱症的核心心理動力是把對外在的負向情感內攝到自身。故為內射。","options":{"A":"外射(投射)是把情感歸咎他人，方向相反。","B":"正確。憂鬱症把憤怒轉向自己，最常用內射(introjection)。","C":"否認是拒絕承認痛苦的事實。","D":"合理化是為行為找看似合理的藉口。"},"sources":["精神科護理學·心理防衛機轉"]}},"110030-N5-24":{"quick":"王老先生稱護理師「女兒」並如此對待＝情感轉移(transference)。","detail":{"background":"王老先生把護理師當成自己的女兒、以「女兒」稱呼——是把對過去重要他人(女兒)的情感投射到護理師身上，屬『情感轉移(transference)』。B 假性痴呆是憂鬱導致的認知表現;C 把它解釋為「一般老人親切稱謂」忽略其心理動力;D 解釋為「極高評價」不準確。故 A 正確。識別轉移有助理解病人的關係模式並適當處理。","options":{"A":"正確。把護理師當女兒並如此稱呼，是情感轉移(transference)。","B":"假性痴呆是憂鬱導致的認知表現，與此稱謂無關。","C":"解釋為一般親切稱謂忽略了其心理動力。","D":"解釋為極高評價不準確。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","轉移與反轉移"]}},"110030-N5-36":{"quick":"佛洛伊德視偏差行為為早期衝突未解決＝精神分析模式。","detail":{"background":"佛洛伊德(Freud)認為偏差行為是『早期(童年)發展衝突未能妥善解決的結果』，這是『精神分析模式(psychoanalytic model)』的觀點——強調潛意識與早期經驗對行為的決定性影響。人際關係模式強調人際互動;溝通模式重溝通型態;行為模式以學習原理解釋行為。故為精神分析模式。","options":{"A":"人際關係模式強調人際互動對行為的影響。","B":"溝通模式重視溝通型態(如交流分析)。","C":"行為模式以學習原理解釋行為。","D":"正確。佛洛伊德視偏差行為為早期衝突未解決，屬精神分析模式。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","精神分析"]}},"110110-N5-5":{"quick":"連續減七(serial 7s)＝評估計算能力與注意力(attention)。","detail":{"background":"請病人「從100連續減7(serial 7s)」是 MSE 中除了評估『計算能力』外，主要還評估『注意力與專注力(attention/concentration)』——需要持續專注才能連續計算。定向感評估時地人;判斷力評估情境決策;病識感評估對疾病的認識。故為注意力。","options":{"A":"定向感評估對時間、地點、人物的辨識。","B":"正確。連續減七評估計算能力與注意力(attention)。","C":"判斷力評估面對情境的決策。","D":"病識感評估對疾病的認識。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry"]}},"110110-N5-6":{"quick":"Beck 認知學說：情緒低落是對自己、他人及外界的錯誤解釋。","detail":{"background":"貝克(Beck)認知學說主張『情緒低落(憂鬱)是源於對自己、他人及外界(未來)的錯誤、負向解釋』，即『認知三角(cognitive triad)』與認知扭曲。A『童年早期未解決衝突與焦慮』是精神分析;B『人格被環境塑造、用行為技巧矯正』是行為學派;D『高情感表露家庭增加復發』是家庭/社會因素。故 C 正確。","options":{"A":"童年早期衝突焦慮是精神分析的觀點。","B":"人格被環境塑造、行為矯正是行為學派。","C":"正確。情緒低落是對自己、他人及外界的錯誤解釋，是 Beck 認知學說。","D":"高情感表露家庭增加復發是家庭/社會因素。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Beck 認知學說"]}},"110110-N5-7":{"quick":"自我坦露(self disclosure)是有目的、有限度的。","detail":{"background":"治療性關係中護理師的自我坦露(self disclosure)原則是『有目的、有限度的』——只在『有助於病人、促進治療』時，適度分享，且須以病人為中心，不可變成滿足護理師自己。A『與病人關係對等』錯(治療性關係非對等社交);C『只要對病人有益都要分享自己經驗』過度;D 自我坦露是縮小(非擴大)周哈里窗的『隱私(隱藏)象限』、擴大開放象限。故 B 正確。","options":{"A":"治療性關係非對等社交關係，坦露非依關係深淺而定。","B":"正確。自我坦露是有目的、有限度的，以病人為中心。","C":"並非只要有益就分享，須有目的且有限度。","D":"自我坦露縮小隱私象限、擴大開放象限，非擴大隱私。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","周哈里窗"]}},"110110-N5-33":{"quick":"MMSE 不評估＝情緒狀態。","detail":{"background":"簡易心智量表(MMSE)評估的是『認知功能』:定向感、注意力與計算、記憶力(立即與短期回憶)、語言(命名、複誦、理解、書寫)、視覺空間(圖形描繪)。而『情緒狀態』不是 MMSE 的評估項目(情緒需另以其他量表評估)。故 D 不是 MMSE 評估的功能表現。","options":{"A":"定向感是 MMSE 評估項目。","B":"注意力(連續減七)是 MMSE 評估項目。","C":"記憶力(立即與短期回憶)是 MMSE 評估項目。","D":"正確(本題選非評估者)。情緒狀態不是 MMSE 的評估項目。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","MMSE"]}},"110110-N5-36":{"quick":"賦能模式：提供充分資訊、協助個案了解自己狀況、擁有自決能力。","detail":{"background":"賦能/賦權模式(empowerment model)強調『提供病人充分的資訊，協助其了解自己的狀況，使其擁有自我決定(self-determination)的能力』，以優勢取向、與病人合作為核心。其他錯誤:A『由專業人員為個案做出最好的決定』違反賦權(剝奪自主);C『由專業人員承擔身心照護之責』違反賦權(應促進病人自主);D『視個案為失能者、針對缺點找問題』是缺陷取向，與賦權的優勢取向相反。故 B 正確。","options":{"A":"由專業人員替個案決定違反賦權(剝奪自主)。","B":"正確。提供充分資訊、協助了解狀況、擁有自決能力，是賦能模式。","C":"由專業人員承擔照護責任違反賦權。","D":"視個案為失能者、針對缺點找問題是缺陷取向，與賦權相反。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","賦權(empowerment)"]}},"111030-N5-8":{"quick":"從簡單分步驟養成盥洗習慣＝逐步養成法。","detail":{"background":"行為治療原理的正確應用:(C)『協助病人養成盥洗習慣，從簡單開始、將任務分成許多步驟逐步推動』是『逐步養成法(shaping)』。其他錯誤:A 稱讚使病人更願發言是『正增強(給予獎勵增加行為)』，非負向增強;B『不出現干擾行為3天就解除暫禁外出』是『移除嫌惡刺激(禁外出)以增加期望行為』，屬負向增強(題目誤稱正向增強)，且更重要的是 C 描述最準確;D 約束送保護室是『安全限制/處罰』，非負向增強。故 C 最適當。","options":{"A":"稱讚使病人更願發言是正增強，非負向增強。","B":"解除暫禁外出是移除嫌惡刺激，屬負向增強(題目誤標正向增強)。","C":"正確。從簡單分步驟養成盥洗習慣，是逐步養成法。","D":"約束送保護室是安全限制/處罰，非負向增強。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","行為治療"]}},"111030-N5-9":{"quick":"危機生還者個別處置：發掘個案適用的因應機轉。","detail":{"background":"協助危機狀態生還者的個別性處置，最適當是『發掘並運用個案適用的因應機轉(coping)』，協助其度過危機。其他錯誤:B 危機處置『常需包含家人/支持系統』，非排除在外;C 應『生理與心理需求並重』，非先不處理心理;D 應『鼓勵情感宣洩(catharsis)』表達情緒，並協助澄清事實，二者並行而非排斥宣洩。故 A 正確。","options":{"A":"正確。發掘個案適用的因應機轉，協助度過危機。","B":"危機處置常需包含家人與支持系統。","C":"應生理與心理需求並重，非先不處理心理。","D":"應鼓勵情感宣洩表達情緒，非不鼓勵。"},"sources":["精神科護理學·危機理論(Caplan/Aguilera)"]}},"111030-N5-11":{"quick":"人是自主、可自由創造價值意義的生存方式＝存在—人文主義治療。","detail":{"background":"強調『人是自主的、可自由選擇並創造具有價值與意義的生存方式』，是『存在—人文主義(existential-humanistic)治療』的核心觀點(如 Frankl 意義治療、Maslow、Rogers 強調自我實現、自由與責任)。心理分析重潛意識決定論;個人中心治療雖屬人文取向但本題「自由創造意義」更指存在主義;認知行為治療重認知與行為。故為存在—人文主義治療。","options":{"A":"心理分析強調潛意識的決定論。","B":"個人中心治療屬人文取向，但「自由創造意義」更指存在主義。","C":"正確。人是自主、可自由創造價值意義，是存在—人文主義治療。","D":"認知行為治療重認知與行為的修正。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","存在人文治療"]}},"111030-N5-12":{"quick":"對攻擊行為的「負向後果」處置＝減少外出購物次數(移除權益)。","detail":{"background":"王小姐攻擊他人後，依行為原理給予『負向後果(response cost，移除其享有的正增強物/權益)』以減少攻擊行為，『減少外出購物次數』最適當——它是移除一項權益的行為後效，且相對溫和、與行為相稱。送保護室、執行約束是『立即安全限制』(用於有立即危險時)，非教育性的行為後效;不讓吃點心則剝奪基本需求、不恰當。故 A 最適當(注意:嚴格定義「負增強」是移除嫌惡刺激以增加行為，本題採臨床上「給予負向後果」的廣義用法)。","options":{"A":"正確。減少外出購物次數是移除權益的負向後果，相對溫和且相稱。","B":"送保護室是立即安全限制，用於有立即危險時。","C":"不讓吃點心剝奪基本需求，不恰當。","D":"執行約束是安全限制，非教育性的行為後效。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","行為治療"]}},"111030-N5-13":{"quick":"現實治療：藉正當、責任與現實有效管理個人生活(Glasser 3R)。","detail":{"background":"現實治療(reality therapy，Glasser)強調『3R』:正當(Right)、責任(Responsibility)、現實(Reality)，協助個案面對現實、為自己的行為負責、做出對的選擇，以有效管理生活、滿足需求。其他錯誤:B 矯正錯誤認知是認知治療;C 現實治療著重『此時此刻與未來』，不重過去探討;D 運用潛意識引導是精神分析。故 A 正確。","options":{"A":"正確。藉正當、責任與現實(3R)有效管理生活，是現實治療。","B":"矯正錯誤認知是認知治療的方法。","C":"現實治療著重此時此刻與未來，不重過去。","D":"運用潛意識引導是精神分析。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","現實治療(Glasser)"]}},"111030-N5-20":{"quick":"慢性思覺失調病人護理＝教導辨識精神症狀及處理(預防復發)。","detail":{"background":"承上題(慢性思覺失調、可規則服藥、社區工作)，最適當的護理措施是『教導病人辨識精神症狀(復發前兆)及其處理方式』，以預防復發、提升自我管理。教導增加工作表現非核心;提高自我價值感雖好但較泛;教導正確服藥方法是基礎(但病人已能規則服藥)。對穩定期的慢性病人，教導症狀辨識與自我因應是預防復發的關鍵。故 C 正確。","options":{"A":"教導努力增加工作表現非預防復發的核心。","B":"提高自我價值感雖有意義但較泛。","C":"正確。教導辨識精神症狀及處理，是預防復發的關鍵。","D":"教導正確服藥是基礎，但病人已能規則服藥。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","思覺失調症·復發預防"]}},"111030-N5-23":{"quick":"強迫症常用防衛機轉『不含』內射(隔離、反向、抵消才是)。","detail":{"background":"強迫症(OCD)常用的防衛機轉是『隔離(isolation，把情緒與想法分開)、反向(reaction formation)、抵消(undoing，以儀式抵消念頭)』。而『內射(introjection)』是憂鬱症典型的防衛機轉，非強迫症常用，故為較不適當者。本題問「較不適當」，選內射(D)。","options":{"A":"隔離是強迫症常用的防衛機轉。","B":"反向是強迫症常用的防衛機轉。","C":"抵消(儀式行為)是強迫症典型的防衛機轉。","D":"正確(本題選較不適當者)。內射是憂鬱症的防衛機轉，非強迫症常用。"},"sources":["精神科護理學·心理防衛機轉","強迫症"]}},"111030-N5-29":{"quick":"DSM-5 認知障礙症：一項或多項認知範疇顯著較先前表現降低。","detail":{"background":"DSM-5『認知障礙症(neurocognitive disorder)』診斷準則:(C)『在一項或多項認知範疇(注意力、執行功能、學習與記憶、語言、知覺動作、社會認知)出現顯著較先前認知表現降低的證據』。其他錯誤:A 病程多為『慢性而不可逆』(部分可逆但失智多不可逆);B『記憶障礙非診斷的基本要件』(DSM-5 不再以記憶障礙為必要，其他認知範疇受損亦可診斷);D 重度認知障礙症『會影響日常活動的獨立進行』(輕度不影響、重度影響)。故 C 正確。","options":{"A":"失智型認知障礙症病程多為慢性不可逆，非可逆。","B":"DSM-5 不再以記憶障礙為診斷的基本要件。","C":"正確。一項或多項認知範疇顯著較先前表現降低。","D":"重度認知障礙症會影響日常活動的獨立進行。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","DSM-5 認知障礙症"]}},"111030-N5-33":{"quick":"輕度失智護理：出現妄想激躁時適當轉移注意力。","detail":{"background":"輕度失智症病人的護理:(D)當病人出現妄想而激躁時，宜『適當轉移注意力』(不爭辯妄想)。其他錯誤:A 活動安排宜『規律、固定』，每日做變化會增加混亂(非訓練記憶);B 應『鼓勵並協助病人自我照顧』以維持功能，而非主動代勞(主動代勞反加速失能);C 應安排『固定的工作人員』以增加熟悉與定向感，安排不同人反而混亂。故 D 正確。","options":{"A":"活動宜規律固定，每日變化會增加混亂。","B":"應鼓勵病人自理以維持功能，主動代勞反加速失能。","C":"應安排固定工作人員以增加定向感，非不同人。","D":"正確。出現妄想激躁時適當轉移注意力。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","失智症照護"]}},"111030-N5-40":{"quick":"Caplan：慣用因應失敗、功能變紊亂＝紊亂期(解組期)。","detail":{"background":"卡普蘭(Caplan)危機分期中，當『個人慣用的因應機轉失敗、威脅持續、個體功能變得紊亂混亂』時，屬『紊亂期(解組期)』——此階段焦慮高漲、功能解組，可能採壓抑、否認、合理化、外射等防衛。衝擊期是事件初衝擊;求助期是向外尋求支援;若仍無法解決才進入崩潰。本題描述「慣用因應失敗、功能紊亂」，故為紊亂期。","options":{"A":"衝擊期是事件初衝擊、運用慣用因應。","B":"正確。慣用因應失敗、功能變紊亂，是紊亂期(解組期)。","C":"求助期是向外尋求支援的階段。","D":"崩潰期是更後期人格崩潰，本題描述為功能紊亂。"},"sources":["精神科護理學·危機理論(Caplan/Aguilera)"]}},"111110-N5-4":{"quick":"Berne「我好-你不好型」＝不相信別人、自大、以憤怒面對他人。","detail":{"background":"伯恩(Eric Berne)交流分析中，人生地位(life position)分四型:『我好-你好(I am OK, you are OK)』是健康成熟、能積極面對自己與他人(B);『我不好-你好』是自卑、自責、覺得人生不快樂(C);『我好-你不好』是『不相信別人、自大、易以憤怒/責怪的態度面對他人(投射型)』(D);『我不好-你不好』是覺得自己、他人甚至全世界都毫無意義(絕望型)(A)。故「我好-你不好型」為 D。","options":{"A":"覺得自己他人全世界都無意義是「我不好-你不好型」。","B":"積極面對自己與他人是「我好-你好型」(健康)。","C":"覺得自己沒價值、常自責是「我不好-你好型」。","D":"正確。不相信別人、自大、以憤怒面對他人，是「我好-你不好型」。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","交流分析·人生地位"]}},"111110-N5-12":{"quick":"心理分析治療的策略＝抗拒(阻抗)的解析。","detail":{"background":"心理分析(精神分析)治療的策略包括:自由聯想、夢的解析、『抗拒(阻抗)的解析(analysis of resistance)』、移情的分析等，目的在揭露並處理潛意識衝突。正向增強是行為治療;人際溝通訓練是社交技巧/人際取向;認知再建構是認知治療。故『抗拒的解析』屬心理分析治療策略(選 A)。","options":{"A":"正確。抗拒(阻抗)的解析是心理分析治療的策略。","B":"正向增強是行為治療技術。","C":"人際溝通訓練是社交技巧/人際取向。","D":"認知再建構是認知治療技術。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","精神分析"]}},"111110-N5-14":{"quick":"行為學派視焦慮為一種刺激—反應連結的學習反應。","detail":{"background":"各學派對焦慮的觀點:(C)學習理論之『行為學派視焦慮為一種「刺激—反應連結」的學習反應』(經制約而習得)，正確。其他錯誤:A 強迫症源於肛門期、以防衛處理焦慮是『精神分析』觀點(非人際關係學派);B 精神分析觀點認為焦慮與『潛意識衝突』有關，非「同儕缺乏同理心」;D 認知學派認為焦慮源於『對威脅的扭曲認知/高估危險』，而非「趨避衝突」(趨避衝突是 Lewin/動機理論)。故 C 正確。","options":{"A":"強迫症源於肛門期、以防衛處理焦慮是精神分析觀點，非人際學派。","B":"精神分析認為焦慮與潛意識衝突有關，非同儕同理心。","C":"正確。行為學派視焦慮為刺激—反應連結的學習反應。","D":"認知學派認為焦慮源於扭曲認知，非趨避衝突。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","焦慮的心理學派"]}},"111110-N5-15":{"quick":"認知行為治療技巧＝利用觀察現實、排除自我中心(扭曲)。","detail":{"background":"認知行為治療(CBT)的技巧:(D)『利用觀察現實的證據，排除以自我中心的扭曲解釋』，協助病人以客觀、平衡的方式看待事件。其他錯誤:A 應檢視『支持與反對』負向想法的證據(非「僅」寫支持的);B 應『去除』災難化解釋(非「用」引起焦慮災難化的解釋);C『分析早期發展對問題的影響』是精神分析，非 CBT。故 D 正確。","options":{"A":"應檢視支持與反對的證據，非僅寫支持負向想法的。","B":"應去除災難化解釋，非用引起焦慮的解釋。","C":"分析早期發展是精神分析，非 CBT。","D":"正確。利用觀察現實、排除自我中心的扭曲，是 CBT 技巧。"},"sources":["精神科護理學·認知行為治療"]}},"111110-N5-22":{"quick":"PTSD 敘述錯誤＝常使用抵消的防衛機轉。","detail":{"background":"創傷後壓力症(PTSD)的正確特徵:對災難不斷反覆的經驗再現/回憶重現(flashback)(A)、持續逃避與創傷有關的刺激(B)、症狀持續超過1個月(C，若<1個月為急性壓力症)。而 D『常使用抵消的防衛機轉』錯誤——抵消是強迫症常用的防衛機轉，非 PTSD 的典型;PTSD 多與解離、麻木、過度警覺等有關。故 D 為錯誤者。","options":{"A":"反覆經驗再現(flashback)是 PTSD 核心症狀，正確。","B":"持續逃避創傷相關刺激，正確。","C":"症狀持續超過1個月，正確。","D":"正確(本題選錯誤者)。抵消是強迫症的防衛機轉，非 PTSD 典型。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","PTSD"]}},"112030-N5-2":{"quick":"提出人際關係不良帶來焦慮的學者＝沙利文(Sullivan)。","detail":{"background":"沙利文(Harry Stack Sullivan)的『人際關係理論』主張人格與精神困擾源於『人際關係』，焦慮是在人際互動(尤其早期母嬰關係)中產生的。榮格(Jung)發展分析心理學(集體潛意識);阿德勒(Adler)強調自卑與超越;馬斯洛(Maslow)提出需求層次。故提出「人際關係不良帶來焦慮」的是沙利文。","options":{"A":"榮格發展分析心理學(集體潛意識、原型)。","B":"阿德勒強調自卑感與追求超越。","C":"馬斯洛提出需求層次理論。","D":"正確。沙利文(Sullivan)主張人際關係不良帶來焦慮。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Sullivan 人際理論"]}},"112030-N5-11":{"quick":"CBT 步驟『最不適宜』＝了解深層經驗結構、尊重存在真實性(屬存在/人本治療)。","detail":{"background":"認知行為治療(CBT)的步驟:協助個案了解負向想法如何影響其情緒與行為(A)、找出證據檢驗其想法是否與真實不符(B)、找出影響負向想法的內在錯誤信念/假設並加以修正(D)。而 C『了解個案的深層經驗結構、尊重及保護個案存在的真實性』屬『存在—人本主義治療』的概念，不是 CBT 的步驟，故為最不適宜者。CBT 著重此時此刻的認知與行為，而非深層經驗或存在議題。","options":{"A":"了解負向想法如何影響情緒行為，是 CBT 步驟。","B":"找證據檢驗想法是否與真實不符，是 CBT 步驟。","C":"正確(本題選最不適宜者)。了解深層經驗結構、尊重存在真實性屬存在/人本治療。","D":"找出並修正錯誤信念/假設，是 CBT 步驟。"},"sources":["精神科護理學·認知行為治療"]}},"112030-N5-13":{"quick":"行為治療運用＝需醫療團隊的合作(一致執行)。","detail":{"background":"行為治療的適當運用:(D)個案行為治療的執行『需醫療團隊的合作』，全體一致地執行同一計畫(增強標準與態度一致)才有效。其他錯誤:A 增強物應依『對個案有效』而建立，非依病房管理方便;B 行為治療計畫應依『個案的問題與需求』訂定，非僅依醫療需求;C 與個案簽訂行為契約宜『取得相關人員(含家屬)的了解與配合』。故 D 最適宜。","options":{"A":"增強物應依對個案有效而建立，非病房管理方便。","B":"行為治療計畫應依個案問題與需求訂定。","C":"行為契約宜取得家屬等相關人員配合。","D":"正確。行為治療的執行需醫療團隊的合作、一致執行。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","行為治療"]}},"112030-N5-14":{"quick":"對攻擊行為的病人訂行為治療＝與病人共同討論。","detail":{"background":"陳先生住院期間多次衝突攻擊。訂定行為治療計畫時最適宜『與病人共同討論』——讓病人參與目標設定與契約訂定，提升其改變動機與承諾(賦權、合作)。依病房管理原則訂定、由護理師獨立規劃、僅需家屬同意都忽略了病人的參與。行為治療強調與病人合作訂定明確、可達成的目標。故 A 正確。","options":{"A":"正確。與病人共同討論訂定行為治療，提升其動機與承諾。","B":"依病房管理原則訂定忽略病人參與。","C":"由護理師獨立規劃執行忽略病人與團隊合作。","D":"僅需家屬同意忽略病人本人的參與。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","行為治療"]}},"112030-N5-20":{"quick":"以 0–10 分請病人自評心情＝心情的主觀評估。","detail":{"background":"護理師請鬱症的李小姐『以0到10分自評目前的心情(0分最低落)』，這是請病人『自己主觀地評量其心情』，屬『心情(mood)的主觀評估』——心情(mood)是病人主觀感受的持續情緒狀態，由病人自陳;情感(affect)則是護理師客觀觀察到的情緒表現。智能思考內容、防衛機轉評估皆非本題。故 D 正確。","options":{"A":"智能層面的思考內容評估是評估妄想等思考內容。","B":"心理防衛機轉評估非本題自評心情。","C":"情感(affect)是客觀觀察到的情緒表現，本題是病人自評。","D":"正確。請病人自評心情分數，是心情的主觀評估。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","情緒評估"]}},"112110-N5-3":{"quick":"把內在不接受的想法歸咎他人＝外射(projection)。","detail":{"background":"把自己內在無法接受的想法、慾望或衝動『歸咎成他人』，藉此減少對自己的威脅與焦慮，是『外射(投射，projection)』。合理化是為行為找藉口;認同是仿效他人特質;反向行為是表現相反行為。本題核心是『把內在衝動歸咎他人』，故為外射。補充:投射(projection)是不成熟防衛機轉，妄想症與被害意念的核心即把內在敵意投射成外界迫害;與「歸咎他人找藉口(合理化)」不同，投射是把自己的衝動本身轉嫁到他人身上。臨床上對運用投射的病人不爭辯其內容，先建立信任、同理其害怕。","options":{"A":"正確。把內在不接受的想法歸咎他人，是外射(投射，projection)。","B":"合理化是為行為找看似合理的藉口。","C":"認同是仿效他人特質以提升自我。","D":"反向行為是表現出與真實感受相反的行為。"},"sources":["精神科護理學·心理防衛機轉"]}},"112110-N5-9":{"quick":"Caplan：危機問題持續未解決、焦慮升高可能導致崩潰。","detail":{"background":"卡普蘭(Caplan)危機理論:(D)當危機問題『持續未解決，升高的焦慮可能導致個人崩潰(人格解組)』，正確。其他錯誤:A 危機『與個案的情緒反應有關』(危機是主觀失衡，非僅事件本身);B 危機形成『與個案的因應機轉有關』(因應有效則不形成危機);C 個案在『崩潰期』時慣用方法已失效，不再是用慣用方法因應。故 D 正確。","options":{"A":"危機與個案的情緒反應有關，非僅事件本身。","B":"危機形成與個案的因應機轉有關。","C":"崩潰期時慣用方法已失效，非用慣用方法因應。","D":"正確。危機持續未解決、焦慮升高可能導致崩潰。"},"sources":["精神科護理學·危機理論(Caplan/Aguilera)"]}},"112110-N5-11":{"quick":"無條件正向關懷、強調自我實現＝個人中心治療(Rogers)。","detail":{"background":"治療者提供『無條件正向關懷(unconditional positive regard)、真誠與同理，強調人類成長與自我實現的潛能』，是羅傑斯(Rogers)的『個人中心(case/person-centered)治療法』(人本取向)。心理分析重潛意識;行為治療以學習原理;理情治療(Ellis)駁斥非理性信念。故為個人為中心式治療法。","options":{"A":"心理分析治療重潛意識衝突的揭露。","B":"行為治療以學習原理改變行為。","C":"理情治療著重駁斥非理性信念。","D":"正確。無條件正向關懷、強調自我實現，是個人中心治療(Rogers)。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","個人中心治療"]}},"112110-N5-13":{"quick":"思覺失調症的盛行率男女大約相當。","detail":{"background":"精神疾病盛行率的性別差異:(C)思覺失調症的盛行率『男女大約相當』(約1%，男性發病略早)。其他錯誤:A 物質使用障礙症『男性』較普遍，非女性;B 自閉症類群障礙症『男性明顯多於女性』(約4:1)，非相當;D 雙相情緒障礙症男女盛行率『大約相當』，非男性大於女性。故 C 正確。","options":{"A":"物質使用障礙症男性較普遍，非女性。","B":"自閉症類群障礙症男性多於女性，非相當。","C":"正確。思覺失調症的盛行率男女大約相當。","D":"雙相情緒障礙症男女大約相當，非男性大於女性。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","精神疾病流行病學"]}},"112110-N5-14":{"quick":"個別心理治療：鼓勵自我表露①、修正阻礙改變的阻力②。","detail":{"background":"個別心理治療的主要目的與原則:(1)鼓勵病人自我表露(self-disclosure)以促進覺察與表達;(2)辨識並修正阻礙改變的阻力(resistance)。而(3)『協助了解疾病診斷』偏向衛教;(4)『提供社區就業資訊』屬復健/社會服務，皆非個別心理治療的核心。故正確為①②(選 A)。","options":{"A":"正確。鼓勵自我表露①、修正阻礙改變的阻力②，是個別心理治療的原則。","B":"②③：含敘述3(了解診斷)偏衛教，非核心。","C":"③④：皆非個別心理治療核心。","D":"①④：含敘述4(就業資訊)，屬復健。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","個別心理治療"]}},"112110-N5-29":{"quick":"物質使用障礙護理『較不適切』＝鼓勵病人用否認或隔離以逃避壓力。","detail":{"background":"物質使用障礙症的護理:核心議題是提升病人對問題的『覺察能力(打破否認)』(A)、增加現實感並同理(B)、討論可行的戒除方法並評值成效(D)。而 C『鼓勵病人使用否認或隔離的心理機轉以逃避壓力』最不適切——否認正是物質使用者最大的治療阻礙，護理應協助病人『面對與覺察』，而非鼓勵其使用防衛機轉逃避。故 C 為較不適切者。","options":{"A":"協助提升對問題的覺察能力，適切。","B":"增加現實感、不爭辯、同理其害怕，適切。","C":"正確(本題選較不適切者)。鼓勵使用否認/隔離逃避壓力，與治療方向相反。","D":"討論戒除方法、訂目標並評值成效，適切。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","物質使用障礙"]}},"112180-N5-1":{"quick":"「你總是做錯、你應該/不可以」階層化＝父母型自我狀態。","detail":{"background":"依交流分析(TA)，人有三種自我狀態:父母型(parent，權威、教訓、批判或照顧，如「你應該/你不可以」)、成人型(adult，理性、客觀、就事論事)、兒童型(child，情緒、依賴、衝動)。護理師習慣性對病人說「為什麼你總是做錯、你應該…、你不可以…」，是以權威、批判的方式互動、使關係階層化，屬『父母型自我狀態(parent ego state)』。故 A 正確。","options":{"A":"正確。「你總是做錯、你應該/不可以」是權威批判的父母型自我狀態。","B":"兒童型是情緒、依賴、衝動的狀態。","C":"成人型是理性、客觀、就事論事的狀態。","D":"交叉溝通是溝通型態，非自我狀態。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","交流分析(TA)"]}},"112180-N5-14":{"quick":"支持性心理治療『不』深掘問題背後原因(故 D 錯)。","detail":{"background":"支持性心理治療(supportive psychotherapy)的目的是『改善症狀、提升自尊、強化病人現有的自我功能與因應能力』，協助其度過危機，而『不深入探討問題背後的潛意識原因』(那是洞察/分析取向)。李同學喪母哀傷，支持性治療提供情緒支持與穩定。故 D『宜探討問題背後的原因』錯誤(非支持性治療的概念)。","options":{"A":"改善病人症狀是支持性心理治療的目的。","B":"提升個案自尊是支持性心理治療的目的。","C":"強化自我功能是支持性心理治療的目的。","D":"正確(本題選錯誤者)。深掘問題背後原因屬洞察取向，非支持性治療。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","支持性心理治療"]}},"112180-N5-22":{"quick":"以特定行為消除內心焦慮＝抵銷作用(undoing)。","detail":{"background":"心理防衛機轉的正確敘述:(B)『以特定(常為儀式性)行為來消除內心的焦慮或抵消不被接受的念頭』是『抵銷作用(undoing)』。其他錯誤:A『無意識地抑制內在衝動』是『潛抑(repression)』，非壓抑(壓抑是有意識的);C『把原始衝動壓抑到潛意識』是『潛抑』，非轉移;D『把內在衝突藉象徵性身體症狀呈現』是『轉化(conversion)』，非取代。故 B 正確。","options":{"A":"無意識抑制內在衝動是潛抑(repression)，非壓抑。","B":"正確。以特定行為消除內心焦慮，是抵銷作用(undoing)。","C":"把衝動壓抑到潛意識是潛抑，非轉移。","D":"象徵性身體症狀呈現是轉化(conversion)，非取代。"},"sources":["精神科護理學·心理防衛機轉"]}},"112180-N5-25":{"quick":"慢性思覺失調、自我照顧下降、無家人可協助＝精神護理之家。","detail":{"background":"林先生思覺失調40年、目前無明顯精神症狀(穩定慢性化)、但自我照顧功能下降需他人協助、無家人可照料——最適合『精神護理之家』(提供慢性、穩定但需長期生活照護與復健的機構式照護)。社區心理衛生中心是社區服務據點;日間留院是白天到院、晚上回家(需有家照顧);居家治療需家中有人照料。林先生無家人可協助生活照顧，故需機構式的精神護理之家。","options":{"A":"社區心理衛生中心是社區服務據點，非長期生活照護。","B":"日間留院需晚上回家、有家人照顧，林先生無家人。","C":"居家治療需家中有人照料，林先生無家人。","D":"正確。慢性穩定、自我照顧下降、無家人照料，最適合精神護理之家。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","精神護理之家"]}},"113030-N5-5":{"quick":"認知行為治療＝引導個案調整想法和行為。","detail":{"background":"認知行為治療(CBT)的核心是『引導個案調整想法(認知)和行為』，透過修正不合理認知與練習新行為改善情緒。其他錯誤:A CBT『會處理壓力的生理反應』(如放鬆訓練);C『強調早期發展階段的問題』是精神分析;D『了解潛意識對人際關係的影響』是精神分析/人際取向。故 B 正確。","options":{"A":"CBT 會處理壓力的生理反應(如放鬆訓練)。","B":"正確。引導個案調整想法和行為，是 CBT 的核心。","C":"強調早期發展階段的問題是精神分析。","D":"了解潛意識對人際關係的影響是精神分析。"},"sources":["精神科護理學·認知行為治療"]}},"113100-N5-15":{"quick":"昇華(sublimation)＝以建設性、對社會有利的行為滿足不被接受的慾望。","detail":{"background":"心理防衛機轉的正確敘述:(B)『藉由建設性的行為來滿足不被社會接受的慾望，且對社會有利』是『昇華(sublimation)』(如把攻擊衝動導向運動競技)，屬成熟的防衛機轉。其他錯誤:A『有意識地壓抑情緒衝動』是『壓抑(suppression)』，非潛抑(潛抑是無意識的);C 內射是把情感轉向『自己』，非「移轉給他人」;D『把原始慾望轉移到潛意識而無法覺知』是『潛抑』，非合理化。故 B 正確。","options":{"A":"有意識壓抑情緒衝動是壓抑(suppression)，非潛抑。","B":"正確。以建設性、對社會有利的行為滿足不被接受的慾望，是昇華。","C":"內射是把情感轉向自己，非移轉給他人。","D":"把慾望轉移到潛意識是潛抑，非合理化。"},"sources":["精神科護理學·心理防衛機轉"]}},"113100-N5-18":{"quick":"物質使用障礙護理『不適切』＝採批判態度譴責其物質使用行為。","detail":{"background":"物質使用障礙症的護理:個案出現妄想時增加現實感(A)、出現操縱或暴力時予適當受限(B)、使用否認防衛時協助處理內心衝突(C)。而 D『採取批判性態度、譴責其物質使用行為』不適切——批判與譴責會破壞治療關係、加深否認與抗拒，護理應以『接納、不批判』的態度協助病人面對。故 D 為不適切者。","options":{"A":"個案出現妄想時增加現實感，適切。","B":"出現操縱或暴力時予適當受限，適切。","C":"使用否認防衛時協助處理內心衝突，適切。","D":"正確(本題選不適切者)。批判譴責會破壞關係、加深抗拒。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","物質使用障礙"]}},"113100-N5-23":{"quick":"家人各說各話、衝突：精神科居家護理最優先＝促進案家互動式溝通。","detail":{"background":"錢先生與父母『多言語衝突、各說各話、互不相讓』。精神科居家護理師最優先的照護目標是『促進案家的互動式溝通』——改善家庭成員間的溝通模式、減少衝突，是處理此家庭問題的核心。改善家庭經濟、身體健康評估、教導病人壓力因應雖有意義，但面對「各說各話、溝通不良」的核心問題，首要是促進有效的家庭互動溝通。故 A 正確。","options":{"A":"正確。面對家人各說各話、衝突，最優先是促進案家互動式溝通。","B":"改善家庭經濟非當前核心問題。","C":"身體健康評估非此情境最優先。","D":"教導病人壓力因應非家庭溝通問題的首要。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","家庭護理·精神居家"]}},"113180-N5-3":{"quick":"慢性思覺失調、穩定、局部功能退化、需積極復健＝日間住院治療。","detail":{"background":"王先生慢性思覺失調、精神症狀穩定、但局部功能退化、『具復健潛能、需積極復健治療』——最適合『日間住院(日間留院)治療』:白天到院接受結構化的復健活動(職能、社交技巧、團體)，晚上回家，兼顧積極復健與社區生活。慢性住院/護理之家偏長期療養(復健積極度較低);急性住院是處理急性症狀。對穩定且有復健潛能者，日間住院最適合。","options":{"A":"正確。穩定、有復健潛能、需積極復健，最適合日間住院治療。","B":"慢性住院偏長期療養，復健積極度較低。","C":"護理之家偏長期生活照護，非積極復健。","D":"急性住院是處理急性症狀，病人已穩定。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","精神復健·日間留院"]}},"113180-N5-6":{"quick":"認知行為治療的特徵＝運用學習理論解決問題。","detail":{"background":"認知行為治療(CBT)的特徵是『運用學習理論(行為制約)與認知理論，處理此時此刻的問題、調整想法與行為』。運用心理分析/精神動力解決問題是精神分析;運用人際互動關係是人際/人本取向。CBT 結合行為(學習理論)與認知，故為「運用學習理論解決問題」。","options":{"A":"運用心理分析解決問題是精神分析。","B":"運用精神動力解決問題是精神分析取向。","C":"運用人際互動關係是人際/人本取向。","D":"正確。運用學習理論(與認知)解決問題，是 CBT 的特徵。"},"sources":["精神科護理學·認知行為治療"]}},"113180-N5-13":{"quick":"疾病核心症狀配對：創傷後壓力症會出現回憶重現(flashback)。","detail":{"background":"疾病與核心症狀的正確配對:(B)創傷後壓力症(PTSD)會出現『回憶重現(flashback)』。其他錯誤配對:A『迴避開放空間導致外出受限』是『懼曠症(agoraphobia)』，非社交焦慮症(社交焦慮是怕被評價的社交情境);C『對許多事物有過多焦慮與擔憂』是『廣泛性焦慮症(GAD)』，非特定畏懼症(畏懼是針對特定對象);D『出現重複的行為或心智活動』是『強迫症(OCD)』，非廣泛性焦慮症。故 B 正確。","options":{"A":"迴避開放空間是懼曠症，非社交焦慮症。","B":"正確。創傷後壓力症會出現回憶重現(flashback)。","C":"對許多事物過度焦慮是廣泛性焦慮症，非特定畏懼症。","D":"出現重複行為/心智活動是強迫症，非廣泛性焦慮症。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","焦慮相關疾患"]}},"113180-N5-14":{"quick":"PTSD 最不適切＝「等病人做好心理準備才進行危機處理」。","detail":{"background":"創傷後壓力症(PTSD)的照護:PTSD 病人可能對人疏離、無法感到幸福被愛(B)、無法記得創傷事件的重要情節(解離性失憶)(C)、有恐懼驚恐憤怒罪惡感與羞愧(D)，這些都是正確的 PTSD 特徵與照護考量。而 A『應等病人做好心理準備才進行危機處理、預後較佳』最不適切——危機處理應『及時介入』，被動等待會延誤、不利預後。故 A 為最不適切者。","options":{"A":"正確(本題選最不適切者)。危機處理應及時介入，被動等待延誤不利預後。","B":"對人疏離、無法感到幸福被愛是 PTSD 特徵，正確。","C":"無法記得創傷的重要情節(解離性失憶)，正確。","D":"有恐懼驚恐憤怒罪惡感與羞愧，正確。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","PTSD"]}},"114030-N5-1":{"quick":"凡事都怪自己、過度自責＝內射(introjection)。","detail":{"background":"林小姐『常責怪自己、認為凡事過錯都是自己造成的』——把責任與負向情感『轉向自己、過度自責』，是『內射(introjection)』，為憂鬱常見的心理動力。合理化是找藉口;潛抑是不自覺遺忘;退化是退回早期行為。本題核心是『過度自責、把責任內攝』，故為內射。","options":{"A":"合理化是為行為找看似合理的藉口。","B":"潛抑是不自覺地把痛苦排除到潛意識。","C":"正確。凡事都怪自己、過度自責，是內射(introjection)。","D":"退化是退回較早期的幼稚行為。"},"sources":["精神科護理學·心理防衛機轉"]}},"114030-N5-2":{"quick":"不以鐵鍊限制、奠定人道主義精神照護＝畢乃爾(Pinel)。","detail":{"background":"精神醫學史上『主張不以鐵鍊限制病人行動、奠定人道主義精神照護』的代表人物是『畢乃爾(Philippe Pinel)』——他解除精神病人的枷鎖、推動道德治療。克雷佩林(Kraepelin)是描述性精神醫學/疾病分類之父;佛洛伊德(Freud)創立精神分析;瓊斯(Maxwell Jones)提出治療性社區。故人道照護的代表為 Pinel。","options":{"A":"克雷佩林是描述性精神醫學/疾病分類之父。","B":"正確。畢乃爾(Pinel)解除鐵鍊、奠定人道主義精神照護。","C":"佛洛伊德創立精神分析。","D":"瓊斯提出治療性社區概念。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","精神醫學史"]}},"114030-N5-5":{"quick":"問什麼都重複回答同一答案＝言語持續(perseveration)。","detail":{"background":"病人不論被問什麼，都『持續重複同一個答案(38歲)』，無法轉換思路、固著於先前的反應，這是『言語持續(perseveration)』，常見於器質性腦疾患(失智、額葉損傷)。音韻連結(clang association)是依聲音押韻串接詞語(躁症/思覺失調);重複言語(verbigeration)是無意義地重複字句;回音性言語(echolalia)是鸚鵡式重複『他人』的話。本題是重複『自己』先前的答案，故為言語持續。","options":{"A":"音韻連結是依聲音押韻串接詞語。","B":"正確。固著重複同一答案、無法轉換，是言語持續(perseveration)。","C":"重複言語是無意義地重複字句。","D":"回音性言語是重複他人說的話。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","語言/思考障礙"]}},"114030-N5-6":{"quick":"以單一細節下結論、不顧其他訊息＝選擇性偏差推論(selective abstraction)。","detail":{"background":"Beck 認知扭曲中，『只憑整個事件中的單一細節下結論，而忽略其他相關訊息(斷章取義)』是『選擇性偏差推論/選擇性摘要(selective abstraction)』。二極化思考是非黑即白;完美主義是凡事要求完美;武斷/獨斷推論(arbitrary inference)是『毫無證據』即下結論(與選擇性偏差略不同:後者是只取片面證據)。本題強調「只取單一細節、不顧其他」，故為選擇性偏差推論。","options":{"A":"二極化思考是非黑即白的兩極化。","B":"完美主義是凡事要求完美。","C":"正確。只憑單一細節下結論、忽略其他訊息，是選擇性偏差推論。","D":"武斷推論是毫無證據即下結論，與「只取片面」略不同。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","Beck 認知扭曲"]}},"114030-N5-7":{"quick":"動機式晤談『不』用夢的解析(那是精神分析)。","detail":{"background":"動機式晤談法(motivational interviewing, MI)的基本原則(OARS/四原則):表達同理、『創造(發展)不一致(discrepancy，凸顯現狀與目標的落差)』(A)、避免發生爭辯(roll with resistance)(D)、『支持自我效能感』(C)。而 B『應用夢的解析分析問題』屬精神分析的技術，不是動機式晤談的原則。故 B 不是 MI 的基本原則。","options":{"A":"創造不一致的想法是 MI 的原則。","B":"正確(本題選非原則者)。夢的解析屬精神分析，非動機式晤談原則。","C":"支持自我效能感是 MI 的原則。","D":"避免發生爭辯是 MI 的原則。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","動機式晤談"]}},"114030-N5-8":{"quick":"代幣制度『不適合』在病人精神症狀混亂時使用。","detail":{"background":"代幣制度(token economy)是行為治療技術(A)、以具交換價值的象徵物代替金錢(C)、屬操作制約的學習原理(D)。而 B『最適合在病人精神症狀混亂時使用』不適宜——代幣制度需要病人『理解規則、能連結行為與獎勵』，精神症狀混亂(急性期、思考解組)時病人無法理解與配合，故不適合在此時使用，應在症狀較穩定時實施。故 B 為不適宜者。","options":{"A":"代幣制度是行為治療的技術，正確。","B":"正確(本題選不適宜者)。症狀混亂時病人無法理解規則，不適合使用代幣制度。","C":"以具交換價值的象徵物代替金錢，正確。","D":"屬操作制約的學習原理，正確。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","行為治療·代幣制度"]}},"114030-N5-18":{"quick":"DSM-5 智能不足『最不適切』＝把閱讀書寫問題解決歸為實務領域(應屬概念領域)。","detail":{"background":"DSM-5 智能不足(智能發展障礙症)的『適應功能』評估三領域:概念(conceptual:語言、閱讀、書寫、數學、推理、記憶、問題解決)、社會(social:人際、同理、社交判斷)、實務(practical:自我照顧、金錢管理、工作、生活技能)。C 把『閱讀、書寫、問題解決、對陌生情境的判斷力』歸為『實務領域』最不適切——閱讀書寫與問題解決屬『概念領域』(非實務)。A(三領域)、B(獨立與社會責任無法達適齡準則為適應功能缺損)、D(缺損使多重環境中日常活動受限)皆正確。故 C 為最不適切者。","options":{"A":"適應功能含概念、社會、實務三領域，正確。","B":"獨立與社會責任無法達適齡準則稱適應功能缺損，正確。","C":"正確(本題選最不適切者)。閱讀書寫問題解決屬概念領域，非實務領域。","D":"缺損使日常活動功能受限，正確。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","DSM-5 智能障礙"]}},"114030-N5-22":{"quick":"精神護理之家服務：對慢性化精神症狀的病人提供生活照顧。","detail":{"background":"精神護理之家收置『精神症狀穩定且慢性化、需長期生活照護』的病人:(A)病人精神症狀呈現慢性化，宜提供『生活的照顧』(自我照顧、復健、生活照護)。其他錯誤:B 照顧目標非「優先讓病人返回家庭」(部分病人無家可歸或家庭無法照顧，目標是維持功能與生活品質);C 精神症狀屬『活躍期(急性)』者應在急性病房，非護理之家;D 不以「積極安排就業規劃」為主(對象多為功能退化、長期照護者)。故 A 正確。","options":{"A":"正確。對慢性化精神症狀的病人提供生活的照顧。","B":"目標非優先讓病人返家(部分無家可歸或家庭無法照顧)。","C":"活躍(急性)期病人應在急性病房，非護理之家。","D":"不以積極就業規劃為主，對象多為長期照護者。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","精神護理之家"]}},"114030-N5-34":{"quick":"自我效能『最不適當』＝外在資源越多自我效能越高。","detail":{"background":"自我效能(self-efficacy，Bandura)是『個人對自己在特定情境下能否完成特定行為的「主觀信念」』:(A)定義正確;(B)自我效能低者易因失敗經驗使其再降低;(D)包含程度(magnitude)、類化(generality)、強度(strength)三層面。而 C『外在資源越多者，自我效能越高』最不適當——自我效能是個人『對自身能力的信念』，主要由成功經驗、替代經驗、言語說服、情緒生理狀態形成，並非由「外在資源多寡」直接決定。故 C 為最不適當者。","options":{"A":"自我效能是對能否完成特定行為的能力評估(信念)，正確。","B":"自我效能低者易因失敗使其再降低，正確。","C":"正確(本題選最不適當者)。自我效能是對自身能力的信念，非外在資源多寡決定。","D":"包含程度、類化、強度三層面，正確。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","自我效能(Bandura)"]}},"114100-N5-7":{"quick":"理情治療(REBT)的論點＝駁斥非理性的信念。","detail":{"background":"理情治療(理情行為療法 REBT，Ellis)的核心論點是『辨識並駁斥(dispute)個案的非理性信念』，因為困擾源於對事件的不合理想法(A-B-C 模式)，改變信念即改變情緒。消除不良事件情境不切實際(REBT 改變的是「想法」而非事件);建立新社交技巧行為是社交技巧訓練;修正早期創傷經驗是精神分析。故 B 正確。","options":{"A":"REBT 改變的是想法，而非消除事件本身。","B":"正確。駁斥非理性的信念，是理情治療的核心論點。","C":"建立新社交技巧是社交技巧訓練，非 REBT 核心。","D":"修正早期創傷經驗是精神分析。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","理情治療(REBT)"]}},"114100-N5-9":{"quick":"Caplan：面對壓力源時，會先嘗試用之前的成功經驗來解決。","detail":{"background":"卡普蘭(Caplan)危機理論:(A)當個人面對壓力源時，會先『嘗試使用之前的成功經驗(慣用的因應方法)來解決問題』，若無效才焦慮升高、進入危機。其他錯誤:B 危機評估『需評估個人的情緒反應』(危機是主觀失衡);C 個人因應危機『需要內部與外部支持』(非僅內部);D 當情緒崩潰時『更需要尋求外部支持』(非不需要)。故 A 正確。","options":{"A":"正確。面對壓力源時，會先嘗試用之前的成功經驗解決。","B":"危機評估需評估個人的情緒反應。","C":"因應危機需要內部與外部支持，非僅內部。","D":"情緒崩潰時更需要尋求外部支持。"},"sources":["精神科護理學·危機理論(Caplan/Aguilera)"]}},"114100-N5-11":{"quick":"憂鬱、有自殺企圖的病人，最優先護理＝預防自我傷害。","detail":{"background":"董先生憂鬱(食慾差、體重下降、失眠、無望感)且『有自殺企圖』。最優先的護理措施是『預防自我傷害』——評估自殺風險、提供安全環境、移除危險物品、密切觀察。分析壓力來源、安排工作治療、提供營養諮詢雖重要，但對『有自殺企圖』的病人，安全(預防自傷)永遠是第一優先。故 D 正確。","options":{"A":"分析壓力來源非當前最優先(安全優先)。","B":"安排工作治療須在安全與症狀穩定後。","C":"提供營養諮詢非有自殺企圖時的最優先。","D":"正確。對有自殺企圖的病人，預防自我傷害最優先。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","憂鬱症·自殺防治"]}},"114100-N5-17":{"quick":"轉化症的護理：症狀可藉暗示、建議或藥物催眠會談得到改善。","detail":{"background":"承上題(李同學壓力後出現無器質基礎的身體症狀，屬轉化症/功能性神經症狀障礙)。對轉化症的護理:(D)症狀常可藉由『暗示、建議或藥物催眠(amytal)會談』得到改善(暗示性高)，並處理背後的心理壓力。其他錯誤:A『不必處置、數天會緩解』太消極(未處理心理因素);B『持續更縝密的神經學檢查直到找出病因』錯誤(已排除器質、過度檢查會強化病人對身體症狀的關注);C『請病假不用考試以移除壓力源』會『強化次級獲益(secondary gain)』、使症狀持續。故 D 正確。","options":{"A":"「不必處置數天緩解」太消極，未處理心理因素。","B":"過度神經學檢查會強化對身體症狀的關注。","C":"讓其請假免考會強化次級獲益，使症狀持續。","D":"正確。轉化症症狀可藉暗示、建議或藥物催眠會談得到改善。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","轉化症"]}},"114170-N5-3":{"quick":"病房懸掛日曆與時鐘＝增加定向感和現實感。","detail":{"background":"依環境治療原則，在精神科病房公共區域懸掛『日曆與時鐘』的主要目的是『提供現實導向，增加病人的定向感(時間)與現實感』，對失智、譫妄或現實感受損的病人尤其重要。提高藥物副作用認識、增加情感調適、自我人格反思都非其主要目的。故 B 正確。補充:現實導向(reality orientation)透過環境線索(時鐘、日曆、標示牌、季節布置)持續提供時間地點訊息，協助定向感受損者(失智、譫妄)重建現實感;屬環境治療的一環。與之配合的還有規律作息、固定工作人員、簡單清楚的環境設計，皆在降低混亂、增加可預期性與安全感。","options":{"A":"非為提高對藥物副作用的認識。","B":"正確。懸掛日曆時鐘是增加定向感和現實感。","C":"非為增加情感調適能力。","D":"非為提高對自我人格的反思。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","環境治療·現實導向"]}},"114170-N5-8":{"quick":"平淡描述喪親事件、彷彿發生在他人身上＝隔離作用(isolation)。","detail":{"background":"李先生妻女意外過世，『很平淡地描述完整事件、彷彿這是發生在他人身上』——把『事件的事實與其應有的情緒分隔開』，以平淡、抽離的方式陳述，是『隔離作用(isolation of affect)』。其他錯誤:A『有意識地抑制失落情緒』是『壓抑(suppression)』而非潛抑(潛抑是無意識的);C『別白花』是哀悼的象徵儀式，非轉化作用(轉化是心理衝突轉為身體症狀);D『自責若不讓出門就不會發生』是反事實的自責/合理化，非抵消(抵消是以行為抵消念頭)。故 B 正確。","options":{"A":"有意識抑制情緒是壓抑(suppression)，非潛抑。","B":"正確。把事件與情緒分隔、平淡描述如發生在他人身上，是隔離作用(isolation)。","C":"別白花是哀悼象徵，非轉化作用。","D":"自責若不讓出門屬反事實自責，非抵消作用。"},"sources":["精神科護理學·心理防衛機轉"]}},"115030-N5-1":{"quick":"「坐窗邊想如果跳下去」：同理並直接評估自殺意念「你有不想再活下去的念頭嗎?」","detail":{"background":"吳小姐說「坐在窗邊會想如果跳下去會怎樣」，已透露自殺意念。依同理心原則，最適切回應是『接納並直接、溫和地評估其自殺意念』:「你有不想再活下去的念頭嗎?」——直接詢問自殺意念是安全評估的正確做法(不會增加自殺風險，反而讓病人感到被理解)。A「你住幾樓?」不當且失焦;C「你還年輕、人生才開始」是否定其感受、說教;D「等疫情降級分開住就會改善」是空泛建議、迴避其自殺訊號。故 B 正確。對透露自殺意念者，應直接評估而非迴避。","options":{"A":"「你住幾樓」失焦且不當。","B":"正確。同理並直接評估自殺意念「你有不想再活下去的念頭嗎?」","C":"「你還年輕」否定其感受、說教。","D":"「等疫情降級分開住」是空泛建議，迴避自殺訊號。"},"sources":["精神科護理學(新文京/華杏)·精神症狀學與心理動力","Kaplan & Sadock Synopsis of Psychiatry","自殺意念評估"]}},"115030-N5-23":{"quick":"喪偶後激動失控、捶打家人＝Caplan 危機的紊亂期。","detail":{"background":"張太太因先生意外過世，出現『激動不安、捶打家人(情緒失控、功能解組)』被送急診——慣用因應已失效、焦慮高漲、功能變得紊亂混亂，屬卡普蘭(Caplan)危機理論的『紊亂期(解組期)』。衝擊期是事件初衝擊;求助期是向外尋求支援;若持續惡化才到最終的崩潰。本題情緒失控、功能解組，故為紊亂期。","options":{"A":"衝擊期是事件初期的衝擊反應。","B":"崩潰期是更後期的人格崩潰，本題為情緒失控、功能解組。","C":"求助期是向外尋求支援的階段。","D":"正確。激動失控、功能解組，屬危機的紊亂期(解組期)。"},"sources":["精神科護理學·危機理論(Caplan/Aguilera)"]}}},TO=["壓力適應防衛機轉心理發展與精神症狀學"],LEC={"壓力適應防衛機轉心理發展與精神症狀學":{"title":"壓力適應與精神症狀學　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「壓力適應防衛機轉心理發展與精神症狀學」的歷屆考題共 169 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。建議先讀詳解中的背景知識建立概念，再逐選項釐清易混淆處。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
