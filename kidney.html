"108-腎-18","roc_year":108,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":18,"src":"舊站腎臟科"},{"num":19,"answer":"B","stem":"65歲男性病人,過去無高血壓、糖尿病,一年前健檢尿液腎功能均正常,但最近六週尿液顏色變深,腳踝水腫,走路會微喘。理學檢查:血壓 152/98 mmHg,下肢水腫至小腿前脛骨處。實驗室檢查:尿蛋白3+,OB 3+,URBC 50-70/HPF,Hb 10g/dL,BUN 53 mg/dL,Cre 3.6 mg/dL,免疫學檢查C-ANCA (+) 且titer高過正常值,請問其腎臟切片之病理報告比較可能為底下何者? (1)Goodpasture syndrome (2)Wegner granulomatosis (3)Eosonophilic granulomatosis (4)Churg-Strauss disease (5)Microscopic polyangitis.","options":{"A":"(1)+(2)+(3)","B":"(2)+(3)+(4)","C":"(3)+(4)+(5)","D":"(2)+(4)+(5)","E":"(1)+(3)+(5)"},"id":"108-腎-19","roc_year":108,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":19,"src":"舊站腎臟科"},{"num":20,"answer":"D","stem":"關於老年時,腎臟泌尿系統之退化,底下敘述何者為錯誤?","options":{"A":"腎絲球過濾率每年衰退1%,至70歲時平均約為70 ml/min/1.73m2左右","B":"腎臟尿液最大濃縮能力下降,且夜間尿量增加","C":"膀胱便容易躁動,且膀胱收縮力下降","D":"膀胱餘尿量增加,且膀胱容量減少","E":"逼尿肌過度反應(Detrusor overactivity)是尿失禁最常見之原因"},"id":"108-腎-20","roc_year":108,"source":"舊站q4腎臟科","topic":"感染/結石/阻塞","q_num":20,"src":"舊站腎臟科"},{"num":21,"answer":"D","stem":"36歲男性病人,主訴最近兩週有經常口渴、尿量增加及出現頭痛現象。理學:血壓正常,皮膚彈力正常。經初步檢驗得腎功能尿試紙檢查均正常,但 [Na+] 155 mmol/L; plasma osmolarity 330 mOsm/L。請問底下之臨床處置,何項為錯誤?","options":{"A":"應先在不限水狀況下,請病人蒐集24小時之尿液並記錄尿量","B":"如24小時尿量超過50 ml/Kg,而且Urine osmolarity","C":"應要先排除Hypokalemia及Hypercalcemia","D":"可打 DDAVP,看Plasm osmolarity之變化來判定是central或Nephrogenic DI","E":"治療時,每天 [Na+] 之下降量最好不要超過 10 mmol/L"},"id":"108-腎-21","roc_year":108,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":21,"src":"舊站腎臟科"},{"num":22,"answer":"D","stem":"當70歲病人因腎病症候群及Cre 2.0 mg/dL,進一步經檢查Serum and urine immunofixation 、 Free light chain assay、腎臟穿刺後已確定是 Renal AL Amyloidosis。請問接下來之臨床處置,底下敘述何者為錯誤?","options":{"A":"建議進一步做Bone marrow biopsy","B":"繼續追蹤Free light chain assay 做為病情與治療之指標","C":"若也有Cardiac involvement,也應追蹤Troponin與 N-termial pro-BNP","D":"此病人就是接受化學療法,終究還是會死於Renal failure","E":"病人接受自體造血幹細胞移植不見得會比化療好"},"id":"108-腎-22","roc_year":108,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":22,"src":"舊站腎臟科"},{"num":67,"answer":"E","stem":"49歲男性因近幾年重覆排出尿路結石,此外,明顯無其他臨床症狀與系統疾病,經檢查有血清肌酸酐 1.4 mg/dL (eGFR 57 ml/min/1.73m2)、高血鈣(13mg/dL)、及高副甲狀腺iPTH (150 pg/mL),technetium-99m sestamibi scintigraphy (MIBI)顯示在右甲狀腺處位置有intense uptake,請問其 之處置何者為正確? (1) 建議宜低鈣高磷的飲食 (2) 建議宜使用Thiazide預防尿路結石 (3) 建議宜使用Biphosphate預防骨質疏鬆 (4) 建議宜使用cinacalcet降低血鈣濃度 (5) 建議宜接受副甲狀腺切除","options":{"A":"(1)+(2)+(3)+(4)+(5)","B":"(1)+(3)+(5)","C":"(1)+(2)+(3)+(4)","D":"(2)+(3)+(4)","E":"(3)+(4)+(5)"},"id":"109-合-67","roc_year":109,"source":"109合併PDF","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":67,"src":"109合併卷"},{"num":68,"answer":"C","stem":"於慢性腎病之分期中,底下哪些為可能迅速嚴重惡化(即紅色警戒)的狀況?urinary albumin to creatinine ratio (UACR) (1) eGFR 45-59 + UACR 100 mg/g (2) eGFR 45-59 + UACR > 300 mg/g (3) eGFR 30-44 + UACR < 30 mg/g (4) eGFR 30-44 + UACR 100 mg/g (5) eGFR 15-29 + UACR < 30 mg/g","options":{"A":"(2)+(3)+(4)+(5)","B":"(1)+(3)+(5)","C":"(2)+(4)+(5)","D":"(3)+(4)+(5)","E":"(1)+(2)+(3)+(4)+(5)"},"id":"109-合-68","roc_year":109,"source":"109合併PDF","topic":"慢性腎臟病/尿毒症","q_num":68,"src":"109合併卷"},{"num":69,"answer":"C","stem":"72歲男性有多年高血壓、高膽固醇血症、慢性腎病第三期(穩定無惡化),近半年因輕微血尿eGFR 46 mL/min/1.73m2,做腎臟超音波發現左側腎臟(長徑8公分)比右側小2公分,進一步的MR angiography (如 圖) 發現 在左側腎動脈入口處有一狹窄,請問底下敘述,何者為正確? (1) 其高血壓與慢性腎病極可能為動脈硬化引起腎動脈狹窄所造成 (2) 可安排做captopril renogram 看左側腎臟血流是否有減少 (3) 因腎功能已不正常,應建議放支架或氣球擴張術來改善 (4) 若都卜勒超音波顯示左側腎臟之resistive index小於80,應該要需要進一步檢查 (5) ACEi/ARB 與 Statins的藥物治療即可","options":{"A":"(1)+(2)+(5)","B":"(1)+(3)+(5)","C":"(2)+(4)+(5)","D":"(1)+(3)+(4)","E":"(1)+(4)+(5)"},"id":"109-合-69","roc_year":109,"source":"109合併PDF","topic":"高血壓/腎血管疾病","q_num":69,"src":"109合併卷"},{"num":70,"answer":"D","stem":"關於常用的氫離子幫浦阻斷劑對腎臟的不良作用中,下列何者為非?","options":{"A":"Chronic kidney disease","B":"Acute kidney injury","C":"Acute interstitial nephritis","D":"Metabolic alkalosis","E":"Hypomagnesemia"},"id":"109-合-70","roc_year":109,"source":"109合併PDF","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":70,"src":"109合併卷"},{"num":72,"answer":"C","stem":"關於痛風流行病學與臨床表徵,底下哪一項描述為不正確?","options":{"A":"台灣原住民每十人至少有一人有痛風,即盛行率超過10%","B":"痛風病人九成是因為腎臟無法排出尿酸所造成","C":"女性較少罹患痛風,且常在停經之後就鮮少發作","D":"若25歲前就有痛風發作,可能有尿酸代謝之基因異常","E":"Thiazide、low dose aspirin、人工甜味劑,都會增加痛風之發作"},"id":"109-合-72","roc_year":109,"source":"109合併PDF","topic":"慢性腎臟病/尿毒症","q_num":72,"src":"109合併卷"},{"num":74,"answer":"E","stem":"關於顯影劑相關急性腎傷害(Contrast-associated AKI),近年文獻回顧指出底下描述何者為不正確?","options":{"A":"嚴重慢性腎病是發生顯影劑相關急性腎傷害之最強烈之獨立風險因子","B":"若非合併慢性腎病,糖尿病本身並不是顯影劑相關急性腎傷害之獨立風險因子","C":"顯影劑相關急性腎傷害雖然程度輕微,但也會增加病人之死亡率","D":"顯影劑相關急性腎傷害之嚴重程度,與隨後腎功能持續惡化有關","E":"慢性腎病病人因顯影劑導致嚴重急性腎傷害或導致透析的機率還是明顯高出很多"},"id":"109-合-74","roc_year":109,"source":"109合併PDF","topic":"急性腎損傷(AKI)","q_num":74,"src":"109合併卷"},{"num":77,"answer":"C","stem":"關於腎臟細胞癌的臨床表現,底下何者為正確?","options":{"A":"病人常因明顯症狀如血尿、腹部腫塊、疼痛而被檢查發現,故被稱為“internist's tumor”","B":"若轉移至肝臟造成肝功能失常,即Stauffer syndrome","C":"若已有轉移,腎臟內腫瘤或轉移他處腫瘤之切除可以延長存活","D":"近年新的生物製劑無法改善晚期腎臟細胞癌的五年存活率>70%","E":"腎臟細胞癌號發年齡層為四十到五十歲之前"},"id":"109-合-77","roc_year":109,"source":"109合併PDF","topic":"腎細胞癌/腫瘤","q_num":77,"src":"109合併卷"},{"num":78,"answer":"A","stem":"長期糖尿病會引起多種腎臟病變,包括: 蛋白尿、腎功能不全或腎小管酸血症(renal tubular acidosis, 簡 稱RTA)。有關這種糖尿病會引起的RTA,以下敘述何者正確?","options":{"A":"此種RTA經常出現hyperkalemia","B":"最常引起的是type 2 RTA","C":"此種RTA引起的酸血症,通常serum pH值會很低,需要靜脈注射補充bicarbonate","D":"此種RTA是因為血中renin 與 aldosterone濃度很高所引起","E":"此種RTA,因為尿液無法酸化,通常urine pH值會 > 6.5"},"id":"109-合-78","roc_year":109,"source":"109合併PDF","topic":"腎小管間質與RTA","q_num":78,"src":"109合併卷"},{"num":81,"answer":"D","stem":"一位38歲男性,non-DM, non-obese, 也沒有早發性心血管疾病的家族史。卻因為急性冠心症接受心導管 手術與放置兩根支架。住院後檢查結果如下: BP 142/90 mmHg, HR 86/min and regular, pedal edema (2+), t-Chol 400 mg/dL, LDL 285 mg/dL, albumin 2.8 g/dL, AST 40 IU/L, ALT 38 IU/L, creatinine 1.2 mg/dL, HbA1C 6.8%, WBC 7400/mm3。為了進一步探查病因,您會優先安排以下哪種檢查?","options":{"A":"Serum protein electrophoresis","B":"Urine protein electrophoresis","C":"Urine albumin/creatinine ratio","D":"Urine total protein/creatinine ratio","E":"Hs-CRP, ANA (antinuclear antibody)"},"id":"109-合-81","roc_year":109,"source":"109合併PDF","topic":"慢性腎臟病/尿毒症","q_num":81,"src":"109合併卷"},{"num":82,"answer":"D","stem":"一位24歲女性,有多年SLE (Systemic Lupus Erythematosus)病史,但沒有規則追蹤與治療。最近兩週出 現疲倦、下肢水腫,體重增加近7公斤而且感覺尿量減少。住院後抽血檢查: BUN 74 mg/dL,creatinine 2.8 mg/dL, urine protein (4+),診斷為急性腎炎 (acute glomerulonephritis, AGN),安排病人接受腎臟生 檢(renal biopsy),以下病理變化,何者最不可能?","options":{"A":"Diffuse proliferative nephritis with diffuse subendothelial deposit","B":"Membranous glomerulonephritis with subepithelial immune complex deposit","C":"Global endocapillary proliferation, with crescent formation","D":"Focal segmental glomerulosclerosis","E":"Glomerular necrotizing lesion of renal arteriole"},"id":"109-合-82","roc_year":109,"source":"109合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":82,"src":"109合併卷"},{"num":83,"answer":"B","stem":"一位65歲女性,因尿毒症,9個月前開始長期接受腹膜透析(CAPD)治療。最近兩天因為發燒、腹痛,透析 引流液(effluent)混濁而被送至急診。身體檢查: 體溫37.6°C, 腹部tenderness (+). 您會優先安排做以下何種 評估(initial evaluation)?","options":{"A":"Abdominal CT","B":"PD effluent: for culture, cytology and Gram staining","C":"照會外科,更換 PD catheter","D":"Empirical antibiotics and stopping PD, shift to HD","E":"測量 CAPD Kt/V, 並安排腹膜功能測試 (peritoneal equilibration test, PET)"},"id":"109-合-83","roc_year":109,"source":"109合併PDF","topic":"透析與腎移植","q_num":83,"src":"109合併卷"},{"num":84,"answer":"B","stem":"一位58歲男性,過去病史有多年腎病徵候群(nephrotic syndrome),後來進展成尿毒症,三年前開始每週 三次接受血液透析治療(hemodialysis)。半年前因冠心症,接受心導管手術並放置血管內支架。最近一次 的身體檢查數據如下: BUN 138 mg/dL, creatinine 13.5 mg/dL, K 6.4 mEq/L, P 8.7 mg/dL, albumin 4.6 g/dL, Hb 9.6 g/dL, ferritin 364 mg/dL. 下肢有輕度水腫(+). 每次透析4小時期間平均需脫水4 KG 以下幾項 診斷,何者較不合適?","options":{"A":"Dialysis inadequacy","B":"Protein energy wasting (PEW) and ongoing nephrotic syndrome","C":"Excessive protein intake","D":"Volume overload","E":"Renal anemia"},"id":"109-合-84","roc_year":109,"source":"109合併PDF","topic":"透析與腎移植","q_num":84,"src":"109合併卷"},{"num":85,"answer":"A","stem":"一位52歲多年高血壓的病人,這次因malignant hypertension (systolic BP 210 mmHg)被送至急診,身體 檢查: edema (3+), creatinine 1.4 mg/dL。病人接受腎臟生檢(renal biopsy),以下臨床與病理變化敘 述,何者最正確? (1) 腎臟病理切片: Fibrinoid necrosis and medial hypertrophy of small vessels (2) 腎臟病理切片: mesangial proliferation and cellular crescent formation (3) 腎臟病理切片: global sclerosis of glomerulus with pericapillary fibrosis (4) 腎臟病理切片: IgA or IgM immune deposition at glomerular area (5) 血液檢查: hypocomplementemia (low serum C3, low serum C4) (6) Urinalysis 有heavy proteinuria, 但很少有hematuria","options":{"A":"(1)+(3)+(6)","B":"(1)+(2)+(3)+(4)+(6)","C":"(1)+(2)+(5)+(6)","D":"(1)+(4)+(5)","E":"(1)+(2)+(3)+(4)+(5)"},"id":"109-合-85","roc_year":109,"source":"109合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":85,"src":"109合併卷"},{"num":86,"answer":"B","stem":"一位72歲女性,近來因反應變遲鈍、嗜睡,被家人送至門診就醫。身體檢查: BP 138/84 mmHg, edema (-), 心搏88/min (不規則,有atrial fibrillation)。檢視長期用藥清單有: amiodarone, carbamazepine (selective serotonin reuptake inhibitors), haloperidol (a antipsychotics)。血液檢查:Na 118 mEq/L, K 3.9 mEq/L, creatinine 0.8 mg/dL, glucose 118 mg/dL, albumin 3.4 g/dL, globulin 3.7 g/dL, t-Chol 164 mg/dL, TG 180 mg/d, serum osmolality 250 mOsm/kg。尿液檢查:Na 34 mEq/L, K 4.0 mEq/L, urine osmolality 436 mOsm/kg。以下診斷與治療的敘述,何者正確? (1) 診斷符合pseudo-hyponatremia (2) 診斷符合 SIADH (syndrome of inappropriate antidiuretic hormone secretion) (3) 診斷符合 Reset Osmostat (4) 可能與目前用藥amiodarone, carbamazepine或 haloperidol有關 (5) 由血液與尿液的Na, K, 及 osmolality 數值,可能與長期自行使用利尿劑有關 (6) 治療:建議適量限水 800 -1000 mL/day (7) 治療:建議diuretics + 0.9% saline (NaCl) solution infusion","options":{"A":"(1)+(4)+(7)","B":"(2)+(4)+(6)","C":"(3)+(4)+(5)+(6)","D":"(1)+(5)+(6)","E":"(2)+(5)+(7)"},"id":"109-合-86","roc_year":109,"source":"109合併PDF","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":86,"src":"109合併卷"},{"num":87,"answer":"A","stem":"53歲男性,過去有高血壓與C型肝炎病史。最近三個月來,出現蛋白尿,脛前與足踝輕度水腫,體重略增 加約3公斤。抽血檢查: 有血清補體(complement, C3與C4)偏低情形。因為不明原因腎病,安排病人接受 腎臟生檢(renal biopsy)。以下病理變化,何者最可能?","options":{"A":"Cryoglobulinemia, especially type II","B":"Polyarteritis nodosa","C":"IgA nephropathy or idiopathic chronic interstitial nephritis","D":"Membranous nephropathy","E":"Henoch-Schönlein purpura (HSP)"},"id":"109-合-87","roc_year":109,"source":"109合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":87,"src":"109合併卷"},{"num":88,"answer":"D","stem":"ACEI/ARB類藥物,在臨床上具有保護腎臟與治療心血管疾病的效果。在COVID-19疫情期間,由流行病 學資料發現:糖尿病、高血壓及心血管疾病病人,是容易感染COVID-19的高危險群,而這三類病人恰好 也是最常且長期使用ACEI/ARB類藥物的族群。針對:「COVID-19疫情期間,是否應停用ACEI/ARB類藥 物?」,請選出目前較被接受的共識觀點?","options":{"A":"COVID-19 virus會藉由結合人類細胞表面的angiotensin receptor而感染細胞。ACEI/ARB類藥物會增 加angiotensin receptor,所以會增加感染COVID-19的風險,因此還是應該全面使用比較好","B":"繼續使用ACEI/ARB類藥物,的確會增加感染COVID-19的風險與疾病嚴重度,但是不會增加死亡 率、因此已經感染COVID-19的病人再停用就好","C":"如果是女性、年齡大於65歲、有心臟衰竭(CHF)的病人,應該立即停止使用","D":"綜合所有觀察型研究的資料分析,迄今仍支持ACEI/ARB類藥物可以繼續使用,無須停用","E":"過去未曾使用ACEI/ARB類藥物的病人,如果感染COVID-19,基於保護腎臟與心血管,建議醫師應 該新開立此類藥物,預防器官衰竭"},"id":"109-合-88","roc_year":109,"source":"109合併PDF","topic":"高血壓/腎血管疾病","q_num":88,"src":"109合併卷"},{"num":91,"answer":"C","stem":"一位65歲糖尿病人,有高血壓,準備接受心導管檢查。理學檢查:BP 118/74, edema (-), serum creatinine 1.5 mg/dL。目前用藥為: metformin 500 mg bid, irbesartan 75 mg qd, trichlormethiazide 1 mg qd. 為了降低發生contrast nephropathy的危險,以下哪項措施最不建議。","options":{"A":"停用metformin, 更換成其他降血糖藥","B":"volume expansion with saline, 可以加上 bicarbonate","C":"停用irbesartan, 更換成fenoldopam降血壓藥比較安全","D":"給予 N-acetylcysteine","E":"打radiocontrast agent前,給予aminophylline"},"id":"109-合-91","roc_year":109,"source":"109合併PDF","topic":"急性腎損傷(AKI)","q_num":91,"src":"109合併卷"},{"num":55,"answer":"C","stem":"Statement on management strategy for patients with autosomal dominant polycystic kidney disease (ADPKD), which is incorrect:","options":{"A":"Dietary salt restriction may be beneficial in the management of ADPKD。","B":"Angiotensin-converting enzyme inhibitors (ACEI) or angiotensin receptor blockers (ARB) are the first-line antihypertensive drugs in ADPKD。","C":"Nonsteroidal anti-inflammatory drugs (NSAIDs) is more effective and safe than acetaminophen or tramadol for cystic pain relief in ADPKD patients。","D":"Oral tolvaptan can slow the increase in total kidney volume and the decline in kidney function of ADPKD patients。","E":"ADPKD patients can be a recipient for renal transplantation。"},"id":"110-合-55","roc_year":110,"source":"110合併PDF","topic":"囊性/遺傳性腎病","q_num":55,"src":"110合併卷"},{"num":57,"answer":"A","stem":"A middle aged woman was referred to renal clinic for evaluation of her renal disorder. She had intermittent pre-tibial swelling for almost 3 months. She has mild hypertension, but no diabetes. Neither viral hepatitis B nor C history. Laboratory tests were: albumin 3.1 g/dL, creatinine 1.7 mg/dL, Both serum complement levels (C3 and C4) are low, with a particularly depressed C4 compared with C3. Which of the following should be considered ?","options":{"A":"Cryoglobulinemia。","B":"Post-streptococcal glomerulonephritis。","C":"Membranoproliferative glomerulonephritis。","D":"Lupus nephritis, stage III or V。","E":"Infectious endocarditis or shunt nephritis。"},"id":"110-合-57","roc_year":110,"source":"110合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":57,"src":"110合併卷"},{"num":59,"answer":"D","stem":"Which are correct statements regarding hyperuricemia and related nephropathy? (1)The renal tubular transporters responsible for determining how much of the filtered uric acid is actually excreted are located in the distal nephron (2)Renal clearance of uric acid can be inhibited by the angiotensin-converting-enzyme inhibitors or by β-Blockers. (3)Initiation of colchicine can induce acute flares of gout (4)Initiation of allopurinol or febuxostat can induce acute flares of gout (5)Routine use of allopurinol (100-300 mg/day) in patients with stage 3-4 CKD can slow kidney disease progression","options":{"A":"(1)+(2)+(4)+(5)。","B":"(1)+(4)+(5)。","C":"(2)+(3)。","D":"(2)+(4)。","E":"(2)+(4)+(5)。"},"id":"110-合-59","roc_year":110,"source":"110合併PDF","topic":"慢性腎臟病/尿毒症","q_num":59,"src":"110合併卷"},{"num":61,"answer":"E","stem":"A 50-year-old male visited outpatient clinic due to difficult-to-control hypertension. After initial work up, hypokalemic hypertensive disorder was impressed, Further laboratory evaluation of adrenal hormones including plasma renin, aldosterone, cortisol, and androgen levels were arranged to distinguish among specific diagnoses. The results are: high renin level, high aldosterone level, an aldosterone-to-renin ratio of 10 : 1 ; and a normal serum cortisol level Which is the most possible diagnosis?","options":{"A":"ACTH-secreting tumor。","B":"Bartter syndrome。","C":"Liddle syndrome。","D":"Primary hyperaldosteronism。","E":"Unilateral renal artery stenosis。"},"id":"110-合-61","roc_year":110,"source":"110合併PDF","topic":"高血壓/腎血管疾病","q_num":61,"src":"110合併卷"},{"num":62,"answer":"B","stem":"Laboratory indices for differentiation of prerenal versus Intrinsic renal azotemia. Which of the followings prefers pre-renal azotemia?","options":{"A":"High urine Na concentration >20 (mmol/L)。","B":"High Urine specific gravity >1.020。","C":"Low urine osmolality <300 (mosmol/kg H2O)。","D":"High renal failure index (UNa/UCr/PCr) >1。","E":"Urinary sediment analysis reveals a lot of muddy-brown granular casts and casts containing tubular epithelial cells。"},"id":"110-合-62","roc_year":110,"source":"110合併PDF","topic":"急性腎損傷(AKI)","q_num":62,"src":"110合併卷"},{"num":63,"answer":"E","stem":"下列何種情況會造成高血磷症(Hyperphosphatemia)? (1)維生素D中毒 (2)代謝性鹼中毒 (3)原發性副甲 狀腺機能亢進 (4)嚴重低血鎂症(Severe hypomagnesemia)) (5)腫瘤溶解症候群(tumor lysis syndrome, TLS)","options":{"A":"(1)+(2)+(4)。","B":"(1)+(3)+(5)。","C":"(2)+(3)+(4)。","D":"(2)+(3)+(5)。","E":"(1)+(4)+(5)。"},"id":"110-合-63","roc_year":110,"source":"110合併PDF","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":63,"src":"110合併卷"},{"num":64,"answer":"D","stem":"一位74歲糖尿病女性患者合併慢性腎臟病第四期,長期服用口服降血糖用藥搭配胰島素控制,由於意識不 清醒被送到急診就醫,經檢查有代謝性酸中毒(metabolic acidosis),其陰離子隙(anion gap)為26 mmol/L,經積極使用碳酸氫鈉(sodium bicarbonate)矯正,仍無法控正,下列何種用口服降血糖藥物可 能為誘發的原因?","options":{"A":"二肽基肽酶-4抑制劑(Dipeptidyl peptidase-4 inhibitor)。","B":"過氧化物酶體增殖物活化受體γ(PPAR-γ)。","C":"α-葡萄糖苷酶抑制劑(α-glucosidase inhibitor)。","D":"二甲雙胍類降血糖藥物 (Metformin)。","E":"磺醯基尿素(sulfonylurea)。"},"id":"110-合-64","roc_year":110,"source":"110合併PDF","topic":"酸鹼平衡異常","q_num":64,"src":"110合併卷"},{"num":65,"answer":"B","stem":"一位60歲男性高血壓肥胖患者,近幾個月血壓升高以4種降壓劑控制,血壓為166/92 mm Hg。病患無家 族高血壓病史,一年前檢查雙側腎在大小一致約11cm,腎臟功能正常。安排腎臟超音波檢查後發現: 右 腎10.6 cm, 左腎8.6 cm,血液生化檢驗顯示:肌酸酐(Creatinine) 2.0 mg/dL。以下敘述,何者最正確?","options":{"A":"9成以上患者在理學檢查有腹部雜音(bruit)且檢查血鉀[K]通常會升高。","B":"如果腹部雜音偏側化或延伸到整個收縮期到舒張期,則它更有可能在血流動力學上具有顯著意義。","C":"用核磁共振血管攝影(MRA)影像檢查,如果發現renal artery stenosis,通常以fibromuscular dysplasia (FMD)型最常見。","D":"降壓劑中,以ACEI 或ARB類為首選用藥。","E":"高血壓的原因屬先天性異常,與血清膽固醇較無關係,無需使用HMG-CoA 還原酶抑制劑( statins )控 制膽固醇。"},"id":"110-合-65","roc_year":110,"source":"110合併PDF","topic":"高血壓/腎血管疾病","q_num":65,"src":"110合併卷"},{"num":66,"answer":"E","stem":"有關慢性間質性腎臟病常見之臨床表現,下列敘述何者正確(應選出所有答案) (1)范康尼氏症候群(Fanconi syndrome) (2)寡尿(Oliguria)與等張尿(isosthenuria)(3)貧血 (4)高陰離子間隙代謝性酸中毒合併低血 鉀 (5)腎病症候群","options":{"A":"(1)+(4)+(5)。","B":"(1)+(2)+(3)。","C":"(2)+(3)+(4)。","D":"(4)+(5)。","E":"(1)+(3)。"},"id":"110-合-66","roc_year":110,"source":"110合併PDF","topic":"腎小管間質與RTA","q_num":66,"src":"110合併卷"},{"num":67,"answer":"D","stem":"一名45 歲女性患有糖尿病,因明顯疲勞而就診。抽血檢查顯示:血清尿素氮 (BUN) 為 100 mg/dL,血清 肌酐酸為 2.5 mg/dL。 評估需要哪些初步處置?","options":{"A":"安排腎臟超音波及腎臟組織切片檢查。","B":"葡萄糖耐受試驗。","C":"轉介到運動復健中心鍛鍊。","D":"血紅素(Hb)及大便潛血檢查。","E":"限制病友蛋白攝取。"},"id":"110-合-67","roc_year":110,"source":"110合併PDF","topic":"慢性腎臟病/尿毒症","q_num":67,"src":"110合併卷"},{"num":68,"answer":"A","stem":"一名 23 歲的男性研究生,因一次無痛性明顯血尿由學校保健中心轉診到腎臟科門診。他身體健康,沒有 明顯的家族史。身體診察時血壓正常,無其他異常。追蹤實驗室檢查顯示生化及血液學正常、腎功能檢查 正常,以及尿培養陰性。血清免疫學檢測包括補體、抗核抗體(ANA)、抗中性粒細胞胞漿抗體(ANCA)和 肝炎檢測均呈陰性。尿液試紙檢查顯示:潛血(2+)和蛋白質(+),顯微鏡檢查中有少許型變RBC但並無RBC cast。他的腎臟超音波檢查是正常的。1 週後重複體檢和實驗室檢查顯示尿液潛血1+ 和紅血球細 胞5至8個紅細胞和微量尿蛋白,定量為 150 毫克/天。下列何者是最適當建議","options":{"A":"繼續追蹤觀察。","B":"腎臟組織切片檢查。","C":"對患者及其家屬進行基因檢測。","D":"開始類固醇經驗性治療。","E":"泌尿科轉診查明原因。"},"id":"110-合-68","roc_year":110,"source":"110合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":68,"src":"110合併卷"},{"num":69,"answer":"B","stem":"一名68歲患有腎病症候群女性(尿蛋白 3.5 g/天,腎功能正常,血清白蛋白 2.2 g/dL)最近經腎臟切片診 斷為膜性腎病變(membranous nephropathy)。血清PLA2R檢測和腎組織染色呈均為陰性。以下相關的 敘述何者「錯誤」:","options":{"A":"進一步調查應包括惡性腫瘤檢查。","B":"患者應開始交替使用環磷醯胺(cyclophosphamide)和類固醇。","C":"發生血栓事件的風險很大,出血風險低的患者可以考慮預防性抗凝劑。","D":"她應該接受B型肝炎篩查,已知B型肝炎與膜性腎病有關。","E":"如果經過 6 個月後其蛋白尿仍保持目前狀況,她的腎臟功能可能出現進行性腎病的風險。"},"id":"110-合-69","roc_year":110,"source":"110合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":69,"src":"110合併卷"},{"num":70,"answer":"B","stem":"腎前性氮血症(Prerenal azotemia)的診斷必須經由適當的病史詢問和理學檢查後確立, 下列尿液和血 清檢驗可用於幫助確認腎前性氮血症的診斷?","options":{"A":"尿素氮(BUN)與肌酸酐(creatinine)的比值大於 20。","B":"鈉排泄分率(fractional excretion of sodium,FeNa)小於 1%。","C":"尿液滲透壓(urine osmolality)大於500 (mOsm/kg H2O)。","D":"尿液鈉濃度大於 20 (mEq/L)。","E":"尿液比重大於1.020。"},"id":"110-合-70","roc_year":110,"source":"110合併PDF","topic":"急性腎損傷(AKI)","q_num":70,"src":"110合併卷"},{"num":71,"answer":"B","stem":"急性腎損傷後需要緊急透析是嚴重腎臟損傷的指標,患者的合併症和死亡率增加。關於急性腎損傷的透析 治療,下列敘述何者是正確的?","options":{"A":"應該需要高強度的透析頻率和時間,以便為患者提供最合適的體內恆定環境。","B":"急性腎損傷患者開始透析的主要原因包括酸中毒、高血鉀和全身體液過多。","C":"與間歇性血液透析相比,連續腎臟替代治療已被證明對患者有更好的結果。","D":"透析開始時的血清肌酐高低與急性腎損傷患者的預後負相關。","E":"敗血症(sepsis)患者早期開始透析可改善預後。"},"id":"110-合-71","roc_year":110,"source":"110合併PDF","topic":"透析與腎移植","q_num":71,"src":"110合併卷"},{"num":72,"answer":"E","stem":"有關腎小管腎絲球回饋(Tubuloglomerular Feedback,TGF)的敘述何者正確?","options":{"A":"腎小管腎絲球回饋是指遠側腎小管對尿液滲透壓的感覺信號對單個腎元單位腎絲球過濾 率(glomerular filtration rate,GFR)的回饋調節。","B":"糖尿病初期會造成出球小動脈壁中的顆粒細胞將腎素大量釋放到循環中。","C":"腎素分泌後,進一步活化腎素-血管收縮素系統(renin-angiotensin system,RAS)收縮入球小動 脈。","D":"緻密斑(macula densa)細胞,感知到大量鈉/氯離子時,代謝增加腺苷(Adenosine)含量,讓入 球小動脈舒張。","E":"糖尿病患者使用SGLT-2 抑制劑阻斷葡萄糖與鈉再吸收,會使入球小動脈收縮,從而使同一腎元單位 的腎小球過濾率減少。"},"id":"110-合-72","roc_year":110,"source":"110合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":72,"src":"110合併卷"},{"num":55,"answer":"D","stem":"血液透析病人的血管通路(AVF, arterio-venous fistula),透過例行檢視(physical examination)可以及早發 現阻塞或血流異常,及時處理。以下哪一種徵兆符合AVF 動脈端狹窄(inflow stenosis)與血流灌注不足? (1) increased pulsatility or water hammer pulse during systole (2) reduced pulsatility during systole (3) reduced softening and“empty” access during diastole (4) a high pitch, discontinuous bruit (5) weak thrill (6) Increased pulse intensity (augmentation) test","options":{"A":"(1) + (4) + (6)。","B":"(1) + (3) + (5)。","C":"(2) + (3) + (5) + (6)。","D":"(2) + (3) + (4) + (5)。","E":"(2) + (3) + (4) + (5) + (6)。"},"id":"111-合-55","roc_year":111,"source":"111合併PDF","topic":"透析與腎移植","q_num":55,"src":"111合併卷"},{"num":56,"answer":"C","stem":"一位60歲男性,腎功能正常。例行性超音波檢查無意間發現有良性前列腺肥大(BPH),兩側中 度hydronephrosis,兩側腎臟大小仍在正常範圍。醫師擬安排進一步檢查可能的病因,並希望能藉此項檢 查來選擇哪一側先做經皮腎臟造瘻(Percutaneous Nephrostomy, PCN) 來暫時緩解腎臟傷害。 以下何項 檢查最合適?","options":{"A":"high-resolution multidetector row computed tomography (CT) scan。","B":"retrograde urography。","C":"radionuclide renal scan with furosemide。","D":"Magnetic resonance urography。","E":"endoscopic voiding cystourethrography。"},"id":"111-合-56","roc_year":111,"source":"111合併PDF","topic":"感染/結石/阻塞","q_num":56,"src":"111合併卷"},{"num":57,"answer":"E","stem":"以下有關多囊腎(ADPKD)的敘述,何種組合是正確的? (1) 血壓建議以140/90 mmHg為目標,可降低心血管併發症,而若能進一步控制收縮壓達110 mmHg,可延緩腎功能惡化。 (2) 選擇脂溶性抗生素[如TMP-SMX, quinolones, chloramphenicol]對囊泡感染穿透性與療效較佳。 (3) 喝水量不建議過多(>2500 mL/day),以免促進囊泡生長。 (4) 抑制腎素-血管張力素系統(RAAS)可控制血壓與減緩腎功能惡化。 (5) tolvaptan(V2受體拮抗)可抑制囊泡細胞增生,建議早期使用預防囊泡生長與進展至尿毒症。","options":{"A":"(1) + (2) + (3) + (4) + (5)。","B":"(2) + (3) + (4) + (5)。","C":"(2) + (3) + (4)。","D":"(2) + (4) + (5)。","E":"(2) + (4)。"},"id":"111-合-57","roc_year":111,"source":"111合併PDF","topic":"囊性/遺傳性腎病","q_num":57,"src":"111合併卷"},{"num":58,"answer":"C","stem":"健檢發現無臨床症狀血尿(asymptomatic hematuria)病人, 2020年AUA guideline建議,依據危險等級程 度進行追蹤處置建議。 以下何種病人,建議應安排CT scan或cystoscopy 以排除泌尿道腫瘤(urological malignancy)的風險 ?","options":{"A":"< 50 歲女性,無抽菸病史。","B":"< 60歲男性,有抽菸病史。","C":"> 60 歲,不論男女,曾合併有gross hematuria病史。","D":"有dysmorphic RBC, cellular cast及proteinuria的病人。","E":"已經連續多年,每年健檢都是asymptomatic hematuria,腎臟超音波也未發現異常。"},"id":"111-合-58","roc_year":111,"source":"111合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":58,"src":"111合併卷"},{"num":60,"answer":"A","stem":"以下有關lupus nephritis的敘述,何者正確?","options":{"A":"Class IV lupus nephritis若是在renal biopsy時發現有crescent,應積極治療,避免進展至rapidly progressive glomerulonephritis(RPGN) 與renal fibrosis。","B":"有anti-phospholipid antibody陽性的病人,有較高機會發生thrombotic microangiopathy,應給 予anticoagulant可以有效預防lupus nephritis惡化。","C":"診斷為Class I, II的病人,應盡早給予moderate or high dose steroid以預防病情進展至Class IV or V 的lupus nephritis 與renal fibrosis。","D":"臨床預後與ANA level 及complement levels密切相關,宜定期追蹤ANA與C3, C4 levels,評估治療效 果。","E":"Class IV lupus nephritis病人,建議儘早使用rituximab or tacrolimus,可較傳統high dose steroid更 有效達到及維持renal remission。"},"id":"111-合-60","roc_year":111,"source":"111合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":60,"src":"111合併卷"},{"num":61,"answer":"A","stem":"有關asymptomatic bacteriuria(定義: voided urine specimen > 105 cfu/ml of an uropathogen isolated, absence of signs and symptoms of UTI),依據2019 IDSA (Infectious Diseases of America),一般是不 需要例行性篩檢與治療(screen and treatment)的,以免產生不必要的抗藥性。以下何種情況IDSA才建議 例行性篩檢與必要時的治療?","options":{"A":"pregnant woman。","B":"older patients with cognitive impairment, delirium。","C":"diabetes。","D":"kidney transplant patients。","E":"patients with spinal cord injury。"},"id":"111-合-61","roc_year":111,"source":"111合併PDF","topic":"感染/結石/阻塞","q_num":61,"src":"111合併卷"},{"num":62,"answer":"B","stem":"一位40歲男性,輕度高血壓(sBP 148 mmHg),serum creatinine 1.0 mg/dL, urine protein 0.6 g/24-Hr urine, renal biopsy為 IgA nephropathy, without advanced tubulointerstitial fibrosis, nor crescent formation. 醫師先給予 RAAS blocker, 持續追蹤6個月,再檢測實驗室數值為: serum creatinine 1.4 mg/dL, urine protein 1.3 g/24-Hr urine, sBP 120 mmHg. 請問: 以下處置,何者最適宜?","options":{"A":"intravenous methylprednisolone (500-1000 mg/day, for 3 days) followed by oral azathioprine for declining renal function。","B":"add on oral steroid 0.4 mg/kg/day。","C":"add on fish oil。","D":"arrange tonsillectomy + add on fish oil。","E":"hold RAAS blocker, shift to SGLT2i (sodium glucose cotransporter 2 inhibitor)。"},"id":"111-合-62","roc_year":111,"source":"111合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":62,"src":"111合併卷"},{"num":63,"answer":"D","stem":"一位56歲男性,15個月前有lung cancer, liver metastasis, 經cisplatin 治療,曾發生AKI (acute kidney injury,最高serum creatinine 4.6 mg/dL)。本次因疲憊無力被送至急診。血壓 150/88 mmHg,實驗室數 據如下: albumin 3.2 g/dL, creatinine 2.5 mg/dL, Na 145 mEq/L, K 2.0 mEq/L, Cl 84 mEq/L, ABG (pH 7.48, paCO2 60, PaO2 97, HCO3− 40, BE 10.5),plasma osmolality 298 mOsm/kg, urine data (osmolality 388 mOsm/kg, Na 35 mEq/L, K 26 mEq/L)。進一步檢查plasma renin activity (PRA) 與plasma aldosterone concentration (PAC)都在正常範圍。 以下敘述何者正確。","options":{"A":"病人發生metabolic alkalosis with adequate respiratory compensation。","B":"病人發生mixed type acid-base disorder, metabolic alkalosis with respiratory alkalosis。","C":"符合 Bartter-Gitelman syndrome 的診斷。","D":"Ectopic ACTH: Cushing syndrome可以有如上的表現。","E":"病人的TTKG (對照當時serum [K] 2.0 mEq/L)仍屬適當,判定非renal loss。"},"id":"111-合-63","roc_year":111,"source":"111合併PDF","topic":"酸鹼平衡異常","q_num":63,"src":"111合併卷"},{"num":64,"answer":"A","stem":"有關早期偵測急性腎損傷發生的生物標誌物,下列何者為非?","options":{"A":"血尿素氮(BUN)。","B":"白細胞介素-18 (IL-18)。","C":"腎損傷分子-1 (KIM-1)。","D":"中性粒細胞明膠酶相關載脂蛋白 (NGAL)。","E":"肝臟型脂肪酸結合蛋白(L-FABP)。"},"id":"111-合-64","roc_year":111,"source":"111合併PDF","topic":"急性腎損傷(AKI)","q_num":64,"src":"111合併卷"},{"num":65,"answer":"A","stem":"慢性腎病患者死亡的主要原因是什麼?","options":{"A":"心血管疾病。","B":"高鉀血症。","C":"感染。","D":"惡性腫瘤。","E":"尿毒症。"},"id":"111-合-65","roc_year":111,"source":"111合併PDF","topic":"慢性腎臟病/尿毒症","q_num":65,"src":"111合併卷"},{"num":66,"answer":"E","stem":"一名患有末期腎病的 27 歲女性正在接受血液透析,在治療期間被發現出現低血壓。 有關血液透析期間低 血壓,下列潛在機制何者為非?","options":{"A":"降壓藥。","B":"過度超濾脫水。","C":"自律神經反應受損。","D":"滲透壓變化。","E":"動靜脈廔管血流較大。"},"id":"111-合-66","roc_year":111,"source":"111合併PDF","topic":"透析與腎移植","q_num":66,"src":"111合併卷"},{"num":68,"answer":"E","stem":"一名35 歲女性患有高血壓慢性腎臟病患者,進展為末期腎病變。 並於 1 年前開始進行腹膜透析,尿毒症 症狀獲得明顯改善。 近日,因發燒、精神狀態改變、瀰漫性腹痛和透析液混濁被送往急診室。 她的腹膜 透析液實驗室分析顯示: 白血球細胞計數為 125/μL,含有 85% 的多形核中性顆粒白血球細胞。 腹膜液 培養中最有可能發現哪種微生物?","options":{"A":"白色念珠菌(Candida albicans)。","B":"奇異變形桿菌(Proteus mirabilis)。","C":"結核分枝桿菌 (Mycobacterium tuberculosis)。","D":"綠膿單胞桿菌(Pseudomonas aeruginosa)。","E":"金黃色葡萄球菌 (Staphylococcus aureus)。"},"id":"111-合-68","roc_year":111,"source":"111合併PDF","topic":"慢性腎臟病/尿毒症","q_num":68,"src":"111合併卷"},{"num":69,"answer":"B","stem":"以下哪些急性腎損傷患者在腎臟超音波檢查中最有可能有『雙側』腎積水的證據?","options":{"A":"一名 22 歲男性患有猛暴性紫斑症合併淋球菌敗血症。","B":"一名 42 歲的女性,因晚期子宮頸癌正在接受化療和放療。","C":"一名48 歲男性,因高血壓而患有慢性腎臟病,接受接受含碘顯影劑注射的腹部血管造影。","D":"一名 56 歲男性患有大腸桿菌 0157:H7 相關溶血性尿毒症。","E":"一名85 歲住在安養中心女性,因腎盂腎炎和敗血症的患者。"},"id":"111-合-69","roc_year":111,"source":"111合併PDF","topic":"急性腎損傷(AKI)","q_num":69,"src":"111合併卷"},{"num":70,"answer":"E","stem":"一名 28 歲的女性在一次血尿後,被診斷為常染色體顯性多囊腎病(autosomal dominant polycystic kidney disease,ADPCKD),她擔心顱內動脈瘤的風險。 關於這種風險,下列哪項陳述是正確的?","options":{"A":"顱內動脈瘤破裂家族史不會增加破裂風險。","B":"既往顱內出血不會增加隨後出血的風險。","C":"動脈瘤的大小與其自發破裂的風險無關。","D":"有多囊腎病人,顱內動脈瘤的風險不會增加。","E":"不受控制的高血壓會增加自發破裂的風險。"},"id":"111-合-70","roc_year":111,"source":"111合併PDF","topic":"囊性/遺傳性腎病","q_num":70,"src":"111合併卷"},{"num":71,"answer":"B","stem":"一名 48歲的肥胖女性,有 5 年的輕度高血壓病史,使用鈣離子通道阻斷劑(Calcium-channel Blockers)控 制,在她每年的健康檢查時,尿試紙上顯示有蛋白尿。體格檢查顯示身高 167.6 公分,體重 91 公斤,血 壓 130/80 毫米汞柱,頸靜脈壓升高,第四心音和微量足部水腫。實驗室數值如下: • 血清肌酐:0.9mg/dL; eGFR:79 毫升/分鐘 • BUN:18 毫克/分升 • 尿液分析:pH 5.0;比重1.018;蛋白質 3+; 沒有葡萄糖;透明圓柱體(Hyaline cast) • 尿液 PCR(protein-creatinine ratio):5.9 g/g 腎臟切片結果顯示 60% 的腎絲球,在光學顯微鏡下有節段性瘢痕,其餘的腎小球看起來沒有明顯變 化(圖1)。最可能的診斷是什麼?","options":{"A":"高血壓性腎硬化。","B":"局部節結性腎絲球硬化症。","C":"微小性腎病變。","D":"膜性腎病變。","E":"新月型腎絲球腎炎。"},"id":"111-合-71","roc_year":111,"source":"111合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":71,"src":"111合併卷"},{"num":72,"answer":"E","stem":"以下所有關於在慢性腎病患者中使用外源性促紅血球生成素是正確陳述:(1).外源性促紅血球生成素應以 10-11.5 g/dL 的目標血紅蛋白濃度給藥。(2).使用外源性促紅血球生成素與改善心血管預後相關。(3).使用 外源性促紅血球生成素與合併 2 型糖尿病患者增加腦中風險有關。(4).HIF加強劑,hypoxia-inducible factors enhancer,可能成為一個口服的外源性促紅血球生成素。(5).使用外源性促紅血球生成素與血栓栓 塞事件的發生率增加有關。","options":{"A":"(1)+ (2)+ (3)+ (4)。","B":"(2)+ (3)+ (4)+ (5)。","C":"(1)+ (2)+ (4)+ (5)。","D":"(1)+ (2)+ (3)+ (5)。","E":"(1)+ (3)+ (4)+ (5)。"},"id":"111-合-72","roc_year":111,"source":"111合併PDF","topic":"慢性腎臟病/尿毒症","q_num":72,"src":"111合併卷"},{"num":56,"answer":"B","stem":"慢性腎臟病(chronic kidney disease, CKD)病人的治療,以下敘述何者錯誤?","options":{"A":"合併有高血壓、糖尿病與蛋白尿的病人,宜優先使用ACEi or ARB, 以降低glomerular hyperfiltration,減少蛋白尿,預防CKD 惡化。","B":"ACEi or ARB單獨使用皆可藉由afferent arteriole vasoconstriction,而降低glomerular hyperfiltration,減少蛋白尿。","C":"目前的臨床指引,不建議ACEi 和 ARB合併使用,這是因為ACEi 和 ARB合併使用,未必更能有效預 防CKD 惡化,卻可能會增加高血鉀(hyperkalemia)的風險。","D":"non-steroidal MRA (mineralocorticoid receptor antagonists) 對CKD的治療,目前實證上以 type 2 diabetes的CKD病人族群為主。","E":"SGLT2 (sodium glucose co-transport 2) inhibitors 可抑制近端腎小管的Na吸收,及藉 由tubuloglomerular feedback 調控afferent arteriole vasoconstriction,而減少glomerular hyperfiltration,降低蛋白尿,預防CKD 惡化。"},"id":"112-合-56","roc_year":112,"source":"112合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":56,"src":"112合併卷"},{"num":58,"answer":"B","stem":"診斷急性腎損傷(acute kidney injury),以下對於prerenal azotemia的描述,何者最不符合?","options":{"A":"urine osmolality > 500 mOsm/kg。","B":"尿液鏡檢 brown granular cast, WBC casts。","C":"FEurea < 35%。","D":"FENa < 1%。","E":"recent use of diuretics。"},"id":"112-合-58","roc_year":112,"source":"112合併PDF","topic":"急性腎損傷(AKI)","q_num":58,"src":"112合併卷"},{"num":59,"answer":"B","stem":"一位26歲女性,被診斷SLE約3年,平時有使用prednisolone 10 mg/dL維持SLE病情穩定,一直以來腎功 能皆正常,urine protein-creatinine ratio (UPCR)大約在350-500 mg/g。最近在確診COVID-19兩個月以 來,出現雙下肢水腫,體重增加約5公斤。身體與實驗室檢查: BP 162/112 mmHg,Hb 8.2 g/dL,WBC 12,000/mm3,albumin 2.4 g/dL, BUN 45 mg/dL, creatinine 2.2 mg/dL, UPCR增加為 5850 mg/g。 以下有關病人的敘述,何者正確?","options":{"A":"檢測 ANCA (ant-ineutrophil cytoplasmic antibody)應該會呈現陽性。","B":"檢測 ANA (anti-nuclear antibody)及anti-dsDNA antibody應該皆會呈現陽性。","C":"此時常伴隨有補體降低(hypocomplementemia)及冷凝球蛋白血症(Cryoglobulinemia)。","D":"如果做renal biopsy,最可能是出現focal proliferative glomerulonephritis或是membranous glomerulonephritis。","E":"病人的貧血與白血球增加,可能皆是因為長期使用prednisolone所致。"},"id":"112-合-59","roc_year":112,"source":"112合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":59,"src":"112合併卷"},{"num":60,"answer":"A","stem":"一位32歲女性,過去無腎臟病史。一個月前,公司例行健康檢查發現:尿液中有潛血反應,被轉來門診就 醫。妳(你)重新安排檢查,結果為: 腎功能正常。Urinalysis: specific gravity 1.036, protein (-), occult blood (1+), glucose (-), RBC 0-2 /HFP, RBC cast (-), dysmorphic RBC (-), WBC cast (+)。依照目前的臨 床指引,你(妳)會建議以下哪一種處置?","options":{"A":"可能是UTI,6個月後再安排一次urinalysis。","B":"urine cytology (做2-3套)。","C":"採醫病共享決策(SDM, shared-decision making)模式,討論是否接受renal biopsy。","D":"安排 renal image study (如: renal ultrasound or CT)。","E":"進一步檢測 urine albumin-creatinine-ratio (UACR)。"},"id":"112-合-60","roc_year":112,"source":"112合併PDF","topic":"慢性腎臟病/尿毒症","q_num":60,"src":"112合併卷"},{"num":61,"answer":"A","stem":"尿毒症 (uremic syndrome)除了urea造成病人倦怠、噁心嘔吐等不適,尚會造成身體內分泌異常與下列的 賀爾蒙不足。以下哪種賀爾蒙反而是因堆積而增加,可能因此增加病人的心血管風險?","options":{"A":"prolactin。","B":"testosterone。","C":"1, 25 vitamin D3。","D":"estrogen。","E":"erythropoietin。"},"id":"112-合-61","roc_year":112,"source":"112合併PDF","topic":"慢性腎臟病/尿毒症","q_num":61,"src":"112合併卷"},{"num":62,"answer":"B","stem":"一位small cell lung cancer合併adrenal gland metastasis-related Cushing syndrome,接受 cisplatin等化學 治療的病人,因為低血鉀而照會你(妳)。病人的檢查數值: albumin 2.9 g/dL, BUN 40 mg/dL, creatinine 2.6 mg/dL, Na 146 mEq/L, K 1.9 mEq/L, Cl 89 mEq/L, Mg 1.7 mg/dL, plasma-osmolality 300 mOsm/kg。arterial blood gas(cannula, 4 L O2): pH 7.48, PaO2 91 mmHg, PaCO2 58 mmHg, HCO3 40 mEq/L。urine data: Na 34 mEq/L, K 22 mEq/L, Cl 46 mEq/L, urine-osmolality 320 mOsm/kg以下哪些臨 床判讀與敘述是合理的? (1) 低血鉀,可能與Cushing syndrome有關 (2) 如果計算TTKG,應該可排除腎 鉀流失是該病人hypokalemia的主因 (3) 治療上,同時矯正hypomagnesemia,也有助於矯 正hypokalemia (4) ABG 的解讀應是metabolic alkalosis , respiratory adequate compensation (5) ABG 的解讀應是mixed type (metabolic alkalosis + respiratory acidosis)","options":{"A":"(1)+(3)+(4)。","B":"(1)+(3)+(5)。","C":"(2)+(3)+(4)。","D":"(2)+(3)+(5)。","E":"(2)+(5)。"},"id":"112-合-62","roc_year":112,"source":"112合併PDF","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":62,"src":"112合併卷"},{"num":63,"answer":"C","stem":"一位68歲女性因腳踝漸漸水腫惡化而就醫。他表示最近感到非常疲倦。過去3個月中,她體重增加了5公 斤。她每天抽一包香菸已經有30年。她的脈搏為每分鐘75次,血壓為150/94毫米汞柱。檢查發現下肢 有3+凹陷性水腫。神經檢查顯示手指和腳趾震動感受性減弱。實驗室檢查顯示糖化血色素濃度 為8.1%,血清肌酸酐濃度為2.1 mg/dL。排尿時可觀察到明顯液泡沫尿。對腎臟的切片組織樣本最可能顯 示以下哪種情況?","options":{"A":"間質炎症。","B":"毛細血管圍繞環狀彎曲。","C":"結節性腎小球硬化。","D":"免疫複合物沉積。","E":"腎小球基底膜分裂。"},"id":"112-合-63","roc_year":112,"source":"112合併PDF","topic":"腎小管間質與RTA","q_num":63,"src":"112合併卷"},{"num":65,"answer":"C","stem":"ㄧ位75歲的男性因為持續七天的噁心和嘔吐而前往門診治療。過去兩天,他也感到虛弱和疲倦。坐了一段 時間後站起來時,他感到頭暈。他說他比平常更頻繁地去廁所,每次排尿都是「相當多」。他沒有腹 瀉。他有高血壓,過去六個月一直在服用Thiazide類利尿劑。他每天喝9杯水並定時服藥。他身高168公 分,體重90公斤;BMI為32 kg/m2。體溫為36.5°C,脈搏為每分鐘92次,血壓為106/54毫米汞柱。理學 檢查顯示:舌頭變白。用手指捏取手背上的皮膚,皮膚在5秒後會恢復原狀。在精神狀態檢查中,他的說 話速度減慢,對人物、地點和時間有定向感。實驗室檢驗顯示:血清 Na+ 152 mEq/L; Cl− 98 mEq/L; K+ 3.5 mEq/L; HCO3−30 mEq/L; Osmolality 356 mOsmol/kg H2O; HbA1C 10.6%; 尿液Osmolality 410 mOsmol/kg H2O以下哪個解釋最有可能解釋這些發現?","options":{"A":"抗利尿激素產生不足。","B":"利尿劑過量。","C":"滲透性利尿。","D":"腸胃液流失。","E":"過量水分攝取。"},"id":"112-合-65","roc_year":112,"source":"112合併PDF","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":65,"src":"112合併卷"},{"num":67,"answer":"D","stem":"這位55歲的女性患有第二型糖尿病但控制不良,因為有嚴重疼痛和水泡性皮疹的症狀,來到急診。皮疹從 右額頭開始,接下來的兩天擴散到胸部、背部和雙側上肢。她被診斷為散在性皮膚帶狀疱疹,並因此住院 接受抗病毒治療。入院前,她唯一使用的藥物是胰島素。住院第二天,她開始出現雙側間歇性的腰痛和噁 心。她的體溫為36.7°C,脈搏為每分鐘80次,血壓為128/76毫米汞柱。檢查顯示額頭、胸部和四肢的皮 疹正在癒合,沒有新的水泡出現。她的血清尿素氮為33 mg/dL,血清肌酸酐為3.5 mg/dL。入院時,她的 血清尿素氮為18 mg/dL,血清肌酸酐為1.1 mg/dL。下列哪個是導致這位患者實驗室結果異常的最可能原 因?","options":{"A":"葡萄糖化腎小球基底膜。","B":"輸尿管腎盂交界阻塞。","C":"腎乳頭凝固性壞死。","D":"腎小管阻塞。","E":"供應入球小動脈收縮。"},"id":"112-合-67","roc_year":112,"source":"112合併PDF","topic":"感染/結石/阻塞","q_num":67,"src":"112合併卷"},{"num":68,"answer":"C","stem":"一位50歲的女性前來接受醫生的追蹤檢查。兩週前,由於血壓持續升高,她的抗高血壓藥物中增加處 方irbesartan。在上一次就診時,她的完整血液計數和腎功能測試都在參考範圍內。在過去一個月中,她 一直感到疲倦並頻繁頭痛。她患有高血壓、第2型糖尿病、多囊卵巢綜合症和高脂血症。她的母親患有甲 狀腺亢進和高血壓。目前正在使用的藥物包括amlodipine, hydrochlorothiazide, irbesartan, metformin, glimepiride及atorvastatin。她從未吸煙,每晚晚餐時飲用一到兩杯紅酒。她身高167公分,體重82公 斤;BMI為30 kg/m2。她的脈搏為每分鐘90次,呼吸為每分鐘12次,兩臂的血壓為170/110毫米汞柱。身 體檢查未顯示異常。實驗室檢查結果如下: Hb:14 g/dL;WBC:7,800/mm3 。血清: Na+:139 mEq/L;K+:3.2 mEq/L; Cl−:100 mEq/L; 肌酸酐:2.1 mg/dL; 尿素氮:44 mg/dL; TSH:3 μU/mL。 尿液: 潛血:陰性; 蛋白質:陰性; 葡萄糖:1+。以下哪個是最有可能的診斷?","options":{"A":"阻塞性睡眠呼吸中止症候群。","B":"甲狀腺亢進。","C":"腎動脈狹窄。","D":"多囊腎。","E":"糖尿病腎病症候群。"},"id":"112-合-68","roc_year":112,"source":"112合併PDF","topic":"高血壓/腎血管疾病","q_num":68,"src":"112合併卷"},{"num":69,"answer":"E","stem":"66歲的男性因疲倦和下肢腫脹已兩週而來就醫。在過去的6個月中,他體重減輕了3.8公斤。他患有慢性支 氣管炎,需要使用albuterol吸入劑。他每天抽一包香煙已經持續近50年,並且每天飲烈酒一杯。他的體溫 為37°C,脈搏為88次/分,血壓為120/75 mm Hg。他看起來很瘦。理學檢查發現兩側的脛骨前水腫 達2+級。心肺檢查未見異常。實驗室檢查結果如下:血色素 11.2 g/dL;白細胞計數 8500/mm3 血小板計 數 130,000/mm3。血清檢驗顯示:尿素氮 23 mg/dL;葡萄糖 77 mg/dL;肌酸酐 1.6 mg/dL;白蛋白 1.8 mg/dL;總膽固醇 475 mg/dL。尿液檢驗顯示:潛血 :陰性;葡萄糖 陰性, 蛋白質 4+; 白血球 0–1/HPF, Fatty casts 多量. 胸部X光顯示右上葉密度增加。胸部CT顯示一個2.5 x 3.5 x 2公分的右上葉腫塊。 以下哪種診斷最有可能?","options":{"A":"局部結節性腎小球硬化症 (Focal segmental glomerulosclerosis)。","B":"IgA腎病 (IgA nephropathy)。","C":"膜增生性腎小球腎炎 (Membranoproliferative glomerulonephritis)。","D":"快速進展性腎小球腎炎 (Rapidly progressive glomerulonephritis)。","E":"膜性腎病 (Membranous nephropathy)。"},"id":"112-合-69","roc_year":112,"source":"112合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":69,"src":"112合併卷"},{"num":70,"answer":"C","stem":"一名55歲男性因為腹痙攣、左側腰痛、噁心和排尿頻繁來到急診。他沒有嚴重疾病的病史,也不服用任何 藥物。他每天飲用2-3杯酒精飲料。他的體溫為37.2°C,脈搏為107次/分,血壓為145/80 mmHg。。腹 部X光顯示沒有異常。腹部超聲顯示左側尿管末端有一顆4毫米的結石,左腎盂有散布的小結石。尿液分 析顯示有紅血球和菱形結晶,但沒有白血球。給予疼痛藥和靜脈輸液。除了足夠的水合作用外,以下哪種 治療對這位患者最有益處?","options":{"A":"Probenecid。","B":"維生素C (Vitamin C)。","C":"檸檬酸鉀 (Potassium citrate)。","D":"Hydrochlorothiazide。","E":"蔓越莓汁。"},"id":"112-合-70","roc_year":112,"source":"112合併PDF","topic":"感染/結石/阻塞","q_num":70,"src":"112合併卷"},{"num":71,"answer":"B","stem":"具有Sjögren症候群病史的患者出現以下實驗室結果:血清鈉:139 mEq/L;氯115 mEq/L;碳酸氫根離 子15 mEq/L;鉀3.0 mEq/L。尿液檢查顯示pH值為6.0,鈉35 mEq/L,鉀20 mEq/L,氯42 mEq/L。最可 能的診斷是什麼?","options":{"A":"Chronic diarrhea。","B":"Type I renal tubular acidosis (RTA)。","C":"Type II RTA。","D":"Type III RTA。","E":"Type IV RTA。"},"id":"112-合-71","roc_year":112,"source":"112合併PDF","topic":"腎小管間質與RTA","q_num":71,"src":"112合併卷"},{"num":72,"answer":"B","stem":"目前,透析的「劑量」是以下列哪一項定義?","options":{"A":"透析液的逆向流速率 (counter-current flow rate)。","B":"尿素的清除分率 (fractional urea clearance)。","C":"透析每週的小時數。","D":"實際完成的透析次數每月多少次。","E":"肌酐酸下降的比率(creatine reduction rate)。"},"id":"112-合-72","roc_year":112,"source":"112合併PDF","topic":"透析與腎移植","q_num":72,"src":"112合併卷"},{"num":55,"answer":"B","stem":"一位47歲男性,過去有hypertension, microscopic hematuria病史,但未規則就醫。此次因高血壓(BP 205/129 mmHg)、頭痛、茶色尿(tea-color urine)來診,身體檢查無神經學異常、無下肢水腫。實驗室檢 查: Hb 8.5 g/dL, platelet count 52,000/μL, peripheral blood smear 2% schistocytes, BUN 106 mg/dL, serum creatinine 10.2 mg/dL, urinalysis protein (2+), O.B. (3+). 另外: AST, ALT, C3, C4, ADAMTS-13 activity 皆在正常範圍。有關本病人的診斷與治療,以下敘述何者最正確?","options":{"A":"病人可能發生血栓性血小板減少性紫斑症(Thrombotic Thrombocytopenic Purpura, TTP)。","B":"症狀可能導因於 endothelial damage and complement activation。","C":"使用血漿置換/輸注治療 (plasma exchange or infusion)可以有效恢復腎功能與降低死亡率。","D":"最主要治療是:盡快使用支持性透析療法(dialysis) 及有效降低血壓,腎衰竭與貧血症狀在兩周內可自 然緩解。","E":"單株抗體藥物如: eculizumab 或ravulizumab的效果與血漿置換/輸注治療相似,且有增加感染的風 險,不建議作為優先使用。"},"id":"113-合-55","roc_year":113,"source":"113合併PDF","topic":"透析與腎移植","q_num":55,"src":"113合併卷"},{"num":58,"answer":"B","stem":"一位54歲女性,因為高血鈣,腎功能異常,經轉診門診就醫。病人無糖尿病、貧血或關節痛、骨折等病 史。身體檢查:血壓136/78 mmHg, 無肝脾或淋巴腫大、也無下肢水腫。實驗室檢查: serum creatinine 3.2 mg/dL,Calcium 14.0 mg/dL,Hb 10.8 g/dL,腎臟超音波有腎結石與腎鈣化症( nephrocalcinosis )。 以下診斷與處置的敘述,何者正確? (1) 檢查chest x-ray, urine calcium excretion。 (2) 檢查skull x-ray, urine protein electrophoresis。 (3) 抽血檢測抗嗜中性球細胞質抗體, ANCA(Anti-Neutrophil Cytoplasmic Ab),補體, complement levels, 尤其是C3,C4。 (4) 針對腎功能異常,需要適量intravascular (IV) saline hydration。 (5) 針對腎功能異常,盡早考慮plasma exchange or infusion。","options":{"A":"(1)+(3)+(5)。","B":"(1)+(4)。","C":"(2)+(3)+(5)。","D":"(2)+(4)。","E":"(2)+(5)。"},"id":"113-合-58","roc_year":113,"source":"113合併PDF","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":58,"src":"113合併卷"},{"num":59,"answer":"B","stem":"肥胖相關腎臟病(obesity-related kidney disease or fatty kidney),以下治療被認為在該類病人,可以減少 蛋白尿或有利於相關腎臟病的預後,何者除外?","options":{"A":"GLP-1 RAs (Glucagon-like peptide 1 receptor agonist), 如: semaglutide。","B":"anti-obesity drugs (如:orlistat, bupropion-naltrexone)。","C":"外科減重手術 (Bariatric surgery)。","D":"Lifestyle interventions (hypocaloric diet and/or exercise)。","E":"Renin-angiotensin-aldosterone system blockers。"},"id":"113-合-59","roc_year":113,"source":"113合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":59,"src":"113合併卷"},{"num":60,"answer":"A","stem":"一位58歲男性,過去病史有C型肝炎,高血壓,沒有糖尿病。1個月前確診Covid-19,之後雖然呼吸道症 狀緩解,但出現蛋白尿(urine protein/creatinine ratio 3800 mg/g)與urine O.B. (2+),雙下肢足踝與脛前水 腫。實驗室檢查: Hb 9.8 g/dL, serum creatinine 2.1 mg/dL, 血清補體(C3, C4)皆低於正常 值,ANA與anti-GBM antibody皆無陽性。病人接受腎臟病理檢查,最可能的診斷為?","options":{"A":"HCV-related glomerulonephritis。","B":"IgA nephropathy。","C":"Pauci- immune glomerulonephritis。","D":"Membranous nephropathy and nephrotic syndrome。","E":"Renal amyloidosis。"},"id":"113-合-60","roc_year":113,"source":"113合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":60,"src":"113合併卷"},{"num":61,"answer":"A","stem":"一位62歲男性,過去病史有糖尿病,因發燒(37.8-38.4 0C)一週,陸續出現食慾不振、倦怠與尿量變少來 診。身體檢查:BP 130/80 mmHg,有肝脾腫脹、輕度黃疸,daily urine 約800 ml/day。皮膚上可 見petechiae, ecchymosis, iv lock處會有滲血情形。實驗室檢查: AST/ALT 190/78 U/L, bilirubin total/direct 6.4/3.8 mg/dL, eGFR 14 ml/min。醫師除了做相關影像檢查,感染症培養之外,您會建議採取以下何種治 療?","options":{"A":"給予Penicillin or Doxycycline。","B":"給予Renin-angiotensin-aldosterone system blockers for renoprotection。","C":"給予High dose steroid pulse therapy for acute glomerulonephritis。","D":"給予aggressive fluid and electrolyte resuscitation for pre-renal acute kidney injury。","E":"安排plasma exchange or plasma infusion。"},"id":"113-合-61","roc_year":113,"source":"113合併PDF","topic":"急性腎損傷(AKI)","q_num":61,"src":"113合併卷"},{"num":62,"answer":"B","stem":"一位38歲女性,腦下垂體腫瘤手術後24小時內,尿量近4000ml,血鈉[Na]自手術前的138 mEq/L上升為150 mEq/L。根據紀錄,病人手術前並無特意增加水分輸注,本身無糖尿病等慢性病史。實驗室檢查: urine osmolality 92 mOsm/kg H₂O, urine Na 30 mEq/L。以下處置,何者最適當?","options":{"A":"安排water deprivation test,追蹤plasma AVP or circulating copeptin level, 與血鈉[Na]變化。","B":"給予desmopressin (dDAVP)。","C":"給予tolvaptan。","D":"給予lactated ringer solution或0.9% saline補充體液容積。","E":"給予thiazides, amiloride, and NSAID,搭配water (without electrolytes) intake。"},"id":"113-合-62","roc_year":113,"source":"113合併PDF","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":62,"src":"113合併卷"},{"num":63,"answer":"A","stem":"一位84歲男性,過去除高血壓、前列腺肥大,定期服用amlodipine, tamsulosin之外,身體狀況良好。在某次例行檢查中發現血鈉[Na] 127 mEq/L,病人意識清楚,四肢無水腫。飲食正常也未刻意限制鹽分攝取。門診再次實驗室檢查: [Na] 128 mEq/L, creatinine 0.84 mg/dL, plasma osmolality 262 mOsm/kg H₂O, urine Na 88 mEq/L, urine osmolality 620 mOsm/kg H₂O, 安排CT檢查(brain, chest, abdomen/pelvis)無異常發現。針對病人的hyponatremia,您會建議採取以下何種診斷或治療處置?","options":{"A":"檢查adrenal function (ACTH, cortisol), thyroid function test (T3, T4, TSH),若無異常,則持續觀察 追蹤。","B":"建議fluid restriction (約1000 mL/day)。","C":"建議增加食鹽攝取。","D":"給予low dose furosemide or SGLT2 inhibitor 排除多餘水分。","E":"建議3% saline,追蹤血鈉[Na]變化,以提升不超過10 mEq/L為上限目標。"},"id":"113-合-63","roc_year":113,"source":"113合併PDF","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":63,"src":"113合併卷"},{"num":64,"answer":"A","stem":"臨床上經常會忽略鎂(Mg)離子異常。以下臨床情境,有時會與hypomagnesemia有關,如果配合適當的補 充Magnesium,有助於治療或預防合併症產生,何者除外?","options":{"A":"CKD (chronic kidney disease) with concomitant hypocalcemia and hypophosphatemia。","B":"torsades-de-points。","C":"acute, life-threatening asthma exacerbation。","D":"preeclampsia or eclampsia in pregnant hypertensive female。","E":"refractory hypokalemia。"},"id":"113-合-64","roc_year":113,"source":"113合併PDF","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":64,"src":"113合併卷"},{"num":65,"answer":"C","stem":"一位29歲女性因有2天間歇性深色尿液和輕微腰痛的病史來診。她在過去5天中還有咳嗽、喉嚨痛和流鼻 涕。她沒有排尿疼痛。她沒有服用藥物,也沒有已知的過敏。她的體溫為37.0°C。背部檢查顯示無肋脊角 壓痛。腎臟和膀胱的超聲波檢查無異常。實驗室檢查結果如下: 血紅素:10.4 g/dL;白血球 數:8000/mm3;血小板數:200,000/mm3;血清鈉:136 mEq/L;鉀:4.9 mEq/L;氯:101 mEq/L;碳 酸氫鹽:22 mEq/L;尿素氮:18 mg/dL;肌酸酐:1.1 mg/dL;尿液顏色:黃色;潛血:3+;蛋 白:1+;白血球酯酶:陰性。下列哪一項最可能是此患者症狀的原因?","options":{"A":"腎間質性腎炎。","B":"尿路上皮腫瘤。","C":"腎絲球損傷。","D":"腎動脈狹窄。","E":"腎盂結石。"},"id":"113-合-65","roc_year":113,"source":"113合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":65,"src":"113合併卷"},{"num":66,"answer":"C","stem":"在一位有第2型糖尿病有明顯蛋白尿的患者中,區分單純性糖尿病腎臟病變與非糖尿病性腎絲球病變,下 列哪一項最沒有診斷價值?","options":{"A":"被診斷糖尿病的時間長短。","B":"有增殖性視網膜病變。","C":"蛋白尿的嚴重程度。","D":"有腎絲球性血尿。","E":"尿液出現紅血球圓柱體。"},"id":"113-合-66","roc_year":113,"source":"113合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":66,"src":"113合併卷"},{"num":67,"answer":"A","stem":"一位最近被診斷為原發性膜性腎病(Membranous nephropathy,簡稱MN)、腎功能正常且有腎病症候 群(Nephrotic syndrome,簡稱NS)的患者,下列哪一項血清學及免疫組織學發現可以預測此病患很可 能自發性緩解?","options":{"A":"血清抗PLA2R抗體陰性且腎小球中PLA2R1抗原陽性。","B":"血清抗PLA2R抗體陰性且腎小球中PLA2R1抗原陰性。","C":"血清抗PLA2R抗體陽性且腎小球中PLA2R1抗原陽性。","D":"血清抗PLA2R抗體陽性且腎小球中PLA2R1抗原陰性。","E":"與抗PLA2R抗體檢出無關。"},"id":"113-合-67","roc_year":113,"source":"113合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":67,"src":"113合併卷"},{"num":68,"answer":"D","stem":"一位72歲男性因C型肝炎相關肝硬化併發腹水及2級食道靜脈曲張入院,目的是處理日益增加的腹水及水 腫,對漸增劑量的furosemide and spironolactone治療無效。腹腔穿刺顯示沒有自發性細菌性腹膜炎的證 據。接受靜脈注射利尿劑治療後,出現急性腎損傷(AKI),血清肌酸酐(SCr)從入院時的0.8 mg/dl上 升到3天後的1.8 mg/dl。在停用利尿劑並給予每日白蛋白1 g/kg靜脈注射治療後,腎功能持續惡化,並在 接下來的2天內出現少尿。理學檢查顯示:血壓100/65 mmHg,有明顯的腹水和2級下肢水腫。實驗室檢 查顯示:SCr 3.4 mg/dl,血清白蛋白2.6 g/dl,膽紅素4.5 mg/dl。鈉的排除分率(FENa)為0.05%。尿檢 顯示無蛋白,尿沉渣顯示腎小管型圓柱體。腹部超聲顯示中等程度的腹水,腎臟大小和回聲均正常,無腎 積水。最可能的診斷是下列哪一項?","options":{"A":"腹腔室隔症候群 (abdominal compartment syndrome)。","B":"急性腎小管壞死 (acute tubular necrosis)。","C":"腎前性氮血症 (prerenal azotemia)。","D":"肝腎症候群 (hepatorenal syndrome)。","E":"快速進行性腎絲球體腎炎( rapidly progressive glomerulonephritis)。"},"id":"113-合-68","roc_year":113,"source":"113合併PDF","topic":"急性腎損傷(AKI)","q_num":68,"src":"113合併卷"},{"num":69,"answer":"C","stem":"一名63歲男性在進行冠狀動脈繞道術(coronary artery bypass graft, CABG)和二尖瓣置換手術後2天出現 急性腎損傷(AKI)。在過去12小時內尿量減少至250毫升,血清肌酸酐(SCr)從術前兩周的1.5 mg/dL上升至2.2 mg/dL。在手術順利拔除氣管內管後,仍需2-3升/分鐘的鼻導管輔助氧氣。手術前的藥物 包括每日兩次40毫克Furosemide。理學檢查顯示:意識清醒,無痛苦表現。血壓為110/78 mmHg。肺底 部呼吸音減少,有輕微的小腿前部水腫。尿液檢查顯示兩價(2+)蛋白和幾個泥棕色腎小管圓柱體(muddy brown casts)。下列哪一項最有可能預測該患者發展為3期AKI和需要腎替代治療(RRT)?","options":{"A":"尿素的分餘排泄率大於50%。","B":"尿液中白蛋白與肌酸酐比值大於30 mg/g。","C":"靜脈注射Furosemide (1.5 mg/kg) 後2小時內尿量少於200毫升。","D":"尿液中NGAL (neutrophil gelatinase-associated lipocalin)大於150 ng/ml。","E":"尿液比重(Specific gravity)大於1.030。"},"id":"113-合-69","roc_year":113,"source":"113合併PDF","topic":"急性腎損傷(AKI)","q_num":69,"src":"113合併卷"},{"num":70,"answer":"C","stem":"一位29歲女性,經產婦,已產1次(G2P1),妊娠30週,因過去一小時嚴重右側背痛來急診室就診。疼痛為 絞痛性,放射至右側腹股溝。患者還報告有噁心和排尿疼痛。其妊娠過程順利,無個人或家族重病史。她 不抽菸也不喝酒。她唯一的藥物是產前維他命。體溫37.0°C,脈搏90次/分鐘,血壓130/80 mmHg。背部 檢查顯示右側肋脊角敲痛Costovertebral angle (CV) knocking tenderness。尿液檢查顯示:尿蛋白:陰 性;紅血球細胞柱狀體:陰性;紅血球:7-10/高倍視野(hpf);白血球細胞柱狀體:陰性;白血 球:1-2/高倍視野(hpf)下列哪一項最可能是此患者的診斷?","options":{"A":"下尿路感染。","B":"卵巢扭轉。","C":"腎結石。","D":"腎盂腎炎。","E":"急性闌尾炎。"},"id":"113-合-70","roc_year":113,"source":"113合併PDF","topic":"感染/結石/阻塞","q_num":70,"src":"113合併卷"},{"num":71,"answer":"E","stem":"一位21歲男性在被母親發現昏迷,30分鐘後被送到急診室。到達時,病人無法提供病史。母親報告家族 沒有嚴重疾病史。患者看起來昏昏欲睡且脫水。體溫38.5°C ,脈搏110次/分鐘,血壓170/100 mm Hg。檢查顯示他前臂有多處針跡,前額、腿和背部有大面積瘀傷,嘴角有血液滴出。患者經導尿,排出 深茶色尿液。尿液檢查顯示:pH:5.8,比重:1.045,潛血:3+,葡萄糖:-,蛋白:1+,酮體:1+,紅 血球:無,白血球:0-1/高倍視野(HPF)。尿液毒性試驗對鴨片類(opiates)藥物和古柯鹼(cocaine)呈 陽性反應。開始進行靜脈輸液和sodium nitroprusside點滴注射。下列哪一項是此患者最可能的實驗室檢 查結果?","options":{"A":"低血清鉀。","B":"低血清乳酸脫氫酶。","C":"低血尿素氮。","D":"高血清鈣。","E":"高血清肌酸激酶。"},"id":"113-合-71","roc_year":113,"source":"113合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":71,"src":"113合併卷"},{"num":56,"answer":"B","stem":"28歲女性,URI約兩週之後,出現microscopic hematuria (3+), proteinuria (2+),脛前與足踝水腫,血 壓148/100 mmHg。抽血檢查: creatinine由0.9 mg/dL上升至1.5 mg/dL, 有血清補體(complement, C3)偏 低情形, ANCA (-), anti-GBM (-)。以下何者最可能?","options":{"A":"IgA nephropathy。","B":"Postinfectious glomerulonephritis (PIGN)。","C":"Henoch-Schönlein purpura (HSP)。","D":"Focal segmental glomerulosclerosis。","E":"Wegener’s granulomatosis。"},"id":"114-合-56","roc_year":114,"source":"114合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":56,"src":"114合併卷"},{"num":57,"answer":"B","stem":"58歲lung cancer女性,接受immune checkpoint inhibitors 治療約兩週之後,出現fever, costovertebral angle tenderness, eosinophilia。抽血檢查: creatinine由原本正常上升至1.6 mg/dL, 病人最可能是發生 ?","options":{"A":"acute glomerulonephritis (AGN)。","B":"acute tubulointerstitial nephritis (ATIN)。","C":"immune complex disorders。","D":"systemic infection-related GN (glomerulonephritis)。","E":"RPGN (rapidly progressive glomerulonephritis)。"},"id":"114-合-57","roc_year":114,"source":"114合併PDF","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":57,"src":"114合併卷"},{"num":58,"answer":"A","stem":"尿液沉渣(cast, sediment)檢驗,以下各種urine casts的敘述,何者最符合 acute tubular necrosis病人的診 斷?","options":{"A":"Granular casts。","B":"RBC casts and dysmorphic RBCs。","C":"Hyaline casts。","D":"Fatty casts and Maltese crosses appearance。","E":"Waxy casts。"},"id":"114-合-58","roc_year":114,"source":"114合併PDF","topic":"急性腎損傷(AKI)","q_num":58,"src":"114合併卷"},{"num":60,"answer":"B","stem":"隨著腎功能惡化,CKD病人發生腎性骨病變的致病機轉,以下何者最早發生?","options":{"A":"Nephron loss reduced synthesis of 1,25-Vitamin D3。","B":"Hyperphosphatemia induced by phosphate retention。","C":"Increased synthesis of FGF-23 by osteocytes。","D":"Low ionized calcium。","E":"Parathyroid gland hypertrophy and secondary hyperparathyoridism。"},"id":"114-合-60","roc_year":114,"source":"114合併PDF","topic":"慢性腎臟病/尿毒症","q_num":60,"src":"114合併卷"},{"num":61,"answer":"D","stem":"一位44歲男性,因意識模糊,呼吸急促被送至急診。抽血檢查:動脈氣體分析、血清電解質如下: glucose 148 mg/dL, BUN 52 mg/dL, Cr 1.8 mg/dL, ABG: pH 7.32,PCO2 20 mmHg, HCO3- 13 mEq/L; Na 144 mEq/L, K 4.1 mEq/L, Cl 102 mEq/L 。由以上數據分析,最符合以下何種診斷? (1) Metabolic acidosis with respiratory compensation (2) Mixed metabolic acidosis and respiratory alkalosis (3) Mixed metabolic acidosis and respiratory acidosis (4) Normal anion gap (5) Increased or high anion gap","options":{"A":"(1)+(4)。","B":"(1)+(5)。","C":"(2)+(4)。","D":"(2)+(5)。","E":"(3)+(4)。"},"id":"114-合-61","roc_year":114,"source":"114合併PDF","topic":"酸鹼平衡異常","q_num":61,"src":"114合併卷"},{"num":62,"answer":"E","stem":"慢性腎病(CKD)病人常需同時使用多種藥品,除了利尿劑(loop diuretics, thiazide)之外,以下何者會增加 高尿酸(hyperuricemia) 與痛風的風險?","options":{"A":"SGLT2 inhibitors。","B":"metformin。","C":"losartan。","D":"fenofibrate。","E":"beta-blockers。"},"id":"114-合-62","roc_year":114,"source":"114合併PDF","topic":"慢性腎臟病/尿毒症","q_num":62,"src":"114合併卷"},{"num":63,"answer":"B","stem":"一名體重 60 公斤的病人,入院時基礎血清肌酐為 1.0 mg/dL。第三天測得血清肌酐上升至 2.2 mg/dL,且過去24小時總尿量為 700 mL。請問此病人的急性腎損傷(AKI)應屬於哪一個分期?","options":{"A":"Stage 1。","B":"Stage 2。","C":"Stage 3。","D":"無法分類,需腎臟切片。","E":"尚未符合 AKI 診斷標準。"},"id":"114-合-63","roc_year":114,"source":"114合併PDF","topic":"急性腎損傷(AKI)","q_num":63,"src":"114合併卷"},{"num":64,"answer":"C","stem":"關於「腎前性氮血症(prerenal azotemia)」的敘述,下列何者正確?","options":{"A":"其本質為腎小管實質的永久性破壞。","B":"高血鉀通常是最早出現的生化變化。","C":"常因腎血流灌流不足導致過濾壓下降。","D":"必須先出現尿毒症症狀才能診斷。","E":"一旦發生即無法可逆。"},"id":"114-合-64","roc_year":114,"source":"114合併PDF","topic":"急性腎損傷(AKI)","q_num":64,"src":"114合併卷"},{"num":65,"answer":"C","stem":"下列何者為「常染色體顯性多囊腎病(ADPKD)」最常見的致病基因?","options":{"A":"PKHD1。","B":"NPHP1。","C":"PKD1。","D":"HNF1B。","E":"CEP290。"},"id":"114-合-65","roc_year":114,"source":"114合併PDF","topic":"囊性/遺傳性腎病","q_num":65,"src":"114合併卷"},{"num":66,"answer":"E","stem":"一名 68 歲男性,有高血壓與第二型糖尿病病史,因慢性腎臟病在門診追蹤腎 功能。實驗室結果顯 示:Creatinine 2.1 mg/dL, eGFR 32 mL/min/1.73 m2, UACR 850 mg/g,病人目前無不適主訴及其他症 狀,請問以下哪一項最適合目前對此 病人之照護建議?","options":{"A":"此病人屬 CKD Stage 2,僅需年度追蹤即可。","B":"若無症狀可先停用腎臟保護藥物。","C":"鈉離子會大量流失,應提醒病人注意額外補充鈉離子攝取。","D":"開始準備透析導管放置與移植評估。","E":"調整降壓藥物以達<130/80 mmHg 為目標。"},"id":"114-合-66","roc_year":114,"source":"114合併PDF","topic":"慢性腎臟病/尿毒症","q_num":66,"src":"114合併卷"},{"num":67,"answer":"C","stem":"一名 70 歲男性因敗血性休克住進加護病房,使用升壓劑、24 小時皆無尿,抽血鉀離子 6.8 mmol/L、代 謝性酸中毒且意識改變。請選出最合適的透析方式, 並配對正確的臨床因應理由。","options":{"A":"腹膜透析(Peritoneal Dialysis, PD),體液移除快,適合立即改善水腫與高血鉀症。","B":"間歇性血液透析(Intermittent Hemodialysis, IHD),清除效率高,可迅速改善酸中毒與高血鉀。","C":"連續腎臟替代治療(Continuous Renal Replacement Therapy, CRRT),溫和持續清除,可穩定血 壓並有效處理高鉀與酸中毒。","D":"先使用靜脈注射葡萄糖與胰島素合併鈣劑暫時穩定血鉀即可,暫不需透析治療。","E":"血液動力學不穩定,應避免進行透析處置,以免進一步惡化循環狀態。"},"id":"114-合-67","roc_year":114,"source":"114合併PDF","topic":"透析與腎移植","q_num":67,"src":"114合併卷"},{"num":69,"answer":"D","stem":"一名 68 歲男性為 CKD Grade 4 病人,主訴近來容易疲倦、胃口差、體重下降。他嘗試限制蛋白質攝取 以延緩腎衰竭惡化,但無營養師介入。下列哪項敘 述最適合作為營養指導原則?","options":{"A":"CKD 病人應全面高蛋白飲食以維持營養狀態。","B":"限制蛋白攝取應避免,因易導致低血鉀。","C":"CKD 不會影響營養狀態,不需特別飲食控制。","D":"限制蛋白攝取可能延緩尿毒症進展,但應避免營養不良。","E":"蛋白限制僅適用於已進入透析的病人。"},"id":"114-合-69","roc_year":114,"source":"114合併PDF","topic":"慢性腎臟病/尿毒症","q_num":69,"src":"114合併卷"},{"num":70,"answer":"B","stem":"某男性在接受心臟手術後出現血壓下降與肌酸酐上升。尿液分析顯示尿比重 1.010,呈等張尿,尿中可見 顆粒管型(granular casts),FeNa 為 3%。 下列哪一種 AKI 類型最可能符合此病人的臨床與實驗室表 現?","options":{"A":"腎前性氮血症(Prerenal azotemia)。","B":"缺血相關急性腎損傷(Ischemia- associated AKI)。","C":"腎後性阻塞(Postrenal AKI)。","D":"溶血(Hemolysis)。","E":"造影劑腎病變(Contrast-induced nephropathy)。"},"id":"114-合-70","roc_year":114,"source":"114合併PDF","topic":"急性腎損傷(AKI)","q_num":70,"src":"114合併卷"},{"num":71,"answer":"D","stem":"下列哪些病因與其對應的實驗室特徵配對是正確的? (1) 腎前性氮血症(Prerenal azotemia)→BUN/Cr 比值 >20,FeNa 1.0% (2) 血栓性微血管病變(TTP/HUS) → 低 LDH、貧血、血小板減少 (3) 腫瘤溶解症候群(Tumor lysis syndrome)→ 高磷血症、高尿酸血症、低鈣血症 (4) 造影劑腎病變(Contrast-induced nephropathy)→ 肌酸酐在 3–5 天後上升、FeNa >2%、24 小時內 完全恢復 (5) 急性間質性腎炎(AIN) → 尿中嗜酸性球(Eosinophilia)增多、無菌性白血球尿(Sterile pyuria)、須配合 腎臟切片","options":{"A":"(1)+(2)+(3)。","B":"(1)+(2)+(4)。","C":"(1)+(3)+(4)。","D":"(1)+(3)+(5)。","E":"(2)+(3)+(5)。"},"id":"114-合-71","roc_year":114,"source":"114合併PDF","topic":"急性腎損傷(AKI)","q_num":71,"src":"114合併卷"}],E={"100-腎-1":{"quick":"正解(D)：CKD代謝性酸中毒當血HCO₃⁻<20–23 mmol/L即可考慮補鹼。","detail":{"background":"CKD進展中的代謝性酸中毒：早期(GFR 20–50)因每日淨產酸排泄(主要靠ammoniagenesis)受損，先出現non-anion-gap(hyperchloremic)酸中毒；進展到GFR<15–20後，硫酸鹽、磷酸鹽、urate等陰離子滯留，才轉為high-anion-gap酸中毒。殘存腎元的「每單位腎元」氨生成會代償性上升，但因腎元總數減少，全身總氨排泄量仍下降。高血鉀會「抑制」近端小管氨生成、惡化排酸。出題年(民國100=2011)KDOQI建議血清HCO₃⁻維持≥22 mmol/L，低於此值即補鹼(NaHCO₃)。","options":{"A":"錯：CKD病人總氨排泄量比正常人「少」(腎元減少)，不是更多。","B":"錯：高血鉀「抑制」氨生成、減少排酸，不會增加。","C":"錯：高血鉀+hyperchloremic metabolic acidosis是「type IV RTA」(醛固酮不足/反應低下)，非type III；好發於糖尿病腎病變與小管間質疾病。","D":"對：HCO₃⁻低於約20–23 mmol/L即可開始補鹼，延緩骨病與肌肉流失。","E":"錯：方向相反——隨腎功能惡化是由non-AG轉為high-AG酸中毒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD酸鹼）","Brenner & Rector’s The Kidney, 11e（CKD與酸鹼平衡）","KDOQI CKD 2000/2002（血HCO₃⁻≥22）"]}},"100-腎-2":{"quick":"正解(A為不正確)：腎病症候群並非「每位」都需立刻抗凝；應個別化。","detail":{"background":"成人/老年原發性腎病症候群最常見病理為membranous nephropathy，與惡性腫瘤(尤其肺癌)及B型/C型肝炎相關。因尿中流失antithrombin III等抗凝因子，呈高凝狀態(腎靜脈栓塞、肺栓塞風險)，membranous風險最高。但「預防性抗凝」需個別評估(白蛋白<2.0–2.5 g/dL、membranous、其他血栓危險因子才考慮)，並非每位都立即warfarin。","options":{"A":"不正確(即答案)：並非每位都應儘早warfarin，須依血栓風險個別化。","B":"可能伴顯微血尿。","C":"部分(尤其membranous)可自發緩解。","D":"老年原發性最常見為膜性腎病。","E":"肺癌等惡性腫瘤可致副腫瘤性膜性腎病。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎絲球疾病/腎病症候群）","Brenner & Rector’s The Kidney, 11e（膜性腎病與高凝狀態）"]}},"100-腎-3":{"quick":"正解(B)：心衰竭(有效循環容積低)較易發生顯影劑腎病變。","detail":{"background":"顯影劑腎病變(CIN/CA-AKI)：注射後48–72小時Cr上升，第3–5天達高峰，多在7–10天內恢復。機轉為腎髓質「血管收縮」缺血＋ROS直接小管毒性(傷害腎小管，非腎絲球)，且與顯影劑劑量「相關」。高危：既有CKD、糖尿病、心衰竭、脫水。","options":{"A":"錯：機轉為血管「收縮」非擴張。","B":"對：CHF有效循環血量不足，較易CIN。","C":"錯：劑量與損傷程度「相關」。","D":"錯：ROS主要傷害「腎小管」細胞，非腎絲球。","E":"錯：高峰為第3–5天、約7–10天恢復，非「10–12天高峰」。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI/顯影劑腎病變）","Brenner & Rector’s The Kidney, 11e（contrast-associated AKI）"]}},"100-腎-4":{"quick":"正解(C為不正確)：止痛藥腎病增加的是「泌尿上皮(移行細胞)癌」，非腎細胞癌。","detail":{"background":"慢性止痛藥腎病(phenacetin/aspirin/acetaminophen複方>15年)：典型為腎乳頭壞死(papillary necrosis)＋慢性小管間質腎炎；IVU可見脫落乳頭的\"ring sign\"；貧血程度常與腎衰竭程度不成比例。長期增加「泌尿上皮(移行細胞)癌」風險，而非renal cell carcinoma。","options":{"A":"腎病與長期止痛藥有關。","B":"IVU可見ring sign(乳頭壞死)。","C":"不正確(即答案)：增加的是移行細胞癌，非腎細胞癌。","D":"特點為乳頭壞死＋小管間質發炎。","E":"貧血程度常與腎衰竭程度不成比例。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（小管間質腎病/止痛藥腎病）","Brenner & Rector’s The Kidney, 11e（analgesic nephropathy）"]}},"100-腎-5":{"quick":"正解(E)：化療相關血栓性微血管病變(TMA)，病理為thrombotic microangiopathy。","detail":{"background":"化療(如mitomycin C、gemcitabine)誘發的血栓性微血管病變：微血管病性溶血性貧血(破碎紅血球)＋血小板低下＋AKI。病理為thrombotic microangiopathy。死亡率高，對血漿置換反應不如TTP，可突然發生。","options":{"A":"錯：死亡率高，非極低。","B":"錯：典型為mitomycin C/gemcitabine，非cyclophosphamide。","C":"錯：可突然發生。","D":"錯：血漿置換對藥物相關TMA療效不確定。","E":"對：病理為thrombotic microangiopathy。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（血栓性微血管病變）","Brenner & Rector’s The Kidney, 11e（藥物相關TMA）"]}},"100-腎-6":{"quick":"正解(E=4+5+7)：低血鈉以低滲透壓為主，腦水腫致意識障礙、急性<120可昏迷抽搐、beer potomania。","detail":{"background":"低血鈉(118)評估：絕大多數伴低血漿滲透壓(真性低鈉)；SIADH是「等容積(euvolemic)」低鈉最常見原因(非高容積)；甲狀腺「低下」與腎上腺「不足」才會低鈉；急性嚴重低鈉因水分進入腦細胞→腦水腫→意識改變、昏迷、抽搐；beer potomania(大量啤酒、溶質攝取不足)亦致低鈉。","options":{"A":"含2(SIADH高容積，錯)、3(甲亢，錯)。","B":"含6(腎上腺機能亢進，錯)。","C":"含2、6皆錯。","D":"含3、6皆錯。","E":"對：4(腦水腫)、5(急性<120昏迷抽搐)、7(beer potomania)全對。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低血鈉/SIADH）","Brenner & Rector’s The Kidney, 11e（水鈉代謝）"]}},"100-腎-7":{"quick":"正解(D=1+5+6)：PTH不一定升高、嚴重高鈣致心搏慢與AV block、先校正白蛋白。","detail":{"background":"高血鈣：惡性腫瘤多透過PTHrP(非PTH)，伴PTH被抑制；sarcoidosis因肉芽腫產生1,25-(OH)₂D；嚴重高鈣可致bradycardia、AV block、QT縮短；評估第一步先看白蛋白校正(校正鈣)。","options":{"A":"含2(腫瘤分泌PTH，錯)、3(sarcoidosis靠PTH，錯)。","B":"含4(甲狀腺低下致高鈣，錯)。","C":"含3、4錯。","D":"對：1(PTH不一定升)、5(心搏慢/AV block)、6(先看白蛋白)全對。","E":"含4錯。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（鈣代謝/高血鈣）","Brenner & Rector’s The Kidney, 11e（鈣磷代謝）"]}},"100-腎-8":{"quick":"正解(D)：COX-2抑制劑降低腎素/醛固酮、減少鉀排泄→高血鉀。","detail":{"background":"高血鉀成因眾多。NSAID/COX-2抑制劑抑制前列腺素→降低腎素-醛固酮、減少遠端排鉀→高血鉀。低體溫、thyrotoxic periodic paralysis、低鎂、TPN多與「低血鉀」相關。　補充：高血鉀心電圖序列為T波高尖→PR延長/P波變平→QRS增寬→正弦波；緊急處理先給靜脈鈣穩定心肌，再以胰島素+葡萄糖、β2作動劑使鉀移入細胞，最後以利尿劑/陽離子交換樹脂/透析排鉀。","options":{"A":"低體溫非典型高鉀原因。","B":"甲亢週期性麻痺為低血鉀。","C":"低鎂致腎性失鉀→低血鉀。","D":"對：COX-2抑制劑→高血鉀。","E":"TPN(再餵食)易低血鉀。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（鉀代謝）","Brenner & Rector’s The Kidney, 11e（高血鉀）"]}},"100-腎-9":{"quick":"正解(E)：乳酸中毒以NaHCO₃治療有時致高血壓與體液過多。","detail":{"background":"休克(消化道大出血)致A型乳酸中毒(組織灌流不足)。乳酸中毒為「高anion-gap」酸中毒；分A(灌流不足)、B(B1疾病/B2藥物/B3先天)；治療重點為矯正灌流，不應只靠NaHCO₃，後者可致鈉/容積過多、高血壓，且不建議常規使用。","options":{"A":"錯：乳酸中毒為高AG，非正常AG。","B":"錯：分A、B(B含子型)，非A/B/C。","C":"錯：盲目用血管收縮劑未必有益。","D":"錯：不建議常規快速以NaHCO₃矯正至正常。","E":"對：NaHCO₃可致高血壓與體液過多。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（乳酸中毒/酸鹼）","Brenner & Rector’s The Kidney, 11e（代謝性酸中毒）"]}},"100-腎-10":{"quick":"正解(E)：酮酸中毒為「高anion-gap」酸中毒，非hyperchloremic(非AG)。","detail":{"background":"Hyperchloremic(正常AG)代謝性酸中毒成因：腹瀉(失HCO₃⁻)、輕中度CKD(GFR 20–50)、type II近端RTA、type IV(低腎素低醛固酮)。酮酸中毒(DKA)屬高AG酸中毒。","options":{"A":"腹瀉→非AG。","B":"輕中度CKD→非AG。","C":"近端RTA(type II)→非AG。","D":"低腎素低醛固酮(type IV)→非AG。","E":"即答案：酮酸中毒為高AG，不是非AG。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（酸鹼分類）","Brenner & Rector’s The Kidney, 11e（RTA）"]}},"100-腎-11":{"quick":"正解(A)：腎病症候群因尿失antithrombin III而偏低，造成高凝。","detail":{"background":"腎病症候群高凝機轉：尿中流失低分子量的antithrombin III→活性下降；fibrinogen、factor VII、α2-macroglobulin因肝臟代償合成而「上升」；protein C/S多正常或升高。故最可能偏「低」者為antithrombin III。","options":{"A":"對：antithrombin III隨尿流失而下降。","B":"fibrinogen上升。","C":"factor VII上升。","D":"α2-macroglobulin上升。","E":"protein C/S多正常或上升。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎病症候群高凝）","Brenner & Rector’s The Kidney, 11e（nephrotic-associated thrombosis）"]}},"100-腎-12":{"quick":"正解(C)：metformin不致水腫，與此水腫「無關」。","detail":{"background":"藥物性下肢水腫：minoxidil(鈉水滯留)、nifedipine等CCB(血管擴張性水腫)、NSAID(鈉滯留)、thiazolidinediones(體液滯留)皆可致足踝水腫。此例尿蛋白(-)、白蛋白與腎功能正常、無心肝病，指向藥物性水腫。metformin不會造成水腫。","options":{"A":"minoxidil致鈉水滯留→相關。","B":"CCB(nifedipine)血管擴張性水腫→相關。","C":"對(即答案)：metformin與水腫無關。","D":"NSAID致鈉滯留→相關。","E":"TZD致體液滯留→相關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（藥物性水腫）","Brenner & Rector’s The Kidney, 11e（CCB/TZD水腫）"]}},"100-腎-13":{"quick":"正解(C=2+3+6)：增生型狼瘡腎需脈衝療法、cyclophosphamide每月IV、可搭利尿劑。","detail":{"background":"此例補體低、anti-dsDNA高、AKI、腎絲球多發類似病變(增生伴新月體)→活動性增生型(class III/IV)狼瘡腎，非class V膜性。治療：高劑量/脈衝類固醇＋cyclophosphamide誘導(NIH方案前6個月每月IV 0.5–1 g/m²)，必要時搭配利尿劑。低劑量口服類固醇不足以控制重症。","options":{"A":"含1(class V，錯)。","B":"含1、4(低劑量口服起手，錯)。","C":"對：2(脈衝)、3(cyclophosphamide月療)、6(利尿劑)全對。","D":"含1、4錯。","E":"含4錯。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（狼瘡腎炎）","Brenner & Rector’s The Kidney, 11e（lupus nephritis）","NIH cyclophosphamide方案；ACR 2012狼瘡腎指引"]}},"100-腎-14":{"quick":"正解(B=1+2+4)：妊娠高血壓首選hydralazine、labetalol、methyldopa。","detail":{"background":"妊娠期降壓安全藥物：methyldopa、labetalol、hydralazine、nifedipine。禁用：ACEi(captopril)、ARB(losartan)、直接腎素抑制劑(aliskiren)有致畸/胎兒腎毒性；clonidine較不優先。","options":{"A":"含5(captopril禁用)。","B":"對：hydralazine+labetalol+methyldopa皆安全。","C":"含5、7禁用。","D":"含6(losartan禁用)。","E":"含5、6禁用。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（妊娠高血壓）","Brenner & Rector’s The Kidney, 11e（pregnancy & HTN）","ACOG妊娠高血壓建議"]}},"100-腎-15":{"quick":"正解(A為錯)：抗EPO抗體引起純紅血球再生不良(PRCA)，應「停用」EPO而非加量。","detail":{"background":"使用EPO期間Hb反而漸降、reticulocyte低、骨髓紅血球前驅細胞缺乏→抗EPO抗體誘發的純紅血球再生不良(antibody-mediated PRCA)。處置：停用EPO、檢測anti-EPO抗體、免疫抑制治療、輸血支持；腎移植後可改善。","options":{"A":"錯誤(即答案)：應停用EPO，加量到5000 units TIW會持續刺激抗體。","B":"可考慮免疫抑制。","C":"腎移植後貧血可望改善。","D":"應檢測anti-EPO抗體。","E":"可間歇輸血矯正。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD貧血/PRCA）","Brenner & Rector’s The Kidney, 11e（antibody-mediated PRCA）"]}},"100-腎-16":{"quick":"正解(B)：CKD病人使用metformin致乳酸中毒(MALA)。","detail":{"background":"糖尿病、近半年Cr由1.4升至3.5，出現嚴重高AG代謝性酸中毒(AG=145−99−2.3≈44、pH 7.01)，呼吸代償(RR 26)→metformin相關乳酸中毒(MALA)。metformin於eGFR<30禁用，腎功能惡化時須停藥。","options":{"A":"furosemide不致此重度高AG酸中毒。","B":"對：metformin致乳酸中毒。","C":"atenolol無關。","D":"losartan無關(可致高鉀但非此圖)。","E":"amlodipine無關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（乳酸中毒/MALA）","Brenner & Rector’s The Kidney, 11e（metformin與腎）"]}},"100-腎-17":{"quick":"正解(B)：老年貧血+高血鈣+腎衰竭+尿單株蛋白→多發性骨髓瘤。","detail":{"background":"老年女性，正球性貧血、高血鈣、腎衰竭、尿中單株(Bence Jones)蛋白→多發性骨髓瘤(cast nephropathy/myeloma kidney)，符合CRAB(高鈣、腎、貧血、骨)。腎切片可見管腔內蛋白圓柱。","options":{"A":"Wegener(GPA)為ANCA血管炎，無單株蛋白/高鈣。","B":"對：多發性骨髓瘤。","C":"HUS為TMA，無單株蛋白。","D":"SLE補體低、ANA陽性，非單株。","E":"HSP為IgA血管炎。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（漿細胞疾病/骨髓瘤腎）","Brenner & Rector’s The Kidney, 11e（myeloma cast nephropathy）"]}},"100-腎-18":{"quick":"正解(C)：AKI先以腎臟超音波排除阻塞(post-renal)。","detail":{"background":"半年內Cr由1.0升至3.0之AKI，尿有蛋白與大量白血球。AKI評估首步先以「腎臟超音波」排除腎後性阻塞(簡單、非侵襲)，再依線索安排血清學或切片。　補充：腎臟超音波可同時看腎臟大小(縮小提示慢性)、皮質厚度與是否水腎；排除腎後性後，蛋白＋大量白血球(白血球管型)指向急性間質性腎炎或腎盂腎炎，必要時再切片。","options":{"A":"ANA非首步。","B":"anti-GBM非首步。","C":"對：先做腎臟超音波排除阻塞。","D":"估eGFR/電解質非定位病因之首步影像。","E":"腎切片侵入性，非第一步。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI評估流程）","Brenner & Rector’s The Kidney, 11e（AKI診斷）"]}},"100-腎-19":{"quick":"正解(A=1+3+6)：高AG代謝性酸中毒，疑潛在感染(乳酸中毒)。","detail":{"background":"pH 7.30、PaCO₂ 23、HCO₃⁻ 11→代謝性酸中毒伴呼吸代償；AG=134−107−11=16(>12)為「高AG」。老人虛弱、低血壓→疑敗血症/乳酸中毒(潛在感染)。低血鉀(2.7)雖見於腹瀉/利尿劑，但本題酸中毒為高AG，故選1+3+6。","options":{"A":"對：1(代謝性酸中毒)+3(AG陽性)+6(潛在感染)。","B":"含2(呼吸性酸中毒，錯)、5(hypoaldosteronism，錯，K低)。","C":"含4(非AG，錯)、5錯。","D":"含7但缺潛在感染主軸，且7隱含非AG機轉。","E":"含4錯。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高AG酸中毒/乳酸）","Brenner & Rector’s The Kidney, 11e（acid-base）"]}},"100-腎-20":{"quick":"正解(B為除外)：有蛋白尿(>1 g/天)的DM-CKD血壓目標應更低(≤130/80)。","detail":{"background":"出題年(民國100=2011)指引：糖尿病腎病變(尤其蛋白尿>1 g/天)血壓目標應≤130/80 mmHg，非140/90。其餘——定期驗蛋白尿、HbA1c≤7%、治療高LDL、低鹽——皆為延緩CKD進展之建議。","options":{"A":"定期驗蛋白尿，正確。","B":"除外(即答案)：蛋白尿>1 g/天應更嚴格(≤130/80)，非140/90。","C":"HbA1c≤7%，正確。","D":"高LDL為危險因子，正確。","E":"低鹽飲食，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD進展防治）","Brenner & Rector’s The Kidney, 11e（CKD risk factors）","2010年高血壓治療指引/KDOQI(蛋白尿CKD<130/80)"]}},"100-腎-21":{"quick":"正解(B為不正確)：此為利尿劑致低容積性低鈉，非SIADH。","detail":{"background":"近一週頭暈虛弱、停降壓藥；尿鈉低(6)、代謝性鹼中毒(HCO₃⁻ 27、pH 7.47)→furosemide造成的低容積性低血鈉。SIADH為「等容積」、尿鈉>30–40、無鹼中毒，故B不正確。應驗血清/尿滲透壓協助鑑別。","options":{"A":"飲食鹽分可能不足，合理。","B":"不正確(即答案)：尿鈉低+鹼中毒不符SIADH。","C":"ABG確有代謝性鹼中毒。","D":"與先前furosemide有關。","E":"應驗血清/尿滲透壓。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低血鈉鑑別）","Brenner & Rector’s The Kidney, 11e（利尿劑性低鈉 vs SIADH）"]}},"100-腎-22":{"quick":"正解(A為不正確)：高糖透析液目的是「超過濾(移除水分)」，非清除尿毒素。","detail":{"background":"腹膜透析(PD) vs 血液透析(HD)：PD用高張葡萄糖透析液產生滲透梯度以「超過濾」移除水分(非用於清除溶質/尿毒素)；長期高糖負荷→高三酸甘油酯；PD較易腹膜炎；PD每日蛋白流失較多；HD較易透析中低血壓。","options":{"A":"不正確(即答案)：高糖是為超過濾移除水分，非清除尿毒素。","B":"高糖負荷→高三酸甘油酯，正確。","C":"PD較易腹膜炎，正確。","D":"PD蛋白流失較多，正確。","E":"HD較易透析中低血壓，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析比較）","Brenner & Rector’s The Kidney, 11e（PD vs HD合併症）"]}},"101-腎-1":{"quick":"正解(C最不建議)：以fenoldopam取代ARB預防CIN無實證(陰性試驗)。","detail":{"background":"顯影劑腎病變(CIN)預防(出題年民國101=2012)：停metformin、等張食鹽水(±碳酸氫鈉)容積擴充為核心；N-acetylcysteine當年常用(後續PRESERVE/AMACING顯示不優於食鹽水)；停ACEi/ARB有爭議但合理。fenoldopam多項RCT證實「無法」預防CIN，故以其「取代ARB比較安全」最不建議。","options":{"A":"停metformin避免乳酸中毒，建議。","B":"食鹽水±碳酸氫鈉容積擴充，建議。","C":"最不建議(即答案)：fenoldopam預防CIN為陰性。","D":"NAC當年常用(實證後來弱)。","E":"aminophylline(腺苷拮抗)曾被嘗試。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（顯影劑腎病變預防）","Brenner & Rector’s The Kidney, 11e（CA-AKI prevention）","CONTRAST trial(fenoldopam陰性)"]}},"101-腎-2":{"quick":"正解(B)：年輕女性突發大量蛋白尿、沉渣乾淨→微小變化腎病。","detail":{"background":"24歲女性2個月內突發腎病症候群(P/C≈9、低白蛋白、高血脂)，尿潛血(-)、腎功能正常、無系統性線索→minimal change disease(年輕人原發性腎病症候群最常見)。　補充：微小變化腎病對口服類固醇反應佳、多數可緩解；電子顯微鏡見足細胞足突瀰漫融合，光鏡與免疫螢光大致正常，與FSGS(局部節段硬化、類固醇反應較差)鑑別。","options":{"A":"IgA多以血尿表現。","B":"對：微小變化腎病。","C":"骨髓瘤見於老年、有單株蛋白。","D":"SLE有補體低、ANA陽性。","E":"MPGN補體低、常有血尿。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（微小變化腎病）","Brenner & Rector’s The Kidney, 11e（MCD）"]}},"101-腎-3":{"quick":"正解(A=3+4)：痛風者可用allopurinol、反覆尿酸結石可用potassium citrate。","detail":{"background":"高尿酸處置：無症狀高尿酸「不」常規以allopurinol治療(不能證實預防腎惡化)；預防急性尿酸腎病只在腫瘤溶解等特定情境。已有痛風關節炎者降尿酸可減少結石；反覆尿酸結石可用potassium citrate鹼化尿液。已用allopurinol時發生急性痛風「不」停allopurinol(續用、另加colchicine/NSAID)。","options":{"A":"對：(3)+(4)。","B":"含(1)錯。","C":"含(2)錯。","D":"含(5)錯(不應停allopurinol)。","E":"含(1)(5)錯。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高尿酸/痛風）","Brenner & Rector’s The Kidney, 11e（uric acid nephrolithiasis）","ACR痛風指引"]}},"101-腎-4":{"quick":"正解(A)：硬皮症病人大多ANA陽性。","detail":{"background":"硬皮症腎危象(SRC)：突發高血壓＋急性腎衰竭。risk predictor為anti-RNA polymerase III(非anti-Scl-70)；治療「首選ACEi」(救命)；類固醇(尤其高劑量)「增加」SRC風險。","options":{"A":"對：硬皮症>90%ANA陽性。","B":"錯：SRC的predictor是anti-RNA pol III，非anti-Scl-70。","C":"錯：anti-RNA pol III「增加」SRC風險。","D":"錯：ACEi是SRC首選治療，非避免。","E":"錯：類固醇「增加」SRC風險。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（硬皮症腎危象）","Brenner & Rector’s The Kidney, 11e（scleroderma renal crisis）"]}},"101-腎-5":{"quick":"正解(B為錯)：EPO的Hb目標非>13；過高增加心血管事件。","detail":{"background":"出題年民國101=2012(TREAT 2009之後)：CKD貧血以ESA治療，Hb目標約10–11.5 g/dL(不超過11–11.5)；Hb>13會增加中風/心血管事件與血栓，並未保護腎功能。　補充：ESA治療前須先補足鐵(transferrin飽和度與ferritin)；目標Hb過高(>13)反增血栓與心血管事件(TREAT、CHOIR等試驗)，故採保守目標並監測血壓。","options":{"A":"補鐵目標ferritin>200、TS>20%，正確。","B":"錯誤(即答案)：Hb>13有害，非保護。","C":"改善次發性副甲狀腺亢進有助EPO反應。","D":"抗EPO抗體可致純紅血球再生不良。","E":"ACEi可能降EPO反應、statin降發炎或有益，敘述合理。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD貧血/ESA）","Brenner & Rector’s The Kidney, 11e（anemia of CKD）","CHOIR/CREATE/TREAT(高Hb有害)"]}},"101-腎-6":{"quick":"正解(A為錯)：PD腹膜炎最常見為「革蘭氏陽性」菌(凝固酶陰性葡萄球菌)。","detail":{"background":"腹膜透析腹膜炎：最常見為革蘭氏陽性(coagulase-negative staph、S. aureus)，非革蘭氏陰性。Pseudomonas/黴菌性腹膜炎難治、常需拔管；鼻腔帶S. aureus者用mupirocin降出口感染；診斷標準之一為透析液混濁且WBC>100/mm³以中性球為主；PD較易高三酸甘油酯與低蛋白血症。","options":{"A":"錯誤(即答案)：最常見為革蘭氏陽性菌。","B":"Pseudomonas/黴菌常需拔管，正確。","C":"mupirocin降出口感染，正確。","D":"WBC>100、嗜中性球為主，正確。","E":"PD較易高TG/低蛋白，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（PD腹膜炎）","Brenner & Rector’s The Kidney, 11e（PD-related peritonitis）","ISPD腹膜炎指引"]}},"101-腎-7":{"quick":"正解(A為錯)：iPTH 680、高磷→次發性副甲狀腺亢進(高骨轉換)，非adynamic bone disease。","detail":{"background":"CKD5、iPTH 680(高)、高磷、低-正常鈣、骨折→次發性副甲狀腺亢進造成的高骨轉換骨病(osteitis fibrosa cystica)，ALP升高；adynamic bone disease則為「低」PTH/低骨轉換。治療：活性維生素D、磷結合/限磷(800–1000 mg/天)。","options":{"A":"錯誤(即答案)：此為次發性副甲狀腺亢進(高骨轉換)，非adynamic。","B":"可給活性維生素D。","C":"限磷800–1000 mg/天。","D":"ALP會偏高(高骨轉換)。","E":"病理像osteitis fibrosa，非avascular necrosis。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD-MBD）","Brenner & Rector’s The Kidney, 11e（renal osteodystrophy）","KDIGO CKD-MBD"]}},"101-腎-8":{"quick":"正解(C較不合適)：ramipril為ACEi，妊娠禁用。","detail":{"background":"妊娠高血壓降壓安全藥物：labetalol、hydralazine、methyldopa、nifedipine；子癇前症併肺水腫可用靜脈nitroglycerin。ACEi(ramipril)致畸/胎兒腎毒性，禁用。","options":{"A":"labetalol安全。","B":"hydralazine安全。","C":"較不合適(即答案)：ramipril(ACEi)妊娠禁用。","D":"methyldopa安全。","E":"子癇前症肺水腫可用IV NTG。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（妊娠高血壓）","Brenner & Rector’s The Kidney, 11e（pregnancy HTN）"]}},"101-腎-9":{"quick":"正解(C)：正常血壓之低鉀低鎂代謝性鹼中毒→Bartter/Gitelman，可用spironolactone治低鉀。","detail":{"background":"血壓正常的低血鉀＋低血鎂＋代謝性鹼中毒(pH 7.48、HCO₃⁻ 28)、甲狀腺正常→Bartter/Gitelman型鹽流失病。治療以保鉀利尿劑(spironolactone/amiloride)、補鉀補鎂，Bartter可加NSAID(前列腺素過量)。","options":{"A":"第1型RTA為代謝性「酸」中毒，不符鹼中毒。","B":"第2型RTA亦為酸中毒，不符。","C":"對：Bartter/Gitelman，spironolactone可治低鉀。","D":"Gitelman前列腺素不過量，NSAID療效不如Bartter。","E":"分泌腎素腫瘤會「高血壓」，本例血壓正常。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（Bartter/Gitelman）","Brenner & Rector’s The Kidney, 11e（鹽流失性腎小管病）"]}},"101-腎-10":{"quick":"正解(A=1+2+3)：MPGN補體C3低、需篩C型肝炎、可合併單株球蛋白。","detail":{"background":"膜增殖性腎絲球腎炎(MPGN)：免疫複合體＋C3沉積，血清C3常降低；應篩感染(HCV)；單株球蛋白病/慢性發炎可合併MPGN。治療仍用ACEi/ARB控蛋白尿(非不用)；移植後「常」復發(非很少)。","options":{"A":"對：(1)C3低+(2)篩HCV+(3)單株球蛋白。","B":"含(4)錯(仍用ACEi/ARB)。","C":"含(5)錯(常復發)。","D":"含(4)(5)錯。","E":"含(4)(5)錯。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（MPGN）","Brenner & Rector’s The Kidney, 11e（membranoproliferative GN）"]}},"101-腎-11":{"quick":"正解(B最不常)：腫瘤溶解症候群為「低」血鈣，非高血鈣。","detail":{"background":"腫瘤溶解症候群(TLS)：細胞內容物釋放→高尿酸、高血鉀、高血磷，磷與鈣結合→「低」血鈣；併AKI(尿酸/磷酸鈣沉積)、Cr上升。故高血鈣最不常見。　補充：腫瘤溶解症候群高危(高腫瘤負荷/化療敏感)應預防性水化、給allopurinol或rasburicase降尿酸並監測電解質；急性高血鉀與低血鈣可致心律不整，必要時透析。","options":{"A":"高尿酸常見。","B":"最不常(即答案)：TLS為低血鈣。","C":"高血鉀常見。","D":"高血磷常見。","E":"Cr上升(AKI)常見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腫瘤溶解症候群）","Brenner & Rector’s The Kidney, 11e（TLS與AKI）"]}},"101-腎-12":{"quick":"正解(C)：飢餓→酮體生成→高anion-gap代謝性酸中毒。","detail":{"background":"pH 7.3、HCO₃⁻ 14、AG=138−103−14=21(高AG)→高AG代謝性酸中毒。飢餓酮酸中毒屬高AG。amphotericin B(遠端RTA)、cholestyramine(高氯)、腎不全用NSAID(type IV)皆為「非AG」；MgSO₄不致此。","options":{"A":"amphotericin B→遠端RTA(非AG)。","B":"MgSO₄不致高AG酸中毒。","C":"對：飢餓酮酸→高AG。","D":"cholestyramine→高氯(非AG)。","E":"腎不全用NSAID→type IV(非AG)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高AG酸中毒）","Brenner & Rector’s The Kidney, 11e（酮酸/酸鹼）"]}},"101-腎-13":{"quick":"正解(D為不對)：尿嗜伊紅白血球對AIN敏感度/特異度皆「不」佳，非必做。","detail":{"background":"急性間質性腎炎(AIN)：多為藥物過敏性(allergic)；NSAID引起者常「無」發燒/皮疹，可伴大量蛋白尿(合併微小變化)。尿中嗜伊紅白血球敏感度與特異度均低，不應作為可靠依據；AIN不一定要靠腎切片診斷。","options":{"A":"住院後Cr急升、無明顯病因→應疑AIN。","B":"過敏性AIN最常見。","C":"NSAID性AIN常無發燒皮疹、可大量蛋白尿。","D":"不對(即答案)：尿嗜伊紅敏感/特異度差，非必做。","E":"AIN不一定需腎切片。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（急性間質性腎炎）","Brenner & Rector’s The Kidney, 11e（AIN）"]}},"101-腎-14":{"quick":"正解(D為錯)：診斷腎靜脈栓塞的最敏感檢查非doppler超音波，而是CT/MR或腎靜脈攝影。","detail":{"background":"腎病症候群(尤其膜性腎病)為高凝狀態，易腎靜脈栓塞(突發腰痛、血尿、腎功能下降)。最敏感確診為CT/MR靜脈攝影或傳統腎靜脈攝影，doppler超音波敏感度不足；確診後抗凝治療。　補充：腎病症候群因尿失antithrombin III、肝代償合成促凝因子而呈高凝；膜性腎病風險最高。確診腎靜脈栓塞後抗凝，並評估抗凝預防(尤白蛋白<2.0~2.5者)。","options":{"A":"應疑腎靜脈栓塞。","B":"高凝狀態易發生。","C":"膜性腎病最易。","D":"錯誤(即答案)：doppler非~100%；首選CT/MR靜脈攝影。","E":"確診後抗凝。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎靜脈栓塞）","Brenner & Rector’s The Kidney, 11e（renal vein thrombosis）"]}},"101-腎-15":{"quick":"正解(E為錯)：單次血尿(RBC>2/HPF)不代表泌尿道「一定」有病。","detail":{"background":"顯微血尿評估：可為腎絲球或泌尿道病變；肉眼血尿較具意義；併白血球>5/HPF及菌尿提示感染；女性急性膀胱/尿道炎可有肉眼血尿。但單次少量血尿不等於必有疾病，需重複確認。　補充：無症狀顯微血尿應先排除一過性原因(運動、月經、感染)後重複尿檢；持續者依年齡與危險因子分流——年長/吸菸者重視泌尿上皮癌，年輕者考慮腎絲球來源。","options":{"A":"單純顯微血尿可為腎絲球病。","B":"肉眼血尿較具意義。","C":"血尿+膿尿+菌尿提示感染。","D":"女性膀胱/尿道炎可肉眼血尿。","E":"錯誤(即答案)：單次血尿不代表一定有病。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（血尿評估）","Brenner & Rector’s The Kidney, 11e（hematuria）"]}},"101-腎-16":{"quick":"正解(C為錯)：透析時機依臨床指徵，非固定BUN 60就洗。","detail":{"background":"老人服止痛藥後AKI(BUN 84、Cr 6.1)。透析啟動依「臨床指徵」(難治高鉀、酸中毒、容積過多、尿毒症狀)，非以BUN 60之單一數值決定；過早常規透析未證實降低死亡率(AKIKI/IDEAL-ICU等支持必要才洗)。","options":{"A":"可能AKI。","B":"止痛藥扮重要角色。","C":"錯誤(即答案)：無BUN 60固定門檻。","D":"透析方式須考量當地設備。","E":"低血壓者PD較HD穩定。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI透析時機）","Brenner & Rector’s The Kidney, 11e（RRT timing）","AKIKI/IDEAL-ICU"]}},"101-腎-17":{"quick":"正解(C)：IgA腎病對多數人相對良性，5–30%可完全緩解。","detail":{"background":"IgA腎病變(感冒後肉眼血尿)：多以血尿表現(非腎病症候群)，多數病程緩慢、相對良性，約5–30%完全緩解；長期約20–40%於「20年」進展ESRD(非10年40%)；扁桃腺切除/類固醇/魚油非對「所有」病人有效。","options":{"A":"多以血尿，非腎病症候群。","B":"多緩慢，非常發生急性腎衰竭。","C":"對：相對良性，5–30%完全緩解。","D":"10年內40%ESRD過高。","E":"非對所有病人皆有效。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（IgA腎病）","Brenner & Rector’s The Kidney, 11e（IgA nephropathy）"]}},"101-腎-18":{"quick":"正解(C為錯)：重度症狀性低鈉需先以3%食鹽水適度提升，再限速；非「愈慢愈佳、不必考慮速率」。","detail":{"background":"血鈉108、意識不清為重度症狀性低鈉：應「先」以3%高張食鹽水使血鈉初期上升4–6 mmol/L緩解腦水腫，之後限制24小時上升≤8–10 mmol/L以防滲透性脫髓鞘(ODS)。ODS好發橋腦，亦可見小腦/大腦皮質；過度矯正時可用5%葡萄糖(±desmopressin)重新降鈉以預防/逆轉ODS。","options":{"A":"重度低鈉應盡速處理。","B":"並找病因對症。","C":"錯誤(即答案)：需控制速率，不是無限放慢、不顧速率。","D":"ODS多在橋腦，亦可他處。","E":"過度矯正可用D5W重新降鈉。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低血鈉/ODS）","Brenner & Rector’s The Kidney, 11e（hyponatremia treatment）"]}},"101-腎-19":{"quick":"正解(D為錯)：ACEi/ARB再加保鉀利尿劑有高血鉀風險，非「每人皆可放心併用」。","detail":{"background":"糖尿病/蛋白尿CKD血壓更嚴格(出題年125/75)；ACEi/ARB減緩腎惡化、但在雙側腎動脈狹窄/缺血性腎血管病可誘發AKI；ACEi/ARB＋保鉀利尿劑→高血鉀，須監測，並非每位都可安全併用。　補充：糖尿病蛋白尿CKD首選ACEi/ARB以降蛋白尿與保腎，但起始後須監測血鉀與肌酸酐(可上升<30%可接受)；雙側腎動脈狹窄者使用可致急性腎損傷，須留意。","options":{"A":"蛋白尿>1 g/天目標125/75(出題年)。","B":"ACEi/ARB減緩惡化。","C":"缺血性腎血管病可誘發AKI。","D":"錯誤(即答案)：併保鉀利尿劑高鉀風險。","E":"高血脂應積極治療。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD藥物/高鉀）","Brenner & Rector’s The Kidney, 11e（RAAS阻斷）"]}},"101-腎-20":{"quick":"正解(C=1+3)：代謝性鹼中毒；amphotericin B/acetazolamide/輸尿管乙狀結腸造口皆造成酸中毒(排除)。","detail":{"background":"pH 7.55、HCO₃⁻ 42→代謝性鹼中毒。低血鎂可致低鉀性代謝性鹼中毒；estrogen為另一可能。amphotericin B(遠端RTA)、acetazolamide(近端排HCO₃⁻)、輸尿管乙狀結腸造口(高氯)皆造成「酸中毒」，故排除→答案1+3。","options":{"A":"含(2)(4)酸中毒。","B":"含(4)(5)酸中毒。","C":"對：(1)estrogen+(3)低鎂。","D":"含(2)(5)酸中毒。","E":"含(2)酸中毒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（代謝性鹼中毒）","Brenner & Rector’s The Kidney, 11e（metabolic alkalosis）"]}},"101-腎-21":{"quick":"正解(D=2+4)：水腫+低鈉但尿鈉高(42)→腎性失鈉(急/慢性腎衰竭)。","detail":{"background":"水腫性低血鈉：腎病症候群/肝硬化/心衰竭因有效循環量低→尿鈉「低」(<20，鈉滯留)；本例尿鈉高(42)代表腎臟無法保鈉→急性或慢性腎衰竭。　補充：尿鈉用於低血鈉鑑別：水腫但尿鈉低(<20)提示有效循環不足之鈉滯留(心衰/肝硬化/腎病症候群)；尿鈉高(>40)提示腎本身失鈉(腎衰竭或利尿劑)。","options":{"A":"含(1)(3)為低尿鈉型。","B":"含(3)(5)低尿鈉型。","C":"含(1)(5)低尿鈉型。","D":"對：(2)急性+(4)慢性腎衰竭(尿鈉高)。","E":"含(3)低尿鈉型。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（水腫性低鈉鑑別）","Brenner & Rector’s The Kidney, 11e（尿鈉與容積狀態）"]}},"101-腎-22":{"quick":"正解(B=3+5)：低血鉀；低鎂(腎性失鉀)與低體溫(細胞內移)。","detail":{"background":"低血鉀(3.1)成因：低血鎂致腎性失鉀、低體溫使鉀移入細胞內→皆低鉀。mannitol(滲透性、偏高鉀/變動)、腫瘤溶解(高鉀)、amiloride(保鉀→高鉀)皆非低鉀原因。　補充：低血鎂致腎性失鉀的機轉為解除對腎外髓鉀通道(ROMK)的抑制而漏鉀，故單純補鉀難矯正，須同時補鎂；體溫過低使鉀暫時移入細胞內。","options":{"A":"含(1)(2)非低鉀。","B":"對：(3)低鎂+(5)低體溫。","C":"含(4)amiloride(高鉀)。","D":"含(2)(4)高鉀。","E":"含(2)高鉀。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低血鉀）","Brenner & Rector’s The Kidney, 11e（鉀代謝）"]}},"102-腎-1":{"quick":"正解(C=1+3+5)：CKD骨病變機轉含1,25-vitD缺乏、低血鈣、Klotho缺乏。","detail":{"background":"CKD礦物質骨病(CKD-MBD)：1,25-(OH)₂D₃生成減少、低血鈣、Klotho缺乏；而磷為「高」(非低)，FGF-23為「升高」(非低)以代償排磷。　補充：CKD-MBD演進：磷滯留與1,25-D₃減少→低血鈣→續發性副甲狀腺亢進；FGF-23早期即代償性升高以排磷，並抑制鈣三醇生成，為早期生物標記。","options":{"A":"含(2)低磷(錯)、(4)低FGF-23(錯)。","B":"含(2)(4)錯。","C":"對：(1)1,25-vitD缺乏+(3)低血鈣+(5)Klotho缺乏。","D":"含(4)低FGF-23(錯)。","E":"含(4)低FGF-23(錯)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD-MBD/FGF-23-Klotho）","Brenner & Rector’s The Kidney, 11e（mineral bone disorder）"]}},"102-腎-2":{"quick":"正解(B)：低補體C3腎炎→cryoglobulinemia(常與HCV相關)。","detail":{"background":"低補體(C3低)腎絲球腎炎：感染後GN、狼瘡腎、MPGN、冷凝球蛋白血症、心內膜炎。FSGS、HSP、IgA、Wegener(ANCA、pauci-immune)補體多正常。中年女性蛋白尿+C3低→cryoglobulinemia。","options":{"A":"FSGS補體正常。","B":"對：cryoglobulinemia補體低。","C":"HSP補體正常。","D":"Wegener(GPA)補體正常。","E":"IgA補體正常。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低補體腎炎）","Brenner & Rector’s The Kidney, 11e（cryoglobulinemic GN）"]}},"102-腎-3":{"quick":"正解(C)：ADPKD 4–15%合併腦動脈瘤，無症狀者不建議常規篩檢。","detail":{"background":"ADPKD：PKD1約85%(較多且較重)、PKD2約15%(A敘述顛倒)；因囊腫仍可分泌EPO，貧血出現較「晚/輕」(B錯)；4–15%合併腦動脈瘤，但無家族史/症狀者不建議常規篩檢(C對)；瓣膜異常以二尖瓣脫垂最常見(D錯)；血壓控制建議用ACEi/ARB(E錯)。","options":{"A":"錯：PKD1較多且較重，非PKD2 80%。","B":"錯：ADPKD貧血較晚/輕。","C":"對：腦動脈瘤4–15%，無症狀不常規篩檢。","D":"錯：以二尖瓣脫垂最常見。","E":"錯：應使用ACEi/ARB。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ADPKD）","Brenner & Rector’s The Kidney, 11e（autosomal dominant PKD）"]}},"102-腎-4":{"quick":"正解(B不建議)：妊娠禁用ACEi/ARB(致畸/胎兒腎毒性)。","detail":{"background":"妊娠降壓：methyldopa、labetalol、hydralazine、nifedipine；子癇前症可用MgSO₄(預防抽搐)、nifedipine。ACEi/ARB禁用。　補充：妊娠高血壓避用ACEi/ARB(致畸、胎兒腎發育不全)與直接腎素抑制劑；硫酸鎂用於預防/治療子癇抽搐而非降壓，使用時須監測反射、呼吸與尿量。","options":{"A":"methyldopa安全。","B":"不建議(即答案)：ACEi/ARB禁用。","C":"hydralazine安全。","D":"labetalol安全。","E":"子癇前症用MgSO₄/nifedipine。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（妊娠高血壓）","Brenner & Rector’s The Kidney, 11e（pregnancy HTN）"]}},"102-腎-5":{"quick":"正解(C)：PD出口感染最常見菌種為Staphylococcus aureus。","detail":{"background":"腹膜透析：對中大分子清除「優於」HD(連續性)；腹膜炎最常見為革蘭氏陽性(staph)非Pseudomonas；出口感染最常見為S. aureus；4.25%透析液是為更強「超過濾」(高糖)，非更佳溶質清除/營養；長期存活與HD相近。","options":{"A":"錯：PD對中大分子清除較好。","B":"錯：腹膜炎最常見為staph。","C":"對：出口感染最常見S. aureus。","D":"錯：4.25%是為超過濾，非更佳清除/營養。","E":"錯：長期存活與HD相近。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（PD）","Brenner & Rector’s The Kidney, 11e（PD-related infection）","ISPD指引"]}},"102-腎-6":{"quick":"正解(A)：硬皮症腎危象首選ACEi。","detail":{"background":"systemic sclerosis近兩週突發高血壓＋急性腎衰竭(Cr 1.0→2.1)→硬皮症腎危象，首選ACEi(captopril可救命)，迅速控壓。　補充：硬皮症腎危象機轉為腎臟微血管病變與腎素-血管收縮素系統過度活化，ACEi(captopril)可救命；應避免高劑量類固醇(可誘發腎危象)。","options":{"A":"對：ACEi首選。","B":"β-blocker非首選。","C":"α-blocker非首選。","D":"直接血管擴張劑非首選。","E":"利尿劑可能惡化(容積已不足)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（硬皮症腎危象）","Brenner & Rector’s The Kidney, 11e（scleroderma renal crisis）"]}},"102-腎-7":{"quick":"正解(C=2+3+4+6)：ACEi/ARB、低蛋白、戒菸減重、statin。","detail":{"background":"第II/III期糖尿病腎病變處置：ACEi/ARB控壓抗蛋白尿、低蛋白飲食(~0.8 g/kg)、戒菸減重、statin治血脂。EPO於此期尚不需(貧血較晚)；血糖「越低越好」錯誤(ACCORD顯示過嚴控糖增低血糖與死亡，目標約HbA1c 7%)。","options":{"A":"含(1)(5)錯。","B":"缺(3)(6)。","C":"對：(2)+(3)+(4)+(6)。","D":"含(1)(5)錯。","E":"含(1)錯。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病腎病變）","Brenner & Rector’s The Kidney, 11e（diabetic kidney disease）","ACCORD(過嚴控糖有害)"]}},"102-腎-8":{"quick":"正解(B=1+2+3+4)：血脂、空腹血糖、Hct、ECG為高血壓初評。","detail":{"background":"新診斷高血壓基本檢查(除BUN/Cr/電解質/尿檢)：血脂(T-Chol/LDL)、空腹血糖、Hct、ECG。胸部X光與腎臟超音波非常規(有指徵才做)。　補充：新診斷高血壓初評目的在找可逆病因與評估標的器官與心血管風險；故須做ECG、空腹血糖、血脂與Hct，影像與超音波保留給有續發性線索者。","options":{"A":"含(5)(6)非常規。","B":"對：(1)+(2)+(3)+(4)。","C":"含(5)非常規。","D":"含(6)非常規。","E":"缺(3)(4)、含(6)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血壓初步評估）","Brenner & Rector’s The Kidney, 11e（HTN workup）","JNC建議"]}},"102-腎-9":{"quick":"正解(A)：尿毒、貧血、夜尿、酸中毒、輕度蛋白尿→馬兜鈴酸(中草藥)腎病。","detail":{"background":"慢性小管間質病變表現(夜尿=濃縮缺陷、貧血、代謝性酸中毒、輕度蛋白尿、緩慢進展)在台灣常見病因為馬兜鈴酸/中草藥腎病(Aristolochic acid nephropathy)，並增加泌尿上皮癌風險。","options":{"A":"對：馬兜鈴酸(中草藥)腎病。","B":"FSGS以蛋白尿為主。","C":"MPGN補體低、血尿。","D":"IgA以血尿為主。","E":"ADPKD有大囊腫/家族史。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（馬兜鈴酸腎病）","Brenner & Rector’s The Kidney, 11e（aristolochic acid nephropathy）"]}},"102-腎-10":{"quick":"正解(A最少見)：中暑多為「低」血糖，非高血糖。","detail":{"background":"中暑(熱衰竭/熱中暑)併發症：AKI、DIC、橫紋肌溶解、心律不整常見；血糖多偏「低」(肝醣耗竭/代謝)，高血糖最少見。　補充：熱中暑核心處置為快速降溫(蒸發/浸泡)與輸液；橫紋肌溶解致肌球蛋白尿須積極水化並監測腎功能與電解質，DIC與肝損傷亦須留意。","options":{"A":"最少見(即答案)：中暑多低血糖。","B":"AKI常見。","C":"DIC常見。","D":"橫紋肌溶解常見。","E":"心律不整常見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（中暑/熱傷害）","Brenner & Rector’s The Kidney, 11e（heat-related AKI）"]}},"102-腎-11":{"quick":"正解(C)：代謝性酸中毒+呼吸性酸中毒(代償不足)。","detail":{"background":"HCO₃⁻ 10→代謝性酸中毒。Winter公式預期PCO₂=1.5×10+8=23±2；實際PCO₂ 32>預期→呼吸代償「不足」、合併呼吸性酸中毒(肺炎/呼吸衰竭)。故為代謝性酸中毒＋呼吸性酸中毒。","options":{"A":"非單純代謝性酸中毒(代償不足)。","B":"非單純呼吸性酸中毒。","C":"對：代謝性+呼吸性酸中毒。","D":"非呼吸性鹼中毒(PCO₂偏高)。","E":"非鹼中毒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（混合酸鹼/Winter公式）","Brenner & Rector’s The Kidney, 11e（mixed acid-base）"]}},"102-腎-12":{"quick":"正解(B為錯)：成人原發性腎病症候群「經典」最常見為膜性腎病(MN)。","detail":{"background":"兒童原發性腎病症候群最常見為微小變化；成人經典最常見為膜性腎病(MN)(本題以此為標準，故B「FSGS」為錯)；最易腎靜脈栓塞為MN；最常見原發性腎炎為IgA；HCV相關常為MN或MPGN。　補充：老人新發腎病症候群須警覺次發性(惡性腫瘤相關膜性腎病)；膜性腎病抗PLA2R抗體陽性支持原發性，陰性者更應排查潛在腫瘤與感染。","options":{"A":"兒童=微小變化，正確。","B":"錯誤(即答案)：成人經典最常見為MN。","C":"MN最易腎靜脈栓塞，正確。","D":"最常見原發性腎炎=IgA，正確。","E":"HCV相關=MN/MPGN，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎病症候群流行病學）","Brenner & Rector’s The Kidney, 11e（primary nephrotic syndrome）"]}},"102-腎-13":{"quick":"正解(D=1+2)：止痛藥與中草藥(馬兜鈴酸)→CKD併泌尿上皮癌。","detail":{"background":"同時造成慢性腎病「與」泌尿上皮(移行細胞)癌者：止痛藥腎病、中草藥(馬兜鈴酸)腎病。calcineurin inhibitor、lithium、鉛可致CKD，但不特別增加泌尿上皮癌。　補充：馬兜鈴酸腎病(中草藥/巴爾幹腎病)特徵為進行性間質纖維化合併上泌尿道移行細胞癌風險高，須長期影像追蹤；止痛藥腎病亦有乳頭壞死。","options":{"A":"含(3)(5)不增泌尿上皮癌。","B":"含(3)(5)。","C":"含(5)。","D":"對：(1)止痛藥+(2)中草藥。","E":"含(4)lithium。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（藥物/毒物腎病與泌尿上皮癌）","Brenner & Rector’s The Kidney, 11e（analgesic/aristolochic）"]}},"102-腎-14":{"quick":"正解(D=1+4+5)：血壓正常之低鉀鹼中毒、高腎素高醛固酮→Bartter、Gitelman、loop diuretics。","detail":{"background":"血壓「正常」＋低血鉀＋代謝性鹼中毒＋高腎素高醛固酮：Bartter、Gitelman、loop/thiazide利尿劑。單側腎動脈狹窄會「高血壓」；Liddle為「低」腎素低醛固酮且高血壓。　補充：血壓正常的低血鉀代謝性鹼中毒須測尿氯區分：Bartter/Gitelman/利尿劑尿氯高；嘔吐/緩瀉劑濫用尿氯低。Gitelman另有低血鎂、低尿鈣。","options":{"A":"含(3)Liddle(低腎素、高血壓)。","B":"含(3)。","C":"含(3)。","D":"對：(1)Bartter+(4)Gitelman+(5)利尿劑。","E":"含(2)高血壓型。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（鹽流失/續發性醛固酮）","Brenner & Rector’s The Kidney, 11e（Bartter/Gitelman）"]}},"102-腎-15":{"quick":"正解(C為誤)：止痛藥腎病/乳頭壞死最合適影像為「非顯影CT」，非MRI。","detail":{"background":"老人長期止痛藥、Cr 2.5→止痛藥腎病。CKD不宜thiazide(效差且電解質風險)；體液不足與CKD為高危；最合適影像為非顯影電腦斷層(顯示乳頭壞死/鈣化)，非MRI；單純acetaminophen致病較小；末期者泌尿上皮癌風險增加。","options":{"A":"CKD不宜thiazide，正確。","B":"體液不足/CKD為高危，正確。","C":"誤(即答案)：最合適為非顯影CT，非MRI。","D":"acetaminophen致病較小，正確。","E":"泌尿上皮癌風險增加，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（止痛藥腎病影像）","Brenner & Rector’s The Kidney, 11e（analgesic nephropathy）"]}},"102-腎-16":{"quick":"正解(A最不能確切顯示)：captopril腎核醫掃描在CKD/雙側病變敏感度差。","detail":{"background":"兩側腎大小不對稱疑腎動脈狹窄：CTA、
