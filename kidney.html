MRA、DSA(數位減影血管攝影，黃金標準)、都卜勒超音波較能顯示；captopril腎核醫掃描在腎功能不全或雙側病變時敏感度/特異度差，較不能確切顯示。　補充：DSA為腎動脈狹窄黃金標準但屬侵入性，臨床多先以非侵入性MRA/CTA/都卜勒篩檢；captopril腎核醫在雙側病變或腎功能不全時準確度下降。","options":{"A":"最不能確切(即答案)：captopril腎掃描敏感度差。","B":"都卜勒超音波可評估。","C":"CTA可顯示。","D":"MRA可顯示。","E":"DSA為黃金標準。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎血管性高血壓影像）","Brenner & Rector’s The Kidney, 11e（renovascular imaging）"]}},"102-腎-17":{"quick":"正解(A為誤)：第2型糖尿病應於「診斷時」即篩微量白蛋白尿(本例已糖尿病10年)。","detail":{"background":"糖尿病10年、蛋白尿3+、Cr 1.4之糖尿病腎病變：第2型糖尿病應於「診斷當時」就開始篩微量白蛋白尿(本例10年前)，非3年前(高血壓發病時)，故A誤。糖尿病腎病變常在ESRD前先發生心血管事件/死亡；可於5–10年進展ESRD；有家族遺傳傾向；病理僅少部分為Kimmelstiel-Wilson結節(瀰漫型較多)。","options":{"A":"誤(即答案)：應於糖尿病「診斷時」即篩(10年前)。","B":"常先心血管事件/死亡，正確。","C":"5–10年可進展ESRD，正確。","D":"有家族遺傳傾向，正確。","E":"結節型僅少部分，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病腎病變篩檢）","Brenner & Rector’s The Kidney, 11e（diabetic nephropathy）","ADA(診斷時即篩)"]}},"102-腎-18":{"quick":"正解(D=4+5+6)：診斷敏感度最高為血清游離輕鏈；預後用β2-microglobulin與albumin。","detail":{"background":"懷疑輕鏈疾病：診斷敏感度最高為serum free light chain assay(4)(搭配immunofixation)；預後/分期用β2-microglobulin(5)與albumin(6)(ISS分期)。","options":{"A":"缺游離輕鏈。","B":"缺游離輕鏈。","C":"缺(4)(5)組合。","D":"對：(4)游離輕鏈+(5)β2M+(6)albumin。","E":"未含(6)且非最佳組合。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（漿細胞病/輕鏈）","Brenner & Rector’s The Kidney, 11e（free light chain）","ISS分期(β2M+albumin)"]}},"102-腎-19":{"quick":"正解(C=4+5)：鹼化對原發性副甲狀腺亢進(鈣石)與struvite石無幫助。","detail":{"background":"尿液鹼化有助：尿酸石、cystine、hypocitraturia、遠端RTA(補citrate)。對原發性副甲狀腺亢進(鈣石)與struvite(磷酸銨鎂，鹼性尿中更易形成)無益甚至有害。　補充：尿液鹼化(枸櫞酸鉀)促尿酸石與胱胺酸石溶解；但磷酸銨鎂(struvite)石在鹼性、含尿素分解菌環境下更易形成，須改以根除感染與酸化策略。","options":{"A":"(1)(3)鹼化有益。","B":"含(2)尿酸(有益)。","C":"對：(4)+(5)鹼化無幫助。","D":"含(3)有益。","E":"含(1)有益。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎結石/尿液鹼化）","Brenner & Rector’s The Kidney, 11e（nephrolithiasis）"]}},"102-腎-20":{"quick":"正解(D為誤)：thiazide會「增加」allopurinol(oxypurinol)毒性，非降低。","detail":{"background":"allopurinol/colchicine用藥：HLA-B*5801增加嚴重過敏(SJS/TEN)；allopurinol降低theophylline清除、增加azathioprine/6-MP毒性(抑制xanthine oxidase)；clarithromycin增加colchicine毒性(CYP3A4/P-gp)。thiazide減少oxypurinol排泄→「增加」allopurinol毒性。","options":{"A":"HLA-B5801增嚴重過敏，正確。","B":"降theophylline清除，正確。","C":"增azathioprine/6-MP毒性，正確。","D":"誤(即答案)：thiazide增加(非降低)allopurinol毒性。","E":"clarithromycin增colchicine毒性，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（降尿酸藥物交互作用）","Brenner & Rector’s The Kidney, 11e（allopurinol）"]}},"102-腎-21":{"quick":"正解(B不適合)：fluoroquinolone(levofloxacin)妊娠不建議(軟骨毒性)。","detail":{"background":"妊娠尿路感染抗生素：ampicillin、cephalosporins、nitrofurantoin(避開近足月)多可用；aminoglycoside短期可權衡。fluoroquinolone(levofloxacin)因軟骨毒性，妊娠不建議。","options":{"A":"ampicillin可用。","B":"不適合(即答案)：levofloxacin妊娠不建議。","C":"nitrofurantoin多可用。","D":"aminoglycoside可權衡。","E":"cephalosporins可用。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（妊娠UTI用藥）","Brenner & Rector’s The Kidney, 11e（UTI in pregnancy）"]}},"102-腎-22":{"quick":"正解(E)：皮膚硬化快速或anti-RNA pol I/III陽性之男性較易發生腎危象。","detail":{"background":"硬皮症腎危象(SRC)風險：瀰漫型且皮膚硬化快速進行、anti-RNA polymerase I/III陽性、男性、高劑量類固醇使用。anti-centromere(CREST/限局型)風險「低」。發生SRC時血壓正常(normotensive SRC)反而預後「差」。ACEi為治療(救命)，但預防性ACEi未證實能預防SRC。","options":{"A":"錯：normotensive SRC預後較差。","B":"錯：anti-centromere風險低。","C":"錯：高劑量類固醇增加SRC。","D":"錯：預防性ACEi未證實可預防。","E":"對：皮膚快速硬化/anti-RNA pol I/III男性較易。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（硬皮症腎危象風險）","Brenner & Rector’s The Kidney, 11e（scleroderma renal crisis）"]}},"103-腎-1":{"quick":"正解(D除外)：高血壓初評以「空腹血糖」即可，非常規HbA1c。","detail":{"background":"新診斷高血壓常規篩檢：Hb/Hct、尿液檢查、空腹血糖、ECG/胸部X光、血脂、電解質與腎功能。HbA1c非高血壓初評之常規項目(空腹血糖已足)。　補充：高血壓初評的空腹血糖即可評估糖尿病風險，HbA1c非例行；ECG評估左心室肥厚、尿白蛋白評估腎標的器官損傷，皆屬核心項目。","options":{"A":"Hb/Hct，建議。","B":"尿液檢查，建議。","C":"空腹血糖，建議。","D":"除外(即答案)：HbA1c非常規初評。","E":"ECG/胸部X光，建議。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血壓初步評估）","Brenner & Rector’s The Kidney, 11e（HTN workup）"]}},"103-腎-2":{"quick":"正解(B)：尿鈉41 mEq/L支持ATN(腎臟無法保鈉)。","detail":{"background":"ATN vs 腎前性AKI：ATN尿鈉>20–40、FeNa>2%、尿滲透壓<350(等張尿)、棕色顆粒管型；腎前性尿鈉<20、FeNa<1%、尿滲透壓>500、BUN/Cr>20、僅見透明管型。尿鈉41支持ATN。","options":{"A":"BUN/Cr=78/1.8≈43→偏腎前性。","B":"對：尿鈉41→ATN。","C":"尿滲透壓390偏低但非決定。","D":"此組FeNa低→偏腎前性。","E":"沉渣正常+透明管型→腎前性。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI鑑別）","Brenner & Rector’s The Kidney, 11e（ATN vs prerenal）"]}},"103-腎-3":{"quick":"正解(A)：非腎絲球性單純血尿(老年)→先做尿液細胞學排除惡性。","detail":{"background":"58歲、單純血尿、無變形紅血球/紅血球管型/蛋白尿→非腎絲球性(泌尿道來源)。年長者應先尿液細胞學(並影像/膀胱鏡)排除泌尿上皮惡性腫瘤，而非先腎切片。　補充：非腎絲球性血尿(無變形紅血球、無紅血球管型、無蛋白尿)在40歲以上、吸菸者須以尿細胞學＋膀胱鏡＋上泌尿道影像排除泌尿上皮癌，而非先腎切片。","options":{"A":"對：先尿液細胞學排除惡性。","B":"cryoglobulin/補體用於腎絲球性。","C":"肌球蛋白尿非此情境。","D":"非腎絲球性不先腎切片。","E":"無膿尿/症狀，非先培養。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（血尿評估）","Brenner & Rector’s The Kidney, 11e（non-glomerular hematuria）"]}},"103-腎-4":{"quick":"正解(C)：慢性呼吸性酸中毒(COPD)＋代謝性鹼中毒(利尿劑)。","detail":{"background":"pH 7.42、PaCO₂ 67(高，呼吸性酸中毒)、HCO₃⁻ 42(高，代謝性鹼中毒)、低Cl 88、低K 3.5→慢性呼吸性酸中毒(COPD CO₂滯留)合併利尿劑造成的代謝性鹼中毒。　補充：動脈血氣判讀先看pH，再依PaCO₂與HCO₃₃方向辨原發；本例pH接近正常但PaCO₂與HCO₃皆顯著升高，屬慢性呼吸性酸中毒合併代謝性鹼中毒之混合型。","options":{"A":"敗血症多為高AG代謝性酸中毒。","B":"尿毒為代謝性酸中毒。","C":"對：COPD＋利尿劑(呼吸性酸+代謝性鹼)。","D":"甲醇中毒為高AG酸中毒。","E":"肺炎呼吸器為呼吸性鹼/酸，無此鹼中毒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（混合酸鹼）","Brenner & Rector’s The Kidney, 11e（chronic resp acidosis + met alkalosis）"]}},"103-腎-5":{"quick":"正解(E=2+3)：腹膜炎三聯徵與淋巴球為主→疑結核/黴菌。","detail":{"background":"腹膜透析感染：腹膜炎最常見為凝固酶陰性葡萄球菌(S. epidermidis)，非S. aureus(故1錯)；三聯徵：腹痛+透析液混濁+WBC>100/μL(2對)；淋巴球>50%為主→疑結核/黴菌(3對)；老年最常見非Pseudomonas(4錯)；出口感染最常見為S. aureus(非epidermidis，5錯)。","options":{"A":"含1、4、5錯。","B":"含1、5錯。","C":"含1、4錯。","D":"含1、5錯。","E":"對：(2)三聯徵+(3)淋巴球為主疑結核/黴菌。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（PD腹膜炎）","Brenner & Rector’s The Kidney, 11e（PD peritonitis）","ISPD指引"]}},"103-腎-6":{"quick":"正解(C最不符)：膜性腎病補體「正常」，與此低C3不符。","detail":{"background":"低補體(C3 48↓)腎炎：狼瘡腎、感染後GN、cryoglobulinemia、MPGN皆補體低。膜性腎病(MN)補體「正常」，故最不符。　補充：低補體腎炎鑑別重點為C3/C4組合：狼瘡腎C3C4皆低、感染後GN多C3低C4正常、冷凝球蛋白C4特別低；膜性腎病補體正常可資排除。","options":{"A":"狼瘡腎C3低，符合。","B":"感染後GN C3低，符合。","C":"最不符(即答案)：MN補體正常。","D":"cryoglobulinemia C3低，符合。","E":"MPGN C3低，符合。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低補體腎炎）","Brenner & Rector’s The Kidney, 11e（complement & GN）"]}},"103-腎-7":{"quick":"正解(A)：免疫學全陰性+重度尿毒+瀰漫肺浸潤→尿毒肺。","detail":{"background":"肺出血腎炎症候群之免疫鑑別全陰性(anti-GBM、ANCA、ANA、補體正常)→排除Goodpasture、血管炎、狼瘡。Cr 5.8重度尿毒＋兩側瀰漫肺泡浸潤→「尿毒肺」(尿毒性肺水腫)，透析可改善。","options":{"A":"對：尿毒肺。","B":"SLE應ANA/補體異常。","C":"Wegener應ANCA陽性。","D":"Goodpasture應anti-GBM陽性。","E":"顯微多血管炎應ANCA陽性。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（肺腎症候群鑑別）","Brenner & Rector’s The Kidney, 11e（uremic lung）"]}},"103-腎-8":{"quick":"正解(E=1+3)：等張食鹽水(±碳酸氫鈉)＋NAC。","detail":{"background":"CKD心導管前預防CIN：等張食鹽水容積擴充(±碳酸氫鈉)、導管前後給N-acetylcysteine(出題年常用)。預防性血液透析「不」能預防CIN(2錯)；將ARB換成cyclosporin-A荒謬(cyclosporin本身腎毒，4錯)。","options":{"A":"含2、4錯。","B":"含4錯。","C":"含4錯。","D":"(5)敘述不全。","E":"對：(1)水化+(3)NAC。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CIN預防）","Brenner & Rector’s The Kidney, 11e（CA-AKI prevention）"]}},"103-腎-9":{"quick":"正解(C除外)：年輕女性單純復發性膀胱炎不需IVP/CT影像。","detail":{"background":"年輕健康女性復發性「單純」膀胱炎：可再給3–5日TMP-SMX；無效或惡化再尿培養調整；可低劑量睡前預防性抗生素3–6個月；多喝水、養成適時排尿。單純復發性膀胱炎不需IVP/CT影像(無複雜因子)。　補充：年輕女性單純復發性膀胱炎多為大腸桿菌；可考慮性行為後或低劑量睡前預防性抗生素，並衛教多喝水、排尿後排空、避免憋尿；複雜因子(發燒、腰痛、結石)才需影像。","options":{"A":"再給短療程TMP-SMX，合理。","B":"無效再培養調整，合理。","C":"除外(即答案)：不需IVP/CT。","D":"預防性低劑量抗生素，合理。","E":"多喝水/排尿習慣，合理。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（復發性膀胱炎）","Brenner & Rector’s The Kidney, 11e（recurrent UTI）"]}},"103-腎-10":{"quick":"正解(B)：感冒同步(數天內)茶色尿、補體正常→IgA腎病。","detail":{"background":"感冒後數天內(synpharyngitic)出現肉眼血尿、補體C3/C4正常→IgA腎病；感染後GN(post-strep)為1–2週潛伏期且C3「低」，可資鑑別。　補充：IgA腎病的synpharyngitic特性(感染同時或1–2天內血尿)與感染後腎炎(1–2週潛伏、C3低)鑑別關鍵在時序與補體；IgA腎病補體正常、血清IgA可升。","options":{"A":"膜性以腎病症候群表現。","B":"對：IgA腎病(同步血尿、補體正常)。","C":"顯微多血管炎應ANCA陽性。","D":"MPGN補體低。","E":"FSGS以蛋白尿為主。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（IgA腎病 vs 感染後GN）","Brenner & Rector’s The Kidney, 11e（synpharyngitic hematuria）"]}},"103-腎-11":{"quick":"正解(C無關)：fetuin-A是鈣化「抑制」因子，應為「低」而非高。","detail":{"background":"透析病人calciphylaxis/血管鈣化機轉：高PTH、高鈣磷乘積、高FGF-23、血管中內膜鈣化。fetuin-A為循環中鈣化「抑制」蛋白，calciphylaxis時為「低」fetuin-A，故「高fetuin-A」與其無關。","options":{"A":"高PTH相關。","B":"高鈣磷乘積相關。","C":"無關(即答案)：應為低fetuin-A。","D":"高FGF-23相關。","E":"血管壁鈣化相關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（calciphylaxis/CKD-MBD）","Brenner & Rector’s The Kidney, 11e（vascular calcification, fetuin-A）"]}},"103-腎-12":{"quick":"正解(D=1+4)：三四成CKD在第五期前已罹/死於CVD；低白蛋白與透析死亡率相關。","detail":{"background":"CKD心血管疾病：>30–40%病人在進展至第五期前已罹患或死於CVD(1對)；CVD是各期CKD前位罹病/死因(非只第三至五期，2錯)；透析CVD死亡主要為猝死/心律不整(非只急性心肌梗塞，3錯)；低白蛋白血症與透析死亡率相關(4對)；尿毒性低壓性肺水腫透析/超過濾「有效」(5錯)。","options":{"A":"含2、3、5錯。","B":"含2、3錯。","C":"含3錯。","D":"對：(1)+(4)。","E":"含5錯。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD與心血管）","Brenner & Rector’s The Kidney, 11e（CVD in CKD）"]}},"103-腎-13":{"quick":"正解(E=1+2+5)：抗體媒介排斥(C4d+)→血漿置換+IVIG+anti-CD20(rituximab)。","detail":{"background":"移植後C4d螢光陽性→抗體媒介性排斥(AMR)。治療：血漿置換(去抗體)、IVIG、anti-CD20單株抗體(rituximab，抑制B細胞/漿細胞)。OKT3(anti-CD3)與daclizumab(anti-CD25)針對T細胞媒介排斥，非AMR首選。","options":{"A":"含(3)(4)為T細胞性用藥。","B":"含(3)。","C":"含(3)。","D":"含(3)(4)。","E":"對：(1)血漿置換+(2)IVIG+(5)anti-CD20。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（抗體媒介排斥）","Brenner & Rector’s The Kidney, 11e（antibody-mediated rejection, C4d）"]}},"103-腎-14":{"quick":"正解(D無關)：抗suPAR抗體與FSGS相關，非膜性腎病。","detail":{"background":"膜性腎病(MN)關聯：梅毒、B/C型肝炎、抗PLA2R抗體(原發性MN主要自體抗原)、惡性腫瘤。抗suPAR(soluble urokinase plasminogen activator receptor)與「FSGS」相關，與MN無關。","options":{"A":"梅毒相關。","B":"B/C肝炎相關。","C":"抗PLA2R為MN主要抗原。","D":"無關(即答案)：抗suPAR與FSGS相關。","E":"惡性腫瘤相關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（膜性腎病/PLA2R）","Brenner & Rector’s The Kidney, 11e（membranous nephropathy）"]}},"103-腎-15":{"quick":"正解(A=1+2)：全球感染相關腎炎以瘧疾與血吸蟲最主要、最常見。","detail":{"background":"就全世界(尤其開發中地區)而言，與感染相關之腎絲球腎炎以瘧疾(Malaria)與血吸蟲(Schistosomiasis)最主要且最常見。HIV、B/C肝炎亦相關但非全球之最。　補充：全球觀點下感染相關腎絲球病以瘧疾(quartan malaria腎病症候群)與血吸蟲最普遍，反映流行地區疾病負擔；已開發國家則以B/C肝炎、HIV相關較常見。","options":{"A":"對：瘧疾+血吸蟲。","B":"HIV+B肝非全球之最。","C":"B/C肝炎非全球之最。","D":"HIV+B肝非。","E":"瘧疾+HIV非最佳組合。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（感染相關腎炎）","Brenner & Rector’s The Kidney, 11e（infection-related GN）"]}},"103-腎-16":{"quick":"正解(D為錯)：淋病抗藥性主因非「高度突變性」之單一說法。","detail":{"background":"淋病(白血球內革蘭氏陰性雙球菌)：屬第三類法定傳染病；NAAT已核准確診；常合併披衣菌→同時給doxycycline/azithromycin；CDC因抗藥性不建議用quinolone。抗藥性機轉為質體/染色體多重機制，非單純「高度突變性」所致(D敘述為錯)。","options":{"A":"第三類法定傳染病，正確。","B":"NAAT確診，正確。","C":"合併披衣菌共治，正確。","D":"錯誤(即答案)：抗藥性非單純高突變所致。","E":"CDC不建議quinolone，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（淋病/性傳染病）","CDC STI治療指引"]}},"103-腎-17":{"quick":"正解(B為錯)：結節硬化症之血管平滑肌脂肪瘤多數「不會」進展到需透析。","detail":{"background":"兩側腎囊腫＋血管平滑肌脂肪瘤(angiomyolipoma)＋家族＋CNS問題＋可能嗜鉻細胞瘤→結節硬化症(tuberous sclerosis，部分鑑別VHL)。需定期影像追蹤；腫瘤>3–4 cm建議處理(出血風險)；可有CNS病灶；多數腎功能不至於進展到透析，故B為錯。","options":{"A":"定期影像追蹤，正確。","B":"錯誤(即答案)：多數不會進展到需透析。","C":">3 cm建議處理，正確。","D":"可有CNS問題，正確。","E":"可能合併嗜鉻細胞瘤，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（結節硬化症/AML）","Brenner & Rector’s The Kidney, 11e（tuberous sclerosis）"]}},"103-腎-18":{"quick":"正解(B為錯)：FGF-23促進排磷但「抑制」(非促進)1,25-vitamin D生成。","detail":{"background":"FGF-23促進腎臟排磷，並「抑制」1α-hydroxylase→減少1,25-(OH)₂D生成(B敘述「促進vitamin D製造」為錯)。CKD病人25-OH vitD低與全因死亡率增加；維生素D缺乏增加糖尿病/心臟病/高血壓風險；vitD不足→副甲狀腺VDR減少、PTH上升；活化在近端腎小管1α-hydroxylase。","options":{"A":"低25-OH vitD↑死亡率，正確。","B":"錯誤(即答案)：FGF-23抑制vitD生成。","C":"vitD缺乏增多種疾病風險，正確。","D":"vitD不足→PTH上升，正確。","E":"近端小管1α-hydroxylase活化，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD與維生素D/FGF-23）","Brenner & Rector’s The Kidney, 11e（vitamin D metabolism）"]}},"103-腎-19":{"quick":"正解(C最罕見)：陣發性夜間血紅素尿(PNH)轉為急性骨髓性白血病最罕見。","detail":{"background":"陣發性夜間血紅素尿(PNH)：後天溶血性貧血、再生不良性貧血、靜脈血栓、血紅素尿/含鐵血黃素尿常見。轉化為急性骨髓性白血病最罕見。　補充：PNH因GPI錨蛋白缺失(CD55/CD59)致補體介導血管內溶血，臨床有夜間血紅素尿、血栓(尤腹腔/腦靜脈)與骨髓衰竭；流式細胞測GPI錨蛋白確診，eculizumab可治療。","options":{"A":"後天溶血性貧血，常見。","B":"再生不良性貧血，常見。","C":"最罕見(即答案)：轉AML。","D":"靜脈血栓，常見。","E":"血紅素/含鐵血黃素尿，常見。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（PNH）","Brenner & Rector’s The Kidney, 11e（PNH與腎）"]}},"103-腎-20":{"quick":"正解(D為錯)：糖尿病微量白蛋白尿「具」家族/遺傳傾向。","detail":{"background":"糖尿病微量白蛋白尿意義：代表腎絲球超過濾已存在並開始衰退；心血管罹病/死亡風險增加；過半合併視網膜病變與高血壓。具遺傳/家族傾向，故D「不具遺傳性」為錯。　補充：糖尿病微量白蛋白尿是腎病變早期且為全身內皮功能障礙標記，預示心血管事件升高；多伴視網膜病變與高血壓，並具家族遺傳傾向，須積極控糖控壓加ACEi/ARB。","options":{"A":"超過濾已存在並衰退，正確。","B":"心血管風險增加，正確。","C":"過半有視網膜病變，正確。","D":"錯誤(即答案)：具家族遺傳傾向。","E":"過半有高血壓，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病微量白蛋白尿）","Brenner & Rector’s The Kidney, 11e（diabetic nephropathy）"]}},"103-腎-21":{"quick":"正解(A為錯)：心腎症候群亦常見於左心室收縮功能「正常」(HFpEF/靜脈鬱血)者。","detail":{"background":"心腎症候群：可發生於左心室收縮功能正常者(HFpEF、靜脈鬱血)，並非很少；心衰竭因腎靜脈壓上升→GFR下降；ADH分泌增加；CKD維生素D缺乏致心肌肥厚；adenosine上升→GFR下降、鈉回收增加。","options":{"A":"錯誤(即答案)：收縮功能正常者亦常見。","B":"腎靜脈壓上升→GFR降，正確。","C":"ADH增加，正確。","D":"vitD缺乏→心肌肥厚，正確。","E":"adenosine→GFR降、鈉回收增，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（心腎症候群）","Brenner & Rector’s The Kidney, 11e（cardiorenal syndrome）"]}},"103-腎-22":{"quick":"正解(C)：高血壓+低鉀+低腎素高醛固酮、食鹽水不被抑制→原發性醛固酮增多症。","detail":{"background":"高血壓+低血鉀+代謝性鹼中毒，血漿腎素活性極低(0.07)、醛固酮高(43.7)且輸2L生理鹽水後醛固酮「不被抑制」(仍19)→原發性醛固酮增多症(Conn症)。利尿劑會高腎素；CAH/Cushing/甘草各有其他特徵。","options":{"A":"利尿劑→高腎素。","B":"CAH有特定酶缺陷型態。","C":"對：原發性醛固酮增多症(醛固酮不被抑制)。","D":"Cushing有皮質醇過多特徵。","E":"甘草為低腎素低醛固酮(假性醛固酮)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（原發性醛固酮增多症）","Brenner & Rector’s The Kidney, 11e（primary aldosteronism, saline suppression）"]}},"104-腎-1":{"quick":"正解(B=2+5)：血壓正常之低鉀代謝性鹼中毒、腎性失鉀、高腎素高醛固酮→Bartter或長期loop利尿劑。","detail":{"background":"24歲女性：低血鉀(2.6)、代謝性鹼中毒(pH 7.53、HCO₃⁻ 41)、TTKG 11.74(腎性失鉀)、腎素25.8↑、醛固酮64.4↑、血壓正常。Bartter影響亨利氏環粗段Na-K-2Cl(同loop利尿劑)，故臨床表現與「長期過度使用loop利尿劑」相同；Gitelman/thiazide作用在遠曲小管NCC。Fanconi為近端小管多重再吸收缺陷(可有酸中毒，不符鹼中毒)。","options":{"A":"含(1)Fanconi(近端、酸中毒)不符。","B":"對：(2)Bartter+(5)長期loop利尿劑(同NKCC2)。","C":"含(3)(4)為遠曲小管/thiazide型。","D":"含(4)thiazide型。","E":"含(3)Gitelman型。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（Bartter/Gitelman）","Brenner & Rector’s The Kidney, 11e（鹽流失性腎小管病）"]}},"104-腎-2":{"quick":"正解(D=1+2+5)：疑類澱粉/輕鏈→血/尿免疫固定電泳＋血清游離輕鏈敏感度近100%。","detail":{"background":"老年眼眶周圍自發紫斑(raccoon eyes)＋大量蛋白尿→疑AL類澱粉沉積/漿細胞病。診斷敏感度最高組合為血清免疫固定電泳(1)＋尿免疫固定電泳(2)＋血清游離輕鏈分析(5)，三者合用敏感度接近100%；單做血清蛋白電泳或尿Bence Jones敏感度較低。","options":{"A":"蛋白電泳+BJP敏感度不足。","B":"含(3)(4)敏感度較低。","C":"未含血清免疫固定電泳組合。","D":"對：(1)+(2)+(5)免疫固定電泳＋游離輕鏈。","E":"含(3)(4)敏感度較低。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（類澱粉/輕鏈診斷）","Brenner & Rector’s The Kidney, 11e（AL amyloidosis）"]}},"104-腎-3":{"quick":"正解(C=4+5)：α-blocker(tamsulosin)與CCB(nifedipine)為輸尿管結石之medical expulsive therapy。","detail":{"background":"醫學排石治療(MET)：α-阻斷劑(tamsulosin)鬆弛輸尿管下段平滑肌、鈣離子阻斷劑(nifedipine)亦有助排石(以α-blocker證據較強)。thiazide用於預防鈣石「形成」(非排石)，loop利尿劑、β-blocker無排石作用。","options":{"A":"thiazide/loop非排石。","B":"β-blocker無排石作用。","C":"對：(4)α-blocker+(5)CCB。","D":"含β-blocker。","E":"含loop。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（輸尿管結石MET）","Brenner & Rector’s The Kidney, 11e（medical expulsive therapy）"]}},"104-腎-4":{"quick":"正解(A=1+3錯)：CKD 3b應轉腎臟科；嚴控血糖仍能降部分心血管風險。","detail":{"background":"糖尿病腎病變(eGFR 42=CKD 3b、蛋白尿3+、高鉀)。(1)錯：3b期(尤其蛋白尿/高鉀)應轉腎臟專科。(2)對：高血壓代表腎功能將持續惡化。(3)錯：嚴格控糖仍可降低部分(尤其微血管)併發症。(4)對：嚴控血壓(含ACEi/ARB)可減緩腎病變與視網膜病變。(5)對：高血壓/蛋白尿出現後血糖更難控制。","options":{"A":"對(即答案，皆為錯誤敘述)：(1)+(3)。","B":"(2)(5)為正確敘述。","C":"(2)正確。","D":"(4)(5)正確。","E":"(5)正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病腎病變照護）","Brenner & Rector’s The Kidney, 11e（CKD轉診/血糖）","KDIGO CKD轉診建議"]}},"104-腎-5":{"quick":"正解(A=僅2)：非鈣基磷結合劑不加重血管鈣化。","detail":{"background":"CKD血管鈣化：含鈣磷結合劑(1)、維生素D(3)、高鈣透析液(4)增加鈣負荷→加重鈣化；warfarin(5)抑制matrix Gla protein→促進血管鈣化。僅「非鈣基(non-calcium-based)磷結合劑(2)」(如sevelamer、lanthanum)不加重鈣化。","options":{"A":"對：僅(2)非鈣基磷結合劑不加重鈣化。","B":"含(3)維生素D。","C":"含(5)warfarin。","D":"含(3)(4)。","E":"含(3)(5)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD-MBD/血管鈣化）","Brenner & Rector’s The Kidney, 11e（phosphate binders）"]}},"104-腎-6":{"quick":"正解(C=2+5)：digoxin與vancomycin腎排泄需調量，但分布體積大/蛋白結合高→血液透析難移除。","detail":{"background":"主要經腎排泄、腎功能差需調量，但「血液透析難以移除」者：digoxin(分布體積極大)、vancomycin(分子大、蛋白結合，標準間歇HD移除有限)。aspirin、lithium、tobramycin則可被透析移除(lithium甚至以HD治療中毒)。","options":{"A":"aspirin可透析移除。","B":"含lithium(可透析)。","C":"對：(2)digoxin+(5)vancomycin。","D":"tobramycin可透析。","E":"lithium可透析。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（藥物與透析清除）","Brenner & Rector’s The Kidney, 11e（dialyzability）"]}},"104-腎-7":{"quick":"正解(A=1+2)：calcineurin/mTOR抑制劑與避孕藥/clopidogrel→TTP/HUS(血栓性微血管病)。","detail":{"background":"移植服用tacrolimus(calcineurin抑制劑)、sirolimus(mTOR抑制劑)，加上避孕藥、clopidogrel→易誘發血栓性微血管病變(TTP/HUS)。Goodpasture、HSP、顯微多血管炎與這些藥物無此關聯。","options":{"A":"對：(1)TTP+(2)HUS。","B":"(3)(4)無關。","C":"(3)(5)無關。","D":"含(3)無關。","E":"含(5)無關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（藥物相關TMA）","Brenner & Rector’s The Kidney, 11e（calcineurin inhibitor TMA）"]}},"104-腎-8":{"quick":"正解(B=1+3不可能)：兩側腎萎縮(9 cm)不符骨髓瘤腎與糖尿病腎病變(早期腎多偏大/正常)。","detail":{"background":"兩側腎「萎縮」(各9 cm)＋貧血＋蛋白尿+血尿→慢性病程。骨髓瘤腎(1)與糖尿病腎病變(3)在病程中腎臟多「正常或偏大」，與萎縮不符，故為不可能。中草藥腎病(4)、lithium腎病(5)等慢性小管間質病變則腎縮小。","options":{"A":"含(2)。","B":"對(即答案)：(1)骨髓瘤腎+(3)糖尿病腎病變腎不萎縮。","C":"含(2)。","D":"含(5)(可致萎縮)。","E":"含(5)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎臟大小與病因）","Brenner & Rector’s The Kidney, 11e（kidney size in CKD）"]}},"104-腎-9":{"quick":"正解(B=1+2+4)：第IV型狼瘡腎誘導期—高劑量cyclophosphamide或MMF＋甲基培尼松龍脈衝。","detail":{"background":"第IV型(增生型)狼瘡腎誘導治療(出題年實證)：靜脈高劑量類固醇脈衝(methylprednisolone)＋以cyclophosphamide或mycophenolate mofetil(MMF)為誘導，療效佳、MMF副作用較少。Rituximab非第一線誘導；cyclosporine/azathioprine多為維持期。","options":{"A":"含(3)Rituximab非首選。","B":"對：(1)cyclophosphamide+(2)類固醇脈衝+(4)MMF。","C":"含(3)(5)。","D":"含(3)(6)。","E":"含(5)(6)維持期藥。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（狼瘡腎誘導治療）","Brenner & Rector’s The Kidney, 11e（lupus nephritis）","ACR 2012/ALMS試驗(MMF)"]}},"104-腎-10":{"quick":"正解(A=1+2)：naproxen與ibuprofen會干擾aspirin的抗血小板作用。","detail":{"background":"低劑量aspirin抗血小板需與COX-1的Ser529不可逆乙醯化。naproxen、ibuprofen可逆地佔據COX-1而「阻擋」aspirin結合→干擾其心血管保護作用(須錯開服用時間)。COX-2抑制劑、acetaminophen、diclofenac此交互作用較不顯著。","options":{"A":"對：(1)naproxen+(2)ibuprofen干擾aspirin。","B":"含(4)acetaminophen。","C":"含(3)(4)。","D":"含(4)(5)。","E":"含(3)(4)(5)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（NSAID與aspirin交互作用）","Brenner & Rector’s The Kidney, 11e（NSAID）"]}},"104-腎-11":{"quick":"正解(C=1+4不適當)：CCB/β-blocker中毒不應只給大量生理鹽水，鎂並非特殊解毒。","detail":{"background":"CCB＋β-blocker過量致低血壓、心搏過緩、AV block。特殊處置：glucagon、升壓/強心劑、高劑量胰島素(配葡萄糖、鉀)、必要時電氣節律，並隨時監測血糖與鉀。單給「大量生理鹽水(1)」無法矯正心因性低血壓且可致肺水腫；「鎂(4)」非此中毒之特殊解毒(反可能加重傳導阻滯/低血壓)，故(1)+(4)不適當。","options":{"A":"含(2)(7)為適當。","B":"含(6)(7)適當。","C":"對：(1)大量生理鹽水+(4)鎂不適當。","D":"(6)(7)適當。","E":"含(6)適當。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CCB/β-blocker中毒）","Brenner & Rector’s The Kidney, 11e（毒物與腎）","高劑量胰島素療法(HIET)"]}},"104-腎-12":{"quick":"正解(B最不適合)：妊娠禁用ACEi(致畸/胎兒腎毒)。","detail":{"background":"IgA腎病孕婦高血壓：可用methyldopa、labetalol、長效nifedipine、hydralazine。ACEi妊娠禁用(致畸、胎兒腎發育不良、羊水過少)，不可用於「預防子癇前症/降蛋白尿」。","options":{"A":"methyldopa適合。","B":"最不適合(即答案)：ACEi妊娠禁用。","C":"labetalol適合。","D":"長效nifedipine適合。","E":"hydralazine適合。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（妊娠高血壓）","Brenner & Rector’s The Kidney, 11e（pregnancy & ACEi）"]}},"104-腎-13":{"quick":"正解(B為不正確)：高凝是因antithrombin III「減少」與凝血因子增加，非antithrombin III「增加」。","detail":{"background":"腎病症候群惡化(蛋白尿10.6 g/天)併靜脈栓塞：因尿失antithrombin III(降低)、protein C/S相對失衡、凝血因子增加→高凝(可發生DVT/腎靜脈栓塞)。先以超音波篩檢，必要時CT/MRI；以heparin/warfarin治療。B敘述「血小板增加或antithrombin III活性增加」為錯。","options":{"A":"可發生DVT/腎靜脈栓塞。","B":"不正確(即答案)：應為antithrombin III「減少」。","C":"protein C/S減少可致高凝。","D":"先超音波、必要時CT/MRI。","E":"heparin/warfarin治療。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎病症候群高凝）","Brenner & Rector’s The Kidney, 11e（hypercoagulability）"]}},"104-腎-14":{"quick":"正解(C)：年輕女性蛋白尿+血尿+補體C3/C4皆低→感染後(鏈球菌)腎炎。","detail":{"background":"低補體(C3且C4皆低)＋蛋白尿+血尿+腎功能異常→急性感染後(鏈球菌)腎炎(經典低補體腎炎)。IgA、HSP、mesangial增生、FSGS補體多「正常」，故不符。　補充：感染後(鏈球菌)腎炎血清補體C3於發病初期下降、約6–8週恢復；典型為前驅咽炎/膿疱疹後1–2週的血尿、水腫、高血壓與少尿，多自限。","options":{"A":"IgA補體正常。","B":"HSP補體正常。","C":"對：感染後鏈球菌腎炎(低補體)。","D":"mesangial增生補體正常。","E":"FSGS補體正常。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低補體腎炎/PSGN）","Brenner & Rector’s The Kidney, 11e（post-infectious GN）"]}},"104-腎-15":{"quick":"正解(A較不適用)：aminoglycoside對腎囊泡穿透差。","detail":{"background":"多囊腎囊泡感染：應選對囊泡穿透佳的「脂溶性」抗生素——fluoroquinolone、TMP-SMX、clindamycin、metronidazole、紅黴素類。aminoglycoside(親水性)對囊泡穿透差，較不適用。","options":{"A":"較不適用(即答案)：aminoglycoside穿透差。","B":"clindamycin穿透佳。","C":"ampicillin/erythromycin可考量。","D":"fluoroquinolone穿透佳(首選)。","E":"metronidazole穿透佳。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（多囊腎囊泡感染）","Brenner & Rector’s The Kidney, 11e（cyst infection抗生素穿透）"]}},"104-腎-16":{"quick":"正解(A)：低鈉、尿滲透壓>100、尿鈉>30、等容積→SIADH。","detail":{"background":"血鈉120、尿滲透壓>280(>100，無法稀釋)、尿鈉32(>30)、等容積→SIADH。原發性多渴尿滲透壓會很低(<100)；肝硬化/心衰竭/腎病症候群為「低容積有效循環」，尿鈉多偏低。　補充：SIADH診斷需等容積低血鈉、尿滲透壓不當偏高(>100)、尿鈉>30、且甲狀腺與腎上腺功能正常；治療以限水為主，必要時用vaptan或高張鹽水(矯正勿過快防滲透性脫髓鞘)。","options":{"A":"對：SIADH(尿濃縮、尿鈉高、等容積)。","B":"原發性多渴尿滲透壓<100。","C":"肝硬化尿鈉低。","D":"心衰竭尿鈉低。","E":"腎病症候群尿鈉低。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（SIADH診斷）","Brenner & Rector’s The Kidney, 11e（hyponatremia workup）"]}},"104-腎-17":{"quick":"正解(D)：膜性腎病屬非腎病範圍蛋白尿、腎功能穩定→先ACEi控壓，暫不需免疫抑制。","detail":{"background":"膜性腎病(MN)危險分層：蛋白尿1.6 g/天(非腎病範圍)、白蛋白正常、Cr穩定、無水腫→「低危」。處置以ACEi/ARB控壓抗蛋白尿、觀察(約30%自發緩解)，尚不需類固醇/免疫抑制；高危(大量蛋白尿/腎功能惡化)才考慮免疫治療。","options":{"A":"低危不需高劑量類固醇。","B":"尚不需calcineurin抑制劑。","C":"尚不需單用MMF。","D":"對：暫不需免疫抑制，先ACEi控壓觀察。","E":"無須立即再切片。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（膜性腎病處置/危險分層）","Brenner & Rector’s The Kidney, 11e（membranous nephropathy）","KDIGO腎絲球疾病指引"]}},"104-腎-18":{"quick":"正解(C)：CKD晚期打gadolinium後出現皮膚/肌肉硬痛→腎源性全身性纖維化(NSF)。","detail":{"background":"eGFR 18之CKD病人接受含釓(gadolinium)顯影MRI後出現寡尿、全身肌肉皮膚疼痛/硬化→腎源性全身性纖維化(NSF)。故重度CKD/透析病人應避免使用高風險釓劑。　補充：腎源性全身性纖維化(NSF)與線性釓劑、重度腎功能不全(eGFR<30)相關，皮膚硬化可累及關節與內臟；故此族群應避用高風險釓劑或改以其他影像。","options":{"A":"ATN不致皮膚肌肉纖維硬化。","B":"橫紋肌溶解有CK升高、肌紅蛋白尿。","C":"對：腎源性全身性纖維化(NSF)。","D":"阻塞性AKI有水腎。","E":"脫水性AKI無皮膚纖維化。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（NSF/釓劑）","Brenner & Rector’s The Kidney, 11e（nephrogenic systemic fibrosis）"]}},"104-腎-19":{"quick":"正解(B=1+3+5)：慢性小管間質腎炎可見嗜伊紅尿、顆粒管型、無症狀膿尿/血尿。","detail":{"background":"慢性小管間質腎炎尿液特徵：Hansel染色見嗜伊紅尿(1)、顆粒管型(3)、潛血+與膿尿(WBC 40–50/HPF)但無泌尿道症狀(5，無菌性膿尿)；蛋白尿多<1–2 g/天(非>1–2，故4不符)；可無WBC cast(但題項2敘述為「沒見到WBC cast」屬可變，非本題最佳組合)。","options":{"A":"含(4)蛋白尿過量、(2)不確定。","B":"對：(1)+(3)+(5)。","C":"含(4)。","D":"含(4)。","E":"含(4)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（小管間質腎炎尿液）","Brenner & Rector’s The Kidney, 11e（tubulointerstitial nephritis）"]}},"104-腎-20":{"quick":"正解(C=2+3)：長期PD腸壁鈣化包覆→包囊性腹膜硬化症(EPS)，可用tamoxifen/類固醇。","detail":{"background":"長期(15年)PD、透析液清澈(WBC<100)、腸阻塞＋腸壁鈣化被鈣化臟層腹膜包覆→包囊性腹膜硬化症(EPS)，非感染性腹膜炎。治療可用tamoxifen、免疫抑制劑(類固醇)，並停PD改HD、營養支持/手術。β-blocker無關；繼續高糖透析/增加灌洗會「惡化」EPS。","options":{"A":"含(1)感染、(5)繼續PD(惡化)。","B":"含(1)(5)。","C":"對：(2)EPS+(3)tamoxifen/類固醇。","D":"含(4)β-blocker。","E":"含(5)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（包囊性腹膜硬化症）","Brenner & Rector’s The Kidney, 11e（encapsulating peritoneal sclerosis）"]}},"104-腎-21":{"quick":"正解(A除外)：2015台灣高血壓指引初評不常規做腎臟超音波。","detail":{"background":"2015台灣高血壓指引新診斷者例行檢查：尿液、Cr、血脂、Hb/Hct、尿酸、空腹血糖、ECG/胸部X光。腎臟超音波非常規初評(有腎病/續發性高血壓線索才安排)，故除外。　補充：2015台灣高血壓指引強調居家/24小時血壓量測與心血管風險分層；初評著重標的器官(ECG、尿白蛋白)與代謝危險(血脂、血糖、尿酸)，影像非例行。","options":{"A":"除外(即答案)：腎臟超音波非常規。","B":"Hb/Hct，建議。","C":"尿酸，建議。","D":"空腹血糖，建議。","E":"ECG/胸部X光，建議。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血壓初評）","2015台灣高血壓治療指引(TSOC/THS)"]}},"104-腎-22":{"quick":"正解(B)：矯正低鉀時，TPP比HNPP更常發生反彈性高血鉀。","detail":{"background":"甲狀腺毒症週期性麻痺(TPP)的低血鉀是鉀「移入細胞內」(體內總鉀不缺)，故補鉀時細胞外鉀回升＋外加補充→更易「反彈性高血鉀」；矯正所需補鉀量通常「較少」。HNPP常為真性缺鉀(體內總鉀不足)。　補充：甲狀腺毒症週期性麻痺好發亞洲年輕男性，發作時鉀移入細胞致低血鉀但體內總鉀不缺，故補鉀宜保守並用β-blocker(propranolol)，根治需控制甲狀腺機能。","options":{"A":"錯：TPP需補的鉀較「少」。","B":"對：TPP矯正時更常反彈性高血鉀。","C":"錯：paradoxical hypokalemia兩者皆可，非TPP更常。","D":"錯：TPP之paradoxical hypokalemia與β-腎上腺/胰島素驅動鉀入細胞有關，非低容積/腎素-醛固酮。","E":"錯：HNPP與高血壓/β-blocker預防無此關係。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（甲狀腺毒症週期性麻痺）","Brenner & Rector’s The Kidney, 11e（鉀跨細胞分布）"]}},"105-腎-1":{"quick":"正解(D=2+3+4)：安排24h ABPM、加利尿劑並篩次發性高血壓、減重＋每日CPAP。","detail":{"background":"頑固型高血壓(>3種含利尿劑仍未達標)：應做24小時動態血壓(排除白袍/評估夜間)、加上利尿劑並篩次發性病因(此例有OSA、NSAID、可能腎血管)、減重＋確實每日CPAP。改用「選擇性COX-2抑制劑對血壓無影響」錯誤(COX-2亦致鈉滯留升壓)；腎交感神經燒灼術當年(SYMPLICITY HTN-3陰性)不建議常規。","options":{"A":"含1(COX-2錯)。","B":"含1、缺2。","C":"含1、5。","D":"對：2+3+4。","E":"含1。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（頑固型高血壓）","Brenner & Rector’s The Kidney, 11e（resistant HTN）","SYMPLICITY HTN-3(腎神經燒灼陰性)"]}},"105-腎-2":{"quick":"正解(B=1+3+4)：尿/血培養、影像、口服fluoroquinolone 2–4週(急性細菌性攝護腺炎)。","detail":{"background":"膀胱鏡後急性細菌性攝護腺炎(發燒、解尿痛、PSA升高)：應做尿/血培養、腎膀胱攝護腺超音波、給能滲透攝護腺之口服fluoroquinolone 2–4週。Nitrite陽性多代表腸內菌(E. coli等)非Pseudomonas(Pseudomonas常nitrite陰性)；nitrofurantoin不滲透攝護腺，不用於攝護腺炎。","options":{"A":"含2(Pseudomonas錯)、缺3。","B":"對：1+3+4。","C":"含2。","D":"含5(nitrofurantoin不滲攝護腺)。","E":"含2、5。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（急性細菌性攝護腺炎）","Brenner & Rector’s The Kidney, 11e（prostatitis）"]}},"105-腎-3":{"quick":"正解(C=1+2+5)：CKD降尿酸藥減量起始、停thiazide、目標尿酸<6。","detail":{"background":"CKD痛風(有tophi、eGFR 33)：開始allopurinol/febuxostat但CKD須減量(1)；停thiazide(升尿酸且增allopurinol毒性，2)；降尿酸目標<6 mg/dL(有tophi可<5，5)。低劑量aspirin其實「減少」尿酸排泄(故3錯)；剛起始降尿酸時應併colchicine預防發作(故4「不必colchicine」錯)。","options":{"A":"含3(低劑量aspirin減排尿酸，錯)。","B":"含3。","C":"對：1+2+5。","D":"含3。","E":"含4(應併colchicine預防)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD痛風治療）","Brenner & Rector’s The Kidney, 11e（urate-lowering in CKD）","ACR痛風指引(目標<6)"]}},"105-腎-4":{"quick":"正解(E)：硬皮症腎危象兩年仍透析者可考慮腎移植(存活尚可、少復發)。","detail":{"background":"雷諾現象＋皮膚硬化＋吞嚥困難＋新發高血壓＋急性腎衰竭(Cr 1.2→2.8)→硬皮症腎危象(SRC)。治療首選ACEi(非類固醇)；高劑量類固醇增加SRC；normotensive SRC預後「差」；anti-Scl70與ILD相關、非預後好；anti-RNA pol III才是SRC marker。兩年仍依賴透析者可建議腎移植(存活尚可、復發少)。","options":{"A":"錯：治療首選ACEi非類固醇。","B":"錯：預防性ACEi未證實可預防。","C":"錯：normotensive SRC預後差。","D":"錯：Scl70非預後好之指標。","E":"對：兩年仍透析可考慮腎移植。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（硬皮症腎危象）","Brenner & Rector’s The Kidney, 11e（scleroderma renal crisis）"]}},"105-腎-5":{"quick":"正解(C=2+4)：缺鐵性貧血與CKD會使HbA1c假性「偏高」。","detail":{"background":"HbA1c假性「偏高」：缺鐵性貧血(紅血球壽命延長)、CKD/尿毒(carbamylation)。溶血性貧血、慢性肝病(紅血球更新快/壽命短)→假性「偏低」；高劑量維生素C依方法可偏高或偏低。　補充：HbA1c反映約120天平均血糖，受紅血球壽命影響：壽命延長(缺鐵、CKD carbamylation)假性偏高；壽命縮短(溶血、肝病、近期輸血)假性偏低，此時宜用果糖胺評估。","options":{"A":"含1(溶血→偏低)。","B":"含1、3。","C":"對：2缺鐵+4 CKD→偏高。","D":"含3、5。","E":"含5(肝病→偏低)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（HbA1c干擾因素）","Brenner & Rector’s The Kidney, 11e（HbA1c in CKD）"]}},"105-腎-6":{"quick":"正解(E=3+4+5)：PSA篩檢限55–69歲、預估壽命>10–15年、加測free PSA可提高偵測。","detail":{"background":"PSA篩檢：特異度不佳(1錯)；PSA與攝護腺癌機率/預後「相關」(2錯)；建議僅55–69歲(USPSTF，利大於弊，3對)；預估壽命>10–15年才考慮(4對)；加測free PSA(低free%↑癌風險)可提高偵測(5對)。","options":{"A":"1、2皆錯。","B":"含2。","C":"含1、2。","D":"含2。","E":"對：3+4+5。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（PSA篩檢）","USPSTF PSA建議(55–69)"]}},"105-腎-7":{"quick":"正解(E=3+5)：可觸摸紫斑(palpable)＝血管炎→HSP、結節性多動脈炎。","detail":{"background":"可觸摸紫斑(palpable purpura)代表「血管炎/白血球破碎性血管炎」：HSP(IgA血管炎，3)、polyarteritis nodosa(5)。尿毒(血小板功能差)、TTP(血小板低)、Waldenström高球蛋白血症性紫斑皆為「不可觸摸」(non-palpable)。","options":{"A":"含1(尿毒，不可觸)。","B":"2、4不可觸。","C":"含2、4。","D":"含1。","E":"對：3+5可觸摸。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（紫斑鑑別/血管炎）","Brenner & Rector’s The Kidney, 11e（palpable purpura）"]}},"105-腎-8":{"quick":"正解(E=2+3+5)：補鈣與維生素D、bisphosphonate預防骨折、骨鬆可考慮teriparatide。","detail":{"background":"長期類固醇(即使10 mg/天)→類固醇性骨質疏鬆。應確保足量鈣與維生素D(2)、以bisphosphonate預防骨折(3)、定期DXA監測；已骨質疏鬆者可考慮合成副甲狀腺素teriparatide(5)。「劑量低不需處理(1)」與「不必每年DXA(4)」皆錯。","options":{"A":"含1。","B":"含1。","C":"含1、4。","D":"含1、4。","E":"對：2+3+5。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（類固醇性骨質疏鬆）","Brenner & Rector’s The Kidney, 11e（glucocorticoid-induced osteoporosis）","ACR GIOP指引"]}},"105-腎-9":{"quick":"正解(B=1+3+4)：運動性橫紋肌溶解,積極輸液維持尿量3 mL/kg/hr。","detail":{"background":"馬拉松後橫紋肌溶解(CK 13000、尿潛血+但沉渣無紅血球=肌球蛋白尿)：合併熱傷害時AKI風險高(1)；尿潛血+而無RBC代表肌球蛋白尿、可能AKI(3)；積極輸液維持尿量~3 mL/kg/hr直到潛血轉陰(4)。CK已13000即可診斷，不必「依賴肌球蛋白定量才能確診」(2錯)；尿液鹼化(碳酸氫鈉)有爭議。","options":{"A":"含2。","B":"對：1+3+4。","C":"含2。","D":"含5(鹼化爭議)。","E":"缺3。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（橫紋肌溶解/肌球蛋白尿AKI）","Brenner & Rector’s The Kidney, 11e（rhabdomyolysis）"]}},"105-腎-10":{"quick":"正解(D)：CKD進展風險隨GFR下降「與」白蛋白尿上升並進；3a期+中度白蛋白尿兩者皆異常。","detail":{"background":"KDIGO風險熱圖：CKD進展與心血管風險同時取決於eGFR分期「與」白蛋白尿分級，二者皆惡化時風險相乘最高。選項中只有D(第3a期＋中度增加白蛋白尿，G3a/A2)同時具「腎功能下降」與「白蛋白尿」兩項異常，整體進展風險最高。","options":{"A":"第1期正常白蛋白尿，風險低。","B":"3b但白蛋白尿正常。","C":"第2期(GFR近正常)雖白蛋白尿重，單一軸異常。","D":"對：3a＋中度白蛋白尿，兩軸皆異常。","E":"錯：第3期風險不會「不分白蛋白尿」皆相同。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD分期/預後）","KDIGO 2012 CKD heat map"]}},"105-腎-11":{"quick":"正解(B不屬於)：B型肝炎致膜性腎病/MPGN/PAN，非血栓性微血管病(TMA)。","detail":{"background":"造成腎臟血栓性微血管病(TMA，續發性FSGS病理)者：溶血性尿毒症候群(HUS)、惡性高血壓、抗磷脂症候群、骨髓移植後放射性腎病。B型肝炎相關腎病為膜性腎病/MPGN/結節性多動脈炎，非TMA。　補充：血栓性微血管病(TMA)病理見內皮腫脹、血栓與洋蔥皮樣血管病變，臨床有微血管病性溶血、血小板低與器官缺血；須鑑別TTP/HUS/惡性高血壓/抗磷脂與藥物相關。","options":{"A":"HUS屬TMA。","B":"不屬於(即答案)：HBV非TMA。","C":"惡性高血壓屬TMA。","D":"抗磷脂症候群屬TMA。","E":"放射性腎病屬TMA。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（血栓性微血管病）","Brenner & Rector’s The Kidney, 11e（TMA病因）"]}},"105-腎-12":{"quick":"正解(B)：膜性腎病大量蛋白尿＋腰痛/血尿/腎功能急降→腎靜脈栓塞。","detail":{"background":"膜性腎病(蛋白尿4.5 g/天)為高凝狀態，最易腎靜脈栓塞；突發腰痛、壓痛、血尿、腎功能急降即典型表現。　補充：膜性腎病高凝風險最高，腎靜脈栓塞可急性(腰痛、血尿、腎功能降)或慢性無症；確診靠CT/MR靜脈攝影，治療抗凝並控制蛋白尿。","options":{"A":"結石/UTI不致此高凝表現。","B":"對：腎靜脈栓塞。","C":"腎動脈狹窄不致急性腰痛血尿。","D":"惡性高血壓血壓極高為主。","E":"TMA有溶血/血小板低。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎靜脈栓塞）","Brenner & Rector’s The Kidney, 11e（renal vein thrombosis）"]}},"105-腎-13":{"quick":"正解(B除外)：高鉀/高鎂飲食「降低」結石風險,非增加。","detail":{"background":"增加腎結石風險之飲食：高動物性蛋白(A)、高鈉(C)、維生素C補充(草酸鈣，D)、含糖碳酸飲料(E)。富鉀/富鎂食物(蔬果)反而「降低」結石風險(增citrate、減鈣排泄)，故為除外。　補充：降低結石風險策略為足量水分、限鈉、適量(非高量)鈣質配餐、限動物性蛋白與草酸；高鉀高鎂蔬果增加尿枸櫞酸與鎂、降低鈣鹽過飽和而具保護性。","options":{"A":"高動物蛋白增風險。","B":"除外(即答案)：高鉀/鎂降風險。","C":"高鈉增風險。","D":"維生素C增草酸鈣石。","E":"含糖碳酸飲料增風險。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎結石飲食）","Brenner & Rector’s The Kidney, 11e（diet & nephrolithiasis）"]}},"105-腎-14":{"quick":"正解(B=1+5)：藥物過敏性AIN；診斷常不需腎切片。","detail":{"background":"用藥7天後發燒、皮疹、周邊嗜伊紅、寡尿性腎衰竭但「無蛋白尿」→典型藥物過敏性急性間質性腎炎(AIN)(1)；臨床即可診斷，多不需腎切片(5)。此典型過敏型「非」NSAID型(NSAID型常無發燒/皮疹、且有蛋白尿，2錯)；周邊嗜伊紅僅約⅓病人(3錯)；尿嗜伊紅敏感/特異度差(4錯)。","options":{"A":"含3、4。","B":"對：1+5。","C":"含3、4。","D":"含2(NSAID型)。","E":"含2、3、4。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（急性間質性腎炎）","Brenner & Rector’s The Kidney, 11e（drug-induced AIN）"]}},"105-腎-15":{"quick":"正解(A不正確)：鋰相關腎病多為「腎性尿崩/慢性小管間質病」，非寡尿性急性腎衰竭。","detail":{"background":"鋰(lithium)腎病：長期(>10–20年)或反覆中毒→慢性小管間質腎炎、腎性尿崩(多尿)，腎切片見間質纖維化與小管萎縮，並非以寡尿性急性腎衰竭表現(A錯)。處置以監測血鋰、調量；蛋白尿明顯時ACEi/ARB有助。","options":{"A":"不正確(即答案)：多為腎性尿崩/慢性病，非寡尿性ARF。","B":"長期/反覆中毒→慢性小管間質腎炎，正確。","C":"密切監測血鋰調量，正確。","D":"蛋白尿明顯時ACEi/ARB有助，正確。","E":"切片見間質纖維化/小管萎縮，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（鋰腎病）","Brenner & Rector’s The Kidney, 11e（lithium nephropathy）"]}},"105-腎-16":{"quick":"正解(E=1+4+5)：CKD礦物代謝—PTH升高、1,25-vitD減少、血鈣下降。","detail":{"background":"CKD礦物代謝：PTH升高(1)、1,25-(OH)₂D₃生成減少(4)、血鈣下降(5)。FGF-23為「升高」(非減少，2錯)；整體為磷「滯留」(腎排磷淨減少，3之「increased renal excretion」非CKD整體特徵)。","options":{"A":"含3。","B":"含2、缺5。","C":"含2、3。","D":"含2。","E":"對：1+4+5。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD-MBD）","Brenner & Rector’s The Kidney, 11e（mineral metabolism in CKD）"]}},"105-腎-17":{"quick":"正解(A)：原發性腎絲球疾病中補體下降者→冷凝球蛋白血症。","detail":{"background":"低補體之腎絲球疾病：冷凝球蛋白血症(常HCV相關)、感染後GN、狼瘡腎、MPGN。微小變化、IgA、FSGS、Wegener(ANCA)補體正常。　補充：低補體腎炎包含狼瘡腎、感染後GN、MPGN、冷凝球蛋白血症；補體正常之腎炎則有IgA、微小變化、FSGS、ANCA血管炎，補體狀態為重要分流線索。","options":{"A":"對：cryoglobulinemia補體低。","B":"微小變化補體正常。","C":"IgA補體正常。","D":"FSGS補體正常。","E":"Wegener補體正常。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低補體腎炎）","Brenner & Rector’s The Kidney, 11e（complement & GN）"]}},"105-腎-18":{"quick":"正解(D)：MRA為腎血管性高血壓篩檢敏感度最高。","detail":{"background":"腎血管性高血壓篩檢：磁振血管攝影(MRA)與CT血管攝影敏感度高，MRA最高(但CKD須注意釓劑)；都卜勒超音波依操作者；captopril腎核醫掃描在CKD/雙側病變敏感度差。　補充：腎血管性高血壓宜先非侵入性篩檢(都卜勒、CTA、MRA)，MRA敏感度高但CKD須注意釓劑；確診與血管重建仍以DSA為準，並非所有狹窄都需介入。","options":{"A":"都卜勒依操作者。","B":"CTA高但不及。","C":"captopril腎掃描敏感度差。","D":"對：MRA最高。","E":"captopril+利尿劑腎掃描仍受限。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎血管性高血壓影像）","Brenner & Rector’s The Kidney, 11e（renovascular HTN screening）"]}},"105-腎-19":{"quick":"正解(D)：腎衰竭指數(RFI)<1指向腎前性氮血症。","detail":{"background":"腎前性氮血症 vs ATN尿液指標：腎前性→尿鈉<20、FeNa<1%、腎衰竭指數(RFI=尿鈉÷(尿/血Cr))<1、尿滲透壓>500、U/P Cr>40。選項中尿鈉>40與FeNa>2%皆指向ATN；唯「腎衰竭指數(<1)」指向腎前性。","options":{"A":"尿鈉>40→ATN。","B":"尿滲透壓(未給值，腎前性應>500)。","C":"U/P Cr(腎前性>40)未給值。","D":"對：RFI<1→腎前性。","E":"FeNa>2%→ATN。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI尿液指標）","Brenner & Rector’s The Kidney, 11e（prerenal vs ATN）"]}},"105-腎-20":{"quick":"正解(A)：低鈉112、低尿酸、低BUN、等容積→SIADH。","detail":{"background":"抽菸男性咳嗽虛弱、血鈉112、鉀/HCO₃⁻正常、BUN 8低、尿酸3.0低→SIADH(稀釋性，低尿酸/低BUN、等容積)；應警覺小細胞肺癌異位ADH。心衰竭/肝硬化為低有效循環(BUN/尿酸多偏高)；腎上腺不全可低鈉但常高鉀。","options":{"A":"對：SIADH。","B":"心衰竭BUN/尿酸偏高。","C":"肝硬化BUN/尿酸偏高。","D":"重度鹽水缺乏BUN高。","E":"腎上腺不全常伴高鉀。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（SIADH/低尿酸）","Brenner & Rector’s The Kidney, 11e（SIADH）"]}},"105-腎-21":{"quick":"正解(A)：高血壓低鉀之代謝性鹼中毒,呼吸代償適當→單純代謝性鹼中毒。","detail":{"background":"pH 7.48、HCO₃⁻ 34、PCO₂ 46：代謝性鹼中毒。預期代償PCO₂=40+0.7×(34−24)≈47≈46→代償適當，為「單純代謝性鹼中毒」。年輕高血壓＋低血鉀＋代謝性鹼中毒→疑原發性醛固酮增多症等續發性高血壓。","options":{"A":"對：單純代謝性鹼中毒(代償適當)。","B":"非合併呼吸性酸中毒(PCO₂屬代償)。","C":"非呼吸性鹼中毒+代謝性酸中毒。","D":"非合併呼吸性鹼中毒。","E":"非呼吸性鹼中毒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（代謝性鹼中毒代償）","Brenner & Rector’s The Kidney, 11e（acid-base compensation）"]}},"105-腎-22":{"quick":"正解(A為不正確)：高糖透析液是為「超過濾」移除水分,非清除尿毒素。","detail":{"background":"PD vs HD：高張葡萄糖透析液產生滲透梯度以「超過濾」移除水分(非清除尿毒素，A錯)；高糖負荷→高三酸甘油酯；PD較易腹膜炎；PD每日蛋白流失較多；HD較易透析中低血壓。　補充：腹膜透析以高張葡萄糖造成滲透梯度移除水分(超過濾)，溶質清除靠擴散；長期須留意腹膜炎、高三酸甘油酯、蛋白流失與腹膜功能衰退，但透析中低血壓較血液透析少見。","options":{"A":"不正確(即答案)：高糖為超過濾移除水分。","B":"高糖→高三酸甘油酯，正確。","C":"PD較易腹膜炎，正確。","D":"PD蛋白流失較多，正確。","E":"HD較易透析中低血壓，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析比較）","Brenner & Rector’s The Kidney, 11e（PD vs HD）"]}},"106-腎-1":{"quick":"正解(B為錯)：鋰造成「腎源性」尿崩(nephrogenic DI)，非central DI。","detail":{"background":"長期鋰鹽→多尿多渴，為「腎源性尿崩」(集尿管對ADH反應差)，非central DI。可伴蛋白尿、高血鈉(失水)；慢性鋰腎病見間質纖維化與小管萎縮；急性過量可中毒。　補充：鋰鹽致腎源性尿崩(集尿管對ADH反應差，amiloride可減輕)，須監測鋰濃度與腎功能；慢性鋰腎病為間質纖維化、慢性腎病，停藥未必完全可逆。","options":{"A":"可能鋰中毒。","B":"錯誤(即答案)：為腎源性DI非central DI。","C":"慢性鋰腎病可有蛋白尿。","D":"失水→高血鈉。","E":"間質纖維化/小管萎縮。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（鋰腎病/腎源性DI）","Brenner & Rector’s The Kidney, 11e（lithium nephropathy）"]}},"106-腎-2":{"quick":"正解(D)：止痛藥腎病→乳頭壞死與乳頭鈣化。","detail":{"background":"長期混合止痛藥(phenacitin/aspirin/acetaminophen/NSAID)→止痛藥腎病：乳頭壞死＋乳頭鈣化、慢性小管間質腎炎、可多尿與代謝性「酸」中毒。非梗塞/皮質壞死、非腎絲球硬化；單純acetaminophen致病較小(複方/phenacetin較重)。","options":{"A":"非腎梗塞/皮質壞死。","B":"非腎絲球硬化。","C":"多尿可，但為代謝性「酸」中毒非鹼中毒。","D":"對：乳頭壞死＋乳頭鈣化。","E":"單純acetaminophen致病較小。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（止痛藥腎病）","Brenner & Rector’s The Kidney, 11e（analgesic nephropathy）"]}},"106-腎-3":{"quick":"正解(C最不優先)：尿酸非高血壓初評最優先項目。","detail":{"background":"新診斷高血壓初評優先：尿液檢查、BUN/Cr、空腹血糖與血脂、Hct/Hb、ECG。尿酸非最優先。　補充：高血壓初評重點在標的器官(ECG、尿白蛋白)與心血管代謝風險(血脂、空腹血糖、Hct)，並評估可逆續發病因；尿酸非最優先常規項目。","options":{"A":"尿液檢查，優先。","B":"BUN/Cr，優先。","C":"最不優先(即答案)：尿酸。","D":"血糖/血脂，優先。","E":"Hct，優先。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血壓初評）","Brenner & Rector’s The Kidney, 11e（HTN workup）"]}},"106-腎-4":{"quick":"正解(A)：糖尿病常見type IV RTA，特徵為高血鉀。","detail":{"background":"糖尿病腎病變常致第IV型RTA(低腎素低醛固酮)：特徵為「高血鉀」與輕度非陰離子間隙代謝性酸中毒。並非type II(近端)；醛固酮為「低/反應差」(非高)；非type I(遠端集尿管排H+缺陷)；酸中毒多輕度，不一定需靜脈補鹼。","options":{"A":"對：type IV特徵高血鉀。","B":"錯：非type II。","C":"錯：多為輕度酸中毒。","D":"錯：醛固酮低/反應差，非高。","E":"錯：非type I遠端排H+缺陷。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（type IV RTA）","Brenner & Rector’s The Kidney, 11e（hyporeninemic hypoaldosteronism）"]}},"106-腎-5":{"quick":"正解(D)：amitriptyline＋中風→SIADH(等容積、尿鈉高、尿濃縮)。","detail":{"background":"血鈉126、低血漿滲透壓262、尿鈉40、尿滲透壓398、等容積無水腫→SIADH。amitriptyline(三環抗憂鬱)與中風皆為SIADH誘因。　補充：SIADH須等容積、低血漿滲透壓、尿滲透壓不當偏高且尿鈉>30，並排除甲狀腺與腎上腺功能不足；三環抗憂鬱劑、中風、肺與中樞病變皆為誘因，治療以限水為主。","options":{"A":"腎性失鈉脫水尿鈉高但應低容積。","B":"腎外失鈉應低容積、尿鈉低。","C":"肺癌可致SIADH但本例病因為藥/中風。","D":"對：SIADH。","E":"central DI為高血鈉多尿。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（SIADH）","Brenner & Rector’s The Kidney, 11e（drug/stroke-induced SIADH）"]}},"106-腎-6":{"quick":"正解(A最不可能)：FSGS非狼瘡腎炎之分型。","detail":{"background":"狼瘡腎炎(ISN/RPS)分型：II系膜、III/IV增生型(內皮下沉積、新月體)、V膜性(上皮下沉積)，可見壞死/血管病變。FSGS非狼瘡腎炎分型，故最不可能。　補充：狼瘡腎炎依ISN/RPS分I–VI型，III/IV增生型須積極免疫抑制誘導(類固醇＋MMF或環磷醯胺)，V膜性型以蛋白尿表現；FSGS非狼瘡腎炎分型。","options":{"A":"最不可能(即答案)：FSGS非狼瘡腎分型。","B":"瀰漫增生(class IV)，可能。","C":"膜性(class V)，可能。","D":"內皮增生+新月體，可能。","E":"壞死/血管病變，可能。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（狼瘡腎炎分型）","Brenner & Rector’s The Kidney, 11e（lupus nephritis classes）"]}},"106-腎-7":{"quick":"正解(A)：C型肝炎＋低補體＋腎病→MPGN(冷凝球蛋白型)。","detail":{"background":"C型肝炎相關、補體C3/C4低、蛋白尿水腫→膜增殖性腎絲球腎炎(MPGN，常為冷凝球蛋白血症型)。　補充：HCV相關MPGN多為第II型混合冷凝球蛋白血症，C4特別降低；除腎臟表現外可有紫斑、關節痛與神經病變，治療以抗病毒(DAA)根除HCV為核心。","options":{"A":"對：MPGN(冷凝球蛋白)。","B":"膜性補體正常。","C":"IgA補體正常。","D":"FSGS補體正常。","E":"HSP補體正常。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（HCV相關腎炎）","Brenner & Rector’s The Kidney, 11e（cryoglobulinemic MPGN）"]}},"106-腎-8":{"quick":"正解(B)：鼻竇炎＋肺出血＋ANCA＋RBC cast→肉芽腫性多血管炎(Wegener)。","detail":{"background":"上呼吸道(鼻竇)＋下呼吸道(咳血)＋急進性腎炎(RBC cast)＋ANCA陽性(多為PR3-ANCA)→肉芽腫性多血管炎(GPA/Wegener)。　補充：GP(Wegener)為ANCA相關小血管炎，上呼吸道(鼻竇、鞍鼻)＋下呼吸道(結節空洞、肺出血)＋急進性腎炎為典型三聯；治療以類固醇＋環磷醯胺/利妥昔單抗誘導緩解。","options":{"A":"Goodpasture為anti-GBM、無鼻竇肉芽腫。","B":"對：GPA(Wegener)。","C":"PAN為中血管、無腎絲球腎炎/肺出血。","D":"顯微多血管炎無肉芽腫/鼻竇病灶較少。","E":"Behcet表現不同。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ANCA血管炎）","Brenner & Rector’s The Kidney, 11e（granulomatosis with polyangiitis）"]}},"106-腎-9":{"quick":"正解(E為不正確)：糖尿病腎病變沉渣多乾淨，不會常有RBC cast。","detail":{"background":"尿沉渣：變形紅血球與紅血球管型→腎絲球性血尿；運動/脫水後可見透明管型；顆粒管型→小管損傷或CKD；過敏性間質腎炎見WBC cast/尿嗜伊紅、少有RBC cast。糖尿病腎病變沉渣多「乾淨」，不會常出現RBC cast(若有RBC cast應疑合併腎絲球腎炎)。","options":{"A":"變形紅血球/紅血球管型→腎絲球，正確。","B":"運動脫水→透明管型，正確。","C":"顆粒管型→小管損傷/CKD，正確。","D":"過敏性間質腎炎WBC cast/尿嗜伊紅，正確。","E":"不正確(即答案)：糖尿病腎病變不常有RBC cast。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿沉渣）","Brenner & Rector’s The Kidney, 11e（urinary casts）"]}},"106-腎-10":{"quick":"正解(A)：低血壓/心因性休克→腎前性AKI。","detail":{"background":"術後腎前性AKI(灌流不足)：低血壓或心因性休克即典型病因。FeNa 3.5%、尿鈉40、低尿比重(等張尿)皆指向ATN；BUN/Cr 10亦非腎前性(腎前性多>20)。　補充：腎前性氮血症因灌流不足，腎小管濃縮與保鈉功能完整，故尿濃縮、FeNa<1%、尿鈉<20、BUN/Cr>20；一旦進展為ATN則上述指標反轉。","options":{"A":"對：低血壓/心因性休克→腎前性。","B":"FeNa 3.5%→ATN。","C":"尿鈉40→ATN。","D":"BUN/Cr 10非腎前性。","E":"低尿比重→ATN。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎前性AKI）","Brenner & Rector’s The Kidney, 11e（prerenal vs ATN）"]}},"106-腎-11":{"quick":"正解(B=1+3+6)：高陰離子間隙代謝性酸中毒、呼吸代償適當(INH毒性)。","detail":{"background":"HCO₃⁻ 11→代謝性酸中毒；Winter預期PCO₂=1.5×11+8≈24±2，實際21→代償「適當」(3)；AG=133−94−11=28→高AG(6)。INH中毒可致抽搐＋乳酸/高AG酸中毒。故為(1)代謝性酸中毒+(3)適當代償+(6)高AG。","options":{"A":"含(5)正常AG(錯)。","B":"對：1+3+6。","C":"含(4)(5)。","D":"含(4)。","E":"含(2)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高AG酸中毒/INH）","Brenner & Rector’s The Kidney, 11e（mixed acid-base）"]}},"106-腎-12":{"quick":"正解(E=2+3+5)：ADPKD為體染色體顯性(子女50%)、腎體積大者進展快、停含雌激素避孕藥。","detail":{"background":"ADPKD：(1)每年腎功能追蹤非「最敏感」預測(總腎體積htTKV更佳，錯)；(2)體染色體顯性，子女50%(對)；(3)腎臟體積大(總腎體積增大)預測腎功能逐年惡化(對)；(4)無動脈瘤家族史/出血者不需每年腦MRA(此家族父親未顱內出血，錯)；(5)宜停含雌激素避孕藥(惡化肝囊腫，對)。","options":{"A":"含(1)(錯)。","B":"含(1)(4)。","C":"含(4)。","D":"含(4)。","E":"對：2+3+5。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ADPKD）","Brenner & Rector’s The Kidney, 11e（total kidney volume）"]}},"106-腎-13":{"quick":"正解(D=3+4+5)：鉤端螺旋體病(Weil氏病)—臨床診斷立即抗生素，發病後尿中仍可帶菌。","detail":{"background":"水災後高燒、結膜下出血、黃疸、腎衰竭、低血鉀、肺出血→鉤端螺旋體病(Weil氏病，重症高死亡)。(1)為「細菌(螺旋體)」非寄生蟲(錯)；(2)不需等血培養即治療(錯)；(3)發病10天後雖有抗體，尿中仍可帶菌(對)；(4)Weil氏病高死亡(對)；(5)臨床診斷、立即抗生素(對)。","options":{"A":"含(2)。","B":"含(1)(2)。","C":"含(1)。","D":"對：3+4+5。","E":"含(1)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（鉤端螺旋體病）","CDC/WHO leptospirosis"]}},"106-腎-14":{"quick":"正解(A)：acetaminophen最不影響利尿劑/ARB之降壓效果。","detail":{"background":"NSAID抑制前列腺素→鈉滯留、削弱利尿劑/ARB降壓並增AKI風險。acetaminophen非真正NSAID、對腎前列腺素影響小，最不影響降壓效果。etoricoxib/celecoxib(COX-2)、diclofenac、nimesulide皆會干擾。","options":{"A":"對：acetaminophen影響最小。","B":"etoricoxib(COX-2)會干擾。","C":"diclofenac會干擾。","D":"celecoxib會干擾。","E":"nimesulide會干擾。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（NSAID與降壓藥）","Brenner & Rector’s The Kidney, 11e（NSAID & RAAS）"]}},"106-腎-15":{"quick":"正解(E)：此為Fabry病；正確敘述為眼/心檢查、Maltese crosses、FSGS樣病理。","detail":{"background":"年輕男性肢端疼痛(acroparesthesia)、血管角質瘤、少汗、蛋白尿/腎衰竭、兄長死於心/腦/透析→Fabry病(X-連鎖α-galactosidase A缺乏)。正確者：(2)安排眼科(角膜渦狀混濁)與心臟檢查、(4)尿可見Maltese crosses(脂質)、(5)腎病理可呈FSGS樣(足細胞空泡/層狀小體)。錯誤者：(1)應為Fabry非Gaucher、(3)X-連鎖女性帶因者「可能有症狀」非都無症狀。","options":{"A":"1+3為錯誤敘述但非本題鍵選。","B":"2正確。","C":"5正確。","D":"1為錯誤敘述。","E":"對(鍵選)：2+4+5(眼心檢查/Maltese crosses/FSGS樣)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（Fabry病）","Brenner & Rector’s The Kidney, 11e（Fabry nephropathy）"]}},"106-腎-16":{"quick":"正解(C)：CKD第III期轉介腎臟科、第IV期介紹腎臟替代治療。","detail":{"background":"CKD照護：約第III期(eGFR<60)應轉介腎臟專科；第IV期(eGFR<30)應開始介紹血液透析/腹膜透析/腎移植等替代治療選項並準備通路。　補充：CKD轉介時機影響預後：及早轉介可減緩進展、處理併發症並規劃通路；末期前應充分衛教血液透析、腹膜透析與腎移植選項，避免緊急非計畫透析。","options":{"A":"第I期過早。","B":"Va介紹替代過晚。","C":"對：III轉介、IV介紹替代。","D":"IV轉介稍晚、Va介紹替代過晚。","E":"Va皆過晚。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD照護/轉介）","KDIGO CKD指引"]}},"106-腎-17":{"quick":"正解(B為不正確)：低蛋白飲食「減緩腎功能惡化」的證據不確定(MDRD未明確)。","detail":{"background":"CKD蛋白限制：尿毒症狀時蛋白~0.6 g/kg、熱量~30–35 kcal/kg；以體重、白蛋白、24h尿素氮排泄監測適度；高蛋白增磷/鈉、抵銷ACEi/ARB保護；需補水溶性維生素。但低蛋白飲食「確實能減緩腎惡化」證據不足(MDRD試驗未證實)，主要是減尿毒症狀，故B為不正確。","options":{"A":"0.6 g/kg、30 kcal/kg，正確。","B":"不正確(即答案)：減緩腎惡化證據不確定。","C":"以體重/白蛋白/尿素氮監測，正確。","D":"高蛋白增磷鈉抵銷ACEi/ARB，正確。","E":"需補水溶性維生素，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD蛋白限制）","Brenner & Rector’s The Kidney, 11e（dietary protein）","MDRD試驗"]}},"106-腎-18":{"quick":"正解(C為非)：ABPM夜間平均正常值應<120/70(非<130/80)。","detail":{"background":"血壓測量：鼓勵居家監測；目標一般<135/85、CKD<130/80；ABPM正常值白天<135/85、夜間<120/70(C敘述<130/80為錯)；ABPM較診間更能預測心肌梗塞/中風；夜間高血壓為心血管預後強烈因子。","options":{"A":"鼓勵居家監測，正確。","B":"目標值正確。","C":"非(即答案)：夜間應<120/70。","D":"ABPM更能預測事件，正確。","E":"夜間高血壓為強烈預後因子，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（血壓測量/ABPM）","ESH/ABPM正常值"]}},"106-腎-19":{"quick":"正解(D)：骨髓移植腎病變與放射線(全身照射)有關。","detail":{"background":"骨髓移植腎病變：與全身放射照射(TBI)相關之血栓性微血管病，多在移植後6–12個月出現(非百日內)；calcineurin/sirolimus雖可致TMA但此病典型與放射有關；血漿置換療效有限。　補充：骨髓移植腎病為遲發性(移植後數月至年)放射相關血栓性微血管病，臨床有高血壓、蛋白尿與慢性腎功能下降，支持性處理為主，血漿置換療效有限。","options":{"A":"多6–12個月，非百日內。","B":"非主要與cyclosporine。","C":"非主要與sirolimus。","D":"對：與放射線有關。","E":"血漿置換療效有限。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（骨髓移植腎病變）","Brenner & Rector’s The Kidney, 11e（radiation nephropathy）"]}},"106-腎-20":{"quick":"正解(C)：tacrolimus可致高血壓、糖尿病與血栓性微血管病。","detail":{"background":"tacrolimus(calcineurin抑制劑)：可致高血壓、移植後新發糖尿病(NODAT，致糖尿病性較cyclosporine強)、與血栓性微血管病(TMA)。　補充：calcineurin抑制劑(tacrolimus>cyclosporine致糖尿病)可致高血壓(血管收縮、鈉滯留)、新發糖尿病與TMA，須監測藥物濃度並權衡免疫抑制與毒性。","options":{"A":"類固醇致高血糖/高血壓但非TMA。","B":"cyclosporine致高血壓/TMA但致糖尿病較弱。","C":"對：tacrolimus三者皆可。","D":"sirolimus致蛋白尿/高血脂。","E":"MMF主要血液/腸胃副作用。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（鈣調磷酸酶抑制劑毒性）","Brenner & Rector’s The Kidney, 11e（tacrolimus）"]}},"106-腎-21":{"quick":"正解(D)：高AG酸中毒＋高滲透壓間隙、酒精濃度陰性→甲醇中毒。","detail":{"background":"pH 7.16、HCO₃⁻ 8、AG=140−103−8=29(高AG)；滲透壓間隙=332−(2×140+150/18+25/2.8)≈332−297=35(高)；血中酒精陰性→甲醇(或乙二醇)中毒。酒精性酮酸中毒酒精常可測得且無高滲透壓間隙。","options":{"A":"DKA血糖應很高。","B":"飢餓酮酸無高滲透壓間隙。","C":"酒精性酮酸無高滲透壓間隙。","D":"對：甲醇中毒(高AG+高滲透壓間隙)。","E":"水楊酸為混合酸鹼、無高滲透壓間隙。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高滲透壓間隙/甲醇）","Brenner & Rector’s The Kidney, 11e（toxic alcohols）"]}},"106-腎-22":{"quick":"正解(E為非)：低血清白蛋白非腎前性AKI之特定好發因子。","detail":{"background":"AKI：絕大多數院內(尤其ICU)發生；多數為腎前性；NSAID/ACEi/ARB易致腎前性；社區型多為腎前性。低血清白蛋白並非腎前性AKI之特定好發因子(雖與整體AKI預後相關)，故E為非。　補充：AKI絕大多數為院內、ICU與腎前性；藥物(NSAID/ACEi/ARB/顯影劑)為常見可避免病因。早期辨識與移除誘因、維持灌流為處置核心。","options":{"A":"多院內/ICU，正確。","B":"多為腎前性，正確。","C":"NSAID/ACEi/ARB→腎前性，正確。","D":"社區型多腎前性，正確。","E":"非(即答案)：低白蛋白非腎前性特定好發因子。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI流行病學）","Brenner & Rector’s The Kidney, 11e（prerenal AKI）"]}},"107-腎-1":{"quick":"正解(E除外)：尿酸非高血壓初評之必要項目。","detail":{"background":"新診斷高血壓初評：BUN/Cr、尿液、血脂、ECG、空腹血糖、血鉀/血鈣。尿酸非必要初評項目，為除外。　補充：高血壓初評核心為評估標的器官與心血管/代謝風險，故含尿液、腎功能、電解質、血脂、血糖與ECG；尿酸非必要常規項目。","options":{"A":"血脂，建議。","B":"ECG，建議。","C":"空腹血糖，建議。","D":"血鉀/血鈣，建議。","E":"除外(即答案)：尿酸。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血壓初評）","Brenner & Rector’s The Kidney, 11e（HTN workup）"]}},"107-腎-2":{"quick":"正解(B)：乾燥症＋低鉀＋非AG酸中毒＋尿液不當鹼性＋尿陰離子間隙正→第1型(遠端)RTA。","detail":{"background":"乾燥症(Sjögren)併低血鉀、非陰離子間隙代謝性酸中毒(Cl 115、HCO₃⁻ 14)、酸血症下尿液pH仍7.0(無法酸化)、尿陰離子間隙=Na+K−Cl=35+40−18=+57(正，氨排泄不足)→第1型(遠端)RTA。","options":{"A":"慢性腹瀉尿陰離子間隙應為負。","B":"對：第1型遠端RTA。","C":"第2型近端RTA可酸化遠端尿(pH可<5.5)。","D":"第4型RTA伴高血鉀。","E":"DKA為高AG酸中毒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（遠端RTA/尿陰離子間隙）","Brenner & Rector’s The Kidney, 11e（distal RTA）"]}},"107-腎-3":{"quick":"正解(B為不正確)：CKD的FGF-23為「升高」而非減少。","detail":{"background":"CKD腎性骨病：高磷刺激PTH上升、腎元減少使1,25-vitD生成下降、低1,25-vitD使腸鈣吸收減少、磷滯留致低血鈣。FGF-23在CKD「升高」(代償排磷)，故B「reduced FGF-23」為錯。","options":{"A":"高磷刺激PTH，正確。","B":"不正確(即答案)：FGF-23升高非減少。","C":"腎元減少→1,25-vitD下降，正確。","D":"低1,25-vitD→腸鈣吸收減少，正確。","E":"磷滯留→低血鈣，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD-MBD/FGF-23）","Brenner & Rector’s The Kidney, 11e（mineral bone disorder）"]}},"107-腎-4":{"quick":"正解(E)：ESA前先測transferrin saturation評估鐵狀態(ferritin 500偏高)。","detail":{"background":"CKD貧血(eGFR 14、Hb 11.4、ferritin 500偏高)：給ESA前須完整評估鐵狀態——測transferrin saturation(TSAT)以判斷功能性缺鐵。不應將Hb拉到13–14(有害)、EPO濃度無助、未知TSAT前不宜直接給鐵。","options":{"A":"Hb目標13–14有害。","B":"測EPO濃度無臨床助益。","C":"未知TSAT前不宜直接IV鐵。","D":"口服鐵吸收差且未評估。","E":"對：先測TSAT評估鐵狀態。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD貧血/鐵評估）","Brenner & Rector’s The Kidney, 11e（iron status）","KDIGO貧血指引"]}},"107-腎-5":{"quick":"正解(A)：腫瘤溶解預防—給allopurinol/febuxostat(或rasburicase)降尿酸＋水化。","detail":{"background":"高度淋巴瘤化療前預防腫瘤溶解症候群與腎惡化：充分水化＋降尿酸(allopurinol或febuxostat；高危用rasburicase)。NAC無預防TLS之證據；單給5%葡萄糖無法擴容(需等張食鹽水)；活性維生素D會惡化高磷；不需化療後立即透析。","options":{"A":"對：allopurinol/febuxostat降尿酸。","B":"NAC無助。","C":"需等張食鹽水非5%葡萄糖。","D":"活性vitD惡化高磷。","E":"不需立即透析。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腫瘤溶解症候群預防）","Brenner & Rector’s The Kidney, 11e（TLS）"]}},"107-腎-6":{"quick":"正解(E除外)：低蛋白飲食未證實能減緩多囊腎進展。","detail":{"background":"延緩ADPKD惡化：控壓(ACEi/ARB)、tolvaptan或多喝水(>3 L/天，抑ADH/降cAMP)、低鹽、囊泡感染用脂溶性抗生素(quinolone穿透佳)。低蛋白飲食未證實能減緩ADPKD進展(MDRD次組陰性)，為除外。","options":{"A":"ACEi/ARB控壓，有助。","B":"tolvaptan/多喝水，有助。","C":"脂溶性抗生素治囊泡感染，有助。","D":"低鹽，有助。","E":"除外(即答案)：低蛋白飲食未證實有助。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ADPKD進展防治）","Brenner & Rector’s The Kidney, 11e（tolvaptan/TEMPO）","TEMPO 3:4(tolvaptan)"]}},"107-腎-7":{"quick":"正解(B)：單株沉積、Congo red陰性→輕鏈沉積病(LCDD)。","detail":{"background":"單株球蛋白＋腎絲球沉積＋Congo red「陰性」(非類澱粉)→輕鏈沉積病(LCDD，多為κ輕鏈、結節性腎絲球硬化)。類澱粉Congo red陽性；骨髓瘤cast nephropathy病灶在小管。　補充：輕鏈沉積病(LCDD)為單株輕鏈(多κ)在腎絲球結節狀沉積、Congo red陰性(與類澱粉不同)；須查血/尿免疫固定電泳與骨髓，治療針對潛在漿細胞疾病。","options":{"A":"類澱粉Congo red陽性。","B":"對：輕鏈沉積病(LCDD)。","C":"cast nephropathy在小管。","D":"fibrillary GN Congo red陰性但纖維較粗、DNAJB9。","E":"第II型冷凝球蛋白補體常低。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（單株球蛋白腎病/LCDD）","Brenner & Rector’s The Kidney, 11e（monoclonal Ig deposition）"]}},"107-腎-8":{"quick":"正解(B=1+2+3)：HD病人應打HBV(非免疫者)、肺炎鏈球菌、每年流感疫苗。","detail":{"background":"長期血液透析病人疫苗：HBV陰性者打HBV疫苗(高劑量)、肺炎鏈球菌疫苗(23價/13價)、每年不活化流感疫苗。出題年(2018)帶狀疱疹「活性減毒」疫苗於免疫低下者不建議，故(4)不選。　補充：透析病人免疫力低，建議高劑量B肝疫苗(並追抗體效價)、肺炎鏈球菌與每年不活化流感疫苗；活性減毒疫苗(如帶狀疱疹活疫苗)於免疫低下者當時不建議。","options":{"A":"含(4)。","B":"對：1+2+3。","C":"缺(3)。","D":"缺(2)。","E":"含(4)、缺(1)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析病人疫苗）","CDC透析病人疫苗建議"]}},"107-腎-9":{"quick":"正解(D)：未透析CKD建議蛋白0.6–0.8 g/kg/天。","detail":{"background":"未透析之CKD(eGFR 18)蛋白攝取建議約0.6–0.8 g/kg/天(搭配足夠熱量)，以減少尿毒症狀與含氮廢物。　補充：未透析CKD低蛋白飲食(0.6–0.8 g/kg/天)須搭配足夠熱量(30–35 kcal/kg)避免營養不良，並監測白蛋白；過度限制反不利，須個別化。","options":{"A":"1.4–1.5過高。","B":"1.2–1.4過高。","C":"1.0–1.2偏高。","D":"對：0.6–0.8 g/kg/天。","E":"過低有營養不良風險。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD蛋白限制）","KDOQI營養指引"]}},"107-腎-10":{"quick":"正解(B)：CKD病人可使用低劑量aspirin做心血管保護。","detail":{"background":"CKD應避免：NSAID(腎前性/間質)、ephedrine、MgO(高血鎂)、長期aluminum hydroxide(鋁中毒)。低劑量aspirin用於心血管保護可使用。　補充：CKD避免腎毒性與經腎排出蓄積藥物(NSAID、含鎂/鋁制酸劑、麻黃素)；低劑量aspirin用於心血管次級預防之利益通常大於風險，可審慎使用。","options":{"A":"NSAID應避免。","B":"對：低劑量aspirin心血管保護可用。","C":"ephedrine應避免。","D":"MgO致高血鎂。","E":"長期鋁鹽致鋁中毒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD用藥安全）","Brenner & Rector’s The Kidney, 11e（OTC in CKD）"]}},"107-腎-11":{"quick":"正解(B=1+2+3)：子癇前症鑑別—肝功能、血小板、抗磷脂抗體。","detail":{"background":"懷孕26週高血壓＋蛋白尿→鑑別子癇前症/HELLP/抗磷脂症候群：查肝功能(AST/ALT)、血小板、抗磷脂抗體。中央靜脈栓塞CT/MRI非必要；ACEi/ARB妊娠禁用，不可用於「腎臟保護」。　補充：妊娠20週後新發高血壓＋蛋白尿須評估子癇前症(查肝功能、血小板、尿酸、抗磷脂)；ACEi/ARB妊娠禁用，控壓首選labetalol/nifedipine/methyldopa。","options":{"A":"含(4)(5)。","B":"對：1+2+3。","C":"含(4)(5)。","D":"含(5)。","E":"含(4)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（子癇前症鑑別）","Brenner & Rector’s The Kidney, 11e（pre-eclampsia）"]}},"107-腎-12":{"quick":"正解(D=僅2)：ACEi後Cr上升＋腹部bruit→腎動脈狹窄，安排duplex/CT/MRI。","detail":{"background":"ACEi後Cr由1.4升至2.6＋腹部bruit→腎動脈狹窄(腎血管性高血壓)。應安排duplex Doppler或CT/MRI評估腎動脈(2)。腎血管性高血壓「腎素與醛固酮皆高」(故1「腎素偏低」錯)；不需腎靜脈取樣(3)；不一定高血鉀(4)；尿catecholamine升高為嗜鉻細胞瘤(5)。","options":{"A":"含(1)錯。","B":"含(1)(3)(4)。","C":"含(3)(4)(5)。","D":"對：僅(2)。","E":"含(1)(5)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎血管性高血壓）","Brenner & Rector’s The Kidney, 11e（renovascular HTN）"]}},"107-腎-13":{"quick":"正解(C=2+3+4)：>4 cm惡性機率高、腎上腺皮質癌多有功能、低CT密度多為良性偶見瘤。","detail":{"background":"腎上腺偶見瘤：(1)即使無症狀仍需荷爾蒙篩檢(皮質醇、metanephrine，必要時醛固酮)，故1錯；(2)>4 cm惡性可能較高(對)；(3)腎上腺皮質癌多會分泌過多類固醇(對)；(4)低CT密度(<10 HU)良性腺瘤機率大(對)；(5)首選為「CT」非MRI(故5錯)。","options":{"A":"含(1)。","B":"含(1)。","C":"對：2+3+4。","D":"含(5)。","E":"含(5)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎上腺偶見瘤）","內分泌偶見瘤評估指引"]}},"107-腎-14":{"quick":"正解(E=僅4)：已開始透析者不「起始」statin(4D/AURORA陰性)。","detail":{"background":"KDIGO血脂(2013)：CKD非透析、移植病人建議statin(SHARP)。但「已開始透析者不應起始statin」(4D、AURORA未顯示益處)。故(4)40歲已透析2年者不建議起始statin；(5)移植病人建議statin。故僅(4)不建議。","options":{"A":"含(3)(5)應給。","B":"含(2)(5)應給。","C":"含(5)應給。","D":"含(2)應給。","E":"對：僅(4)不起始。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD血脂）","KDIGO Lipid 2013；4D/AURORA/SHARP"]}},"107-腎-15":{"quick":"正解(C=2+3+4)：DHP-CCB、NSAID、TZD致體液滯留/夜間利尿→加重夜尿。","detail":{"background":"加重老人夜尿應避免：dihydropyridine CCB(周邊水腫→夜間回流利尿)、NSAID(鈉水滯留)、thiazolidinediones(體液滯留)。doxazosin(α-blocker)反改善BPH排尿；抗組織胺致尿滯留非夜尿。","options":{"A":"含(1)doxazosin。","B":"含(1)。","C":"對：2+3+4。","D":"含(5)。","E":"含(1)(5)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（夜尿/藥物）","Brenner & Rector’s The Kidney, 11e（nocturia）"]}},"107-腎-16":{"quick":"正解(A為錯)：隱匿型高血壓心血管風險「不低於」(常等於或高於)持續性高血壓。","detail":{"background":"ABPM：隱匿型高血壓(診間正常、居家/日常高)心血管風險與持續性高血壓相當甚至更高(A「明顯較低」為錯)。夜間高血壓為更強之預後因子；隱匿型常見於男性/老人/糖尿病；老人常白袍或隱匿型；CKD特別常見夜間與隱匿型高血壓。","options":{"A":"錯誤(即答案)：隱匿型風險不低於持續性。","B":"夜間高血壓為更強預後因子，正確。","C":"隱匿型常見於男/老/糖尿病，正確。","D":"老人常白袍/隱匿型，正確。","E":"CKD常夜間/隱匿型，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ABPM/隱匿型高血壓）","ESH ABPM指引"]}},"107-腎-17":{"quick":"正解(D)：PPI＋thiazide→低血鎂，造成手足抽搐。","detail":{"background":"糖尿病服thiazide/valsartan＋PPI後手足抽搐(tetany)：PPI與thiazide皆致「低血鎂」，低血鎂可續發低血鈣與PTH阻抗→抽搐。故與低血鎂最相關。　補充：PPI與thiazide皆致低血鎂，低血鎂可造成難矯正的低血鈣(PTH分泌受抑與作用阻抗)與低血鉀；補鎂後鈣鉀方易回升，臨床須一併檢測。","options":{"A":"低血鈉致意識改變非抽搐。","B":"低血鉀致無力非典型抽搐。","C":"代謝性鹼中毒可加重但非主因。","D":"對：低血鎂(PPI+thiazide)。","E":"低血鈣可抽搐，但本例主因為PPI/thiazide致低血鎂。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低血鎂/PPI）","Brenner & Rector’s The Kidney, 11e（hypomagnesemia）"]}},"107-腎-18":{"quick":"正解(B)：晚期CKD/透析之超高心血管風險不見得與「曾有AMI」直接相關。","detail":{"background":"晚期CKD/透析之超高心血管死亡多源於左心室肥厚、心衰竭、猝死/心律不整等非粥狀硬化機轉；低血壓在透析族群反與死亡相關(逆流行病學)。「曾有AMI(documented AMI)」並非此超高風險的直接決定因子，故B。","options":{"A":"低血壓與死亡相關(逆流行病學)。","B":"對(即答案)：不見得與曾有AMI直接相關。","C":"心衰竭相關。","D":"左心室肥厚相關。","E":"擴張型心肌病相關。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD心血管風險）","Brenner & Rector’s The Kidney, 11e（CVD in ESRD）"]}},"107-腎-19":{"quick":"正解(E為錯)：Stauffer氏症候群為「無肝轉移」之可逆性肝功能異常。","detail":{"background":"腎細胞癌：清亮細胞型最多且最易轉移、為VHL基因失能突變；約30%診斷時已轉移、術後20–30%復發；即使轉移仍建議減積/患側腎切除。Stauffer氏症候群為「無肝臟轉移」之副腫瘤性可逆肝功能異常，故E「包括肝臟轉移」為錯。","options":{"A":"清亮細胞最多最易轉移，正確。","B":"VHL失能突變，正確。","C":"30%已轉移、術後20–30%復發，正確。","D":"轉移仍建議患側腎切除，正確。","E":"錯誤(即答案)：Stauffer為無肝轉移之肝功能異常。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎細胞癌/Stauffer）","Brenner & Rector’s The Kidney, 11e（renal cell carcinoma）"]}},"107-腎-20":{"quick":"正解(E為誤)：AL類澱粉之預後主要取決於「心臟」侵犯，非僅腎功能。","detail":{"background":"多系統(腎病範圍蛋白尿、神經病變、漿膜積液、Bence Jones)→AL類澱粉/漿細胞病。應做血/尿免疫固定電泳＋游離輕鏈、皮下脂肪/骨髓切片、腎切片免疫染色證實輕鏈。自體幹細胞移植對特定病人優於傳統化療(故D「不會比較好」亦偏誤，但本題鍵選E)。預後主要由「心臟侵犯」決定，非僅看腎功能是否進展透析，故E為誤。","options":{"A":"免疫固定電泳/游離輕鏈，正確。","B":"皮下脂肪/骨髓切片，正確。","C":"腎切片免疫染色證實輕鏈，正確。","D":"敘述自體移植效益(可商榷)。","E":"錯誤(即答案)：預後主要取決於心臟侵犯。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AL類澱粉預後）","Brenner & Rector’s The Kidney, 11e（AL amyloidosis）"]}},"107-腎-21":{"quick":"正解(A為誤)：此為橫紋肌溶解之「色素(肌球蛋白)腎病/ATN」，非單純腎前性。","detail":{"background":"環島後肌痛、可樂色尿、CK 25000、尿潛血+但RBC少→橫紋肌溶解之肌球蛋白腎病(內因性ATN)，非單純hypovolemia腎前性(A為誤)。處置：積極等張食鹽水(維持高尿量至潛血轉陰)、監測鈣磷(常低鈣高磷)、必要時尿液鹼化；若寡尿/高鉀併EKG變化/嚴重酸中毒則緊急透析。","options":{"A":"錯誤(即答案)：為色素性ATN非單純腎前性。","B":"常低鈣高磷，正確。","C":"積極輸液至潛血轉陰，正確。","D":"尿液鹼化(有爭議但常述)。","E":"寡尿/高鉀/酸中毒→緊急透析，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（橫紋肌溶解AKI）","Brenner & Rector’s The Kidney, 11e（pigment nephropathy）"]}},"107-腎-22":{"quick":"正解(C)：慢性呼吸性酸中毒(COPD)＋代謝性鹼中毒(利尿劑)。","detail":{"background":"pH 7.42、PaCO₂ 67(高)、HCO₃⁻ 42(高)、低Cl 88、低K 3.5→COPD慢性CO₂滯留(呼吸性酸中毒)合併利尿劑造成代謝性鹼中毒。　補充：混合型酸鹼判讀須結合臨床：COPD慢性CO₂滯留(呼吸性酸中毒、HCO₃代償升高)合併利尿劑致低氯低鉀代謝性鹼中毒時，pH可接近正常但二項皆偏離。","options":{"A":"敗血症為高AG酸中毒。","B":"尿毒為代謝性酸中毒。","C":"對：COPD＋利尿劑。","D":"甲醇為高AG酸中毒。","E":"肺炎呼吸器無此鹼中毒型。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（混合酸鹼）","Brenner & Rector’s The Kidney, 11e（resp acidosis + met alkalosis）"]}},"108-腎-1":{"quick":"正解(C為錯)：cinacalcet(calcimimetic)會造成「低血鈣」，非高血鈣。","detail":{"background":"CKD鈣磷處置：低磷飲食預防次發性副甲狀腺亢進；活性維生素D(calcitriol)抑PTH但可致高血鈣；含鈣磷結合劑可致高血鈣；sevelamer/lanthanum不含鈣不致高血鈣。calcimimetic(cinacalcet)增加鈣感受器敏感度→抑PTH，副作用為「低血鈣」(非高血鈣)，故C錯。","options":{"A":"低磷飲食預防次發性亢進，正確。","B":"calcitriol可致高血鈣，正確。","C":"錯誤(即答案)：cinacalcet致低血鈣。","D":"含鈣結合劑致高血鈣，正確。","E":"sevelamer/lanthanum不致高血鈣，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD-MBD治療）","Brenner & Rector’s The Kidney, 11e（calcimimetics）","KDIGO CKD-MBD"]}},"108-腎-2":{"quick":"正解(B除外)：尿酸非高血壓初評必要項目。","detail":{"background":"高血壓初評：Hct、ECG、尿液/尿白蛋白、BUN/Cr/Na/K。尿酸非必要初評項目，為除外。　補充：高血壓初評目的為標的器官評估與心血管風險分層，故含Hct、ECG、尿液/白蛋白與基本生化；尿酸並非必要常規初評。","options":{"A":"Hct，建議。","B":"除外(即答案)：尿酸。","C":"ECG，建議。","D":"尿液/尿白蛋白，建議。","E":"BUN/Cr/Na/K，建議。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血壓初評）","Brenner & Rector’s The Kidney, 11e（HTN workup）"]}},"108-腎-3":{"quick":"正解(C為不正確)：妊娠高血壓禁用ACEi/ARB。","detail":{"background":"妊娠高血壓：目標≤140/90；可低劑量aspirin(80–100 mg/天)預防子癇前症；可用labetalol、nifedipine、methyldopa。ACEi/ARB致畸/胎兒腎毒，禁用(C錯)。","options":{"A":"目標≤140/90，正確。","B":"低劑量aspirin預防子癇前症，正確。","C":"不正確(即答案)：禁用ACEi/ARB。","D":"labetalol可用。","E":"nifedipine可用。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（妊娠高血壓）","ACOG/低劑量aspirin預防子癇前症"]}},"108-腎-4":{"quick":"正解(E)：eGFR 40＋ACR 30–300(G3b/A2)在KDIGO熱圖中風險最高。","detail":{"background":"KDIGO風險熱圖：GFR越低、白蛋白尿越高風險越高。各選項對照——E(eGFR 40=G3b＋ACR 30–300=A2)落於「紅色/極高」區，較B(G2/A3)、C(G3a/A2)整體進展ESRD風險更高。","options":{"A":"eGFR30但ACR低。","B":"G2/A3(GFR近正常)。","C":"G3a/A2。","D":"eGFR70 ACR低，風險低。","E":"對：G3b/A2，風險最高。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD分期/預後）","KDIGO 2012 heat map"]}},"108-腎-5":{"quick":"正解(A)：RBC cast＋蛋白尿＋FeNa>1%→腎絲球腎炎/血管炎。","detail":{"background":"尿見紅血球管型(RBC cast)＋蛋白尿即腎絲球性血尿，配合FeNa>1%→腎絲球腎炎或血管炎。間質腎炎見WBC cast/尿嗜伊紅；ATN見泥棕色顆粒管型；腎盂腎炎見WBC/細菌。　補充：尿沉渣為AKI鑑別利器：紅血球管型→腎絲球腎炎/血管炎；白血球管型/尿嗜伊紅→急性間質性腎炎；泥棕色顆粒管型→ATN；潔淨沉渣→腎前性或腎後性。","options":{"A":"對：腎絲球腎炎/血管炎(RBC cast)。","B":"間質腎炎見WBC cast/尿嗜伊紅。","C":"ATN見泥棕色管型。","D":"腎盂腎炎見WBC/細菌。","E":"血管阻塞無RBC cast。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI尿沉渣鑑別）","Brenner & Rector’s The Kidney, 11e（urinary casts）"]}},"108-腎-6":{"quick":"正解(A最不合適)：腎絲球性血尿不需IVP/逆行性腎盂攝影。","detail":{"background":"變形紅血球＋紅血球管型＋蛋白尿→「腎絲球性」血尿。應做血清學(anti-GBM、ANCA、ASLO)、補體/冷凝球蛋白、腎超音波±腎切片。IVP/RP為泌尿道(下尿路/結石腫瘤)影像，對腎絲球性血尿最不合適。","options":{"A":"最不合適(即答案)：IVP/RP用於泌尿道病灶。","B":"血清學適當。","C":"補體/冷凝球蛋白適當。","D":"腎超音波±切片適當。","E":"尿液細胞學(雖非首要，但用於排除非腎絲球)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎絲球性血尿評估）","Brenner & Rector’s The Kidney, 11e（glomerular hematuria）"]}},"108-腎-7":{"quick":"正解(A)：尿滲透壓550(高張)＋多尿→溶質性利尿(solute diuresis)。","detail":{"background":"多尿(3600 mL)但尿滲透壓550(>300，高張)→溶質性(滲透性)利尿(如高血糖、高尿素、輸注鹽/甘露醇)；若為水分利尿(中樞/腎源性DI、原發性多渴)尿滲透壓應「低」(<150–300)。　補充：多尿鑑別看尿滲透壓：>300為溶質性利尿(高血糖、高尿素、輸鹽/甘露醇)；<150為水分利尿(中樞/腎源性尿崩、原發性多渴)，再以禁水試驗與desmopressin分辨。","options":{"A":"對：溶質性利尿(尿高張)。","B":"原發性多渴尿滲透壓低。","C":"中樞DI尿滲透壓低。","D":"腎源性DI尿滲透壓低。","E":"SIADH為低血鈉非多尿。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（多尿鑑別）","Brenner & Rector’s The Kidney, 11e（solute vs water diuresis）"]}},"108-腎-8":{"quick":"正解(C)：膜性腎病最易合併腎靜脈栓塞。","detail":{"background":"原發性腎病症候群中以「膜性腎病(MN)」最易合併腎靜脈栓塞(高凝、尿失antithrombin III)。　補充：膜性腎病高凝最易腎靜脈栓塞，與大量蛋白尿致抗凝蛋白流失、肝代償合成促凝因子有關；白蛋白偏低者可考慮預防性抗凝。","options":{"A":"FSGS較少。","B":"IgA非腎病症候群為主。","C":"對：膜性腎病最易。","D":"微小變化較少。","E":"MPGN較少。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎病症候群高凝）","Brenner & Rector’s The Kidney, 11e（renal vein thrombosis）"]}},"108-腎-9":{"quick":"正解(D為錯)：低蛋白飲食須搭配「足夠熱量」，非熱量限制。","detail":{"background":"低蛋白飲食(LPD)：約0.6–0.8 g/kg/天；經入球小動脈收縮(並減少出球阻力依賴)降低腎絲球內壓、減少含氮尿毒素(如p-cresol sulfate)。但LPD必須搭配「足夠熱量(~30–35 kcal/kg)」避免營養不良，而非熱量限制，故D錯。","options":{"A":"0.6–0.8 g/kg/天，正確。","B":"入球小動脈收縮降內壓，正確。","C":"降腎絲球內壓機轉，正確。","D":"錯誤(即答案)：須足夠熱量，非熱量限制。","E":"減少含氮尿毒素，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD低蛋白飲食）","Brenner & Rector’s The Kidney, 11e（dietary protein）"]}},"108-腎-10":{"quick":"正解(A=1+2)：等張食鹽水容積擴充；尿液鹼化與單純食鹽水效果無異。","detail":{"background":"CIN預防：等張食鹽水容積擴充(1)；尿液鹼化(碳酸氫鈉)與單純食鹽水效果無差別(2)。常規NAC「無法有效」預防(PRESERVE陰性，3錯)；使用metformin者「應暫停」(避免AKI後乳酸中毒，故4「不要停」錯)；停利尿劑/ACEi/ARB(5)非本題鍵選。","options":{"A":"對：1+2。","B":"含(3)。","C":"含(3)(4)。","D":"含(3)(5)。","E":"含(5)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CIN預防）","Brenner & Rector’s The Kidney, 11e（CA-AKI）","PRESERVE/AMACING(NAC/碳酸氫鈉無額外效益)"]}},"108-腎-11":{"quick":"正解(B=1+3+4)：低鹽、vasopressin拮抗(降cAMP)、ACEi/ARB可保護ADPKD之GFR。","detail":{"background":"ADPKD延緩GFR下降：低鹽飲食(1)、vasopressin受體拮抗/降cAMP療法(3，tolvaptan/somatostatin)、ACEi/ARB控壓(4)。提升cAMP的藥物(2，dipyridamole)反「促進」囊腫生長；限水(5)會升ADH/cAMP促囊腫，應「多喝水」，故2、5錯。","options":{"A":"含(2)。","B":"對：1+3+4。","C":"含(2)(5)。","D":"含(5)。","E":"含(2)(5)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ADPKD治療）","Brenner & Rector’s The Kidney, 11e（cAMP/vasopressin）","TEMPO 3:4"]}},"108-腎-12":{"quick":"正解(A=5+6)：GLP-1受體促效劑與SGLT2抑制劑具腎臟保護。","detail":{"background":"具腎臟保護(預防/延緩腎病變)的糖尿病藥物：GLP-1受體促效劑(5)與SGLT2抑制劑(6)(CREDENCE、DAPA-CKD、LEADER等)。insulin/metformin/biguanide/DPP-4抑制劑主要控糖，腎保護證據不足。","options":{"A":"對：(5)GLP-1+(6)SGLT2。","B":"含(1)insulin。","C":"含(3)biguanide。","D":"含(3)(4)。","E":"含(1)(2)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病腎臟保護）","Brenner & Rector’s The Kidney, 11e（SGLT2i/GLP-1）","CREDENCE/DAPA-CKD"]}},"108-腎-13":{"quick":"正解(B=1+3+5)：ARB、cyclosporin、COX-2抑制劑→高血鉀。","detail":{"background":"高血鉀相關藥物：ARB(抑RAAS/醛固酮)、cyclosporin(致type IV RTA/醛固酮反應差)、COX-2抑制劑(降腎素-醛固酮)。doxazosin(α-blocker)、prednisolone(糖皮質/具礦皮質效應反易低鉀)不致高鉀。","options":{"A":"含(4)prednisolone。","B":"對：(1)ARB+(3)cyclosporin+(5)COX-2。","C":"含(2)(4)。","D":"含(2)。","E":"含(4)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（藥物性高血鉀）","Brenner & Rector’s The Kidney, 11e（drug-induced hyperkalemia）"]}},"108-腎-14":{"quick":"正解(D)：低白蛋白血症為透析病人重要不良預後因子。","detail":{"background":"腎臟替代療法實證：早開始(eGFR 10–14)與晚開始(5–7)透析死亡率無顯著差異(IDEAL)；增加單次透析尿素清除(更高Kt/V)未改善死亡率(HEMO)；每週六次vs三次未明確降死亡率；HD改PD未證實降死亡率。低白蛋白血症則為重要不良預後因子(D對)。","options":{"A":"錯：早/晚開始無顯著差異(IDEAL)。","B":"錯：更高Kt/V未改善死亡率(HEMO)。","C":"錯：六次未明確降死亡率。","D":"對：低白蛋白為不良預後因子。","E":"錯：HD改PD未證實降死亡率。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析實證）","Brenner & Rector’s The Kidney, 11e（dialysis outcomes）","IDEAL/HEMO/FHN"]}},"108-腎-15":{"quick":"正解(C=1+4+5)：測anti-PLA2R、高titer建議免疫治療、治療中續追抗體。","detail":{"background":"膜性腎病(第二期、大量蛋白尿)：(1)測血清anti-PLA2R抗體titer；(4)抗體高(高危)建議免疫抑制治療；(5)治療中持續追蹤抗體titer(免疫緩解先於臨床緩解)。(2)膜性腎病發炎細胞浸潤少，不以GBM增厚/浸潤判預後(錯)；(3)抗體低「不」代表必自行緩解(錯)。","options":{"A":"含(2)(3)。","B":"含(2)。","C":"對：1+4+5。","D":"含(2)(3)。","E":"含(3)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（膜性腎病/anti-PLA2R）","Brenner & Rector’s The Kidney, 11e（PLA2R monitoring）","KDIGO腎絲球疾病指引"]}},"108-腎-16":{"quick":"正解(E為錯)：台灣移植後腫瘤以「泌尿上皮癌」較多(非如歐美以淋巴癌為主)。","detail":{"background":"台灣腎移植：一/五/十年存活率與美國相當；五/十年存活明顯優於透析；移植後死因依序心血管、感染、惡性腫瘤；惡性腫瘤發生率為常人3–5倍且逐年增加。但台灣移植後腫瘤以「泌尿上皮(移行細胞)癌」較多(與馬兜鈴酸/地區流行有關)，非如歐美以淋巴癌居多，故E錯。","options":{"A":"存活率與美國相當，正確。","B":"優於透析，正確。","C":"死因排序正確。","D":"腫瘤發生率3–5倍，正確。","E":"錯誤(即答案)：台灣以泌尿上皮癌較多。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎移植/移植後腫瘤）","台灣移植登錄資料"]}},"108-腎-17":{"quick":"正解(C)：燒傷即使大量輸液仍可能因微血管滲漏/低灌流致缺血性腎傷害。","detail":{"background":"燒傷大量體液移轉與微血管滲漏，即使積極輸液仍可能腎臟低灌流、缺血性腎傷害(並注意腹腔內壓上升)；DKA、橫紋肌溶解、解除阻塞後利尿、顯影劑後皆以輸液為主要保護。　補充：燒傷因血漿滲漏與第三間隙積液，即使大量輸液仍可能腎灌流不足致缺血性傷害，並須警覺腹腔內高壓與橫紋肌溶解；輸液須依尿量/血流動力學滴定。","options":{"A":"DKA以輸液為主。","B":"橫紋肌溶解以輸液為主。","C":"對：燒傷仍可能缺血性腎傷害。","D":"阻塞後利尿補液即可。","E":"顯影劑後水化保護。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（燒傷與AKI）","Brenner & Rector’s The Kidney, 11e（burn-related AKI）"]}},"108-腎-18":{"quick":"正解(B為錯)：acyclovir無法預防BK多瘤病毒;處置為降低免疫抑制。","detail":{"background":"腎移植後BK多瘤病毒：通常移植1個月後發生，可致BK腎病；可於尿/血檢測或培養。處置核心為「早期偵測＋降低免疫抑制劑」，無有效抗病毒藥(acyclovir無效，B錯；cidofovir/leflunomide證據有限)。","options":{"A":"多在移植1個月後，正確。","B":"錯誤(即答案)：acyclovir無法預防BK。","C":"早偵測+降免疫抑制，正確。","D":"可見於移植腎，正確。","E":"尿/血可檢測，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（BK多瘤病毒腎病）","Brenner & Rector’s The Kidney, 11e（BK virus nephropathy）"]}},"108-腎-19":{"quick":"正解(B=2+3+4)：C-ANCA陽性之急進性腎炎→ANCA相關血管炎(GPA/EGPA)。","detail":{"background":"65歲6週內茶色尿、水腫、Cr 3.6、URBC多、C-ANCA高titer→ANCA相關小血管炎之急進性腎炎(pauci-immune)。C-ANCA(PR3)最特異於肉芽腫性多血管炎(Wegener，2)；嗜伊紅肉芽腫(3)＝Churg-Strauss(4，EGPA同一疾病)亦屬ANCA相關。Goodpasture(1)為anti-GBM；顯微多血管炎(5)多p-ANCA。本題鍵選(2)+(3)+(4)。","options":{"A":"含(1)Goodpasture(anti-GBM)。","B":"對(鍵選)：2+3+4(ANCA相關血管炎)。","C":"含(5)。","D":"含(5)。","E":"含(1)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ANCA相關血管炎）","Brenner & Rector’s The Kidney, 11e（pauci-immune RPGN）"]}},"108-腎-20":{"quick":"正解(D為錯)：老化膀胱餘尿增加但「膀胱容量」此處敘述被視為不正確。","detail":{"background":"老化泌尿：GFR約每年降~1%(70歲約70–80)；最大尿濃縮力下降、夜尿增加；膀胱易躁動(detrusor overactivity)且收縮力下降、餘尿增加；逼尿肌過度反應為老人尿失禁最常見原因。本題以(D)之敘述為錯誤鍵選(餘尿增加為真，但其膀胱容量敘述被判為不正確)。","options":{"A":"GFR每年降~1%，正確。","B":"濃縮力下降、夜尿增，正確。","C":"膀胱躁動、收縮力下降，正確。","D":"錯誤(即答案)：膀胱容量敘述不正確。","E":"逼尿肌過度反應為最常見失禁原因，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（老化腎泌尿系統）","Brenner & Rector’s The Kidney, 11e（aging kidney/bladder）"]}},"108-腎-21":{"quick":"正解(D為錯)：DDAVP後應看「尿液」滲透壓變化判別中樞/腎源性DI，非血漿滲透壓。","detail":{"background":"高血鈉(155)、高血漿滲透壓、多尿多渴→疑尿崩。先不限水收集24h尿量；若尿量大且尿滲透壓低支持DI；先排除低血鉀/高血鈣(致腎源性DI)；矯正高血鈉每日血鈉下降≤10–12 mmol/L。鑑別中樞vs腎源性DI應給DDAVP後觀察「尿液滲透壓」是否上升(中樞會升、腎源性不升)，非看血漿滲透壓，故D錯。","options":{"A":"先不限水收集24h尿，正確。","B":"尿量大且尿滲透壓低→DI，正確。","C":"先排除低鉀/高鈣，正確。","D":"錯誤(即答案)：應看尿液滲透壓對DDAVP之反應。","E":"每日血鈉降≤10–12，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿崩鑑別/DDAVP試驗）","Brenner & Rector’s The Kidney, 11e（diabetes insipidus）"]}},"108-腎-22":{"quick":"正解(D為錯)：AL類澱粉預後主由「心臟侵犯」決定，非終究死於腎衰竭。","detail":{"background":"腎AL類澱粉確診後：續做骨髓切片(評估漿細胞)、追蹤游離輕鏈(治療指標)、若心臟侵犯追蹤Troponin與NT-proBNP(預後)。自體幹細胞移植對特定病人不一定優於化療。D「終究死於腎衰竭」為錯——預後主要取決於心臟侵犯，且治療可改善病程。","options":{"A":"續做骨髓切片，正確。","B":"追蹤游離輕鏈為指標，正確。","C":"心臟侵犯追Troponin/NT-proBNP，正確。","D":"錯誤(即答案)：預後主由心臟決定，非必死於腎衰竭。","E":"自體移植不一定優於化療，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎AL類澱粉）","Brenner & Rector’s The Kidney, 11e（renal AL amyloidosis）"]}},"109-合-67":{"quick":"正解(E=3+4+5)：原發性副甲狀腺亢進—副甲狀腺切除為根治,並以bisphosphonate護骨、cinacalcet降鈣。","detail":{"background":"反覆尿路結石＋高血鈣(13)＋高iPTH(150)＋MIBI右側攝取→原發性副甲狀腺亢進(腺瘤)。根治為副甲狀腺切除(5)；非手術者可cinacalcet降鈣(4)、bisphosphonate護骨(3)。低鈣高磷飲食(1)非適當處置；thiazide(2)會「升高血鈣」、高鈣血症時禁用。","options":{"A":"含(1)(2)。","B":"含(1)。","C":"含(1)(2)。","D":"含(2)thiazide(升鈣禁用)。","E":"對：3+4+5。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（原發性副甲狀腺亢進）","Brenner & Rector’s The Kidney, 11e（hypercalcemia與結石）"]}},"109-合-68":{"quick":"正解(C=2+4+5)：KDIGO「紅色」極高風險—G3a/A3、G3b/A2、G4。","detail":{"background":"KDIGO風險熱圖之「紅色(極高風險)」：(2)eGFR45–59(G3a)+UACR>300(A3)=紅；(4)eGFR30–44(G3b)+UACR 100(A2)=紅；(5)eGFR15–29(G4)+任意白蛋白尿=紅。(1)G3a/A2、(3)G3b/A1為橙色(高，非紅)。","options":{"A":"含(3)橙色。","B":"含(1)(3)橙色。","C":"對：2+4+5。","D":"含(3)。","E":"含(1)(3)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD風險分級）","KDIGO 2012 heat map"]}},"109-合-69":{"quick":"正解(C=2+4+5)：腎動脈狹窄—captopril腎掃描評估、RI<80可進一步評估、藥物治療(ACEi/ARB+statin)為主。","detail":{"background":"動脈硬化型腎動脈狹窄：可captopril腎掃描評估患側血流(2)；都卜勒resistive index<80(腎實質尚可)者血管重建較可能獲益、應進一步評估(4)；藥物治療(ACEi/ARB＋statin)為主(5)。長年高血壓在前、未必皆由RAS所致(1存疑)；CORAL/ASTRAL顯示常規放支架/氣球擴張「不」優於藥物(3錯)。","options":{"A":"含(1)(3存疑/錯)。","B":"含(3)。","C":"對：2+4+5。","D":"含(3)。","E":"含(1)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎血管性高血壓）","Brenner & Rector’s The Kidney, 11e（atherosclerotic RAS）","CORAL/ASTRAL(支架不優於藥物)"]}},"109-合-70":{"quick":"正解(D為非)：代謝性鹼中毒非PPI之腎臟不良作用。","detail":{"background":"氫離子幫浦阻斷劑(PPI)腎臟不良作用：急性間質性腎炎、急性腎損傷、慢性腎病、低血鎂。代謝性鹼中毒非PPI之腎臟不良作用。　補充：PPI腎臟不良作用以急性間質性腎炎(過敏機轉、可致AKI)與長期使用相關之CKD及低血鎂最重要；停藥與類固醇可改善急性間質性腎炎。","options":{"A":"慢性腎病，是。","B":"急性腎損傷，是。","C":"急性間質性腎炎，是。","D":"非(即答案)：代謝性鹼中毒。","E":"低血鎂，是。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（PPI腎毒性）","Brenner & Rector’s The Kidney, 11e（PPI與腎）"]}},"109-合-72":{"quick":"正解(C為不正確)：女性停經「後」痛風反而增多(雌激素具排尿酸作用)。","detail":{"background":"痛風流行病學：台灣原住民盛行率>10%；約九成為腎臟排尿酸不足；<25歲發作疑尿酸代謝基因異常；thiazide/低劑量aspirin/人工甜味劑增加發作。女性因雌激素具促尿酸排泄作用，停經「後」痛風反而「增多」(非鮮少)，故C不正確。","options":{"A":"原住民盛行率>10%，正確。","B":"九成為排出不足，正確。","C":"不正確(即答案)：停經後痛風增多。","D":"<25歲疑基因異常，正確。","E":"thiazide/aspirin/甜味劑增發作，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（痛風流行病學）","Brenner & Rector’s The Kidney, 11e（gout）"]}},"109-合-74":{"quick":"正解(E為不正確)：近年文獻指出CKD病人因顯影劑導致嚴重AKI/透析之機率被高估。","detail":{"background":"顯影劑相關AKI(CA-AKI)：嚴重CKD為最強獨立風險；無CKD之單純糖尿病非獨立風險；即使輕度CA-AKI亦與死亡率增加相關；嚴重度與後續腎功能惡化相關。近年(傾向分數配對)研究指出CKD病人因顯影劑導致「嚴重AKI或透析」之機率被「高估」，故E「仍明顯高出很多」為不正確。","options":{"A":"重度CKD最強風險，正確。","B":"單純糖尿病非獨立風險，正確。","C":"輕度亦增死亡率，正確。","D":"與後續惡化相關，正確。","E":"不正確(即答案)：嚴重AKI/透析機率被高估。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CA-AKI重新評估）","Brenner & Rector’s The Kidney, 11e（contrast nephropathy）"]}},"109-合-77":{"quick":"正解(C)：腎細胞癌已轉移時，切除原發/轉移病灶可延長存活。","detail":{"background":"腎細胞癌：已轉移者行減積腎切除/轉移病灶切除可延長存活(C對)。多為偶然發現(非典型三聯徵)；Stauffer氏症候群為「無肝轉移」之可逆肝功能異常(B錯)；新標靶/免疫療法已改善晚期存活(D敘述偏誤)；好發約50–70歲(E錯)。","options":{"A":"多偶然發現，非典型三聯徵。","B":"Stauffer為無肝轉移之肝異常。","C":"對：切除原發/轉移延長存活。","D":"標靶/免疫已改善晚期存活。","E":"好發50–70歲。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎細胞癌）","Brenner & Rector’s The Kidney, 11e（renal cell carcinoma）","cytoreductive nephrectomy"]}},"109-合-78":{"quick":"正解(A)：糖尿病常致type IV RTA，特徵為高血鉀(尿仍可酸化)。","detail":{"background":"糖尿病腎病變常致第IV型RTA(低腎素低醛固酮)：特徵高血鉀、輕度非AG酸中毒，尿液「可」酸化(pH<5.5，與type I不同)。非type II；醛固酮「低/反應差」非高；多輕度不需常規靜脈補鹼。","options":{"A":"對：常見高血鉀。","B":"非type II。","C":"多輕度，不需常規補鹼。","D":"醛固酮低非高。","E":"type IV尿可酸化(pH<5.5)，非>6.5(那是type I)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（type IV RTA）","Brenner & Rector’s The Kidney, 11e（hyporeninemic hypoaldosteronism）"]}},"109-合-81":{"quick":"正解(D)：腎病症候群應以「尿總蛋白/肌酸酐比」量化(含非白蛋白蛋白)。","detail":{"background":"年輕非糖尿病/非肥胖男性因腎病症候群(水腫、高膽固醇/LDL、低白蛋白、高凝)早發急性冠心症。探查腎病應優先「尿總蛋白/肌酸酐比(uPCR)」量化大量蛋白尿(含非白蛋白成分如輕鏈)；ACR只測白蛋白，會低估。","options":{"A":"血清蛋白電泳非首選量化。","B":"尿蛋白電泳為定性。","C":"ACR只測白蛋白會低估。","D":"對：尿總蛋白/肌酸酐比量化。","E":"CRP/ANA非首要量化蛋白尿。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（蛋白尿量化）","Brenner & Rector’s The Kidney, 11e（proteinuria quantification）"]}},"109-合-82":{"quick":"正解(D最不可能)：FSGS非狼瘡腎炎之分型。","detail":{"background":"狼瘡腎炎分型：增生型(內皮下沉積、新月體)、膜性(上皮下沉積)、壞死性血管病變等。FSGS非狼瘡腎炎分型，最不可能。　補充：狼瘡腎炎依ISN/RPS分型(I–VI)：III/IV增生型須積極免疫抑制(類固醇＋MMF或環磷醯胺)，V膜性型以蛋白尿為主；FSGS非狼瘡腎分型。","options":{"A":"瀰漫增生(IV)，可能。","B":"膜性(V)，可能。","C":"內皮增生+新月體，可能。","D":"最不可能(即答案)：FSGS非狼瘡分型。","E":"壞死性小動脈病變，可能。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（狼瘡腎炎分型）","Brenner & Rector’s The Kidney, 11e（lupus nephritis）"]}},"109-合-83":{"quick":"正解(B)：PD透析液送培養、細胞學與革蘭氏染色。","detail":{"background":"CAPD病人發燒、腹痛、引流液混濁→疑腹膜炎。初步應將「PD透析液送培養、細胞學(WBC分類)與革蘭氏染色」確診，再經驗性抗生素治療(多保留導管)。　補充：CAPD腹膜炎診斷標準為腹痛、透析液混濁(WBC>100且PMN>50%)與培養陽性其二；初步留液送培養/細胞學/革蘭氏染色後即經驗性涵蓋格蘭氏陽性與陰性菌、多保留導管。","options":{"A":"CT非首要。","B":"對：透析液培養/細胞學/革蘭氏染色。","C":"不需立即換管。","D":"不需立即改HD。","E":"PET用於評估透析效能非急性感染。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（PD腹膜炎評估）","Brenner & Rector’s The Kidney, 11e（PD peritonitis）","ISPD指引"]}},"109-合-84":{"quick":"正解(B最不合適)：白蛋白4.6(正常)，不符蛋白能量耗損/持續腎病症候群。","detail":{"background":"長期HD病人：BUN/Cr/K/P皆高、每次脫水4 kg、下肢水腫→透析不足(A)、攝取過多蛋白(C)、容積過多(D)、腎性貧血(Hb 9.6，E)皆合適。但白蛋白4.6(正常偏高)，不符蛋白能量耗損(PEW)與「持續腎病症候群」，故B最不合適。","options":{"A":"透析不足，合適。","B":"最不合適(即答案)：白蛋白正常不符PEW/腎病症候群。","C":"攝取過多蛋白，合適。","D":"容積過多，合適。","E":"腎性貧血，合適。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析病人評估）","Brenner & Rector’s The Kidney, 11e（PEW）"]}},"109-合-85":{"quick":"正解(A=1+3+6)：惡性高血壓—小血管纖維素樣壞死/中膜肥厚、慢性硬化、大量蛋白尿少血尿。","detail":{"background":"惡性高血壓腎病(惡性腎硬化)：病理見小血管「纖維素樣壞死＋中膜肥厚」(1)、慢性可見腎絲球整體硬化伴微血管周圍纖維化(3)；尿液大量蛋白尿但「少」血尿(6)。系膜增生+新月體(2)、IgA/IgM沉積(4)、低補體(5)屬免疫性腎炎，非惡性高血壓。","options":{"A":"對：1+3+6。","B":"含(2)(4)。","C":"含(2)(5)。","D":"含(4)(5)。","E":"含(2)(4)(5)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（惡性高血壓腎病）","Brenner & Rector’s The Kidney, 11e（malignant nephrosclerosis）"]}},"109-合-86":{"quick":"正解(B=2+4+6)：SIADH(藥物所致)，治療適量限水800–1000 mL/天。","detail":{"background":"血鈉118、血漿滲透壓250(低)、尿鈉34、尿滲透壓436(尿濃縮)、等容積無水腫→SIADH(2)；可能與amiodarone/carbamazepine/haloperidol有關(4)。因白蛋白/球蛋白/血脂正常非假性低鈉，亦非reset osmostat或利尿劑濫用。治療：適量限水800–1000 mL/天(6)；利尿劑+生理鹽水(7)用於低容積非SIADH。","options":{"A":"含(1)(7)。","B":"對：2+4+6。","C":"含(3)(5)。","D":"含(1)(5)。","E":"含(5)(7)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（藥物相關SIADH）","Brenner & Rector’s The Kidney, 11e（SIADH治療）"]}},"109-合-87":{"quick":"正解(A)：C型肝炎＋低補體＋腎病→第II型冷凝球蛋白血症。","detail":{"background":"C型肝炎＋補體C3/C4偏低＋蛋白尿水腫→第II型混合冷凝球蛋白血症(MPGN型)。PAN、IgA、膜性、HSP補體多正常。　補充：HCV相關之第II型混合冷凝球蛋白血症腎病補體C4特別低，臨床三聯為紫斑、關節痛、虛弱；根除HCV(DAA)為治療基礎，重症加類固醇/利妥昔/血漿置換。","options":{"A":"對：第II型冷凝球蛋白血症。","B":"PAN為中血管炎。","C":"IgA/慢性間質補體正常。","D":"膜性補體正常。","E":"HSP補體正常。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（HCV相關冷凝球蛋白腎炎）","Brenner & Rector’s The Kidney, 11e（cryoglobulinemia）"]}},"109-合-88":{"quick":"正解(D)：觀察型研究綜合分析支持ACEi/ARB可繼續使用，無須停用。","detail":{"background":"COVID-19期間ACEi/ARB：多國學會(ACC/AHA/HFSA等)共識與觀察型研究綜合分析支持「繼續使用、無須停用」(D對)，未證實增加感染風險/死亡率，亦不建議為此「新開立」或「立即停用」。","options":{"A":"錯：不應以此理由全面使用之推論。","B":"錯：未證實增加風險/嚴重度。","C":"錯：不需因女性/老人/CHF立即停。","D":"對：可繼續使用，無須停用。","E":"錯：不建議為此新開立。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ACEi/ARB與COVID-19）","ACC/AHA/HFSA 2020聯合聲明"]}},"109-合-91":{"quick":"正解(C最不建議)：以fenoldopam取代ARB預防顯影劑腎病無實證。","detail":{"background":"CIN預防：停metformin、等張食鹽水(±碳酸氫鈉)、NAC(當年常用)、aminophylline曾被嘗試。fenoldopam多項RCT證實無法預防CIN，以其取代ARB「比較安全」最不建議。","options":{"A":"停metformin，建議。","B":"食鹽水±碳酸氫鈉，建議。","C":"最不建議(即答案)：fenoldopam取代ARB無實證。","D":"NAC(當年常用)。","E":"aminophylline曾被嘗試。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CIN預防）","Brenner & Rector’s The Kidney, 11e（CA-AKI）","CONTRAST trial"]}},"110-合-55":{"quick":"正解(C為錯)：ADPKD囊泡疼痛不宜以NSAID為首選(腎毒)，acetaminophen/tramadol較安全。","detail":{"background":"ADPKD處置：低鹽飲食有益；ACEi/ARB為首選降壓藥；tolvaptan可延緩總腎體積增大與腎功能下降；可接受腎移植。囊泡疼痛止痛應避免NSAID(腎毒性)，以acetaminophen/tramadol較安全，故C「NSAID較有效且安全」為錯。","options":{"A":"低鹽有益，正確。","B":"ACEi/ARB首選，正確。","C":"錯誤(即答案)：NSAID非首選(腎毒)。","D":"tolvaptan延緩進展，正確。","E":"可接受腎移植，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ADPKD處置）","Brenner & Rector’s The Kidney, 11e（ADPKD pain/NSAID）"]}},"110-合-57":{"quick":"正解(A)：C3/C4皆低且「C4特別低」→冷凝球蛋白血症。","detail":{"background":"低補體腎炎中，C3與C4皆低且「C4特別顯著降低」是冷凝球蛋白血症之特徵(古典途徑活化)。狼瘡腎C3/C4皆低但C4非特別突出；感染後GN多C3低C4正常。　補充：冷凝球蛋白血症活化古典補體途徑使C4顯著低於C3；多與HCV相關，腎臟表現為MPGN型，須查冷凝球蛋白、類風濕因子(常陽性)與HCV。","options":{"A":"對：冷凝球蛋白血症(C4特別低)。","B":"感染後GN多C3低、C4正常。","C":"MPGN C3低為主。","D":"狼瘡腎C4非特別突出。","E":"心內膜炎/分流腎炎C3低為主。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低補體腎炎）","Brenner & Rector’s The Kidney, 11e（cryoglobulinemia, low C4）"]}},"110-合-59":{"quick":"正解(D=2+4)：ACEi/β-blocker可降尿酸排泄；起始allopurinol/febuxostat可誘發急性發作。","detail":{"background":"高尿酸腎病：(1)尿酸再吸收/分泌轉運子在「近端」腎小管(非遠端，錯)；(2)ACEi、β-blocker可降低尿酸排泄(升尿酸，對)；(3)colchicine用於「預防/治療」發作而非誘發(錯)；(4)起始allopurinol/febuxostat因尿酸快速下降可誘發急性痛風(對)；(5)CKD 3–4常規allopurinol延緩腎惡化未獲證實(CKD-FIX/PERL陰性，錯)。","options":{"A":"含(1)(5)。","B":"含(1)(5)。","C":"含(3)。","D":"對：2+4。","E":"含(5)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高尿酸/降尿酸誘發發作）","Brenner & Rector’s The Kidney, 11e（urate transporters）","CKD-FIX/PERL(allopurinol不延緩)"]}},"110-合-61":{"quick":"正解(E)：高腎素＋高醛固酮(ARR低)→單側腎動脈狹窄(續發性醛固酮)。","detail":{"background":"低鉀性高血壓且「腎素高、醛固酮高、ARR僅10:1、皮質醇正常」→續發性醛固酮增多(腎血管性)，即單側腎動脈狹窄。原發性醛固酮增多為「低腎素、ARR高」；Liddle為低腎素低醛固酮；Bartter血壓正常。","options":{"A":"ACTH瘤皮質醇/雄性素異常。","B":"Bartter血壓正常。","C":"Liddle低腎素低醛固酮。","D":"原發性醛固酮為低腎素、ARR高。","E":"對：單側腎動脈狹窄(高腎素高醛固酮)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎血管性高血壓）","Brenner & Rector’s The Kidney, 11e（secondary aldosteronism）"]}},"110-合-62":{"quick":"正解(B)：尿比重>1.020(尿濃縮)支持腎前性氮血症。","detail":{"background":"腎前性 vs 內因性(ATN)：腎前性尿濃縮(尿比重>1.020、尿滲透壓>500)、尿鈉<20、FeNa<1%、RFI<1、沉渣乾淨。高尿鈉、低尿滲透壓、高RFI、泥棕色顆粒/小管上皮管型皆為ATN。","options":{"A":"高尿鈉→ATN。","B":"對：尿比重>1.020→腎前性。","C":"低尿滲透壓→ATN。","D":"高RFI→ATN。","E":"泥棕色管型→ATN。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI尿液指標）","Brenner & Rector’s The Kidney, 11e（prerenal vs intrinsic）"]}},"110-合-63":{"quick":"正解(E=1+4+5)：維生素D中毒、嚴重低血鎂、腫瘤溶解→高血磷。","detail":{"background":"高血磷成因：維生素D中毒(腸吸收增，1)、嚴重低血鎂(抑PTH分泌/作用→功能性副甲狀腺低下、排磷減少，4)、腫瘤溶解症候群(細胞釋放磷，5)。代謝性鹼中毒、原發性副甲狀腺亢進(PTH排磷)反而造成「低」血磷。","options":{"A":"含(2)。","B":"含(3)低磷。","C":"含(2)(3)。","D":"含(2)(3)。","E":"對：1+4+5。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血磷）","Brenner & Rector’s The Kidney, 11e（phosphate metabolism）"]}},"110-合-64":{"quick":"正解(D)：CKD4使用metformin致乳酸中毒(高AG、補鹼難矯正)。","detail":{"background":"糖尿病CKD第四期、高AG(26)代謝性酸中毒且補碳酸氫鈉難矯正→metformin相關乳酸中毒(MALA)。metformin於eGFR<30禁用。　補充：metformin相關乳酸中毒(MALA)為高陰離子間隙代謝性酸中毒，好發於腎功能不全、缺氧或敗血時藥物蓄積；處置為停藥、支持與必要時血液透析清除乳酸與metformin。","options":{"A":"DPP-4抑制劑不致。","B":"PPAR-γ(TZD)不致。","C":"α-glucosidase抑制劑不致。","D":"對：metformin乳酸中毒。","E":"sulfonylurea致低血糖非乳酸中毒。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（MALA）","Brenner & Rector’s The Kidney, 11e（metformin in CKD）"]}},"110-合-65":{"quick":"正解(B)：腹部雜音偏側化或延伸至舒張期，更可能血流動力學顯著(腎動脈狹窄)。","detail":{"background":"雙腎不對稱(左8.6/右10.6)＋難控高血壓＋Cr 2.0→腎動脈狹窄。腹部雜音若偏側化或延伸到整個收縮-舒張期，更可能具血流動力學意義(B對)。非九成皆有雜音、血鉀未必升；老年以動脈硬化型最常見(非FMD)；顯著雙側/單腎狹窄用ACEi/ARB有AKI風險、非首選；動脈硬化型需statin控膽固醇。","options":{"A":"非九成有雜音、血鉀未必升。","B":"對：雜音偏側/延伸舒張期更具意義。","C":"老年以動脈硬化型最常見(非FMD)。","D":"顯著狹窄ACEi/ARB有AKI風險。","E":"動脈硬化型需statin。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎血管性高血壓）","Brenner & Rector’s The Kidney, 11e（renovascular HTN）"]}},"110-合-66":{"quick":"正解(E=1+3)：慢性間質性腎病常見Fanconi症候群與貧血。","detail":{"background":"慢性間質性腎病：可見范康尼症候群(近端小管功能缺陷，1)、貧血(EPO不足，3)。其多「多尿」非寡尿、酸中毒為「非AG(高氯)」型RTA(非高AG，4錯)、蛋白尿輕度非腎病症候群(5錯)。　補充：慢性間質性腎病以小管功能障礙為主：濃縮力差(多尿、夜尿、等張尿)、非高陰離子間隙(高氯)型代謝性酸中毒、輕度蛋白尿與EPO不足貧血，可見范康尼症候群。","options":{"A":"含(4)(5)。","B":"含(2)寡尿(錯)。","C":"含(2)(4)。","D":"含(4)(5)。","E":"對：1+3。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（慢性間質性腎病）","Brenner & Rector’s The Kidney, 11e（chronic interstitial nephritis）"]}},"110-合-67":{"quick":"正解(D)：BUN 100/Cr 2.5比值極高(40)→查血紅素與大便潛血(消化道出血)。","detail":{"background":"BUN 100、Cr 2.5、BUN/Cr≈40(過高)→提示消化道出血(血中尿素再吸收)或嚴重腎前性。初步應查血紅素與大便潛血以排除腸胃道出血。　補充：BUN/Cr比過高(>20–40)提示腎前性或上消化道出血(腸道吸收血中尿素)；故須查Hb與糞便潛血，並評估容積狀態與利尿劑/類固醇等影響因素。","options":{"A":"非首步即切片。","B":"葡萄糖耐受試驗無關。","C":"運動復健無關。","D":"對：查Hb與大便潛血(消化道出血)。","E":"限蛋白非急性首步。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（BUN/Cr比值/腸胃道出血）","Brenner & Rector’s The Kidney, 11e（disproportionate azotemia）"]}},"110-合-68":{"quick":"正解(A)：年輕、單純血尿、微量蛋白尿、腎功能正常、血清學陰性→持續追蹤觀察。","detail":{"background":"23歲無痛性血尿、生化/腎功能正常、血清學(補體/ANA/ANCA/肝炎)陰性、複檢僅微量血尿與微量蛋白(150 mg/天)→多為薄基底膜或輕度IgA，腎功能正常者「持續追蹤觀察」即可，不需切片/基因/類固醇/泌尿科。","options":{"A":"對：持續追蹤觀察。","B":"腎功能正常不需切片。","C":"非首選基因檢測。","D":"不需類固醇經驗治療。","E":"腎絲球性非泌尿科優先。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（單純血尿處置）","Brenner & Rector’s The Kidney, 11e（isolated hematuria）"]}},"110-合-69":{"quick":"正解(B為錯)：腎功能正常之膜性腎病不應立即用cyclophosphamide/類固醇,先保守觀察。","detail":{"background":"膜性腎病(PLA2R陰性→須查續發病因)：應做惡性腫瘤檢查(A)、查B肝(D)；高凝、出血風險低者可預防性抗凝(C)；蛋白尿持續6個月有進展風險(E)。腎功能正常者初期以ACEi/ARB保守觀察(約30%自發緩解)，不應立即alternating cyclophosphamide/類固醇(B錯，免疫治療保留給高危/持續者)。","options":{"A":"查惡性腫瘤(續發)，正確。","B":"錯誤(即答案)：不應立即免疫抑制。","C":"高凝可預防性抗凝，正確。","D":"查B肝，正確。","E":"蛋白尿持續6月有進展風險，正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（膜性腎病處置）","Brenner & Rector’s The Kidney, 11e（membranous nephropathy）","KDIGO腎絲球指引"]}},"110-合-70":{"quick":"正解(B)：FeNa<1%為確認腎前性氮血症最可靠之單一指標。","detail":{"background":"腎前性氮血症指標：BUN/Cr>20、FeNa<1%、尿滲透壓>500、尿比重>1.020、尿鈉<20。其中FeNa<1%為最可靠之單一鑑別指標(B)；尿鈉>20則指向ATN(非腎前性)。　補充：FeNa<1%為腎前性最可靠單一指標，但用過利尿劑時失準，可改用FEurea(<35%支持腎前性)；尿鈉>40、FeNa>2%、棕色顆粒管型則指向ATN。","options":{"A":"BUN/Cr>20亦支持，但非最佳單一指標。","B":"對：FeNa<1%最可靠。","C":"尿滲透壓>500亦支持。","D":"尿鈉>20→ATN。","E":"尿比重>1.020亦支持。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎前性指標）","Brenner & Rector’s The Kidney, 11e（FeNa）"]}},"110-合-71":{"quick":"正解(B)：AKI開始透析主因為酸中毒、高血鉀、全身體液過多(及尿毒)。","detail":{"background":"AKI透析適應症(AEIOU)：酸中毒、電解質(高血鉀)、體液過多、尿毒症狀/中毒。高強度透析(ATN trial)、CRRT對IHD之死亡率(多項RCT)、敗血症早期透析(IDEAL-ICU/STARRT-AKI)皆未證實更佳。","options":{"A":"高強度未較佳(ATN trial)。","B":"對：酸中毒/高鉀/體液過多。","C":"CRRT未證實優於IHD。","D":"起始Cr高低與預後非單純負相關。","E":"敗血症早期透析未證實改善。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI透析適應症/時機）","Brenner & Rector’s The Kidney, 11e（RRT in AKI）","ATN/STARRT-AKI"]}},"110-合-72":{"quick":"正解(E)：SGLT2抑制劑使更多Na/Cl到緻密斑→入球小動脈收縮→降單一腎元GFR。","detail":{"background":"腎小管腎絲球回饋(TGF)：緻密斑(macula densa)感知遠端「Na/Cl」濃度。糖尿病初期近端再吸收增多→到達緻密斑的Na/Cl減少→入球小動脈舒張→超過濾。SGLT2抑制劑阻斷近端葡萄糖/鈉再吸收→更多Na/Cl到緻密斑→腺苷使入球小動脈「收縮」→降單一腎元GFR(減少超過濾、護腎，E對)。","options":{"A":"錯：緻密斑感知Na/Cl非滲透壓。","B":"錯：顆粒細胞在入球小動脈；糖尿病初期為超過濾。","C":"錯：RAS收縮「出球」小動脈。","D":"錯：高Na/Cl→腺苷使入球小動脈「收縮」非舒張。","E":"對：SGLT2i使入球收縮、降GFR。"},"sources":["Harrison’s Pr
