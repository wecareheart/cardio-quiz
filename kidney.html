inciples of Internal Medicine, 21e（管球回饋/SGLT2i）","Brenner & Rector’s The Kidney, 11e（tubuloglomerular feedback）","SGLT2i腎保護機轉"]}},"111-合-55":{"quick":"正解(D=2+3+4+5)：動脈端(inflow)狹窄→收縮期脈動減弱、舒張期不易塌陷、高調不連續雜音、thrill減弱。","detail":{"background":"AVF動脈端(inflow)狹窄/灌注不足：收縮期脈動「減弱」(2)、舒張期通路不易塌陷/不空虛(3)、狹窄處高調不連續雜音(4)、thrill減弱(5)。收縮期脈動「增強/水沖脈」(1)與augmentation test增強(6)為「出球端(outflow)狹窄」表現。","options":{"A":"含(1)(6)為outflow。","B":"含(1)。","C":"含(6)。","D":"對：2+3+4+5。","E":"含(6)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析通路評估）","Brenner & Rector’s The Kidney, 11e（AVF inflow stenosis）"]}},"111-合-56":{"quick":"正解(C)：利尿劑(furosemide)腎核醫掃描評估分側功能與阻塞，決定先引流哪側。","detail":{"background":"兩側中度水腎(BPH致下尿路阻塞)欲決定先做哪側經皮腎造瘻：以利尿劑腎核醫掃描(MAG3/DTPA+furosemide)評估「分側腎功能與阻塞程度」，選功能較佳/阻塞較重者優先引流。CT/MR尿路攝影顯示解剖、逆行性攝影侵入。","options":{"A":"CT顯示解剖非分側功能。","B":"逆行性尿路攝影侵入。","C":"對：利尿劑腎核醫掃描。","D":"MR尿路攝影顯示解剖。","E":"排尿膀胱尿道攝影非評估分側功能。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（阻塞性腎病評估）","Brenner & Rector’s The Kidney, 11e（diuretic renography）"]}},"111-合-57":{"quick":"正解(E=2+4)：脂溶性抗生素對囊泡感染較佳；RAAS抑制可控壓減緩惡化。","detail":{"background":"ADPKD：(2)脂溶性抗生素(TMP-SMX、quinolone、chloramphenicol)對囊泡穿透/療效較佳(對)；(4)抑制RAAS可控壓並減緩腎惡化(對)。(1)血壓目標140/90過高(ADPKD宜<130/80，年輕者HALT-PKD更嚴格)(錯)；(3)應「鼓勵多喝水」抑ADH/降cAMP減緩囊泡生長，非限水(錯)；(5)tolvaptan用於「快速進展」者，非建議所有人早期使用(過度推論，錯)。","options":{"A":"含(1)(3)(5)。","B":"含(3)(5)。","C":"含(3)。","D":"未含全部正確且本題鍵E。","E":"對：2+4。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ADPKD治療）","Brenner & Rector’s The Kidney, 11e（cyst penetration/RAAS）","HALT-PKD/TEMPO"]}},"111-合-58":{"quick":"正解(C)：>60歲且曾有肉眼血尿→高危,安排CT尿路攝影/膀胱鏡排除泌尿上皮癌。","detail":{"background":"2020 AUA無症狀血尿風險分層：高危(>60歲、曾肉眼血尿、大量抽菸史)→CT尿路攝影＋膀胱鏡。本題>60歲且曾合併肉眼血尿屬高危(C)。<50歲女性無菸史為低危；變形紅血球/細胞管型/蛋白尿為「腎絲球性」應轉腎臟科；多年穩定且超音波正常者風險低。","options":{"A":"低危。","B":"中危。","C":"對：高危,需CT/膀胱鏡。","D":"腎絲球性→腎臟科。","E":"長年穩定、超音波正常,風險低。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（無症狀血尿分層）","AUA 2020 microhematuria guideline"]}},"111-合-60":{"quick":"正解(A)：Class IV狼瘡腎見新月體應積極治療,避免進展RPGN/纖維化。","detail":{"background":"狼瘡腎：(A)Class IV見新月體→積極免疫治療避免RPGN與纖維化(對)。抗磷脂抗體陽性增TMA風險,但抗凝「不」能預防狼瘡腎惡化(B錯)；Class I/II不需高劑量類固醇預防進展(C錯)；anti-dsDNA與補體相關活性,ANA濃度不隨活性變化(D錯)；rituximab/tacrolimus未證實優於標準誘導(E錯)。","options":{"A":"對：Class IV+新月體積極治療。","B":"抗凝不能預防狼瘡腎惡化。","C":"Class I/II不需高劑量類固醇預防。","D":"ANA濃度不隨活性，追anti-dsDNA/補體。","E":"rituximab/tacrolimus未證實優於標準誘導。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（狼瘡腎炎治療）","Brenner & Rector’s The Kidney, 11e（lupus nephritis）","ACR/EULAR狼瘡腎指引"]}},"111-合-61":{"quick":"正解(A)：IDSA僅建議孕婦(與泌尿侵入術前)篩檢/治療無症狀菌尿。","detail":{"background":"2019 IDSA：無症狀菌尿一般不篩檢/治療(避免抗藥)。例外為「孕婦」與「泌尿侵入性手術前」應篩檢並治療。認知障礙/譫妄老人、糖尿病、腎移植、脊髓損傷者皆「不」建議常規篩檢治療。　補充：無症狀菌尿僅孕婦與泌尿侵入手術前須篩檢治療(避免菌血/早產與術後感染)；其餘族群(老人、糖尿病、留置導尿、脊髓損傷)治療不僅無益反增抗藥與副作用。","options":{"A":"對：孕婦應篩檢治療。","B":"認知障礙老人不需。","C":"糖尿病不需。","D":"腎移植(穩定期)不需常規。","E":"脊髓損傷不需。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（無症狀菌尿）","IDSA 2019 asymptomatic bacteriuria"]}},"111-合-62":{"quick":"正解(B)：IgA腎病經RAAS後仍蛋白尿>1 g且腎功能下降、無進階纖維化→加口服類固醇。","detail":{"background":"IgA腎病:輕度高血壓、蛋白尿,先RAAS阻斷＋控壓6個月,但蛋白尿仍由0.6升至1.3 g/天、Cr上升且無進階小管間質纖維化/新月體→可加口服類固醇(0.4 mg/kg/天)(B)。靜脈脈衝+azathioprine用於急進性/新月體;魚油、扁桃腺切除證據弱;不宜停RAAS(SGLT2i可加非取代)。","options":{"A":"脈衝+azathioprine用於急進性/新月體。","B":"對：加口服類固醇。","C":"魚油證據弱。","D":"扁桃腺切除非首選。","E":"不應停RAAS。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（IgA腎病治療）","Brenner & Rector’s The Kidney, 11e（IgA nephropathy）","TESTING/STOP-IgAN"]}},"111-合-63":{"quick":"正解(D)：低鉀代謝性鹼中毒＋高血壓＋肺癌＋腎素醛固酮正常→異位ACTH(Cushing)。","detail":{"background":"肺癌病人低血鉀(2.0)、代謝性鹼中毒(HCO₃⁻ 40)、高血壓,而腎素活性與醛固酮皆「正常」→異位ACTH分泌(Cushing)。皮質醇過量之礦皮質作用造成低鉀鹼中毒,且不經由腎素-醛固酮軸。Bartter/Gitelman腎素醛固酮「高」;尿K 26於血鉀2.0時偏高,屬腎性失鉀(故E錯)。","options":{"A":"非單純代謝性鹼中毒+適當代償(另有腎性失鉀機轉)。","B":"非合併呼吸性鹼中毒。","C":"Bartter/Gitelman腎素醛固酮高。","D":"對：異位ACTH Cushing。","E":"錯：尿K於低血鉀仍26為腎性失鉀。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（異位ACTH/低鉀鹼中毒）","Brenner & Rector’s The Kidney, 11e（mineralocorticoid excess）"]}},"111-合-64":{"quick":"正解(A為非)：BUN非「早期」AKI生物標誌(屬晚期功能性指標)。","detail":{"background":"早期AKI腎小管損傷生物標誌：IL-18、KIM-1、NGAL、L-FABP。BUN為晚期功能性指標,非早期偵測標誌,故為非。　補充：AKI早期小管損傷生物標記(NGAL、KIM-1、IL-18、L-FABP)可早於肌酸酐上升偵測；血清肌酐為晚期功能指標，受肌肉量、容積與分泌影響而延遲。","options":{"A":"非(即答案)：BUN為晚期功能指標。","B":"IL-18早期標誌。","C":"KIM-1早期標誌。","D":"NGAL早期標誌。","E":"L-FABP早期標誌。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI生物標誌）","Brenner & Rector’s The Kidney, 11e（AKI biomarkers）"]}},"111-合-65":{"quick":"正解(A)：慢性腎病患者主要死因為心血管疾病。","detail":{"background":"慢性腎病患者主要死因為心血管疾病(多數在進展至末期前已罹/死於CVD)。　補充：CKD病人多在進展至末期前即死於心血管疾病(冠心、心衰、心律不整)；故CKD照護須積極控壓、控脂、戒菸與處理礦物質骨病，降低心血管風險。","options":{"A":"對：心血管疾病。","B":"高鉀為可治急症非主死因。","C":"感染次之。","D":"惡性腫瘤非主因。","E":"尿毒可透析處理。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD死因）","Brenner & Rector’s The Kidney, 11e（CVD in CKD）"]}},"111-合-66":{"quick":"正解(E為非)：AVF血流較大致高輸出心衰非「透析中低血壓」之機制。","detail":{"background":"透析中低血壓機制:降壓藥、過度超過濾脫水、自律神經反應受損、滲透壓變化(尿素快速下降)。動靜脈廔管血流大屬高輸出心臟負荷問題,非透析中低血壓之機制,故為非。　補充：透析中低血壓常因超過濾速率過快、目標乾體重設定過低、自律神經反應受損、心臟舒張功能差或進食後血流轉移；處置含調整超過濾、降透析液溫度與評估乾體重。","options":{"A":"降壓藥,是。","B":"過度超過濾,是。","C":"自律神經受損,是。","D":"滲透壓變化,是。","E":"非(即答案):AVF血流大。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析中低血壓）","Brenner & Rector’s The Kidney, 11e（intradialytic hypotension）"]}},"111-合-68":{"quick":"正解(E)：PD腹膜炎(中性球為主)最可能培養出金黃色葡萄球菌。","detail":{"background":"PD透析液WBC 125、85%多形核中性球→細菌性腹膜炎,以革蘭氏陽性(金黃色葡萄球菌/凝固酶陰性葡萄球菌)最常見。本題選項中最可能為金黃色葡萄球菌。　補充：腹膜透析相關腹膜炎以皮膚菌叢(凝固酶陰性葡萄球菌、金黃色葡萄球菌)最常見，與導管出口/接管污染有關；腸源性或多菌種須警覺腹內病灶。","options":{"A":"念珠菌少見且難治。","B":"Proteus非最常見。","C":"結核為淋巴球為主、慢性。","D":"Pseudomonas難治但非最常見。","E":"對：金黃色葡萄球菌。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（PD腹膜炎菌種）","Brenner & Rector’s The Kidney, 11e（PD peritonitis）"]}},"111-合-69":{"quick":"正解(B)：晚期子宮頸癌→雙側輸尿管阻塞→雙側水腎。","detail":{"background":"雙側水腎之AKI最可能為「雙側輸尿管/下尿路阻塞」。晚期子宮頸癌侵犯易致雙側輸尿管阻塞→雙側水腎。其餘(敗血症、顯影劑、HUS、腎盂腎炎)多為腎前性/內因性,無雙側水腎。　補充：雙側水腎之AKI屬腎後性阻塞，常見原因為攝護腺肥大、神經性膀胱或骨盆惡性腫瘤(子宮頸癌)壓迫雙側輸尿管；解除阻塞後須留意解除後利尿與電解質。","options":{"A":"紫斑/敗血症為內因性。","B":"對：子宮頸癌→雙側輸尿管阻塞。","C":"顯影劑→ATN無水腎。","D":"HUS→TMA無水腎。","E":"腎盂腎炎/敗血症非雙側阻塞。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（阻塞性AKI）","Brenner & Rector’s The Kidney, 11e（bilateral hydronephrosis）"]}},"111-合-70":{"quick":"正解(E)：未控制高血壓增加顱內動脈瘤自發破裂風險。","detail":{"background":"ADPKD顱內動脈瘤:未控制之高血壓增加破裂風險(E對)。動脈瘤破裂家族史、既往顱內出血、動脈瘤越大,皆「增加」破裂風險;ADPKD本身增加顱內動脈瘤風險。　補充：ADPKD合併顱內囊狀動脈瘤，破裂風險隨動脈瘤增大、家族出血史、既往出血與未控制高血壓而升高；有家族動脈瘤/出血史者可考慮MRA篩檢並嚴格控壓。","options":{"A":"錯:家族史增加破裂風險。","B":"錯:既往出血增加風險。","C":"錯:大小與破裂相關。","D":"錯:ADPKD增加動脈瘤風險。","E":"對:未控制高血壓增加破裂。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ADPKD/顱內動脈瘤）","Brenner & Rector’s The Kidney, 11e（intracranial aneurysm）"]}},"111-合-71":{"quick":"正解(B)：肥胖、大量蛋白尿、60%腎絲球節段性硬化→局部節段性腎絲球硬化(FSGS)。","detail":{"background":"肥胖女性、大量蛋白尿(uPCR 5.9 g/g)、腎切片60%腎絲球見節段性瘢痕、其餘大致正常→局部節段性腎絲球硬化(FSGS,此例為肥胖相關FSGS)。　補充：局部節段性腎絲球硬化(FSGS)可原發或續發(肥胖、腎元減少、藥物、病毒)；肥胖相關FSGS多為次發、蛋白尿較少且足細胞病變較輕，治療以減重、ACEi/ARB為主。","options":{"A":"高血壓性腎硬化蛋白尿較少。","B":"對:FSGS。","C":"微小變化光鏡正常。","D":"膜性為瀰漫GBM增厚。","E":"新月型為急進性腎炎。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（FSGS/肥胖相關腎病）","Brenner & Rector’s The Kidney, 11e（FSGS）"]}},"111-合-72":{"quick":"正解(E=1+3+4+5)：Hb目標10–11.5;EPO於糖尿病增中風、增血栓;HIF穩定劑為口服選擇。","detail":{"background":"CKD使用外源性EPO:(1)Hb目標10–11.5 g/dL(對);(3)合併第2型糖尿病者增中風風險(TREAT,對);(4)HIF穩定劑(如roxadustat)為口服ESA選擇(對);(5)增加血栓栓塞事件(對)。(2)EPO「改善心血管預後」為錯(高Hb反增心血管事件)。","options":{"A":"含(2)錯。","B":"含(2)錯。","C":"含(2)錯。","D":"含(2)錯。","E":"對:1+3+4+5。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD貧血/ESA/HIF）","Brenner & Rector’s The Kidney, 11e（ESA risks）","TREAT/roxadustat"]}},"112-合-56":{"quick":"正解(B為錯)：ACEi/ARB降超過濾是經由「出球」小動脈舒張，非入球收縮。","detail":{"background":"CKD治療：ACEi/ARB於高血壓+糖尿病+蛋白尿者優先(降超過濾、抗蛋白尿)；機轉為「出球(efferent)小動脈舒張」降腎絲球內壓(故B「afferent收縮」為錯)；不建議ACEi+ARB併用(ONTARGET增高鉀、無額外腎益)；非類固醇MRA(finerenone)實證以第2型糖尿病CKD為主(FIDELIO)；SGLT2i經管球回饋使入球收縮、降超過濾。","options":{"A":"ACEi/ARB優先，正確。","B":"錯誤(即答案)：機轉為出球舒張非入球收縮。","C":"不建議ACEi+ARB併用，正確。","D":"finerenone以T2DM CKD為主，正確。","E":"SGLT2i機轉正確。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD藥物機轉）","Brenner & Rector’s The Kidney, 11e（RAAS/SGLT2i）","ONTARGET/FIDELIO"]}},"112-合-58":{"quick":"正解(B最不符)：棕色顆粒管型/WBC管型屬ATN/間質,非腎前性。","detail":{"background":"腎前性氮血症:尿濃縮(尿滲透壓>500)、FeNa<1%、FEurea<35%、近期利尿劑;沉渣乾淨(透明管型)。棕色顆粒管型與WBC管型屬ATN/間質性腎炎,最不符腎前性。　補充：腎前性氮血症沉渣潔淨(透明管型)、尿濃縮且鈉滯留；出現棕色顆粒管型(ATN)或白血球管型(間質性腎炎)即不符腎前性，FeNa<1%但用利尿劑時須改看FEurea。","options":{"A":"尿滲透壓>500,符腎前性。","B":"最不符(即答案):棕色顆粒/WBC管型屬ATN/間質。","C":"FEurea<35%,符腎前性。","D":"FeNa<1%,符腎前性。","E":"近期利尿劑可致腎前性表現。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI鑑別）","Brenner & Rector’s The Kidney, 11e（prerenal indices）"]}},"112-合-59":{"quick":"正解(B)：SLE惡化合併腎病範圍蛋白尿→ANA與anti-dsDNA皆陽性。","detail":{"background":"SLE病人COVID後出現大量蛋白尿/腎病症候群(UPCR 5850)、腎功能惡化→狼瘡腎活化,ANA與anti-dsDNA應皆陽性(B)。ANCA非典型;最可能為瀰漫增生型(class IV)非focal/膜性;貧血+白血球增多為發炎/狼瘡活性,非單純類固醇所致。","options":{"A":"ANCA非典型陽性。","B":"對:ANA+anti-dsDNA陽性。","C":"冷凝球蛋白非典型。","D":"最可能瀰漫增生(IV)非focal/膜性。","E":"貧血/白血球非單純類固醇所致。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（狼瘡腎活化）","Brenner & Rector’s The Kidney, 11e（lupus nephritis flare）"]}},"112-合-60":{"quick":"正解(A)：少量血尿+WBC管型,低風險→疑UTI,6個月後再驗尿。","detail":{"background":"32歲、腎功能正常、尿潛血1+但RBC 0–2(正常範圍)、無蛋白尿、無變形紅血球/紅血球管型,有WBC管型→較像UTI/暫時性。低風險者依指引可6個月後再驗尿追蹤,不需立即切片/細胞學/影像。　補充：低風險顯微血尿(年輕、腎功能正常、無蛋白尿/變形紅血球)可依指引追蹤性重複尿檢，不需立即影像或膀胱鏡；具危險因子(年齡、吸菸、肉眼血尿)才升階檢查。","options":{"A":"對:疑UTI,6個月後再驗尿。","B":"低風險非首選尿細胞學。","C":"腎功能正常、低風險不需切片。","D":"非首要影像。","E":"非首要UACR。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（無症狀血尿處置）","AUA微量血尿指引"]}},"112-合-61":{"quick":"正解(A)：尿毒時prolactin因清除減少而「堆積增加」,可增心血管風險。","detail":{"background":"尿毒症內分泌異常:testosterone、1,25-vitD、estrogen、erythropoietin皆「不足」;而prolactin因腎清除減少+分泌增加而「堆積上升」,與性腺功能障礙及心血管風險增加有關。","options":{"A":"對:prolactin堆積增加。","B":"testosterone不足。","C":"1,25-vitD不足。","D":"estrogen不足。","E":"erythropoietin不足。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿毒內分泌）","Brenner & Rector’s The Kidney, 11e（uremic endocrine）"]}},"112-合-62":{"quick":"正解(B=1+3+5)：Cushing致低鉀;補鎂助矯正低鉀;ABG為混合型(代謝鹼+呼吸酸)。","detail":{"background":"肺癌異位ACTH-Cushing+cisplatin:低血鉀與Cushing(礦皮質效應)有關(1)。尿K 22於血鉀1.9仍偏高→「腎性失鉀」(故2「可排除腎鉀流失」錯)。補鎂有助矯正低鉀(3)。ABG:HCO₃⁻ 40代謝性鹼中毒,預期PCO₂≈40+0.7×16=51,實際58>51→合併呼吸性酸中毒(COPD)=混合型(故5對、4錯)。","options":{"A":"含(4)錯。","B":"對:1+3+5。","C":"含(2)(4)。","D":"含(2)。","E":"含(2)、缺(1)(3)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（混合酸鹼/Cushing低鉀）","Brenner & Rector’s The Kidney, 11e（mineralocorticoid excess）"]}},"112-合-63":{"quick":"正解(C)：糖尿病腎病變→結節性腎小球硬化(Kimmelstiel-Wilson)。","detail":{"background":"長期糖尿病(HbA1c 8.1)、大量蛋白尿(泡沫尿)、周邊神經病變、Cr 2.1→糖尿病腎病變,腎切片典型為結節性腎小球硬化(Kimmelstiel-Wilson結節)。　補充：糖尿病腎病典型病程為微量白蛋白尿→巨量蛋白尿→腎功能下降，病理見Kimmelstiel-Wilson結節與基底膜增厚；治療以控糖控壓、ACEi/ARB與SGLT2抑制劑保腎。","options":{"A":"間質炎症為間質性腎炎。","B":"毛細血管環狀為膜性/MPGN。","C":"對:結節性腎小球硬化。","D":"免疫複合體沉積為免疫性GN。","E":"GBM分裂為Alport/MPGN。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病腎病變病理）","Brenner & Rector’s The Kidney, 11e（diabetic nephropathy）"]}},"112-合-65":{"quick":"正解(C)：高血糖致滲透性利尿→高血鈉、多尿、脫水。","detail":{"background":"75歲嘔吐、HbA1c 10.6、血糖高、血鈉152、多尿、尿滲透壓410→高血糖造成「滲透性(溶質)利尿」→失水多於失鈉→高血鈉與容積不足。非ADH不足(中樞DI尿滲透壓更低)、非單純利尿劑或腸胃液流失、非過量飲水。","options":{"A":"中樞DI尿滲透壓更低。","B":"thiazide多致低鈉。","C":"對:滲透性利尿(高血糖)。","D":"腸胃液流失不致高血鈉多尿。","E":"過量飲水致低鈉。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（滲透性利尿/高血鈉）","Brenner & Rector’s The Kidney, 11e（osmotic diuresis）"]}},"112-合-67":{"quick":"正解(D)：靜脈acyclovir結晶沉積→腎小管阻塞性AKI。","detail":{"background":"帶狀疱疹住院用(靜脈)acyclovir後雙側腰痛、Cr由1.1升至3.5→acyclovir結晶性腎病,結晶沉積於腎小管造成「腎小管阻塞」性AKI(需充分水化、調量)。　補充：acyclovir結晶性腎病因藥物溶解度低、在腎小管沉積致阻塞性AKI，好發快速大劑量靜脈給藥與脫水時；預防為充分水化、減慢輸注並依腎功能調量。","options":{"A":"糖化GBM為慢性糖尿病腎病變。","B":"輸尿管腎盂交界阻塞為單側結構。","C":"乳頭壞死為止痛藥/糖尿病。","D":"對:acyclovir結晶致腎小管阻塞。","E":"入球收縮為顯影劑/鈣調素機轉。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（結晶性腎病/acyclovir）","Brenner & Rector’s The Kidney, 11e（crystal nephropathy）"]}},"112-合-68":{"quick":"正解(C)：加ARB後Cr上升＋難控高血壓＋低血鉀→腎動脈狹窄。","detail":{"background":"加irbesartan後Cr上升(2.1)、難控高血壓、低血鉀(續發性醛固酮)、疲倦頭痛→腎動脈狹窄(雙側/顯著)。ARB使顯著狹窄之腎絲球出球阻力下降→GFR降、Cr升。OSA/甲亢(TSH正常)/多囊腎/糖尿病腎病症候群均不符。","options":{"A":"OSA不致ARB後Cr升。","B":"甲亢TSH正常排除。","C":"對:腎動脈狹窄。","D":"多囊腎影像/家族未提示。","E":"尿蛋白陰性,非腎病症候群。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎血管性高血壓）","Brenner & Rector’s The Kidney, 11e（renovascular HTN）"]}},"112-合-69":{"quick":"正解(E)：吸菸者肺腫塊＋腎病症候群→副腫瘤性膜性腎病。","detail":{"background":"長期吸菸、體重減輕、右上肺腫塊＋腎病症候群(白蛋白1.8、總膽固醇475、蛋白尿4+、脂肪管型)→實體腫瘤(肺癌)相關之「副腫瘤性膜性腎病」。　補充：副腫瘤性膜性腎病以實體腫瘤(肺、胃腸、攝護腺)相關，抗PLA2R多陰性；老年新發膜性腎病合併體重減輕/腫塊須積極篩查惡性腫瘤，治療腫瘤後腎病常改善。","options":{"A":"FSGS非典型副腫瘤(實體癌)。","B":"IgA以血尿為主。","C":"MPGN補體低。","D":"RPGN腎功能急速惡化。","E":"對:膜性腎病(副腫瘤)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（副腫瘤性膜性腎病）","Brenner & Rector’s The Kidney, 11e（malignancy-associated MN）"]}},"112-合-70":{"quick":"正解(C)：尿酸結石(菱形結晶)→potassium citrate鹼化尿液。","detail":{"background":"腰痛、血尿、尿中「菱形(rhomboid)結晶」、無白血球→尿酸結石。治療(除水化外)以potassium citrate鹼化尿液溶解/預防尿酸石。probenecid增尿酸排泄反促石;維生素C增草酸;thiazide用於鈣石;蔓越莓無助。","options":{"A":"probenecid促尿酸排泄反促石。","B":"維生素C增草酸鈣石。","C":"對:potassium citrate鹼化尿液。","D":"thiazide用於鈣石。","E":"蔓越莓無助。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿酸結石）","Brenner & Rector’s The Kidney, 11e（uric acid stone）"]}},"112-合-71":{"quick":"正解(B)：Sjögren＋低鉀非AG酸中毒＋尿pH 6.0＋尿陰離子間隙正→第1型RTA。","detail":{"background":"Sjögren＋低血鉀＋非陰離子間隙代謝性酸中毒(Cl 115、HCO₃⁻ 15)＋酸血症下尿pH仍6.0(無法酸化)＋尿陰離子間隙=35+20−42=+13(正,氨排泄不足)→第1型(遠端)RTA。","options":{"A":"慢性腹瀉尿陰離子間隙為負。","B":"對:第1型遠端RTA。","C":"第2型近端可酸化遠端尿。","D":"第3型罕見混合。","E":"第4型伴高血鉀。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（遠端RTA）","Brenner & Rector’s The Kidney, 11e（distal RTA）"]}},"112-合-72":{"quick":"正解(B)：透析劑量以「尿素清除分率(Kt/V)」定義。","detail":{"background":"目前透析「劑量」以尿素清除分率(Kt/V)定義(K=清除率、t=時間、V=尿素分布體積),非以流速、時數、次數或肌酸酐下降率。　補充：Kt/V與每週尿素清除率(URR)為透析充分性指標；血液透析常以單次Kt/V≥1.2為目標，未達標與營養不良、通路功能不良及死亡率升高相關。","options":{"A":"逆向流速非劑量定義。","B":"對:尿素清除分率(Kt/V)。","C":"時數非劑量定義。","D":"次數非劑量定義。","E":"肌酸酐下降率非標準劑量。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（透析劑量Kt/V）","Brenner & Rector’s The Kidney, 11e（dialysis adequacy）"]}},"113-合-55":{"quick":"正解(B)：惡性高血壓相關血栓性微血管病—內皮損傷與補體活化(ADAMTS-13正常排除TTP)。","detail":{"background":"惡性高血壓(BP 205/129)＋微血管病性溶血(schistocytes)＋血小板低＋AKI,但ADAMTS-13「正常」→非TTP,而是惡性高血壓誘發之血栓性微血管病(內皮損傷、補體活化)。治療核心為「控制血壓」;血漿置換對此型無效;eculizumab用於補體媒介(非典型HUS)。","options":{"A":"錯:ADAMTS-13正常排除TTP。","B":"對:內皮損傷與補體活化。","C":"血漿置換對高血壓型TMA無效。","D":"不會兩週自然緩解,需控壓。","E":"eculizumab用於補體媒介HUS,非與血漿置換相似。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（血栓性微血管病/惡性高血壓）","Brenner & Rector’s The Kidney, 11e（HTN-associated TMA）"]}},"113-合-58":{"quick":"正解(B=1+4)：高血鈣評估查胸部X光與尿鈣排泄,並以靜脈食鹽水水化。","detail":{"background":"高血鈣(14)＋腎功能異常＋腎結石/腎鈣化:評估查胸部X光(sarcoid/惡性)與尿鈣排泄(1);治療以適量靜脈等張食鹽水水化(4)。ANCA/補體(3)為血管炎,血漿置換(5)非高血鈣治療,皆不適用。","options":{"A":"含(3)(5)。","B":"對:(1)胸X光/尿鈣+(4)食鹽水水化。","C":"含(3)(5)。","D":"含(2)非首要。","E":"含(5)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（高血鈣評估/治療）","Brenner & Rector’s The Kidney, 11e（hypercalcemia）"]}},"113-合-59":{"quick":"正解(B除外)：抗肥胖藥(orlistat等)非有利腎臟之治療(orlistat可致草酸鹽腎病)。","detail":{"background":"肥胖相關腎臟病減蛋白尿/護腎:GLP-1 RA(semaglutide)、減重手術、生活型態(低熱量飲食/運動)、RAAS阻斷。抗肥胖藥(orlistat、bupropion-naltrexone)未列為護腎治療,orlistat甚至可致草酸鹽腎病/AKI,故為除外。","options":{"A":"GLP-1 RA有益。","B":"除外(即答案):抗肥胖藥非護腎(orlistat致草酸鹽腎病)。","C":"減重手術有益。","D":"生活型態有益。","E":"RAAS阻斷有益。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（肥胖相關腎臟病）","Brenner & Rector’s The Kidney, 11e（obesity-related glomerulopathy）"]}},"113-合-60":{"quick":"正解(A)：C型肝炎＋低補體＋蛋白尿血尿→HCV相關腎絲球腎炎(冷凝球蛋白型)。","detail":{"background":"C型肝炎＋補體C3/C4皆低＋蛋白尿/血尿/水腫→HCV相關腎絲球腎炎(常為冷凝球蛋白血症之MPGN)。　補充：HCV相關腎絲球腎炎多為冷凝球蛋白血症型MPGN，C3/C4(尤C4)低；即使呼吸道感染(如COVID)後出現，仍須回到HCV病因，治療以DAA根除為核心。","options":{"A":"對:HCV相關腎絲球腎炎。","B":"IgA補體正常。","C":"Pauci-immune(ANCA)補體正常。","D":"膜性補體正常。","E":"類澱粉非低補體。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（HCV相關腎炎）","Brenner & Rector’s The Kidney, 11e（cryoglobulinemic GN）"]}},"113-合-61":{"quick":"正解(A)：發燒、黃疸、肝脾腫、出血傾向、AKI→鉤端螺旋體病,給penicillin或doxycycline。","detail":{"background":"糖尿病人發燒一週、肝脾腫、輕度黃疸、出血傾向(petechiae/滲血)、AKI(eGFR 14)→鉤端螺旋體病(Weil)等人畜共通感染;治療給penicillin或doxycycline,並支持療法。非RAAS/類固醇/單純補液/血漿置換。","options":{"A":"對:penicillin或doxycycline。","B":"AKI時RAAS非適當。","C":"非急性腎絲球腎炎,類固醇不適。","D":"非單純腎前性。","E":"非TTP,血漿置換不適。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（鉤端螺旋體病/Weil）","CDC leptospirosis"]}},"113-合-62":{"quick":"正解(B)：腦下垂體術後中樞性尿崩(尿稀釋、高血鈉)→給desmopressin。","detail":{"background":"腦下垂體術後24小時多尿(4000 mL)、高血鈉(150)、尿滲透壓92(極稀)、尿鈉30→中樞性尿崩(術後ADH不足)。處置給desmopressin(dDAVP)。water deprivation test於已高血鈉者不需;tolvaptan(V2拮抗)會惡化;單純補等張液無法矯正水分流失。","options":{"A":"已高血鈉不需禁水試驗。","B":"對:給desmopressin。","C":"tolvaptan會惡化尿崩。","D":"補等張液無法治本。","E":"thiazide/amiloride/NSAID用於腎源性DI。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（中樞性尿崩）","Brenner & Rector’s The Kidney, 11e（central DI）"]}},"113-合-63":{"quick":"正解(A)：等容積低血鈉先排除腎上腺/甲狀腺,無異常則觀察追蹤。","detail":{"background":"84歲等容積低血鈉(Na 127、血漿滲透壓262低、尿鈉88、尿滲透壓620、CT無異常)→疑SIADH,但診斷SIADH前須先「排除腎上腺不全與甲狀腺低下」(查ACTH/cortisol、T3/T4/TSH),若無異常再持續觀察。不宜貿然限水/補鹽/利尿/3%食鹽水(無急性嚴重症狀)。","options":{"A":"對:先排除腎上腺/甲狀腺,無異常則觀察。","B":"尚未確診不貿然限水。","C":"非首步補鹽。","D":"非首步利尿。","E":"無急性嚴重症狀不需3%食鹽水。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（等容積低血鈉/SIADH診斷）","Brenner & Rector’s The Kidney, 11e（hyponatremia workup）"]}},"113-合-64":{"quick":"正解(A除外)：CKD多為高磷高鎂,「低鈣低磷」情境不適合補鎂(且CKD補鎂易高血鎂)。","detail":{"background":"補鎂有助情境:torsades de pointes、危及生命之氣喘惡化、子癇前/子癇症、頑固性低血鉀(需先補鎂)。CKD通常為「高磷、高鎂(排除減少)」,題述「CKD合併低鈣低磷」情境非典型,且CKD補鎂易致高血鎂,故為除外。","options":{"A":"除外(即答案):CKD不宜補鎂(易高血鎂)。","B":"torsades補鎂,有益。","C":"危及生命氣喘補鎂,有益。","D":"子癇前/子癇症補鎂,有益。","E":"頑固低血鉀需先補鎂。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（低血鎂處置）","Brenner & Rector’s The Kidney, 11e（magnesium）"]}},"113-合-65":{"quick":"正解(C)：感冒同步深色尿+血尿(無感染證據)→腎絲球損傷(IgA腎病)。","detail":{"background":"感冒5天內出現深色尿、血尿(潛血3+、蛋白1+)、白血球酯酶陰性、影像正常→腎絲球性血尿(synpharyngitic,IgA腎病),即腎絲球損傷。非間質腎炎/泌尿上皮腫瘤/腎動脈狹窄/結石。　補充：IgA腎病的synpharyngitic血尿(感染同時/1–2天內、白血球酯酶陰性、影像正常)反映黏膜IgA免疫反應；與感染後腎炎(1–2週潛伏、C3低)及泌尿道感染鑑別。","options":{"A":"間質腎炎多有WBC/嗜伊紅。","B":"泌尿上皮腫瘤少見於29歲且影像正常。","C":"對:腎絲球損傷(IgA)。","D":"腎動脈狹窄不致血尿。","E":"結石超音波多可見、有CVA痛。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎絲球性血尿/IgA）","Brenner & Rector’s The Kidney, 11e（synpharyngitic hematuria）"]}},"113-合-66":{"quick":"正解(C最沒診斷價值)：蛋白尿嚴重程度無法區分糖尿病性與非糖尿病性腎病(兩者皆可大量)。","detail":{"background":"第2型糖尿病大量蛋白尿者區分「單純糖尿病腎病變 vs 非糖尿病性腎絲球病」有價值之線索:糖尿病病程長短、有增殖性視網膜病變(支持糖尿病腎病變)、腎絲球性血尿、紅血球管型(支持非糖尿病性腎炎)。蛋白尿「嚴重程度」兩者皆可大量,最沒鑑別價值。","options":{"A":"糖尿病病程有價值。","B":"增殖性視網膜病變有價值。","C":"最沒價值(即答案):蛋白尿嚴重程度。","D":"腎絲球性血尿有價值。","E":"紅血球管型有價值。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（糖尿病 vs 非糖尿病腎病鑑別）","Brenner & Rector’s The Kidney, 11e（diabetic vs non-diabetic）"]}},"113-合-67":{"quick":"正解(A)：血清抗PLA2R陰性但腎組織PLA2R抗原陽性→免疫緩解,預測自發緩解。","detail":{"background":"原發性膜性腎病:血清抗PLA2R抗體「陰性」而腎小球PLA2R1抗原「陽性」代表免疫活性已下降(免疫緩解先於臨床),預測很可能自發緩解(A)。抗體陽性(尤其高titer)代表活動性、較不易自發緩解、需免疫治療。","options":{"A":"對:血清抗體陰性+組織抗原陽性→預測自發緩解。","B":"抗原亦陰性(可能非PLA2R型)。","C":"抗體陽性=活動性,不易自發緩解。","D":"抗體陽性=活動性。","E":"與抗PLA2R相關(非無關)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（膜性腎病/PLA2R）","Brenner & Rector’s The Kidney, 11e（PLA2R immunologic remission）"]}},"113-合-68":{"quick":"正解(D)：肝硬化、停利尿+白蛋白仍惡化、FeNa<0.1%、沉渣乾淨→肝腎症候群。","detail":{"background":"C肝肝硬化、難治腹水、停利尿劑並給白蛋白後AKI仍進行性惡化、FeNa 0.05%(極低)、尿無蛋白沉渣大致乾淨、無腎積水→肝腎症候群(HRS-AKI)。非ACS(無腹內壓資料)、非ATN(FeNa低、沉渣乾淨)、非單純腎前性(白蛋白擴容後不改善)、非RPGN。","options":{"A":"腹腔室隔需腹內壓證據。","B":"ATN FeNa高、有顆粒管型。","C":"腎前性擴容後應改善。","D":"對:肝腎症候群。","E":"RPGN有血尿/紅血球管型。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（肝腎症候群）","Brenner & Rector’s The Kidney, 11e（hepatorenal syndrome）"]}},"113-合-69":{"quick":"正解(C)：呋洛西米壓力試驗(1.5 mg/kg)後2小時尿量<200 mL預測進展至第3期AKI/需RRT。","detail":{"background":"術後AKI(泥棕色管型=ATN):呋洛西米壓力試驗(furosemide stress test, 1.0–1.5 mg/kg)後2小時尿量<200 mL,對進展至第3期AKI與需腎替代治療有良好預測力。FEurea、白蛋白尿比、NGAL、尿比重預測力均不如此功能性試驗。","options":{"A":"FEurea>50%預測力不足。","B":"白蛋白/肌酸酐比非最佳預測。","C":"對:呋洛西米壓力試驗2h尿量<200 mL。","D":"NGAL為損傷標誌但預測RRT不如FST。","E":"尿比重非最佳預測。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI預後/呋洛西米壓力試驗）","Brenner & Rector’s The Kidney, 11e（furosemide stress test）"]}},"113-合-70":{"quick":"正解(C)：孕婦絞痛性側腰痛放射至腹股溝＋血尿無膿尿→腎結石。","detail":{"background":"妊娠30週,突發絞痛性右側腰痛放射至腹股溝、噁心、血尿(RBC 7–10)但無白血球/白血球管型→腎/輸尿管結石。下尿路感染/腎盂腎炎應有膿尿;卵巢扭轉/闌尾炎尿檢不致此血尿型態。　補充：妊娠期腎絞痛血尿無膿尿者首先考慮輸尿管結石；影像首選腎臟超音波(避輻射)，多數小結石可保守處理(止痛、水化)，發燒/阻塞性腎盂腎炎才需引流。","options":{"A":"下尿路感染應有膿尿。","B":"卵巢扭轉尿檢正常。","C":"對:腎結石。","D":"腎盂腎炎應膿尿/發燒。","E":"闌尾炎尿檢多正常。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（妊娠腎結石）","Brenner & Rector’s The Kidney, 11e（nephrolithiasis in pregnancy）"]}},"113-合-71":{"quick":"正解(E)：藥物過量昏迷、深茶色尿、潛血+但無RBC→橫紋肌溶解→血清肌酸激酶(CK)升高。","detail":{"background":"鴉片/古柯鹼過量、長時間昏迷受壓、大面積瘀傷、深茶色尿、尿潛血3+但鏡檢「無紅血球」→肌球蛋白尿(橫紋肌溶解)。最可能檢驗結果為血清肌酸激酶(CK)「升高」(並常伴高鉀、高磷、低鈣、AKI、BUN升高)。","options":{"A":"橫紋肌溶解多「高」血鉀非低。","B":"LDH會升高非降低。","C":"AKI時BUN升高非低。","D":"多為「低」血鈣非高。","E":"對:CK升高。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（橫紋肌溶解）","Brenner & Rector’s The Kidney, 11e（rhabdomyolysis labs）"]}},"114-合-56":{"quick":"正解(B)：URI後約兩週、低C3、急性腎炎→感染後腎絲球腎炎(PIGN)。","detail":{"background":"上呼吸道感染「約兩週後(潛伏期)」出現血尿、蛋白尿、水腫、高血壓、Cr上升且C3「偏低」→感染後(鏈球菌)腎絲球腎炎(PIGN)。IgA腎病為「同步(synpharyngitic)」血尿且補體正常,可資鑑別。","options":{"A":"IgA為同步血尿、補體正常。","B":"對:感染後腎絲球腎炎(低C3、潛伏約兩週)。","C":"HSP有紫斑/腹痛/關節。","D":"FSGS補體正常。","E":"Wegener為ANCA陽性。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（感染後腎絲球腎炎）","Brenner & Rector’s The Kidney, 11e（post-infectious GN）"]}},"114-合-57":{"quick":"正解(B)：免疫檢查點抑制劑→急性小管間質腎炎(ATIN)。","detail":{"background":"肺癌接受免疫檢查點抑制劑(ICI)約兩週後出現發燒、肋脊角壓痛、嗜伊紅增多、Cr上升→免疫相關「急性小管間質腎炎(ATIN)」(免疫不良事件),處置常需停藥並給類固醇。　補充：免疫檢查點抑制劑相關急性小管間質腎炎可於用藥數週至數月出現，常伴其他免疫不良事件與嗜伊紅增多；處置為停用ICI並給類固醇，多數腎功能可恢復。","options":{"A":"AGN多有血尿/紅血球管型。","B":"對:急性小管間質腎炎(ICI相關)。","C":"免疫複合體疾病補體多異常。","D":"感染相關GN有感染源。","E":"RPGN腎功能急速惡化、有新月體。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ICI相關腎毒性/ATIN）","Brenner & Rector’s The Kidney, 11e（immune checkpoint inhibitor nephritis）"]}},"114-合-58":{"quick":"正解(A)：急性腎小管壞死→泥棕色顆粒管型(granular casts)。","detail":{"background":"急性腎小管壞死(ATN)典型尿沉渣為「泥棕色顆粒管型(muddy brown granular casts)」與腎小管上皮細胞。紅血球管型/變形紅血球→腎絲球;透明管型→腎前性;脂肪管型/Maltese crosses→腎病症候群;蠟狀管型→慢性。","options":{"A":"對:顆粒管型→ATN。","B":"紅血球管型→腎絲球。","C":"透明管型→腎前性。","D":"脂肪管型→腎病症候群。","E":"蠟狀管型→慢性腎病。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（尿沉渣/ATN）","Brenner & Rector’s The Kidney, 11e（urinary casts）"]}},"114-合-60":{"quick":"正解(B)：CKD骨病變最早為「磷滯留致高血磷」之啟動事件。","detail":{"background":"CKD-MBD經典致病序列:腎元減少→「磷滯留(高血磷)」為最早啟動事件→刺激osteocyte分泌FGF-23、降低1,25-vitD→離子鈣下降→副甲狀腺增生、次發性副甲狀腺亢進。(註:FGF-23上升為最早可測之代償生物標誌,但啟動機轉為磷滯留)。","options":{"A":"1,25-vitD下降為後續。","B":"對:磷滯留(高血磷)為最早啟動。","C":"FGF-23上升為代償(隨磷滯留)。","D":"低離子鈣為後續。","E":"副甲狀腺增生為最終結果。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD-MBD序列）","Brenner & Rector’s The Kidney, 11e（phosphate retention初始事件）"]}},"114-合-61":{"quick":"正解(D=2+5)：高陰離子間隙代謝性酸中毒合併呼吸性鹼中毒(過度代償)。","detail":{"background":"HCO₃⁻ 13→代謝性酸中毒;AG=144−102−13=29(高AG,5)。Winter預期PCO₂=1.5×13+8≈27.5±2,實際20<預期→「過度」呼吸代償=合併呼吸性鹼中毒(2)。故為混合型:高AG代謝性酸中毒＋呼吸性鹼中毒(如水楊酸中毒/敗血症型)。","options":{"A":"非單純代償+正常AG。","B":"非單純代償(PCO₂過低)。","C":"非合併呼吸性酸中毒。","D":"對:2+5。","E":"含正常AG(錯)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（混合酸鹼/Winter公式）","Brenner & Rector’s The Kidney, 11e（high-AG + resp alkalosis）"]}},"114-合-62":{"quick":"正解(E)：β-blocker會增加尿酸與痛風風險。","detail":{"background":"除利尿劑外,β-blocker會降低尿酸排泄、增加高尿酸與痛風風險。losartan(尿酸排泄↑)、fenofibrate(尿酸排泄↑)、SGLT2抑制劑(降尿酸)、metformin(中性)反而不增或降低尿酸。","options":{"A":"SGLT2i降尿酸。","B":"metformin中性。","C":"losartan促尿酸排泄(降)。","D":"fenofibrate促尿酸排泄(降)。","E":"對:β-blocker增尿酸/痛風。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（藥物與高尿酸）","Brenner & Rector’s The Kidney, 11e（urate-altering drugs）"]}},"114-合-63":{"quick":"正解(B)：Cr由1.0升至2.2(2.2倍)且尿量<0.5 mL/kg/h≥12h→AKI第2期。","detail":{"background":"KDIGO AKI分期:Cr上升至基礎2.0–2.9倍=第2期(本例2.2倍);尿量700 mL/24h÷60 kg≈0.49 mL/kg/h(<0.5持續≥12h)=第2期。兩準則皆為第2期。　補充：KDIGO AKI分期取肌酸酐與尿量準則中『較嚴重者』：本例肌酸酐2.2倍(第2期)且尿量0.49 mL/kg/h持續(第2期)，故為第2期；分期愈高、預後與透析需求愈差。","options":{"A":"第1期為1.5–1.9倍。","B":"對:第2期(2.0–2.9倍)。","C":"第3期為≥3倍或Cr≥4或需RRT。","D":"可依KDIGO分期,不需切片。","E":"已符AKI(Cr升≥1.5倍)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI分期）","KDIGO AKI 2012"]}},"114-合-64":{"quick":"正解(C)：腎前性氮血症因腎血流灌流不足致過濾壓下降。","detail":{"background":"腎前性氮血症:因有效循環/腎血流灌流不足→腎絲球過濾壓下降,腎小管實質「未」受永久破壞、為可逆(及時恢復灌流即改善)。非以高血鉀為最早、不需先有尿毒症狀才能診斷。　補充：腎前性氮血症為功能性、可逆，腎小管實質未受永久破壞，及時恢復腎灌流即改善；與ATN(已有小管壞死、補液後不改善、棕色顆粒管型)鑑別為臨床關鍵。","options":{"A":"錯:非腎小管永久破壞。","B":"錯:高血鉀非最早。","C":"對:灌流不足→過濾壓下降。","D":"錯:不需先尿毒症狀。","E":"錯:及時處理可逆。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（腎前性氮血症）","Brenner & Rector’s The Kidney, 11e（prerenal azotemia）"]}},"114-合-65":{"quick":"正解(C)：ADPKD最常見致病基因為PKD1。","detail":{"background":"常染色體顯性多囊腎病(ADPKD)最常見致病基因為PKD1(約85%,病程較重)；PKD2約15%(較輕)。PKHD1為「隱性」多囊腎;NPHP1為腎消耗病;HNF1B、CEP290為其他遺傳性腎病。","options":{"A":"PKHD1為隱性多囊腎。","B":"NPHP1為腎消耗病。","C":"對:PKD1。","D":"HNF1B為其他遺傳腎病。","E":"CEP290為纖毛病。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（ADPKD遺傳）","Brenner & Rector’s The Kidney, 11e（PKD1/PKD2）"]}},"114-合-66":{"quick":"正解(E)：CKD 3b＋A3,調整降壓藥達<130/80 mmHg。","detail":{"background":"eGFR 32(CKD第3b期)、UACR 850(A3,屬高/極高風險)。最適當照護為調整降壓(含ACEi/ARB)達血壓<130/80,並持續腎臟保護。非第2期/非僅年度追蹤;不應停腎保護藥;CKD多鈉「滯留」非大量流失;第3b期尚不需立即透析/移植準備。","options":{"A":"錯:此為第3b期非第2期。","B":"錯:不應停腎保護藥。","C":"錯:CKD多鈉滯留非流失。","D":"第3b期尚不需立即透析準備。","E":"對:調整降壓達<130/80。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD照護/血壓目標）","KDIGO血壓指引(<120–130)"]}},"114-合-67":{"quick":"正解(C)：敗血性休克、血流動力學不穩→CRRT溫和持續清除,穩血壓並處理高鉀酸中毒。","detail":{"background":"敗血性休克、無尿、高血鉀(6.8)、代謝性酸中毒、血流動力學不穩→連續腎臟替代治療(CRRT)溫和持續清除,較能維持血壓並有效處理高鉀與酸中毒。PD清除慢不適急救;IHD於不穩定者易低血壓;單用胰島素/鈣只暫穩血鉀;不可因不穩而完全不透析。","options":{"A":"PD清除慢,不適急救。","B":"IHD於不穩定者易低血壓。","C":"對:CRRT(不穩定首選)。","D":"胰島素/鈣僅暫穩,仍需透析。","E":"錯:不可完全不透析(高鉀致命)。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI透析模式選擇）","Brenner & Rector’s The Kidney, 11e（CRRT vs IHD）"]}},"114-合-69":{"quick":"正解(D)：限制蛋白可能延緩尿毒進展,但須避免營養不良。","detail":{"background":"CKD第4期營養:適度限制蛋白(~0.6–0.8 g/kg)可能延緩尿毒症狀進展,但須搭配足夠熱量、避免營養不良(本例已疲倦、胃口差、體重下降,無營養師介入有風險)。非全面高蛋白、非不需控制、非僅限透析病人。","options":{"A":"錯:不應全面高蛋白。","B":"錯:限蛋白非致低血鉀之理由。","C":"錯:CKD會影響營養。","D":"對:限蛋白可延緩進展但避免營養不良。","E":"錯:未透析CKD亦適度限蛋白。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（CKD營養/蛋白限制）","KDOQI營養指引"]}},"114-合-70":{"quick":"正解(B)：等張尿、顆粒管型、FeNa 3%→缺血相關AKI(ATN)。","detail":{"background":"心臟手術後低血壓＋Cr上升、尿比重1.010(等張尿)、顆粒管型、FeNa 3%(>2%)→缺血相關急性腎損傷(ATN)。腎前性FeNa<1%、尿濃縮;阻塞有水腎;溶血有肌紅/血紅素;CIN之FeNa多偏低。","options":{"A":"腎前性FeNa<1%、尿濃縮。","B":"對:缺血相關AKI(ATN)。","C":"阻塞有水腎。","D":"溶血有血紅素尿。","E":"CIN之FeNa多偏低。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（缺血性ATN）","Brenner & Rector’s The Kidney, 11e（ischemic AKI）"]}},"114-合-71":{"quick":"正解(D=1+3+5)：腎前性(BUN/Cr>20)、腫瘤溶解(高磷高尿酸低鈣)、AIN(尿嗜伊紅/無菌膿尿)。","detail":{"background":"配對正確者:(1)腎前性氮血症→BUN/Cr>20、FeNa<1%(題述1.0%為臨界);(3)腫瘤溶解→高磷、高尿酸、低鈣;(5)AIN→尿嗜伊紅、無菌性膿尿、常需腎切片。(2)TTP/HUS應為「高LDH」(非低,錯);(4)CIN之FeNa多「偏低(<1%)」且約7–10天恢復(非24小時內、非FeNa>2%,錯)。","options":{"A":"含(2)錯。","B":"含(2)(4)錯。","C":"含(4)錯。","D":"對:1+3+5。","E":"含(2)錯。"},"sources":["Harrison’s Principles of Internal Medicine, 21e（AKI病因-實驗室配對）","Brenner & Rector’s The Kidney, 11e（AKI differential）"]}}},TO=["腎絲球疾病(腎炎/腎病症候群)", "慢性腎臟病/尿毒症", "急性腎損傷(AKI)", "腎小管間質與RTA", "水電解質異常(鈉鉀鈣磷鎂/水)", "酸鹼平衡異常", "透析與腎移植", "高血壓/腎血管疾病", "感染/結石/阻塞", "囊性/遺傳性腎病", "腎細胞癌/腫瘤", "腎臟生理/藥理/腎毒性"];
const $=s=>document.querySelector(s);
let view='year',expand=false;
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){return '答案：'+q.answer;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">民國'+q.roc_year+'</span>','<span class="chip">'+esc(q.src)+'</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(q.answer===k)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='im_kidney_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
