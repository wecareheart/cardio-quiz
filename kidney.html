<script>
const Q=[{"num":1,"answer":"D","stem":"隨著腎功能惡化,較嚴重的CKD(chronic kidney disease)病人會發生酸鹼平衡的異常,下列何者為正確?","options":{"A":"大部分的病人會產生比正常人更多量的ammonia以排除多餘的H+(氫離子)","B":"若有高血鉀,會使ammonia製造更增加,以利排酸.","C":"高血鉀 (hyperkalemia)及hyperchloremic metabolic acidosis 又稱type III RTA, 常見於糖尿病腎病變(DM nephropathy), 或腎小管間質性疾病 (tubulo-interstitial disease).","D":"當血中bicarbonate低於 20-23mmol/L就可考慮補充alkali.","E":"當腎功能愈來愈惡化, 常常由anion-gap metabolic acidosis變成non-anion-gap metabolic acidosis."},"id":"100-腎-1","roc_year":100,"source":"舊站q4腎臟科","topic":"酸鹼平衡異常","q_num":1,"src":"舊站腎臟科"},{"num":2,"answer":"A","stem":"有一位70歲女性, 腳腫已兩週, 人可以活動. 每天尿蛋白排泄約6 gm , 血中白蛋白(albumin)為2.8 g/dL,下列何種描述不正確?","options":{"A":"這類病人每位都應儘早給以抗凝劑(warfarin).","B":"尿液檢查可能伴有顯微血尿(microscopic hematuria).","C":"有些病人可能病情會自動改善(remission)","D":"如果為原發性腎炎,最常見的可能性為membranous nephropathy所造成.","E":"肺癌可能會造成此種併發症."},"id":"100-腎-2","roc_year":100,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":2,"src":"舊站腎臟科"},{"num":3,"answer":"B","stem":"有一位65歲男性, 懷疑腎結石, 接受IVU ( intravenous urography) 檢查, 第三天發現BUN由33 mg/dL升至60 mg/dL, 血中creatinine由2.1 mg/dL升至4.6 mg/dL,下列描述何者正確?","options":{"A":"顯影劑乃由血管擴張之機轉導致腎損傷.","B":"心臟衰竭(congestive heart failure)病人較容易發生此併發症,","C":"顯影劑之劑量與腎損傷之程度通常無關.","D":"顯影劑可經過reactive oxygen species之機轉, 主要傷害腎小球(glomerular cells).","E":"通常為可逆性, 巔峰期(peak)為10-12天, 大約2 星期內恢復."},"id":"100-腎-3","roc_year":100,"source":"舊站q4腎臟科","topic":"急性腎損傷(AKI)","q_num":3,"src":"舊站腎臟科"},{"num":4,"answer":"C","stem":"有一個外國人到台灣旅遊, 因尿很多來做檢查, 發現尿液中WBC 20-25/HPF, RBC 15-20/HPF, protein+, 血中BUN 45 mg/dL, creatinine 3.8 mg/dL, 兩年前檢查血中creatinine為2.5mg/dL, 他說常常吃止痛複方(aspirin+phenacetin+acetaminophen)已有15年以上,請問下列何者不正確?","options":{"A":"病人的腎病和止痛藥可能有關.","B":"他若照IVU(intravenous urography)可能出現 〝ring sign〞.","C":"將來可能發生的併發症為renal cell carcinoma.","D":"此種病變之特點為papillary necrosis及tubulo-interstitial inflammation.","E":"發生貧血的程度往往與腎功能衰竭之程度不成比例."},"id":"100-腎-4","roc_year":100,"source":"舊站q4腎臟科","topic":"腎小管間質與RTA","q_num":4,"src":"舊站腎臟科"},{"num":5,"answer":"E","stem":"有一位62歲女性, 接受化療(chemotherapy)後, 發現BUN為42 mg/dL, creatinine 3.8 mg/dL, hemoglobin為9.0 g/dL, platelet 31 k/μl (半年前4項都正常), 血液抹片出現fragmented RBC. 下列何者正確?","options":{"A":"此病之死亡率極低,大多數可以治癒.","B":"最常引起此現象的化療藥物為cyclophosphamide.","C":"發生過程十分緩慢, 不會突然發生.","D":"用類固醇, 血漿交換(plasma exchange)及免疫抑制劑可成功治癒大多數病患.","E":"病理組織上呈現thrombotic microangiopathy."},"id":"100-腎-5","roc_year":100,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":5,"src":"舊站腎臟科"},{"num":6,"answer":"E","stem":"一位45歲女性,病人意識稍微不清楚, 在急診處被發現血鈉為118mmol/L, 下列那些〝全部正確〞? 1.大部分低血鈉的成因常伴隨低血漿滲透壓 (hypo-osmolality) . 2.所謂SIADH乃高體液(hypervolemic)hyponatremia 中最常見的一種原因. 3.低血鈉可能因甲狀腺機能亢進(hyperthyroidism)引起. 4.病人意識不正常, 其機轉為腦水腫(cerebral edema) 5.血鈉突然降低至120 mmol/L以下, 病人可能發生昏迷(coma)或抽搐(seizure) 6.腎上腺機能亢進也可以引發此情況 7.喝下大量啤酒而食物吃很少可能引發此情況, 稱為beer potomania","options":{"A":"1+2+3","B":"2+6+7","C":"1+2+6","D":"3+6+7","E":"4+5+7"},"id":"100-腎-6","roc_year":100,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":6,"src":"舊站腎臟科"},{"num":7,"answer":"D","stem":"一位62歲婦人, 血鈣為2.8 mmol/L, 人沒有明顯症狀,下列那些描述〝全部正確〞: 1.她的血中副甲狀腺荷爾蒙(PTH)不一定升高. 2.有很多腫瘤會分泌PTH造成高血鈣 3.sarcoidosis造成高鈣是因為分泌PTH之故 4.甲狀腺功能低下(hypothyroidism)促使骨骼之鈣移出而造成高鈣血症 5.嚴重高鈣血症可以引起心跳慢(bradycardia), 心房心室傳導阻斷(AV block) 6.評估血鈣異常第一步需先知道血中白蛋白(Albumin)的濃度. 7.高血鈣同時併有低血PTH濃度(hypercalcemia with suppessed PTH level)最常見的原因為惡性腫瘤(malignancy).","options":{"A":"1+2+3","B":"2+4+5","C":"3+4+6","D":"1+5+6","E":"4+6+7"},"id":"100-腎-7","roc_year":100,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":7,"src":"舊站腎臟科"},{"num":8,"answer":"D","stem":"那一種情形容易發生高血鉀(hyperkalemia)?","options":{"A":"體溫過低(Hypothermia)","B":"Thyrotoxic periodic paralysis","C":"鎂 (Magnesium) 缺乏","D":"使用COX-2抑制劑","E":"Total parenteral nutrition"},"id":"100-腎-8","roc_year":100,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":8,"src":"舊站腎臟科"},{"num":9,"answer":"E","stem":"一位65歲男性, 有十二指腸潰瘍病史, 突然吐出大量鮮血, 被送到急診處時血壓量到60/20mmHg, 據家屬描述, 病人住在偏遠地區, 花數小時才送到醫院, 經測量血中乳酸(lactic acid) 偏高, 下列描述何者正確?","options":{"A":"乳酸中毒(lactic acidosis)為一種正常anion gap之酸中毒 (acidosis).","B":"分為type A,B,C三種.","C":"給予血管收縮劑(vasoconstrictor)有益無害.","D":"應注射(NaHCO3)使血液PH儘快恢復至正常.","E":"用NaHCO3治療有時會引起高血壓及體液過多(fluid overload)"},"id":"100-腎-9","roc_year":100,"source":"舊站q4腎臟科","topic":"酸鹼平衡異常","q_num":9,"src":"舊站腎臟科"},{"num":10,"answer":"E","stem":"下列那一項不是hypercholemic metabolic acidosis 的成因?","options":{"A":"腹瀉 (diarrhea)","B":"慢性mild to moderate腎病(CKD)【當腎小球過濾率(GFR)約介於20-50ml/min時】","C":"第二型(type II)腎小管酸化症 (proximal RTA)","D":"低腎素低皮質醛酮症(hyporeninemic hypoaldosteronism)","E":"酮酸中毒(ketoacidosis)"},"id":"100-腎-10","roc_year":100,"source":"舊站q4腎臟科","topic":"酸鹼平衡異常","q_num":10,"src":"舊站腎臟科"},{"num":11,"answer":"A","stem":"44歲男性,因為急性冠心症(acute coronary syndrome)住院。住院血壓 162/100 mm Hg, 下肢水腫(2+), 實驗室檢查: [Albumin] 2.6 g/dL, t-Chol 320 mg/dL, LDL 178 mg/dL, 蛋白尿(4+). 如果進一步檢查,何種指標的數值最可能會比正常人偏低?","options":{"A":"anti-thrombin III","B":"fibrinogen antigen and activity","C":"factor VII","D":"alpha-2 macroglobulin","E":"protein C and protein S levels"},"id":"100-腎-11","roc_year":100,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":11,"src":"舊站腎臟科"},{"num":12,"answer":"C","stem":"48歲女性最近半年因為糖尿病、血壓偏高,開始接受下列藥物治療,近三週以來自我發覺有雙下肢足踝按壓式水腫。病人本身體重無顯著增加,沒有exertional dyspnea, 也無肝疾患。實驗室檢查: 蛋白尿(-),血清albumin 4.1 g/dL, 肌酸酐1.1 mg/dL, AST 20 IU/L, ALT 18 IU/L, C3 與 ANA 皆正常。有關此病人的處置建議,除了控制鹽分攝取之外,何者應該無關?","options":{"A":"暫停 minoxidil","B":"暫停 nifedipine (calcium channel blocker)","C":"暫停 metformin","D":"暫停或減少使用 NSAID (nonsteroidal anti-inflammatory drugs)","E":"暫停 thiazolidinediones"},"id":"100-腎-12","roc_year":100,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":12,"src":"舊站腎臟科"},{"num":13,"answer":"C","stem":"31歲女性因發燒、倦怠、水腫、體重短期內暴增5公斤住院。理學檢查: 體溫37.8°C,血壓153/110 mmHg,下肢水腫(3+)。實驗室檢查: 蛋白尿(4+),血清C3 34 mg/dL,anti-dsDNA 呈現高價數; 尿素氮 40 mg/dL,肌酸酐2.5 mg/dL。腎臟切片在得到的11個腎絲球有7個類似的病理變化 。有關此病人的診斷及治療: 1.病理結果顯示為慢性的第五級(class V)lupus nephritis。 2.通常這樣的病理變化需要脈衝療法(pulse therapy),如: 類固醇脈衝療法。 3.也可使用cyclophosphamide脈衝療法,建議在前6個月應每月給予靜脈注射0.5-1 g/m2。 4.應該先從口服低劑量類固醇(prednisolone 0.5 mg/kg/day)開始治療。 5.此類病人有愈顯著的interstitial fibrosis,長期預後比較差。 6.必要時,可以搭配利尿劑或aspirin。 下列何種組合是正確的?","options":{"A":"1+2+3","B":"1+3+4","C":"2+3+6","D":"1+4+6","E":"4+5"},"id":"100-腎-13","roc_year":100,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":13,"src":"舊站腎臟科"},{"num":14,"answer":"B","stem":"一位38歲職業婦女,過去血壓約138/84 mm Hg,在懷孕約26週產前檢查時發現: 血壓 150/94 mm Hg,有蛋白尿 (3+),和輕度足背水腫。有關血壓治療,何者藥物較適當? 1.hydralazine 2.labetalol 3.clonidine 4.methyldopa 5.captopril 6.losartan 7.aliskiren","options":{"A":"1+4+5","B":"1+2+4","C":"2+5+7","D":"3+4+6","E":"1+3+6"},"id":"100-腎-14","roc_year":100,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":14,"src":"舊站腎臟科"},{"num":15,"answer":"A","stem":"一位46歲末期腎臟病男性,因為Hb 8.4 g/dL故醫師開立erythropoietin (EPO, 2000 unit biweekly)注射矯正腎性貧血。隨後的八個月期間,雖然增加EPO劑量至 5000 unit biweekly,病人的Hb卻逐步降低至6.4 g/dL。期間: 腎功能無顯著惡化,飲食正常,也無缺鐵性貧血。實驗室檢查: Reticulocyte count偏低,而骨隨檢查為: Normal cellularity except diminished RBC precursors。有關病人的診斷予處置建議,何者錯誤?","options":{"A":"再增加EPO至5000 units three times per week","B":"考慮給予immunosuppressive agents","C":"如果接受腎臟移植,貧血應該會改善","D":"檢查是否有anti-erythropoietin antibody","E":"間歇性輸血RBC補充,矯正貧血"},"id":"100-腎-15","roc_year":100,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":15,"src":"舊站腎臟科"},{"num":16,"answer":"B","stem":"一位58歲女性因腹痛被送至急診。病人有糖尿病長期接受下列藥物治療,一年半前實驗室檢查: creatinine 1.4 mg/dL,五個月前升至 3.5 mg/dL。在急診的重要數據:如下: BP 162/88 mm Hg, HR 120 beats/min, respiratory rate 26 breaths/min, BT 35.2°C, PaO2 96% (room air)。腹部觸診無特殊發現,抽血檢查有 metabolic acidosis: pH 7.01; HCO3- 2.3 mmol/L; [Na] 145 mEq/L, [K] 5.2 mEq/L, [Cl] 99 mEq/L; glucose 78 mg/dL 您認為: 最可能跟目前所使用的何種藥物有關?","options":{"A":"furosemide","B":"metformin","C":"atenolol","D":"losartan","E":"amlodipine"},"id":"100-腎-16","roc_year":100,"source":"舊站q4腎臟科","topic":"酸鹼平衡異常","q_num":16,"src":"舊站腎臟科"},{"num":17,"answer":"B","stem":"一位54 歲女性,沒有糖尿病或有高血壓,但是有 proteinuria (2.4 g/24 hr), microscopic hematuria, 及polymyalgia。其他實驗室檢查: , Hb 8.6, MCV 90 (fL), MCHC 32 g/dL. serum creatinine 2.2 mg/dL, hypercalcemia ([Ca] 11.8 mg/dL), 及 urinary monoclonal protein。腎臟生檢(renal biopsy)。病人的診斷最可能是:","options":{"A":"Wegener's granulomatosis","B":"multiple myeloma","C":"Hemolytic Uremic Syndrome","D":"systemic lupus erythematosus (SLE)","E":"Henoch-Schonlein Purpura"},"id":"100-腎-17","roc_year":100,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":17,"src":"舊站腎臟科"},{"num":18,"answer":"C","stem":"一位約40歲男性,過去健康情形良好,無糖尿病。本次因倦怠、腹痛、腰酸到急診。理學與實驗室檢查: BP 132/82 mm Hg, edema (-), creatinine 3.0 mg/dL。尿液檢查有: proteinuria (+/-), O.B. (+), WBC 30-50/HPF ,半年前健康檢查的creatinine值是 1.0 mg/dL。請問: 下一步應該先進行哪種檢查診斷步驟?","options":{"A":"檢測 抗核抗體 (ANA , anti-nuclear antibody)","B":"檢測 anti-GBM (glomerular basement membrane) antibody","C":"安排做 renal sonography","D":"估算 eGFR 與抽血檢測 [Na], [K], [Ca]","E":"安排做 renal biopsy"},"id":"100-腎-18","roc_year":100,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":18,"src":"舊站腎臟科"},{"num":19,"answer":"A","stem":"一位約80歲居住在養護中心的老人,因為虛弱被送至急診。檢查發現: BP 88/64 mm Hg, HR 100/min, BT 37.6°C, [Albumin] 3.0 g/dL, BUN 32 mg/dL, creatinine 0.8 mg/dL, [Na] 134 mEq/L, [K] 2.7 mEq/L, [Cl] 107 mEq/L。ABG為 pH 7.30, PaO2 90 mm Hg, PaCO2 23 mm Hg, HCO3- 11 mEq/L. 急診醫師的診斷為: 1.metabolic acidosis 2.respiratory acidosis 3.anion-gap (+) 4.non-anion-gap 5.符合hypoaldosteronism 6.可能有潛在感染症 7.可能有severe diarrhea 或使用diuretics 以下何者正確?","options":{"A":"1+3+6","B":"2+3+5+7","C":"1+4+5+7","D":"1+3+7","E":"1+4+6+7"},"id":"100-腎-19","roc_year":100,"source":"舊站q4腎臟科","topic":"酸鹼平衡異常","q_num":19,"src":"舊站腎臟科"},{"num":20,"answer":"B","stem":"慢性腎臟病(CKD)是國人重要的醫療經濟與健康議題。根據CKD照護方案與國內流行病學專家的多項研究,以及2010年所出版的高血壓治療指引顯示: 控制以下危險因子與治療建議,可以延緩或減少 CKD進展至末期腎臟病(ESRD)或洗腎(dialysis),何者除外?","options":{"A":"DM-CKD病人,定期檢測蛋白尿","B":"DM-CKD病人,如果有蛋白尿(> 1.0 g/day),血壓控制以140/90 mm Hg為目標","C":"DM-CKD病人,定期檢測HbA1C,控制在7.0 %或以下","D":"血脂異常(dyslipidemia)也是一個危險因子,如: high LDL-cholesterol level","E":"建議低鹽(low salt)飲食習慣"},"id":"100-腎-20","roc_year":100,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":20,"src":"舊站腎臟科"},{"num":21,"answer":"B","stem":"一位70歲女性,本身有高血壓,使用atenolol 和 furosemide,因為近一週來有頭暈、虛弱情形,所以已經暫停血壓用藥。到急診時: 血壓 114/68 mm Hg, HR 100/min, BT 36.5°C, edema (-). 實驗室檢查: Hb 10.5 g/dL, Hct 29%, albumin 3.8 g/dL, creatinine 1.1 mg/dL, [Na] 119 mEq/L, [K] 3.6 mEq/L, [Cl] 84 mEq/L, ABG為: pH 7.47, PaO2 98 mm Hg, PaCO2 44 mm Hg, HCO3- 27 mEq/L. 檢測尿中電解質: [Na]urine 6 mEq/L, [K]urine 14 mEq/L. 請問: 以下診斷,何者不正確?","options":{"A":"飲食中鹽分(salt)攝取可能不足","B":"符合SIADH (syndrome of inappropriate antidiuretic hormone hypersecretion)","C":"ABG顯示病人有metabolic alkalosis","D":"可能與之前使用diuretics (furosemide)有關","E":"應該檢測serum 和 urine osmolality,有助於鑑別診斷"},"id":"100-腎-21","roc_year":100,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":21,"src":"舊站腎臟科"},{"num":22,"answer":"A","stem":"相較於血液透析(HD, hemodialysis),有關腹膜透析(PD, peritoneal dialysis)的敘述與長期合併症,何者不正確?","options":{"A":"PD病人使用高糖透析液是為了要達到透析清除尿毒素(uremic toxin)的效果","B":"PD病人容易出現hypertriglyceridemia,是因為使用高糖透析液","C":"相較於血液透析(HD),腹膜透析(PD)病人較容易發生腹膜炎(peritonitis)","D":"相較於血液透析(HD),腹膜透析(PD)病人每日蛋白質流失量較高","E":"相較於腹膜透析(PD),血液透析(HD)病人較出現透析中低血壓"},"id":"100-腎-22","roc_year":100,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":22,"src":"舊站腎臟科"},{"num":1,"answer":"C","stem":"一位65歲糖尿病人,有高血壓,準備接受心導管檢查。理學檢查:BP 118/74, edema (-), serum [creatinine] 1.5 mg/dL。目前用藥為: metformin 500 mg bid, irbesartan 75 mg qd, trichlormethiazide 1 mg qd. 為了降低發生contrast nephropathy的危險,以下哪項措施最不建議。","options":{"A":"停用metformin, 更換成其他降血糖藥","B":"volume expansion with saline, 可以加上 bicarbonate","C":"停用irbesartan, 更換成fenoldopam降血壓藥比較安全","D":"給予 N-acetylcysteine","E":"打radiocontrast agent前,給予aminophylline"},"id":"101-腎-1","roc_year":101,"source":"舊站q4腎臟科","topic":"急性腎損傷(AKI)","q_num":1,"src":"舊站腎臟科"},{"num":2,"answer":"B","stem":"一位24歲女性,過去無病史。約2個月前開始注意出現水腫,體重在2個月內增加8公斤。實驗室檢查: Albumin 2.8 g/dL, creatinine 0.8 mg/dL, t-Chol 280 mg/dL, LDL 163 mg/dL, urine protein-creatinine (P/C) ratio 約9 mg/mg, urinalysis O.B. (-), serum [K] 4 mEq/L, [Ca] 9.2 mg/dL, Hb 12 g/dL。本病人的診斷,最可能為?","options":{"A":"IgA nephropathy","B":"minimal change disease","C":"multiple myeloma with nephropathy","D":"systemic lupus erythromatous (SLE) with nephropathy","E":"membranoproliferative glomerulonephritis (MPGN)"},"id":"101-腎-2","roc_year":101,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":2,"src":"舊站腎臟科"},{"num":3,"answer":"A","stem":"有關hyperuricemia的治療,以下哪一種敘述的組合是正確的? (1) asymptomatic hyperuricemia病人使用allopurinol可以預防腎功能惡化 (2) asymptomatic hyperuricemia病人使用預防性allopurinol可以預防acute uric acid nephropathy發生 (3) 已經有gouty arthritis的病人,建議給予allopurinol預防uric acid stone或calcium oxalate stone發生 (4)對於反覆發生uric acid stone的病人,也可以使用potassium-citrate治療 (5) 已使用allopurinol的病人如果又發生acute gouty arthritis, 應該停用allopurinol, 改用 colchicine來取代","options":{"A":"(3)+(4)","B":"(1)+(3)+(4)","C":"(2)+(3)+(4)","D":"(3)+(4)+(5)","E":"(1)+(3)+(5)"},"id":"101-腎-3","roc_year":101,"source":"舊站q4腎臟科","topic":"感染/結石/阻塞","q_num":3,"src":"舊站腎臟科"},{"num":4,"answer":"A","stem":"一位scleroderma (systemic sclerosis)的病人,過去血壓控制良好,有輕度蛋白尿(+),creatinine約1.8 mg/dL. 最近一週血壓升高(BP 158/92 mmHg), creatinine上升到3.0 mg/dL, 尿液檢查protein (+++), O.B. (2+). 醫師診斷病人可能併發 scleroderma renal crisis (SRC), 以下敘述,何者正確?","options":{"A":"Scleroderma的病人大多有 Anti-nuclear Antibody (ANA) 陽性","B":"anti-Scl-70 antibody是SRC的risk predictor","C":"有anti-RNA polymerase III (anti-RNA POL3) antibody的人比較不會發生SRC","D":"血壓控制最重要,但應盡量避免使用ACEI (angiotensin converting enzyme inhibitor),加重腎臟惡化","E":"Scleroderma的病人若使用prophylaxis glucocorticoid, 可能會減少併發SRC"},"id":"101-腎-4","roc_year":101,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":4,"src":"舊站腎臟科"},{"num":5,"answer":"B","stem":"一位CKD(chronic kidney disease) Stage 4病人,creatinine 3.8 mg/dL, Hb 8.6 g/dL. 若要使用erythropoiesis-stimulating agent, 如: erythropoietin (EPO). 以下敘述,何者錯誤?","options":{"A":"應注意是否有鐵質缺乏,一般建議ferritin > 200 ng/mL, transferrin saturation (TS) > 20%","B":"Hb 目標為>13 g/dL, 以減少心血管合併症,並保護腎功能","C":"控制或改善secondary hyperparathyroidism, 有助於EPO效果","D":"少數人若出現anti-EPO antibody, 會有pure RBC aplasia","E":"併用ACEI (angiotensin converting enzyme inhibitor)可能會干擾或降低EPO效果;而使用statin類降低chronic inflammation可能有助於EPO效果"},"id":"101-腎-5","roc_year":101,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":5,"src":"舊站腎臟科"},{"num":6,"answer":"A","stem":"有關腹膜透析(peritoneal dialysis, 簡稱PD)病人的敘述,何者錯誤?","options":{"A":"發生腹膜炎(peritonitis)最常見的菌種是 Gram negative 菌種","B":"Pseudomonas或fungal peritonitis, 通常不易治療,有時需要拔除PD 導管 (remove PD catheter)","C":"對PD病人, 使用mupirocin對於有Staphylococcus aureus nasal carriage者,可以有效降低exit site infection","D":"腹膜炎的診斷標準之一是cloudy peritoneal fluid, 且其中WBC > 100 cells/mm3,一般以neutrophil為主","E":"由於透析方式的特性, PD病人比血液透析病人較常有hypertriglyceridemia及hypoproteinemia"},"id":"101-腎-6","roc_year":101,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":6,"src":"舊站腎臟科"},{"num":7,"answer":"A","stem":"35歲女性,本身有CKD (chronic kidney disease) stage 5, 因工作中跌倒發生tibia骨折, 實驗室檢查: creatinine 4.8 mg/dL, Hb 10.0 g/dL, [Ca] 8.2 mg/dL, [P] 5.9 mg/dL, iPTH 680 pg/mL (正常值 10-65 pg/mL), 以下敘述,何者錯誤?","options":{"A":"這是CKD併發adynamic bone disease","B":"可以給予適當 active Vitamin D3 治療","C":"飲食衛教,指導diet phosphate restriction (800-1000 mg/day)","D":"這位病人如果檢查alkaline phsphatase (ALP), 數值應該會比正常值偏高","E":"如果做骨病理檢查,型態比較像osteitis fibrosa, 而不是avascular necrosis"},"id":"101-腎-7","roc_year":101,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":7,"src":"舊站腎臟科"},{"num":8,"answer":"C","stem":"一位30歲懷孕女性,因為血壓偏高(BP 154/102 mm Hg), 蛋白尿(2+), 下肢水腫來診。針對血壓控制,以下哪一個藥物比較不合適?","options":{"A":"labetalol","B":"hydralazine","C":"ramipril","D":"methyldopa","E":"如果出現pre-eclampsia及pulmonary edema, 可以使用Intravenous nitroglycerin"},"id":"101-腎-8","roc_year":101,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":8,"src":"舊站腎臟科"},{"num":9,"answer":"C","stem":"一位32歲女性過去無高血壓病史。某日上午醒來發現四肢無力,被送至急診。理學與實驗室檢查: BP 128/68 mmHg, edema (-), [creatinine] 1.0 mg/dL, [Na] 138 mEq/L, [K] 2.8 mEq/L, [Mg] 1.0 mg/dL, ABG為 pH 7.48, [HCO3-] 28 mEq/L, thyroid hormone (T3, T4, TSH)都正常. 以下敘述,何者正確?","options":{"A":"可能是type I renal tubular acidosis (RTA), 應該檢查urine anion-gap","B":"可能是type 2 renal tubular acidosis (RTA), 應該檢查urine osmolality gap","C":"可能是Bartter's syndrome, 可以使用spironolactone 治療hypokalemia","D":"可能是Gitelman's syndrome, 可以使用NSAIDs 治療 polyuria 和 salt wasting","E":"可能是renin-secreting tumor, 應該安排做腎上腺(adrenal gland)影像檢查"},"id":"101-腎-9","roc_year":101,"source":"舊站q4腎臟科","topic":"腎小管間質與RTA","q_num":9,"src":"舊站腎臟科"},{"num":10,"answer":"A","stem":"一位54歲女性,因倦怠、蛋白尿、下肢水腫來診。經腎臟生檢(renal biopsy)顯示有immune-complex及C3 沉積,診斷為membranoproliferative glomerulonephritis (MPGN)。有關MPGN的臨床表現與治療,何者敘述組合是正確的? (1) 血清檢查,病人的血清C3值通常會降低 (2) 要篩檢有沒有infectious disease, 如: C型肝炎 (3) monoclonal gammopathy等chronic inflammation也會合併MPGN (4) 治療以glucocorticoid 或cytotoxic agent為主, 且因為腎功能預後不好,故不使用ACEI (angiotensin-converting enzyme inhibitor) 或angiotensin II-receptor blocker (ARB) (5) MPGN末期腎病變病人,如接受做腎臟移植之後,很少再復發","options":{"A":"(1)+(2)+(3)","B":"(1)+(2)+(4)","C":"(2)+(3)+(5)","D":"(2)+(3)+(4)+(5)","E":"(1)+(4)+(5)"},"id":"101-腎-10","roc_year":101,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":10,"src":"舊站腎臟科"},{"num":11,"answer":"B","stem":"一位70歲男性因lymphoma接受化學治療後,出現數日噁心、嘔吐。三天後被送至急診發現WBC 11,000/mm3, Hb 8.0 g/dL, 有脫水症狀,初步診斷為tumor lysis syndrome及acute kidney injury. 以下哪一種狀況,最不常出現?","options":{"A":"hyperuricemia","B":"hypercalcemia","C":"hyperkalemia","D":"hyperphosphatemia","E":"serum creatinine level 上升"},"id":"101-腎-11","roc_year":101,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":11,"src":"舊站腎臟科"},{"num":12,"answer":"C","stem":"有一51歲男性,住院中發現血鈉(Na)138 mmol/L,血氯(CL ̅)103 mmol/L,動脈血氣體分析:pH 7.3,PCO2 30mmHg,PO2 92 mmHg,HCO3 ̅ 14 mEq/L。下列那一種為可能之原因?","options":{"A":"使用amphotericin B","B":"使用 magnesium sulfate","C":"飢餓(starvation)","D":"使用cholestyramine","E":"腎功能不全(renal insufficiency)之病人使用非類固醇抗發炎藥物(NSAID)"},"id":"101-腎-12","roc_year":101,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":12,"src":"舊站腎臟科"},{"num":13,"answer":"D","stem":"有一72歲的老先生,因尿道感染而住院,3年前已知血中肌酸酐約2~3mg/dl,住院用藥物治療數天後,血肌酸酐升至5.0mg/dl,BUN高到98mg/dl。並無發現明顯腎衰竭之原因,病人無發燒、皮疹(rash),血壓130/80mmHg,心跳78/min,尿量1100 cc/day。下列何者描述不對?","options":{"A":"應懷疑急性間質性腎炎(acute interstitial nephritis, AIN)之可能性","B":"AIN以過敏性間質性腎炎( allergic interstitial nephritis) 最常見","C":"非類固醇抗發炎藥物(NSAID)引起之AIN常無發燒,皮疹,但常見急性腎衰竭併有嚴重蛋白尿","D":"尿中嗜伊紅白血球(eosinophil) 是否增加對診斷AIN大有幫助,其敏感度及特異性皆佳,應該都要作此檢查","E":"AIN不一定要靠腎穿剌診斷"},"id":"101-腎-13","roc_year":101,"source":"舊站q4腎臟科","topic":"腎小管間質與RTA","q_num":13,"src":"舊站腎臟科"},{"num":14,"answer":"D","stem":"有一49歲男性, 因腎病症候群(nephrotic syndrome)住院,忽然發生右腰疼痛,驗尿發現血尿,蛋白尿、腎功能下降,下列描述何者錯誤?","options":{"A":"應懷疑腎靜脈栓塞(renal vein thrombosis)","B":"此種病人因凝血異常造成易凝血狀態(hypercoagulable state)而容易發生此症.","C":"病理變化為膜性腎病變(membranous nephropathy)者最易發生此併發症.","D":"最敏感(幾乎100%)之檢查方法為杜卜勒超音波(doppler ultrasound)","E":"確定診斷為腎靜脈栓塞後應使用抗凝血劑(anticoagulant)治療"},"id":"101-腎-14","roc_year":101,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":14,"src":"舊站腎臟科"},{"num":15,"answer":"E","stem":"有一42歲女性,健檢發現尿液中蛋白( - ),紅血球5-7/HPF,白血球0-3/ HPF,表皮細胞0-2/ HPF,下列描述何者錯誤?","options":{"A":"單純性顯微血尿(isolated microscopic hematuria)可以是腎小球疾病之表現。","B":"肉眼性血尿(gross hematuria) 通常代表有比較重要的腎泌尿道疾病。","C":"血尿併有尿中白血球 >5/ HPF及菌尿(bacteriuria) 代表可能有感染。","D":"女性之急性膀胱炎或尿道炎有時會發生肉眼性血尿。","E":"病人只要有一次血尿(RBC>2/HPF)就表示腎泌尿道一定有病。"},"id":"101-腎-15","roc_year":101,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":15,"src":"舊站腎臟科"},{"num":16,"answer":"C","stem":"一位84歲女性,因關節痛去藥房買藥,吃了幾天後發生嘔吐,在急診處發現尿素氮(BUN)為84 mg/dl,肌酸酐(creatinine)為6.1 mg/dl。過去並無腎臟病史,下列描述何者錯誤?","options":{"A":"可能有急性腎損傷(acute kidney injury, AKI)","B":"止痛藥可能扮有重要角色。","C":"大多數腎臟專家治療AKI在BUN 60 mg/dl就開始做透析(dialysis)以避免併發症,太晚做會增加死亡率。","D":"透析方法之使用要考慮當地可提供的設備。","E":"對血壓偏低的病人,用腹膜透析比血液透析安全。"},"id":"101-腎-16","roc_year":101,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":16,"src":"舊站腎臟科"},{"num":17,"answer":"C","stem":"一個35歲男性,在每次感冒後會發現肉眼可見之血尿(gross hematuria),腎穿剌診斷為IgA腎病變(IgA nephropathy),下列描述何者正確?","options":{"A":"常常以腎病症候群(nephrotic syndrome)表現。","B":"在病程中常常發生急性腎衰竭。","C":"對大部份病人而言,是一相對良性之疾病,有5-30%會完全緩解(complete remission)。","D":"有相當高比例的病人(約40%)在10年內會發生腎衰竭。","E":"很多大規模研究顯示切除tonsil,使用類固醇及魚油(fish oil)可以改善所有IgA腎病變之病人。"},"id":"101-腎-17","roc_year":101,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":17,"src":"舊站腎臟科"},{"num":18,"answer":"C","stem":"在值班時看到一個58歲女性,血鈉108 mmole/L,病人意識不清楚,對此病人下列描述何者錯誤?","options":{"A":"病人之低血鈉應該趕快治療。","B":"除糾正其低血鈉外亦應找出原因對症治療。","C":"為避免發生因滲透壓劇烈變化引起之腦病變-osmotic demyelination syndrome(ODS),糾正之速度愈慢愈佳,不必考慮提升血鈉之速率。","D":"治療太快引起腦部之併發症ODS最多發生在Pons,但其他腦部組織亦可發生如小腦、大腦皮質...等。","E":"若糾正太快使血鈉過度矯正時,想預防ODS或想逆轉(reverse)ODS之發生,可以使用靜脈注射5%葡萄糖輸液,重新引發低血鈉。"},"id":"101-腎-18","roc_year":101,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":18,"src":"舊站腎臟科"},{"num":19,"answer":"D","stem":"一68歲女性,知道有糖尿病、高血壓、及慢性腎臟病(CKD)已經3年,其血中尿素氮(BUN)為39mg/dl,肌酸酐(creatinine)為2.1mg/dl。下列描述何者錯誤?","options":{"A":"有糖尿病或每天尿蛋白大於1克之CKD病人,血壓應控制至125/75 mmHg。","B":"血管張力素轉換酶阻斷劑(ACE inhibitor)或血管張力素受體阻斷劑(ARB) 可以減緩腎功能惡化。","C":"ACE inhibitors或ARB對有缺血性腎血管疾病之病人(ischemic renovascular disease)者可引發急性腎損傷(acute kidney injury)。","D":"ACE inhibitor或ARB之外再加用留鉀利尿劑(potassium-sparing diuretics )對病人更有幫忙而且安全,所以每個病人都可放心併用。","E":"血脂肪若升高應積極治療。"},"id":"101-腎-19","roc_year":101,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":19,"src":"舊站腎臟科"},{"num":20,"answer":"C","stem":"有一40歲女性,動脈血氣體分析呈現:pH 7.55、PCO2 50mmHg、HCO3 ̅ 42 mEq/L、PO2 94 mmHg,請問下列那些為可能之病因? (1)使用estrogen (2)使用amphotericin B (3)鎂缺乏(magnesium deficiency) (4)使用acetazolamide (5)輸尿管乙狀結腸造口術(ureterosigmoidostomy)","options":{"A":"(2)+(4)","B":"(4)+(5)","C":"(1)+(3)","D":"(2)+(5)","E":"(2)+(3)"},"id":"101-腎-20","roc_year":101,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":20,"src":"舊站腎臟科"},{"num":21,"answer":"D","stem":"有一51歲男性,主訴腳腫己經數天,檢查發現血鈉(Na)為128mmol/L,其血壓為150/92mmHg,心跳84/min,兩腳皆有水腫,尚未用藥時,驗其尿鈉濃度為42mmol/L,下列那些為可能之原因? (1)腎病症候群(nephrotic syndrome) (2)急性腎衰竭(acute renal failure) (3)肝硬化(cirrhosis) (4)慢性腎衰竭(chronic renal failure) (5)心臟衰竭(cardiac failure)","options":{"A":"(1)+(3)","B":"(3)+(5)","C":"(1)+(5)","D":"(2)+(4)","E":"(3)+(4)"},"id":"101-腎-21","roc_year":101,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":21,"src":"舊站腎臟科"},{"num":22,"answer":"B","stem":"急診處來了一位55歲女性病人,血中鉀K為3.1mEg/L,下列那些為可能原因? (1)使用mannitol (2)腫瘤快速分解(rapid tumor lysis) (3)鎂缺乏(magnesium deficiency) (4)使用amiloride (5)體溫過低(hypothermia)","options":{"A":"(1)+(2)","B":"(3)+(5)","C":"(1)+(4)","D":"(2)+(4)","E":"(2)+(3)"},"id":"101-腎-22","roc_year":101,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":22,"src":"舊站腎臟科"},{"num":1,"answer":"C","stem":"慢性腎臟病(chronic kidney disease, CKD)的病人,會發生骨病變(osteodystrophy),以下機轉敘述,何者正確? (應選出所有正確答案) (1)1,25-vitamin D3 deficiency (2)Hypophosphatemia (3)Hypocalcemia (4)Low serum FGF-23 (fibroblast growth factor-23) (5)Klotho deficiency","options":{"A":"(1)+(2)+(3)+(4)","B":"(2)+(4)+(5)","C":"(1)+(3)+(5)","D":"(1)+(3)+(4)+(5)","E":"(1)+(3)+(4)"},"id":"102-腎-1","roc_year":102,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":1,"src":"舊站腎臟科"},{"num":2,"answer":"B","stem":"一位中年女性,有蛋白尿(+), creatinine 1.8 mg/dL,倦怠,與serum C3 level降低。尚未做腎臟病理檢查前,最可能是以下哪一種腎炎疾病?","options":{"A":"Focal segmental glomerulosclerosis (FSGS)","B":"cryoglobulinemia","C":"Henoch-Schonlein purpura","D":"Wegner's granulomatosis","E":"IgA nephropathy"},"id":"102-腎-2","roc_year":102,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":2,"src":"舊站腎臟科"},{"num":3,"answer":"C","stem":"有關多囊腎(autosomal dominant polycystic kidney disease, ADPKD)的敘述,以下何者正確?","options":{"A":"源自PKD2 gene mutation (約佔80%),比PKD1 gene mutation (約佔20%)為多","B":"相較其他病因所導致的慢性腎臟病(chronic kidney disease, CKD),ADPKD的特徵是更早發生貧血(anemia)症狀","C":"雖然少數(4-15%)可能合併cerebral aneurysm, 但是對於無症狀者,不建議做routine screening。","D":"某些ADPKD會合併心臟瓣膜異常,其中以aortic value regurgitation最常見。","E":"預防ADPKD惡化,血壓控制很重要,但應避免使用ACEI或ARB藥物。"},"id":"102-腎-3","roc_year":102,"source":"舊站q4腎臟科","topic":"囊性/遺傳性腎病","q_num":3,"src":"舊站腎臟科"},{"num":4,"answer":"B","stem":"懷孕女性治療高血壓,或是預防與治療pre-eclampsia的血壓異常,下列何者藥物不建議使用?","options":{"A":"Methyldopa","B":"ACEI 或ARB類藥物","C":"Hydralazine","D":"Labetaolol","E":"Pre-eclampsia時給予MgSO4或nifedipine"},"id":"102-腎-4","roc_year":102,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":4,"src":"舊站腎臟科"},{"num":5,"answer":"C","stem":"有關腹膜透析(peritoneal dialysis, PD)的敘述,以下何者正確?","options":{"A":"血液透析(hemodialysis, HD)對中大分子的清除率,比腹膜透析好","B":"腹膜炎(peritonitis)是PD常見的合併症,最常見的菌種是Pseudomonas species","C":"PD發生出口感染(exit-site infection)時,最常見的菌種是Staphylococcus aureus","D":"4.25%的PD透析液(dialysate),比2.5% dialysate可以有更佳的毒素清除(clearance)與營養補充效果","E":"腹膜透析(PD)病人的長期存活率比血液透析(HD)病人好"},"id":"102-腎-5","roc_year":102,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":5,"src":"舊站腎臟科"},{"num":6,"answer":"A","stem":"某中年男性被診斷有systemic sclerosis (scleroderma),近兩週出現高血壓(182/110 mm Hg),蛋白尿(+),血尿(2+),及creatinine 2.1 mg/dL (三個月前值為1.0 mg/dL)。針對血壓控制,優先首選藥物為:","options":{"A":"ACEI 類降壓劑","B":"β-blocker","C":"α-blocker","D":"Direct vasodilator","E":"Diuretics"},"id":"102-腎-6","roc_year":102,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":6,"src":"舊站腎臟科"},{"num":7,"answer":"C","stem":"對stage II/III糖尿病腎病變的病人,以下何種是最適合的處置策略組合? (應選出所有正確答案) (1) 開始使用erythropoietin (EPO)預防貧血(anemia) (2)使用ACEI/ARB控制血壓 (3)建議低蛋白飲食(0.8 g/每kg理想體重/day) (4)戒菸、減重 (5) 控制血糖,the lower the better (6)如果有血脂異常(dyslipidemia),可以給予降血脂藥物(如: statin)","options":{"A":"(1)+(2)+(3)+(4)+(5)+(6)","B":"(2)+(4)+(5)","C":"(2)+(3)+(4)+(6)","D":"(1)+(4)+(5)+(6)","E":"(1)+(2)+(3)+(4)+(6)"},"id":"102-腎-7","roc_year":102,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":7,"src":"舊站腎臟科"},{"num":8,"answer":"B","stem":"初次被發現有高血壓的病人,在screen的診斷檢查項目上,除了建議要做: BUN, creatinine, Na, K, Ca, urinalysis檢驗之外,以下何種是最適合的診斷組合? (應選出所有正確答案)(1)total cholesterol (T-Chol), low density lipoprotein (LDL) (2)fasting glucose (AC) level (3)hematocrit (Hct) (4)electrocardiogram (ECG) (5) chest x-ray study (6)renal ultrasonography","options":{"A":"(1)+(2)+(3)+(4)+(5)+(6)","B":"(1)+(2)+(3)+(4)","C":"(1)+(2)+(3)+(5)","D":"(1)+(2)+(4)+(6)","E":"(1)+(2)+(6)"},"id":"102-腎-8","roc_year":102,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":8,"src":"舊站腎臟科"},{"num":9,"answer":"A","stem":"某54歲女性,有尿毒症狀(creatinine 4.0 mg/dL)、貧血(Hct 8.5 g/dL)、倦怠、夜尿(nocturia),實驗室檢查有metabolic acidosis,輕度蛋白尿(<1.0 g/day),尿液中有WBC cast, granular cast, pyuria及glycosuria。病人腎病變最可能的原因為:","options":{"A":"Aristolochic acid nephropathy (Chinese herbal nephropathy)","B":"Focal segmental glomerulosclerosis (FSGS)","C":"Membranoproliferative glomerulonephritis (MPGN)","D":"IgA nephropathy","E":"ADPKD (autosomal dominant polycystic kidney disease)"},"id":"102-腎-9","roc_year":102,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":9,"src":"舊站腎臟科"},{"num":10,"answer":"A","stem":"一位21歲青年,在酷熱環境中劇烈勞動,出現意識譫妄、抽搐,被診斷為中暑。處置上需注意以下併發症,何者最少見?:","options":{"A":"Hyperglycemia","B":"Acute kidney injury","C":"DIC (disseminated intravascular coagulation)","D":"Rhabdomyolysis","E":"Cardiac arrhythmia"},"id":"102-腎-10","roc_year":102,"source":"舊站q4腎臟科","topic":"急性腎損傷(AKI)","q_num":10,"src":"舊站腎臟科"},{"num":11,"answer":"C","stem":"一位60歲DM及慢性腎臟病(chronic kidney disease)病人,三週前的AC血糖是160 mg/dL,HbA1C是8.2%,creatinine 2.0 mg/dL。四天前開始有咳嗽、接著有喘、呼吸困難、尿量減少,因此住院。住院時: WBC 12,500/mm3, Hct 28%, BUN 78 mg/dL, creatinine 2.8 mg/dL, AC 190 mg/dL. 胸部X-光檢查有右下葉病灶。動脈血液氣體檢查(ABG): pH 7.22, PO2 92 mm Hg, PCO2 32 mm Hg, HCO3- 10 mEq/L, BE -15 mEq/L. 從病史與ABG資料來看,以下最適合的診斷?","options":{"A":"Simple metabolic acidosis, with well compensation","B":"Simple respiratory acidosis, with well compensation","C":"Metabolic acidosis + respiratory acidosis","D":"Metabolic acidosis + respiratory alkalosis","E":"Respiratory acidosis + metabolic alkalosis"},"id":"102-腎-11","roc_year":102,"source":"舊站q4腎臟科","topic":"酸鹼平衡異常","q_num":11,"src":"舊站腎臟科"},{"num":12,"answer":"B","stem":"下列腎病變特徵的敘述,何者錯誤?:","options":{"A":"兒童原發性腎病症候群(primary nephrotic syndrome)最常見的腎病變是minimal change disease","B":"成人原發性腎病症候群最常見的腎病變是focal segmental glomerulosclerosis (FSGS)","C":"最容易併發腎靜脈阻塞(renal vein thrombosis)的原發性腎病變是membranous nephropathy (MN)","D":"最常見的原發性腎炎(glomerulonephritis, 簡稱GN)是IgA nephropathy","E":"和C型肝炎(hepatitis C)相關的腎炎,較常見是: membranous nephropathy (MN) 或membranoproliferative glomerulonephritis (MPGN)"},"id":"102-腎-12","roc_year":102,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":12,"src":"舊站腎臟科"},{"num":13,"answer":"D","stem":"下列何者藥物容易引起慢性腎病變與泌尿道上皮細胞癌(uroepithelial carcinoma) (1)Analgesics "當懷疑有light chain disease 時, 請問何項為確定診斷敏感度最高(1-4)及判斷預後(5-6) ? (1)Serum protein electrophoresis (2)24hr Urine protein electrophoresis (3)Immunofixation (4)Serum free light chain assay (5)Serum β-2 microglobulin (6)Serum albumin.","options":{"A":"(1)+(2)+(5)","B":"(2)+(5)+(6)","C":"(2)+(3)+(6)","D":"(4)+(5)+(6)","E":"(2)+(3)+(4)+(5)"},"id":"102-腎-18","roc_year":102,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":18,"src":"舊站腎臟科"},{"num":19,"answer":"C","stem":"請問鹼化治療, 對下列哪種腎結時石沒有幫忙? (1)Hypocitraturia (2)Hyperuricemia (3)Distal renal tubular acidosis (4)Primary hyperparathyroidism (5) Struvite stones (應寫出所有正確答案)","options":{"A":"(1)+(3)+(5)","B":"(2)+(4)","C":"(4)+(5)","D":"(3)+(4)","E":"(1)+(5)"},"id":"102-腎-19","roc_year":102,"source":"舊站q4腎臟科","topic":"酸鹼平衡異常","q_num":19,"src":"舊站腎臟科"},{"num":20,"answer":"D","stem":"關於降尿酸藥物allopurinol與colchicine之臨床使用,下列何者為誤?","options":{"A":"病人若具HLA-B5801較容易對allopurinol產生嚴重過敏反應","B":"Allopurinol會降低theophylline之clearance","C":"Allopurinol會增加與azathioprine或6-mercaptopurine毒性","D":"Thiazide diuretics會降低allopurinol之毒性","E":"Clarithromycin會增加colchicine之毒性"},"id":"102-腎-20","roc_year":102,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":20,"src":"舊站腎臟科"},{"num":21,"answer":"B","stem":"某30歲女性於於懷孕兩個月時得到尿路感染, 請問在選擇抗生素時,下列何者不適合使用?","options":{"A":"Ampicillin","B":"Levofloxacin","C":"Nitrofurantoin","D":"Aminoglycoside","E":"Cephalosporins"},"id":"102-腎-21","roc_year":102,"source":"舊站q4腎臟科","topic":"腎臟生理/藥理/腎毒性","q_num":21,"src":"舊站腎臟科"},{"num":22,"answer":"E","stem":"關於scleroderma renal crisis,下列何者為正確?","options":{"A":"發生renal crisis時, 血壓正常或不高代表預後較佳","B":"若有anti-centromere antibodies,表示較容易發生renal crisis.","C":"為自體免疫疾病應使用大量類固醇","D":"可以使用ACEI來預防renal crisis之發生","E":"皮膚硬化快速進行或具anti-RNA polymerase I 與 III 抗體之男性病患較容易發生renal crisis."},"id":"102-腎-22","roc_year":102,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":22,"src":"舊站腎臟科"},{"num":1,"answer":"D","stem":"中年男性,最近三個月在門診剛被確診有高血壓。為了解高血壓的病因與相關影響,除了一般病史與理學檢查之外,您會建議優先做以下實驗室檢查篩檢,何者除外?","options":{"A":"Hemoglobin or hematocrit","B":"Urinalysis","C":"Fasting glucose level","D":"HbA1C level","E":"Electrocardiogram (ECG) or chest X-ray"},"id":"103-腎-1","roc_year":103,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":1,"src":"舊站腎臟科"},{"num":2,"answer":"B","stem":"一位49歲男性,外傷後第三天出現尿量減少(350 mL/day)。腎臟超音波檢查: 腎臟大小無異常,也無水腎(hydronephrosis)。以下數據何者支持ATN (acute tubular necrosis),而非腎前性急性腎損傷(pre-renal acute kidney injury)?","options":{"A":"BUN 78 mg/dL, creatinine 1.8 mg/dL","B":"Urine [Na] 41 mEq/L","C":"Urine osmolality 390 mosmol/L","D":"Plasma [Na] 140 mEq/L, plama [creatinine] 1.8 mg/dL, urine [Na] 28 mEq/L, urine [creatinine] 72 mg/dL","E":"urine sediment normal, occasional hyaline cast. No granular or brown cast"},"id":"103-腎-2","roc_year":103,"source":"舊站q4腎臟科","topic":"急性腎損傷(AKI)","q_num":2,"src":"舊站腎臟科"},{"num":3,"answer":"A","stem":"一位58歲女性,例行性健康檢查時發現: 尿液檢查報告異常。Urinalysis: protein (-), occult blood (2+), RBC 15-20/(HPF, high power field), WBC cast (-), dysmorphic RBC (-), RBC cast (-). 病人自述無其他不適,理學檢查也無異狀。您接著會優先做以下何種檢查?","options":{"A":"Urine cytology test","B":"Check serum cryoglobulin, complement (C3, C4)","C":"Check myoglobulinuria","D":"Arrange renal biopsy","E":"Do urine bacterial culture"},"id":"103-腎-3","roc_year":103,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":3,"src":"舊站腎臟科"},{"num":4,"answer":"C","stem":"以下是一位ICU病人的動脈氣體分析與血液電解質報告: pH 7.42, PaO2 88 mmHg, PaCO2 67 mmHg, [Na] 140 mEq/L, [K] 3.5 mEq/L, [Cl] 88 mEq/L, HCO3 42 mEq/L。依據上述數值,最符合以下何種病人狀況?","options":{"A":"Sepsis in ICU","B":"Uremia, long-term use of diuretics","C":"COPD with diuretics","D":"Methanol intoxication, with secondary lactic acidosis","E":"Pneumonia, on ventilator support for pulmonary edema"},"id":"103-腎-4","roc_year":103,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":4,"src":"舊站腎臟科"},{"num":5,"answer":"E","stem":"以下有關腹膜透析(peritoneal dialysis, 簡稱PD)的敘述,何者正確? (應選出所有正確答案) (1)PD病人發生腹膜炎(peritonitis),最常見的是Staphylococcus aureus (2)要診斷PD病人發生腹膜炎(peritonitis),三個最主要的症狀(triad)是: 腹痛(abdominal pain), 透析液混濁(cloudy dialysate), 及混濁的透析液中WBC需 >100 /μL (3)PD病人發生腹膜炎(peritonitis),若是透析液混濁(cloudy dialysate), 而混濁的透析液中WBC >100 /μL,且以lymphocyte為主(> 50%)時,要考慮TB (tuberculosis)或是fungal peritonitis (4)老年PD病人發生腹膜炎(peritonitis),最常見的是Pseudomonas species菌種 (5)PD病人發生導管出口(exit-site)感染,最常見的是Staphylococcus epidermidis","options":{"A":"(1)+(2)+(3)+(4)+(5)","B":"(1)+(2)+(3)+(5)","C":"(1)+(2)+(4)","D":"(1)+(2)+(5)","E":"(2)+(3)"},"id":"103-腎-5","roc_year":103,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":5,"src":"舊站腎臟科"},{"num":6,"answer":"C","stem":"一位44歲女性,主述最近六週來兩側脛骨前(pre-tibial)與腳踝(ankle)有間歇性水腫(edema)。傍晚時較腫,腳抬高或早晨睡醒時水腫會稍改善。實驗室檢查報告為: albumin 3.0 g/dL, BUN 26 mg/dL, creatinine 1.0 mg/dL, total cholesterol (t-Chol) 284 mg/dL, LDL 168 mg/dL. C3 48 mg/dL (normal range, 75-135 mg/dL)。尿液檢查顯示: protein (2+), occult blood (1+)。依據上述數值,最不符合以下何種診斷?","options":{"A":"可能是 lupus nephritis","B":"可能是 post-infectious glomerulonephritis","C":"可能是 membranous nephropathy","D":"可能是 cryoglobulinemia","E":"可能是 membranoproliferative glomerulonephritis"},"id":"103-腎-6","roc_year":103,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":6,"src":"舊站腎臟科"},{"num":7,"answer":"A","stem":"一位54歲男性,因為近三周來有呼吸不適(dyspnea)、痰中有血絲(hemoptysis)到急診就醫。實驗室檢查報告為: albumin 3.9 g/dL, BUN 46 mg/dL, creatinine 5.8 mg/dL, Hb 9.4 g/dL. 胸部X-光顯示: 兩側肺有瀰漫型浸潤(diffuse alveolar infiltration)。免疫學檢查,含: anti-GBM antibody, ANCA-antibody, C3, C4, ANA,皆無明顯異常。依據上述數值,病人的肺部與腎臟病因,較可能是?","options":{"A":"Uremic lung","B":"SLE 合併pulmonary-renal syndrome","C":"Wegener's granulomatosis","D":"Goodpasture's syndrome","E":"Microscopic polyarthritis"},"id":"103-腎-7","roc_year":103,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":7,"src":"舊站腎臟科"},{"num":8,"answer":"E","stem":"一位70歲男性,過去病史有糖尿病、高血壓、與慢性腎臟病(CKD)。預定兩天後進行心導管檢查。實驗室檢查報告為: albumin 4.0 g/dL, BUN 42 mg/dL, creatinine 3.1 mg/dL, total cholesterol (t-Chol) 224 mg/dL, LDL 128 mg/dL. 尿液檢查顯示: protein (2+)。目前用藥有: losartan, carvedilol, furosemide, rosuvastatin, aspirin, insulin和saxagliptin。依據病人狀況,為減少或預防contrast-induced nephropathy or acute kidney injury (AKI),以下何種措施正確? (應選出所有正確答案) (1)Hydration with isotonic saline, 可加上 sodium bicarbonate (2)因為serum creatinine高,做完心導管當日,應安排做預防性血液透析(prophylactic hemodialysis) (3)導管前一天與當天各給予N-acetylcysteine (600 mg, bid) (4)將ARB (losartan)換成cyclosporin-A,以減少腎毒性 (5)如果腎功能尚可< 1.5 mg/dL),應該盡量將insulin換回metformin,可以增加腎臟保護作用。","options":{"A":"(1)+(2)+(3)+(4)+(5)","B":"(1)+(3)+(4)+(5)","C":"(1)+(3)+(4)","D":"(1)+(3)+(5)","E":"(1)+(3)"},"id":"103-腎-8","roc_year":103,"source":"舊站q4腎臟科","topic":"急性腎損傷(AKI)","q_num":8,"src":"舊站腎臟科"},{"num":9,"answer":"C","stem":"一位34歲女性,過去無重大疾病或慢性病。主述最近兩天有頻尿、排尿疼痛不適(dysuria),但是沒有發燒或腰痛情形,也沒有vaginal discharge。你查閱病例,發現這是她近六個月來第三度因為相同主述就醫。而一個月前,醫師曾開予trimethoprim-sulfamethoxazole (TMP-SMX)三日份,當時有效且症狀痊癒。醫師建議以下處置,下列何者除外?","options":{"A":"一樣開予3-5日份之TMP-SMX 做症狀治療","B":"如果症狀未緩解或惡化,重新做urine culture,並依結果選擇抗生素治療","C":"安排做IVP或電腦斷層(CT)檢查","D":"給予預防性抗生素,每天睡前低劑量TMP-SMX,或cephalexin,約3-6個月為期。之後停藥觀察","E":"鼓勵多喝水、配合養成適時解尿的習慣"},"id":"103-腎-9","roc_year":103,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":9,"src":"舊站腎臟科"},{"num":10,"answer":"B","stem":"一位28歲男性,主述兩天來尿液顏色深暗(tea-colored urine),且感覺尿量明顯減少了。病人過去無重大疾病或慢性病,約5天前先有感冒症狀、輕度發燒、肌肉與腰部酸痛,曾自行至藥局買感冒成藥服用。但是無嘔吐、腹瀉、或頻尿等症狀。理學檢查發現: 血壓135/86 mm Hg, 喉嚨輕度紅腫,呼吸音正常,無水腫。實驗室檢查: Hb 9.9 g/dL, WBC 9700/mm3, albumin 4.1 g/dL, BUN 38 mg/dL, creatinine 1.9 mg/dL. C3, C4 數值皆正常。尿液檢查顯示: protein (2+), occult blood (3+)。腎臟超音波顯示: 兩側腎臟大小正常,無阻塞情形。病人最可能的診斷是?","options":{"A":"Membranous nephropathy","B":"IgA nephropathy","C":"Microscopic polyarteritis","D":"Membranoproliferative glomerulonephritis","E":"Focal segmental glomerulosclerosis"},"id":"103-腎-10","roc_year":103,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":10,"src":"舊站腎臟科"},{"num":11,"answer":"C","stem":"一位慢性腎臟病人,4年來持續接受規則血液透析治療。某日,因跌倒骨折被送至急診。經診斷有骨質疏鬆,多處血管鈣化,與皮膚血管病變(calciphylaxis)。造成上述病因與症狀,與何種下列機轉無關?","options":{"A":"High parathyroid hormone","B":"High [Calcium] x [Phosphate] product","C":"High fetuin-A","D":"High FGF-23 (fibroblast growth factor)","E":"Vascular wall (media er cirrhosis","D":"Heart failure","E":"Nephrotic syndrome"},"id":"104-腎-16","roc_year":104,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":16,"src":"舊站腎臟科"},{"num":17,"answer":"D","stem":"一位54歲病人,一年前因為蛋白尿,接受腎臟切片(renal biopsy)病理檢查,診斷是Membranous nephropathy (MN),之後持續於門診追蹤。最近實驗室檢查結果(和一年前類似),為: [Albumin] 3.8 g/dL,[creatinine] 1.2 mg/dL,蛋白尿1.6 g/day。病人有輕度高血壓,但是沒有水腫。現階段針對此病人的處置,何者較合適?","options":{"A":"使用低劑量prednisolone,約2.5 mg/kg/day,預防疾病惡化","B":"應該使用Cyclosporine 或 tacrolimus,可以促進緩解(remission)","C":"單獨使用Mycophenolate mofetil (MMF),可以更降低蛋白尿,保護腎臟","D":"尚無需使用prednisolone或其他免疫抑制劑,可以使用ACEI類藥物控制血壓","E":"應該再安排一次腎臟切片(renal biopsy),追蹤病理變化"},"id":"104-腎-17","roc_year":104,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":17,"src":"舊站腎臟科"},{"num":18,"answer":"C","stem":"一位48歲慢性腎臟病人(CKD stage IV, eGFR 18),因為有疑似腹部腫瘤,接受核磁共振(MRI, with Gadolinium-contrast),兩日後出現寡尿(oliguria),全身肌肉與皮膚疼痛。此病人最可能是發生哪種病狀?","options":{"A":"Acute tubular necrosis","B":"Rhabdomyolysis","C":"Nephrogenic systemic fibrosis","D":"Obstructive acute kidney injury","E":"Dehydration-induced acute kidney injury"},"id":"104-腎-18","roc_year":104,"source":"舊站q4腎臟科","topic":"急性腎損傷(AKI)","q_num":18,"src":"舊站腎臟科"},{"num":19,"answer":"B","stem":"有關chronic tubulointerstitial nephritis病人的尿液檢驗,以下敘述組合何者最正確? (1) 用Hansel stain可以見到eosinophiluria (2) 沒見到WBC cast (3) 見到granular cast (4) 蛋白尿(proteinuria) > 1-2 g/day (5) 有潛血反應[occult blood test (+)], 及WBC 40-50/HPF,但是病人並無泌尿道不適症狀","options":{"A":"(1)+(2)+(3)+(4)+(5)","B":"(1)+(3)+(5)","C":"(2)+(3)+(4)","D":"(3)+(4)+(5)","E":"(1)+(3)+(4)"},"id":"104-腎-19","roc_year":104,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":19,"src":"舊站腎臟科"},{"num":20,"answer":"C","stem":"一位52歲女性,主訴發燒、噁心嘔吐、胃口變差和腹痛持續了一個星期。病人因紅斑性狼瘡腎炎及尿毒症,接受腹膜透析約15年。透析液外觀清澈,腹水化驗白血球小於100 cells/uL。臨床上出現腸阻塞之症狀,腹部電腦斷層(CT)可看到有腸道擴張及腸壁鈣化,且被鈣化的臟層腹膜包覆起來。以下敘述,何者正確? (1) 可能是腹膜透析發生細菌性腹膜炎(bacterial peritonitis), 或黴菌性腹膜炎(fungal peritonitis) (2) 可能是發生包囊性腹膜硬化症(encapsulating peritoneal sclerosis) (3) 可以用tamoxifen,或免疫抑制劑(如類固醇,corticosteroid)治療 (4) 可以用乙型阻斷劑(beta-blocker)治療 (5) 使用高糖濃度透析液,增加灌洗次數,可預防腹腔內沾黏,並補充營養","options":{"A":"(1)+(2)+(5)","B":"(1)+(3)+(5)","C":"(2)+(3)","D":"(2)+(3)+(4)","E":"(2)+(3)+(5)"},"id":"104-腎-20","roc_year":104,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":20,"src":"舊站腎臟科"},{"num":21,"answer":"A","stem":"一位51歲男性,身材微胖,兩個月前例行性健檢發現有高血壓(152/94 mm Hg)。病人至你的門診就醫,測得血壓值148/90 mm Hg,依照2015年出版的台灣高血壓指引,除了檢查serum creatinine,urinalysis等,及lipid parameters之外,建議安排以下實驗室例行檢查,何者除外?","options":{"A":"Renal ultrasonography","B":"Hemoglobin or hematocrit","C":"Serum uric acid level","D":"Fasting glucose level","E":"Electrocardiogram (ECG) or chest X-ray"},"id":"104-腎-21","roc_year":104,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":21,"src":"舊站腎臟科"},{"num":22,"answer":"B","stem":"低血鉀的原因可以大致歸類為Thyrotoxic periodic paralysis (TPP)與hypokalemic non-periodic paralysis (HNPP)兩類。這些病人在補充鉀的輸液治療中,血清鉀濃度有時反而更低,這稱之為\"Paradoxical hypokalemia\". 以下有關Paradoxical hypokalemia的敘述,何者正確?","options":{"A":"一般而言,當要矯正低血鉀,TPP比HNPP的病人需要補充更多的鉀","B":"一般而言,當矯正低血鉀時,TPP比HNPP的病人更常發生rebound hyperkalemia.","C":"一般而言,當矯正低血鉀時,TPP比HNPP的病人更常發生Paradoxical hypokalemia","D":"TPP的病人發生Paradoxical hypokalemia的原因,通常與體液容積不足(hypovolemia)或renin-aldosterone 活性過高有關","E":"HNPP的病人發生Paradoxical hypokalemia的原因,通常與血壓高有關,所以可以使用beta-blocker來預防"},"id":"104-腎-22","roc_year":104,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":22,"src":"舊站腎臟科"},{"num":1,"answer":"D","stem":"54歲肥胖男子(BMI 27.6),因高血壓一直控制不佳而被轉診,其降壓藥物開始有Verapamil、Metoprolol、Clonidine,後來調整成Amlodipine、Atenolol、Valsartan、Doxazosin、Minoxidil五種,但是血壓仍然在160-180/100-110 mmHg。他常因頭痛與關節酸疼服用Ibuprofen,最近檢測血清肌酸酐為2.9mg/dL;另外有呼吸中止症候群,因配戴儀器睡覺不舒服,沒有每天接受continuous positive airway pressure (CPAP)治療。 為了能將血壓好好控制,請問底下處置哪些為正確? 1. 應該改用Selective COX2 inhibitor,對血壓較無影響。 2. 應該安排24小時動態血壓監測(24 hour ambulatory blood pressure monitor) 的檢查。 3. 應該加上利尿劑之使用以及篩檢其他次發性高血壓。 4. 應該減重及強調每天使用CPAP治療。 5. 應該推薦做腎動脈交感神經燒灼術治療。","options":{"A":"1+2+3","B":"1+3+4","C":"1+3+5","D":"2+3+4","E":"1+2+3+4"},"id":"105-腎-1","roc_year":105,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":1,"src":"舊站腎臟科"},{"num":2,"answer":"B","stem":"63歲男性病人兩天前接受膀胱鏡檢查,逐漸出現畏寒發燒、解尿不易、解尿疼痛、頻尿、會陰處稍微不適;體溫攝氏38.3度、其他生命現象穩定,Costophrenic angle無敲擊痛、尿道口無分泌物;尿液檢查有10 WBC/HPF、Nitrite 1+, Leukocyte esterase 1+;抽血檢查腎功能正常,PSA 升高至25ng/ml。 請問底下哪些敘述是正確的? 1.應該要做尿液與血液細菌培養 2. 因為尿液Nitrite呈陽性,極可能是Pseudomonas感染 3. 應該安排腎臟膀胱攝護腺超音波檢查 4..可給予口服Fluoroquinolone二至四週 5. 可給予口服Nitrofuratoin二至四週","options":{"A":"1+2+4","B":"1+3+4","C":"2+3+4","D":"1+3+5","E":"2+3+5"},"id":"105-腎-2","roc_year":105,"source":"舊站q4腎臟科","topic":"感染/結石/阻塞","q_num":2,"src":"舊站腎臟科"},{"num":3,"answer":"C","stem":"58歲男性病人有高血壓、高血脂、慢性腎臟病、痛風(近半年發作三次,最後一次為三周前,在手指、腳趾、手肘、耳朵等多處關節有Subcutaneous tophi)。目前抽血檢查血清肌酸酐2.1 mg/dL(eGFR 33);尿酸 9 mg/dL。其目前服用藥物有Thiazide、Losartan、Amlodipine、Fenofibrate、 low dose aspirin。 請問下列哪些處置為恰當? 1.開始使用Allopurinol或Febuxostat,但須降低劑量。 2.停用Thiazide,因為會加尿酸而且增加Allopurinol的毒性。 3. Losartan、Amlodopine、 Low dose aspirin 均會促進尿酸排泄。 4.已非急性痛風期,不必再使用Colchicine。 5.此病人降低尿酸之預期目標為6 mg/dL以下。","options":{"A":"1+2+3","B":"2+3+5","C":"1+2+5","D":"1+3+5","E":"1+4+5"},"id":"105-腎-3","roc_year":105,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":3,"src":"舊站腎臟科"},{"num":4,"answer":"E","stem":"62歲女姓,過去無高血壓或糖尿病,近五年雙手手指碰冷水會變紅紫,最近四個月逐漸出現以下症狀:面孔與手指浮腫、吞嚥不順、說話遲緩、下肢腫脹、血壓變高、呼吸急促、呼吸困難、端坐呼吸。BP160/83 mmHg, Urine protein 3+, RBC 40-50/HPF;Hb 7.4 gm/dL,Alb 2.8 gm/dL,Cre 2.8 mg/dL(半年前1.2 mg/dL) 。( 如圖示) 請問下列何者為正確?","options":{"A":"馬上住院並開始類固醇的治療。","B":"若在發病前給予ACE inhibitor,即可有效地預防此病之發作。","C":"若病人沒有出現高血壓(即Normotensive),其病情與預後會較好。","D":"若病人之autoantibody against topoisomerase I (Scl70)呈陽性,其預後較好。","E":"若兩年後仍無法脫離透析治療,可建議病人接受腎臟移植,因為其存活率還好且很少復發。"},"id":"105-腎-4","roc_year":105,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","img":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAJoA1IDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIE 來預防骨折。 4. 應該不用每年安排檢測骨密度(DXA)之檢查 5. 如有骨質疏鬆,可考慮施打合成的副甲狀腺素。","options":{"A":"1+2","B":"1+2+3","C":"1+2+4","D":"1+4+5","E":"2+3+5"},"id":"105-腎-8","roc_year":105,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":8,"src":"舊站腎臟科"},{"num":9,"answer":"B","stem":"30歲男性初次參加馬拉松賽跑後不支倒地,肌肉痠疼且尿液呈棕紅色,送至急診初步檢查量得體溫為38.8度(攝氏),血壓正常,尿液試紙檢查有潛血2+但離心沉渣無紅血球,肌酸酐1.3mg/dL,CPK 13000u/L 請問底下敘述何者為正確? 1. 像熱中暑,因此發生急性腎衰竭機率大。 2.必須依靠血液或尿液myoglobin的定量檢查才可確定是橫紋肌溶解症。 3.其上述尿液試紙檢查結果代表可能會發生急性腎衰竭。 4.應該積極補充大量體液,維持尿液3ml/kg/hr,直到尿液試紙潛血反應呈陰性。 5.如果尿液pH","options":{"A":"1+2+3","B":"1+3+4","C":"2+4+5","D":"3+4+5","E":"1+4+5"},"id":"105-腎-9","roc_year":105,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":9,"src":"舊站腎臟科"},{"num":10,"answer":"D","stem":"Which patient may have the highest risk and progression of CKD ?","options":{"A":"CKD stage 1, with normal albuminuria","B":"CKD stage 3b, with normal albuminuria","C":"CKD stage 2, with severely increased albuminuria","D":"CKD stage 3a, with moderately increased albuminuria","E":"CKD stage 3, no matter the status of albuminuria, will have similar risk of CKD progression"},"id":"105-腎-10","roc_year":105,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":10,"src":"舊站腎臟科"},{"num":11,"answer":"B","stem":"Systemic diseases may induce thrombotic microangiopathy in the kidney, with the pathological picture of secondary focal segmental glomerulosclerosis. Which does not belong to this category ?","options":{"A":"hemolytic-uremic syndrome (HUS)","B":"Hepatitis B virus infection","C":"Malignant hypertension","D":"Antiphospholipid syndrome","E":"Radiation nephropathy after bone marrow transplantation"},"id":"105-腎-11","roc_year":105,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":11,"src":"舊站腎臟科"},{"num":12,"answer":"B","stem":"A 38-year-old woman who had been diagnosed as membranous nephropathy with heavy proteinuria (4.5 g/day). One day she presented with flank pain, tenderness, hematuria, and rapid decline in renal function. Which is the most likely diagnosis ?","options":{"A":"Renal stone with urinary tract infection","B":"Renal vein thrombosis","C":"Renal artery stenosis","D":"Malignant hypertension","E":"Thrombotic microangiopathy"},"id":"105-腎-12","roc_year":105,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":12,"src":"舊站腎臟科"},{"num":13,"answer":"B","stem":"Several nutrients have been implicated to increase risk for nephrolithiasis formation. Except ?","options":{"A":"Higher intake of animal protein","B":"Higher intake of potassium-rich or magnesium-rich food","C":"Higher sodium intake","D":"Vitamin C supplement is associated with an increased risk of calcium oxalate stone","E":"Higher consumption of sugar-sweetened carbonated beverage"},"id":"105-腎-13","roc_year":105,"source":"舊站q4腎臟科","topic":"感染/結石/阻塞","q_num":13,"src":"舊站腎臟科"},{"num":14,"answer":"B","stem":"A 48 y/o male was found to develop acute renal failure after 7 days of drug therapy. His clinical presentation were: fever, rash, peripheral eosinophilia, and oliguric renal failure, but without proteinuria. Which statement is correct? 1.A possible etiology of acute interstitial nephritis (AIN) 2.His manifestation is compatible with nonsteroidal anti-inflammatory drug (NSAID)-induced AIN 3.Peripheral blood eosinophilia is common in most of AIN patients 4.Urinary eosinophils are sensitive and specific for diagnosis of AIN, therefore, this testing is highly recommended 5.Renal biopsy is generally not required for diagnosis of AIN","options":{"A":"1+3+4+5","B":"1+5","C":"1+3+4","D":"1+2","E":"1+2+3+4+5"},"id":"105-腎-14","roc_year":105,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":14,"src":"舊站腎臟科"},{"num":15,"answer":"A","stem":"Which statement regarding Lithium-associated nephropathy is not correct ?","options":{"A":"Most of the patients presented as oliguric acute renal failure","B":"Prolonged (>10-20 years) lithium use, or those experienced repeated episodes of toxic lithium levels, may develop chronic tubulointerstitial nephritis","C":"The most prudent approach is to monitor lithium levels frequently and adjust dosing to avoid toxic levels","D":"In patients with significant proteinuria, ACEI or ARB treatment should be helpful","E":"typical findings on renal biopsy are interstitial fibrosis and tubular atrophy"},"id":"105-腎-15","roc_year":105,"source":"舊站q4腎臟科","topic":"腎小管間質與RTA","q_num":15,"src":"舊站腎臟科"},{"num":16,"answer":"E","stem":"Which statement regarding mineral metabolism in CKD is correct? 1.increased production of parathyroid hormone 2.reduced production of fibroblast growth factor-23 (FGF-23) 3.increased renal excretion of phosphate 4.reduced produce of 1,25-dihydroxyvitamin D3 [1,25(OH)2D3] 5.reduction in serum calcium","options":{"A":"1+3+4+5","B":"1+2+4","C":"1+2+3+4","D":"1+2+4+5","E":"1+4+5"},"id":"105-腎-16","roc_year":105,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":16,"src":"舊站腎臟科"},{"num":17,"answer":"A","stem":"Primary glomerular diseases with reduced complement levels is:","options":{"A":"Cryoglobulinemia","B":"Minimal-change disease","C":"IgA nephropathy","D":"focal segmental glomerular sclerosis","E":"Wegener's granulomatosis"},"id":"105-腎-17","roc_year":105,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":17,"src":"舊站腎臟科"},{"num":18,"answer":"D","stem":"Which test has the highest sensitivity of screening renovascular hypertension ?","options":{"A":"Duplex ultrasonography","B":"Computed tomography angiography","C":"Captopril renogram","D":"Magnetic resonance angiography (MRA)","E":"Captopril plus diuretics renogram"},"id":"105-腎-18","roc_year":105,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":18,"src":"舊站腎臟科"},{"num":19,"answer":"D","stem":"For diagnosis of acute renal failure, which urinary indices indicating prerenal azotemia rather than acute tubular necrosis or obstruction ?","options":{"A":"Urine Na > 40 mEq/L","B":"Urine osmolarity","C":"Urine/plasma creatinine ratio","D":"Renal failure index","E":"FENa > 2%"},"id":"105-腎-19","roc_year":105,"source":"舊站q4腎臟科","topic":"急性腎損傷(AKI)","q_num":19,"src":"舊站腎臟科"},{"num":20,"answer":"A","stem":"A 52-year-old man with a 20-year history of cigarette smoking is admitted to the hospital because of cough and weakness. On admission, his serum electrolyte levels are: serum [Na] 112 mEq/L; [K] 4.5 mEq/L; [Cl] 80 mEq/L; and HCO3-, 26 mEq/L. The BUN was 8 mg/dL , serum creatinine 0.8 mg/dL and serum uric acid 3.0 mg/dL. These data are most consistent with which of the following?","options":{"A":"SIADH (syndrome of inappropriate antidiuretic hormone secretion)","B":"Congestive heart failure","C":"Cirrhosis and ascites","D":"Severe salt and water depletion","E":"Adrenal insufficiency"},"id":"105-腎-20","roc_year":105,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":20,"src":"舊站腎臟科"},{"num":21,"answer":"A","stem":"A 28 y/o young male visited your outpatient clinic with an elevated blood pressure of 148/100 mmHg. He denies taking any medications, but has a family history of hypertension. His laboratory values were: [Na] 140 mEq/L, [K] 3.1 mEq/L, [Cl] 98 mEq/L, BUN 25 mg/dL, Creatinine 0.9 mg/dL, Glucose: 85 mg/dL. The arterial blood gas (ABG) test reveals: Arterial pH: 7.48, PCO2: 46 mm Hg, HCO3-: 34 mEq/L. What is the most appropriate characterization of his acid-base disorder?","options":{"A":"Metabolic alkalosis","B":"Metabolic alkalosis and respiratory acidosis","C":"Respiratory alkalosis and metabolic acidosis","D":"Metabolic alkalosis and respiratory alkalosis","E":"Respiratory alkalosis"},"id":"105-腎-21","roc_year":105,"source":"舊站q4腎臟科","topic":"酸鹼平衡異常","q_num":21,"src":"舊站腎臟科"},{"num":22,"answer":"A","stem":"相較於血液透析(HD, hemodialysis),有關腹膜透析(PD, peritoneal dialysis)的敘述與長期合併症,何者不正確?","options":{"A":"PD病人使用高糖透析液是為了要達到透析清除尿毒素(uremic toxin)的效果","B":"PD病人容易出現hypertriglyceridemia,是因為使用高糖透析液","C":"相較於血液透析(HD),腹膜透析(PD)病人較容易發生腹膜炎(peritonitis)","D":"相較於血液透析(HD),腹膜透析(PD)病人每日蛋白質流失量較高","E":"相較於腹膜透析(PD),血液透析(HD)病人較出現透析中低血壓"},"id":"105-腎-22","roc_year":105,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":22,"src":"舊站腎臟科"},{"num":1,"answer":"B","stem":"一位48歲女性,患有bipolar affective disorder,長期服用鋰鹽(Lithium)近十年。最近出現: polyuria 和 polydipsia。 以下敘述,何者錯誤?","options":{"A":"病人可能是 Lithium intoxication","B":"症狀可能是 central diabetes insipidus (DI)","C":"慢性 Lithium nephropathy可伴隨有蛋白尿","D":"可伴隨出現 hypernatremia","E":"Lithium 若引起慢性腎病變會有 interstitial fibrosis 和 tubular atrophy"},"id":"106-腎-1","roc_year":106,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":1,"src":"舊站腎臟科"},{"num":2,"answer":"D","stem":"一位62歲女性,因經常頭痛與關節痠痛,自行服用多種止痛藥,有aspirin, caffeine, acetaminophen及不同種類的 NSAID (non-steroid anti-inflammatory drug)等,混合著使用。最近身體檢查發現有腎功能不全與蛋白尿(2+)。以下敘述的症狀或診斷,何者最正確?","options":{"A":"病人的診斷符合 renal infarction and cortical necrosis","B":"病人的診斷最可能是 glomerulosclerosis","C":"其他可能伴隨出現 polyuria and metabolic alkalosis症狀","D":"本診斷可能伴隨出現 papillary necrosis and papillary calcification","E":"上述藥物中,最可能引起此病症的是acetaminophen"},"id":"106-腎-2","roc_year":106,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":2,"src":"舊站腎臟科"},{"num":3,"answer":"C","stem":"一位42歲男性,因發現最近數次量到血壓升高(148/88 mmHg),而自行到醫院就診。針對初次就醫,且多次紀錄證實確有高血壓的病人,會安排優先做以下評估(initial evaluation),以下何者最不具優先性?","options":{"A":"Urinalysis","B":"Serum BUN and creatinine","C":"Serum uric acid","D":"Fasting blood glucose, total cholesterol and LDL cholesterol","E":"Hematocrit"},"id":"106-腎-3","roc_year":106,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":3,"src":"舊站腎臟科"},{"num":4,"answer":"A","stem":"長期糖尿病會引起多種腎臟病變,包括: 蛋白尿、腎功能不全、感染症,或腎小管酸血症(renal tubular acidosis, 簡稱RTA)與代謝性酸血症。有關這種RTA,以下敘述何者正確?","options":{"A":"此種RTA的特點是出現hyperkalemia","B":"最常引起的是type II RTA","C":"此種RTA引起的酸血症,通常serum pH值會很低,需要靜脈注射補充bicarbonate","D":"此種RTA是因為血中aldosterone濃度很高所引起","E":"主要病變是在collecting tubule,無法排出氫離子(hydrogen ion)"},"id":"106-腎-4","roc_year":106,"source":"舊站q4腎臟科","topic":"腎小管間質與RTA","q_num":4,"src":"舊站腎臟科"},{"num":5,"answer":"D","stem":"一位62歲女性,長期服用amitriptyline治療憂鬱症(depression),最近因stroke住院。病人無吞嚥困難,飲食正常,也沒有水腫。住院一週後抽血檢查發現serum [Na] 126 mEq/L,osmolality 262 mOsm/kg。urine [Na] 40 mEq/L,urine osmolality 398 mOsm/kg。病人hyponatremia的原因,最可能是?","options":{"A":"發生Renal sodium loss and dehydration","B":"發生Extra-renal loss of sodium, and fluid overload","C":"發生 lung cancer","D":"發生 SIADH (syndrome of inappropriate anti-diuretic hormone secretion)","E":"發生 stroke-induced central diabetes insipidus (DI)"},"id":"106-腎-5","roc_year":106,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":5,"src":"舊站腎臟科"},{"num":6,"answer":"A","stem":"一位22歲女性,有三年SLE (Systemic Lupus Erythematosus)病史,但沒有規則服藥。最近一週出現喘、水腫、尿量減少,體重增加近7公斤。住院血壓154/94 mmHg,抽血檢查: BUN 98 mg/dL,creatinine 3.6 mg/dL, urine protein (4+)。因為急性腎損傷(acute kidney injury, AKI),安排病人接受腎臟生檢(renal biopsy),以下病理變化,何者最不可能?","options":{"A":"Focal segmental glomerulosclerosis (FSGS)","B":"Diffuse proliferative nephritis with diffuse subendothelial deposit","C":"Membranous glomerulonephritis with subepithelial immune complex deposit","D":"Global endocapillary proliferation, crescent formation","E":"Glomerular necrotizing lesion, may present with vascular lesion"},"id":"106-腎-6","roc_year":106,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":6,"src":"舊站腎臟科"},{"num":7,"answer":"A","stem":"一位48歲男性,過去有C型肝炎,定期在門診追蹤。最近一個月來,出現蛋白尿,脛前與足踝水腫,體重略增加近3公斤,血壓150/92 mmHg。抽血檢查: 有血清補體(complement, C3與C4)偏低情形。因為不明原因腎病,安排病人接受腎臟生檢(renal biopsy)。以下病理變化,何者最可能?","options":{"A":"Membranoproliferative glomerulonephritis (MPGN)","B":"Membranous nephropathy (MN)","C":"IgA nephropathy","D":"Focal segmental glomerulosclerosis (FSGS)","E":"Henoch-Schonlein purpura (HSP)"},"id":"106-腎-7","roc_year":106,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":7,"src":"舊站腎臟科"},{"num":8,"answer":"B","stem":"一位46歲男性,過去經常有鼻竇炎症狀,最近一個月來,出現胸悶、氣喘、咳嗽、喀血。住院後尿液檢查有: hematuria, 與 RBC cast。抽血檢查: antineutrophil cytoplasmic antibody (ANCA)陽性反應。病人如果接受腎臟生檢(renal biopsy),最可能的臨床診斷與病理變化是:","options":{"A":"Goodpasture's syndrome","B":"Granulomatosis with polyangiitis (Wegener's granulomatosis)","C":"Polyarteritis nodosa (PNA)","D":"Microscopic polyangitis (MPA)","E":"Behcet's syndrome"},"id":"106-腎-8","roc_year":106,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":8,"src":"舊站腎臟科"},{"num":9,"answer":"E","stem":"尿液沉渣(cast, sediment)檢驗,有時候也可以提供重要的訊息,幫助臨床診斷。以下有關各種疾病與urine cast的敘述,何者不正確?","options":{"A":"Dysmorphic RBC與erythrocyte casts通常表示hematuria來自於glomerulus","B":"劇烈運動又體液不足(dehydration)後的尿液異常,可能會出現hyaline cast","C":"Granular cast通常表示有tubular injury 或 chronic kidney disease","D":"Allergic interstitial nephritis會出現 WBC cast 或 urine eosinophil, 但很少出現 RBC cast","E":"糖尿病(DM)病人若合併糖尿病腎病變,經常會伴隨出現RBC cast"},"id":"106-腎-9","roc_year":106,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":9,"src":"舊站腎臟科"},{"num":10,"answer":"A","stem":"一位64歲男性,接受冠狀動脈繞道手術後第二天,出現寡尿(oliguria),腎功能異常。病人的以下哪一種臨床敘述,最符合手術後發生pre-renal azotemia (AKI)的臨床診斷?","options":{"A":"Hypotension or cardiogenic shock","B":"Functional excretion of sodium is 3.5%","C":"Urine sodium is 40 mEq/L","D":"BUN/creatinine ratio is 10","E":"Low urine specific gravity ("},"id":"106-腎-10","roc_year":106,"source":"舊站q4腎臟科","topic":"急性腎損傷(AKI)","q_num":10,"src":"舊站腎臟科"},{"num":11,"answer":"B","stem":"一位44歲男性,有肺結核(pulmonary tuberculosis)接受rifampin與isoniazid治療。某日因意識模糊,呼吸急促,四肢有輕微顫抖抽搐情形,被送至急診。抽血檢查:動脈氣體分析、血清電解質如下: ABG: pH 7.26,HCO3- 11 mEg/L,PCO2 21 mmHg ; glucose 160 mg/dL, BUN 34 mg/dL, Cr 1.8 mg/dL ; Na 133 mEq/L , K 6.1 mEq/L, Cl 94mEq/L。由以上數據分析,最符合以下何種診斷? (1)Metabolic acidosis;(2)Respiratory acidosis;(3)adequate secondary (respiratory or renal) compensation;(4)inadequate secondary (respiratory or renal) compensation;(5)normal anion gap;(6)increased or high anion gap","options":{"A":"(1)+(3)+(5)","B":"(1)+(3)+(6)","C":"(1)+(4)+(5)","D":"(1)+(4)+(6)","E":"(2)+(4)+(6)"},"id":"106-腎-11","roc_year":106,"source":"舊站q4腎臟科","topic":"酸鹼平衡異常","q_num":11,"src":"舊站腎臟科"},{"num":12,"answer":"E","stem":"某45歲男性已有高血壓5年,最近檢查有血尿RBC 10-20/HPF、Cre 1.2 mg/dL、超音波檢查發現兩側腎臟長徑超過15公分(如圖)及各有囊腫數目超過十個;家族史為父親自60歲開始血液透析,不曾顱內出血,父親的腎臟超音波亦有雷同的發現。 請問關於其腎臟疾病之敘述,下列何者為正確?(1)每年定期追蹤腎功能,即為預估日後是否需要透析治療之最敏感方法;(2)若其太太懷孕可做產前篩檢,其子女遺傳此腎臟疾病的機會為50%;(3) 以影像學檢查估算其腎臟體積,若超過600立方公分,其腎功能極可能持續逐年惡化;(4) 雖無症狀,應每年安排腦部血管Magnetic resonance angiography的檢查;(5)宜建議停止服用含女性荷爾蒙之避孕藥。","options":{"A":"(1)+(2)+(3)","B":"(1)+(3)+(4)","C":"(2)+(4)","D":"(4)+(5)","E":"(2)+(3)+(5)"},"id":"106-腎-12","roc_year":106,"source":"舊站q4腎臟科","topic":"透析與腎移植","img":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAHvAw8DASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD548J+B9b8bXclto9oJmiUM7s4RIwemWPArS8U/CfxV4PsFv8AVLBTan/lrbyLKqc/xFelcvDe3UET28U8kUEpAkRWIVvTPrXq/hFpvCvwg1+61lmjt9axFp9o3ViOrjPb/CrA4/wr8KvFPjCxe/0uyT7KrbFmnlESu3cKW6471j+JvCer+EdSbTtXsnt5wMgHkSD1U969D+MtxJpvh3wbodu7JZJp63JRHO1nfqSv+eppfGl1LqPwg8H63M5N9a3LWolYZIUAkH36CgDz9PButSeGZfEptSmnQzLA0rttJc9MA9a0fCnww8R+NLOW90eG2lhikMTtLcpGd/XgE89q9E1vxjrXjf4FX9/rt19puY9SjjUiNU2qBkYCgDvXiC5cBcHJ/wDHv/r0Aegaj8CvGml6bdahc21ibe0QySMl2jEADJOAa5nwj4TufFd7cW8UqW6W9u9zLLJyqKozk13Wqk/Db4ZJpUbNHrniHbJdEOSY7UchcdsnH5ms/RFPhn4UatqrYF1rUv2CEnqIl+9igDnvC3gLXvGdxOmjWnnRwcvMxEcSnjgseATmjxd8P/EHgd4V1my8tJxujljcSRv6gMOMjFdvqMraJ8ANJWzZ421e9lluWU43bWKge4wBRoMja38BfEEN0zyrpd5DNCGOQhZgvGc9t1Swt1OA0TwXrWvWN/f2lputbCIzTyu21QoGeCaw8jgHv+Y9q9z+HvjXXfEXw88XaXqV751nYaO628YiRdvy46gAnj1rx7w3pEuu+IbHTIl3PczKmPbPP6UluO90Xdf8JXHh7SNHv7i4iL6pE8ywKpDxqDgFvrzj6U238FazceHbvxCtow060YI8rHaeTjgd62firrS33jaaKzf/AEbS1 6,"answer":"C","stem":"照顧慢性腎臟病的病人,(1)於何時期 應轉介給腎臟專科醫師,(2)於何期應跟病人介紹腎臟替代治療 (血液透析、腹膜透析、腎臟移植)? I-第一期;II:第二期;III:第三期;IV:第四期: Va : 第五期透析前","options":{"A":"(1)I; (2) III","B":"(1) I; (2) Va","C":"(1)III;(2) IV","D":"(1)IV;(2) Va","E":"(1)Va;(2)Va"},"id":"106-腎-16","roc_year":106,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":16,"src":"舊站腎臟科"},{"num":17,"answer":"B","stem":"關於慢性腎臟病之蛋白飲食限制 ,底下敘述何者為不正確?","options":{"A":"當出現尿毒症狀時,蛋白飲食限制最低為蛋白質每天0.6公克/公斤(理想體重)及熱量每天30 kcal/公斤(理想體重)。","B":"低蛋白飲食限制本身確實可以減緩腎功能惡化,因其可減低尿毒症狀與延緩開始透析治療之時間。","C":"低蛋白飲食可由測量體重變化、血清白蛋白、24小時urea nitrogen排泄量等來判斷低蛋白飲食限制是否適度。","D":"高蛋白飲食常也會增加磷與鈉之攝取,而抵銷angiotensin-converting enzyme inhibitor (ACEi)與angiotensin-receptor blocker (ARB)之腎臟保護作用。","E":"低蛋白飲食控制需補充水溶性維生素。"},"id":"106-腎-17","roc_year":106,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":17,"src":"舊站腎臟科"},{"num":18,"answer":"C","stem":"關於血壓之測量: 請問下列何者為非?","options":{"A":"應鼓勵居家血壓監測(Home blood pressure monitoring),每天測量與紀錄二至三回。","B":"高血壓治療的目標:一般病患為居家血壓平均要低於135/85 mmHg;慢性腎臟病則低於130/80 mmHg。","C":"活動式血壓監測(Ambulatory blood pressure monitoring)的正常值:白天平均低於135/85 mmHg:;夜間平均低於130/80 mmHg。","D":"與診間血壓測量相較,活動式血壓測量更能預測心肌梗塞或中風。","E":"就活動式血壓監測而言,若與白天的血壓相比較,夜間高血壓會增加心血管的負擔,為心血管疾病預後之強烈因子。"},"id":"106-腎-18","roc_year":106,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":18,"src":"舊站腎臟科"},{"num":19,"answer":"D","stem":"關於骨髓移植腎病變(Bone marrow transplant nephropathy),下列敘述何者為正確?","options":{"A":"常在移植後百日內發生","B":"與Cyclosporine有關","C":"與Sirolimus有關","D":"與Radiation有關","E":"須積極做血漿置換治療。"},"id":"106-腎-19","roc_year":106,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":19,"src":"舊站腎臟科"},{"num":20,"answer":"C","stem":"下列哪一個免疫抑制藥物,可能引起高血壓、糖尿病、及腎臟病(Thrombotic microangiopathy) 三種疾病?","options":{"A":"Prednisolone","B":"Cyclosporine","C":"Tacrolimus","D":"Sirolimus","E":"Mycophenolate mofetil"},"id":"106-腎-20","roc_year":106,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":20,"src":"舊站腎臟科"},{"num":21,"answer":"D","stem":"某50歲男性有酒精成癮病史,被發現躺在旅館房間地板上而被送至急診處。血壓120/66 mmHg,心跳每分鐘100下,呼吸每分鐘30下。抽血檢查:Serum Na 140 mE  renal bone disease","C":"Nephron loss reduces synthesis of 1,25-Vitamin D3","D":"Low level of 1,25-Vitamin D3 results in lower intestine resorption of Ca","E":"Phosphate retention contributes to hypo[Ca]"},"id":"107-腎-3","roc_year":107,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":3,"src":"舊站腎臟科"},{"num":4,"answer":"E","stem":"一位70歲女性,過去沒有CAD或DM病史,也沒有規則就醫。最近因為倦怠、胃口不佳來診。實驗室檢查發現: serum creatinine 6.2 mg/dL, eGFR 14 mL/min,Hb 11.4 g/dL, serum ferritin 500 ng/mL。下列處置,何者最適宜?","options":{"A":"給予ESA (erythropoiesis stimulating agent),將Hb 提升至目標值13-14 g/dL","B":"Check serum level of erythropoietin","C":"Give intravenous iron for anemia","D":"Give oral iron dose for correcting anemia","E":"Measure blood level of transferrin saturation"},"id":"107-腎-4","roc_year":107,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":4,"src":"舊站腎臟科"},{"num":5,"answer":"A","stem":"一位48歲女性,診斷有high grade lymphoma,預定接受cytotoxic chemotherapy。病人目前的serum creatinine level是2.1 mg/d。為了預防發生tumor lysis syndrome及腎臟惡化,下列處置,何者最適宜?","options":{"A":"Give allopurinol or febuxostat, if not contraindicated, for preventing hyperuricemia","B":"Give acetylcysteine for preventing acute kidney injury","C":"Give large amount of 5% glucose water solution for volume expansion","D":"Give 1,25-activated Vitamin D3 for preventing hyperphosphatemia","E":"Arrange dialysis immediately after chemotherapy for preventing occurrence of chronic interstitial nephritis"},"id":"107-腎-5","roc_year":107,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":5,"src":"舊站腎臟科"},{"num":6,"answer":"E","stem":"下列處置有助於減緩多囊腎(adult polycystic kidney)病人的腎功能惡化,何者除外?","options":{"A":"使用ACEI 或 ARB,控制血壓在130-140/80-90 mmHg之下","B":"使用vasopressin antagonist (tolvaptan), 或建議適當增加每日飲水量 (> 3 L/day)","C":"如果有cyst infection, 使用lipid-soluble antibiotics, 如: quinolones, 因為cyst penetration 佳,效果較好","D":"限制低鹽(low salt,","E":"使用低蛋白飲食 (low protein diet,"},"id":"107-腎-6","roc_year":107,"source":"舊站q4腎臟科","topic":"囊性/遺傳性腎病","q_num":6,"src":"舊站腎臟科"},{"num":7,"answer":"B","stem":"一位72歲男性,因為高血壓,蛋白尿,下肢輕度水腫,來門診就診。實驗室檢查: serum creatinine1.8 mg/dL, 有proteinuria (2+), hematuria (-), 進一步做urine protein electrophoresis有monoclonal band (+),C3與C4 皆正常。住院做腎臟生檢(renal biopsy)發現有物質沉澱在glomerulus,tubule部分正常。以特殊染色,呈現Congo red (-) 。病人最可能的診斷為:","options":{"A":"Amyloidosis","B":"Light-chain deposit disease","C":"Myeloma cast nephropathy","D":"Fibrillary glomerulonephritis","E":"Type II cryoglobulinemia"},"id":"107-腎-7","roc_year":107,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":7,"src":"舊站腎臟科"},{"num":8,"answer":"B","stem":"長期血液透析(hemodialysis)的病人,為做好防護,預防感染,除了檢測HIV ,viral hepatitis (B and C) profile之外,以下敘述,何者最正確? (1). 對於 HBV (-)的病人,建議施打 HBV vaccine (2).建議每五年內,應施打 23價/13價 pneumococcal vaccine (3). 建議每年流感季節,應施打 inactivated influenza vaccine (4). 建議施打 Herpes Zoster vaccine","options":{"A":"(1)+(2)+(3)+(4)","B":"(1)+(2)+(3)","C":"(1)+(2)","D":"(1)+(3)","E":"(2)+(3)+(4)"},"id":"107-腎-8","roc_year":107,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":8,"src":"舊站腎臟科"},{"num":9,"answer":"D","stem":"56歲男性,無糖尿病,有輕度高血壓,BMI 26Kg/m2,serum creatinine 3.2 mg/dL,eGFR 18 mL/min,對於CKD尚未透析的病人,蛋白質攝取量,以下建議,何者最合適?","options":{"A":"1.4-1.5 g/kg/day","B":"1.2-1.4 g/kg/day","C":"1.0-1.2 g/kg/day","D":"0.6-0.8 g/kg/day","E":""},"id":"107-腎-9","roc_year":107,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":9,"src":"舊站腎臟科"},{"num":10,"answer":"B","stem":"慢性腎臟 (CKD) 患者應避免或小心使用OTC (over-the-counter)藥物,但下列何種狀況下可以使用?","options":{"A":"NSAID as analgesics","B":"Aspirin for CV protection","C":"Ephedrine for weight reduction","D":"MgO for constipation","E":"Aluminum hydroxide long-term use as antacid"},"id":"107-腎-10","roc_year":107,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":10,"src":"舊站腎臟科"},{"num":11,"answer":"B","stem":"一位39歲女性,本身無DM,這次是第一次懷孕。在懷孕第26週時出現高血壓(150/96 mmHg),有雙下肢足踝附近水腫。尿液試紙(dipstick)檢查有蛋白尿 (2+),因此被轉介來內科門診。欲安排鑑別診斷,下列選項,何者最適宜? (1). Liver function test (AST, ALT) (2). Check platelet count (3). Check anti-phospholipid antibody titer (4).Arrange CT/MRI for central vein thrombosis (5). Give ACEI/ARB for hypertension control and for renal protection","options":{"A":"(1)+(2)+(3)+(4)+(5)","B":"(1)+(2)+(3)","C":"(1)+(4)+(5)","D":"(1)+(3)+(5)","E":"(3)+(4)"},"id":"107-腎-11","roc_year":107,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":11,"src":"舊站腎臟科"},{"num":12,"answer":"D","stem":"一位48歲被新診斷有高血壓的男性,本身無DM。服用醫師給予的ACEI降血壓藥物,兩個月後返診,發現serum creatinine從 1.4 mg/dL上升至2.6 mg/dL。重新理學檢查發現腹部在肚臍右側部位有囉音(bruit)。欲安排鑑別診斷,下列選項敘述,何者最正確? (1). 如果檢查病人的renin, aldosterone level,預期renin應該偏低,而aldosterone會很高 (2). 可安排duplex Doppler 或CT/MRI檢查renal artery (3). 應該接著安排做導管檢查renal vein sampling (4). 如果檢查血清[K],經常會伴隨有高血鉀(hyperkalemia) (5). 如果檢查尿液catecholamines,會發現尿液catecholamines升高","options":{"A":"(1)+(2)","B":"(1)+(3)+(4)","C":"(3)+(4)+(5)","D":"(2)","E":"(1)+(2)+(5)"},"id":"107-腎-12","roc_year":107,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":12,"src":"舊站腎臟科"},{"num":13,"answer":"C","stem":"門診轉診48歲女性病人,主訴為半年前低劑量肺部電腦斷層意外發現左邊腎上腺有2公分大小之結節,過去無高血壓病史,請問關於腎上腺瘤之下列敘述,何項為正確?(1). 若無高血壓或庫欣氏症候群症狀,就不用做荷爾蒙方面的篩檢 (2). 由影像學檢查,若大於4公分惡性腫瘤之可能性較高 (3). 若為腎上腺皮質癌,大部分會製造過多的類固醇 (4). 若 Low CT density 50%,則為良性偶見瘤(Incidentaloma)之機率較大 (5). MRI為首選檢查項目,因能比電腦斷層提供更多資訊","options":{"A":"(1)+(2)+(4)","B":"(1)+(3)+(4)","C":"(2)+(3)+(4)","D":"(2)+(3)+(5)","E":"(2)+(4)+(5)"},"id":"107-腎-13","roc_year":107,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":13,"src":"舊站腎臟科"},{"num":14,"answer":"E","stem":"以下不同時期的慢性腎臟病(CKD)患者,首度抽血測得高膽固醇血症 (CHO 260 mg/dL,HDL 30 mg/dL, LDL 160 mg/dL),下列何者不建議給予Statin? (1). 年齡55歲之第二期CKD患者 (2). 年齡55歲,尚未開始透析之第五期CKD 患者 (3). 年齡40歲,有尿蛋白與糖尿病之第四期CKD患者 (4). 年齡40歲、開始透析治療兩年之第五期CKD患者 (5). 年齡40歲、腎臟移植成功兩年之第二期CKD患者","options":{"A":"(3)+(4)+(5)","B":"(2)+(4)+(5)","C":"(4)+(5)","D":"(2)+(4)","E":"(4)"},"id":"107-腎-14","roc_year":107,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":14,"src":"舊站腎臟科"},{"num":15,"answer":"C","stem":"尿失禁為老人常見之困擾問題,請問底下哪些常見的藥物可能加重夜尿而儘量避免? (1). Doxazocin (2). Dihydropyridine calcium-channel blockers (3). NSAIDs (4). Thiazolidinediones (5). Anthistamines","options":{"A":"(1)+(2)+(3)","B":"(1)+(2)+(4)","C":"(2)+(3)+(4)","D":"(2)+(3)+(5)","E":"(1)+(3)+(5)"},"id":"107-腎-15","roc_year":107,"source":"舊站q4腎臟科","topic":"腎臟生理/藥理/腎毒性","q_num":15,"src":"舊站腎臟科"},{"num":16,"answer":"A","stem":"關於活動式血壓量測(Ambulatory blood pressure mesurement),以下敘述何者錯誤?","options":{"A":"隱匿型高血壓(Masked hypertension)之心血管疾病風險明顯低於診間或居家之持續性高血壓","B":"夜間型高血壓(Nocturnal hypertension)是比白天高血壓或診間高血壓更強之心血管疾病風險預後因子","C":"隱匿型高血壓常見於男性、老人、糖尿病","D":"老人常見有白袍高血壓(White coat hypertension) 或隱匿型高血壓","E":"慢性腎臟病特別常見有夜間高血壓與隱匿型高血壓"},"id":"107-腎-16","roc_year":107,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":16,"src":"舊站腎臟科"},{"num":17,"answer":"D","stem":"55歲病人,糖尿病七年病史每天口服降血糖藥物控制,今年因出現尿蛋白與高血壓開始服用 Thiazide/Valsartan,近兩個月又胃酸逆流服用Proton pump inhibitor,這次門診病人抱怨容易手足抽搐(tetany),請此新症狀可能跟哪一電解質之異常相關?","options":{"A":"低鈉血症","B":"低鉀血症","C":"代謝性鹼中毒","D":"低鎂血症","E":"低鈣血症"},"id":"107-腎-17","roc_year":107,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":17,"src":"舊站腎臟科"},{"num":18,"answer":"B","stem":"在晚期慢性腎臟病或透析病人,以下哪一項 與其高出許多的心血管疾病或死亡風險不見得有直接相關?","options":{"A":"低血壓 (Low blood pressure)","B":"曾有急性心肌梗塞 (Documented AMI)","C":"心臟衰竭 (Congestive heart failure)","D":"左心室肥厚 (Left ventricular hypertrophy)","E":"擴張型心肌肥厚 (Dilated cardiomyopathy)"},"id":"107-腎-18","roc_year":107,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":18,"src":"舊站腎臟科"},{"num":19,"answer":"E","stem":"關於腎臟細胞癌(Renal cell carcinoma),底下敘述何者錯誤?","options":{"A":"腎臟細胞癌中以Clear cell carcinoma為最多而且最會轉移","B":"Clear cell carcinoma為 von Hippel-Lindau gene 之 \"loss of function\" mutation","C":"約略30%腎臟細胞癌發現時已有轉移,而腎臟切除手術後仍有20-30%會有轉移復發","D":"腎臟細胞癌尤其是Clear cell carcinoma發現時有轉移,仍應建議做罹癌側之全部或局部腎臟切除","E":"常伴有Paraneoplastic syndrome,包括有肝臟轉移及肝功能異常之Stauffer's syndrome"},"id":"107-腎-19","roc_year":107,"source":"舊站q4腎臟科","topic":"腎細胞癌/腫瘤","q_num":19,"src":"舊站腎臟科"},{"num":20,"answer":"E","stem":"68歲男性 無糖尿病、高血壓、心肌缺氧等病史,近六個月逐漸出現呼吸困難、行動困難、站立時頭暈、下肢水腫、下肢有麻木及疼痛感覺異常。 經檢查:血壓102/70 mmHg、脈博96/min、呼吸20/min、胸部Cardiac dullness增加、呼吸音減少,腹部有shifting dullness,下肢嚴重水腫至膝蓋,神經學檢查下肢對觸摸與震動之感覺有下降。抽血檢查:Hb 10.2 gm/dL, Albumin 2.4 gm/dL, Cre 1.6 mg/dL, CHO 280 mg/dL, HbA1C 5.9%, Urine Protein/ Creatinine ratio 4800 mg/g, 及Urine有Bence Jones protein的存在。請問下列敘述何者有誤?","options":{"A":"進一步檢查immunofixation of serum and urine及serum immunoglobulin free light chain assay,確定為 κ 或 λ light chain 與其量","B":"建議可先做皮下脂肪與骨髓穿刺,確定是否有Amyloidosis 以及骨隨內plasma cell 的百分比","C":"診斷上還是需要做腎臟切片,並免疫染色證明有light chain的存在","D":"此病接受自體造血幹細胞骨髓移植並不會比傳統化療效果好","E":"病人結局(outcome)決定於腎功能是否惡化至透析治療"},"id":"107-腎-20","roc_year":107,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":20,"src":"舊站腎臟科"},{"num":21,"answer":"A","stem":"某50歲男性來院前五天剛騎腳踏車環島結束,主訴: 輕微噁心、兩腳肌肉痠疼無力、小便呈可樂顏色已兩天。理學檢查:血壓130/80 mmHg,脈搏 82/min,呼吸18/min,胸部腹部無恙,兩側小腿大腿有壓痛及肌肉輕微無力~+4。抽血檢查: WBC 10200/ul, Hb 11.6g/dL,BUN 128mg/dL, Cre 6.7mg/dL, Na 138mmol/L, K 5.6mmol/L, ABG pH 7.26, HCO3- 16mEq/L. CK 25000 U/L, AST 703U/L, ALT 238 U/L, Bil-T 1.2 mg/dL, LDH 2013 U/dL, Haptoglobin 58 mg/dL, 尿檢 pH 5.8, protein (2+), OB(3+), RBC 2-5/HPF, WBC 0-3/HPF.腎臟超音波顯示兩側腎臟均為10公分左右,無萎縮現象。請問下列敘述何者有誤?","options":{"A":"其AKI為由Hypovolemia之prerenal AKI,所以治療上以Hydration為主","B":"應也要檢查血清鈣與磷濃度,因常會有低鈣血症與高磷血症","C":"應持續給予生理鹽水至少每小時200毫升以上,至尿試紙潛血變成陰性為止","D":"若尿液pH","E":"如果出現寡尿、高血鉀併EKG變化、嚴重酸中毒,就應即早緊急血液透析治療"},"id":"107-腎-21","roc_year":107,"source":"舊站q4腎臟科","topic":"急性腎損傷(AKI)","q_num":21,"src":"舊站腎臟科"},{"num":22,"answer":"C","stem":"以下是一位ICU病人的動脈氣體分析與血液電解質報告: pH 7.42, PaO2 88 mmHg, PaCO2 67 mmHg, [Na] 140 mEq/L, [K] 3.5 mEq/L, [Cl] 88 mEq/L, HCO3 42 mEq/L。依據上述數值,最符合以下何種病人狀況?","options":{"A":"Sepsis in ICU","B":"Uremia, long-term use of diuretics","C":"COPD with diuretics","D":"Methanol intoxication, with secondary lactic acidosis","E":"Pneumonia, on ventilator support for pulmonary edema"},"id":"107-腎-22","roc_year":107,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":22,"src":"舊站腎臟科"},{"num":1,"answer":"C","stem":"慢性腎臟病(CKD)病人常合併有鈣磷異常,以下有關治療的敘述,何者錯誤?","options":{"A":"採用低磷飲食(low phosphate diet),有助於預防副甲狀腺高能症(secondary hyperparathyroidism)","B":"使用活性維他命D(如: calcitriol)可以抑制副甲狀腺素(parathyroid hormone)分泌,副作用之一是引起高血鈣(hypercalcemia)","C":"使用calcimimetic agent(如: cinacalcet)可以抑制副甲狀腺素(parathyroid hormone)分泌,副作用之一是引起高血鈣(hypercalcemia)","D":"使用磷結合劑(如: 各式鈣片)可以抑制副甲狀腺素(parathyroid hormone)分泌,副作用之一是引起高血鈣(hypercalcemia)","E":"使用sevelamer或lanthanum,可以抑制腸胃道對磷的吸收,但不會引起高血鈣(hypercalcemia)"},"id":"108-腎-1","roc_year":108,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":1,"src":"舊站腎臟科"},{"num":2,"answer":"B","stem":"高血壓的病人初次就醫時,應安排優先做以下評估(initial evaluation),何者除外?","options":{"A":"Hematocrit","B":"Serum uric acid level","C":"ECG (electrocardiogram)","D":"Urinalysis 或 urine albumin excretion","E":"Serum BUN and Cr, Sodium, potassium"},"id":"108-腎-2","roc_year":108,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":2,"src":"舊站腎臟科"},{"num":3,"answer":"C","stem":"妳(你)是內科醫師,一位年輕高血壓病人懷孕20週,轉介到妳(你)的門診追蹤。以下針對懷孕高血壓的治療建議,何者不正確?","options":{"A":"該孕婦的血壓控制目標,建議不高於140/90 mmHg","B":"可給予低劑量(80-100 mg/day)aspirin,預防發生子癲前症(pre-eclampsia)","C":"血壓藥,建議以ACEI或ARB類優先","D":"血壓藥,可以使用labetalol","E":"血壓藥,可以使用nifedipine"},"id":"108-腎-3","roc_year":108,"source":"舊站q4腎臟科","topic":"高血壓/腎血管疾病","q_num":3,"src":"舊站腎臟科"},{"num":4,"answer":"E","stem":"臨床上可以使用eGFR與urine ACR(albumin creatinine ratio)來判斷腎臟病的嚴重程度,與評估進展到末期腎臟病(ESRD)的危險度,以下何種情況最嚴重?","options":{"A":"eGFR 30 (ml/min/1.73 m2), urine ACR","B":"eGFR 60 (ml/min/1.73 m2), urine ACR>300 mg/g","C":"eGFR 50 (ml/min/1.73 m2), urine ACR 30-300 mg/g","D":"eGFR 70 (ml/min/1.73 m2), urine ACR","E":"eGFR 40 (ml/min/1.73 m2), urine ACR 30-300 mg/g"},"id":"108-腎-4","roc_year":108,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":4,"src":"舊站腎臟科"},{"num":5,"answer":"A","stem":"不明原因的急性腎損傷(AKI),尿液檢查發現: protein (2+), RBC cast (+), WBC cast (-), WBC 0-5/HPF, eosinophil (-), bacteria (-), Muddy brown cast (-), FENa > 1% 病人發生AKI最可能的病因為:","options":{"A":"Glomerulonephritis (GN) or vasculitis","B":"Interstitial nephritis","C":"Acute tubular necrosis (ATN)","D":"Pyelonephritis or papillary necrosis","E":"Renal arterial or vein occlusion"},"id":"108-腎-5","roc_year":108,"source":"舊站q4腎臟科","topic":"急性腎損傷(AKI)","q_num":5,"src":"舊站腎臟科"},{"num":6,"answer":"A","stem":"一位36歲女性,主訴健康檢查發現血尿(hematuria)。門診再一次尿液檢查發現: protein (3+), O.B. (2+), dysmorphic RBC (+), RBC cast (+)。基於這些資料,妳(你)會安排以下進一步檢查,何者最不合適?","options":{"A":"IVP (intravenous pyelography)或RP (retrograde pyelography)","B":"做serology tests, 包括: ant-GBM Ab, ANCA, ASLO (anti-strytolysin O)","C":"檢測血中 complement levels (C3, C4), cryoglobulin","D":"Renal sonography, 必要時考慮renal biopsy","E":"Urine cytology test"},"id":"108-腎-6","roc_year":108,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":6,"src":"舊站腎臟科"},{"num":7,"answer":"A","stem":"一位病人主訴頻尿,而且每次尿量都很多。病人並未使用利尿劑,身體檢查: 血壓正常,無異狀。收集24小時尿液結果如下: 總尿量 3600 mL/day, urine osmolality 550 mOsm/kg。病人的檢查數值,最符合以下哪一種多尿症的診斷:","options":{"A":"發生solute diuresis","B":"Primary polydipsia","C":"發生 central diabetes insipidus (DI)","D":"發生 nephrogenic diabetes insipidus (DI)","E":"發生 SIADH (syndrome of inappropriate anti-diuretic hormone secretion)"},"id":"108-腎-7","roc_year":108,"source":"舊站q4腎臟科","topic":"水電解質異常(鈉鉀鈣磷鎂/水)","q_num":7,"src":"舊站腎臟科"},{"num":8,"answer":"C","stem":"下列原發性腎病變引起的腎病症候群(nephrotic syndrome),哪一種最容易合併腎靜脈栓塞(renal vein thrombosis)?","options":{"A":"Focal segmental glomerulosclerosis (FSGS)","B":"IgA nephropathy","C":"Membranous nephropathy (MN)","D":"Minimal change disease (MCD)","E":"Type I MPGN (membranoproliferative glomerulonephritis)"},"id":"108-腎-8","roc_year":108,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":8,"src":"舊站腎臟科"},{"num":9,"answer":"D","stem":"慢性腎臟病(CKD)病人的飲食,建議可併用低蛋白飲食(low protein diet, LPD),以保護腎功能,減緩CKD惡化。以下對於LPD的敘述,何者錯誤?","options":{"A":"CKD飲食治療指引所謂的LPD,建議每日蛋白質攝取約0.6-0.8 g/kg/day","B":"LPD可以讓腎小球入球小動脈(afferent arteriole)收縮,降低腎小球內壓力(intra-glomerular pressure),減緩CKD惡化","C":"LPD可以增強腎小球出球小動脈(efferent arteriole)擴張的機轉,降低腎小球內壓力(intra-glomerular pressure),減緩CKD惡化","D":"LPD要搭配熱量限制,建議","E":"LPD可以減少含氮(nitrogen, N)代謝物產生,降低相關uremic toxins, 如: p-cresol sulfate產生"},"id":"108-腎-9","roc_year":108,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":9,"src":"舊站腎臟科"},{"num":10,"answer":"A","stem":"預防contrast-induced acute kidney injury (AKI),以下治療策略組合,何者正確? (1)適當的volume expansion, 建議優先選擇isotonic saline (2)加上urinary alkalization, 效果和單純使用isotonic saline效果無差別 (3)現在的指引建議: routine 給予 N-acetylcysteine,可以有效預防AKI發生 (4)如果病人正在使用metformin, 建議不要隨意終止停用,以避免發生lactic acidosis (5)如果病人正在使用diuretics, 或Angiotensin-converting enzyme inhibitors (ACEI) 或angiotensin-receptor blockers (ARB), 建議要暫停使用,以預防發生AKI","options":{"A":"(1)+(2)","B":"(1)+(2)+(3)","C":"(1)+(2)+(3)+(4)","D":"(1)+(2)+(3)+(5)","E":"(1)+(2)+(5)"},"id":"108-腎-10","roc_year":108,"source":"舊站q4腎臟科","topic":"急性腎損傷(AKI)","q_num":10,"src":"舊站腎臟科"},{"num":11,"answer":"B","stem":"針對多囊腎(autosomal dominant polycystic kidney disease, ADPKD),以下何種治療策略可以預防腎絲球過濾率(GFR)下降? (1)Low salt diet (2)Cyclic adenosine monophosphate (cAMP) raising agent, 例如 dipyridamole (3)Vasopressin-receptor antagonist, 例如: somatostatin (4)Angiotensin-converting enzyme inhibitors (ACEI) or angiotensin-receptor blockers (ARB) (5)Water restriction, to prevent cyst growth","options":{"A":"(1)+(2)+(3)+(4)","B":"(1)+(3)+(4)","C":"(2)+(3)+(4)+(5)","D":"(1)+(3)+(5)","E":"(2)+(3)+(5)"},"id":"108-腎-11","roc_year":108,"source":"舊站q4腎臟科","topic":"囊性/遺傳性腎病","q_num":11,"src":"舊站腎臟科"},{"num":12,"answer":"A","stem":"以下的糖尿病治療藥物,哪一類可以有效預防腎病變的發生? (1)Insulin (2)Metformin (3)Biguanides (4)Dipeptidyl peptidase 4 (DPP-4) inhibitors (5)glucagon-like peptide 1 (GLP-1) agonist (6)sodium-glucose cotransporter 2 (SGLT2) inhibitors","options":{"A":"(5)+(6)","B":"(1)+(5)+(6)","C":"(3)+(5)+(6)","D":"(3)+(4)+(5)+(6)","E":"(1)+(2)+(5)+(6)"},"id":"108-腎-12","roc_year":108,"source":"舊站q4腎臟科","topic":"慢性腎臟病/尿毒症","q_num":12,"src":"舊站腎臟科"},{"num":13,"answer":"B","stem":"63歲男性病人因 Chronic kidney disease stage 3 (eGFR 50ml/min/1.73m^2),腎病症候群(腎臟切片病理為局部硬化型腎炎)、高血壓、退化性關節炎等疾病服用底下藥物,但是過去半年血鉀都維持在5.5-6.0 mmol/L之間,請問高血鉀可能與底下藥物有關? (1)ARB (2)Doxazosin (3)Cyclosporin (4)Predinisolone (5)COX-2 inhibitor.","options":{"A":"(1)+(3)+(4)","B":"(1)+(3)+(5)","C":"(1)+(2)+(4)","D":"(1)+(2)+(5)","E":"(1)+(4)+(5)"},"id":"108-腎-13","roc_year":108,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":13,"src":"舊站腎臟科"},{"num":14,"answer":"D","stem":"關於腎臟替代療法,底下何者為正確?","options":{"A":"早點開始透析(eGFR 10-14 ml/min/1.73m^2) 跟晚點開始透析 (5-7 ml/min/1.73m2)在死亡率有顯著差異","B":"增加每次血液透析中尿素氮的清除率,可以改善死亡率","C":"每週三次的血液透析改為每週六次,可以減少死亡率","D":"低白蛋白血症為透析病人之重要不良預後因子","E":"血液透析改為腹膜透析可以降低死亡率"},"id":"108-腎-14","roc_year":108,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":14,"src":"舊站腎臟科"},{"num":15,"answer":"C","stem":"某男性有高血壓病人,因下肢水腫六個月,經檢查24小時尿蛋白為5公克,血清白蛋白3 gm/L,Creatinine 1.7 mg/dL,經腎臟穿刺切片病理報告為第二期膜性腎炎。請問底下敘述何者為宜? (1)應檢測血清Anti-M-Phospholipase A2 recptor (Anti-PLA2R) antibody titer (2)可由腎臟切片中腎絲球底膜之增厚與發炎細胞之浸潤多寡得知其預後 (3)若病人Anti-PLA2R antibody titer不高,就表示其就會自行緩解 (4)若病人Anti-PLA2R antibody titer有高,就應建議接受免疫抑制療法 (5)若病人Anti-PLA2R antibody titer有高且開始接受治療,建議還是繼續追蹤此抗體之titer。","options":{"A":"(1)+(2)+(3)+(4)+(5)","B":"(1)+(2)+(4)+(5)","C":"(1)+(4)+(5)","D":"(1)+(2)+(3)","E":"(1)+(3)+(4)"},"id":"108-腎-15","roc_year":108,"source":"舊站q4腎臟科","topic":"腎絲球疾病(腎炎/腎病症候群)","q_num":15,"src":"舊站腎臟科"},{"num":16,"answer":"E","stem":"關於台灣腎臟移植的現況,何者為錯?","options":{"A":"台灣腎臟移植病人第一、五、十年的存活率與美國相當","B":"台灣腎臟移植病人五、十年存活率比台灣透析的病人明顯高很多","C":"台灣腎臟移植後死亡原因排名依序為心血管疾病、感染、惡性腫瘤","D":"台灣腎臟移植後惡性腫瘤發生率為正常人的3-5倍,且逐年增加","E":"台灣腎臟移植後腫瘤跟外國一樣以淋巴癌居多"},"id":"108-腎-16","roc_year":108,"source":"舊站q4腎臟科","topic":"透析與腎移植","q_num":16,"src":"舊站腎臟科"},{"num":17,"answer":"C","stem":"請問在底下那一種狀況做大量輸液治療,仍要小心可能會造成缺血性腎傷害?","options":{"A":"糖尿病酮酸中毒 Diabetic ketoacidosis","B":"橫紋肌溶解症 Rhabdomyolysis","C":"燒傷 Burns","D":"尿路阻塞被解除後尿量增加 Post-obstruction diuresis","E":"顯影劑給予後 After administration of constrast medium"},"id":"108-腎-17","roc_year":108,"source":"舊站q4腎臟科","topic":"急性腎損傷(AKI)","q_num":17,"src":"舊站腎臟科"},{"num":18,"answer":"B","stem":"關於腎臟移植後多瘤性病毒(Polyomaviruses BK virus) 感染,下列何者為錯?","options":{"A":"通常在腎臟移植一個月後才發生","B":"給予Acyclovir可以有效地預防其發生","C":"早期發現與降低調整免疫抑制藥物極為適當之處置","D":"BK 病毒感染可見於腎臟移植","E":"BK病毒可在病人的尿液與血液中檢測或培養出來"},"id":
