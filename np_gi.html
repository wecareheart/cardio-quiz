": "頭部外傷/顱內出血引發的壓力性潰瘍稱『Cushing ulcer』,故選A。", "detail": {"background": "壓力性潰瘍兩個人名:①『Cushing ulcer』=中樞神經病變/頭部外傷/顱內壓升高相關(機轉與迷走神經興奮致胃酸增加,潰瘍可深、易穿孔);②『Curling ulcer』=燒傷後。本例車禍頭部外傷併顱內出血、加護病房、鼻胃管鮮血、胃多處潰瘍→Cushing ulcer(A)。marginal ulcer為胃腸吻合口潰瘍;Marjolin潰瘍為慢性傷口/疤痕惡性化(鱗狀細胞癌),皆不符。\\n\\n護理:顱腦損傷/重症者預防壓力性潰瘍(PPI/H2阻斷劑、早期腸道營養),監測胃管引流與血色素。", "options": {"A": "正解:頭部外傷/顱內壓升高的壓力性潰瘍為Cushing ulcer。", "B": "Curling ulcer是燒傷後的壓力性潰瘍。", "C": "marginal ulcer為胃腸吻合口處潰瘍。", "D": "Marjolin ulcer為慢性傷口/疤痕惡性化,非壓力性潰瘍。"}, "sources": ["Harrison 21e, Stress-Related Mucosal Injury", "Sabiston"]}}, "106-106a-通論-52": {"quick": "DU合併H.pylori(urease+),Amoxicillin+Klaricid(clarithromycin)應再加『質子幫浦抑制劑(PPI)』,故選C。", "detail": {"background": "幽門桿菌『三合一除菌療法』=PPI+兩種抗生素(amoxicillin+clarithromycin)。本例已用amoxicillin+Klaricid(clarithromycin),須再加『PPI』組成標準三合一,療程10–14天。PPI除強力抑酸促進潰瘍癒合外,提高胃內pH也增強抗生素(尤其clarithromycin/amoxicillin)的活性與根除率。制酸劑、H2阻斷劑、黏膜保護劑的抑酸與增效作用不如PPI,非標準搭配。治療後以UBT/糞便抗原確認根除。\\n\\n護理:衛教全程足量服藥、避免NSAID/菸酒、治療後追蹤確認根除。", "options": {"A": "制酸劑抑酸與增效不足,非標準三合一成分。", "B": "H2阻斷劑抑酸力不如PPI,非標準三合一首選。", "C": "正解:加PPI組成PPI+amoxicillin+clarithromycin三合一除菌。", "D": "黏膜保護劑非除菌療法的抑酸增效核心。"}, "sources": ["ACG H. pylori Guideline", "Harrison 21e, Peptic Ulcer Disease"]}}, "108b-TNPA-內科-49": {"quick": "評估胰臟鈣化(慢性胰臟炎)的檢查中,ERCP因侵入性、併發症(如胰臟炎)較多而較少使用,故選D。", "detail": {"background": "慢性胰臟炎常見『胰臟鈣化』。評估影像:①X光可見鈣化;②腹部超音波;③『電腦斷層(CT)』──偵測鈣化與形態學變化的良好非侵入工具;④『內視鏡逆行性膽胰管攝影(ERCP)』──雖能顯示胰管變化,但屬『侵入性』且併發症較多(尤其『ERCP後胰臟炎PEP』、出血、穿孔、感染),故『較少』作為單純診斷胰臟鈣化/慢性胰臟炎的工具(現多以非侵入的CT/MRCP/EUS取代),ERCP保留給需治療性介入(取石/放支架)時。故D(ERCP因併發症多較少使用)正確。\\n\\n護理:診斷以非侵入影像優先;ERCP保留治療用途,術後觀察PEP。", "options": {"A": "X光可顯示胰臟鈣化,屬非侵入,常用。", "B": "超音波非侵入,可初步評估。", "C": "電腦斷層為評估鈣化與形態的良好非侵入工具,常用。", "D": "正解:ERCP侵入性、併發症多(PEP等),較少用於單純診斷胰臟鈣化。"}, "sources": ["Harrison 21e, Chronic Pancreatitis (imaging)", "Sleisenger & Fordtran's"]}}, "112-進階-外科-48": {"quick": "乙狀結腸扭轉(bird's beak)復位後因復發率高需擇期處理,但『回復後即安排緊急手術』敘述錯誤(無腹膜炎時先減壓),故選B。", "detail": {"background": "乙狀結腸扭轉(sigmoid volvulus):好發老年、長期便祕,鋇劑/影像見『鳥嘴徵象(bird's beak)』。處置:①『無腹膜炎/壞死』時,先以『乙狀結腸鏡減壓復位並留置肛管』(A正確);②復位後因『復發率高』,應安排『擇期(elective)』乙狀結腸切除,而『非緊急手術』(B錯誤,為答案);③若有腹膜炎/壞死/減壓失敗則『立即手術』(C正確);④處置期間禁食、輸液、必要時抗生素(D正確)。本題B把『擇期』誤為『緊急』,且復位成功穩定者不需緊急手術。\\n\\n護理:減壓後觀察復發與壞死徵象;安排擇期手術防復發;腹膜炎時急診手術。", "options": {"A": "正確:無腹膜炎時先乙狀結腸鏡減壓復位並留置肛管。", "B": "錯誤(正解):復位後應安排『擇期』手術,非緊急手術。", "C": "正確:有腹膜炎徵象應立即手術。", "D": "正確:應禁食、輸液並給予抗生素。"}, "sources": ["ASCRS Colonic Volvulus", "Sabiston"]}}, "110-通論-其他-61": {"quick": "腹脹+高亢腸音(high-pitched hyperactive)+廣泛鼓音→最優先臆斷為『腸阻塞』,故選A。", "detail": {"background": "機械性『腸阻塞(intestinal obstruction)』早期因腸道企圖克服阻塞而蠕動增強,聽診出現『高亢、金屬音、活動性增加(high-pitched hyperactive)的腸音』,叩診因腸脹氣呈『鼓音』,可有陣發性絞痛、腹脹、嘔吐、無排氣排便。相對地:腸穿孔→腹膜炎、腸音消失、板狀腹;腸壞死→劇痛、腹膜炎、敗血、腸音消失;腸發炎(如腸胃炎)以腹瀉為主。本例『高亢腸音+鼓音+腹脹』最符合『腸阻塞』(A,初步臆斷)。\\n\\n護理:疑腸阻塞禁食、NG減壓、輸液、影像(KUB/CT)定位;警覺絞扼(發燒、腹膜炎、乳酸升高)需手術。", "options": {"A": "正解:高亢腸音+鼓音+腹脹→腸阻塞(初步臆斷)。", "B": "腸穿孔以腹膜炎、腸音消失為主,與高亢腸音不符。", "C": "腸壞死以劇痛、腹膜炎、敗血為主,非高亢腸音。", "D": "腸發炎(腸胃炎)以腹瀉為主,非以高亢腸音+鼓音腹脹為初步臆斷。"}, "sources": ["Harrison 21e, Intestinal Obstruction", "Sabiston"]}}, "114-通論-5分科-50": {"quick": "腸蠕動出現高亢金屬音(metallic sounds)最可能為『機械性腸阻塞』,故選B。", "detail": {"background": "腸音判讀:①『機械性腸阻塞』早期腸道強力蠕動克服阻塞→『高亢、金屬性(metallic/tinkling)、活動性增加』的腸音(伴陣發絞痛、腹脹);②『麻痺性腸阻塞(paralytic ileus)』腸蠕動停止→『腸音減弱或消失』;③急性腸胃炎腸音活躍但非金屬高亢;④腸破裂(穿孔)致腹膜炎→腸音消失。故金屬高亢腸音對應『機械性腸阻塞』(B)。\\n\\n護理:金屬高亢腸音+絞痛+腹脹疑機械性阻塞→禁食、NG減壓、影像定位;腸音消失疑麻痺性或腹膜炎。", "options": {"A": "急性腸胃炎腸音活躍但非金屬高亢,不符。", "B": "正解:高亢金屬音為機械性腸阻塞特徵。", "C": "腸破裂致腹膜炎,腸音消失,不符。", "D": "麻痺性腸阻塞腸音減弱/消失,非高亢。"}, "sources": ["Harrison 21e, Intestinal Obstruction (bowel sounds)", "Bates' Guide"]}}, "109-進階-外科-52": {"quick": "腹壁疝氣不一定都需積極手術(無症狀/小的可觀察),『腹疝氣需積極手術治療』作為通則錯誤,故選C。", "detail": {"background": "腹壁疝氣(hernia):①切口疝(incisional hernia)常見於腹部手術切口(A正確);②腹內壓升高者(女性、懷孕、腹水、肥胖、慢性咳嗽)易發生臍疝氣等(B正確);③『Valsalva maneuver(用力增加腹壓)』可使疝氣突出而利於檢查(D正確);④治療:有症狀、增大、或有『嵌頓(incarceration)/絞扼(strangulation)風險』者建議手術修補;但『無症狀的小疝氣(尤其某些臍疝、可復位且風險低者)可觀察(watchful waiting)』,並非『一律需積極手術』,故C作為通則『錯誤』(為答案)。股疝氣因絞扼風險高,通常建議手術。\\n\\n護理:衛教辨識嵌頓/絞扼(突出物無法回復、疼痛、紅腫、腸阻塞徵象)需急診;無症狀者可追蹤。", "options": {"A": "正確:切口疝常發生於腹部手術切口處。", "B": "正確:女性、懷孕、腹水者較易發生臍疝氣。", "C": "錯誤(正解):腹疝氣非一律需積極手術,無症狀低風險者可觀察。", "D": "正確:Valsalva maneuver是簡單實用的檢查方法。"}, "sources": ["Sabiston, Hernias (watchful waiting)", "Harrison 21e"]}}, "107-TNPA-外科-52": {"quick": "老年有心律不整(心房顫動)、突發劇烈腹痛但理學發現不成比例(腹軟、輕壓痛)、暗紅黏液血便→急性腸繫膜(上腸繫膜動脈)阻塞,故選C。", "detail": {"background": "急性腸繫膜缺血(acute mesenteric ischemia, AMI)常見於『心房顫動/心律不整』(栓子脫落阻塞上腸繫膜動脈SMA)、動脈硬化、低灌流。經典特徵為『疼痛與理學檢查不成比例(pain out of proportion)』──劇烈腹痛但早期腹部柔軟、壓痛輕、無明顯反彈痛;可解暗紅色黏液血便(黏膜缺血脫落)。本例60歲、心律不整、突發嚴重腹痛未轉移、腹軟輕壓痛、暗紅黏液便→『上腸繫膜動脈阻塞』(C)。隨缺血進展才出現腹膜炎、乳酸升高、休克(此時已腸壞死,預後差)。診斷靠CT血管攝影,治療需快速恢復血流(取栓/血管重建)±切除壞死腸段。\\n\\n護理:高度警覺AF病人突發劇痛但理學輕微者→緊急CTA;勿因腹軟而延誤;監測乳酸與惡化。", "options": {"A": "消化性潰瘍穿孔有板狀腹+游離氣體,與本例腹軟不符。", "B": "膽結石膽囊炎為右上腹痛Murphy,非暗紅血便+腹軟劇痛。", "C": "正解:AF+劇痛與理學不成比例+暗紅黏液血便→上腸繫膜動脈阻塞。", "D": "輸尿管結石為腰腹絞痛+血尿+CVA敲痛,本例腰部無敲痛、無血尿,不符。"}, "sources": ["Harrison 21e, Acute Mesenteric Ischemia", "ACG/AGA Mesenteric Ischemia"]}}, "112-進階-外科-53": {"quick": "腹部X光見『門靜脈積氣(portal venous gas)』要懷疑『腸壞死/缺血』,而非膽道感染,故C錯誤。", "detail": {"background": "小腸阻塞(SBO)要點:①有腹部手術病史者最常見原因為『腸沾黏(adhesion)』(A正確);②無手術史的成人與小孩,最常見原因為『疝氣併嵌頓』(B正確);③影像氣體鑑別:『膽道積氣(pneumobilia)』氣體在『肝門中央』、與膽腸相通/括約肌切開有關;『門靜脈積氣(portal venous gas)』氣體分布到『肝臟周邊』,是『腸壁壞死/腸缺血』的不祥徵象──故C把portal venous gas解讀為『膽道感染』錯誤(應懷疑腸壞死)(為答案);④『腸壁積氣(pneumatosis intestinalis)』也提示腸壁缺血壞死(D正確)。\\n\\n護理:SBO禁食NG減壓輸液;見portal venous gas/pneumatosis警覺腸壞死→緊急外科。", "options": {"A": "正確:有腹部手術史者SBO最常見原因為腸沾黏。", "B": "正確:無手術史者(含小孩)最常見原因為疝氣併嵌頓。", "C": "錯誤(正解):portal venous gas要懷疑腸壞死/缺血,非膽道感染。", "D": "正確:pneumatosis intestinalis要懷疑小腸壞死。"}, "sources": ["Sabiston, Small Bowel Obstruction; Portal venous gas", "Harrison 21e"]}}, "114-進階-家庭-42": {"quick": "有腹部手術史、嘔吐(食物→膽汁)、未排便、腹脹+高頻腸音→小腸阻塞(多為沾黏),故選C。", "detail": {"background": "本例70歲、有『腹腔鏡膽囊切除手術史』、2天嘔吐(初為食物殘渣後轉黃綠膽汁)、3天未解便、腹脹、『高頻腸音32次/分』、無反彈痛→典型『機械性小腸阻塞』(有手術史→最常見原因為腸沾黏)。嘔吐物由食物轉膽汁、腹脹、停止排便排氣、高亢腸音為阻塞特徵。急性腸胃炎以腹瀉為主;急性膽管炎為Charcot三聯;消化性潰瘍穿孔為板狀腹+游離氣體,皆不符。診斷以KUB/CT(腸袢擴張、氣液面、transition point)。\\n\\n護理:禁食、NG減壓、輸液電解質矯正、影像評估;警覺絞扼(發燒、腹膜炎、乳酸升高)需手術。", "options": {"A": "急性腸胃炎以腹瀉為主,非腹脹停止排便+高頻腸音。", "B": "急性膽管炎為發燒黃疸右上腹痛(Charcot三聯),不符。", "C": "正解:手術史+嘔吐+停止排便+腹脹高頻腸音→小腸阻塞(沾黏)。", "D": "消化性潰瘍穿孔為板狀腹+游離氣體,不符。"}, "sources": ["Sabiston, Adhesive Small Bowel Obstruction", "Harrison 21e"]}}, "107-TNPA-內科-48": {"quick": "上消化道內視鏡與大腸鏡皆正常而懷疑小腸出血,最佳檢查是『膠囊內視鏡』,故選B。", "detail": {"background": "『不明來源消化道出血(obscure GI bleeding)』在上消化道內視鏡與大腸鏡皆正常後,出血源多在『小腸』。評估順序:①病情穩定者首選『膠囊內視鏡(capsule endoscopy)』──非侵入、可看整段小腸黏膜,是小腸出血的第一線檢查(找血管發育不良angiodysplasia、腫瘤、Meckel等);②找到病灶後可用『深部小腸鏡(double-balloon enteroscopy)』做切片或治療;③活動性大出血或不穩時用CT血管攝影/血管攝影(可栓塞);④疑Meckel憩室用核醫掃描。膠囊內視鏡『禁忌』於疑腸阻塞/狹窄(膠囊滯留)。本例穩定懷疑小腸出血→膠囊內視鏡(B)。\\n\\n護理:衛教膠囊內視鏡準備與膠囊滯留風險(疑狹窄者先評估);依結果安排小腸鏡治療。", "options": {"A": "CT血管攝影用於活動性出血定位,非穩定不明小腸出血的第一線。", "B": "正解:膠囊內視鏡為小腸不明出血的最佳第一線檢查。", "C": "小腸鏡(雙氣囊)多在膠囊內視鏡定位後做治療/切片,非首選篩查。", "D": "血管攝影用於活動性大出血(可栓塞),非穩定者首選。"}, "sources": ["ACG Obscure GI Bleeding", "Harrison 21e, GI Bleeding (capsule endoscopy)"]}}, "108a-TNPA-外科-60": {"quick": "術後早期、無腹膜炎、近端小腸脹遠端扁平→術後沾黏性小腸阻塞,最適當為『鼻胃管減壓+輸液+腸道休息』保守治療,故選B。", "detail": {"background": "本例2週前大腸手術後出現腹脹、輕微廣泛痛、24小時未排氣排便、CT見『近端小腸膨脹、遠端迴腸扁平(transition point)』→『機械性小腸阻塞(術後沾黏)』。處置原則:①『生命徵象穩定、無腹膜炎、無絞扼徵象』者,先採『非手術(保守)治療』──『鼻胃管減壓、靜脈輸液與電解質矯正、腸道休息』,多數沾黏性部分阻塞可自行緩解;②若出現『絞扼/缺血徵象(發燒、心搏快、持續劇痛、反彈痛、白血球升高、乳酸升高、CT見腸壁缺血)』或保守治療失敗(常24–72小時無改善)才『手術』。故B(NG減壓+輸液+腸道休息)最適當。出院吃清流(A)會惡化;立即手術/腹腔鏡(C/D)對穩定無絞扼者過度。\\n\\n護理:記錄NG引流與排氣排便、監測腹部與生命徵象、矯正電解質;惡化(絞扼)即手術。", "options": {"A": "讓病人出院吃清流會惡化阻塞,不當。", "B": "正解:穩定無腹膜炎的術後沾黏性SBO先NG減壓+輸液+腸道休息。", "C": "診斷性腹腔鏡對穩定無絞扼者過度。", "D": "緊急剖腹探查保留給絞扼/缺血或保守失敗者。"}, "sources": ["Sabiston, Adhesive SBO management", "EAST/WSES SBO Guidelines"]}}, "112-通論-其他-64": {"quick": "腸阻塞會引發感染甚至敗血(2)、且身體診察可見蠕動波(4)→選D(2、4);腸氣『增加』非減少、沾黏阻塞早期腸音『亢進』。", "detail": {"background": "大腸癌術後一年出現腹脹腹痛嘔吐→疑『沾黏性腸阻塞(或腫瘤復發阻塞)』。判讀:①腹部X光腸阻塞會見『腸氣增加、腸袢擴張與氣液面』,而非『腸氣減少』(故1錯);②腸阻塞若進展可致腸缺血壞死、細菌移生→感染甚至『敗血症』(2正確);③『機械性(沾黏)阻塞』早期腸音『高亢活躍(hyperactive)』(克服阻塞),而非『減緩(hypoactive)』(hypoactive見於麻痺性腸阻塞或晚期)(故3錯);④身體診察在機械性阻塞可見『蠕動波(visible peristalsis)』(4正確)。故正確為2、4(選D)。\\n\\n護理:辨識阻塞徵象與並發敗血;NG減壓、輸液、影像;警覺絞扼。", "options": {"A": "1、3皆錯(腸氣應增加、機械阻塞早期腸音亢進)。", "B": "含1(腸氣減少)錯誤。", "C": "含3(腸音減緩)在機械性阻塞早期不正確。", "D": "正解:2(可致感染敗血)+4(可見蠕動波)正確。"}, "sources": ["Harrison 21e, Intestinal Obstruction", "Sabiston"]}}, "113-進階-外科-66": {"quick": "小腸腺瘤大多無症狀、單發,最常見症狀為出血與阻塞,故B正確。", "detail": {"background": "小腸腫瘤少見。小腸腺瘤(adenoma):①好發部位以『十二指腸(尤其壺腹周圍)』與近端小腸較多(故『最常見於空腸…少見於十二指腸』敘述A不正確);②『大多無症狀、單發性』,有症狀時以『出血與阻塞(可致腸套疊)』最常見(B正確);③『絨毛狀(villous)腺瘤』惡性化傾向高、體積常較大、好發十二指腸/壺腹,可致出血阻塞或膽胰管阻塞(故C『直徑相對較小、較少出血阻塞』不正確);④治療:小或有蒂者可內視鏡切除,但較大、絨毛狀、壺腹周圍或疑惡性者常需手術/壺腹切除,內視鏡切除『復發風險與安全性』與位置有關,並非與大腸黏膜切除相同(D不正確)。本題B正確。\\n\\n護理:小腸腫瘤以出血/阻塞表現,診斷靠CT/膠囊內視鏡/小腸鏡;壺腹周圍腺瘤注意惡性與膽胰管。", "options": {"A": "錯誤:小腸腺瘤好發十二指腸/近端小腸,非空腸最多。", "B": "正確(正解):多無症狀、單發,最常見症狀為出血與阻塞。", "C": "錯誤:絨毛狀腺瘤體積常較大且可致出血阻塞,惡性傾向高。", "D": "錯誤:內視鏡切除的安全性/復發與位置型態有關,非與大腸黏膜切除相同。"}, "sources": ["Sleisenger & Fordtran's, Small Intestinal Tumors", "Harrison 21e"]}}, "114-進階-內科-10": {"quick": "有剖腹產與膽囊切除手術史、腹痛嘔吐+KUB腸袢擴張氣液面→沾黏性小腸阻塞,故選A。", "detail": {"background": "本例60歲女性、『剖腹產與膽囊切除手術史』、腹痛噁心嘔吐、KUB(圖)顯示小腸阻塞影像(中央位置、多個階梯狀氣液面、環狀皺襞valvulae conniventes橫跨腸腔)→『沾黏性小腸阻塞(adhesive SBO)』──有腹部手術史者SBO最常見原因即腸沾黏。大腸阻塞影像為周邊大腸袋(haustra)擴張;缺血性大腸炎為thumbprinting+血便;小腸憩室炎少見。故A(沾黏性小腸阻塞)。處置:禁食NG減壓輸液,保守為主,絞扼/失敗才手術。\\n\\n護理:NG減壓、輸液電解質、監測絞扼徵象;有手術史者SBO首想沾黏。", "options": {"A": "正解:腹部手術史+KUB小腸氣液面→沾黏性小腸阻塞。", "B": "大腸阻塞為周邊大腸袋擴張,影像不同。", "C": "缺血性大腸炎以thumbprinting+血便為主,不符。", "D": "小腸憩室炎少見,非本例典型。"}, "sources": ["Sabiston, Adhesive SBO; KUB findings", "Harrison 21e"]}}, "105-TNPA-內科-44": {"quick": "消化道出血血行動力學:收縮壓<100 mmHg或基礎心率>100次/分即需立即快速輸液,故選B。", "detail": {"background": "急性消化道出血的『血行動力學評估』決定復甦急迫性:①靜止性低血壓『收縮壓<100 mmHg』或『心搏過速>100次/分(基礎心率)』提示已有顯著血容積喪失(約中度以上),需『立即建立大口徑靜脈通路、快速輸液(晶體)並備血』;②姿勢性變化(平躺→坐起收縮壓下降≥10–20 mmHg或心跳增>20次/分)提示中度血容積喪失;③意識改變、四肢濕冷、收縮壓<90提示嚴重出血/休克。本題以『收縮壓<100或心率>100』作為立即快速輸液的指標(B)。輸血採限制性策略(Hb約7–8,靜脈曲張出血尤然)。\\n\\n護理:大口徑IV×2、晶體快速輸注、備血/輸血、監測生命徵象與尿量,儘速止血(內視鏡)。", "options": {"A": "收縮壓<90/心率>90的數值非本題標準閾值。", "B": "正解:收縮壓<100或基礎心率>100需立即快速輸液。", "C": "<110的閾值過寬,非標準。", "D": "<120的閾值過寬,非標準。"}, "sources": ["ACG Upper GI Bleeding Guideline", "Harrison 21e, GI Bleeding resuscitation"]}}, "105-TNPA-通論-75": {"quick": "麻痺性腸阻塞腸音『減弱或消失』,『腸音亢進』不是其表徵,故選A。", "detail": {"background": "麻痺性腸阻塞(paralytic ileus)為腸蠕動功能停止(非機械性阻塞),常見於術後、腹膜炎、電解質異常(尤其低血鉀)、藥物(鴉片、抗膽鹼)、敗血、後腹腔病變。臨床:腹脹、噁心嘔吐、無排氣排便、X光見『瀰漫性大小腸與胃皆脹氣(含結腸)』;『腸音減弱或消失(hypoactive/absent)』。相對地『機械性腸阻塞』早期腸音『高亢金屬音』。故『腸音亢進』『不是』麻痺性腸阻塞的表徵(A為答案);腹脹、X光腸脹氣、噁心嘔吐皆為其表徵。\\n\\n護理:找並矯正誘因(補鉀、停鴉片、治感染)、NG減壓、輸液、促進活動;與機械性阻塞鑑別。", "options": {"A": "正解(非表徵):麻痺性腸阻塞腸音減弱/消失,非亢進。", "B": "腹部脹大是麻痺性腸阻塞的表徵。", "C": "腹部X光腸道脹氣是其表徵。", "D": "噁心嘔吐是其表徵。"}, "sources": ["Harrison 21e, Ileus", "Sabiston"]}}, "106-106a-內科-2": {"quick": "腸阻塞鼻胃管減壓超過三天,易因流失胃酸(H+、Cl-、K+)而併發『代謝性鹼中毒』,故選D。", "detail": {"background": "鼻胃管(NG)長時間抽吸會持續流失『胃液(含H+、Cl-、K+、水)』,造成:①『低氯、低鉀性代謝性鹼中毒(hypochloremic hypokalemic metabolic alkalosis)』──流失H+與Cl-使HCO3-相對增加(鹼中毒),低血容與低氯促使腎保鈉排H+/K+而維持鹼中毒(contraction alkalosis);②脫水與低血鉀。故NG長時間減壓最易併發『代謝性鹼中毒』(D)。相對地腹瀉/小腸瘻管流失腸液(富HCO3-)會致代謝性酸中毒。\\n\\n護理:NG減壓者監測電解質與酸鹼,補充氯化鉀/生理食鹽水矯正低氯低鉀性鹼中毒與脫水;記錄引流量。", "options": {"A": "呼吸性酸中毒與通氣不足有關,非NG抽吸所致。", "B": "呼吸性鹼中毒與過度換氣有關,非本例。", "C": "代謝性酸中毒多見於腹瀉/腸液流失,非胃液流失。", "D": "正解:NG長時間抽吸流失胃酸→低氯低鉀性代謝性鹼中毒。"}, "sources": ["Harrison 21e, Metabolic Alkalosis (NG suction)", "Sabiston"]}}, "106-106a-外科-50": {"quick": "老年女性、腹股溝突出物+腹脹嘔吐無排氣+KUB腸阻塞→右側股疝氣(femoral hernia)合併腸阻塞,故選B。", "detail": {"background": "股疝氣(femoral hernia)好發『老年女性』,經股管突出於腹股溝韌帶『下方內側』,因股環狹窄『嵌頓/絞扼率高』,常以『腸阻塞』表現(腹脹、嘔吐、停止排氣排便)。本例87歲女性、腹股溝突出物+腸阻塞影像(KUB腸袢擴張氣液面)→『右側股疝氣合併腸阻塞』(B)。闌尾炎破裂為右下腹腹膜炎;骨盆腔發炎+沾黏少見如此急性阻塞;升結腸腫瘤多慢性。股疝氣嵌頓為外科急症需手術。\\n\\n護理:辨識腹股溝突出物+腸阻塞→疑嵌頓性疝氣,禁食NG減壓、緊急外科;勿用力強推回(絞扼腸段)。", "options": {"A": "闌尾炎破裂為右下腹腹膜炎,非腹股溝突出物+腸阻塞。", "B": "正解:老年女性腹股溝突出物+腸阻塞→股疝氣合併腸阻塞。", "C": "骨盆腔發炎合併沾黏較少如此急性表現。", "D": "升結腸腫瘤多慢性、以貧血/腫塊為主,非急性腹股溝突出。"}, "sources": ["Sabiston, Femoral Hernia (high incarceration)", "Harrison 21e"]}}, "106-106a-內科-61": {"quick": "大腸激躁症(IBS)特徵為『至少3個月』的腹痛與排便習慣改變,故選C。", "detail": {"background": "大腸激躁症(IBS)為功能性腸道疾病,以Rome準則診斷:近3個月內反覆腹痛(平均每週至少1天),合併與排便相關、排便頻率改變、糞便外觀改變中≥2項,且症狀『至少持續約3個月(症狀發作≥6個月前開始)』。故IBS強調『慢性(約3個月以上)』的腹痛與排便習慣改變(C)。需先排除警示症狀(出血、體重減輕、貧血、發病年齡大、夜間症狀)與器質性疾病。\\n\\n護理:衛教良性慢性、飲食(低FODMAP)、壓力管理、依亞型用藥;追蹤警示症狀。", "options": {"A": "至少1個月不符IBS的慢性病程定義。", "B": "至少2個月不符。", "C": "正解:IBS特徵為至少3個月的腹痛與排便習慣改變。", "D": "至少4個月非標準表述。"}, "sources": ["Rome IV Criteria for IBS", "Harrison 21e, IBS"]}}, "107-TNPA-外科-43": {"quick": "懷孕期闌尾炎因診斷困難,『陰性闌尾切除率』顯著高於非孕婦,故C正確。", "detail": {"background": "懷孕期闌尾炎:①是孕期『最常見的非產科外科急症』;②隨子宮增大,闌尾位置上移,疼痛點可能上移至右中/上腹,加上孕期生理性白血球升高、噁心嘔吐常見,使『診斷困難』,因此為避免延誤(延誤致破裂、母胎風險),臨床門檻較低,導致『陰性闌尾切除率(切除後病理非闌尾炎)顯著高於非孕婦』(C正確);③孕期闌尾穿孔率較高(因延誤);④影像:超音波為首選(無輻射),『MRI』可用於孕婦(不用游離輻射),helical CT並非絕對禁忌但因輻射多保留;故D(CT不適用孕婦)過於絕對。手術(腹腔鏡/開腹)仍是治療;母胎風險與妊娠期別有關。本題C正確。\\n\\n護理:孕婦右側腹痛警覺非典型闌尾炎,優先超音波/MRI;及時手術以降低穿孔與早產風險。", "options": {"A": "孕期闌尾炎疼痛點可能上移、症狀不典型,『右腹外側典型症狀』描述不夠正確。", "B": "妊娠期別與早產/手術風險關係的此敘述不正確。", "C": "正確(正解):因診斷困難,孕婦陰性闌尾切除率顯著較高。", "D": "影像可用超音波/MRI;CT非絕對不適用(此敘述過於絕對)。"}, "sources": ["Williams Obstetrics, Appendicitis in Pregnancy", "ACOG; Harrison 21e"]}}, "107-TNPA-內科-57": {"quick": "IBS的腹痛與排便習慣改變特徵應持續『至少3個月』,故選C。", "detail": {"background": "(與106-106a-內科-61同概念)IBS依Rome準則為慢性功能性腸道疾病:近3個月反覆腹痛合併排便相關/頻率/外觀改變≥2項,症狀『至少持續約3個月』(發病≥6個月)。強調慢性病程與排除警示症狀。故選『3個月』(C)。\\n\\n護理:衛教慢性良性、飲食與壓力管理、依亞型治療、追蹤警示症狀。", "options": {"A": "1個月不符IBS慢性定義。", "B": "2個月不符。", "C": "正解:IBS症狀應持續至少3個月。", "D": "2星期過短,不符。"}, "sources": ["Rome IV Criteria for IBS", "Harrison 21e, IBS"]}}, "108b-TNPA-外科-35": {"quick": "腸阻塞聽診腸音『增加且音調高(高亢金屬音)』,故A正確。", "detail": {"background": "(機械性)腸阻塞要點:①早期腸道強力蠕動克服阻塞→聽診『腸音增加且音調高(high-pitched/tinkling)』(A正確);②嘔吐特徵與阻塞『部位』有關:『高位(近端小腸)』阻塞早期即大量『膽汁性嘔吐』;『低位(遠端/大腸)』阻塞嘔吐較晚且可呈『糞臭樣』──故B『大腸阻塞常嘔吐且無膽汁』不正確(大腸阻塞嘔吐較晚);③『幽門阻塞(胃出口阻塞)』會有大量『無膽汁』的嘔吐(嘔吐頻繁),故C『幽門阻塞少有嘔吐』不正確;④腸阻塞因無法排便排氣多為『便祕/阻塞性』(D『常便祕而非腹瀉』本身大致對,但本題以A為正確答案,因A最直接正確)。本題正解A(腸音增加且音調高)。\\n\\n護理:辨識高亢腸音與阻塞部位(嘔吐型態);NG減壓、輸液、影像。", "options": {"A": "正解:腸阻塞聽診腸音增加且音調高(高亢金屬音)。", "B": "大腸阻塞嘔吐較晚出現,非『常嘔吐』,敘述不正確。", "C": "幽門阻塞會頻繁大量無膽汁嘔吐,非少有嘔吐。", "D": "腸阻塞多為阻塞性便祕,但本題以A為最正確答案。"}, "sources": ["Harrison 21e, Intestinal Obstruction", "Sabiston"]}}, "108a-TNPA-通論-61": {"quick": "懷疑闌尾炎的徵象多在右側,唯『Rovsing徵象』施作在『左下腹』(壓左下腹引發右下腹痛),故選A。", "detail": {"background": "闌尾炎理學徵象多在右側(與闌尾同側):McBurney點壓痛(右下腹)、腰大肌徵象(psoas,右髖伸展引痛)、閉孔肌徵象(obturator,右髖內旋引痛)。唯『Rovsing徵象』是『按壓左下腹』卻引發『右下腹』疼痛(腹膜刺激轉移),施作部位在『左側』(A)。掌握Rovsing=壓對側(左)引同側(右)痛。\\n\\n護理:綜合McBurney、Rovsing、psoas、obturator徵象與發炎指標、影像評估闌尾炎。", "options": {"A": "正解:Rovsing徵象施作在左下腹(壓左引右下腹痛)。", "B": "Psoas sign施作在右側(右髖伸展)。", "C": "Obturator sign施作在右側(右髖內旋)。", "D": "McBurney點壓痛在右下腹。"}, "sources": ["Bates' Guide, Appendicitis signs", "Harrison 21e"]}}, "108a-TNPA-外科-67": {"quick": "麻痺性腸阻塞腸音減弱/消失,『腸音亢進』不是其表徵,故選C。", "detail": {"background": "(與105-TNPA-通論-75同概念)麻痺性腸阻塞(ileus)腸蠕動停止→腹脹、噁心嘔吐、X光腸道脹氣、『腸音減弱或消失』。『腸音亢進(高亢)』是『機械性』腸阻塞早期的表徵,並非麻痺性腸阻塞。故『腸音亢進』非麻痺性腸阻塞表徵(C為答案)。\\n\\n護理:矯正誘因(低鉀、鴉片、術後、感染)、NG減壓、輸液、促活動;與機械性阻塞鑑別。", "options": {"A": "腹部X光腸道脹氣是麻痺性腸阻塞表徵。", "B": "腹部脹大是其表徵。", "C": "正解(非表徵):腸音亢進屬機械性阻塞,非麻痺性腸阻塞。", "D": "噁心嘔吐是其表徵。"}, "sources": ["Harrison 21e, Ileus", "Sabiston"]}}, "108b-TNPA-外科-75": {"quick": "急性消化道出血病人主要死因是『復甦不足導致多重器官衰竭』,故A正確。", "detail": {"background": "急性消化道出血的預後與『復甦是否足夠』密切相關:①主要死因常為『出血/低灌流導致的多重器官衰竭(尤其合併共病、復甦不足者)』──故A正確;②休克程度與失血量:收縮壓<90+四肢冰冷+意識改變約代表失血≥40%(class IV),而非『50%』;姿勢性變化(臥→坐血壓下降/心跳上升)約代表中度失血(class II,~15–30%),『10mmHg/20bpm≈30%』的精確配對不可靠;③『血比容(hematocrit)在急性出血初期『不能準確反映失血量』』──因急性失血時血漿與紅血球等比例流失,Hct要待體液回填/輸液後才下降,故急性期Hct對失血量評估『價值有限』(D錯誤)。本題A正確。\\n\\n護理:及早充分復甦(大口徑IV、輸液輸血)、監測灌流(尿量、乳酸、意識)、儘速止血,以降低器官衰竭死亡。", "options": {"A": "正解:主要死因為復甦不足引起的多重器官衰竭。", "B": "意識改變+SBP<90+四肢冰冷約代表失血≥40%,非50%的精確值。", "C": "姿勢性變化的失血量精確配對(30%)不可靠。", "D": "錯誤:急性期Hct不能準確反映失血量(需時間/輸液後才下降)。"}, "sources": ["ACG Upper GI Bleeding", "Harrison 21e, GI Bleeding"]}}, "109-通論-其他-25": {"quick": "急性消化道出血初期,『Hct<35%』不適合評估出血嚴重度(急性期Hct尚未反映失血),故選B。", "detail": {"background": "評估急性消化道出血『嚴重度』的可靠指標是『血行動力學』:①意識改變(遲鈍/躁動)反映灌流不足;③平躺收縮壓<90+四肢濕冷=休克;④姿勢性低血壓(臥→坐血壓下降≥10或心跳>20次/分)反映中度血容積喪失。這些都『即時』反映失血。而『血比容(Hct)』在『急性出血初期不可靠』──急性失血時紅血球與血漿等比例流失,Hct要等體液回填或輸液稀釋後(數小時至1–2天)才下降,故『初期Hct<35%』不適合用來評估出血嚴重度(B為答案)。\\n\\n護理:以血行動力評估嚴重度與復甦;Hct連續追蹤判斷趨勢,勿用單次初期Hct判定失血量。", "options": {"A": "意識遲鈍/躁動反映灌流不足,適合評估嚴重度。", "B": "正解(不適合):急性初期Hct尚未反映失血,不適合評估嚴重度。", "C": "平躺SBP<90+四肢濕冷反映休克,適合評估。", "D": "姿勢性低血壓反映中度血容積喪失,適合評估。"}, "sources": ["ACG GI Bleeding", "Harrison 21e"]}}, "109-進階-其他-59": {"quick": "Buscopan(抗膽鹼藥)禁忌為青光眼、腸阻塞/麻痺、攝護腺肥大、重症肌無力等;『紅斑性狼瘡』非禁忌,故選C。", "detail": {"background": "Buscopan(hyoscine butylbromide/丁基東莨菪鹼)為『抗膽鹼(antimuscarinic)』解痙劑,常於內視鏡時減少腸蠕動。其抗膽鹼作用的『禁忌症』包括:①『窄角性青光眼』(瞳孔散大升高眼壓);②『腸道麻痺/阻塞性腸病(paralytic ileus、機械性腸阻塞)』(抑制蠕動會惡化);③『攝護腺肥大/尿瀦留』(抗膽鹼致排尿困難);④重症肌無力、心搏過速/嚴重心臟病等。『紅斑性狼瘡(SLE)』『不是』Buscopan的禁忌症(選C)。\\n\\n護理:給Buscopan前評估青光眼、攝護腺肥大、腸阻塞、心律;觀察口乾、視力模糊、心搏過速、尿瀦留等抗膽鹼副作用。", "options": {"A": "青光眼是Buscopan禁忌(抗膽鹼升眼壓)。", "B": "腸阻塞是Buscopan禁忌(抑制蠕動惡化)。", "C": "正解(非禁忌):紅斑性狼瘡不是Buscopan的禁忌症。", "D": "攝護腺肥大是Buscopan禁忌(致尿瀦留)。"}, "sources": ["Hyoscine butylbromide prescribing information", "ASGE Endoscopy premedication"]}}, "110-進階-婦產科-80": {"quick": "孕婦罹患闌尾炎時因診斷延誤,『比一般成人更易發生闌尾破裂』,故選D。", "detail": {"background": "妊娠期闌尾炎:①是孕期『最常見的非產科外科急症』(『第二常見手術』之說不正確,闌尾切除常居首);②孕婦闌尾炎『發生率與一般婦女相近』(非較高);③因子宮增大使闌尾移位、症狀不典型、生理性白血球升高,『診斷常延誤』,導致『闌尾破裂/穿孔率較高』(D正確);④治療仍以手術(腹腔鏡/開腹)為主,並非『一律抗生素治療』(孕婦闌尾炎延遲手術會增加母胎風險)。本題D正確。\\n\\n護理:孕婦右側腹痛(可能上移)警覺闌尾炎,優先超音波/MRI,及時手術降低穿孔與早產。", "options": {"A": "錯誤:妊娠闌尾炎以手術為主,非一律抗生素治療。", "B": "錯誤:孕婦闌尾炎發生率與一般婦女相近,非較高。", "C": "孕期最常見外科手術為闌尾切除,『第二常見』敘述不正確。", "D": "正解:孕婦因診斷延誤,較一般成人更易發生闌尾破裂。"}, "sources": ["Williams Obstetrics, Appendicitis in Pregnancy", "ACOG"]}}, "111-進階-外科-33": {"quick": "闌尾切除術需涵蓋腸內革蘭氏陰性菌與厭氧菌,兼顧經濟效益首選『cefoxitin』,故選B。", "detail": {"background": "闌尾炎/闌尾切除的圍術期抗生素須涵蓋『腸內革蘭氏陰性菌與厭氧菌(尤其Bacteroides fragilis)』。單一藥物兼具此涵蓋且具經濟效益者為『第二代頭孢黴素cefoxitin(具抗厭氧活性)』(或cefotetan、ampicillin-sulbactam、ertapenem;或cefazolin+metronidazole組合)。cefazolin(第一代)厭氧涵蓋不足,需另加metronidazole;單用metronidazole缺革蘭氏陰性涵蓋;vancomycin針對革蘭氏陽性/MRSA,不適合腸道手術。故兼顧涵蓋與經濟效益選cefoxitin(B)。單純(非穿孔)闌尾炎術後通常不需長期抗生素;穿孔/複雜性則延長療程。\\n\\n護理:劃刀前給藥、選對涵蓋菌譜藥物;單純闌尾炎術後不需長療程。", "options": {"A": "cefazolin(第一代)厭氧涵蓋不足,需加metronidazole。", "B": "正解:cefoxitin涵蓋腸內G(−)與厭氧菌且具經濟效益。", "C": "單用metronidazole缺乏革蘭氏陰性涵蓋。", "D": "vancomycin針對G(+)/MRSA,不適合腸道手術預防。"}, "sources": ["ASHP Surgical Antimicrobial Prophylaxis", "Sabiston, Appendicitis"]}}, "111-通論-5分科-64": {"quick": "腰大肌徵象(psoas sign)陽性(伸展右髖引發腹痛)表示『發炎的闌尾刺激腰大肌』,故選B。", "detail": {"background": "腰大肌徵象(psoas sign):檢查時讓病人『右側臥、被動伸展右髖(或主動屈髖抗阻)』以拉緊/收縮腰大肌,若引發右下腹痛即陽性,表示『發炎的闌尾(常為盲腸後位retrocecal)刺激鄰近的腰大肌』(B正確)。要點:①檢查是『伸展髖關節(拉緊腰大肌)』,非屈曲90度(A錯);②陽性提示闌尾位於『盲腸後位(腰大肌附近)』而非前方(C錯);③psoas徵象陰性『不能排除』闌尾炎(敏感度有限)(D錯)。本題B正確。\\n\\n護理:綜合McBurney、Rovsing、psoas、obturator徵象與發炎指標/影像評估闌尾炎;陰性不可排除。", "options": {"A": "檢查是伸展髖關節拉緊腰大肌,非屈曲90度。", "B": "正解:陽性表示發炎闌尾刺激腰大肌(常盲腸後位)。", "C": "陽性提示闌尾位於盲腸後位,非前方。", "D": "psoas徵象陰性不能排除闌尾炎。"}, "sources": ["Bates' Guide, Psoas sign", "Harrison 21e, Appendicitis"]}}, "112-進階-外科-40": {"quick": "電解質不平衡引起術後腸阻塞(ileus)最常見的是『低血鉀(hypokalemia)』,故選A。", "detail": {"background": "術後麻痺性腸阻塞(postoperative ileus)的常見誘因包括手術操作、鴉片類止痛、發炎與『電解質異常』,其中『低血鉀(hypokalemia)』最具代表性──鉀離子對腸道平滑肌收縮與神經肌肉傳導至關重要,低血鉀使腸道蠕動低下而致ileus(低血鈣、低血鎂也會)。故矯正低血鉀是處理術後ileus的重要一環。高血鉀、低/高血鈉非典型致ileus的主因。本題A(低血鉀)正確。\\n\\n護理:術後監測並補充鉀(及鎂、鈣)、減少鴉片、早期活動、NG減壓以預防/處理ileus。", "options": {"A": "正解:低血鉀使腸道蠕動低下,是術後ileus常見電解質原因。", "B": "高血鉀非典型致ileus原因。", "C": "低血鈉非ileus的主要電解質原因。", "D": "高血鈉非ileus的主要電解質原因。"}, "sources": ["Harrison 21e, Ileus (hypokalemia)", "Sabiston, Postoperative Ileus"]}}, "112-進階-內科-43": {"quick": "McBurney點壓痛+肌肉緊繃+Rovsing徵象+白血球顯著升高、尿檢正常→急性闌尾炎,故選A。", "detail": {"background": "急性闌尾炎典型:轉移性右下腹痛(臍周→右下腹)、噁心嘔吐、發燒、『McBurney點壓痛』、肌肉緊繃(guarding)、『Rovsing徵象(壓左下腹引右下腹痛)』、白血球升高(常合併核左移)、尿檢多正常(可排除泌尿道)。本例60歲女性具上述典型徵象、WBC 24800、尿檢無特殊→急性闌尾炎(A)。克隆氏為慢性病程;急性子宮內膜炎多有婦科症狀/分泌物;腎絞痛為腰腹絞痛+血尿+CVA敲痛(本例尿檢正常)。診斷可加CT/超音波;治療為闌尾切除(±抗生素)。\\n\\n護理:評估轉移性右下腹痛與闌尾徵象、發炎指標、影像;禁食、輸液、止痛、外科會診。", "options": {"A": "正解:McBurney壓痛+Rovsing+白血球升高+尿正常→急性闌尾炎。", "B": "克隆氏為慢性病程,非急性右下腹徵象,不符。", "C": "急性子宮內膜炎多有婦科分泌物/病史,不符。", "D": "腎絞痛為腰腹絞痛+血尿+CVA敲痛,本例尿檢正常,不符。"}, "sources": ["Harrison 21e, Acute Appendicitis", "ASCRS/EAST Appendicitis"]}}, "112-通論-其他-63": {"quick": "Rovsing sign是觸壓『左』下腹引發『右』下腹痛(非左下腹痛),故B敘述錯誤。", "detail": {"background": "本例25歲女性右下腹痛3天+反彈痛+白血球升高(neutrophil 83%)→疑急性闌尾炎。各敘述:①闌尾炎最有可能,但須鑑別大腸憩室炎、子宮外孕等(A正確);②『Rovsing sign』是『按壓左下腹』而引發『右下腹』疼痛為陽性(腹膜刺激轉移),『不是左下腹痛』──故B敘述錯誤(為答案);③Psoas sign陽性表示發炎闌尾在盲腸後方(腰大肌附近)(C正確);④McBurney點位於『肚臍與右髂前上棘連線的外1/3處』(C/D描述位置正確)。本題B錯誤。\\n\\n護理:正確理解Rovsing(壓左引右)、psoas、McBurney定位;鑑別婦科與憩室炎。", "options": {"A": "正確:闌尾炎最可能,但須鑑別憩室炎、子宮外孕等。", "B": "錯誤(正解):Rovsing是壓左下腹引發『右』下腹痛,非左下腹痛陽性。", "C": "正確:Psoas sign陽性提示闌尾在盲腸後方。", "D": "正確:McBurney點位於臍與右髂前上棘連線外1/3處。"}, "sources": ["Bates' Guide, Appendicitis signs", "Harrison 21e"]}}, "113-進階-內科-13": {"quick": "平躺與左側躺腹部X光顯示『腹腔積氣(free air)』→中空臟器破裂(穿孔),故選C。", "detail": {"background": "本例80歲多病、急性腹痛,平躺與『左側躺(left lateral decubitus)』腹部X光──左側躺可使游離氣體上浮聚集於『肝臟外側緣與右腹壁之間』,顯示『腹腔游離氣體(free air/pneumoperitoneum)』,代表『腹腔內中空臟器破裂(穿孔)』(如消化性潰瘍穿孔、憩室/腫瘤穿孔)(C正確)。腹腔積水(A)為液體非氣體;腸阻塞(B)為腸袢擴張氣液面而非游離氣體;正常(D)不符急性腹痛+游離氣體。穿孔為外科急症。\\n\\n護理:見游離氣體疑穿孔→禁食、NG減壓、輸液抗生素、止痛,緊急外科;無法站立者用左側躺片偵測游離氣體。", "options": {"A": "腹腔積水為液體影像,非游離氣體。", "B": "腸阻塞為腸袢擴張與氣液面,非腹腔游離氣體。", "C": "正解:腹腔游離氣體→中空臟器破裂(穿孔)。", "D": "急性腹痛+游離氣體非正常影像。"}, "sources": ["放射診斷:Pneumoperitoneum (decubitus view)", "Harrison 21e, Acute Abdomen"]}}, "113-進階-外科-34": {"quick": "急性闌尾炎影像:MRI敏感度特異度高、用於『孕婦』且不需顯影劑,故D正確。", "detail": {"background": "急性闌尾炎影像:①腹部X光對闌尾炎『非常規』,鈣化糞石(fecalith)僅少數可見(故A『常可見』不正確);②氣腹(pneumoperitoneum)在闌尾炎『不常見』──闌尾穿孔多為局部封閉性,游離氣體少見(故B『見到氣腹通常表示闌尾破裂』不正確,闌尾破裂未必有游離氣體);③『靜脈+腸內顯影劑CT』敏感度與特異度確實高(C其實正確),為成人首選;④『MRI』敏感度特異度高、『用於孕婦且可不用游離輻射/顯影劑(平掃即可)』(D正確)。本題標準答案為D(MRI於孕婦不用顯影劑)。CT(C)雖也對,但題目以D為最正確/標準答案。\\n\\n護理:成人疑闌尾炎用CT,孕婦/兒童優先超音波或MRI(避輻射)。", "options": {"A": "錯誤:X光僅少數可見糞石,非『常可見』。", "B": "錯誤:闌尾穿孔多為局部封閉,游離氣體不常見。", "C": "CT(靜脈+腸內顯影)敏感特異度高(本身正確),但本題以D為標準答案。", "D": "正解:MRI敏感特異度高,用於孕婦且可不用顯影劑。"}, "sources": ["ACR Appropriateness Criteria: Appendicitis", "Harrison 21e"]}}, "113-進階-家庭-37": {"quick": "解黑便(疑上消化道出血)評估,『鼻胃管置入灌洗』為最不適當/最非必要的處置,故選D。", "detail": {"background": "本例68歲、腹痛倦怠+『解黑便(melena,疑上消化道出血)』。合理評估與處置:①全血球計數(看貧血)、糞便潛血/尿液檢查(A適當);②腹部X光(評估穿孔/阻塞)(B尚可);③『腸胃道內視鏡』──黑便評估的核心,確診出血源並可內視鏡止血(C適當且重要);④『鼻胃管置入灌洗(NG lavage)』──過去用於評估上消化道出血,但其診斷價值有限(陰性不能排除、陽性也不改變需內視鏡的決策),現已『不建議常規施行』,屬『最不適當/最非必要』(D為答案)。本題以D為最不適當。\\n\\n護理:黑便者評估血行動力、安排內視鏡、給PPI;NG灌洗非必要,以內視鏡為診治核心。", "options": {"A": "全血球、糞便、尿液檢查為合理基本評估。", "B": "腹部X光評估穿孔/阻塞,尚屬合理。", "C": "腸胃道內視鏡是黑便評估與止血的核心,適當。", "D": "最不適當(正解):NG灌洗診斷價值有限,不建議常規施行。"}, "sources": ["ACG Upper GI Bleeding (NG lavage not recommended)", "Harrison 21e"]}}, "113-通論-家庭-47": {"quick": "腰大肌徵象『陰性不能排除』急性闌尾炎,故A敘述錯誤。", "detail": {"background": "腰大肌徵象(psoas sign):請病人側躺,於髖關節處『伸展(外展並伸展)』以拉緊腰大肌,若誘發疼痛即陽性,代表發炎的闌尾/腰大肌膿瘍等刺激腰大肌(B、C、D正確)。但此徵象『敏感度有限』,『陰性不能排除急性闌尾炎』(尤其闌尾非盲腸後位時psoas可陰性)──故A『陰性可排除闌尾炎』錯誤(為答案)。診斷需綜合病史、多項理學徵象、發炎指標與影像。\\n\\n護理:psoas徵象僅為輔助,陰性不可排除闌尾炎;綜合評估。", "options": {"A": "錯誤(正解):psoas徵象陰性不能排除急性闌尾炎(敏感度有限)。", "B": "正確:側躺伸展髖關節拉緊腰大肌以檢查。", "C": "正確:誘發疼痛代表腰大肌受鄰近發炎組織/液體刺激。", "D": "正確:急性闌尾炎、腰大肌膿瘍等可出現陽性。"}, "sources": ["Bates' Guide, Psoas sign", "Harrison 21e"]}}, "113-通論-5分科-51": {"quick": "裡急後重(tenesmus)除直腸本身疾病外,『下段輸尿管結石』刺激鄰近直腸也可誘發,故D正確。", "detail": {"background": "裡急後重(tenesmus):指『持續且痛苦的便意感,即使排空仍覺需排便、伴肛門墜脹』,多因『直腸/乙狀結腸發炎或病灶』刺激(直腸炎、感染性結腸炎、潰瘍性結腸炎、直腸腫瘤、膿瘍)。要點:①它『不是』無法控制的失禁(A錯,那是失禁);②與『蠕動反射』無直接關係(B錯);③也非『胃結腸反射(gastrocolic reflex)』(C錯,那是進食後結腸蠕動增加);④『直腸鄰近構造的病灶(如下段輸尿管結石、骨盆腔膿瘍、子宮內膜異位)』刺激直腸也可誘發裡急後重(D正確)。本題D正確。\\n\\n護理:裡急後重要查直腸/乙狀結腸病灶(發炎、感染、腫瘤),亦考慮鄰近骨盆病灶。", "options": {"A": "失禁是無法控制排便,非裡急後重的定義。", "B": "裡急後重與蠕動反射無直接關係。", "C": "胃結腸反射是進食誘發結腸蠕動,非裡急後重定義。", "D": "正解:下段輸尿管結石刺激鄰近直腸也可誘發裡急後重。"}, "sources": ["Harrison 21e, Tenesmus / Anorectal symptoms", "Sleisenger & Fordtran's"]}}, "113-通論-5分科-53": {"quick": "鑑別急性闌尾炎與急性憩室炎,最適當的檢查是『電腦斷層(CT)』,故選D。", "detail": {"background": "右下腹痛+發燒要鑑別『急性闌尾炎』與『急性憩室炎(右側憩室在亞洲不少)』時,『電腦斷層(CT,靜脈±腸內顯影)』是最適當的檢查──敏感度與特異度高,可同時顯示闌尾(腫脹、糞石、周圍發炎)與憩室(腸壁增厚、憩室、周圍脂肪發炎、膿瘍),並評估併發症(穿孔、膿瘍)。大腸鏡在急性發炎期『不宜』(穿孔風險);抽血生物標記(發炎指標)不具鑑別特異性;超音波對闌尾有用(尤其兒童/孕婦)但對整體鑑別與併發症評估不如CT。故選CT(D)。\\n\\n護理:急性右下腹痛鑑別以CT(孕婦/兒童考慮超音波/MRI);急性期勿做大腸鏡。", "options": {"A": "大腸鏡在急性發炎期不宜(穿孔風險),不適當。", "B": "抽血生物標記不具闌尾vs憩室的鑑別特異性。", "C": "超音波有用但鑑別與併發症評估不如CT。", "D": "正解:電腦斷層最適合鑑別闌尾炎與憩室炎並評估併發症。"}, "sources": ["ACR Appropriateness Criteria", "Harrison 21e"]}}, "113-通論-5分科-67": {"quick": "Rovsing sign是『按壓左下腹引發右下腹疼痛』,故C正確。", "detail": {"background": "急性闌尾炎理學徵象正確描述:①McBurney點壓痛位於『臍與右髂前上棘連線的外1/3處』(非『下2/3』,故A不正確);②psoas sign是『伸展(或屈曲抗阻)右髖』拉緊腰大肌引痛(非『大腿內翻』,故B不正確);③『Rovsing sign』=『按壓左下腹引發右下腹疼痛』(腹膜刺激轉移)(C正確);④『肌肉僵硬(guarding)/腹膜炎徵象』提示腹膜刺激/可能穿孔,『需積極處置(可能手術)』而非『暫不需手術』(D不正確)。本題C正確。\\n\\n護理:正確操作與解讀闌尾徵象;有腹膜炎徵象提示嚴重/穿孔需外科。", "options": {"A": "McBurney點在臍與右髂前上棘連線外1/3處,敘述不正確。", "B": "psoas sign是伸展右髖拉緊腰大肌,非大腿內翻。", "C": "正解:Rovsing sign為按壓左下腹引發右下腹疼痛。", "D": "肌肉僵硬提示腹膜刺激,需積極處置,非暫不需手術。"}, "sources": ["Bates' Guide, Appendicitis signs", "Harrison 21e"]}}, "113-通論-5分科-69": {"quick": "機械性腸阻塞:腸音高亢活躍(1)、明顯腹膜炎提示絞扼性阻塞(4)→選C(1、4)。", "detail": {"background": "機械性腸阻塞(mechanical ileus)病徵:①早期腸道強力蠕動克服阻塞→『高頻(high-pitched)、活躍(hyperactive)腸音』(1正確);②『腹部手術後常見的腸蠕動停止』是『麻痺性(術後)ileus』而非機械性(機械性多因沾黏、疝氣、腫瘤),故『2(術後常見現象)』描述偏麻痺性,不算機械性病徵;③腸阻塞若進展致腸壞死、細菌移生→敗血並非『罕見』(3錯,敗血是重要併發症);④若出現『明顯腹膜炎』表示可能已『絞扼(strangulation)/腸壞死』(4正確)。故正確為1、4(選C)。\\n\\n護理:辨識高亢腸音(機械性)與腹膜炎(絞扼警訊);NG減壓、輸液、影像;絞扼需緊急手術。", "options": {"A": "1、2:2(術後常見)偏麻痺性,非機械性病徵。", "B": "3、4:3(敗血罕見)錯誤。", "C": "正解:1(高亢活躍腸音)+4(腹膜炎提示絞扼)正確。", "D": "2、3皆不正確。"}, "sources": ["Harrison 21e, Intestinal Obstruction", "Sabiston"]}}, "113-通論-5分科-75": {"quick": "鑑別急腹症時,『鞏膜沒有黃疸』這一陰性發現對縮小診斷最沒有幫助,故選B。", "detail": {"background": "本題承上情境(急性腹痛鑑別,疑出血性胰臟炎/腹腔出血等)。要『進一步鑑別』時,有鑑別價值的『陽性/特定』發現包括:①『發燒』(提示感染/發炎,如膽道/憩室/闌尾炎)(A有幫助);③『腰側透納氏徵候(Grey-Turner sign)』(提示後腹腔出血/出血性胰臟炎)(C有幫助);④『腰大肌徵候陽性』(提示闌尾/腰大肌相關發炎)(D有幫助)。而『鞏膜「沒有」黃疸』是一個『陰性』且非特異的發現──多數急腹症本就無黃疸,此陰性結果對縮小鑑別『最沒有幫助』(B為答案)。\\n\\n護理:鑑別急腹症時優先找具特異性的陽性徵象(發燒、特定徵候),非特異的陰性發現幫助有限。", "options": {"A": "發燒提示感染/發炎,有鑑別幫助。", "B": "正解(最沒幫助):『鞏膜無黃疸』為非特異陰性發現,對鑑別幫助最小。", "C": "Grey-Turner徵候提示後腹腔出血,有幫助。", "D": "腰大肌徵候陽性提示局部發炎,有幫助。"}, "sources": ["Harrison 21e, Acute Abdomen evaluation", "Bates' Guide"]}}, "114-進階-內科-1": {"quick": "腸道營養原則:鼻胃管錯位(插入氣管)常見於昏迷病人(3)、長期管灌可放胃造瘻(4)→選C(3、4)。", "detail": {"background": "腸道營養(enteral nutrition)一般原則:①『腸道有功能時,腸道營養應優先於靜脈(腸外)營養』(維持腸黏膜屏障、減少感染與成本)──故『1(靜脈營養優先)』錯誤;②管灌『腹瀉』時的處理是『減慢速度、調整配方(等滲、可加纖維)、找原因(感染如C. difficile、藥物)』,而非一律用止瀉藥並『減少纖維』(可溶性纖維反而可能有助),故『2』敘述不恰當;③『鼻胃管放置錯位(誤入氣管/支氣管)』『常見於昏迷/意識不清、咳嗽反射差的病人』,放置後須確認位置(X光)(3正確);④『長期(>4週)管灌需求者建議放置胃造瘻(PEG)』(4正確)。故正確為3、4(選C)。\\n\\n護理:腸道營養優先;確認管路位置(尤其昏迷者);腹瀉時調整速率/配方找原因;長期管灌評估PEG。", "options": {"A": "1、2皆不恰當(腸道營養應優先;腹瀉處理非一律止瀉減纖維)。", "B": "含2(腹瀉處理)不恰當。", "C": "正解:3(昏迷者易管路錯位)+4(長期管灌放PEG)正確。", "D": "含1(靜脈營養優先)錯誤。"}, "sources": ["ASPEN Enteral Nutrition Guidelines", "Harrison 21e, Enteral and Parenteral Nutrition"]}}, "114-通論-5分科-55": {"quick": "急性闌尾炎最痛壓痛點位於『麥克伯尼點(McBurney point)或其附近』,故選C。", "detail": {"background": "急性闌尾炎:①常以『食慾不振(anorexia)』為早期症狀(幾乎都有),故A『不常發生』錯誤;②大多數病人按壓右下腹『會』出現壓痛(故B『不到50%出現壓痛』錯誤);③最痛壓痛點位於『McBurney點(臍與右髂前上棘連線外1/3處)或其附近』(C正確);④psoas徵象敏感度有限(陰性不能排除),『非敏感度最高』的檢查項目(故D錯誤)。診斷靠病史(轉移性右下腹痛)、理學、發炎指標與影像(CT/超音波)。本題C正確。\\n\\n護理:辨識轉移性右下腹痛與McBurney壓痛;綜合評估,陰性徵象不可排除。", "options": {"A": "錯誤:食慾不振是闌尾炎常見早期症狀。", "B": "錯誤:大多數病人按壓右下腹會有壓痛。", "C": "正解:最痛壓痛點位於McBurney點或附近。", "D": "錯誤:psoas徵象敏感度有限,非敏感度最高的項目。"}, "sources": ["Harrison 21e, Acute Appendicitis", "Bates' Guide"]}}, "114-進階-婦產科-76": {"quick": "卵巢癌『多處』腸阻塞時,做多處切除的併發症高且效益差,『切除多處比腸造口適合』敘述最不適當,故選C。", "detail": {"background": "晚期卵巢癌常因腹膜廣泛轉移造成『惡性腸阻塞(malignant bowel obstruction)』:①常為『多處(multilevel)』阻塞(A正確);②若為『單一』部位阻塞,可考慮手術『切除或繞道(bypass)』(B正確);③若為『多處』阻塞,『廣泛切除多處病灶』的併發症高、效益有限,通常『不適合』──改採『腸造口(減壓造口/胃造瘻venting)』或保守(NG減壓、藥物如octreotide/止吐/類固醇、安寧緩和)較適當,故C『多處阻塞切除多處比腸造口適合』『最不適當』(為答案);④此類病人手術重大併發症率高(可達約30%)(D正確)。本題C最不適當。\\n\\n護理:惡性腸阻塞多以症狀緩解為主(減壓、藥物、造口),謹慎評估手術效益;整合安寧緩和。", "options": {"A": "正確:卵巢癌常見多處腸阻塞。", "B": "正確:單一處阻塞可考慮切除或繞道手術。", "C": "最不適當(正解):多處阻塞做多處切除併發症高效益差,造口/保守較適合。", "D": "正確:此類病人手術重大併發症率高(約30%)。"}, "sources": ["Malignant Bowel Obstruction management (palliative)", "NCCN Ovarian Cancer; Harrison 21e"]}}}, L={"食道疾病": {"title": "食道疾病", "html": "<p><b>核心概念：</b>食道疾病以胃食道逆流(GERD)最常見，與食道癌(鱗狀細胞癌SCC vs 腺癌)為兩大考點；掌握逆流→Barrett食道→腺癌序列、吞嚥困難的鑑別與警示症狀、以及食道癌分期與手術併發症。</p><ul><li><b>GERD：</b>典型為火燒心、酸逆流、可伴非心因性胸痛(先排除心臟病)；食道外症狀有慢性咳嗽、喉炎、氣喘。危險因子＝肥胖、懷孕、食道裂孔疝氣(升腹壓/破壞下食道括約肌LES)；<b>高血壓與GERD無直接關聯</b>。生活型態(減重、抬高床頭、睡前2-3小時不進食、<b>低脂</b>、戒菸酒)＋PPI為主。</li><li><b>Barrett食道：</b>長期GERD使下段鱗狀上皮被腸化柱狀上皮取代，為癌前病變，進展為<b>食道腺癌(非鱗狀癌)</b>，高危者定期內視鏡監測。</li><li><b>食道癌兩型：</b>SCC好發上中段，危險因子＝菸/酒/<b>檳榔</b>/熱飲；腺癌好發<b>下1/3</b>，源於GERD/Barrett、肥胖。整體<b>男性多於女性</b>。確診靠內視鏡切片，<b>T分期(侵犯深度)最準是內視鏡超音波EUS</b>，CT/PET看遠端轉移。</li><li><b>吞嚥困難：</b>固體為主且進行性→機械性阻塞(狹窄/腫瘤)；固體+液體皆難→蠕動障礙(achalasia)。有<b>警示症狀(體重減輕、貧血、出血)應先內視鏡</b>，不可先治GERD延誤。</li><li><b>急性食團嵌塞：</b>首選<b>內視鏡治療</b>(診斷兼解除)；鋇劑攝影在急性嵌塞為禁忌。</li><li><b>感染性食道炎：</b>念珠菌(白斑，全身fluconazole)、HSV(小水泡/界限明顯淺潰瘍，acyclovir)、CMV(大而深潰瘍，ganciclovir)；nystatin只治口咽念珠菌、對HSV無效。</li><li><b>食道切除：</b>胃重建以<b>後縱膈腔(原食道床)路徑最短</b>；術後<b>心房顫動</b>為常見併發症，注意吻合口漏與肺炎。</li><li><b>檳榔：</b>本身(含檳榔鹼)即第一類致癌物，去除紅白灰仍致癌；增加口腔/食道癌、可誘發心律不整、惡化氣喘。</li></ul>"}, "胃與十二指腸疾病": {"title": "胃與十二指腸疾病", "html": "<p><b>核心概念：</b>消化性潰瘍(PUD)以幽門桿菌(H. pylori)與NSAID為兩大病因；掌握十二指腸潰瘍(DU)vs胃潰瘍(GU)鑑別、H. pylori診斷與除菌、上消化道出血評估、胃切除術後併發症(傾食、輸入肢、B12缺乏)、與壓力性潰瘍。</p><ul><li><b>DU vs GU：</b>DU胃酸偏高、<b>空腹/夜間痛(餐後2-4小時)、進食或制酸劑可緩解</b>、體重多不減；GU進食後30分鐘痛、需切片排除惡性。</li><li><b>H. pylori診斷：</b>非侵入高敏首選<b>碳13尿素呼氣試驗(UBT)</b>或糞便抗原；<b>血清抗體不能確認根除</b>(根除後仍陽性)。已做內視鏡時直接切片做<b>快速尿素酶試驗(CLO)</b>。檢測前停PPI≥2週、停抗生素≥4週。</li><li><b>除菌：</b>標準三合一＝<b>PPI＋amoxicillin＋clarithromycin</b>；複雜性潰瘍術後仍須根除H. pylori。Zollinger-Ellison(胃泌素瘤)應於難治/位置不尋常的潰瘍考慮。</li><li><b>上消化道出血：</b>NG引流<b>陰性/潛血陰性不能排除</b>(尤其十二指腸出血幽門關閉)；收縮壓<100或心率>100需立即快速輸液；輸血採限制性(Hb約7-8)。</li><li><b>穿孔：</b>突發劇痛＋板狀腹＋反彈痛＋腸音消失(腹膜炎)；站立/<b>左側躺</b>X光見橫膈下游離氣體。</li><li><b>胃切除術後：</b>早期傾食(餐後15-30分鐘，血管運動症狀)、晚期傾食(餐後1-3小時，反應性低血糖)；<b>輸入肢症候群</b>(B-II後膽汁性嘔吐、細菌過度生長→B12/脂肪吸收不良)；全胃切除缺<b>內在因子→B12缺乏</b>。傾食衛教低糖高蛋白、少量多餐、乾濕分離。</li><li><b>壓力性潰瘍：</b>燒傷→<b>Curling</b>；頭部外傷/顱內壓升高→<b>Cushing</b>；吻合口→marginal ulcer。重症者預防(PPI/H2阻斷劑、早期腸道營養)。</li></ul>"}, "病毒性與其他肝炎/肝功能": {"title": "病毒性與其他肝炎/肝功能", "html": "<p><b>核心概念：</b>掌握A-E型肝炎的病毒特性與傳染途徑、B肝血清標記判讀(急性/慢性/康復/接種)、肝功能指標(肝細胞型vs膽汁鬱積型、AST/ALT比值)、與酒精性肝炎、自體免疫肝炎、Wilson病。</p><ul><li><b>病毒分類/傳染：</b>HAV=RNA、糞口、<b>不慢性化</b>，傳染力最高在症狀出現前約2週，急性期IgM anti-HAV(+)；HBV=<b>DNA</b>、血液體液垂直；HCV=RNA、血液垂直、慢性化高、<b>無疫苗</b>；HDV=缺陷病毒，需HBV(HBsAg)才能感染；A、B肝有疫苗。無套膜病毒(HAV、輪狀、諾羅)對酒精乾洗手抵抗強，需肥皂洗手。</li><li><b>B肝血清標記：</b>急性＝HBsAg(+)、<b>anti-HBc IgM(+)</b>(±HBeAg)；慢性＝HBsAg>6個月、anti-HBc IgG；康復＝HBsAg(-)、anti-HBs(+)、anti-HBc(+)；疫苗免疫＝僅anti-HBs(+)。HBeAg(+)＝病毒複製、傳染力強。anti-HBc(+)代表曾感染。</li><li><b>肝指標：</b>ALT/AST升高＝肝細胞損傷(<b>ALT較具肝專一性</b>，病毒性肝炎ALT>AST)；<b>酒精性肝損AST/ALT>2</b>且GGT升高；ALP/GGT升高＝膽汁鬱積；<b>PT/INR反映肝合成功能(惡化指標)</b>；血氨升高與肝性腦病相關但不代表嚴重度。</li><li><b>黃疸：</b>未結合(間接)型升高(溶血/Gilbert)→<b>尿膽紅素陰性</b>；結合(直接)型升高(膽汁鬱積/肝病)→茶色尿、尿膽紅素陽性。</li><li><b>急性肝炎處置：</b>肝細胞型(ALT數百-上千)優先超音波＋病毒標記＋自體免疫抗體(ANA/ASMA)，<b>ERCP非優先</b>(屬膽道介入)；肝性腦病以<b>lactulose</b>降氨。</li><li><b>免疫抑制與B肝：</b>B肝帶原者用高劑量類固醇/免疫抑制易致<b>病毒再活化</b>，治療前須評估預防性抗病毒。</li><li><b>慢性B肝治療：</b>非活動帶原(HBeAg(-)、低病毒量、ALT正常、無肝硬化)依AASLD暫不需治療、定期追蹤。Wilson病＝神經精神/肝病/K-F環(非胰臟炎)。</li></ul>"}, "肝硬化與門脈高壓": {"title": "肝硬化與門脈高壓", "html": "<p><b>核心概念：</b>肝硬化的併發症(食道靜脈曲張出血、腹水、肝性腦病、肝肺症候群)、Child-Pugh分級、腹水SAAG判讀、與肝移植適應/禁忌為主要考點。</p><ul><li><b>肝硬化徵象：</b>蜘蛛痣、手掌紅斑、脾腫大、低白蛋白、黃疸；<b>黃疸/腹水/靜脈曲張出血/肝性腦病=失代償</b>。</li><li><b>食道靜脈曲張出血：</b>第一線＝<b>血管收縮藥(somatostatin/octreotide/terlipressin)＋內視鏡套紮＋預防性抗生素</b>，限制性輸血(Hb 7-8)。<b>急性出血不可用β阻斷劑</b>(β阻斷劑用於未出血者的一級/二級預防)。難治用<b>TIPS</b>或分流手術/移植；單純脾切除非一般治療。SB tube為暫時橋接。</li><li><b>Child-Pugh(ABCDE)：</b>白蛋白、膽紅素、凝血(PT/INR)、腹水、肝性腦病；5-6=A、7-9=B、10-15=C。<b>不含轉胺酶/PTT</b>。</li><li><b>腹水SAAG：</b>血清-腹水白蛋白≥1.1=門脈高壓(肝硬化、心衰、縮窄性心包炎)；<1.1=非門脈高壓(腹膜癌、結核、腎病)。門脈高壓中腹水蛋白<2.5偏肝硬化、≥2.5偏心源性。結核性腹膜炎＝低SAAG＋淋巴球為主。SBP＝腹水PMN≥250。</li><li><b>肝性腦病：</b>意識/行為改變＋撲翅樣震顫(asterixis)；誘因＝出血、感染、便祕、<b>低血鉀/鹼中毒</b>、脫水；治療找誘因＋lactulose＋rifaximin。</li><li><b>肝肺症候群：</b>肺內血管擴張致<b>platypnea(坐起更喘)、orthodeoxia(直立血氧下降)</b>；根本治療為肝移植。</li><li><b>肝移植：</b>禁忌＝肝外惡性轉移、未戒酒的酒精性肝硬化、不可逆心肺病；C肝肝硬化、嚴重肝肺症候群為<b>適應症</b>。活體捐贈者避免重度脂肪肝、確保剩餘肝體積。</li><li><b>急性/猛爆性肝衰竭：</b>無慢性肝病者黃疸後約8週內出現肝性腦病；<b>低血糖、凝血異常</b>，<b>腦水腫為主要死因</b>；King's College Criteria評估移植。</li></ul>"}, "肝腫瘤與肝局部病灶": {"title": "肝腫瘤與肝局部病灶", "html": "<p><b>核心概念：</b>肝細胞癌(HCC)的篩檢、AFP、分期治療(BCLC)；肝膿瘍(化膿性vs阿米巴);良性肝腫瘤(腺瘤vs FNH)；肝移植與告知病情之倫理。</p><ul><li><b>HCC：</b>台灣主因B/C肝與肝硬化(A肝不致肝癌)。篩檢以<b>腹部超音波＋AFP每6個月</b>(高危族群)；確診靠多時相CT/MRI(動脈期顯影、靜脈期washout)。<b>AFP顯著升高(數千-上萬)</b>對HCC高度提示(也見於懷孕、生殖細胞瘤)。治療依BCLC：早期手術/移植/消融(RFA、酒精注射PEI用於≤2cm)，中期TACE，晚期全身性治療(sorafenib僅延長約2-3個月，現多用免疫/標靶組合)。</li><li><b>肝膿瘍：</b>化膿性多源於膽道(多重菌，台灣Klebsiella於糖尿病者常見)，ALP常較AST/ALT升；<b>阿米巴肝膿瘍＝右葉單一、巧克力(果醬)色膿、無臭</b>，治療metronidazole＋腸腔殺包囊劑。化膿性肝膿瘍常伴明顯心搏過速(不會相對心搏過緩)。</li><li><b>念珠菌血症：</b>不穩用棘白菌素(caspofungin負荷70mg、維持50mg)，穩定可fluconazole(負荷12、維持6 mg/kg)；療程在血培養轉陰且症狀緩解後<b>再續至少14天</b>，並移除導管、眼底檢查。</li><li><b>良性肝腫瘤：</b>肝腺瘤好發年輕女性(口服避孕藥)、男性同化激素誘發，<b>界限清楚常有(假)包膜、無膽管</b>(與FNH區別，FNH有中央疤痕與膽管)，可出血/惡性轉化。</li><li><b>腹水判讀：</b>B肝肝硬化背景＋AFP升高＋體重下降→HCC；腹水SAAG≥1.1＋低蛋白＋穩定→肝硬化大量腹水(非SBP)。</li><li><b>倫理：</b>未經病人同意逕告知家屬並由家屬決定是否告知，違反<b>自主、隱私、保密</b>(非公平正義)。</li></ul>"}, "膽道與胰臟疾病": {"title": "膽道與胰臟疾病", "html": "<p><b>核心概念：</b>膽囊炎(Murphy)、膽管炎(Charcot三聯/Reynolds五聯)、膽結石、急性胰臟炎(診斷三取二、嚴重度評分、Cullen/Grey-Turner徵象)、慢性胰臟炎、PBC/PSC、壺腹周圍腫瘤為主要考點。</p><ul><li><b>急性膽囊炎：</b>進食後右上腹痛輻射右肩背＋<b>Murphy徵象陽性</b>，早期可無黃疸；超音波診斷。重度/高風險者先<b>經皮膽囊造口引流</b>再評估手術。無結石性膽囊炎好發重症/燒傷/長期禁食/TPN，病情重易壞疽。</li><li><b>急性膽管炎：</b><b>Charcot三聯＝發燒(寒顫)、右上腹痛、黃疸</b>；加低血壓+意識改變=<b>Reynolds五聯(化膿性)</b>。常見菌E. coli/Klebsiella/Enterococcus。治療抗生素＋<b>緊急膽道引流(ERCP/PTCD)</b>。膽道積氣(pneumobilia)見於膽腸瘻/括約肌切開/反覆膽管炎(非單純膽囊切除)。</li><li><b>膽結石：</b>膽固醇結石促發＝肥胖/代謝症候群、女性懷孕、快速減重、長期TPN(非慢性膽道發炎)；<b>無症狀膽結石通常不需預防性切除</b>。Courvoisier徵象(無痛性黃疸＋脹大膽囊)→壺腹周圍/胰頭惡性腫瘤。</li><li><b>急性胰臟炎：</b>病因以<b>膽結石與酒精</b>為主(高三酸甘油酯>1000、ERCP後PEP亦可)。診斷<b>三取二</b>：典型上腹痛輻射至背、<b>lipase/amylase>正常3倍(lipase最具特異性)</b>、影像。嚴重度用<b>Ranson(不含ALP)、BISAP(不含血糖)</b>；低血鈣為重症指標。<b>Cullen(臍周)/Grey-Turner(腰脅)瘀青</b>＝出血性胰臟炎。處置：積極輸液、止痛、禁食(腹痛改善後低脂進食)。</li><li><b>慢性胰臟炎：</b>酒精為主、吸菸加速；外分泌不足(脂肪瀉)先於內分泌(胰源性糖尿病type 3c，治療用<b>胰島素</b>)；可致黃疸/脾腫大/胰源性腹水。鈣化檢查ERCP併發症多較少用。</li><li><b>自體免疫膽道病：</b>PBC→<b>抗粒線體抗體(AMA)</b>，中年女性、搔癢、ALP升、UDCA治療；PSC→與IBD相關、膽管串珠樣、膽管癌風險、肝移植後仍可復發。</li><li><b>Whipple術後：</b><b>胰-空腸吻合處</b>最易滲漏(胰瘻)。神經病變性癌痛輔助用gabapentin。</li></ul>"}, "大腸直腸與肛門疾病": {"title": "大腸直腸與肛門疾病", "html": "<p><b>核心概念：</b>大腸直腸癌(篩檢、左右側差異、分期、手術與神經損傷、標靶選擇)、息肉與遺傳症候群、憩室病、IBS、缺血性結腸炎、痔瘡/肛裂/肛瘻/直腸脫垂為主要考點。</p><ul><li><b>大腸癌篩檢：</b>50(現擴及45)-74歲每2年一次<b>定量免疫法糞便潛血(FIT)</b>，降死亡率約2-3成；<b>陽性務必大腸鏡</b>(不可重複糞檢)。一級血親有大腸癌者提早篩檢。FOBT是篩檢(對分期無幫助)。</li><li><b>左右側差異：</b>右側(管腔大、糞液態)→<b>慢性失血貧血</b>、腫塊、液態便；左側(管腔窄、糞成形)→排便改變、糞變細、<b>腸阻塞、鮮血便</b>。不明原因IDA先查大腸癌。</li><li><b>分期/治療：</b>結腸癌術前<b>胸腹骨盆CT</b>分期；直腸癌局部分期用<b>MRI</b>。T4bN0M0=IIC。局部進展直腸癌(T3/N+)<b>術前同步化放療再手術</b>；極早期T1低風險可經肛門局部切除。轉移性<b>KRAS突變→FOLFOX+bevacizumab</b>(不可用抗EGFR cetuximab)。LAR術後便意急迫頻便＝<b>低前位切除症候群(LARS)</b>；直腸手術損傷骨盆自律神經致性/排尿障礙(交感→逆行性射精、副交感→勃起、骨盆叢→兩者)。</li><li><b>息肉：</b><b>腺瘤性息肉</b>(絨毛>管狀絨毛>管狀)癌變風險最高；增生性息肉通常小、無惡性化。FAP約<b>12歲</b>開始篩檢；Lynch(MMR基因)與大腸/子宮內膜/卵巢相關(乳癌較不相關)。</li><li><b>憩室病：</b>左下腹痛+發燒→憩室炎，以<b>CT診斷(急性期忌大腸鏡/鋇劑灌腸-穿孔風險)</b>；膿瘍≥4cm經皮引流+抗生素。最常見併發症為出血與憩室炎。</li><li><b>IBS：</b>慢性(≥3個月)腹痛、解便後改善、排便型態改變、檢查正常、<b>無警示症狀</b>(Rome準則)。</li><li><b>缺血性結腸炎：</b>老年/心血管病(AF)＋腹痛血便＋X光<b>thumbprinting</b>。</li><li><b>肛門疾病：</b>痔瘡切除最常見併發症<b>尿瀦留</b>；肛裂好發<b>後正中線</b>(側位/多發要查次發病因)；肛瘻最常見<b>肛門腺感染</b>；直腸脫垂好發老年女性，腹部直腸固定術復發率低。大腸鏡後腹脹劇痛疑穿孔→<b>站立胸部X光</b>找游離氣體。</li></ul>"}, "小腸/急腹症/腹瀉/腸道感染": {"title": "小腸/急腹症/腹瀉/腸道感染", "html": "<p><b>核心概念：</b>腸阻塞(機械性vs麻痺性)、闌尾炎(理學徵象)、腸繫膜缺血、疝氣、小腸出血、消化道出血評估、腸道營養與消化道出血復甦為主要考點。</p><ul><li><b>腸阻塞：</b>機械性早期腸音<b>高亢金屬音(high-pitched)</b>＋陣發絞痛＋腹脹＋停止排氣便；麻痺性(ileus)腸音<b>減弱/消失</b>(誘因＝術後、<b>低血鉀</b>、鴉片、腹膜炎)。有手術史者SBO最常見<b>沾黏</b>、無手術史者<b>疝氣嵌頓</b>；穩定無腹膜炎者NG減壓+輸液+腸道休息，絞扼/穿孔才手術。NG長時間抽吸→<b>低氯低鉀性代謝性鹼中毒</b>。影像<b>portal venous gas/pneumatosis intestinalis→腸壞死</b>。乙狀結腸扭轉(bird's beak)無腹膜炎先內視鏡減壓，復發率高需擇期手術。</li><li><b>闌尾炎：</b>轉移性右下腹痛＋厭食＋(後)嘔吐；<b>McBurney壓痛(臍與右髂前上棘外1/3)、Rovsing(壓左下腹引右下腹痛)、psoas(伸髖引痛，陰性不能排除)</b>。早期多低燒(高燒提示穿孔)。診斷成人用CT、孕婦/兒童用超音波/MRI。孕婦因診斷困難陰性闌尾切除率較高、穿孔率較高。</li><li><b>腸繫膜缺血：</b>AF/心律不整＋突發劇痛但<b>理學不成比例(腹軟)</b>＋暗紅黏液便→上腸繫膜動脈阻塞，CTA診斷，把握時間恢復血流。</li><li><b>消化道出血：</b>NG陰性不能排除UGIB；收縮壓<100或心率>100需立即輸液；急性期<b>Hct不能準確反映失血量</b>。上下內視鏡正常疑小腸出血→<b>膠囊內視鏡</b>(穩定者)；間歇低速出血用<b>標記紅血球核醫掃描</b>；活動性出血用CTA。穿孔以站立/<b>左側躺</b>X光找游離氣體。</li><li><b>腸道營養：</b>腸道有功能時<b>優先腸道營養(優於靜脈營養)</b>；長期管灌放PEG；昏迷者易管路錯位需確認位置。Buscopan(抗膽鹼)禁忌＝青光眼、腸阻塞、攝護腺肥大(非SLE)。</li><li><b>裡急後重：</b>直腸/乙狀結腸發炎或鄰近病灶(含下段輸尿管結石)刺激所致。</li></ul>"}, "發炎性腸道疾病(IBD)": {"title": "發炎性腸道疾病(IBD)", "html": "<p><b>核心概念：</b>潰瘍性結腸炎(UC)與克隆氏症(Crohn)的鑑別、治療、與併發症;偽膜性結腸炎與B12吸收為延伸考點。</p><ul><li><b>UC：</b>侷限<b>大腸</b>、由直腸往近端<b>連續性</b>、侵犯黏膜層；大腸鏡見瀰漫充血、易碎、接觸出血、潰瘍與慢性<b>偽息肉</b>；以血便、裡急後重、腹瀉表現。併發毒性巨結腸與大腸癌風險(長期需監測異生)。治療：5-ASA為基礎、類固醇誘導、免疫調節/生物製劑；<b>抗生素非常規治療</b>(除非合併感染)。</li><li><b>Crohn：</b>口腔到肛門皆可、<b>跳躍式(skip)、全層(transmural)</b>，以<b>迴腸末端</b>最常見；易致<b>狹窄、廔管、膿瘍與肛門病灶</b>(約1/3肛周疾病)。<b>吸菸增加風險與術後復發</b>。病因為遺傳+免疫+環境多因子(非單一菌叢失調)。手術切除只需<b>肉眼正常邊緣</b>(會復發)；狹窄成形術可保留腸道。糞便鈣衛蛋白/乳鐵蛋白可分辨阻塞為活動發炎或纖維化狹窄。</li><li><b>鑑別重點：</b>UC＝連續、黏膜層、直腸出血、無廔管；Crohn＝跳躍、全層、腸壁增厚、廔管。長期狹窄癌變以<b>黏膜活檢</b>(非冷凍切片)排除。</li><li><b>偽膜性結腸炎：</b>近期抗生素(clindamycin等)後腹瀉黏液惡臭→<b>C. difficile</b>；停誘發抗生素、口服vancomycin/fidaxomicin、<b>肥皂洗手</b>(酒精對孢子無效)、避免止瀉藥。</li><li><b>B12吸收：</b>維生素B12在<b>迴腸末端</b>吸收，<b>克隆氏症</b>侵犯/切除迴腸末端最易致B12缺乏。</li></ul>"}};
const TORDER=["食道疾病", "胃與十二指腸疾病", "病毒性與其他肝炎/肝功能", "肝硬化與門脈高壓", "肝腫瘤與肝局部病灶", "膽道與胰臟疾病", "大腸直腸與肛門疾病", "小腸/急腹症/腹瀉/腸道感染", "發炎性腸道疾病(IBD)"];
const $=s=>document.querySelector(s), ce=document.getElementById('list');
let view='year', expand=false;
const years=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
const topics=TORDER.filter(t=>Q.some(q=>q.topic===t));
years.forEach(y=>fYear.add(new Option('民國'+y+'年',y)));
topics.forEach(t=>fTopic.add(new Option(t,t)));
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function ansText(q){
 if((q.answer_status||'').indexOf('送分')>=0) return '<span class="warn">送分（全部給分）</span>';
 if((q.answer_status||'').indexOf('多重')>=0) return '答案：'+q.accepted_answers.join('、')+'（均給分）';
 return '答案：'+q.answer;
}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">民國'+q.roc_year+'</span>',
   '<span class="chip">'+esc(q.subject_group)+(q.branch&&q.branch!=='通論'?'·'+esc(q.branch):'')+'</span>',
   '<span class="chip t">'+esc(q.topic)+'</span>'];
 if((q.answer_status||'').indexOf('送分')>=0)chips.push('<span class="chip s">送分</span>');
 if((q.answer_status||'').indexOf('多重')>=0)chips.push('<span class="chip s">多重答案</span>');
 let opts='';
 for(const k of ['A','B','C','D','E']){ if(q.options[k]!==undefined) opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>'; }
 const img=q.img?'<img class="ecg" src="'+q.img+'" alt="附圖">':'';
 let det='';
 if(e){
   det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
   if(e.detail){
     if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
     if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(q.accepted_answers&&q.accepted_answers.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
     if(e.detail.sources&&e.detail.sources.length)det+='<div class="src">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
   }
 } else { det='<div class="pend">② 詳解撰寫中…</div>'; }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button>'+
  '<div class="ans"><div class="ansline">'+ansText(q)+(q.correction_note?'　<span style="font-size:.78rem;color:#9a6b00">（'+esc(q.correction_note)+'）</span>':'')+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value, ft=fTopic.value, kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';
 let h='';
 if(view==='year'){
   const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
   ys.forEach(y=>{h+='<div class="grp">民國'+y+'年</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});
 } else {
   topics.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;
     h+='<div class="grp">'+t+'（'+tq.length+'題）</div>';
     if(L[t])h+='<div class="lec"><h3>📘 '+esc(L[t].title||t)+' 複習講義</h3>'+(L[t].html||'')+'</div>';
     h+=tq.map(qCard).join('');});
 }
 ce.innerHTML=h;
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='np_gi_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render); fKw.oninput=render;
expandBtn=$('#expand'); expandBtn.onclick=()=>{expand=!expand;expandBtn.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
