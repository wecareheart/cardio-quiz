"C": "正確:門脈高壓使血流堆積上游形成食道靜脈曲張。", "D": "錯誤(正解):低白蛋白使游離藥物增加,藥物敏感性『上升』(須減量),非降低。"}, "sources": ["Harrison 21e, Cirrhosis; Pharmacology in Liver Disease", "Miller's Anesthesia, Hepatic Disease"]}}, "111-通論-麻醉-60": {"quick": "albumin2.7(2分)+bilirubin2.9(2分)+大量腹水(3分)+無腦病(1分)+PT延長4.5秒(2分)=10–11分→Child-Pugh C級,選C。", "detail": {"background": "Child-Pugh計分(每項1–3分):①白蛋白:>3.5=1、2.8–3.5=2、<2.8=3 → 本例2.7=『3分』;②膽紅素:<2=1、2–3=2、>3=3 → 2.9=『2分』;③腹水:無=1、輕/可控=2、大量/難控=3 → 大量=『3分』;④肝性腦病:無=1、I–II=2、III–IV=3 → 無=『1分』;⑤PT延長秒數:<4秒(或INR<1.7)=1、4–6秒(INR1.7–2.3)=2、>6秒(INR>2.3)=3 → 4.5秒=『2分』。合計3+2+3+1+2=『11分』→Child-Pugh C級。(本題答案選C級11分;白蛋白2.7界於2.8臨界,評為3分得11分C級。)\\n\\n護理:C級預後差、手術風險高,評估移植;追蹤腹水、膽紅素、INR與腦病。", "options": {"A": "6分A級與本例(大量腹水+低白蛋白+高膽紅素)不符,過低。", "B": "9分B級低估,本例多項達3分。", "C": "正解:約11分→Child-Pugh C級。", "D": "Child-Pugh最高15分、僅A/B/C三級,無『D級13分』之分級。"}, "sources": ["Harrison 21e, Child-Pugh Score", "AASLD Cirrhosis"]}}, "111-通論-5分科-62": {"quick": "黃疸代表肝臟排泄/功能失代償(decompensation),最能代表肝功能代償不全,故選C。", "detail": {"background": "肝硬化分『代償期』與『失代償期(decompensated)』。失代償的標誌是出現以下『重大併發症』之一:①腹水、②靜脈曲張出血、③肝性腦病、④黃疸(膽紅素升高,反映肝排泄/功能衰退)。題目選項中:脾腫大、食道靜脈曲張屬『門脈高壓』表現(可在代償期就有,不必然代表功能失代償);低血壓非肝硬化特異;而『黃疸』直接反映肝臟『功能(排泄膽紅素)』失代償。故最能代表肝功能代償不全者為黃疸。\\n\\n護理:出現黃疸/腹水/腦病/靜脈曲張出血即進入失代償,須積極處理併發症並評估移植。", "options": {"A": "脾腫大為門脈高壓表現,代償期也可有,非功能失代償最佳指標。", "B": "食道靜脈曲張屬門脈高壓,不等於肝功能失代償。", "C": "正解:黃疸反映肝排泄功能失代償,最能代表代償不全。", "D": "低血壓非肝硬化特異性失代償指標。"}, "sources": ["Harrison 21e, Decompensated Cirrhosis", "AASLD/Baveno"]}}, "112-進階-內科-46": {"quick": "靜脈曲張出血併休克,最優先是『建立大口徑靜脈通路大量輸液復甦』穩定血行動力,故選A。", "detail": {"background": "急性靜脈曲張出血合併休克(BP85/45、HR145、意識不清躁動)的處置以ABC與復甦優先:①『建立中央靜脈或兩條大口徑周邊靜脈,大量輸液/輸血復甦』(A,最優先)──同時注意氣道保護(意識差、嘔血→誤吸與插管保護氣道);②藥物用『血管收縮藥(somatostatin/octreotide/terlipressin)』降門脈壓,而『propranolol(β阻斷劑)不可用於急性出血』(會降血壓妨礙復甦,故B錯);③出血源在上消化道,應安排『緊急上消化道內視鏡』套紮,而非大腸鏡(C錯)或支氣管鏡(D錯);④給預防性抗生素。輸血採限制性(Hb約7–8)。\\n\\n護理:先穩定循環與氣道,再內視鏡止血;監測再出血、肝性腦病與感染。", "options": {"A": "正解:休克病人最優先建立大口徑靜脈通路大量輸液復甦(並保護氣道)。", "B": "錯誤:急性出血不可用propranolol(降血壓妨礙復甦)。", "C": "上消化道出血應做上消化道內視鏡,非緊急大腸鏡。", "D": "支氣管鏡與上消化道出血止血無關。"}, "sources": ["AASLD Variceal Hemorrhage", "Baveno VII; ATLS復甦原則"]}}, "112-進階-內科-48": {"quick": "bilirubin2.8(2分)+albumin3.0(2分)+INR1.6(1分)+腹脹未明確大量腹水/無腦病→約7分,Child-Pugh B級,選B。", "detail": {"background": "依Child-Pugh計分(本例提供三項+臨床):①膽紅素2.8(2–3之間)=2分;②白蛋白3.0(2.8–3.5)=2分;③INR1.6(<1.7)=1分;④腹水(本例『腹脹』但未明示大量難控,常評為輕度/無至輕度,1–2分);⑤腦病(未提及)=1分。合計約7分(2+2+1+1+1)→落在7–9的『Child-Pugh B級』。本題標準答案為B級(class B)。重點是熟練ABCDE五項與分級切點(5–6=A,7–9=B,10–15=C)。\\n\\n護理:B級為中度失代償,須監測併發症、評估治療B肝病因、戒酒;追蹤分數變化。", "options": {"A": "class A為5–6分,本例膽紅素與白蛋白各2分已偏高,非A。", "B": "正解:約7分→Child-Pugh class B。", "C": "class C需10–15分,本例未達。", "D": "Child-Pugh無class D分級。"}, "sources": ["Harrison 21e, Child-Pugh Classification", "AASLD Cirrhosis"]}}, "113-通論-家庭-20": {"quick": "依人體器官移植條例,18歲以上之人得捐贈部分肝臟予『五親等以內』親屬,故A最適當。", "detail": {"background": "我國《人體器官移植條例》(民國110年修正)對『活體器官捐贈』之規定要點:①捐贈者須年滿『18歲』且有意思能力並出具書面同意(不再以20歲為門檻);②活體捐贈之受贈對象限『五親等以內血親或配偶』──就部分肝臟之活體捐贈,捐贈者得捐予五親等以內之親屬(A正確);③未成年人(未滿18歲)原則不得為活體捐贈;④醫療機構須經倫理審查等程序(但人數/組成的細節須依條文,題目C所述組成不完全正確)。本例19歲已婚男性、與伯父為『三親等旁系血親(在五親等內)』,符合資格,故A最適當。\\n\\n護理:確認捐贈者年齡、意思能力、親屬關係與書面同意,完成倫理與醫學評估。", "options": {"A": "正解:18歲以上之人得捐贈部分肝臟予五親等以內親屬。", "B": "錯誤:門檻為18歲(非20歲),本例19歲符合。", "C": "倫理委員會之組成敘述不符條文規定,非最適當。", "D": "『未滿20歲已婚需配偶同意』非現行規定要件,不正確。"}, "sources": ["人體器官移植條例(民國110年修正)", "衛福部活體器官捐贈規範"]}}, "113-進階-內科-37": {"quick": "albumin3.3(2分)+INR2(2分)+bilirubin2.5(2分)+輕度腦病(2分)+大量腹水(3分)=11分→Child-Pugh C級,選C。", "detail": {"background": "Child-Turcotte-Pugh計分:①白蛋白3.3(2.8–3.5)=2分;②膽紅素2.5(2–3)=2分;③INR2(1.7–2.3)=2分;④肝性腦病輕度(I–II)=2分;⑤腹水大量=3分。合計2+2+2+2+3=『11分』→落在10–15的『Child-Pugh C級』(預後最差)。記憶切點:5–6=A、7–9=B、10–15=C。C級病人一年存活率較低,應評估肝移植與積極處理併發症。\\n\\n護理:C級嚴密監測腹水/腦病/出血/感染,衛教低鈉、利尿、lactulose,評估移植。", "options": {"A": "A級(5–6分)與本例多項達2–3分不符。", "B": "B級(7–9分)低估,本例達11分。", "C": "正解:約11分→Child-Pugh C級。", "D": "Child-Pugh僅A/B/C三級,無D級。"}, "sources": ["Harrison 21e, Child-Pugh Score", "AASLD Cirrhosis"]}}, "113-進階-內科-52": {"quick": "腹水SAAG=4.0−3.8=0.2(<1.1,非門脈高壓)、淋巴球為主、LDH高、glucose低→『結核性腹膜炎』,故選A。", "detail": {"background": "腹水分析:①SAAG=血清白蛋白−腹水白蛋白=4.0−3.8=0.2(<1.1)→『非門脈高壓性腹水』,排除肝硬化(肝硬化SAAG≥1.1)。②白血球750/μL以『淋巴球為主(70%)』、腹水LDH偏高(400)、glucose偏低(60)→提示『滲出液(exudate)』且為慢性淋巴球性腹膜炎,典型為『結核性腹膜炎』(也見於腹膜癌病)。③自發性細菌性腹膜炎(SBP)以『多形核(PMN)≥250』為主、急性,與本例淋巴球為主不符。④腎病症候群為低SAAG但腹水蛋白低、非淋巴球性滲出。故最可能為結核性腹膜炎(可加驗腹水ADA、抗酸染色/培養)。\\n\\n護理:低SAAG+淋巴球性腹水→查結核(ADA、培養)與腹膜癌(細胞學);抗結核治療並追蹤。", "options": {"A": "正解:低SAAG(0.2)+淋巴球為主+高LDH低glucose→結核性腹膜炎。", "B": "SBP以PMN≥250為主、急性,本例淋巴球為主不符。", "C": "腎病症候群腹水蛋白低、非淋巴球性滲出,不符。", "D": "肝硬化為高SAAG(≥1.1),與本例SAAG 0.2不符。"}, "sources": ["AASLD Ascites (SAAG; secondary causes)", "Harrison 21e, Tuberculous Peritonitis"]}}, "114-進階-內科-33": {"quick": "坐姿血氧反而比平躺低(orthodeoxia/platypnea),最可能為肝硬化的『肝肺症候群』,故選C。", "detail": {"background": "本例『坐姿SpO2 92%、平躺96%』──即直立時血氧較低、平躺改善,符合『直立性低血氧(orthodeoxia)』與『平臥呼吸(platypnea)』,是『肝肺症候群(HPS)』的特徵(肝硬化/門脈高壓→肺底血管擴張,直立時更多血流經底部擴張血管造成分流加重)。心衰、COPD多為端坐呼吸(平躺更喘);末期腎病的喘多為容積過多/酸中毒,皆無此姿勢性低血氧特徵。診斷以對比心臟超音波(氣泡試驗)、血氧/A-a gradient;治療根本為肝移植。\\n\\n護理:評估姿勢相關血氧、給氧、轉介移植評估。", "options": {"A": "心衰多為端坐呼吸(平躺更喘),與本例相反。", "B": "COPD無姿勢性低血氧(orthodeoxia)此特徵。", "C": "正解:坐起血氧反降(platypnea-orthodeoxia)為肝硬化肝肺症候群。", "D": "末期腎病喘多因容積/酸中毒,非姿勢性低血氧。"}, "sources": ["AASLD/ERS Hepatopulmonary Syndrome", "Harrison 21e"]}}, "114-進階-內科-39": {"quick": "Child-Pugh不含『部分凝血活酶時間(PTT)』,用的是PT/INR;故C不是CTP所需,選C。", "detail": {"background": "Child-Turcotte-Pugh的五項為:白蛋白(albumin)、膽紅素(bilirubin)、凝血(以『PT/INR』表示)、腹水(ascites)、肝性腦病(encephalopathy)。本題選項C為『partial thromboplastin time(PTT/aPTT)』──那是評估內在凝血路徑(用於監測heparin等),『不是』CTP使用的凝血指標(CTP用PT/INR反映肝合成的外在路徑因子)。故『PTT』不是計算CTP所需資訊。\\n\\n護理:正確以PT/INR(非aPTT)計分;熟記ABCDE五項。", "options": {"A": "腹水(ascites)是CTP項目,需要。", "B": "膽紅素(bilirubin)是CTP項目,需要。", "C": "正解:CTP用PT/INR,不用partial thromboplastin time(PTT)。", "D": "白蛋白(albumin)是CTP項目,需要。"}, "sources": ["Harrison 21e, Child-Pugh Score", "AASLD Cirrhosis"]}}, "114-進階-內科-40": {"quick": "反覆難治的靜脈曲張出血,救援為TIPS或分流手術、最終肝移植;單純『脾臟切除』非標準止血策略,最不適當,選D。", "detail": {"background": "肝硬化食道靜脈曲張急性出血經藥物+內視鏡仍反覆出血(難治性)時的救援策略:①『TIPS(經頸靜脈肝內門體分流)』──首選救援,有效降門脈壓止血;②外科『門體分流手術(如遠端脾腎分流distal splenorenal shunt, Warren shunt)』──選擇性降門脈壓;③『肝臟移植』──根本治療。而單純『脾臟切除(splenectomy)』並非治療食道靜脈曲張出血的標準方法(脾切僅對特定『胃靜脈曲張源於脾靜脈栓塞(左側/區域性門脈高壓)』有效,對一般肝硬化門脈高壓的食道靜脈曲張出血無效且風險高),故為『最不適當』。\\n\\n護理:難治出血者快速會診評估TIPS/移植;持續復甦、監測再出血與肝性腦病(TIPS後腦病風險增加)。", "options": {"A": "TIPS為難治性靜脈曲張出血的首選救援,適當。", "B": "遠端脾腎分流為選擇性門體分流手術,可考慮,適當。", "C": "肝臟移植為根本治療,適當。", "D": "最不適當(正解):單純脾臟切除非一般食道靜脈曲張出血的治療(僅特定脾靜脈栓塞之胃靜脈曲張適用)。"}, "sources": ["Baveno VII; AASLD Portal Hypertension", "Harrison 21e, Management of Variceal Bleeding"]}}, "114-進階-家庭-46": {"quick": "食道靜脈曲張出血急性處置應『優先用somatostatin(或octreotide/terlipressin)降門脈壓』,故選B。", "detail": {"background": "急性食道靜脈曲張出血的藥物核心是『血管收縮藥降門脈壓』──somatostatin或其類似物octreotide、或terlipressin,可收縮內臟血管、降低門脈壓與出血,應『盡早(內視鏡前即可開始)』給予,並持續3–5天。其他:PPI對『消化性潰瘍』出血有益,但對靜脈曲張出血非主要止血機轉(臨床常合併使用但非『優先』);鼻胃管沖洗非靜脈曲張出血的關鍵處置且有風險;ERCP是膽道介入,與靜脈曲張出血無關。完整處置還包括復甦、預防性抗生素、限制性輸血與緊急內視鏡套紮。\\n\\n護理:盡早給血管收縮藥與抗生素、氣道保護、備內視鏡;監測再出血。", "options": {"A": "PPI對靜脈曲張出血非主要止血機轉,非『最優先』(用於潰瘍出血)。", "B": "正解:優先用somatostatin/octreotide降門脈壓止血。", "C": "鼻胃管沖洗非靜脈曲張出血的關鍵處置且有風險。", "D": "ERCP為膽道介入,與靜脈曲張出血無關。"}, "sources": ["AASLD Variceal Hemorrhage", "Baveno VII Consensus"]}}, "110-進階-內科-41": {"quick": "慢性B肝、無肝硬化、HBeAg(−)、HBV DNA僅1000 IU/mL、GPT正常(30)→屬非活動帶原,依AASLD『暫不需治療』,選D。", "detail": {"background": "慢性B型肝炎是否治療,依AASLD指引綜合『HBeAg狀態、HBV DNA量、ALT(GPT)、肝纖維化/硬化』判斷。本例:無肝硬化、HBeAg(−)、HBV DNA 1000 IU/mL(低)、GPT 30(正常)→符合『非活動性帶原(inactive carrier)』:病毒量低、肝功能正常、無顯著肝損,『不需立即抗病毒治療』,僅需『定期追蹤』(ALT、HBV DNA、AFP、超音波監測肝癌)。治療指徵通常為:HBeAg(+)且DNA高+ALT升高,或HBeAg(−)且DNA≥2000+ALT升高/有顯著纖維化,或已肝硬化。故本例D『暫不需治療』最適當。藥物治療首選口服核苷酸類似物(entecavir、tenofovir TDF/TAF);interferon用於特定族群;肝移植用於失代償/肝癌。\\n\\n護理:衛教非活動帶原仍須定期追蹤、肝癌監測、避免肝毒性與飲酒;免疫抑制治療前需評估預防性抗病毒。", "options": {"A": "lamivamine抗藥性高且本例未達治療指徵,非適當。", "B": "pegylated interferon用於特定活動性病例,本例非活動帶原不需治療。", "C": "肝移植用於失代償或肝癌,本例無此狀況。", "D": "正解:非活動帶原(低病毒量、正常ALT、無肝硬化)依AASLD暫不需治療,定期追蹤。"}, "sources": ["AASLD HBV Guidance (treatment indications)", "Harrison 21e, Chronic Hepatitis B"]}}, "114-通論-5分科-48": {"quick": "目前A型與B型肝炎皆有疫苗,『只有B肝可施打疫苗』敘述不適當,故選A。", "detail": {"background": "病毒性肝炎疫苗與傳染:①疫苗──『A型與B型肝炎皆有疫苗』(C、D、E型目前無廣泛使用疫苗;D肝靠B肝疫苗間接預防),故『只有B肝有疫苗』錯誤(A為答案)。②B肝帶原者是D肝(缺陷病毒需HBsAg)的高危險群(B正確)。③A型肝炎為糞口傳染,但『口-肛接觸等不安全性行為』也可能傳播A肝(尤其男男性行為者),故C正確(有機會經性行為感染A肝)。④C型肝炎慢性化比例高,進展為肝硬化與肝癌的機會較高(D正確)。\\n\\n護理:衛教A、B肝疫苗接種、B肝帶原者注意D肝、C肝以DAA治癒並監測肝硬化/肝癌。", "options": {"A": "不適當(正解):A型與B型肝炎皆有疫苗,非只有B肝可預防。", "B": "正確:慢性B肝帶原者為D型肝炎高危險群。", "C": "正確:不安全性行為(口肛接觸)有機會感染A型肝炎。", "D": "正確:感染C型肝炎後發生肝硬化的機會較高。"}, "sources": ["CDC Viral Hepatitis Vaccination", "Harrison 21e, Viral Hepatitis"]}}, "106-106b-內科-66": {"quick": "Wilson氏病典型為神經/精神症狀、肝炎肝硬化、角膜K-F環;『胰臟炎』非其常見表徵,故選D。", "detail": {"background": "威爾森氏病(Wilson disease)是ATP7B基因突變致『銅』在體內(尤其肝、腦、角膜)堆積的體染色體隱性遺傳病。常見臨床:①肝臟──兒童/青少年期肝炎、脂肪肝、肝硬化、甚至猛爆性肝衰竭(常伴Coombs陰性溶血);②神經精神──震顫、肌張力不全、構音障礙、動作遲緩、行為/情緒改變(好發年輕成人);③眼睛──角膜緣銅沉積形成『Kayser-Fleischer環(K-F ring)』。診斷:血清『ceruloplasmin降低』、尿銅升高、肝銅升高、K-F環。治療:銅螯合劑(penicillamine、trientine)、鋅鹽,嚴重肝衰竭需移植。『胰臟炎』並非Wilson disease的典型/常見表徵,故D錯誤。\\n\\n護理:年輕肝病+神經精神症狀要想到Wilson;低銅飲食(避貝類、肝、堅果、巧克力)、終生螯合治療與順從性、家族篩檢。", "options": {"A": "正確:可出現神經學或精神學症狀(震顫、行為改變)。", "B": "正確:可表現肝炎或肝硬化。", "C": "正確:角膜可見Kayser-Fleischer環。", "D": "錯誤(正解):胰臟炎非Wilson disease的常見臨床表徵。"}, "sources": ["Harrison 21e, Wilson Disease", "AASLD Wilson Disease Guidelines"]}}, "111-通論-5分科-63": {"quick": "黃疸但尿膽紅素陰性→『未結合(間接)膽紅素』升高,最可能為嚴重溶血,故選A。", "detail": {"background": "膽紅素代謝與黃疸分類:①『未結合(間接)膽紅素』不溶於水、與白蛋白結合、不經腎排出→『尿膽紅素陰性』,見於溶血(產生過多)或Gilbert/Crigler-Najjar(結合障礙)。②『結合(直接)膽紅素』溶於水,膽汁鬱積/肝細胞或膽道病變時逆流入血並由腎排出→『尿膽紅素陽性』、茶色尿。本題『黃疸但尿bilirubin陰性、尿色正常』→屬未結合型高膽紅素血症,最符合『嚴重溶血』(紅血球大量破壞,間接膽紅素增加、伴貧血/網狀紅血球上升/LDH↑/haptoglobin↓)。急性肝衰竭、總膽管癌、藥物性肝炎多為『結合型』升高、尿膽紅素陽性、茶色尿,與本例不符。\\n\\n護理:溶血評估(CBC、網狀紅血球、LDH、haptoglobin、抹片、Coombs);找溶血原因。", "options": {"A": "正解:尿膽紅素陰性提示未結合型升高,最可能嚴重溶血。", "B": "急性肝衰竭多為結合型升高、尿膽紅素陽性,不符。", "C": "總膽管癌為阻塞性(結合型)、茶色尿、尿膽紅素陽性,不符。", "D": "藥物性肝炎多為肝細胞/膽汁鬱積型,尿膽紅素常陽性,不符。"}, "sources": ["Harrison 21e, Jaundice; Bilirubin Metabolism", "Sleisenger & Fordtran's"]}}, "105-TNPA-內科-7": {"quick": "AFP升高除肝癌/肝壞死外,還見於『懷孕(1)』與『生殖細胞瘤germ cell tumor(4)』,故選D。", "detail": {"background": "甲型胎兒蛋白(AFP)是胎兒肝與卵黃囊產生的蛋白,出生後下降。成人AFP升高的原因:①肝細胞癌(顯著升高,診斷與追蹤標記);②急性肝細胞壞死/肝炎再生(肝細胞再生時可輕中度升高);③『懷孕』(胎兒產生,母血AFP生理性上升,亦用於唐氏症/神經管缺損的母血篩檢);④『生殖細胞瘤(germ cell tumor)』,尤其卵黃囊瘤/含卵黃囊成分的非精原細胞瘤(NSGCT),AFP是其腫瘤標記。脂肪肝、胰臟癌一般『不會』使AFP升高(胰臟癌標記為CA19-9)。故除肝癌與肝壞死外,須考慮懷孕(1)與germ cell tumor(4)。\\n\\n護理:AFP升高需結合臨床(懷孕、肝病、睪丸/卵巢腫塊)判讀;育齡女性先排除懷孕。", "options": {"A": "1、2含脂肪肝(2),脂肪肝一般不使AFP升高,不選。", "B": "2、3含脂肪肝與胰臟癌,皆非AFP升高典型原因,不選。", "C": "3、4含胰臟癌(3,標記為CA19-9非AFP),不選。", "D": "正解:懷孕(1)與生殖細胞瘤(4)為AFP升高的其他重要原因。"}, "sources": ["Harrison 21e, Tumor Markers (AFP)", "Williams Obstetrics, Maternal Serum AFP"]}}, "108a-TNPA-內科-14": {"quick": "維生素B12在『迴腸末端』吸收;克隆氏症好侵犯迴腸末端,最易導致B12缺乏,故選B。", "detail": {"background": "維生素B12吸收需:胃壁細胞分泌『內在因子(IF)』與B12結合,於『迴腸末端』受體吸收。任何破壞此路徑者皆致B12缺乏:①胃因素(惡性貧血/自體免疫胃炎、全胃切除→缺IF);②迴腸末端疾病/切除──『克隆氏症』好發迴腸末端,發炎或切除使B12吸收受損,是本題最佳答案;③小腸細菌過度生長、胰功能不足、嚴格素食。胰臟癌(外分泌不足雖影響B12從R蛋白釋出,但非最典型)、糖尿病、慢性腎病皆非B12缺乏的典型主因。故選克隆氏症。\\n\\n護理:克隆氏症(尤其迴腸侵犯/切除)病人監測B12、葉酸與脂溶性維生素;缺乏者補充B12(注射或高劑量口服)。", "options": {"A": "胰臟癌(外分泌不足)非B12缺乏最典型原因。", "B": "正解:克隆氏症侵犯迴腸末端,破壞B12吸收,最易致B12缺乏。", "C": "糖尿病非B12吸收障礙主因(metformin長期使用才相關)。", "D": "慢性腎病非B12缺乏典型原因。"}, "sources": ["Harrison 21e, Vitamin B12 Deficiency; Crohn's Disease", "Sleisenger & Fordtran's"]}}, "109-進階-內科-2": {"quick": "B12在迴腸末端吸收,克隆氏症好侵犯該處,最易導致B12缺乏,故選A。", "detail": {"background": "同前:維生素B12需內在因子結合後於『迴腸末端』吸收。克隆氏症(Crohn's disease)為跳躍式全層發炎,『最常侵犯迴腸末端』,發炎或手術切除迴腸末端使B12吸收受損,是引起B12缺乏的典型腸道病因。胰臟癌、糖尿病、慢性腎病皆非B12吸收障礙的主要原因。臨床B12缺乏表現:巨球性貧血、舌炎、亞急性合併退化(本體感覺/平衡/周邊神經病變)。\\n\\n護理:克隆氏症病人定期監測B12;迴腸切除者常需終生補充B12;衛教神經學症狀及早處理。", "options": {"A": "正解:克隆氏症侵犯迴腸末端,最易導致B12缺乏。", "B": "胰臟癌非B12缺乏的典型主因。", "C": "糖尿病本身非B12吸收障礙原因。", "D": "慢性腎病非B12缺乏典型原因。"}, "sources": ["Harrison 21e, B12 Deficiency; Crohn's Disease", "Sleisenger & Fordtran's"]}}, "111-進階-內科-51": {"quick": "SAAG=2.8−1.4=1.4(≥1.1,門脈高壓)且腹水總蛋白高(2.6,>2.5)→心源性(縮窄性心包炎),故選B。", "detail": {"background": "腹水鑑別用『SAAG』分門脈高壓與否,再用『腹水總蛋白』細分門脈高壓的來源:①SAAG≥1.1=門脈高壓;②於門脈高壓中,腹水總蛋白『<2.5 g/dL』偏『肝硬化(竇性/竇後性,蛋白漏出少)』;腹水總蛋白『≥2.5 g/dL』偏『心源性(右心衰、縮窄性心包炎,竇前/後性肝鬱血使蛋白較高)』或Budd-Chiari。本例SAAG=2.8−1.4=1.4(≥1.1,門脈高壓),腹水protein 2.6(高)→指向『心源性』,最符合『縮窄性心包炎(constrictive pericarditis)』。結核性腹膜炎與腹膜癌為低SAAG(<1.1);胰源性腹水也多低SAAG。故選縮窄性心包炎。\\n\\n護理:高SAAG+高蛋白腹水要評估心臟(右心衰/縮窄性心包炎),做心臟超音波/影像;對因治療。", "options": {"A": "結核性腹膜炎為低SAAG(<1.1),與本例SAAG 1.4不符。", "B": "正解:高SAAG(1.4)+高腹水蛋白(2.6)→心源性,符合縮窄性心包炎。", "C": "腹膜癌病為低SAAG,不符。", "D": "胰源性腹水多為低SAAG,不符。"}, "sources": ["AASLD Ascites (SAAG + ascitic protein)", "Harrison 21e, Ascites differential"]}}, "114-通論-5分科-49": {"quick": "頭部外傷/顱內壓升高引發的壓力性潰瘍稱『Cushing ulcer』,故選A。", "detail": {"background": "壓力相關黏膜病變(壓力性潰瘍)在重症常見,兩個人名要分清:①『Curling ulcer』=『燒傷(burn)』後的壓力性潰瘍(口訣:Curling—燒燙的捲曲);②『Cushing ulcer』=『中樞神經病變/頭部外傷/顱內壓升高』相關的壓力性潰瘍(口訣:Cushing—腦/顱)。Cushing ulcer機轉與迷走神經興奮致胃酸分泌增加有關,潰瘍可較深、易穿孔且常較大。本例車禍頭部外傷併顱內出血→鼻胃管咖啡色血、胃多處潰瘍→Cushing ulcer。其他選項C/D非標準名詞(Cullen是臍周瘀青、Murphy是膽囊徵象)。\\n\\n護理:重症(顱腦損傷/燒傷/呼吸器/凝血異常)者給壓力性潰瘍預防(PPI/H2阻斷劑)、早期腸道營養、監測胃管引流與血色素。", "options": {"A": "正解:頭部外傷/顱內壓升高的壓力性潰瘍稱Cushing ulcer。", "B": "Curling ulcer是『燒傷』後的壓力性潰瘍,非頭部外傷。", "C": "Cullen是臍周瘀青徵象,非潰瘍名稱。", "D": "Murphy是膽囊炎的理學徵象,非潰瘍名稱。"}, "sources": ["Harrison 21e, Stress-Related Mucosal Injury", "Sabiston, Curling vs Cushing ulcer"]}}, "105-TNPA-通論-3": {"quick": "餐後右上腹劇痛輻射至背、深呼吸時右上腹壓痛加劇(Murphy徵象)、無黃疸→急性膽囊炎。", "detail": {"background": "急性膽囊炎多因膽結石阻塞膽囊管,膽囊脹大發炎。典型:進食(尤其油膩)後右上腹痛、可輻射至右肩/背、噁心嘔吐;『Murphy徵象陽性』(深吸氣時觸診右上腹,發炎膽囊下移觸及檢查者手指致疼痛而吸氣中止)為重要理學表現。早期可無黃疸(單純膽囊炎不一定阻塞總膽管)。鑑別:急性胰臟炎多為上腹/左上腹痛輻射至背+amylase/lipase升高;急性腸胃炎以腹瀉嘔吐為主、腸音亢進;闌尾炎以轉移至右下腹痛、Rovsing/McBurney為主。診斷靠超音波(膽囊壁增厚>3mm、膽囊周圍積液、結石、超音波Murphy)。治療:禁食、輸液、抗生素、止痛,膽囊切除(早期腹腔鏡為佳)。\\n\\n護理:評估Murphy徵象與發燒、禁食輸液給抗生素、止痛、術前準備。", "options": {"A": "正解:餐後右上腹痛輻射至背+Murphy徵象→急性膽囊炎。", "B": "急性胰臟炎以上腹/左上腹痛+酵素升高為主,且Murphy非其徵象。", "C": "急性腸胃炎以腹瀉嘔吐、腸音亢進為主,不符。", "D": "闌尾炎以轉移性右下腹痛為主,不符右上腹Murphy。"}, "sources": ["Tokyo Guidelines (TG18) Acute Cholecystitis", "Harrison 21e, Diseases of the Gallbladder"]}}, "105-TNPA-內科-46": {"quick": "Charcot三聯徵=右上腹痛、發燒(寒顫)、黃疸,為急性膽管炎的典型表現,故選B。", "detail": {"background": "急性膽管炎(acute cholangitis)因膽管阻塞(多為總膽管結石)合併細菌感染所致。經典『Charcot三聯徵(Charcot's triad)』=①右上腹痛、②發燒(常伴寒顫)、③黃疸。若再加上『低血壓(休克)』與『意識改變』即為『Reynolds五聯徵(Reynolds' pentad)』,代表急性『化膿性』膽管炎、病情危重。治療關鍵是抗生素+『膽道引流(ERCP取石/放支架或PTCD)』,嚴重者緊急減壓。本題B正確。\\n\\n護理:辨識Charcot三聯與惡化為Reynolds五聯(休克、意識改變)→緊急引流;給抗生素、輸液、監測敗血。", "options": {"A": "右上腹痛+黃疸+嘔吐非標準Charcot三聯(缺發燒),不選。", "B": "正解:Charcot三聯=右上腹痛、發燒、黃疸。", "C": "休克+發燒+嘔吐非Charcot三聯。", "D": "白血球增高+休克+上腹痛非Charcot三聯。"}, "sources": ["Tokyo Guidelines (TG18) Acute Cholangitis", "Harrison 21e, Cholangitis"]}}, "105-TNPA-內科-50": {"quick": "肚臍周圍青紫色瘀血為『Cullen徵象』,提示腹腔/後腹腔出血(此例為出血性胰臟炎),故選A。", "detail": {"background": "急性胰臟炎兩個出血性徵象(數天後才出現,代表後腹腔出血滲入皮下):①『Cullen徵象』──『肚臍周圍』瘀青;②『Grey-Turner徵象』──『兩側腰脅(flank)』瘀青。兩者皆提示『出血性(壞死性)胰臟炎』或其他後腹腔出血(如腹主動脈瘤破裂、異位妊娠破裂),屬病情嚴重的指標。本例酗酒+膽結石+上腹痛輻射至背+amylase/lipase大量升高=急性胰臟炎,加上臍周瘀青→Cullen徵象。Rovsing徵象為闌尾炎、Obturator徵象為骨盆/闌尾刺激,皆非此例。\\n\\n護理:出現Cullen/Grey-Turner徵象提示嚴重出血性胰臟炎,須加護監測、評估壞死與併發症。", "options": {"A": "正解:臍周青紫瘀血為Cullen徵象,提示後腹腔出血(出血性胰臟炎)。", "B": "Rovsing徵象(壓左下腹引發右下腹痛)見於闌尾炎,不符。", "C": "Grey-Turner徵象是『腰脅』瘀青,非臍周,不符題述部位。", "D": "Obturator徵象為骨盆/闌尾刺激徵象,非瘀血徵象。"}, "sources": ["Harrison 21e, Acute Pancreatitis (Cullen/Grey-Turner)", "Sleisenger & Fordtran's"]}}, "105-TNPA-內科-51": {"quick": "酗酒+膽結石+上腹痛輻射至背+amylase/lipase大量升高+Cullen徵象→急性胰臟炎,故選C。", "detail": {"background": "承上題:急性胰臟炎兩大常見病因為『膽結石』與『酒精』(本例兩者皆有)。典型表現:上腹痛持續且輻射至背、噁心嘔吐、血清『脂肪酶(lipase)/澱粉酶(amylase)升高(常>正常上限3倍)』。重症可出現後腹腔出血徵象(Cullen/Grey-Turner)、低血鈣、器官衰竭。診斷依『三取二』:典型腹痛、酵素升高≥3倍、影像(CT/超音波)。膽囊炎以右上腹痛+Murphy為主、酵素不會大幅升;膽管炎以Charcot三聯為主;十二指腸炎無此酵素變化與出血徵象。\\n\\n護理:積極輸液、止痛、禁食、找病因(膽石/酒精/三酸甘油酯)、監測重症化(BISAP/Ranson)。", "options": {"A": "膽囊炎以右上腹痛+Murphy為主,酵素不會大幅升高,不符。", "B": "膽管炎以Charcot三聯(發燒黃疸右上腹痛)為主,不符。", "C": "正解:酵素大幅升高+Cullen徵象+酒膽病因→急性胰臟炎。", "D": "十二指腸炎無此酵素變化與出血徵象。"}, "sources": ["Revised Atlanta Classification of Acute Pancreatitis", "Harrison 21e, Acute Pancreatitis"]}}, "105-TNPA-內科-63": {"quick": "腹痛區域與臟器對應:本題正解為丁區疼痛來自小腸或盲腸(臍周/右下腹),選D。", "detail": {"background": "腹部依臟器投影與內臟轉移痛(referred pain)分區,常用九分法或四象限對應:①上腹(epigastric)正中區痛多來自『前腸(胃、十二指腸、肝膽胰)』;②臍周(periumbilical)區痛多來自『中腸(小腸、闌尾/盲腸、近端結腸)』;③下腹(hypogastric)區痛多來自『後腸(遠端結腸、直腸)與骨盆臟器』。膽道/腎結石痛多在右上腹/腰脅並可放射。本題以圖區對應,正解為『丁區疼痛來自小腸或盲腸』(對應中腸/臍周-右下區);其餘選項臟器配對與分區不符。掌握『前腸=上腹、中腸=臍周、後腸=下腹』即可推得。\\n\\n護理:依疼痛部位與轉移痛模式初步推測病灶來源,結合理學與影像確認。", "options": {"A": "甲區配對與前腸/上腹臟器不符,不正確。", "B": "乙/戊區配對膽道/腎結石的敘述不正確。", "C": "丙區配對大腸/直腸不正確(後腸對應下腹)。", "D": "正解:丁區疼痛來自小腸或盲腸(中腸,臍周-右下區)。"}, "sources": ["Bates' Guide to Physical Examination, Abdominal Pain", "Harrison 21e, Abdominal Pain (referred/visceral pain)"]}}, "106-106a-通論-53": {"quick": "本題轉移痛配對中,『外傷性脾臟破裂』之配對不適當(脾破裂轉移痛為左肩Kehr徵象),故選C。", "detail": {"background": "內臟轉移痛(referred pain)依胚胎神經支配投射到體表特定區:①十二指腸潰瘍穿孔→上腹/可牽涉背部;②膽結石絞痛/膽囊→右上腹並可轉移至『右肩胛/右肩』(膈神經/T5-9);③『脾臟破裂(膈下刺激)→轉移至『左肩(Kehr徵象)』』;④子宮/骨盆腔發炎→下腹/薦部。本題以圖標A–D配對,『C:外傷性脾臟破裂』的圖示位置配對較不適當(脾破裂應對應左上腹/左肩Kehr徵象,若圖中C位置不符即為錯誤配對),故為答案。重點概念:膽囊痛轉移右肩、脾破裂/膈刺激轉移左肩(Kehr sign)。\\n\\n護理:左上腹外傷後左肩痛要警覺脾破裂(Kehr徵象)與內出血;依轉移痛輔助定位。", "options": {"A": "十二指腸潰瘍穿孔之疼痛配對適當,非答案。", "B": "膽結石絞痛轉移右上腹/右肩之配對適當,非答案。", "C": "較不適當(正解):脾臟破裂應對應左上腹/左肩(Kehr徵象),此配對不適當。", "D": "子宮及骨盆腔發炎對應下腹/薦部之配對適當,非答案。"}, "sources": ["Bates' Guide, Referred Pain", "Harrison 21e, Abdominal Pain; Splenic injury (Kehr sign)"]}}, "106-106a-外科-55": {"quick": "無痛性黃疸+可觸及脹大膽囊(Courvoisier徵象)+體重減輕→壺腹周圍/胰頭惡性腫瘤,故選A。", "detail": {"background": "『Courvoisier定律/徵象』:出現『無痛性黃疸』且觸診可摸到『脹大但不痛的膽囊』時,膽道阻塞較不可能是結石(結石常致膽囊纖維化萎縮、且痛),而較可能是『惡性腫瘤(胰頭癌、壺腹周圍腫瘤、總膽管下端癌)』漸進阻塞總膽管導致膽囊被動脹大。本例70歲、進行性體重減輕、漸進黃疸、深色尿、無痛性右上腹腫塊、Courvoisier(+)→『壺腹周圍腫瘤(periampullary tumor)』(含胰頭癌、壺腹癌、遠端膽管癌、十二指腸癌)最符合。腎腫瘤不致阻塞性黃疸;膽囊腫瘤與肝門腫瘤的表現不同(肝門腫瘤膽囊不脹)。\\n\\n護理:無痛性黃疸+體重減輕要警覺胰頭/壺腹惡性,安排影像(CT/MRCP/EUS)與腫瘤標記(CA19-9);營養與黃疸照護。", "options": {"A": "正解:無痛性黃疸+Courvoisier徵象+消瘦→壺腹周圍腫瘤。", "B": "腎臟腫瘤不造成阻塞性黃疸與膽囊脹大,不符。", "C": "膽囊腫瘤的表現與此不同,且Courvoisier指向膽道下端阻塞。", "D": "肝門型腫瘤阻塞在膽囊管以上,膽囊不會脹大,不符Courvoisier。"}, "sources": ["Harrison 21e, Pancreatic and Periampullary Cancer", "Sleisenger & Fordtran's, Courvoisier's law"]}}, "107-TNPA-通論-21": {"quick": "Grey-Turner徵象(兩側腰脅瘀青)最可能為急性(出血性)胰臟炎,故選C。", "detail": {"background": "Grey-Turner徵象=『兩側腰脅(flank)』皮膚瘀青,反映『後腹腔出血』滲入皮下,典型見於『急性出血性/壞死性胰臟炎』(也可見於後腹腔其他出血如腹主動脈瘤破裂、異位妊娠)。與之並列的Cullen徵象=臍周瘀青。兩者多在發病後數天出現,屬重症指標。闌尾炎、膽囊炎、腸阻塞皆無此徵象。\\n\\n護理:見Grey-Turner徵象要警覺重症出血性胰臟炎,加護監測與影像評估壞死/併發症。", "options": {"A": "闌尾炎以轉移性右下腹痛為主,無Grey-Turner徵象。", "B": "膽囊炎以右上腹痛+Murphy為主,無腰脅瘀青。", "C": "正解:Grey-Turner徵象→急性(出血性)胰臟炎。", "D": "腸阻塞以腹脹嘔吐、腸音變化為主,無此徵象。"}, "sources": ["Harrison 21e, Acute Pancreatitis", "Sleisenger & Fordtran's"]}}, "107-TNPA-通論-26": {"quick": "Ranson criteria不含『鹼性磷酸酶(ALP)』;入院項目為年齡>55、WBC>16000、血糖>200、LDH、AST,故選D。", "detail": {"background": "Ranson準則評估急性胰臟炎嚴重度與死亡率,分『入院時(5項)』與『48小時內(6項)』:入院時──①年齡>55歲、②白血球>16,000/μL、③血糖>200 mg/dL、④血清LDH>350 IU/L、⑤AST(GOT)>250 IU/L;48小時──血比容下降>10%、BUN上升>5 mg/dL、血鈣<8 mg/dL、PaO2<60、鹼缺失>4、體液隔離>6L。『鹼性磷酸酶(ALP)』『不在』Ranson準則內(ALP屬膽汁鬱積指標),故D為答案。分數越高死亡率越高。現也用BISAP、APACHE II、CT嚴重度指數。\\n\\n護理:入院48小時內追蹤Ranson項目評估重症化,重症者加護照護。", "options": {"A": "年齡>55歲是Ranson入院項目,屬之。", "B": "WBC>16000是Ranson入院項目,屬之。", "C": "血糖>200是Ranson入院項目,屬之。", "D": "正解:ALP>250非Ranson準則項目(屬膽汁鬱積指標)。"}, "sources": ["Ranson Criteria for Acute Pancreatitis", "Harrison 21e, Acute Pancreatitis severity"]}}, "107-TNPA-外科-48": {"quick": "膽道積氣(pneumobilia)是膽道與腸道相通或括約肌功能喪失所致;單純『膽囊切除術』不會造成膽道積氣,故選C。", "detail": {"background": "膽道積氣(pneumobilia,膽管內出現氣體)的原因是『膽道與腸道間有交通』或『Oddi括約肌功能喪失/被破壞』,使腸氣或產氣菌之氣體進入膽道:①反覆膽管炎(產氣菌感染);②膽囊/膽管十二指腸瘻管(如膽結石侵蝕入腸,可致膽石性腸阻塞gallstone ileus);③內視鏡括約肌切開術(ES/EST)或膽腸吻合術(膽道與腸道相通);④產氣性膽道感染。而『單純膽囊切除術(cholecystectomy)』不會使膽道與腸道相通,Oddi括約肌完整,故『不會』造成膽道積氣(選C)。需與『門靜脈積氣(portal venous gas,提示腸壞死)』鑑別:pneumobilia氣體位於肝門中央、portal gas位於肝周邊。\\n\\n護理:影像見pneumobilia要追問膽道手術/括約肌切開/膽腸瘻史;與門靜脈積氣(危急)鑑別。", "options": {"A": "反覆膽管炎(產氣菌)可致膽道積氣,屬其原因。", "B": "膽囊十二指腸瘻管使膽道與腸道相通,可致膽道積氣。", "C": "正解:單純膽囊切除術不使膽腸相通,不會造成膽道積氣。", "D": "內視鏡括約肌切開術破壞Oddi括約肌,腸氣可逆入膽道,屬其原因。"}, "sources": ["Sleisenger & Fordtran's, Biliary tract; Pneumobilia", "Harrison 21e, Gallstone Ileus"]}}, "107-TNPA-外科-51": {"quick": "T-tube引流『驟減』且伴發燒腹痛,提示扭折/阻塞/滑脫等異常,不代表膽管暢通可移除,故D錯誤。", "detail": {"background": "總膽管探查取石後放置『T形管(T-tube)』引流膽汁、維持膽道通暢並待瘻管成熟(常2–6週後經膽道攝影確認無殘石/狹窄才移除)。術後T-tube引流量『驟減』且合併『發燒、腹痛』屬異常,可能為:①T-tube扭折(kinking);②阻塞(血塊/泥沙/碎石);③『自總膽管滑脫』──膽汁改由腹腔(Jackson-Pratt引流管)大量流出+膽汁性腹膜炎(發燒腹痛)。這些都需評估處理,『不可』把引流量減少誤判為膽管暢通而移除T-tube(過早或在異常情況下移除會致膽汁滲漏/腹膜炎)。故D錯誤。\\n\\n護理:記錄T-tube引流量/性狀,引流驟減+發燒腹痛要評估扭折/阻塞/滑脫;移除前需膽道攝影確認通暢無殘石。", "options": {"A": "正確:T-tube可能扭折致引流量減少。", "B": "正確:T-tube可能被血塊/碎石阻塞。", "C": "正確:若JP管出現大量膽汁,可能T-tube自總膽管滑脫。", "D": "錯誤(正解):引流驟減+發燒腹痛屬異常,不代表膽管暢通,不可逕行移除。"}, "sources": ["Sabiston, Common Bile Duct Exploration and T-tube management", "Sleisenger & Fordtran's"]}}, "107-TNPA-外科-53": {"quick": "胰十二指腸切除(Whipple)後最易滲漏的是『胰–空腸吻合處(胰瘻)』,故選A。", "detail": {"background": "胰十二指腸切除術(pancreaticoduodenectomy, Whipple)用於胰頭/壺腹周圍腫瘤,需重建三個吻合:①胰–空腸(或胰–胃)吻合;②總肝管(膽管)–空腸吻合;③胃–空腸吻合。其中『胰–空腸吻合處』最易發生滲漏,形成『術後胰瘻(postoperative pancreatic fistula, POPF)』──因胰臟質地軟、胰管細、胰液(含活化酵素)具腐蝕性,癒合差,是Whipple術後最重要且致命的併發症(可致腹腔感染、出血)。引流液澱粉酶升高可診斷。\\n\\n護理:監測腹腔引流量與性狀及引流液澱粉酶、警覺發燒/腹痛/出血(胰瘻可侵蝕血管致延遲出血)、營養支持(必要時生長抑素類似物減少胰液)。", "options": {"A": "正解:胰–空腸吻合處最易滲漏(術後胰瘻),為Whipple最重要併發症。", "B": "膽管–空腸吻合滲漏較少見,非最易。", "C": "胃–空腸吻合滲漏較少。", "D": "空腸–空腸吻合滲漏少見。"}, "sources": ["Sabiston, Pancreaticoduodenectomy; POPF", "ISGPS Definition of Postoperative Pancreatic Fistula"]}}, "108a-TNPA-通論-7": {"quick": "餐後右上腹痛輻射至背、深呼吸右上腹壓痛加劇(Murphy)、無黃疸→急性膽囊炎。", "detail": {"background": "(與105-TNPA-通論-3同型)急性膽囊炎:進食後右上腹痛、輻射右肩背、噁心嘔吐、Murphy徵象陽性(深吸氣觸右上腹致吸氣中止),早期可無黃疸。鑑別:胰臟炎(上腹痛+酵素升高)、腸胃炎(腹瀉腸音亢進)、闌尾炎(轉移右下腹)。診斷以超音波(膽囊壁增厚、結石、周圍積液、超音波Murphy)。治療:禁食輸液、抗生素、止痛、(早期)腹腔鏡膽囊切除。\\n\\n護理:評估Murphy與發燒、禁食輸液抗生素止痛、術前準備。", "options": {"A": "正解:餐後右上腹痛+Murphy徵象→急性膽囊炎。", "B": "急性胰臟炎以上腹痛+酵素升高為主,Murphy非其徵象。", "C": "急性腸胃炎以腹瀉嘔吐、腸音亢進為主。", "D": "闌尾炎以轉移性右下腹痛為主。"}, "sources": ["Tokyo Guidelines (TG18) Acute Cholecystitis", "Harrison 21e, Gallbladder Disease"]}}, "108a-TNPA-通論-13": {"quick": "Grey-Turner徵象(兩側腰脅瘀青)最可能為急性(出血性)胰臟炎,故選C。", "detail": {"background": "Grey-Turner徵象=兩側腰脅瘀青,反映後腹腔出血,典型見於急性出血性/壞死性胰臟炎(與臍周瘀青Cullen徵象並列),屬重症指標。闌尾炎、膽囊炎、腸阻塞皆無此徵象。\\n\\n護理:見Grey-Turner徵象警覺重症出血性胰臟炎,加護監測壞死/併發症。", "options": {"A": "闌尾炎以轉移性右下腹痛為主,無腰脅瘀青。", "B": "膽囊炎以右上腹痛+Murphy為主,無此徵象。", "C": "正解:Grey-Turner徵象→急性(出血性)胰臟炎。", "D": "腸阻塞以腹脹嘔吐為主,無此徵象。"}, "sources": ["Harrison 21e, Acute Pancreatitis", "Sleisenger & Fordtran's"]}}, "108b-TNPA-通論-36": {"quick": "本例為『下腹』壓痛,膽囊炎以『右上腹』痛為主,故膽囊炎最不可能,選B。", "detail": {"background": "依疼痛『部位』鑑別急腹症:急性膽囊炎以『右上腹』痛+Murphy徵象為主;而本例為『下腹』壓痛+發炎指標升高(WBC 13000、CRP升高)──較符合『右下腹的急性闌尾炎、左下腹的大腸憩室炎、或泌尿道結石合併感染』等下腹病灶。故就疼痛部位而言,『急性膽囊炎(右上腹)最不可能』(選B)。題幹另提服用胃潰瘍藥,但壓痛在下腹,故重點是部位定位。\\n\\n護理:以疼痛部位+理學徵象+影像定位病灶;下腹痛優先考慮闌尾炎/憩室炎/泌尿道,而非膽囊炎。", "options": {"A": "急性盲腸(闌尾)炎可致右下腹痛,符合下腹壓痛,可能。", "B": "最不可能(正解):膽囊炎以右上腹痛為主,與本例下腹壓痛不符。", "C": "大腸憩室炎可致左下腹痛,符合下腹壓痛,可能。", "D": "尿路結石合併發炎可致下腹/腰部痛,可能。"}, "sources": ["Harrison 21e, Acute Abdomen (localization)", "Bates' Guide"]}}, "108a-TNPA-外科-48": {"quick": "Charcot三聯徵是發燒、右上腹痛、『黃疸』;若把第三項寫成『休克』即錯(休克屬Reynolds五聯),故C錯誤。", "detail": {"background": "急性膽管炎(acute cholangitis)要點:①任何造成膽管阻塞者(結石、良性狹窄、『惡性腫瘤』、寄生蟲)皆可引起(A正確);②常見致病菌為腸內菌:『E. coli、Klebsiella、Enterococcus』等(B正確);③典型『Charcot三聯徵=發燒(寒顫)、右上腹痛、黃疸(阻塞性)』;若再加低血壓(休克)與意識改變即為『Reynolds五聯徵』(化膿性膽管炎)。本題C把Charcot三聯寫成『發燒、阻塞性黃疸、休克』──『休克』不屬Charcot三聯(屬Reynolds五聯),故C錯誤;④膽管炎為急症,需抗生素+膽道引流(D正確,需用抗生素且須引流)。\\n\\n護理:辨識Charcot三聯與惡化為Reynolds五聯,給抗生素並緊急ERCP/PTCD引流。", "options": {"A": "正確:任何膽管阻塞因素(含惡性腫瘤)都可引起急性膽管炎。", "B": "正確:常見菌為Klebsiella、E. coli、Enterococcus等腸內菌。", "C": "錯誤(正解):Charcot三聯為發燒、右上腹痛、黃疸;『休克』屬Reynolds五聯,非三聯。", "D": "正確:急性膽管炎為嚴重疾病,需使用抗生素(並引流)。"}, "sources": ["Tokyo Guidelines (TG18) Acute Cholangitis", "Harrison 21e, Cholangitis"]}}, "108b-TNPA-外科-49": {"quick": "開腹膽囊切除術的總膽管損傷率『低於』腹腔鏡術式;說開腹比腹腔鏡易傷總膽管是錯的,故選C。", "detail": {"background": "肝膽手術併發症:①膽汁滲漏形成『膽汁瘤(biloma)』──多以『經皮穿刺引流』處理(A正確);②大範圍肝切除後剩餘肝實質不足→術後肝衰竭(B正確);③『腹腔鏡膽囊切除術的總膽管損傷率反而略高於開腹術式』(因視野/解剖辨識限制,尤其學習曲線、嚴重發炎時),故『開腹比腹腔鏡易造成總膽管損傷』敘述錯誤(C為答案);④疑似總膽管損傷可用『ERCP』(逆行性膽胰管攝影)確診並可置支架處理膽漏(D正確)。預防膽管損傷重在辨識『critical view of safety』。\\n\\n護理:術後監測膽汁滲漏(發燒、腹痛、引流膽汁)、黃疸;疑膽管損傷安排ERCP/MRCP。", "options": {"A": "正確:膽汁瘤(biloma)通常以經皮穿刺引流處理。", "B": "正確:大範圍肝切除可因剩餘肝功能不足致肝衰竭。", "C": "錯誤(正解):腹腔鏡膽囊切除的總膽管損傷率略高於開腹,非開腹較易。", "D": "正確:疑總膽管損傷可用ERCP確診(並處理)。"}, "sources": ["Sabiston, Cholecystectomy complications (bile duct injury)", "Sleisenger & Fordtran's"]}}, "108a-TNPA-內科-50": {"quick": "急性無結石性膽囊炎病情常較重、易壞疽穿孔,並非多數只需保守治療,故D不正確。", "detail": {"background": "急性『無結石性』膽囊炎(acalculous cholecystitis):①僅佔急性膽囊炎少數(約5–10%)(A正確);②臨床表徵與結石性相似(右上腹痛、發燒、Murphy)但常較不典型(B正確);③好發於『重症/壓力狀態』:嚴重燒傷、重大外傷、大手術後、長期禁食/全靜脈營養、敗血、加護病房、機械通氣者(膽囊缺血與膽汁鬱積)(C正確);④病程進展快、易『壞疽、穿孔』、死亡率較高,『並非多數只需保守治療』──常需緊急『經皮膽囊造口引流(percutaneous cholecystostomy)』或膽囊切除(尤其重症無法手術者先引流),故D不正確(為答案)。\\n\\n護理:重症/長期禁食者出現不明原因發燒+右上腹痛要想到無結石性膽囊炎,及早影像與引流。", "options": {"A": "正確:佔急性膽囊炎少數。", "B": "正確:臨床表徵與結石性膽囊炎相似。", "C": "正確:好發於燒傷、嚴重外傷及重大手術後等重症狀態。", "D": "不正確(正解):病情常重、易壞疽穿孔,多需引流/手術,非多數保守治療。"}, "sources": ["Tokyo Guidelines (TG18)", "Harrison 21e, Acalculous Cholecystitis"]}}, "108a-TNPA-內科-52": {"quick": "膽固醇性膽結石的促發因子為肥胖/代謝症候群、女性懷孕(雌激素)、快速減重/長期TPN等;『慢性膽道發炎』非其促發因子,故選A。", "detail": {"background": "膽固醇性膽結石(cholesterol stones,最常見型)形成需『膽汁中膽固醇過飽和+膽囊運動低下(膽汁鬱積)+促成核因子』。促發因子(5F:Female、Forty、Fat、Fertile、Family,加上):①肥胖、代謝症候群、糖尿病、高脂血(膽固醇過飽和);②女性、懷孕、口服雌激素(雌激素增加膽固醇分泌、黃體素降膽囊收縮);③快速減重/減肥手術後、長期『全靜脈營養(TPN)』與長期禁食(膽囊不收縮、膽汁鬱積);④某些藥物(fibrate、ceftriaxone)、迴腸疾病/切除(膽鹽流失)。而『慢性膽道發炎』本身並非膽固醇結石的『促發因子』(反而結石可致發炎;慢性發炎較與色素性結石/感染相關),故A為答案。\\n\\n護理:衛教控制體重(避免快速減重)、規律進食避免長期禁食、TPN者注意膽汁鬱積;女性荷爾蒙因素。", "options": {"A": "正解:慢性膽道發炎非膽固醇結石的促發因子(較與色素性結石/感染相關)。", "B": "長期全靜脈營養使膽囊不收縮、膽汁鬱積,促成結石,是促發因子。", "C": "懷孕(雌/黃體素)促成膽固醇結石,是促發因子。", "D": "代謝症候群/肥胖使膽固醇過飽和,是促發因子。"}, "sources": ["Harrison 21e, Gallstones (cholesterol stone risk factors)", "Sleisenger & Fordtran's"]}}, "108b-TNPA-外科-61": {"quick": "急性膽管炎可用ERCP或PTC確診並『同時引流』兼具診斷與治療功效,故D正確。", "detail": {"background": "急性膽管炎要點:①典型為Charcot三聯(發燒寒顫、右上腹痛、黃疸),『大多數』病人會發燒(不是只有一半,故A『約一半發燒』偏低);②Charcot三聯是『發燒、右上腹痛、黃疸』,而非『黃疸、右上腹痛、血壓不穩』(後者把休克混入,故B錯);③Reynolds五聯(Charcot三聯+低血壓+意識改變)代表『化膿性』膽管炎、病危,但其發生率並非『約半數』(C的數字過高,化膿性/Reynolds五聯為少數重症,故C錯);④診斷與治療:『ERCP或PTC(經皮經肝膽道攝影)』可確診阻塞並『同時引流減壓/取石』,兼具診斷與治療(D正確)。\\n\\n護理:抗生素+輸液+及早膽道引流(ERCP/PTCD);監測惡化為Reynolds五聯。", "options": {"A": "錯誤:大多數急性膽管炎病人會發燒,非僅約一半。", "B": "錯誤:Charcot三聯為發燒、右上腹痛、黃疸,非『黃疸+右上腹痛+血壓不穩』。", "C": "錯誤:Reynolds五聯(化膿性)為少數重症,非約半數病人出現。", "D": "正確(正解):ERCP或PTC可確診並同時引流,兼具診斷與治療。"}, "sources": ["Tokyo Guidelines (TG18) Cholangitis", "Harrison 21e, Cholangitis"]}}, "109-進階-外科-34": {"quick": "慢性胰臟炎可因胰頭纖維化壓迫總膽管致黃疸、壓迫脾靜脈致脾腫大、並產生胰源性腹水,故C正確。", "detail": {"background": "慢性胰臟炎(chronic pancreatitis)為胰臟持續發炎致纖維化、鈣化與功能喪失。①最常見病因為『酒精』,而『吸菸』是獨立危險因子且加速進展(故『吸菸不會影響』錯誤)。②功能喪失順序:通常『外分泌不足(脂肪瀉、體重減輕、脂溶性維生素缺乏)』較早,『內分泌不足(糖尿病,胰源性第3c型)』較晚出現(故『內分泌先於外分泌』錯誤)。③併發症:胰頭纖維化/假囊腫可『壓迫總膽管→阻塞性黃疸』、壓迫/栓塞『脾靜脈→左側門脈高壓、脾腫大、胃靜脈曲張』、胰管破裂致『胰源性腹水』(C正確)。④酵素:慢性胰臟炎因腺體破壞,急性發作時澱粉酶/脂肪酶可僅輕度升高甚至『正常』(不一定升高),故D『會升高』不全對。\\n\\n護理:戒酒戒菸、胰酵素補充與營養(脂溶性維生素)、控制疼痛、監測糖尿病與併發症。", "options": {"A": "錯誤:酒精是最常見原因,但『吸菸』也會影響(加速進展),非不影響。", "B": "錯誤:通常外分泌不足先出現,內分泌(糖尿病)較晚。", "C": "正確(正解):可致黃疸、脾腫大(脾靜脈受壓)、胰源性腹水。", "D": "錯誤:慢性胰臟炎酵素不一定升高(腺體已破壞,可正常或僅輕升)。"}, "sources": ["Harrison 21e, Chronic Pancreatitis", "Sleisenger & Fordtran's"]}}, "109-進階-外科-45": {"quick": "原發性硬化性膽管炎(PSC)進展至末期肝硬化時肝移植可提升存活,但移植後仍可能復發,故D正確。", "detail": {"background": "原發性硬化性膽管炎(primary sclerosing cholangitis, PSC):①為『膽道』慢性發炎纖維化致多處狹窄(膽道攝影呈『串珠樣beads-on-a-string』),病因為免疫媒介(非病毒性肝炎引起,故A錯),與『發炎性腸道疾病(尤其潰瘍性結腸炎)』高度相關,自體抗體常見p-ANCA。②是『膽管癌(cholangiocarcinoma)』的重要危險因子,但『並非大多數病人都會得膽管癌』(終生風險約10–15%,故B『大多數會』錯)。③目前『無有效藥物能改變其自然病程』(ursodeoxycholic acid可改善生化但未證實改變存活;免疫抑制無效,故C錯)。④進展為末期肝硬化者『肝移植可提升存活率』,但『移植後PSC仍可能復發』(故D正確:增加存活但無法消除復發風險)。\\n\\n護理:PSC病人篩查IBD與大腸癌、監測膽管癌(CA19-9、影像)、處理膽道狹窄(ERCP擴張),末期評估移植。", "options": {"A": "錯誤:PSC為免疫媒介膽道病,非肝炎病毒引起。", "B": "錯誤:PSC是膽管癌危險因子,但非大多數病人都會發生膽管癌。", "C": "錯誤:目前無針對病因的藥物能改變PSC自然病史。", "D": "正確(正解):末期肝硬化者肝移植可增加存活,但移植後仍可能復發。"}, "sources": ["AASLD/EASL PSC Guidelines", "Harrison 21e, Primary Sclerosing Cholangitis"]}}, "109-進階-內科-61": {"quick": "慢性胰臟炎導致的糖尿病(胰源性/第3c型)胰島功能受損,治療最適當為『胰島素』,故選D。", "detail": {"background": "慢性胰臟炎(本例酗酒)會破壞胰島β細胞,造成『胰源性糖尿病(type 3c diabetes)』,常合併胰高血糖素分泌也受損→血糖控制不穩、易低血糖(brittle)。因β細胞功能與胰島素分泌不足,治療『首選胰島素』(尤其體重減輕、控制不佳、酵素分泌不足者)。口服藥限制:metformin(雖可用但有乳酸中毒疑慮且本例消瘦)、磺醯尿素類(glipizide,需β細胞分泌、易低血糖)、GLP-1受體促效劑(liraglutide,胰臟炎病史者『相對禁忌/謹慎』,且可能加重消化道症狀)皆非最適當。故選insulin。\\n\\n護理:胰源性糖尿病以胰島素治療並衛教低血糖風險、合併胰酵素補充與營養、戒酒。", "options": {"A": "metformin於消瘦/胰臟病變者非首選且有乳酸中毒疑慮。", "B": "磺醯尿素需β細胞分泌、易低血糖,胰源性糖尿病不適合。", "C": "GLP-1受體促效劑於胰臟炎病史者須謹慎/相對禁忌。", "D": "正解:胰源性糖尿病(type 3c)胰島功能不足,以胰島素治療最適當。"}, "sources": ["ADA Standards of Care (type 3c diabetes)", "Harrison 21e, Diabetes secondary to pancreatic disease"]}}, "109-進階-內科-66": {"quick": "急性膽道炎Charcot三聯=右上腹痛、發燒寒顫、黃疸,故選A。", "detail": {"background": "Charcot三聯徵(Charcot's triad)=①右上腹痛、②發燒(伴寒顫)、③黃疸,為急性膽管炎的典型。再加上④低血壓(休克)、⑤意識改變=Reynolds五聯徵(化膿性膽管炎,病危)。治療為抗生素+膽道引流(ERCP/PTCD)。本題A完全符合(右上腹痛、發燒寒顫、黃疸)。其他選項把部位寫成『上腹痛』或以嘔吐/白血球替代黃疸皆不符。\\n\\n護理:辨識Charcot三聯,惡化為Reynolds五聯時緊急引流。", "options": {"A": "正解:右上腹痛+發燒寒顫+黃疸=Charcot三聯。", "B": "以嘔吐取代黃疸,不符Charcot三聯。", "C": "部位寫『上腹痛』而非右上腹,且為次佳,非標準表述。", "D": "以白血球增高取代黃疸,不符Charcot三聯。"}, "sources": ["Tokyo Guidelines (TG18) Cholangitis", "Harrison 21e, Cholangitis"]}}, "110-進階-內科-6": {"quick": "急性膽管炎對抗生素治療『反應差時須緊急膽道引流』,但敘述把它說成『對抗生素反應差』作為疾病特性並把引流當唯一手段的描述不正確,故D錯誤。", "detail": {"background": "急性膽管炎要點:①最常見病因為『膽道結石(總膽管結石)』(A正確);②典型Charcot三聯:右上腹痛、黃疸、發燒寒顫(B正確);③嚴重(化膿性)時可進展為敗血性休克與意識改變(Reynolds五聯)(C正確);④治療:多數病人對『抗生素+輸液』有反應,輕中度可先抗生素穩定後擇期引流;『並非對抗生素治療反應差』──重度或對初始治療無反應者才需『緊急』膽道引流(ERCP/PTCD)。故D把『對抗生素反應差、須緊急引流或手術』當作通則敘述不正確(膽管炎多數對抗生素有反應,引流時機依嚴重度)。本題以D為錯誤敘述。\\n\\n護理:給抗生素與輸液、依嚴重度(TG18)決定引流時機;監測敗血/休克。", "options": {"A": "正確:膽道結石是急性膽管炎最常見病因。", "B": "正確:常見右上腹痛、黃疸、發燒寒顫(Charcot三聯)。", "C": "正確:嚴重時可發生休克與意識改變(Reynolds五聯)。", "D": "錯誤(正解):膽管炎多數對抗生素治療有反應,引流時機依嚴重度;非『對抗生素反應差』。"}, "sources": ["Tokyo Guidelines (TG18) Acute Cholangitis (severity-based drainage)", "Harrison 21e, Cholangitis"]}}, "110-進階-內科-17": {"quick": "Cullen徵象(臍周瘀青)最可能為急性(出血性)胰臟炎,故選B。", "detail": {"background": "Cullen徵象=『肚臍周圍』皮膚瘀青,與Grey-Turner徵象(兩側腰脅瘀青)同為『後腹腔出血滲入皮下』的表現,典型見於『急性出血性/壞死性胰臟炎』(也可見於腹腔內出血如腹主動脈瘤破裂、異位妊娠破裂)。多在發病數天後出現,屬重症指標。膽囊炎、闌尾炎、肝炎皆無此徵象。\\n\\n護理:見Cullen/Grey-Turner徵象警覺重症出血性胰臟炎,加護監測並評估壞死/併發症。", "options": {"A": "膽囊炎以右上腹痛+Murphy為主,無臍周瘀青。", "B": "正解:Cullen徵象→急性(出血性)胰臟炎。", "C": "闌尾炎以轉移性右下腹痛為主,無此徵象。", "D": "肝炎無臍周瘀青徵象。"}, "sources": ["Harrison 21e, Acute Pancreatitis (Cullen sign)", "Sleisenger & Fordtran's"]}}, "110-進階-內科-43": {"quick": "酗酒者上腹痛輻射至背、腸音消失、臍周瘀青(Cullen)、低血壓→急性(出血性)胰臟炎,故選D。", "detail": {"background": "本例酒癮、上腹痛輻射至背、噁心嘔吐、發燒、心搏快、低血壓(88/50)、腸音消失(腸麻痺)、『臍周藍色(Cullen徵象)』→典型『急性胰臟炎』且為重症(出血性,合併休克與後腹腔出血)。酒精與膽結石是急性胰臟炎兩大病因。膽囊炎以右上腹痛Murphy為主;消化性潰瘍/穿孔以板狀腹、游離氣體為主(但無Cullen);腸阻塞以腹脹腸音變化為主。本例酵素雖未列,但臨床(酒+上腹痛輻射背+Cullen)足以指向胰臟炎。\\n\\n護理:積極輸液復甦、止痛、禁食、監測重症化(器官衰竭、低血鈣、壞死)。", "options": {"A": "膽囊炎以右上腹痛Murphy為主,無Cullen徵象與此酒精背景。", "B": "消化性潰瘍/穿孔以板狀腹、游離氣體為主,非Cullen徵象。", "C": "腸阻塞以腹脹、腸音變化為主,不符。", "D": "正解:酒癮+上腹痛輻射背+Cullen徵象+休克→急性出血性胰臟炎。"}, "sources": ["Harrison 21e, Acute Pancreatitis", "Revised Atlanta Classification"]}}, "110-進階-外科-57": {"quick": "急性膽管炎的三組合是『Charcot triad』(發燒、右上腹痛、黃疸),故選B。", "detail": {"background": "急性膽管炎的經典三聯為『Charcot triad』=發燒(寒顫)、右上腹痛、黃疸。其他選項是不同情境的三/組合徵:Beck's triad(心包填塞:頸靜脈怒張、低血壓、心音遙遠);Rigler triad(膽石性腸阻塞:腸阻塞+膽道積氣+異位膽石);Waddell triad(兒童被車撞的傷害組合:腹部/胸部、四肢、頭部)。故膽管炎對應Charcot triad。\\n\\n護理:辨識Charcot三聯與惡化為Reynolds五聯,給抗生素並引流。", "options": {"A": "Beck's triad為心包填塞的徵象,非膽管炎。", "B": "正解:Charcot triad(發燒、右上腹痛、黃疸)為急性膽管炎三組合。", "C": "Rigler triad為膽石性腸阻塞的影像三徵,非膽管炎臨床三聯。", "D": "Waddell triad為兒童車禍傷害組合,非膽管炎。"}, "sources": ["Tokyo Guidelines (TG18) Cholangitis", "Harrison 21e"]}}, "110-通論-其他-80": {"quick": "餐後突發劇痛、板狀腹(肌肉緊繃)、廣泛反彈痛、腸音消失、抗拒移動且淺呼吸→消化性潰瘍穿孔致瀰漫性腹膜炎,故選A。", "detail": {"background": "本例『晚餐後突發劇痛、平躺靜止不敢動(移動加劇疼痛)、淺呼吸、板狀腹(肌肉緊繃)、廣泛反彈痛、腸音消失』──是『瀰漫性腹膜炎』的典型,最常見且最符合『消化性潰瘍穿孔』(胃十二指腸內容物突然進入腹腔刺激腹膜)。腹膜炎病人因動作牽動腹膜致劇痛,故『靜止不動、淺呼吸、抗拒移動』。鑑別:胰臟膿瘍破裂、闌尾膿瘍破裂、大腸癌穿孔也可致腹膜炎,但以突發劇痛+游離氣體最常見者為潰瘍穿孔(且站立X光多見橫膈下游離空氣)。\\n\\n護理:禁食、NG減壓、輸液、廣效抗生素、止痛,站立/左側躺X光找游離空氣,準備緊急手術。", "options": {"A": "正解:突發劇痛+板狀腹+廣泛反彈痛+腸音消失→消化性潰瘍穿孔之瀰漫性腹膜炎。", "B": "胰臟膿瘍破裂較少見且多有前驅胰臟炎病程,非最常見。", "C": "闌尾膿瘍破裂多先有右下腹痛病程,非突發全腹劇痛首選。", "D": "大腸癌壞死穿孔多有腫瘤/排便改變病史,較少如此急性突發。"}, "sources": ["Harrison 21e, Acute Abdomen / Peritonitis", "Sabiston, Perforated Peptic Ulcer"]}}, "111-進階-內科-43": {"quick": "小於5mm的小膽結石『較易』掉入並阻塞而引發胰臟炎,風險『較高』而非較低,故B錯誤。", "detail": {"background": "急性胰臟炎要點:①高三酸甘油酯血症(常TG>1000)可引發胰臟炎,常伴未控制的糖尿病(A正確);②膽結石與酒精是兩大病因(合計約70–80%);其中『小膽結石(尤其<5mm)更容易通過膽囊管掉入並暫時阻塞壺腹/胰管開口』而誘發胰臟炎,故『小結石發生胰臟炎機率較低』錯誤(應為較『高』)(B為答案);③ERCP後約5–10%發生『PEP(post-ERCP pancreatitis)』(C正確);④預防PEP:術前/術後經肛門『indomethacin/diclofenac塞劑』與『預防性胰管支架』(D正確)。\\n\\n護理:膽石性胰臟炎找並處理結石(必要時ERCP取石/膽囊切除);高TG者降血脂;ERCP後觀察PEP。", "options": {"A": "正確:高三酸甘油酯(常>1000)可引起胰臟炎,常伴未控糖尿病。", "B": "錯誤(正解):小於5mm的小結石較易阻塞誘發胰臟炎,風險較高而非較低。", "C": "正確:ERCP後約5–10%發生PEP。", "D": "正確:NSAID塞劑與預防性胰管支架可降低PEP。"}, "sources": ["ACG Acute Pancreatitis Guideline", "Harrison 21e, Acute Pancreatitis"]}}, "111-進階-內科-44": {"quick": "BISAP分數不含『血糖』;其5項為BUN>25、意識障礙、SIRS、年齡>60、肋膜積液,故A(血糖)為非,選A。", "detail": {"background": "BISAP(Bedside Index of Severity in Acute Pancreatitis)以5項(各1分,口訣B-I-S-A-P)於24小時內預測重症與死亡:①B=BUN>25 mg/dL;②I=Impaired mental status(意識障礙,GCS<15);③S=SIRS(全身性發炎反應≥2項);④A=Age>60歲;⑤P=Pleural effusion(肋膜積液)。分數≥3提示高死亡風險。『血糖>200』『不在』BISAP(那是Ranson入院項目),故A為答案(非BISAP指標)。\\n\\n護理:用BISAP快速床邊分層;高分者加護;與Ranson/APACHE互補。", "options": {"A": "正解(非BISAP):血糖>200不是BISAP指標(屬Ranson)。", "B": "意識障礙(GCS<15)是BISAP的I項。", "C": "SIRS≥2是BISAP的S項。", "D": "年齡>60與肋膜積液是BISAP的A、P項。"}, "sources": ["BISAP Score for Acute Pancreatitis", "ACG Acute Pancreatitis Guideline"]}}, "111-進階-內科-46": {"quick": "急性膽管炎抗生素治療下惡化(出現休克、意識改變=Reynolds五聯)→最關鍵是『立即緊急膽道引流(ERCP或PTCD)』,故選B。", "detail": {"background": "本例急性膽管炎(總膽管結石阻塞)經抗生素+輸液後仍惡化:血壓下降、心搏快、發燒39°C、嗜睡意識不清→進展為『Reynolds五聯徵(Charcot三聯+低血壓+意識改變)』,代表『急性化膿性膽管炎(膿性膽汁在高壓膽道)』,病危。最關鍵的處置是『立即膽道減壓引流(緊急ERCP取石/放支架,或PTCD)』──因感染源是阻塞高壓的膽道,單靠抗生素與升壓無法解決,『移除阻塞、引流膿性膽汁』才是救命關鍵。升壓劑/輸液、抗生素升階、轉ICU都是支持與輔助,但『引流』才是最關鍵的因果治療。\\n\\n護理:化膿性膽管炎要把握時間緊急引流;同時抗生素、輸液復甦、加護監測。", "options": {"A": "輸液升壓是支持治療,無法解除膽道阻塞感染源,非最關鍵。", "B": "正解:立即緊急ERCP或PTCD膽道引流為化膿性膽管炎的關鍵救命處置。", "C": "抗生素升階為輔助,單靠抗生素無法解除阻塞,非最關鍵。", "D": "轉ICU為加護支持,仍須引流解決病因,非最關鍵。"}, "sources": ["Tokyo Guidelines (TG18) — urgent biliary drainage", "Harrison 21e, Suppurative Cholangitis"]}}, "111-進階-內科-48": {"quick": "原發性膽汁性膽管炎(PBC)的特異性抗體是『抗粒線體抗體(AMA)』,故選C。", "detail": {"background": "原發性膽汁性膽管炎(primary biliary cholangitis, PBC;舊稱原發性膽汁性肝硬化)是自體免疫破壞『小葉間膽管』致慢性膽汁鬱積,好發中年女性,表現疲倦、搔癢、膽汁鬱積型肝指標(ALP/GGT升高)。血清標記為『抗粒線體抗體(anti-mitochondrial antibody, AMA)』陽性(尤其AMA-M2,特異性高,>90%病人陽性),IgM升高。治療首選『ursodeoxycholic acid(UDCA)』,反應不佳加obeticholic acid。對比:ANA見於自體免疫肝炎/SLE等;ANCA見於血管炎/PSC;ASMA(抗平滑肌抗體)見於自體免疫肝炎。故PBC對應AMA。\\n\\n護理:PBC衛教UDCA長期治療、處理搔癢(cholestyramine)、監測脂溶性維生素與骨質疏鬆、肝硬化追蹤。", "options": {"A": "ANA見於自體免疫肝炎/結締組織病,非PBC特異。", "B": "ANCA見於血管炎/PSC,非PBC特異。", "C": "正解:抗粒線體抗體(AMA)為PBC的特異性抗體。", "D": "ASMA(抗平滑肌抗體)為自體免疫肝炎的標記,非PBC。"}, "sources": ["AASLD/EASL PBC Guidelines", "Harrison 21e, Primary Biliary Cholangitis"]}}, "111-通論-5分科-52": {"quick": "Cullen徵象代表腹腔/後腹腔出血;『急性腸繫膜缺血合併腸壞死破裂』較不以Cullen徵象表現,故最不可能,選D。", "detail": {"background": "Cullen徵象(臍周瘀青)反映『腹腔內/後腹腔出血』滲入皮下,常見原因:①急性出血性/壞死性胰臟炎;②腹主動脈瘤破裂(後腹腔大出血);③肝癌破裂(腹腔內出血);④異位妊娠破裂等。這些都以『出血』為機轉而可致Cullen徵象。相對地『急性腸繫膜缺血合併腸壞死破裂』主要造成腸壁壞死、腹膜炎與敗血,而非典型的『腹腔/後腹腔大量出血滲入皮下』,故『最不可能』以Cullen徵象表現(選D)。本例酗酒+慢性肝炎背景,Cullen徵象更易聯想胰臟炎/肝癌破裂/AAA。\\n\\n護理:見Cullen徵象要找出血來源(胰臟炎、AAA、肝癌破裂);腸缺血以乳酸升高、劇痛與理學不成比例為線索。", "options": {"A": "肝癌破裂為腹腔內出血,可致Cullen徵象,可能。", "B": "急性壞死性胰臟炎是Cullen徵象的典型原因,可能。", "C": "腹部主動脈瘤破裂為後腹腔大出血,可致Cullen徵象,可能。", "D": "最不可能(正解):腸繫膜缺血腸壞死以腹膜炎/敗血為主,非典型腹腔出血,較不致Cullen徵象。"}, "sources": ["Harrison 21e, Cullen sign causes; Mesenteric Ischemia", "Sleisenger & Fordtran's"]}}, "111-進階-內科-75": {"quick": "胰臟癌後腹腔淋巴轉移壓迫神經致『神經病變性疼痛』,輔助止痛可用gabapentin,故選A。", "detail": {"background": "癌症疼痛常為混合性:傷害感受性(內臟/體表)與『神經病變性(neuropathic)』疼痛。胰臟癌侵犯/壓迫後腹腔神經叢或淋巴轉移壓迫神經根,造成下肢麻刺、灼燒、電擊樣的神經病變性疼痛。除了鴉片類(morphine)外,『輔助鎮痛藥(adjuvant analgesics)』中針對神經病變性疼痛的首選為抗癲癇藥『gabapentin/pregabalin』(或三環抗憂鬱、SNRI如duloxetine)。haloperidol用於止吐/譫妄,calcitonin用於高血鈣/骨痛輔助,midazolam為鎮靜抗焦慮,皆非神經病變痛的對因輔助藥。胰臟癌頑固內臟痛也可考慮『腹腔神經叢阻斷(celiac plexus block)』。\\n\\n護理:評估疼痛性質(神經病變性→麻刺灼燒),合併鴉片+gabapentin類;衛教副作用(嗜睡、頭暈),腎功能調整劑量。", "options": {"A": "正解:gabapentin為神經病變性疼痛的輔助鎮痛藥,可與morphine併用。", "B": "haloperidol用於止吐/譫妄,非神經病變痛輔助藥。", "C": "calcitonin用於高血鈣或骨痛輔助,非神經病變痛首選。", "D": "midazolam為鎮靜抗焦慮藥,非鎮痛輔助藥。"}, "sources": ["WHO Cancer Pain Ladder; Adjuvant analgesics", "Harrison 21e, Cancer Pain Management"]}}, "112-進階-內科-41": {"quick": "淋巴瘤類固醇+NSAID使用者突發上腹痛、板狀腹、站立X光橫膈下游離氣體→消化性潰瘍合併穿孔,故選B。", "detail": {"background": "本例淋巴瘤接受『類固醇』治療+止痛用『NSAID』──兩者皆增加消化性潰瘍與穿孔風險(類固醇與NSAID合用風險加乘)。臨床:持續上腹痛、『翻身時腹痛加劇、臥位雙膝屈起(腹膜炎避痛姿勢)、腹壁僵硬(板狀腹)壓痛』、且『站立腹部X光見橫膈下游離氣體(free air/pneumoperitoneum)』→確診『消化性潰瘍合併穿孔』致瀰漫性腹膜炎。游離氣體是空腔臟器穿孔的關鍵證據。上消化道出血以吐血/黑便為主、急性胰臟炎以酵素升高、膽結石以右上腹Murphy為主,皆不符游離氣體+板狀腹。\\n\\n護理:禁食、NG減壓、輸液、抗生素、止痛,準備緊急手術修補;此類高風險用藥者應預防性PPI。", "options": {"A": "上消化道出血以吐血/黑便為主,不會有游離氣體與板狀腹。", "B": "正解:類固醇+NSAID致潰瘍穿孔,板狀腹+橫膈下游離氣體可確診。", "C": "急性胰臟炎以酵素升高為主,不會有游離氣體。", "D": "膽結石以右上腹痛Murphy為主,無游離氣體。"}, "sources": ["Harrison 21e, Peptic Ulcer Perforation", "Sabiston, Pneumoperitoneum"]}}, "112-進階-內科-45": {"quick": "上腹劇痛+反彈痛+臍周藍色(Cullen)+左腰脅青紫(Grey-Turner)→急性(出血性)胰臟炎,故選D。", "detail": {"background": "本例同時出現『Cullen徵象(臍周藍色)』與『Grey-Turner徵象(腰脅青紫)』──兩者皆為後腹腔出血滲入皮下的表現,是『急性出血性/壞死性胰臟炎』的特徵性(且重症)徵象。加上上腹劇痛與反彈痛,診斷為急性胰臟炎。闌尾炎(右下腹)、膽囊炎(右上腹Murphy)、膽道炎(Charcot三聯)皆無這兩個出血徵象。\\n\\n護理:見Cullen+Grey-Turner要警覺重症出血性胰臟炎,加護監測器官衰竭與壞死併發症。", "options": {"A": "闌尾炎以右下腹痛為主,無Cullen/Grey-Turner。", "B": "膽囊炎以右上腹痛Murphy為主,無此出血徵象。", "C": "膽道炎以Charcot三聯為主,無此出血徵象。", "D": "正解:Cullen+Grey-Turner徵象→急性出血性胰臟炎。"}, "sources": ["Harrison 21e, Acute Pancreatitis", "Sleisenger & Fordtran's"]}}, "112-進階-外科-54": {"quick": "第四期癌、免疫低下、敗血不穩的急性膽囊炎(重度)應先做『經皮膽囊造口引流』而非立即手術,故A錯誤。", "detail": {"background": "急性膽囊炎依Tokyo Guidelines分級:輕度(I)、中度(II)、重度(III,合併器官功能不全)。處置依嚴重度與手術風險:①低風險者早期腹腔鏡膽囊切除為佳;②『重度(III級,如本例白血球低下、血壓下降=器官功能不全/敗血)』或手術高風險(末期癌、剛化療、共病多、免疫低下)者,『先以經皮膽囊造口引流(percutaneous cholecystostomy)』減壓控制感染、穩定後再評估手術,而『不應在不穩定時立即手術』(A錯誤)。本例第四期直腸癌+剛化療+白血球低下+血壓下降→屬重度,應先引流。\\n\\n護理:重度膽囊炎/高風險者先引流穩定;禁食、抗生素、輸液;待病情改善再評估膽囊切除。", "options": {"A": "錯誤(正解):免疫低下、敗血不穩者不應立即手術,應先經皮膽囊造口引流。", "B": "正確:共病+免疫低下者先做經皮膽囊造口引流較安全。", "C": "正確:合併器官功能不全(白血球低、低血壓)屬重度膽囊炎。", "D": "正確:應空腹禁食並給予抗生素。"}, "sources": ["Tokyo Guidelines (TG18) Acute Cholecystitis (severity & cholecystostomy)", "Harrison 21e"]}}, "112-通論-其他-56": {"quick": "腰側(flank)瘀青為Grey-Turner徵象,代表『後腹腔出血』,故選B。", "detail": {"background": "腰側(flank)瘀青=『Grey-Turner徵象』,代表『後腹腔出血』滲入皮下(臍周瘀青則為Cullen徵象)。常見原因為急性出血性/壞死性胰臟炎、腹主動脈瘤破裂、後腹腔出血等。本題A錯(該徵象為Grey-Turner非Cullen);C錯(最常見於出血性胰臟炎/後腹腔出血而非肝癌破裂;肝癌破裂多為腹腔內出血);D錯(Grey-Turner反映後腹腔出血,而移動性濁音shifting dullness是『腹水/腹腔內游離液體』的徵象,兩者機轉不同,不必然合併)。故B正確。\\n\\n護理:見Grey-Turner徵象警覺後腹腔出血(出血性胰臟炎、AAA);評估血行動力與影像。", "options": {"A": "錯誤:腰側瘀青為Grey-Turner徵象,Cullen是臍周瘀青。", "B": "正確(正解):腰側瘀青(Grey-Turner)代表後腹腔出血。", "C": "錯誤:最常見於出血性胰臟炎/後腹腔出血,肝癌破裂多為腹腔內出血。", "D": "錯誤:移動性濁音反映腹水(腹腔內液體),非後腹腔出血,兩者不必然合併。"}, "sources": ["Harrison 21e, Grey-Turner sign", "Sleisenger & Fordtran's"]}}, "112-進階-外科-78": {"quick": "『無症狀』膽結石通常不建議預防性膽囊切除(僅特定高風險才考慮),故A錯誤。", "detail": {"background": "膽結石要點:①大多數膽結石『無症狀』,終生僅少數會出現症狀或併發症,故『無症狀膽結石通常觀察追蹤,不建議常規預防性切除』──僅在特定高風險情況才考慮預防性膽囊切除:如『瓷化膽囊(porcelain gallbladder,癌變風險)』、大結石(>3cm)、合併膽囊息肉>1cm、某些族群(膽囊癌高發地區/原住民)、與重大手術同時進行或免疫低下等。故A『無症狀也可考慮預防性切除』作為通則『錯誤』。②膽道絞痛常由高脂飲食誘發膽囊收縮(B正確);③疼痛可放射至背部與右肩(C正確);④膽絞痛多持續30分鐘至數小時(D正確)。\\n\\n護理:無症狀膽結石衛教觀察、認識膽絞痛誘因與警訊(發燒、黃疸、持續痛→併發症);有症狀或併發症才手術。", "options": {"A": "錯誤(正解):無症狀膽結石通常不建議預防性切除(僅特定高風險才考慮)。", "B": "正確:高脂食物可誘發膽道絞痛。", "C": "正確:膽絞痛可放射至背部及右肩。", "D": "正確:膽絞痛多持續30分鐘至數小時。"}, "sources": ["Sleisenger & Fordtran's, Asymptomatic Gallstones", "Harrison 21e, Gallstones"]}}, "113-進階-家庭-17": {"quick": "Rovsing徵象(壓左下腹引發右下腹痛)陽性最可能為急性闌尾炎,故選C。", "detail": {"background": "急性闌尾炎的理學徵象:①McBurney點壓痛(右下腹);②『Rovsing徵象』──按壓『左』下腹卻引發『右』下腹疼痛(腹膜刺激轉移);③腰肌徵象(psoas sign)、閉孔肌徵象(obturator sign);④反彈痛。本題Rovsing徵象陽性→急性闌尾炎。膽囊炎為Murphy徵象、胰臟炎為上腹痛+酵素、肝炎為肝指標升高,皆非Rovsing。\\n\\n護理:右下腹痛+Rovsing/McBurney/反彈痛要評估闌尾炎,禁食、輸液、抗生素、外科會診(闌尾切除)。", "options": {"A": "膽囊炎對應Murphy徵象,非Rovsing。", "B": "胰臟炎以上腹痛+酵素升高為主,非Rovsing。", "C": "正解:Rovsing徵象陽性→急性闌尾炎。", "D": "肝炎以肝指標升高為主,無Rovsing徵象。"}, "sources": ["Bates' Guide, Appendicitis signs", "Harrison 21e, Acute Appendicitis"]}}, "113-進階-內科-26": {"quick": "上腹劇痛+lipase 2935(>正常3倍)、amylase升高,而膽紅素/肝指標正常→急性胰臟炎,故選D。", "detail": {"background": "急性胰臟炎診斷『三取二』:①典型上腹痛(可輻射至背);②血清『脂肪酶(lipase)或澱粉酶(amylase)升高>正常上限3倍』(lipase更specific且持續較久);③影像(CT/US/MRI)符合。本例lipase 2935、amylase 559(顯著升高>3倍),AST/ALT/膽紅素正常(非膽囊炎/膽管炎/肝病),血液濃縮(Hb16.6,反映體液隔離脫水)→急性胰臟炎。急性心肌梗塞應查心電圖/troponin;十二指腸潰瘍不會使lipase飆高;膽囊炎以右上腹Murphy為主、酵素不會如此高。\\n\\n護理:積極輸液(血液濃縮提示脫水)、止痛、禁食、找病因、監測重症化。", "options": {"A": "膽囊炎酵素不會大幅升高,以右上腹Murphy為主,不符。", "B": "心肌梗塞應以心電圖/troponin診斷,非lipase升高。", "C": "十二指腸潰瘍不會使lipase顯著升高。", "D": "正解:上腹痛+lipase>3倍→急性胰臟炎。"}, "sources": ["Revised Atlanta Classification", "Harrison 21e, Acute Pancreatitis (diagnosis)"]}}, "113-進階-家庭-38": {"quick": "急性胰臟炎恢復飲食應以『低脂』為主(高脂刺激胰液),『低脂高醣高蛋白』中的高脂概念須修正,故B錯誤。", "detail": {"background": "急性胰臟炎要點:①病因最常見為膽結石與酒精(A正確);②飲食/營養:急性期『腹痛未改善前禁食(讓胰臟休息)』(C正確),恢復進食時採『低脂』飲食(高脂會刺激胰臟分泌酵素加重發炎);輕症可早期經口低脂進食,重症優先『腸道營養(經鼻空腸)』優於全靜脈營養。本題B『營養支持以低脂、高醣和高蛋白』──重點應強調『低脂』,題目以B為錯誤敘述(因其營養描述不恰當/與標準『低脂為主』的重點及進食時機原則不一致,故選為錯誤);③持續強烈腹痛常需鴉片類止痛(D正確)。\\n\\n護理:急性期禁食/止痛/輸液,恢復期低脂少量多餐;重症優先腸道營養;戒酒、處理膽石病因。", "options": {"A": "正確:急性胰臟炎最常見病因為膽結石與酒精。", "B": "錯誤(正解):營養應強調『低脂』為主,此敘述的營養組合不恰當(高脂刺激胰液)。", "C": "正確:腹痛未改善前不宜由口進食(讓胰臟休息)。", "D": "正確:持續強烈腹痛常需鴉片類止痛。"}, "sources": ["ACG Acute Pancreatitis Guideline (nutrition)", "Harrison 21e, Acute Pancreatitis"]}}, "113-進階-家庭-39": {"quick": "右上腹痛數天+發燒寒顫+Murphy徵象陽性→急性膽囊炎,故選C。", "detail": {"background": "急性膽囊炎:右上腹痛(可輻射右肩背)、發燒、噁心嘔吐、『Murphy徵象陽性』(深吸氣觸右上腹致吸氣中止)。本例右上腹悶痛數天+發燒39°C畏寒+Murphy(+)→急性膽囊炎。雖有發燒畏寒,但若『無明顯黃疸』則較偏膽囊炎而非膽管炎(膽管炎為Charcot三聯含黃疸);胰臟炎以上腹痛+酵素升高為主;肝炎以肝指標升高為主;肝膿瘍多有右上腹痛+發燒但Murphy未必陽性、影像見膿瘍。Murphy徵象是膽囊炎的關鍵。\\n\\n護理:評估Murphy與發燒、禁食輸液抗生素、超音波確認、(早期)膽囊切除。", "options": {"A": "急性胰臟炎以上腹痛+酵素升高為主,Murphy非其徵象。", "B": "急性肝炎以肝指標升高為主,無Murphy徵象。", "C": "正解:右上腹痛+發燒寒顫+Murphy徵象→急性膽囊炎。", "D": "肝膿瘍Murphy未必陽性,需影像見膿瘍,非首選。"}, "sources": ["Tokyo Guidelines (TG18) Acute Cholecystitis", "Harrison 21e"]}}, "113-進階-家庭-42": {"quick": "年輕無肝病史、ALT980/AST820(肝細胞型,ALT>AST)、Alk-P僅輕升、Murphy陰性→急性肝炎,故選C。", "detail": {"background": "依肝指標型態鑑別黃疸:①『肝細胞型』──ALT/AST顯著升高(常數百至上千)、ALP僅輕度升、ALT>AST(病毒性);本例ALT980/AST820、Alk-P 125(僅輕升)→典型急性『肝細胞型』肝炎(病毒性可能性高,26歲、無慢性病)。②『膽汁鬱積/阻塞型』──ALP/GGT與膽紅素明顯升、ALT/AST相對較低,見於膽管結石阻塞、膽管癌;本例ALP不高,不符阻塞。③肝硬化為慢性、可有蜘蛛痣(本例無);④膽囊炎以右上腹Murphy為主(本例Murphy陰性)。故最可能為急性肝炎。\\n\\n護理:查病毒性肝炎血清標記、避免肝毒性藥與飲酒、支持治療、監測凝血/意識(猛爆性肝炎)。", "options": {"A": "肝硬化為慢性病程、常有stigmata(本例無蜘蛛痣),且非急性ALT上千型態。", "B": "急性膽囊炎以右上腹Murphy為主,本例Murphy陰性且為肝細胞型升高。", "C": "正解:ALT/AST大幅升高(肝細胞型)、ALP僅輕升、Murphy陰性→急性肝炎。", "D": "膽管結石阻塞應ALP/膽紅素明顯升高、ALT/AST相對較低,與本例不符。"}, "sources": ["Harrison 21e, Approach to Abnormal Liver Tests; Acute Hepatitis", "Sleisenger & Fordtran's"]}}, "113-通論-家庭-49": {"quick": "急性胰臟炎臍周淡藍/青紫瘀血(Cullen徵象)代表發生『出血性胰臟炎』,故選B。", "detail": {"background": "急性胰臟炎病人若在『臍周出現淡藍/青紫瘀血(Cullen徵象)』或『兩側腰脅瘀青(Grey-Turner徵象)』,代表後腹腔/腹腔內出血滲入皮下,即發生『出血性(壞死性)胰臟炎』──屬重症、預後較差的併發症指標。胰臟假囊腫(數週後形成的液體積聚)、胰臟膿瘍(感染性壞死後期)、瀰漫性血管內凝血(DIC)是其他可能併發症,但與『臍周瘀青』直接對應的是『出血性胰臟炎』。\\n\\n護理:見Cullen/Grey-Turner徵象警覺出血性胰臟炎,加護監測血行動力、血色素、器官衰竭與壞死。", "options": {"A": "胰臟假囊腫為數週後液體積聚,非以臍周瘀青表現。", "B": "正解:臍周瘀青(Cullen徵象)代表出血性胰臟炎。", "C": "DIC為凝血障礙,非以臍周瘀青為其特異對應。", "D": "胰臟膿瘍為感染性壞死後期併發症,非臍周瘀青所代表。"}, "sources": ["Harrison 21e, Acute Pancreatitis (Cullen/Grey-Turner)", "Sleisenger & Fordtran's"]}}, "113-通論-5分科-52": {"quick": "右上腹痛+發燒+黃疸,但理學無明顯壓痛、Murphy陰性→總膽管結石(阻塞性黃疸),故選B。", "detail": {"background": "右上腹痛+發燒+『黃疸』而『Murphy徵象陰性、無明顯膽囊壓痛』,提示阻塞在『總膽管』而非膽囊:『總膽管結石(choledocholithiasis)』造成膽道阻塞與膽汁鬱積(黃疸),若合併感染即進展為膽管炎(Charcot三聯)。急性膽囊炎應Murphy陽性、以右上腹膽囊區壓痛為主、黃疸較少(除非Mirizzi);急性胰臟炎以上腹痛+酵素升高為主;闌尾炎為右下腹。本例黃疸+Murphy陰性→指向總膽管結石(阻塞性黃疸),需影像(超音波/MRCP)確認並ERCP取石。\\n\\n護理:阻塞性黃疂(茶色尿、灰白便、搔癢)評估;安排MRCP/ERCP取石;監測是否進展為膽管炎。", "options": {"A": "急性膽囊炎應Murphy陽性、膽囊區壓痛,本例Murphy陰性不符。", "B": "正解:右上腹痛+發燒+黃疸+Murphy陰性→總膽管結石(阻塞性黃疸)。", "C": "急性胰臟炎以上腹痛+酵素升高為主,非以黃疸為主軸。", "D": "急性闌尾炎為右下腹痛,不符右上腹+黃疸。"}, "sources": ["Harrison 21e, Choledocholithiasis", "Sleisenger & Fordtran's"]}}, "114-進階-內科-13": {"quick": "右上腹痛+黃疸+發燒(Charcot三聯)、膽紅素升而AST/ALT僅輕升、白血球與CRP高→細菌性膽管炎,故選B。", "detail": {"background": "本例右上腹悶痛+黃疸+發燒38.5°C=Charcot三聯,加上白血球16200(neutrophil 87%、band 9%核左移)、CRP 12.8(顯著發炎)、total bilirubin 4.5(膽汁鬱積)而『AST/ALT僅輕度升(38/45,非肝細胞型大幅升)』→典型『細菌性(急性)膽管炎』(膽道阻塞+感染)。病毒性肝炎應ALT/AST大幅升高(肝細胞型);肝硬化急性發作有慢性背景;急性胰臟炎以上腹痛+酵素升高為主。膽管炎治療為抗生素+膽道引流。\\n\\n護理:辨識Charcot三聯,給抗生素+輸液並安排ERCP/PTCD引流;監測惡化為Reynolds五聯。", "options": {"A": "病毒性肝炎為肝細胞型(ALT/AST大幅升),與本例僅輕升不符。", "B": "正解:Charcot三聯+膽汁鬱積型+顯著發炎→細菌性膽管炎。", "C": "肝硬化急性發作需慢性肝病背景,本例不符。", "D": "急性胰臟炎以上腹痛+酵素升高為主,非本例型態。"}, "sources": ["Tokyo Guidelines (TG18) Cholangitis", "Harrison 21e, Cholangitis"]}}, "114-進階-外科-32": {"quick": "膽道手術術前抗生素應於『劃刀前60分鐘內』給,並涵蓋腸內革蘭氏陰性菌與厭氧菌(如ceftriaxone+metronidazole),故選C。", "detail": {"background": "手術部位感染預防的『術前抗生素』原則:①給藥時機──多數抗生素於『劃刀前60分鐘內』輸注完成(vancomycin/fluoroquinolone因輸注較久,可提前至120分鐘);②藥物選擇須涵蓋手術部位常見菌──膽道/腹腔手術須涵蓋『腸內革蘭氏陰性菌(E. coli、Klebsiella)與厭氧菌』,合適選擇如『第三代頭孢ceftriaxone合併metronidazole』,或cefazolin+metronidazole、cefoxitin等。本例膽囊壁增厚積膿(感染性膽道手術)→C(60分鐘,ceftriaxone+metronidazole)最適當,可涵蓋腸內菌與厭氧菌。cefazolin單用(B)厭氧涵蓋不足;vancomycin(A、D)針對G(+)/MRSA,非膽道首選且術後不需常規延長。\\n\\n護理:確認劃刀前60分鐘內給藥、選對涵蓋菌譜的抗生素、必要時術中再給(長手術/大出血)。", "options": {"A": "vancomycin針對G(+)/MRSA,非膽道感染首選涵蓋(缺G(−)/厭氧)。", "B": "cefazolin涵蓋G(+)與部分G(−),但厭氧涵蓋不足,膽道感染不理想。", "C": "正解:劃刀前60分鐘,ceftriaxone+metronidazole涵蓋腸內G(−)與厭氧菌。", "D": "vancomycin+術後clindamycin非膽道手術合理選擇且不必常規延長術後抗生素。"}, "sources": ["ASHP/IDSA Surgical Antimicrobial Prophylaxis Guidelines", "Tokyo Guidelines (TG18)"]}}, "114-進階-內科-43": {"quick": "急性胰臟炎診斷依據為典型腹痛、酵素>3倍、影像;『高血鈣與高血糖』非診斷依據(低血鈣才是重症指標),故選B。", "detail": {"background": "急性胰臟炎診斷『三取二』:①典型上腹痛輻射至背;②血清lipase/amylase>正常上限3倍;③影像(CT/US/MRI)符合。『高血鈣』不是診斷依據──相反,重症胰臟炎常出現『低血鈣(脂肪壞死皂化結合鈣)』;高血鈣反而是胰臟炎的『病因之一(副甲狀腺機能亢進)』而非診斷標準。高血糖雖可能出現(胰島受損)但非診斷依據。故B(合併高血鈣和高血糖)『不是診斷依據』,為答案。\\n\\n護理:以腹痛+酵素+影像診斷;監測『低血鈣』等重症指標;高三酸甘油酯/高血鈣是須查的病因。", "options": {"A": "典型上腹痛輻射至背是診斷依據之一。", "B": "正解(非依據):高血鈣與高血糖不是診斷依據(低血鈣才是重症指標)。", "C": "脂肪酶>正常上限3倍是診斷依據之一。", "D": "CT顯示胰臟腫脹是影像診斷依據之一。"}, "sources": ["Revised Atlanta Classification", "Harrison 21e, Acute Pancreatitis"]}}, "114-進階-家庭-44": {"quick": "確立急性胰臟炎最具特異性的實驗室指標是『血清脂肪酶(lipase)』,故選B。", "detail": {"background": "急性胰臟炎的血清酵素:①『脂肪酶(lipase)』──特異性與敏感性均優於澱粉酶,升高較早且『持續較久(數天)』,較不受唾液腺/其他來源干擾,是『最具特異性』的診斷指標;②澱粉酶(amylase)──也升高但較不特異(唾液腺、腸、輸卵管等也分泌)、且下降較快,可能在就診時已回落。C反應蛋白(CRP)用於『評估嚴重度』(48–72小時CRP>150提示重症),非診斷特異;肝功能指數用於找膽源性病因(ALT升高提示膽石性),非診斷胰臟炎本身。故最具特異性為lipase。\\n\\n護理:以lipase診斷;CRP追蹤嚴重度;ALT協助判斷膽石性病因。", "options": {"A": "澱粉酶較不特異(多來源)且下降快,非最具特異性。", "B": "正解:血清脂肪酶(lipase)特異性最高,為最佳診斷指標。", "C": "CRP用於評估嚴重度,非診斷特異指標。", "D": "肝功能指數用於找膽源性病因,非診斷胰臟炎本身。"}, "sources": ["ACG Acute Pancreatitis Guideline", "Harrison 21e, Acute Pancreatitis (lipase vs amylase)"]}}, "114-進階-家庭-43": {"quick": "AST800/ALT1200為『肝細胞型』黃疸,優先查超音波與病毒/自體免疫標記;ERCP是膽道介入,非優先,故選D。", "detail": {"background": "本例無藥酒史、AST 800/ALT 1200(ALT>AST,肝細胞型損傷顯著)、總膽紅素5.0(直接3.5)。鑑別以『肝細胞型急性肝炎』為主,優先診斷工作:①腹部超音波(看肝實質、膽道有無擴張、排除阻塞與腫塊);②病毒性肝炎血清標記(A/B/C等);③自體免疫性肝炎抗體(ANA、ASMA、IgG)──尤其無藥酒史的肝細胞型肝炎。『內視鏡逆行性膽胰管造影(ERCP)』屬侵入性『膽道治療/診斷』工具,適用於『膽道阻塞(膽管型,膽道擴張)』,本例為肝細胞型且尚未證實膽道阻塞,ERCP並非優先(且有胰臟炎等併發症風險),故為非優先診斷檢查。\\n\\n護理:先非侵入性影像與血清學釐清病因,保留ERCP於確有膽道阻塞時。", "options": {"A": "腹部超音波為第一線影像,評估肝實質與膽道,屬優先。", "B": "病毒性肝炎血清標記是肝細胞型肝炎的優先病因檢查。", "C": "自體免疫肝炎抗體(ANA/ASMA)對無藥酒史的肝細胞型肝炎優先考量。", "D": "正解(非優先):ERCP為侵入性膽道介入,肝細胞型且未證實阻塞時非優先。"}, "sources": ["Harrison 21e, Evaluation of Acute Hepatitis", "ACG/AASLD Cholestasis & AIH"]}}, "110-進階-外科-27": {"quick": "食道最常見的良性疾病是『胃食道逆流(GERD)』,故選C。", "detail": {"background": "食道的良性疾病包括:胃食道逆流(GERD)、裂孔疝氣、食道憩室(如Zenker)、蠕動障礙(achalasia、瀰漫性食道痙攣)、良性狹窄、良性腫瘤(平滑肌瘤)等。其中『胃食道逆流(GERD)』盛行率最高,是最常見的良性食道疾病(成人約一至兩成有逆流症狀)。其病生理為下食道括約肌功能不全與抗逆流屏障失常致胃酸逆流,可致逆流性食道炎、Barrett食道。食道弛緩不能(achalasia)、食道憩室、裂孔疝氣相對少見。\\n\\n護理:衛教生活型態(減重、抬高床頭、避免誘發食物、戒菸酒)、PPI治療、辨識警示症狀。", "options": {"A": "食道憩室相對少見,非最常見良性食道疾病。", "B": "食道弛緩不能(achalasia)為少見的蠕動障礙。", "C": "正解:胃食道逆流(GERD)為最常見的良性食道疾病。", "D": "食道裂孔疝氣常見但其臨床意義多與GERD並述;就『最常見良性疾病』而言以GERD為答案。"}, "sources": ["Harrison 21e, GERD epidemiology", "Sleisenger & Fordtran's"]}}, "105-TNPA-外科-43": {"quick": "十二指腸憩室好發於『壺腹周圍(乳頭旁,periampullary)』,故C正確;多無症狀、不需常規手術。", "detail": {"background": "十二指腸憩室(duodenal diverticulum)是小腸中最常見的憩室,多為後天『外突型(假性憩室)』。①好發部位為『十二指腸第二段、壺腹/乳頭周圍(periampullary/juxtapapillary)』最多(因該處腸壁有血管膽胰管穿過為弱點);②盛行率隨『年齡增加』(多見於中老年,非40歲以下),性別差異不顯著(非女多於男);③『大多數無症狀』,僅少數合併併發症(出血、發炎、穿孔、膽胰管阻塞/結石、盲環症候群);④因多無症狀,『不需常規手術』,僅在出現併發症時才處理。故C(壺腹周圍最多)正確。\\n\\n護理:多為偶然發現,無症狀者觀察;乳頭旁憩室可影響ERCP操作與膽胰管引流,須留意併發症。", "options": {"A": "錯誤:十二指腸憩室並不罕見且無明顯女多於男。", "B": "錯誤:好發於中老年,非大部分在40歲以下。", "C": "正確(正解):十二指腸憩室以壺腹周圍(乳頭旁)最多。", "D": "錯誤:多數無症狀,不需常規手術,僅併發症時處理。"}, "sources": ["Sleisenger & Fordtran's, Duodenal Diverticula", "Harrison 21e"]}}, "109-進階-外科-59": {"quick": "年輕女性、橫結腸至直腸連續性黏膜發炎糜爛出血→潰瘍性結腸炎;治療不包括『抗生素』,故選B。", "detail": {"background": "本例24歲、血便、大腸鏡見『橫結腸至直腸連續性』黏膜發炎糜爛出血浸潤→符合潰瘍性結腸炎(UC,由直腸往近端連續性、侷限大腸黏膜層)。UC的治療階梯:①『氨基水楊酸類(5-ASA,如mesalazine)』為輕中度誘導與維持的基礎用藥;②類固醇用於中重度急性發作誘導緩解;③免疫調節劑(thiopurine)、生物製劑(anti-TNF、vedolizumab)、JAK抑制劑用於中重度/難治;④飲食調整(部分病人乳糖不耐可禁乳製品)。『抗生素』並非UC的常規治療(除非合併感染如毒性巨結腸、偽膜性腸炎或周邊膿瘍;克隆氏的肛周膿瘍/廔管才常用抗生素)。故『給予抗生素』非現階段UC治療選項(選B)。\\n\\n護理:UC衛教5-ASA/類固醇順從、監測出血與毒性巨結腸、長期追蹤大腸癌風險。", "options": {"A": "禁食牛奶製品對乳糖不耐或症狀控制有幫助,屬可採措施。", "B": "正解(非治療):抗生素非UC常規治療(除非合併感染/併發症)。", "C": "類固醇用於中重度UC急性發作誘導緩解,屬治療選項。", "D": "氨基水楊酸(5-ASA)為UC基礎治療,屬治療選項。"}, "sources": ["ACG/ECCO Ulcerative Colitis Guidelines", "Harrison 21e, IBD treatment"]}}, "111-進階-內科-21": {"quick": "直腸到整段大腸連續性充血易碎發炎+偽息肉→潰瘍性結腸炎,故選A。", "detail": {"background": "潰瘍性結腸炎(UC)特徵:①病變由『直腸開始往近端連續性(continuous)』侵犯,侷限『大腸黏膜層/黏膜下層』;②大腸鏡見黏膜瀰漫充血、顆粒狀、易碎(friable)、接觸性出血、潰瘍,慢性者可見『偽息肉(pseudopolyps,再生黏膜)』與結腸袋消失(鉛管狀);③臨床為血便、黏液便、裡急後重、腹瀉、腹痛、體重減輕。本例『直腸到整段大腸連續發炎+偽息肉』為典型UC。克隆氏為跳躍式全層病變(可侵犯全消化道、肛周、廔管);大腸激躁症無黏膜發炎;憩室炎為局部左下腹發炎。\\n\\n護理:UC以5-ASA/類固醇/免疫調節/生物製劑治療,監測毒性巨結腸與大腸癌風險(長期UC定期大腸鏡監測異生)。", "options": {"A": "正解:由直腸連續至整段大腸的黏膜發炎+偽息肉→潰瘍性結腸炎。", "B": "大腸激躁症無黏膜發炎與血便,不符。", "C": "憩室炎為局部(常左下腹)發炎,非連續全大腸黏膜炎。", "D": "克隆氏為跳躍式全層病變,非連續性黏膜炎。"}, "sources": ["Harrison 21e, Ulcerative Colitis", "ACG UC Guidelines"]}}, "111-進階-外科-21": {"quick": "直腸到整段大腸連續性發炎易碎+偽息肉→潰瘍性結腸炎,故選A。", "detail": {"background": "(與111-進階-內科-21同題)潰瘍性結腸炎(UC):由直腸往近端『連續性』、侷限大腸黏膜層的發炎,大腸鏡見瀰漫充血、易碎、接觸出血、潰瘍與慢性偽息肉,臨床為血便、裡急後重、腹瀉、體重減輕。與克隆氏(跳躍式、全層、可全消化道與肛周廔管)、大腸激躁症(無發炎)、憩室炎(局部)鑑別。本例連續全大腸發炎+偽息肉為典型UC。\\n\\n護理:5-ASA/類固醇/免疫調節/生物製劑治療,監測毒性巨結腸與長期大腸癌風險。", "options": {"A": "正解:連續性全大腸黏膜發炎+偽息肉→潰瘍性結腸炎。", "B": "大腸激躁症無黏膜發炎,不符。", "C": "憩室炎為局部發炎,非連續全大腸炎。", "D": "克隆氏為跳躍式全層病變,非連續性。"}, "sources": ["Harrison 21e, Ulcerative Colitis", "ACG UC Guidelines"]}}, "105-TNPA-內科-20": {"quick": "50歲男性飲食均衡卻缺鐵性貧血,應先懷疑『大腸癌』(慢性失血),故選A。", "detail": {"background": "成年(尤其中老年、停經後女性與男性)無明顯原因的『缺鐵性貧血(IDA)』,在飲食足夠下,最須優先排除『消化道慢性失血』,其中『大腸癌(尤其右側結腸癌)』是重要病因──右側結腸癌腫瘤表面慢性滲血,糞便常不見鮮血(隱性出血),病人以疲倦、貧血表現而非血便。故對50歲男性飲食均衡卻IDA,應安排大腸鏡(及上消化道內視鏡)找出血源。急性白血病以全血球異常表現、肝癌/肺腺癌非以IDA為首發。\\n\\n護理:不明原因IDA衛教安排雙向內視鏡(上消化道+大腸鏡);補鐵並找出血源治療。", "options": {"A": "正解:中老年不明原因缺鐵性貧血應先懷疑大腸癌(慢性失血)。", "B": "急性白血病以全血球異常與出血感染表現,非單純IDA。", "C": "肝癌不以缺鐵性貧血為首發表現。", "D": "肺腺癌不以缺鐵性貧血為首發表現。"}, "sources": ["Harrison 21e, Iron Deficiency Anemia workup; Colorectal Cancer", "ACG Colorectal Cancer Screening"]}}, "113-通論-5分科-68": {"quick": "60歲慢性腹痛血便體重減輕→疑大腸癌,腹部CT與內視鏡皆需安排,故選B。", "detail": {"background": "60歲、慢性腹脹腹痛2個月、『血便』、體重減輕5kg→典型『大腸直腸癌』警示症狀,應安排『大腸鏡(確診+切片)』與『腹部(胸腹骨盆)電腦斷層(分期)』,兩者皆必要(B正確)。鑑別上以大腸癌為首要(非胃癌),裡急後重提示直腸/乙狀結腸病灶(非胃癌);腫瘤標記方面大腸癌看『CEA』(非AFP,AFP用於肝癌/生殖細胞瘤)。故B正確。\\n\\n護理:辨識警示症狀(出血、體重減輕、排便改變、貧血)安排大腸鏡+影像分期;衛教篩檢。", "options": {"A": "錯誤:血便+排便改變應以大腸癌為第一優先,非胃癌。", "B": "正解:腹部CT(分期)與大腸鏡(確診)皆有必要安排。", "C": "錯誤:裡急後重提示直腸/乙狀結腸病灶,非胃癌。", "D": "錯誤:大腸癌標記為CEA,非AFP。"}, "sources": ["NCCN Colorectal Cancer", "Harrison 21e, Colorectal Cancer"]}}, "105-TNPA-通論-5": {"quick": "32歲無腸病史、發燒四天+左下腹痛+腹瀉→憩室炎最可能,故選D。", "detail": {"background": "成人『左下腹痛+發燒』最常見的是『乙狀結腸憩室炎(diverticulitis)』(西方好發,台灣右側憩室亦不少;但題以左下腹+發燒指向乙狀結腸憩室炎)。憩室炎為憩室阻塞發炎、微穿孔,表現左下腹痛、發燒、白血球升高、排便改變。克隆氏症為慢性病程(非急性四天)、好發迴腸末端;潰瘍性結腸炎以血便裡急後重為主;缺血性大腸炎好發老年有血管病、表現突發腹痛+血便。本例急性發燒+左下腹痛最符合憩室炎。診斷以CT(腸壁增厚、憩室、周圍脂肪發炎±膿瘍)。\\n\\n護理:輕症腸道休息+抗生素(門診或住院);CT評估膿瘍(>3–4cm引流);警覺穿孔/腹膜炎需手術。", "options": {"A": "克隆氏症為慢性病程,非急性四天發燒,不符。", "B": "缺血性大腸炎好發老年血管病者、突發腹痛+血便,不符年輕無病史。", "C": "潰瘍性結腸炎以血便裡急後重慢性表現為主,不符急性發燒。", "D": "正解:急性發燒+左下腹痛+腹瀉→憩室炎最可能。"}, "sources": ["Harrison 21e, Diverticular Disease", "ASCRS Diverticulitis Guidelines"]}}, "105-TNPA-通論-26": {"quick": "慢性下腹痛、解便後改善、腹瀉便祕交替、檢查皆正常→大腸激躁症(IBS),故選C。", "detail": {"background": "大腸激躁症(irritable bowel syndrome, IBS)為功能性腸道疾病,以Rome準則診斷:反覆腹痛(近3個月平均每週至少1天),合併①與排便相關、②排便頻率改變、③糞便外觀改變中≥2項。本例30歲女性、慢性下腹痛近一年、『解便後改善』、腹瀉便祕交替、無血便/黑便(無警示症狀),且實驗室/大腸鏡『皆正常』→典型IBS。需先排除警示症狀(體重減輕、出血、貧血、夜間症狀、發病年齡大)。UC/克隆氏會有黏膜發炎血便;甲狀腺低下會有其他全身症狀。\\n\\n護理:衛教IBS為功能性、良性但慢性;飲食(低FODMAP)、壓力管理、依亞型用藥(解痙、止瀉/通便、神經調節劑)。", "options": {"A": "潰瘍性結腸炎有血便與黏膜發炎,本例大腸鏡正常,不符。", "B": "克隆氏症有黏膜病變/發炎,本例檢查正常,不符。", "C": "正解:慢性腹痛解便後改善+排便型態改變+檢查正常→IBS。", "D": "甲狀腺低下有怕冷、體重增加等全身症狀,非以此腸道型態為主。"}, "sources": ["Rome IV Criteria for IBS", "Harrison 21e, Irritable Bowel Syndrome"]}}, "105-TNPA-通論-43": {"quick": "台灣大腸癌篩檢:50歲以上不分男女每2年一次糞便潛血(免疫法),故A正確。", "detail": {"background": "台灣國健署大腸直腸癌篩檢政策(本題年代):提供『50–74歲(現已擴及45歲起部分對象)民眾每2年一次糞便潛血檢查』,採用『定量免疫法(FIT/iFOBT)』(非舊式化學法guaiac,免疫法不受飲食/藥物干擾、特異性較佳)。陽性者轉介『大腸鏡』確診。風險族群:一級血親有大腸癌者,建議『提早(常40歲起或較其親屬診斷年齡早10年)』開始篩檢,而非50歲;息肉切除後追蹤間隔依病理與大小(小管狀腺瘤通常數年後追蹤,非1年)。故A正確(50歲以上每2年一次FOBT)。\\n\\n護理:衛教定期FIT篩檢、陽性務必接受大腸鏡、高風險族群提早並用大腸鏡監測。", "options": {"A": "正解:50歲以上不分男女每2年一次糞便潛血(免疫法)篩檢。", "B": "小於1公分管狀腺瘤通常數年後追蹤,非1年重做。", "C": "一級血親有大腸癌者應提早篩檢(常40歲起或更早),非50歲。", "D": "台灣政策採『免疫法』FIT,非化學法。"}, "sources": ["國健署 大腸癌篩檢政策", "ACG Colorectal Cancer Screening"]}}, "106-106a-內科-13": {"quick": "糞便潛血是『篩檢』工具,對大腸癌『分期(staging)』最不具幫助,故選C。", "detail": {"background": "大腸癌確診後的『分期』檢查目的是評估腫瘤侵犯與轉移(TNM):①大腸鏡──確診、切片、評估病灶(並排除同時性病灶);②電腦斷層(胸腹骨盆)──評估局部侵犯、淋巴結與遠端(肝/肺)轉移;③MRI(直腸癌局部分期)、PET(疑復發/轉移);④全身骨頭掃描──評估骨轉移。而『糞便潛血檢查(FOBT/FIT)』是『早期篩檢』工具(找無症狀者的隱血),對『已確診者的分期』毫無幫助(選C)。\\n\\n護理:確診後安排CEA、大腸鏡與CT分期;FOBT僅用於篩檢非分期。", "options": {"A": "大腸鏡用於確診/切片/評估病灶,對分期有幫助。", "B": "電腦斷層評估侵犯與轉移,對分期有幫助。", "C": "正解:糞便潛血是篩檢工具,對分期最不具幫助。", "D": "全身骨頭掃描可評估骨轉移,對分期有幫助。"}, "sources": ["NCCN Colorectal Cancer (staging workup)", "Harrison 21e, Colorectal Cancer"]}}, "106-106a-外科-57": {"quick": "盲腸扭轉不適合內視鏡減壓,需手術(盲腸切除或固定)以防復發,故D正確。", "detail": {"background": "大腸扭轉(colon volvulus):①『乙狀結腸扭轉』最常見,好發老年/長期便祕/長乙狀結腸,鋇劑/CT見『鳥嘴樣變形(bird's beak)』;無腹膜炎(腸壞死)時可先『乙狀結腸鏡放肛管減壓』復位,但『復發率高』(常需擇期切除),故B的『復發率低』錯誤。②『盲腸扭轉』好發較年輕、與盲腸活動度大有關;『內視鏡減壓成功率低、不作為主要治療』,需『手術(盲腸切除或盲腸固定術)』,單純復位易復發,故D『盲腸扭轉不考慮內視鏡減壓,(手術)可預防復發』正確。A把乙狀結腸扭轉的解剖描述與盲腸混淆;C把鳥嘴變形誤套到盲腸並稱可灌腸處理。本題D正確。\\n\\n護理:扭轉病人評估腹膜炎/壞死徵象(發燒、腹膜炎、乳酸升高)→需急診手術;乙狀結腸扭轉減壓後仍須安排確定性手術。", "options": {"A": "乙狀結腸扭轉的解剖敘述不正確(把部位/方向混淆),非正解。", "B": "錯誤:乙狀結腸鏡減壓後『復發率高』,非低。", "C": "錯誤:鳥嘴變形是乙狀結腸扭轉特徵;盲腸扭轉處置不同。", "D": "正解:盲腸扭轉不宜內視鏡減壓,手術(盲腸切除/固定)可預防復發。"}, "sources": ["ASCRS Colonic Volvulus Guidelines", "Sabiston, Volvulus"]}}, "106-106a-外科-64": {"quick": "直腸癌低前位切除後『逆行性射精』異常,最可能是下腹/骨盆『交感神經』受損,故選D。", "detail": {"background": "骨盆自律神經與性功能/排尿:①『交感神經(下腹神經叢hypogastric nerve,來自L1–L3)』──負責『射精(emission)』與膀胱頸關閉;受損→『逆行性射精(retrograde ejaculation,精液逆流入膀胱)』與射精障礙。②『副交感神經(勃起神經nervi erigentes/pelvic splanchnic,S2–S4)』──負責『勃起』;受損→勃起障礙。③會陰神經(pudendal)──體神經,控制外括約肌/感覺。直腸癌全直腸繫膜切除/低前位切除時,骨盆自律神經叢易受損致性與排尿障礙。本題『逆行性射精』對應『交感神經』受損(選D)。\\n\\n護理:術前告知性功能/排尿風險;術中保留自律神經(nerve-sparing);術後評估與轉介處理。", "options": {"A": "勃起神經(副交感)受損致勃起障礙,非逆行性射精。", "B": "閉孔神經為下肢內收/感覺,與射精無關。", "C": "會陰神經為體神經(括約肌/感覺),非控制射精的交感。", "D": "正解:交感神經(下腹神經)受損致逆行性射精。"}, "sources": ["Sabiston, Pelvic Autonomic Nerves in Rectal Surgery", "Harrison 21e"]}}, "107-TNPA-外科-57": {"quick": "吻合口漏合併3cm小膿瘍且病情穩定,常用處置為腸道休息+抗生素、CT導引引流、分流性造口;『剖腹探查清創』非常用(保留給瀰漫腹膜炎/不穩),故選C。", "detail": {"background": "結直腸手術後『吻合口滲漏(anastomotic leak)』的處置依病情與漏的範圍:①若『局限性』、病情穩定的小膿瘍(本例3cm)──可『腸道休息+靜脈抗生素』、『CT(電腦斷層)導引經皮引流』膿瘍、必要時『近端分流性造口(diverting stoma)』轉移糞流讓吻合口癒合;②若『瀰漫性腹膜炎、敗血、血行動力不穩或大範圍裂開』才需『剖腹探查、清創、拆除吻合做造口』。本例病情相對局限(發燒+輕微腹痛、3cm膿瘍),故『剖腹探查清創』非『常用』處置(選C)。\\n\\n護理:監測引流量/性狀與感染指標、營養支持、引流照護;惡化(腹膜炎、敗血)時才升級手術。", "options": {"A": "腸道休息+抗生素是局限性吻合口漏的常用處置。", "B": "CT導引引流局限性膿瘍是常用處置。", "C": "正解(非常用):剖腹探查清創保留給瀰漫腹膜炎/不穩,非本例首選。", "D": "分流性造口可保護吻合口、是常用處置之一。"}, "sources": ["ASCRS Anastomotic Leak Management", "Sabiston, Colorectal Surgery Complications"]}}, "107-TNPA-外科-58": {"quick": "直腸癌低前位切除後同時出現勃起障礙與排尿困難,最可能是『骨盆腔神經叢』受損,故選D。", "detail": {"background": "骨盆腔『自律神經叢(pelvic plexus,含交感的下腹神經與副交感的勃起神經匯集)』掌管膀胱與性功能。直腸癌手術(全直腸繫膜切除/低前位切除)在骨盆深部操作,若損傷『骨盆腔神經叢』會『同時』造成『勃起障礙(副交感)』與『排尿功能障礙(膀胱逼尿肌/膀胱頸)』──因該神經叢同時支配兩者。單一神經(閉孔、會陰、下腹神經)受損的表現較侷限;本例『勃起+排尿』同時障礙最符合『骨盆腔神經叢』整體受損(選D)。\\n\\n護理:術前告知性與排尿功能風險、術中神經保留;術後評估殘尿、必要時導尿與泌尿/復健轉介。", "options": {"A": "閉孔神經為下肢內收/感覺,與勃起排尿無關。", "B": "會陰神經為體神經(括約肌/感覺),非同時致勃起與排尿障礙。", "C": "腹下(下腹)神經為交感,單獨受損主要影響射精/膀胱頸,非勃起。", "D": "正解:骨盆腔神經叢受損可同時致勃起障礙與排尿困難。"}, "sources": ["Sabiston, Pelvic Plexus Injury in Rectal Surgery", "Harrison 21e"]}}, "107-TNPA-外科-60": {"quick": "高齡多病、低位直腸癌但極早期(T1N0M0),可考慮『經肛門局部切除』減少大手術風險,故選B。", "detail": {"background": "直腸癌治療依分期與病人狀況:①標準為『全直腸繫膜切除(TME)』(低前位或腹會陰切除APR);②局部進展(T3或N+)者『術前同步化放療』後再手術;③『極早期(T1N0M0、低風險組織特徵)』腫瘤,尤其『高齡、多重共病、手術風險高』者,可考慮『經肛門局部切除(transanal excision/TEM)』──創傷小、保留肛門功能,作為選擇性治療。本例85歲多病、T1N0M0低位直腸癌→『經肛門局部切除』最適當(B)。對高風險病人施行根治性TME風險過高。\\n\\n護理:衛教局部切除的適應症與復發監測(T1需符合低風險特徵);術後追蹤。", "options": {"A": "全直腸繫膜切除為大手術,對85歲多病者風險高,非最適當。", "B": "正解:T1N0M0且高齡高風險者可考慮經肛門局部切除。", "C": "術前化放療用於局部進展(T3/N+),T1不需。", "D": "TME後加術後化放療對T1且高風險病人過度,非最適當。"}, "sources": ["NCCN Rectal Cancer (early T1 local excision)", "ASCRS Rectal Cancer Guidelines"]}}, "108a-TNPA-內科-24": {"quick": "糞便潛血陽性應接受大腸鏡確診;無法做大腸鏡時可用乙狀結腸鏡(±鋇劑)替代,故D正確。", "detail": {"background": "大腸癌糞便潛血篩檢(FIT)要點:①每2年定期FIT約可降低大腸癌死亡率約『2–3成』(非5成以上,故『降低至少5成』偏高);②免疫法(FIT)檢體處理:採便後依說明保存盡速送驗(避免高溫久放影響),但題述細節各家不同;③『陰性』者依政策『每2年』再篩(非每半年);④『陽性』者應接受『大腸鏡』確診(全大腸評估),若無法做大腸鏡,可用『乙狀結腸鏡(加鋇劑灌腸)』替代評估(D正確)。本題以D為正確敘述。\\n\\n護理:衛教陽性務必接受大腸鏡;陰性者維持定期篩檢;正確採檢與送驗。", "options": {"A": "FOBT降低大腸癌死亡率約2–3成,『至少5成以上』敘述過高。", "B": "免疫法採便保存與送驗細節未必如此(且陳述非本題重點),非最佳正解。", "C": "陰性者依政策每2年篩檢,非每半年。", "D": "正解:陽性應接受大腸鏡確診;無法做時可用乙狀結腸鏡替代。"}, "sources": ["國健署 大腸癌篩檢", "ACG/USPSTF Colorectal Cancer Screening"]}}, "108a-TNPA-外科-37": {"quick": "絨毛狀腺瘤(villous adenoma)惡性化機率最高,故選D。", "detail": {"background": "大腸腺瘤(腺瘤-癌序列adenoma-carcinoma sequence)的惡性風險取決於:①『組織型態』──絨毛狀(villous)>管狀絨毛狀(tubulovillous)>管狀(tubular);絨毛成分越多惡性風險越高;②大小(>1cm風險增);③高度異生(high-grade dysplasia)。故『絨毛狀腺瘤』惡性化機率最高(可達30–40%)。鋸齒狀病變(serrated)中傳統鋸齒狀腺瘤與無柄鋸齒狀病變也有癌變潛能。『squamous adenoma』非大腸常見/正規分類。本題D(villous adenoma)正確。\\n\\n護理:衛教息肉切除與依病理/大小/數目安排追蹤間隔(絨毛狀/大/高度異生者追蹤較密)。", "options": {"A": "鱗狀腺瘤非大腸常見分類,非答案。", "B": "管狀腺瘤惡性風險最低。", "C": "管狀絨毛狀腺瘤風險居中。", "D": "正解:絨毛狀腺瘤(villous adenoma)惡性化機率最高。"}, "sources": ["Harrison 21e, Colonic Polyps (adenoma-carcinoma)", "Sleisenger & Fordtran's"]}}, "108b-TNPA-外科-38": {"quick": "乙狀結腸扭轉無腹膜炎時,最好先以『大腸鏡(乙狀結腸鏡)減壓復位』並放肛管,故選B。", "detail": {"background": "乙狀結腸扭轉(sigmoid volvulus)在『無腸壞死/腹膜炎』時,首選『內視鏡(硬式/軟式乙狀結腸鏡或大腸鏡)減壓復位』並留置肛管,可立即解除阻塞、確認黏膜活性;但因『復發率高』,病情穩定後常安排『擇期乙狀結腸切除』根治。鋇劑灌腸是診斷(鳥嘴徵象)而非治療;若已有腹膜炎、腸壞死或內視鏡減壓失敗,則需『緊急手術』。本題無腹膜炎→B(大腸鏡減壓)最佳。\\n\\n護理:減壓後觀察復發、評估擇期手術;警覺壞死/腹膜炎(發燒、腹膜炎徵象、血便)需急診手術。", "options": {"A": "鋇劑灌腸為診斷,非治療手段。", "B": "正解:無腹膜炎時先以大腸鏡(乙狀結腸鏡)減壓復位放肛管。", "C": "剖腹探查保留給腹膜炎/壞死或減壓失敗,非首選。", "D": "腹腔鏡手術非無腹膜炎時的第一線(先內視鏡減壓)。"}, "sources": ["ASCRS Colonic Volvulus", "Sabiston, Sigmoid Volvulus"]}}, "108a-TNPA-通論-40": {"quick": "82歲服抗凝劑、左下腹痛+發燒+鮮血便+左下腹壓痛、發炎指標升高→急性大腸憩室炎,故選A。", "detail": {"background": "本例老年、『左下腹痛+壓痛+發燒+白血球/CRP升高』→典型『急性大腸憩室炎(乙狀結腸)』;憩室病也是『下消化道出血』常見原因(可無痛大量鮮血便,本例服抗凝劑更易出血)。十二指腸潰瘍出血為上消化道(黑便/吐血、上腹痛),不符左下腹+鮮血;急性腎盂腎炎為腰痛+發燒+膿尿;闌尾炎為『右』下腹。故A(急性大腸憩室炎)最可能。診斷以CT。\\n\\n護理:腸道休息+抗生素,評估膿瘍/穿孔;抗凝劑相關出血評估停藥/矯正;監測血行動力與血色素。", "options": {"A": "正解:老年左下腹痛+發燒+鮮血便+左下腹壓痛→急性大腸憩室炎。", "B": "十二指腸潰瘍出血為上消化道(黑便/上腹痛),不符左下腹。", "C": "急性腎盂腎炎為腰痛+發燒+膿尿,非左下腹壓痛+血便。", "D": "闌尾炎為右下腹痛,非左下腹。"}, "sources": ["Harrison 21e, Diverticular Disease", "ASCRS Diverticulitis Guidelines"]}}, "108b-TNPA-通論-50": {"quick": "FIT篩檢約可降低大腸癌死亡率『2–3成』,『降低5成』的敘述錯誤,故選B。", "detail": {"background": "國健署大腸癌篩檢政策:①50–74歲(現擴及45歲起部分對象)每2年一次『定量免疫法糞便潛血(FIT)』(A正確);②規律FIT篩檢約可降低大腸癌死亡率『2–3成(約20–35%)』,並非『5成』,故B(降低5成)錯誤(為答案);③陽性者應接受『大腸鏡』確診(C正確);④大腸鏡發現息肉可當場切除(D正確)。\\n\\n護理:衛教定期FIT、陽性務必大腸鏡;息肉切除後依病理安排追蹤。", "options": {"A": "正確:50–74歲每2年一次定量免疫法FIT。", "B": "錯誤(正解):FIT約降低大腸癌死亡率2–3成,非5成。", "C": "正確:FIT陽性應接受大腸鏡檢查。", "D": "正確:大腸鏡發現息肉可切除。"}, "sources": ["國健署 大腸癌篩檢成效", "USPSTF Colorectal Cancer Screening"]}}, "108a-TNPA-外科-52": {"quick": "右側結腸癌常以『慢性失血致貧血』表現(管腔大、糞便仍為液態),故選B。", "detail": {"background": "左右結腸癌臨床表現不同:①『右側結腸(升結腸/盲腸)』──管腔較大、糞便呈液態,腫瘤多為突出型、表面易慢性滲血→以『缺鐵性貧血、疲倦、隱血、腹部腫塊』表現,較少阻塞或鮮血便;②『左側結腸(降結腸/乙狀結腸/直腸)』──管腔較窄、糞便已成形,腫瘤多為環狀縮窄→以『排便習慣改變、糞便變細、裡急後重、鮮血便、腸阻塞』表現。本題問右側結腸癌常見症狀→『貧血』(B)。裡急後重、鮮血便、阻塞較屬左側/直腸。\\n\\n護理:不明原因貧血查右側結腸;排便改變/阻塞查左側;均需大腸鏡。", "options": {"A": "裡急後重屬直腸/左側病灶,非右側結腸。", "B": "正解:右側結腸癌常以慢性失血致貧血表現。", "C": "腸阻塞較常見於左側(管腔窄、糞便成形),非右側。", "D": "鮮血便較屬左側/直腸病灶,非右側。"}, "sources": ["Harrison 21e, Colorectal Cancer (right vs left)", "NCCN"]}}, "108b-TNPA-通論-54": {"quick": "慢性下腹痛、解便後改善、腹瀉便祕交替、檢查皆正常→大腸激躁症(IBS),故選C。", "detail": {"background": "(與105-TNPA-通論-26同型)IBS為功能性腸道疾病,以反覆腹痛合併排便相關、頻率/外觀改變診斷(Rome準則),『解便後改善』、腹瀉便祕交替、『無警示症狀(出血、體重減輕、貧血、夜間症狀)』且檢查(實驗室、大腸鏡)正常為典型。UC/克隆氏有黏膜發炎血便;大腸癌有警示症狀與異常檢查。本例30歲女性符合IBS。\\n\\n護理:衛教良性慢性、飲食(低FODMAP)、壓力管理、依亞型用藥;追蹤是否出現警示症狀。", "options": {"A": "潰瘍性結腸炎有血便/黏膜發炎,本例大腸鏡正常,不符。", "B": "克隆氏症有黏膜病變,本例檢查正常,不符。", "C": "正解:慢性腹痛解便後改善+排便型態改變+檢查正常→IBS。", "D": "大腸癌有警示症狀與異常檢查,本例皆無,不符。"}, "sources": ["Rome IV Criteria for IBS", "Harrison 21e, IBS"]}}, "108a-TNPA-外科-73": {"quick": "痔瘡切除術後最常見併發症是『尿液瀦留』,故選C。", "detail": {"background": "痔瘡切除術(hemorrhoidectomy)術後併發症:①最常見為『尿液瀦留(urinary retention)』──與肛門區疼痛反射、麻醉(尤其脊髓麻醉)、圍術期輸液有關,發生率可達20–30%;②疼痛、出血(早期或術後7–10天續發性出血);③較晚的肛門狹窄、大便失禁(若括約肌受損)、傷口感染(相對少見,肛門血供豐富)。本題最常見為尿液瀦留(C)。\\n\\n護理:術後觀察排尿(預防/處理尿瀦留)、疼痛控制、溫水坐浴、軟便、衛教續發性出血(7–10天)。", "options": {"A": "傷口感染相對少見(肛門血供豐富),非最常見。", "B": "大便失禁見於括約肌受損,非最常見併發症。", "C": "正解:尿液瀦留為痔瘡切除術後最常見併發症。", "D": "肛門狹窄為較晚期併發症,非最常見。"}, "sources": ["ASCRS Hemorrhoid Guidelines", "Sabiston, Anorectal Surgery"]}}, "108a-TNPA-外科-76": {"quick": "大腸鏡後腹脹劇痛疑『大腸穿孔』,最具診斷價值的是『站立胸部X光』找橫膈下游離氣體,故選D。", "detail": {"background": "大腸鏡(尤其息肉切除/治療性)後出現腹脹與劇痛,要警覺『醫源性大腸穿孔』。偵測『游離氣體(pneumoperitoneum)』最簡便有效的是『站立(直立)胸部X光』──可見橫膈下新月形游離氣體(立位胸片對少量游離氣體比腹部平片敏感)。無法站立者用左側躺腹部X光;CT更敏感(可定位穿孔)但題目選項以站立胸部X光為最具診斷價值的初步檢查。鋇劑灌腸在疑穿孔時為禁忌;超音波對游離氣體不敏感。故選D。\\n\\n護理:疑穿孔禁食、NG減壓、輸液抗生素、外科會診;影像確認後處置(小穿孔可保守,大/腹膜炎需手術)。", "options": {"A": "腹部超音波對游離氣體不敏感,非最具診斷價值。", "B": "鋇劑灌腸在疑穿孔時為禁忌,不可用。", "C": "KUB(臥位)對少量游離氣體較不敏感,非最佳。", "D": "正解:站立胸部X光可顯示橫膈下游離氣體,最具診斷價值。"}, "sources": ["ASGE Colonoscopy Perforation", "放射診斷:Pneumoperitoneum on upright CXR"]}}, "108b-TNPA-外科-77": {"quick": "息肉切除後局限性盲腸周圍發炎+局部腸外游離氣體、血行穩定→可『腸道休息+靜脈抗生素+密切觀察』(保守),故選B。", "detail": {"background": "大腸鏡息肉切除後的『局限性微穿孔或穿孔後封閉(含post-polypectomy coagulation syndrome)』:若病人『血行穩定、無瀰漫性腹膜炎、僅局限性發炎與少量局部腸外游離氣體』,可採『非手術保守治療』──腸道休息(禁食)、靜脈輸液、廣效抗生素、密切觀察。本例63歲、生命徵象正常、右下腹局部疼痛、無腹肌僵直、CT僅見盲腸周圍發炎與『局限性』腸外游離氣體→適合保守治療(B)。若出現瀰漫性腹膜炎、敗血、大量游離氣體或惡化,才需手術(修補或切除)。立即右半結腸切除/造口對局限性穩定者過度。\\n\\n護理:嚴密監測生命徵象、腹部理學與發炎指標;惡化即升級手術。", "options": {"A": "局限穩定者不需立即腹腔鏡修補(可先保守)。", "B": "正解:血行穩定、局限性微穿孔→腸道休息+靜脈抗生素+密切觀察。", "C": "立即右半結腸切除吻合對局限穩定者過度。", "D": "右半結腸切除+迴腸造口對局限穩定者過度。"}, "sources": ["ASGE/ESGE Colonoscopic Perforation Management", "ASCRS"]}}, "110-進階-外科-61": {"quick": "直腸脫垂好發於『老年女性』(非男性),故A錯誤。", "detail": {"background": "直腸脫垂(rectal prolapse):①好發族群為『老年女性』(尤其多產、骨盆底鬆弛者),女性遠多於男性,故A『成人男性較常見』錯誤(為答案);②症狀:組織經肛門突出(初期可自行回復、後期需手動或無法回復)、裡急後重、黏液分泌、出血、失禁或便祕/出口阻塞(C正確,症狀可從失禁腹瀉到便祕);③B(裡急後重、突出感、可自行回復)正確描述;④治療:以手術為主,『腹部直腸固定術(rectopexy)』復發率低、效果持久(D正確),會陰式手術用於高風險者。本題A錯誤。\\n\\n護理:評估脫垂程度與是否可回復、失禁/便祕;衛教骨盆底與手術選項;術後追蹤復發。", "options": {"A": "錯誤(正解):直腸脫垂好發於老年女性,非男性較常見。", "B": "正確:症狀含裡急後重、組織突出感,可能自行回復。", "C": "正確:臨床可從失禁腹瀉到便祕出口阻塞。", "D": "正確:腹部直腸固定術提供持久修復且復發率低。"}, "sources": ["ASCRS Rectal Prolapse Guidelines", "Sabiston, Rectal Prolapse"]}}, "111-進階-外科-76": {"quick": "中低位直腸癌T3N1(局部進展),最恰當為『術前同步化放療(neoadjuvant CRT)再手術』,故選C。", "detail": {"background": "直腸癌(本例肛門以上8cm、4cm腫瘤、腺癌、T3N1bM0)屬『局部進展期(cT3或淋巴結陽性)』。標準治療為『術前(neoadjuvant)同步化放療(CRT)→全直腸繫膜切除(TME)→術後輔助化療』,近年也用全程新輔助治療(TNT)。術前CRT可縮小腫瘤(降期)、提高切除邊緣陰性率(R0)與保肛機會、降低局部復發。早期(T1–2 N0)可直接手術;單純化放療不作為根治(除非無法手術或拒絕)。故C(先化放療再手術)正確。\\n\\n護理:衛教新輔助CRT流程與副作用、營養與造口可能;CRT後評估反應再手術。", "options": {"A": "手術即可僅適用早期(T1–2 N0),T3N1不足。", "B": "單純化放療非根治標準(仍需手術)。", "C": "正解:T3N1局部進展直腸癌先術前化放療再手術。", "D": "先手術再決定後續對局部進展直腸癌非首選(術前CRT效果較佳)。"}, "sources": ["NCCN Rectal Cancer (neoadjuvant CRT)", "ASCRS Rectal Cancer"]}}, "111-進階-外科-79": {"quick": "增生性(hyperplastic)息肉通常『小、無惡性化風險』,說它常>1cm且為癌前病變是錯的,故選B。", "detail": {"background": "大腸息肉分類與癌變風險:①『腺瘤性息肉(adenomatous)』──發育不良(dysplastic),為主要癌前病變,風險隨大小、絨毛成分與高度異生增加(A正確);②『增生性息肉(hyperplastic)』──最常見、通常『小(<5mm)、好發直腸乙狀結腸』,『傳統上認為無惡性化風險』(故B『常>1cm且為癌前病變』錯誤);③『鋸齒狀病變(serrated)』──扁平、難觀察,其中無柄鋸齒狀病變(SSL)與傳統鋸齒狀腺瘤『有癌變潛能』(經鋸齒狀路徑)(C正確);④『過誤瘤(hamartomatous)』──如幼年型/Peutz-Jeghers,多為良性,可因出血或腸阻塞表現(D正確)。本題B錯誤。\\n\\n護理:依息肉病理/大小/數目安排追蹤;腺瘤與鋸齒狀病變需切除並追蹤。", "options": {"A": "正確:腺瘤性息肉為發育不良,惡性風險與大小/類型有關。", "B": "錯誤(正解):增生性息肉通常小且無惡性化風險,非常>1cm的癌前病變。", "C": "正確:鋸齒狀息肉扁平難觀察,部分會發展為癌。", "D": "正確:過誤瘤多良性,可因出血或阻塞表現。"}, "sources": ["Harrison 21e, Colonic Polyps", "Sleisenger & Fordtran's (serrated pathway)"]}}, "112-進階-外科-50": {"quick": "持續下消化道出血、上消化道內視鏡正常、病情不穩,應安排『電腦斷層血管攝影(CTA)』定位出血,故選C。", "detail": {"background": "下消化道出血(LGIB)處置:①先穩定血行動力、評估上消化道來源(本例已做上消化道內視鏡正常);②持續或大量出血、病情不穩時,優先『CT血管攝影(CTA)』──快速、可定位活動性出血(可偵測約0.3–0.5 mL/min),指引後續血管栓塞或手術;③病情『穩定且準備充分』時可做大腸鏡(需清腸,本例『仍續血便、不穩』,清腸+大腸鏡並非當下首選);④膠囊內視鏡用於『小腸』不明出血、且須病情穩定無阻塞時,非活動性大出血首選;⑤抗凝劑/抗血小板需依出血嚴重度與血栓風險權衡『暫停/矯正』,而非一律不停(本例大量出血應評估暫停/矯正)。故C(CTA)正確。\\n\\n護理:復甦輸血、評估抗凝/抗血小板處置、CTA定位後血管栓塞或手術;穩定後再大腸鏡。", "options": {"A": "大量出血時不應為避免停藥而忽略止血;需依風險權衡暫停/矯正抗凝。", "B": "病情不穩時清腸+大腸鏡並非當下首選(優先CTA定位)。", "C": "正解:持續出血且不穩→電腦斷層血管攝影定位活動性出血。", "D": "膠囊內視鏡用於穩定的小腸不明出血,非活動性大出血首選。"}, "sources": ["ACG Lower GI Bleeding Guideline", "Harrison 21e, GI Bleeding"]}}, "112-進階-外科-51": {"quick": "依AJCC,T4bN0M0為Stage IIC(T4b無淋巴結轉移仍屬第二期C),故A正確。", "detail": {"background": "結腸癌AJCC分期重點:①第二期(II)為T3–T4、N0、M0(無淋巴結轉移):IIA=T3N0、IIB=T4aN0、『IIC=T4bN0』M0──故T4bN0M0為Stage IIC(A正確);②左右結腸症狀:『右側』結腸癌以慢性失血『貧血』為主(非排便習慣改變),『左側』以排便習慣改變、變細、阻塞、鮮血為主→故B(右側常排便習慣改變)、C(左側常無症狀貧血)皆把左右顛倒而錯誤;③糞便潛血是『篩檢』工具,『診斷』需大腸鏡切片,故D(FOBT是診斷最有效)錯誤。本題A正確。\\n\\n護理:理解分期決定治療(II期高風險或III期需輔助化療);右側查貧血、左側查阻塞。", "options": {"A": "正解:T4bN0M0為AJCC Stage IIC。", "B": "錯誤:排便習慣改變較常見於左側結腸癌(顛倒)。", "C": "錯誤:無症狀貧血較常見於右側結腸癌(顛倒)。", "D": "錯誤:FOBT是篩檢工具,診斷需大腸鏡切片。"}, "sources": ["AJCC Cancer Staging Manual (colon)", "NCCN Colon Cancer"]}}, "112-進階-婦產科-71": {"quick": "MLH1/MSH2/MSH6/PMS2突變為Lynch症候群,與大腸癌、子宮內膜癌、卵巢癌相關;『乳癌』較不相關,故選B。", "detail": {"background": "Lynch症候群(遺傳性非息肉症大腸直腸癌,HNPCC)是『錯配修復(MMR)基因(MLH1、MSH2、MSH6、PMS2)』生殖系突變致微衛星不穩定(MSI-H)。相關癌症:『大腸直腸癌』(最主要)、『子宮內膜癌』(女性次常見)、卵巢癌、胃、小腸、泌尿上皮(輸尿管/腎盂)、膽道、胰、腦(Turcot)、皮脂腺腫瘤(Muir-Torre)。『乳癌』與Lynch的關聯『較弱/不典型』(乳癌主要與BRCA1/2相關),故為『較不相關』(選B)。\\n\\n護理:Lynch家族需早期且密集大腸鏡監測(20–25歲起每1–2年)、婦科監測(子宮內膜/卵巢);基因諮詢與家族篩檢。", "options": {"A": "子宮內膜癌與Lynch高度相關。", "B": "正解:乳癌與Lynch(MMR基因)較不相關(乳癌主要與BRCA相關)。", "C": "卵巢癌與Lynch相關。", "D": "大腸癌是Lynch最主要相關癌症。"}, "sources": ["NCCN Genetic/Familial High-Risk Assessment: Colorectal (Lynch)", "Harrison 21e"]}}, "112-進階-外科-77": {"quick": "結腸扭轉若『尚無腸壞死/腹膜炎』(尤其乙狀結腸)可先內視鏡減壓,不必一律『立即手術』,故C錯誤。", "detail": {"background": "結腸扭轉(volvulus)要點:①發生部位機率:『乙狀結腸>盲腸>橫結腸』(A正確);②約佔腸阻塞的10–15%(B大致正確);③乙狀結腸好發老年、盲腸好發較年輕(D正確);④處置:扭轉確會使腸繫膜血流受阻而有壞死風險,但『無腹膜炎/壞死』時(尤其乙狀結腸)『先內視鏡減壓復位』,穩定後擇期手術──並非『一診斷就立即手術』;只有合併腹膜炎、壞死或減壓失敗才急診手術。故C『經診斷後應立即手術』作為通則『錯誤』(為答案)。\\n\\n護理:評估壞死/腹膜炎徵象決定減壓或手術;乙狀結腸扭轉減壓後安排確定性手術防復發。", "options": {"A": "正確:結腸扭轉部位機率乙狀結腸>盲腸>橫結腸。", "B": "正確:結腸扭轉約佔腸阻塞10–15%。", "C": "錯誤(正解):無壞死/腹膜炎時(乙狀結腸)先內視鏡減壓,非一律立即手術。", "D": "正確:乙狀結腸扭轉多老年、盲腸扭轉多較年輕。"}, "sources": ["ASCRS Colonic Volvulus", "Sabiston"]}}, "113-進階-家庭-3": {"quick": "WHO疼痛階梯第一階(非鴉片)後仍持續輕中度痛(VAS 3–4),下一步是加『弱效鴉片類』,故選A。", "detail": {"background": "WHO癌症疼痛三階梯:第一階=非鴉片(NSAID/acetaminophen)±輔助藥;第二階=『弱效鴉片(weak opioid,如codeine、tramadol)』±非鴉片±輔助,用於『輕中度持續疼痛』;第三階=強效鴉片(morphine等)用於中重度疼痛。本例已給第一階仍持續『輕中度疼痛(VAS 3–4)』→『升至第二階,加/調整為弱效鴉片』(A正確)。直接跳強效鴉片(B)對輕中度且尚未試弱效者非首選順序;侵入性介入(神經阻斷C)保留給藥物難治者;非藥物治療(D)為輔助而非當下止痛升級的主要步驟。\\n\\n護理:依WHO階梯逐步升級、定時給藥、預防便祕(鴉片)、評估與輔助藥(神經病變痛加gabapentin)。", "options": {"A": "正解:第一階無效→升至弱效鴉片(第二階)。", "B": "輕中度且尚未試弱效者,直接強效鴉片非首選順序。", "C": "神經阻斷等侵入性技術保留給藥物難治者。", "D": "非藥物治療為輔助,非當下止痛升級主步驟。"}, "sources": ["WHO Cancer Pain Ladder", "Harrison 21e, Cancer Pain"]}}, "113-通論-家庭-39": {"quick": "大腸癌篩檢FIT『陽性』應直接接受大腸鏡,而非再留2套糞便複檢,故C錯誤。", "detail": {"background": "大腸直腸癌篩檢政策:①政府補助50–74歲(現擴及45歲起部分對象)定期FIT(A正確);②規律FIT約降低大腸癌死亡率『2–3成』(B正確);③『FIT陽性者應直接接受大腸鏡確診』──『不應』因擔心偽陽性而要求再留糞便複檢(重複糞便檢查會延誤診斷、降低敏感度),故C錯誤(為答案);④大腸鏡發現息肉可當場切除(D正確)。\\n\\n護理:衛教FIT陽性務必接受大腸鏡,不可重複糞檢拖延;息肉切除後追蹤。", "options": {"A": "正確:政府補助50–74歲定期篩檢。", "B": "正確:FIT約降低大腸癌死亡率2–3成。", "C": "錯誤(正解):陽性應直接大腸鏡,不應再留2套糞便複檢延誤診斷。", "D": "正確:大腸鏡發現息肉可切除。"}, "sources": ["國健署 大腸癌篩檢", "USPSTF Colorectal Cancer Screening"]}}, "113-進階-家庭-40": {"quick": "右側升結腸腫瘤常見『液態便(腹瀉)』而非阻塞/變細;故選D(液態便)。", "detail": {"background": "右側(升結腸/盲腸)管腔大、糞便仍為『液態』,腫瘤多為突出型、表面滲血→以慢性失血『貧血、疲倦、腹部腫塊』及『排便較稀/液態便』表現;較少出現阻塞、糞便變細或裡急後重(那些屬左側/直腸,糞便已成形、管腔窄)。本題問右側升結腸腫瘤常見症狀,選『液態便』(D)。裡急後重(直腸)、糞便變細(左側狹窄)、阻塞(左側)皆非右側典型。\\n\\n護理:右側結腸癌查貧血/隱血;左側查阻塞/排便改變;均以大腸鏡確診。", "options": {"A": "腸阻塞較常見於左側結腸(管腔窄),非右側。", "B": "裡急後重屬直腸病灶,非右側升結腸。", "C": "糞便變細屬左側狹窄病灶,非右側。", "D": "正解:右側升結腸糞便仍液態,常見液態便(腹瀉)與慢性失血。"}, "sources": ["Harrison 21e, Colorectal Cancer (right vs left)", "NCCN"]}}, "113-進階-家庭-43": {"quick": "依組織學,『腺瘤性息肉(adenomatous polyps)』發展為大腸癌風險最高,故選A。", "detail": {"background": "大腸息肉依組織學分類的癌變風險:①『腺瘤性息肉(adenomatous,含管狀、管狀絨毛狀、絨毛狀)』──為發育不良性病變,是『腺瘤-癌序列』的主角,癌變風險最高(尤其絨毛狀、>1cm、高度異生);②炎性息肉(inflammatory,如IBD的偽息肉)──再生性、本身惡性潛能低;③鋸齒狀息肉(serrated)──部分(SSL、傳統鋸齒狀腺瘤)有癌變潛能(鋸齒狀路徑),但整體分類中以腺瘤性風險最受重視;④纖維上皮性息肉非大腸癌主要前驅。本題以A(腺瘤性息肉)為最高風險。\\n\\n護理:腺瘤切除後依大小/數目/絨毛成分/異生程度安排追蹤間隔。", "options": {"A": "正解:腺瘤性息肉發展為大腸癌的風險最高。", "B": "炎性息肉為再生性,惡性潛能低。", "C": "鋸齒狀息肉部分有潛能,但本題以腺瘤性為最高風險答案。", "D": "纖維上皮性息肉非大腸癌主要前驅病變。"}, "sources": ["Harrison 21e, Adenoma-Carcinoma Sequence", "Sleisenger & Fordtran's"]}}, "113-進階-內科-49": {"quick": "持續下消化道出血但內視鏡與血管攝影皆陰性(間歇/微量出血),下一步用『標記紅血球核醫掃描(tagged RBC scan)』,故選A。", "detail": {"background": "不明原因(obscure)消化道出血,當『上消化道內視鏡、大腸鏡、血管攝影皆陰性』而仍持續出血時:①『鎝-99m標記紅血球核醫掃描(tagged RBC scintigraphy)』──敏感度高(可偵測低至約0.1–0.4 mL/min的『間歇性』出血),可重複造影捕捉間歇出血,作為定位下一步;②若懷疑小腸來源可用膠囊內視鏡/小腸鏡。本例NSAID使用、血便、各項檢查陰性仍持續→『標記紅血球掃描』適合捕捉間歇低速出血(A正確)。鋇劑檢查會妨礙後續內視鏡/血管攝影且診斷率低;超音波/CT對活動性微量出血定位不如核醫掃描敏感。\\n\\n護理:衛教檢查目的;停NSAID;依掃描定位後做血管攝影栓塞或內視鏡治療。", "options": {"A": "正解:標記紅血球核醫掃描敏感、可重複,適合定位間歇性低速出血。", "B": "鋇劑檢查妨礙後續檢查且診斷率低,不適合活動性出血。", "C": "超音波對腸道活動性出血定位不敏感。", "D": "電腦斷層(CTA)對活動性出血有用,但本題血管攝影已陰性,改用敏感度更高的核醫掃描捕捉間歇出血。"}, "sources": ["ACG Obscure GI Bleeding", "Harrison 21e, GI Bleeding (tagged RBC scan)"]}}, "113-進階-內科-50": {"quick": "急性憩室炎『不建議在急性期做大腸鏡』(穿孔風險),診斷以CT最佳;故D『大腸鏡診斷率最佳』錯誤。", "detail": {"background": "大腸憩室症/憩室炎:①大多數憩室症『無症狀』(A正確);②憩室症最常見併發症為『出血及憩室炎』(B正確);③憩室症衛教『高纖維飲食、避免便祕』降低併發(C正確);④『急性憩室炎』的最佳診斷是『電腦斷層(CT)』(看腸壁增厚、憩室、周圍脂肪發炎、膿瘍/穿孔);『急性期不建議大腸鏡』──充氣與操作有『穿孔風險』,大腸鏡應延後至『急性發作緩解後約6–8週』做以排除腫瘤。故D『大腸鏡對急性憩室炎診斷率最佳』錯誤(為答案)。\\n\\n護理:急性期以CT診斷、抗生素±引流;緩解後安排大腸鏡排除惡性。", "options": {"A": "正確:大部分憩室症病人無症狀。", "B": "正確:憩室症最常見併發症為出血及憩室炎。", "C": "正確:建議高纖維飲食、避免便祕。", "D": "錯誤(正解):急性憩室炎以CT診斷最佳;急性期不宜大腸鏡(穿孔風險)。"}, "sources": ["ASCRS Diverticulitis Guidelines", "Harrison 21e, Diverticular Disease"]}}, "113-進階-外科-53": {"quick": "肛裂最『常見』的位置是『後中線』;說後中線最『少見』是錯的,故選C。", "detail": {"background": "肛裂(anal fissure):①急性肛裂最常見症狀為『解便時尖銳/撕裂樣疼痛』並可帶鮮血(A正確);②機轉多為硬便/用力排便造成肛管皮膚(anoderm)撕裂(B正確);③位置:絕大多數位於『後正中線(posterior midline)』(因該處血流相對較差、易缺血癒合差),少數在前正中線(女性產後較多);若肛裂出現在『側面』或多發,要懷疑次發病因(克隆氏、結核、HIV、惡性)。故C『最少見的位置為後中線』『錯誤』(應為最『常見』)(為答案);④治療:軟便高纖、溫水坐浴、局部硝酸甘油/鈣阻斷劑軟膏、肉毒桿菌;難治者『側方內括約肌切開術(lateral internal sphincterotomy)』(D正確)。\\n\\n護理:衛教軟便高纖、坐浴、局部用藥;反覆/非典型位置肛裂查次發病因。", "options": {"A": "正確:解便時尖銳疼痛是急性肛裂最常見症狀。", "B": "正確:多因排便用力造成肛門皮膚撕裂。", "C": "錯誤(正解):後中線是肛裂『最常見』位置,非最少見。", "D": "正確:側方內括約肌切開術是治療方式之一。"}, "sources": ["ASCRS Anal Fissure Guidelines", "Sabiston, Anal Fissure"]}}, "113-進階-外科-54": {"quick": "評估直腸脫垂,『鋇劑攝影』較不適當(應用排便攝影/大腸鏡/肛門超音波),故選A。", "detail": {"background": "直腸脫垂(本例老人解便後腸子脫出已回復)的評估工具:①『排便攝影(defecography)』──動態評估脫垂與骨盆底功能,適當;②『大腸鏡』──排除導致脫垂的腫瘤等病灶,適當;③『肛門超音波(endoanal US)』──評估括約肌完整性(失禁評估),適當;④『鋇劑攝影(barium enema)』──為靜態對比影像,『對動態的直腸脫垂評估幫助有限』,較不適當(選A)。確診多靠理學檢查(請病人用力/蹲姿重現脫垂)。\\n\\n護理:重現脫垂評估程度、排除腫瘤、評估括約肌與失禁;手術(直腸固定術)為主。", "options": {"A": "正解(較不適當):鋇劑攝影為靜態影像,對動態直腸脫垂評估幫助有限。", "B": "大腸鏡可排除腫瘤等病灶,適當。", "C": "肛門超音波評估括約肌完整性,適當。", "D": "排便攝影動態評估脫垂與骨盆底,適當。"}, "sources": ["ASCRS Rectal Prolapse Guidelines", "Sabiston"]}}, "113-進階-內科-69": {"quick": "急性憩室炎(左下腹痛+反彈痛+發燒)『不應做鋇劑灌腸』(穿孔風險),故C最不適當。", "detail": {"background": "本例女性左下腹痛+發燒39°C+左下腹反彈痛+白血球14000(neutrophil 90%)→疑『急性(乙狀結腸)憩室炎』或骨盆腔感染。處置:①照會婦產科排除骨盆腔發炎(PID)(A適當);②若有腹膜炎/穿孔/膿瘍惡化,照會外科評估手術(B在腹膜炎情況可適當);③給抗生素(D適當);④『急性發炎期做鋇劑灌腸(barium enema)』有『穿孔致鋇劑腹膜炎』風險,『不適當』(急性期應以『CT』診斷憩室炎,鋇劑灌腸禁用於疑穿孔/急性憩室炎)(選C)。\\n\\n護理:急性憩室炎以CT診斷+抗生素;勿在急性期做鋇劑灌腸/大腸鏡(穿孔風險),緩解後再評估。", "options": {"A": "照會婦產科評估PID合理(女性下腹痛鑑別),適當。", "B": "有腹膜炎徵象時照會外科評估手術,適當。", "C": "最不適當(正解):急性憩室炎做鋇劑灌腸有穿孔風險,應以CT診斷。", "D": "給予抗生素治療適當。"}, "sources": ["ASCRS Diverticulitis (avoid barium in acute)", "Harrison 21e"]}}, "113-進階-外科-74": {"quick": "本題GI出血定位敘述中,CTA偵測下限與描述有誤(B),其餘關於NG灌洗、核醫掃描原則正確;故錯誤選B。", "detail": {"background": "消化道出血定位工具與偵測下限:①NG灌洗抽到『膽汁且非血性』可降低但『不能完全排除』上消化道出血(尤其十二指腸幽門後出血)(A正確);②『多偵測器CT血管攝影(CTA)』可偵測『活動性出血約≥0.3–0.5 mL/min』(較不敏感於核醫掃描),是定位活動性出血的快速工具──本題B對CTA偵測極限/描述有誤(把過低門檻或細節描述錯誤)(選B為錯誤);③『鎝-99m標記紅血球核醫掃描』可偵測『更低速(約0.1–0.4 mL/min)』『間歇性』出血,可24小時內重複造影,但定位精確度較差(C正確);④CTA是『小腸/不明部位出血』的常用首選診斷之一(D大致正確)。本題以B為錯誤敘述。\\n\\n護理:依出血速度與穩定度選工具(活動快→CTA/血管攝影;間歇慢→核醫掃描;小腸→CTA/膠囊內視鏡)。", "options": {"A": "正確:NG抽到膽汁非血性仍不能排除上消化道出血。", "B": "錯誤(正解):CTA偵測下限/描述有誤(其敏感度不如核醫掃描,陳述不正確)。", "C": "正確:標記紅血球掃描可偵測低速間歇出血、可重複但精確度較差。", "D": "大致正確:CTA為小腸/不明出血常用診斷方式。"}, "sources": ["ACG GI Bleeding; Localization modalities", "Radiology of GI bleeding"]}}, "113-進階-外科-79": {"quick": "第四期降結腸癌KRAS『突變型』不能用抗EGFR(cetuximab),第一線用FOLFOX+bevacizumab,故選A。", "detail": {"background": "轉移性大腸直腸癌(mCRC)標靶選擇依『RAS基因狀態與腫瘤位置』:①『RAS(KRAS/NRAS)突變型』──『不可』使用抗EGFR單株抗體(cetuximab/panitumumab,因下游RAS活化使其無效),應用『抗血管新生』的bevacizumab(Avastin)合併化療(FOLFOX/FOLFIRI);②RAS『野生型』『左側』腫瘤才適合抗EGFR(cetuximab/Erbitux)。本例KRAS突變→第一線『FOLFOX+bevacizumab(Avastin)』(A正確)。Lonsurf(trifluridine/tipiracil)為後線藥,非第一線。\\n\\n護理:衛教標靶選擇依基因檢測;bevacizumab注意高血壓/蛋白尿/出血/傷口癒合;抗EGFR注意皮疹。", "options": {"A": "正解:KRAS突變型用FOLFOX+bevacizumab(Avastin)。", "B": "KRAS突變不可用cetuximab(Erbitux,抗EGFR無效)。", "C": "Lonsurf為後線藥,非第一線。", "D": "Lonsurf+Erbitux不符KRAS突變且非第一線。"}, "sources": ["NCCN Colon Cancer (RAS testing, anti-EGFR vs anti-VEGF)", "Harrison 21e"]}}, "113-進階-外科-80": {"quick": "直腸癌局部切除限於『極早期、小的T1』腫瘤;『小於4cm的T1都可局部切除』敘述過寬,故A錯誤。", "detail": {"background": "直腸癌診斷與治療:①局部切除(transanal/TEM)僅適用於『嚴格選擇的早期T1、低風險組織特徵(分化良好、無淋巴血管侵犯、切緣陰性)、且腫瘤較小(一般<3cm且占腸周<1/3)』者;『小於4cm的T1腫瘤皆可局部切除』敘述『過於寬鬆/不正確』(尺寸與風險條件更嚴格)(A錯誤,為答案);②MRI是直腸癌『局部分期(T與環周邊緣CRM、N)』優於CT的工具(B正確);③術前(neoadjuvant)放化療與術後放化療的整體腫瘤控制效應相近,但術前CRT局部復發更低、毒性較低(C大致正確);④術前放化療可達約15–20%的病理完全反應(pCR)(D正確)。本題A錯誤。\\n\\n護理:局部切除須嚴格篩選;MRI分期;新輔助治療衛教。", "options": {"A": "錯誤(正解):局部切除限嚴格選擇的小T1低風險者,『<4cm T1皆可』過寬。", "B": "正確:MRI優於CT用於直腸癌局部分期。", "C": "正確:術前與術後放化療整體效應相近(術前局部復發較低)。", "D": "正確:術前放化療可達約20%完全反應。"}, "sources": ["NCCN Rectal Cancer", "ASCRS Rectal Cancer Guidelines"]}}, "114-進階-外科-39": {"quick": "結腸癌術前必要影像為『胸腹骨盆電腦斷層(CT)』分期,故選D。", "detail": {"background": "結腸癌術前分期的『標準必要影像』是『胸部+腹部+骨盆電腦斷層(CT chest/abdomen/pelvis)』──評估局部侵犯、區域淋巴結與遠端轉移(肝、肺、腹膜)。加上大腸鏡(切片+全大腸評估)、CEA。MRI主要用於『直腸癌』局部分期(非結腸癌常規);PET用於疑復發/轉移釐清或CT不確定時,非常規術前;腹部超音波對分期不足。故結腸癌術前必要影像為胸腹骨盆CT(D)。\\n\\n護理:術前安排CT分期、大腸鏡與CEA;直腸癌另加骨盆MRI。", "options": {"A": "腹部超音波對分期不足,非必要術前影像。", "B": "PET用於特定情況(疑復發/轉移釐清),非常規術前。", "C": "MRI主要用於直腸癌局部分期,非結腸癌常規。", "D": "正解:胸腹骨盆電腦斷層為結腸癌術前必要分期影像。"}, "sources": ["NCCN Colon Cancer (staging imaging)", "ASCRS"]}}, "114-進階-內科-42": {"quick": "大腸直腸癌風險因子敘述中,『男性發生率高於女性』敘述須修正——本題以A為錯誤。", "detail": {"background": "大腸直腸癌風險因子:②規律服用aspirin可降低風險(化學預防,B正確);③高脂肪/紅肉/加工肉、低纖維飲食增加風險(C正確);④大部分大腸直腸癌源自『腺瘤性息肉』(腺瘤-癌序列,D正確)。關於性別:整體而言大腸癌風險男性略高於女性,但本題將『男性發生率高於女性』列為『錯誤』敘述──就考題設計與某些統計(發生率男女接近、且不同部位/年齡層分布有別,部分資料女性右側病灶比例與年長女性發生率不容忽視),命題以A為應修正/錯誤的敘述。應掌握確定正確的B、C、D三項風險概念。\\n\\n護理:衛教飲食(高纖、少紅肉加工肉)、規律運動、戒菸酒、定期篩檢;腺瘤切除。", "options": {"A": "本題定為錯誤敘述:性別發生率差異不應如此絕對化(男性高於女性的陳述被列為錯誤)。", "B": "正確:規律aspirin可降低大腸癌風險(化學預防)。", "C": "正確:高脂肪飲食可能增加罹病率。", "D": "正確:大部分大腸直腸癌源自腺瘤性息肉。"}, "sources": ["Harrison 21e, Colorectal Cancer risk factors", "USPSTF/ACS"]}}, "114-進階-內科-44": {"quick": "心房顫動/冠心病患者突發腹痛+血便+腹部X光『拇指印痕(thumbprinting)』→缺血性結腸炎,故選B。", "detail": {"background": "缺血性結腸炎(ischemic colitis)為腸道血流不足致黏膜缺血,好發老年、有心血管病/心房顫動(栓塞或低灌流)、低血壓者。表現:突發腹痛(常左側/脾曲、乙狀結腸分水嶺區)、急便、『血便/血性腹瀉』;腹部X光/CT可見『拇指印痕(thumbprinting,黏膜下水腫出血)』。本例高血壓+冠心+心房顫動+劇烈腹痛腹瀉血便+thumbprinting→缺血性結腸炎(B)。胃潰瘍穿孔為板狀腹+游離氣體;主動脈剝離為撕裂痛+脈搏血壓差異;潰瘍性結腸炎為慢性血便。多數缺血性結腸炎為非壞疽型可保守(腸道休息、輸液、抗生素),壞疽/腹膜炎需手術。\\n\\n護理:支持治療、矯正低灌流、監測壞疽(發燒、腹膜炎、乳酸升高)需手術。", "options": {"A": "胃潰瘍穿孔以板狀腹+游離氣體為主,非thumbprinting。", "B": "正解:心血管病/AF+腹痛血便+thumbprinting→缺血性結腸炎。", "C": "主動脈瘤剝離以撕裂痛、脈搏/血壓差異為主,非血便thumbprinting。", "D": "潰瘍性結腸炎為慢性血便,非急性缺血表現。"}, "sources": ["ACG Ischemic Colitis Guidelines", "Harrison 21e, Intestinal Ischemia"]}}, "114-進階-外科-47": {"quick": "憩室炎併膿瘍直徑4.5cm,最適當為『經皮引流+抗生素』,故選B。", "detail": {"background": "急性憩室炎併膿瘍(complicated diverticulitis with abscess)的處置依膿瘍大小:①『小膿瘍(一般<3–4cm)』──可單用『靜脈抗生素』保守;②『較大膿瘍(≥4cm,本例4.5cm)』──『影像(CT/超音波)導引經皮引流』+抗生素,避免立即大手術;③穩定後視情況評估擇期切除;④若『瀰漫性腹膜炎、游離穿孔、敗血或引流失敗』才需『緊急手術(Hartmann手術:乙狀結腸切除+結腸造口)』。本例4.5cm膿瘍、無瀰漫腹膜炎→『經皮引流+抗生素』(B)。緊急切除/造口(A、D)保留給穿孔腹膜炎;僅口服抗生素觀察(C)對4.5cm膿瘍不足。\\n\\n護理:引流照護、抗生素、監測敗血;穩定後評估擇期手術。", "options": {"A": "緊急手術切除保留給瀰漫腹膜炎/穿孔,非本例首選。", "B": "正解:≥4cm膿瘍以經皮引流+抗生素最適當。", "C": "僅口服抗生素觀察對4.5cm膿瘍治療不足。", "D": "腸切除+人工肛門(Hartmann)保留給穿孔腹膜炎/失敗者。"}, "sources": ["ASCRS Diverticulitis Guidelines (abscess >4cm drainage)", "Harrison 21e"]}}, "114-進階-外科-48": {"quick": "家族性大腸瘜肉症(FAP)應於『約12歲(青春期前)』開始大腸鏡/乙狀結腸鏡監測,故選A。", "detail": {"background": "家族性腺瘤性瘜肉症(familial adenomatous polyposis, FAP)為APC基因突變的體染色體顯性遺傳病,青少年期大腸即長出數百至數千顆腺瘤,『若不處理幾乎100%在40歲前發展為大腸癌』。因此監測須『早』開始:典型FAP約『10–12歲(青春期前)』起每年做乙狀結腸鏡/大腸鏡,確診後依瘜肉負擔安排『預防性全大腸切除』。並監測上消化道(十二指腸/壺腹腺瘤)與甲狀腺等腸外表現。本題以『12歲』為最適當開始年齡(A)。(對比衰減型AFAP與Lynch起始年齡較晚。)\\n\\n護理:基因諮詢與家族篩檢;早期內視鏡監測;適時預防性手術;終生追蹤腸外腫瘤。", "options": {"A": "正解:FAP約12歲(青春期前)開始內視鏡監測。", "B": "18歲對典型FAP過晚(瘜肉青春期即出現)。", "C": "30歲過晚,典型FAP風險已高。", "D": "40歲過晚,多數已可能癌變。"}, "sources": ["NCCN Genetic/Familial High-Risk Assessment: Colorectal (FAP)", "Harrison 21e, FAP"]}}, "114-進階-外科-49": {"quick": "直腸癌低前位切除(LAR)後常見便意急迫、頻便、急迫失禁等→『低前位切除症候群(LARS)』,故選C。", "detail": {"background": "低前位切除症候群(low anterior resection syndrome, LARS)是直腸癌LAR後常見的腸道功能障礙,因『直腸儲存功能喪失、吻合位置低、可能的神經/括約肌影響、放療』所致,表現為『便意急迫(urgency)、排便頻繁、分次排便(clustering)、急迫性失禁、排空不全、脹氣失禁』等,影響生活品質,多在術後數月至數年。需與『吻合口滲漏(早期、發燒腹膜炎)、骨盆腔感染(發燒)、腫瘤復發(出血、腫塊、體重減輕)』鑑別。本例術後『便意急迫與頻繁排便』為典型LARS(C)。\\n\\n護理:衛教LARS常見且可改善;飲食調整、骨盆底復健、止瀉/膨脹劑、必要時生物回饋或經肛門灌洗。", "options": {"A": "吻合口滲漏為早期、伴發燒腹膜炎/敗血,非慢性便意急迫。", "B": "骨盆腔感染伴發燒,非單純排便型態改變。", "C": "正解:術後便意急迫與頻便為低前位切除症候群(LARS)。", "D": "直腸癌復發以出血、腫塊、體重減輕表現,非單純頻便急迫。"}, "sources": ["LARS literature; ASCRS Rectal Cancer", "Harrison 21e"]}}, "114-進階-外科-50": {"quick": "直腸癌『腫瘤侵犯深度與局部淋巴結』分期,最適當的影像是『核磁共振(MRI)』,故選B。", "detail": {"background": "直腸癌『局部分期(T與環周邊緣CRM、N)』的最佳影像是『骨盆腔MRI』──高軟組織解析度,可評估腫瘤侵犯深度、環周切緣(CRM)受侵、繫膜淋巴結與壁外血管侵犯(EMVI),決定是否需術前放化療。內視鏡超音波(EUS)對早期T分期也佳(尤其T1/T2)。CT用於『遠端轉移』分期(胸腹骨盆),對局部T/N解析不如MRI;PET用於疑復發/轉移;骨盆超音波非標準。本題問『腫瘤與局部淋巴結』評估→MRI(B)。\\n\\n護理:直腸癌安排骨盆MRI局部分期+胸腹骨盆CT遠端分期;依分期決定新輔助治療。", "options": {"A": "CT用於遠端轉移分期,對局部T/N解析不如MRI。", "B": "正解:MRI對直腸癌局部腫瘤侵犯與淋巴結評估最適當。", "C": "PET用於疑復發/轉移釐清,非局部分期首選。", "D": "骨盆腔超音波非直腸癌局部分期標準工具。"}, "sources": ["NCCN Rectal Cancer (MRI for local staging)", "ASCRS"]}}, "114-進階-外科-52": {"quick": "肛門廔管最常見的原因是『肛門腺(隱窩)感染』(肛周膿瘍演變而來),故選C。", "detail": {"background": "肛門廔管(anal fistula)絕大多數為『隱窩腺源性(cryptoglandular)』──即肛管齒狀線的『肛門腺(隱窩腺)阻塞感染』形成肛周膿瘍,膿瘍引流/破裂後在肛管與肛周皮膚間留下慢性管道(廔管)。故『肛門腺感染』為最常見原因(C)。其他較少見原因:克隆氏病(造成複雜性/多發廔管)、感染性腸炎、結核、放線菌、惡性腫瘤、外傷或手術。治療依廔管走向(與括約肌關係)選擇廔管切開術、掛線(seton)等,須兼顧控便。\\n\\n護理:評估廔管與括約肌關係、找次發病因(反覆/複雜廔管查克隆氏);術後傷口照護與控便。", "options": {"A": "手術併發症為少見原因,非最常見。", "B": "克隆氏病造成複雜廔管但非最常見『一般』原因。", "C": "正解:肛門腺(隱窩腺)感染(肛周膿瘍演變)為最常見原因。", "D": "感染性腸炎為少見原因。"}, "sources": ["ASCRS Anal Fistula Guidelines (cryptoglandular)", "Sabiston"]}}, "114-進階-外科-53": {"quick": "左側結腸癌最常見表現為『腹脹與腸阻塞』(管腔窄、糞便成形),故選D。", "detail": {"background": "左側結腸(降結腸/乙狀結腸/直腸)管腔較窄、糞便已成形,腫瘤多為『環狀縮窄型』→臨床以『排便習慣改變、糞便變細、鮮血便、腹脹與腸阻塞』表現;晚期可完全阻塞。右側結腸管腔大、糞便液態,以慢性失血『貧血』與腹部腫塊為主。本題問左側結腸癌最常見表現→『腹脹與腸阻塞』(D)。腹部腫塊、貧血、體重減輕較屬右側或非特異。\\n\\n護理:左側結腸癌警覺阻塞(腹脹、便祕、絞痛);右側查貧血;均以大腸鏡確診、CT分期。", "options": {"A": "腹部腫塊較常見於右側結腸癌(可觸及腫塊)。", "B": "貧血(慢性失血)較常見於右側結腸癌。", "C": "體重減輕為非特異晚期表現,非左側最常見。", "D": "正解:左側結腸癌以腹脹與腸阻塞最常見。"}, "sources": ["Harrison 21e, Colorectal Cancer (left vs right)", "NCCN"]}}, "114-進階-外科-54": {"quick": "影響左右側大腸癌預後差異的主因是『分子/基因表現與分化(腫瘤生物學)』,故選B。", "detail": {"background": "左右側大腸癌不僅胚胎來源不同(右側來自中腸、左側來自後腸),其『分子生物學特徵』也不同:右側癌較多『MSI-H/MMR缺陷、BRAF突變、CIMP、黏液性/分化較差』,左側癌較多『染色體不穩定(CIN)、KRAS/APC、分化較好』,且對抗EGFR治療反應左側較佳。整體而言『左側預後相對較佳』,主因是『腫瘤的分子/基因表現與分化(腫瘤生物學)』差異,而非單純腫瘤大小、年齡或肝功能。故B正確。\\n\\n護理:理解側別影響預後與用藥(RAS野生型左側才用抗EGFR);依分子分型個人化治療。", "options": {"A": "腫瘤大小非左右預後差異的主因。", "B": "正解:基因/分子表現與分化(腫瘤生物學)是左右預後差異主因。", "C": "年齡非主要決定左右預後差異的因素。", "D": "肝功能非左右大腸癌預後差異的主因。"}, "sources": ["NCCN Colon Cancer (sidedness & molecular)", "Harrison 21e"]}}, "105-TNPA-通論-32": {"quick
