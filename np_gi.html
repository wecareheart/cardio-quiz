num": 49, "stem": "一位 70 歲男性病人,主訴近半年來進食時常感到食物卡在胸口,尤其是固體食物,伴隨 體重減輕及間歇性咳嗽,有胃食道逆流病史。有關此病人的吞嚥困難評估與潛在病因, 下列敘述何者錯誤?", "options": {"A": "臨床表現顯示存在機械性阻塞的可能性,例如食道狹窄或腫瘤", "B": "間歇性咳嗽可能表示吞嚥功能障礙導致食物或液體誤吸入氣管", "C": "應優先進行胃食道逆流的藥物治療,待症狀改善後再考慮進一步的食道功能檢查", "D": "消化性狹窄 ( peptic stricture ) 也是導致吞嚥困難和體重減輕的重要鑑別診斷之一"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_進階_家庭_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic_code": "G1", "topic_num": 1, "topic": "食道疾病", "correction_note": ""}, {"id": "114-通論-麻醉-67", "roc_year": 114, "subject_group": "專科護理通論", "branch": "麻醉", "q_num": 67, "stem": "下列何者與胃食道逆流較不相關?", "options": {"A": "肥胖", "B": "高血壓", "C": "懷孕", "D": "食道裂孔疝氣"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "114_通論_麻醉_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic_code": "G1", "topic_num": 1, "topic": "食道疾病", "correction_note": ""}, {"id": "114-進階-外科-77", "roc_year": 114, "subject_group": "進階專科護理", "branch": "外科", "q_num": 77, "stem": "有關晚期食道癌治療與疾病特性,下列敘述何者錯誤?", "options": {"A": "部分病人即使接受積極治療,仍有腫瘤轉移的現象", "B": "現階段已有標準化分子標靶療法,可廣泛使用於晚期食道癌治療", "C": "食道癌屬於異質性腫瘤,未來可能需個人化治療", "D": "臨床試驗以及標準化手術前後之照護,有助提升總體療效與安全性"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "114_進階_外科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic_code": "G1", "topic_num": 1, "topic": "食道疾病", "correction_note": ""}, {"id": "105-TNPA-通論-58", "roc_year": 105, "exam_tag": "105", "subject_group": "專科護理通論", "branch": "通論", "q_num": 58, "stem": "一位胃癌的病人因為一直解黑便、無法進食,身形日益消瘦。家屬因為擔心病人知道得癌症會讓他喪失求生意志,因此只告訴他得了胃潰瘍,並要求醫護人員不能告知實情。 今天病人對你說:「這個病應該很嚴重吧,哪有胃潰瘍都不會好的,你可不可以告訴 我,我得了什麼病啊?」,下列回應何者最適當?", "options": {"A": "「伯伯,您得的是胃潰瘍啦,不要想太多,配合醫生治療就會好的。」", "B": "「我會請醫生與您說明。」告訴伯伯解釋病情是醫生的工作,你會幫他請醫生過來。」", "C": "「您的子女都很清楚,您可以去問他們。」", "D": "「伯伯,您怎麼會這麼想,是在擔心什麼事嗎?」"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source": "TNPA", "to 膿瘍破裂", "C": "闌尾炎膿瘍破裂", "D": "大腸癌壞死穿孔"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "110_通論_其他_Q.pdf", "exam_tag": "110", "source": "MOHW", "topic_code": "G6", "topic_num": 6, "topic": "膽道與胰臟疾病", "correction_note": ""}, {"id": "111-進階-內科-43", "roc_year": 111, "subject_group": "進階專科護理", "branch": "內科", "q_num": 43, "stem": "急性胰臟炎 ( acute pancreatitis ) 的敘述,下列何者錯誤?", "options": {"A": "高三酸甘油酯血症 ( hypertriglycemia,通常 TG > 1000 mg / dL ) 也會引起急性胰臟炎, 病人常會伴隨有過去不知道或控制不佳的糖尿病", "B": "膽結石與喝酒都是急性胰臟炎常見的原因 ( 兩項合計大約佔 75 - 80 % ) 。若有小於 5 mm 膽結石時,相較於有較大膽結石者,急性胰臟炎的發生機率較低", "C": "接受經內視鏡逆行性膽胰管攝影術 (endoscopic retrograde cholangiopancreatography, ERCP ) 檢查後,約 5 - 10 % 會發生急性胰臟炎,簡稱 PEP ( post - ERCP pancreatitis )", "D": "如果想要降低 PEP 的發生,在術前可以經肛門使用 indomethacin 塞劑,或是預防性的 放置胰管支架 ( pancreatic duct stent )"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "111_進階_內科_Q.pdf", "exam_tag": "111", "source": "MOHW", "topic_code": "G6", "topic_num": 6, "topic": "膽道與胰臟疾病", "correction_note": ""}, {"id": "111-進階-內科-44", "roc_year": 111, "subject_group": "進階專科護理", "branch": "內科", "q_num": 44, "stem": "病人到院 24 小時內,BISAP ( bedside index of severity in acute pancreatitis ) score 是一種 包含 5 個臨床與檢驗指標的量表,將其應用於預測急性胰臟炎的嚴重性與死亡率時, 下列敘述何者錯誤?", "options": {"A": "血糖 ( blood sugar ) > 200 mg / dL", "B": "意識障礙 ( impaired mental status ): Glasgow coma scale score < 15", "C": "全身性炎症反應症候群 (systemic inflammatory response syndrome, SIRS ) ≥ 2 分", "D": "年齡 ( age ) > 60 歲與肋膜積液 ( pleural effusion )"}, "needs_image": false, "answer": "A", "answer_status": "正常", "accepted_answers": ["A"], "source_pdf": "111_進階_內科_Q.pdf", "exam_tag": "111", "source": "MOHW", "topic_code": "G6", "topic_num": 6, "topic": "膽道與胰臟疾病", "correction_note": ""}, {"id": "111-進階-內科-46", "roc_year": 111, "subject_group": "進階專科護理", "branch": "內科", "q_num": 46, "stem": "病人因右上腹劇痛、畏寒且發燒,至急診室就醫,血壓 135 / 80 mmHg,心跳 120 次 / min, 呼吸 22 次 / min,體溫 38.5 °C。理學檢查 關闌尾炎之敘述,下列何者正確?", "options": {"A": "按壓肚臍與右側腹股溝連線的下 2 / 3 處,會有按壓痛,甚至反彈痛", "B": "psoas sign 是指將右大腿內翻會導致腹部的疼痛感增加", "C": "Rovsing sign 是指按壓左下腹會導致右下腹疼痛", "D": "腹部肌肉僵硬 ( muscle guarding ) 表示病人過度緊張,暫不需手術治療 專科護理通論(共同) 專科護理通論"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "113_通論_5分科_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic_code": "G8", "topic_num": 8, "topic": "小腸/急腹症/腹瀉/腸道感染", "correction_note": ""}, {"id": "113-通論-5分科-69", "roc_year": 113, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 69, "stem": "有關機械性腸阻塞 ( mechanical ileus ) 的病徵,下列何者正確? 1 可聽到高頻 ( high - pitched ) 且高活動性 ( hyperactive ) 腸音 2 為腹部手術後之常見現象 3 敗血症為罕見的併發症 4 若有明顯腹膜炎,表示可能為絞扼性 ( strangulation ) 腸阻塞", "options": {"A": "12", "B": "34", "C": "14", "D": "23"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "113_通論_5分科_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic_code": "G8", "topic_num": 8, "topic": "小腸/急腹症/腹瀉/腸道感染", "correction_note": ""}, {"id": "113-通論-5分科-75", "roc_year": 113, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 75, "stem": "承上題,為了進一步鑑別上述的臆斷,需要尋找其他的身體診察發現,下列哪一項徵候 最沒有幫助?", "options": {"A": "病人出現發燒", "B": "鞏膜沒有黃疸", "C": "腰側出現透納氏徵候", "D": "腰大肌徵候陽性 專科護理通論(共同) 專科護理通論"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "113_通論_5分科_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic_code": "G8", "topic_num": 8, "topic": "小腸/急腹症/腹瀉/腸道感染", "correction_note": ""}, {"id": "114-進階-內科-1", "roc_year": 114, "subject_group": "進階專科護理", "branch": "內科", "q_num": 1, "stem": "有關腸道營養 ( enteral nutrition ) 的一般原則,下列敘述何者正確? 1 假如病人情況允許,靜脈營養應優先於腸道營養 2 管路灌食有腹瀉情形時,應使用止瀉藥及減少纖維素含量 3 鼻胃管放置錯位,包括插進氣管、支氣管,常發生在昏迷的病人 4 有長期管灌需求的病人,可以建議放置胃造廔管", "options": {"A": "12", "B": "23", "C": "34", "D": "14"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_進階_內科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic_code": "G8", "topic_num": 8, "topic": "小腸/急腹症/腹瀉/腸道感染", "correction_note": ""}, {"id": "114-通論-5分科-55", "roc_year": 114, "subject_group": "專科護理通論", "branch": "5分科", "q_num": 55, "stem": "有關急性闌尾炎之敘述,下列何者正確?", "options": {"A": "食慾不振 ( anorexia ) 的問題不常發生", "B": "不到 50 % 的病人按壓右下腹會出現壓痛", "C": "最痛按壓點位於麥克伯尼點 ( McBurney point ) 或附近", "D": "腰大肌徵象 ( psoas sign ) 是身體檢查中敏感度最高的項目"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_通論_5分科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic_code": "G8", "topic_num": 8, "topic": "小腸/急腹症/腹瀉/腸道感染", "correction_note": ""}, {"id": "114-進階-婦產科-76", "roc_year": 114, "subject_group": "進階專科護理", "branch": "婦產科", "q_num": 76, "stem": "卵巢癌病人接受過手術以及化學治療,目前有腸阻塞的狀況,下列敘述何者最不適當?", "options": {"A": "多處腸阻塞常見於卵巢癌病人", "B": "如果只有一處腸阻塞的話,可以考慮切除或繞道手術", "C": "如果有多處腸阻塞的話,切除多處阻塞部位比腸造口手術適合", "D": "卵巢癌腸阻塞患者進行手術的重大併發症高達 30 %"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source_pdf": "114_進階_婦產科_Q.pdf", "exam_tag": "114", "source": "MOHW", "topic_code": "G8", "topic_num": 8, "topic": "小腸/急腹症/腹瀉/腸道感染", "correction_note": ""}, {"id": "106-106a-外科-54", "roc_year": 106, "exam_tag": "106-106a", "subject_group": "進階專科護理", "branch": "外科", "q_num": 54, "stem": "關於發炎性腸道疾病 ( inflammatory bowel disease ) 的敘述,下列何者正確?", "options": {"A": "潰瘍性結腸炎為結腸黏膜發炎過程,約半數病人會影響到迴腸末端", "B": "潰瘍性結腸炎病理變化出現潰瘍及隱窩膿瘍,晚期會造成腸道狹窄", "C": "克隆氏症好發於女性病人,約 1 / 3 病人有肛門疾病,少數病人侷限於會陰部", "D": "克隆氏症手術切除併發症的腸道,範圍需到顯微鏡可見之正常邊緣"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source": "TNPA", "topic_code": "G9", "topic_num": 9, "topic": "發炎性腸道疾病(IBD)", "correction_note": ""}, {"id": "108b-TNPA-外科-37", "roc_year": 108, "exam_tag": "108b", "subject_group": "進階專科護理", "branch": "外科", "q_num": 37, "stem": "下列臨床表徵中,何者是屬於克隆氏結腸炎的特性? 1 thickened wall 2 diarrhea 3 rectum bleeding 4 continuous ulcerative distribution 5 fistulas", "options": {"A": "123", "B": "125", "C": "234", "D": "235"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source": "TNPA", "topic_code": "G9", "topic_num": 9, "topic": "發炎性腸道疾病(IBD)", "correction_note": ""}, {"id": "108a-TNPA-外科-41", "roc_year": 108, "exam_tag": "108a", "subject_group": "進階專科護理", "branch": "外科", "q_num": 41, "stem": "一位58歲女性,接受手術,術後使用clindamycin 1週,主訴腹痛及腹瀉、便中帶有黏液、 味臭。此情況可能原因為何?", "options": {"A": "amebic colitis", "B": "inflammatory bowel disease", "C": "pseudomembranous colitis", "D": "ulcerative colitis"}, "needs_image": false, "answer": "C", "answer_status": "正常", "accepted_answers": ["C"], "source": "TNPA", "topic_code": "G9", "topic_num": 9, "topic": "發炎性腸道疾病(IBD)", "correction_note": ""}, {"id": "111-進階-外科-68", "roc_year": 111, "subject_group": "進階專科護理", "branch": "外科", "q_num": 68, "stem": "有關克隆氏症 ( Crohn disease ) 的敘述,下列何者錯誤?", "options": {"A": "有家族史且吸菸等環境因素增加風險", "B": "腸道菌群失調為主要原因", "C": "大多數患者小腸和大腸均受影響,迴腸末端是最常見的疾病部位", "D": "腸道黏膜病變為跳躍型病變而非連續性病變"}, "needs_image": false, "answer": "B", "answer_status": "正常", "accepted_answers": ["B"], "source_pdf": "111_進階_外科_Q.pdf", "exam_tag": "111", "source": "MOHW", "topic_code": "G9", "topic_num": 9, "topic": "發炎性腸道疾病(IBD)", "correction_note": ""}, {"id": "113-進階-外科-69", "roc_year": 113, "subject_group": "進階專科護理", "branch": "外科", "q_num": 69, "stem": "關於克隆氏症 ( Crohn disease ) 造成小腸阻塞的敘述,下列何者錯誤?", "options": {"A": "糞便乳鐵蛋白 ( lactoferrin ) 和鈣衛蛋白 ( calprotectin ) 數值,可有助於分辨阻塞是因急性發作 或慢性狹窄所造成的", "B": "遺傳標記 ( 如 NOD2、TLR4、CX3CR1 ) 可用於預測藥物的療效", "C": "小腸狹窄成形術可保留腸道,併發症及復發率與切除再吻合術相當", "D": "長期狹窄可能會造成癌病變,建議進行狹窄部位黏膜冷凍切片排除惡性"}, "needs_image": false, "answer": "D", "answer_status": "正常", "accepted_answers": ["D"], "source_pdf": "113_進階_外科_Q.pdf", "exam_tag": "113", "source": "MOHW", "topic_code": "G9", "topic_num": 9, "topic": "發炎性腸道疾病(IBD)", "correction_note": ""}], E={"106-106a-內科-12": {"quick": "判定食道癌『腫瘤侵犯深度(T分期)』最準確的是內視鏡超音波(EUS),能逐層辨識食道壁與周邊淋巴結。", "detail": {"background": "食道癌分期採TNM,其中T分期(腫瘤侵犯食道壁的深度)決定能否內視鏡切除、是否需術前化放療。食道壁由黏膜(m)、黏膜下層(sm)、固有肌層(mp)、外膜構成。內視鏡超音波(endoscopic ultrasound, EUS)把超音波探頭放到食道腔內,可清楚呈現五層壁結構,對T分期準確度約80–90%,並能評估區域淋巴結(N)及做細針抽吸(FNA),是判定『侵犯深度』的最佳工具。電腦斷層(CT)強項在偵測遠端轉移(M)與縱膈/腹腔淋巴結,但對壁內逐層深度解析力差;PET-CT用於偵測遠端轉移與治療反應;一般上消化道內視鏡只能看黏膜表面病灶並做切片確診組織型態,無法判斷『深度』。故分期工作上:內視鏡確診組織→EUS定T/N→CT/PET定M。\\n\\n護理重點:EUS屬侵入性,需禁食、衛教吞嚥探頭過程、術後觀察出血/穿孔(胸痛、皮下氣腫、發燒)。早期食道癌(限黏膜層、無淋巴轉移)可考慮內視鏡黏膜下剝離(ESD);侵犯較深者需手術或同步化放療。", "options": {"A": "電腦斷層長於評估遠端轉移與淋巴結,但對食道壁分層解析差,無法精準定T分期,非最佳。", "B": "內視鏡超音波能逐層顯示食道壁並評估周邊淋巴結,T/N分期準確度最高,為正解。", "C": "核磁共振對食道T分期角色有限,軟組織對比雖佳但受呼吸/蠕動假影影響,非首選。", "D": "上消化道內視鏡只能觀察黏膜表面並切片『確診』,看不到侵犯深度,非答案。"}, "sources": ["Harrison 21e, Esophageal Cancer", "Sleisenger & Fordtran's GI/Liver Disease, Esophageal Tumors", "NCCN Esophageal and Esophagogastric Junction Cancers"]}}, "106-106a-通論-75": {"quick": "檳榔本身(含檳榔鹼、檳榔素)即為第一類致癌物,『去除紅灰白灰仍會致癌』,故D敘述錯誤。", "detail": {"background": "檳榔(betel quid)經WHO國際癌症研究署(IARC)列為第一類人類致癌物(Group 1)。其組成包括檳榔子(areca nut)、荖葉/荖花、紅灰或白灰(石灰)。致癌與多重成分有關:檳榔子本身含檳榔鹼(arecoline)等生物鹼會產生亞硝胺與活性氧、造成口腔黏膜下纖維化(OSF)與基因突變;加入的石灰提高鹼性、促進活性氧生成而加重傷害,但『即使不加紅白灰,檳榔子本身仍具致癌性』。嚼食檳榔明確增加口腔癌、咽癌、食道癌風險,並與菸酒有加乘效應。檳榔鹼具擬副交感與心血管興奮作用,可致心搏過速、心律不整,甚至誘發心肌缺血/梗塞;對氣喘者可因膽鹼性支氣管收縮使氣喘惡化。\\n\\n護理/衛教:篩檢口腔黏膜(白斑、紅斑、纖維化、張口受限),勸戒檳榔並同時戒菸戒酒,轉介戒檳衛教與口腔黏膜檢查。", "options": {"A": "檳榔鹼具膽鹼性作用會誘發支氣管收縮,氣喘病人嚼食可使氣喘加劇,敘述正確。", "B": "嚼食檳榔明確增加食道癌(及口咽癌)風險,敘述正確。", "C": "檳榔鹼興奮心血管,可誘發心搏過速、心律不整與心肌梗塞,敘述正確。", "D": "錯誤(正解):檳榔子本身即為Group 1致癌物,去除紅白灰後仍會致癌,此敘述不正確。"}, "sources": ["IARC Monographs Vol.85: Betel-quid and Areca-nut Chewing", "Harrison 21e, Head and Neck Cancer", "國健署 檳榔防制衛教"]}}, "107-TNPA-內科-49": {"quick": "HSV食道炎屬病毒感染,應用抗病毒藥(acyclovir/famciclovir);nystatin為抗念珠菌藥,對HSV無效,故B不適當。", "detail": {"background": "感染性食道炎好發於免疫低下者(HIV/AIDS、化療、移植、長期類固醇)。三大病原各有內視鏡特徵與治療:①念珠菌(Candida)──最常見,白色斑塊偽膜,治療用全身性抗黴菌fluconazole(局部nystatin僅用於口咽鵝口瘡,食道炎需全身性);②單純疱疹病毒(HSV)──多發、小而界限明顯的『火山口樣』淺潰瘍與小水泡,切片可見Cowdry A核內包涵體,治療用acyclovir(或valacyclovir/famciclovir),重症靜脈acyclovir;③巨細胞病毒(CMV)──大而深的線狀/地圖狀潰瘍,治療用ganciclovir/foscarnet。鑑別常需內視鏡切片(潰瘍邊緣取HSV、潰瘍底取CMV)。\\n\\n護理:評估吞嚥痛(odynophagia)、吞嚥困難、脫水營養不良;免疫低下者注意院內感染防護;抗病毒/抗黴菌藥需注意腎功能與藥物交互作用,acyclovir須充足水分避免結晶性腎病。", "options": {"A": "acyclovir為HSV首選抗病毒藥,適當,非答案。", "B": "不適當(正解):nystatin是抗念珠菌藥(且食道炎用全身性fluconazole),對HSV病毒無治療作用。", "C": "famciclovir為口服抗HSV藥,可用於HSV食道炎,適當,非答案。", "D": "HSV食道炎內視鏡典型為小水泡與界限明顯的淺潰瘍,敘述正確,非答案。"}, "sources": ["Harrison 21e, Infections of the Esophagus", "Sleisenger & Fordtran's, Infectious Esophagitis", "IDSA/HIV OI Guidelines"]}}, "108b-TNPA-內科-14": {"quick": "食道下1/3的腺癌與胃食道逆流/Barrett食道有關,故D正確;其餘三項皆與流行病學相反。", "detail": {"background": "食道癌兩大組織型態的分布與危險因子不同。①鱗狀細胞癌(SCC):好發於食道『上、中段』,危險因子為菸、酒、檳榔、熱飲、achalasia、營養不良,亞洲/台灣傳統上以此型為主。②腺癌(adenocarcinoma):好發於食道『下1/3及胃食道交界』,源於慢性胃食道逆流(GERD)→Barrett食道(腸上皮化生)→異生→腺癌的序列,危險因子為GERD、肥胖、白人男性,近數十年西方此型快速上升。流行病學上食道癌『男性多於女性』,危險因子多與菸酒檳榔、體重過重(腺癌)相關,而非體重過輕。診斷以內視鏡切片確診、EUS定深度、CT/PET定轉移。\\n\\n護理:辨識警示症狀(進行性吞嚥困難、體重下降、嘔血/黑便、聲音沙啞),營養支持,衛教戒菸酒檳榔與GERD控制(減重、抬高床頭、PPI)。", "options": {"A": "錯誤:食道癌男性發生率高於女性,非女多於男。", "B": "錯誤:危險因子是體重過重(尤其腺癌與肥胖、GERD相關),非體重過輕。", "C": "錯誤:食道下1/3好發的是腺癌,非鱗狀細胞癌(鱗狀癌好發上中段)。", "D": "正確(正解):食道下1/3腺癌與慢性胃食道逆流(經Barrett食道路徑)有關。"}, "sources": ["Harrison 21e, Esophageal Cancer", "Sleisenger & Fordtran's, Barrett's Esophagus and Esophageal Adenocarcinoma"]}}, "108a-TNPA-內科-51": {"quick": "正確為○2(男>女)與○4(菸、檳榔為危險因子);○1柱狀(腺)癌最常見、○3好發上段皆錯,故選D。", "detail": {"background": "本題綜合食道癌流行病學。傳統(尤其亞洲/台灣)以鱗狀細胞癌最常見,好發食道『中段』為主、上中段皆可,危險因子為菸、酒、檳榔、熱燙飲食;西方則因肥胖與GERD盛行,腺癌(柱狀上皮化生衍生)躍升,好發下1/3。不論型態,食道癌整體男性發生率高於女性。○1稱『柱狀上皮癌(腺癌)最常見』在台灣考量下不成立(SCC仍為大宗);○3稱好發上段不正確(SCC以中段為主、腺癌為下段)。○2、○4正確。\\n\\n護理:衛教戒菸酒檳榔、避免過熱飲食;辨識吞嚥困難由固體漸進到液體、體重下降之警訊;確診後依分期安排內視鏡切除/手術/化放療並做營養與吞嚥照護。", "options": {"A": "○1○2:○1(柱狀癌最常見)錯誤,故不選。", "B": "○3○4:○3(好發上段)錯誤,故不選。", "C": "○1○3:兩者皆錯,不選。", "D": "正確(正解):○2男性發生率高於女性、○4吸菸與嚼檳榔為高危險因子,皆正確。"}, "sources": ["Harrison 21e, Esophageal Cancer", "台灣癌症登記資料", "Sleisenger & Fordtran's, Esophageal Tumors"]}}, "108a-TNPA-內科-66": {"quick": "急性食道阻塞(食團/異物嵌塞)首選『內視鏡治療』,可同時診斷、解除阻塞並評估病灶。", "detail": {"background": "急性食道阻塞常見原因為食團嵌塞(food bolus impaction),多發生在既有狹窄、環(Schatzki ring)、嗜伊紅性食道炎或腫瘤之處。臨床表現為突發吞嚥困難、流涎、無法吞口水、胸痛。處置上,內視鏡是首選:既能直接取出嵌塞食團/異物、解除急性阻塞,又能同時檢視並切片潛在病灶(狹窄、腫瘤、嗜伊紅性食道炎)。完全無法吞口水或有窒息/穿孔風險者需『緊急』內視鏡。鋇劑攝影在急性嵌塞時為禁忌或不建議(鋇劑殘留會妨礙後續內視鏡且有吸入風險);食道壓力測定(manometry,含高解析度HRM)是評估蠕動障礙(如achalasia)的工具,屬非急性、非阻塞解除手段。\\n\\n護理:評估呼吸道(流涎、無法吞口水→吸入風險高)、禁食、抽吸口腔分泌物、準備緊急內視鏡;解除後追查並處理潛在狹窄/腫瘤。", "options": {"A": "食道鋇劑攝影在急性嵌塞時不建議(殘鋇妨礙內視鏡、吸入風險),非最佳。", "B": "正解:內視鏡治療可同時診斷與解除急性阻塞並評估病灶,為首選。", "C": "食道壓力測定評估蠕動障礙,非急性阻塞之處置。", "D": "高解析度壓力測定同屬蠕動功能檢查,不解除阻塞,非答案。"}, "sources": ["ASGE Guideline: Management of ingested foreign bodies and food impactions", "Harrison 21e, Diseases of the Esophagus"]}}, "108a-TNPA-外科-66": {"quick": "食道切除後以胃做食道重建,經『後縱膈腔』(原食道床)路徑距離最短、最符生理。", "detail": {"background": "食道切除後需以管胃(gastric conduit)或結腸/空腸重建消化道。常見上提路徑有三:①後縱膈腔(posterior mediastinum,即原食道床)──路徑最短、最符合解剖生理,為最常用;②胸骨後(retrosternal/substernal)──較長,常用於原食道床需保留做放療或日後可能復發時的替代路徑;③皮下(subcutaneous/presternal)──路徑最長、現幾乎不用。手術術式如Ivor-Lewis(右胸+腹)、McKeown(頸+右胸+腹)、transhiatal等,吻合可在頸部或胸內。\\n\\n護理:術後重點為吻合處滲漏(發燒、頸部紅腫、引流異常)、肺部併發症(肺炎、吸入)、乳糜胸、心律不整(尤其心房顫動)、聲帶/喉返神經損傷致聲音沙啞與嗆咳;漸進式飲食、少量多餐、抬高床頭防逆流與傾食症候群。", "options": {"A": "正解:後縱膈腔(原食道床)為重建路徑中距離最短者。", "B": "胸骨下路徑較長,常作為原食道床不可用時的替代,非最短。", "C": "右側胸腔非標準上提路徑,非答案。", "D": "皮下路徑最長、現已罕用,非最短。"}, "sources": ["Sabiston Textbook of Surgery, Esophagus", "Sleisenger & Fordtran's, Surgery for Esophageal Cancer"]}}, "110-進階-外科-71": {"quick": "心房顫動是食道切除術後常見併發症,故B正確;鼻胃管不降反防漏、腐蝕傷風險遠高於5倍、腺癌對放療反應較差。", "detail": {"background": "食道癌與其手術的多面向考點:①術後心房顫動(AF)是食道切除術後常見併發症之一(發生率約10–20%),與大手術發炎、自律神經受刺激、體液變化有關,也常為吻合滲漏或肺炎等併發症的早期警訊。②鼻胃管(NG)術後用於減壓保護吻合口,但其角色在『減壓/監測』而非降低肺炎;反而吞嚥障礙與吸入才是術後肺炎主因。③食道腐蝕性灼傷(強鹼/強酸)導致的慢性瘢痕,後續罹患食道癌風險增加可達『數十倍至上千倍』(常引述約1000倍/數十倍),遠高於5倍。④腺癌相較鱗狀細胞癌,對放射線/化放療的反應通常較差(鱗狀癌對放化療較敏感)。\\n\\n護理:術後監測心律(AF→評估血行動力、抗凝/控制心室率)、體溫與引流(警覺吻合漏)、肺部照護(早期下床、咳痰、防吸入)。", "options": {"A": "錯誤:鼻胃管用於吻合口減壓,並非用來降低術後肺炎風險(肺炎主要與吸入/咳痰不良有關)。", "B": "正確(正解):心房顫動為食道切除術後常見併發症之一。", "C": "錯誤:腐蝕性灼傷後的食道癌風險增加遠超過5倍(常引述數十至上千倍)。", "D": "錯誤:鱗狀細胞癌對放射線治療反應較佳,腺癌反應較差。"}, "sources": ["Sleisenger & Fordtran's, Esophageal Cancer", "Harrison 21e, Esophageal Cancer", "Sabiston Textbook of Surgery"]}}, "111-通論-5分科-27": {"quick": "肺癌、口腔癌、食道癌與吸菸關聯極強;相較之下『膀胱癌』雖也與吸菸相關但增加幅度最低,故選D。", "detail": {"background": "吸菸是多種癌症的明確危險因子,但相對風險(增加幅度)各不相同。關聯最強者為肺癌(吸菸者風險為不吸菸者的10–20倍以上)及上呼吸消化道癌(口腔、咽、喉、食道──直接接觸菸焦油與致癌物,風險顯著上升)。膀胱癌雖經由尿中代謝的芳香胺等致癌物而與吸菸相關(風險約2–4倍),但相對於肺/口腔/食道癌,其『增加的風險幅度最低』。其他與吸菸相關癌症還有胰臟、腎、胃、子宮頸、急性骨髓性白血病等。\\n\\n護理/衛教:戒菸是降低上述所有癌症風險最有效的單一介入;提供戒菸藥物(尼古丁替代、bupropion、varenicline)與行為支持,並衛教被動吸菸危害。", "options": {"A": "肺癌與吸菸關聯最強,風險增加幅度最高,非答案。", "B": "口腔癌因直接接觸致癌物,風險明顯上升,非答案。", "C": "食道癌(尤其鱗狀癌)與菸高度相關,非答案。", "D": "正解:膀胱癌雖與吸菸相關,但增加的風險幅度為四者中最低。"}, "sources": ["US Surgeon General Report on Smoking", "Harrison 21e, Tobacco Use and Cancer", "IARC Tobacco Monograph"]}}, "111-進階-內科-50": {"quick": "Barrett食道進展的是『腺癌(adenocarcinoma)』而非鱗狀細胞癌(SCC),故D錯誤。", "detail": {"background": "胃食道逆流(GERD)為胃酸/內容物逆流入食道造成症狀或黏膜損傷。①典型症狀:火燒心(heartburn)、酸逆流(acid regurgitation),可伴非心因性胸痛──故出現胸痛時須先排除心臟疾病再做腸胃檢查。②食道外(非典型)症狀:慢性咳嗽、喉炎、氣喘、聲音沙啞、喉球感。③診斷:典型症狀可先以PPI經驗治療,有反應支持診斷(PPI test);但無反應『不能排除』GERD(可能劑量/順從性/非酸逆流/嗜伊紅性食道炎),必要時做內視鏡、24小時pH或阻抗監測。④併發症:長期GERD→Barrett食道(食道下段鱗狀上皮被『腸化柱狀上皮』取代),為癌前病變,進展風險指向『食道腺癌』,高危者建議定期內視鏡監測異生。⑤治療:生活型態(減重、戒菸酒、抬高床頭、避免睡前進食)、PPI為主、難治者考慮抗逆流手術(Nissen fundoplication)。\\n\\n護理:衛教生活型態與PPI正確服用(餐前30–60分),辨識警示症狀(吞嚥困難、體重下降、出血、貧血)需轉介內視鏡。", "options": {"A": "正確:GERD典型為heartburn與acid regurgitation,可伴胸痛,檢查前須先排除心臟疾病。", "B": "正確:GERD可有食道外症狀如咳嗽、喉炎、氣喘。", "C": "正確:PPI治療有反應可作診斷參考,但無反應也不能排除GERD。", "D": "錯誤(正解):Barrett食道為癌前病變,進展為『食道腺癌』而非鱗狀細胞癌(SCC)。"}, "sources": ["ACG Clinical Guideline: Diagnosis and Management of GERD", "Harrison 21e, GERD and Barrett's Esophagus"]}}, "113-進階-外科-36": {"quick": "舌癌與菸、酒、檳榔習慣相關(正確為A);組織學多為鱗狀細胞癌、淋巴廓清有助分期、且屬食道癌高風險族群。", "detail": {"background": "舌癌屬口腔鱗狀細胞癌(oral SCC),為頭頸部癌的常見類型。危險因子為吸菸、飲酒、嚼檳榔(三者有加乘),部分口咽癌與HPV相關。組織病理『絕大多數為鱗狀細胞癌』而非腺癌。臨床表現:不癒合的潰瘍、硬塊、疼痛、出血、舌活動受限。治療以手術切除為主,常合併『頸部淋巴結廓清(neck dissection)』──頸廓清不僅治療也提供精確的淋巴結病理分期(N),對分期極為重要。因菸酒檳榔為共同危險因子,口腔癌病人屬上呼吸消化道『場效應(field cancerization)』的高風險群,同時也是食道癌的高風險族群,需注意第二原發癌篩檢。\\n\\n護理:口腔黏膜評估、戒菸酒檳榔衛教、術後氣道與吞嚥/言語復健、營養支持(必要時鼻胃管或胃造口)、傷口與皮瓣照護。", "options": {"A": "正確(正解):舌癌病人常有抽菸、飲酒、嚼檳榔習慣。", "B": "錯誤:舌癌組織病理多為鱗狀細胞癌,非腺癌。", "C": "錯誤:術中頸部淋巴廓清對N分期很有幫助,並非沒有幫助。", "D": "錯誤:口腔癌病人因共同危險因子,屬食道癌高風險族群。"}, "sources": ["Harrison 21e, Head and Neck Cancer", "NCCN Head and Neck Cancers"]}}, "114-進階-家庭-49": {"quick": "有進行性固體吞嚥困難+體重減輕(警示症狀)應『先安排內視鏡』排除腫瘤/狹窄,不可先治GERD延誤診斷,故C錯誤。", "detail": {"background": "吞嚥困難(dysphagia)分機械性(固體為主、進行性,提示狹窄/環/腫瘤)與動力性(固體與液體皆困難,提示蠕動障礙如achalasia、瀰漫性食道痙攣)。本例70歲男性、進行性『固體』吞嚥困難、體重減輕、有GERD史──典型機械性阻塞表現,鑑別包括消化性狹窄(peptic stricture)與食道癌。凡吞嚥困難合併『警示症狀(alarm features)』:體重下降、貧血/出血、年齡較大、進行性惡化,均應『優先安排上消化道內視鏡』直接檢視並切片,不應先給GERD藥物治療而延誤癌症診斷。間歇性咳嗽提示可能誤吸。\\n\\n護理:辨識警示症狀、安排內視鏡、評估吸入與營養狀態、衛教進食姿勢與質地調整,確診後依病因(擴張術治狹窄、依分期治腫瘤)照護。", "options": {"A": "正確:固體進行性吞嚥困難提示機械性阻塞(狹窄或腫瘤)。", "B": "正確:間歇性咳嗽可能因吞嚥障礙導致誤吸入氣管。", "C": "錯誤(正解):有警示症狀(體重減輕)時應先內視鏡排除腫瘤,不可先治GERD延誤診斷。", "D": "正確:消化性狹窄是吞嚥困難與體重減輕的重要鑑別診斷之一。"}, "sources": ["ACG Guideline on GERD / Dysphagia evaluation", "Harrison 21e, Dysphagia"]}}, "114-通論-麻醉-67": {"quick": "GERD的危險因子有肥胖、懷孕、食道裂孔疝氣(皆增加腹內壓或破壞抗逆流屏障);高血壓與GERD較不相關,故選B。", "detail": {"background": "GERD的病生理為抗逆流屏障(下食道括約肌LES壓力、橫膈腳、His角)功能失常與胃內容物逆流。增加風險的因素多透過『升高腹內壓』或『破壞LES/解剖屏障』:①肥胖──腹內壓上升、易合併裂孔疝;②懷孕──子宮增大升高腹內壓、黃體素鬆弛LES;③食道裂孔疝氣(hiatal hernia)──破壞橫膈腳對LES的支撐,促進逆流;其他如高脂飲食、咖啡因、酒精、抽菸、某些藥物(鈣離子阻斷劑、硝酸鹽、抗膽鹼藥)會降低LES壓。高血壓本身與GERD並無直接致病關聯(惟治療高血壓的鈣離子阻斷劑可能鬆弛LES,但題目問的是『高血壓』疾病本身),故為較不相關者。\\n\\n護理:衛教減重、少量多餐、避免睡前進食與誘發食物、抬高床頭、戒菸酒;孕婦以生活型態為主,必要時用相對安全的制酸劑。", "options": {"A": "肥胖升高腹內壓並易合併裂孔疝,是GERD危險因子,相關。", "B": "正解:高血壓與GERD並無直接致病關聯,為較不相關者。", "C": "懷孕因腹內壓升高與黃體素鬆弛LES,是常見GERD誘因,相關。", "D": "食道裂孔疝氣破壞抗逆流屏障,與GERD密切相關。"}, "sources": ["ACG GERD Guideline", "Harrison 21e, GERD risk factors"]}}, "114-進階-外科-77": {"quick": "晚期食道癌目前『尚無可廣泛使用的標準化分子標靶療法』,故B錯誤;其餘關於轉移、異質性、個人化與標準照護皆正確。", "detail": {"background": "晚期(轉移性)食道癌治療仍以化學治療為主幹,近年加入免疫檢查點抑制劑(如抗PD-1的pembrolizumab、nivolumab,依PD-L1 CPS或合併化療)及在HER2陽性食道胃交界腺癌使用trastuzumab。但整體而言『廣泛適用、標準化的分子標靶療法尚未確立』──標靶/免疫須依生物標記(HER2、PD-L1、MSI/dMMR)篩選,並非可廣泛通用。食道癌為高度異質性腫瘤(SCC與腺癌生物行為與分子特徵不同,腫瘤內也異質),故未來方向是依分子分型的個人化治療;即使積極治療仍可能轉移,預後差;標準化的術前後照護(營養、吞嚥、肺部、併發症監測)與臨床試驗有助提升療效與安全。\\n\\n護理:晚期著重症狀緩解(吞嚥困難可用支架/放療)、營養與疼痛管理、心理社會與安寧整合照護,並協助參與臨床試驗的衛教。", "options": {"A": "正確:部分病人即使積極治療仍會發生腫瘤轉移,反映其侵襲性。", "B": "錯誤(正解):目前尚無可『廣泛使用』的標準化分子標靶療法,須依生物標記個別選擇。", "C": "正確:食道癌為異質性腫瘤,未來可能需個人化治療。", "D": "正確:臨床試驗與標準化手術前後照護有助提升整體療效與安全。"}, "sources": ["NCCN Esophageal and Esophagogastric Junction Cancers", "Harrison 21e, Esophageal Cancer", "KEYNOTE/CheckMate 食道癌免疫治療試驗"]}}, "105-TNPA-通論-58": {"quick": "面對家屬要求隱瞞病情、病人主動探問時,最適當是以同理、開放式回應探詢病人擔憂(D),既不說謊也不越權告知。", "detail": {"background": "本題為告知壞消息(breaking bad news)與知情同意/病人自主的倫理情境。原則:①病人有『知的權利』與自主權,但也有『不知的權利』;②護理人員不可對病人說謊(違反誠信),也不宜在未與醫療團隊及家屬溝通前逕自宣布診斷(越權、可能造成衝突);③遇病人主動探詢,最佳做法是以同理、開放式問句探索病人『想知道什麼、在擔心什麼』,評估其準備度,再由醫療團隊以家庭會議協調(SPIKES模式:Setting、Perception、Invitation、Knowledge、Empathy、Strategy)。家屬『善意隱瞞(collusion)』常見於華人文化,需以家庭會議化解,兼顧病人自主與家庭和諧。\\n\\n護理:傾聽、不批判、確認病人理解與期待、回報醫療團隊安排說明,避免直接說謊或把責任推給他人。", "options": {"A": "直接重複『胃潰瘍』是說謊,違反誠信原則,不適當。", "B": "雖轉介醫師合理,但未先回應病人當下的情緒與疑問,較生硬、非最佳。", "C": "把問題推給子女,迴避病人感受、未提供支持,不適當。", "D": "正解:以同理、開放式問句探索病人擔憂,評估其需求,最符合溝通與倫理原則。"}, "sources": ["SPIKES Protocol for Breaking Bad News", "醫學倫理:知情同意與病人自主", "Harrison 21e, Palliative and End-of-Life Care"]}}, "106-106a-內科-24": {"quick": "非侵入且高敏感度的幽門桿菌檢查首選『碳13尿素呼氣試驗(UBT)』,可反映現行感染並用於治療後追蹤。", "detail": {"background": "幽門螺旋桿菌(H. pylori)檢查分侵入性(需內視鏡切片)與非侵入性。①非侵入性:碳13/14尿素呼氣試驗(UBT)──靈敏度與特異度均高(>90–95%),反映『現行活動性感染』,且為治療後確認根除的首選之一;糞便抗原(SAT)──準確度亦高、可現行感染與追蹤;血清抗體──只代表『曾經感染』,根除後抗體仍可持續陽性數月至數年,不能反映現行感染或確認根除,屬非侵入但準確度與臨床用途受限。②侵入性:快速尿素酶試驗(CLO/RUT)、組織學、培養。要點:UBT與糞便抗原皆需停PPI約2週、停抗生素/鉍劑4週以免偽陰性。本題問『非侵入且高度敏感』,最佳為UBT。\\n\\n護理:檢查前衛教停藥時程;陽性者依方案除菌並於治療後以UBT或糞便抗原追蹤(非血清抗體)。", "options": {"A": "正解:碳13尿素呼氣試驗非侵入、敏感度高,可反映現行感染,為首選。", "B": "血清抗體只代表曾感染,根除後仍可陽性,不能反映現行感染,非最佳。", "C": "CLO快速尿素試驗需內視鏡切片,屬『侵入性』,不符題意。", "D": "糞便抗原雖非侵入且準確,但本題標準答案以UBT為高敏感度首選。"}, "sources": ["ACG Clinical Guideline: Treatment of H. pylori Infection", "Maastricht VI Consensus", "Harrison 21e, Peptic Ulcer Disease"]}}, "106-106a-外科-53": {"quick": "輸入肢症候群因腸內容滯留致細菌過度生長、分解膽鹽,造成脂肪與維生素B12吸收不良,故D正確。", "detail": {"background": "Billroth-II(胃空腸吻合)後,十二指腸與近端空腸成為『輸入肢(afferent loop)』,膽汁胰液經此匯入。輸入肢症候群因輸入肢部分阻塞致內容物滯留:①急性完全阻塞(術後早期)為外科急症,可致輸入肢張力升高、缺血壞死、甚至破裂與胰臟炎,典型為嚴重腹痛但『嘔吐不含膽汁』(因阻塞使膽汁無法排出);②慢性部分阻塞典型為『餐後右上腹脹痛,隨後噴射性『膽汁性』嘔吐(嘔吐物為膽汁、幾乎不含食物),吐後疼痛緩解』;③滯留導致細菌過度生長(blind loop),分解結合膽鹽→脂肪吸收不良、脂肪瀉,並與B12競爭/利用→B12缺乏、巨球性貧血。\\n\\n護理:評估餐後腹痛與膽汁性嘔吐型態、營養(脂溶性維生素、B12)、必要時抗生素治療細菌過度生長或手術矯正(改Roux-en-Y)。", "options": {"A": "急性輸入肢阻塞的嘔吐多『不含膽汁』(膽汁被阻於輸入肢),此敘述把急性描述為膽汁性嘔吐,不正確。", "B": "主要併發症為缺血、壞死,『空腸破裂』非其主要機轉描述,不正確。", "C": "慢性型嘔吐物以『膽汁』為主而非食物殘渣,此敘述顛倒,不正確。", "D": "正確(正解):滯留致細菌過度生長分解膽鹽,造成脂肪與B12吸收受損。"}, "sources": ["Sabiston Textbook of Surgery, Complications of Gastric Surgery", "Sleisenger & Fordtran's, Postgastrectomy Syndromes"]}}, "106-106a-外科-56": {"quick": "十二指腸潰瘍胃酸略高、典型『飯後2–4小時(空腹)痛』、進食或制酸劑可緩解,故A正確。", "detail": {"background": "消化性潰瘍鑑別:①十二指腸潰瘍(DU)──胃酸分泌『偏高』,疼痛特徵為空腹/夜間痛(餐後2–4小時、半夜痛醒),進食或制酸劑『可緩解』,病人體重多『不減反穩定或增加』(因進食可止痛),男性較多,好發十二指腸球部;與H. pylori關係最密切;惡性機率極低。②胃潰瘍(GU)──疼痛多在『進食後不久(約30分鐘)誘發或加重』,進食不一定緩解,可能伴體重減輕,須留意惡性可能(需切片)。劍突下疼痛、嘔吐後減輕較常見於胃出口/胃潰瘍。本題A正確描述DU。\\n\\n護理:辨識疼痛與進食的時序關係、評估出血(黑便/吐血)、衛教戒NSAID/菸酒、除菌治療與PPI;胃潰瘍須追蹤癒合與切片排除惡性。", "options": {"A": "正確(正解):DU胃酸略高、空腹(餐後2–4小時)痛、進食或制酸劑可緩解。", "B": "『進食後30分鐘痛』較符合胃潰瘍;此題把胃潰瘍與夜間痛混述,不正確。", "C": "敘述含糊且非標準鑑別重點,非正解。", "D": "DU病人體重通常不減(進食止痛),『體重減輕』較屬胃潰瘍/惡性,故此敘述不正確。"}, "sources": ["Harrison 21e, Peptic Ulcer Disease", "Sleisenger & Fordtran's, Gastric and Duodenal Ulcers"]}}, "107-TNPA-內科-3": {"quick": "頭頸部淋巴結腫大常與上呼吸道感染相關(A正確);左鎖骨上(Virchow)才連胃癌,鼠蹊淋巴結與下肢感染有關。", "detail": {"background": "淋巴結腫大評估需依引流區域定位病因。①頭頸部(頸前後、頷下、耳前後、枕)淋巴結腫大常見原因為上呼吸道感染、咽喉炎、口腔感染、病毒感染。②鎖骨上淋巴結:『左側鎖骨上(Virchow node)』經胸管引流,腫大典型提示腹腔惡性(胃癌、胰臟癌等)轉移;右側鎖骨上多反映胸腔/縱膈/食道、肺病灶。③腋下淋巴結與乳癌、上肢感染相關。④鼠蹊部淋巴結引流下肢與會陰,常因下肢/足部感染、性傳染病、骨盆病灶而腫大。本題A正確。\\n\\n護理:評估腫大部位、大小、質地(硬固定提示惡性)、壓痛(壓痛多為發炎)、有無全身症狀(發燒、體重減輕、盜汗);依引流區域追查感染或惡性來源。", "options": {"A": "正確(正解):頭頸淋巴結腫大常與上呼吸道/口咽感染相關。", "B": "錯誤:腋下/鎖骨上淋巴結可與乳癌轉移有關,不能說『無關』。", "C": "錯誤:與胃癌轉移相關的是『左』鎖骨上(Virchow node),非右鎖骨下。", "D": "錯誤:鼠蹊淋巴結引流下肢,大腿受傷感染會使其腫大,並非無關。"}, "sources": ["Harrison 21e, Enlargement of Lymph Nodes", "Bates' Guide to Physical Examination"]}}, "107-TNPA-內科-26": {"quick": "成功除菌一個月後仍可能陽性的是『血清抗體』,因抗體會持續存在數月至數年,不反映現行感染。", "detail": {"background": "幽門桿菌『治療後確認根除』須選能反映『現行活動性感染』的檢查,並在停PPI≥2週、停抗生素/鉍劑≥4週後檢測,以免偽陰性。可用於追蹤的:碳13尿素呼氣試驗(UBT)、糞便抗原、內視鏡切片快速尿素酶試驗(RUT)──成功根除後這些應轉為陰性。但『血清IgG抗體』反映的是免疫記憶,根除後抗體下降緩慢,常於治療後數月甚至1–2年仍呈陽性,因此『不能用於確認根除』,治療後一個月做血清抗體仍可能陽性。\\n\\n護理:衛教治療後追蹤的正確時程與停藥要求;確認根除應用UBT或糞便抗原而非血清抗體。", "options": {"A": "正解:血清抗體於根除後仍可持續陽性數月至數年,一個月後仍可能陽性。", "B": "糞便抗原於成功根除後應轉陰,可用於追蹤,非答案。", "C": "切片快速尿素酶試驗反映現行感染,根除後應轉陰,非答案。", "D": "碳13呼氣試驗反映現行感染,根除後應轉陰,非答案。"}, "sources": ["ACG Guideline: Treatment of H. pylori", "Maastricht VI", "Harrison 21e, H. pylori diagnostics"]}}, "107-TNPA-通論-27": {"quick": "DU合併H. pylori陽性(urease+),最佳為含PPI的三合一除菌療法:PPI+amoxicillin+clarithromycin。", "detail": {"background": "十二指腸潰瘍且H. pylori陽性,治療目標是『同時抑酸癒合潰瘍』與『根除細菌』。經典『三合一療法(triple therapy)』為PPI+兩種抗生素(amoxicillin+clarithromycin)10–14天;對clarithromycin抗藥率高的地區改用『鉍劑四合一(PPI+bismuth+metronidazole+tetracycline)』或含levofloxacin方案。單用PPI僅能抑酸癒合潰瘍但不能根除細菌→易復發;單用抗生素不抑酸、癒合差且易抗藥。故含PPI+雙抗生素的方案才完整。治療後須以UBT或糞便抗原確認根除。\\n\\n護理:衛教全程足量服藥(順從性決定成敗)、避免NSAID與菸酒、藥物副作用(clarithromycin味覺改變、metronidazole禁酒戒斷反應);治療後安排追蹤檢測。", "options": {"A": "單用PPI只抑酸癒合潰瘍、不能根除H. pylori,易復發,非最佳。", "B": "正解:PPI+amoxicillin+clarithromycin為標準三合一除菌療法。", "C": "PPI+單一metronidazole抗生素不足,無法達理想根除率。", "D": "缺少PPI,癒合與根除效果差且易抗藥,非最佳。"}, "sources": ["ACG Guideline: Treatment of H. pylori", "Maastricht VI Consensus", "Harrison 21e, Peptic Ulcer Disease"]}}, "108a-TNPA-內科-7": {"quick": "大量吐血+心搏快、血壓低、CVP低、皮膚濕冷蒼白,屬血容積流失之『低血容積性休克』。", "detail": {"background": "休克四大類各有血行動力特徵:①低血容積性(hypovolemic)──失血/失液致前負荷不足,表現心搏過速、低血壓、CVP/前負荷『低』、皮膚濕冷蒼白、尿量少;②心因性(cardiogenic)──幫浦衰竭,CVP常『高』、肺充血;③阻塞性(obstructive)──如張力性氣胸/心包填塞/大量肺栓塞,CVP高、頸靜脈怒張;④分佈性(distributive,如敗血、過敏、神經性)──血管擴張,早期常皮膚溫暖、CVP低、SVR低。本例上消化道大出血(吐血、NG引流暗紅血)+HR136、BP86/40、CVP僅3 cmH2O(低)、皮膚蒼白濕冷→典型低血容積性休克。\\n\\n護理:大口徑靜脈通路、快速晶體/輸血復甦、監測生命徵象與尿量、止血(內視鏡、PPI),配合輸血依Hb與血行動力調整。", "options": {"A": "正解:失血致前負荷不足(CVP低)、代償性心搏過速與低血壓、四肢濕冷,為低血容積性休克。", "B": "心因性休克CVP通常升高並有肺充血,與本例CVP低不符。", "C": "阻塞性休克CVP高、頸靜脈怒張,本例為失血,不符。", "D": "分佈性休克SVR低、早期皮膚常溫暖,且非本例大量失血機轉。"}, "sources": ["Harrison 21e, Approach to the Patient with Shock", "ATLS / 上消化道出血處置"]}}, "108b-TNPA-外科-36": {"quick": "治療消化性潰瘍最適宜為①抗生素(除H.pylori)③PPI(抑酸)⑤鉍鹽(保護/抗菌),即組合135;NSAID與前列腺素『拮抗劑』反而傷胃。", "detail": {"background": "消化性潰瘍兩大病因為H. pylori與NSAID。合理用藥:①抗生素──根除H. pylori(病因治療);③質子幫浦抑制劑(PPI)──強力抑酸促癒合(主力);⑤鉍鹽(bismuth)──黏膜保護兼抑菌,為四合一除菌方案成員。反之②NSAID是潰瘍的『致病/加重因子』,治療時應停用;④前列腺素『拮抗劑(antagonist)』會減少前列腺素的胃黏膜保護作用而傷胃──治療應該用前列腺素『類似物(如misoprostol)』而非拮抗劑。故正確組合為135。\\n\\n護理:衛教停用NSAID/菸酒、全程服藥根除H. pylori、PPI餐前服用;高風險須長期NSAID者可加PPI或misoprostol保護。", "options": {"A": "正解:1抗生素+3 PPI+5鉍鹽,皆為治療消化性潰瘍適宜藥物。", "B": "含2 NSAID(致病因)與4前列腺素拮抗劑(傷胃),錯誤。", "C": "含2 NSAID,錯誤。", "D": "含4前列腺素拮抗劑(應為類似物),錯誤。"}, "sources": ["Harrison 21e, Peptic Ulcer Disease and Its Treatment", "ACG H. pylori Guideline"]}}, "108b-TNPA-婦產科-40": {"quick": "胃癌(印戒細胞癌)轉移至雙側卵巢、鏡下見signet ring cell,即『庫魯根勃氏瘤(Krukenberg tumor)』。", "detail": {"background": "庫魯根勃氏瘤(Krukenberg tumor)是來自胃腸道(最常為胃,其次結腸、乳房)的轉移性卵巢腫瘤,特徵為:①常為『雙側』卵巢受侵;②鏡下見充滿黏液的『印戒細胞(signet ring cell)』散布於富細胞性間質中。胃印戒細胞癌(瀰漫型/Linitis plastica)特別易以此方式轉移至卵巢。本例胃鏡見浸潤性病灶、病理為胃癌、卵巢切除見signet ring cell→典型Krukenberg。鑑別:卵巢清亮細胞癌、生殖細胞瘤、性索間質腫瘤皆為卵巢『原發』腫瘤,組織型態不同且非signet ring。\\n\\n護理:屬轉移性(第四期)胃癌,著重全身性治療、症狀緩解與心理社會支持;衛教預後與整合腫瘤科治療計畫。", "options": {"A": "卵巢清亮細胞癌為原發卵巢上皮癌,非由胃轉移,且無signet ring特徵。", "B": "正解:胃癌印戒細胞轉移雙側卵巢即Krukenberg瘤。", "C": "生殖細胞瘤為卵巢原發、好發年輕女性,組織型態不符。", "D": "性索間質腫瘤分泌性荷爾蒙、為原發腫瘤,與轉移性印戒細胞不符。"}, "sources": ["Robbins Basic Pathology, Ovarian Tumors", "Harrison 21e, Gastric Cancer / Metastasis"]}}, "108a-TNPA-外科-55": {"quick": "餐後突發腹痛冒冷汗、頭暈是『早期傾食症候群』,發生於『餐後15–30分鐘』而非2–3小時,故A錯誤。", "detail": {"background": "傾食症候群(dumping syndrome)為胃部分/全切除或B-II術後常見,因失去幽門對排空的調控,食物(尤其高糖)快速進入小腸。①早期傾食(餐後15–30分鐘):高滲食糜湧入小腸→液體大量進入腸腔致血容積驟減+腸道荷爾蒙釋放,出現腹痛、腹脹、腹瀉、心悸、冒冷汗、頭暈、甚至幾乎昏厥(血管運動症狀);②晚期傾食(餐後1–3小時):快速吸收糖分→高血糖→過度胰島素分泌→反應性低血糖,出現心悸、冒汗、顫抖、頭暈。題述『早餐後突然腹痛冒冷汗差點暈過去』屬早期傾食,發生在餐後不久(數十分鐘),故『較常發生在餐後2~3小時』敘述錯誤。B-II發生率高於B-I。治療:少量多餐、低糖高蛋白、乾濕分離(進食時少喝湯水)、餐後平躺。\\n\\n護理:飲食衛教(低單醣高蛋白高纖、餐間補水)、辨識早晚期症狀、嚴重時藥物(octreotide)或手術調整。", "options": {"A": "錯誤(正解):此為早期傾食,好發餐後15–30分鐘,非2~3小時(2~3小時屬晚期傾食)。", "B": "正確:嚴重而持續困擾終生者比例低(多數可隨時間與飲食調整改善)。", "C": "正確:建議低糖(低單醣)、高蛋白、少量多餐以減輕傾食。", "D": "正確:Billroth II因失去幽門調控,傾食發生率高於Billroth I。"}, "sources": ["Sabiston Textbook of Surgery, Postgastrectomy Syndromes", "Sleisenger & Fordtran's, Dumping Syndrome"]}}, "108b-TNPA-內科-57": {"quick": "頭部外傷相關的壓力性潰瘍稱『Cushing ulcer』;Curling ulcer是『燒傷』後的潰瘍,故C不正確。", "detail": {"background": "消化性潰瘍要點:①病因以H. pylori最多(十二指腸潰瘍尤甚,過去引述八成以上,近年因除菌與NSAID使用比例變化),其次NSAID。②胃腺癌可偽裝成胃潰瘍表現(故胃潰瘍須切片並追蹤癒合排除惡性)。③壓力性潰瘍的兩個人名:燒傷(burn)→『Curling ulcer』;中樞神經病變/頭部外傷/顱內壓升高→『Cushing ulcer』(常與胃酸分泌增加有關,可較深、易穿孔)。本題C把『頭部外傷』配『Curling』是錯的(應為Cushing),故C不正確(為答案)。④吻合口處的潰瘍稱『邊緣性潰瘍(marginal ulcer)』。\\n\\n護理:重症/燒傷/顱腦損傷者給予壓力性潰瘍預防(PPI/H2阻斷劑、腸道營養);胃潰瘍須切片排除惡性並追蹤。", "options": {"A": "正確:消化性潰瘍多由H. pylori引起(尤其十二指腸潰瘍比例高)。", "B": "正確:胃腺癌可以消化性潰瘍的樣貌表現,故胃潰瘍須切片。", "C": "不正確(正解):頭部外傷的壓力性潰瘍應稱Cushing ulcer;Curling ulcer是燒傷所致。", "D": "正確:胃腸手術吻合處出現的潰瘍稱邊緣性潰瘍(marginal ulcer)。"}, "sources": ["Harrison 21e, Peptic Ulcer Disease", "Sabiston, Stress ulcer (Curling vs Cushing)"]}}, "108a-TNPA-外科-58": {"quick": "壓力性胃炎特徵為『全胃表淺多發性糜爛』,好發胃體部/胃底,故A正確。", "detail": {"background": "壓力性胃炎/壓力相關黏膜疾病(stress-related mucosal disease)見於重症(休克、敗血、大面積燒傷、顱腦損傷、呼吸器、凝血異常)。病生理:胃黏膜灌注不足/缺血+酸與胃蛋白酶作用→黏膜防禦破壞→『多發性、表淺性糜爛』,常瀰漫分布於『胃體與胃底(酸分泌區)』,可滲血致上消化道出血。人名潰瘍:燒傷=Curling、顱腦損傷=Cushing。預防與治療以抑酸(PPI/H2阻斷劑)+恢復灌注+早期腸道營養為主,出血嚴重時內視鏡止血。\\n\\n護理:對高危重症者落實壓力性潰瘍預防、監測胃管引流與血色素、維持血行動力與灌注。", "options": {"A": "正確(正解):壓力性胃炎為全胃表淺多發糜爛,好發胃體部。", "B": "錯誤:酸與胃蛋白酶共同參與黏膜傷害,並非『與酸無關』。", "C": "錯誤:頭部外傷者應稱Cushing ulcer,非Curling。", "D": "錯誤:抑制胃酸是壓力性黏膜病變預防與治療主力,並非效果不佳。"}, "sources": ["Sabiston, Stress Gastritis", "Harrison 21e, Stress-Related Mucosal Injury"]}}, "108b-TNPA-外科-58": {"quick": "全胃切除後失去內在因子(intrinsic factor)分泌,導致『維生素B12』吸收不良,需終生補充。", "detail": {"background": "維生素B12吸收需胃壁細胞分泌的『內在因子(intrinsic factor, IF)』在迴腸末端結合吸收。全胃切除後IF缺乏→B12無法吸收→數年後(體內儲存耗盡)出現巨球性貧血與神經病變(亞急性合併退化:本體感覺、平衡、周邊神經病變)。故全胃切除者需終生『非經口(肌肉注射或高劑量口服)』補充B12。胃切除也可能影響鐵(胃酸減少使鐵還原吸收下降)、鈣與脂溶性維生素,但與『內在因子』直接相關、最典型的是B12。\\n\\n護理:衛教終生B12補充、定期監測血色素與MCV、神經學評估;同時注意鐵與鈣的補充與傾食症候群飲食。", "options": {"A": "B6缺乏與胃切除無特定關聯,非答案。", "B": "正解:全胃切除失去內在因子,B12吸收不良,須終生補充。", "C": "維生素C吸收不需內在因子,非典型缺乏。", "D": "維生素K缺乏與膽汁/脂肪吸收或抗生素相關,非胃切除特徵。"}, "sources": ["Harrison 21e, Megaloblastic Anemias (B12 deficiency)", "Sabiston, Postgastrectomy Nutritional Deficiencies"]}}, "108b-TNPA-外科-78": {"quick": "PEG的禁忌症包括『預期存活少於四週』等(治療效益有限),故A正確。", "detail": {"background": "經皮內視鏡胃造瘻(PEG)適用於需『長期(一般>4週)』腸道營養而吞嚥功能受損者(如中風吞嚥障礙、頭頸癌、神經退化)。禁忌/不適當包括:預期存活期過短(如<4週,效益有限)、無法安全經內視鏡通路(嚴重腹水、腹膜炎、凝血異常未矯正、胃前壁無法貼合腹壁、嚴重肥胖/解剖異常)、無法transillumination等。照護要點:術後新置之管若早期(如<2–4週,瘻管尚未成熟)脫落,『不應自行盲目塞回』(易誤入腹腔致腹膜炎),需就醫由專業以內視鏡/影像確認;術後胃造瘻周圍可有少量腹腔氣體,通常數日內漸吸收,但若持續或增加並合併腹膜炎徵象須警覺穿孔。\\n\\n護理:造瘻口照護、固定避免內墊埋藏症候群(buried bumper)、餵食前確認位置與殘餘量、抬高床頭防吸入、觀察感染與滲漏。", "options": {"A": "正確(正解):預期存活期過短(如少於四週)效益有限,屬PEG禁忌/不適當。", "B": "錯誤:PEG用於『長期』營養需求;預期短期(兩週內)可脫離呼吸器者不需置放。", "C": "錯誤:早期(瘻管未成熟)脫落不可自行立即塞回,以免誤入腹腔,需就醫確認。", "D": "錯誤:術後腹腔氣體未必一週內完全吸收,應依臨床判斷,不可一概而論。"}, "sources": ["ASGE/ESPEN PEG Guidelines", "Sabiston, Enteral Access"]}}, "109-通論-其他-26": {"quick": "不易癒合或位置不尋常的潰瘍要想到胃泌素瘤(Zollinger-Ellison syndrome),故B正確。", "detail": {"background": "消化性潰瘍要點:①PPI或H2阻斷劑單用即可有效抑酸促進潰瘍癒合(PPI效果優於H2阻斷劑),故『單用效果不好』敘述錯誤。②難治、多發、位置不典型(如十二指腸第二段以遠、空腸)、復發或合併腹瀉的潰瘍,須懷疑『Zollinger-Ellison症候群(胃泌素瘤)』──腫瘤分泌大量胃泌素致胃酸過多,診斷靠空腹血清gastrin升高+胃酸測定/secretin刺激試驗。③血清H. pylori抗體『不能』用於確認根除(抗體可持續陽性),確認根除應用UBT/糞便抗原。④癒合療程:十二指腸潰瘍一般約4週、胃潰瘍約8週(胃潰瘍須追蹤癒合排除惡性),並非DU比GU療程更長(本題D數字反置且過長,錯誤)。\\n\\n護理:除菌與抑酸、停NSAID;難治潰瘍轉介評估ZES;胃潰瘍追蹤內視鏡。", "options": {"A": "錯誤:單用PPI(或H2阻斷劑)即能有效抑酸癒合潰瘍。", "B": "正確(正解):難治或位置不尋常的潰瘍須考慮Zollinger-Ellison症候群。", "C": "錯誤:血清抗體不能確認根除(根除後仍可陽性)。", "D": "錯誤:十二指腸潰瘍癒合療程通常較短(約4週)、胃潰瘍約8週,且須追蹤;本題數字錯置。"}, "sources": ["Harrison 21e, Peptic Ulcer Disease; Zollinger-Ellison Syndrome", "ACG Guidelines"]}}, "109-通論-其他-28": {"quick": "已做內視鏡發現DU,最常用且現場可做的H. pylori確診是『內視鏡切片快速尿素酶試驗(urease/CLO test)』。", "detail": {"background": "本例已因上腹痛行上消化道內視鏡並發現十二指腸潰瘍。既然內視鏡『正在進行』,最方便且常用的確診H. pylori方式就是在切片組織上做『快速尿素酶試驗(rapid urease test, RUT/CLO)』──利用細菌尿素酶分解尿素產氨使指示劑變色,數分鐘至數小時內判讀,靈敏度與特異度高,屬侵入性但隨內視鏡一併完成。血清抗體只代表曾感染、不能反映現行;血中ammonia test非H. pylori檢測;糞便檢測為『抗原』而非urease。故答案為內視鏡urease test。\\n\\n護理:檢測前注意停PPI/抗生素以免偽陰性;陽性者除菌並追蹤;胃潰瘍另須切片排除惡性。", "options": {"A": "血中抗體只代表曾感染、不反映現行,非確診現行感染首選。", "B": "正解:既已內視鏡,切片做快速尿素酶試驗最常用且即時確診。", "C": "血中ammonia test用於肝性腦病評估,與H. pylori診斷無關。", "D": "糞便檢測為『抗原』檢測,非urease test,且本例已內視鏡可直接切片。"}, "sources": ["ACG Guideline: Treatment of H. pylori", "Harrison 21e, H. pylori diagnostics"]}}, "109-進階-內科-52": {"quick": "鼻胃管引流『潛血陰性』也不能排除十二指腸出血(幽門可能關閉使血液不逆流入胃),故B最不恰當。", "detail": {"background": "上消化道出血(UGIB)的鼻胃管(NG)引流判讀:①引流『鮮紅血』提示活動性UGIB;②咖啡渣樣提示較緩或已停的出血;③但NG引流『陰性或潛血陰性』『不能排除』UGIB──尤其十二指腸潰瘍出血時,幽門可能關閉使血液不逆流回胃,故NG可抽出清澈或膽汁卻仍有十二指腸出血。④以食鹽水灌洗可清出胃內血塊、估計出血活動度並利於後續內視鏡視野(但不再強調作為止血手段)。⑤確診且穩定後NG非必要,可移除。故B(潛血陰性即排除十二指腸出血)敘述最不恰當。\\n\\n護理:NG引流不可作為排除依據;以血行動力、血色素、內視鏡為準;準備內視鏡與輸血,給予PPI。", "options": {"A": "合理:鮮紅色引流表示正在進行的上消化道出血。", "B": "最不恰當(正解):潛血陰性不能排除十二指腸出血(幽門關閉使血不逆流回胃)。", "C": "合理:食鹽水灌洗有助清除血塊、評估出血活動與利於內視鏡。", "D": "合理:確診且病情穩定後可移除鼻胃管。"}, "sources": ["Harrison 21e, GI Bleeding", "ACG Guideline: Upper GI and Ulcer Bleeding"]}}, "111-進階-內科-45": {"quick": "胃手術後餐後約3小時出現頭暈、心悸、冒冷汗、幾乎昏厥(反應性低血糖),為『晚期傾食症候群』。", "detail": {"background": "本例迷走神經切除+胃竇切除+B-II吻合後,午餐後約3小時(12:30進食、15:00發作)出現頭暈、意識模糊、心悸、冒冷汗、幾近昏厥,『無腹痛』、生命徵象僅竇性心搏過速。此為『晚期傾食症候群(late dumping)』:快速排空使大量糖分迅速吸收→血糖驟升→過度胰島素分泌→餐後1–3小時『反應性低血糖』,出現自律神經(冷汗、心悸、顫抖)與神經低血糖(頭暈、意識模糊)症狀。相對地,早期傾食在餐後15–30分鐘以腹脹腹瀉與血管運動症狀為主。輸入肢症候群以餐後右上腹痛+膽汁性嘔吐為特徵,不符。急性GI出血會有貧血/黑便/低血壓,本例血色素正常、血壓正常,不符。\\n\\n護理:衛教低單醣、高蛋白高纖、少量多餐、乾濕分離、餐後可平躺;發作時補充含糖食物;頑固者考慮acarbose或octreotide。", "options": {"A": "急性GI出血應有貧血、黑便、低血壓,本例血色素與血壓正常,不符。", "B": "早期傾食在餐後15–30分鐘且以腹脹腹瀉與血管運動症狀為主,時間不符。", "C": "輸入肢症候群以餐後右上腹痛與膽汁性嘔吐為特徵,本例無腹痛,不符。", "D": "正解:餐後約3小時的反應性低血糖症狀為晚期傾食症候群。"}, "sources": ["Sleisenger & Fordtran's, Dumping Syndrome (early vs late)", "Sabiston, Postgastrectomy Syndromes"]}}, "111-進階-外科-70": {"quick": "複雜性消化性潰瘍即使手術後,仍需檢測並根除H. pylori以防復發,故D『術後不需再治療H. pylori』錯誤。", "detail": {"background": "複雜性消化性潰瘍(出血、穿孔、阻塞)的要點:①出血仍是潰瘍相關死亡的主因。②內視鏡見高再出血風險特徵(Forrest分類:活動性噴血Ia、滲血Ib、可見血管Ⅱa、附著血塊Ⅱb)者再出血率高,需內視鏡治療並可加PPI。③十二指腸潰瘍出血常見於『幽門後2公分內、十二指腸球部後壁』(該處鄰近胃十二指腸動脈gastroduodenal artery,易大出血)。④無論是否手術,只要H. pylori陽性都『必須根除』──根除可大幅降低潰瘍復發與再出血,故『術後不需再治療H. pylori』是錯誤觀念。\\n\\n護理:止血後續PPI、確認並根除H. pylori、停NSAID、追蹤癒合;胃潰瘍切片排除惡性。", "options": {"A": "正確:出血為消化性潰瘍死亡的主要原因。", "B": "正確:內視鏡見血塊或可見血管者再出血機會高。", "C": "正確:十二指腸潰瘍出血常位於幽門2公分內的後壁(近胃十二指腸動脈)。", "D": "錯誤(正解):無論是否手術,H. pylori陽性仍須根除以防復發。"}, "sources": ["ACG Guideline: Upper GI and Ulcer Bleeding", "Harrison 21e, Peptic Ulcer Complications"]}}, "113-進階-家庭-36": {"quick": "消化性潰瘍穿孔會出現『腹膜炎徵候(peritoneal sign)』,故C正確。", "detail": {"background": "消化性潰瘍穿孔的典型表現:①突發劇烈上腹痛(『刀割樣』),後因胃腸內容物刺激腹膜→瀰漫性腹膜炎,出現腹膜炎徵候(板狀腹/肌肉防衛、反彈痛、壓痛、腸音減弱或消失)。②腹部叩診因游離氣體可見肝濁音界消失(非濁音增加);腸音『減弱』而非增加。③站立(直立)腹部/胸部X光典型見游離空氣積在『橫膈下(肝臟與右橫膈之間)』,即free air在橫膈下方而非『肝臟上方』的描述需精確(free air位於右橫膈下、肝臟上緣之間);臥床無法站立者用『左側躺decubitus』使游離氣體浮到肝臟外側與腹壁間最易顯現。④疼痛可因刺激而轉移,但典型不是輻射到肩頸上臂(膽道/橫膈刺激可牽涉肩部,但非首要特徵)。本題以C(出現腹膜炎徵候)最正確。\\n\\n護理:禁食、放NG減壓、輸液、廣效抗生素、止痛,準備緊急手術;監測敗血與休克。", "options": {"A": "穿孔疼痛主要為突發上腹劇痛與腹膜炎,『輻射到肩頸上臂』非典型描述,不選。", "B": "穿孔時腸音『減弱』、叩診因游離氣體致肝濁音消失,此敘述(腸音增加、濁音)不符。", "C": "正確(正解):穿孔致瀰漫性腹膜炎,會出現腹膜炎徵候。", "D": "游離空氣積於『橫膈下』(右橫膈與肝之間),『肝臟上方』的措辭不精確,非最佳答案。"}, "sources": ["Harrison 21e, Acute Abdomen / Peritonitis", "Sabiston, Perforated Peptic Ulcer"]}}, "114-進階-家庭-48": {"quick": "鼻胃管反抽『無血色胃液』也不能排除上消化道出血(十二指腸出血幽門關閉時血不逆流回胃),故B錯誤。", "detail": {"background": "本例75歲血便+腹痛+頭暈、低血壓,評估消化道出血。要點:①BUN升高(BUN/Cr比例上升)是上消化道出血線索之一──腸道內血液被消化吸收為氮質+腎前性因素。②NG反抽無血色或膽汁『不能排除UGIB』:十二指腸潰瘍出血時幽門可能關閉,血液不逆流回胃,故NG陰性無法排除(此為B錯誤之關鍵)。③血便(hematochezia)大多為下消化道出血,但『大量快速的上消化道出血』也可表現為鮮血便,故不能僅憑血便排除UGIB。④血行動力不穩+疑似UGIB,處置上常『先安排上消化道內視鏡』(因UGIB較常見且可內視鏡止血),再評估下消化道。\\n\\n護理:大口徑IV、輸液/輸血復甦、監測生命徵象與尿量、給PPI、安排內視鏡;勿以NG陰性誤判排除UGIB。", "options": {"A": "正確:BUN升高是上消化道出血的線索之一。", "B": "錯誤(正解):NG反抽無血色仍不能排除上消化道出血(尤其十二指腸出血)。", "C": "正確:血便多為下消化道出血,但仍無法排除上消化道大量出血。", "D": "正確:血行動力不穩疑UGIB時,評估下消化道前宜先安排上消化道內視鏡。"}, "sources": ["Harrison 21e, GI Bleeding", "ACG Guideline: Upper GI Bleeding"]}}, "114-通論-5分科-51": {"quick": "無法站立的臥床病人偵測游離空氣,最佳為『左側躺(left lateral decubitus)KUB』,氣體浮到肝臟外側與腹壁間易顯現。", "detail": {"background": "懷疑消化道穿孔要找游離空氣(free air/pneumoperitoneum)。最佳影像取決於體位:①能站立者:『直立(upright)胸部或腹部X光』可見橫膈下游離氣體。②無法站立者:採『左側躺(left lateral decubitus)』姿勢拍KUB──讓游離氣體上浮聚集在『肝臟外側緣與右側腹壁之間』(肝臟為實質背景,對比清楚),比平躺更易看出少量游離空氣。為何不用右側躺?右側躺氣體會浮到胃泡/脾側,易與胃內氣體混淆。平躺(supine)對少量游離空氣最不敏感。故答案為左側躺KUB。\\n\\n護理:擺位配合、維持呼吸道與血行動力穩定;確診穿孔者禁食、NG減壓、抗生素、輸液並準備手術。", "options": {"A": "平躺胸部AP對少量游離空氣最不敏感,非最佳。", "B": "正解:左側躺KUB使游離氣體浮於肝臟外側與腹壁間,最易偵測。", "C": "右側躺時氣體浮向胃/脾側,易與胃泡混淆,不如左側躺。", "D": "一般平躺KUB對游離空氣偵測敏感度低,非最佳。"}, "sources": ["Sabiston, Imaging of Pneumoperitoneum", "放射診斷:Free air decubitus view"]}}, "110-進階-內科-45": {"quick": "長期NSAID(diclofenac)+消化性潰瘍史,出現發燒、低血壓、反彈痛、腸音微弱——最可能為潰瘍穿孔造成的『腹膜炎』。", "detail": {"background": "本例有消化性潰瘍病史並使用NSAID(diclofenac,抑制前列腺素削弱胃黏膜防禦),出現『整個腹部持續嚴重疼痛+發燒38.5°C+低血壓85/56+心搏過速112+反彈痛(rebound tenderness)+腸音微弱』──典型『瀰漫性腹膜炎』表現,最可能為NSAID相關消化性潰瘍『穿孔』導致腹腔污染與腹膜炎,甚至進展為敗血性休克。鑑別:輸尿管結石為陣發性腰腹絞痛、放射至腹股溝、無腹膜炎徵候;主動脈瘤破裂為撕裂痛+搏動性腫塊+休克但通常無發燒+腹膜炎徵候的組合;腸阻塞以腹脹、嘔吐、腸音『高亢』或消失、X光氣液面為主。本例反彈痛+發燒+腸音微弱最符合腹膜炎。\\n\\n護理:禁食、NG減壓、輸液與廣效抗生素、止痛、監測敗血/休克,準備緊急手術。", "options": {"A": "輸尿管結石為陣發絞痛、無腹膜炎徵候與發燒,不符。", "B": "主動脈瘤破裂多為撕裂痛+搏動腫塊+休克,通常無發燒與反彈痛組合,不符。", "C": "正解:NSAID+潰瘍史+反彈痛+發燒+低血壓→潰瘍穿孔致腹膜炎。", "D": "腸阻塞以腹脹、嘔吐、腸音高亢或消失為主,反彈痛+發燒非其典型,不符。"}, "sources": ["Harrison 21e, Acute Abdomen / Peritonitis", "Sabiston, Perforated Peptic Ulcer"]}}, "110-通論-其他-21": {"quick": "GERD飲食衛教應『低脂』,高脂食物會延長胃排空、降低LES壓而加重逆流,故C建議不適合。", "detail": {"background": "本例為典型GERD(餐後火燒心、酸液上湧、夜間咳醒、喉嚨灼熱──含食道外症狀)。生活型態介入是第一線:①避免餐後立即平躺、睡前2–3小時不進食、抬高床頭、不暴飲暴食、減重;②戒菸酒、減少刺激性/誘發食物(咖啡、巧克力、薄荷、柑橘、辛辣、碳酸飲料);③『減少高脂食物』──高脂會延遲胃排空並降低下食道括約肌(LES)壓力而促進逆流,故『多攝取高脂、奶類』是錯誤建議(C不適合);④症狀無法以生活型態控制時用藥(制酸劑、H2阻斷劑、PPI)。\\n\\n護理:衛教正確飲食與姿勢、PPI餐前服用、辨識警示症狀(吞嚥困難、體重下降、出血)需轉介內視鏡。", "options": {"A": "適合:餐後不立即平躺、睡前2–3小時不進食可減少夜間逆流。", "B": "適合:戒菸酒、減少咖啡等刺激性飲食有助控制GERD。", "C": "不適合(正解):高脂食物延長胃排空、降低LES壓,會加重逆流,不應鼓勵。", "D": "適合:生活型態無法改善時可用制酸劑等藥物治療。"}, "sources": ["ACG Clinical Guideline: GERD", "Harrison 21e, GERD lifestyle modification"]}}, "106-106a-外科-54": {"quick": "克隆氏症好發女性、約1/3有肛門病灶、少數侷限會陰,故C正確;UC不影響迴腸末端、不造成跳躍狹窄。", "detail": {"background": "發炎性腸道疾病(IBD)兩大型:①潰瘍性結腸炎(UC)──侷限『大腸』,由直腸往近端『連續性』侵犯黏膜與黏膜下層,病理見隱窩膿瘍、潰瘍;不影響迴腸末端(僅少數倒灌性迴腸炎backwash ileitis),因為是黏膜層淺層發炎,典型『不造成腸壁全層纖維化狹窄與瘻管』;併發症為毒性巨結腸與大腸癌風險。②克隆氏症(Crohn)──可侵犯口腔到肛門任一段、以『迴腸末端與右結腸』最常見,病變為『跳躍式(skip lesions)、全層(transmural)』發炎,故易造成狹窄、廔管(fistula)、膿瘍與肛門病灶(約1/3有肛周疾病,如肛裂、肛瘻、肛周膿瘍),少數可侷限會陰;吸菸是克隆氏的危險因子。手術原則因克隆氏會復發,切除只需到『肉眼正常邊緣』即可(不必到顯微鏡正常邊緣),以盡量保留腸道。\\n\\n護理:評估腹瀉/血便型態、營養、肛周病灶、腸外表現(關節、眼、皮膚、原發硬化性膽管炎);衛教戒菸(克隆氏)、藥物順從(5-ASA、類固醇、免疫調節、生物製劑)。", "options": {"A": "錯誤:UC侷限大腸、不影響迴腸末端(僅少數backwash ileitis),非半數。", "B": "錯誤:隱窩膿瘍與潰瘍是UC病理,但『腸道狹窄』為克隆氏(全層)特徵,UC少見。", "C": "正確(正解):克隆氏好發女性、約1/3有肛門病灶、少數侷限會陰部。", "D": "錯誤:克隆氏手術切除只需到肉眼正常邊緣即可,不必到顯微鏡正常邊緣(會復發)。"}, "sources": ["Harrison 21e, Inflammatory Bowel Disease", "Sleisenger & Fordtran's, Crohn's Disease and UC"]}}, "108b-TNPA-外科-37": {"quick": "克隆氏結腸炎特性:腸壁增厚(1)、腹瀉(2)、廔管(5);連續性潰瘍與直腸出血較屬UC,故選125。", "detail": {"background": "克隆氏症(全層、跳躍式病變)與潰瘍性結腸炎(黏膜層、連續性)的鑑別臨床表徵:克隆氏因『全層發炎』→腸壁增厚(thickened wall,影像見腸壁增厚、cobblestone)、纖維化狹窄、廔管(fistula)與膿瘍形成,常以腹瀉(可不帶血)、腹痛、體重減輕、肛周病灶表現,直腸常被『跳過(rectal sparing)』故肉眼直腸出血較少;UC則為由直腸開始的『連續性(continuous)』黏膜潰瘍,典型『血便/直腸出血、裡急後重』。故克隆氏特性=1(腸壁增厚)+2(腹瀉)+5(廔管);4(連續性潰瘍分布)與3(直腸出血)較屬UC。\\n\\n護理:辨識兩型差異以利監測併發症(克隆氏注意狹窄阻塞與廔管/膿瘍、UC注意大量血便與毒性巨結腸);營養與藥物照護。", "options": {"A": "123含3(直腸出血,偏UC),非最佳。", "B": "正解:125(腸壁增厚、腹瀉、廔管)為克隆氏特性。", "C": "234含4(連續性潰瘍,屬UC),不選。", "D": "235含3、4傾向UC的特徵,不選。"}, "sources": ["Harrison 21e, IBD (Crohn vs UC)", "Sleisenger & Fordtran's, Crohn's Disease"]}}, "108a-TNPA-外科-41": {"quick": "術後使用clindamycin後腹瀉、便帶黏液惡臭,典型為抗生素相關之『偽膜性結腸炎(C. difficile)』。", "detail": {"background": "偽膜性結腸炎(pseudomembranous colitis)由困難梭狀桿菌(Clostridioides difficile)毒素引起,典型誘因為近期使用抗生素(clindamycin、頭孢菌素、fluoroquinolone等)破壞正常腸道菌叢使C. difficile過度增生並產生毒素A/B,造成大腸黏膜偽膜形成、水瀉(可帶黏液惡臭)、腹痛、發燒、白血球上升,嚴重可致毒性巨結腸。診斷靠糞便C. difficile毒素/PCR/GDH,內視鏡見黃白色偽膜。治療:停用誘發抗生素,口服vancomycin或fidaxomicin(舊用metronidazole),嚴格接觸隔離與『肥皂洗手』(酒精乾洗手對其孢子無效),復發者考慮糞便菌叢移植。本例術後clindamycin後腹瀉黏液惡臭→偽膜性結腸炎。\\n\\n護理:接觸隔離、肥皂洗手、補液電解質、避免止瀉藥(loperamide)以免毒性巨結腸、監測腹脹與敗血。", "options": {"A": "阿米巴結腸炎與旅遊/污染水源、果醬樣血便相關,非抗生素誘發,不符。", "B": "IBD為慢性自體免疫性腸炎,與近期抗生素使用無直接因果,不符。", "C": "正解:近期clindamycin後腹瀉黏液惡臭→C. difficile偽膜性結腸炎。", "D": "潰瘍性結腸炎為慢性血便/裡急後重,非抗生素急性誘發,不符。"}, "sources": ["IDSA/SHEA Clinical Practice Guideline for C. difficile", "Harrison 21e, C. difficile Infection"]}}, "111-進階-外科-68": {"quick": "克隆氏症為多因子(遺傳+免疫失調+環境),不能說『腸道菌群失調為主要原因』,故B錯誤。", "detail": {"background": "克隆氏症病因為遺傳易感性、免疫調節異常與環境因子的『多因子交互作用』。①遺傳:家族史、NOD2/CARD15等基因;②環境:吸菸(增加克隆氏風險與術後復發,但對UC反而保護)、飲食、衛生假說;③腸道菌叢(microbiome)失衡被認為『參與』疾病但屬眾多因素之一,不能單獨稱為『主要原因』──免疫對腸道菌的過度反應才是核心。臨床特徵:跳躍式(skip)、全層(transmural)病變,以迴腸末端最常見,多數小腸與大腸皆可受影響,易致狹窄、廔管、膿瘍。\\n\\n護理:衛教戒菸、藥物順從、營養、監測併發症與腸外表現。", "options": {"A": "正確:有家族史與吸菸等環境因素會增加克隆氏症風險。", "B": "錯誤(正解):克隆氏為多因子(遺傳+免疫+環境),不能稱菌群失調為『主要』原因。", "C": "正確:多數患者小腸與大腸皆受影響,迴腸末端最常見。", "D": "正確:克隆氏為跳躍式(skip)病變,非連續性(連續性是UC)。"}, "sources": ["Harrison 21e, Crohn's Disease pathogenesis", "Sleisenger & Fordtran's, IBD"]}}, "113-進階-外科-69": {"quick": "長期狹窄有癌變風險應做切片排惡性,但方法是內視鏡『活檢取樣』而非『冷凍切片』,故D敘述錯誤。", "detail": {"background": "克隆氏症小腸阻塞與狹窄的處置考點:①糞便發炎指標──乳鐵蛋白(lactoferrin)與鈣衛蛋白(calprotectin)反映腸道發炎活性,有助區分阻塞是『活動性發炎(指標高)』還是『慢性纖維化狹窄(指標低/正常)』,以決定用藥(抗發炎)或手術/擴張。②遺傳/分子標記(如NOD2、TLR4、CX3CR1)研究上可協助預測病程與藥物反應(個人化醫療方向)。③狹窄成形術(strictureplasty)可保留腸段、避免短腸症,其併發症與復發率與切除再吻合相當,適用多處或既往多次切除者。④長期狹窄(尤其小腸/結腸)有癌變風險,故懷疑時應取『黏膜切片(biopsy)』送病理排除惡性──但『冷凍切片(frozen section)』是術中快速病理,並非門診/內視鏡監測排除惡性的常規方式,故D『建議冷凍切片』敘述不正確。\\n\\n護理:評估阻塞症狀(腹脹、嘔吐、絞痛)、營養、用糞便指標追蹤發炎、衛教手術/擴張選項與癌症監測。", "options": {"A": "正確:糞便lactoferrin/calprotectin有助分辨阻塞為急性發炎或慢性狹窄。", "B": "正確:NOD2、TLR4、CX3CR1等標記可協助預測療效(個人化醫療)。", "C": "正確:狹窄成形術保留腸道,併發症與復發率與切除再吻合相當。", "D": "錯誤(正解):排除惡性應取黏膜活檢(biopsy),而非以『冷凍切片』作監測方式。"}, "sources": ["ECCO Crohn's Disease Guidelines", "Sleisenger & Fordtran's, Crohn's Strictures and Strictureplasty"]}}, "105-TNPA-通論-11": {"quick": "肝癌篩檢最普遍方便的工具是『腹部超音波』,故B正確。", "detail": {"background": "肝細胞癌(HCC)在台灣主因為B、C型肝炎與肝硬化(A型肝炎不致慢性化、不導致肝癌,故篩檢針對B、C肝高風險者,而非A肝)。篩檢主力為『腹部超音波』搭配血清甲型胎兒蛋白(AFP),建議高危族群(肝硬化、慢性B/C肝)每6個月一次──超音波便宜、方便、無輻射、可重複。確診/特性化(characterization)則靠『多時相(動態)對比電腦斷層或磁振造影』看典型『動脈期顯影、靜脈/延遲期清除(washout)』的影像特徵(LI-RADS),不必每次都做血管攝影。MRI對小病灶較CT佳,但對『<1公分』腫瘤仍偵測困難、需追蹤。肝動脈血管攝影為侵入性,主要用於治療(TACE)或特殊情況,非首選確診。\\n\\n護理:衛教高危族群定期超音波+AFP監測、B肝抗病毒/C肝根除以降低肝癌風險、疫苗接種(B肝)。", "options": {"A": "錯誤:A型肝炎不致慢性化或肝癌,肝癌篩檢針對B、C肝高危者,不需把A肝列入。", "B": "正確(正解):腹部超音波是最普遍方便的肝癌篩檢工具。", "C": "錯誤:對<1公分腫瘤,即使MRI仍偵測困難,需追蹤,非『很好』。", "D": "錯誤:肝動脈血管攝影為侵入性,主要用於治療,非最佳確診檢查。"}, "sources": ["AASLD HCC Surveillance and Diagnosis Guidelines", "Harrison 21e, Liver Cancer"]}}, "105-TNPA-外科-35": {"quick": "侵襲性念珠菌血症療程應為『血液培養轉陰+症狀消失後再續至少2週』,故C(再加7天)錯誤。", "detail": {"background": "侵襲性念珠菌症/念珠菌血症(candidemia)常見於糖尿病、術後、長期中央靜脈導管、廣效抗生素、免疫低下者。治療:對血行動力不穩或中重症首選棘白菌素(echinocandin如caspofungin/micafungin),穩定且非抗藥菌株可用azole(fluconazole,負荷12 mg/kg、維持6 mg/kg/day),嚴重或特定菌株可用兩性黴素B(amphotericin B)。療程關鍵:在『血液培養轉為陰性且症狀緩解』後,『再持續治療至少2週(14天)』,並應移除可能的感染源(中央靜脈導管),同時做眼底檢查排除念珠菌眼內炎。故『再加7天』為錯誤(應為14天)。\\n\\n護理:移除/更換導管、追蹤血培養至轉陰、監測肝腎功能與輸注反應、眼底檢查、控制血糖。", "options": {"A": "正確:穩定病人可用fluconazole(維持6 mg/kg/day)治療念珠菌血症。", "B": "正確:amphotericin B(約0.6 mg/kg/day)為可用選項之一。", "C": "錯誤(正解):應在血培養轉陰且症狀消失後『再續至少14天』,非再加7天。", "D": "正確:皮膚/導管等屏障受損可使念珠菌侵入造成感染。"}, "sources": ["IDSA Clinical Practice Guideline for Candidiasis", "Harrison 21e, Candidiasis"]}}, "105-TNPA-外科-49": {"quick": "Sorafenib(肝癌標靶藥)僅延長中位存活約2–3個月,並非『約2年』,故A錯誤。", "detail": {"background": "肝細胞癌(HCC)治療依分期(BCLC):①極早期/早期(單顆或≤3顆≤3cm、肝功能可)可手術切除、肝移植或局部消融;②局部消融:射頻消融(RFA)效果佳但有大小限制(理想<3cm,可達約5cm但較大者療效下降),酒精注射(PEI)多用於『≤2公分』小肝癌;③中期(多顆、無血管侵犯/肝外轉移、肝功能尚可)用經動脈化學栓塞(TACE);④晚期(血管侵犯或肝外轉移)用全身性治療:過去一線sorafenib(SHARP試驗顯示僅延長中位整體存活約2.8個月,非2年),現多用atezolizumab+bevacizumab或lenvatinib等。故A『延長存活約2年』嚴重高估,為錯誤。\\n\\n護理:依分期衛教治療選項與副作用(sorafenib手足症候群、腹瀉、高血壓;TACE後栓塞後症候群),監測肝功能與腫瘤標記。", "options": {"A": "錯誤(正解):sorafenib僅延長中位存活約2–3個月(SHARP約2.8個月),非約2年。", "B": "正確:酒精注射(PEI)建議用於約2公分以下的小肝癌。", "C": "正確:RFA可用於較大腫瘤但仍有大小限制(理想<3cm)。", "D": "正確:TACE可用於多顆腫瘤且肝功能尚可者。"}, "sources": ["BCLC Staging and Treatment", "SHARP Trial (sorafenib in HCC)", "AASLD HCC Guidelines"]}}, "105-TNPA-外科-56": {"quick": "AFP高達17337 ng/mL、骨痛溶骨病灶→肝癌(HCC)合併骨轉移,故選C。", "detail": {"background": "甲型胎兒蛋白(AFP)顯著升高(數千至上萬ng/mL)對肝細胞癌(HCC)有高度特異性(也見於生殖細胞瘤),本例AFP 17337 ng/mL極高、PSA正常(0.27)、CEA正常→指向HCC而非攝護腺癌(PSA正常排除)或大腸癌(CEA正常)。骨盆X光顯示溶骨性病灶+夜間骨痛+體重減輕+ALT輕升,符合HCC合併骨轉移(HCC骨轉移多為溶骨性、血流豐富,可疼痛劇烈)。股骨頭缺血性壞死與骨髓炎不會使AFP飆高。故診斷為肝癌合併左側骨盆轉移。\\n\\n護理:疼痛管理(骨轉移可用放療緩解)、評估病理性骨折風險、營養與心理支持、整合腫瘤治療。", "options": {"A": "股骨頭缺血性壞死不會造成AFP極高與溶骨轉移,不符。", "B": "骨盆骨髓炎為感染性,WBC正常且AFP極高不符。", "C": "正解:AFP極高(17337)+溶骨病灶→肝癌合併骨轉移。", "D": "攝護腺癌PSA應升高且骨轉移多為成骨性,本例PSA正常,不符。"}, "sources": ["Harrison 21e, Hepatocellular Carcinoma; Tumor Markers (AFP)", "AASLD HCC Guidelines"]}}, "106-106a-外科-51": {"quick": "C型肝炎導致的肝硬化是肝移植的『適應症』而非禁忌症,故選B(不包括)。", "detail": {"background": "肝臟移植的『禁忌症』包括:①肝外惡性轉移或無法控制的肝外/系統性感染(如肝癌合併肝外轉移=禁忌);②無法戒除的活動性酒精/物質濫用(酒精性肝硬化『尚未戒酒』為禁忌,需戒酒一段時間並評估);③嚴重不可逆的心肺疾病或無法承受手術者;④缺乏社會心理支持與順從性差。相對地,肝硬化合併嚴重肝肺症候群(hepatopulmonary syndrome)反而是肝移植的『適應症』(移植可改善);C型肝炎導致的肝硬化是肝移植常見適應症(且現有直接抗病毒藥DAA可治癒HCV、防止移植後復發)。故『C肝肝硬化』不屬禁忌,為本題答案。\\n\\n護理:移植前評估戒酒/戒毒、感染與腫瘤分期、心肺功能與社會支持;移植後免疫抑制與感染監測。", "options": {"A": "酒精性肝硬化『尚未戒酒』屬禁忌(需戒酒評估),屬禁忌之一。", "B": "正解(不包括):C肝導致的肝硬化是肝移植適應症,非禁忌。", "C": "肝癌合併肝外轉移屬禁忌(肝外腫瘤無法靠換肝治癒)。", "D": "嚴重肝肺症候群是移植適應症,但題目問禁忌『不包括』,故重點仍是B;此項為可移植改善之適應症。"}, "sources": ["AASLD/UNOS Liver Transplant Criteria", "Harrison 21e, Liver Transplantation"]}}, "108b-TNPA-通論-11": {"quick": "醫師未經病人同意逕告知家屬並由家屬決定是否告知本人,違反尊重自主、隱私與保密;『公平正義原則』與此情境無關,故B錯誤。", "detail": {"background": "醫學倫理四原則:自主(autonomy)、行善(beneficence)、不傷害(non-maleficence)、正義/公平(justice)。本例醫師在未獲病人同意下,將診斷直接告訴家屬並讓家屬決定是否告知病人:①違反『尊重自主』──病人有權知道自己的病情並自主決定;②違反『隱私』與『保密(confidentiality)』──病人醫療資訊未經同意透露給第三方(家屬)。但『公平正義原則(justice,指醫療資源公平分配與不歧視)』與本情境無關,故『甲違反公平正義原則』的敘述是錯誤的(為答案)。\\n\\n護理:以病人為中心,先確認病人想知道多少、取得同意再決定資訊揭露對象;以家庭會議協調善意隱瞞(collusion)。", "options": {"A": "正確:未經同意揭露病情給家屬,違反尊重隱私。", "B": "錯誤(正解):公平正義原則指資源公平分配,與本情境無關,並未違反。", "C": "正確:未經同意把資訊告知第三方,違反保密原則。", "D": "正確:由家屬決定是否告知病人,違反病人尊重自主原則。"}, "sources": ["Beauchamp & Childress, Principles of Biomedical Ethics", "醫學倫理:知情同意與保密"]}}, "108b-TNPA-外科-44": {"quick": "本題各劑量中,caspofungin維持劑量為50 mg/day正確、起始(負荷)70 mg正確;『起始100 mg/day』為錯誤,故C錯。", "detail": {"background": "侵襲性念珠菌症抗黴菌藥劑量:①Fluconazole──負荷劑量約『12 mg/kg』、維持『6 mg/kg/day』。②Caspofungin(棘白菌素)──第一天負荷『70 mg』,之後維持『50 mg/day』(體重>80 kg者維持70 mg)。本題C寫『caspofungin起始劑量100 mg/day』不符標準(應為70 mg),故為錯誤敘述。重症或血行動力不穩、或曾用azole者,棘白菌素為首選;穩定且敏感株可降階為fluconazole。療程在血培養轉陰且症狀緩解後續至少14天,並移除導管、眼底檢查。\\n\\n護理:依藥物正確負荷/維持劑量給藥、監測肝功能、追蹤血培養、移除感染源。", "options": {"A": "正確:fluconazole起始(負荷)劑量約12 mg/kg/day。", "B": "正確:fluconazole維持劑量約6 mg/kg/day。", "C": "錯誤(正解):caspofungin起始(負荷)應為70 mg,非100 mg/day。", "D": "正確:caspofungin維持劑量為50 mg/day。"}, "sources": ["IDSA Candidiasis Guideline (dosing)", "Caspofungin/Fluconazole prescribing information"]}}, "108a-TNPA-內科-49": {"quick": "右葉肝膿瘍、抽出『巧克力色(果醬樣)膿液』是阿米巴肝膿瘍(Entamoeba histolytica)的典型表現。", "detail": {"background": "肝膿瘍兩大類:①化膿性(pyogenic)──多源於膽道感染或腹腔感染經門脈擴散,常為多種菌(台灣Klebsiella pneumoniae尤其在糖尿病者常見、可併發轉移性眼內炎/腦膿瘍),抽吸為黃綠膿液;②阿米巴性(amebic)──由痢疾阿米巴(Entamoeba histolytica)經門脈到肝,典型『單一、右葉』膿瘍,抽吸為『巧克力醬/果醬樣(anchovy paste)』無臭膿液(壞死肝組織+血),好發於曾至流行區、衛生不良、男性,血清阿米巴抗體陽性。治療:metronidazole(殺組織型)後接腸腔內殺包囊劑(paromomycin/diloxanide);多數不需引流(大型、左葉、瀕破裂或治療無反應才引流)。本例露營後發燒、右葉膿瘍、巧克力色膿→阿米巴。\\n\\n護理:衛教飲食衛生、完成療程含腸腔殺包囊、追蹤;接觸者與糞便檢查。", "options": {"A": "Klebsiella為化膿性肝膿瘍(尤其糖尿病),膿液黃綠非巧克力色,不符。", "B": "正解:果醬/巧克力色膿液之右葉單一膿瘍為阿米巴肝膿瘍(E. histolytica)。", "C": "E. coli為化膿性肝膿瘍菌之一,膿液性狀不同,不符。", "D": "念珠菌肝膿瘍多見於免疫低下/念珠菌血症播散,非本例典型,不符。"}, "sources": ["Harrison 21e, Amebiasis; Liver Abscess", "IDSA/CDC Amebiasis"]}}, "109-通論-其他-77": {"quick": "活體肝臟捐贈者肝臟『脂肪含量達50%(嚴重脂肪肝)』不適宜捐贈,故B為最不適宜者。", "detail": {"background": "活體肝移植捐贈者評估著重『捐贈者安全』與『移植肝品質』:①肝臟脂肪變性(steatosis)是關鍵──大泡性脂肪>30%即增加移植失敗與捐贈者風險,『50%脂肪肝』為不適宜捐贈(移植物功能差、捐贈者術後肝衰風險高)。②剩餘肝體積──捐贈後捐贈者剩餘肝臟須足夠(一般≥30–35%)以避免小肝症候群;剩餘40%尚可接受。③血型──需ABO相容(本例受贈者O型,捐贈者B型在傳統需相容下不理想,但現可做ABO不相容移植加減敏;相較脂肪肝50%,後者風險更明確不適宜)。④年齡50歲在可接受範圍。故本題『最不適宜』為脂肪肝50%者。\\n\\n護理:捐贈者完整評估(影像、肝功能、脂肪定量、心理社會)、知情同意、術後肝再生監測。", "options": {"A": "血型B對O型受贈者雖非ABO相容理想(可考慮減敏),但相較脂肪肝其風險較可處理。", "B": "正解:肝脂肪含量50%(嚴重脂肪肝)移植物品質差且捐贈者風險高,最不適宜。", "C": "剩餘肝臟40%大致足夠(一般需≥30–35%),尚可接受。", "D": "捐贈者年齡50歲在可接受範圍,非主要禁忌。"}, "sources": ["AASLD Living Donor Liver Transplant Guidelines", "Harrison 21e, Liver Transplantation"]}}, "111-進階-外科-65": {"quick": "化膿性肝膿瘍經膽道/腹腔來源常為『多種菌』感染,『單一細菌』的敘述較不正確,故C錯誤。", "detail": {"background": "化膿性(pyogenic)肝膿瘍多源於:①膽道感染(膽管炎、膽道阻塞)──最常見,常為腸內菌『多重(polymicrobial)』感染(E. coli、Klebsiella、腸球菌、厭氧菌);②門脈系統(腹腔內感染如闌尾炎、憩室炎經門脈);③肝動脈(全身菌血症血行播散);④鄰近擴散或外傷。實驗室:白血球增多(不具特異性)、鹼性磷酸酶(ALP)升高常較AST/ALT明顯(膽汁鬱積型)。臨床:發燒、寒顫、右上腹痛、肝腫大。本題C稱『菌血症通常導致單一細菌感染,以革蘭氏陰性菌為主』──經膽道/腹腔來源多為『多種菌』,故『單一細菌』描述不正確(雖台灣Klebsiella單一菌肝膿瘍在糖尿病者常見,但題幹泛指經膽道腹腔來源者多為多重菌)。治療:抗生素+引流(經皮導管或手術)。\\n\\n護理:血培養與膿液培養、引流照護、抗生素療程、控制血糖、追蹤影像。", "options": {"A": "正確:化膿性肝膿瘍可為非肝源性細菌經血行播散所致。", "B": "正確:腹腔內感染常經膽道(膽管炎/膽汁蓄膿)傳播造成多種細菌感染。", "C": "錯誤(正解):經膽道/腹腔來源者多為『多重細菌』感染,非單一細菌。", "D": "正確:白血球增多不具特異性,ALP常較AST/ALT更易升高(膽汁鬱積)。"}, "sources": ["Harrison 21e, Pyogenic Liver Abscess", "Sleisenger & Fordtran's, Hepatic Abscess"]}}, "112-進階-內科-47": {"quick": "B肝肝硬化+體重下降+AFP升高(120)而CEA正常→最可能為肝細胞癌(HCC)。", "detail": {"background": "慢性B型肝炎合併肝硬化是肝細胞癌(HCC)的高危族群。本例體重下降+AFP升高至120 ng/mL(明顯高於正常<10–20)、膽紅素僅1.2(無明顯阻塞性黃疸)、CEA正常(3,排除典型膽道/腸道腺癌標記升高)──最符合HCC。AFP對HCC有提示性(雖非完美,部分HCC AFP正常),在肝硬化背景下升高且持續上升須高度懷疑HCC,確診靠多時相CT/MRI典型顯影+washout。肝衰竭會有黃疸、凝血異常、肝性腦病(本例膽紅素僅輕升不符);阻塞性黃疸會膽紅素與ALP明顯升高;膽道癌(cholangiocarcinoma)以CA19-9升高、阻塞性黃疸為主,AFP通常不升。\\n\\n護理:安排動態影像確診、衛教肝癌監測(高危每6個月超音波+AFP)、B肝抗病毒治療、依分期(BCLC)規劃治療。", "options": {"A": "肝衰竭應有顯著黃疸、凝血異常與肝性腦病,本例膽紅素僅輕升,不符。", "B": "正解:B肝肝硬化背景+AFP升高+體重下降→肝細胞癌最可能。", "C": "阻塞性黃疸會有膽紅素與ALP明顯上升,本例膽紅素正常,不符。", "D": "膽道癌多以CA19-9升高與阻塞性黃疸表現,AFP不升,不符。"}, "sources": ["AASLD HCC Guidelines", "Harrison 21e, Hepatocellular Carcinoma; Tumor Markers"]}}, "113-進階-內科-47": {"quick": "相對心搏過緩(Faget sign)見於某些感染(Q熱、傷寒、登革熱、黴漿菌等);化膿性『肝膿瘍』通常伴隨明顯心搏過速,最不可能呈相對心搏過緩,故選B。", "detail": {"background": "相對心搏過緩(relative bradycardia / Faget sign)指發燒時心跳上升幅度低於預期(一般體溫每升1°C心跳約增10次/分)。常見於某些『細胞內病原或毒素』相關感染:傷寒(Salmonella typhi)、Q熱(Coxiella)、退伍軍人病(Legionella)、鸚鵡熱、登革熱、黃熱、布氏桿菌、黴漿菌肺炎等,也見於藥物(β阻斷劑)或中樞病變。相對地,化膿性『肝膿瘍』屬化膿性感染、常合併菌血症與全身發炎反應,典型伴『明顯心搏過速』而非相對心搏過緩,故為『最不可能』表現相對心搏過緩者。\\n\\n護理:辨識相對心搏過緩可作為特定感染的線索;肝膿瘍以發燒寒顫、右上腹痛、心搏過速表現,需血培養與引流。", "options": {"A": "Q熱可表現相對心搏過緩,故非答案。", "B": "正解:化膿性肝膿瘍常伴明顯心搏過速,最不可能出現相對心搏過緩。", "C": "黴漿菌肺炎可表現相對心搏過緩,非答案。", "D": "登革熱常見相對心搏過緩,非答案。"}, "sources": ["Harrison 21e, Fever and approach to febrile patient (Faget sign)", "感染症學:relative bradycardia"]}}, "114-進階-麻醉-32": {"quick": "肝癌凝血異常大出血,最優先補充缺乏的凝血因子與纖維蛋白原:PCC(凝血酶原複合物)+冷凍沉澱品(cryoprecipitate),故選D。", "detail": {"background": "肝病病人因肝合成凝血因子(II、VII、IX、X等)及纖維蛋白原不足、加上手術大出血造成稀釋與消耗性凝血病。大量輸血復甦時除PRBC外需補充凝血成分:①凝血因子──新鮮冷凍血漿(FFP)含所有凝血因子但需大量、起效慢、有容積負荷;『凝血酶原複合物(PCC)』濃縮含維生素K依賴因子(II、VII、IX、X),可快速、小容積矯正肝病/大出血的凝血因子缺乏。②纖維蛋白原──『冷凍沉澱品(cryoprecipitate)』富含纖維蛋白原、第八因子、von Willebrand因子、第十三因子,是補充低纖維蛋白原首選(或纖維蛋白原濃厚液)。大出血+肝病凝血異常,最優先快速矯正即PCC+cryoprecipitate(同時補因子與纖維蛋白原)。DDAVP主要用於尿毒/輕型血友病/vWD的血小板功能,非肝病大出血首選。\\n\\n護理:依凝血檢驗(PT/INR、fibrinogen、血小板、TEG/ROTEM)導向輸注、監測容積與輸血反應、保暖矯正酸中毒與低鈣(致命三角)。", "options": {"A": "cryoprecipitate合理但搭配DDAVP(主要用於血小板功能異常)非肝病大出血最優先組合。", "B": "fibrinogen合理,但搭DDAVP非首要;未涵蓋凝血因子補充。", "C": "FFP可補因子但容積大起效慢,且搭DDAVP非最優先。", "D": "正解:PCC(快速補凝血因子)+cryoprecipitate(補纖維蛋白原)最優先且高效。"}, "sources": ["Massive Transfusion / Goal-directed coagulation management", "肝病凝血病處置;PCC與cryoprecipitate適應症"]}}, "114-進階-內科-41": {"quick": "腹水PMN 250/μL未達250以上具感染門檻邊界,且SAAG=3.5−1.6=1.9(>1.1)為門脈高壓性,符合肝硬化大量腹水(非SBP),故選A。", "detail": {"background": "腹水分析判讀關鍵:①血清-腹水白蛋白梯度(SAAG)=血清白蛋白−腹水白蛋白。本例3.5−1.6=1.9 g/dL,『≥1.1』表示『門脈高壓性』腹水(肝硬化、心衰、Budd-Chiari等);<1.1為非門脈高壓(腹膜癌、結核、胰源性)。②自發性細菌性腹膜炎(SBP)診斷標準為腹水多形核白血球(PMN)『≥250/μL』。本例PMN為250,屬臨界;但題目要求『最可能』,綜合SAAG高(1.9,門脈高壓/肝硬化)、腹水總蛋白低(2.1,屬肝硬化低蛋白腹水,本身是SBP的危險因子)、慢性B肝背景、生命徵象穩定且無明顯感染中毒症狀——最符合『肝硬化所造成的大量腹水』。次發性細菌性腹膜炎會有更高PMN、多重菌與腹腔病灶。本題標準答案為A(肝硬化腹水)。\\n\\n護理:評估SAAG與PMN、白蛋白與利尿劑治療肝硬化腹水、衛教低鈉飲食;PMN≥250須投抗生素治SBP並預防。", "options": {"A": "正解:SAAG 1.9(門脈高壓)+低蛋白腹水+穩定無感染中毒→肝硬化大量腹水。", "B": "肝癌破裂出血腹水會以大量紅血球/血性腹水與血行動力不穩為主,不符(RBC僅12500、生命徵象穩定)。", "C": "SBP需PMN≥250且常有感染症狀;本例臨界且全身穩定,綜合判斷以肝硬化腹水為最可能。", "D": "次發性腹膜炎PMN常更高、多菌且有腹腔病灶,不符本例。"}, "sources": ["AASLD Guideline: Ascites and SBP", "Harrison 21e, Ascites; SAAG interpretation"]}}, "114-進階-外科-44": {"quick": "本題問「敘述錯誤者」。肝細胞腺瘤與 FNH 的病理鑑別關鍵在「FNH 有中央星狀疤痕＋膽管增生，腺瘤則『缺乏膽管、匯管區與中央靜脈』」，而非「腺瘤排列類似正常肝臟以此與 FNH 區別」（兩者肝細胞外觀皆近似正常）；故 (C) 敘述錯誤，選 C。", "detail": {"background": "肝細胞腺瘤（hepatocellular adenoma, HCA）是好發於『育齡女性、長期口服避孕藥（雌激素）』的良性肝腫瘤，男性使用同化性類固醇（anabolic steroid）亦可誘發。病理上由片狀、近似正常的良性肝細胞組成，但『缺乏膽管、匯管區（portal tract）與中央靜脈』、缺正常肝小葉結構；常界限清楚、可僅有假包膜。臨床重點：富血管、易自發性破裂出血（尤其 >5 cm 或孕期），有惡性轉化風險（β-catenin 活化型），故停避孕藥後仍持續、>5 cm 或男性者多建議切除。與『局部結節性增生（FNH）』的鑑別關鍵：FNH 是血流異常導致的增生性病變，含『中央星狀疤痕、纖維間隔與膽管增生（ductular reaction）』，臨床多無症狀、極少出血或惡變；腺瘤則『無膽管、無中央疤痕』。故兩者「肝細胞外觀皆近似正常」，真正能區別的是「有無膽管增生／中央疤痕」，而非「排列是否類似正常肝臟」。", "options": {"A": "正確：HCA 典型為單個、圓形、界限清楚的病變，常無真正包膜（或僅假包膜），敘述可接受。", "B": "正確：好發年輕女性（與口服避孕藥相關），男性使用同化性類固醇亦可誘發。", "C": "錯誤（正解）：腺瘤與 FNH 的肝細胞外觀「都」近似正常肝組織，並無法以「排列類似正常肝臟」來與 FNH 區別；真正的鑑別在於 FNH 有中央疤痕與膽管增生、腺瘤則缺乏膽管，故此敘述為錯誤。", "D": "正確：≥10 顆稱肝腺瘤病（liver adenomatosis），與口服避孕藥關聯較弱、無明顯性別差異。"}, "sources": ["Sleisenger & Fordtran's, Benign Liver Tumors (HCA vs FNH)", "Harrison 21e, Hepatic Adenoma"]}}, "105-TNPA-通論-24": {"quick": "ALT(SGPT)才較具肝臟專一性,病毒性肝炎ALT通常>AST;說AST較具肝專一性且高於ALT是錯誤,選B。", "detail": {"background": "轉胺酶判讀:①ALT(SGPT)主要存在肝細胞胞質,『肝臟專一性較高』;AST(SGOT)分布肝、心肌、骨骼肌、紅血球等較不專一。②『病毒性肝炎』時ALT通常『高於』AST(ALT/AST>1);相對地『酒精性肝炎』因粒線體AST釋放與B6缺乏,典型AST/ALT>2(AST>ALT)。③轉胺酶數值高低與疾病嚴重度/預後『無絕對相關』,須合併病史與理學;極高(>500–1000)多見於急性病毒肝炎、缺血性肝炎、毒性/藥物肝損;輕度升高(<250)可見於脂肪肝、藥物、慢性肝炎。本題B把AST說成較具肝專一且病毒肝炎AST>ALT,與事實相反,為錯誤。\\n\\n護理:解讀肝指標需結合臨床;ALT/AST比值有助鑑別(病毒vs酒精);追蹤趨勢比單次數值更有意義。", "options": {"A": "正確:轉胺酶數值與嚴重度/預後無絕對相關,需合併病史理學判斷。", "B": "錯誤(正解):ALT才較具肝專一性,病毒性肝炎ALT通常>AST。", "C": "正確:轉胺酶大幅升高(>500)常見急性病毒肝炎或慢性肝炎急性發作。", "D": "正確:輕度升高(<250)可因藥物或脂肪肝引起。"}, "sources": ["Harrison 21e, Evaluation of Liver Function", "Sleisenger & Fordtran's, Liver Chemistry Tests"]}}, "106-106a-通論-54": {"quick": "急性B型肝炎不會出現anti-HBs(保護抗體,代表恢復/接種後),故選D。", "detail": {"background": "B型肝炎血清標記隨病程變化:①HBsAg──現行感染(急性或慢性)出現,是感染的第一個標記。②HBeAg──病毒活躍複製、傳染力強。③anti-HBc IgM──急性感染(或慢性急性發作)的指標;anti-HBc IgG/total──曾經或持續感染。④anti-HBs──『保護性抗體』,代表感染『康復獲得免疫』或『疫苗接種』後,通常在HBsAg消失後一段『空窗期』才出現。故『急性』B肝期間HBsAg、HBeAg、anti-HBc IgM皆可陽性,但anti-HBs『此時不會』陽性(若已產生anti-HBs代表已康復而非急性)。\\n\\n護理:依血清標記判讀感染狀態(急性/慢性/康復/接種);急性B肝多支持性治療,監測有無猛爆性肝炎;接種者驗anti-HBs確認免疫。", "options": {"A": "HBsAg於急性B肝陽性,會出現,非答案。", "B": "HBeAg於急性複製期陽性,會出現,非答案。", "C": "anti-HBc IgM為急性感染指標,會陽性,非答案。", "D": "正解:anti-HBs為康復/接種後的保護抗體,急性期不會陽性。"}, "sources": ["Harrison 21e, Hepatitis B serology", "AASLD HBV Guidance"]}}, "106-106a-通論-55": {"quick": "臨床診斷慢性C型肝炎最常用的血中初篩為『C型肝炎病毒抗體(anti-HCV)』,故選D。", "detail": {"background": "C型肝炎(HCV)為RNA病毒。診斷流程:①『anti-HCV抗體』為第一線篩檢(最常用、便宜),陽性代表曾接觸/感染HCV;②再以『HCV RNA(核酸定量)』確認是否為『現行活動性感染』(因約15–45%急性感染者可自然清除,抗體仍陽性但RNA陰性);③基因型(genotype)用於『治療前選擇方案/療程』,非診斷工具。題目選項中『HCsAg、HCeAg』並不存在(C肝無對應HBsAg/HBeAg之表面/e抗原檢測常規);故臨床『最常用診斷』為anti-HCV。現今直接抗病毒藥(DAA)可治癒大多數慢性C肝。\\n\\n護理:衛教高危族群(輸血史、共用針具、刺青)篩anti-HCV;陽性者轉介確認RNA並接受DAA治療;治療後驗SVR(持續病毒學反應)。", "options": {"A": "C肝無常規『表面抗原(HCsAg)』檢測,選項本身不成立。", "B": "C肝無『e抗原(HCeAg)』檢測,不成立。", "C": "基因型用於選擇治療方案/療程,非診斷工具。", "D": "正解:anti-HCV抗體為臨床最常用的C肝診斷/篩檢。"}, "sources": ["AASLD/IDSA HCV Guidance", "Harrison 21e, Hepatitis C diagnosis"]}}, "106-106a-內科-59": {"quick": "A型肝炎最大傳染力在『症狀出現前(潛伏末期)』,而非症狀出現後二週,故B錯誤。", "detail": {"background": "A型肝炎(HAV,RNA病毒,picornavirus)經『糞口傳染』,常因污染食物/飲水造成大規模流行。病毒於潛伏期末、『黃疸/症狀出現前1–2週』糞便排毒量最高、傳染力最強;一旦出現黃疸,糞便病毒量與傳染力已下降。診斷:急性期『IgM anti-HAV(+)』;IgG anti-HAV代表既往感染或接種後免疫。HAV不會慢性化、不致肝癌,極少猛爆性(年長/慢性肝病者風險較高)。預防:疫苗、衛生、洗手。本題B(最大傳染力在症狀出現後二週)錯誤。\\n\\n護理:腸道接觸防護、洗手衛教、接觸者疫苗/免疫球蛋白預防;支持性治療。", "options": {"A": "正確:急性期IgM anti-HAV陽性。", "B": "錯誤(正解):最大傳染力在症狀出現『前』約1–2週,非出現後二週。", "C": "正確:HAV經糞口傳染。", "D": "正確:污染食物與飲水可造成大規模流行。"}, "sources": ["Harrison 21e, Hepatitis A", "CDC Hepatitis A epidemiology"]}}, "106-106a-內科-71": {"quick": "無脂質套膜(non-enveloped)病毒對酒精乾洗手抵抗力強,本題為HAV(1)、輪狀(2)、諾羅(5),故選125。", "detail": {"background": "病毒有無『脂質套膜(envelope)』決定對酒精/乾洗手的敏感度:①『有套膜』病毒(冠狀病毒、流感、HIV、HBV、HCV、疱疹)──酒精破壞脂質套膜即失活,故酒精乾洗手有效。②『無套膜(裸露)』病毒(A型肝炎病毒HAV、輪狀病毒rotavirus、諾羅病毒norovirus、腸病毒、腺病毒)──蛋白衣殼耐酒精,『酒精乾洗手效果差』,須用『肥皂與流動水確實洗手』或含氯/過氧化物消毒。本題1 HAV、2 rotavirus、5 norovirus為無套膜→選125;3冠狀病毒、4 HIV皆有套膜。\\n\\n護理:照護腹瀉(輪狀/諾羅)或A肝病人時,須以肥皂洗手(非僅酒精乾洗手)、環境用含氯消毒、落實腸道接觸防護。", "options": {"A": "234含3冠狀、4 HIV(有套膜),不符。", "B": "124含4 HIV(有套膜),不符。", "C": "245含4 HIV(有套膜),不符。", "D": "正解:1 HAV、2 rotavirus、5 norovirus皆無套膜,對酒精乾洗手效果差。"}, "sources": ["CDC Hand Hygiene Guidelines", "Medical Microbiology, Non-enveloped viruses"]}}, "107-TNPA-內科-24": {"quick": "IgG anti-HAV(+)、anti-HBs(+)、anti-HBe(+)皆屬康復/免疫;唯anti-HCV(+)提示C型肝炎(現行感染需再驗RNA),故選C。", "detail": {"background": "判讀多項肝炎標記要分辨『保護/康復』與『現行感染』:①IgG anti-HAV(+)=曾感染A肝或接種後免疫(非現行)。②anti-HBs(+)=B肝康復或接種後免疫(保護抗體);anti-HBe(+)多代表B肝病毒複製較低(seroconversion後),若HBsAg陰性則屬既往感染。③anti-HCV(+)=曾接觸/感染C肝;此例其他標記都指向『已免疫/恢復』,唯C肝抗體陽性最可疑為現行慢性C肝(GPT異常),須再驗HCV RNA確認。故懷疑C型。\\n\\n護理:anti-HCV陽性且GPT異常者應驗HCV RNA確認現行感染並轉介DAA治療;衛教傳染途徑與追蹤。", "options": {"A": "IgG anti-HAV代表既往A肝免疫,非現行肝炎病因。", "B": "anti-HBs/anti-HBe代表B肝康復/低複製,非現行致病。", "C": "正解:anti-HCV(+)在其餘皆為免疫的情況下,最可疑為C型肝炎(再驗RNA)。", "D": "E型肝炎本例無對應陽性標記,不符。"}, "sources": ["AASLD/IDSA HCV Guidance", "Harrison 21e, Viral Hepatitis serology"]}}, "107-TNPA-內科-25": {"quick": "γ-GT(GGT)大幅升高應優先把酒精性肝炎列入鑑別,故選D。", "detail": {"background": "酒精性肝損的生化線索:①γ-GT(GGT)對酒精『誘導』敏感,常顯著升高,是飲酒的指標之一(但非特異,膽道疾病、藥物也升)。②AST/ALT比值>2(且兩者通常<300–400)支持酒精性肝炎(粒線體AST釋放+B6缺乏使ALT合成受限)。③MCV升高、IgA升高也輔助。本題單問『何項大幅升高時優先列入酒精性肝炎』,以γ-GT最具提示性。ALK-P升高偏膽道鬱積,AST/ALT升高反映肝細胞傷害但較不特異於酒精。\\n\\n護理:評估飲酒史(CAGE)、戒酒衛教與支持、補充thiamine/葉酸、監測戒斷;嚴重酒精性肝炎評估類固醇與預後評分。", "options": {"A": "AST升高反映肝細胞傷害但不特異於酒精。", "B": "ALT升高同屬肝細胞傷害,非酒精特異指標。", "C": "ALK-P升高偏膽道鬱積/阻塞,非酒精首選提示。", "D": "正解:γ-GT對酒精誘導敏感,大幅升高優先考慮酒精性肝炎。"}, "sources": ["Harrison 21e, Alcoholic Liver Disease", "Sleisenger & Fordtran's, GGT and Alcohol"]}}, "107-TNPA-內科-50": {"quick": "A型肝炎『急性期』應為IgM anti-HAV陽性;IgG anti-HAV陽性代表既往免疫,故『急性期IgG(+)』最不可能,選D。", "detail": {"background": "A型肝炎血清診斷:急性感染→『IgM anti-HAV(+)』(發病前後出現,持續約3–6個月);恢復後→『IgG anti-HAV(+)』長期存在代表免疫(既往感染或疫苗)。傳染:糞口途徑,污染食物飲水可大流行;最大傳染力在『症狀出現前約2週』(潛伏末期糞便排毒高)。故四個選項中,糞口傳染、症狀前2週傳染力最高、污染食物大流行皆正確;『急性期IgG anti-HAV(+)』不符(急性期應為IgM),為最不可能。\\n\\n護理:接觸者預防(疫苗/免疫球蛋白)、洗手與食品衛生、支持性治療。", "options": {"A": "正確:HAV經糞口傳染。", "B": "正確:最大傳染力在症狀出現前約2週。", "C": "正確:污染食物飲水可造成大規模流行。", "D": "最不可能(正解):急性期應為IgM anti-HAV(+);IgG(+)代表既往免疫。"}, "sources": ["Harrison 21e, Hepatitis A serology", "CDC Hepatitis A"]}}, "107-TNPA-兒科-57": {"quick": "C型肝炎為RNA病毒,可經母子垂直與血液污染傳染,故C正確。", "detail": {"background": "各型肝炎病毒核酸與病程:①HAV=RNA病毒(picornavirus),糞口傳染,『急性』為主,不慢性化;②HBV=『DNA』病毒(hepadnavirus),經血液/體液/垂直傳染,成人多急性後康復、但『新生兒/嬰幼兒感染』易慢性化(免疫耐受);③HCV=RNA病毒(flavivirus),經血液(輸血、共用針具)與母子垂直傳染,慢性化比例高;④疫苗:目前A肝、B肝有疫苗,『C肝尚無疫苗』。本題A錯(HAV是RNA非DNA)、B錯(HBV是DNA非RNA)、D錯(C肝無疫苗)、C正確(HCV為RNA,垂直+血液傳染)。\\n\\n護理:衛教B肝疫苗與HBIG阻斷垂直傳染、C肝無疫苗故重在避免血液暴露;追蹤兒童肝功能。", "options": {"A": "錯誤:A型肝炎為RNA病毒(非DNA),病程多為急性。", "B": "錯誤:B型肝炎為DNA病毒(非RNA);嬰幼兒感染才易慢性化。", "C": "正確(正解):C型肝炎為RNA病毒,母子垂直與血液污染皆可傳染。", "D": "錯誤:目前C型肝炎『無』疫苗(A、B肝有)。"}, "sources": ["Harrison 21e, Viral Hepatitis", "Nelson Textbook of Pediatrics, Viral Hepatitis"]}}, "108b-TNPA-內科-12": {"quick": "發燒合併黃疸常見於病毒性肝炎、瘧疾、膽管炎;『痢疾』以血便腹瀉為主、通常不以黃疸表現,故選B(不包括)。", "detail": {"background": "『發燒+黃疸』的感染性鑑別:①病毒性肝炎──肝細胞發炎致黃疸,可伴發燒;②膽管炎(cholangitis)──膽道阻塞+感染,Charcot三聯(發燒寒顫、右上腹痛、黃疸);③瘧疾(malaria)──溶血+肝受累可致發燒與黃疸(尤其惡性瘧);④鉤端螺旋體、敗血症等亦可。相對地『痢疾(dysentery,如志賀桿菌/阿米巴)』主要表現為發燒、腹痛與『黏液血便(下痢)』,屬腸道感染,『通常不以黃疸表現』(阿米巴若形成肝膿瘍才可能黃疸,但典型痢疾本身不黃疸)。故發燒合併黃疸『不包括』痢疾。\\n\\n護理:依伴隨症狀(腹瀉血便vs右上腹痛vs溶血)鑑別來源,黃疸+發燒+右上腹痛須警覺急性膽管炎(急症)。", "options": {"A": "病毒性肝炎可發燒合併黃疸,屬之。", "B": "正解(不包括):痢疾以血便腹瀉為主,通常不以黃疸表現。", "C": "瘧疾可因溶血/肝受累致發燒合併黃疸,屬之。", "D": "膽管炎為發燒+黃疸+右上腹痛(Charcot三聯),屬之。"}, "sources": ["Harrison 21e, Jaundice; Cholangitis; Malaria", "感染症學:fever with jaundice"]}}, "108b-TNPA-通論-35": {"quick": "HBsAg(+)、HBeAg(+)、anti-HBc IgM(+)且anti-HAV IgM(-)、anti-HCV(-)→急性B型肝炎,故選C。", "detail": {"background": "本例ALT 1500、AST 1300(ALT>AST,符合病毒性肝炎型態,非酒精性AST>2×ALT)。血清標記:anti-HAV IgM(-)→非急性A肝;HBsAg(+)、HBeAg(+)、anti-HBc IgM(+)、anti-HBc IgG(-)→『急性B型肝炎』(IgM anti-HBc陽性是急性感染關鍵,IgG尚未產生);anti-HCV(-)→非C肝。雖有應酬飲酒,但ALT>AST且B肝急性血清標記明確,故診斷為急性B型肝炎而非酒精性肝炎(後者AST/ALT>2且通常<300)。\\n\\n護理:急性B肝多支持性治療,監測猛爆性肝炎徵象(凝血、意識、黃疸惡化);衛教傳染途徑、接觸者疫苗;戒酒。", "options": {"A": "酒精性肝炎AST/ALT>2且數值通常<300,本例ALT>AST且極高,不符。", "B": "anti-HAV IgM(-)排除急性A型肝炎。", "C": "正解:HBsAg+、HBeAg+、anti-HBc IgM+→急性B型肝炎。", "D": "anti-HCV(-)排除C型肝炎。"}, "sources": ["Harrison 21e, Acute Hepatitis B serology", "AASLD HBV Guidance"]}}, "108a-TNPA-通論-53": {"quick": "急性B肝診斷需『HBsAg(①)+anti-HBc IgM(③)』,故選B。", "detail": {"background": "急性B型肝炎血清診斷核心:①HBsAg(+)代表現行感染;③anti-HBc IgM(+)是『急性感染』的關鍵指標(也用於慢性B肝急性發作)。②anti-HBs代表康復/接種後免疫(非急性);④anti-HBc IgG/total代表既往或長期感染(無法區分急慢性)。故急性B肝『所需』為①+③(HBsAg + anti-HBc IgM)。HBeAg輔助判斷複製/傳染力。\\n\\n護理:以HBsAg與anti-HBc IgM判定急性感染;追蹤HBsAg是否清除、anti-HBs是否產生(康復);監測猛爆性肝炎。", "options": {"A": "①②(HBsAg+anti-HBs):anti-HBs屬康復免疫,非急性診斷所需。", "B": "正解:①③(HBsAg+anti-HBc IgM)為急性B肝診斷所需。", "C": "②④皆非急性指標(康復免疫與既往感染)。", "D": "選項不完整且③④組合非最佳。"}, "sources": ["Harrison 21e, Hepatitis B serologic patterns", "AASLD HBV Guidance"]}}, "108b-TNPA-內科-56": {"quick": "D型肝炎(HDV)為缺陷病毒,需依賴B型肝炎(HBsAg)才能入侵複製,故選D。", "detail": {"background": "D型肝炎病毒(HDV, delta agent)是『缺陷型RNA病毒』,本身無法製造外套膜,『必須利用HBV的表面抗原(HBsAg)』作為外套膜才能組裝、感染與複製。因此HDV只感染:①與HBV『同時感染(coinfection)』──多為急性、雙重感染,猛爆性肝炎風險升高;②或在慢性B肝帶原者身上『重疊感染(superinfection)』──常致原本穩定的B肝惡化、加速肝硬化。預防HDV即靠『B肝疫苗』(無HBsAg即無HDV)。HAV、HBV、HCV皆可獨立感染。\\n\\n護理:B肝帶原者若肝炎突然惡化要想到HDV重疊感染;以B肝疫苗預防(對未感染B肝者)。", "options": {"A": "HAV可獨立感染(糞口),非依賴他病毒。", "B": "HBV可獨立感染,並為HDV所依賴的病毒。", "C": "HCV可獨立感染(血液),非依賴他病毒。", "D": "正解:HDV為缺陷病毒,須有HBV(HBsAg)才能入侵複製。"}, "sources": ["Harrison 21e, Hepatitis D", "AASLD/EASL HDV"]}}, "109-進階-內科-9": {"quick": "酒精引起的肝損為AST>ALT(AST/ALT>2);說『酒精肝ALT大於AST』不適當,故選C。", "detail": {"background": "肝病生化指標判讀:①ALT、AST升高反映『肝細胞傷害』;②ALK-P與γ-GT升高反映『膽汁鬱積或膽道阻塞』;③比值有鑑別意義──病毒性肝炎ALT>AST;『酒精性肝損AST>ALT(典型AST/ALT>2)』。④血氨(ammonia)升高與肝性腦病相關,但其『數值高低與肝病嚴重度/腦病程度相關性不佳』(個體差異大,不宜單以氨值判定嚴重度;以臨床與West Haven分級為準)。本題C稱『酒精肝ALT>AST』與事實相反,為不適當。\\n\\n護理:結合多項指標與比值判讀病因;肝性腦病以臨床表現為準,氨值僅參考。", "options": {"A": "正確:ALT/AST升高反映肝細胞受傷。", "B": "正確:ALK-P與γ-GT升高反映膽汁鬱積或膽道阻塞。", "C": "不適當(正解):酒精性肝損為AST>ALT(AST/ALT>2),非ALT>AST。", "D": "正確:血氨升高與腦病相關但不代表疾病嚴重度。"}, "sources": ["Harrison 21e, Liver Chemistry; Alcoholic Liver Disease", "Sleisenger & Fordtran's"]}}, "109-通論-其他-29": {"quick": "急性B肝診斷所需為『HBsAg(1)+anti-HBc IgM(3)』,故選A(13)。", "detail": {"background": "同前述:急性B型肝炎需『HBsAg(現行感染)』加『anti-HBc IgM(急性/近期感染指標)』。anti-HBs(2)為康復/接種免疫;anti-HBc IgG(4)為既往或長期感染、無法區分急慢性。因此正確組合為1+3。臨床上若HBsAg(+)且anti-HBc IgM(+)→急性B肝(或慢性急性發作);若HBsAg(+)、anti-HBc IgG(+)、IgM(-)→慢性B肝;若僅anti-HBs(+)→接種免疫;anti-HBs(+)且anti-HBc(+)→自然康復。\\n\\n護理:用血清標記區分感染狀態以決定追蹤與治療;急性監測猛爆性肝炎。", "options": {"A": "正解:1 HBsAg + 3 anti-HBc IgM為急性B肝診斷所需。", "B": "14含anti-HBc IgG(既往),非急性指標。", "C": "12含anti-HBs(免疫),非急性。", "D": "24皆非急性診斷指標。"}, "sources": ["Harrison 21e, Hepatitis B serology", "AASLD HBV"]}}, "109-進階-兒科-59": {"quick": "凝血酶原時間(PT)反映肝臟『合成功能』,最能代表肝功能惡化程度,故選A。", "detail": {"background": "區分『肝細胞損傷指標』與『肝臟功能(合成/排泄)指標』:①轉胺酶(AST/ALT)、ALP、GGT反映『損傷/膽汁鬱積』,但不直接代表肝臟『功能』好壞(嚴重肝衰竭時轉胺酶甚至可能下降代表肝細胞已大量壞死)。②真正反映肝『功能』的是合成與排泄能力:凝血酶原時間/INR(肝合成凝血因子,半衰期短、變化快,是急性肝衰竭嚴重度與預後的重要指標)、白蛋白(慢性)、膽紅素(排泄)。故『最能反映肝功能惡化程度』為PT/INR。兒童急性肝炎/肝衰竭中PT延長是預後惡化與是否需移植評估的關鍵。\\n\\n護理:監測PT/INR趨勢評估肝功能;PT顯著延長+意識改變(腦病)提示急性肝衰竭需積極處置/轉介移植。", "options": {"A": "正解:PT反映肝合成凝血因子能力,最能代表肝功能惡化。", "B": "轉胺酶反映肝細胞損傷程度,非功能本身。", "C": "ALP反映膽汁鬱積,非肝合成功能。", "D": "GGT反映膽汁鬱積/酒精誘導,非肝功能指標。"}, "sources": ["Harrison 21e, Tests of Liver Synthetic Function", "Pediatric Acute Liver Failure criteria"]}}, "109-通論-其他-70": {"quick": "γ-GT大幅升高時應優先把酒精性肝炎列入鑑別,故選D。", "detail": {"background": "與107-TNPA-內科-25同概念:γ-GT(GGT)對酒精誘導敏感,飲酒者常顯著升高,是提示酒精性肝損的指標(雖非特異);酒精性肝炎另有AST/ALT>2、MCV升高等特徵。AST/ALT反映肝細胞傷害不特異於酒精;ALK-P偏膽道鬱積。故大幅升高應優先想到酒精者為γ-GT。\\n\\n護理:評估飲酒史、戒酒衛教與支持、補充thiamine/葉酸、監測戒斷與肝功能。", "options": {"A": "AST升高反映肝細胞傷害,不特異於酒精。", "B": "ALT升高同屬肝細胞傷害,非酒精特異。", "C": "ALK-P升高偏膽道鬱積,非酒精首選提示。", "D": "正解:γ-GT對酒精敏感,大幅升高優先列入酒精性肝炎。"}, "sources": ["Harrison 21e, Alcoholic Liver Disease", "Sleisenger & Fordtran's"]}}, "110-進階-內科-21": {"quick": "B肝急性期為HBsAg(+)、HBeAg(+)、anti-HBc IgM(+)、anti-HBc IgG(−),故選D。", "detail": {"background": "B肝血清型態判讀:急性B肝→HBsAg(+)(現行感染)、HBeAg(+)(複製活躍)、『anti-HBc IgM(+)』(急性指標)、anti-HBc IgG(−)(尚未轉為IgG)。慢性B肝→HBsAg(+)持續>6個月、anti-HBc IgG(+)、IgM(−)。康復→HBsAg(−)、anti-HBs(+)、anti-HBc(+)。本題D完全符合急性型態。選項A、B的HBsAg(−)不符現行急性感染;C的anti-HBc IgM(−)、IgG(+)屬慢性。\\n\\n護理:以IgM anti-HBc與HBsAg區分急性;監測是否清除HBsAg/產生anti-HBs(康復)或轉慢性;急性監測猛爆性。", "options": {"A": "HBsAg(−)不符現行急性感染,不選。", "B": "HBsAg(−)且IgG(+)不符急性,不選。", "C": "anti-HBc IgM(−)、IgG(+)為慢性型態,不選。", "D": "正解:HBsAg+、HBeAg+、anti-HBc IgM+、IgG−為急性B肝。"}, "sources": ["Harrison 21e, Hepatitis B serologic patterns", "AASLD HBV"]}}, "110-通論-其他-63": {"quick": "HBsAg(+)、anti-HAV IgM(−)已知B肝發作,加驗anti-HAV IgG對找『此次發作原因』無幫助,屬非必要,故選A。", "detail": {"background": "本例ALT 555、AST 238(ALT>AST,病毒性型態),anti-HAV IgM(−)、HBsAg(+)、anti-HBs(−)、anti-HCV(−)。要進一步釐清『此次肝炎發作原因』的合理加驗:②anti-HBc IgM──判斷是急性B肝或慢性B肝『急性發作』;③HBeAg──評估B肝病毒複製活性(是否B肝活動);④anti-HDV──B肝帶原者肝炎惡化要排除D肝『重疊感染』。而①anti-HAV IgG只代表『既往A肝免疫』,對於本次(已知非急性A肝、為B肝相關)發作原因『無鑑別價值』,屬非必要檢查。\\n\\n護理:針對B肝活動/重疊感染安排相關標記;衛教追蹤與治療。", "options": {"A": "非必要(正解):anti-HAV IgG只反映既往A肝免疫,對本次B肝發作無鑑別意義。", "B": "anti-HBc IgM有助區分急性B肝或慢性急性發作,必要。", "C": "HBeAg評估B肝複製活性,必要。", "D": "anti-HDV排除D肝重疊感染(B肝帶原惡化要查),必要。"}, "sources": ["Harrison 21e, Viral Hepatitis workup", "AASLD HBV/HDV"]}}, "111-進階-外科-41": {"quick": "肝移植術後轉胺酶持續升高、膽紅素與凝血正常,要先排除血管(肝動脈/門脈)問題,首選『肝臟都卜勒超音波』,故選D。", "detail": {"background": "肝移植術後早期轉胺酶升高的鑑別包括:原發性移植物功能不良、急性排斥、血管併發症(肝動脈栓塞HAT、門靜脈/肝靜脈阻塞)、膽道併發症、保存/再灌流傷害。其中『肝動脈栓塞(HAT)』是早期移植物失敗與膽道缺血的嚴重原因,須『盡早』偵測。第一線、非侵入、床邊可做的篩檢是『肝臟都卜勒超音波(Doppler US)』──評估肝動脈、門靜脈、肝靜脈血流通暢與波形,異常再做CT血管攝影或血管攝影確認。本例膽色素與凝血正常(膽道/合成功能尚可)但轉胺酶持續升,血管缺血為要優先排除者,故先做都卜勒超音波。\\n\\n護理:術後監測肝功能趨勢、安排都卜勒追蹤血流、警覺HAT(轉胺酶飆升、膽汁減少);疑陽性即時通報移植團隊。", "options": {"A": "MRCP主要評估膽道,膽紅素正常時非首要,且非評估血管。", "B": "CT血管攝影為確認性檢查,通常在都卜勒異常後進行,非第一線。", "C": "腹部X光對移植物血流/缺血無幫助。", "D": "正解:肝臟都卜勒超音波為第一線,可床邊評估肝動脈/門脈血流排除血管併發症。"}, "sources": ["AASLD Liver Transplant; Hepatic Artery Thrombosis", "移植外科術後監測"]}}, "111-進階-內科-47": {"quick": "King's College Criteria用於『急性肝衰竭(尤其乙醯胺酚中毒)』預後/移植評估,非酒精性肝炎危險分級工具,故選C。", "detail": {"background": "酒精性肝炎(alcoholic hepatitis)的『危險分級與治療反應』常用工具:①Maddrey's discriminant function(mDF≥32表示重症、預測短期死亡、決定是否用類固醇);②Glasgow Alcoholic Hepatitis Score(GAHS);③Lille model(治療第7天評估對類固醇的反應,差者考慮停藥)。④MELD分數也可用。相對地,『King's College Criteria(KCC)』是評估『急性肝衰竭(acute liver failure)』(尤其『乙醯胺酚acetaminophen中毒』)是否需『緊急肝移植』的標準,並非專用於酒精性肝炎的危險分級或治療反應評估,故為本題答案。\\n\\n護理:重症酒精性肝炎以mDF/GAHS評估是否類固醇、用Lille評估反應;急性肝衰竭用KCC評估移植時機。", "options": {"A": "Maddrey's DF用於酒精性肝炎重症分級與類固醇決策,屬之。", "B": "GAHS為酒精性肝炎評分,屬之。", "C": "正解:King's College Criteria用於急性肝衰竭/APAP中毒之移植評估,非酒精性肝炎工具。", "D": "Lille model評估酒精性肝炎對類固醇治療的反應,屬之。"}, "sources": ["AASLD Alcohol-Associated Liver Disease Guidelines", "King's College Criteria for ALF"]}}, "111-進階-兒科-62": {"quick": "A型肝炎主要『糞口傳染』,與B/C/D型(血液/體液/垂直)最為不同,故選A。", "detail": {"background": "肝炎病毒傳染途徑分兩大類:①『腸道(糞口)傳染』:A型(HAV)、E型(HEV)──經污染食物飲水;②『腸道外(血液/體液/垂直/性)傳染』:B型(HBV)、C型(HCV)、D型(HDV)。本題選項A、B、C、D中,B/C/D皆屬血液體液傳染,唯『A型』為糞口傳染,故傳染模式『最為不同』。臨床意義:A肝靠衛生與疫苗預防、不慢性化;B/C/D靠避免血液暴露、B肝疫苗(同時防D肝)、C肝以DAA治療。\\n\\n護理:依傳染途徑採對應防護(A肝腸道接觸防護+洗手;B/C/D血液體液防護);衛教疫苗(A、B肝)。", "options": {"A": "正解:A型肝炎為糞口傳染,與B/C/D的血液體液傳染最不同。", "B": "B型為血液/體液/垂直傳染,與C、D同類。", "C": "C型為血液/垂直傳染,與B、D同類。", "D": "D型依賴B肝、為血液體液傳染,與B、C同類。"}, "sources": ["Harrison 21e, Viral Hepatitis transmission", "CDC Viral Hepatitis"]}}, "112-進階-內科-19": {"quick": "AST反映肝細胞損傷、ALP反映膽道鬱積,兩者意義不同;說『AST與ALP都能反映肝細胞損傷』錯誤,故選C。", "detail": {"background": "肝功能/肝膽生化:①AST、ALT升高=『肝細胞損傷』;②ALP(鹼性磷酸酶)、γ-GT升高=『膽汁鬱積/膽道阻塞』(ALP也來自骨骼,以γ-GT佐證為肝源);③膽道結石阻塞→total bilirubin(尤其直接膽紅素)升高;④肝衰竭時凝血因子合成下降→PT/INR延長,PT越長代表合成功能越差(預後越差)。本題C把ALP歸為反映『肝細胞損傷』是錯誤(ALP反映膽道鬱積,非肝細胞損傷),故為答案。\\n\\n護理:依指標型態(肝細胞型vs膽汁鬱積型)判讀病因;PT/白蛋白評估合成功能。", "options": {"A": "正確:酒精性肝炎GGT常上升。", "B": "正確:膽管結石阻塞時total bilirubin常上升。", "C": "錯誤(正解):ALP反映膽汁鬱積而非肝細胞損傷,與AST意義不同。", "D": "正確:肝衰竭時PT越延長代表肝合成功能越差。"}, "sources": ["Harrison 21e, Liver Chemistry Tests", "Sleisenger & Fordtran's"]}}, "112-進階-內科-42": {"quick": "Anti-HBc(+)代表『曾感染』B型肝炎,故選D;此例屬自然康復(HBsAg−、anti-HBs+、anti-HBc+)。", "detail": {"background": "本例HBsAg(−)、anti-HBs(+)、anti-HBc(+)、HBeAg(−)、anti-HBe(+)、anti-HCV(−),且肝功能正常→典型『B肝自然感染後康復(獲得免疫)』。逐項:①HBsAg(−)代表目前『無現行感染』,但不代表『未曾感染』(曾感染後可清除)。②anti-HBs(+)代表具保護力(康復或接種),代表病毒量少/有免疫,『非傳染力強』。③HBeAg(−)/anti-HBe(+)代表病毒複製低、傳染力低,肝炎活動機率較小,而非病毒量多。④『anti-HBc(+)代表曾經感染過B肝』(疫苗接種者不會有anti-HBc,只有anti-HBs)──故D正確。\\n\\n護理:區分『自然康復(anti-HBs+與anti-HBc+)』與『接種免疫(僅anti-HBs+)』;衛教此狀態具免疫力。", "options": {"A": "錯誤:HBsAg(−)只代表目前無現行感染,不代表未曾感染。", "B": "錯誤:anti-HBs(+)代表免疫保護,非病毒量多傳染力強。", "C": "錯誤:HBeAg(−)/anti-HBe(+)代表複製低、傳染力低、肝炎活動機率小。", "D": "正確(正解):anti-HBc(+)代表曾感染過B型肝炎。"}, "sources": ["Harrison 21e, Hepatitis B serologic interpretation", "AASLD HBV"]}}, "112-進階-婦產科-60": {"quick": "母體HBsAg(+)且anti-HBc(+)(慢性帶原)垂直感染風險最高;本題選項中最符合慢性帶原者為B。", "detail": {"background": "B型肝炎母嬰垂直傳染風險取決於母體『現行感染與病毒複製程度』:HBsAg(+)為帶原必要條件;若再加HBeAg(+)、高病毒量則垂直傳染率最高(未做預防可達70–90%)。本題選項皆未列HBeAg,故以『確立為慢性帶原(現行感染)』者風險最高:HBsAg(+)、anti-HBc(+)、IgM anti-HBc(−)、anti-HBs(−)──代表慢性B肝帶原(現行、長期感染、無保護抗體),垂直感染風險最高(選B)。選項A僅HBsAg(+)而anti-HBc(−)不合常理(感染必有anti-HBc);C的IgM(+)為急性;D的HBsAg(−)非帶原。故B最符合慢性帶原。實務上仍需驗HBeAg/病毒量決定是否孕期抗病毒。\\n\\n護理:HBsAg(+)孕婦之新生兒24小時內接種疫苗+HBIG;高病毒量母親孕期可用抗病毒藥進一步降低垂直傳染。", "options": {"A": "HBsAg(+)但anti-HBc(−)不合常理(感染應有anti-HBc),非最佳。", "B": "正解:HBsAg(+)、anti-HBc(+)、IgM(−)、anti-HBs(−)為慢性帶原,垂直感染風險最高。", "C": "IgM anti-HBc(+)屬急性感染型態,非『慢性帶原』之最典型。", "D": "HBsAg(−)非帶原,垂直感染風險低。"}, "sources": ["台灣B肝母嬰阻斷政策", "AASLD HBV in Pregnancy"]}}, "113-進階-家庭-41": {"quick": "ALK-P 380 IU/L明顯升高應將『膽道阻塞』列入考量,故選C。", "detail": {"background": "皮膚『蠟黃』、腹痛的肝膽病人,生化判讀:①ALT 110(輕中度升高)不一定是『急性病毒感染』,藥物、脂肪肝、酒精等也可致此程度,單憑此值不能斷定急性病毒感染。②AST/ALT比值=3較符合『酒精性肝損』(AST/ALT>2),而非『急性病毒肝炎』(後者ALT>AST、比值<1),故B描述錯誤。③ALK-P 380(明顯升高,正常上限約120)屬膽汁鬱積型,須將『膽道阻塞』(結石、腫瘤)列入考量(可加γ-GT佐證肝源),C正確。④白蛋白2.8偏低反映『慢性』肝病(合成下降)或營養不良,而非『急性』肝損(急性肝損白蛋白半衰期長,短期內不會明顯下降),故D錯誤。\\n\\n護理:ALP升高+黃疸→安排腹部超音波看膽道是否擴張/結石;低白蛋白提示慢性病程。", "options": {"A": "ALT 110程度可由藥物/脂肪肝等多因引起,不能斷定為急性病毒感染。", "B": "AST/ALT=3較符合酒精性肝損,而非急性病毒肝炎(應ALT>AST),敘述不正確。", "C": "正確(正解):ALK-P 380明顯升高,須將膽道阻塞列入考量。", "D": "白蛋白低反映慢性肝病/營養問題,非『急性』肝損指標,敘述不正確。"}, "sources": ["Harrison 21e, Approach to Abnormal Liver Tests", "Sleisenger & Fordtran's, Cholestasis"]}}, "114-進階-家庭-45": {"quick": "HBeAg陽性代表B肝病毒『正在複製、傳染力強』,故C正確。", "detail": {"background": "B型肝炎標記意義:①anti-HBs(+)=保護抗體,代表康復或接種後免疫,『非急性感染』。②HBsAg(−)=目前無現行感染,但『不等於曾經感染』(曾感染者康復後HBsAg轉陰);判斷『曾經感染』要看anti-HBc。③HBeAg(+)=病毒『活躍複製』、傳染力強(高病毒量),C正確。④IgM anti-HBc=『急性』感染指標(非慢性);慢性感染指標是HBsAg持續>6個月+anti-HBc IgG。本題C正確。\\n\\n護理:HBeAg陽性者傳染力強,衛教接觸者預防與本人追蹤/治療評估;以IgM anti-HBc判斷急性。", "options": {"A": "錯誤:anti-HBs陽性代表康復/接種免疫,非急性感染。", "B": "錯誤:HBsAg陰性代表目前無現行感染,不代表曾經感染。", "C": "正確(正解):HBeAg陽性代表病毒正在複製、傳染力強。", "D": "錯誤:IgM anti-HBc為急性感染指標,非慢性。"}, "sources": ["Harrison 21e, Hepatitis B serology", "AASLD HBV"]}}, "114-進階-家庭-51": {"quick": "肝細胞型肝炎(ALT600/AST500)+黃疸不等於細菌敗血症,『立即給廣效抗生素預防敗血』錯誤,故選D。", "detail": {"background": "本例50歲女性、類風濕性關節炎、B肝帶原,出現倦怠噁心茶色尿+ALT600/AST500+黃疸→急性肝炎發作。鑑別與處置:①以anti-HBc(IgM vs IgG)區分急性B肝或慢性B肝『急性發作』(A正確)。②類風濕用『高劑量類固醇或免疫抑制劑/生物製劑』會引發『B肝病毒再活化(reactivation)』──這是B肝帶原者用免疫抑制前必須評估並預防性抗病毒的重點(B正確)。③女性+合併自體免疫疾病要想到『自體免疫肝炎(AIH)』,驗ANA、ASMA(C正確)。④肝功能升高與黃疸是『肝細胞損傷』,並非細菌感染證據,『立即給廣效抗生素預防敗血』無依據且不恰當(D錯誤,為答案)──應找肝炎病因(病毒再活化/AIH/藥物),而非盲目抗生素。\\n\\n護理:免疫抑制前篩B肝並給預防性抗病毒(如entecavir/TAF);依病因治療,勿濫用抗生素。", "options": {"A": "正確:anti-HBc(IgM/IgG)可協助鑑別急性與慢性B肝。", "B": "正確:高劑量類固醇/免疫抑制易致B肝病毒再活化。", "C": "正確:女性合併自體免疫疾病要查ANA、ASMA評估自體免疫肝炎。", "D": "錯誤(正解):肝細胞型肝炎+黃疸非細菌感染證據,不應立即給廣效抗生素。"}, "sources": ["AASLD HBV Reactivation with Immunosuppression", "Harrison 21e, Autoimmune Hepatitis"]}}, "105-TNPA-外科-48": {"quick": "食道靜脈曲張出血的內視鏡+血管收縮藥(octreotide)是『第一線』治療,不是SB tube失敗後才用,故C錯誤。", "detail": {"background": "食道靜脈曲張(門脈高壓)急性出血的治療順序與要點:①復甦穩定氣道、輸液/限制性輸血(目標Hb約7–8 g/dL,過度輸血反增門脈壓再出血);②『預防性抗生素(如ceftriaxone)』──肝硬化出血者投予可降低感染與『提高存活率』(A正確);③血管收縮藥(somatostatin/octreotide/terlipressin)降低門脈壓,『與內視鏡治療(套紮EVL/硬化)合併為第一線』;④三腔氣囊管(Sengstaken-Blakemore, SB tube)為內視鏡/藥物失敗時的『暫時性』壓迫止血橋接(併發症多:吸入、食道壞死/破裂),非第一線;⑤難治者用TIPS(經頸靜脈肝內門體分流)或挽救手術。本題C把『內視鏡+octreotide』說成SB tube失敗後才用,順序顛倒,錯誤(內視鏡+藥物才是第一線)。\\n\\n護理:氣道保護(嘔血誤吸風險高)、大口徑輸液、給抗生素與血管收縮藥、備內視鏡;SB tube留置時嚴密監測。", "options": {"A": "正確:預防性抗生素可降低感染並提高肝硬化出血者存活率。", "B": "正確:SB tube可暫時止血但併發症多。", "C": "錯誤(正解):內視鏡+octreotide為第一線,而非SB tube失敗後才採用。", "D": "正確:TIPS是難治性靜脈曲張出血的另一選擇。"}, "sources": ["AASLD Portal Hypertensive Bleeding Guidelines", "Baveno VII Consensus", "Harrison 21e, Variceal Hemorrhage"]}}, "106-106a-內科-38": {"quick": "SAAG=3.0−2.2=0.8(<1.1)屬非門脈高壓性腹水;肝硬化為門脈高壓(SAAG≥1.1),故肝硬化『較不可能』,選A。", "detail": {"background": "血清-腹水白蛋白梯度(SAAG)=血清白蛋白−腹水白蛋白,是腹水病因分類的關鍵:①SAAG『≥1.1 g/dL』=『門脈高壓性』腹水(肝硬化、心衰、Budd-Chiari、大量肝轉移);②SAAG『<1.1』=『非門脈高壓性』(腹膜癌病、結核性腹膜炎、胰源性、腎病症候群、漿膜炎)。本例SAAG=3.0−2.2=0.8(<1.1)→屬非門脈高壓,因此『肝硬化(門脈高壓)較不可能』(選A);而結核性腹膜炎、腹膜癌病、腎病症候群皆為低SAAG(<1.1)之原因,符合。\\n\\n護理:抽腹水時同時送血清白蛋白計算SAAG;低SAAG者進一步查腹膜癌(細胞學)、結核(ADA、培養)、腎病(尿蛋白)。", "options": {"A": "較不可能(正解):肝硬化為門脈高壓(SAAG≥1.1),與本例SAAG 0.8不符。", "B": "結核性腹膜炎為低SAAG(<1.1),符合,故可能。", "C": "腎病症候群為低SAAG腹水,符合,可能。", "D": "腹膜癌病為低SAAG(<1.1),符合,可能。"}, "sources": ["AASLD Ascites Guideline (SAAG)", "Harrison 21e, Ascites"]}}, "106-106a-外科-46": {"quick": "猛爆性肝衰竭最主要的致死原因是『腦水腫(顱內壓升高)』,故D正確。", "detail": {"background": "猛爆性/急性肝衰竭(fulminant/acute liver failure)定義:無慢性肝病者,於『黃疸出現後8週內(或無肝病者26週內)』發生肝性腦病變(本題A的『2–4週』敘述不符標準定義)。台灣病因以『病毒性肝炎,但以何種為主因區域而異』(B肝在台灣是慢性肝病主因,但急性肝衰竭病因含B肝、藥物/毒物如乙醯胺酚、自體免疫等;不能一概說最多由B肝引起,且各國差異大)。代謝表現為『低血糖(非高血糖,因肝糖原耗竭與糖質新生受損)、低白蛋白、凝血異常(PT延長)』,故C『高血糖』錯誤。最主要致死原因是『腦水腫導致顱內高壓與腦疝』(及多重器官衰竭、感染),故D正確。處理:加護監測、找病因(APAP用NAC)、評估緊急肝移植(King's College Criteria)。\\n\\n護理:監測意識/腦病分級與顱內壓徵象、血糖、凝血、感染;避免鎮靜過度,及早轉介移植中心。", "options": {"A": "錯誤:急性肝衰竭定義為黃疸後『約8週內』發生腦病,非2–4週。", "B": "敘述過於絕對:急性肝衰竭病因多元(病毒、藥毒、自體免疫),不宜一概稱B肝最多。", "C": "錯誤:應為『低血糖』(肝糖耗竭)、低白蛋白與凝血異常,非高血糖。", "D": "正確(正解):腦水腫(顱內高壓)是猛爆性肝衰竭最主要致死原因。"}, "sources": ["AASLD Acute Liver Failure Guideline", "Harrison 21e, Acute Liver Failure"]}}, "107-TNPA-外科-56": {"quick": "肝硬化(門脈高壓)病人突發大量吐血,最可能為『食道靜脈瘤(曲張)出血』,故選B。", "detail": {"background": "肝硬化合併門脈高壓→側枝循環形成食道/胃靜脈曲張,是肝硬化病人『大量上消化道出血』最典型且最危險的原因。本例B肝帶原、肝硬化、大量腹水(門脈高壓證據)+住院期間『突然大量吐血』→食道靜脈瘤出血最可能。雖肝硬化病人也可能有消化性潰瘍出血,但在門脈高壓背景下大量吐血首先想到靜脈曲張;肝腫瘤(2cm)破裂多表現腹腔內出血/腹痛血壓下降而非吐血。處置:復甦、血管收縮藥(octreotide/terlipressin)、預防性抗生素、緊急內視鏡套紮。\\n\\n護理:氣道保護防誤吸、大量輸液輸血(限制性目標)、給藥與備內視鏡、監測再出血。", "options": {"A": "十二指腸潰瘍出血可能,但門脈高壓背景下大量吐血首先想到靜脈曲張,非最可能。", "B": "正解:肝硬化門脈高壓→食道靜脈瘤出血,最符合大量吐血。", "C": "胃潰瘍出血亦可能,但非門脈高壓病人大量吐血的首要考量。", "D": "肝腫瘤破裂多為腹腔內出血/腹痛低血壓,非吐血表現。"}, "sources": ["Harrison 21e, Variceal Hemorrhage", "AASLD Portal Hypertension"]}}, "108b-TNPA-通論-53": {"quick": "肝硬化病人吐鮮血、頭暈,最可能為『食道靜脈曲張』出血,故選A。", "detail": {"background": "肝硬化→門脈高壓→食道胃靜脈曲張,破裂時表現為『大量吐鮮血(hematemesis)』、黑便、血行動力不穩(頭暈、低血壓)。本例肝硬化病史+吐鮮血+頭暈胸悶→食道靜脈曲張出血最可能。潰瘍性結腸炎與克隆氏症為下消化道發炎,以腹瀉/血便為主;大腸憩室炎以左下腹痛/下消化道出血為主,皆不符『吐鮮血』。處置同靜脈曲張出血(復甦、血管收縮藥、抗生素、內視鏡套紮)。\\n\\n護理:氣道保護、輸液輸血、血管收縮藥與抗生素、緊急內視鏡;監測再出血與肝性腦病。", "options": {"A": "正解:肝硬化+吐鮮血→食道靜脈曲張出血最可能。", "B": "潰瘍性結腸炎以血便腹瀉表現,非吐血。", "C": "克隆氏症以腹瀉腹痛為主,非吐鮮血。", "D": "大腸憩室炎以左下腹痛/下消化道出血為主,非吐血。"}, "sources": ["Harrison 21e, Variceal Hemorrhage", "AASLD Portal Hypertension"]}}, "108a-TNPA-內科-61": {"quick": "翻身後濁音界隨重力移動(shifting dullness),是『腹水』的典型理學表現,故選B。", "detail": {"background": "腹部叩診鑑別腹脹原因:①『移動性濁音(shifting dullness)』──病人仰臥時游離腹水積在兩側脅腹呈濁音、腸氣浮於中央呈鼓音;翻向一側後,腹水(液體)流向重力側使該側轉為濁音、上方腸氣呈鼓音,濁音界『隨體位改變而移動』,是游離腹水的典型徵象(另有液波震顫fluid wave)。②腸阻塞以鼓音為主、腸音變化;③穿孔以腹膜炎徵候、肝濁音消失;④肝脾腫大為固定性局部濁音、不隨體位移動。本題描述正是移動性濁音→腹水。\\n\\n護理:評估腹水(腹圍、體重、移動性濁音)、限鈉與利尿、必要時診斷性/治療性腹腔穿刺並計算SAAG與PMN。", "options": {"A": "腸阻塞以鼓音與腸音變化為主,非移動性濁音。", "B": "正解:濁音界隨重力移動(shifting dullness)為腹水典型表現。", "C": "穿孔以腹膜炎徵候與肝濁音消失為主,不符。", "D": "肝脾腫大為固定局部濁音,不隨體位移動。"}, "sources": ["Bates' Guide to Physical Examination, Abdomen", "Harrison 21e, Ascites"]}}, "108b-TNPA-外科-64": {"quick": "酒精性肝硬化常『同時併有其他肝病(如B型肝炎)』加重病情,故D正確。", "detail": {"background": "酒精性肝病與肝硬化要點:①肝移植條件──酒精性肝病者多要求『戒酒一段時間(常6個月)』並評估,『未戒酒』通常為禁忌(故『不管是否戒酒都能移植』錯誤);②早期/代償期肝病在『戒酒』後肝功能仍可部分改善(故『戒酒也不會回復』過於絕對,錯誤);③酒精戒斷症候群(震顫、譫妄、癲癇)『可發生於肝病/將近肝昏迷者』,且須與肝性腦病鑑別(故『肝昏迷病人不會戒斷』錯誤);④酒精性肝病常『合併其他肝病(B/C肝、脂肪肝、血色素沉著)』,多重病因加乘惡化(D正確)。\\n\\n護理:戒酒支持、補充thiamine/葉酸、監測戒斷與肝性腦病、篩查共病肝炎。", "options": {"A": "錯誤:未戒酒通常為肝移植禁忌,並非只要肝衰竭都能移植。", "B": "錯誤:代償期戒酒後肝功能仍可部分回復,並非全不可逆。", "C": "錯誤:酒精戒斷症候群可發生於肝病/近肝昏迷者,須與肝性腦病鑑別。", "D": "正確(正解):酒精性肝病常合併其他肝病(如B型肝炎)而加重。"}, "sources": ["AASLD Alcohol-Associated Liver Disease", "Harrison 21e, Alcoholic Liver Disease"]}}, "108a-TNPA-通論-69": {"quick": "Child-Pugh評分項目為膽紅素、白蛋白、PT(INR)、腹水、肝性腦病;『ALT(轉胺酶)』不在其中,故選C。", "detail": {"background": "Child-Turcotte-Pugh(CTP)分級評估肝硬化嚴重度與預後,含『五項』(口訣ABCDE):A=Albumin(白蛋白)、B=Bilirubin(膽紅素)、C=Coagulation(PT/INR)、D=Distension/ascites(腹水)、E=Encephalopathy(肝性腦病)。每項1–3分,總分5–6=A級(代償佳)、7–9=B級、10–15=C級(預後差)。『轉胺酶(ALT/AST)』反映肝細胞發炎損傷,但『不納入』CTP評分(因不反映肝功能儲備)。MELD分數則用膽紅素、INR、肌酐(及鈉)用於移植排序。本題C(ALT)不包括,為答案。\\n\\n護理:以CTP/MELD評估嚴重度與移植時機;追蹤白蛋白、膽紅素、INR與腹水/腦病。", "options": {"A": "腹水是CTP評估項目之一(D),包括。", "B": "肝性腦病是CTP項目之一(E),包括。", "C": "正解:血清轉胺酶(ALT)不在Child-Pugh評估項目中。", "D": "凝血酶原時間(PT/INR)是CTP項目之一(C),包括。"}, "sources": ["Harrison 21e, Child-Pugh Classification", "AASLD Cirrhosis"]}}, "110-進階-內科-39": {"quick": "坐起更喘且血氧下降(platypnea-orthodeoxia)是『肝肺症候群(HPS)』的特徵,故選B。", "detail": {"background": "肝肺症候群(hepatopulmonary syndrome, HPS)是肝硬化/門脈高壓的肺血管併發症,因肺內血管擴張(intrapulmonary vascular dilatation)造成右到左分流與通氣-灌流不匹配→低血氧。特徵性表現為『平臥呼吸(platypnea)』與『直立性低血氧(orthodeoxia)』:病人『坐/站起時更喘、血氧更低』,平躺反而改善──因直立時血流更多分布到肺底擴張血管,分流增加。診斷:對比增強心臟超音波(氣泡延遲出現於左心)、低血氧(PaO2下降、A-a gradient增大)。治療根本為肝移植。其他選項(COPD、左心衰、二尖瓣狹窄)不會有platypnea-orthodeoxia此特徵。\\n\\n護理:評估姿勢相關血氧變化、補充氧氣、衛教與移植評估。", "options": {"A": "COPD呼吸衰竭無platypnea-orthodeoxia此特徵,不符。", "B": "正解:肝肺症候群有platypnea(坐起更喘)與orthodeoxia(直立血氧下降)。", "C": "左心衰多為端坐呼吸(平躺更喘),與本例相反。", "D": "二尖瓣狹窄以肺充血/端坐呼吸為主,非platypnea-orthodeoxia。"}, "sources": ["AASLD/ERS Hepatopulmonary Syndrome", "Harrison 21e, Pulmonary Complications of Liver Disease"]}}, "110-進階-內科-40": {"quick": "蜘蛛痣、手掌紅斑、脾腫大、低白蛋白、B肝+吐血→『肝硬化』合併門脈高壓出血,故選A。", "detail": {"background": "肝硬化的臨床徵象:①門脈高壓/側枝循環──食道胃靜脈曲張(吐血)、脾腫大、腹水、腹壁靜脈(caput medusae);②肝功能不全/雌激素代謝下降──蜘蛛痣(spider angioma)、手掌紅斑(palmar erythema)、男性女乳、睪丸萎縮;③合成下降──低白蛋白、凝血異常。本例HBsAg(+)慢性B肝、GOT/GPT輕升、albumin 2.5(低)、蜘蛛痣+手掌紅斑+脾腫大+吐血→典型肝硬化合併門脈高壓靜脈曲張出血。消化性潰瘍/胃癌/淋巴瘤無法解釋蜘蛛痣、手掌紅斑、脾腫大與低白蛋白的組合。\\n\\n護理:辨識肝硬化stigmata、處理靜脈曲張出血、評估CTP/MELD與併發症。", "options": {"A": "正解:蜘蛛痣、手掌紅斑、脾腫大、低白蛋白+B肝→肝硬化。", "B": "消化性潰瘍無法解釋蜘蛛痣、手掌紅斑與脾腫大,不符。", "C": "胃癌不會造成蜘蛛痣/手掌紅斑等肝硬化stigmata。", "D": "淋巴瘤無這些肝硬化的特徵性徵象,不符。"}, "sources": ["Harrison 21e, Cirrhosis (stigmata of chronic liver disease)", "Sleisenger & Fordtran's"]}}, "110-進階-內科-46": {"quick": "肝硬化+意識/行為改變+撲翅樣震顫(asterixis)→『肝性腦病變』,故選C。", "detail": {"background": "肝性腦病(hepatic encephalopathy)是肝硬化/肝衰竭的神經精神併發症,因氨等毒素無法被肝清除而影響中樞。表現:意識改變(嗜睡、定向力差、人格/行為改變到昏迷)、『撲翅樣震顫(asterixis/flapping tremor)』、認知與睡眠障礙。常見誘因:消化道出血、感染(含SBP)、便祕、電解質異常(低血鉀、鹼中毒會增加氨)、脫水/利尿過度、高蛋白負荷、鎮靜劑。本例肝硬化+嗜睡定向力差+不當行為+asterixis,且低血鉀(K 3.0,誘因)→肝性腦病。診斷為臨床診斷(血氨輔助但不必需)。治療:找並矯正誘因、lactulose降氨、rifaximin。\\n\\n護理:評估腦病分級、矯正誘因(止血、抗感染、補鉀、通便)、給lactulose、防跌倒誤吸。", "options": {"A": "低血鉀是誘因之一,但單純電解質不平衡無法解釋asterixis+肝硬化全貌,非最佳。", "B": "額葉出血會有局部神經學缺損,無asterixis特徵,不符。", "C": "正解:肝硬化+意識行為改變+撲翅樣震顫→肝性腦病變。", "D": "腦膜炎以發燒、頸僵、頭痛為主,本例不符。"}, "sources": ["AASLD/EASL Hepatic Encephalopathy Guidelines", "Harrison 21e, Hepatic Encephalopathy"]}}, "111-進階-內科-49": {"quick": "尚未出血過的食道靜脈曲張,可用非選擇性β阻斷劑(propranolol)做『一級預防』,故A適當。", "detail": {"background": "食道靜脈曲張的處置分層:①一級預防(未曾出血但有中大型靜脈曲張)──非選擇性β阻斷劑(propranolol、nadolol、carvedilol)降低門脈壓,或內視鏡套紮(EVL),二擇一(A正確)。②急性出血──血管收縮藥(somatostatin/octreotide/terlipressin)+內視鏡套紮+預防性抗生素,『不是用β阻斷劑於急性出血期』(β阻斷劑會降血壓妨礙復甦,故B錯)。③輸血採『限制性策略』,目標Hb約7–8 g/dL,『不宜把Hb拉到10以上』(過度輸血升門脈壓增加再出血,故C錯)。④肝硬化合併消化道出血者『一律』給預防性抗生素(降感染與死亡),不論有無感染數據(故D錯)。⑤二級預防(出血後)──β阻斷劑+EVL。\\n\\n護理:一級預防衛教用藥(調心率至基礎75%或<55–60次/分);急性出血給藥與內視鏡並限制性輸血。", "options": {"A": "正解:未出血的靜脈曲張可用非選擇性β阻斷劑做一級預防。", "B": "錯誤:急性出血期不以β阻斷劑止血(會妨礙復甦),應用血管收縮藥+內視鏡。", "C": "錯誤:輸血採限制性(Hb約7–8),拉到10以上會增加再出血。", "D": "錯誤:肝硬化消化道出血者應常規給預防性抗生素,不待感染數據。"}, "sources": ["Baveno VII Consensus", "AASLD Portal Hypertensive Bleeding"]}}, "111-通論-麻醉-59": {"quick": "末期肝病低白蛋白會使蛋白結合型藥物游離增加,『藥物敏感性上升』而非下降,故D錯誤。", "detail": {"background": "末期肝病(ESLD)的身體評估與藥理影響:①雌激素代謝下降與血管解剖分流→蜘蛛痣、手掌紅斑(A正確);②大量腹水使橫膈上抬→肺膨脹不全、限制性換氣(B正確);③門脈高壓使血流堆積於肝循上游→食道胃靜脈曲張、脾腫大(C正確);④白蛋白低(<2.5–3.0)→『血漿蛋白結合下降,游離藥物濃度增加』,加上肝代謝能力下降,使許多藥物作用增強、半衰期延長→『藥物敏感性增加(須減量)』,而非降低,故D錯誤。麻醉/用藥時須謹慎(避免肝毒性藥、減量鎮靜劑、注意凝血)。\\n\\n護理:用藥減量並監測、避免肝毒性與過度鎮靜(誘發腦病)、評估凝血與腹水對呼吸影響。", "options": {"A": "正確:ESLD可出現血管解剖性分流如蜘蛛痣。", "B": "正確:大量腹水腹脹可致肺膨脹不全。",
