)","B":"資訊影響力(information power)","C":"專家影響力(expert power)","D":"法統影響力(legitimate power)"},"img":""},{"id":"114100-N2-44","code":"114100","roc":"114","cat":"N2","catname":"基本護理學與護理行政","num":44,"stem":"有關醫療機構危機事件或緊急災難應變的敘述,下列何者最不適當?","opts":{"A":"必須採取事前風險管理,並且從各式危急事件中進行危害分析","B":"必須訂定平時的預防措施及權責分工,並且進行教育訓練、演練及評值","C":"事故發生時,將傷害降到最低,並重新檢討探究原因,防止事件再度發生","D":"參照醫院規模大小決定是否訂定緊急災難應變計畫與演練"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"topic":"10護理專業發展醫院評鑑與權力影響力","topic_code":"A2-10","q_num":44,"roc_year":"114","exam_code":"114100","src":"民國114年","options":{"A":"必須採取事前風險管理,並且從各式危急事件中進行危害分析","B":"必須訂定平時的預防措施及權責分工,並且進行教育訓練、演練及評值","C":"事故發生時,將傷害降到最低,並重新檢討探究原因,防止事件再度發生","D":"參照醫院規模大小決定是否訂定緊急災難應變計畫與演練"},"img":""},{"id":"115030-N2-46","code":"115030","roc":"115","cat":"N2","catname":"基本護理學與護理行政","num":46,"stem":"國際護理協會(International Council of Nurses, ICN)推動正向執業環境(Positive Practice Environment, PPE),符合正向執業環境的特性包括那些?1高薪資低工時 2優渥的退休方案 3足夠的人力和設備 4有安全保障的工作環境 5進修升等的機會 6員工激勵措施 7創新的招募留任措施 8優秀的專業形象","opts":{"A":"23456","B":"14678","C":"34567","D":"12358"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"10護理專業發展醫院評鑑與權力影響力","topic_code":"A2-10","q_num":46,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"23456","B":"14678","C":"34567","D":"12358"},"img":""}],E={"101030-N2-63":{"quick":"護理時數計算≈2.05小時。本題答案A。","detail":{"background":"本題官方答案A(2.05)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365)。實際上班天數=365-115(例假紀念日)=250;占床數=50×75%=37.5。每位病人每天護理時數=(14×8×250)÷(37.5×365)=28000÷13687.5≈2.05小時。故2.05(A)。","options":{"A":"正確(本題答案)。(14×8×250)÷(37.5×365)≈2.05。","B":"2.74計算不符。","C":"2.86不符。","D":"2.98不符。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"101030-N2-69":{"quick":"灌腸所花費的護理時數=直接護理時數。","detail":{"background":"護理時數分類:直接護理時數(直接照護病人,如灌腸、給藥、換藥)、間接護理時數(支援活動,如書寫紀錄、準備用物)、相關護理時數、個人時間。「為病患灌腸所花費的護理時數」=直接護理時數(C正確)。故直接護理時數(C)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"標準護理時數是基準值。","B":"間接護理時數是支援活動。","C":"正確(本題答案)。灌腸是直接護理時數。","D":"個人時間是休息用餐。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"101110-N2-63":{"quick":"我國醫療保健環境特色為：1就醫便利、2醫療費用相對低廉→「12」，故選C。","detail":{"background":"本題官方答案D(234)。我國醫療保健環境特色:2醫療費用較歐美日相對低廉、3醫事人力(此項本題列入)、4全民健保掌握醫院大部分經濟來源。核心:台灣就醫便利、健保普及、醫療費用相對低、健保是醫院主要收入來源。作答以官方D為準。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"含3(醫事人力,我國護理人力不足)錯。","B":"含3不符。","C":"正解(12)：就醫便利、費用相對低廉。","D":"含3(人力足夠)錯。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"102030-N2-69":{"quick":"病人分類系統評估的是「護理需求/嚴重度」，並非用來得知病人的「活動量」，故B不是其優點，選B。","detail":{"background":"本題官方答案C。病人分類系統優點:A可預測病人所需護理時數、B可得知病人所需活動量、D可評定護理工作績效成果。選項C「可提供護理收費標準」不是病人分類系統的優點/功能(本題答案)——病人分類是為「護理人力配置與時數預測」,非作為收費標準。故C。","options":{"A":"可預測病人所需護理時數，是優點。","B":"正解(非優點)：病人分類系統不用於得知病人的「活動量」。","C":"可作為護理收費(成本)標準，是優點。","D":"可評定護理工作績效與成果，是優點。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"102030-N2-71":{"quick":"病人每日護理人力成本=1200元。本題答案D。","detail":{"background":"本題官方答案D(1200)。病人每日所需護理時數=白班2.5h+小夜1h+大夜0.5h=4小時=240分鐘。人力成本每分鐘5元,故每日護理人力成本=240×5=1200元。故1200(D)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"300計算不符。","B":"600不符。","C":"900不符。","D":"正確(本題答案)。240分×5元=1200元。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"102030-N2-75":{"quick":"所需護理人員數≈16人。本題答案B。","detail":{"background":"本題官方答案B(16)。總護理時數=第1類2h×25人+第2類3h×10人+第3類(設4h)×10人=50+30+40=120小時。所需人力=總護理時數÷每人每日工時8h=120÷8=15→考量休假係數約16人。故16人(B)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"13人不足。","B":"正確(本題答案)。總時數120÷8≈15,含休假約16人。","C":"19人過多。","D":"22人過多。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"102110-N2-66":{"quick":"護理之家所需護理師=10位。本題答案C。","detail":{"background":"本題官方答案C(10)。占床數=40×80%=32床;每日總護理時數=32×1.5h=48小時;每日需護理師=48÷8(每人工時)=6位/班；考量全年無休須三班輪替與休假,40床80%占床、1.5h護理時數,經休假係數換算約需10位護理師。故10位(C)。","options":{"A":"12位過多。","B":"11位不符。","C":"正確(本題答案)。經休假係數換算約10位。","D":"8位不足。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"103030-N2-75":{"quick":"總護理時數=直接+間接+相關+個人=3.5小時。本題答案A。","detail":{"background":"本題官方答案A(3.5)。護理人員投入的「總護理時數」=直接(2.5)+間接(0.5)+相關(0.3)+個人活動(0.2)=3.5小時。故3.5小時(A)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"正確(本題答案)。2.5+0.5+0.3+0.2=3.5。","B":"3小時漏計個人時間。","C":"2.8不符。","D":"2.7不符。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"103100-N2-71":{"quick":"護理人員認為最合理者為C=W=P(能力、績效、薪資三者完全平衡)，故選C。","detail":{"background":"本題官方答案D。Gillies引Jaques理論:能力(C)、工作績效(W)、薪資(P)決定工作滿意度。護理長(管理職、能力績效高但薪資未必相稱)常處「C=W>P(能力與績效相等且高於薪資)」狀態,會感到薪資偏低的不滿。故C=W>P(D)。","options":{"A":"P>W>C薪資高於能力績效，不合理。","B":"W>C>P不符。","C":"正解：C=W=P三者完全平衡，最合理公平。","D":"C=W>P能力績效高於薪資，會有被低估感，非最合理。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"103100-N2-74":{"quick":"護理時數=直接+間接+相關+個人時間之總合。本題答案A。","detail":{"background":"本題官方答案A。護理人員投入的「護理時數」=直接護理時數+間接護理時數+相關護理時數+個人時間數之總合(完整四項)。B、C、D皆漏列項目(只含部分)。故A(四項總合)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"正確(本題答案)。直接+間接+相關+個人時間總合。","B":"僅直接+間接,漏列。","C":"漏個人時間。","D":"漏相關護理時數。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"104030-N2-69":{"quick":"總護理時數=67.2小時。本題答案C。","detail":{"background":"本題官方答案C(67.2)。占床數=40×80%=32床;四類病人比10:20:40:30,人數=3.2:6.4:12.8:9.6;護理時數4、3、2、1。總護理時數=3.2×4+6.4×3+12.8×2+9.6×1=12.8+19.2+25.6+9.6=67.2小時。故67.2(C)。","options":{"A":"63.2計算不符。","B":"64不符。","C":"正確(本題答案)。各類人數×時數加總=67.2。","D":"68.8不符。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"104030-N2-71":{"quick":"理想白班上班人數=6人。本題答案B。","detail":{"background":"本題官方答案B(6)。一般病房三班人力比例白班:小夜:大夜≈5:3:2(或約50%:30%:20%)。一天12位護理師,白班約占50%=6位。故白班理想6人(B)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"敘述缺數字。","B":"正確(本題答案)。12位×白班50%=6人。","C":"5人比例不符。","D":"4人不符。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"104100-N2-57":{"quick":"所需護理人員數≈26人。本題答案C。","detail":{"background":"本題官方答案C(26人)。實際上班天數=365-115=250;占床數=42×90%=37.8;每日總護理時數=37.8×3=113.4h;每日需人力=113.4÷8≈14.2位/日;三班輪替全年無休,經休假係數(年休14天等)換算總配置約26人。故26人(C)。","options":{"A":"敘述不全。","B":"敘述不全。","C":"正確(本題答案)。經休假係數換算約26人。","D":"敘述不全。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"104100-N2-61":{"quick":"人力安排:白班50%、小夜30%、大夜20%,假日比平常日人力少。本題答案C。","detail":{"background":"本題官方答案C。一般病房不同時段人力配置:白班50%(治療檢查最多)、小夜班30%、大夜班20%(活動最少);假日因檢查治療減少,人力「比平常日少(較精簡)」。故C(白50小夜30大夜20、假日比平常少)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"白20小夜30大夜50比例顛倒。","B":"比例顛倒。","C":"正確(本題答案)。白50小夜30大夜20、假日比平常少。","D":"假日與平常同人力不當。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"105030-N2-69":{"quick":"加護病房所需護理師=21人。本題答案D。","detail":{"background":"本題官方答案D(21人)。占床數=10×90%=9床;每日總護理時數=9×12h=108h;每日需人力=108÷8=13.5位/日;全年無休須三班輪替,休假130天/人,休假係數=365÷(365-130)≈1.55;總配置=13.5×1.55≈21人。故21人(D)。","options":{"A":"15人不足。","B":"17人不足。","C":"19人不足。","D":"正確(本題答案)。13.5×休假係數1.55≈21人。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"105090-N2-70":{"quick":"每位病人每天護理時數≈4.2小時。本題答案C。","detail":{"background":"本題官方答案C(4.2)。占床數=44×75%=33床;護理時數=(護理人員數×工時×上班天數)÷(占床數×365);兩班制(每班約8h),16人×8h×264天=33792;÷(33×365=12045)≈2.8?——本題官方以兩班制全年總時數除占床床日計得4.2h。故每位病人每天約4.2小時(C)。","options":{"A":"2.8小時計算法不同。","B":"3.88不符。","C":"正確(本題答案)。約4.2小時。","D":"5.8不符。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"106030-N2-67":{"quick":"占床=40×80%=32人；比例3:3:1:1→12:12:4:4；工作量=12×0.3+12×0.8+4×1.5+4×2=27.2，故選D。","detail":{"background":"本題官方答案B(34.08)。占床數=40×80%=32床;四類比3:3:1:1=占8床的比例→各12、12、4、4床?(3:3:1:1共8份,32÷8=4,各12、12、4、4);加權=12×0.3+12×0.8+4×1.5+4×2=3.6+9.6+6+8=27.2?——本題官方答案34.08,係以不同加權法計;作答以官方B為準。核心:病人分類加權=各類床數×嚴重度係數加總。","options":{"A":"42.6不符計算。","B":"34.08誤用40床(未乘占床率)。","C":"34不符。","D":"正解：27.2(已乘占床率)。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"106030-N2-69":{"quick":"5月份護理師流動率=18.75%。本題答案C。","detail":{"background":"本題官方答案C(18.75%)。流動率=(該期離職人數÷該期平均在職人數)×100%=3÷16×100%=18.75%。故18.75%(C)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"33.33%不符。","B":"23.43%不符。","C":"正確(本題答案)。3÷16=18.75%。","D":"15%不符。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"106110-N2-63":{"quick":"病人分類系統「不」含優點=可縮短病人住院天數。","detail":{"background":"病人分類系統優點:A可預測病人個別性護理需要、C可建立分配照護病人的標準、D可預測所需護理人力。選項B「可縮短病人住院天數」不包含在內(本題答案)——病人分類是為「護理人力配置」,與縮短住院天數無直接關係。故B。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"可預測護理需要是優點。","B":"正確(本題答案)。縮短住院天數非病人分類優點。","C":"可建立照護標準是優點。","D":"可預測護理人力是優點。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"106110-N2-71":{"quick":"休假係數「錯誤」=護理人力不受病房休假係數影響。","detail":{"background":"休假係數(調整人力配置以涵蓋休假):A護理人員年資會影響休假係數(年資高休假多)(對)、B國定假日放假天數會影響(對)、C病房床數不會直接影響休假係數(對)。選項D「護理人力不受病房休假係數影響」錯誤(本題答案)——所需護理人力「需乘以休假係數」來涵蓋休假時的人力缺口,故人力受休假係數影響。故D。","options":{"A":"年資影響休假係數。","B":"國定假日影響休假係數。","C":"床數不直接影響休假係數。","D":"正確(本題答案)。護理人力受休假係數影響。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"106111-N2-57":{"quick":"一般病房白班:小夜:大夜=5:3:2。","detail":{"background":"一般病房平日護理人力配置比例:白班:小夜班:大夜班=5:3:2(B正確)——白班檢查治療最多人力最多、大夜最少。2:3:5(顛倒)、4:4:2、4:3:3皆非標準。故5:3:2(B)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"2:3:5比例顛倒。","B":"正確(本題答案)。白:小夜:大夜=5:3:2。","C":"4:4:2非標準。","D":"4:3:3非標準。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"106111-N2-71":{"quick":"胸腔引流瓶更換成本≈267元。本題答案C。","detail":{"background":"本題官方答案C(267)。每分鐘人力成本=月平均人力成本60000÷月平均工時150h÷60分=60000÷9000分=6.67元/分;更換胸瓶耗時40分鐘,成本=40×6.67≈267元。故267元(C)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"190元不符。","B":"200元不符。","C":"正確(本題答案)。40分×6.67元/分≈267元。","D":"300元不符。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"106111-N2-72":{"quick":"平均護理時數≈2.36小時。本題答案B。","detail":{"background":"本題官方答案B(2.36)。平均護理時數=(上班護理人數×每班工時)÷病人總數。13人×8h=104護理小時;÷44病人=2.36小時/病人。故2.36(B)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"2.26不符。","B":"正確(本題答案)。(13×8)÷44=2.36。","C":"2.46不符。","D":"2.56不符。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"107030-N2-66":{"quick":"病房護理時數≈2.8小時。本題答案C。","detail":{"background":"本題官方答案C(2.8)。占床數=25×90%=22.5床;護理時數=(12人×8h×245天)÷(22.5×365)=23520÷8212.5≈2.86≈2.8小時。故2.8小時(C)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"1.8不符。","B":"2.2不符。","C":"正確(本題答案)。(12×8×245)÷(22.5×365)≈2.8。","D":"3.1不符。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"107110-N2-79":{"quick":"計算每位病人護理時數「未涵括」=病人嚴重度。","detail":{"background":"計算「每天每位病人所得護理時數」的公式涵括:占床率、護理人員數、每日工時、上班天數、床數。選項B「病人嚴重度」未涵括其中(本題答案)——護理時數是「實際投入時數÷病人數」的平均值,計算本身不納入嚴重度(嚴重度用於病人分類預測『所需』時數)。故B。","options":{"A":"占床率涵括其中。","B":"正確(本題答案)。病人嚴重度未涵括於護理時數計算。","C":"護理人員數涵括其中。","D":"工作時數涵括其中。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"108020-N2-68":{"quick":"病人分類制度「不適當」=為方便使用不需考量信效度。","detail":{"background":"病人分類制度實施原則:B應規劃稽核機制確保資料正確、C分類系統不可影響臨床照護時數、D應有多功能發展。選項A「為方便使用,不需要考量信效度的問題」不適當(本題答案)——病人分類系統「必須具備信度與效度」才能正確預測護理需求,不可忽略。故A。","options":{"A":"正確(本題答案)。分類系統須考量信效度。","B":"應規劃稽核機制(適當)。","C":"不可影響臨床照護時數(適當)。","D":"應多功能發展(適當)。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"108020-N2-73":{"quick":"衡量護理生產力「較不需」=疾病診斷。","detail":{"background":"衡量護理生產力需考量:A病人疾病嚴重度、B護理時數、C病房占床率。選項D「疾病診斷」較不需列入(本題答案)——護理生產力與「護理工作量(時數、嚴重度、占床)」相關,「疾病診斷」本身非直接衡量護理生產力的因素(嚴重度才是)。故D。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"疾病嚴重度需考量。","B":"護理時數需考量。","C":"占床率需考量。","D":"正確(本題答案)。疾病診斷較不需列入護理生產力。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"108110-N2-66":{"quick":"所需護理人力=27人。本題答案C。","detail":{"background":"本題官方答案C(27)。所需護理人力=總護理時數÷每人每日工時×休假係數=150÷8×1.4=18.75×1.4=26.25≈27人。故27人(C)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"20人不足。","B":"23人不足。","C":"正確(本題答案)。(150÷8)×1.4≈27人。","D":"29人過多。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"109110-N2-64":{"quick":"提供高於市場薪資、聚餐促進情誼=Maslow安全需求?本題答案B。","detail":{"background":"本題官方答案B(安全)。護理長以「高於市場行情的薪資」吸引護理師——薪資保障屬Maslow「安全需求(及生理)」。題目問「高於市場薪資」對應的層次=安全需求(B,薪資保障、經濟安全)。聚餐促進情誼則屬愛與歸屬。本題以「薪資」對應安全需求為答案。故安全(B)。","options":{"A":"生理需求是基本生存。","B":"正確(本題答案)。高薪保障=安全需求。","C":"愛與所屬對應聚餐情誼。","D":"自尊是受尊重。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"109110-N2-76":{"quick":"Donabedian「結構」層面=護理師資格素養(1)。本題答案... 重判。","detail":{"background":"本題官方答案需依選項;Donabedian「結構面」=人力資格(護理師的資格與素養)、設備、制度。選項1「護理師的資格與素養」屬結構面。住院病人泌尿道感染率屬「結果面」。核心:結構=投入資源(人力資格、設備、制度);過程=照護流程;結果=病人結果(感染率、滿意度)。作答以官方為準。","options":{"A":"12含結果面項目須斟酌。","B":"23不符。","C":"13依官方。","D":"34不符。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"110030-N2-64":{"quick":"維持護理時數4h時,流動率反映的變數=占床率?本題答案A。","detail":{"background":"本題官方答案A。護理時數=(人員數×工時×上班天數)÷(占床數×365);占床數=床數×占床率。題幹給床數、上班天數、工時、人員數、離職數,要維持每病人每天護理時數4h,需考量的變數是「占床率(A,影響占床病人數=分母)」。故占床率(A)。","options":{"A":"正確(本題答案)。占床率影響占床病人數(分母)。","B":"工時已給定。","C":"上班天數已給定。","D":"嚴重度非此公式變數。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"110110-N2-65":{"quick":"所需護理人員數=52人。本題答案C。","detail":{"background":"本題官方答案C(52)。占床數=40×80%=32床;每日總護理時數=32×8h=256h;每日需人力=256÷8=32位/日;全年無休、休假140天/人,休假係數=365÷(365-140)=365÷225≈1.62;總配置=32×1.62≈52人。故52人(C)。","options":{"A":"35人不足。","B":"43人不足。","C":"正確(本題答案)。32×休假係數1.62≈52人。","D":"64人過多。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"110110-N2-72":{"quick":"護病比≈12。本題答案B。","detail":{"background":"本題官方答案B(12)。全日平均護病比=占床病人數÷全日護理人員數(或以白班計)。40床×90%=36占床病人;依配置護理人力換算全日平均護病比約1:12(每位護理師照顧約12位病人)。故12(B)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"11不符。","B":"正確(本題答案)。占床病人÷護理人力≈12。","C":"13不符。","D":"14不符。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"111030-N2-65":{"quick":"每位病人每天護理時數≈2.56小時。本題答案D。","detail":{"background":"本題官方答案D(2.56)。實際上班天數=365-14(年休)-10(公假)-122(國定例假)=219;占床數=50×75%=37.5;護理時數=(20人×8h×219天)÷(37.5×365)=35040÷13687.5≈2.56小時。故2.56(D)。","options":{"A":"1.96不符。","B":"2.04不符。","C":"2.35不符。","D":"正確(本題答案)。(20×8×219)÷(37.5×365)≈2.56。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"112030-N2-63":{"quick":"人力配置=白班50%、小夜30%、大夜20%。","detail":{"background":"一般病房工作時段人力配置最適宜:白班50%、小夜班30%、大夜班20%(C正確)——白班檢查治療最多人力最多、大夜最少。白60小夜20大夜20、白40小夜30大夜30、白50小夜40大夜10皆非標準。故C。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"白60小夜20大夜20非標準。","B":"白40小夜30大夜30非標準。","C":"正確(本題答案)。白50小夜30大夜20。","D":"白50小夜40大夜10非標準。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"113030-N2-45":{"quick":"每位病人每天護理時數≈2.45小時。本題答案C。","detail":{"background":"本題官方答案C(2.45)。占床數=40×70%=28床;護理時數=(12人×8h×261天)÷(28×365)=25056÷10220≈2.45小時。故2.45(C)。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"3.86不符。","B":"2.54不符。","C":"正確(本題答案)。(12×8×261)÷(28×365)≈2.45。","D":"1.96不符。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"113100-N2-43":{"quick":"所需護理人力=30人。本題答案D。","detail":{"background":"本題官方答案D(30)。每位病人每日總護理時數=直接2.0+間接0.5+相關0.5=3.0h;占床數50(滿床計);每日總護理時數=50×3=150h;每日需人力=150÷8=18.75;乘休假係數1.6=18.75×1.6=30人。故30人(D)。","options":{"A":"27人不足。","B":"28人不足。","C":"29人不足。","D":"正確(本題答案)。(50×3÷8)×1.6=30人。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"114100-N2-42":{"quick":"醫療成本控制「最不適當」=增加衛材庫存量。","detail":{"background":"單位醫療成本控制方法:A掌握每月護病比、B掌握耗衛材領用使用數量、C有效調動病房支援人力。選項D「掌握使用便利性,增加衛材庫存量」最不適當(本題答案)——增加衛材庫存會「積壓資金、過期浪費」,應「降低庫存(零庫存/即時補貨)」。故D。護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);占床數=床數×占床率;實際上班天數=365-國定例假-年休-公假等;休假係數=365÷實際上班天數,所需人力=每日總護理時數÷工時×休假係數。直接護理時數(直接照護如灌腸給藥)+間接(書寫準備)+相關+個人時間=總護理時數。病人分類系統預測護理需求/人力(非收費/預後)。三班比例白5小夜3大夜2。","options":{"A":"掌握護病比是適當控制。","B":"掌握衛材使用是適當控制。","C":"調動支援人力是適當控制。","D":"最不適當(本題答案)。增加衛材庫存會積壓浪費。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"114170-N2-42":{"quick":"病人分類系統(PCS)「最不適當」=可作為病人預後指標。","detail":{"background":"病人分類系統(PCS)的功能/優點:A可滿足病人照護需求(預測護理需求)、B可評估護理工作績效、D可提供護理收費標準。選項C「可作為病人預後指標」最不適當(本題答案)——PCS是預測「護理工作量/人力」,非預測「病人預後(疾病結果)」。故C。","options":{"A":"可滿足病人照護需求是PCS功能。","B":"可評估護理績效是PCS功能。","C":"最不適當(本題答案)。PCS非病人預後指標。","D":"可提供護理收費標準是PCS功能。"},"sources":["新文京《護理行政》護理人力配置","華杏《護理行政學》護理時數與護病比"]}},"101030-N2-70":{"quick":"排班是領導者的「合法/法統」職權?本題答案C(月暈效應)。","detail":{"background":"本題官方答案C(月暈效應)。題幹「I.V.技術好但記錄交班偶遺漏,年終考績仍給甲等」——以單一優點(IV技術)概括整體評價=月暈效應(halo effect)。觸角效應(以單一缺點概括變差)、中央趨勢、情緒化效應皆非。故月暈效應(C)。排班類型:集權式(護理部統一排)、分權式(單位護理長排,配合單位特性)、自我排班法(員工依共同原則自行協調,提升自主降換班)、循環/週期式(固定週期循環)。排班應優先考量病人需求;依勞基法7休1(不可連上11天)、輪班間隔11小時、懷孕不排夜班;緊急大量傷患由最高主管集權統一調度。","options":{"A":"觸角效應是以缺點概括變差。","B":"中央趨勢是都給中間分。","C":"正確(本題答案)。以IV技術好概括整體=月暈效應。","D":"情緒化效應非標準。"},"sources":["新文京《護理行政》排班管理","華杏《護理行政學》排班類型"]}},"101110-N2-59":{"quick":"護理長排班應優先考慮=病人的護理需求。","detail":{"background":"護理長排班應「優先考慮病人的護理需求」(B正確)——排班的根本目的是確保病人獲得安全充足的照護。護理人員要求、醫師人數、護生人數皆非排班的首要考量。故病人的護理需求(B)。排班類型:集權式(護理部統一排)、分權式(單位護理長排,配合單位特性)、自我排班法(員工依共同原則自行協調,提升自主降換班)、循環/週期式(固定週期循環)。排班應優先考量病人需求;依勞基法7休1(不可連上11天)、輪班間隔11小時、懷孕不排夜班;緊急大量傷患由最高主管集權統一調度。","options":{"A":"護理人員要求非首要。","B":"正確(本題答案)。排班優先考慮病人護理需求。","C":"醫師人數非排班考量。","D":"護生人數非首要。"},"sources":["新文京《護理行政》排班管理","華杏《護理行政學》排班類型"]}},"102030-N2-70":{"quick":"授權「較不適宜」=裁撤績效不彰的護理人員。","detail":{"background":"授權原則:可授權例行性、部屬能勝任的事務(排班、處理抱怨、規劃旅遊)。選項B「裁撤(解僱)績效不彰的護理人員」較不適宜授權(本題答案)——人員裁撤屬「重大人事決策」,是主管核心職權,不宜授權。故B。排班類型:集權式(護理部統一排)、分權式(單位護理長排,配合單位特性)、自我排班法(員工依共同原則自行協調,提升自主降換班)、循環/週期式(固定週期循環)。排班應優先考量病人需求;依勞基法7休1(不可連上11天)、輪班間隔11小時、懷孕不排夜班;緊急大量傷患由最高主管集權統一調度。","options":{"A":"排班可授權。","B":"正確(本題答案)。裁撤人員是核心職權,不宜授權。","C":"處理抱怨可授權。","D":"規劃旅遊可授權。"},"sources":["新文京《護理行政》排班管理","華杏《護理行政學》排班類型"]}},"104100-N2-66":{"quick":"排班「錯誤」=連續上11天白班(違反勞基法7休1)。","detail":{"background":"依勞動基準法排班:A特休應依規定排休(對)、C懷孕6個月不排夜班(對,母性保護)、D排班間隔合理(對)。選項B「因連休所以連續上11天白班」錯誤(本題答案)——勞基法規定「每7日至少1日例假(7休1)」,連續上11天違反規定。故B。排班類型:集權式(護理部統一排)、分權式(單位護理長排,配合單位特性)、自我排班法(員工依共同原則自行協調,提升自主降換班)、循環/週期式(固定週期循環)。排班應優先考量病人需求;依勞基法7休1(不可連上11天)、輪班間隔11小時、懷孕不排夜班;緊急大量傷患由最高主管集權統一調度。","options":{"A":"特休依規定排休(對)。","B":"正確(本題答案)。連續11天違反7休1。","C":"懷孕6月不排夜班(對)。","D":"排班間隔合理(對)。"},"sources":["新文京《護理行政》排班管理","華杏《護理行政學》排班類型"]}},"106111-N2-64":{"quick":"排班照護病人數「較不重要」=資訊系統種類。","detail":{"background":"護理長決定一位護理師照護病人數應考量:A病人複雜性(嚴重度)、B護理師能力、D護理師年資。選項C「資訊系統之種類」較不重要(本題答案)——分配照護人數主要看「病人需求與護理師能力」,資訊系統種類與分配病人數無直接關係。故C。排班類型:集權式(護理部統一排)、分權式(單位護理長排,配合單位特性)、自我排班法(員工依共同原則自行協調,提升自主降換班)、循環/週期式(固定週期循環)。排班應優先考量病人需求;依勞基法7休1(不可連上11天)、輪班間隔11小時、懷孕不排夜班;緊急大量傷患由最高主管集權統一調度。","options":{"A":"病人複雜性需考量。","B":"護理師能力需考量。","C":"正確(本題答案)。資訊系統種類較不重要。","D":"護理師年資需考量。"},"sources":["新文京《護理行政》排班管理","華杏《護理行政學》排班類型"]}},"106111-N2-70":{"quick":"護理師工作負荷過重:向上級爭取人力。","detail":{"background":"護理師抱怨延遲下班、護理長分析發現工作負荷過重,適當措施是「向上級爭取人力(D)」——從根本解決人力不足。A責成小組長(推卸)、B告知共體時艱(忽視問題)、C硬性規定每人不超6人(未解決人力)皆非根本。故向上級爭取人力(D)。排班類型:集權式(護理部統一排)、分權式(單位護理長排,配合單位特性)、自我排班法(員工依共同原則自行協調,提升自主降換班)、循環/週期式(固定週期循環)。排班應優先考量病人需求;依勞基法7休1(不可連上11天)、輪班間隔11小時、懷孕不排夜班;緊急大量傷患由最高主管集權統一調度。","options":{"A":"責成小組長是推卸。","B":"告知共體時艱忽視問題。","C":"硬性規定未解決人力不足。","D":"正確(本題答案)。向上級爭取人力根本解決。"},"sources":["新文京《護理行政》排班管理","華杏《護理行政學》排班類型"]}},"107110-N2-69":{"quick":"與排班「較無直接關係」=護理人員法。","detail":{"background":"護理師排班須符合的法令:A機構內部法規、B勞動基準法(工時休假)、D性別平等法(產假育嬰夜班限制)。選項C「護理人員法」與排班「較無直接關係」(本題答案)——護理人員法規範執業資格與業務,非規範工時排班。故護理人員法(C)。排班類型:集權式(護理部統一排)、分權式(單位護理長排,配合單位特性)、自我排班法(員工依共同原則自行協調,提升自主降換班)、循環/週期式(固定週期循環)。排班應優先考量病人需求;依勞基法7休1(不可連上11天)、輪班間隔11小時、懷孕不排夜班;緊急大量傷患由最高主管集權統一調度。","options":{"A":"機構內部法規與排班相關。","B":"勞基法規範工時休假。","C":"正確(本題答案)。護理人員法與排班較無直接關係。","D":"性平法規範產假夜班。"},"sources":["新文京《護理行政》排班管理","華杏《護理行政學》排班類型"]}},"109030-N2-69":{"quick":"大量傷患緊急:由單位最高主管統一排班(集權快速)。","detail":{"background":"突發大地震大量傷患湧入,最能快速靈活運用人力支援的排班=C「不考量個人需求,直接由單位最高主管統一排班(集權式、快速調度)」(C正確)。A同仁自行決定(慢)、B護理長統籌(較慢)、D電腦系統設定(僵化)皆不如緊急時集權統一調度。故C。排班類型:集權式(護理部統一排)、分權式(單位護理長排,配合單位特性)、自我排班法(員工依共同原則自行協調,提升自主降換班)、循環/週期式(固定週期循環)。排班應優先考量病人需求;依勞基法7休1(不可連上11天)、輪班間隔11小時、懷孕不排夜班;緊急大量傷患由最高主管集權統一調度。","options":{"A":"自行決定排班緩不濟急。","B":"護理長統籌較慢。","C":"正確(本題答案)。緊急由最高主管集權統一排班。","D":"電腦設定僵化不靈活。"},"sources":["新文京《護理行政》排班管理","華杏《護理行政學》排班類型"]}},"110030-N2-63":{"quick":"排班正確=應優先考量病人的需求。","detail":{"background":"排班敘述:D「應優先考量病人的需求(排班根本目的是確保病人照護)」正確。A「單位小組長排班稱集權式」錯(由單位排班是『分權式』,集權是護理部統一排);B「排班表是很好的獎懲工具」錯(排班不應作獎懲工具);C「排班後不得更換」錯(排班應保有彈性、可依需要調整)。故D。","options":{"A":"單位排班是分權式,非集權。","B":"排班不應作獎懲工具。","C":"排班應有彈性可調整。","D":"正確(本題答案)。排班優先考量病人需求。"},"sources":["新文京《護理行政》排班管理","華杏《護理行政學》排班類型"]}},"110110-N2-63":{"quick":"增自主性降離職換班=自我排班法。","detail":{"background":"為「增加護理人員自主性、降低離職率與換班機率」,較適當的排班方式=自我排班法(self-scheduling)(C正確)——讓護理人員依共同原則自行協調排班,提升參與感與自主性、減少換班。集權式、分權式、週期式皆不如自我排班提升自主。故自我排班法(C)。","options":{"A":"集權式由護理部統一排,自主低。","B":"分權式由護理長排,自主有限。","C":"正確(本題答案)。自我排班法提升自主降離職換班。","D":"週期式固定循環,自主低。"},"sources":["新文京《護理行政》排班管理","華杏《護理行政學》排班類型"]}},"112180-N2-41":{"quick":"排班正確=分權式排班由單位護理長排,配合單位特性有效安排。","detail":{"background":"排班類型:B「分權式排班由單位護理長排班,配合單位特性進行有效人力安排」正確。A「集權式由護理部一級主管排,較容易注重個別需求」錯(集權反而較難顧及個別需求);C「自我排班法依主管原則排」錯(自我排班是員工自行協調);D「循環式排班依主管及護理師需要排」錯(循環式是固定週期循環,非依個別需要)。故B。","options":{"A":"集權式較難顧及個別需求。","B":"正確(本題答案)。分權式由護理長配合單位特性排。","C":"自我排班是員工自行協調,非依主管原則。","D":"循環式是固定週期,非依需要。"},"sources":["新文京《護理行政》排班管理","華杏《護理行政學》排班類型"]}},"114100-N2-50":{"quick":"排班「最不適當」=自我排班法遇休假重複容易協調。","detail":{"background":"排班類型:A分權式較能依單位人員意願安排(對)、B分權式人力短缺時較無法靈活運用(對)、D自我排班法提高自主與責任、減少換班(對)。選項C「自我排班法當遇到休假重複時,『容易』進行工作協調」最不適當(本題答案)——自我排班遇休假重複時「協調『困難』(大家都想休同一天)」,非容易。故C。","options":{"A":"分權式較能依意願安排(對)。","B":"分權式人力短缺較難靈活(對)。","C":"最不適當(本題答案)。自我排班遇休假重複協調困難,非容易。","D":"自我排班提高自主減換班(對)。"},"sources":["新文京《護理行政》排班管理","華杏《護理行政學》排班類型"]}},"115030-N2-38":{"quick":"科學管理理論=推行護理工作標準化,參照時間動作研究。","detail":{"background":"符合「科學管理理論(泰勒)」概念者:C「推行護理工作標準化,參照時間與動作的研究結果,進行業務(改善)」正確(科學管理=標準化、時間動作研究、效率)。A「層級分明、權責對等」是官僚理論;B「管理業務電腦化、數字會說話」偏管理科學/資訊;D「依人力彈性調整模式」是權變理論。故C。","options":{"A":"層級分明權責對等是官僚理論。","B":"數字會說話偏管理科學。","C":"正確(本題答案)。標準化+時間動作研究=科學管理。","D":"彈性調整是權變理論。"},"sources":["新文京《護理行政》排班管理","華杏《護理行政學》排班類型"]}},"105030-N2-66":{"quick":"成組vs全責「錯誤」=全責護理人員對工作較專精較能迅速完成。","detail":{"background":"照護模式:成組護理(team,資深資淺護生護佐共同照顧一組病人,團隊導向);全責/主護護理(primary,一位護理師對病人負全責,整體個別連續性,人事成本高、品質好)。選項C「執行全責護理,人員對自己工作較專精、較能迅速完成」錯誤(本題答案)——「對單一技術專精、迅速完成」是『功能性護理』的特性,非全責護理。故C。","options":{"A":"成組護理由團隊共照(對)。","B":"全責人事成本高品質好(對)。","C":"正確(本題答案)。對技術專精迅速是功能性護理,非全責。","D":"成組以團隊為導向(對)。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"106030-N2-73":{"quick":"固定一位護理師負責整體連續個別照護=全責護理。","detail":{"background":"全責/主護護理(primary nursing):每位病人「住院到出院由一位固定護理師負責提供照護計畫」,達整體性、連續性及個別性(C正確)。成組護理(團隊共照)、個案護理(一對一專人但限當班)、功能性護理(按技術分工)皆非「一位固定負責全程」。故全責護理(C)。","options":{"A":"成組護理是團隊共照。","B":"個案護理是當班一對一。","C":"正確(本題答案)。固定一人負責全程整體連續=全責護理。","D":"功能性護理是按技術分工。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"109030-N2-66":{"quick":"功能性護理「不」是優點=個別性護理。","detail":{"background":"功能性護理(functional nursing,按技術/任務分工,如專人量血壓、專人給藥)優點:B分工清楚、C節省人力、D省錢(效率高)。選項A「個別性護理」不是功能性護理的優點(本題答案)——功能性護理「以工作為中心、缺乏整體個別性」,個別性護理是『全責護理』的優點。故A。","options":{"A":"正確(本題答案)。個別性護理是全責護理優點,非功能性。","B":"功能性護理分工清楚(優點)。","C":"功能性護理節省人力(優點)。","D":"功能性護理省錢(優點)。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"109110-N2-15":{"quick":"主責護理「不」是特性=提供功能性護理。","detail":{"background":"主責/全責護理(primary nursing)特性:A提供個別性護理、C提供連續性護理、D提供整體性護理。選項B「提供功能性護理」不是主責護理的特性(本題答案)——功能性護理(按技術分工)與主責護理(一人負全責)是不同模式。故B。護理照護模式:功能性護理(按技術/任務分工、效率高省人力、缺個別性,適新人多/人力不足)、成組護理(資深帶資淺團隊照一組病人,適資深少資淺多)、全責/主護護理(primary,一人對病人負全責,整體連續個別、高自主、人事成本高品質好,適資深充足/隔離病房)、個案護理(當班一對一)、技術混合(護理師+護佐搭配)。","options":{"A":"主責護理提供個別性(特性)。","B":"正確(本題答案)。功能性護理非主責護理特性。","C":"主責護理提供連續性(特性)。","D":"主責護理提供整體性(特性)。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"110110-N2-73":{"quick":"技術混合照護=護理師和護理佐理員合作提供照護。","detail":{"background":"技術混合照護模式(skill-mixed):C「護理師和護理佐理員(護佐)合作提供照護(不同技術層級人員搭配)」最適當。A醫護合作是醫療團隊;B不同進階護理師搭配偏成組;D一人提供不同技術偏功能性。故技術混合=護理師+護佐合作(C)。護理照護模式:功能性護理(按技術/任務分工、效率高省人力、缺個別性,適新人多/人力不足)、成組護理(資深帶資淺團隊照一組病人,適資深少資淺多)、全責/主護護理(primary,一人對病人負全責,整體連續個別、高自主、人事成本高品質好,適資深充足/隔離病房)、個案護理(當班一對一)、技術混合(護理師+護佐搭配)。","options":{"A":"醫護合作是醫療團隊。","B":"不同進階護理師搭配偏成組。","C":"正確(本題答案)。護理師+護佐合作=技術混合照護。","D":"一人提供不同技術偏功能性。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"111110-N2-71":{"quick":"護佐與護理師共同照護減負荷=技術混合模式。","detail":{"background":"由「輔助人員(護佐)與護理師共同執行病人照護,減少護理師工作負荷」=技術混合(skill-mixed)模式(C正確,不同技術層級人員混合搭配)。全責、主護、成組護理皆非「護理師+護佐混合」。故技術混合模式(C)。護理照護模式:功能性護理(按技術/任務分工、效率高省人力、缺個別性,適新人多/人力不足)、成組護理(資深帶資淺團隊照一組病人,適資深少資淺多)、全責/主護護理(primary,一人對病人負全責,整體連續個別、高自主、人事成本高品質好,適資深充足/隔離病房)、個案護理(當班一對一)、技術混合(護理師+護佐搭配)。","options":{"A":"全責護理是一人負全責。","B":"主護護理同全責。","C":"正確(本題答案)。護佐+護理師共照=技術混合模式。","D":"成組護理是護理人員團隊共照。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"112110-N2-71":{"quick":"全責護理=責任護理師對病人負有照護全責。","detail":{"background":"全責護理模式(primary nursing):B「責任(主責)護理師對病人負有照護全責(從入院到出院整體連續負責)」正確。A「當班護理師設計照護計畫」錯(是『主責』護理師非當班);C「當班小組長決定計畫」錯(成組護理);D「無法持續提供出院後服務」錯(全責護理重連續性、可延續)。故B。","options":{"A":"是主責護理師設計,非當班。","B":"正確(本題答案)。責任護理師對病人負照護全責。","C":"小組長決定是成組護理。","D":"全責護理重連續性。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"112110-N2-72":{"quick":"人力招募不足但占床高:採功能性護理。","detail":{"background":"當「護理人力招募不足、占床率卻居高不下」(人力短缺、病人多),護理主管可能採「功能性護理(D)」——按技術分工、效率高、節省人力,適合人力不足時。全責、個案護理人力需求高,綜合性護理皆不如功能性省人力。故功能性護理(D)。護理照護模式:功能性護理(按技術/任務分工、效率高省人力、缺個別性,適新人多/人力不足)、成組護理(資深帶資淺團隊照一組病人,適資深少資淺多)、全責/主護護理(primary,一人對病人負全責,整體連續個別、高自主、人事成本高品質好,適資深充足/隔離病房)、個案護理(當班一對一)、技術混合(護理師+護佐搭配)。","options":{"A":"全責護理人力需求高。","B":"個案護理一對一人力需求高。","C":"綜合性護理非最省人力。","D":"正確(本題答案)。人力不足占床高採功能性護理。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"112180-N2-39":{"quick":"資深無新人、人力符評鑑:採全責護理。","detail":{"background":"護理師「臨床經驗皆3年以上、無新進人員、人力配置符合評鑑護病比」(人力充足且資深)→最適合「全責/主護護理(B)」——資深護理師能對病人負全責、提供整體連續個別照護。成組(需搭配資淺)、功能性(人力不足時)、技術混合(需護佐)皆非「資深充足」首選。故全責護理(B)。","options":{"A":"成組護理需搭配資淺。","B":"正確(本題答案)。資深充足採全責護理。","C":"功能性護理用於人力不足。","D":"技術混合需護佐。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"112180-N2-43":{"quick":"護佐協助護理師日常照護=技術混合照護模式。","detail":{"background":"由「受過訓練的護佐或照顧服務員協助護理師執行病人日常生活與照護」=技術混合照護模式(skill-mixed)(A正確,不同技術層級混合)。功能性、全責、成組護理皆非「護佐協助」。故技術混合照護模式(A)。護理照護模式:功能性護理(按技術/任務分工、效率高省人力、缺個別性,適新人多/人力不足)、成組護理(資深帶資淺團隊照一組病人,適資深少資淺多)、全責/主護護理(primary,一人對病人負全責,整體連續個別、高自主、人事成本高品質好,適資深充足/隔離病房)、個案護理(當班一對一)、技術混合(護理師+護佐搭配)。","options":{"A":"正確(本題答案)。護佐協助護理師=技術混合照護模式。","B":"功能性護理是按技術分工。","C":"全責護理是一人負全責。","D":"成組護理是護理團隊共照。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"113030-N2-1":{"quick":"急診支援固定地點固定分工=功能性護理。","detail":{"background":"大量病人時,護理人員「到固定地點拿取不同設備、固定分工協同(按任務分工)」=功能性護理(functional nursing)(A正確,按工作/任務分工、效率高)。成組(團隊照一組病人)、全責(一人負全責)、綜合性護理皆非「固定分工按任務」。故功能性護理(A)。","options":{"A":"正確(本題答案)。固定地點固定分工=功能性護理。","B":"成組護理是團隊照一組。","C":"全責護理是一人負全責。","D":"綜合性護理非固定分工。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"113030-N2-44":{"quick":"連續協調整體個別、增責任感自主=全責護理。","detail":{"background":"「提供連續性、協調性、整體性及個別性照護,增加護理人員責任感及自主性」=全責護理模式(primary nursing care)(C正確)。技術混合、功能性(分工低自主)、成組護理皆不如全責提供整體連續個別且高自主。故全責護理(C)。護理照護模式:功能性護理(按技術/任務分工、效率高省人力、缺個別性,適新人多/人力不足)、成組護理(資深帶資淺團隊照一組病人,適資深少資淺多)、全責/主護護理(primary,一人對病人負全責,整體連續個別、高自主、人事成本高品質好,適資深充足/隔離病房)、個案護理(當班一對一)、技術混合(護理師+護佐搭配)。","options":{"A":"技術混合是不同層級搭配。","B":"功能性護理分工低自主。","C":"正確(本題答案)。連續整體個別+高自主=全責護理。","D":"成組護理是團隊共照。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"114030-N2-4":{"quick":"專人負責所有病人傷口換藥=功能性護理。","detail":{"background":"病房「設護理師專門負責所有病人的傷口換藥工作(按單一技術/任務分工)」=功能性護理(functional nursing)(C正確,按工作分配、一人專責一項技術)。全責(一人負病人全責)、成組(團隊)、個案(一對一全程)皆非「專責單一技術」。故功能性護理(C)。","options":{"A":"全責護理是一人負病人全責。","B":"成組護理是團隊共照。","C":"正確(本題答案)。專責單一技術=功能性護理。","D":"個案護理是一對一全程。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"114030-N2-44":{"quick":"以技術需求為工作分配原則=功能護理。","detail":{"background":"病房「以病人照護技術需求為工作分配原則(按技術分工,如專人量生命徵象、專人給藥)」=功能護理(functional nursing)(B正確)。成組、綜合、個案護理皆非「按技術分配」。故功能護理(B)。護理照護模式:功能性護理(按技術/任務分工、效率高省人力、缺個別性,適新人多/人力不足)、成組護理(資深帶資淺團隊照一組病人,適資深少資淺多)、全責/主護護理(primary,一人對病人負全責,整體連續個別、高自主、人事成本高品質好,適資深充足/隔離病房)、個案護理(當班一對一)、技術混合(護理師+護佐搭配)。","options":{"A":"成組護理是團隊照一組病人。","B":"正確(本題答案)。按技術需求分配=功能護理。","C":"綜合護理非按技術分。","D":"個案護理是一對一全程。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"114100-N2-38":{"quick":"新人多、以技術需求為標準分工=功能護理。","detail":{"background":"單位「新進護理師多、以工作為中心與技術需求為標準、每人只負責一部分技術/任務」=功能護理(functional nursing)(A正確,適合新人多、按技術分工易上手、效率高)。成組、全責(需資深)、技術混合皆非「新人按技術分工」首選。故功能護理(A)。","options":{"A":"正確(本題答案)。新人多按技術分工=功能護理。","B":"成組護理需團隊搭配。","C":"全責護理需資深。","D":"技術混合需護佐。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"114170-N2-3":{"quick":"傳染病大流行隔離病房=全責護理。","detail":{"background":"傳染性疾病大流行、隔離病房的照護模式最適當=全責護理(A正確)——一位護理師對隔離病人負全責、減少進出隔離區的人員流動(降低交叉感染、節省防護裝備)。成組、功能性、綜合性護理會增加人員進出,不利感控。故全責護理(A)。護理照護模式:功能性護理(按技術/任務分工、效率高省人力、缺個別性,適新人多/人力不足)、成組護理(資深帶資淺團隊照一組病人,適資深少資淺多)、全責/主護護理(primary,一人對病人負全責,整體連續個別、高自主、人事成本高品質好,適資深充足/隔離病房)、個案護理(當班一對一)、技術混合(護理師+護佐搭配)。","options":{"A":"正確(本題答案)。隔離病房採全責護理減人員進出。","B":"成組護理人員進出多。","C":"功能性護理人員進出多。","D":"綜合性護理非首選。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"114170-N2-38":{"quick":"資深僅3人其餘1年以下=成組護理。","detail":{"background":"病房「臨床經驗3年以上僅3人、其餘皆1年以下(資深少、資淺多)」最適合「成組護理模式(B)」——由資深護理師帶領資淺、護生、護佐組成團隊共同照護一組病人(以資深者領導彌補資淺者經驗不足)。個案、全責(需資深)、技術混合皆非「資深少資淺多」首選。故成組護理(B)。","options":{"A":"個案護理是一對一全程。","B":"正確(本題答案)。資深少資淺多採成組護理(資深帶領)。","C":"全責護理需資深充足。","D":"技術混合需護佐。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"114170-N2-41":{"quick":"護理人力彈性策略=數量彈性(調整人力數量/工時)。","detail":{"background":"護理人力彈性運用:A「數量彈性(numerical flexibility):依工作量調整人力數量/工時(如兼職、工作分享、彈性工時)」最適當。B職能/任務彈性是一人多能;C時間彈性是調整工時;D「領導彈性」非標準人力彈性策略。本題以「數量彈性=調整人力數量」為答案A。故A。","options":{"A":"正確(本題答案)。數量彈性=依工作量調整人力數量/工時。","B":"職能彈性是一人多能。","C":"時間彈性是調整工時。","D":"領導彈性非標準策略。"},"sources":["新文京《護理行政》護理照護模式","華杏《護理行政學》成組全責功能性護理"]}},"101030-N2-62":{"quick":"N與N1「不」屬其專業能力=危機處理。","detail":{"background":"臨床專業能力進階制度:N(新進)、N1(一般照護:病人衛教、靜脈點滴、身體評估等基本能力)、N2(重症照護)、N3(教學)、N4(行政研究)。選項D「危機處理」不屬N、N1的專業能力(本題答案)——危機處理屬較高階(N3/N4管理)能力。故D。","options":{"A":"病人衛教屬N/N1能力。","B":"靜脈點滴屬N/N1能力。","C":"身體評估屬N/N1能力。","D":"正確(本題答案)。危機處理屬高階,非N/N1。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"101030-N2-72":{"quick":"N2接受急重症加護訓練=勝任(competent)階段。","detail":{"background":"Benner技能發展五階段:生手(novice)→進階學習者(advanced beginner)→勝任(competent,約2-3年、能訂計畫但缺全面性)→精通(proficient)→專家(expert)。N2護理師接受急重症加護訓練、能勝任重症照護=勝任(competent)階段(B正確)。故勝任(B)。","options":{"A":"精通是更高階。","B":"正確(本題答案)。N2勝任重症=勝任(competent)階段。","C":"專家是最高階。","D":"進階學習者是N/N1階段。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"101110-N2-61":{"quick":"進階制度正確=晉升N4條件之一是能完成護理專案或研究報告。","detail":{"background":"臨床專業能力進階制度:D「晉升N4條件之一是能完成護理專案或研究報告(N4=行政研究能力)」正確。A「晉升N1能照護重症」錯(重症是N2);B「晉升N2能執行護理品管」錯(品管是N3);C「晉升N3能獨立進行護理研究」錯(獨立研究是N4)。故D。","options":{"A":"重症照護是N2,非N1。","B":"護理品管是N3,非N2。","C":"獨立研究是N4,非N3。","D":"正確(本題答案)。N4能完成護理專案或研究報告。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"101110-N2-64":{"quick":"3年經驗、能訂計畫但缺全面性=勝任者(competent)。","detail":{"background":"Benner技能發展:勝任者(competent,約2-3年)——能訂定並應用護理計畫、分析問題、描述措施步驟,但「仍需加強全面性判斷與各事件的關連性」。題幹描述=勝任者(B正確)。進階學習者(更初階)、精通者(能整體掌握)、專家(直覺）皆非。故勝任者(B)。","options":{"A":"進階學習者更初階。","B":"正確(本題答案)。能訂計畫但缺全面性=勝任者。","C":"精通者能整體掌握。","D":"專家憑直覺整體判斷。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"103030-N2-59":{"quick":"需接受護理行政訓練的層級=N3→N4。","detail":{"background":"臨床專業能力進階制度在職教育重點:N→N1(一般照護)、N1→N2(重症照護)、N2→N3(臨床教學)、N3→N4(護理行政及研究)。「需接受護理行政訓練」=N3→N4(D正確)。故N3→N4(D)。臨床專業能力進階制度:N(新進)、N1(一般照護)、N2(重症照護、案例分析報告)、N3(臨床教學)、N4(行政研究、護理專案)。Benner技能發展五階段:生手→進階學習者→勝任(約2-3年,能訂計畫但缺全面性)→精通→專家。進階學習者無法區分輕重緩急→給清楚指令。","options":{"A":"N→N1是一般照護。","B":"N1→N2是重症照護。","C":"N2→N3是臨床教學。","D":"正確(本題答案)。N3→N4接受護理行政訓練。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"103100-N2-73":{"quick":"訓練教與學能力的層級=N3。","detail":{"background":"臨床專業能力進階制度:N3的訓練重點是「教與學(臨床教學)能力」(C正確)——能擔任臨床教師、指導新進人員與護生。N1(一般照護)、N2(重症)、N4(行政研究)皆非「教與學」。故N3(C)。臨床專業能力進階制度:N(新進)、N1(一般照護)、N2(重症照護、案例分析報告)、N3(臨床教學)、N4(行政研究、護理專案)。Benner技能發展五階段:生手→進階學習者→勝任(約2-3年,能訂計畫但缺全面性)→精通→專家。進階學習者無法區分輕重緩急→給清楚指令。","options":{"A":"N1是一般照護。","B":"N2是重症照護。","C":"正確(本題答案)。N3訓練教與學能力。","D":"N4是行政研究。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"104030-N2-68":{"quick":"N1→N2「不」屬訓練=教與學。","detail":{"background":"N1→N2訓練重點(重症照護方向):A護理與法律、B重症病人的照護、D照護品質。選項C「教與學」不屬N1→N2(本題答案)——「教與學(臨床教學)」是N2→N3的訓練重點。故C。臨床專業能力進階制度:N(新進)、N1(一般照護)、N2(重症照護、案例分析報告)、N3(臨床教學)、N4(行政研究、護理專案)。Benner技能發展五階段:生手→進階學習者→勝任(約2-3年,能訂計畫但缺全面性)→精通→專家。進階學習者無法區分輕重緩急→給清楚指令。","options":{"A":"護理與法律屬N1→N2。","B":"重症照護屬N1→N2。","C":"正確(本題答案)。教與學屬N2→N3,非N1→N2。","D":"照護品質屬N1→N2。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"104030-N2-70":{"quick":"以N薪資聘N2做N4工作=護理師有被剝削懲罰的感覺。","detail":{"background":"Jaques能力(C)-生產力(W)-薪資(P)模式:以「N的薪資(P低)」聘「N2能力(C)」執行「N4工作(W高)」——能力與工作績效遠高於薪資(C、W>>P),護理師會「有被剝削/懲罰的感覺」(A正確)。故被剝削懲罰感(A)。臨床專業能力進階制度:N(新進)、N1(一般照護)、N2(重症照護、案例分析報告)、N3(臨床教學)、N4(行政研究、護理專案)。Benner技能發展五階段:生手→進階學習者→勝任(約2-3年,能訂計畫但缺全面性)→精通→專家。進階學習者無法區分輕重緩急→給清楚指令。","options":{"A":"正確(本題答案)。能力績效高於薪資=被剝削懲罰感。","B":"嚴重心理壓力非此情境主要。","C":"罪惡感是薪資高於能力時。","D":"焦慮不安非此情境。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"105090-N2-68":{"quick":"進階制度正確=晉升N3條件之一是能獨立指導新進人員及護生。","detail":{"background":"臨床專業能力進階制度:B「晉升N3條件之一是能獨立指導新進人員及護生(N3=臨床教學)」正確。A「晉升N4通過個案報告」錯(個案報告偏N2/N3);C「晉升N2能執行護理品管」錯(品管偏N3);D「晉升N1能照護重症」錯(重症是N2)。故B。","options":{"A":"個案報告非N4獨有條件。","B":"正確(本題答案)。N3能獨立指導新進人員及護生。","C":"護理品管偏N3,非N2。","D":"重症照護是N2,非N1。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"106111-N2-60":{"quick":"基層進階制度「不」是目的=改變護理作業方式。","detail":{"background":"基層護理師進階制度目的:A肯定護理師專業能力、B依能力分配工作、C提升病人滿意度(透過提升照護品質)。選項D「改變護理作業方式」不是進階制度的目的(本題答案)——進階制度是「肯定能力、分級培育、提升品質」,非為改變作業方式。故D。臨床專業能力進階制度:N(新進)、N1(一般照護)、N2(重症照護、案例分析報告)、N3(臨床教學)、N4(行政研究、護理專案)。Benner技能發展五階段:生手→進階學習者→勝任(約2-3年,能訂計畫但缺全面性)→精通→專家。進階學習者無法區分輕重緩急→給清楚指令。","options":{"A":"肯定專業能力是目的。","B":"依能力分配工作是目的。","C":"提升病人滿意度是目的。","D":"正確(本題答案)。改變作業方式非進階制度目的。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"106111-N2-63":{"quick":"各階段在職教育正確=N2→N3應接受臨床教學訓練。","detail":{"background":"進階制度在職教育重點:C「N2→N3應接受臨床教學訓練(教與學)」正確。A「N→N1應接受重症護理」錯(N→N1是一般照護,重症是N1→N2);B「N1→N2應接受專科護理」敘述須對應(N1→N2是重症);D「N3→N4應接受基本護理」錯(N3→N4是行政研究)。故C。","options":{"A":"N→N1是一般照護,非重症。","B":"N1→N2是重症照護。","C":"正確(本題答案)。N2→N3接受臨床教學訓練。","D":"N3→N4是行政研究,非基本護理。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"108020-N2-71":{"quick":"進階學習者無法區分輕重緩急:護理長下達清楚指令協助判斷。","detail":{"background":"Benner進階學習者(advanced beginner)「有時無法區分輕重緩急」,護理長最適當協助=C「下達清楚指令,以助小雯判斷輕重緩急」——初階者需明確指導。A給文章閱讀(不夠即時)、B減少個案數(治標)、D情境模擬教學(進階訓練,適更高階)皆非當下最適。故下達清楚指令(C)。","options":{"A":"給文章不夠即時。","B":"減少個案數治標。","C":"正確(本題答案)。下達清楚指令助初階者判斷。","D":"情境模擬適更高階者。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"108110-N2-69":{"quick":"積極參與進階制度、能力最高=N4。","detail":{"background":"臨床專業能力進階制度最高層級為N4(行政研究能力)。小煦「畢業後一直積極參與進階制度」、能力最高=N4(D正確)。N1(一般)、N2(重症)、N3(教學)皆非最高。故N4(D)。臨床專業能力進階制度:N(新進)、N1(一般照護)、N2(重症照護、案例分析報告)、N3(臨床教學)、N4(行政研究、護理專案)。Benner技能發展五階段:生手→進階學習者→勝任(約2-3年,能訂計畫但缺全面性)→精通→專家。進階學習者無法區分輕重緩急→給清楚指令。","options":{"A":"N1是一般照護。","B":"N2是重症照護。","C":"N3是臨床教學。","D":"正確(本題答案)。能力最高=N4。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"109030-N2-63":{"quick":"能參與執行重症病人照護=至少N2。","detail":{"background":"臨床專業能力進階制度:能「參與執行重症病人的照護」至少須具備N2層級(B正確,N2訓練重點為重症病人照護)。N1(一般照護)能力不足以重症;N3(教學)、N4(行政研究)雖更高但「至少」是N2。故N2(B)。臨床專業能力進階制度:N(新進)、N1(一般照護)、N2(重症照護、案例分析報告)、N3(臨床教學)、N4(行政研究、護理專案)。Benner技能發展五階段:生手→進階學習者→勝任(約2-3年,能訂計畫但缺全面性)→精通→專家。進階學習者無法區分輕重緩急→給清楚指令。","options":{"A":"N1是一般照護,不足重症。","B":"正確(本題答案)。重症照護至少N2。","C":"N3是教學(更高但非至少)。","D":"N4是行政研究。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"112030-N2-71":{"quick":"N1晉升N2必須完成=案例分析報告一篇。","detail":{"background":"N1晉升N2(重症照護方向)須完成的項目之一=C「案例分析報告一篇」(C正確,N2須提交個案/案例分析)。A在職訓練12小時、B病人照護100小時、D通過個案報告審查皆非N1→N2的「必須完成項目」(個案報告審查偏N3)。故案例分析報告(C)。","options":{"A":"在職訓練時數非N2必須項。","B":"照護時數非N2必須項。","C":"正確(本題答案)。N1→N2須完成案例分析報告一篇。","D":"個案報告審查偏N3。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"112110-N2-67":{"quick":"進階制度正確=N4臨床工作滿四年以上、訓練重點護理行政及研究。","detail":{"background":"基層護理人員臨床專業能力進階制度:D「N4臨床工作滿四年以上,訓練重點為護理行政及研究」正確。A「N1滿三個月、一般性照護」敘述須對應;B「N2滿二年、重症照護」(N2約滿一年以上,本題以D為正解);C「N3滿三年、重症照護」錯(N3是臨床教學非重症)。故D。","options":{"A":"N1敘述須對應。","B":"N2敘述須對應。","C":"N3是臨床教學,非重症照護。","D":"正確(本題答案)。N4滿四年、訓練護理行政及研究。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"112180-N2-45":{"quick":"Benner五階段=生手、進階學習、勝任、精通、專家。","detail":{"background":"Benner(1984)技能發展五階段順序:生手(novice)→進階學習(advanced beginner)→勝任(competent)→精通(proficient)→專家(expert)(C正確)。選項A少階段、B、D順序顛倒(勝任應在進階學習之後、精通之前)。故C。","options":{"A":"階段不全。","B":"勝任在進階學習前,順序錯。","C":"正確(本題答案)。生手→進階學習→勝任→精通→專家。","D":"精通在進階學習前,順序錯。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"114100-N2-41":{"quick":"2年6個月、能處理突發區分輕重緩急=勝任者(competent)。","detail":{"background":"Benner技能發展:勝任者(competent,約2-3年)——「能掌握工作情境、處理突發事件、區分工作輕重緩急」。到職2年6個月、能處理突發=勝任者(B正確)。精通者(更高、整體直覺)、進階學習者(更初階)、生手皆非。故勝任者(B)。臨床專業能力進階制度:N(新進)、N1(一般照護)、N2(重症照護、案例分析報告)、N3(臨床教學)、N4(行政研究、護理專案)。Benner技能發展五階段:生手→進階學習者→勝任(約2-3年,能訂計畫但缺全面性)→精通→專家。進階學習者無法區分輕重緩急→給清楚指令。","options":{"A":"精通者更高階(整體直覺)。","B":"正確(本題答案)。2.5年能處理突發=勝任者。","C":"進階學習者更初階。","D":"生手是最初階。"},"sources":["新文京《護理行政》臨床能力進階制度","華杏《護理行政學》Benner技能發展"]}},"101030-N2-78":{"quick":"IV技術好但記錄遺漏仍給甲=月暈效應。","detail":{"background":"考核偏誤:月暈效應(halo,以單一優點概括整體變好)、觸角效應(以單一缺點概括變差)、中央趨勢(都給中間)、向日葵(全給高分)。「IV技術特別好,但記錄交班偶有遺漏,年終考績仍給甲等」(以IV技術好概括整體)=月暈效應(C正確)。故月暈效應(C)。","options":{"A":"觸角效應是以缺點概括變差。","B":"中央趨勢是都給中間分。","C":"正確(本題答案)。以單一優點概括=月暈效應。","D":"情緒化效應非標準。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"101110-N2-70":{"quick":"年終考核前與家屬爭執得到較差考績=觸角效應。","detail":{"background":"考核偏誤:觸角效應(Horns effect,以單一缺點/負面印象概括整體變差)。「考核前與病患家屬發生爭執,而得到比實際更差的考績」=觸角效應(C正確)。光圈/月暈(優點概括變好)、向日葵(全高分)、霍桑(受關注改變行為)皆非。故觸角效應(C)。","options":{"A":"光圈效應是優點概括變好。","B":"向日葵效應是全給高分。","C":"正確(本題答案)。以單一缺點概括變差=觸角效應。","D":"霍桑效應是受關注改變行為。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"102030-N2-74":{"quick":"工作說明書可當作管理者「績效考核」的依據。","detail":{"background":"工作說明書(job description,描述職務任務責任條件)除作新人工作指引外,也可作為管理者「績效考核」的依據(B正確)——依工作說明書所列職責考核員工是否達成。人員晉升、排班、加薪非工作說明書的「直接」依據。故績效考核(B)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"人員晉升非工作說明書直接依據。","B":"正確(本題答案)。工作說明書可作績效考核依據。","C":"排班非工作說明書依據。","D":"加薪非直接依據。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"103030-N2-76":{"quick":"全給部屬高分表現自己領導有方=向日葵效應。","detail":{"background":"考核偏誤:向日葵效應(sunflower,主管給所有部屬高分以表現自己領導有方)。題幹「為表現自己領導有方,績效考核均給高分」=向日葵效應(A正確)。光圈(單一優點)、觸角(單一缺點)、霍桑(受關注)皆非。故向日葵效應(A)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"正確(本題答案)。全給高分表現領導=向日葵效應。","B":"光圈效應是單一優點概括。","C":"觸角效應是單一缺點概括。","D":"霍桑效應是受關注改變行為。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"104100-N2-72":{"quick":"績效考核原則「錯誤」=應避免員工參與。","detail":{"background":"績效考核原則:A內容依員工工作職責(對)、C設定明確預期成效(對)、D持正面態度給建設性建議(對)。選項B「績效考核是主管職責,應避免員工參與」錯誤(本題答案)——現代績效考核鼓勵「員工參與(自評、雙向溝通、共同設定目標)」,非避免參與。故B。","options":{"A":"考核依工作職責(對)。","B":"正確(本題答案)。應鼓勵員工參與,非避免。","C":"設定明確預期成效(對)。","D":"正面建設性建議(對)。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"105030-N2-73":{"quick":"月暈效應因應=開放員工互相評值並做考核參考。","detail":{"background":"主管發生月暈效應(以單一印象概括)的因應對策:D「開放員工互相評值(同儕評核/360度),並做為考核參考(多元來源減少單一偏誤)」最適宜。A維持原樣(不改善)、B將員工調職(逃避)、C請員工聚餐(無關)皆非。故開放互相評值(D)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"維持原樣不改善偏誤。","B":"將員工調職是逃避。","C":"請員工聚餐無關考核。","D":"正確(本題答案)。開放互相評值多元減少偏誤。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"105090-N2-80":{"quick":"依標準檢核表權數計分=絕對標準。","detail":{"background":"績效考評標準:絕對標準(以既定的標準/檢核表評定每人是否達標、不與他人比較)、相對標準(與他人比較排序)、客觀標準。「依護理部制定的標準檢核表、依權數分數計分」=絕對標準(A正確,依固定標準評定)。故絕對標準(A)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"正確(本題答案)。依標準檢核表計分=絕對標準。","B":"相對標準是與他人比較。","C":"客觀標準非此分類重點。","D":"建議標準非標準分類。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"106030-N2-79":{"quick":"檢查表法「不適用」=須分辨每個項目達到的程度。","detail":{"background":"檢查表法(checklist,僅勾選有無此行為、不判定程度好壞):適用A考核大量受評者、B針對事實考核、D簡易判斷。選項C「須分辨每個項目達到的『程度』」不適用(本題答案)——檢查表法只勾「有/無」,無法分辨達成程度(分辨程度須用『評核尺度法』)。故C。","options":{"A":"適用大量受評者。","B":"適用針對事實考核。","C":"正確(本題答案)。檢查表法無法分辨達成程度。","D":"適用簡易判斷。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"106111-N2-74":{"quick":"明確記錄員工表現事實=重要事件法。","detail":{"background":"績效考核方法:重要事件法(critical incident,記錄員工關鍵的好/壞具體事件事實)最適合「明確記錄員工表現的事實」(B正確)。尺度評分法(評分)、目標管理法(達標)、同事提名法皆非「記錄具體事實事件」。故重要事件法(B)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"尺度評分法是評分。","B":"正確(本題答案)。記錄具體事實事件=重要事件法。","C":"目標管理法是評達標。","D":"同事提名法是同儕推選。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"106111-N2-80":{"quick":"績效考核目的「錯誤」=開除不適任員工。","detail":{"background":"績效考核目的:B增加主管與員工溝通效能、C建立工作績效標準、D甄選/培育(回饋發展)。選項A「開除不適任之員工」不是績效考核的主要目的(本題答案)——考核目的是「發展、激勵、回饋、改善」,「開除」是極端結果非主要目的。故A。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"正確(本題答案)。開除員工非績效考核主要目的。","B":"增進主管員工溝通是目的。","C":"建立績效標準是目的。","D":"甄選培育是目的。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"107030-N2-69":{"quick":"人力資源管理「不」屬核心重點=經營目標。","detail":{"background":"人力資源管理核心重點:A績效考核、B教育訓練、D薪資制度(招募、考核、訓練、薪酬、發展)。選項C「經營目標」不屬人力資源管理的核心重點(本題答案)——經營目標屬「策略管理」層面,非HRM核心。故C。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"績效考核是HRM核心。","B":"教育訓練是HRM核心。","C":"正確(本題答案)。經營目標非HRM核心重點。","D":"薪資制度是HRM核心。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"107030-N2-80":{"quick":"高估自願幫忙者整體績效=月暈效應。","detail":{"background":"考核偏誤:護理師「常自願幫護理長做臨時事務、得賞識、高估其整體績效(但分內工作做不好)」——以單一面向(自願幫忙)的好印象概括整體=月暈效應(B正確)。近因(以近期表現)、觸角(以缺點概括差)、膨脹壓力皆非。故月暈效應(B)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"近因效應是以近期表現評斷。","B":"正確(本題答案)。以幫忙印象高估整體=月暈效應。","C":"觸角效應是以缺點概括差。","D":"膨脹壓力非此。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"107110-N2-77":{"quick":"擔心打擊士氣而普遍評高=膨脹壓力(寬大效應)。本題答案... 重判官方D。","detail":{"background":"本題官方答案D(膨脹壓力)。主管「擔心考評偏低打擊士氣,而將部屬分數普遍評偏高」=膨脹壓力(inflation pressure,因壓力而給高分,類寬大效應leniency)。光圈、觸角、集中趨勢皆非「因擔心士氣而普遍給高分」。故膨脹壓力(D)。","options":{"A":"光圈效應是單一優點概括。","B":"觸角效應是單一缺點概括。","C":"集中趨勢是都給中間分。","D":"正確(本題答案)。擔心士氣普遍評高=膨脹壓力。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"108020-N2-78":{"quick":"直屬主管員工同儕外部顧客考評=360度考評。","detail":{"background":"績效考評方式:360度考評(由直屬主管、員工自評、同儕、部屬、外部顧客等多方來源回饋)。「由直屬主管、員工、同儕及外部顧客反應的考評」=360度考評(B正確)。考評委員會、年度考評、部屬考評皆非「多方來源」。故360度考評(B)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"考評委員會是委員評。","B":"正確(本題答案)。多方來源回饋=360度考評。","C":"年度考評是定期評。","D":"部屬考評是單一向上評。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"108020-N2-79":{"quick":"勾選達成/未達成=績效查核法(檢查表法)。","detail":{"background":"考核方法:以勾選「達成或未達成」評值各項目=績效查核法(查核表/檢查表法,checklist,僅判定有無達成)(D正確)。重要事件記錄法(記事件)、簡單排列法(排序)、自由反應報告法(文字描述)皆非「勾選達成/未達成」。故績效查核法(D)。","options":{"A":"重要事件法是記錄事件。","B":"簡單排列法是排序。","C":"自由反應報告法是文字描述。","D":"正確(本題答案)。勾選達成/未達成=績效查核法。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"108110-N2-74":{"quick":"勾選有無此行為不判良劣=檢查表法。","detail":{"background":"績效考核工具:檢查表法(checklist)——「在問題清單上僅指出受評者『有無』此項行為表現,不判定良劣程度」(C正確)。評核尺度法(評程度)、重要事件法(記事件)、人員比較法(比較)皆非「僅指出有無」。故檢查表法(C)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"評核尺度法評定程度。","B":"重要事件法記錄事件。","C":"正確(本題答案)。僅指出有無=檢查表法。","D":"人員比較法是相互比較。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"108110-N2-78":{"quick":"「無法」增加考核表信度=增加考核的項目。","detail":{"background":"增加考核表信度的方法:B語句敘述清楚、C結構簡單、D針對職責測量(明確、具體、相關)。選項A「增加考核的項目」無法增加信度(本題答案)——項目過多反而增加評分不一致、降低信度;信度來自「清楚、簡單、相關」而非數量多。故A。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"正確(本題答案)。增加項目無法增信度(反而降低)。","B":"語句清楚增信度。","C":"結構簡單增信度。","D":"針對職責測量增信度。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"109030-N2-76":{"quick":"考核前刻意表現優於平常=霍桑效應。","detail":{"background":"霍桑效應(Hawthorne effect):因「知道自己被觀察/受關注」而改變行為。護理師「知道護理長正在考績評核,刻意表現優於平常」=霍桑效應(A正確)。向日葵(主管全給高分)、中央偏誤、光圈皆非「受關注改變行為」。故霍桑效應(A)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"正確(本題答案)。受考核關注刻意表現=霍桑效應。","B":"向日葵效應是主管全給高分。","C":"中央偏誤是都給中間。","D":"光圈效應是優點概括。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"109110-N2-77":{"quick":"考核前爭執致評分偏低=觸角效應。","detail":{"background":"考核偏誤:觸角效應(Horns,以單一負面事件/印象概括整體變差)。護理師「平時表現佳,考核前與護理長爭執,致考核分數偏低」=觸角效應(B正確)。霍桑(受關注改變)、中央偏誤、光圈(優點概括)皆非。故觸角效應(B)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"霍桑效應是受關注改變行為。","B":"正確(本題答案)。爭執致評分偏低=觸角效應。","C":"中央偏誤是都給中間。","D":"光圈效應是優點概括。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"110110-N2-74":{"quick":"管理方格理論構面=生產與員工。","detail":{"background":"Blake-Mouton管理方格理論的兩構面=「生產(對工作的關心)與員工(對人員的關心)」(D正確)。關懷與法規、關係與目標、績效與酬勞皆非管理方格的兩構面。故生產與員工(D)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"關懷與法規非管理方格構面。","B":"關係與目標非構面。","C":"績效與酬勞非構面。","D":"正確(本題答案)。生產與員工=管理方格兩構面。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"111030-N2-80":{"quick":"依某項特性進行考核易產生=月暈效應。","detail":{"background":"考核偏誤:護理長「依同仁的『某項特性』進行考核」(以單一特性/印象概括整體評價)易產生月暈效應(halo effect)(C正確)。近因(以近期)、霍桑(受關注)、趨勢效應皆非「以單一特性概括」。故月暈效應(C)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"近因效應是以近期表現。","B":"霍桑效應是受關注改變。","C":"正確(本題答案)。以單一特性概括=月暈效應。","D":"趨勢效應非標準。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"111110-N2-65":{"quick":"表現差者刻意給高分避免負評=膨脹壓力。","detail":{"background":"考核偏誤:護理長「對平時表現不佳者刻意給較高成績,避免護理師對護理長有負面評價」=膨脹壓力(inflation pressure,因怕負評壓力而給高分,類寬大效應)(D正確)。霍桑、光圈、中央趨勢皆非。故膨脹壓力(D)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"霍桑效應是受關注改變行為。","B":"光圈效應是優點概括。","C":"中央趨勢是都給中間。","D":"正確(本題答案)。怕負評給高分=膨脹壓力。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"111110-N2-79":{"quick":"考核前意見相左爭執得乙等=觸角效應。","detail":{"background":"考核偏誤:護理師「平時表現不錯,考核期間與護理長意見相左爭執,考核得乙等(偏低)」=觸角效應(Horns,以單一負面事件概括變差)(C正確)。向日葵(全高分)、月暈(優點概括)、霍桑皆非。故觸角效應(C)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"向日葵效應是全給高分。","B":"月暈效應是優點概括變好。","C":"正確(本題答案)。爭執致偏低=觸角效應。","D":"霍桑效應是受關注改變。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"112030-N2-80":{"quick":"依醫院訂定標準考核=絕對標準。","detail":{"background":"績效考評標準:絕對標準(依既定標準評定每人是否達標、不與他人比較)。「依醫院訂定的標準考核員工表現」=絕對標準(C正確)。相對標準(與他人比較排序)、客觀標準、建議標準皆非「依既定標準」。故絕對標準(C)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"相對標準是與他人比較。","B":"客觀標準非此分類。","C":"正確(本題答案)。依醫院訂定標準=絕對標準。","D":"建議標準非標準分類。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"112180-N2-49":{"quick":"與同儕相處融洽致考核高=光圈/月暈效應。","detail":{"background":"考核偏差:護理師「與同儕相處融洽,主管因此給較高分數」(以單一好印象/特質概括整體)=光圈/月暈效應(halo effect)(D正確)。霍桑(受關注)、向日葵(主管全給高分)、中央偏誤皆非「以單一好印象概括」。故光圈/月暈效應(D)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"霍桑效應是受關注改變。","B":"向日葵效應是主管全給高分。","C":"中央偏誤是都給中間。","D":"正確(本題答案)。以融洽好印象概括=光圈/月暈效應。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"113030-N2-41":{"quick":"所有人考評成績排列比較=相對標準。","detail":{"background":"績效考評標準:相對標準(將所有人員的成績『排列比較』、排序/常態分配)。「將所有人員考評成績進行分數排列比較」=相對標準(A正確)。絕對標準(依固定標準、不比較)、客觀標準、主觀標準皆非「排列比較」。故相對標準(A)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"正確(本題答案)。排列比較=相對標準。","B":"客觀標準非此分類。","C":"絕對標準是依固定標準不比較。","D":"主觀標準非標準分類。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"113180-N2-47":{"quick":"績效考核原則正確=考核表要省時、精確及項目完整。","detail":{"background":"績效考核原則:B「考核表要注意省時、精確及項目的完整」正確。A「所有人都用相同評核表才公平」錯(不同職級應用不同考核表);C「考核是隱私機密、不應讓部屬知道結果」錯(應回饋結果給部屬以利改善);D「不須標準作業程序」錯(考核應有SOP確保一致客觀)。故B。","options":{"A":"不同職級應用不同考核表。","B":"正確(本題答案)。考核表省時、精確、項目完整。","C":"應回饋考核結果給部屬。","D":"考核應有標準作業程序。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"114030-N2-40":{"quick":"表現良好者爭執後給低分=觸角效應。","detail":{"background":"考核偏誤:護理長「年度考核前一週與平時表現良好者起爭執,給予較低考評」=觸角效應(Horns,以單一負面事件概括變差)(D正確)。寬厚錯誤(普遍給高分)、向日葵(全高分)、膨脹壓力皆非「以爭執給低分」。故觸角效應(D)。考核偏誤:月暈/光圈(單一優點概括變好)、觸角(單一缺點概括變差)、向日葵(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、霍桑(受關注改變行為)、近因(以近期表現)、膨脹壓力/寬大(怕負評給高分)。考評標準:絕對(依固定標準不比較)、相對(排序比較)。方法:檢查表/查核法(勾選有無)、評核尺度(評程度)、重要事件(記事件)、360度(多方來源)。最初考核者=直屬主管。","options":{"A":"寬厚錯誤是普遍給高分。","B":"向日葵效應是全給高分。","C":"膨脹壓力是怕負評給高分。","D":"正確(本題答案)。爭執後給低分=觸角效應。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"114170-N2-48":{"quick":"績效考核最適當=最初考核者必須是被考核者的直屬主管。","detail":{"background":"績效考核:C「最初的考核者必須是被考核者的『直屬主管』(最了解其工作表現)」最適當。A「不可作為獎懲晉升調職依據」錯(考核正是這些的依據);B「考核過程內容不可隨意修正」錯(可依需要適度修正改善);D「考核內容要配合個人職涯目標及『主管要求』」——應配合職責與組織目標。故C。","options":{"A":"考核可作獎懲晉升依據。","B":"考核可適度修正改善。","C":"正確(本題答案)。最初考核者是直屬主管。","D":"應配合職責與組織目標。"},"sources":["新文京《護理行政》績效考核","華杏《護理行政學》考核偏誤與標準"]}},"101030-N2-64":{"quick":"某病房8月流動率=20%。本題答案D。","detail":{"background":"流動率=(該期離職人數÷該期平均在職人數)×100%。平均在職=(8月初26+9月初24)÷2=25;離職5人;流動率=5÷25×100%=20%。故20%(D)。招募:內部(升遷調動,優點熟悉激勵、缺點升遷鬥爭)、外部(新血但融入慢)。甄選=從合格者選最勝任者。流動率=離職數÷平均在職數×100%(理想5-10%);缺勤率=請假天數÷(員工數×工作天數)。工作說明書(職務責任職權條件,作考核依據)、工作評價(評職務相對價值)。工作設計:工作擴大(水平增量)、工作輪調(水平換職務)、工作豐富(垂直增責任)、工作再設計(重定義職責)。","options":{"A":"13%不符。","B":"15%不符。","C":"17%不符。","D":"正確(本題答案)。5÷25=20%。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"103100-N2-64":{"quick":"年度離職率=13.5%。本題答案D。","detail":{"background":"年度離職率=(全年離職人數÷全年平均護理人員數)×100%=65÷480×100%≈13.5%(新進15人不影響此公式的離職率計算)。故13.5%(D)。招募:內部(升遷調動,優點熟悉激勵、缺點升遷鬥爭)、外部(新血但融入慢)。甄選=從合格者選最勝任者。流動率=離職數÷平均在職數×100%(理想5-10%);缺勤率=請假天數÷(員工數×工作天數)。工作說明書(職務責任職權條件,作考核依據)、工作評價(評職務相對價值)。工作設計:工作擴大(水平增量)、工作輪調(水平換職務)、工作豐富(垂直增責任)、工作再設計(重定義職責)。","options":{"A":"8.5%不符。","B":"10.5%不符。","C":"12.5%不符。","D":"正確(本題答案)。65÷480≈13.5%。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"104030-N2-58":{"quick":"跌倒率降至2%以下=目標管理。","detail":{"background":"「今年度跌倒發生率希望降至2%以下」=設定具體可測量目標→目標管理(MBO)(C正確)。考核管理、人力資源管理、績效管理皆非「設定具體目標達成」的核心。故目標管理(C)。招募:內部(升遷調動,優點熟悉激勵、缺點升遷鬥爭)、外部(新血但融入慢)。甄選=從合格者選最勝任者。流動率=離職數÷平均在職數×100%(理想5-10%);缺勤率=請假天數÷(員工數×工作天數)。工作說明書(職務責任職權條件,作考核依據)、工作評價(評職務相對價值)。工作設計:工作擴大(水平增量)、工作輪調(水平換職務)、工作豐富(垂直增責任)、工作再設計(重定義職責)。","options":{"A":"考核管理是評核。","B":"人力資源管理是人事。","C":"正確(本題答案)。設定具體目標=目標管理。","D":"績效管理偏評核。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"104030-N2-61":{"quick":"Gillies護理管理系統正確=績效考核是過程。","detail":{"background":"Gillies護理管理系統(系統觀):輸入(人力招募甄選、資源)→過程(績效考核、領導、轉化活動)→輸出(病人滿意度、護理師成長、成果)。選項D「績效考核是過程」正確。A病人滿意度是『輸出』(非過程);B招募甄選是『輸入』(非輸出);C護理師成長是『輸出』(非輸入)。故D。","options":{"A":"病人滿意度是輸出,非過程。","B":"招募甄選是輸入,非輸出。","C":"護理師成長是輸出,非輸入。","D":"正確(本題答案)。績效考核是過程。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"104030-N2-64":{"quick":"爭取升遷造成組織鬥爭=內部招募的缺點。","detail":{"background":"招募方式:內部招募(從現有員工晉升/調動)優點是熟悉組織、激勵士氣,缺點是「爭取升遷造成組織內鬥爭、近親繁殖」;外部招募(從外部找人)帶來新血但融入慢。「爭取升遷造成組織鬥爭」=內部招募缺點(B正確)。故內部(B)。招募:內部(升遷調動,優點熟悉激勵、缺點升遷鬥爭)、外部(新血但融入慢)。甄選=從合格者選最勝任者。流動率=離職數÷平均在職數×100%(理想5-10%);缺勤率=請假天數÷(員工數×工作天數)。工作說明書(職務責任職權條件,作考核依據)、工作評價(評職務相對價值)。工作設計:工作擴大(水平增量)、工作輪調(水平換職務)、工作豐富(垂直增責任)、工作再設計(重定義職責)。","options":{"A":"外部招募是找外部新人。","B":"正確(本題答案)。升遷鬥爭是內部招募缺點。","C":"媒體招募非此。","D":"混合式招募非此。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"105030-N2-57":{"quick":"描述工作責任職權範圍及所需條件=工作說明書。","detail":{"background":"人力資源文件:工作說明書(job description,描述特定工作的責任、職權範圍及擔任該工作所需具備的條件)。題幹描述=工作說明書(B正確)。護理技術標準手冊、護理常規手冊、工作規範皆非「描述職務責任職權條件」。故工作說明書(B)。招募:內部(升遷調動,優點熟悉激勵、缺點升遷鬥爭)、外部(新血但融入慢)。甄選=從合格者選最勝任者。流動率=離職數÷平均在職數×100%(理想5-10%);缺勤率=請假天數÷(員工數×工作天數)。工作說明書(職務責任職權條件,作考核依據)、工作評價(評職務相對價值)。工作設計:工作擴大(水平增量)、工作輪調(水平換職務)、工作豐富(垂直增責任)、工作再設計(重定義職責)。","options":{"A":"護理技術標準手冊是技術規範。","B":"正確(本題答案)。描述職務責任職權條件=工作說明書。","C":"護理常規手冊是常規。","D":"工作規範偏行為標準。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"105030-N2-63":{"quick":"7月流動率=20%。本題答案C。","detail":{"background":"流動率=(該期離職人數÷該期平均在職人數)×100%。平均在職=(7月初26+8月初24)÷2=25;離職5人;流動率=5÷25×100%=20%。故20%(C)。招募:內部(升遷調動,優點熟悉激勵、缺點升遷鬥爭)、外部(新血但融入慢)。甄選=從合格者選最勝任者。流動率=離職數÷平均在職數×100%(理想5-10%);缺勤率=請假天數÷(員工數×工作天數)。工作說明書(職務責任職權條件,作考核依據)、工作評價(評職務相對價值)。工作設計:工作擴大(水平增量)、工作輪調(水平換職務)、工作豐富(垂直增責任)、工作再設計(重定義職責)。","options":{"A":"10%不符。","B":"13%不符。","C":"正確(本題答案)。5÷25=20%。","D":"35%不符。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"105030-N2-64":{"quick":"分權式組織「不」是優點=增加人員的流動率。","detail":{"background":"分權式組織優點:A培養優秀人才、C各階層主管有較大自主權、D問題解決省時有效率。選項B「增加人員的流動率」不是優點(本題答案)——流動率增加是「缺點/負面」,非分權的優點(分權反而因自主提升而『降低』流動率)。故B。招募:內部(升遷調動,優點熟悉激勵、缺點升遷鬥爭)、外部(新血但融入慢)。甄選=從合格者選最勝任者。流動率=離職數÷平均在職數×100%(理想5-10%);缺勤率=請假天數÷(員工數×工作天數)。工作說明書(職務責任職權條件,作考核依據)、工作評價(評職務相對價值)。工作設計:工作擴大(水平增量)、工作輪調(水平換職務)、工作豐富(垂直增責任)、工作再設計(重定義職責)。","options":{"A":"分權培養優秀人才(優點)。","B":"正確(本題答案)。增加流動率非優點(是負面)。","C":"分權主管自主權大(優點)。","D":"分權問題解決有效率(優點)。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"105030-N2-67":{"quick":"晉升失敗網路抨擊甄選不公=攻擊反應。","detail":{"background":"挫折反應(防衛機轉):資深人員「晉升護理長失敗,於網路抨擊護理部甄選不公」=攻擊反應(aggression,將挫折轉為攻擊他人/組織)(B正確)。退行性行為(退回幼稚)、折衷妥協、固著行為皆非「攻擊抨擊」。故攻擊反應(B)。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"退行性行為是退回幼稚。","B":"正確(本題答案)。網路抨擊=攻擊反應。","C":"折衷妥協是各退讓。","D":"固著行為是僵化重複。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"106110-N2-68":{"quick":"員工流動率理想範圍=5%~10%。","detail":{"background":"機構員工流動率(turnover rate)理想範圍為5%~10%(C正確)——適度流動可帶來新血、避免組織老化,過低(僵化)或過高(>50%表組織問題)皆不理想。故5%~10%(C)。招募:內部(升遷調動,優點熟悉激勵、缺點升遷鬥爭)、外部(新血但融入慢)。甄選=從合格者選最勝任者。流動率=離職數÷平均在職數×100%(理想5-10%);缺勤率=請假天數÷(員工數×工作天數)。工作說明書(職務責任職權條件,作考核依據)、工作評價(評職務相對價值)。工作設計:工作擴大(水平增量)、工作輪調(水平換職務)、工作豐富(垂直增責任)、工作再設計(重定義職責)。","options":{"A":"1%以下過低(僵化)。","B":"1.1%~4.9%偏低。","C":"正確(本題答案)。理想流動率5%~10%。","D":"10.1%~15%偏高。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"106110-N2-67":{"quick":"人力資源「錯誤」=以現有人力資源決定組織的任務規模。","detail":{"background":"人力資源:B人力資源係指所有可支配人力總和(對)、C包含人員核心能力(對)、D是機構重要資產(對)。選項A「以現有人力資源決定組織的任務規模」錯誤(本題答案)——應「依組織任務/目標規劃所需人力」(任務決定人力),非以現有人力決定任務規模(本末倒置)。故A。","options":{"A":"正確(本題答案)。應依任務規劃人力,非以現有人力決定任務。","B":"人力資源是可支配人力總和(對)。","C":"包含核心能力(對)。","D":"是重要資產(對)。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"107110-N2-68":{"quick":"人事vs人力資源管理「錯誤」=人事管理強調適才適所、人力資源強調人力開發。","detail":{"background":"人事管理vs人力資源管理(HRM):A人事著重從屬對立、HRM著重勞資平等(對);B人事視員工為成本、HRM視員工為資產(對);D人事靠考核鞭策、HRM強調員工主動(對)。選項C「人事管理強調適才適所;人力資源管理強調人力開發」——此敘述本題視為錯誤須斟酌(人事管理偏行政事務管理,HRM強調開發與適才適所、員工發展)。故C(本題答案)。","options":{"A":"人事從屬對立、HRM勞資平等(對)。","B":"人事視員工成本、HRM視資產(對)。","C":"正確(本題答案,須斟酌)。適才適所敘述對應有誤。","D":"人事鞭策、HRM強調主動(對)。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"108110-N2-62":{"quick":"重新審視設計工作+問卷+檢查表觀察=工作日誌法?本題答案B。","detail":{"background":"本題官方答案B(工作日誌法)。護理長「重新審視與設計工作、由同仁填結構式問卷、利用晚夜班親自用檢查表觀察記錄」——以「記錄工作活動內容與時間」分析工作=工作日誌法(work diary/log,記錄工作活動)。查檢表法、問卷法、工作抽樣法皆非「綜合記錄工作活動」的工作日誌。故工作日誌法(B)。","options":{"A":"查檢表法是勾選。","B":"正確(本題答案)。記錄工作活動=工作日誌法。","C":"問卷法僅問卷。","D":"工作抽樣法是隨機抽樣觀察。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"111030-N2-58":{"quick":"完整工作設計影響=工作項目越完整越能找到符合需求的員工。","detail":{"background":"完整工作設計對組織的影響:D「工作項目(說明)越完整,越能找到符合需求的員工(招募甄選更精準)」正確。A「從做中學不需培訓」錯(仍需培訓);B「工作擴大化節省人事成本」錯(工作擴大化是增加工作廣度、非省成本);C「工作說明書可作懲戒依據」錯(工作說明書是指引與考核依據,非懲戒工具)。故D。","options":{"A":"仍需提供培訓。","B":"工作擴大化非為省成本。","C":"工作說明書非懲戒工具。","D":"正確(本題答案)。工作項目越完整越能找符合需求員工。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"111030-N2-67":{"quick":"重新定義工作確認新職責職權=工作再設計。","detail":{"background":"工作設計:工作再設計(job redesign,利用工作分析重新定義工作/職務、確認新的工作職責和職權)。題幹描述=工作再設計(C正確)。工作擴大化(增加同層級工作項目)、工作再輪調(輪換職務)、工作豐富化(增加垂直責任決策)皆非「重新定義職責職權」。故工作再設計(C)。","options":{"A":"工作擴大化是增加同層級項目。","B":"工作再輪調是輪換職務。","C":"正確(本題答案)。重新定義職責職權=工作再設計。","D":"工作豐富化是增加垂直責任。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"111110-N2-70":{"quick":"水平改變工作職務職稱不變=工作輪調。","detail":{"background":"工作設計:工作輪調(job rotation,水平方向輪換不同職務、職稱不變、擴大視野)。「採水平方向改變工作職務,職稱不變」=工作輪調(B正確)。工作擴大(增加同層工作量)、工作再設計、工作豐富(垂直增加責任)皆非「水平輪換職務」。故工作輪調(B)。","options":{"A":"工作擴大是增加同層工作量。","B":"正確(本題答案)。水平輪換職務=工作輪調。","C":"工作再設計是重新定義。","D":"工作豐富是垂直增加責任。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"112030-N2-64":{"quick":"某加護病房8月流動率≈21.7%。本題答案B。","detail":{"background":"本題官方答案B(21.7%)。流動率=(離職人數÷平均在職人數)×100%=5÷23×100%≈21.7%。故21.7%(B)。招募:內部(升遷調動,優點熟悉激勵、缺點升遷鬥爭)、外部(新血但融入慢)。甄選=從合格者選最勝任者。流動率=離職數÷平均在職數×100%(理想5-10%);缺勤率=請假天數÷(員工數×工作天數)。工作說明書(職務責任職權條件,作考核依據)、工作評價(評職務相對價值)。工作設計:工作擴大(水平增量)、工作輪調(水平換職務)、工作豐富(垂直增責任)、工作再設計(重定義職責)。","options":{"A":"20.8%不符。","B":"正確(本題答案)。5÷23≈21.7%。","C":"22.1%不符。","D":"20.9%不符。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"112180-N2-42":{"quick":"人才招募計畫第一步=確認職缺需求。","detail":{"background":"人才招募計畫步驟:第一步是「確認職缺需求(B)」——先確認需要什麼樣的人、缺多少人(需求分析),才能後續分析招募原因、決定方法、確認對象。故確認職缺需求(B)。招募:內部(升遷調動,優點熟悉激勵、缺點升遷鬥爭)、外部(新血但融入慢)。甄選=從合格者選最勝任者。流動率=離職數÷平均在職數×100%(理想5-10%);缺勤率=請假天數÷(員工數×工作天數)。工作說明書(職務責任職權條件,作考核依據)、工作評價(評職務相對價值)。工作設計:工作擴大(水平增量)、工作輪調(水平換職務)、工作豐富(垂直增責任)、工作再設計(重定義職責)。","options":{"A":"分析招募原因是後續。","B":"正確(本題答案)。第一步確認職缺需求。","C":"決定招募方法是後續。","D":"確認招募對象是後續。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"113100-N2-36":{"quick":"工作評價目的=作為工作簡化、員工調派依據。","detail":{"background":"工作評價(job evaluation,評定各職務的相對價值):B「作為工作簡化、員工調派(及薪資結構)的依據」正確。A「提高薪資保障福利」非工作評價目的;C「解決勞資糾紛」非主要目的;D「協助員工了解工作內容發揮潛能」是『工作說明書』的功能。故B。","options":{"A":"工作評價非為提高薪資福利。","B":"正確(本題答案)。工作評價作工作簡化、調派依據。","C":"非主要為解決勞資糾紛。","D":"了解工作內容是工作說明書功能。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"113100-N2-42":{"quick":"人才招募步驟順序=了解供需→分析管道→擬定計畫→實際招募→效益評估(34152)。本題答案A。","detail":{"background":"本題官方答案A(31452)。人才招募步驟:3了解市場人力供需情形→1擬定招募計畫→4分析各招募管道特色效益→5實際進行招募→2招募效益評估。故順序「31452」(A)。核心:先了解供需,再計畫、選管道、執行、評估。招募:內部(升遷調動,優點熟悉激勵、缺點升遷鬥爭)、外部(新血但融入慢)。甄選=從合格者選最勝任者。流動率=離職數÷平均在職數×100%(理想5-10%);缺勤率=請假天數÷(員工數×工作天數)。工作說明書(職務責任職權條件,作考核依據)、工作評價(評職務相對價值)。工作設計:工作擴大(水平增量)、工作輪調(水平換職務)、工作豐富(垂直增責任)、工作再設計(重定義職責)。","options":{"A":"正確(本題答案)。31452(供需→計畫→管道→招募→評估)。","B":"34215順序不符。","C":"43152不符。","D":"43215不符。"},"sources":["新文京《護理行政》招募甄選與工作設計","華杏《護理行政學》人力資源管理"]}},"101030-N2-66":{"quick":"培養臨床教師、規劃選人培育=指揮路線(傳統組織原則)。","detail":{"background":"本題依傳統組織結構原則:護理主任「告知教學督導應培養臨床教師(preceptor)、讓其規劃選人培育」——透過「指揮路線(chain of command,層級指揮鏈)」逐級下達(A正確)。部門原則、管轄輻度、權責相稱皆非「逐級指揮下達」。故指揮路線(A)。","options":{"A":"正確(本題答案)。逐級下達=指揮路線。","B":"部門原則是依功能分部。","C":"管轄輻度是控制幅度。","D":"權責相稱是職權職責對等。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"103030-N2-58":{"quick":"休假係數=365÷(365−115例假紀念−14年休−4公假−4公差)=365÷228≈1.60，故選A。","detail":{"background":"本題官方答案B(1.94)。實際上班天數=365-115(例假)-14(年休)-4(公假研究)-4(公差假在職教育)=228;護理時數=(人員數×8h×228)÷(占床數×365)。依題給條件計算每位病人每天護理時數≈1.94小時。故1.94(B)。","options":{"A":"正解：365÷228≈1.60。","B":"1.94不符計算。","C":"2.66不符。","D":"3.17不符。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"104100-N2-70":{"quick":"教育訓練設計第一優先=教學活動的目標與方針。","detail":{"background":"教育訓練活動設計,「第一優先」考慮「教學活動的目標與方針(A)」——先確立目標方向,才能據以規劃內容、經費、師資。教學經費、教師人選、需求皆是目標確立後的考量。故教學活動的目標與方針(A)。教育訓練:規劃首要=評估學習需求;到職/職前訓練(宗旨、單位專科、職責)、在職教育、交叉訓練(支援相似單位)、preceptor臨床教師。教學評量:OSCE(客觀結構式臨床測驗,綜合臨床能力)、DOPS(直接觀察操作技術,最能評實作)。生涯規劃:自我瞭解→職涯評估(了解各職業性質)→設定目標→擬訂方案。","options":{"A":"正確(本題答案)。第一優先=教學活動的目標與方針。","B":"經費是後續考量。","C":"教師人選是後續。","D":"需求評估雖重要,本題以目標方針為第一優先。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"105030-N2-68":{"quick":"新進護理師到職訓練「較不適合」=護理個案書寫。","detail":{"background":"應屆畢業新進護理師「到職訓練」內容:A護理部宗旨理念、B被分配單位的專科知識、C工作職責說明(到職須了解的基本內容)。選項D「護理個案書寫」較不適合到職訓練(本題答案)——個案書寫屬「進階能力訓練(N2/N3)」,非新人到職的基本訓練。故D。","options":{"A":"宗旨理念是到職訓練內容。","B":"單位專科知識是到職訓練內容。","C":"工作職責說明是到職訓練內容。","D":"正確(本題答案)。護理個案書寫屬進階訓練,非到職訓練。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"105030-N2-71":{"quick":"護理師每小時薪資≈3478元?本題答案B。","detail":{"background":"本題官方答案B(3,478)。實際工作天數=365-52(週末)-52(週日)-14(公休)-9(國定)-3(在職教育)-5(事病假)=230天;若每日8小時=1840小時/年?——本題以年薪80萬÷實際工作天數計得每日約3,478元。故每日約3,478元(B)。核心:薪資成本=年薪÷實際工作天數。","options":{"A":"2,609元不符。","B":"正確(本題答案)。80萬÷實際工作天數≈3,478元/日。","C":"4,459元不符。","D":"5,609元不符。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"105090-N2-61":{"quick":"兩年後成立2家醫美中心=SMART的具體性與可測量性。本題答案A。","detail":{"background":"本題官方答案A。「兩年後在上海成立2家醫美中心」符合SMART目標的「具體性(specific,明確要做什麼)與可測量性(measurable,2家可量化)」(A正確,及時效性)。本題以「具體+可測量」為答案。故A。教育訓練:規劃首要=評估學習需求;到職/職前訓練(宗旨、單位專科、職責)、在職教育、交叉訓練(支援相似單位)、preceptor臨床教師。教學評量:OSCE(客觀結構式臨床測驗,綜合臨床能力)、DOPS(直接觀察操作技術,最能評實作)。生涯規劃:自我瞭解→職涯評估(了解各職業性質)→設定目標→擬訂方案。","options":{"A":"正確(本題答案)。明確2家=具體性與可測量性。","B":"可測量+合理性敘述不全。","C":"合理+可達成敘述不全。","D":"可達成+時效性敘述不全。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"108020-N2-72":{"quick":"在職教育及技術稽核=滿足「人力素質及品質促進」評鑑範疇。","detail":{"background":"護理評鑑範疇:護理部門「實施在職教育及護理技術稽核」是為滿足「人力素質及品質促進」範疇(B正確)——透過教育訓練提升人力素質、技術稽核促進品質。適切的護理管理、舒適環境、完備醫療體制皆非「在職教育+技術稽核」對應。故人力素質及品質促進(B)。","options":{"A":"適切的護理管理偏管理面。","B":"正確(本題答案)。在職教育+技術稽核=人力素質及品質促進。","C":"舒適環境偏環境面。","D":"完備醫療體制偏體制面。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"109030-N2-70":{"quick":"規劃教育訓練課程首要工作=評估學習需求。","detail":{"background":"規劃教育訓練課程,首要工作是「評估學習需求(needs assessment)」(C正確)——先了解學員的學習需求與缺口,才能據以訂目標、選對象、擬策略。訂目標、確認對象、擬策略皆是需求評估後的步驟。故評估學習需求(C)。教育訓練:規劃首要=評估學習需求;到職/職前訓練(宗旨、單位專科、職責)、在職教育、交叉訓練(支援相似單位)、preceptor臨床教師。教學評量:OSCE(客觀結構式臨床測驗,綜合臨床能力)、DOPS(直接觀察操作技術,最能評實作)。生涯規劃:自我瞭解→職涯評估(了解各職業性質)→設定目標→擬訂方案。","options":{"A":"訂教學目標是需求評估後。","B":"確認對象是後續。","C":"正確(本題答案)。首要=評估學習需求。","D":"擬定策略是後續。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"110030-N2-70":{"quick":"教育訓練「不」是目的=作為考核依據。","detail":{"background":"護理員工教育訓練之目的:A協助角色適應、C提升專業能力、D減少執業疲潰(burnout)。選項B「作為考核依據」不是教育訓練的目的(本題答案)——教育訓練是為「培育、適應、提升能力」,非作為考核員工的依據(考核依據是工作說明書/績效標準)。故B。","options":{"A":"協助角色適應是目的。","B":"正確(本題答案)。作為考核依據非教育訓練目的。","C":"提升專業能力是目的。","D":"減少執業疲潰是目的。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"110110-N2-67":{"quick":"最能評量專業實作能力=直接觀察操作技術(DOPS)。","detail":{"background":"教學評量方式:DOPS(Direct Observation of Procedural Skills,直接觀察操作技術)最能評量學習者的「專業實作(操作)能力」(B正確,實際觀察操作)。OSCE(客觀結構式臨床測驗,綜合臨床能力)、口試、筆試皆不如DOPS直接評量實作技術。故DOPS(B)。","options":{"A":"OSCE評綜合臨床能力。","B":"正確(本題答案)。DOPS最能評實作操作能力。","C":"口試評口語表達。","D":"筆試評知識。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"112110-N2-56":{"quick":"臨終主護護理師無力感:更改其他護理人員擔任主護。","detail":{"background":"林護理師為臨終病人主護、常覺無力感焦慮低落,病房安排人力時最適當=「更改其他護理人員擔任主護護理師(A)」——適時調整、避免單一護理師長期承受臨終照護壓力(預防同情疲憊/burnout)。B拜拜、C勇於承擔(忽視壓力)、D告知不適任(否定)皆不當。故A。","options":{"A":"正確(本題答案)。更改其他人擔任主護減壓。","B":"拜拜非實質協助。","C":"勇於承擔忽視壓力。","D":"告知不適任否定打擊。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"113030-N2-49":{"quick":"護理業務糾紛處置=理智處理、分析及了解事件始末。","detail":{"background":"發生護理業務糾紛時的處置:B「理智處理、分析及了解事件的始末(先冷靜釐清事實真相)」最適當。A「請當事人面對病人家屬」(當事人情緒中不宜直接面對)、C「尋求法律途徑」(非首要、應先釐清)、D「安排諮商輔導教育訓練」(非當下處置)皆非首要。故B。","options":{"A":"當事人不宜直接面對家屬。","B":"正確(本題答案)。理智分析了解事件始末。","C":"法律途徑非首要。","D":"教育訓練非當下處置。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"113180-N2-41":{"quick":"使護理師可相互支援屬性相似單位=交叉訓練。","detail":{"background":"教育訓練模式:交叉訓練(cross-training,讓護理師接受多單位/多技能訓練,可相互支援屬性相似的單位)。「為使護理師相互支援屬性相似單位而辦理的訓練」=交叉訓練(D正確)。焦點訓練、主管訓練、職前訓練皆非「跨單位互相支援」。故交叉訓練(D)。","options":{"A":"焦點訓練是針對特定主題。","B":"主管訓練是針對主管。","C":"職前訓練是到職前。","D":"正確(本題答案)。相互支援相似單位=交叉訓練。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"114100-N2-37":{"quick":"了解各職業性質特色所需能力=生涯規劃的「職涯評估」步驟。","detail":{"background":"生涯規劃步驟:自我瞭解→職涯評估(了解各職業的性質、特色、所需能力及發展潛能)→設定目標→擬訂方案。「了解各職業的性質、特色、所需能力及發展潛能」=職涯評估(B正確)。故職涯評估(B)。教育訓練:規劃首要=評估學習需求;到職/職前訓練(宗旨、單位專科、職責)、在職教育、交叉訓練(支援相似單位)、preceptor臨床教師。教學評量:OSCE(客觀結構式臨床測驗,綜合臨床能力)、DOPS(直接觀察操作技術,最能評實作)。生涯規劃:自我瞭解→職涯評估(了解各職業性質)→設定目標→擬訂方案。","options":{"A":"自我瞭解是了解自己。","B":"正確(本題答案)。了解各職業性質=職涯評估。","C":"設定目標是後續。","D":"擬訂方案是後續。"},"sources":["新文京《護理行政》教育訓練","華杏《護理行政學》在職教育與生涯發展"]}},"102110-N2-59":{"quick":"勞基法每兩週工作總時數不得超過84小時。","detail":{"background":"依勞動基準法,每日正常工時8小時,每兩週工作總時數不得超過84小時(B正確,每週40小時×2=80,加上彈性以84為兩週上限)。故84小時(B)。勞動基準法:每日正常8小時、每兩週不超84小時、延長工時連同正常1日不超12小時、7休1、輪班間隔11小時、曠工連續3日或月內6日可不經預告終止不發資遣費。性別工作平等法:產假8週、陪產(檢)假、育嬰留停(子女滿3歲前)、哺乳/集乳時間每日另給60分鐘(視為工時)。職災要件:勞工身分+執行職務有關+致傷病。一般健檢:未滿40歲每5年、40-65歲每3年、65歲以上每年。人因性職業傷害=靜脈曲張/背扭傷/椎間盤(肌肉骨骼)。","options":{"A":"82小時不符。","B":"正確(本題答案)。每兩週不得超過84小時。","C":"85小時不符。","D":"90小時不符。"},"sources":["新文京《護理行政》勞動法規","勞動基準法;性別工作平等法;職業安全衛生法"]}},"103030-N2-64":{"quick":"連續曠工幾日辭退不必發資遣費=3天。","detail":{"background":"依勞動基準法,勞工「無正當理由繼續曠工3日,或一個月內曠工達6日」者,雇主得不經預告終止契約、不必發給資遣費。「連續曠工3天」(C正確)。故3天(C)。勞動基準法:每日正常8小時、每兩週不超84小時、延長工時連同正常1日不超12小時、7休1、輪班間隔11小時、曠工連續3日或月內6日可不經預告終止不發資遣費。性別工作平等法:產假8週、陪產(檢)假、育嬰留停(子女滿3歲前)、哺乳/集乳時間每日另給60分鐘(視為工時)。職災要件:勞工身分+執行職務有關+致傷病。一般健檢:未滿40歲每5年、40-65歲每3年、65歲以上每年。人因性職業傷害=靜脈曲張/背扭傷/椎間盤(肌肉骨骼)。","options":{"A":"5天不符。","B":"4天不符。","C":"正確(本題答案)。連續曠工3日可辭退不發資遣費。","D":"2天不符。"},"sources":["新文京《護理行政》勞動法規","勞動基準法;性別工作平等法;職業安全衛生法"]}},"103100-N2-65":{"quick":"性平法「錯誤」=陪產假三日(現為陪產檢及陪產假7日)。本題答案... 依當年。","detail":{"background":"性別工作平等法(依出題當年):A分娩前後產假八星期(對)、C任職滿一年後子女滿三歲前得申請育嬰留職停薪(對)、D子女未滿一歲須親自哺乳者每日另給哺乳時間(對)。選項B「配偶分娩時陪產假『三日』」——出題當年為陪產假3日(現行已修為陪產檢及陪產假7日),本題依當年法規以B為「錯誤/須更新」之答案。故B(陪產假規定須對應當年)。","options":{"A":"產假八星期(對)。","B":"正確(本題答案)。陪產假規定須對應當年/已修法。","C":"育嬰留停子女三歲前(對)。","D":"哺乳時間(對)。"},"sources":["新文京《護理行政》勞動法規","勞動基準法;性別工作平等法;職業安全衛生法"]}},"105090-N2-58":{"quick":"勞基法延長工時連同正常1日最多不得超過12小時。","detail":{"background":"依勞動基準法,雇主延長勞工工作時間,連同正常工作時間,一日不得超過12小時(D正確,正常8小時+加班最多4小時=12小時)。故12小時(D)。勞動基準法:每日正常8小時、每兩週不超84小時、延長工時連同正常1日不超12小時、7休1、輪班間隔11小時、曠工連續3日或月內6日可不經預告終止不發資遣費。性別工作平等法:產假8週、陪產(檢)假、育嬰留停(子女滿3歲前)、哺乳/集乳時間每日另給60分鐘(視為工時)。職災要件:勞工身分+執行職務有關+致傷病。一般健檢:未滿40歲每5年、40-65歲每3年、65歲以上每年。人因性職業傷害=靜脈曲張/背扭傷/椎間盤(肌肉骨骼)。","options":{"A":"4小時是加班上限。","B":"8小時是正常工時。","C":"10小時不符。","D":"正確(本題答案)。1日最多不得超過12小時。"},"sources":["新文京《護理行政》勞動法規","勞動基準法;性別工作平等法;職業安全衛生法"]}},"106111-N2-59":{"quick":"小夜班隔天接白班違反=勞動基準法。","detail":{"background":"小夜班(如下午3點到晚上11點)隔天接著白班(如早上8點),間隔休息不足11小時——違反「勞動基準法」(C正確,勞基法規定輪班換班間隔應有適當休息時間,原則11小時)。性平法、職災法、護理人員法皆非規範換班間隔。故勞動基準法(C)。勞動基準法:每日正常8小時、每兩週不超84小時、延長工時連同正常1日不超12小時、7休1、輪班間隔11小時、曠工連續3日或月內6日可不經預告終止不發資遣費。性別工作平等法:產假8週、陪產(檢)假、育嬰留停(子女滿3歲前)、哺乳/集乳時間每日另給60分鐘(視為工時)。職災要件:勞工身分+執行職務有關+致傷病。一般健檢:未滿40歲每5年、40-65歲每3年、65歲以上每年。人因性職業傷害=靜脈曲張/背扭傷/椎間盤(肌肉骨骼)。","options":{"A":"性平法規範性別平等。","B":"職災法規範職災補償。","C":"正確(本題答案)。換班間隔不足違反勞基法。","D":"護理人員法規範執業資格。"},"sources":["新文京《護理行政》勞動法規","勞動基準法;性別工作平等法;職業安全衛生法"]}},"109110-N2-63":{"quick":"勞基法曠工幾日可不經預告終止契約=連續3日或1個月6日。","detail":{"background":"依勞動基準法,勞工無正當理由「繼續曠工3日,或1個月內曠工達6日」,雇主得不經預告終止契約。題目問「1個月內曠工至少達幾天」=6天(C正確)。故6(C)。勞動基準法:每日正常8小時、每兩週不超84小時、延長工時連同正常1日不超12小時、7休1、輪班間隔11小時、曠工連續3日或月內6日可不經預告終止不發資遣費。性別工作平等法:產假8週、陪產(檢)假、育嬰留停(子女滿3歲前)、哺乳/集乳時間每日另給60分鐘(視為工時)。職災要件:勞工身分+執行職務有關+致傷病。一般健檢:未滿40歲每5年、40-65歲每3年、65歲以上每年。人因性職業傷害=靜脈曲張/背扭傷/椎間盤(肌肉骨骼)。","options":{"A":"4天不符。","B":"5天不符。","C":"正確(本題答案)。1個月內曠工達6日可不經預告終止。","D":"7天不符。"},"sources":["新文京《護理行政》勞動法規","勞動基準法;性別工作平等法;職業安全衛生法"]}},"109110-N2-65":{"quick":"「不」屬職業災害要件=與教育訓練有關。","detail":{"background":"職業災害要件:A具有勞工身分、B與執行職務有關、D危害勞工生理(職務上原因致勞工傷病殘死)。選項C「與教育訓練有關」不屬職業災害要件(本題答案)——職災核心是「執行職務所致」,教育訓練本身非職災要件。故C。勞動基準法:每日正常8小時、每兩週不超84小時、延長工時連同正常1日不超12小時、7休1、輪班間隔11小時、曠工連續3日或月內6日可不經預告終止不發資遣費。性別工作平等法:產假8週、陪產(檢)假、育嬰留停(子女滿3歲前)、哺乳/集乳時間每日另給60分鐘(視為工時)。職災要件:勞工身分+執行職務有關+致傷病。一般健檢:未滿40歲每5年、40-65歲每3年、65歲以上每年。人因性職業傷害=靜脈曲張/背扭傷/椎間盤(肌肉骨骼)。","options":{"A":"具勞工身分是職災要件。","B":"與執行職務有關是要件。","C":"正確(本題答案)。與教育訓練有關非職災要件。","D":"危害勞工生理是要件。"},"sources":["新文京《護理行政》勞動法規","勞動基準法;性別工作平等法;職業安全衛生法"]}},"112110-N2-65":{"quick":"未滿40歲員工一般健檢=每五年一次。","detail":{"background":"依勞工健康保護規則,一般健康檢查頻率:未滿40歲者每5年一次;40-65歲每3年一次;65歲以上每年一次。未滿40歲=每五年檢查一次(D正確)。故每五年一次(D)。勞動基準法:每日正常8小時、每兩週不超84小時、延長工時連同正常1日不超12小時、7休1、輪班間隔11小時、曠工連續3日或月內6日可不經預告終止不發資遣費。性別工作平等法:產假8週、陪產(檢)假、育嬰留停(子女滿3歲前)、哺乳/集乳時間每日另給60分鐘(視為工時)。職災要件:勞工身分+執行職務有關+致傷病。一般健檢:未滿40歲每5年、40-65歲每3年、65歲以上每年。人因性職業傷害=靜脈曲張/背扭傷/椎間盤(肌肉骨骼)。","options":{"A":"每年一次是65歲以上。","B":"每兩年非標準。","C":"每三年是40-65歲。","D":"正確(本題答案)。未滿40歲每五年一次。"},"sources":["新文京《護理行政》勞動法規","勞動基準法;性別工作平等法;職業安全衛生法"]}},"114030-N2-45":{"quick":"護理師人因性職業傷害「錯誤」=自律神經失調。","detail":{"background":"護理師常見「人因性(ergonomic)職業傷害」(因不良姿勢、搬運、久站所致):A下肢靜脈曲張(久站)、B背部扭拉傷(搬運病人)、D椎間盤凸出(搬重)。選項C「自律神經失調」錯誤(本題答案)——自律神經失調屬「身心/壓力」相關,非人因性(肌肉骨骼)職業傷害。故C。","options":{"A":"下肢靜脈曲張是人因性傷害。","B":"背部扭拉傷是人因性傷害。","C":"正確(本題答案)。自律神經失調非人因性傷害。","D":"椎間盤凸出是人因性傷害。"},"sources":["新文京《護理行政》勞動法規","勞動基準法;性別工作平等法;職業安全衛生法"]}},"115030-N2-43":{"quick":"哺乳護理師擠乳=每日上班另給擠乳2次每次30分鐘。本題答案D。","detail":{"background":"依性別工作平等法/勞基法,子女未滿二歲須親自哺乳(集乳)者,雇主應「每日另給哺乳(集乳)時間60分鐘(可分次,如2次每次30分鐘),視為工作時間」。產後3個月持續哺乳的王護理師,護理長應「每日上班時間另給擠乳2次、每次30分鐘」(D正確)。A午餐時間擠(非另給)、B/C未符法定另給時間。故D。","options":{"A":"午餐時間擠非法定另給時間。","B":"自行安排未符另給規定。","C":"多補時數非法定另給。","D":"正確(本題答案)。每日另給擠乳2次每次30分鐘。"},"sources":["新文京《護理行政》勞動法規","勞動基準法;性別工作平等法;職業安全衛生法"]}},"101110-N2-74":{"quick":"提升護理生產力「錯誤」=減少照護病情較嚴重的病患。","detail":{"background":"提升護理生產力策略:A運用資訊化增加效率、B清楚定義工作職責定位、C運用績效考核激勵。選項D「減少照護病情較嚴重的病患」錯誤(本題答案)——護理生產力是「以合理資源提供品質照護」,不能為提升生產力而「拒收/減少重症病人」(違背照護責任)。故D。","options":{"A":"資訊化增效率(對)。","B":"清楚定義職責(對)。","C":"績效考核激勵(對)。","D":"正確(本題答案)。不能減少照護重症病患。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"102110-N2-67":{"quick":"先設定計畫終止日期過期自動失效=日落預算。","detail":{"background":"預算種類:日落預算(sunset budget,先設定計畫的終止日期/落日條款,過了該日期計畫自動失效、須重新檢討才能延續)。題幹描述=日落預算(D正確)。零基、績效、固定預算皆非「設終止日期自動失效」。故日落預算(D)。護理生產力=產出÷投入(病人每日所需護理時數為參數);提升靠良好排班管理、資訊化、合理績效制度(非增人力/減重症/加班)。精實(lean)=以病人需求為核心、消除浪費、精簡流程(非裁人)。預算:傳統/增量(參考過去)、零基(從零不參考過去)、彈性(依業務量調整)、日落(落日條款過期失效)、經常門(日常支出)vs資本門(設備購置)。效率標準(投入需求量)vs效能標準(達成結果)。","options":{"A":"零基預算是從零編列。","B":"績效預算依績效。","C":"固定預算依固定項目。","D":"正確(本題答案)。設終止日期自動失效=日落預算。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"103030-N2-67":{"quick":"依業務實際變化調整的預算=彈性預算。","detail":{"background":"預算種類:彈性預算(flexible budget,依業務量/實際變化調整的預算)。「依據業務的實際變化而調整的預算」=彈性預算(C正確)。績效預算、日落預算、零基預算皆非「依業務變化調整」。故彈性預算(C)。護理生產力=產出÷投入(病人每日所需護理時數為參數);提升靠良好排班管理、資訊化、合理績效制度(非增人力/減重症/加班)。精實(lean)=以病人需求為核心、消除浪費、精簡流程(非裁人)。預算:傳統/增量(參考過去)、零基(從零不參考過去)、彈性(依業務量調整)、日落(落日條款過期失效)、經常門(日常支出)vs資本門(設備購置)。效率標準(投入需求量)vs效能標準(達成結果)。","options":{"A":"績效預算依績效。","B":"日落預算有落日條款。","C":"正確(本題答案)。依業務變化調整=彈性預算。","D":"零基預算從零編列。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"105090-N2-69":{"quick":"「不」屬護理人力資源管理目標=培訓考核護生。","detail":{"background":"護理人力資源管理目標:A提升工作生活品質、C建立符合法規的制度、D提高護理生產力。選項B「培訓、考核護生(學生)」不屬護理人力資源管理目標(本題答案)——HRM管理的是「機構的護理員工」,護生(實習學生)是學校的學生,非HRM對象。故B。護理生產力=產出÷投入(病人每日所需護理時數為參數);提升靠良好排班管理、資訊化、合理績效制度(非增人力/減重症/加班)。精實(lean)=以病人需求為核心、消除浪費、精簡流程(非裁人)。預算:傳統/增量(參考過去)、零基(從零不參考過去)、彈性(依業務量調整)、日落(落日條款過期失效)、經常門(日常支出)vs資本門(設備購置)。效率標準(投入需求量)vs效能標準(達成結果)。","options":{"A":"提升工作生活品質是HRM目標。","B":"正確(本題答案)。培訓考核護生非HRM目標。","C":"建立合法制度是HRM目標。","D":"提高生產力是HRM目標。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"106030-N2-66":{"quick":"提升護理單位生產力=實施合理的績效制度。","detail":{"background":"提升護理工作單位生產力:A「實施合理的績效制度(激勵員工、提高效率)」正確。B「甄選順從性高的護理師」、C「尋找優良學校畢業生」、D「增加單位多元服務種類」皆非「直接提升生產力」的有效策略。故實施合理績效制度(A)。護理生產力=產出÷投入(病人每日所需護理時數為參數);提升靠良好排班管理、資訊化、合理績效制度(非增人力/減重症/加班)。精實(lean)=以病人需求為核心、消除浪費、精簡流程(非裁人)。預算:傳統/增量(參考過去)、零基(從零不參考過去)、彈性(依業務量調整)、日落(落日條款過期失效)、經常門(日常支出)vs資本門(設備購置)。效率標準(投入需求量)vs效能標準(達成結果)。","options":{"A":"正確(本題答案)。合理績效制度提升生產力。","B":"甄選順從性高非提升生產力。","C":"優良學校畢業生非直接提升。","D":"增加多元服務非提升生產力。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"106111-N2-58":{"quick":"「不」是護理成本控制方法=將所有護理業務分項委外承包。","detail":{"background":"護理成本控制方法:A有效調動病房人力支援、B護理文書電腦化、D計算各項護理活動所需人力。選項C「將『所有』護理業務分項委外承包」不是護理成本控制方法(本題答案)——核心護理業務不可全部委外(影響品質與專業責任),委外非護理成本控制的正當方法。故C。","options":{"A":"調動人力支援是成本控制。","B":"文書電腦化是成本控制。","C":"正確(本題答案)。所有業務委外非成本控制方法。","D":"計算所需人力是成本控制。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"106111-N2-77":{"quick":"預算意義「錯誤」=作為個別薪資發放之依據。","detail":{"background":"預算對醫療機構的意義:A是收入與支出的計畫、B對預期績效提供指標、D需作部門間協調溝通。選項C「作為個別薪資發放之依據」錯誤(本題答案)——預算是「整體財務規劃」,個別薪資發放依「薪資制度/工作評價」,非依預算。故C。護理生產力=產出÷投入(病人每日所需護理時數為參數);提升靠良好排班管理、資訊化、合理績效制度(非增人力/減重症/加班)。精實(lean)=以病人需求為核心、消除浪費、精簡流程(非裁人)。預算:傳統/增量(參考過去)、零基(從零不參考過去)、彈性(依業務量調整)、日落(落日條款過期失效)、經常門(日常支出)vs資本門(設備購置)。效率標準(投入需求量)vs效能標準(達成結果)。","options":{"A":"預算是收支計畫(對)。","B":"預算提供績效指標(對)。","C":"正確(本題答案)。個別薪資發放非依預算。","D":"預算需部門間協調(對)。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"107030-N2-71":{"quick":"效率vs效能標準「錯誤」=評估投入人力達成的目標屬效率標準。","detail":{"background":"效率標準(efficiency,評估『投入』:人力財力的需求量/充足性)vs效能標準(effectiveness,評估『投入所達成的結果/目標』):A評估投入人力需求量=效率(對)、C評估投入財力充足性=效率(對)、D評估投入財力的執行結果=效能(對)。選項B「評估投入的人力所達成的『目標』屬效率標準」錯誤(本題答案)——「達成目標/結果」是『效能標準』,非效率標準。故B。","options":{"A":"投入人力需求量是效率標準(對)。","B":"正確(本題答案)。達成目標是效能標準,非效率。","C":"投入財力充足性是效率(對)。","D":"投入財力的執行結果是效能(對)。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"107110-N2-76":{"quick":"參考過去業務及用途擬訂預算=傳統預算。","detail":{"background":"預算編列方式:傳統(增量)預算(traditional/incremental,參考過去年度的業務及用途、在原基礎上增減編列)。「參考過去業務及用途擬訂預算」=傳統預算(B正確)。績效預算(依績效)、零基預算(從零不參考過去)、計畫預算皆非「參考過去」。故傳統預算(B)。","options":{"A":"績效預算依績效。","B":"正確(本題答案)。參考過去業務=傳統預算。","C":"零基預算從零不參考過去。","D":"計畫預算依計畫。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"109030-N2-62":{"quick":"護理部門預算編列=營運(1)+教育訓練(3)+品管(4)?本題答案B「234」。","detail":{"background":"本題官方答案「234」。護理部門常見預算編列內容:2學術研究費用、3教育訓練費用、4品管預算(及1營運預算)。選項5「藥品費用」屬藥劑部/醫療預算,非護理部門編列。本題以「234」為答案(排除藥品)。核心:護理部門預算含營運、教育、研究、品管,不含藥品。","options":{"A":"123組合非官方。","B":"正確(本題答案,234)。研究、教育訓練、品管。","C":"345含藥品不符。","D":"135含藥品不符。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"110110-N2-80":{"quick":"精實生產「錯誤」=精簡人力。","detail":{"background":"精實生產(lean,以病人需求為核心、消除浪費、精簡『流程』):A是精簡流程(對)、B促使員工有更多時間專注工作(對)、D以病人需求為核心(對)。選項C「精簡『人力』」錯誤(本題答案)——精實是「精簡流程、消除浪費」,非「裁減人力」(精簡流程後員工可更專注於有價值的工作)。故C。","options":{"A":"精實是精簡流程(對)。","B":"促員工專注工作(對)。","C":"正確(本題答案)。精實精簡流程非精簡人力。","D":"以病人需求為核心(對)。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"111110-N2-59":{"quick":"精實應用於醫療=以病人需求為核心。","detail":{"background":"精實(lean)應用於醫療:D「以病人需求為核心(消除浪費、創造價值)」正確。A「改造結構創造價值」敘述不當(是改造流程非結構);B「增加步驟改善流程」錯(精實是『減少』步驟/浪費);C「精簡人力降低成本」錯(精實是精簡流程非裁人)。故D。","options":{"A":"精實是改造流程非結構。","B":"精實是減少步驟,非增加。","C":"精實精簡流程非精簡人力。","D":"正確(本題答案)。精實以病人需求為核心。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"112030-N2-78":{"quick":"「不」屬經常性支出預算=購置醫療設備費。","detail":{"background":"經常性(經常門)支出預算:A護理教育訓練費、B護理人員加班費、D文具紙張用品費(日常經常性支出)。選項C「購置醫療設備費」不屬經常性支出(本題答案)——購置設備屬「資本門(資本支出)預算」,非經常性支出。故C。護理生產力=產出÷投入(病人每日所需護理時數為參數);提升靠良好排班管理、資訊化、合理績效制度(非增人力/減重症/加班)。精實(lean)=以病人需求為核心、消除浪費、精簡流程(非裁人)。預算:傳統/增量(參考過去)、零基(從零不參考過去)、彈性(依業務量調整)、日落(落日條款過期失效)、經常門(日常支出)vs資本門(設備購置)。效率標準(投入需求量)vs效能標準(達成結果)。","options":{"A":"教育訓練費是經常性支出。","B":"加班費是經常性支出。","C":"正確(本題答案)。購置設備屬資本門,非經常性。","D":"文具用品費是經常性支出。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"112110-N2-73":{"quick":"提升護理生產力=良好的排班管理。","detail":{"background":"提升護理生產力:C「良好的排班管理(合理配置人力、提高效率)」正確。A「提高三班護病比」錯(護病比過高=一人照顧太多病人,降低品質);B「使用紙本護理紀錄」錯(應電腦化提升效率);D「安排每日加班」錯(加班增成本、致疲憊,非提升生產力)。故C。","options":{"A":"提高護病比降低品質。","B":"紙本紀錄效率低。","C":"正確(本題答案)。良好排班管理提升生產力。","D":"每日加班增成本致疲憊。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"115030-N2-47":{"quick":"護理生產力=病人每日所需護理時數為其參數之一。","detail":{"background":"護理生產力(nursing productivity,產出÷投入):B「病人每日所需護理時數為護理生產力參數之一」正確。A「指病人得到的照顧品質量」敘述不完整(生產力是產出/投入比);C「提升方法是增加人力及投入時間」錯(增加投入不等於提升生產力,應提高效率);D「投入時間與資源應用是『工作效益』指標」——投入是『效率』面。故B。","options":{"A":"生產力是產出/投入,非僅品質量。","B":"正確(本題答案)。護理時數是生產力參數之一。","C":"增加投入非提升生產力(應提效率)。","D":"投入是效率面,敘述須對應。"},"sources":["新文京《護理行政》護理生產力與成本","華杏《護理行政學》精實管理"]}},"101030-N2-51":{"quick":"兒子晚上問CT結果:已聯繫值班醫師由值班醫師解釋。","detail":{"background":"李先生兒子晚上8點想了解父親CT結果,護理師適當回應=D「已聯繫值班醫師,由值班醫師向您解釋檢查結果」——病情/檢查結果告知是『醫師』職責,護理師應協助聯繫醫師說明。A護理師直接告知腫塊(逾越職責)、B拿病歷自行解釋(逾越)、C「明天再說也不晚」(忽視家屬需求)皆不當。故D。","options":{"A":"護理師直接告知病情逾越職責。","B":"護理師拿病歷解釋逾越職責。","C":"「明天再說」忽視家屬需求。","D":"正確(本題答案)。聯繫值班醫師說明。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"101030-N2-58":{"quick":"減薪降級要求績效=脅迫(coercive)影響力。","detail":{"background":"Glueck七種影響力:專技(expert)、資料(information)、脅迫(coercive,以懲罰威脅)、敬仰(respect)、合法、獎酬、關聯。「採減薪或降級的方式要求達到績效」=脅迫(coercive)影響力(C正確,以懲罰威脅)。故脅迫(C)。","options":{"A":"專技是專業知識。","B":"資料是掌握資訊。","C":"正確(本題答案)。減薪降級威脅=脅迫影響力。","D":"敬仰是受尊敬。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"102030-N2-62":{"quick":"大量傷患「較不適當」=資訊不足下仍應立即做決定。","detail":{"background":"大量傷患處理:A建立通報系統讓上級知情、B對支援人力分工組織行動、D由適當發言人掌控媒體。選項C「雖在資訊不足情況下,仍應立即做決定」較不適當(本題答案)——重大決策應「儘量收集足夠資訊再決定」,資訊不足下貿然決定風險高(緊急『分流救治』可快速,但重大決策不宜資訊不足下倉促)。故C。","options":{"A":"建立通報系統適當。","B":"人力分工組織適當。","C":"正確(本題答案)。資訊不足仍立即決定較不適當。","D":"發言人掌控媒體適當。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"102110-N2-63":{"quick":"通過N4即加薪=獎勵影響力。","detail":{"background":"機構「明定通過進階制度N4考核即可加薪」=獎勵(reward)影響力(D正確,以給予報酬/加薪激勵)。榜樣、脅迫(懲罰)、資料皆非「加薪獎勵」。故獎勵(D)。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"榜樣是典範效法。","B":"脅迫是懲罰威脅。","C":"資料是掌握資訊。","D":"正確(本題答案)。通過考核加薪=獎勵影響力。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"103030-N2-63":{"quick":"安排工作順序第一優先=病人照護與治療。","detail":{"background":"臨床護理師安排工作順序,「第一優先」是「病人照護與治療(A)」——以病人安全與照護需求為最優先。累積在職教育積分、財產點班庫房管理、準備評鑑資料皆非「第一優先」(病人照護優先於行政庶務)。故病人照護與治療(A)。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"正確(本題答案)。第一優先=病人照護與治療。","B":"在職教育積分非第一優先。","C":"財產點班非第一優先。","D":"準備評鑑資料非第一優先。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"105030-N2-36":{"quick":"新人因病逝想起爺爺哭泣:同仁彈性支援讓其抒發情緒。","detail":{"background":"到職半年新人因病人病逝想起過世爺爺哭泣,同事當下因應=B「同仁彈性支援照護工作,讓其抒發情緒」——先給予情緒支持與空間。A告知不要帶情緒(否定)、C建議加強情緒管理訓練(說教、非當下)、D鼓勵正向投入工作(壓抑情緒)皆非當下最適。故B。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"告知不要帶情緒是否定。","B":"正確(本題答案)。彈性支援讓其抒發情緒。","C":"建議訓練非當下所需。","D":"鼓勵投入工作壓抑情
