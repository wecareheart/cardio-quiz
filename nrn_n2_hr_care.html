緒。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"105030-N2-65":{"quick":"評鑑想了解品質監測指標及監測機制=護理照護品質。","detail":{"background":"評鑑委員「想了解單位有哪些品質監測指標、如何落實監測、觀察紀錄與病人需求關聯」=想了解「護理照護品質」(A正確,品質指標與監測機制屬品質面)。護理經營管理、護理人力資源管理、護生實習成效皆非「品質監測指標」對應。故護理照護品質(A)。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"正確(本題答案)。品質監測指標機制=護理照護品質。","B":"護理經營管理偏管理面。","C":"護理人力資源管理偏人力。","D":"護生實習成效偏教學。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"106030-N2-65":{"quick":"我國最高衛生行政機關=衛生福利部。","detail":{"background":"我國現行最高衛生行政機關為「衛生福利部(衛福部)」(D正確)。國民健康署是衛福部所屬機關、衛生局是地方衛生機關、勞動部主管勞動事務。故衛生福利部(D)。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"國民健康署是衛福部所屬機關。","B":"衛生局是地方機關。","C":"勞動部主管勞動。","D":"正確(本題答案)。最高衛生行政機關=衛生福利部。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"106110-N2-73":{"quick":"要求每月4小時義工服務、員工配合=強制權。","detail":{"background":"單位主管「要求每位員工每月須從事4小時義工服務,員工雖不滿仍配合」——以職權強制要求(若不從恐受處分)=強制權(coercive power)(C正確)。參考權(榜樣)、獎賞權(獎勵)、專家權(專業)皆非「強制要求」。故強制權(C)。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"參考權是榜樣典範。","B":"獎賞權是給予獎勵。","C":"正確(本題答案)。強制要求=強制權。","D":"專家權是專業知識。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"107110-N2-80":{"quick":"醫院評鑑正確=以病人為焦點的查證方式。","detail":{"background":"醫院評鑑:C「以病人為焦點的查證方式(patient focus method,PFM,追蹤病人就醫經歷查證照護)」正確。A「醫院評鑑分5類、教學醫院3類」敘述須對應;B「醫學中心全日平均護病比≦10」敘述須對應;D「著重病人量與健保支付點數」錯(評鑑著重品質與安全,非病人量與健保點數)。故C。","options":{"A":"評鑑分類敘述須對應。","B":"護病比敘述須對應。","C":"正確(本題答案)。以病人為焦點查證(PFM)。","D":"評鑑著重品質安全,非病人量健保點數。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"108110-N2-37":{"quick":"頭部外傷腦水腫優先點滴=D5S?本題答案C(此題屬臨床B6,官方答案C)。","detail":{"background":"本題為臨床點滴溶液選擇(歸於人力站係分類所致)。頭部外傷併腦水腫、顱內壓升高,應避免「低張溶液(D5W會變自由水加重腦水腫)」,選等張溶液。本題官方答案C(D5S)。臨床上腦水腫/顱內壓升高常用「Normal saline(等張)」維持,避免D5W;本題以官方C為準。核心:腦水腫避免低張/自由水溶液。","options":{"A":"0.45% saline低張,不宜腦水腫。","B":"D5W變自由水加重腦水腫。","C":"正確(本題答案)。官方答案D5S。","D":"Normal saline亦為等張選擇。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"108110-N2-61":{"quick":"減薪降級或解僱達績效=脅迫影響力。","detail":{"background":"單位主管「利用減薪、降級或解僱的方式達到行政管理績效」=脅迫(coercive)影響力(C正確,以懲罰威脅)。資訊、專技、獎酬皆非「以懲罰威脅」。故脅迫(C)。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"資訊是掌握資訊。","B":"專技是專業知識。","C":"正確(本題答案)。減薪降級解僱=脅迫影響力。","D":"獎酬是給予報酬。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"109030-N2-73":{"quick":"占床率低要求拿休假不來上班=合法權。","detail":{"background":"單位占床率低時,管理者「要求護理人員拿休假不必來上班(在不違背勞基法下)」——依職權合法安排休假=合法權(legitimate power)(D正確,基於職位職權)。連結權、專家權、參考權皆非「依職位職權安排」。故合法權(D)。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"連結權是人脈關係。","B":"專家權是專業知識。","C":"參考權是榜樣。","D":"正確(本題答案)。依職權安排休假=合法權。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"109110-N2-80":{"quick":"醫院評鑑實地訪查正確=決定優先查證(1)+PFM(2)+案例追蹤?本題答案A「123」。","detail":{"background":"本題官方答案A(123)。醫院評鑑實地訪查:1決定優先查證重點、2以病人為焦點的查證方式(PFM)、3案例追蹤(及相關正確項)。核心:評鑑訪查以病人為焦點、追蹤案例、聚焦優先查證重點。作答以官方A為準。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"正確(本題答案,123)。優先查證、PFM、案例追蹤。","B":"124不符。","C":"134不符。","D":"234不符。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"110030-N2-71":{"quick":"高度專業知識技能贏得信從=專家影響力。","detail":{"background":"影響力種類:專家(expert)影響力——因「個人擁有高度專業知識技能而贏得部屬尊敬和信從」(B正確)。榜樣(典範效法)、獎勵(給報酬)、合法(職位)皆非「以專業知識贏得信從」。故專家影響力(B)。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"榜樣影響力是典範效法。","B":"正確(本題答案)。專業知識贏得信從=專家影響力。","C":"獎勵影響力是給報酬。","D":"合法影響力是職位。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"110030-N2-76":{"quick":"評鑑結果面指標=加護病房病人血流感染率。","detail":{"background":"Donabedian評鑑指標分結構/過程/結果。「結果面(outcome)指標」=反映病人最終結果者:B「加護病房病人血流感染率(病人感染結果)」(B正確)。A中央靜脈導管換藥正確性(過程)、C護理指導完整率(過程)、D手術同意書填寫完整率(過程/結構)皆非結果面。故血流感染率(B)。","options":{"A":"換藥正確性是過程面。","B":"正確(本題答案)。血流感染率是結果面指標。","C":"護理指導完整率是過程面。","D":"同意書填寫率是過程面。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"111110-N2-62":{"quick":"霍桑實驗結論=非正式團體對員工工作態度具控制力。","detail":{"background":"Mayo-Roethlisberger霍桑實驗結論:C「非正式團體(群體規範)對員工工作態度具控制力」正確(發現人際/社會因素的影響力)。A「物質條件對員工有極大影響」錯(霍桑發現『社會心理因素』比物質條件更影響);B「員工常對特定事實提出抱怨」非主要結論;D「社會變動是無法抗拒的干擾」非結論。故C。","options":{"A":"霍桑發現社會心理因素比物質更重要。","B":"非主要結論。","C":"正確(本題答案)。非正式團體對工作態度有控制力。","D":"非霍桑結論。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"112030-N2-76":{"quick":"控制幅度正確=可依單位績效高低調整組織控制幅度。","detail":{"background":"控制幅度(span of control):A「可依單位績效高低調整控制幅度(績效好可擴大)」正確。B「能力有限控制幅度不宜擴大」(此項亦合理,但本題以A為正解);C「控制幅度大能有效掌握資訊提升效率」錯(幅度大反而較難掌握);D「控制幅度小會顧此失彼影響目標」錯(幅度小反而能仔細監督)。故A。","options":{"A":"正確(本題答案)。可依績效調整控制幅度。","B":"能力有限不宜擴大(本題正解A)。","C":"幅度大較難掌握資訊。","D":"幅度小能仔細監督,非顧此失彼。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"112110-N2-1":{"quick":"護理專業化趨勢「錯誤」=產兒照護人口增加。","detail":{"background":"台灣現階段護理專業化角色及趨勢:A管理式照護模式漸增、C發展進階護理角色(NP)、D重視實證及資訊化護理。選項B「產兒照護人口增加」錯誤(本題答案)——少子化下「產兒照護人口『減少』」,並非專業化趨勢。故B。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"管理式照護漸增是趨勢。","B":"正確(本題答案)。少子化致產兒人口減少,非增加。","C":"發展進階護理角色是趨勢。","D":"重視實證資訊化是趨勢。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"112180-N2-38":{"quick":"提升護理專業形象=以證據說明護理專業意見,提供正確判斷。","detail":{"background":"提升護理專業價值/形象:B「以證據(實證)說明護理專業意見,提供醫療團隊正確的判斷」正確。A「列學位頭銜獲尊敬」(形式)、C「要求其他單位配合護理部」(本位主義)、D「人力不足仍配合開新病房」(犧牲品質安全)皆非提升專業價值的正當方式。故B。","options":{"A":"列頭銜是形式,非實質專業價值。","B":"正確(本題答案)。以實證提供正確判斷。","C":"要求他人配合是本位主義。","D":"人力不足開病房犧牲安全。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"112180-N2-47":{"quick":"新人找preceptor討論改進知識技能:用專家權。","detail":{"background":"新進護理師找臨床教師(preceptor)討論「須改進的知識及技能」,preceptor應用「專家(expert)權」——以專業知識技能指導(D正確)。資訊權、強制權(懲罰)、獎勵權皆非「以專業指導」。故專家權(D)。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"資訊權是掌握資訊。","B":"強制權是懲罰。","C":"獎勵權是給報酬。","D":"正確(本題答案)。以專業指導=專家權。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"113030-N2-40":{"quick":"新建大樓需變更科別,護理主任優先=收集資料分析確立可能問題。","detail":{"background":"醫院新建大樓、病房需變更科別/縮減床位,護理主任為因應改變「優先執行」=B「收集資料、分析及確立可能出現的問題」——變革管理應先評估現況、預判問題(解凍期),才能規劃後續。A擬訓練、C調整配置、D建目標皆是「評估問題後」的措施。故B。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"擬訓練是評估後措施。","B":"正確(本題答案)。優先收集資料分析確立問題。","C":"調整配置是評估後。","D":"建立目標是評估後。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"113100-N2-48":{"quick":"占床率下降請護理師支援他病房=法統影響力。","detail":{"background":"因疫情占床率下降,護理長「請護理師支援其他病房護理工作」——依職位職權合法調度=法統(legitimate)影響力(D正確,基於職位的合法權力)。強制(懲罰)、資訊、專家皆非「依職位合法調度」。故法統影響力(D)。影響力/權力(Glueck/French-Raven):合法/法統(職位)、獎酬(加薪獎勵)、脅迫/強制(減薪降級解僱懲罰)、專家/專技(專業知識)、榜樣/參考(典範)、資訊。病情/檢查結果告知是醫師職責(護理師協助聯繫)。我國最高衛生行政=衛生福利部。醫院評鑑以病人為焦點查證(PFM)、Donabedian結構/過程/結果(感染率=結果面)。霍桑實驗:非正式團體對工作態度有控制力。","options":{"A":"強制影響力是懲罰威脅。","B":"資訊影響力是掌握資訊。","C":"專家影響力是專業知識。","D":"正確(本題答案)。依職位調度支援=法統影響力。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"114100-N2-44":{"quick":"危機/緊急災難應變「最不適當」=參照醫院規模決定是否訂定應變計畫。","detail":{"background":"醫療機構危機/緊急災難應變:A事前風險管理與危害分析、B訂定預防措施權責分工教育訓練演練、C事故時降低傷害並檢討原因。選項D「參照醫院規模大小決定是否訂定緊急災難應變計畫與演練」最不適當(本題答案)——「所有醫療機構不論規模大小,都應訂定緊急災難應變計畫並演練」,非依規模決定是否訂定。故D。","options":{"A":"事前風險管理危害分析(適當)。","B":"訂預防措施權責分工(適當)。","C":"事故降低傷害檢討原因(適當)。","D":"最不適當(本題答案)。所有醫院都應訂應變計畫,非依規模決定。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"115030-N2-46":{"quick":"ICN正向執業環境要素=本題答案C「34567」。","detail":{"background":"本題官方答案C(34567)。國際護理協會(ICN)推動的正向執業環境(Positive Practice Environments)包含多項要素(如職業安全衛生、合理工作量、專業發展、薪酬合理、員工參與、領導支持等)。本題以選項「34567」為正確要素組合。作答以官方C為準。核心:正向執業環境涵蓋安全、合理工作量、專業發展、支持性領導等。","options":{"A":"23456組合非官方。","B":"14678不符。","C":"正確(本題答案,34567)。ICN正向執業環境要素。","D":"12358不符。"},"sources":["新文京《護理行政》護理專業與評鑑","華杏《護理行政學》權力與醫院評鑑"]}},"105090-N2-66":{"quick":"從合格者選出最能勝任者=甄選。","detail":{"background":"人力資源流程:招募(recruitment,吸引合格應徵者)→甄選(selection,從合格者中『選出最能勝任』者)→僱用。「從合格的護理師中,選出最能勝任者」=甄選(C正確)。僱用(錄用)、招募(吸引應徵)、約聘皆非「選出最能勝任」。故甄選(C)。","options":{"A":"僱用是錄用階段。","B":"招募是吸引應徵者。","C":"正確(本題答案)。選出最能勝任者=甄選。","D":"約聘是聘僱形式。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"110110-N2-70":{"quick":"護理師考試目的「錯誤」=利於管控執業人數。","detail":{"background":"國家辦理「護理師」考試的目的:A證明執業能力、B依法提供就業保障、C提供民眾辨識專業資格。選項D「利於管控護理從業人員的執業人數」錯誤(本題答案)——國家考試是「確認專業能力資格、保障民眾安全」,非為「管控執業人數」(人數由市場供需決定)。故D。","options":{"A":"證明執業能力是目的。","B":"提供就業保障是目的。","C":"提供民眾辨識資格是目的。","D":"正確(本題答案)。管控執業人數非考試目的。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}},"114030-N2-42":{"quick":"缺勤率=0.25%。本題答案B。","detail":{"background":"本題官方答案B(0.25%)。缺勤率=(缺勤總時數/天數÷應出勤總時數/天數)×100%=請假總天數÷(員工數×每人工作天數)×100%=60÷(100×240)×100%=60÷24000×100%=0.25%。故0.25%(B)。招募:內部(升遷調動,優點熟悉激勵、缺點升遷鬥爭)、外部(新血但融入慢)。甄選=從合格者選最勝任者。流動率=離職數÷平均在職數×100%(理想5-10%);缺勤率=請假天數÷(員工數×工作天數)。工作說明書(職務責任職權條件,作考核依據)、工作評價(評職務相對價值)。工作設計:工作擴大(水平增量)、工作輪調(水平換職務)、工作豐富(垂直增責任)、工作再設計(重定義職責)。","options":{"A":"0.10%不符。","B":"正確(本題答案)。60÷(100×240)=0.25%。","C":"1.00%不符。","D":"2.50%不符。"},"sources":["新文京《護理行政》","華杏《護理行政學》"]}}},TO=["1護理人力配置與護理時數計算", "2護理人員排班", "3護理照護模式", "4臨床專業能力進階制度與技能發展", "5績效考核與考核偏誤", "6招募甄選人員流動與工作設計", "7教育訓練與生涯發展", "8勞動法規與職業安全衛生", "9護理生產力成本與精實管理", "10護理專業發展醫院評鑑與權力影響力"],LEC={"1護理人力配置與護理時數計算":{"html":"\n<p><b>護理時數公式:</b>每位病人每天護理時數=(護理人員數×每日工時×實際上班天數)÷(占床數×365);<b>占床數</b>=床數×占床率;<b>實際上班天數</b>=365−國定例假−年休−公假等;<b>休假係數</b>=365÷實際上班天數。所需護理人力=每日總護理時數÷工時×休假係數。</p>\n<p><b>護理時數分類:</b>直接(直接照護:灌腸、給藥、換藥)＋間接(書寫、準備用物)＋相關＋個人時間=總護理時數。</p>\n<p><b>病人分類系統</b>預測病人護理需求與所需人力(非作收費標準、非預後指標)。三班人力比例白班:小夜:大夜≈<b>5:3:2</b>(白班最多)。</p>\n"},"2護理人員排班":{"html":"\n<p><b>排班類型:</b><b>集權式</b>(護理部統一排)、<b>分權式</b>(單位護理長排、配合單位特性)、<b>自我排班法</b>(員工依共同原則自行協調,提升自主、降低換班與離職)、循環/週期式(固定週期循環)。</p>\n<p><b>排班原則:</b>應<b>優先考量病人需求</b>;依勞動基準法<b>7休1</b>(不可連上11天)、輪班間隔11小時、懷孕不排夜班。緊急大量傷患由<b>最高主管集權統一</b>調度最快。排班不應作獎懲工具、應保有彈性。</p>\n"},"3護理照護模式":{"html":"\n<p><b>功能性護理</b>(functional):按技術/任務分工(專人量血壓、專人給藥),效率高、省人力、缺個別性 → 適新人多、人力不足、占床高。</p>\n<p><b>成組護理</b>(team):資深帶資淺、護生護佐團隊照一組病人 → 適資深少資淺多。</p>\n<p><b>全責/主護護理</b>(primary):一位護理師對病人負<b>全責</b>,提供整體、連續、個別照護,自主與責任感高、人事成本高、品質好 → 適資深充足、<b>隔離病房</b>(減人員進出)。</p>\n<p><b>個案護理</b>(當班一對一)、<b>技術混合</b>(護理師＋護佐搭配)。</p>\n"},"4臨床專業能力進階制度與技能發展":{"html":"\n<p><b>臨床專業能力進階制度:</b>N(新進)→N1(一般照護)→N2(<b>重症照護</b>、案例分析報告)→N3(<b>臨床教學</b>、教與學)→N4(<b>護理行政及研究</b>、護理專案/研究報告)。</p>\n<p><b>Benner技能發展五階段:</b>生手(novice)→進階學習者(advanced beginner)→<b>勝任</b>(competent,約2-3年、能訂計畫但缺全面性判斷)→精通(proficient)→專家(expert,憑直覺整體判斷)。進階學習者無法區分輕重緩急 → 給<b>清楚指令</b>協助判斷。</p>\n"},"5績效考核與考核偏誤":{"html":"\n<p><b>考核偏誤:</b><b>月暈/光圈</b>(以單一優點概括變好)、<b>觸角</b>(以單一缺點概括變差)、<b>向日葵</b>(主管全給高分彰顯領導)、中央趨勢/集中(都給中間)、<b>霍桑</b>(知道被考核而刻意表現)、近因(以近期表現)、<b>膨脹壓力/寬大</b>(怕負評而給高分)。</p>\n<p><b>考評標準:</b>絕對標準(依固定標準評定、不與他人比較)、相對標準(排列比較排序)。</p>\n<p><b>考核方法:</b>檢查表/查核法(僅勾選有無、不判程度)、評核尺度法(評程度)、重要事件法(記錄具體事件事實)、360度(主管+自評+同儕+顧客多方來源)。最初考核者=<b>直屬主管</b>;考核應回饋結果、鼓勵員工參與。</p>\n"},"6招募甄選人員流動與工作設計":{"html":"\n<p><b>招募:</b>內部招募(升遷調動,優點熟悉激勵、<b>缺點升遷鬥爭</b>);外部招募(帶新血但融入慢)。<b>甄選</b>=從合格者中選出最能勝任者。</p>\n<p><b>流動率</b>=該期離職數÷該期平均在職數×100%(理想<b>5~10%</b>);<b>缺勤率</b>=請假天數÷(員工數×工作天數)×100%。</p>\n<p><b>文件:</b>工作說明書(職務責任、職權、所需條件,作考核依據)、工作評價(評定職務相對價值,作調派薪資依據)。</p>\n<p><b>工作設計:</b>工作擴大化(水平增加工作量)、<b>工作輪調</b>(水平換職務、職稱不變)、工作豐富化(垂直增加責任決策)、工作再設計(重新定義職責職權)。</p>\n"},"7教育訓練與生涯發展":{"html":"\n<p><b>教育訓練:</b>規劃課程首要=<b>評估學習需求</b>;到職/職前訓練(宗旨理念、單位專科知識、職責)、在職教育、<b>交叉訓練</b>(支援屬性相似單位)、preceptor臨床教師培育。教育訓練目的=協助角色適應、提升能力、減少疲潰(非作考核依據)。</p>\n<p><b>教學評量:</b><b>OSCE</b>(客觀結構式臨床測驗,綜合臨床能力)、<b>DOPS</b>(直接觀察操作技術,最能評量實作能力)。</p>\n<p><b>生涯規劃步驟:</b>自我瞭解→<b>職涯評估</b>(了解各職業性質特色所需能力)→設定目標→擬訂方案。</p>\n"},"8勞動法規與職業安全衛生":{"html":"\n<p><b>勞動基準法:</b>每日正常工時8小時、每兩週不超<b>84小時</b>、延長工時連同正常<b>1日不超12小時</b>、<b>7休1</b>、輪班間隔11小時;曠工連續3日或1個月內6日,雇主得不經預告終止契約、不發資遣費。</p>\n<p><b>性別工作平等法:</b>產假8週、陪產(檢)假、育嬰留職停薪(子女滿3歲前)、<b>哺乳/集乳時間每日另給60分鐘</b>(視為工作時間)。</p>\n<p><b>職業災害</b>要件:勞工身分＋與執行職務有關＋致傷病(不含教育訓練)。<b>一般健檢:</b>未滿40歲每5年、40-65歲每3年、65歲以上每年。<b>人因性職業傷害</b>=靜脈曲張/背扭傷/椎間盤(肌肉骨骼,非自律神經失調)。</p>\n"},"9護理生產力成本與精實管理":{"html":"\n<p><b>護理生產力</b>=產出÷投入(病人每日所需護理時數為參數之一);提升靠<b>良好排班管理、資訊化、合理績效制度</b>(非增人力、非減重症、非加班)。</p>\n<p><b>精實(lean)管理:</b>以<b>病人需求為核心</b>、消除浪費、<b>精簡流程</b>(非裁減人力)。</p>\n<p><b>預算:</b>傳統/增量(參考過去)、零基(從零、不參考過去)、彈性(依業務量調整)、日落(落日條款、過期自動失效);經常門(教育訓練、加班、文具等日常支出)vs資本門(設備購置)。效率標準(評投入需求量)vs效能標準(評達成結果)。</p>\n"},"10護理專業發展醫院評鑑與權力影響力":{"html":"\n<p><b>權力/影響力</b>(French-Raven/Glueck):合法/法統(職位)、獎酬(加薪獎勵)、<b>脅迫/強制</b>(減薪、降級、解僱等懲罰)、<b>專家/專技</b>(專業知識技能)、榜樣/參考(典範效法)、資訊。</p>\n<p><b>病情/檢查結果告知</b>是醫師職責,護理師應協助聯繫醫師說明,不可逾越。<b>我國最高衛生行政機關</b>=衛生福利部。</p>\n<p><b>醫院評鑑</b>以病人為焦點查證(PFM,追蹤病人就醫經歷);Donabedian結構/過程/結果(<b>感染率、滿意度=結果面</b>;換藥正確率、指導完整率=過程面;人力資格、設備=結構面)。霍桑實驗結論:非正式團體對員工工作態度有控制力。</p>\n"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n2_a2_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
