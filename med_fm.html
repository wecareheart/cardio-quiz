ction）"},"answer":"C","corrected":false,"correction_note":"","id":"107080-71","topic":"健康行為與生活型態（戒菸/肥胖減重/酒精/運動/營養/骨鬆危險因子）","accepted_answers":["C"],"answer_status":"正常","q_num":71,"src":"民國107年第二次","img":""},{"exam_code":"107080","roc_year":107,"ad_year":2018,"exam_round":"第二次","num":79,"stem":"78歲的連先生在接受大腸鏡檢查時，被診斷罹患大腸癌，初步評估應該屬於早期。當主治醫師吳醫師想將病 理檢查結果告知連老先生時，連老先生的家屬要求吳醫師隱瞞病情，並幫連老先生決定了拒絕進一步的檢查 及治療。吳醫師應如何處理較為合適？","options":{"A":"先詢問連老先生是否想知道自己的病情，如果連老先生想了解自己的病情，即使其家屬反對醫師告知病 情，仍然應該向連老先生告知相關病情","B":"先詢問連老先生是否想知道自己的病情，如果連老先生並不想了解自己的病情，就不要再施予任何檢查或 者治療","C":"連老先生的家屬已經明白表示不要將相關的病情告知連老先生，因此不必再詢問連老先生的意願，而應該 按照其家屬的請求隱瞞病情，同時不要再施予任何檢查或治療","D":"連老先生的家屬已經明白表示不要將相關的病情告知連老先生，因此應該按照其家屬的請求而隱瞞病情。 然而其家屬所做的醫療決定不利於連老先生的最佳利益，因此醫師應該依照醫療常規，幫連老先生繼續相 關的檢查及治療"},"answer":"A","corrected":false,"correction_note":"","id":"107080-79","topic":"醫學倫理與醫事法律（告知同意/保密/DNR・安寧條例・病主法/醫師法醫療法/研究倫理）","accepted_answers":["A"],"answer_status":"正常","q_num":79,"src":"民國107年第二次","img":""},{"exam_code":"108030","roc_year":108,"ad_year":2019,"exam_round":"第一次","num":68,"stem":"75歲具高中教育程度的男性病人，因高血壓及糖尿病的追踪治療前來就診，同時陳述最近一個月接連發生兩 次的跌倒，為他進行周全性老年評估，下列各類評估的敘述何者正確?","options":{"A":"需使用迷你心智狀態檢查（MMSE）進行心智狀態的評估，若得分在24分以下就屬於異常","B":"需使用老年憂鬱量表（GDS-15）來進行憂鬱症評估，若總分在4分以下為正常，超過8分就算有憂鬱症","C":"可使用迷你營養評估量表（MNA）來進行營養評估，若總分高於10分，表示可能有營養不良，需進一步提 供營養諮詢","D":"可使用巴氏量表來進行日常生活功能評估，若得分在31～60分屬於輕度失能"},"answer":"A","corrected":false,"correction_note":"","id":"108030-68","topic":"老年醫學（周全評估/衰弱/跌倒/尿失禁/壓瘡/老化生理/多重用藥/老人虐待）","accepted_answers":["A"],"answer_status":"正常","q_num":68,"src":"民國108年第一次","img":""},{"exam_code":"108030","roc_year":108,"ad_year":2019,"exam_round":"第一次","num":71,"stem":"就實證醫學（evidence-based medicine）的證據層級比較而言，下列不同的研究型態，何者的層級是最高 的？","options":{"A":"世代研究（cohort study）","B":"專家意見（expert opinion）","C":"統合分析（meta-analysis）","D":"個案對照研究（case-control study）"},"answer":"C","corrected":false,"correction_note":"","id":"108030-71","topic":"實證醫學與篩檢統計（研究設計/OR・RR・NNT/統合分析/敏感度特異度）","accepted_answers":["C"],"answer_status":"正常","q_num":71,"src":"民國108年
