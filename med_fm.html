s":"多重答案(均給分)","q_num":1,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":2,"stem":"下列何者是可以調節的（modifiable）骨鬆危險因子？","options":{"A":"年老","B":"抽菸","C":"女性","D":"一等親屬骨折史"},"answer":"B","corrected":false,"correction_note":"","id":"115020-02","topic":"健康行為與生活型態（戒菸/肥胖減重/酒精/運動/營養/骨鬆危險因子）","accepted_answers":["B"],"answer_status":"正常","q_num":2,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":3,"stem":"王先生，68 歲，罹患晚期轉移性肺癌，近一週因無法口服進食而改由鼻胃管灌食，目前住進安寧病房。原先 使用口服長效嗎啡控制慢性骨轉移疼痛已有良好效果。今日因疾病惡化無法再吞嚥藥物，但仍持續表示疼痛 「像刀割一樣痛到睡不著」。如果身為安寧病房醫療團隊住院醫師，下一步最適當的疼痛處理策略為何？","options":{"A":"停用嗎啡，改以NSAIDs 貼片治療以減少副作用","B":"改為嗎啡靜脈輸注或皮下持續給藥，並依先前口服劑量進行等效轉換","C":"改開口服短效嗎啡並囑咐家屬協助灌食時服用","D":"延後止痛藥物調整，先以抗焦慮藥物處理情緒與失眠"},"answer":"B","corrected":false,"correction_note":"","id":"115020-03","topic":"安寧緩和與末期照護（疼痛/呼吸困難/惡體質/末期營養）","accepted_answers":["B"],"answer_status":"正常","q_num":3,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":66,"stem":"有關老人的衰弱症（frailty）及肌少症（sarcopenia）測量，下列敘述何者錯誤？","options":{"A":"骨骼肌量測量可使用雙能量X 光吸收儀（DXA）測量","B":"肌力測量可使用握力器測量手部握力（grip strength）","C":"活動力表現可測量走路速度（gait speed）","D":"肌耐力測量可計算連續半身仰臥起坐（partial curl-up）的次數"},"answer":"D","corrected":false,"correction_note":"","id":"115020-66","topic":"老年醫學（周全評估/衰弱/跌倒/尿失禁/壓瘡/老化生理/多重用藥/老人虐待）","accepted_answers":["D"],"answer_status":"正常","q_num":66,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":72,"stem":"這張流程圖最適用於下列何者？","options":{"A":"Person centered primary care model","B":"Disease oriented primary care model","C":"Artificial integrated primary care model","D":"Community oriented primary care model"},"answer":"D","corrected":false,"correction_note":"","id":"115020-72","topic":"健康政策與基層醫療特性（健保/primary care continuity・comprehensive・coordinated）","accepted_answers":["D"],"answer_status":"正常","q_num":72,"src":"民國115年第一次","img":"115020_q72_1.png"},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":73,"stem":"許多心臟病末期病人都有植入心律調節器（pacemakers）和植入式心臟去顫器（implantable cardioverter- defibrillators, ICDs）。關於使用上述裝置的描述，何者最不適當？","options":{"A":"心律調節器被認為可能延長生命的終點","B":"停用心律調節器可能會導致心絞痛或呼吸困難","C":"ICDs 會引起類似電擊的疼痛，並被認為與急救過程的電擊一樣令人不舒服","D":"在植入ICDs 裝置的部位，放置一塊約ICDs 大小的磁鐵，可以使ICDs 暫時失效無法電擊"},"answer":"A","corrected":false,"correction_note":"","id":"115020-73","topic":"安寧緩和與末期照護（疼痛/呼吸困難/惡體質/末期營養）","accepted_answers":["A"],"answer_status":"正常","q_num":73,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":80,"stem":"陳老太太75 歲，因腹部腫瘤入院檢查，其家人擔心若診斷為癌症會影響病人心情，要求不告知壞消息，病人 則希望知道結果。今檢查顯示為肝癌末期，下列敘述何者錯誤？","options":{"A":"基於「尊重自主原則」，應告知病人","B":"基於「不傷害原則」，應配合家屬不予告知，以避免病人心情低落","C":"基於「保密及隱私之倫理規則」，應先告知病人","D":"不告知可能導致病人權益受損，應告知病人"},"answer":"B","corrected":false,"correction_note":"","id":"115020-80","topic":"醫學倫理與醫事法律（告知同意/保密/DNR・安寧條例・病主法/醫師法醫療法/研究倫理）","accepted_answers":["B"],"answer_status":"正常","q_num":80,"src":"民國115年第一次","img":""}],E={"103030-69":{"quick":"調查社區團體以提供戒菸者心理社會支持（強化因子）→PRECEDE之教育診斷。","detail":{"background":"**PRECEDE模式（Green）依序：社會診斷→流行病學診斷→行為與環境診斷→『教育與生態診斷』→行政與政策診斷**。教育診斷在分析影響行為之**前置（predisposing）、增強（reinforcing）、使能（enabling）因子**。『找出能提供戒菸者心理社會支持的團體』＝辨識『增強因子』，屬教育診斷。","options":{"A":"社會診斷評估生活品質。","B":"流行病學診斷找健康問題。","C":"行為診斷分析行為因素。","D":"正解。教育（生態）診斷—辨識增強因子。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"105020-71":{"quick":"COPC已界定社區並找出問題（青少年吸菸）、選定試辦對象後，下一步為擬定解決方案。","detail":{"background":"**社區導向基層醫療（COPC）循環：界定社區（confirm community）→以流行病學找出健康問題→擬定／規劃介入方案→介入實施→評估成效**。本例已界定社區並確認問題、選定國中，故**下一步為『擬定解決健康問題之方案（策略規劃）』**。","options":{"A":"界定社區範圍已完成。","B":"已找到健康問題。","C":"正解。擬定解決方案（策略規劃）。","D":"評估成效在介入之後。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"105100-71":{"quick":"1986渥太華健康促進五大行動綱領不含『媒體宣導』。","detail":{"background":"**渥太華憲章（Ottawa Charter）健康促進五大行動綱領：建立健康的公共政策、創造支持性環境、強化社區行動、發展個人技能、調整健康服務方向**。『媒體宣導』非其五大綱領之一。","options":{"A":"健康公共政策為綱領。","B":"支持性（健康）環境為綱領。","C":"社區參與（強化社區行動）為綱領。","D":"正解。媒體宣導非五大綱領。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"107080-69":{"quick":"篩檢針對『無症狀』之臨床前期；C稱『需有症狀期間』為非原則。","detail":{"background":"**篩檢（screening）原則（Wilson-Jungner）**：疾病為重要健康問題（高罹病率／死亡率）、有可辨識之『無症狀臨床前期』、有被接受且能改善預後的治療、有合適且可接受之篩檢工具、符成本效益。**C『需有「有症狀」期間才有時間檢查』錯誤——篩檢正是要在無症狀期偵測**。","options":{"A":"高罹病率／死亡率，為原則。","B":"高盛行／發生率，為原則。","C":"正解（非原則）。篩檢針對無症狀臨床前期。","D":"有可改善預後之治療，為原則。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"109020-71":{"quick":"COPC循環順序：確認群體→確認問題→策略規劃→介入→評估。","detail":{"background":"**社區導向基層醫療（COPC）正確循環：確認／界定群體（community）→確認健康問題（以流行病學）→策略規劃→介入實施→評估成效**。先界定服務群體，再找問題。","options":{"A":"先群體後問題，順序顛倒。","B":"正解。確認群體→確認問題→策略→介入→評估。","C":"介入在策略規劃之後。","D":"介入在策略規劃之後。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"109080-02":{"quick":"疾病篩檢原則之一：被篩檢出的疾病應是『可治療的』。","detail":{"background":"**篩檢原則**：被篩檢疾病應為重要健康問題、**有可改善預後的治療（可治療）**、自然史清楚、有無症狀可偵測期、篩檢工具安全可接受且具成本效益。故A正確；自然史不清、對健康無影響、方法高風險皆與原則相反。","options":{"A":"正解。被篩檢疾病應可治療。","B":"自然史應清楚，非不清。","C":"應為重要健康影響之疾病。","D":"篩檢工具應安全低風險。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"109080-72":{"quick":"社區健康促進同時宣導自家診所服務屬利益衝突，不適當。","detail":{"background":"**社區健康促進計畫應：界定對象群體、確認健康課題、擬定並執行介入計畫、評估**。**『辦衛教活動同時宣導自家診所服務項目』摻雜商業利益、利益衝突，不適當**。","options":{"A":"界定群體，適當。","B":"確認健康課題，適當。","C":"擬定介入計畫，適當。","D":"正解（不適當）。摻入診所行銷有利益衝突。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"111080-71":{"quick":"找出社區健康問題最有效可靠者→先蒐集官方衛政資料與過去流病報告。","detail":{"background":"**了解社區健康狀態，最有效率且可靠的起點為『先蒐集既有的官方衛生統計與過去流行病學報告（次級資料）』**，據以掌握輪廓後再規劃進一步調查。直接做大規模流病調查費時費資源；座談、走訪為輔助、主觀。","options":{"A":"召集座談較主觀、片面。","B":"逕做流病調查耗時耗資源。","C":"走訪詢問較主觀。","D":"正解。先蒐集官方衛政與流病資料。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"113020-69":{"quick":"高血壓服藥減少併發症屬『三段（tertiary）預防』。","detail":{"background":"**三段五級**：**初段預防＝健康促進＋特殊保護（衛教、疫苗）；次段預防＝早期發現早期治療（篩檢）；三段預防＝限制殘障＋復健（已病者減少併發症與失能）**。『高血壓病人服藥以減少併發症』屬三段預防。故C正確。","options":{"A":"早期發現早期治療屬次段，非初段。","B":"打疫苗屬初段，非次段。","C":"正解。減少併發症屬三段預防。","D":"衛生教育屬初段，非次段。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"101030-20":{"quick":"肝癌篩檢以胎兒蛋白（AFP）＋腹部超音波最佳。","detail":{"background":"**肝細胞癌高危險群（B/C肝、肝硬化）之篩檢＝『腹部超音波＋血清甲型胎兒蛋白（AFP）』每6個月一次**。鹼性磷酸酶、膽紅素、ALT非肝癌篩檢標記。","options":{"A":"ALP非肝癌篩檢。","B":"正解。AFP＋腹部超音波。","C":"膽紅素非篩檢標記。","D":"ALT非肝癌篩檢標記。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"101030-71":{"quick":"兼顧敏感度與特異度，較適合篩檢的腫瘤標記配對為PSA-攝護腺癌。","detail":{"background":"**多數腫瘤標記敏感度／特異度不足以作『篩檢』（多用於追蹤）**。相對而言**PSA對攝護腺癌之篩檢價值較高（仍具爭議、需醫病共享決策）**；CA-125（卵巢）、CEA（大腸）、CA15-3（乳）皆不適合作篩檢。故A。","options":{"A":"正解。PSA-攝護腺癌相對適合。","B":"CA-125不適合卵巢癌篩檢。","C":"CEA不適合大腸癌篩檢。","D":"CA15-3不適合乳癌篩檢。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"102030-73":{"quick":"停經女性之癌症篩檢，腹部超音波非實證建議項目。","detail":{"background":"**實證之女性癌症篩檢：乳房攝影（mammography）、子宮頸抹片、糞便潛血（大腸癌）**。**『腹部超音波』非一般無症狀者之實證癌症篩檢工具**（無證據降低死亡率）。故D不適合。","options":{"A":"乳房攝影為實證乳癌篩檢。","B":"子宮頸抹片為實證篩檢。","C":"糞便潛血為大腸癌篩檢。","D":"正解（不適合）。腹部超音波非實證癌篩。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"103100-70":{"quick":"53歲男性建議之癌症篩檢為大腸癌。","detail":{"background":"**50歲（部分指引45歲）起一般風險成人應接受大腸癌篩檢（糞便潛血／大腸鏡）**。攝護腺癌篩檢具爭議需共享決策；肺癌篩檢（低劑量CT）僅限重度吸菸高風險者（本例不吸菸）；腹主動脈瘤超音波篩檢限65–75歲曾吸菸男性。故D（大腸癌）。","options":{"A":"攝護腺癌篩檢具爭議。","B":"肺癌LDCT限高風險吸菸者。","C":"腹主動脈瘤篩檢限65–75歲吸菸男性。","D":"正解。大腸癌篩檢。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"104030-68":{"quick":"USPSTF對11–24歲不包括『全面檢查總膽固醇及血糖』。","detail":{"background":"**USPSTF對青少年／青年（11–24歲）建議**：性活躍女性子宮頸抹片、追加破傷風白喉疫苗、安全衛教（安全帽等）、肥胖／菸酒／STI諮詢等。**並『不』建議對所有此年齡層常規檢查總膽固醇與血糖**（非全面）。故C不包括。","options":{"A":"性活躍女性抹片，包括。","B":"追加破傷風白喉疫苗，包括。","C":"正解（不包括）。非全面驗膽固醇血糖。","D":"安全衛教，包括。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"104090-69":{"quick":"9個月大嬰兒之發展診查應評估『發ㄅㄚ、ㄇㄚ音（牙牙學語）』。","detail":{"background":"**嬰幼兒發展里程碑**：對人微笑約2月；手指拿物（pincer grasp）約9–10月（但題意第4次健檢之語言）；**『發ㄅㄚ、ㄇㄚ音（babbling）』約6–9個月**；扶走約9–12月。9個月健兒檢查重點含語言『發雙唇音』。故C。","options":{"A":"手指拿物較晚。","B":"對人微笑約2月（過早）。","C":"正解。9個月發ㄅㄚㄇㄚ音。","D":"扶走約9–12月。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"105020-69":{"quick":"大腸癌篩檢：少於10%之大腸直腸癌可由肛門指診摸到；B正確。","detail":{"background":"**大腸癌篩檢**：糞便潛血（FOBT/FIT）敏感度雖較內視鏡低，仍為有效之第一線篩檢（非不適合）；**肛門指診僅能觸及極少數（<10%）直腸遠端腫瘤**；乙狀結腸鏡只能看遠端（無法>90%）；大腸鏡對小息肉敏感度高但非100%。故B正確。","options":{"A":"FOBT仍適合作篩檢，錯誤。","B":"正解。<10%可肛診摸到。","C":"乙狀結腸鏡僅及遠端，錯誤。","D":"大腸鏡對小息肉非95%以上，錯誤。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"105100-68":{"quick":"乳房攝影報告BIRADS 0→需安排乳房超音波等進一步檢查。","detail":{"background":"**乳房影像報告系統（BI-RADS）：0＝『評估未完成，需additional imaging（如超音波、加壓攝影）』**；1正常、2良性、3可能良性（短期追蹤）、4可疑（需切片）、5高度惡性、6已證實癌。BIRADS 0須進一步影像，不可逕等明年。故D。","options":{"A":"非立即外科手術。","B":"0級非『暫觀察等明年』。","C":"0級不代表沒有腫瘤。","D":"正解。安排乳房超音波進一步診斷。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"105100-69":{"quick":"早期偵測糖尿病腎病變最適篩檢項目為微量白蛋白尿。","detail":{"background":"**糖尿病腎病變最早期之偵測指標為『微量白蛋白尿（microalbuminuria，尿白蛋白/肌酸酐比值UACR 30–300）』**，早於肌酸酐上升與一般尿液常規（試紙）異常。故C。","options":{"A":"肌酸酐上升較晚。","B":"尿素氮非早期指標。","C":"正解。微量白蛋白尿。","D":"尿液常規（試紙）敏感度不足以早期偵測。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"107020-39":{"quick":"無乳癌風險之女性，符合建議者為50歲起每2年乳房攝影。","detail":{"background":"**一般風險女性乳癌篩檢（美/加/歐共識）：『乳房攝影（mammography），約50歲起每1–2年』**（40–49歲依個別風險共享決策）。MRI僅用於高風險（如BRCA）；超音波、PET非一般篩檢工具。故C。","options":{"A":"MRI僅高風險者。","B":"乳房超音波非一般篩檢首選。","C":"正解。50歲起每2年乳房攝影。","D":"PET非乳癌篩檢。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"107020-69":{"quick":"72歲、連續多年抹片正常且已無性行為→不需再接受子宮頸抹片。","detail":{"background":"**子宮頸抹片篩檢屬『次段預防』（早期發現，非初段）**；**多數指引建議65–70歲、先前篩檢正常且無高風險者可停止抹片**（美國癌症學會亦設上限），故72歲且連續正常者『不需再抹片』。HPV疫苗主要用於年輕未感染者，不建議此年長者。故B。","options":{"A":"抹片屬次段預防，非初段。","B":"正解。可停止抹片。","C":"美國癌症學會建議有年齡上限。","D":"年長者不建議HPV疫苗。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"107020-70":{"quick":"先天性甲狀腺低能症篩檢，敏感度的考量比特異度重要。","detail":{"background":"**新生兒先天性甲狀腺低能症篩檢之首要為『高敏感度』**——因偽陰性（漏診）會錯失早期治療而致不可逆智能障礙，後果嚴重；偽陽性可由複檢排除。故敏感度比特異度更重要。故A。","options":{"A":"正解。敏感度比特異度重要。","B":"特異度非首要。","C":"非同等重要。","D":"此情境明確以敏感度為重。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"107080-25":{"quick":"一般危險族群大腸直腸癌篩檢：每1–2年以免疫法糞便潛血為好方式；B正確。","detail":{"background":"**大腸直腸癌篩檢**：**一般風險者『每1–2年免疫法糞便潛血（FIT）』或每10年大腸鏡**；IBD須定期大腸鏡（但非一律每1–3年起算自診斷）；切除腺瘤性息肉後依風險約3–5年追蹤（非每年）；一等親家族史者多建議40歲起或較早並較密集（非50歲每5年）。故B正確。","options":{"A":"IBD監測時程描述不精確。","B":"正解。一般風險每1–2年免疫法糞潛血。","C":"切息肉後非每年追蹤。","D":"家族史者應更早更密集。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"107080-41":{"quick":"USPSTF『非』A級強烈建議者為40–49歲每兩年乳房攝影。","detail":{"background":"**USPSTF癌症篩檢等級**：21–65歲子宮頸抹片（每3年）、50–75歲糞便潛血／大腸鏡屬強烈建議（A/B）。**40–49歲乳房攝影為『C級』（個別化決策，非全面A級強烈建議）；50–74歲乳房攝影才為B級**。故A非A級。","options":{"A":"正解（非A級）。40–49歲乳攝為C級個別化。","B":"子宮頸抹片為建議篩檢。","C":"糞便潛血為建議篩檢。","D":"大腸鏡為建議篩檢。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"108080-69":{"quick":"新生兒先天甲低篩檢『敏感度比特異度更重要』；A稱特異度更重要，錯誤。","detail":{"background":"**新生兒先天性甲狀腺低能症篩檢**：**重在『高敏感度』（不可漏診，偽陰性會延誤治療致不可逆智障）**，故A（特異度比敏感度更重要）錯誤。此篩檢副作用低、偽陽性率較高（可複檢排除）、偽陰性後果嚴重。","options":{"A":"正解（錯誤）。應為敏感度比特異度重要。","B":"篩檢無嚴重副作用，正確。","C":"偽陰性會延誤治療，正確。","D":"偽陽性機會較高，正確。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"109020-68":{"quick":"USPSTF中需『密集諮詢』而非簡短諮詢者為性傳染病預防。","detail":{"background":"**USPSTF行為諮商強度**：**性活躍青少年／高風險成人之『性傳染病（STI）預防』建議『密集（intensive）行為諮商』**；菸品使用、酗酒可用簡短諮詢（5A/5R）；皮膚癌之紫外線防護為行為諮商但本題以STI為密集諮詢代表。故D。","options":{"A":"酗酒可用簡短諮詢。","B":"皮膚癌防護非此題答案。","C":"菸品使用可用簡短諮詢（5A）。","D":"正解。STI預防需密集諮詢。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"110020-69":{"quick":"USPSTF實證A級化學預防：準備懷孕女性每日葉酸0.4–0.8 mg。","detail":{"background":"**USPSTF『A級』化學預防：『計畫懷孕／可能懷孕女性每日補充葉酸（folic acid）0.4–0.8 mg』以預防胎兒神經管缺損**。兒童塗氟為B級；tamoxifen預防乳癌僅限高風險（B級且權衡）；老年人補維他命D預防骨折之證據不足（非A級）。故A。","options":{"A":"正解。孕前葉酸0.4–0.8mg（A級）。","B":"兒童塗氟為B級。","C":"tamoxifen僅高風險者。","D":"維他命D預防骨折證據不足。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"110020-70":{"quick":"需『密集諮詢』而非簡短諮詢者為性活躍青少年之性病預防。","detail":{"background":"**USPSTF**：菸品戒除、酗酒、皮膚癌防護等可經『簡短諮詢』改變；**性活躍青少年之『性傳染病預防』則需『更密集之行為諮商或轉介』**。故B。","options":{"A":"皮膚癌防護可簡短諮詢。","B":"正解。青少年STI預防需密集諮詢。","C":"酗酒可簡短諮詢。","D":"戒菸可簡短諮詢（5A）。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"112080-68":{"quick":"18歲大一男生最不需要的篩檢為『脊椎側彎』。","detail":{"background":"**USPSTF對青少年／青年之預防保健**：肥胖篩檢、性傳染病諮商（性活躍者）、預防菸品使用諮商皆建議。**『無症狀青少年特發性脊椎側彎篩檢』USPSTF評為證據不足（I）／不建議常規篩檢**，故最不需要。故A。","options":{"A":"正解（最不需要）。無症狀脊椎側彎篩檢不建議。","B":"肥胖篩檢，建議。","C":"STI諮商，建議。","D":"預防菸品使用，建議。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"112020-23":{"quick":"大腸癌篩檢：糞便潛血陽性者應進一步大腸鏡確診。","detail":{"background":"**大腸癌篩檢流程：糞便潛血（FIT）陽性『非』等於罹癌，應進一步『大腸鏡』確診**。肛門指診非好篩檢工具；下消化道鋇劑攝影非與大腸鏡同等之首選。故C。","options":{"A":"糞潛血陽性不等於已罹癌。","B":"肛門指診非好篩檢工具。","C":"正解。陽性者應大腸鏡確診。","D":"鋇劑攝影非與大腸鏡同等首選。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"114020-70":{"quick":"USPSTF：對65歲（含）以上婦女建議骨質疏鬆篩檢。","detail":{"background":"**USPSTF骨質疏鬆篩檢：建議『≥65歲女性』常規以DXA篩檢**；<65歲停經後女性若骨折風險高（FRAX）亦可篩檢（非全部）；**對男性篩檢證據不足（I級，未建議）**。故A。","options":{"A":"正解。≥65歲婦女建議篩檢。","B":"非所有≥50歲停經婦女皆建議。","C":"男性篩檢證據不足。","D":"<50歲非一律不建議（高風險仍評估）但本題A最適當。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"112020-71":{"quick":"USPSTF對『老人虐待』篩檢為證據不足（I級），非B等級；B最不適當。","detail":{"background":"**USPSTF**：**育齡婦女『親密伴侶暴力（IPV）』篩檢為B級（建議）；但對年長／失能成人『虐待（elder abuse）』篩檢評為『I級（證據不足）』，並非B級**。台灣家暴可撥113諮詢通報、110報警。故B（稱老人虐待篩檢為B級）最不適當。","options":{"A":"育齡婦女IPV篩檢為B級，正確。","B":"正解（最不適當）。老人虐待篩檢為I級，非B級。","C":"113諮詢通報，正確。","D":"110報警，正確。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"113020-22":{"quick":"最不需加強篩檢B型肝炎者為『女女性行為者（WSW）』。","detail":{"background":"**B肝篩檢加強族群：孕婦、HCV感染者、將接受免疫抑制／化療者、HIV、注射藥癮、男男性行為者、血液透析等**。**『女女性行為者（WSW）』性傳播B肝風險相對低，最不需加強篩檢**。故B。","options":{"A":"孕婦需篩檢。","B":"正解（最不需要）。WSW風險低。","C":"HCV感染者需篩檢。","D":"接受免疫抑制者需篩檢（防再活化）。"},"sources":["Harrison 21e","USPSTF／三段五級・健康促進・篩檢原則"]}},"110080-67":{"quick":"15歲少女目前最不需要的疫苗為帶狀疱疹（Zoster）疫苗。","detail":{"background":"**青少年建議疫苗：A肝、B肝、HPV、Tdap、流感、（必要時）腦膜炎雙球菌等**。**帶狀疱疹（Zoster）疫苗用於年長者（≥50歲），青少年不需接種**。故D。","options":{"A":"A肝疫苗青少年可接種。","B":"HPV疫苗青少年建議。","C":"Tdap青少年加強。","D":"正解。Zoster疫苗為年長者用。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"102030-79":{"quick":"X光篩檢使存活時間延長，實為前導時間偏差（lead-time bias）。","detail":{"background":"**前導時間偏差（lead-time bias）**：篩檢使診斷時間提前，即使不改變死亡時間，『從診斷到死亡』的存活時間看似延長，造成篩檢有效之假象。本例兩組死亡人數相近、僅診斷後存活時間不同→lead-time bias，不能據以證明篩檢改善存活或建議全面X光篩檢。故C。","options":{"A":"不能據此認為改善存活。","B":"不能據此建議全面篩檢。","C":"正解。前導時間偏差。","D":"length-time bias為偏向偵測進展慢之腫瘤，非此。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"102110-69":{"quick":"無實證依據之預防保健建議為『貧血篩檢』。","detail":{"background":"**對一般無症狀成人，USPSTF不建議常規『貧血篩檢』（缺乏實證效益）**；憂鬱症篩檢（有照護配套時）、體重（BMI）測量、視力篩檢（年長者）則有實證建議。故A無實證依據。","options":{"A":"正解。貧血篩檢無實證依據。","B":"憂鬱症篩檢有建議。","C":"體重測量有建議。","D":"視力篩檢（年長）有建議。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"102110-71":{"quick":"最適合作實證探索的PICO問題需具備P・I・C・O四要素。","detail":{"background":"**良好之實證（EBM）臨床問題採PICO架構：Population（對象）、Intervention（介入）、Comparison（對照）、Outcome（結果）**。選項D『腎上腺皮質素 vs 一般症狀治療 對「成年人」上呼吸道感染症狀緩解』明確含對象、介入、對照、結果，最完整。故D。","options":{"A":"僅單一介入評估，無對照。","B":"缺明確對象。","C":"前後比較非對照組設計。","D":"正解。完整PICO。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"103030-68":{"quick":"Framingham十年心血管風險指標不含『舒張壓』。","detail":{"background":"**Framingham風險評估指標：年齡、性別、總膽固醇、HDL膽固醇、『收縮壓』（及是否治療）、吸菸、糖尿病**。使用『收縮壓』而非舒張壓。故C（舒張壓）非指標。","options":{"A":"總膽固醇為指標。","B":"HDL為指標。","C":"正解（非指標）。用收縮壓非舒張壓。","D":"吸菸為指標。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"107080-67":{"quick":"OR 0.71即服藥者『發生/未發生事件之比』除以未服藥者之比為0.71。","detail":{"background":"**勝算比（odds ratio, OR）＝(暴露組事件勝算)/(對照組事件勝算)**。OR 0.71表示服aspirin者『發生與未發生事件之勝算』除以未服者之勝算為0.71。OR並非ARR或RRR；ARR/RRR/NNT需事件率（本摘要未直接給）。故C正確。","options":{"A":"ARR非71%。","B":"RRR非71%（OR≠RRR）。","C":"正解。OR為勝算之比＝0.71。","D":"NNT需事件率計算，未提供。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"108030-71":{"quick":"實證醫學證據層級最高者為統合分析（meta-analysis）。","detail":{"background":"**實證證據層級（由高至低）：系統性回顧／統合分析（meta-analysis）＞隨機對照試驗＞世代研究＞個案對照研究＞個案系列＞專家意見**。故統合分析最高。故C。","options":{"A":"世代研究次於RCT/meta。","B":"專家意見最低。","C":"正解。統合分析最高。","D":"個案對照研究較低。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"108080-68":{"quick":"搜尋多研究合併分析→屬統合分析（meta-analysis）研究。","detail":{"background":"**統合分析（meta-analysis）：系統性搜尋並『合併多個（同類）研究』之結果作量化整合**。本例搜尋Cochrane/MEDLINE取得多個RCT並合併分析→meta-analysis。非預後研究、非個案對照優於世代（層級相反）。故C。","options":{"A":"非預後性研究。","B":"世代研究層級高於個案對照，敘述相反。","C":"正解。統合分析（meta-analysis）。","D":"完成追蹤率非此題重點。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"108080-72":{"quick":"OR=(90/10)/(270/730)≈24.3。","detail":{"background":"**個案對照研究勝算比 OR=(病例組暴露/未暴露)/(對照組暴露/未暴露)**。病例：90吸菸/10不吸＝9；對照：270吸菸/730不吸＝0.3699；OR＝9/0.3699≈**24.3**。故B。（病例對照研究用OR估計關聯，不能直接算相對風險。）","options":{"A":"4.1非正解。","B":"正解。OR≈24.33。","C":"300為其他算式之誤。","D":"3.33非正解。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"109080-70":{"quick":"對臨床醫師與病人最有意義者為陽性與陰性預測值（PPV、NPV）。","detail":{"background":"**敏感度／特異度為檢驗工具『固有』特性（不隨盛行率變）；但對『面對檢驗結果的醫師與病人』，最有意義的是『陽性預測值（PPV）與陰性預測值（NPV）』**——即『檢驗陽性者真正患病的機率』『檢驗陰性者真正無病的機率』，且受盛行率影響。故D。","options":{"A":"敏感度／特異度為工具固有特性。","B":"組合不完整。","C":"組合不完整。","D":"正解。PPV與NPV對醫病最有意義。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"110080-70":{"quick":"篩檢工具之陽性預測值受『盛行率』影響最大。","detail":{"background":"**陽性預測值（PPV）＝真陽性/(真陽性+偽陽性)，受『疾病盛行率（prevalence）』影響最大**：盛行率高→PPV高；盛行率低→即使高特異度，PPV仍低（偽陽性增多）。敏感度／特異度為工具固有特性、不隨盛行率變。故B。","options":{"A":"發生率影響較小（PPV看現存比例）。","B":"正解。盛行率影響PPV最大。","C":"死亡率與PPV無直接關係。","D":"存活率與PPV無關。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"111020-69":{"quick":"RCT之系統性回顧／統合分析應為最高證據等級；A稱證據等級IIa錯誤。","detail":{"background":"**多篇『隨機對照試驗（RCT）』之系統性回顧與統合分析屬『最高證據等級（Level I）』，建議等級可達A**。故A『證據等級為IIa』錯誤——應為Level I。其餘（整體下降幅度、亞組差異、異質性來源）為對該meta-analysis結果之正確解讀。","options":{"A":"正解（錯誤）。RCT之meta應為證據等級I，非IIa。","B":"整體收縮壓顯著下降，正確。","C":"亞組差異，正確。","D":"異質性來源，正確。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"111020-72":{"quick":"PICO中glucosamine為『介入（intervention）』。","detail":{"background":"**PICO**：P＝退化性膝關節炎老年病人；**I（intervention）＝葡萄糖胺（glucosamine）**；C＝對照（安慰劑等）；O＝關節疼痛改善。故B正確（葡萄糖胺為intervention）；A把『老年病人』當P尚可但題意要對應I；C/O敘述不精確。本題答B。","options":{"A":"病人為P，但題問I。","B":"正解。葡萄糖胺為intervention。","C":"comparison應為對照(如安慰劑)。","D":"outcome應為疼痛改善，非膝置換減少。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"112020-69":{"quick":"盛行率低之社區篩檢宜選『假陽性低（高特異度）』之檢驗。","detail":{"background":"**低盛行率疾病篩檢，偽陽性問題嚴重（PPV低），應選『特異度高（偽陽性少）』之檢驗**以減少不必要的後續檢查與焦慮。比較各表之偽陽性（Test+但Disease−）數，選偽陽性比例最低者。故B。","options":{"A":"偽陽性較高。","B":"正解。偽陽性最低（高特異度）。","C":"偽陽性較高。","D":"偽陽性極高。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"112080-70":{"quick":"敏感度＝『罹病且檢驗陽性者』占所有罹病者之比率。","detail":{"background":"**敏感度（sensitivity）＝罹病者中檢驗陽性的比率（真陽性率）；特異度（specificity）＝未罹病者中檢驗陰性的比率；PPV＝檢驗陽性者中真正罹病的比率；NPV＝檢驗陰性者中真正無病的比率**。故A正確（B/C/D定義皆錯置）。","options":{"A":"正解。敏感度＝罹病者中檢驗陽性比率。","B":"特異度應為未罹病者中陰性比率。","C":"PPV應為陽性中『有』病比率。","D":"NPV應為陰性中『無』病比率。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"114020-69":{"quick":"NNS＝1/ARR；ARR=8/1000−4/1000=0.004→NNS=250。","detail":{"background":"**需篩檢人數（number needed to screen, NNS）＝1/絕對風險下降（ARR）**。本例未篩檢組死亡8/1000、篩檢組4/1000，**ARR＝(8−4)/1000＝0.004**，NNS＝1/0.004＝**250**。故C。（RR=0.5僅為相對效應，計算NNS需用絕對差。）","options":{"A":"4為死亡人數，非NNS。","B":"125為1/0.008之誤。","C":"正解。NNS＝250。","D":"500為其他誤算。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"102030-74":{"quick":"98歲多重退化、功能與認知衰退→周全性老年評估最適當。","detail":{"background":"**周全性老年評估（comprehensive geriatric assessment, CGA）**：對衰弱、多重問題、功能退化之老人，整合『生理疾病、認知、情緒、營養、用藥、功能（ADL/IADL）、社會支持』之多面向評估與計畫。本例高齡多重退化最適合CGA，而非單項檢查。故A。","options":{"A":"正解。周全性老年評估。","B":"腦波非首要。","C":"腫瘤標記非首要。","D":"上消化道攝影非首要。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"102110-02":{"quick":"老人跌倒藥物中，最不可能致跌的是omeprazole。","detail":{"background":"**易致跌倒之藥物：苯二氮平類（alprazolam）、安眠藥（zolpidem）、利尿劑與降壓藥（chlorothiazide，姿勢性低血壓）、抗精神病、抗膽鹼等**。**質子幫浦抑制劑omeprazole不致姿勢性低血壓或鎮靜，最不可能致跌**。故C。","options":{"A":"alprazolam鎮靜致跌。","B":"zolpidem致跌。","C":"正解。omeprazole最不可能。","D":"利尿劑致姿勢性低血壓。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"102110-66":{"quick":"周全性老年評估之對象為『急性功能減退』的老人。","detail":{"background":"**周全性老年評估（CGA）最適合對象＝『有多重疾病／功能近期惡化、可能可改善』之衰弱老人**（如急性功能減退、反覆住院、跌倒）。非『所有≥65歲』、非『長期臥床末期』、非『重症加護中』者（後者非CGA時機）。故B。","options":{"A":"非所有≥65歲皆需。","B":"正解。急性功能減退老人。","C":"長期臥床末期非CGA對象。","D":"重症治療中非CGA時機。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"103030-66":{"quick":"老人之頭暈、倦怠、水腫等症狀，可能與長期用藥有關；D正確。","detail":{"background":"**老人用藥原則**：自行停用慢性病藥『不正確』（恐病情失控）；服藥時間次數『應整合簡化』以提升順從；本例服6種藥屬『多重用藥（polypharmacy）』；**新出現之頭暈、倦怠、水腫等可能為『藥物不良反應』，應審視用藥（去處方deprescribing）**。故D正確。","options":{"A":"自行停慢性病藥不正確。","B":"服藥應整合簡化。","C":"有多重用藥問題。","D":"正解。症狀可能與長期用藥有關。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"104030-20":{"quick":"老化使腎素與醛固酮分泌『減少』；B稱增加，錯誤。","detail":{"background":"**正常老化生理變化**：竇房結節律細胞數減少（可達90%）、約半數有腸道憩室、動脈血氧分壓略降（約70–75 mmHg）。**腎素（renin）與醛固酮（aldosterone）分泌隨老化『減少』（故老人易低醛固酮、高血鉀傾向）**，B（稱增加）錯誤。","options":{"A":"竇房結節律細胞減少，正確。","B":"正解（錯誤）。腎素醛固酮隨老化減少。","C":"約半數有腸道憩室，正確。","D":"PaO₂略降，正確。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"104030-21":{"quick":"老年病患最不常見者為支氣管哮喘（氣喘）。","detail":{"background":"**老年常見：骨折、憂鬱、尿失禁、跌倒、失智、多重用藥等老年症候群**。**支氣管哮喘（氣喘）為較典型『年輕／過敏體質』疾病，老年新發相對少見**（老人喘多為COPD/心衰）。故B最不常見。","options":{"A":"骨折老人常見。","B":"正解。支氣管哮喘老人最不常見。","C":"憂鬱老人常見。","D":"尿失禁老人常見。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"104030-66":{"quick":"年紀>80歲為跌倒『無法改變』的危險因子；A正確。","detail":{"background":"**跌倒危險因子分『內在（不可變如高齡、可介入如肌力/視力/用藥）與外在（環境）』**。**高齡（>80）為無法改變之內在危險因子**；本例跌倒非單純步履不穩（多因素）、多重用藥『會』增跌倒風險、應考慮醫源性問題。故A正確。","options":{"A":"正解。>80歲為無法改變之危險因子。","B":"跌倒非單純步履不穩，多因素。","C":"多重用藥會增跌倒風險。","D":"應考慮醫源性問題。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"104090-01":{"quick":"80歲以上女性最常見之尿失禁為『混合型』。","detail":{"background":"**老年尿失禁**：年輕女性以應力性為主；**高齡（≥80）女性以『混合型（應力＋急迫）』最常見**。利尿劑與安眠鎮靜藥『會』增加尿失禁；**第一線治療為非藥物（行為治療、骨盆底肌訓練、膀胱訓練）而非藥物**。故A正確。","options":{"A":"正解。≥80歲女性以混合型最常見。","B":"利尿劑會增尿失禁，錯誤。","C":"安眠鎮靜藥會增尿失禁，錯誤。","D":"第一線為行為治療，非藥物，錯誤。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"105020-02":{"quick":"跌倒老人之建議中，『服維生素B增加下肢肌力』最不合適。","detail":{"background":"**跌倒多因性處置：調整用藥（減安眠藥）＋睡眠衛教、治療白內障改善視力、運動／復健『增加下肢肌力與平衡』**。**『服用維生素B增加下肢肌力』無實證、最不合適**（肌力靠運動，非維生素B）。故D。","options":{"A":"減安眠藥＋睡眠衛教，合適。","B":"治療白內障，合適。","C":"運動復健增肌力，合適。","D":"正解（最不合適）。維生素B不增肌力。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"105100-67":{"quick":"第一期壓瘡（紅斑瘀傷）以泡沫軟墊保護腳跟、避免進一步壓力最適當。","detail":{"background":"**壓瘡處置**：第一期（皮膚完整、不褪色紅斑）重在『減壓、保護』——**以泡沫軟墊保護、避免持續受壓、定時翻身**；尚不需清創（無壞死）或植皮（用於深度缺損）；抬高30度非腳跟壓瘡之關鍵。故C。","options":{"A":"植皮用於深度缺損。","B":"第一期無壞死不需清創。","C":"正解。泡沫軟墊保護減壓。","D":"抬高30度非關鍵。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"106020-66":{"quick":"失智老人突然不講話＋尿失禁＋3日惡化（肺炎）→老年病『非典型表現』。","detail":{"background":"**老年人急性疾病常以『非典型表現』呈現**：感染（如肺炎）可不發燒、不咳，而以『譫妄、功能退化、不講話、新發尿失禁、跌倒』表現。本例肺炎以非典型表現呈現，屬老年症候群／非典型表現（非失智惡化）。故D。","options":{"A":"有老年病症候群，錯誤。","B":"非單純失智惡化。","C":"未必為醫源性。","D":"正解。為非典型表現。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"106020-72":{"quick":"疑似受虐之失智老人，急診醫師首應聯絡社工協助處理。","detail":{"background":"**疑似老人虐待（營養不良、瘀青、害怕眼神、否認）**：應**確保安全、詳細記錄、『通報並聯絡社工』啟動保護與評估**。不應直接對加害嫌疑之女兒攤牌或匆匆讓其帶回（恐再受害）。故C。","options":{"A":"直接對女兒攤牌恐不安全。","B":"匆匆帶回恐再受害。","C":"正解。聯絡社工協助。","D":"驗尿非首要。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"106080-66":{"quick":"個體間生理與社會差異最大的年齡層為『老年』。","detail":{"background":"**老年人因累積之遺傳、疾病、生活型態、社經差異，使『個體間異質性（heterogeneity）最大』**——同齡老人健康與功能差異懸殊，故老年照護需個別化。故D。","options":{"A":"孩童差異較小。","B":"青少年差異較小。","C":"中年差異較小。","D":"正解。老年個體間差異最大。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"107020-01":{"quick":"老人罹患肺炎時，產生心智功能障礙的比例比年輕人高。","detail":{"background":"**老人感染（肺炎）常『非典型』：發燒、咳嗽、胸痛比例較年輕人『低』，而以『意識／心智功能障礙（譫妄）、功能退化』表現較多**。故C正確（A/B/D皆相反）。","options":{"A":"老人發燒比例較低。","B":"咳痰比例較低。","C":"正解。心智障礙比例較高。","D":"胸痛比例較低。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"107020-68":{"quick":"周全性老年評估『非以身體疾病篩檢為主』；D錯誤。","detail":{"background":"**周全性老年評估（CGA）為『多面向（生理、心理、功能、社會、用藥、營養）』整合評估與計畫，非僅以身體疾病篩檢為主**；流程含篩選適合者→評估→建議→執行追蹤；可用於各層級老人照護。故D錯誤。","options":{"A":"了解虛弱老人問題並提供整體計畫，正確。","B":"流程含篩選評估建議執行，正確。","C":"可用於各層級照護，正確。","D":"正解（錯誤）。非以身體疾病篩檢為主。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"107080-12":{"quick":"Timed up-and-go test用於評估行走與平衡能力；C正確。","detail":{"background":"**老年評估工具**：MMSE篩『認知』（非憂鬱）；Mini-Cog＝三項回憶＋畫鐘（非倒背數字／系列減法）；**Timed up-and-go（起身行走）測『行走與平衡』、評估跌倒風險**；備餐、服藥、購物等為『工具性ADL（IADL）』而非基本ADL（基本ADL為進食、沐浴、穿衣、如廁、移位、大小便控制）。故C正確。","options":{"A":"MMSE篩認知非憂鬱，錯誤。","B":"Mini-Cog為回憶＋畫鐘，錯誤。","C":"正解。Timed up-and-go評估行走平衡。","D":"備餐服藥屬IADL，非基本ADL，錯誤。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"107080-66":{"quick":"老人照護以『維持功能及自我照顧能力』為原則。","detail":{"background":"**老年照護原則：重在『維持功能、生活品質與自我照顧能力』，而非僅追求疾病治癒**；需多面向（含預防、復健、社會支持）；老人新病常致功能進一步退化（需警覺）。故B正確。","options":{"A":"非僅強調治癒。","B":"正解。維持功能與自我照顧能力。","C":"非僅治療性診治。","D":"新病會致功能退化，錯誤。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"108030-68":{"quick":"周全性老年評估中，MMSE得分<24分屬異常（認知）。","detail":{"background":"**CGA各量表切點**：**MMSE（總分30）一般<24分為認知異常（受教育程度調整）**；GDS-15>4–5分疑憂鬱（非『<4以下為正常、>8才算』之描述）；MNA分數越『低』越營養不良（非>10表營養不良）；巴氏量表分數越低失能越重（區段定義需正確）。故A正確。","options":{"A":"正解。MMSE<24分屬異常。","B":"GDS切點描述不正確。","C":"MNA分數低才營養不良，敘述相反。","D":"巴氏量表區段描述不正確。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"108080-62":{"quick":"排尿後餘尿500 mL、尿液不自主緩慢流出→溢流性尿失禁。","detail":{"background":"**溢流性尿失禁（overflow incontinence）：膀胱過度脹滿（大量餘尿，如500 mL）致尿液持續少量溢出**，見於出口阻塞（攝護腺肥大）或膀胱收縮無力（糖尿病神經病變）。應力性為腹壓增加漏尿、急迫性為強烈尿急、功能性為行動／認知障礙致來不及如廁。故C。","options":{"A":"功能性為行動認知障礙。","B":"應力性為腹壓增加漏尿。","C":"正解。溢流性尿失禁（大量餘尿）。","D":"急迫性為強烈尿急。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"108080-66":{"quick":"周全性老年評估最不適合『疾病末期或嚴重失智』者。","detail":{"background":"**CGA最適合『有多重疾病／多重用藥、功能近期惡化、反覆住院、原因不明』之衰弱但仍可改善之老人**。**『疾病末期或嚴重失智』者改善空間有限，CGA效益低（最不適合）**——應轉為安寧／支持照護。故A。","options":{"A":"正解（最不適合）。末期或嚴重失智者。","B":"多重疾病用藥者適合。","C":"功能不全近期惡化者適合。","D":"多次住院原因不明者適合。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"108080-71":{"quick":"多重用藥老人之新發尿失禁、倦怠、血壓上升→應做老人周全性評估。","detail":{"background":"本例老人**多重用藥（安眠藥加量＋自購降壓藥）後出現尿失禁、倦怠、血壓波動**，高度疑『藥物相關之老年症候群』。**最適當為『周全性老年評估（CGA）』整合用藥與多面向問題**，而非逕入住護理之家、僅轉精神科或直接住院。故C。","options":{"A":"逕入住護理之家不適當。","B":"僅轉精神科過窄。","C":"正解。老人周全性評估。","D":"非必須即刻住院。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"109020-05":{"quick":"健康老人相較年輕人，最不會下降的是『血中胰島素濃度』。","detail":{"background":"**老化生理：最大運動心率下降、動脈血氧分壓略降、腎絲球過濾率下降**。**但因老化伴胰島素阻抗，『血中胰島素濃度』常不降反『升』（最不會下降）**。故D。","options":{"A":"最大心率隨老化下降。","B":"PaO₂略降。","C":"GFR下降。","D":"正解。胰島素濃度最不會下降（常升）。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"109020-67":{"quick":"MMSE為認知篩檢工具，並非篩『智商與溝通能力』；C錯誤。","detail":{"background":"**老年功能評估量表**：巴氏量表（Barthel）評基本ADL；IADL評社區獨立生活能力；**MMSE篩『認知功能（定向、記憶、注意、語言等）』，非『智商與溝通能力』**；GDS篩憂鬱。故C敘述錯誤。","options":{"A":"巴氏量表評ADL，正確。","B":"IADL評獨立生活，正確。","C":"正解（錯誤）。MMSE篩認知，非智商溝通。","D":"GDS篩憂鬱，正確。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"109080-67":{"quick":"起身行走測驗（get-up-and-go）評估行走平衡與跌倒風險，非檢查坐骨神經；C錯誤。","detail":{"background":"**起身行走測驗（Timed Up and Go, TUG）：從椅子起身、走3公尺、轉身走回坐下，計時；>12–14秒提示行走平衡不佳、跌倒高風險**。本例16秒異常、屬跌倒高風險、可反映衰弱。**TUG評估『行走與平衡』，非檢查坐骨神經功能**。故C錯誤。","options":{"A":"為起身行走測驗，正確。","B":"時間異常屬跌倒高風險，正確。","C":"正解（錯誤）。TUG非檢查坐骨神經。","D":"可反映衰弱，正確。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"110020-02":{"quick":"Fried衰弱（frailty）定義不含『認知功能不佳』。","detail":{"background":"**Fried衰弱表現型（frailty phenotype）五項：體重減輕、疲累、握力（手部肌力）下降、行走速度變慢、體能活動量低**。**『認知功能不佳』非Fried frailty五項之一**（認知屬另一面向）。故A。","options":{"A":"正解（不含）。認知功能不佳非Fried五項。","B":"握力不足為其一。","C":"體重下降為其一。","D":"行動遲緩為其一。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"110080-66":{"quick":"Fried衰弱之『肌力』以握力評估，非站姿抬腿；D錯誤。","detail":{"background":"**Fried衰弱五指標：體重減輕（一年>4.5kg/10磅）、行走速度變慢、疲累感、體能活動量低、『肌力下降＝以「握力（grip strength）」評估』**。**D（以站姿抬腿2分鐘次數評估肌力）錯誤——肌力用握力，非抬腿**。故D。","options":{"A":"體重減輕>4.5kg，正確。","B":"步行速度變慢，正確。","C":"疲累感，正確。","D":"正解（錯誤）。肌力以握力評估，非抬腿次數。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"111020-67":{"quick":"周全性老年醫學評估涵蓋生理、心理、社會及功能等面向。","detail":{"background":"**周全性老年評估（CGA）為『多面向（生理疾病、心理／認知情緒、社會支持、功能ADL/IADL）』之整合評估**，目的不僅篩疾病，而在擬定整體照護計畫；非『所有高齡者』皆需、亦非10分鐘可完成（耗時、需團隊）。故C正確。","options":{"A":"非所有高齡者皆需。","B":"不僅篩疾病。","C":"正解。涵蓋生理心理社會功能。","D":"非10分鐘可完成。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"111080-67":{"quick":"家人摑掌推倒致骨折屬『身體虐待』，非忽略／自我忽視；A錯誤。","detail":{"background":"**老人虐待類型：身體、心理／情緒、性、財務剝削、『忽略（neglect）』與自我忽視**。**本例『家人摑掌且推倒』為『身體虐待』，非忽略或自我忽視**（A錯誤）。虐待可發生於家庭／機構，加害者可為照護者／家屬／他人；心理虐待經言語或非言語造成痛苦。","options":{"A":"正解（錯誤）。摑掌推倒屬身體虐待，非忽略。","B":"可發生於家庭社區機構，正確。","C":"加害者多元，正確。","D":"心理虐待定義正確。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"111080-72":{"quick":"跌倒過去史、視力障礙、憂鬱、認知障礙、下肢無力皆為跌倒之內在因子。","detail":{"background":"**跌倒『內在（intrinsic）因子』：跌倒史、視力障礙、認知障礙、憂鬱、下肢肌力／平衡不佳、姿勢性低血壓、多重用藥、慢性病等**。題列ћ跌倒史ќ視力障礙ѝ憂鬱ў認知障礙џ下肢無力『全部』皆屬內在因子。故D（全部）。","options":{"A":"漏列項目。","B":"漏列項目。","C":"漏列項目。","D":"正解。五者皆為內在因子。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"112020-66":{"quick":"年紀>65歲不屬跌倒之『內生性（intrinsic）』可矯正危險因子；A。","detail":{"background":"**跌倒內在因子多指『個體可評估／部分可介入』之因素：認知障礙、帕金森氏症、退化性膝關節炎（肌力/步態）、視力、姿勢性低血壓、用藥等**。**『年齡>65』為人口學背景（不可改變），題意視為非『內生性危險因子』**。故A。（與104030-66『高齡為不可改變之內在因子』為不同題型框架，此題答案為A。）","options":{"A":"正解。年齡>65非此題之內生性因子。","B":"認知障礙為內在因子。","C":"帕金森氏症為內在因子。","D":"退化性膝關節炎為內在因子。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"112020-76":{"quick":"高齡躁動處置中『老人較不會有精神藥物副作用』錯誤。","detail":{"background":"**高齡躁動（agitation）處置：先找並治療潛在原因（感染、疼痛、藥物、譫妄）、非藥物介入為重、藥物『從最低有效劑量起、緩慢調整』**。**『老人較不會有精神藥物副作用』錯誤——老人對精神藥物更敏感、副作用（鎮靜、跌倒、錐體外、抗膽鹼）更多**。故D。","options":{"A":"先治療原有疾病，正確。","B":"低劑量起、漸增，正確。","C":"非藥物治療重要，正確。","D":"正解（錯誤）。老人精神藥物副作用更多。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"112080-67":{"quick":"老人虐待中，『藥物順從性不佳』也可能是受虐徵候；D正確。","detail":{"background":"**老人虐待：發生率不低、應提高警覺（須篩檢評估）；類型不限身體情緒，含忽略、財務剝削、性虐待等**；下肢水腫多為疾病非虐待特異徵；**『藥物順從性不佳（如照顧者未給藥、剝奪醫療）也可能是『忽略』之徵候』**。故D正確。","options":{"A":"不應因發生率低而不評估。","B":"虐待不限身體情緒。","C":"下肢水腫非虐待特異徵。","D":"正解。藥物順從不佳可能為虐待徵候。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"113070-67":{"quick":"多重用藥、順從不良、跌倒致壓迫性骨折之老人→應做周全性老年醫學評估。","detail":{"background":"本例**8種藥、頻次複雜、忘記服藥致控制不良、跌倒骨折**＝典型多重用藥／老年症候群。**最合適為『周全性老年醫學評估（CGA）』整合用藥精簡與多面向問題**，而非僅叮囑服藥、逕送護理之家或置導尿管。故A。","options":{"A":"正解。周全性老年醫學評估。","B":"僅叮囑服藥不足。","C":"逕送護理之家過度。","D":"置導尿管與跌倒無關且不當。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"113070-72":{"quick":"老人GDS 9/15分、情緒低落→可能有憂鬱症，應進一步確認診斷。","detail":{"background":"**老人憂鬱量表（GDS-15）≥5分提示可能憂鬱，分數越高越可能**；本例9分偏高、合併疲累失眠、自覺無用→**應進一步評估確認憂鬱症診斷（並評估自殺風險）**，而非僅給安眠藥或視為正常老化、或逕轉社福。故D。","options":{"A":"僅給安眠藥不足。","B":"GDS 9分非正常，須處理。","C":"應先確認診斷而非逕轉社福。","D":"正解。可能憂鬱症，進一步確認。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"113070-76":{"quick":"老化致竇房結退化多使心跳『偏慢且代償不足』；B『傳導改變導致心跳變慢』為錯誤敘述。","detail":{"background":"**老人受傷較嚴重之生理變化**：心肌細胞減少、收縮力下降；呼吸肌無力易呼吸衰竭；腎功能下降易脫水。**B『心臟傳導系統功能改變「導致心跳變慢」』為本題之錯誤敘述**——老化雖致竇房結細胞減少，但臨床上創傷時老人『心跳代償性加速能力受限』才是重點，且老人受傷嚴重與『心跳變慢』之單一因果敘述不正確（受β阻斷劑等影響）。故B為錯誤選項。","options":{"A":"心肌細胞減少收縮力下降，正確。","B":"正解（錯誤）。以『傳導改變致心跳變慢』解釋不正確。","C":"呼吸肌無力易呼吸衰竭，正確。","D":"腎功能下降易脫水，正確。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"115020-01":{"quick":"Fried physical frailty index『≥3』分才為衰弱（非≥1）；A敘述錯誤（本題A或C均給分）。","detail":{"background":"**衰弱量表**：**Fried表現型（5項：體重減輕、疲累、握力下降、步速慢、活動量低）『≥3項』為衰弱（frail）、1–2項為前衰弱（pre-frail）**——A『≥1分即為衰弱』錯誤。Rockwood累積缺損指數為缺損面向比值（0–1）；VES-13≥3分為衰弱。考選部公告本題答A或C均給分。","options":{"A":"正解（給分）。Fried應≥3項才衰弱，非≥1。","B":"Rockwood累積缺損比值，正確。","C":"給分項（VES-13敘述爭議）。","D":"Strawbridge≥2領域困難為衰弱，正確。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"115020-66":{"quick":"老人衰弱／肌少症測量中，『肌耐力以半身仰臥起坐次數』描述錯誤。","detail":{"background":"**肌少症（sarcopenia）／衰弱測量：肌肉『量』以DXA（或BIA）測；肌『力』以『握力（grip strength）』測；體能表現以『步行速度（gait speed）』測**。**D『肌耐力以連續半身仰臥起坐次數』非標準肌少症測量項目（標準用握力與步速）**，為錯誤。故D。","options":{"A":"骨骼肌量用DXA，正確。","B":"肌力用握力，正確。","C":"活動表現用步行速度，正確。","D":"正解（錯誤）。非以仰臥起坐測肌耐力。"},"sources":["Harrison 21e","實證醫學（EBM）／老年醫學・USPSTF"]}},"101030-73":{"quick":"末期肺癌、低白蛋白（2.2）『補充白蛋白』非合理處置。","detail":{"background":"**末期病人之合理症狀緩解：大量肋膜積水→抽水、呼吸困難→嗎啡、嚴重貧血→輸血**。**末期低白蛋白血症『輸注白蛋白』無改善預後或症狀之實證，非合理處置**。故A。","options":{"A":"正解（不合理）。補白蛋白對末期病人無益。","B":"大量肋膜積水抽水，合理。","C":"嗎啡緩解呼吸困難，合理。","D":"嚴重貧血輸血，合理。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"102110-73":{"quick":"安寧維持希望不應採『積極治癒性治療』；A錯誤。","detail":{"background":"**安寧緩和之『希望』維持在於『能力所及的努力目標、症狀解除、家人關懷、心願達成、生命回顧』，而非以『積極治癒性治療』維繫希望（末期治癒性治療多徒增痛苦）**。故A錯誤。","options":{"A":"正解（錯誤）。不以積極治癒性治療維持希望。","B":"疼痛解除、家人關懷、心願達成，正確。","C":"生命回顧，正確。","D":"希望為能力所及之努力目標，正確。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"104090-73":{"quick":"癌症惡體質與食慾不振，較適當之藥物為皮質類固醇（corticosteroid）。","detail":{"background":"**癌症惡體質（cachexia）／食慾不振之藥物：『皮質類固醇（短期）』與『megestrol acetate（黃體素）』可短期改善食慾**。prochlorperazine為止吐、morphine為止痛、cyproheptadine效果有限。故A。","options":{"A":"正解。皮質類固醇改善食慾。","B":"prochlorperazine為止吐藥。","C":"morphine為止痛。","D":"cyproheptadine效果有限。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"104090-79":{"quick":"依安寧緩和醫療條例，不施行心肺復甦術僅適用於『末期病人』。","detail":{"background":"**《安寧緩和醫療條例》之『不施行心肺復甦術（DNR）』適用對象為『經二位醫師診斷之末期病人』**（罹患嚴重傷病、近期內病程進行至死亡無法避免者）。非適用於一般開刀／急診／植物人（後者另依法規）。故A。","options":{"A":"正解。末期病人。","B":"開刀病人不適用。","C":"急診病人不適用。","D":"植物人非安寧條例之末期定義。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"105020-73":{"quick":"安寧緩和『不』常用之鎮靜止痛藥為Demerol（pethidine/meperidine）。","detail":{"background":"**安寧常用：morphine（止痛／呼吸困難）、midazolam（鎮靜）、diazepam（鎮靜抗焦慮）**。**『pethidine（Demerol）因代謝物normeperidine具神經毒性（癲癇）、半衰期問題，不建議用於慢性／末期疼痛』**。故B。","options":{"A":"morphine為安寧首選止痛。","B":"正解。pethidine不建議用於末期。","C":"midazolam用於鎮靜。","D":"diazepam用於鎮靜。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"106020-73":{"quick":"DNR應由二位醫師診斷為末期病人並有意願人簽署之意願書；A正確。","detail":{"background":"**《安寧緩和醫療條例》：不施行CPR需『二位醫師診斷確為末期病人』＋『意願人（或最近親屬）簽署之意願書／同意書』**。NSAID對神經痛效果不佳（神經痛用抗癲癇／抗鬱劑）；pethidine不建議；Kübler-Ross悲傷階段為否認、憤怒、討價還價、憂鬱、接受（D漏接受）。故A正確。","options":{"A":"正解。二位醫師診斷末期＋意願書。","B":"NSAID對神經痛效果不佳。","C":"pethidine不建議用於末期止痛。","D":"Kübler-Ross五階段漏列『接受』。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"107020-73":{"quick":"開立麻醉止痛藥給癌末病人，最需同時開立『預防便祕』之藥物。","detail":{"background":"**鴉片類止痛之最常見且『不會耐受』之副作用為『便祕』**，故開立narcotic時應『常規併用軟便／緩瀉劑』預防。噁心多會耐受、鎮靜非需常規加強。故A。","options":{"A":"正解。預防便祕藥（鴉片便祕不耐受）。","B":"不需常規加強鎮靜。","C":"頭暈非常規預防。","D":"抗憂鬱非常規併用。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"107020-80":{"quick":"癌末疼痛無法控制時『適當增加嗎啡劑量是合理的』；醫師拒絕增量（C）錯誤。","detail":{"background":"**癌末疼痛：嗎啡無天花板劑量，應依疼痛『適當往上滴定（titrate）』，因止痛而附帶之呼吸抑制風險受『雙重效應原則（double effect）』倫理保護，醫師不應因此拒絕合理增量**。積極安樂死、醫師協助自殺在台灣不合法；末期不插管符合倫理法律。故C（拒絕增量）錯誤。","options":{"A":"積極安樂死台灣不合法，正確。","B":"醫師協助自殺台灣不合法，正確。","C":"正解（錯誤）。應合理增加嗎啡控制疼痛（雙重效應）。","D":"末期不插管符合倫理法律，正確。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"108030-73":{"quick":"大腸癌末期、意識不清、僅能少量進食→繼續經口給予可接受的食物最適當。","detail":{"background":"**末期瀕死病人之營養：強加鼻胃管／靜脈營養／全靜脈營養並不改善存活或舒適，反增負擔**；**應『繼續經口給予病人可接受、舒適的少量食物（comfort feeding）』**，並與家屬溝通人工營養之利弊。故D。","options":{"A":"強置鼻胃管非必要。","B":"靜脈人工營養非必要。","C":"全靜脈營養增負擔。","D":"正解。繼續經口舒適餵食。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"108080-73":{"quick":"癌末疼痛應『規則給藥（by the clock）』，非『疼痛時才給』；B錯誤。","detail":{"background":"**WHO癌痛原則：口服優先（by mouth）、按時給藥（by the clock，規則給藥維持血中濃度）、依階梯（by the ladder）、個別化、注意細節**。**『疼痛時才給藥（PRN為主）』錯誤**——應規則給藥＋突發痛備用劑量。故B錯誤。","options":{"A":"經口給藥優先，正確。","B":"正解（錯誤）。應按時規則給藥，非僅疼痛時給。","C":"適時用輔助藥物，正確。","D":"正確劑量間隔多可緩解，正確。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"109020-73":{"quick":"瀕死癌末意識不清無法進食→與家屬討論人工營養水分之利弊得失。","detail":{"background":"**瀕死病人之人工營養與水分（TPN、鼻胃管、PEG）多無法改善存活或舒適，且可能增加分泌物、水腫、負擔**；**最正確為『與家屬充分討論利弊、依病人最佳利益與意願決定』**，而非一律強加。故C。","options":{"A":"不一律給TPN。","B":"不一律插鼻胃管。","C":"正解。與家屬討論利弊得失。","D":"不建議PEG強加營養。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"109080-73":{"quick":"末期病人躁動譫妄需藥物時，首選抗精神病藥（haloperidol）。","detail":{"background":"**末期譫妄（躁動、幻覺）藥物首選『抗精神病藥（haloperidol）』**；benzodiazepine可能加重譫妄（除酒精／BZD戒斷、終末鎮靜外）；安眠藥、肌肉鬆弛劑非適應。故B。","options":{"A":"安眠藥非首選。","B":"正解。抗精神病藥haloperidol。","C":"肌肉鬆弛劑非適應。","D":"BZD可能加重譫妄。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"110020-73":{"quick":"末期呼吸困難不應『不論原因一律用嗎啡』；應先找可逆原因；D最不適當。","detail":{"background":"**末期呼吸困難處置：先評估並處理『可逆原因』（如肋膜積水、感染、貧血、支氣管痙攣），同時可用低劑量嗎啡緩解、兼顧心理社會靈性**。**D『無論原因都用嗎啡』過於絕對、最不適當**（雖嗎啡為核心藥，但仍應先找可逆因）。故D。","options":{"A":"肺癌末期最常呼吸困難，正確。","B":"先找可逆原因，正確。","C":"心理社會靈性可致，正確。","D":"正解（最不適當）。不應不論原因一律用嗎啡。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"110080-73":{"quick":"居家安寧之缺點為『症狀控制較不方便』；D稱較方便，錯誤。","detail":{"background":"**居家安寧／在宅善終優點：節省醫療支出、環境熟悉、較有尊嚴、家人陪伴**。**『症狀控制較方便』錯誤——居家在急性症狀惡化時，藥物與設備可近性不如住院，症狀控制相對『較不方便』**（需完善居家團隊支援）。故D錯誤。","options":{"A":"節省醫療支出，正確。","B":"環境熟悉，正確。","C":"較有尊嚴，正確。","D":"正解（錯誤）。居家症狀控制相對較不方便。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"111020-73":{"quick":"末期肺癌呼吸困難（SpO2 94%）最能解除症狀者為鴉片類藥物。","detail":{"background":"**末期病人呼吸困難（即使血氧尚可、無低血氧），『鴉片類藥物（opioids，低劑量嗎啡）』最能緩解呼吸困難之主觀感受**；benzodiazepine用於合併焦慮、NSAID／支氣管擴張劑非通用。故A。","options":{"A":"正解。鴉片類緩解呼吸困難。","B":"BZD用於合併焦慮。","C":"NSAID非緩解呼吸困難。","D":"支氣管擴張劑僅支氣管痙攣時。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"111080-73":{"quick":"安寧緩和醫療之目的不包括『延長生命』。","detail":{"background":"**安寧緩和醫療目的：提升末期病人之生活品質與『死亡品質（善終）』、改善症狀不適、身心社靈全人照顧**；**『延長生命』非其目的**（不刻意加速亦不延長瀕死過程）。故D。","options":{"A":"提升生活品質，是目的。","B":"提升死亡品質，是目的。","C":"改善症狀，是目的。","D":"正解（非目的）。延長生命。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"112080-73":{"quick":"末期呼吸困難之安寧處置中，『常規給予鎮定』最不適當。","detail":{"background":"**末期呼吸困難常用：氧氣、低劑量嗎啡（核心）、處理可逆因（支氣管痙攣才用支氣管擴張劑）**。**『鎮定（sedation）』非第一線，僅用於難治性（refractory）症狀之末期鎮靜，常規給予最不適當**。故C。","options":{"A":"給氧，適當。","B":"低劑量嗎啡，適當。","C":"正解（最不適當）。常規鎮定非第一線。","D":"支氣管痙攣時用擴張劑，適當。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"113020-73":{"quick":"末期疼痛給藥途徑首選『口服』，非針劑；B錯誤。","detail":{"background":"**末期疼痛控制：評估應含生理心理社會靈性；『給藥途徑以口服優先（by mouth）』（方便、穩定），無法口服才用皮下／靜脈持續給藥**。**『針劑最快故為首選』錯誤**。本體痛（nociceptive）對嗎啡反應好；骨轉移痛NSAID有效。故B錯誤。","options":{"A":"疼痛評估含身心社靈，正確。","B":"正解（錯誤）。給藥途徑首選口服，非針劑。","C":"本體痛對嗎啡反應好，正確。","D":"骨轉移痛NSAID有效，正確。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"113020-78":{"quick":"嗎啡用於呼吸困難之起始劑量應『較低』（非止痛劑量的雙倍）；B錯誤。","detail":{"background":"**緩和醫療：morphine為止痛與呼吸困難首選（注意呼吸抑制）；用於『呼吸困難』之起始劑量應『較低（約止痛劑量之25–50%或更低）』，非『雙倍』**（B錯誤）。皮質類固醇可改善腸阻塞／顱壓高之嘔吐；難治嘔吐可用多巴胺拮抗劑。故B錯誤。","options":{"A":"morphine為止痛首選，注意呼吸抑制，正確。","B":"正解（錯誤）。呼吸困難起始劑量應較低，非雙倍。","C":"類固醇改善腸阻塞/顱壓嘔吐，正確。","D":"多巴胺拮抗劑用於難治嘔吐，正確。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"114020-73":{"quick":"緩解末期癌症食慾不振，『額外靜脈營養750–1000 mL』最不適當。","detail":{"background":"**末期食慾不振處置：控制疼痛、處理可治之噁心／口腔念珠菌／便祕、皮質類固醇或megestrol可短期助益**。**『額外靜脈營養輸液750–1000 mL』對末期口乾／食慾不振無益且增負擔（水腫、分泌物），最不適當**。故C。","options":{"A":"控制疼痛可改善食慾，正確。","B":"治療噁心、念珠菌、便祕，正確。","C":"正解（最不適當）。額外靜脈營養無益增負擔。","D":"類固醇／megestrol短期有益，正確。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"115020-03":{"quick":"末期病人無法吞嚥之疼痛→改嗎啡靜脈／皮下持續給藥並等效轉換。","detail":{"background":"**原口服長效嗎啡控制良好，今無法吞嚥仍劇痛→『改為嗎啡靜脈或皮下持續輸注，並依先前口服劑量做等效劑量轉換（opioid rotation/route conversion）』**，維持止痛。停嗎啡改NSAID貼片、延後調整皆不當；無法吞嚥不宜再開口服短效灌食。故B。","options":{"A":"停嗎啡改NSAID貼片不當。","B":"正解。改靜脈／皮下持續給藥並等效轉換。","C":"無法吞嚥不宜口服短效。","D":"延後調整、改抗焦慮不當。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"115020-73":{"quick":"末期病人之心律調節器（pacemaker）一般『不』被認為會延長生命終點；A最不適當。","detail":{"background":"**末期心臟病人之裝置處置倫理**：**ICD（去顫器）電擊會造成疼痛與不適，末期可『停用（放磁鐵或程式關閉）』；心律調節器（pacemaker）一般不被視為『延長瀕死過程』之維生裝置（停用爭議大，且依賴者停用可致症狀）**。**A『心律調節器被認為可能延長生命終點』為最不適當之敘述**。故A。","options":{"A":"正解（最不適當）。pacemaker一般不被視為延長生命終點。","B":"停pacemaker可能致心絞痛／呼吸困難，正確。","C":"ICD電擊疼痛不適，正確。","D":"放磁鐵可暫時使ICD失效，正確。"},"sources":["Harrison 21e","安寧緩和醫療條例・病人自主權利法／WHO疼痛階梯"]}},"104030-72":{"quick":"全民健保成人預防保健服務內容『不包括疫苗接種』。","detail":{"background":"**全民健保『成人預防保健』服務含：身體理學檢查、健康諮詢、血液生化／尿液等檢查（篩檢慢性病與癌症風險）**；**『疫苗接種』另循公費疫苗政策，不在成人預防保健項目內**。故D。","options":{"A":"身體理學檢查，包括。","B":"健康諮詢，包括。","C":"血液生化檢查，包括。","D":"正解（不包括）。疫苗接種。"},"sources":["Harrison 21e","台灣全民健保／基層醫療（Starfield）與健康政策"]}},"104090-71":{"quick":"小鎮醫師數十年接生並處理居民終生健康問題→基層醫療之『持續性』。","detail":{"background":"**基層醫療四大特性：可近性（accessibility）、持續性（continuity，長期跨生命週期照顧同一群病人）、周全性（comprehensiveness）、協調性（coordination）**。本例『數十年照顧居民從小到大』＝持續性。故B。","options":{"A":"負責性非此情境核心。","B":"正解。持續性（continuity）。","C":"周全性指全面服務範圍。","D":"協調性指整合轉介。"},"sources":["Harrison 21e","台灣全民健保／基層醫療（Starfield）與健康政策"]}},"105100-66":{"quick":"每萬人增加一位家庭醫師→每10萬人口減少約70人死亡（Starfield）。","detail":{"background":"**Starfield等之研究：基層（家庭）醫師供給增加與『死亡率下降』相關——每10,000人口增加1位家庭醫師，約使每100,000人口『減少約70人死亡』**，並降低醫療成本。故C。","options":{"A":"方向相反（增加死亡）。","B":"方向相反。","C":"正解。每10萬人減少約70人死亡。","D":"幅度過大。"},"sources":["Harrison 21e","台灣全民健保／基層醫療（Starfield）與健康政策"]}},"106020-71":{"quick":"全科醫師比例最低之美國，醫療花費占GDP最高。","detail":{"background":"**Starfield之國際比較：全科（家庭）醫師佔比越『高』，照護品質越好、醫療花費越『低』**。美國全科醫師佔比最低（31%）→醫療花費占GDP最高。故A（美國最高）。","options":{"A":"正解。美國（全科佔比最低）花費最高。","B":"加拿大佔比較高、花費較低。","C":"英國佔比最高、花費最低。","D":"三國並不相似。"},"sources":["Harrison 21e","台灣全民健保／基層醫療（Starfield）與健康政策"]}},"107020-72":{"quick":"全民健保開辦後之變遷為『地區醫院數目減少』。","detail":{"background":"**全民健保（1995）開辦後台灣醫療環境變遷：『大型醫院門診量擴張、地區醫院數目減少』、就醫可近性提高但分級轉診不彰**。惡性腫瘤早在健保前已是十大死因之首；分級醫療轉診制度成效有限（非健保開辦即成功）。故A（地區醫院數目減少）。","options":{"A":"正解。地區醫院數目減少。","B":"基層診所數目增加，非減少。","C":"惡性腫瘤早為死因首位，非健保後才超越。","D":"分級轉診成效有限。"},"sources":["Harrison 21e","台灣全民健保／基層醫療（Starfield）與健康政策"]}},"108030-72":{"quick":"未從事基層醫療服務的單位為『社區健康營造中心』。","detail":{"background":"**台灣基層醫療提供單位：衛生所、基層診所、社區醫療群**等（提供第一線診療）。**『社區健康營造中心』主要從事『健康促進／社區營造』，非提供基層『醫療診治』服務**。故B。","options":{"A":"衛生所提供基層醫療。","B":"正解。社區健康營造中心非提供基層醫療。","C":"社區醫療群提供基層醫療。","D":"基層診所提供基層醫療。"},"sources":["Harrison 21e","台灣全民健保／基層醫療（Starfield）與健康政策"]}},"109020-72":{"quick":"基層醫師越多醫療成本越低→A英國、B加拿大、C美國（花費8.5/10.4/16.2%）。","detail":{"background":"**基層醫療醫師人數越多，醫療照護成本占GDP越低**。三國醫療花費占GDP 8.5%／10.4%／16.2%對應基層佔比由高到低＝**英國＞加拿大＞美國**（美國基層佔比最低、花費最高16.2%）。故B（A英國、B加拿大、C美國）。","options":{"A":"美國非最低花費。","B":"正解。A英國、B加拿大、C美國。","C":"順序不符。","D":"順序顛倒。"},"sources":["Harrison 21e","台灣全民健保／基層醫療（Starfield）與健康政策"]}},"109080-68":{"quick":"推動雙向轉診屬家庭醫師之『協調性（coordination）』特色。","detail":{"background":"**基層醫療特性：協調性（coordination）＝整合並協調病人在不同層級／專科間之照護（如『雙向轉診』、轉介後追蹤）**。可近性為易取得、持續性為長期、負責性為對群體健康負責。故C。","options":{"A":"可近性為易於取得服務。","B":"負責性為對健康負責。","C":"正解。協調性（轉診整合）。","D":"持續性為長期照顧。"},"sources":["Harrison 21e","台灣全民健保／基層醫療（Starfield）與健康政策"]}},"112080-72":{"quick":"『專科醫師比例越高照護品質越高、花費越高』最不恰當（Starfield相反）。","detail":{"background":"**Starfield／Medicare研究：『全科（基層）醫師佔比越高→照護品質越好、花費越低』；基層醫療充足之地區心臟病、中風發生率與低出生體重比率較低**。**A『專科醫師佔比越高照護品質越高』與研究相反，最不恰當**（專科多反而花費高、品質未必更好）。故A。","options":{"A":"正解（最不恰當）。專科多≠品質高（與研究相反）。","B":"全科多則品質高花費低，正確。","C":"基層足則心臟病中風少，正確。","D":"基層足則低出生體重少，正確。"},"sources":["Harrison 21e","台灣全民健保／基層醫療（Starfield）與健康政策"]}},"115020-72":{"quick":"以社區群體為導向、循環式找問題並介入評估之流程→社區導向基層醫療（COPC）。","detail":{"background":"**社區導向基層醫療（Community-Oriented Primary Care, COPC）：結合『基層醫療』與『公共衛生』，以界定社區群體→確認健康問題→規劃介入→評估之循環，照顧整個社區群體之健康**。對照person-centered（以個人為中心）、disease-oriented（以疾病為中心）。故D。","options":{"A":"以人為中心非社區群體導向。","B":"以疾病為中心非社區導向。","C":"非標準模式名稱。","D":"正解。社區導向基層醫療（COPC）。"},"sources":["Harrison 21e","台灣全民健保／基層醫療（Starfield）與健康政策"]}},"101030-52":{"quick":"預後極差時不應為避免糾紛就『立即把所有病情全盤告知』；B最不正確。","detail":{"background":"**告知壞消息應『循序、評估病人準備度、給予時間與支持』（如SPIKES）**。**B『立即將所有相關病情告知病人以免日後醫療糾紛』動機與方式皆不當**——告知須以病人福祉為本、分次溫和進行。故B。","options":{"A":"先思考告知內容，正確。","B":"正解（最不正確）。不應為避免糾紛而全盤急告。","C":"思考延續生命與生活品質，正確。","D":"給病人時間交談提問，正確。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"101030-75":{"quick":"末期病人最近親屬代理順序：配偶＞子女＞父母＞兄弟姐妹＞祖父母。","detail":{"background":"**《安寧緩和醫療條例》最近親屬出具同意書之優先順序：配偶→成年子女→父母→兄弟姐妹→祖父母→…**。故D（配偶＞子女＞父母＞兄弟姐妹＞祖父母）。","options":{"A":"祖父母順位錯置。","B":"父母子女順序錯。","C":"父母置於配偶前，錯。","D":"正解。配偶＞子女＞父母＞兄弟姐妹＞祖父母。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"101030-76":{"quick":"病人意識清楚時已簽安寧緩和意願書，應尊重不予急救；A。","detail":{"background":"**病人具完全行為能力、意識清楚時簽署之安寧緩和（DNR）意願書，效力優先，醫療團隊與家屬均應尊重**；不因事後家屬（兒子）要求而違反病人本人意願施予CPR。故A。","options":{"A":"正解。尊重病人意願，不予急救。","B":"不應順從家屬違反病人意願。","C":"不以多數家屬意見取代病人意願。","D":"家屬同意不能取代病人本人意願。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"102030-71":{"quick":"植物人拔除鼻胃管之爭議屬『代理決定權』。","detail":{"background":"**Terry Schiavo案（永久植物人由配偶聲請撤除維生餵食管）核心爭議為『代理決定權（surrogate decision-making）』**——誰有權代無法表意之病人做維生醫療之決定。故D。","options":{"A":"人球非此議題。","B":"代理孕母無關。","C":"幹細胞無關。","D":"正解。代理決定權。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"102030-72":{"quick":"住院醫師未經病人同意將其長年抽菸隱私告知他人→輕忽病人隱私。","detail":{"background":"**保密與隱私：未經病人同意，不得將其病史／隱私（長年抽菸）透露給非必要之第三人（教材室專員）**。住院醫師最主要疏失為『輕忽地將病人隱私告知他人』。故B。","options":{"A":"評估反應非最主要疏失。","B":"正解。洩漏病人隱私。","C":"專員身分非核心問題。","D":"社工溝通非核心。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"102110-79":{"quick":"急診不知病人已簽DNR而插管，事後依其意願拔管讓其回家最合理；D。","detail":{"background":"**安寧緩和意願（DNR）**：本例急診醫師不知情而插管屬善意緊急處置；事後得知病人已簽署不施行CPR之意願，**依病人意願『撤除維生醫療』讓其返家為合理（符合病人自主與安寧條例）**。A（質疑未請精神科評估）、B（為免被告先急救）、C（無關肺炎不需積極治療）皆不當。故D。","options":{"A":"不需精神科評估始能簽DNR。","B":"不應為免被告而違背意願急救。","C":"可治之肺炎仍應治療。","D":"正解。依意願拔管返家合理。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"102110-80":{"quick":"以促進研究為由將基因檢測列為『自費常規』不告知，並非無妥；D錯誤。","detail":{"background":"**基因檢測涉隱私與心理衝擊，須『知情同意、可選擇、提供基因諮詢』；剩餘檢體做研究須明確告知**。**D『基於促進研究，醫院增列自費常規基因檢測並無不妥』錯誤**——不可未告知即納入常規。故D。","options":{"A":"病人可選擇，應告知，正確。","B":"剩餘檢體研究應告知，正確。","C":"結果告知應提供諮詢，正確。","D":"正解（錯誤）。不可未告知即列常規。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"103030-79":{"quick":"完全未參與研究者要求掛名通訊作者不合理（違研究倫理）。","detail":{"background":"**作者資格（ICMJE）需『實質貢獻研究構想/執行、撰寫/修改、同意定稿並負責』**。**王主任『完全沒有參與』卻要求掛名通訊作者＝『贈與作者（gift authorship）』，不合理、違反研究倫理**——提供檢體本身不構成作者資格。故C。","options":{"A":"提供檢體不構成作者資格。","B":"合作不等於可掛名。","C":"正解。未參與要求掛名不合理。","D":"理由（多年未發表）非重點。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"103030-80":{"quick":"AIDS病人拒告知配偶時，醫師『私下告知其親友』不適當。","detail":{"background":"**HIV/AIDS：依法通報主管機關；應先勸說病人自行告知配偶；若拒絕，由衛生單位進行『個案接觸者追蹤』通知可能受危險之性伴侶**。**『私下將實情告知病人親友』不適當（逾越保密與正當程序）**。故C。","options":{"A":"依法通報，適當。","B":"勸說病人告知配偶，適當。","C":"正解（不適當）。私下告知親友逾越保密。","D":"提供心理諮商，適當。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"103100-79":{"quick":"家屬要求不告知癌末病情時，正確步驟為①評估準備②同理家屬③委婉誠實告知④後續支持（全部）。","detail":{"background":"**家屬要求隱瞞病情之處理：①適切評估病人特性與『想知道』之意願與準備②與家屬溝通、同理其情緒並化解隱瞞心情③在病人想知道時『誠實但委婉告知』④告知後支持與持續追蹤**——四步驟皆應進行。故A（①①①①／全部）。","options":{"A":"正解。四步驟皆進行。","B":"不應省略。","C":"不應省略。","D":"不應省略。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"103100-80":{"quick":"侵入性檢查（胃鏡、大腸鏡）依醫療法需書面同意。","detail":{"background":"**《醫療法》：實施『手術、麻醉』及『侵入性檢查或治療』應向病人或家屬說明並取得『書面同意』**。胃鏡、大腸鏡屬侵入性檢查，需書面同意（非僅手術麻醉、非口頭、非事後）。故B。","options":{"A":"不限手術麻醉，侵入性檢查亦需。","B":"正解。侵入性檢查需書面同意。","C":"非僅口頭同意。","D":"非事後同意。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"104030-73":{"quick":"簽署安寧緩和／DNR／醫療委任意願之必要條件『不含疾病末期』。","detail":{"background":"**簽署『預立安寧緩和醫療意願書／DNR／醫療委任代理人』之要件：年滿20歲、具完全行為能力、意識清楚而出於自願**。**『疾病末期』並非『簽署當下』之必要條件（健康人即可預立；末期是日後『執行』DNR之臨床要件）**。故D非必要條件。","options":{"A":"年滿20歲，為必要條件。","B":"具完全行為能力，為必要條件。","C":"意識清楚，為必要條件。","D":"正解（非必要條件）。簽署時不需已是末期。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"104030-80":{"quick":"『簽了同意書即已盡告知並免除法律責任』錯誤。","detail":{"background":"**告知後同意（informed consent）**：**簽署同意書『不等於』免除醫師之法律責任**——若有醫療疏失仍須依醫學邏輯判斷責任；良好溝通有助減少糾紛；緊急情況依醫療法可不取得同意書。故A錯誤。","options":{"A":"正解（錯誤）。簽同意書不免除法律責任。","B":"疏失責任仍依醫學判斷，正確。","C":"良好溝通減少糾紛，正確。","D":"緊急情況可不取得同意書，正確。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"104090-80":{"quick":"急診醫師『有義務未經病患同意即告知其妻HIV』錯誤；A。","detail":{"background":"**HIV為法定傳染病，醫師有『通報』義務；但『告知配偶』應先告知病人本人並徵求同意，或經衛生單位依法進行接觸者追蹤，並非醫師可『未經病患同意逕自告知配偶』**。故A錯誤（其餘B/C/D敘述符合正當程序與刑責）。","options":{"A":"正解（錯誤）。不可未經同意逕告知配偶。","B":"先告知病人再徵求同意，正確。","C":"病人拒絕則由衛生單位追蹤，正確。","D":"隱瞞致傳染配偶有刑責，正確。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"105020-79":{"quick":"已簽安寧意願，但本次為可治癒之UTI併敗血症→應插管治療；C。","detail":{"background":"**安寧緩和（DNR）適用於『末期、不可治癒』之瀕死情境**；**本例『泌尿道感染併敗血症』為『可治癒之疾病』、肺水腫為治療併發症，並非不可逆末期→應積極插管／治療**（不適用DNR放棄急救）。故C。","options":{"A":"本次為可治之病，非DNR適用情境。","B":"非末期不可治。","C":"正解。可治之敗血症應插管治療。","D":"理由（法定急救）非最佳，但結論應治療。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"105100-80":{"quick":"『醫學研究以促進醫學進展為第一、受試者權益次之』錯誤；A。","detail":{"background":"**赫爾辛基宣言核心：『受試者之福祉與權益『優先』於科學與社會利益』**。故**A『研究進展第一、受試者次之』錯誤**。醫師雙重角色須區分；人體研究須經獨立倫理委員會（IRB）審查；須有合理科學根據。故A。","options":{"A":"正解（錯誤）。受試者權益應優先於研究進展。","B":"醫師與研究者角色不同，正確。","C":"須經IRB審查，正確。","D":"須有科學根據，正確。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"106020-79":{"quick":"事後於病歷增註以避免糾紛，倫理可議且法律違法。","detail":{"background":"**病歷應據實、即時記載；『事後為規避糾紛而增添不實／自利之註記』屬竄改病歷，不僅倫理可議，法律上亦『違法』（偽造文書／違反醫療法病歷規定）**。故D。","options":{"A":"不能有效避免糾紛。","B":"非『必要』補登，屬不當。","C":"法律上並非完全合法。","D":"正解。倫理可議且法律違法。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"106020-80":{"quick":"清醒之末期病人『要求放棄CPR』於安寧條例下合法；A。","detail":{"background":"**《安寧緩和醫療條例》：意識清楚之末期病人本人得『要求放棄心肺復甦術（DNR）』，合法**。未經病人同意由家屬要求放棄（B）、要求醫師給藥提早結束生命（C＝安樂死，不合法）、違反病人放棄意願而家人要求全力救治（D）皆不合法／不適當。故A。","options":{"A":"正解。末期病人本人要求放棄CPR合法。","B":"未經病人同意家屬放棄不合法。","C":"主動安樂死不合法。","D":"違反病人意願不當。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"106080-19":{"quick":"醫師憲章之基本原則『不』包含『實證醫學執業原則』。","detail":{"background":"**《醫師專業素養憲章（Physician Charter, 2002）》三大基本原則：病人福祉優先（primacy of patient welfare）、病人自主（patient autonomy）、社會正義（social justice）**。**『實證醫學執業原則』非其三大基本原則**。故C。","options":{"A":"病人福祉優先，為原則。","B":"社會正義，為原則。","C":"正解（非原則）。實證醫學執業非三大基本原則。","D":"病人自主，為原則。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"106080-69":{"quick":"長期類固醇之嚴重副作用應『告知病情，由病人自行決定』是否續用。","detail":{"background":"**尊重病人自主＋誠實告知**：氣喘長期口服類固醇之副作用（體重、情緒、股骨頭壞死）**應據實告知，使病人在充分資訊下『自行決定』是否續用並共同擬定減量策略**；不應隱瞞、不應不論控制即逕自減量、不應無理由轉診。故C。","options":{"A":"不應隱瞞。","B":"不應不論控制即逕減量。","C":"正解。告知病情由病人決定。","D":"不應無理由轉診規避。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"106080-80":{"quick":"依醫療法，說明病情之『內容』包括病情、治療方針、處置、用藥、預後及可能不良反應；C正確。","detail":{"background":"**《醫療法》第81條：醫療機構診治病人時，應向病人或其法定代理人、配偶、親屬或關係人『告知其病情、治療方針、處置、用藥、預後情形及可能之不良反應』**。說明者不限醫師（C正確）；對象不限病人本人（含關係人）；病歷記載要求另有規定（非本題D所述為錯）。故C正確。","options":{"A":"說明不限具醫師身分者。","B":"對象不限病人本人。","C":"正解。含病情、治療方針、處置、用藥、預後、不良反應。","D":"病歷記載細節非此條規定內容。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"107020-79":{"quick":"醫師法11條（非親自診察不得治療開方）下，違法者為②植物人代領藥③出國由家人代看領藥。","detail":{"background":"**《醫師法》第11條：醫師非親自診察不得施行治療、開給方劑或診斷書**（偏遠地區、急迫情形、視訊診療另有例外）。①山地離島電話問診慢性病續方、④飛機上緊急遠距指導急救屬『合理例外』；**②安養院書記固定代領藥、③出國由家人代看領藥＝非親自診察、違法**。故C（僅②③）。","options":{"A":"含①④（合理例外），不全違法。","B":"含①③但①為例外。","C":"正解。僅②③違法。","D":"①為例外，非違法。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"107080-79":{"quick":"家屬要求隱瞞早期大腸癌病情→應先詢問病人是否想知道，尊重病人意願告知。","detail":{"background":"**病情告知以『病人本人』為原則（成年且意識清楚）**：**應先評估『病人是否想知道』，若病人想知道，即使家屬反對，仍應向病人告知並共同決策**（不可僅依家屬隱瞞並停止檢查治療）。故A。","options":{"A":"正解。先問病人意願，想知道即應告知。","B":"病人不想知道亦不應逕停一切治療（仍需評估）。","C":"不可僅依家屬隱瞞並停治療。","D":"不應僅依家屬而隱瞞。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"108030-79":{"quick":"DNR／維生醫療意願書之見證人『不宜為實施安寧之醫療機構人員』；D錯誤。","detail":{"background":"**意願書應載明意願人姓名、身分證號、住居所、簽署日期、意願內容，並『須有具完全行為能力者二人以上在場見證』**。**為利益迴避，見證人『不應』為『實施安寧緩和醫療之醫療機構人員』（避免利益衝突）**——故D『見證人最好為該醫療機構人員』錯誤。故D。","options":{"A":"載明姓名身分證住居所，正確。","B":"載明簽署日期，正確。","C":"載明意願內容，正確。","D":"正解（錯誤）。見證人不宜為實施安寧之機構人員。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"108080-80":{"quick":"末期病人簽DNR但本次為可治之敗血性休克→應依臨床需要、詢問病患家屬，必要時插管治療；A。","detail":{"background":"**DNR適用於『末期不可逆』之瀕死**；**本例肺癌末期但『本次敗血性休克為可治療之疾病、未必致死』，不直接適用DNR放棄一切急救**——應依臨床判斷、與病患家屬討論，必要時插管或給抗生素與輸液。故A。","options":{"A":"正解。可治之敗血症應依需要處置。","B":"不論可治與否一律不插管過於僵化。","C":"連抗生素點滴都不給不當。","D":"DNR非溯及之前呼吸道感染。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"109020-79":{"quick":"病人已立委任書由王姓友人代決，昏迷需插管時應找『其男性友人王先生』。","detail":{"background":"**病人具完全行為能力時『預立醫療委任代理人（王先生）並立委任書』**，則於其昏迷無法表意時，**醫療決策（含DNR討論）應由『指定之醫療委任代理人王先生』為之，優先於分居配偶及其他親屬**。故A。","options":{"A":"正解。已委任之王先生。","B":"分居配偶非委任代理人。","C":"父母非委任代理人。","D":"成年子女非委任代理人。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"109020-80":{"quick":"到院前死亡之CPR／插管被健保核刪→醫師應依臨床判斷，核刪應據理力爭；C。","detail":{"background":"**到院前心跳停止（OHCA）之急救（CPR、插管）應『由醫師依臨床判斷』決定，符合急救常規者屬必要醫療**；健保不當核刪應『據理力爭（申復）』，不應因核刪而不予或一律施行。故C。","options":{"A":"不應一律不急救。","B":"不應一律急救。","C":"正解。依臨床判斷，核刪據理力爭。","D":"非僅依醫院規定。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"109080-79":{"quick":"依醫療法，人體試驗知情同意『須告知其他可能之治療方式』；A醫師不告知錯誤，B正確。","detail":{"background":"**《醫療法》與人體研究法：人體試驗之受試者知情同意『應告知之事項包括「其他可能之治療方式及說明」』**——故醫師『不能』為招募受試者而隱瞞現有治療方式。故B正確（須告知）。","options":{"A":"人體研究法亦要求告知替代方式，A敘述錯誤。","B":"正解。醫療法要求告知其他治療方式。","C":"知情同意有法律規範，非僅倫理。","D":"不可自行決定隱瞞替代治療。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"109080-80":{"quick":"妨礙醫療業務涉刑責者『由醫療機構主動提出告訴』錯誤；C。","detail":{"background":"**《醫療法》：任何人不得以強暴脅迫等妨礙醫療業務（致危害醫療安全）；警察應協助排除制止；機構應採必要措施確保人員安全**。**醫療暴力之刑事處罰多屬『非告訴乃論（公訴罪）』，由檢警偵辦，並非『由醫療機構主動提出告訴』**。故C錯誤。","options":{"A":"不得妨礙醫療業務，正確。","B":"警察應協助排除，正確。","C":"正解（錯誤）。非由機構主動告訴（屬公訴）。","D":"機構應採必要安全措施，正確。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"110020-79":{"quick":"『人體試驗前不一定要有實驗室或動物實驗』錯誤；D。","detail":{"background":"**人體試驗倫理（赫爾辛基宣言）：人體試驗前『應有充分之科學根據，包括先前之實驗室與動物實驗』**。故**D『不一定要有實驗室或動物實驗』錯誤**。其餘（自由意志同意、受試者理解、適當監督保護）皆正確。故D。","options":{"A":"須告知後同意，正確。","B":"受試者須一定理解，正確。","C":"須適當監督保護，正確。","D":"正解（錯誤）。試驗前須有實驗室／動物實驗基礎。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"110020-80":{"quick":"病人已預立『弟弟』為醫療委任代理人→拒絕CPR簽署順位以弟弟優先：③②④①。","detail":{"background":"**病人『預立醫療委任代理人（弟弟）』時，代理人之決定優先於一般最近親屬順位**。故簽具拒絕CPR之順位為**③弟弟（委任代理人）＞②配偶＞④成人子女＞①父母**。故C。","options":{"A":"未將委任代理人置前。","B":"順序不符。","C":"正解。③弟弟＞②配偶＞④子女＞①父母。","D":"順序不符。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"110080-80":{"quick":"成年有行為能力之SLE病人，得以書面對特定人（未婚夫）不予告知病情；D。","detail":{"background":"**病情告知以『病人本人』為原則；病人為成年且具行為能力者，得『以書面敘明，對特定之人（如未婚夫）不予告知病情』（尊重病人自主與隱私）**。未婚夫非家屬，醫師本無逕告義務（但D最完整正確）。故D。","options":{"A":"敘述不夠完整。","B":"對關係人非『無需病人同意即有告知義務』。","C":"過於絕對（病人可授權告知特定人）。","D":"正解。病人得書面指定不予告知特定人。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"111020-79":{"quick":"親屬代理簽署順序：配偶＞成人直系血親卑親屬＞父母。","detail":{"background":"**重症昏迷無法簽署時之最近親屬代理順序：配偶→成年子女（成人直系血親卑親屬）→父母→兄弟姐妹→祖父母…**。故A（配偶＞成人直系血親卑親屬＞父母）。","options":{"A":"正解。配偶＞成人子女＞父母。","B":"父母置前，錯。","C":"祖父母置前，錯。","D":"順序錯。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"111020-80":{"quick":"病人意識清楚時簽立之DNR應受尊重，不應因家屬要求而急救；A。","detail":{"background":"**病人於意識清楚、具完全行為能力時簽署之DNR意願書，效力優先且應被尊重**；病況惡化失去意識後，**家屬『不能』推翻病人本人先前明確之意願**。故A（不應為其CPR／插管）。醫師讓步急救其實不符病人意願。故A。","options":{"A":"正解。應尊重病人DNR，不應急救。","B":"家屬同意書不能取代病人本人意願。","C":"家屬不能推翻病人意願。","D":"病人意願優先，非任選其一。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"111080-80":{"quick":"愛滋人體試驗之同意書『須由病患或其法定代理人簽署』。","detail":{"background":"**人體試驗知情同意：須由『受試者本人或其法定代理人』親自簽署同意書（不可由非指定他人代簽）**；知情同意亦須書面、不可僅口頭。故D。","options":{"A":"須簽署書面同意書。","B":"不可由非指定他人代簽。","C":"不可由非法定代理人代簽。","D":"正解。病患或法定代理人簽署。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"112020-79":{"quick":"胃淋巴癌末期、家屬要求不告知，但病人是自己身體的主人→若病人想知道仍應告知。","detail":{"background":"**病情告知以病人為主體（自主原則）**：縱使家屬基於善意要求隱瞞，**若病人表達『想知道』之意願，醫師仍應誠實（委婉）告知**，不應僅依家屬而隱瞞或以模糊說法帶過。故C。","options":{"A":"以避免糾紛為由不當。","B":"不應僅依家屬隱瞞。","C":"正解。病人想知道即應告知。","D":"不應以模糊說法規避。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"112020-80":{"quick":"非研究倫理常用準則者為『里斯本宣言（Declaration of Lisbon）』。","detail":{"background":"**研究倫理基石：紐倫堡守則（1947）、赫爾辛基宣言（1964）、貝爾蒙報告（1979，尊重人格／行善／正義）**。**『里斯本宣言（1981）』為『病人權利宣言』，非研究倫理準則**。故D。","options":{"A":"紐倫堡守則為研究倫理。","B":"赫爾辛基宣言為研究倫理。","C":"貝爾蒙報告為研究倫理。","D":"正解（非研究倫理）。里斯本宣言為病人權利。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"112080-80":{"quick":"守密義務『退休後可出書揭露』錯誤；B。","detail":{"background":"**保密義務（屬尊重病人自主／隱私）：醫師因業務知悉他人秘密之保密義務『不因執業終止（退休）而消滅』**——故**B『退休後可出書揭露』錯誤**。涉重大公益時得權衡適當揭露；違反守密涉民刑責。故B。","options":{"A":"屬尊重自主原則內涵，正確。","B":"正解（錯誤）。退休後仍負保密義務。","C":"重大公益得權衡揭露，正確。","D":"違反守密涉民刑責，正確。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"113020-79":{"quick":"病人已口頭明確表達不予急救→家屬應遵照病人意願簽署『不予急救同意書』；B。","detail":{"background":"**病人雖未簽署文件，但生前『口頭明確表達不予急救（不插管）』之意願應受尊重**；家屬應依病人意願辦理（簽署不予急救同意書）。**『不予急救（DNR）』與『撤除維生醫療』在安寧緩和醫療條例／病主法中之程序與要件不同**（但本題正解為B）。故B。","options":{"A":"不應僅依家屬共識而違病人意願。","B":"正解。家屬應遵病人意願簽署不予急救。","C":"已插管者於符合要件下可依法撤除。","D":"敘述非本題正解。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"113020-80":{"quick":"醫療代理人應以『替代判斷』（依對病人了解選病人最希望者）為最優先考量。","detail":{"background":"**代理決定之倫理位階：①若病人先前有明確意願→依其意願；②次為『替代判斷（substituted judgment）』＝依對病人之了解，選擇『病人本人最可能希望』之治療；③最後才用『最佳利益』**。本題先前無明確意願，故以『依對病人了解選病人最希望的治療』為優先。故C。","options":{"A":"以自己會希望者為準非首選。","B":"純依醫療有效性非首選。","C":"正解。替代判斷（病人最希望者）。","D":"正義原則非個別代理首要。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"113070-73":{"quick":"預立醫療照護諮商（ACP）與預立醫療決定（AD）依據『病人自主權利法』。","detail":{"background":"**《病人自主權利法》（2019施行）：具完全行為能力者可經『預立醫療照護諮商（ACP）』，簽署『預立醫療決定（AD, Advance Directive）』，於特定臨床條件（末期、不可逆昏迷、植物人、極重度失智等）下選擇接受或拒絕維持生命治療**。故D。","options":{"A":"民法非依據。","B":"安寧緩和醫療條例針對末期DNR，非AD全貌。","C":"醫療法非依據。","D":"正解。病人自主權利法。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"113070-79":{"quick":"病情告知法規敘述中，『病人自主權利法應告知本人或關係人』錯誤；D。","detail":{"background":"**病情告知法規**：醫師法、醫療法規定可告知病人或其家屬／法定代理人／配偶／親屬或關係人；安寧緩和醫療條例規定告知末期病人或家屬（病人明確表示欲知時應告知本人）。**《病人自主權利法》『以病人本人為主體』，醫療機構應將告知本人（病人有權知情），不是『本人或關係人』可任意替代**——故D敘述錯誤。故D。","options":{"A":"醫師法告知病人或家屬，正確。","B":"醫療法告知本人或法代/配偶/親屬/關係人，正確。","C":"安寧條例告知末期病人或家屬，病人欲知應告知，正確。","D":"正解（錯誤）。病主法以本人為告知主體。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"113070-80":{"quick":"病人死後醫師仍負保密義務；B。","detail":{"background":"**保密義務於『病人死亡後仍然存續』**——醫師不得向媒體證實死者是否曾住院戒毒（涉隱私與名譽）。『公眾人物』或『死亡』均不解除保密義務。故B。","options":{"A":"死後仍有保密義務，A錯。","B":"正解。死後仍負保密義務。","C":"公眾人物不解除保密，C錯。","D":"死後保密義務仍在，D前提錯。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"114020-79":{"quick":"醫師考量病人生活品質，主要依據自主、行善、不傷害三原則。","detail":{"background":"**醫學倫理四原則：自主（autonomy）、行善（beneficence）、不傷害（non-maleficence）、正義（justice）**。**考量病人『生活品質』主要涉『行善（謀其福祉）、不傷害（避免痛苦）、自主（尊重其價值偏好）』；保密原則與生活品質關聯較低**。故A（僅①②③）。","options":{"A":"正解。自主、行善、不傷害。","B":"漏自主原則。","C":"過窄。","D":"含保密，與生活品質關聯低。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"114020-80":{"quick":"成年清醒病人之大腸癌，醫師『充分尊重家屬隱瞞並同意拒絕醫療』錯誤；C。","detail":{"background":"**成年且意識清楚之病人有『知情與自主決定』之權利，家屬無權要求隱瞞病情或代為拒絕手術**。**C『醫師應充分尊重家屬之意見隱瞞並同意拒絕醫療』錯誤**——醫師應與家屬溝通、將病情告知病人本人、由病人自行決定。故C。","options":{"A":"家屬無權要求隱瞞，正確。","B":"家屬無權代拒手術，正確。","C":"正解（錯誤）。不應依家屬隱瞞並拒醫療。","D":"應告知病人本人由其決定，正確。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"114070-78":{"quick":"非末期之顱內出血昏迷需緊急開顱→應告知家屬病情、獲同意後施行手術；A。","detail":{"background":"**病人雖曾簽署『預立醫療決定（拒絕CPR與維生醫療）』，但該決定適用於『末期、不可逆昏迷』等特定條件**；**本例為『可手術挽救之急性顱內出血（非末期）』，緊急開顱屬可治療之積極醫療，應向家屬說明病情、獲同意後施行手術（病人昏迷無法表意）**。故A。","options":{"A":"正解。非末期，告知家屬獲同意後開刀。","B":"非末期不直接適用拒絕維生醫療。","C":"可手術挽救者不宜先消極支持。","D":"不應逕建議不手術。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"115020-80":{"quick":"基於『不傷害』而配合家屬不告知以免病人低落→錯誤（B）。","detail":{"background":"**病人本人希望知道結果（肝癌末期）**：基於『尊重自主』『誠實告知』『保密隱私（先告知本人）』均應告知病人。**B『基於不傷害原則配合家屬不予告知』錯誤**——『不告知』反而損害病人知情與自主之權益。故B。","options":{"A":"尊重自主應告知，正確。","B":"正解（錯誤）。不應以不傷害為由配合隱瞞。","C":"基於保密隱私先告知本人，正確。","D":"不告知損及病人權益，應告知，正確。"},"sources":["Harrison 21e","醫學倫理四原則／醫師法・醫療法・安寧緩和醫療條例・病人自主權利法・人體研究法"]}},"101030-67":{"quick":"LEARN之A代表Acknowledge（認知差異），非Ask；C錯誤。","detail":{"background":"**LEARN跨文化溝通模式：L=Listen（傾聽）、E=Explain（解釋）、A=Acknowledge（認知／承認彼此觀點差異）、R=Recommend（建議）、N=Negotiate（協商）**。故C『A代表ask』錯誤。","options":{"A":"L=Listen，正確。","B":"E=Explain，正確。","C":"正解（錯誤）。A為Acknowledge，非Ask。","D":"R=Recommend，正確。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"102110-68":{"quick":"病情穩定之慢性病，最合適的醫病互動為『主動參與模式』。","detail":{"background":"**Szasz-Hollender醫病關係模式：主動–被動（昏迷急救）、指導–合作（急性病）、『相互參與（mutual participation）』（慢性病穩定期，病醫共同管理）**。慢性病穩定期最合適『主動／相互參與模式』。故C。","options":{"A":"權威引導非慢性病穩定期最佳。","B":"非『獨立決策』。","C":"正解。主動（相互）參與模式。","D":"指導合作用於急性病。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"104090-70":{"quick":"醫師回應『我了解您的擔心…』體現同理心（empathy）。","detail":{"background":"**同理心（empathy）＝辨識並回應病人的情緒與擔憂（『我了解您對乳癌的擔心』）**，與單純資訊回應、積極傾聽、個人支持不同。故B。","options":{"A":"個人支持為情感支持。","B":"正解。同理心。","C":"回應較廣泛。","D":"積極傾聽為傾聽技巧。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"105100-70":{"quick":"LEARN不含『支持（advocacy）』。","detail":{"background":"**LEARN：Listen、Explain、Acknowledge、Recommend、Negotiate**。**『Advocacy（支持／倡議）』非LEARN五步驟之一**。故C。","options":{"A":"Listen為步驟。","B":"Explain為步驟。","C":"正解（不含）。Advocacy非LEARN。","D":"Recommend為步驟。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"105100-79":{"quick":"醫師分享專業價值並提供選擇建議、與病人審慎討論→Emanuel之審議模式。","detail":{"background":"**Emanuel醫病關係四模式：父權（paternalistic）、資訊提供（informative）、詮釋（interpretive，釐清病人價值）、『審議（deliberative，醫師分享自身專業價值並引導病人選擇較佳方案）』**。本例醫師『分享其認為較好的價值並提供建議』＝審議模式。故D。","options":{"A":"父權模式由醫師決定。","B":"資訊模式僅給資訊不表立場。","C":"詮釋模式釐清病人價值。","D":"正解。審議模式。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"107020-71":{"quick":"LEARN五步驟＝傾聽、解釋、認知、建議、妥協（協商）。","detail":{"background":"**LEARN（Berlin & Fowkes）：Listen（傾聽）、Explain（解釋）、Acknowledge（認知差異）、Recommend（建議）、Negotiate（協商／妥協）**。故D（傾聽、解釋、認知、建議、妥協）。","options":{"A":"含評估、包容，錯。","B":"含評估、警覺，錯。","C":"含警覺，錯。","D":"正解。傾聽、解釋、認知、建議、妥協。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"109020-66":{"quick":"生理心理社會模式中，生理層面包含影響生理功能之環境因素；A正確。","detail":{"background":"**生物心理社會模式（biopsychosocial model）**：生理（含基因、疾病及影響生理功能之環境）、心理（情緒、人格、應對）、社會（家庭、社經、文化）三面向交互。題A『生理層面包含影響生理功能之環境因素』為正確；B/C/D將層面錯置。故A。","options":{"A":"正解。生理層面含影響生理之環境因素。","B":"基因／疾病史屬生理層面，錯置。","C":"情感意志屬心理層面，錯置。","D":"人格／應對屬心理層面，錯置。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"109020-70":{"quick":"家庭功能APGAR量表主要源自『系統取向（systems approach）』。","detail":{"background":"**Smilkstein之家庭APGAR（Adaptation, Partnership, Growth, Affection, Resolve）評估家庭功能，理論基礎為『家庭系統理論（systems approach）』**——視家庭為互動系統。故B。","options":{"A":"biopsychosocial非其主要來源。","B":"正解。系統取向（systems approach）。","C":"壓力因應模式非主要。","D":"生命歷程觀點非主要。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"109080-71":{"quick":"非語言溝通中，『頭部微傾且注視對方』代表有興趣與專注；C正確。","detail":{"background":"**非語言溝通約佔人際訊息一半以上（非1/10）；臉部基本情緒表情跨文化相當一致；『頭微傾＋注視』表專注／有興趣；雙臂交叉於胸前多為防衛而非放鬆**。故C正確。","options":{"A":"非語言佔比遠高於1/10，錯。","B":"基本情緒表情跨文化相近，錯。","C":"正解。頭微傾注視代表專注有興趣。","D":"雙臂交叉多為防衛，非放鬆，錯。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"110020-66":{"quick":"多重身心社會症狀、查無器質病因之病人，最適合biopsychosocial模式照顧。","detail":{"background":"**換工作後出現多重身心症狀（睡不好、盜汗、腰痠、口乾、心悸、暈眩、不想上班）逾3月，常與心理社會壓力相關**——最適合以『生物心理社會模式（biopsychosocial model）』整體評估生理、心理與社會因素。故C。","options":{"A":"biomedical family非完整。","B":"holistic social非標準照顧模式名。","C":"正解。biopsychosocial model。","D":"ethnomedical cultural非此。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"110020-71":{"quick":"溝通空間因子中，醫護人員因臨床照護常需進入『個人空間』；D正確。","detail":{"background":"**人際空間（Hall）：親密空間約0–45cm、個人空間約45–120cm、社會空間約1.2–3.6m、公眾空間>3.6m**。**醫療理學檢查常需進入病人之『個人（甚至親密）空間』**。故D正確（A/B/C距離數值錯置）。","options":{"A":"親密空間數值錯。","B":"社會空間數值錯。","C":"個人空間數值錯。","D":"正解。醫護常需進入個人空間。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"110080-68":{"quick":"看診時同時關注疫苗、體重、睡眠等多面向＝周全性照顧（comprehensive care）。","detail":{"background":"**基層醫療『周全性照顧（comprehensive care）』＝對同一病人提供涵蓋預防、急慢性、身心社會多面向之全面服務**（看一個症狀同時關照疫苗、營養、睡眠等）。持續性為跨時間、協調性為整合轉介。故C。","options":{"A":"持續性為跨時間照顧。","B":"協調性為整合轉介。","C":"正解。周全性照顧。","D":"負責性為對健康負責。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"110080-71":{"quick":"一般醫病溝通聆聽時，眼神接觸約佔聆聽時間80%左右；C正確。","detail":{"background":"**醫病溝通：醫師常過早打斷病人（多數病人未能完整陳述）；『聆聽時』適當之眼神接觸約佔80%、『說話時』約佔50%最自然**（非90%以上才好）。憂鬱症病人眼神接觸常『減少』而非增加。故C正確。","options":{"A":"病人常被過早打斷，A錯。","B":"眼神接觸非越多（90%）越好，B錯。","C":"正解。聆聽時眼神接觸約80%。","D":"憂鬱病人眼神接觸減少，D錯。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"110080-72":{"quick":"共享決策（SDM）之挑戰『不』包含『民眾健康識能充足』；C。","detail":{"background":"**共享決策（Shared Decision Making）執行挑戰：權威式醫療文化、溝通時間不足、缺乏合適輔助工具（PtDA）、『民眾健康識能（health literacy）「不足」』**。**C『民眾健康識能充足』反而有利、非挑戰**。故C（為錯誤之挑戰描述）。","options":{"A":"權威文化為挑戰。","B":"時間不足為挑戰。","C":"正解（非挑戰）。健康識能『不足』才是挑戰。","D":"缺輔助工具為挑戰。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"111020-68":{"quick":"家族樹（genogram）『初診時應詢問』，非避免；D錯誤。","detail":{"background":"**家族樹（genogram/family tree）為以家庭為單位照顧之關鍵工具，能有效率了解家庭背景、病史與遺傳疾病**；**『初診時應主動繪製詢問』（為建立全人照護之基礎），而非避免**。故D錯誤。","options":{"A":"是以家庭為單位照顧之關鍵工具，正確。","B":"了解家庭背景最有效率，正確。","C":"提供家族病史遺傳資訊，正確。","D":"正解（錯誤）。初診即應詢問，非避免。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"111020-70":{"quick":"動機式晤談之RULE，第四項為Empower your patient（賦能病人）。","detail":{"background":"**動機式晤談（MI）之RULE：Resist the righting reflex（抗拒糾正反射）、Understand patient's motivations（了解動機）、Listen to patient（傾聽）、『Empower your patient（賦能病人）』**。故B。","options":{"A":"Engage非RULE之E項。","B":"正解。Empower your patient。","C":"Endorse非RULE。","D":"Empathy非RULE之E項。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"111080-66":{"quick":"holistic（全人）模式認為『疾病是一種創造性的契機』；C正確。","detail":{"background":"**健康疾病照護模式**：**全人（holistic）模式視『illness為個人成長之創造性契機』**；醫療化（medicalization）為biomedical模式之『缺點』而非優點；生物適應非biomedical特性；ethnomedical為文化模式而非合併三者。故C正確。","options":{"A":"醫療化為biomedical缺點，非biopsychosocial優點。","B":"生物適應非biomedical特性。","C":"正解。holistic視疾病為創造性契機。","D":"ethnomedical為文化模式，非合併三者。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"111080-68":{"quick":"家醫照顧青少年，『學校成績是此階段最重要議題』錯誤；B。","detail":{"background":"**青少年照護：應關注生長發育、肥胖與飲食、菸酒藥物與駕駛安全、性與心理健康、危險行為**。**B『學校成績是此發展階段「最重要」議題』錯誤**——青少年期更核心為身心發展、健康行為與認同，而非僅學業成績。故B。","options":{"A":"了解生長體重變化，正確。","B":"正解（錯誤）。學校成績非最重要議題。","C":"關注肥胖飲食並衛教，正確。","D":"討論藥物酒精與駕駛，正確。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"112020-70":{"quick":"醫病出現『鏡像姿勢（mirroring posture）』代表已建立適當關係（和諧）。","detail":{"background":"**非語言溝通中，雙方無意識出現『鏡像／同步姿勢（mirroring）』代表彼此和諧、已建立良好關係（rapport）**。故B。","options":{"A":"非敵對。","B":"正解。已建立適當（和諧）關係。","C":"非從屬。","D":"非剛開始建立。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"112080-66":{"quick":"人格五因素（OCEAN）不含『效能性（Efficacy）』；應為外向性（Extraversion）；C錯誤。","detail":{"background":"**五大人格特質（OCEAN）：Openness（開放性）、Conscientiousness（盡責性）、『Extraversion（外向性）』、Agreeableness（親和性）、Neuroticism（神經質）**。**C『Efficacy（效能性）』非五因素之一（應為Extraversion外向性）**。故C錯誤。","options":{"A":"開放性，正確。","B":"盡責性，正確。","C":"正解（錯誤）。應為外向性，非效能性。","D":"親和性，正確。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"112080-71":{"quick":"動機式晤談須運用同理心與主動傾聽；D正確。","detail":{"background":"**動機式晤談（MI）：以『同理心、主動傾聽、引發病人自身改變動機（非醫師主導／替病人決定）』為核心**；最早用於酒癮（非糖尿病飲食衛教）；行為改變目標由『病人自己』在引導下決定。故D正確。","options":{"A":"最早用於酒癮，非糖尿病飲食，錯。","B":"非醫師主導，錯。","C":"目標由病人決定，非醫師決定，錯。","D":"正解。運用同理心與主動傾聽。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"113020-66":{"quick":"LEARN之R代表Recommend（給予治療建議）；D正確。","detail":{"background":"**LEARN：L=Listen、E=Explain、A=Acknowledge、R=『Recommend（建議）』、N=Negotiate**。本題A/B/C將L/E/A錯誤解釋為Label/Effect/Affect，**D『R＝Recommend，給予最佳治療建議』正確**。故D。","options":{"A":"L為Listen，非Label。","B":"E為Explain，非Effect。","C":"A為Acknowledge，非Affect。","D":"正解。R＝Recommend。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"113020-68":{"quick":"喪偶、擔心中風、檢查皆正常之身心症狀→應進行家庭功能評估。","detail":{"background":"**60歲婦女左臉麻、左身痛兩年、多次檢查正常、認知正常、近年喪偶、擔心成子女負擔**——症狀與心理社會（喪親、家庭）壓力高度相關。**下一步最適當為『家庭功能評估（含家庭結構、支持、APGAR）』，從生物心理社會切入**，而非再做PET或逕轉精神／神經科。故D。","options":{"A":"再做PET無助。","B":"已多次神經檢查正常。","C":"逕轉精神科過早。","D":"正解。進行家庭功能評估。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"113070-66":{"quick":"LEARN不含『Reward』；C（對病人解釋治療好處＝Reward）為錯誤。","detail":{"background":"**LEARN：Listen、Explain、Acknowledge、Recommend、Negotiate**。**C將之列為『Reward：對病人解釋治療的好處』錯誤——LEARN無Reward步驟**（建議與協商才是R、N）。故C錯誤。","options":{"A":"Listen：同理傾聽，正確。","B":"Explain：以病人能懂方式解釋，正確。","C":"正解（錯誤）。LEARN無Reward。","D":"Negotiate：討論取得共識，正確。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"113070-68":{"quick":"喪女情緒低落、降壓藥致頭暈之婦女，『請她繼續依原醫囑服藥以免中風』最不適當。","detail":{"background":"**情境：近期喪女、情緒低落失眠、服兩種降壓藥後血壓100/60並頭暈（過度降壓）**。應『減藥並在家監測血壓、評估家庭功能、悲傷輔導』。**C『仍請病人繼續依原醫囑服藥以免中風』最不適當**——已過度降壓且有頭暈，續服恐致跌倒，且忽略心理社會問題。故C。","options":{"A":"減藥並居家記錄血壓，適當。","B":"評估家庭功能，適當。","C":"正解（最不適當）。已過度降壓仍續原劑量不當。","D":"悲傷撫慰，適當。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"113070-70":{"quick":"提供情緒支持＋辨識負面想法觸發＋設定可學習目標→認知行為治療（CBT）。","detail":{"background":"**認知行為治療（CBT）：辨識並修正負面想法／觸發因子、設定具體可達成之行為目標、結合情緒支持**。本題三項處置（支持想法情緒、辨識負面想法觸發、設定降低不良行為之目標）即CBT特徵。故C。","options":{"A":"動機式晤談著重改變動機。","B":"焦點解決短期治療著重解決方案。","C":"正解。認知行為治療（CBT）。","D":"家庭心理衛教不同。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"113070-71":{"quick":"居家醫師自我反思以避免倦怠→屬理想療癒環境之『內在環境』。","detail":{"background":"**理想療癒環境（Optimal Healing Environment, OHE）架構含：內在（個人）環境、人際環境、行為環境、外在（物理）環境**。**醫師『自我反思、維持熱誠、避免倦怠』屬『內在（personal）環境』**。故A。","options":{"A":"正解。內在（個人）環境。","B":"人際環境為與他人互動。","C":"行為環境為健康行為。","D":"外在環境為物理空間。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"114020-71":{"quick":"動機式晤談指導原則中『為病人「規劃」動機』最不適當（應賦能病人自己找出動機）。","detail":{"background":"**MI核心精神（RULE）：抗拒糾正反射、了解病人動機、傾聽、賦能（empower）病人**——**動機應由『病人自己』引發，而非醫師『替病人規劃／打造動機』**。故B『規劃病人的動機』最不適當。","options":{"A":"抗拒糾正反射、不急著給建議，正確。","B":"正解（最不適當）。動機應由病人自發，非醫師規劃。","C":"同理與主動傾聽，正確。","D":"賦能病人、促進參與，正確。"},"sources":["Harrison 21e","醫病溝通／動機式晤談・LEARN・biopsychosocial・家庭評估"]}},"102030-77":{"quick":"準備在一個月內戒菸→屬跨理論模式之『準備期（preparation）』。","detail":{"background":"**跨理論模式（行為改變階段）：沈思前期（無意願）→沈思期（6個月內考慮）→『準備期（preparation，1個月內準備行動）』→行動期（已改變<6個月）→維持期**。本例『準備一個月內戒菸並計劃』＝準備期。故C。","options":{"A":"沈思前期無改變意願。","B":"沈思期為考慮但未定。","C":"正解。準備期（1個月內行動）。","D":"行動期為已開始改變。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"103100-72":{"quick":"女性飲酒超過建議量會增加乳癌風險；D正確。","detail":{"background":"**酒精問題**：酒精性肝病常『AST>ALT（比值>2）』（非ALT>AST）；酗酒貧血常為『大球性（葉酸/B12缺乏）』非小球性；CAGE問卷為有用之酒癮篩檢（非不實用）；**女性飲酒超過建議量確會增加乳癌風險**。故D正確。","options":{"A":"酒精性肝病多AST>ALT，錯。","B":"酗酒貧血多大球性，錯。","C":"CAGE為實用篩檢，錯。","D":"正解。女性過量飲酒增乳癌風險。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"104030-67":{"quick":"肥胖會增加退化性關節炎（OA）之風險。","detail":{"background":"**肥胖併發症：第二型糖尿病、高血壓、血脂異常、心血管病、脂肪肝、睡眠呼吸中止、『退化性關節炎（負重關節）』、多種癌症**。**肥胖『增加』OA風險；甲狀腺功能低下、風濕性心臟病非肥胖併發；肥胖反而與較高骨密度相關（非骨鬆）**。故B。","options":{"A":"甲狀腺低下非肥胖併發。","B":"正解。退化性關節炎。","C":"風濕性心臟病與鏈球菌相關，非肥胖。","D":"肥胖者骨鬆風險未增（負重）。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"104090-68":{"quick":"每日減500大卡，六週約減重3公斤。","detail":{"background":"**1公斤脂肪約7700大卡。每日赤字500大卡×7天＝3500大卡/週≈0.45公斤/週；六週≈2.7–3公斤**。故B（約3公斤）。","options":{"A":"1公斤過少。","B":"正解。約3公斤。","C":"4.5公斤過多。","D":"6公斤過多。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"105020-05":{"quick":"BMI 31之過重者，降血壓最明顯之生活型態修正為『減重約9公斤』。","detail":{"background":"**生活型態降血壓之效果（約略收縮壓下降）：減重（每10公斤約降5–20 mmHg，效果最大）、DASH飲食（8–14）、限鈉（2–8）、規律有氧運動（4–9）、限酒（2–4）**。本例BMI 31，**『減重約9公斤』效果最明顯**。故C。","options":{"A":"每天慢走十分鐘量不足。","B":"作息正常效果不明確。","C":"正解。減重約9公斤效果最大。","D":"限鹽效果次於減重。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"105020-17":{"quick":"營養評估中『TIBC>500代表蛋白攝取不足』錯誤；D。","detail":{"background":"**營養指標**：BUN<8可能蛋白攝取不足；creatinine<0.6可能肌肉耗損；PT延長可能維生素K缺乏。**『總鐵結合能力（TIBC）』在『缺鐵』時升高、在『營養不良（蛋白質能量不足/kwashiorkor）』時因運鐵蛋白合成下降而『降低』**——故D『TIBC>500代表蛋白不足』錯誤（應為TIBC『降低』）。故D。","options":{"A":"BUN<8可能蛋白不足，正確。","B":"creatinine<0.6示肌肉耗損，正確。","C":"PT延長示維生素K缺乏，正確。","D":"正解（錯誤）。蛋白不足時TIBC降低，非>500。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"105020-18":{"quick":"壓瘡惡化最不可能缺乏之營養素為維生素A。","detail":{"background":"**傷口／壓瘡癒合需要：蛋白質（最重要）、維生素C（膠原合成）、鋅（上皮化）、足夠熱量**。**維生素A雖與上皮分化有關，但壓瘡不癒『最不可能』缺乏者為維生素A（相對其他三者次要）**。故A。","options":{"A":"正解（最不可能）。維生素A。","B":"維生素C缺乏影響膠原合成。","C":"鋅缺乏影響上皮化。","D":"蛋白質缺乏最影響癒合。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"105020-57":{"quick":"台灣肥胖定義為BMI≥27（非≥30）；A錯誤。","detail":{"background":"**台灣（衛福部）成人肥胖定義：BMI≥27為肥胖（24–27為過重）；腹部肥胖：男性腰圍≥90cm、女性≥80cm**。**A『台灣肥胖定義為BMI≥30』錯誤（≥30為WHO標準，台灣為≥27）**。Cushing、顱咽管瘤致肥胖正確。故A。","options":{"A":"正解（錯誤）。台灣肥胖為BMI≥27，非≥30。","B":"腹部肥胖女≥80男≥90，正確。","C":"Cushing常肥胖，正確。","D":"顱咽管瘤致多食肥胖，正確。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"105020-58":{"quick":"『只有第一型糖尿病控制不佳才會體重減輕』錯誤；B。","detail":{"background":"**非自主性體重減輕：6–12個月內減>5%且非刻意；合併心悸／高血壓考慮甲亢或嗜鉻細胞瘤**。**B『只有第1型DM控制不佳會減重、第2型不會』錯誤——『第二型糖尿病控制不佳（高血糖、糖尿）亦會體重減輕』**。故B。","options":{"A":"6–12月減>5%為臨床意義，正確。","B":"正解（錯誤）。第2型DM控制不佳也會減重。","C":"非刻意節食運動，正確。","D":"合併心悸高血壓考慮甲亢/嗜鉻細胞瘤，正確。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"105020-66":{"quick":"BMI 27.1、血壓170/100之女性，生活型態建議首重『減輕體重』。","detail":{"background":"**過重（BMI 27.1）併高血壓者，生活型態修正中『減重』降血壓效果最大**（亦應限鈉<6g、限酒、運動，但減重效益最顯著且為過重者首要）。生活型態對血壓有充分實證（D錯）。故A。","options":{"A":"正解。應減輕體重。","B":"限鈉亦有益但次於減重。","C":"限酒有益但此例飲酒量少。","D":"生活型態有實證，D錯。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"106020-43":{"quick":"酗酒病人貧血最常見之營養缺乏為葉酸（folic acid）。","detail":{"background":"**酗酒者貧血最常見原因為『葉酸缺乏』（攝取不足＋酒精干擾葉酸代謝），致大球性貧血**；亦可因消化道出血缺鐵、B12缺乏等，但葉酸最常見。故A。","options":{"A":"正解。葉酸缺乏。","B":"B12缺乏較少見於酗酒。","C":"缺鐵見於出血但非最常見營養缺乏。","D":"鋅缺乏非貧血主因。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"106080-67":{"quick":"『成人肥胖與兒童肥胖無關』錯誤；B。","detail":{"background":"**肥胖**：減重為非藥物降血壓手段之一；肥胖與血脂異常、第二型糖尿病、多種癌症相關；每日減500–1000大卡約每週減0.5–1公斤。**B『成人肥胖與兒童肥胖無關』錯誤——兒童肥胖與成人肥胖『高度相關』（兒童期肥胖易延續至成年）**。故B。","options":{"A":"減重為非藥物降壓手段，正確。","B":"正解（錯誤）。兒童肥胖與成人肥胖相關。","C":"肥胖與血脂/糖尿病/癌相關，正確。","D":"每日減500–1000大卡週減0.5–1kg，正確。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"106080-72":{"quick":"想於一個月內採取戒菸行動→跨理論模式之『準備（preparation）』階段。","detail":{"background":"**跨理論模式：『準備期（preparation）＝預計1個月內採取行動』**。本例『想在一個月內戒菸』屬準備期。（本題選項標示『考慮階段（preparation）』即指此。）故B。","options":{"A":"未考慮階段無意願。","B":"正解。準備期（1個月內行動）。","C":"沈思階段為6個月內考慮。","D":"行動階段為已戒菸。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"106080-73":{"quick":"處於準備期之戒菸者，基層醫師介入應『鼓勵設定戒菸日期』。","detail":{"background":"**對『準備期』戒菸者（5A之Assist/Arrange）：應『協助設定戒菸日（quit date）、擬定戒菸計畫、提供藥物與資源、安排追蹤』**。檢討誘惑、強化認知多用於更早之沈思／準備前期。故C。","options":{"A":"減少誘惑用於更早期。","B":"強化認知用於沈思期。","C":"正解。鼓勵設定戒菸日期。","D":"討論健康影響用於沈思前期。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"107080-52":{"quick":"『6個月減原體重15%很容易達成』錯誤；B。","detail":{"background":"**減重**：飲食控制重在減少總熱量；**合理初期目標為『6個月減原體重5–10%』，『15%並不容易達成』**（B錯）；重度肥胖內科無效時減重手術為合理選擇；lorcaserin為中樞食慾抑制劑。故B錯誤。","options":{"A":"減少總熱量為重點，正確。","B":"正解（錯誤）。6個月減15%不易，目標5–10%。","C":"重度肥胖可考慮減重手術，正確。","D":"lorcaserin為中樞食慾抑制劑，正確。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"107080-71":{"quick":"準備在一個月內採取行動（減重）→跨理論模式之準備階段。","detail":{"background":"**跨理論模式『準備階段（preparation）＝1個月內準備採取行動』**。本例BMI 32、了解膝痛與體重相關、『準備一個月內行動』＝準備階段。故C。","options":{"A":"未考慮階段無意願。","B":"考慮階段為6個月內。","C":"正解。準備階段。","D":"行動階段為已行動。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"108080-49":{"quick":"非自主體重流失中『甲亢時食慾減退是體重下降主因』錯誤；C。","detail":{"background":"**非自主性體重減輕：6–12月減>4.5公斤或>5%**。**C『甲狀腺亢進時「食慾減退」是體重下降主因』錯誤——甲亢通常『食慾增加』但因代謝亢進仍體重下降（食慾減退非主因）**。COPD為原因之一。故C。","options":{"A":"減>4.5公斤，正確。","B":"減>5%，正確。","C":"正解（錯誤）。甲亢多食慾增加而仍減重。","D":"COPD為原因之一，正確。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"110020-56":{"quick":"華人男性腹部肥胖腰圍切點為≥90cm（非≥85）；A錯誤。","detail":{"background":"**台灣腹部肥胖：男性腰圍≥90cm、女性≥80cm**。**A『南亞或華人男性腹部肥胖腰圍≥85cm』錯誤（台灣標準為≥90）**。瘦素由脂肪分泌、肥胖者瘦素濃度較高（瘦素阻抗）；90kg/170cm之BMI≈31.1。故A錯誤。","options":{"A":"正解（錯誤）。華人男性腰圍切點≥90cm，非85。","B":"瘦素由脂肪細胞分泌，正確。","C":"肥胖者瘦素濃度較高，正確。","D":"BMI≈31.1，正確。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"110080-69":{"quick":"運動處方目標心跳『150次/分』過高、最不適當。","detail":{"background":"**70歲、休息心跳66之運動處方**：型態（平地健走）、頻率（每週≥3天）、時間（暖身5分＋有氧20分＋緩和5分）皆適當；**目標心跳應依年齡計算（最大心率≈220−70=150，中等強度約其50–70%≈75–105次/分），『目標心跳達150次/分（＝最大心率）』過高、最不適當**。故B。","options":{"A":"平地健走，適當。","B":"正解（最不適當）。目標心跳150次/分過高。","C":"暖身20分緩和，適當。","D":"每週≥3天，適當。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"111020-54":{"quick":"『身體質量指數越小則代表越胖』錯誤；B。","detail":{"background":"**肥胖**：可致胰島素阻抗與糖尿病；與飲食、運動、基因相關；脂肪細胞分泌多種影響肥胖之物質（瘦素、脂締素等）。**B『BMI越小越胖』錯誤——BMI＝體重/身高²，數值『越大』越胖**。故B。","options":{"A":"肥胖致胰島素阻抗，正確。","B":"正解（錯誤）。BMI越大越胖。","C":"與飲食運動基因相關，正確。","D":"脂肪細胞分泌相關物質，正確。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"111080-70":{"quick":"曾心肌梗塞仍未戒菸者，依5A目前最可能在『Assess（評估戒菸意願）』階段。","detail":{"background":"**戒菸5A：Ask（詢問抽菸）、Advise（建議戒菸）、Assess（評估戒菸意願）、Assist（協助戒菸）、Arrange（安排追蹤）**。本例曾被建議戒菸（Ask/Advise已做）但因故未戒、現來戒菸門診——**下一步為『Assess：評估其（30天內）戒菸意願』**。故B。","options":{"A":"Ask已完成。","B":"正解。Assess評估戒菸意願。","C":"Assist於有意願後。","D":"Arrange為安排追蹤。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"113020-70":{"quick":"BMI 33.2之女性，符合衛福部規範得使用減重藥物治療；C。","detail":{"background":"**減重藥物使用時機（台灣）：BMI≥27併合併症，或BMI≥30（部分標準）**。本例BMI 33.2，**符合『得使用減重藥物治療』之規範**（仍應配合飲食運動）。A（已進入認知期）、B（逕給CBT）、D（跨理論模式長期效果『已證實』之絕對說法）較不精確。故C。","options":{"A":"行為改變階段判定不足。","B":"非首先即CBT。","C":"正解。BMI 33.2符合減重藥物規範。","D":"長期效果之絕對說法不精確。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"113070-55":{"quick":"瘦素（leptin）主要由脂肪組織分泌；C正確。","detail":{"background":"**肥胖生理**：100kg/180cm之BMI≈30.9（非32）；台灣肥胖BMI≥27（男女同），非男27女25；**瘦素（leptin）主要由『脂肪組織』分泌，抑制食慾**；肥胖者瘦素濃度『較高』（瘦素阻抗），故『瘦的人瘦素較高』錯誤。故C正確。","options":{"A":"BMI≈30.9，非32，錯。","B":"台灣肥胖BMI切點描述錯。","C":"正解。瘦素主要由脂肪組織分泌。","D":"肥胖者瘦素較高，D錯。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"114020-55":{"quick":"台灣肥胖腰圍切點男90、女80（非皆90）；B錯誤。","detail":{"background":"**台灣腹部肥胖腰圍切點：男性≥90cm、女性≥80cm（非男女皆90）**——故B錯誤。肥胖與甲狀腺功能異常、Cushing、第二型糖尿病相關（A/C/D正確）。故B。","options":{"A":"肥胖與甲狀腺異常相關，正確。","B":"正解（錯誤）。腰圍切點男90女80，非皆90。","C":"Cushing有肥胖表現，正確。","D":"第二型糖尿病與肥胖相關，正確。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"114020-68":{"quick":"不健康行為與家庭關係之敘述中，『父母或兄長吸菸使青少年吸菸機會增加兩倍』之數字描述為本題錯誤選項；D。","detail":{"background":"**不健康行為（吸菸、酗酒、缺運動、不良飲食）與家庭密切相關**：行為養成與家庭有關；WHO強調家庭是健康促進最主要之社會因素；外食增加但飲食仍受家庭成員影響。**D之『增加兩倍』數字為本題設定之錯誤敘述（家庭吸菸對青少年吸菸之影響程度不只如此／敘述不精確）**。故D為錯誤選項。","options":{"A":"行為養成與家庭有關，正確。","B":"WHO強調家庭為健康促進主因，正確。","C":"飲食受家庭成員影響，正確。","D":"正解（錯誤選項）。其數字描述不正確。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"112020-53":{"quick":"營養不良高危險群之特徵不含『好喝汽水可樂』。","detail":{"background":"**營養不良高危險群：敗血症／高代謝（高燒不退）、老年人、長期酗酒、慢性病、吞嚥困難、社經弱勢等**。**『好喝汽水可樂』非營養不良高危特徵（屬高糖飲食/肥胖風險）**。故D。","options":{"A":"敗血高代謝為高危，正確。","B":"老年人為高危。","C":"長期酗酒為高危。","D":"正解（非高危特徵）。好喝汽水可樂。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"114070-02":{"quick":"術前營養不良積極介入之指標『不含』pre-albumin<40；D除外。","detail":{"background":"**術前營養不良指標：BMI<18.5、6個月內非刻意體重減輕>10%、血清白蛋白<3 g/dL（半衰期長）、前白蛋白（pre-albumin）偏低**。**前白蛋白正常約18–45 mg/dL，『<40 mg/dL』『不』代表營養不良（仍在正常範圍）**——故D『pre-albumin<40』非積極介入指標（除外）。故D。","options":{"A":"BMI<18.5為指標。","B":"6月內非刻意減>10%為指標。","C":"白蛋白<3 g/dL為指標。","D":"正解（除外）。pre-albumin<40仍在正常範圍。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}},"115020-02":{"quick":"可調節（modifiable）之骨鬆危險因子為抽菸。","detail":{"background":"**骨質疏鬆危險因子：不可調節（年老、女性、停經、一等親骨折史、種族）；『可調節（modifiable）：抽菸、過量飲酒、低鈣/維生素D、缺乏運動、過瘦、長期類固醇』**。故B（抽菸）為可調節因子。","options":{"A":"年老不可調節。","B":"正解。抽菸為可調節因子。","C":"女性不可調節。","D":"家族骨折史不可調節。"},"sources":["Harrison 21e","健康行為（跨理論模式/5A）・肥胖・營養・骨質疏鬆危險因子"]}}},TO=["預防醫學、健康促進與公共衛生（三段五級/PRECEDE/Ottawa/COPC/篩檢原則）", "癌症篩檢與成人及兒童預防保健（USPSTF/癌篩/疫苗）", "實證醫學與篩檢統計（研究設計/OR・RR・NNT/統合分析/敏感度特異度）", "老年醫學（周全評估/衰弱/跌倒/尿失禁/壓瘡/老化生理/多重用藥/老人虐待）", "安寧緩和與末期照護（疼痛/呼吸困難/惡體質/末期營養）", "醫學倫理與醫事法律（告知同意/保密/DNR・安寧條例・病主法/醫師法醫療法/研究倫理）", "醫病關係、溝通與家庭醫學（Emanuel模式/同理/動機式晤談/LEARN/biopsychosocial/家庭評估）", "健康行為與生活型態（戒菸/肥胖減重/酒精/運動/營養/骨鬆危險因子）", "健康政策與基層醫療特性（健保/primary care continuity・comprehensive・coordinated）"];
