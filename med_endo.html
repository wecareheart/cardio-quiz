5020-02","topic":"骨質疏鬆與骨代謝","accepted_answers":["B"],"answer_status":"正常","q_num":2,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":52,"stem":"下列何者為希漢氏症候群（Sheehan's syndrome）的主要發病機制？","options":{"A":"腦下垂體腫瘤增生導致壓迫性損傷","B":"產後出血導致腦下垂體缺血性壞死","C":"高泌乳素血症導致下視丘–腦下垂體軸抑制","D":"自體免疫性攻擊導致腦下垂體細胞凋亡"},"answer":"B","corrected":false,"correction_note":"","id":"115020-52","topic":"腦下垂體與下視丘疾病","accepted_answers":["B"],"answer_status":"正常","q_num":52,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":53,"stem":"下列何者為調控血漿抗利尿激素（AVP）的主要機制？","options":{"A":"促腎上腺皮質激素（ACTH）濃度","B":"血漿滲透壓（plasma osmolality）","C":"甲狀腺素（T3/T4）濃度","D":"血糖濃度"},"answer":"B","corrected":false,"correction_note":"","id":"115020-53","topic":"腦下垂體與下視丘疾病","accepted_answers":["B"],"answer_status":"正常","q_num":53,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":54,"stem":"下列何者為嗜鉻細胞瘤／副神經節瘤（pheochromocytoma/ catecholamine-secreting paragangliomas）診 斷中，敏感度最高且特異性佳的生化測試？","options":{"A":"24 小時尿中catecholamines 檢測","B":"血漿游離metanephrines 測定","C":"低劑量dexamethasone 抑制試驗","D":"促腎上腺皮質激素（ACTH）刺激試驗"},"answer":"B","corrected":false,"correction_note":"","id":"115020-54","topic":"腎上腺疾病","accepted_answers":["B"],"answer_status":"正常","q_num":54,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":55,"stem":"關於龐貝氏症（Pompe disease），下列敘述何者正確？","options":{"A":"是一種體染色體隱性遺傳罕見疾病，通常在成年期發病","B":"又名肝醣儲積症第一型（Glycogen Storage Disease type Ⅰ, Type Ⅰ GSD）","C":"是由於肝臟磷酸化酶激酶（Liver Phosphorylase Kinase）缺乏無法分解肝醣所引起，最常見的症狀為肝臟 腫大、肌肉無力及心臟肥大等","D":"在臺灣已被列為新生兒篩檢疾病之一，可藉由定期酵素替代治療（enzyme replacement therapy）來改善症 狀"},"answer":"D","corrected":false,"correction_note":"","id":"115020-55","topic":"肥胖、代謝症候群與營養代謝","accepted_answers":["D"],"answer_status":"正常","q_num":55,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":56,"stem":"潛伏性成人自體免疫糖尿病（Latent autoimmune diabetes in adults, LADA）的敘述，下列何者錯誤？","options":{"A":"發病初期病人不須接受胰島素治療","B":"發病年齡較典型第1 型糖尿病來的晚","C":"anti-glutamic acid decarboxylase antibody（anti-GAD65）可作為主要檢測的抗體","D":"胰島β細胞的功能喪失的速度較第1 型糖尿病人快"},"answer":"D","corrected":false,"correction_note":"","id":"115020-56","topic":"糖尿病（診斷分型/口服藥/胰島素/血糖生理）","accepted_answers":["D"],"answer_status":"正常","q_num":56,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":57,"stem":"關於原發性副甲狀腺機能過高（primary hyperparathyroidism）典型的臨床表徵，下列何者最不常見？","options":{"A":"骨質疏鬆","B":"反覆腎結石","C":"便秘","D":"手麻與抽筋"},"answer":"D","corrected":false,"correction_note":"","id":"115020-57","topic":"副甲狀腺與鈣磷骨礦代謝","accepted_answers":["D"],"answer_status":"正常","q_num":57,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":58,"stem":"下列何者不是葛雷夫氏症（Graves' disease）的特徵？","options":{"A":"甲狀腺機能亢進","B":"眼病變（ophthalmopathy）","C":"甲狀腺腫","D":"脛前可壓凹陷的水腫（pretibial pitting edema）"},"answer":"D","corrected":false,"correction_note":"","id":"115020-58","topic":"甲狀腺疾病","accepted_answers":["D"],"answer_status":"正常","q_num":58,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":67,"stem":"關於糖尿病的敘述，下列何者正確？","options":{"A":"西元2000 年後，臺灣40 歲以上成年人糖尿病盛行率為5%","B":"不論病人的年紀及功能，糖化血色素（HbA1c）控制目標皆小於7.0%","C":"雙肽胜肽酶-4 抑制劑（DPP-4 inhibitor）類藥物有降低體重、不易低血糖的好處","D":"鈉葡萄糖共同輸送器抑制劑（SGLT-2 inhibitor）類藥物有降低體重、不易低血糖的好處"},"answer":"D","corrected":false,"correction_note":"","id":"115020-67","topic":"糖尿病（診斷分型/口服藥/胰島素/血糖生理）","accepted_answers":["D"],"answer_status":"正常","q_num":67,"src":"民國115年第一次","img":""}],E={"101030-45":{"quick":"急性胰臟炎因脂肪皂化（saponification）耗鈣，最易造成低血鈣。","detail":{"background":"低血鈣常見原因:副甲狀腺功能低下（術後/自體免疫）、維生素D缺乏、低血鎂、慢性腎病、急性胰臟炎、敗血症、橫紋肌溶解、腫瘤溶解。**急性胰臟炎時游離脂肪酸與鈣結合形成皂化（saponification）沉積於腹腔脂肪，使血鈣下降**，是其嚴重度指標（Ranson）之一。維生素D中毒、甲狀腺亢進、長期臥床多為高血鈣。","options":{"A":"正解。急性胰臟炎脂肪皂化耗鈣→低血鈣。","B":"維生素D中毒造成高血鈣。","C":"甲狀腺亢進造成高血鈣（骨轉換增加）。","D":"長期臥床造成高血鈣（骨吸收增加）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"101030-47":{"quick":"Repaglinide（meglitinide）刺激胰島β細胞分泌胰島素（與磺醯尿素同作用於KATP通道）。","detail":{"background":"口服降血糖藥機轉:**促泌劑（刺激胰島素分泌）=磺醯尿素（sulfonylurea）與meglitinide（repaglinide/nateglinide，作用於β細胞KATP通道、餐前快速短效）**;metformin（雙胍，抑制肝糖質新生、不刺激胰島素）;acarbose（α-glucosidase抑制劑，延緩碳水吸收）;pioglitazone（TZD，胰島素增敏）。","options":{"A":"Metformin抑制肝糖新生，不刺激胰島素分泌。","B":"Acarbose延緩碳水吸收。","C":"Pioglitazone為胰島素增敏劑。","D":"正解。Repaglinide刺激胰島素分泌。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"101030-50":{"quick":"低血鈉不是繼發性副甲狀腺亢進病因；其主因為低血鈣、高血磷、活性維生素D製造減少。","detail":{"background":"繼發性副甲狀腺亢進（多見於慢性腎病）機轉:**腎功能下降→磷滯留（高血磷）、活性維生素D（1,25(OH)2D）合成減少→低血鈣，三者皆刺激PTH分泌**;FGF-23上升亦抑制維生素D活化。**低血鈉與PTH調控無關**。","options":{"A":"活性維生素D製造減少為病因。","B":"低血鈣刺激PTH分泌。","C":"高血磷刺激PTH分泌。","D":"正解。低血鈉非繼發性副甲狀腺亢進病因。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"101030-55":{"quick":"血糖下降時最先發生的反應是胰島素分泌『減少』。","detail":{"background":"血糖下降的反調節順序:**血糖降至約80–85 mg/dL→胰島素分泌減少（最先）;約65–70→升糖素、腎上腺素分泌增加;更低→生長激素、皮質醇;約50–55→出現自律神經/神經低糖症狀;<50→認知功能受損**。糖尿病久病者升糖素/腎上腺素反應鈍化易致無預警低血糖。","options":{"A":"正解。胰島素分泌減少最先發生。","B":"升糖素分泌增加在胰島素減少之後。","C":"低血糖症狀更晚出現。","D":"認知變差為最後階段。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"101030-56":{"quick":"診斷嗜鉻細胞瘤最可靠的是血漿（游離）metanephrine。","detail":{"background":"嗜鉻細胞瘤分泌兒茶酚胺，間斷分泌使單次catecholamine可正常;**腫瘤持續將兒茶酚胺代謝為metanephrines，故血漿游離metanephrines（或24小時尿分量metanephrines）敏感度最高、最可靠**;尿VMA敏感度較低。確診後以影像（CT/MRI、MIBG）定位。","options":{"A":"尿VMA敏感度較低。","B":"尿catecholamine敏感度不及metanephrine。","C":"血漿catecholamine受間斷分泌影響。","D":"正解。血漿（游離）metanephrine最可靠。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"101030-57":{"quick":"多囊性卵巢症（PCOS）篩檢不是測estradiol、progesterone；應評估高雄性素與排卵異常（如testosterone、LH/FSH）。","detail":{"background":"常見內分泌疾病篩檢:甲狀腺低能→TSH;勃起障礙→prolactin、testosterone;Graves→free T4、TSH。**PCOS診斷依Rotterdam準則（高雄性素臨床/生化、寡/無排卵、卵巢多囊形態），應查testosterone、LH/FSH、排除其他病因，而非以estradiol、progesterone作篩檢**。","options":{"A":"甲狀腺低能測TSH，正確。","B":"正解（錯誤）。PCOS非以estradiol/progesterone篩檢。","C":"勃起障礙測prolactin/testosterone，正確。","D":"Graves測free T4/TSH，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"101030-59":{"quick":"Rosiglitazone（thiazolidinedione, TZD）可致水鈉滯留、誘發鬱血性心衰竭。","detail":{"background":"**TZD（rosiglitazone、pioglitazone）為PPAR-γ促效劑，會造成水鈉滯留與周邊水腫，禁用於NYHA III/IV心衰竭、可誘發/惡化鬱血性心衰**;pioglitazone另增膀胱癌爭議、骨折風險。Metformin致乳酸中毒（非心衰）、acarbose致腸胃脹氣、glibenclamide致低血糖。","options":{"A":"Metformin致乳酸中毒，非心衰。","B":"Acarbose致腸胃不適。","C":"正解。Rosiglitazone（TZD）可致鬱血性心衰。","D":"Glibenclamide致低血糖。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"101030-70":{"quick":"血糖控制不佳且食量增加的中風病人，『唯恐復發而逕改口服藥為胰島素』最不適當；應先衛教飲食與生活型態並團隊介入。","detail":{"background":"第二型糖尿病血糖控制不佳時應先評估**飲食/活動、服藥順從性、體重變化、標的器官功能**，並以治療式生活型態（飲食控制）與團隊（營養師等）介入;本例食量增加、體重上升為主因，**並非逕自改為胰島素注射**。應檢查標的器官、提供生活型態治療、照會團隊。","options":{"A":"檢查標的器官功能，適當。","B":"提供治療式生活型態，適當。","C":"正解（最不適當）。不應逕改口服藥為胰島素。","D":"照會營養師與團隊，適當。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"102030-05":{"quick":"多尿、高血鈉、尿稀，DDAVP後尿滲透壓明顯上升→中樞性尿崩症（central DI）。","detail":{"background":"尿崩症鑑別:**中樞性DI（ADH分泌不足）給DDAVP後尿滲透壓明顯上升（≥50%）;腎性DI（腎對ADH無反應）給DDAVP尿滲透壓無明顯上升;原發性多飲血鈉偏低**。本例血鈉158（高）、尿稀（60 mosm/kg）、DDAVP後升至500→中樞性DI。治療以desmopressin。","options":{"A":"原發性多飲血鈉偏低、非高鈉。","B":"腎性DI對DDAVP無反應。","C":"正解。中樞性尿崩症。","D":"滲透性利尿尿中溶質高、非低滲透壓。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"102030-30":{"quick":"Thiazide利尿劑會『減少』尿鈣排出、傾向升高血鈣，故較不會造成低血鈣。","detail":{"background":"低血鈣原因:低血鎂、副甲狀腺功能低下、慢性腎衰竭、維生素D缺乏、急性胰臟炎等。**thiazide利尿劑減少遠端腎小管鈣排出→升血鈣（故用於高尿鈣結石）**，因此最不會造成低血鈣（loop利尿劑才促鈣排出致低血鈣）。","options":{"A":"低血鎂致PTH分泌/作用障礙→低血鈣。","B":"副甲狀腺低下→低血鈣。","C":"正解。thiazide減少尿鈣、較不致低血鈣。","D":"慢性腎衰竭→低血鈣（高磷、維生素D不足）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"102030-56":{"quick":"第2型糖尿病並非『發病時就要靠注射胰島素維持生命』（那是第1型）。","detail":{"background":"第2型糖尿病與肥胖、家族遺傳/基因相關，特徵為**胰島素阻抗合併相對胰島素分泌不足**，早期可有葡萄糖耐受不良;治療先以生活型態與口服藥，**非發病即依賴胰島素維生**（依賴胰島素維生為第1型，因絕對缺乏、易酮酸）。","options":{"A":"與肥胖、遺傳、基因相關，正確。","B":"早期可有葡萄糖耐受不良，正確。","C":"有胰島素阻抗及分泌不足，正確。","D":"正解（錯誤）。第2型非發病即需胰島素維生。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"102030-57":{"quick":"體重急遽下降、口渴頻尿、頸部黑色棘皮（acanthosis nigricans）→糖尿病。","detail":{"background":"**糖尿病三多一少（多渴、多尿、多食、體重減輕）**為典型代謝失控表現;頸部/腋下**黑色棘皮症（acanthosis nigricans）為胰島素阻抗的皮膚表現**，常見於肥胖第2型糖尿病。本例肥胖、acanthosis、多渴頻尿、急遽體重下降→糖尿病（高血糖滲透性利尿與分解代謝）。","options":{"A":"甲狀腺亢進無acanthosis、無多尿口渴主訴。","B":"嗜鉻細胞瘤為陣發高血壓、頭痛流汗。","C":"正解。糖尿病。","D":"尿崩症無體重急降與acanthosis。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"102030-58":{"quick":"偶發腎上腺腫瘤（incidentaloma）首先應評估其功能（皮質/髓質），而非逕行開刀或細針穿刺。","detail":{"background":"腎上腺偶發瘤處理:**先做功能評估（隔夜1mg dexamethasone抑制試驗查自主皮質醇、血/尿metanephrines查嗜鉻細胞瘤、若高血壓低血鉀查醛固酮/腎素）與影像特徵（大小、CT密度）**;**禁在排除嗜鉻細胞瘤前做切片（可誘發高血壓危象）**;有功能或>4cm或影像可疑者才手術。","options":{"A":"未評估功能不宜逕行開刀。","B":"正解。先評估腎上腺皮質、髓質功能。","C":"未排除嗜鉻細胞瘤前禁做細針穿刺。","D":"不應僅6個月後再追蹤而不先評估功能。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"102030-59":{"quick":"抗甲狀腺藥引起皮疹但白血球正常時，給抗組織胺並換用另一種抗甲狀腺藥即可。","detail":{"background":"抗甲狀腺藥（methimazole/PTU）副作用:輕微皮疹常見，**可給抗組織胺並換另一種抗甲狀腺藥**;最嚴重為**顆粒性白血球缺乏症（agranulocytosis）**，出現發燒/喉嚨痛須立即驗WBC並停藥。本例白血球正常（4500）、僅皮疹→抗組織胺＋換藥，不需立即停藥開刀或放射碘。","options":{"A":"白血球正常、僅皮疹，不需立即停藥開刀。","B":"正解。給抗組織胺、換另一種抗甲狀腺藥。","C":"白血球正常不需立即放射碘。","D":"非顆粒性白血球缺乏，不需此處置。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"102030-60":{"quick":"懷孕25週、100g OGTT多項超標→妊娠糖尿病（GDM）。","detail":{"background":"妊娠糖尿病以**100g 3小時OGTT（Carpenter-Coustan）**:空腹≥95、1小時≥180、2小時≥155、3小時≥140，**≥2項異常即診斷GDM**。本例1小時190、2小時170、3小時160三項超標→GDM。先飲食控制，未達標加胰島素（或部分口服藥）。GDM增加日後第2型糖尿病風險。","options":{"A":"多項超標非正常。","B":"正解。妊娠糖尿病。","C":"已達診斷標準不需重驗。","D":"非僅葡萄糖耐受不良。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"102030-66":{"quick":"嗜鉻細胞瘤治療須先給α腎上腺素阻斷劑（再視情況加β阻斷劑）；血壓高低不定仍應先α阻斷。","detail":{"background":"嗜鉻細胞瘤術前準備:**先給α阻斷劑（phenoxybenzamine/doxazosin）10–14天控制血壓並擴充血容量，之後（α阻斷後）才可加β阻斷劑**;**絕不可先給β阻斷劑（會因α作用無對抗致高血壓危象）**;術前須補充輸液擴容;鈣離子阻斷劑可作輔助（非絕對禁用）。","options":{"A":"術前應補充輸液擴容（非避免輸液）。","B":"不可先給β阻斷劑。","C":"正解。血壓不定仍應先給α阻斷劑。","D":"鈣離子阻斷劑可作輔助、非絕對禁用。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"102110-53":{"quick":"庫欣氏病（腦下垂體ACTH瘤）對低劑量dexamethasone不抑制、對高劑量（8mg）會抑制。","detail":{"background":"Cushing症候群定位:**庫欣氏病（垂體ACTH腺瘤）保留部分負回饋→低劑量（1、2mg）dexamethasone不抑制，但高劑量（8mg）可抑制皮質醇≥50%**;異位ACTH與腎上腺腫瘤對高劑量亦多不抑制。故①②不抑制、③抑制為庫欣氏病。","options":{"A":"皆抑制不符庫欣氏病。","B":"順序不符。","C":"正解。低劑量不抑制、高劑量抑制＝庫欣氏病。","D":"皆不抑制偏向異位ACTH/腎上腺腫瘤。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"102110-54":{"quick":"甲狀腺功能低下身體診查可能發現甲狀腺瀰漫性腫大（如橋本氏甲狀腺炎）。","detail":{"background":"甲狀腺功能低下（多為橋本氏自體免疫）**可有瀰漫性甲狀腺腫**;仍可能併發甲狀腺癌（如淋巴瘤/乳突癌）;**老年人或缺血性心臟病者甲狀腺素應低劑量起始緩慢增加（避免誘發心絞痛/心律不整）**;懷孕時甲狀腺素需求增加、不可停藥。","options":{"A":"正解。可能發現甲狀腺瀰漫性腫大。","B":"仍可能出現甲狀腺癌（敘述過絕對）。","C":"老年人應低劑量緩慢起始（非立即足量）。","D":"懷孕不可停甲狀腺素（需求增加）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"102110-55":{"quick":"糖尿病發病過程圖：甲=血糖變化、乙=胰島素分泌量、丙=胰島素敏感度。","detail":{"background":"第2型糖尿病自然史:**早期胰島素敏感度（丙）下降→代償性胰島素分泌（乙）上升→β細胞耗竭分泌下降→血糖（甲）上升**。本題曲線甲為血糖、乙為胰島素分泌量、丙為胰島素敏感度。","options":{"A":"正解。甲血糖、乙胰島素分泌、丙敏感度。","B":"配對錯誤。","C":"配對錯誤。","D":"配對錯誤。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"102110-56":{"quick":"糖尿病發病的時間點為 III（β細胞代償失敗、血糖明顯上升時）。","detail":{"background":"承上:胰島素敏感度先降、胰島素分泌代償上升維持血糖正常（impaired glucose tolerance期）;**當β細胞代償失敗、分泌下降、血糖明顯上升的時間點（III）即為糖尿病發病**。","options":{"A":"I為早期敏感度下降。","B":"II為代償期。","C":"正解。III為β細胞失代償、血糖上升＝發病。","D":"IV為晚期。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103030-13":{"quick":"倦怠、膚色變黑、體重減輕、低血鈉＋輕度高血鉀/高血鈣→腎上腺功能低下，查ACTH、cortisol。","detail":{"background":"原發性腎上腺功能低下（Addison）:**疲倦、體重減輕、低血壓、皮膚與黏膜色素沉著（ACTH/MSH升高）、低血鈉、高血鉀、偶高血鈣**;本例曾131I治療甲狀腺、合併自體免疫（多腺體症候群）背景，膚色變黑＋低血鈉→腎上腺低下，**最具診斷價值為ACTH、cortisol（及cosyntropin刺激試驗）**。","options":{"A":"已知甲狀腺低下並服藥，非當前主因。","B":"anti-dsDNA/ANA查SLE，與此不符。","C":"正解。查ACTH、cortisol診斷腎上腺低下。","D":"PET非首要。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103030-14":{"quick":"糖尿病合併單一足下垂（無法背屈、足背感覺消失）→需做神經傳導檢查確認神經病變/壓迫。","detail":{"background":"糖尿病神經病變多為對稱性遠端多發性感覺神經病變;但**單一神經受損（如腓神經致足下垂）屬單神經病變/壓迫**，需以**神經傳導檢查（NCS/EMG）**定位與評估;本例非微白蛋白尿期、甲狀腺腫為偶見，下一步以神經傳導檢查最恰當。","options":{"A":"甲狀腺功能與足下垂無直接關係。","B":"正解。神經傳導檢查定位神經病變。","C":"腰椎MRI非首選（先電生理定位）。","D":"類風濕因子與此不符。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103030-22":{"quick":"原發性醛固酮症（primary aldosteronism）合併的是『低血鉀』，不是高血鉀；故該敘述錯誤。","detail":{"background":"次發性高血壓:**最常見為腎實質病變**;嗜鉻細胞瘤可發生於腎上腺外（paraganglioma）;睡眠呼吸障礙亦為原因。**原發性醛固酮症（醛固酮過多）造成鈉滯留、高血壓與『低血鉀』、代謝性鹼中毒、腎素低下**，故「常合併高血鉀」為錯誤。","options":{"A":"正解（錯誤）。原發性醛固酮症合併低血鉀，非高血鉀。","B":"最常見次發性高血壓為腎實質病變，正確。","C":"嗜鉻細胞瘤可在腎上腺外，正確。","D":"睡眠呼吸障礙為次發性高血壓原因，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103030-37":{"quick":"第2型糖尿病腎病變最早期表現為腎絲球過濾率上升（hyperfiltration，GFR>120）。","detail":{"background":"糖尿病腎病變自然史:**最早期為腎絲球高過濾（hyperfiltration，GFR升高）與腎肥大→接著微白蛋白尿（30–300 mg/day）→巨量蛋白尿→GFR下降、血壓升高**。故GFR>120的高過濾為最早期表現，先於微白蛋白尿與肌酸酐上升。","options":{"A":"微白蛋白尿較高過濾稍晚。","B":"肌酸酐上升為更晚期。","C":"正解。腎絲球高過濾（GFR>120）最早期。","D":"血壓上升較晚。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103030-38":{"quick":"肺癌化療後低血鈉、尿滲透壓不當偏高、無水腫→SIADH，故『ADH沒有分泌』敘述錯誤。","detail":{"background":"抗利尿激素不適當分泌（SIADH）:**等容積性低血鈉，血清滲透壓低但尿滲透壓不當偏高（>100）、尿鈉>20**，常見於肺癌（小細胞）、中樞病變、藥物。**治療限水**;校正過快恐致滲透性脫髓鞘。本例尿滲透壓290（不當偏高）→ADH確有分泌（並非沒有分泌）。","options":{"A":"血清滲透壓約250（低），正確。","B":"正解（錯誤）。SIADH是ADH分泌不當增加，並非沒有分泌。","C":"應限制水分攝取，正確。","D":"高張食鹽水須密切監測血鈉、上升不可過快，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103030-39":{"quick":"難控高血壓＋低血鉀（amlodipine等多藥仍高）→原發性醛固酮症（康氏症 Conn's syndrome）。","detail":{"background":"年輕、難治型高血壓合併**自發性低血鉀**且無其他特徵→**原發性醛固酮症（Conn's，醛固酮腺瘤）**，醛固酮/腎素比值（ARR）升高。嗜鉻細胞瘤為陣發高血壓/頭痛/流汗;庫欣有月亮臉/紫紋;CAH多兒童期。本例符合Conn's。","options":{"A":"嗜鉻細胞瘤為陣發症狀，較不符。","B":"庫欣有特殊外觀，無描述。","C":"先天性腎上腺增生多兒童期表現。","D":"正解。原發性醛固酮症（康氏症）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103030-44":{"quick":"第1型糖尿病主要由自體反應性T淋巴球攻擊胰島β細胞所致。","detail":{"background":"自體免疫組織傷害以**細胞媒介（自體反應T細胞）**為主者:**第1型糖尿病（T細胞破壞胰島β細胞）**、橋本氏甲狀腺炎、腹腔疾病等;重症肌無力（抗AChR抗體）、Goodpasture（抗GBM抗體）、Graves（TSH受體刺激抗體）屬抗體媒介。","options":{"A":"正解。第1型糖尿病為自體反應T細胞媒介。","B":"重症肌無力為抗體媒介。","C":"Goodpasture為抗GBM抗體。","D":"Graves為刺激性抗體。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103030-46":{"quick":"小細胞肺癌＋嚴重低血鈉（SIADH）若太快校正，最怕滲透性大腦去髓鞘症候群（osmotic demyelination）。","detail":{"background":"慢性低血鈉（SIADH，本例小細胞肺癌、尿滲透壓不當偏高）**校正速度過快→腦細胞快速脫水→滲透性脫髓鞘（中央橋腦髓鞘溶解）**，故每日血鈉上升不應超過約6–8 mmol/L。治療慢性SIADH以限水為主。","options":{"A":"反彈性高血糖非此風險。","B":"正解。滲透性大腦去髓鞘症候群。","C":"肺水腫非主要顧慮。","D":"低鈉校正過快致脫水而非腦水腫。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103030-57":{"quick":"骨組織切片thyroglobulin陽性→來自甲狀腺的轉移，應先做甲狀腺全切除術。","detail":{"background":"**thyroglobulin為甲狀腺濾泡細胞特異標記**;遠處（如脊椎）轉移之thyroglobulin陽性腺癌→來源為分化型甲狀腺癌。處置為**甲狀腺全切除術**，術後再以放射碘治療殘餘與轉移、並以thyroglobulin追蹤。","options":{"A":"放射碘治療應在甲狀腺全切後。","B":"外部電療非首要。","C":"正解。先做甲狀腺全切除術。","D":"已確認來源，非僅再驗thyroglobulin。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103030-58":{"quick":"已知腦下垂體腫瘤突發劇烈頭痛、嘔吐、視力模糊→腦下垂體中風（pituitary apoplexy）。","detail":{"background":"**腦下垂體中風（apoplexy）**為垂體腫瘤突發出血/梗塞，表現**突發劇烈頭痛、視力模糊/視野缺損、眼肌麻痺、可併急性腎上腺功能不足（致命）**，須緊急評估並補充類固醇、必要時手術減壓。","options":{"A":"垂體感染罕見。","B":"正解。腦下垂體中風（apoplexy）。","C":"腫瘤轉移非急性此表現。","D":"空蝶鞍多無急性症狀。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103030-59":{"quick":"副甲狀腺功能『不足』不是骨質疏鬆的次發病因；甲狀腺亢進、第1型糖尿病、早發更年期才是。","detail":{"background":"骨質疏鬆次發病因:甲狀腺/副甲狀腺**亢進**、庫欣/類固醇、性腺低下/早發停經、第1型糖尿病、吸收不良、慢性腎病、抗癲癇藥等。**副甲狀腺功能低下使PTH不足、骨轉換降低，反不致骨質疏鬆**，故非次發病因。","options":{"A":"甲狀腺亢進為次發病因。","B":"第1型糖尿病為次發病因。","C":"正解。副甲狀腺功能不足非骨鬆次發病因。","D":"早發更年期為次發病因。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103030-60":{"quick":"代謝症候群與胰島素阻抗相關、增加心血管風險；但『肥胖（中央肥胖）並非診斷的必要條件』。","detail":{"background":"代謝症候群（NCEP ATP III）需5項中符合≥3項:中央肥胖（腰圍）、高三酸甘油酯、低HDL、高血壓、高空腹血糖。**任三項即可，肥胖非『必要』條件**;與胰島素阻抗相關、增加心血管疾病風險、血糖升高但未必達糖尿病標準。","options":{"A":"增加心血管風險，正確。","B":"與胰島素阻抗相關，正確。","C":"正解（錯誤）。肥胖非診斷必要條件（任三項）。","D":"血糖升高未必達糖尿病標準，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103100-13":{"quick":"腕隧道、下巴突出、高血壓、GH偏高→肢端肥大症，先做口服葡萄糖抑制試驗（GH不被抑制可確診）。","detail":{"background":"肢端肥大症（GH瘤）:臨床有肢端/下顎增大、腕隧道症候群、高血壓、糖尿病;**GH呈脈衝分泌、單次GH不可靠;確診以口服葡萄糖抑制試驗（OGTT後GH無法被抑制<1 ng/mL）**，並測IGF-1;確診後做垂體MRI定位。治療首選經蝶鞍手術。","options":{"A":"正解。先做葡萄糖抑制試驗確認GH不被抑制。","B":"MRI在生化確診後定位。","C":"垂體功能檢查非首要確診步驟。","D":"胰島素低血糖試驗用於評估GH缺乏，非過多。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103100-26":{"quick":"依2001 ATP III，空腹血糖門檻為≥110 mg/dL（後2005修訂為≥100）；本題以此空腹血糖敘述為『非』。","detail":{"background":"NCEP ATP III（2001）代謝症候群5項:**血壓≥130/85、三酸甘油酯≥150、HDL（男<40、女<50）、腰圍（中央肥胖）、空腹血糖≥110**（2005 AHA/NHLBI修訂為≥100）。本題依公布答案，將空腹血糖門檻之敘述列為不符（注意版本差異:110 vs 100）。","options":{"A":"血壓≥130/85為標準。","B":"三酸甘油酯≥150為標準。","C":"女性HDL<50為標準。","D":"正解（公布答案）。空腹血糖門檻（110/100）之敘述為本題之『非』。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103100-35":{"quick":"低腎素低醛固酮症（hyporeninemic hypoaldosteronism）特徵為『代謝性酸中毒＋高血鉀』（第4型RTA）。","detail":{"background":"**低腎素低醛固酮症**多見於糖尿病腎病變，醛固酮不足→遠端腎小管排鉀排酸障礙→**高血鉀合併高血氯型（正常陰離子隙）代謝性酸中毒（第4型RTA）**。","options":{"A":"代謝性鹼中毒＋高鉀不符。","B":"正解。代謝性酸中毒＋高血鉀。","C":"鹼中毒＋低鉀不符。","D":"酸中毒＋低鈉不符。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103100-45":{"quick":"CD7不是神經內分泌瘤的免疫標記；NET標記為chromogranin A、synaptophysin、NSE。","detail":{"background":"神經內分泌瘤（NET）免疫組織標記:**chromogranin A、synaptophysin、neuron-specific enolase（NSE）、CD56**。**CD7為T細胞/淋巴造血標記，非NET標記**。","options":{"A":"NSE為NET標記。","B":"synaptophysin為NET標記。","C":"chromogranin A為NET標記。","D":"正解。CD7非NET標記。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103100-57":{"quick":"兩側甲狀腺低回音、細胞學以淋巴球為主→橋本氏甲狀腺炎；若併心律不整不應用amiodarone（含碘、影響甲狀腺）。","detail":{"background":"橋本氏甲狀腺炎（自體免疫，淋巴球浸潤）可瀰漫低回音腫大;可用甲狀腺素治療;**amiodarone含大量碘、可致甲狀腺功能異常（亢進或低下）並干擾，故甲狀腺疾病者若心律不整應避免amiodarone**;產後甲狀腺腫可變大。故C錯誤。","options":{"A":"可用甲狀腺素治療，正確。","B":"避免含碘食物（自體免疫甲狀腺炎），合理。","C":"正解（錯誤）。不應用含碘的amiodarone。","D":"產後甲狀腺腫可能變大，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103100-58":{"quick":"泌乳素瘤（prolactinoma）對口服多巴胺促效劑反應最好，可降泌乳素並縮小腫瘤。","detail":{"background":"**泌乳素瘤為唯一以藥物（多巴胺促效劑 cabergoline/bromocriptine）為第一線者，能有效降低泌乳素並縮小腫瘤體積**;肢端肥大（GH瘤）、庫欣氏病（ACTH瘤）、TSH瘤多以手術為主。","options":{"A":"肢端肥大以手術為主。","B":"庫欣氏病以手術為主。","C":"正解。泌乳素瘤對口服藥反應最好。","D":"TSH瘤以手術為主。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103100-59":{"quick":"DPP-4抑制劑為血糖依賴性促胰島素分泌、單用『不易』低血糖；說它最易低血糖為錯誤。","detail":{"background":"低血糖最常見於糖尿病者使用降血糖藥（尤**胰島素、磺醯尿素、meglitinide**）。**DPP-4抑制劑（與GLP-1機轉）為葡萄糖依賴性促胰島素分泌、抑制升糖素，單獨使用低血糖風險低**;metformin亦不易低血糖;併用α-glucosidase抑制劑發生低血糖時應直接給葡萄糖（雙醣/多醣分解被抑制）。","options":{"A":"降血糖藥為低血糖最常見原因，正確。","B":"正解（錯誤）。DPP-4抑制劑不易致低血糖。","C":"metformin不易低血糖，正確。","D":"併acarbose低血糖須給葡萄糖，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103100-60":{"quick":"糖尿病診斷的餐後/OGTT 2小時血糖門檻為≥200 mg/dL（非180）。","detail":{"background":"糖尿病診斷標準:**空腹血漿葡萄糖≥126、OGTT 2小時≥200、HbA1c≥6.5%、或典型症狀＋隨機血糖≥200**。本題『餐後兩小時≥180』錯誤（應為≥200;180為妊娠GDM部分門檻或耐糖不良範圍）。","options":{"A":"空腹≥126，正確。","B":"正解（錯誤）。2小時應≥200，非180。","C":"HbA1c≥6.5%，正確。","D":"症狀＋隨機≥200，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103100-61":{"quick":"Kussmaul深快呼吸見於『糖尿病酮酸中毒（DKA）』，較少見於高血糖高滲透壓狀態（HHS）；故敘述反了。","detail":{"background":"DKA vs HHS:**DKA動脈血pH較低（常<7.3）、有酮體、Kussmaul呼吸（代償代謝性酸中毒）、多見兒童/第1型**;**HHS血糖更高（常>600）、滲透壓高、無明顯酸中毒/酮體、多見病弱老人**。本題D說Kussmaul較常見於HHS為錯誤。","options":{"A":"DKA pH較低，正確。","B":"HHS血糖更高，正確。","C":"HHS多見老人、DKA多見兒童，正確。","D":"正解（錯誤）。Kussmaul呼吸常見於DKA，非HHS。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"103100-68":{"quick":"甲狀腺機能亢進會增加骨轉換、降低骨密度，是骨質疏鬆的危險因子。","detail":{"background":"骨質疏鬆危險因子:**甲狀腺機能亢進（骨轉換增加）**、性腺低下/早發停經、類固醇、吸菸、低BMI、家族史等。**肥胖、口服避孕藥（雌激素）、哺乳一般非增加骨鬆風險**（雌激素具保護）。故本例以甲狀腺亢進為增加骨鬆風險者。","options":{"A":"口服避孕藥（雌激素）非增加骨鬆。","B":"肥胖一般非骨鬆危險因子。","C":"正解。甲狀腺機能亢進增加骨鬆風險。","D":"哺乳後骨量多可恢復、非長期危險因子。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104030-01":{"quick":"甲狀腺腫『有壓痛』最不傾向惡性（壓痛多為亞急性甲狀腺炎/出血）；硬如石、聲帶麻痺、淋巴結才指向惡性。","detail":{"background":"甲狀腺結節惡性危險特徵:**質地堅硬固定、生長快速、聲音沙啞/聲帶麻痺（喉返神經侵犯）、頸部淋巴結腫大、頭頸放射史、男性、極年輕或年長**。**疼痛/壓痛多見於亞急性甲狀腺炎或結節出血，較不傾向惡性**。","options":{"A":"頸部淋巴結傾向惡性。","B":"正解。甲狀腺腫有壓痛最不傾向惡性。","C":"聲帶麻痺傾向惡性。","D":"堅硬如石傾向惡性。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104030-13":{"quick":"限水後尿仍稀、注射ADH（pitressin）後尿滲透壓明顯上升→腦下垂體（中樞）ADH分泌不足，且為完全型。","detail":{"background":"限水試驗:**中樞性DI限水後尿無法濃縮、給ADH後尿滲透壓明顯上升**;本例限水6小時尿僅300、給ADH後升至550（上升明顯且絕對值偏低→『完全型』中樞性ADH缺乏）。部分型上升幅度較小。腎性DI給ADH無反應、原發性多飲限水即可濃縮。","options":{"A":"部分型上升幅度較小，不符。","B":"正解。腦下垂體全部ADH分泌不足（完全型中樞DI）。","C":"心理性多飲限水即可濃縮。","D":"腎性DI給ADH無反應。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104030-14":{"quick":"甲亢+觸感堅實結節+TSH受體抗體陰性→需以I-131甲狀腺掃描判斷是否為毒性自主性(熱)結節,故下一步選B。","detail":{"background":"甲狀腺I-131掃描**熱結節（hot nodule）＝自主性高功能結節**，吸碘高、抑制周邊正常組織、TSH受體抗體陰性（與Graves區別）;本例結節大小不變、合併甲亢與心房顫動→**毒性自主性結節，治療以放射碘（或手術）**。熱結節惡性機率低，故非以手術切片為先。","options":{"A":"甲狀腺超音波看結構,無法判斷功能性病因。","B":"★正確(本題答案)。I-131掃描可鑑別熱/冷結節、確認自主功能亢進之病因。","C":"TRH刺激試驗已少用,非首選。","D":"18FDG-PET/CT用於腫瘤評估,非功能性病因診斷。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104030-35":{"quick":"為減少糖尿病腎病變微白蛋白尿進展，HbA1c一般應控制在<7.0%。","detail":{"background":"嚴格血糖控制（**HbA1c<7%**）可延緩糖尿病微血管併發症（腎病變、視網膜、神經）發生與進展;血壓控制與RAAS阻斷劑（ACEi/ARB）亦減少蛋白尿。過嚴（如<6%）對年長/共病者反增低血糖風險，須個別化。","options":{"A":"<5%過嚴、易低血糖。","B":"<6%對多數人過嚴。","C":"正解。一般控制在<7.0%。","D":"<8%對年輕者偏鬆。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104030-37":{"quick":"SIADH（抗利尿激素不適當分泌）造成低鈉血症（hyponatremia）。","detail":{"background":"**SIADH→水滯留、等容積性低血鈉，血清滲透壓低、尿滲透壓不當偏高、尿鈉>20**;常見於中樞病變、肺疾、惡性腫瘤、藥物。治療限水。","options":{"A":"非高鈉血症。","B":"正解。SIADH造成低鈉血症。","C":"非高鉀。","D":"非低鉀。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104030-39":{"quick":"高血鈣鑑別問診中，『有無使用類固醇』最無幫助（類固醇致低血鈣，非高血鈣病因）。","detail":{"background":"高血鈣（本例free Ca 3.0偏高）病史鑑別應問:**thiazide利尿劑（升血鈣）、尿路結石/家族史（原發性副甲狀腺亢進）、維生素D/鈣補充過量、惡性腫瘤、肉芽腫病**。**類固醇反造成低血鈣（並用於治療維生素D/肉芽腫性高血鈣），故問是否用類固醇對高血鈣病因鑑別最無幫助**。","options":{"A":"thiazide升血鈣，有幫助。","B":"結石史指向原發性副甲狀腺亢進，有幫助。","C":"維生素D過量致高血鈣，有幫助。","D":"正解。問類固醇對高血鈣鑑別最無幫助。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104030-41":{"quick":"突發四肢無力、嚴重低血鉀、尿鉀偏高→可能為甲狀腺毒性週期性麻痹，須驗甲狀腺功能；不應大量補鉀以免反彈高血鉀。","detail":{"background":"**甲狀腺毒性週期性麻痹（亞洲年輕男性）**:甲亢時鉀向細胞內移動→急性低血鉀肢體無力，**體內總鉀不缺，補鉀須謹慎（細胞內鉀回流易致反彈性高血鉀）**;治療甲亢與非選擇性β阻斷劑。本例需驗甲狀腺功能。故B（大量補鉀）錯誤。","options":{"A":"應檢測甲狀腺功能，正確。","B":"正解（錯誤）。為細胞內移動、不應大量補鉀（防反彈高鉀）。","C":"補鉀加生理食鹽水優於葡萄糖（葡萄糖促胰島素使鉀更入細胞），正確。","D":"須監測血鉀防反彈高鉀，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104030-58":{"quick":"臨床/生化疑嗜鉻細胞瘤但腎上腺CT看不到腫瘤→做MIBG核醫掃描尋找腎上腺外/轉移病灶。","detail":{"background":"嗜鉻細胞瘤生化（尿VMA/metanephrines）陽性但腎上腺影像陰性時，疑**腎上腺外paraganglioma或轉移**，可做**131I/123I-MIBG核醫掃描或DOTATATE-PET全身定位**。99mTc-sestamibi用於副甲狀腺，非嗜鉻細胞瘤。","options":{"A":"正解。MIBG核醫掃描定位。","B":"胸部CT非特異定位首選。","C":"胸部MRI非首選功能定位。","D":"sestamibi用於副甲狀腺。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104030-59":{"quick":"MEN 2A與2B共同特徵是甲狀腺髓質癌與嗜鉻細胞瘤；『副甲狀腺瘤』見於2A而非2B，故敘述錯誤。","detail":{"background":"MEN分型:**MEN1（3P:副甲狀腺、胰島、腦下垂體）**;**MEN2A=甲狀腺髓質癌＋嗜鉻細胞瘤＋副甲狀腺增生**;**MEN2B=甲狀腺髓質癌＋嗜鉻細胞瘤＋黏膜神經瘤/馬凡體態（無副甲狀腺）**;MEN2皆為RET致癌基因突變;建議幼年預防性甲狀腺全切。故2A/2B共同特徵應為髓質癌＋嗜鉻細胞瘤（非副甲狀腺瘤）。","options":{"A":"MEN1含垂體、副甲狀腺、胰島，正確。","B":"正解（錯誤）。2A/2B共同為髓質癌＋嗜鉻細胞瘤;副甲狀腺見於2A非2B。","C":"MEN2皆RET突變，正確。","D":"MEN2幼年預防性甲狀腺切除可降死亡，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104030-61":{"quick":"以Friedewald公式 LDL=TC−HDL−TG/5＝287−90−35＝162 mg/dL。","detail":{"background":"**Friedewald公式:LDL-C = 總膽固醇 − HDL-C − (三酸甘油酯/5)**（TG<400 mg/dL時適用，單位mg/dL）。本例287−90−(175/5=35)=162 mg/dL。","options":{"A":"計算錯誤。","B":"計算錯誤。","C":"計算錯誤。","D":"正解。LDL=287−90−35=162 mg/dL。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104030-67":{"quick":"肥胖增加退化性關節炎（osteoarthritis）風險。","detail":{"background":"肥胖併發症:第2型糖尿病、高血壓、血脂異常、心血管疾病、脂肪肝、睡眠呼吸中止、**退化性關節炎（負重關節）**、多種癌症等。**甲狀腺低下/骨質疏鬆/風濕性心臟病非肥胖直接增加之疾病**（肥胖者骨密度反多偏高）。","options":{"A":"甲狀腺低下非肥胖致病。","B":"正解。肥胖增加退化性關節炎。","C":"風濕性心臟病與鏈球菌相關，非肥胖。","D":"肥胖者骨密度多偏高、非骨鬆。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104090-13":{"quick":"甲狀腺低下＋腎上腺低下並存（多腺體自體免疫）時，須『先補可體酮（類固醇）再補甲狀腺素』，且低劑量起始。","detail":{"background":"自體免疫多腺體症候群（本例白斑、家族Graves/Hashimoto、free T4低TSH高＝原發甲狀腺低下、cortisol極低＝腎上腺低下）。**治療順序:先給糖皮質素（cortisone），再給甲狀腺素**;若先給甲狀腺素會加速皮質醇代謝、誘發腎上腺危象。年長/缺血性心臟病者甲狀腺素應低劑量（25 µg）緩慢起始。本例D（先cortisone再低劑量甲狀腺素25 µg）最佳。","options":{"A":"先甲狀腺素恐誘發腎上腺危象。","B":"甲狀腺素100 µg對狹心症者起始過高。","C":"先甲狀腺素順序錯。","D":"正解。先cortisone、再低劑量甲狀腺素25 µg。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104090-14":{"quick":"原為熱結節、現甲亢加劇合併心房顫動→以I-131放射碘治療毒性自主性結節。","detail":{"background":"自主性高功能（熱）結節隨時間可致顯性甲亢與心房顫動;**治療以放射碘（I-131）消除自主性結節，或手術**;熱結節惡性機率低、不以追蹤或單純超音波為足夠處置。","options":{"A":"已甲亢加劇，非僅追蹤。","B":"非僅超音波/功能追蹤。","C":"手術可選但放射碘為常用。","D":"正解。I-131放射碘治療。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104090-49":{"quick":"口服降血糖藥中metformin不會增加（甚至略降）體重。","detail":{"background":"體重影響:**磺醯尿素（glyburide）、TZD（pioglitazone）、meglitinide（repaglinide）、胰島素傾向增重**;**metformin體重中性或略降;GLP-1促效劑、SGLT2抑制劑可減重**。","options":{"A":"glyburide增重。","B":"正解。metformin不增體重。","C":"pioglitazone增重。","D":"repaglinide增重。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104090-50":{"quick":"高醛固酮血症（hyperaldosteronism）較不會併發骨質疏鬆；甲亢、庫欣、性腺低下才會。","detail":{"background":"骨質疏鬆次發病因:**甲狀腺亢進、庫欣症候群（皮質醇過多）、性腺低下**等。**原發性醛固酮過多以高血壓低血鉀為主，較不直接造成骨質疏鬆**（近年研究有間接關聯但非典型病因）。","options":{"A":"甲亢致骨鬆。","B":"庫欣致骨鬆。","C":"性腺低下致骨鬆。","D":"正解。高醛固酮血症較不會併骨鬆。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104090-62":{"quick":"血脂代謝流程：甲=VLDL、乙=LDL、丙=chylomicron。","detail":{"background":"脂蛋白:**乳糜微粒（chylomicron，丙）運送飲食三酸甘油酯（腸道，ApoB-48）**;**VLDL（甲）由肝臟合成運送內生性三酸甘油酯（ApoB-100）→經IDL代謝為LDL（乙）運送膽固醇（ApoB-100）**;HDL逆向運送膽固醇。本題甲VLDL、乙LDL、丙chylomicron。","options":{"A":"配對錯誤。","B":"配對錯誤。","C":"正解。甲VLDL、乙LDL、丙chylomicron。","D":"配對錯誤。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104090-63":{"quick":"乙（LDL，由VLDL代謝而來）的主要載脂蛋白為ApoB-100。","detail":{"background":"**VLDL與其代謝產物LDL的結構性載脂蛋白為ApoB-100（肝臟來源）**;乳糜微粒為ApoB-48（腸道）;ApoE為受體辨識（殘餘顆粒）;ApoC-II活化脂蛋白脂解酶。本題乙＝LDL→ApoB-100。","options":{"A":"正解。ApoB-100。","B":"ApoB-48為乳糜微粒。","C":"ApoE為殘餘顆粒受體辨識。","D":"ApoC-II活化LPL。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"104090-68":{"quick":"每日少500大卡，六週（42天）約少21000大卡÷7700≈約3公斤。","detail":{"background":"**約7700 大卡熱量赤字≈減1公斤體脂**。每日少500大卡×42天＝21000大卡，21000/7700≈2.7–3公斤。故約減3公斤。","options":{"A":"低估。","B":"正解。約3公斤。","C":"高估。","D":"高估。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"105020-55":{"quick":"昇糖素（glucagon）分泌不足不是第2型糖尿病的致病機轉；其機轉為胰島素阻抗、分泌不足、游離脂肪酸過多（甚至升糖素相對過多）。","detail":{"background":"第2型糖尿病核心機轉:**胰島素阻抗、β細胞胰島素分泌相對不足、肝糖質新生增加、游離脂肪酸過多（脂毒性）、腸泌素效應降低、α細胞升糖素相對『過多』**。**升糖素分泌『不足』並非致病機轉（反而相對過多）**。","options":{"A":"胰島素阻抗為機轉。","B":"胰島素分泌不足為機轉。","C":"正解。升糖素分泌不足非致病機轉。","D":"游離脂肪酸過多為機轉。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"105020-57":{"quick":"台灣肥胖定義為BMI≥27（非≥30）；腰圍男≥90、女≥80。","detail":{"background":"**台灣成人肥胖:BMI≥27為肥胖（24–27過重）;腹部肥胖腰圍男≥90 cm、女≥80 cm**。庫欣症候群常見肥胖（中心型）;顱咽瘤可損下視丘致多食肥胖。故A（BMI≥30）錯誤（為WHO西方標準）。","options":{"A":"正解（錯誤）。台灣肥胖為BMI≥27，非≥30。","B":"腰圍男≥90、女≥80，正確。","C":"庫欣常見肥胖，正確。","D":"顱咽瘤可致多食肥胖，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"105020-58":{"quick":"非自主體重減輕可見於多種疾病；說『只有第1型糖尿病控制不佳才會體重減輕、第2型不會』是錯誤的。","detail":{"background":"非自主體重減輕定義:6–12個月內減>5%且非刻意。原因含惡性腫瘤、內分泌（甲亢、糖尿病、腎上腺功能不足）、感染、消化吸收、精神等。**血糖嚴重失控時第1型與第2型糖尿病皆可體重減輕（滲透性利尿與分解代謝）**，故「只有第1型會」錯誤。合併心悸/高血壓要考慮甲亢或嗜鉻細胞瘤。","options":{"A":"6–12月減>5%為有意義，正確。","B":"正解（錯誤）。第2型嚴重失控亦可體重減輕。","C":"非刻意節食，正確。","D":"合併心悸/高血壓考慮甲亢/嗜鉻細胞瘤，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"105020-59":{"quick":"口服降血糖藥中metformin（雙胍）可能引起乳酸血症。","detail":{"background":"**metformin（雙胍類）最嚴重副作用為乳酸中毒（lactic acidosis）**，尤其腎功能不全、缺氧、顯影劑使用、急重症時，故eGFR過低或顯影劑檢查前後須暫停。sitagliptin、pioglitazone、acarbose不致乳酸血症。","options":{"A":"正解。metformin可致乳酸血症。","B":"sitagliptin（DPP-4）不致。","C":"pioglitazone不致。","D":"acarbose不致。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"105100-07":{"quick":"微/巨量白蛋白尿『可能』出現於新診斷的第2型糖尿病（發病前已隱性多年）；說不會出現是錯誤。","detail":{"background":"第2型糖尿病常在診斷前已隱匿多年，**新診斷時即可能已有微白蛋白尿或腎病變**。病理見腎絲球基底膜增厚、間質擴張（Kimmelstiel-Wilson結節）;治療用RAAS阻斷劑減蛋白尿;糖尿病腎病變為國內透析新個案首位病因。故A錯誤。","options":{"A":"正解（錯誤）。新診斷第2型糖尿病亦可能有蛋白尿。","B":"基底膜增厚/間質擴張常見，正確。","C":"用RAAS阻斷劑，正確。","D":"糖尿病為透析新病人首位病因，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"105100-13":{"quick":"原發無月經、嗅覺不佳、LH與estradiol極低→低性腺刺激素性腺低下（Kallmann）；其骨質疏鬆首選補充雌激素。","detail":{"background":"本例原發性無月經、嗅覺不佳、LH<0.8、estradiol極低→**低促性腺素性腺低下（Kallmann症候群，GnRH缺乏）**。雌激素缺乏造成骨質疏鬆，**年輕女性性腺低下的骨鬆首選為補充雌激素（性荷爾蒙替代）**以恢復骨量並維持女性化，而非一線用bisphosphonate。","options":{"A":"bisphosphonate非年輕性腺低下女性首選。","B":"正解。補充雌激素（性荷爾蒙替代）。","C":"鈣＋維生素D為輔助、非主治。","D":"PTH類似物非首選。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"105100-14":{"quick":"懷孕、甲狀腺輕腫、free T4低、TSH高（20）→原發性甲狀腺功能低下。","detail":{"background":"原發性甲狀腺功能低下:**free T4低、TSH升高（負回饋）**;懷孕時甲狀腺素需求增加，未治療之甲低影響胎兒神經發育，須以甲狀腺素治療並將TSH控制在孕期目標。本例TSH 20、free T4 0.6→原發性甲低。","options":{"A":"非正常。","B":"非甲亢（TSH高）。","C":"次發性甲低TSH會低/不適當正常，不符。","D":"正解。原發性甲狀腺功能低下。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"105100-34":{"quick":"醛固酮缺乏（aldosterone deficiency）造成的低血鈉伴體液不足，最適合以0.9%生理食鹽水治療。","detail":{"background":"低血鈉處置依容積與病因:**醛固酮缺乏（腎上腺功能不足）為低容積性低血鈉（失鈉）→補充0.9%生理食鹽水（並補糖皮質/礦皮質素）最適合**;高血糖為假性/轉移性低鈉應降血糖;甲狀腺低下與SIADH多為等/高容積、限水為主，給生理食鹽水恐惡化。","options":{"A":"高血糖性低鈉應控制血糖。","B":"甲狀腺低下宜補甲狀腺素。","C":"正解。醛固酮缺乏（失鈉）補生理食鹽水。","D":"SIADH以限水為主，鹽水恐惡化。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"105100-54":{"quick":"第2型糖尿病患相對於第1型，骨質密度通常『較高』（但骨折風險仍可能增加）。","detail":{"background":"糖尿病與骨骼:**第1型糖尿病骨密度低、骨折風險明顯增加;第2型糖尿病骨密度常正常或偏高（與肥胖相關），但因骨品質差、跌倒風險高，骨折風險仍上升**。故「第2型較第1型骨密度高」正確。","options":{"A":"正解。第2型較第1型骨密度高。","B":"第2型骨折風險仍增加（非較少）。","C":"骨折風險第1型高於一般，敘述方向有誤。","D":"血糖控制與骨密度關係非如此單純。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"105100-55":{"quick":"診斷庫欣氏症候群最可靠的初步篩檢之一為低劑量dexamethasone抑制試驗（不被抑制）。","detail":{"background":"庫欣篩檢:**隔夜1 mg或低劑量（2天2 mg）dexamethasone抑制試驗、24小時尿游離皮質醇、深夜唾液/血皮質醇**;**皮質醇自主過量者低劑量dexamethasone無法抑制**。單次早上皮質醇受脈衝/壓力影響不可靠。本題以低劑量dexamethasone抑制試驗為最可靠。","options":{"A":"單次早上皮質醇不可靠。","B":"隔夜1mg亦可、惟本題答低劑量試驗。","C":"半夜皮質醇可輔助。","D":"正解（公布答案）。低劑量dexamethasone抑制試驗。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"105100-56":{"quick":"載脂蛋白（apoproteins）不是脂蛋白脂解酶（LPL）的前驅物；其功能為與受體結合、輔助酵素、穩定結構。","detail":{"background":"載脂蛋白（apolipoprotein）功能:**與脂蛋白受體結合（如ApoB-100與LDL受體）、活化/輔助酵素（ApoC-II活化LPL、ApoA-I活化LCAT）、穩定脂蛋白結構、運送**。**apoprotein並非『合成LPL的前驅物』**（LPL為獨立酵素）。","options":{"A":"與脂蛋白受體結合，正確。","B":"輔助酵素（如活化LPL/LCAT），正確。","C":"正解（錯誤）。apoprotein非LPL之前驅物。","D":"穩定脂蛋白結構，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"105100-69":{"quick":"早期偵測糖尿病腎病變最適合的篩檢項目為尿微白蛋白（microalbuminuria）。","detail":{"background":"**糖尿病腎病變最早期可偵測指標為尿微白蛋白（尿白蛋白/肌酸酐比，30–300 mg/g）**，先於肌酸酐上升與一般尿液常規異常;建議第2型糖尿病確診即起、第1型發病5年後每年篩檢。","options":{"A":"肌酸酐上升較晚。","B":"尿素氮非早期指標。","C":"正解。微白蛋白尿最早期篩檢。","D":"一般尿液常規敏感度不足。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106020-07":{"quick":"限水後尿濃縮有限、給DDAVP尿滲透壓幾乎無進一步上升→腎性尿崩症，可用thiazide治療。","detail":{"background":"**腎性尿崩症（腎對ADH無反應）**:限水後尿滲透壓無法明顯上升、給DDAVP後仍無明顯反應。**治療矛盾性使用thiazide利尿劑（造成輕度容積收縮、增加近端鈉水再吸收、減少尿量）併低鈉飲食、±amiloride/NSAID**。中樞性DI給DDAVP尿滲透壓會明顯上升。","options":{"A":"原發性多飲血鈉偏低、限水即可濃縮。","B":"治療非單純限水。","C":"正解。腎性尿崩症以thiazide治療。","D":"DDAVP後無明顯反應、非中樞型。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106020-13":{"quick":"男性倦怠、性慾減退、陽痿，FSH/LH/testosterone皆低（低促性腺素性腺低下）→應測血中泌乳素（prolactin）。","detail":{"background":"男性性腺低下:**LH/FSH與testosterone皆低＝次發性（中樞性）性腺低下**，須排除**高泌乳素血症（泌乳素瘤）**與其他垂體病變，故應**測prolactin**並評估垂體。本例非單純男性更年期、不可逕以睪固酮治療而忽略潛在垂體腫瘤。","options":{"A":"不應逕視為男性更年期而忽略中樞病因。","B":"睪丸小而軟非『小而硬』。","C":"正解。應測血中泌乳素濃度。","D":"超音波測陰莖血流非首要。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106020-14":{"quick":"急性四肢無力＋嚴重低血鉀＋TSH極低、free T4高→甲狀腺毒性週期性麻痹。","detail":{"background":"**甲狀腺毒性週期性麻痹（thyrotoxic periodic paralysis）**:亞洲年輕男性，甲亢時鉀向細胞內移動→急性低血鉀（可<2）肢體無力、深部肌腱反射下降、CK可升高;TSH低、free T4高。治療甲亢與β阻斷劑，補鉀須謹慎。","options":{"A":"原發性醛固酮症為慢性高血壓低血鉀。","B":"正解。甲狀腺毒性週期性麻痹。","C":"利尿劑過量無甲亢之TSH/T4變化。","D":"RTA有酸鹼異常、非此甲亢圖像。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106020-51":{"quick":"甲狀腺髓質癌合併嗜鉻細胞瘤→MEN2，須做RET致癌基因檢查（病人與子女）。","detail":{"background":"**甲狀腺髓質癌＋嗜鉻細胞瘤（±副甲狀腺）＝MEN2A**，為**RET致癌基因（原癌基因）突變**，體染色體顯性遺傳;親屬應做RET基因篩檢，帶因者建議幼年預防性甲狀腺全切除。","options":{"A":"RAS非MEN2致病基因。","B":"TRK非MEN2。","C":"ERK非MEN2。","D":"正解。RET基因。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106020-52":{"quick":"檢測體內維生素D是否不足，應驗 25(OH)D（25-羥維生素D）。","detail":{"background":"**血清25-羥維生素D〔25(OH)D〕為評估體內維生素D儲存量（是否不足/缺乏）的標準指標**（半衰期長、反映總體狀態）;1,25(OH)2D半衰期短、受PTH調控、不反映儲存量。","options":{"A":"正解。25(OH)D反映維生素D儲存。","B":"1,25(OH)2D不反映儲存量。","C":"PTH非直接測維生素D。","D":"游離鈣非維生素D指標。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106020-53":{"quick":"脂蛋白脂解酶（LPL）缺乏症典型為極高三酸甘油酯、發疹性黃色瘤、胰臟炎；不典型為『動脈硬化』。","detail":{"background":"**家族性脂蛋白脂解酶（LPL）缺乏（第I型高脂蛋白血症）**:乳糜微粒清除障礙→**極高三酸甘油酯（>1000）、發疹性黃色瘤、肝脾腫大、反覆胰臟炎**;**因主要堆積為乳糜微粒（顆粒大、不易進入血管壁），早發動脈硬化『不』是典型表現**。","options":{"A":"發疹性黃色瘤為典型。","B":"胰臟炎為典型。","C":"正解。動脈硬化非LPL缺乏典型表現。","D":"三酸甘油酯過高為典型。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106020-54":{"quick":"胰島素啟動子因子1（IPF-1/PDX-1）突變導致胰島素『分泌不足』型糖尿病（MODY/胰臟發育缺陷）。","detail":{"background":"糖尿病分子機轉:**type A insulin resistance、leprechaunism、Rabson-Mendenhall為胰島素受體突變→嚴重胰島素阻抗**;**IPF-1（PDX-1）為胰臟發育/β細胞轉錄因子，突變致β細胞發育與胰島素分泌不足（MODY4/胰臟發育不全）**。","options":{"A":"insulin receptor突變→阻抗。","B":"leprechaunism→受體突變阻抗。","C":"Rabson-Mendenhall→受體突變阻抗。","D":"正解。IPF-1突變→胰島素分泌不足。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106020-64":{"quick":"肺癌、意識變化、低血鈉（122）、等容積、尿不當濃縮→肺癌併發SIADH。","detail":{"background":"小細胞肺癌等可異位分泌ADH造成**SIADH:等容積性低血鈉、血清滲透壓低、尿滲透壓不當偏高、尿鈉>20、無水腫**。本例Na 122、無水腫、意識改變→SIADH。","options":{"A":"阻塞性肺炎不致此低鈉。","B":"腦轉移可致但本例符SIADH生化。","C":"厭食不致此低鈉電解質。","D":"正解。肺癌併發SIADH。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106020-65":{"quick":"確認SIADH：測尿滲透壓；急性症狀性低血鈉可先給生理食鹽水（嚴重者高張食鹽水）並限水。","detail":{"background":"低血鈉處置:**先測尿滲透壓/尿鈕與血滲透壓以分類**;**急性、有意識改變之症狀性低血鈉需謹慎補鈉（嚴重者3%高張食鹽水），慢性SIADH以限水為主**;校正速度每日不超過約6–8 mmol/L以防滲透性脫髓鞘。本題以測尿滲透壓並給0.9% NaCl為處置。","options":{"A":"不應給kayexalate（此為高鉀用）。","B":"正解。測尿滲透壓並給0.9% NaCl（症狀性者）。","C":"血液細菌培養非此低鈉處置重點。","D":"5%葡萄糖會加重低鈉。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106020-67":{"quick":"中度風險、LDL 150但其他正常的健檢者，此時宜先以生活型態改善、暫不需立即statin。","detail":{"background":"血脂處置依整體心血管風險:**無糖尿病、不吸菸、血壓正常之中度風險者，LDL中度升高（150）可先以治療性生活型態改變（飲食、運動、減重）3–6個月，再依風險評估是否加statin**;非一見LDL>目標即用藥。須以風險工具評估。","options":{"A":"風險分層需依工具，非逕定中度。","B":"是否高於目標需依風險目標而定。","C":"正解。此時先生活型態改善、暫不需statin。","D":"以Framingham/風險工具估風險，惟此題答C。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106020-68":{"quick":"骨質疏鬆診斷標準為DEXA骨密度 T值 ≤ −2.5。","detail":{"background":"**WHO骨密度分類（停經後女性/≥50歲男性，以T值）:正常T≥−1.0;骨缺乏（osteopenia）−1.0~−2.5;骨質疏鬆 T≤−2.5;嚴重骨鬆 T≤−2.5併脆性骨折**。Z值用於兒童/年輕/次發性評估。","options":{"A":"T≤−1.0為骨缺乏起點。","B":"正解。T≤−2.5為骨質疏鬆。","C":"Z值非診斷標準。","D":"Z值非診斷標準。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106080-14":{"quick":"產後體重增加、倦怠、怕冷、便秘、皮膚乾→甲狀腺功能低下，最具診斷價值為 free T4、hsTSH。","detail":{"background":"產後出現怕冷、倦怠、體重增加、便秘、皮膚乾、輕度低血鈉→**甲狀腺功能低下（可為產後甲狀腺炎之低下期或橋本氏）**;最具診斷價值為**free T4、（高敏感）TSH**。產後憂鬱為鑑別但應先排除甲狀腺。","options":{"A":"ACTH/cortisol為腎上腺評估、非首要。","B":"血糖非此症候。","C":"正解。free T4、hsTSH最具診斷價值。","D":"憂鬱量表應先排除甲狀腺。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106080-52":{"quick":"類無睪症體態（臂展>身高）、陰莖短小、無陰毛、嗅覺不佳→Kallmann症候群，睪丸小而軟。","detail":{"background":"**Kallmann症候群＝低促性腺素性腺低下（GnRH缺乏）＋嗅覺缺失**;臨床青春期不發育、陰莖小、無第二性徵、**臂展>身高（類無睪體態，因生長板延遲閉合）**、睪丸小而軟。Klinefelter（47XXY）睪丸小而硬。","options":{"A":"正解。睪丸小而軟（GnRH缺乏）。","B":"47XXY為Klinefelter（睪丸小而硬）。","C":"身材矮小三角臉非此症。","D":"重度肥胖智障非此症。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106080-53":{"quick":"泌乳素瘤治療應用多巴胺『促效劑』；sulpiride為多巴胺拮抗劑、會升高泌乳素，故為錯誤治療。","detail":{"background":"無月經、溢乳、垂體前葉腺瘤→**泌乳素瘤（prolactinoma）**:長期雌激素低下致骨質疏鬆、腫瘤上壓視交叉致視野缺損;**治療首選多巴胺促效劑（cabergoline/bromocriptine）**;手術成功率與腫瘤大小負相關。**sulpiride為多巴胺D2拮抗劑（反升泌乳素），不可用於治療泌乳素瘤**。","options":{"A":"長期可致骨質疏鬆，正確。","B":"上壓視交叉致視野缺損，正確。","C":"正解（錯誤）。sulpiride為多巴胺拮抗劑、會升泌乳素。","D":"手術成功率與腫瘤大小負相關，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106080-55":{"quick":"腦下垂體放射治療後最早/最常出現異常的激素是生長激素（GH）。","detail":{"background":"**垂體放射治療後激素缺乏依序最易先出現者為生長激素（GH），其後為性腺刺激素（LH/FSH）、ACTH、TSH**;故GH軸最敏感、最常先異常。","options":{"A":"正解。生長激素（GH）最常先異常。","B":"泌乳素多反升高（去抑制），非缺乏為主。","C":"TSH較晚受影響。","D":"ACTH較晚受影響。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106080-56":{"quick":"臨床上最常見的庫欣氏症候群原因是『外因性類固醇過量使用』（醫源性）。","detail":{"background":"庫欣症候群最常見原因為**外因性（醫源性）糖皮質素使用**;內因性中以**庫欣氏病（垂體ACTH腺瘤）最常見**，其次腎上腺腫瘤、異位ACTH。","options":{"A":"腎上腺腫瘤為內因性次要。","B":"垂體腫瘤為內因性最常見。","C":"正解。外因性類固醇過量最常見。","D":"胸腺腫瘤（異位ACTH）少見。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106080-57":{"quick":"第2型糖尿病口服第一線用藥是metformin，並非磺醯尿素（sulfonylurea）。","detail":{"background":"第2型糖尿病:**一般HbA1c目標<7%;第一線口服藥為metformin（無禁忌時）**;DPP-4抑制劑提高餐後GLP-1濃度;α-glucosidase抑制劑降餐後血糖。故B（磺醯尿素為第一線）錯誤。","options":{"A":"HbA1c<7%為一般目標，正確。","B":"正解（錯誤）。第一線為metformin，非磺醯尿素。","C":"DPP-4抑制劑提高GLP-1，正確。","D":"α-glucosidase抑制劑降餐後血糖，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"106080-67":{"quick":"兒童肥胖與成人肥胖『有關』（兒童肥胖增加成人肥胖風險）；說無關為錯誤。","detail":{"background":"肥胖:減重為降血壓非藥物手段;與血脂異常、第2型糖尿病、多種癌症相關;每日減500–1000大卡每週約減0.5–1公斤;**兒童肥胖會增加成人肥胖及代謝疾病風險（兩者相關）**。故B錯誤。","options":{"A":"減重可降血壓，正確。","B":"正解（錯誤）。兒童肥胖與成人肥胖有關。","C":"肥胖與血脂異常/糖尿病/癌症相關，正確。","D":"每日少500–1000大卡每週減0.5–1公斤，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107020-15":{"quick":"嚴重頭痛後出現多軸垂體功能低下（甲狀腺、腎上腺、性腺皆低）＋蝶鞍腫塊→腦下垂體中風（apoplexy）。","detail":{"background":"急性頭痛後出現**全垂體功能低下（free T4低且TSH不高、晨間皮質醇極低、性徵減退）＋蝶鞍部腫塊**→**腦下垂體中風（apoplexy，垂體腺瘤突發出血/梗塞）**;須補充類固醇、評估手術。顱咽瘤、空蝶鞍多無此急性病程。","options":{"A":"泌乳素瘤多為泌乳/性腺症狀、非急性全垂體低下。","B":"正解。腦下垂體中風（apoplexy）。","C":"顱咽瘤多慢性、兒童/雙峰。","D":"空蝶鞍多無症狀。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107020-26":{"quick":"高尿酸不屬NCEP ATP III代謝症候群的風險評估指標。","detail":{"background":"代謝症候群（ATP III）五項:中央肥胖（腰圍）、高三酸甘油酯、低HDL、高血壓、高空腹血糖。**高尿酸雖與代謝症候群相關，但非診斷指標之一**。","options":{"A":"高血壓為指標。","B":"高血糖為指標。","C":"正解。高尿酸非代謝症候群指標。","D":"高血脂（TG/HDL）為指標。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107020-36":{"quick":"禁水後尿不濃縮、給DDAVP後尿滲透壓仍無上升→腎性尿崩症（nephrogenic DI）。","detail":{"background":"**腎性尿崩症：腎對ADH無反應，禁水後尿無法濃縮、給DDAVP尿滲透壓仍無明顯上升**;中樞性DI給DDAVP會明顯上升;原發性多飲禁水即可濃縮。","options":{"A":"正常會濃縮。","B":"精神性多尿禁水即濃縮。","C":"中樞性DI給DDAVP會上升。","D":"正解。腎性尿崩症（給DDAVP無反應）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107020-52":{"quick":"原發性副甲狀腺亢進（高鈣低磷、iPTH高）但超音波未見腺瘤→做副甲狀腺 Tc99m-sestamibi scan＋SPECT定位。","detail":{"background":"原發性副甲狀腺亢進（高血鈣、低血磷、iPTH不當升高）術前定位:**Tc99m-sestamibi掃描＋SPECT（±超音波、4D-CT）**可偵測異位/縱膈或超音波未見之腺瘤。I-131甲狀腺掃描非用於副甲狀腺。","options":{"A":"正解。Tc99m-sestamibi scan＋SPECT定位。","B":"I-131甲狀腺掃描非副甲狀腺定位。","C":"頸部MRI非首選功能定位。","D":"頸部CT非首選。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107020-53":{"quick":"甲狀腺結節細胞學疑髓質癌＋CEA升高→驗 calcitonin 確認（髓質癌由分泌降鈣素的C細胞而來）。","detail":{"background":"**甲狀腺髓質癌源自濾泡旁C細胞，分泌降鈣素（calcitonin）並可使CEA升高**;細胞學見紡錘/橢圓細胞;故抽血驗**calcitonin**確認;thyroglobulin為分化型（乳突/濾泡）癌標記。","options":{"A":"thyroglobulin為分化型癌標記。","B":"正解。calcitonin確認髓質癌。","C":"CA-199非髓質癌標記。","D":"CA-125非髓質癌標記。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107020-54":{"quick":"庫欣外觀＋ACTH極低、低劑量dexamethasone不抑制→ACTH非依賴型（腎上腺源），進一步做腎上腺電腦斷層。","detail":{"background":"本例月亮臉/痤瘡/水牛肩、ACTH<5（受抑制）、皮質醇高且dexamethasone不抑制→**ACTH非依賴型庫欣（腎上腺腫瘤自主分泌皮質醇）**，下一步**腎上腺CT**定位。非庫欣氏病（垂體源ACTH會升高）。並非外因dexamethasone（皮質醇若為外因應同被測低）。","options":{"A":"正解。進一步做腎上腺電腦斷層。","B":"ACTH低不符庫欣氏病（垂體源）。","C":"腎上腺腺瘤術後對側受抑、需補cortisone。","D":"皮質醇高、非長期使用dexamethasone。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107020-55":{"quick":"第一型糖尿病自然病程中最早出現的微血管病變為視網膜病變。","detail":{"background":"糖尿病微血管併發症發生序:**視網膜病變多最早可偵測（背景型）**，其後腎病變、神經病變;大血管疾病為長期併發。嚴格血糖控制延緩各項進展。","options":{"A":"正解。視網膜病變最早出現。","B":"神經病變較晚。","C":"腎病變較晚。","D":"心血管為長期大血管併發。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107020-56":{"quick":"甲狀腺癌最不可能造成甲狀腺功能亢進（多為正常/低下）。","detail":{"background":"甲狀腺功能亢進原因:**Graves、毒性多結節/自主結節、橋本/亞急性甲狀腺炎之破壞性釋放期、過量碘（含碘藥物）、外因甲狀腺素**等。**甲狀腺癌通常不造成甲亢（多為冷結節、功能正常或低下）**。","options":{"A":"Graves致甲亢。","B":"橋本/甲狀腺炎破壞期可一過性甲亢。","C":"過量碘可致甲亢。","D":"正解。甲狀腺癌最不可能致甲亢。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107020-57":{"quick":"fibrate與statin並非『嚴禁』合併（可在監測下謹慎併用，注意橫紋肌溶解風險）。","detail":{"background":"血脂治療:**fibrate為高三酸甘油酯第一線、statin為高膽固醇第一線**;**兩者併用會增加肌病/橫紋肌溶解風險（尤gemfibrozil），故須謹慎監測，但非『絕對嚴禁』（fenofibrate相對較安全可併用）**。故D錯誤。","options":{"A":"fibrate為高三酸甘油酯首選，正確。","B":"statin為高膽固醇首選，正確。","C":"併用可增橫紋肌溶解風險，正確。","D":"正解（錯誤）。非嚴禁併用（須謹慎監測）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107020-66":{"quick":"糖尿病共照流程：HbA1c每3個月、眼底每年、足部神經學檢查需時安排；『每年周邊動脈硬化檢查』非標準流程項目（本題列為錯誤）。","detail":{"background":"糖尿病照護（共照網）建議:**HbA1c每3個月、眼底（視網膜）每年、足部檢查（含單股纖維/震動感等神經學）每年、腎功能與尿微白蛋白每年**;**例行性『每年周邊動脈硬化檢查』並非制式流程項目（依風險安排），故本題列為錯誤**。","options":{"A":"每3個月HbA1c，正確。","B":"每年眼底檢查，正確。","C":"正解（本題之錯誤）。非制式每年周邊動脈硬化檢查。","D":"需時安排足底神經學檢查，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107080-03":{"quick":"高血壓合併低血鉀時，Gordon氏症候群（高血鉀型）最不可能；腎動脈狹窄、甘草、原發性醛固酮症皆致低血鉀。","detail":{"background":"高血壓＋低血鉀指向**礦皮質素過多/作用過強**:原發性醛固酮症、腎動脈狹窄（續發性高醛固酮）、甘草（抑制11β-HSD2致皮質醇作用如醛固酮）、Liddle症候群等。**Gordon氏症候群（假性低醛固酮第2型）反呈高血鉀與代謝性酸中毒**，故與低血鉀情境最不相符。","options":{"A":"腎動脈狹窄→續發高醛固酮、低血鉀。","B":"甘草→表象礦皮質素過多、低血鉀。","C":"正解。Gordon氏症候群為高血鉀，最不可能。","D":"原發性醛固酮症→低血鉀。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107080-10":{"quick":"高血鈣急症治療不應用thiazide（會升血鈣）；應補生理食鹽水、必要時bisphosphonate/calcitonin。","detail":{"background":"**高血鈣危症處置:積極補充生理食鹽水（擴容、促鈣排出）→必要時loop利尿（擴容後）、bisphosphonate（惡性高鈣）、calcitonin（快速）、類固醇（維生素D/肉芽腫性）**;**thiazide減少尿鈣排出會惡化高血鈣，禁用**。","options":{"A":"補生理食鹽水適當。","B":"正解（最不適當）。thiazide升血鈣、禁用。","C":"惡性高鈣可用bisphosphonate，適當。","D":"維生素D性高鈣可用類固醇，適當。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107080-35":{"quick":"MEN1是autosomal dominant，肇因於MEN1基因（menin）缺陷，並非VHL基因；故敘述錯誤。","detail":{"background":"神經內分泌瘤（NET）:免疫染chromogranin A協助診斷;依Ki-67/有絲分裂分G1/G2/G3;**MEN1為體染色體顯性，因MEN1基因（menin抑癌基因）缺陷（非VHL）**;腸胃NET之類癌症候群可用somatostatin類似物。VHL基因缺陷為von Hippel-Lindau（與嗜鉻細胞瘤、腎癌等相關）。","options":{"A":"chromogranin A協助診斷，正確。","B":"以Ki-67/mitotic分級，正確。","C":"正解（錯誤）。MEN1因MEN1（menin）基因缺陷，非VHL。","D":"somatostatin類似物控制類癌症候群，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107080-49":{"quick":"UNICEF甲狀腺腫分級：Grade 0看不到也摸不到、Grade 1摸得到看不到、Grade 2看得到也摸得到（①②③皆正確）。","detail":{"background":"**WHO/UNICEF（1994）甲狀腺腫分級:Grade 0＝看不到、摸不到;Grade 1＝摸得到但（頸部正常位置）看不到;Grade 2＝看得到也摸得到**。三項敘述皆正確。","options":{"A":"漏③。","B":"漏②。","C":"漏①。","D":"正解。①②③皆正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107080-50":{"quick":"Dapagliflozin、empagliflozin屬SGLT2抑制劑（促尿糖排出），不是胰島素增敏劑。","detail":{"background":"口服降血糖藥:metformin（單用少低血糖、最嚴重副作用乳酸中毒）;TZD與DPP-4抑制劑可能與心衰相關（TZD水鈉滯留）;**SGLT2抑制劑（dapagliflozin、empagliflozin）抑制近端腎小管葡萄糖再吸收、促尿糖排出，並非胰島素增敏劑（增敏劑為TZD、metformin）**;acarbose抑制腸道碳水消化吸收。","options":{"A":"metformin副作用乳酸中毒，正確。","B":"TZD/DPP-4可能與心衰相關，正確。","C":"正解（錯誤）。SGLT2抑制劑非胰島素增敏劑。","D":"acarbose抑制碳水吸收，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107080-51":{"quick":"糖尿病足潰瘍感染多為混合菌、革蘭氏陽性（金黃葡萄球菌、鏈球菌）常見，並非以Klebsiella最常見。","detail":{"background":"糖尿病足:神經病變致足部變形與保護感覺喪失、周邊動脈病變致缺血與間歇性跛行;**足部潰瘍感染常為多重菌（含金黃葡萄球菌、鏈球菌等革蘭氏陽性菌，慢性/嚴重者加革蘭氏陰性與厭氧菌）**，**並非以Klebsiella為最常見**;控制不佳可致骨髓炎。","options":{"A":"神經病變致足部變形，正確。","B":"動脈供應不足致間歇性跛行，正確。","C":"正解（錯誤）。最常見非Klebsiella（多為金黃葡萄球菌等混合菌）。","D":"感染未控可致骨髓炎，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107080-52":{"quick":"6個月內減去原體重15%並非『很容易達成』的減重目標（合理初期目標約5–10%）。","detail":{"background":"減重:核心為減少總熱量攝取;**合理初期目標約6個月減5–10%即有代謝效益，減15%並不容易達成**;重度肥胖內科無效時減重手術為合理選擇;部分中樞食慾抑制藥（如lorcaserin，已退市）。故B錯誤。","options":{"A":"減少總熱量為重點，正確。","B":"正解（錯誤）。6個月減15%並不容易達成。","C":"重度肥胖內科無效可減重手術，正確。","D":"lorcaserin為中樞食慾抑制藥，正確（已退市）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107080-53":{"quick":"血中三酸甘油酯偏高與心臟病『有關』（非無關）；故該敘述最不適當。","detail":{"background":"血脂與心血管:**高LDL-C與冠心病明確相關，治療首選statin;高三酸甘油酯亦為心血管危險因子（與殘餘顆粒、代謝症候群相關），治療首選fibrate（與生活型態）**。故『三酸甘油酯高與心臟病無關』錯誤。","options":{"A":"正解（最不適當）。三酸甘油酯高與心臟病有關。","B":"高三酸甘油酯首選fibrate，正確。","C":"高LDL-C與心臟病相關，正確。","D":"高膽固醇首選statin，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107080-54":{"quick":"原發性副甲狀腺功能亢進最可能的電解質變化為高血鈣、低血磷。","detail":{"background":"**原發性副甲狀腺亢進（PTH過多）→骨鈣釋出與腎鈣再吸收增加（高血鈣）、抑制腎磷再吸收（低血磷）**;尿鈣多增加、可致腎結石、骨病變。故高血鈣＋低血磷。","options":{"A":"正解。高血鈣、低血磷。","B":"低鈣高磷見於副甲狀腺低下/腎衰。","C":"低鈣低磷不符。","D":"高鈣高磷見於維生素D中毒等。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"107080-55":{"quick":"神經內分泌瘤可能合併腦下垂體腫瘤或副甲狀腺瘤（屬MEN1的一環）。","detail":{"background":"神經內分泌瘤（NET）:**可為良性或惡性（依分化/Ki-67）;不只發生於腸胃胰（如肺）;胰腸NET可為MEN1之一環，合併副甲狀腺與腦下垂體腫瘤（3P）**;somatostatin類似物有效但非『唯一最有效』。","options":{"A":"不一定良性。","B":"不只腸胃道與胰臟。","C":"somatostatin類似物非唯一最有效。","D":"正解。可合併腦下垂體或副甲狀腺瘤（MEN1）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108030-01":{"quick":"偶然發現空蝶鞍但垂體功能（甲狀腺、腎上腺、性腺）皆正常、月經正常→只需說明病情使病患放心（reassurance）。","detail":{"background":"**空蝶鞍（empty sella）多為偶發、垂體功能正常者無臨床意義**;本例月經正常、free T4/TSH/晨間皮質醇皆正常→垂體功能正常，**處置為衛教與放心（reassurance）、追蹤即可**，不需手術、放療或藥物。","options":{"A":"功能正常不需手術。","B":"不需放射治療。","C":"無高泌乳素不需bromocriptine。","D":"正解。說明病情、reassurance。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108030-50":{"quick":"體重『增加』不是典型甲狀腺功能亢進症狀（甲亢多為體重減輕）。","detail":{"background":"甲狀腺功能亢進典型:**怕熱、心悸/心律不整、體重減輕（代謝增加）、手抖、易怒、女性月經量減少/週期不規則、腹瀉**。**體重增加非典型（甲低才體重增加）**。","options":{"A":"月經量減少/不規則為典型。","B":"正解。體重增加非甲亢典型（多體重減輕）。","C":"心悸/心律不整為典型。","D":"怕熱為典型。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108030-51":{"quick":"甲狀腺髓質癌源自分泌降鈣素的濾泡旁C細胞（calcitonin-producing C cells）。","detail":{"background":"**甲狀腺髓質癌（MTC）源自神經內分泌之濾泡旁C細胞（分泌calcitonin）**;可散發或屬MEN2（RET突變）;乳突/濾泡癌源自濾泡上皮細胞。","options":{"A":"濾泡上皮細胞→乳突/濾泡癌。","B":"正解。濾泡旁C細胞（分泌降鈣素）。","C":"淋巴球→甲狀腺淋巴瘤。","D":"纖維母細胞非髓質癌來源。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108030-52":{"quick":"第2型糖尿病與肥胖及家族遺傳有關，是臨床上最常見的糖尿病型態。","detail":{"background":"糖尿病分類:**第1型多<30歲、自體免疫、絕對胰島素缺乏;第2型與肥胖、家族遺傳、胰島素阻抗相關，最常見**;診斷標準為空腹≥126或HbA1c≥6.5%（非空腹>100或HbA1c>6%）;妊娠糖尿病多發於中後期、與胰島素阻抗相關（非前3個月）。","options":{"A":"第1型好發年輕（非>30歲）。","B":"診斷為空腹≥126或HbA1c≥6.5%。","C":"正解。第2型與肥胖/遺傳相關、最常見。","D":"GDM多中後期、非前3個月。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108030-53":{"quick":"載脂蛋白（apolipoprotein）是脂蛋白上的蛋白質，與血脂代謝有關。","detail":{"background":"血脂代謝:**最大脂蛋白為乳糜微粒（chylomicron，非VLDL）;乳糜微粒在『腸道』形成（ApoB-48）而非肝臟;胰島素阻抗使HDL下降（非上升）;apolipoprotein為脂蛋白上的蛋白質、參與代謝（受體結合、活化酵素）**。故B正確。","options":{"A":"最大脂蛋白為乳糜微粒、非VLDL。","B":"正解。apolipoprotein與血脂代謝有關。","C":"乳糜微粒在腸道形成（ApoB-48），非肝臟。","D":"胰島素阻抗使HDL下降，非上升。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108030-54":{"quick":"代謝症候群中『小而緻密的LDL（small dense LDL）會增加』而非減少；故敘述錯誤。","detail":{"background":"代謝症候群（胰島素阻抗）血脂特徵:**三酸甘油酯與VLDL升高、HDL下降、小而緻密LDL（small dense LDL，致動脈硬化性強）『增加』**;增加心血管疾病風險。故B（small dense LDL減少）錯誤。","options":{"A":"與胰島素阻抗相關，正確。","B":"正解（錯誤）。small dense LDL應增加，非減少。","C":"增加心血管風險，正確。","D":"VLDL濃度增加，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108030-55":{"quick":"陣發性心悸、冒冷汗、頭痛、血壓突然飆高→最須考慮嗜鉻細胞瘤。","detail":{"background":"**嗜鉻細胞瘤典型三聯：陣發性頭痛、心悸/出汗，伴陣發性高血壓**;由兒茶酚胺過量所致。本例間歇心悸冒汗頭痛＋血壓陣發升高最符合。","options":{"A":"正解。嗜鉻細胞瘤。","B":"甲亢多持續心悸怕熱、非陣發高血壓飆升。","C":"庫欣為持續高血壓與外觀變化。","D":"原發性醛固酮症為持續高血壓低血鉀。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108030-74":{"quick":"甲狀腺結節伴同側頸部淋巴結無痛腫大、超音波微鈣化/低回音/血流增加→甲狀腺乳突狀癌。","detail":{"background":"**甲狀腺乳突癌超音波危險特徵:實質低回音、微鈣化、邊緣不規則、縱長>橫寬、內部血流增加，並可頸部淋巴結轉移**;本例伴同側頸部淋巴結腫大最符合乳突癌。確診以細針穿刺。","options":{"A":"甲狀腺炎多瀰漫、非局部結節伴淋巴結。","B":"正解。甲狀腺乳突狀癌。","C":"甲狀腺瘤為良性、不伴淋巴結轉移。","D":"良性多結節腫非伴淋巴結。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108080-21":{"quick":"Vaptans（精氨酸血管加壓素受體拮抗劑）用於低鈉血症，不適用於『尿崩症』。","detail":{"background":"**Vaptans（tolvaptan/conivaptan，V2受體拮抗劑）促進排水（aquaresis）、升高血鈉**，用於SIADH、高容積低鈉（心衰、肝硬化）、小細胞肺癌相關低鈉。**尿崩症（ADH不足/無反應）本就排出大量稀尿，使用V2拮抗劑會惡化，故不適用**。","options":{"A":"SIADH適用vaptans。","B":"高容積低鈉適用。","C":"小細胞肺癌低鈉適用。","D":"正解。尿崩症不適用vaptans。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108080-47":{"quick":"分化型甲狀腺癌術後＋放射碘治療後，追蹤復發的生化指標為甲狀腺球蛋白（thyroglobulin）。","detail":{"background":"**分化型甲狀腺癌（乳突/濾泡）全切除＋放射碘清除後，正常甲狀腺組織應已消除，血清thyroglobulin（及anti-Tg抗體）作為復發/殘留的腫瘤標記**;升高提示復發。TSH用於刺激（停藥或rhTSH）以提高敏感度，非腫瘤標記本身。","options":{"A":"T4非腫瘤標記。","B":"T3非腫瘤標記。","C":"正解。thyroglobulin追蹤復發。","D":"TSH用於刺激、非標記。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108080-48":{"quick":"胰島素瘤雖以Whipple三聯表現，但『不是』低血糖最常見原因（藥物，尤其糖尿病用藥才是）。","detail":{"background":"低血糖最常見原因為**降血糖藥物（胰島素、磺醯尿素）**;胰島素瘤罕見、以**Whipple三聯（低血糖症狀＋當下血糖低＋給糖後緩解）**表現。低血糖可致命須即時處理、症狀含心悸冒汗手抖至昏迷。故A（胰島素瘤為最常見原因）錯誤。","options":{"A":"正解（錯誤）。胰島素瘤非低血糖最常見原因（藥物才是）。","B":"低血糖可致命須即時處理，正確。","C":"症狀含發慌心悸冒汗昏迷，正確。","D":"胰島素、磺醯尿素、glinide可致低血糖，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108080-49":{"quick":"甲狀腺機能亢進時食慾通常『增加』（體重仍下降因高代謝），說『食慾減退是體重下降主因』為錯誤。","detail":{"background":"非自主性體重流失定義:6–12個月內減>4.5公斤或>原體重5%。原因含惡性腫瘤、慢性病（如COPD）、內分泌等。**甲狀腺機能亢進時代謝增加致體重下降，但食慾多『增加』（非減退）**，故C錯誤。","options":{"A":"6–12月減>4.5公斤，正確。","B":"減>原體重5%，正確。","C":"正解（錯誤）。甲亢食慾多增加，非減退。","D":"COPD為原因之一，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108080-50":{"quick":"分解血中三酸甘油酯的酵素是脂蛋白脂解酶（LPL），不是荷爾蒙敏感性脂肪酶（HSL）。","detail":{"background":"脂質代謝:**血液中（乳糜微粒/VLDL）三酸甘油酯由內皮表面的脂蛋白脂解酶（lipoprotein lipase, LPL）分解**;**荷爾蒙敏感性脂肪酶（HSL）作用於脂肪細胞內部、分解儲存脂肪（脂解）**;LDL由VLDL轉化;HDL可與其他脂蛋白交換脂質。故B錯誤。","options":{"A":"乳糜微粒進入乳糜小管，正確。","B":"正解（錯誤）。分解血中三酸甘油酯的是LPL，非HSL。","C":"LDL由VLDL轉化，正確。","D":"HDL可進行脂質交換，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108080-51":{"quick":"甲狀腺亢進造成心律不整者應避免amiodarone（含大量碘、會惡化甲亢）。","detail":{"background":"**amiodarone含高量碘，可致甲狀腺功能異常（誘發/惡化甲亢或致甲低）**;故甲亢致心律不整者應避免amiodarone，控制心率改用β阻斷劑（propranolol）、或diltiazem;digoxin可輔助。","options":{"A":"digoxin可用於心率控制。","B":"正解。應避免amiodarone（含碘惡化甲亢）。","C":"propranolol為甲亢心律首選。","D":"diltiazem可控制心率。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108080-52":{"quick":"懷疑橋本氏甲狀腺炎，檢測抗甲狀腺球蛋白抗體（anti-Tg）、抗甲狀腺過氧化酶抗體（anti-TPO）最能佐證。","detail":{"background":"**橋本氏甲狀腺炎（自體免疫甲狀腺低下）：抗甲狀腺過氧化酶抗體（anti-TPO，最敏感）與抗甲狀腺球蛋白抗體（anti-Tg）陽性**;anti-TSH受體抗體為Graves（甲亢）。","options":{"A":"anti-dsDNA為SLE。","B":"anti-IgG4非橋本標記。","C":"anti-TSH受體抗體為Graves。","D":"正解。anti-Tg、anti-TPO佐證橋本氏。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108080-53":{"quick":"長期用類固醇、外觀庫欣、停藥後遇感染休克→腎上腺危象，應立即抽血驗cortisol後『不等報告即注射糖皮質素』。","detail":{"background":"長期外因類固醇使下視丘-垂體-腎上腺軸受抑，**驟停或壓力（感染休克）下易發生腎上腺危象**。**處置:立即抽血送cortisol/ACTH，但不等報告即給予壓力劑量糖皮質素（hydrocortisone）救命**，並輸液、抗生素、升壓。延遲給藥等報告會致命。","options":{"A":"正解。抽血後不等報告即注射糖皮質素。","B":"等報告才給會延誤致命。","C":"危急時不應等8AM/4PM皮質醇。","D":"危急時不宜先做ACTH刺激試驗再給藥。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"108080-67":{"quick":"年輕、半年瘦10公斤、口渴多尿→糖尿病；若只能安排一項檢查，做指尖血糖測定最適當。","detail":{"background":"消瘦＋多渴多尿之青少年高度懷疑（第1型）糖尿病，**最快速確認高血糖的單一檢查為指尖（毛細血管）血糖測定**;尿糖敏感度不足、電解質/CBC非診斷糖尿病。","options":{"A":"尿蛋白/尿糖敏感度不足。","B":"正解。指尖血糖測定最適當。","C":"血清電解質非診斷糖尿病。","D":"CBC非診斷糖尿病。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109020-03":{"quick":"口服降血糖藥中metformin（biguanides）最可能引起維生素B12缺乏。","detail":{"background":"**長期使用metformin會干擾迴腸末端維生素B12吸收，造成B12缺乏（可致巨球性貧血/神經病變），建議定期監測B12**。acarbose、TZD、磺醯尿素無此典型作用。","options":{"A":"正解。biguanides（metformin）致B12缺乏。","B":"acarbose無此作用。","C":"TZD無此作用。","D":"磺醯尿素無此作用。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109020-11":{"quick":"與血脂相關的黃色脂肪瘤（xanthoma）不是『只有LDL高才會、與三酸甘油酯無關』；發疹性黃色瘤即與高三酸甘油酯相關。","detail":{"background":"黃色脂肪瘤類型:**肌腱黃色瘤（tendon xanthoma）與高LDL（家族性高膽固醇血症）相關;發疹性黃色瘤（eruptive xanthoma）與極高三酸甘油酯相關**;常分布皮下、肌腱鞘、伸肌側。故A（只與LDL有關、與TG無關）錯誤。","options":{"A":"正解（錯誤）。發疹性黃色瘤與高三酸甘油酯相關。","B":"常分布皮下，正確。","C":"常分布肌腱鞘，正確。","D":"常分布伸肌側，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109020-50":{"quick":"甲狀腺荷爾蒙會『增加』細胞耗氧與代謝率，說它降低耗氧與代謝為錯誤。","detail":{"background":"甲狀腺荷爾蒙作用:**增加基礎代謝率與組織耗氧、促進生長發育**;幼年缺乏→呆小症（cretinism，智力不足、矮小、不可逆）;過多→消瘦、焦慮、心搏過速、手抖、心衰;缺乏→怕冷、體重增加、黏液性水腫、遲鈍。故B（降低耗氧與代謝）錯誤。","options":{"A":"幼年缺乏致呆小症，正確。","B":"正解（錯誤）。甲狀腺素增加耗氧與代謝，非降低。","C":"過多致消瘦焦慮心悸，正確。","D":"缺乏致黏液性水腫等，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109020-51":{"quick":"糖尿病腎病變早期『不會』有肌酸酐上升（早期為高過濾、微白蛋白尿）；故敘述錯誤。","detail":{"background":"糖尿病慢性併發症:與罹病期及血糖控制相關;應定期篩檢;自主神經病變可致腹瀉或便秘;**腎病變早期為腎絲球高過濾與微白蛋白尿，肌酸酐上升屬較晚期**。故D錯誤。","options":{"A":"與罹病期/血糖控制相關，正確。","B":"應定期篩檢，正確。","C":"可有腹瀉或便秘，正確。","D":"正解（錯誤）。早期不會肌酸酐上升。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109020-52":{"quick":"代謝症候群診斷條件包含高三酸甘油酯，但『不含LDL-C升高』；故敘述錯誤。","detail":{"background":"代謝症候群與肥胖、年齡、胰島素阻抗相關，增加心血管風險;診斷含中央肥胖、**高三酸甘油酯、低HDL**、高血壓、高空腹血糖。**LDL-C升高不在診斷條件內**。故D錯誤。","options":{"A":"與肥胖/年齡/胰島素阻抗相關，正確。","B":"可有血壓/血糖升高，正確。","C":"增加心血管風險，正確。","D":"正解（錯誤）。診斷不含LDL-C升高。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109020-53":{"quick":"減重手術『可降低』重度肥胖病人的死亡率；說無法降低為錯誤。","detail":{"background":"減重（代謝）手術:部分益處來自改變腸道荷爾蒙;限制型＋吸收不良型合併效果較佳;可改善重度肥胖之第2型糖尿病血糖;**長期觀察（如SOS研究）顯示可降低重度肥胖病人之死亡率與心血管事件**。故D錯誤。","options":{"A":"部分益處來自腸道荷爾蒙改變，正確。","B":"合併限制＋吸收不良增效，正確。","C":"可改善重度肥胖第2型糖尿病，正確。","D":"正解（錯誤）。減重手術可降低死亡率。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109020-54":{"quick":"meglitinide（如repaglinide）為促胰島素分泌劑，最易發生低血糖。","detail":{"background":"降血糖藥低血糖風險:**促泌劑（磺醯尿素、meglitinide）與胰島素風險最高**;DPP-4抑制劑、SGLT2抑制劑、GLP-1促效劑為血糖依賴或不刺激分泌，低血糖風險低。","options":{"A":"DPP-4抑制劑低血糖風險低。","B":"SGLT2抑制劑低血糖風險低。","C":"正解。meglitinide最易低血糖。","D":"GLP-1促效劑低血糖風險低。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109020-55":{"quick":"術前判斷甲狀腺結節良惡性最準確的是甲狀腺細針穿刺細胞學檢查（FNA）。","detail":{"background":"**甲狀腺結節評估首選/最準確的術前診斷為超音波導引細針穿刺細胞學（FNA）**;超音波評估特徵與是否需FNA;CT/MRI非首選診斷良惡性。","options":{"A":"正解。細針穿刺細胞學最準確。","B":"超音波評估特徵、非確診。","C":"頸部CT非首選診斷。","D":"頸部MRI非首選診斷。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109020-56":{"quick":"疑庫欣（月亮臉、水牛肩、中心肥胖、皮膚薄易瘀青）時，『隨機測ACTH和cortisol』最不適當（皮質醇有日節律與脈衝）。","detail":{"background":"庫欣篩檢應用**有節律/抑制概念的檢測:24小時尿游離皮質醇、隔夜1mg dexamethasone抑制試驗、深夜唾液/血皮質醇**;**單次隨機ACTH/cortisol因日節律與壓力波動，最不適當作為篩檢**。","options":{"A":"正解（最不適當）。隨機ACTH/cortisol不可靠。","B":"上午8點與下午4點測（評估節律）可。","C":"24小時尿皮質醇適當。","D":"1mg dexamethasone抑制試驗適當。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109080-01":{"quick":"急性下肢無力＋低血鉀低血磷、尿鉀偏低（鉀向細胞內移）→須加驗甲狀腺功能（疑甲狀腺毒性週期性麻痹）。","detail":{"background":"青年男性急性低血鉀麻痹、尿鉀低（10 mEq/L，提示非腎流失、為細胞內轉移）合併低血磷→**甲狀腺毒性週期性麻痹（甲亢時鉀磷向細胞內移）**，故須加驗甲狀腺功能;補鉀須謹慎防反彈高血鉀（總體鉀不缺）。TTKG計算需配合尿/血滲透壓。","options":{"A":"TTKG計算需條件，非此處重點。","B":"尿鉀低、非腎臟流失過多。","C":"正解。需加驗甲狀腺功能（疑甲亢週期性麻痹）。","D":"補鉀謹慎、不宜加葡萄糖（促鉀入細胞）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109080-50":{"quick":"體重『急速下降』不是甲狀腺功能低下的典型症狀（甲低多體重增加）。","detail":{"background":"甲狀腺功能低下典型:**黏液性水腫、心搏過緩、體重增加、怕冷、便秘、倦怠、皮膚乾**。**體重急速下降為甲狀腺亢進表現，非甲低**。","options":{"A":"黏液性水腫為典型。","B":"心搏過緩為典型。","C":"正解。體重急速下降非甲低典型（多體重增加）。","D":"怕冷為典型。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109080-51":{"quick":"第1型糖尿病須仰賴胰島素注射控制血糖並預防酮酸血症。","detail":{"background":"胰島素製劑:**中長效（基礎）為detemir、glargine、degludec、NPH;速效（餐時）為lispro、aspart、glulisine（lispro屬速效非長效）**;基礎胰島素提供全天背景需求（非短效）;預混型含protamine（NPH）為延長作用（非加速）;**第1型糖尿病絕對胰島素缺乏，須胰島素維生並防DKA**。故D正確。","options":{"A":"lispro為速效（非長效），敘述錯。","B":"基礎需求由長效（非短效）提供。","C":"protamine為延長作用、非加速。","D":"正解。第1型須胰島素防酮酸血症。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109080-52":{"quick":"糖尿病病人的膽固醇治療準則比一般人『更積極』（屬高心血管風險），非與一般人相同。","detail":{"background":"糖尿病大血管疾病:風險為無糖尿病者2–4倍;控制血糖、血壓、血脂可預防;aspirin（次級預防）與statin已證實有效。**糖尿病屬心血管高風險族群，血脂（LDL）治療目標較一般人嚴格/積極**，故C（與一般人一樣）錯誤。","options":{"A":"風險為2–4倍，正確。","B":"控制血糖血壓血脂有效，正確。","C":"正解（錯誤）。糖尿病膽固醇治療較一般人積極。","D":"aspirin/statin有效預防，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109080-53":{"quick":"依國健署代謝症候群標準，女性腰圍>80公分為其中一項（本題正確選項）。","detail":{"background":"台灣國健署代謝症候群5項（符合≥3）:**腰圍男≥90、女≥80**;血壓≥130/85;空腹血糖≥100;三酸甘油酯≥150;HDL男<40、女<50。**非以BMI>24或LDL作為診斷項目**。","options":{"A":"非以BMI>24診斷。","B":"非以LDL-C>100診斷。","C":"HDL為男<40/女<50（非統一<50）。","D":"正解。女性腰圍>80公分為一項。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109080-54":{"quick":"年輕、高血壓低血鉀、心跳正常→疑原發性醛固酮症，應抽血驗 aldosterone 與 plasma renin activity（ARR）。","detail":{"background":"年輕高血壓合併自發性低血鉀→**原發性醛固酮症篩檢:血漿醛固酮/腎素活性比值（ARR）**，醛固酮高、腎素低為陽性。嗜鉻細胞瘤查尿/血metanephrines（有陣發症狀）;庫欣查皮質醇;甲亢查TSH。","options":{"A":"正解。驗aldosterone與腎素活性（ARR）。","B":"ACTH/cortisol用於庫欣。","C":"尿VMA/catecholamine用於嗜鉻細胞瘤。","D":"fT4/TSH用於甲狀腺。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109080-55":{"quick":"立體定位放射線治療不是常用的甲狀腺亢進治療方式。","detail":{"background":"甲狀腺亢進三大治療:**抗甲狀腺藥（methimazole/PTU）、放射性碘（I-131）、手術切除**。**立體定位放射線治療（如針對腦部腫瘤）非甲亢常規治療**。","options":{"A":"口服抗甲狀腺藥為常用。","B":"手術切除為選項。","C":"正解。立體定位放射線非甲亢治療。","D":"放射性碘為常用。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109080-56":{"quick":"青春期不發育、睪丸小而軟→性腺低下，下一步抽血測 FSH、LH、testosterone 以分辨原發/次發。","detail":{"background":"男性性腺低下評估:**先測testosterone與LH/FSH**——LH/FSH高為原發性（睪丸問題，如Klinefelter）、LH/FSH低為次發性（中樞，如Kallmann/垂體病變）。據此決定是否進一步影像（垂體MRI）或染色體。","options":{"A":"睪丸超音波非首要。","B":"未確認病因前不逕補睪固酮。","C":"MRI在生化定為次發性後再做。","D":"正解。先測FSH、LH、testosterone。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109080-66":{"quick":"依國健署標準，本例符合代謝症候群3項（腰圍、血壓、空腹血糖／三酸甘油酯）。","detail":{"background":"本例腰圍88（男≥90不符，惟此題以公布答案計）、血壓132/88（≥130/85符合）、空腹血糖106（≥100符合）、三酸甘油酯180（≥150符合）、HDL 42（男<40不符）。依公布答案符合**3項**。代謝症候群需≥3項。","options":{"A":"低估。","B":"正解。符合3項。","C":"高估。","D":"高估。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"109080-78":{"quick":"HHS（高滲透壓高血糖狀態）時血鈉受高血糖影響，『不能』當作體液缺少的可靠指標（需校正鈉）。","detail":{"background":"HHS:血糖常>600、滲透壓高、無明顯酸中毒/酮體、意識改變與滲透壓正相關。**高血糖造成水自細胞移出致『假性低鈉』，故未校正之血鈉不能可靠反映體液缺損（需以校正鈉與滲透壓評估）**;HHS體液缺損常極大。故B不適當。","options":{"A":"血糖>600、pH>7.3、bicarbonate>15，正確。","B":"正解（最不適當）。血鈉受高血糖影響、非可靠體液指標。","C":"可能出現輕度代謝性酸中毒，可。","D":"滲透壓與意識/嚴重度正相關，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110020-04":{"quick":"fibric acid衍生物（fibrate）會『增加』膽固醇結石生成（增膽汁膽固醇飽和度），說可減少膽結石為錯誤。","detail":{"background":"高脂血症用藥:**fibrate增加膽汁膽固醇飽和度→增加膽結石風險（非減少）**;statin可致肌肉酸痛/橫紋肌溶解;菸鹼酸（niacin）可升HDL（適應症含低HDL）;omega-3脂肪酸增加三酸甘油酯代謝。故A錯誤。","options":{"A":"正解（錯誤）。fibrate增加膽結石（非減少）。","B":"statin可致肌肉酸痛，正確。","C":"菸鹼酸用於低HDL，正確。","D":"omega-3增加三酸甘油酯代謝，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110020-50":{"quick":"庫欣外觀但ACTH與cortisol皆極低→外因性（醫源/隱匿類固醇）庫欣，下一步驗24小時尿游離皮質醇。","detail":{"background":"本例庫欣體態但**ACTH<10、cortisol<1（皆受抑制）→提示外因性糖皮質素（可能隱藏於中藥/補品）使內生軸受抑**;**24小時尿游離皮質醇**可佐證（外因合成類固醇多不被一般cortisol免疫分析測到、尿游離皮質醇低），並追查藥物來源。腦/腎上腺影像非首要（內因性才需定位）。","options":{"A":"dexamethasone抑制試驗用於內因性篩檢、此例已受抑。","B":"正解。測24小時尿游離皮質醇。","C":"腦MRI為內因性庫欣氏病定位、非首要。","D":"腎上腺CT為內因性腎上腺源定位、非首要。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110020-51":{"quick":"服抗甲狀腺藥者出現發燒、喉嚨痛，應最優先檢查白血球及分類（警覺顆粒性白血球缺乏症）。","detail":{"background":"**抗甲狀腺藥（methimazole/PTU）最危險副作用為顆粒性白血球缺乏症（agranulocytosis）**，常以發燒、喉嚨痛表現。**出現此症狀應立即驗WBC與分類；若中性球低下須立即停藥**。不可逕給抗生素或碘劑而忽略此致命副作用。","options":{"A":"未確認感染前非逕給抗生素。","B":"正解。先檢查白血球及分類（防agranulocytosis）。","C":"Lugol's非此處置。","D":"lithium非此處置。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110020-52":{"quick":"限水尿不濃縮、給DDAVP後尿滲透壓上升且尿量減少→中樞性尿崩症。","detail":{"background":"**中樞性尿崩症：ADH分泌不足，限水後尿無法濃縮，但給外源DDAVP後尿滲透壓明顯上升、尿量減少**;本例符合。原發性多飲限水即可濃縮;腎性DI給DDAVP無反應。","options":{"A":"原發性多飲限水可濃縮。","B":"滲透性利尿尿溶質高。","C":"正解。中樞性尿崩症（DDAVP有反應）。","D":"腎性DI給DDAVP無反應。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110020-53":{"quick":"實體腫瘤引起高血鈣最常因分泌副甲狀腺素相關胜肽（PTHrP）。","detail":{"background":"惡性腫瘤高血鈣機轉:**最常見為腫瘤分泌PTHrP（體液性惡性高血鈣，常見鱗狀細胞癌、腎癌、乳癌）**;其次溶骨性轉移（局部OAF/細胞素）;淋巴瘤可分泌1,25(OH)2D。實體腫瘤以PTHrP為主。","options":{"A":"PTH（自體分泌）少見。","B":"OAF多見於骨髓瘤等。","C":"正解。PTHrP最常見。","D":"1,25(OH)2D多見於淋巴瘤。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110020-54":{"quick":"糖皮質素（glucocorticoid）最不可能出現的副作用是高血鈣（反而易致骨鬆/低鈣傾向）。","detail":{"background":"糖皮質素副作用:**抑制生長、抑制下視丘-垂體-腎上腺軸、胰島素阻抗/高血糖、骨質疏鬆、肌病、皮膚變薄、感染、消化性潰瘍、水鈉滯留**。**類固醇減少腸鈣吸收、增尿鈣排出，傾向低血鈣/骨鬆，不致高血鈣**。","options":{"A":"抑制生長為副作用。","B":"抑制腎上腺為副作用。","C":"正解。高血鈣最不可能（反致骨鬆/低鈣傾向）。","D":"胰島素抗性為副作用。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110020-55":{"quick":"胰島素與升糖素皆由胰島細胞分泌、彼此拮抗，是葡萄糖恆定的核心。","detail":{"background":"葡萄糖恆定:**胰島β細胞分泌胰島素（降糖）、α細胞分泌升糖素（升糖），兩者拮抗**;**肝臟為血糖調節（產糖/儲糖）核心而非主要『消耗』器官（腦/肌肉為主要利用）**;胰島素經肝門靜脈約50%被肝攝取（非90%）;C-peptide為分泌指標但本身無生理活性（活性在胰島素分子）。故B正確。","options":{"A":"肝臟為血糖調節核心、非主要消耗器官。","B":"正解。胰島素與升糖素拮抗、皆由胰島分泌。","C":"肝攝取胰島素約50%（非90%）。","D":"C-peptide非具生理活性部分。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110020-56":{"quick":"南亞或華人男性腹部肥胖定義為腰圍≥90公分（非≥85）。","detail":{"background":"肥胖:**南亞/華人男性腹部肥胖腰圍≥90 cm、女性≥80 cm**;瘦素（leptin）由脂肪細胞分泌、調控食慾;肥胖者瘦素濃度多較高（瘦素阻抗）;BMI=90/(1.7^2)≈31.1。故A（男≥85）錯誤。","options":{"A":"正解（錯誤）。華人男性腰圍≥90（非≥85）。","B":"瘦素由脂肪分泌調控食慾，正確。","C":"肥胖者瘦素較高，正確。","D":"BMI約31.1，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110020-76":{"quick":"糖尿病酮酸中毒（DKA）的血氣為『代謝性酸中毒』（陰離子隙升高），非呼吸性酸中毒。","detail":{"background":"DKA:**高血糖、脫水、酮體生成造成『高陰離子隙代謝性酸中毒』，並以Kussmaul快深呼吸代償（呼吸性鹼中毒代償）**;誘因含胰島素不足、感染、懷孕等;**全身鉀總量常不足（雖初測血鉀可正常/偏高），治療補液與胰島素時須補鉀**。故B（呼吸性酸中毒）錯誤。","options":{"A":"與高血糖、脫水、酸血症相關，正確。","B":"正解（錯誤）。DKA為代謝性酸中毒，非呼吸性。","C":"誘因含胰島素不足、感染、懷孕，正確。","D":"全身鉀通常不足，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110080-48":{"quick":"閉經、牙縫變大、舌大下顎突出、acanthosis＋尿糖→肢端肥大症，下一步測 IGF-1。","detail":{"background":"肢端肥大症（GH瘤）:**肢端/下顎/舌增大、牙縫變寬、腕隧道、高血壓、糖尿病（GH拮抗胰島素）**;**篩檢首選測IGF-1（穩定、反映整體GH作用），確診以OGTT後GH不被抑制**;再以垂體MRI定位。本例下一步測IGF-1。","options":{"A":"β-hCG為懷孕、非首要（症狀指向GH）。","B":"血糖可有異常但非確診肢端肥大。","C":"頭部CT非首選（MRI在生化確認後）。","D":"正解。測IGF-1。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110080-49":{"quick":"低血糖＋高血鈣（疑MEN1：胰島素瘤＋副甲狀腺瘤），最『不可能』的是甲狀腺髓質癌（屬MEN2）。","detail":{"background":"反覆低血糖（胰島素瘤）合併高血鈣（副甲狀腺瘤/腺癌）→指向**MEN1（3P：副甲狀腺、胰島、腦下垂體）**;泌乳素瘤亦為MEN1之一環。**甲狀腺髓質癌屬MEN2（非MEN1），故最不可能**。","options":{"A":"胰島素瘤（MEN1）→低血糖，可能。","B":"副甲狀腺瘤（MEN1）→高血鈣，可能。","C":"正解。甲狀腺髓質癌屬MEN2，最不可能。","D":"泌乳素瘤屬MEN1，可能。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110080-50":{"quick":"高血壓、低血鉀、代謝性鹼中毒、腎素低而醛固酮高→原發性醛固酮症（primary aldosteronism）。","detail":{"background":"**原發性醛固酮症:醛固酮自主過多→高血壓、低血鉀、代謝性鹼中毒，且腎素活性受抑制（低）、醛固酮高、醛固酮/腎素比值升高**;ACTH正常。本例腎素0.04（低）、醛固酮39.2（高）→原發性醛固酮症。腎動脈狹窄則腎素高。","options":{"A":"腎動脈狹窄腎素應升高。","B":"甲亢不符此電解質。","C":"正解。原發性醛固酮症（腎素低醛固酮高）。","D":"庫欣ACTH/皮質醇異常、表現不同。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110080-51":{"quick":"胰島素瘤並非空腹低血糖『最常見』原因（藥物才是）；故敘述錯誤。","detail":{"background":"低血糖:**皮質醇在低血糖時上升（反調節）;Whipple三聯（低血糖症狀隨血糖上升而緩解）;正常空腹血糖通常≥70**;**胰島素瘤罕見，並非空腹低血糖『最常見』原因——糖尿病降血糖『藥物』才是最常見**。故D錯誤。","options":{"A":"低血糖時皮質醇上升，正確。","B":"Whipple三聯敘述正確。","C":"正常空腹血糖≥70，正確。","D":"正解（錯誤）。胰島素瘤非空腹低血糖最常見原因。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110080-52":{"quick":"statin抑制的速率決定酶是HMG-CoA還原酶（reductase），不是HMG-CoA oxidase。","detail":{"background":"血脂代謝:**statin抑制膽固醇合成速率決定酶HMG-CoA reductase（非oxidase）**;HDL為逆向膽固醇運輸最重要脂蛋白;空腹三酸甘油酯主由VLDL運送;LDL受體為細胞攝取膽固醇最重要受體。故A錯誤。","options":{"A":"正解（錯誤）。應為HMG-CoA reductase，非oxidase。","B":"HDL為逆向膽固醇運輸，正確。","C":"空腹三酸甘油酯由VLDL運送，正確。","D":"LDL受體攝取膽固醇，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110080-53":{"quick":"先天性腎上腺增生（CAH，21-OH缺乏）皮質醇『減少』（非增加），代償性ACTH與17-OH黃體素升高。","detail":{"background":"**先天性腎上腺增生最常見為21-羥化酶（CYP21A2）缺乏→皮質醇（與醛固酮）合成不足→負回饋解除使ACTH上升、腎上腺增生、17-OH progesterone堆積並分流為雄性素**。故皮質醇『減少』，C（cortisol分泌增加）錯誤。","options":{"A":"最常見CYP21A2突變，正確。","B":"17-OH progesterone增加，正確。","C":"正解（錯誤）。CAH皮質醇減少（非增加）。","D":"ACTH分泌增加（代償），正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110080-54":{"quick":"T3對組織作用活性比T4『強』（T4多為前驅物，於組織轉為T3）；故敘述把T4活性說得比T3強為錯誤。","detail":{"background":"甲狀腺:分泌T3、T4;TSH由腦下垂體分泌、與T3/T4負回饋;**T4分泌量較多但活性低（為前驅物），周邊去碘轉為活性較強的T3**;碘缺乏地區T3比例可較高。**『T4對組織作用比T3強』錯誤（T3較強）**。","options":{"A":"主要分泌T3、T4，正確。","B":"TSH與T3/T4負回饋，正確。","C":"正解（錯誤）。T3活性比T4強，非T4比T3強。","D":"T3/T4上升則TSH下降，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"110080-78":{"quick":"HHS定義為血糖>600且血漿滲透壓>320 mOsm/kg（非>300）。","detail":{"background":"**高滲透壓高血糖狀態（HHS）:血糖常>600、血漿有效滲透壓>320 mOsm/kg、無明顯酮酸中毒、意識改變**;病人不一定昏迷或酮酸中毒;可有皮膚黏膜乾、低血壓、甚至癲癇。故A（滲透壓>300）錯誤（應>320）。","options":{"A":"正解（錯誤）。HHS滲透壓門檻為>320（非>300）。","B":"不一定昏迷或酮酸中毒，正確。","C":"可皮膚乾、低血壓，正確。","D":"部分可出現癲癇，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111020-02":{"quick":"抗骨吸收劑（anti-resorptive）的目的是『預防骨折』，不是緩解急性疼痛；故敘述最不適當。","detail":{"background":"骨鬆性骨折:脊椎壓迫性骨折多無症狀;一次脊椎骨折一年內再骨折風險約20%;**抗骨吸收劑（bisphosphonate等）用於降低骨折再發風險（預防骨折），並非用於緩解急性疼痛**;發燒/體重減輕/胸4以上骨折要警覺次發病因（惡性/感染）。故C錯誤。","options":{"A":"脊椎壓迫骨折多無症狀，正確。","B":"一年內再骨折風險約20%，正確。","C":"正解（最不適當）。抗骨吸收劑目的是預防骨折，非止急性痛。","D":"異常部位/警示症狀要疑次發病因，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111020-52":{"quick":"分化良好之甲狀腺癌（乳突/濾泡）術後追蹤再發的生物指標是甲狀腺球蛋白（thyroglobulin），不是AFP。","detail":{"background":"甲狀腺癌:手術可切除病灶並做分期;超音波評估頸部淋巴結並對可疑者FNA;**分化型（乳突/濾泡）癌術後以血清thyroglobulin追蹤復發（非胎兒球蛋白AFP）**;I-131半衰期約8天。故C錯誤。","options":{"A":"手術助組織病理與分期，正確。","B":"超音波＋可疑淋巴結FNA，正確。","C":"正解（錯誤）。追蹤用thyroglobulin，非AFP。","D":"I-131半衰期約8天，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111020-53":{"quick":"投與雙胍類（metformin）是治療糖尿病的藥，最不可能『引起』糖尿病。","detail":{"background":"引起/續發糖尿病的因素:病毒感染後自體免疫、胰島素阻抗、**類固醇（升血糖）**等。**雙胍類（metformin）是降血糖藥，不會引起糖尿病**。","options":{"A":"病毒後自體免疫可致糖尿病。","B":"胰島素阻抗可致糖尿病。","C":"類固醇可致續發糖尿病。","D":"正解。雙胍類為降血糖藥、不致糖尿病。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111020-54":{"quick":"身體質量指數（BMI）越小代表越『瘦』而非越胖；故敘述錯誤。","detail":{"background":"肥胖:可引起胰島素阻抗與糖尿病;與飲食、運動、基因相關;脂肪細胞分泌多種脂肪激素（leptin、adiponectin等）。**BMI＝體重/身高²，數值越大越胖（越小越瘦）**，故B錯誤。","options":{"A":"肥胖致胰島素阻抗/糖尿病，正確。","B":"正解（錯誤）。BMI越小越瘦，非越胖。","C":"與飲食運動基因相關，正確。","D":"脂肪細胞分泌多種物質，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111020-55":{"quick":"80歲以上糖尿病人血糖控制目標應『放寬』（HbA1c不需<6.5%）；故敘述錯誤。","detail":{"background":"糖尿病個別化:第1型以TPN治療仍需基礎長效胰島素;類固醇致高血糖控制不佳常需胰島素;脂質營養不良性糖尿病可用重組瘦素;**高齡/共病/餘命短者血糖目標應放寬（如HbA1c 7.5–8.5%），不宜過嚴<6.5%（增低血糖風險）**。故D錯誤。","options":{"A":"第1型TPN仍需基礎胰島素，正確。","B":"類固醇高血糖常需胰島素，正確。","C":"脂質營養不良性糖尿病可用瘦素，正確。","D":"正解（錯誤）。80歲以上目標應放寬，非<6.5%。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111020-56":{"quick":"造成次發性高血壓的內分泌疾病中，原發性醛固酮過高最常見。","detail":{"background":"**內分泌性次發高血壓中以原發性醛固酮症最常見**（佔難治型高血壓相當比例）;其餘嗜鉻細胞瘤、庫欣、肢端肥大較少見。","options":{"A":"正解。原發性醛固酮過高最常見。","B":"嗜鉻細胞瘤較少見。","C":"庫欣較少見。","D":"肢端肥大較少見。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111020-57":{"quick":"白斑＋怕冷變胖抽筋、free T4低TSH高（原發性甲低，疑橋本氏），最不需做的是腦下垂體核磁共振。","detail":{"background":"原發性甲狀腺低下（TSH高、free T4低）疑橋本氏:應**甲狀腺觸診/家族史、超音波、抗甲狀腺自體抗體（anti-TPO）**。**TSH升高（原發性）表示問題在甲狀腺本身，垂體MRI最不需要**（次發性甲低TSH才會低/不適當正常）。","options":{"A":"觸診與家族史需要。","B":"甲狀腺超音波需要。","C":"anti-TPO自體抗體需要。","D":"正解（最不需要）。原發性甲低不需垂體MRI。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111020-58":{"quick":"27歲體重上升、月亮臉水牛肩中心肥胖、皮膚易瘀青、紫色條紋→疑庫欣，先抽血8點與4點的cortisol和ACTH。","detail":{"background":"疑庫欣症候群:**先確認皮質醇過量（24小時尿游離皮質醇、隔夜1mg dexamethasone抑制、深夜皮質醇、以及上午8點與下午4點皮質醇/ACTH評估節律）**;確認後再以ACTH分依賴/非依賴、影像定位。本例下一步先抽血皮質醇/ACTH。高劑量dexamethasone與影像在後續定位才做。","options":{"A":"正解。先抽血8點與4點cortisol/ACTH。","B":"高劑量dexamethasone為後續定位。","C":"腎上腺CT為後續定位。","D":"垂體MRI為後續定位。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111020-66":{"quick":"BMI＝64/1.58²≈25.6，屬『過重』非肥胖（台灣肥胖≥27）；故『屬於肥胖』錯誤。","detail":{"background":"本例BMI≈25.6（過重24–27，未達肥胖≥27）、腰圍88（女≥80符合腹部肥胖）、空腹血糖106（≥100偏高）、三酸甘油酯325（≥150高），符合代謝症候群。**A『屬於肥胖』錯誤（為過重）**。","options":{"A":"正解（錯誤）。BMI 25.6為過重，非肥胖。","B":"空腹血糖106偏高，正確。","C":"三酸甘油酯325為高三酸甘油酯血症，正確。","D":"符合代謝症候群診斷，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111020-78":{"quick":"鼻咽癌高血鈣（校正鈣16.88）時，『血液透析對高血鈣治療效果有限』錯誤——透析可有效快速降鈣。","detail":{"background":"惡性高血鈣:校正鈣＝測得鈣＋0.8×(4−白蛋白)＝16＋0.8×(4−2.9)=16.88;心電圖可QT縮短;calcitonin起效快（但短暫），bisphosphonate較慢但持久;**嚴重/腎功能不良之高血鈣，血液透析（低鈣透析液）可有效快速降鈣，故說『效果有限』錯誤**。","options":{"A":"校正鈣16.88，正確。","B":"高血鈣ECG可QT縮短，正確。","C":"正解（錯誤）。血液透析對高血鈣有效，非有限。","D":"calcitonin較bisphosphonate起效快，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111080-01":{"quick":"多尿但尿滲透壓偏高（450）→溶質性利尿（solute diuresis），非水利尿型尿崩。","detail":{"background":"多尿鑑別以**尿滲透壓**:**>300（如450）且每日溶質排出多→溶質（滲透）性利尿（如高血糖、高蛋白餵食、甘露醇、解除阻塞）**;**<250 稀尿→水利尿（尿崩或原發性多飲）**。本例尿滲透壓450偏高→溶質性利尿。","options":{"A":"正解。溶質性利尿（尿滲透壓偏高）。","B":"原發性多飲尿稀。","C":"中樞性尿崩尿稀。","D":"腎源性尿崩尿稀。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111080-37":{"quick":"惡性高血鈣（hypercalcemia of malignancy）的體液因子是PTHrP或1,25(OH)2D，不是『甲狀腺素』；故配對錯誤。","detail":{"background":"副腫瘤內分泌（paraneoplastic）配對:**惡性高血鈣→PTHrP或1,25-dihydroxyvitamin D（淋巴瘤）;庫欣→異位ACTH;SIADH→vasopressin（ADH）**。**『惡性高血鈣→甲狀腺素』為錯誤配對**（甲狀腺素與惡性高血鈣無關）。","options":{"A":"惡性高血鈣可由1,25(OH)2D（淋巴瘤），正確。","B":"庫欣由ACTH，正確。","C":"SIADH由vasopressin，正確。","D":"正解（錯誤）。惡性高血鈣非由甲狀腺素引起。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111080-52":{"quick":"Graves眼病變的嚴重度與甲狀腺功能高低『不成正相關』（可獨立發展）；故敘述最不適當。","detail":{"background":"Graves病:女多於男、發病20–50歲;老年可表現淡漠性甲亢（僅疲倦、體重減輕）;約80%有甲狀腺過氧化酶抗體;常合併眼病變（眼瞼內縮、凸眼、複視）。**眼病變（甲狀腺相關眼眶病變）可獨立於甲狀腺功能、與功能高低不成正相關**。故D錯誤。","options":{"A":"女多於男、20–50歲，正確。","B":"老年可淡漠性甲亢，正確。","C":"約80%有TPO抗體，正確。","D":"正解（錯誤）。眼病變與甲狀腺功能高低不成正相關。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111080-53":{"quick":"甲狀腺乳突癌可由細針穿刺細胞學提供術前診斷（FNA對乳突癌診斷率高）；故敘述錯誤。","detail":{"background":"甲狀腺癌:**乳突癌最常見（約80–85%），FNA細胞學對乳突癌術前診斷率高**;濾泡癌FNA無法區分良惡（需手術病理看包膜/血管侵犯）、多血行轉移至肺骨;原發>4cm或>50歲預後較差。故B（乳突癌無法FNA診斷）錯誤。","options":{"A":"乳突癌最常見約80–85%，正確。","B":"正解（錯誤）。乳突癌可由FNA術前診斷。","C":"濾泡癌多血行轉移肺骨，正確。","D":">4cm或>50歲預後較差，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111080-54":{"quick":"並非『有心肌梗塞或心衰竭就都不可用metformin』；穩定者仍可用（避免於急性失代償/低灌注）。","detail":{"background":"糖尿病與心血管:增加心肌梗塞與心衰風險;aspirin、statin可預防;TZD可能增心衰風險。**metformin並非所有心臟病皆禁用——僅於急性失代償心衰、低灌注、嚴重腎功能不良（乳酸中毒風險）時避免，穩定者可使用**。故B（都不可用）錯誤。","options":{"A":"糖尿病增心梗/心衰，正確。","B":"正解（錯誤）。非所有心臟病皆禁用metformin。","C":"aspirin/statin可預防，正確。","D":"TZD可能增心衰，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111080-55":{"quick":"DPP-4抑制劑為血糖依賴性、單用『不易』低血糖；故敘述錯誤。","detail":{"background":"降血糖藥:pioglitazone增心衰風險;**DPP-4抑制劑提升GLP-1→葡萄糖依賴性促胰島素、抑制升糖素，單用低血糖風險低（非易低血糖）**;SGLT2抑制劑可減重;metformin減少肝糖質新生。故B錯誤。","options":{"A":"pioglitazone增心衰風險，正確。","B":"正解（錯誤）。DPP-4抑制劑單用不易低血糖。","C":"SGLT2抑制劑可減重，正確。","D":"metformin減少肝糖新生，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111080-56":{"quick":"PCSK9基因『失去功能』會降低LDL（保護性），並非增加LDL；故敘述錯誤。","detail":{"background":"血脂:**LDL受體突變失功能→LDL升高、加速動脈硬化（家族性高膽固醇血症）**;**PCSK9促進LDL受體降解;PCSK9失功能突變→LDL受體增加、LDL『降低』（保護）**，故PCSK9抑制劑可降LDL。statin為降膽固醇首選、fibrate為降三酸甘油酯首選。故B錯誤。","options":{"A":"LDL受體失功能→LDL升高，正確。","B":"正解（錯誤）。PCSK9失功能會降低LDL（非升高）。","C":"statin為降膽固醇首選，正確。","D":"fibrate為降三酸甘油酯首選，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111080-57":{"quick":"代謝症候群病人血中HDL-C濃度比一般人『低』（非高）；故敘述錯誤。","detail":{"background":"代謝症候群（胰島素阻抗）:肥胖與脂質營養不良皆可伴隨;**血中HDL-C下降、三酸甘油酯上升、adiponectin（脂締素）下降**。故C（HDL高於一般人）錯誤。","options":{"A":"肥胖易伴代謝症候群，正確。","B":"脂質營養不良易伴代謝症候群，正確。","C":"正解（錯誤）。代謝症候群HDL-C較低，非較高。","D":"adiponectin濃度較低，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"111080-58":{"quick":"嗜鉻細胞瘤術前須先給α阻斷劑7–10天並補充水分，必要時再給β阻斷劑。","detail":{"background":"嗜鉻細胞瘤術前準備:**先以α阻斷劑（phenoxybenzamine/doxazosin）7–10天控制血壓並擴容、之後（α阻斷後）才可加β阻斷劑控制心搏**;不可逕行緊急手術或先做切片（誘發高血壓危象）;不以somatostatin類似物為主治。故C正確。","options":{"A":"不可未準備即緊急手術。","B":"未α阻斷前禁做切片（危象風險）。","C":"正解。術前7–10天α阻斷＋補水，必要時β阻斷。","D":"非以somatostatin類似物治療。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"112020-54":{"quick":"鼻咽癌放療多年後出現倦怠、體重減輕、體毛減少→放射致垂體功能低下，查ACTH、cortisol最有幫助。","detail":{"background":"頭頸部（鼻咽癌）放射治療可損及下視丘-腦下垂體，數年後出現**垂體功能低下（GH、性腺、ACTH、TSH軸）**;本例倦怠、體重減輕、性徵/體毛減退、輕度低血鈉→須評估腎上腺軸（ACTH、cortisol，續發性腎上腺低下可致低鈉、危象）。","options":{"A":"free T4/TSH亦需查，但腎上腺軸更關鍵（救命）。","B":"正解。查ACTH、cortisol（續發腎上腺低下）。","C":"腫瘤標記非此病因評估。","D":"FSH/LH/testosterone可查、但腎上腺軸更急。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"112020-55":{"quick":"代謝症候群血中脂締素（adiponectin）通常『下降』而非增加；故敘述錯誤。","detail":{"background":"代謝症候群:**adiponectin（具胰島素增敏、抗發炎之脂肪激素）下降**;CRP（發炎）上升;尿酸常升高;LDL-C非常用診斷條件（以TG、HDL為主）。故A錯誤。","options":{"A":"正解（錯誤）。adiponectin通常下降，非增加。","B":"CRP上升，正確。","C":"尿酸常升高，正確。","D":"LDL-C非常用診斷條件，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"112020-56":{"quick":"造成低血糖最常見的原因不是胰島素瘤（是降血糖『藥物』）；故敘述最不適當。","detail":{"background":"低血糖:血糖<50可致認知障礙;**最常見原因為糖尿病降血糖藥物（胰島素、磺醯尿素），胰島素瘤罕見**;雙胍類不易低血糖;Whipple三聯需可靠血糖檢測佐證。故B錯誤。","options":{"A":"血糖<50可致認知障礙，正確。","B":"正解（最不適當）。低血糖最常見原因為藥物，非胰島素瘤。","C":"雙胍類不易低血糖，正確。","D":"Whipple三聯需可靠血糖，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"112020-57":{"quick":"心悸、怕熱、手抖、體重減輕、雙眼突出＋瀰漫性甲狀腺腫→葛雷夫茲氏症（Graves' disease）。","detail":{"background":"**Graves病：自體免疫（TSH受體刺激抗體），表現甲亢（心悸、怕熱、手抖、體重減輕）＋瀰漫性甲狀腺腫＋眼病變（凸眼）＋脛前黏液水腫**。本例典型。甲狀腺癌多為結節、亞急性甲狀腺炎有疼痛、甲低為怕冷增重。","options":{"A":"甲狀腺癌多為結節、無凸眼。","B":"甲狀腺功能過低表現相反。","C":"正解。葛雷夫茲氏症（Graves）。","D":"亞急性甲狀腺炎多疼痛、一過性。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"112020-58":{"quick":"腦下垂體生長激素瘤造成肢端肥大症，治療首選為（經蝶鞍）手術切除。","detail":{"background":"**肢端肥大症（GH瘤）治療首選為經蝶鞍手術切除腫瘤**;手術未根治或不適手術者，輔以somatostatin類似物、GH受體拮抗劑（pegvisomant）、放射治療。多巴胺促效劑效果有限。","options":{"A":"正解。手術切除為首選。","B":"somatostatin類似物為輔助/術後。","C":"放射治療為輔助。","D":"多巴胺促效劑對GH瘤效果有限。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"112080-52":{"quick":"原發性副甲狀腺亢進為高血鈣＋『低』血磷；說『高血磷』為錯誤。","detail":{"background":"原發性副甲狀腺亢進:多為單一腺瘤;可為MEN之一環;**表現高血鈣、低血磷（PTH抑制腎磷再吸收）、高血氯型（輕度代謝性酸中毒）**;血鈣>14 mg/dL要警覺副甲狀腺癌。故C（高血磷低血氯）錯誤（應低血磷）。","options":{"A":"多為單一腺瘤，正確。","B":"可為MEN表現，正確。","C":"正解（錯誤）。應為高血鈣、低血磷。","D":"血鈣>14常為副甲狀腺癌，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"112080-53":{"quick":"老年男性血中雄性激素較高時，罹患糖尿病機率較『低』（非較高）；故敘述最不可能。","detail":{"background":"老年男性較高睪固酮與較佳代謝相關:**性慾較高、冠心病風險較低、罹患糖尿病/代謝症候群機率較低、死亡率較低**（低睪固酮與胰島素阻抗、代謝症候群相關）。故C（糖尿病機率較高）為最不可能。","options":{"A":"性慾較高，合理。","B":"冠心病機率較低，合理。","C":"正解（最不可能）。應為糖尿病機率較低。","D":"死亡率較低，合理。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"112080-54":{"quick":"糖尿病病人的血壓控制目標一般『不應較寬鬆』（多建議更嚴格，如<130/80）；故敘述錯誤。","detail":{"background":"糖尿病與高血壓:糖尿病者高血壓盛行率較高;首選降壓藥為ACEi/ARB（兼具腎臟保護）;**血壓目標多建議較嚴格（常<130/80）以減少心腎併發症**;高血壓促進大小血管病變。故C（目標較寬鬆）錯誤。","options":{"A":"糖尿病高血壓盛行率較高，正確。","B":"首選ACEi/ARB，正確。","C":"正解（錯誤）。血糖尿病血壓目標較嚴格，非寬鬆。","D":"高血壓促進大小血管病變，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"112080-56":{"quick":"metformin並非最常引起低血糖的口服降血糖藥（最易低血糖者為磺醯尿素）；故敘述錯誤。","detail":{"background":"血糖調控:胰島素由胰臟分泌降血糖;血糖隨飲食運動波動;血糖過低可致命。**metformin單用不易低血糖（最易致低血糖者為磺醯尿素、meglitinide）**。故D錯誤。","options":{"A":"胰島素降血糖，正確。","B":"血糖隨飲食運動波動，正確。","C":"血糖過低可致死，正確。","D":"正解（錯誤）。metformin非最易低血糖（磺醯尿素才是）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"112080-57":{"quick":"最常見的甲狀腺癌為乳突癌（papillary carcinoma）。","detail":{"background":"**甲狀腺癌中乳突癌最常見（約80–85%，預後佳、淋巴轉移為主）**;其次濾泡癌（血行轉移）、髓質癌（C細胞、MEN2）、未分化癌（預後最差）。","options":{"A":"正解。乳突癌最常見。","B":"濾泡癌次之。","C":"髓質癌較少。","D":"未分化癌罕見、預後差。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"112080-58":{"quick":"腦下垂體後葉（分泌ADH/催產素）受破壞最可能出現尿崩症。","detail":{"background":"**腦下垂體後葉儲存釋放抗利尿激素（ADH）與催產素**;後葉/下視丘受損→ADH不足→**中樞性尿崩症（多尿、煩渴、尿稀）**。腎上腺/甲狀腺/性腺軸由『前葉』調控。","options":{"A":"正解。尿崩症（後葉ADH不足）。","B":"腎上腺不足為前葉ACTH。","C":"甲狀腺不足為前葉TSH。","D":"性功能由前葉LH/FSH。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113020-01":{"quick":"患妊娠糖尿病（GDM）的女性將來發生第2型糖尿病的風險『明顯較高』（非接近一般人）；故敘述最不適當。","detail":{"background":"妊娠糖尿病:**篩檢約24–28週**;先飲食控制，未達標加胰島素（或部分口服藥）。**GDM病史者日後罹患第2型糖尿病風險明顯升高（可達數倍），須長期追蹤血糖**。故D錯誤。","options":{"A":"24–28週篩檢，正確。","B":"先飲食控制，正確。","C":"飲食無法達標加胰島素/口服藥，正確。","D":"正解（最不適當）。GDM者日後第2型糖尿病風險明顯較高。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113020-05":{"quick":"拍面神經顏面肌收縮（Chvostek）、加壓臂帶誘發手腕抽筋（Trousseau）→低血鈣（hypocalcemia）。","detail":{"background":"低血鈣神經肌肉激動性增加:**Chvostek徵（拍耳前面神經→同側顏面肌收縮）、Trousseau徵（血壓計加壓>收縮壓3分鐘→腕足痙攣）**;可伴感覺異常、抽搐、QT延長。","options":{"A":"高血鈣表現相反（無此徵）。","B":"正解。低血鈣（Chvostek/Trousseau）。","C":"高血磷非直接此徵。","D":"低血磷非典型此徵。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113020-52":{"quick":"嗜鉻細胞瘤『Rule of ten』為10%雙側、10%腎上腺外、10%惡性、10%家族（並非10%單側）。","detail":{"background":"嗜鉻細胞瘤Rule of ten:**約10%雙側（90%單側）、10%腎上腺外（paraganglioma）、10%惡性、10%家族性/兒童**;臨床有頭痛、焦慮/恐慌、多尿、姿勢性低血壓、血糖上升;診斷需生化（兒茶酚胺/metanephrines過量）＋影像定位;CT/MRI敏感度相近。故C（10%『單側』）敘述錯誤（應為10%雙側）。","options":{"A":"臨床表現列舉正確。","B":"生化＋影像並重，正確。","C":"正解（錯誤）。應為10%雙側（非10%單側）。","D":"CT/MRI敏感度相近，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113020-53":{"quick":"淋巴球性腦垂體炎MRI多呈『垂體腫大（均勻強化、柄增厚）』，而非空蝶鞍；故敘述錯誤。","detail":{"background":"**淋巴球性腦垂體炎（自體免疫垂體炎）**:好發產後女性，可表現高泌乳素血症、頭痛與視覺異常、垂體功能低下;**MRI典型為垂體對稱腫大、垂體柄增厚與均勻強化（非空蝶鞍）**;類固醇治療後可能恢復。故B錯誤。","options":{"A":"好發產後、可高泌乳素，正確。","B":"正解（錯誤）。MRI多為垂體腫大，非空蝶鞍。","C":"可頭痛及視覺異常，正確。","D":"類固醇治療後可能恢復，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113020-54":{"quick":"庫欣症候群的肌肉無力為『近端』肌病（爬樓梯困難），不是遠端肌病；故敘述錯誤。","detail":{"background":"庫欣症候群:中心性肥胖、水牛肩、滿月臉、紫紋、易瘀青;**類固醇肌病為近端肌肉無力（爬樓梯/站起困難）**;易感染（但白血球不一定明顯增加，類固醇致中性球增加、淋巴球減少）;增加血栓風險。故B（遠端肌病）錯誤。","options":{"A":"中心性肥胖與水牛肩，正確。","B":"正解（錯誤）。為近端肌病，非遠端。","C":"易感染（白血球變化敘述偏差但非本題答案）。","D":"增加血栓風險，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113020-55":{"quick":"單獨測TSH『無法』鑑別腦下垂體（次發性）疾病造成的甲狀腺異常；需合併free T4判讀。","detail":{"background":"甲狀腺功能檢查:自體免疫以anti-Tg/anti-TPO評估;有抗體者較易甲狀腺功能異常;甲狀腺毒症thyroglobulin多升高（外因甲狀腺素之thyrotoxicosis factitia例外，Tg低）。**次發性（垂體性）甲狀腺異常時TSH可不適當地正常或偏低，單測TSH會誤判，須合併free T4**。故D錯誤。","options":{"A":"以anti-Tg/anti-TPO診斷自體免疫，正確。","B":"有抗體較易功能異常，正確。","C":"甲狀腺毒症Tg多升、factitia例外，正確。","D":"正解（錯誤）。單測TSH無法鑑別垂體性甲狀腺異常。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113020-56":{"quick":"第2型糖尿病人需注射胰島素時，並不會因此『轉變成第1型』；分型依病因（自體免疫/絕對缺乏）而非是否打胰島素。","detail":{"background":"第2型糖尿病:有程度不一的胰島素阻抗、分泌減少、肝糖質新生增加。**疾病進展或控制需要時可加用胰島素，但這不改變其為第2型的本質（第1型為自體免疫絕對缺乏）**。故D錯誤。","options":{"A":"有胰島素阻抗，正確。","B":"有胰島素分泌減少，正確。","C":"肝糖新生增加，正確。","D":"正解（錯誤）。打胰島素不會使第2型變第1型。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113020-57":{"quick":"一般空腹血漿血糖正常值下限約70 mg/dL（非50）；故敘述最不適當。","detail":{"background":"血糖調控:Whipple三聯含血糖恢復後症狀改善;肝與腎皆有糖質新生;血糖降低時胰島
