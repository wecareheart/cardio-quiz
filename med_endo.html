素分泌先減少、升糖素隨後上升。**正常空腹血糖下限約70 mg/dL（<70即偏低），非50**。故B錯誤。","options":{"A":"Whipple三聯含血糖回升後症狀改善，正確。","B":"正解（最不適當）。空腹血糖下限約70，非50。","C":"肝腎皆有糖質新生，正確。","D":"血糖低時胰島素先減、升糖素隨後上升，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113070-02":{"quick":"懷孕期以甲狀腺素治療甲低，常需比孕前『更高』劑量（非更低）；故敘述最不適當。","detail":{"background":"懷孕甲狀腺生理:雌激素使TBG升高→total T3/T4上升;第一孕程hCG刺激甲狀腺使free T3/T4略升、TSH略降;methimazole於第一孕程可能致畸（首選PTU）;**孕期甲狀腺素需求增加，已用甲狀腺素之甲低孕婦常需『增加』劑量以維持TSH於孕期目標**。故D（需更低劑量）錯誤。","options":{"A":"TBG上升使total T3/T4上升，正確。","B":"hCG刺激致free T3/T4略升，正確。","C":"第一孕程methimazole可能致畸，正確。","D":"正解（最不適當）。孕期甲狀腺素需求增加、常需更高劑量。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113070-05":{"quick":"次發性副甲狀腺機能亢進不會造成高血鈣（反為低/正常鈣）；故為最不可能的高血鈣原因。","detail":{"background":"本例胸部X光異常之高血鈣鑑別:肺結核（肉芽腫產生1,25(OH)2D）、肺鱗狀細胞癌（PTHrP）、三發性副甲狀腺亢進（自主分泌PTH→高鈣）皆可致高血鈣。**次發性副甲狀腺亢進（如慢性腎病代償）以低/正常血鈣為特徵，不致高血鈣**。故C為最不可能。","options":{"A":"結核肉芽腫致高鈣，可能。","B":"鱗癌PTHrP致高鈣，可能。","C":"正解。次發性副甲狀腺亢進不致高血鈣。","D":"三發性副甲狀腺亢進致高鈣，可能。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113070-52":{"quick":"停經後濾泡刺激素（FSH）會『升高』而非持續偏低（雌二醇才偏低）；故敘述最不適當。","detail":{"background":"女性更年期:35歲後卵巢功能/生育力漸降;症狀含潮紅、夜間盜汗;**停經後卵巢雌激素（estradiol）下降、負回饋解除使FSH/LH『升高』**;補充雌激素可改善症狀但增加子宮內膜癌、靜脈血栓風險。故C（FSH與estradiol皆持續偏低）錯誤（FSH應升高）。","options":{"A":"35歲後卵巢功能漸降，正確。","B":"症狀含潮紅、夜間盜汗，正確。","C":"正解（最不適當）。停經後FSH升高（非偏低）。","D":"補充雌激素改善症狀但增子宮內膜癌/血栓風險，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113070-53":{"quick":"Basal-bolus胰島素注射＝三餐前注射短/速效＋每日一次長效（基礎）胰島素。","detail":{"background":"**Basal-bolus（強化）胰島素方案:每日一次（或兩次）長效『基礎』胰島素（glargine/detemir/degludec）＋三餐前『餐時』短/速效胰島素（regular/lispro/aspart）**，模擬生理分泌、利於彈性控制，為第1型與部分第2型的強化治療。","options":{"A":"正解。三餐短/速效＋每日一次長效。","B":"預混型非basal-bolus定義。","C":"單一次超長效非basal-bolus。","D":"僅速效四次非basal-bolus。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113070-54":{"quick":"糖尿病足部潰瘍『可透過衛教與足部照護預防』，說很難以衛教預防為最不適當。","detail":{"background":"糖尿病下肢病變:可由血管阻塞或神經病變引起;血管病變使潰瘍難癒;**足部潰瘍可藉由衛教（每日檢視足部、適當鞋具、血糖控制、避免赤足）與定期足部檢查有效『預防』**;潰瘍發生時須減壓（off-loading）。故C錯誤。","options":{"A":"可血管或神經病變引起，正確。","B":"血管病變使潰瘍難癒，正確。","C":"正解（最不適當）。足部潰瘍可透過衛教預防。","D":"潰瘍時避免患部受壓（off-loading），正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113070-55":{"quick":"瘦素（leptin）主要由脂肪組織分泌。","detail":{"background":"肥胖機轉:**瘦素（leptin）由脂肪組織分泌、抑制食慾;肥胖者血中瘦素濃度多較高（瘦素阻抗）**;BMI＝體重/身高²。本例正確選項為C（leptin由脂肪分泌）。100/(1.8²)≈30.9（非32）;台灣肥胖標準男BMI≥27;瘦的人瘦素較低（非較高）。","options":{"A":"100/1.8²≈30.9，非32。","B":"台灣肥胖男女皆BMI≥27（敘述有誤）。","C":"正解。瘦素由脂肪組織分泌。","D":"瘦的人瘦素較低（非較高）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113070-56":{"quick":"術前診斷甲狀腺結節良惡性的黃金標準為甲狀腺細針穿刺細胞學檢查（FNA）。","detail":{"background":"**甲狀腺結節良惡性術前診斷的黃金標準為（超音波導引）細針穿刺細胞學（FNA）**;超音波評估特徵、thyroglobulin為追蹤而非診斷、MRI非首選。","options":{"A":"超音波評估特徵、非確診。","B":"thyroglobulin用於追蹤、非診斷良惡。","C":"正解。細針穿刺細胞學為黃金標準。","D":"頸部MRI非首選。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113070-57":{"quick":"造成肢端肥大的腦下垂體腫瘤治療首選為經蝶鞍手術去除腫瘤。","detail":{"background":"**肢端肥大症（GH瘤）治療首選為經蝶鞍手術切除**;未根治者輔以somatostatin類似物、GH受體拮抗劑、放射治療;多巴胺受體作用劑效果有限。","options":{"A":"放射治療為輔助。","B":"多巴胺作用劑效果有限。","C":"正解。經蝶鞍手術為首選。","D":"somatostatin類似物為輔助/術後。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113070-58":{"quick":"診斷『病態甲狀腺正常症候群（sick euthyroid / 非甲狀腺病態症候群）』最關鍵指標為逆位三碘甲狀腺素（reverse T3）。","detail":{"background":"**重病/飢餓時周邊T4去碘轉向產生無活性的reverse T3（rT3升高）、T3下降（低T3症候群）、TSH可正常或偏低**——即非甲狀腺病態症候群（sick euthyroid）。**rT3升高為其特徵性區別指標**（與真正甲低之rT3降低不同）。","options":{"A":"T3下降但非最關鍵鑑別。","B":"T4可正常/偏低。","C":"正解。reverse T3（rT3）升高為關鍵。","D":"超音波非此診斷。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113070-77":{"quick":"甲狀腺術後低血鈣的心電圖特徵是『QT延長』，不是QTc縮短、T波變高；故敘述最不適當。","detail":{"background":"甲狀腺全切術後可因副甲狀腺受損致急性低血鈣:**嚴重低血鈣可有錐體外症狀、癲癇、Chvostek徵、QT間期『延長』**;**用毛地黃者靜脈補鈣可增毛地黃毒性**。故C（QTc縮短、T波變高）錯誤（低血鈣為QT延長）。","options":{"A":"嚴重低血鈣可錐體外/癲癇，正確。","B":"Chvostek徵描述正確。","C":"正解（最不適當）。低血鈣為QT延長，非縮短。","D":"用毛地黃者補鈣增毒性，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"113070-78":{"quick":"磺醯尿素（如glipizide）最常發生低血糖之不良反應。","detail":{"background":"降血糖藥低血糖風險:**磺醯尿素（sulfonylurea，如glipizide/glibenclamide）與胰島素、meglitinide最易低血糖**;metformin、TZD、acarbose單用不易低血糖。題幹『降血糖藥』中以磺醯尿素最易。","options":{"A":"biguanides不易低血糖。","B":"TZD不易低血糖。","C":"正解。磺醯尿素最易低血糖。","D":"α-glucosidase抑制劑不易低血糖。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114020-38":{"quick":"chromogranin A的免疫組織染色有助於神經內分泌瘤（NET）的診斷。","detail":{"background":"NET病理:**chromogranin A與synaptophysin為神經內分泌標記、陽性支持NET（synaptophysin陽性不能『排除』NET）**;染serotonin/substance P陽性不等於必有臨床症候群（需荷爾蒙活性與肝轉移）;分級G1/G2為well/moderately、G3為poorly分化。故A正確。","options":{"A":"正解。chromogranin A助診斷NET。","B":"synaptophysin陽性反為支持（非排除）。","C":"染色陽性不等於有臨床症候群。","D":"G3為poorly分化（分級對應有誤）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114020-52":{"quick":"甲狀腺結節惡性危險因子最不可能是『20–50歲女性』（惡性風險較高者為極年輕<20、年長、男性）。","detail":{"background":"甲狀腺結節惡性危險特徵:**年齡<20或>60、男性、頭頸放射史、生長快速、質硬固定、聲帶麻痺/聲音沙啞、頸部淋巴結轉移、家族史**。**20–50歲女性結節多為良性，最不傾向惡性**。","options":{"A":"正解。20–50歲女性最不可能為惡性危險因子。","B":"單側頸部淋巴結病變傾向惡性。","C":"頭頸放射史傾向惡性。","D":"聲音沙啞合併聲帶麻痺傾向惡性。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114020-53":{"quick":"MEN 2A最常見的RET突變密碼為codon 634。","detail":{"background":"**MEN2A（甲狀腺髓質癌＋嗜鉻細胞瘤＋副甲狀腺腺瘤）最常見RET突變於codon 634**;**MEN2B多為RET codon 918（M918T）**;FMTC常見618/620等;CDKN1B與MEN4相關。","options":{"A":"正解。MEN2A最常見RET 634。","B":"RET 918為MEN2B。","C":"RET 618較見於FMTC。","D":"CDKN1B為MEN4。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114020-54":{"quick":"glucagon（升糖素）是升血糖荷爾蒙，不是降血糖用藥。","detail":{"background":"降血糖藥:metformin、glargine（長效胰島素）、degludec（超長效胰島素）皆降血糖。**glucagon（升糖素）用於『升高』血糖（治療嚴重低血糖），並非降血糖藥**。","options":{"A":"metformin為降血糖藥。","B":"glargine為長效胰島素。","C":"正解。glucagon為升血糖（非降血糖藥）。","D":"degludec為超長效胰島素。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114020-55":{"quick":"台灣肥胖腰圍切點為男≥90、女≥80公分（非男女皆90）；故敘述錯誤。","detail":{"background":"肥胖:與甲狀腺功能異常等內分泌疾病相關;**台灣腹部肥胖腰圍切點男≥90、女≥80 cm（非皆90）**;庫欣症候群有肥胖表現;第2型糖尿病與肥胖相關。故B錯誤。","options":{"A":"與甲狀腺功能異常相關，正確。","B":"正解（錯誤）。腰圍切點男90、女80（非皆90）。","C":"庫欣有肥胖表現，正確。","D":"第2型糖尿病與肥胖相關，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114020-56":{"quick":"DKA初始治療不應注射『每公斤1單位』regular insulin快速降血糖（劑量過大）；標準為約0.1 U/kg/hr連續輸注。","detail":{"background":"DKA治療:**先積極輸液（前1–3小時0.9%食鹽水2–3公升）→低劑量胰島素持續輸注（約0.1 U/kg/hr，±0.1 U/kg bolus）緩降血糖、補鉀（血鉀<3.3先補鉀再給胰島素）**;誘因常為感染。**1 U/kg快速注射劑量過大、易致低血糖與低血鉀**。故B錯誤。","options":{"A":"多發生於第1型，正確。","B":"正解（錯誤）。不應1 U/kg快速注射（應0.1 U/kg/hr輸注）。","C":"感染為常見誘因，正確。","D":"前1–3小時給2–3公升0.9%食鹽水，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114020-57":{"quick":"疑腎上腺危象（產後大出血史＝Sheehan、感染休克對輸液升壓無反應＋低鈉）→立即抽血送ACTH/cortisol後『不等結果即給hydrocortisone』。","detail":{"background":"腎上腺危象（本例40年前產後大出血＝Sheehan致垂體/腎上腺低下）為**內分泌急症**:**立即抽血（ACTH、cortisol）後不等報告即給壓力劑量hydrocortisone救命**，並輸液、抗生素、升壓。延遲給藥等檢驗或先做刺激試驗會致命。","options":{"A":"等報告才給會延誤致命。","B":"危急時不等8AM/4PM結果。","C":"正解。抽血後不等結果即給hydrocortisone。","D":"危急時不宜先做cosyntropin試驗再給藥。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114020-58":{"quick":"甲狀腺風暴引起心房顫動/心衰時，不建議使用amiodarone（含碘惡化甲亢）。","detail":{"background":"甲狀腺風暴用藥:**抗甲狀腺藥（PTU/methimazole，PTU另抑制周邊轉換）、β阻斷劑（propranolol）、hydrocortisone（抑周邊轉換、防腎上腺不足）、碘劑（飽和碘化鉀，於抗甲狀腺藥後給）**;**amiodarone含大量碘會惡化甲亢，不建議**。故D。","options":{"A":"PTU/methimazole為建議用藥。","B":"hydrocortisone為建議用藥。","C":"碘化鉀為建議用藥（抗甲狀腺藥後）。","D":"正解。amiodarone不建議（含碘惡化甲亢）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114020-66":{"quick":"以生理心理社會模式看，有精神疾病者較易發生代謝症候群。","detail":{"background":"代謝症候群（biopsychosocial）:**與基因遺傳『有』關（非無關）;有精神疾病者（憂鬱、思覺失調，及抗精神病藥）較易代謝症候群;社經地位『較低』者較易;胎兒營養失調/低出生體重者日後較『易』代謝症候群（節儉表型）**。故B正確。","options":{"A":"與基因遺傳有關（非無關）。","B":"正解。有精神疾病者較易代謝症候群。","C":"社經地位低者較易（非較不易）。","D":"低出生體重者較易（非較不易）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114020-70":{"quick":"依USPSTF，骨質疏鬆篩檢建議對65歲（含）以上婦女進行。","detail":{"background":"**USPSTF骨質疏鬆篩檢:建議對≥65歲女性以骨密度（DXA）篩檢;<65歲但骨折風險與65歲者相當的停經後女性亦建議**;對男性篩檢證據不足（未常規建議）。故A正確。","options":{"A":"正解。≥65歲婦女建議篩檢。","B":"非對所有≥50歲停經婦女皆建議（依風險）。","C":"男性篩檢證據不足。","D":"敘述非USPSTF重點。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114070-39":{"quick":"濾泡性甲狀腺癌通常為『單一病灶（unifocal）』，多病灶（multifocal）是乳突癌特徵；故敘述錯誤。","detail":{"background":"濾泡性甲狀腺癌:發生率下降（與加碘鹽相關）;**FNA無法區分濾泡腺瘤與濾泡癌（需手術看包膜/血管侵犯）;頸部淋巴轉移率低（以血行轉移肺骨為主）;多為單一病灶（unifocal）**。**乳突癌才常為multifocal**。故D錯誤。","options":{"A":"發生率下降與加碘相關，正確。","B":"FNA無法區分濾泡腺瘤/癌，正確。","C":"淋巴轉移率較低（血行為主），正確。","D":"正解（錯誤）。濾泡癌多為單一病灶，非multifocal。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114070-40":{"quick":"原發性副甲狀腺亢進的腺瘤定位，sestamibi掃描敏感度>80%（其餘敘述皆誤）。","detail":{"background":"原發性副甲狀腺亢進:**僅約<5%與MEN相關（非80%）;多為單一腺瘤（非四顆以上）;單一腫瘤中腺瘤遠多於腺癌（腺癌罕見，非1:3）;Tc99m-sestamibi對腺瘤定位敏感度>80%**。故D正確。","options":{"A":"與MEN相關僅少數（非80%）。","B":"多為單一腺瘤（非四顆以上）。","C":"腺瘤遠多於腺癌（非1:3）。","D":"正解。sestamibi敏感度>80%。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114070-41":{"quick":"胸內甲狀腺腫致上腔靜脈壓迫的徵象為Pemberton sign（舉手後顏面充血/發紺）。","detail":{"background":"**Pemberton徵:雙臂上舉一段時間後因胸廓入口處胸內甲狀腺腫壓迫上腔靜脈而出現顏面充血、發紺、頸靜脈怒張、呼吸困難**，提示胸骨後/胸內甲狀腺腫。Carnett（腹壁）、Kehr（脾/橫膈）、Phalen（腕隧道）為其他徵象。","options":{"A":"Carnett徵為腹壁來源痛。","B":"Kehr徵為左肩轉移痛。","C":"Phalen徵為腕隧道。","D":"正解。Pemberton sign。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114070-60":{"quick":"與腎性骨病（renal osteodystrophy）直接相關性最小的是『甲狀腺激素』；鈣、磷、維生素D才直接相關。","detail":{"background":"腎性骨病（慢性腎病-礦物質骨病變）直接相關:**鈣、磷、（活性）維生素D、PTH、FGF-23**之代謝紊亂。**甲狀腺激素與腎性骨病直接相關性最小**。","options":{"A":"鈣直接相關。","B":"磷直接相關。","C":"維生素D直接相關。","D":"正解。甲狀腺激素相關性最小。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114070-65":{"quick":">6公分的腎上腺瘤（即使無功能）不應僅『密集追蹤』；因惡性風險高應手術切除。","detail":{"background":"腎上腺瘤:大部分為影像偶然發現;最佳切除方式為腹腔鏡;**有功能者（即使<4cm）建議手術;無功能但體積大（>4–6cm）因腎上腺皮質癌風險高，應手術切除而非僅追蹤**。故A錯誤。","options":{"A":"正解（錯誤）。>6cm即使無功能應手術，非僅追蹤。","B":"腹腔鏡為最佳切除方式，正確。","C":"<4cm有功能者建議手術，正確。","D":"多為偶然發現，正確。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"114070-68":{"quick":"糖尿病膀胱病變（diabetic cystopathy）尿路動力學最典型發現為『膀胱感覺損傷』（感覺遲鈍、容量增大、殘尿增加）。","detail":{"background":"**糖尿病自主神經病變致膀胱病變:早期膀胱感覺損傷（感覺遲鈍）、容量增大、逼尿肌收縮力下降、排尿不全與殘尿增加**;非逼尿肌-括約肌共濟失調（多見於脊髓病變）。故D。","options":{"A":"逼尿肌-括約肌共濟失調多見脊髓病變。","B":"逼尿肌過動非糖尿病典型晚期。","C":"尿道括約肌障礙非典型。","D":"正解。膀胱感覺損傷為最典型。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"115020-02":{"quick":"可調節的骨鬆危險因子是『抽菸』（年老、女性、家族史不可調節）。","detail":{"background":"骨質疏鬆危險因子:**不可調節:年老、女性、種族、家族骨折史、早發停經;可調節:抽菸、過量飲酒、低鈣/維生素D、缺乏運動、低體重、長期類固醇**。故抽菸為可調節因子。","options":{"A":"年老不可調節。","B":"正解。抽菸為可調節危險因子。","C":"女性不可調節。","D":"家族骨折史不可調節。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"115020-52":{"quick":"希漢氏症候群（Sheehan's syndrome）的主要機制為產後大出血導致腦下垂體缺血性壞死。","detail":{"background":"**Sheehan症候群:產後嚴重出血/休克→懷孕期增大的腦下垂體（前葉）缺血性壞死→垂體前葉功能低下（泌乳失敗、無法泌乳、無月經、續發甲狀腺/腎上腺低下）**。","options":{"A":"非垂體腫瘤壓迫。","B":"正解。產後出血致垂體缺血性壞死。","C":"非高泌乳素抑制軸。","D":"非自體免疫攻擊（那是淋巴球性垂體炎）。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"115020-53":{"quick":"調控血漿抗利尿激素（AVP/ADH）的主要機制是血漿滲透壓。","detail":{"background":"**抗利尿激素（AVP/ADH）分泌主要由血漿滲透壓（下視丘滲透壓受器，最敏感、約285 mOsm起即調節）調控**，其次為有效循環容積/血壓（壓力受器，較大變化才作用）。與ACTH、甲狀腺素、血糖無直接調控關係。","options":{"A":"ACTH非AVP主要調控。","B":"正解。血漿滲透壓為主要調控。","C":"甲狀腺素非調控。","D":"血糖非直接調控AVP。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"115020-54":{"quick":"嗜鉻細胞瘤/副神經節瘤診斷敏感度最高且特異性佳的生化檢測是血漿游離metanephrines。","detail":{"background":"**嗜鉻細胞瘤/副神經節瘤生化篩檢首選為血漿游離metanephrines（或24小時尿分量metanephrines），敏感度最高**;腫瘤持續代謝兒茶酚胺為metanephrines故較catecholamines可靠。dexamethasone抑制與ACTH刺激試驗為腎上腺皮質檢查、非此用途。","options":{"A":"24小時尿catecholamines敏感度不及metanephrines。","B":"正解。血漿游離metanephrines。","C":"dexamethasone抑制試驗用於庫欣。","D":"ACTH刺激試驗用於腎上腺皮質功能。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"115020-55":{"quick":"龐貝氏症（Pompe disease）在台灣已列為新生兒篩檢，可藉定期酵素替代治療改善。","detail":{"background":"**龐貝氏症（Pompe disease，肝醣儲積症第II型）：體染色體隱性，酸性α-葡萄糖苷酶（GAA）缺乏致肝醣堆積於肌肉/心臟→肌肉無力、心臟肥大（嬰兒型）**;**台灣已納入新生兒篩檢，以酵素替代治療（ERT, alglucosidase alfa）改善**。故D正確。","options":{"A":"嬰兒型多嬰兒期發病（非成年）。","B":"為第II型（非第I型）。","C":"為GAA缺乏（非肝臟磷酸化酶激酶）。","D":"正解。已列新生兒篩檢、可酵素替代治療。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"115020-56":{"quick":"潛伏性成人自體免疫糖尿病（LADA）β細胞功能喪失速度較第1型『慢』（非快）；故敘述錯誤。","detail":{"background":"**LADA:成人發病、自體免疫（anti-GAD65陽性）、發病年齡較典型第1型晚;初期不須胰島素（仍有殘餘β細胞功能）、但β細胞功能喪失較典型第1型『緩慢』，數年後漸需胰島素**。故D（喪失速度較快）錯誤。","options":{"A":"初期不須胰島素，正確。","B":"發病較典型第1型晚，正確。","C":"anti-GAD65為主要抗體，正確。","D":"正解（錯誤）。β細胞功能喪失較第1型慢，非快。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"115020-57":{"quick":"原發性副甲狀腺亢進典型為高血鈣（骨鬆、腎結石、便秘）；『手麻與抽筋』（低血鈣表現）最不常見。","detail":{"background":"原發性副甲狀腺亢進（高血鈣）臨床:**骨質疏鬆/骨病變、反覆腎結石、便秘、多尿、疲倦、精神症狀（『stones, bones, abdominal groans, psychic moans』）**。**手麻與抽筋為『低血鈣』表現，與此高血鈣狀態不符，最不常見**。","options":{"A":"骨質疏鬆為典型。","B":"反覆腎結石為典型。","C":"便秘為典型（高血鈣）。","D":"正解。手麻抽筋（低血鈣）最不常見。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"115020-58":{"quick":"葛雷夫氏症的脛前黏液水腫為『非凹陷性（non-pitting）』，不是可壓凹陷的水腫；故敘述錯誤。","detail":{"background":"Graves病三特徵:**甲狀腺機能亢進、眼病變（凸眼）、瀰漫性甲狀腺腫**;另可見**脛前黏液水腫（pretibial myxedema，為『非凹陷性』水腫）**。故D（脛前可壓凹陷水腫）錯誤（應為非凹陷性）。","options":{"A":"甲狀腺機能亢進為特徵。","B":"眼病變為特徵。","C":"甲狀腺腫為特徵。","D":"正解（錯誤）。脛前黏液水腫為非凹陷性，非可壓凹陷。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}},"115020-67":{"quick":"SGLT2抑制劑有降低體重、不易低血糖的好處。","detail":{"background":"糖尿病:**SGLT2抑制劑（促尿糖排出）可減重、不易低血糖，並有心腎保護**;DPP-4抑制劑為體重中性（非降體重）;HbA1c目標應個別化（高齡/共病放寬，非一律<7）;台灣糖尿病盛行率遠高於5%。故D正確。","options":{"A":"台灣糖尿病盛行率遠高於5%。","B":"HbA1c目標應個別化，非一律<7。","C":"DPP-4抑制劑為體重中性（非降體重）。","D":"正解。SGLT2抑制劑降體重、不易低血糖。"},"sources":["Harrison 21e","Williams Textbook of Endocrinology 14e"]}}},TO=["糖尿病（診斷分型/口服藥/胰島素/血糖生理）", "糖尿病急症與低血糖（DKA/HHS/低血糖/胰島素瘤）", "糖尿病慢性併發症（腎/神經/視網膜/足/大血管）", "甲狀腺疾病", "副甲狀腺與鈣磷骨礦代謝", "腎上腺疾病", "腦下垂體與下視丘疾病", "骨質疏鬆與骨代謝", "血脂異常與脂蛋白代謝", "肥胖、代謝症候群與營養代謝", "性腺與生殖內分泌", "多發性內分泌腫瘤與神經內分泌瘤"],LEC={"甲狀腺疾病":{"title":"甲狀腺疾病","html":"<h4>一、甲狀腺機能亢進</h4>\n<ul>\n<li><b>Graves' disease</b>：心悸、怕熱、手抖、體重減輕、<b>突眼＋瀰漫性甲狀腺腫</b>；眼病變嚴重度與甲狀腺功能<b>不成正相關</b>；脛前黏液水腫＝<b>非凹陷性</b>。</li>\n<li>甲亢造成心律不整者<b>避免 amiodarone</b>（含碘惡化甲亢）；甲狀腺風暴併 AF/心衰也不建議 amiodarone。</li>\n<li><b>抗甲狀腺藥</b>：出現<b>發燒、喉嚨痛→先驗白血球（顆粒性白血球缺乏症）</b>；只有皮疹而白血球正常→抗組織胺＋換藥。</li>\n<li><b>甲狀腺毒性週期性麻痺</b>：突發四肢無力＋嚴重低血鉀（鉀移入細胞）＋TSH 低/T4 高；勿大量補鉀（反彈高鉀），先驗甲狀腺。</li>\n<li>甲狀腺癌、體重<b>增加</b>不是甲亢表現。</li>\n</ul>\n<h4>二、甲狀腺機能低下</h4>\n<p><b>橋本氏甲狀腺炎</b>：女性、瀰漫腫大、低回音、淋巴球浸潤、<b>anti-TPO/anti-Tg 陽性</b>；產後甲狀腺炎（怕冷、便秘、體重增加）查 <b>free T4、hsTSH</b>。原發性甲低＝<b>free T4 低、TSH 高</b>，不需做腦下垂體 MRI。懷孕期甲低治療需<b>更高</b>劑量。單測 TSH 無法鑑別腦下垂體（次發）疾病。</p>\n<h4>三、甲狀腺結節與癌</h4>\n<ul>\n<li>術前良惡性<b>黃金標準＝細針穿刺（FNA）</b>。惡性傾向：硬如石、聲帶麻痺、淋巴結、微鈣化、極年輕/年長/男性；<b>有壓痛最不傾向惡性</b>。</li>\n<li><b>乳突癌最常見</b>、可多病灶、FNA 診斷率高；<b>濾泡癌多單一病灶</b>。<b>髓質癌</b>源自<b>C 細胞（分泌 calcitonin）</b>，CEA 升、可屬 MEN2。</li>\n<li>分化型癌術後＋放射碘，追蹤復發指標＝<b>thyroglobulin</b>。胸內甲狀腺腫致 SVC 壓迫＝<b>Pemberton sign</b>。</li>\n</ul>\n<h4>★考點直擊</h4>\n<p>T3 活性>T4（T4 多為前驅物）。Sick euthyroid 最關鍵指標＝<b>reverse T3</b>。</p>"},"糖尿病（診斷分型/口服藥/胰島素/血糖生理）":{"title":"糖尿病（診斷、分型、口服藥、胰島素）","html":"<h4>一、分型與診斷</h4>\n<ul>\n<li><b>第1型</b>＝自體反應性 <b>T 淋巴球</b>攻擊 β 細胞、絕對缺乏、依賴胰島素防酮酸；<b>第2型</b>＝胰島素阻抗＋分泌不足，與<b>肥胖、家族史</b>相關（最常見）。打胰島素<b>不會把第2型變第1型</b>。<b>LADA</b> β 細胞喪失較第1型<b>慢</b>。</li>\n<li><b>診斷</b>：空腹 ≥126、OGTT 2 小時或隨機 <b>≥200</b>、HbA1c ≥6.5%。發病過程圖：血糖、胰島素分泌、胰島素敏感度三曲線；β 細胞代償失敗時發病。黑色棘皮＝胰島素阻抗。</li>\n</ul>\n<h4>二、口服藥（機轉與副作用，必考）</h4>\n<ul>\n<li><b>Metformin（雙胍）</b>：第一線、<b>不增體重</b>；副作用<b>乳酸血症、B12 缺乏</b>；急性失代償/低灌注避免。</li>\n<li><b>磺醯尿素/meglitinide（repaglinide）</b>：刺激 β 細胞分泌（KATP）、<b>最易低血糖</b>。</li>\n<li><b>TZD（rosiglitazone）</b>：增敏，可致水鈉滯留→<b>鬱血性心衰竭</b>。</li>\n<li><b>SGLT2 抑制劑（dapa-/empagliflozin）</b>：促尿糖排出、<b>降體重、不易低血糖</b>，護腎護心。</li>\n<li><b>DPP-4 抑制劑</b>：血糖依賴、<b>單用不易低血糖</b>。</li>\n</ul>\n<h4>三、胰島素與血糖目標</h4>\n<p><b>Basal-bolus</b>＝三餐前短/速效＋每日一次長效（基礎）。第1型須胰島素。<b>80 歲以上目標放寬</b>（HbA1c 不需<6.5%）。胰島素與升糖素皆由胰島分泌、彼此拮抗。</p>"},"腎上腺疾病":{"title":"腎上腺疾病","html":"<h4>一、嗜鉻細胞瘤（Pheochromocytoma）</h4>\n<ul>\n<li>陣發性<b>心悸、冒冷汗、頭痛、血壓飆高</b>；診斷最可靠＝<b>血漿游離 metanephrine</b>。</li>\n<li>CT 看不到→<b>MIBG 核醫</b>找腎上腺外/轉移。<b>Rule of 10</b>＝10% 雙側、腎上腺外、惡性、家族。</li>\n<li><b>治療：先 α 阻斷劑（7–10 天）＋補水</b>，再視情況加 β 阻斷劑（不可先 β）。</li>\n</ul>\n<h4>二、原發性醛固酮症（Conn）</h4>\n<p><b>高血壓＋低血鉀＋代謝性鹼中毒＋低腎素、高醛固酮（ARR 升）</b>；是內分泌性次發高血壓<b>最常見</b>者。難控高血壓＋低血鉀要想。低腎素<b>低</b>醛固酮（hyporeninemic hypoaldosteronism）＝<b>高血鉀＋酸中毒（第4型 RTA）</b>，低鈉伴體液不足用 0.9% NS。</p>\n<h4>三、庫欣氏症候群（Cushing）</h4>\n<ul>\n<li>月亮臉、水牛肩、中心肥胖、皮膚薄/紫紋、<b>近端肌病</b>。最常見原因＝<b>外因性類固醇</b>。</li>\n<li>篩檢＝<b>低劑量 dexamethasone 不抑制</b>、24 小時尿游離皮質醇、午夜唾液皮質醇（<b>隨機測 ACTH/cortisol 最不適當</b>，有日節律）。</li>\n<li><b>定位</b>：庫欣『病』（腦下垂體 ACTH 瘤）對高劑量（8 mg）<b>會抑制</b>；ACTH 極低＝<b>腎上腺源（ACTH 非依賴）</b>→腎上腺 CT。糖皮質素<b>不會高血鈣</b>。</li>\n</ul>\n<h4>四、腎上腺功能低下與危象</h4>\n<p>倦怠、膚色變黑、體重減輕、<b>低血鈉±輕度高血鉀/高血鈣</b>→查 ACTH、cortisol。<b>多腺體自體免疫</b>（甲低＋腎上腺低）須<b>先補類固醇再補甲狀腺素</b>。<b>腎上腺危象</b>（產後大出血 Sheehan、長期類固醇停藥、感染休克對輸液無反應）→抽血後<b>不等報告即給 hydrocortisone</b>。CAH（21-OH 缺乏）＝皮質醇減少、ACTH/17-OH 黃體素升。腎上腺瘤 <b>>6 cm 應手術</b>（惡性風險）。</p>"},"腦下垂體與下視丘疾病":{"title":"腦下垂體與下視丘疾病","html":"<h4>一、尿崩症 vs SIADH（高頻）</h4>\n<ul>\n<li><b>中樞性 DI</b>：多尿、高血鈉、尿稀；<b>給 DDAVP 後尿滲透壓明顯上升</b>。</li>\n<li><b>腎性 DI</b>：DDAVP 後仍<b>不上升</b>；用 <b>thiazide</b>。</li>\n<li><b>SIADH</b>：低血鈉、等容、尿不當濃縮（常見小細胞肺癌）；治療測尿滲透壓＋限水（症狀性給 NS/高張）；<b>太快校正→滲透性大腦去髓鞘</b>。<b>Vaptans 用於低鈉、不用於尿崩</b>。溶質性利尿＝尿滲透壓偏高。AVP 主要由<b>血漿滲透壓</b>調控。</li>\n</ul>\n<h4>二、功能性腫瘤</h4>\n<ul>\n<li><b>泌乳素瘤</b>：對<b>多巴胺促效劑</b>反應最好（降泌乳素、縮腫瘤）；<b>sulpiride（多巴胺拮抗劑）會升泌乳素</b>是錯誤治療。</li>\n<li><b>肢端肥大症（GH 瘤）</b>：腕隧道、下巴突出、牙縫變大；診斷＝<b>口服葡萄糖抑制試驗（GH 不被抑制）＋IGF-1</b>；治療首選<b>經蝶鞍手術</b>。</li>\n</ul>\n<h4>三、垂體功能低下</h4>\n<ul>\n<li><b>垂體中風（apoplexy）</b>：已知腫瘤＋突發劇烈頭痛、嘔吐、視力模糊、多軸功能低下。</li>\n<li><b>放射治療後最早/最常異常＝GH</b>；鼻咽癌放療多年後倦怠/體毛減少→查 ACTH、cortisol。</li>\n<li><b>Sheehan</b>＝產後大出血致垂體缺血壞死。後葉破壞→<b>尿崩</b>。<b>空蝶鞍</b>若功能正常＝reassurance。淋巴球性垂體炎＝垂體腫大（非空蝶鞍）。</li>\n</ul>"},"肥胖、代謝症候群與營養代謝":{"title":"肥胖、代謝症候群與營養代謝","html":"<h4>一、肥胖定義（台灣標準）</h4>\n<p><b>台灣肥胖＝BMI≥27</b>（過重 24–27）；<b>腰圍男≥90、女≥80</b>。BMI 越小越瘦。<b>瘦素（leptin）由脂肪組織</b>分泌。肥胖增<b>退化性關節炎</b>等併發症；減重手術<b>可降重度肥胖死亡率</b>。合理初期減重目標約 <b>5–10%</b>。</p>\n<h4>二、代謝症候群（國健署 / NCEP ATP III）</h4>\n<ul>\n<li>五項（≥3 即診斷）：<b>腰圍（男≥90 女≥80）、血壓≥130/85、空腹血糖≥100、TG≥150、HDL（男<40 女<50）</b>。<b>中央肥胖非必要條件</b>（任 3 項即可）。</li>\n<li><b>不含 LDL-C、不含高尿酸</b>。與胰島素阻抗相關，<b>small dense LDL 增加、adiponectin 下降、HDL 低</b>。有精神疾病者較易發生。</li>\n</ul>\n<h4>三、營養代謝</h4>\n<p>減重熱量估算：每少 <b>7700 大卡≈1 kg</b>（每日少 500 大卡×42 天≈3 kg）。甲亢體重下降但<b>食慾增加</b>。<b>龐貝氏症（Pompe）</b>已列新生兒篩檢、酵素替代治療。</p>"},"副甲狀腺與鈣磷骨礦代謝":{"title":"副甲狀腺與鈣磷骨礦代謝","html":"<h4>一、原發性副甲狀腺亢進</h4>\n<p>典型＝<b>高血鈣＋低血磷、iPTH 升</b>；表現＝骨鬆、腎結石、便秘（<b>手麻抽筋是低血鈣，最不常見</b>）。腺瘤定位＝<b>Tc99m-sestamibi（敏感度>80%）</b>。</p>\n<h4>二、低血鈣</h4>\n<ul>\n<li>原因：<b>急性胰臟炎（脂肪皂化耗鈣）</b>、甲狀腺/副甲狀腺術後、維生素 D 缺乏。<b>thiazide 較不會低血鈣</b>（反升鈣）。</li>\n<li>體徵：<b>Chvostek（拍面神經顏面肌收縮）、Trousseau（壓臂帶誘發手腕抽筋）</b>。甲狀腺全切後低血鈣＝<b>QT 延長</b>。維生素 D 不足驗 <b>25(OH)D</b>。</li>\n</ul>\n<h4>三、高血鈣急症</h4>\n<p>治療＝<b>生理食鹽水水化＋bisphosphonate/calcitonin</b>；嚴重時<b>血液透析有效</b>（低鈣透析液）；<b>禁 thiazide</b>（升鈣）。惡性高血鈣最常因<b>PTHrP</b>。</p>\n<h4>四、續發性副甲狀腺亢進與腎性骨病</h4>\n<p>病因＝<b>低血鈣、高血磷、活性維生素 D 減少</b>（<b>不會高血鈣</b>）。腎性骨病與鈣、磷、維生素 D 直接相關，<b>與甲狀腺激素相關性最小</b>。</p>"},"糖尿病慢性併發症（腎/神經/視網膜/足/大血管）":{"title":"糖尿病慢性併發症（腎、神經、視網膜、足、大血管）","html":"<h4>一、腎病變</h4>\n<p>第2型最早期＝<b>腎絲球過濾率上升（hyperfiltration，GFR>120）</b>，接著<b>微量白蛋白尿（最佳早期篩檢）</b>；新診斷第2型可能已有（隱匿多年）；早期<b>Cr 不會上升</b>。延緩進展 HbA1c <b><7.0%</b>，首選 ACEi/ARB。第一型最早微血管病變＝<b>視網膜病變</b>。</p>\n<h4>二、神經與足病變</h4>\n<p>單一足下垂（無法背屈）→<b>神經傳導檢查</b>。<b>糖尿病足潰瘍感染多為混合菌、革蘭氏陽性（金黃葡萄球菌/鏈球菌）</b>常見（非 Klebsiella）；可<b>衛教與足部照護預防</b>。糖尿病膀胱病變＝<b>膀胱感覺損傷</b>（容量大、殘尿多）。</p>\n<h4>三、大血管疾病</h4>\n<p>糖尿病屬高心血管風險，膽固醇與血壓控制<b>更積極</b>（血壓多 <130/80）。穩定心衰/MI 仍可用 metformin（避急性失代償/低灌注）。共照網：<b>HbA1c 每 3 個月、眼底每年</b>；周邊動脈硬化檢查<b>非</b>每年常規。</p>"},"血脂異常與脂蛋白代謝":{"title":"血脂異常與脂蛋白代謝","html":"<h4>一、脂蛋白代謝</h4>\n<ul>\n<li>代謝流程：<b>chylomicron（外源）→VLDL→LDL</b>；LDL 主要載脂蛋白＝<b>ApoB-100</b>。</li>\n<li>分解血中 TG 的酵素＝<b>脂蛋白脂解酶（LPL）</b>（非 HSL）。<b>statin 抑制 HMG-CoA 還原酶（reductase）</b>。<b>PCSK9 失功能→降 LDL（保護）</b>。</li>\n</ul>\n<h4>二、Friedewald 公式</h4>\n<p><b>LDL ＝ TC − HDL − TG/5</b>（TG<400 適用）。例：TC 287、HDL 90、TG 175 → LDL＝287−90−35＝<b>162</b>。</p>\n<h4>三、臨床</h4>\n<ul>\n<li><b>LPL 缺乏</b>＝極高 TG、發疹性黃色瘤、胰臟炎（<b>不典型動脈硬化</b>）。發疹性黃色瘤與<b>高 TG</b> 相關。</li>\n<li>TG 偏高<b>與心臟病有關</b>。fibrate 與 statin 可謹慎併用（注意橫紋肌溶解）；fibrate <b>增加</b>膽固醇結石。</li>\n<li>中度風險、LDL 150 而其他正常者，先<b>生活型態改善</b>，暫不立即 statin。</li>\n</ul>"},"糖尿病急症與低血糖（DKA/HHS/低血糖/胰島素瘤）":{"title":"糖尿病急症與低血糖（DKA／HHS／低血糖）","html":"<h4>一、DKA</h4>\n<p>第1型多見、<b>高 AG 代謝性酸中毒</b>、<b>Kussmaul 深快呼吸</b>、酮體。初始治療＝輸液＋<b>regular insulin 約 0.1 U/kg/hr 連續輸注</b>（不可每公斤 1 單位快速降）。</p>\n<h4>二、HHS</h4>\n<p>血糖 <b>>600＋血漿滲透壓 >320</b>、無明顯酮酸、Kussmaul 少見。<b>血鈉受高血糖影響，不能直接當體液缺損指標</b>（需校正鈉）。</p>\n<h4>三、低血糖</h4>\n<ul>\n<li>血糖下降<b>最先＝胰島素分泌減少</b>（再 glucagon、腎上腺素）。正常空腹血糖下限約 <b>70</b>。</li>\n<li><b>最常見原因＝降血糖藥物</b>（磺醯尿素），<b>胰島素瘤不是最常見</b>（Whipple 三聯）。DPP-4 單用<b>不易</b>低血糖。</li>\n</ul>"},"多發性內分泌腫瘤與神經內分泌瘤":{"title":"多發性內分泌腫瘤（MEN）與神經內分泌瘤（NET）","html":"<h4>一、神經內分泌瘤（NET）</h4>\n<p>免疫標記＝<b>chromogranin A、synaptophysin、NSE</b>（<b>CD7 不是</b>）。可為 MEN 一部分。實體腫瘤高血鈣最常因<b>PTHrP</b>（非甲狀腺素）。</p>\n<h4>二、MEN 症候群</h4>\n<ul>\n<li><b>MEN1（menin 基因，AD）</b>：3P＝<b>副甲狀腺、胰臟（胰島素瘤/胃泌素瘤）、腦下垂體</b>。低血糖＋高血鈣（胰島素瘤＋副甲狀腺瘤）＝MEN1，<b>甲狀腺髓質癌不屬之</b>。</li>\n<li><b>MEN2（RET 基因）</b>：共同＝<b>甲狀腺髓質癌＋嗜鉻細胞瘤</b>；<b>2A 有副甲狀腺瘤、2B 無</b>（2B＝黏膜神經瘤、Marfan 樣）。髓質癌＋嗜鉻＝MEN2，做 <b>RET 檢查（病人與子女）</b>；2A 最常見突變 <b>codon 634</b>。</li>\n</ul>"},"骨質疏鬆與骨代謝":{"title":"骨質疏鬆與骨代謝","html":"<h4>一、診斷與篩檢</h4>\n<p><b>DEXA T 值 ≤ −2.5</b> 診斷骨質疏鬆。<b>USPSTF：≥65 歲婦女</b>篩檢。</p>\n<h4>二、危險因子</h4>\n<ul>\n<li><b>次發病因</b>：<b>甲狀腺亢進（增骨轉換）、庫欣、性腺低下、第1型糖尿病、早發更年期</b>；<b>副甲狀腺功能不足、高醛固酮症較不會</b>。</li>\n<li>第2型糖尿病相對第1型骨密度<b>較高</b>（但骨折風險仍可能增）。<b>可調節危險因子＝抽菸</b>（年老/女性/家族史不可調節）。</li>\n</ul>\n<h4>三、治療</h4>\n<p>抗骨吸收劑（bisphosphonate 等）目的是<b>預防骨折</b>，非緩解急性疼痛。</p>"},"性腺與生殖內分泌":{"title":"性腺與生殖內分泌","html":"<h4>一、男性性腺低下</h4>\n<ul>\n<li><b>Kallmann 症候群</b>：類無睪症體態（<b>臂展>身高</b>）、陰莖短小、無陰毛、<b>嗅覺不佳</b>、睪丸小而軟；<b>LH/estradiol 極低（低促性腺素性腺低下）</b>；骨鬆首選補雌激素/睪固酮。</li>\n<li>青春期不發育→測 <b>FSH、LH、testosterone</b> 分辨原發/次發。男性倦怠、性慾減退、陽痿＋FSH/LH/T 皆低→測<b>泌乳素</b>。</li>\n<li>老年男性雄性激素較高者罹糖尿病機率<b>較低</b>。</li>\n</ul>\n<h4>二、女性</h4>\n<p><b>PCOS</b> 篩檢評估<b>高雄性素與排卵異常（testosterone、LH/FSH）</b>，非測 estradiol/progesterone。<b>停經後 FSH 升高</b>（雌二醇偏低）。</p>"}};
const $=s=>document.querySelector(s);
let view='year',expand=false;
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}

const PKEY='med_endo_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
