於 encephalomyelitis 病患的血清或腦脊髓液中檢測出","C":"一旦確診PND 導因於免疫相關機制時，使用intravenous immunoglobulin 或plasma exchange 治療，可以 得到很好的治療成效","D":"PND 的神經學症狀多出現於癌症診斷之後，其症狀大多緩慢地出現與進展"},"answer":"B","corrected":false,"correction_note":"","id":"115020-41","topic":"神經腫瘤與副腫瘤神經症候群","accepted_answers":["B"],"answer_status":"正常","q_num":41,"src":"民國115年第一次","img":""},{"exam_code":"115020","roc_year":115,"ad_year":2026,"exam_round":"第一次","num":78,"stem":"下列何者不是腦中風病人接受r-tPA 治療的排除條件？","options":{"A":"血糖65 mg/dL","B":"血壓200/120 mmHg 3","C":"血小板85,000/mm","D":"電腦斷層顯示多葉低密度影像＞1/3 大腦半球"},"answer":"A","corrected":false,"correction_note":"","id":"115020-78","topic":"腦血管疾病與頭痛（缺血/出血性中風・SAH・moyamoya・tPA・偏頭痛）","accepted_answers":["A"],"answer_status":"正常","q_num":78,"src":"民國115年第一次","img":""}],E={"107020-77":{"quick":"『此生最劇烈』之突發頭痛、痛醒、瀕暈→蜘蛛膜下腔出血（SAH）。","detail":{"background":"**蜘蛛膜下腔出血（SAH，多為腦動脈瘤破裂）典型為『此生最劇烈、瞬間爆發的雷擊頭痛（thunderclap headache）』**，常伴頸僵、噁吐、意識變化，高血壓為危險因子。診斷首選『非顯影腦部CT』，陰性而高度懷疑時做腰椎穿刺（黃變xanthochromia）。顳動脈炎為亞急性老人頭痛；腦炎／腦膜炎多伴發燒。故B。","options":{"A":"顳動脈炎為亞急性、老人。","B":"正解。蜘蛛膜下腔出血。","C":"腦炎多伴發燒、意識改變漸進。","D":"腦膜炎多伴發燒頸僵但非瞬間雷擊痛。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"108080-74":{"quick":"酗酒、突發構音不清＋吞嚥困難、CT影像→腦幹出血。","detail":{"background":"**腦幹（橋腦）出血**：突發構音障礙、吞嚥困難、複視、四肢無力、意識改變、針尖瞳孔，高血壓為主因；CT見腦幹高密度血塊。小腦梗塞／出血以眩暈、共濟失調、後枕痛表現。本例CT顯示腦幹出血。故D。","options":{"A":"小腦梗塞為低密度。","B":"小腦出血位於小腦。","C":"腦幹梗塞為低密度，非出血影像。","D":"正解。腦幹出血。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"111020-50":{"quick":"突發無法忍受頭痛＋頸僵嘔吐＋喪失意識→顱內動脈瘤破裂（SAH）。","detail":{"background":"**顱內動脈瘤破裂致蜘蛛膜下腔出血**：突發『雷擊性』劇烈頭痛、頸部僵硬、噁吐、可迅速喪失意識。腦膜炎多前驅發燒；梗塞性中風為局部神經缺損非雷擊頭痛；偏頭痛為反覆、漸進、不致喪失意識。故C。","options":{"A":"腦膜炎多前驅發燒。","B":"梗塞性中風為局部缺損。","C":"正解。顱內動脈瘤破裂（SAH）。","D":"偏頭痛不致喪失意識。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"114070-10":{"quick":"頭部外傷腦CT判讀：硬膜上與硬膜下／腦挫傷出血之來源與處置（A敘述左右標示錯誤）。","detail":{"background":"**硬膜上血腫（epidural hematoma）多因『顱骨骨折致中腦膜動脈（middle meningeal artery）破裂』，CT呈『凸透鏡（lens/biconvex）』狀**；**腦挫傷出血（contusion）來自腦實質血管**；瞳孔放大（鉤回疝脫）為開顱減壓指徵。本題A將左右腦之血腫類型／來源標示對應錯誤（與B、C所述來源相矛盾），為錯誤敘述。故A。","options":{"A":"正解（錯誤）。左右腦血腫類型／來源標示與後述矛盾。","B":"硬膜上血腫多源於中腦膜動脈破裂，正確。","C":"腦挫傷出血源於腦實質血管，正確。","D":"瞳孔放大應開顱減壓，正確。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"114070-14":{"quick":"毛毛樣血管病主要侵犯『前循環（遠端ICA/MCA/ACA）』；C稱MCA與PCA狹窄，錯誤。","detail":{"background":"**毛毛樣血管病（moyamoya disease）**：**遠端內頸動脈（ICA）及其分支（前大腦ACA、中大腦MCA）進行性狹窄閉塞，基底側支血管增生呈『煙霧（moyamoya）』狀**；亞洲人多、常雙側；**兒童多以缺血表現、成人可出血**。故C（稱MCA與『後大腦動脈PCA』狹窄）描述不符——主要為前循環，後循環相對較少受侵。","options":{"A":"亞洲人較多，正確。","B":"多雙側血管，正確。","C":"正解（錯誤）。主要侵犯前循環(ICA/MCA/ACA)，非PCA。","D":"兒童多以缺血表現，正確。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"115020-78":{"quick":"血糖65 mg/dL『不是』腦中風r-tPA排除條件；A。","detail":{"background":"**急性缺血性腦中風靜脈血栓溶解（r-tPA）禁忌／排除條件**：近期顱內出血或大面積梗塞（CT低密度>1/3大腦半球）、血壓>185/110未控制、血小板<10萬、**血糖<50 mg/dL（或極高）**、近期手術／出血等。**血糖65 mg/dL在正常範圍，並非排除條件**。故A。","options":{"A":"正解。血糖65 mg/dL非排除條件。","B":"血壓200/120（>185/110）為排除（需先降壓）。","C":"血小板<10萬為排除。","D":"CT低密度>1/3大腦半球為排除。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"112020-02":{"quick":"偏頭痛常為單側、抽痛，伴噁吐或畏光；B正確。","detail":{"background":"**頭痛**：**原發性頭痛（無器質病因）最常見為『緊張型頭痛』與偏頭痛（非腦瘤）**；**偏頭痛典型為單側、搏動性（抽痛）、中重度，伴噁心嘔吐、畏光畏聲，可有前兆（aura）**；續發性頭痛病因眾多（外傷、感染、出血等）；**新發之劇烈頭痛（雷擊痛、伴神經缺損、發燒）為紅旗，不可僅給止痛**。故B正確。","options":{"A":"原發性頭痛非以腦瘤為最常見，錯誤。","B":"正解。偏頭痛常單側抽痛伴噁吐畏光。","C":"續發性頭痛病因多元，非僅血管異常，錯誤。","D":"新發劇烈頭痛須查紅旗，不可僅止痛，錯誤。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"104030-71":{"quick":"依Mini-Cog（畫鐘＋三項回憶）判讀，此病人有失智症；C。","detail":{"background":"**認知篩檢**：**Mini-Cog＝三項物品回憶＋畫鐘測試（CDT），簡短且不受教育程度影響大**——回憶3項僅對1項＋畫鐘異常→陽性，提示失智。**MMSE受教育程度影響（未受教育者切點需下修），不能單以18分逕判失智**；失智為臨床診斷，不必先做CT才能判讀；本例已符失智表現非僅輕度認知障礙。故C。","options":{"A":"MMSE受教育影響，不可單以分數判，錯誤。","B":"臨床已可判讀，不必先CT，錯誤。","C":"正解。依Mini-Cog判讀有失智症。","D":"已達失智，非僅輕度認知異常，錯誤。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"106080-02":{"quick":"血管性失智症可源於多次中風或大腦白質病變；B正確。","detail":{"background":"**失智症**：**最常見為阿茲海默症（非血管性）**；**血管性失智症為次常見，源於『多次中風（多發梗塞）或大腦白質小血管病變』，常呈階梯式退化**；初期失智未必都以記憶喪失起始（如額顳葉型以行為／語言起始）；行為精神症狀（BPSD）應『先非藥物／行為介入』，抗精神病藥僅在必要且謹慎使用。故B正確。","options":{"A":"最常見為阿茲海默症，非血管性，錯誤。","B":"正解。血管性失智源於多次中風或白質病變。","C":"初期失智未必都以記憶喪失起始，錯誤。","D":"行為症狀應先行為治療，非一律抗精神病藥，錯誤。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"109020-02":{"quick":"失智症是譫妄最主要的前置因子（predisposing factor）；B。","detail":{"background":"**譫妄（delirium）**：急性發作、注意力障礙、意識波動。**最重要『前置因子』為失智（dementia）與高齡**；誘發因子含感染、藥物、電解質、缺氧等。**鴉片類與抗膽鹼劑會『誘發／惡化』譫妄（非減少）**；**身體約束與benzodiazepine會惡化譫妄（除酒精／BZD戒斷外，非首選治療）**；住院老人譫妄發生率遠高於1–5%。故B。","options":{"A":"住院老人譫妄發生率遠高於1–5%，錯誤。","B":"正解。失智為譫妄最主要前置因子。","C":"鴉片/抗膽鹼劑會誘發譫妄，錯誤。","D":"約束與BZD會惡化譫妄，非建議治療，錯誤。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"110020-68":{"quick":"術前老年醫學會診可降低術後譫妄發生率；D正確。","detail":{"background":"**老年譫妄**：為『急性』發作、病程『波動』（非慢性）；可為過動型、低動型或混合型（**低動型安靜易被忽略，並非都躁動**）；**目前無FDA核准專治譫妄之藥物**（處置以找出並矯正誘因、非藥物措施為主）；**術前老年醫學整合會診（含預防bundle）可降低術後譫妄發生率**。故D正確。","options":{"A":"譫妄為急性發作，非慢性，錯誤。","B":"低動型可很安靜，非都躁動，錯誤。","C":"無FDA核准專治藥物，錯誤。","D":"正解。術前老醫會診可降低術後譫妄。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"114020-67":{"quick":"譫妄評估可用混亂評估方法（CAM）；D正確。","detail":{"background":"**譫妄（delirium）**：『急性發作、病程波動』（非慢性穩定）；**致病機轉多重、病因常多重（非單純）**；**抗精神病藥僅控制精神行為症狀，『不治療潛在病因』**（須矯正誘因）；**標準評估工具為『混亂評估方法（Confusion Assessment Method, CAM）』**。故D正確。","options":{"A":"為急性波動，非慢性，錯誤。","B":"病因常多重，非單純，錯誤。","C":"抗精神病藥不治潛在病因，錯誤。","D":"正解。可用CAM評估。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"113020-67":{"quick":"全臺各縣市皆設失智共同照護中心提供服務；C正確。","detail":{"background":"**失智症**：**最常見為阿茲海默症（非血管性）**；**最常見『可回復』之類失智病因為憂鬱（假性失智）、甲狀腺功能低下、B12缺乏、常壓性水腦等（非焦慮症）**；**台灣各縣市皆設『失智共同照護中心』與據點提供服務**；血管性失智除控制危險因子外，AChEI／memantine仍可能有部分助益。故C正確。","options":{"A":"最常見為阿茲海默症，錯誤。","B":"可回復病因為憂鬱/甲低/B12等，非焦慮症，錯誤。","C":"正解。各縣市設失智共照中心。","D":"血管性失智AChEI可能有部分助益，錯誤。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"104090-54":{"quick":"顱內壓上升為『心跳變慢（Cushing反射）』，非變快；C錯誤。","detail":{"background":"**顱內壓上升徵象**：意識變差、瞳孔擴大且對光反應變差（鉤回疝壓迫動眼神經）、**Cushing三徵＝『高血壓＋心搏過緩（bradycardia）＋呼吸不規則』**。故C（心跳變快）錯誤——應為心跳變慢。","options":{"A":"神智變差為ICP上升徵象，正確。","B":"瞳孔擴大反應差，正確。","C":"正解（錯誤）。應為心跳變慢（Cushing反射），非變快。","D":"血壓上升（Cushing反射），正確。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"104030-77":{"quick":"年輕輕度頭部外傷、GCS15、症狀已恢復、無神經異常→最不需立即腦影像；A。","detail":{"background":"**頭部影像（CT）紅旗適應症**：局部神經缺損、新發頭痛合併發燒嘔吐（尤免疫低下）、突發劇烈頭痛合併嚴重嘔吐（疑SAH）、意識改變、GCS下降等。**年輕、輕微跌坐撞頭、GCS 15、到院已恢復、無神經學異常者風險低→最不需立即影像**（可觀察）。故A。","options":{"A":"正解（最不需）。年輕輕傷GCS15已恢復。","B":"HIV者新發頭痛合併發燒嘔吐須影像。","C":"新發頭痛合併局部神經異常須影像。","D":"突發劇烈頭痛合併嚴重嘔吐(疑SAH)須影像。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"104030-78":{"quick":"昏迷＋針尖瞳孔（疑鴉片）之診斷性治療，最不適當為physostigmine。","detail":{"background":"**昏迷＋『針尖瞳孔（pinpoint pupils）』高度提示鴉片類中毒（或橋腦病變）**；診斷性／經驗性給藥常用：**naloxone（鴉片解毒）、葡萄糖、thiamine**；BZD過量可試flumazenil（須謹慎，癲癇風險）。**physostigmine為抗膽鹼中毒解毒劑，與此情境（鴉片）不符且有風險→最不適當**。故D。","options":{"A":"Atropine用於有機磷/緩脈，本情境非首選但…","B":"Naloxone對鴉片昏迷適當。","C":"Flumazenil用於BZD過量。","D":"正解（最不適當）。physostigmine用於抗膽鹼中毒，非此情境。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"105020-20":{"quick":"能依指令睜閉眼（遵從指令）之運動反應，GCS motor為6分。","detail":{"background":"**Glasgow昏迷指數運動反應（M，1–6分）**：6遵從指令、5可定位疼痛、4疼痛回縮、3異常屈曲、2伸直、1無反應。**本例四肢癱瘓肌力0但『能依指令睜眼閉眼』，代表能理解並遵從指令→運動反應評為最高6分**（為閉鎖症候群locked-in之概念，意識清醒）。故D。","options":{"A":"0非GCS分數範圍。","B":"1為無反應。","C":"5為定位疼痛。","D":"正解。遵從指令＝6分。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"111080-50":{"quick":"老人意識不清的原因中，『低血脂』最不可能；C。","detail":{"background":"**老人急性意識不清（譫妄）常見可矯正病因**：**低血糖、中風、感染、低血壓／低灌流、缺氧、電解質異常、藥物**等。**『低血脂（hypolipidemia）』不會造成意識不清**，故最不可能。臨床遇老人意識改變應快速驗血糖、評估中風與循環。故C。","options":{"A":"低血糖可致意識不清。","B":"中風可致意識不清。","C":"正解（最不可能）。低血脂。","D":"低血壓低灌流可致意識不清。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"102030-55":{"quick":"甲醇中毒『不會』在十分鐘內昏迷（有潛伏期）；D最不可能。","detail":{"background":"**極快速致昏迷之毒物**：**氰化物（cyanide）、硫化氫（H₂S）阻斷細胞色素氧化酶→數秒至數分鐘昏迷**；有機磷可致快速膽鹼能危象與意識改變。**甲醇（methanol）中毒有『數小時至1天潛伏期』（代謝為甲酸後才致酸中毒、視力受損、意識變化），不會10分鐘內深度昏迷**。故D。","options":{"A":"氰化物秒～分鐘昏迷。","B":"硫化氫極速昏迷。","C":"有機磷可快速意識改變。","D":"正解（最不可能）。甲醇有潛伏期。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"104090-17":{"quick":"中樞性眩暈程度通常較溫和、周邊性較強烈；A正確。","detail":{"background":"**周邊 vs 中樞性眩暈**：**周邊性（如BPPV、前庭神經炎、梅尼爾）眩暈『強烈』、常伴耳鳴／聽損、眼振為水平旋轉型且可被『凝視固定（visual fixation）』抑制**；**中樞性（腦幹／小腦）眩暈『較溫和』但伴其他神經缺損、眼振可為『垂直型』且不被凝視抑制**。故A正確（中樞較溫和、周邊較強烈）。","options":{"A":"正解。中樞較溫和、周邊較強烈。","B":"凝視固定抑制的是『周邊性』，敘述相反，錯誤。","C":"耳鳴/失聰多見於『周邊性』，錯誤。","D":"垂直眼振見於『中樞性』，敘述相反，錯誤。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"102110-39":{"quick":"鈣離子通道阻斷劑會使Lambert-Eaton肌無力症候群惡化。","detail":{"background":"**Lambert-Eaton肌無力症候群（LEMS）為『突觸前』電壓門控『鈣離子』通道（VGCC）自體抗體，致乙醯膽鹼釋放不足**（常為小細胞肺癌之副腫瘤），特徵『運動後肌力短暫改善』、自律神經症狀。**『鈣離子通道阻斷劑』會進一步減少鈣內流→惡化LEMS**；氨基糖苷類、鎂劑亦會惡化神經肌肉傳遞。故C。","options":{"A":"利尿劑非直接惡化LEMS。","B":"氣管擴張劑非惡化LEMS。","C":"正解。鈣離子通道阻斷劑惡化LEMS。","D":"抗組織胺非主要惡化因子。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"110020-45":{"quick":"重症肌無力危象為『換氣幫浦衰竭（高碳酸性）』，非急性缺氧性呼吸衰竭；A錯誤。","detail":{"background":"**重症肌無力（MG）危象**：感染等誘發致呼吸肌無力→**『幫浦衰竭（pump failure）』致換氣不足、PaCO₂上升（第二型／高碳酸性呼吸衰竭）**，本例PaCO₂ 70、PaO₂ 55、pH<7.30。需呼吸器支持、找誘因、IVIG／血漿置換。故A（稱『急性缺氧性』呼吸衰竭）錯誤——應為高碳酸性（換氣衰竭）。","options":{"A":"正解（錯誤）。為高碳酸性換氣衰竭，非缺氧性。","B":"因呼吸肌幫浦衰竭，正確。","C":"須呼吸器協助，正確。","D":"pH<7.30，正確。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"107020-61":{"quick":"肉毒桿菌毒素中毒『意識清楚』，神智不清最不可能。","detail":{"background":"**肉毒桿菌毒素（botulism）阻斷周邊膽鹼性神經末梢之乙醯膽鹼釋放→對稱性、下行性弛緩麻痺**：複視、眼瞼下垂、構音／吞嚥困難、呼吸肌無力、自律症狀。**毒素『不通過血腦障壁』，故意識保持清醒（神智不清最不可能）**。故D。","options":{"A":"複視為常見。","B":"吞嚥困難為常見。","C":"呼吸困難（呼吸肌無力）為常見。","D":"正解（最不可能）。意識清醒，無神智不清。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"101030-27":{"quick":"近端肌無力＋CK極高（發炎性肌病），最不具診斷價值為四肢神經傳導速度。","detail":{"background":"**對稱性『近端』肌無力＋CK顯著上升＋感覺正常→發炎性肌病（多發性肌炎／皮肌炎）**。診斷利器：**肌電圖（肌源性變化）、肌肉切片（發炎浸潤）、肌炎特異抗體（如anti-Jo-1/抗合成酶）**。**『神經傳導速度』檢查的是周邊神經，肌肉疾病時通常正常→最不具診斷價值**。故D。","options":{"A":"肌電圖有診斷價值。","B":"anti-Jo-1抗體有價值。","C":"肌肉切片有價值。","D":"正解（最不具價值）。神經傳導速度（測神經，肌病時正常）。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"103030-14":{"quick":"糖尿病人單側足下垂、足背感覺消失→做神經傳導檢查定位。","detail":{"background":"**足下垂（foot drop）＋足背感覺異常**之鑑別：腓總神經病變（fibular head受壓）、L5神經根病變、坐骨神經病變、糖尿病單神經病變等。**『神經傳導檢查（NCS／EMG）』可定位病灶（周邊神經 vs 神經根）並判嚴重度，為最恰當下一步**。甲狀腺功能、腰椎MRI、RF非首要定位工具。故B。","options":{"A":"甲狀腺功能非定位足下垂工具。","B":"正解。神經傳導檢查定位。","C":"腰椎MRI為後續(若疑神經根)。","D":"RF與此無關。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"103030-53":{"quick":"肩痛＋同側眼瞼下垂、瞳孔縮小（Horner）→需胸部X光找肺尖腫瘤（Pancoast）。","detail":{"background":"**Horner症候群（眼瞼下垂ptosis＋瞳孔縮小miosis＋同側無汗）＋肩臂痛→須警覺肺尖腫瘤（Pancoast tumor）侵犯交感神經鏈與臂神經叢**。應安排**胸部X光／CT找肺尖病灶**。Horner為瞳孔『縮小』非眼球外突；非單純肩或頸椎X光可解。故B。","options":{"A":"Horner為瞳孔縮小，非眼球外突，錯誤。","B":"正解。需胸部X光找Pancoast腫瘤。","C":"僅肩X光不足。","D":"非單純頸椎病變。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"107080-09":{"quick":"以棉花縷檢查『觸感』所測為大神經與小神經纖維；B正確。","detail":{"background":"**感覺神經學檢查與纖維**：**痛覺（針刺）、溫覺由『小（無髓／薄髓）纖維』傳導**；**震動覺、本體（關節位置）覺由『大（有髓）纖維』（後柱）傳導**；**輕觸覺（棉花縷）由大、小纖維共同傳導**。故B正確（觸感涉及大小纖維）；A（針刺測大神經）、C（震動測小纖維）、D（關節位置測小纖維）皆錯。","options":{"A":"針刺痛覺為小纖維，錯誤。","B":"正解。觸感由大與小纖維傳導。","C":"震動覺為大纖維，錯誤。","D":"關節位置覺為大纖維，錯誤。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"112020-72":{"quick":"糖尿病為腕隧道症候群之危險因子。","detail":{"background":"**腕隧道症候群（carpal tunnel syndrome，正中神經於腕部受壓）危險因子**：重複性手腕屈伸／用力、懷孕、肥胖、**糖尿病、甲狀腺功能『低下』、類風濕性關節炎、肢端肥大、洗腎類澱粉**等。反覆手舉過肩、手肘施力與其他神經病變較相關；甲狀腺『亢進』非典型。故C（糖尿病）。","options":{"A":"手舉過肩與肩部病變相關。","B":"手肘施力與肘隧道相關。","C":"正解。糖尿病為CTS危險因子。","D":"甲狀腺『低下』才相關，亢進非典型。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"114070-62":{"quick":"頸椎脊髓病變（CSM）為上運動神經元徵象，敘述上下肢DTR與陣攣之描述須謹慎（C最不適當）。","detail":{"background":"**頸椎脊髓病變（cervical spondylotic myelopathy, CSM）**：壓迫頸髓致**病灶以下『上運動神經元徵象（DTR亢進、陣攣clonus、Babinski陽性、痙攣）』**，可有感覺異常、步態不穩、手部笨拙、Lhermitte徵；腹壁反射消失可助與ALS鑑別（ALS無感覺症狀）。**惟頸髓病變在『受壓神經根所在的上肢節段』可出現『下運動神經元』徵象（反射『減弱』），故『上下肢DTR皆增強且下肢明顯對稱陣攣』之描述過於一概，為最不適當**。故C。","options":{"A":"常有感覺異常與運動困難，正確。","B":"嚴重時Lhermitte徵陽性，正確。","C":"正解（最不適當）。上肢受累節段可呈DTR減弱，非皆增強。","D":"腹壁反射可助與ALS鑑別，正確。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"110080-39":{"quick":"肺尖癌侵犯『交感神經鏈』致Horner（非膈神經）；A錯誤。","detail":{"background":"**肺尖（Pancoast）腫瘤局部侵犯**：侵犯**頸交感神經鏈→Horner症候群（眼瞼下垂、瞳孔縮小、無汗、眼球內陷）**（非膈神經phrenic nerve）；侵犯臂神經叢下幹（C8-T1）→肩臂尺側痛＝Pancoast症候群。**膈神經麻痺造成的是橫膈上抬，與Horner無關**。故A（稱膈神經麻痺導致Horner）錯誤。","options":{"A":"正解（錯誤）。Horner因交感神經鏈受侵，非膈神經。","B":"Horner四徵描述正確。","C":"侵犯C8-T1致Pancoast，正確。","D":"Pancoast肩痛輻射尺側，正確。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"113020-36":{"quick":"腦部轉移的原發部位中，前列腺癌機率最低。","detail":{"background":"**腦轉移最常見原發癌：肺癌（最多）、乳癌、黑色素瘤、腎細胞癌、大腸癌**等。**前列腺癌主要轉移至『骨（造骨性）』，腦轉移相對罕見**，故機率最低。故C。","options":{"A":"肺癌為腦轉移最常見原發。","B":"乳癌常腦轉移。","C":"正解（機率最低）。前列腺癌多骨轉移、腦轉移罕見。","D":"黑色素瘤好腦轉移。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}},"115020-41":{"quick":"副腫瘤神經症候群常與抗體相關，anti-Hu見於腦脊髓炎；B最適當。","detail":{"background":"**副腫瘤神經症候群（PND）**：**與『小細胞肺癌（SCLC）』關聯最強（非非小細胞）**；**致病多為癌細胞表現神經抗原誘發之免疫反應，如『anti-Hu（ANNA-1）』見於腦脊髓炎／感覺神經病變、anti-Yo（小腦變性）、anti-VGCC（LEMS）**；**症狀常『先於』癌症診斷且進展較快**；**細胞內抗原相關之PND對免疫治療（IVIG/血漿置換）反應常『不佳』**（細胞表面抗原型如LEMS較有反應）。故B正確。","options":{"A":"與小細胞肺癌關聯最強，非非小細胞，錯誤。","B":"正解。anti-Hu見於腦脊髓炎。","C":"細胞內抗原型PND對免疫治療反應常不佳，錯誤。","D":"PND多『先於』癌症診斷且進展較快，錯誤。"},"sources":["Harrison 21e","Adams & Victor's Principles of Neurology／AHA-ASA・AAN 指引"]}}},TO=["腦血管疾病與頭痛（缺血/出血性中風・SAH・moyamoya・tPA・偏頭痛）", "失智、譫妄與認知功能障礙", "意識障礙、昏迷、暈眩與顱內壓", "神經肌肉接合與肌肉疾病（重症肌無力/LEMS/肉毒/發炎性肌病）", "周邊神經、神經根與脊髓病變", "神經腫瘤與副腫瘤神經症候群"],LEC={"意識障礙、昏迷、暈眩與顱內壓":{"title":"意識障礙、昏迷、暈眩與顱內壓","html":"<h4>一、昏迷與中毒</h4>\n<ul>\n<li><b>甲醇中毒有潛伏期</b>（不會 10 分鐘內昏迷）。<b>針尖瞳孔＋昏迷＋低血壓＝鴉片中毒</b>→naloxone（<b>physostigmine 最不適當</b>）。</li>\n<li>老人意識不清原因：低血糖、感染、電解質、中毒等；<b>低血脂最不可能</b>。</li>\n</ul>\n<h4>二、GCS（昏迷量表）</h4>\n<ul>\n<li><b>運動（M）依指令動作＝6 分</b>；四肢癱（M 應低）但能<b>依指令睜閉眼</b>＝閉鎖症候群（運動仍可遵令計分）。</li>\n<li>年輕、輕度頭部外傷、<b>GCS 15、症狀恢復、無神經異常→最不需立即腦影像</b>。</li>\n</ul>\n<h4>三、顱內壓上升與眩暈</h4>\n<ul>\n<li><b>Cushing 反射＝血壓升、心跳變慢（非變快）</b>、呼吸不規則。</li>\n<li><b>中樞性眩暈程度較溫和、周邊性較強烈</b>（但中樞性危險：伴神經學徵象）。</li>\n</ul>"},"腦血管疾病與頭痛（缺血/出血性中風・SAH・moyamoya・tPA・偏頭痛）":{"title":"腦血管疾病與頭痛","html":"<h4>一、蜘蛛膜下腔出血（SAH）</h4>\n<p><b>「此生最劇烈」突發頭痛、痛醒、頸僵、噁吐、喪失意識</b>→SAH（多為<b>顱內動脈瘤破裂</b>）。</p>\n<h4>二、出血性中風與 moyamoya</h4>\n<ul>\n<li>酗酒、突發構音不清＋吞嚥困難＋CT→<b>腦幹出血</b>。</li>\n<li><b>毛毛樣血管病（moyamoya）</b>：主要侵犯<b>前循環（遠端 ICA/MCA/ACA）</b>（非 PCA）。</li>\n</ul>\n<h4>三、r-tPA 與頭痛</h4>\n<ul>\n<li>r-tPA 排除條件＝近期出血/手術、血壓過高、血糖過低（<50）等；<b>血糖 65 不是</b>排除條件。</li>\n<li><b>偏頭痛</b>：常<b>單側、抽痛，伴噁吐/畏光</b>。</li>\n</ul>"},"周邊神經、神經根與脊髓病變":{"title":"周邊神經、神經根與脊髓病變","html":"<h4>一、周邊神經病變型態</h4>\n<ul>\n<li><b>多發性對稱(襪套手套)</b>：糖尿病(最常見)、尿毒、B12 缺乏、酒精。</li>\n<li><b>單神經病變</b>：腕隧道(正中神經、夜間麻、Phalen/Tinel)、肘隧道(尺神經)、垂腕(橈神經)、垂足(腓總神經)。</li>\n<li><b>Guillain-Barré</b>：感染後上行性對稱無力＋反射消失、CSF 蛋白細胞分離；治療 IVIG／血漿置換，監測呼吸。</li>\n</ul>\n<h4>二、神經根與脊髓</h4>\n<ul>\n<li>椎間盤突出根痛：<b>L5(足背/拇趾背曲)、S1(足底/踝反射消失)、C7(中指/三頭肌)</b>。</li>\n<li>脊髓症候群：<b>前脊髓(痛溫消失、本體保留)、中央(上肢>下肢、披肩感覺)、Brown-Séquard(同側本體運動、對側痛溫)、後索(本體/震動、B12/脊髓癆)</b>。</li>\n<li><b>馬尾症候群</b>：鞍區麻木、尿失禁、雙下肢無力＝急症。</li>\n</ul>\n<h4>★考點直擊</h4>\n<p>急性脊髓壓迫(轉移癌)→類固醇＋緊急 MRI／放療。B12 缺乏＝亞急性聯合退化(後索＋皮質脊髓束)。</p>"},"失智、譫妄與認知功能障礙":{"title":"失智、譫妄與認知功能障礙","html":"<h4>一、失智症分型(慢性、意識清楚)</h4>\n<ul>\n<li><b>阿茲海默症</b>(最常見)：海馬迴萎縮、近期記憶先壞、Aβ 斑塊＋tau 神經纖維纏結；藥物 <b>膽鹼酯酶抑制劑(donepezil)、memantine</b>。</li>\n<li><b>血管性</b>：階梯式惡化、局部神經學徵象、多次中風/白質病變。</li>\n<li><b>路易氏體(DLB)</b>：波動認知＋視幻覺＋巴金森症，<b>對抗精神病藥極敏感</b>。<b>額顳葉(FTD)</b>：人格/行為或語言先變、年輕。</li>\n</ul>\n<h4>二、譫妄(急性、注意力障礙)</h4>\n<p><b>急性發作、病程波動、注意力不集中、意識混亂</b>；<b>CAM</b> 評估。誘因：感染(UTI/肺炎)、藥物(抗膽鹼)、電解質、缺氧。<b>失智是譫妄最重要前置因子</b>；找出並矯正可逆病因為首要，非首選鎮靜。</p>\n<h4>三、評估</h4>\n<p><b>MMSE</b>(滿分 30，受教育程度影響)、Mini-Cog(畫鐘＋三項回憶)、MoCA(對輕度認知障礙較敏感)。可逆性失智要查 <b>B12、甲狀腺、神經梅毒、常壓性水腦(步態/失禁/失智三徵)</b>。</p>\n<h4>★考點直擊</h4>\n<p>譫妄 vs 失智：起病(急 vs 慢)、注意力(壞 vs 早期保留)、意識(混亂 vs 清楚)、可逆性。日落症候群＝失智者黃昏加重，先非藥物處置(規律作息、照明、減少約束)。</p>"},"神經肌肉接合與肌肉疾病（重症肌無力/LEMS/肉毒/發炎性肌病）":{"title":"神經肌肉接合與肌肉疾病","html":"<h4>一、神經肌肉接合疾病</h4>\n<ul>\n<li><b>重症肌無力(MG)</b>：突觸後 <b>抗 AChR 抗體</b>、<b>活動後加重(易疲勞)</b>、眼瞼下垂/複視、與胸腺瘤相關；Tensilon／冰敷試驗；治療 pyridostigmine、免疫抑制、胸腺切除；<b>肌無力危象</b>呼吸衰竭。</li>\n<li><b>LEMS</b>：突觸前 <b>抗 P/Q 鈣通道</b>、小細胞肺癌、<b>活動後肌力短暫改善</b>、自主神經症狀。</li>\n<li><b>肉毒桿菌</b>：阻斷 ACh 釋放、下行性麻痺＋瞳孔散大＋口乾。</li>\n</ul>\n<h4>二、肌肉疾病</h4>\n<ul>\n<li><b>發炎性肌病</b>：近端對稱無力、CK 升；皮肌炎(向陽疹/Gottron、伴惡性腫瘤)、多發性肌炎、包涵體肌炎(年長、遠端/股四頭、對類固醇差)。</li>\n<li><b>肌失養症(Duchenne)</b>：dystrophin 缺失、Gower 徵、CK 極高。<b>週期性麻痺</b>(鉀異常)、惡性高熱(吸入麻醉/琥珀膽鹼)。</li>\n</ul>\n<h4>★考點直擊</h4>\n<p>易疲勞無力＋抗 AChR＝MG；活動後改善＋肺癌＝LEMS；近端無力＋CK 升＋皮疹＝皮肌炎(查腫瘤)。</p>"},"神經腫瘤與副腫瘤神經症候群":{"title":"神經腫瘤與副腫瘤神經症候群","html":"<h4>一、原發腦瘤</h4>\n<ul>\n<li><b>成人幕上</b>：<b>膠質母細胞瘤(GBM, WHO 4 級)</b>最常見且惡性，MRI 環狀強化＋中央壞死、跨胼胝體蝴蝶狀；腦膜瘤(良性、硬腦膜尾徵、女性)；寡突膠質瘤(1p/19q 共缺失、對化療反應佳)。</li>\n<li><b>兒童幕下</b>：髓母細胞瘤(小腦蚓部)、毛細胞星形細胞瘤(預後最佳)、室管膜瘤。</li>\n</ul>\n<h4>二、轉移與淋巴瘤</h4>\n<p><b>腦轉移最常見的腦瘤</b>(肺、乳、黑色素瘤、腎)，灰白質交界多發。原發性中樞神經淋巴瘤(免疫不全/AIDS、EBV、室管膜旁均勻強化、類固醇後可暫時消失)。</p>\n<h4>三、副腫瘤神經症候群</h4>\n<ul>\n<li><b>Lambert-Eaton(LEMS)</b>↔小細胞肺癌、抗 P/Q 型鈣通道；<b>活動後肌力短暫改善</b>。</li>\n<li>小腦退化(anti-Yo/婦科乳癌)、邊緣性腦炎(anti-Hu/SCLC、anti-NMDA/畸胎瘤)、opsoclonus-myoclonus(兒童神經母細胞瘤)。</li>\n</ul>\n<h4>★考點直擊</h4>\n<p>環狀強化鑑別：GBM／轉移／膿瘍／弓蟲。IICP 三徵(晨起頭痛、嘔吐、視乳突水腫)。類固醇降腦水腫；癲癇給抗癲癇藥。</p>"}};
const $=s=>document.querySelector(s);
let view='year',expand=false;
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>';if(LEC[t]&&!kw){h+='<div class="lec"><details open><summary>📘 複習講義：'+esc(LEC[t].title)+'</summary>'+LEC[t].html+'</details></div>';}h+=tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='med_neuro_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
