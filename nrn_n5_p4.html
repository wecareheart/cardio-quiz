":"N5","catname":"精神科與社區衛生護理學","num":11,"stem":"謝先生,診斷為雙相情緒障礙症,因要求外出抽菸未獲同意,在病室內摔東西。下列何項護理措施最適宜?","opts":{"A":"以嚴厲語氣制止病人","B":"引導病人用言語表達憤怒","C":"立即告知會延後病人出院的日期","D":"直接將病人約束"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"情緒障礙憂鬱雙相與自殺防治","topic_num":"情緒障礙憂鬱雙相與自殺防治","q_num":11,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"以嚴厲語氣制止病人","B":"引導病人用言語表達憤怒","C":"立即告知會延後病人出院的日期","D":"直接將病人約束"},"img":""},{"id":"115030-N5-13","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":13,"stem":"林先生,躁症發作(manic episode)住院,在病房客廳對著病友們滔滔不絕的批判醫護人員、醫院設施,並表示要投訴媒體。下列何項最適宜此時護理處置?","opts":{"A":"將林先生帶開,陪伴參加病房歌唱活動","B":"轉知被批判的醫護人員,改善對林先生的態度","C":"持續傾聽林先生的抱怨,並給予肯定","D":"提供事實,澄清林先生所批判內容"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"topic":"情緒障礙憂鬱雙相與自殺防治","topic_num":"情緒障礙憂鬱雙相與自殺防治","q_num":13,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"將林先生帶開,陪伴參加病房歌唱活動","B":"轉知被批判的醫護人員,改善對林先生的態度","C":"持續傾聽林先生的抱怨,並給予肯定","D":"提供事實,澄清林先生所批判內容"},"img":""},{"id":"115030-N5-21","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":21,"stem":"涂先生,41歲,診斷為雙相情緒障礙症,與病友因口角發生攻擊行為,揚言要致其死,經醫囑予約束隔離30分鐘,有關約束隔離的敘述,下列何者正確?","opts":{"A":"約束的目的主要為保護涂先生,穩定其情緒,而非考量保護另一位病友免於傷害","B":"約束一定會涉及不符倫理的議題,同時也是破壞涂先生與工作人員信任關係的主因","C":"運用隔離措施之三個原則,包括獨居、隔離、減少感覺輸入","D":"因情況危急,通常不需再向涂先生說明太多"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"情緒障礙憂鬱雙相與自殺防治","topic_num":"情緒障礙憂鬱雙相與自殺防治","q_num":21,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"約束的目的主要為保護涂先生,穩定其情緒,而非考量保護另一位病友免於傷害","B":"約束一定會涉及不符倫理的議題,同時也是破壞涂先生與工作人員信任關係的主因","C":"運用隔離措施之三個原則,包括獨居、隔離、減少感覺輸入","D":"因情況危急,通常不需再向涂先生說明太多"},"img":""}],E={"101030-N5-6":{"quick":"分手6年的前男友要結婚而劃手臂(引人注意、無強烈致死意圖)＝作態自殺。","detail":{"background":"方小姐因前男友要結婚而鬱悶、有『拿刀片劃手臂』的情形——這種多為表淺、帶有求救/引人注意意味、未必有強烈致死意圖的自傷行為，屬『作態自殺(自殺姿態 suicidal gesture)』。自殺意念是只有想法、未行動;自殺威脅是口頭表示要自殺;自殺企圖(自殺嘗試)是有明確致死意圖的實際行動。本題已有劃手臂的行為但偏向引人注意，故為作態自殺。","options":{"A":"自殺意念是只有想法、未付諸行動。","B":"自殺威脅是口頭表示要自殺、未行動。","C":"正確。劃手臂、引人注意而無強烈致死意圖，是作態自殺。","D":"自殺企圖是有明確致死意圖的實際行動。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"101030-N5-9":{"quick":"躁鬱症病人讚美護士、要求請假外出＝操縱(manipulation)的行為。","detail":{"background":"李小姐躁鬱症、先稱讚主護護士「親切、對病人好、不像其他護士兇」，再要求其協助請假外出——以『討好、抬高某人、貶低他人』來達到自己的目的(請假)，屬『操縱(manipulation)的行為』，是躁症與某些人格障礙常見的人際模式。要求行為僅是單純提出要求;挑撥是離間他人關係;有病識感是對疾病的認識。本題以討好操弄達到目的，故為操縱行為。","options":{"A":"要求的行為只是單純提出要求，無操弄。","B":"正確。以討好、抬高某人貶低他人來達目的，是操縱行為。","C":"挑撥是離間他人關係，本題目的是請假。","D":"有病識感是對疾病的認識，與本題無關。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","操縱行為"]}},"101030-N5-11":{"quick":"「活著沒意義、死了算了」：以開放、同理回應「你聽起來有壓力或心事，要不要多說一些?」","detail":{"background":"憂鬱病人說「我覺得活著沒有意義、死了算了」(透露自殺意念)。最符合治療性溝通的是『開放、同理、鼓勵表達』:「你聽起來像有壓力或心事，要不要多說一些?」——接納情緒、進一步了解(並評估自殺風險)。A「不要亂講、讓你媽媽擔心」是責備、用罪惡感;B「好好表現、不然怎能出院」是條件交換、否定;C「新藥很多、一定會好」是空泛保證。故 D 正確。對透露自殺意念者，宜開放探詢、評估風險。","options":{"A":"「不要亂講、讓媽媽擔心」是責備、用罪惡感。","B":"「好好表現、不然怎能出院」是條件交換、否定。","C":"「新藥很多、一定會好」是空泛保證。","D":"正確。開放同理「你聽起來有壓力或心事，要不要多說一些?」"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"101030-N5-13":{"quick":"雙極性情感障礙躁期最典型＝意念飛躍(flight of ideas)。","detail":{"background":"雙極性情感障礙(躁鬱症)躁期最常見的典型症狀是『意念飛躍(flight of ideas)』——思考快速、主題快速跳躍但仍有些微關聯，伴隨多話、語速快。表情淡漠是負性/憂鬱表現;蠟樣屈曲是僵直型思覺失調;被害妄想是思覺失調或精神病性症狀。躁期的核心思考障礙是意念飛躍，故 B 正確。","options":{"A":"表情淡漠是負性/憂鬱表現。","B":"正確。意念飛躍(思考快速跳躍)是躁期最典型症狀。","C":"蠟樣屈曲是僵直型思覺失調的症狀。","D":"被害妄想是精神病性症狀，非躁期最典型。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症"]}},"101030-N5-14":{"quick":"鋰鹽護理：腎功能缺損或心血管疾病者宜避免同時併用利尿劑。","detail":{"background":"鋰鹽(lithium)護理指導:(D)『腎功能缺損或有心血管疾病的病人，宜避免同時使用鋰鹽與利尿劑』——利尿劑使鈉排出增加、鋰鹽再吸收增加，易致鋰鹽中毒。其他錯誤:A 漏服『不可一次補服雙倍』(以免中毒);B 急性躁症治療濃度約『1.0~1.5 mEq/L』(維持期0.6~1.2)，非2.5~3.4(那已是中毒致死範圍);C 抽血測鋰鹽濃度應在『服藥後約12小時(次晨服藥前)』，非剛服藥後2小時。故 D 正確。","options":{"A":"漏服不可一次補服雙倍，以免中毒。","B":"急性躁症治療濃度約1.0~1.5 mEq/L，非2.5~3.4。","C":"測鋰鹽濃度應在服藥後約12小時，非2小時。","D":"正確。腎功能缺損或心血管疾病者，宜避免併用利尿劑。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽"]}},"101030-N5-36":{"quick":"病人要求分享護理師個人經驗：若評估對病人有益，則可適度表達(治療性自我揭露)。","detail":{"background":"林女士要求護理師分享個人交友經驗。治療性自我揭露(therapeutic self-disclosure)的原則是『若評估對病人有益(以病人為中心、有治療目的)，則可「適度」表達』——適量、有目的地分享，目的在促進病人的探索與信任。A『清楚詳盡說出個人經驗』過度揭露、焦點轉向護理師;C『超然立場婉轉拒絕』過於疏遠;D『轉移話題』迴避、忽視病人。故 B 正確。治療性自我揭露須適度、以病人利益為判準。","options":{"A":"清楚詳盡說出個人經驗是過度揭露、焦點轉向護理師。","B":"正確。若評估對病人有益，則可適度表達(治療性自我揭露)。","C":"超然立場婉轉拒絕過於疏遠。","D":"轉移話題是迴避、忽視病人。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","治療性自我揭露"]}},"101030-N5-37":{"quick":"ECT 治療後出現短期記憶喪失：應予以解釋(暫時性、會恢復)。","detail":{"background":"林女士因強烈自殺企圖接受電氣痙攣治療(ECT)。ECT 後常見『短期記憶力喪失/混亂』，較適合的護理是『當出現短期記憶喪失時，應予以解釋(說明這是暫時的、會逐漸恢復)』——減輕病人焦慮。A『監測正腎上腺素變化』非ECT後常規;B『密切觀察以防突發攻擊』非ECT後的主要重點;C『清醒後禁食4小時』錯誤(ECT後清醒、吞嚥反射恢復即可進食，非一律禁食4小時)。故 D 正確。ECT後對暫時性記憶障礙應解釋安撫。","options":{"A":"監測正腎上腺素變化非ECT後的常規護理。","B":"密切觀察防突發攻擊非ECT後的主要重點。","C":"清醒、吞嚥反射恢復即可進食，非一律禁食4小時。","D":"正確。出現短期記憶喪失時應予以解釋(暫時、會恢復)。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","ECT"]}},"101030-N5-38":{"quick":"自殺：自殺者常在自殺前發出自殺意念的訊息。","detail":{"background":"關於自殺的正確敘述:(C)『自殺的人常會在自殺前發出自殺意念的訊息(求救訊號)』——多數自殺者事前會以言語或行為透露想死的念頭，故應重視並評估。其他迷思:A『只有老年人或憂鬱症病人才會自殺』錯誤(各年齡、各種疾病甚至無精神病史者皆可能);B『自殺危機過後就不會再有問題』錯誤(危機後、恢復期仍有再自殺風險);D『真正自殺的人都抱必死決心』錯誤(許多自殺者是矛盾、求救的)。故 C 正確。","options":{"A":"各年齡、各種狀況都可能自殺，非只有老年/憂鬱者。","B":"危機過後、恢復期仍有再自殺風險。","C":"正確。自殺者常在自殺前發出自殺意念的訊息。","D":"許多自殺者是矛盾、求救的，非都抱必死決心。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"101110-N5-3":{"quick":"躁症發作：比平時多話或被迫一直說不停(pressured speech)。","detail":{"background":"躁症發作(manic episode)的症狀:(C)『比平時多話、或言語急迫、被迫一直說不停(pressured speech)』。其他錯誤:A『感覺無助』是憂鬱的表現;B 躁症『睡眠需求「減少」(睡很少卻精力旺盛)』，非增加;D『思考停頓(thought blocking)』是思覺失調的思考障礙，躁症是『意念飛躍(思考快速)』。故 C 正確。躁症的核心包括情緒高昂、活動增加、多話、睡眠需求減少、意念飛躍。","options":{"A":"感覺無助是憂鬱的表現。","B":"躁症睡眠需求減少，非增加。","C":"正確。比平時多話、言語急迫(pressured speech)。","D":"思考停頓是思覺失調的症狀，躁症是意念飛躍。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症"]}},"101110-N5-26":{"quick":"與重鬱症病人建立信任：每天主動安排多次的短暫時間陪伴。","detail":{"background":"與重鬱症病人建立信任感，有助達成的做法是『每天「主動」安排「多次、短暫」的時間陪伴』——主動、規律、可預期的短時間接觸，傳達關懷又不致造成病人負擔，逐步建立信任。A『整天陪伴』使病人有壓力、不切實際;C『尊重病患要求再安排』太被動(憂鬱退縮者多不會主動要求);D『遠處觀察、防止威脅』疏遠、不利信任。故 B 正確。對退縮的重鬱病人，主動、規律的短暫陪伴最能建立信任。","options":{"A":"整天陪伴使病人有壓力、不切實際。","B":"正確。每天主動安排多次短暫時間陪伴，建立信任。","C":"憂鬱退縮者多不主動要求，「尊重要求再安排」太被動。","D":"遠處觀察、防止威脅疏遠，不利信任。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"102030-N5-17":{"quick":"自殺企圖的保護約束：解釋約束理由，並至少每15分鐘探視一次。","detail":{"background":"陳小姐自殺企圖增強須保護約束。較恰當的處置:(B)『向病人解釋約束的理由，並至少每15分鐘探視一次』——尊重、告知並密切監測(約束病人須頻繁觀察其安全、循環、約束部位)。A『先約束再請醫師開醫囑』錯誤(約束須有醫囑，緊急時可先執行但須立即取得醫囑;且本選項忽略告知);C『每4小時評估能否解除』間隔過長(應更頻繁評估);D『為預防再發而持續約束』錯誤(約束應在必要的最短時間內、定期評估解除)。故 B 正確。","options":{"A":"約束須有醫囑、且應向病人解釋，非先約束。","B":"正確。解釋約束理由，並至少每15分鐘探視一次。","C":"每4小時評估解除間隔過長，應更頻繁。","D":"約束應在必要的最短時間、定期評估解除，非持續約束。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","保護約束"]}},"102030-N5-19":{"quick":"臨床上自殺最多的精神疾病＝憂鬱症。","detail":{"background":"臨床上精神病人自殺，以『憂鬱症(重度憂鬱)』最多——憂鬱症的無望感、無價值感、自殺意念是自殺的主要危險因子，自殺率最高。強迫症、思覺失調症、酒癮藥癮也有自殺風險(尤其思覺失調與物質使用),但以憂鬱症的自殺最多。故 A 正確。","options":{"A":"正確。臨床上自殺最多的精神疾病是憂鬱症。","B":"強迫症有自殺風險，但非最多。","C":"思覺失調症有自殺風險，但非最多。","D":"酒癮、藥癮有自殺風險，但非最多。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"102030-N5-31":{"quick":"預防老年憂鬱症自殺：最優先評估的症狀＝無望感。","detail":{"background":"預防老年憂鬱症病人自殺，最優先評估的症狀是『無望感(hopelessness)』——無望感是自殺最強的預測因子(對未來絕望者自殺風險最高)，比情緒低落本身更能預測自殺。思考過程紊亂、感覺知覺紊亂、溝通障礙都非自殺的核心預測因子。故 D 正確。評估自殺風險時，無望感是關鍵指標。","options":{"A":"思考過程紊亂非自殺的核心預測因子。","B":"感覺與知覺紊亂非自殺的核心預測因子。","C":"溝通能力障礙非自殺的核心預測因子。","D":"正確。無望感是自殺最強的預測因子，應最優先評估。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"102030-N5-32":{"quick":"服安眠藥自殺者出院衛教：出院後仍要預防自殺，憂鬱症恢復期自殺危險性更大。","detail":{"background":"陳小姐服大量安眠藥自殺、欲出院。對家屬的正確衛教:(A)『出院後仍要預防自殺，因為憂鬱症「恢復期」自殺的危險性更大』——重度憂鬱嚴重期常因精力不足而無力執行自殺，當情緒、體力『稍恢復(恢復期)』時，反而有能力付諸行動，故此期自殺風險更高。其他迷思:B『情緒好轉自殺威脅就消失』錯誤;C『自殺只是尋求關心』錯誤(輕忽自殺意圖);D『有自殺經驗者不會再自殺』錯誤(曾自殺者再自殺風險更高)。故 A 正確。","options":{"A":"正確。憂鬱症恢復期自殺危險性更大，出院後仍要預防。","B":"情緒好轉不代表自殺威脅消失，恢復期反而更危險。","C":"「自殺只是尋求關心」是輕忽自殺意圖。","D":"曾自殺者再自殺風險更高，非不會再自殺。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"102030-N5-37":{"quick":"電療後想不起昨日的事：告知這只是暫時的、會慢慢恢復。","detail":{"background":"李小姐接受電療(ECT)後出現『記憶障礙(想不起昨日媽媽是否來看她)』。最恰當的反應是『告知李小姐這只是暫時的、會慢慢恢復』——ECT 後的記憶障礙多為暫時性、會逐漸改善，給予解釋與保證可減輕焦慮。A『無需特別處置』忽視病人的擔心;C『安排媽媽來探視』未處理記憶障礙的疑慮;D『通知醫師立即處理』反應過度(這是ECT常見、暫時的副作用)。故 B 正確。","options":{"A":"「無需特別處置」忽視病人的擔心。","B":"正確。告知這只是暫時的、會慢慢恢復，減輕焦慮。","C":"安排媽媽探視未處理記憶障礙的疑慮。","D":"這是ECT常見暫時副作用，通知醫師立即處理過度。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","ECT"]}},"102030-N5-38":{"quick":"看到「活著沒意思、死了解脫」的字條：陪伴、定時探視並了解李小姐的想法。","detail":{"background":"護理師看到李小姐寫「活著沒意思、死了可以解脫」(透露自殺意念)。最合宜的反應是『陪伴、定時探視，並主動了解李小姐的想法(評估自殺風險)』——直接、開放地探詢其自殺想法、計畫，並提供陪伴與安全維護。A『每10~15分鐘看她在不在』只監視、未溝通評估;C『死了不一定如你所想的好』是爭辯、說教;D『限制在安全空間』偏向約束、未先評估與溝通。故 B 正確。對透露自殺意念者，應主動、開放地評估並陪伴。","options":{"A":"只監視「她在不在」未溝通評估其想法。","B":"正確。陪伴、定時探視並了解李小姐的想法(評估自殺風險)。","C":"「死了不一定如你所想的好」是爭辯、說教。","D":"限制在安全空間偏向約束，未先評估與溝通。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"102030-N5-39":{"quick":"「有誰知道你有這個念頭?」＝評估其支持系統。","detail":{"background":"護理師問「有誰知道你有這個念頭及感覺?」——是在了解『有哪些人知道、可以支持病人』，主要評估其『支持系統(social support)』(評估自殺風險時，社會支持是重要保護因子)。詢問自殺意念是問「你有想死的念頭嗎?」;自殺行為是問實際行動/計畫;情緒狀態是問感受。本題問「有誰知道」，是評估支持系統。故 C 正確。","options":{"A":"評估自殺意念是問有無想死的念頭。","B":"評估自殺行為是問實際的行動/計畫。","C":"正確。「有誰知道你的念頭」是評估支持系統。","D":"評估情緒狀態是問其感受。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","自殺風險評估"]}},"102110-N5-18":{"quick":"鋰鹽中毒：濃度過高時應採腹膜或血液透析。","detail":{"background":"鋰鹽中毒的護理:(C)『中毒濃度過高(嚴重中毒)時，應採用腹膜透析或血液透析移除鋰鹽』。其他錯誤:A 鋰鹽『中毒』濃度約『>1.5 mEq/L(>2.0 為嚴重)』，而0.6~1.0 是治療範圍;B『非只有長期服藥者才會中毒』(脫水、併用利尿劑、腎功能差、過量都可能急性中毒);D『沒有意識不清或抽搐』不代表未中毒(早期中毒可能只有腸胃道症狀、顫抖、無力，意識不清抽搐是嚴重中毒的表現)。故 C 正確。","options":{"A":"中毒濃度約>1.5 mEq/L，0.6~1.0是治療範圍。","B":"脫水、過量、腎功能差都可能中毒，非只有長期服藥者。","C":"正確。中毒濃度過高時應採腹膜或血液透析。","D":"早期中毒可能僅腸胃道/顫抖，無意識不清不代表未中毒。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽中毒"]}},"102110-N5-19":{"quick":"憂鬱症病因＝遺傳與環境因素(及神經傳導物質失調)。","detail":{"background":"憂鬱症的病因:(D)『遺傳與環境因素』(多因子，含遺傳體質、心理社會壓力、神經傳導物質失調)。其他錯誤:A 憂鬱症與正腎上腺素『過低』有關，非過高;B 憂鬱症常見可體松(cortisol)『分泌增加(HPA軸過度活化)』，非受抑制;C 憂鬱症與血清素『分泌過低/不足』有關，非過高(故 SSRI 提高血清素來治療)。故 D 正確。","options":{"A":"憂鬱症與正腎上腺素過低有關，非過高。","B":"憂鬱症常見可體松分泌增加，非受抑制。","C":"憂鬱症與血清素不足有關，非過高。","D":"正確。憂鬱症的病因是遺傳與環境因素(多因子)。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","憂鬱症病因"]}},"102110-N5-25":{"quick":"情緒低落、失眠、注意力不集中持續一個月＝憂鬱症。","detail":{"background":"小美最近一個月『情緒低落、失眠、注意力不集中』——符合憂鬱症的核心症狀(情緒低落、睡眠障礙、注意力下降，持續≥2週)。恐慌症以反覆突發的恐慌發作為核心;強迫症以強迫思考/行為為核心;自閉症是神經發展障礙(早年起病、社交溝通缺損)。本題以持續的情緒低落為主，最可能為憂鬱症。故 B 正確。","options":{"A":"恐慌症以反覆突發的恐慌發作為核心。","B":"正確。情緒低落、失眠、注意力不集中，最可能憂鬱症。","C":"強迫症以強迫思考/行為為核心。","D":"自閉症是早年起病的神經發展障礙。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","憂鬱症"]}},"102110-N5-29":{"quick":"暴食症最可能建議住院的情況＝出現計畫性自殺想法。","detail":{"background":"陳小姐暴食症門診追蹤。醫師最可能建議住院的情況是(C)『出現計畫性自殺想法』——飲食疾患合併自殺風險(具體計畫)是緊急、需住院保護的指標。A『半年內降至40公斤(BMI約16)』雖偏低但非最緊急的住院指標(暴食症體重多正常或偏高);B『血鉀3.5 mEq/L』在正常範圍下限、未達危急;D『每週暴食2~3次』是暴食症的症狀本身、未達住院標準。故 C 正確。飲食疾患出現自殺計畫是優先住院指標。","options":{"A":"體重偏低但非最緊急的住院指標。","B":"血鉀3.5在正常下限，未達危急。","C":"正確。出現計畫性自殺想法是優先住院指標。","D":"每週暴食2~3次是症狀本身，未達住院標準。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","飲食疾患·自殺"]}},"102110-N5-32":{"quick":"「無法承受別人眼光、想結束生命」：以開放探詢「最讓你感到痛苦的經驗是什麼?」","detail":{"background":"小晴透露自殺意念(無法承受別人眼光、想結束生命)。最合宜的回應是『開放、同理地探詢其痛苦』:「說說看，這當中最讓你感到痛苦的經驗是什麼?」——鼓勵表達、了解其困擾與自殺風險。A『我覺得你不需要這樣想』是否定其感受;B『我相信你一定會復原』是空泛保證;D『結束生命是很懦弱的表現』是批判、指責。故 C 正確。對自殺意念宜開放探詢、同理、評估風險。","options":{"A":"「你不需要這樣想」是否定其感受。","B":"「一定會復原」是空泛保證。","C":"正確。開放探詢「最讓你感到痛苦的經驗是什麼?」","D":"「結束生命是懦弱」是批判、指責。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"103030-N5-5":{"quick":"鋰鹽：初次服用12小時後抽血①、服用前檢驗腎功能③、濃度>2.0出現中毒立刻停藥④(每半年抽血②錯)。","detail":{"background":"服用鋰鹽(lithium)的注意事項:(1)初次服用後約『12小時(次晨服藥前)』抽血檢驗鋰鹽濃度;(3)使用鋰鹽『之前須檢驗腎功能』(鋰由腎排除);(4)鋰鹽濃度『>2.0 mEq/L 出現中毒症狀時需立刻停藥』。而(2)『病情穩定後每隔半年抽血』錯誤——維持期一般每『1~3個月』監測一次，「每半年」間隔過久。故正確為①③④(選 B)。","options":{"A":"123：含敘述2(每半年抽血)，間隔過久。","B":"正確。初次12小時後抽血①、服用前驗腎功能③、>2.0中毒立刻停藥④。","C":"234：含敘述2、缺①，錯誤。","D":"124：含敘述2，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽"]}},"103030-N5-8":{"quick":"百憂解(SSRI)服用1週未改善：此藥一般至少需要2週才見效。","detail":{"background":"蔡小姐服用百憂解(Prozac，fluoxetine，SSRI 抗憂鬱劑)1週、自覺未改善。最正確的回應是『此藥物改善症狀一般至少需要2週(常需2~4週甚至更久)才見效』——抗憂鬱劑須持續服用才逐漸起效，不可因短期未見效而自行停藥或換藥。A『無效需換藥』言之過早(才1週);B『需轉介心理諮商』非此時的正確回應;C『是不是沒按時吃藥』是質疑、未說明藥效時程。故 D 正確。SSRI 起效需時，須衛教病人耐心持續服藥。","options":{"A":"才1週、言之過早，不應現在判定無效換藥。","B":"轉介心理諮商非此時的正確回應。","C":"「是不是沒按時吃藥」是質疑，未說明藥效時程。","D":"正確。SSRI 一般至少需要2週才改善症狀。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","抗憂鬱劑"]}},"103030-N5-11":{"quick":"憂鬱、沉默少語、不互動：運用友善、接納的治療性態度。","detail":{"background":"吳小姐憂鬱症、整天沉默少語、不與人互動。護理師主要運用『友善、接納的態度』——以溫暖、不批判、接納的態度，傳達關懷與被重視，建立信任、鼓勵其逐步表達。就事論事態度適用於操縱、設限情境;放縱無關緊要是不當的;被動友善態度多用於『多疑、被害妄想』者(保持距離)。對退縮憂鬱者，主動而友善接納最適切。故 A 正確。","options":{"A":"正確。對憂鬱退縮者，運用友善、接納的態度建立信任。","B":"就事論事態度適用於操縱、設限情境。","C":"放縱、無關緊要態度是不當的。","D":"被動友善態度多用於多疑、被害妄想者。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙與自殺防治","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"103030-N5-16":{"quick":"85歲憂鬱、不吃不喝想死：優先護理＝協助個案進食(維持基本生理需求)。","detail":{"background":"鄭女士85歲、終日以淚洗面、『不吃不喝』、表示不想活——憂鬱合併拒食拒水有立即的生命危險(脫水、營養不良)。依需求優先順序，宜『優先協助個案進食(維持基本生理需求與安全)』。安排未來生活安置、回憶治療、人際互助團體都是後續的心理社會處置，須在生理需求穩定後。對拒食拒水的重鬱老人，維持進食是當務之急。故 A 正確。","options":{"A":"正確。不吃不喝有生命危險，優先協助個案進食。","B":"安排未來生活安置是後續處置，非優先。","C":"回憶治療是後續的心理處置。","D":"人際互助團體是後續處置，非優先。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"103030-N5-20":{"quick":"照顧重度憂鬱症個案：最優先＝護理師主動陪伴。","detail":{"background":"照顧重度憂鬱症個案，最優先的護理處置是『護理師主動陪伴』——憂鬱病人退縮、缺乏動機、不會主動求助，護理師主動、規律的陪伴能傳達關懷、建立信任、提供安全感(並利於評估自殺風險)。安排團體活動、娛樂活動、鼓勵情感表達都須在建立信任關係之後、且病人有能力參與時才適合。對重鬱者，主動陪伴是建立關係與安全的第一步。故 A 正確。","options":{"A":"正確。護理師主動陪伴是照顧重鬱個案的最優先處置。","B":"安排團體活動須在建立關係、病人有能力參與後。","C":"安排娛樂活動非最優先。","D":"鼓勵情感表達須在建立信任關係之後。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"103030-N5-29":{"quick":"急性焦慮/激躁不安的對症藥物＝diazepam(Valium，benzodiazepine 抗焦慮劑)。","detail":{"background":"針對病人目前的焦慮/激躁不安症狀，最適合的是『diazepam(Valium)』——屬 benzodiazepine 類抗焦慮劑，可快速緩解焦慮、激躁、失眠。clomipramine(Anafranil)是三環抗憂鬱劑(用於憂鬱/強迫症，起效慢);lithium 是情緒穩定劑(用於躁症);trazodone 是抗憂鬱劑(兼助眠)。對「急性焦慮/激躁」需快速緩解者，BZD(diazepam)最對症。故 B 正確。","options":{"A":"clomipramine 是三環抗憂鬱劑，起效慢，非急性焦慮首選。","B":"正確。diazepam(Valium)為 BZD 抗焦慮劑，可快速緩解焦慮激躁。","C":"lithium 是情緒穩定劑，用於躁症。","D":"trazodone 是抗憂鬱劑(兼助眠)，非急性焦慮首選。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","抗焦慮劑"]}},"103100-N5-6":{"quick":"乙醯膽鹼功能過低與阿茲海默症有關。","detail":{"background":"神經傳導物質與精神疾病假說的正確敘述:(D)『乙醯膽鹼(ACh)功能過低與阿茲海默症有關』(故用乙醯膽鹼酶抑制劑治療)。其他錯誤:A 多巴胺活性過高與『思覺失調症(正性症狀)』有關，非憂鬱症;B 正腎上腺素功能過『低』與『憂鬱症』有關，躁症則與兒茶酚胺過高有關(非「正腎上腺素過低與躁症」);C GABA 功能『過低/不足』與焦慮疾患有關(GABA 是抑制性)，非「過高」。故 D 正確。","options":{"A":"多巴胺過高與思覺失調有關，非憂鬱症。","B":"正腎上腺素過低與憂鬱症有關，非躁症。","C":"GABA 功能不足與焦慮有關，非過高。","D":"正確。乙醯膽鹼功能過低與阿茲海默症有關。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","神經傳導物質"]}},"103100-N5-20":{"quick":"把不相關的外在事件(男友分手、父母離婚)都歸因於自己＝過度個人化(personalization)。","detail":{"background":"依貝克(Beck)認知理論，陳小姐認為「男友分手、父母離婚都是自己造成的」——把『與自己不相關或非自己所能控制的外在事件，過度歸因於自己』，屬『過度個人化(personalization)』的認知扭曲。兩極化想法是非黑即白;選擇性注意(選擇性摘取)是只看負面細節而忽略整體;獨斷推斷是無充分證據就下負面結論。本題核心是『把外在事件都怪到自己頭上』，故為過度個人化。","options":{"A":"兩極化想法是非黑即白的極端思考。","B":"選擇性注意是只看負面細節、忽略整體。","C":"獨斷推斷是無充分證據就下負面結論。","D":"正確。把不相關的外在事件歸因於自己，是過度個人化。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","Beck 認知扭曲"]}},"103100-N5-24":{"quick":"躁症病人贈送大量物品給病友：堅定表達考量、代為保管。","detail":{"background":"黃先生躁症、把家屬帶的大量食物與書本贈與病友(躁症的揮霍/失控行為)。最適當的處置是『堅定、清楚地表達護理師的考量(這些是你的物品、為你保管)，並代為保管』——以堅定但尊重的態度設限、保護其財物。A『衡量金額再決定』標準不一致;B『尊重自主、同意贈送』放任失控行為;C『沒收並限制家屬帶物』帶懲罰、責怪家屬意味。故 D 正確。對躁症的揮霍行為，宜以堅定一致的態度設限、代為保管。","options":{"A":"衡量金額再決定，標準不一致。","B":"尊重自主、同意贈送是放任躁症的失控行為。","C":"沒收並限制家屬帶物帶懲罰、責怪家屬意味。","D":"正確。堅定表達護理師的考量、代為保管。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症行為設限"]}},"103100-N5-35":{"quick":"有兩次自殺史、揚言去死並打電話道別：通知家人密切注意其自殺行為。","detail":{"background":"張太太曾有兩次自殺經驗、與先生口角後揚言去死、打電話哭訴並『道別』(高自殺風險警訊:既往史+具體威脅+告別)。護理師最適當的反應是『通知張太太的家人密切注意其自殺行為(啟動支持與安全網、確保有人在旁)』——立即動員可近的支持系統以維護安全。A『請她獨處冷靜』危險(獨處增加自殺機會);C『鼓勵運動轉移念頭』輕忽其危險性;D『自殺要承受輪迴之苦』是說教。故 B 正確。對高風險的自殺威脅，立即啟動支持系統、確保安全為要。","options":{"A":"請她獨處冷靜很危險，獨處增加自殺機會。","B":"正確。通知家人密切注意其自殺行為，啟動安全網。","C":"鼓勵運動轉移念頭輕忽其危險性。","D":"「自殺要承受輪迴之苦」是說教。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"103100-N5-39":{"quick":"危機管理：環境控制含住院加入新支持③、透過溫暖接受提供一般性支持④(著重未來①、卡普蘭1~3週②錯)。","detail":{"background":"針對黃小姐喪夫後失眠自殺問題的危機管理(危機介入):(3)環境的控制包括請黃小姐『住院、加入新的支持情境』;(4)護理師透過『溫暖接受』提供一般性支持。而(1)危機介入著重的是『「當前」危機的解決(此時此地)』，而非「未來生活問題與弱勢管理」(那偏向個案管理/長期);(2)卡普蘭(Caplan)的危機理論指危機歷程約『4~6週』，並非「1~3週內最易受傷」。故正確為③④(選 C)。","options":{"A":"12：①著重未來非危機介入重點、②卡普蘭是4~6週，皆錯。","B":"23：含②(1~3週)，錯誤。","C":"正確。環境控制含住院加新支持③、溫暖接受提供一般性支持④。","D":"14：含①(著重未來)，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","危機介入·Caplan"]}},"104030-N5-9":{"quick":"Valproate(Depakine)：增加抑制性 GABA 的活性以穩定情緒。","detail":{"background":"Valproate(Depakine，valproic acid)用於雙極性疾病，其主要藥理機轉是『增加抑制性神經傳導物質 GABA 的活性(並抑制興奮性傳導、調節鈉/鈣離子通道)』，藉由增強中樞抑制來穩定情緒。選項 A(抑制正腎上腺素/多巴胺再吸收)是抗憂鬱劑機轉;選項中以「增加抑制性 GABA 活性」最能代表 valproate 的作用。故 B 正確。Valproate 透過增強 GABA 抑制系統來達到情緒穩定與抗痙攣效果。","options":{"A":"抑制正腎上腺素/多巴胺再吸收是抗憂鬱劑的機轉。","B":"正確。增加抑制性 GABA 的活性，以穩定情緒。","C":"單純作用於 GABA 接受器並非 valproate 的主要描述。","D":"單純阻斷鈉離子通道並非 valproate 機轉的最佳描述。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","情緒穩定劑"]}},"104030-N5-14":{"quick":"重鬱、強烈自殺意圖需快速療效＝電氣痙攣療法(ECT)。","detail":{"background":"小蘭重度憂鬱、住院後症狀未改善、出現咬舌、拒食拒水等『強烈自殺意圖』。為預防自殺、需『快速』療效時，臨床會採用『電氣痙攣療法(ECT)』——ECT 對嚴重憂鬱、強烈自殺意圖、拒食、藥物治療無效者，起效快、療效顯著，是危急時的選擇。音樂治療、睡眠剝奪療法、光照治療起效較慢或療效有限，不適用於需快速控制的危急自殺。故 B 正確。","options":{"A":"音樂治療起效慢，不適用於危急自殺。","B":"正確。ECT 對嚴重憂鬱、強烈自殺意圖起效快，可達快速療效。","C":"睡眠剝奪療法療效有限、非快速控制危急自殺的選擇。","D":"光照治療主要用於季節性憂鬱，起效較慢。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","ECT"]}},"104030-N5-19":{"quick":"預抽鋰鹽濃度當天：要等抽完血後才能服鋰鹽。","detail":{"background":"游先生當天要抽血測鋰鹽濃度。最佳回應是『因為要抽血檢查血中濃度，要等抽完血後才可以服鋰鹽』——測鋰鹽濃度應在『服藥後約12小時、下次服藥「前」』抽血(谷值)，若提早服藥會使濃度測量失真。A『答應提早服藥』會影響檢驗準確;B『只能早上9點吃』回應僵化、未說明原因;D『去跟醫師說提早』推託、未正確說明。故 C 正確。測鋰鹽濃度當天，須抽完血(服藥前的谷值)後才服藥。","options":{"A":"提早服藥會使濃度測量失真。","B":"「只能9點吃」回應僵化、未說明原因。","C":"正確。要等抽完血(服藥前谷值)後才可以服鋰鹽。","D":"「去跟醫師說提早」是推託、未正確說明。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽監測"]}},"104030-N5-20":{"quick":"68歲喪二子、重鬱、自殺意念入院第1週：定時探視陪伴。","detail":{"background":"張先生68歲、連續喪二子後重鬱、有自殺意念與拒食、入院第1週。最適宜的護理是『定時探視、陪伴張先生』——急性期、有自殺意念者，需主動陪伴以建立關係、提供支持、維護安全。A『協助照顧功能差的病人』、B『參加團體治療增加自信』、C『參與職能治療規劃出院工作』都對急性期、退縮、有自殺風險的重鬱老人過早、要求過高。故 D 正確。對急性期、有自殺意念的重鬱者，定時陪伴、確保安全是首要。","options":{"A":"讓他照顧別人對急性重鬱者要求過高、不當。","B":"參加團體治療對急性退縮者過早。","C":"規劃出院工作對急性、有自殺意念者過早。","D":"正確。定時探視陪伴張先生，建立關係、維護安全。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"104030-N5-21":{"quick":"低落性情感疾患：心情低落的日子較正常為多，且持續超過兩年。","detail":{"background":"低落性情感疾患(Dysthymic disorder，DSM-5 持續性憂鬱症)的正確描述:(C)『心情低落的日子較不低落為多(大部分時間情緒低落)，且持續超過「兩年」(兒童青少年為一年)』。其他錯誤:A 早期發作是指『21歲以前』發作(非25歲);B 低落性情感疾患是『慢性、較輕』的憂鬱，並非「兩年內合併重鬱發作」為其定義(雙重憂鬱是另一概念);D 並非「主要由藥物導致」(若由物質/藥物導致則為其他診斷)。故 C 正確。","options":{"A":"早期發作是指21歲以前發作，非25歲。","B":"其定義非「兩年內合併重鬱發作」。","C":"正確。心情低落的日子較多，且持續超過兩年。","D":"非主要由藥物導致(藥物導致則為其他診斷)。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","持續性憂鬱症"]}},"104030-N5-22":{"quick":"憂鬱、疲倦胃口差躺床、曾有自殺紀錄：鼓勵維持規律的生活作息。","detail":{"background":"吳小姐憂鬱、疲倦、胃口差、多躺床、1年前曾自殺。最合宜的護理是『鼓勵維持規律的生活作息』——規律作息(定時起床、進食、活動)有助改善憂鬱、避免日夜顛倒與過度臥床。A『鼓勵獨處休息』會助長退縮、增加自殺風險;B『競爭性活動』對憂鬱、低能量者壓力過大;D『24小時隨時監視』過度、且非「監視」而是適度的安全維護與陪伴。故 C 正確。對憂鬱者，協助建立規律作息是重要的護理措施(自殺風險另以適度觀察與評估處理)。","options":{"A":"鼓勵獨處會助長退縮、增加自殺風險。","B":"競爭性活動對憂鬱低能量者壓力過大。","C":"正確。鼓勵維持規律的生活作息。","D":"「24小時隨時監視」過度，宜適度安全維護與陪伴。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"104030-N5-36":{"quick":"攻擊週期：促發→擴張→危機→恢復→憂鬱(後憂鬱)階段。","detail":{"background":"攻擊(暴力)週期的發展次序是:『促發階段(triggering)→擴張階段(escalation，激動升高)→危機階段(crisis，暴力爆發)→恢復階段(recovery，情緒漸緩)→憂鬱(後危機/post-crisis)階段(疲憊、悔恨、低落)』。故正確順序為「促發→擴張→危機→恢復→憂鬱」(選 C)。了解此週期有助在「擴張階段」即早介入(言語安撫、設限)，避免進入危機(暴力)階段。","options":{"A":"順序錯誤(危機與擴張、憂鬱位置不對)。","B":"順序錯誤(憂鬱不應在擴張之前)。","C":"正確。促發→擴張→危機→恢復→憂鬱階段。","D":"順序錯誤(憂鬱不在危機之前)。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","攻擊週期"]}},"104100-N5-9":{"quick":"低濃度酒精最先抑制大腦皮質區，再抑制呼吸與生命中樞。","detail":{"background":"精神疾病相關敘述的正確選項:(C)『低濃度酒精「最先」抑制大腦皮質(高級中樞，故先出現去抑制、judgement下降)，濃度更高才抑制呼吸中樞與生命中樞(致命)』。其他錯誤:A 安非他命在尿液中可測得的時間約『1~3天』，非「最快8小時後」的描述;B 老年憂鬱症最典型的是『血清素/正腎上腺素失調』，乙醯膽鹼過低是『阿茲海默症』;D 安非他命『不需持續10年以上』，短期甚至單次大量使用就可能誘發精神病(amphetamine psychosis)。故 C 正確。","options":{"A":"安非他命尿液可測約1~3天，非「最快8小時後」。","B":"乙醯膽鹼過低是阿茲海默症，非老年憂鬱症。","C":"正確。低濃度酒精先抑制大腦皮質，再抑制呼吸與生命中樞。","D":"安非他命短期甚至單次大量使用就可能誘發精神病。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","物質與酒精"]}},"104100-N5-11":{"quick":"生物性憂鬱：DST 後血/尿皮質醇濃度「不受抑制」。","detail":{"background":"生物性憂鬱症的正確敘述:(B)『接受迪皮質醇抑制試驗(DST，給予 dexamethasone)後，憂鬱病人血或尿中皮質醇(cortisol)濃度「不受抑制」(因 HPA 軸過度活化、迴饋抑制失靈)』，是憂鬱症的生物標記之一。其他錯誤:A 憂鬱病人皮質醇常『分泌過多』，非不足;C 並非可體松濃度「不足」;D DST 是給予『低劑量人工合成的 dexamethasone(口服)』，非「注射高劑量天然迪皮質醇」。故 B 正確。","options":{"A":"憂鬱病人皮質醇常分泌過多，非不足。","B":"正確。DST 後血/尿皮質醇不受抑制(HPA 軸過度活化)。","C":"非可體松濃度不足。","D":"DST 是給予低劑量 dexamethasone，非注射高劑量天然藥物。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","DST·憂鬱生物標記"]}},"104100-N5-18":{"quick":"躁症慷慨分送日用品：將需用物品標名、其他代為保管。","detail":{"background":"楊小姐躁鬱、在病房慷慨分送日用品、又想登記購物(躁症的揮霍/失控)。最合宜的護理是『將她需要使用的物品寫上名字，其他的代為保管』——以尊重、保護的方式管理其財物，避免失控揮霍，又維護其基本使用需求與尊嚴。A『沒收並禁止購物』是懲罰、剝奪;C『帶入保護室隔離』過度(僅分送物品、非暴力);D『限制拿物病人的訪客』懲罰他人、未對症。故 B 正確。對躁症揮霍行為，宜在尊重下設限、代為保管。","options":{"A":"沒收並禁止購物是懲罰、剝奪。","B":"正確。需用物品標名、其他代為保管，保護又尊重。","C":"帶入保護室隔離過度(僅分送物品、非暴力)。","D":"限制拿物病人的訪客是懲罰他人、未對症。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症行為設限"]}},"104100-N5-21":{"quick":"躁鬱、具操縱行為的病人：醫療團隊的態度與原則應一致。","detail":{"background":"吳先生躁鬱、具操縱行為(分化、討好/挑撥以達目的)。最適切的護理是『醫療團隊的態度與原則應「一致」』——團隊一致、規則明確，使病人無法分化、操弄不同照護者(這是處理操縱行為的核心)。A『以權威式堅定態度』過於強硬、易對立;C『同理而寬容、給予彈性』反而給操縱空間;D『私下協助』破壞團隊一致性、易被操弄。故 B 正確。對操縱行為，團隊一致、界限清楚是關鍵。","options":{"A":"權威式堅定態度過於強硬、易對立。","B":"正確。醫療團隊的態度與原則應一致，避免被分化操弄。","C":"同理而寬容、給彈性反而給操縱空間。","D":"私下協助破壞團隊一致性、易被操弄。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","操縱行為"]}},"104100-N5-35":{"quick":"自殺：大部分要自殺的人需要情感支持，討論自殺主題可傳遞關懷。","detail":{"background":"關於自殺的正確敘述:(C)『大部分想自殺的人需要情感支持，因此和其討論自殺的主題可以傳遞關懷(並評估風險)』——直接、開放地談自殺「不會」誘發自殺，反而讓病人感到被理解。其他迷思:A『真心自殺的人不會透露訊息』錯誤(多會發出求救訊號);B『情緒好轉自殺威脅就消失』錯誤(恢復期反而更危險);D『只有憂鬱症與精神病患會自殺』錯誤(各種人都可能)。故 C 正確。與自殺者開放討論自殺是傳遞關懷、評估風險的重要做法。","options":{"A":"多數自殺者會發出求救訊號，非不透露。","B":"情緒好轉不代表威脅消失，恢復期更危險。","C":"正確。討論自殺主題可傳遞關懷、評估風險。","D":"各種人都可能自殺，非只有憂鬱症與精神病患。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"104100-N5-40":{"quick":"疑似受暴個案：立即優先＝協助驗傷、療傷並於病歷詳細記錄患處狀況。","detail":{"background":"面對疑似受暴(家暴/受虐)的個案，護理師應『立即優先』進行的是『協助驗傷、療傷，並於病歷詳細記錄患處狀況(部位、大小、形狀、顏色，必要時拍照)』——先確保身體傷害的處置與『完整、客觀的傷勢記錄(作為日後法律證據)』。通報、轉介心理師/緊急安置、輔導父母都是後續處置，但『驗傷療傷與詳實記錄患處』是當下最優先(兼顧醫療與證據保全)。故 D 正確。","options":{"A":"與家屬溝通是否通報是後續，非當下最優先。","B":"轉介、緊急安置是後續處置。","C":"輔導父母是後續處置。","D":"正確。協助驗傷、療傷並於病歷詳細記錄患處狀況。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","家暴·受虐處置"]}},"105030-N5-6":{"quick":"DST 測得憂鬱症病人＝腎皮質激素(cortisol/皮質醇)分泌過度。","detail":{"background":"迪皮質醇抑制試驗(DST)發現憂鬱症病人體內『腎皮質激素(腎上腺皮質醇 cortisol/可體松)分泌過度(且 dexamethasone 無法正常抑制)』——反映憂鬱症的 HPA 軸(下視丘-腦下垂體-腎上腺軸)過度活化。甲狀腺素、生長激素、泌乳激素非 DST 評估的對象。故 A 正確。憂鬱症與皮質醇(腎皮質激素)分泌過度、迴饋抑制失靈有關。","options":{"A":"正確。DST 反映憂鬱症病人腎皮質激素(皮質醇)分泌過度。","B":"甲狀腺素非 DST 評估的對象。","C":"生長激素非 DST 評估的對象。","D":"泌乳激素非 DST 評估的對象。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","DST"]}},"105030-N5-10":{"quick":"不自殺契約：包含承諾某段時間不自傷、或有衝動會主動找工作人員協助。","detail":{"background":"不自殺契約(no suicide contract)的正確敘述:(B)『內容包含病人承諾在「某段特定時間內」不會自傷/自殺，或當有自傷衝動時會「主動找工作人員協助」』——是治療關係下的口頭/書面約定，重點在促進求助與安全。其他錯誤:A 不自殺契約『非一律常規、非所有病人入院都要簽』(須在治療關係與評估基礎上、且其效力有限);C 契約是基於『治療性關係』、非「社交關係」;D 當病人無法遵守時，應『加強評估與保護(如增加觀察、必要時陪伴)』，而非「以隔離保護室」作為制式做法。故 B 正確。","options":{"A":"不自殺契約非一律常規、非所有病人都要簽。","B":"正確。承諾某段時間不自傷、或有衝動會主動求助。","C":"契約基於治療性關係，非社交關係。","D":"無法遵守時應加強評估與保護，非制式隔離保護室。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","不自殺契約"]}},"105030-N5-16":{"quick":"躁症病人打電話報案「被監禁」：與其會談、傾聽其住院的不舒服。","detail":{"background":"劉先生躁症、打電話向警局報案說自己「被監禁、不自由」。最適宜的處理是『與劉先生會談、傾聽其住院的不舒服(感受)』——了解並接納其對住院的不滿與被限制的感受，建立關係並澄清現實。A『立即掛斷電話』是粗暴、未處理;B『限制3天不能打電話』是懲罰;C『予以隔離』過度(僅報案、非暴力)。故 D 正確。對躁症病人的抱怨行為，宜先傾聽、了解感受，再澄清與設限。","options":{"A":"立即掛斷電話是粗暴、未處理問題。","B":"限制3天不能打電話是懲罰。","C":"予以隔離過度，病人僅報案、非暴力。","D":"正確。與劉先生會談、傾聽其住院的不舒服。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症護理"]}},"105030-N5-17":{"quick":"雙相情緒障礙病因「錯誤」者＝與腦內啡(endorphin)濃度異常有高相關性。","detail":{"background":"雙相情緒障礙的病因，敘述「錯誤」者為(D)『與腦內啡(endorphin)濃度異常有高相關性』——雙相障礙主要與『兒茶酚胺/單胺類(正腎上腺素、多巴胺、血清素)』的失調有關，而非腦內啡。其他正確:A 在精神疾病中具有『較高的遺傳性』(雙相的遺傳度高);B 兒茶酚胺『過度分泌或被活化』導致躁症發作;C 病人體內『鈉鹽滯留高於正常人』(離子失衡假說，故鋰鹽治療)。故本題選錯誤者為 D。","options":{"A":"雙相障礙遺傳性高，正確。","B":"兒茶酚胺過度分泌導致躁症，正確。","C":"病人體內鈉鹽滯留高於正常，正確。","D":"正確(本題選錯誤者)。雙相與單胺類失調有關，非腦內啡。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"105030-N5-18":{"quick":"心情糟、3天未進食、沉默寡言：優先＝提供高熱量易消化食物、少量多餐協助進食。","detail":{"background":"張太太憂鬱、『已3天未進食』、沉默寡言。依需求優先順序，最優先的是『提供高熱量、高營養、易消化的食物，協助少量多餐進食』——3天未進食有營養不良、脫水的生理危險，維持基本生理需求是首要。確認負面想法、引導言語表達感受、安排活動都是後續的心理社會處置，須在生理需求穩定後。對拒食的重鬱者，維持營養與進食是當務之急。故 C 正確。","options":{"A":"確認負面想法是後續的認知處置，非優先。","B":"引導言語表達感受是後續的心理處置。","C":"正確。3天未進食有生理危險，優先協助進食。","D":"安排活動是後續處置，非優先。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"105030-N5-19":{"quick":"曾自殺、情緒恢復、預定出院：出院計畫＝提供防範自殺及求救的資訊與管道。","detail":{"background":"張太太住院中曾企圖自殺、現情緒恢復穩定、預定出院。適合的出院計畫是(D)『提供有關防範自殺及求救的資訊與管道(如安心專線、危機求助方式)』——曾自殺者出院後(尤其恢復期)仍有再自殺風險，須提供安全網。其他錯誤:A『將1星期份量藥物給病人保管』錯誤(曾自殺者不宜囤積藥物，有過量風險);B『未來極容易伴隨躁症、提供鋰鹽資訊』不符(鬱症未必轉躁、不應預設);C『一次給1個月藥量』錯誤(曾自殺者宜限量給藥)。故 D 正確。","options":{"A":"曾自殺者不宜囤積藥物(過量風險)。","B":"鬱症未必伴隨躁症，不應預設提供鋰鹽資訊。","C":"曾自殺者宜限量給藥，不宜一次給1個月。","D":"正確。提供防範自殺及求救的資訊與管道。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"105030-N5-20":{"quick":"轉院前詢問他院藥物是否停：建議明天來院時把藥物帶來。","detail":{"background":"朱小姐憂鬱、出院2週症狀未好轉、明天要轉院、家屬詢問他院藥物是否要先停。較適當的回答是(B)『明天來院時，建議把藥物帶來』——讓醫師了解原本用藥、評估療效與調整，不應自行停藥(突然停抗憂鬱劑可能有停藥症狀、且憂鬱會惡化)。A『先停藥降低血中濃度』錯誤(自行停藥不當);C『酌量增加劑量』錯誤(不應自行調量);D『晚上11點後禁食以利ECT』是未經評估的預設。故 B 正確。轉院前宜攜帶原用藥供醫師評估，不自行停藥或調量。","options":{"A":"自行先停藥不當，可能有停藥症狀、憂鬱惡化。","B":"正確。建議明天來院時把藥物帶來，供醫師評估。","C":"不應自行酌量增加劑量。","D":"「禁食以利ECT」是未經評估的預設。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"105030-N5-35":{"quick":"自殺分類：作態性自殺③、自殺成功④正確(自殺意念①、自殺威脅②定義有誤)。","detail":{"background":"自殺分類的正確描述:(3)『作態性自殺(suicide gesture):有自傷的動機/意念、出現不同程度的自傷作為「手段」，以達其真正目標(如引人注意、求助)』;(4)『自殺成功(completed suicide):有自傷動機、計畫及行為，並造成死亡』。而(1)錯誤——『自殺意念』是「『有』想自傷/自殺的「想法」、但無具體計畫」，題目卻寫成「『無』想法」;(2)錯誤——『自殺威脅』是以口頭/書面「表達想自殺的念頭」，但「不一定有具體計畫及行動」，題目卻寫成「亦有具體計畫及行動」。故正確為③④(選 C)。","options":{"A":"12：①②定義皆有誤，錯誤。","B":"23：含②(定義錯)，錯誤。","C":"正確。作態性自殺③、自殺成功④。","D":"14：含①(定義錯)，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","自殺分類"]}},"105030-N5-36":{"quick":"自殺因素：憂鬱症、酒藥癮、思覺失調症是自殺最常見的精神疾病。","detail":{"background":"自殺因素的正確敘述:(C)『憂鬱症、酒藥癮、思覺失調症是自殺最常見的精神疾病』(精神疾病是自殺的重要危險因子，其中憂鬱症最常見)。其他錯誤:A 神經傳導物質中血清素濃度『偏低』與自殺/衝動行為有關，非偏高;B 有自殺家族史者比沒有的人具有『較高(非較低)』的自殺比例;D 遺傳是自殺的『因素之一，並非唯一』生理因素(尚有神經傳導物質、疾病等)。故 C 正確。","options":{"A":"血清素濃度偏「低」與自殺有關，非偏高。","B":"有自殺家族史者自殺比例較高，非較低。","C":"正確。憂鬱症、酒藥癮、思覺失調症是自殺最常見的精神疾病。","D":"遺傳是因素之一，非唯一生理因素。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"105030-N5-42":{"quick":"有自殺企圖者(高危險群)的防治策略＝追蹤並提供關懷訪視。","detail":{"background":"針對「有自殺企圖者(已是高危險群)」的防治策略，最適當的是(D)『追蹤並提供自殺高危險族群「關懷訪視」』——這屬於『選擇性/三級(指標性)防治』，針對已有自殺企圖者進行持續追蹤關懷，降低再自殺。A『守門人訓練』、B『非精神科人員教育訓練』、C『24小時免付費安心專線』都是針對『一般大眾/初級(全面性)防治』。對「有自殺企圖的高危險者」，個別化的追蹤關懷訪視最對應。故 D 正確。","options":{"A":"守門人訓練屬一般/初級防治。","B":"非精神科人員教育訓練屬初級防治。","C":"安心專線屬針對一般民眾的初級防治。","D":"正確。追蹤並提供自殺高危險族群關懷訪視。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"105090-N5-2":{"quick":"依行為理論：憂鬱是「習得的無望感(習得無助)」。","detail":{"background":"蔡同學鬱症的相關敘述:(B)『依「行為(學習)理論」，憂鬱屬於一種「學習而來的無望感(習得無助 learned helplessness，Seligman)」』——個體經歷多次無法控制的挫折後，學到「再努力也沒用」的無望感而憂鬱。其他錯誤:A 精神分析理論認為憂鬱是『憤怒/攻擊「朝向自我(內射)」』，而非「投射」;C 單胺假說認為憂鬱是『單胺(血清素等)「不足」』，而非「單胺氧化酶過高」造成(雖單胺氧化酶過高會分解單胺，但描述方式以「單胺不足」為主);D 遺傳因素『不代表「一定」合併其他精神疾病』。故 B 正確。","options":{"A":"精神分析認為憂鬱是憤怒朝向自我(內射)，非投射。","B":"正確。行為理論認為憂鬱是習得的無望感(習得無助)。","C":"單胺假說是單胺不足，非氧化酶過高的描述。","D":"遺傳因素不代表一定合併其他精神疾病。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","憂鬱症病因理論"]}},"105090-N5-3":{"quick":"覺得護理師像大姐而格外信賴＝轉移(情感轉移 transference)作用。","detail":{"background":"周先生覺得主護張護理師「和照顧他的大姐很相像」，因此格外信賴、配合——這是把『對「大姐」的情感(信賴、依附)，轉移到護理師身上』，屬『轉移(情感轉移 transference/displacement)作用』。幻想作用是以想像滿足慾望;轉化作用是心理衝突轉為身體症狀;補償作用是以其他成就彌補不足。本題核心是『把對某人的情感轉移到護理師』，故為轉移作用。","options":{"A":"幻想作用是以想像滿足慾望。","B":"轉化作用是心理衝突轉為身體症狀。","C":"補償作用是以其他成就彌補不足。","D":"正確。把對大姐的情感轉移到護理師，是轉移(情感轉移)作用。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","防衛機轉·轉移"]}},"105090-N5-19":{"quick":"雙相、腎功能不佳：較不適合使用鋰鹽(Lithium，經腎排除)。","detail":{"background":"雙相情緒障礙病人若『腎功能不佳』，最不適合的藥物是(D)『鋰鹽(Lithium)』——鋰鹽幾乎完全經『腎臟排除』，腎功能不佳會使鋰鹽蓄積、易中毒，故腎功能差者應避免或極謹慎使用。Quetiapine(Seroquel)、Carbamazepine(Tegretol)、Valproic Acid(Depakine)主要經肝代謝，相對較適合腎功能不佳者。故 D 正確。鋰鹽用於腎功能不佳者須特別小心(易中毒)。","options":{"A":"Quetiapine 主要經肝代謝，腎功能不佳相對可用。","B":"Carbamazepine 主要經肝代謝。","C":"Valproic Acid 主要經肝代謝。","D":"正確。鋰鹽經腎排除，腎功能不佳者較不適合(易中毒)。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽·腎功能"]}},"105090-N5-20":{"quick":"躁症首次出院、問何時停藥：配合醫囑規則服藥，不要自行減藥或停藥。","detail":{"background":"對首次出院的躁症病人，當其詢問何時可停藥，較佳的回應是(B)『配合醫囑規則服藥，不要自己減藥或停藥』——強調規則服藥、依醫囑調整，避免自行停藥導致復發。A『這沒有標準答案』敷衍、未衛教;C『解釋藥物是醫師的職責』推託(護理師應提供用藥衛教);D『你應該要吃藥一輩子』過於絕對、可能引起抗拒(服藥時程依個別狀況由醫師決定)。故 B 正確。出院衛教應強調依醫囑規則服藥、不自行停減。","options":{"A":"「沒有標準答案」敷衍、未衛教。","B":"正確。配合醫囑規則服藥，不要自己減藥或停藥。","C":"「藥物是醫師的職責」是推託，護理師應衛教。","D":"「吃藥一輩子」過於絕對，可能引起抗拒。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","服藥衛教"]}},"105090-N5-21":{"quick":"躁期最不可能出現＝對事情有想法並能計劃完成。","detail":{"background":"雙相情緒障礙躁期最「不可能」出現的是(B)『對事情有想法並「能計劃完成」』——躁期雖點子多、想法多，但因『注意力分散、衝動、無法持續』，常『無法完成計畫』。而 A 睡眠需求減少、C 無法克制地說個不停(pressured speech)、D 膨脹的自尊心都是躁期的典型症狀。故本題選最不可能者為 B。躁期的特徵是高活動但缺乏持續性與完成度。","options":{"A":"睡眠需求減少是躁期典型症狀。","B":"正確(本題選最不可能者)。躁期注意力分散、衝動，常無法完成計畫。","C":"無法克制地說個不停(pressured speech)是躁期症狀。","D":"膨脹的自尊心是躁期症狀。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症"]}},"105090-N5-31":{"quick":"長期受債主催討、走投無路而自殺＝Durkheim 致命型自殺(fatalistic)。","detail":{"background":"依 Durkheim 的自殺分類:(B)『致命型(宿命型)自殺(fatalistic suicide)』是個體長期處於『過度的社會規範/壓迫、走投無路、無法擺脫』的處境下而自殺(陳先生長期受債主催討、被壓迫到無出路)。利他型是為團體/他人犧牲;社會混亂(脫序)型是社會規範突然崩解(如突發經濟劇變);自我(利己)型是與社會連結薄弱、孤立。本題強調『長期受催討、過度壓迫無法擺脫』，依答案歸為致命型自殺。故 B 正確。","options":{"A":"利他型是為團體/他人犧牲而自殺。","B":"正確。長期受債主催討、過度壓迫無出路，屬致命型(宿命型)自殺。","C":"社會混亂型是社會規範突然崩解所致。","D":"自我(利己)型是與社會連結薄弱、孤立所致。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","Durkheim 自殺分類"]}},"106030-N5-11":{"quick":"使鋰鹽血中濃度上升的藥物：ACEI②、NSAID③、利尿劑④(SNRI①非)。","detail":{"background":"會使鋰鹽血中濃度上升(中毒風險)的藥物:(2)ACE 抑制劑(如 captopril，減少鋰排除);(3)NSAID(如 ibuprofen，減少腎血流與鋰排除);(4)利尿劑(如 thiazide，使鈉排出增加、鋰再吸收增加)。而(1)SNRI(如 venlafaxine)主要影響血清素/正腎上腺素回收，並非透過減少腎排除而顯著升高鋰濃度(且合併使用須注意血清素症候群，但非「升高鋰濃度」的典型藥物)。故正確為②③④(選 D)。","options":{"A":"①②③：含①(SNRI)，非典型升高鋰濃度者。","B":"①②④：含①，錯誤。","C":"①③④：含①，錯誤。","D":"正確。ACEI②、NSAID③、利尿劑④會使鋰鹽濃度上升。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽藥物交互作用"]}},"106030-N5-17":{"quick":"躁期、注意力分散、進食量少：最優先護理目標＝協助獲得足夠的營養與休息。","detail":{"background":"丁小姐躁期、注意力分散、忙碌、話多、活動量大、『進食量少』。最優先的護理目標是『協助獲得足夠的營養與休息』——躁期病人高消耗、進食少、睡眠少，易致營養不良與體力耗竭(生理需求優先)。B『安排激烈活動發洩精力』錯誤(會更激動、更耗竭);C『增強處理壓力能力』是後續的心理目標;D『約束以防傷害』在無暴力時過度。故 A 正確。對躁期病人，維持營養與休息是首要的生理需求。","options":{"A":"正確。躁期高消耗、進食少，優先協助獲得足夠營養與休息。","B":"安排激烈活動會更激動、更耗竭。","C":"增強處理壓力能力是後續的心理目標。","D":"無暴力時約束過度。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症護理"]}},"106030-N5-18":{"quick":"躁期性脫抑制(進出男病房、要做女朋友)：轉移注意力或提醒要尊重別人。","detail":{"background":"丁小姐躁期『進出男病房、躺男病人床、對實習醫師說要做女朋友』(躁期的性脫抑制行為)。最合宜的反應是『轉移其注意力，或提醒其要尊重別人(設限)』——以轉移與適度設限的方式處理脫抑制行為，保護病人與他人。B『限制在病室內活動』過度限制;C『無需處置、因是症狀』放任不當行為;D『勸她說話前要經過大腦、以免貽笑他人』是嘲諷、羞辱。故 A 正確。對躁期脫抑制行為宜轉移注意力並適度設限。","options":{"A":"正確。轉移注意力或提醒要尊重別人，適度設限。","B":"限制在病室內活動過度限制。","C":"「無需處置、因是症狀」放任不當行為。","D":"「說話前要經過大腦」是嘲諷、羞辱。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症·脫抑制"]}},"106030-N5-19":{"quick":"鋰鹽濃度1.2 mEq/L(治療範圍內)：持續服用，密切監測濃度是否上升。","detail":{"background":"丁小姐血中鋰鹽濃度1.2 mEq/L——仍在『治療範圍內(急性躁症約1.0~1.5、維持期約0.6~1.2)』，尚未中毒。故應優先『持續服用，但密切監測血中鋰鹽濃度是否上升』(以免超過治療範圍而中毒)。A『已達中毒應暫停』錯誤(1.2未達中毒);C『通知醫師立即減藥』、D『立即停藥補體液』都言之過早(尚在治療範圍)。故 B 正確。1.2 mEq/L 在治療範圍內，宜續服並監測。","options":{"A":"1.2未達中毒濃度(>1.5才中毒)，不應暫停。","B":"正確。仍在治療範圍，持續服用並密切監測濃度。","C":"通知醫師立即減藥言之過早。","D":"立即停藥補體液過度(尚在治療範圍)。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽監測"]}},"106030-N5-20":{"quick":"鋰鹽中毒常見症狀：意識障礙①、腹瀉②、肢體僵硬③。","detail":{"background":"鋰鹽中毒的常見症狀涵蓋『腸胃道』與『神經系統』:(1)意識障礙(嗜睡、混亂);(2)腹瀉(噁心嘔吐、腹瀉等腸胃道症狀是早期中毒表現);(3)肢體僵硬/粗大顫抖、肌肉抽動、運動失調。本題依答案以①②③為常見中毒症狀(選 A)。(註:嚴重中毒亦可見眼球震顫、抽搐，但本題以意識障礙、腹瀉、肢體僵硬為答。)鋰鹽中毒應記得「腸胃道+神經」症狀，並立即停藥、就醫。","options":{"A":"正確。意識障礙①、腹瀉②、肢體僵硬③是鋰鹽中毒常見症狀。","B":"②③④：缺①(意識障礙)，本題答案為①②③。","C":"①②④：本題答案為①②③。","D":"①③④：本題答案為①②③。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽中毒"]}},"106030-N5-22":{"quick":"憂鬱(林女士)的護理：最優先＝評估自殺危險程度。","detail":{"background":"針對憂鬱症病人(林女士)的護理措施，最優先考量的是『評估自殺危險程度』——憂鬱症自殺風險高，評估並維護安全是第一優先(確保病人安全後，才進行其他處置)。協助家庭治療、協助進食、安排簡單活動都是後續的處置。對憂鬱病人，首要是評估自殺風險、確保安全。故 D 正確。","options":{"A":"協助安排家庭治療是後續處置。","B":"協助進食是重要但非最優先(先評估自殺安全)。","C":"安排簡單活動是後續處置。","D":"正確。憂鬱症自殺風險高，最優先評估自殺危險程度。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"106030-N5-23":{"quick":"改善憂鬱症(林女士)的主要藥物＝Fluoxetine(Prozac，SSRI)。","detail":{"background":"林女士為憂鬱症，改善其症狀的主要治療藥物是『Fluoxetine(Prozac)』——屬選擇性血清素回收抑制劑(SSRI)，是憂鬱症的第一線抗憂鬱劑。Risperidone(Risperdal)、Quetiapine(Seroquel)是抗精神病藥(用於精神病性症狀、躁症);Lithium carbonate 是情緒穩定劑(用於躁症/雙相)。對憂鬱症，SSRI(fluoxetine)是主要治療藥物。故 C 正確。","options":{"A":"Risperidone 是抗精神病藥，非憂鬱症主要用藥。","B":"Quetiapine 是抗精神病藥(用於躁症/精神病)。","C":"正確。Fluoxetine(Prozac，SSRI)是憂鬱症的主要治療藥物。","D":"Lithium 是情緒穩定劑，用於躁症/雙相。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","抗憂鬱劑"]}},"106030-N5-24":{"quick":"躁症臨床特徵：活動量增加①、意念飛躍②、注意力分散④(體重增加③非)。","detail":{"background":"躁症發作(manic episode)的臨床特徵:(1)活動量增加(精力旺盛、坐立難安);(2)意念飛躍(思考快速跳躍);(4)注意力分散(易受外界刺激轉移)。而(3)『體重增加』錯誤——躁症病人因『活動量大、進食少、無暇進食』，常『體重減輕』而非增加。故正確為①②④(選 D)。躁症的核心是情緒高昂、活動增加、意念飛躍、注意力分散、睡眠需求減少、體重下降。","options":{"A":"①②③：含③(體重增加)，躁症多體重減輕。","B":"②③④：含③，錯誤。","C":"①③④：含③，錯誤。","D":"正確。活動量增加①、意念飛躍②、注意力分散④。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症"]}},"106030-N5-38":{"quick":"自殺：邊緣性人格障礙症病人易出現反覆的自殺/自傷行為。","detail":{"background":"關於自殺的正確敘述:(A)『邊緣性人格障礙症的病人易出現「反覆」的自殺/自傷行為』(衝動、情緒不穩、害怕被遺棄是其特徵)。其他錯誤:B 依統計『65歲以上老年人的自殺率「高於」青少年』，非青少年多於老年;C『男性的自殺「死亡率」高於女性』(女性自殺企圖較多，但男性因方法致命而死亡率高);D 自殺病人中最常見的精神科診斷是『憂鬱症』，非思覺失調症。故 A 正確。","options":{"A":"正確。邊緣性人格障礙病人易出現反覆自殺/自傷行為。","B":"老年(65歲以上)自殺率高於青少年。","C":"男性自殺死亡率高於女性。","D":"自殺病人中最常見的診斷是憂鬱症，非思覺失調症。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","人格障礙·自殺"]}},"106110-N5-9":{"quick":"環境治療：躁症減低過度刺激①、監視憂鬱防自殺②、提供思覺失調新認同對象③(行為失控即刻約束④錯)。","detail":{"background":"環境治療(milieu therapy)的正確措施:(1)躁症病人應『減低過度的環境刺激』(安排安靜、簡單的環境);(2)『監視/觀察憂鬱症病人以防自殺行為』(維護安全);(3)『提供思覺失調症病人新的(健康的)認同對象』(治療性人際)。而(4)『行為失控時「即刻」使用身體約束及保護隔離』錯誤——約束/隔離是『最後手段』，應先以言語安撫、設限、藥物等較少限制的方式處理。故正確為①②③(選 A)。","options":{"A":"正確。躁症減低刺激①、監視憂鬱防自殺②、提供思覺失調新認同對象③。","B":"234：含④(即刻約束)，錯誤。","C":"124：含④，錯誤。","D":"134：含④，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","環境治療"]}},"106110-N5-15":{"quick":"躁症病人不斷投書院長提建議：了解其症狀行為、予以適當討論。","detail":{"background":"王先生躁症、不斷投書院長對病房設施提建議(躁期的誇大、過度涉入、活動量大)。最適宜的處置是『了解王先生的症狀行為，予以適當的討論(設限與引導)』——以理解症狀為基礎、適度討論並設限。B『向院長解釋其病況』未直接處理病人;C『協助達成所提建議』是配合其失控行為;D『肯定鼓勵其關心行為』會強化此行為。故 A 正確。對躁期的過度行為，宜理解症狀、適當討論並設限。","options":{"A":"正確。了解王先生的症狀行為、予以適當的討論與設限。","B":"向院長解釋病況未直接處理病人。","C":"協助達成所提建議是配合其失控行為。","D":"肯定鼓勵其關心行為會強化此行為。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症護理"]}},"106110-N5-16":{"quick":"躁症易受刺激而躁動：安排較簡單、安靜的空間。","detail":{"background":"王先生躁症、容易受環境刺激而更躁動不安。最適宜的措施是『安排較簡單、安靜的空間(減少環境刺激)』——降低過度刺激可減緩躁動。B『請他進保護室』過度(僅躁動、非暴力);C『戴耳機阻隔聲音』未必有效、可能更躁;D『參與團體心理治療』對易受刺激的躁症病人是過度刺激、不適合。故 A 正確。對躁症病人，提供低刺激、安靜、簡單的環境是基本的環境治療。","options":{"A":"正確。安排較簡單、安靜的空間，減少環境刺激。","B":"請進保護室過度(僅躁動、非暴力)。","C":"戴耳機阻隔聲音未必有效、可能更躁。","D":"團體心理治療對易受刺激的躁症病人是過度刺激。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症·環境治療"]}},"106110-N5-23":{"quick":"自殺防治：有家族自殺行為者是高危險群。","detail":{"background":"自殺防治的正確敘述:(C)『有家族自殺行為(自殺家族史)者是高危險群』(遺傳體質+環境學習)。其他迷思:A 自殺『具有「模仿效應(維特效應)」』(媒體不當報導會誘發模仿),非「不具」;B 自殺後的『再自殺風險「高」(曾自殺者再自殺風險增高)』，非低;D 自殺多『有預警(發出求救訊號)』，非「毫無預警」。故 C 正確。","options":{"A":"自殺具有模仿效應(維特效應)。","B":"曾自殺者的再自殺風險高，非低。","C":"正確。有家族自殺行為者是高危險群。","D":"自殺多有預警(求救訊號)，非毫無預警。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"106110-N5-33":{"quick":"自殺敘述「錯誤」者＝血清素「過多」會產生憂鬱及自殺(應為過少)。","detail":{"background":"自殺相關敘述，「錯誤」者為(B)『神經傳導物質血清素「過多」時會產生憂鬱及自殺行為』——應為血清素『「過少/不足」』與憂鬱及衝動、自殺行為有關。其他正確:A 蘇利文(Sullivan)人際理論認為自殺是個體處理人際衝突失敗的結果;C 得雷克(Drake)認為自殺強度與「無助及無望感」程度有關(非與憂鬱程度本身);D 史奈曼(Shneidman)指出自殺者的認知是「自我矛盾(ambivalence，既想死又想被救)」。故本題選錯誤者為 B。","options":{"A":"蘇利文人際理論的觀點，正確。","B":"正確(本題選錯誤者)。應為血清素「過少」與憂鬱及自殺有關。","C":"得雷克認為自殺強度與無助無望感有關，正確。","D":"史奈曼指出自殺者認知是自我矛盾，正確。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"106110-N5-38":{"quick":"70歲、揚言自焚的自殺防範：依評估的危險程度，採每15分鐘密切觀察。","detail":{"background":"張先生70歲、獨居、以死抗議、揚言自焚(高自殺風險)。自殺防範護理措施中，最適宜的是(A)『依據評估的自殺危險程度，採取「每15分鐘」密切觀察(必要時更密集或一對一)』——以密切觀察維護安全是核心。B『建議請「看護」一對一陪伴』錯誤(自殺防範應由「專業人員」執行，非看護);C『協助與政府溝通延緩拆除』是處理外在壓力源、非當下自殺防範措施;D『儘早安置、轉慢性病房』不符當下的危機處置。故 A 正確。對高自殺風險者，依危險程度密切觀察是首要。","options":{"A":"正確。依評估的危險程度採每15分鐘密切觀察。","B":"自殺防範應由專業人員執行，非請看護。","C":"協助與政府溝通是處理壓力源，非當下自殺防範。","D":"儘早安置、轉慢性病房不符當下危機處置。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"106111-N5-12":{"quick":"國小車禍後個性退縮孤僻＝發病的潛在(predisposing)因素。","detail":{"background":"雙相情緒障礙病因因素的正確配對:(B)『她在國小經歷車禍、之後個性變得退縮孤僻——這種「早於發病、增加易感性」的因素，是「潛在(體質)因素(predisposing factor)」』。其他錯誤:A 嬰幼兒期父母離婚是『潛在因素(早年經歷)』，而非「促發因素」;C 家人「只是想太多、休息就好」的態度『會影響預後，算是「續存(perpetuating)因素」』，並非「不算」;D 三個月前生產(產後)『即使足月順產，產後仍是可能的「促發因素」』(產後是情緒障礙的高風險期)。故 B 正確。","options":{"A":"嬰幼兒期離婚是潛在因素(早年經歷)，非促發因素。","B":"正確。國小車禍後退縮孤僻，是潛在(體質)因素。","C":"家人態度會影響預後，算續存因素，非不算。","D":"產後即使順產仍可能是促發因素(產後高風險)。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","病因因素"]}},"106111-N5-20":{"quick":"躁症揮霍買30條手環四處送人：與病人共同討論贈送物品的適度性。","detail":{"background":"金小姐雙相躁期、花3萬買30條手環四處送人、也要送實習護生(躁期揮霍/脫抑制)。最正確的處理是(C)『與病人「共同討論」贈送物品的適度性』——以討論、引導的方式協助病人覺察其行為、學習適度，兼具尊重與設限。A『轉知學校老師處理』迴避、未直接處理病人;B『代為婉拒、說明學校規定』只處理收禮的單一面向;D『教導不要四處贈送』是單向命令、未促進覺察。故 C 正確。對躁症的揮霍贈與，宜共同討論、引導其覺察與設限。","options":{"A":"轉知學校老師處理是迴避、未直接處理病人。","B":"代為婉拒只處理收禮的單一面向。","C":"正確。與病人共同討論贈送物品的適度性。","D":"單向命令「不要贈送」未促進覺察。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症護理"]}},"106111-N5-30":{"quick":"青少年憂鬱：症狀涵蓋認知情緒行為生理②、女性盛行率高③、嚴重合併症為自殺④(屬內向性障礙、非外向①)。","detail":{"background":"青少年憂鬱症的正確敘述:(2)症狀範圍包括『認知、情緒、行為及生理』層面;(3)研究發現『女性盛行率高於男性』(青春期後尤明顯);(4)嚴重的合併症之一為『自殺』。而(1)錯誤——青少年憂鬱症屬於『「內向性(internalizing)障礙」(以內在的情緒困擾為主)』，而非「外向性(externalizing)障礙(行為外顯的破壞/攻擊)」。故正確為②③④(選 B)。","options":{"A":"123：含①(外向性障礙)，憂鬱屬內向性，錯誤。","B":"正確。症狀涵蓋四層面②、女性盛行率高③、合併症為自殺④。","C":"134：含①，錯誤。","D":"124：含①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","青少年憂鬱"]}},"106111-N5-38":{"quick":"因配偶外遇、被情人拋棄(關係/規範突然失去)而自殺＝失範型(anomic)自殺。","detail":{"background":"依涂爾幹(Durkheim)自殺分類，『因配偶外遇、被情人拋棄等「重大關係/生活結構突然瓦解、社會規範失序」而自殺』，屬『失範型(社會混亂型 anomic suicide)』——當個體原有的社會連結/規範突然崩解、失去依歸時的自殺。利己(自我)型是與社會連結薄弱、孤立;利他型是為團體犧牲;宿命(致命)型是過度規範壓迫無出路。本題核心是『關係/生活結構突然瓦解』，故為失範型。故 C 正確。","options":{"A":"利己型是與社會連結薄弱、孤立所致。","B":"利他型是為團體/他人犧牲所致。","C":"正確。關係/規範突然瓦解所致，是失範型(anomic)自殺。","D":"宿命型是過度規範壓迫、無出路所致。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","Durkheim 自殺分類"]}},"107030-N5-18":{"quick":"躁症好辯爭論：了解雙方的想法、適時引導與澄清。","detail":{"background":"謝太太躁症(情緒高昂、誇大、意念飛躍、好管閒事)、與護生爭辯。主護護理師適宜的處理是(D)『了解雙方的想法，適時引導與澄清』——以理解、引導、澄清的方式化解爭論，不與躁症病人正面對抗。A『順其自然、中立』太被動;B『擬定行為約定規範互動』在當下爭論的情境不是首要(且像強制);C『制止不當言行、降低自大心態』是壓制、貶低，會升高對抗。故 D 正確。對躁症的好辯，宜了解、引導、澄清，避免正面衝突。","options":{"A":"順其自然、中立太被動。","B":"當下擬定行為約定不是首要、且像強制。","C":"制止言行、降低自大是壓制貶低，會升高對抗。","D":"正確。了解雙方的想法、適時引導與澄清。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症護理"]}},"107030-N5-20":{"quick":"躁症發作的症狀需持續至少＝一週。","detail":{"background":"依 DSM-5，躁症發作(manic episode)的診斷需『情緒高昂/易怒且活動或精力增加的狀態持續至少「一週」(若需住院則不受此期限限制)』，並合併至少3項(若情緒為易怒則需4項)躁症症狀(誇大、睡眠需求減少、多話、意念飛躍、注意力分散、活動增加、過度從事高風險享樂活動)。故 A 正確。(對照:輕躁發作至少持續4天。)","options":{"A":"正確。躁症發作的症狀需持續至少一週。","B":"二週是重鬱發作的期限，非躁症。","C":"三週並非躁症的診斷期限。","D":"四週並非躁症的診斷期限。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","DSM-5 躁症"]}},"107030-N5-22":{"quick":"憂鬱症最容易自殺的期間＝病情恢復(復原)時。","detail":{"background":"憂鬱症病人最容易發生自殺的期間是『病情「恢復(復原期)」時』——在憂鬱「極重度」時，病人因『精力、動機嚴重不足、行動遲滯』而「無力」執行自殺;當病情『稍恢復、精力與行動力回升(但情緒仍低、無望感仍在)』時，反而「有能力」付諸自殺行動，故此期自殺風險最高。故 D 正確。對憂鬱病人，恢復期的自殺防範尤其重要。","options":{"A":"極重度時因精力嚴重不足，反而無力執行自殺。","B":"重度時行動遲滯，自殺執行力較低。","C":"中度時非自殺風險最高期。","D":"正確。恢復期精力回升但情緒仍低，自殺風險最高。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"107030-N5-38":{"quick":"面對自殺議題的態度：運用護理專業，盡最大可能防範個人自我傷害。","detail":{"background":"林小姐有自殺意念、拒絕住院。護理師面對自殺議題應抱持的態度是(C)『運用護理專業，盡最大可能防範個人自我傷害』——維護生命、預防自殺是專業責任與倫理(行善、不傷害原則)。A『自殺是個人選擇、應尊重自主權』錯誤(處於精神症狀/危機下的自殺意念不能等同自主決定，且生命維護優先);B『出於自由意志、無法防範』錯誤(消極放棄);D『高功能自閉者不應被強制住院』錯誤(達強制住院要件時仍可依法處理)。故 C 正確。防範自殺、維護生命是護理的專業責任。","options":{"A":"危機下的自殺意念不能等同自主決定，生命維護優先。","B":"「無法防範」是消極放棄，不符專業責任。","C":"正確。運用護理專業，盡最大可能防範個人自我傷害。","D":"達強制住院要件時仍可依法處理，非不應。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"107110-N5-12":{"quick":"多次輕躁發作＋憂鬱症狀＝第二型雙相情緒障礙症(bipolar II)。","detail":{"background":"情緒障礙疾患的正確敘述:(B)『若有多次「未達躁症程度的輕躁(hypomania)發作」，加上「重鬱發作」，則稱為第二型雙相情緒障礙症(bipolar II disorder)』。其他錯誤:A 更年期後的鬱症『也會有入睡困難或睡眠中斷』(早醒是憂鬱常見，但非「不會有」入睡困難);C 躁症症狀需持續『至少一週(住院則不限)』即可診斷，並非「六個月」;D 意念飛躍時思考雖快，但『缺乏組織、無法持續、會「損害」功能』，並非「展現執行力與領導力」。故 B 正確。","options":{"A":"更年期後鬱症也會有入睡困難或睡眠中斷。","B":"正確。多次輕躁發作＋憂鬱＝第二型雙相情緒障礙症。","C":"躁症症狀持續至少一週即可診斷，非六個月。","D":"意念飛躍缺乏組織、會損害功能，非展現執行力。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","雙相分型"]}},"107110-N5-15":{"quick":"季節性鬱症較常在秋季③、冬季④發作。","detail":{"background":"季節性情感障礙(季節性鬱症)最常見的型態是『秋冬型』——病人較常在『秋季③、冬季④』(日照變短)感到情緒低落，到春夏日照變長時改善，與『日照不足、褪黑激素/血清素調節』有關，可用『光照治療』。故較常發作的季節為秋、冬(選 B)。(少數為春夏型，但典型是秋冬型。)","options":{"A":"12(春夏)：非典型季節性鬱症的發作季節。","B":"正確。季節性鬱症較常在秋季③、冬季④發作。","C":"13(春秋)：非典型。","D":"14(春冬)：非典型(春非典型發作季)。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","季節性情感障礙"]}},"107110-N5-17":{"quick":"躁症的護理問題：社交互動障礙①、睡眠型態紊亂③、思考過程改變④(自殺企圖②非躁症典型)。","detail":{"background":"劉小姐雙相躁症發作(情緒高昂、整日忙碌、意念飛躍、誇大、要別人聽她指揮)。最可能的護理問題:(1)社交互動障礙(脫抑制、干擾他人);(3)睡眠型態紊亂(睡眠需求減少、不睡);(4)思考過程改變(意念飛躍、誇大)。而(2)『自殺企圖』非躁症發作時的典型護理問題(自殺企圖較常見於「憂鬱」期)。故正確為①③④(選 B)。","options":{"A":"123：含②(自殺企圖)，非躁症典型。","B":"正確。社交互動障礙①、睡眠型態紊亂③、思考過程改變④。","C":"234：含②、缺①，錯誤。","D":"124：含②，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症護理"]}},"107110-N5-18":{"quick":"服鋰鹽出現腹瀉、手抖、噁心嘔吐(中毒徵兆)：最優先＝與團隊討論測血中鋰鹽濃度。","detail":{"background":"林先生躁症急性期、進食量減少、服鋰鹽後出現『腹瀉、手抖、噁心嘔吐』——這些是『鋰鹽中毒的早期徵兆』(尤其進食/飲水減少易使鋰濃度上升)。最優先的處置是(C)『與醫療團隊討論、「測量血中鋰鹽濃度」』——以確認是否中毒、據以調整。協助進食、記錄體重、觀察飲食都是後續或次要。出現疑似中毒徵兆時，優先確認血中濃度。故 C 正確。","options":{"A":"協助進食是次要，當務之急是確認是否鋰鹽中毒。","B":"記錄體重變化是後續監測，非最優先。","C":"正確。出現中毒徵兆，優先與團隊討論測血中鋰鹽濃度。","D":"觀察飲食狀況是次要，非最優先。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽中毒"]}},"107110-N5-20":{"quick":"躁症出現攻擊行為的處置「不適當」＝立即與病人討論其攻擊行為。","detail":{"background":"蔡先生躁症、要求外出抽菸被拒後出現攻擊行為。處置「不適當」者為(A)『「立即」與病人討論其攻擊行為』——在病人攻擊、情緒激動的當下，不宜立即進行理性「討論」(應先確保安全、設限、必要時約束，「討論行為」應在情緒平穩「之後」進行)。其他適當:B 鼓勵用「言語」表達憤怒(替代攻擊);C 以堅定口氣指示適當行為(設限);D 若無法控制衝動，可帶入保護室。故本題選不適當者為 A。","options":{"A":"正確(本題選不適當者)。攻擊當下不宜立即理性討論，應先確保安全、設限。","B":"鼓勵用言語表達憤怒是適當的替代。","C":"以堅定口氣指示適當行為(設限)是適當的。","D":"無法控制衝動時帶入保護室是適當的。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","暴力處置"]}},"107110-N5-23":{"quick":"話題不斷快速跳躍(討厭吃藥→病友打鼾→想抽菸→醫師何時來)＝意念飛躍(flight of ideas)。","detail":{"background":"武先生躁症發作、說話『主題快速跳躍(從討厭吃藥→病友打鼾→想抽菸→醫師何時來)、但各主題間仍有些微關聯』，屬『意念飛躍(flight of ideas)』，是躁症的典型思考障礙。語無倫次(incoherence)是字句完全破碎、無法理解;說話繞圈(circumstantiality)是繞圈但最終回到主題;字句拼盤(word salad)是字詞毫無關聯地堆疊。本題是『主題快速跳躍但有關聯』，故為意念飛躍。故 C 正確。","options":{"A":"語無倫次是字句完全破碎、無法理解。","B":"說話繞圈是繞圈但最終會回到主題。","C":"正確。主題快速跳躍但有些微關聯，是意念飛躍。","D":"字句拼盤是字詞毫無關聯地堆疊。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症·思考障礙"]}},"107110-N5-31":{"quick":"65歲以上老年人：自殺率高於60歲以下成年人。","detail":{"background":"老年人自殺的正確敘述:(B)『老年人的自殺率高於60歲以下成年人』(老年是自殺的高風險族群，與慢性病、失能、孤立、喪偶、憂鬱有關)。其他錯誤:A 自殺『身亡』人數『男性高於女性』(女性企圖多、男性方法致命而死亡率高);C 老年人自殺死亡率『未逐年降低(仍偏高)』;D 老年人自殺的主要危險因子是『憂鬱症、慢性疾病、孤立、喪偶』，失智症本身並非典型的主要自殺危險因子(本題以 B 為正解)。故 B 正確。","options":{"A":"自殺身亡人數男性高於女性。","B":"正確。老年人的自殺率高於60歲以下成年人。","C":"老年人自殺死亡率未逐年降低，仍偏高。","D":"老年自殺主因是憂鬱、慢病、孤立，失智非典型主要危險因子。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","老年自殺"]}},"107110-N5-38":{"quick":"自殺危險評估：以「還有什麼想法?這個想法有多強烈?」評估自殺意念的內容與強度。","detail":{"background":"林小姐透露自殺意念(存在造成家人困擾、想解脫、問吃安眠藥會不會死)。要進行自殺危險程度評估，最適當的回應是(D)『「還有什麼想法閃過心頭?這個想法有多強烈?」』——直接、開放地評估其自殺意念的「內容、頻率、強度」(危險程度評估的核心)。A『陪你去活動轉移心情』是迴避、未評估;B『談談家人對你做了什麼』偏離自殺評估、且可能引導歸咎;C『安眠藥不會死、談談如何活著』先否定再說教。故 D 正確。評估自殺危險，應直接探詢意念的內容與強度。","options":{"A":"陪你去活動轉移心情是迴避、未進行評估。","B":"「談談家人對你做了什麼」偏離自殺評估。","C":"「安眠藥不會死、談如何活著」先否定再說教。","D":"正確。以「還有什麼想法?這想法有多強烈?」評估意念內容與強度。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","自殺危險評估"]}},"108110-N5-4":{"quick":"情緒失控、企圖攻擊：同理「你看起來很生氣，可以談一談嗎?若仍無法控制，暫時需用約束協助你」。","detail":{"background":"林先生情緒失控、謾罵並企圖攻擊。較適切的措施是(B)『「你看起來很生氣，我們可以談一談嗎?若你仍然無法控制自己的情緒，我們暫時需用約束的方式協助你」』——先同理情緒、嘗試言語化解，並『清楚、事先告知』可能的約束(尊重、透明、漸進)。A 以「綁起來」威脅、語帶懲罰;C『不告訴病人就直接約束』剝奪知情、不尊重(約束前應告知);D 以「延長住院」威脅、指責。故 B 正確。對情緒失控者，宜先同理、嘗試言語化解，並事先告知約束。","options":{"A":"以「綁起來」威脅、語帶懲罰。","B":"正確。同理情緒、嘗試會談，並事先清楚告知可能的約束。","C":"不告訴病人就直接約束，剝奪知情、不尊重。","D":"以「延長住院」威脅、指責。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","暴力處置·約束"]}},"108110-N5-10":{"quick":"躁期病人要求查閱藥品手冊：評估其對服藥的反應與想法，並說明藥物的主要作用。","detail":{"background":"王先生躁期、要求借閱藥品手冊以了解所服藥物劑量(劑量在合理範圍)。最適合的回應是(B)『評估王先生對服藥的反應及想法，並說明藥物的主要作用』——以開放、衛教的方式回應其關切(了解其擔憂、提供正確資訊、增進服藥順從)。A『撕掉所服藥物頁數』是欺瞞、剝奪知的權利;C『應該相信醫師、這是合宜劑量』是權威壓制、未說明;D『藥品手冊只能工作人員使用』是僵化拒絕。故 B 正確。對病人的用藥關切，宜評估想法並提供正確的用藥衛教。","options":{"A":"撕掉藥物頁數是欺瞞、剝奪知的權利。","B":"正確。評估其對服藥的反應與想法，並說明藥物的主要作用。","C":"「應該相信醫師」是權威壓制、未說明。","D":"「手冊只能工作人員用」是僵化拒絕。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","服藥衛教"]}},"108110-N5-17":{"quick":"鬱症、進食少、體重下降：選擇高熱量的均衡飲食。","detail":{"background":"林小姐鬱症、多躺床、進食量少、一週體重由60降至58公斤(營養不足)。最適宜的護理是(C)『選擇高熱量的均衡飲食』——以高熱量、營養均衡的食物補足其因進食少而流失的營養與體重。A『低鈉飲食』錯誤(無此需要，且可能更不可口);B『安排數位病友陪伴進餐』對退縮的鬱症病人可能造成壓力;D『使用調味料促進食慾』非主要解方(核心是提供高熱量均衡飲食)。故 C 正確。對進食少、體重下降的鬱症病人，提供高熱量均衡飲食是重點。","options":{"A":"低鈉飲食無此需要，且可能更不可口。","B":"數位病友陪伴對退縮的鬱症病人可能造成壓力。","C":"正確。選擇高熱量的均衡飲食，補足營養與體重。","D":"使用調味料非主要解方。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"108110-N5-18":{"quick":"躁症、易怒、易受病友影響：安排協助護理師布置活動場地(簡單、非競爭、建設性、可單獨進行)。","detail":{"background":"王先生躁症、情緒高昂、易怒、容易受病友影響而生氣。活動安排宜選『簡單、非競爭、刺激低、有建設性、可單獨或少人互動』的活動，故(D)『協助護理師一起布置活動場地』最適切(具建設性、可消耗精力、刺激較低、互動單純)。A『團體競賽』、C『主持卡拉OK比賽』都是競爭性、高刺激、多人互動，會使躁症病人更激動;B『蓋病房章』過於枯燥、且涉及病房事務。故 D 正確。對躁症病人宜安排低刺激、非競爭、建設性的活動。","options":{"A":"團體競賽是競爭性、高刺激，會使躁症更激動。","B":"蓋病房章過於枯燥，且涉及病房事務。","C":"主持卡拉OK比賽是競爭性、高刺激、多人互動。","D":"正確。協助布置活動場地，簡單、非競爭、有建設性。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症·活動安排"]}},"108110-N5-20":{"quick":"照護躁症病人產生生氣厭煩(情感反轉移)：檢視自己的感覺與想法。","detail":{"background":"護理師照護躁症病人時出現生氣、厭煩(情感反轉移 countertransference)。正確的處理是(C)『檢視(覺察)自己的感覺與想法』——透過自我覺察、反思(必要時督導討論)來辨識與處理反轉移，避免影響專業判斷與照護。A『反轉移是不好的、要壓抑』錯誤(反轉移是常見現象，應覺察而非壓抑);B『與病人討論自己的生氣情緒』不當(不應把護理師的情緒丟給病人);D『時間會消退、不必理會』是忽視。故 C 正確。處理情感反轉移的核心是自我覺察與反思。","options":{"A":"反轉移是常見現象，應覺察而非壓抑。","B":"不應與病人討論護理師自己的生氣情緒。","C":"正確。檢視(覺察)自己的感覺與想法。","D":"「不必理會」是忽視，反轉移需主動處理。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","情感反轉移"]}},"108110-N5-38":{"quick":"自殺危險因子：廣布多層面非單一①、社會心理因素如重大失落④(防範應單一專責②、致命工具屬遠端③錯)。","detail":{"background":"自殺危險因子的正確敘述:(1)『廣布於生物、心理、社會、經濟、文化層面，絕非單一因素』;(4)『社會心理因素會與自殺相關，如重大失落事件』。而(2)錯誤——自殺危險因子雖快速變動、不易測度，但自殺防範應『多元、跨領域「合作」』，而非「單一統由專責人員負責」;(3)錯誤——『致命工具的可近性』屬於『「近端(immediate/proximal)」危險因子』，而非「遠端」因子(遠端因子如精神疾病史、人格特質)。故正確為①④(選 D)。","options":{"A":"12：含②(防範應單一專責)，錯誤。","B":"23：含②③，皆錯。","C":"34：含③(致命工具屬近端非遠端)，錯誤。","D":"正確。廣布多層面非單一①、社會心理因素如重大失落④。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","自殺危險因子"]}},"109030-N5-13":{"quick":"鋰鹽：服藥後半小時到2小時血清濃度達最高峰，此時較易產生中毒症狀。","detail":{"background":"鋰鹽(Lithium)的正確敘述:(D)『服藥後約半小時到2小時，血清濃度達最高峰(peak)，此時較易產生中毒症狀』。其他錯誤:A 躁症急性期治療濃度約『1.0~1.5 mEq/L』(維持期0.6~1.2)，非2.0~2.5(那已是中毒範圍);B 鋰鹽治療範圍窄、易中毒，忘記服藥『不可隔天一次補服(雙倍)』，以免中毒;C 最佳測量血中濃度是『服藥後約12小時、下次服藥前(谷值trough)』，而非服藥後2~4小時(那是峰值，測量不準)。故 D 正確。","options":{"A":"急性期治療濃度約1.0~1.5 mEq/L，非2.0~2.5。","B":"忘記服藥不可隔天一次補服雙倍，以免中毒。","C":"最佳測量是服藥後約12小時(谷值)，非2~4小時(峰值)。","D":"正確。服藥後半小時到2小時濃度達峰，此時較易中毒。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽"]}},"109030-N5-17":{"quick":"躁症易受影響：安排「短時間可看到成果」的活動，再依專注力調整。","detail":{"background":"躁症病人住院期間易受他人影響、注意力分散。最適宜的活動安排是(D)『安排「短時間就能看到成果」的活動，再依病人的專注力予以調整』——配合躁症病人注意力短暫、需即時成就感的特性，循序漸進。A『隔離在保護室』過度(僅躁動、非暴力);B『提供安眠藥讓他休息』以藥物取代活動安排，不當;C『安排籃球比賽』是競爭性、高刺激，會更激動。故 D 正確。對躁症病人，宜安排短時、低刺激、有即時成就感且可彈性調整的活動。","options":{"A":"隔離保護室過度(僅躁動、非暴力)。","B":"以安眠藥取代活動安排，不當。","C":"籃球比賽是競爭性、高刺激，會更激動。","D":"正確。安排短時間可見成果的活動，再依專注力調整。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症·活動安排"]}},"109030-N5-18":{"quick":"急性期躁症的首要護理＝確認病人得到充分的營養與休息。","detail":{"background":"對急性期發作的躁症病人，首要的護理措施是(A)『確認病人得到充分的營養與休息』——躁期病人活動量大、進食少、睡眠少，能量高度消耗，易致營養不良、脫水、體力耗竭(生理需求是首要)。B『規定按病房作息』過於僵化;C『建立正向自我概念』是後續心理目標;D『禁止與病友互動』過度且不切實際。故 A 正確。對急性躁症，維持營養與休息(生理安全)是首要。","options":{"A":"正確。急性躁症首要確認病人得到充分的營養與休息。","B":"規定按病房作息過於僵化、不切實際。","C":"建立正向自我概念是後續的心理目標。","D":"禁止與病友互動過度且不切實際。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症護理"]}},"109030-N5-21":{"quick":"憂鬱、分送首飾凝視「生命如輕煙」(自殺警訊)：敏銳觀察自殺徵兆①、鼓勵表達感受②、鼓勵參與活動④(安排人少房間③錯)。","detail":{"background":"蔡女士憂鬱、有不想活念頭、『分送心愛首飾、凝視窗外、說生命如輕煙』(高自殺警訊:分送物品像在交代後事)。優先護理:(1)敏銳觀察自殺徵兆;(2)鼓勵表達自我感受;(4)鼓勵參與活動(減少獨處、轉移、增加正向經驗)。而(3)『安排人少的房間』錯誤——高自殺風險者『不宜獨處或在人少處』，應安排『靠近護理站、便於觀察』的環境。故正確為①②④(選 B)。","options":{"A":"123：含③(人少房間)，自殺風險者不宜獨處。","B":"正確。觀察自殺徵兆①、鼓勵表達感受②、鼓勵參與活動④。","C":"134：含③，錯誤。","D":"234：含③、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"109030-N5-23":{"quick":"躁症發作診斷準則＝目標導向的活動增加。","detail":{"background":"躁症發作(manic episode)的診斷準則:(C)『目標導向的活動增加(或精力增加)』，是躁症的核心。其他錯誤:A『對所有活動興趣減少』是「憂鬱」的症狀;B 躁症『睡眠需求「減少」(睡很少卻精力旺盛)』，非增加;D 躁症『注意力「分散(易受外界刺激轉移)」』，非集中。故 C 正確。躁症的核心包括情緒高昂/易怒、活動或精力增加、睡眠需求減少、多話、意念飛躍、注意力分散。","options":{"A":"對所有活動興趣減少是憂鬱的症狀。","B":"躁症睡眠需求減少，非增加。","C":"正確。目標導向的活動增加(或精力增加)。","D":"躁症注意力分散，非集中。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","DSM-5 躁症"]}},"109030-N5-39":{"quick":"自殺行為：要自殺的人於自殺前可能會有示警(求救)行為。","detail":{"background":"自殺行為的正確敘述:(D)『要自殺的人，於自殺前可能會有示警(求救)行為(言語或行為透露)』，故應重視這些警訊。其他迷思:A『常到護理站表達要自殺的病人不會自殺』錯誤(表達自殺意念者反而是高風險，須認真看待);B『自殺的人「必定」想死』錯誤(許多自殺者是矛盾、求救的);C『只有老人或憂鬱症病人才會自殺』錯誤(各種人都可能)。故 D 正確。","options":{"A":"表達自殺意念者反而高風險，不可輕忽。","B":"許多自殺者是矛盾的，非必定想死。","C":"各種人都可能自殺，非只有老人或憂鬱症病人。","D":"正確。要自殺的人於自殺前可能會有示警(求救)行為。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"109030-N5-40":{"quick":"「我會拖累你們、活著沒意思、真想死」＝自殺意念(只有想法、無具體行動)。","detail":{"background":"王太太憂鬱、常表示「我會拖累你們、活著沒什麼意思、真想死」——這是『口語透露想死的「想法」，但「未付諸具體計畫或行動」』，依自殺行為程度分級屬『自殺意念(suicide ideation)』。自殺威脅是更明確、帶威脅性的表達;作態性自殺是已有自傷行為(引人注意);自殺企圖是有明確致死意圖的實際自殺行動。本題僅是表達想死的念頭，故為自殺意念。故 A 正確。","options":{"A":"正確。只有想死的念頭、無具體行動，是自殺意念。","B":"自殺威脅是更明確、帶威脅性的表達。","C":"作態性自殺是已有自傷行為(引人注意)。","D":"自殺企圖是有明確致死意圖的實際行動。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","自殺分級"]}},"109110-N5-3":{"quick":"長期使用鋰鹽須定期檢查：腎臟功能②、甲狀腺功能③。","detail":{"background":"病人長期使用鋰鹽(lithium)治療，必須定期監測的項目是:(2)『腎臟功能』(鋰由腎排除，且長期使用可能影響腎功能);(3)『甲狀腺功能』(鋰可能抑制甲狀腺、導致甲狀腺功能低下)。而(1)肝功能、(4)肺功能不是鋰鹽長期監測的重點(鋰鹽不經肝代謝、不影響肺)。故正確為②③(選 B)。使用鋰鹽前及期間應監測腎功能、甲狀腺功能、電解質與鋰鹽血中濃度。","options":{"A":"12：含①(肝功能)，非鋰鹽監測重點。","B":"正確。腎臟功能②、甲狀腺功能③。","C":"13：含①(肝功能)，錯誤。","D":"14：含①④，皆非鋰鹽監測重點。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽監測"]}},"109110-N5-7":{"quick":"病人抱怨吃藥不舒服：請再仔細描述是怎麼樣的不舒服?","detail":{"background":"張小姐憂鬱、抱怨「吃藥讓我覺得非常不舒服，可否請你告訴醫生?」。較合適的回答是(D)『請再仔細描述是怎麼樣的不舒服?』——先「具體了解」其不適(是哪種副作用?嚴重度?)，才能正確評估、衛教並回報醫師。A『樂觀一點、很快會好』是空泛、否定;B『醫生為你好、不要拒絕吃藥』是說教、施壓;C『下次看診直接跟醫生說』是推託、未即時了解與處理。故 D 正確。對藥物不適的抱怨，先具體了解再處理。","options":{"A":"「樂觀一點、很快會好」是空泛、否定感受。","B":"「不要拒絕吃藥」是說教、施壓。","C":"「下次看診直接跟醫生說」是推託、未即時處理。","D":"正確。請再仔細描述是怎麼樣的不舒服?具體了解。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","服藥·治療性溝通"]}},"109110-N5-12":{"quick":"割腕服藥自殺者照護：房間靠近護理站①、評估危險採密切觀察③、訂定不自殺契約④(避免討論自殺②錯)。","detail":{"background":"賴小姐因感情失落以割腕及服藥自殺。照護重點:(1)房間儘量安排『靠近護理站』(便於觀察、確保安全);(3)『評估病人自殺危險程度，採取密切觀察』;(4)『與病人訂定不自殺契約』(促進求助、安全約定)。而(2)『避免與個案討論自殺行為』錯誤——應『主動、開放地討論自殺』以評估風險、傳達關懷(談自殺不會誘發自殺)。故正確為①③④(選 D)。","options":{"A":"123：含②(避免討論自殺)，錯誤。","B":"234：含②、缺①，錯誤。","C":"124：含②，錯誤。","D":"正確。房間靠近護理站①、評估危險採密切觀察③、訂不自殺契約④。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"109110-N5-13":{"quick":"重鬱青少年的環境治療：高度結構化①、協助統整好/壞自我③、支持自我探索並提供希望④(以外在控制處理抗拒②錯)。","detail":{"background":"朱同學16歲重鬱住院的環境治療:(1)環境須是『高度結構化及控制的』(提供安全、可預期);(3)協助個案『統整好的/壞的自我(整合自我概念)』;(4)『支持個案的自我探索並提供希望』。而(2)『以「外在的控制」處理其抗拒行為』錯誤——環境治療強調以治療性關係、理解與引導處理，而非單純「外在控制/壓制」。故正確為①③④(選 C)。","options":{"A":"123：含②(外在控制處理抗拒)，錯誤。","B":"124：含②，錯誤。","C":"正確。高度結構化①、協助統整好/壞自我③、支持自我探索提供希望④。","D":"234：含②、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","環境治療"]}},"109110-N5-15":{"quick":"憂鬱症：女性憂鬱症比例高過於男性。","detail":{"background":"憂鬱症的正確敘述:(B)『女性憂鬱症的比例高過於男性(約2:1)』(與荷爾蒙、心理社會因素有關)。其他錯誤:A『治療好轉就不必再吃藥』錯誤(須依醫囑持續，維持治療以防復發);C 憂鬱症個案常『「超我(superego)」過強、自我要求高、罪惡感重』，而非「本我較強、超我較弱」;D 憂鬱症個案常將憤怒及敵意『「內射(朝向自我)」』而產生罪惡與自責，而非「外射」。故 B 正確。","options":{"A":"好轉後仍須依醫囑持續服藥以防復發。","B":"正確。女性憂鬱症比例高過於男性。","C":"憂鬱症個案常超我過強，非本我強、超我弱。","D":"憂鬱症是憤怒內射(朝向自我)，非外射。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","憂鬱症"]}},"109110-N5-17":{"quick":"雙相、40公斤、住院第3天：此階段照護最重要＝監測進食質量、提供高熱量食物。","detail":{"background":"丁小姐雙相、僅40公斤(體重過輕)、住院第3天(急性期)。此階段最重要的照護是(C)『監測進食質量，提供高熱量食物』——躁期病人活動量大、進食少、體重又過輕，維持營養(生理需求)是首要。A『限制活動地點減少互動』過度限制;B『安排書法穩定情緒』是後續的活動治療;D『解說住院目的建立病識感』在急性期、注意力分散時難以進行。故 C 正確。對體重過輕的急性躁症病人，維持營養攝取是首要。","options":{"A":"限制活動地點過度限制。","B":"安排書法是後續的活動治療，非此階段最重要。","C":"正確。監測進食質量、提供高熱量食物(維持營養)。","D":"急性期注意力分散，建立病識感難以進行。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症護理"]}},"109110-N5-23":{"quick":"情緒高昂、話題跳躍、罵人、不睡夜外出＝躁症發作(manic episode)。","detail":{"background":"楊女士半個月來『情緒高昂、不斷社交、一直找人講話、話題跳躍(意念飛躍)、別人聽不懂就生氣罵人(易怒)、晚上不睡(睡眠需求減少)、半夜外出(衝動/活動增加)』——符合『躁症發作(manic episode)』的典型表現。焦慮症以過度擔憂為核心;失智症以認知功能退化為核心;創傷後壓力症以創傷再經驗為核心。本題是情緒高昂、活動增加、意念飛躍、睡眠減少，故為躁症發作。故 A 正確。","options":{"A":"正確。情緒高昂、話跳躍、易怒、不睡、衝動外出，是躁症發作。","B":"焦慮症以過度擔憂為核心。","C":"失智症以認知功能退化為核心。","D":"創傷後壓力症以創傷再經驗為核心。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症"]}},"109110-N5-24":{"quick":"躁症、活動過多：安排寫書法①、繪畫②、下棋③(剪紙④用剪刀有安全疑慮)。","detail":{"background":"楊女士躁症、活動過多。適合安排『安靜、可消耗精力、刺激較低』的活動:(1)寫書法;(2)繪畫;(3)下棋。而(4)『剪紙』需使用『剪刀(尖銳危險物品)』，對衝動的躁症病人有『安全疑慮』，不適合。故正確為①②③(選 A)。對躁症病人安排活動時，須兼顧「低刺激、可消耗精力」與「安全(避免危險物品)」。","options":{"A":"正確。寫書法①、繪畫②、下棋③(安靜、低刺激、安全)。","B":"234：含④(剪紙用剪刀)，有安全疑慮。","C":"134：含④，錯誤。","D":"124：含④，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症·活動安排"]}},"109110-N5-26":{"quick":"社區精神復健照顧重點＝增加病人適應社會生活所需的問題解決能力。","detail":{"background":"社區精神復健的照顧重點是(A)『增加病人適應社會生活所需的「問題解決能力(及生活、社交技能)」』——協助病人在社區中獨立生活、適應社會。其他錯誤:B『每15分鐘評估自殺意念』是「急性住院、高自殺風險」的措施，非社區復健的常規;C『加強建立病人「角色」功能』敘述不完整(復健著重整體適應與功能);D『改善其「急性」精神症狀的穩定度』是急性期治療，非社區復健(社區復健的對象是症狀已穩定者)。故 A 正確。","options":{"A":"正確。增加病人適應社會生活所需的問題解決能力。","B":"每15分鐘評估自殺是急性住院的措施，非社區復健。","C":"「加強建立角色功能」敘述不完整。","D":"改善急性精神症狀是急性期治療，非社區復健。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","社區精神復健"]}},"110030-N5-5":{"quick":"憂鬱症最可能缺乏＝血清素(serotonin)和正腎上腺素(norepinephrine)。","detail":{"background":"生物化學研究中，憂鬱症病人最可能『缺乏(不足)』的神經傳導物質是(D)『血清素(serotonin)和正腎上腺素(norepinephrine)』(單胺假說)——故抗憂鬱劑(SSRI、SNRI、TCA、MAOI)的作用就是提高這些單胺類的濃度。多巴胺也與憂鬱(快感缺乏)有關，但本題最對應的是血清素與正腎上腺素;GABA/乙醯膽鹼、皮質醇/腎上腺素非憂鬱症「缺乏」的核心。故 D 正確。","options":{"A":"多巴胺相關，但甲狀腺素非憂鬱症缺乏的核心。","B":"GABA/乙醯膽鹼非憂鬱症缺乏的核心。","C":"憂鬱症皮質醇常「增加」，非缺乏。","D":"正確。憂鬱症最可能缺乏血清素和正腎上腺素。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","單胺假說"]}},"110030-N5-7":{"quick":"人際關係心理治療(IPT)：認為憂鬱症常見問題是角色轉換困難、人際糾紛。","detail":{"background":"對憂鬱症病人的『人際關係心理治療(IPT)』:(B)『認為憂鬱症病人常見的問題是「角色轉換困難、人際糾紛(角色衝突)、悲傷失落、人際缺陷」』，並著重改善「當前」的人際關係。其他錯誤:A IPT『可合併藥物治療』(並非不需);C『對錯誤認知的分析』是「認知治療(CBT)」的重點，非 IPT;D『分析早期生活事件』是「精神分析」的重點，IPT 著重「此時此地」的人際問題。故 B 正確。","options":{"A":"IPT 可合併藥物治療，非不需。","B":"正確。IPT 認為憂鬱常見問題是角色轉換困難、人際糾紛。","C":"分析錯誤認知是認知治療(CBT)，非 IPT。","D":"分析早期生活事件是精神分析，IPT 著重此時此地。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","人際關係心理治療"]}},"110030-N5-9":{"quick":"環境治療：運用其設計原則於「住院生活作息表」與「生活討論會」。","detail":{"background":"環境治療(milieu therapy)應用於急性住院病房的正確敘述:(D)『運用環境治療設計的原則於「住院生活作息表」及「生活討論會」』(透過結構化作息與團體討論營造治療性環境)。其他錯誤:A 對躁症病人應『「減少」環境刺激』，非提高;B『不論何種情境，使用身體約束/隔離都不符環境治療原則』錯誤(在危急、保護安全時，約束/隔離是必要的處置);C『多種感官刺激的環境「適合」失智症的照護(適度的定向刺激)』，並非不適合(過度刺激才不適合)。故 D 正確。","options":{"A":"對躁症病人應減少環境刺激，非提高。","B":"危急時約束/隔離是必要處置，非一律不符。","C":"適度的感官/定向刺激適合失智照護，非不適合。","D":"正確。運用環境治療原則於住院生活作息表與生活討論會。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","環境治療"]}},"110030-N5-11":{"quick":"躁症只吃一口就四處走：為病人準備可攜帶的食物(如三明治)、在行動中進食。","detail":{"background":"廖先生躁症、只吃一口飯就四處走動(活動量大、無法靜坐用餐)。較適當的護理是(A)『為病人準備容易攜帶的食物(如三明治)，讓病人可以在行動中進食』——順應其活動量大、無法久坐的特性，以「可攜帶、高熱量」的食物確保攝取足夠營養。B『安排與其他病人一起在餐廳用餐』躁症病人難以久坐、易受干擾;C『每天只吃一頓』錯誤(營養不足);D『靜脈營養、平時隨便吃』言之過早、放任。故 A 正確。對活動量大的躁症病人，提供可攜帶、高熱量的「行動餐」。","options":{"A":"正確。準備可攜帶的食物(如三明治)，讓病人在行動中進食。","B":"躁症病人難以久坐用餐、易受干擾。","C":"「每天只吃一頓」會營養不足。","D":"立即用靜脈營養言之過早，「隨便吃」是放任。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症·營養"]}},"110030-N5-12":{"quick":"躁症發作的典型特徵＝精力旺盛、愛管閒事。","detail":{"background":"躁症發作(manic episode)的典型臨床特徵是(B)『精力旺盛、愛管閒事(活動增加、過度涉入)』。其他錯誤:A『情緒低落、低自尊』是「憂鬱」的特徵;C『自殺意念』較常見於「憂鬱」期;D 躁症病人因衝動、誇大、人際界限差，『難以維持穩固的親密關係』，並非「易有穩固的親密關係」。故 B 正確。躁症的核心是情緒高昂、精力與活動增加、誇大、衝動。","options":{"A":"情緒低落、低自尊是憂鬱的特徵。","B":"正確。精力旺盛、愛管閒事(活動增加)。","C":"自殺意念較常見於憂鬱期。","D":"躁症難以維持穩固的親密關係。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症"]}},"110030-N5-15":{"quick":"Sertraline(Zoloft)：SSRI①、持續2週以上才有療效③、有嗜睡噁心嘔吐等副作用④(非SNRI②)。","detail":{"background":"Sertraline(Zoloft)的正確敘述:(1)屬『選擇性血清素回收抑制劑(SSRI)』;(3)『一般需持續服用2週以上才有療效出現』(抗憂鬱劑起效慢);(4)『可能有嗜睡、噁心嘔吐等副作用(腸胃道副作用常見)』。而(2)錯誤——sertraline 是『SSRI』，並非『血清素-正腎上腺素回收抑制劑(SNRI)』(SNRI 如 venlafaxine、duloxetine)。故正確為①③④(選 C)。","options":{"A":"123：含②(SNRI)，sertraline 是 SSRI。","B":"124：含②，錯誤。","C":"正確。SSRI①、2週以上才有療效③、有嗜睡噁心嘔吐副作用④。","D":"234：含②、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","抗憂鬱劑"]}},"110030-N5-17":{"quick":"鬱症發作的典型特徵＝自我價值感低。","detail":{"background":"鬱症發作(depressive episode)的典型臨床特徵是(B)『自我價值感低(無價值感、無望感、罪惡感)』。其他錯誤:A『意念飛躍』是「躁症」的症狀;C『怕獨處而活動多』不符(憂鬱多為退縮、活動減少);D 憂鬱常有『睡眠障礙(失眠、早醒或嗜睡)』，並非「無睡眠障礙」。故 B 正確。憂鬱的核心是情緒低落、興趣喪失、無價值/無望感、睡眠食慾改變、精力下降、自殺意念。","options":{"A":"意念飛躍是躁症的症狀。","B":"正確。自我價值感低是鬱症的典型特徵。","C":"憂鬱多為退縮、活動減少，非「活動多」。","D":"憂鬱常有睡眠障礙(失眠/早醒/嗜睡)，非無。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","憂鬱症"]}},"110030-N5-38":{"quick":"自殺與精神疾病「錯誤」者＝藥癮病人自殺主要因毒品過量、與憂鬱無關。","detail":{"background":"自殺行為與精神疾病，「錯誤」者為(B)『藥癮病人的自殺主要是因毒品使用「過量」、「與憂鬱無關」』——錯誤，藥癮病人的自殺常『合併憂鬱、衝動及多重心理社會問題』，並非單純毒品過量、也並非與憂鬱無關。其他正確:A 不是每個憂鬱症病人都會出現自殺企圖;C 憂鬱症個案出院後(尤其恢復期)仍可能有自殺危險;D 思覺失調症病人可能受『命令性幻覺』控制而出現自殺企圖。故本題選錯誤者為 B。","options":{"A":"不是每個憂鬱症病人都會自殺，正確。","B":"正確(本題選錯誤者)。藥癮自殺常合併憂鬱，非與憂鬱無關。","C":"憂鬱症出院後仍可能有自殺危險，正確。","D":"思覺失調可能受命令性幻覺控制而自殺，正確。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"110110-N5-3":{"quick":"有自傷意念的憂鬱病人：以反映回應「你對目前自己的狀況，不是很滿意。」","detail":{"background":"面對有自傷意念的憂鬱症病人，最符合治療性溝通的是(D)『「你對目前自己的狀況，不是很滿意。」』——以『反映(reflecting)』的技巧回應，傳達理解、鼓勵其進一步表達。A『憂鬱症應該可以治好、不要擔心』是空泛保證、否定情緒;B『我認為你應該辭職』是給建議、過度涉入其人生決定;C『想自殺的人都在逃避負責任』是批判、指責。故 D 正確。對自傷意念者，宜以反映、同理鼓勵其表達。","options":{"A":"「應該可以治好、不要擔心」是空泛保證、否定情緒。","B":"「你應該辭職」是給建議、過度涉入。","C":"「想自殺的人都在逃避負責任」是批判、指責。","D":"正確。以反映「你對目前自己的狀況不是很滿意」鼓勵表達。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"110110-N5-15":{"quick":"雙相情緒障礙病因：與正腎上腺素及血清素濃度有關。","detail":{"background":"雙相情緒障礙病因的正確敘述:(C)『與正腎上腺素(norepinephrine)及血清素(serotonin)等單胺類神經傳導物質的濃度失調有關』。其他錯誤:A 與『電解質(鈉、鈣)不平衡「有關」(離子假說，故鋰鹽治療)』，並非無關;B『壓力或環境改變「會」提升發病率(可誘發發作)』，並非不會;D 雙相『與遺傳因素「有關」(遺傳度高)』，並非無關。故 C 正確。","options":{"A":"與電解質不平衡有關(離子假說)，非無關。","B":"壓力或環境改變會提升發病率，非不會。","C":"正確。與正腎上腺素及血清素濃度有關。","D":"雙相與遺傳因素有關，非無關。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"110110-N5-17":{"quick":"住院憂鬱照護：病人出現退化行為時，仍要鼓勵其適時自我照顧。","detail":{"background":"住院憂鬱症照護的正確敘述:(D)『病人出現退化行為時，仍要鼓勵病人「適時提供自我照顧的機會」(維持殘存功能、避免過度依賴)』。其他錯誤:A『安排「單人房」』對有自殺風險的憂鬱病人不宜(獨處不利觀察與安全);B『症狀嚴重期最易自殺、情緒好轉就解除風險』錯誤(「恢復期」自殺風險反而更高);C『不要安排活動』錯誤(應安排適度、簡單的活動，避免完全退縮)。故 D 正確。對退化的憂鬱病人，鼓勵其適時自我照顧以維持功能。","options":{"A":"安排單人房對有自殺風險者不宜(不利觀察)。","B":"恢復期自殺風險更高，非情緒好轉就解除。","C":"應安排適度簡單的活動，非不安排。","D":"正確。出現退化行為時，仍要鼓勵其適時自我照顧。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"110110-N5-18":{"quick":"躁症活動安排：鼓勵參與文藝活動，但避免安排精細動作的活動。","detail":{"background":"躁症病人住院期間的活動安排:(B)『鼓勵參與文藝(如繪畫、音樂等)活動，但避免安排「精細動作」的活動(躁症病人注意力分散、坐不住，難以完成精細工作而易挫折)』。其他錯誤:A『投籃競賽』是競爭性、高刺激，會更激動;C『把一天時間都填滿活動』會過度刺激、更躁動;D『安排長時間(至少1小時)的活動』不符躁症病人注意力短暫的特性。故 B 正確。對躁症病人宜安排低刺激、非競爭、非精細、短時的活動。","options":{"A":"投籃競賽是競爭性、高刺激，會更激動。","B":"正確。鼓勵文藝活動，但避免精細動作的活動。","C":"把時間填滿會過度刺激、更躁動。","D":"長時間活動不符躁症注意力短暫的特性。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症·活動安排"]}},"110110-N5-20":{"quick":"憂鬱退化、自我照顧缺失的護理「錯誤」者＝完全協助病人的自我照顧。","detail":{"background":"憂鬱症病人伴退化行為、自我照顧能力缺失，護理措施「錯誤」者為(D)『「完全」協助病人的自我照顧』——應『鼓勵並引導病人「適時自己做」(維持殘存功能)』，而非完全代勞(完全代勞會加速失能、助長依賴)。其他正確:A 協助進食(在無法自行進食時);B 增加水分攝取(預防脫水/便秘);C 安排固定時間如廁。故本題選錯誤者為 D。對退化的憂鬱病人，應協助但保留其自我照顧的機會。","options":{"A":"協助進食(在無法自行進食時)是適當的。","B":"增加水分攝取是適當的。","C":"安排固定時間如廁是適當的。","D":"正確(本題選錯誤者)。應鼓勵其自我照顧，非完全代勞。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"110110-N5-21":{"quick":"躁症發作最常見症狀＝意念飛躍。","detail":{"background":"躁症發作(manic episode)病人最常見的症狀是(B)『意念飛躍(思考快速跳躍)』。其他錯誤:A『低自尊』是「憂鬱」的特徵(躁症是自尊膨脹/誇大);C 躁症『目標導向的活動「增加」』，非減少;D『表情淡漠』是憂鬱或負性症狀(躁症是情緒高昂、表情豐富)。故 B 正確。躁症的核心包括情緒高昂、活動增加、意念飛躍、誇大、睡眠需求減少、多話。","options":{"A":"低自尊是憂鬱的特徵，躁症是自尊膨脹。","B":"正確。意念飛躍是躁症最常見的症狀。","C":"躁症目標導向的活動增加，非減少。","D":"表情淡漠是憂鬱/負性症狀，非躁症。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症"]}},"110110-N5-32":{"quick":"台灣老年精神健康：老年人會以飲酒、濫用處方藥物來調適壓力或憂鬱。","detail":{"background":"台灣老年精神健康問題的正確敘述:(D)『老年人會以「飲酒與濫用處方藥物(如安眠鎮靜藥)」來調適其壓力或憂鬱』(隱性物質使用問題)。其他錯誤:A 老年精神疾病盛行率『並非低於1%(失智、憂鬱等盛行率不低)』;B 常見的老年精神疾病為『失智症、憂鬱症』，而非「雙相情感疾患及物質使用障礙」;C 老年人自殺『常有徵兆(慢性病、憂鬱、孤立、表達想死)、可觀測及預防』，並非「少有徵兆」。故 D 正確。","options":{"A":"老年精神疾病盛行率並非低於1%。","B":"常見的是失智症、憂鬱症，非雙相及物質使用。","C":"老年自殺常有徵兆、可預防，非少有徵兆。","D":"正確。老年人會以飲酒、濫用處方藥物調適壓力或憂鬱。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","老年精神健康"]}},"110110-N5-79":{"quick":"老人提不起精神、無力、不出門、體重減輕(疑老年憂鬱)的處置「最不適當」＝建議多休息。","detail":{"background":"王老先生主訴『提不起精神、無力、不想出門、體重減輕』——這是「老年憂鬱症」的典型表現(也須排除身體疾病)。處置「最不適當」者為(D)『建議多休息以利恢復體能』——把問題誤當成單純的「體能不足」、未轉介評估，會延誤憂鬱症的診斷與處置。其他適當:A 轉介老年醫學科/家醫科就診(評估身心);B 轉介社區延緩失能失智活動;C 教導預防跌倒(老人體力差有跌倒風險)。故本題選最不適當者為 D。對疑似老年憂鬱者，應轉介評估，而非僅建議休息。","options":{"A":"轉介老年醫學科/家醫科就診是適當的。","B":"轉介社區延緩失能失智活動是適當的。","C":"教導預防跌倒是適當的(體力差有跌倒風險)。","D":"正確(本題選最不適當者)。誤當體能問題、未轉介評估，會延誤憂鬱診斷。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","老年憂鬱"]}},"111030-N5-10":{"quick":"說話快速持續、話題轉換迅速但略有關聯＝意念飛躍(flight of ideas)。","detail":{"background":"精神症狀描述的正確選項:(D)『說話快速而持續、話題轉換迅速、話題間略有關聯』稱『意念飛躍(flight of ideas)』(躁症典型)。其他錯誤:A『對外界事務過度注意、有警覺心』是『過度警覺(hypervigilance)』，非欣快感(欣快感是過度愉悅);B『對同一件事同時存在兩種相反的情感』是『矛盾情感(ambivalence)』，非不恰當情感;C『情感遲鈍、面部表情少、對外界漠不關心』是『情感平淡(blunted/flat affect)』，非失快樂感(anhedonia 是無法感受愉悅)。故 D 正確。","options":{"A":"過度注意、警覺是過度警覺，非欣快感。","B":"同時存在兩種相反情感是矛盾情感，非不恰當情感。","C":"情感遲鈍、表情少是情感平淡，非失快樂感。","D":"正確。說話快速、話題轉換迅速但略有關聯，是意念飛躍。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","精神症狀學"]}},"111030-N5-15":{"quick":"經前情緒低落症(PMDD)「最不適當」描述＝症狀不會影響工作效率。","detail":{"background":"依 DSM-5，經前情緒低落症(PMDD)的描述，「最不適當」者為(D)『症狀不會影響工作效率』——PMDD 的症狀『會顯著「影響工作、社交與日常功能」』(這是與一般經前症候群區別的重點)。其他正確:A 月經前1週出現易怒、焦慮、緊張;B 月經前1週出現專注力降低、易疲勞、失去控制感;C 月經來潮後幾天內症狀會改善(週期性)。故本題選最不適當者為 D。PMDD 的核心是症狀嚴重到影響功能。","options":{"A":"月經前1週出現易怒、焦慮、緊張，正確。","B":"月經前1週出現專注力降低、易疲勞、失控感，正確。","C":"月經來潮後幾天內症狀會改善，正確。","D":"正確(本題選最不適當者)。PMDD 會顯著影響工作與功能。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","PMDD"]}},"111030-N5-16":{"quick":"服鋰鹽、倦怠無力、Na 120(低血鈉)、鋰0.8：注意評估病人的飲水量。","detail":{"background":"林先生服鋰鹽、倦怠無力、鋰鹽濃度0.8 mEq/L(仍在治療範圍)、但『Na 120 mEq/L(低血鈉)』。最適當的護理是(C)『注意評估病人的飲水量』——低血鈉常因『水分攝取過多(水中毒)』或鈉流失，而『低血鈉會使腎臟對鋰的再吸收增加、鋰濃度上升而中毒』，故須評估飲水量、鈉攝取。A『鋰0.8偏高立即停藥』錯誤(0.8在治療範圍);B『是carbamazepine的嚴重不良反應立即停藥』未必(低血鈉雖可能與carbamazepine的SIADH有關，但當下首要是評估飲水/鈉，非立即停藥);D『再隔2個月抽血』間隔過長(現已低血鈉，須及時處理)。故 C 正確。","options":{"A":"鋰0.8在治療範圍，非偏高，不應立即停藥。","B":"當下首要是評估飲水/鈉，非立即停carbamazepine。","C":"正確。低血鈉須注意評估病人的飲水量(防鋰中毒)。","D":"已低血鈉須及時處理，隔2個月抽血間隔過長。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽·低血鈉"]}},"111030-N5-35":{"quick":"「我好想死、沒有她活不下去」：以同理回應「失去她你真不好受，要不要多談一些?」","detail":{"background":"病人說「我好想死！沒有她，我真的活不下去」(失落性的自殺意念)。最適當的護理是(C)『同理其失落感、開放探詢』:「失去她，你心裡真不好受，要不要多談一些!」——接納情緒、鼓勵表達、進一步評估自殺風險。A『別那麼笨、就為了一個女人』是貶低、嘲諷;B『給他獨處冷靜就會沒事』危險(獨處增加自殺機會、且輕忽);D『失戀者常說、過一段時間就好』是輕忽、否定其痛苦。故 C 正確。對失落性自殺意念，宜同理、開放探詢、評估風險。","options":{"A":"「別那麼笨、就為一個女人」是貶低、嘲諷。","B":"給他獨處危險，且輕忽其自殺風險。","C":"正確。同理「失去她你真不好受，要不要多談一些?」","D":"「過一段時間就好」是輕忽、否定其痛苦。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"111110-N5-1":{"quick":"「你覺得很挫折，認真吃藥卻還是發病」＝反映(reflecting)技巧。","detail":{"background":"護理師把倪女士的話「我認真吃藥為什麼還會發病?」回應成「你覺得很挫折，覺得自己很認真吃藥卻還是發病」——這是把病人表達的『情緒與內容重述、映照回去』，屬『反映(reflecting)』的溝通技巧(讓病人感到被理解、鼓勵深入)。鼓勵比較是請病人比較不同經驗;面質是指出言行不一致;提出懷疑是對其認知/妄想表達合理懷疑。本題是把情緒重述回去，故為反映。故 A 正確。","options":{"A":"正確。把病人的情緒與內容映照回去，是反映(reflecting)。","B":"鼓勵比較是請病人比較不同經驗。","C":"面質是指出言行不一致。","D":"提出懷疑是對其認知表達合理懷疑。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","治療性溝通"]}},"111110-N5-8":{"quick":"躁症發作最可能的症狀＝高昂、活動量大、判斷力差。","detail":{"background":"雙相情緒障礙躁症發作最可能出現的症狀是(C)『情緒高昂、活動量大、判斷力差(衝動、誇大、做出不計後果的高風險行為)』。A『淡漠、病識感差、思考貧乏』偏向思覺失調的負性症狀;B『焦慮、身體症狀、睡眠中斷』偏向焦慮/憂鬱;D『社交隔離、妄想、音韻連結』偏向思覺失調。本題是躁症，核心是情緒高昂、活動增加、判斷力差。故 C 正確。","options":{"A":"淡漠、思考貧乏偏向思覺失調的負性症狀。","B":"焦慮、身體症狀、睡眠中斷偏向焦慮/憂鬱。","C":"正確。高昂、活動量大、判斷力差是躁症發作的表現。","D":"社交隔離、妄想、音韻連結偏向思覺失調。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症"]}},"111110-N5-16":{"quick":"憂鬱、躺床、焦慮哭泣、無動機：接受病人宣洩抑鬱情緒的表達方式。","detail":{"background":"張太太憂鬱、整天躺床、焦慮不安、常哭泣、對活動無動機。較適當的照護是(C)『接受病人宣洩抑鬱情緒的表達方式(允許其哭泣、表達)』——接納情緒、提供支持是憂鬱照護的基礎。A『安排在走廊最後一間』使其更孤立、不利觀察與安全;B『選擇競爭性活動』對憂鬱、低能量者壓力過大;D『安排白天耗費體力的活動』對退縮、無動機的憂鬱病人過於勉強。故 C 正確。對憂鬱病人，先接納、允許情緒宣洩。","options":{"A":"安排在最後一間使其更孤立、不利觀察與安全。","B":"競爭性活動對憂鬱低能量者壓力過大。","C":"正確。接受病人宣洩抑鬱情緒的表達方式。","D":"耗費體力的活動對退縮無動機的憂鬱病人過於勉強。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"111110-N5-17":{"quick":"抱怨吃藥不舒服：請再多描述是怎麼樣的不舒服。","detail":{"background":"楊小姐憂鬱、抱怨「請你告訴醫生吃藥讓我非常不舒服」。最適當的回答是(C)『請再多描述是怎麼樣的不舒服』——先具體了解其不適(哪種副作用?嚴重度?)，才能正確評估、衛教並回報醫師。A『醫生為你好、請多忍耐』是說教、施壓;B『查房時直接跟醫生說』是推託、未即時了解;D『樂觀一點、很快會好』是空泛、否定感受。故 C 正確。對藥物不適的抱怨，先具體了解再處理(與前述同類題一致)。","options":{"A":"「為你好、請多忍耐」是說教、施壓。","B":"「查房時直接跟醫生說」是推託、未即時了解。","C":"正確。請再多描述是怎麼樣的不舒服(具體了解)。","D":"「樂觀一點、很快會好」是空泛、否定感受。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","服藥·治療性溝通"]}},"111110-N5-21":{"quick":"雙相病人的隔離措施：目的是減少感覺輸入、降低外界過多的刺激。","detail":{"background":"葛先生雙相、常與病友起衝突，醫療團隊決定執行隔離措施。對隔離措施的正確敘述:(A)『隔離的目的之一是「減少感覺輸入、降低外界過多的刺激」(對易受刺激而激動者，低刺激環境有治療作用)，並維護病人與他人的安全』。其他錯誤:B 隔離『不是行為治療法、目的不是「約束行為作為懲罰」』;C 隔離『有程度上的差別(如不同等級的限制與觀察)』;D 隔離是『治療與安全的處置』，而非「控制手段、為維護病房安寧」(不可作為懲罰或便宜行事)。故 A 正確。","options":{"A":"正確。隔離的目的是減少感覺輸入、降低外界過多刺激並維護安全。","B":"隔離不是行為治療法、非約束作為懲罰。","C":"隔離有程度上的差別。","D":"隔離是治療與安全處置，非控制手段為維護病房安寧。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","隔離措施"]}},"112030-N5-6":{"quick":"電氣痙攣療法(ECT)：治療前須午夜後禁食並簽署同意書。","detail":{"background":"電氣痙攣療法(ECT)的正確敘述:(D)『治療前病人須「午夜後禁食(NPO)」並「簽署同意書」』(因須全身麻醉，禁食防吸入;且為侵入性治療須知情同意)。其他錯誤:A ECT 使憂鬱病人的血清素、正腎上腺素濃度『上升(增加單胺類)』，非下降(故能改善憂鬱);B ECT 的最主要適應症是『嚴重憂鬱症(尤其有強烈自殺意圖、藥物無效者)』，非恐慌症;C 單側式電極片應放置於『「非優勢」半球(以減少記憶副作用)』，非優勢大腦。故 D 正確。","options":{"A":"ECT 使血清素、正腎上腺素濃度上升，非下降。","B":"ECT 最主要適應症是嚴重憂鬱症，非恐慌症。","C":"單側電極放置於非優勢半球，非優勢大腦。","D":"正確。治療前須午夜後禁食並簽署同意書。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","ECT"]}},"112030-N5-8":{"quick":"Valproic Acid(Depakine)：機轉為增加抑制性神經傳導物質 GABA 的濃度。","detail":{"background":"情緒穩定劑 Valproic Acid(Depakine)的正確敘述:(C)『其穩定情緒的作用機轉為「增加抑制性神經傳導物質 GABA 的濃度/活性」』。其他錯誤:A 主要用於『躁症/雙相的治療與預防』，而非「預防鬱症」;B 常見『體重增加、肝功能異常、血小板下降』等副作用，並非「少有體重增加」(史蒂芬強生症候群的皮膚紅疹較常與 carbamazepine/lamotrigine 相關);D 有效成人每日劑量遠『高於500mg』、治療血中濃度約『50~100 μg/mL』，非「500mg、1.5~2.0」。故 C 正確。","options":{"A":"主要用於躁症/雙相，非預防鬱症。","B":"常見體重增加等副作用，非少有體重增加。","C":"正確。機轉為增加抑制性 GABA 的濃度。","D":"劑量與血中濃度數值錯誤(治療濃度約50~100 μg/mL)。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","情緒穩定劑"]}},"112030-N5-9":{"quick":"協助規則服鋰鹽「最不適宜」＝鼓勵病人「大量」喝水以改善副作用。","detail":{"background":"協助病人規則服用鋰鹽，「最不適宜」者為(B)『鼓勵病人「大量」喝水以改善藥物副作用』——服鋰鹽期間應『維持「正常、穩定」的水分與鹽分攝取(約2~3公升/天的正常量)』，而非「大量」喝水;過量飲水會稀釋血鈉、影響鋰濃度，且「大量喝水」並非改善副作用的正確方式。其他適宜:A 告知不規則服藥會增加復發率;C 說明病因、症狀、藥物作用及副作用;D 鼓勵家屬參與藥物治療。故本題選最不適宜者為 B。","options":{"A":"告知不規則服藥會增加復發率，適宜。","B":"正確(本題選最不適宜者)。應維持正常穩定的水分，非「大量」喝水。","C":"說明病因、症狀、藥物作用及副作用，適宜。","D":"鼓勵家屬參與藥物治療，適宜。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽衛教"]}},"112030-N5-16":{"quick":"憂鬱、食慾不佳、2週體重55→45：最適宜護理診斷＝營養不均衡：少於身體需要。","detail":{"background":"趙女士憂鬱、近2週食慾不佳、每餐只喝少許果汁、體重從55降至45公斤(2週掉10公斤，嚴重營養攝取不足)。依其當前最顯著的問題，最適宜的護理診斷是(C)『營養不均衡:少於身體需要(imbalanced nutrition: less than body requirements)』——反映其進食不足、體重明顯下降的營養問題。睡眠型態紊亂、對自己/他人的暴力行為雖須評估，但本題資料最直接支持的是「營養不足」。故 C 正確。","options":{"A":"睡眠型態紊亂，本題資料未直接呈現。","B":"潛在危險性對自己的暴力行為，本題未提及自殺意念。","C":"正確。進食不足、體重明顯下降，是營養不均衡：少於身體需要。","D":"潛在危險性對他人的暴力行為，本題無此線索。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","護理診斷"]}},"112030-N5-17":{"quick":"雙相病人不斷投書院長提建議：和陳先生討論、了解其行為。","detail":{"background":"陳先生雙相、住院期間不斷投書院長提建議(躁期的過度涉入、誇大、活動量大)。最適宜的護理是(D)『和陳先生討論、了解其行為(理解症狀、適度引導與設限)』。A『向院長解釋其病況』未直接處理病人;B『協助達成所提建議』是配合其失控行為;C『肯定其投書行為』會強化此行為。故 D 正確。對躁期的過度行為，宜理解、討論、適度設限(與前述同類題一致)。","options":{"A":"向院長解釋病況未直接處理病人。","B":"協助達成建議是配合其失控行為。","C":"肯定投書行為會強化此行為。","D":"正確。和陳先生討論、了解其行為。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症護理"]}},"112030-N5-19":{"quick":"躁症發燒被安置隔離室、頻要求出來：設限①、給予部分接受③(拖延不理會②、改約束④不當)。","detail":{"background":"林先生躁症、因發燒被安置隔離室觀察、頻頻要求出來。最適宜的護理處置:(1)『設限』:「你現在發燒要觀察，暫時不能出隔離室」(清楚、堅定地說明界限與原因);(3)『給予部分接受』:「我幫你量體溫，依據體溫狀況再決定」(在合理範圍內回應其需求、提供可預期的條件)。而(2)『拖延:不予理會、不回應』是漠視、不尊重;(4)『改為約束』是過度(僅頻繁要求、非暴力，不應升級為約束)。故正確為①③(選 C)。","options":{"A":"123：含②(拖延不理會)，不當。","B":"234：含②④，皆不當。","C":"正確。設限①、給予部分接受③。","D":"24：拖延②、改約束④皆不當。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","設限·隔離"]}},"112110-N5-4":{"quick":"鋰鹽：每日治療劑量建議分2~3次服用。","detail":{"background":"鋰鹽(Lithium)的正確敘述:(A)『每日治療劑量建議「分成2~3次服用」(以維持穩定血中濃度、減少腸胃道副作用與血中濃度波動)』。其他錯誤:B 鋰鹽主要由『腎臟「排除」(非肝代謝)』，服藥期間須注意「腎功能」(非肝功能);C 急性躁期的血中濃度建議約『1.0~1.5 mEq/L』，非0.6~1.0(那是維持期);D 濃度超過『約2.0~2.5 即嚴重中毒、超過4 為致命』，嚴重中毒『「須」進行透析治療(腹膜/血液透析)』，並非「不建議透析」。故 A 正確。","options":{"A":"正確。每日治療劑量建議分2~3次服用。","B":"鋰鹽由腎排除，須注意腎功能，非肝代謝/肝功能。","C":"急性躁期血中濃度約1.0~1.5，非0.6~1.0。","D":"濃度超過4是嚴重中毒，須透析治療，非不建議透析。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽"]}},"112110-N5-6":{"quick":"母親也是雙相、本人首次發病＝潛在(predisposing)因素(遺傳體質)。","detail":{"background":"陳女士首次發病、其母親也是雙相情緒障礙——『家族遺傳(母親患病)』屬於『「潛在(體質)因素(predisposing factor)」』，是早於發病、增加個體易感性的因素。促發因素是誘發此次發作的近因(如壓力事件);續存因素是使疾病持續/惡化的因素(如缺乏支持);預後因素是影響疾病結局的因素。本題的「遺傳體質」是潛在因素。故 A 正確。","options":{"A":"正確。家族遺傳是潛在(體質)因素，增加易感性。","B":"促發因素是誘發此次發作的近因(如壓力事件)。","C":"續存因素是使疾病持續/惡化的因素。","D":"預後因素是影響疾病結局的因素。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","病因因素"]}},"112110-N5-19":{"quick":"躁症病人示愛(要當你男朋友)：表明二人為護病關係。","detail":{"background":"武先生躁症、脫抑制地向護理師示愛「你很漂亮，我可以當你的男朋友」。最適宜的護理是(A)『清楚表明二人為「護病(治療性)關係」(設定專業界限)』——以尊重但明確的方式維持專業界限，不曖昧也不羞辱。B『不予理會』是忽視、未設限;C『謝謝你的讚美』曖昧、可能助長;D『謝謝、我有男朋友了』把焦點放在個人私事、未澄清專業關係。故 A 正確。對躁症病人的示愛/脫抑制，宜明確表明護病關係、設定界限。","options":{"A":"正確。表明二人為護病(治療性)關係，設定專業界限。","B":"不予理會是忽視、未設限。","C":"「謝謝你的讚美」曖昧、可能助長。","D":"「我有男朋友了」把焦點放在私事、未澄清專業關係。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","治療性界限"]}},"112110-N5-20":{"quick":"雙相治療原則「不適切」者＝輕躁症只需心理治療。","detail":{"background":"雙相情緒障礙的治療原則，「不適切」者為(D)『輕躁症「只需」心理治療』——輕躁(及雙相整體)仍須以『情緒穩定劑(藥物)』為主要、基礎治療，心理治療為輔，不可只靠心理治療。其他適切:A 情緒穩定劑穩定情緒起伏;B 可合併抗精神病藥物治療激躁/精神病性症狀;C 認知行為治療協助找出不理性想法。故本題選不適切者為 D。雙相障礙以藥物(情緒穩定劑)為治療核心。","options":{"A":"情緒穩定劑穩定情緒起伏，適切。","B":"可合併抗精神病藥物治療激躁症狀，適切。","C":"認知行為治療找出不理性想法，適切。","D":"正確(本題選不適切者)。輕躁症仍須藥物治療，非只需心理治療。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"112110-N5-33":{"quick":"老年憂鬱症「最不適切」者＝憂鬱症狀緩解時須立即停藥。","detail":{"background":"老年憂鬱症，「最不適切」者為(D)『憂鬱症狀緩解時，須「立即停藥」』——抗憂鬱治療在症狀緩解後仍須『持續維持治療(數月以上)以鞏固療效、預防復發』，不可一緩解就停藥。其他正確:A 與血清素等神經傳導物質分泌減少有關;B 會因中風、心血管疾病等身體疾病引發憂鬱;C 老年憂鬱症常以身體症狀表現，盛行率常被低估。故本題選最不適切者為 D。","options":{"A":"與血清素分泌減少有關，正確。","B":"會因中風、心血管疾病引發憂鬱，正確。","C":"盛行率常被低估，正確。","D":"正確(本題選最不適切者)。緩解後仍須維持治療，不可立即停藥。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","老年憂鬱"]}},"112110-N5-35":{"quick":"有自殺病史、不想活而住院：最優先＝對個案採取自殺防範措施。","detail":{"background":"陳女士有自殺病史、終日以淚洗面、表示不想活(高自殺風險)而住院。針對她的護理措施，最優先的是(D)『對陳女士採取自殺防範措施(評估風險、密切觀察、移除危險物品、確保安全)』——有自殺史且現有自殺意念，確保安全是第一優先。建立治療性關係、安排未來生活安置、提供安靜環境都是後續或次要。對高自殺風險者，自殺防範(安全)是首要。故 D 正確。","options":{"A":"建立治療性關係重要，但安全(自殺防範)優先。","B":"安排未來生活安置是後續處置。","C":"提供安靜環境讓其休息非最優先。","D":"正確。有自殺病史且現有自殺意念，最優先採取自殺防範措施。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"112180-N5-9":{"quick":"ECT：單側式電極片放在非優勢大腦的額顳交接處。","detail":{"background":"電氣痙攣療法(ECT)的正確敘述:(D)『單側式 ECT 通常將電極片放在「非優勢」半球的額顳交接處(以減少記憶等認知副作用)』。其他錯誤:A 治療時電流通過腦部僅『約0.5~2秒(瞬間)』引發痙攣，並非「1分鐘」;B 痙攣是『先「強直性(tonic)」、後「陣攣性(clonic)」』，非先陣攣後強直;C ECT 對『嚴重憂鬱症(尤其有自殺意圖、藥物無效)』療效最佳，並非雙相急性躁期療效最佳。故 D 正確。","options":{"A":"電流通過僅約0.5~2秒(瞬間)，非1分鐘。","B":"痙攣是先強直性後陣攣性，非先陣攣。","C":"ECT 對嚴重憂鬱症療效最佳，非急性躁期。","D":"正確。單側式電極片放在非優勢大腦的額顳交接處。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","ECT"]}},"112180-N5-15":{"quick":"躁症攻擊行為的護理：鼓勵言語表達感受②、必要時帶入保護室③、以堅定口氣指示適當行為④(將病人留在現場①錯)。","detail":{"background":"林先生躁症發作、易與人衝突、出現攻擊行為。正確的護理:(2)鼓勵病人『以言語表達其感受(替代攻擊)』;(3)必要時，帶入保護室隔離(保護安全);(4)『以堅定口氣指示病人適當的行為(設限)』。而(1)『將病人留在現場』錯誤——衝突/攻擊時應『將病人帶離衝突現場(與刺激源、衝突對象分開)』，而非留在現場(留在現場會持續刺激、升高衝突)。故正確為②③④(選 D)。","options":{"A":"123：含①(留在現場)，應帶離衝突現場。","B":"124：含①，錯誤。","C":"134：含①，錯誤。","D":"正確。鼓勵言語表達②、必要時帶入保護室③、堅定口氣指示適當行為④。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","暴力處置"]}},"112180-N5-16":{"quick":"18歲首次雙相的護理指導：需規律藥物治療，避免疾病再發作。","detail":{"background":"李同學18歲、第一次診斷第一型雙相。最適宜的護理指導是(C)『需規律藥物治療(情緒穩定劑)，以避免疾病再發作』——強調規則服藥、預防復發是雙相照護的核心。其他錯誤:A『功能會退化、需長期安置』過於悲觀、不正確(雙相在發作間期功能多可恢復);B『發病年齡越晚預後越差』錯誤(一般是發病「越早」預後越差);D 服用鋰鹽血中濃度應維持在『約0.6~1.2(維持期)/1.0~1.5(急性期)』，「1.5」偏高(接近中毒)。故 C 正確。","options":{"A":"雙相在發作間期功能多可恢復，非必然退化需長期安置。","B":"一般是發病越早預後越差，非越晚越差。","C":"正確。需規律藥物治療，避免疾病再發作。","D":"維持期約0.6~1.2，「1.5」偏高接近中毒。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","雙相衛教"]}},"113030-N5-4":{"quick":"憂鬱病人的溝通技巧「最不適宜」＝批判。","detail":{"background":"李先生憂鬱、因工作不順與同事嚴重爭執而就醫。最不適宜的溝通技巧是(D)『批判(judging)』——批判會讓憂鬱、脆弱的病人感到被否定、加重其無價值感與罪惡感，破壞治療關係。其他適宜:A 主動傾聽;B 澄清(確認其意思);C 拓寬話題(引導其多表達)。故本題選最不適宜者為 D。治療性溝通應避免批判、說教、否定。","options":{"A":"主動傾聽是適宜的治療性溝通。","B":"澄清是適宜的治療性溝通。","C":"拓寬話題是適宜的治療性溝通。","D":"正確(本題選最不適宜者)。批判會否定病人、破壞治療關係。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"113030-N5-8":{"quick":"雙相的生物病因：跟內分泌系統或神經傳導物質有關，需要藥物治療。","detail":{"background":"葉同學雙相、媽媽詢問病因。關於生物病因，最適切的回答是(B)『跟內分泌系統或神經傳導物質(單胺類)的失調有關，需要藥物治療』。其他錯誤:A『受近日高溫影響、天氣轉涼即改善』錯誤(與天氣無關);C『跟家族遺傳無直接相關』錯誤(雙相遺傳度高、與家族遺傳有關);D『鉛中毒是最常見的生物病因』錯誤(鉛中毒非雙相的病因)。故 B 正確。雙相的生物病因主要是神經傳導物質失調與遺傳體質。","options":{"A":"與天氣高溫無關。","B":"正確。跟內分泌系統或神經傳導物質有關，需要藥物治療。","C":"雙相遺傳度高，與家族遺傳有關，非無關。","D":"鉛中毒非雙相的病因。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"113030-N5-9":{"quick":"鬱症發作診斷：憂鬱症狀須持續二週才能診斷。","detail":{"background":"鬱症發作(major depressive episode)的診斷:(B)『憂鬱症狀(情緒低落或興趣喪失等)須「持續至少二週」、且大部分時間出現，才能診斷』。其他錯誤:A『主觀感受想法洶湧不止』偏向躁症的意念飛躍;C 鬱症『「會」造成社交、職業或其他功能缺損(這是診斷要件)』，並非「與功能缺損無關」;D 鬱症的睡眠障礙『可以是失眠，「也可以是嗜睡」』，並非「不會嗜睡」。故 B 正確。","options":{"A":"想法洶湧不止偏向躁症的意念飛躍。","B":"正確。憂鬱症狀須持續二週才能診斷。","C":"鬱症會造成功能缺損，這是診斷要件。","D":"鬱症可能失眠，也可能嗜睡。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","DSM-5 鬱症"]}},"113030-N5-18":{"quick":"84歲喪偶、不想吃藥、活著沒意思：最優先＝進一步評估自殺意念與計畫、防範自殺。","detail":{"background":"廖奶奶84歲、獨居、三個月前喪偶、表示「不想再吃藥、活著沒有意思」(老年喪偶後憂鬱+自殺警訊)。最優先的護理處置是(B)『進一步評估其自殺意念與計畫，防範自殺危險』——「活著沒有意思」是自殺警訊，老年喪偶、獨居又是高風險，須優先評估自殺風險、確保安全。了解感受/協助抒發、緬懷治療、安排護理之家都是後續或次要。對透露自殺意念的高風險老人，優先評估自殺風險。故 B 正確。","options":{"A":"了解感受、協助抒發重要，但優先評估自殺風險。","B":"正確。進一步評估自殺意念與計畫、防範自殺危險。","C":"緬懷治療是後續處置。","D":"安排護理之家不符當下的自殺風險處置。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","老年自殺"]}},"113030-N5-19":{"quick":"喪偶憂鬱老人入院治療：透過哀傷輔導，協助廖奶奶表達內心的感受。","detail":{"background":"廖奶奶喪偶後憂鬱入院。最適當的治療敘述是(A)『透過「哀傷輔導(grief counseling)」，協助廖奶奶表達內心的感受(失落、悲傷)』——喪偶的哀傷是其憂鬱的核心，哀傷輔導協助其表達、處理失落。其他錯誤:B『rivastigmine(Exelon)』是「失智症」用藥(膽鹼酯酶抑制劑)，非憂鬱治療;C 密切觀察是必要，但「每5分鐘探視」過於頻繁、不切實際(一般高風險為每15分鐘);D『要求參加「所有」治療活動』過於勉強、不尊重其步調。故 A 正確。","options":{"A":"正確。透過哀傷輔導，協助廖奶奶表達內心的感受。","B":"rivastigmine 是失智症用藥，非憂鬱治療。","C":"「每5分鐘探視」過於頻繁、不切實際。","D":"要求參加所有活動過於勉強、不尊重其步調。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","哀傷輔導"]}},"113030-N5-25":{"quick":"自殺企圖者的保護約束「最不適當」＝應持續約束直到自殺意念消失。","detail":{"background":"吳先生多次割腕自殺須保護約束。約束處置「最不適當」者為(D)『應「持續」約束病人，直到自殺意念消失』——約束應在『必要的「最短時間」內、並「定期評估」是否可解除』，而非「持續約束到意念消失」(過度、不人道，且自殺意念可能持續很久)。其他適當:A 需有醫師開立醫囑才能約束;B 至少每15分鐘探視一次;C 每2小時評估是否可解除約束。故本題選最不適當者為 D。","options":{"A":"需有醫師醫囑才能約束，正確。","B":"至少每15分鐘探視一次，正確。","C":"每2小時評估是否可解除約束，正確。","D":"正確(本題選最不適當者)。約束應在最短時間、定期評估解除，非持續到意念消失。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","保護約束"]}},"113100-N5-9":{"quick":"躁症住院環境：家具避免跌撞/破壞②、提供消耗體力的活動③、準備高熱量簡便食物④(壁飾窗簾都應避免①過度)。","detail":{"background":"躁症發作病人的住院環境考量:(2)『家具擺放避免病人跌撞或暴力破壞(安全)』;(3)『提供能消耗體力的活動與設施(疏導其過剩精力)』;(4)『病房伙食準備高熱量、簡便的食物(配合其活動量大、無法久坐進食)』。而(1)『環境簡化、但「壁飾窗簾都應避免」』過度——躁症雖宜「減少過度刺激」，但不需把壁飾、窗簾「全部避免」(基本的環境布置仍可保留，重點是避免「過度」刺激)。故正確為②③④(選 B)。","options":{"A":"123：含①(壁飾窗簾都應避免)，過度。","B":"正確。家具避免跌撞/破壞②、消耗體力活動③、高熱量簡便食物④。","C":"134：含①，錯誤。","D":"124：含①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症·環境"]}},"113100-N5-11":{"quick":"躁症與男病友躺床：觀察互動程度①、分開並密切觀察②、鼓勵學習適切異性互動③(持續隔離④過度)。","detail":{"background":"李小姐躁症、被發現與男病友一起躺床(躁期性脫抑制)。較適宜的護理:(1)觀察兩人的性互動行為程度(評估);(2)將兩人分開、持續密切觀察(保護安全、設限);(3)鼓勵學習適切的異性互動(教育、引導)。而(4)『將李小姐「持續隔離」、防範接觸異性』過度——僅脫抑制行為、非暴力，不應以持續隔離作為手段(應以設限、引導、觀察處理)。故正確為①②③(選 A)。","options":{"A":"正確。觀察互動程度①、分開並密切觀察②、鼓勵學習適切異性互動③。","B":"234：含④(持續隔離)，過度。","C":"134：含④，錯誤。","D":"124：含④，錯誤。"}
