,"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症·脫抑制"]}},"113100-N5-12":{"quick":"雙相鬱症症狀「不包括」＝偶而睡眠差、無精打采。","detail":{"background":"依 DSM-5，第一型雙相的鬱症發作症狀，「不包括」者為(B)『「偶而」睡眠差、無精打采』——鬱症的症狀須是『「幾乎每天」、大部分時間出現、持續至少兩週』，而非「偶而」(偶而不符診斷的頻率與持續性要件)。其他屬於鬱症症狀:A 幾乎每天感到悲傷、哭泣;C 一個月內體重明顯增加或減少超過5%;D 社交、職業或其他重要功能減損。故本題選不包括者為 B。","options":{"A":"幾乎每天悲傷、哭泣，是鬱症症狀。","B":"正確(本題選不包括者)。鬱症須「幾乎每天」，非「偶而」。","C":"體重明顯變化超過5%，是鬱症症狀。","D":"功能減損是鬱症的診斷要件。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","DSM-5 鬱症"]}},"113180-N5-4":{"quick":"鋰鹽：服藥後若出現腸胃症狀(噁心嘔吐)，可建議進餐時服用。","detail":{"background":"鋰鹽(Lithium)的正確敘述:(D)『服用後若出現腸胃症狀(噁心、嘔吐)，可建議「進餐時(隨餐)服用」以減輕腸胃不適』。其他錯誤:A 鋰鹽是『「穩定」情緒(抑制躁症)』，並非「促進兒茶酚胺分泌及活化」(那會加重躁症);B 鋰鹽『需服用約1~2週才逐漸見效』，並非「2天就明顯穩定」;C 鋰鹽『不可嚴格限制食鹽(鈉)攝取』——限鈉會使腎臟對鋰的再吸收增加、鋰濃度上升而「中毒」(故應維持正常、穩定的鈉攝取)。故 D 正確。","options":{"A":"鋰鹽是穩定情緒，非促進兒茶酚胺分泌(那會加重躁症)。","B":"鋰鹽需約1~2週才見效，非2天。","C":"不可嚴格限鹽，限鈉會使鋰濃度上升而中毒。","D":"正確。出現腸胃症狀時可建議進餐時服用。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽"]}},"113180-N5-8":{"quick":"躁症(神力女超人、不進食、不睡、打電話)的護理問題：營養攝取不足①、睡眠型態紊亂③。","detail":{"background":"高小姐雙相躁症(誇大自稱神力女超人、不進食、晚上不睡一直打電話)。適切的護理問題:(1)營養攝取不足(不進食、活動量大);(3)睡眠型態紊亂(不睡覺)。而(2)『「現存性」自我傷害』不符(題幹未提及她已出現自傷行為);(4)『恐懼』不符(躁症情緒高昂、誇大，非恐懼)。故正確為①③(選 B)。躁症的典型護理問題包括營養不足、睡眠紊亂、社交互動障礙、思考過程改變。","options":{"A":"12：含②(現存性自我傷害)，題幹未提及自傷。","B":"正確。營養攝取不足①、睡眠型態紊亂③。","C":"24：含②④，皆不符。","D":"34：含④(恐懼)，躁症非恐懼。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症護理"]}},"113180-N5-12":{"quick":"鬱症、自殺、每日哭泣的家屬照護：協助家屬瞭解病人目前的狀況。","detail":{"background":"陳先生鬱症發作、有自殺行為、每日哭泣。對家屬的照護，最適宜的是(A)『協助家屬瞭解病人目前的狀況(病情、自殺風險、如何支持與觀察)』——讓家屬理解病情、學習如何照護與防範，是重要的家屬支持與衛教。B『勸家屬暫停探望』錯誤(家庭支持有助病人，不應暫停);C『保證治療後就不會再發病』是不實保證(憂鬱可能復發);D『建議家屬避免與親友互動』錯誤(社會支持對家屬與病人都重要)。故 A 正確。","options":{"A":"正確。協助家屬瞭解病人目前的狀況。","B":"家庭支持有助病人，不應勸家屬暫停探望。","C":"「治療後不會再發病」是不實保證。","D":"避免與親友互動會削弱社會支持，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","家屬照護"]}},"114030-N5-11":{"quick":"憂鬱、臥床獨處、少互動：設計簡單的活動，增加病人的活動。","detail":{"background":"宋小姐情緒低落、有自殺行為、常臥床獨處、少與病友互動(退縮)。最適宜的護理是(D)『設計簡單的活動，增加病人的活動(減少退縮、增加正向經驗與人際接觸)』——以簡單、可完成的活動逐步帶動病人，避免完全退縮。其他錯誤:A『減少光線刺激』、C『播放低沉音樂』會強化憂鬱氛圍;B『提供安靜單人房減少打擾』使其更孤立、不利觀察與安全。故 D 正確。對退縮的憂鬱病人，設計簡單活動逐步帶動參與。","options":{"A":"減少光線刺激會強化憂鬱氛圍。","B":"安靜單人房使其更孤立、不利觀察與安全。","C":"播放低沉音樂會強化憂鬱氛圍。","D":"正確。設計簡單的活動，增加病人的活動。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"114030-N5-20":{"quick":"老年憂鬱症「最不適切」＝合併日落症候群。","detail":{"background":"老年憂鬱症的敘述，「最不適切」者為(D)『合併「日落症候群(sundowning)」』——日落症候群(傍晚/夜間意識混亂、躁動加劇)是『「失智症/譫妄」』的特徵，而非老年憂鬱症。其他正確:A 老年憂鬱常『以身體症狀(somatic)反應情緒(如疼痛、腸胃不適)』;B 常談論自殺想法(老年自殺風險高);C 記憶力變差(老年憂鬱可致「假性失智 pseudodementia」)。故本題選最不適切者為 D。","options":{"A":"老年憂鬱常以身體症狀反應情緒，正確。","B":"常談論自殺想法，正確(老年自殺風險高)。","C":"記憶力變差(假性失智)，正確。","D":"正確(本題選最不適切者)。日落症候群是失智/譫妄的特徵，非憂鬱症。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","老年憂鬱"]}},"114030-N5-23":{"quick":"深信罹癌(檢查正常)、無食慾失眠、有輕生念頭：最優先＝評估自殺的風險程度。","detail":{"background":"楊太太擔心罹患大腸癌、多次檢查正常仍深信不久人世(疑病/慮病妄想合併憂鬱)、無食慾、失眠、『有輕生念頭』。最優先的護理措施是(C)『評估自殺的風險程度』——有輕生念頭即須優先評估自殺風險、確保安全。教導紓壓、再做檢查、鼓勵寫遺囑都非優先(且「鼓勵寫遺囑」明顯不當)。對有輕生念頭者，優先評估自殺風險。故 C 正確。","options":{"A":"教導紓壓非當下最優先(先評估自殺風險)。","B":"再做詳盡檢查無助於其疑病信念，非優先。","C":"正確。有輕生念頭，最優先評估自殺的風險程度。","D":"「鼓勵寫遺囑」明顯不當、會強化其輕生念頭。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"114100-N5-3":{"quick":"面對多重挫折憂鬱者的回應「不適當」＝「你的憂鬱一定會很快好起來、不用想那麼多」。","detail":{"background":"林太太面臨多項挫折而憂鬱。護理師的回應「不適當」者為(B)『「你的憂鬱情緒一定會很快就好起來的，不用想那麼多」』——這是『空泛保證+否定其感受(叫她不要想)』，會讓病人覺得不被理解。其他適當:A 鼓勵其訴說難過的心情與感受;C 陪伴坐著、不刻意說什麼(治療性陪伴/沉默);D 同理「我了解面對這麼多問題讓你感到難受」。故本題選不適當者為 B。治療性溝通應避免空泛保證與否定感受。","options":{"A":"鼓勵訴說心情與感受是適當的。","B":"正確(本題選不適當者)。空泛保證+否定感受，不適當。","C":"治療性陪伴/沉默是適當的。","D":"同理其難受是適當的。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry"]}},"114100-N5-4":{"quick":"長期使用鋰鹽須定期檢查：甲狀腺功能①、腎臟功能④。","detail":{"background":"長期使用鋰鹽(Lithium)治療雙相，必須定期檢查的項目是:(1)『甲狀腺功能』(鋰可能抑制甲狀腺、致甲狀腺功能低下);(4)『腎臟功能』(鋰由腎排除、長期使用可能影響腎功能)。而(2)肺功能、(3)肝功能不是鋰鹽監測的重點(鋰不經肝代謝、不影響肺)。故正確為①④(選 D)。使用鋰鹽前及期間，應監測甲狀腺功能、腎功能、電解質與鋰鹽血中濃度。","options":{"A":"12：含②(肺功能)，非鋰鹽監測重點。","B":"23：含②③，皆非鋰鹽監測重點。","C":"34：含③(肝功能)，錯誤。","D":"正確。甲狀腺功能①、腎臟功能④。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","鋰鹽監測"]}},"114100-N5-12":{"quick":"躁症的操縱/威脅行為：以「就事論事」的態度給予設限。","detail":{"background":"宋先生躁症、語帶操縱或威脅地命令病友、強占主導權。針對其操縱行為，最適當的護理是(A)『以「就事論事(matter-of-fact)」的態度給予設限』——以中性、清楚、一致的態度設定明確界限，是處理操縱行為的關鍵(不帶情緒、不被分化)。B『權威式態度』過於強硬、易對立;C『包容病人的行為』是放任、給操縱空間;D『私下協調病友接納其行為』是縱容、未設限。故 A 正確。對操縱行為，宜以就事論事的態度設限、團隊一致。","options":{"A":"正確。以就事論事的態度給予設限。","B":"權威式態度過於強硬、易對立。","C":"包容(放任)病人的行為是給操縱空間。","D":"私下協調病友接納是縱容、未設限。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","操縱行為"]}},"114100-N5-19":{"quick":"老年憂鬱症「錯誤」者＝老年憂鬱症通常會有明顯的憂鬱情緒表現。","detail":{"background":"老年憂鬱症的敘述，「錯誤」者為(A)『老年憂鬱症通常會有「明顯的憂鬱情緒表現」』——老年憂鬱常『「不」以明顯的憂鬱情緒表現，反而以「身體症狀(somatic)、記憶力變差(假性失智)、易怒、退縮」等非典型方式呈現』，憂鬱情緒常被掩蓋，故易被忽略、低估。其他正確:B 女性老年人較男性發生憂鬱比例高;C 城市老年人較鄉村發生憂鬱比例高;D 慢性病老年人較一般老年人發生憂鬱比例高。故本題選錯誤者為 A。","options":{"A":"正確(本題選錯誤者)。老年憂鬱常以身體症狀表現，憂鬱情緒不明顯、被掩蓋。","B":"女性老年人發生憂鬱比例高，正確。","C":"城市老年人發生憂鬱比例高，正確。","D":"慢性病老年人發生憂鬱比例高，正確。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","老年憂鬱"]}},"114170-N5-11":{"quick":"躁症的主要健康問題：自我照顧能力缺失①、思考過程改變③、睡眠型態紊亂④。","detail":{"background":"楊小姐雙相躁症(滔滔不絕、意念飛躍、情緒高亢易怒、吃飯洗澡分心、入睡困難、與陌生人發生性行為)。其主要健康問題:(1)自我照顧能力缺失(吃飯、洗澡分心、無法完成);(3)思考過程改變(意念飛躍);(4)睡眠型態紊亂(入睡困難)。而(2)『潛在危險性對「自我」的暴力行為』不是本題最主要的問題(其與陌生人性行為屬「衝動、判斷力差、脫抑制」，而非自殺/自傷的暴力)。故正確為①③④(選 C)。","options":{"A":"123：含②(對自我暴力)，非本題主要問題。","B":"234：含②、缺①，錯誤。","C":"正確。自我照顧能力缺失①、思考過程改變③、睡眠型態紊亂④。","D":"124：含②，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症護理"]}},"114170-N5-13":{"quick":"抗鬱劑衛教：服用單胺氧化酶抑制劑(MAOI)須勿食含酪胺酸(tyramine)食物。","detail":{"background":"抗鬱劑衛教的正確敘述:(D)『服用「單胺氧化酶抑制劑(MAOI)」須衛教病人「勿食用含酪胺酸(tyramine)的食物(如起司、醃製品、紅酒)」』——MAOI 與酪胺酸併用會引發『高血壓危象』。其他錯誤:A 服 SSRI『無須減少水分攝取』(減少水分的是鋰鹽相關的錯誤敘述);B fluoxetine(Prozac)較具『提神/活化(activating)』作用、易致『失眠』，故多建議『「白天/早上」服用』，非睡前;C 出現激躁、高燒等『血清素症候群』時，須『「停用」血清素類藥物、緊急處理』，而非「增加劑量」。故 D 正確。","options":{"A":"服 SSRI 無須減少水分攝取。","B":"fluoxetine 易致失眠，多建議白天服用，非睡前。","C":"血清素症候群須停藥、緊急處理，非增加劑量。","D":"正確。服 MAOI 須勿食含酪胺酸食物(防高血壓危象)。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","抗鬱劑衛教"]}},"114170-N5-14":{"quick":"憂鬱症：腦中血清素不足③、女性發生率大於男性④。","detail":{"background":"憂鬱症的正確敘述:(3)『腦中血清素(及正腎上腺素)「不足」』(單胺假說);(4)『女性發生率大於男性(約2:1)』。其他錯誤:(1)憂鬱症與『甲狀腺功能「過低(甲低)」』相關，而非過高(甲狀腺功能過高/亢進多表現為焦慮、躁動);(2)憂鬱發作的症狀須持續『至少「二週」』，而非六個月。故正確為③④(選 B)。","options":{"A":"12：①甲狀腺過高(應過低)、②六個月(應二週)，皆錯。","B":"正確。腦中血清素不足③、女性發生率大於男性④。","C":"13：含①(甲狀腺過高)，錯誤。","D":"24：含②(六個月)，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","憂鬱症"]}},"114170-N5-17":{"quick":"自殺概念「最不適當」＝自殺的想法一定會持續存在、並不會消失。","detail":{"background":"自殺概念的敘述，「最不適當」者為(C)『自殺的想法「一定會持續存在、並不會消失」』——錯誤，自殺意念常是『矛盾、波動的，可能隨情緒、處境改善而「消退」』(故危機介入、支持能降低自殺風險)。其他正確:A 大部分自殺者內心充滿矛盾、猶豫不決(求生與求死並存);B 多數自殺者會以口頭、書面、行為等方式表達自殺意念與企圖(求救訊號);D 曾有自殺企圖者，再自殺時可能以更激烈的行動。故本題選最不適當者為 C。","options":{"A":"自殺者內心常充滿矛盾、猶豫，正確。","B":"多數自殺者會以各種方式表達意念，正確。","C":"正確(本題選最不適當者)。自殺意念是矛盾波動的，可能消退。","D":"曾自殺者再自殺可能更激烈，正確。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引"]}},"114170-N5-18":{"quick":"老年人自殺特性「最不適當」＝輕度失智症老人不會有自殺傾向。","detail":{"background":"老年人自殺特性的敘述，「最不適當」者為(D)『輕度失智症老人「不會」有自殺傾向』——錯誤，輕度(早期)失智的老人因『察覺自己認知退化、對未來絕望，「仍可能」有自殺傾向』(早期失智合併憂鬱時自殺風險不可忽視)。其他正確:A 老人的自殺意圖強烈(致死率高、較少求救);B 老人較少主動尋求精神科醫療;C 獨居是老年人自殺的危險因子之一。故本題選最不適當者為 D。","options":{"A":"老人的自殺意圖強烈、致死率高，正確。","B":"老人較少尋求精神科醫療，正確。","C":"獨居是老年人自殺的危險因子，正確。","D":"正確(本題選最不適當者)。輕度失智老人仍可能有自殺傾向。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","台灣自殺防治學會·自殺防治指引","老年自殺"]}},"114170-N5-19":{"quick":"躁症住院護理：飲食宜選擇高熱量、易消化的食物。","detail":{"background":"躁症病人住院期間的護理，最適當的是(D)『飲食的攝取宜選擇「高熱量、易消化」的食物(配合其活動量大、消耗高、無法久坐進食)』。其他錯誤:A『安排競爭性活動』是高刺激、會更激動;B『直接駁斥病人的誇大談話』是爭辯、會升高對立(對誇大宜不爭辯、適度引導);C『睡前增加運動量』會使其更亢奮、更難入睡(不利睡眠)。故 D 正確。對躁症病人，宜提供高熱量易消化的食物、安排低刺激活動、避免爭辯。","options":{"A":"競爭性活動是高刺激、會更激動。","B":"直接駁斥誇大談話是爭辯、會升高對立。","C":"睡前增加運動會使其更亢奮、更難入睡。","D":"正確。飲食宜選擇高熱量、易消化的食物。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症護理"]}},"114170-N5-20":{"quick":"躁症的過多要求：拖延轉移注意力①、給予適當限制③、雙方協商給予部分滿足④(肢體約束②過度)。","detail":{"background":"躁症病人常到護理站做過多要求(如外出買零食)。適當的護理措施:(1)『拖延、轉移注意力』(以拖延、轉移化解不合理的即時要求);(3)『給予適當的限制(設限)』;(4)『雙方協商，給予「部分」滿足(在合理範圍內回應)』。而(2)『執行肢體約束』過度——僅是過多要求、非暴力或危險行為，不應使用肢體約束。故正確為①③④(選 C)。對躁症的過度要求，宜以轉移、設限、部分滿足來處理。","options":{"A":"123：含②(肢體約束)，過度。","B":"124：含②，錯誤。","C":"正確。拖延轉移注意力①、適當限制③、協商部分滿足④。","D":"234：含②、缺①，錯誤。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症·設限"]}},"115030-N5-2":{"quick":"說明 ECT 療效與過程、讓病人充分了解後再決定簽署同意書＝自主原則。","detail":{"background":"醫療人員向病人與家屬說明電痙攣療法的療效與治療過程，「讓他們充分了解後再決定是否簽署同意書」——這體現了『自主原則(autonomy)』:尊重病人在『充分知情』下『自主決定』是否接受治療(知情同意 informed consent 是自主原則的具體實踐)。不傷害原則是避免造成傷害;誠實原則是據實告知;公平原則是公平分配資源。本題核心是「知情後自主決定」，故為自主原則。故 A 正確。","options":{"A":"正確。知情同意、讓病人自主決定，體現自主原則。","B":"不傷害原則是避免造成傷害。","C":"誠實原則是據實告知(本題重點是自主決定)。","D":"公平原則是公平分配資源。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","倫理原則"]}},"115030-N5-4":{"quick":"重考失利後鬱症、父母仍要求鞭策：父母的照護能力是「續存(perpetuating)因素」。","detail":{"background":"20歲重考生鬱症的病因因素分析:(C)『父母的照護能力(不理解病情、仍要求重回補習班接受鞭策、辦自動出院)，是使疾病「持續/惡化」的「續存因素(perpetuating factor)」』(出院後即出現自殺企圖，反映此續存因素的負面影響)。其他錯誤:A『指考失利』是「促發因素(誘發此次發作)」，非潛在因素;B『個性內向順從』是「潛在(體質)因素」，非促發因素;D『成長過程受寵呵護』是「潛在因素」，非促發因素。故 C 正確。","options":{"A":"指考失利是促發因素(誘發此次發作)，非潛在因素。","B":"個性內向順從是潛在因素，非促發因素。","C":"正確。父母的照護能力使疾病持續/惡化，是續存因素。","D":"成長受寵呵護是潛在因素，非促發因素。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","病因因素"]}},"115030-N5-5":{"quick":"老人憂鬱症「錯誤」者＝是老年人口中罕見的疾病。","detail":{"background":"老人憂鬱症的敘述，「錯誤」者為(A)『是老年人口中「罕見」的疾病』——錯誤，憂鬱症是老年人口中『「常見」的精神疾病(盛行率不低，且常被低估)』。其他正確:B 自殺是憂鬱症最具潛在性的致命因素;C 老人憂鬱常『抱怨認知障礙(記憶變差，呈「假性失智」)』;D 老人常『訴說身體症狀(somatic)而忽略/掩蓋情緒症狀』。故本題選錯誤者為 A。","options":{"A":"正確(本題選錯誤者)。老人憂鬱症是常見疾病，非罕見。","B":"自殺是憂鬱症最具潛在性致命因素，正確。","C":"老人憂鬱會抱怨認知障礙(假性失智)，正確。","D":"老人常訴說身體症狀而忽略情緒症狀，正確。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","老年憂鬱"]}},"115030-N5-11":{"quick":"雙相、要求被拒後摔東西：引導病人用言語表達憤怒。","detail":{"background":"謝先生雙相、因要求外出抽菸未獲同意而摔東西(憤怒、衝動)。最適宜的護理是(B)『引導病人用「言語」表達憤怒(以言語替代破壞行為)』——協助病人以較適當的方式表達情緒。A『以嚴厲語氣制止』會升高對立;C『告知會延後出院』是威脅、用住院作懲罰;D『直接約束』過度(摔東西的當下宜先引導言語表達、設限，約束是最後手段)。故 B 正確。對憤怒衝動的病人，宜引導以言語表達、適度設限。","options":{"A":"以嚴厲語氣制止會升高對立。","B":"正確。引導病人用言語表達憤怒。","C":"告知延後出院是威脅、用住院作懲罰。","D":"直接約束過度，約束是最後手段。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","暴力處置"]}},"115030-N5-13":{"quick":"躁症在客廳滔滔批判、要投訴媒體：將林先生帶開，陪伴參加病房活動(轉移)。","detail":{"background":"林先生躁症、在客廳對病友滔滔不絕批判醫護與設施、要投訴媒體(誇大、過度涉入、易煽動他人)。最適宜的處置是(A)『將林先生帶開，陪伴他參加病房歌唱活動(轉移注意力、帶離刺激情境)』——以轉移、帶離的方式化解，避免在公開場合與其爭辯或讓其持續煽動。B『轉知被批判的醫護人員改善態度』是配合其抱怨內容;C『持續傾聽抱怨並給予肯定』會強化此行為;D『提供事實、澄清批判內容』在當下公開爭辯易升高對立。故 A 正確。對躁症的公開批判/煽動，宜轉移、帶離。","options":{"A":"正確。將林先生帶開、陪伴參加活動(轉移注意力)。","B":"轉知醫護改善態度是配合其抱怨內容。","C":"持續傾聽並肯定會強化此行為。","D":"當下公開爭辯澄清易升高對立。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","躁症護理"]}},"115030-N5-21":{"quick":"約束隔離：運用隔離措施的三個原則包括獨居、隔離、減少感覺輸入。","detail":{"background":"涂先生與病友口角、出現攻擊行為並揚言致其死(暴力危機)，經醫囑約束隔離。關於約束隔離的正確敘述:(C)『運用隔離措施的三個原則，包括「獨居、隔離、減少感覺輸入」』(提供低刺激、安全的隔離環境)。其他錯誤:A 約束的目的『「同時」考量保護涂先生與「保護另一位病友免於傷害」』，並非「而非考量保護另一位病友」;B 約束『在符合適應症、程序正當下「並不必然不符倫理」』，且非「破壞信任關係的主因」(適當執行、充分說明可維持信任);D『因情況危急，「仍須」向涂先生說明』(約束前/中應向病人說明理由)，並非「不需說明太多」。故 C 正確。","options":{"A":"約束同時保護病人與他人，非「而非考量保護病友」。","B":"適當執行的約束不必然不符倫理，非破壞信任的主因。","C":"正確。隔離三原則包括獨居、隔離、減少感覺輸入。","D":"危急時仍須向病人說明約束理由，非不需說明。"},"sources":["精神科護理學(新文京/華杏)·情緒障礙","DSM-5-TR","Kaplan & Sadock Synopsis of Psychiatry","約束隔離"]}}},TO=["情緒障礙憂鬱雙相與自殺防治"],LEC={"情緒障礙憂鬱雙相與自殺防治":{"title":"情緒障礙與自殺防治　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「情緒障礙憂鬱雙相與自殺防治」的歷屆考題共 187 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。建議先讀詳解中的背景知識建立概念，再逐選項釐清易混淆處。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n5_p4_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
