"options":{"A":"24小時","B":"36小時","C":"48小時","D":"72小時"},"img":""},{"id":"115030-N5-44","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":44,"stem":"護理師對於懷孕的女性勞工在母性健康保護的相關措施,下列何者最不適當?","opts":{"A":"評估用藥情形","B":"評估職業暴露","C":"加強工作效率","D":"適時調整配工"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"topic":"學校職業環境與食品衛生","topic_num":"學校職業環境與食品衛生","q_num":44,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"評估用藥情形","B":"評估職業暴露","C":"加強工作效率","D":"適時調整配工"},"img":""},{"id":"115030-N5-45","code":"115030","roc":"115","cat":"N5","catname":"精神科與社區衛生護理學","num":45,"stem":"依據學校衛生法,國民中小學設施設備基準規範,有關學校健康環境之敘述,下列何者最適當?","opts":{"A":"教室噪音應控制在80分貝以下","B":"教室的窗戶至少應占建坪面積的5分之1","C":"教室桌面照度不低於400 Lux","D":"黑板照度不低於650 Lux"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"topic":"學校職業環境與食品衛生","topic_num":"學校職業環境與食品衛生","q_num":45,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"教室噪音應控制在80分貝以下","B":"教室的窗戶至少應占建坪面積的5分之1","C":"教室桌面照度不低於400 Lux","D":"黑板照度不低於650 Lux"},"img":""}],E={"101030-N5-60":{"quick":"水污染的描述「錯誤」者＝一般污染越嚴重，水中生物種類會增多但數量則減少。","detail":{"background":"水污染的描述，「錯誤」者為(C)『「一般污染越嚴重，水中生物「種類「「增多」」」但數量則減少」』——錯誤，「水污染「越嚴重」，水中生物的「「種類「「「減少」」」(只剩「耐污」的少數種類)，但「「耐污種類的「數量」可能「增多」」(優勢化);敘述「種類增多」是錯誤。其他正確:A 水中含磷高表示受工廠廢水、家庭污水、清潔劑、肥料等污染(優養化)、B 細菌總數越多表示污染越嚴重、D 熱污染可能導致水中生物畸形。故本題選錯誤者為 C。污染越嚴重，生物種類減少(非增多)。","options":{"A":"含磷高表示受廢水、污水、清潔劑、肥料污染，正確。","B":"細菌總數越多表示污染越嚴重，正確。","C":"正確(本題選錯誤者)。污染越嚴重，生物種類減少，非增多。","D":"熱污染可能導致水中生物畸形，正確。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"101030-N5-61":{"quick":"酸雨是由「空氣污染」所造成的公害。","detail":{"background":"酸雨是由(A)『「空氣污染」』所造成——「空氣中的「硫氧化物(SOx)、氮氧化物(NOx)」(來自工廠、汽機車的「燃燒排放」)，與「水氣結合」形成「「硫酸、硝酸」」，隨雨水降下形成「酸雨」(pH<5.6)』。故 A 正確。酸雨源於空氣污染(SOx、NOx 與水氣結合)。","options":{"A":"正確。酸雨是由空氣污染(SOx、NOx)所造成。","B":"水污染不會造成酸雨。","C":"土壤污染不會造成酸雨。","D":"噪音污染不會造成酸雨。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"101030-N5-70":{"quick":"工作須重複相同的肢體動作，易造成「物理性(人體工學)」工作危害。","detail":{"background":"工廠生產線勞工若須「「重複相同的肢體動作」」，易造成(B)『「物理性(人體工學/ergonomic)危害(「「重複性動作、不良姿勢、施力不當」」造成「肌肉骨骼傷害(如肌腱炎、腕隧道症候群)」)」』。生物性是病原微生物;化學性是化學物質;社會性是社會心理。「重複動作(人因工程)」屬物理性危害。故 B 正確。重複性動作(人因工程)屬物理性危害。","options":{"A":"生物性是病原微生物(細菌、病毒)的危害。","B":"正確。重複相同肢體動作(人體工學)，屬物理性危害。","C":"化學性是化學物質的危害。","D":"社會性是社會心理層面的危害。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"101110-N5-61":{"quick":"空氣污染物中硫氧化物(SOx)對人體的主要危害＝氣喘及呼吸系統疾病。","detail":{"background":"空氣污染物中的「硫氧化物(SOx)」對人體的主要危害是(B)『「氣喘及呼吸系統疾病(SOx 是「刺激性氣體」，會「刺激呼吸道、誘發或加重「氣喘、支氣管炎」」等呼吸系統疾病)」』。胎兒體重過輕、消化系統、中樞神經系統非 SOx 的主要危害。故 B 正確。SOx 主要危害呼吸系統(氣喘、呼吸道疾病)。","options":{"A":"胎兒體重過輕非 SOx 的主要危害。","B":"正確。SOx 主要危害氣喘及呼吸系統疾病。","C":"消化系統非 SOx 的主要危害。","D":"中樞神經系統非 SOx 的主要危害。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"101110-N5-66":{"quick":"感染性事業廢棄物的處理＝以紅色可燃容器密封貯存並標示感染性標誌①、常溫下貯存以1日為限②。","detail":{"background":"醫療院所貯存「與血液、體液、排泄物接觸的「可燃性「感染性」事業廢棄物」」的處理:(1)「以「「紅色」可燃容器「密封」貯存」，並「標示「感染性事業廢棄物「標誌」」」;(2)「若於「常溫」下貯存者，以「「1日」」為限」。而(3)『5度以下冷藏「14日」』錯誤(5度以下冷藏以「「7日」」為限);(4)『5至10度冷藏30日』非正確規定。故正確為①②(選 A)。感染性廢棄物:紅色容器密封標示、常溫1日、5度以下冷藏7日。","options":{"A":"正確。紅色可燃容器密封標示①、常溫貯存1日為限②。","B":"13：含③(5度以下14日，應7日)，錯誤。","C":"23：含③、缺①，錯誤。","D":"34：含③④，皆錯。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"102030-N5-61":{"quick":"PSI 在200~299時，老年人及心臟血管疾病者應留在室內、減少身體活動。","detail":{"background":"空氣污染指標值(PSI)在「「200~299(「非常不健康」等級)」」時，「「老年人及心臟血管疾病的人」」應「留在室內，並減少身體活動」(D)。(PSI:0~50良好、51~100普通、101~199不良(敏感族群注意)、「200~299「非常不健康」(老人/心血管病人留室內)」、≥300有害。)故 D 正確。PSI 200~299時敏感族群(老人/心血管病人)應留室內、減少活動。","options":{"A":"小於50是良好等級。","B":"51~100是普通等級。","C":"101~199是不良等級(敏感族群開始注意)。","D":"正確。PSI 200~299時，老人/心血管病人應留室內、減少活動。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"102030-N5-62":{"quick":"破壞肉毒桿菌「毒素」，罐頭食品加熱原則＝100°C加熱3~5分鐘。","detail":{"background":"為破壞「肉毒桿菌「毒素」」，罐頭食品的加熱原則是(D)『「「100°C」加熱「3~5分鐘」(「肉毒桿菌「「毒素」」「不耐熱」，「100°C「數分鐘」即可「破壞「毒素」」);(註:要殺死「「芽孢」」則需「高溫高壓(121°C)」)』。其他溫度/時間不足以確保破壞毒素。故 D 正確。肉毒桿菌毒素不耐熱，100°C加熱3~5分鐘即可破壞。","options":{"A":"毒素須加熱破壞，非不需加熱。","B":"80°C加熱5分鐘不足。","C":"80°C加熱10分鐘溫度仍不足(應100°C)。","D":"正確。100°C加熱3~5分鐘可破壞肉毒桿菌毒素。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"102030-N5-71":{"quick":"校園「健康環境」「正確」者＝飲水餘氯0.2~1.5 mg/L①、教室內背景噪音不超過60分貝③。","detail":{"background":"校園健康環境，正確的是:(1)「飲水「餘氯」0.2~1.5 mg/L 為宜(確保消毒效果且不過量)」;(3)「教室內「背景噪音」不超過「60分貝」(以免影響教學)」。而(2)『桌面高度為學童身高的「2/7」』非標準的規定;(4)『一般教室桌面照明維持在「850米燭光」』錯誤(教室桌面照明應「「350米燭光以上」」，850過高且非標準)。故正確為①③(選 B)。校園環境:餘氯0.2~1.5、噪音<60分貝、桌面照明≥350米燭光。","options":{"A":"12：含②(桌面高度2/7非標準)，錯誤。","B":"正確。飲水餘氯0.2~1.5①、背景噪音不超過60分貝③。","C":"23：含②、缺①，錯誤。","D":"34：含④(照明850米燭光過高)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"102030-N5-73":{"quick":"有2050位員工的公司，至少應設專任護理人員2人。","detail":{"background":"依勞工健康管理(保護)規則，事業單位的「特約/專任「護理人員」」配置依「勞工人數」而定。「有2050位員工(屬「1000人以上、未達一定上限」的規模)」應「至少設「專任護理人員「2人」」(B)。故 B 正確。(常考級距:依規模配置，2050人約需2位專任護理人員。)","options":{"A":"1人不足2050人的規模需求。","B":"正確。2050位員工至少設專任護理人員2人。","C":"3人超過此規模的最低要求。","D":"4人超過此規模的最低要求。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"102110-N5-55":{"quick":"細菌性食物中毒「致死率最高」者＝肉毒桿菌。","detail":{"background":"細菌性食物中毒中，「致死率最高」者為(C)『「肉毒桿菌(Clostridium botulinum;其「「神經毒素」」會造成「「神經麻痺、「呼吸肌麻痺」」」，「致死率高」)」』。金黃色葡萄球菌(腸毒素，多自限)、沙門氏菌(腸胃炎)的致死率較低;「黃麴黴菌」是「黴菌(產黃麴毒素，致肝癌)」，非典型的「急性細菌性食物中毒」。故 C 正確。肉毒桿菌(神經毒素、呼吸麻痺)致死率最高。","options":{"A":"金黃色葡萄球菌(腸毒素)多自限，致死率低。","B":"黃麴黴菌是黴菌(產黃麴毒素)，非急性細菌性食物中毒。","C":"正確。肉毒桿菌(神經毒素、呼吸麻痺)致死率最高。","D":"沙門氏菌(腸胃炎)致死率較低。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"103030-N5-55":{"quick":"水污染的生物指標＝大腸菌類。","detail":{"background":"水污染的「生物指標」是(B)『「「大腸菌類(coliform;「「大腸桿菌群」」是「「糞便污染」的「指標菌」」;水中檢出大腸菌類，表示「「受糞便(腸道病原)污染」」)」』。結核菌、葡萄球菌、鏈球菌非水質的「指標菌」。「大腸菌類」是水污染(糞便污染)的生物指標。故 B 正確。大腸菌類是水污染(糞便污染)的指標菌。","options":{"A":"結核菌非水污染的指標菌。","B":"正確。大腸菌類是水污染(糞便污染)的生物指標。","C":"葡萄球菌非水污染的指標菌。","D":"鏈球菌非水污染的指標菌。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"103030-N5-56":{"quick":"肉毒桿菌中毒「比較不容易」發生在攝食「煮熟蔬菜」之後。","detail":{"background":"肉毒桿菌(「「厭氧」菌)中毒，「比較不容易」發生在攝食(D)『「「煮熟蔬菜」』之後——「「煮熟蔬菜「(開放、有氧、現煮現吃)」」「「不利「厭氧」的肉毒桿菌「生長產毒」」。其他「容易」造成肉毒桿菌中毒(「「厭氧、保存不當」」的環境):A 醃漬類食品、B 真空包裝食品、C 低酸性罐頭類食品(這些都是「「密閉、厭氧」」的環境，利於肉毒桿菌產毒)。故本題選不容易者為 D。肉毒桿菌厭氧，煮熟蔬菜(有氧)不易產毒;醃漬、真空、罐頭(厭氧)易。","options":{"A":"醃漬類食品(厭氧)易造成肉毒桿菌中毒。","B":"真空包裝食品(厭氧)易造成中毒。","C":"低酸性罐頭(厭氧)易造成中毒。","D":"正確(本題選不容易者)。煮熟蔬菜(有氧)不利厭氧的肉毒桿菌產毒。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"103030-N5-57":{"quick":"「不是」廢棄物 5R 原則項目者＝就緒(readiness)。","detail":{"background":"廢棄物的 5R 原則為「「Reduce(減量)、Reuse(再利用)、Recycle(回收)、Refuse(拒絕)、Repair(修復)」」。「不是」其中項目者為(A)『「「就緒(readiness)」』。其他屬於5R:B 再利用(reuse)、C 拒絕(refuse)、D 回收(recycle)。故本題選不是者為 A。5R:減量、再利用、回收、拒絕、修復(不含就緒)。","options":{"A":"正確(本題選不是者)。「就緒」非 5R 的項目。","B":"再利用(reuse)是 5R 之一。","C":"拒絕(refuse)是 5R 之一。","D":"回收(recycle)是 5R 之一。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"103030-N5-63":{"quick":"可鑑別「職業性」氣喘的現象＝離開工作場所數天後，症狀即有改善。","detail":{"background":"可用來鑑別是否為「「職業性」氣喘」的現象是(C)『「「離開工作場所「數天後」，症狀即「有「改善」」(若症狀「隨「工作暴露」而「發作/加重」、「離開工作(假日/休假)就「改善」」，表示「與「職業暴露」有關」，是「職業性」氣喘的特徵)』。家人亦有症狀、接受治療改善、無法根治非「職業性」的「鑑別」特徵。故 C 正確。「離開工作就改善、上班就發作」是職業性氣喘的鑑別特徵。","options":{"A":"家人亦有症狀偏向環境/遺傳，非職業暴露的鑑別。","B":"接受治療改善是一般氣喘的反應，非職業性鑑別。","C":"正確。離開工作場所數天後症狀改善，是職業性氣喘的鑑別特徵。","D":"無法根治非職業性的鑑別特徵。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"103030-N5-64":{"quick":"良好教室的標準「正確」者＝每一位學生至少擁有1~2平方公尺的空間。","detail":{"background":"學校環境中良好教室的標準，正確的是(A)『「每一位學生至少擁有「1~2平方公尺」的空間(確保適當的活動空間與通風)』。其他錯誤:B『窗戶面積至少占教室建坪的「1/3」』錯誤(窗戶(採光)面積約占「「1/4~1/5」」);C『桌面照明至少「800米燭光」』錯誤(教室桌面照明約「「350米燭光以上」」即可，800過高);D『背景噪音應在「80分貝」以下』錯誤(教室噪音應在「「較低(如60分貝以下)」」)。故 A 正確。每位學生至少1~2平方公尺空間。","options":{"A":"正確。每位學生至少擁有1~2平方公尺的空間。","B":"窗戶面積約占1/4~1/5，非1/3。","C":"桌面照明約350米燭光以上即可，非800。","D":"背景噪音應在60分貝以下，80分貝過高。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"103100-N5-63":{"quick":"水質污染程度的「物理性」指標「錯誤」者＝酸度。","detail":{"background":"水質污染程度的「「物理性」指標」中，「錯誤」者為(D)『「「酸度(pH)」』——「酸度(pH/酸鹼值)」屬「「「化學性」」指標」，「不是「「物理性」」指標」。其他屬「物理性」指標:A 溫度、B 色度、C 濁度(以及味道、臭味、導電度等)。故本題選錯誤者為 D。酸度(pH)屬化學性指標，非物理性。","options":{"A":"溫度是物理性指標。","B":"色度是物理性指標。","C":"濁度是物理性指標。","D":"正確(本題選錯誤者)。酸度(pH)屬化學性指標，非物理性。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"103100-N5-73":{"quick":"乾電池製造業員工的「汞中毒」＝化學性因素引發的職業病。","detail":{"background":"乾電池製造業員工發生職業性「「汞(重金屬)中毒」」——屬(B)『「「化學性」因素(「「化學物質/重金屬(汞、鉛、鎘等)」的「暴露、吸收」造成的「中毒」)」』。物理性是噪音、輻射、溫度;生物性是病原微生物;人體工學是姿勢/重複動作。「汞中毒(化學物質)」屬化學性職業病。故 B 正確。汞中毒(化學物質)屬化學性因素的職業病。","options":{"A":"物理性是噪音、輻射、溫度、振動等。","B":"正確。汞中毒(化學物質/重金屬)屬化學性因素。","C":"生物性是病原微生物的危害。","D":"人體工學是姿勢、重複動作的危害。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"104030-N5-58":{"quick":"飲用水質受糞便污染的情形，可由「大腸菌類密度」看出。","detail":{"background":"飲用水質受「「糞便污染」」的情形，可由(A)『「「大腸菌類(密度)」(「大腸桿菌群」是「「糞便污染」的「指標菌」」;水中「大腸菌類密度越高」，表示「受糞便污染越嚴重」)」』看出。濁度(物理性)、pH值(化學性)、餘氯量(消毒)非「糞便污染」的指標。「大腸菌類」是糞便污染的指標。故 A 正確。大腸菌類密度反映飲用水受糞便污染的程度。","options":{"A":"正確。大腸菌類密度反映受糞便污染的程度。","B":"濁度是物理性指標，非糞便污染指標。","C":"pH值是化學性指標。","D":"餘氯量反映消毒情形，非糞便污染指標。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"104030-N5-60":{"quick":"肉毒桿菌的敘述「錯誤」者＝潛伏期約48至72小時。","detail":{"background":"肉毒桿菌的敘述，「錯誤」者為(B)『「潛伏期約「「48至72小時」」』——錯誤，肉毒桿菌(肉毒桿菌素)中毒的潛伏期一般是「「12~36小時(數小時至數天)」」，多在「「「18~36小時」」內發病(攝食毒素後);敘述「48~72小時」不符。其他正確:A 是一種厭氧產孢桿菌、C 對熱敏感(毒素不耐熱，100°C數分鐘可破壞)、D 中毒症狀以神經系統症狀為主(複視、吞嚥困難、肌肉無力、呼吸麻痺)。故本題選錯誤者為 B。肉毒桿菌潛伏期約12~36小時，非48~72小時。","options":{"A":"是厭氧產孢桿菌，正確。","B":"正確(本題選錯誤者)。潛伏期約12~36小時，非48~72小時。","C":"對熱敏感(毒素不耐熱)，正確。","D":"中毒症狀以神經系統症狀為主，正確。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"104030-N5-61":{"quick":"重金屬污染的敘述「錯誤」者＝鉛主要的毒性在危害肝臟，造成肝腫大。","detail":{"background":"重金屬污染的敘述，「錯誤」者為(D)『「「鉛」主要的毒性在「危害「「肝臟」」，造成肝腫大」』——錯誤，「鉛」的主要毒性是危害「「「神經系統(腦病變、周邊神經)」、「造血系統(貧血)」、腎臟」」，「「不是「肝臟/肝腫大」」。其他正確:A 鎘是污染土壤而進入植物(如稻米)、B 鎘會造成骨骼組織病變(「痛痛病」)、C 兒童對鉛的吸收量比成人為高。故本題選錯誤者為 D。鉛主要危害神經、造血系統，非肝臟。","options":{"A":"鎘污染土壤而進入植物(如稻米)，正確。","B":"鎘會造成骨骼病變(痛痛病)，正確。","C":"兒童對鉛的吸收量比成人高，正確。","D":"正確(本題選錯誤者)。鉛主要危害神經、造血系統，非肝臟。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"104030-N5-62":{"quick":"食用便當2~4小時後急性腸胃症狀的處理「錯誤」者＝立即補充流質飲食。","detail":{"background":"某國小學生食用便當約2~4小時後發生噁心、嘔吐、腹痛、腹瀉(疑食物中毒)，處理方法「錯誤」者為(C)『「「「立即補充「流質「飲食」」」』——錯誤，「急性腸胃症狀(嘔吐、腹瀉)「當下」應「「先「禁食、補充「水分/電解質」」」，「待「症狀緩解」後再「漸進」進食」，「「不應「立即「進食(補充飲食)」」(會加重腸胃負擔)。其他正確:A 迅速通知當地衛生機關(食物中毒須通報)、B 保留剩餘食品以確定中毒原因、D 迅速就醫。故本題選錯誤者為 C。急性腸胃炎當下應禁食補水，非立即補充飲食。","options":{"A":"迅速通知當地衛生機關(食物中毒通報)，正確。","B":"保留剩餘食品以確定中毒原因，正確。","C":"正確(本題選錯誤者)。當下應禁食補水，非立即補充飲食。","D":"迅速就醫，正確。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"104030-N5-77":{"quick":"淨水廠的處理程序順序＝曝氣③→膠凝沉澱④→過濾①→消毒②。","detail":{"background":"自來水原水在淨水廠的處理程序，依先後順序為(C)『「(3)「曝氣」 →(4)「膠凝沉澱」 →(1)「過濾」 →(2)「消毒」」(3412)』——「曝氣(去除異味、氧化)→膠凝沉澱(加混凝劑使懸浮物沉澱)→過濾(濾除細小顆粒)→消毒(加氯殺菌)」。故正確順序為3412(選 C)。淨水:曝氣→膠凝沉澱→過濾→消毒。","options":{"A":"1342：順序錯誤(過濾不應在最前)。","B":"1432：順序錯誤。","C":"正確。曝氣③→膠凝沉澱④→過濾①→消毒②。","D":"4321：順序錯誤(消毒應在最後)。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"104100-N5-60":{"quick":"空氣污染指標「不包括」的項目＝二氧化碳。","detail":{"background":"空氣污染指標(PSI/AQI)的污染物項目包括「「臭氧(O₃)、二氧化硫(SO₂)、二氧化氮(NO₂)、一氧化碳(CO)、懸浮微粒(PM10/PM2.5)」」。「不包括」者為(B)『「「二氧化碳(CO₂)」』——「二氧化碳(CO₂)」是「「溫室氣體」」，「不在「「空氣污染指標」」的「污染物項目」中。其他屬於指標項目:A 臭氧、C 二氧化硫、D 懸浮微粒。故本題選不包括者為 B。空氣污染指標不含二氧化碳(CO₂屬溫室氣體)。","options":{"A":"臭氧是空氣污染指標的項目。","B":"正確(本題選不包括者)。二氧化碳(CO₂)是溫室氣體，非空氣污染指標項目。","C":"二氧化硫是空氣污染指標的項目。","D":"懸浮微粒是空氣污染指標的項目。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"104100-N5-61":{"quick":"攝食真空包裝食品後出現嘔吐、腹瀉合併吞嚥困難＝肉毒桿菌食物中毒。","detail":{"background":"攝食「「真空包裝(厭氧)」加工食品」後，出現噁心、嘔吐、腹瀉「並合併「「吞嚥困難(神經症狀)」」」——最可能是(B)『「肉毒桿菌(Clostridium botulinum;「厭氧菌」，在「真空/密封」食品產生「「神經毒素」」，造成「複視、吞嚥困難、肌肉無力、呼吸麻痺」)」』。沙門氏菌、金黃色葡萄球菌的中毒以「腸胃症狀」為主，「無「吞嚥困難等神經症狀」」;黃麴黴菌是黴菌(致肝癌)。「真空包裝＋神經症狀(吞嚥困難)」是肉毒桿菌的特徵。故 B 正確。真空包裝+吞嚥困難(神經症狀)是肉毒桿菌中毒。","options":{"A":"沙門氏菌以腸胃症狀為主，無神經症狀。","B":"正確。真空包裝+吞嚥困難(神經症狀)，是肉毒桿菌中毒。","C":"金黃色葡萄球菌以腸胃症狀為主，無神經症狀。","D":"黃麴黴菌是黴菌(致肝癌)，非此急性中毒。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"104100-N5-63":{"quick":"使公害程度加重的原因＝國民生產總毛額高③、廢棄物量增加④。","detail":{"background":"使公害程度「加重」的原因:(3)「「國民生產總毛額(GNP/經濟發展)「高」」(經濟活動越多，「污染、廢棄物」越多)」;(4)「「廢棄物量「增加」」。而(1)土地「低度」使用、(2)「低」人口密度、(5)垃圾「分類」是「「「減輕」公害」」的因素(低度開發、低密度、分類回收都「減少污染」)。故使公害加重者為③④(選 B)。公害加重:經濟發展、廢棄物增加、人口稠密、能源消耗大。","options":{"A":"12：①②(低度使用、低密度)是減輕公害的因素。","B":"正確。國民生產總毛額高③、廢棄物量增加④，使公害加重。","C":"45：含⑤(垃圾分類，減輕公害)，錯誤。","D":"23：含②(低人口密度，減輕)，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"104100-N5-72":{"quick":"工作環境暴露於寄生蟲感染的危險＝生物性工作危害。","detail":{"background":"工作環境若暴露於「「寄生蟲(病原)感染」」的危險中——易造成(A)『「「生物性」危害(「「細菌、病毒、黴菌、「寄生蟲」」等「病原微生物」的「感染」)」』。物理性是噪音、輻射;化學性是化學物質;社會心理性是工作壓力。「寄生蟲(病原)感染」屬生物性危害。故 A 正確。寄生蟲(病原)感染屬生物性工作危害。","options":{"A":"正確。暴露於寄生蟲感染，屬生物性危害。","B":"物理性是噪音、輻射、溫度等。","C":"化學性是化學物質的危害。","D":"社會心理性是工作壓力等。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"104100-N5-75":{"quick":"學校、兒童遊樂、醫療、老人照護等場所的二氧化碳(CO₂)暴露濃度標準＝600 ppm以下。","detail":{"background":"學校及教育場所、兒童遊樂場所、醫療場所、老人或殘障照護場所等「「敏感族群」場所」的「二氧化碳(CO₂)」暴露濃度標準為(A)『「「600 ppm」以下(「「敏感族群」場所」的標準「較「嚴格(600 ppm)」」;「一般場所」為「「1000 ppm」以下」)』。故 A 正確。敏感族群場所 CO₂≤600 ppm;一般場所≤1000 ppm。","options":{"A":"正確。敏感族群場所 CO₂暴露濃度≤600 ppm。","B":"1000 ppm 是一般場所的標準，非敏感族群場所。","C":"單位是 ppm，非 ppb。","D":"單位是 ppm，非 ppb;且1000是一般場所標準。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"105030-N5-59":{"quick":"自來水淨水處理的流程＝凝集→沉澱→過濾→消毒。","detail":{"background":"通常自來水淨水處理的流程為(B)『「「凝集 → 沉澱 → 過濾 → 消毒」(加「混凝劑「凝集」」懸浮物→「「沉澱」」→「「過濾」」濾除細小顆粒→「「消毒(加氯)」」殺菌)』。故 B 正確。淨水流程:凝集→沉澱→過濾→消毒(消毒在最後)。","options":{"A":"沉澱不應在凝集之前(須先凝集才沉澱)。","B":"正確。凝集→沉澱→過濾→消毒。","C":"過濾不應在沉澱之前。","D":"凝集不應在沉澱、過濾之後。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"105030-N5-60":{"quick":"PSI 超過100時，即對一般大眾健康產生不良影響。","detail":{"background":"依環保署，當空氣污染指標值(PSI)「「超過100」」時，即「對「一般大眾」健康產生「不良影響」(C)」(PSI 0~50良好、51~100普通、「「>100「不良/不健康」(開始影響健康)」」;200~299非常不健康、≥300有害)。故 C 正確。PSI>100開始對健康產生不良影響。","options":{"A":"50以下是良好等級。","B":"90仍在普通範圍(51~100)。","C":"正確。PSI 超過100時，對一般大眾健康產生不良影響。","D":"300是「有害」的更高等級(非開始不良影響的門檻)。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"105030-N5-61":{"quick":"京都議定書應全球性管制的溫室氣體＝二氧化碳。","detail":{"background":"根據京都議定書，為減少溫室氣體(人為溫室氣體)，應對(B)『「「二氧化碳(CO₂)」(「最主要」的「人為溫室氣體」，來自「化石燃料燃燒」;京都議定書管制 CO₂、CH₄、N₂O、HFCs、PFCs、SF₆ 等，以 CO₂ 為主)」』進行全球性管制。二氧化硫(SO₂，酸雨)、四氯化碳/硝酸胺非京都議定書管制的「主要溫室氣體」。故 B 正確。京都議定書主要管制二氧化碳(CO₂)等溫室氣體。","options":{"A":"二氧化硫(SO₂)是酸雨來源，非主要溫室氣體。","B":"正確。京都議定書主要管制二氧化碳(CO₂)。","C":"四氯化碳是破壞臭氧層物質(蒙特婁議定書)。","D":"硝酸胺非京都議定書管制的主要溫室氣體。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"105030-N5-70":{"quick":"小學二年級近視350度學童的護理指導「正確」者＝書本與眼睛的距離應保持30~40公分。","detail":{"background":"對近視350度的小學二年級學童，護理指導正確的是(A)『「書本與眼睛的距離應保持「30~40公分」(適當的閱讀距離)』。其他錯誤:B『桌面要有350燭光、「越亮越好」』錯誤(照度應「適中」，非越亮越好);C『用電腦時要距離「30~40公分」』錯誤(使用電腦螢幕的距離應「「更遠(約「50~70公分」)」」);D『每天應「「避免「暴露在陽光下」』錯誤(應「「「多「戶外活動(適度日照)」」」，戶外活動可「預防近視加深」)。故 A 正確。閱讀距離應保持30~40公分;且應多戶外活動。","options":{"A":"正確。書本與眼睛的距離應保持30~40公分。","B":"照度應適中，非越亮越好。","C":"使用電腦螢幕距離應更遠(約50~70公分)。","D":"應多戶外活動(適度日照可預防近視)，非避免陽光。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"105090-N5-48":{"quick":"室內二氧化碳濃度達1~3%時，會引起頭痛、疲倦、注意力差等反應。","detail":{"background":"當室內「二氧化碳(CO₂)濃度」達(D)『「「1~3%」」時，會引起「「頭痛、疲倦、注意力差、呼吸加快」」等生理反應(CO₂ 濃度過高(通風不良)，會「降低「血氧、影響「中樞神經」」)』。(室內 CO₂ 一般應「<0.1%(1000 ppm)」;達1~3%即明顯不適。)故 D 正確。CO₂達1~3%會引起頭痛、疲倦、注意力差。","options":{"A":"0.1~0.2%是輕度偏高，尚不致明顯症狀。","B":"0.3~0.5%偏高，但症狀不明顯。","C":"0.6~0.9%偏高。","D":"正確。CO₂達1~3%會引起頭痛、疲倦、注意力差。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"105090-N5-59":{"quick":"空氣污染的敘述「正確」者＝主要經由呼吸道侵入影響健康、易誘發COPD③、汽車廢氣含一氧化碳氮氧化物等④。","detail":{"background":"空氣污染的正確敘述:(3)「空氣污染物「主要經由「呼吸道」侵入」影響人體健康，易「誘發「慢性阻塞性肺部疾患(COPD)」」」;(4)「汽車排放的廢氣中，造成空氣污染的成分有「一氧化碳(CO)、氮氧化物(NOx)」」等。而(1)『PSI 是以「二氧化碳」濃度來換算』錯誤(PSI 以「臭氧、SO₂、NO₂、CO、懸浮微粒」換算，「不含 CO₂」);(2)『PSI 超過「50」即空氣品質不良』錯誤(「「>100」」才是不良)。故正確為③④(選 C)。","options":{"A":"①②：①PSI非以CO₂換算、②超過100才不良，皆錯。","B":"②③：含②(超過50，錯誤)。","C":"正確。主要經呼吸道誘發COPD③、汽車廢氣含CO、NOx④。","D":"①④：含①(PSI以CO₂換算，錯誤)。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"105090-N5-60":{"quick":"感染性醫療廢棄物中「不可燃」廢棄物＝注射針頭。","detail":{"background":"感染性醫療廢棄物中，「「不可燃」」廢棄物為(B)『「「注射針頭(「「銳利器械(尖銳廢棄物)」」，屬「「不可燃」」，應「置入「防穿刺的「黃色硬殼利器盒」」」)』。透析廢棄液、殘肢、血液屬「「「可燃」性」感染廢棄物(置入「紅色」可燃容器)。故 B 正確。注射針頭(銳利器械)屬不可燃感染廢棄物。","options":{"A":"透析廢棄液屬可燃性感染廢棄物。","B":"正確。注射針頭(銳利器械)屬不可燃感染廢棄物。","C":"殘肢屬可燃性感染廢棄物。","D":"血液屬可燃性感染廢棄物。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"105090-N5-68":{"quick":"職業衛生護理的中央主管機關＝勞動部。","detail":{"background":"職業衛生(勞工安全衛生)護理的「中央主管機關」是(A)『「「勞動部」(職業安全衛生法的中央主管機關為「勞動部」;勞工的安全衛生、健康保護屬「勞動」業務)」』。經濟部、經建會、衛生福利部非職業衛生的中央主管機關。故 A 正確。職業衛生的中央主管機關是勞動部。","options":{"A":"正確。職業衛生護理的中央主管機關是勞動部。","B":"經濟部非職業衛生的主管機關。","C":"經建會非職業衛生的主管機關。","D":"衛生福利部主管醫療衛生，非職業衛生(勞工)。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"105090-N5-69":{"quick":"學校健康中心的描述「錯誤」者＝為健康教學之主要場所。","detail":{"background":"學校健康中心的描述，「錯誤」者為(D)『「為「「健康「教學」」」之主要場所」』——錯誤，「「健康「教學(健康教育課程)」」的主要場所是「「「教室」」」(由健康教育老師授課)，「「不是「健康「中心」」」。健康中心是 A 健康檢查與管理、B 緊急傷病處理、C 衛生諮詢的主要場所。故本題選錯誤者為 D。健康教學在教室，非健康中心。","options":{"A":"健康中心是健康檢查與管理的主要場所，正確。","B":"健康中心是緊急傷病處理的主要場所，正確。","C":"健康中心是衛生諮詢的主要場所，正確。","D":"正確(本題選錯誤者)。健康教學在教室，非健康中心。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"106030-N5-54":{"quick":"造成職業危害與「個人因素」有關者＝未依規定戴上防護罩。","detail":{"background":"造成職業危害的原因中，與「「個人因素」」有關者為(A)『「「未依規定「戴上防護罩」」(屬「「個人「不安全行為/疏忽」」」)』。其他屬「「環境/管理」因素」:B 通風與換氣不良(環境)、C 職場未安排在職教育(管理)、D 職場提供耳塞不足(管理)。「個人未依規定使用防護具」屬個人因素。故 A 正確。未依規定戴防護罩(個人不安全行為)屬個人因素。","options":{"A":"正確。未依規定戴防護罩(個人不安全行為)，屬個人因素。","B":"通風換氣不良屬環境因素。","C":"未安排在職教育屬管理因素。","D":"提供耳塞不足屬管理因素。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"106030-N5-58":{"quick":"水庫優養化現象，多利用「硫酸銅處理」以確保水質。","detail":{"background":"臺灣水庫有「「優養化(藻類過度增生)」」現象時，大多利用(B)『「「硫酸銅(CuSO₄)」處理(硫酸銅是「「殺藻劑」」，可「抑制/殺死「藻類」」，控制優養化)」』以確保水質。曝氣、膠凝沉澱、臭氧消毒是淨水處理的步驟，非針對「優養化(藻類)」的處理。故 B 正確。水庫優養化(藻類)多用硫酸銅(殺藻劑)處理。","options":{"A":"曝氣是去除異味/氧化的步驟，非殺藻。","B":"正確。水庫優養化多用硫酸銅(殺藻劑)處理。","C":"膠凝沉澱是淨水的步驟，非殺藻。","D":"臭氧消毒是消毒步驟，非殺藻。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"106030-N5-59":{"quick":"「不屬於」物理性公害者＝空氣污染。","detail":{"background":"「不屬於」物理性公害者為(B)『「「空氣污染」』——「空氣污染(化學物質、氣體、懸浮微粒)」屬「「「化學性」」公害」，「不是「「物理性」」。其他屬「物理性」公害:A 噪音污染、C 放射性污染、D 熱污染(物理性公害是「「能量(聲、光、熱、輻射)」」的污染)。故本題選不屬於者為 B。空氣污染屬化學性，非物理性公害。","options":{"A":"噪音污染是物理性公害。","B":"正確(本題選不屬於者)。空氣污染屬化學性，非物理性公害。","C":"放射性污染是物理性公害。","D":"熱污染是物理性公害。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"106030-N5-60":{"quick":"廢棄物處理程序的描述「錯誤」者＝海洋處理是屬於中間處理。","detail":{"background":"廢棄物處理程序的描述，「錯誤」者為(B)『「「海洋處理」是屬於「「中間」處理」』——錯誤，「「海洋處理(海拋)」」是「「「最終」處理(最終「處置/棄置」)」」，「「不是「中間」處理」。其他正確:A 分選壓縮法屬「前處理」、C 焚化法屬「中間處理(減容、減量)」、D 掩埋法屬「最終處理」。故本題選錯誤者為 B。海洋處理屬最終處理，非中間處理。","options":{"A":"分選壓縮法屬前處理，正確。","B":"正確(本題選錯誤者)。海洋處理屬最終處理，非中間處理。","C":"焚化法屬中間處理，正確。","D":"掩埋法屬最終處理，正確。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"106030-N5-61":{"quick":"與公害程度「成反比」的因素＝國民對公害的認識。","detail":{"background":"與公害程度「成反比(此因素越高，公害越輕)」的因素為(D)『「「國民對「公害的「認識」」(國民「越「了解、重視」公害」，「越會「防制、減少污染」」，公害程度「越「輕」」)」』。人口密度、國民生產毛額、能源消耗量則與公害「「成「正比(越高、公害越重)」」」。故 D 正確。國民對公害的認識越高，公害程度越輕(成反比)。","options":{"A":"人口密度與公害成正比(越高越重)。","B":"國民生產毛額與公害成正比。","C":"能源消耗量與公害成正比。","D":"正確。國民對公害的認識與公害程度成反比。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"106030-N5-72":{"quick":"我國學校衛生的描述「錯誤」者＝我國至今尚未通過學校衛生法。","detail":{"background":"我國學校衛生的描述，「錯誤」者為(C)『「我國「至今尚未「通過「學校衛生法」」』——錯誤，「我國「已於「民國91年(2002年)」「制定「公布「學校衛生法」」」(已通過、施行)。其他正確:A 學校衛生的主要負責(中央主管)單位是教育部、B 實際執行學校衛生工作的負責單位是衛生保健組、D 各縣市由教育局/處負責轄區內學校的衛生工作。故本題選錯誤者為 C。學校衛生法已於91年通過，非尚未通過。","options":{"A":"學校衛生的主要負責單位是教育部，正確。","B":"實際執行學校衛生的是衛生保健組，正確。","C":"正確(本題選錯誤者)。學校衛生法已於91年通過，非尚未通過。","D":"各縣市由教育局/處負責學校衛生，正確。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"106110-N5-49":{"quick":"酸雨指的是雨水酸鹼值(pH)低於5.5。","detail":{"background":"依環保署的定義，酸雨指的是雨水「酸鹼值(pH)「低於(A)5.5」」(一般以「pH<5.0(或5.6/5.5)」定義酸雨;正常雨水因溶有 CO₂ 而 pH 約5.6;環保署定義為「pH<5.0」，本題答案以5.5計)。故 A 正確。酸雨指雨水 pH 低於約5.5(<5.6)。","options":{"A":"正確。酸雨指雨水 pH 低於5.5(<5.6)。","B":"6.0高於酸雨的門檻。","C":"6.5高於酸雨的門檻。","D":"7.0是中性，非酸雨。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"106110-N5-50":{"quick":"最易污染生鮮魚貝類、導致食物中毒的細菌＝腸炎弧菌。","detail":{"background":"最易污染「「生鮮魚貝類(海產)」」、導致食物中毒的細菌是(A)『「「腸炎弧菌(Vibrio parahaemolyticus;「「嗜鹽性」」細菌，「常存於「海水、海產(魚貝類)」」;生食或處理不當的海產易致中毒，引起腹瀉、腹痛)」』。肉毒桿菌(真空厭氧)、沙門氏桿菌(蛋禽肉)、金黃色葡萄球菌(人手污染)非「海產(魚貝)」最常見的污染菌。故 A 正確。腸炎弧菌(嗜鹽)最易污染生鮮魚貝類。","options":{"A":"正確。腸炎弧菌(嗜鹽)最易污染生鮮魚貝類。","B":"肉毒桿菌多見於真空/罐頭食品。","C":"沙門氏桿菌多見於蛋、禽、肉類。","D":"金黃色葡萄球菌多來自人手污染(如糕點)。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"106110-N5-68":{"quick":"食用真空包裝豆乾後出現吞嚥困難、看不清楚、呼吸喘＝肉毒桿菌食物中毒。","detail":{"background":"小李食用「「真空包裝(厭氧)」豆乾」後，出現噁心、嘔吐、「「吞嚥困難、口乾、看不清楚(複視)、呼吸漸喘(呼吸肌麻痺)」」——最有可能是(D)『「肉毒桿菌食物中毒(「真空(厭氧)」食品產生「「神經毒素」」，造成「「神經麻痺(複視、吞嚥困難、呼吸麻痺)」」)」』。金黃色葡萄球菌、沙門氏桿菌以「腸胃症狀」為主、無神經症狀;基因改良食物不會造成此急性神經中毒。「真空包裝＋神經麻痺症狀」是肉毒桿菌。故 D 正確。真空包裝+神經麻痺(吞嚥困難、複視、呼吸喘)是肉毒桿菌中毒。","options":{"A":"金黃色葡萄球菌以腸胃症狀為主，無神經症狀。","B":"沙門氏桿菌以腸胃症狀為主，無神經症狀。","C":"基因改良食物不會造成此急性神經中毒。","D":"正確。真空包裝+神經麻痺症狀，是肉毒桿菌食物中毒。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"106110-N5-72":{"quick":"高噪音作業員工特殊健檢結果為「第三級管理」，立即處理＝請職業醫學專科醫師評估。","detail":{"background":"高噪音作業員工特殊健康檢查結果為「「第三級管理」」(健檢結果「異常、「可能「與工作有關」」」)，職業衛生護理師的「立即處理」為(B)『「請「職業醫學「專科「醫師」評估(「第三級」須由「職業醫學科醫師「評估「是否與工作有關」、後續處置」」)』。其他不當/言之過早:A『按規定保存紀錄即可』(被動、不足);C『申請職災補償』(尚未確認職業病);D『調離工作場域』(須先由醫師評估後再決定)。故 B 正確。第三級管理應立即由職業醫學專科醫師評估。","options":{"A":"保存紀錄不足，須進一步評估。","B":"正確。第三級管理應立即請職業醫學專科醫師評估。","C":"尚未確認職業病，不宜直接申請職災補償。","D":"須先由醫師評估後再決定是否調離。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"106110-N5-73":{"quick":"238人(其中特別危害健康作業126人)的工廠，需聘任專任護理師1人。","detail":{"background":"某工廠員工238人、其中「從事「特別危害健康作業」的人數為126人」——依勞工健康保護規則，「事業單位「員工總人數「200~299人」」(且「有特別危害健康作業人員)」，需「聘任「專任護理師「「1人」」」(B)。故 B 正確。(常考級距:200~299人需1位專任護理人員。)","options":{"A":"238人(≥200)需聘任，非0人。","B":"正確。238人(200~299級距)需聘任專任護理師1人。","C":"2人是更大規模(如300人以上)的需求。","D":"3人是更大規模的需求。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"106111-N5-48":{"quick":"廢棄之針頭、刀片、縫合針等銳利器械，需以「黃色」容器收集。","detail":{"background":"醫療院所產生的感染性廢棄物中，「廢棄的「針頭、刀片、縫合針」等「銳利器械(尖銳廢棄物)」」需以(A)『「「「黃色」」容器(「黃色「防穿刺的「硬殼利器盒」」」;銳利器械屬「「不可燃」」感染廢棄物)」』收集。紅色容器是「「可燃性」」感染廢棄物;藍色、黑色非感染性廢棄物的容器。故 A 正確。銳利器械(針頭、刀片)用黃色防穿刺利器盒;可燃感染廢棄物用紅色。","options":{"A":"正確。銳利器械(針頭、刀片)用黃色防穿刺利器盒。","B":"紅色容器是可燃性感染廢棄物。","C":"藍色非感染廢棄物的容器。","D":"黑色非感染廢棄物的容器。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"106111-N5-49":{"quick":"全球性環境危機的敘述「正確」者＝臭氧層稀薄化會使人類較易罹患皮膚癌。","detail":{"background":"全球性環境危機的敘述，正確的是(A)『「「臭氧層稀薄化(破洞)」會使「「紫外線「增強」」，使人類「較易罹患「皮膚癌(及白內障)」」』。其他錯誤:B『溫室效應會使冰山「結凍、海平面「下降」」』錯誤(溫室效應使「冰山「融化」、海平面「上升」」);C『大量森林砍伐…生物多樣性「增加」』錯誤(森林砍伐使「生物多樣性「「減少」」」);D『酸雨…引發「心臟病」增加』錯誤(酸雨「腐蝕建築、酸化土壤湖泊」，與「心臟病」無直接關係)。故 A 正確。臭氧層稀薄化(紫外線增強)使人類較易罹患皮膚癌。","options":{"A":"正確。臭氧層稀薄化(紫外線增強)使人類較易罹患皮膚癌。","B":"溫室效應使冰山融化、海平面上升，非結凍下降。","C":"森林砍伐使生物多樣性減少，非增加。","D":"酸雨腐蝕建築、酸化土壤，與心臟病無直接關係。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"106111-N5-66":{"quick":"基改食品與傳統食品比對後認為「實質相等」的概念＝實質等同(substantial equivalence)。","detail":{"background":"依基因改造食品安全評估原則，「某新食品/成分與傳統食品「經比對」、其「分子、成分、營養」等數據「實質相等」，即可視為「與傳統品種同樣安全」」——這是(B)『「「實質等同(substantial equivalence;以「與「傳統食品」「比較」」的方式，評估基改食品的「安全性」)」』的概念。生物多樣性、標幟基因、病原性微生物非此概念。故 B 正確。基改食品以「實質等同」評估其安全性。","options":{"A":"生物多樣性是物種的多樣性。","B":"正確。與傳統食品比對視為同樣安全，是實質等同。","C":"標幟基因是基改的標記基因。","D":"病原性微生物是致病的微生物。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"106111-N5-67":{"quick":"空氣污染指標(PSI)的敘述「正確」者＝以當日各項副指標之最大值為該測量站當日之 PSI。","detail":{"background":"空氣污染指標(PSI)的敘述，正確的是(B)『「以當日「「各項副指標(SO₂、CO、O₃、NO₂、PM10)之「最大值」」」為該測量站當日的 PSI(取「最嚴重的污染物」代表當日指標)』。其他錯誤:A『統計方式為「8小時平均值」』錯誤(各污染物的平均時間不同，非統一8小時);C『以「二氧化碳」濃度換算』錯誤(PSI 不含 CO₂);D『「PM2.5」是 PSI 的副指標』錯誤(「PM2.5」是「「AQI」」的污染物，「「PSI」」用的是「PM10」)。故 B 正確。PSI 取各副指標的最大值為當日指標。","options":{"A":"各污染物的平均時間不同，非統一8小時平均。","B":"正確。以各副指標的最大值為當日 PSI。","C":"PSI 不以二氧化碳換算。","D":"PM2.5 是 AQI 的污染物;PSI 用 PM10。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"106111-N5-74":{"quick":"勞工健康服務護理師的職責「錯誤」者＝對員工健康檢查資料需做「分析」、管理及保存。","detail":{"background":"依勞工健康保護規則，勞工健康服務護理師的職責，「錯誤」者為(D)『「對員工的健康檢查資料需做「「「分析」」、管理及保存」』——敘述不夠精確:健檢資料(尤其「異常者」)的「「「分析「與「健康風險「評估」」」」應由「「職業醫學科「專科醫師」」(臨場服務醫師)」執行，護理師主要「協助「管理及保存」」、衛教與轉介，「「「單獨「分析」」」並非護理師的職責。其他正確:A 應接受從事勞工健康服務護理師52小時訓練課程合格、B 任職後每3年至少需接受12小時在職教育訓練、C 對發生跌倒傷害者做第一線檢傷分類。故本題選錯誤者為 D。健檢資料的「分析評估」由職醫科醫師主責，護理師協助管理保存。","options":{"A":"應接受52小時訓練課程合格，正確。","B":"每3年至少12小時在職教育訓練，正確。","C":"對突發跌倒做第一線檢傷分類，正確。","D":"正確(本題選錯誤者)。健檢資料的「分析評估」由職醫科醫師主責，護理師協助管理保存。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"106111-N5-75":{"quick":"腕垂症、貧血、牙齦邊緣淡藍色線＝鉛作業(鉛中毒)。","detail":{"background":"鞏先生有「「腕垂症(垂腕，周邊神經病變)、貧血、「牙齦邊緣淡藍色線(「「鉛線(lead line)」」)」」——最可能從事(A)『「「鉛作業」(「「鉛中毒」」的典型表現:「「垂腕(橈神經麻痺)、貧血、牙齦「鉛線」、腹絞痛、神經病變」」)」』。食品冷凍、運輸物流、沖床高噪音作業非「鉛中毒」的暴露來源。故 A 正確。垂腕、貧血、牙齦鉛線是鉛中毒的典型表現(鉛作業)。","options":{"A":"正確。垂腕、貧血、牙齦鉛線，是鉛中毒(鉛作業)的典型表現。","B":"食品冷凍作業是低溫危害，非鉛中毒。","C":"運輸物流非鉛暴露來源。","D":"沖床高噪音作業是噪音危害，非鉛中毒。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"107030-N5-44":{"quick":"食用未煮熟雞蛋導致腸道疾病，最常見的細菌＝沙門氏菌。","detail":{"background":"食用「「未煮熟「雞蛋(蛋禽製品)」」」而導致腸道疾病，最常見的細菌是(C)『「「沙門氏菌(Salmonella;常存於「「蛋、禽、肉類」」;未煮熟易致「腸胃炎(腹瀉、腹痛、發燒)」)」』。肉毒桿菌(真空厭氧)、金黃色葡萄球菌(人手污染糕點)、仙人掌桿菌(炒飯/澱粉)的常見來源不同。「蛋禽製品」最常見沙門氏菌。故 C 正確。未煮熟雞蛋最常見沙門氏菌中毒。","options":{"A":"肉毒桿菌多見於真空/罐頭食品。","B":"金黃色葡萄球菌多來自人手污染(糕點)。","C":"正確。未煮熟雞蛋(蛋禽製品)最常見沙門氏菌中毒。","D":"仙人掌桿菌多見於炒飯、澱粉類食品。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"107030-N5-47":{"quick":"學生健康檢查實施方式的敘述「錯誤」者＝檢查結果應於3個月內書面通知。","detail":{"background":"學校護理師在學生健康檢查實施方式的敘述，「錯誤」者為(B)『「檢查結果應於「「3個月」內」書面通知學生、家長或監護人」』——錯誤，健檢結果應「「「儘速(如「「1個月」內」)」」「書面通知」」，「「「3個月」過「長」」(會延誤後續的追蹤矯治)。其他正確:A 國小學童每學期皆應檢查視力、身高及體重、C 健康檢查資料應予保密、D 對特殊疾病個案應於校內進行個案管理。故本題選錯誤者為 B。健檢結果應儘速(約1個月內)通知，3個月過長。","options":{"A":"國小學童每學期檢查視力、身高、體重，正確。","B":"正確(本題選錯誤者)。健檢結果應儘速(約1個月內)通知，3個月過長。","C":"健康檢查資料應予保密，正確。","D":"對特殊疾病個案於校內進行個案管理，正確。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"107030-N5-66":{"quick":"革蘭氏陽性、附著於土壤及動物腸道、對熱敏感(100°C 3~5分鐘無法生存)＝肉毒桿菌。","detail":{"background":"造成細菌性食物中毒的病菌中，具有「「革蘭氏「陽性」、附著於「土壤及動物腸道」、「對熱「敏感」(「「100°C 持續加熱3~5分鐘以上「毒素」無法生存」)」」者為(D)『「「肉毒桿菌(Clostridium botulinum;「革蘭氏陽性「厭氧「產孢」桿菌」，存於土壤;其「「「毒素」對熱敏感(100°C數分鐘可破壞)」」)」』。腸炎弧菌(嗜鹽、海產)、沙門氏菌(蛋禽)、金黃色葡萄球菌(腸毒素「「耐熱」」)的特性不同。故 D 正確。革蘭氏陽性、土壤、毒素對熱敏感是肉毒桿菌。","options":{"A":"腸炎弧菌是革蘭氏陰性、嗜鹽(海產)。","B":"沙門氏菌是革蘭氏陰性(蛋禽肉)。","C":"金黃色葡萄球菌的腸毒素「耐熱」，非對熱敏感。","D":"正確。革蘭氏陽性、土壤、毒素對熱敏感，是肉毒桿菌。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"107030-N5-74":{"quick":"透過健康檢查早期發現學生健康問題、即早矯治＝三段五級的第三級(早期診斷適當治療)。","detail":{"background":"在學校「透過「健康檢查「早期發現」學生的健康問題，即早提供「矯正與治療」」」——屬學校衛生護理三段五級的(C)『「第三級:早期診斷、適當治療(early diagnosis & prompt treatment;透過「篩檢/健檢「早期發現」」，「及早「診斷治療」」)」』。第一級是健康促進;第二級是特殊保護;第四級是限制殘障。「健檢早期發現、即早矯治」屬第三級(早期診斷治療)。故 C 正確。健檢早期發現、即早矯治屬第三級(早期診斷適當治療)。","options":{"A":"第一級促進健康是一般性增進。","B":"第二級特殊保護是特定防護(如疫苗)。","C":"正確。健檢早期發現、即早矯治，屬第三級(早期診斷適當治療)。","D":"第四級限制殘障是對已患病者減少失能。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"107110-N5-45":{"quick":"食用生鮮魚貝類後急性腸胃不適，最有可能的細菌＝腸炎弧菌。","detail":{"background":"王先生「食用「「生鮮魚貝類(海產)」」」後出現下痢、腹痛、噁心、嘔吐等急性腸胃不適——最有可能由(D)『「「腸炎弧菌(Vibrio parahaemolyticus;「嗜鹽性」，常存於「海水、海產(魚貝)」;生食或處理不當易致「腹瀉、腹痛」)」』引起。金黃色葡萄球菌(糕點/人手)、肉毒桿菌(真空)、沙門氏桿菌(蛋禽)的常見來源不同。「生鮮魚貝(海產)」最常見腸炎弧菌。故 D 正確。生鮮魚貝類最常見腸炎弧菌中毒(與前述同類題一致)。","options":{"A":"金黃色葡萄球菌多來自人手污染(糕點)。","B":"肉毒桿菌多見於真空/罐頭食品。","C":"沙門氏桿菌多見於蛋、禽、肉類。","D":"正確。生鮮魚貝類最常見腸炎弧菌中毒。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"107110-N5-46":{"quick":"勞基法第52條規定，雇主應每日另提供產後職業婦女2次哺乳時間。","detail":{"background":"依勞動基準法第52條，除規定的休息時間外，雇主應每日另提供產後職業婦女(B)『「「2次」」哺乳時間(每次30分鐘;對「子女未滿1歲須親自哺乳者」)』。故 B 正確。勞基法:每日另給2次哺乳時間、每次30分鐘(與前述同類題一致)。","options":{"A":"1次不符勞基法第52條。","B":"正確。每日另提供2次哺乳時間。","C":"3次不符規定。","D":"4次不符規定。"},"sources":["社區衛生護理學(新文京/華杏)·婦幼衛生"]}},"107110-N5-48":{"quick":"我國職業安全衛生的敘述「錯誤」者＝我國尚無職業安全衛生法，導致糾紛頻傳。","detail":{"background":"我國職業安全衛生的敘述，「錯誤」者為(D)『「我國「「尚無「職業安全衛生法」」」，導致糾紛頻傳」』——錯誤，「我國「「已有「「職業安全衛生法」」」(原「勞工安全衛生法」，於民國102年修正為「職業安全衛生法」)。其他正確:A 職業安全衛生業務最高主管機關是勞動部、B 執行員工緊急救護、健康教育是職場護理師的職責、C 多數職業病都可透過預防而避免發生。故本題選錯誤者為 D。我國已有職業安全衛生法。","options":{"A":"最高主管機關是勞動部，正確。","B":"緊急救護、健康教育是職場護理師的職責，正確。","C":"多數職業病可透過預防而避免，正確。","D":"正確(本題選錯誤者)。我國已有職業安全衛生法。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"107110-N5-50":{"quick":"引起護理師下背痛的主要危險因子＝人因工程危害因子。","detail":{"background":"引起護理師「「下背痛」」的主要危險因子是(C)『「「人因工程(ergonomic)危害因子(「「搬運病人、不良姿勢、長時間站立、重複施力」」等「人因工程」問題，造成「肌肉骨骼傷害(下背痛)」)」』。物理性是噪音輻射;化學性是化學物質;生物性是病原微生物。「下背痛(搬運、姿勢)」屬人因工程危害。故 C 正確。下背痛(搬運、姿勢)屬人因工程危害因子。","options":{"A":"物理性危害是噪音、輻射、溫度等。","B":"化學性危害是化學物質。","C":"正確。下背痛(搬運、不良姿勢)，屬人因工程危害因子。","D":"生物性危害是病原微生物。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"107110-N5-60":{"quick":"使用曝氣法處理水質的目的＝去除水中二氧化碳及不良氣味。","detail":{"background":"使用「曝氣法」處理水質的目的，正確的是(A)『「「去除水中「二氧化碳」及「不良氣味」」(曝氣使水與空氣接觸，「逸散「CO₂、揮發性異味」」，並「增加「溶氧」、氧化「鐵錳」」)』。其他錯誤:B『「提高「酸值」」、去除濁度』錯誤(曝氣是「降低 CO₂、「「提高 pH(降酸)」」」，非提高酸值;去濁靠沉澱過濾);C『還原被氧化的化學物質』錯誤(曝氣是「「氧化」」，非還原);D『抑制藻類增生』錯誤(抑藻靠「硫酸銅」)。故 A 正確。曝氣去除 CO₂、不良氣味、增加溶氧。","options":{"A":"正確。曝氣去除水中二氧化碳及不良氣味(並增加溶氧)。","B":"曝氣降 CO₂、提高 pH(降酸)，非提高酸值。","C":"曝氣是氧化，非還原。","D":"抑制藻類靠硫酸銅，非曝氣。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"107110-N5-65":{"quick":"食物中毒的處理「較不適當」者＝保留剩餘食物及吐瀉物，密封後置於冰箱「冷凍庫」內。","detail":{"background":"食物中毒的處理，「較不適當」者為(B)『「保留剩餘食物及患者嘔吐物/排泄物，密封後置於冰箱「「冷凍庫」」內」』——錯誤，檢體應「「「冷藏(冷藏室，約4°C)」」保存」，「「不可「冷凍」」(「「冷凍會「破壞「檢體/微生物」」」，影響後續「檢驗鑑定」)。其他適當:A 儘快將患者送醫、C 衛生單位應迅速採取剩餘食品及吐瀉物、檢體加以檢驗、D 醫療院所發現食物中毒患者應在24小時內通知衛生單位。故本題選較不適當者為 B。檢體應冷藏保存，非冷凍(冷凍會破壞檢體)。","options":{"A":"儘快將患者送醫，適當。","B":"正確(本題選較不適當者)。檢體應冷藏，非冷凍(冷凍會破壞檢體)。","C":"衛生單位迅速採取食品及吐瀉物檢驗，適當。","D":"24小時內通知衛生單位，適當。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"107110-N5-66":{"quick":"廢棄物處理的「最終處置」＝掩埋法。","detail":{"background":"廢棄物處理程序分前、中及最終處置三部分，屬「最終處置」者為(C)『「「掩埋法(衛生掩埋;將「最終無法再處理的廢棄物」「掩埋處置」)」』。焚化法(A)、磨碎法(B)、堆肥法(D)屬「「中間處理(減容、減量、轉化)」」。故 C 正確。掩埋法是最終處置;焚化、磨碎、堆肥屬中間處理。","options":{"A":"焚化法屬中間處理(減容減量)。","B":"磨碎法屬中間處理(前處理)。","C":"正確。掩埋法是最終處置。","D":"堆肥法屬中間處理(資源化)。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"107110-N5-73":{"quick":"Wold 提出學校衛生護理工作的系統性概念＝公共衛生①、適應功能②、互助性人際關係③、工具④、系統化過程⑤。","detail":{"background":"依 Wold(1981)，從事學校衛生護理工作應具備的系統性概念是:(1)公共衛生、(2)適應功能、(3)互助性人際關係、(4)工具、(5)系統化過程。而(6)『全球健康』「不在」Wold 提出的「五個系統性概念」中。故正確為①②③④⑤(選 A)。Wold 學校衛生護理系統概念:公共衛生、適應功能、互助性人際關係、工具、系統化過程。","options":{"A":"正確。公共衛生①、適應功能②、互助性人際關係③、工具④、系統化過程⑤。","B":"含⑥(全球健康)，非 Wold 的概念。","C":"含⑥、缺②，錯誤。","D":"含⑥、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"107110-N5-74":{"quick":"職場災難應變計畫的敘述「正確」者＝職場災難發生時，物質安全資料表(MSDS)能提供重要的救護資訊。","detail":{"background":"職場災難應變計畫的敘述，正確的是(C)『「職場災難發生時，「「物質安全資料表(MSDS/SDS)」」能提供「重要的「救護資訊」(化學品的「成分、危害、急救、滅火、洩漏處理」等)』。其他錯誤:A『災難應變計畫「只是安全衛生人員的責任」、護理師「只負責緊急包紮」』錯誤(護理師「應「參與規劃」」、角色不限包紮);B『要「儘快聯絡附近醫院醫師到場檢傷」』錯誤(「「現場「檢傷分類」」可由「「護理師等「在場人員」」執行」，不必等醫師到場);D『「沒發生過災難的工廠，機率為零、不用規劃」』錯誤(「「任何工廠都有風險，「都須」規劃」應變計畫」)。故 C 正確。MSDS 能提供化學災害的重要救護資訊。","options":{"A":"護理師應參與規劃，角色不限緊急包紮。","B":"現場檢傷可由在場人員執行，不必等醫師到場。","C":"正確。MSDS 能提供重要的救護資訊。","D":"任何工廠都有風險，都須規劃應變計畫。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"108110-N5-48":{"quick":"暴露於85 dB 作業環境超過8小時/天，會造成聽力傷害。","detail":{"background":"依勞工健康保護規則，工作者暴露於(D)『「「85 dB(分貝)」」』的作業環境超過「8小時/天」，會造成聽力傷害(噪音「「≥85 dB「持續8小時」」」是「聽力保護」的「行動基準/容許暴露」門檻;超過此值須採「聽力保護措施」)。1000 Hz、1500 Hz 是「頻率(Hz)」非「音量(dB)」;75 dB 未達傷害門檻。故 D 正確。噪音≥85 dB(8小時)是聽力傷害的暴露門檻。","options":{"A":"1000 Hz 是頻率(Hz)，非音量(dB)。","B":"1500 Hz 是頻率，非音量。","C":"75 dB 未達聽力傷害的門檻。","D":"正確。85 dB(8小時/天)會造成聽力傷害。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"108110-N5-49":{"quick":"空氣品質指標(AQI)所參照的污染物濃度「不包括」者＝二氧化碳。","detail":{"background":"空氣品質指標(AQI)所參照的污染物為「臭氧(O₃)、懸浮微粒(PM10、PM2.5)、一氧化碳(CO)、二氧化硫(SO₂)、二氧化氮(NO₂)」。「不包括」者為(C)『「「二氧化碳(CO₂)」』(CO₂ 是「溫室氣體」，「不在 AQI 的污染物中」)。其他屬於 AQI:A 臭氧、B 二氧化氮、D 懸浮微粒。故本題選不包括者為 C。AQI 不含二氧化碳(CO₂屬溫室氣體)。","options":{"A":"臭氧是 AQI 的污染物。","B":"二氧化氮是 AQI 的污染物。","C":"正確(本題選不包括者)。二氧化碳(CO₂)是溫室氣體，非 AQI 污染物。","D":"懸浮微粒是 AQI 的污染物。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"108110-N5-50":{"quick":"醫療廢棄物的處理「正確」者＝不可燃的感染性廢棄物用黃色容器收集。","detail":{"background":"醫療廢棄物的處理，正確的是(B)『「「不可燃」的感染性廢棄物用「「黃色」容器」收集(如針頭、刀片等銳利器械)』。其他錯誤:A『感染性廢棄物「絕不可」在室溫下貯存』錯誤(「常溫(室溫)可貯存「「1日」」」);C『「可燃」的感染性廢棄物用「白色」容器』錯誤(可燃感染廢棄物用「「紅色」容器」);D『放射線廢棄物收集於「紅色塑膠袋」』錯誤(放射性廢棄物有「專用容器/標誌」，非紅色塑膠袋;且由原能會管理)。故 B 正確。不可燃感染廢棄物用黃色容器;可燃用紅色。","options":{"A":"感染性廢棄物常溫可貯存1日，非絕不可。","B":"正確。不可燃的感染性廢棄物用黃色容器收集。","C":"可燃感染廢棄物用紅色容器，非白色。","D":"放射性廢棄物有專用容器，非紅色塑膠袋。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"108110-N5-65":{"quick":"一般體格檢查紀錄應至少保存7年。","detail":{"background":"依勞工健康保護規則，雇主僱用勞工時實施的「「一般「體格(健康)檢查」」紀錄，應至少保存(B)『「「7年」」(一般健檢紀錄保存7年;「「特別危害健康作業」」的特殊健檢紀錄則須保存「「10年(或30年)」」)』。故 B 正確。一般體格檢查紀錄保存7年;特殊健檢保存10年(部分30年)。","options":{"A":"10年是特殊健康檢查紀錄的保存年限。","B":"正確。一般體格檢查紀錄至少保存7年。","C":"5年不符規定。","D":"2年不符規定。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"108110-N5-69":{"quick":"早餐吃蛋製品後腹瀉、腹痛、嘔吐及發燒＝沙門氏菌食物中毒。","detail":{"background":"陳先生早餐吃「「蛋製品」」，餐後有「腹瀉、腹痛、噁心、嘔吐「及「「發燒」」」症狀——最有可能是(C)『「「沙門氏菌(Salmonella;常存於「「蛋、禽、肉類」」;中毒症狀為「腹瀉、腹痛、嘔吐「「合併「發燒」」」)」』。金黃色葡萄球菌(腸毒素、「「不發燒」」、潛伏期短)、肉毒桿菌(神經症狀)、腸炎弧菌(海產)的特徵不同。「蛋製品＋發燒」是沙門氏菌的典型。故 C 正確。蛋製品+腹瀉發燒是沙門氏菌中毒。","options":{"A":"金黃色葡萄球菌多不發燒、潛伏期短(來自人手污染糕點)。","B":"肉毒桿菌以神經症狀為主，非腸胃發燒。","C":"正確。蛋製品+腹瀉發燒，是沙門氏菌中毒。","D":"腸炎弧菌多見於海產，非蛋製品。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"108110-N5-72":{"quick":"全球環境變遷的描述「正確」者＝土壤沙漠化主要是人為的森林濫伐、土地過度開發。","detail":{"background":"全球環境變遷問題的描述，正確的是(D)『「「土壤「沙漠化」」主要是「「人為因素」的「森林濫伐、土地過度開發(及過度放牧)」」所造成』。其他錯誤:A『「臭氧層破壞」主要是「二氧化碳」』錯誤(臭氧層破壞主要是「「氟氯碳化物(CFCs)」」);B『「酸雨」主要是「碳氧化物」』錯誤(酸雨主要是「「硫氧化物(SOx)、氮氧化物(NOx)」」);C『「溫室效應」主要是「氟氯碳化物」』錯誤(溫室效應主要是「「二氧化碳(CO₂)」」)。故 D 正確。土壤沙漠化主要源於人為的森林濫伐、土地過度開發。","options":{"A":"臭氧層破壞主要是氟氯碳化物(CFCs)，非 CO₂。","B":"酸雨主要是硫氧化物、氮氧化物，非碳氧化物。","C":"溫室效應主要是二氧化碳，非氟氯碳化物。","D":"正確。土壤沙漠化主要是人為的森林濫伐、土地過度開發。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"108110-N5-75":{"quick":"學校衛生行政組織「正確」者＝直轄市之學校衛生工作是由教育局負責。","detail":{"background":"學校衛生行政組織，正確的是(D)『「「直轄市」之學校衛生工作是由「「教育「局」」負責(直轄市的「「教育局」」、非直轄市的「「教育「處」」」)』。其他錯誤:A『教育部「綜合規畫司」是最高教育行政「機關」』錯誤(最高教育行政「機關」是「「教育部」」，綜合規畫司只是其下的「司」);B『管轄大專院校學校衛生的單位為「技職司」』錯誤(大專院校學生事務/衛生多由「「學生事務及特殊教育司、體育署」」等);C『非直轄市學校衛生由教育局「醫政科」負責』錯誤(非直轄市是「教育「處」」)。故 D 正確。直轄市學校衛生由教育局負責。","options":{"A":"最高教育行政機關是教育部，綜合規畫司只是其下單位。","B":"大專院校學校衛生非由技職司管轄。","C":"非直轄市是教育「處」，且非「醫政科」。","D":"正確。直轄市之學校衛生工作由教育局負責。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"108110-N5-76":{"quick":"國小入學新生健康檢查的必要項目＝尿液檢查①、立體感篩檢②、耳鼻喉科檢查③、蟯蟲檢查④。","detail":{"background":"國小入學新生的健康檢查必要項目:(1)「尿液檢查(腎臟/泌尿)」;(2)「立體感(視覺)篩檢」;(3)「耳鼻喉科檢查」;(4)「蟯蟲檢查」。而(5)『血液檢查』「不是「國小新生「必要」的「常規」健檢項目」(血液檢查屬「進一步」的檢查)。故正確為①②③④(選 B)。國小新生健檢:尿液、立體感、耳鼻喉、蟯蟲、身高體重、口腔、脊柱等(不含血液檢查)。","options":{"A":"1245：含⑤(血液檢查，非必要)，錯誤。","B":"正確。尿液①、立體感②、耳鼻喉③、蟯蟲④。","C":"1345：含⑤、缺②，錯誤。","D":"2345：含⑤、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"109030-N5-41":{"quick":"衛生所護理師執業範疇的敘述「錯誤」者＝食品衛生稽核與查驗。","detail":{"background":"衛生所護理師執業範疇，「錯誤」者為(C)『「「食品衛生「稽核與查驗」」』——「「食品衛生的「稽核、查驗」」是「「「食品衛生稽查員/衛生稽查人員(食藥署/衛生局)」」的職責」，「「不是「衛生所「護理師」」」的執業範疇。其他屬於衛生所護理師的範疇:A 家戶健康管理、B 中老年病防治、D 癌症防治。故本題選錯誤者為 C。食品衛生稽核查驗是衛生稽查人員的職責，非衛生所護理師。","options":{"A":"家戶健康管理是衛生所護理師的範疇。","B":"中老年病防治是其範疇。","C":"正確(本題選錯誤者)。食品衛生稽核查驗是衛生稽查人員的職責，非護理師。","D":"癌症防治是其範疇。"},"sources":["社區衛生護理學(新文京/華杏)·公共衛生體系"]}},"109030-N5-62":{"quick":"「不屬於」物理性公害者＝土壤污染。","detail":{"background":"「不屬於」物理性公害者為(C)『「「土壤污染」』——「土壤污染(重金屬、化學物質)」屬「「「化學性」」公害」，「不是「「物理性」」。其他屬「物理性」公害:A 熱污染、B 放射性污染、D 噪音污染(物理性公害是「能量(聲、光、熱、輻射)」的污染)。故本題選不屬於者為 C。土壤污染屬化學性，非物理性公害。","options":{"A":"熱污染是物理性公害。","B":"放射性污染是物理性公害。","C":"正確(本題選不屬於者)。土壤污染屬化學性，非物理性公害。","D":"噪音污染是物理性公害。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"109030-N5-63":{"quick":"細懸浮微粒(PM2.5)的敘述「錯誤」者＝日平均或24小時值達70 μg/m³表示空氣品質是普通。","detail":{"background":"細懸浮微粒(PM2.5)的敘述，「錯誤」者為(C)『「當 PM2.5 日平均值或24小時值濃度達「「70 μg/m³」」，表示空氣品質是「「「普通」」』——錯誤，「PM2.5「70 μg/m³」已屬「「「紅色警示(對所有族群不健康)」」」的「「高」濃度」，「「不是「普通」」(「普通」約「<35 μg/m³」)。其他正確:A 因粒徑小於等於2.5 μm、較其他懸浮微粒在空氣中飄浮更久、B 能深入肺部深處、對敏感族群健康有害、D 是空氣品質指標(AQI)的指標項目。故本題選錯誤者為 C。PM2.5 70 μg/m³是高濃度(紅色警示)，非普通。","options":{"A":"粒徑≤2.5 μm、飄浮更久，正確。","B":"能深入肺部深處、對敏感族群有害，正確。","C":"正確(本題選錯誤者)。PM2.5 70 μg/m³是高濃度(紅色警示)，非普通。","D":"是 AQI 的指標項目，正確。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"109030-N5-64":{"quick":"化學性水媒疾病「正確」者＝水俁病是因含汞廢水使魚類「生物濃縮」、經食物鏈傳播而造成中樞神經病變。","detail":{"background":"化學性水媒疾病，正確的是(A)『「「水俁病」是因「「含「汞」廢水」污染水質，使「魚類「生物濃縮(生物累積)」」，經「「食物鏈」傳播」，而造成「「中樞神經」等病變(汞中毒)」』。其他錯誤:B『痛痛病是因「砷」』錯誤(痛痛病是「「鎘」中毒(骨骼病變)」);C『威爾遜症是因「含鎘廢水」』錯誤(威爾遜症是「「先天性「銅」代謝異常」」，非鎘污染);D『烏腳病與「硝酸鹽/亞硝酸鹽」有關』錯誤(烏腳病與「「「砷」」中毒(及井水)」有關)。故 A 正確。水俁病是汞污染、經食物鏈生物濃縮致中樞神經病變。","options":{"A":"正確。水俁病是含汞廢水、生物濃縮、食物鏈傳播，致中樞神經病變。","B":"痛痛病是鎘中毒(骨骼病變)，非砷。","C":"威爾遜症是先天性銅代謝異常，非鎘污染。","D":"烏腳病與砷中毒有關，非硝酸鹽。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"109030-N5-65":{"quick":"最有助於降低病態建築症候群(SBS)的措施＝增加室內通風。","detail":{"background":"最有助於降低「病態建築症候群(sick building syndrome, SBS)」發生的措施是(B)『「「增加室內「通風」」(SBS 主要因「「室內「通風不良」、「污染物(CO₂、揮發性有機物、黴菌)「累積」」」造成;「增加通風(換氣)」可「稀釋、排除污染物」，最能改善)』。增加光線、增加濕度、降低室溫非 SBS 的主要改善措施。故 B 正確。增加室內通風(換氣)最能降低病態建築症候群。","options":{"A":"增加室內光線非 SBS 的主要改善措施。","B":"正確。增加室內通風(換氣)，最能降低病態建築症候群。","C":"增加濕度反而可能助長黴菌，非改善。","D":"降低室溫非 SBS 的主要改善措施。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"109110-N5-57":{"quick":"食品安全衛生管理法「不需」強制標示者＝製造方法。","detail":{"background":"依食品安全衛生管理法，食品的容器/外包裝，「不需」強制標示者為(C)『「「製造「方法」」』——「「製造「方法」」「不是「「強制」標示」的項目(屬「商業機密」，非必要標示)。應「強制標示」者:A 食品淨重、容量或數量、B 食品添加物名稱、D 製造廠商(名稱、地址)，以及品名、內容物、有效日期、原產地、營養標示等。故本題選不需者為 C。製造方法非強制標示項目。","options":{"A":"食品淨重、容量或數量是強制標示項目。","B":"食品添加物名稱是強制標示項目。","C":"正確(本題選不需者)。製造方法非強制標示項目。","D":"製造廠商是強制標示項目。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"109110-N5-58":{"quick":"醫療廢棄物的處理「正確」者＝不可燃的感染廢棄物經滅菌處理後，採用衛生掩埋法處理。","detail":{"background":"醫療廢棄物的處理，正確的是(B)『「「不可燃」的感染廢棄物「經「滅菌(高壓蒸氣等)」處理後」，採用「「衛生掩埋法」」處理」(不可燃者無法焚化，滅菌後以掩埋處置)』。其他錯誤:A『感染性廢棄物可在室溫下貯存「7日」』錯誤(室溫(常溫)貯存以「「1日」」為限;「5度以下冷藏」才是7日);C『「可燃」的感染廢棄物用「黃色」容器』錯誤(可燃感染廢棄物用「「紅色」容器」);D『放射線廢棄物收集於「紅色塑膠袋」』錯誤(放射性廢棄物有「專用容器」)。故 B 正確。不可燃感染廢棄物滅菌後採衛生掩埋。","options":{"A":"室溫貯存以1日為限，非7日(5度以下冷藏才7日)。","B":"正確。不可燃感染廢棄物滅菌後採衛生掩埋法。","C":"可燃感染廢棄物用紅色容器，非黃色。","D":"放射性廢棄物有專用容器，非紅色塑膠袋。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"109110-N5-59":{"quick":"室內空氣品質標準「正確」者＝二氧化碳(CO₂)1,000 ppm/8小時值以下。","detail":{"background":"依環保署室內空氣品質標準，正確的是(A)『「「二氧化碳(CO₂)「1,000 ppm」/8小時值以下」』。其他錯誤:B『一氧化碳(CO)「100 ppm」』錯誤(CO 標準是「「9 ppm/8小時值」」);C『甲醛(HCHO)「1 ppm」』錯誤(甲醛標準是「「0.08 ppm/1小時值」」);D『PM2.5「75 μg/m³」』錯誤(室內 PM2.5 標準是「「35 μg/m³/24小時值」」)。故 A 正確。室內 CO₂≤1000 ppm/8小時值。","options":{"A":"正確。二氧化碳(CO₂)1,000 ppm/8小時值以下。","B":"一氧化碳(CO)標準是9 ppm，非100 ppm。","C":"甲醛標準是0.08 ppm，非1 ppm。","D":"室內 PM2.5 標準是35 μg/m³，非75。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"109110-N5-67":{"quick":"未滿40歲的一般作業員，至少每5年做1次健康檢查。","detail":{"background":"依勞工健康保護規則，「「未滿40歲」」的「一般作業」員工，至少每(D)『「「5年」」做1次「一般健康檢查」(年齡越大頻率越高:「未滿40歲「每5年」、40~未滿65歲「每3年」、65歲以上「每年」」)』。故 D 正確。一般健檢頻率:未滿40歲每5年、40~65歲每3年、65歲以上每年。","options":{"A":"2年非未滿40歲的規定。","B":"3年是40~未滿65歲的頻率。","C":"4年非規定的頻率。","D":"正確。未滿40歲至少每5年做1次健康檢查。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"109110-N5-71":{"quick":"長期暴露最易導致帕金森氏症候群的物質＝錳。","detail":{"background":"長期暴露於(A)『「「錳(manganese)」』的工作環境中，最容易導致罹患「「帕金森氏症候群(錳中毒會傷害「基底核」，產生「類巴金森氏症(顫抖、僵直、動作遲緩)」)」』。鉛(神經、貧血、垂腕)、鎘(骨骼、腎)、砷(烏腳病、皮膚癌)的毒性不同。「錳中毒」最易致帕金森氏症候群。故 A 正確。錳中毒最易導致帕金森氏症候群。","options":{"A":"正確。錳中毒最易導致帕金森氏症候群。","B":"鉛中毒以神經病變、貧血、垂腕為主。","C":"鎘中毒以骨骼(痛痛病)、腎臟病變為主。","D":"砷中毒以烏腳病、皮膚癌為主。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"109110-N5-72":{"quick":"勞工健康檢查的敘述「正確」者＝粉塵作業勞工的特殊健檢項目需包含肺功能檢查。","detail":{"background":"勞工健康檢查的敘述，正確的是(C)『「「粉塵作業」勞工的「特殊健檢」項目需「包含「肺功能檢查」」(粉塵會傷害肺部(塵肺症)，故須檢查「肺功能、胸部X光」)』。其他錯誤:A『不分作業性質、年滿65歲員工每年需做1次「特殊」健檢』錯誤(65歲以上是「「一般」健檢每年1次;「特殊健檢」是針對「特別危害健康作業」者);B『游離輻射作業員工的健檢結果保存「7年」』錯誤(游離輻射等特殊危害的健檢紀錄須保存「「30年」」);D『健檢的安排由「職業醫學專科醫師」排定』錯誤(健檢的「安排/實施」是「「雇主」」的責任)。故 C 正確。粉塵作業的特殊健檢需含肺功能檢查。","options":{"A":"65歲以上是一般健檢每年1次，特殊健檢針對特別危害作業者。","B":"游離輻射作業的健檢紀錄須保存30年，非7年。","C":"正確。粉塵作業勞工的特殊健檢需包含肺功能檢查。","D":"健檢的安排是雇主的責任，非職醫科醫師。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"110030-N5-58":{"quick":"堆肥法處理的「最主要優點」＝利用生化作用將物質分解腐熟，可改善土壤。","detail":{"background":"堆肥法處理的「最主要優點」是(C)『「「利用「生化作用」將物質「分解腐熟」，「可「改善土壤」」(將「有機廢棄物「資源化(製成堆肥)」」，「回歸土壤、改良地力」，達「資源循環」)』。其他非堆肥的主要優點:A『操作簡單、成本便宜』非堆肥的最大特點;B『市場銷售穩定』錯誤(堆肥的「需求受「季節性農作」影響」);D『最終處置』錯誤(堆肥是「「資源化(中間處理)」」，非最終處置)。故 C 正確。堆肥法的最主要優點是有機物分解腐熟、改善土壤(資源化)。","options":{"A":"操作簡單、成本便宜非堆肥的最主要特點。","B":"堆肥的需求受季節性農作影響，非銷售穩定。","C":"正確。利用生化作用分解腐熟、改善土壤(資源化)。","D":"堆肥是資源化(中間處理)，非最終處置。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"110030-N5-60":{"quick":"水污染愈嚴重時，愈容易發生＝水中氨氮(NH₃-N)愈高。","detail":{"background":"水污染「愈嚴重」時，愈容易發生(D)『「水中「氨氮(NH₃-N)「愈「高」」(「有機物(含氮污染)「分解」會「產生「氨氮」」;氨氮高表示「受「有機/糞便」污染嚴重」)』。其他錯誤:A『生化需氧量(BOD)愈「低」』錯誤(污染越嚴重「BOD 愈「「高」」」);B『生物「種類減少「「且「數量也減少」」」錯誤(種類減少，但「耐污種類的「數量」可能「增多」」);C『溶氧量(DO)愈「高」』錯誤(污染越嚴重「DO 愈「「低」」」，微生物分解耗氧)。故 D 正確。水污染越嚴重:氨氮↑、BOD↑、DO↓。","options":{"A":"污染越嚴重 BOD 愈高，非愈低。","B":"種類減少，但耐污種類的數量可能增多。","C":"污染越嚴重 DO(溶氧)愈低，非愈高。","D":"正確。水污染愈嚴重，水中氨氮(NH₃-N)愈高。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"110030-N5-61":{"quick":"紫外線指數7、AQI 130＝紫外線指數高量級；空氣品質指標對敏感族群不健康。","detail":{"background":"(B)『「「紫外線指數「7」」屬「「高量級(6~7)」」;「「AQI「130」」屬「「101~150(「對「敏感族群」不健康」)」」』。(紫外線指數:0~2低、3~5中、6~7「高」、8~10過量、≥11危險;AQI:0~50良好、51~100普通、「101~150「對敏感族群不健康」」、151~200對所有族群不健康。)故 B 正確。UV 7是高量級;AQI 130對敏感族群不健康。","options":{"A":"UV 7是高量級(非中量);AQI 130對敏感族群不健康(非普通)。","B":"正確。UV 7高量級;AQI 130對敏感族群不健康。","C":"UV 7非過量級;AQI 130非對所有族群不健康(151以上才是)。","D":"UV 7非危險級。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"110030-N5-62":{"quick":"地球臭氧層被破壞的「最主要」危害＝地表有害的紫外線增加，生物健康受影響。","detail":{"background":"地球臭氧層被破壞時，「最主要」的危害為(B)『「地表「「有害的紫外線「增加」」，「生物健康「受到影響」(臭氧層能「「阻擋紫外線」」;破壞後「紫外線增強」，使人類「皮膚癌、白內障」增加、影響生態)」』。溫室效應(A)、海平面上升(C)、沙漠化(D)是「別的環境問題(溫室效應、氣候變遷、土地利用)」，非「臭氧層破壞」的「直接」危害。故 B 正確。臭氧層破壞的主要危害是紫外線增加、影響生物健康。","options":{"A":"溫室效應是 CO₂ 等溫室氣體的問題，非臭氧層破壞的直接危害。","B":"正確。臭氧層破壞使地表紫外線增加，影響生物健康。","C":"冰川融化、海平面上升是溫室效應/氣候變遷。","D":"沙漠化是土地過度開發/濫伐。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"110030-N5-69":{"quick":"長期暴露於游離輻射的勞工，易罹患白血病。","detail":{"background":"長期暴露於「「游離輻射」」環境的勞工，易罹患(B)『「「白血病(游離輻射會「損傷「骨髓造血細胞」」，增加「「白血病」、其他癌症」的風險)」』。白內障(A，輻射「也可能」致白內障，但「白血病」是更典型的「造血系統」癌症)、腦栓塞、角膜炎非游離輻射的典型疾病。故 B 正確。游離輻射易致白血病(及其他癌症)。","options":{"A":"白內障雖也可能，但白血病是更典型的輻射致癌(造血系統)。","B":"正確。游離輻射易致白血病(損傷骨髓造血)。","C":"腦栓塞非游離輻射的典型疾病。","D":"角膜炎非游離輻射的典型疾病。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"110030-N5-70":{"quick":"了解勞工使用化學品的危害性，應從「物質安全資料表」取得資訊。","detail":{"background":"為了解勞工使用化學品的「危害性」，職業衛生護理師應從(C)『「「物質安全資料表(MSDS/SDS;記載化學品的「「成分、危害辨識、急救、滅火、洩漏、暴露管制、毒性」」等「完整危害資訊」)」』取得資訊。標準作業流程表是操作步驟;員工健康檢查報告是個人健康;環境監測報告是環境濃度。「化學品的危害性資訊」來自 MSDS。故 C 正確。化學品的危害資訊來自物質安全資料表(MSDS)。","options":{"A":"標準作業流程表是操作步驟，非危害資訊。","B":"員工健康檢查報告是個人健康狀況。","C":"正確。化學品的危害性資訊來自物質安全資料表(MSDS)。","D":"環境監測報告是環境的污染物濃度。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"110110-N5-60":{"quick":"會引起類交感神經興奮的食品添加物(違法)＝瘦肉精。","detail":{"background":"會引起「「類交感神經興奮(心悸、手抖、血壓上升)」」的食品添加物(違法添加)是(C)『「「瘦肉精(如「萊克多巴胺、克倫特羅」;屬「「乙型受體素(β-agonist)」」，「「興奮「交感神經」」，使動物增肌減脂;殘留於肉品，人食用後可能「心悸、手抖、頭痛」)」』。銅葉綠素(色素)、毒澱粉(順丁烯二酸)、人工甘味劑的危害不同。故 C 正確。瘦肉精(β-agonist)會引起類交感神經興奮。","options":{"A":"銅葉綠素是色素(違法添加於油品)，非交感興奮。","B":"毒澱粉(順丁烯二酸)的危害是腎毒性。","C":"正確。瘦肉精(β-agonist)會引起類交感神經興奮。","D":"人工甘味劑非交感神經興奮劑。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"110110-N5-61":{"quick":"醫療廢棄物的處理「正確」者＝不可燃的感染廢棄物經滅菌處理後，可視為一般廢棄物清除。","detail":{"background":"醫療廢棄物的處理，正確的是(B)『「「不可燃」的感染廢棄物「經「滅菌(高壓蒸氣)」處理後」，「可「視為「一般廢棄物」」清除(滅菌後「已無感染性」，可依一般廢棄物處理)』。其他錯誤:A『感染性廢棄物「不可」在室溫下貯存』錯誤(室溫可貯存「1日」);C『「可燃」的感染廢棄物用「黃色」容器』錯誤(可燃用「「紅色」容器」);D『放射線廢棄物收集於「黑色塑膠袋」』錯誤(放射性廢棄物有「專用容器」)。故 B 正確。不可燃感染廢棄物滅菌後可視為一般廢棄物。","options":{"A":"感染性廢棄物室溫可貯存1日，非不可。","B":"正確。不可燃感染廢棄物滅菌後可視為一般廢棄物清除。","C":"可燃感染廢棄物用紅色容器，非黃色。","D":"放射性廢棄物有專用容器，非黑色塑膠袋。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"110110-N5-69":{"quick":"理想校園健康環境的敘述(本題送分)。","detail":{"background":"本題詢問理想校園健康環境，經評定為「送分(各選項均給分)」。理解重點:教室「濕度」約「「60%以下(舒適範圍)」」、窗戶(採光)面積約占建坪「1/4~1/5」、噪音宜「「較低(如<60分貝)」」、桌面照度應「「≥350米燭光」」。本題因標準值的認定有爭議而送分。本題送分。","options":{"A":"本題送分(各選項均給分)。","B":"本題送分。","C":"本題送分。","D":"本題送分。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生","送分題"]}},"110110-N5-71":{"quick":"職業衛生護理與其他社區群體護理「最大的不同」＝工作現場訪視。","detail":{"background":"職業衛生護理的工作內容與其他社區群體護理「最大的不同」為(B)『「「工作「現場」訪視(走入「「工作場所(現場)」」，「實地了解「作業環境、危害因子、勞工的健康暴露」」，是職業衛生護理「特有」的工作)』。健康照護、健康監測、健康管理活動是「各類社區護理「都有」」的工作，非「最大的不同」。「工作現場訪視」是職業衛生護理的特色。故 B 正確。工作現場訪視是職業衛生護理特有的工作。","options":{"A":"健康照護是各類社區護理都有的工作。","B":"正確。工作現場訪視是職業衛生護理特有的工作。","C":"健康監測是各類社區護理都有的工作。","D":"健康管理活動是各類社區護理都有的工作。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"111030-N5-58":{"quick":"空氣污染的敘述「正確」者＝硫氧化物與氮氧化物是造成酸雨的主因。","detail":{"background":"空氣污染的敘述，正確的是(C)『「「硫氧化物(SOx)與氮氧化物(NOx)」」是造成「「酸雨」」的主因(SOx、NOx 與水氣結合形成硫酸、硝酸)』。其他錯誤:A『使用「無鉛汽油」就「不會」造成空氣污染』錯誤(無鉛汽油「仍會排放 CO、NOx、碳氫化合物」等污染物);B『「二氧化碳」吸收「紫外線」是溫室效應主因』錯誤(CO₂ 吸收的是「「紅外線(熱輻射)」」，非紫外線);D『「一氧化碳」是造成「臭氧層破洞」的主因』錯誤(臭氧層破洞的主因是「「氟氯碳化物(CFCs)」」)。故 C 正確。SOx、NOx 是酸雨的主因。","options":{"A":"無鉛汽油仍會排放 CO、NOx 等污染物。","B":"CO₂ 吸收的是紅外線(熱輻射)，非紫外線。","C":"正確。硫氧化物與氮氧化物是造成酸雨的主因。","D":"臭氧層破洞的主因是氟氯碳化物(CFCs)，非 CO。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"111030-N5-59":{"quick":"食品添加物的敘述「錯誤」者＝防腐劑可抑制「和「殺死」」微生物的作用。","detail":{"background":"食品添加物的敘述，「錯誤」者為(B)『「「防腐劑」可「「抑制「和「「殺死」」」」微生物的作用」』——錯誤，「「防腐劑」的作用是「「「抑制(抑菌)」」微生物的「生長繁殖」」，「「「「不能「「殺死」」」」微生物(那是「「殺菌劑/滅菌」」的作用)。其他正確:A 硝酸鹽與亞硝酸鹽添加可抑制肉類肉毒桿菌生長、C 添加阿斯巴甜的食物應標註「苯酮尿症患者」不宜食用、D 過氧化氫(H₂O₂)可添加於魚肉煉製品但不得殘留。故本題選錯誤者為 B。防腐劑是「抑制」微生物生長，非「殺死」。","options":{"A":"硝酸鹽/亞硝酸鹽可抑制肉毒桿菌生長，正確。","B":"正確(本題選錯誤者)。防腐劑是抑制微生物生長，非殺死。","C":"阿斯巴甜應標註苯酮尿症患者不宜，正確。","D":"過氧化氫可用於魚肉煉製品但不得殘留，正確。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"111030-N5-60":{"quick":"自來水廠曝氣法的主要目的＝去除水中有害氣體及不良氣味②、提高pH值以減少水管腐蝕④。","detail":{"background":"自來水廠淨水的「曝氣法」目的:(2)「去除水中「有害氣體(如 H₂S、CO₂)及「不良氣味」」;(4)「「提高 pH 值」(去除 CO₂ 使「水較不酸」)，以「減少水管的「腐蝕性」」。而(1)『增加「一氧化碳」抑制藻類』錯誤(曝氣是「增加「氧」」、不會「增加一氧化碳」;抑藻靠硫酸銅);(3)『「過濾及淨化」水質』錯誤(過濾是「另一步驟」，非曝氣的目的)。故正確為②④(選 D)。曝氣:去除 CO₂/異味、增加溶氧、提高 pH(減腐蝕)。","options":{"A":"13：含①(一氧化碳抑藻，錯誤)③(過濾非曝氣)。","B":"14：含①，錯誤。","C":"23：含③(過濾非曝氣)，錯誤。","D":"正確。去除有害氣體及不良氣味②、提高pH減少水管腐蝕④。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"111030-N5-61":{"quick":"環境噪音達85 dB以上時，應立即配戴防音的防護具。","detail":{"background":"當環境噪音達(D)『「「85 dB」」以上時，應「立即配戴「防音的防護具(耳塞、耳罩)」(「噪音「≥85 dB(8小時)」」是「聽力保護的「行動值」」，超過此值須採「聽力防護」)』。55、65、75 dB 未達須強制防護的門檻。故 D 正確。噪音≥85 dB 應配戴防音防護具(與前述同類題一致)。","options":{"A":"55 dB 未達防護門檻。","B":"65 dB 未達防護門檻。","C":"75 dB 未達防護門檻(85才是)。","D":"正確。噪音達85 dB 以上應配戴防音防護具。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"111030-N5-66":{"quick":"8小時日時量平均容許濃度(TWA)＝勞工每天工作8小時、重複暴露此濃度下，不會發生不良反應。","detail":{"background":"「8小時日時量平均容許濃度(TWA)」是指(D)『「勞工「每天工作8小時、「「一般勞工「重複(長期)」暴露」」此濃度下，「「不會發生「不良(健康)反應」」(是「長期、平均」的容許暴露標準)』。其他是別的標準:A『不得有任何時間超過』是「「最高容許濃度(Ceiling)」」;B『連續暴露15分鐘』是「「短時間時量平均容許濃度(STEL)」」;C『累積1天』描述不符。故 D 正確。TWA 是每天8小時、長期重複暴露不致不良反應的平均容許濃度。","options":{"A":"「任何時間不得超過」是最高容許濃度(Ceiling)。","B":"「連續暴露15分鐘」是短時間時量平均(STEL)。","C":"「累積1天」的描述不符 TWA 的定義。","D":"正確。TWA 是每天8小時、長期重複暴露不致不良反應的平均容許濃度。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"111110-N5-44":{"quick":"鉛中毒的敘述「最不適當」者＝煮沸法可去除水中的鉛。","detail":{"background":"鉛中毒的敘述，「最不適當」者為(C)『「「煮沸法」可「去除」水中的鉛」』——錯誤，「「煮沸「「無法「去除「鉛(重金屬)」」」(鉛「不會「揮發」」;「煮沸反而會「「濃縮」鉛」)。其他正確:A 孩童比成人更容易鉛中毒(吸收率高、影響神經發育)、B 建議水龍頭應選用不鏽鋼材質(避免含鉛的金屬釋出)、D 鉛可能導致嬰幼兒的學習能力障礙(神經毒性)。故本題選最不適當者為 C。煮沸無法去除鉛(反而濃縮)。","options":{"A":"孩童比成人更容易鉛中毒，正確。","B":"水龍頭選用不鏽鋼材質(避免鉛釋出)，正確。","C":"正確(本題選最不適當者)。煮沸無法去除鉛(反而濃縮)。","D":"鉛可能導致嬰幼兒學習能力障礙，正確。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"111110-N5-61":{"quick":"曝氣法(aeration)的目的＝增加水中溶氧量①、去除不良氣味②。","detail":{"background":"自來水廠曝氣法(aeration)的目的:(1)「「增加水中「溶氧量」」(水與空氣接觸增加溶氧)」;(2)「「去除「不良氣味」」(逸散揮發性異味、CO₂)」。而(3)『「降低」pH 值』錯誤(曝氣去除 CO₂ 會使 pH「「升高(降酸)」」，非降低);(4)『「淨化」水質』錯誤(淨化(去除懸浮物)靠「沉澱、過濾」，非曝氣)。故正確為①②(選 A)。曝氣:增加溶氧、去除異味/CO₂、提高 pH。","options":{"A":"正確。增加水中溶氧量①、去除不良氣味②。","B":"23：含③(降低pH，錯誤)，錯誤。","C":"24：含④(淨化水質非曝氣)，錯誤。","D":"34：含③④，皆錯。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"111110-N5-70":{"quick":"醫療工作環境常見的危害因子「最不適當」者＝熱傷害。","detail":{"background":"醫療工作環境常見的危害因子，「最不適當」者為(B)『「「熱傷害」』——「「熱傷害(高溫)」「「不是「醫療工作環境」的「常見」危害因子」(醫療環境多為「空調室內」)。其他是醫療環境常見的危害:A X射線(放射線，物理性)、C 微生物(生物性，院內感染)、D 針扎(扎傷，生物性暴露)。故本題選最不適當者為 B。熱傷害非醫療環境的常見危害(X射線、微生物、針扎才是)。","options":{"A":"X射線(放射線)是醫療環境的常見危害。","B":"正確(本題選最不適當者)。熱傷害非醫療環境的常見危害。","C":"微生物(院內感染)是醫療環境的常見危害。","D":"針扎是醫療環境的常見危害。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"112030-N5-60":{"quick":"長者用餐活動希望參與者「自備餐具」＝5R 的「重複使用(reuse)」。","detail":{"background":"社區舉辦長者用餐活動，希望參與者「「自備餐具」」(「重複使用「自己的餐具」」，「減少「一次性餐具」的使用」)——符合5R 的(A)『「重複使用(reuse;「「重複「使用」物品」，減少廢棄物產生)」』。回收(recycle)是回收再製;再生(regeneration)、維修(repair)是別的概念。「自備餐具(重複使用)」屬 reuse。故 A 正確。自備餐具(重複使用)屬5R 的 reuse。","options":{"A":"正確。自備餐具(重複使用)，屬5R 的重複使用(reuse)。","B":"回收(recycle)是回收再製。","C":"再生(regeneration)是再生利用。","D":"維修(repair)是修復再用。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"112030-N5-65":{"quick":"檢驗飲水及食物是否受糞便污染的生物指標＝大腸桿菌。","detail":{"background":"檢驗飲水及食物是否受「「糞便污染」」的生物指標是(A)『「「大腸桿菌(大腸菌群;「「糞便污染」的「指標菌」」;檢出大腸桿菌表示「受糞便(腸道病原)污染」)」』。腸炎弧菌(海產)、葡萄球菌(人手)、沙門氏菌(蛋禽)是「致病菌」，非「糞便污染的指標菌」。故 A 正確。大腸桿菌是糞便污染的生物指標(與前述同類題一致)。","options":{"A":"正確。大腸桿菌是糞便污染的生物指標。","B":"腸炎弧菌是海產的致病菌，非糞便污染指標。","C":"葡萄球菌是人手污染的致病菌。","D":"沙門氏菌是蛋禽的致病菌。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"112110-N5-60":{"quick":"一氧化碳的敘述「錯誤」者＝會與血紅素結合形成碳氧血紅素，並易造成血紅素再生。","detail":{"background":"一氧化碳的敘述，「錯誤」者為(D)『「會與血紅素結合形成「碳氧血紅素」，並「「易造成「血紅素「再生」」」』——錯誤，「一氧化碳(CO)與血紅素結合(親和力是氧的200多倍)形成「「碳氧血紅素(COHb)」」，「「「降低「血紅素「攜氧能力」」」」，造成「組織缺氧」;「「「不會「造成「血紅素「再生」」」」。其他正確:A 是無色無味的氣體、不易被察覺、B 可由含碳燃料的不完全燃燒而產生、C 易累積於交通頻繁地區及室內停車場。故本題選錯誤者為 D。CO 降低血紅素攜氧能力，非造成血紅素再生。","options":{"A":"是無色無味的氣體、不易察覺，正確。","B":"可由含碳燃料的不完全燃燒產生，正確。","C":"易累積於交通頻繁地區及室內停車場，正確。","D":"正確(本題選錯誤者)。CO 降低血紅素攜氧能力，非造成血紅素再生。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"112110-N5-61":{"quick":"潛伏期「最短」的食物中毒＝金黃色葡萄球菌。","detail":{"background":"下列食物中毒中，潛伏期「最短」者為(C)『「「金黃色葡萄球菌(Staphylococcus aureus;其「「腸毒素「「已「預先形成」」」，攝食後「「1~6小時(平均「2~4小時」)」」即「快速發病」，潛伏期最短)」』。肉毒桿菌(12~36小時)、沙門氏菌(6~72小時)、腸炎弧菌(數小時~24小時)的潛伏期較長。故 C 正確。金黃色葡萄球菌(腸毒素已形成)潛伏期最短(1~6小時)。","options":{"A":"肉毒桿菌潛伏期約12~36小時。","B":"沙門氏菌潛伏期約6~72小時。","C":"正確。金黃色葡萄球菌(腸毒素已形成)潛伏期最短(1~6小時)。","D":"腸炎弧菌潛伏期約數小時~24小時。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"112110-N5-69":{"quick":"職業衛生護理人員的角色與職責「最不適當」者＝進行職業疾病診斷。","detail":{"background":"職業衛生護理人員的角色與職責，「最不適當」者為(C)『「進行「職業疾病「診斷」」』——錯誤，「「疾病的「診斷」」是「「「醫師(職業醫學科醫師)」」的職權」，「「不是「護理人員」」的職責(護理師「協助評估、衛教、追蹤」，但「不「診斷」」)。其他屬於職業衛生護理人員的職責:A 勞工健康檢查之分析與評估(協助)、B 進行勞工衛生指導、D 協助雇主選配勞工從事適當工作。故本題選最不適當者為 C。疾病診斷是醫師職權，非護理人員。","options":{"A":"勞工健康檢查之分析與評估(協助)，是其職責。","B":"進行勞工衛生指導，是其職責。","C":"正確(本題選最不適當者)。職業疾病診斷是醫師職權，非護理人員。","D":"協助雇主選配勞工從事適當工作，是其職責。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"112110-N5-70":{"quick":"職業肌肉骨骼疾病的危險因子「最不適當」者＝低溫作業。","detail":{"background":"職業「「肌肉骨骼疾病」」的危險因子，「最不適當」者為(D)『「「低溫作業」』——「「低溫作業」是「「「低溫(寒冷)危害」」」(凍傷、失溫)，「「不是「「肌肉骨骼疾病」」的「主要」危險因子」。其他是肌肉骨骼疾病的危險因子:A 姿勢不良、B 反覆(重複)動作、C 搬運重物(屬「人因工程」危害)。故本題選最不適當者為 D。低溫作業屬低溫危害，非肌肉骨骼疾病的主要危險因子。","options":{"A":"姿勢不良是肌肉骨骼疾病的危險因子。","B":"反覆動作是危險因子。","C":"搬運重物是危險因子。","D":"正確(本題選最不適當者)。低溫作業屬低溫危害，非肌肉骨骼疾病的危險因子。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"112110-N5-71":{"quick":"高噪音環境的勞工安全防護「錯誤」者＝噪音高過75分貝的工作場所，需標示噪音危害公告。","detail":{"background":"依職業安全衛生設施規則，對長期高噪音環境的勞工安全防護，「錯誤」者為(C)『「噪音高過「「75」」分貝之工作場所，需「標示噪音危害公告」』——錯誤，「噪音「「≥85分貝(或90分貝)」」的工作場所，才須「標示「噪音危害「警告標示/公告」」」(「75分貝」未達標示門檻)。其他正確:A 勞工應戴耳塞、耳罩等防音防護具、B 強烈噪音的機具應隔離並與工作場所分開、D 震動及噪音的機具應有消音、震動隔離的材料。故本題選錯誤者為 C。噪音危害公告的門檻是≥85(90)分貝，非75。","options":{"A":"勞工應戴耳塞、耳罩等防音防護具，正確。","B":"強烈噪音機具應隔離並與工作場所分開，正確。","C":"正確(本題選錯誤者)。噪音危害公告的門檻是≥85(90)分貝，非75。","D":"震動及噪音機具應有消音、震動隔離材料，正確。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"112180-N5-38":{"quick":"食物中毒(餐後2~4小時發病)的敘述「最不適當」者＝推論應為沙門氏菌中毒。","detail":{"background":"某校學生吃完中餐「「2~4小時後」」發生噁心、嘔吐、腹瀉，「最不適當」者為(C)『「推論應為「沙門氏菌」中毒」』——錯誤，「「2~4小時「快速發病」」＋「「感染源可能來自「帶菌之「傷口分泌物」污染」」」(D)——這是「「「金黃色葡萄球菌」」」中毒的特徵(「腸毒素潛伏期短(1~6小時)」、「常因「人手/傷口(化膿)」污染食物」);「「沙門氏菌」的潛伏期「較長(6~72小時)」、來源是「蛋禽」」，「「不符」此情境。其他正確:A 醫療院所應在24小時內通知衛生單位、B 學校應留存剩餘食品、患者吐瀉物、D 感染源可能來自帶菌的傷口分泌物污染(指向金黃色葡萄球菌)。故本題選最不適當者為 C。2~4小時發病+傷口污染應為金黃色葡萄球菌，非沙門氏菌。","options":{"A":"醫療院所應在24小時內通知衛生單位，正確。","B":"學校應留存剩餘食品、吐瀉物(檢體)，正確。","C":"正確(本題選最不適當者)。2~4小時發病+傷口污染應為金黃色葡萄球菌，非沙門氏菌。","D":"感染源可能來自帶菌的傷口分泌物(指向金黃色葡萄球菌)，正確。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"112180-N5-39":{"quick":"焚化法的敘述「最適當」者＝餘熱可再利用為能源。","detail":{"background":"焚化法的敘述，最適當的是(B)『「焚化的「「餘熱」」可「再利用為「能源(發電、供熱)」」(焚化發電是「資源化」的利用)』。其他錯誤:A『操作維護技術較堆肥法「低」』錯誤(焚化的「設備、技術、維護「「較「複雜/高」」」);C『為「最經濟」的處理方式』錯誤(焚化的「建廠、營運「成本「高」」」);D『為垃圾「最終處理」法』錯誤(焚化是「「中間處理(減容減量)」」，「灰渣」仍須「最終掩埋」)。故 B 正確。焚化的餘熱可再利用為能源。","options":{"A":"焚化的操作維護技術較堆肥法高(複雜)，非低。","B":"正確。焚化的餘熱可再利用為能源。","C":"焚化的成本高，非最經濟。","D":"焚化是中間處理(灰渣仍須掩埋)，非最終處理。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"112180-N5-40":{"quick":"水媒疾病的敘述「正確」者＝藍嬰症(嬰兒變性血紅素血症)是因水中硝酸鹽或亞硝酸鹽過量引起。","detail":{"background":"水媒疾病的敘述，正確的是(D)『「「嬰兒「變性血紅素血症(藍嬰症)」」是因水中「「硝酸鹽或亞硝酸鹽「過量」」」引起的病變(亞硝酸鹽使「血紅素「氧化成變性血紅素」」，「攜氧能力下降」，嬰兒「發紺(藍嬰)」)』。其他錯誤:A『水俁病是因「含銅」廢水』錯誤(是「「汞」」);B『痛痛病是因「砷」』錯誤(是「「鎘」」);C『威爾遜症是因水中「含鎘」』錯誤(威爾遜症是「「先天性「銅」代謝異常」」)。故 D 正確。藍嬰症是水中硝酸鹽/亞硝酸鹽過量引起。","options":{"A":"水俁病是含汞廢水(中樞神經病變)，非銅。","B":"痛痛病是鎘中毒(骨骼病變)，非砷。","C":"威爾遜症是先天性銅代謝異常，非鎘。","D":"正確。藍嬰症是水中硝酸鹽/亞硝酸鹽過量引起。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"112180-N5-45":{"quick":"作業員壓力大、情緒不穩，職業衛生護理師「最不適當」的措施＝建議服用抗憂鬱藥物。","detail":{"background":"職業衛生護理師發現作業員壓力大增、情緒不穩，「最不適當」的措施為(B)『「「建議「服用「抗憂鬱藥物」」』——錯誤，「「藥物的「處方/建議」」是「「「醫師」」的職權」，「護理師「不可「自行「建議用藥」」」(應「轉介「醫師/身心科」評估」)。其他適當:A 評估員工身心壓力狀況、C 進行異常個案追蹤管理、D 辦理壓力調適健康講座。故本題選最不適當者為 B。建議用藥是醫師職權，護理師不可自行建議。","options":{"A":"評估員工身心壓力狀況，適當。","B":"正確(本題選最不適當者)。建議用藥是醫師職權，護理師不可自行建議。","C":"進行異常個案追蹤管理，適當。","D":"辦理壓力調適健康講座，適當。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"113030-N5-36":{"quick":"里長規劃健走步道、增設運動器材並維護＝社會生態模式的「社區因素」。","detail":{"background":"平安社區「里長「規劃「安全的「健走步道」」、在公園「增設運動器材」且「定期維護」」——依社會生態模式，屬(C)『「「社區(community)因素」(改善「「社區「環境/設施」」、營造「支持健康的社區條件」」)』。個人因素是個人知識/態度;人際因素是家人/同儕;組織因素是學校/職場等組織。「社區的環境設施(步道、器材)」屬社區因素。故 C 正確。改善社區環境設施屬社會生態模式的社區因素。","options":{"A":"人際因素是家人、同儕的影響。","B":"組織因素是學校、職場等組織的層面。","C":"正確。規劃步道、增設運動器材(社區環境設施)，屬社區因素。","D":"個人因素是個人的知識、態度、行為。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"113030-N5-37":{"quick":"細懸浮微粒(PM2.5)的敘述「最適當」者＝第十級是指日平均值或24小時值濃度≧71 μg/m³。","detail":{"background":"細懸浮微粒(PM2.5)的敘述，最適當的是(C)『「「第十級」是指「日平均值或24小時值濃度「≧71 μg/m³」」(PM2.5 指標分級，第十級(最高級)為「≥71 μg/m³」，屬「紫爆/極高」)』。其他錯誤:A『會影響呼吸道、「但「不易「進入肺泡」」』錯誤(PM2.5 粒徑小，「「易「深入「肺泡(肺部深處)」」」);B『濃度達「第三級」一般民眾要減少戶外活動』錯誤(「「達「高(紅色)」等級」」民眾才減少戶外);D『年平均「安全標準」訂為「35 μg/m³」』錯誤(PM2.5 的「「年」平均標準是「「15 μg/m³」」;「35」是「「24小時」標準)。故 C 正確。PM2.5 第十級為≥71 μg/m³。","options":{"A":"PM2.5 粒徑小，易深入肺泡，非不易進入。","B":"達高(紅色)等級民眾才減少戶外，非第三級。","C":"正確。第十級是指日平均或24小時值≧71 μg/m³。","D":"PM2.5 年平均標準是15 μg/m³，非35(35是24小時標準)。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"113030-N5-38":{"quick":"醫療廢棄物的處理原則「最適當」者＝於0~5°C貯存以7日為限。","detail":{"background":"醫療(感染性)廢棄物的處理原則，最適當的是(B)『「於「「0~5°C(冷藏)」」貯存以「「7日」」為限(「常溫(室溫)「1日」、「「0~5°C冷藏「7日」」」)』。其他錯誤:A『於「5°C以上」貯存以7日為限』錯誤(5°C以上(常溫)以「1日」為限);C『0°C以下貯存以「2個月」為限』、D『0°C以下貯存以「18個月」為限』——冷凍(0°C以下)的貯存期限依規定(非2個月/18個月的描述)。故 B 正確。感染廢棄物:常溫1日、0~5°C冷藏7日。","options":{"A":"5°C以上(常溫)以1日為限，非7日。","B":"正確。於0~5°C冷藏貯存以7日為限。","C":"0°C以下的貯存期限非2個月。","D":"0°C以下的貯存期限非18個月。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"113030-N5-39":{"quick":"酸雨的敘述「最正確」者＝能使岩石中有毒金屬元素溶解。","detail":{"background":"酸雨的敘述，最正確的是(B)『「能使「岩石(土壤)中「有毒金屬元素「溶解(溶出)」」(酸雨「酸化「土壤、水體」」，使「重金屬「溶出」」，污染環境、危害生物)』。其他錯誤:A『是「大氣中的 CO₂」溶解於雨水中所致』錯誤(那是「「正常雨水(pH≈5.6)」」;「酸雨」是「「SOx、NOx」」造成);C『「只」影響水中動物、對植物「沒有影響」』錯誤(酸雨「「也「危害植物(森林)、土壤」」」);D『是指 pH「小於6」的雨水』錯誤(酸雨定義是「pH「<5.0(或5.6)」」)。故 B 正確。酸雨能使岩石/土壤中的有毒金屬溶出。","options":{"A":"CO₂ 溶於雨水是正常雨(pH≈5.6);酸雨是 SOx、NOx 造成。","B":"正確。酸雨能使岩石中有毒金屬元素溶解(溶出)。","C":"酸雨也危害植物、森林、土壤，非只影響水中動物。","D":"酸雨定義是 pH<5.0(或5.6)，非<6。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"113030-N5-45":{"quick":"紅外線工作環境最易引起的健康危害＝白內障。","detail":{"background":"在「「紅外線」」工作環境(如「玻璃工、煉鋼、焊接」)中，最易引起的健康危害為(D)『「「白內障(紅外線「熱輻射」會「傷害「眼睛「水晶體」」」，造成「「白內障(「玻璃工白內障/熱白內障」)」)」』。惡性貧血(B12缺乏)、白指症(振動/雷諾)、靜脈瘤非紅外線的危害。故 D 正確。紅外線(熱輻射)最易引起白內障。","options":{"A":"惡性貧血是維生素 B12 缺乏，非紅外線危害。","B":"白指症是振動危害(雷諾現象)。","C":"靜脈瘤非紅外線的危害。","D":"正確。紅外線(熱輻射)最易引起白內障。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"113100-N5-34":{"quick":"45班國小的學校衛生人力配置＝護理人員2名、營養師1名。","detail":{"background":"依學校衛生法，某國小「全校班級數為「45班」」的學校衛生人力配置為(C)『「「護理人員「2名」」、「營養師「1名」」(學校衛生法規定:「「「40班以上」」應置「「護理人員「2人」」」;「「「40班以上」」應置「「營養師「1人」」」)』。故 C 正確。40班以上:護理人員2名、營養師1名。","options":{"A":"45班(≥40班)應置營養師1名，非0名。","B":"45班(≥40班)應置護理人員2名，非1名。","C":"正確。45班(≥40班)：護理人員2名、營養師1名。","D":"營養師1名即可，非2名。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"113100-N5-37":{"quick":"校園肺結核護理指導中，較符合「第一段預防」的主題＝環境通風的重要性。","detail":{"background":"校園肺結核護理指導中，較符合「第一段預防(健康促進/特殊保護;疾病「發生前」)」的主題是(B)『「「環境「通風」的重要性」(「保持「通風」可「減少「結核桿菌(飛沫/空氣傳播)」的「傳播」」，「預防「感染發生」」，屬「第一段預防」)』。其他屬「第二/三段」:A 藥物治療(第三段治療)、C 診斷法(第二段早期診斷)、D 抗藥性結核的嚴重性(治療/疾病已發生)。故 B 正確。環境通風(預防感染發生)屬第一段預防。","options":{"A":"藥物治療屬第三段(治療)。","B":"正確。環境通風的重要性(預防感染發生)，屬第一段預防。","C":"診斷法屬第二段(早期診斷)。","D":"抗藥性結核嚴重性偏向疾病已發生的範疇。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"113100-N5-38":{"quick":"職業健康危害因子中「不屬於」物理性危害者＝反覆性動作。","detail":{"background":"職業健康危害因子中，「不屬於「物理性」危害」者為(C)『「「反覆性動作」』——「「反覆性(重複)動作」屬「「「人因工程(ergonomic)」危害」」，「不是「「物理性」」。其他屬「物理性」危害:A 高溫、B 噪音、D 游離輻射(物理性危害是「溫度、噪音、振動、輻射、異常氣壓」等)。故本題選不屬於者為 C。反覆性動作屬人因工程危害，非物理性。","options":{"A":"高溫是物理性危害。","B":"噪音是物理性危害。","C":"正確(本題選不屬於者)。反覆性動作屬人因工程危害，非物理性。","D":"游離輻射是物理性危害。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"113100-N5-40":{"quick":"食物中毒的緊急處理原則「錯誤」者＝建議多喝水及補充營養素。","detail":{"background":"食物中毒的緊急處理原則，「錯誤」者為(C)『「建議「多喝水「及「補充「營養素」」」』——錯誤，急性食物中毒(嘔吐、腹瀉)當下應「「「禁食」、補充「水分「與「「電解質」」」」(預防脫水)，「「不應「「「補充「營養素(進食)」」」」(會加重腸胃負擔;待症狀緩解後再漸進進食)。其他正確:A 儘快將患者送醫、B 保留剩餘食物及患者吐瀉物(檢體)、D 醫療院所發現食物中毒患者應在24小時內通知衛生單位。故本題選錯誤者為 C。急性食物中毒應禁食、補充水分電解質，非補充營養素。","options":{"A":"儘快將患者送醫，正確。","B":"保留剩餘食物及吐瀉物(檢體)，正確。","C":"正確(本題選錯誤者)。應禁食、補充水分電解質，非補充營養素。","D":"24小時內通知衛生單位，正確。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"113180-N5-36":{"quick":"護理師在校園中的角色功能「最不適當」者＝校園安全監測。","detail":{"background":"護理師在校園中的角色功能，「最不適當」者為(B)『「「校園「安全監測」」』——「「校園「安全(設施、門禁、保全)」監測」」主要是「「學校「行政/總務」」」的職責，「「不是「校護(護理師)」」的「主要」角色功能」。其他屬於校護的角色:A 學生健康檢查、C 緊急傷病處理、D 教職員工生保健。故本題選最不適當者為 B。校園安全監測屬行政/總務，非護理師的主要角色。","options":{"A":"學生健康檢查是校護的角色功能。","B":"正確(本題選最不適當者)。校園安全監測屬行政/總務，非護理師的主要角色。","C":"緊急傷病處理是校護的角色功能。","D":"教職員工生保健是校護的角色功能。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"113180-N5-38":{"quick":"導致肉毒桿菌中毒風險「最高」的食品＝真空包裝的香腸。","detail":{"background":"導致肉毒桿菌中毒風險最高的食品是(D)『「「真空包裝的香腸」(「「真空(厭氧)」」＋「肉品(蛋白質)」」，是「「厭氧的「肉毒桿菌「生長產毒」」」的「最佳環境」)』。其他較不易致肉毒桿菌中毒:A 未煮熟海產(腸炎弧菌)、B 殺菌不全的生乳(其他菌)、C 室溫白米飯(仙人掌桿菌)。「真空包裝肉品(厭氧)」肉毒桿菌風險最高。故 D 正確。真空包裝香腸(厭氧+肉品)肉毒桿菌風險最高。","options":{"A":"未煮熟海產主要是腸炎弧菌的風險。","B":"殺菌不全的生乳是其他菌的風險。","C":"室溫白米飯主要是仙人掌桿菌的風險。","D":"正確。真空包裝香腸(厭氧+肉品)，肉毒桿菌風險最高。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"114030-N5-35":{"quick":"Lalonde(1974)影響健康四大要素中，對健康影響「最大」者＝鼓勵民眾實踐健康生活(生活型態)。","detail":{"background":"依加拿大 Lalonde 報告(1974)的影響健康四大要素(生活型態、環境、遺傳、醫療體系)，對健康影響「最大」者為(D)『「「鼓勵民眾「實踐健康「生活(型態)」」(「「生活型態(lifestyle)」」是「影響健康「最大(約佔50%)」」的因素;改善生活型態最能促進健康)』。提供基因檢測(遺傳)、控制 PM2.5(環境)、推在宅醫療(醫療體系)的影響相對較小。故 D 正確。Lalonde 四要素中「生活型態」對健康影響最大。","options":{"A":"提供基因檢測屬遺傳因素，影響相對較小。","B":"控制 PM2.5 屬環境因素。","C":"廣推在宅醫療屬醫療體系。","D":"正確。鼓勵實踐健康生活(生活型態)對健康影響最大。"},"sources":["社區衛生護理學(新文京/華杏)·健康促進與健康行為理論"]}},"114030-N5-39":{"quick":"紫外線防護的護理指導「最不適當」者＝太陽眼鏡鏡片顏色越深，防紫外線效果越佳。","detail":{"background":"紫外線防護的護理指導，「最不適當」者為(D)『「太陽眼鏡「鏡片「顏色越深」」，防紫外線效果「越佳」』——錯誤，「「鏡片的「顏色深淺」「「與「防紫外線(UV)」「無「直接關係」」」(防 UV 取決於「鏡片是否有「「抗 UV 鍍膜/塗層」」」);「顏色深「但「無抗UV」」的眼鏡，反而「使瞳孔放大、讓更多 UV 進入」，「更傷眼」。其他正確:A 高山、雪地更易受紫外線傷害(反射、海拔高)、B 紫外線傷害可能造成白內障、C 紫外線指數6以上代表紫外線指數過高(高量級以上)。故本題選最不適當者為 D。防 UV 取決於抗UV鍍膜，非顏色深淺。","options":{"A":"高山、雪地更易受紫外線傷害，正確。","B":"紫外線傷害可能造成白內障，正確。","C":"紫外線指數6以上代表偏高(高量級)，正確。","D":"正確(本題選最不適當者)。防 UV 取決於抗UV鍍膜，非鏡片顏色深淺。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"114030-N5-44":{"quick":"校園霸凌的敘述「最適當」者＝個人或集體持續以語言、肢體或網路故意欺負戲弄他人①、長期遭霸凌者可能反擊去霸凌更弱勢者③。","detail":{"background":"校園霸凌的敘述，最適當的是:(1)「個人或集體「持續」以「語言、肢體動作或網路」等「故意「欺負或戲弄」他人」(霸凌的定義:「重複、故意、權力不對等」)」;(3)「長期遭受霸凌者可能出現「「反擊行為」、再去「霸凌比自己弱勢的人」」(「受害者→加害者」的循環)」。而(2)『「成績優秀者「最不容易」」成為被霸凌的對象』錯誤(「「任何人「都可能」」被霸凌，「成績優秀」不一定免於霸凌);(4)『網路霸凌「須有重複性、至少二次」』錯誤(網路霸凌「「「一次「散布(轉傳、留存)」」」即可「持續、廣泛」傷害」，不以「二次」為要件)。故正確為①③(選 B)。","options":{"A":"123：含②(成績優秀最不易，錯誤)。","B":"正確。僅①③(持續故意欺負①、受害者反擊弱勢③)。","C":"134：含④(網路霸凌須二次，錯誤)。","D":"僅34：含④、缺①，錯誤。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"114100-N5-37":{"quick":"高溫烹煮後「最不容易」被破壞的毒素＝金黃色葡萄球菌(產生的腸毒素)。","detail":{"background":"高溫烹煮過後「最「不」容易」被破壞的毒素，是(B)『「「金黃色葡萄球菌」產生的「「腸毒素(enterotoxin)」」(「「「耐熱」」，「「100°C加熱「30分鐘「仍「不被破壞」」」」)』。其他菌/毒素對熱較敏感:A 腸炎弧菌(不耐熱)、C 沙門氏桿菌(加熱可殺)、D 肉毒桿菌的「「毒素「對熱敏感(100°C數分鐘可破壞)」」。「金黃色葡萄球菌腸毒素」最耐熱。故 B 正確。金黃色葡萄球菌的腸毒素耐熱，高溫烹煮不易破壞。","options":{"A":"腸炎弧菌不耐熱，加熱可殺。","B":"正確。金黃色葡萄球菌的腸毒素耐熱，高溫烹煮不易破壞。","C":"沙門氏桿菌加熱可殺。","D":"肉毒桿菌的毒素對熱敏感(100°C數分鐘可破壞)。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"114100-N5-38":{"quick":"室內空氣8小時二氧化碳濃度的標準值＝1000 ppm。","detail":{"background":"依室內空氣品質標準，室內空氣「8小時「二氧化碳(CO₂)」濃度」的標準值為(A)『「「1000 ppm」(室內 CO₂≤1000 ppm/8小時值;CO₂ 過高表示「通風不良」)』。故 A 正確。室內 CO₂ 8小時標準值為1000 ppm(與前述同類題一致)。","options":{"A":"正確。室內空氣8小時二氧化碳濃度標準值為1000 ppm。","B":"1200 ppm 超過標準。","C":"1500 ppm 超過標準。","D":"1800 ppm 超過標準。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"114100-N5-39":{"quick":"噪音超過多少分貝可能干擾內分泌及自主神經系統(本題送分)。","detail":{"background":"本題詢問噪音超過多少分貝可能干擾內分泌及自主神經系統——經評定為「送分(各選項均給分)」。理解重點:「長期暴露於噪音(約「「50~60分貝以上」」即可能「影響睡眠、情緒」，「「較高(85分貝以上)」」則「損傷聽力、干擾「內分泌、自主神經(交感興奮、血壓上升)」」)。本題因分貝門檻的認定有爭議而送分。本題送分。","options":{"A":"本題送分(各選項均給分)。","B":"本題送分。","C":"本題送分。","D":"本題送分。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生","送分題"]}},"114100-N5-41":{"quick":"利用高濃度食鹽或砂糖保存食物＝醃漬法。","detail":{"background":"利用「「高濃度的「食鹽或砂糖」」」保存食物，屬(D)『「「醃漬法(以「高濃度「鹽/糖」」造成「「高滲透壓」」，「「使微生物「脫水、無法生長」」」，達「防腐保存」;如「鹽漬、糖漬、蜜餞」)」』。微生物方法(發酵)、保存劑法(添加防腐劑)、煙燻法(煙燻乾燥)是別的保存方法。「高濃度鹽/糖(高滲透壓)」屬醃漬法。故 D 正確。高濃度鹽/糖(高滲透壓)保存食物屬醃漬法。","options":{"A":"微生物方法是利用發酵(如優格、泡菜)。","B":"保存劑法是添加防腐劑。","C":"煙燻法是煙燻乾燥保存。","D":"正確。高濃度食鹽/砂糖(高滲透壓)保存，屬醃漬法。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"114100-N5-44":{"quick":"職場醫護人員臨場辦理勞工健康服務「最不適當」者＝辦理健康檢查異常追蹤及就醫取藥等服務。","detail":{"background":"依勞工健康保護規則，職場醫護人員臨場辦理勞工健康服務事項，「最不適當」者為(C)『「辦理健康檢查異常「追蹤」及「「就醫「「取藥」」」等服務」』——錯誤，「「「就醫「取藥」」」是「「「醫療「行為」」」(屬「「醫療院所/醫師」」的範疇)，「「不是「職場「臨場服務」」」的事項(職場醫護「協助「追蹤、轉介」」，但「不「代為就醫取藥」」)。其他適當:A 勞工體格檢查結果的分析與評估、管理與保存、B 協助雇主選配勞工從事適當工作、D 工作相關傷病的預防、健康諮詢與急救等處置。故本題選最不適當者為 C。就醫取藥是醫療行為，非職場臨場服務的事項。","options":{"A":"勞工體格檢查結果的分析評估、管理保存，是其事項。","B":"協助雇主選配勞工從事適當工作，是其事項。","C":"正確(本題選最不適當者)。就醫取藥是醫療行為，非職場臨場服務的事項。","D":"工作相關傷病的預防、健康諮詢與急救，是其事項。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"114170-N5-37":{"quick":"細菌性食物中毒的敘述「最適當」者＝肉毒桿菌毒素屬於神經毒素，死亡率高。","detail":{"background":"細菌性食物中毒的敘述，最適當的是(B)『「「肉毒桿菌」毒素屬於「「「神經毒素」」，「死亡率高」(肉毒桿菌素阻斷神經傳導，造成「肌肉麻痺、呼吸衰竭」，致死率高)』。其他錯誤:A『金黃色葡萄球菌感染主要症狀為「發燒、頭痛」』錯誤(主要是「「噁心、嘔吐、腹瀉(腸胃症狀)」」，「「不發燒」」);C『大腸桿菌最常見感染食物為「海產魚貝類」』錯誤(海產魚貝是「「腸炎弧菌」」;大腸桿菌多由「糞便污染」的食物/水);D『沙門氏菌潛伏期為「1~3小時」』錯誤(沙門氏菌潛伏期約「「6~72小時」」;「1~6小時」是金黃色葡萄球菌)。故 B 正確。肉毒桿菌毒素是神經毒素、死亡率高。","options":{"A":"金黃色葡萄球菌主要是嘔吐腹瀉(腸胃症狀)、不發燒，非發燒頭痛。","B":"正確。肉毒桿菌毒素屬神經毒素，死亡率高。","C":"海產魚貝最常見腸炎弧菌，非大腸桿菌。","D":"沙門氏菌潛伏期約6~72小時，非1~3小時。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"114170-N5-38":{"quick":"自來水消毒時氯與水中有機物結合，會產生＝三鹵甲烷。","detail":{"background":"自來水消毒過程中，「「氯」與水中「有機物」結合」，會產生(A)『「「三鹵甲烷(trihalomethanes, THMs;「氯」與水中「「有機物(腐植質)」」反應的「「消毒副產物」」，「具「致癌性(膀胱癌等)」」)』。硝酸鹽、硫酸鹽、氯鹽非「氯與有機物」反應的產物。故 A 正確。氯與有機物結合產生三鹵甲烷(消毒副產物，具致癌性)。","options":{"A":"正確。氯與水中有機物結合產生三鹵甲烷(致癌性消毒副產物)。","B":"硝酸鹽非氯消毒的副產物。","C":"硫酸鹽非氯消毒的副產物。","D":"氯鹽非「氯與有機物」反應的有害產物。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"114170-N5-39":{"quick":"造成溫室效應的氣體「最不適當」者＝一氧化碳(CO)。","detail":{"background":"造成溫室效應的氣體，「最不適當」者為(A)『「「一氧化碳(CO)」』——「「一氧化碳(CO)」「「「不是「主要的「溫室氣體」」」(CO 是「空氣污染物」，與血紅素結合造成缺氧)。其他是溫室氣體:B 二氧化碳(CO₂，最主要)、C 氧化亞氮(N₂O)、D 甲烷(CH₄)。故本題選最不適當者為 A。一氧化碳(CO)非主要溫室氣體(CO₂、CH₄、N₂O 才是)。","options":{"A":"正確(本題選最不適當者)。一氧化碳(CO)非主要溫室氣體。","B":"二氧化碳(CO₂)是最主要的溫室氣體。","C":"氧化亞氮(N₂O)是溫室氣體。","D":"甲烷(CH₄)是溫室氣體。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生"]}},"114170-N5-44":{"quick":"IARC 列為與肺癌有關的致癌物＝石綿②、砷③、煤焦油④。","detail":{"background":"國際癌症研究組織(IARC)列為「與「肺癌」有關」的致癌物:(2)「石綿(asbestos;致肺癌、間皮瘤)」;(3)「砷(arsenic;致肺癌、皮膚癌)」;(4)「煤焦油(coal tar;含多環芳香烴，致肺癌、皮膚癌)」。而(1)『對羥基苯甲酸酯(parabens，防腐劑)』、(5)『二氧化碳(CO₂)』非 IARC 認定的「肺癌致癌物」。故正確為②③④(選 D)。肺癌職業致癌物:石綿、砷、煤焦油、鎘、鉻、矽塵、氡等。","options":{"A":"123：含①(parabens，非肺癌致癌物)。","B":"124：含①⑤，皆非。","C":"125：含①⑤(CO₂)，皆非。","D":"正確。石綿②、砷③、煤焦油④，是 IARC 認定的肺癌致癌物。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"114170-N5-45":{"quick":"學校護理師對學童健康問題應「最優先」提供預防及矯治者＝脊椎彎曲。","detail":{"background":"依學校衛生法，學校護理師對學童健康問題，應「最優先」提供「「預防及「矯治」」」者為(D)『「「脊椎彎曲」(屬學童「「常見的「體格缺點」」」，可透過「「早期發現、姿勢矯正、追蹤」」「「預防與「矯治」」」)』。血友病(A)、癲癇(B)、罕見疾病(C)屬「「特定「疾病」」」(須「醫療照護/個案管理」，非「體格缺點的「矯治」」)。故 D 正確。脊椎彎曲(常見體格缺點)是學校預防矯治的優先項目。","options":{"A":"血友病是特定疾病，須醫療照護，非體格缺點矯治。","B":"癲癇是特定疾病，須醫療管理。","C":"罕見疾病是特定疾病，須醫療照護。","D":"正確。脊椎彎曲(常見體格缺點)，是學校預防矯治的優先項目。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}},"115030-N5-37":{"quick":"沙門氏桿菌的敘述「最不適當」者＝潛伏期平均為48~96小時。","detail":{"background":"沙門氏桿菌的敘述，「最不適當」者為(B)『「潛伏期「平均為「48~96小時」」』——錯誤，沙門氏菌的潛伏期一般是「「6~72小時(多在「「12~36小時」」)」」，「「不是「48~96小時」」。其他正確:A 避免食用未經煮熟的蛋類製品(沙門氏菌常存於蛋禽)、C 感染症狀為噁心、嘔吐、腹痛及發燒等、D 治療以補充水分及電解質為主(支持性療法)。故本題選最不適當者為 B。沙門氏菌潛伏期約6~72小時，非48~96小時。","options":{"A":"避免食用未煮熟的蛋類製品，正確。","B":"正確(本題選最不適當者)。沙門氏菌潛伏期約6~72小時，非48~96小時。","C":"感染症狀為噁心、嘔吐、腹痛及發燒，正確。","D":"治療以補充水分及電解質為主，正確。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"115030-N5-38":{"quick":"室內空氣品質的指標(本題送分)。","detail":{"background":"本題詢問室內空氣品質的指標——經評定為「送分(各選項均給分)」。理解重點:室內空氣品質指標包含「「二氧化碳(CO₂)、一氧化碳(CO)、甲醛、總揮發性有機物、「細菌數」、「懸浮微粒(PM10/PM2.5)」、臭氧、「塵埃」」」等;A 塵埃、B 二氧化碳、C 細菌數、D 懸浮微粒「皆「可」視為室內空氣品質的「相關指標」」，故本題送分。本題送分。","options":{"A":"本題送分(各選項均可視為相關指標)。","B":"本題送分。","C":"本題送分。","D":"本題送分。"},"sources":["社區衛生護理學(新文京/華杏)·環境衛生","送分題"]}},"115030-N5-39":{"quick":"疑似食物中毒事件的通報期限＝24小時。","detail":{"background":"依食品安全衛生管理法，「疑似食物中毒」事件，醫療機構/相關人員應於(A)『「「「24小時」」內」通報「衛生主管機關」(及早「調查、防止擴大」)』。故 A 正確。疑似食物中毒應於24小時內通報衛生機關(與前述同類題一致)。","options":{"A":"正確。疑似食物中毒事件應於24小時內通報。","B":"36小時超過規定期限。","C":"48小時超過規定期限。","D":"72小時超過規定期限。"},"sources":["社區衛生護理學(新文京/華杏)·食品衛生"]}},"115030-N5-44":{"quick":"對懷孕女性勞工母性健康保護的措施「最不適當」者＝加強工作效率。","detail":{"background":"護理師對「懷孕的女性勞工」的母性健康保護措施，「最不適當」者為(C)『「「加強「工作效率」」』——錯誤，「母性健康保護的目的是「「保護「孕婦與胎兒的「健康與安全」」」，應「「「減輕「負荷、調整工作」」」，「「「不是「「加強(加重)」工作效率」」」。其他適當:A 評估用藥情形(避免危害胎兒的藥物)、B 評估職業暴露(避免有害物質/作業)、D 適時調整配工(改派較安全的工作)。故本題選最不適當者為 C。母性保護應減輕負荷、調整工作，非加強工作效率。","options":{"A":"評估用藥情形(避免危害胎兒)，適當。","B":"評估職業暴露(避免有害作業)，適當。","C":"正確(本題選最不適當者)。母性保護應減輕負荷，非加強工作效率。","D":"適時調整配工(改派安全工作)，適當。"},"sources":["社區衛生護理學(新文京/華杏)·職業衛生"]}},"115030-N5-45":{"quick":"學校健康環境的敘述「最適當」者＝教室的窗戶至少應占建坪面積的5分之1。","detail":{"background":"依學校衛生法及設施設備基準，學校健康環境，最適當的是(B)『「教室的「窗戶(採光面積)」至少應占「建坪面積的「「5分之1(1/5)」」」以上(確保「採光、通風」)』。其他錯誤:A『教室噪音應控制在「80分貝」以下』錯誤(教室噪音應控制在「「較低(如「60分貝」以下)」」);C『桌面照度不低於「400 Lux」』數值不符(桌面照度應「「≥350 Lux(米燭光)」」);D『黑板照度不低於「650 Lux」』數值偏高(黑板照度約「「≥500 Lux」」)。故 B 正確。教室窗戶(採光)至少占建坪面積1/5以上。","options":{"A":"教室噪音應控制在較低(約60分貝以下)，非80分貝。","B":"正確。教室的窗戶至少應占建坪面積的1/5以上。","C":"桌面照度應≥350 Lux，「400」非標準下限值。","D":"黑板照度約≥500 Lux，「650」偏高。"},"sources":["社區衛生護理學(新文京/華杏)·學校衛生"]}}},TO=["學校職業環境與食品衛生"],LEC={"學校職業環境與食品衛生":{"title":"學校職業環境與食品衛生　複習重點","html":"<p>本主題收錄民國101–115年護理師國家考試「護理（五）精神科與社區衛生護理學」中，屬於「學校職業環境與食品衛生」的歷屆考題共 143 題，並逐題提供「快速解答／背景知識／逐選項解析」三色詳解。</p><p>作答方式：點選 A／B／C／D 即時顯示對錯與正解，作答後可自行展開完整詳解;頂端計分列即時統計答對率，並可使用「錯題本」複習答錯題目。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n5_h7_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
