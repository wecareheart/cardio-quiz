多喝水","C":"靜脈腎盂攝影術檢查的病人,檢查中採俯臥姿勢","D":"經皮腎臟組織切片檢查的病人,檢查中採截石臥姿"},"img":""}],E={"101030-N3-19":{"quick":"腎病症候群=大量蛋白尿→低白蛋白→水腫，且高血脂(LDL↑)、易腎靜脈血栓→123。","detail":{"background":"腎病症候群(nephrotic syndrome)四大特徵為「大量蛋白尿(>3.5 g/天)、低白蛋白血症、全身性水腫、高血脂症」。其機轉是腎絲球基底膜通透性增加，使大量血漿白蛋白漏入尿液→血中白蛋白下降→血漿膠體滲透壓下降→水分滲出組織間隙形成全身水腫(尤以眼眶周圍、下肢明顯)。肝臟代償性增加脂蛋白合成→血膽固醇、三酸甘油酯與低密度脂蛋白(LDL)上升(高血脂，非低血脂)。同時抗凝血蛋白(如antithrombin III)隨尿流失、血液濃縮，使凝血傾向增加→易併發腎靜脈血栓與深部靜脈栓塞。本題選項1(LDL上升)、2(蛋白尿)、3(腎靜脈血栓)皆為正確特徵；4「低血脂」錯誤(應為高血脂)，故答案為123。","options":{"A":"正解。123 為腎病症候群正確表徵：LDL上升、蛋白尿、腎靜脈血栓。","B":"含「4低血脂」，與實際的高血脂相反，錯誤。","C":"含「4低血脂」，錯誤。","D":"含「4低血脂」且少了1，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"101110-N3-71":{"quick":"水腫期應「臥床休息」，增加活動量無法消水腫且增加耗氧，為錯誤處置。","detail":{"background":"腎病症候群的醫療與護理處置目標為：減少蛋白流失、控制水腫、預防併發症。①類固醇(Prednisolone)抑制免疫發炎、減少腎絲球通透性以緩解蛋白尿，是主要藥物。②利尿劑(Furosemide/Lasix)排除過多水分控制水腫，必要時搭配靜脈白蛋白提升膠體滲透壓增強利尿。③因抗凝血因子流失與血液濃縮，使用抗凝劑預防腎靜脈血栓。④水腫嚴重時應「臥床休息」並抬高水腫肢體促進回流，而非增加活動。增加活動量不僅無助消水腫，反而增加代謝與耗氧；嚴重水腫者活動還可能增加跌倒與血栓風險，故為錯誤。","options":{"A":"Prednisolone(類固醇)緩解蛋白尿是標準治療，正確。","B":"Lasix 利尿控制水腫，正確。","C":"抗凝劑預防腎靜脈血栓，因抗凝蛋白流失而需要，正確。","D":"錯誤(本題選此)。應臥床休息、抬高肢體，增加活動量無法減輕水腫且增加耗氧與風險。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"102030-N3-64":{"quick":"急性腎絲球腎炎好發於「兒童與男性」，非女性兩倍，敘述錯誤者為A。","detail":{"background":"急性腎絲球腎炎(acute glomerulonephritis, AGN)最典型為「鏈球菌感染後腎絲球腎炎」，常於A群β型溶血性鏈球菌(咽喉炎或皮膚感染)後1–3週發生。機轉是抗原-抗體免疫複合體沉積於腎絲球基底膜，活化補體引起發炎，造成腎絲球微血管受損→血尿(茶色尿)、蛋白尿、高血壓、水腫、少尿與氮血症。流行病學上好發於「兒童與青少年，且男童略多於女童」，並非女性為男性兩倍。本題問「敘述錯誤者」，A「女性發生率為男性兩倍」與事實相反，為錯誤敘述。","options":{"A":"錯誤(本題選此)。AGN好發於兒童及男性略多，非女性為男性兩倍。","B":"病理始於免疫機轉活化(免疫複合體沉積)，正確。","C":"免疫反應造成腎絲球受損，正確。","D":"與A群β型溶血性鏈球菌感染有關，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"103100-N3-61":{"quick":"腎病症候群高血脂+高凝→動脈粥狀硬化加速，心血管疾病風險增加(C)。","detail":{"background":"腎病症候群因肝臟代償合成脂蛋白增加，造成顯著「高膽固醇、高LDL、高三酸甘油酯」的續發性高血脂；長期高血脂加速動脈粥狀硬化。加上凝血傾向增加(抗凝蛋白流失、血小板活化)、常合併高血壓，使「心血管疾病」風險明顯上升，是腎病症候群重要的長期共病。糖尿病、副甲狀腺亢進、骨質疏鬆並非腎病症候群本身病理機轉直接導致的併發症(骨病變較常見於慢性腎臟病的CKD-MBD)。故答案為C心血管疾病。","options":{"A":"糖尿病是腎病變的「原因」之一，非腎病症候群造成的共病。","B":"副甲狀腺亢進屬慢性腎臟病CKD-MBD範疇，非腎病症候群直接共病。","C":"正解。高血脂+高凝狀態加速動脈硬化→心血管疾病風險增加。","D":"骨質疏鬆非腎病症候群典型共病。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"103100-N3-65":{"quick":"腎病症候群=蛋白尿、水腫、高血脂；「高血鉀」非其典型表徵，敘述錯誤者A。","detail":{"background":"腎病症候群四大典型表徵為「大量蛋白尿、低白蛋白血症、全身性水腫、高血脂」。本題問「下列何者錯誤(非典型表徵)」：高血鉀並非腎病症候群的典型表現——腎病症候群病人腎絲球過濾率多仍保留，且常用利尿劑反而可能造成低血鉀；高血鉀是「腎衰竭(少尿期)」的特徵而非單純腎病症候群。水腫、蛋白尿、高血脂三者皆為典型表徵。故答案為A高血鉀。","options":{"A":"錯誤(本題選此)。高血鉀是腎衰竭少尿期表現，非腎病症候群典型徵象。","B":"水腫為典型表徵，正確。","C":"蛋白尿(大量)為核心表徵，正確。","D":"高血脂為典型表徵，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"104030-N3-62":{"quick":"腎病症候群應「低鹽、適量(非高)蛋白」；鼓勵高蛋白會增加腎絲球負荷，錯誤者D。","detail":{"background":"腎病症候群處置：①ACEI/ARB可降低腎絲球內壓、減少蛋白尿(因擴張出球小動脈)；②利尿劑控制水腫；③每日量體重、腹圍與肢體周徑監測水腫變化與輸出入量。關於蛋白質飲食觀念已更新——過去主張高蛋白補充流失，但研究發現高蛋白會增加腎絲球高過濾、加速腎功能惡化，現多採「適量蛋白(約0.8–1.0 g/kg/天)+足夠熱量」並限鈉以控制水腫。本題病人已有「腎絲球過濾率低於正常」，更應限制蛋白以減輕腎負荷，故D「鼓勵高蛋白與低鈉」為錯誤(高蛋白部分錯)。","options":{"A":"ACEI降低腎絲球內壓、減少蛋白尿，正確。","B":"利尿劑控制水腫，正確。","C":"每日量體重、腹圍/肢體周徑監測水腫，正確。","D":"錯誤(本題選此)。GFR已下降者應限蛋白，高蛋白會加速腎功能惡化。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"104030-N3-63":{"quick":"腎絲球腎炎多為「雙側、瀰漫性」侵犯；A說只侵犯單側為錯誤。","detail":{"background":"腎絲球腎炎的本質是「免疫複合體(抗原-抗體)沉積於腎絲球基底膜，活化補體，釋出組織胺等發炎介質造成腎絲球破壞」。因為是「全身循環性的免疫反應」，沉積在兩側腎臟的所有腎絲球，故病變為「雙側、瀰漫性、對稱性」侵犯，而非單側或兩側病程不一致。本題問「敘述錯誤者」，A「通常只侵犯單側，即使雙側病程也不一致」與實際的雙側瀰漫對稱侵犯相反，為錯誤。B、C、D描述的免疫複合體沉積與補體活化機轉皆正確。","options":{"A":"錯誤(本題選此)。腎絲球腎炎為雙側瀰漫對稱侵犯，非單側或病程不一致。","B":"免疫球蛋白與補體沉積於基底膜，正確。","C":"補體活化釋出組織胺等造成腎絲球破壞，正確。","D":"抗原-抗體免疫複合體沉積引發炎症，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"104100-N3-64":{"quick":"慢性腎絲球腎炎應「限鉀」(腎功能差易高血鉀)，故B高鉀飲食不恰當。","detail":{"background":"慢性腎絲球腎炎病人腎功能逐漸下降，居家護理重點：①持續追蹤並控制高血壓(高血壓會加速腎損傷)；②少量多餐攝取足夠熱量避免組織分解產生含氮廢物；③充分休息、避免感染(感染會誘發病情惡化)；④飲食採「高醣(足熱量)、限鈉(控水腫高血壓)、限水」，並須「限鉀、限磷、適量低蛋白」——因腎功能下降排鉀能力差，高鉀飲食會造成高血鉀致命心律不整。本題B寫「高鉀飲食」不恰當(應限鉀)，故為答案。","options":{"A":"持續追蹤控制高血壓，正確。","B":"不恰當(本題選此)。腎功能下降排鉀差，應「限鉀」而非高鉀。","C":"少量多餐足夠熱量，正確。","D":"充分休息、避免感染，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"105030-N3-62":{"quick":"AGN=免疫複合體沉積於腎絲球微血管引起發炎(B)。","detail":{"background":"急性腎絲球腎炎的免疫機轉：抗原(常為鏈球菌抗原)與抗體形成「免疫複合體」，循環沉積於腎絲球微血管內皮/基底膜，活化補體系統(C3、C4消耗下降)，引發發炎細胞浸潤與發炎介質釋放，造成腎絲球微血管發炎、通透性改變與過濾面積減少→血尿、蛋白尿、少尿、高血壓、水腫。它「不是」細菌直接感染腎臟(與腎盂腎炎不同)，也非大腸桿菌感染，更非腎絲球自身分泌蛋白分解酶。故正確敘述為B免疫補體沉積於腎絲球微血管導致炎症。","options":{"A":"AGN非腎小管被細菌阻斷，敘述錯誤。","B":"正解。免疫複合體沉積於腎絲球微血管內皮、活化補體引起炎症。","C":"AGN非大腸桿菌直接感染(那是腎盂腎炎機轉)，錯誤。","D":"非腎絲球內皮分泌蛋白分解酶，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"105030-N3-65":{"quick":"GFR=尿肌酸酐×尿量÷血肌酸酐÷1440≈52 c.c./分(B)。","detail":{"background":"腎絲球過濾率以肌酸酐廓清率(CCr)估算，公式CCr=(尿肌酸酐濃度×每分鐘尿量)÷血漿肌酸酐濃度。先換算每分鐘尿量：24小時尿量1500 c.c.÷1440分=1.04 c.c./分。代入：CCr=(40 mg/dL×1.04 c.c./分)÷0.8 mg/dL=(41.6)÷0.8≈52 c.c./分。注意題幹中的「尿素氮168」是干擾數據，CCr計算只用肌酸酐。慢性腎絲球腎炎病人此CCr約52明顯低於正常(男性約90–120)，反映腎功能受損。故答案B 52 c.c./分鐘。","options":{"A":"21偏低，計算結果不符。","B":"正解。(40×1.04)÷0.8≈52 c.c./分。","C":"120為正常值，本病人已受損不符。","D":"218過高，計算錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"105090-N3-57":{"quick":"AGN腎絲球受損→GFR「下降」非上升，敘述錯誤者D。","detail":{"background":"急性腎絲球腎炎為鏈球菌感染後或自體免疫反應引起的免疫性疾病，免疫複合體沉積活化補體破壞腎絲球微血管，使「過濾面積與通透性受損」→腎絲球過濾率(GFR)下降，臨床出現少尿、血尿(茶色尿)、蛋白尿、水腫與高血壓、血中BUN/Cr上升。本題問「錯誤者」：D「GFR會上升」與實際的GFR下降相反，為錯誤。A(鏈球菌感染後)、B(可為自體免疫)、C(蛋白尿血尿)皆正確。","options":{"A":"常發生於A群β型溶血性鏈球菌感染後，正確。","B":"部分為自體免疫反應引起，正確。","C":"會出現蛋白尿、血尿，正確。","D":"錯誤(本題選此)。腎絲球受損使GFR下降，非上升。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"106030-N3-63":{"quick":"咽喉炎後血尿+RBC/WBC/蛋白/圓柱體+BUN-Cr上升=鏈球菌後腎絲球腎炎(C)。","detail":{"background":"本案例為典型「鏈球菌感染後急性腎絲球腎炎(PSGN)」：①前驅有上呼吸道(喉頭)感染發燒病史，約1–3週後②出現血尿(茶色)，尿檢有RBC、WBC、蛋白質與「紅血球圓柱體(RBC cast)」——圓柱體源自腎絲球/腎小管，是腎實質(腎絲球)疾病的標誌；③血中BUN與肌酸酐上升代表GFR下降。膀胱炎僅下泌尿道感染、不會有圓柱體與氮血症；BPH為阻塞性排尿障礙；腎病症候群以大量蛋白尿/低白蛋白/水腫為主、血尿較少且無前驅鏈球菌史。故最可能診斷為腎絲球腎炎(C)。","options":{"A":"膀胱炎為下泌尿道感染，不會出現圓柱體與BUN/Cr上升。","B":"BPH為阻塞性排尿障礙，與此免疫性血尿不符。","C":"正解。前驅咽喉感染+血尿+圓柱體+氮血症=鏈球菌後腎絲球腎炎。","D":"腎病症候群以大量蛋白尿/水腫為主，無前驅鏈球菌史與明顯血尿圓柱體。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"106030-N3-64":{"quick":"確診腎絲球腎炎、早期診斷最準確的是「腎臟切片」(D)。","detail":{"background":"慢性腎絲球腎炎的「確定診斷與早期病理分類」需靠「腎臟活體組織切片(renal biopsy)」，可直接觀察腎絲球的免疫複合體沉積型態(光學顯微鏡、免疫螢光、電子顯微鏡)，明確分型並指導治療與預後評估。IVP是顯影劑造影看泌尿道結構，PSP(酚紅試驗)評估腎小管分泌功能、CCr評估整體腎絲球過濾功能——這些是「功能性」檢查，無法早期看到腎絲球的病理變化。故早期診斷最有價值者為D腎臟切片。","options":{"A":"IVP看泌尿道結構，無法診斷腎絲球病理。","B":"PSP評估腎小管功能，非腎絲球病理早期診斷工具。","C":"CCr反映整體過濾功能下降，但不能定病理分型。","D":"正解。腎臟切片可直接看腎絲球病理、做免疫螢光分型，是早期確診依據。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"107030-N3-64":{"quick":"AGN補體C3、C4會「下降(消耗)」非上升，敘述錯誤者C。","detail":{"background":"急性腎絲球腎炎抗原-抗體免疫複合體沉積後「活化補體系統」，補體被大量消耗，故抽血會見「C3、C4補體值下降」(低補體血症是PSGN的重要實驗室指標，數週後逐漸恢復)。治療上PSGN多為自限性，以支持療法(限鈉限水、控血壓、利尿)為主；若仍有鏈球菌感染灶可給一個療程抗生素清除，但「不需要長期Penicillin治療」。本題問「錯誤者」：C「C3、C4會上升」與實際的補體下降相反，為錯誤；D「需長期Penicillin」也不正確，但題目單選且C更直接違背補體機轉，標準答案為C。","options":{"A":"常由β型溶血性鏈球菌感染引起，正確。","B":"是抗原抗體反應造成的免疫性疾病，正確。","C":"錯誤(本題選此)。補體被活化消耗，C3、C4應「下降」非上升。","D":"PSGN不需長期Penicillin，此敘述亦不妥，但題目以C為最直接錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"107110-N3-62":{"quick":"AGN衛教重點=喉嚨痛/皮膚感染要「早期治療」以清除鏈球菌(A)。","detail":{"background":"急性腎絲球腎炎多為鏈球菌感染後免疫反應，護理指導核心是「及早處理鏈球菌感染源」：出現喉嚨痛(咽炎)或皮膚膿痂感染時應儘早就醫並完成抗生素療程，以清除鏈球菌、減少免疫複合體再形成。但「不需」一有上呼吸道感染就自行服抗生素，也不需「長期預防性抗生素」(與風濕熱不同，PSGN不需長期預防)。AGN侵犯腎絲球而非呼吸道黏膜。故正確指導為A。","options":{"A":"正解。喉嚨痛或皮膚感染應早期治療，清除鏈球菌降低復發風險。","B":"非一有上呼吸道感染就須服抗生素，須由醫師評估。","C":"AGN不需長期預防性抗生素(與風濕熱不同)。","D":"AGN侵犯腎絲球非呼吸道黏膜，不會直接造成呼吸衰竭。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"108020-N3-64":{"quick":"腎病症候群非腎衰竭，不需限鉀；應「低鈉、適量蛋白」，A錯誤。","detail":{"background":"腎病症候群處置：類固醇(Prednisolone)緩解蛋白尿、利尿劑(Furosemide)控制水腫、抗凝劑預防腎靜脈血栓皆正確。飲食上以「低鈉(控水腫)、適量蛋白、足夠熱量」為原則。本題問「錯誤者」：A「低鈉、低鉀、低蛋白」——腎病症候群腎絲球過濾率多仍保留、無高血鉀問題，反而用利尿劑易低血鉀，故「低鉀飲食」不適當；且過度低蛋白也非絕對。相對其他選項皆正確，A為錯誤處置。","options":{"A":"錯誤(本題選此)。腎病症候群無高血鉀問題、不需低鉀；利尿劑反易致低血鉀。","B":"Prednisolone緩解蛋白尿，正確。","C":"Furosemide控制水腫，正確。","D":"抗凝劑預防腎靜脈血栓，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"108020-N3-65":{"quick":"AGN急性期=臥床休息+高醣低蛋白+預防感染→23。","detail":{"background":"急性腎絲球腎炎急性期護理：①應「臥床休息」減少腎血流負荷與耗氧，而非多下床活動(1錯)；②飲食採「高碳水化合物(足熱量避免組織分解)、低蛋白(減少含氮廢物)」(2對)；③積極「預防感染」(避免再次鏈球菌或其他感染誘發惡化)(3對)；④急性期常有少尿、水腫與高血壓，應「限制水分」而非鼓勵多喝水(4錯)。故正確組合為2、3，答案C(23)。","options":{"A":"含1(多下床活動)錯誤。","B":"含1、4皆錯誤。","C":"正解。2高醣低蛋白+3預防感染為急性期正確護理。","D":"含4(鼓勵多喝水)錯誤，急性期應限水。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"109110-N3-62":{"quick":"腎病水腫機轉=腎絲球通透性↑→蛋白流失→低白蛋白→膠體滲透壓↓→水腫(D)。","detail":{"background":"腎病症候群全身水腫的根本機轉：腎絲球基底膜「通透性增加」使大量白蛋白漏入尿液→血漿白蛋白下降→血漿「膠體滲透壓下降」→血管內水分無法被吸住、滲入組織間隙形成全身性水腫；血管內容量下降又續發RAAS活化、醛固酮上升造成鈉水滯留加重水腫。核心起點是「腎絲球通透性增加導致蛋白流失」(D)。A把靜力壓上升當主因、B說醛固酮減少、C單講GFR下降都不是腎病症候群水腫的主要機轉。","options":{"A":"水腫主因是膠體滲透壓下降而非靜力壓上升，錯誤。","B":"醛固酮是「增加(續發)」造成鈉水滯留，非減少，錯誤。","C":"GFR下降非腎病症候群水腫主因(GFR多仍保留)。","D":"正解。腎絲球通透性增加→蛋白流失→低白蛋白→膠體滲透壓下降→水腫。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"109110-N3-63":{"quick":"腎病症候群=蛋白尿+低白蛋白+高膽固醇+高三酸甘油酯→3467。","detail":{"background":"腎病症候群的診斷性檢查典型發現對應其四大特徵：3蛋白尿(>3.5 g/天，大量)、4血清白蛋白濃度下降(低白蛋白血症)、6血清膽固醇上升、7血清三酸甘油酯上升(高血脂)。而1血尿、2菌尿並非腎病症候群主徵(血尿較見於腎絲球腎炎、菌尿見於感染)；5血糖上升、8血清鈣上升也非典型(血鈣甚至因白蛋白下降而偏低)。故正確組合為3467(D)。","options":{"A":"1248含血尿/菌尿/血鈣上升，非典型。","B":"1568含血尿/血糖/血鈣，錯誤。","C":"2357含菌尿/血糖，錯誤。","D":"正解。3蛋白尿+4低白蛋白+6高膽固醇+7高三酸甘油酯=腎病症候群典型發現。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"110030-N3-65":{"quick":"腎病症候群嚴重水腫應「臥床休息」，鼓勵多下床活動為錯誤者A。","detail":{"background":"腎病症候群照護：B腎功能正常時可採適量蛋白與足夠熱量(現多主張適量而非過高蛋白，但腎功能正常下相對寬鬆，本題視為可接受)；C使用抗凝劑須衛教出血徵兆觀察；D每日監測輸出入量、體重及腹圍評估水腫變化。本題問「錯誤者」：A「嚴重水腫時鼓勵多下床活動以增加水分排除」——嚴重水腫期應「臥床休息、抬高肢體」促進回流並減少耗氧，活動無法排除水分反增風險，為錯誤。","options":{"A":"錯誤(本題選此)。嚴重水腫應臥床休息抬高肢體，非鼓勵多下床活動。","B":"腎功能正常時可採足夠蛋白與熱量，相對正確。","C":"抗凝劑須衛教出血徵兆，正確。","D":"每日監測輸出入量、體重、腹圍，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"110110-N3-61":{"quick":"AGN補體C3、C4「下降」，C說上升為錯誤。","detail":{"background":"急性腎絲球腎炎為抗原-抗體免疫反應疾病(A對)，免疫複合體沉積活化補體後補體被消耗→「C3、C4下降(低補體血症)」，故C「補體值會上升」錯誤。臨床會出現蛋白尿、血尿(B對)，腎絲球受損使GFR下降(D對)。本題問「錯誤者」即C。低補體血症是PSGN重要的實驗室特徵，約6–8週後補體值逐漸回升。","options":{"A":"抗原抗體免疫性疾病，正確。","B":"出現蛋白尿、血尿，正確。","C":"錯誤(本題選此)。補體被消耗，C3、C4應下降非上升。","D":"GFR下降，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"112110-N3-61":{"quick":"慢性腎絲球腎炎=BUN/Cr升高+可靠腎切片早期確診→23。","detail":{"background":"慢性腎絲球腎炎特徵：2腎功能逐漸下降→血尿素氮(BUN)與血肌酸酐異常升高(對)；3可由「經皮腎臟組織切片」做病理分型而早期確診(對)。而1肌酸酐清除率(CCr)應「下降」而非異常上升(腎功能變差過濾減少)，1錯；4慢性病程腎臟會「萎縮變小、腎皮質變薄」(纖維化)，而非腎皮質變厚、腎臟變大，4錯。故正確組合為23(C)。","options":{"A":"含1(CCr異常上升)錯誤。","B":"含1、4皆錯誤。","C":"正解。2 BUN/Cr升高 + 3腎切片早期確診。","D":"含4(腎皮質變厚變大)錯誤，慢性者腎臟萎縮變小。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"112110-N3-62":{"quick":"腎病症候群=蛋白尿+高血脂(2、3)；高白蛋白與膠體滲透壓上升皆相反，答B。","detail":{"background":"腎病症候群核心是「低白蛋白血症(非高白蛋白，1錯)、大量蛋白尿(2對)、高血脂症(3對)、血漿膠體滲透壓下降(因白蛋白流失，非上升，4錯)」。故四個敘述中正確者為2(蛋白尿)與3(高血脂症)，答案B(23)。膠體滲透壓下降正是造成全身水腫的關鍵——白蛋白漏失→血漿膠體滲透壓下降→水分滲入組織間隙。","options":{"A":"14皆與事實相反(低白蛋白、膠體滲透壓下降)。","B":"正解。2蛋白尿+3高血脂症為腎病症候群正確表徵。","C":"含1(高白蛋白)錯誤。","D":"含4(膠體滲透壓上升)錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"113030-N3-7":{"quick":"腎病症候群護理=限水限蛋白+測體重腹圍記輸出入(12)；Lactulose與本病無關。","detail":{"background":"本案例陳先生為腎病症候群，護理措施：1「限制水分與蛋白質攝取」——限水控制水腫、適量限蛋白減輕腎絲球負荷(對)；2「每天測量體重與腹圍、記錄輸出入量」——監測水腫與體液變化(對)。而3「給利尿劑後儘快補充Albumin」順序與觀念有誤(臨床多先輸白蛋白提升膠體滲透壓再給利尿劑增強利尿，且非常規措施)；4「使用Lactulose減少氨」是肝硬化/肝性腦病的處置，與腎病症候群無關。故正確為12，答案A。","options":{"A":"正解。1限水限蛋白+2測體重腹圍記輸出入量，為腎病症候群正確護理。","B":"含4(Lactulose降氨)為肝病處置，與腎病無關。","C":"含3順序觀念有誤。","D":"含3、4皆不適用於腎病症候群。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"113100-N3-41":{"quick":"腎病症候群與AGN共同點=水腫+蛋白尿(13)；高血脂屬腎病、血尿屬腎炎。","detail":{"background":"比較兩病：腎病症候群以「大量蛋白尿、低白蛋白、水腫、高血脂」為主、血尿較少；急性腎絲球腎炎以「血尿(茶色)、蛋白尿、水腫、高血壓、少尿」為主、血脂多正常。兩者「共同」會出現的臨床表徵是1水腫(皆因鈉水滯留/低白蛋白)與3蛋白尿(皆有腎絲球通透性改變)。2高血脂是腎病症候群特有；4血尿主要見於急性腎絲球腎炎。故共同表徵為13，答案A。","options":{"A":"正解。水腫(1)與蛋白尿(3)為兩病共有表徵。","B":"含4(血尿)為腎炎特徵，非共同。","C":"含2(高血脂)為腎病特徵，非共同。","D":"含2、4皆非兩者共同。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 腎絲球疾病","KDIGO 腎絲球腎炎臨床指引"]}},"102110-N3-5":{"quick":"腎性貧血主因EPO缺乏，治療用「EPO」非鐵劑葉酸刺激生成，D錯誤。","detail":{"background":"末期腎疾病(ESRD)的腎性貧血機轉：①腎臟分泌「紅血球生成素(erythropoietin, EPO)」減少，是最主要原因；②尿毒素使紅血球存活期縮短；③尿毒抑制血小板功能、凝血時間延長，易腸胃道出血加重貧血。治療「主軸」是補充人工合成EPO刺激骨髓造血，並確保鐵質充足(常需靜脈鐵劑)。鐵劑與葉酸只是「輔助原料」，本身無法在EPO缺乏下有效刺激紅血球生成。本題問「錯誤者」：D說「主要以鐵劑和葉酸刺激血液生成」與機轉不符(主軸應為EPO)，為錯誤。","options":{"A":"尿毒使紅血球存活期縮短，正確。","B":"EPO缺乏是腎性貧血主因，正確。","C":"凝血時間延長易腸胃道出血加重貧血，正確。","D":"錯誤(本題選此)。治療主軸是EPO，鐵劑葉酸僅輔助，無法在EPO缺乏下「主要」刺激造血。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"104030-N3-67":{"quick":"ACEI降血壓、保護腎，不會「導致高血壓」，敘述錯誤者D。","detail":{"background":"ACEI(血管收縮素轉化酶抑制劑)在慢性腎臟病的腎臟保護機轉：抑制Angiotensin II生成→「擴張腎絲球出球小動脈(efferent arteriole)」→降低腎絲球內壓→減少蛋白尿、延緩腎功能惡化，同時降低全身血壓。它是糖尿病腎病變與蛋白尿型CKD的首選藥物之一。副作用包括乾咳、高血鉀、血肌酸酐短暫上升、低血壓。本題問「錯誤者」：D「會導致高血壓」與ACEI的降壓作用相反，為錯誤。","options":{"A":"擴張出球小動脈降低腎絲球內壓，正確。","B":"減少腎絲球內壓→預防/減少蛋白尿，正確。","C":"延緩腎功能衰退，正確。","D":"錯誤(本題選此)。ACEI是降血壓藥，不會導致高血壓。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"105090-N3-63":{"quick":"腎性貧血治療主軸EPO；C說鐵劑葉酸可刺激造血為錯誤。","detail":{"background":"ESRD腎性貧血主因為腎臟EPO分泌不足、加上尿毒使紅血球存活期縮短。治療以補充EPO為核心，並維持足夠鐵質儲存(常用靜脈鐵劑，可改善EPO反應、減少EPO用量)。鐵劑與葉酸是造血「原料/輔助」，在EPO缺乏的情況下無法「刺激」紅血球生成。本題問「錯誤者」：C「鐵劑及葉酸可刺激血球生成」誤把輔助原料當主要刺激來源，為錯誤；D「靜脈鐵劑可減少EPO用量」則正確。","options":{"A":"紅血球存活期縮短，正確。","B":"紅血球生成素缺乏，正確。","C":"錯誤(本題選此)。鐵劑葉酸僅是原料，無法「刺激」造血，主軸是EPO。","D":"靜脈鐵劑可改善EPO反應、減少EPO用量，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"106110-N3-78":{"quick":"EPO治療目標血球比容不宜過高，「至少35%」非治療準則，A錯誤。","detail":{"background":"ESRD腎性貧血以EPO治療有其準則與安全考量：①開始前須有足夠鐵儲存——血清鐵蛋白(ferritin)>200 ng/mL、運鐵蛋白飽和度(TSAT)>20%，否則EPO反應不佳；②須無「未控制的惡性高血壓」(EPO會升血壓，血壓過高應先控制)。關於目標血色素/血球比容，現行指引主張「不宜過度矯正」，目標Hb約10–11 g/dL(Hct約30–33%)，因Hct/Hb拉太高(如≥36%或Hb>13)反增加心血管栓塞與死亡風險。本題問「錯誤者」：A「血球比容至少要達35%」把目標訂太高、與避免過度矯正原則相違，為錯誤。","options":{"A":"錯誤(本題選此)。EPO治療不宜把Hct拉太高，目標約30–33%而非「至少35%」。","B":"血清鐵蛋白>200 ng/mL確保鐵儲存，正確。","C":"運鐵蛋白飽和度>20%，正確。","D":"須無惡性高血壓(EPO會升血壓)，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"106111-N3-64":{"quick":"糖尿病腎病變微量白蛋白尿期=每日尿白蛋白30~300 mg(B)。","detail":{"background":"糖尿病腎病變依尿白蛋白排泄量分期：①正常白蛋白尿<30 mg/天；②「微量白蛋白尿(microalbuminuria)」30–300 mg/天(或30–300 mg/g肌酸酐)——這是糖尿病腎病變「最早可偵測」的階段，也是介入(嚴格血糖血壓控制、ACEI/ARB)逆轉或延緩進展的關鍵時機；③巨量白蛋白尿(macroalbuminuria/顯性蛋白尿)>300 mg/天。故微量白蛋白尿期每日尿白蛋白量為31–300 mg，答案B。早期偵測微量白蛋白尿是糖尿病照護的重要篩檢。","options":{"A":"≦30 mg屬正常白蛋白尿，非微量白蛋白尿期。","B":"正解。微量白蛋白尿=每日31~300 mg。","C":"301~500 mg已屬顯性蛋白尿範圍。","D":"≧500 mg為明顯巨量蛋白尿，非微量期。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"107030-N3-65":{"quick":"ACEI易致「高血鉀」非低血鉀，敘述錯誤者D。","detail":{"background":"ACEI抑制Angiotensin II→醛固酮下降→腎臟排鉀減少→易造成「高血鉀」(尤其在腎功能不全或併用保鉀利尿劑/ARB時更明顯)，是ACEI重要的安全監測項目。其他特性：可降低腎絲球內壓→預防/減少蛋白尿(A對)；常見乾咳副作用(緩激肽累積)(B對)；可能造成低血壓(C對)。本題問「錯誤者」：D「可能導致低血鉀」與實際的高血鉀相反，為錯誤。用ACEI時應監測血鉀與腎功能。","options":{"A":"可預防蛋白尿，正確。","B":"乾咳是常見副作用，正確。","C":"可能導致低血壓，正確。","D":"錯誤(本題選此)。ACEI使醛固酮下降→排鉀減少→致「高血鉀」非低血鉀。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"107030-N3-66":{"quick":"GFR 20→落在15~29，為CKD第四期(C)。","detail":{"background":"慢性腎臟病(CKD)依腎絲球過濾率(GFR, mL/min/1.73m²)分為五期：第1期≥90(腎損傷但GFR正常)、第2期60–89(輕度下降)、第3期30–59(中度，再分3a 45–59、3b 30–44)、第4期15–29(重度下降)、第5期<15(腎衰竭/尿毒症，需準備透析)。本題GFR=20落在15–29區間，為「第四期」，答案C。此期應開始衛教並建立透析血管通路，為進入第五期透析作準備。","options":{"A":"第二期GFR 60–89，與20不符。","B":"第三期GFR 30–59，與20不符。","C":"正解。GFR 15–29為第四期。","D":"第五期GFR<15，本題20尚未到。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"107110-N3-68":{"quick":"慢性腎衰竭是「副甲狀腺功能亢進」非低下，D非其合併症。","detail":{"background":"慢性腎衰竭(尿毒症)的典型合併症眾多：①貧血(EPO不足)；②腸胃道出血(尿毒抑制血小板)；③內分泌與性功能異常(女性月經不規則、男性性慾減退)；④「續發性副甲狀腺機能『亢進』」——腎臟無法活化維生素D與排磷→低血鈣、高血磷→刺激副甲狀腺素(PTH)大量分泌(腎性骨病變/CKD-MBD)。本題問「不包括」者：D「副甲狀腺功能低下」與實際的「亢進」相反，故非慢性腎衰竭合併症，為答案。","options":{"A":"貧血是典型合併症。","B":"胃腸出血(尿毒性血小板功能異常)是合併症。","C":"月經不規則(內分泌異常)是合併症。","D":"正解(非合併症)。應為續發性副甲狀腺機能「亢進」而非低下。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"108020-N3-80":{"quick":"GFR 15=CKD第五期將進入透析，應「介紹透析通路」(C)最適當。","detail":{"background":"GFR=15 mL/min/1.73m²屬CKD第四到第五期交界、即將進入末期腎病。此階段護理指導的「最適當且最迫切」項目是「介紹透析治療的血管通路(如動靜脈瘻管建立)」——因瘻管需提前數週至數月建立並等待成熟，才能在需要透析時順利使用。介紹腎臟疾病知識、延緩惡化措施應在更早期(第1–3期)就完成；介紹「透析合併症」則屬已開始透析後的衛教。故此期最適當為C介紹透析治療通路。","options":{"A":"延緩腎功能惡化措施應在較早期(1–3期)強調，此期已晚。","B":"腎臟疾病基本知識應更早完成，非此期重點。","C":"正解。GFR 15即將透析，須提前建立血管通路使其成熟。","D":"透析合併症衛教屬已開始透析後，非此期最優先。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"110030-N3-70":{"quick":"糖尿病腎病變是糖尿病人「最主要死因」之一，B正確。","detail":{"background":"糖尿病腎病變(diabetic nephropathy)是糖尿病常見且嚴重的微血管併發症，也是末期腎病(ESRD)第一大原因；糖尿病合併腎病變會大幅增加心血管死亡，故B「是糖尿病病人最主要死因」之一為正確敘述。其餘為錯誤觀念：A高蛋白飲食會增加腎絲球高過濾、加速惡化(應限蛋白)；C第1型與第2型糖尿病皆可發生(非只第2型)；D機轉是腎絲球基底膜「增厚」且通透性「增加」(出現蛋白尿)，而非變薄、通透性降低。故正確答案為B。","options":{"A":"高蛋白會加速腎病變惡化，應限蛋白，錯誤。","B":"正解。糖尿病腎病變是糖尿病人主要死因之一(經由ESRD與心血管)。","C":"第1、2型糖尿病皆可發生，非只第2型，錯誤。","D":"基底膜「增厚」且通透性「增加」(出蛋白尿)，與此敘述相反。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"111030-N3-61":{"quick":"Cr 13.8、eGFR 9.2(<15)=CKD第五期(D)。","detail":{"background":"本病人血清肌酸酐高達13.8 mg/dL、eGFR僅9.2 mL/min/1.73m²(<15)，已達CKD「第五期(腎衰竭/尿毒症)」。臨床表現嚴重水腫、食慾不振、無法平躺(端坐呼吸，提示體液過量/尿毒),正是末期腎病典型。第五期病人腎臟已無法維持內環境，需準備或開始腎臟替代療法(透析或腎移植)。故答案D第五期。","options":{"A":"第二期GFR 60–89，與9.2不符。","B":"第三期30–59，不符。","C":"第四期15–29，本病人9.2已低於此。","D":"正解。eGFR<15為第五期(尿毒症)。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"111030-N3-62":{"quick":"CKD第五期(eGFR 9.2)且嚴重症狀→應「開始透析或腎移植」(D)。","detail":{"background":"承上題，林小姐已是CKD第五期(eGFR 9.2)，並出現嚴重水腫、無法平躺等體液過量與尿毒症狀，腎臟替代治療的「適應症」已成立。此時最重要的處理目標是「開始透析治療或腎移植」以替代喪失的腎功能、清除尿毒素與多餘水分。延緩惡化、尿毒衛教、建立血管通路都應在更早(第3–4期)完成；到了第五期且有症狀，重點即啟動透析/移植，故答案D。","options":{"A":"延緩腎功能惡化是早期(1–3期)目標，此期已過。","B":"尿毒衛教應更早完成。","C":"血管通路建立應在第四期就先做，此時已需啟動治療。","D":"正解。第五期且有尿毒/體液過量症狀，應開始透析或腎移植。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"111030-N3-63":{"quick":"糖尿病腎病變應「限蛋白」，鼓勵高蛋白1.5~2.0g/天為錯誤者A。","detail":{"background":"糖尿病腎病變治療原則：①「限制蛋白質」攝取(約0.6–0.8 g/kg/天)以減少腎絲球高過濾、延緩腎功能惡化——鼓勵高蛋白(1.5–2.0 g/天，其實是1.5–2.0 g/kg/天)反而加速惡化，A錯誤；②嚴格血糖控制(糖化血色素<7%)；③血壓控制在130/80 mmHg以內以保護腎臟；④ACEI/ARB既降壓又減少蛋白尿、保護腎臟。本題問「錯誤」者即A鼓勵高蛋白。","options":{"A":"錯誤(本題選此)。糖尿病腎病變應「限蛋白」，鼓勵高蛋白會加速腎功能惡化。","B":"糖化血色素控制<7%，正確。","C":"血壓控制<130/80 mmHg保護腎臟，正確。","D":"ACEI降壓兼減蛋白尿保護腎臟，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"111030-N3-67":{"quick":"慢性腎衰竭是「高血磷」非低血磷，敘述錯誤者C。","detail":{"background":"慢性腎衰竭(尿毒症)典型生化變化：①「氮血症(azotemia)」BUN與肌酸酐上升(含氮廢物滯留)；②「高血脂」(脂質代謝異常)；③「高血磷」——腎臟排磷能力下降使磷滯留，續發低血鈣、副甲狀腺亢進(CKD-MBD)；④「代謝性酸中毒」——腎臟無法排氫離子與再生重碳酸鹽。本題問「錯誤者」：C「低血磷」與實際的「高血磷」相反，為錯誤。","options":{"A":"氮血症(BUN/Cr上升)是典型表現，正確。","B":"高血脂為典型表現，正確。","C":"錯誤(本題選此)。慢性腎衰竭排磷下降→「高血磷」非低血磷。","D":"代謝性酸中毒(排氫障礙)是典型表現，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"111110-N3-60":{"quick":"ACEI致「高血鉀」非低血鉀，敘述錯誤者D。","detail":{"background":"ACEI在CKD的作用：減少蛋白尿(A對)、乾咳副作用(緩激肽累積，B對)、可能低血壓(C對)。關鍵副作用是抑制醛固酮使「排鉀減少→高血鉀」，尤其腎功能差時更明顯，故D「可能導致低血鉀」錯誤(應為高血鉀)。臨床使用ACEI須定期監測血鉀與腎功能，高血鉀或肌酸酐顯著上升時需調整或停藥。本題問「錯誤者」即D。","options":{"A":"可預防蛋白尿，正確。","B":"易乾咳，正確。","C":"可能低血壓，正確。","D":"錯誤(本題選此)。ACEI致「高血鉀」非低血鉀。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"112110-N3-59":{"quick":"鐵劑「不應與制酸劑併服」(制酸劑減少鐵吸收)，C為錯誤。","detail":{"background":"多重共病腎衰竭病人用藥注意：A糖尿病腎病變因腎臟對胰島素清除下降、胰島素半衰期延長，胰島素「需減量」避免低血糖(對)；B毛地黃(Digoxin)經腎排出，腎衰竭易蓄積中毒，須注意頭痛、噁心、視覺異常、心律不整(對)；D含「鎂離子」的制酸劑/胃乳在腎衰竭會蓄積造成「高血鎂」，應避免(對)。本題問「錯誤者」：C「鐵劑合併制酸劑使用」錯誤——制酸劑會提高胃pH、降低鐵的吸收，鐵劑反而應與「維生素C/酸性環境」併服、避開制酸劑。","options":{"A":"糖尿病腎病變胰島素需減量(腎清除下降)，正確。","B":"毛地黃腎排出易蓄積中毒，須觀察，正確。","C":"錯誤(本題選此)。制酸劑降低鐵吸收，鐵劑不應與制酸劑併服。","D":"含鎂制酸劑在腎衰竭易致高血鎂，應避免，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"112180-N3-41":{"quick":"腎衰竭飲食=避免讓蛋白質當熱量燒掉→足夠熱量降腎負擔(C)。","detail":{"background":"腎衰竭飲食護理：須「限制蛋白質(且選高生物價值蛋白如蛋、奶、肉，提供必需胺基酸、減少含氮廢物)」並「給予足夠的醣類與脂肪熱量」，目的是避免身體因熱量不足而分解自身蛋白質、或讓攝入的蛋白質被當作熱量燃燒而產生含氮廢物——這會增加腎臟代謝負擔。故C「降低腎臟代謝負擔，避免蛋白質成為熱量主要來源」正確。A「高熱量低蛋白主要維持血糖」說法偏差(主要是降氮負擔非控血糖)；B應採「高」生物價值蛋白(非低)；D全靜脈營養不能只給脂肪取代蛋白。","options":{"A":"高熱量低蛋白主要目的是降氮負擔，非「維持血糖」，敘述偏差。","B":"應採「高」生物價值蛋白質提供必需胺基酸，非低生物價值。","C":"正解。足夠熱量避免蛋白被當熱量燒掉產生含氮廢物，降低腎負擔。","D":"全靜脈營養不能僅以脂肪取代蛋白，仍需均衡，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"115030-N3-37":{"quick":"GFR 17(第四期)皮膚搔癢可用calamine lotion緩解(C)。","detail":{"background":"GFR=17屬CKD第四期，尿毒素累積常造成皮膚乾燥搔癢，可用「calamine lotion(爐甘石洗劑)」與保濕劑緩解搔癢、避免抓傷感染(C正確)。其他選項為錯誤：A腎功能差排鉀能力下降，應「限鉀」而非攝取高鉀食物(高鉀會致命心律不整)；B應「限蛋白」(適量、高生物價值)而非鼓勵多攝取蛋白；D第四期常有水分滯留，不應鼓勵每日補水3000 mL(會加重水腫高血壓、體液過量)。故正確答案C。","options":{"A":"CKD第四期應「限鉀」，鼓勵高鉀食物危險，錯誤。","B":"應限蛋白(適量高生物價值)，非鼓勵多攝取蛋白。","C":"正解。尿毒搔癢可用calamine lotion並保濕緩解。","D":"第四期不應每日補水3000 mL，會加重體液過量，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 慢性腎臟病","KDIGO 2012/2024 CKD 評估與處置指引"]}},"101110-N3-19":{"quick":"AKI少尿期=BUN↑、Cr↑、K↑(2、3、4)；CCr下降、磷上升，答234。","detail":{"background":"急性腎衰竭(AKI)少尿期(oliguric phase)腎絲球過濾與排泄功能急遽下降，生化變化：2「BUN上升」、3「血肌酸酐上升」(含氮廢物滯留)、4「血鉀上升」(排鉀障礙→高血鉀，是少尿期最危險的致命併發症)。而1「CCr>90」錯誤——少尿期CCr應「下降」(過濾下降)；5「血磷下降」錯誤——腎排磷障礙使「血磷上升」。故正確組合為234，答案C。少尿期須嚴密監測高血鉀的心電圖變化。","options":{"A":"含1(CCr>90)錯誤。","B":"含1、5皆錯誤。","C":"正解。2 BUN↑+3 Cr↑+4 K↑為少尿期變化。","D":"含5(血磷下降)錯誤，應為高血磷。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"101110-N3-20":{"quick":"少尿期高血鉀+少尿=給Kayexalate降鉀+限水400 c.c./天，答C(24)。","detail":{"background":"蔡先生少尿期、血鉀6.8 mEq/L(高血鉀)、尿量290 c.c./天(少尿)。處置：2「給Kayexalate(陽離子交換樹脂)」由腸道排鉀降低血鉀(對)；4「限制液體」——少尿期液體攝入應限制，常以「前一日尿量+不顯性流失約400–500 c.c.」估算，故限制在約400 c.c./天合理(對)。而1「給Furosemide利尿」在已建立的少尿/無尿期(尤其急性腎小管壞死)效果有限且非首選降鉀法；3飲食應「高熱量、低蛋白、低鈉、低鉀」而非「低醣」(需足夠醣類熱量避免分解蛋白)。故正確為24，答案C。","options":{"A":"含1(Lasix利尿)在少尿期效果有限，非首選。","B":"含3(低醣)錯誤，應高熱量足醣。","C":"正解。2 Kayexalate降鉀+4限水約400 c.c./天。","D":"含3(低醣)錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"102030-N3-63":{"quick":"腎絲球腎炎屬「腎因性(intrarenal)」非腎前性，A為錯誤。","detail":{"background":"急性腎衰竭依病因部位分三類：①「腎前性(prerenal)」——腎血流灌注不足，如心輸出量減少、循環血液容積降低(脫水、出血、休克)、腎血管阻塞，此時腎實質本身正常；②「腎因性/腎性(intrarenal)」——腎實質本身病變，如急性腎小管壞死、急性腎絲球腎炎、急性間質性腎炎；③「腎後性(postrenal)」——尿路阻塞,如結石、前列腺肥大。本題問腎前性「導因」中的錯誤者：A「腎絲球腎炎」屬腎因性而非腎前性，為錯誤。B心輸出量減少、C循環血量降低、D血管阻塞皆屬腎前性。","options":{"A":"錯誤(本題選此)。腎絲球腎炎屬腎因性(腎實質病變)，非腎前性。","B":"心輸出量減少→腎灌注不足，屬腎前性。","C":"循環血液容積降低→腎前性。","D":"腎血管阻塞→腎灌注下降，屬腎前性。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"103030-N3-66":{"quick":"腎前性=心輸出量降低+循環血量耗竭(1、2)，答A。","detail":{"background":"腎前性急性腎衰竭由「腎血流灌注不足」引起，常見原因：1心輸出量降低(心衰竭、心因性休克)、2循環血液容積耗竭(出血、脫水、嚴重燒傷、敗血性休克)。而3前列腺肥大屬「腎後性(尿路阻塞)」；4腎絲球腎炎與5紅斑性狼瘡(狼瘡性腎炎)屬「腎因性(腎實質病變)」。故腎前性原因為1、2，答案A。腎前性若及早矯正灌注可逆轉，延誤則進展為急性腎小管壞死(腎因性)。","options":{"A":"正解。1心輸出量降低+2循環血量耗竭=腎前性。","B":"含3(前列腺肥大=腎後性)錯誤。","C":"含3、4分屬腎後/腎因性。","D":"含4、5(SLE)皆屬腎因性。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"104100-N3-66":{"quick":"腎前性BUN/Cr>20:1，腎性<10~15:1→13正確，答A。","detail":{"background":"BUN/Creatinine比值可幫助區分腎前性與腎性AKI：①「腎前性」時腎小管對水鈉與尿素的再吸收增加(腎血流不足、ADH/醛固酮活化)，尿素被多吸收回血中→「BUN相對升得比Cr多」，比值「>20(甚至40):1」；②「腎性(腎實質病變如ATN)」時腎小管功能受損、再吸收能力喪失，BUN與Cr等比例上升→比值回到正常的「10–15:1左右(或<20)」。故正確為「1腎前性>20–40:1」與「4腎性<10–15:1」？本題標準答案為A(13)，即1(腎前性>20–40:1)與3(腎性>20–40:1)——須注意此題以官方答案A為準，重點記憶為「腎前性BUN/Cr比值升高(>20:1)」是關鍵鑑別點。","options":{"A":"正解(依官方答案)。核心觀念：腎前性BUN/Cr比值明顯升高(>20:1)。","B":"14組合與官方答案不符。","C":"23組合與官方答案不符。","D":"24組合與官方答案不符。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"105090-N3-64":{"quick":"紅斑性狼瘡(狼瘡腎炎)屬「腎因性」非腎前因素，D錯誤。","detail":{"background":"腎前性AKI由腎血流灌注不足造成：A嚴重燒傷(大量體液流失、血容積下降)、B心肌梗塞(心輸出量驟降)、C敗血性休克(血管擴張、有效循環血量不足)皆會減少腎灌注，屬腎前因素。D「紅斑性狼瘡」造成的狼瘡性腎炎是「腎絲球本身的免疫發炎病變」，屬「腎因性(腎實質病變)」而非腎前性。本題問「錯誤者(非腎前因素)」即D。","options":{"A":"嚴重燒傷致血容積下降→腎前性。","B":"心肌梗塞致心輸出量降→腎前性。","C":"敗血性休克→有效循環血量不足→腎前性。","D":"錯誤(本題選此)。SLE狼瘡腎炎屬腎因性(腎實質)，非腎前因素。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"106110-N3-63":{"quick":"腎前性尿鈉「降低(<20)」，B說尿鈉>40為錯誤。","detail":{"background":"腎前性AKI時腎小管功能完好，為了保留水鈉，腎臟「努力再吸收鈉」→尿鈉「降低(<20 mEq/L)」、尿滲透壓「升高(>500 mOsm/L)」、尿比重升高(>1.015)、FENa<1%；同時尿素再吸收增加使BUN/Cr>20:1。本題問「錯誤者」：B「尿鈉>40 mEq/L」與腎前性的低尿鈉相反(尿鈉>40反而是『腎性ATN』的指標)，為錯誤。A(BUN/Cr>20:1)、C(尿比重>1.015)、D(尿滲透壓>500)皆為腎前性正確表現。","options":{"A":"BUN/Cr>20:1，腎前性正確。","B":"錯誤(本題選此)。腎前性尿鈉應「降低(<20)」，>40是腎性ATN指標。","C":"尿比重>1.015(濃縮尿)，腎前性正確。","D":"尿滲透壓>500 mOsm/L(濃縮尿)，腎前性正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"106111-N3-66":{"quick":"急性間質性腎炎多為「可逆」，停藥後常恢復，C說必須長期透析為錯誤。","detail":{"background":"急性間質性腎炎(acute interstitial nephritis, AIN)常因「藥物過敏」(抗生素如β-lactam、NSAID、利尿劑等)引起腎間質的過敏發炎反應，臨床可出現急性腎衰竭、發燒、皮疹、嗜伊紅球增多。處置關鍵是「停用致敏藥物」，多數病人腎功能可逐漸恢復正常，必要時短期類固醇加速恢復；嚴重時可能「暫時」需透析支持，但「並非必須長期透析」。本題問「錯誤者」：C「必須長期接受透析治療」過度且與AIN多可逆的特性相違，為錯誤。","options":{"A":"常因藥物(如抗生素)過敏發生，正確。","B":"可能出現急性腎衰竭，正確。","C":"錯誤(本題選此)。AIN多可逆，停藥後常恢復，非必須長期透析。","D":"停用致敏藥物後腎功能常可恢復正常，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"106111-N3-71":{"quick":"AIN致AKI若無高血鉀/少尿不需嚴格限水<2000；應監測高血鉀避香蕉乾果，B錯誤。","detail":{"background":"承上題急性間質性腎炎導致急性腎衰竭，護理：A監測生命徵象、輸出入量、電解質(對)；C測心尖脈注意節律(因高血鉀可致心律不整，對)；D指導避免攝取「香蕉、乾果」等高鉀食物以防高血鉀(對)。本題問「錯誤者」：B「執行限水每天少於2000 c.c.」——限水量應「依尿量與體液狀態個別評估(常以前日尿量+不顯性流失估算)」，AIN若腎功能逐漸恢復或尿量足夠時不需一律限水<2000，這種一刀切的限水計畫不恰當，為錯誤。","options":{"A":"監測生命徵象、輸出入量、電解質，正確。","B":"錯誤(本題選此)。限水量應依尿量與體液狀態個別評估，非一律<2000 c.c.。","C":"測心尖脈注意節律(防高血鉀心律不整)，正確。","D":"避免香蕉、乾果等高鉀食物，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"108020-N3-59":{"quick":"腦下垂體後葉受損→ADH缺乏→尿崩症「多尿」非少尿，答C。","detail":{"background":"少尿(oliguria，<400 c.c./天)的原因：A休克(腎前性灌注不足)、B急性腎衰竭(腎實質)、D腎後性阻塞皆會造成尿量減少。而C「腦下垂體後葉受損」會使抗利尿激素(ADH/vasopressin)分泌不足→「中樞性尿崩症」→腎臟無法濃縮尿液→「大量稀釋尿(多尿)、多渴」，是「多尿」而非少尿。本題問「不會出現少尿」者即C。","options":{"A":"休克致腎前性灌注不足→少尿。","B":"急性腎衰竭→少尿。","C":"正解(不會少尿)。腦下垂體後葉受損→ADH不足→尿崩症「多尿」。","D":"腎後性阻塞→尿排出受阻→少尿。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"108110-N3-64":{"quick":"AKI少尿期是「高血磷」非低血磷，不包括者D。","detail":{"background":"蔡先生AKI少尿期生化變化：A血肌酸酐上升、B BUN上升(含氮廢物滯留)、C血鉀上升(排鉀障礙→高血鉀)。而「血磷」在少尿期因排磷障礙會「上升(高血磷)」而非下降。本題問「不包括(不會出現)」者：D「血磷下降」與實際的高血磷相反，故為答案。少尿期須監測高血鉀、高血磷、代謝性酸中毒與體液過量。","options":{"A":"血肌酸酐上升，少尿期會出現。","B":"BUN上升，會出現。","C":"血鉀上升(高血鉀)，會出現。","D":"正解(不包括)。少尿期排磷障礙→「高血磷」，非血磷下降。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"108110-N3-65":{"quick":"少尿期高血鉀+少尿→限水、Kayexalate、高熱量低蛋白；Lasix利尿無效，B錯誤。","detail":{"background":"蔡先生少尿期、血鉀6.8(高)、尿量360 c.c./天(少尿)。正確處置：A限制液體攝入(嘔吐150+尿量360+不顯性流失，估算約510 c.c./天合理)；C給Kayexalate降血鉀；D高熱量、低蛋白、低鹽飲食(足熱量避免組織分解、低蛋白減氮廢物、低鹽控水腫高血壓)。本題問「錯誤者」：B「給Furosemide(Lasix)引發利尿」——在已確立的少尿期(尤其急性腎小管壞死)，利尿劑效果有限且非降鉀的有效方法，為錯誤處置。","options":{"A":"液體限制約510 c.c./天(嘔吐+尿量+不顯性流失)，正確。","B":"錯誤(本題選此)。少尿期Lasix利尿效果有限，非有效處置。","C":"給Kayexalate降血鉀，正確。","D":"高熱量、低蛋白、低鹽飲食，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"109030-N3-56":{"quick":"AKI少尿期應「限鈉、限磷、限蛋白、限鉀」+足夠熱量，正解B。","detail":{"background":"急性腎衰竭少尿期飲食護理：因腎臟排泄功能下降，須「限制高鈉、高磷食物」(控制水腫高血壓與高血磷)、限鉀(防高血鉀)、限蛋白(減少含氮廢物)，並給予「足夠的高醣高脂熱量」避免組織分解產生更多含氮廢物。故B「應限制高鈉高磷之食物」正確。A低熱量飲食錯誤(應足熱量)；C高蛋白飲食錯誤(應低蛋白);D高鉀飲食錯誤(應限鉀防高血鉀)。","options":{"A":"應給足夠熱量(非低熱量)避免組織分解，錯誤。","B":"正解。少尿期限制高鈉、高磷食物。","C":"應低蛋白(非高蛋白)減少含氮廢物，錯誤。","D":"應限鉀(非高鉀)防致命高血鉀，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"112030-N3-66":{"quick":"AKI少尿型=24小時尿量<400 c.c.(約350)，B正確。","detail":{"background":"吳先生85歲、全身水腫、呼吸喘、診斷AKI。正確敘述B「24小時尿量約350 c.c.為少尿型腎衰竭」——少尿定義為<400 c.c./天(或<0.5 mL/kg/hr)，350符合。其他為錯誤：A急性腎衰竭超音波腎臟大小「正常或腫大」，「變小」是慢性腎臟病的表現；C高血鉀心電圖典型為「T波高尖(peaked T)」而非「低而寬」；D前列腺肥大造成的是「腎後性」阻塞性腎衰竭，非「腎性」。故正確答案B。","options":{"A":"AKI腎臟大小正常或腫大，「變小」是慢性腎病表現，錯誤。","B":"正解。24小時尿量約350 c.c.<400=少尿型腎衰竭。","C":"高血鉀心電圖為「T波高尖」非低而寬，錯誤。","D":"前列腺肥大致「腎後性」非「腎性」腎衰竭，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"114030-N3-39":{"quick":"AKI少尿期=24小時尿量約300 c.c.(<400)，C正確。","detail":{"background":"陳先生88歲、全身水腫、呼吸喘、診斷AKI。正確敘述C「24小時尿量約300 c.c.，正處於腎衰竭少尿期」(少尿<400 c.c./天)。其他錯誤：A血鉀7.5(高血鉀)心電圖應為「T波高尖」而非「低而寬長」；B前列腺肥大造成的是「腎後性」阻塞性腎衰竭，非「腎性」；D急性腎衰竭超音波腎臟大小應「正常或腫大」，「7.5 cm(縮小)」是慢性腎病表現。故正確答案C。","options":{"A":"高血鉀心電圖應「T波高尖」，非低而寬長，錯誤。","B":"前列腺肥大致「腎後性」而非腎性腎衰竭，錯誤。","C":"正解。24小時尿量約300 c.c.<400=少尿期。","D":"AKI腎臟大小正常或腫大，7.5 cm縮小是慢性腎病，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 急性腎損傷","KDIGO 2012 AKI 臨床指引"]}},"101030-N3-14":{"quick":"透析指標是Cr「升高」(>10)，B寫Cr<5反而是腎功能尚可，錯誤。","detail":{"background":"末期腎病開始透析(腎臟替代治療)的常見指標：①無法藥物控制的尿毒症狀(持續噁心嘔吐、心包炎、腦病變)；②嚴重電解質/酸鹼異常(難治性高血鉀、代謝性酸中毒)；③體液過量/肺水腫；④腎功能極差——CCr<10 mL/min、BUN>100 mg/dL、血肌酸酐「明顯升高(如>8–10 mg/dL)」。本題問「錯誤者」：B「serum creatinine<5 mg/dL」代表腎功能尚可、根本還不需要透析，與透析指標(Cr應升高)相反，為錯誤。","options":{"A":"持續噁心嘔吐(尿毒症狀)是透析指標，正確。","B":"錯誤(本題選此)。Cr<5代表腎功能尚可，不是透析指標(應為Cr升高)。","C":"CCr<5 mL/min(腎功能極差)是透析指標，正確。","D":"BUN>100 mg/dL是透析指標，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"101030-N3-15":{"quick":"CAPD飲食限制較HD「寬鬆」(因連續清除)，D說CAPD較嚴格為錯誤。","detail":{"background":"比較血液透析(HD)與持續可攜帶式腹膜透析(CAPD)：①HD為間歇性(每週約3次)、快速移除溶質與水分→易有「噁心、嘔吐、低血壓、抽筋等不平衡症候群」，對血壓血流動力學影響大；②CAPD為連續性、緩和地清除，血壓波動小，但病人需自行操作換液、擔負較多自我照顧；③飲食限制——CAPD因「持續清除」溶質與水分，飲食(水分、鉀、鈉)限制「較HD寬鬆」。本題問「錯誤者」：D「CAPD治療需要較嚴格的飲食控制」與事實相反(CAPD飲食較不嚴格)，為錯誤。","options":{"A":"HD易有噁心嘔吐低血壓不平衡症候群，正確。","B":"HD對血壓影響較CAPD大，正確。","C":"CAPD需擔負較多自我照顧(自行換液)，正確。","D":"錯誤(本題選此)。CAPD連續清除，飲食限制較HD「寬鬆」而非嚴格。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"101030-N3-16":{"quick":"AV瘻管側「不可量血壓、不可提重物施壓」，正確措施為D。","detail":{"background":"動靜脈瘻管(A-V fistula)是血液透析的血管通路，保護重點：①瘻管側手臂「不可量血壓、不可抽血打針、不可綁止血帶、不可戴緊飾物或提重物施壓」，以免壓迫使血流受阻、瘻管栓塞；②每天觸診應摸到「震顫(thrill)」、聽診聞「血流雜音(bruit)」代表通暢——摸不到震顫才是栓塞警訊；③避免患肢壓迫、保持通暢。本題正確者為D「避免在瘻管處施壓或提重物」。A把「摸到血流聲」誤判為凝血(其實有血流聲代表通暢)；B不可在瘻管手臂量血壓；C不可用彈性繃帶綁住(會壓迫阻塞)。","options":{"A":"摸到血流震顫/雜音代表「通暢」，非凝血，敘述錯誤。","B":"瘻管側手臂不可量血壓(壓迫致栓塞)，錯誤。","C":"不可用彈性繃帶綁住瘻管(壓迫阻塞)，錯誤。","D":"正解。避免在瘻管處施壓、提重物，保護血流通暢。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"101110-N3-18":{"quick":"急性排斥=發燒、尿量減少、Cr升高(2、3、4)，答C(234)。","detail":{"background":"腎移植急性排斥(acute rejection)多發生於術後數天至數月，是移植腎受免疫攻擊的表現：2「發燒」、3「尿量減少」(移植腎功能下降)、4「血肌酸酐升高」(過濾功能受損)，常合併移植部位腫痛壓痛、血壓「上升」與「體重增加」(水分滯留)。本題1「血壓下降」與5「體重下降」皆與實際相反(應為血壓上升、體重增加)。故急性排斥徵候為234，答案C。早期發現排斥需加強免疫抑制治療。","options":{"A":"含1(血壓下降)錯誤，應為血壓上升。","B":"含1、5皆錯誤。","C":"正解。2發燒+3尿量減少+4 Cr升高=急性排斥。","D":"含5(體重下降)錯誤，應為體重增加。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"102030-N3-70":{"quick":"腎移植後免疫抑制中「不可打活性疫苗」(卡介苗、麻疹)，B錯誤。","detail":{"background":"腎移植後病人長期服用免疫抑制劑，免疫力低下，居家照護：A術後早期避免接觸禽鳥(防伺機性感染如隱球菌、鸚鵡熱)；C穿寬鬆衣物避免壓迫植入於下腹的移植腎；D每日量體溫、體重、血壓監測排斥與感染徵兆。關鍵禁忌是「不可接種活性減毒疫苗」——卡介苗(BCG)、麻疹、德國麻疹、水痘、口服小兒麻痺等活疫苗在免疫抑制下可能造成疫苗株感染，是禁忌。本題問「錯誤者」：B「須追加卡介苗或麻疹疫苗」錯誤(這些活疫苗在移植後禁用)。","options":{"A":"術後3個月內避免接觸禽鳥防伺機感染，正確。","B":"錯誤(本題選此)。免疫抑制下禁打卡介苗、麻疹等「活性減毒疫苗」。","C":"穿寬鬆衣物避免壓迫移植腎，正確。","D":"每日量體溫、體重、血壓監測排斥/感染，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"102030-N3-71":{"quick":"HD病人水分控制=兩次透析間體重增加宜在1.0~1.5公斤(A)。","detail":{"background":"血液透析病人在兩次透析之間需嚴格限水，避免體液過量造成肺水腫、高血壓與心臟負荷。最常用的估算原則是「控制兩次透析間的體重增加(interdialytic weight gain)在乾體重的5%以內，約1.0–1.5公斤」，相當於水分攝取以「前一日尿量+不顯性流失(約500–700 mL)」為上限。本題問「最適宜」者為A「維持兩次透析間體重增加1.0~1.5公斤」。B「尿量+300~500」偏向ESRD一般估法但對無尿透析病人不夠精確；C取決血壓、D依生活型態都太籠統。","options":{"A":"正解。兩次透析間體重增加控制在1.0~1.5公斤是標準限水原則。","B":"尿量+300~500對無尿透析者不夠精確。","C":"取決血壓變化太籠統，非估算原則。","D":"依生活型態調整不夠具體，非標準。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"102110-N3-40":{"quick":"透析不平衡症候群=尿素清除比腦快致腦水腫+好發初次透析者→23。","detail":{"background":"透析不平衡症候群(dialysis disequilibrium syndrome)機轉：透析快速清除血中尿素氮與溶質，但血腦障壁使「腦組織內溶質下降較慢」→血與腦間滲透壓差→水分滲入腦細胞造成「腦水腫」，出現頭痛、噁心、嘔吐、躁動、意識改變甚至抽搐。好發於「剛開始接受透析(初次或前幾次)、BUN很高」的病人，多在透析「中或結束時」發生。本題：1敘述「血中清除比腦部慢」方向講反了(實際是血中清除『快』、腦部慢)，但2(透析中或結束發生)、3(好發剛接受透析者)為正確；常見症狀是神經學症狀(非發燒腹痛)，4錯。故正確為23，答案C。","options":{"A":"含1(因果方向錯誤)。","B":"含1、4皆錯誤。","C":"正解。2透析中/結束時發生+3好發初次透析者。","D":"含4(發燒腹痛)錯誤，症狀為神經學表現。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"103030-N3-67":{"quick":"腎移植成功的指標=尿量穩定增加代表移植腎發揮功能(D)。","detail":{"background":"腎移植術後輸出入量觀察：D「當尿量穩定增加時，代表植入的腎臟已發揮功能」正確——移植腎恢復灌流後開始大量排尿(有時甚至多尿期)，尿量回升是功能恢復的好指標。其他錯誤：A術後尿液初期可能淡紅(輕微血尿)但不會「鮮紅色」(鮮紅提示出血)；B導尿管通常數天即可移除(非至少一週)；C靜脈補液應「依排出尿量等量或略補(配合中心靜脈壓)」而非「兩倍」(過量補液會造成體液過載)。故正確D。","options":{"A":"術後初期尿液淡紅可，「鮮紅色」提示出血異常，錯誤。","B":"導尿管多數天即移除，非至少一週，錯誤。","C":"補液依尿量等量補充，非兩倍(過量會體液過載)，錯誤。","D":"正解。尿量穩定增加=移植腎已發揮功能。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"103100-N3-50":{"quick":"移植後3個月Cr↑、尿量↓、血壓↑、移植處腫痛=急性排斥(A)。","detail":{"background":"腎移植後「3個月內」出現「血清BUN與肌酸酐上升、尿量減少、血壓上升、移植部位腫痛壓痛」是典型「急性排斥(acute rejection)」表現——細胞性/抗體性免疫攻擊移植腎，造成功能急遽下降與局部發炎。超急性排斥發生在術中數分鐘至數小時(抗體預存)；急性排斥多在數天至數月內；慢性排斥則在數月至數年緩慢進展(漸進蛋白尿、高血壓、腎功能緩降)。本案例時間(3個月內)與表現符合「急性排斥」，答案A。","options":{"A":"正解。3個月內Cr/BUN升、尿量減、血壓升、移植處腫痛=急性排斥。","B":"慢性排斥為數月至數年緩慢進展，與此急性表現不符。","C":"細菌感染多有發燒、膿尿等感染證據，非典型此組合。","D":"「腎臟衰竭」太籠統，最特定診斷為急性排斥。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"104100-N3-67":{"quick":"血液透析最常見感染致病菌為「金黃色葡萄球菌」(B)。","detail":{"background":"血液透析病人因反覆血管通路穿刺(瘻管、人工血管、導管)，皮膚菌易進入血流，造成導管相關血流感染與菌血症，最常見致病菌為皮膚常在的「金黃色葡萄球菌(Staphylococcus aureus，含MRSA)」與表皮葡萄球菌。預防重點為嚴格無菌技術、通路照護與手部衛生。本題答案B金黃色葡萄球菌。其他鏈球菌、黴菌、克雷白氏桿菌相對少見。","options":{"A":"鏈球菌非透析通路感染最常見菌。","B":"正解。金黃色葡萄球菌(皮膚常在菌)是透析最常見感染菌。","C":"黴菌感染相對少見。","D":"克雷白氏桿菌非透析通路最常見致病菌。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"105090-N3-61":{"quick":"AV瘻管側「不可量血壓」，A不適當。","detail":{"background":"AV瘻管術後護理：B手術部位抬高減輕腫脹(對)；C觸診摸到「震顫(thrill)」、聽到雜音代表血流通暢(對)；D「不可在瘻管處穿刺抽血、打針、量血壓」以防壓迫栓塞(對)。本題問「不適當者」：A「於瘻管手臂處密切測量血壓」錯誤——瘻管側手臂禁止量血壓(壓脈帶加壓會阻斷瘻管血流造成栓塞)，是經典禁忌，故為答案。","options":{"A":"不適當(本題選此)。瘻管側手臂禁止量血壓(壓迫致栓塞)。","B":"手術部位抬高防腫脹，正確。","C":"觸診有震顫表血流通暢，正確。","D":"不可在瘻管處穿刺抽血，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"105090-N3-66":{"quick":"CAPD對「小分子」清除率「不如」HD，A敘述錯誤。","detail":{"background":"CAPD(腹膜透析)特性：以腹膜為半透膜連續緩慢透析。①對「小分子(如尿素、肌酸酐)」的清除率「不如血液透析快」(HD用高效能透析膜+高血流，小分子清除較佳)，但CAPD對中分子清除相對較好且連續(B蛋白質會隨透析液流失、D葡萄糖透析液被吸收使三酸甘油酯增加皆為CAPD特性，正確)；②透析過程緩和、較少低血壓(C對)。本題問「錯誤者」：A「對小分子的清除率較HD佳」與事實相反(HD小分子清除較佳)，為錯誤。","options":{"A":"錯誤(本題選此)。小分子清除HD較佳，CAPD不如HD。","B":"CAPD易造成蛋白質流失(隨透析液)，正確。","C":"CAPD連續緩和，較少低血壓，正確。","D":"葡萄糖透析液吸收→三酸甘油酯增加，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"107030-N3-43":{"quick":"ESRD限水=兩次透析間體重增加不超過乾體重5%(D)最適當。","detail":{"background":"ESRD透析病人的液體攝取估算，最精準的原則是「控制兩次透析間的體重增加不超過乾體重(dry weight)的5%」(約1.0–1.5公斤)，以避免體液過量造成肺水腫、高血壓與心臟衰竭。A「前一日尿量+300~500」對「無尿」的透析病人不夠精確；B「體重增加控制在2.0公斤」太寬鬆(超過5%風險)；C「取決血壓」太籠統。故最適當為D。","options":{"A":"尿量+300~500對無尿透析者不夠精確。","B":"體重增加2.0公斤太寬鬆，超過5%有體液過量風險。","C":"取決血壓太籠統，非估算原則。","D":"正解。兩次透析間體重增加不超過乾體重5%。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"107030-N3-62":{"quick":"透析指標是Cr「升高」，B寫Cr<5 g/dL錯誤。","detail":{"background":"ESRD開始透析的指標：CCr<10 mL/min(A對)、BUN>100 mg/dL(C對)、持續難治的尿毒症狀如噁心嘔吐(D對)，以及難治性高血鉀、代謝性酸中毒、體液過量。本題問「錯誤者」：B「Serum Creatinine<5 g/dL」——肌酸酐應「升高」才是透析指標(末期常>8–10 mg/dL)，<5反而代表腎功能尚可，且單位「g/dL」也不對(應為mg/dL)，故為錯誤。","options":{"A":"CCr<10 mL/min是透析指標，正確。","B":"錯誤(本題選此)。Cr應升高才需透析，<5代表腎功能尚可。","C":"BUN>100 mg/dL是透析指標，正確。","D":"持續噁心嘔吐(尿毒症狀)是指標，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"107110-N3-66":{"quick":"水溶性的維生素C、葉酸會被透析清除，應「透析結束後」服用(D)。","detail":{"background":"血液透析會「清除水溶性維生素」(維生素B群、維生素C、葉酸)，因此若在透析前或透析中服用，藥物會隨透析被移除而失效。正確做法是「透析結束後」再服用，確保藥效不被透析清除。梁先生下午1–5點透析，故應於「下午5點透析結束時(後)」服用維生素C與葉酸，答案D。同理EPO、鐵劑等亦多於透析後給予或於非透析考量給藥時機。","options":{"A":"中午12點服用會在透析中被清除，不當。","B":"透析開始時服用會被透析清除。","C":"透析中服用會被清除。","D":"正解。透析結束(下午5點)後服用，避免水溶性維生素被清除。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"107110-N3-67":{"quick":"透析不平衡症候群會出現「神經症狀(不安、意識降低、抽搐)」(D)。","detail":{"background":"透析不平衡症候群正確敘述為D「會出現神經症狀，如不安、意識程度降低、抽搐」。機轉：透析快速降低血中尿素氮，但腦組織溶質下降較慢→血與腦間滲透壓差→水分進入腦細胞造成「腦水腫」(非腦脫水)，引發頭痛、噁心、躁動、意識改變、抽搐。它「好發於剛開始透析(初次或前幾次)、BUN很高、快速透析」者，故A「最常發生於多次療程後」錯誤；B方向講反(應為血中下降『快』、腦部慢)；C「腦脫水」錯誤(應為腦水腫)。","options":{"A":"好發於「初次/前幾次」透析，非多次療程後，錯誤。","B":"應為血中尿素下降「快」、腦部慢，方向相反，錯誤。","C":"造成「腦水腫」非腦脫水，錯誤。","D":"正解。出現不安、意識降低、抽搐等神經症狀。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"109030-N3-60":{"quick":"HD限水=兩次透析間體重增加不超過乾體重5%(C)。","detail":{"background":"血液透析病人液體控制的標準原則為「兩次透析間體重增加不超過乾體重的5%」(約1.0–1.5公斤)，避免體液過量。A「前一日尿量+排汗量」不易量化排汗、不精確；B「取決下肢水腫程度」太主觀；D「控制在2.0公斤以內」太寬鬆(超過多數病人5%乾體重)。故最適當為C，與標準限水教學一致。","options":{"A":"尿量+排汗量不易量化、不精確。","B":"取決下肢水腫太主觀，非估算原則。","C":"正解。兩次透析間體重增加不超過乾體重5%。","D":"控制在2.0公斤太寬鬆，可能超過5%乾體重。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"109110-N3-67":{"quick":"CAPD需病人自行換液，自我照顧活動較多(B)正確。","detail":{"background":"比較CAPD與HD，正確者為B「CAPD需擔負較多的自我照顧活動」——CAPD病人需自行每日操作換液(連接管路、注入/引流透析液)、嚴格無菌防腹膜炎，自我照顧負擔大。其他錯誤：A「CAPD飲食限制較嚴格」相反(CAPD連續清除，飲食較寬鬆)；C「頭痛噁心嘔吐低血壓症候群」是「HD」(不平衡症候群)特徵非CAPD；D「對心血管影響較大」是HD(快速移除水分易低血壓、血流動力波動)，CAPD反而緩和對心血管影響較小。故答案B。","options":{"A":"CAPD飲食限制較「寬鬆」，非嚴格，錯誤。","B":"正解。CAPD需自行換液，自我照顧活動較多。","C":"不平衡症候群(頭痛噁心低血壓)是HD特徵，非CAPD。","D":"對心血管影響大是HD，CAPD較緩和，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"110030-N3-61":{"quick":"蛋白質流失是「CAPD較多」(隨透析液)，A說HD較多為錯誤。","detail":{"background":"HD與CAPD比較：B CAPD需較多自我照顧(自行換液)(對)；C CAPD用葡萄糖透析液被吸收→血中三酸甘油酯增加(對)；D HD快速移除水分溶質→易低血壓、頭痛、抽筋等不平衡症候群(對)。本題問「錯誤者」：A「HD較CAPD蛋白質流失較多」——實際上「CAPD」因蛋白質隨腹膜透析液流失，蛋白質流失「較HD多」，故A方向相反，為錯誤。","options":{"A":"錯誤(本題選此)。蛋白質流失是「CAPD較多」(隨透析液)，非HD。","B":"CAPD需較多自我照顧，正確。","C":"CAPD葡萄糖吸收→三酸甘油酯增加，正確。","D":"HD易低血壓頭痛抽筋不平衡症候群，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"110030-N3-74":{"quick":"pH7.28↓、HCO3 20↓、PaCO2 30↓代償=部分代償性代謝性酸中毒(B)。","detail":{"background":"判讀ABG：pH 7.28(<7.35，酸中毒)。原發看HCO3=20 mEq/L(<22，下降)→「代謝性酸中毒」(符合腎衰竭+高血鉀+尿毒)。代償看PaCO2=30 mmHg(<35，下降)→呼吸代償(過度換氣排CO2)已啟動。但pH仍<7.35未回正常範圍，故為「部分代償」。綜合判讀為「部分代償性代謝性酸中毒」，答案B。此為長期透析病人尿毒性代謝性酸中毒合併高血鉀(K 7.8)的危急狀況。","options":{"A":"PaCO2下降是「代償」非原發呼吸性酸中毒，錯誤。","B":"正解。HCO3↓原發代謝性酸中毒、PaCO2↓代償、pH仍<7.35=部分代償性代謝性酸中毒。","C":"非鹼中毒，pH為酸性，錯誤。","D":"非鹼中毒，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"110030-N3-75":{"quick":"高血鉀不可補「氯化鈉」降鉀；C補0.3%NaCl為錯誤處置。","detail":{"background":"承上題，病人高血鉀(K 7.8)合併代謝性酸中毒，急救降鉀處置：A口服陽離子交換樹脂(Kalmate/Kayexalate)由腸道排鉀(對)；B靜脈注射「正規胰島素(RI)+高張葡萄糖(D50W)」把鉀移入細胞內暫時降血鉀(對)；D緊急血液透析直接移除鉀並持續監測心電圖(對，是根本治療)。本題問「錯誤者」：C「補充0.3%氯化鈉溶液」對降血鉀無幫助、也非高血鉀處置(低張食鹽水反可能加重體液問題)，為錯誤。降鉀還可給鈣劑穩定心肌、碳酸氫鈉矯正酸中毒。","options":{"A":"口服陽離子交換樹脂排鉀，正確。","B":"RI+D50W把鉀移入細胞內暫時降鉀，正確。","C":"錯誤(本題選此)。補0.3%NaCl無降鉀作用，非高血鉀處置。","D":"緊急血液透析移除鉀並監測心電圖，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"110110-N3-67":{"quick":"急性排斥=血壓升、尿量減、Cr升、體重增；「體重下降」不包括(D)。","detail":{"background":"腎移植急性排斥徵候：A血壓上升、B尿量減少、C血清肌酸酐升高，並常見發燒、移植部位腫痛壓痛與「體重增加(水分滯留)」。本題問「不包括」者：D「體重下降」——排斥時移植腎功能下降、排水不良會「體重增加」而非下降，故D不屬急性排斥徵候，為答案。早期辨識排斥(尿量減、Cr升、發燒、移植處痛)以加強免疫抑制是關鍵。","options":{"A":"血壓上升是急性排斥徵候。","B":"尿量減少是急性排斥徵候。","C":"血清肌酸酐升高是急性排斥徵候。","D":"正解(不包括)。排斥時體重「增加」非下降。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"111030-N3-64":{"quick":"水溶性葉酸會被透析清除，應「透析結束後」服用(D)。","detail":{"background":"葉酸為水溶性維生素，血液透析會將其清除，故規律透析病人若在透析前或透析中服用葉酸，會被透析移除而失效。正確時機是「透析結束後」再服用，確保藥效。梁太太規律透析、因腎性貧血服葉酸，故最恰當為D「透析結束後服用」。同理維生素B群、維生素C等水溶性維生素也應於透析後補充。","options":{"A":"透析前半小時服用會被透析清除。","B":"開始透析時服用會被清除。","C":"透析中服用會被清除。","D":"正解。葉酸水溶性，透析結束後服用避免被清除。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"112030-N3-58":{"quick":"急性腎衰竭「利尿期」腎功能正在恢復，非透析適應症(C)。","detail":{"background":"透析(腎臟替代/解毒)適應症記憶口訣「AEIOU」：Acidosis(嚴重代謝性酸中毒)、Electrolyte(難治性高血鉀)、Intoxication(可透析清除的中毒如巴比妥、水楊酸、甲醇、鋰)、Overload(體液過量/急性肺水腫)、Uremia(尿毒症狀)。A急性高血鉀、B急性肺水腫、D急性巴比妥類中毒皆為適應症。本題問「不適宜(不是適應症)」者：C「急性腎衰竭利尿期」——利尿期代表腎功能正在恢復、尿量回升，不需透析，故為答案。","options":{"A":"急性高血鉀是透析適應症。","B":"急性肺水腫(體液過量)是適應症。","C":"不適宜(本題選此)。利尿期腎功能恢復中，不需透析。","D":"急性巴比妥中毒(可透析清除)是適應症。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"112110-N3-65":{"quick":"腎移植最常見合併症是「感染」(免疫抑制)，A加「出血」並列不適當。","detail":{"background":"腎移植合併症：B長期免疫抑制劑→免疫力下降，最常見併發症是「感染」(尤其肺部感染、伺機性感染如CMV、PCP)；C術後高血壓可能因移植腎「腎動脈狹窄」(活化RAAS)；D大量類固醇可致消化性潰瘍。本題問「不適當者」：A「最常見的合併症是感染、出血」——「感染」確為最常見，但把「出血」並列為『最常見』不適當(出血非最常見併發症，最主要是感染)，故A敘述不妥為答案。","options":{"A":"不適當(本題選此)。最常見是「感染」，把出血並列為最常見不妥。","B":"免疫抑制劑→肺部感染，正確。","C":"術後高血壓可因腎動脈狹窄，正確。","D":"大量類固醇→胃潰瘍，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"112180-N3-42":{"quick":"急性排斥處置是「加強免疫抑制(類固醇)」非利尿劑控制，C錯誤。","detail":{"background":"腎移植排斥處置：A「超急性排斥」(術中數分鐘至小時，預存抗體致血管栓塞壞死)→須儘快移除移植腎(對)；B「加速性排斥」(數天內抗體性)→大量類固醇或血漿置換控制(對)；D「慢性排斥」(數月至數年漸進，蛋白尿、高血壓、體重增加、腎功能緩降)→多保守支持治療(對)。本題問「錯誤者」：C「急性排斥時水腫高血壓用利尿劑控制」——急性排斥(細胞性免疫攻擊)的主要處置是「加強免疫抑制(大劑量類固醇衝擊、抗淋巴球抗體)」，而非只用利尿劑控制水腫高血壓，治療方向錯誤，為答案。","options":{"A":"超急性排斥須儘快移除移植腎，正確。","B":"加速性排斥用大量類固醇或血漿置換，正確。","C":"錯誤(本題選此)。急性排斥主要處置是「加強免疫抑制」，非利尿劑控制。","D":"慢性排斥多保守治療，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"113030-N3-37":{"quick":"移植腎多置於下腹腸骨窩、原腎多「保留不切除」，D錯誤。","detail":{"background":"腎臟移植過程：A病人術前可先透析移除多餘體液與尿毒素以利手術安全(對)；B「交叉試驗(crossmatch)陰性」表示受贈者無預存對抗捐贈者的抗體，陰性才能移植避免超急性排斥(對)；C移植腎多植入「下腹部、腹膜外的腸骨窩(iliac fossa)」並與腸骨血管、膀胱接合(對)。本題問「錯誤者」：D「必須先移除原來腎臟再植入」——一般移植「保留原本腎臟(原位)」，只在特定情況(如嚴重感染、巨大多囊腎、頑固性高血壓)才切除原腎；且接合是「輸尿管與膀胱」吻合而非「尿道」。故D錯誤。","options":{"A":"術前可先透析移除體液與毒素，正確。","B":"交叉試驗陰性才可移植(避免超急性排斥)，正確。","C":"移植腎植入下腹腹膜外腸骨窩，正確。","D":"錯誤(本題選此)。原腎多保留不切除，且接合是輸尿管-膀胱非尿道。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"113030-N3-39":{"quick":"HD飲食限制較腹膜透析「嚴格」(A)正確。","detail":{"background":"透析比較，正確者為A「血液透析的飲食限制，較腹膜透析嚴格」——HD為間歇性(每週3次)，兩次之間溶質與水分會累積，故對水分、鉀、鈉、磷的限制較嚴；CAPD連續清除，飲食較寬鬆。其他錯誤：B蛋白質流失「CAPD較多」(隨透析液)而非HD；C高血脂「CAPD較高」(葡萄糖透析液)而非HD；D心血管負荷「HD較大」(快速移除水分易血壓波動)而非較少。故正確A。","options":{"A":"正解。HD為間歇性，飲食限制較腹膜透析嚴格。","B":"蛋白質流失CAPD較多，非HD，錯誤。","C":"高血脂CAPD較高(葡萄糖透析液)，非HD，錯誤。","D":"心血管負荷HD較大(快速移除水分)，非較少，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"113180-N3-38":{"quick":"正常腹膜透析引流液應「清澈無色」(C)；混濁代表腹膜炎。","detail":{"background":"腹膜透析(PD)正確敘述為C「觀察透析液為清澈無色」——正常引流出的透析液應清澈，若變「混濁」提示「腹膜炎」(PD最常見併發症)，須立即處理。其他錯誤：A「噁心嘔吐低血壓不平衡症候群」是「血液透析」特徵(快速移除溶質)，PD緩和較少此症候群；B PD是「緩慢連續」脫水，血壓波動小、對心臟負荷「較小」非較大；D PD緩和、血流動力穩定，反而「適合」心臟功能不佳或腦血管疾病者(HD的快速移除水分對心血管不穩者較不利)，故D錯誤。","options":{"A":"不平衡症候群(噁心嘔吐低血壓)是HD特徵，非PD，錯誤。","B":"PD緩慢脫水、血壓波動小、心臟負荷較小，非較大，錯誤。","C":"正解。正常PD引流液清澈無色，混濁提示腹膜炎。","D":"PD緩和反而適合心血管不穩者，非不合適，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"114100-N3-38":{"quick":"AV瘻管術後「握球運動」可強化血管促進瘻管成熟(D)正確。","detail":{"background":"AV瘻管護理，正確者為D「教導執行握球運動(握力球)強化血管、促進瘻管血流量與成熟」——術後規律握球運動可增加靜脈血流與管徑，幫助瘻管成熟以利日後穿刺。其他錯誤：A摸到「血流震顫/雜音」代表「通暢」而非阻塞(摸不到才是阻塞警訊)；B瘻管側手臂「不可量血壓」(壓迫致栓塞)；C「不可用彈性繃帶或彈力衣包紮壓迫」瘻管(會阻斷血流)。故正確D。","options":{"A":"摸到血流聲代表「通暢」非阻塞，敘述錯誤。","B":"瘻管側手臂不可量血壓(壓迫致栓塞)，錯誤。","C":"不可用彈性繃帶/彈力衣包紮壓迫瘻管，錯誤。","D":"正解。握球運動強化血管、促進瘻管成熟與血流。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"114170-N3-38":{"quick":"糖尿病15年、HbA1c 8%控制不佳，「不適合」當活體捐腎者(B)。","detail":{"background":"活體腎臟捐贈者的條件：A兩側腎功能正常、常規尿液檢查正常(對，須確保捐一顆後剩餘腎足夠);C年齡20歲以上之五親等內親屬(法規要求成年且有親屬/配偶關係，組織配型較佳)；D動機純正、自願、無金錢交易並同意手術。本題問「最不適當者」：B「患糖尿病15年、HbA1c平均8.0%」——糖尿病(尤其控制不良、病程長)是腎病變高風險，捐腎後剩餘單腎更易惡化，故「不適合」當捐贈者，為答案。","options":{"A":"兩側腎功能正常、尿檢正常，是合格捐者條件。","B":"最不適當(本題選此)。糖尿病15年控制不佳，捐腎後易腎病變，不適合。","C":"20歲以上五親等內親屬，符合捐贈條件。","D":"動機純正、自願同意，符合捐贈倫理要件。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 透析與腎移植","KDIGO 透析與腎臟移植照護指引"]}},"101030-N3-12":{"quick":"奶類屬「鹼灰性」食物，不具酸化尿液效果(D)。","detail":{"background":"酸化尿液(降低尿液pH)有助抑制部分細菌生長並預防磷酸銨鎂等鹼性結石。「酸灰性(acid-ash)」食物會使尿液偏酸，包括肉類、蛋、全穀類、五穀、蔓越莓汁、梅汁、李子(prune)等。而「奶類及奶製品、多數蔬菜水果(柑橘除外)」屬「鹼灰性(alkaline-ash)」食物，會使尿液偏鹼，不具酸化效果。本題問「不具酸化效果」者：D奶類(鹼灰性)，故為答案。","options":{"A":"全穀類屬酸灰性，具酸化尿液效果。","B":"梅汁屬酸灰性，能酸化尿液。","C":"李子(prune)屬酸灰性，能酸化尿液。","D":"正解。奶類屬鹼灰性食物，不具酸化尿液效果。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"102110-N3-39":{"quick":"急性腎盂腎炎應「多喝水」沖洗泌尿道，A限制飲水為錯誤。","detail":{"background":"急性腎盂腎炎是上泌尿道(腎盂、腎實質)細菌感染，護理：應「鼓勵大量攝取水分(每日2000–3000 mL)」以增加尿量、沖洗泌尿道、稀釋細菌(B避免劇烈運動、C鼓勵每1–2小時排尿避免尿液滯留、D多攝取維生素C酸化尿液皆正確)。本題問「錯誤者」：A「限制飲水以避免肢端水腫」——腎盂腎炎(腎功能多正常)應多喝水而非限水，限水反不利沖洗細菌，為錯誤。(限水是腎衰竭/腎病症候群水腫時的考量，與此不同。)","options":{"A":"錯誤(本題選此)。腎盂腎炎應多喝水沖洗泌尿道，非限制飲水。","B":"避免劇烈運動(急性期休息)，正確。","C":"鼓勵每1~2小時排尿避免尿滯留，正確。","D":"多攝取維生素C酸化尿液，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"102110-N3-41":{"quick":"膀胱炎應「減少奶類」(鹼化尿液不利)，A多攝取牛奶奶製品為錯誤。","detail":{"background":"膀胱炎(下泌尿道感染)護理：B溫水坐浴減輕局部不適(對)；C每日攝取2000–3000 c.c.液體增加尿量沖洗(對)；D菌尿時以抗菌劑治療7–10天(對)。飲食上應「酸化尿液」抑菌、減少刺激物。本題問「錯誤者」：A「多攝取牛奶及奶製品」——奶類屬「鹼灰性」會「鹼化尿液」不利於抑菌，膀胱炎反而應「減少」奶類，故為錯誤。應鼓勵酸灰性食物(肉、蛋、蔓越莓、梅汁)與避免咖啡因刺激物。","options":{"A":"錯誤(本題選此)。奶類鹼化尿液不利抑菌，膀胱炎應「減少」奶製品。","B":"溫水坐浴減輕局部不適，正確。","C":"每日2000~3000 c.c.液體增加尿量沖洗，正確。","D":"菌尿以抗菌劑治療7~10天，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"103100-N3-60":{"quick":"腎盂腎炎最常見致病菌是大腸桿菌；「肺炎鏈球菌」最不常見(A)。","detail":{"background":"急性腎盂腎炎絕大多數由「腸道格蘭氏陰性桿菌」經尿道上行感染引起，最常見為「大腸桿菌(E. coli，約80%)」，其次變形桿菌(Proteus，常與鹼性尿/磷酸銨鎂結石相關)、克雷白氏桿菌、假單孢菌、腸球菌等。「肺炎鏈球菌(Streptococcus pneumoniae)」是呼吸道(肺炎、腦膜炎)的致病菌，極少造成泌尿道感染。本題問「最不常見」者即A肺炎鏈球菌。","options":{"A":"正解(最不常見)。肺炎鏈球菌是呼吸道病原，極少致泌尿道感染。","B":"大腸桿菌是腎盂腎炎最常見致病菌。","C":"變形菌(Proteus)是常見泌尿道感染菌(與鹼性尿/結石相關)。","D":"假單孢菌(Pseudomonas)是泌尿道感染常見菌(尤院內)。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"104030-N3-61":{"quick":"腎盂腎炎以「發燒寒顫、腰痛、頻尿尿急、噁心嘔吐」為主；腹瀉便秘非典型，D錯誤。","detail":{"background":"急性腎盂腎炎典型臨床表徵：①全身感染症狀——寒顫、高燒(A對)；②下泌尿道刺激症狀——頻尿、尿急、解尿疼痛(B對)；③肋骨脊柱角(CVA)叩擊痛、後腰疼痛；④腸胃道伴隨症狀——噁心、嘔吐(C對)。本題問「錯誤者」：D「腹瀉、便秘」並非腎盂腎炎的典型表現，故為答案。腎盂腎炎雖可能有噁心嘔吐，但不以腹瀉便秘為特徵。","options":{"A":"寒顫、高燒(全身感染症狀)，正確。","B":"頻尿、尿急(下泌尿道刺激)，正確。","C":"噁心、嘔吐(腸胃伴隨症狀)，正確。","D":"錯誤(本題選此)。腹瀉、便秘非腎盂腎炎典型表徵。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"104030-N3-64":{"quick":"膀胱炎不需「每日1000mg維生素C」高劑量，B最不適當。","detail":{"background":"膀胱炎飲食建議：A每日攝取至少3000 mL水分增加尿量沖洗(對)；C減少奶類製品(鹼化尿液不利抑菌)(對)；D減少咖啡因(刺激膀胱)(對)。維生素C可微酸化尿液，但「每日1000 mg高劑量」並非標準建議——過量維生素C意義有限，且大量維生素C可能增加草酸鹽形成結石風險。本題問「最不適當者」：B「鼓勵每日攝取1000 mg維生素C」劑量過高、非適當建議，為答案。","options":{"A":"每日至少3000 mL水分沖洗泌尿道，正確。","B":"最不適當(本題選此)。不需每日1000 mg高劑量維生素C。","C":"減少奶類製品(避免鹼化尿液)，正確。","D":"減少咖啡因(避免刺激膀胱)，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"104100-N3-62":{"quick":"腎盂腎炎身體評估=叩診「肋骨脊柱角(CVA)疼痛」(B)。","detail":{"background":"急性腎盂腎炎是腎盂與腎實質的感染發炎，身體評估典型發現為「肋骨脊柱角(costovertebral angle, CVA)叩擊痛」——以手叩擊後腰部第12肋與脊柱交角處時，發炎的腎臟引起明顯疼痛，是腎盂腎炎的重要理學徵象。其他選項錯誤：A後腰皮膚藍紫色(Grey-Turner徵)見於腹膜後出血/急性胰臟炎，非腎盂腎炎；C腹部聽診嘈音與腸蠕動有關，非感染指標；D觸診摸到腫塊非腎盂腎炎典型(腎臟腫大不一定可觸及)。故正確B。","options":{"A":"後腰藍紫色(Grey-Turner徵)見於腹膜後出血，非腎盂腎炎。","B":"正解。叩診肋骨脊柱角(CVA)疼痛是腎盂腎炎典型徵象。","C":"腹部嘈音與腸蠕動有關，非感染指標。","D":"觸診摸到腫塊非腎盂腎炎典型發現。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"104100-N3-63":{"quick":"預防UTI=如廁後「由前向後」擦拭會陰(C)。","detail":{"background":"預防泌尿道感染復發的護理指導：C「如廁後由前向後(由尿道往肛門方向)擦拭會陰」——避免將肛門周圍的腸道細菌(大腸桿菌)帶到尿道口，是女性預防UTI最重要的衛生指導。其他錯誤：A抗生素須「完成整個療程」，症狀緩解就停藥會導致細菌未根除、復發或抗藥性；B「不應」常用會陰部清潔劑/灌洗(破壞正常菌叢、刺激黏膜反易感染)；D應採「淋浴」而非盆浴(盆浴使污水接觸尿道口)。故正確C。","options":{"A":"抗生素須完成整個療程，症狀緩解不可自行停藥，錯誤。","B":"不宜常用會陰清潔劑(破壞菌叢易感染)，錯誤。","C":"正解。如廁後由前向後擦拭，避免腸菌污染尿道。","D":"應採淋浴非盆浴，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"105030-N3-63":{"quick":"腎盂腎炎感染→發炎指標ESR(紅血球沉降速率)增加(C)。","detail":{"background":"急性腎盂腎炎為細菌感染發炎，發炎指標會上升：「紅血球沉降速率(ESR)增加」、C反應蛋白(CRP)增加、白血球增多。尿液檢查可見膿尿(WBC)、菌尿、白血球圓柱體。本題問「協助診斷」者：C「紅血球沉降速率增加」正確。其他錯誤：A尿液pH感染(尤Proteus)常偏「鹼性(>6.5)」而非<6.5；B診斷菌尿的菌落數標準是「≥10⁵ CFU/mL(10萬)」而非>100；D CRP應「升高」而非降低。故答案C。","options":{"A":"感染(尤Proteus)尿液常偏鹼性，pH<6.5非診斷依據，錯誤。","B":"菌尿診斷標準是≥10⁵ CFU/mL，非>100，錯誤。","C":"正解。感染發炎使ESR(紅血球沉降速率)增加。","D":"CRP應升高非降低，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"105030-N3-64":{"quick":"腎絲球腎炎是「免疫性」腎絲球發炎，不屬泌尿道感染(A)。","detail":{"background":"泌尿道感染(UTI)指細菌侵入泌尿道造成的感染，依部位分為：下泌尿道感染——尿道炎、膀胱炎；上泌尿道感染——腎盂腎炎。本題問「不屬於泌尿道感染」者：A「腎絲球腎炎」——它是免疫複合體沉積引起的「腎絲球免疫性發炎」，並非細菌感染泌尿道，不屬UTI範疇，故為答案。B腎盂腎炎、C膀胱炎、D尿道炎皆為泌尿道感染。","options":{"A":"正解(不屬UTI)。腎絲球腎炎是免疫性發炎，非泌尿道感染。","B":"腎盂腎炎屬上泌尿道感染。","C":"膀胱炎屬下泌尿道感染。","D":"尿道炎屬下泌尿道感染。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"105090-N3-65":{"quick":"預防UTI應「由前向後」擦拭，B由後向前為不適當。","detail":{"background":"預防下泌尿道感染復發指導：A抗生素須完整療程(對)；C沐浴以「淋浴」較佳避免污水接觸尿道(對)；D性交後立即排空膀胱沖洗可能進入的細菌(對)。本題問「不適當者」：B「如廁後由後向前擦拭」——這會把肛門周圍的腸道細菌帶往尿道口、增加感染風險，正確應「由前向後」擦拭，故B為錯誤。","options":{"A":"抗生素療程要完整，正確。","B":"不適當(本題選此)。應「由前向後」擦拭，由後向前會把腸菌帶到尿道。","C":"沐浴以淋浴較佳，正確。","D":"性交後立即排空膀胱沖洗細菌，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"106030-N3-60":{"quick":"女性尿道炎多為上行性細菌(大腸/克雷白)、雌激素↓、化學刺激；「淋病雙球菌」機率最低(C)。","detail":{"background":"女性尿道炎因尿道短，常見原因：A化學物刺激(衛生用品、清潔劑)；B停經後雌激素減少使尿道黏膜萎縮、防禦力下降而易感染；D克雷白氏桿菌等腸道格蘭氏陰性桿菌上行感染。「淋病雙球菌(淋菌)」造成的尿道炎屬「性傳染病」，在一般女性尿道炎中相對「機率最低」(非主要原因)。本題問「機率最低」者即C淋病雙球菌感染。一般非性病性尿道炎以腸道菌與停經、化學刺激為主因。","options":{"A":"化學物刺激是女性尿道炎常見原因。","B":"雌激素減少(停經)使黏膜萎縮易感染，常見。","C":"正解(機率最低)。淋菌屬性病，非一般女性尿道炎主因。","D":"克雷白氏桿菌(腸道菌上行)是常見原因。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"107030-N3-63":{"quick":"腎盂腎炎急性期應「多喝水」沖洗，D限制液體為錯誤。","detail":{"background":"腎盂腎炎敘述：A常見於下泌尿道細菌「上行性感染」至腎盂腎實質(對)；B感染發炎使CRP增高(對)；C肋骨脊柱角(CVA)叩擊痛是典型徵象(對)。本題問「錯誤者」：D「急性期應限制液體攝取量」——腎盂腎炎腎功能多正常，急性期應「大量補充水分(2000–3000 mL)」增加尿量、沖洗稀釋細菌，而非限水，故D錯誤。","options":{"A":"常見於下泌尿道上行性感染，正確。","B":"CRP值會增高，正確。","C":"肋骨脊柱角處疼痛(CVA tenderness)，正確。","D":"錯誤(本題選此)。急性期應多喝水沖洗，非限制液體。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"108110-N3-66":{"quick":"腎盂腎炎急性期應「多喝水」，D限制液體為錯誤。","detail":{"background":"腎盂腎炎敘述：A糖尿病、尿路結石(尿流阻塞/滯留)是其危險因子(對)；B CRP增高(對)；C肋骨脊柱角疼痛(對)。本題問「錯誤者」：D「急性期應限制液體攝取量」——腎盂腎炎應鼓勵大量飲水增加尿量沖洗泌尿道、稀釋細菌，急性期限水是錯誤觀念(限水適用於腎衰竭/水腫，與此不同)，故D為答案。","options":{"A":"糖尿病、尿路結石是腎盂腎炎危險因子，正確。","B":"CRP值會增高，正確。","C":"肋骨脊柱角處疼痛，正確。","D":"錯誤(本題選此)。急性期應多喝水沖洗，非限制液體。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"109030-N3-59":{"quick":"腎盂腎炎=上行感染+CVA疼痛+急性期多喝水→124。","detail":{"background":"急性腎盂腎炎正確敘述：1常見於「下泌尿道上行性感染」至腎盂(對)；2常見「肋骨脊柱角(CVA)處疼痛」(對)；4急性期應「大量攝取液體」增加尿量沖洗細菌(對)。而3「紅血球沉降速率(ESR)下降」錯誤——感染發炎使ESR「上升」而非下降。故正確組合為124，答案B。","options":{"A":"含3(ESR下降)錯誤，感染使ESR上升。","B":"正解。1上行感染+2 CVA疼痛+4急性期多喝水。","C":"含3錯誤。","D":"含3錯誤且少了1。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"112030-N3-59":{"quick":"膀胱炎=Neomycin治療時給維生素C酸化尿液協助抑菌(B)。","detail":{"background":"膀胱炎處置正確者為B「服用抗生素Neomycin時可給維生素C酸化尿液」——酸化尿液協助抑制細菌生長、提升部分抗菌效果。其他錯誤：A菌落數「≥10⁵/mL代表感染(非正常)」(>10⁵是顯著菌尿的診斷標準，非「正常」)；C反覆性UTI需「足夠療程(常7–14天甚至更長預防性療程)」，非只用3–5天；D「每天至少3000 c.c.液體」雖鼓勵多喝水，但本題以B為最適宜的正確敘述(D數值無誤但相對B不是被選為正解的關鍵；依官方答案D非正解)。故答案B。","options":{"A":"菌落≥10⁵/mL代表「感染」非正常，錯誤。","B":"正解。Neomycin治療時給維生素C酸化尿液協助抑菌。","C":"反覆性UTI需足夠療程，非僅3~5天，錯誤。","D":"多喝水正確但非本題選定的最適宜敘述。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"112030-N3-60":{"quick":"牛奶、柑橘屬「鹼灰性」食物，非酸灰性，D錯誤。","detail":{"background":"泌尿道感染病人鼓勵攝取「酸灰性(acid-ash)食物」以酸化尿液抑菌：A肉類、蛋；B燕麥、玉米、全穀類；C梅子、李子、蔓越莓——皆屬酸灰性。本題問「錯誤者(非酸灰性)」：D「牛奶、柑橘」——奶類與柑橘類水果(橘、柳橙、檸檬)屬「鹼灰性」食物(雖柑橘吃起來酸，但代謝後產生鹼性灰分)，會「鹼化」尿液，故不屬酸灰性，為答案。","options":{"A":"肉類、蛋屬酸灰性，正確。","B":"燕麥、玉米(全穀)屬酸灰性，正確。","C":"梅子、李子屬酸灰性，正確。","D":"錯誤(本題選此)。牛奶與柑橘屬「鹼灰性」，會鹼化尿液。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"113100-N3-40":{"quick":"體溫正常「不能排除」泌尿道感染，C為錯誤評估。","detail":{"background":"王先生85歲、排尿燒灼疼痛、膿尿血尿，疑泌尿道感染。正確評估：A年長男性可能合併前列腺肥大致排尿問題，需肛門指診(對)；B收集尿液常規與細菌培養確認菌種與用藥(對)；D尿培養「≥10⁵ CFU/mL」可確認UTI(對)。本題問「錯誤者」：C「體溫正常即可排除感染」——下泌尿道感染(膀胱炎)常無明顯發燒，老年人感染也可能無典型發燒反應，「體溫正常絕不能排除感染」，已有膿尿血尿就高度懷疑UTI，故C為錯誤評估。","options":{"A":"年長男性合併前列腺肥大，需肛門指診，正確。","B":"收集尿常規與細菌培養確認病因菌種，正確。","C":"錯誤(本題選此)。體溫正常不能排除感染(膀胱炎常無發燒、老人反應差)。","D":"尿培養≥10⁵ CFU/mL可確認UTI，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"114030-N3-41":{"quick":"症狀減輕沒發燒「不可」停藥，須完成療程，D錯誤。","detail":{"background":"預防泌尿道感染復發指導：A減少不必要的導尿管留置(導尿管是院內UTI主因)；B排便後「由前往後」擦拭避免腸菌污染尿道；C洗澡避免盆浴採淋浴。這些皆正確。本題問「錯誤者」：D「症狀減輕沒發燒就可以停藥」——抗生素須「完成整個療程」徹底清除細菌，提早停藥會使細菌未根除、復發並誘導抗藥性，故D錯誤。","options":{"A":"減少不必要導尿管留置(防院內UTI)，正確。","B":"排便後由前往後擦拭，正確。","C":"避免盆浴採淋浴，正確。","D":"錯誤(本題選此)。抗生素須完成療程，症狀減輕不可自行停藥。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"114100-N3-40":{"quick":"院內UTI常見於「泌尿道侵入性檢查/導尿」後(D)。","detail":{"background":"泌尿道感染衛教，正確者為D「院內泌尿道感染常見於泌尿道侵入性檢查、導尿後」——留置導尿管與膀胱鏡等侵入性操作是醫療照護相關UTI(CAUTI)最主要原因。其他錯誤：A應建議「酸化尿液(酸灰性食物)」抑菌，柑橘與奶製品屬「鹼化」不適合；B女性最常見感染源是「大腸桿菌(腸道菌上行)」而非陰道滴蟲；C泌尿道感染典型症狀是「排尿疼痛、頻尿、尿急」(下泌尿道刺激症狀)，「無痛性血尿」反而是「膀胱癌」的警訊，非UTI典型。故正確D。","options":{"A":"應酸化尿液，柑橘奶製品屬鹼化不適合，錯誤。","B":"女性最常見感染源是大腸桿菌，非陰道滴蟲，錯誤。","C":"UTI典型是排尿疼痛頻尿尿急，無痛性血尿是膀胱癌警訊，錯誤。","D":"正解。院內UTI常見於泌尿道侵入性檢查/導尿後。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"114170-N3-39":{"quick":"腎盂腎炎=ESR升高+鼓勵酸灰性食物(乾梅蔓越莓)→13。","detail":{"background":"急性腎盂腎炎照護正確：1感染發炎使「紅血球沉降速率(ESR)升高」(對)；3鼓勵攝取「酸灰性食物如乾梅、蔓越莓」酸化尿液抑菌(對)。而2「症狀為無尿及貧血」錯誤——腎盂腎炎症狀是發燒寒顫、頻尿尿急、CVA疼痛，而非無尿與貧血；4「每4小時排尿一次」錯誤——應鼓勵「多喝水、頻繁排尿(每1–2小時)」沖洗泌尿道，間隔太久反使細菌滋生。故正確為13，答案B。","options":{"A":"含4(每4小時排尿)錯誤，應頻繁排尿。","B":"正解。1 ESR升高+3鼓勵酸灰性食物(乾梅蔓越莓)。","C":"含2(無尿貧血)錯誤。","D":"含2、4皆錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"114170-N3-49":{"quick":"UTI診斷=尿培養≥10⁵/mL+膀胱炎主菌為大腸桿菌→13。","detail":{"background":"泌尿道感染正確敘述：1確立診斷指「尿液培養每毫升菌落>10⁵個(顯著菌尿)」(對)；3膀胱炎最常見致病菌為「大腸桿菌(E. coli，腸道菌上行)」(對)。而2「上泌尿道感染指尿道炎及膀胱炎」錯誤——尿道炎、膀胱炎屬「下」泌尿道感染，「上」泌尿道感染指腎盂腎炎；4「症狀改善或沒發燒即可停用抗生素」錯誤——須完成完整療程。故正確為13，答案B。","options":{"A":"含2(上下泌尿道定義錯誤)。","B":"正解。1尿培養≥10⁵/mL+3膀胱炎主菌為大腸桿菌。","C":"含2、4皆錯誤。","D":"含4(症狀改善即停藥)錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"115030-N3-38":{"quick":"男性尿道「較長」是保護因子(不易感染)，B說較長易滋生細菌為最不適當。","detail":{"background":"感染性膀胱炎導因：A常見致病菌之一為大腸桿菌(對)；C膀胱炎多為「上行性細菌感染」(腸道菌經尿道上行)(對)；D前列腺肥大造成排尿不順、尿液滯留(殘尿)易使膀胱細菌滋生(對)。本題問「最不適當者」：B「男性因尿道較長易致膀胱細菌滋生」——男性尿道「較長」其實是「保護因子」，使細菌較不易上行到膀胱，故女性(尿道短)反而UTI較常見；B把「尿道較長」誤說成易致感染，方向相反，為最不適當。","options":{"A":"常見致病菌之一為大腸桿菌，正確。","B":"最不適當(本題選此)。男性尿道「較長」是保護因子，較不易感染。","C":"膀胱炎常為上行性細菌感染，正確。","D":"前列腺肥大致殘尿，膀胱細菌易滋生，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 泌尿道感染","IDSA 泌尿道感染診治指引"]}},"101110-N3-14":{"quick":"腎結石須「多飲水」稀釋尿液、沖出結石(A)；腎病/腎炎多需限水。","detail":{"background":"不同腎臟疾病的水分原則不同：①「腎結石」應「鼓勵大量飲水(每日2500–3000 mL以上)」，稀釋尿液中的結晶成分、增加尿量沖出小結石、預防復發，是預防結石最重要的措施；②糖尿病腎病變、腎病症候群、急性腎絲球腎炎多有水腫或腎功能受損，常需「限制水分」以免體液過量。本題問「必須鼓勵多飲水」者即A腎結石。","options":{"A":"正解。腎結石須多飲水稀釋尿液、沖出結石、預防復發。","B":"糖尿病腎病變有腎功能受損/水腫考量，非鼓勵大量飲水。","C":"腎病症候群水腫常需限水。","D":"急性腎絲球腎炎少尿水腫期需限水。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"101110-N3-15":{"quick":"腎上腺功能亢進與結石無直接關係(D)；高鈣、長期臥床才促結石。","detail":{"background":"泌尿道結石的危險因子(尤鈣結石)：A攝取過多維生素D→腸道鈣吸收增加→高鈣尿；B副甲狀腺功能亢進→PTH升高→骨鈣釋出、高血鈣高鈣尿；C長期臥床不活動→骨質流失、鈣釋入血、尿鈣增加且尿滯留，皆促進結石。本題問「不會造成結石」者：D「腎上腺功能亢進(如皮質醇/醛固酮過多)」與結石形成無直接因果關係，故為答案。記憶重點：與「鈣代謝」相關者(高維生素D、副甲狀腺亢進、長期臥床)才是結石高危因子。","options":{"A":"過多維生素D→腸鈣吸收增加→高鈣尿促結石。","B":"副甲狀腺亢進→高血鈣高鈣尿促結石。","C":"長期臥床→骨鈣流失、尿滯留促結石。","D":"正解(不會)。腎上腺功能亢進與結石形成無直接關係。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"102030-N3-62":{"quick":"尿酸結石=鹼化尿液+避免高普林海產+多喝水→13。","detail":{"background":"痛風病人的「尿酸結石」飲食指導：1攝取「鹼性食物(綠色蔬菜、水果、海帶)鹼化尿液」——尿酸結石在鹼性尿中溶解度高、較不易沉澱，故鹼化尿液可預防(對)；3「避免高普林(嘌呤)的海產、內臟、魚類」減少尿酸生成(對)。而2「鼓勵喝酒利尿」錯誤——酒精會增加尿酸生成並誘發痛風發作；4「多攝取小紅莓汁」是「酸化」尿液(用於預防鈣磷酸/感染性結石或UTI)，會使尿酸結石更易沉澱、不適合尿酸結石。故正確為13，答案B。","options":{"A":"含2(鼓勵喝酒)錯誤，酒會升尿酸。","B":"正解。1鹼化尿液+3避免高普林海產，預防尿酸結石。","C":"含2錯誤。","D":"含4(小紅莓酸化尿液)不適合尿酸結石。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"102110-N3-49":{"quick":"輸尿管三狹窄處為腎盂接合、髂血管交叉、膀胱接合處；「輸尿管骨盆角」非典型狹窄，B錯誤。","detail":{"background":"輸尿管有三個生理性狹窄處，是結石最易卡住的位置：①與腎盂連接的「腎盂輸尿管接合處(UPJ)」；②輸尿管跨越「髂動脈/靜脈交叉處(骨盆緣)」；③與膀胱連接的「輸尿管膀胱接合處(UVJ)」(最窄)。本題問「錯誤者」：B「輸尿管骨盆角」並非標準命名的三大狹窄處之一(正確第二處應為「髂血管交叉/骨盆緣」)，故為答案。臨床上結石卡在UVJ(最窄)最常見。","options":{"A":"腎盂輸尿管接合處(UPJ)是第一狹窄處，正確。","B":"錯誤(本題選此)。「輸尿管骨盆角」非標準三狹窄處之一。","C":"與髂動靜脈交叉處(骨盆緣)是第二狹窄處，正確。","D":"與膀胱連接處(UVJ)是第三(最窄)狹窄處，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"103030-N3-62":{"quick":"ESWL適用「小於2cm」結石，A說大於3cm為錯誤。","detail":{"background":"體外震波碎石術(ESWL)以體外產生的震波聚焦擊碎結石，再隨尿液排出。適應症：「腎臟與輸尿管上段、直徑約小於2 cm」的結石效果最好；太大(>2 cm)或鹿角結石需經皮腎造廔取石術(PCNL)。禁忌與注意：B「使用抗凝血劑或有出血傾向者不適用」(對，震波易致出血)；C術後可能皮下瘀血或輕度血尿(對)；D術後鼓勵多喝水以利碎石排出(對)。本題問「錯誤者」：A「適用於大於3公分以上的腎結石」與適應症相反(應為<2 cm)，為錯誤。","options":{"A":"錯誤(本題選此)。ESWL適用「小於約2 cm」結石，非大於3 cm。","B":"用抗凝血劑或出血傾向者不適用(易出血)，正確。","C":"術後可能皮下瘀血或輕度血尿，正確。","D":"術後鼓勵多喝水利碎石排出，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"103100-N3-59":{"quick":"心衰竭+輸尿管結石病人「不可一味鼓勵多喝水」(會加重心衰)，C錯誤。","detail":{"background":"林先生有「心衰竭」病史合併輸尿管結石。急性期一般護理：A依醫囑止痛劑緩解腎絞痛(對)；B依醫囑抗生素治療/預防感染(對)；D平滑肌鬆弛劑緩解輸尿管痙攣以利結石排出(對)。本題問「錯誤者」：C「應鼓勵林先生多喝水」——一般結石病人應多喝水，但「心衰竭」病人大量補水會加重體液負荷、誘發肺水腫，故此特殊個案「不可一味鼓勵多喝水」，須依心臟功能調整液體量，為錯誤。此題重點在「個別化評估共病(心衰竭)」。","options":{"A":"依醫囑止痛劑緩解疼痛，正確。","B":"依醫囑抗生素治療/預防感染，正確。","C":"錯誤(本題選此)。心衰竭病人大量喝水會加重心臟負荷，不可一味鼓勵多喝水。","D":"平滑肌鬆弛劑緩解輸尿管痙攣，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"104030-N3-60":{"quick":"茶、果汁等含「草酸」會增加草酸鈣結石而非尿酸，C錯誤。","detail":{"background":"尿路結石敘述：A「草酸鈣結石是鈣結石最常見的一類」(對，佔結石約70–80%)；B「尿路結石最常發生在腎臟」(對，多在腎臟形成再下移)；D「長期臥床(骨鈣流失)與痛風(高尿酸)病人是高危險群」(對)。本題問「錯誤者」：C「飲用過多的茶及果汁會增加尿液中的『尿酸』」——茶、菠菜、巧克力等富含「草酸」，過量會增加「草酸鈣」結石風險(而非尿酸)；增加尿酸的是高普林食物與酒。故C將「草酸」誤說成「尿酸」，為錯誤。","options":{"A":"草酸鈣結石是鈣結石最常見一類，正確。","B":"尿路結石最常在腎臟形成，正確。","C":"錯誤(本題選此)。茶/果汁含「草酸」增加草酸鈣結石，非尿酸。","D":"長期臥床與痛風是結石高危險群，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"104100-N3-61":{"quick":"結石最常發生在「腎臟」非膀胱，A錯誤。","detail":{"background":"尿路結石敘述：B「草酸鈣結石是鈣結石最常見一種」(對)；C「副甲狀腺亢進(高血鈣高鈣尿)是結石高危險群」(對)；D「尿酸結石與痛風(高尿酸)有關」(對)。本題問「錯誤者」：A「膀胱是尿路結石最常見的部位」——結石「最常在『腎臟』形成」(尿液在腎盂濃縮、結晶沉澱)，再隨尿流下移卡在輸尿管狹窄處；膀胱結石相對較少(多見於下泌尿道阻塞如前列腺肥大、長期留置導尿管)。故A錯誤。","options":{"A":"錯誤(本題選此)。結石最常發生在「腎臟」而非膀胱。","B":"草酸鈣結石是鈣結石最常見一種，正確。","C":"副甲狀腺亢進是結石高危險群，正確。","D":"尿酸結石與痛風有關，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"105030-N3-61":{"quick":"腎絞痛放射到「腹股溝/會陰」非手臂，B錯誤。","detail":{"background":"尿路結石(腎絞痛)臨床表徵：A「突發性、尖銳劇烈的疼痛」(結石移動刮傷或阻塞引起痙攣)；C「血尿」(結石刮傷尿路黏膜)；D「噁心、嘔吐」(內臟自律神經反射)。疼痛部位與放射：腎/輸尿管上段結石→腰部、側腹痛；輸尿管下段→放射至「同側下腹、腹股溝、會陰、外生殖器、大腿內側」。本題問「錯誤者」：B「疼痛會輻射到手臂」——腎絞痛不會放射到手臂(放射到手臂是心絞痛特徵)，故B錯誤。","options":{"A":"突發性尖銳劇痛(腎絞痛)，正確。","B":"錯誤(本題選此)。腎絞痛放射至腹股溝/會陰，不會輻射到手臂。","C":"血尿(結石刮傷黏膜)，正確。","D":"噁心、嘔吐(內臟反射)，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"106030-N3-59":{"quick":"合併感染的結石應「立即經驗性抗生素」，不能等培養才用藥，A錯誤。","detail":{"background":"林先生發燒、小便混濁(感染)+輸尿管結石0.5 cm。急性期護理：B屬突發尖銳腎絞痛，依醫囑止痛(對)；C平滑肌鬆弛劑緩解輸尿管痙攣(對)；D結石0.5 cm小，鼓勵多喝水可能自行排出(對)。本題問「錯誤者」：A「等培養出細菌種類後再用特定抗生素」——合併發燒感染(可能腎盂腎炎/敗血)的結石屬急症，應「立即先給經驗性廣效抗生素」、同時送培養，不能枯等培養結果(延誤恐致敗血症)，故A錯誤。","options":{"A":"錯誤(本題選此)。合併感染應「立即經驗性抗生素」，不能等培養才用藥。","B":"依醫囑止痛劑緩解腎絞痛，正確。","C":"平滑肌鬆弛劑緩解輸尿管痙攣，正確。","D":"結石0.5 cm小，鼓勵多喝水利排出，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"106030-N3-62":{"quick":"鹿角結石(磷酸銨鎂)是「鹼性」結石，應酸化尿液且ESWL效果差，B說可用ESWL為錯誤。","detail":{"background":"鹿角結石(staghorn calculus)：A是「感染性結石」(對，與Proteus等產尿素酶細菌相關)；其成分多為「磷酸銨鎂(struvite)」，在「鹼性尿」中形成，故D「酸化尿液預防復發」(對)、C「限制高磷酸食物與碳酸飲料」(對)。本題問「錯誤者」：B「可利用體外震波碎石術碎石」——鹿角結石體積大(約5 cm)、佔據腎盂腎盞，ESWL「效果不佳」，主要治療為「經皮腎造廔取石術(PCNL)」，故B錯誤。","options":{"A":"鹿角結石是感染性結石(Proteus等)，正確。","B":"錯誤(本題選此)。鹿角結石大，ESWL效果差，主要用PCNL。","C":"限制高磷酸食物及碳酸飲料，正確。","D":"酸化尿液是預防磷酸銨鎂結石復發方法之一，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"106110-N3-60":{"quick":"草酸鈣結石溶解度「不受尿液pH影響」(C)。","detail":{"background":"尿路結石的形成與尿液pH關係：①「尿酸結石、胱胺酸結石」在「酸性尿」易形成→治療以「鹼化尿液」；②「磷酸鈣、磷酸銨鎂(感染性)結石」在「鹼性尿」易形成→治療以「酸化尿液」；③而「草酸鈣結石」的溶解度「不受尿液pH明顯影響」(在各pH皆可能沉澱)，故無法靠調整尿液酸鹼來溶解。本題問「與尿液pH無關」者即C草酸鈣。記憶：尿酸/磷酸鹽結石與pH有關，草酸鈣與pH無關。","options":{"A":"尿酸結石在酸性尿形成，與pH有關。","B":"磷酸鈣結石在鹼性尿形成，與pH有關。","C":"正解。草酸鈣結石溶解度不受尿液pH影響。","D":"胱胺酸結石在酸性尿形成，與pH有關。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"106111-N3-60":{"quick":"ESWL震波須與心電圖「R波」同步，避開心臟易損期(C)。","detail":{"background":"體外震波碎石術(ESWL)施行時，震波會與病人「心電圖的R波同步觸發」——在R波後一段安全期釋放震波，避開心室的「相對不反應期/T波(心室再極化的易損期)」，以避免誘發心律不整(如心室顫動)。故震波須與「R波」同步，答案C。這是ESWL重要的安全機制，尤其對有心律問題者更須注意。","options":{"A":"P波是心房去極化，非震波同步參考。","B":"Q波非震波同步觸發點。","C":"正解。震波與R波同步，避開心室易損期防心律不整。","D":"T波是心室再極化易損期，須「避開」而非同步。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"107110-N3-59":{"quick":"預防結石=每日多喝水3000~4000mL分次喝(A)。","detail":{"background":"預防尿路結石復發最重要的是「大量且分次飲水」：A「無特殊限制下每日喝水3000–4000 mL」(對)——稀釋尿液、增加尿量沖出結晶。其他錯誤：B「一次喝足」不對，應「分次、平均」整天攝取維持持續尿流(一次大量喝水尿很快排掉、之後又濃縮)；C「不可用茶、啤酒、飲料代替開水」——茶含草酸、酒精會升尿酸並利尿脫水，反促結石；D「避免所有含鈣食品」錯誤——過度限鈣反而增加腸道草酸吸收、增加草酸鈣結石，應「適量正常鈣攝取」而非全避。故正確A。","options":{"A":"正解。無限制下每日喝水3000~4000 mL(分次)。","B":"應分次平均喝水，非一次喝足，錯誤。","C":"不可用茶/啤酒/飲料代替開水(含草酸、升尿酸)，錯誤。","D":"不應避免所有含鈣食品(過度限鈣反增草酸吸收)，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"107110-N3-61":{"quick":"鹿角結石位於「腎盂腎盞」非輸尿管膀胱接合處，A錯誤。","detail":{"background":"鹿角結石(staghorn calculus)：因形似鹿角，是「填滿腎盂與腎盞」的大型結石(A「位於輸尿管至膀胱結合處」錯誤——它在腎盂腎盞而非輸尿管下段)。B「與尿路感染有關」(對，產尿素酶細菌如Proteus使尿鹼化)；C「成分多為磷酸銨鎂(struvite)結晶」(對)；D「疼痛是常見症狀」(對，但有些大結石反而症狀隱匿)。本題問「錯誤者」即A。","options":{"A":"錯誤(本題選此)。鹿角結石位於「腎盂腎盞」，非輸尿管膀胱接合處。","B":"與尿路感染(產尿素酶菌)有關，正確。","C":"成分多為磷酸銨鎂(struvite)結晶，正確。","D":"疼痛為常見症狀，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"110030-N3-63":{"quick":"尿酸結石=避免高普林(香菇豆類海鮮內臟)減少尿酸生成(C)。","detail":{"background":"尿酸結石處置正確者為C「避免攝取香菇、豆類、海鮮與內臟等(高普林食物)，減少尿酸形成」。其他錯誤：A「Probenecid降尿酸」是「促進尿酸排泄」的藥，會增加尿中尿酸濃度反而「促進尿酸結石形成」，不適合尿酸結石病人(尿酸結石應用降尿酸生成的allopurinol並鹼化尿液)；B把「肉類」當鹼性食物錯誤(肉類是酸灰性、會酸化尿液不利尿酸結石；且尿酸結石應鹼化尿液)；D「茶或啤酒增加尿量」錯誤(茶含草酸、酒升尿酸，應喝開水)。故正確C。","options":{"A":"Probenecid促尿酸排泄反增尿中尿酸、促結石，不適合，錯誤。","B":"肉類是酸灰性(酸化尿液)，不利尿酸結石，錯誤。","C":"正解。避免高普林食物(香菇豆類海鮮內臟)減少尿酸生成。","D":"茶含草酸、啤酒升尿酸，不可代替開水，錯誤。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"111110-N3-61":{"quick":"腎結石以「腰背痛、噁心嘔吐、發燒」為主；頻尿尿急非腎結石典型(B)。","detail":{"background":"腎臟結石(位於腎盂腎盞)常見臨床症狀：A後背腰部疼痛(腎絞痛)；C噁心、嘔吐(內臟反射)；D若合併感染或阻塞可有寒顫、發燒。本題問「錯誤者」：B「頻尿、尿急」——這是「下泌尿道(膀胱、尿道)刺激」或「輸尿管下段結石靠近膀胱」時的症狀，「腎臟結石」本身位置高、不直接刺激膀胱，較少以頻尿尿急為主，故B非腎結石典型表現，為答案。","options":{"A":"後背腰部疼痛(腎絞痛)是腎結石典型症狀。","B":"錯誤(本題選此)。頻尿尿急是下泌尿道刺激症狀，非腎結石典型。","C":"噁心、嘔吐(內臟反射)，正確。","D":"合併阻塞感染可寒顫發燒，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"111110-N3-62":{"quick":"膀胱結石不適合ESWL(體外震波難對位)，A錯誤。","detail":{"background":"膀胱結石治療：B「尿酸成分時避免內臟、香菇等高普林」(對)；C「預防感染先用廣效抗生素」(對)；D「術後多喝水並監測輸出入量、尿液顏色氣味」(對)。本題問「錯誤者」：A「建議使用體外震波碎石術(ESWL)，較不具侵入性」——膀胱結石位於膀胱、隨體位移動，ESWL難以聚焦對位，「不適合」用ESWL；膀胱結石主要以「經尿道膀胱鏡碎石/取石術(cystolitholapaxy)」處理。故A錯誤。","options":{"A":"錯誤(本題選此)。膀胱結石會移動難聚焦，不適合ESWL，應用膀胱鏡碎石。","B":"尿酸結石避免高普林食物，正確。","C":"預防感染先用廣效抗生素，正確。","D":"術後多喝水並監測輸出入量、尿液性狀，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"112030-N3-65":{"quick":"輸尿管結石以「腰部會陰絞痛、噁心嘔吐、血尿發燒」為主；頻尿尿急非典型(C)。","detail":{"background":"輸尿管結石常見症狀：A「腰部、會陰疼痛」(腎絞痛沿輸尿管走向放射至下腹、腹股溝、會陰)；B「噁心、嘔吐」(內臟反射)；D合併阻塞感染可「寒顫、發燒」。本題問「錯誤者」：C「頻尿、尿急」——這是膀胱刺激症狀，唯有結石下移到「輸尿管最下段(靠近膀胱)」時才可能出現尿急感，並非輸尿管結石的「常見」典型症狀，故依本題以C為錯誤(非典型)。輸尿管結石的標誌是劇烈絞痛+血尿。","options":{"A":"腰部、會陰絞痛(沿輸尿管放射)，正確。","B":"噁心、嘔吐(內臟反射)，正確。","C":"錯誤(本題選此)。頻尿尿急是膀胱刺激症狀，非輸尿管結石常見典型。","D":"合併阻塞感染可寒顫發燒，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"112180-N3-39":{"quick":"CKD第四期(腎功能差)疑結石宜用「不需顯影劑」的逆行性腎盂攝影(C)。","detail":{"background":"CKD第四期病人腎功能差，使用「含碘靜脈顯影劑」的檢查(如靜脈腎盂攝影IVP、腎動脈攝影)會有「顯影劑腎病變(contrast nephropathy)」風險，使腎功能進一步惡化。診斷腎結石時，C「逆行性腎盂攝影(retrograde pyelography)」由膀胱鏡經輸尿管「逆行注入顯影劑」，顯影劑「不經靜脈、不經腎絲球過濾」，對腎功能影響小，較適合腎功能不全者。A腹部超音波雖也無腎毒性，但對輸尿管中段小結石敏感度較低；B腎動脈攝影需大量顯影劑(腎毒);D膀胱鏡看膀胱、非診斷腎結石首選。故本題以C最適當(無顯影劑腎毒性負擔且可清楚顯示上泌尿道結石)。","options":{"A":"超音波無腎毒性但對輸尿管中段小結石敏感度較低。","B":"腎動脈攝影需大量顯影劑，有腎毒性，不適合CKD第四期。","C":"正解。逆行性腎盂攝影顯影劑不經腎過濾，腎毒性低，適合腎功能差者。","D":"膀胱鏡看膀胱，非診斷腎結石首選。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"113180-N3-39":{"quick":"ESWL對「使用抗凝血劑/出血傾向者不適用」，C說均適用為錯誤。","detail":{"background":"體外震波碎石術(ESWL)：A「適用於腎臟及輸尿管上段結石」(對)；B「術後鼓勵多攝取液體利碎石排出」(對)；D「術後嚴重發燒或嚴重血尿應速回診」(對，可能感染或大量出血)。本題問「錯誤者」：C「使用抗凝血劑或有出血傾向的人均適用」——震波會造成腎組織微出血、皮下瘀血，使用抗凝血劑或有出血傾向者「禁用/不適用」ESWL(會大量出血)，故C錯誤。","options":{"A":"適用於腎臟及輸尿管上段結石，正確。","B":"術後多攝取液體利碎石排出，正確。","C":"錯誤(本題選此)。抗凝血劑/出血傾向者「不適用」ESWL(易出血)。","D":"術後嚴重發燒或血尿應速回診，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"114100-N3-39":{"quick":"ESWL術後疼痛應「給止痛」非觀察忍痛，C錯誤。","detail":{"background":"ESWL術後照護：A「攝取開水，勿用茶、啤酒、果汁取代水分」(茶含草酸、酒升尿酸)(對)；B「鼓勵下床活動、多喝水並觀察尿液顏色氣味」(活動助碎石排出)(對)；D「尿酸結石指導避免內臟、香菇、海鮮(高普林)」(對)。本題問「錯誤者」：C「術後疼痛是正常，可先觀察不用止痛藥以免傷害腎臟」——碎石排出時的絞痛應「依醫囑給予止痛劑」緩解，止痛劑不會傷腎(NSAID須留意腎功能但有替代藥)，叫病人忍痛觀察是錯誤照護，故C為答案。","options":{"A":"攝取開水勿用茶/啤酒/果汁取代，正確。","B":"鼓勵下床活動、多喝水並觀察尿液，正確。","C":"錯誤(本題選此)。術後疼痛應依醫囑給止痛劑，非忍痛觀察。","D":"尿酸結石避免高普林食物，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"115030-N3-41":{"quick":"輸尿管鏡碎石術多採「半身/脊髓麻醉」即可，非必須全身麻醉，B錯誤。","detail":{"background":"輸尿管鏡碎石術(URS+雷射/氣壓碎石)：A「沒有體表傷口(經尿道輸尿管鏡)，但術後常放置雙J導管/導尿管24–72小時」引流並支撐輸尿管(對)；C「術後鼓勵多喝水利碎石排出」(對)；D「術後嚴重發燒或嚴重血尿應速回診」(對)。本題問「錯誤者」：B「此為門診手術，但必須接受全身麻醉」——輸尿管鏡碎石術麻醉方式可採「半身(脊髓/硬膜外)麻醉」或全身麻醉，「並非必須全身麻醉」，且多需住院觀察而非單純門診，故B錯誤。","options":{"A":"無體表傷口、術後放置導尿管/雙J管24~72小時，正確。","B":"錯誤(本題選此)。可採半身麻醉，非「必須」全身麻醉。","C":"術後鼓勵多喝水利碎石排出，正確。","D":"術後嚴重發燒或血尿應速回診，正確。"},"sources":["新文京《內外科護理學》泌尿腎臟系統","Harrison 內科學 尿路結石","AUA/EAU 泌尿道結石診治指引"]}},"101030-N3-17":{"quick":"膀胱癌預防是戒菸、多喝水、避染劑；「補充維生素E」非預防措施(B)。","detail":{"background":"膀胱癌的危險因子與預防：①「吸菸」是最重要的危險因子(致癌物經尿液濃縮接觸膀胱黏膜)→戒菸、遠離二手菸(A是預防)；②職業暴露於「芳香胺類染劑、有機溶劑、橡膠、染髮劑」者高危→避免接觸(D是預防)；③「多喝水(每天至少2000 c.c.)」稀釋尿中致癌物、減少接觸時間(C是預防)。本題問「不是預防措施」者：B「定期補充維生素E」——無證據顯示補充維生素E可預防膀胱癌，故為答案。","options":{"A":"不抽菸是膀胱癌最重要的預防措施。","B":"正解(非預防)。補充維生素E無預防膀胱癌的實證。","C":"每天喝水≥2000 c.c.稀釋尿中致癌物，是預防。","D":"避免接觸染劑及有機溶劑，是預防。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"101110-N3-17":{"quick":"膀胱癌最初徵象=「無痛性血尿」(B)。","detail":{"background":"膀胱癌敘述正確者為B「無痛性血尿是最初徵象」——「無痛性、間歇性肉眼血尿」是膀胱癌最典型、最早的警訊，凡無痛性血尿都須排除膀胱癌。其他錯誤：A危險因子是「吸菸、芳香胺染劑、止痛劑(phenacetin)」而非喝酒；C膀胱癌最常見細胞型是「移行上皮癌/泌尿上皮癌(urothelial/transitional cell carcinoma)」而非腺癌；D最佳診斷是「膀胱鏡+切片」，尿液細菌培養是診斷感染而非膀胱癌。故正確B。","options":{"A":"危險因子是吸菸/染劑/止痛劑，非喝酒，錯誤。","B":"正解。無痛性血尿是膀胱癌最初徵象。","C":"最常見為移行(泌尿)上皮癌，非腺癌，錯誤。","D":"最佳診斷是膀胱鏡切片，非尿液細菌培養，錯誤。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"102030-N3-65":{"quick":"膀胱癌早期徵象=「無痛性血尿」(D)。","detail":{"background":"膀胱癌的早期臨床表徵是「無痛性、間歇性肉眼血尿」——因腫瘤表面血管脆弱出血，但早期不痛，常被忽略而延誤。隨腫瘤進展才可能出現頻尿、解尿疼痛、排尿困難等膀胱刺激或阻塞症狀。本題問「早期徵象」者即D無痛性血尿。A排尿困難、B夜尿屬阻塞/刺激症狀(較後期或BPH)，C蛋白尿屬腎絲球疾病，皆非膀胱癌早期特徵。","options":{"A":"排尿困難屬阻塞症狀，非膀胱癌最早徵象。","B":"夜尿非膀胱癌早期特異徵象。","C":"蛋白尿屬腎絲球疾病，非膀胱癌徵象。","D":"正解。無痛性血尿是膀胱癌早期徵象。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"102110-N3-19":{"quick":"放射性同位素治療室不需「長鑷與鉛容器」放室內，A為錯誤(此為密封射源/放射源處理概念混淆)。","detail":{"background":"接受「靜脈注射放射性同位素治療(如放射性碘、放射性藥物)」病人，其體液、排泄物具放射性，防護原則(時間、距離、屏蔽)：B戴手套處理體液與排泄物(對)；C更換的床單留在病室內，待放射性衰減後再處理(對)；D皮膚接觸到病人體液應以肥皂大量清水清洗(對)。本題問「錯誤者」：A「室內需放置長鑷與鉛製容器」——長鑷與鉛容器是用於夾取、儲存「密封固體射源(如近接治療的射源植入)」的設備，而「靜脈注射(非密封)放射性同位素治療」病人體內是分布性放射性，不需在室內放長鑷夾射源、鉛容器，故此措施不適用，為錯誤。","options":{"A":"錯誤(本題選此)。長鑷/鉛容器用於密封固體射源，非靜脈注射(非密封)同位素治療所需。","B":"戴手套處理體液排泄物，正確。","C":"更換床單留室內待衰減再處理，正確。","D":"皮膚接觸體液以肥皂大量清水清洗，正確。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"103030-N3-63":{"quick":"寇克氏囊(Kock pouch)為「可控制式儲尿囊」，不需持續導尿管/引流袋(C)。","detail":{"background":"尿路改道(urinary diversion)手術類型：A「經皮輸尿管造瘻」、B「迴腸導管(ileal conduit)」、D「腎臟造瘻」都是「非控制式」改道，尿液會「持續」由造瘻口流出，需配戴「集尿袋/引流袋」持續收集。C「寇克氏囊(Kock pouch)」是「可控制式(continent)儲尿囊」——以腸段做成有抗逆流瓣膜的儲尿囊，病人定期「自我導尿」排空，不需持續配戴外接集尿袋。本題問「無需持續使用導尿管或引流袋」者即C。","options":{"A":"經皮輸尿管造瘻尿液持續流出，需引流袋。","B":"迴腸導管尿液持續流出，需配戴集尿袋。","C":"正解。寇克氏囊是可控制式儲尿囊，定期自我導尿，不需持續引流袋。","D":"腎臟造瘻尿液持續引流，需引流袋。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"103030-N3-64":{"quick":"腎細胞癌副腫瘤症候群與EPO/PTH/HCG有關；「腎上腺素」不分泌，A不包括。","detail":{"background":"腎細胞癌(renal cell carcinoma)可分泌多種異位荷爾蒙引起「副腫瘤症候群(paraneoplastic syndrome)」：①紅血球生成素(EPO)→紅血球過多症；②副甲狀腺素相關蛋白(PTH-rP/類副甲狀腺素)→高血鈣；③腎素→高血壓；④人類絨毛膜性腺素(HCG)/性腺相關荷爾蒙→性慾改變、第二性徵改變；還有發燒、貧血、肝功能異常等。本題問「不包括」者：A「腎上腺素(adrenaline)」——腎上腺素由腎上腺髓質分泌(與嗜鉻細胞瘤有關)，非腎細胞癌的副腫瘤荷爾蒙，故A不包括。","options":{"A":"正解(不包括)。腎上腺素由腎上腺髓質分泌，非腎細胞癌副腫瘤荷爾蒙。","B":"副甲狀腺素(類PTH)→高血鈣，是其副腫瘤荷爾蒙。","C":"紅血球生成素(EPO)→紅血球過多症，是其副腫瘤荷爾蒙。","D":"人類絨毛膜性腺素(HCG)→性徵改變，是其副腫瘤荷爾蒙。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"103030-N3-65":{"quick":"術後尿量平均20~30 c.c./hr偏少(<30)應立即通報，C需處理。","detail":{"background":"根除性腎切除術後第一天的監測，須立即通知醫師的「異常」資料：C「尿量平均每小時20–30 c.c.」——正常成人術後尿量應「至少30 c.c./hr(0.5 mL/kg/hr)以上」，平均20–30 c.c./hr偏低，提示可能腎灌注不足、血容積不足或剩餘單腎功能受損，須立即評估處理。其他屬正常範圍：A體溫37.5°C(術後輕微低燒可接受)；B Penrose引流液淡紅色(術後初期正常)；D造瘻口/傷口呈紅色(血流灌注良好的正常色)。故答案C。","options":{"A":"體溫37.5°C術後輕微低燒，可接受。","B":"引流液淡紅色為術後初期正常。","C":"正解。尿量20~30 c.c./hr偏低(<30)，須立即通報評估。","D":"造瘻口呈紅色(灌注良好)是正常。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"103100-N3-62":{"quick":"膀胱癌轉移以「淋巴與局部」為主，B說主要血行轉移肺肝骨為錯誤。","detail":{"background":"膀胱癌敘述：A吸菸與大量止痛劑(phenacetin)是危險因子(對)；C主要診斷檢查為膀胱鏡(對)；D治療以外科切除為主、化放療為輔(對)。本題問「錯誤者」：B「常見轉移方式是經由『血液』轉移至肺、肝、骨骼」——膀胱癌「早期主要以局部侵犯與『淋巴轉移(骨盆腔淋巴結)』為主」，血行轉移到肺肝骨多見於「晚期」，並非「常見/最主要」的轉移方式，故B敘述不正確，為答案。","options":{"A":"吸菸與止痛劑(phenacetin)是危險因子，正確。","B":"錯誤(本題選此)。膀胱癌以局部侵犯與淋巴轉移為主，血行轉移多見晚期。","C":"主要診斷檢查為膀胱鏡，正確。","D":"治療以外科切除為主、化放療為輔，正確。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"104030-N3-65":{"quick":"迴腸導管排出黏液是「正常現象」(腸黏膜分泌)，D最適宜。","detail":{"background":"迴腸導管(ileal conduit)以一段「迴腸」做成尿液通道，迴腸黏膜本身會「持續分泌黏液」，故尿液中混有「黏液(mucus)」是「正常現象」，不需緊張、不需灌洗或通報。護理應「告知病人這是正常的腸黏膜分泌」並衛教多喝水稀釋。本題問「最適宜處置」者即D「告訴病人這是正常現象不必緊張」。A通知醫師、B告訴造瘻護理師、C立即灌洗都是不必要的處置。","options":{"A":"黏液是正常現象，不需立即通知醫師。","B":"不需轉告造瘻護理師(本就正常)。","C":"不需灌洗引流管(黏液正常)。","D":"正解。迴腸黏膜分泌黏液為正常現象，安撫衛教即可。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"105030-N3-44":{"quick":"前列腺癌治療與復發指標=「PSA(前列腺特異抗原)」(D)。","detail":{"background":"腫瘤標記與對應癌症：AFP(甲型胎兒蛋白)→肝癌、生殖細胞瘤；CEA(癌胚抗原)→大腸直腸癌等；PAP(前列腺酸性磷酸酶)→舊式前列腺癌標記；「PSA(前列腺特異抗原)」→是前列腺癌「篩檢、治療反應追蹤與復發監測」的最重要指標，治療後PSA下降代表反應良好、回升代表復發。本題問「偵測前列腺癌治療及復發的指標」者即D PSA。","options":{"A":"AFP用於肝癌、生殖細胞瘤，非前列腺癌。","B":"CEA用於大腸直腸癌等，非前列腺癌主要指標。","C":"PAP為舊式前列腺標記，現以PSA為主。","D":"正解。PSA是前列腺癌治療反應與復發監測的指標。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"105090-N3-58":{"quick":"膀胱灌藥應停留「1~2小時」而非僅30分鐘，B不適宜。","detail":{"background":"膀胱內化學藥物灌注(intravesical chemotherapy，如BCG、mitomycin)護理：A灌藥前先排空膀胱(避免稀釋藥物)(對)；C灌藥後每15分鐘協助翻身一次，使藥物均勻接觸膀胱各壁(對)；D觀察有無出血性膀胱炎等合併症(對)。本題問「不適宜者」：B「化學藥物至少停留膀胱中30分鐘」——藥物應停留約「1–2小時」以充分作用，僅停留30分鐘太短、療效不足，故B不適宜。灌藥後排出的尿液具細胞毒性，須注意處理防護。","options":{"A":"灌藥前先排空膀胱避免稀釋，正確。","B":"不適宜(本題選此)。藥物應停留約1~2小時，非僅30分鐘。","C":"每15分鐘翻身使藥物均勻接觸膀胱壁，正確。","D":"觀察出血性膀胱炎等合併症，正確。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"106030-N3-61":{"quick":"腎上腺功能不足=「低血鈉」非高血鈉，B錯誤。","detail":{"background":"根除性腎切除術可能影響同側「腎上腺」，術後須監測「急性腎上腺功能不足(腎上腺危象)」的症狀：醛固酮與皮質醇不足→A「尿量減少」、C「低血壓(休克)」、D「意識程度改變」、低血鈉、高血鉀、低血糖。本題問「錯誤者」：B「高血鈉」——腎上腺功能不足(醛固酮缺乏)會造成「低血鈉、高血鉀」(鈉流失、鉀滯留)，與「高血鈉」相反，故B為錯誤。","options":{"A":"尿量減少(低血壓、灌注差)是腎上腺功能不足表現。","B":"錯誤(本題選此)。腎上腺功能不足為「低血鈉、高血鉀」，非高血鈉。","C":"低血壓(醛固酮/皮質醇不足)是表現。","D":"意識程度改變(低血鈉/低血糖/休克)是表現。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"106030-N3-66":{"quick":"膀胱癌是「無痛性」血尿，C說疼痛性血尿為錯誤。","detail":{"background":"膀胱癌敘述：A與長期暴露於抽菸環境有關(對)；B與大量使用止痛劑(phenacetin)有關(對)；D通常以膀胱鏡檢查診斷(對)。本題問「錯誤者」：C「初期會有疼痛性血尿」——膀胱癌的典型早期表現是「無痛性、間歇性血尿」，正因「無痛」才容易被忽略延誤，故C「疼痛性血尿」與事實相反，為錯誤。","options":{"A":"與抽菸環境暴露有關，正確。","B":"與大量止痛劑(phenacetin)有關，正確。","C":"錯誤(本題選此)。膀胱癌是「無痛性」血尿，非疼痛性。","D":"以膀胱鏡檢查診斷，正確。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"106110-N3-59":{"quick":"可直接「膀胱灌注」治療膀胱癌的是「BCG(卡介苗)」(A)。","detail":{"background":"表淺性、非肌肉侵犯的膀胱癌(尤其原位癌、高危表淺癌)，可用「膀胱內灌注治療」直接把藥物注入膀胱接觸腫瘤：最常用「BCG(卡介苗)」——透過誘發局部免疫反應抑制腫瘤、降低復發；另也可用mitomycin C等化療藥膀胱灌注。本題問「直接灌注於膀胱內治療膀胱癌」者即A BCG。cisplatin、methotrexate、vinblastine等多用於「全身性靜脈化療(如MVAC)」治療侵犯性/轉移性膀胱癌。","options":{"A":"正解。BCG(卡介苗)膀胱灌注，誘發免疫抑制表淺膀胱癌。","B":"cisplatin多用於全身性靜脈化療。","C":"methotrexate為全身化療藥(MVAC方案)。","D":"vinblastine為全身化療藥，非膀胱灌注首選。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"106111-N3-59":{"quick":"Thiotepa主要用於「膀胱灌注」，較不適合靜脈靜注(C)。","detail":{"background":"膀胱癌的化學藥物使用途徑不同：Cisplatin、Doxorubicin、Vinblastine等是「全身性靜脈化療」常用藥(如MVAC方案治療侵犯性/轉移性膀胱癌)。而「Thiotepa」傳統上主要用於「膀胱『內灌注』」治療表淺性膀胱癌(直接接觸黏膜)，全身靜脈給予時骨髓抑制明顯且非其主要用途。本題問「較不適宜經靜脈靜注」者即C Thiotepa(其主要途徑為膀胱灌注)。","options":{"A":"Cisplatin是全身靜脈化療主力，適合靜注。","B":"Doxorubicin可全身靜脈化療。","C":"正解。Thiotepa主要用於膀胱「灌注」，較不適合靜脈靜注。","D":"Vinblastine是全身靜脈化療藥(MVAC)。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"107110-N3-63":{"quick":"無痛性血尿確診膀胱癌的最佳檢查=「膀胱鏡暨切片」(A)。","detail":{"background":"凡「無痛性血尿」都須排除膀胱癌，確立診斷的「最佳(黃金標準)」檢查是「膀胱鏡(cystoscopy)合併切片(biopsy)」——可直接目視膀胱黏膜腫瘤位置、大小、外觀，並取組織做病理確診與分期(是否侵犯肌肉層)。其他輔助：B尿液細胞學(篩檢惡性細胞，敏感度有限，無法定位)；C MRI(分期評估侵犯範圍)；D靜脈腎盂攝影(看上泌尿道充盈缺損)。本題問「最佳診斷檢查」者即A膀胱鏡暨切片。","options":{"A":"正解。膀胱鏡暨切片是膀胱癌確診的黃金標準。","B":"尿液細胞學是篩檢，無法定位與確診分期。","C":"MRI用於分期，非確診首選。","D":"靜脈腎盂攝影看上泌尿道，非膀胱癌確診最佳。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"107110-N3-64":{"quick":"膀胱癌預防不含「每天服維生素E抗氧化劑」，D不適當。","detail":{"background":"預防膀胱癌的護理指導：A不抽菸並遠離二手菸(吸菸是最重要危險因子)；B不吃含防腐劑與化學添加物的食物；C避免接觸染劑及有機溶劑(職業致癌物)。這些皆正確。本題問「不適當者」：D「每天服用維生素E及抗氧化製劑」——並無實證支持補充維生素E/抗氧化劑可預防膀胱癌，不應作為預防指導，故為答案。預防核心是「戒菸、避免致癌物暴露、多喝水」。","options":{"A":"不抽菸並遠離二手菸，正確。","B":"避免防腐劑與化學添加物食物，正確。","C":"避免接觸染劑及有機溶劑，正確。","D":"不適當(本題選此)。補充維生素E/抗氧化劑無預防膀胱癌實證。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"108020-N3-60":{"quick":"膀胱癌初期表徵=「無痛性血尿」(C)。","detail":{"background":"膀胱癌的初期臨床表徵以「無痛性、間歇性肉眼血尿」最典型，是須立即就醫排除膀胱癌的警訊。體重減輕、食慾不振屬全身性、晚期癌症表現；頻尿則屬非特異的膀胱刺激症狀(亦見於感染、BPH)。本題問「初期表徵」者即C無痛性血尿。臨床口訣：任何成人「無痛性血尿」都要先排除泌尿系統腫瘤。","options":{"A":"體重減輕屬晚期全身性表現，非初期。","B":"頻尿非特異(亦見感染/BPH)，非膀胱癌初期典型。","C":"正解。無痛性血尿是膀胱癌初期表徵。","D":"食慾不振屬晚期表現，非初期。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"109110-N3-60":{"quick":"膀胱癌轉移以「淋巴」為主，D說腎臟與淋巴轉移到胸腔淋巴結為錯誤。","detail":{"background":"膀胱癌敘述：A初期最常見症狀是無痛性間歇/持續血尿(對)；B好發於「膀胱側壁、膀胱三角區」，以「泌尿(移行)上皮癌」最多(對)；C橡膠製造、美髮業(染劑)、吸菸者是高危險族群(對)。本題問「錯誤者」：D「以腎臟與淋巴轉移最常見，主要轉移到胸腔淋巴結」——膀胱癌的轉移以「局部侵犯與『骨盆腔淋巴結』轉移」為主(非腎臟、非胸腔淋巴結)，敘述錯誤，為答案。","options":{"A":"初期為無痛性間歇/持續血尿，正確。","B":"好發膀胱側壁、三角區，以泌尿上皮癌最多，正確。","C":"橡膠業、美髮業、吸菸是高危險族群，正確。","D":"錯誤(本題選此)。膀胱癌以「骨盆腔淋巴」轉移為主，非腎臟/胸腔淋巴結。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"109110-N3-64":{"quick":"尿路改道造瘻集尿袋達「1/3~1/2(約1/2)」就應排空，達80%太滿，B不適當。","detail":{"background":"膀胱切除+輸尿管造瘻(尿路改道)術後護理：A教導觀察造瘻口顏色(應紅潤)、大小、形狀(對)；C鼓勵每日攝取2000–3000 mL液體沖洗泌尿道、減少黏液阻塞與感染(對)；D鼓勵表達感受、給予心理支持(身體形象改變)(對)。本題問「不適當者」：B「集尿袋尿液達80%才需排空」——集尿袋應在「達1/3至1/2(約一半)」時就排空，避免袋子過重、過滿牽扯造瘻口、滲漏與逆流，等到80%太滿不適當，為答案。","options":{"A":"觀察造瘻口顏色、大小、形狀，正確。","B":"不適當(本題選此)。集尿袋達約1/2就應排空，非等到80%。","C":"每日攝取2000~3000 mL液體沖洗，正確。","D":"鼓勵表達感受、心理支持，正確。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"110030-N3-64":{"quick":"膀胱癌治療「以外科切除為主、化放療為輔」，B說化放療為主為錯誤。","detail":{"background":"膀胱癌診斷與治療：A尿液細胞學是「最方便」初步篩檢惡性細胞的方式(對)；C膀胱鏡是「確診與定期追蹤」的主要方式(對，膀胱癌易復發需定期膀胱鏡追蹤)；D膀胱化學灌藥適用於「未侵犯肌肉層的表淺性腫瘤」(對)。本題問「錯誤者」：B「以化學治療與放射線治療為主，外科切除為輔」——膀胱癌治療「以外科切除(經尿道腫瘤切除TURBT或膀胱全切除)為主」，化放療為輔，故B主從顛倒，為錯誤。","options":{"A":"尿液細胞學是最方便的惡性細胞篩檢，正確。","B":"錯誤(本題選此)。膀胱癌「以外科切除為主」，化放療為輔。","C":"膀胱鏡是確診與定期追蹤主要方式，正確。","D":"膀胱灌藥用於表淺(未侵犯肌肉)腫瘤，正確。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"110110-N3-62":{"quick":"尿路改道後「攝取酸性食物酸化尿液預防感染」(A)正確。","detail":{"background":"膀胱癌尿路改道術後照護，正確者為A「鼓勵多進食酸性(酸灰性)食物以酸化尿液，可預防感染並減少黏液結晶」。其他錯誤：B造瘻口周圍皮膚的尿酸/磷酸鹽結晶應以「稀醋(酸性)」清除而非碳酸氫鈉(鹼性反促結晶)；C不應限制水分，應「鼓勵多喝水」(2000–3000 mL)沖洗、稀釋減少結石與感染；D造瘻口應為「紅潤、濕潤」(腸黏膜血流灌注良好)，「暗紅/發黑、乾燥」反而是缺血壞死警訊須返診，且腸黏膜分泌黏液(黏性分泌)是正常現象。故正確A。","options":{"A":"正解。多進食酸性食物酸化尿液可預防感染。","B":"造瘻口結晶應以「稀醋」清除，碳酸氫鈉(鹼性)反促結晶，錯誤。","C":"不應限水，應多喝水沖洗，錯誤。","D":"造瘻口應紅潤濕潤，暗紅乾燥才是缺血警訊；黏液分泌正常，錯誤。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"111030-N3-43":{"quick":"PSA可作為前列腺癌「治療效果」追蹤指標(D)。","detail":{"background":"前列腺癌敘述正確者為D「前列腺特異性抗原(PSA)濃度可作為治療效果的參考」——治療後PSA下降代表反應良好、回升提示復發，是追蹤利器。其他錯誤：A藥物治療多用「抗雄性素/雄性素阻斷(去勢治療)」而非「使用雄性素」(雄性素反會刺激前列腺癌生長)；B放射治療現多用直線加速器、近接治療，「鈷60」已非最常用；C「鹼性磷酸酶(ALP)」升高反映「骨轉移」而非診斷前列腺癌本身(診斷用PSA與切片)。故正確D。","options":{"A":"前列腺癌應「阻斷雄性素」非使用雄性素，錯誤。","B":"放療現多用直線加速器，鈷60非最常用，錯誤。","C":"鹼性磷酸酶升高反映骨轉移，非診斷前列腺癌依據，錯誤。","D":"正解。PSA可作為前列腺癌治療效果與復發追蹤指標。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"111110-N3-64":{"quick":"腎臟癌以「腎細胞癌」最常見(A)。","detail":{"background":"腎臟癌敘述正確者為A「以腎細胞癌(renal cell carcinoma)最常見」(成人腎臟惡性腫瘤約85%)。其他錯誤：B腎細胞癌最常轉移到「肺臟」(其次骨、肝)而非腦部；C「腹脇部疼痛」非最早期症狀——腎癌早期常無症狀(沉默)，經典三徵(血尿、腰痛、可觸及腫塊)出現時多已晚期，最常見的初期表現是「無痛性血尿」；D危險因子是「抽菸、肥胖、高血壓」與暴露於「鎘、石綿」等，而非「汞」。故正確A。","options":{"A":"正解。腎臟癌以腎細胞癌最常見(約85%)。","B":"最常轉移到肺臟，非腦部，錯誤。","C":"腎癌早期多無症狀，腹脇疼痛非最早期，錯誤。","D":"危險因子是抽菸/肥胖/高血壓/鎘，非汞，錯誤。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"111110-N3-65":{"quick":"腎細胞癌對化療與荷爾蒙療法「反應差」，C說顯著效果為錯誤。","detail":{"background":"腎臟癌(腎細胞癌)治療：A「根除性腎切除術是初期(局限性)最有效的治療」(對)；B放射線療法可緩和「骨轉移」病灶疼痛(對)；D術後監測輸出入量、維持尿量30–50 mL/hr(對)。本題問「錯誤者」：C「化學治療和荷爾蒙療法會有顯著效果」——腎細胞癌對傳統化療與荷爾蒙療法「反應差(不敏感)」，現代多用「標靶治療(如TKI)、免疫療法」，故C「顯著效果」與事實相反，為錯誤。","options":{"A":"根除性腎切除是初期最有效治療，正確。","B":"放療可緩和骨轉移病變，正確。","C":"錯誤(本題選此)。腎細胞癌對化療與荷爾蒙療法反應差，非顯著效果。","D":"術後監測輸出入量、維持尿量30~50 mL/hr，正確。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"112110-N3-60":{"quick":"前列腺癌好發於前列腺「周邊葉(後葉)」非中葉，D錯誤。","detail":{"background":"前列腺癌敘述：A排尿困難、頻尿、血尿、尿瀦留是常見症狀(腫瘤壓迫尿道)(對)；B直腸指診(摸到硬結節)與PSA是篩檢診斷方法(對)；C轉移最常到「骨骼(脊椎)」造成背痛、腰痛，並可有血鈣異常(對)。本題問「錯誤者」：D「前列腺癌好發於前列腺『中葉』」——前列腺「癌」好發於「周邊葉(後葉、外圍區peripheral zone)」，故肛門指診摸得到硬結節；而「良性前列腺肥大(BPH)」才好發於「中葉/移行區」壓迫尿道。D把癌的好發部位搞錯，為錯誤。","options":{"A":"排尿困難、頻尿、血尿、尿瀦留是常見症狀，正確。","B":"直腸指診與PSA是篩檢診斷方法，正確。","C":"最常骨轉移致背痛腰痛、血鈣異常，正確。","D":"錯誤(本題選此)。前列腺「癌」好發於「周邊葉(後葉)」，中葉是BPH好發處。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"112110-N3-64":{"quick":"間歇性無痛血尿=膀胱癌、腎臟癌(泌尿腫瘤)→34。","detail":{"background":"「間歇性、無痛性血尿」是泌尿系統「腫瘤」的典型警訊。本題：3膀胱癌、4腎臟癌(腎細胞癌)都以「無痛性間歇血尿」為早期/常見表現(對)。而1尿道炎、2輸尿管結石的血尿多「伴隨疼痛或排尿不適」(尿道炎有排尿疼痛、結石有絞痛)，非「無痛」。故會出現「間歇性無痛血尿」者為34，答案D。臨床要點：無痛性血尿先想泌尿腫瘤。","options":{"A":"含1(尿道炎，血尿伴疼痛)非無痛。","B":"含1錯誤。","C":"含2(輸尿管結石，血尿伴絞痛)非無痛。","D":"正解。3膀胱癌+4腎臟癌以間歇性無痛血尿表現。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"113180-N3-41":{"quick":"腎細胞癌會分泌「EPO過多致紅血球增多」，C說EPO不足為錯誤。","detail":{"background":"腎臟癌(腎細胞癌)臨床表徵：A常見「間歇性無痛血尿」(對)；B晚期可同時出現「血尿、後腰疼痛、腹部腫塊」三徵(對)；D可分泌「類副甲狀腺素(PTH-rP)」造成「高血鈣」(副腫瘤症候群)(對)。本題問「錯誤者」：C「造成腎功能變差，導致紅血球生成素(EPO)不足(貧血)」——腎細胞癌反而常「異位分泌EPO過多→紅血球『增多』症(polycythemia)」，而非EPO不足致貧血，故C與其副腫瘤特性相反，為錯誤。","options":{"A":"常見間歇無痛性血尿，正確。","B":"晚期同時血尿、後腰痛、腹部腫塊(三徵)，正確。","C":"錯誤(本題選此)。腎細胞癌異位分泌EPO「過多」致紅血球增多，非EPO不足。","D":"分泌類副甲狀腺素致高血鈣，正確。"},"sources":["新文京《內外科護理學》泌尿腫瘤","Harrison 內科學 泌尿生殖系統腫瘤","NCCN 膀胱癌/腎癌/前列腺癌指引"]}},"101030-N3-13":{"quick":"BPH是「頻尿」非「多尿」(尿量不增)，多尿敘述錯誤者B。","detail":{"background":"良性前列腺肥大(BPH)因增生的前列腺壓迫尿道造成「阻塞性與刺激性下泌尿道症狀」：①刺激性——A頻尿、夜尿、尿急；②阻塞性——D排尿困難、尿流變細變慢、尿流中斷、餘尿感、用力解尿；③晚期殘尿過多可滿溢造成C「滿溢性尿失禁」。本題問「錯誤(非典型)」者：B「多尿(polyuria)」——多尿指「24小時總尿量增加」(見於糖尿病、尿崩症)，BPH是「頻尿(排尿次數多但每次量少)」而非總尿量增加，故B為錯誤。","options":{"A":"頻尿是BPH刺激性症狀，正確表徵。","B":"錯誤(本題選此)。BPH是「頻尿」非「多尿」(總尿量不增加)。","C":"殘尿過多滿溢→尿失禁，是BPH表徵。","D":"排尿困難(阻塞)是BPH典型表徵。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"103030-N3-61":{"quick":"「泌尿道感染者不可」做尿路動力學檢查(會散播感染)，C錯誤。","detail":{"background":"尿路動力學檢查(urodynamic study)評估膀胱與尿道功能(尿流速、膀胱容積壓力、餘尿、尿道壓力)，用於評估BPH排尿障礙。護理：A目的是評估尿流大小與排尿力量(對)；B檢查前讓膀胱充盈(多喝水)以利測量(對)；D檢查後多喝水預防感染(對，因侵入性導管置入)。本題問「錯誤者」：C「有泌尿道感染者仍可以進行此檢查」——「有急性泌尿道感染者『不應』做尿路動力學檢查」(導管會把感染往上散播、且發炎會影響測量結果)，應先治療感染，故C錯誤。","options":{"A":"目的是評估尿流大小及排尿力量，正確。","B":"檢查前多喝水膨脹膀胱以利測量，正確。","C":"錯誤(本題選此)。有泌尿道感染者「不可」做此檢查(會散播感染)。","D":"檢查後多喝水預防感染，正確。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"103100-N3-63":{"quick":"BPH壓迫的是「尿道」非肛門口；B說阻塞肛門致排便困難為錯誤。","detail":{"background":"BPH敘述：A夜尿常是最早出現的症狀(對)；C殘尿(尿瀦留)易反覆泌尿道感染(對)；D長期阻塞使尿液逆流、腎積水，久之造成腎功能衰退(對)。本題問「錯誤者」：B「腫大的前列腺阻塞『肛門口』造成排便困難」——前列腺位於膀胱出口、包繞「尿道」，肥大時壓迫的是「尿道」造成排尿困難，「不會阻塞肛門口造成排便困難」(肛門指診可摸到肥大前列腺，但不阻塞肛門)，故B錯誤。","options":{"A":"夜尿是BPH最早出現的症狀之一，正確。","B":"錯誤(本題選此)。BPH壓迫「尿道」致排尿困難，非阻塞肛門口致排便困難。","C":"尿瀦留(殘尿)易反覆泌尿道感染，正確。","D":"長期阻塞逆流→腎積水→腎功能衰退，正確。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"104030-N3-66":{"quick":"「膀胱殘餘尿量」由超音波/導尿測得，非尿路動力學主要項目，A為答案。","detail":{"background":"尿路動力學檢查可測得的項目：B「尿流速(uroflowmetry)」、C「膀胱容積壓力(膀胱內壓測量cystometry)」、D「尿道壓力分布(尿道壓力測量)」——評估膀胱逼尿肌與尿道括約肌的協調與排尿功能。本題問「無法由尿路動力學得知」者：A「膀胱殘餘尿量(餘尿)」——餘尿主要是排尿後以「超音波膀胱掃描或導尿」測量殘留尿量，雖部分整合系統可估，但「殘餘尿量」本身屬另以超音波/導尿測得的指標，故依本題A為答案(非尿路動力學的直接測量項目)。","options":{"A":"正解。膀胱殘餘尿量主要以超音波/導尿測量，非尿路動力學直接得知。","B":"尿流速是尿路動力學可測項目。","C":"膀胱容積壓力是尿路動力學可測項目。","D":"尿道壓力是尿路動力學可測項目。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"106110-N3-62":{"quick":"最大尿流速<10 mL/秒顯示尿道出口阻塞(D)。","detail":{"background":"尿流速(uroflowmetry)是評估排尿功能的非侵入性檢查。正常成年男性最大尿流速(Qmax)約15 mL/秒以上；當「膀胱容積壓力正常(逼尿肌收縮力足夠)」但「最大尿流速<10
