 mL/秒」時，代表尿流受阻，提示「尿道出口阻塞」(如BPH壓迫尿道)。本題問「最大尿流速低於下列何者即顯示尿道出口阻塞」者即D 10 mL/秒。(15以上正常、10–15可疑、<10明確阻塞。)","options":{"A":"40 mL/秒過高，非阻塞判斷標準。","B":"30 mL/秒仍屬正常範圍。","C":"20 mL/秒尚屬正常。","D":"正解。最大尿流速<10 mL/秒顯示尿道出口阻塞。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"106111-N3-61":{"quick":"BPH致膀胱小樑/假性憩室/膀胱壁增厚；「膀胱結石」非膀胱壁變化本身，B為答案。","detail":{"background":"BPH長期尿道阻塞，膀胱逼尿肌須用力對抗高阻力排尿，造成「膀胱壁的代償性變化」：A「膀胱內小樑(trabeculation)形成」(肌束肥厚突起)、C「假性憩室(pseudodiverticula)形成」(黏膜經肌束間薄弱處膨出)、D「膀胱壁組織增厚(逼尿肌肥厚)」。本題問「錯誤(非膀胱壁變化)」者：B「膀胱內結石形成」——膀胱結石是「殘尿滯留→尿液濃縮結晶」的『併發症』，並非膀胱「壁」結構本身的變化，故依本題B為答案(問膀胱壁變化中的不符項)。","options":{"A":"膀胱內小樑形成(肌束肥厚)是膀胱壁變化，正確。","B":"錯誤(本題選此)。膀胱結石是殘尿併發症，非膀胱「壁」結構變化本身。","C":"假性憩室形成是膀胱壁變化，正確。","D":"膀胱壁組織增厚(逼尿肌肥厚)是膀胱壁變化，正確。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"107110-N3-65":{"quick":"前列腺切除術膀胱灌洗應用「等張無菌生理食鹽水」非蒸餾水，C錯誤。","detail":{"background":"前列腺切除術(尤TURP)護理：A術前2天清淡低渣液體飲食減少術後解便用力(對)；B放置「三叉(三腔)導尿管」一腔氣囊固定、一腔引流、一腔持續膀胱灌洗(對)；D術後第一天尿液可能呈鮮紅色(術後出血，隨時間轉淡)(對)。本題問「錯誤者」：C「以『蒸餾水』進行膀胱灌洗」——膀胱灌洗應用「等張的無菌生理食鹽水(0.9% NaCl)」；蒸餾水/低張溶液會因低滲透壓造成「水中毒、紅血球溶血、低血鈉(經前列腺創面血竇吸收)」，是禁忌，故C錯誤。","options":{"A":"術前2天清淡低渣液體飲食，正確。","B":"放置三叉導尿管引流並膀胱灌洗，正確。","C":"錯誤(本題選此)。膀胱灌洗應用「等張生理食鹽水」，蒸餾水(低張)會致溶血/低血鈉。","D":"術後第一天可能鮮紅色尿液(出血)，正確。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"108110-N3-61":{"quick":"最大尿流速僅8 mL/秒(<10)=尿道出口阻塞→前列腺肥大(B)。","detail":{"background":"尿流速檢查中「最大尿流速為8 mL/秒」明顯低於正常(<10即提示尿道出口阻塞)，反映排尿時尿流受阻。在選項中最可能造成「尿道出口阻塞、尿流速下降」的是「前列腺肥大(BPH)」——增生的前列腺壓迫尿道使尿流變細變慢。A急性腎絲球腎炎、C腎病症候群是腎絲球疾病(以蛋白尿血尿水腫為主、不造成尿流阻塞)；D急性尿路感染以排尿疼痛頻尿為主、不一定降尿流速。故最可能診斷為B前列腺肥大。","options":{"A":"急性腎絲球腎炎不造成尿道出口阻塞。","B":"正解。最大尿流速8 mL/秒(<10)提示尿道出口阻塞=前列腺肥大。","C":"腎病症候群是腎絲球疾病，不阻塞尿流。","D":"急性尿路感染以排尿疼痛為主，非尿流速下降為主。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"110030-N3-66":{"quick":"TURP術後「逆行性射精常是『永久性』」非暫時性，A錯誤。","detail":{"background":"經尿道前列腺切除術(TURP)術後指導：B 3個月內避免騎腳踏車、跑步(避免會陰部壓迫與出血)；C避免上樓梯、用力(腹內壓增加易出血)；D避免坐浴或熱敷下腹部(血管擴張增加出血)。這些皆正確。本題問「錯誤者」：A「逆行性射精為術後常見『暫時性』的問題」——TURP破壞膀胱頸/內括約肌，使射精時精液逆流入膀胱，「逆行性射精常是『永久性』」的常見後遺症(非暫時性)，雖不影響健康但影響生育，須術前告知，故A「暫時性」錯誤。","options":{"A":"錯誤(本題選此)。TURP後逆行性射精常是「永久性」後遺症，非暫時性。","B":"3個月內避免騎車跑步(避免會陰壓迫出血)，正確。","C":"避免上樓梯/用力(腹內壓增加易出血)，正確。","D":"避免坐浴熱敷下腹(血管擴張易出血)，正確。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"110030-N3-67":{"quick":"BPH合併症是「滿溢性」非壓力性尿失禁，C錯誤。","detail":{"background":"BPH(尿道阻塞)的合併症：A長期阻塞逆流→腎積水→「尿毒症(腎功能衰退)」；B殘尿滯留→尿液濃縮→「膀胱結石」；D殘尿與器械操作→「尿道炎/泌尿道感染」。本題問「錯誤(非BPH合併症)」者：C「壓力性尿失禁」——BPH造成的是「『滿溢性』尿失禁」(膀胱過度脹滿、殘尿滿溢漏出)；而「壓力性尿失禁」是骨盆底肌鬆弛(多見於經產婦女、咳嗽腹壓增加時漏尿)，與BPH機轉不同，故C非BPH合併症，為答案。","options":{"A":"尿毒症(長期阻塞致腎功能衰退)是BPH合併症。","B":"膀胱結石(殘尿濃縮)是BPH合併症。","C":"錯誤(本題選此)。BPH造成「滿溢性」尿失禁，非壓力性尿失禁。","D":"尿道炎/泌尿道感染(殘尿)是BPH合併症。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"111030-N3-68":{"quick":"TURP是BPH常用術式但「非第一線」(第一線是藥物/觀察)，A錯誤。","detail":{"background":"經尿道前列腺切除術(TURP)敘述：B手術吸收過多低張沖洗液會致「TURP症候群(低血鈉、水中毒、腦水腫)」須注意意識(對)；C出血是最常見合併症，術後持續以生理食鹽水膀胱灌洗(對)；D若損傷尿道內括約肌可致逆行性射精(對)。本題問「錯誤者」：A「TURP是良性前列腺肥大『第一線最常用』的治療」——BPH第一線治療是「觀察追蹤與藥物(α阻斷劑、5α還原酶抑制劑)」，手術(TURP)用於藥物無效、反覆感染、結石、尿瀦留、腎功能受損等情況，故TURP「非第一線」，A錯誤。","options":{"A":"錯誤(本題選此)。BPH第一線是藥物/觀察，TURP用於藥物無效或併發症時，非第一線。","B":"吸收過多沖洗液致TURP症候群(腦水腫)，須注意意識，正確。","C":"出血是最常見合併症，術後持續膀胱灌洗，正確。","D":"內括約肌受損可致逆行性射精，正確。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"111110-N3-63":{"quick":"前列腺「癌」好發於「周邊葉(後葉)」非中葉，B錯誤。","detail":{"background":"前列腺肥大與前列腺癌比較：A兩者皆可有排尿困難、頻尿、尿瀦留等阻塞症狀(對)；C BPH常合併膀胱結石、尿路感染(殘尿)(對)；D直腸指診與PSA是篩檢診斷方法(對)。本題問「錯誤者」：B「前列腺癌與雄性素有關，好發於前列腺『中葉』」——前列腺「癌」好發於「周邊葉(後葉、外圍區)」(故指診可摸到硬結節)；好發於「中葉(移行區)」的是「良性前列腺肥大(BPH)」。B把癌好發部位寫成中葉，錯誤。","options":{"A":"排尿困難、頻尿、尿瀦留是兩者共同症狀，正確。","B":"錯誤(本題選此)。前列腺「癌」好發於「周邊葉(後葉)」，中葉是BPH好發處。","C":"BPH常合併膀胱結石、尿路感染，正確。","D":"直腸指診與PSA是篩檢診斷方法，正確。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"113030-N3-41":{"quick":"BPH是前列腺「細胞增生(hyperplasia)」非「細胞本身肥大」，A錯誤。","detail":{"background":"BPH敘述：B尿路動力學發現「最大尿流速減低」(尿道阻塞)(對)；C病人常主訴頻尿、餘尿感(解不乾淨)(對)；D肛門(直腸)指診可評估前列腺肥大的程度與質地(對)。本題問「錯誤者」：A「是前列腺體的『細胞本身肥大(hypertrophy)』所致」——BPH正確的病理是前列腺「細胞『數目增生(hyperplasia)』」(尤移行區基質與腺體細胞增生)，而非單一細胞體積肥大；雖名為「肥大」，病理本質是「增生」。故A用詞與病理機轉不符，為錯誤。","options":{"A":"錯誤(本題選此)。BPH是細胞「增生(hyperplasia)」，非細胞本身「肥大」。","B":"尿路動力學發現最大尿流速減低，正確。","C":"常主訴頻尿、餘尿感，正確。","D":"肛門指診評估前列腺肥大程度，正確。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"113100-N3-37":{"quick":"BPH逼尿肌長期高壓→形成膀胱「假性憩室」(C)正確。","detail":{"background":"BPH的病理生理，正確者為C「逼尿肌長期壓力上升，產生膀胱內假性憩室」——膀胱為對抗尿道阻塞高阻力，逼尿肌肥厚、肌束間黏膜膨出形成假性憩室。其他錯誤：A頻尿夜尿是「增生『早期』」即出現的「刺激性(儲存)症狀」，非「後期代償現象」；B「膀胱出口阻塞致反覆感染、膀胱壁增厚」雖部分正確，但本題以C為最正確的病生理敘述(膀胱壁增厚是逼尿肌肥厚而非單純感染所致)；D「尿道受壓造成內括約肌『鬆弛』」錯誤——BPH是壓迫使尿道阻力「增加」、尿流變慢，非內括約肌鬆弛。故正解C。","options":{"A":"頻尿夜尿是「早期」儲存症狀，非後期代償，錯誤。","B":"膀胱壁增厚主要是逼尿肌代償肥厚，非單純反覆感染所致，敘述不精確。","C":"正解。逼尿肌長期高壓→膀胱假性憩室形成。","D":"BPH使尿道阻力「增加」尿流變慢，非內括約肌鬆弛，錯誤。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"113180-N3-40":{"quick":"BPH最早出現「頻尿、夜尿」等膀胱儲存症狀(A)正確。","detail":{"background":"BPH症狀與病生理，正確者為A「頻尿和夜尿等膀胱儲存(刺激性)症狀，為增生最早出現的現象」——早期因膀胱受刺激與餘尿增加，先出現頻尿、夜尿、尿急。其他錯誤：B應為「尿道阻力『增加』(非降低)造成逼尿肌代償肥厚」才形成膀胱憩室；C「增生壓迫尿道造成內括約肌『鬆弛』」錯誤(應為尿道阻力增加、尿流變慢，非括約肌鬆弛)；D「膀胱出口阻塞致反覆感染造成膀胱壁增厚」——膀胱壁增厚主因是「逼尿肌代償肥厚」而非感染。故正解A。","options":{"A":"正解。頻尿、夜尿(膀胱儲存症狀)是BPH最早出現的現象。","B":"應為尿道阻力「增加」造成逼尿肌代償，非阻力降低，錯誤。","C":"BPH使尿道阻力增加尿流變慢，非內括約肌鬆弛，錯誤。","D":"膀胱壁增厚主因逼尿肌代償肥厚，非反覆感染，敘述不正確。"},"sources":["新文京《內外科護理學》泌尿系統","Harrison 內科學 良性前列腺肥大","AUA 良性前列腺肥大(BPH)診治指引"]}},"101030-N3-21":{"quick":"大笑、咳嗽腹壓增加漏尿=「壓力性尿失禁」(C)。","detail":{"background":"尿失禁分類：①「壓力性(stress)」——咳嗽、大笑、打噴嚏、提重物等「腹壓增加」時，因骨盆底肌或尿道括約肌張力不足而漏尿，好發於經產婦女、停經後；②「急迫性(urge)」——突然強烈尿意後來不及到廁所即漏尿(膀胱過動);③「滿溢性(overflow)」——膀胱過度脹滿、殘尿滿溢漏出(如BPH、神經性膀胱);④「功能性(functional)」——膀胱功能正常但因行動/認知障礙來不及如廁。本題「大笑或咳嗽時漏尿」屬「壓力性尿失禁」，答案C。","options":{"A":"急迫性是突然強烈尿意後漏尿，非腹壓誘發。","B":"溢出性是膀胱過脹殘尿滿溢，非腹壓誘發。","C":"正解。咳嗽大笑腹壓增加漏尿=壓力性尿失禁。","D":"功能性是行動/認知障礙來不及如廁，非腹壓誘發。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"101030-N3-79":{"quick":"急迫性尿失禁應「膀胱再訓練、延遲排尿」而非「有尿意就尿」，A錯誤。","detail":{"background":"急迫性尿失禁(膀胱過動)護理指導：B做骨盆底肌肉(凱格爾)運動強化控尿；C告知此型「可逆、可治療」給予信心；D做「膀胱再訓練(bladder retraining)」——「逐漸延長排尿間隔、抑制急迫感」以增加膀胱容量、重建控尿。本題問「錯誤者」：A「有尿意感就去尿」——這與膀胱訓練的「延遲排尿、訓練忍尿」原則相反，會強化頻尿與急迫反射、使膀胱容量更小，故A為錯誤的指導。","options":{"A":"錯誤(本題選此)。急迫性應「膀胱再訓練、延遲排尿」，非有尿意就尿。","B":"做凱格爾運動強化骨盆底肌，正確。","C":"告知此型可逆可治療給予信心，正確。","D":"做膀胱再訓練(延長排尿間隔)，正確。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"101110-N3-16":{"quick":"壓力性尿失禁不需「限制飲水」(易脫水、濃尿刺激)，B為錯誤改善法。","detail":{"background":"壓力性尿失禁改善方法：A「減重」(減少腹壓對骨盆底的壓迫)；C「凱格爾氏運動」強化骨盆底肌增加尿道阻力；D「養成定時排尿習慣」避免膀胱過脹。本題問「錯誤者」：B「限制飲水」——過度限水會造成脫水、尿液濃縮刺激膀胱、增加感染與結石風險，並非改善壓力性尿失禁的正確方法(應正常飲水、避免咖啡因等刺激物)，故B錯誤。","options":{"A":"減重減少腹壓，正確改善法。","B":"錯誤(本題選此)。限制飲水會脫水、濃尿刺激膀胱，非正確改善法。","C":"凱格爾運動強化骨盆底肌，正確。","D":"養成定時排尿習慣，正確。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"102030-N3-66":{"quick":"打噴嚏、彎腰漏尿(腹壓增加)=「壓力性尿失禁」(D)。","detail":{"background":"蔡太太62歲、肥胖、生過5胎(多產次)、打噴嚏彎腰時漏尿——這些都是「壓力性尿失禁」的典型特徵：多產次與肥胖使骨盆底肌與尿道括約肌鬆弛，當「腹壓增加(打噴嚏、彎腰、咳嗽)」時尿道無法維持足夠關閉壓力而漏尿。故答案D壓力性。急迫性是強烈尿意後漏尿、反射性見於脊髓損傷、滿溢性是膀胱過脹溢尿，皆與此情境不符。","options":{"A":"急迫性是強烈尿意後漏尿，非腹壓誘發。","B":"反射性見於脊髓損傷神經性膀胱，不符。","C":"滿溢性是膀胱過脹溢尿，不符。","D":"正解。多產肥胖+腹壓增加漏尿=壓力性尿失禁。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"102030-N3-67":{"quick":"壓力性尿失禁最適宜=「教導凱格爾運動」強化骨盆底肌(D)。","detail":{"background":"承上題，蔡太太為壓力性尿失禁，護理指導最適宜的是D「教導凱格爾(Kegel)骨盆底肌肉運動」——規律收縮放鬆骨盆底肌可強化尿道周圍肌肉張力、增加尿道阻力，是壓力性尿失禁的「第一線保守治療」。其他不適宜：A限制水分(脫水濃尿刺激，非正解)；B放置留置導尿管(壓力性尿失禁不需導尿，反增感染);C避免利尿飲料(咖啡因)雖有幫助但非「最」針對性的處置。故最適宜D。","options":{"A":"限制水分會脫水濃尿，非最適宜。","B":"壓力性尿失禁不需留置導尿管(反增感染)。","C":"避免利尿飲料有幫助但非最針對的處置。","D":"正解。教導凱格爾運動強化骨盆底肌，第一線治療。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"102110-N3-4":{"quick":"抗乙醯膽鹼藥是「減少膀胱逼尿肌過動」(治急迫性)，非減少膀胱頸阻力，A錯誤。","detail":{"background":"尿失禁處置：B女性激素改善停經後尿道黏膜萎縮(對)；C陰道前壁修補術上提膀胱頸、增加尿流阻力治壓力性尿失禁(對)；D凱格爾運動增進尿道阻力治壓力性(對)。本題問「錯誤者」：A「給抗乙醯膽鹼(anticholinergic)藥物以減少膀胱頸阻力」——抗乙醯膽鹼藥(如oxybutynin)的作用是「抑制膀胱逼尿肌過度收縮」用於治療「急迫性尿失禁/膀胱過動」，並非「減少膀胱頸阻力」(它反而可能增加殘尿)，故A的作用機轉描述錯誤。","options":{"A":"錯誤(本題選此)。抗乙醯膽鹼藥是抑制逼尿肌過動治急迫性，非減少膀胱頸阻力。","B":"女性激素改善停經後尿道萎縮，正確。","C":"陰道前壁修補術上提膀胱頸增加尿流阻力，正確。","D":"凱格爾運動增進尿道阻力，正確。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"103030-N3-60":{"quick":"膀胱出口阻塞(殘尿滿溢)→「滿溢性尿失禁」(B)。","detail":{"background":"膀胱出口阻塞(如良性前列腺肥大、神經性膀胱、尿道狹窄)會使膀胱無法完全排空、殘尿不斷累積，當膀胱過度脹滿、內壓超過尿道阻力時，尿液「點滴溢出」造成「滿溢性(overflow)尿失禁」。其特徵是膀胱長期脹滿、餘尿多、尿流細弱。本題問「膀胱出口阻塞易導致」者即B滿溢性尿失禁。","options":{"A":"功能性是行動/認知障礙來不及如廁，非阻塞所致。","B":"正解。膀胱出口阻塞→殘尿滿溢→滿溢性尿失禁。","C":"壓力性是腹壓增加漏尿(骨盆底鬆弛)，非阻塞。","D":"急迫性是膀胱過動，非阻塞所致。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"104100-N3-60":{"quick":"恥骨後懸吊術(上提膀胱頸)治療「壓力性尿失禁」(B)。","detail":{"background":"恥骨後膀胱頸懸吊術(retropubic urethropexy，如Burch手術)以手術將膀胱頸與尿道近端「上提固定」於恥骨後韌帶，增加尿道支撐與阻力，是「壓力性尿失禁」(因骨盆底鬆弛、尿道下垂)的外科治療。本題問「恥骨後懸吊術適用」者即B壓力性尿失禁。急迫性以藥物與膀胱訓練、功能性以環境/行為調整、反射性以間歇導尿為主，皆非此術式適應症。","options":{"A":"急迫性以藥物與膀胱訓練為主，非懸吊術。","B":"正解。恥骨後懸吊術上提膀胱頸，治壓力性尿失禁。","C":"功能性以環境與行為調整為主。","D":"反射性以間歇導尿等處理，非懸吊術。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"105030-N3-60":{"quick":"膀胱過動尿失禁保守療法首選「凱格爾運動」(B)。","detail":{"background":"膀胱過動(急迫性尿失禁)的保守療法包括「凱格爾骨盆底肌運動、膀胱再訓練、行為療法、抗膽鹼藥物」。本題問「最適當的保守療法」者為B「凱格爾氏運動」——強化骨盆底肌可協助抑制急迫感與漏尿，是非侵入性第一線保守治療。A陰道圓錐療法多用於壓力性尿失禁的輔助；C「鼓勵排尿訓練」方向不對(急迫性應『延遲排尿、膀胱訓練』增加容量，而非鼓勵頻繁排尿);D間歇性自我導尿用於餘尿過多/神經性膀胱，非膀胱過動首選。故最適當B。","options":{"A":"陰道圓錐多用於壓力性尿失禁輔助。","B":"正解。凱格爾運動是膀胱過動尿失禁的保守療法首選。","C":"急迫性應「延遲排尿、膀胱訓練」，非鼓勵頻繁排尿。","D":"間歇自我導尿用於餘尿多/神經性膀胱，非膀胱過動首選。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"105030-N3-67":{"quick":"產後骨盆底肌鬆弛→「應力(壓力)性尿失禁」(C)。","detail":{"background":"婦女生產後因「骨盆底肌肉與尿道括約肌鬆弛」，當腹壓增加(咳嗽、打噴嚏、提重物)時尿道無法維持關閉壓力而漏尿，屬「應力性(壓力性, stress)尿失禁」。這也是多產次、肥胖、停經後婦女最常見的尿失禁型態。本題問「產後骨盆底鬆弛引發」者即C應力型。處置以凱格爾運動、減重、必要時手術懸吊。","options":{"A":"「急性型」非尿失禁標準分類。","B":"功能型是行動/認知障礙來不及如廁，非骨盆底鬆弛。","C":"正解。產後骨盆底鬆弛→應力(壓力)性尿失禁。","D":"滿溢型是膀胱過脹溢尿，非骨盆底鬆弛。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"105090-N3-59":{"quick":"陰部神經刺激尿道外括約肌「舒張」才能排尿(D)。","detail":{"background":"排尿(micturition)的神經生理：①「排尿中樞」在「薦髓S2–S4」(非L2–L4)；②「副交感神經(骨盆神經)」興奮→膀胱逼尿肌『收縮』、尿道內括約肌放鬆→促進排尿；「交感神經(下腹神經)」興奮→逼尿肌鬆弛、尿道內括約肌『收縮』→儲尿(故B「交感刺激內括約肌收縮而排尿」錯誤，應為儲尿);③「陰部神經(體神經)」控制「尿道外括約肌」——排尿時陰部神經抑制使外括約肌『舒張』，尿才能排出(D正確)。逼尿肌是平滑肌、由自律神經控制，非「意識直接控制」(C錯誤)。故正解D。","options":{"A":"排尿中樞在薦髓S2~S4，非L2~L4，錯誤。","B":"交感刺激內括約肌收縮是「儲尿」而非排尿，錯誤。","C":"逼尿肌由自律神經控制，非意識直接控制收縮，錯誤。","D":"正解。排尿時陰部神經使尿道外括約肌舒張，尿才能排出。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"105090-N3-62":{"quick":"膀胱過動(急迫性)用抗膽鹼藥oxybutynin抑制逼尿肌(D)。","detail":{"background":"減緩膀胱過動(急迫性尿失禁)的藥物是「抗膽鹼/抗蕈毒鹼藥(antimuscarinic)」如「oxybutynin、tolterodine」——抑制膀胱逼尿肌不自主收縮、增加膀胱容量。本題正解D oxybutynin。其他選項用途不同：A doxazosin(α阻斷劑，治BPH/高血壓)；B finasteride(5α還原酶抑制劑，治BPH/縮小前列腺)；C nifedipine(鈣離子阻斷劑，治高血壓)。故減緩膀胱過動者為D。","options":{"A":"doxazosin是α阻斷劑(治BPH/高血壓)，非治膀胱過動。","B":"finasteride是5α還原酶抑制劑(治BPH)，非治膀胱過動。","C":"nifedipine是鈣離子阻斷劑(治高血壓)，非治膀胱過動。","D":"正解。oxybutynin抗膽鹼抑制逼尿肌，治膀胱過動/急迫性尿失禁。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"107030-N3-61":{"quick":"壓力性尿失禁「藥物治療效益有限」(A)，主靠骨盆底肌運動等。","detail":{"background":"應力(壓力)性尿失禁的治療：以「非藥物」為主——B「骨盆底肌肉(凱格爾)運動」、C「生理回饋訓練」(輔助正確收縮骨盆底肌)、D「生活型態修正」(減重、避免提重物、戒咖啡因)皆是有效的第一線保守治療，無效時考慮手術(懸吊、尿道吊帶)。本題問「治療效益『有限』」者：A「藥物」——壓力性尿失禁缺乏特別有效的藥物(α-腎上腺致效劑、女性激素效果有限)，故藥物治療效益有限，為答案。(相對地，藥物對『急迫性』尿失禁的抗膽鹼藥才有效。)","options":{"A":"正解(效益有限)。壓力性尿失禁缺乏有效藥物，藥物治療效益有限。","B":"骨盆底肌運動是有效的第一線治療。","C":"生理回饋訓練輔助正確收縮骨盆底肌，有效。","D":"生活型態修正(減重等)有效。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"108020-N3-61":{"quick":"男性較常見「滿溢型」尿失禁(BPH殘尿滿溢)(C)。","detail":{"background":"不同性別好發的尿失禁型態：女性因尿道短、骨盆底易鬆弛(多產、停經)，最常見「壓力性」與「急迫性」；男性最常見「滿溢型(overflow)」——多因「良性前列腺肥大」造成尿道阻塞、殘尿不斷累積，膀胱過脹後尿液滿溢漏出。本題問「男性較常出現」者即C滿溢型。記憶：男性滿溢型(BPH)、女性壓力型(產後/停經)。","options":{"A":"應力型較常見於女性(產後/停經)。","B":"急迫型(膀胱過動)非男性特有最常見型。","C":"正解。男性較常見滿溢型(BPH殘尿滿溢)。","D":"功能性與行動/認知障礙有關，非男性特有。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"108110-N3-58":{"quick":"日間解尿>8次=「頻尿(frequency)」(B)。","detail":{"background":"排尿異常的定義：「頻尿(frequency)」指在正常飲水下「日間平均解尿次數超過8次」(每次尿量正常或偏少)；「夜尿(nocturia)」指夜間須起床排尿一次以上；「解尿困難」指排尿費力、尿流不順；「尿失禁」指不自主漏尿。本題「日間平均解尿次數超過8次」即「頻尿」，答案B。頻尿可因感染、膀胱過動、BPH、攝取過多水分/咖啡因等多種原因。","options":{"A":"解尿困難指排尿費力，非次數多。","B":"正解。日間解尿>8次=頻尿。","C":"夜尿指夜間起床排尿，非日間次數。","D":"尿失禁是不自主漏尿，非單純次數多。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"109110-N3-61":{"quick":"壓力性尿失禁不應「限制水分」(脫水濃尿)，C錯誤。","detail":{"background":"壓力性尿失禁治療照護：A肥胖者飲食療法適當減重以減少腹壓(對)；B骨盆底肌運動強化肌肉、協助關閉尿道口(對)；D使用「α-腎上腺致效劑」增加尿道出口阻力(對)。本題問「錯誤者」：C「限制每天水分攝取量並配合排尿計畫執行膀胱訓練」——壓力性尿失禁「不應限制水分」(過度限水會脫水、尿液濃縮刺激膀胱、增感染)，且「膀胱訓練」主要用於『急迫性』而非壓力性；故C將不適當的限水與膀胱訓練套用於壓力性尿失禁，為錯誤。","options":{"A":"肥胖者減重減少腹壓，正確。","B":"骨盆底肌運動協助關閉尿道口，正確。","C":"錯誤(本題選此)。壓力性尿失禁不應限制水分(脫水濃尿)，膀胱訓練屬急迫性。","D":"α-腎上腺致效劑增加尿道出口阻力，正確。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"110110-N3-65":{"quick":"「減重避免提重物」是『壓力性』處置，用於急迫性尿失禁最不適當(A)。","detail":{"background":"急迫性尿失禁(膀胱過動)護理：B避免食用刺激膀胱的咖啡、茶、酒(對)；C凱格爾運動強化骨盆底肌幫助抑制急迫感(對)；D擬訂排尿計畫做膀胱訓練、增加膀胱容量(對)。本題問「最不適當者」：A「需減重與避免增加腹壓的活動(如提重物)」——「減重、避免腹壓增加」是針對『壓力性』尿失禁(腹壓誘發漏尿)的處置，對「急迫性(膀胱過動)」尿失禁並非主要重點，故套用於急迫性最不適當，為答案。","options":{"A":"最不適當(本題選此)。減重避免腹壓是「壓力性」處置，非急迫性重點。","B":"避免咖啡茶酒等刺激膀胱食物，正確。","C":"凱格爾運動幫助抑制急迫感，正確。","D":"排尿計畫做膀胱訓練增加容量，正確。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"112030-N3-61":{"quick":"壓力性尿失禁是「尿道括約肌/骨盆底鬆弛」非「膀胱肌肉張力欠佳」，A錯誤。","detail":{"background":"壓力性尿失禁敘述：B好發於「多產次婦女」(陰道分娩使骨盆底鬆弛)(對)；C與「雌激素缺乏」(停經後尿道黏膜萎縮、支撐減弱)有關(對)；D肥胖或搬重物(腹壓增加)會加重症狀(對)。本題問「錯誤者」：A「導因為膀胱肌肉(逼尿肌)張力欠佳」——壓力性尿失禁的根本問題是「尿道括約肌與骨盆底肌張力不足、尿道支撐鬆弛」，使腹壓增加時尿道無法維持關閉，「並非膀胱逼尿肌張力問題」(逼尿肌過動是『急迫性』的機轉)，故A機轉描述錯誤。","options":{"A":"錯誤(本題選此)。壓力性是「尿道括約肌/骨盆底鬆弛」，非膀胱逼尿肌張力欠佳。","B":"好發於多產次婦女(骨盆底鬆弛)，正確。","C":"與雌激素缺乏(停經後尿道萎縮)有關，正確。","D":"肥胖或搬重物(腹壓增加)會加重，正確。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"112110-N3-63":{"quick":"急迫性尿失禁=膀胱訓練+輔助用品(護墊尿布)→23。","detail":{"background":"急迫性尿失禁(膀胱過動)照護正確：2「指導膀胱訓練法」(延長排尿間隔、抑制急迫、增加膀胱容量)；3「指導使用尿失禁輔助用品如護墊、尿布」維持皮膚乾燥、生活品質。而1「給予『副交感神經藥物』」錯誤——副交感(膽鹼性)藥物會「促進逼尿肌收縮」反而加重急迫性，急迫性應用「『抗』膽鹼(抗副交感)藥物」抑制逼尿肌;4「人工尿道括約肌植入術」用於嚴重「壓力性/括約肌功能不全」尿失禁，非急迫性。故正確為23，答案C。","options":{"A":"含1(副交感藥物會加重急迫性)錯誤。","B":"含1、4皆不適用於急迫性。","C":"正解。2膀胱訓練+3尿失禁輔助用品。","D":"含4(人工括約肌)用於壓力性，非急迫性。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"113100-N3-39":{"quick":"凱格爾改善壓力性+定時導尿改善滿溢性→12。","detail":{"background":"尿失禁照護與型態配對：1「凱格爾運動」強化骨盆底肌→改善「壓力性」尿失禁(對)；2「定時導尿法」定期排空膀胱→改善「滿溢性(殘尿過多)」尿失禁(對)。而3「長期留置導尿管」不是改善急迫性的方法(反增感染，且急迫性應用膀胱訓練/抗膽鹼藥);4「膀胱訓練」用於『急迫性』而非「完全性」尿失禁(完全性括約肌喪失多需手術/外接尿器)。故正確為12，答案A。","options":{"A":"正解。1凱格爾改善壓力性+2定時導尿改善滿溢性。","B":"含3(長期導尿改善急迫性)錯誤。","C":"含4(膀胱訓練改善完全性)配對錯誤。","D":"含3、4皆配對錯誤。"},"sources":["新文京《內外科護理學》排尿障礙","Harrison 內科學 尿失禁","國際尿控學會(ICS)尿失禁分類"]}},"101110-N3-55":{"quick":"升糖素(glucagon)有正性肌力作用、可增加心肌收縮力(C)。","detail":{"background":"荷爾蒙與電解質對心血管的影響：C「升糖素(glucagon)可增加心肌收縮力」——glucagon有正性肌力與正性頻率作用(臨床甚至用於β阻斷劑過量解毒)，正確。其他錯誤：A「高血鈣產生血管擴張」錯誤——鈣促進血管平滑肌收縮，高血鈣傾向血管「收縮」；B「高血鉀產生血管收縮」錯誤——高血鉀主要影響心肌興奮性(致心律不整)、對血管反而傾向擴張/抑制；D「兒茶酚胺(catecholamine)使心肌收縮減弱」錯誤——兒茶酚胺(腎上腺素)是強力正性肌力，使心肌收縮「增強」。故正解C。","options":{"A":"高血鈣傾向血管「收縮」，非擴張，錯誤。","B":"高血鉀主要致心律不整，對血管非收縮，錯誤。","C":"正解。升糖素有正性肌力，可增加心肌收縮力。","D":"兒茶酚胺是強力正性肌力，使心肌收縮「增強」，錯誤。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"102030-N3-4":{"quick":"心電圖T波後出現U波是「低血鉀」的徵象(C)。","detail":{"background":"心電圖U波是緊跟在T波之後的小波。當「低血鉀(hypokalemia)」時，心肌再極化延遲，典型心電圖變化為「T波低平、U波明顯(突出)、ST段下降、QT(QU)延長」，嚴重時易引發心律不整(如尖端扭轉)。故心電圖出現明顯U波是「低血鉀」的重要徵象，答案C。對比：高血鉀為T波高尖、QRS增寬；低血鈣為QT延長；本題明確以U波對應低血鉀。","options":{"A":"低血鈣典型為QT延長，非U波。","B":"低血鈉主要影響神經(意識)，非U波。","C":"正解。低血鉀心電圖出現明顯U波(T波低平、ST下降)。","D":"低血鎂可加重低血鉀，但U波直接對應的是低血鉀。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"102030-N3-78":{"quick":"輕敲臉部(顏面神經)誘發肌肉痙攣=Chvostek徵象陽性(低血鈣)(C)。","detail":{"background":"低血鈣會使神經肌肉興奮性增加，有兩個經典理學徵象：①「Chvostek徵象(沃斯特克氏徵象)」——「輕敲耳前(顏面神經處)臉部」誘發同側臉部肌肉抽搐/痙攣；②「Trousseau徵象」——以血壓計壓脈帶充氣加壓上臂3分鐘，誘發手部腕足痙攣(carpal spasm)。本題「輕敲低血鈣病人臉部誘發肌肉痙攣」即「Chvostek徵象陽性」，答案C。(A carpal tetany是腕痙攣表現、B Cullen徵是臍周瘀斑見於腹內出血、D Trousseau是壓脈帶誘發。)","options":{"A":"carpal tetany是腕足痙攣表現，非「輕敲臉部」的徵象名。","B":"Cullen徵是臍周瘀斑(腹內出血)，與低血鈣無關。","C":"正解。輕敲臉部誘發肌肉痙攣=Chvostek徵象陽性(低血鈣)。","D":"Trousseau徵是壓脈帶加壓誘發腕痙攣，非輕敲臉部。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"102110-N3-20":{"quick":"高血鈣護理=「下床活動+大量水分」促進鈣排出(C)。","detail":{"background":"腫瘤病人高血鈣(常因骨轉移、副腫瘤分泌類PTH)護理：C「鼓勵下床活動、增加水分攝取」——活動可減少骨鈣再流失(臥床反加重骨鈣釋出)，大量補水(生理食鹽水)增加尿量促進鈣排出、稀釋血鈣，是正確處置。其他錯誤：A高蛋白飲食非高血鈣處置重點；B「臥床休息」錯誤(臥床會加重骨鈣流失、惡化高血鈣)；D「減少水分」錯誤(應大量補水促鈣排出)。故正解C。高血鈣治療還包括生理食鹽水水化、利尿劑(furosemide促鈣排)、雙磷酸鹽。","options":{"A":"高蛋白飲食非高血鈣處置重點。","B":"臥床休息會加重骨鈣流失、惡化高血鈣，錯誤。","C":"正解。鼓勵下床活動+增加水分，促進鈣排出。","D":"減少水分錯誤，應大量補水促鈣排出。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"102110-N3-48":{"quick":"Kayexalate(陽離子交換樹脂)主要治療「高血鉀」(D)。","detail":{"background":"Kayexalate(polystyrene sulfonate，陽離子交換樹脂)在腸道以「鈉離子交換鉀離子」，使鉀由糞便排出，是治療「高血鉀(hyperkalemia)」的藥物，常用於慢性腎衰竭病人排鉀困難造成的高血鉀。本題問慢性腎衰竭病人接受Kayexalate「主要治療」者即D高血鉀。它不治療酸中毒、高血鎂或低血鈣。","options":{"A":"酸中毒以碳酸氫鈉等治療，非Kayexalate。","B":"高血鎂非Kayexalate適應症。","C":"低血鈣需補鈣，非Kayexalate。","D":"正解。Kayexalate交換樹脂排鉀，治療高血鉀。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"105030-N3-73":{"quick":"尿崩症大量排稀釋尿→血鈉「升高(高血鈉)」非低血鈉，A錯誤。","detail":{"background":"尿崩症(diabetes insipidus)因ADH缺乏(中樞型)或腎臟對ADH無反應(腎因型)，腎臟無法濃縮尿液→「大量排出稀釋尿(多尿，每日可達數公升)、尿比重低(<1.005)」(B口渴、C低尿比重、D多尿皆正確)。大量排水使體內水分流失、血液濃縮→「血鈉『升高』(高血鈉)、血漿滲透壓升高」。本題問「錯誤者」：A「低血鈉」——尿崩症因失水濃縮，血鈉應「升高」而非降低，故A錯誤。","options":{"A":"錯誤(本題選此)。尿崩症大量失水濃縮→血鈉「升高」，非低血鈉。","B":"口渴(失水刺激口渴中樞)，正確。","C":"低尿比重(尿無法濃縮)，正確。","D":"多尿(大量稀釋尿)，正確。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"105090-N3-60":{"quick":"血鈣6.8(低血鈣)致神經肌肉興奮、腸蠕動增加→「便秘」非低血鈣表現，A為答案。","detail":{"background":"血清鈣6.8 mg/dL屬「低血鈣(正常約8.5–10.5)」。低血鈣使神經肌肉興奮性增加，表現為：B「血壓下降」(心肌收縮力減弱)、C「凝血時間延長」(鈣是凝血因子)、D「強直性痙攣(tetany，手足抽搐、喉痙攣)」。腸道平滑肌興奮性增加→腸蠕動增強(可能腹瀉、腸絞痛)。本題問「不會出現」者：A「易致便秘」——便秘是「高血鈣」(腸蠕動減慢)的表現，低血鈣反而腸蠕動增強，故A不會出現，為答案。","options":{"A":"正解(不會出現)。便秘是「高血鈣」表現；低血鈣腸蠕動「增強」。","B":"低血鈣心肌收縮力減弱→血壓下降，會出現。","C":"鈣是凝血因子，低血鈣凝血時間延長，會出現。","D":"低血鈣神經肌肉興奮→強直性痙攣(tetany)，會出現。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"106110-N3-70":{"quick":"脫水/低血容積會黏膜「乾燥」非潮濕，不包括者C。","detail":{"background":"低血容積與脫水的臨床表徵：A「心跳過速」(代償性，維持心輸出量)、B「脈搏微弱呈絲脈或消失」(嚴重時)、D「心智狀況改變」(腦灌注不足→意識改變、躁動)，並有皮膚黏膜乾燥、皮膚張力差、尿量減少、姿勢性低血壓、血壓下降。本題問「不包括」者：C「黏膜潮濕」——脫水時黏膜應「乾燥」而非潮濕，故C不屬脫水表現，為答案。","options":{"A":"心跳過速(代償)是脫水表現。","B":"脈搏微弱呈絲脈(嚴重低血容)是脫水表現。","C":"正解(不包括)。脫水黏膜應「乾燥」，非潮濕。","D":"心智狀況改變(腦灌注不足)是脫水表現。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"106110-N3-71":{"quick":"尿崩症的鼻噴霧(DDAVP)是「鼻黏膜吸收」，不需吸入肺部，D不適當。","detail":{"background":"尿崩症(中樞型)出院護理指導：A教導自我注射或使用desmopressin(DDAVP)藥物(對)；B隨身攜帶識別卡(緊急時告知病況)(對)；C教導維持與測量體液狀態(每日量體重、輸出入量、尿比重)(對)。本題問「不適當者」：D「教導使用鼻噴霧劑並須確認藥劑確實吸入『肺部』」——desmopressin鼻噴劑是經「鼻黏膜吸收」進入循環，「不需要也不應吸入肺部」(它不是吸入劑)，故此指導錯誤，為答案。應指導正確噴於鼻黏膜。","options":{"A":"教導自我注射藥物(DDAVP)，正確。","B":"隨身攜帶識別卡，正確。","C":"教導維持與測量體液狀態，正確。","D":"不適當(本題選此)。鼻噴劑經鼻黏膜吸收，不需吸入肺部。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"106111-N3-62":{"quick":"高血鈉症會致「躁動、抽搐、神經興奮」非肌肉軟弱無力，A錯誤。","detail":{"background":"電解質失調症狀評估：B「低血鈣常有出血(凝血)時間延長」(鈣是凝血因子)(對)；C「低血鉀常有便秘、腹脹」(腸蠕動減弱、腸麻痺)(對)；D「低血鈣易致手足抽搐(tetany)」(神經肌肉興奮)(對)。本題問「錯誤者」：A「高血鈉症會致肌肉軟弱無力」——高血鈉(常因失水)主要造成「神經系統興奮症狀：口渴、躁動不安、抽搐、意識改變」而非肌肉軟弱無力(肌肉軟弱無力反而是『低血鉀、高血鈣』的表現)，故A錯誤。","options":{"A":"錯誤(本題選此)。高血鈉致躁動抽搐等神經興奮，非肌肉軟弱無力。","B":"低血鈣凝血時間延長(鈣是凝血因子)，正確。","C":"低血鉀致便秘腹脹(腸蠕動減弱)，正確。","D":"低血鈣易致手足抽搐(tetany)，正確。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"106111-N3-63":{"quick":"胰島素會把鉀移入細胞「降血鉀」，胰島素「過多」不會致高血鉀，A錯誤。","detail":{"background":"造成高血鉀的原因：B「溶血」(細胞內鉀釋出)、C「組織嚴重感染/壞死」(細胞破壞釋鉀)、D「代謝性酸中毒」(氫離子進入細胞、鉀移出細胞到血中)皆會升高血鉀。本題問「錯誤(非高血鉀原因)」者：A「胰島素分泌過多」——胰島素會「促進鉀離子進入細胞內」使血鉀「下降(低血鉀)」，故胰島素「過多」造成的是低血鉀而非高血鉀(臨床也用胰島素+葡萄糖降血鉀)，A與機轉相反，為錯誤。","options":{"A":"錯誤(本題選此)。胰島素把鉀移入細胞「降血鉀」，過多致低血鉀非高血鉀。","B":"溶血使細胞內鉀釋出→高血鉀，正確。","C":"組織嚴重感染/壞死釋鉀→高血鉀，正確。","D":"代謝性酸中毒使鉀移出細胞→高血鉀，正確。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"107030-N3-60":{"quick":"低血鈣=Chvostek徵象(輕敲臉部肌肉痙攣)(A)。","detail":{"background":"低血鈣臨床表徵正確者為A「臉部肌肉出現痙攣稱為Chvostek徵象(沃斯特克氏徵象)」——輕敲耳前顏面神經誘發臉部肌肉抽搐，是低血鈣神經肌肉興奮的經典徵象。其他錯誤(屬高血鈣表現)：B「全身肌肉無力、骨痠痛、易跌倒骨折」是「高血鈣」(骨鈣流失、肌張力下降)；C「ST間隔變短、T波寬平、QT縮短」是「高血鈣」心電圖(低血鈣反而QT『延長』)；D「腸蠕動變慢、腹脹便秘」是「高血鈣」(低血鈣腸蠕動增強)。故正解A。","options":{"A":"正解。低血鈣的Chvostek徵象(輕敲臉部肌肉痙攣)。","B":"肌肉無力骨痛是「高血鈣」表現，錯誤。","C":"QT縮短是「高血鈣」心電圖；低血鈣QT延長，錯誤。","D":"腹脹便秘是「高血鈣」(腸蠕動慢)，低血鈣反增蠕動，錯誤。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"108020-N3-62":{"quick":"高血鉀(7.0)應「限鉀」，鼓勵吃柳丁香蕉(高鉀)為錯誤處置，D。","detail":{"background":"血鉀7.0 mEq/L是「危急性高血鉀」，緊急處置：A口服/灌腸Kayexalate(腸道排鉀)；B靜脈注射短效胰島素+50%葡萄糖(把鉀移入細胞)；C靜脈注射碳酸氫鈉(矯正酸中毒、促鉀移入細胞)；另可給鈣劑穩定心肌、嚴重時透析。本題問「錯誤者」：D「鼓勵多食用柳丁、香蕉」——柳丁、香蕉是「高鉀」食物，會「加重高血鉀」，高血鉀病人應「限鉀」，故D為錯誤處置。","options":{"A":"口服/灌腸Kayexalate排鉀，正確。","B":"胰島素+葡萄糖把鉀移入細胞，正確。","C":"碳酸氫鈉矯正酸中毒、促鉀移入細胞，正確。","D":"錯誤(本題選此)。柳丁香蕉是高鉀食物，會加重高血鉀，應限鉀。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"108110-N3-79":{"quick":"霍亂以「無痛性大量水瀉、通常無發燒」為主，B說有發燒為錯誤。","detail":{"background":"霍亂(Vibrio cholerae)的特性：A「霍亂弧菌不會進入血流引起菌血症」——它在腸道分泌「霍亂毒素」造成腸道大量分泌水分，是局部腸道病原而非侵入血流(對)；C治療核心是「大量補充電解質液體」矯正脫水、低血鉀與代謝性酸中毒(對)；D可用四環黴素縮短病程、減少腹瀉量(對)。本題問「錯誤者」：B「會有嚴重腹瀉、噁心、嘔吐及發燒」——霍亂典型是「無痛性、大量米泔水樣水瀉(可致嚴重脫水)，但通常『不發燒或僅低燒』」，故B「發燒」與典型不符，為錯誤。","options":{"A":"霍亂弧菌局部腸道作用、不入血致菌血症，正確。","B":"錯誤(本題選此)。霍亂為大量水瀉但「通常不發燒」，非有發燒。","C":"大量補充電解質液體矯正脫水/酸中毒/低血鉀，正確。","D":"四環黴素可縮短病程、減少腹瀉，正確。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"109030-N3-37":{"quick":"癌症骨轉移釋出鈣→「高血鈣」非低血鈣，A錯誤。","detail":{"background":"癌症病人血鈣：B「白蛋白低下時需『校正血鈣』」(血鈣約四成與白蛋白結合，低白蛋白會低估真實游離鈣，校正公式可避免漏看高血鈣)(對)；C「高血鈣治療是補充大量水分(生理食鹽水水化)」促鈣排出(對)；D「利尿劑(furosemide)促進腎臟排鈣」(對)。本題問「錯誤者」：A「癌細胞轉移到骨頭會出現『低血鈣』」——骨轉移使骨質破壞、鈣釋入血→「高血鈣(惡性腫瘤高血鈣症)」，而非低血鈣，故A與事實相反，為錯誤。","options":{"A":"錯誤(本題選此)。骨轉移釋出骨鈣→「高血鈣」，非低血鈣。","B":"低白蛋白需校正血鈣，避免低估高血鈣，正確。","C":"高血鈣以大量水分(水化)治療，正確。","D":"利尿劑(furosemide)促進排鈣，正確。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"109030-N3-63":{"quick":"體液容積不足=口渴+血比容升高(血液濃縮)→14。","detail":{"background":"體液容積不足(脫水)臨床表徵：1「口渴」(失水刺激口渴中樞)、4「血比容(Hct)升高」(血液濃縮、血漿減少使紅血球相對比例上升)。而2「體溫上升」並非脫水的『直接典型表徵』(嚴重脫水可能影響體溫調節但非核心)；3「尿比重下降」錯誤——脫水時腎臟濃縮尿液保水，尿比重應「上升」而非下降。故正確為14，答案B。脫水其他表現:皮膚張力差、黏膜乾燥、心跳快、姿勢性低血壓、尿量少。","options":{"A":"含3(尿比重下降)錯誤，脫水尿比重「上升」。","B":"正解。1口渴+4血比容升高(血液濃縮)。","C":"含2、3皆非脫水典型。","D":"含2(體溫上升)非脫水核心表徵。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"109030-N3-71":{"quick":"高血磷護理=少吃堅果糙米(高磷)+注意安全(低血鈣抽搐)+服磷結合劑→145。","detail":{"background":"慢性腎臟病高血磷(CKD-MBD)護理：1「少吃堅果類與糙米飯」等「高磷食物」(對)；4「注意下床活動安全」——高血磷常伴隨低血鈣，神經肌肉興奮、易抽搐與骨病變，須防跌(對)；5「服用磷結合劑」(隨餐服用，在腸道結合磷減少吸收)(對)。而2「多補充維生素D」錯誤——須在控制血磷後、由醫師評估給予活性維生素D(若血磷未控制就補維生素D會增加腸道鈣磷吸收、加重高血磷與血管鈣化)，故2不適當;3「監測『肝』功能」方向錯誤(應監測『腎』功能與鈣磷)。故正確為145，答案B。","options":{"A":"含2、3不適當。","B":"正解。1少吃高磷食物+4注意活動安全+5服磷結合劑。","C":"含2、3不適當。","D":"含3(監測肝功能)不對，應監測腎功能與鈣磷。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"109110-N3-78":{"quick":"顱內壓上升者「禁用低張溶液」(會加重腦水腫)(B)。","detail":{"background":"低張靜脈溶液(如0.45% NaCl、5%葡萄糖水D5W輸入後成低張)會使水分由血管進入細胞內、組織間隙，「適合細胞內脫水/高滲透狀態」的補充。本題問「不適合接受低張溶液」者：B「顱內創傷造成顱內壓上升」——低張溶液會使水分滲入腦細胞「加重腦水腫、升高顱內壓」，是禁忌(顱內壓高者反而用等張或高張溶液)，故B為答案。A尿崩症(失自由水)、C高血糖高滲透壓昏迷(細胞脫水)、D輸液致細胞內脫水都「適合」用低張溶液補充細胞內水分。","options":{"A":"尿崩症失自由水，適合低張溶液補充。","B":"正解(不適合)。顱內壓上升者用低張溶液會加重腦水腫，禁用。","C":"高血糖高滲透壓昏迷(細胞脫水)，適合低張溶液。","D":"細胞內脫水適合低張溶液補充。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"110110-N3-60":{"quick":"高血鉀(7.2)=Kayexalate排鉀+碳酸氫鈉(2、3)，胰島素須「短效」、不可給高鉀食物→23。","detail":{"background":"急性腎衰竭血鉀7.2(危急高血鉀)正確處置：2「口服/灌腸Kayexalate」由腸道排鉀；3「靜脈注射重碳酸鈉(碳酸氫鈉)」矯正酸中毒、促鉀移入細胞。而1「靜脈注射『中長效』胰島素+5%葡萄糖」錯誤——降血鉀應用「『短效(正規)』胰島素」快速把鉀移入細胞(中長效不適合急救);4「鼓勵多食用香蕉、柳丁」錯誤——這是高鉀食物會加重高血鉀。故正確為23，答案C。","options":{"A":"含1(中長效胰島素)、含4(高鉀食物)錯誤。","B":"含1、4皆錯誤。","C":"正解。2 Kayexalate排鉀+3碳酸氫鈉。","D":"含4(高鉀食物)錯誤。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"110110-N3-74":{"quick":"脫水/高滲透壓狀態血漿滲透壓應「升高」非280，B為錯誤。","detail":{"background":"承上題王先生(脫水/高血糖高滲透壓狀態)，可能徵象：A「血中無或微量酮體」(高滲透壓高血糖狀態HHS酮體少，與DKA不同)、C「皮膚黏膜乾燥、電解質不平衡」(脫水)、D「血液容積減少→心搏過速、低血壓」(低血容)。本題問「錯誤者」：B「血漿滲透壓為280 mOsm/kg」——280屬「正常範圍(約275–295)」，但此病人是「脫水/高滲透壓狀態」，血漿滲透壓應「升高(>295甚至>320)」，故B數值與病況不符，為錯誤。","options":{"A":"高滲透壓狀態(HHS)血中酮體少，正確。","B":"錯誤(本題選此)。脫水/高滲透壓狀態血漿滲透壓應「升高」，非280(正常值)。","C":"皮膚黏膜乾燥、電解質不平衡(脫水)，正確。","D":"血液容積減少→心搏過速、低血壓，正確。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"111030-N3-60":{"quick":"高血鈉致神經興奮(躁動抽搐)非肌肉軟弱無力，A錯誤。","detail":{"background":"電解質失調症狀(同106111-62概念)：B「低血鈣常有凝血時間延長」(對)；C「低血鉀常有便秘腹脹」(腸蠕動減弱)(對)；D「低血鈣易致手足抽搐(tetany)」(對)。本題問「錯誤者」：A「高血鈉症會致肌肉軟弱無力」——高血鈉主要造成「神經系統興奮：口渴、躁動、抽搐、意識改變」，肌肉軟弱無力是「低血鉀」或「高血鈣」的表現，故A錯誤。","options":{"A":"錯誤(本題選此)。高血鈉致躁動抽搐等神經興奮，非肌肉軟弱無力。","B":"低血鈣凝血時間延長，正確。","C":"低血鉀便秘腹脹(腸蠕動弱)，正確。","D":"低血鈣易致手足抽搐，正確。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"111030-N3-75":{"quick":"Spironolactone是保鉀利尿劑→注意「高血鉀」+不宜吃芭樂(高鉀)→14。","detail":{"background":"Spironolactone(Aldactone)是「保鉀利尿劑(醛固酮拮抗劑)」，會使腎臟「保留鉀、排鈉」。用藥指導：1「須注意鉀離子濃度」——易致「高血鉀」，須監測(對)；4「不宜食用芭樂」等「高鉀水果」(芭樂、香蕉、柑橘、奇異果等鉀含量高)避免加重高血鉀(對)。而2「須注意鎂離子」非其主要監測重點;3「鼓勵多食用柑橘類(高鉀)」錯誤——保鉀利尿劑下吃高鉀食物會致高血鉀。故正確為14，答案B。","options":{"A":"含3(鼓勵高鉀柑橘)錯誤。","B":"正解。1注意鉀濃度(易高血鉀)+4不宜吃芭樂(高鉀)。","C":"含2、3皆不對。","D":"含3(高鉀柑橘)錯誤。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"113180-N3-23":{"quick":"體液容積過量=血液稀釋→血比容下降+血尿素氮下降→12。","detail":{"background":"體液容積過量(水分過多/血液稀釋)的檢驗結果：1「血比容(Hct)下降」(血漿增加、血液被稀釋)、2「血尿素氮(BUN)下降」(稀釋效應)。而3「血漿滲透壓上升」錯誤——容積過量(尤其低張性過量)血漿滲透壓應「下降或正常」而非上升;4「血鈉上升」錯誤——水分過多稀釋使血鈉傾向「下降(稀釋性低血鈉)」。故正確為12，答案A。對比脫水(濃縮)則Hct、BUN皆上升。","options":{"A":"正解。1血比容下降+2血尿素氮下降(血液稀釋)。","B":"含3(血漿滲透壓上升)錯誤。","C":"含4(血鈉上升)錯誤，稀釋反致低血鈉。","D":"含3、4皆錯誤。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"114030-N3-37":{"quick":"高血鉀導因=ACEI+醛固酮拮抗劑(保鉀)→12。","detail":{"background":"高血鉀的導因：1「使用血管收縮素轉換酶抑制劑(ACEI)」——抑制醛固酮、減少排鉀→高血鉀(對)；2「使用醛固酮拮抗劑(如spironolactone保鉀利尿劑)」——保留鉀→高血鉀(對)。而3「使用噻嗪類利尿劑(thiazide)」是「『排』鉀利尿劑」→造成「低血鉀」而非高血鉀;4「代謝性『鹼』中毒」會使鉀移入細胞造成「低血鉀」(高血鉀對應的是代謝性『酸』中毒)。故正確為12，答案A。","options":{"A":"正解。1 ACEI+2醛固酮拮抗劑(保鉀)→高血鉀。","B":"含4(代謝性鹼中毒致低血鉀)錯誤。","C":"含3(thiazide排鉀致低血鉀)錯誤。","D":"含3、4皆致低血鉀，錯誤。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"114100-N3-32":{"quick":"高血鈉=尿比重上升+衛教低鈉飲食(蘇打餅/白麵包高鈉應避免?)→依官方答案23。","detail":{"background":"高血鈉(hypernatremia)：①定義為血鈉「>145 mEq/L」(非>130)；②尿比重「上升」(腎臟濃縮保水)；③飲食衛教「低鈉」。本題官方答案為23——3「尿比重上升」(對，腎臟濃縮尿液保水使比重升高)、2「導因之一為醛固酮過多症(原發性醛固酮增多症使鈉滯留)」(對)。而1「血鈉>130」錯誤(高血鈉定義是>145);4「指導低鈉飲食如蘇打餅乾、白麵包」錯誤——蘇打餅、白麵包其實「含鈉高」，並非低鈉食物，不應作為低鈉飲食舉例。故正確為23，答案C。","options":{"A":"含1(血鈉>130定義錯誤)。","B":"含1、4皆錯誤。","C":"正解(依官方答案)。2醛固酮過多致鈉滯留+3尿比重上升。","D":"含4(蘇打餅/白麵包其實高鈉)錯誤。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"114170-N3-23":{"quick":"排鉀利尿劑致低血鉀(肌無力心悸)，應「補鉀+休息」，鼓勵多下床活動最不適當(B)。","detail":{"background":"服用「排鉀利尿劑(如thiazide、furosemide)」的高血壓病人出現「肌肉無力、心悸」，提示「低血鉀(hypokalemia)」。護理：A鼓勵多攝取「香蕉、柑橘類」等高鉀食物補鉀(對)；C監測心率與心律(低血鉀易心律不整)(對)；D評估電解質變化(對)。本題問「最不適當者」：B「鼓勵盡量多下床活動」——低血鉀造成肌肉無力，過度活動有跌倒與肌肉症狀加重的風險，此時應「休息、補鉀、監測」而非鼓勵多活動，故B最不適當。","options":{"A":"鼓勵多攝取香蕉、柑橘(高鉀)補鉀，正確。","B":"最不適當(本題選此)。低血鉀肌無力時應休息補鉀，非鼓勵多活動(易跌倒)。","C":"監測心率心律(防低血鉀心律不整)，正確。","D":"評估電解質變化，正確。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"114170-N3-40":{"quick":"高血鈣照護=鼓勵「酸灰性食物」(D)，並大量補水促鈣排出。","detail":{"background":"高血鈣及照護，正確者為D「指導多攝取酸灰性食物」——酸化尿液可增加鈣的溶解、減少鈣鹽沉積(磷酸鈣)結石。其他錯誤：A高血鈣使神經肌肉興奮性「下降」→肌肉「無力、反射『減弱』」(非張力增加、過度反射)；B高血鈣心電圖是「QT間隔『縮短』」(非延長；QT延長是低血鈣);C高血鈣腸蠕動已減慢、易便秘，應「多攝取『高纖維』+水分」促進排便(非低纖維減緩蠕動)。故正解D。高血鈣治療重點為大量補水、利尿劑促排鈣、鼓勵活動。","options":{"A":"高血鈣是肌肉無力、反射「減弱」，非張力增加過度反射，錯誤。","B":"高血鈣QT間隔「縮短」，非延長，錯誤。","C":"高血鈣已便秘，應多纖維+水分，非低纖維減緩蠕動，錯誤。","D":"正解。高血鈣指導多攝取酸灰性食物(酸化尿液減少鈣鹽沉積)。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"115030-N3-23":{"quick":"便秘+意識不清+心律不整=「高血鈣」(B)。","detail":{"background":"王老太太「便秘、意識不清、心律不整」的組合最符合「高血鈣(hypercalcemia)」：高血鈣使①腸道平滑肌張力下降→「便秘」、②中樞神經抑制→「意識不清、嗜睡、混亂」、③影響心肌→「心律不整、QT縮短」，經典口訣「stones, bones, groans, moans(結石、骨痛、腹部症狀、精神症狀)」。高血磷、高血鉀、高尿酸不會同時造成「便秘+意識不清+心律不整」這組合(高血鉀以肌無力與致命心律不整為主、無便秘意識不清)。故最可能為B高血鈣。","options":{"A":"高血磷主要伴低血鈣症狀，非此組合。","B":"正解。便秘+意識不清+心律不整=高血鈣典型。","C":"高血鉀以肌無力與心律不整為主，無便秘意識不清組合。","D":"高尿酸以痛風為主，與此組合不符。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"115030-N3-40":{"quick":"預防腎衰竭高血鉀=「避免熱量不足/饑餓」(防組織分解釋鉀)(A)。","detail":{"background":"預防腎功能不全病人高血鉀的飲食指導，正確者為A「避免熱量攝取不足或長期饑餓」——熱量不足會使身體「分解自身組織(蛋白/肌肉)」釋放出細胞內鉀進入血中、並產生含氮廢物，故須給足夠熱量避免組織分解。其他錯誤：B「雞精」鉀含量高，不宜多補；C「低鈉鹽/薄鹽醬油」是以「鉀」取代鈉的代鹽，含鉀高、腎功能不全者「禁用」(會致高血鉀);D「水果乾」是濃縮高鉀食物，應避免。故正解A。","options":{"A":"正解。避免熱量不足/饑餓，防組織分解釋出鉀。","B":"雞精鉀含量高，不宜多補，錯誤。","C":"低鈉鹽/薄鹽醬油以鉀代鈉、含鉀高，腎功能不全禁用，錯誤。","D":"水果乾是濃縮高鉀食物，應避免，錯誤。"},"sources":["新文京《內外科護理學》體液電解質","Harrison 內科學 水與電解質代謝","KDIGO/教科書 電解質失衡照護"]}},"101030-N3-54":{"quick":"本題為送分題(一律給分)；pH7.32+PaCO2 50高=呼吸性酸中毒部分代償概念。","detail":{"background":"本題官方公告為「送分(一律給分)」。就ABG判讀概念：pH 7.32(<7.35酸中毒)、PaCO2 50 mmHg(>45升高，是酸的來源)→「呼吸性酸中毒」；HCO3 23(接近正常下緣)代償尚不足、pH未回正常→傾向「部分代償」。由於原題各代償敘述存在爭議(HCO3僅23代償不明顯)，故公告一律給分。學習重點：先看pH定酸鹼，再看PaCO2(呼吸)與HCO3(代謝)何者為原發，最後看pH是否回到正常判斷代償程度。","options":{"A":"送分題。呼吸性酸中毒(PaCO2↑)合併代謝部分代償為概念上接近的判讀。","B":"送分題，一律給分。","C":"送分題，一律給分。","D":"送分題，一律給分。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"104100-N3-56":{"quick":"pH7.50↑+PaCO2 32↓=呼吸性鹼中毒(A)。","detail":{"background":"ABG判讀步驟：①pH 7.50(>7.45→鹼中毒)；②找原發——PaCO2 32 mmHg(<35下降，CO2減少是『鹼』的來源，方向與pH一致)→「呼吸性」；HCO3 21(略低，非鹼的來源)。故為「呼吸性鹼中毒」(常因過度換氣排出過多CO2，如焦慮、發燒、缺氧代償)，答案A。記憶：pH與PaCO2「反向」變化(一升一降)→呼吸性問題主導。","options":{"A":"正解。pH↑且PaCO2↓(過度排CO2)=呼吸性鹼中毒。","B":"呼吸性酸中毒pH應<7.35、PaCO2升高，與此相反。","C":"代謝性鹼中毒HCO3應升高，此處HCO3偏低不符。","D":"代謝性酸中毒pH應<7.35，與此相反。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"106030-N3-45":{"quick":"燒傷利尿期代謝性酸中毒是重碳酸鹽「流失/不足」，C說重碳酸鹽增加為錯誤。","detail":{"background":"燒傷病人在「利尿期(復甦後)」可能出現「代謝性酸中毒」，原因：A組織灌注不足時無氧代謝→「乳酸堆積」；B壞死組織釋放酸性物質；D局部抗菌藥「Sulfamylon(mafenide)」會抑制碳酸酐酶→使重碳酸鹽由腎流失→代謝性酸中毒(副作用)。代謝性酸中毒的本質是「酸增加或『重碳酸鹽(HCO3)流失/減少』」。本題問「錯誤者」：C「重碳酸鹽『增加』」——代謝性酸中毒是HCO3「減少」而非增加(HCO3增加會造成鹼中毒)，故C與機轉相反，為錯誤。","options":{"A":"灌注不足無氧代謝→乳酸堆積，是代謝性酸中毒原因。","B":"壞死組織釋放酸性物質，是原因。","C":"錯誤(本題選此)。代謝性酸中毒是HCO3「減少」，非增加。","D":"Sulfamylon抑制碳酸酐酶使HCO3流失，是原因。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"106030-N3-56":{"quick":"pH7.30↓+HCO3 18↓、PaCO2正常=未代償代謝性酸中毒(C)。","detail":{"background":"ABG判讀：①pH 7.30(<7.35→酸中毒)；②找原發——HCO3 18 mEq/L(<22下降，是『酸』的來源，方向與pH一致)→「代謝性」酸中毒；PaCO2 40(正常範圍35–45，未啟動呼吸代償)→「未代償」。故為「未代償之代謝性酸中毒」，答案C。記憶：pH與HCO3「同向」變化(皆降)→代謝性問題；PaCO2仍正常代表呼吸尚未代償。","options":{"A":"PaCO2正常、HCO3低，原發是代謝性而非呼吸性，錯誤。","B":"非鹼中毒，pH為酸性，錯誤。","C":"正解。HCO3↓原發代謝性酸中毒、PaCO2正常未代償。","D":"非鹼中毒，錯誤。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"107030-N3-70":{"quick":"嚴重「嘔吐」流失胃酸→代謝性「鹼」中毒，非酸中毒，D錯誤。","detail":{"background":"代謝性酸中毒的原因：A「過度運動」(無氧代謝乳酸堆積)、B「過度飢餓」(脂肪分解產生酮酸)、C「嚴重腹瀉」(腸液富含重碳酸鹽，腹瀉大量流失HCO3)皆造成代謝性酸中毒。本題問「錯誤(非代謝性酸中毒原因)」者：D「嚴重嘔吐」——嘔吐流失的是「胃酸(HCl，含大量氫離子與氯)」，氫離子流失反而造成「代謝性『鹼』中毒(低血氯、低血鉀)」，故D與酸中毒相反，為錯誤。記憶：腹瀉→酸中毒、嘔吐→鹼中毒。","options":{"A":"過度運動→乳酸堆積→代謝性酸中毒。","B":"過度飢餓→酮酸生成→代謝性酸中毒。","C":"嚴重腹瀉→流失重碳酸鹽→代謝性酸中毒。","D":"錯誤(本題選此)。嚴重嘔吐流失胃酸→代謝性「鹼」中毒，非酸中毒。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"107110-N3-58":{"quick":"ABG樣本未冰存→細胞持續代謝耗氧產CO2→PaCO2「上升」(C)。","detail":{"background":"動脈血液氣體(ABG)樣本若「未立即放置冰水中(未冰存)」並延遲送驗，血中的白血球與紅血球仍持續「有氧代謝」：消耗氧氣→PaO2「下降」、產生二氧化碳→PaCO2「上升」、產生酸性代謝物→pH「下降」。本題問「未冰存會導致的改變」正確者：C「PaCO2上升」(對)。A「PaO2上升」錯誤(應下降)；B「pH上升」錯誤(應下降)；D「不會改變」錯誤。故正解C。因此ABG採檢後須立即冰存並儘快送驗，避免數值失真。","options":{"A":"PaO2應「下降」(細胞耗氧)，非上升，錯誤。","B":"pH應「下降」(產酸)，非上升，錯誤。","C":"正解。細胞代謝產CO2使PaCO2上升。","D":"會改變(數值失真)，非不變，錯誤。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"108020-N3-63":{"quick":"焦慮過度通氣排出過多CO2→呼吸性鹼中毒(A)。","detail":{"background":"焦慮、恐慌時「過度通氣(hyperventilation)」使肺部排出過多二氧化碳→PaCO2下降→血中碳酸減少→pH上升，造成「呼吸性鹼中毒」。臨床表現包括頭暈、口周與手指麻木刺痛、手足痙攣(因鹼中毒使游離鈣下降)。處置可用「紙袋罩住口鼻」重新吸回CO2。本題問焦慮過度通氣造成的酸鹼不平衡即A呼吸性鹼中毒。","options":{"A":"正解。過度通氣排出過多CO2→呼吸性鹼中毒。","B":"呼吸性酸中毒是CO2滯留(換氣不足)，與過度通氣相反。","C":"代謝性酸中毒非過度通氣直接造成。","D":"代謝性鹼中毒非過度通氣造成(那是呼吸性)。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"108110-N3-62":{"quick":"pH7.25↓+HCO3 18↓、PaCO2 31↓代償=部分代償性代謝性酸中毒(D)。","detail":{"background":"ABG判讀：①pH 7.25(<7.35→酸中毒)；②原發——HCO3 18(<22下降，與pH同向，是酸來源)→「代謝性」酸中毒(符合急性腎衰竭尿毒酸中毒)；③代償——PaCO2 31(<35下降，呼吸代償已啟動，過度換氣排CO2)，但pH仍<7.35未回正常→「部分代償」。故為「部分代償性代謝性酸中毒」，答案D。","options":{"A":"原發是代謝性(HCO3↓)非呼吸性。","B":"非呼吸性酸中毒(PaCO2下降是代償非原發)。","C":"PaCO2已下降代償，非「未代償」純代謝性酸中毒。","D":"正解。HCO3↓原發、PaCO2↓代償、pH仍<7.35=部分代償性代謝性酸中毒。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"108110-N3-63":{"quick":"腎衰竭代謝性酸中毒最有效=「注射NaHCO3(碳酸氫鈉)」補鹼(B)。","detail":{"background":"承上題蔡先生急性腎衰竭造成「代謝性酸中毒」(HCO3流失/酸滯留)，改善酸鹼最有效的措施是「注射碳酸氫鈉(NaHCO3)」直接補充重碳酸鹽中和酸、提升HCO3與pH。A「紙袋罩口鼻」用於『呼吸性鹼中毒(過度換氣)』非此情況;C「補充NH4Cl(氯化銨)」是「酸性藥」用於代謝性『鹼』中毒，方向相反;D「人工呼吸器」用於呼吸衰竭/呼吸性酸中毒。故正解B注射NaHCO3。嚴重時併用透析移除尿毒酸。","options":{"A":"紙袋罩口鼻用於呼吸性鹼中毒，非代謝性酸中毒。","B":"正解。注射NaHCO3補鹼，最有效改善代謝性酸中毒。","C":"NH4Cl是酸性藥用於代謝性鹼中毒，方向相反，錯誤。","D":"人工呼吸器用於呼吸衰竭，非代謝性酸中毒首選。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"108110-N3-72":{"quick":"代謝性酸中毒中樞抑制→「頭痛、意識遲鈍」(B)。","detail":{"background":"代謝性酸中毒的症狀：①神經系統——「頭痛、倦怠、意識遲鈍、嗜睡到昏迷」(酸中毒抑制中樞)；②呼吸——「呼吸『加深加快』(Kussmaul呼吸)」代償性排出CO2(故C「呼吸速率變慢」錯誤);③心血管——心肌收縮力下降、周邊血管「擴張」(故D「周邊血管收縮」錯誤);④高血鉀(氫鉀交換)。本題問「正確症狀」者：B「頭痛、意識遲鈍」(對)。A「出汗口乾」非代謝性酸中毒特異症狀。故正解B。","options":{"A":"出汗口乾非代謝性酸中毒特異症狀。","B":"正解。代謝性酸中毒中樞抑制→頭痛、意識遲鈍。","C":"代謝性酸中毒呼吸「加深加快(Kussmaul)」，非變慢，錯誤。","D":"代謝性酸中毒周邊血管「擴張」，非收縮，錯誤。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"109030-N3-57":{"quick":"pH7.23↓+HCO3 17.5↓、PaCO2 32↓代償=部分代償性代謝性酸中毒(D)。","detail":{"background":"ABG判讀：①pH 7.23(<7.35→酸中毒)；②原發——HCO3 17.5(<22下降，與pH同向，是酸來源)→「代謝性」酸中毒(急性腎衰竭尿毒);③代償——PaCO2 32(<35下降，呼吸代償啟動)，但pH仍<7.35未回正常→「部分代償」。故為「部分代償性代謝性酸中毒」，答案D。SaO2 98%、PaO2 82正常，無氧合問題。","options":{"A":"原發是代謝性(HCO3↓)，非呼吸性。","B":"PaCO2下降是代償非原發，非呼吸性酸中毒。","C":"PaCO2已代償，非「未代償」純代謝性。","D":"正解。HCO3↓原發、PaCO2↓代償、pH<7.35=部分代償性代謝性酸中毒。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"109030-N3-58":{"quick":"腎衰竭代謝性酸中毒最有效=注射NaHCO3(B)。","detail":{"background":"承上題王先生急性腎衰竭代謝性酸中毒，最有效改善酸鹼的處置是「注射碳酸氫鈉(NaHCO3)」補充重碳酸鹽中和酸。A「紙袋罩口鼻」用於呼吸性鹼中毒(過度換氣)，非此情況;C「注射KCl(氯化鉀)」用於低血鉀，但腎衰竭常已高血鉀、補鉀更危險;D「指導緩慢呼吸」會減少CO2排出反而加重酸中毒(代謝性酸中毒須靠過度換氣代償，叫病人慢呼吸是錯的)。故正解B注射NaHCO3，嚴重時併透析。","options":{"A":"紙袋罩口鼻用於呼吸性鹼中毒，非此情況。","B":"正解。注射NaHCO3補鹼，最有效改善代謝性酸中毒。","C":"注射KCl用於低血鉀，腎衰竭常高血鉀，補鉀危險，錯誤。","D":"指導緩慢呼吸會減少CO2排出加重酸中毒，錯誤。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"110110-N3-57":{"quick":"pH<7.35(酸)時呼吸代償會「增加呼吸速率」排CO2(B)。","detail":{"background":"人體酸鹼調節：①「呼吸調節(快、數分鐘)」——pH下降(酸中毒)時，呼吸中樞受刺激「增加呼吸速率與深度」排出CO2(碳酸)以提升pH(故B正確);pH上升(鹼中毒)時呼吸「減慢變淺」保留CO2。②「腎臟調節(慢、數小時至天)」——酸中毒時腎排H⁺、再吸收/再生HCO3;鹼中毒時腎排HCO3、保留H⁺。本題正確者B「pH<7.35時增加呼吸速率」(雖然嚴格說呼吸調節的是CO2/碳酸而非直接HCO3，但本題以B為正解)。A方向相反(酸中毒應加快呼吸);C鹼中毒腎應「排HCO3、保留H⁺」(敘述顛倒);D鹼中毒呼吸應「減慢」(非增加)。故正解B。","options":{"A":"pH<7.35(酸)應「加快」呼吸排CO2，非減慢，錯誤。","B":"正解。pH<7.35時呼吸代償增加呼吸速率排CO2。","C":"pH>7.45(鹼)腎應排HCO3保留H⁺，敘述顛倒，錯誤。","D":"pH>7.45(鹼)呼吸應「減慢」保留CO2，非增加，錯誤。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"110110-N3-66":{"quick":"代謝性酸中毒原因=急性腎衰竭+血糖過高(酮酸)→24。","detail":{"background":"代謝性酸中毒(HCO3減少/酸增加)的原因：2「急性腎衰竭」(腎無法排氫、再生HCO3→尿毒酸中毒)、4「血糖過高(糖尿病酮酸中毒，產生酮酸)」皆造成代謝性酸中毒。而1「延腦異常」影響的是「呼吸中樞」→造成『呼吸性』酸鹼問題(換氣異常);3「肺擴張不全(atelectasis)」影響氣體交換→造成『呼吸性』酸中毒(CO2滯留)。故代謝性酸中毒原因為24，答案C。記憶：腎/糖尿病/腹瀉/乳酸→代謝性；肺/呼吸中樞→呼吸性。","options":{"A":"含1、3屬「呼吸性」問題，非代謝性。","B":"含1(延腦→呼吸性)、3錯誤。","C":"正解。2急性腎衰竭+4血糖過高(酮酸)=代謝性酸中毒。","D":"含3(肺擴張不全→呼吸性)錯誤。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"112030-N3-64":{"quick":"未代償呼吸性酸中毒=pH↓+PaCO2↑、HCO3正常→A(pH7.27/PaCO2 50/HCO3 25)。","detail":{"background":"「未代償性呼吸性酸中毒」的ABG特徵：pH「下降(<7.35)」、PaCO2「上升(>45，原發酸來源)」、HCO3「仍正常(22–26，代謝尚未代償)」。逐一檢視：A「pH 7.27(酸)、PaCO2 50(高)、HCO3 25(正常)」完全符合——呼吸性酸中毒且HCO3正常代表未代償(對)。B HCO3 30(已升高=代謝已代償，屬部分代償);C pH 7.39(正常範圍=已代償);D pH 7.37接近正常且HCO3 31(已代償)。故正解A。","options":{"A":"正解。pH7.27↓、PaCO2 50↑、HCO3 25正常=未代償呼吸性酸中毒。","B":"HCO3 30已升高代償，屬部分代償非「未代償」。","C":"pH 7.39已回正常，屬已代償。","D":"pH 7.37近正常且HCO3升高，已代償。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"112110-N3-66":{"quick":"完全代償性代謝性酸中毒=pH回正常下緣+HCO3↓+PaCO2↓代償→A(pH7.35/HCO3 20/PaCO2 30)。","detail":{"background":"「完全代償性代謝性酸中毒」特徵：原發是代謝性酸(HCO3下降)，呼吸完全代償(PaCO2下降)使「pH回到正常範圍(7.35–7.45，但偏酸側下緣7.35–7.40)」。檢視：A「pH 7.35(正常下緣)、HCO3 20(低，原發代謝性酸)、PaCO2 30(低，呼吸代償)」——pH已回正常範圍=「完全代償」(對)。B pH 7.31(<7.35仍酸=部分代償);C pH 7.32且PaCO2 47(這是呼吸性問題型態);D pH 7.33(<7.35仍未完全)。故正解A。","options":{"A":"正解。pH7.35(回正常)、HCO3 20↓原發、PaCO2 30↓代償=完全代償性代謝性酸中毒。","B":"pH 7.31<7.35仍酸，屬部分代償。","C":"PaCO2 47升高，型態不符代謝性酸中毒完全代償。","D":"pH 7.33<7.35未完全回正常。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"113030-N3-40":{"quick":"pH7.44+PaCO2 30↓+HCO3 20↓=完全代償性呼吸性鹼中毒(D)。","detail":{"background":"ABG判讀：①pH 7.44——在正常範圍(7.35–7.45)但偏「鹼側上緣(7.40–7.45)」→提示「已代償的鹼中毒」；②原發——PaCO2 30(<35下降，是『鹼』來源，與偏鹼方向一致)→「呼吸性鹼中毒」；③代償——HCO3 20(<22下降，腎臟排HCO3代償)，且pH已回正常→「完全代償」。故為「完全代償性呼吸性鹼中毒」，答案D。判斷代償方向口訣：pH偏哪側→該側對應的原發；pH回正常範圍=完全代償。","options":{"A":"非呼吸性酸中毒(pH偏鹼側、PaCO2下降)。","B":"非代謝性酸中毒(pH偏鹼)。","C":"非代謝性鹼中毒(HCO3下降而非升高)。","D":"正解。PaCO2↓原發呼吸性鹼中毒、HCO3↓代償、pH回正常偏鹼=完全代償性呼吸性鹼中毒。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"113100-N3-34":{"quick":"pH7.20↓+PaCO2 61↑、HCO3正常=呼吸性酸中毒(D)。","detail":{"background":"ABG判讀：①pH 7.20(<7.35→酸中毒，且偏離嚴重)；②原發——PaCO2 61 mmHg(>45明顯上升，CO2滯留是『酸』來源，與pH同為酸方向)→「呼吸性」酸中毒(符合王先生『呼吸喘、換氣不足』);HCO3 22(正常，代謝尚未代償)。故為「(未代償)呼吸性酸中毒」，答案D。記憶：pH與PaCO2「反向」(pH↓、PaCO2↑)→呼吸性酸中毒。","options":{"A":"呼吸性鹼中毒pH應>7.45、PaCO2下降，與此相反。","B":"代謝性酸中毒HCO3應下降，此處HCO3正常、原發是PaCO2升高。","C":"代謝性鹼中毒pH應>7.45，與此相反。","D":"正解。pH↓且PaCO2 61↑(CO2滯留)=呼吸性酸中毒。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"113180-N3-33":{"quick":"pH7.31(酸)+PaCO2 50(高)的失衡ABG應「立即報告醫師」(D)。","detail":{"background":"須立即報告醫師的是「明顯酸鹼失衡」的ABG。逐一看：A pH 7.34(略低但接近正常)、各值大致正常；B pH 7.35、PaCO2 45(正常邊緣)；C pH 7.46、PaCO2 32(輕度鹼，相對穩定);D「pH 7.31(<7.35明顯酸中毒)、PaCO2 50(>45升高)」——呈現「呼吸性酸中毒」的明顯失衡，提示換氣不足/CO2滯留，須立即報告醫師處理。故答案D。判斷重點：pH偏離正常最明顯且有CO2滯留者最危急。","options":{"A":"pH 7.34接近正常，相對穩定。","B":"pH 7.35在正常邊緣，相對穩定。","C":"pH 7.46輕度鹼，相對穩定。","D":"正解。pH 7.31酸+PaCO2 50高(呼吸性酸中毒失衡)，應立即報告醫師。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"114030-N3-34":{"quick":"「呼吸困難」是臨床症狀，非ABG「直接偵測」項目(A)。","detail":{"background":"動脈血液氣體分析(ABG)可「直接偵測」的項目包括：B「酸鹼度(pH)」、C「重碳酸鹽含量(HCO3)」、「二氧化碳分壓(PaCO2)」、「氧分壓(PaO2)」、D「血氧飽和度(SaO2)」等氣體與酸鹼數值。本題問「不屬於ABG可直接偵測」者：A「呼吸困難」——這是病人主觀的「臨床症狀/徵象」(由觀察與病人主訴評估)，並非ABG儀器測得的數值，故A為答案。","options":{"A":"正解(非ABG偵測項目)。呼吸困難是臨床症狀，非ABG數值。","B":"酸鹼度(pH)是ABG直接偵測項目。","C":"重碳酸鹽(HCO3)是ABG偵測項目。","D":"血氧飽和度(SaO2)是ABG偵測項目。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"114100-N3-41":{"quick":"pH7.48↑+HCO3 30↑、PaCO2 48略升代償=部分代償性代謝性鹼中毒(C)。","detail":{"background":"ABG判讀：①pH 7.48(>7.45→鹼中毒)；②原發——HCO3 30(>26升高，是『鹼』來源，與pH同向)→「代謝性」鹼中毒；③代償——PaCO2 48(>45略升高，呼吸代償:換氣減慢保留CO2以拉低pH)，但pH仍>7.45未回正常→「部分代償」。故為「部分代償性代謝性鹼中毒」，答案C。記憶：pH與HCO3「同向」(皆升)→代謝性鹼中毒；PaCO2同向上升=呼吸代償。","options":{"A":"非呼吸性酸中毒(pH偏鹼、HCO3升高)。","B":"非代謝性酸中毒(pH偏鹼而非酸)。","C":"正解。HCO3↑原發代謝性鹼中毒、PaCO2↑代償、pH仍>7.45=部分代償性代謝性鹼中毒。","D":"PaCO2升高是代償，原發是代謝性而非呼吸性鹼中毒。"},"sources":["新文京《內外科護理學》酸鹼平衡","Harrison 內科學 酸鹼失衡","動脈血液氣體分析(ABG)判讀"]}},"101030-N3-20":{"quick":"膀胱鏡是「侵入性」檢查，可能造成血尿合併症(D)。","detail":{"background":"泌尿道檢查的侵入性程度不同：A電腦斷層、B靜脈腎盂攝影(IVP)、C腎動脈攝影主要與「顯影劑(過敏、腎毒性)」相關，但不直接刮傷尿路黏膜造成血尿。本題問「可能出現血尿合併症」者：D「膀胱鏡檢查」——是經尿道置入內視鏡的「侵入性」操作，器械摩擦尿道與膀胱黏膜，術後常見「輕度血尿、排尿疼痛、感染」等合併症，故為答案。檢查後應鼓勵多喝水沖洗、觀察血尿程度。","options":{"A":"電腦斷層非侵入尿路，不直接造成血尿。","B":"IVP主要與顯影劑相關，非血尿合併症。","C":"腎動脈攝影主要與顯影劑/穿刺處相關。","D":"正解。膀胱鏡侵入性操作摩擦黏膜，可能造成血尿。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"101110-N3-12":{"quick":"腎臟超音波無侵入、無顯影劑，「不須禁食」(C)。","detail":{"background":"檢查前是否禁食取決於是否用顯影劑、麻醉鎮靜或腸道準備：A靜脈腎盂攝影(IVP，用顯影劑)、B腎臟切片(侵入性、可能鎮靜)、D逆行性腎盂攝影(顯影劑、麻醉)通常需「禁食與腸道準備」。本題問「不須禁食」者：C「腎臟超音波掃描」——是非侵入性、不用顯影劑、不需麻醉的影像檢查，「不須禁食」(若檢查腹部其他器官如膽囊才需禁食，單純腎臟超音波不需)，故為答案。","options":{"A":"IVP用顯影劑，需禁食與腸道準備。","B":"腎臟切片侵入性、可能鎮靜，需禁食。","C":"正解。腎臟超音波非侵入、不用顯影劑，不須禁食。","D":"逆行性腎盂攝影用顯影劑/麻醉，需禁食。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"101110-N3-13":{"quick":"腎臟穿刺(切片)最主要併發症是「出血」(C)。","detail":{"background":"腎臟穿刺術(經皮腎臟切片)是以細針經皮膚穿入腎臟取組織，因腎臟血流豐富(每分鐘約1/4心輸出量流經腎臟)，最主要、最常見的合併症是「出血」(血尿、腎周圍血腫，少數需輸血或栓塞)。故術後須「臥床壓迫、平躺數小時、監測生命徵象與血尿」。本題問「可能出現的合併症」者即C出血。雖然嚴重時也可能感染或動靜脈瘻管，但最主要記憶點是「出血」。","options":{"A":"急性腎衰竭非腎切片最主要併發症。","B":"腎破裂罕見，非主要併發症。","C":"正解。腎臟血流豐富，切片最主要併發症是出血。","D":"腎水腫非腎切片典型併發症。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"102030-N3-68":{"quick":"急性腎盂腎炎是感染、以膿尿菌尿為主，「不會」大量蛋白尿，B為答案。","detail":{"background":"蛋白尿主要見於「腎絲球受損」的疾病：A腎病症候群(大量蛋白尿，核心特徵)、C慢性腎絲球腎炎(腎絲球發炎滲漏蛋白)、D多囊性腎疾病(腎實質破壞、可有蛋白尿)。本題問「不會出現蛋白尿」者：B「急性腎盂腎炎」——是腎盂腎實質的「細菌感染」，尿檢以「膿尿(WBC)、菌尿、白血球圓柱體」為主，「不以蛋白尿為特徵」(感染雖可有少量蛋白尿，但本題相對而言腎盂腎炎是『非蛋白尿』疾病)，故B為答案。記憶:蛋白尿=腎絲球疾病的標誌。","options":{"A":"腎病症候群以大量蛋白尿為核心特徵。","B":"正解(不會)。腎盂腎炎是感染，以膿尿菌尿為主，非蛋白尿。","C":"慢性腎絲球腎炎會有蛋白尿。","D":"多囊性腎疾病可有蛋白尿。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"102030-N3-69":{"quick":"IVP檢查「後」應多喝水排出顯影劑，「禁食8小時」為錯誤，D。","detail":{"background":"靜脈注射腎盂攝影(IVP)護理：A檢查前一天採低渣飲食、B檢查前清潔腸道(避免腸氣糞便影響顯影)、C檢查前確認對「顯影劑過敏史」(碘過敏是嚴重風險)皆正確。本題問「錯誤者」：D「檢查後要臥床休息及禁食8小時」——IVP檢查「後」應「鼓勵多喝水」以加速排出含碘顯影劑、保護腎臟、預防顯影劑腎病變，而非禁食8小時臥床；禁食是檢查「前」的準備。故D錯誤。","options":{"A":"檢查前一天低渣飲食，正確。","B":"檢查前清潔腸道(避免腸氣干擾)，正確。","C":"檢查前確認顯影劑過敏史，正確。","D":"錯誤(本題選此)。IVP檢查「後」應多喝水排顯影劑，非禁食8小時。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"102110-N3-47":{"quick":"BUN/Creatinine正常比值約「20:1」(C)。","detail":{"background":"血液尿素氮(BUN)與血肌酸酐(Creatinine)的正常比值約為「10–20:1(常以20:1為記憶值)」。此比值用於鑑別腎衰竭類型：①「腎前性」(脫水、低灌注)時尿素再吸收增加，比值「>20:1(升高)」;②「腎性(實質病變)」時兩者等比上升，比值維持「約10–15:1(正常)」。本題問「正常比值」者即C 20:1。記憶:正常約20:1、腎前性升高、腎性正常。","options":{"A":"1:1過低，非正常比值。","B":"5:1過低，非正常比值。","C":"正解。BUN/Cr正常比值約20:1。","D":"40:1偏高，提示腎前性(脫水)而非正常。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"102110-N3-59":{"quick":"「留鹽激素(醛固酮)」由腎上腺分泌，非腎臟製造，B錯誤。","detail":{"background":"腎臟「製造/分泌」的荷爾蒙與活性物質包括：A「前列腺素(prostaglandin)」(調節腎血流)、C「腎素(renin)」(啟動RAAS調節血壓)、D「紅血球生成素(EPO)」(刺激骨髓造血)，以及活化維生素D(1,25-(OH)2-D3)。本題問「錯誤(非腎臟製造)」者：B「留鹽激素(醛固酮, aldosterone)」——醛固酮是由「腎上腺皮質」分泌(受腎素-血管收縮素系統調控)，「並非腎臟本身製造」，故B為答案。注意:腎臟分泌的是「腎素」，醛固酮是腎上腺分泌。","options":{"A":"前列腺素由腎臟製造(調節腎血流)，正確敘述。","B":"錯誤(本題選此)。醛固酮(留鹽激素)由「腎上腺皮質」分泌，非腎臟製造。","C":"腎素由腎臟(近腎絲球器)分泌，正確。","D":"紅血球生成素(EPO)由腎臟製造，正確。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"103100-N3-64":{"quick":"酚紅試驗(PSP)前應「多喝水」充盈膀胱，「禁飲水濃縮」為錯誤，A。","detail":{"background":"泌尿道檢查注意事項：B膀胱鏡檢查前後多攝取水分(術後沖洗預防感染)(對)；C IVP前限制水分與清潔腸道(避免稀釋顯影、減少腸氣干擾)(對)；D腎切片後注意血尿發生(對)。本題問「錯誤者」：A「酚紅試驗(PSP test)前一小時禁飲水以濃縮藥液」——PSP試驗評估腎小管分泌功能，注射酚紅染料後需「收集定時尿液」，檢查前/中應「適量飲水保持尿量」以利收集尿液樣本，而非禁水濃縮，故A的觀念錯誤，為答案。","options":{"A":"錯誤(本題選此)。PSP試驗應適量飲水保尿量以利收集，非禁水濃縮。","B":"膀胱鏡前後多攝取水分，正確。","C":"IVP前限制水分及清潔腸道，正確。","D":"腎切片後注意血尿發生，正確。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"105030-N3-66":{"quick":"腎臟「近側腎小管」再吸收最大量的水分與溶質(A)。","detail":{"background":"腎元各段的水分再吸收：①「近側腎小管(proximal tubule)」再吸收『最大量(約65–70%)』的水分、鈉、葡萄糖、胺基酸、重碳酸鹽——是再吸收水分最主要的部位(A正確);②亨利氏環(降支再吸收水、升支再吸收鈉但不透水);③遠側腎小管(受醛固酮調節再吸收鈉);④集尿管(受ADH調節再吸收水，做最終濃縮)。本題問「再吸收水分」的主要部位，標準答案為A近側腎小管(再吸收量最大)。","options":{"A":"正解。近側腎小管再吸收最大量(約65~70%)的水分與溶質。","B":"亨利氏環參與濃縮機制，但水再吸收量不如近側腎小管。","C":"遠側腎小管受醛固酮調節再吸收鈉，水再吸收量較少。","D":"集尿管受ADH調節做最終濃縮，非再吸收最大量處。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"106030-N3-65":{"quick":"脫水(血液濃縮、尿素再吸收增加)會使BUN/Cr比值「上升」(B)。","detail":{"background":"BUN/Creatinine比值敘述：A「正常比值約10–20:1(常記20:1)」而非30:1(錯)；B「脫水會導致比值『上升』」——脫水時腎前性低灌注，腎小管對水鈉與尿素再吸收增加，BUN升得比Cr多→比值上升(>20:1)(對)；C「發燒導致比值下降」錯誤——發燒、組織分解增加會使BUN相對上升、比值『上升』而非下降;D「嚴重腹瀉導致比值下降」錯誤——腹瀉脫水(腎前性)同樣使比值「上升」。本題問「正確者」即B脫水使比值上升。","options":{"A":"正常比值約20:1而非30:1，錯誤。","B":"正解。脫水(腎前性)使BUN相對升高→比值上升。","C":"發燒/組織分解使比值「上升」非下降，錯誤。","D":"嚴重腹瀉脫水使比值「上升」非下降，錯誤。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"106110-N3-58":{"quick":"腎絲球過濾率最佳指標=「肌酸酐廓清率(CCr)」(C)。","detail":{"background":"評估腎絲球過濾率(GFR)的最佳臨床指標是「肌酸酐廓清率(creatinine clearance, CCr)」——肌酸酐由肌肉代謝產生、量穩定，主要經腎絲球過濾排出、幾乎不被再吸收，故其廓清率可估算GFR(正常約90–120 mL/min)。本題問「檢測GFR最佳指標」者即C。A尿液培養(診斷感染)、B KUB攝影(看結構/結石)、D酚紅試驗(評估腎小管『分泌』功能)皆非評估腎絲球過濾率的最佳指標。","options":{"A":"尿液培養診斷感染，非評估GFR。","B":"KUB攝影看結構/結石，非GFR指標。","C":"正解。肌酸酐廓清率(CCr)是評估GFR的最佳指標。","D":"酚紅試驗評估腎小管「分泌」功能，非腎絲球過濾率。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"108110-N3-59":{"quick":"血清肌酸酐升高最能反映「腎功能受損」(B)。","detail":{"background":"在選項中，「血清肌酸酐(creatinine)升高」最能特異地顯示「腎絲球過濾功能(腎功能)受損」——因肌酸酐由肌肉穩定產生、主要經腎絲球過濾排出且受飲食影響小，當腎功能下降時血肌酸酐上升(且GFR需下降約50%以上才明顯上升)，是評估腎功能的「最佳指標」。A「血中尿素氮(BUN)升高」較易受脫水、飲食蛋白、消化道出血等「腎外因素」影響、特異性較差;C尿鈉、D尿鈣升高非反映腎功能受損的直接指標。故正解B血清肌酸酐升高。","options":{"A":"BUN升高易受脫水/飲食/出血等腎外因素影響，特異性差。","B":"正解。血清肌酸酐升高最能特異反映腎功能受損。","C":"尿中鈉離子升高非反映腎功能受損的指標。","D":"尿中鈣離子升高非腎功能受損指標。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"109030-N3-61":{"quick":"評估腎功能最佳是「肌酸酐廓清率(CCr)」而非「尿中肌酸酐尿素氮」，C錯誤。","detail":{"background":"尿液檢查敘述：A尿液分析是泌尿系統「最簡便的例行檢查」(對)；B細菌培養「>10⁵ CFU/mL代表泌尿道感染」(對)；D「清晨第一次尿(濃縮、未受飲食活動影響)是尿液分析最佳檢體」(對)。本題問「錯誤者」：C「尿中肌酸酐和尿素氮是評估腎功能『最佳』指標」——評估腎功能(GFR)的最佳指標是「肌酸酐『廓清率(CCr)』或『血清』肌酸酐」，而非單看「尿中」肌酸酐與尿素氮，故C敘述不正確，為答案。","options":{"A":"尿液分析是最簡便例行檢查，正確。","B":"細菌培養>10⁵ CFU/mL代表泌尿道感染，正確。","C":"錯誤(本題選此)。評估腎功能最佳是CCr或血清肌酸酐，非「尿中」肌酸酐尿素氮。","D":"清晨第一次尿是尿液分析最佳檢體，正確。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"109110-N3-65":{"quick":"肌酸酐清除率(CCr)正常值約「95~135 mL/min」(C)。","detail":{"background":"肌酸酐清除率(CCr)反映腎絲球過濾率，正常成人約「90–120(或95–135) mL/min」(男性略高於女性，隨年齡下降)。本題問「CCr正常值範圍」者，選項中最符合的是C「95–135 mL/min」。CCr下降代表GFR下降、腎功能受損(如CCr<60持續即CKD、<15為腎衰竭)。記憶:正常GFR/CCr約100上下(90–120)。","options":{"A":"25~55過低，屬腎功能受損範圍。","B":"65~85偏低，非正常上限範圍。","C":"正解。CCr正常值約95~135 mL/min。","D":"145~165過高，非正常範圍。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"109110-N3-66":{"quick":"前列腺素有「抑制ADH」作用(促進排水)(A)。","detail":{"background":"腎臟相關荷爾蒙的生理功能，正確者為A「前列腺素(prostaglandins)有抑制抗利尿荷爾蒙(ADH)的作用」——腎臟前列腺素可拮抗ADH、調節腎血流與排水(這也是為何NSAID抑制前列腺素會影響腎血流與水鈉)。其他錯誤：B「ADH增加遠曲小管及集尿管水分再吸收」其實「是正確的生理」(ADH確實增加集尿管水再吸收)，但本題以A為答案、且B敘述本身正確——注意本題選『正確者』為A(B雖也正確但官方答案取A;考點在前列腺素抑制ADH);C活化維生素D「促進」腸道鈣吸收(非抑制);D腎素在「血壓『下降』」時分泌(非上升)。故正解A。","options":{"A":"正解。前列腺素有抑制ADH(促進排水)的作用。","B":"ADH確實增加集尿管水再吸收(敘述正確)，但本題官方答案取A。","C":"活化維生素D「促進」腸道鈣吸收，非抑制，錯誤。","D":"腎素在血壓「下降」時分泌，非上升，錯誤。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"110030-N3-62":{"quick":"24小時尿液檢查可評估尿中蛋白質含量(B)。","detail":{"background":"尿液檢查目的，正確者為B「24小時尿液檢查可以評估尿中蛋白質(總)含量」——收集24小時全部尿液可定量蛋白尿(>3.5 g/天即腎病症候群範圍)、肌酸酐廓清率等，是評估腎絲球滲漏與腎功能的方法。其他錯誤：A「尿液『細菌培養』是初步常規檢查」錯誤(初步常規是『尿液分析urinalysis』，細菌培養是進一步確認感染);C酚紅試驗測的是「腎小管『分泌』能力」而非「腎絲球對外排除能力」;D肌酸酐廓清率測「腎絲球過濾率」而非「腎小管尿液濃縮能力」(濃縮能力以尿比重/滲透壓測)。故正解B。","options":{"A":"初步常規是尿液分析，非細菌培養，錯誤。","B":"正解。24小時尿液檢查可評估尿中蛋白質含量。","C":"酚紅試驗測腎小管分泌，非腎絲球排除能力，錯誤。","D":"肌酸酐廓清率測腎絲球過濾率，非腎小管濃縮能力，錯誤。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"110110-N3-36":{"quick":"肝衰竭時尿素生成減少→BUN下降→BUN/Cr比值「下降」(D)。","detail":{"background":"BUN/Creatinine比值敘述，正確者為D「肝衰竭會導致比值『下降』」——尿素(BUN)是肝臟代謝蛋白質的產物，肝衰竭時尿素生成減少→BUN下降→BUN/Cr比值下降。其他錯誤：A「正常比值40:1」錯誤(正常約20:1，40:1是腎前性升高);B「發燒導致比值下降」錯誤——發燒/組織分解使BUN相對上升、比值『上升』;C「嚴重腹瀉導致比值下降」錯誤——腹瀉脫水(腎前性)使比值『上升』。故正解D。","options":{"A":"正常比值約20:1，40:1是腎前性升高，錯誤。","B":"發燒使比值「上升」非下降，錯誤。","C":"嚴重腹瀉脫水使比值「上升」非下降，錯誤。","D":"正解。肝衰竭尿素生成減少→BUN下降→比值下降。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"110110-N3-63":{"quick":"尿流速(uroflowmetry)是非侵入排尿檢查，「不會」造成血尿(C)。","detail":{"background":"檢查是否造成血尿取決於是否侵入尿路黏膜：A膀胱鏡(侵入摩擦黏膜)、B腎臟切片(穿刺腎臟出血)、D逆行性腎盂攝影(膀胱鏡置管+顯影劑)皆「可能」造成血尿。本題問「不會出現血尿」者：C「尿流速(uroflowmetry)」——是讓病人「自然解尿到流速計」測量尿流速率的「非侵入性」檢查，沒有器械進入尿道，不會造成血尿，故為答案。","options":{"A":"膀胱鏡侵入摩擦黏膜，可能血尿。","B":"腎臟切片穿刺，可能血尿。","C":"正解(不會)。尿流速是非侵入自然解尿檢查，不造成血尿。","D":"逆行性腎盂攝影置管+顯影劑，可能血尿。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"110110-N3-64":{"quick":"前列腺肥大以「阻塞性排尿症狀」為主，不以血尿為常見表現(C)。","detail":{"background":"出現「血尿」的常見疾病：A輸尿管結石(刮傷尿路黏膜→血尿伴絞痛)、B腎絲球腎炎(腎絲球受損→血尿伴蛋白尿圓柱體)、D膀胱癌(無痛性血尿)皆以血尿為常見表現。本題問「常見臨床症狀『不包括』血尿」者：C「前列腺肥大(BPH)」——以「阻塞性與刺激性排尿症狀(頻尿、夜尿、尿流細、餘尿、排尿困難)」為主，血尿『非其常見表現』(雖偶可因黏膜充血或合併結石出血，但非典型)，故C為答案。","options":{"A":"輸尿管結石常見血尿(伴絞痛)。","B":"腎絲球腎炎常見血尿(伴蛋白尿)。","C":"正解(不包括)。BPH以阻塞性排尿症狀為主，非以血尿為常見。","D":"膀胱癌常見無痛性血尿。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"111110-N3-66":{"quick":"多囊性腎病(成人型ADPKD)多在「30~40歲(成年中年)」發病，B說青春期為錯誤。","detail":{"background":"多囊性腎病敘述：A「是一種遺傳性疾病」(對，成人型為體染色體顯性遺傳ADPKD)；C「常見症狀為後腰部鈍痛」(囊腫使腎臟腫大牽扯)(對)；D「通常可由腎超音波確認囊腫」(對，影像可見雙側多發性囊腫)。本題問「錯誤者」：B「大多數在『青春期』發病」——成人型多囊腎(ADPKD)通常在「30–40歲(成年中年)」才出現症狀與診斷，而非青春期，故B錯誤。(嬰兒型ARPKD才在嬰幼兒期表現，但較罕見。)","options":{"A":"是遺傳性疾病(ADPKD為體染色體顯性)，正確。","B":"錯誤(本題選此)。成人型多囊腎多在30~40歲發病，非青春期。","C":"常見後腰部鈍痛(腎腫大)，正確。","D":"可由腎超音波確認囊腫，正確。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"112030-N3-62":{"quick":"逆行性腎盂造影=顯影劑不入血流+術後監測尿瀦留感染血尿→34。","detail":{"background":"逆行性腎盂造影術(retrograde pyelography)經膀胱鏡將導管插入輸尿管「逆行注入碘顯影劑」。正確敘述：3「顯影劑『不會進入血流』」(直接注入泌尿道、不經靜脈，故腎毒性低，適合腎功能不全者)(對)；4「檢查後監測尿瀦留、感染、血尿」(因侵入性置管)(對)。而1「評估『鋇劑』過敏」錯誤——用的是『碘』顯影劑而非鋇劑(鋇劑用於消化道);2「衛教病人勿排空膀胱」方向不對(此檢查經膀胱鏡操作，相關準備非要求勿排空膀胱)。故正確為34，答案D。","options":{"A":"含1(鋇劑過敏錯誤，用碘顯影劑)、2不對。","B":"含1錯誤。","C":"含2不對。","D":"正解。3顯影劑不入血流+4術後監測尿瀦留/感染/血尿。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"112180-N3-40":{"quick":"BUN升高也可能是「脫水」，不一定代表腎功能不佳(A)。","detail":{"background":"腎臟功能血液檢查，正確者為A「尿素氮(BUN)升高可能是脫水，不一定表示腎功能不佳」——BUN易受「脫水、高蛋白飲食、消化道出血、組織分解」等腎外因素影響，故單一BUN升高需綜合判斷。其他錯誤：B「尿素氮和肌酸酐不受飲食影響」錯誤(BUN受飲食蛋白影響);C「尿中肌酸酐排泄減少時血中肌酸酐也下降」錯誤(腎功能差時尿中排出減少、血中肌酸酐反而『上升』);D「BUN升高即表示腎功能喪失50%以上」不精確(BUN受腎外因素影響，反而是『肌酸酐』升高才較確切代表GFR下降約50%)。故正解A。","options":{"A":"正解。BUN升高可能是脫水等腎外因素，不一定腎功能不佳。","B":"BUN受飲食蛋白影響，敘述錯誤。","C":"腎功能差時血中肌酸酐「上升」非下降，錯誤。","D":"BUN受腎外因素影響，此敘述不精確(肌酸酐才較確切)，錯誤。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"113030-N3-38":{"quick":"用「碘顯影劑」的檢查(腎動脈攝影、IVP)前須確認腎功能→15。","detail":{"background":"檢查前須確認腎功能的是「使用含碘靜脈顯影劑、且顯影劑經腎絲球過濾排出」者(避免顯影劑腎病變)：1「腎動脈攝影術」(注入大量碘顯影劑)、5「靜脈注射腎盂攝影術(IVP)」(靜脈打碘顯影劑)——這兩者顯影劑經血流到腎臟過濾，腎功能差者有腎毒性風險，須先確認腎功能。而2「KUB(腎輸尿管膀胱X光)」不用顯影劑;3「腎臟超音波」不用顯影劑;4「逆行性腎盂攝影」顯影劑逆行注入泌尿道、『不經血流』故腎毒性低。故須確認腎功能者為15，答案B。","options":{"A":"含2(KUB不用顯影劑)不需。","B":"正解。1腎動脈攝影+5 IVP用碘顯影劑經腎過濾，須確認腎功能。","C":"含2、3(無顯影劑)不需。","D":"含4(逆行性顯影劑不入血流)不需確認腎功能。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"114030-N3-38":{"quick":"尿中紅血球見於結石/BPH/感染等泌尿病因；「子癲前症」以蛋白尿為主非血尿，C錯誤。","detail":{"background":"尿液分析出現「紅血球(血尿)」的病因：A輸尿管結石(刮傷黏膜)、B前列腺肥大(黏膜充血或合併結石/感染可有血尿)、D尿路感染(發炎黏膜出血)皆可造成血尿。本題問「錯誤(非血尿病因)」者：C「子癲前症(preeclampsia)」——其腎臟表現以「蛋白尿、高血壓、水腫」為主(腎絲球內皮病變漏蛋白)，「並非以血尿為特徵」，故C為答案。記憶:子癲前症=高血壓+蛋白尿，非血尿。","options":{"A":"輸尿管結石刮傷黏膜→血尿，是病因。","B":"前列腺肥大可合併血尿，是病因。","C":"錯誤(本題選此)。子癲前症以「蛋白尿」為主，非血尿病因。","D":"尿路感染發炎黏膜出血→血尿，是病因。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"114030-N3-40":{"quick":"肌酸酐「不易受飲食影響」是其作為腎功能指標的優點，A說易受飲食影響為錯誤。","detail":{"background":"血清肌酸酐(creatinine)敘述：B「是估算腎臟功能的最佳指標」(對，肌肉穩定產生、經腎絲球過濾)；C「升高時代表腎功能已損傷約50%以上」(對，GFR需下降約一半肌酸酐才明顯上升);D「升高代表腎絲球過濾率功能已降低」(對)。本題問「錯誤者」：A「易受飲食影響，可用以估算排泄能力」——肌酸酐由肌肉代謝穩定產生、「『不易』受飲食影響」(這正是它優於BUN作為腎功能指標的原因)，故A「易受飲食影響」與事實相反，為錯誤。(易受飲食影響的是『尿素氮BUN』。)","options":{"A":"錯誤(本題選此)。肌酸酐「不易」受飲食影響，這是其優於BUN之處。","B":"是估算腎功能的最佳指標，正確。","C":"升高代表腎功能損傷約50%以上，正確。","D":"升高代表腎絲球過濾率降低，正確。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"114100-N3-37":{"quick":"留置導尿管採尿應由「導管採尿口無菌抽取」，不可由蓄尿袋取尿，B錯誤。","detail":{"background":"尿液檢查敘述：A「除早晨第一次尿外，任何時間採集的尿液稱隨機尿(random urine)」(對)；C「尿液檢體應於30分鐘內(或盡快、冷藏)送檢」(對，避免細菌增生、成分變質);D「常規尿液收集取中段尿(midstream)送檢」(對，減少前段污染)。本題問「錯誤者」：B「導尿管留置可由蓄尿袋採尿送檢」——留置導尿管採檢應「以無菌技術由導尿管的『採檢口(取樣埠)』消毒後抽取新鮮尿液」，「不可由『蓄尿袋(集尿袋)』取已存放的尿液」(袋中尿液久置、細菌滋生、不能代表當下尿液)，故B錯誤。","options":{"A":"非早晨第一次尿的任何時間尿稱隨機尿，正確。","B":"錯誤(本題選此)。留置導尿應由導管採檢口無菌抽取，不可由蓄尿袋取尿。","C":"尿液檢體應30分鐘內送檢，正確。","D":"常規收集取中段尿，正確。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"115030-N3-39":{"quick":"腎動脈攝影(用顯影劑)檢查後應「多喝水」排出顯影劑、保護腎臟(B)。","detail":{"background":"泌尿道檢查正確者為B「腎動脈攝影術檢查後應多喝水」——腎動脈攝影使用大量含碘顯影劑，檢查後鼓勵多喝水可加速排出顯影劑、降低顯影劑腎病變風險(穿刺處則須加壓臥床)。其他錯誤：A「尿流速檢查前禁食」錯誤(尿流速是自然解尿檢查，不需禁食，反而需膀胱充盈);C「IVP檢查中採『俯臥』」錯誤(IVP多採仰臥);D「經皮腎臟切片採『截石臥姿』」錯誤——腎切片應採「『俯臥』(趴姿)」墊高腹部使腎臟靠近背部以利穿刺(截石臥姿是膀胱鏡/婦科用)。故正解B。","options":{"A":"尿流速檢查不需禁食(需膀胱充盈)，錯誤。","B":"正解。腎動脈攝影用顯影劑，檢查後多喝水排出保護腎臟。","C":"IVP多採仰臥，非俯臥，錯誤。","D":"腎切片採「俯臥」非截石臥姿，錯誤。"},"sources":["新文京《內外科護理學》泌尿系統檢查","Harrison 內科學 腎功能評估","腎臟生理與診斷檢查"]}},"111030-N3-66":{"quick":"錯誤者：腎臟切片採俯臥，穿刺部位在「腎下極(約第12肋骨下緣)」，非第12肋與脊椎交角(腎門/上極)處。","detail":{"background":"腎臟活體組織切片用於診斷腎實質疾病(如腎絲球腎炎、不明原因蛋白尿/血尿)病因，多在「超音波導引」下進行。病人採「俯臥」並於腹部下墊枕將腎往背側頂出固定；穿刺取「腎下極」組織，位置約在第12肋骨「下緣」、脊柱外側，避開腎門大血管與集尿系統。把部位說成「第12肋骨與脊椎交角中間(肋脊角)」並不正確，該處接近腎上極/腎門、血管豐富，穿刺風險高。術前須確認凝血功能、停用阿斯匹靈等抗血小板藥；術後最重要的併發症是出血，須臥床休息約24小時、加壓、監測血壓與血尿。故選項B的穿刺部位描述為錯誤。","options":{"A":"正確。在超音波導引下取組織以確認腎實質疾病病因。","B":"錯誤(本題答案)。穿刺取腎下極(第12肋下緣)，非第12肋與脊椎交角(肋脊角)處。","C":"正確。術前確認凝血功能並停用含Aspirin藥物。","D":"正確。術後24小時內臥床休息、避免下床以防出血。"},"sources":["新文京《內外科護理學》腎臟切片檢查","腎臟活體組織切片術前後護理"]}}},TO=["U1腎絲球腎炎與腎病症候群", "U2慢性腎臟病與尿毒症", "U3急性腎損傷與間質性腎炎", "U4透析與腎臟移植", "U5泌尿道感染", "U6尿路結石與阻塞", "U7泌尿系統腫瘤", "U8良性前列腺肥大與排尿障礙", "U9尿失禁與排尿功能", "U10水分與電解質異常", "U11酸鹼平衡", "U12腎臟功能檢查診斷與其他腎病"],LEC={"U1腎絲球腎炎與腎病症候群":{"title":"U1 腎絲球腎炎與腎病症候群 複習講義","html":"<h3>一、急性腎絲球腎炎(AGN)</h3>\n<p>多為「<b>鏈球菌感染後</b>」(A群β型溶血性鏈球菌咽炎/皮膚感染後 1–3 週)，<b>免疫複合體</b>沉積於腎絲球基底膜、活化補體→<b>雙側瀰漫對稱</b>發炎破壞。表現：<b>茶色血尿、蛋白尿、水腫、高血壓、少尿、氮血症</b>；好發兒童、男略多。實驗室：<b>補體 C3、C4 下降(消耗)、ESR 升高、紅血球圓柱體</b>；GFR 下降。確診靠<b>腎臟切片</b>。</p>\n<h3>二、AGN 護理</h3>\n<p>急性期：<b>臥床休息、限鈉限水限蛋白、高醣足熱量、預防感染</b>；喉嚨痛/皮膚感染要早期治療(清除鏈球菌)。多自限、不需長期抗生素。慢性腎絲球腎炎→腎臟逐漸萎縮、BUN/Cr 上升，飲食限鈉限鉀限磷、控血壓、避免感染。</p>\n<h3>三、腎病症候群(四大特徵)</h3>\n<p>腎絲球<b>通透性增加</b>→<b>大量蛋白尿(>3.5 g/天)→低白蛋白血症→膠體滲透壓下降→全身水腫</b>(眼眶、下肢)，肝代償合成脂蛋白→<b>高血脂(膽固醇、LDL、三酸甘油酯上升)</b>。抗凝蛋白流失+血液濃縮→易<b>腎靜脈血栓</b>。長期高血脂+高凝→<b>心血管疾病</b>風險上升。</p>\n<h3>四、腎病症候群處置</h3>\n<p>Prednisolone(類固醇)減蛋白尿、Furosemide(利尿)控水腫、抗凝劑防腎靜脈血栓；飲食<b>低鈉、適量蛋白、足夠熱量</b>(不鼓勵高蛋白，會加速惡化)。<b>嚴重水腫應臥床休息、抬高肢體</b>(非多活動)。每日量<b>體重、腹圍、輸出入量</b>。腎病與 AGN 共同點＝水腫+蛋白尿；高血脂屬腎病、血尿屬腎炎。</p>"},"U2慢性腎臟病與尿毒症":{"title":"U2 慢性腎臟病與尿毒症 複習講義","html":"<h3>一、CKD 分期(依 GFR)</h3>\n<p>第1期≥90、第2期60–89、第3期30–59、<b>第4期15–29</b>、<b>第5期<15(尿毒症，準備透析)</b>。記憶口訣：GFR 20→第四期、GFR<15→第五期。第四期應<b>建立透析血管通路</b>使其成熟；延緩惡化衛教應在 1–3 期完成。</p>\n<h3>二、尿毒症併發症</h3>\n<p><b>氮血症、高血脂、高血磷、低血鈣、代謝性酸中毒、高血鉀、貧血、續發性副甲狀腺『亢進』(CKD-MBD)</b>、胃腸出血(血小板功能差)、月經不規則/性功能異常、皮膚搔癢。注意是副甲狀腺「亢進」非低下。</p>\n<h3>三、腎性貧血</h3>\n<p>主因<b>EPO 缺乏</b>+紅血球存活期縮短。治療主軸＝<b>補充 EPO</b>+足夠鐵(常靜脈鐵劑)；鐵劑、葉酸只是「原料」無法在 EPO 缺乏下刺激造血。EPO 治療準則：ferritin>200、TSAT>20%、無惡性高血壓；目標 Hct 不宜過高(約 30–33%，過高增加血栓死亡風險)。</p>\n<h3>四、ACEI 與飲食</h3>\n<p>ACEI 擴張<b>出球小動脈</b>→降腎絲球內壓→減蛋白尿、延緩惡化、降血壓；副作用<b>乾咳、高血鉀(非低血鉀)、低血壓</b>。糖尿病腎病變是糖尿病人主要死因之一，治療：<b>限蛋白、HbA1c<7%、血壓<130/80、ACEI/ARB</b>。飲食限蛋白(高生物價值)+足夠熱量(避免蛋白被當熱量燒掉產生含氮廢物)。</p>"},"U3急性腎損傷與間質性腎炎":{"title":"U3 急性腎損傷與間質性腎炎 複習講義","html":"<h3>一、AKI 三類病因</h3>\n<p><b>腎前性</b>(腎血流不足：心輸出量↓、循環血量耗竭、休克、嚴重燒傷、敗血症)；<b>腎性/腎因性</b>(腎實質病變：急性腎小管壞死、腎絲球腎炎、間質性腎炎、SLE 狼瘡腎炎)；<b>腎後性</b>(尿路阻塞：結石、前列腺肥大)。鑑別小心：腎絲球腎炎與 SLE 屬「腎因性」非腎前性。</p>\n<h3>二、腎前性 vs 腎性鑑別</h3>\n<p><b>腎前性</b>(腎小管功能完好、努力保水鈉)：BUN/Cr <b>>20:1</b>、尿鈉<b><20</b>、尿比重>1.015、尿滲透壓>500、FENa<1%。<b>腎性 ATN</b>：BUN/Cr 約 10–15:1、尿鈉>40、尿比重低、尿滲透壓低。</p>\n<h3>三、少尿期(最危險)</h3>\n<p>尿量<400 c.c./天。生化：<b>BUN↑、Cr↑、血鉀↑(高血鉀致命)、血磷↑、代謝性酸中毒、體液過量</b>。處置：<b>限水(前日尿量+不顯性流失約400–500)、Kayexalate 降鉀、高熱量低蛋白低鈉低鉀飲食</b>；少尿期 Lasix 利尿效果有限。高血鉀心電圖＝<b>T 波高尖</b>(非低寬)。AKI 腎臟大小正常或腫大(慢性才縮小)。</p>\n<h3>四、急性間質性腎炎(AIN)</h3>\n<p>多因「<b>藥物過敏</b>(抗生素、NSAID)」，可致 AKI，常伴發燒、皮疹、嗜伊紅球增多。處置：<b>停用致敏藥物</b>，多數腎功能可恢復、不需長期透析。腦下垂體後葉受損(ADH 不足)→尿崩症「<b>多尿</b>」不會少尿。</p>"},"U4透析與腎臟移植":{"title":"U4 透析與腎臟移植 複習講義","html":"<h3>一、透析適應症(AEIOU)</h3>\n<p><b>A</b>cidosis(嚴重酸中毒)、<b>E</b>lectrolyte(難治高血鉀)、<b>I</b>ntoxication(可透析清除的中毒如巴比妥)、<b>O</b>verload(體液過量/肺水腫)、<b>U</b>remia(尿毒症狀)。指標：CCr<10、BUN>100、Cr 明顯升高、持續噁心嘔吐。<b>AKI 利尿期(腎功能恢復中)非適應症</b>。</p>\n<h3>二、HD vs CAPD 比較</h3>\n<p><b>HD</b>(間歇、每週3次)：快速移除→易<b>不平衡症候群(噁心、嘔吐、低血壓、頭痛、抽筋)</b>、對血壓/心血管影響大、<b>飲食限制較嚴</b>。<b>CAPD</b>(連續、自行換液)：自我照顧負擔大、<b>飲食較寬鬆</b>、<b>蛋白質流失多、葡萄糖透析液致高三酸甘油酯</b>、小分子清除不如 HD、血壓波動小較適合心血管不穩者。正常腹膜透析引流液<b>清澈</b>，混濁=腹膜炎。</p>\n<h3>三、不平衡症候群 & 水分控制</h3>\n<p>不平衡症候群：透析快速降 BUN，腦內溶質下降慢→滲透壓差→<b>腦水腫</b>、神經症狀(不安、意識降低、抽搐)，好發<b>初次/前幾次透析、BUN 很高</b>者。水分控制：<b>兩次透析間體重增加不超過乾體重 5%(約 1–1.5 kg)</b>。水溶性維生素(C、葉酸、B群)會被透析清除→<b>透析後</b>才服用。</p>\n<h3>四、動靜脈瘻管 & 腎移植</h3>\n<p>AV 瘻管側手臂<b>禁量血壓、禁抽血打針、禁綁緊提重物</b>；摸到<b>震顫(thrill)、聞雜音=通暢</b>(摸不到=栓塞)；術後抬高、握球運動促成熟。腎移植植入<b>下腹腹膜外腸骨窩</b>、原腎多保留、輸尿管接膀胱；交叉試驗<b>陰性</b>才可移植。免疫抑制下<b>禁活疫苗(卡介苗、麻疹)</b>、最常見併發症=<b>感染</b>。急性排斥(數天至數月)：<b>發燒、尿量減、Cr 升、血壓升、移植處腫痛、體重增加</b>→加強免疫抑制。糖尿病控制不佳者不適合當捐贈者。</p>"},"U5泌尿道感染":{"title":"U5 泌尿道感染 複習講義","html":"<h3>一、分類與致病菌</h3>\n<p>下泌尿道：<b>尿道炎、膀胱炎</b>；上泌尿道：<b>腎盂腎炎</b>。最常見致病菌＝<b>大腸桿菌(E. coli，腸道菌上行)</b>，其次變形桿菌(Proteus，鹼性尿/磷酸銨鎂結石)、克雷白氏、假單孢。肺炎鏈球菌極少致 UTI。女性尿道短易感染、男性尿道長是保護因子。診斷：尿培養<b>≥10⁵ CFU/mL</b>、膿尿菌尿、ESR/CRP 升高。腎絲球腎炎是免疫性發炎，<b>不屬 UTI</b>。</p>\n<h3>二、急性腎盂腎炎</h3>\n<p>表現：<b>寒顫高燒、頻尿尿急、噁心嘔吐、肋骨脊柱角(CVA)叩擊痛</b>；危險因子糖尿病、尿路結石、尿滯留。<b>急性期應多喝水(2000–3000 mL)沖洗稀釋細菌，非限水</b>。腹瀉便秘非典型。</p>\n<h3>三、飲食與酸鹼</h3>\n<p>UTI 鼓勵<b>酸化尿液</b>抑菌→吃<b>酸灰性食物(肉、蛋、全穀、蔓越莓、梅子、李子)</b>；<b>奶類、柑橘屬「鹼灰性」會鹼化尿液</b>應減少。維生素 C 可微酸化(不需高劑量 1000 mg)。</p>\n<h3>四、預防復發</h3>\n<p>抗生素<b>完成整個療程</b>(症狀緩解不可自行停藥)、如廁後<b>由前向後</b>擦拭、多喝水、<b>淋浴勿盆浴</b>、性交後立即排空膀胱、減少不必要導尿管(院內 UTI 主因＝侵入性檢查/留置導尿)。體溫正常<b>不能排除</b>感染(膀胱炎常無發燒、老人反應差)。</p>"},"U6尿路結石與阻塞":{"title":"U6 尿路結石與阻塞 複習講義","html":"<h3>一、結石類型與成因</h3>\n<p>最常見<b>草酸鈣結石(約 70–80%，溶解度不受尿 pH 影響)</b>。<b>尿酸結石</b>(痛風、酸性尿)→鹼化尿液;<b>磷酸銨鎂(struvite，感染性、鹼性尿，常成鹿角結石)</b>→酸化尿液;胱胺酸(酸性尿)。危險因子：<b>高維生素 D、副甲狀腺亢進、長期臥床(骨鈣流失)、痛風、脫水</b>。腎上腺亢進與結石無關。結石最常形成於<b>腎臟</b>。</p>\n<h3>二、臨床表現(腎絞痛)</h3>\n<p><b>突發性尖銳劇痛、血尿、噁心嘔吐</b>；疼痛沿輸尿管放射至<b>下腹、腹股溝、會陰</b>(不會到手臂)。輸尿管三狹窄處(易卡)：<b>腎盂輸尿管接合處、髂血管交叉處、輸尿管膀胱接合處(最窄)</b>。腎/輸尿管結石以腰背絞痛為主，頻尿尿急非典型。</p>\n<h3>三、治療</h3>\n<p><b>體外震波碎石術(ESWL)</b>：適用<b>腎及輸尿管上段、<約2 cm</b> 結石;震波與<b>R 波同步</b>(避開心臟易損期);<b>抗凝血劑/出血傾向者禁用</b>;鹿角結石(大)、膀胱結石(會移動)不適合 ESWL→分別用 PCNL、膀胱鏡。輸尿管鏡碎石可採半身麻醉、術後放雙 J 管。</p>\n<h3>四、護理與飲食</h3>\n<p>核心＝<b>大量分次喝水(3000–4000 mL)</b>稀釋尿液(<b>勿用茶、啤酒、果汁代替開水</b>──茶含草酸、酒升尿酸)。尿酸結石避高普林(內臟、香菇、海鮮)。鈣結石不必完全戒鈣(過度限鈣反增草酸吸收)。術後疼痛應給止痛、嚴重發燒/血尿速回診。<b>心衰竭病人不可一味鼓勵多喝水</b>(會加重心臟負荷)。</p>"},"U7泌尿系統腫瘤":{"title":"U7 泌尿系統腫瘤 複習講義","html":"<h3>一、膀胱癌</h3>\n<p>最早徵象＝<b>無痛性間歇血尿</b>(無痛才易延誤)。最常見<b>移行(泌尿)上皮癌</b>，好發膀胱側壁、三角區。危險因子：<b>吸菸(最重要)、芳香胺染劑、橡膠/美髮業、止痛劑(phenacetin)</b>。轉移以<b>局部+骨盆腔淋巴</b>為主。診斷黃金標準＝<b>膀胱鏡+切片</b>。治療<b>以外科切除為主</b>、化放療為輔；表淺癌可<b>膀胱灌注(BCG/mitomycin)</b>。預防＝戒菸、多喝水、避染劑(補維生素 E 無效)。</p>\n<h3>二、腎細胞癌</h3>\n<p>成人腎臟惡性腫瘤最常見(約 85%)。早期多無症狀，晚期三徵<b>血尿、後腰痛、腹部腫塊</b>;最常轉移<b>肺臟</b>。<b>副腫瘤症候群</b>：分泌 EPO→<b>紅血球增多</b>、類 PTH→<b>高血鈣</b>、腎素→高血壓、HCG→性徵改變(非腎上腺素)。治療<b>根除性腎切除</b>為主，對化療/荷爾蒙反應差(用標靶/免疫療法)。</p>\n<h3>三、前列腺癌</h3>\n<p>好發<b>周邊葉(後葉)</b>(故肛門指診摸得到硬結節);轉移最常<b>骨骼(脊椎)</b>→背痛腰痛、血鈣異常、ALP 升高。診斷：<b>直腸指診+PSA</b>;<b>PSA 是治療反應與復發追蹤指標</b>。治療<b>阻斷雄性素(去勢)</b>非給雄性素。(BPH 好發中葉、癌好發後葉，勿混淆。)</p>\n<h3>四、尿路改道照護</h3>\n<p>迴腸導管(ileal conduit)排出<b>黏液是正常</b>(腸黏膜分泌)。<b>寇克氏囊(Kock pouch)可控制式</b>、定期自我導尿、不需外接集尿袋;迴腸導管、輸尿管造瘻、腎造瘻需<b>持續配戴集尿袋</b>。集尿袋達<b>約 1/2</b> 就排空(非 80%)。造瘻口應<b>紅潤濕潤</b>(暗紅乾燥=缺血);多進食酸性食物酸化尿液防感染、結晶用<b>稀醋</b>清除。</p>"},"U8良性前列腺肥大與排尿障礙":{"title":"U8 良性前列腺肥大與排尿障礙 複習講義","html":"<h3>一、BPH 病理與症狀</h3>\n<p>BPH 是前列腺<b>細胞「增生(hyperplasia)」</b>(非單一細胞肥大)，好發<b>中葉/移行區</b>壓迫尿道。症狀：刺激性(<b>頻尿、夜尿最早出現、尿急</b>)+阻塞性(<b>排尿困難、尿流細弱、中斷、餘尿感</b>);晚期殘尿滿溢→<b>滿溢性尿失禁</b>。是「頻尿」非「多尿」(總尿量不增)。</p>\n<h3>二、膀胱變化與合併症</h3>\n<p>逼尿肌對抗高阻力→<b>膀胱壁增厚、小樑、假性憩室</b>。合併症：殘尿→<b>膀胱結石、泌尿道感染</b>;長期阻塞逆流→腎積水→<b>尿毒症</b>。注意 BPH 合併症是「滿溢性」非「壓力性」尿失禁。</p>\n<h3>三、診斷檢查</h3>\n<p><b>肛門(直腸)指診</b>評估肥大程度;<b>PSA</b>;<b>尿路動力學/尿流速</b>──正常 Qmax>15，<b>最大尿流速<10 mL/秒=尿道出口阻塞</b>。<b>急性泌尿道感染者禁做尿路動力學</b>(會散播感染)。膀胱殘餘尿量以超音波/導尿測。</p>\n<h3>四、治療與術後護理</h3>\n<p>第一線＝<b>觀察+藥物(α阻斷劑 doxazosin、5α還原酶抑制劑 finasteride)</b>;<b>TURP 非第一線</b>(用於藥物無效/併發症)。TURP 術後：放<b>三叉導尿管</b>持續膀胱灌洗,<b>用等張生理食鹽水(禁蒸餾水→溶血、低血鈉、TURP 症候群腦水腫)</b>;<b>逆行性射精常為永久性</b>;避免用力、坐浴、熱敷(防出血)。</p>"},"U9尿失禁與排尿功能":{"title":"U9 尿失禁與排尿功能 複習講義","html":"<h3>一、尿失禁分類(核心)</h3>\n<p><b>壓力性</b>：咳嗽/大笑/打噴嚏/提重物等<b>腹壓增加</b>時漏尿,因<b>骨盆底肌/尿道括約肌鬆弛</b>(多產、肥胖、停經、產後),非膀胱逼尿肌問題。<b>急迫性</b>：強烈尿意後來不及如廁漏尿(<b>膀胱過動/逼尿肌過動</b>)。<b>滿溢性</b>：膀胱過脹殘尿滿溢(BPH、神經性膀胱,<b>男性較常見</b>)。<b>功能性</b>：行動/認知障礙來不及如廁。</p>\n<h3>二、各型處置配對</h3>\n<p><b>壓力性</b>→凱格爾(Kegel)骨盆底肌運動、減重、避免腹壓、α-腎上腺致效劑、嚴重者恥骨後懸吊術/吊帶;<b>藥物效益有限</b>。<b>急迫性</b>→<b>膀胱再訓練(延遲排尿、增加容量)</b>、<b>抗膽鹼藥(oxybutynin)</b>抑制逼尿肌、避免咖啡因;<b>勿給副交感藥(會加重)</b>、勿「有尿意就尿」。<b>滿溢性</b>→<b>定時導尿</b>排空膀胱。</p>\n<h3>三、排尿生理</h3>\n<p>排尿中樞在<b>薦髓 S2–S4</b>。<b>副交感(骨盆神經)</b>→逼尿肌收縮、內括約肌放鬆→排尿;<b>交感(下腹神經)</b>→逼尿肌鬆弛、內括約肌收縮→儲尿;<b>陰部神經(體神經)</b>控制尿道外括約肌──排尿時使外括約肌<b>舒張</b>。逼尿肌是平滑肌、由自律神經控制(非意識直接控制)。</p>\n<h3>四、相關定義</h3>\n<p><b>頻尿</b>＝日間解尿>8 次(每次量少);<b>夜尿</b>＝夜間起床排尿;<b>多尿</b>＝24 小時總尿量增加(糖尿病、尿崩);壓力性尿失禁勿過度限水(脫水濃尿刺激膀胱)。</p>"},"U10水分與電解質異常":{"title":"U10 水分與電解質異常 複習講義","html":"<h3>一、鉀離子(K)</h3>\n<p><b>高血鉀</b>(腎衰竭、溶血、組織壞死、代謝性酸中毒、ACEI/保鉀利尿劑、胰島素不足):心電圖<b>T 波高尖、QRS 增寬</b>,致命心律不整。處置：<b>Kayexalate 排鉀、短效胰島素+葡萄糖(移入細胞)、碳酸氫鈉、鈣劑穩定心肌、透析</b>;<b>限鉀(避香蕉、柳丁、水果乾、低鈉鹽)</b>。<b>低血鉀</b>(排鉀利尿劑、嘔吐腹瀉):心電圖<b>U 波明顯、T 波低平</b>,肌肉無力、便秘腹脹;補鉀+休息(勿鼓勵多活動)。</p>\n<h3>二、鈣離子(Ca)</h3>\n<p><b>低血鈣</b>(神經肌肉興奮↑):<b>Chvostek 徵(輕敲臉部肌肉痙攣)、Trousseau 徵(壓脈帶誘發腕痙攣)、手足抽搐(tetany)、QT 延長、凝血時間延長</b>、腸蠕動增強。<b>高血鈣</b>(骨轉移、副甲亢、惡性腫瘤):<b>便秘、肌肉無力、QT 縮短、意識不清、心律不整</b>(口訣 stones/bones/groans/moans);治療<b>大量補水(水化)、利尿劑(furosemide)促排鈣、下床活動、酸化尿液</b>(臥床反加重)。低白蛋白須校正血鈣。</p>\n<h3>三、鈉離子(Na)</h3>\n<p><b>高血鈉</b>(>145,失水):神經興奮<b>口渴、躁動、抽搐、意識改變</b>(非肌肉無力)、尿比重上升;低鈉飲食(蘇打餅/白麵包其實高鈉)。<b>低血鈉</b>：意識改變。低張溶液補細胞內脫水/尿崩,<b>顱內壓上升者禁用低張溶液</b>(加重腦水腫)。</p>\n<h3>四、體液容積</h3>\n<p><b>不足(脫水)</b>:口渴、黏膜<b>乾燥</b>、皮膚張力差、心跳快、絲脈、姿勢性低血壓、意識改變、<b>Hct↑、BUN↑、尿比重↑</b>。<b>過量</b>:水腫、<b>Hct↓、BUN↓、稀釋性低血鈉</b>。尿崩症(ADH 不足)→<b>多尿、低尿比重、高血鈉</b>;DDAVP 鼻噴經鼻黏膜吸收(非吸入肺部)。霍亂→大量水瀉、脫水、低血鉀、代謝性酸中毒,補電解質液為主。</p>"},"U11酸鹼平衡":{"title":"U11 酸鹼平衡 複習講義","html":"<h3>一、ABG 判讀四步驟</h3>\n<p>正常值：<b>pH 7.35–7.45、PaCO2 35–45、HCO3 22–26</b>。①看 <b>pH</b> 定酸鹼(<7.35 酸、>7.45 鹼;在正常範圍但偏某側=已代償)。②找原發：<b>PaCO2(呼吸)</b> 與 pH「<b>反向</b>」→呼吸性;<b>HCO3(代謝)</b> 與 pH「<b>同向</b>」→代謝性。③看代償:另一系統往同方向移動。④看 pH 是否回正常→<b>未代償</b>(原發異常、對方正常)/<b>部分代償</b>(對方已動但 pH 仍異常)/<b>完全代償</b>(pH 回正常範圍)。</p>\n<h3>二、四型口訣</h3>\n<p><b>呼吸性酸中毒</b>:pH↓、PaCO2↑(換氣不足、CO2 滯留,如 COPD、呼吸衰竭)。<b>呼吸性鹼中毒</b>:pH↑、PaCO2↓(<b>過度換氣</b>,焦慮、發燒、缺氧)。<b>代謝性酸中毒</b>:pH↓、HCO3↓(腎衰竭、DKA 酮酸、腹瀉失 HCO3、乳酸)。<b>代謝性鹼中毒</b>:pH↑、HCO3↑(<b>嘔吐失胃酸</b>、利尿劑)。記憶：<b>腹瀉→酸、嘔吐→鹼</b>。</p>\n<h3>三、症狀與處置</h3>\n<p><b>代謝性酸中毒</b>:頭痛、意識遲鈍、<b>呼吸加深加快(Kussmaul)</b>、周邊血管擴張、高血鉀;處置<b>注射 NaHCO3</b>(嚴重透析)。<b>呼吸性鹼中毒(過度換氣)</b>:頭暈、手腳麻、抽搐;處置<b>紙袋罩口鼻</b>。代謝性鹼中毒用 NH4Cl/補氯補鉀。延腦/肺問題→呼吸性;腎/糖尿病/腹瀉→代謝性。</p>\n<h3>四、ABG 採檢注意</h3>\n<p>採血後須<b>立即冰存並儘快送驗</b>;未冰存延遲→細胞持續代謝→<b>PaO2↓、PaCO2↑、pH↓</b>(數值失真)。ABG 可直接測 pH、PaCO2、PaO2、HCO3、SaO2;<b>呼吸困難</b>是臨床症狀非 ABG 偵測項目。明顯失衡(如 pH 7.20、PaCO2 升高)應立即報告醫師。</p>"},"U12腎臟功能檢查診斷與其他腎病":{"title":"U12 腎臟功能檢查診斷與其他腎病 複習講義","html":"<h3>一、腎功能指標</h3>\n<p><b>肌酸酐廓清率(CCr)＝評估 GFR 最佳指標</b>(正常約 95–135 mL/min);<b>血清肌酸酐</b>由肌肉穩定產生、<b>不易受飲食影響</b>、是最佳血液指標,升高代表 GFR 下降約 50% 以上。<b>BUN</b> 易受脫水、飲食蛋白、消化道出血、肝功能影響(<b>肝衰竭→BUN↓</b>)。<b>BUN/Cr 正常約 20:1</b>;<b>脫水(腎前性)→比值上升</b>。</p>\n<h3>二、腎臟內分泌與生理</h3>\n<p>腎臟製造：<b>腎素(renin,血壓下降時分泌)、紅血球生成素(EPO)、前列腺素(抑制 ADH)、活化維生素 D(促腸鈣吸收)</b>。<b>醛固酮(留鹽激素)由「腎上腺」分泌,非腎臟</b>。水分再吸收最大部位＝<b>近側腎小管(約 65–70%)</b>;集尿管受 ADH 調節做最終濃縮。</p>\n<h3>三、尿液與影像檢查</h3>\n<p>尿液分析＝最簡便例行檢查,<b>清晨第一次尿(濃縮)是最佳檢體</b>、取<b>中段尿</b>、30 分內送檢;留置導尿須由<b>導管採檢口無菌抽取</b>(不可由集尿袋)。24 小時尿可測<b>蛋白質總量</b>。<b>蛋白尿=腎絲球疾病標誌</b>(腎盂腎炎以膿尿菌尿為主、非蛋白尿)。用<b>碘顯影劑</b>的檢查(IVP、腎動脈攝影)前須確認腎功能、後須多喝水排顯影劑;<b>逆行性腎盂攝影顯影劑不入血流</b>(腎毒性低、適合腎功能差者)。</p>\n<h3>四、侵入性檢查與其他腎病</h3>\n<p><b>腎切片最主要併發症＝出血</b>(腎血流豐富),採俯臥姿、術後臥床壓迫監測血尿。<b>會造成血尿</b>的侵入性檢查：膀胱鏡、腎切片、逆行性腎盂攝影;<b>尿流速</b>(自然解尿)非侵入、不造成血尿。腎臟超音波非侵入不禁食。<b>多囊性腎病(ADPKD)</b>:體染色體顯性遺傳、多在<b>30–40 歲</b>發病(非青春期)、後腰鈍痛、超音波見雙側多囊腫。</p>"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^U(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n3_uro_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
