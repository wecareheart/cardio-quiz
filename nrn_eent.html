},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"104030-N3-44":{"quick":"疥瘡的劇癢在「夜間(晚上)」更嚴重,故B「白天更嚴重」錯誤。","detail":{"background":"疥瘡的診斷與特性:A「診斷方法是刮取患處皮屑,於顯微鏡下觀察(找疥蟎、蟲卵或糞便)」正確;C「除使用抗疥蟲藥物外,必須搭配衣物與用物的消毒,才能徹底根治」正確(同時處理環境與接觸者才能斷絕再感染);D「學校、軍隊、安養院、監獄等群居環境是好發場所」正確(密切接觸、共用物品)。B「病人常有嚴重搔癢,尤其在『白天』更嚴重」為「錯誤」——疥瘡的劇癢「在『夜間(晚上、就寢蓋被溫暖時)』更嚴重」(夜間疥蟎活動力增加、體溫升高加劇癢感),這是疥瘡的典型特徵。故B把夜間癢誤為白天,錯誤。","options":{"A":"刮皮屑顯微鏡檢找疥蟎/蟲卵是診斷方法,正確。","B":"正解(錯誤敘述)。疥瘡劇癢在夜間更嚴重,非白天。","C":"須併用衣物用物消毒才能根治,正確。","D":"群居環境(學校軍隊安養院監獄)好發,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"104100-N3-43":{"quick":"疥瘡是『接觸傳染』,照護採接觸隔離(戴手套穿隔離衣)即可,口罩非必要,故B「一定要戴口罩」錯誤。","detail":{"background":"疥瘡護理措施:A「病人衣服床單需用60°C以上熱水浸泡消毒(約10分鐘)」正確(高溫殺死疥蟎與蟲卵);C「與病人密切接觸者需一併治療」正確(接觸者可能已被感染、避免互相再傳染);D「不能水洗的物品/床墊密封靜置2星期」正確(疥蟎離開人體後約2~3天至2週內死亡,密封隔絕即可滅蟲)。B「照護病人時一定要戴『口罩』和手套才能預防被感染」為「錯誤」——疥瘡是「『接觸』傳染」(直接皮膚接觸或接觸污染衣物),「不是飛沫/空氣傳染」,故防護重點是「接觸隔離:戴手套、穿隔離衣」,「口罩並非必要(且非預防疥瘡的關鍵)」;「一定要戴口罩」的敘述不正確。故B錯誤。","options":{"A":"衣物床單以60°C以上熱水浸泡消毒,正確。","B":"正解(錯誤敘述)。疥瘡是接觸傳染,戴手套穿隔離衣即可,口罩非必要。","C":"密切接觸者需一併治療,正確。","D":"不能水洗物品密封靜置2星期滅蟲,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"106030-N3-46":{"quick":"疥瘡衣物以60°C以上熱水消毒時間應「約10分鐘」,故A「消毒5分鐘」時間不足、錯誤。","detail":{"background":"預防疥瘡再發及傳染的護理指導:B「不能水洗的衣物被單毛巾,先以烘乾機高溫烘烤再清洗」正確(高溫殺蟎,烘乾機是有效方法);C「勿與他人共用床單、毛巾與梳子等物品」正確(避免間接接觸傳染);D「伴侶與親近者需同時接受治療」正確(同步治療防交叉再感染)。A「使用的衣物被單毛巾,需用60°C以上熱水消毒『5分鐘』再清洗」為「錯誤」——以60°C以上熱水消毒滅蟎應「約『10分鐘』」(才足以殺死疥蟎與蟲卵),「5分鐘」時間不足。故A因消毒時間不足而錯誤(考題以「10分鐘」為標準)。","options":{"A":"正解(錯誤敘述)。60°C以上熱水消毒應約10分鐘,5分鐘時間不足。","B":"不能水洗者以烘乾機高溫烘烤殺蟎,正確。","C":"勿與他人共用床單毛巾梳子,正確。","D":"伴侶與親近者需同時治療,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"106110-N3-44":{"quick":"疥瘡衣物「可以」用烘乾機高溫烘烤殺蟎,故C「不可使用烘乾機烘烤」錯誤。","detail":{"background":"疥瘡病人照護:A「感染病人的所有家人必須一併接受治療」正確(同步治療斷絕交叉感染);B「照護時採接觸隔離,戴手套及穿戴隔離衣」正確(接觸傳染的防護);D「使用過的家具物品洗清後密封靜置2星期」正確(疥蟎離開人體後在2週內死亡)。C「病人衣物應用熱水煮沸10分鐘,『不可』使用烘乾機烘烤」為「錯誤」——熱水煮沸固然可滅蟎,但「烘乾機高溫烘烤」也是「有效且常用」的滅蟎方法(高溫即可殺死疥蟎與蟲卵),並非「不可使用」;故「不可使用烘乾機烘烤」的敘述錯誤(烘乾機是可以且建議的)。故C錯誤。","options":{"A":"所有家人需一併治療,正確。","B":"採接觸隔離,戴手套穿隔離衣,正確。","C":"正解(錯誤敘述)。烘乾機高溫烘烤可有效殺蟎,並非不可使用。","D":"物品洗清後密封靜置2星期滅蟎,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"106111-N3-43":{"quick":"疥瘡是疥蟎、好發頸部以下,並非「清洗頭皮殺蝨、清除塵蟎」(張冠李戴),故A錯誤。","detail":{"background":"預防疥瘡交叉感染的措施:B「隔離病人使用過的床單,直到不具傳染性」正確;C「使用過的衣物及床單應煮沸後清洗(或高溫處理)」正確;D「避免與他人共用衣物、毛巾與床單」正確。A「洗手,使用『殺蝨劑清洗頭皮』,並『清除可見的塵蟎』」為「錯誤」——疥瘡的病原是「疥蟎(Sarcoptes scabiei)」,「不是頭蝨、也不是塵蟎」;且成人疥瘡「好發於頸部以下的皮膚皺褶處(頭皮少見)」,因此「用殺蝨劑清洗頭皮、清除塵蟎」是把對象搞錯(殺蝨劑針對頭蝨、塵蟎是過敏原),並非疥瘡的防治措施。故A張冠李戴而錯誤。","options":{"A":"正解(錯誤敘述)。疥瘡是疥蟎、好發頸部以下,非用殺蝨劑洗頭皮或清塵蟎。","B":"隔離病人床單直到不具傳染性,正確。","C":"衣物床單煮沸/高溫處理後清洗,正確。","D":"避免共用衣物毛巾床單,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"107110-N3-46":{"quick":"疥蟎離開人體後約2~3天(短時間)即死亡,並非「3週才死亡」,故D錯誤。","detail":{"background":"疥瘡敘述:A「會經由皮膚、衣物等直接(或間接)接觸而感染」正確;B「好發於手指間、手肘、腋下或腹股溝等皺褶處」正確(皮膚薄、溫暖潮濕的皺褶處);C「接觸疥蟲後約4週(4~6週)才會出現症狀(初次感染)」正確。D「疥蟲離開人體後『3週』才會死亡」為「錯誤」——疥蟎「離開人體宿主後,因失去溫度與營養,通常在『2~3天(至多約2週內)』即死亡」,「3週」過長;故對污染物品「密封靜置約2週」即可確保疥蟎死亡。本題以「3週才死亡」為錯誤敘述。","options":{"A":"經皮膚、衣物等接觸感染,正確。","B":"好發手指間、手肘、腋下、腹股溝等皺褶處,正確。","C":"接觸後約4週(初次)才出現症狀,正確。","D":"正解(錯誤敘述)。疥蟎離開人體約2~3天即死亡,非3週。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"111030-N3-46":{"quick":"疥瘡初次感染潛伏期約「4~6週」,故A「接觸後2週左右出現症狀」錯誤。","detail":{"background":"感染疥瘡的敘述:B「疥蟲感染者所使用的床單,在2週內具有傳染力」正確(疥蟎在離開人體後約2週內仍可能存活並具傳染力,故污染物密封2週);C「劇癢症狀好發在『頸部以下』」正確(成人疥瘡好發頸部以下的軀幹四肢與皺褶,頭頸臉少見;嬰幼兒則可能波及頭頸掌蹠);D「衣物用具加熱煮沸可以殺死疥蟲」正確(高溫滅蟎)。A「人體接觸疥蟲後『2週左右』會出現症狀」為「錯誤」——初次感染的潛伏期約「4~6週」才因過敏反應出現劇癢,「2週」太短(僅再次感染者約1~3天即發)。故A錯誤。","options":{"A":"正解(錯誤敘述)。初次感染潛伏期約4~6週,非2週。","B":"感染者床單在2週內具傳染力,正確。","C":"劇癢好發於頸部以下(成人),正確。","D":"衣物用具加熱煮沸可殺死疥蟲,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"113030-N3-29":{"quick":"Benzyl Benzoate塗抹乾後再塗一次、24小時後沖掉、每晚或隔晚共3次,為正確用法,故選C。","detail":{"background":"疥瘡治療藥物用法判斷(找正確):A「為避免接觸傳染,抗疥蟲藥最好於『白天』使用」錯——抗疥藥多在「夜間/睡前」塗抹全身(頸部以下)、過夜後隔天沖洗(配合疥蟎夜間活動、藥物作用時間),非白天。B「成人用crotamiton(Eurax®)時可『一日數次塗頭、臉、全身』」錯——成人疥瘡塗藥範圍是「頸部『以下』全身」(頭臉通常不需塗,嬰幼兒才需含頭頸),且依藥品指示使用,非隨意一日數次塗頭臉。C「Benzyl Benzoate(B.B.)塗抹後待藥液乾再塗一次、24小時後沖掉、每晚或隔晚使用共3次」為「正確」(符合B.B.乳劑的典型用法)。D「γ-benzene hexachloride(Lindane)具神經毒性,塗抹後8~12小時沖掉,『每天』使用一次」錯——Lindane因有「神經毒性」,「不可每天重複使用」(過量吸收恐致抽搐),通常單次塗抹8~12小時後沖洗、必要時間隔約一週後再用一次,孕婦嬰幼兒避免使用。故選C。","options":{"A":"抗疥藥多在夜間/睡前塗全身過夜,非白天使用,錯誤。","B":"成人塗藥範圍是頸部以下全身,非一日數次塗頭臉,錯誤。","C":"正解。Benzyl Benzoate塗乾再塗一次、24小時沖掉、每晚或隔晚共3次。","D":"Lindane有神經毒性不可每天用,敘述錯誤。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"113100-N3-27":{"quick":"疥瘡採接觸隔離,接觸病人應「戴手套『並』穿戴隔離衣」,故A「不需穿戴隔離衣」錯誤。","detail":{"background":"疥瘡病人照護:B「感染病人的伴侶及親近者須同時接受治療」正確;C「病人衣物以60°C以上熱水消毒10分鐘,或烘乾機烘烤至少5分鐘」正確(高溫滅蟎);D「使用過的家具物品洗清後密封靜置2星期」正確(疥蟎2週內死亡)。A「接觸病人時應戴手套『但不需穿戴隔離衣』」為「錯誤」——疥瘡是「接觸傳染」,照護時應採「接觸隔離防護」,「戴手套『並穿戴隔離衣』」以避免疥蟎沾附衣物造成傳播;只戴手套、不穿隔離衣的防護不足。故A錯誤。","options":{"A":"正解(錯誤敘述)。應戴手套並穿戴隔離衣(接觸隔離),非不需隔離衣。","B":"伴侶及親近者須同時治療,正確。","C":"衣物熱水消毒10分鐘或烘乾機烘烤,正確。","D":"物品密封靜置2星期滅蟎,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"114100-N3-28":{"quick":"動物(寵物)身上的疥蟎『可』短暫傳給人造成皮疹,故B「不會藉由寵物攜帶疥蟲而傳染」錯誤。","detail":{"background":"疥瘡敘述:A「經由皮膚、衣物等接觸而感染」正確;C「接觸疥蟲後約4週(4~6週)才會出現疥瘡症狀(初次感染)」正確;D「疥蟲離開人體後約2週(2~3天至2週內)才會死亡」——以「2週」為對(離開宿主後在2週內死亡,故密封2週)。B「『不會』藉由寵物攜帶疥蟲而傳染」為「錯誤」——動物(如貓狗)身上的「疥癬蟎(動物疥蟎)」「可」短暫傳給人,造成接觸部位的搔癢丘疹(雖然動物疥蟎在人體無法完成繁殖、多為自限性,但確實『會』經寵物接觸傳染、引起皮膚症狀);故「不會藉寵物傳染」的敘述錯誤。臨床上人疥瘡仍以「人傳人」為主,但寵物來源不可完全排除。","options":{"A":"經皮膚、衣物接觸而感染,正確。","B":"正解(錯誤敘述)。寵物身上的疥蟎可短暫傳給人引起皮疹,並非不會傳染。","C":"初次感染約4週後出現症狀,正確。","D":"疥蟎離開人體約2週內死亡,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"103100-N3-44":{"quick":"蜂窩性組織炎是『真皮深層與皮下組織』的細菌感染,非「表皮」,故A錯誤。","detail":{"background":"蜂窩性組織炎(cellulitis)是「真皮深層與皮下組織」的急性細菌感染,常見致病菌為「鏈球菌、金黃葡萄球菌」,多由皮膚傷口、足癬、潰瘍等破損處侵入。A「是『表皮』組織被感染造成的化膿性炎症」為「錯誤」——病灶在「真皮深層及皮下組織」(較深),「不是表皮」(表皮感染如膿痂疹;界線分明的真皮上層感染則為丹毒)。B「初期局部皮膚出現發紅、腫脹、發熱、觸痛」正確(紅腫熱痛、界線『不』清);C「高危險群包括老人、小孩、糖尿病、接受類固醇治療者(免疫低下)」正確;D「嚴重者會出現肢體壞死,甚至敗血症」正確(可進展為壞死性筋膜炎、敗血症)。故A錯誤(感染深度判斷)。","options":{"A":"正解(錯誤敘述)。蜂窩性組織炎在真皮深層及皮下組織,非表皮。","B":"初期局部紅、腫、熱、痛,正確。","C":"高危險群為老人、小孩、糖尿病、用類固醇者,正確。","D":"嚴重可致肢體壞死、敗血症,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"106111-N3-45":{"quick":"下肢蜂窩性組織炎患處應「冷敷」減輕炎症與疼痛,故選A;烤燈、雙氧水、酒精皆不適當。","detail":{"background":"下肢蜂窩性組織炎的患處護理(找正確):A「使用冷敷」正確——急性炎症期「冷敷」可使局部血管收縮、減輕紅腫熱痛與發炎反應;另須「抬高患肢、休息制動、全身性抗生素」。B「使用烤燈(熱)」錯——熱會使局部血管擴張、可能促進細菌繁殖與發炎擴散,不適當。C「雙氧水(過氧化氫)消毒」錯——雙氧水對組織有刺激性、會破壞健康肉芽組織,不適合用於蜂窩性組織炎患處。D「酒精消毒」錯——酒精刺激、會使發炎疼痛的皮膚更不適,且無法處理深層感染。故正確措施為A冷敷。","options":{"A":"正解。急性期冷敷使血管收縮、減輕紅腫熱痛。","B":"烤燈(熱)使血管擴張、恐促進細菌繁殖擴散,不適當。","C":"雙氧水刺激並破壞組織,不適當。","D":"酒精刺激發炎皮膚,不適當。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"108020-N3-44":{"quick":"蜂窩性組織炎應「冷敷」減輕水腫與炎症,故B正確;界線分明是丹毒、致病菌多為鏈球菌/金葡菌、應休息制動。","detail":{"background":"蜂窩性組織炎敘述判斷(找正確):A「患部可見『大片界線分明』的紅斑與水疱」錯——蜂窩性組織炎的紅腫「界線『不』清楚(瀰漫)」;「界線分明、突起」的紅斑是「丹毒(erysipelas,真皮上層+淋巴管)」的特徵。B「冷敷患部以減輕水腫與炎症反應」正確。C「常見『綠膿桿菌』引起的傷口感染」錯——蜂窩性組織炎「最常見」致病菌是「鏈球菌、金黃葡萄球菌」(綠膿桿菌多見於特定情境如燒傷、慢性潮濕傷口,非最常見)。D「鼓勵患肢運動以減輕水腫」錯——急性期應「休息、制動、抬高患肢」以防感染擴散,不鼓勵運動。故B正確。","options":{"A":"蜂窩性組織炎界線不清;界線分明是丹毒,錯誤。","B":"正解。冷敷可減輕患部水腫與炎症反應。","C":"最常見致病菌是鏈球菌、金葡菌,非綠膿桿菌,錯誤。","D":"急性期應休息制動抬高患肢,非鼓勵運動,錯誤。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"110110-N3-46":{"quick":"蜂窩性組織炎不可用「熱敷」(熱會促進細菌繁殖擴散),故C「無傷口可用熱敷」錯誤。","detail":{"background":"蜂窩性組織炎護理措施:A「抬高患肢以促進靜脈回流、減輕腫脹」正確;B「觀察並記錄患部皮膚紅腫範圍、溫度變化及疼痛情形」正確(監測感染進展或惡化,可用筆標記紅腫邊界追蹤);D「鼓勵病人臥床休息、病灶處制動,以防止感染擴散」正確。C「患部無傷口時可以用『熱敷』來減輕炎症反應、緩解疼痛」為「錯誤」——蜂窩性組織炎急性期「不宜熱敷」,熱會使局部血管擴張、組織溫度升高、「促進細菌繁殖與感染擴散」,並可能加重發炎;應採「冷敷」減輕紅腫熱痛。故C錯誤(熱敷不當)。","options":{"A":"抬高患肢促進靜脈回流、減輕腫脹,正確。","B":"觀察記錄紅腫範圍、溫度、疼痛以監測進展,正確。","C":"正解(錯誤敘述)。應冷敷;熱敷會促進細菌繁殖擴散。","D":"臥床休息、病灶制動防感染擴散,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"113030-N3-27":{"quick":"蜂窩性組織炎需「靜脈輸液與全身性抗生素治療(約7~10天)」,故A正確;應冷敷、補充水分、抬高患肢。","detail":{"background":"葉女士魚刺刺傷後發紅化膿、診斷蜂窩性組織炎,正確護理(找正確):A「給予周邊靜脈輸液及全身性抗生素連續7~10天」正確——蜂窩性組織炎是深部細菌感染,需「全身性(口服或靜脈)抗生素」足療程(約7~10天)治療,中重度者住院靜脈給藥。B「依內科無菌原則施行冷水浸泡」——敘述措辭不當(冷敷可,但「冷水浸泡」整肢且談「內科無菌原則」不合適),非正確做法。C「教導減少攝取液體以避免患處水腫」錯——應「補充足夠水分」,限水無助於消腫反而不利,患部腫脹靠抬高患肢處理。D「患肢『低於』胸部以降低病菌回流」錯——應「『抬高』患肢(高於心臟)」促進靜脈與淋巴回流、減輕腫脹,放低反而使腫脹加重。故A正確。","options":{"A":"正解。需靜脈輸液與全身性抗生素治療約7~10天。","B":"冷水浸泡整肢並談無菌原則措辭不當,非正確做法,錯誤。","C":"應補充足夠水分,減少攝取液體無助消腫,錯誤。","D":"應抬高患肢(高於心臟)減輕腫脹,非低於胸部,錯誤。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"109030-N3-42":{"quick":"足癬急性期典型是「水疱、糜爛、滲液與劇癢」,以單純「紅斑」描述不符典型,故官方列C為錯誤。","detail":{"background":"足癬(tinea pedis,香港腳)是「皮癬菌(黴菌)」感染足部皮膚:A「為黴菌感染」正確;B「多因穿不透氣鞋襪(悶熱潮濕)而引起」正確(黴菌喜溫暖潮濕);D「可於趾間灑上滑石粉(或保持乾爽)維持乾燥」正確(乾燥環境抑制黴菌、預防復發)。C「急性期出現紅斑」被官方列為「錯誤(不符典型)」——足癬急性發作的典型表現是「『水疱、糜爛、脫屑、滲出與劇烈搔癢』」(尤其趾間浸潤糜爛、水疱型足癬),以單純「紅斑」概括其急性期表現並不精確/不典型,故本題以C為錯誤敘述。治療以抗黴菌藥(局部或口服)、保持足部乾爽、勤換鞋襪、不共用鞋襪拖鞋為主。","options":{"A":"足癬為皮癬菌(黴菌)感染,正確。","B":"多因穿不透氣鞋襪悶熱潮濕引起,正確。","C":"正解(本題列為錯誤)。急性期典型是水疱、糜爛、滲液與劇癢,單以「紅斑」描述不符典型。","D":"趾間保持乾燥(灑滑石粉)可抑制黴菌、預防復發,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"101030-N3-63":{"quick":"接觸性皮膚炎(過敏型)屬「第四型(延遲型)過敏反應」(T細胞媒介),故D正確。","detail":{"background":"接觸性皮膚炎(contact dermatitis)分「刺激性」與「過敏性」;「過敏性接觸性皮膚炎」是典型的「第四型(Type IV)『延遲型(細胞媒介)』過敏反應」——由「T淋巴細胞」媒介,初次接觸過敏原(如鎳金屬、橡膠、染料、植物毒藤)後致敏,再次接觸經24~72小時才出現紅斑、丘疹、水疱、搔癢(故稱延遲型)。A「與IgE升高有關」錯——IgE升高、肥大細胞去顆粒是「第一型(立即型)」過敏(如異位性皮膚炎、過敏性鼻炎、蕁麻疹、過敏性休克)的機轉;B「與局部微血管通透性增加有關」是發炎的非特異性現象、非其分型核心;C「是一種自體免疫反應」錯——接觸性皮膚炎是對「外來過敏原」的反應,非攻擊自身組織的自體免疫。故D正確。","options":{"A":"IgE升高是第一型(立即型)過敏的機轉,非接觸性皮膚炎,錯誤。","B":"微血管通透性增加是非特異發炎現象,非其分型核心,錯誤。","C":"針對外來過敏原而非攻擊自身,不是自體免疫,錯誤。","D":"正解。過敏性接觸性皮膚炎屬第四型(延遲型、T細胞媒介)過敏反應。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","台灣皮膚科醫學會臨床指引"]}},"101030-N3-75":{"quick":"異位性皮膚炎是「第一型(IgE媒介、立即型)」過敏反應,非第四型,故A錯誤。","detail":{"background":"異位性皮膚炎(atopic dermatitis)是與「異位性體質(atopy)」相關的慢性、反覆、搔癢性濕疹,屬「第一型(Type I)『IgE媒介』的過敏反應」(常合併過敏性鼻炎、氣喘,血中IgE升高)。A「屬於第四型遲發型之過敏反應」為「錯誤」——第四型延遲型是「接觸性皮膚炎」的機轉,異位性皮膚炎是「第一型(IgE、立即型)」。B「避免搔癢及抓傷皮膚」正確(搔抓會破壞皮膚屏障、加重發炎與感染、形成苔癬化);C「穿著棉質吸汗衣服」正確(避免羊毛、化纖刺激與悶熱出汗);D「注重保濕、塗抹保濕乳液」正確(異位性皮膚屏障功能差、乾燥,保濕是治療基石)。故A為錯誤敘述。","options":{"A":"正解(錯誤敘述)。異位性皮膚炎是第一型(IgE、立即型)過敏,非第四型遲發型。","B":"避免搔抓防破壞屏障、感染與苔癬化,正確。","C":"穿棉質吸汗衣服避免刺激悶熱,正確。","D":"注重保濕是異位性皮膚炎治療基石,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","台灣皮膚科醫學會臨床指引"]}},"101110-N3-33":{"quick":"異位性皮膚炎血中升高的是「IgE」非IgG,且好發於屈側(肘窩/膝窩)非「手肘後方(伸側)」;本題敘述有誤而列送分。","detail":{"background":"異位性皮膚炎的特性:A「身體疲勞及情緒緊張會誘發(惡化)」正確。D「皮膚斑塊會有搔癢感」正確(搔癢是核心症狀)。B「血液中『免疫球蛋白IgG』會升高」敘述有問題——異位性皮膚炎血中升高的是「『IgE』(及嗜酸性球)」,而非IgG。C「常侵犯『手肘後方』」也有問題——成人異位性皮膚炎典型好發於「『屈側』(肘窩、膝窩等彎曲處)」,「手肘後方(伸側)」並非典型好發處(嬰兒期則好發臉頰、頭皮與四肢伸側)。本題因敘述涉及多處不精確,官方列為「送分(各答案均給分)」。掌握重點:異位性皮膚炎=IgE升高、慢性搔癢、好發屈側、與過敏體質相關。","options":{"A":"疲勞及情緒緊張會誘發惡化,正確。","B":"異位性皮膚炎升高的是IgE非IgG,敘述不精確。","C":"成人好發於屈側(肘窩膝窩),非手肘後方(伸側),敘述不精確。","D":"皮膚斑塊有搔癢感,正確。(本題列為送分)"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","台灣皮膚科醫學會臨床指引"]}},"101110-N3-34":{"quick":"色痣若「扁平微凸、表面含有毛髮」多屬良性,最不可能是惡化徵象,故選D。","detail":{"background":"判斷色痣(mole)是否惡化(惡性變化)可用「ABCDE法則」:A=Asymmetry不對稱、B=Border邊緣不規則、C=Color顏色改變不均、D=Diameter直徑>6 mm、E=Evolving/Elevation快速變化或隆起。本題找「最不可能(代表惡化)」者:A「顏色改變」是惡化警訊;B「外形變大、直徑超過6 mm」是惡化警訊;C「邊緣不整齊」是惡化警訊。D「扁平微凸、上面含有毛髮」為「最不可能是惡化」——「表面長有毛髮、形態穩定的扁平痣」通常是「良性」的特徵(毛髮代表毛囊結構正常),不是惡性變化的指標。故選D。臨床若痣出現ABCDE任一變化、潰瘍、出血、搔癢,應就醫切片。","options":{"A":"顏色改變是惡化(惡性)警訊。","B":"直徑超過6 mm是惡化警訊(ABCDE的D)。","C":"邊緣不整齊是惡化警訊。","D":"正解(最不可能)。扁平微凸、表面含毛髮多屬良性特徵。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》"]}},"103030-N3-47":{"quick":"脂肪瘤好發於「頸、肩、背及四肢」皮下,而非以胸腹部為主,故D敘述不當、錯誤。","detail":{"background":"皮膚良性腫瘤特徵:A「蜘蛛血管瘤(spider angioma)與血中『動情素(estrogen)』濃度上升有關」正確(見於肝硬化、懷孕、口服雌激素者,因雌激素使小動脈擴張);B「色素性母斑(色素痣)是因色素(黑色素)細胞過度增生所造成」正確;C「蟹足腫(keloid,蟹足腫/瘢痕疙瘩)是因疤痕纖維組織過度增生而引起」正確(傷口癒合時纖維母細胞與膠原過度增生,超出原傷口範圍)。D「脂肪瘤(lipoma)多發生於『胸部、腹部』等部位的皮下組織」為「錯誤」——脂肪瘤是成熟脂肪細胞構成的良性腫瘤,「好發於頸部、肩部、背部及四肢近端」的皮下組織,雖可發生於軀幹,但以「胸部、腹部為主要好發處」的敘述不正確。故D為錯誤敘述。","options":{"A":"蜘蛛血管瘤與血中動情素(雌激素)上升有關,正確。","B":"色素性母斑由黑色素細胞過度增生形成,正確。","C":"蟹足腫是疤痕纖維組織過度增生,正確。","D":"正解(錯誤敘述)。脂肪瘤好發於頸、肩、背及四肢,非以胸腹部為主。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》"]}},"104100-N3-1":{"quick":"痣惡性判斷的ABCDE法則指不對稱、邊緣、顏色、直徑、隆起/變化;「生長型態(D選項)」不屬於,故選D。","detail":{"background":"惡性黑色素瘤的早期辨識「ABCDE法則」:A=Asymmetry「不對稱」、B=Border「邊緣不規則/模糊」、C=Color「顏色不均、多種色調」、D=Diameter「直徑>6 mm」、E=Evolving/Elevation「快速變化、隆起、潰瘍出血」。本題找「不屬於ABCDE規則」者:選項A「邊緣不規則」(=Border)、B「形狀不對稱」(=Asymmetry)、C「持續變大」(=Diameter增大/Evolving)都屬ABCDE;D「生長型態」並非ABCDE法則中的特定項目用語(過於籠統),不屬於該規則,故選D。臨床用ABCDE教民眾自我檢查皮膚痣的惡性警訊。","options":{"A":"邊緣不規則=ABCDE的B(Border),屬於規則。","B":"形狀不對稱=ABCDE的A(Asymmetry),屬於規則。","C":"持續變大對應Diameter/Evolving,屬於規則。","D":"正解(不屬於)。「生長型態」非ABCDE法則的特定項目。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》"]}},"105030-N3-45":{"quick":"皮膚癌中基底細胞癌最常見但「致死率最低」;致死率最高的是惡性黑色素瘤,故C「致死率最高」錯誤。","detail":{"background":"皮膚惡性腫瘤:A「診斷主要依據活體組織切片(biopsy)」正確(病理切片是確診依據);B「基底細胞癌與鱗狀細胞癌的共同危險因子是『陽光(紫外線)過度曝曬』」正確;D「惡性黑色素瘤(malignant melanoma)是黑色素細胞異常生長所引起,『轉移性高』」正確(易早期轉移、預後差)。C「皮膚惡性腫瘤中以『基底細胞癌』最常見,『致死率也最高』」為「錯誤」——基底細胞癌(BCC)確實「最常見」,但它「生長慢、極少轉移、致死率『最低』」;「致死率最高」的皮膚癌是「惡性黑色素瘤」(雖較少見,但侵襲轉移性高、預後最差)。故C「致死率最高」描述錯誤(BCC最常見但致死率低)。","options":{"A":"皮膚惡性腫瘤主要依活體組織切片確診,正確。","B":"BCC與SCC共同危險因子是陽光過度曝曬,正確。","C":"正解(錯誤敘述)。BCC最常見但致死率最低;致死率最高是惡性黑色素瘤。","D":"惡性黑色素瘤由黑色素細胞異常生長、轉移性高,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》"]}},"109030-N3-40":{"quick":"紅斑性狼瘡(SLE)是自體免疫、會急性發炎、不具傳染性的皮膚/全身疾病,故選C。","detail":{"background":"本題找「由自體免疫引起、會出現急性炎症反應、但『不具傳染性』」的皮膚疾病:C「紅斑性狼瘡(systemic lupus erythematosus, SLE)」正確——SLE是「自體免疫」疾病(自身抗體攻擊多器官),皮膚可出現臉部蝶形紅斑、光敏感、盤狀紅斑等發炎病灶,「不會傳染」給他人。其餘三者都是「感染性(具傳染性)」疾病:A「鵝口瘡(oral thrush)」是「白色念珠菌(黴菌)」感染;B「帶狀疱疹」是「水痘帶狀疱疹病毒(VZV)」感染;D「疥瘡」是「疥蟎(寄生蟲)」感染。故僅C符合「自體免疫、不具傳染性」,選C。","options":{"A":"鵝口瘡是念珠菌(黴菌)感染,具傳染性,錯誤。","B":"帶狀疱疹是病毒感染,具傳染性,錯誤。","C":"正解。紅斑性狼瘡(SLE)是自體免疫、不具傳染性的疾病。","D":"疥瘡是疥蟎(寄生蟲)感染,具傳染性,錯誤。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","台灣皮膚科醫學會臨床指引"]}},"109110-N3-44":{"quick":"體臭來自「頂漿汗腺(apocrine)」分泌物被細菌分解;外泌汗腺(eccrine)分泌稀薄汗水不產生體臭,故D錯誤。","detail":{"background":"皮膚附屬物(指甲、毛髮、汗腺、皮脂腺):A「指甲持續生長,每天約長0.1 mm」正確;B「毛髮結構貫穿表皮、真皮及皮下組織」正確(毛囊深入真皮甚至皮下);C「頂漿汗腺(apocrine,大汗腺)與毛囊相通,常分布於腋下、乳頭及肚臍(及外陰、肛門)周圍」正確。D「外泌汗腺(eccrine,小汗腺)以手掌、腳底板分布最多,其分泌液會『產生體臭』」為「錯誤」——「外泌汗腺(eccrine)」全身分布(手掌腳底最密)、分泌「稀薄的汗水(主要調節體溫)」,『不會產生體臭』;「體臭」是「『頂漿汗腺(apocrine)』」分泌的較濃稠分泌物「被皮膚表面細菌分解」後產生的。故D把產生體臭的腺體張冠李戴,錯誤。","options":{"A":"指甲每天約長0.1 mm,正確。","B":"毛髮結構貫穿表皮、真皮及皮下組織,正確。","C":"頂漿汗腺與毛囊相通,分布腋下、乳頭、肚臍周圍,正確。","D":"正解(錯誤敘述)。體臭來自頂漿汗腺;外泌汗腺分泌稀薄汗水不產生體臭。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》"]}},"109110-N3-45":{"quick":"Braden scale 13分屬「中等危險」,需每2小時翻身及評估皮膚,故B正確。","detail":{"background":"Braden Scale是評估「壓力性損傷(壓傷)危險」的工具,含「六個」次量表:感覺知覺、潮濕、活動、移動、營養、摩擦力與剪力;「總分範圍6~23分」,「分數『越低』代表危險『越高』」(風險分級:15~18輕度、13~14中度、10~12高度、≤9極高度)。A「滿分為24分、分數越高表示風險越大」錯(滿分是23分,且分數越『低』風險越大)。B「13分代表中等危險,需每2小時翻身及評估皮膚」正確(13分屬中度危險,翻身減壓是基本措施)。C「依摩擦力和剪力『單一』程度決定是否用氣墊床」錯(應依『整體總分與危險分級』綜合判斷,非僅看單一次量表)。D「壓傷危險分級是依『三大』層面總和分數判定」錯(Braden是『六』個層面)。故B正確。","options":{"A":"Braden滿分23分、分數越低風險越大,非24分/越高越大,錯誤。","B":"正解。13分屬中等危險,需每2小時翻身及評估皮膚。","C":"應依整體總分綜合判斷,非僅看摩擦剪力單一項,錯誤。","D":"Braden有六個層面,非三大層面,錯誤。"},"sources":["新文京《內外科護理學》傷口與皮膚照護","華杏《新編內外科護理學》","NPUAP/EPUAP 壓力性損傷分期指引"]}},"110030-N3-44":{"quick":"膨疹(Wheal)是「原發性」皮膚病變;潰瘍、糜爛、抓痕皆為「續發性」,故選D。","detail":{"background":"皮膚病灶分「原發性(primary,直接由疾病過程產生)」與「續發性(secondary,由原發病灶演變或外力造成)」。「原發性」包括:斑(macule)、丘疹(papule)、結節(nodule)、『膨疹(wheal)』、水疱(vesicle)、大疱(bulla)、膿疱(pustule)、斑塊(plaque)等。「續發性」包括:鱗屑、痂、『糜爛(erosion)』、『潰瘍(ulcer)』、『抓痕(excoriation)』、皸裂、疤痕、苔癬化等。本題:A「潰瘍」、B「糜爛」、C「抓痕」都是『續發性』;D「膨疹(wheal,如蕁麻疹的風疹塊,為暫時性真皮水腫隆起)」是『原發性』病變。故選D。","options":{"A":"潰瘍(ulcer)是續發性病變,錯誤。","B":"糜爛(erosion)是續發性病變,錯誤。","C":"抓痕(excoriation)是續發性病變,錯誤。","D":"正解。膨疹(wheal)是原發性皮膚病變。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》"]}},"110110-N3-45":{"quick":"親水性(吸收性)敷料能吸收滲液、維持適度濕潤且不易使細菌滋生,故A正確。","detail":{"background":"傷口敷料判斷(找正確):A「親水性(吸收性,如親水膠體/泡棉)敷料可吸收傷口分泌物、不易使細菌滋生」正確——能吸收適量滲液、維持「適度濕潤」的傷口癒合環境,且密閉性敷料減少外來細菌污染。B「含銀敷料『不適用』於感染性傷口」錯——「含銀敷料具抗菌作用,正『適用』於感染或高感染風險的傷口」。C「藻膠(alginate,海藻膠)敷料『不適用』於滲液過多的傷口」錯——藻膠「吸收力極強,正『適用』於『大量滲液』的傷口」。D「傳統敷料(乾紗布)不易使組織浸潤引發感染和壞死」錯——傳統乾紗布易乾燥黏連傷口、更換時破壞新生肉芽組織、保護與保濕性差,並非優點。故A正確。","options":{"A":"正解。親水性敷料吸收滲液、維持適度濕潤、不易使細菌滋生。","B":"含銀敷料有抗菌作用,適用感染性傷口,敘述相反,錯誤。","C":"藻膠吸收力強,適用大量滲液傷口,敘述相反,錯誤。","D":"傳統乾紗布易黏連傷口、破壞肉芽,非優點,錯誤。"},"sources":["新文京《內外科護理學》傷口與皮膚照護","華杏《新編內外科護理學》","NPUAP/EPUAP 壓力性損傷分期指引"]}},"111030-N3-44":{"quick":"決定膚色的黑色素細胞主要分布在表皮的「基底層」,故選C。","detail":{"background":"表皮(epidermis)由內而外分五層:「基底層(stratum basale/germinativum)→棘狀層(spinosum)→顆粒層(granulosum)→透明層(lucidum,僅手掌腳底)→角質層(corneum)」。「黑色素細胞(melanocyte)」主要位於表皮最底層的「基底層」,負責製造黑色素(melanin)、決定膚色並保護皮膚抵禦紫外線(基底層也是表皮細胞不斷分裂增生的生發層,另含Merkel觸覺細胞)。故選C基底層。區辨:D「網狀層(reticular layer)」屬「真皮」(含膠原、彈性纖維、附屬器),非表皮、無黑色素細胞。故決定膚色的黑色素細胞在「基底層」。","options":{"A":"顆粒層是表皮中層,非黑色素細胞主要所在,錯誤。","B":"棘狀層在基底層之上,非黑色素細胞主要分布層,錯誤。","C":"正解。黑色素細胞主要分布在表皮基底層。","D":"網狀層屬真皮,非表皮,無黑色素細胞,錯誤。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》"]}},"111110-N3-45":{"quick":"表皮真皮全層缺損、可見「皮下脂肪」、有滲出物=「第三期壓傷」,故選C。","detail":{"background":"壓力性損傷(壓傷)分期(依組織缺損深度):「第一期」=皮膚完整、出現「壓不變白的發紅」;「第二期」=「部分皮層缺損」、真皮層暴露,呈淺表潰瘍或完整/破損水疱(不見脂肪);「第三期」=「全皮層缺損」、「可見『皮下脂肪』組織」,可能有腐肉、滲出物、潛行或隧道,但「未見骨、肌腱、肌肉」;「第四期」=全皮層及組織缺損、「外露骨、肌腱或肌肉」;另有「無法分期(壞死焦痂覆蓋無法判斷深度)」與「深層組織損傷」。本題「表皮破皮、看得到『皮下脂肪』組織、有黏液或滲出物」符合「第三期」(可見脂肪、未露骨肌腱),故選C。","options":{"A":"第一期是皮膚完整、壓不變白的發紅,無破損,錯誤。","B":"第二期是部分皮層缺損(淺潰瘍/水疱),未見脂肪,錯誤。","C":"正解。全皮層缺損、可見皮下脂肪、有滲出物為第三期。","D":"可見脂肪即可判定為第三期,非無法分期,錯誤。"},"sources":["新文京《內外科護理學》傷口與皮膚照護","華杏《新編內外科護理學》","NPUAP/EPUAP 壓力性損傷分期指引"]}},"111110-N3-46":{"quick":"皮膚惡性腫瘤病灶『不應加壓』(會刺激、破壞病灶、促轉移),故A「加壓減少疼痛」錯誤。","detail":{"background":"皮膚惡性腫瘤病人的護理措施:B「教導每日檢查皮膚,觀察病灶及其變化」正確(自我監測惡化與新病灶);C「儘量減少曝曬於陽光、執行適當防曬(SPF防曬乳、衣帽、陽傘)」正確(紫外線是皮膚癌重要危險因子,防曬防惡化與新發);D「告知身上的痣若出現潰瘍、滲液、痛癢時需就醫」正確(惡性變化警訊)。A「病灶處需要適當的『加壓』以減少疼痛」為「錯誤」——惡性腫瘤病灶「不應加壓、摩擦或刺激」,加壓可能造成病灶破損出血、增加不適,甚至刺激腫瘤(理論上不利);疼痛應以「藥物止痛」處理,而非壓迫病灶。故A為錯誤措施。","options":{"A":"正解(錯誤敘述)。惡性腫瘤病灶不應加壓刺激,疼痛應以藥物處理。","B":"教導每日檢查皮膚、觀察病灶變化,正確。","C":"減少陽光曝曬並防曬,正確。","D":"痣出現潰瘍、滲液、痛癢需就醫,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》"]}},"111110-N3-50":{"quick":"接觸性皮膚炎應「避免肥皂等刺激物」;C「經常用肥皂清潔以緩解過敏」會加重病灶,故錯誤。","detail":{"background":"接觸性皮膚炎(因接觸刺激物或過敏原引起)的護理指導:A「屬於過敏反應(過敏性接觸性皮膚炎為第四型延遲過敏)」正確;B「避免接觸已知的過敏原(如鎳金屬、橡膠、清潔劑、特定植物)」正確(去除誘因是根本);D「服用抗組織胺類藥物時須避免開車」正確(抗組織胺有嗜睡、降低警覺性的副作用,避免操作機械、開車)。C「經常用『肥皂』清潔以緩解過敏症狀」為「錯誤」——「肥皂(尤其鹼性、含香料)會去除皮膚油脂、刺激並破壞已受損的皮膚屏障,『加重』搔癢與發炎」;接觸性皮膚炎應「以溫水溫和清潔、避免肥皂與刺激性清潔劑、加強保濕」。故C為錯誤指導。","options":{"A":"過敏性接觸性皮膚炎屬過敏反應,正確。","B":"避免接觸已知過敏原是根本處置,正確。","C":"正解(錯誤指導)。肥皂會刺激破壞屏障、加重病灶,應避免。","D":"抗組織胺有嗜睡副作用,服用時避免開車,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","台灣皮膚科醫學會臨床指引"]}},"112030-N3-45":{"quick":"長時間曝曬陽光「需每約2小時重複塗抹」防曬乳,故A「無需重複塗抹」錯誤。","detail":{"background":"皮膚癌的預防與處置:B「陰天也要採取防曬措施」正確(紫外線UVA可穿透雲層,陰天仍有曝曬風險);C「皮膚病灶變大或發生色素沉著(異常變化)應立即就醫」正確(惡性警訊);D「造成曬傷時可用冷水浸泡(冷敷)消褪(緩解)」正確(降溫、減輕發炎與不適)。A「長時間暴露陽光下,無需重複塗抹SPF15以上的防曬乳液」為「錯誤」——防曬乳會因「流汗、碰水、擦拭與時間」而效果遞減,長時間曝曬下「應每約2小時、或游泳流汗後重新補擦」,並選擇SPF足夠(建議SPF30以上)且具UVA防護的產品;「無需重複塗抹」是錯誤觀念。故A錯誤。","options":{"A":"正解(錯誤敘述)。長時間曝曬需每約2小時重複塗抹防曬乳,非無需重複。","B":"陰天UVA仍可穿透,也要防曬,正確。","C":"病灶變大或異常色素沉著應立即就醫,正確。","D":"曬傷可用冷水浸泡(冷敷)降溫緩解,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》"]}},"112030-N3-46":{"quick":"膠帶造成的皮膚撕裂傷好發於皮膚脆弱的「嬰幼兒與水腫病人」,故B正確。","detail":{"background":"醫用膠帶等黏性產品的使用與皮膚保護(找正確):B「膠帶造成的皮膚損傷(醫用黏著劑相關皮膚損傷MARSI)好發在『嬰幼兒和水腫病人』」正確——嬰幼兒皮膚薄嫩、老年人與水腫病人皮膚脆弱、屏障差,撕除膠帶易造成表皮剝離撕裂傷。A「移除膠帶時應『垂直、快速』」錯——應「『低角度(接近0度、貼近皮膚)、緩慢、順著毛髮生長方向』」並『一手支撐固定皮膚』撕除,垂直快速反而易撕傷皮膚。C「移除時支撐邊緣皮膚、以『180度逆毛』方向移除」錯——方向應「『順毛』」而非逆毛(逆毛拉扯易傷皮膚與毛囊)。D「使用膠帶前在皮膚上塗抹『優碘』以增加黏性」錯——應使用「皮膚保護膜(液體敷料)」保護皮膚,優碘並非用來增加黏性、且會刺激。故B正確。","options":{"A":"應低角度、緩慢、順毛並支撐皮膚撕除,非垂直快速,錯誤。","B":"正解。膠帶相關皮膚損傷好發於嬰幼兒與水腫病人(皮膚脆弱)。","C":"移除方向應順毛,非180度逆毛,錯誤。","D":"應用皮膚保護膜保護,優碘非增加黏性且會刺激,錯誤。"},"sources":["新文京《內外科護理學》傷口與皮膚照護","華杏《新編內外科護理學》","NPUAP/EPUAP 壓力性損傷分期指引"]}},"112110-N3-43":{"quick":"紫斑(purpura)是皮膚內出血所致、「壓下不會變色(不褪色)」,故D正確。","detail":{"background":"原發性皮膚病變的定義判斷(找正確):D「紫斑(purpura)是皮膚『組織內出血』所致的紫紅色斑塊,『壓下不會變色(不褪色)』」正確——紫斑因紅血球滲出血管外、血液積在組織內,故按壓「不褪色」(可與「紅斑erythema因血管擴張、按壓會『褪色變白』」鑑別)。A「結節(nodule)直徑『小於1公分』」錯——結節是「直徑『大於』1公分」的實質隆起(較深);丘疹(papule)才是<1公分。B「丘疹(papule)為皮膚表面硬塊、侷限皮下『不會隆起』、直徑『大於1公分』」錯——丘疹是「『高出皮面(隆起)』、直徑『小於1公分』」的實質病變。C「玫瑰疹」的敘述措辭不當(其描述較接近膨疹/風疹塊的暫時性表皮浮腫)。故D正確。","options":{"A":"結節直徑大於1公分(丘疹才<1公分),敘述相反,錯誤。","B":"丘疹是高出皮面、直徑小於1公分,敘述相反,錯誤。","C":"玫瑰疹敘述措辭不當(較像膨疹的暫時性浮腫),錯誤。","D":"正解。紫斑是皮膚內出血、壓下不褪色(與紅斑可褪色不同)。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》"]}},"112110-N3-44":{"quick":"牛皮癬(乾癬)典型是「邊緣清楚的紅斑覆蓋銀白色(銀灰色)易脫落鱗屑」,故C正確。","detail":{"background":"牛皮癬(psoriasis,乾癬)是慢性、免疫相關的角質過度增生疾病。判斷(找正確):C「皮膚由邊緣明顯的紅斑轉變成易脫落的『銀灰色(銀白色)鱗屑』」正確——典型病灶是「界線清楚的紅斑斑塊上覆蓋『銀白色雲母狀鱗屑』,刮除鱗屑可見點狀出血(Auspitz徵象)」。A「間接性發作,『夏天出現冬天消失』」錯——乾癬多「『冬天惡化、夏天(日曬)改善』」(紫外線有治療作用)。B「好發頭皮、手肘伸側及膝蓋,呈『不對稱』分布」錯——乾癬好發於「頭皮、肘膝『伸側』、薦骨」但呈「『對稱』分布」。D「角質層出現微小膿瘍稱為『柯納氏現象(Koebner phenomenon)』」錯——表皮內的微小膿瘍是「Munro微膿瘍」;「Koebner現象(同形反應)」指的是「正常皮膚受到外傷、搔抓處長出新的乾癬病灶」,兩者不同。故C正確。","options":{"A":"乾癬多冬天惡化、夏天日曬改善,非夏出現冬消失,錯誤。","B":"乾癬好發伸側但呈對稱分布,非不對稱,錯誤。","C":"正解。乾癬典型為邊緣清楚紅斑覆蓋銀白色易脫落鱗屑。","D":"Koebner是同形反應(外傷處長新病灶);表皮微膿瘍是Munro微膿瘍,錯誤。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","台灣皮膚科醫學會臨床指引"]}},"114030-N3-28":{"quick":"脂漏性角化症是「良性」的表皮角質過度增生,故B正確。","detail":{"background":"皮膚腫瘤判斷(找正確):B「脂漏性角化症(seborrheic keratosis,老人斑/老年疣)是一種『良性』的表皮角質過度增生」正確——常見於中老年人,呈邊界清楚、棕黑色、表面粗糙似「黏貼上去」的良性病灶,無惡性風險。A「表皮囊腫(epidermal cyst)是一種『惡性』腫瘤,包裹乳白色粉狀物質」錯——表皮囊腫是「『良性』」的,內含角質(乳白/乳酪狀)。C「纖維瘤(fibroma)是一種『脂肪細胞』常見的腫瘤」錯——纖維瘤源自「纖維結締組織(纖維母細胞)」,源自「脂肪細胞」的是「脂肪瘤(lipoma)」。D「蜘蛛狀血管瘤(spider angioma)與血中『黃體激素(progesterone)』升高有關」錯——蜘蛛狀血管瘤與「『動情素(estrogen,雌激素)』」升高有關(肝硬化、懷孕)。故B正確。","options":{"A":"表皮囊腫是良性、內含角質,非惡性,錯誤。","B":"正解。脂漏性角化症是良性的表皮角質過度增生。","C":"纖維瘤源自纖維結締組織;脂肪細胞腫瘤是脂肪瘤,錯誤。","D":"蜘蛛狀血管瘤與動情素(雌激素)升高有關,非黃體激素,錯誤。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》"]}},"114170-N3-28":{"quick":"現代傷口照護採「適度濕潤環境」促進上皮化,故D「保持乾燥有助上皮化」最不適當。","detail":{"background":"皮膚與傷口照護原則(選最不適當):A「銅、硒、矽(及鋅、維生素C)等微量元素有助於傷口癒合」適當(營養支持是癒合基礎);B「必要時採隔離照護,避免(交叉)感染」適當;C「清創術(debridement)移除壞死組織,有助於傷口癒合」適當(壞死組織妨礙肉芽生長、利於細菌繁殖,移除可促癒合)。D「傷口在『保持乾燥』的環境下,有助於上皮化(epithelization)」為「最不適當」——現代傷口照護採「『濕潤傷口癒合(moist wound healing)』」理論:「適度『濕潤』的環境」才能「促進上皮細胞移行、血管新生、肉芽生長與上皮化」、減少疼痛與疤痕;而「乾燥」會使傷口結痂、阻礙上皮細胞爬行、延緩癒合。故D「保持乾燥有助上皮化」與現代原則相反,最不適當。","options":{"A":"銅、硒、矽等微量元素有助傷口癒合,適當。","B":"必要時採隔離照護避免交叉感染,適當。","C":"清創移除壞死組織有助傷口癒合,適當。","D":"正解(最不適當)。應維持適度濕潤環境促進上皮化,乾燥反延緩癒合。"},"sources":["新文京《內外科護理學》傷口與皮膚照護","華杏《新編內外科護理學》","NPUAP/EPUAP 壓力性損傷分期指引"]}},"115030-N3-28":{"quick":"仰臥時壓傷好發於枕骨、肩胛、尾骶骨、腳跟、手肘;「坐骨結節」是『坐姿』好發處,仰臥較不發生,故選C。","detail":{"background":"壓力性損傷好發於「骨突處(承受體重壓力處)」,且因「臥姿不同而異」。「仰臥(supine)」時受壓的骨突處為:「枕骨(後腦)、肩胛骨、肘部、薦尾骨(尾骶骨)、腳跟」。本題問「仰臥時『較不常』發生」者:A「肩胛骨」、B「尾骶骨」、D「腳跟」都是仰臥常見壓傷處;C「坐骨結節(ischial tuberosity)」是「『坐姿』時」承受體重的主要骨突處(久坐者好發),「仰臥」時坐骨結節並非主要受壓點,故「較不常」在仰臥發生壓傷。故選C。其他臥姿:側臥好發於耳、肩峰、大轉子、膝外側、踝外側;俯臥好發於臉頰、胸、髂前上棘、膝、腳趾。","options":{"A":"肩胛骨是仰臥常見壓傷處,非答案。","B":"尾骶骨是仰臥常見壓傷處,非答案。","C":"正解。坐骨結節是坐姿好發處,仰臥較不發生壓傷。","D":"腳跟是仰臥常見壓傷處,非答案。"},"sources":["新文京《內外科護理學》傷口與皮膚照護","華杏《新編內外科護理學》","NPUAP/EPUAP 壓力性損傷分期指引"]}}},TO=["T1青光眼", "T2白內障", "T3視網膜剝離與眼部解剖", "T4中耳炎與耳部手術", "T5美尼爾氏症", "T6聽力障礙評估與助聽器", "T7鼻竇炎與鼻部手術", "T8鼻咽癌", "T9喉癌口腔癌與頭頸部手術", "T10扁桃腺炎與扁桃腺切除術", "T11感染性與發炎性皮膚病", "T12皮膚炎皮膚腫瘤與傷口壓傷照護"],LEC={"T1青光眼":{"title":"T1 青光眼 複習講義","html":"\n<h3>一、本質與分型</h3>\n<p>青光眼=<b>房水排出受阻→眼內壓(IOP)升高(正常10~21 mmHg)→壓迫視神經→視野缺損</b>的疾病。視神經損傷與視野喪失<b>不可逆</b>,治療只能控制眼壓、保存現有視力(<b>不能使視力復原</b>)。</p>\n<ul>\n<li><b>隅角開放性</b>:最常見(9成),隅角構造正常但小樑網排出阻力↑,<b>慢性、無痛、隱匿、有遺傳性</b>;早期視野不受影響(「視力小偷」),由周邊向中央喪失。</li>\n<li><b>隅角閉鎖性</b>:急性發作,瞳孔中度散大時虹膜堵住隅角→眼壓驟升;<b>眼劇痛、頭痛、看燈光有彩虹光暈、噁心嘔吐、視力驟降</b>,是眼科急症。</li>\n</ul>\n<h3>二、症狀(會痛!與白內障鑑別)</h3>\n<p>眼脹痛、虹輪視覺(光暈)、視野缺損;急性發作<b>眼劇痛+噁心嘔吐</b>。<b>畏光不是青光眼典型</b>(是白內障/角膜炎)。眼壓上升<b>不會發燒、不會血壓上升</b>。</p>\n<h3>三、藥物(分「減生成」與「促排出」)</h3>\n<ul>\n<li><b>減少房水生成</b>:β阻斷劑(timolol,<b>氣喘禁用、評估心搏徐緩</b>,不影響瞳孔)、碳酸酐酶抑制劑(diamox/acetazolamide)、α2致效劑(brimonidine)。</li>\n<li><b>促進房水排出</b>:縮瞳劑(pilocarpine,牽拉小樑網使房水流入<b>許萊姆氏管</b>)、前列腺素衍生物(latanoprost,一線、一日一次)。</li>\n</ul>\n<h3>四、護理</h3>\n<p>終身用藥、隨身攜帶眼藥;避免提重物、用力、彎腰、便秘、熬夜情緒緊張(使眼壓↑);術後<b>臥健側(不可臥手術側)</b>、室內光線適中(勿過暗使瞳孔散大)。點藥後壓內眥淚囊1~2分鐘減少全身吸收。</p>\n"},"T2白內障":{"title":"T2 白內障 複習講義","html":"\n<h3>一、本質與症狀</h3>\n<p>白內障=<b>水晶體(lens)混濁</b>,光線無法聚焦於視網膜。<b>無痛、漸進</b>視力模糊。症狀:視力減退、畏光眩光、<b>單眼複視</b>、辨色力下降、<b>瞳孔變灰白色</b>。<b>不會眼痛、不會眼紅</b>(眼痛是青光眼)。好發老年人(<b>老年性</b>),非高度近視為主。</p>\n<h3>二、治療</h3>\n<p><b>無有效藥物</b>,唯一根本治療是<b>手術摘除+植入人工水晶體(IOL)</b>。</p>\n<ul>\n<li><b>晶體乳化術(phacoemulsification)</b>:現代主流,超音波震碎晶體核吸出,屬囊外摘除術、切口小(約0.3 cm)、<b>術中同時植入人工水晶體</b>;<b>不需等成熟</b>(過熟反增併發症)。</li>\n<li>囊內摘除術:破壞玻璃體支撐,<b>易併發網膜剝離</b>,現少用。</li>\n</ul>\n<h3>三、術後護理(核心=避免眼壓上升)</h3>\n<ul>\n<li>避免:揉眼、用力咳嗽、用力解便(<b>預防便秘</b>)、彎腰低頭、提重物、用力擤鼻、俯臥壓眼、睡向手術側。</li>\n<li><b>臥健側、戴護目罩</b>;<b>深呼吸不會升眼壓、不需禁止</b>(會升眼壓的是用力咳嗽)。</li>\n<li>出現眼痛、視力驟降、大量分泌物應立即回診(警覺感染或人工水晶體移位)。</li>\n</ul>\n"},"T3視網膜剝離與眼部解剖":{"title":"T3 視網膜剝離與眼部解剖 複習講義","html":"\n<h3>一、眼球壁三層</h3>\n<p>外層=<b>鞏膜(保護)+角膜(屈光透明)</b>;中層血管膜(葡萄膜)=<b>脈絡膜(供應視網膜外層血液營養)+睫狀體(分泌房水/調節)+虹膜</b>;內層=視網膜。<b>供應眼球與視網膜血液營養的富血管構造=脈絡膜</b>。</p>\n<h3>二、視網膜剝離</h3>\n<p>=視網膜<b>感覺神經層與色素上皮層分離</b>→感覺層<b>失去脈絡膜供養</b>、缺血失去感光。危險因子:<b>高度近視</b>、老化、外傷、白內障術後。</p>\n<p>前驅症狀(<b>無痛</b>):<b>飛蚊增加、閃光幻視、視野缺損(黑幕/窗簾感)</b>;波及黃斑則中央視力驟降。<b>不會劇痛</b>(劇痛是青光眼)。</p>\n<h3>三、立即處理與術後護理</h3>\n<ul>\n<li>立即:<b>立刻臥床</b>(依剝離位置採適當臥位,<b>勿坐起</b>)、<b>雙眼蓋眼罩</b>(雙眼同向運動,單遮患眼無法制動)、勿移動頭部、禁止用力;<b>無痛、不需止痛劑、不需冰敷</b>。</li>\n<li>術後:玻璃體腔<b>注入氣體後採俯臥</b>(氣泡上浮頂壓裂孔,非仰臥);避免眼球快速運動(2~3週勿閱讀);敷料<b>有滲出液屬異常</b>應通報;屈光度數<b>穩定數月後</b>才換眼鏡(非1個月);6個月內避免劇烈活動。</li>\n</ul>\n"},"T4中耳炎與耳部手術":{"title":"T4 中耳炎與耳部手術 複習講義","html":"\n<h3>一、中耳炎</h3>\n<p>病原:細菌(肺炎鏈球菌、流感嗜血桿菌)或病毒,主要經<b>耳咽管</b>上行(幼兒耳咽管短平易發),亦可經外耳道(鼓膜破)或血行;<b>非淋巴途徑</b>。中耳積膿→<b>傳導性聽力喪失</b>。</p>\n<ul>\n<li>處置:抗生素<b>足療程約10~14天(非3~5天、非1週)</b>、解熱鎮痛劑、減充血劑助耳咽管引流;鼓膜膨脹張力大時<b>鼓膜切開術(myringotomy)</b>引流;鼓膜破裂則清潔+抗生素點耳液。</li>\n<li>正常鼓膜=珍珠灰、發亮;中耳炎時鼓膜紅腫膨出、失光澤。</li>\n</ul>\n<h3>二、耳部手術</h3>\n<ul>\n<li>慢性中耳炎/膽脂瘤外科首選<b>鼓室成形術(tympanoplasty)</b>(修補鼓膜、重建聽小骨);<b>乳突切除術</b>清除乳突感染。(耳硬化症→鐙骨切除術;重度感覺神經性聽損→耳蝸植入)</li>\n<li>術後護理:避免感冒;咳嗽打噴嚏<b>張口洩壓</b>(勿閉口用力);避免便秘提重物、用力擤鼻、頭部突然轉動;<b>避免潛水、搭飛機、登山(氣壓變化)</b>;軟質飲食;觀察<b>顏面神經受損</b>(口角歪斜);耳藥滴入停留約5分鐘;術側聽覺暫時下降,溝通站健側、放慢清楚(勿高聲喊叫)。</li>\n</ul>\n"},"T5美尼爾氏症":{"title":"T5 美尼爾氏症 複習講義","html":"\n<h3>一、機轉與症狀</h3>\n<p>美尼爾氏症(又稱<b>迷路水腫/內淋巴水腫</b>)=內耳膜迷路<b>內淋巴液增加</b>、壓力升高。好發40~60歲。四聯症:<b>陣發性旋轉性眩暈(數十分至數小時)、耳鳴(低音調)、波動性感覺神經性聽損(單側、低頻)、耳脹滿感</b>。</p>\n<p>重點鑑別:<b>單側、感覺神經性、低頻、波動</b>;<b>無耳痛、無發燒</b>(耳痛是中耳炎)。經前期水鈉滯留使症狀惡化。</p>\n<h3>二、處置與護理</h3>\n<ul>\n<li>飲食:<b>低鈉(限鹽)+限水</b>(減少內淋巴水腫);<b>不是低鉀</b>(用利尿劑反需注意補鉀);避免咖啡因、菸酒。</li>\n<li>藥物:<b>利尿劑</b>(排水)、<b>抗組織胺/betahistine</b>(抑前庭、改善內耳循環減耳鳴)、<b>抗焦慮劑</b>(鎮靜抑前庭)。頑固性可<b>迷路切除術/前庭神經切斷</b>。</li>\n<li>護理:急性發作<b>立即臥床</b>(採<b>患耳在上</b>姿勢減少患側刺激);緩慢移動身體、維持安全環境防跌倒;<b>非急性期</b>做平衡(前庭復健)運動促代償;情緒平穩、規律生活避免誘發。</li>\n</ul>\n"},"T6聽力障礙評估與助聽器":{"title":"T6 聽力障礙評估與助聽器 複習講義","html":"\n<h3>一、聽損分型與音叉試驗</h3>\n<p><b>傳導性</b>(外耳/中耳障礙,如耳垢、中耳積液、鼓膜穿孔)vs <b>感覺神經性</b>(內耳耳蝸/聽神經損傷,如噪音、耳毒性藥、老化)。</p>\n<ul>\n<li><b>韋伯(Weber)</b>:音叉置前額正中,經<b>骨傳導</b>比較兩耳。<b>傳導性→偏患耳</b>(患耳較大聲);<b>感覺神經性→偏健耳</b>。</li>\n<li><b>任內(Rinne)</b>:比較同耳AC與BC。正常/感覺神經性=<b>AC&gt;BC(陽性)</b>;<b>傳導性=AC&lt;BC(骨&gt;氣,陰性)</b>。</li>\n<li>傳導性病灶在外耳+中耳;感覺神經性病灶在內耳+耳蝸神經。噪音性聽損=感覺神經性(毛細胞受損不可逆、助聽器效果有限)。</li>\n</ul>\n<h3>二、聽力分級(聽閾dB)</h3>\n<p>≤25正常、26~40輕度、41~55中度、56~70中重度、71~90重度、&gt;90極重度。(<b>60 dB屬中度~中重度,不是重度</b>)</p>\n<h3>三、助聽器與溝通</h3>\n<ul>\n<li>助聽器:初戴<b>在安靜環境、配戴時間由短漸長</b>(非吵雜環境戴8小時);音量調至聽清楚的最小標準(防回授);不用時關電源取電池;避免噴髮膠髮油。</li>\n<li>溝通:<b>主動引起注意、先告知主題</b>(非等對方先開口)、面對病人與光源、放慢清楚、音調稍低、<b>善用手勢表情書寫</b>;家中電話加擴音、電鈴加閃光。</li>\n</ul>\n"},"T7鼻竇炎與鼻部手術":{"title":"T7 鼻竇炎與鼻部手術 複習講義","html":"\n<h3>一、鼻竇炎</h3>\n<p>鼻竇黏膜發炎、分泌物滯留。<b>最常見上頷竇</b>(開口位置高不易引流)。慢性=症狀持續約12週(2~3月)以上,<b>多因急性未完全治療遷延</b>、與鼻息肉互為因果、厭氧菌角色增加。症狀:鼻塞、膿涕、顏面痛、嗅覺減退、咳嗽(鼻涕倒流);<b>慢性鼻竇炎屬低度發炎、不會高燒</b>(高燒見於急性或併發症如眼眶蜂窩組織炎、腦膜炎、腦膿瘍)。抗生素須<b>足療程</b>(症狀消退不可即停)。</p>\n<p>減充血鼻噴/滴劑<b>連用不可超過3~5天</b>(過度使用→<b>反彈性鼻充血(藥物性鼻炎)</b>)。</p>\n<h3>二、鼻部手術後護理</h3>\n<ul>\n<li><b>抬高床頭、半坐臥(Fowler位)</b>促引流、減充血出血(<b>非平躺、非側臥</b>)。</li>\n<li>鼻部/臉頰<b>冰敷</b>(非額頭、非熱敷)減出血腫脹;由口呼吸並注意口腔衛生;戒菸;攝取足夠液體。</li>\n<li>引流物由口吐出、<b>勿用力擤鼻</b>;2週內勿用太熱的水洗臉洗澡(防血管擴張出血)。</li>\n<li><b>術後鼻出血應就醫</b>(常需重新填塞/止血),不可只自行加壓。</li>\n</ul>\n"},"T8鼻咽癌":{"title":"T8 鼻咽癌 複習講義","html":"\n<h3>一、病因與表徵</h3>\n<p>鼻咽癌(NPC)=<b>上皮性癌(鱗狀/未分化)</b>。危險因子:<b>EB病毒(EBV)</b>、遺傳(華南人種、第6號染色體HLA)、醃漬食物亞硝胺、抽菸。(EBV感染極普遍,<b>感染≠一定罹癌</b>;<b>檳榔與口腔癌最相關、與鼻咽癌最不相關</b>)血清<b>EBV抗體效價(VCA-IgA)、EBV DNA升高</b>可輔助診斷。</p>\n<p>表徵:<b>頸部淋巴結腫大(最早最常見)</b>、鼻塞/<b>回吸性血痰</b>(非一開始大量鼻血)、<b>耳鳴/耳脹/中耳積液/聽力減退</b>(阻塞耳咽管);侵犯顱底多影響<b>第五、六對腦神經</b>(非第七對)。</p>\n<h3>二、放射治療護理</h3>\n<ul>\n<li>放療為主要治療,療程約<b>6~7週</b>應連續完成。放療前<b>先處理蛀牙</b>(防<b>放射性骨壞死</b>)、評估聽力。</li>\n<li>皮膚:維持定位標記、<b>只用溫清水輕拍清潔、勿肥皂搓揉</b>、防曬遮陽、<b>不可冰敷或熱敷</b>;濕性脫屑依醫囑用氧化鋅。</li>\n<li>口腔/吞嚥:口乾黏膜炎→<b>軟質多水食物(非高纖粗糙)</b>、<b>不含酒精的溫和漱口水(鹽水/小蘇打)</b>;<b>做張口運動防顳顎關節纖維化、張口受限</b>(非促唾液)。</li>\n</ul>\n"},"T9喉癌口腔癌與頭頸部手術":{"title":"T9 喉癌口腔癌與頭頸部手術 複習講義","html":"\n<h3>一、喉癌</h3>\n<p>多為<b>鱗狀細胞癌</b>,危險因子<b>抽菸喝酒</b>。<b>聲門(內生)型早期即聲音嘶啞</b>(淋巴少、轉移晚、預後較好);<b>聲門上(外生)型淋巴豐富易頸部淋巴轉移</b>(症狀晚)。</p>\n<ul>\n<li><b>全喉切除術</b>(晚期):氣道食道分開、<b>永久氣管造口呼吸</b>,傷口癒合後<b>由口進食</b>(不需終身鼻胃管);<b>無法以原聲帶發聲</b>→食道語/電子喉(術後約2~4週開始語言復健);<b>嗅覺喪失</b>(空氣不經鼻),以色香味增進食慾;傷及副甲狀腺→<b>低血鈣</b>(非高鈣)。</li>\n<li>術後:<b>維持呼吸道通暢為首要</b>、半坐臥(非側臥)、坐起以手托後頸、避免頸部過度伸張;造口防水入(用手持蓮蓬頭、遮蓋造口);鼓勵自咳分泌物、抽吸為輔。</li>\n</ul>\n<h3>二、口腔癌/舌癌</h3>\n<p>多為<b>鱗狀細胞癌</b>,與<b>菸酒檳榔</b>相關,好發中年男性、頰黏膜與舌側緣。<b>舌癌預後最差</b>。前驅(早期)=白斑、<b>紅斑(erythroplakia,惡性潛能高)</b>、<b>無痛不癒潰瘍/硬塊(逾2週)</b>;黏膜出血是較晚期。頭頸大手術後<b>首要維持呼吸道通暢</b>。</p>\n<h3>三、頸部淋巴廓清術後</h3>\n<p>常犧牲<b>副神經(CN XI)</b>→斜方肌無力、肩下垂;術後(傷口穩定後)做<b>肩頸手臂漸進復健</b>(頭頸旋轉、擺臂、擴胸、肩伸展),<b>不可固定肩膀不動</b>(抬臀運動與肩頸無關)。</p>\n"},"T10扁桃腺炎與扁桃腺切除術":{"title":"T10 扁桃腺炎與扁桃腺切除術 複習講義","html":"\n<h3>一、扁桃腺炎</h3>\n<p>最常見致病菌=<b>A群β-溶血性鏈球菌</b>。症狀:發燒、喉嚨痛、吞嚥痛、扁桃腺紅腫化膿、頸部淋巴腫。抗生素須<b>足療程(約10天)</b>,退燒後仍需續用(預防風濕熱、急性腎絲球腎炎)。處置:溫食鹽水漱口、冰敷緩解咽喉疼痛。</p>\n<h3>二、手術適應症與禁忌</h3>\n<ul>\n<li><b>適應症</b>:反覆慢性感染(如一年≥7次)、疑腫瘤、阻塞性睡眠呼吸中止。</li>\n<li><b>禁忌(時機)</b>:<b>急性發炎期</b>(組織充血脆弱、出血感染風險高,應待炎症消退約2~3週再手術)、血液惡性疾病、肺結核活動期、未控制凝血疾病。</li>\n</ul>\n<h3>三、術後護理(核心=防出血)</h3>\n<ul>\n<li>麻醉<b>清醒後</b>先給<b>冰冷流質</b>(冷收縮血管止血);<b>冰敷兩側上頸部</b>;避免熱食、紅色深色飲料、粗糙堅硬酸辣食物。</li>\n<li><b>避免用力咳嗽、清喉嚨、大力擤鼻、用力說話</b>(防摩擦傷口出血)。</li>\n<li><b>頻繁/不自主吞嚥動作=血液被吞下的出血警訊</b>,須立即檢查通報。</li>\n</ul>\n"},"T11感染性與發炎性皮膚病":{"title":"T11 感染性與發炎性皮膚病 複習講義","html":"\n<h3>一、帶狀疱疹(皮蛇)</h3>\n<p><b>水痘帶狀疱疹病毒(VZV,DNA病毒)再活化</b>,潛伏於<b>感覺神經節</b>,免疫力↓時發作。<b>沿單側皮節帶狀分布、不跨中線</b>(非雙側、非全身);好發胸腰、臉部(三叉神經)、可侵犯<b>眼(眼部帶狀疱疹)、耳(Ramsay Hunt)</b>。伴神經痛(疱疹後神經痛)、局部淋巴腫。處置:<b>acyclovir(72hr內)</b>、止痛、勿擠壓水疱、濕冷敷;穿寬鬆柔軟衣;<b>水疱液含VZV、未患水痘者避免接觸</b>(會得水痘),污染衣物需處理;非終生免疫、可復發(高危族群可打疫苗)。</p>\n<h3>二、單純疱疹(HSV)</h3>\n<p><b>HSV(非水痘病毒)</b>;HSV-1口唇臉部、HSV-2會陰生殖器;接觸傳染、潛伏神經節<b>易復發</b>。護理:勿擠壓、接觸前後洗手/戴手套、勿共用唇膏毛巾餐具。</p>\n<h3>三、疥瘡(疥蟎,寄生蟲)</h3>\n<p>疥蟎在角質層挖隧道產卵;<b>接觸傳染</b>(皮膚/衣物),群居環境好發。<b>初次感染潛伏期4~6週</b>(再感染1~3天);<b>劇癢夜間更嚴重</b>;好發<b>頸部以下</b>皺褶(指間、手腕、腋下、腹股溝);刮皮屑顯微鏡確診。處置:抗疥藥<b>夜間塗頸部以下全身</b>、<b>接觸者同時治療</b>;衣物床單<b>60°C以上熱水約10分鐘/煮沸/烘乾機高溫</b>(烘乾機可用),不能洗者<b>密封2週</b>(疥蟎離體約2~3天死);採<b>接觸隔離(戴手套+穿隔離衣)</b>。</p>\n<h3>四、蜂窩性組織炎 / 足癬</h3>\n<ul>\n<li>蜂窩性組織炎:<b>真皮深層與皮下組織</b>細菌感染(非表皮;鏈球菌/金葡菌),<b>界線不清</b>(界線分明是丹毒);紅腫熱痛、可致壞死敗血症。護理:<b>抬高患肢、休息制動、冷敷、全身抗生素7~10天</b>;<b>勿熱敷</b>(促細菌繁殖擴散)。</li>\n<li>足癬(香港腳):黴菌感染,穿不透氣鞋襪引起;抗黴菌藥、<b>保持足部乾爽</b>、勤換鞋襪、不共用鞋襪。</li>\n</ul>\n"},"T12皮膚炎皮膚腫瘤與傷口壓傷照護":{"title":"T12 皮膚炎、皮膚腫瘤與傷口壓傷照護 複習講義","html":"\n<h3>一、皮膚解剖與病變分類</h3>\n<p>表皮五層(內→外):基底層→棘狀層→顆粒層→透明層→角質層;<b>黑色素細胞在基底層</b>(製造黑色素、決定膚色)。汗腺:外泌(eccrine,稀薄汗、調節體溫,手掌腳底最多)、<b>頂漿汗腺(apocrine,分泌物經細菌分解產生體臭)</b>。</p>\n<p>病變:<b>原發性</b>=斑、丘疹(隆起&lt;1cm)、結節(&gt;1cm)、<b>膨疹(wheal)</b>、水疱、膿疱、斑塊;<b>續發性</b>=鱗屑、痂、糜爛、潰瘍、抓痕、苔癬化。<b>紫斑壓下不褪色</b>(內出血)、紅斑壓下變白。</p>\n<h3>二、皮膚炎</h3>\n<ul>\n<li><b>接觸性皮膚炎</b>(過敏性)=<b>第四型延遲過敏(T細胞)</b>;避免過敏原、<b>勿用肥皂</b>(刺激加重)、抗組織胺(嗜睡勿開車)。</li>\n<li><b>異位性皮膚炎</b>=<b>第一型(IgE)過敏</b>、慢性搔癢、好發屈側;避免搔抓、穿棉質、保濕為基石。</li>\n<li><b>乾癬(牛皮癬)</b>:邊緣清楚紅斑+<b>銀白色易脫落鱗屑</b>、對稱分布伸側、<b>冬重夏輕</b>(日曬改善);Koebner=外傷處長新病灶。</li>\n</ul>\n<h3>三、皮膚腫瘤</h3>\n<ul>\n<li>良性:脂漏性角化症、表皮囊腫、脂肪瘤(脂肪細胞,好發頸肩背四肢)、纖維瘤(纖維組織)、蜘蛛血管瘤(與<b>動情素</b>↑有關)、蟹足腫。</li>\n<li>惡性:<b>基底細胞癌最常見但致死率最低</b>;<b>惡性黑色素瘤致死率最高、轉移性高</b>;共同危險因子=陽光曝曬;確診靠<b>活體組織切片</b>。痣惡性警訊<b>ABCDE</b>(不對稱、邊緣、顏色、直徑&gt;6mm、變化/隆起);護理:每日自我檢查、防曬、<b>勿加壓病灶</b>、痣出現潰瘍滲液痛癢就醫。</li>\n</ul>\n<h3>四、傷口與壓傷照護</h3>\n<ul>\n<li>傷口癒合採<b>濕潤傷口癒合(適度濕潤促上皮化,非乾燥)</b>;敷料:親水性吸滲液不易滋生細菌、含銀用於感染傷口、藻膠用於大量滲液;清創移除壞死組織;微量元素(鋅銅硒)+蛋白質+維生素C助癒合。膠帶撕除<b>低角度、順毛、緩慢、支撐皮膚</b>(好發損傷於嬰幼兒、水腫病人)。</li>\n<li><b>壓傷分期</b>:一期=壓不變白的發紅(皮膚完整);二期=部分皮層缺損(淺潰瘍/水疱);<b>三期=全皮層缺損、可見皮下脂肪</b>;四期=露骨/肌腱/肌肉。<b>Braden scale</b>:6個層面、總分6~23、<b>分數越低風險越高</b>(13~14中度、≤9極高)。仰臥好發壓傷:枕骨、肩胛、尾骶骨、腳跟、手肘;<b>坐骨結節是坐姿好發</b>(仰臥較不發生)。</li>\n</ul>\n"}};
const $=s=>document.querySelector(s);
let view='topic',expand=false;
function disp(t){const m=t.match(/^T(\d+)(.*)$/);return m?('（'+m[1]+'）'+m[2]):t;}
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:disp(t)}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分・一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const sf=(q.answer_status&&q.answer_status.indexOf('送分')>=0);
 const ma=(q.accepted_answers&&q.accepted_answers.length>1);
 let chips='<span class="chip y">'+esc(q.src)+'</span><span class="chip">'+esc(q.exam_code)+' 第'+q.q_num+'題</span><span class="chip t">'+esc(disp(q.topic))+'</span>';
 if(sf)chips+='<span class="chip sf">送分</span>'; else if(ma)chips+='<span class="chip ma">多重答案</span>';
 const acc=(q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]);
 const songfen=sf?1:0;
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(acc.indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }
 return '<div class="q" data-id="'+q.id+'" data-acc="'+acc.join(',')+'" data-songfen="'+songfen+'"><div class="chips">'+chips+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+
  '<div class="hint">👆 點選 A／B／C／D 作答</div>'+opts+
  '<div class="result"></div>'+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3 class="title">📘 '+esc(disp(t))+' 複習講義 ▾</h3><div class="body" style="display:none">'+l.html+'</div></div>';}
const TOTAL=Q.length, KEY='n3_eent_v1';
let PROG={}, wrongOnly=false;
try{PROG=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){PROG={}}
function saveProg(){try{localStorage.setItem(KEY,JSON.stringify(PROG))}catch(e){}}
function updateStats(){
 const ks=Object.keys(PROG),ans=ks.length,cor=ks.filter(k=>PROG[k].r==='c').length,rate=ans?Math.round(cor/ans*100):0;
 stats.innerHTML = ans
   ? '已作答 <b>'+ans+'</b> / '+TOTAL+' 題 ・ 答對 <b>'+cor+'</b> ・ 答錯 <b>'+(ans-cor)+'</b> ・ 答對率 <b>'+rate+'%</b><div class="bar"><i style="width:'+rate+'%"></i></div>'
   : '👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';
}
function updateWrongBtn(){const n=Object.keys(PROG).filter(k=>PROG[k].r==='w').length; wrongBtn.textContent='錯題本'+(n?'（'+n+'）':'');}
function fill(qEl,k,correct,songfen,acc){
 qEl.dataset.answered='1'; qEl.classList.add('done');
 qEl.querySelectorAll('.opt').forEach(o=>{const ok=o.dataset.k;
   if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');
   if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});
 const r=qEl.querySelector('.result'); r.className='result '+(correct?'ok':'bad');
 r.textContent=correct?'✓ 正確！':'✗ 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';
}
function applyStored(qEl){const p=PROG[qEl.dataset.id]; if(!p)return; fill(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',qEl.dataset.acc.split(','));}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0||Object.values(q.options).some(o=>o.indexOf(kw)>=0)));
 if(wrongOnly)qs=qs.filter(q=>PROG[q.id]&&PROG[q.id].r==='w');
 cnt.textContent=(wrongOnly?'錯題複習 · ':'')+'共 '+qs.length+' 題';let h='';
 if(!qs.length&&wrongOnly){h='<div class="grp">目前沒有錯題 🎉（答錯的題目會自動收集到這裡）</div>';}
 else if(view==='topic'){TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+disp(t)+'（'+tq.length+'題）</div>'+(wrongOnly?'':lecBox(t))+tq.map(qCard).join('');});}
 else{const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).map(qCard).join('');});}
 ce.innerHTML=h||'<div class="cnt">（無符合條件的題目）</div>';
 ce.querySelectorAll('.q').forEach(applyStored);
 ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
function answer(opt){
 const qEl=opt.closest('.q'); if(!qEl||qEl.dataset.answered) return;
 const acc=qEl.dataset.acc.split(','), songfen=qEl.dataset.songfen==='1', k=opt.dataset.k;
 const correct=songfen||acc.indexOf(k)>=0;
 fill(qEl,k,correct,songfen,acc);
 PROG[qEl.dataset.id]={r:correct?'c':'w',k:k}; saveProg(); updateStats(); updateWrongBtn();
}
ce.addEventListener('click',e=>{
 const tt=e.target.closest('.lec .title'); if(tt){const b=tt.nextElementSibling;const o=b.style.display==='none';b.style.display=o?'block':'none';tt.textContent=tt.textContent.replace(o?'▾':'▴',o?'▴':'▾');return;}
 const opt=e.target.closest('.opt'); if(opt&&ce.contains(opt)){answer(opt);return;}
 if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合詳解 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';this.classList.toggle('on',expand);render();};
wrongBtn.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};
resetBtn.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;wrongBtn.classList.remove('on');updateStats();updateWrongBtn();render();}};
updateStats();updateWrongBtn();render();
(function(){function ph(){try{parent.postMessage({cvqHeight:document.documentElement.scrollHeight},'*');}catch(e){}}window.addEventListener('load',ph);document.addEventListener('click',()=>setTimeout(ph,80));setInterval(ph,1500);})();
</script></body></html>
