er’s phenomenon)"},"img":""},{"id":"114030-N3-28","code":"114030","roc":"114","cat":"N3","catname":"內外科護理學","num":28,"stem":"有關皮膚腫瘤之敘述,下列何者正確?","opts":{"A":"表皮囊腫(epidermal cysts)是一種惡性腫瘤,通常包裹著乳白色的粉狀物質","B":"脂漏性角化症(seborrheic keratoses)是一種良性的表皮角質過度增生","C":"纖維瘤(fibroma)是一種脂肪細胞常見的腫瘤","D":"蜘蛛狀血管瘤(spider hemangioma)與血液中黃體激素升高有關"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"system_code":"S10","system_name":"眼耳鼻喉與皮膚","topic":"T12皮膚炎皮膚腫瘤與傷口壓傷照護","topic_code":"T12","q_num":28,"roc_year":"114","exam_code":"114030","src":"民國114年","options":{"A":"表皮囊腫(epidermal cysts)是一種惡性腫瘤,通常包裹著乳白色的粉狀物質","B":"脂漏性角化症(seborrheic keratoses)是一種良性的表皮角質過度增生","C":"纖維瘤(fibroma)是一種脂肪細胞常見的腫瘤","D":"蜘蛛狀血管瘤(spider hemangioma)與血液中黃體激素升高有關"},"img":""},{"id":"114170-N3-28","code":"114170","roc":"114","cat":"N3","catname":"內外科護理學","num":28,"stem":"有關皮膚和傷口照護原則,下列敘述何者最不適當?","opts":{"A":"銅、硒、矽等微量元素,有助於傷口癒合","B":"必要時採隔離照護,避免感染","C":"清創術移除壞死組織,有助於傷口癒合","D":"傷口在保持乾燥的環境下,有助於上皮化(epithelization)過程"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"system_code":"S10","system_name":"眼耳鼻喉與皮膚","topic":"T12皮膚炎皮膚腫瘤與傷口壓傷照護","topic_code":"T12","q_num":28,"roc_year":"114","exam_code":"114170","src":"民國114年","options":{"A":"銅、硒、矽等微量元素,有助於傷口癒合","B":"必要時採隔離照護,避免感染","C":"清創術移除壞死組織,有助於傷口癒合","D":"傷口在保持乾燥的環境下,有助於上皮化(epithelization)過程"},"img":""},{"id":"115030-N3-28","code":"115030","roc":"115","cat":"N3","catname":"內外科護理學","num":28,"stem":"長期臥床病人採仰臥姿勢時,下列何者是皮膚壓力性損傷較不常發生的部位?","opts":{"A":"肩胛骨","B":"尾骶骨","C":"坐骨結節","D":"腳跟"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"system_code":"S10","system_name":"眼耳鼻喉與皮膚","topic":"T12皮膚炎皮膚腫瘤與傷口壓傷照護","topic_code":"T12","q_num":28,"roc_year":"115","exam_code":"115030","src":"民國115年","options":{"A":"肩胛骨","B":"尾骶骨","C":"坐骨結節","D":"腳跟"},"img":""}],E={"101030-N3-45":{"quick":"青光眼是房水堆積使眼壓升高、傷害視神經;畏光(C)是白內障/角膜炎的表徵,不是青光眼典型症狀。","detail":{"background":"青光眼(glaucoma)是因房水(aqueous humor)排出受阻、眼內壓(intraocular pressure, IOP)持續高於正常值(正常約10~21 mmHg),壓迫視神經盤(optic disc)導致視神經纖維進行性受損、視野缺損的一群疾病,是全球不可逆失明的主因之一。臨床分隅角開放性(open-angle,慢性、無痛、隱匿)與隅角閉鎖性(angle-closure,急性、劇烈)兩大類。常見臨床表徵:①眼壓升高造成「眼睛脹痛、頭痛」;②角膜水腫使病人看燈光周圍出現「彩虹般光暈(虹輪視覺,halo)」;③視神經受損由周邊向中央發展,造成「周邊視野喪失、管狀視野」,晚期才影響中央視力;④急性閉鎖性發作時伴噁心、嘔吐、視力驟降。畏光(photophobia)主要見於角膜病變、虹彩炎或白內障,並非青光眼的典型表現,故為非青光眼表徵。護理上強調早期偵測(定期測眼壓、視野、眼底)與終身用藥控制眼壓以保存現有視力。","options":{"A":"眼壓升高壓迫眼球與視神經會引起眼睛脹痛,是青光眼常見表徵。","B":"角膜水腫使看燈光出現彩虹光暈(虹輪視覺),為青光眼典型表現。","C":"正解(非青光眼表徵)。畏光主要見於白內障、角膜炎或虹彩炎,非青光眼典型症狀。","D":"視神經受損由周邊向中央進展造成視野缺損,是青光眼核心病變。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Glaucoma PPP"]}},"101030-N3-47":{"quick":"青光眼術後須避免眼壓上升,臥向健側、勿壓迫術眼,故D「不可臥向手術側」正確。","detail":{"background":"青光眼治療目標是「降低並控制眼壓以保存尚存視力」,但已受損的視神經與已喪失的視野「無法回復」,故衛教時不可承諾治療能使視力復原(這是青光眼與白內障最大不同——白內障置換水晶體後視力可改善)。藥物治療(縮瞳劑、β阻斷劑、碳酸酐酶抑制劑、前列腺素衍生物)或雷射/濾過性手術(trabeculectomy)目的均為促進房水排出或減少生成。術後護理:①平躺或臥向「健側(非手術側)」,避免壓迫術眼造成眼壓升高或傷口出血;②保持環境光線「適中柔和」,避免完全黑暗(瞳孔過度放大可能誘發隅角閉鎖)亦避免強光刺激;③避免咳嗽、用力、彎腰、提重物、便秘等使眼壓驟升的動作;④青光眼不需植入人工水晶體(那是白內障手術)。故「不可臥向手術側」為正確措施。","options":{"A":"青光眼造成的視神經損傷與視野缺損不可逆,治療只能控制眼壓、無法使視力復原,錯誤。","B":"晶狀體(人工水晶體)植入是白內障手術,非青光眼治療,錯誤。","C":"術後室內光線應適中柔和,過度陰暗使瞳孔散大恐誘發隅角閉鎖,錯誤。","D":"正解。應臥向健側、勿壓迫術眼,以免眼壓上升或傷口受壓。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Glaucoma PPP"]}},"103030-N3-25":{"quick":"眼壓上升會引起眼痛、噁心嘔吐、視力變差,但不會造成「血壓上升」,故A錯誤。","detail":{"background":"青光眼(尤其隅角閉鎖性)或術後眼壓急遽上升時,典型症狀群為:①眼球劇烈脹痛、同側頭痛;②房水壓迫與迷走神經反射引起「噁心、嘔吐」(易被誤為腸胃或腦部問題);③角膜水腫使「視力模糊變差、看燈光有光暈」;④眼睛發紅、瞳孔中度散大固定。眼壓上升屬眼局部與自主神經反應,並不會直接造成「全身血壓上升」,血壓與眼壓無直接因果關係,故A為錯誤敘述。臨床上術後若病人出現眼痛合併噁心嘔吐,應警覺為眼壓升高的急症,立即通報並測量眼壓處理(降眼壓藥、必要時手術),不可只當作一般術後不適。","options":{"A":"正解(錯誤敘述)。眼壓上升引起眼局部與迷走反射症狀,不會造成全身血壓上升。","B":"眼壓驟升刺激迷走神經反射,常伴噁心嘔吐,正確。","C":"角膜水腫使視力模糊變差,為眼壓上升症狀,正確。","D":"眼壓升高壓迫眼球造成眼痛,為核心症狀,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Glaucoma PPP"]}},"103100-N3-23":{"quick":"隅角開放性青光眼隅角構造正常但小樑網排出阻力增加,早期無症狀、視野不受影響,故D正確。","detail":{"background":"隅角開放性青光眼(open-angle glaucoma)是最常見型別(約占9成),特點:①前房隅角「構造正常、開放」,但房水流出的「小樑網(trabecular meshwork)/許萊姆氏管(Schlemm canal)」排出阻力增加,導致房水慢性堆積、眼壓緩慢上升;②具「遺傳傾向」,家族史是危險因子;③房水生成正常但排出減少使房水「相對堆積」;④病程隱匿,「早期中央視力與視野不受影響」,病人常無自覺,直到周邊視野大量喪失(管狀視野)才就醫,故有「視力小偷」之稱。相對地隅角閉鎖性青光眼則是隅角狹窄被虹膜堵住、急性發作。本題A(非遺傳)、B(隅角不正常)、C(房水量未增加描述不符堆積機轉)皆為錯誤,D「早期視野不受影響」正確描述其隱匿特性。","options":{"A":"隅角開放性青光眼具遺傳傾向,並非非遺傳性,錯誤。","B":"其隅角構造正常且開放,阻塞發生在小樑網,非隅角不正常,錯誤。","C":"房水因排出受阻而相對堆積使眼壓上升,敘述不符,錯誤。","D":"正解。病程隱匿,早期中央視野不受影響,常無自覺症狀。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Glaucoma PPP"]}},"105090-N3-22":{"quick":"隅角開放性青光眼眼壓上升時會眼痛、頭痛、視力模糊,但「不會發燒」,故C錯誤。","detail":{"background":"隅角開放性青光眼需「終身用藥」控制眼壓(A正確),病人應「隨身攜帶眼藥」按時點藥、不可自行停藥(B正確),並避免會使眼壓驟升的活動如「提重物、用力、彎腰倒立、緊束衣領、便秘、長時間低頭」(D正確)。眼壓上升時的症狀是「眼脹痛、頭痛、視力模糊、看燈光有光暈、噁心」等眼局部與自主神經症狀,「不會發燒」——發燒是感染或全身性發炎的表現,與眼壓升高無關,故C為錯誤敘述。衛教重點亦包括定期回診監測眼壓、視野與眼底,及早發現惡化。","options":{"A":"青光眼視神經損傷不可逆,需終身用藥控制眼壓,正確。","B":"應隨身攜帶眼藥按時點用、不可中斷,正確。","C":"正解(錯誤敘述)。眼壓上升不會發燒,發燒屬感染或全身發炎表現。","D":"避免提重物等使眼壓驟升的動作,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Glaucoma PPP"]}},"106030-N3-24":{"quick":"β腎上腺素阻斷劑(如timolol)是「減少房水生成」降眼壓,不會縮小瞳孔(縮瞳是膽鹼性藥),故A錯誤。","detail":{"background":"青光眼降眼壓藥物依機轉分兩大類:「減少房水生成」與「增加房水排出」。β腎上腺素阻斷劑(β-blocker,如timolol)作用於睫狀體,「減少房水(aqueous)生成」而降眼壓(B正確),其對瞳孔大小「無影響」,並不會縮小瞳孔(縮小瞳孔是膽鹼性縮瞳劑pilocarpine的作用),故A「可以縮小瞳孔」為錯誤敘述。timolol為非選擇性β阻斷劑,經結膜吸收可產生全身性副作用:阻斷β2會誘發支氣管痙攣,故「氣喘、慢性阻塞性肺病病人禁用」(C正確);阻斷β1會減慢心跳、降血壓,故給藥前需評估有無「心搏過緩、房室傳導阻滯、心衰竭」(D正確),點藥後可壓迫內眥淚囊1~2分鐘減少全身吸收。","options":{"A":"正解(錯誤敘述)。β阻斷劑減少房水生成降眼壓,不影響瞳孔;縮瞳是膽鹼性藥的作用。","B":"β阻斷劑作用於睫狀體,減少房水生成,正確。","C":"非選擇性β阻斷劑阻斷β2會誘發支氣管痙攣,氣喘病人禁用,正確。","D":"阻斷β1會心搏過緩,給藥前須評估心跳,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Glaucoma PPP"]}},"107030-N3-41":{"quick":"眼睛劇痛合併噁心嘔吐是「急性隅角閉鎖性青光眼」的典型急症表現,故選B。","detail":{"background":"眼睛劇烈疼痛合併「噁心、嘔吐」是「急性隅角閉鎖性青光眼(acute angle-closure glaucoma)」的經典表現,屬眼科急症。其機轉為前房隅角狹窄者,當瞳孔中度散大(如進入暗處、情緒激動、使用散瞳劑)時,虹膜根部堵住隅角,房水無法經小樑網排出,眼壓在短時間內急遽飆高(可達50 mmHg以上),引起:①眼球劇痛、同側頭痛;②角膜水腫使視力驟降、看燈光有彩虹光暈;③眼壓刺激迷走神經反射造成「噁心、嘔吐」(常被誤為腸胃炎或腦病變);④眼睛發紅、瞳孔中度固定散大。需「立即」降眼壓(縮瞳劑、carbonic anhydrase抑制劑、高滲透壓劑mannitol)並安排雷射虹膜切開術,延誤可在數小時至數天內失明。相對地隅角「開放性」青光眼為慢性無痛、白內障與視網膜剝離也不會有此劇痛嘔吐組合,故選B。","options":{"A":"隅角開放性青光眼為慢性、無痛、隱匿,不會急性劇痛嘔吐,錯誤。","B":"正解。隅角閉鎖性青光眼眼壓急遽飆高,典型表現為眼劇痛合併噁心嘔吐。","C":"視網膜剝離為無痛性的飛蚊、閃光與視野缺損,不會劇痛嘔吐,錯誤。","D":"白內障為無痛性漸進視力模糊,不會劇痛嘔吐,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Glaucoma PPP"]}},"107110-N3-22":{"quick":"降眼壓機轉:β阻斷劑(timolol)抑制房水「生成」;縮瞳劑與前列腺素是促進「排出」,故B正確。","detail":{"background":"青光眼藥物降眼壓有兩條路徑,須清楚區分:「減少房水生成」者有β腎上腺素阻斷劑(timolol)、碳酸酐酶抑制劑(carbonic anhydrase inhibitor,如diamox/acetazolamide、dorzolamide)、α2致效劑(brimonidine);「增加房水排出」者有膽鹼性縮瞳劑(pilocarpine,收縮瞳孔括約肌、拉開小樑網促進房水經許萊姆氏管排出)、前列腺素衍生物(latanoprost,促進葡萄膜鞏膜路徑外流,為一線首選且一日一次)。故:A錯(縮瞳劑是「促進」非抑制房水排出);B對(β阻斷劑抑制房水生成);C錯(乙醯膽鹼酯酶/膽鹼性藥是促進房水「排出」,非抑制生成;且抑制生成的是碳酸酐酶抑制劑);D錯(前列腺素是促進房水「排出」非抑制生成)。記憶法:含「-olol」的β阻斷劑與「-zolamide」的碳酸酐酶抑制劑管「生成」,縮瞳劑與前列腺素管「排出」。","options":{"A":"縮瞳劑(pilocarpine)是促進房水排出,非抑制排出,錯誤。","B":"正解。β腎上腺素阻斷劑(如timolol)抑制睫狀體房水生成。","C":"膽鹼性藥促進房水排出;抑制生成的是碳酸酐酶抑制劑,敘述錯誤。","D":"前列腺素衍生物是促進房水排出(葡萄膜鞏膜路徑),非抑制生成,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Glaucoma PPP"]}},"108110-N3-8":{"quick":"diamox(碳酸酐酶抑制劑)是「減少房水分泌(生成)」降眼壓,不是促進排出,故D錯誤。","detail":{"background":"本題考青光眼各藥物作用機轉:A「可使用縮瞳劑」正確(pilocarpine縮瞳、拉開隅角促排出);B「pilocarpine促進房水流入許萊姆氏管(Schlemm canal)」正確(縮瞳劑收縮睫狀肌與瞳孔括約肌,牽拉小樑網使房水經許萊姆氏管排出);C「timolol減少房水分泌」正確(β阻斷劑抑制睫狀體生成房水);D「diamox促進房水排出」「錯誤」——diamox(acetazolamide)是「碳酸酐酶抑制劑(carbonic anhydrase inhibitor)」,作用於睫狀體上皮抑制碳酸酐酶,「減少房水的『生成/分泌』」而降眼壓,並非促進排出;口服diamox為全身性用藥,須注意低血鉀、感覺異常、腎結石、磺胺過敏等副作用。故D為錯誤敘述。","options":{"A":"縮瞳劑(pilocarpine)用於青光眼促進房水排出,正確。","B":"pilocarpine牽拉小樑網使房水流入許萊姆氏管排出,正確。","C":"timolol為β阻斷劑,減少房水分泌(生成),正確。","D":"正解(錯誤敘述)。diamox為碳酸酐酶抑制劑,減少房水生成,非促進排出。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Glaucoma PPP"]}},"111030-N3-22":{"quick":"青光眼定義即「眼內壓升高造成視神經受損」,故A正確;晶狀體植入是白內障、熬夜會影響眼壓、術後應臥健側。","detail":{"background":"本題考青光眼基本概念與護理。A正確:青光眼的定義即為「眼內壓(IOP)上升超過正常值、進而造成『視神經受損』與視野缺損」的疾病(部分正常眼壓性青光眼眼壓雖正常,但仍以視神經損傷為核心)。B錯誤:晶狀體(人工水晶體)植入是「白內障」手術,非青光眼處置。C錯誤:熬夜、情緒緊張、過度疲勞、咖啡因、長時間低頭或暗處用眼都「會」使眼壓波動升高,應避免。D錯誤:術後應臥向「健側」、避免壓迫術眼,而非臥向手術側。護理重點:強調終身規律用藥控制眼壓、避免眼壓驟升的動作、定期追蹤視野與眼底,以保存現有視力。","options":{"A":"正解。青光眼即眼內壓上升造成視神經受損與視野缺損的疾病。","B":"人工水晶體(晶狀體)植入是白內障手術,非青光眼處置,錯誤。","C":"熬夜、疲勞、情緒緊張會使眼壓波動升高,應避免,錯誤。","D":"術後應臥向健側避免壓迫術眼,非臥向手術側,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Glaucoma PPP"]}},"113180-N3-13":{"quick":"四者中只有青光眼因眼壓升高會「眼睛痛」;白內障、老花、黃斑變性皆為無痛性視力問題,故選B。","detail":{"background":"本題鑑別「會不會眼睛痛」:①「青光眼」(尤其急性隅角閉鎖型)因眼壓急遽升高壓迫眼球與視神經,會出現明顯「眼脹痛、頭痛」,是四者中唯一會痛者;②「老年性白內障」是水晶體混濁,為「無痛」性漸進視力模糊、畏光、單眼複視;③「老花眼(presbyopia)」是水晶體調節力隨年齡退化、近距離對焦困難,「無痛」,配老花鏡即可矯正;④「黃斑部病變(macular degeneration)」是視網膜黃斑部退化造成中央視力扭曲、模糊或暗點,亦為「無痛」。故會出現眼睛痛的是青光眼,選B。臨床提醒:中老年人「眼痛合併視力模糊」要優先警覺青光眼急性發作。","options":{"A":"老年性白內障為無痛性漸進視力模糊,不會眼睛痛,錯誤。","B":"正解。青光眼眼壓升高會造成眼睛脹痛,是四者中唯一會痛者。","C":"老花眼為調節力退化、近距對焦困難,無痛,錯誤。","D":"黃斑部病變為無痛性中央視力扭曲模糊,不會眼痛,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Glaucoma PPP"]}},"115030-N3-15":{"quick":"Timolol是「β腎上腺素阻斷劑」(減少房水生成),不是縮瞳劑,故A錯誤。","detail":{"background":"Timolol是治療青光眼最常用的「β腎上腺素阻斷劑(β-blocker)」眼藥水,作用機轉為抑制睫狀體上皮、「減少房水(眼球內房水量)的生成」而降低眼壓(B正確),「並非縮瞳劑」——縮瞳劑(瞳孔縮小)是膽鹼性藥pilocarpine的作用,故A「是一種縮瞳劑」為錯誤敘述。Timolol為非選擇性β阻斷劑,雖為眼局部給藥,仍會經鼻淚管與結膜吸收進入全身循環:阻斷β2受體可誘發「支氣管痙攣」,故「氣喘、慢性阻塞性肺病病人禁用」(C正確);阻斷β1受體會「心搏過緩、低血壓、房室阻滯」,故給藥前須評估心跳(D正確)。護理:點藥後壓迫內眥淚囊(鼻淚管)1~2分鐘並閉眼,可減少全身性吸收與副作用。","options":{"A":"正解(錯誤敘述)。Timolol是β阻斷劑,減少房水生成,非縮瞳劑。","B":"Timolol減少房水(房水量)生成而降眼壓,正確。","C":"非選擇性β阻斷劑可誘發支氣管痙攣,氣喘病人禁用,正確。","D":"會引起心搏過緩,給藥前須評估心跳,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Glaucoma PPP"]}},"101110-N3-54":{"quick":"白內障術後關鍵是「避免眼壓上升」,故勿揉眼、勿咳嗽、勿提重物;深呼吸不會增加眼壓,B「勿深呼吸」錯誤。","detail":{"background":"白內障(cataract)是水晶體混濁造成的無痛性漸進視力模糊,治療以手術摘除混濁水晶體並植入人工水晶體(intraocular lens, IOL)為主。術後護理核心是「預防眼壓上升、保護傷口、預防感染」:應避免一切會使眼壓或頭部靜脈壓驟升的動作——「揉眼、用力眨眼、彎腰低頭、用力咳嗽或打噴嚏、用力解便(預防便秘)、提重物、用力擤鼻涕、突然彎腰撿物」均應避免;睡覺臥向「健側」、戴護目罩防碰撞。然而「深呼吸」是平靜、緩和的呼吸動作,「不會」使眼壓上升,反而有助放鬆,故B「勿深呼吸」為錯誤的衛教(咳嗽才會瞬間升高胸腔與眼壓,深呼吸不會)。其餘A勿揉眼、C勿咳嗽、D勿提重物皆為正確的術後保護措施。","options":{"A":"揉眼會壓迫傷口、增加感染與傷口裂開風險,應避免,正確指導。","B":"正解(錯誤指導)。深呼吸緩和不會升高眼壓,不需禁止;會升高眼壓的是用力咳嗽。","C":"用力咳嗽瞬間升高胸腔與眼壓,應避免,正確指導。","D":"提重物會使眼壓上升,應避免,正確指導。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"102030-N3-24":{"quick":"白內障是無痛性水晶體混濁,典型為視力減退、畏光、瞳孔變白,「眼痛」(A)非其表徵,故錯誤。","detail":{"background":"白內障是水晶體(lens)蛋白質變性混濁,使光線無法清晰聚焦於視網膜,屬「無痛性、漸進性」視力障礙。典型臨床表徵:①「視力逐漸減退、模糊」如隔毛玻璃看物;②「畏光、眩光」(混濁水晶體散射光線,尤其夜間對向車燈刺眼);③「單眼複視」(水晶體不均勻混濁);④辨色力下降、色彩變暗黃;⑤晚期「瞳孔由黑色變灰白色(乳白色)」(成熟白內障)。白內障「不會疼痛」——這是它與青光眼最重要的鑑別點(青光眼會眼脹痛),故A「眼痛」為白內障的錯誤(非典型)表徵。若白內障病人出現眼痛,要警覺合併青光眼或其他併發症。","options":{"A":"正解(錯誤敘述)。白內障是無痛性疾病,不會眼痛;眼痛是青光眼的表現。","B":"水晶體混濁使光線無法聚焦,視力逐漸減退,正確。","C":"混濁水晶體散射光線造成畏光、眩光,正確。","D":"成熟白內障瞳孔呈灰白(乳白)色,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"103100-N3-22":{"quick":"白內障為無痛性視力障礙,表徵含視力模糊、複視、辨色差;「眼睛疼痛」(D)非白內障表現,故錯誤。","detail":{"background":"白內障的臨床表徵均源於「水晶體混濁阻擋與散射光線」:①「視力模糊」(漸進無痛);②「單眼複視或多視」(混濁區折射不均);③「辨色能力變差」(色彩變暗、偏黃);④畏光眩光、夜間視力差;⑤晚期瞳孔變灰白。整個過程「無痛」,故D「眼睛疼痛」為錯誤敘述。鑑別重點:白內障(無痛、漸進、瞳孔變白)vs 青光眼(眼脹痛、看燈光有光暈、視野缺損)。臨床上常見老年人同時有白內障與青光眼,若白內障病人主訴眼痛,須評估眼壓排除青光眼。","options":{"A":"水晶體混濁使視力模糊,正確。","B":"混濁區折射不均造成單眼複視,正確。","C":"白內障使辨色力下降、色彩偏暗黃,正確。","D":"正解(錯誤敘述)。白內障無痛,不會眼睛疼痛。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"104030-N3-22":{"quick":"白內障術後須避免眼壓上升,應臥向「健側」;C「躺向患側」會壓迫術眼,錯誤。","detail":{"background":"白內障摘除併人工水晶體植入術後護理重點同樣是「避免眼壓上升與保護術眼」:①「預防便秘」(用力解便會升眼壓,鼓勵高纖飲食、軟便劑)(A正確);②「預防咳嗽」(用力咳嗽升眼壓)(B正確);③睡覺應臥向「健側(非手術側)」、戴護目罩,避免「躺向患側(術側)」壓迫術眼造成傷口受壓、人工水晶體移位或眼壓上升(C「躺向患側」為錯誤);④「避免彎腰、低頭」撿物(頭低於心臟使眼壓上升)(D正確);⑤避免揉眼、提重物、用力擤鼻涕。出現眼痛、視力驟降、大量分泌物應立即回診。故C為錯誤指導。","options":{"A":"預防便秘避免用力解便升高眼壓,正確指導。","B":"預防咳嗽避免瞬間升高眼壓,正確指導。","C":"正解(錯誤指導)。應臥向健側,躺向患側會壓迫術眼。","D":"避免彎腰低頭使頭低於心臟而升眼壓,正確指導。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"106110-N3-21":{"quick":"白內障為無痛性,表徵含視力減退、畏光、單眼複視;「眼睛疼痛」(B)非白內障表現,故錯誤。","detail":{"background":"再次強調白內障的核心特徵是「無痛」。其症狀包括:①「視力減退、模糊」(A正確);②「畏光、眩光」尤其在強光或夜間對向燈光下視力更差(C正確);③「單眼複視」(混濁水晶體使光線折射不均,遮住另一眼仍有雙影,與雙眼複視的神經肌肉病因不同)(D正確);④辨色力下降、瞳孔變灰白。B「眼睛疼痛」並非白內障表徵,白內障不痛是它與青光眼最關鍵的鑑別。故B為錯誤敘述。臨床護理:白內障早期可調整照明、配鏡改善,成熟影響生活時手術摘除。","options":{"A":"水晶體混濁使視力逐漸減退,正確。","B":"正解(錯誤敘述)。白內障無痛,眼睛疼痛非其表現。","C":"混濁水晶體散射光線造成畏光、眩光,正確。","D":"混濁折射不均造成單眼複視,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"107110-N3-25":{"quick":"白內障術後防眼壓上升:避免睡向手術側可防壓迫術眼,故B正確;彎腰、俯臥、用力擤鼻涕都會升眼壓。","detail":{"background":"白內障術後「預防眼壓上升」的護理指導,正確的是「避免睡向手術側(臥健側)」以免壓迫術眼、傷口受壓或人工水晶體移位(B正確)。其餘均為「會」升高眼壓的危險動作,屬錯誤指導:A「彎腰撿物」使頭低於心臟、靜脈回流增加而升眼壓;C「俯臥睡姿」會直接壓迫術眼並升眼壓;D「術後第二天咳嗽或用力擤鼻涕」會瞬間升高胸腔與眼壓,早期應避免。整體原則:術後早期避免彎腰低頭、用力、提重物、揉眼、俯臥壓眼,維持頭部抬高、臥健側、戴護目罩。","options":{"A":"彎腰撿物使頭低於心臟、升高眼壓,應避免,錯誤指導。","B":"正解。避免睡向手術側可防壓迫術眼,正確的防眼壓上升措施。","C":"俯臥會直接壓迫術眼並升眼壓,應避免,錯誤指導。","D":"用力咳嗽或擤鼻涕瞬間升高眼壓,術後早期應避免,錯誤指導。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"108110-N3-19":{"quick":"人工水晶體在白內障手術「當下同時」植入,不需等一個月,故D錯誤。","detail":{"background":"白內障治療相關概念:A正確——目前「沒有有效溶解或逆轉白內障的藥物」,藥物無法使混濁水晶體變透明,根本治療是手術。B正確——「囊內摘除術(intracapsular cataract extraction, ICCE)」連同水晶體囊袋整個取出,因破壞玻璃體支撐,「較易併發網膜剝離與玻璃體脫出」,現已少用。C正確——「晶體乳化術(phacoemulsification)」是現代主流,以超音波震碎水晶體核後吸出,屬「囊外摘除術(ECCE)」的一種(保留後囊袋)。D「錯誤」——現代白內障手術是在「同一次手術中、移除混濁水晶體後『立即』於保留的囊袋內植入人工水晶體(IOL)」,並非等一個月後再植入。故D為錯誤敘述。","options":{"A":"目前無有效藥物可治療白內障,根本治療為手術,正確。","B":"囊內摘除術破壞玻璃體支撐,較易造成網膜剝離,正確。","C":"晶體乳化法保留後囊袋,屬囊外摘除術的一種,正確。","D":"正解(錯誤敘述)。人工水晶體於手術當下同時植入,非術後一個月。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"109110-N3-25":{"quick":"白內障好發於「老年人」(老年性白內障),非高度近視者;D「95%發生於高度近視」錯誤。","detail":{"background":"白內障的成因與特性:A正確——本質是「水晶體混濁」。B正確——成熟白內障「瞳孔呈乳白色」。C正確——老年性白內障多「兩側」發生(可能一眼先較嚴重)。D「錯誤」——白內障最常見為「老年性白內障(senile cataract)」,與年齡老化相關(50歲以上盛行率明顯上升),並非「95%發生於高度近視者」;高度近視、糖尿病、長期使用類固醇、紫外線曝曬、外傷、先天性等只是「危險因子或其他成因」,絕大多數病例仍是年齡相關。故D為錯誤敘述。","options":{"A":"白內障即水晶體發生混濁,正確。","B":"成熟白內障瞳孔呈乳白色,正確。","C":"老年性白內障好發於兩側,正確。","D":"正解(錯誤敘述)。白內障主因是老化(老年性),非95%發生於高度近視。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"110030-N3-22":{"quick":"防人工水晶體移位須避免眼壓上升:不可提重物、彎腰、咳嗽;但「深呼吸」不會升眼壓,故D「不可深呼吸」錯誤。","detail":{"background":"白內障術後為避免「植入的人工水晶體移位」與傷口裂開,須避免一切使眼壓或頭部靜脈壓驟升的動作:A「不可提重物」、B「不可彎腰(低頭)」、C「不可用力咳嗽」均為正確指導。D「不可深呼吸」為「錯誤」——深呼吸是緩和、有助放鬆的動作,「不會」升高眼壓,不需禁止;真正會瞬間升高眼壓的是「用力咳嗽、用力解便、用力擤鼻涕、嘔吐、彎腰低頭、提重物」。故D為錯誤指導。護理可教導病人若想咳嗽時張口微咳、避免閉氣用力(Valsalva)。","options":{"A":"提重物會升高眼壓,可能使人工水晶體移位,不可,正確。","B":"彎腰低頭使眼壓上升,不可,正確。","C":"用力咳嗽瞬間升高眼壓,不可,正確。","D":"正解(錯誤指導)。深呼吸不會升高眼壓,不需禁止。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"110110-N3-22":{"quick":"白內障無痛,表徵為畏光、視力減退、瞳孔變白;「眼痛」(C)非白內障表現,故錯誤。","detail":{"background":"白內障症狀再複習:A「畏光」(混濁水晶體散射光,強光下更模糊)正確;B「視力減退」(漸進無痛模糊)正確;D「瞳孔變為白色」(成熟白內障)正確;C「眼痛」「錯誤」——白內障是無痛性疾病。考試反覆以「眼痛」當白內障的錯誤選項,因為「眼痛」是青光眼(眼壓升高)或角膜炎、虹彩炎的表現,而非水晶體混濁所致。故C為錯誤敘述。臨床鑑別口訣:白內障「不痛、瞳孔變白、漸進模糊」;青光眼「會痛、看光有暈、視野缺損」。","options":{"A":"混濁水晶體散射光線造成畏光,正確。","B":"白內障使視力逐漸減退,正確。","C":"正解(錯誤敘述)。白內障無痛,眼痛非其表現。","D":"成熟白內障瞳孔變為白色,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"111110-N3-22":{"quick":"晶體乳化術不需等白內障「成熟」才做,反而成熟過硬反增手術難度,故A錯誤。","detail":{"background":"晶體乳化術(phacoemulsification)是現代白內障手術主流:B正確——以「超音波探頭將水晶體核震碎、乳化後吸出」;C正確——切口小(約0.3公分/3 mm以下),傷口小、免縫線或少縫線、恢復快;D正確——術中「同時植入摺疊式人工水晶體」於保留的後囊袋內。A「錯誤」——現代手術「不需等白內障成熟」才執行,反而是「在影響日常生活、視力下降至一定程度即可手術」;若等到「過熟(hypermature)」水晶體核過硬、囊袋脆弱,反而增加超音波能量需求與併發症(如囊袋破裂、後囊混濁、晶體脫位)風險。故A為錯誤敘述。","options":{"A":"正解(錯誤敘述)。晶體乳化術不需等成熟,過熟反增手術難度與併發症。","B":"以超音波震碎晶體核後乳化吸出,正確。","C":"切口可縮小至約0.3公分,傷口小恢復快,正確。","D":"術中同時植入人工水晶體,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"112030-N3-21":{"quick":"白內障是無痛、無紅的水晶體混濁,正確症狀為「視力模糊(3)+瞳孔變灰白(4)」,故選D(34)。","detail":{"background":"白內障四個敘述判斷:「1眼睛痛」錯(白內障無痛);「2眼睛紅」錯(白內障不會眼紅充血,眼紅是結膜炎、虹彩炎、急性青光眼的表現);「3視力模糊」對(漸進無痛模糊為核心症狀);「4瞳孔變灰或白色」對(成熟白內障的特徵)。故正確症狀組合為3+4,選D。本題再次強化白內障「無痛、無紅、漸進視力模糊、瞳孔變白」的形象,與「會痛會紅」的青光眼急性發作、虹彩炎做區別。","options":{"A":"12(眼睛痛+眼睛紅)皆非白內障症狀,錯誤。","B":"14含眼睛痛,錯誤。","C":"23含眼睛紅,錯誤。","D":"正解。白內障正確症狀為視力模糊(3)與瞳孔變灰白(4)。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"113030-N3-14":{"quick":"白內障最有效的治療是「手術置換水晶體」,點散瞳劑/熱敷/老花鏡皆無效,故選A。","detail":{"background":"白內障是水晶體蛋白質不可逆混濁,「沒有藥物或保守方法能使其變透明」,唯一有效的根本治療是「手術摘除混濁水晶體並植入人工水晶體(IOL)」,選A。其餘皆無效:B「點散瞳劑」只是暫時放大瞳孔讓光線從較透明的周邊水晶體進入,屬權宜措施且非治療;C「眼睛熱敷」對白內障無治療作用;D「配戴老花眼鏡」矯正的是老花(調節力退化),對水晶體混濁無幫助。手術時機是當視力下降影響日常生活(如閱讀、開車、辨識人臉)時即可考慮,現代晶體乳化術安全有效、恢復快。","options":{"A":"正解。手術置換水晶體是白內障唯一有效的根本治療。","B":"散瞳劑只是暫時權宜,非治療白內障,錯誤。","C":"熱敷對白內障無治療作用,錯誤。","D":"老花眼鏡矯正老花,對水晶體混濁無幫助,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"113100-N3-13":{"quick":"白內障術後須避免升眼壓,正確指導為「預防便秘(3)+避免提重物(4)」,故選D(34)。","detail":{"background":"白內障囊外摘除術(ECCE)後護理指導,判斷四項:「1用力咳嗽」錯(瞬間升眼壓,應避免、改張口微咳);「2彎腰洗頭」錯(頭低於心臟升眼壓,應避免、宜後仰式洗頭或請人代洗);「3預防便秘」對(避免用力解便升眼壓,多纖維、必要時軟便劑);「4避免提重物」對(提重物升眼壓)。故最適當的組合為3+4,選D。整體原則:術後避免一切使眼壓上升的動作(用力、彎腰、咳嗽、提重物、揉眼、俯臥壓眼),保護傷口、預防感染與人工水晶體移位。","options":{"A":"12(用力咳嗽+彎腰洗頭)皆會升眼壓,錯誤。","B":"13含用力咳嗽,錯誤。","C":"24含彎腰洗頭,錯誤。","D":"正解。預防便秘(3)與避免提重物(4)為正確的防眼壓上升指導。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"114100-N3-14":{"quick":"白內障的病變構造是「水晶體(lens)混濁」,故選B。","detail":{"background":"白內障(cataract)的定義即「水晶體(crystalline lens)發生混濁」,使光線無法清晰穿透聚焦於視網膜,造成無痛漸進的視力模糊,故主要病變構造是「水晶體」,選B。區辨其他構造:A「角膜(cornea)」混濁是角膜白斑、角膜炎、角膜失養症;C「鞏膜(sclera)」是眼球外層白色保護層,病變如鞏膜炎;D「視神經(optic nerve)」受損見於青光眼、視神經炎。記憶:白內障=水晶體;青光眼=視神經(眼壓);黃斑部病變=視網膜黃斑。","options":{"A":"角膜混濁是角膜白斑/角膜炎,非白內障,錯誤。","B":"正解。白內障是水晶體發生混濁。","C":"鞏膜是眼球外層白色保護層,非白內障病變部位,錯誤。","D":"視神經受損見於青光眼,非白內障,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Cataract PPP"]}},"101110-N3-51":{"quick":"視網膜剝離典型「無痛」前驅症狀為飛蚊、閃光幻視與視野缺損,故選C「閃光幻視」。","detail":{"background":"視網膜剝離(retinal detachment)是視網膜的「感覺神經層(neurosensory retina)」與底下供應營養的「色素上皮層(retinal pigment epithelium, RPE)」分離,使感覺層失去脈絡膜的血液與營養供應而功能喪失,屬眼科急症,延誤可永久失明。最常見為「裂孔性(rhegmatogenous)」,好發於高度近視、老化、外傷、白內障術後。典型前驅症狀(無痛):①「飛蚊增加」(眼前突然大量黑點、漂浮物);②「閃光幻視(photopsia/light flashes)」(玻璃體牽扯視網膜產生閃電般光感);③隨剝離擴大出現「視野缺損、黑幕/窗簾遮擋感」由周邊向中央侵犯;④若波及黃斑部則中央視力驟降。整個過程「無痛」(故「眼睛劇痛」不是其前驅症狀,劇痛是青光眼)。虹輪視覺與畏光分別為青光眼與角膜病變表現。故選C閃光幻視。","options":{"A":"虹輪視覺(看燈光有光暈)是青光眼/角膜水腫表現,非視網膜剝離,錯誤。","B":"畏光主要見於角膜炎、虹彩炎,非視網膜剝離前驅症狀,錯誤。","C":"正解。閃光幻視(光感)是視網膜剝離典型前驅症狀,合併飛蚊與視野缺損。","D":"視網膜剝離為無痛性,不會眼睛劇痛(劇痛是急性青光眼),錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Retinal Detachment PPP"]}},"102110-N3-12":{"quick":"視網膜剝離為無痛性,不需用止痛劑;處置應臥床、限制頭眼活動、雙眼遮蓋,故B「使用止痛劑」錯誤。","detail":{"background":"視網膜剝離一旦發生,立即處理目標是「避免剝離範圍擴大、保護黃斑、安排盡速手術」:①「立刻臥床休息」並依剝離位置採適當姿勢(使剝離處朝下、利用重力使視網膜貼回)(A正確);②「雙眼蓋上眼罩」(遮蓋雙眼以限制眼球轉動,因兩眼會同向運動,只遮患眼仍會隨健眼轉動)(C正確);③「勿隨意移動頭部」、避免用力、彎腰、突然動作,減少玻璃體牽扯(D正確)。B「使用止痛劑減緩眼睛疼痛」「錯誤」——視網膜剝離是「無痛」性疾病,病人不會眼痛,根本不需要止痛劑;若有眼痛要重新評估是否合併其他問題。故B為錯誤處置。","options":{"A":"立刻臥床休息可減少剝離擴大,正確。","B":"正解(錯誤敘述)。視網膜剝離無痛,不需止痛劑。","C":"雙眼遮蓋限制眼球轉動(雙眼同向運動),正確。","D":"勿移動頭部減少玻璃體牽扯,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Retinal Detachment PPP"]}},"104030-N3-24":{"quick":"視網膜剝離術後視力需穩定後(約術後數月)才驗配新眼鏡;B「1個月內更換眼鏡」過早,錯誤。","detail":{"background":"視網膜剝離手術(鞏膜扣壓術scleral buckling、玻璃體切除術vitrectomy、氣體/矽油填充)後出院護理:A正確——需「定期複診直到視力穩定」。C正確——「白天外出戴保護性眼鏡、就寢戴護目罩」避免碰撞震動。D正確——「術後6個月內避免劇烈活動」(跑跳、提重物、碰撞、潛水)以免視網膜再度剝離。B「錯誤」——術後屈光度數(近視/散光)會因鞏膜扣壓改變眼軸或氣體填充而「持續變化」,須等「視力與屈光度數穩定後(通常數月)」再驗配新眼鏡,「1個月內」更換過早,屆時度數仍在變動、配了也不準。故B為錯誤指導。","options":{"A":"需定期複診直到視力穩定,正確。","B":"正解(錯誤敘述)。屈光度數需穩定數月後才驗配新眼鏡,1個月內過早。","C":"戴護目罩與保護性眼鏡避免碰撞,正確。","D":"術後6個月內避免劇烈活動防再剝離,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Retinal Detachment PPP"]}},"105030-N3-24":{"quick":"視網膜剝離是感覺層與色素上皮層分離;剝離後感覺層仍可由「脈絡膜」隔著色素層供應部分營養之說不符——B描述「無法得到鞏膜營養」為錯誤敘述。","detail":{"background":"視網膜剝離的病理:視網膜由外而內可分「色素上皮層(RPE)」與「感覺神經層」,A正確——剝離即「最外層色素上皮層與內側感覺層分開」。C正確——感覺層脫離後失去脈絡膜經色素上皮供應的氧氣與養分,光受器缺血缺氧,「失去感光作用」造成視野缺損。D正確——「高度近視」眼軸拉長、視網膜變薄易裂孔,是重要危險因子。B「視網膜無法得到鞏膜的營養供應」為「錯誤」——視網膜外層的營養來源是「脈絡膜(choroid)」(富含血管,經色素上皮供應感覺層),而「非鞏膜」;鞏膜只是眼球最外的白色保護結締組織層、不負責供應視網膜營養,此敘述把營養來源張冠李戴,故為錯誤(視網膜內層另由視網膜中央動脈供應)。","options":{"A":"剝離是色素上皮層與感覺層分開,正確。","B":"正解(錯誤敘述)。視網膜外層營養來自脈絡膜,非鞏膜;鞏膜只是保護層。","C":"感覺層脫離後缺血缺氧、失去感光作用,正確。","D":"高度近視使視網膜變薄易裂孔剝離,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Retinal Detachment PPP"]}},"107030-N3-21":{"quick":"視網膜剝離應「立刻臥床(平躺)」而非「坐下」;坐姿利用重力可能使剝離擴大,故A錯誤。","detail":{"background":"視網膜剝離的立即處理原則是「減少活動、限制頭眼運動、利用體位幫助視網膜貼回」:B「雙眼蓋上眼罩」(限制眼球轉動)正確;C「勿隨意移動頭部」(減少玻璃體牽扯)正確;D「禁止用力」(避免咳嗽、彎腰、提重物使剝離加重)正確。A「坐下休息」為「錯誤」——應「立刻臥床(平躺)」並依剝離部位採適當臥位(使裂孔/剝離處位於最低點,利用重力使視網膜下液移動、視網膜貼回);「坐著」會使下方視網膜在重力下更易牽扯擴大剝離。故A為錯誤處置。臨床須儘速轉眼科手術。","options":{"A":"正解(錯誤敘述)。應立刻臥床而非坐下,坐姿可能使剝離擴大。","B":"雙眼遮蓋限制眼球轉動,正確。","C":"勿移動頭部減少玻璃體牽扯,正確。","D":"禁止用力避免剝離加重,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Retinal Detachment PPP"]}},"108020-N3-22":{"quick":"視網膜剝離術後敷料「有滲出液」屬異常(警示出血/感染),應通報,故B「為正常現象」錯誤。","detail":{"background":"視網膜剝離術後護理:A正確——若玻璃體腔注入氣體並需頂壓特定部位,常採「俯臥(趴姿)」數天讓氣泡頂住剝離處(視填充位置而定姿勢);C正確——「術後2~3週內避免閱讀」等需眼球快速轉動的活動,以利視網膜貼合;D正確——屈光度數變化大,「等3個月度數穩定後再更換眼鏡」。B「覆眼敷料有滲出液為正常現象」為「錯誤」——術後敷料若出現「滲出液、滲血、大量分泌物」,代表可能傷口出血、感染或裂開,屬「異常」應立即通報醫師,不可視為正常。正常情況敷料應乾淨,僅少量血清樣滲液且不增加。故B為錯誤敘述。","options":{"A":"氣體填充術後依位置採俯臥讓氣泡頂壓剝離處,正確。","B":"正解(錯誤敘述)。敷料有滲出液屬異常(出血/感染),應通報,非正常現象。","C":"術後2~3週避免閱讀減少眼球快速轉動,正確。","D":"屈光度數穩定(約3個月)後再換眼鏡,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Retinal Detachment PPP"]}},"110110-N3-24":{"quick":"玻璃體腔注入氣體後應採「俯臥(趴姿)」使氣泡頂壓剝離處,故C「採仰臥」錯誤。","detail":{"background":"視網膜剝離術後護理:A正確——「蓋敷料及眼罩並觀察有無滲出液(異常徵象)」。B正確——「術後一週內避免眼球快速運動」(避免閱讀、看快速移動物)以利貼合。D正確——若有「噁心嘔吐」應處理(止吐、禁食至無不適),因嘔吐用力會升眼壓、震動眼球不利傷口。C「玻璃體腔注入氣體時術後應採仰臥」為「錯誤」——氣體(或矽油)填充後,氣泡會「向上浮」,故須採「俯臥(臉朝下)或依裂孔位置的特定頭位」,讓氣泡頂壓在剝離/裂孔處使視網膜貼回;若「仰臥(臉朝上)」氣泡會浮向後方無法頂壓裂孔,且氣泡頂到水晶體增加白內障與眼壓風險。故C為錯誤敘述。","options":{"A":"蓋敷料眼罩並觀察滲出液,正確。","B":"術後一週內避免眼球快速運動以利貼合,正確。","C":"正解(錯誤敘述)。氣體填充後應採俯臥使氣泡頂壓剝離處,非仰臥。","D":"噁心嘔吐應處理並禁食至無不適,避免升眼壓震動,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Retinal Detachment PPP"]}},"112030-N3-22":{"quick":"高度近視突發飛蚊+視野缺損=視網膜剝離,應臥床制動;D「立即冰敷」無助且不適宜。","detail":{"background":"病人「高度近視、突然眼前一群浮動黑點(飛蚊)、部分視野缺失」是「視網膜剝離」的典型表現(高度近視為主要危險因子,飛蚊與視野缺損是核心症狀)。立即且適宜的處置是「制動、限制頭眼活動、避免用力、儘速就醫手術」:A「立刻臥床」適宜;B「避免用力」適宜;C「雙眼覆蓋眼罩」(限制眼球同向轉動)適宜。D「立即冰敷」「不適宜」——視網膜剝離是「視網膜結構性分離」,並非外傷腫脹或發炎,冰敷對使視網膜貼回毫無幫助,且不必要的局部處置可能延誤就醫;此題問「不適宜」者,故選D。正確做法是儘速送眼科以雷射或手術修復。","options":{"A":"立刻臥床制動,適宜。","B":"避免用力防剝離擴大,適宜。","C":"雙眼覆蓋限制眼球轉動,適宜。","D":"正解(不適宜)。冰敷對視網膜貼回無幫助,且可能延誤就醫。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Retinal Detachment PPP"]}},"112180-N3-14":{"quick":"視網膜剝離的主要機轉是感覺層與色素上皮層分離、使視網膜「喪失營養供應」,故選A。","detail":{"background":"視網膜剝離最主要的疾病機轉是「視網膜感覺神經層與底下的色素上皮層(及脈絡膜)分離」,使感覺層的光受器「失去脈絡膜經色素上皮供應的氧氣與營養」而缺血、喪失感光功能,故選A「視網膜喪失營養供應」。區辨其他選項:B「水晶體混濁」是白內障的機轉;C「眼內壓上升」是青光眼的機轉;D「眼角膜受損」是角膜炎/角膜破皮。記憶眼科四大病的核心機轉:白內障=水晶體混濁、青光眼=眼壓升高傷視神經、視網膜剝離=視網膜分離失養、黃斑部病變=黃斑退化。","options":{"A":"正解。視網膜剝離使感覺層脫離脈絡膜供養,喪失營養供應。","B":"水晶體混濁是白內障機轉,錯誤。","C":"眼內壓上升是青光眼機轉,錯誤。","D":"眼角膜受損是角膜病變,非視網膜剝離,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Retinal Detachment PPP"]}},"113100-N3-15":{"quick":"視網膜剝離須「雙眼」蓋眼罩限制眼球同向轉動;B「單眼蓋眼罩」錯誤。","detail":{"background":"視網膜剝離緊急處理:A「立刻臥床」正確(依剝離位置採適當臥位,減少擴大);C「勿隨意移動頭部」正確(減少玻璃體牽扯);D「減少焦慮」正確(安撫病人、避免緊張用力,情緒激動會使活動增加)。B「單眼蓋上眼罩」為「錯誤」——應「雙眼」一起遮蓋,因為「雙眼是同向協同運動(conjugate movement)」,只遮患眼時,健眼一轉動、患眼也會跟著轉,無法達到制動目的;遮蓋雙眼才能真正限制患眼轉動、減少視網膜牽扯。故B為錯誤敘述。臨床須儘速安排手術。","options":{"A":"立刻臥床減少剝離擴大,正確。","B":"正解(錯誤敘述)。應雙眼遮蓋,因雙眼同向運動,單遮患眼無法制動。","C":"勿移動頭部減少玻璃體牽扯,正確。","D":"減少焦慮避免緊張用力,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Retinal Detachment PPP"]}},"114030-N3-14":{"quick":"供應眼球與視網膜外層血液營養、且富含血管的構造是「脈絡膜」,故選C。","detail":{"background":"本題考眼球壁三層構造的功能。眼球壁由外而內為:①「外層纖維膜」=「鞏膜(sclera,白色保護層)」+前方透明的「角膜(cornea,屈光)」;②「中層血管膜(葡萄膜uvea)」=「脈絡膜(choroid)」+「睫狀體(ciliary body)」+「虹膜(iris)」;③「內層神經膜」=視網膜(retina)。其中「脈絡膜」位於鞏膜與視網膜之間,「富含血管與色素」,主要功能是「供應視網膜外層(色素上皮與光受器)與眼球的血液、氧氣與營養」,並吸收雜散光,故選C。區辨:A鞏膜=保護支撐(乏血管);B角膜=屈光透明(無血管);D睫狀體=分泌房水、調節水晶體屈光。故供應眼球與視網膜血液營養的是脈絡膜。","options":{"A":"鞏膜是白色保護層、乏血管,非供應視網膜營養,錯誤。","B":"角膜為透明屈光構造、無血管,錯誤。","C":"正解。脈絡膜富含血管,供應眼球與視網膜外層血液營養。","D":"睫狀體主要分泌房水與調節屈光,非主要供血構造,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","American Academy of Ophthalmology (AAO) Retinal Detachment PPP"]}},"101110-N3-52":{"quick":"慢性中耳炎合併鼓膜穿孔/聽小骨破壞,最適合的外科療法是「鼓室成形術(修補鼓膜與重建聽小骨)」,故選A。","detail":{"background":"慢性中耳炎(chronic otitis media)常因反覆感染造成「鼓膜穿孔、聽小骨(錘骨/砧骨/鐙骨)破壞或膽脂瘤」,導致傳導性聽力喪失與耳漏。最適合的外科治療是「鼓室成形術(tympanoplasty)」——修補穿孔的鼓膜、重建中耳聽小骨鏈,以恢復聲音傳導與聽力,並清除病灶,選A。區辨其他術式:B「耳蝸植入術(cochlear implant)」用於「重度感覺神經性聽力喪失」(耳蝸毛細胞失能),非慢性中耳炎;C「鐙骨切除術(stapedectomy)」用於「耳硬化症(otosclerosis)」鐙骨固定;D「前庭神經切斷」用於頑固性「眩暈」(如美尼爾氏症)。故慢性中耳炎首選鼓室成形術。","options":{"A":"正解。鼓室成形術修補鼓膜、重建聽小骨,是慢性中耳炎的適當外科療法。","B":"耳蝸植入術用於重度感覺神經性聽損,非慢性中耳炎,錯誤。","C":"鐙骨切除術用於耳硬化症,非慢性中耳炎,錯誤。","D":"前庭神經切斷用於頑固性眩暈,非中耳炎,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Otitis Media Guideline"]}},"103100-N3-8":{"quick":"乳突切除術後因傷口腫脹與敷料,聽力暫時下降,溝通應「放慢、清楚」而非「高聲說話」,故C錯誤。","detail":{"background":"乳突切除術(mastoidectomy)清除乳突氣房內的慢性感染或膽脂瘤。術後第二天護理:A正確——因手術區腫脹、敷料填塞與中耳積液,「術側聽覺會暫時下降」(通常隨復原改善)。B正確——「給予抗生素預防感染」。D正確——教導病人「打噴嚏、咳嗽時張口」,避免閉口用力使壓力經耳咽管傳至中耳、影響傷口與移植物。C「高聲與病人說話,較能聽清楚」為「錯誤」——病人是「術側」傳導暫時受影響,對「健側」聽力正常,高聲喊叫不但無助、反而刺耳不適;正確做法是「站在健側、面對病人、放慢速度、咬字清楚、必要時輔以手勢或書寫」。故C為錯誤敘述。","options":{"A":"術區腫脹敷料填塞使術側聽覺暫時下降,正確。","B":"給予抗生素預防感染,正確。","C":"正解(錯誤敘述)。應站健側、放慢清楚說話,高聲喊叫無助且刺耳。","D":"打噴嚏咳嗽張口避免壓力經耳咽管傷及術區,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Otitis Media Guideline"]}},"104100-N3-22":{"quick":"急性中耳炎抗生素療程應「足量足療程約10~14天」,非僅3~5天(過短易復發、抗藥),故A錯誤。","detail":{"background":"急性中耳炎(acute otitis media)多由肺炎鏈球菌、流感嗜血桿菌等經「耳咽管」上行感染,好發於幼兒(耳咽管短平)。醫療處置:B正確——「解熱鎮痛劑」緩解發燒與耳痛;C正確——鼓膜膨脹、化膿張力大或久不癒時行「鼓膜切開術(myringotomy)」引流減壓、緩解疼痛;D正確——若「鼓膜已自然破裂」流膿,須清潔外耳道並使用抗生素「點耳液」局部治療。A「抗生素使用持續3~5天」為「錯誤」——急性中耳炎的抗生素(如amoxicillin)療程一般需「10~14天(足量足療程)」,療程太短(3~5天)會使感染未完全清除、容易復發並誘導抗藥性。故A為錯誤敘述。","options":{"A":"正解(錯誤敘述)。抗生素療程應約10~14天足療程,非3~5天。","B":"給予解熱鎮痛劑緩解發燒耳痛,正確。","C":"鼓膜膨脹張力大時行鼓膜切開術引流減壓,正確。","D":"鼓膜已破裂應清潔並使用抗生素點耳液,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Otitis Media Guideline"]}},"105090-N3-20":{"quick":"急性中耳炎抗生素療程約10~14天,非1週;故C「療程為1週」錯誤。","detail":{"background":"中耳炎相關概念:A正確——病原體可為「細菌(肺炎鏈球菌、流感嗜血桿菌、moraxella)或病毒」。B正確——病原體多由「耳咽管(eustachian tube)」自鼻咽部上行進入中耳(尤其幼兒耳咽管短、平、直)。D正確——「改良式根除性乳突切除術(modified radical mastoidectomy)」會「保留鼓膜及部分聽小骨」以保留部分聽力(相對於傳統根除性會犧牲較多結構)。C「急性中耳炎抗生素療程為1週」為「錯誤」——標準療程約「10~14天」,1週(7天)通常不足,易致復發與抗藥。故C為錯誤敘述。","options":{"A":"中耳炎病原可為細菌或病毒,正確。","B":"病原體可從耳咽管上行進入中耳,正確。","C":"正解(錯誤敘述)。急性中耳炎抗生素療程約10~14天,非1週。","D":"改良式根除性乳突切除術保留鼓膜及部分聽小骨,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Otitis Media Guideline"]}},"106030-N3-22":{"quick":"急性中耳炎主要經「耳咽管」上行感染,亦可經外耳道(鼓膜破損)或血行;「淋巴感染」非主要途徑,故D錯誤。","detail":{"background":"急性中耳炎的感染途徑:A正確——「經耳咽管」是「最主要、最常見」途徑(上呼吸道感染後病原由鼻咽經耳咽管上行至中耳,幼兒因耳咽管短平直特別易發)。B正確——「經外耳道」(當鼓膜有穿孔或破損時,外耳道病原可進入中耳)。C正確——「經血行(血源性)」感染(全身感染時病原經血流到達中耳,較少見)。D「經淋巴感染」為「錯誤」——中耳炎並非經淋巴系統傳播,淋巴非其感染途徑。故D為錯誤敘述。記憶:中耳炎三大途徑=耳咽管(主)、外耳道(鼓膜破)、血行。","options":{"A":"經耳咽管上行是急性中耳炎最主要途徑,正確。","B":"鼓膜破損時可經外耳道感染,正確。","C":"全身感染可經血行到達中耳,正確。","D":"正解(錯誤敘述)。淋巴非中耳炎的感染途徑。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Otitis Media Guideline"]}},"107110-N3-26":{"quick":"中耳手術後因氣壓變化會影響中耳/移植物,潛水、搭飛機、登山(高空氣壓變化)都應避免,故D錯誤。","detail":{"background":"中耳手術(鼓室成形術、乳突切除術)後護理指導:A正確——「避免感冒」(上呼吸道感染經耳咽管影響中耳與移植物);B正確——「耳藥滴入後讓藥物停留耳內約5分鐘」(可拉耳廓向後上方使藥液流入、頭側向健側),使藥物充分作用;C正確——「避免便祕、提重物」(用力會升高中耳壓力)。D「避免潛水,但可以搭飛機或登山」為「錯誤」——術後早期應避免「一切會造成中耳氣壓劇烈變化」的活動,「潛水(水壓)、搭飛機(高空氣壓變化)、登高山」都會使中耳內外壓力失衡、影響傷口與鼓膜移植物的癒合,故搭飛機與登山「同樣」應避免,不能說可以。故D為錯誤敘述。","options":{"A":"避免感冒防上呼吸道感染影響中耳,正確。","B":"耳藥滴入後停留約5分鐘使充分作用,正確。","C":"避免便祕、提重物防升高中耳壓力,正確。","D":"正解(錯誤敘述)。搭飛機、登山的氣壓變化也會影響中耳,同樣應避免。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Otitis Media Guideline"]}},"108110-N3-18":{"quick":"中耳手術後咳嗽或打噴嚏時應「張口」以洩壓、避免壓力經耳咽管衝擊術區,故B「避免張口」錯誤。","detail":{"background":"中耳手術後護理:A正確——「觀察顏面神經(CN VII)受損合併症」(顏面神經穿行中耳/乳突附近,術中可能傷及,須觀察有無口角歪斜、閉眼不全、抬眉不能);C正確——「避免頭部突然轉動」(防眩暈與牽扯傷口/移植物);D正確——「軟質飲食」(避免大力咀嚼牽動顳顎與中耳)。B「咳嗽或打噴嚏時避免張口」為「錯誤」——正確指導是「咳嗽、打噴嚏時應『張口』」,讓壓力從口腔釋放,避免閉口用力(Valsalva)使壓力經耳咽管衝向中耳、頂開移植的鼓膜或聽小骨;「避免張口」恰好相反。故B為錯誤敘述。","options":{"A":"觀察顏面神經受損合併症(口角歪斜等),正確。","B":"正解(錯誤敘述)。咳嗽打噴嚏應張口洩壓,而非避免張口。","C":"避免頭部突然轉動防眩暈與牽扯傷口,正確。","D":"採軟質飲食避免大力咀嚼牽動中耳,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Otitis Media Guideline"]}},"110030-N3-25":{"quick":"急性中耳炎中耳積膿會造成「傳導性聽力喪失」,故C正確;耳垢過多、發亮珍珠灰是正常鼓膜,抗生素需足療程。","detail":{"background":"急性中耳炎敘述判斷:A錯——「外耳道耳垢過多」是外耳問題(耵聹栓塞),非中耳炎表現;中耳炎是中耳腔積液積膿。B錯——「發亮的珍珠灰色」是「正常鼓膜」的外觀;急性中耳炎時鼓膜會「紅腫、膨出、失去光澤、標誌不清」。C正確——中耳積膿使鼓膜與聽小骨振動受阻,造成「傳導性聽力喪失(conductive hearing loss)」,通常隨感染消退而恢復。D錯——抗生素應「服用足量足療程(約10~14天)」,不可只服到「發燒緩解」就停藥(症狀緩解不代表細菌已清除,過早停藥易復發與抗藥)。故C正確。","options":{"A":"外耳道耳垢過多是外耳問題,非中耳炎表現,錯誤。","B":"發亮珍珠灰色是正常鼓膜;中耳炎時鼓膜紅腫膨出失去光澤,錯誤。","C":"正解。中耳積膿阻礙聲音傳導,造成傳導性聽力喪失。","D":"抗生素須服足療程,不可只服到退燒就停,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Otitis Media Guideline"]}},"111030-N3-23":{"quick":"中耳術後應「禁做」會使中耳壓力驟變的伐氏操作(Valsalva),故C「禁做」為正確指導(非錯誤)——本題誤植,實際C正確;以官方答案C為「錯誤敘述」係指其文字陷阱。","detail":{"background":"中耳炎手術後護理指導:A正確——「觀察顏面神經受損合併症」。B正確——「軟質飲食」減少咀嚼牽動。D正確——「勿用力擤鼻、用力咳嗽或打噴嚏」(避免壓力經耳咽管衝擊中耳移植物)。本題官方答案為C,係因選項文字「禁做會阻塞耳咽管的伐氏操作法(Valsalva)」措辭問題:Valsalva(閉口捏鼻鼓氣)會「升高」中耳壓力、頂開移植物,術後確實應「避免」此動作;選項把它描述成「會阻塞耳咽管」的理由不精確(Valsalva是迫使空氣經耳咽管進入中耳、使壓力上升,而非阻塞),屬敘述不當,故列為錯誤敘述。臨床重點不變:中耳術後應避免Valsalva、用力擤鼻、用力咳嗽打噴嚏等升高中耳壓力的動作。","options":{"A":"觀察有無顏面神經受損合併症,正確。","B":"採軟質飲食減少咀嚼牽動中耳,正確。","C":"正解(官方列為錯誤敘述)。Valsalva會升高中耳壓力頂開移植物應避免;選項把理由說成「阻塞耳咽管」措辭不當,故列錯誤。","D":"勿用力擤鼻、咳嗽、打噴嚏以免升高中耳壓力,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Otitis Media Guideline"]}},"115030-N3-13":{"quick":"急性中耳炎抗生素應「足量足療程約10~14天」,非3~5天,故A錯誤。","detail":{"background":"急性中耳炎醫療處置:B正確——「疼痛、發燒可用解熱鎮痛劑」緩解症狀;C正確——鼓膜腫脹張力大、化膿時行「鼓膜切開術(myringotomy)」引流減壓;D正確——「使用減充血劑(鼻黏膜消腫藥)」可改善鼻塞、幫助「耳咽管功能恢復」、促進中耳引流。A「抗生素使用持續3~5天」為「錯誤」——急性中耳炎抗生素療程約「10~14天」,療程過短(3~5天)感染未清除易復發、誘導抗藥。故A為錯誤敘述。本題與104100-N3-22、115030均反覆考「抗生素療程不足」的陷阱,務必記住足療程10~14天。","options":{"A":"正解(錯誤敘述)。抗生素療程應約10~14天,非3~5天。","B":"疼痛發燒可用解熱鎮痛劑,正確。","C":"鼓膜腫脹時行鼓膜切開術引流減壓,正確。","D":"使用減充血劑幫助耳咽管功能恢復、促引流,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Otitis Media Guideline"]}},"101030-N3-46":{"quick":"美尼爾氏症治療採「低鹽(限鈉)+利尿劑」減少內淋巴水腫;故C「低鉀飲食」錯誤(應為低鈉)。","detail":{"background":"美尼爾氏症(Ménière disease,又稱內淋巴水腫endolymphatic hydrops)是內耳膜性迷路的「內淋巴液過多、壓力升高」造成,典型三/四聯症:「反覆陣發性眩暈(數十分鐘至數小時)、耳鳴、波動性感覺神經性聽力喪失(以低頻為主)、耳脹滿感」。護理指導:A「需緩慢移動身體」正確(突然動作會誘發眩暈跌倒);B「學習放鬆技巧」正確(壓力、焦慮、疲勞會誘發發作);D「維持安全環境」正確(防眩暈跌倒)。C「採用低鉀飲食」為「錯誤」——美尼爾氏症飲食治療是「低鹽(限鈉)飲食」以減少體液與內淋巴滯留,並非「低鉀」;且常用「利尿劑」幫助排水,反而需注意「補鉀」防低血鉀,故「低鉀」方向完全相反。故C為錯誤指導。","options":{"A":"緩慢移動身體可避免誘發眩暈跌倒,正確。","B":"放鬆技巧可減少壓力誘發發作,正確。","C":"正解(錯誤指導)。應採低鈉(限鹽)飲食減少內淋巴水腫,非低鉀。","D":"維持安全環境防眩暈跌倒,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","Bárány Society Ménière Disease Diagnostic Criteria"]}},"103100-N3-24":{"quick":"美尼爾氏症的聽力喪失多為「單側、低頻、波動性」感覺神經性,故B「雙側」為錯誤敘述。","detail":{"background":"美尼爾氏症的臨床表徵:A「耳鳴(tinnitus)」正確(常為低音調嗡嗡聲);C「陣發性眩暈」正確(突發旋轉性眩暈、伴噁心嘔吐、可持續數十分鐘至數小時、可自行緩解);D「內耳有壓力感(耳脹滿感)」正確。B「雙側感覺神經性聽力喪失」為「錯誤」——美尼爾氏症的聽力喪失典型為「單側(多為患耳)、低頻為主、波動性(發作時變差、緩解時部分恢復)」的感覺神經性聽損,多數病人為「單側」發病(僅少數久病後可能波及對側),故「雙側」描述不符典型,為錯誤敘述。記憶:美尼爾=單側、低頻、波動。","options":{"A":"耳鳴是美尼爾氏症典型症狀,正確。","B":"正解(錯誤敘述)。其聽損典型為單側、低頻、波動性,非雙側。","C":"陣發性旋轉性眩暈是核心症狀,正確。","D":"內耳脹滿(壓力)感是典型表徵,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","Bárány Society Ménière Disease Diagnostic Criteria"]}},"104030-N3-23":{"quick":"美尼爾氏症的病理機轉是「內淋巴液增加(內淋巴水腫)」,故選A。","detail":{"background":"美尼爾氏症的病理機轉是內耳膜性迷路的「內淋巴液(endolymph)生成過多或吸收障礙」,造成「內淋巴水腫(endolymphatic hydrops)」、膜迷路膨脹壓力升高,進而干擾耳蝸與前庭功能,產生眩暈、耳鳴、聽損與耳脹。故正確機轉是A「內淋巴液增加」。區辨:「內淋巴」與「外淋巴(perilymph)」是內耳兩種不同的液體,病變在「內」淋巴增加,與外淋巴無關。治療方向即針對「減少內淋巴水腫」:低鈉飲食、利尿劑(排出多餘體液)、避免咖啡因/菸酒。故選A。","options":{"A":"正解。美尼爾氏症是內淋巴液增加造成內淋巴水腫。","B":"內淋巴液減少與機轉相反,錯誤。","C":"病變在內淋巴而非外淋巴,錯誤。","D":"外淋巴減少非其機轉,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","Bárány Society Ménière Disease Diagnostic Criteria"]}},"106030-N3-23":{"quick":"美尼爾氏症飲食治療是「低鹽(限鈉)」,故D「低脂飲食」非其處置(方向不符),為錯誤。","detail":{"background":"美尼爾氏症的處置目標是「減少內淋巴水腫、緩解急性眩暈、減少發作」:A「利尿劑(如diuretics)」正確——排出多餘體液、減少內淋巴量;B「抗組織胺(如meclizine、diphenhydramine、betahistine)」正確——抑制前庭、減輕眩暈與噁心;C「抗焦慮劑(如diazepam)」正確——鎮靜、抑制前庭、緩解急性眩暈與焦慮。D「低脂飲食」為「錯誤」——美尼爾氏症的飲食治療核心是「低鹽(限鈉)飲食」以減少水鈉滯留、降低內淋巴壓力,並避免咖啡因、酒精、菸,而「低脂」與其機轉無關、非其特定處置。故D為錯誤敘述(應為低鈉)。","options":{"A":"利尿劑減少內淋巴液量,正確處置。","B":"抗組織胺抑制前庭、減輕眩暈噁心,正確。","C":"抗焦慮劑鎮靜抑制前庭、緩解急性眩暈,正確。","D":"正解(錯誤敘述)。飲食治療應為低鈉(限鹽),非低脂。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","Bárány Society Ménière Disease Diagnostic Criteria"]}},"106110-N3-22":{"quick":"美尼爾氏症為「單側、低頻」感覺神經性聽損,耳鳴多為低音調;故C「為低頻率聲音聽力喪失」正確。","detail":{"background":"美尼爾氏症敘述判斷:A「傳導性聽力喪失」錯——美尼爾是內耳(耳蝸)病變,屬「感覺神經性」聽損,非傳導性;B「雙側聽力喪失」錯——典型為「單側」;C「為低頻率聲音聽力喪失」正確——美尼爾早期、發作期典型是「低頻」聽力下降(波動性),久病後才可能擴及高頻;D「耳鳴為高音調嗡嗡聲」錯——美尼爾的耳鳴多為「低音調(低沉嗡嗡或機器聲)」(與高音調的噪音性/老年性耳鳴不同)。故正確為C。記憶美尼爾四特徵:單側、感覺神經性、低頻、波動。","options":{"A":"美尼爾為感覺神經性聽損(內耳病變),非傳導性,錯誤。","B":"典型為單側聽損,非雙側,錯誤。","C":"正解。美尼爾以低頻率聽力喪失為典型(波動性)。","D":"其耳鳴多為低音調嗡嗡聲,非高音調,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","Bárány Society Ménière Disease Diagnostic Criteria"]}},"109030-N3-21":{"quick":"美尼爾氏症女性病人在「月經前(經前)」因水鈉滯留症狀易惡化,非「月經後」,故C錯誤。","detail":{"background":"美尼爾氏症敘述:A「又稱迷路水腫(內淋巴水腫)」正確;B「好發於40~60歲成人」正確(中年好發);D「易發生在長期噪音工作環境者」——噪音暴露是內耳受損與誘發因子之一,屬合理敘述(視為正確)。C「女性病人在月經後症狀可能惡化」為「錯誤」——與荷爾蒙相關的水鈉滯留多發生在「月經『前』(經前期)」,此時體內水分與鈉滯留增加、內淋巴壓力上升,使眩暈等症狀「惡化」;「月經後」水鈉排出、症狀通常較緩解。故敘述把惡化時機說成「月經後」是錯誤(應為月經前)。護理可提醒女性病人於經前期更嚴格限鹽。","options":{"A":"美尼爾氏症又稱迷路(內淋巴)水腫,正確。","B":"好發於40~60歲中年成人,正確。","C":"正解(錯誤敘述)。水鈉滯留使症狀在「經前」惡化,非月經後。","D":"長期噪音環境是內耳受損誘因之一,合理,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","Bárány Society Ménière Disease Diagnostic Criteria"]}},"109110-N3-24":{"quick":"美尼爾為內淋巴水腫(非外淋巴)、單側感覺神經性聽損;正確為「血管擴張劑減輕耳鳴(3)+藥物無效可迷路切除(4)」,選D(34)。","detail":{"background":"美尼爾氏症四敘述判斷:「1可能原因是外耳淋巴液過多」錯——是「內耳膜迷路的『內』淋巴液過多(內淋巴水腫)」,非外耳、非外淋巴;「2症狀為雙側傳導性聽力減退」錯——典型為「單側、感覺神經性、低頻波動」聽損,非雙側傳導性;「3使用血管擴張劑減輕耳鳴症狀」對——betahistine(組織胺類似物)等可改善內耳微循環、減輕耳鳴與眩暈;「4藥物治療無效時可採迷路切除術(labyrinthectomy)」對——頑固性、單側且聽力已差者可採破壞性手術(迷路切除或前庭神經切斷)根除眩暈。故正確組合為3+4,選D。","options":{"A":"12皆錯(外淋巴/雙側傳導性描述不符),錯誤。","B":"13含錯誤的1(外淋巴),錯誤。","C":"24含錯誤的2(雙側傳導性),錯誤。","D":"正解。血管擴張劑減輕耳鳴(3)、藥物無效可迷路切除(4)為正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","Bárány Society Ménière Disease Diagnostic Criteria"]}},"111110-N3-23":{"quick":"美尼爾氏症飲食為「低鹽(限鈉)」,故B「低鉀飲食」錯誤;且用利尿劑時更需注意補鉀。","detail":{"background":"美尼爾氏症病人護理指導:A「移動身體需緩慢」正確(防眩暈跌倒);C「給予利尿劑可減輕症狀」正確(排水減少內淋巴水腫);D「鼓勵做頭部及全身平衡運動(前庭復健)」正確——在「非急性發作期」進行前庭復健運動,可促進中樞代償、改善平衡與減少眩暈失能(急性發作期則應臥床休息)。B「採用低鉀飲食」為「錯誤」——應為「低鈉(限鹽)飲食」減少水鈉滯留;且病人常用「利尿劑」排水,反而易流失鉀、需「注意補鉀」防低血鉀,「低鉀」方向錯誤。故B為錯誤指導。","options":{"A":"緩慢移動身體防眩暈跌倒,正確。","B":"正解(錯誤指導)。應低鈉(限鹽)飲食;用利尿劑時更需補鉀,非低鉀。","C":"利尿劑排水減少內淋巴水腫,正確。","D":"非急性期做平衡(前庭復健)運動促進代償,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","Bárány Society Ménière Disease Diagnostic Criteria"]}},"112110-N3-24":{"quick":"美尼爾氏症典型為眩暈、耳鳴、單側聽力減退、耳脹;「耳痛」(D)非其症狀,故錯誤。","detail":{"background":"美尼爾氏症的症狀群:A「耳鳴」正確;B「眩暈(旋轉性、陣發)」正確;C「單側耳聽力減退」正確(波動性、低頻、感覺神經性);另有「耳脹滿(壓力)感」。D「耳痛」為「錯誤」——美尼爾氏症「不會耳痛」,它是內淋巴水腫造成的功能障礙,而非感染或發炎;「耳痛」是「中耳炎、外耳炎」等感染發炎性疾病的表現。故D為非美尼爾症狀。鑑別:美尼爾(眩暈+耳鳴+聽損+耳脹、無痛、無發燒)vs 中耳炎(耳痛+發燒+傳導性聽損)。","options":{"A":"耳鳴是美尼爾典型症狀,正確。","B":"陣發性旋轉性眩暈是核心症狀,正確。","C":"單側聽力減退(波動性)是典型,正確。","D":"正解(錯誤敘述)。美尼爾不會耳痛;耳痛是中耳炎等感染表現。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","Bárány Society Ménière Disease Diagnostic Criteria"]}},"112180-N3-15":{"quick":"美尼爾為「內淋巴水腫(1)」且「耳鳴是典型症狀(4)」;眩暈不伴耳痛、聽損為感覺神經性,故選B(14)。","detail":{"background":"美尼爾氏症四敘述:「1內耳淋巴水腫引起」對(內淋巴水腫是核心機轉);「2眩暈及耳朵疼痛是典型症狀」錯——典型是「眩暈」沒錯,但「耳朵疼痛」不是(美尼爾無耳痛,典型伴隨的是耳鳴與耳脹滿感);「3可能導致單側傳導性聽力喪失」錯——是「感覺神經性」聽損,非傳導性;「4耳鳴是典型症狀」對。故正確組合為1+4,選B。常見陷阱是把「耳痛」誤當美尼爾症狀(實為耳脹/耳鳴)、把聽損誤當「傳導性」(實為感覺神經性)。","options":{"A":"12含錯誤的2(耳朵疼痛),錯誤。","B":"正解。內淋巴水腫(1)、耳鳴典型(4)為正確。","C":"23皆含錯誤敘述,錯誤。","D":"34含錯誤的3(傳導性),錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","Bárány Society Ménière Disease Diagnostic Criteria"]}},"113100-N3-14":{"quick":"美尼爾氏症需「限水限鹽」減少內淋巴水腫,故B「多喝水促進循環」錯誤(應限制水分)。","detail":{"background":"美尼爾氏症護理指導:A「眩暈急性發作應立即臥床休息」正確(臥床、固定頭位、減少光線刺激,可給止暈/止吐藥);C「維持生活規律及情緒平穩」正確(壓力、疲勞、熬夜會誘發發作);D「使用血管擴張劑(如betahistine)可改善耳鳴」正確(改善內耳微循環)。B「多喝水以促進血液循環」為「錯誤」——美尼爾氏症的處置原則是「限制水分與鹽分攝取」以減少內淋巴液生成與水腫,「多喝水」反而會增加體液與內淋巴量、加重水腫與症狀。故B為錯誤指導。","options":{"A":"急性眩暈發作應立即臥床休息,正確。","B":"正解(錯誤指導)。應限水限鹽減少內淋巴水腫,而非多喝水。","C":"維持規律生活與情緒平穩避免誘發,正確。","D":"血管擴張劑改善內耳循環、減輕耳鳴,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","Bárány Society Ménière Disease Diagnostic Criteria"]}},"114170-N3-14":{"quick":"美尼爾氏症為「單側」感覺神經性聽損,故A「雙側」最不適當(錯誤)。","detail":{"background":"美尼爾氏症敘述判斷(選最不適當者):A「常見症狀有『雙側』感覺神經性聽力喪失」為「最不適當(錯誤)」——典型是「單側」感覺神經性、低頻、波動性聽損,而非雙側。B「可使用利尿劑減輕水腫」正確(排水減內淋巴);C「眩暈急性發作採患耳在上的臥床姿勢」正確——急性眩暈時採「患耳朝上(健耳在下)」的姿勢可減少患側迷路刺激、減輕眩暈;D「避免快速移動或改變姿勢」正確(防誘發眩暈與跌倒)。故最不適當者為A(把單側誤為雙側)。","options":{"A":"正解(最不適當)。美尼爾為單側感覺神經性聽損,非雙側。","B":"利尿劑減輕內淋巴水腫,正確。","C":"急性發作採患耳在上臥位減少患側刺激,正確。","D":"避免快速移動或變換姿勢防誘發眩暈,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","Bárány Society Ménière Disease Diagnostic Criteria"]}},"102110-N3-57":{"quick":"與聽損者溝通應「善用手勢、表情、書寫」輔助理解,故D「避免使用手勢」錯誤。","detail":{"background":"與聽力喪失者溝通的原則是「善用各種視覺與輔助線索、放慢清楚、面對面」:A「有良好光線」正確(讓病人能看清你的臉與唇形以讀唇);B「說話速度勿過快、必要時重複」正確;C「請病人重述談話內容以澄清理解」正確(確認訊息正確傳達)。D「避免使用手勢而分散病人注意力」為「錯誤」——與聽損者溝通時應「多運用手勢、面部表情、肢體語言,必要時輔以書寫、圖片」來「幫助」理解,手勢是重要的輔助溝通工具,而非干擾;「避免手勢」恰好違反原則。其他要點:站健側、面對病人與光源、降低背景噪音、音調稍低(高頻聽損者對高音較不敏感)、不要遮住嘴巴。故D為錯誤敘述。","options":{"A":"良好光線讓病人看清臉與唇形,正確。","B":"說話勿過快、必要時重複,正確。","C":"請病人重述以澄清理解,正確。","D":"正解(錯誤敘述)。應善用手勢表情輔助溝通,而非避免使用手勢。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Hearing Loss Guideline"]}},"103030-N3-24":{"quick":"助聽器初次配戴宜在「安靜環境、漸進增加時間」,故A「在吵雜環境試戴、一天戴8小時」錯誤。","detail":{"background":"助聽器(hearing aid)使用注意事項:B「不使用時關電源並取出電池」正確(防電池漏液、延長壽命);C「音量調至能聽清楚的最小標準」正確(音量過大會產生回授吱嘎聲feedback、且傷殘餘聽力);D「使用時避免噴髮膠、髮油」正確(粉末油脂會阻塞麥克風與音孔)。A「最初宜在吵雜環境中試戴、一天配戴8小時」為「錯誤」——初次配戴助聽器應「先在『安靜』的環境中適應」(初期對放大後的各種聲音不習慣,吵雜環境會讓人挫折、難以分辨),且配戴時間應「由短漸長、循序漸進」(每天從1~2小時逐漸增加),不可一開始就整天(8小時)配戴。故A為錯誤敘述。","options":{"A":"正解(錯誤敘述)。初戴應在安靜環境、配戴時間由短漸增,非吵雜環境戴8小時。","B":"不用時關電源取電池防漏液、延壽,正確。","C":"音量調至聽清楚的最小標準避免回授與傷聽力,正確。","D":"避免噴髮膠髮油阻塞麥克風與音孔,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Hearing Loss Guideline"]}},"104030-N3-25":{"quick":"韋伯氏試驗(Weber test)是把音叉置於前額正中、比較兩耳「骨傳導」,故A正確。","detail":{"background":"音叉聽力測試是區分「傳導性」與「感覺神經性」聽損的床邊工具,需先懂兩種傳導:「空氣傳導(air conduction, AC)」=聲音經外耳→中耳(鼓膜聽小骨)→內耳的正常路徑;「骨傳導(bone conduction, BC)」=音叉直接振動顱骨、繞過外中耳「直接傳到內耳耳蝸」。A正確——「韋伯氏試驗(Weber test)」把振動音叉置於「前額正中(或頭頂)」,經顱骨「骨傳導」傳至兩側內耳,比較哪耳聽得較大聲(偏向患耳=傳導性;偏向健耳=感覺神經性)。B錯——骨傳導是「繞過外耳中耳、直接振動顱骨到內耳」,並非「經過外耳中耳內耳」。C錯——正常時「空氣傳導時間>骨傳導時間」(AC約為BC的2倍,即AC>BC,任內氏陽性),並非「骨傳導為空氣的兩倍」。D錯——「傳導性聽損」者因外中耳障礙,反而「骨傳導>空氣傳導(BC>AC,任內氏陰性)」,即骨傳導時間較長,而非空氣傳導較長。故A正確。","options":{"A":"正解。Weber test將音叉置前額正中,經骨傳導比較兩耳。","B":"骨傳導是繞過外中耳直接振動顱骨到內耳,敘述錯誤。","C":"正常為空氣傳導(AC)約骨傳導(BC)的兩倍,非骨傳導兩倍,錯誤。","D":"傳導性聽損為骨傳導>空氣傳導(BC>AC),非空氣傳導較長,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Hearing Loss Guideline"]}},"104100-N3-42":{"quick":"演唱會噪音造成的是「感覺神經性聽力喪失」,因內耳(耳蝸毛細胞)或聽神經損傷所致,故A正確。","detail":{"background":"噪音暴露(如重金屬演唱會、爆震)造成的聽損是「感覺神經性聽力喪失(sensorineural hearing loss)」,因強音損傷「內耳耳蝸的毛細胞或聽神經」,故A「因內耳或聽神經損傷而造成」正確。其餘錯誤:B「助聽器可改善」——感覺神經性聽損助聽器效果「有限」(毛細胞已受損,放大音量仍失真),不能說可改善(重度者需考慮人工耳蝸);C「大都可自然痊癒」錯——毛細胞受損後「不可逆」,難以自然痊癒(故強調預防、戴耳塞);D「乳突切除術可改善聽力」錯——乳突切除是治療中耳乳突的「傳導性」病灶(慢性中耳炎/膽脂瘤),對內耳的感覺神經性聽損無效。故A正確。預防勝於治療:避免長期高分貝噪音、配戴護耳。","options":{"A":"正解。噪音性聽損是內耳毛細胞或聽神經損傷的感覺神經性聽損。","B":"感覺神經性聽損助聽器效果有限,不能說可改善,錯誤。","C":"毛細胞受損不可逆,難自然痊癒,錯誤。","D":"乳突切除術治傳導性病灶,對感覺神經性聽損無效,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Hearing Loss Guideline"]}},"105030-N3-26":{"quick":"任內氏試驗AC<BC(骨>氣)代表「傳導性」聽損,故A正確。","detail":{"background":"音叉試驗判讀(AC=空氣傳導,BC=骨傳導):A正確——「任內氏(Rinne)試驗AC<BC(骨傳導大於空氣傳導,即任內氏陰性)」代表「傳導性聽力喪失」(外中耳障礙使空氣傳導受阻,反而骨傳導較好)。B錯——「韋伯氏(Weber)試驗『患耳』聽到較大聲」代表「『傳導性』聽損」(聲音偏向患耳),而非感覺神經性(感覺神經性是偏向『健耳』);C錯——「藥物毒性(耳毒性藥如aminoglycoside、furosemide、cisplatin)」損傷內耳毛細胞,造成「感覺神經性」聽損,非傳導性;D錯——助聽器「無法完全」改善溝通品質(尤其感覺神經性聽損會失真),只能部分輔助。故A正確。記憶:Rinne陰性(BC>AC)+Weber偏患耳=傳導性;Rinne陽性但Weber偏健耳=感覺神經性。","options":{"A":"正解。任內氏AC<BC(骨>氣、陰性)為傳導性聽損。","B":"Weber偏患耳是傳導性;偏健耳才是感覺神經性,敘述錯誤。","C":"耳毒性藥物造成感覺神經性聽損,非傳導性,錯誤。","D":"助聽器無法完全改善溝通,尤其感覺神經性會失真,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Hearing Loss Guideline"]}},"106111-N3-22":{"quick":"與聽障者溝通應「先讓對方知道談話主題」再開始,而非護理師先自顧開口,故A錯誤。","detail":{"background":"與聽覺障礙者溝通的技巧:B「先讓聽障者知道要交談的主題」正確(提供情境線索幫助理解);C「說話時面對光線來源」正確(讓自己的臉與唇形被看清,利於讀唇——注意是讓「光照在說話者臉上」,不可背光);D「說話速度勿太快、音調稍低」正確(多數聽損者高頻聽力差,音調稍低較易聽見;放慢利於讀唇)。A「應先開口較能掌握交談主題」為「錯誤」——正確順序是「先引起注意、告知主題,再開始談話」,讓聽障者有心理準備與情境背景;若護理師「先自顧自開口」,對方還沒進入狀況、易漏失開頭重要訊息。故A為錯誤敘述。","options":{"A":"正解(錯誤敘述)。應先告知主題引起注意再交談,而非先自顧開口。","B":"先讓對方知道談話主題提供情境線索,正確。","C":"面對光線使臉與唇形被看清(光照說話者臉),正確。","D":"說話勿太快、音調稍低利於聽見與讀唇,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Hearing Loss Guideline"]}},"107030-N3-22":{"quick":"韋伯氏試驗中,「感覺神經性」聽損者聲音偏向『健耳』(患耳較小聲),故C「患耳較大」錯誤。","detail":{"background":"音叉評估目的(A正確)在「區分傳導性與感覺神經性聽損」;B「避免強烈敲擊音叉」正確(過強會失準、不適);D正確——「任內氏(Rinne)試驗:傳導性聽損的患耳為『陰性』反應(BC>AC,骨傳導比空氣傳導大聲或久)」。C「韋伯氏試驗:感覺神經性聽損的患耳聽到的聲音『比較大』」為「錯誤」——Weber試驗中,「感覺神經性聽損」者因患耳內耳/聽神經受損,聲音會「偏向『健側(正常耳)』、健耳聽到較大聲,患耳較小聲」;反之「傳導性聽損」才會「偏向患耳、患耳較大聲」(因患側外中耳阻隔了環境噪音、又經骨傳導接收)。故C把感覺神經性說成患耳較大,張冠李戴,為錯誤。","options":{"A":"音叉試驗目的在區分傳導性與感覺神經性聽損,正確。","B":"避免強烈敲擊音叉以免失準不適,正確。","C":"正解(錯誤敘述)。感覺神經性聽損Weber偏向健耳(患耳較小),非患耳較大。","D":"任內氏試驗傳導性聽損患耳為陰性(BC>AC),正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Hearing Loss Guideline"]}},"108020-N3-21":{"quick":"高血壓、糖尿病、頭部外傷皆可影響內耳血流/神經而致聽損;「甲狀腺功能亢進」最不相關,故選A。","detail":{"background":"與聽力問題相關的全身性疾病:B「高血壓」可影響內耳微血管血流、與感覺神經性聽損相關;C「糖尿病」會造成內耳微血管病變與神經病變、影響聽力;D「頭部外傷」可直接損傷顳骨、聽小骨、耳蝸或聽神經造成聽損。A「甲狀腺功能『亢進』」與聽力問題「最不相關」——相對而言,「甲狀腺功能『低下(甲狀腺機能不足)』」較常與聽力下降相關(黏液水腫可影響聽覺),而「亢進」與聽損的關聯最弱。故四者中「最不可能」引起聽力問題的是甲狀腺功能亢進,選A。","options":{"A":"正解(最不相關)。甲狀腺功能亢進與聽損關聯最弱(低下才較相關)。","B":"高血壓影響內耳血流,與聽損相關。","C":"糖尿病造成內耳微血管與神經病變,影響聽力。","D":"頭部外傷可直接損傷耳部構造或聽神經,致聽損。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Hearing Loss Guideline"]}},"109110-N3-22":{"quick":"聽力分級:≤25dB正常、26~40輕度、41~55中度、56~70中重度、71~90重度、>90極重度;故C「60dB以上為重度」錯誤(60dB屬中重度)。","detail":{"background":"聽力損失程度依「能聽見的最小音量(聽閾,分貝dB)」分級(數字越大代表聽力越差):①「≤25 dB:聽力正常」(A正確);②「26~40 dB:輕度」(B「30dB以上為輕度」正確);③「41~55 dB:中度」;④「56~70 dB:中重度」;⑤「71~90 dB:重度」;⑥「>90 dB:極重度」(D「90dB以上為極重度」正確)。C「只能聽見60 dB以上的音量為『重度』受損」為「錯誤」——60 dB落在「中度~中重度」範圍,「重度」是71~90 dB,故把60 dB稱為「重度」分級錯誤。故C為錯誤敘述。","options":{"A":"聽閾≤25dB為聽力正常,正確。","B":"26~40dB(30dB以上)為輕度受損,正確。","C":"正解(錯誤敘述)。60dB屬中度~中重度;重度是71~90dB。","D":">90dB為極重度受損,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Hearing Loss Guideline"]}},"110110-N3-25":{"quick":"感覺神經性聽損:Weber偏「健耳」、Rinne呈AC>BC(空氣>骨傳導,任內氏陽性),故C正確。","detail":{"background":"感覺神經性聽力喪失(內耳耳蝸或聽神經受損)的音叉表現與特性:A「在噪音中聽力佳」錯——這是「傳導性」聽損的特徵(背景噪音被外中耳阻隔,反而對話更清楚,稱paracusis willisii);感覺神經性在噪音中辨音更差。B「Weber試驗患側聽到較大聲」錯——感覺神經性是「偏向『健側』、健耳較大聲」(患側內耳壞了聽不到),偏患側是傳導性。C「Rinne試驗空氣傳導時間比骨傳導時間長(AC>BC,任內氏陽性)」正確——感覺神經性聽損外中耳正常,維持「正常的AC>BC關係」(只是兩者都變差),呈任內氏陽性。D「外耳道或鼓膜異常」錯——那是「傳導性」聽損的病因;感覺神經性病灶在「內耳/聽神經」,外中耳正常。故C正確。","options":{"A":"噪音中聽力佳是傳導性聽損特徵,非感覺神經性,錯誤。","B":"Weber偏健耳才對;偏患側是傳導性,錯誤。","C":"正解。感覺神經性Rinne呈AC>BC(任內氏陽性)。","D":"外耳道或鼓膜異常是傳導性病因,非感覺神經性,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Hearing Loss Guideline"]}},"111030-N3-25":{"quick":"與聽損者溝通應「主動引起注意、先告知主題」,不是被動「等對方先開口」,故A錯誤。","detail":{"background":"聽力喪失病人的護理(溝通)指導:B「採適當位置使說話者面部採光良好」正確(讓病人看清臉與唇形讀唇);C「要求對方先說明主題、改變話題時先通知」正確(提供情境線索,避免漏接);D「家中電話加裝擴音器、電鈴加裝閃光」正確(以視覺/放大輔助替代聽覺,屬聽障者居家環境改造)。A「與別人溝通時等待對方先開口」為「錯誤」——聽損者溝通應「主動」引起對方注意、確認對方面向自己、先知道主題後再交談,而非「被動等對方先開口」(被動等待會錯失開頭、增加溝通困難)。故A為錯誤敘述。","options":{"A":"正解(錯誤敘述)。應主動引起注意、先知主題,而非被動等對方先開口。","B":"使說話者面部採光良好以利讀唇,正確。","C":"先說明主題、換話題先通知,提供情境線索,正確。","D":"電話加擴音器、電鈴加閃光,以視覺放大輔助,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Hearing Loss Guideline"]}},"114100-N3-15":{"quick":"右耳Weber偏患側、Rinne右耳AC≦BC=傳導性聽損,病變在「外耳(1)或中耳(2)」,故選A(12)。","detail":{"background":"本題以Weber與Rinne綜合判讀病變位置。病人「左耳正常、右耳聽障」:①「Weber試驗右耳(患耳)較大聲」→聲音偏向患側=傳導性聽損的特徵(傳導性Weber偏患耳;感覺神經性偏健耳);②「Rinne試驗:左耳AC>BC(正常/任內氏陽性),右耳AC≦BC(骨傳導≧空氣傳導、任內氏陰性)」→右耳確診為「傳導性聽力喪失」。傳導性聽損的病灶必定在「聲音的傳導路徑=外耳(1)或中耳(2)」(如耳垢栓塞、外耳道閉鎖、中耳積液、鼓膜穿孔、聽小骨病變);而「內耳(3)、耳蝸神經(4)」屬感覺神經性聽損的病灶,與本題傳導性表現不符。故右耳最可能的病變位置是外耳或中耳,選A(12)。","options":{"A":"正解。傳導性聽損病灶在外耳(1)與中耳(2),符合右耳Weber偏患側、Rinne陰性。","B":"13含內耳(3),屬感覺神經性病灶,與傳導性表現不符,錯誤。","C":"24含耳蝸神經(4),屬感覺神經性,錯誤。","D":"34(內耳+耳蝸神經)皆為感覺神經性病灶,與本題傳導性不符,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Hearing Loss Guideline"]}},"102030-N3-26":{"quick":"鼻竇炎術後應避免熱刺激(熱水洗臉會使血管擴張、易出血腫脹),故D「避免太熱的水洗臉洗澡」正確。","detail":{"background":"鼻竇炎(sinusitis)是鼻竇黏膜發炎、分泌物滯留,術後(如功能性內視鏡鼻竇手術FESS)護理指導:A錯——應避免「寒冷乾燥」環境(乾冷空氣刺激鼻黏膜、加重充血與不適),宜溫暖適度濕潤的環境;B錯——術後早期應「冰敷」患側鼻部/臉頰以減少出血與腫脹,「熱敷」會使血管擴張、增加出血與腫脹,不可;C錯——術後「流鼻血」不是正常現象、也不可只「自行處理」,大量或持續出血應就醫,並避免用力擤鼻、挖鼻;D「應避免使用太熱的水洗臉、洗澡」「正確」——熱水會使鼻部血管擴張、增加出血與腫脹風險,術後2週內宜用溫(不過熱)的水。故D正確。","options":{"A":"應避免寒冷乾燥環境(刺激鼻黏膜),宜溫暖適濕,錯誤。","B":"術後應冰敷減少出血腫脹,熱敷反加重,錯誤。","C":"術後流鼻血非正常,大量持續應就醫,不可只自行處理,錯誤。","D":"正解。避免太熱的水洗臉洗澡,以防血管擴張出血腫脹。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Rhinosinusitis Clinical Practice Guideline"]}},"103030-N3-26":{"quick":"慢性鼻竇炎多為低度慢性發炎,常見鼻塞、咳嗽、顏面痛、膿涕;通常「不會高燒>39°C」,故C錯誤。","detail":{"background":"慢性鼻竇炎(chronic sinusitis,症狀持續約12週/3個月以上)的症狀:A「咳嗽」正確(鼻涕倒流刺激咽喉);B「鼻塞」正確(黏膜腫脹、息肉);D「顏面/鼻竇部位疼痛或脹悶感」正確(受累鼻竇處壓痛、頭面悶痛),另有膿性鼻涕、嗅覺減退。C「發高燒(>39°C)」為「錯誤」——慢性鼻竇炎屬「低度、長期」的慢性發炎,通常「不會」有高燒;高燒多見於「急性」細菌性鼻竇炎或併發症(眼眶蜂窩組織炎、腦膜炎、腦膿瘍)。故慢性鼻竇炎以高燒為症狀是錯誤敘述。","options":{"A":"鼻涕倒流刺激咽喉造成咳嗽,正確。","B":"黏膜腫脹、息肉造成鼻塞,正確。","C":"正解(錯誤敘述)。慢性鼻竇炎屬低度慢性發炎,不會高燒>39°C。","D":"受累鼻竇處顏面疼痛悶脹,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Rhinosinusitis Clinical Practice Guideline"]}},"105030-N3-25":{"quick":"鼻竇炎術後應「抬高床頭、半坐臥」以利引流並減少出血,故B「平臥」錯誤。","detail":{"background":"鼻竇手術後的立即護理:A「鼻部冰敷」正確(減少出血與腫脹);C「注意口腔衛生」正確(因鼻腔填塞需由口呼吸、口乾,易口腔不適與感染);D「教導由口呼吸」正確(術後鼻腔填塞紗條、無法經鼻呼吸,須由口呼吸並做好口腔護理)。B「採用平臥姿勢」為「錯誤」——術後應「抬高床頭、採半坐臥(Fowler位)」,可促進鼻腔/鼻竇分泌物引流、減少頭面部充血與出血、減輕腫脹;「平臥」會使頭部充血、增加出血與不適。故B為錯誤措施。","options":{"A":"鼻部冰敷減少出血與腫脹,正確。","B":"正解(錯誤敘述)。應抬高床頭半坐臥利引流減出血,非平臥。","C":"注意口腔衛生(因由口呼吸口乾),正確。","D":"術後鼻腔填塞,教導由口呼吸,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Rhinosinusitis Clinical Practice Guideline"]}},"106111-N3-23":{"quick":"減充血鼻滴劑不可頻繁使用(連續用過久會「反彈性鼻充血」),故B「4小時內未改善可再使用」錯誤。","detail":{"background":"鼻竇炎護理指導:A「戒菸」正確(菸害損傷鼻黏膜纖毛、加重發炎);C「慢性鼻竇炎抗生素需持續使用至少7天(實務常需更久,如3~4週)」正確(足療程清除感染);D「攝取足夠液體」正確(稀釋分泌物、利於引流)。B「鼻滴劑(減充血劑)使用後4小時內症狀未改善可再使用」為「錯誤」——局部減充血鼻噴/滴劑(如oxymetazoline、麻黃素類)「連續使用不可超過3~5天、且不可頻繁追加」,過度或長期使用會造成「反彈性鼻充血(rhinitis medicamentosa,藥物性鼻炎)」使鼻塞更嚴重、形成依賴;不能「未改善就一直加用」。故B為錯誤指導。","options":{"A":"戒菸避免菸害損傷鼻黏膜纖毛,正確。","B":"正解(錯誤指導)。減充血鼻滴劑不可頻繁追加,過用會反彈性鼻充血。","C":"慢性鼻竇炎抗生素需足療程(至少7天),正確。","D":"攝取足夠液體稀釋分泌物利引流,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Rhinosinusitis Clinical Practice Guideline"]}},"107030-N3-23":{"quick":"鼻部手術後冰敷應冰敷「鼻部/臉頰」,而「額頭」非鼻竇出血腫脹處;C冰敷部位敘述不當,為錯誤。","detail":{"background":"鼻部手術後護理:A「抬高床頭」正確(半坐臥利引流、減充血出血);B「適度維持口腔清潔」正確(因鼻填塞由口呼吸);D「2週內勿用太熱的水洗臉洗澡」正確(避免血管擴張出血腫脹)。C「冰敷『額頭』以減輕水腫」為「錯誤」——鼻部手術後冰敷的部位應是「鼻樑、鼻部周圍與兩側臉頰」(手術與腫脹出血的所在),冰敷「額頭」並非手術部位、無法有效減輕鼻部腫脹;此選項把冰敷部位放錯。故C為錯誤敘述(正確應冰敷鼻部與臉頰)。","options":{"A":"抬高床頭半坐臥利引流減出血,正確。","B":"適度維持口腔清潔(因由口呼吸),正確。","C":"正解(錯誤敘述)。應冰敷鼻部與臉頰而非額頭(非手術腫脹處)。","D":"2週內勿用太熱的水洗臉洗澡防出血腫脹,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Rhinosinusitis Clinical Practice Guideline"]}},"108020-N3-23":{"quick":"慢性鼻竇炎屬低度慢性發炎,症狀為鼻塞、顏面痛、膿涕、嗅覺減退,「不會高燒」,故D「包括高燒」錯誤。","detail":{"background":"鼻竇炎概念:A「最常出現在上頷竇(maxillary sinus)」正確(上頷竇最大、開口位置高不易引流,最常受累);B「未治療可能併發腦膜炎、腦膿瘍」正確(鼻竇鄰近眼眶與顱腔,感染擴散可致眼眶蜂窩組織炎、腦膜炎、腦膿瘍、海綿竇栓塞);C「慢性鼻竇炎為症狀持續『約12週(2~3個月)以上』」正確。D「慢性鼻竇炎症狀包括鼻塞、『高燒』、顏面疼痛」為「錯誤」——慢性鼻竇炎是低度慢性發炎,「不會高燒」(高燒見於急性細菌性鼻竇炎或併發症);其症狀以鼻塞、膿涕、顏面悶痛、嗅覺減退、鼻涕倒流為主。故D因列入「高燒」而錯誤。","options":{"A":"鼻竇炎最常出現在上頷竇,正確。","B":"未治療可併發腦膜炎、腦膿瘍等,正確。","C":"慢性鼻竇炎症狀持續約2~3個月以上,正確。","D":"正解(錯誤敘述)。慢性鼻竇炎不會高燒;高燒見於急性或併發症。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Rhinosinusitis Clinical Practice Guideline"]}},"109110-N3-23":{"quick":"鼻竇炎術後應「抬高床頭、半坐臥」利引流減出血,故A「採平躺臥姿」錯誤。","detail":{"background":"鼻竇炎術後護理:B「冰敷鼻子與臉頰」正確(減少出血腫脹);C「若有引流物由口吐出、不要擤鼻子」正確(用力擤鼻會升高鼻腔壓力、造成出血並影響傷口);D「以棉籤適度清潔口腔或漱口」正確(因鼻填塞由口呼吸、口乾,需口腔護理)。A「採平躺臥姿」為「錯誤」——術後應「抬高床頭、採半坐臥」促進引流、減少頭面充血與出血、減輕腫脹;平躺會使頭面充血、增加出血。故A為錯誤措施。","options":{"A":"正解(錯誤敘述)。應抬高床頭半坐臥,非平躺。","B":"冰敷鼻子與臉頰減少出血腫脹,正確。","C":"引流物由口吐出、勿擤鼻避免出血,正確。","D":"以棉籤清潔口腔或漱口(因由口呼吸),正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Rhinosinusitis Clinical Practice Guideline"]}},"110110-N3-23":{"quick":"鼻竇手術後應「抬高床頭半坐臥」利引流;B「採側臥」非首選(應半坐臥),故為錯誤。","detail":{"background":"鼻竇手術後護理指導:A「二週內勿用太熱的水洗臉」正確(避免血管擴張出血腫脹);C「注意口腔衛生」正確(由口呼吸口乾);D「不要抽菸」正確(菸害延緩癒合、刺激黏膜)。B「術後採側臥,有助分泌物引流」為「錯誤」——鼻竇/鼻部手術後最佳臥位是「抬高床頭、採『半坐臥(Fowler位)』」,可藉重力促進鼻腔分泌物引流、減少頭面充血與出血;「側臥」並非引流首選、且可能壓迫一側。故本題以B為錯誤敘述(正確應半坐臥)。","options":{"A":"二週內勿用太熱的水洗臉防出血腫脹,正確。","B":"正解(錯誤敘述)。應抬高床頭半坐臥利引流,非側臥。","C":"注意口腔衛生(由口呼吸口乾),正確。","D":"不要抽菸避免菸害延緩癒合,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Rhinosinusitis Clinical Practice Guideline"]}},"112030-N3-23":{"quick":"鼻部手術後鼻出血應「就醫處理」(常需重新填塞或止血),不可只自行加壓,故D最不適宜。","detail":{"background":"鼻部手術後護理指導(選最不適宜者):A「抬高床頭採半坐臥」適宜(利引流減出血);B「勿用太熱的水洗臉洗澡」適宜(防血管擴張出血);C「教導由口呼吸及注意口腔衛生」適宜(鼻填塞無法經鼻呼吸)。D「出院後若鼻出血,自行加壓止血即可」為「最不適宜」——鼻部手術後的鼻出血可能來自手術區深部血管,「自行加壓(壓鼻翼)」對鼻前部小出血或許有限幫助,但術後出血常較深、量較多,應「儘速就醫」由醫師檢查、必要時重新填塞或電燒止血,不可只當作小事自行處理而延誤。故D最不適宜。","options":{"A":"抬高床頭半坐臥利引流減出血,適宜。","B":"勿用太熱的水洗臉洗澡防出血,適宜。","C":"教導由口呼吸及口腔衛生,適宜。","D":"正解(最不適宜)。術後鼻出血應就醫處理,不可只自行加壓。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Rhinosinusitis Clinical Practice Guideline"]}},"112110-N3-21":{"quick":"減充血鼻噴劑不可「隨時使用」(連用>3~5天會反彈性鼻充血),故C錯誤。","detail":{"background":"急性鼻竇炎處置:A「抗生素至少連續使用7天以上」正確(細菌性鼻竇炎需足療程);B「解熱鎮痛劑緩解發燒及疼痛」正確;D「蒸氣吸入促進鼻竇引流」正確(濕熱蒸氣稀釋分泌物、改善纖毛運動、利引流)。C「鼻噴劑可以隨時使用以改善鼻塞」為「錯誤」——局部「減充血鼻噴劑」連續使用「不可超過3~5天」,過度頻繁使用會導致「反彈性鼻充血(藥物性鼻炎)」使鼻塞惡化、形成依賴;不可「隨時」使用。故C為錯誤處置。","options":{"A":"急性鼻竇炎抗生素需足療程(至少7天以上),正確。","B":"解熱鎮痛劑緩解發燒疼痛,正確。","C":"正解(錯誤敘述)。減充血鼻噴劑不可隨時用,連用>3~5天會反彈性鼻充血。","D":"蒸氣吸入稀釋分泌物、促進鼻竇引流,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Rhinosinusitis Clinical Practice Guideline"]}},"112180-N3-17":{"quick":"慢性鼻竇炎多因「急性鼻竇炎未完全治療」遷延而成,故A正確。","detail":{"background":"慢性鼻竇炎的原因:A「由於急性鼻竇炎未完全治療所致」正確——急性鼻竇炎若治療不徹底、療程不足或反覆發作,會遷延成慢性鼻竇炎(黏膜持續發炎、纖毛功能受損、引流不良)。B「與鼻息肉生成『無關』」錯——慢性鼻竇炎與「鼻息肉」關係密切(息肉阻塞鼻竇開口、加重發炎,互為因果)。C「常由『流行性感冒嗜血桿菌』引起」——表述不精確:急性鼻竇炎常見肺炎鏈球菌、流感嗜血桿菌、moraxella,但慢性鼻竇炎致病菌多樣(含厭氧菌、金黃葡萄球菌等),非單一由流感嗜血桿菌引起。D「常見的感染致病菌為好氧菌」錯——慢性鼻竇炎因鼻竇引流不良、氧分壓低,「厭氧菌」角色增加,並非以好氧菌為主。故正確為A。","options":{"A":"正解。慢性鼻竇炎多因急性鼻竇炎未完全治療遷延而成。","B":"慢性鼻竇炎與鼻息肉關係密切,並非無關,錯誤。","C":"慢性鼻竇炎致病菌多樣,非單一流感嗜血桿菌,錯誤。","D":"慢性鼻竇炎引流不良氧分壓低,厭氧菌角色增加,非以好氧菌為主,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Rhinosinusitis Clinical Practice Guideline"]}},"113030-N3-15":{"quick":"慢性鼻竇炎抗生素需「足療程」,症狀消退不代表已清除,不可一退就停藥,故B錯誤。","detail":{"background":"鼻竇炎護理指導:A「鼻竇炎是鼻竇內黏膜發炎所造成」正確;C「使用鼻滴劑時可採坐姿、頭向後仰」正確(使藥液流向鼻竇開口、充分作用,亦可採側臥懸頭法);D「使用鼻滴劑避免過量,以防反彈效果」正確(過量/長期使用減充血滴劑會反彈性鼻充血)。B「慢性鼻竇炎症狀消退後即可停用抗生素」為「錯誤」——慢性鼻竇炎抗生素須「足量足療程(常需數週)」,「症狀消退不代表細菌已完全清除」,過早停藥會復發並誘導抗藥性,應依醫囑完成整個療程。故B為錯誤指導。","options":{"A":"鼻竇炎是鼻竇內黏膜發炎所致,正確。","B":"正解(錯誤指導)。抗生素需足療程,症狀消退不可即停藥。","C":"使用鼻滴劑可採坐姿頭後仰使藥達鼻竇,正確。","D":"避免鼻滴劑過量以防反彈性鼻充血,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Rhinosinusitis Clinical Practice Guideline"]}},"103100-N3-25":{"quick":"鼻咽癌好侵犯的是「第五、六對腦神經(及視神經、外展神經等)」造成顱底/海綿竇症狀,故D「最常侵犯第七對」錯誤。","detail":{"background":"鼻咽癌(nasopharyngeal carcinoma, NPC)好發於鼻咽頂後壁,與EB病毒、遺傳(華南人種)、醃漬食物(亞硝胺)、抽菸有關。臨床表徵:A「頸部淋巴結腫大」正確(常是「最早、最常見」的表現,因鼻咽淋巴引流豐富,癌細胞先轉移到頸部上深部淋巴結,病人常以「無痛頸部腫塊」就醫);B「鼻塞、鼻出血(回吸性血痰)」正確;C「耳鳴、耳脹悶、聽力減退」正確(腫瘤阻塞「耳咽管開口」造成中耳積液與傳導性聽損)。D「最常侵犯第七對腦神經(顏面神經)」為「錯誤」——鼻咽癌向上侵犯顱底時,最常影響的是穿經顱底/海綿竇的「第五對(三叉神經,顏面麻木痛)、第六對(外展神經,複視)」等,並非以第七對(顏面神經)為主。故D為錯誤敘述。","options":{"A":"頸部淋巴結腫大常是鼻咽癌最早、最常見的表現,正確。","B":"鼻塞、鼻出血(回吸性血痰)為典型表徵,正確。","C":"腫瘤阻塞耳咽管開口造成耳鳴、耳脹、聽力減退,正確。","D":"正解(錯誤敘述)。鼻咽癌向顱底侵犯多影響第五、六對腦神經,非第七對。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"105090-N3-21":{"quick":"頭頸放療會破壞唾液腺造成口乾,「張口運動」是為防顳顎關節僵硬/張口受限,非促進唾液分泌,故A錯誤。","detail":{"background":"鼻咽癌放射線治療期間護理:B「維持照射處皮膚標記完整」正確(定位標記不可洗掉,以確保每次照射部位準確);C「照射處皮膚只能以清水清洗、輕拍乾」正確(放射性皮膚炎護理,避免肥皂、搓揉、酒精);D「進食含水分多的食物」正確(放療造成口乾、黏膜炎,軟質多水食物較易吞嚥)。A「張口運動以促進唾液分泌」為「錯誤」——頭頸部放療會「破壞唾液腺」造成「永久性口乾(xerostomia)」,「張口運動」的目的是「預防顳顎關節纖維化僵硬、張口受限(牙關緊閉trismus)」、維持張口度,並「不是」用來促進唾液分泌(唾液腺受損後分泌減少,張口運動無法使其增加)。故A的理由錯誤。","options":{"A":"正解(錯誤敘述)。張口運動是防顳顎關節僵硬/張口受限,非促進唾液分泌(唾液腺已受損)。","B":"維持皮膚定位標記完整以確保照射準確,正確。","C":"照射處皮膚只以清水清洗、勿用肥皂搓揉,正確。","D":"進食多水分軟質食物利吞嚥(口乾黏膜炎),正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"106110-N3-23":{"quick":"鼻咽癌鼻出血多為「少量、回吸性血絲痰」,而非「大量鼻血」,故A「大量鼻血」錯誤。","detail":{"background":"鼻咽癌的症狀:A「大量鼻血」為「錯誤」——鼻咽癌的鼻出血典型是「少量、間歇、回吸後吐出帶血絲的痰(回吸性血痰)」或鼻涕帶血,而非一開始就「大量」鼻血(大量鼻血較常見於鼻腔前部血管破裂或晚期侵蝕大血管)。B「中耳積液」正確(腫瘤阻塞耳咽管開口導致中耳積液);C「聽力減退」正確(中耳積液造成傳導性聽損);D「頸部淋巴結腫大」正確(最常見、最早表現)。故A為錯誤敘述。臨床警訊:成人「單側」中耳積液或無痛頸部腫塊,要警覺鼻咽癌。","options":{"A":"正解(錯誤敘述)。鼻咽癌多為少量回吸性血痰,非一開始大量鼻血。","B":"腫瘤阻塞耳咽管造成中耳積液,正確。","C":"中耳積液造成傳導性聽力減退,正確。","D":"頸部淋巴結腫大是最常見表現,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"106111-N3-38":{"quick":"鼻咽癌與「EB病毒(Epstein-Barr virus)」感染密切相關,故選B。","detail":{"background":"鼻咽癌(NPC)的致病因子中,病毒因素以「EB病毒(Epstein-Barr virus, EBV)」最密切相關——EBV感染鼻咽上皮細胞,加上遺傳易感性與環境因子(醃漬食物的亞硝胺、抽菸),共同促成癌變;臨床上可測「血清EBV抗體效價(如VCA-IgA、EA-IgA)」或EBV DNA作為篩檢、診斷與追蹤指標。故選B。區辨其他病毒:A「CMV(巨細胞病毒)」與先天感染、免疫不全相關;C「HPV(人類乳突病毒)」與子宮頸癌、口咽癌(扁桃腺/舌根)、菜花相關;D「HSV-II」與生殖器疱疹相關。故鼻咽癌=EB病毒。","options":{"A":"CMV與先天感染、免疫不全相關,非鼻咽癌,錯誤。","B":"正解。鼻咽癌與EB病毒(EBV)感染密切相關。","C":"HPV與子宮頸癌、口咽癌相關,非鼻咽癌,錯誤。","D":"HSV-II與生殖器疱疹相關,非鼻咽癌,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"107030-N3-29":{"quick":"放療皮膚應以「中性肥皂或清水溫和清潔、輕拍乾」,記號不可洗掉;但放射皮膚不可冰敷熱敷、不可曝曬,B大致正確;此題答案B係因「中性肥皂」措辭——放射皮膚炎建議僅清水、避免肥皂搓揉。","detail":{"background":"鼻咽癌頭頸放療的皮膚護理(放射性皮膚炎照護):A「不可曝曬陽光,外出使用陽傘/帽子」正確(照射區皮膚對紫外線敏感、易曬傷色素沉著);C「濕性脫屑時依醫囑使用氧化鋅(或親水敷料)」正確(濕性脫皮的傷口護理);D「不能冰敷或熱敷照射區」正確(極端溫度刺激受損皮膚)。B「用『中性肥皂』清潔、記號不可洗掉」——「記號(定位標記)不可洗掉」是正確的,但「清潔方式」上,放射性皮膚炎護理多建議「以『溫清水』輕柔清洗、避免肥皂搓揉與摩擦」,使用肥皂(即使中性)仍可能刺激脆弱皮膚,故本題以B為「錯誤(較不適當)」敘述。整體原則:照射區只以溫清水輕拍清潔、保持乾燥、穿寬鬆棉質衣、勿搓揉抓癢、勿用酒精/碘酒、防曬、避免冷熱刺激。","options":{"A":"照射區避免曝曬陽光、外出遮陽,正確。","B":"正解(本題列為錯誤)。放射皮膚宜僅以清水輕拍清潔、避免肥皂搓揉;記號不可洗掉部分則正確。","C":"濕性脫屑依醫囑使用氧化鋅護理,正確。","D":"照射區不可冰敷或熱敷(避免溫度刺激),正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"107110-N3-23":{"quick":"鼻咽癌與抽菸、亞硝酸醃漬食物、EB病毒相關;「吃檳榔」與口腔癌最相關,與鼻咽癌「最不相關」,故選C。","detail":{"background":"鼻咽癌的常見致病危險因子:A「抽菸」相關(菸害);B「食物含亞硝酸(醃漬、鹹魚、煙燻食物的亞硝胺)」相關(華南地區鼻咽癌高發與飲食相關);D「感染EB病毒」相關(最重要病毒因子)。C「吃檳榔」與鼻咽癌「最不相關」——「檳榔(含檳榔鹼、亞硝胺)」是「口腔癌、口咽癌」最主要的危險因子(檳榔直接接觸口腔黏膜),而鼻咽位於鼻腔後方,檳榔的接觸與致癌效應主要在口腔,與鼻咽癌關聯最弱。故此題問「最不相關」選C。記憶:檳榔=口腔癌;EB病毒+醃漬食物=鼻咽癌。","options":{"A":"抽菸是鼻咽癌危險因子,相關。","B":"亞硝酸醃漬食物與鼻咽癌相關。","C":"正解(最不相關)。吃檳榔與口腔癌最相關,與鼻咽癌關聯最弱。","D":"EB病毒是鼻咽癌最重要的病毒因子,相關。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"107110-N3-24":{"quick":"放療期口腔黏膜炎、吞嚥痛,應採「軟質、溫和、易吞」飲食;不宜「鼓勵高纖(粗糙)食物」刮傷黏膜,故B錯誤。","detail":{"background":"鼻咽癌放療護理:A「治療前先處理牙齒和口腔問題(拔除壞牙、治療蛀牙)」正確——頭頸放療後因唾液減少與血流受損,易發生「放射性骨壞死(osteoradionecrosis)」,故必須在放療「前」完成牙科處理;C「鼓勵做張口運動」正確(預防顳顎關節纖維化、張口受限);D「保持口腔清潔(軟毛牙刷、含鹽/小蘇打漱口水)」正確(預防口腔黏膜炎與感染)。B「鼓勵進食高纖食物」為「錯誤」——放療造成口乾、口腔/咽喉黏膜炎、吞嚥疼痛,應提供「軟質、滑潤、溫涼、易吞嚥」的食物,「高纖、粗糙、堅硬、刺激性(辛辣、過酸、過燙)」食物會「刮傷、刺激」脆弱的黏膜、加重疼痛與潰瘍。故B為錯誤指導。","options":{"A":"放療前先處理牙齒口腔問題防放射性骨壞死,正確。","B":"正解(錯誤敘述)。放療期應軟質易吞食物,高纖粗糙會刮傷黏膜。","C":"鼓勵張口運動防顳顎關節纖維化,正確。","D":"保持口腔清潔預防黏膜炎與感染,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"108110-N3-20":{"quick":"鼻咽癌血清「EB病毒抗體指數會升高(高)」,故D「指數高」為正確;此題答案D因選項措辭——應確認EBV指數升高方向。本題官方以D列錯,係指其敘述方式。","detail":{"background":"鼻咽癌的病理特性:A「為上皮細胞癌」正確(鼻咽上皮的鱗狀/未分化癌);B「與遺傳有關」正確(華南、廣東人種好發,具家族聚集與HLA相關);C「長期吸菸為致癌因子」正確。關於「血清EB病毒指數」——鼻咽癌病人血清的「EBV抗體效價(VCA-IgA、EA-IgA)與EBV DNA」確實會「升高」,可作為診斷與追蹤指標。本題官方答案為D,係因選項僅寫「血清EB病毒指數高」而未說明其臨床意義或表述被視為不夠精確而列為錯誤敘述;但就臨床事實而言,鼻咽癌病人EBV相關血清指標確會升高。應掌握的重點:鼻咽癌與EBV高度相關、可測血清EBV抗體/DNA輔助診斷。","options":{"A":"鼻咽癌為上皮細胞(鱗狀/未分化)癌,正確。","B":"鼻咽癌與遺傳(華南人種、家族聚集)有關,正確。","C":"長期吸菸為致癌因子,正確。","D":"正解(本題列為錯誤)。臨床上鼻咽癌病人血清EBV抗體/DNA確會升高、可輔助診斷。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"109030-N3-22":{"quick":"感染過EB病毒「不等於」一定罹患鼻咽癌(EBV感染極普遍),故A「感染就會罹癌」錯誤。","detail":{"background":"鼻咽癌病理學:B「病人血清中EB病毒抗體效價高」正確(可作診斷追蹤);C「第六對染色體有異常基因組者罹病率較高」正確(與HLA等位於第6號染色體的遺傳易感基因相關);D「鼻咽癌為上皮性癌」正確。A「曾感染EB病毒的人就會罹患鼻咽癌」為「錯誤」——EB病毒感染在全球「極為普遍」(超過9成成人曾感染EBV),但「絕大多數感染者並不會」得鼻咽癌;鼻咽癌是EBV感染「加上」遺傳易感性與環境因子(醃漬食物、抽菸)「共同作用」的結果,EBV是「必要但非充分」條件。故A以「感染就會罹癌」為錯誤(過度推論)。","options":{"A":"正解(錯誤敘述)。EBV感染極普遍,絕大多數感染者不會罹患鼻咽癌。","B":"病人血清EBV抗體效價高,可輔助診斷,正確。","C":"第6號染色體遺傳易感(HLA等)者罹病率高,正確。","D":"鼻咽癌為上皮性癌,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"111110-N3-24":{"quick":"鼻咽癌放療療程須「連續、不可隨意中斷」(中斷會降低療效),D敘述「連續6~7週不間斷」本身正確;此題以D列錯係指其他細節,但臨床放療確應連續完成,中斷影響療效。","detail":{"background":"鼻咽癌放射線治療:A「放射線治療為主要治療方式」正確(鼻咽癌對放療敏感,放療(±化療)是首選);B「治療前評估聽力」正確(放療可能影響聽力,且腫瘤本身造成中耳積液);C「治療前先處理蛀牙」正確(防放射性骨壞死)。D「連續6~7週不間斷地放射線治療」——就「放療應連續、規律完成、避免無故中斷以維持療效」而言是正確觀念。本題官方將D列為「錯誤」敘述,可能因選項表述(如把療程細節絕對化)被認定不精確;臨床上鼻咽癌標準放療療程約6.5~7週、每週5次,應「儘量連續完成」,若因急性副作用(嚴重黏膜炎)需暫停,亦會盡快恢復以免延長總治療時間降低控制率。掌握重點:放療為主、療程約7週、應連續規律完成。","options":{"A":"放射線治療是鼻咽癌主要治療方式,正確。","B":"放療前評估聽力(腫瘤與放療皆可影響),正確。","C":"放療前先處理蛀牙防放射性骨壞死,正確。","D":"正解(本題列為錯誤)。臨床放療療程約6~7週應連續完成、避免無故中斷以維持療效。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"112110-N3-22":{"quick":"放療期口腔黏膜炎,漱口水「不可含酒精」(刺激乾燥黏膜),應用溫和(鹽水/小蘇打水)漱口,故B錯誤。","detail":{"background":"鼻咽癌放療護理指導:A「避免冰敷或熱敷治療部位皮膚」正確(避免溫度刺激受損皮膚);C「治療期間多做張口及咀嚼運動」正確(防顳顎關節纖維化與張口受限);D「多增加水分攝取」正確(緩解口乾、黏膜炎)。B「用『含酒精』漱口水以保持口腔清潔」為「錯誤」——放療造成口乾與口腔黏膜炎,黏膜脆弱乾燥,「含酒精的漱口水」會刺激、灼燒、更加乾燥黏膜並加重疼痛;應改用「溫和、不含酒精」的漱口水(如生理食鹽水、小蘇打水/碳酸氫鈉水)頻繁漱口清潔。故B為錯誤指導。","options":{"A":"避免冰敷或熱敷照射區皮膚(防溫度刺激),正確。","B":"正解(錯誤指導)。應用不含酒精的溫和漱口水(鹽水/小蘇打),含酒精會刺激乾燥黏膜。","C":"多做張口及咀嚼運動防顳顎關節纖維化,正確。","D":"多增加水分攝取緩解口乾黏膜炎,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"115030-N3-14":{"quick":"與鼻咽癌相關的病毒是「EB病毒(Epstein-Barr virus)」,故選A。","detail":{"background":"鼻咽癌(NPC)與「EB病毒(Epstein-Barr virus, EBV)」感染密切相關——EBV感染鼻咽上皮細胞,加上遺傳與環境(醃漬食物亞硝胺、抽菸)共同致癌;血清EBV抗體(VCA-IgA、EA-IgA)與EBV DNA可作篩檢與追蹤,故選A。其餘病毒與鼻咽癌無關:B「COVID-19(SARS-CoV-2冠狀病毒)」造成新冠肺炎呼吸道感染;C「A型流感病毒」、D「B型流感病毒」造成流行性感冒。記憶常考的病毒-癌症配對:EBV→鼻咽癌(及Burkitt淋巴瘤);HPV→子宮頸癌/口咽癌;HBV/HCV→肝癌;HTLV-1→成人T細胞白血病;HHV-8→Kaposi肉瘤。故鼻咽癌=EB病毒。","options":{"A":"正解。鼻咽癌與EB病毒(EBV)感染密切相關。","B":"COVID-19病毒造成新冠肺炎,與鼻咽癌無關,錯誤。","C":"A型流感病毒造成流感,非鼻咽癌,錯誤。","D":"B型流感病毒造成流感,非鼻咽癌,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"101110-N3-53":{"quick":"全喉切除術後是經「永久性氣管造口」呼吸、由口進食(食道與氣道已分開),不需終身鼻胃管,故D錯誤。","detail":{"background":"喉癌(laryngeal cancer)A正確——絕大多數為「鱗狀細胞癌(squamous cell carcinoma)」;B正確——「長期抽菸、喝酒」是主要危險因子(菸酒有加乘作用);C正確——「內生性(聲門型)喉癌因侵犯真聲帶,早期即出現『聲音嘶啞』」是重要早期警訊。D「全喉切除手術後需終身使用鼻胃管灌食」為「錯誤」——全喉切除術(total laryngectomy)切除整個喉部,使「氣道與食道完全分開」,病人改由頸部「永久性氣管造口(永久氣切)」呼吸;傷口癒合後「可由口正常進食吞嚥」(食物經咽進食道、空氣經造口進出,不會嗆到),「不需終身鼻胃管」(鼻胃管只在術後傷口癒合前暫時使用)。故D為錯誤敘述。","options":{"A":"喉癌大多為鱗狀細胞癌,正確。","B":"長期抽菸喝酒是主要危險因子,正確。","C":"內生性(聲門型)喉癌早期出現聲音嘶啞,正確。","D":"正解(錯誤敘述)。全喉切除後由口進食、經氣管造口呼吸,不需終身鼻胃管。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"101110-N3-64":{"quick":"根除性頸部切開術後復健是針對「肩頸與手臂功能」(因切除胸鎖乳突肌/犧牲副神經);「臥床抬臀」是訓練下肢/臀部,與肩頸復健無關,故B錯誤。","detail":{"background":"根除性頸部淋巴廓清術(radical neck dissection)會切除頸部淋巴結、胸鎖乳突肌、頸內靜脈,常犧牲「第十一對腦神經(副神經, spinal accessory nerve)」,導致「斜方肌無力、肩膀下垂、肩關節活動受限與疼痛」。術後復健重點在「促進肩、頸、手臂功能恢復」:A「頭頸部旋轉」正確(維持頸部活動度);C「左右擺動手臂」正確(維持肩關節活動、防沾黏僵硬);D「擴胸及伸展肩部」正確(強化肩胛、斜方肌,改善肩下垂)。B「臥床抬臀(橋式)」為「錯誤」——抬臀運動訓練的是「臀部、下背與下肢」肌力,與「肩頸部功能恢復」無關,不屬於此手術的復健項目。故B為錯誤的復健運動。","options":{"A":"頭頸部旋轉維持頸部活動度,正確。","B":"正解(錯誤敘述)。抬臀訓練臀部下肢,與肩頸復健無關。","C":"左右擺動手臂維持肩關節活動,正確。","D":"擴胸及伸展肩部改善肩下垂,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"102030-N3-25":{"quick":"頭頸放療破壞唾液腺造成口乾,病人「隨身帶水」是已了解口乾照護,故A正確(顯示衛教有效)。","detail":{"background":"喉癌放射治療的衛教成效評值(找出「正確」、顯示病人已了解者):A「放射治療後會口乾應隨身帶水」正確——頭頸部放療破壞唾液腺造成「口乾(xerostomia)」,病人知道隨身帶水緩解口乾、潤滑口腔,顯示衛教有效。B「會拉肚子」錯——腹瀉是「腹部/骨盆」放療的副作用,頭頸部放療不會造成腹瀉(局部副作用是黏膜炎、口乾、皮膚炎)。C「酒精性漱口水有助清潔口腔潰瘍」錯——含酒精漱口水會刺激、灼燒脆弱黏膜與潰瘍,應用「不含酒精」的溫和漱口水。D「使用乳液護理照射部位皮膚」錯——放療照射區皮膚應「保持乾燥、僅以清水輕拍清潔」,「不可自行塗抹乳液、油膏、爽身粉」(除非醫囑指定),以免影響放射劑量分佈與刺激皮膚。故A正確。","options":{"A":"正解。放療後口乾、隨身帶水緩解,顯示病人已了解口乾照護,衛教有效。","B":"腹瀉是腹部/骨盆放療副作用,頭頸放療不會,錯誤。","C":"含酒精漱口水刺激黏膜潰瘍,應用無酒精溫和漱口水,錯誤。","D":"照射區皮膚不可自行塗乳液(除非醫囑),應保持乾燥清水清潔,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"104100-N3-23":{"quick":"全喉切除術不慎傷及甲狀腺/副甲狀腺會造成「血鈣『過低』(低血鈣)」,故D「血鈣過高」錯誤。","detail":{"background":"喉癌全喉切除術後的合併症:A「術後48小時內易發生出血」正確(早期出血為重要併發症,須觀察造口與引流);B「頸部及臉部易引起皮下氣腫」正確(空氣經氣管造口或縫合處進入皮下組織);C「氣管內管分泌物結痂導致呼吸困難」正確(造口分泌物乾燥結痂阻塞氣道,需濕化、抽吸、清潔)。D「不慎切除甲狀腺導致血鈣『過高』」為「錯誤」——頸部手術若傷及或切除「副甲狀腺(parathyroid gland)」(緊鄰甲狀腺後方),會使副甲狀腺素分泌不足,造成「血鈣『過低』(hypocalcemia)」,病人可出現口周麻木、手足抽搐(Trousseau/Chvostek徵象)、痙攣;而非血鈣過高。故D方向錯誤。","options":{"A":"術後48小時內易出血,須密切觀察,正確。","B":"空氣經造口或縫合處進入皮下造成皮下氣腫,正確。","C":"造口分泌物結痂阻塞氣道致呼吸困難,正確。","D":"正解(錯誤敘述)。傷及副甲狀腺造成低血鈣,非血鈣過高。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"106110-N3-24":{"quick":"聲門「上」喉癌淋巴引流豐富,「較易(非較少)」發生頸部淋巴轉移,故D「較少淋巴轉移」錯誤。","detail":{"background":"喉癌依部位分聲門上(supraglottic)、聲門(glottic)、聲門下(subglottic):A「大多屬鱗狀細胞癌」正確;B「長期抽菸為致病因素」正確;C「聲音嘶啞為(聲門型)喉癌早期症狀」正確(聲帶受侵早期即沙啞)。D「聲門上喉癌『較少』發生淋巴轉移」為「錯誤」——「聲門上區(會厭、假聲帶等)淋巴管豐富」,癌細胞「容易、較早」發生「頸部淋巴結轉移」;反而「聲門區(真聲帶)淋巴引流稀少,轉移較晚、預後相對較好,但早期即沙啞」。故聲門上喉癌是「較易」淋巴轉移,D敘述相反為錯誤。記憶:聲門上=淋巴多、易轉移、症狀晚;聲門=淋巴少、轉移晚、早期沙啞。","options":{"A":"喉癌大多為鱗狀細胞癌,正確。","B":"長期抽菸為致病因素,正確。","C":"聲音嘶啞為聲門型喉癌早期症狀,正確。","D":"正解(錯誤敘述)。聲門上區淋巴豐富,較易發生頸部淋巴轉移,非較少。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"106111-N3-24":{"quick":"全喉切除後吞嚥與消化道功能正常,「排氣後即可進食(經口或鼻胃管)」與「拔鼻胃管」時機應依傷口癒合而定;C「排氣後即可拔除鼻胃管」過早,錯誤。","detail":{"background":"全喉切除術後護理:A「採半坐臥減輕傷口腫脹」正確(抬高頭部利引流消腫);B「坐起時以手支托後頸」正確(支撐頭頸、避免頸部過度伸張牽扯傷口縫線);D「增加飲食的色、香、味以彌補嗅覺減弱」正確——全喉切除後改由氣管造口呼吸,空氣不再經鼻腔,「嗅覺減弱」連帶影響味覺,故以「視覺(色)、口感與調味」增進食慾。C「排氣後即可拔除鼻胃管」為「錯誤」——鼻胃管的拔除應在「咽部手術『傷口癒合』、確認可安全由口吞嚥(無瘻管、無嗆咳)後」才拔除,通常需等數天至一兩週,而非依「排氣(腸蠕動恢復)」就拔(全喉切除不是腸道手術,排氣與咽傷口癒合無關)。過早拔管恐使吞嚥的食物經未癒合傷口形成咽皮瘻管。故C為錯誤敘述。","options":{"A":"半坐臥抬高頭部減輕傷口腫脹,正確。","B":"坐起以手支托後頸避免頸部過度伸張,正確。","C":"正解(錯誤敘述)。鼻胃管應待咽傷口癒合、可安全吞嚥後才拔,非排氣即拔。","D":"增加色香味彌補嗅覺味覺減弱,促進食慾,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"108020-N3-10":{"quick":"口腔癌好發於「舌側緣/舌後外側、頰黏膜、口腔底」等部位,並非「舌頭前端三分之一」,故B錯誤。","detail":{"background":"口腔癌(oral cancer):A「鱗狀細胞癌最常見」正確;C「會有黏膜白斑症(leukoplakia)之癌前病灶」正確;D「早期常見口腔出現紅斑(erythroplakia,紅斑比白斑更具惡性潛能)」正確,以及不癒合潰瘍、硬塊。B「好發舌頭前端三分之一」為「錯誤」——舌癌好發於「舌側緣、舌腹與舌後外側(舌的中後段側面)」,而非「舌頭前端(舌尖)三分之一」(舌尖部相對少見);頰黏膜癌則與檳榔咀嚼處相關。故B的好發部位敘述錯誤。台灣口腔癌與「檳榔、菸、酒」高度相關,好發中年男性。","options":{"A":"口腔癌以鱗狀細胞癌最常見,正確。","B":"正解(錯誤敘述)。舌癌好發舌側緣/後外側,非舌頭前端三分之一。","C":"會有黏膜白斑症(leukoplakia)癌前病灶,正確。","D":"早期可見紅斑(erythroplakia,惡性潛能高),正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"108020-N3-24":{"quick":"聲門「上」喉部分切除術保留聲帶,「術後仍可發聲」,故B「無法發聲」錯誤(無法發聲是『全』喉切除)。","detail":{"background":"喉癌手術後發聲與吞嚥:A「聲門上喉切除術後2週內可能吞嚥困難」正確——切除會厭等聲門上構造後,喉部保護氣道的機制受影響,早期易「吞嚥困難或嗆咳(誤吸)」,需吞嚥訓練。C「部分喉切除術(如垂直半喉切除)保留一側聲帶,術後可能聲音沙啞」正確。D「部分喉切除術後可以(逐漸恢復)正常吞嚥」正確(保留部分喉結構,吞嚥功能可訓練恢復)。B「聲門上喉切除術後『無法發聲』」為「錯誤」——「聲門上喉切除術(supraglottic laryngectomy)」切除的是會厭等聲門「上」結構,「保留了真聲帶」,故「術後仍能發聲」(只是吞嚥保護較差);「無法發聲」是「『全』喉切除術(切除整個喉含聲帶)」的結果。故B把聲門上切除誤為無法發聲,錯誤。","options":{"A":"聲門上喉切除術後2週內可能吞嚥困難(誤吸),正確。","B":"正解(錯誤敘述)。聲門上切除保留聲帶仍可發聲;無法發聲是全喉切除。","C":"部分喉切除保留一側聲帶,術後可能沙啞,正確。","D":"部分喉切除術後吞嚥功能可訓練恢復,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"108110-N3-21":{"quick":"外生性(聲門上型)喉癌淋巴引流豐富,「易發生頸部淋巴轉移、頸部淋巴結腫大」,故A正確。","detail":{"background":"喉癌依生長型態與部位:「外生性(向腔內突出,多為聲門『上』型)」與「內生性(浸潤型,多為聲門/聲帶型)」。A正確——「外生性(聲門上型)喉癌因該區淋巴管豐富,易發生『頸部淋巴轉移』、頸部淋巴結腫大」。B錯——「聲音嘶啞、喉部異物感」是「聲門(聲帶)型/內生性」的早期症狀(聲帶受侵即沙啞),非外生性聲門上型的典型早期表現(聲門上型早期多為喉部異物感、吞嚥不適,沙啞較晚)。C錯——「內生性(聲門型)喉癌早期症狀是『聲音嘶啞』」而非「吞嚥喉痛灼熱」。D錯——「內生性(聲門型)喉癌好發於『真聲帶』」,而非「真聲帶以外其他部位」。故A正確。","options":{"A":"正解。外生性(聲門上型)喉癌淋巴豐富,易頸部淋巴轉移、淋巴結腫大。","B":"聲音嘶啞、喉異物感是聲門型/內生性的表現,非外生性,錯誤。","C":"內生性(聲門型)早期是聲音嘶啞,非吞嚥喉痛灼熱,錯誤。","D":"內生性喉癌好發於真聲帶,非真聲帶以外,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"109030-N3-24":{"quick":"全喉切除術後首要是維持呼吸道通暢、利造口分泌物引流,應採「半坐臥」而非「側臥」,故B錯誤。","detail":{"background":"喉癌全喉切除術後護理處置:A「維持呼吸道通暢為首要目標」正確(永久氣管造口,須抽吸、濕化、防分泌物結痂阻塞,為最優先);C「病人坐起時以手支托後頸」正確(支撐頭頸、避免縫線牽扯);D「傷口癒合前由鼻胃管補充營養」正確(咽部傷口未癒前暫由鼻胃管餵食,避免食物經傷口形成瘻管)。B「協助採取側臥式」為「錯誤」——全喉切除術後應採「半坐臥(Fowler位)」以利「氣管造口分泌物引流、減輕傷口腫脹、維持呼吸道通暢」;「側臥」並非首選臥位(不利造口引流與呼吸觀察)。故B為錯誤處置。","options":{"A":"維持呼吸道通暢為術後首要目標,正確。","B":"正解(錯誤敘述)。應採半坐臥利造口引流與呼吸,非側臥。","C":"坐起時以手支托後頸避免牽扯縫線,正確。","D":"傷口癒合前由鼻胃管補充營養防咽瘻管,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"109110-N3-14":{"quick":"舌癌是口腔癌中「預後最差」的一種,故B正確;舌癌屬鱗狀細胞癌、好發舌側緣後段、男性居多。","detail":{"background":"舌癌(tongue cancer):A「通常屬於基底細胞癌」錯——舌癌絕大多數是「鱗狀細胞癌」(基底細胞癌好發於皮膚,如臉部,非舌頭)。B「口腔腫瘤中預後最差的一種」正確——舌(尤其舌根/後段)血流與淋巴豐富,易早期深層浸潤與「頸部淋巴轉移」,加上舌部活動使腫瘤擴散,故舌癌在口腔癌中「預後相對較差」。C「大多發生於舌頭前段」錯——舌癌好發於「舌側緣中後段、舌腹」,非舌尖前段。D「好發於中年以後的女性」錯——口腔癌(含舌癌)與菸酒檳榔相關,「好發中年以後『男性』」。故B正確。","options":{"A":"舌癌絕大多數為鱗狀細胞癌,非基底細胞癌,錯誤。","B":"正解。舌癌淋巴血流豐富易轉移,是口腔腫瘤中預後最差者。","C":"舌癌好發於舌側緣中後段,非舌頭前段,錯誤。","D":"口腔癌好發中年以後男性(菸酒檳榔),非女性,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"110030-N3-12":{"quick":"口腔癌術後(頭頸大手術)首要護理是「維持呼吸道通暢」,故C正確。","detail":{"background":"口腔癌敘述判斷(找正確):A「早期症狀為口腔『疼痛』且不易癒合的潰瘍」——不完全正確:口腔癌早期潰瘍/硬塊常「『不痛(無痛)』、超過2週不癒合」是重要警訊(疼痛多在較晚期或潰瘍變大時才出現),故以「疼痛」描述早期不夠精確。B「細胞學上以『腺癌』最常見」錯——口腔癌以「鱗狀細胞癌」最常見(腺癌多見於唾液腺)。C「術後優先護理措施是維持呼吸道通暢」正確——口腔癌頭頸部大手術(含游離皮瓣重建、頸部淋巴廓清)後,組織腫脹、分泌物多、可能氣切,「維持呼吸道通暢」是術後最優先;D「最常發生的部位為『口腔底』」錯——口腔癌在台灣好發於「頰黏膜、舌(側緣)」(與檳榔接觸處),口腔底並非最常見。故C正確。","options":{"A":"口腔癌早期潰瘍/硬塊常無痛、逾2週不癒,以「疼痛」描述早期不夠精確,錯誤。","B":"口腔癌以鱗狀細胞癌最常見,非腺癌,錯誤。","C":"正解。頭頸大手術後優先維持呼吸道通暢。","D":"好發於頰黏膜、舌側緣(檳榔接觸處),非口腔底最多,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"112030-N3-15":{"quick":"口腔黏膜「出血」並非口腔癌的『前驅(早期)』症狀;前驅是白斑、紅斑、不癒潰瘍/硬塊,故B錯誤。","detail":{"background":"口腔癌敘述判斷(找錯誤):A「危險因子包括壓力、不良口腔衛生及抽菸喝酒吃檳榔」正確(台灣以菸酒檳榔為主因);C「紅斑(紅斑瘤erythroplakia)有高比例(約90%)會變成或已是鱗狀細胞癌」正確(紅斑比白斑惡性潛能更高);D「多見於舌頭及頰黏膜等部位」正確。B「黏膜『出血』可視為口腔癌的『前驅』症狀」為「錯誤」——口腔癌的「前驅(癌前/早期)」病變是「白斑(leukoplakia)、紅斑(erythroplakia)、超過2週不癒合的潰瘍或硬塊、黏膜變粗變硬、張口受限」;「黏膜出血」通常是「較晚期、腫瘤潰爛侵蝕血管」時才出現,不屬於前驅(早期)症狀。故B為錯誤敘述。","options":{"A":"危險因子含壓力、不良口腔衛生、菸酒檳榔,正確。","B":"正解(錯誤敘述)。黏膜出血是較晚期表現,非前驅症狀;前驅是白斑紅斑不癒潰瘍。","C":"紅斑(erythroplakia)高比例為/變成鱗狀細胞癌,正確。","D":"口腔癌多見於舌及頰黏膜,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"112030-N3-24":{"quick":"全喉切除術後嗅覺喪失(空氣不經鼻),連帶味覺也受影響;A造口為永久、C適合晚期、D無法正常發聲皆錯,正確者需重判——本題答案B,但「不影響味覺」不精確,係相對其他更錯選項而選B。","detail":{"background":"全喉切除術敘述判斷:A「氣管造口為『暫時性』」錯——全喉切除是切除整個喉、氣道與食道永久分開,氣管造口是「『永久性』」的。C「適合『第一、二期』喉癌」錯——早期(第一、二期)喉癌多以「放射治療或部分喉切除」即可保留發聲,「全喉切除」主要用於「晚期(第三、四期)或復發」的喉癌。D「術後仍可恢復正常的發聲功能」錯——全喉切除切除了聲帶,「無法以原本聲帶正常發聲」,須學習「食道語、電子喉或氣管食道穿刺發聲」等替代發聲法。B「術後嗅覺喪失,但不影響味覺」為本題官方所選——全喉切除後空氣經造口進出、不再經鼻腔,故「嗅覺喪失」正確;嚴格說嗅覺喪失會「連帶減弱味覺」,但相對於A、C、D的明顯錯誤,B以「嗅覺喪失」此一正確核心而被選為正確敘述(味覺部分為其相對較小瑕疵)。掌握重點:全喉切除=永久造口、晚期使用、無法正常發聲、嗅覺喪失。","options":{"A":"氣管造口為永久性,非暫時性,錯誤。","B":"正解(本題選此)。全喉切除後空氣不經鼻致嗅覺喪失(味覺亦連帶受影響)。","C":"全喉切除用於晚期/復發喉癌,非第一二期,錯誤。","D":"切除聲帶後無法正常發聲,須食道語/電子喉,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"112110-N3-23":{"quick":"永久喉切除管/氣管造口病人洗澡須防水進入造口,不宜用「壁掛式淋浴(水柱朝向造口)」,故D不適宜。","detail":{"background":"永久性喉切除管(氣管造口)病人出院護理:A「每天以濕毛巾清潔造口周圍皮膚」正確;B「坐起或翻身時以手托後頸、避免頸部過度伸張」正確(保護傷口縫線);C「咳嗽或打噴嚏時用手帕蓋住造口、另一手掩住嘴巴」正確(造口是主要氣流出入口,咳嗽分泌物會從造口噴出,需遮蓋)。D「鼓勵採用固定於牆上的『壁掛式淋浴設備』」為「不適宜」——氣管造口直接通氣道,「最怕水進入造口造成嗆入、嗆咳甚至溺水/吸入性肺炎」;洗澡時應「防止水流入造口」(可用造口護罩/圍兜、改用手持式蓮蓬頭由下往上、避免水柱直接朝向頸部造口),固定在牆上的壁掛式淋浴水柱方向固定、易使水濺入造口,故不適宜。應使用「可調整方向的手持式蓮蓬頭」並遮蓋造口。故D不適宜。","options":{"A":"每天以濕毛巾清潔造口周圍皮膚,適宜。","B":"坐起翻身以手托後頸避免頸部過度伸張,適宜。","C":"咳嗽打噴嚏蓋住造口與嘴巴,適宜。","D":"正解(不適宜)。壁掛式淋浴水柱易濺入造口致嗆入,應用手持蓮蓬頭並遮蓋造口。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"112180-N3-16":{"quick":"全喉切除術後約「2~4週」傷口癒合後可開始語言(替代發聲)復健,故D正確。","detail":{"background":"全喉切除術後護理指導(找正確):A「術後頸部應採『過度伸張』姿勢」錯——應「避免頸部過度伸張」(過度伸張會牽扯縫線、使傷口張力大、影響癒合),宜保持頸部中立、坐起時以手托後頸。B「術後第3天可教導病人開始吞嚥」錯——咽部傷口需「癒合(約7~10天以上、確認無瘻管)」才可開始由口吞嚥,過早(第3天)恐致咽皮瘻管。C「不鼓勵咳出痰液,一律從氣切口抽吸」錯——應「鼓勵病人有效咳嗽」自行咳出造口分泌物,「抽吸是輔助」(無法自咳或痰多時才抽吸),不可一律靠抽吸(過度抽吸會傷黏膜)。D「術後約2~4週可開始進行語言復健」正確——待傷口癒合穩定(約2~4週)後,可開始學習「食道語、電子喉或氣管食道穿刺發聲」等替代發聲方式。故D正確。","options":{"A":"應避免頸部過度伸張(防牽扯縫線),非過度伸張,錯誤。","B":"咽傷口癒合後(約7~10天以上)才可吞嚥,第3天過早,錯誤。","C":"應鼓勵自行咳出分泌物、抽吸為輔助,非一律抽吸,錯誤。","D":"正解。術後約2~4週傷口癒合後可開始語言(替代發聲)復健。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"114170-N3-8":{"quick":"頸部淋巴廓清術後需做「漸進性肩頸復健運動」防僵硬與肩下垂,不可「固定肩膀不動」,故A最不適當。","detail":{"background":"口腔癌根除性頸部淋巴廓清術後照護(選最不適當):B「每日評估傷口、依情況以無菌技術換藥」適當;C「開始進食時先採清流質、軟質飲食」適當(漸進、減少傷口刺激與嗆咳);D「必要時行氣管造口術以利痰液抽吸」適當(頭頸大手術腫脹可能影響呼吸道)。A「術後須固定肩膀不動」為「最不適當」——根除性頸部廓清常犧牲「副神經(CN XI)」造成斜方肌無力、肩下垂與肩關節僵硬疼痛,術後(傷口穩定後)應「漸進性進行肩頸與手臂的復健運動(頭頸旋轉、擺臂、擴胸、肩部伸展)」以維持關節活動、預防僵硬沾黏與肩功能障礙;「固定肩膀不動」反而會造成關節僵硬、肩周炎、功能喪失。故A最不適當。","options":{"A":"正解(最不適當)。應做漸進肩頸復健防僵硬肩下垂,不可固定肩膀不動。","B":"每日評估傷口、無菌技術換藥,適當。","C":"進食先採清流質、軟質飲食,適當。","D":"必要時氣管造口以利痰液抽吸,適當。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"115030-N3-8":{"quick":"口腔癌以「鱗狀上皮細胞癌」最常見,故B正確。","detail":{"background":"口腔癌敘述判斷(找正確):A「發生部位以『上顎黏膜』最多」錯——台灣口腔癌好發於「頰黏膜、舌(側緣)、牙齦、口腔底」等與檳榔接觸的部位,上顎(硬顎)並非最多。B「以鱗狀上皮細胞癌最常見」正確(口腔癌約9成為鱗狀細胞癌)。C「咀嚼不順為常見『早期』徵象」錯——早期徵象是「白斑、紅斑、超過2週不癒合的潰瘍或硬塊、黏膜變粗硬」;咀嚼不順、張口受限多屬「較晚期」(腫瘤變大、侵犯肌肉或顳顎)。D「口腔有無痛且不易癒合的潰瘍為常見『晚期』徵象」錯——「無痛、不易癒合(>2週)的潰瘍/硬塊」恰恰是口腔癌的「『早期』」重要警訊,而非晚期。故B正確。","options":{"A":"口腔癌好發於頰黏膜、舌側緣等檳榔接觸處,非上顎最多,錯誤。","B":"正解。口腔癌以鱗狀上皮細胞癌最常見(約9成)。","C":"咀嚼不順、張口受限多屬較晚期,非早期徵象,錯誤。","D":"無痛不癒潰瘍是早期警訊,非晚期徵象,錯誤。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","NCCN Head and Neck Cancers Guideline"]}},"103030-N3-27":{"quick":"扁桃腺切除術後應「避免用力咳嗽、清喉嚨」以防傷口出血,故C「用力咳嗽促進分泌物排出」錯誤。","detail":{"background":"扁桃腺切除術(tonsillectomy)後的護理重點是「預防出血」(扁桃腺窩血管豐富、傷口暴露在咽喉)。A「禁食至清醒後才進食、初期給冰冷流質(避免熱食)」正確——術後麻醉清醒前禁食防嗆,清醒後先給「冰冷流質」(冷可使血管收縮止血、減輕疼痛腫脹);B「冰敷兩側上頸部24小時」正確(冷敷頸部血管收縮、減少出血腫脹疼痛);D「觀察吞嚥動作,頻繁吞嚥可能有出血現象」正確——病人若「不自主、頻繁吞嚥」常是「血液流到咽部被吞下」的出血徵象,須警覺。C「用力咳嗽以促進分泌物排出」為「錯誤」——術後應「避免用力咳嗽、清喉嚨、大力擤鼻或說話」,因為這些動作會增加咽喉壓力、摩擦傷口而「誘發出血」;應輕聲、減少喉部刺激。故C為錯誤護理。","options":{"A":"清醒後初期給冰冷流質(冷可收縮血管止血),正確。","B":"冰敷兩側上頸部使血管收縮、減少出血腫脹,正確。","C":"正解(錯誤敘述)。應避免用力咳嗽清喉,以防摩擦傷口出血。","D":"頻繁吞嚥動作可能是血液被吞下的出血徵象,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Tonsillectomy Clinical Practice Guideline"]}},"105030-N3-23":{"quick":"扁桃腺炎最常見的致病菌是「(β-溶血性)鏈球菌」,故選D。","detail":{"background":"急性扁桃腺炎(acute tonsillitis)最常見的「細菌性」致病菌是「A群β-溶血性鏈球菌(Group A β-hemolytic streptococcus, GAS, Streptococcus pyogenes)」,選D。鏈球菌性咽扁桃腺炎典型有「高燒、喉嚨痛、吞嚥痛、扁桃腺紅腫化膿(白色滲出物)、頸部淋巴結腫痛」,須以抗生素(penicillin/amoxicillin)足療程治療,以預防併發症(風濕熱、急性腎絲球腎炎)。區辨其他選項:A「結核桿菌」造成肺結核;B「披衣菌(chlamydia)」造成非典型肺炎、砂眼、性病;C「克雷伯氏桿菌(Klebsiella)」造成肺炎、泌尿道感染。故扁桃腺炎=鏈球菌。","options":{"A":"結核桿菌造成肺結核,非扁桃腺炎主因,錯誤。","B":"披衣菌造成非典型肺炎/砂眼/性病,非扁桃腺炎,錯誤。","C":"克雷伯氏桿菌造成肺炎/泌尿道感染,非扁桃腺炎,錯誤。","D":"正解。扁桃腺炎最常見致病菌為(β-溶血性)鏈球菌。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Tonsillectomy Clinical Practice Guideline"]}},"105090-N3-23":{"quick":"扁桃腺切除術後初期應給「冰冷流質」,但須待麻醉清醒後;B「術後即可進食冰冷流質」未提清醒、措辭不當,為錯誤。","detail":{"background":"扁桃腺切除術後護理:A「冰敷兩側上頸部」正確(血管收縮、減少出血腫脹疼痛);C「勿用力咳嗽」正確(避免摩擦傷口出血);D「觀察是否經常有吞嚥動作」正確(頻繁吞嚥=血液被吞下的出血警訊)。B「術後即可進食冰冷流質食物」為「錯誤」——術後須先「禁食至麻醉完全清醒、吞嚥反射恢復」後,才能開始進食「冰冷流質」(防嗆入與吸入性肺炎);「術後『即可』(立刻)進食」未待清醒,措辭不當、有嗆入危險。故B為錯誤敘述。另須注意:避免「熱食、紅色/深色飲料(易與血液混淆)、粗糙堅硬、酸辣」食物。","options":{"A":"冰敷兩側上頸部減少出血腫脹疼痛,正確。","B":"正解(錯誤敘述)。應待麻醉清醒、吞嚥反射恢復後才進食冰冷流質,非術後即進食。","C":"勿用力咳嗽避免摩擦傷口出血,正確。","D":"觀察頻繁吞嚥動作(出血警訊),正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Tonsillectomy Clinical Practice Guideline"]}},"107030-N3-24":{"quick":"「一年反覆發作多次(7次以上)」是扁桃腺切除的『適應症』而非禁忌,故選A(不是禁忌者)。","detail":{"background":"扁桃腺切除術的「適應症」與「禁忌」要分清。本題問「『不是』禁忌」者:A「急性扁桃腺炎一年發作7次以上」是「『適應症』」——反覆慢性/復發性扁桃腺炎(如一年≥7次、連續兩年每年≥5次、或三年每年≥3次)是手術指徵,故「不是禁忌」,為本題答案。其餘三者皆為「禁忌」:B「扁桃腺急性發炎期間」是禁忌(發炎期組織充血脆弱、出血風險高、易感染擴散,應待急性炎症消退約2~3週後再手術);C「肺結核活動期病人」是禁忌(活動性感染、全身狀況不宜手術);D「血液惡性疾病(白血病等)病人」是禁忌(凝血/免疫異常、出血與感染風險極高)。故選A。","options":{"A":"正解(不是禁忌)。一年反覆發作多次是扁桃腺切除的適應症。","B":"急性發炎期是禁忌(組織充血脆弱、出血風險高)。","C":"肺結核活動期是禁忌(活動性感染不宜手術)。","D":"血液惡性疾病是禁忌(出血與感染風險高)。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Tonsillectomy Clinical Practice Guideline"]}},"109030-N3-23":{"quick":"扁桃腺切除術後「經常吞嚥」是出血警訊而非正常現象,故C「經常吞嚥是正常的」錯誤。","detail":{"background":"扁桃腺切除術敘述:A「適用於反覆慢性扁桃腺感染病人」正確(反覆發作是適應症);B「不適用於有血液惡性疾病的病人」正確(出血凝血風險高,為禁忌);D「術後可開始進食時,須先進『冷食(冰冷流質)』」正確(冷食使血管收縮止血、減輕疼痛腫脹,避免熱食)。C「術後病人經常有吞嚥動作是正常的」為「錯誤」——術後若病人「不自主地、頻繁地吞嚥」,是「血液流到咽部、被病人反覆吞下」的「出血徵象」,屬危險警訊,須立即檢查咽喉、通報醫師處理,「並非正常現象」。故C為錯誤敘述。","options":{"A":"反覆慢性扁桃腺感染是手術適應症,正確。","B":"血液惡性疾病者出血風險高,不適用(禁忌),正確。","C":"正解(錯誤敘述)。經常吞嚥是血液被吞下的出血警訊,非正常。","D":"術後先進冰冷流質(冷食)止血減痛,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Tonsillectomy Clinical Practice Guideline"]}},"111110-N3-25":{"quick":"急性發炎期『不可』行扁桃腺切除術(應待炎症消退),故A「急性發炎時行手術」錯誤。","detail":{"background":"扁桃腺炎處置:B「用溫食鹽水漱口」正確(溫鹽水漱口清潔、舒緩咽喉、減輕發炎不適);C「冰敷可緩解咽喉部疼痛」正確(冷可收縮血管、減輕疼痛腫脹,術後尤其重要);D「發燒症狀消退後,抗生素仍需使用48~72小時(完成足療程)」正確——鏈球菌性扁桃腺炎抗生素須「服足療程(約10天)」,不可一退燒就停藥(過早停藥易復發並增加風濕熱、腎炎風險)。A「急性發炎時行扁桃腺切除術」為「錯誤」——「急性發炎期『禁止』手術」,因發炎期組織充血、水腫、脆弱,手術「出血風險高、感染易擴散」;應「待急性炎症完全消退(約2~3週後)」再行擇期手術。故A為錯誤處置。","options":{"A":"正解(錯誤敘述)。急性發炎期禁手術,應待炎症消退2~3週後再行。","B":"用溫食鹽水漱口清潔舒緩咽喉,正確。","C":"冰敷收縮血管緩解咽喉疼痛,正確。","D":"退燒後抗生素仍須完成足療程,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Tonsillectomy Clinical Practice Guideline"]}},"114030-N3-15":{"quick":"急性發炎期應「避免」立即手術(待炎症消退),故A「急性發炎期應儘快安排手術」錯誤。","detail":{"background":"扁桃腺切除術敘述:B「術前可用溫食鹽水漱口減輕咽喉不適」正確;C「疑似扁桃腺腫瘤是手術適應症」正確(懷疑惡性需切除送病理化驗);D「術後有持續(頻繁)吞嚥動作時,可能為傷口出血」正確(血液被吞下的出血警訊)。A「急性發炎期時應儘快安排手術」為「錯誤」——「急性發炎期不可立即手術」,因組織充血水腫脆弱、出血與感染擴散風險高,應「先以抗生素控制急性炎症,待炎症消退(約2~3週)後」再擇期手術。故A為錯誤敘述。記憶:扁桃腺切除的禁忌時機=急性發炎期;適應症=反覆感染、疑腫瘤、阻塞性睡眠呼吸中止。","options":{"A":"正解(錯誤敘述)。急性發炎期不可立即手術,應待炎症消退後擇期。","B":"術前用溫食鹽水漱口減輕咽喉不適,正確。","C":"疑似扁桃腺腫瘤是手術適應症(切除送病理),正確。","D":"術後持續(頻繁)吞嚥動作可能是傷口出血,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Tonsillectomy Clinical Practice Guideline"]}},"114170-N3-15":{"quick":"急性發炎期是扁桃腺切除的『禁忌時機』而非最佳時機,故C最不適當。","detail":{"background":"扁桃腺炎敘述判斷(選最不適當):A「急性扁桃腺炎以鏈球菌感染最常見」正確;B「會有發燒、喉嚨痛及吞嚥疼痛的症狀」正確;D「扁桃腺切除術後避免用力咳嗽以預防出血」正確。C「急性發炎期是行扁桃腺切除術的『最佳時機』」為「最不適當(錯誤)」——「急性發炎期是『禁忌』時機」而非最佳時機;發炎期組織充血、水腫、脆弱,手術出血與感染擴散風險高;最佳手術時機是「急性炎症完全消退後(約2~3週)」。故C最不適當。","options":{"A":"急性扁桃腺炎以鏈球菌感染最常見,正確。","B":"有發燒、喉嚨痛、吞嚥疼痛症狀,正確。","C":"正解(最不適當)。急性發炎期是手術禁忌時機,非最佳時機。","D":"術後避免用力咳嗽以預防出血,正確。"},"sources":["新文京《內外科護理學》眼耳鼻喉系統","華杏《新編內外科護理學》","AAO-HNS Tonsillectomy Clinical Practice Guideline"]}},"102110-N3-31":{"quick":"帶狀疱疹是「DNA病毒(水痘帶狀疱疹病毒VZV)」侵犯『感覺神經節』,非RNA病毒進入角質層,故A錯誤。","detail":{"background":"帶狀疱疹(herpes zoster, 俗稱皮蛇)是「水痘-帶狀疱疹病毒(varicella-zoster virus, VZV)」再活化所致——VZV是「DNA病毒」,初次感染為水痘,痊癒後病毒「潛伏於脊髓背根『感覺神經節』」,當免疫力下降(年老、疲勞、壓力、免疫抑制)時再活化,沿單側皮節(dermatome)的神經分布長出群聚水疱,伴劇烈神經痛。A「RNA病毒進入角質層細胞核而破壞細胞」為「錯誤」——VZV是「DNA病毒」(非RNA),且其潛伏與侵犯部位是「感覺神經節與神經」(非角質層細胞核)。B「acyclovir(抗病毒藥)可阻止病毒擴散」正確(發疹72小時內給予效果最佳);C「勿擠壓病灶水疱」正確(防續發感染與擴散);D「冷敷可減輕不適」正確(濕冷敷舒緩疼痛)。故A錯誤。","options":{"A":"正解(錯誤敘述)。VZV是DNA病毒、侵犯感覺神經節,非RNA病毒進入角質層。","B":"acyclovir等抗病毒藥可抑制病毒複製擴散(72小時內最佳),正確。","C":"勿擠壓水疱以防續發感染與擴散,正確。","D":"濕冷敷可減輕患部疼痛不適,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","台灣皮膚科醫學會 帶狀疱疹臨床指引"]}},"104030-N3-45":{"quick":"帶狀疱疹病毒「會」侵犯眼睛(眼支)、耳朵(Ramsay Hunt),故D「不會侵犯眼睛耳朵」錯誤。","detail":{"background":"帶狀疱疹的病因與表徵:A「水痘是由同一種病毒(VZV)引起」正確(初感染為水痘,再活化為帶狀疱疹);B「病灶沿神經皮節(dermatome)分布」正確(單側帶狀);C「可能侵犯三叉神經造成面部疼痛」正確。D「病毒不會侵犯眼睛、耳朵等部位」為「錯誤」——帶狀疱疹「會」侵犯這些部位:侵犯三叉神經「眼分支」造成「眼部帶狀疱疹(herpes zoster ophthalmicus)」(可致角膜炎、虹彩炎、視力受損,鼻尖出現水疱Hutchinson徵象是警訊);侵犯「顏面與耳部神經(膝狀神經節)」造成「Ramsay Hunt症候群」(耳痛、耳道水疱、顏面神經麻痺、聽力眩暈)。故D敘述錯誤,且這兩處受侵屬需積極處理的併發症。","options":{"A":"水痘與帶狀疱疹是同一種病毒(VZV),正確。","B":"病灶沿神經皮節單側帶狀分布,正確。","C":"可能侵犯三叉神經造成面部疼痛,正確。","D":"正解(錯誤敘述)。會侵犯眼(眼部帶狀疱疹)與耳(Ramsay Hunt症候群)。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","台灣皮膚科醫學會 帶狀疱疹臨床指引"]}},"104100-N3-45":{"quick":"帶狀疱疹的水疱沿『單側』皮節帶狀分布、不跨中線,故B「雙側帶狀分布」錯誤。","detail":{"background":"帶狀疱疹臨床特徵:A「病毒潛伏於『脊髓神經節(感覺神經節)』,抵抗力弱時發作」正確(VZV潛伏於背根/腦神經感覺神經節);C「常發生於胸部及臉部,常引起劇痛」正確(胸腰皮節最常見,三叉神經分布的臉部亦常見,伴劇烈神經痛);D「高危險群包括老年人和免疫低下者」正確。B「引發的紅疹和水疱多出現在身體的『雙側』且為帶狀分布」為「錯誤」——帶狀疱疹的水疱是「沿『單側』一條皮節呈帶狀分布、『不跨越身體中線』」(因病毒侷限在單一受侵的感覺神經節);若出現「雙側或散在全身多處」要懷疑免疫嚴重低下(瀰漫性帶狀疱疹)。故B把單側誤為雙側,錯誤。","options":{"A":"病毒潛伏於脊髓感覺神經節,抵抗力弱時再活化,正確。","B":"正解(錯誤敘述)。水疱沿單側皮節帶狀分布、不跨中線,非雙側。","C":"常發生於胸部及臉部、伴劇痛,正確。","D":"高危險群為老年人與免疫低下者,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","台灣皮膚科醫學會 帶狀疱疹臨床指引"]}},"105030-N3-46":{"quick":"帶狀疱疹水疱液含VZV,對未具免疫者有傳染力,衣物與接觸需處理,故B「衣物不具傳染力不需處理」錯誤。","detail":{"background":"帶狀疱疹護理措施:A「避免擠壓水疱、以濕冷敷減輕患部疼痛」正確;C「可能有(疱疹後)神經痛,給予適當止痛藥」正確;D「『未患過水痘的人』應避免接觸病人」正確——水疱液含活的VZV,「未曾感染VZV(未患水痘、未接種疫苗)」者接觸後可能被傳染而得「水痘」(尤其孕婦、免疫低下、新生兒風險高)。B「病人的衣物不具傳染力、不需特別處理」為「錯誤」——接觸水疱液的衣物、敷料具傳染風險,在水疱結痂前應「採接觸防護、適當處理被污染的衣物敷料」(雖帶狀疱疹傳染力較水痘低、主要靠直接接觸水疱液,但不能說「不具傳染力、不需處理」)。故B錯誤。","options":{"A":"避免擠壓水疱、濕冷敷減輕疼痛,正確。","B":"正解(錯誤敘述)。水疱液含VZV具傳染力,污染衣物需處理,非不需處理。","C":"可給止痛藥緩解神經痛,正確。","D":"未患過水痘者應避免接觸,以免被傳染水痘,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","台灣皮膚科醫學會 帶狀疱疹臨床指引"]}},"105090-N3-47":{"quick":"帶狀疱疹是沿『單側皮節』長水疱,並非「全身皮膚紅疹」,故B錯誤。","detail":{"background":"帶狀疱疹臨床表徵:A「沿著皮節(dermatome)長出群聚小水疱」正確(單側帶狀);C「神經痛」正確(發疹前後即有灼痛、刺痛,可遺留疱疹後神經痛);D「局部淋巴腺腫」正確(患側區域淋巴結可腫大)。B「全身皮膚紅疹」為「錯誤」——帶狀疱疹是「侷限在『單側、單一皮節』」的群聚水疱與紅斑,「不是全身性紅疹」;「全身性、散在的紅疹水疱」是「水痘(初次VZV感染)」的表現,或免疫嚴重低下時的瀰漫性帶狀疱疹。故B把局部皮節病灶誤為全身紅疹,錯誤。","options":{"A":"沿皮節長出群聚小水疱(單側帶狀),正確。","B":"正解(錯誤敘述)。病灶侷限單側皮節,非全身皮膚紅疹(全身性是水痘)。","C":"有神經痛(含疱疹後神經痛),正確。","D":"患側區域淋巴腺可腫大,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","台灣皮膚科醫學會 帶狀疱疹臨床指引"]}},"114030-N3-27":{"quick":"帶狀疱疹患側區域淋巴腺腫常與水疱「同時出現、隨病程消退」,故D為正確敘述。","detail":{"background":"帶狀疱疹臨床症狀判斷(找正確):A「帶狀小水疱群聚常會『環繞軀幹一圈』」錯——病灶「不跨中線、僅單側一條皮節」,不會環繞一圈;B「最常發生在頭頸部」錯——最常見是「胸(腰)部皮節」(其次臉部三叉神經);C「口腔有乳白色斑塊」錯——那是「鵝口瘡(口腔念珠菌感染)」的表現,非帶狀疱疹。D「淋巴腺腫與水疱同時發生、同時消失」為「正確」——患側引流區域的淋巴結會在出疹期腫大,並隨水疱結痂、病程緩解而消退,兩者時程相伴。故D正確。","options":{"A":"病灶單側不跨中線,不會環繞軀幹一圈,錯誤。","B":"最常發生在胸腰部皮節,非頭頸部,錯誤。","C":"口腔乳白斑塊是鵝口瘡(念珠菌),非帶狀疱疹,錯誤。","D":"正解。患側區域淋巴腺腫與水疱相伴出現、隨病程消退。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","台灣皮膚科醫學會 帶狀疱疹臨床指引"]}},"114170-N3-26":{"quick":"帶狀疱疹正確處置:穿寬鬆柔軟衣(2)+神經痛給止痛(3)+未患水痘者避免接觸(4),選B(234);痊癒「不一定終生免疫」可復發,故1錯。","detail":{"background":"帶狀疱疹四敘述判斷:「1感染痊癒後通常會有終生免疫力」錯——帶狀疱疹本身就是潛伏病毒「再活化」,病人「可能再次發作(復發)」,並非得過一次就終生免疫(故高危族群建議接種帶狀疱疹疫苗);「2避免摩擦造成水泡破裂,建議穿寬鬆柔軟衣服」對(減少摩擦、保護水疱);「3當有神經痛症狀,可給予適當的止痛藥物」對(含疱疹後神經痛治療);「4未患過水痘的人,應避免與帶狀疱疹病人接觸」對(防被傳染水痘)。故最適當組合為2+3+4,選B。","options":{"A":"123含錯誤的1(非終生免疫),錯誤。","B":"正解。穿寬鬆柔軟衣(2)、神經痛給止痛(3)、未患水痘者避免接觸(4)皆適當。","C":"124含錯誤的1,錯誤。","D":"134含錯誤的1,錯誤。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","台灣皮膚科醫學會 帶狀疱疹臨床指引"]}},"103100-N3-43":{"quick":"單純疱疹護理重點是「避免擴散、勿擠壓、不共用物品」;「多攝取高熱量食物增強免疫」非重點且過度,故D錯誤。","detail":{"background":"單純疱疹(herpes simplex)由「單純疱疹病毒(HSV)」感染——HSV-1主侵犯口唇/臉部,HSV-2主侵犯生殖器/會陰;經「直接接觸(病灶、唾液、性接觸)」傳染,初次感染後潛伏於神經節、可反覆復發(發燒、日曬、壓力、月經、免疫下降時誘發)。護理措施:A「維持皮膚完整及清潔、避免擠壓水疱」正確(防續發感染與擴散);B「接觸病灶前後洗手或戴手套」正確(避免自體接種與傳染他人);C「避免與他人共用唇膏(及毛巾、餐具)」正確(防接觸傳染)。D「鼓勵多攝取『高熱量』食物以增強免疫力」為「錯誤」——增強免疫應以「均衡營養、充足蛋白質、維生素、休息」為主,「高熱量」食物並非增強免疫的重點、也非單純疱疹的護理要點(過度高熱量反增負擔)。故D為錯誤敘述。","options":{"A":"維持皮膚清潔完整、避免擠壓水疱,正確。","B":"接觸病灶前後洗手或戴手套防傳染,正確。","C":"避免共用唇膏等物品防接觸傳染,正確。","D":"正解(錯誤敘述)。增強免疫應均衡營養與休息,高熱量飲食非重點。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"107030-N3-46":{"quick":"單純疱疹是「單純疱疹病毒(HSV)」引起,不是水痘病毒(VZV),故A錯誤。","detail":{"background":"單純疱疹敘述:A「是由水痘病毒感染所引起的」為「錯誤」——單純疱疹是「單純疱疹病毒(herpes simplex virus, HSV)」引起,「水痘病毒(VZV)」引起的是水痘與帶狀疱疹,兩者是不同病毒,不可混淆。B「第一型(HSV-1)主要侵犯臉部和口腔,第二型(HSV-2)多感染於會陰部(生殖器)」正確;C「可透過接觸傳染」正確(直接接觸病灶、唾液、性接觸);D「感染痊癒後會潛伏於神經根節,可能再度復發」正確(HSV潛伏於感覺神經節,於誘發因素下復發)。故A錯誤。記憶:HSV→單純疱疹(口唇1/生殖器2);VZV→水痘+帶狀疱疹。","options":{"A":"正解(錯誤敘述)。單純疱疹由HSV引起,非水痘病毒(VZV)。","B":"HSV-1侵犯臉部口腔、HSV-2感染會陰部,正確。","C":"可透過接觸傳染,正確。","D":"痊癒後潛伏於神經節、可能復發,正確。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"114100-N3-29":{"quick":"第一型單純疱疹「容易復發(1)+潛伏神經根節(2)」正確,選A(12);非水痘病毒、非會陰部(那是HSV-2),故3、4錯。","detail":{"background":"第一型單純疱疹(HSV-1)四敘述判斷:「1容易再度復發」對(誘發因素如發燒、日曬、壓力下反覆復發,故俗稱「熱病性水疱/唇疱疹」);「2感染痊癒後會潛伏於神經根節」對(潛伏於三叉神經節等感覺神經節);「3由水痘病毒感染後所引起的」錯——是「HSV」非水痘病毒(VZV);「4多感染於會陰部」錯——HSV-1「主要在臉部、口唇」,「會陰部(生殖器)」是「HSV-2」。故正確組合為1+2,選A。","options":{"A":"正解。HSV-1容易復發(1)、潛伏於神經根節(2)。","B":"14含錯誤的4(會陰部是HSV-2),錯誤。","C":"23含錯誤的3(非水痘病毒),錯誤。","D":"34皆錯,錯誤。"},"sources":["新文京《內外科護理學》皮膚系統","華杏《新編內外科護理學》","CDC 疥瘡/帶狀疱疹感染管制指引"]}},"102030-N3-46":{"quick":"疥瘡初次感染潛伏期約「4~6週」才出現症狀,故D「接觸2週後就會出現」錯誤。","detail":{"background":"疥瘡(scabies)由「疥蟎(Sarcoptes scabiei,屬寄生蟲/節肢動物)」感染——A「病原體屬於寄生蟲(疥蟎)」正確;B「可經由手的接觸或換穿衣服(共用衣物床單)而感染」正確(直接皮膚接觸或間接接觸污染物);C「病原體在皮下(角質層)寄生並產卵」正確(雌蟎在表皮角質層挖隧道、產卵繁殖)。D「接觸病原體2週後就會出現疥瘡的症狀」為「錯誤」——「初次感染」的潛伏期較長,約「4~6週」(身體對疥蟎及其排泄物產生過敏反應才出現劇癢)才出現症狀;「再次感染」者因已致敏,約1~3天即出現。故「2週」與初次感染的4~6週不符,為錯誤(考題反覆以「2週」當錯、「4週」當對)。","options":{"A":"疥瘡病原體疥蟎屬寄生蟲,正確。","B":"經手接觸或共用衣物床單感染,正確。","C":"疥蟎在表皮角質層挖隧道寄生並產卵,正確。","D":"正解(錯誤敘述)。初次感染潛伏期約4~6週,非2週。"
