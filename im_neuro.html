const Q=[{"num":12,"answer":"E","stem":"75歲男性,已知高血壓、糖尿病及心房顫動多年,因突發左側肢體偏癱與意識不清而至急診。理學檢查病患為嗜睡狀況、血壓220/112 mmHg、心跳105次/分、體溫38.5\u0002°C,神經學檢查顯示左側偏癱與偏盲,實驗室檢查為血糖280 mg/dL、INR為1.08、血色素為13.3 g/dL,腦部MRI顯示右側中大腦動脈區域完全腦梗塞。請問下列那些處置不適當 (應選出所有正確答案):(1) 給予降壓藥物(如labetalol)將血壓降至140/90 mmHg(2) 使用胰島素將血糖降至120 mg/dL(3) 使用抗凝血劑(heparin)(4) 給予靜脈注射高張溶液(mannitol)(5) 給予acetaminophen將體溫降至37°C","options":{"A":"(1)+(2)+(3)","B":"(1)+(5)","C":"(2)+(3)","D":"(2)+(3)+(5)","E":"(1)+(3)"},"id":"102-綜-12","roc_year":102,"source":"102舊站q5綜合卷","topic_num":1,"topic":"腦血管疾病與頭痛","answer_status":"normal","img":"","q_num":12,"src":"舊站綜合卷"},{"num":12,"answer":"B","stem":"42歲女性,突發左頸部疼痛,左臉與右側肢體麻木,左側肢體失調(dysmetria)與構音困難(dysarthria),則最有可能那一條動脈阻塞?","options":{"A":"基底動脈(basilar artery)","B":"椎動脈(vertebral artery)","C":"前下小腦動脈(anterior inferior cerebellar artery)","D":"後大腦動脈(posterior cerebral artery)","E":"前脊動脈(anterior spinal artery)"},"id":"103-綜-12","roc_year":103,"source":"103舊站q5綜合卷","topic_num":1,"topic":"腦血管疾病與頭痛","answer_status":"normal","img":"","q_num":12,"src":"舊站綜合卷"},{"num":180,"answer":"C","stem":"75歲女性,過去有高血壓、糖尿病,突發講話詞不達意,送至急診後腦部磁振照影顯示左側頂葉部急性梗 塞,則會出現下列症狀何者除外?","options":{"A":"左右混淆(right left disorientation)","B":"手指辨識困難(finger agnosia)","C":"不會穿衣(dressing apraxia)","D":"計算困難(acalculia)","E":"書寫困難(agraphia)"},"id":"109-180","roc_year":109,"source":"109合併PDF","topic_num":1,"topic":"腦血管疾病與頭痛","answer_status":"normal","img":"","q_num":180,"src":"109合併卷"},{"num":185,"answer":"A","stem":"25歲男性,近幾年每年在冬季會有叢聚頭痛(cluster headache),每天頭痛1-2小時,連續5-6週,在急性 劇烈頭痛發生時。那些治療較能緩解頭痛:(1) 100%氧氣,每分鐘10-12升,15-20分鐘;(2) Sumatriptan口服50-100毫克 (3) Verapamil口服每日160-960毫克;(4) Indomethacin口服25-75毫克,每 日3次。","options":{"A":"(1)+(3)","B":"(2)+(4)","C":"(1)+(4)","D":"(2)+(3)","E":"(1)+(2)+(3)+(4)"},"id":"109-185","roc_year":109,"source":"109合併PDF","topic_num":1,"topic":"腦血管疾病與頭痛","answer_status":"normal","img":"","q_num":185,"src":"109合併卷"},{"num":186,"answer":"E","stem":"關於心房顫動(atrial fibrillation,AF),下列何種情境處置較為正確: (1) 57歲男性,之前無重大疾病,近3日 ,"src":"111合併卷"},{"num":145,"answer":"E","stem":"68歲男性,有高血壓、糖尿病與抽菸病史,平時未規則用藥,於晚餐後突發左側手腳無力與說話不清 楚,休息片刻小睡一下後並未恢復,甚至力氣更差,無法行走,隨即被送至急診處,到急診時血 壓175/98mmHg, 心跳85/min,意識清醒。美國國家衛生院腦中風量表的分數為19分,腦部斷層掃描顯示 無腦內出血,自症狀發生已經5小時,應進行下列何處置較適宜?","options":{"A":"立即給予aspirin 100毫克。","B":"立即給予aspirin 300毫克。","C":"立即給予靜脈血栓溶解劑0.6mg/Kg,施打60分鐘,密切觀察是否有進步。","D":"立即給予靜脈血栓溶解劑0.9mg/Kg,施打60分鐘,密切觀察是否有進步。不給aspirin, 給予生理食鹽 水輸液,密切觀察臨床症狀。","E":"懷疑中大腦動脈管阻塞,安排斷層掃描血管攝影(CTA)檢查,考慮進行動脈內血栓移除治療。"},"id":"113-145","roc_year":113,"source":"113合併PDF","topic_num":1,"topic":"腦血管疾病與頭痛","answer_status":"normal","img":"","q_num":145,"src":"113合併卷"},{"num":150,"answer":"B","stem":"關於口服抗凝血劑anticoagulant相關之腦內出血的處置,下列敘述何者組合最正確: (1) 維他命K抗凝血 劑:先給新鮮冷凍血漿(fresh frozen plasma, FFP),再給 凝血酶複合濃縮物(prothrombin complex concentrate, PCC)與vitamin K (2) Dabigatran:立即給予單株抗體idarucizumab (3) Factor Xa inhibitors:若無andexanet alpha,則給予PCC (4) Factor Xa inhibitors:若無andexanet alpha,也可考 慮腎臟替代療法(renal replacement therapy)","options":{"A":"(1)+(3)。","B":"(2)+(3)。","C":"(1)+(4)。","D":"(2)+(4)。","E":"(1)+(2)+(3)+(4)。"},"id":"113-150","roc_year":113,"source":"113合併PDF","topic_num":1,"topic":"腦血管疾病與頭痛","answer_status":"normal","img":"","q_num":150,"src":"113合併卷"},{"num":147,"answer":"B","stem":"一名急性缺血性腦中風病人,發病2小時來院,血壓為210/115 mmHg。病人無嚴重心衰竭、主動脈剝離 或高血壓腦症。關於急性期血壓管理,下列何者最適合?","options":{"A":"立即開始降壓,目標降至140/90 mmHg以下。","B":"若準備施打靜脈血栓溶解劑,需先將血壓降至185/110 mmHg以下。","C":"若未接受再灌流治療,血壓未達240/120 mmHg時不建議降壓。","D":"血壓只要超過180/100 mmHg就需馬上用藥降壓。","E":"發病後24小時內所有缺血性腦中風病人均須嚴格控制血壓。"},"id":"114-147","roc_year":114,"source":"114合併PDF","topic_num":1,"topic":"腦血管疾病與頭痛","answer_status":"normal","img":"","q_num":147,"src":"114合併卷"},{"num":149,"answer":"C","stem":"一名60歲男性,因胰臟腺癌住院接受化療,期間突然出現右側肢體無力。腦部MRI顯示多處散在性急性缺 血病灶,無心房顫動病史。關於此臨床情境的治療或診斷原則,下列何者正確?","options":{"A":"主要為腫瘤細胞局部侵犯腦部血管所致。","B":"腫瘤相關中風應避免使用靜脈血栓溶解治療(rtPA)。","C":"可考慮低分子量肝素(LWH)為中風後抗血栓藥物。","D":"由於血管再通率不佳,腫瘤相關中風不建議進行動脈血栓移除治療(endovascular thrombectomy)。","E":"D-dimer 在腫瘤相關中風無明確臨床意義,僅反應可能併有深部靜脈栓塞(DVT)。"},"id":"114-149","roc_year":114,"source":"114合併PDF","topic_num":1,"topic":"腦血管疾病與頭痛","answer_status":"normal","img":"","q_num":149,"src":"114合併卷"},{"num":5,"answer":"E","stem":"下列因素均可能引起老年人的譫妄(delirium),何者除外?","options":{"A":"尿道炎","B":"代謝障礙","C":"肺炎","D":"葯物","E":"心理壓力"},"id":"104-綜-5","roc_year":104,"source":"104舊站q5綜合卷","topic_num":2,"topic":"失智、譫妄與認知障礙","answer_status":"normal","img":"","q_num":5,"src":"舊站綜合卷"},{"num":8,"answer":"D","stem":"在加護病房中使用人工呼吸器並發生譫妄(delirium)的個案,與沒有發生譫妄的個案相較,前者比較容易發生下列何種現象?(1) 住院日數增加。(2) 六個月內死亡率上升。(3) 出院時認知功能缺損較嚴重。(4) 使用較少的鎮靜藥(sedatives)。(5) 住院期間使用呼吸器日數較短。","options":{"A":"(2)+(3)+(4)","B":"(2)+(3)+(5)","C":"(1)+(3)+(5)","D":"(1)+(2)+(3)","E":"(2)+(4)+(5)"},"id":"104-綜-8","roc_year":104,"source":"104舊站q5綜合卷","topic_num":2,"topic":"失智、譫妄與認知障礙","answer_status":"normal","img":"","q_num":8,"src":"舊站綜合卷"},{"num":181,"answer":"D","stem":"65歲男性,2年前開始有焦慮、情緒低落、睡眠差症狀,漸漸發生步態不穩僵硬、記憶衰退,偶有視幻覺 與妄想症狀,最可能是下列何診斷?","options":{"A":"皮質基底核退化(corticobasal ganglion degeneration)","B":"多系統萎縮(multiple system atrophy)","C":"漸進性上核麻痺(progressive supranuclear palsy)","D":"路易體失智症(dementia with Lewy body)","E":"額顳葉失智症(frontotemporal dementia)"},"id":"109-181","roc_year":109,"source":"109合併PDF","topic_num":2,"topic":"失智、譫妄與認知障礙","answer_status":"normal","img":"","q_num":181,"src":"109合併卷"},{"num":183,"answer":"A","stem":"50歲男性,有酒癮與曾有酒精戒斷症狀,因急性神經症狀,包括複視(diplopia)、步履不 穩(ataxia)、記憶喪失(memory loss)、淡漠(apathy)、混沌(confusion)等入院治療,初步診斷 為維生素B1缺乏,給予thiamine治療,下列那一個症狀恢復較快?","options":{"A":"複視","B":"步履不穩","C":"記憶喪失","D":"淡漠","E":"混沌"},"id":"109-183","roc_year":109,"source":"109合併PDF","topic_num":2,"topic":"失智、譫妄與認知障礙","answer_status":"normal","img":"","q_num":183,"src":"109合併卷"},{"num":148,"answer":"C","stem":"關於韋尼克-高沙可夫症候群(Wernicke-Korsakoff syndrome),下列敘述何者較不正確?","options":{"A":"高沙可夫症候群多發生在韋尼克腦症(Wernicke encephalopathy)之後。","B":"肢體失調(limb ataxia)較軀幹失調(truncal ataxia)常見。","C":"眼肌麻痹(ophthalmoplegia)常以複視(diplopia)、眼瞼下垂(ptosis)表現。","D":"步態不穩與合併多發性神經病變、小腦病變相關。","E":"治療後眼肌麻痹較步態不穩恢復快。"},"id":"111-148","roc_year":111,"source":"111合併PDF","topic_num":2,"topic":"失智、譫妄與認知障礙","answer_status":"normal","img":"","q_num":148,"src":"111合併卷"},{"num":155,"answer":"E","stem":"關於譫妄(delirium)下列何者為是? (1) 住院病患的譫妄風險因子包括:使用膀胱導管插入術、身體約束、睡眠和感覺剝奪,以及添加三種或 更多的新藥物 (2) 譫妄患者的住院死亡率估計在 2% 到 4% 之間,遠低於敗血症引起的死亡率 (3) 藥物仍然是譫妄的預防及保護因子,尤其是具有抗膽鹼或鎮靜特性的藥物 (4) 盲目地針對譫妄症狀進行藥物治療只會延長患者處於混亂狀態的時間,並可能掩蓋重要的潛在病因診 斷線索 (5) 應避免化學約束(chemical restrain),必要時使用極低劑量的典型或非典型抗精神病藥物,且應該留給 嚴重躁動和明顯可能傷害自己或工作人員的患者","options":{"A":"(1)+(2)+(3)。","B":"(1)+(3)+(5)。","C":"(2)+(3)+(4)。","D":"(3)+(4)+(5)。","E":"(1)+(4)+(5)。"},"id":"111-155","roc_year":111,"source":"111合併PDF","topic_num":2,"topic":"失智、譫妄與認知障礙","answer_status":"normal","img":"","q_num":155,"src":"111合併卷"},{"num":151,"answer":"A","stem":"關於失智症合併的行為和心理症狀(behavioral and psychological symptoms of dementia)的處置下列何者 為非?","options":{"A":"抗精神病藥物(antipsychotics)治療是首選介入方式。","B":"針對照顧者的介入措施具有最高的實證基礎。","C":"針對照顧者介入措施包括照顧技能培訓、心理衛教和活動調整等。","D":"如果仍然存在令人困擾或有危險,可以考慮針對行為和心理症狀進行短期藥物治療,並明確設定治療 目標。","E":"低劑量的Risperidone在某些國家獲得針對攻擊行為的短期使用許可。"},"id":"113-151","roc_year":113,"source":"113合併PDF","topic_num":2,"topic":"失智、譫妄與認知障礙","answer_status":"normal","img":"","q_num":151,"src":"113合併卷"},{"num":145,"answer":"A","stem":"68歲男性,罹患胃癌,近兩個月因食慾不振與持續嘔吐導致進食困難,體重明顯下降。近日家屬發現他出 現意識混亂、走路不穩及語言遲鈍,遂帶至急診。理學檢查顯示眼球震顫、小腦性步態與反應遲鈍。急診 醫師懷疑為Wernicke腦病變。 此時應優先考慮安排哪些檢查或處置? (1) 腦部核磁共振檢查(MRI) (2) 靜脈注射高劑量維生素B1 (3) 腦部電腦斷層血管攝影(CT angiography) (4) 感染及免疫相關血液檢查","options":{"A":"(1)+(2)。","B":"(2)+(4)。","C":"(1)+(3)。","D":"(2)+(3)+(4)。","E":"(1)+(2)+(3)+(4)。"},"id":"114-145","roc_year":114,"source":"114合併PDF","topic_num":2,"topic":"失智、譫妄與認知障礙","answer_status":"normal","img":"","q_num":145,"src":"114合併卷"},{"num":145,"answer":"D","stem":"關於肌無力(myasthenia gravis)與其它的神經肌肉交界疾病(neuromuscular junction disorder),下 列敘述何者較不正確:","options":{"A":"肌無力在50歲之前發病女性較多,50歲之後則男女性差不多。","B":"肉毒桿菌中毒(botulism)為突觸前病變。","C":"肌無力危機(myasthenic crisis)時使用血漿置換術或免疫球蛋白治療效果相近。","D":"MuSK型的肌無力一般症狀較輕,進展較緩。","E":"Lambert-Eaton肌無力症候群多與小細胞肺癌相關。"},"id":"110-145","roc_year":110,"source":"110合併PDF","topic_num":3,"topic":"神經肌肉接合與周邊神經疾病","answer_status":"normal","img":"","q_num":145,"src":"110合併卷"},{"num":146,"answer":"C","stem":"70歲男性,因胸腹主動脈瘤(thoracic-abdominal aortic aneurysm)接受手術,術後突發雙下肢無力,理 學與神經學檢查較不可能出現下列何者?","options":{"A":"下肢痛感下降。","B":"下肢溫度感下降。","C":"下肢震動感下降。","D":"低血壓。","E":"尿失禁。"},"id":"110-146","roc_year":110,"source":"110合併PDF","topic_num":3,"topic":"神經肌肉接合與周邊神經疾病","answer_status":"normal","img":"","q_num":146,"src":"110合併卷"},{"num":148,"answer":"B","stem":"75歲女性,因敗血性休克入住加護病房,經治療後意識恢復,但仍為呼吸器依賴,兩週後發現四肢肌力明 顯下降合併肌肉萎縮,則此病人的檢查與治療,下列何者較不正確?","options":{"A":"四肢肌腱反射下降。","B":"神經傳導檢查顯示傳導速度明顯降低。","C":"神經傳導檢查顯示動作電位(action potential)明顯下降。","D":"類固醇治療幫助不大。","E":"肌力恢復至少需3至6個月時間。"},"id":"110-148","roc_year":110,"source":"110合併PDF","topic_num":3,"topic":"神經肌肉接合與周邊神經疾病","answer_status":"normal","img":"","q_num":148,"src":"110合併卷"},{"num":146,"answer":"D","stem":"比較肌無力(myasthenia gravis, MG)與藍伯-伊頓肌無力症候群(Lambert-Eaton myasthenic syndrome, LEMS),下列的臨床表現何者較不常發生於LEMS?","options":{"A":"軀幹及近端肌肉的無力。","B":"自律神經失調的症狀,如口乾、便秘、小便困難及性無能。","C":"合併小細胞肺癌發生。","D":"電學檢查以高頻刺激(每秒20-50次),運動電位的振幅明顯減少。","E":"P/Q型態的鈣離子通道抗體。"},"id":"111-146","roc_year":111,"source":"111合併PDF","topic_num":3,"topic":"神經肌肉接合與周邊神經疾病","answer_status":"normal","img":"","q_num":146,"src":"111合併卷"},{"num":145,"answer":"D","stem":"63歲男性,高血壓病史,在腹瀉一天後發生漸進的四肢無力與麻木五天,合併有走路不穩且會喘、吞嚥與 構音困難等症狀,神經學評估顯示輕微顏面無力、四肢肌力為3-4分、肌腱反射明顯下降,關於此疾病應 立即考慮那些治療處置,何者除外?","options":{"A":"靜脈注射免疫球蛋白(intravenous immunoglobulin)。","B":"血漿置換(plasma exchange)。","C":"雙重過濾血漿過濾分離術(double filtration plasmapheresis)。","D":"高劑量的類固醇靜脈注射(methylprednisolone)。","E":"評估插管保護氣道。"},"id":"112-145","roc_year":112,"source":"112合併PDF","topic_num":3,"topic":"神經肌肉接合與周邊神經疾病","answer_status":"normal","img":"","q_num":145,"src":"112合併卷"},{"num":148,"answer":"C","stem":"70歲男性,診斷肝癌,接受栓塞治療及atezolizumab與bevacizumab,2個月後出現漸進眼瞼下垂、複 視、構音與吞嚥困難、步履不穩、走路會喘,此病人最可能診斷為何?","options":{"A":"邊緣葉腦炎(limbic encephalitis)。","B":"腦轉移腫瘤(brain metastasis)。","C":"肌無力(myasthenia gravis)。","D":"肌炎(myositis)。","E":"格林-巴利症候群(Guillain-Barré syndrome)。"},"id":"112-148","roc_year":112,"source":"112合併PDF","topic_num":3,"topic":"神經肌肉接合與周邊神經疾病","answer_status":"normal","img":"","q_num":148,"src":"112合併卷"},{"num":149,"answer":"C","stem":"下列哪些遺傳性神經病變較易引起肢體疼痛?(1) 法布瑞氏症(Fabry's disease)(2) Charcot-Marie-Tooth disease (3) 急性間歇性紫質症(acute intermittent porphyria) (4) 家族性澱粉樣物多發性神經病 變(familial amyloid polyneuropathy)","options":{"A":"(1)+(3)。","B":"(2)+(4)。","C":"(1)+(4)。","D":"(2)+(3)。","E":"(1)+(2)+(3)+(4)。"},"id":"112-149","roc_year":112,"source":"112合併PDF","topic_num":3,"topic":"神經肌肉接合與周邊神經疾病","answer_status":"normal","img":"","q_num":149,"src":"112合併卷"},{"num":147,"answer":"D","stem":"70歲男性,診斷惡性胸腺腫瘤合併肺轉移,接受手術治療及含cisplatin的複方化療藥物為主,3個月後出 現右眼瞼下垂、說話不清容易嗆咳與爬樓梯無力等症狀,此病人最可能診斷為何?","options":{"A":"腦轉移腫瘤(brain metastasis)。","B":"邊緣葉腦炎(limbic encephalitis)。","C":"cisplatin周邊神經病變。","D":"重症肌無力(myasthenia gravis)。","E":"格林-巴利症候群(Guillain-Barré syndrome)。"},"id":"113-147","roc_year":113,"source":"113合併PDF","topic_num":3,"topic":"神經肌肉接合與周邊神經疾病","answer_status":"normal","img":"","q_num":147,"src":"113合併卷"},{"num":150,"answer":"A","stem":"一位重症肌無力病人因呼吸肌無力惡化即將插管,醫師計畫使用血漿置換(plasmapheresis)改善症 狀。關於此病人的治療,下列何者為不正確的臨床建議?","options":{"A":"插管前宜先使用高劑量類固醇。","B":"插管前應避免增加mestinon劑量。","C":"血漿置換是重症肌無力危象(Myasthenic crisis)的治療首選之一。","D":"如需胸腺瘤手術,應等病人病情穩定後再行。","E":"血漿置換後病人仍需配合免疫調節治療以維持療效。"},"id":"114-150","roc_year":114,"source":"114合併PDF","topic_num":3,"topic":"神經肌肉接合與周邊神經疾病","answer_status":"normal","img":"","q_num":150,"src":"114合併卷"},{"num":100,"answer":"B","stem":"55歲男性,長期於某一工廠工作,近6個月有漸進的步履變小、動作變慢、平衡變差,診斷為巴金森氏 症(parkinsonism),有2位工廠同事有類似但較輕的症狀,最需要懷疑為何種中毒?","options":{"A":"鉛(lead)","B":"錳(manganese)","C":"汞(mercury)","D":"砷(arsenic)","E":"銅(copper)"},"id":"109-100","roc_year":109,"source":"109合併PDF","topic_num":4,"topic":"運動障礙、神經退化與藥物相關神經急症","answer_status":"normal","img":"","q_num":100,"src":"109合併卷"},{"num":147,"answer":"B","stem":"55歲女性,自5年前起漸進發生步履不穩、動作變慢,門診給予levodopa治療但效果有限,神經學檢查顯 示病人話語不清晰、面部表情少,四肢輕度無力、動作慢、僵硬(rigidity),無肢體顫抖,步伐小且易跌 倒,最可能的診斷為何?","options":{"A":"原發性巴金森氏症(idiopathic Parkinson's disease)。","B":"巴金森氏症為主的多發性系統退化(multiple system atrophy with predominant parkinsonism)。","C":"進行性上眼神經核麻痺症(progressive supranuclear palsy)。","D":"路易氏體失智症(Lewy body dementia)。","E":"脊髓小腦萎缩症(spinocerebellar atrophy)。"},"id":"112-147","roc_year":112,"source":"112合併PDF","topic_num":4,"topic":"運動障礙、神經退化與藥物相關神經急症","answer_status":"normal","img":"","q_num":147,"src":"112合併卷"},{"num":148,"answer":"B","stem":"以下哪項敘述對於抗精神藥物惡性症候群(neuroleptic malignant syndrome)是錯誤的?","options":{"A":"意識障礙、僵硬和發燒是常見症狀。","B":"自主神經功能障礙和震顫很少見。","C":"該情況與malignant catatonia難以區分。","D":"症狀與\"血清素症候群 (serotonin syndrome)” 很難區分。","E":"在惡性高熱的情況下,應考慮使用dantrolene(劑量為1-2.5 mg/kg,每日最高劑量為10 mg/kg/d)。"},"id":"113-148","roc_year":113,"source":"113合併PDF","topic_num":4,"topic":"運動障礙、神經退化與藥物相關神經急症","answer_status":"normal","img":"","q_num":148,"src":"113合併卷"},{"num":148,"answer":"B","stem":"一名50歲女性因消化不良及噁心服用 Primperan (metoclopramide) 數天後,出現臉部不自主抽動及四肢 不自主擺動。下列關於此副作用的敘述,何者正確?","options":{"A":"這是常見的過敏反應,應立即停藥並給予抗組織胺。","B":"這種不自主運動屬於錐體外系副作用,與多巴胺受體阻斷有關。","C":"此副作用通常不需處理,會自然改善。","D":"可繼續用藥,並加用肌肉鬆弛劑緩解症狀。","E":"Primperan較不會引起此類副作用,應尋找其他原因。"},"id":"114-148","roc_year":114,"source":"114合併PDF","topic_num":4,"topic":"運動障礙、神經退化與藥物相關神經急症","answer_status":"normal","img":"","q_num":148,"src":"114合併卷"},{"num":155,"answer":"B","stem":"下列哪一項是抗精神病藥物惡性症候群(Neuroleptic Malignant Syndrome, NMS)的典型臨床表現?","options":{"A":"高張肌力、發燒、失語與低血壓。","B":"鉛管樣肌僵直、高燒、自律神經功能失調。","C":"顫抖、興奮、縮瞳、心跳過緩。","D":"視幻覺、認知障礙、四肢無力。","E":"血壓穩定、肌肉無力、體溫正常。"},"id":"114-155","roc_year":114,"source":"114合併PDF","topic_num":4,"topic":"運動障礙、神經退化與藥物相關神經急症","answer_status":"normal","img":"","q_num":155,"src":"114合併卷"},{"num":21,"answer":"C","stem":"下列哪些狀況屬於神經阻斷性惡性症候群(Neuroleptic Malignant Syndrome, NMS)常見的臨床表 現?(1) 高燒(Hyperthermia) (2) 僵直(Rigidity) (3) 高反射(Hyperreflexia) (4) 血壓變異大(血流動力學不穩定) (5) 肌酸激酶(CK)升高","options":{"A":"(1)+(2)。","B":"(1)+(2)+(4)。","C":"(1)+(2)+(4)+(5)。","D":"(1)+(2)+(3)+(4)+(5)。","E":"(1)+(2)+(3)+(5)。"},"id":"114-21","roc_year":114,"source":"114合併PDF","topic_num":4,"topic":"運動障礙、神經退化與藥物相關神經急症","answer_status":"normal","img":"","q_num":21,"src":"114合併卷"},{"num":12,"answer":"E","stem":"55歲男性,因左眼腫脹與鬱血就診,頭部磁振照影顯示左側海綿竇(cavernous sinus)有不正常顯影,臨床診斷為眼窩頂症候群(orbital apex syndrome),那一條顱神經學不會受影響?","options":{"A":"第二顱神經","B":"第三顱神經","C":"第四顱神經","D":"第六顱神經","E":"第七顱神經"},"id":"108-綜-12","roc_year":108,"source":"108舊站q5綜合卷","topic_num":5,"topic":"癲癇、腦病變、暈厥與其他神經疾病","answer_status":"normal","img":"","q_num":12,"src":"舊站綜合卷"},{"num":182,"answer":"D","stem":"52歲女性,原即有控制不很好的高血壓,某日與他人激烈爭吵後,突發劇烈頭痛,合併意識有些混沌,緊 急送醫後磁振照影顯示腦部的兩側枕葉有腫脹,但無梗塞或出血。關於此疾病,下列處置何者較正確?","options":{"A":"應優先考慮腦血管炎(cerebral vasculitis)","B":"應考慮導管是血管攝影(catheter angiography)","C":"應給予類固醇治療","D":"應給予靜脈鈣離子阻斷劑","E":"應給予抗癲癇藥物"},"id":"109-182","roc_year":109,"source":"109合併PDF","topic_num":5,"topic":"癲癇、腦病變、暈厥與其他神經疾病","answer_status":"normal","img":"","q_num":182,"src":"109合併卷"},{"num":147,"answer":"E","stem":"50歲女性,因腦動脈瘤破裂致蜘蛛膜下腔出血入院,接受夾動脈瘤手術,術後第三日發現血鈉偏低(124 mmol/L),神經學尚穩定,檢查結果與治療,下列何者較不正確?","options":{"A":"24小時尿中的鈉含量增加。","B":"尿液滲透壓(urine osmolarity)增加。","C":"體內呈現低容積(hypovolemic)。","D":"給予等張氯化鈉溶液滴注。","E":"給予甘露醇(Mannitol)滴注。"},"id":"110-147","roc_year":110,"source":"110合併PDF","topic_num":5,"topic":"癲癇、腦病變、暈厥與其他神經疾病","answer_status":"normal","img":"","q_num":147,"src":"110合併卷"},{"num":150,"answer":"C","stem":"關於後腦可逆性腦病變症候群(posterior reversible encephalopathy syndrome,PRES),下列敘述何 者較正確: (1) 腦部磁振造影顯示FLAIR影像有高強度顯影,表示血管源性腦水腫(vasogenic edema)存在 (2) 應考慮給予靜脈輸注nicardipine、labetalol、hydralazine等 (3) 若起初收縮壓為200 mmHg,應快速於1小時內將收縮壓降至140 mmHg以下 (4) 若為子癲症(eclampsia),應優先使用靜脈輸注magnesium sulphate","options":{"A":"(1)+(3)。","B":"(2)+(4)。","C":"(1)+(4)。","D":"(2)+(3)。","E":"(1)+(2)+(3)+(4)。"},"id":"110-150","roc_year":110,"source":"110合併PDF","topic_num":5,"topic":"癲癇、腦病變、暈厥與其他神經疾病","answer_status":"normal","img":"","q_num":150,"src":"110合併卷"},{"num":147,"answer":"C","stem":"關於青少年肌陣攣性癲癇(juvenile myoclonic epilepsy),下列敘述何者較不正確?","options":{"A":"常以短暫、雙側對稱、同步、無節律的肌肉收縮表現。","B":"常發生於清晨剛起床時。","C":"多會有短暫意識喪失。","D":"常有癲癇家族史。","E":"神經系統發育大多正常。"},"id":"111-147","roc_year":111,"source":"111合併PDF","topic_num":5,"topic":"癲癇、腦病變、暈厥與其他神經疾病","answer_status":"normal","img":"","q_num":147,"src":"111合併卷"},{"num":150,"answer":"A","stem":"昏厥病人進行自主神經功能測試,下列何者主要為副交感神經功能測試: (1) 每分鐘6次深呼吸時的心律變異(heart rate variation with deep breathing) (2) 流汗測試(quantitative sudomotor axon reflex test, QSART) (3) 閉氣用力--伐氏操作時最快心跳比最慢心跳(Valsalva ratio) (4) 傾斜床測試(head-up tilt table test)","options":{"A":"(1)+(3)。","B":"(2)+(4)。","C":"(1)+(4)。","D":"(2)+(3)。","E":"(1)+(2)+(3)+(4)。"},"id":"111-150","roc_year":111,"source":"111合併PDF","topic_num":5,"topic":"癲癇、腦病變、暈厥與其他神經疾病","answer_status":"normal","img":"","q_num":150,"src":"111合併卷"},{"num":146,"answer":"C","stem":"腦部動脈瘤破裂造成的蜘蛛膜下腔出血(subarachnoid hemorrhage)後第5日,血鈉濃度為120 mEq/L,下列敘述何者為非?","options":{"A":"腎功能多為正常。","B":"常會飢渴、低血壓。","C":"應限制輸液給予。","D":"校正低血鈉,每小時鈉上升速度應低於1 mEq/L,每日應小於8mEq/L。","E":"尿液的鈉 >100 mEq/L。"},"id":"112-146","roc_year":112,"source":"112合併PDF","topic_num":5,"topic":"癲癇、腦病變、暈厥與其他神經疾病","answer_status":"normal","img":"","q_num":146,"src":"112合併卷"},{"num":55,"answer":"B","stem":"八十歲男性有多重慢性疾病,疑似因姿勢性低血壓(orthostatic hypotension)誘發暈厥(Syncope)而住 院。住院後,以標準方式測量orthostatic vitals, 先讓病人平躺5分鐘,測量血壓、脈搏;之後協助病人站 起身1-3分鐘內,再次測量血壓、脈搏 (如下)。 請問: 由orthostatic vitals紀錄,以下敘述何者最正確? Blood Pressure (mm Hg) : Supine 115/80、 Standing 90/70。 Heart rate/min: Supine 68、Standing 70","options":{"A":"尚不符合姿勢性低血壓(orthostatic hypotension)的診斷定義。","B":"由上述orthostatic vitals紀錄,比較像是neurogenic hypostatic hypotension。","C":"由上述orthostatic vitals紀錄,可能是diabetes + dehydration。","D":"由上述orthostatic vitals紀錄,首先應懷疑是病人的治療前列腺肥大(prostate hyperplasia)藥物 alpha-1 antagonist所引起。","E":"查詢病人的雲端藥歷,經常在使用pyridostigmine, droxidopa 或atomoxetine,這些藥物有可能加重 姿勢性低血壓,應建議暫停使用。"},"id":"112-55","roc_year":112,"source":"112合併PDF","topic_num":5,"topic":"癲癇、腦病變、暈厥與其他神經疾病","answer_status":"normal","img":"","q_num":55,"src":"112合併卷"},{"num":146,"answer":"C","stem":"23歲女性,過去無顯著病史,自3週前開始情緒不穩定,容易生氣與焦慮,甚至個性變得多疑,家屬帶去 精神科門診,心理治療與服藥後僅部分改善,一週前開始整日嗜睡,甚至手腳出現不自主動作,以及嘴巴 出現像咀嚼口香糖的情形,家屬緊急送醫,到院時coma scale: E4M4V2,體溫37.5C,全身出現不自主動 作,口舌亂動,意識不清,緊急插管後入加護病房。抽血檢查無感染情形,電解質正常,腦部核磁共振未 有異常顯影,脊髓液檢查cell count L/N=3/0,total protein 60mg/dl,最可能的診斷為何?","options":{"A":"細菌性腦膜腦炎。","B":"日本腦炎。","C":"anti-NMDA receptor 腦炎。","D":"anti-GAD 腦炎。","E":"anti-Jo1 腦炎。"},"id":"113-146","roc_year":113,"source":"113合併PDF","topic_num":5,"topic":"癲癇、腦病變、暈厥與其他神經疾病","answer_status":"normal","img":"","q_num":146,"src":"113合併卷"}],E={"102-綜-12":{"quick":"大面積急性缺血性中風「不適當」的處置＝(1)積極降壓至140/90＋(3)急性給heparin抗凝，故選E；其餘退燒、降腦壓、控糖皆合理。","detail":{"background":"急性缺血性中風(acute ischemic stroke)的早期照護有幾個與直覺相反、卻是高分考點的原則。第一是「容許性高血壓(permissive hypertension)」：缺血半暗帶(penumbra)的灌流高度依賴體循環血壓，急性期過度降壓會擴大梗塞。對「未接受溶栓/取栓」者，指引建議血壓未達220/120 mmHg前不主動降壓；若要降也只降約15%。本題血壓220/112、屬大腦中動脈(MCA)完全梗塞，將血壓硬壓到140/90屬不當(故(1)不適當)。第二是抗凝時機：對大面積心源性栓塞(此例有AF、INR僅1.08代表未有效抗凝)，「急性期立即給heparin」並不能改善預後，反而增加出血轉化(hemorrhagic transformation)風險，故(3)不適當；抗凝應延後依梗塞大小(1-3-6-12原則)再開始。第三是合理處置：發燒會惡化神經預後，acetaminophen退燒至正常((5)合理)；大面積MCA梗塞合併腦水腫、意識變差，給mannitol降腦壓((4)合理)；血糖過高(>180)會擴大梗塞，使用胰島素控糖((2)合理，目標140–180 mg/dL，惟過度壓到120易低血糖故屬邊緣)。出題年(102年)正值tPA與中風單位(stroke unit)觀念普及，本題核心在分辨「容許性高血壓＋延後抗凝」這兩個違反新手直覺的鐵則。","options":{"A":"錯誤。(2)控糖、(3)抗凝中，(3)不當但(2)屬合理控糖，組合不符。","B":"錯誤。(5)退燒為合理處置，不算不適當。","C":"錯誤。(2)控糖屬合理，僅(3)不當。","D":"錯誤。含(5)退燒(合理)，且(2)控糖合理。","E":"正確。(1)急性大梗塞硬降壓至140/90違反容許性高血壓，(3)急性給heparin增加出血轉化，兩者皆不適當。"},"sources":["Harrison 21e, Ch. Cerebrovascular Diseases","AHA/ASA 2019 Guidelines for Early Management of Acute Ischemic Stroke","Adams & Victor's Principles of Neurology, Stroke"]}},"103-綜-12":{"quick":"左頸痛＋交叉性感覺(左臉右肢麻)＋左側肢體失調與構音困難＝外側延髓(Wallenberg)症候群，最常因椎動脈(±剝離)阻塞，選B。","detail":{"background":"本題是經典的「交叉性(crossed)神經學定位」題。患者左頸部疼痛(暗示椎動脈剝離vertebral artery dissection)，出現「同側(左)臉麻＋對側(右)半身麻」的交叉性感覺障礙，加上同側(左)肢體失調(dysmetria)與構音困難(dysarthria)，正是外側延髓症候群(lateral medullary / Wallenberg syndrome)。其機轉是延髓背外側受損：三叉神經脊髓核(同側臉部痛溫覺喪失)＋已交叉的脊髓視丘徑(對側軀幹肢體痛溫覺喪失)造成交叉性感覺缺損；下小腦腳/小腦造成同側肢體失調；疑核(nucleus ambiguus)造成構音與吞嚥困難、聲音嘶啞；前庭核造成眩暈眼震；下行交感纖維造成同側Horner症候群。供應此區的是小腦後下動脈(PICA)，但多數Wallenberg其實源自「椎動脈(vertebral artery)」本身阻塞或剝離，年輕女性突發頸痛更要想到椎動脈剝離。鑑別：基底動脈阻塞會有雙側長徑症狀與意識/腦幹危象；前下小腦動脈(AICA)阻塞偏向橋腦外側(同側聽力喪失、顏面神經麻痺)；後大腦動脈(PCA)阻塞造成對側偏盲；前脊動脈造成脊髓前症候群。出題核心在以「交叉性感覺＋同側小腦徵象＋頸痛」鎖定椎動脈/Wallenberg。","options":{"A":"錯誤。基底動脈阻塞多為雙側症狀、意識障礙、四肢癱與腦幹危象(locked-in)，非單側交叉性表現。","B":"正確。椎動脈(常因剝離)阻塞造成外側延髓(Wallenberg)症候群，符合頸痛＋交叉感覺＋同側失調與構音困難。","C":"錯誤。AICA阻塞影響橋腦外側，典型為同側聽力喪失、顏面神經麻痺與小腦徵象，定位較高。","D":"錯誤。PCA阻塞主要造成對側同向偏盲(枕葉)，不符延髓徵象。","E":"錯誤。前脊動脈阻塞造成脊髓前症候群(雙側運動與痛溫覺喪失、保留本體感覺)，非腦幹交叉徵象。"},"sources":["Harrison 21e, Cerebrovascular Diseases (brainstem stroke syndromes)","Adams & Victor's Neurology, Lateral Medullary Syndrome","2014 AHA/ASA cervical artery dissection statement"]}},"109-180":{"quick":"左(優勢)頂葉梗塞→Gerstmann症候群：左右不分、手指失認、計算困難、書寫困難；「不會穿衣(dressing apraxia)」屬非優勢(右)頂葉，故除外選C。","detail":{"background":"本題測試優勢半球(左)頂葉特有的Gerstmann症候群(Gerstmann syndrome)。優勢角回(angular gyrus, 左頂葉)受損的四聯徵為：手指失認(finger agnosia)、左右辨識障礙(right-left disorientation)、失寫(agraphia)、失算(acalculia)，常合併傳導性或經皮質感覺性失語(故病人「講話詞不達意」)。這四項皆與優勢頂葉的語言-符號處理功能相關。相對地，「穿衣失用(dressing apraxia)」與「結構性失用(constructional apraxia)」、半側忽略(hemineglect)是「非優勢(右)頂葉」病變的特徵，與空間視覺處理有關，因此在「左頂葉梗塞」不會出現，正是本題「除外」的答案。臨床上判斷中風定位時，左頂葉→語言/計算/符號(Gerstmann)，右頂葉→空間/忽略/穿衣與結構失用，是高頻考點。出題核心在區辨優勢vs非優勢頂葉皮質功能。","options":{"A":"錯誤(屬會出現)。左右混淆是Gerstmann四聯徵之一，優勢頂葉病變會出現。","B":"錯誤(屬會出現)。手指失認是Gerstmann四聯徵之一。","C":"正確(除外)。穿衣失用是「非優勢(右)頂葉」病變特徵，左頂葉梗塞不會出現，故為答案。","D":"錯誤(屬會出現)。計算困難(失算)是Gerstmann四聯徵之一。","E":"錯誤(屬會出現)。書寫困難(失寫)是Gerstmann四聯徵之一。"},"sources":["Harrison 21e, Aphasias and Other Focal Cerebral Disorders","Adams & Victor's Neurology, Parietal Lobe Syndromes (Gerstmann)"]}},"109-185":{"quick":"叢集性頭痛急性緩解＝100%高流量氧氣(1)＋預防/橋接用verapamil(3)，選A；口服sumatriptan對叢集性效果差(需皮下/鼻噴)、indomethacin是陣發性偏頭痛(paroxysmal hemicrania)的藥，故(2)(4)不選。","detail":{"background":"叢集性頭痛(cluster headache)屬三叉自律神經頭痛(TAC)，特徵為嚴格單側眼眶/顳部劇痛、發作1–3次/日、每次15–180分鐘、群聚數週(冬季好發)、伴同側自律神經症狀(流淚、結膜充血、鼻塞、Horner徵)與躁動。治療分「急性中止(abortive)」與「預防(preventive)」。急性中止首選為(1)100%高流量氧氣(10–12 L/min經非再吸入面罩15–20分鐘，可中止約70%發作)與「皮下或鼻噴sumatriptan/zolmitriptan」——關鍵陷阱在「口服triptan起效太慢」，對來去極快的叢集性發作效果不佳，故本題(2)口服sumatriptan不選。預防/過渡治療首選為(3)verapamil(維拉帕米，需逐步加量並監測PR間期/心電圖)，以及短期高劑量類固醇、枕神經阻斷作橋接。(4)indomethacin並非叢集性頭痛用藥，它是「陣發性偏頭痛(paroxysmal hemicrania)」與「hemicrania continua」的特效(且具診斷意義)藥物，屬常見混淆陷阱。因此能緩解此病人頭痛者為(1)+(3)。本題核心：分辨叢集性頭痛(O2＋皮下triptan急性、verapamil預防)與陣發性偏頭痛(indomethacin)的治療差異，以及「口服triptan對叢集性無效」。","options":{"A":"正確。(1)高流量100%氧氣為叢集性頭痛急性中止首選；(3)verapamil為一線預防/橋接，兩者皆能緩解此病人。","B":"錯誤。(2)口服sumatriptan起效過慢、對叢集性效果差(應皮下/鼻噴)；(4)indomethacin是陣發性偏頭痛用藥，非叢集性。","C":"錯誤。(4)indomethacin不適用於叢集性頭痛。","D":"錯誤。(2)口服triptan效果不佳。","E":"錯誤。(2)口服sumatriptan與(4)indomethacin皆不適合，並非全部正確。"},"sources":["Harrison 21e, Migraine and Other Primary Headache Disorders","Adams & Victor's Neurology, Headache","AHS 2016 Cluster Headache treatment guideline"]}},"109-186":{"quick":"四個AF情境處置皆正確(選E)：新發AF快速心室率→先抗凝延後整流；輕症中風後第3日起DOAC(1-3-6-12原則)；停藥後TIA立即加回DOAC；warfarin INR≤1.7的急性中風2.5小時內仍可給IV tPA。","detail":{"background":"本題整合心房顫動(AF)相關的中風預防與急性處置鐵則。(1)新發AF心室率130、發作數日，因發作>48小時或時間不明，整流前需先足量抗凝(避免左心耳血栓在整流時脫落造成栓塞)，故「先給口服抗凝劑、暫不整流」正確。(2)缺血性中風後何時開始/重啟抗凝採「1-3-6-12原則」：TIA第1日、輕症(small)第3日、中度第6日、大面積第12日；本例神經症狀輕微的小中風，第3日開始DOAC合理。(3)已服DOAC因拔牙停藥2日而發生TIA，代表抗凝不足導致事件，立即恢復DOAC正確。(4)已服warfarin的急性缺血性中風，距發作2.5小時(在4.5小時靜脈溶栓窗內)、INR=1.4(≤1.7不構成tPA禁忌)、NIHSS 8分，符合靜脈血栓溶解(IV thrombolysis)條件，可給予。故四者皆正確、選E。常見陷阱：(a)以為服warfarin者一律禁tPA(其實INR≤1.7可給)；(b)忘記DOAC末次服藥>48小時才適用tPA(本例warfarin非DOAC，依INR判定)。出題核心在AF抗凝時機、整流前抗凝、與溶栓的INR門檻。","options":{"A":"錯誤。雖(1)(3)正確，但(2)(4)亦正確，組合不完整。","B":"錯誤。(2)(4)正確，但(1)(3)也正確，不應排除。","C":"錯誤。(1)(4)正確，但(2)(3)亦正確。","D":"錯誤。(2)(3)正確，但(1)(4)亦正確。","E":"正確。四個情境(新發AF先抗凝延後整流、輕症中風第3日起DOAC、停藥後TIA立即加回、warfarin INR 1.4可tPA)皆為正確處置。"},"sources":["Harrison 21e, Cardioembolic stroke; Atrial Fibrillation","2023 ESC/EACTS AF Guidelines","AHA/ASA 2019 Acute Ischemic Stroke; 1-3-6-12 rule (EHRA)"]}},"110-149":{"quick":"腦靜脈栓塞(CVT)：單一皮質靜脈表現少見(1對)；DOAC對CVT再發預防「未優於」VKA(4對，RE-SPECT CVT)，選C；失語應為Labbé靜脈(非Trolard)、anti-PF4與「疫苗(VITT)」相關而非COVID感染本身，故(2)(3)錯。","detail":{"background":"腦靜脈竇/靜脈栓塞(cerebral venous thrombosis, CVT)好發於年輕女性，危險因子含懷孕/產褥、口服避孕藥、易栓體質、感染、脫水與惡性腫瘤；臨床以頭痛(最常)、癲癇、局部神經缺損、視乳突水腫、意識改變表現，可造成非動脈分布的靜脈性梗塞合併出血。診斷靠MRV/CTV。本題逐項：(1)CVT僅以「單一皮質靜脈(isolated cortical vein)」栓塞表現確實較少見(多為靜脈竇受累)，正確。(2)上吻合靜脈Trolard與下吻合靜脈Labbé中，「失語」主要與優勢半球顳葉的Labbé靜脈相關(Labbé引流顳葉)，而非Trolard，故(2)錯誤。(3)anti-platelet factor 4(anti-PF4)抗體造成的血栓伴血小板低下，是「腺病毒載體COVID疫苗」引起的VITT(疫苗引起血栓性血小板低下)，與「COVID-19感染本身」無此明確機轉，故(3)錯誤。(4)RE-SPECT CVT試驗顯示dabigatran(DOAC)對CVT再發預防與warfarin(VKA)相當、「未顯著優於」，故(4)敘述正確。治療上CVT即使有靜脈性出血，仍以抗凝(急性肝素、後續口服抗凝)為主。故正確組合為(1)+(4)=C。","options":{"A":"錯誤。(1)正確，但(3)將anti-PF4歸因於COVID感染有誤(應為疫苗VITT)。","B":"錯誤。(2)失語應與Labbé靜脈相關(非Trolard)，(4)雖正確但組合不成立。","C":"正確。(1)單一皮質靜脈表現少見、(4)DOAC對CVT再發未優於VKA(RE-SPECT CVT)，皆正確。","D":"錯誤。(2)(3)皆有誤。","E":"錯誤。(2)(3)錯誤，並非全部正確。"},"sources":["Harrison 21e, Cerebral Venous Thrombosis","Ferro JM et al. RE-SPECT CVT, JAMA Neurol 2019","2017 ESO Guideline on CVT"]}},"111-145":{"quick":"老年、非高血壓糖尿病、反覆「腦葉(lobar)」出血→腦類澱粉血管病變(CAA)，常合併皮質微出血(選E)；CAA與ApoE ε2/ε4(非ε3)相關、好發>70歲、腦幹與深部出血是高血壓性而非CAA。","detail":{"background":"腦類澱粉血管病變(cerebral amyloid angiopathy, CAA)是高齡者反覆「腦葉(lobar)」自發性腦出血的重要原因，機轉為β-amyloid沉積於皮質與軟腦膜中小動脈壁，使血管脆弱易破。臨床特徵：年長(尤>70歲、隨年齡上升)、常無典型高血壓/糖尿病(與高血壓性出血不同)、出血位於「皮質-皮質下(lobar)」如額、頂、顳、枕葉，且常反覆發作；可伴短暫局部神經發作(amyloid spells)與認知退化。影像(尤其SWI/GRE梯度回訊)常見「多發皮質/皮質下微出血(cortical microbleeds)」與皮質表面含鐵血黃素沉積(cortical superficial siderosis)，這是Boston診斷準則的重點，故(E)正確。逐項：(A)CAA與ApoE「ε2與ε4」相關(ε4促進沉積、ε2與血管病變/出血傾向相關)，ε3為中性，敘述「ε2或ε3」錯誤。(B)CAA好發於「腦葉/皮質」，「腦幹、基底核、視丘、小腦深部」出血是「高血壓性」的特徵，CAA典型不在腦幹，故B錯。(C)CAA無明確男性多於女性，C錯。(D)主要發病年齡為「>70歲的高齡」而非50–70，D錯。本題核心：以「老年＋非高血壓糖尿病＋反覆腦葉出血＋皮質微出血」鎖定CAA，並與高血壓性深部出血鑑別。","options":{"A":"錯誤。CAA與ApoE「ε2與ε4」相關(ε4增沉積、ε2增出血傾向)，ε3為中性，非「ε2或ε3」。","B":"錯誤。腦幹/深部出血是高血壓性特徵；CAA好發於腦葉(皮質-皮質下)，較少在腦幹。","C":"錯誤。CAA無明確的男性多於女性。","D":"錯誤。CAA主要發生於>70歲高齡，且風險隨年齡上升，非50–70歲為主。","E":"正確。CAA常合併多發性皮質/皮質下微出血與皮質表面含鐵血黃素沉積，為診斷重要線索。"},"sources":["Harrison 21e, Intracerebral Hemorrhage","Adams & Victor's Neurology, ICH","Boston Criteria v2.0 for CAA (Lancet Neurol 2022)"]}},"111-149":{"quick":"抗凝相關腦出血逆轉：dabigatran→idarucizumab(2對)；Factor Xa抑制劑無andexanet時→給4F-PCC(3對)，選D；VKA應「先給PCC＋vitamin K」而非先FFP(1錯)；Xa抑制劑高蛋白結合不可透析(4錯)。","detail":{"background":"抗凝劑相關腦內出血(anticoagulant-related ICH)死亡率高，急救核心是「立即停藥＋特異性逆轉＋控壓」。逐項分析逆轉策略：(1)維他命K拮抗劑(warfarin)：首選為「4-factor凝血酶原複合濃縮物(4F-PCC)＋靜脈vitamin K」，PCC起效快、容量負荷小，優於新鮮冷凍血漿(FFP)；本敘述「先給FFP再給PCC」順序與優先性錯誤(應以PCC為先、vitamin K維持持久逆轉)，故(1)錯。(2)Dabigatran(直接凝血酶抑制劑)：立即給單株抗體idarucizumab(專一逆轉劑)，正確。(3)Factor Xa抑制劑(rivaroxaban/apixaban)：首選andexanet alfa；若無，則以4F-PCC替代，正確。(4)Factor Xa抑制劑與血漿蛋白高度結合、分布體積大，「無法用透析/腎臟替代療法清除」；可被透析清除的是dabigatran(蛋白結合低)，故(4)錯誤(把可透析特性張冠李戴到Xa抑制劑)。因此正確為(2)+(3)=D。此外所有抗凝相關ICH均應積極但平穩地控制血壓(收縮壓約<140)、停用抗凝、神經外科會診。出題核心：各類抗凝劑的「特異逆轉劑」與「PCC優於FFP」、「dabigatran可透析、Xa抑制劑不可」。","options":{"A":"錯誤。(1)VKA逆轉應先以PCC＋vitamin K(非先FFP)，順序與優先性有誤。","B":"錯誤。(2)正確但(4)Xa抑制劑無法透析清除，組合不成立。","C":"錯誤。(1)(4)皆有誤。","D":"正確。(2)dabigatran→idarucizumab、(3)Xa抑制劑無andexanet時給PCC，皆為正確逆轉策略。","E":"錯誤。(1)(4)錯誤，並非全部正確。"},"sources":["Harrison 21e, Intracerebral Hemorrhage; Anticoagulant Reversal","Neurocritical Care Society 2016 Reversal of Antithrombotics in ICH","2022 AHA/ASA Spontaneous ICH Guideline"]}},"113-145":{"quick":"發病5小時(超過4.5小時tPA窗)、NIHSS 19(高分→疑大血管阻塞LVO)→應做CTA確認並進行動脈內取栓(thrombectomy)，選E；此時給tPA或單給aspirin皆非最適。","detail":{"background":"本題考急性缺血性中風的「再灌流治療時間窗與適應症」。靜脈血栓溶解(IV alteplase 0.9 mg/kg)的標準時間窗為發病4.5小時內；本例「自症狀發生已5小時」已超窗，故(C)(D)直接給tPA不適當(且劑量0.6 mg/kg為日本/亞洲低劑量方案，非標準首選描述)。NIHSS高達19分強烈提示大血管阻塞(large vessel occlusion, LVO)——前循環LVO的機械取栓(endovascular thrombectomy)時間窗，依DAWN/DEFUSE-3等試驗可延長至發病後6–24小時(需影像如CTA/CTP/MRI挑選有可救組織者)。因此最適當處置是先安排電腦斷層血管攝影(CTA)確認LVO，再評估動脈內取栓，故選E。單給aspirin((A)(B))會延誤再灌流時機，非高NIHSS、疑LVO病人的首選。出題年(113年)正反映取栓時間窗延長(6–24小時)與「高NIHSS→快做CTA找LVO→取栓」的臨床路徑。","options":{"A":"錯誤。aspirin 100mg非疑LVO大中風的首選，且延誤再灌流評估。","B":"錯誤。aspirin 300mg同樣非最適，未處理可能的LVO。","C":"錯誤。已超過4.5小時tPA窗，且0.6mg/kg非標準方案。","D":"錯誤。發病5小時已逾靜脈溶栓時間窗，給0.9mg/kg tPA不適當。","E":"正確。高NIHSS疑大血管阻塞，應做CTA確認並評估動脈內取栓(取栓窗可達6–24小時)。"},"sources":["Harrison 21e, Acute Ischemic Stroke / Reperfusion","DAWN (NEJM 2018) & DEFUSE-3 (NEJM 2018)","AHA/ASA 2019 Acute Ischemic Stroke Guideline"]}},"113-150":{"quick":"抗凝相關腦出血逆轉：dabigatran→idarucizumab(2對)、Xa抑制劑無andexanet時給PCC(3對)，選B；VKA應先PCC＋vitamin K非先FFP(1錯)、Xa抑制劑不可透析(4錯)。","detail":{"background":"本題與111-149為同一主題的再次出題，考各類口服抗凝劑相關腦內出血的「特異逆轉」。重點再整理：維他命K拮抗劑(warfarin)逆轉以「4-factor PCC＋靜脈vitamin K」為首選，PCC比FFP更快、容量更小，故(1)「先FFP再PCC」順序錯誤。Dabigatran(直接凝血酶抑制劑)有專一單株抗體idarucizumab可即時完全逆轉((2)正確)。第Xa因子抑制劑(apixaban、rivaroxaban、edoxaban)逆轉首選andexanet alfa；若無，可用4F-PCC替代((3)正確)。透析(腎臟替代療法)能清除的是「蛋白結合低、分布體積小」的dabigatran；而Xa抑制劑高度蛋白結合，透析無效，故(4)錯誤。因此本題正確組合為(2)+(3)=B(與111-149選項代號雖不同，但概念相同)。臨床上抗凝ICH同時要控血壓、停藥、評估手術；逆轉後仍須評估後續抗栓策略與再啟時機。","options":{"A":"錯誤。(1)VKA應先PCC＋vitamin K(非先FFP)，且(3)正確未被選入此組合的對照。","B":"正確。(2)dabigatran→idarucizumab、(3)Xa抑制劑無andexanet時以PCC替代，為正確逆轉策略。","C":"錯誤。(1)(4)皆有誤(FFP順序、Xa不可透析)。","D":"錯誤。(4)Xa抑制劑無法以透析清除。","E":"錯誤。(1)(4)錯誤，並非全部正確。"},"sources":["Harrison 21e, Anticoagulant-related ICH and Reversal","Pollack CV et al. RE-VERSE AD (idarucizumab), NEJM 2017","Connolly SJ et al. ANNEXA-4 (andexanet alfa), NEJM 2019"]}},"114-147":{"quick":"急性缺血性中風血壓管理：若要打tPA須先把血壓降至<185/110(選B)；未接受再灌流者血壓未達220/120不主動降壓(非240/120)，避免過度降壓。","detail":{"background":"急性缺血性中風的血壓管理是「該不該降、降到多少」的高頻考點，核心仍是保護缺血半暗帶灌流(容許性高血壓)。(B)正確：若病人將接受靜脈血栓溶解(tPA)或機械取栓，為降低症狀性腦出血風險，須先將血壓控制到「<185/110 mmHg」，治療後維持<180/105 mmHg約24小時。(A)錯誤：把血壓硬降到140/90過於積極，會減少灌流、擴大梗塞。(C)錯誤：未接受再灌流治療者的降壓門檻是「>220/120 mmHg」才考慮謹慎降壓(降約15%)，而非240/120。(D)錯誤：>180/100就立即用藥降壓並非急性缺血性中風的原則(那較接近出血性中風的概念)。(E)錯誤：並非所有缺血性中風病人24小時內都需嚴格降壓，需依是否再灌流與基礎狀況個別化。出題核心：tPA前185/110、未再灌流者220/120兩個關鍵數字，以及容許性高血壓原則。","options":{"A":"錯誤。降至140/90過度積極，急性期應採容許性高血壓以維持半暗帶灌流。","B":"正確。準備靜脈溶栓(或取栓)前須先將血壓降至<185/110 mmHg。","C":"錯誤。未再灌流者降壓門檻為>220/120(非240/120)。","D":"錯誤。>180/100即用藥降壓非缺血性中風急性處置原則。","E":"錯誤。並非所有病人24小時內都需嚴格控壓，須依再灌流與個別狀況決定。"},"sources":["Harrison 21e, Acute Ischemic Stroke management","AHA/ASA 2019 Guidelines for Early Management of AIS","Adams & Victor's Neurology, Stroke"]}},"114-149":{"quick":"癌症相關中風(Trousseau，胰腺癌＋多處散在性梗塞、無AF)源於高凝/非細菌性栓塞，二級預防可考慮低分子量肝素(LMWH)，選C；非腫瘤直接侵犯血管，急性期仍可考慮tPA/取栓，D-dimer有意義。","detail":{"background":"癌症相關缺血性中風(cancer-associated stroke，又稱Trousseau症候群相關)是惡性腫瘤(尤其腺癌如胰臟、肺、胃腸)造成的高凝狀態(hypercoagulability)，機轉包括組織因子(tissue factor)與黏液素(mucin)促凝、非細菌性血栓性心內膜炎(NBTE, marantic endocarditis)產生的瓣膜贅生物栓塞、瀰漫性血管內凝血(DIC)。影像典型為「多個血管分布區的散在性(multiple, multi-territory)急性梗塞」，且常無AF等傳統心源性來源——本例胰臟腺癌＋多處散在性梗塞＋無AF完全吻合。逐項：(A)錯，並非腫瘤細胞「局部侵犯腦血管」，而是全身高凝/栓塞機轉。(B)錯，急性期若在時間窗且無禁忌，仍可考慮靜脈溶栓，並非絕對避免。(C)正確，二級預防的抗栓藥物，對癌症相關血栓常選「低分子量肝素(LMWH)」(相較warfarin對癌症相關血栓更穩定有效；DOAC亦逐漸採用，但LMWH是經典答案)。(D)錯，腫瘤相關大血管阻塞仍可評估動脈內取栓，並非不建議。(E)錯，D-dimer在癌症相關中風常顯著升高，是高凝與栓塞負荷的重要標記、與預後相關，並非無意義。出題核心：辨識多區散在性梗塞＋腺癌＝Trousseau，二級預防偏好LMWH。","options":{"A":"錯誤。機轉是全身性高凝與栓塞(NBTE/DIC)，非腫瘤局部侵犯腦血管。","B":"錯誤。急性期若符合條件仍可考慮靜脈溶栓，並非一律避免。","C":"正確。癌症相關血栓的抗栓二級預防常選低分子量肝素(LMWH)。","D":"錯誤。大血管阻塞仍可評估動脈內取栓，並非不建議。","E":"錯誤。D-dimer在癌症相關中風常明顯升高、具臨床與預後意義。"},"sources":["Harrison 21e, Stroke in special situations; Trousseau syndrome","Adams & Victor's Neurology, Stroke with systemic disease","NCCN/ITAC guidance on cancer-associated thrombosis (LMWH)"]}},"104-綜-5":{"quick":"譫妄(delirium)是「器質性」急性腦功能障礙：感染(尿道炎、肺炎)、代謝障礙、藥物皆為誘因；純粹「心理壓力」不是典型病因，故除外選E。","detail":{"background":"譫妄(delirium)是一種急性發作、病程波動、以「注意力(attention)障礙」為核心、伴隨意識清醒度與認知改變的症候群，本質是「急性腦病變」反映了潛在的器質性(生理性)病因，而非單純心理現象。DSM-5強調譫妄必為某種生理狀況、物質中毒/戒斷或多重病因的直接後果。老年人因腦儲備下降、共病多、用藥多而特別脆弱。常見可逆誘因可用助記DELIRIUM/字首歸納：藥物(尤其抗膽鹼、苯二氮平、鴉片、類固醇)、感染(尿道感染、肺炎、敗血症)、代謝/電解質異常(低血鈉、低血糖、肝腎衰竭、缺氧)、脫水與便秘尿滯留、疼痛、睡眠剝奪、手術後與ICU環境、酒精/藥物戒斷。處置首重「找出並矯正病因」＋非藥物措施(定向、家屬陪伴、助聽助視、日夜節律、移除導管約束)。本題四個選項(尿道炎、代謝障礙、肺炎、藥物)都是典型器質性誘因；唯「心理壓力」並非譫妄的直接生理病因(心理壓力較相關於焦慮/適應障礙，而非譫妄)，故為「除外」答案。出題核心：辨識譫妄為器質性、可逆、需找病因，而非心因性。","options":{"A":"錯誤(屬病因)。尿道炎(感染)是老年譫妄極常見的誘因。","B":"錯誤(屬病因)。代謝障礙(低血鈉、低血糖、肝腎衰竭、缺氧)是常見譫妄誘因。","C":"錯誤(屬病因)。肺炎等感染是老年譫妄典型誘因。","D":"錯誤(屬病因)。藥物(抗膽鹼、鎮靜安眠、鴉片、類固醇)是最常見的可矯正誘因。","E":"正確(除外)。純粹心理壓力非譫妄的直接器質性病因，故為答案。"},"sources":["Harrison 21e, Confusion and Delirium","DSM-5, Delirium","Adams & Victor's Neurology, Delirium and Acute Confusional States"]}},"104-綜-8":{"quick":"ICU呼吸器病人若併發譫妄，預後較差：住院天數增加(1)、6個月死亡率上升(2)、出院時認知缺損較嚴重(3)，選D；其鎮靜藥用量更多、呼吸器使用天數更長(故(4)(5)錯)。","detail":{"background":"加護病房譫妄(ICU delirium)是重症照護的重要預後指標，與短期及長期不良結果一致相關。多項研究(如BRAIN-ICU世代)顯示，ICU期間發生譫妄者：(1)住院/加護病房天數增加；(2)中長期(含6個月、1年)死亡率上升——譫妄持續天數愈長，死亡風險與長期認知損害愈高；(3)出院時與長期的「認知功能缺損」較嚴重，類似輕度失智或創傷性腦損傷的認知軌跡。相對地，(4)「使用較少鎮靜藥」與(5)「呼吸器使用天數較短」皆與事實相反——譫妄者往往因躁動而被使用「更多」鎮靜藥(尤其苯二氮平類本身又會誘發/加重譫妄，形成惡性循環)，且呼吸器脫離更困難、使用天數「更長」。預防與處置採ABCDEF bundle(疼痛評估、自發甦醒/呼吸試驗、選擇鎮靜劑避免BZD改用dexmedetomidine、譫妄監測CAM-ICU、早期活動、家屬參與)。故正確組合為(1)+(2)+(3)=D。出題核心：ICU譫妄→更長住院/更高死亡/更差認知，且鎮靜藥用更多、呼吸器更久。","options":{"A":"錯誤。含(4)使用較少鎮靜藥，與事實相反(實為用更多)。","B":"錯誤。含(5)呼吸器天數較短，與事實相反(實為更長)。","C":"錯誤。含(5)呼吸器天數較短之誤述。","D":"正確。譫妄者住院天數增加、6個月死亡率上升、出院認知缺損更嚴重。","E":"錯誤。(4)(5)皆與事實相反。"},"sources":["Harrison 21e, Delirium in critically ill","Pandharipande PP et al. BRAIN-ICU, NEJM 2013","SCCM PADIS Guidelines 2018 (ABCDEF bundle)"]}},"109-181":{"quick":"先精神症狀(焦慮憂鬱)→漸進帕金森症＋認知衰退＋「視幻覺與妄想」→路易體失智症(DLB)，選D；視幻覺與認知波動、帕金森症、REM睡眠行為障礙為DLB核心特徵。","detail":{"background":"路易體失智症(dementia with Lewy bodies, DLB)是僅次於阿茲海默症的常見退化性失智，病理為α-synuclein組成的路易體廣泛分布於皮質與腦幹。其核心臨床特徵(2017 DLB共識準則)為：(a)認知波動(fluctuating cognition，注意與警醒度起伏)；(b)反覆出現且詳盡的「視幻覺(visual hallucinations)」；(c)自發性帕金森症(動作緩慢、僵硬、步態不穩，顫抖較少)；(d)快速動眼期睡眠行為障礙(RBD)，常早於失智多年出現。支持特徵含對抗精神病藥(尤其典型/第一代)的「嚴重敏感性」(可致惡性症候群、惡化)、自律神經失調、憂鬱與妄想。DaT-SPECT顯示紋狀體多巴胺轉運體攝取下降可輔助診斷。「失智在帕金森症狀出現後1年內(或之前)發生」傾向DLB；若帕金森病已數年後才失智則歸帕金森病失智(PDD)——此為「一年法則(one-year rule)」。本例先有焦慮憂鬱睡眠差(常為前驅)、繼而帕金森症＋記憶退化＋視幻覺與妄想，最符合DLB。鑑別：CBD以非對稱失用/異肢；MSA以自律神經衰竭/小腦徵且對levodopa反應差；PSP以垂直凝視麻痺與早期跌倒；FTD以行為/語言為主、視幻覺少。出題核心：以「視幻覺＋認知波動＋帕金森症」鎖定DLB並注意抗精神病藥敏感性。","options":{"A":"錯誤。皮質基底核退化(CBD)以非對稱性失用、肌張力不全、異肢現象為主，非以視幻覺表現。","B":"錯誤。多系統萎縮(MSA)以自律神經衰竭、小腦或帕金森徵、對levodopa反應差為主。","C":"錯誤。進行性上核麻痺(PSP)以垂直性凝視麻痺、早期反覆跌倒、軸性僵硬為主。","D":"正確。視幻覺＋妄想＋帕金森症＋認知衰退與波動，符合路易體失智症(DLB)。","E":"錯誤。額顳葉失智(FTD)以行為人格改變或語言障礙為主，視幻覺少見。"},"sources":["Harrison 21e, Dementia (Lewy body disease)","McKeith IG et al. 2017 DLB Consensus Criteria, Neurology","Adams & Victor's Neurology, Degenerative Dementias"]}},"109-183":{"quick":"Wernicke腦病變給thiamine後「眼肌麻痺/複視」恢復最快(數小時至數日)，選A；步態不穩較慢、記憶(Korsakoff)常永久殘留。","detail":{"background":"Wernicke腦病變(Wernicke encephalopathy, WE)是thiamine(維生素B1)缺乏引起的急症，經典三聯徵為：眼動異常(眼震、外直肌/第六對腦神經麻痺、共軛凝視麻痺)、小腦性步態/軀幹失調、與意識混亂(全面性精神混沌)，但完整三聯徵僅約三分之一出現。高危族群為慢性酒癮(本例)、營養不良、長期嘔吐(如妊娠劇吐、胃癌、減重手術後)。治療為「立即靜脈高劑量thiamine」，且務必在輸注含糖點滴「之前或同時」給予(先給葡萄糖會耗竭殘餘thiamine而誘發/惡化WE)。對thiamine治療的「恢復速度」有明確順序差異，是本題考點：眼肌麻痺/眼動異常恢復最快(常於數小時至數日內改善，故(A)複視最快)；眼震與意識混亂次之；步態與軀幹失調恢復較慢且常不完全；而記憶障礙(若進展為Korsakoff症候群——前向＋逆向失憶、虛談confabulation)恢復最差、常永久殘存。因此「複視/眼肌麻痺恢復最快」。出題核心：WE治療(先thiamine後葡萄糖)與各症狀恢復順序(眼動>步態>記憶)。","options":{"A":"正確。眼肌麻痺/複視對thiamine反應最快，常於數小時至數日內改善。","B":"錯誤。步態/軀幹失調恢復較慢且常不完全。","C":"錯誤。記憶喪失(Korsakoff)恢復最差，常永久殘留。","D":"錯誤。淡漠等屬意識/精神症狀，恢復慢於眼動症狀。","E":"錯誤。混沌(意識混亂)雖會改善，但較眼肌麻痺慢。"},"sources":["Harrison 21e, Nutritional Diseases of the Nervous System (Thiamine)","Adams & Victor's Neurology, Wernicke-Korsakoff Syndrome","EFNS Guideline on Wernicke Encephalopathy 2010"]}},"111-148":{"quick":"WE的眼徵以「眼震與第六對腦神經(外直肌)麻痺、共軛凝視麻痺」為主，「眼瞼下垂(ptosis)」並非Wernicke典型表現，故C較不正確。","detail":{"background":"韋尼克-高沙可夫症候群(Wernicke-Korsakoff syndrome)是thiamine缺乏的急性(Wernicke腦病變, WE)與慢性(Korsakoff精神病)連續譜。逐項檢視：(A)正確——Korsakoff(以順向失憶、虛談為主的失憶症候群)多在WE之後、未及時治療而留下。(D)正確——步態不穩常合併周邊神經病變與小腦受損(thiamine缺乏同時傷及周邊神經與小腦蚓部)。(E)正確——治療後恢復順序為眼肌麻痺先、步態與記憶較慢(眼動症狀恢復快於步態)。關於(C)：WE的眼動異常以「水平/垂直眼震、外直肌(第六對腦神經)麻痺造成的複視、與共軛凝視麻痺」為主，並「不」以「眼瞼下垂(ptosis)」為表現(ptosis較見於重症肌無力、Horner、動眼神經麻痺等)，故C的敘述最不正確、為答案。需補充一個爭議點：WE的小腦失調「以站姿與步態(軀幹)失調為主、肢體失調較少」，因此(B)「肢體失調較軀幹失調常見」在臨床上其實也偏離事實；但本題以(C)的「ptosis」為最明確、無爭議的錯誤敘述作為標準答案。出題核心：記住WE眼徵=眼震＋CN6麻痺＋凝視麻痺，而非ptosis。","options":{"A":"正確。Korsakoff失憶症候群多接續於未及時治療的Wernicke腦病變之後。","B":"敘述偏差但非標準答案。WE的小腦徵以軀幹/步態失調為主、肢體失調較少；本題以(C)為最明確錯誤。","C":"正確(為答案，敘述最不正確)。WE眼徵為眼震、第六對腦神經麻痺與共軛凝視麻痺，並非以眼瞼下垂(ptosis)表現。","D":"正確。步態不穩常合併多發性神經病變與小腦病變。","E":"正確。治療後眼肌麻痺恢復較步態不穩快。"},"sources":["Harrison 21e, Thiamine deficiency / Wernicke-Korsakoff","Adams & Victor's Neurology, Wernicke-Korsakoff Syndrome"]}},"111-155":{"quick":"譫妄正確敘述＝危險因子(導尿、約束、睡眠/感覺剝奪、加≥3新藥)(1)＋盲目藥物治療反延長混亂並掩蓋病因(4)＋避免化學約束、必要時極低劑量抗精神病藥僅留給嚴重躁動危險者(5)，選E；死亡率非僅2–4%(2錯)、抗膽鹼/鎮靜藥是誘發而非保護因子(3錯)。","detail":{"background":"譫妄(delirium)的預防與處置近年強調「找病因＋非藥物優先＋審慎用藥」。逐項：(1)正確——住院譫妄的可改變危險因子包括留置導尿管、身體約束、睡眠與感覺剝奪(缺助聽/助視)、以及短期內新增三種以上藥物(多重用藥)，這些都是HELP(Hospital Elder Life Program)等預防方案的介入標的。(2)錯誤——譫妄的住院死亡率「並不低」，估計可達22–76%(視族群)，其短期死亡風險與敗血症、急性心肌梗塞相當，絕非僅2–4%。(3)錯誤——具「抗膽鹼或鎮靜特性的藥物」是譫妄的「誘發/危險因子」而非保護因子(藥物是最常見的可矯正誘因之一，應減量或停用)。(4)正確——盲目以藥物壓制譫妄症狀只會延長混亂時間、增加跌倒與吸入風險，並可能掩蓋潛在病因。(5)正確——應避免不必要的化學約束(chemical restraint)，僅在「嚴重躁動且明顯有傷害自己或他人風險」時，使用「極低劑量」典型或非典型抗精神病藥短期處理，並留意DLB對抗精神病藥的敏感性。故正確組合為(1)+(4)+(5)=E。出題核心：譫妄死亡率不低、藥物(尤抗膽鹼/鎮靜)是誘因非保護、藥物治療僅留給危險性躁動。","options":{"A":"錯誤。含(2)(3)：死亡率非僅2–4%、抗膽鹼/鎮靜藥是誘因非保護因子。","B":"錯誤。含(3)藥物為保護因子之誤述。","C":"錯誤。(2)(3)皆誤。","D":"錯誤。含(3)之誤述。","E":"正確。(1)危險因子、(4)盲目用藥延長混亂掩蓋病因、(5)避免化學約束僅留給危險躁動，皆正確。"},"sources":["Harrison 21e, Delirium","Inouye SK. Delirium in Older Persons, NEJM 2006/2014","SCCM PADIS 2018"]}},"113-151":{"quick":"失智症行為與心理症狀(BPSD)處置以「非藥物/照顧者介入」為首選，抗精神病藥「並非首選」(有黑框警示、增加死亡與中風)，故敘述為非者選A。","detail":{"background":"失智症的行為與心理症狀(behavioral and psychological symptoms of dementia, BPSD)包含躁動、攻擊、遊走、妄想、幻覺、憂鬱、睡眠障礙等，是照護負擔與機構化的主因。當代處置原則一致強調「非藥物介入為第一線」：先排除並矯正可逆誘因(疼痛、感染、便秘、脫水、藥物、環境)，再以「照顧者導向介入」(照顧技能培訓、心理衛教、活動與環境調整、結構化日常)為核心——這些介入「具有最高的實證基礎」((B)(C)正確)。藥物僅在「症狀造成顯著困擾或安全危險、且非藥物措施無效」時短期使用，並明確設定治療目標與定期再評估((D)正確)；其中低劑量risperidone在部分國家(含對攻擊行為)有短期使用許可((E)正確)。關鍵安全議題：抗精神病藥在失智老人有「黑框警示」——增加中風與全因死亡風險，且對DLB可能引發嚴重敏感反應，因此「抗精神病藥治療是首選介入方式」的敘述((A))是錯誤的，為本題答案。出題核心：BPSD首選非藥物/照顧者介入，抗精神病藥非首選且有死亡/中風風險。","options":{"A":"正確(為答案，敘述錯誤)。抗精神病藥並非BPSD首選；首選為非藥物與照顧者導向介入，且抗精神病藥有增加死亡/中風的黑框警示。","B":"錯誤(敘述正確)。針對照顧者的介入具有最高實證基礎。","C":"錯誤(敘述正確)。照顧者介入包含技能培訓、心理衛教與活動調整。","D":"錯誤(敘述正確)。症狀困擾或危險時，可短期、設定明確目標的藥物治療。","E":"錯誤(敘述正確)。低劑量risperidone在某些國家對攻擊行為有短期使用許可。"},"sources":["Harrison 21e, Dementia management","APA Practice Guideline: Use of Antipsychotics for Agitation/Psychosis in Dementia 2016","FDA black-box warning, antipsychotics in elderly dementia"]}},"114-145":{"quick":"胃癌長期嘔吐營養不良＋眼震、小腦步態、反應遲鈍→Wernicke腦病變：優先「立即靜脈高劑量thiamine(2)」並安排「腦部MRI(1)」確認，選A；CTA(3)與感染免疫檢查(4)非首要。","detail":{"background":"本題是非酒癮族群的Wernicke腦病變(WE)典型情境：胃癌導致長期食慾不振、持續嘔吐、體重下降→thiamine(B1)耗竭。出現意識混亂、眼球震顫(眼動異常)、小腦性步態與反應遲鈍，正是WE三聯徵。臨床鐵則是「臨床懷疑即應立即治療，不可等檢查」：優先給予(2)靜脈高劑量thiamine(常用方案如thiamine 500 mg IV q8h數日)，且務必在任何含糖輸液之前或同時給予(先輸葡萄糖會加速耗竭thiamine、誘發或惡化WE)。同時安排(1)腦部MRI——WE在MRI典型可見乳頭體(mammillary bodies)、丘腦內側、中腦導水管周圍與第三/四腦室周圍的對稱性T2/FLAIR高訊號，有助確診但「不應因等MRI而延遲給thiamine」。(3)腦部CT血管攝影(CTA)是評估血管病變(動脈瘤、阻塞)用，與本病無關、非首要；(4)感染及免疫檢查在此情境也非優先。故最適當為(1)+(2)=A。出題核心：營養不良/嘔吐病人的WE要「先打thiamine、避免先給糖」並以MRI輔助診斷。","options":{"A":"正確。立即靜脈高劑量thiamine(2)為救命首要，並安排腦部MRI(1)確認乳頭體/丘腦病變。","B":"錯誤。(4)感染免疫檢查非首要，缺少最關鍵的MRI確認。","C":"錯誤。(3)CTA與WE無關，且缺少救命的thiamine。","D":"錯誤。含(3)CTA與(4)非首要檢查。","E":"錯誤。(3)CTA非必要，不應全選。"},"sources":["Harrison 21e, Wernicke Encephalopathy","Adams & Victor's Neurology, Thiamine deficiency","Radiology of Wernicke (mammillary body/periaqueductal T2 hyperintensity)"]}},"110-145":{"quick":"MuSK型肌無力其實「症狀較重、易侵犯延髓與呼吸肌、對AChEI反應差」，故「症狀較輕、進展較緩」的敘述不正確，選D。","detail":{"background":"本題比較重症肌無力(myasthenia gravis, MG)與各種神經肌肉接合處(NMJ)疾病。MG是抗體攻擊突觸後膜的自體免疫病，以「易疲勞、休息後改善」的波動性肌無力為特徵。逐項：(A)正確——MG有雙峰年齡分布，「早發(<50歲)以女性為多、常合併胸腺增生」，「晚發(>50歲)男女相近、常合併胸腺瘤」。(B)正確——肉毒桿菌中毒(botulism)毒素抑制突觸前乙醯膽鹼釋放，屬「突觸前(presynaptic)」病變，與LEMS同類，而MG屬突觸後。(C)正確——肌無力危象(myasthenic crisis)的急性免疫治療，血漿置換(PLEX)與靜脈免疫球蛋白(IVIG)療效大致相當(PLEX起效或略快、IVIG便利度高)。(E)正確——Lambert-Eaton肌無力症候群(LEMS)約半數合併小細胞肺癌(SCLC)，屬副腫瘤。(D)錯誤——抗MuSK抗體型MG並非「較輕、進展較緩」，相反地常「較嚴重」，易侵犯延髓(臉、咽喉、頸、呼吸肌)、易出現危象，且對乙醯膽鹼酯酶抑制劑(pyridostigmine)反應差、可能惡化，治療多需類固醇/免疫抑制與rituximab(對MuSK-MG效果佳)。故D為「較不正確」的答案。出題核心：MuSK-MG偏重且難治，與AChR-MG的雙峰年齡、PLEX/IVIG等價、botulism突觸前等知識。","options":{"A":"正確。MG早發(<50歲)女性多、晚發(>50歲)男女相近。","B":"正確。肉毒桿菌中毒為突觸前(抑制ACh釋放)病變。","C":"正確。危象時PLEX與IVIG療效相近。","D":"正確(為答案，敘述不正確)。MuSK型MG常較嚴重、易侵延髓與呼吸肌、對AChEI反應差，並非較輕較緩。","E":"正確。LEMS約半數合併小細胞肺癌。"},"sources":["Harrison 21e, Myasthenia Gravis and Other Diseases of the NMJ","Adams & Victor's Neurology, MG/LEMS","MGFA / Sanders 2016 International MG Treatment Guidance"]}},"110-146":{"quick":"胸腹主動脈瘤術後脊髓(前脊動脈)缺血→脊髓前症候群：運動與痛溫覺喪失、低血壓、尿失禁皆可能；但「震動感(後柱)」由後脊動脈供應而保留，故較不可能出現，選C。","detail":{"background":"胸腹主動脈瘤(thoracoabdominal aortic aneurysm)修補的重大併發症是「脊髓缺血(spinal cord ischemia)」，因供應脊髓前2/3的Adamkiewicz動脈(great anterior radiculomedullary artery)及肋間動脈在手術中被阻斷或栓塞。其臨床表現為「脊髓前動脈症候群(anterior spinal artery syndrome)」：受損的是脊髓前2/3，包含皮質脊髓徑(雙下肢運動無力/癱)、脊髓視丘徑(痛溫覺喪失)，以及側角自律神經(造成低血壓、膀胱直腸功能障礙如尿失禁)。關鍵在於「後柱(dorsal columns)由後脊動脈(posterior spinal arteries)供應，前脊動脈症候群會『保留』本體感覺與振動覺」。因此(A)痛覺下降、(B)溫度感下降、(D)低血壓(自律受損)、(E)尿失禁皆「可能出現」，而(C)「下肢震動感下降」屬後柱功能，在前脊動脈缺血中通常「保留」，故為「較不可能出現」的答案。預防策略含腦脊髓液引流、維持灌流壓、再植肋間動脈。出題核心：前脊動脈症候群=運動＋痛溫覺喪失但「振動/本體覺保留」。","options":{"A":"錯誤(可能出現)。脊髓視丘徑受損→痛覺下降。","B":"錯誤(可能出現)。脊髓視丘徑受損→溫度感下降。","C":"正確(較不可能)。振動覺屬後柱(後脊動脈供應)，前脊動脈症候群通常保留，故較不可能下降。","D":"錯誤(可能出現)。自律(側角)受損與術中因素可致低血壓。","E":"錯誤(可能出現)。膀胱功能受損可致尿失禁。"},"sources":["Harrison 21e, Diseases of the Spinal Cord (vascular)","Adams & Victor's Neurology, Anterior Spinal Artery Syndrome"]}},"110-148":{"quick":"敗血性休克後呼吸器依賴、兩週四肢無力萎縮＝重症病房多發性神經病變/肌病(CIP/CIM)，屬「軸突型」：動作電位振幅下降、但「傳導速度大致正常」，故B不正確。","detail":{"background":"重症病房相關的「重症多發性神經病變(critical illness polyneuropathy, CIP)」與「重症肌病(critical illness myopathy, CIM)」，是嚴重敗血症、多重器官衰竭、長期機械通氣病人常見的神經肌肉無力原因，臨床上表現為對稱性四肢(遠端為主)無力、肌肉萎縮、呼吸器脫離困難((E)恢復常需3–6個月或更久，正確)。逐項：(A)正確——肌腱反射下降或消失。(C)正確——神經傳導檢查顯示複合肌肉動作電位(CMAP)與感覺神經動作電位(SNAP)的「振幅(amplitude)」明顯下降，這反映「軸突性(axonal)」病變。(B)錯誤(為答案)——CIP是軸突型，「傳導速度(conduction velocity)大致正常或僅輕度下降」，並不會「明顯降低」(明顯傳導速度下降是去髓鞘型如GBS的特徵)，故此敘述不正確。(D)正確——類固醇對CIP/CIM幫助不大(類固醇與神經肌肉阻斷劑反而是CIM的危險因子)；治療以控制敗血症、血糖、早期復健、避免不必要的鎮靜與肌鬆劑為主。出題核心：CIP=軸突型→振幅↓、速度大致正常；勿與去髓鞘型(速度↓)混淆。","options":{"A":"正確。CIP/CIM常見肌腱反射下降。","B":"正確(為答案，敘述不正確)。CIP屬軸突型，傳導速度大致正常，不會明顯降低(速度明顯下降見於去髓鞘病變)。","C":"正確。軸突病變使CMAP/SNAP振幅明顯下降。","D":"正確。類固醇對CIP/CIM幫助不大，且類固醇/肌鬆劑為CIM危險因子。","E":"正確。肌力恢復常需3至6個月以上。"},"sources":["Harrison 21e, Critical Illness Polyneuropathy and Myopathy","Adams & Victor's Neurology, Neuromuscular disorders in critical illness"]}},"111-146":{"quick":"LEMS的電生理特徵是「高頻(20–50 Hz)重複刺激出現振幅『增大(increment/易化)』」，而非「明顯減少」，故「高頻刺激振幅明顯減少」較不常見於LEMS，選D。","detail":{"background":"比較重症肌無力(MG)與藍伯-伊頓肌無力症候群(LEMS)是NMJ疾病的核心考點。LEMS是「突觸前」病變，抗體攻擊突觸前膜的P/Q型電壓門控鈣離子通道(P/Q-type VGCC)，使乙醯膽鹼釋放減少，約半數合併小細胞肺癌(副腫瘤)。其臨床特徵：(A)以「軀幹與近端肌肉無力」為主(尤下肢)，(B)常合併「自律神經失調」(口乾、便秘、排尿困難、性功能障礙)，(C)合併「小細胞肺癌」，(E)血清可測得「P/Q型VGCC抗體」——以上皆是LEMS常見特徵。LEMS的標誌性表現是「短暫用力或高頻重複神經刺激後肌力與動作電位『暫時增強(facilitation/increment)』」，因為連續刺激使突觸前鈣離子累積、ACh釋放增加；因此(D)「高頻刺激(20–50/秒)使運動電位振幅『明顯減少(decrement)』」的敘述與LEMS相反——『遞減(decrement)』是MG在『低頻(2–3 Hz)』重複刺激的特徵，故(D)「較不常發生於LEMS」，為答案。出題核心：LEMS=高頻刺激『遞增』、近端無力＋自律症狀＋SCLC＋P/Q VGCC抗體；MG=低頻刺激『遞減』。","options":{"A":"錯誤(常見於LEMS)。LEMS以軀幹與近端肌肉無力為主。","B":"錯誤(常見於LEMS)。自律神經失調(口乾、便秘、排尿困難、性功能障礙)常見。","C":"錯誤(常見於LEMS)。約半數LEMS合併小細胞肺癌。","D":"正確(為答案，較不常見於LEMS)。LEMS高頻刺激應出現振幅『增大(increment)』；振幅明顯『減少(decrement)』是MG低頻刺激的特徵。","E":"錯誤(常見於LEMS)。P/Q型電壓門控鈣通道抗體為LEMS致病抗體。"},"sources":["Harrison 21e, LEMS vs MG (repetitive nerve stimulation)","Adams & Victor's Neurology, Lambert-Eaton Myasthenic Syndrome"]}},"112-145":{"quick":"腹瀉後漸進性、對稱、上行性四肢無力＋反射消失＋延髓/呼吸受累＝格林-巴利症候群(GBS)：治療為IVIG或血漿置換(含DFPP)＋呼吸道保護；「高劑量靜脈類固醇」無效，故除外選D。","detail":{"background":"格林-巴利症候群(Guillain-Barré syndrome, GBS)是急性免疫媒介的多發性神經根神經病變，常於腹瀉(尤其Campylobacter jejuni)或上呼吸道感染後1–3週發生，臨床為「進行性、相對對稱、上行性」肢體無力合併「肌腱反射消失(areflexia)」，可侵犯顏面與延髓(吞嚥、構音)及呼吸肌(本例皆符合)，自律神經不穩定亦常見。診斷靠典型病程、腦脊髓液「蛋白細胞分離(albuminocytologic dissociation：蛋白↑、白血球不高)」與神經傳導/肌電圖(去髓鞘或軸突型)。治療的核心鐵則：「靜脈免疫球蛋白(IVIG)」或「血漿置換(plasma exchange，含雙重過濾DFPP)」二擇一(療效相當、不併用)，並「密切監測呼吸功能(肺活量、最大吸氣壓)，必要時插管保護氣道」——因此(A)(B)(C)(E)皆為適當處置。關鍵陷阱：「類固醇(包含高劑量靜脈methylprednisolone)對GBS無效，且不建議使用」(與CIDP不同，CIDP對類固醇有效)，故(D)為「除外」的答案。出題核心：GBS用IVIG/PLEX、顧呼吸道，類固醇無效。","options":{"A":"錯誤(屬適當)。IVIG為GBS一線治療。","B":"錯誤(屬適當)。血漿置換為GBS一線治療。","C":"錯誤(屬適當)。雙重過濾血漿置換(DFPP)亦為可行的血漿置換方式。","D":"正確(除外)。高劑量類固醇對GBS無效且不建議，故為答案。","E":"錯誤(屬適當)。延髓與呼吸肌受累者須評估插管保護氣道。"},"sources":["Harrison 21e, Guillain-Barré Syndrome","Adams & Victor's Neurology, GBS","2023 GBS management (IVIG/PLEX; steroids ineffective)"]}},"112-148":{"quick":"使用免疫檢查點抑制劑(atezolizumab)後漸進「眼瞼下垂、複視、延髓與呼吸受累」＝免疫治療相關重症肌無力(ICI-induced MG)，選C。","detail":{"background":"免疫檢查點抑制劑(immune checkpoint inhibitor, ICI，如PD-L1抑制劑atezolizumab、PD-1抑制劑等)透過解除T細胞抑制來抗癌，但會引發各種「免疫相關不良事件(irAE)」，神經肌肉系統的重要irAE包括「重症肌無力(MG)」、肌炎(myositis)與心肌炎，三者可重疊(MG-myositis-myocarditis overlap)且死亡率高。ICI誘發的MG特徵是亞急性出現「眼外肌(眼瞼下垂、複視)＋延髓(構音、吞嚥困難)＋頸與呼吸肌」的疲勞性無力，可快速進展至肌無力危象。本例HCC接受atezolizumab＋bevacizumab後2個月出現眼瞼下垂、複視、構音吞嚥困難、步履不穩與「走路會喘(呼吸肌受累)」，最符合ICI相關MG((C))。鑑別：(A)邊緣葉腦炎以記憶/精神/癲癇為主；(B)腦轉移多為局部神經缺損且影像有病灶；(D)肌炎以近端肢體無力與CK上升為主、較少眼瞼下垂複視；(E)GBS為上行性無力＋反射消失、與感染後相關。處置需停ICI、查AChR抗體與CK/troponin(排除合併心肌炎)，給類固醇＋IVIG/PLEX。出題核心：ICI後眼-延髓-呼吸肌疲勞性無力→想到免疫相關MG。","options":{"A":"錯誤。邊緣葉腦炎以記憶障礙、精神症狀、癲癇為主。","B":"錯誤。腦轉移多造成局部神經缺損，影像可見病灶。","C":"正確。免疫檢查點抑制劑相關重症肌無力，符合眼瞼下垂、複視、延髓與呼吸肌疲勞性無力。","D":"錯誤。肌炎以近端無力與CK上升為主，較少眼瞼下垂/複視(惟可與MG重疊)。","E":"錯誤。GBS為感染後上行性無力合併反射消失，病程型態不同。"},"sources":["Harrison 21e, Immune-related adverse events of checkpoint inhibitors","NCCN/ASCO irAE Guidelines (neuromuscular: MG/myositis/myocarditis)","Adams & Victor's Neurology, MG"]}},"112-149":{"quick":"較易引起「肢體疼痛(小纖維/疼痛性神經病變)」的遺傳性神經病變＝法布瑞氏症(Fabry)＋家族性類澱粉多發性神經病變(FAP)，選C；CMT多為無痛性、AIP以急性運動/自律為主。","detail":{"background":"本題比較幾種遺傳性周邊神經病變的「疼痛」特性。(1)法布瑞氏症(Fabry disease)：X-連鎖α-galactosidase A缺乏，醣鞘脂堆積侵犯小纖維，典型自幼出現「肢端劇痛(acroparesthesias)、手足灼痛」，遇熱/運動誘發，並有血管角質瘤、腎與心受累——屬高度「疼痛性小纖維神經病變」。(4)家族性類澱粉多發性神經病變(familial amyloid polyneuropathy, FAP，多為transthyretin TTR突變)：類澱粉沉積於周邊神經，早期即侵犯「小纖維」造成疼痛、溫痛覺喪失與自律神經障礙，亦屬疼痛性神經病變。相對地：(2)Charcot-Marie-Tooth disease(CMT)是遺傳性運動感覺神經病變，以遠端肌萎縮、垂足、高弓足、感覺減退為主，「多為無痛性」。(3)急性間歇性紫質症(acute intermittent porphyria, AIP)的神經病變以「急性運動為主的軸突神經病變」與自律症狀(腹痛源於內臟自律，非肢體痛)、精神症狀為主，肢體「疼痛性小纖維」表現不如Fabry/FAP典型。故較易引起肢體疼痛者為(1)+(4)=C。出題核心：Fabry與FAP是典型「疼痛性小纖維」遺傳神經病變；CMT無痛、AIP以運動/自律為主。","options":{"A":"錯誤。(3)AIP以急性運動性與自律(腹痛)為主，肢體疼痛性表現不典型。","B":"錯誤。(2)CMT多為無痛性運動感覺神經病變。","C":"正確。(1)Fabry與(4)FAP皆為侵犯小纖維的典型「疼痛性」遺傳神經病變。","D":"錯誤。(2)CMT無痛、(3)AIP非以肢體疼痛為主。","E":"錯誤。CMT與AIP的肢體疼痛性質不如Fabry/FAP，不應全選。"},"sources":["Harrison 21e, Peripheral Neuropathy (Fabry, amyloid, porphyric, CMT)","Adams & Victor's Neurology, Inherited Neuropathies"]}},"113-147":{"quick":"惡性胸腺瘤合併眼瞼下垂、嗆咳(延髓)、近端無力＝胸腺瘤相關重症肌無力(MG)，選D；cisplatin神經病變為遠端感覺型、不致眼瞼下垂與延髓症狀。","detail":{"background":"胸腺(thymus)與重症肌無力(MG)關係密切：約10–15%的MG合併胸腺瘤(thymoma)，而胸腺瘤病人約30–50%會出現MG(副腫瘤性自體免疫，抗AChR抗體常陽性)。本例「惡性胸腺瘤」病人出現「右眼瞼下垂、說話不清易嗆咳(延髓)、爬樓梯無力(近端肢體)」的疲勞性無力組合，最符合胸腺瘤相關MG((D))。鑑別：(C)cisplatin的神經毒性是「遠端、對稱、感覺為主的軸突神經病變(麻木、本體感覺異常、聽力受損)」，不會造成眼瞼下垂與延髓性吞嚥/構音障礙，故非本例;(A)腦轉移多為局部缺損且影像有病灶;(B)邊緣葉腦炎以記憶/精神/癲癇為主;(E)GBS為上行性無力合併反射消失。診斷查抗AChR(±抗MuSK)抗體、重複神經刺激(低頻遞減)、單纖維肌電圖；胸腺瘤者須手術切除並治療MG(AChEI、類固醇/免疫抑制、危象時IVIG/PLEX)。出題核心：胸腺瘤＋眼-延髓-近端疲勞性無力→胸腺瘤相關MG，並與化療藥(cisplatin)遠端感覺神經病變鑑別。","options":{"A":"錯誤。腦轉移多造成局部神經缺損，影像可見病灶。","B":"錯誤。邊緣葉腦炎以記憶障礙、精神症狀、癲癇為主。","C":"錯誤。cisplatin神經病變為遠端感覺型，不致眼瞼下垂與延髓症狀。","D":"正確。胸腺瘤相關重症肌無力，符合眼瞼下垂、嗆咳(延髓)與近端疲勞性無力。","E":"錯誤。GBS為感染後上行性無力合併反射消失，型態不同。"},"sources":["Harrison 21e, Myasthenia Gravis and Thymoma","Adams & Victor's Neurology, MG","Cisplatin sensory neuropathy (chemotherapy-induced peripheral neuropathy)"]}},"114-150":{"quick":"重症肌無力危象即將插管時，「插管前先用高劑量類固醇」並不恰當(類固醇可致一過性惡化)，故為不正確建議，選A；危象首選血漿置換/IVIG，並避免增加mestinon、待穩定再手術、後續需免疫調節維持。","detail":{"background":"重症肌無力危象(myasthenic crisis)是MG惡化致呼吸肌無力、需呼吸支持的急症。處置原則：(C)正確——急性快速改善以「血漿置換(plasmapheresis)或IVIG」為首選(本題情境即用PLEX)，兩者療效相近、起效快。關於類固醇：高劑量類固醇雖是MG的重要免疫治療，但「在危象急性期/即將插管前單獨先給高劑量類固醇」並不恰當，因為類固醇可能造成「一過性惡化(transient worsening/steroid dip)」，通常在已用PLEX/IVIG穩定、且呼吸已有保護(或已插管)後才加上或調整類固醇，故(A)「插管前宜先使用高劑量類固醇」是「不正確」的臨床建議，為答案。(B)正確——插管前/危象時不宜貿然增加pyridostigmine(mestinon)劑量，過量膽鹼酯酶抑制會增加呼吸道分泌物、甚至膽鹼性危象，混淆病情；插管後常暫停AChEI。(D)正確——若有胸腺瘤需手術，應「待病情穩定後」再行胸腺切除(thymectomy)，而非危象急性期。(E)正確——PLEX/IVIG效果為暫時性，仍需配合類固醇/免疫抑制等免疫調節維持療效。出題核心：危象用PLEX/IVIG、勿在插管前先衝高類固醇、勿貿增AChEI、穩定後再手術。","options":{"A":"正確(為答案，不正確建議)。危象/插管前先用高劑量類固醇可致一過性惡化，並不恰當；應先以PLEX/IVIG穩定。","B":"錯誤(此建議正確)。插管前應避免增加mestinon，以免增加分泌物或膽鹼性危象。","C":"錯誤(此建議正確)。血漿置換是肌無力危象首選治療之一。","D":"錯誤(此建議正確)。胸腺瘤手術應待病情穩定後再行。","E":"錯誤(此建議正確)。PLEX效果暫時，仍需免疫調節維持。"},"sources":["Harrison 21e, Myasthenic Crisis management","Adams & Victor's Neurology, MG","MGFA / 2020 International Consensus Guidance for MG"]}},"109-100":{"quick":"工廠工人群聚出現漸進性帕金森症→「錳(manganese)中毒(manganism)」，選B；錳沉積於基底核(蒼白球)造成類帕金森表現。","detail":{"background":"職業性/環境性帕金森症是高分鑑別考點。本例「長期於工廠工作、多名同事同時出現類似但較輕的帕金森症」強烈指向「群聚性的職業毒物暴露」，最典型為「錳(manganese)中毒(manganism)」。錳廣泛用於鋼鐵冶煉、電焊(welding fume)、電池、農藥(maneb)，慢性吸入後錳優先沉積於基底核的「蒼白球(globus pallidus)」與紋狀體，造成動作遲緩、僵硬、步態與平衡障礙、面具臉，常合併「公雞步態(cock walk)」、肌張力不全與精神行為改變。其與原發性巴金森氏症的差別：manganism病變在突觸後(蒼白球)，多巴胺神經元相對保留，故「對levodopa反應差」，且MRI在T1可見蒼白球對稱性高訊號(錳沉積)。其他金屬：(A)鉛中毒以腹絞痛、貧血(嗜鹼性點彩紅血球)、周邊運動神經病變(腕垂)、兒童腦病變為主；(C)汞中毒以小腦性顫抖、神經精神(易怒)、口炎、周邊感覺神經病變為主；(D)砷中毒以腸胃道症狀、米湯樣腹瀉、感覺運動性多發神經病變、Mees紋為主；(E)銅(Wilson病為遺傳性銅堆積)以肝病＋神經精神＋Kayser-Fleischer環為主，非職業群聚。故答案為錳(B)。出題核心：電焊/工廠群聚帕金森症＝錳中毒(蒼白球、對levodopa反應差)。","options":{"A":"錯誤。鉛中毒以腹絞痛、貧血、周邊運動神經病變(腕垂)為主。","B":"正確。錳中毒(manganism)沉積於蒼白球造成帕金森症，符合工廠群聚暴露。","C":"錯誤。汞中毒以小腦性顫抖、神經精神症狀、口炎為主。","D":"錯誤。砷中毒以腸胃症狀與感覺運動神經病變、Mees紋為主。","E":"錯誤。銅堆積(Wilson病)為遺傳性，以肝-神經-KF環為主，非職業群聚。"},"sources":["Harrison 21e, Parkinsonism; Heavy Metal Toxicity","Adams & Victor's Neurology, Toxic and Metabolic Movement Disorders","Manganism (basal ganglia, levodopa-poor response)"]}},"112-147":{"quick":"漸進帕金森症但「對levodopa反應差、無顫抖、早期跌倒、構音不清」＝多系統萎縮帕金森型(MSA-P)，選B；原發性PD對levodopa反應佳且有顫抖。","detail":{"background":"本題鑑別帕金森症候群(parkinsonism)中的「非典型帕金森(atypical/Parkinson-plus)」。原發性巴金森氏症(idiopathic Parkinson's disease, PD)的特徵是「不對稱性靜止性顫抖、動作遲緩、僵硬，且對levodopa反應良好且持久」。本例「動作慢、僵硬、無肢體顫抖、步伐小易跌倒、構音不清、對levodopa效果有限」，符合「多系統萎縮-帕金森型(multiple system atrophy with predominant parkinsonism, MSA-P)」。MSA是α-synuclein寡突膠細胞包涵體病，臨床三大成分為自律神經衰竭(姿勢性低血壓、泌尿障礙、勃起障礙)、小腦徵象(MSA-C)與帕金森症(MSA-P)，特點為「對levodopa反應差、無典型靜止性顫抖、進展快、早期姿勢不穩與跌倒、構音吞嚥障礙」。鑑別其他Parkinson-plus：(C)進行性上核麻痺(PSP)以「垂直性(向下)凝視麻痺、早期反覆向後跌倒、軸性僵硬」為主；(D)路易氏體失智(DLB)以早期視幻覺、認知波動為主；(E)脊髓小腦萎縮症(SCA)以遺傳性小腦失調為主。本例最符合MSA-P((B))。出題核心：levodopa反應差＋無顫抖＋早期跌倒＋自律/構音→想MSA等Parkinson-plus，而非原發PD。","options":{"A":"錯誤。原發性PD對levodopa反應佳且常有不對稱靜止性顫抖，與本例不符。","B":"正確。對levodopa反應差、無顫抖、早期跌倒與構音障礙，符合MSA-P。","C":"錯誤。PSP以垂直凝視麻痺與早期向後跌倒為主。","D":"錯誤。DLB以早期視幻覺與認知波動為主。","E":"錯誤。SCA以遺傳性小腦失調為主，非以僵硬型帕金森表現。"},"sources":["Harrison 21e, Parkinson's Disease and Atypical Parkinsonism","Adams & Victor's Neurology, Multiple System Atrophy","2022 MDS Criteria for MSA"]}},"113-148":{"quick":"抗精神藥物惡性症候群(NMS)的「自主神經功能障礙與震顫」其實『常見且顯著』，並非少見，故該敘述錯誤，選B。","detail":{"background":"抗精神病藥物惡性症候群(neuroleptic malignant syndrome, NMS)是多巴胺受體被強力阻斷(典型抗精神病藥，或停用多巴胺藥)引發的致命急症，四大核心為「高燒(hyperthermia)、鉛管樣(lead-pipe)全身肌僵直、意識/精神狀態改變、與自律神經不穩定」，並常伴肌酸激酶(CK)顯著升高、白血球增多、橫紋肌溶解與急性腎損傷。逐項：(A)正確——意識障礙、肌僵直、發燒是NMS常見核心。(B)錯誤(為答案)——「自主神經功能障礙(血壓心跳起伏、大汗、心搏過速)與震顫」在NMS其實「相當常見且顯著」，說它『很少見』與事實相反。(C)正確——NMS在臨床上與「惡性僵直症(malignant catatonia)」極難區分(兩者可能是同一連續譜)。(D)正確——NMS與「血清素症候群(serotonin syndrome)」表現重疊難分，但血清素症候群更偏「反射亢進、陣攣(clonus)、肌陣攣、瞳孔放大、起病快(數小時)、與血清素類藥物相關」，而NMS偏「鉛管樣僵直、反射正常/降低、起病較慢(數日)」。(E)正確——惡性高熱(malignant hyperthermia)及重症NMS可考慮dantrolene(直接抑制肌漿網鈣釋放)，劑量約1–2.5 mg/kg、每日上限約10 mg/kg/d，並可合併bromocriptine/amantadine補充多巴胺。出題核心：NMS=高燒＋鉛管僵直＋意識改變＋『顯著』自律不穩＋CK↑，與血清素症候群(反射亢進/陣攣)鑑別。","options":{"A":"錯誤(敘述正確)。意識障礙、僵硬與發燒確為NMS常見表現。","B":"正確(為答案，敘述錯誤)。NMS的自主神經功能障礙與震顫其實常見且明顯，並非少見。","C":"錯誤(敘述正確)。NMS與惡性僵直症難以區分。","D":"錯誤(敘述正確)。NMS與血清素症候群表現重疊、需仔細鑑別。","E":"錯誤(敘述正確)。重症NMS/惡性高熱可用dantrolene(約1–2.5 mg/kg，上限約10 mg/kg/d)。"},"sources":["Harrison 21e, Neuroleptic Malignant Syndrome","Adams & Victor's Neurology, Drug-induced movement disorders","NMS vs Serotonin Syndrome differentiation"]}},"114-148":{"quick":"Metoclopramide(Primperan)阻斷多巴胺受體→「錐體外症狀(extrapyramidal/急性肌張力不全)」，屬藥物副作用而非過敏，應停藥、必要時給抗膽鹼藥(如benztropine)，選B。","detail":{"background":"Metoclopramide(Primperan)是促腸蠕動/止吐藥，機轉為阻斷中樞與周邊的「多巴胺D2受體」。中樞D2阻斷(尤其黑質紋狀體路徑)會造成「藥物引起的錐體外症狀(extrapyramidal symptoms, EPS)」，常見類型包括：急性肌張力不全(acute dystonia，如眼動危象、頸部/臉部肌肉抽動、角弓反張，年輕人與用藥早期好發)、靜坐不能(akathisia)、類帕金森症、與長期使用的遲發性運動異常(tardive dyskinesia)。本例「服用metoclopramide數天後出現臉部不自主抽動與四肢不自主擺動」正是D2阻斷造成的EPS/急性肌張力不全((B)正確)。處置：立即停藥，急性肌張力不全可給抗膽鹼藥(diphenhydramine或benztropine)或benzodiazepine快速緩解。逐項排除：(A)錯，這不是過敏反應、抗組織胺雖可用於急性肌張力不全(因其抗膽鹼性)但機轉並非過敏。(C)錯，不可不處理，遲發者可能不可逆。(D)錯，不應繼續用藥；肌肉鬆弛劑非對策。(E)錯，metoclopramide正是常見引起EPS的藥物。其他易致EPS的止吐/腸胃藥還有prochlorperazine、抗精神病藥等。出題核心：metoclopramide→D2阻斷→錐體外症狀，停藥＋抗膽鹼藥處理。","options":{"A":"錯誤。此非過敏反應，而是多巴胺受體阻斷的藥理性錐體外副作用。","B":"正確。不自主運動屬錐體外症狀(急性肌張力不全)，與metoclopramide阻斷多巴胺D2受體有關。","C":"錯誤。不可置之不理，急性肌張力不全需停藥並處理，長期用藥可致遲發性運動異常。","D":"錯誤。應停藥而非繼續，肌肉鬆弛劑非對策。","E":"錯誤。metoclopramide正是常見引起錐體外副作用的藥物。"},"sources":["Harrison 21e, Drug-induced Movement Disorders","Adams & Victor's Neurology, Acute Dystonic Reactions","Metoclopramide EPS (D2 antagonism)"]}},"114-155":{"quick":"NMS典型表現＝「鉛管樣(lead-pipe)肌僵直＋高燒＋自律神經功能失調」，選B；其餘選項的縮瞳/失語/體溫正常等皆非NMS典型。","detail":{"background":"抗精神病藥物惡性症候群(NMS)的典型臨床「四聯」為：高燒(hyperthermia，常>38–40°C)、「鉛管樣(lead-pipe)全身肌僵直」(全程阻力均勻增加，可合併震顫呈齒輪狀)、意識/精神狀態改變、與「自律神經功能失調(hemodynamic instability：血壓心跳起伏、大汗、心搏過速)」，實驗室常見CK顯著升高、白血球增多、代謝性酸中毒、橫紋肌溶解與急性腎損傷。本題(B)「鉛管樣肌僵直、高燒、自律神經功能失調」正是NMS核心三要素，為答案。逐項排除：(A)「失語」與「低血壓」並非NMS主軸(自律不穩可高可低，但以失語描述不典型)；(C)「縮瞳、心跳過緩」較像鴉片或膽鹼性中毒，非NMS；(D)「視幻覺」非NMS主徵；(E)「血壓穩定、體溫正常」與NMS的高燒、自律不穩相反。處置：立即停用致病藥(多巴胺阻斷劑)、積極降溫與支持、補液保腎(防橫紋肌溶解)，重症給dantrolene、bromocriptine/amantadine。需與血清素症候群(反射亢進、陣攣、起病快)鑑別。出題核心：NMS=高燒＋鉛管樣僵直＋自律不穩＋意識改變。","options":{"A":"錯誤。失語非NMS主徵，自律不穩不限於低血壓。","B":"正確。鉛管樣肌僵直＋高燒＋自律神經功能失調是NMS典型表現。","C":"錯誤。縮瞳、心搏過緩偏向鴉片/膽鹼性中毒。","D":"錯誤。視幻覺、四肢無力非NMS核心表現。","E":"錯誤。NMS應有高燒與自律不穩，非體溫正常、血壓穩定。"},"sources":["Harrison 21e, Neuroleptic Malignant Syndrome","Adams & Victor's Neurology, NMS"]}},"114-21":{"quick":"NMS常見表現＝高燒(1)＋僵直(2)＋血流動力學不穩(4)＋CK升高(5)，選C；「反射亢進(hyperreflexia)(3)」是『血清素症候群』的特徵，NMS反射正常或下降，故排除(3)。","detail":{"background":"本題以「選出所有正確」測試NMS的核心臨床/實驗室表現，並暗藏與「血清素症候群(serotonin syndrome)」的關鍵鑑別。NMS由多巴胺D2受體強力阻斷引起，常見：(1)高燒(hyperthermia)、(2)全身「鉛管樣」僵直(rigidity)、(4)自律神經不穩定造成「血流動力學不穩(血壓心跳起伏、大汗)」、(5)肌酸激酶(CK)因肌僵直/橫紋肌溶解而顯著升高——以上(1)(2)(4)(5)皆為NMS常見表現。關鍵陷阱在(3)「反射亢進(hyperreflexia)」：NMS因鉛管樣僵直、神經肌肉以「強直」為主，反射多為「正常或下降」，並無反射亢進；相對地，「反射亢進、陣攣(clonus，尤下肢)、肌陣攣、震顫、瞳孔放大、起病快(數小時內、與血清素類藥物如SSRI/SNRI/MAOI/triptan/linezolid相關)」才是『血清素症候群』的標誌。兩者皆有高燒與自律不穩，但靠「反射/陣攣(血清素症候群亢進；NMS僵直為主)」與「起病速度(血清素數小時、NMS數日)」、「用藥史(血清素類 vs 多巴胺阻斷劑)」鑑別。故NMS正確表現為(1)+(2)+(4)+(5)=C，排除(3)。出題核心：以「反射亢進/陣攣」區分血清素症候群與NMS。","options":{"A":"錯誤。僅(1)(2)不完整，未含血流動力學不穩與CK升高。","B":"錯誤。少了(5)CK升高。","C":"正確。NMS常見高燒(1)、僵直(2)、血流動力學不穩(4)、CK升高(5)，排除屬血清素症候群的反射亢進(3)。","D":"錯誤。含(3)反射亢進，那是血清素症候群特徵，非NMS。","E":"錯誤。含(3)反射亢進之誤，且缺(4)。"},"sources":["Harrison 21e, NMS and Serotonin Syndrome","Boyer EW, Shannon M. The Serotonin Syndrome, NEJM 2005","Adams & Victor's Neurology, Drug-induced hyperthermic syndromes"]}},"108-綜-12":{"quick":"海綿竇/眼窩頂症候群侵犯通過該處的CN II、III、IV、VI與V1(V2)；「第七顱神經(顏面神經)」不經海綿竇/眼窩頂，故不受影響，選E。","detail":{"background":"海綿竇(cavernous sinus)與眼窩頂(orbital apex)是多條顱神經密集通過的解剖樞紐，病變(腫瘤、血栓、感染如海綿竇血栓性靜脈炎、頸動脈-海綿竇瘻管、腫瘤侵犯)會造成多發性顱神經病變、眼球突出與眼動麻痺。通過海綿竇的結構包括：動眼神經(CN III)、滑車神經(CN IV)、外旋神經(CN VI，位於竇內最內側、最易受壓)、三叉神經第一支(眼支V1)與第二支(上顎支V2)，以及被交感神經叢包繞的「內頸動脈海綿竇段」。視神經(CN II)行經「視神經孔」進入眼窩頂，故「眼窩頂症候群(orbital apex syndrome)」會同時侵犯CN II(視力下降)與CN III、IV、VI、V1，這是眼窩頂症候群與單純海綿竇症候群(通常不含視神經)的差別。本題的關鍵是「第七顱神經(顏面神經, CN VII)」並不通過海綿竇或眼窩頂(CN VII走內聽道→顏面神經管→莖乳孔)，因此「不會受影響」，為答案(E)。出題核心：熟記海綿竇/眼窩頂通過的顱神經(III、IV、V1、V2、VI＋眼窩頂加II)，CN VII不在其中。","options":{"A":"錯誤(會受影響)。眼窩頂症候群侵犯經視神經孔的視神經(CN II)。","B":"錯誤(會受影響)。動眼神經(CN III)通過海綿竇/眼窩頂。","C":"錯誤(會受影響)。滑車神經(CN IV)通過海綿竇/眼窩頂。","D":"錯誤(會受影響)。外旋神經(CN VI)走行於海綿竇內，常最早受累。","E":"正確(不受影響)。顏面神經(CN VII)不經海綿竇/眼窩頂，故不受影響。"},"sources":["Harrison 21e, Disorders of the Cranial Nerves","Adams & Victor's Neurology, Cavernous Sinus / Orbital Apex Syndromes"]}},"109-182":{"quick":"控制不良高血壓＋激動後劇烈頭痛、意識混沌、兩側「枕葉」水腫但無梗塞出血→後可逆性腦病變症候群(PRES)，治療以靜脈鈣離子阻斷劑(如nicardipine)控壓，選D。","detail":{"background":"後可逆性腦病變症候群(posterior reversible encephalopathy syndrome, PRES)是急性血壓劇升或內皮損傷(子癲前症/子癲、免疫抑制劑如calcineurin inhibitor/tacrolimus、化療、自體免疫、腎衰竭)導致腦血流自我調節失靈、血腦障壁破壞而產生「血管源性腦水腫(vasogenic edema)」，好發於後循環供應的「頂枕葉(parieto-occipital)」(因後循環交感神經支配較少、自我調節較弱)。臨床以頭痛、意識改變、視覺障礙(皮質盲、視野缺損)、與癲癇發作表現；MRI的FLAIR/T2在雙側頂枕葉對稱性高訊號(血管源性水腫，DWI多不受限以與梗塞區分)。本例「控制不良高血壓＋激動後劇烈頭痛、意識混沌、兩側枕葉腫脹但無梗塞或出血」典型符合PRES。治療核心是「平穩降血壓」——以可滴定的靜脈短效抗高血壓藥(如nicardipine鈣離子阻斷劑、labetalol)在第一小時內降約10–25%(避免過快過低致灌流不足)，並移除誘因、控制癲癇與子癲(硫酸鎂)。故(D)「給予靜脈鈣離子阻斷劑」最正確。逐項排除：(A)雖需鑑別血管炎但非優先；(B)導管血管攝影非首要；(C)類固醇非PRES治療(反為部分PRES誘因)；(E)抗癲癇藥僅在有癲癇發作時使用，非本題主要處置。出題核心：高血壓急症＋頂枕葉血管源性水腫＝PRES，治療＝控壓(可逆)。","options":{"A":"錯誤。雖需與血管炎鑑別，但非優先處置，影像與病史更支持PRES。","B":"錯誤。導管血管攝影非PRES首要檢查。","C":"錯誤。類固醇非PRES治療(免疫抑制反可能為PRES誘因)。","D":"正確。PRES治療核心為平穩降血壓，靜脈鈣離子阻斷劑(如nicardipine)為首選之一。","E":"錯誤。抗癲癇藥僅在合併癲癇時使用，非本題主要處置。"},"sources":["Harrison 21e, Hypertensive Encephalopathy / PRES","Adams & Victor's Neurology, PRES","Fugate JE, Rabinstein AA. PRES, Lancet Neurol 2015"]}},"110-147":{"quick":"SAH夾閉術後第3日低血鈉、神經穩定→腦性鹽耗損(CSW)：高尿鈉、高尿滲透壓、「低血容」，治療給等張食鹽水補充；給mannitol會加重脫水與低血鈉，故較不正確選E。","detail":{"background":"蜘蛛膜下腔出血(subarachnoid hemorrhage, SAH)後低血鈉常見且重要(影響血管痙攣風險與預後)，主因有二：腦性鹽耗損(cerebral salt wasting, CSW)與抗利尿激素不當分泌症候群(SIADH)。兩者血鈉皆低、尿鈉皆高，鑑別關鍵在「血容量(volume status)」：CSW因腦損傷釋放利鈉胜肽(BNP/ANP)導致腎臟過度排鈉與排水，病人呈「低血容(hypovolemic)」、體重下降、可有低血壓與口渴；SIADH則為「等容/高容」。本例SAH術後出現低血鈉、神經穩定，且選項描述「24小時尿鈉增加(A)、尿滲透壓增加(B)、低血容(C)」皆符合CSW。治療差異是考點精髓：CSW(低血容)應「補充容積與鈉——等張(0.9%)甚至高張食鹽水＋補鹽(可加fludrocortisone)」((D)正確)；而「限水(fluid restriction)」是SIADH的治療，用在低血容的CSW會惡化脫水與腦灌流，且SAH病人本就要避免低血容(會增加血管痙攣與遲發性腦缺血)。本題(E)「給予mannitol滴注」更是錯誤——mannitol是滲透性利尿劑，會進一步脫水、加重低血容與電解質紊亂，故為「較不正確」的答案。出題核心：SAH後CSW=低血容，治療補鈉補水(忌限水、忌mannitol)。","options":{"A":"錯誤(敘述正確)。CSW腎臟過度排鈉，24小時尿鈉增加。","B":"錯誤(敘述正確)。尿液滲透壓增加(尿液濃縮排鈉)。","C":"錯誤(敘述正確)。CSW呈低血容狀態。","D":"錯誤(敘述正確)。應給等張(必要時高張)氯化鈉補充容積與鈉。","E":"正確(為答案，較不正確)。mannitol為滲透性利尿劑，會加重脫水與低血鈉，不應使用。"},"sources":["Harrison 21e, Hyponatremia; SAH complications","Adams & Victor's Neurology, Cerebral Salt Wasting vs SIADH","Neurocritical care of aneurysmal SAH"]}},"110-150":{"quick":"PRES正確敘述＝FLAIR高訊號代表血管源性水腫(1)＋子癲時優先靜脈硫酸鎂(4)，選C；血壓不可在1小時內驟降至140(過快過低，3錯)。","detail":{"background":"後可逆性腦病變症候群(PRES)的影像與處置原則。逐項：(1)正確——MRI的FLAIR/T2在頂枕葉對稱性高訊號代表「血管源性腦水腫(vasogenic edema)」(細胞外水腫)，與細胞毒性水腫(梗塞，DWI受限)不同，這是PRES可逆的病理基礎。(4)正確——若PRES病因為「子癲(eclampsia)」，第一線是「靜脈輸注硫酸鎂(magnesium sulfate)」以預防/控制抽搐並穩定，並適時終止妊娠。(3)錯誤——血壓控制應「平穩、漸進」，一般建議第一小時降約10–25%(或MAP降不超過約25%)，「於1小時內把收縮壓由200驟降到140以下」太快太低，會造成腦灌流不足與分水嶺梗塞，故(3)不正確。(2)的方向(以可滴定靜脈抗高血壓藥控壓)概念上合理，常用nicardipine、labetalol；惟hydralazine較不易精準滴定、可致反射性心搏過速，並非首選，且本題標準答案以(1)+(4)為「最正確」組合，故(2)未被選入。臨床上PRES多在數日至數週內影像與症狀可逆，但延誤控壓可進展為出血或梗塞。出題核心：PRES=血管源性水腫可逆、控壓要平穩(勿1小時驟降到140)、子癲用硫酸鎂。","options":{"A":"錯誤。(1)正確但(3)「1小時內驟降至140」過快過低，組合不成立。","B":"錯誤。(4)正確但(2)非標準最佳組合(hydralazine非首選、敘述較粗略)。","C":"正確。(1)FLAIR高訊號=血管源性水腫、(4)子癲優先靜脈硫酸鎂，皆正確。","D":"錯誤。含(3)過快降壓之誤。","E":"錯誤。(3)過快降壓不正確，不應全選。"},"sources":["Harrison 21e, PRES / Hypertensive emergency","Fugate JE, Rabinstein AA. PRES, Lancet Neurol 2015","子癲: IV magnesium sulfate (ACOG)"]}},"111-147":{"quick":"青少年肌陣攣性癲癇(JME)的肌陣攣發作「意識保留(不喪失)」，故「多會有短暫意識喪失」的敘述不正確，選C；其晨起好發、雙側同步無節律肌抽躍、有家族史、神經發育正常。","detail":{"background":"青少年肌陣攣性癲癇(juvenile myoclonic epilepsy, JME)是最常見的「全身性遺傳性(idiopathic generalized)癲癇」之一，青春期發病，預後對藥物反應佳但常需長期治療。其臨床特徵：(A)正確——以「短暫、雙側對稱、同步、無節律的肌肉抽躍(myoclonic jerks)」為核心，常見肩臂上肢突發抽動、手中物品掉落。(B)正確——發作「好發於清晨剛起床後」(睡眠剝奪、飲酒、閃光刺激為誘發因子)。(D)正確——常有「癲癇家族史」(具遺傳傾向)。(E)正確——病人「神經系統發育與智能大多正常」。(C)錯誤(為答案)——JME的「肌陣攣發作時『意識是保留的(不喪失)』」，病人對抽躍當下有知覺；不過JME病人也可合併「全身強直陣攣發作(GTCS，常於肌陣攣後)」與「失神發作」，那些才可能伴意識改變，但『肌陣攣本身』不致意識喪失，故「多會有短暫意識喪失」的敘述不正確。治療首選valproate(育齡女性避免，致畸)、levetiracetam、lamotrigine(可能加重肌陣攣需小心)；carbamazepine/phenytoin可能惡化肌陣攣應避免。出題核心：JME肌陣攣「意識保留」、晨起好發、遺傳傾向、發育正常。","options":{"A":"錯誤(敘述正確)。JME以短暫、雙側對稱、同步、無節律肌抽躍表現。","B":"錯誤(敘述正確)。發作好發於清晨剛起床時。","C":"正確(為答案，敘述不正確)。JME的肌陣攣發作意識保留，不致短暫意識喪失。","D":"錯誤(敘述正確)。常有癲癇家族史(遺傳傾向)。","E":"錯誤(敘述正確)。神經系統發育大多正常。"},"sources":["Harrison 21e, Seizures and Epilepsy (idiopathic generalized epilepsy)","Adams & Victor's Neurology, Juvenile Myoclonic Epilepsy","ILAE classification of JME"]}},"111-150":{"quick":"心臟「副交感(迷走)」功能測試＝深呼吸時的心律變異(1)＋伐氏操作Valsalva ratio(3)，選A；流汗測試QSART(2)測交感泌汗、傾斜床(4)測交感腎上腺素/壓力反射，屬交感。","detail":{"background":"自主神經功能測試(autonomic function test)用於評估昏厥(syncope)、姿勢性低血壓、自律神經病變(如糖尿病、帕金森症候群、純自律神經衰竭)的病人，臨床上把測試區分為「心臟迷走(副交感)」、「腎上腺素性(交感)」與「泌汗性(交感膽鹼)」三類。屬於「副交感(迷走)」的測試：(1)「深呼吸時的心律變異(heart rate variation with deep breathing，每分鐘6次)」——吸氣心跳加快、吐氣減慢的呼吸性竇性心律不整，由迷走神經介導，是最敏感的心臟副交感指標；(3)「伐氏操作(Valsalva maneuver)的Valsalva ratio(最快心跳/最慢心跳)」——其中用力後反彈期的心搏減慢由迷走介導，反映心臟副交感功能(整個Valsalva也含交感成分，但ratio主要評估迷走)。屬於「交感」的測試：(2)「定量泌汗軸突反射測試(QSART)」評估「交感節後膽鹼性泌汗纖維」；(4)「傾斜床測試(head-up tilt table test)」評估直立時的血壓/心率與壓力反射(交感腎上腺素性)反應，用於診斷姿勢性低血壓與血管迷走性昏厥。故副交感測試為(1)+(3)=A。出題核心：深呼吸心律變異與Valsalva ratio測迷走(副交感)；QSART與tilt table測交感。","options":{"A":"正確。深呼吸心律變異(1)與Valsalva ratio(3)主要評估心臟副交感(迷走)功能。","B":"錯誤。QSART(2)為交感泌汗、傾斜床(4)為交感/壓力反射測試。","C":"錯誤。(4)傾斜床屬交感測試。","D":"錯誤。(2)QSART屬交感泌汗測試。","E":"錯誤。並非全部皆為副交感測試。"},"sources":["Harrison 21e, Disorders of the Autonomic Nervous System","Adams & Victor's Neurology, Autonomic Function Testing","Valsalva ratio / HRV deep breathing (parasympathetic)"]}},"112-146":{"quick":"SAH後第5日低血鈉(120)多為腦性鹽耗損(CSW，低血容)：腎功能正常、口渴低血壓、尿鈉>100，校正速度每小時<1、每日<8 mEq/L；「應限制輸液」是SIADH的處置，用在CSW錯誤，故為非選C。","detail":{"background":"本題與110-147同屬「SAH後低血鈉」的核心考點，再次強調腦性鹽耗損(cerebral salt wasting, CSW)的特徵與「不可限水」的鐵則。SAH後第5日(正是血管痙攣與遲發性腦缺血的高峰期)出現嚴重低血鈉(120 mEq/L)，多為CSW：利鈉胜肽過度分泌→腎臟過度排鈉排水→「低血容」。逐項：(A)正確——CSW腎功能多為正常(問題在內分泌性排鈉而非腎本身)。(B)正確——低血容使病人「口渴、傾向低血壓」。(E)正確——尿鈉顯著升高(常>100 mEq/L)反映腎臟排鈉。(D)正確——校正低血鈉務必「緩慢」，每小時上升<0.5–1 mEq/L、每日<8–10 mEq/L，以避免「滲透性脫髓鞘(osmotic demyelination syndrome, 橋腦中央髓鞘溶解)」。(C)錯誤(為答案)——「限制輸液(fluid restriction)」是SIADH(等容/高容)的處置；CSW是「低血容」，限水會惡化脫水、降低腦灌流、增加血管痙攣與梗塞風險，SAH病人尤須維持正常血容，故「應限制輸液」是錯誤敘述。CSW治療為補充等張/高張食鹽水與鈉(必要時fludrocortisone)。出題核心：SAH低血鈉多為CSW(低血容)、忌限水、補鈉補水、矯正要慢防脫髓鞘。","options":{"A":"錯誤(敘述正確)。CSW腎功能多正常。","B":"錯誤(敘述正確)。低血容使病人口渴、傾向低血壓。","C":"正確(為答案，敘述錯誤)。CSW為低血容，不應限制輸液(限水是SIADH處置)，應補充鈉與容積。","D":"錯誤(敘述正確)。低血鈉矯正須緩慢(每小時<1、每日<8 mEq/L)以防滲透性脫髓鞘。","E":"錯誤(敘述正確)。CSW尿鈉常>100 mEq/L。"},"sources":["Harrison 21e, Hyponatremia; CSW vs SIADH","Adams & Victor's Neurology, SAH and salt wasting","Osmotic demyelination syndrome correction limits"]}},"112-55":{"quick":"臥→站收縮壓降25(>20)、舒張壓降10、心跳幾乎不變(68→70無代償)→已達姿勢性低血壓且為「神經源性(neurogenic)」，選B；非脫水(會代償心跳加快)，pyridostigmine/droxidopa反而是治療藥。","detail":{"background":"姿勢性(直立性)低血壓(orthostatic hypotension, OH)的診斷標準是「由臥位站立3分鐘內，收縮壓下降≥20 mmHg 或 舒張壓下降≥10 mmHg」。本例臥位115/80、站立90/70，收縮壓降25(≥20)、舒張壓降10(≥10)，已「符合OH診斷」，故(A)「尚不符合」錯誤。關鍵鑑別在「代償性心跳反應」：正常或容積不足(脫水、出血)時，壓力反射(baroreflex)會使站立後「心跳代償性加快(通常每降10 mmHg收縮壓，心跳上升約10–15次)」；但本例心跳幾乎不變(68→70)，代表「壓力反射的交感代償缺失」，這是「神經源性(neurogenic)姿勢性低血壓」的特徵(見於自律神經衰竭、帕金森症候群、MSA、糖尿病自律神經病變等)，故(B)正確。逐項排除：(C)糖尿病＋脫水雖可致OH，但仍多有心跳代償加快，與本例「心跳不變」不符；(D)α1拮抗劑(治攝護腺肥大)可致OH，但無法解釋「心跳不代償」這一神經源性特徵，且題目未明示用藥；(E)pyridostigmine(增強自律神經節傳遞)、droxidopa(去甲腎上腺素前驅)、atomoxetine等其實是「神經源性OH的『治療』藥物」，會「改善」而非「加重」OH，故敘述錯誤。出題核心：OH診斷數字(收縮↓20/舒張↓10)＋「站立心跳不代償加快→神經源性OH」，並認得droxidopa/pyridostigmine是治療藥。","options":{"A":"錯誤。收縮壓降25、舒張壓降10已達OH診斷標準。","B":"正確。站立後心跳幾乎不增(無代償)，符合神經源性(neurogenic)姿勢性低血壓。","C":"錯誤。糖尿病＋脫水通常仍有心跳代償加快，與本例心跳不變不符。","D":"錯誤。α1拮抗劑可致OH，但無法解釋心跳不代償的神經源性特徵。","E":"錯誤。pyridostigmine、droxidopa、atomoxetine是神經源性OH的治療藥，會改善而非加重。"},"sources":["Harrison 21e, Syncope; Autonomic Failure / Orthostatic Hypotension","Adams & Victor's Neurology, Orthostatic Hypotension","Consensus definition of OH (≥20/≥10 mmHg)"]}},"113-146":{"quick":"年輕女性精神症狀前驅→癲癇/口面不自主運動(orofacial dyskinesia)、意識障礙、MRI正常、CSF輕度淋巴球→抗NMDA受體腦炎，選C(常合併卵巢畸胎瘤)。","detail":{"background":"抗N-甲基-D-天門冬胺酸受體腦炎(anti-NMDA receptor encephalitis)是最常見的自體免疫腦炎，好發於「年輕女性」，常合併「卵巢畸胎瘤(ovarian teratoma)」(腫瘤表現NMDA受體抗原誘發自體免疫)，亦可由單純皰疹病毒腦炎後誘發。其典型病程是「多階段」：前驅期類流感→「精神期」(焦慮、易怒、妄想、人格改變，常先被當精神科疾病)→繼而出現「癲癇發作、意識下降、語言障礙」→「運動障礙期」出現特徵性的「口面-肢體不自主運動(orofacial-limb dyskinesia，如嘴巴像咀嚼口香糖、舞蹈手足徐動)」、自律神經不穩定與中樞性低通氣，常需入加護病房與插管。檢查：腦部MRI「常正常或僅輕微異常」；腦脊髓液呈「輕度淋巴球性細胞增多、蛋白略升」，確診靠「CSF抗NMDA受體(anti-NMDAR/anti-GluN1)抗體」(CSF比血清更敏感特異)；EEG可見extreme delta brush。本例23歲女性精神前驅→嗜睡、口舌不自主動作、意識不清、MRI正常、CSF淋巴球輕度增多、蛋白60，完全符合((C))。鑑別：(A)細菌性腦膜腦炎CSF以嗜中性球為主、糖低；(B)日本腦炎MRI常見視丘/基底核病變且有流行病學；(D)anti-GAD相關以僵硬人症候群/頑固癲癇/小腦失調為主；(E)anti-Jo1是「皮肌炎/多發性肌炎(抗合成酶症候群)」抗體，與腦炎無關(混淆選項)。治療：切除畸胎瘤＋一線免疫治療(類固醇、IVIG、血漿置換)，無效用rituximab/cyclophosphamide。出題核心：年輕女性精神→癲癇/口面異動/意識障礙＋MRI正常＋CSF淋巴球→抗NMDA受體腦炎(找卵巢畸胎瘤)。","options":{"A":"錯誤。細菌性腦膜腦炎CSF以嗜中性球增多、糖降低為主，與本例不符。","B":"錯誤。日本腦炎多有流行病學與視丘/基底核MRI病變。","C":"正確。年輕女性精神前驅＋口面不自主運動＋意識障礙＋MRI正常＋CSF輕度淋巴球，符合抗NMDA受體腦炎(查卵巢畸胎瘤)。","D":"錯誤。anti-GAD相關以僵硬人症候群、頑固癲癇、小腦失調為主。","E":"錯誤。anti-Jo1是皮肌炎/多發性肌炎抗體，與腦炎無關(干擾選項)。"},"sources":["Harrison 21e, Autoimmune (Anti-NMDA receptor) Encephalitis","Dalmau J et al. Anti-NMDAR encephalitis, Lancet Neurol 2008/2019","Adams & Victor's Neurology, Autoimmune Encephalitis"]}}},TO=["腦血管疾病與頭痛", "失智、譫妄與認知障礙", "神經肌肉接合與周邊神經疾病", "運動障礙、神經退化與藥物相關神經急症", "癲癇、腦病變、暈厥與其他神經疾病"];
const $=s=>document.querySelector(s);
let view='year',expand=false;
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var t='答案：'+q.answer;if(q.answer_status&&q.answer_status!=='normal'){var lbl=q.answer_status.indexOf('送分')>=0?'（送分·全給分）':'（多重答案·均給分：'+(q.accepted_answers||[]).join('、')+'）';t+='<span class="amul">'+lbl+'</span>';}return t;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">民國'+q.roc_year+'</span>','<span class="chip">'+esc(q.src)+'</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt" data-k="'+k+'"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=(q.answer===k)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q" data-id="'+q.id+'" data-acc="'+((q.accepted_answers&&q.accepted_answers.length?q.accepted_answers:[q.answer]).join(','))+'" data-songfen="'+(((q.answer_status||'').indexOf('送分')>=0)?1:0)+'"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<div class="result"></div><button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
const PKEY='im_neuro_v1';let PROG={},wrongOnly=false;try{PROG=JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){PROG={}}function saveProg(){try{localStorage.setItem(PKEY,JSON.stringify(PROG))}catch(e){}}function updateStats(){var st=document.getElementById('stats');if(!st)return;var ks=Object.keys(PROG),a=ks.length,c=ks.filter(function(k){return PROG[k].r==='c'}).length,rt=a?Math.round(c/a*100):0;st.innerHTML=a?('已作答 <b>'+a+'</b> / '+Q.length+' 題 ・ 答對 <b>'+c+'</b> ・ 答錯 <b>'+(a-c)+'</b> ・ 答對率 <b>'+rt+'%</b><div class="bar"><i style="width:'+rt+'%"></i></div>'):'👋 點選每題的 A／B／C／D 即可作答，分數與錯題會自動保存（下次打開仍在）';}function updateWrongBtn(){var b=document.getElementById('wrongBtn');if(!b)return;var n=Object.keys(PROG).filter(function(k){return PROG[k].r==='w'}).length;b.textContent='錯題本'+(n?'（'+n+'）':'');}function fillQ(qEl,k,correct,songfen,acc){qEl.dataset.answered='1';qEl.classList.add('done');qEl.querySelectorAll('.opt').forEach(function(o){var ok=o.dataset.k;if(songfen||acc.indexOf(ok)>=0)o.classList.add('right');if(ok===k){o.classList.add('pick');if(!correct)o.classList.add('wrong');}});var r=qEl.querySelector('.result');if(r){r.className='result '+(correct?'ok':'bad');r.textContent=correct?'\u2713 正確！':'\u2717 錯誤（正確答案：'+acc.join('、')+(songfen?'，本題送分':'')+'）';}}function applyStored(qEl){var p=PROG[qEl.dataset.id];if(!p)return;fillQ(qEl,p.k,p.r==='c',qEl.dataset.songfen==='1',(qEl.dataset.acc||'').split(','));}function answerQ(opt){var qEl=opt.closest('.q');if(!qEl||qEl.dataset.answered)return;var acc=(qEl.dataset.acc||'').split(','),sf=qEl.dataset.songfen==='1',k=opt.dataset.k,correct=sf||acc.indexOf(k)>=0;fillQ(qEl,k,correct,sf,acc);PROG[qEl.dataset.id]={r:correct?'c':'w',k:k};saveProg();updateStats();updateWrongBtn();}var _origRender=render;render=function(){_origRender.apply(this,arguments);ce.querySelectorAll('.q').forEach(applyStored);ce.querySelectorAll('.lec').forEach(function(el){el.style.display=wrongOnly?'none':'';});if(wrongOnly){var grp=null,vis=false;Array.prototype.forEach.call(ce.children,function(el){if(el.classList.contains('grp')){if(grp&&!vis)grp.style.display='none';grp=el;vis=false;el.style.display='';}else if(el.classList.contains('q')){var p=PROG[el.dataset.id],s=p&&p.r==='w';el.style.display=s?'':'none';if(s)vis=true;}});if(grp&&!vis)grp.style.display='none';}updateStats();};ce.addEventListener('click',function(e){var opt=e.target.closest('.opt');if(opt&&ce.contains(opt)){answerQ(opt);return;}if(e.target.classList.contains('tg')){var a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});(function(){var wb=document.getElementById('wrongBtn'),rb=document.getElementById('resetBtn');if(wb)wb.onclick=function(){wrongOnly=!wrongOnly;this.classList.toggle('on',wrongOnly);render();};if(rb)rb.onclick=function(){if(confirm('確定要清除所有作答紀錄、分數與錯題本嗎？此動作無法復原。')){PROG={};saveProg();wrongOnly=false;if(wb)wb.classList.remove('on');updateStats();updateWrongBtn();render();}};updateStats();updateWrongBtn();})();
