ns":{"A":"頸椎脊髓病變(cervical myelopathy)產生症狀,即需手術治療","B":"急性神經根壓迫,可先保守治療","C":"老年人接受後側椎弓切除術,日後很容易產生脊柱後凸變形","D":"前頸椎手術可能傷到recurrent laryngeal nerve"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"107080-11","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"107080-11","q_num":11,"src":"民國107年第二次","img":""},{"exam_code":"109020","roc_year":109,"exam_round":"第一次","num":8,"stem":"腰椎椎間盤突出,90%發生在那個地方?","options":{"A":"L1-2 and L2-3","B":"L2-3 and L3-4","C":"L3-4 and L4-5","D":"L4-5 and L5-S1"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"109020-8","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"109020-8","q_num":8,"src":"民國109年第一次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":10,"stem":"有關腰椎退化神經病變,下列敘述何者錯誤?","options":{"A":"腰椎椎間盤突出(lumbar disc herniation)最常發生在L3-4或L4-5處","B":"腰椎退化椎管狹窄常導因於後側小關節或黃韌帶變大、變厚,造成神經椎孔狹小,神經壓迫","C":"間歇性跛行可藉由暫時坐下而使症狀緩解","D":"踝反射降低所代表的通常是S1神經根壓迫"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"110020-10","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"110020-10","q_num":10,"src":"民國110年第一次","img":""},{"exam_code":"110020","roc_year":110,"exam_round":"第一次","num":63,"stem":"一位55歲女性走路步態穩定,主訴近半年來頸部疼痛,且會延伸到右肩三角肌(deltoid muscle)的部位。檢查發現將手臂舉過頭及維持外展(abduction)姿勢時會減輕疼痛,但將頭後仰及轉向右側時會引發疼痛。下列敘述何者最適當?","options":{"A":"具有明顯的上運動神經元徵象(upper motor neuron sign)","B":"主要因右肩旋轉肌袖(rotator cuff)及三角肌肌腱發炎引起疼痛","C":"主要因頸椎神經根受到壓迫引起疼痛","D":"大部分無法單純靠止痛消炎藥物及復健治療改善症狀"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"110020-63","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"110020-63","q_num":63,"src":"民國110年第一次","img":""},{"exam_code":"110080","roc_year":110,"exam_round":"第二次","num":62,"stem":"有關腰椎神經根(lumbar spinal root)所支配的肌肉及動作,下列敘述何者最不適當?","options":{"A":"股四頭肌(quadriceps)主要是由第三及第四腰椎神經根支配,其主要的動作是膝關節伸展(kneeextension)","B":"脛骨前肌(tibialis anterior)主要是由第四及第五腰椎神經根支配,其主要的動作是踝關節背屈(ankledorsiflexion)","C":"腓骨長/短肌(peroneus longus / brevis)主要是由第五腰椎及第一薦椎神經根支配,其主要的動作是踝關節外翻(ankle eversion)","D":"伸趾長肌(extensor hallucis longus)主要是由第一薦椎神經根支配,其主要的動作是大趾伸展(greattoe extension)"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"110080-62","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"110080-62","q_num":62,"src":"民國110年第二次","img":""},{"exam_code":"111020","roc_year":111,"exam_round":"第一次","num":62,"stem":"有關化膿性脊椎感染(pyogenic spinal infection),下列敘述何者最不適當?","options":{"A":"最常發生於腰椎,胸椎次之","B":"最常見之致病菌為金黃色葡萄球菌(Staphylococcus aureus)","C":"成人的致病機轉主要為血行性(hematogenous)感染椎間盤(intervertebral disc),再蔓延至上、下椎體(vertebral body)造成骨髓炎(osteomyelitis)","D":"手術適應症包括非手術治療無效、鑑別致病性微生物、有神經功能缺失(neurologic deficit)或脊椎不穩定(spinal instability)"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111020-62","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"111020-62","q_num":62,"src":"民國111年第一次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":11,"stem":"下列關於頸椎退化性疾病的治療敘述","options":{"A":"急性頸椎神經根病變,通常先以保守","B":"如果病人保守治療後,症狀仍未改善","C":"以手術治療後,病人肩頸疼痛症狀和","D":"前位椎間盤切除減壓手術,術後病人"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"111080-11","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"111080-11","q_num":11,"src":"民國111年第二次","img":""},{"exam_code":"111080","roc_year":111,"exam_round":"第二次","num":62,"stem":"有關椎間盤突出症(HIVD)之敘述,","options":{"A":"protrusion、extrusion 和sequestration","B":"通常需要手術治療才可以將神經減壓","C":"有症狀及徵象時,磁振造影(MRI)","D":"術後感染(infection)、硬膜撕裂((recurrent HIVD)是最常見的術後併"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"111080-62","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"111080-62","q_num":62,"src":"民國111年第二次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":11,"stem":"關於腰椎退化性病變造成神經管狹窄,甚至造成椎體滑脫的敘述,下列何者最適當?","options":{"A":"典型的症狀為長期嚴重的下背痛,無法走遠、騎腳踏車和久坐","B":"症狀會隨著病患站立和挺起腰椎(extension)而得到緩解","C":"如為第五腰椎pars interarticularis退化性斷裂,可能造成腰椎第4~5節滑脫併椎管狹窄","D":"可先以保守治療為主,如果症狀沒有改善,甚至神經症狀加劇,或有小便困難情形,則需住院手術治療"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112020-11","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"112020-11","q_num":11,"src":"民國112年第一次","img":""},{"exam_code":"112020","roc_year":112,"exam_round":"第一次","num":62,"stem":"有關椎間盤退化疾病(degenerative disc disease),下列敘述何者最不適當?","options":{"A":"大部分椎間盤退化會引起背痛,可用磁振造影來判讀疼痛的椎間盤","B":"椎間盤退化會使椎間盤脫水、高度降低,並且會改變它的機械特性(mechanical properties)","C":"椎間盤退化造成的背痛會因身體屈曲(flexion)而加劇,且因坐姿會造成椎間盤內壓力增加而加重疼痛,且疼痛可能會輻射至臀部、大腿或腹股溝","D":"椎間盤退化疾病的治療效果較其他脊椎病變的治療效果為差,若須手術治療,常合併脊椎融合術(spinalfusion)"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"112020-62","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"112020-62","q_num":62,"src":"民國112年第一次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":11,"stem":"下列關於急性腰椎椎間盤突出疾病的敘述,何者最不適當?","options":{"A":"大部分腰椎椎間盤突出發生在L4-5和L5-S1 level,少部分在L3-4 level","B":"主要病因爲長期腰椎損傷,如前傾彎腰和負重物等","C":"主要症狀為下背痛和急性下肢神經病變,以下肢神經根疼痛為主要症狀","D":"如數日後疼痛緩解,下肢麻木感取代部分疼痛,則表示神經根病變有緩解"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"112080-11","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"112080-11","q_num":11,"src":"民國112年第二次","img":""},{"exam_code":"112080","roc_year":112,"exam_round":"第二次","num":62,"stem":"關於脊椎狹窄(spinal stenosis),下列敘述何者最不適當?","options":{"A":"先天性的椎管狹窄是最常見的類型","B":"狹窄可發生在椎管的中央區(central portion)、側隱窩(lateral recess)或神經孔(neuroforamen),但通常不會發生在椎根(pedicle)的位置","C":"脊椎狹窄最常見於第四、五腰椎的節段","D":"若病人有進行性的神經缺失(progressive neurologic deficit),手術減壓通常可以得到不錯的療效"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"112080-62","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"112080-62","q_num":62,"src":"民國112年第二次","img":""},{"exam_code":"113020","roc_year":113,"exam_round":"第一次","num":62,"stem":"50 歲的男性,患有下背痛及雙側下肢酸麻。脊椎X 光檢查顯示第五腰椎椎弓斷裂、第五腰椎/第一薦椎的Meyerding 第一級向前滑脫(L5 on S1 spondylolisthesis)。最可能受到壓迫的神經根為:","options":{"A":"第三腰椎神經根","B":"第四腰椎神經根","C":"第五腰椎神經根","D":"第一薦椎神經根"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"113020-62","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"113020-62","q_num":62,"src":"民國113年第一次","img":""},{"exam_code":"113070","roc_year":113,"exam_round":"第二次","num":11,"stem":"下列關於L5 root的敘述,何者正確?","options":{"A":"沿著L4椎莖(pedicle)下方,L4-5椎間盤之前出神經孔","B":"感覺分布於大腿後外側到小腿、足踝","C":"主管tibialis anterior力量,若有病變會有drop foot情況","D":"若有病變,knee jerk reflex會減少"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"113070-11","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"113070-11","q_num":11,"src":"民國113年第二次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":11,"stem":"有關脊椎狹窄(spinal stenosis)之敘述,下列何者最適當?","options":{"A":"spondylosis表示脊椎構造廣泛性的退化形變和過度增生,造成脊椎狹窄(spinal stenosis)的過程","B":"頸椎退化造成椎管內脊髓壓迫而產生脊髓病變,此一過程稱為cervical spondylolyticmyelopathy","C":"典型的脊髓病變表現為上肢肌肉無力萎縮,肌腱反射變強(hyperreflexia),但下肢本體感覺正常","D":"脊髓病變通常為多節性,通常病患接受減壓手術治療就能夠得到立即且滿意的恢復,不需再復健治療"},"answer":"A","answer_status":"normal","accepted_answers":["A"],"correction_note":"","images":[],"_id":"114020-11","topic_code":"T4","topic":"脊椎退化‧椎間盤‧神經根","id":"114020-11","q_num":11,"src":"民國114年第一次","img":""},{"exam_code":"114020","roc_year":114,"exam_round":"第一次","num":62,"stem":"有關頸椎後縱韌帶骨化症(ossification of the posterior longitudinal ligament),下列敘述何者最不適當?","options":{"A":"好發於亞洲人,且男性較多","B":"最常見於頸椎第四、五、六節(C4, C5, C6)","C":"常會合併其他脊椎問題,例如廣泛性特發骨質增生症(diffuse idiopathic skeletalhyperostosis)、脊椎關節退化(spondylosis)及僵直性脊椎炎(ankylosing spondylitis)","D":"為了解除脊髓神經壓迫,應施行手術減壓才會有神經功能的進步"},"answer":"D","answer_status":"normal","accepted_answers":["D"],"correction_note":"","images":[],"_id":"114020-62","topic_cod orrection_note":"","images":[],"_id":"113020-63","topic_code":"T6","topic":"水腦‧先天畸形‧功能性神經外科","id":"113020-63","q_num":63,"src":"民國113年第一次","img":""},{"exam_code":"113070","roc_year":113,"exam_round":"第二次","num":13,"stem":"有關舟形頭(scaphocephaly)的敘述,下列何者正確?","options":{"A":"冠狀縫線(coronal suture)過早黏合","B":"常合併眼球突出外觀","C":"不常合併上頜骨發育不全(maxillary hypoplasia)","D":"常合併水腦症"},"answer":"C","answer_status":"normal","accepted_answers":["C"],"correction_note":"","images":[],"_id":"113070-13","topic_code":"T6","topic":"水腦‧先天畸形‧功能性神經外科","id":"113070-13","q_num":13,"src":"民國113年第二次","img":""},{"exam_code":"115020","roc_year":115,"exam_round":"第一次","num":29,"stem":"新生兒及嬰兒水腦症的原因有congenital or acquired etiology,下列敘述何者最不適當?","options":{"A":"aqueductal stenosis 造成的hydrocephalus 屬congenital etiology","B":"aqueductal stenosis 造成的hydrocephalus 屬communicating hydrocephalus","C":"新生兒meningitis 後,造成postinfectious hydrocephalus,多屬communicating hydrocephalus","D":"Chiari II malformation 造成的hydrocephalus 屬congenital etiology"},"answer":"B","answer_status":"normal","accepted_answers":["B"],"correction_note":"","images":[],"_id":"115020-29","topic_code":"T6","topic":"水腦‧先天畸形‧功能性神經外科","id":"115020-29","q_num":29,"src":"民國115年第一次","img":""}],E={"101030-47":{"quick":"錯在 D:急性硬腦膜下出血多因「橋靜脈」破裂,非中腦膜動脈(後者為硬腦膜上出血)。","detail":{"background":"外傷顱內血腫:硬腦膜上(EDH)—多「中腦膜動脈」破裂、常合併顱骨骨折、CT 雙凸透鏡狀、典型「清明期(lucid interval)」、及時手術預後佳;硬腦膜下(SDH)—多「橋靜脈(bridging veins)」破裂、CT 新月狀、預後較 EDH 差、老人/酗酒易發。瀰漫性軸突損傷(DAI)—剪力傷、無清明期、CT 可正常但昏迷、胼胝體/腦幹點狀出血、肉眼解剖可無明顯異常。手術指徵:血腫>30 mL、中線偏移>5 mm/>1 cm、神經惡化。重度 TBI 不給類固醇(CRASH 試驗有害)。","options":{"A":"正確:先評估治療休克/缺氧/凝血。","B":"正確:挫傷血塊 12–24 小時可變大。","C":"正確:>30 mL 可顯著質塊效應。","D":"★錯誤(本題答案):SDH 為橋靜脈破裂。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"102030-72":{"quick":"顱底骨折+顱內氣體→B:外傷性顱內積氣(traumatic pneumocephalus)。","detail":{"background":"外傷顱內血腫:硬腦膜上(EDH)—多「中腦膜動脈」破裂、常合併顱骨骨折、CT 雙凸透鏡狀、典型「清明期(lucid interval)」、及時手術預後佳;硬腦膜下(SDH)—多「橋靜脈(bridging veins)」破裂、CT 新月狀、預後較 EDH 差、老人/酗酒易發。瀰漫性軸突損傷(DAI)—剪力傷、無清明期、CT 可正常但昏迷、胼胝體/腦幹點狀出血、肉眼解剖可無明顯異常。手術指徵:血腫>30 mL、中線偏移>5 mm/>1 cm、神經惡化。重度 TBI 不給類固醇(CRASH 試驗有害)。","options":{"A":"腦脊髓液漏非影像氣體。","B":"★正確(本題答案):外傷性顱內積氣。","C":"脂肪栓塞非此。","D":"外傷性 SAH 非顱內氣體。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"102110-14":{"quick":"CPP=MAP−ICP=110−25=A:85 mmHg。","detail":{"background":"顱內壓(ICP)管理:正常<15 mmHg、治療閾值>20–22。降 ICP 法:「頭抬高 30°、止痛鎮靜、滲透治療(mannitol/高張鹽水)、過度換氣(短暫,降 CO2 致血管收縮)、腦脊髓液引流、去骨瓣減壓」。「平躺、低通氣(hypoventilation 升 CO2→血管擴張)」反而升 ICP。腦灌流壓 CPP=MAP−ICP(目標 60–70)。Cushing 三徵(ICP 升高)=高血壓、心搏徐緩、呼吸不規則。升 ICP 病灶:出血、腫塊、阻塞性水腦、高碳酸(降 CO2 反降 ICP)。","options":{"A":"★正確(本題答案):85 mmHg。","B":"70 計算錯。","C":"50 計算錯。","D":"100 計算錯。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"104030-5":{"quick":"GCS:睜眼對痛(2)+無語言(1)+不正常伸張(2)=C:5 分。","detail":{"background":"Glasgow 昏迷指數(GCS,3–15):睜眼 E(4 自發/3 呼喚/2 疼痛/1 無)、語言 V(5 切題/4 答非所問/3 不當字句/2 無法理解聲音/1 無)、運動 M(6 遵令/5 疼痛定位/4 疼痛回縮/3 不正常屈曲 decorticate/2 不正常伸張 decerebrate/1 無)。≤8 為重度(須保護氣道插管)。","options":{"A":"3 過低。","B":"4 過低。","C":"★正確(本題答案):5 分。","D":"6 過高。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"104090-11":{"quick":"無法降腦壓者 A:平躺(應頭抬高 30°)。","detail":{"background":"顱內壓(ICP)管理:正常<15 mmHg、治療閾值>20–22。降 ICP 法:「頭抬高 30°、止痛鎮靜、滲透治療(mannitol/高張鹽水)、過度換氣(短暫,降 CO2 致血管收縮)、腦脊髓液引流、去骨瓣減壓」。「平躺、低通氣(hypoventilation 升 CO2→血管擴張)」反而升 ICP。腦灌流壓 CPP=MAP−ICP(目標 60–70)。Cushing 三徵(ICP 升高)=高血壓、心搏徐緩、呼吸不規則。升 ICP 病灶:出血、腫塊、阻塞性水腦、高碳酸(降 CO2 反降 ICP)。","options":{"A":"★正確(本題答案):平躺不降反升 ICP。","B":"止痛可降 ICP。","C":"鎮定劑可降 ICP。","D":"腦脊髓液引流可降 ICP。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"105020-5":{"quick":"頭部外傷急救最優先 D:矯正低血壓、維持足夠供氧(ABC)。","detail":{"background":"重度頭部外傷處置:先 ABC(矯正休克/缺氧最優先)、頸圈固定、GCS≤8 插管;評估 GCS/瞳孔/合併傷→生命徵象穩定後 CT;維持收縮壓>100–110、避免低血壓低氧;預防性抗癲癇(早期癲癇);不給類固醇。頭外傷需立即 CT:意識惡化、局部神經缺損、噴射嘔吐、穿刺傷、凹陷/顱底骨折、抗凝;單純暈眩可先觀察。腦震盪分級:第三級伴意識喪失;1–2 週內易再受傷(二次撞擊症候群),避免劇烈運動。","options":{"A":"胸部 X 光非首要。","B":"尿液非首要。","C":"腹部 X 光非首要。","D":"★正確(本題答案):矯正低血壓/維持供氧。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"105020-15":{"quick":"錯在 C:EDH 若及時治療預後「較急性 SDH 好」(非較差)。","detail":{"background":"外傷顱內血腫:硬腦膜上(EDH)—多「中腦膜動脈」破裂、常合併顱骨骨折、CT 雙凸透鏡狀、典型「清明期(lucid interval)」、及時手術預後佳;硬腦膜下(SDH)—多「橋靜脈(bridging veins)」破裂、CT 新月狀、預後較 EDH 差、老人/酗酒易發。瀰漫性軸突損傷(DAI)—剪力傷、無清明期、CT 可正常但昏迷、胼胝體/腦幹點狀出血、肉眼解剖可無明顯異常。手術指徵:血腫>30 mL、中線偏移>5 mm/>1 cm、神經惡化。重度 TBI 不給類固醇(CRASH 試驗有害)。","options":{"A":"正確:常合併顱骨骨折。","B":"正確:中腦膜動脈破裂。","C":"★錯誤(本題答案):EDH 預後較 SDH 好。","D":"正確:約 1/3 到院昏迷。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"106020-11":{"quick":"跌倒、新月狀出血→A:出血位於硬腦膜下(SDH)。","detail":{"background":"外傷顱內血腫:硬腦膜上(EDH)—多「中腦膜動脈」破裂、常合併顱骨骨折、CT 雙凸透鏡狀、典型「清明期(lucid interval)」、及時手術預後佳;硬腦膜下(SDH)—多「橋靜脈(bridging veins)」破裂、CT 新月狀、預後較 EDH 差、老人/酗酒易發。瀰漫性軸突損傷(DAI)—剪力傷、無清明期、CT 可正常但昏迷、胼胝體/腦幹點狀出血、肉眼解剖可無明顯異常。手術指徵:血腫>30 mL、中線偏移>5 mm/>1 cm、神經惡化。重度 TBI 不給類固醇(CRASH 試驗有害)。","options":{"A":"★正確(本題答案):硬腦膜下。","B":"顱骨骨折致腦膜動脈破裂為 EDH。","C":"有質塊效應應手術,非僅藥物。","D":"GCS=E2V1M5=8(非 10)。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"106020-13":{"quick":"最不適合腰椎穿刺 A:腦部腫瘤病變(質塊+顱內壓高→腦疝風險)。","detail":{"background":"顱內壓(ICP)管理:正常<15 mmHg、治療閾值>20–22。降 ICP 法:「頭抬高 30°、止痛鎮靜、滲透治療(mannitol/高張鹽水)、過度換氣(短暫,降 CO2 致血管收縮)、腦脊髓液引流、去骨瓣減壓」。「平躺、低通氣(hypoventilation 升 CO2→血管擴張)」反而升 ICP。腦灌流壓 CPP=MAP−ICP(目標 60–70)。Cushing 三徵(ICP 升高)=高血壓、心搏徐緩、呼吸不規則。升 ICP 病灶:出血、腫塊、阻塞性水腦、高碳酸(降 CO2 反降 ICP)。","options":{"A":"★正確(本題答案):腦瘤(LP 致腦疝)。","B":"腦膜炎需 LP 診斷。","C":"SAH 可 LP(影像陰性時)。","D":"交通性水腦可 LP。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"106020-15":{"quick":"錯在 C:DAI 肉眼解剖「可無明顯異常」(損傷為顯微軸突)。","detail":{"background":"外傷顱內血腫:硬腦膜上(EDH)—多「中腦膜動脈」破裂、常合併顱骨骨折、CT 雙凸透鏡狀、典型「清明期(lucid interval)」、及時手術預後佳;硬腦膜下(SDH)—多「橋靜脈(bridging veins)」破裂、CT 新月狀、預後較 EDH 差、老人/酗酒易發。瀰漫性軸突損傷(DAI)—剪力傷、無清明期、CT 可正常但昏迷、胼胝體/腦幹點狀出血、肉眼解剖可無明顯異常。手術指徵:血腫>30 mL、中線偏移>5 mm/>1 cm、神經惡化。重度 TBI 不給類固醇(CRASH 試驗有害)。","options":{"A":"正確:通常無清明期。","B":"正確:CT 可無病灶但昏迷。","C":"★錯誤(本題答案):肉眼可無明顯異常。","D":"正確:胼胝體出血性壞死。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"106080-2":{"quick":"GCS:睜眼對痛(2)+無語言(1)+回縮(4)=D:7 分。","detail":{"background":"Glasgow 昏迷指數(GCS,3–15):睜眼 E(4 自發/3 呼喚/2 疼痛/1 無)、語言 V(5 切題/4 答非所問/3 不當字句/2 無法理解聲音/1 無)、運動 M(6 遵令/5 疼痛定位/4 疼痛回縮/3 不正常屈曲 decorticate/2 不正常伸張 decerebrate/1 無)。≤8 為重度(須保護氣道插管)。","options":{"A":"8 過高。","B":"9 過高。","C":"10 過高。","D":"★正確(本題答案):7 分。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"107020-12":{"quick":"降腦壓效果最差 C:低通氣(hypoventilation,升 CO2→血管擴張→升 ICP)。","detail":{"background":"顱內壓(ICP)管理:正常<15 mmHg、治療閾值>20–22。降 ICP 法:「頭抬高 30°、止痛鎮靜、滲透治療(mannitol/高張鹽水)、過度換氣(短暫,降 CO2 致血管收縮)、腦脊髓液引流、去骨瓣減壓」。「平躺、低通氣(hypoventilation 升 CO2→血管擴張)」反而升 ICP。腦灌流壓 CPP=MAP−ICP(目標 60–70)。Cushing 三徵(ICP 升高)=高血壓、心搏徐緩、呼吸不規則。升 ICP 病灶:出血、腫塊、阻塞性水腦、高碳酸(降 CO2 反降 ICP)。","options":{"A":"頭抬高 30°有效。","B":"mannitol/glycerol 有效。","C":"★最差(本題答案):低通氣反升 ICP。","D":"去骨瓣減壓有效。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"108080-8":{"quick":"錯在 D:嬰兒搖晃症「外觀常無明顯異常」(隱匿,須眼底/影像)。","detail":{"background":"嬰兒搖晃症(shaken baby syndrome):非意外性創傷、常與虐兒相關;典型三聯—「硬腦膜下出血、視網膜出血、瀰漫腦損傷」;外觀常無明顯外傷而隱匿,須眼底鏡查視網膜出血、CT 查急性 SDH,並社工/通報介入。","options":{"A":"正確:與虐兒相關、社工介入。","B":"正確:視網膜出血。","C":"正確:急性硬膜下血腫。","D":"★錯誤(本題答案):外觀常不易發現。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"108080-11":{"quick":"非腦死臨床要件者 B:有自發性呼吸(腦死須『無自主呼吸/呼吸暫停試驗陽性』)。","detail":{"background":"腦死臨床判定要件:深度昏迷且對語言/疼痛無反應、喪失「腦幹反射」(瞳孔/角膜/前庭眼/嘔吐咳嗽)、「無自主呼吸(呼吸暫停試驗)」、無自主動作/姿態;須排除低體溫、藥物、代謝因素;台灣需間隔觀察與兩次判定。「有自發呼吸」與腦死矛盾。","options":{"A":"是要件:深度昏迷無反應。","B":"★非要件(本題答案):腦死無自發呼吸。","C":"是要件:喪失腦幹反射。","D":"是要件:無自主動作/姿態。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"108080-47":{"quick":"GCS:睜眼對痛(2)+呻吟(2)+不正常屈曲(3)=B:7 分。","detail":{"background":"Glasgow 昏迷指數(GCS,3–15):睜眼 E(4 自發/3 呼喚/2 疼痛/1 無)、語言 V(5 切題/4 答非所問/3 不當字句/2 無法理解聲音/1 無)、運動 M(6 遵令/5 疼痛定位/4 疼痛回縮/3 不正常屈曲 decorticate/2 不正常伸張 decerebrate/1 無)。≤8 為重度(須保護氣道插管)。","options":{"A":"6 過低。","B":"★正確(本題答案):7 分。","C":"8 過高。","D":"9 過高。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"109080-10":{"quick":"錯在 D:不應「先給抗癲癇試驗藥」,優先 ABC、評估、穩定後 CT。","detail":{"background":"重度頭部外傷處置:先 ABC(矯正休克/缺氧最優先)、頸圈固定、GCS≤8 插管;評估 GCS/瞳孔/合併傷→生命徵象穩定後 CT;維持收縮壓>100–110、避免低血壓低氧;預防性抗癲癇(早期癲癇);不給類固醇。頭外傷需立即 CT:意識惡化、局部神經缺損、噴射嘔吐、穿刺傷、凹陷/顱底骨折、抗凝;單純暈眩可先觀察。腦震盪分級:第三級伴意識喪失;1–2 週內易再受傷(二次撞擊症候群),避免劇烈運動。","options":{"A":"正確:評估 GCS/瞳孔/對光。","B":"正確:評估生命徵象與合併傷。","C":"正確:穩定後安排 CT。","D":"★錯誤(本題答案):不以抗癲癇試驗為先。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"109080-77":{"quick":"GCS:睜眼對痛(2)+不可理解聲音(2)+疼痛定位(左手撥開,5)=C:9 分。","detail":{"background":"Glasgow 昏迷指數(GCS,3–15):睜眼 E(4 自發/3 呼喚/2 疼痛/1 無)、語言 V(5 切題/4 答非所問/3 不當字句/2 無法理解聲音/1 無)、運動 M(6 遵令/5 疼痛定位/4 疼痛回縮/3 不正常屈曲 decorticate/2 不正常伸張 decerebrate/1 無)。≤8 為重度(須保護氣道插管)。","options":{"A":"7 過低。","B":"8 過低。","C":"★正確(本題答案):9 分。","D":"10 過高。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"111020-16":{"quick":"錯在 B:外傷後癲癇第一線為「benzodiazepine(如 lorazepam)」,非 propofol。","detail":{"background":"外傷後癲癇處置:第一線「苯二氮平類(lorazepam/diazepam)」,無效於數分鐘內給第二線(phenytoin/levetiracetam/valproate),持續>5 分鐘屬癲癇重積→插管+全身鎮靜(此時 propofol)。額葉病灶癲癇可致雙眼向「對側」偏移。","options":{"A":"(可接受)雙眼偏移方向描述。","B":"★錯誤(本題答案):第一線為 benzodiazepine 非 propofol。","C":"正確:1 分鐘無效給第二線。","D":"正確:>5 分鐘插管完全鎮靜。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"111020-18":{"quick":"CPP=MAP−ICP;MAP=(150+2×90)/3=110,110−25=D:85 mmHg。","detail":{"background":"顱內壓(ICP)管理:正常<15 mmHg、治療閾值>20–22。降 ICP 法:「頭抬高 30°、止痛鎮靜、滲透治療(mannitol/高張鹽水)、過度換氣(短暫,降 CO2 致血管收縮)、腦脊髓液引流、去骨瓣減壓」。「平躺、低通氣(hypoventilation 升 CO2→血管擴張)」反而升 ICP。腦灌流壓 CPP=MAP−ICP(目標 60–70)。Cushing 三徵(ICP 升高)=高血壓、心搏徐緩、呼吸不規則。升 ICP 病灶:出血、腫塊、阻塞性水腦、高碳酸(降 CO2 反降 ICP)。","options":{"A":"105 未扣 ICP。","B":"95 計算錯。","C":"90 計算錯。","D":"★正確(本題答案):85 mmHg。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"111080-1":{"quick":"正確為 D:出血在基底核或小腦較可能是「高血壓性出血性腦中風」。","detail":{"background":"外傷顱內血腫:硬腦膜上(EDH)—多「中腦膜動脈」破裂、常合併顱骨骨折、CT 雙凸透鏡狀、典型「清明期(lucid interval)」、及時手術預後佳;硬腦膜下(SDH)—多「橋靜脈(bridging veins)」破裂、CT 新月狀、預後較 EDH 差、老人/酗酒易發。瀰漫性軸突損傷(DAI)—剪力傷、無清明期、CT 可正常但昏迷、胼胝體/腦幹點狀出血、肉眼解剖可無明顯異常。手術指徵:血腫>30 mL、中線偏移>5 mm/>1 cm、神經惡化。重度 TBI 不給類固醇(CRASH 試驗有害)。","options":{"A":"錯:對衝傷(contrecoup)對側亦可受傷。","B":"錯:硬腦膜上出血多『動脈』(中腦膜動脈)破裂。","C":"錯:老人較易硬腦膜下出血。","D":"★正確(本題答案):基底核/小腦出血→高血壓性。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"112020-13":{"quick":"須馬上手術 D:腦實質出血 35 mL+中線偏移>1 cm+神智改變。","detail":{"background":"外傷顱內血腫:硬腦膜上(EDH)—多「中腦膜動脈」破裂、常合併顱骨骨折、CT 雙凸透鏡狀、典型「清明期(lucid interval)」、及時手術預後佳;硬腦膜下(SDH)—多「橋靜脈(bridging veins)」破裂、CT 新月狀、預後較 EDH 差、老人/酗酒易發。瀰漫性軸突損傷(DAI)—剪力傷、無清明期、CT 可正常但昏迷、胼胝體/腦幹點狀出血、肉眼解剖可無明顯異常。手術指徵:血腫>30 mL、中線偏移>5 mm/>1 cm、神經惡化。重度 TBI 不給類固醇(CRASH 試驗有害)。","options":{"A":"顏面神經麻痺非緊急開顱指徵。","B":"前顱窩 CSF 鼻漏多保守觀察。","C":"CSF 鼻漏多先保守。","D":"★正確(本題答案):大出血+中線偏移+意識改變。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"112080-13":{"quick":"錯在 A:有「失去意識」屬第三級腦震盪(第二級無意識喪失)。","detail":{"background":"重度頭部外傷處置:先 ABC(矯正休克/缺氧最優先)、頸圈固定、GCS≤8 插管;評估 GCS/瞳孔/合併傷→生命徵象穩定後 CT;維持收縮壓>100–110、避免低血壓低氧;預防性抗癲癇(早期癲癇);不給類固醇。頭外傷需立即 CT:意識惡化、局部神經缺損、噴射嘔吐、穿刺傷、凹陷/顱底骨折、抗凝;單純暈眩可先觀察。腦震盪分級:第三級伴意識喪失;1–2 週內易再受傷(二次撞擊症候群),避免劇烈運動。","options":{"A":"★錯誤(本題答案):失去意識為第三級。","B":"正確:1–2 週易再受傷避免劇烈運動。","C":"正確:易失憶。","D":"正確:1–2 週易記憶障礙/頭痛。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"113020-1":{"quick":"最不適當 B:重度 TBI「不應給類固醇」(CRASH 試驗顯示增加死亡)。","detail":{"background":"重度頭部外傷處置:先 ABC(矯正休克/缺氧最優先)、頸圈固定、GCS≤8 插管;評估 GCS/瞳孔/合併傷→生命徵象穩定後 CT;維持收縮壓>100–110、避免低血壓低氧;預防性抗癲癇(早期癲癇);不給類固醇。頭外傷需立即 CT:意識惡化、局部神經缺損、噴射嘔吐、穿刺傷、凹陷/顱底骨折、抗凝;單純暈眩可先觀察。腦震盪分級:第三級伴意識喪失;1–2 週內易再受傷(二次撞擊症候群),避免劇烈運動。","options":{"A":"適當:GCS 7 應插管。","B":"★最不適當(本題答案):TBI 不給類固醇。","C":"適當:低血壓給輸液。","D":"適當:頸圈固定。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"113020-12":{"quick":"不會升腦壓者 B:降低血中二氧化碳(血管收縮→降 ICP)。","detail":{"background":"顱內壓(ICP)管理:正常<15 mmHg、治療閾值>20–22。降 ICP 法:「頭抬高 30°、止痛鎮靜、滲透治療(mannitol/高張鹽水)、過度換氣(短暫,降 CO2 致血管收縮)、腦脊髓液引流、去骨瓣減壓」。「平躺、低通氣(hypoventilation 升 CO2→血管擴張)」反而升 ICP。腦灌流壓 CPP=MAP−ICP(目標 60–70)。Cushing 三徵(ICP 升高)=高血壓、心搏徐緩、呼吸不規則。升 ICP 病灶:出血、腫塊、阻塞性水腦、高碳酸(降 CO2 反降 ICP)。","options":{"A":"SAH 升 ICP。","B":"★正確(本題答案):降 CO2 反降 ICP。","C":"阻塞性水腦升 ICP。","D":"腦實質出血升 ICP。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"113070-12":{"quick":"最不適當 C:GCS13、額葉出血僅 10 cc→『不需』開顱移除(觀察即可)。","detail":{"background":"外傷顱內血腫:硬腦膜上(EDH)—多「中腦膜動脈」破裂、常合併顱骨骨折、CT 雙凸透鏡狀、典型「清明期(lucid interval)」、及時手術預後佳;硬腦膜下(SDH)—多「橋靜脈(bridging veins)」破裂、CT 新月狀、預後較 EDH 差、老人/酗酒易發。瀰漫性軸突損傷(DAI)—剪力傷、無清明期、CT 可正常但昏迷、胼胝體/腦幹點狀出血、肉眼解剖可無明顯異常。手術指徵:血腫>30 mL、中線偏移>5 mm/>1 cm、神經惡化。重度 TBI 不給類固醇(CRASH 試驗有害)。","options":{"A":"適當:預防性抗癲癇。","B":"適當:PCO2 維持 35–40。","C":"★最不適當(本題答案):小量出血不需開顱。","D":"適當:維持收縮壓>100。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"114020-13":{"quick":"可先觀察、不一定馬上 CT 者 C:暈眩。","detail":{"background":"重度頭部外傷處置:先 ABC(矯正休克/缺氧最優先)、頸圈固定、GCS≤8 插管;評估 GCS/瞳孔/合併傷→生命徵象穩定後 CT;維持收縮壓>100–110、避免低血壓低氧;預防性抗癲癇(早期癲癇);不給類固醇。頭外傷需立即 CT:意識惡化、局部神經缺損、噴射嘔吐、穿刺傷、凹陷/顱底骨折、抗凝;單純暈眩可先觀察。腦震盪分級:第三級伴意識喪失;1–2 週內易再受傷(二次撞擊症候群),避免劇烈運動。","options":{"A":"噴射嘔吐 3 次→需 CT。","B":"單側肌力下降→需 CT。","C":"★正確(本題答案):暈眩可先觀察。","D":"頭部穿刺傷→需 CT。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition","Brain Trauma Foundation Guideline"]}},"102110-9":{"quick":"後交通動脈瘤接觸顳葉→B:第三對顱神經(CN III)麻痺。","detail":{"background":"顱內動脈瘤與蜘蛛膜下腔出血(SAH):自發性 SAH 最常見原因「囊狀動脈瘤破裂」;典型「霹靂性頭痛(thunderclap)」、頸僵直。危險因子—高血壓、抽菸、女性、家族史、多囊腎/結締組織病(非糖尿病/高血脂)。後交通動脈瘤壓迫→「第三對顱神經(CN III)麻痺」(眼瞼下垂、瞳孔放大、眼球外下偏)。診斷:CT(急性出血)→CTA/血管攝影定位。分級:Hunt-Hess(臨床,1=輕微頭痛/頸僵)、WFNS(GCS+運動缺損)、Fisher(依「CT」出血量預測血管痙攣)。併發症:再出血、「血管痙攣(vasospasm,術後/出血後 day 4–14、峰 7–10 天,出血量多/Hunt-Hess 高者風險高)」為最常見嚴重後遺症與死因之一→以「Triple-H(hypertension、hypervolemia、hemodilution)」或血流augmentation、nimodipine 處置(過度換氣 hyperventilation 不屬之)、急性水腦。","options":{"A":"未破裂多無意識喪失。","B":"★正確(本題答案):CN III 麻痺。","C":"pcom 動脈瘤多向後外突,非內側。","D":"癲癇非典型。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AHA/ASA SA iple-H(hypertension、hypervolemia、hemodilution)」或血流augmentation、nimodipine 處置(過度換氣 hyperventilation 不屬之)、急性水腦。","options":{"A":"Triple-H:hypervolemia。","B":"Triple-H:hypertension。","C":"Triple-H:hemodilution。","D":"★不含(本題答案):hyperventilation。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AHA/ASA SAH Guideline"]}},"108030-22":{"quick":"本題送分:動脈瘤危險因子不含 D(糖尿病);A 高齡、B 男性、C 高血脂判定有爭議故一律給分。","detail":{"background":"囊狀動脈瘤危險因子:高血壓、抽菸、女性、家族史、多囊腎/結締組織病、年齡。糖尿病非典型危險因子。本題官方一律給分。","options":{"A":"(給分)。","B":"(給分)。","C":"(給分)。","D":"(給分,糖尿病非危險因子)。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AHA/ASA SAH Guideline"]}},"111020-15":{"quick":"錯在 A:血管痙攣好發於出血後「4–14 天(峰 7–10)」,非 1–5 天。","detail":{"background":"顱內動脈瘤與蜘蛛膜下腔出血(SAH):自發性 SAH 最常見原因「囊狀動脈瘤破裂」;典型「霹靂性頭痛(thunderclap)」、頸僵直。危險因子—高血壓、抽菸、女性、家族史、多囊腎/結締組織病(非糖尿病/高血脂)。後交通動脈瘤壓迫→「第三對顱神經(CN III)麻痺」(眼瞼下垂、瞳孔放大、眼球外下偏)。診斷:CT(急性出血)→CTA/血管攝影定位。分級:Hunt-Hess(臨床,1=輕微頭痛/頸僵)、WFNS(GCS+運動缺損)、Fisher(依「CT」出血量預測血管痙攣)。併發症:再出血、「血管痙攣(vasospasm,術後/出血後 day 4–14、峰 7–10 天,出血量多/Hunt-Hess 高者風險高)」為最常見嚴重後遺症與死因之一→以「Triple-H(hypertension、hypervolemia、hemodilution)」或血流augmentation、nimodipine 處置(過度換氣 hyperventilation 不屬之)、急性水腦。","options":{"A":"★錯誤(本題答案):好發 day 4–14。","B":"正確:Hunt-Hess 越高風險越高。","C":"正確:基底池出血量多風險高。","D":"正確:可用 hemodynamic augmentation。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AHA/ASA SAH Guideline"]}},"111020-29":{"quick":"錯在 A:應為「內頸動脈(internal carotid)」狹窄,非外頸動脈。","detail":{"background":"其他腦血管病:高血壓性腦內出血最好發「豆狀核/基底核(putamen)」,其次視丘、橋腦、小腦;與高血壓相關,大量或惡化、壓迫腦幹須手術。毛毛樣血管病(moyamoya):雙側「內頸動脈遠端/大腦中前動脈近端」進行性狹窄+側枝煙霧狀血管,亞洲/小孩多、小孩以缺血表現、成人可出血;治療「血管繞道(bypass)重建」。頸動脈狹窄:內頸動脈粥狀硬化、暫時性單眼黑矇(amaurosis fugax)、可有頸動脈雜音;有症狀重度狹窄行內膜剝除術。頸動脈-海綿竇瘻管(CCF):外傷後「搏動性突眼、結膜充血、雜音」,多高流速、以血管介入栓塞治療。","options":{"A":"★錯誤(本題答案):為內頸動脈狹窄。","B":"正確:不一定聽得到雜音。","C":"正確:同側暫時性黑矇(amaurosis fugax)。","D":"正確:有症狀者內膜剝除術獲益較大。"},"sources":["Youmans and Winn Neurological Surgery","Gre 出血;治療「血管繞道(bypass)重建」。頸動脈狹窄:內頸動脈粥狀硬化、暫時性單眼黑矇(amaurosis fugax)、可有頸動脈雜音;有症狀重度狹窄行內膜剝除術。頸動脈-海綿竇瘻管(CCF):外傷後「搏動性突眼、結膜充血、雜音」,多高流速、以血管介入栓塞治療。","options":{"A":"正確:合併阻塞性水腦需腦室外引流。","B":"★錯誤(本題答案):需手術,非僅類固醇。","C":"正確:惡化可壓迫腦幹猝死。","D":"正確:基底核為常見自發出血區。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AHA/ASA SAH Guideline"]}},"112080-10":{"quick":"正確為 B:此 CTA 影像為顱內動脈瘤「好發位置之一」。","detail":{"background":"顱內動脈瘤與蜘蛛膜下腔出血(SAH):自發性 SAH 最常見原因「囊狀動脈瘤破裂」;典型「霹靂性頭痛(thunderclap)」、頸僵直。危險因子—高血壓、抽菸、女性、家族史、多囊腎/結締組織病(非糖尿病/高血脂)。後交通動脈瘤壓迫→「第三對顱神經(CN III)麻痺」(眼瞼下垂、瞳孔放大、眼球外下偏)。診斷:CT(急性出血)→CTA/血管攝影定位。分級:Hunt-Hess(臨床,1=輕微頭痛/頸僵)、WFNS(GCS+運動缺損)、Fisher(依「CT」出血量預測血管痙攣)。併發症:再出血、「血管痙攣(vasospasm,術後/出血後 day 4–14、峰 7–10 天,出血量多/Hunt-Hess 高者風險高)」為最常見嚴重後遺症與死因之一→以「Triple-H(hypertension、hypervolemia、hemodilution)」或血流augmentation、nimodipine 處置(過度換氣 hyperventilation 不屬之)、急性水腦。","options":{"A":"動脈瘤非以抗血小板處理。","B":"★正確(本題答案):動脈瘤好發位置。","C":"未必為中大腦動脈瘤。","D":"未必已破裂。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AHA/ASA SAH Guideline"]}},"113020-10":{"quick":"正確為 C:WFNS 臨床分級依「GCS+運動缺損」評估動脈瘤破裂預後。","detail":{"background":"顱內動脈瘤與蜘蛛膜下腔出血(SAH):自發性 SAH 最常見原因「囊狀動脈瘤破裂」;典型「霹靂性頭痛(thunderclap)」、頸僵直。危險因子—高血壓、抽菸、女性、家族史、多囊腎/結締組織病(非糖尿病/高血脂)。後交通動脈瘤壓迫→「第三對顱神經(CN III)麻痺」(眼瞼下垂、瞳孔放大、眼球外下偏)。診斷:CT(急性出血)→CTA/血管攝影定位。分級:Hunt-Hess(臨床,1=輕微頭痛/頸僵)、WFNS(GCS+運動缺損)、Fisher(依「CT」出血量預測血管痙攣)。併發症:再出血、「血管痙攣(vasospasm,術後/出血後 day 4–14、峰 7–10 天,出血量多/Hunt-Hess 高者風險高)」為最常見嚴重後遺症與死因之一→以「Triple-H(hypertension、hypervolemia、hemodilution)」或血流augmentation、nimodipine 處置(過度換氣 hyperventilation 不屬之)、急性水腦。","options":{"A":"錯:Hunt-Hess 無「0 分代表影像無法判斷」之義。","B":"錯:Fisher 依「CT」非 MRI。","C":"★正確(本題答案):WFNS 依 GCS+運動缺損。","D":"錯:GCS 與預後相關。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AHA/ASA SAH Guideline"]}},"114020-9":{"quick":"正確為 A:成人 moyamoya 建議以「血管繞道(bypass)手術」治療。","detail":{"background":"其他腦血管病:高血壓性腦內出血最好發「豆狀核/基底核(putamen)」,其次視丘、橋腦、小腦;與高血壓相關,大量或惡化、壓迫腦幹須手術。毛毛樣血管病(moyamoya):雙側「內頸動脈遠端/大腦中前動脈近端」進行性狹窄+側枝煙霧狀血管,亞洲/小孩多、小孩以缺血表現、成人可出血;治療「血管繞道(bypass)重建」。頸動脈狹窄:內頸動脈粥狀硬化、暫時性單眼黑矇(amaurosis fugax)、可有頸動脈雜音;有症狀重度狹窄行內膜剝除術。頸動脈-海綿竇瘻管(CCF):外傷後「搏動性突眼、結膜充血、雜音」,多高流速、以血管介入栓塞治療。","options":{"A":"★正確(本題答案):成人以血管繞道手術。","B":"錯:亞洲人較多。","C":"錯:多雙側。","D":"錯:以內頸動脈遠端/前循環為主。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AHA/ASA SAH Guideline"]}},"114020-10":{"quick":"較可能由外傷造成者 C:頸動脈-海綿竇瘻管(carotid-cavernous fistula)。","detail":{"background":"其他腦血管病:高血壓性腦內出血最好發「豆狀核/基底核(putamen)」,其次視丘、橋腦、小腦;與高血壓相關,大量或惡化、壓迫腦幹須手術。毛毛樣血管病(moyamoya):雙側「內頸動脈遠端/大腦中前動脈近端」進行性狹窄+側枝煙霧狀血管,亞洲/小孩多、小孩以缺血表現、成人可出血;治療「血管繞道(bypass)重建」。頸動脈狹窄:內頸動脈粥狀硬化、暫時性單眼黑矇(amaurosis fugax)、可有頸動脈雜音;有症狀重度狹窄行內膜剝除術。頸動脈-海綿竇瘻管(CCF):外傷後「搏動性突眼、結膜充血、雜音」,多高流速、以血管介入栓塞治療。","options":{"A":"moyamoya 非外傷性。","B":"海綿狀血管畸形多先天。","C":"★正確(本題答案):CCF 常外傷性。","D":"微血管擴張非外傷。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AHA/ASA SAH Guideline"]}},"114070-14":{"quick":"錯在 C:moyamoya 最常見「內頸動脈遠端/大腦中前動脈(前循環)」狹窄,非中大腦+後大腦動脈。","detail":{"background":"其他腦血管病:高血壓性腦內出血最好發「豆狀核/基底核(putamen)」,其次視丘、橋腦、小腦;與高血壓相關,大量或惡化、壓迫腦幹須手術。毛毛樣血管病(moyamoya):雙側「內頸動脈遠端/大腦中前動脈近端」進行性狹窄+側枝煙霧狀血管,亞洲/小孩多、小孩以缺血表現、成人可出血;治療「血管繞道(bypass)重建」。頸動脈狹窄:內頸動脈粥狀硬化、暫時性單眼黑矇(amaurosis fugax)、可有頸動脈雜音;有症狀重度狹窄行內膜剝除術。頸動脈-海綿竇瘻管(CCF):外傷後「搏動性突眼、結膜充血、雜音」,多高流速、以血管介入栓塞治療。","options":{"A":"正確:亞洲人較多。","B":"正確:多雙側。","C":"★錯誤(本題答案):主要前循環(ICA 遠端/MCA/ACA)。","D":"正確:小孩多以缺血表現。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AHA/ASA SAH Guideline"]}},"101030-43":{"quick":"正確為 A:pilocytic astrocytoma 屬 grade 1、病患較年輕。","detail":{"background":"神經膠質瘤(glioma):星狀細胞瘤為最常見原發腦瘤。WHO 分級(細胞密度/異型性/有絲分裂/壞死/微血管增生;鈣化非分級依據):①pilocytic astrocytoma(grade 1,年輕、小腦/視路/下視丘、「手術切除」常可治癒);②low-grade(切除程度影響預後);③多形性膠質母細胞瘤(GBM,grade 4,最常見且惡性度最高,治療盡量切除+放療+temozolomide);寡樹突膠質瘤(oligodendroglioma)—「煎蛋(fried-egg)」外觀、1p/19q 缺失、儘量切除+化療。腦幹瀰漫性橋腦膠質瘤(DIPG)多惡性、「以放療為主(不可手術)」、預後差;中腦/頂蓋膠質瘤預後較佳、頂蓋瘤常以水腦表現。","options":{"A":"★正確(本題答案):pilocytic grade 1、年輕。","B":"好發小腦/視路,下視丘描述須斟酌。","C":"錯:low-grade 切除程度影響預後。","D":"化療對 low-grade 效果有限。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","WHO CNS Tumor Classification","DeVita Cancer"]}},"102030-11":{"quick":"腦膜瘤復發最重要因素 D:術後腫瘤殘留。","detail":{"background":"腦膜瘤(meningioma):源自「蜘蛛膜帽細胞(arachnoid cap cells)」(非硬腦膜),MRI 為硬腦膜基底(dural-based)腫瘤、生長慢、可致鄰骨增生(hyperostosis)、侵犯靜脈竇、少數惡性轉化。好發「矢狀竇旁-大腦鐮、顱凸處、蝶骨翼」;顱凸處腦膜瘤由「外頸動脈(中腦膜動脈)」供血(非內頸動脈)。復發最重要因素=「術後腫瘤殘留」;切除程度用 Simpson 分級;約 8% 多發。","options":{"A":"年齡非最重要。","B":"骨侵犯非最重要。","C":"良性組織型非最重要。","D":"★正確(本題答案):術後腫瘤殘留。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","WHO CNS Tumor Classification","DeVita Cancer"]}},"102030-16":{"quick":"21 歲松果體區腫瘤、對放療敏感消失→D:生殖細胞瘤(germinoma)。","detail":{"background":"其他腦瘤:轉移性腦瘤原發處「肺>乳房>腎>腸胃道/黑色素瘤」,肺癌為最常見來源。聽神經瘤(前庭神經鞘瘤)源自「前庭神經(CN VIII)」、橋小腦角、雙側者與 NF2 相關、手術最常傷顏面神經(VII)。脈絡叢乳頭瘤:小孩多在「側腦室」、成人多在「第四腦室」、可惡性、致水腦(過度分泌 CSF/出血致吸收下降)。表皮樣囊腫破裂→「無菌性(化學性)腦膜炎」。NF1(von Recklinghausen)=咖啡牛奶斑、神經纖維瘤、脊椎異常;「雙側聽神經瘤為 NF2」。腦下垂體泌乳素瘤:prolactin 常>150–200 ng/mL、閉經泌乳不孕、「首選多巴胺促效劑(藥物)」;垂體中風(apoplexy)突發頭痛+視力/視野缺損(雙顳側半盲)。松果體區生殖細胞瘤(germinoma)—年輕男性、對放療敏感。兒童腦瘤:髓母細胞瘤(medulloblastoma,可沿 CSF 播散)好發年齡最小。","options":{"A":"GBM 不會放療後消失。","B":"畸胎瘤對放療不敏感。","C":"室管膜瘤非此典型。","D":"★正確(本題答案):germinoma。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","WHO CNS Tumor Classification","DeVita Cancer"]}},"102110-12":{"quick":"腦幹膠質瘤初期表現 A:顱神經病變。","detail":{"background":"神經膠質瘤(glioma):星狀細胞瘤為最常見原發腦瘤。WHO 分級(細胞密度/異型性/有絲分裂/壞死/微血管增生;鈣化非分級依據):①pilocytic astrocytoma(grade 1,年輕、小腦/視路/下視丘、「手術切除」常可治癒);②low-grade(切除程度影響預後);③多形性膠質母細胞瘤(GBM,grade 4,最常見且惡性度最高,治療盡量切除+放療+temozolomide);寡樹突膠質瘤(oligodendroglioma)—「煎蛋(fried-egg)」外觀、1p/19q 缺失、儘量切除+化療。腦幹瀰漫性橋腦膠質瘤(DIPG)多惡性、「以放療為主(不可手術)」、預後差;中腦/頂蓋膠質瘤預後較佳、頂蓋瘤常以水腦表現。","options":{"A":"★正確(本題答案):顱神經病變。","B":"頭痛較晚。","C":"水腦較晚。","D":"視乳頭水腫較晚。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg ources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","WHO CNS Tumor Classification","DeVita Cancer"]}},"104030-15":{"quick":"腦膜瘤源自 C:蜘蛛網膜(帽細胞)。","detail":{"background":"腦膜瘤(meningioma):源自「蜘蛛膜帽細胞(arachnoid cap cells)」(非硬腦膜),MRI 為硬腦膜基底(dural-based)腫瘤、生長慢、可致鄰骨增生(hyperostosis)、侵犯靜脈竇、少數惡性轉化。好發「矢狀竇旁-大腦鐮、顱凸處、蝶骨翼」;顱凸處腦膜瘤由「外頸動脈(中腦膜動脈)」供血(非內頸動脈)。復發最重要因素=「術後腫瘤殘留」;切除程度用 Simpson 分級;約 8% 多發。","options":{"A":"非硬腦膜。","B":"非軟腦膜。","C":"★正確(本題答案):蜘蛛網膜帽細胞。","D":"非腦血管。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","WHO CNS Tumor Classification","DeVita Cancer"]}},"105020-14":{"quick":"錯在 A:腦膜瘤源自「蜘蛛網膜帽細胞」,非硬腦膜。","detail":{"background":"腦膜瘤(meningioma):源自「蜘蛛膜帽細胞(arachnoid cap cells)」(非硬腦膜),MRI 為硬腦膜基底(dural-based)腫瘤、生長慢、可致鄰骨增生(hyperostosis)、侵犯靜脈竇、少數惡性轉化。好發「矢狀竇旁-大腦鐮、顱凸處、蝶骨翼」;顱凸處腦膜瘤由「外頸動脈(中腦膜動脈)」供血(非內頸動脈)。復發最重要因素=「術後腫瘤殘留」;切除程度用 Simpson 分級;約 8% 多發。","options":{"A":"★錯誤(本題答案):源自蜘蛛網膜帽細胞。","B":"正確:生長緩慢。","C":"正確:鄰骨增生。","D":"正確:矢狀竇旁最常見。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","WHO CNS Tumor Classification","DeVita Cancer"]}},"105020-16":{"quick":"表皮樣囊腫特質 D:無菌性腦膜炎(內容物刺激)。","detail":{"background":"其他腦瘤:轉移性腦瘤原發處「肺>乳房>腎>腸胃道/黑色素瘤」,肺癌為最常見來源。聽神經瘤(前庭神經鞘瘤)源自「前庭神經(CN VIII)」、橋小腦角、雙側者與 NF2 相關、手術最常傷顏面神經(VII)。脈絡叢乳頭瘤:小孩多在「側腦室」、成人多在「第四腦室」、可惡性、致水腦(過度分泌 CSF/出血致吸收下降)。表皮樣囊腫破裂→「無菌性(化學性)腦膜炎」。NF1(von Recklinghausen)=咖啡牛奶斑、神經纖維瘤、脊椎異常;「雙側聽神經瘤為 NF2」。腦下垂體泌乳素瘤:prolactin 常>150–200 ng/mL、閉經泌乳不孕、「首選多巴胺促效劑(藥物)」;垂體中風(apoplexy)突發頭痛+視力/視野缺損(雙顳側半盲)。松果體區生殖細胞瘤(germinoma)—年輕男性、對放療敏感。兒童腦瘤:髓母細胞瘤(medulloblastoma,可沿 CSF 播散)好發年齡最小。","options":{"A":"非細菌性腦膜炎。","B":"非合併先天異常為特質。","C":"對放療不敏感。","D":"★正確(本題答案):無菌性腦膜炎。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","WHO CNS Tumor Classification","DeVita Cancer"]}},"105100-14":{"quick":"不由內頸動脈供血者 D:顱凸處腦膜瘤(由外頸動脈/中腦膜動脈供血)。","detail":{"background":"腦膜瘤(meningioma):源自「蜘蛛膜帽細胞(arachnoid cap cells)」(非硬腦膜),MRI 為硬腦膜基底(dural-based)腫瘤、生長慢、可致鄰骨增生(hyperostosis)、侵犯靜脈竇、少數惡性轉化。好發「矢狀竇旁-大腦鐮、顱凸處、蝶骨翼」;顱凸處腦膜瘤由「外頸動脈(中腦膜動脈)」供血(非內頸動脈)。復發最重要因素=「術後腫瘤殘留」;切除程度用 Simpson 分級;約 8% 多發。","options":{"A":"嗅溝腦膜瘤由內頸動脈分支供血。","B":"蝶骨翼由內頸動脈供血。","C":"側腦室由脈絡叢動脈(內頸系)。","D":"★正確(本題答案):顱凸處由外頸動脈。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","WHO CNS Tumor Classification","DeVita Cancer"]}},"106020-9":{"quick":"轉移性腦瘤原發處排序 B:肺>乳房>腎>腸胃道。","detail":{"background":"其他腦瘤:轉移性腦瘤原發處「肺>乳房>腎>腸胃道/黑色素瘤」,肺癌為最常見來源。聽神經瘤(前庭神經鞘瘤)源自「前庭神經(CN VIII)」、橋小腦角、雙側者與 NF2 相關、手術最常傷顏面神經(VII)。脈絡叢乳頭瘤:小孩多在「側腦室」、成人多在「第四腦室」、可惡性、致水腦(過度分泌 CSF/出血致吸收下降)。表皮樣囊腫破裂→「無菌性(化學性)腦膜炎」。NF1(von Recklinghausen)=咖啡牛奶斑、神經纖維瘤、脊椎異常;「雙側聽神經瘤為 NF2」。腦下垂體泌乳素瘤:prolactin 常>150–200 ng/mL、閉經泌乳不孕、「首選多巴胺促效劑(藥物)」;垂體中風(apoplexy)突發頭痛+視力/視野缺損(雙顳側半盲)。松果體區生殖細胞瘤(germinoma)—年輕男性、對放療敏感。兒童腦瘤:髓母細胞瘤(medulloblastoma,可沿 CSF 播散)好發年齡最小。","options":{"A":"順序錯(肺最多)。","B":"★正確(本題答案):肺>乳房>腎>腸胃道。","C":"順序錯。","D":"順序錯。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","WHO CNS Tumor Classification","DeVita Cancer"]}},"106020-14":{"quick":"腦膜瘤三大好發位置 B:矢狀竇旁-大腦鐮、顱凸處、蝶骨翼。","detail":{"background":"腦膜瘤(meningioma):源自「蜘蛛膜帽細胞(arachnoid cap cells)」(非硬腦膜),MRI 為硬腦膜基底(dural-based)腫瘤、生長慢、可致鄰骨增生(hyperostosis)、侵犯靜脈竇、少數惡性轉化。好發「矢狀竇旁-大腦鐮、顱凸處、蝶骨翼」;顱凸處腦膜瘤由「外頸動脈(中腦膜動脈)」供血(非內頸動脈)。復發最重要因素=「術後腫瘤殘留」;切除程度用 Simpson 分級;約 8% 多發。","options":{"A":"含岩骨非前三。","B":"★正確(本題答案):矢狀竇旁/顱凸/蝶骨翼。","C":"含蝶骨平面非前三。","D":"缺矢狀竇旁。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","WHO CNS Tumor Classification","DeVita Cancer"]}},"106080-6":{"quick":"錯在 B:室管膜瘤「非好發老年人」(兒童/年輕為主)(本題多重答案 B/C 均給分)。","detail":{"background":"神經膠質瘤(glioma):星狀細胞瘤為最常見原發腦瘤。WHO 分級(細胞密度/異型性/有絲分裂/壞死/微血管增生;鈣化非分級依據):①pilocytic astrocytoma(grade 1,年輕、小腦/視路/下視丘、「手術切除」常可治癒);②low-grade(切除程度影響預後);③多形性膠質母細胞瘤(GBM,grade 4,最常見且惡性度最高,治療盡量切除+放療+temozolomide);寡樹突膠質瘤(oligodendroglioma)—「煎蛋(fried-egg)」外觀、1p/19q 缺失、儘量切除+化療。腦幹瀰漫性橋腦膠質瘤(DIPG)多惡性、「以放療為主(不可手術)」、預後差;中腦/頂蓋膠質瘤預後較佳、頂蓋瘤常以水腦表現。","options":{"A":"正確:GBM 惡性度最高。","B":"★錯誤(本題答案):室管膜瘤非老年好發。","C":"(給分)髓母細胞瘤孩童常見。","D":"正確:髓母細胞瘤可沿 CSF 播散。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","WHO CNS Tumor Classification","DeVita Cancer"]}},"107080-10":{"quick":"額葉、煎蛋(fried-egg)細胞、無顯影→D:寡樹突神經膠細胞瘤(oligodendroglioma)。","detail":{"background":"神經膠質瘤(glioma):星狀細胞瘤為最常見原發腦瘤。WHO 分級(細胞密度/異型性/有絲分裂/壞死/微血管增生;鈣化非分級依據):①pilocytic astrocytoma(grade 1,年輕、小腦/視路/下視丘、「手術切除」常可治癒);②low-grade(切除程度影響預後);③多形性膠質母細胞瘤(GBM,grade 4,最常見且惡性度最高,治療盡量切除+放療+temozolomide);寡樹突膠質瘤(oligodendroglioma)—「煎蛋(fried-egg)」外觀、1p/19q 缺失、儘量切除+化療。腦幹瀰漫性橋腦膠質瘤(DIPG)多惡性、「以放療為主(不可手術)」、預後差;中腦/頂蓋膠質瘤預後較佳、頂蓋瘤常以水腦表現。","options":{"A":"腦膜瘤為硬腦膜基底。","B":"髓母細胞瘤為兒童後窩。","C":"畸胎瘤非此。","D":"★正確(本題答案):寡樹突膠質瘤。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","WHO CNS Tumor Classification","DeVita Cancer"]}},"108030-9":{"quick":"NF1 較少出現者 B:雙側聽神經瘤(為 NF2 特徵)。","detail":{"background":"其他腦瘤:轉移性腦瘤原發處「肺>乳房>腎>腸胃道/黑色素瘤」,肺癌為最常見來源。聽神經瘤(前庭神經鞘瘤)源自「前庭神經(CN VIII)」、橋小腦角、雙側者與 NF2 相關、手術最常傷顏面神經(VII)。脈絡叢乳頭瘤:小孩多在「側腦室」、成人多在「第四腦室」、可惡性、致水腦(過度分泌 CSF/出血致吸收下降)。表皮樣囊腫破裂→「無菌性(化學性)腦膜炎」。NF1(von Recklinghausen)=咖啡牛奶斑、神經纖維瘤、脊椎異常;「雙側聽神經瘤為 NF2」。腦下垂體泌乳素瘤:prolactin 常>150–200 ng/mL、閉經泌乳不孕、「首選多巴胺促效劑(藥物)」;垂體中風(apoplexy)突發頭痛+視力/視野缺損(雙顳側半盲)。松果體區生殖細胞瘤(germinoma)—年輕男性、對放療敏感。兒童腦瘤:髓母細胞瘤(medulloblastoma,可沿 CSF 播散)好發年齡最小。","options":{"A":"NF1 為顯性遺傳。","B":"★較少(本題答案):雙側聽神經瘤屬 NF2。","C":"NF1 有咖啡牛奶斑。","D":"NF1 可有脊椎發育異常。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","WHO CNS Tumor Classification","DeVita Cancer"]}},"108030-11":{"quick":"泌乳素瘤正確為 B:血中泌乳素濃度通常>150 ng/mL。","detail":{"background":"其他腦瘤:轉移性腦瘤原發處「肺>乳房>腎>腸胃道/黑色素瘤」,肺癌為最常見來源。聽神經瘤(前庭神經鞘瘤)源自「前庭神經(CN VIII)」、橋小腦角、雙側者與 NF2 相關、手術最常傷顏面神經(VII)。脈絡叢乳頭瘤:小孩多在「側腦室」、成人多在「第四腦室」、可惡性、致水腦(過度分泌 CSF/出血致吸收下降)。表皮樣囊腫破裂→「無菌性(化學性)腦膜炎」。NF1(von Recklinghausen)=咖啡牛奶斑、神經纖維瘤、脊椎異常;「雙側聽神經瘤為 NF2」。腦下垂體泌乳素瘤:prolactin 常>150–200 ng/mL、閉經泌乳不孕、「首選多巴胺促效劑(藥物)」;垂體中風(apoplexy)突發頭痛+視力/視野缺損(雙顳側半盲)。松果體區生殖細胞瘤(g ;間歇性跛行「前彎/坐下緩解」;進行性神經缺損→減壓手術。後縱韌帶骨化(OPLL):亞洲男性、C4-6、可合併 DISH;無 MRI 時以「CT 脊髓攝影」評估(非骨掃描)。脊椎滑脫:pars 斷裂(L5 pars→L5-S1 滑脫壓 L5 根);進展危險—年輕、女性、反覆、後腿肌緊。化膿性脊椎感染:腰椎最多、金黃葡萄球菌、成人血行先感染「椎體/終板」(椎間盤成人無血管),兒童才先椎間盤。","options":{"A":"C3-4 少見。","B":"C4-5 壓 C5 根較少。","C":"C5-6 壓 C6 根次之。","D":"★正確(本題答案):C6-7 壓 C7 根最常見。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Rothman-Simeone The Spine"]}},"101030-45":{"quick":"錯在 D:X 光「並非全無診斷價值」(可看對位/不穩定),MRI 為最佳但 X 光仍有用。","detail":{"background":"腰椎椎間盤突出(HIVD):90% 在「L4-5、L5-S1」、位置多「後外側」;椎旁/旁中央突出壓「行經(traversing)」神經根(L4-5 中央型壓 L5 根),「極外側/椎孔外」突出壓「出口(exiting)」神經根(L4-5 外側型壓 L4 根)。根性定位:L4 根→膝伸/股四頭肌、膝反射、小腿內側;L5 根→大拇趾背屈/脛前肌(垂足)、足背/大拇趾感覺、無反射改變;S1 根→踝蹠屈/腓腸肌、踝反射、足外側。診斷以「MRI」最佳(X 光仍有對位/不穩定價值);多數保守 2 週可緩解,馬尾症候群(括約肌異常/鞍區麻木/雙下肢無力)為急診手術指徵。麻木取代疼痛可能代表「惡化(根功能喪失)」。","options":{"A":"正確:可保守 2 週,注意括約肌/無力。","B":"正確:坐骨神經痛、Lasègue 陽性。","C":"正確:90% 在 L4-5/L5-S1。","D":"★錯誤(本題答案):X 光仍有診斷價值。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Rothman-Simeone The Spine"]}},"102030-61":{"quick":"大拇趾背屈無力+足背麻+小腿外側痛→C:L4-5 椎間盤(壓 L5 根)。","detail":{"background":"腰椎椎間盤突出(HIVD):90% 在「L4-5、L5-S1」、位置多「後外側」;椎旁/旁中央突出壓「行經(traversing)」神經根(L4-5 中央型壓 L5 根),「極外側/椎孔外」突出壓「出口(exiting)」神經根(L4-5 外側型壓 L4 根)。根性定位:L4 根→膝伸/股四頭肌、膝反射、小腿內側;L5 根→大拇趾背屈/脛前肌(垂足)、足背/大拇趾感覺、無反射改變;S1 根→踝蹠屈/腓腸肌、踝反射、足外側。診斷以「MRI」最佳(X 光仍有對位/不穩定價值);多數保守 2 週可緩解,馬尾症候群(括約肌異常/鞍區麻木/雙下肢無力)為急診手術指徵。麻木取代疼痛可能代表「惡化(根功能喪失)」。","options":{"A":"L2-3 不符。","B":"L3-4 壓 L4 根。","C":"★正確(本題答案):L4-5 壓 L5 根。","D":"L5-S1 壓 S1 根(踝反射/足外側)。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Rothman-Simeone The Spine"]}},"103030-63":{"quick":"L4-5「椎孔外(extraforaminal)」突出壓 C:左側 L4 出口神經根。","detail":{"background":"腰椎椎間盤突出(HIVD):90% 在「L4-5、L5-S1」、位置多「後外側」;椎旁/旁中央突出壓「行經(traversing)」神經根(L4-5 中央型壓 L5 根),「極外側/椎孔外」突出壓「出口(exiting)」神經根(L4-5 外側型壓 L4 根)。根性定位:L4 根→膝伸/股四頭肌、膝反射、小腿內側;L5 根→大拇趾背屈/脛前肌(垂足)、足背/大拇趾感覺、無反射改變;S1 根→踝蹠屈/腓腸肌、踝反射、足外側。診斷以「MRI」最佳(X 光仍有對位/不穩定價值); ":"頸椎退化:神經根病變最常「C7 根(C6-7 椎間盤,三頭肌反射減弱、中指)」、次 C6 根(C5-6);脊髓病變(cervical spondylotic myelopathy)有上運動神經元徵象(反射亢進、步態不穩),為手術指徵;前頸椎手術可傷喉返神經。Spurling(頸後仰轉向患側加重)、外展減輕(shoulder abduction relief)為神經根病變徵。脊椎狹窄:退化性(後天)最常見、L4-5 最多、中央/側隱窩/椎孔型;間歇性跛行「前彎/坐下緩解」;進行性神經缺損→減壓手術。後縱韌帶骨化(OPLL):亞洲男性、C4-6、可合併 DISH;無 MRI 時以「CT 脊髓攝影」評估(非骨掃描)。脊椎滑脫:pars 斷裂(L5 pars→L5-S1 滑脫壓 L5 根);進展危險—年輕、女性、反覆、後腿肌緊。化膿性脊椎感染:腰椎最多、金黃葡萄球菌、成人血行先感染「椎體/終板」(椎間盤成人無血管),兒童才先椎間盤。","options":{"A":"正確:亞洲男性好發。","B":"正確:常 C4-6。","C":"正確:常合併 DISH。","D":"★最不適當(本題答案):非一律手術才有進步。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Rothman-Simeone The Spine"]}},"115020-30":{"quick":"最不適當 C:無法做 MRI 時應以「CT 脊髓攝影」評估,非骨頭掃描。","detail":{"background":"頸椎退化:神經根病變最常「C7 根(C6-7 椎間盤,三頭肌反射減弱、中指)」、次 C6 根(C5-6);脊髓病變(cervical spondylotic myelopathy)有上運動神經元徵象(反射亢進、步態不穩),為手術指徵;前頸椎手術可傷喉返神經。Spurling(頸後仰轉向患側加重)、外展減輕(shoulder abduction relief)為神經根病變徵。脊椎狹窄:退化性(後天)最常見、L4-5 最多、中央/側隱窩/椎孔型;間歇性跛行「前彎/坐下緩解」;進行性神經缺損→減壓手術。後縱韌帶骨化(OPLL):亞洲男性、C4-6、可合併 DISH;無 MRI 時以「CT 脊髓攝影」評估(非骨掃描)。脊椎滑脫:pars 斷裂(L5 pars→L5-S1 滑脫壓 L5 根);進展危險—年輕、女性、反覆、後腿肌緊。化膿性脊椎感染:腰椎最多、金黃葡萄球菌、成人血行先感染「椎體/終板」(椎間盤成人無血管),兒童才先椎間盤。","options":{"A":"正確:急性頸椎間盤突出臨床可診斷。","B":"正確:無顯影 MRI 為主要影像。","C":"★最不適當(本題答案):應用 CT 脊髓攝影,非骨掃描。","D":"正確:肌電/神經傳導區分臂叢與周邊神經病變。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Rothman-Simeone The Spine"]}},"101030-59":{"quick":"胸腰椎骨折手術最適時機 B:身體狀況穩定可手術時儘快手術。","detail":{"background":"脊椎骨折:Denis 三柱(前/中/後);中柱受損→不穩定。爆裂性骨折(burst)—軸向壓縮、椎體後壁退入椎管、AP 像「椎莖間距變寬」;壓迫性骨折(前柱);彎曲牽開(Chance,安全帶,中後柱張力);骨折脫位(三柱)。樞突(odontoid)骨折:Type I 尖端(翼狀韌帶)、「Type II 基底部最常見但不穩定/不癒合率高」、Type III 延伸至 C2 椎體較穩定。吊頸骨折(Hangman’s)=C2 椎弓根。單側小關節卡鎖=「彎曲+旋轉」。頸椎脫位牽引復位後須追蹤 X 光與神經學。","options":{"A":"非一律立即緊急。","B":"★正確(本題答案):穩定後儘快手術。","C":"一週後過晚。","D":"兩週後過晚。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"102030-14":{"quick":"右手無力有痛覺+左手失冷熱痛→B:Brown-Séquard(同側運動、對側痛溫)。","detail":{"background":"脊髓損傷症候群:①前脊髓症候群—運動+痛溫喪失、本體覺保留;②中央脊髓症候群(老人過度伸展、上肢>下肢無力);③Brown-Séquard(半切)—「同側運動+本體覺喪失、對側痛溫喪失」;④後脊髓症候群—本體覺喪失;完全損傷預後差,「薦髓保留(sacral sparing)」代表不完全損傷、預後較佳。呼吸衰竭見於高位頸髓「C3–5(膈神經)」。神經性休克(低血壓+心搏徐緩)見於 T6 以上;自主神經反射異常見於 T6 以上慢性損傷。脊髓損傷高劑量類固醇(methylprednisolone,受傷 8 小時內 30 mg/kg bolus→5.4 mg/kg/hr×23 hr)爭議大、副作用多。","options":{"A":"前脊髓為雙側運動+痛溫。","B":"★正確(本題答案):Brown-Séquard。","C":"中央脊髓上肢>下肢。","D":"完全損傷無功能保留。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"102030-15":{"quick":"錯在 B:第二型樞突骨折最常見「但不穩定(不癒合率高)」,非較穩定。","detail":{"background":"脊椎骨折:Denis 三柱(前/中/後);中柱受損→不穩定。爆裂性骨折(burst)—軸向壓縮、椎體後壁退入椎管、AP 像「椎莖間距變寬」;壓迫性骨折(前柱);彎曲牽開(Chance,安全帶,中後柱張力);骨折脫位(三柱)。樞突(odontoid)骨折:Type I 尖端(翼狀韌帶)、「Type II 基底部最常見但不穩定/不癒合率高」、Type III 延伸至 C2 椎體較穩定。吊頸骨折(Hangman’s)=C2 椎弓根。單側小關節卡鎖=「彎曲+旋轉」。頸椎脫位牽引復位後須追蹤 X 光與神經學。","options":{"A":"正確:Type I 在翼狀韌帶接著處。","B":"★錯誤(本題答案):Type II 不穩定。","C":"正確:Type II 在基底不侵犯椎體。","D":"正確:Type III 延伸至 C2 椎體。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"102110-13":{"quick":"老人前額著地過度伸展、雙手無力>下肢→C:中央脊髓症候群。","detail":{"background":"脊髓損傷症候群:①前脊髓症候群—運動+痛溫喪失、本體覺保留;②中央脊髓症候群(老人過度伸展、上肢>下肢無力);③Brown-Séquard(半切)—「同側運動+本體覺喪失、對側痛溫喪失」;④後脊髓症候群—本體覺喪失;完全損傷預後差,「薦髓保留(sacral sparing)」代表不完全損傷、預後較佳。呼吸衰竭見於高位頸髓「C3–5(膈神經)」。神經性休克(低血壓+心搏徐緩)見於 T6 以上;自主神經反射異常見於 T6 以上慢性損傷。脊髓損傷高劑量類固醇(methylprednisolone,受傷 8 小時內 30 mg/kg bolus→5.4 mg/kg/hr×23 hr)爭議大、副作用多。","options":{"A":"前脊髓為運動+痛溫。","B":"Brown-Séquard 為半側。","C":"★正確(本題答案):中央脊髓症候群。","D":"馬尾為下肢/括約肌。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"102110-15":{"quick":"單側小關節卡鎖主要機轉 D:彎曲加旋轉(flexion and rotation)。","detail":{"background":"脊椎骨折:Denis 三柱(前/中/後);中柱受損→不穩定。爆裂性骨折(burst)—軸向壓縮、椎體後壁退入椎管、AP 像「椎莖間距變寬」;壓迫性骨折(前柱);彎曲牽開(Chance,安全帶,中後柱張力);骨折脫位(三柱)。樞突(odontoid)骨折:Type I 尖端(翼狀韌帶)、「Type II 基底部最常見但不穩定/不癒合率高」、Type III 延伸至 C2 椎體較穩定。吊頸骨折(Hangman’s)=C2 椎弓根。單側小關節卡鎖=「彎曲+旋轉」。頸椎脫位牽引復位後須追蹤 X 光與神經學。","options":{"A":"壓迫致爆裂骨折。","B":"伸展致後柱傷。","C":"伸展加旋轉非典型。","D":"★正確(本題答案):彎曲加旋轉。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"103030-59":{"quick":"預後最佳徵象 D:薦髓機能保留(sacral sparing,代表不完全損傷)。","detail":{"background":"脊髓損傷症候群:①前脊髓症候群—運動+痛溫喪失、本體覺保留;②中央脊髓症候群(老人過度伸展、上肢>下肢無力);③Brown-Séquard(半切)—「同側運動+本體覺喪失、對側痛溫喪失」;④後脊髓症候群—本體覺喪失;完全損傷預後差,「薦髓保留(sacral sparing)」代表不完全損傷、預後較佳。呼吸衰竭見於高位頸髓「C3–5(膈神經)」。神經性休克(低血壓+心搏徐緩)見於 T6 以上;自主神經反射異常見於 T6 以上慢性損傷。脊髓損傷高劑量類固醇(methylprednisolone,受傷 8 小時內 30 mg/kg bolus→5.4 mg/kg/hr×23 hr)爭議大、副作用多。","options":{"A":"踝陣攣為上運動神經元徵象。","B":"巴氏反射為上運動神經元。","C":"反射增強非佳預後指標。","D":"★正確(本題答案):薦髓保留。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"103030-73":{"quick":"L4/L5 椎體中央 T1、T2 皆高訊號橫帶→D:中央部分脂肪取代(Modic II)。","detail":{"background":"脊髓腫瘤分區:①硬膜外(extradural,最常見、多為「轉移癌/惡性」);②硬膜內髓外(intradural-extramedullary,腦膜瘤、神經鞘瘤);③脊髓內(intramedullary,「星狀細胞瘤、室管膜瘤」最常見)。脊椎硬膜上轉移最早症狀=「局部背痛」,後續根性痛/無力/括約肌。脊髓空洞症(syringomyelia)=中央管擴大、似中央脊髓症候群、「痛溫喪失而本體/觸覺保留(分離性感覺喪失)」、上肢>下肢、MRI 診斷。馬尾症候群=下運動神經元(反射『減弱』)、鞍區麻木、括約肌失調。椎體 T1/T2 皆高訊號之中央橫帶=脂肪取代(Modic II)。","options":{"A":"感染終板破壞、訊號不同。","B":"橫向骨折非此訊號。","C":"轉移多 T1 低訊號。","D":"★正確(本題答案):脂肪取代。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"103100-62":{"quick":"T10 椎體高度減少+椎莖模糊、終板椎間盤完整→C:惡性腫瘤轉移。","detail":{"background":"脊髓腫瘤分區:①硬膜外(extradural,最常見、多為「轉移癌/惡性」);②硬膜內髓外(intradural-extramedullary,腦膜瘤、神經鞘瘤);③脊髓內(intramedullary,「星狀細胞瘤、室管膜瘤」最常見)。脊椎硬膜上轉移最早症狀=「局部背痛」,後續根性痛/無力/括約肌。脊髓空洞症(syringomyelia)=中央管擴大、似中央脊髓症候群、「痛溫喪失而本體/觸覺保留(分離性感覺喪失)」、上肢>下肢、MRI 診斷。馬尾症候群=下運動神經元(反射『減弱』)、鞍區麻木、括約肌失調。椎體 T1/T2 皆高訊號之中央橫帶=脂肪取代(Modic II)。","options":{"A":"感染破壞終板/椎間盤。","B":"退化無椎莖破壞。","C":"★正確(本題答案):惡性轉移(侵蝕椎莖)。","D":"骨鬆壓迫骨折椎莖完整、無溶蝕。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"104030-14":{"quick":"脊髓內腫瘤最常見 D:星狀細胞瘤(astrocytoma)。","detail":{"background":"脊髓腫瘤分區:①硬膜外(extradural,最常見、多為「轉移癌/惡性」);②硬膜內髓外(intradural-extramedullary,腦膜瘤、神經鞘瘤);③脊髓內(intramedullary,「星狀細胞瘤、室管膜瘤」最常見)。脊椎硬膜上轉移最早症狀=「局部背痛」,後續根性痛/無力/括約肌。脊髓空洞症(syringomyelia)=中央管擴大、似中央脊髓症候群、「痛溫喪失而本體/觸覺保留(分離性感覺喪失)」、上肢>下肢、MRI 診斷。馬尾症候群=下運動神經元(反射『減弱』)、鞍區麻木、括約肌失調。椎體 T1/T2 皆高訊號之中央橫帶=脂肪取代(Modic II)。","options":{"A":"腦膜瘤為髓外。","B":"轉移多在硬膜外。","C":"黑色素瘤少。","D":"★正確(本題答案):星狀細胞瘤。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"104090-9":{"quick":"錯在 D:調整牽引重量後「仍須追蹤頸椎 X 光」(確認復位/避免過牽)。","detail":{"background":"脊椎骨折:Denis 三柱(前/中/後);中柱受損→不穩定。爆裂性骨折(burst)—軸向壓縮、椎體後壁退入椎管、AP 像「椎莖間距變寬」;壓迫性骨折(前柱);彎曲牽開(Chance,安全帶,中後柱張力);骨折脫位(三柱)。樞突(odontoid)骨折:Type I 尖端(翼狀韌帶)、「Type II 基底部最常見但不穩定/不癒合率高」、Type III 延伸至 C2 椎體較穩定。吊頸骨折(Hangman’s)=C2 椎弓根。單側小關節卡鎖=「彎曲+旋轉」。頸椎脫位牽引復位後須追蹤 X 光與神經學。","options":{"A":"正確:依不同節牽引重量不同。","B":"正確:須觀察神經學。","C":"正確:須追蹤 X 光。","D":"★錯誤(本題答案):調整後仍須追蹤 X 光。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"105020-12":{"quick":"易呼吸衰竭者 A:第三至第五頸椎(C3–5 膈神經支配橫膈)。","detail":{"background":"脊髓損傷症候群:①前脊髓症候群—運動+痛溫喪失、本體覺保留;②中央脊髓症候群(老人過度伸展、上肢>下肢無力);③Brown-Séquard(半切)—「同側運動+本體覺喪失、對側痛溫喪失」;④後脊髓症候群—本體覺喪失;完全損傷預後差,「薦髓保留(sacral sparing)」代表不完全損傷、預後較佳。呼吸衰竭見於高位頸髓「C3–5(膈神經)」。神經性休克(低血壓+心搏徐緩)見於 T6 以上;自主神經反射異常見於 T6 以上慢性損傷。脊髓損傷高劑量類固醇(methylprednisolone,受傷 8 小時內 30 mg/kg bolus→5.4 mg/kg/hr×23 hr)爭議大、副作用多。","options":{"A":"★正確(本題答案):C3–5。","B":"C6–7 影響較小。","C":"胸髓影響肋間肌。","D":"腰髓不影響呼吸。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"105100-13":{"quick":"脊椎硬膜上轉移最早症狀 B:局部疼痛。","detail":{"background":"脊髓腫瘤分區:①硬膜外(extradural,最常見、多為「轉移癌/惡性」);②硬膜內髓外(intradural-extramedullary,腦膜瘤、神經鞘瘤);③脊髓內(intramedullary,「星狀細胞瘤、室管膜瘤」最常見)。脊椎硬膜上轉移最早症狀=「局部背痛」,後續根性痛/無力/括約肌。脊髓空洞症(syringomyelia)=中央管擴大、似中央脊髓症候群、「痛溫喪失而本體/觸覺保留(分離性感覺喪失)」、上肢>下肢、MRI 診斷。馬尾症候群=下運動神經元(反射『減弱』)、鞍區麻木、括約肌失調。椎體 T1/T2 皆高訊號之中央橫帶=脂肪取代(Modic II)。","options":{"A":"神經根病變較後。","B":"★正確(本題答案):局部背痛。","C":"尿滯留為晚期。","D":"下肢麻木為後續。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"105100-59":{"quick":"乳線(nipple line)以下感覺異常→A:第四胸椎(T4 皮節)。","detail":{"background":"脊髓損傷症候群:①前脊髓症候群—運動+痛溫喪失、本體覺保留;②中央脊髓症候群(老人過度伸展、上肢>下肢無力);③Brown-Séquard(半切)—「同側運動+本體覺喪失、對側痛溫喪失」;④後脊髓症候群—本體覺喪失;完全損傷預後差,「薦髓保留(sacral sparing)」代表不完全損傷、預後較佳。呼吸衰竭見於高位頸髓「C3–5(膈神經)」。神經性休克(低血壓+心搏徐緩)見於 T6 以上;自主神經反射異常見於 T6 以上慢性損傷。脊髓損傷高劑量類固醇(methylprednisolone,受傷 8 小時內 30 mg/kg bolus→5.4 mg/kg/hr×23 hr)爭議大、副作用多。","options":{"A":"★正確(本題答案):T4(乳線)。","B":"T8 為肋緣下。","C":"T10 為臍。","D":"T12 為腹股溝上。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"106020-12":{"quick":"本題送分:脊髓損傷高劑量類固醇(8 小時內、methylprednisolone 30 mg/kg→5.4 mg/kg/hr×23h、副作用大)各敘述一律給分。","detail":{"background":"脊髓損傷症候群:①前脊髓症候群—運動+痛溫喪失、本體覺保留;②中央脊髓症候群(老人過度伸展、上肢>下肢無力);③Brown-Séquard(半切)—「同側運動+本體覺喪失、對側痛溫喪失」;④後脊髓症候群—本體覺喪失;完全損傷預後差,「薦髓保留(sacral sparing)」代表不完全損傷、預後較佳。呼吸衰竭見於高位頸髓「C3–5(膈神經)」。神經性休克(低血壓+心搏徐緩)見於 T6 以上;自主神經反射異常見於 T6 以上慢性損傷。脊髓損傷高劑量類固醇(methylprednisolone,受傷 8 小時內 30 mg/kg bolus→5.4 mg/kg/hr×23 hr)爭議大、副作用多。","options":{"A":"(給分)8 小時內。","B":"(給分)劑量。","C":"(給分)methylprednisolone。","D":"(給分)副作用大。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"106020-56":{"quick":"右側肌力 5、失痛溫;左側肌力 0、痛溫正常→B:Brown-Séquard(病灶在左)。","detail":{"background":"脊髓損傷症候群:①前脊髓症候群—運動+痛溫喪失、本體覺保留;②中央脊髓症候群(老人過度伸展、上肢>下肢無力);③Brown-Séquard(半切)—「同側運動+本體覺喪失、對側痛溫喪失」;④後脊髓症候群—本體覺喪失;完全損傷預後差,「薦髓保留(sacral sparing)」代表不完全損傷、預後較佳。呼吸衰竭見於高位頸髓「C3–5(膈神經)」。神經性休克(低血壓+心搏徐緩)見於 T6 以上;自主神經反射異常見於 T6 以上慢性損傷。脊髓損傷高劑量類固醇(methylprednisolone,受傷 8 小時內 30 mg/kg bolus→5.4 mg/kg/hr×23 hr)爭議大、副作用多。","options":{"A":"前脊髓雙側運動+痛溫。","B":"★正確(本題答案):Brown-Séquard。","C":"中央脊髓上肢>下肢。","D":"後脊髓為本體覺。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"106080-8":{"quick":"錯在 B:脊髓空洞症為「痛溫喪失、本體/觸覺保留(分離性)」,非本體覺喪失。","detail":{"background":"脊髓腫瘤分區:①硬膜外(extradural,最常見、多為「轉移癌/惡性」);②硬膜內髓外(intradural-extramedullary,腦膜瘤、神經鞘瘤);③脊髓內(intramedullary,「星狀細胞瘤、室管膜瘤」最常見)。脊椎硬膜上轉移最早症狀=「局部背痛」,後續根性痛/無力/括約肌。脊髓空洞症(syringomyelia)=中央管擴大、似中央脊髓症候群、「痛溫喪失而本體/觸覺保留(分離性感覺喪失)」、上肢>下肢、MRI 診斷。馬尾症候群=下運動神經元(反射『減弱』)、鞍區麻木、括約肌失調。椎體 T1/T2 皆高訊號之中央橫帶=脂肪取代(Modic II)。","options":{"A":"正確:類似中央脊髓症候群。","B":"★錯誤(本題答案):痛溫喪失、本體覺保留。","C":"正確:上肢較下肢無力。","D":"正確:MRI 為診斷選擇。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"106080-59":{"quick":"馬尾症候群錯在 B:下運動神經元損傷→深層肌腱反射「減弱」(非增強)。","detail":{"background":"脊髓腫瘤分區:①硬膜外(extradural,最常見、多為「轉移癌/惡性」);②硬膜內髓外(intradural-extramedullary,腦膜瘤、神經鞘瘤);③脊髓內(intramedullary,「星狀細胞瘤、室管膜瘤」最常見)。脊椎硬膜上轉移最早症狀=「局部背痛」,後續根性痛/無力/括約肌。脊髓空洞症(syringomyelia)=中央管擴大、似中央脊髓症候群、「痛溫喪失而本體/觸覺保留(分離性感覺喪失)」、上肢>下肢、MRI 診斷。馬尾症候群=下運動神經元(反射『減弱』)、鞍區麻木、括約肌失調。椎體 T1/T2 皆高訊號之中央橫帶=脂肪取代(Modic II)。","options":{"A":"正確:大小便失禁/滯留。","B":"★錯誤(本題答案):反射減弱(下運動神經元)。","C":"正確:肛周麻木(鞍區)。","D":"正確:下肢無力。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"107020-13":{"quick":"錯在 A:硬膜外(extradural)脊髓腫瘤「往往為惡性(轉移)」,非良性。","detail":{"background":"脊髓腫瘤分區:①硬膜外(extradural,最常見、多為「轉移癌/惡性」);②硬膜內髓外(intradural-extramedullary,腦膜瘤、神經鞘瘤);③脊髓內(intramedullary,「星狀細胞瘤、室管膜瘤」最常見)。脊椎硬膜上轉移最早症狀=「局部背痛」,後續根性痛/無力/括約肌。脊髓空洞症(syringomyelia)=中央管擴大、似中央脊髓症候群、「痛溫喪失而本體/觸覺保留(分離性感覺喪失)」、上肢>下肢、MRI 診斷。馬尾症候群=下運動神經元(反射『減弱』)、鞍區麻木、括約肌失調。椎體 T1/T2 皆高訊號之中央橫帶=脂肪取代(Modic II)。","options":{"A":"★錯誤(本題答案):硬膜外多惡性轉移。","B":"正確:硬膜內髓外以腦膜瘤/神經鞘瘤。","C":"正確:脊髓內以星狀細胞瘤。","D":"正確:脊髓惡性瘤預後不良。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"107080-57":{"quick":"T11 骨折+椎莖間距變寬→A:爆裂性骨折(burst fracture)(本題多重答案 A/C 均給分)。","detail":{"background":"脊椎骨折:Denis 三柱(前/中/後);中柱受損→不穩定。爆裂性骨折(burst)—軸向壓縮、椎體後壁退入椎管、AP 像「椎莖間距變寬」;壓迫性骨折(前柱);彎曲牽開(Chance,安全帶,中後柱張力);骨折脫位(三柱)。樞突(odontoid)骨折:Type I 尖端(翼狀韌帶)、「Type II 基底部最常見但不穩定/不癒合率高」、Type III 延伸至 C2 椎體較穩定。吊頸骨折(Hangman’s)=C2 椎弓根。單側小關節卡鎖=「彎曲+旋轉」。頸椎脫位牽引復位後須追蹤 X 光與神經學。","options":{"A":"★正確(本題答案):爆裂性骨折。","B":"壓迫性骨折無椎管退入。","C":"(給分)彎曲牽開性骨折。","D":"骨折脫位為三柱。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"108030-57":{"quick":"腰椎術後當晚下肢無力+傷口滲血→C:術後硬膜上血腫壓迫,儘速手術清除。","detail":{"background":"脊髓腫瘤分區:①硬膜外(extradural,最常見、多為「轉移癌/惡性」);②硬膜內髓外(intradural-extramedullary,腦膜瘤、神經鞘瘤);③脊髓內(intramedullary,「星狀細胞瘤、室管膜瘤」最常見)。脊椎硬膜上轉移最早症狀=「局部背痛」,後續根性痛/無力/括約肌。脊髓空洞症(syringomyelia)=中央管擴大、似中央脊髓症候群、「痛溫喪失而本體/觸覺保留(分離性感覺喪失)」、上肢>下肢、MRI 診斷。馬尾症候群=下運動神經元(反射『減弱』)、鞍區麻木、括約肌失調。椎體 T1/T2 皆高訊號之中央橫帶=脂肪取代(Modic II)。","options":{"A":"不應僅觀察一天(延誤致永久缺損)。","B":"非單純術中神經損傷。","C":"★正確(本題答案):硬膜上血腫,儘速手術。","D":"數小時內非感染膿瘍。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","AOSpine/Denis Classification"]}},"108080-63":{"quick":"Denis 分類不穩定處 B:中柱(middle column)受損。","detail":{"background":"Denis 三柱:前柱(前 2/3 椎體+前縱韌帶)、「中柱(後 1/3 椎體+後縱韌帶)」、後柱(椎弓/關節/棘突韌帶);中柱受損→不穩定。Jefferson 骨折=C1 軸向壓縮爆裂(橫韌帶斷→C1-2 不穩),多無神經缺損、CT 診斷。吊頸骨折(Hangman’s)=C2 椎弓根(pars)骨折移位,神經缺損少、可外固定。C6-7 脫位 axial 像「雙腔徵」。Chance 骨折(安全帶/橫帶狀瘀青)易合併「十二指腸/胰」等後腹膜臟器傷。","options":{"A":"單純前柱多穩定。","B":"★正確(本題答案):中柱受損→不穩定。","C":"單純後柱視情況。","D":"交界處非穩定度判準。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"109020-9":{"quick":"脊椎轉移最常位置 B:胸椎。","detail":{"background":"脊髓腫瘤:硬膜外(extradural)最多、以「轉移癌(惡性)」為主、好發胸椎;硬膜內髓外以腦膜瘤/神經鞘瘤;脊髓內(intramedullary,約佔脊髓腫瘤少數)以「星狀細胞瘤、室管膜瘤」為主(非轉移),黏液乳突狀室管膜瘤好發腰薦(終絲)。脊椎轉移瘤最常在「胸椎」;無神經壓迫之穩定轉移可先切片/放療,非急著減壓固定;轉移瘤手術目的為改善疼痛/生活品質,不延長原發癌存活。脊髓損傷影像 MRI 優於 CT。","options":{"A":"頸椎較少。","B":"★正確(本題答案):胸椎。","C":"腰椎次之。","D":"薦椎少。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"109020-46":{"quick":"錯在 C:最常見脊髓內腫瘤為「原發膠質瘤(星狀/室管膜)」,非轉移性。","detail":{"background":"脊髓腫瘤:硬膜外(extradural)最多、以「轉移癌(惡性)」為主、好發胸椎;硬膜內髓外以腦膜瘤/神經鞘瘤;脊髓內(intramedullary,約佔脊髓腫瘤少數)以「星狀細胞瘤、室管膜瘤」為主(非轉移),黏液乳突狀室管膜瘤好發腰薦(終絲)。脊椎轉移瘤最常在「胸椎」;無神經壓迫之穩定轉移可先切片/放療,非急著減壓固定;轉移瘤手術目的為改善疼痛/生活品質,不延長原發癌存活。脊髓損傷影像 MRI 優於 CT。","options":{"A":"正確:脊髓內瘤約占脊髓腫瘤 5%。","B":"正確:原發脊髓內淋巴瘤罕見。","C":"★錯誤(本題答案):非轉移性最常見。","D":"正確:黏液乳突狀室管膜瘤好發腰薦。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"109020-57":{"quick":"C6-7 軸向影像雙腔徵(double-lumen sign)→D:脫位(dislocation)。","detail":{"background":"Denis 三柱:前柱(前 2/3 椎體+前縱韌帶)、「中柱(後 1/3 椎體+後縱韌帶)」、後柱(椎弓/關節/棘突韌帶);中柱受損→不穩定。Jefferson 骨折=C1 軸向壓縮爆裂(橫韌帶斷→C1-2 不穩),多無神經缺損、CT 診斷。吊頸骨折(Hangman’s)=C2 椎弓根(pars)骨折移位,神經缺損少、可外固定。C6-7 脫位 axial 像「雙腔徵」。Chance 骨折(安全帶/橫帶狀瘀青)易合併「十二指腸/胰」等後腹膜臟器傷。","options":{"A":"壓迫性骨折無雙腔徵。","B":"爆裂性骨折為椎體後退。","C":"小面關節骨折非雙腔。","D":"★正確(本題答案):脫位。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"109020-60":{"quick":"錯在 C:L2 轉移、「無神經壓迫且功能正常」不應「馬上固定+椎板切除減壓」(應先切片/放療)。","detail":{"background":"脊髓腫瘤:硬膜外(extradural)最多、以「轉移癌(惡性)」為主、好發胸椎;硬膜內髓外以腦膜瘤/神經鞘瘤;脊髓內(intramedullary,約佔脊髓腫瘤少數)以「星狀細胞瘤、室管膜瘤」為主(非轉移),黏液乳突狀室管膜瘤好發腰薦(終絲)。脊椎轉移瘤最常在「胸椎」;無神經壓迫之穩定轉移可先切片/放療,非急著減壓固定;轉移瘤手術目的為改善疼痛/生活品質,不延長原發癌存活。脊髓損傷影像 MRI 優於 CT。","options":{"A":"正確:骨掃描查其他轉移。","B":"正確:CT 導引切片確認。","C":"★錯誤(本題答案):無壓迫不需急減壓手術。","D":"正確:手術主為緩解症狀,不延長原發癌存活。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"109080-56":{"quick":"C5 骨折、低血壓+心搏徐緩+四肢溫暖→C:神經性休克。","detail":{"background":"神經性休克(neurogenic shock):T6 以上脊髓損傷使交感張力喪失→「低血壓+心搏徐緩(非心搏快)、四肢溫暖、靜脈回流減少」;與失血性休克(心跳快、四肢冷)不同。自主神經反射異常(autonomic dysreflexia)見於「T6 以上」慢性損傷,膀胱/腸刺激致陣發性高血壓。ASIA 損傷量表:A 完全、B 僅感覺保留、C 運動保留但多數肌力<3、D 運動保留多數肌力≥3、E 正常。中央脊髓症候群=老人、頸椎退化、過度伸展、上肢>下肢。","options":{"A":"過敏性休克有過敏原。","B":"失血性休克心跳快、四肢冷。","C":"★正確(本題答案):神經性休克。","D":"心因性休克有心臟病因。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"110020-51":{"quick":"正確為 D:脊髓損傷影像「MRI 優於 CT」。","detail":{"background":"神經性休克(neurogenic shock):T6 以上脊髓損傷使交感張力喪失→「低血壓+心搏徐緩(非心搏快)、四肢溫暖、靜脈回流減少」;與失血性休克(心跳快、四肢冷)不同。自主神經反射異常(autonomic dysreflexia)見於「T6 以上」慢性損傷,膀胱/腸刺激致陣發性高血壓。ASIA 損傷量表:A 完全、B 僅感覺保留、C 運動保留但多數肌力<3、D 運動保留多數肌力≥3、E 正常。中央脊髓症候群=老人、頸椎退化、過度伸展、上肢>下肢。","options":{"A":"錯:多數脊髓損傷在頸椎。","B":"錯:C6 不一定立即呼吸衰竭(C3–5 才關鍵)。","C":"錯:中央脊髓上肢影響>下肢。","D":"★正確(本題答案):MRI 優於 CT。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"110080-11":{"quick":"正確為 B:吊頸骨折=第二頸椎椎弓根(pars interarticularis)骨折移位。","detail":{"background":"Denis 三柱:前柱(前 2/3 椎體+前縱韌帶)、「中柱(後 1/3 椎體+後縱韌帶)」、後柱(椎弓/關節/棘突韌帶);中柱受損→不穩定。Jefferson 骨折=C1 軸向壓縮爆裂(橫韌帶斷→C1-2 不穩),多無神經缺損、CT 診斷。吊頸骨折(Hangman’s)=C2 椎弓根(pars)骨折移位,神經缺損少、可外固定。C6-7 脫位 axial 像「雙腔徵」。Chance 骨折(安全帶/橫帶狀瘀青)易合併「十二指腸/胰」等後腹膜臟器傷。","options":{"A":"C1 爆裂為 Jefferson。","B":"★正確(本題答案):C2 pars 骨折移位。","C":"非 C3-4 伸張損傷。","D":"非雙側關節鎖住。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"110080-68":{"quick":"自主神經反射異常較會發生於 D:胸髓第六至第八節(即 T6 以上損傷)。","detail":{"background":"神經性休克(neurogenic shock):T6 以上脊髓損傷使交感張力喪失→「低血壓+心搏徐緩(非心搏快)、四肢溫暖、靜脈回流減少」;與失血性休克(心跳快、四肢冷)不同。自主神經反射異常(autonomic dysreflexia)見於「T6 以上」慢性損傷,膀胱/腸刺激致陣發性高血壓。ASIA 損傷量表:A 完全、B 僅感覺保留、C 運動保留但多數肌力<3、D 運動保留多數肌力≥3、E 正常。中央脊髓症候群=老人、頸椎退化、過度伸展、上肢>下肢。","options":{"A":"薦髓非。","B":"腰髓非。","C":"T10-12 偏低。","D":"★正確(本題答案):T6–8(T6 以上)。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"110080-77":{"quick":"L1 Chance 骨折+腹壁橫帶狀瘀青→D:十二指腸(後腹膜臟器)最可能受傷。","detail":{"background":"Denis 三柱:前柱(前 2/3 椎體+前縱韌帶)、「中柱(後 1/3 椎體+後縱韌帶)」、後柱(椎弓/關節/棘突韌帶);中柱受損→不穩定。Jefferson 骨折=C1 軸向壓縮爆裂(橫韌帶斷→C1-2 不穩),多無神經缺損、CT 診斷。吊頸骨折(Hangman’s)=C2 椎弓根(pars)骨折移位,神經缺損少、可外固定。C6-7 脫位 axial 像「雙腔徵」。Chance 骨折(安全帶/橫帶狀瘀青)易合併「十二指腸/胰」等後腹膜臟器傷。","options":{"A":"胃較少。","B":"脾為左上腹鈍傷。","C":"橫結腸較少。","D":"★正確(本題答案):十二指腸。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"111020-75":{"quick":"老人頸椎退化、跌倒、上肢>下肢無力+痛溫異常→B:中央脊髓症候群。","detail":{"background":"神經性休克(neurogenic shock):T6 以上脊髓損傷使交感張力喪失→「低血壓+心搏徐緩(非心搏快)、四肢溫暖、靜脈回流減少」;與失血性休克(心跳快、四肢冷)不同。自主神經反射異常(autonomic dysreflexia)見於「T6 以上」慢性損傷,膀胱/腸刺激致陣發性高血壓。ASIA 損傷量表:A 完全、B 僅感覺保留、C 運動保留但多數肌力<3、D 運動保留多數肌力≥3、E 正常。中央脊髓症候群=老人、頸椎退化、過度伸展、上肢>下肢。","options":{"A":"前脊髓為運動+痛溫雙側。","B":"★正確(本題答案):中央脊髓症候群。","C":"Brown-Séquard 為半側。","D":"馬尾為下肢/括約肌。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"112020-12":{"quick":"正確為 D:Jefferson 骨折若合併橫韌帶斷裂,可造成 C1-2 不穩定脫位。","detail":{"background":"Denis 三柱:前柱(前 2/3 椎體+前縱韌帶)、「中柱(後 1/3 椎體+後縱韌帶)」、後柱(椎弓/關節/棘突韌帶);中柱受損→不穩定。Jefferson 骨折=C1 軸向壓縮爆裂(橫韌帶斷→C1-2 不穩),多無神經缺損、CT 診斷。吊頸骨折(Hangman’s)=C2 椎弓根(pars)骨折移位,神經缺損少、可外固定。C6-7 脫位 axial 像「雙腔徵」。Chance 骨折(安全帶/橫帶狀瘀青)易合併「十二指腸/胰」等後腹膜臟器傷。","options":{"A":"錯:為軸向壓縮(非前屈)。","B":"錯:多無嚴重神經缺損。","C":"錯:CT 即可診斷。","D":"★正確(本題答案):橫韌帶斷→C1-2 不穩。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"112080-12":{"quick":"中柱(middle column)組成 B:後半部椎體+後縱走韌帶。","detail":{"background":"Denis 三柱:前柱(前 2/3 椎體+前縱韌帶)、「中柱(後 1/3 椎體+後縱韌帶)」、後柱(椎弓/關節/棘突韌帶);中柱受損→不穩定。Jefferson 骨折=C1 軸向壓縮爆裂(橫韌帶斷→C1-2 不穩),多無神經缺損、CT 診斷。吊頸骨折(Hangman’s)=C2 椎弓根(pars)骨折移位,神經缺損少、可外固定。C6-7 脫位 axial 像「雙腔徵」。Chance 骨折(安全帶/橫帶狀瘀青)易合併「十二指腸/胰」等後腹膜臟器傷。","options":{"A":"非整個椎體。","B":"★正確(本題答案):後半椎體+後縱韌帶。","C":"椎莖屬後柱。","D":"椎莖/椎關節屬後柱。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"113020-11":{"quick":"上肢 1-2 分、下肢 3-4 分、感覺保留→C:ASIA D 級、中央脊髓症候群。","detail":{"background":"神經性休克(neurogenic shock):T6 以上脊髓損傷使交感張力喪失→「低血壓+心搏徐緩(非心搏快)、四肢溫暖、靜脈回流減少」;與失血性休克(心跳快、四肢冷)不同。自主神經反射異常(autonomic dysreflexia)見於「T6 以上」慢性損傷,膀胱/腸刺激致陣發性高血壓。ASIA 損傷量表:A 完全、B 僅感覺保留、C 運動保留但多數肌力<3、D 運動保留多數肌力≥3、E 正常。中央脊髓症候群=老人、頸椎退化、過度伸展、上肢>下肢。","options":{"A":"B 級僅感覺保留(本例有運動)。","B":"非前脊髓型。","C":"★正確(本題答案):ASIA D、中央脊髓。","D":"E 級為正常。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"113070-57":{"quick":"最適當 B:頸椎損傷最常見原因車禍,急救先 ABC。","detail":{"background":"神經性休克(neurogenic shock):T6 以上脊髓損傷使交感張力喪失→「低血壓+心搏徐緩(非心搏快)、四肢溫暖、靜脈回流減少」;與失血性休克(心跳快、四肢冷)不同。自主神經反射異常(autonomic dysreflexia)見於「T6 以上」慢性損傷,膀胱/腸刺激致陣發性高血壓。ASIA 損傷量表:A 完全、B 僅感覺保留、C 運動保留但多數肌力<3、D 運動保留多數肌力≥3、E 正常。中央脊髓症候群=老人、頸椎退化、過度伸展、上肢>下肢。","options":{"A":"錯:上頸椎傷常致命但下頸椎亦多合併脊髓傷。","B":"★正確(本題答案):車禍最常、先評估 ABC。","C":"錯:中央脊髓為過度『伸展』,非屈曲。","D":"錯:後柱症候群罕見,非最常見。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"114020-1":{"quick":"不是神經性休克表徵者 B:心跳變快(神經性休克為心搏『徐緩』)。","detail":{"background":"神經性休克(neurogenic shock):T6 以上脊髓損傷使交感張力喪失→「低血壓+心搏徐緩(非心搏快)、四肢溫暖、靜脈回流減少」;與失血性休克(心跳快、四肢冷)不同。自主神經反射異常(autonomic dysreflexia)見於「T6 以上」慢性損傷,膀胱/腸刺激致陣發性高血壓。ASIA 損傷量表:A 完全、B 僅感覺保留、C 運動保留但多數肌力<3、D 運動保留多數肌力≥3、E 正常。中央脊髓症候群=老人、頸椎退化、過度伸展、上肢>下肢。","options":{"A":"是:血壓變低。","B":"★不是(本題答案):神經性休克心搏徐緩,非變快。","C":"是:靜脈回流減少。","D":"是:常合併脊髓損傷。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"114020-12":{"quick":"正確為 C:吊頸骨折很少神經損傷,可先以外固定治療。","detail":{"background":"Denis 三柱:前柱(前 2/3 椎體+前縱韌帶)、「中柱(後 1/3 椎體+後縱韌帶)」、後柱(椎弓/關節/棘突韌帶);中柱受損→不穩定。Jefferson 骨折=C1 軸向壓縮爆裂(橫韌帶斷→C1-2 不穩),多無神經缺損、CT 診斷。吊頸骨折(Hangman’s)=C2 椎弓根(pars)骨折移位,神經缺損少、可外固定。C6-7 脫位 axial 像「雙腔徵」。Chance 骨折(安全帶/橫帶狀瘀青)易合併「十二指腸/胰」等後腹膜臟器傷。","options":{"A":"錯:為過度伸展(非扭轉)。","B":"錯:為椎弓根(pars)非關節面。","C":"★正確(本題答案):少神經損傷、可外固定。","D":"描述脫位過度,非典型 Hangman’s 表現。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"114070-12":{"quick":"錯在 A:硬膜外脊椎腫瘤「以惡性(轉移)居多」,非良性。","detail":{"background":"脊髓腫瘤:硬膜外(extradural)最多、以「轉移癌(惡性)」為主、好發胸椎;硬膜內髓外以腦膜瘤/神經鞘瘤;脊髓內(intramedullary,約佔脊髓腫瘤少數)以「星狀細胞瘤、室管膜瘤」為主(非轉移),黏液乳突狀室管膜瘤好發腰薦(終絲)。脊椎轉移瘤最常在「胸椎」;無神經壓迫之穩定轉移可先切片/放療,非急著減壓固定;轉移瘤手術目的為改善疼痛/生活品質,不延長原發癌存活。脊髓損傷影像 MRI 優於 CT。","options":{"A":"★錯誤(本題答案):硬膜外多惡性轉移。","B":"正確:硬膜內髓外以腦膜瘤/神經鞘瘤。","C":"正確:脊髓內以星狀/室管膜瘤。","D":"正確:最好發胸椎。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","Denis Three-Column／ASIA Classification"]}},"103100-14":{"quick":"藥物無效之三叉神經痛效果最快 A:顯微血管減壓術(MVD)。","detail":{"background":"三叉神經痛:陣發性顏面電擊樣痛;原因多為「小腦上動脈(SCA)壓迫三叉神經根進入區」,亦可多發性硬化、腫瘤。「第一線為藥物(carbamazepine、oxcarbazepine、gabapentin)」;藥物無效→手術,其中「顯微血管減壓術(MVD)」效果最佳/最快且持久;經皮術式(甘油注射、氣球壓迫、射頻)、伽馬刀為替代。","options":{"A":"★正確(本題答案):MVD 效果最快持久。","B":"甘油注射效果較短。","C":"伽馬刀見效慢。","D":"氣球壓迫為替代。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery"]}},"104030-16":{"quick":"脊髓脊膜膨出好發 A:腰薦椎交界(本題多重答案 A/B 均給分)。","detail":{"background":"先天畸形:脊髓脊膜膨出(myelomeningocele)好發「腰薦交界」、葉酸缺乏相關;腦膨出(encephalocele)多在頭顱中線、膨出腦組織常無功能→多「切除」非回置、可合併智能障礙;Klippel-Feil=受孕 3–8 週頸椎分節失敗,三徵「低後髮際、短頸、頭頸活動受限」,常合併泌尿/聽力/心肺異常。顱縫早閉:矢狀縫早閉→舟狀頭(scaphocephaly,長頭),冠狀縫早閉→短頭;Crouzon/Apert 才有上頜發育不全/突眼。","options":{"A":"★正確(本題答案):腰薦交界最常見。","B":"(給分)胸腰交界。","C":"頸椎少。","D":"腰椎(含於腰薦)。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery"]}},"105100-16":{"quick":"錯在 A:腦部偽腫瘤(IIH)「腦室正常或偏小」,非變大。","detail":{"background":"水腦症:阻塞性(non-communicating,如導水管狹窄、第四腦室出口阻塞)vs 交通性(communicating,如蜘蛛膜炎、感染後/出血後吸收下降);Dandy-Walker=第四腦室囊狀擴大+小腦蚓部發育不良;Chiari I=小腦扁桃下垂≥5 mm(常合併脊髓空洞)、Chiari II=合併脊髓脊膜膨出/水腦。常壓性水腦(NPH)三徵=「步態不穩、失智、尿失禁」(無顫抖);引流後「步態」最易改善。腦部偽腫瘤/特發性顱內壓增高(IIH)=肥胖年輕女性、視乳頭水腫、LP 壓力>250 mmH2O、「腦室正常或偏小(非變大)」、治療乙醯偶氮胺/利尿+減重。","options":{"A":"★錯誤(本題答案):腦室不變大。","B":"正確:LP 壓力常>200–250 mmH2O。","C":"正確:有視乳頭水腫。","D":"正確:利尿(acetazolamide)等內科治療。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery"]}},"108030-13":{"quick":"錯在 D:三叉神經痛「第一線為藥物」,顯微血管減壓非第一線(藥物無效才手術)。","detail":{"background":"三叉神經痛:陣發性顏面電擊樣痛;原因多為「小腦上動脈(SCA)壓迫三叉神經根進入區」,亦可多發性硬化、腫瘤。「第一線為藥物(carbamazepine、oxcarbazepine、gabapentin)」;藥物無效→手術,其中「顯微血管減壓術(MVD)」效果最佳/最快且持久;經皮術式(甘油注射、氣球壓迫、射頻)、伽馬刀為替代。","options":{"A":"正確:可源自多發性硬化。","B":"正確:可因腫瘤。","C":"正確:最常為小腦上動脈壓迫。","D":"★錯誤(本題答案):MVD 非第一線。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery"]}},"108080-7":{"quick":"Dandy-Walker 最早擴大 B:第四腦室(囊狀擴大)。","detail":{"background":"水腦症:阻塞性(non-communicating,如導水管狹窄、第四腦室出口阻塞)vs 交通性(communicating,如蜘蛛膜炎、感染後/出血後吸收下降);Dandy-Walker=第四腦室囊狀擴大+小腦蚓部發育不良;Chiari I=小腦扁桃下垂≥5 mm(常合併脊髓空洞)、Chiari II=合併脊髓脊膜膨出/水腦。常壓性水腦(NPH)三徵=「步態不穩、失智、尿失禁」(無顫抖);引流後「步態」最易改善。腦部偽腫瘤/特發性顱內壓增高(IIH)=肥胖年輕女性、視乳頭水腫、LP 壓力>250 mmH2O、「腦室正常或偏小(非變大)」、治療乙醯偶氮胺/利尿+減重。","options":{"A":"第三腦室非最早。","B":"★正確(本題答案):第四腦室。","C":"導水管非最早。","D":"側腦室非最早。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery"]}},"108080-9":{"quick":"NPH 引流後最易改善 A:步態(本題多重答案 A/C 均給分,步態最易改善)。","detail":{"background":"水腦症:阻塞性(non-communicating,如導水管狹窄、第四腦室出口阻塞)vs 交通性(communicating,如蜘蛛膜炎、感染後/出血後吸收下降);Dandy-Walker=第四腦室囊狀擴大+小腦蚓部發育不良;Chiari I=小腦扁桃下垂≥5 mm(常合併脊髓空洞)、Chiari II=合併脊髓脊膜膨出/水腦。常壓性水腦(NPH)三徵=「步態不穩、失智、尿失禁」(無顫抖);引流後「步態」最易改善。腦部偽腫瘤/特發性顱內壓增高(IIH)=肥胖年輕女性、視乳頭水腫、LP 壓力>250 mmH2O、「腦室正常或偏小(非變大)」、治療乙醯偶氮胺/利尿+減重。","options":{"A":"(本題答案/給分)。","B":"痴呆改善較差。","C":"★步態不穩(給分,最易改善)。","D":"半身無力非 NPH 典型。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery"]}},"109080-12":{"quick":"小腦扁桃下垂 5 mm+脊髓空洞、無脊柱裂/水腦→A:Chiari I 畸形。","detail":{"background":"水腦症:阻塞性(non-communicating,如導水管狹窄、第四腦室出口阻塞)vs 交通性(communicating,如蜘蛛膜炎、感染後/出血後吸收下降);Dandy-Walker=第四腦室囊狀擴大+小腦蚓部發育不良;Chiari I=小腦扁桃下垂≥5 mm(常合併脊髓空洞)、Chiari II=合併脊髓脊膜膨出/水腦。常壓性水腦(NPH)三徵=「步態不穩、失智、尿失禁」(無顫抖);引流後「步態」最易改善。腦部偽腫瘤/特發性顱內壓增高(IIH)=肥胖年輕女性、視乳頭水腫、LP 壓力>250 mmH2O、「腦室正常或偏小(非變大)」、治療乙醯偶氮胺/利尿+減重。","options":{"A":"★正確(本題答案):Chiari I。","B":"Chiari II 合併脊髓脊膜膨出/水腦。","C":"Dandy-Walker 為第四腦室囊狀。","D":"脊髓脊膜膨出為開放性神經管缺損。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery"]}},"110020-7":{"quick":"不是 NPH 三徵者 D:肢體顫抖(三徵為失智/步態不穩/尿失禁)。","detail":{"background":"水腦症:阻塞性(non-communicating,如導水管狹窄、第四腦室出口阻塞)vs 交通性(communicating,如蜘蛛膜炎、感染後/出血後吸收下降);Dandy-Walker=第四腦室囊狀擴大+小腦蚓部發育不良;Chiari I=小腦扁桃下垂≥5 mm(常合併脊髓空洞)、Chiari II=合併脊髓脊膜膨出/水腦。常壓性水腦(NPH)三徵=「步態不穩、失智、尿失禁」(無顫抖);引流後「步態」最易改善。腦部偽腫瘤/特發性顱內壓增高(IIH)=肥胖年輕女性、視乳頭水腫、LP 壓力>250 mmH2O、「腦室正常或偏小(非變大)」、治療乙醯偶氮胺/利尿+減重。","options":{"A":"是:失智。","B":"是:步態不穩。","C":"是:尿失禁。","D":"★不是(本題答案):肢體顫抖。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery"]}},"110020-9":{"quick":"三叉神經痛最常壓迫血管 C:小腦上動脈(superior cerebellar artery)。","detail":{"background":"三叉神經痛:陣發性顏面電擊樣痛;原因多為「小腦上動脈(SCA)壓迫三叉神經根進入區」,亦可多發性硬化、腫瘤。「第一線為藥物(carbamazepine、oxcarbazepine、gabapentin)」;藥物無效→手術,其中「顯微血管減壓術(MVD)」效果最佳/最快且持久;經皮術式(甘油注射、氣球壓迫、射頻)、伽馬刀為替代。","options":{"A":"前小腦下動脈較少。","B":"後小腦下動脈較少。","C":"★正確(本題答案):小腦上動脈。","D":"前脈絡膜動脈非。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery"]}},"113020-13":{"quick":"錯在 C:腦膨出之膨出腦組織常無功能→多「切除」,非回置。","detail":{"background":"先天畸形:脊髓脊膜膨出(myelomeningocele)好發「腰薦交界」、葉酸缺乏相關;腦膨出(encephalocele)多在頭顱中線、膨出腦組織常無功能→多「切除」非回置、可合併智能障礙;Klippel-Feil=受孕 3–8 週頸椎分節失敗,三徵「低後髮際、短頸、頭頸活動受限」,常合併泌尿/聽力/心肺異常。顱縫早閉:矢狀縫早閉→舟狀頭(scaphocephaly,長頭),冠狀縫早閉→短頭;Crouzon/Apert 才有上頜發育不全/突眼。","options":{"A":"正確:多在頭顱中線。","B":"正確:顱底膨出較少見。","C":"★錯誤(本題答案):膨出腦組織多切除非回置。","D":"正確:常合併智能障礙。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery"]}},"113020-63":{"quick":"最適當 A:Klippel-Feil 為受孕 3–8 週「頸椎分節失敗」所致。","detail":{"background":"先天畸形:脊髓脊膜膨出(myelomeningocele)好發「腰薦交界」、葉酸缺乏相關;腦膨出(encephalocele)多在頭顱中線、膨出腦組織常無功能→多「切除」非回置、可合併智能障礙;Klippel-Feil=受孕 3–8 週頸椎分節失敗,三徵「低後髮際、短頸、頭頸活動受限」,常合併泌尿/聽力/心肺異常。顱縫早閉:矢狀縫早閉→舟狀頭(scaphocephaly,長頭),冠狀縫早閉→短頭;Crouzon/Apert 才有上頜發育不全/突眼。","options":{"A":"★正確(本題答案):頸椎分節失敗。","B":"錯:常合併泌尿/神經/心肺/聽力異常。","C":"錯:典型為『低』後髮際。","D":"錯:典型為『短頸』與活動受限。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery"]}},"113070-13":{"quick":"正確為 C:舟狀頭(矢狀縫早閉)「不常合併上頜骨發育不全」。","detail":{"background":"先天畸形:脊髓脊膜膨出(myelomeningocele)好發「腰薦交界」、葉酸缺乏相關;腦膨出(encephalocele)多在頭顱中線、膨出腦組織常無功能→多「切除」非回置、可合併智能障礙;Klippel-Feil=受孕 3–8 週頸椎分節失敗,三徵「低後髮際、短頸、頭頸活動受限」,常合併泌尿/聽力/心肺異常。顱縫早閉:矢狀縫早閉→舟狀頭(scaphocephaly,長頭),冠狀縫早閉→短頭;Crouzon/Apert 才有上頜發育不全/突眼。","options":{"A":"錯:為矢狀縫(非冠狀縫)早閉。","B":"錯:突眼見於 Crouzon。","C":"★正確(本題答案):不常合併上頜發育不全。","D":"錯:不常合併水腦。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery"]}},"115020-29":{"quick":"最不適當 B:導水管狹窄造成的是「阻塞性(non-communicating)」水腦,非交通性。","detail":{"background":"水腦症:阻塞性(non-communicating,如導水管狹窄、第四腦室出口阻塞)vs 交通性(communicating,如蜘蛛膜炎、感染後/出血後吸收下降);Dandy-Walker=第四腦室囊狀擴大+小腦蚓部發育不良;Chiari I=小腦扁桃下垂≥5 mm(常合併脊髓空洞)、Chiari II=合併脊髓脊膜膨出/水腦。常壓性水腦(NPH)三徵=「步態不穩、失智、尿失禁」(無顫抖);引流後「步態」最易改善。腦部偽腫瘤/特發性顱內壓增高(IIH)=肥胖年輕女性、視乳頭水腫、LP 壓力>250 mmH2O、「腦室正常或偏小(非變大)」、治療乙醯偶氮胺/利尿+減重。","options":{"A":"正確:導水管狹窄屬先天病因。","B":"★最不適當(本題答案):為阻塞性非交通性。","C":"正確:腦膜炎後多為交通性。","D":"正確:Chiari II 之水腦屬先天病因。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery"]}},"114070-9":{"quick":"清醒期後意識惡化(E2V1M4=7)→D:先重新評估生命徵象、必要時插管維持呼吸道(ABC 優先)。","detail":{"background":"外傷意識惡化處置先後:GCS 7 已達插管門檻,優先「ABC—維持呼吸道(插管)、穩定生命徵象」,再安排 CT。清明期(lucid interval)後惡化為硬腦膜上出血(EDH)典型表現,但氣道與生命徵象先於影像。","options":{"A":"CT 重要但非第一(先穩定氣道)。","B":"FAST 評估腹部非此首要。","C":"電解質非優先。","D":"★正確(本題答案):先 ABC、必要時插管。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition"]}},"114070-10":{"quick":"錯在 A:依影像「左腦為硬腦膜上(EDH)、右腦為腦挫傷出血」之配對相反(描述顛倒)。","detail":{"background":"外傷顱內血腫:硬腦膜上出血(EDH)多因「中腦膜動脈」破裂、合併顱骨骨折、CT 雙凸透鏡狀;腦挫傷性出血(contusion)源自腦實質血管。本題官方標 A 之左右配對敘述為錯誤;瞳孔放大(腦疝徵象)建議開顱減壓。","options":{"A":"★錯誤(本題答案):左右腦出血型別配對相反。","B":"正確:EDH 多中腦膜動脈破裂(合併顱骨骨折)。","C":"正確:腦挫傷源自腦實質血管。","D":"正確:瞳孔放大建議開顱減壓。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition"]}},"115020-31":{"quick":"不是 Cushing 三徵者 C:頭痛(三徵為高血壓、心搏徐緩、呼吸不規則)。","detail":{"background":"Cushing 三徵(顱內壓升高之代償):「血壓上升(脈壓增大)、心搏徐緩、呼吸不規則」,提示即將腦疝、為神經外科急症。頭痛雖常見於高顱壓但非 Cushing 三徵之一。","options":{"A":"是:血壓上升。","B":"是:心跳變慢。","C":"★不是(本題答案):頭痛非三徵。","D":"是:呼吸不規則。"},"sources":["Youmans and Winn Neurological Surgery","Greenberg Handbook of Neurosurgery","ATLS 10th Edition"]}}},TO=["顱腦外傷與顱內壓", "腦血管疾病", "腦腫瘤", "脊椎退化‧椎間盤‧神經根", "脊髓損傷‧脊椎骨折‧脊髓腫瘤", "水腦‧先天畸形‧功能性神經外科"],LEC={"顱腦外傷與顱內壓":{"title":"顱腦外傷與顱內壓","html":"\n<p><b>GCS(3–15):</b>睜眼 E(4自發/3呼喚/2痛/1無)、語言 V(5切題/4答非所問/3不當字句/2無法理解聲音/1無)、運動 M(6遵令/5定位/4回縮/3不正常屈曲/2不正常伸張/1無);≤8 為重度須插管。</p>\n<p><b>外傷血腫:</b><b>硬腦膜上(EDH)</b>—中腦膜動脈、合併顱骨骨折、雙凸狀、「清明期」、及時手術預後佳;<b>硬腦膜下(SDH)</b>—橋靜脈、新月狀、預後較差、老人/酗酒;<b>DAI</b>—剪力傷、無清明期、CT可正常但昏迷、肉眼可無異常。手術指徵:血腫>30 mL、中線偏移>5 mm。</p>\n<p><b>顱內壓(ICP):</b>降ICP—頭抬高30°、止痛鎮靜、滲透治療(mannitol)、短暫過度換氣、CSF引流、去骨瓣;<b>平躺、低通氣(升CO2)反升ICP</b>。<b>CPP=MAP−ICP</b>(目標60–70)。<b>Cushing三徵</b>=高血壓+心搏徐緩+呼吸不規則。腦瘤/高ICP禁腰椎穿刺。</p>\n<p><b>處置:</b>先ABC(矯正休克/缺氧最優先)、頸圈、GCS≤8插管;<b>重度TBI不給類固醇(CRASH試驗有害)</b>;維持收縮壓>100。腦死要件含「無自發呼吸(呼吸暫停試驗)」。嬰兒搖晃症=SDH+視網膜出血、外觀隱匿。</p>\n"},"腦血管疾病":{"title":"腦血管疾病","html":"\n<p><b>蜘蛛膜下腔出血(SAH):</b>最常因「囊狀動脈瘤破裂」、霹靂頭痛+頸僵。危險因子—高血壓、抽菸、女性、家族史、多囊腎(非糖尿病)。<b>後交通動脈瘤→CN III麻痺</b>。診斷CT→CTA;分級Hunt-Hess(臨床)/WFNS(GCS+運動)/Fisher(依CT出血量預測痙攣)。</p>\n<p><b>併發症:</b><b>血管痙攣(vasospasm,day 4–14、峰7–10)</b>為最常見嚴重後遺症/死因→<b>Triple-H(hypertension/hypervolemia/hemodilution)</b>+nimodipine(過度換氣不屬之);再出血、急性水腦。</p>\n<p><b>AVM:</b>nidus「無微血管床」、出血/癲癇/竊血;四條血管腦血管攝影最佳;可及者手術全切除為佳。<b>高血壓性腦內出血</b>最好發「豆狀核/基底核」。<b>moyamoya</b>—雙側內頸動脈遠端進行性狹窄+煙霧側枝、亞洲/小孩、治療血管繞道。<b>頸動脈狹窄</b>—暫時性單眼黑矇、有症狀重度→內膜剝除。<b>CCF</b>—外傷後搏動性突眼、血管介入治療。</p>\n"},"腦腫瘤":{"title":"腦腫瘤","html":"\n<p><b>膠質瘤:</b>星狀細胞瘤最常見原發腦瘤;WHO分級(細胞密度/異型/有絲分裂/壞死;鈣化非依據);pilocytic(grade1、年輕、手術可治癒)、GBM(grade4、最常見且最惡、切除+放療+temozolomide)、寡樹突膠質瘤(「煎蛋」、1p/19q)。<b>DIPG以放療為主(不可手術)</b>。</p>\n<p><b>腦膜瘤:</b>源自「蜘蛛網膜帽細胞」(非硬腦膜)、dural-based、生長慢、骨增生、好發矢狀竇旁/顱凸/蝶骨翼;顱凸處由外頸動脈供血;復發最重要=術後殘留、切除程度用Simpson分級。</p>\n<p><b>其他:</b>轉移瘤原發「肺>乳房>腎>腸胃」(肺最多);<b>聽神經瘤=前庭神經(CN VIII)、雙側→NF2、最常傷顏面神經</b>;脈絡叢乳頭瘤(小孩側腦室/成人第四腦室、可惡性);表皮樣囊腫→無菌性腦膜炎;<b>泌乳素瘤</b>prolactin>150、首選多巴胺促效劑;松果體germinoma對放療敏感;兒童髓母細胞瘤(可沿CSF播散、峰年齡最小)。NF1=咖啡牛奶斑;雙側聽神經瘤為NF2。</p>\n"},"脊椎退化‧椎間盤‧神經根":{"title":"脊椎退化‧椎間盤‧神經根","html":"\n<p><b>腰椎椎間盤突出(HIVD):</b>90%在<b>L4-5、L5-S1</b>、多後外側;旁中央型壓「行經根」(L4-5→L5根)、極外側型壓「出口根」(L4-5→L4根)。根性:L4(膝伸/膝反射/小腿內側)、<b>L5(大拇趾背屈/垂足/足背)</b>、S1(踝蹠屈/踝反射/足外側)。診斷MRI最佳;多數保守,馬尾症候群為急診手術指徵。</p>\n<p><b>頸椎退化:</b>神經根病變最常<b>C7根(C6-7、三頭肌反射減弱、中指)</b>;脊髓病變(myelopathy)有上運動神經元徵象、為手術指徵;前頸椎手術傷喉返神經。Spurling/外展減輕為根性徵。</p>\n<p><b>脊椎狹窄:</b>退化性(後天)最常見、L4-5最多、前彎/坐下緩解;進行性神經缺損→減壓。<b>OPLL</b>(亞洲男性C4-6、合併DISH);脊椎滑脫(pars斷裂L5→L5-S1壓L5根、女性/年輕進展風險高);化膿性脊椎感染(腰椎最多、金黃葡萄球菌、成人先感染「椎體/終板」)。</p>\n"},"脊髓損傷‧脊椎骨折‧脊髓腫瘤":{"title":"脊髓損傷‧脊椎骨折‧脊髓腫瘤","html":"\n<p><b>脊髓損傷症候群:</b>前脊髓(運動+痛溫、本體覺存)、<b>中央脊髓(老人過度伸展、上肢>下肢)</b>、<b>Brown-Séquard(同側運動+本體覺、對側痛溫)</b>、後脊髓(本體覺)。<b>薦髓保留=不完全、預後較佳</b>。呼吸衰竭見C3–5;<b>神經性休克=低血壓+心搏徐緩+四肢溫暖(T6以上)</b>;自主神經反射異常見T6以上。ASIA:A完全/B感覺/C運動<3/D運動≥3/E正常。</p>\n<p><b>脊椎骨折(Denis三柱):</b>中柱(後1/3椎體+後縱韌帶)受損→不穩定。<b>爆裂(burst)</b>—椎莖間距變寬;Chance(安全帶、合併十二指腸傷);<b>樞突Type II最常見但不穩定</b>;Jefferson(C1爆裂、橫韌帶斷→C1-2不穩);<b>Hangman’s(C2 pars、神經缺損少可外固定)</b>;單側小面卡鎖=彎曲+旋轉。</p>\n<p><b>脊髓腫瘤:</b>硬膜外最多(轉移惡性、好發胸椎);硬膜內髓外(腦膜瘤/神經鞘瘤);脊髓內(星狀/室管膜瘤)。<b>脊椎硬膜上轉移最早=局部背痛</b>;脊髓空洞症=痛溫喪失/本體覺存(分離性)、上肢>下肢。脊髓損傷影像MRI優於CT。</p>\n"},"水腦‧先天畸形‧功能性神經外科":{"title":"水腦‧先天畸形‧功能性神經外科","html":"\n<p><b>水腦症:</b>阻塞性(導水管狹窄、第四腦室出口)vs交通性(感染/出血後吸收下降);Dandy-Walker=第四腦室囊狀擴大;<b>Chiari I=小腦扁桃下垂≥5 mm(合併脊髓空洞)</b>、Chiari II=合併脊髓脊膜膨出/水腦。<b>NPH三徵=步態不穩+失智+尿失禁</b>(無顫抖),引流後「步態」最易改善。<b>腦部偽腫瘤(IIH)</b>=肥胖年輕女、視乳頭水腫、LP壓力高、「腦室正常或偏小」、利尿+減重。</p>\n<p><b>先天畸形:</b>脊髓脊膜膨出好發腰薦交界;腦膨出之膨出腦組織多「切除」非回置;Klippel-Feil=頸椎分節失敗(低後髮際/短頸/活動受限);顱縫早閉—矢狀縫→舟狀頭、Crouzon才有突眼/上頜發育不全。</p>\n<p><b>三叉神經痛:</b>多為「小腦上動脈(SCA)」壓迫;<b>第一線藥物(carbamazepine)</b>,無效→手術,以「顯微血管減壓(MVD)效果最快持久」,經皮術式/伽馬刀為替代。</p>\n"}};
const $=s=>document.querySelector(s);
let view='year',expand=false;
const yset=[...new Set(Q.map(q=>q.roc_year))].sort((a,b)=>a-b);
yset.forEach(y=>fYear.appendChild(Object.assign(document.createElement('option'),{value:y,textContent:'民國'+y+'年'})));
TO.forEach(t=>{if(Q.some(q=>q.topic===t))fTopic.appendChild(Object.assign(document.createElement('option'),{value:t,textContent:t}));});
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ansText(q){var a='答案：'+q.answer;if(q.accepted_answers&&q.accepted_answers.length>1)a+='（'+(q.answer_status||'多重答案')+'：'+q.accepted_answers.join('、')+'均給分）';else if(q.answer_status&&q.answer_status.indexOf('送分')>=0)a+='（送分：一律給分）';return a;}
function qCard(q){
 const e=E[q.id];
 const chips=['<span class="chip y">'+esc(q.src)+'</span>','<span class="chip">第'+q.q_num+'題</span>','<span class="chip t">'+esc(q.topic)+'</span>'];
 let opts='';for(const k of ['A','B','C','D','E']){if(q.options[k]!==undefined)opts+='<div class="opt"><b>('+k+')</b>'+esc(q.options[k])+'</div>';}
 const img=q.img?'<img class="fig" src="'+q.img+'" alt="附圖" onclick="this.classList.toggle(\'big\')">':'';
 let det='';
 if(e){det='<div class="qk"><b>⚡ 快速解答：</b>'+esc(e.quick)+'</div>';
  if(e.detail){
   if(e.detail.background)det+='<div class="bg"><h4>📖 背景知識</h4><div>'+esc(e.detail.background)+'</div></div>';
   if(e.detail.options){det+='<div class="oabox"><h4>🔍 逐選項解析</h4>';for(const k of ['A','B','C','D','E']){if(e.detail.options[k]){var cc=((q.accepted_answers||[q.answer]).indexOf(k)>=0)?' correct':'';det+='<div class="oa'+cc+'"><b>('+k+')</b> '+esc(e.detail.options[k])+'</div>';}}det+='</div>';}
   if(e.detail.sources&&e.detail.sources.length)det+='<div class="src2">📚 參考來源：'+e.detail.sources.map(esc).join('；')+'</div>';
  }
 }else det='<div class="pend">詳解撰寫中…</div>';
 return '<div class="q"><div class="chips">'+chips.join('')+'</div>'+
  '<div class="stem"><span class="n">'+q.q_num+'.</span>'+esc(q.stem)+'</div>'+img+opts+
  '<button class="btn tg">看答案＋詳解 ▾</button><div class="ans"><div class="ansline">'+ansText(q)+'</div>'+det+'</div></div>';
}
function lecBox(t){const l=LEC[t];if(!l)return '';return '<div class="lec"><h3>📚 '+esc(l.title)+' · 複習講義</h3>'+l.html+'</div>';}
function render(){
 const fy=fYear.value,ft=fTopic.value,kw=fKw.value.trim();
 let qs=Q.filter(q=>(!fy||q.roc_year==fy)&&(!ft||q.topic===ft)&&(!kw||q.stem.indexOf(kw)>=0));
 cnt.textContent='共 '+qs.length+' 題';let h='';
 if(view==='year'){const ys=[...new Set(qs.map(q=>q.roc_year))].sort((a,b)=>a-b);
  ys.forEach(y=>{h+='<div class="grp">民國'+y+'年（'+qs.filter(q=>q.roc_year===y).length+'題）</div>'+qs.filter(q=>q.roc_year===y).sort((a,b)=>a.exam_code.localeCompare(b.exam_code)||a.q_num-b.q_num).map(qCard).join('');});}
 else{TO.forEach(t=>{const tq=qs.filter(q=>q.topic===t);if(!tq.length)return;h+='<div class="grp">'+t+'（'+tq.length+'題）</div>'+lecBox(t)+tq.sort((a,b)=>a.roc_year-b.roc_year||a.q_num-b.q_num).map(qCard).join('');});}
 ce.innerHTML=h;ce.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',expand));
}
ce.addEventListener('click',e=>{if(e.target.classList.contains('tg')){const a=e.target.nextElementSibling;a.classList.toggle('show');e.target.textContent=a.classList.contains('show')?'收合 ▴':'看答案＋詳解 ▾';}});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');view=t.dataset.v;render();});
[fYear,fTopic].forEach(s=>s.onchange=render);fKw.oninput=render;
$('#expand').onclick=function(){expand=!expand;this.textContent=expand?'全部收合答案':'全部展開答案';render();};
render();
